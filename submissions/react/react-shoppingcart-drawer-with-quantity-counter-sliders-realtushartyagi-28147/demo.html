<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShoppingCart Drawer with Quantity Counter Sliders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 40px;
      background: #f3f4f6;
      display: flex; justify-content: center; align-items: flex-start; min-height: 100vh;
    }
    .trigger-btn {
      background: #000; color: #fff; border: none;
      padding: 12px 24px; font-size: 1rem; border-radius: 8px;
      cursor: pointer; transition: transform 0.2s;
    }
    .trigger-btn:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import ShoppingCartDrawer from "./ShoppingCartDrawer.jsx";

    const initialItems = [
      { id: "1", name: "Classic Cotton T-Shirt", price: 24.99, qty: 2, image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=150&q=80" },
      { id: "2", name: "Everyday Denim Jacket", price: 65.00, qty: 1, image: "https://images.unsplash.com/photo-1551028719-00167b16eac5?w=150&q=80" },
      { id: "3", name: "Leather Sneakers", price: 89.95, qty: 1, image: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=150&q=80" },
    ];

    function Demo() {
      const [open, setOpen] = React.useState(false);
      const [items, setItems] = React.useState(initialItems);

      const handleUpdateQty = (id, newQty) => {
        if (newQty === 0) {
          setItems(prev => prev.filter(item => item.id !== id));
        } else {
          setItems(prev => prev.map(item => item.id === id ? { ...item, qty: newQty } : item));
        }
      };

      const totalQty = items.reduce((acc, item) => acc + item.qty, 0);

      return (
        <div>
          <button className="trigger-btn" onClick={() => setOpen(true)}>
            Open Cart ({totalQty})
          </button>
          <ShoppingCartDrawer
            isOpen={open}
            onClose={() => setOpen(false)}
            items={items}
            onUpdateQty={handleUpdateQty}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
