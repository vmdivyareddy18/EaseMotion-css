<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - useAnimation Hook Visual Test</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // Inlined version of the hook for the visual demo
        const { useState, useEffect, useRef, useCallback } = React;

        const useAnimation = ({
            animation = "ease-bounce",
            duration = "ease-duration-normal",
            curve = "ease-curve-ease",
            fill = "ease-fill-both"
        } = {}) => {
            const ref = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);

            const play = useCallback(() => setIsPlaying(true), []);
            
            useEffect(() => {
                const node = ref.current;
                if (!node) return;
                const handleAnimationEnd = (e) => {
                    if (e.target === node) setIsPlaying(false);
                };
                node.addEventListener('animationend', handleAnimationEnd);
                return () => node.removeEventListener('animationend', handleAnimationEnd);
            }, []);

            const className = isPlaying ? `${animation} ${duration} ${curve} ${fill}`.trim() : "";
            return { ref, play, isPlaying, className };
        };

        const App = () => {
            const { ref, play, className, isPlaying } = useAnimation();

            return (
                <div className="test-container">
                    <div 
                        ref={ref} 
                        className={`target-box ${className}`}
                    >
                        {isPlaying ? 'Playing...' : 'Idle'}
                    </div>
                    
                    <button className="trigger-btn" onClick={play} disabled={isPlaying}>
                        Trigger Animation
                    </button>
                    
                    <p style={{ marginTop: '2rem', color: 'var(--text-muted)' }}>
                        This is a visual test harness to accompany the Vitest suite.<br/>
                        Notice how the button disables while the CSS animation is running,<br/>
                        and automatically re-enables when the `animationend` event fires!
                    </p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
