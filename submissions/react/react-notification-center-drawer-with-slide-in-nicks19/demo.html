<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Center Drawer Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .demo-content {
      text-align: center;
    }
    .open-btn {
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.4);
      transition: background 0.2s, transform 0.1s;
    }
    .open-btn:hover {
      background: #2563eb;
    }
    .open-btn:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function NotificationDrawer({ isOpen, onClose, notifications = [], title = "Notifications", onNotificationClick, onClearAll }) {
      const drawerRef = useRef(null);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && isOpen) {
            onClose();
          }
        };

        if (isOpen) {
          document.addEventListener('keydown', handleKeyDown);
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }

        return () => {
          document.removeEventListener('keydown', handleKeyDown);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div className="ease-drawer-overlay ease-fade-in" onClick={onClose} aria-hidden="true">
          <div 
            className="ease-drawer ease-slide-in-right"
            role="dialog"
            aria-modal="true"
            aria-label={title}
            onClick={(e) => e.stopPropagation()}
            ref={drawerRef}
          >
            <div className="ease-drawer__header">
              <h2 className="ease-drawer__title">{title}</h2>
              <div className="ease-drawer__actions">
                {notifications.length > 0 && onClearAll && (
                  <button className="ease-drawer__btn-clear ease-squish-button" onClick={onClearAll}>
                    Clear all
                  </button>
                )}
                <button className="ease-drawer__btn-close ease-squish-button" onClick={onClose} aria-label="Close drawer">
                  <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" d="M6 18L18 6M6 6l12 12" />
                  </svg>
                </button>
              </div>
            </div>

            <div className="ease-drawer__body">
              {notifications.length === 0 ? (
                <div className="ease-drawer__empty ease-fade-in">
                  <svg viewBox="0 0 24 24" width="48" height="48" className="ease-drawer__empty-icon">
                    <path fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                  </svg>
                  <p>You're all caught up!</p>
                </div>
              ) : (
                <ul className="ease-drawer__list">
                  {notifications.map((notif, index) => (
                    <li 
                      key={notif.id || index}
                      className={`ease-drawer__item ${!notif.read ? 'ease-drawer__item--unread' : ''}`}
                      onClick={() => onNotificationClick && onNotificationClick(notif)}
                      style={{ animationDelay: `${index * 0.05}s` }}
                    >
                      <div className="ease-drawer__item-content">
                        <p className="ease-drawer__item-title">{notif.title}</p>
                        <p className="ease-drawer__item-desc">{notif.message}</p>
                        <span className="ease-drawer__item-time">{notif.time}</span>
                      </div>
                      {!notif.read && <div className="ease-drawer__item-dot" aria-label="Unread" />}
                    </li>
                  ))}
                </ul>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Demo() {
      const [isOpen, setIsOpen] = useState(false);
      const [notifications, setNotifications] = useState([
        { id: 1, title: 'Welcome to EaseMotion', message: 'Thanks for trying out the React components track!', time: '1m ago', read: false },
        { id: 2, title: 'Pull Request Merged', message: 'Your PR #27388 has been successfully merged.', time: '2h ago', read: false },
        { id: 3, title: 'New Comment', message: 'SAPTARSHI-coder commented on your submission.', time: '1d ago', read: true },
        { id: 4, title: 'System Maintenance', message: 'Scheduled maintenance will occur on Sunday at 2 AM UTC.', time: '3d ago', read: true }
      ]);

      const handleNotificationClick = (notif) => {
        setNotifications(prev => prev.map(n => n.id === notif.id ? { ...n, read: true } : n));
      };

      return (
        <div className="demo-content">
          <h1>Notification Center Demo</h1>
          <p style={{ color: '#6b7280', marginBottom: '30px' }}>
            Click the button below to open the drawer component.
          </p>
          <button className="open-btn" onClick={() => setIsOpen(true)}>
            Open Drawer ({notifications.filter(n => !n.read).length} Unread)
          </button>
          
          <NotificationDrawer 
            isOpen={isOpen}
            onClose={() => setIsOpen(false)}
            notifications={notifications}
            onClearAll={() => setNotifications([])}
            onNotificationClick={handleNotificationClick}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
