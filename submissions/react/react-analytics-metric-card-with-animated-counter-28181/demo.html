<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Analytics Metric Card Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
    }

    .demo-controls {
      margin-bottom: 2rem;
    }

    .demo-btn {
      background: #0f172a;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .demo-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const MetricCard = ({ title, value, prefix = "", suffix = "", trend = 0, duration = 2000 }) => {
      const [displayValue, setDisplayValue] = useState(0);

      const easeOutExpo = (x) => x === 1 ? 1 : 1 - Math.pow(2, -10 * x);

      useEffect(() => {
        let startTime = null;
        let animationFrame;

        const animate = (currentTime) => {
          if (!startTime) startTime = currentTime;
          const progress = Math.min((currentTime - startTime) / duration, 1);
          
          const easedProgress = easeOutExpo(progress);
          const currentVal = Math.floor(easedProgress * value);
          
          setDisplayValue(currentVal);

          if (progress < 1) {
            animationFrame = requestAnimationFrame(animate);
          } else {
            setDisplayValue(value);
          }
        };

        setDisplayValue(0); // Reset on re-trigger
        const delayTimer = setTimeout(() => {
          animationFrame = requestAnimationFrame(animate);
        }, 300);

        return () => {
          clearTimeout(delayTimer);
          if (animationFrame) cancelAnimationFrame(animationFrame);
        };
      }, [value, duration]);

      const isPositive = trend >= 0;

      return (
        <div className="ease-metric-card">
          <div className="ease-metric-header">
            <h3 className="ease-metric-title">{title}</h3>
            <button className="ease-metric-menu-btn" aria-label="More options">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="1"></circle>
                <circle cx="12" cy="5" r="1"></circle>
                <circle cx="12" cy="19" r="1"></circle>
              </svg>
            </button>
          </div>

          <div className="ease-metric-content">
            <div className="ease-metric-value-container">
              {prefix && <span className="ease-metric-affix">{prefix}</span>}
              <span className="ease-metric-value">{displayValue.toLocaleString()}</span>
              {suffix && <span className="ease-metric-affix">{suffix}</span>}
            </div>

            <div className={`ease-metric-trend ${isPositive ? 'is-positive' : 'is-negative'}`}>
              <span className="ease-metric-trend-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  {isPositive ? <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline> : <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>}
                  {isPositive ? <polyline points="17 6 23 6 23 12"></polyline> : <polyline points="17 18 23 18 23 12"></polyline>}
                </svg>
              </span>
              <span className="ease-metric-trend-value">{Math.abs(trend)}%</span>
              <span className="ease-metric-trend-label">vs last month</span>
            </div>
          </div>
          
          <div className="ease-metric-glow"></div>
        </div>
      );
    };

    const App = () => {
      // Use a key to force complete remount for demo replay purposes
      const [key, setKey] = useState(0);

      const replayAnimations = () => {
        setKey(prev => prev + 1);
      };

      return (
        <React.Fragment key={key}>
          <div className="demo-controls">
            <button className="demo-btn" onClick={replayAnimations}>Replay Entrance Animation</button>
          </div>
          
          <div className="demo-grid">
            <MetricCard 
              title="Total Revenue" 
              value={124500} 
              prefix="$" 
              trend={12.5} 
            />
            <div style={{ animationDelay: '0.1s' }}>
              <MetricCard 
                title="Active Users" 
                value={45200} 
                trend={5.2} 
              />
            </div>
            <div style={{ animationDelay: '0.2s' }}>
              <MetricCard 
                title="Churn Rate" 
                value={12} 
                suffix="%" 
                trend={-2.4} 
              />
            </div>
          </div>
        </React.Fragment>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
