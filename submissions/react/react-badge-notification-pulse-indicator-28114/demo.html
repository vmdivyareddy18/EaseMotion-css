<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Badge Notification Pulse Indicator Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 3rem 2rem;
      color: #0f172a;
    }

    .demo-container { max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }

    .demo-section {
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 32px;
      box-shadow: 0 2px 8px -2px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0;
    }

    .demo-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #94a3b8;
      margin: 0 0 24px 0;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 36px;
    }

    /* Generic icon box for demo */
    .icon-box {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      border: 1px solid #e2e8f0;
    }

    .demo-btn {
      padding: 8px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    .demo-btn:hover { background: #2563eb; }
    .demo-btn.red { background: #ef4444; }
    .demo-btn.red:hover { background: #dc2626; }

    .demo-caption {
      font-size: 0.75rem;
      color: #94a3b8;
      font-family: monospace;
      margin: 14px 0 0 0;
    }

    .controls { display: flex; gap: 8px; align-items: center; margin-top: 16px; }
    .count-display { font-size: 1rem; font-weight: 700; color: #0f172a; min-width: 30px; text-align: center; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    /* ── Reusable BadgeNotification ── */
    const VARIANTS = {
      danger:  { bg: '#ef4444', pulse: '#fca5a5' },
      warning: { bg: '#f59e0b', pulse: '#fcd34d' },
      success: { bg: '#10b981', pulse: '#6ee7b7' },
      info:    { bg: '#3b82f6', pulse: '#93c5fd' },
      primary: { bg: '#8b5cf6', pulse: '#c4b5fd' },
    };

    const BadgeNotification = ({ children, count, max = 99, variant = 'danger', pulse = true, position = 'top-right', dot = false, animate = true }) => {
      const [prevCount, setPrevCount] = useState(count);
      const [popping, setPopping] = useState(false);

      useEffect(() => {
        if (count !== prevCount && animate) {
          setPopping(true);
          const t = setTimeout(() => setPopping(false), 350);
          setPrevCount(count);
          return () => clearTimeout(t);
        }
      }, [count]);

      const cfg = VARIANTS[variant] || VARIANTS.danger;
      const label = dot ? null : (count > max ? `${max}+` : count);
      const hidden = !dot && (count === 0 || count == null);

      return (
        <span className="ease-badge-wrap">
          {children}
          {!hidden && (
            <span
              className={['ease-badge', `ease-badge--${position}`, dot ? 'ease-badge--dot' : '', pulse ? 'ease-badge--pulse' : '', popping ? 'ease-badge--pop' : ''].filter(Boolean).join(' ')}
              style={{ '--ease-badge-bg': cfg.bg, '--ease-badge-pulse': cfg.pulse }}
              aria-label={dot ? 'New notification' : `${label} notifications`}
              role="status"
            >
              {!dot && label}
              {pulse && <span className="ease-badge-ring" aria-hidden="true" />}
            </span>
          )}
        </span>
      );
    };

    /* ── Demo App ── */
    const App = () => {
      const [count, setCount] = useState(3);

      return (
        <div className="demo-container">

          {/* 1. Interactive counter */}
          <div className="demo-section">
            <p className="demo-label">1. Live Count — pop animation on change</p>
            <div className="demo-row">
              <BadgeNotification count={count} variant="danger" pulse={true}>
                <div className="icon-box">🔔</div>
              </BadgeNotification>
              <BadgeNotification count={count} variant="info" pulse={true}>
                <div className="icon-box">💬</div>
              </BadgeNotification>
              <BadgeNotification count={count} variant="success" pulse={false}>
                <div className="icon-box">✉️</div>
              </BadgeNotification>
            </div>
            <div className="controls">
              <button className="demo-btn red" onClick={() => setCount(c => Math.max(0, c - 1))}>− Remove</button>
              <span className="count-display">{count}</span>
              <button className="demo-btn" onClick={() => setCount(c => c + 1)}>+ Add</button>
            </div>
            <p className="demo-caption">{'<BadgeNotification count={count} variant="danger" />'}</p>
          </div>

          {/* 2. Variants */}
          <div className="demo-section">
            <p className="demo-label">2. Color Variants</p>
            <div className="demo-row">
              {['danger','warning','success','info','primary'].map(v => (
                <BadgeNotification key={v} count={v === 'danger' ? 99 : v === 'warning' ? 5 : v === 'success' ? 1 : v === 'info' ? 12 : 100} max={99} variant={v}>
                  <div className="icon-box" style={{ fontSize: '1.2rem' }}>{v === 'danger' ? '🔔' : v === 'warning' ? '⚠️' : v === 'success' ? '✅' : v === 'info' ? '💬' : '⭐'}</div>
                </BadgeNotification>
              ))}
            </div>
            <p className="demo-caption">variant: "danger" | "warning" | "success" | "info" | "primary"</p>
          </div>

          {/* 3. Dot only */}
          <div className="demo-section">
            <p className="demo-label">3. Dot-only Indicator</p>
            <div className="demo-row">
              {['danger','success','info','primary'].map(v => (
                <BadgeNotification key={v} count={1} dot variant={v}>
                  <div className="icon-box">👤</div>
                </BadgeNotification>
              ))}
            </div>
            <p className="demo-caption">{'<BadgeNotification count={1} dot variant="success" />'}</p>
          </div>

          {/* 4. Positions */}
          <div className="demo-section">
            <p className="demo-label">4. Corner Positions</p>
            <div className="demo-row">
              {['top-right','top-left','bottom-right','bottom-left'].map(pos => (
                <BadgeNotification key={pos} count={3} variant="primary" position={pos}>
                  <div className="icon-box">📦</div>
                </BadgeNotification>
              ))}
            </div>
            <p className="demo-caption">position: "top-right" | "top-left" | "bottom-right" | "bottom-left"</p>
          </div>

          {/* 5. Zero hides */}
          <div className="demo-section">
            <p className="demo-label">5. Zero Count → Badge Hidden</p>
            <div className="demo-row">
              <BadgeNotification count={0} variant="danger">
                <div className="icon-box">🔕</div>
              </BadgeNotification>
              <BadgeNotification count={1} variant="danger">
                <div className="icon-box">🔔</div>
              </BadgeNotification>
            </div>
            <p className="demo-caption">count=0 hides badge · count=1 shows badge</p>
          </div>

        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
