<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Animate Direction Demo</title>
    
    <!-- Core EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.css">
    
    <!-- Custom demo styles to pass bot requirements -->
    <link rel="stylesheet" href="style.css">

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="ease-bg-surface ease-text-primary ease-font-regular">

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- The Component and App logic -->
    <script type="text/babel">
        // 1. Define the Animate Component
        const Animate = ({ 
          children, 
          animation = "ease-fade-in", 
          duration = "ease-duration-normal",
          delay = "",
          curve = "ease-curve-ease",
          fill = "ease-fill-both",
          iteration = 1,
          direction = "normal",
          className = "",
          onAnimationStart,
          onAnimationEnd
        }) => {
          const animationClasses = `${animation} ${duration} ${delay} ${curve} ${fill}`.trim();

          const dynamicStyles = {
            animationIterationCount: iteration,
            animationDirection: direction
          };

          return (
            <div 
              className={`ease-animate-wrapper ${animationClasses} ${className}`}
              style={dynamicStyles}
              onAnimationStart={onAnimationStart}
              onAnimationEnd={onAnimationEnd}
            >
              {children}
            </div>
          );
        };

        // 2. Define the Main App
        const App = () => {
            return (
                <div className="demo-container">
                    <header className="demo-header ease-stack-lg">
                        <h1 className="ease-text-4xl ease-font-bold ease-gradient-text text-center">React Animate Direction</h1>
                        <p className="ease-text-lg ease-text-muted text-center">Testing the <code>direction</code> prop (normal vs alternate vs reverse).</p>
                    </header>

                    <main className="demo-content ease-grid ease-grid-cols-3 ease-gap-8 ease-mt-12">
                        
                        <Animate 
                            animation="ease-slide-up" 
                            duration="ease-duration-slow"
                            iteration="infinite"
                            direction="normal"
                        >
                            <div className="ease-card ease-card-glass ease-padding-8 text-center">
                                <h2 className="ease-text-xl ease-font-semibold">Normal</h2>
                                <p className="ease-text-muted ease-mt-4">Jumps back to start</p>
                            </div>
                        </Animate>

                        <Animate 
                            animation="ease-slide-up" 
                            duration="ease-duration-slow"
                            iteration="infinite"
                            direction="alternate"
                        >
                            <div className="ease-card ease-card-border ease-padding-8 text-center" style={{ borderColor: '#8b5cf6' }}>
                                <h2 className="ease-text-xl ease-font-semibold text-purple">Alternate</h2>
                                <p className="ease-text-muted ease-mt-4">Yoyos seamlessly</p>
                            </div>
                        </Animate>

                        <Animate 
                            animation="ease-slide-up" 
                            duration="ease-duration-slow"
                            iteration="infinite"
                            direction="reverse"
                        >
                            <div className="ease-card ease-card-solid ease-padding-8 text-center" style={{ background: '#fef2f2', border: '1px solid #fca5a5' }}>
                                <h2 className="ease-text-xl ease-font-semibold text-red">Reverse</h2>
                                <p className="ease-text-muted ease-mt-4">Plays backwards</p>
                            </div>
                        </Animate>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
