<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Autocomplete Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      padding: 60px 20px;
      display: flex;
      justify-content: center;
    }
    .demo-container {
      width: 100%;
      max-width: 600px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      min-height: 400px;
    }
    h2 { margin-top: 0; color: #111827; margin-bottom: 8px; }
    p.desc { color: #6b7280; margin-bottom: 32px; }
    .result {
      margin-top: 24px;
      padding: 16px;
      background: #eff6ff;
      border-radius: 8px;
      color: #1e3a8a;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useRef, useEffect, useMemo } = React;

    function SearchAutocomplete({ options = [], placeholder = 'Search...', onSelect, maxResults = 5 }) {
      const [query, setQuery] = useState('');
      const [isOpen, setIsOpen] = useState(false);
      const [activeIndex, setActiveIndex] = useState(-1);
      const containerRef = useRef(null);
      const inputRef = useRef(null);

      const filteredOptions = useMemo(() => {
        if (!query) return options.slice(0, maxResults);
        const lowerQuery = query.toLowerCase();
        return options.filter(option => option.label.toLowerCase().includes(lowerQuery)).slice(0, maxResults);
      }, [options, query, maxResults]);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleKeyDown = (e) => {
        if (!isOpen) return;
        switch (e.key) {
          case 'ArrowDown':
            e.preventDefault();
            setActiveIndex(prev => (prev < filteredOptions.length - 1 ? prev + 1 : prev));
            break;
          case 'ArrowUp':
            e.preventDefault();
            setActiveIndex(prev => (prev > 0 ? prev - 1 : 0));
            break;
          case 'Enter':
            e.preventDefault();
            if (activeIndex >= 0 && activeIndex < filteredOptions.length) {
              handleSelect(filteredOptions[activeIndex]);
            }
            break;
          case 'Escape':
            setIsOpen(false);
            break;
        }
      };

      const handleSelect = (option) => {
        setQuery(option.label);
        setIsOpen(false);
        setActiveIndex(-1);
        if (onSelect) onSelect(option);
      };

      const highlightMatch = (text) => {
        if (!query) return text;
        const index = text.toLowerCase().indexOf(query.toLowerCase());
        if (index === -1) return text;
        return (
          <React.Fragment>
            {text.substring(0, index)}
            <span className="ease-autocomplete__highlight">{text.substring(index, index + query.length)}</span>
            {text.substring(index + query.length)}
          </React.Fragment>
        );
      };

      return (
        <div className="ease-autocomplete" ref={containerRef}>
          <div className="ease-autocomplete__input-wrapper">
            <svg className="ease-autocomplete__icon" viewBox="0 0 24 24">
              <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input
              ref={inputRef}
              type="text"
              className="ease-autocomplete__input ease-pulse-border-emphasis"
              placeholder={placeholder}
              value={query}
              onChange={(e) => {
                setQuery(e.target.value);
                setIsOpen(true);
                setActiveIndex(-1);
              }}
              onFocus={() => setIsOpen(true)}
              onKeyDown={handleKeyDown}
              aria-expanded={isOpen}
              aria-autocomplete="list"
              role="combobox"
            />
          </div>

          {isOpen && filteredOptions.length > 0 && (
            <ul className="ease-autocomplete__dropdown ease-slide-down ease-fade-in" role="listbox">
              {filteredOptions.map((option, index) => {
                const isActive = index === activeIndex;
                return (
                  <li
                    key={option.value || option.label}
                    role="option"
                    aria-selected={isActive}
                    className={`ease-autocomplete__item ${isActive ? 'ease-autocomplete__item--active' : ''}`}
                    onClick={() => handleSelect(option)}
                    onMouseEnter={() => setActiveIndex(index)}
                  >
                    {highlightMatch(option.label)}
                  </li>
                );
              })}
            </ul>
          )}
          
          {isOpen && query && filteredOptions.length === 0 && (
            <div className="ease-autocomplete__dropdown ease-slide-down ease-fade-in ease-autocomplete__no-results">
              No results found for "{query}"
            </div>
          )}
        </div>
      );
    }

    function Demo() {
      const [selected, setSelected] = useState(null);
      const data = [
        { label: 'React Hooks' },
        { label: 'React Router v6' },
        { label: 'Redux Toolkit' },
        { label: 'EaseMotion CSS' },
        { label: 'Tailwind CSS' },
        { label: 'Framer Motion' },
        { label: 'Next.js 13' },
        { label: 'Vite Setup' },
        { label: 'Vitest Testing' }
      ];

      return (
        <div className="demo-container">
          <h2>Search Documentation</h2>
          <p className="desc">Try searching for "React" or "CSS" to see the highlight effect.</p>
          
          <SearchAutocomplete 
            options={data} 
            placeholder="Search frontend topics..."
            onSelect={setSelected}
            maxResults={6}
          />

          {selected && (
            <div className="result">
              You selected: <strong>{selected.label}</strong>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
