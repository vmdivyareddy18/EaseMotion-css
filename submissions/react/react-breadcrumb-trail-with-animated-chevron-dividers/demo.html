<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Breadcrumb Trail with Animated Chevron Dividers Demo</title>
  
  <!-- Load React, ReactDOM and Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Link EaseMotion CSS Core Stylesheets -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  
  <!-- FontAwesome Icons for visual crumbs -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background-color: #06090e; margin: 0; padding: 2rem; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif;">

  <div id="root" style="width: 100%; max-width: 750px;"></div>

  <!-- Inline Babel Script to run React Breadcrumbs code -->
  <script type="text/babel">
    const { useState, useCallback } = React;

    // --- Separator SVG Component ---
    const DefaultChevron = () => (
      <svg
        width="10"
        height="10"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        strokeWidth="3.5"
        strokeLinecap="round"
        strokeLinejoin="round"
        style={{ display: 'block' }}
      >
        <polyline points="9 18 15 12 9 6" />
      </svg>
    );

    // Separator styles inject
    const styles = `
      .ease-breadcrumb-nav {
        font-family: var(--ease-font-sans, system-ui, -apple-system, sans-serif);
        width: 100%;
      }
      .ease-breadcrumb-list {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 0;
      }
      .ease-breadcrumb-item-wrapper {
        display: inline-flex;
        align-items: center;
      }
      .ease-breadcrumb-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        text-decoration: none;
        color: var(--ease-color-neutral-500, #64748b);
        font-size: var(--ease-text-sm, 14px);
        font-weight: 500;
        position: relative;
        padding: 6px 0;
        cursor: pointer;
        transition: color var(--ease-speed-fast, 150ms) var(--ease-ease, cubic-bezier(0.4, 0, 0.2, 1));
      }
      .ease-breadcrumb-link:hover {
        color: var(--ease-color-primary, #6c63ff);
      }
      .ease-breadcrumb-link::after {
        content: '';
        position: absolute;
        bottom: 2px;
        left: 0;
        width: 100%;
        height: 1.5px;
        background-color: var(--ease-color-primary, #6c63ff);
        transform: scaleX(0);
        transform-origin: bottom left;
        transition: transform var(--ease-speed-medium, 300ms) var(--ease-ease, cubic-bezier(0.4, 0, 0.2, 1));
      }
      .ease-breadcrumb-link:hover::after {
        transform: scaleX(1);
      }
      .ease-breadcrumb-separator {
        color: var(--ease-color-neutral-400, #94a3b8);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 var(--ease-space-2, 8px);
        transition: transform var(--ease-speed-medium, 300ms) var(--ease-ease, cubic-bezier(0.4, 0, 0.2, 1)), 
                    color var(--ease-speed-fast, 150ms) var(--ease-ease);
      }
      .ease-breadcrumb-animate-chevrons .ease-breadcrumb-link:hover + .ease-breadcrumb-separator {
        transform: translateX(5px) scale(1.2);
        color: var(--ease-color-primary, #6c63ff);
      }
      .ease-breadcrumb-active {
        color: var(--ease-color-neutral-100, #f1f5f9);
        font-weight: 650;
        font-size: var(--ease-text-sm, 14px);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 0;
      }
      .ease-breadcrumb-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: inherit;
      }
      .ease-breadcrumb-ellipsis-btn {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--ease-color-neutral-700, #334155);
        border-radius: var(--ease-radius-sm, 4px);
        color: var(--ease-color-neutral-500, #64748b);
        cursor: pointer;
        font-family: var(--ease-font-mono, monospace);
        font-weight: 700;
        padding: 2px 8px;
        font-size: var(--ease-text-xs, 12px);
        transition: all var(--ease-speed-fast, 150ms) var(--ease-ease);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        outline: none;
        line-height: 1;
        height: 20px;
      }
      .ease-breadcrumb-ellipsis-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: var(--ease-color-primary, #6c63ff);
        border-color: var(--ease-color-primary, #6c63ff);
      }
    `;

    // --- BreadcrumbTrail Component ---
    function BreadcrumbTrail({
      items = [],
      maxItems = 8,
      separator = <DefaultChevron />,
      animateDividers = true,
      onItemClick,
      className = '',
    }) {
      const [isExpanded, setIsExpanded] = useState(false);

      const handleLinkClick = useCallback((event, item, index) => {
        event.preventDefault();
        if (onItemClick) {
          onItemClick(item, index);
        }
      }, [onItemClick]);

      const renderItem = (item, index, isLast, hasSeparator) => {
        const key = `crumb-${index}-${item.label}`;

        return (
          <React.Fragment key={key}>
            <li className="ease-breadcrumb-item-wrapper">
              {isLast ? (
                <span className="ease-breadcrumb-active" aria-current="page">
                  {item.icon && <span className="ease-breadcrumb-icon">{item.icon}</span>}
                  <span>{item.label}</span>
                </span>
              ) : (
                <React.Fragment>
                  <a
                    href={item.href || '#'}
                    onClick={(e) => handleLinkClick(e, item, index)}
                    className="ease-breadcrumb-link"
                  >
                    {item.icon && <span className="ease-breadcrumb-icon">{item.icon}</span>}
                    <span>{item.label}</span>
                  </a>
                  {hasSeparator && (
                    <span className="ease-breadcrumb-separator" aria-hidden="true">
                      {separator}
                    </span>
                  )}
                </React.Fragment>
              )}
            </li>
          </React.Fragment>
        );
      };

      const renderList = () => {
        if (!items || items.length === 0) return null;

        if (items.length <= maxItems || isExpanded) {
          return items.map((item, index) => 
            renderItem(item, index, index === items.length - 1, index < items.length - 1)
          );
        }

        const rendered = [];
        
        // First item + separator
        rendered.push(renderItem(items[0], 0, false, true));

        // Ellipsis item + separator
        rendered.push(
          <li className="ease-breadcrumb-item-wrapper" key="ellipsis">
            <button
              onClick={() => setIsExpanded(true)}
              className="ease-breadcrumb-ellipsis-btn ease-squish-button"
              aria-label="Expand breadcrumbs"
            >
              ...
            </button>
            <span className="ease-breadcrumb-separator" aria-hidden="true">
              {separator}
            </span>
          </li>
        );

        // Last items
        const lastItemsCount = maxItems - 1;
        const startIndex = items.length - lastItemsCount;
        for (let i = startIndex; i < items.length; i++) {
          rendered.push(renderItem(items[i], i, i === items.length - 1, i < items.length - 1));
        }

        return rendered;
      };

      return (
        <nav 
          aria-label="Breadcrumb" 
          className={`ease-breadcrumb-nav ${animateDividers ? 'ease-breadcrumb-animate-chevrons' : ''} ${className}`}
        >
          <style dangerouslySetInnerHTML={{ __html: styles }} />
          <ol className="ease-breadcrumb-list">
            {renderList()}
          </ol>
        </nav>
      );
    }

    // --- Main Demo Sandbox ---
    function DemoSandbox() {
      // 1. Standard breadcrumbs with custom icons
      const standardCrumbs = [
        { label: 'Dashboard', href: '#', icon: <i className="fa-solid fa-house"></i> },
        { label: 'Analytics', href: '#', icon: <i className="fa-solid fa-chart-line"></i> },
        { label: 'Monthly Report' }
      ];

      // 2. Multi-level path to showcase responsive auto-collapse
      const longCrumbs = [
        { label: 'Home', href: '#', icon: <i className="fa-solid fa-house"></i> },
        { label: 'Developer Console', href: '#' },
        { label: 'Projects List', href: '#' },
        { label: 'EaseMotion CSS', href: '#' },
        { label: 'Submissions', href: '#' },
        { label: 'React Wrappers', href: '#' },
        { label: 'Breadcrumb Component' }
      ];

      // Custom separator component (Slanted slash instead of chevron)
      const customSlashSeparator = (
        <span style={{ fontSize: '12px', fontWeight: 'bold', opacity: '0.4' }}>/</span>
      );

      const handleCrumbClick = (item, index) => {
        alert(`Navigation triggered for: "${item.label}" at step ${index}`);
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: '2.5rem', width: '100%' }}>
          
          <div>
            <h2 style={{ color: '#fff', fontSize: '1.4rem', fontWeight: '700', marginBottom: '0.5rem' }}>
              React Breadcrumb Navigation
            </h2>
            <p style={{ color: '#94a3b8', fontSize: '0.875rem', marginBottom: '1.5rem' }}>
              Standard breadcrumb trail showing links with hover underline expansions and sliding chevron dividers.
            </p>
            <div style={{ background: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px', padding: '1.5rem' }}>
              <BreadcrumbTrail 
                items={standardCrumbs} 
                animateDividers={true}
                onItemClick={handleCrumbClick}
              />
            </div>
          </div>

          <div>
            <h2 style={{ color: '#fff', fontSize: '1.4rem', fontWeight: '700', marginBottom: '0.5rem' }}>
              Collapsible Breadcrumb Trail
            </h2>
            <p style={{ color: '#94a3b8', fontSize: '0.875rem', marginBottom: '1.5rem' }}>
              Automatically compresses center navigation routes to <code>...</code> when items count exceed <code>maxItems</code>. Click to expand.
            </p>
            <div style={{ background: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px', padding: '1.5rem' }}>
              <BreadcrumbTrail 
                items={longCrumbs} 
                maxItems={3} 
                animateDividers={true}
                onItemClick={handleCrumbClick}
              />
            </div>
          </div>

          <div>
            <h2 style={{ color: '#fff', fontSize: '1.4rem', fontWeight: '700', marginBottom: '0.5rem' }}>
              Custom Separators & Ellipsis
            </h2>
            <p style={{ color: '#94a3b8', fontSize: '0.875rem', marginBottom: '1.5rem' }}>
              Supports loading custom dividers (such as custom slash markers or symbol tags) via props API.
            </p>
            <div style={{ background: '#0f172a', border: '1px solid #1e293b', borderRadius: '12px', padding: '1.5rem' }}>
              <BreadcrumbTrail 
                items={longCrumbs} 
                maxItems={4} 
                separator={customSlashSeparator}
                onItemClick={handleCrumbClick}
              />
            </div>
          </div>

        </div>
      );
    }

    // Render Sandbox App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DemoSandbox />);
  </script>
</body>
</html>
