<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Stepper Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }

    .demo-container {
      background: #ffffff;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .demo-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #0f172a;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 24px;
      justify-content: flex-end;
      border-top: 1px solid #f1f5f9;
      padding-top: 24px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover:not(:disabled) { background: #e2e8f0; }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover:not(:disabled) { background: #2563eb; }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── Stepper Component ── */
    const Stepper = ({ steps, activeStep, orientation = 'horizontal', color = '#3b82f6' }) => (
      <div className={`ease-stepper ease-stepper--${orientation}`} style={{ '--ease-step-color': color }}>
        {steps.map((step, index) => {
          const isCompleted = index < activeStep;
          const isActive = index === activeStep;
          const statusClass = isCompleted ? 'is-completed' : isActive ? 'is-active' : 'is-pending';
          const label = typeof step === 'string' ? step : step.label;
          const desc = typeof step === 'object' && step.description ? step.description : null;

          return (
            <div key={index} className={`ease-step ${statusClass}`}>
              {index > 0 && (
                <div className="ease-step-connector">
                  <div className="ease-step-connector-fill" style={{ transform: isCompleted || isActive ? 'scale(1)' : 'scale(0)' }} />
                </div>
              )}
              <div className="ease-step-node-wrapper">
                <div className="ease-step-node">
                  {isCompleted ? (
                    <svg className="ease-step-icon-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12" /></svg>
                  ) : <span>{index + 1}</span>}
                </div>
                {isActive && <div className="ease-step-pulse" />}
              </div>
              <div className="ease-step-content">
                <span className="ease-step-label">{label}</span>
                {desc && <span className="ease-step-desc">{desc}</span>}
              </div>
            </div>
          );
        })}
      </div>
    );

    /* ── Demo App ── */
    const STEPS = [
      { label: 'Account Details', description: 'Setup your profile' },
      { label: 'Payment Info', description: 'Add billing method' },
      { label: 'Review Order', description: 'Check your items' },
      { label: 'Confirmation', description: 'Order complete!' },
    ];

    const App = () => {
      const [step, setStep] = useState(1); // Start at step 2 (index 1)

      const handleNext = () => setStep(s => Math.min(s + 1, STEPS.length - 1));
      const handlePrev = () => setStep(s => Math.max(s - 1, 0));

      return (
        <div className="demo-container">
          <h1 className="demo-title">Checkout Flow</h1>
          
          <div>
            <div className="section-label">Horizontal Stepper (Blue)</div>
            <Stepper steps={STEPS} activeStep={step} orientation="horizontal" color="#3b82f6" />
          </div>

          <div style={{ marginTop: '20px' }}>
            <div className="section-label">Vertical Stepper (Purple)</div>
            <Stepper steps={STEPS} activeStep={step} orientation="vertical" color="#8b5cf6" />
          </div>

          <div className="controls">
            <button className="btn btn-secondary" onClick={handlePrev} disabled={step === 0}>Back</button>
            <button className="btn btn-primary" onClick={handleNext} disabled={step === STEPS.length - 1}>Continue</button>
          </div>
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
