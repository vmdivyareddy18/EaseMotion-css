<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Heatmap Grid Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .demo-container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      max-width: 900px;
      overflow-x: auto; /* allow horizontal scroll if generated data is wide */
    }
    .demo-container h2 {
      margin-top: 0;
      color: #111827;
    }
    .demo-container p {
      color: #6b7280;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState } = React;

    function HeatmapGrid({ data = [], colorStops = ['#ebedf0', '#9be9a8', '#40c463', '#30a14e', '#216e39'], rows = 7, cellSize = 14, cellGap = 4, tooltipFormatter = (item) => `${item.count} contributions on ${item.date}` }) {
      const [hoveredItem, setHoveredItem] = useState(null);
      const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });

      const columns = [];
      for (let i = 0; i < data.length; i += rows) {
        columns.push(data.slice(i, i + rows));
      }

      const maxCount = Math.max(...data.map(d => d.count), 1);
      
      const getColor = (count) => {
        if (count === 0) return colorStops[0];
        const ratio = count / maxCount;
        const index = Math.ceil(ratio * (colorStops.length - 2)) + 1;
        return colorStops[Math.min(index, colorStops.length - 1)];
      };

      const handleMouseEnter = (e, item) => {
        const rect = e.target.getBoundingClientRect();
        setTooltipPos({
          x: rect.left + rect.width / 2,
          y: rect.top - 8
        });
        setHoveredItem(item);
      };

      const handleMouseLeave = () => {
        setHoveredItem(null);
      };

      return (
        <div className="ease-heatmap-container ease-fade-in">
          <div className="ease-heatmap-grid" style={{ gap: `${cellGap}px` }}>
            {columns.map((col, colIndex) => (
              <div key={colIndex} className="ease-heatmap-column" style={{ gap: `${cellGap}px` }}>
                {col.map((item, rowIndex) => (
                  <div
                    key={rowIndex}
                    className="ease-heatmap-cell ease-pulse-hover"
                    style={{
                      width: `${cellSize}px`,
                      height: `${cellSize}px`,
                      backgroundColor: getColor(item.count)
                    }}
                    onMouseEnter={(e) => handleMouseEnter(e, item)}
                    onMouseLeave={handleMouseLeave}
                    aria-label={tooltipFormatter(item)}
                    tabIndex={0}
                    onFocus={(e) => handleMouseEnter(e, item)}
                    onBlur={handleMouseLeave}
                  />
                ))}
              </div>
            ))}
          </div>

          {hoveredItem && (
            <div 
              className="ease-heatmap-tooltip ease-scale-up-tooltip"
              style={{ left: `${tooltipPos.x}px`, top: `${tooltipPos.y}px` }}
              role="tooltip"
            >
              {tooltipFormatter(hoveredItem)}
              <div className="ease-heatmap-tooltip-arrow" />
            </div>
          )}
        </div>
      );
    }

    function Demo() {
      // Generate 52 weeks * 7 days of mock data (roughly a year)
      const mockData = Array.from({ length: 364 }).map((_, i) => {
        // Create an organic looking random distribution (more zeros, fewer high numbers)
        const rand = Math.random();
        let count = 0;
        if (rand > 0.5) count = Math.floor(Math.random() * 5);
        if (rand > 0.8) count = Math.floor(Math.random() * 10);
        if (rand > 0.95) count = Math.floor(Math.random() * 20) + 10;

        // Mock date
        const date = new Date(2025, 0, i + 1);
        const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        return { count, date: dateStr };
      });

      return (
        <div className="demo-container">
          <h2>Activity Heatmap</h2>
          <p>Hover over the cells to see the `.ease-pulse-hover` interaction and animated tooltips.</p>
          <HeatmapGrid 
            data={mockData} 
            tooltipFormatter={(item) => `${item.count === 0 ? 'No' : item.count} events on ${item.date}`}
          />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
