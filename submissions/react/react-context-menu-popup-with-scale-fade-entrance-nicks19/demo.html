<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Menu Popup Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .demo-content {
      text-align: center;
      background: white;
      padding: 60px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      max-width: 600px;
      width: 100%;
    }
    .demo-content h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .demo-content p {
      color: #64748b;
      margin-bottom: 30px;
    }
    .target-area {
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      padding: 80px 20px;
      background: #f1f5f9;
      color: #475569;
      font-weight: 500;
      user-select: none;
      transition: background-color 0.2s, border-color 0.2s;
    }
    .target-area:hover {
      background: #e2e8f0;
      border-color: #94a3b8;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="toast" class="toast">Action Triggered!</div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function ContextMenu({ items = [], children, onAction }) {
      const [isVisible, setIsVisible] = useState(false);
      const [position, setPosition] = useState({ x: 0, y: 0 });
      const menuRef = useRef(null);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleGlobalClick = (e) => {
          if (isVisible && menuRef.current && !menuRef.current.contains(e.target)) {
            setIsVisible(false);
          }
        };

        const handleGlobalContext = (e) => {
          if (isVisible && containerRef.current && !containerRef.current.contains(e.target)) {
            setIsVisible(false);
          }
        };

        document.addEventListener('click', handleGlobalClick);
        document.addEventListener('contextmenu', handleGlobalContext);

        return () => {
          document.removeEventListener('click', handleGlobalClick);
          document.removeEventListener('contextmenu', handleGlobalContext);
        };
      }, [isVisible]);

      const handleContextMenu = (e) => {
        e.preventDefault();
        
        const clickX = e.clientX;
        const clickY = e.clientY;
        
        const screenW = window.innerWidth;
        const screenH = window.innerHeight;
        const estimatedWidth = 220; 
        const estimatedHeight = items.length * 40 + 20;

        const x = clickX + estimatedWidth > screenW ? screenW - estimatedWidth - 10 : clickX;
        const y = clickY + estimatedHeight > screenH ? screenH - estimatedHeight - 10 : clickY;

        setPosition({ x, y });
        setIsVisible(true);
      };

      const handleItemClick = (e, item) => {
        e.stopPropagation();
        setIsVisible(false);
        if (onAction) {
          onAction(item);
        }
      };

      return (
        <div className="ease-context-container" onContextMenu={handleContextMenu} ref={containerRef}>
          {children}

          {isVisible && (
            <div
              ref={menuRef}
              className="ease-context-menu ease-scale-fade-enter"
              style={{ top: `${position.y}px`, left: `${position.x}px` }}
              role="menu"
            >
              {items.map((item, index) => {
                if (item.divider) {
                  return <div key={`divider-${index}`} className="ease-context-divider" />;
                }

                return (
                  <button
                    key={item.id || index}
                    className={`ease-context-item ${item.danger ? 'ease-text-danger' : ''}`}
                    onClick={(e) => handleItemClick(e, item)}
                    role="menuitem"
                  >
                    {item.icon && <span className="ease-item-icon" dangerouslySetInnerHTML={{__html: item.icon}}></span>}
                    <span className="ease-item-label">{item.label}</span>
                    {item.shortcut && <span className="ease-item-shortcut">{item.shortcut}</span>}
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    function Demo() {
      const menuItems = [
        { 
          id: 'preview', 
          label: 'Preview file', 
          icon: '<svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>' 
        },
        { 
          id: 'duplicate', 
          label: 'Duplicate', 
          shortcut: '⌘D',
          icon: '<svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>'
        },
        { 
          id: 'share', 
          label: 'Share link', 
          icon: '<svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>'
        },
        { divider: true },
        { 
          id: 'delete', 
          label: 'Move to Trash', 
          shortcut: '⌫', 
          danger: true,
          icon: '<svg viewBox="0 0 24 24" width="16" height="16"><path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>'
        }
      ];

      const handleAction = (item) => {
        const toast = document.getElementById('toast');
        toast.textContent = `Action triggered: ${item.label}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      };

      return (
        <div className="demo-content">
          <h1>Context Menu Popup</h1>
          <p>A native-feeling context menu with scale & fade entrance.</p>
          
          <ContextMenu items={menuItems} onAction={handleAction}>
            <div className="target-area">
              Right-click anywhere inside this dashed area to open the menu.
            </div>
          </ContextMenu>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
