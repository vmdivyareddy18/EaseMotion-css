<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>React Toast Stack Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }

    .demo-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: transform 0.1s, opacity 0.2s;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-success {
      background: #10b981;
    }

    .btn-error {
      background: #ef4444;
    }

    .btn-info {
      background: #3b82f6;
    }

    .btn-warning {
      background: #f59e0b;
    }
  </style>
</head>

<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const Toast = ({ id, type = 'info', title, message, duration = 3000, onRemove }) => {
      const [isLeaving, setIsLeaving] = useState(false);
      const timerRef = useRef(null);

      const initiateRemoval = useCallback(() => {
        setIsLeaving(true);
        setTimeout(() => {
          onRemove(id);
        }, 400);
      }, [id, onRemove]);

      useEffect(() => {
        if (duration > 0) {
          timerRef.current = setTimeout(() => {
            initiateRemoval();
          }, duration);
        }
        return () => clearTimeout(timerRef.current);
      }, [duration, initiateRemoval]);

      const handleMouseEnter = () => clearTimeout(timerRef.current);

      const handleMouseLeave = () => {
        if (duration > 0) {
          timerRef.current = setTimeout(() => {
            initiateRemoval();
          }, duration);
        }
      };

      const getIcon = () => {
        switch (type) {
          case 'success':
            return (
              <svg className="ease-toast-icon ease-toast-success" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
            );
          case 'error':
            return (
              <svg className="ease-toast-icon ease-toast-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            );
          case 'warning':
            return (
              <svg className="ease-toast-icon ease-toast-warning" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
              </svg>
            );
          default:
            return (
              <svg className="ease-toast-icon ease-toast-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
              </svg>
            );
        }
      };

      const displayTitle = title || (type === 'info' ? 'Information' : type.charAt(0).toUpperCase() + type.slice(1));

      return (
        <div
          className={`ease-toast ease-toast-enter ease-toast-${type} ${isLeaving ? 'ease-toast-leave' : ''}`}
          onMouseEnter={handleMouseEnter}
          onMouseLeave={handleMouseLeave}
          role="alert"
        >
          <div className="ease-toast-content">
            <div className="ease-toast-icon-container">
              {getIcon()}
            </div>
            <div className="ease-toast-text">
              <div className="ease-toast-title">{displayTitle}</div>
              <div className="ease-toast-message">{message}</div>
            </div>
          </div>
          <button className="ease-toast-close" onClick={initiateRemoval}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>

          {duration > 0 && (
            <div
              className={`ease-toast-progress ${type}`}
              style={{ animationDuration: `${duration}ms`, animationPlayState: isLeaving ? 'paused' : 'running' }}
            ></div>
          )}
        </div>
      );
    };

    const ToastStack = ({ toasts, removeToast }) => {
      return (
        <div className="ease-toast-stack" aria-live="polite">
          {toasts.map((toast) => (
            <Toast
              key={toast.id}
              id={toast.id}
              type={toast.type}
              title={toast.title}
              message={toast.message}
              duration={toast.duration}
              onRemove={removeToast}
            />
          ))}
        </div>
      );
    };

    const App = () => {
      const [toasts, setToasts] = useState([]);

      const addToast = (type, message) => {
        const id = Math.random().toString(36).substring(2, 9);
        setToasts(prev => [...prev, { id, type, message, duration: 4000 }]);
      };

      const removeToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      return (
        <div>
          <h1 style={{ color: '#1e293b', textAlign: 'center' }}>Toast Notification Stack</h1>
          <p style={{ color: '#64748b', textAlign: 'center', maxWidth: '600px' }}>
            Click the buttons to spawn notifications. Notice the progress bar pause on hover, and the smooth collapsing layout when a toast is dismissed.
          </p>

          <div className="demo-buttons">
            <button className="btn btn-info" onClick={() => addToast('info', 'Anyone with a link can now view this file.')}>
              Spawn Info
            </button>
            <button className="btn btn-success" onClick={() => addToast('success', 'Anyone with a link can now view this file.')}>
              Spawn Success
            </button>
            <button className="btn btn-warning" onClick={() => addToast('warning', 'Anyone with a link can now view this file.')}>
              Spawn Warning
            </button>
            <button className="btn btn-error" onClick={() => addToast('error', 'Anyone with a link can now view this file.')}>
              Spawn Error
            </button>
          </div>

          <ToastStack toasts={toasts} removeToast={removeToast} />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>

</html>
