<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Comparison Slider Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Load standard component CSS -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Load Babel to compile JSX in the browser for this demo -->
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 2rem;
      background: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    #root {
      width: 100%;
      max-width: 800px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Note: We define the component inside the HTML for the CI demo using Babel -->
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    const ComparisonSlider = ({ beforeImage, afterImage, beforeLabel = 'Before', afterLabel = 'After' }) => {
      const [sliderPosition, setSliderPosition] = useState(50);
      const [isDragging, setIsDragging] = useState(false);
      const containerRef = useRef(null);

      const handleMove = useCallback((clientX) => {
        if (!isDragging || !containerRef.current) return;
        
        const rect = containerRef.current.getBoundingClientRect();
        const x = Math.max(0, Math.min(clientX - rect.left, rect.width));
        const percentage = (x / rect.width) * 100;
        
        setSliderPosition(percentage);
      }, [isDragging]);

      const handleMouseMove = useCallback((e) => {
        handleMove(e.clientX);
      }, [handleMove]);

      const handleTouchMove = useCallback((e) => {
        handleMove(e.touches[0].clientX);
      }, [handleMove]);

      useEffect(() => {
        const handleMouseUp = () => setIsDragging(false);

        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleMouseUp);
          window.addEventListener('touchmove', handleTouchMove, { passive: false });
          window.addEventListener('touchend', handleMouseUp);
        }

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
          window.removeEventListener('touchmove', handleTouchMove);
          window.removeEventListener('touchend', handleMouseUp);
        };
      }, [isDragging, handleMouseMove, handleTouchMove]);

      return (
        <div 
          className="ease-comparison-container"
          ref={containerRef}
          onMouseDown={() => setIsDragging(true)}
          onTouchStart={() => setIsDragging(true)}
        >
          <div className="ease-comparison-layer ease-comparison-after">
            <img src={afterImage} alt="After" draggable="false" />
            <span className="ease-comparison-label ease-label-after">{afterLabel}</span>
          </div>

          <div 
            className="ease-comparison-layer ease-comparison-before"
            style={{ clipPath: `inset(0 ${100 - sliderPosition}% 0 0)` }}
          >
            <img src={beforeImage} alt="Before" draggable="false" />
            <span className="ease-comparison-label ease-label-before">{beforeLabel}</span>
          </div>

          <div 
            className="ease-comparison-handle"
            style={{ left: `${sliderPosition}%` }}
          >
            <div className="ease-comparison-handle-line"></div>
            <div className="ease-comparison-handle-button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </div>
          </div>
        </div>
      );
    };

    // Render App
    const App = () => {
      return (
        <div>
          <h1 style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#1e293b'}}>React Comparison Slider</h1>
          <p style={{textAlign: 'center', fontFamily: 'sans-serif', color: '#64748b', marginBottom: '2rem'}}>Drag the handle to reveal the transformed image.</p>
          
          <ComparisonSlider 
            beforeImage="https://images.unsplash.com/photo-1621360841013-c76831f12560?auto=format&fit=crop&w=800&q=80" 
            afterImage="https://images.unsplash.com/photo-1617854818583-09e7f077a156?auto=format&fit=crop&w=800&q=80" 
            beforeLabel="Raw Image"
            afterLabel="Color Graded"
          />
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
