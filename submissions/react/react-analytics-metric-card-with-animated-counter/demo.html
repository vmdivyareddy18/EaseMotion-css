<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Metric Card Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f3f4f6;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 1000px;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <h2>Analytics Dashboard</h2>
  <div id="root" class="dashboard-grid"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function AnalyticsMetricCard({ title, value, prefix = '', suffix = '', trend = 0, duration = 1500, icon }) {
      const [displayValue, setDisplayValue] = useState(0);
      const startTime = useRef(null);

      useEffect(() => {
        let animationFrame;
        const endValue = parseFloat(value) || 0;

        const animate = (timestamp) => {
          if (!startTime.current) startTime.current = timestamp;
          const progress = timestamp - startTime.current;
          
          const easeProgress = progress === duration ? 1 : 1 - Math.pow(2, -10 * progress / duration);
          
          if (progress < duration) {
            setDisplayValue(endValue * easeProgress);
            animationFrame = requestAnimationFrame(animate);
          } else {
            setDisplayValue(endValue);
          }
        };

        animationFrame = requestAnimationFrame(animate);

        return () => {
          if (animationFrame) cancelAnimationFrame(animationFrame);
        };
      }, [value, duration]);

      const formatNumber = (num) => {
        return Number.isInteger(parseFloat(value)) ? Math.floor(num).toLocaleString() : num.toFixed(1);
      };

      const isPositive = trend >= 0;

      return (
        <div className="ease-metric-card ease-hover-lift">
          <div className="ease-metric-card__header">
            <h3 className="ease-metric-card__title">{title}</h3>
            {icon && <div className="ease-metric-card__icon">{icon}</div>}
          </div>
          
          <div className="ease-metric-card__content">
            <div className="ease-metric-card__value-container">
              <span className="ease-metric-card__prefix">{prefix}</span>
              <span className="ease-metric-card__value ease-count-up">
                {formatNumber(displayValue)}
              </span>
              <span className="ease-metric-card__suffix">{suffix}</span>
            </div>
            
            {trend !== 0 && (
              <div className={`ease-metric-card__trend ${isPositive ? 'ease-metric-card__trend--up' : 'ease-metric-card__trend--down'}`}>
                <span className="ease-metric-card__trend-icon" aria-hidden="true">
                  {isPositive ? '↑' : '↓'}
                </span>
                <span className="ease-metric-card__trend-value">
                  {Math.abs(trend)}%
                </span>
                <span className="ease-metric-card__trend-label">vs last month</span>
              </div>
            )}
          </div>
        </div>
      );
    }

    function Demo() {
      return (
        <React.Fragment>
          <AnalyticsMetricCard 
            title="Total Revenue" 
            value={125000} 
            prefix="$" 
            trend={12.5} 
            icon={
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            }
          />
          <AnalyticsMetricCard 
            title="Active Users" 
            value={1420} 
            trend={-3.2} 
            icon={
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="9" cy="7" r="4" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            }
          />
          <AnalyticsMetricCard 
            title="Conversion Rate" 
            value={4.8} 
            suffix="%" 
            trend={1.2} 
            icon={
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            }
          />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
