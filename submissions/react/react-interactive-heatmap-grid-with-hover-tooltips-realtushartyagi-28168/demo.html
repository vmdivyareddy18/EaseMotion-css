<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Heatmap Grid with Hover Tooltips</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 60px;
      background: #f3f4f6;
      display: flex; flex-direction: column; align-items: center; min-height: 100vh;
    }
    h2 { margin: 0 0 8px; color: #111827; }
    p { margin: 0 0 32px; color: #6b7280; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import HeatmapGrid from "./HeatmapGrid.jsx";

    // Generate random 7-column grid data
    const generateData = (days) => {
      const data = [];
      const now = new Date();
      for (let i = days; i >= 0; i--) {
        const d = new Date(now);
        d.setDate(d.getDate() - i);
        data.push({
          label: 'contributions',
          value: Math.floor(Math.random() * 25), // 0 to 24
          date: d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' })
        });
      }
      return data;
    };

    const mockData = generateData(48); // 49 cells total, 7x7 grid

    function Demo() {
      return (
        <div>
          <h2>Activity Heatmap</h2>
          <p>Hover over a cell to see the animated tooltip and scale effect.</p>
          <HeatmapGrid data={mockData} columns={7} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
