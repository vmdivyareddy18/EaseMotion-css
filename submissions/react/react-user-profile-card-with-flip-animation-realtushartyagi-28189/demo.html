<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>User Profile Card with Flip Animation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 60px;
      background: #f3f4f6;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import ProfileCardFlip from "./ProfileCardFlip.jsx";

    function Demo() {
      return (
        <>
          <ProfileCardFlip
            name="Alex Johnson"
            role="Frontend Developer"
            avatar="https://i.pravatar.cc/150?img=33"
            bio="Passionate about building beautiful, accessible interfaces and clean component systems."
            email="alex@example.com"
            stats={[
              { label: "Projects", value: "42" },
              { label: "Followers", value: "1.2k" },
              { label: "Stars", value: "389" },
            ]}
          />
          <ProfileCardFlip
            name="Priya Mehta"
            role="UX Designer"
            avatar="https://i.pravatar.cc/150?img=47"
            bio="Crafting intuitive user experiences with a focus on accessibility and inclusive design."
            email="priya@example.com"
            stats={[
              { label: "Projects", value: "28" },
              { label: "Followers", value: "980" },
              { label: "Stars", value: "214" },
            ]}
          />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
