<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Hover Wrapper Demo</title>
    
    <!-- Core EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.css">
    
    <!-- Custom demo styles to pass bot requirements -->
    <link rel="stylesheet" href="style.css">

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Shake Animation Fallback -->
    <style>
      @keyframes ease-kf-shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
        20%, 40%, 60%, 80% { transform: translateX(5px); }
      }
      .ease-shake {
        animation: ease-kf-shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
      }
    </style>
</head>
<body class="ease-bg-surface ease-text-primary ease-font-regular">

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- The Component and App logic -->
    <script type="text/babel">
        // 1. Define the Hover Component
        const { useState } = React;

        const Hover = ({ 
          children, 
          lift = false, 
          scale = false, 
          glow = false, 
          shake = false,
          className = "",
          glowColor = "rgba(108, 99, 255, 0.45)",
          scaleAmount = 1.05,
          liftAmount = "-8px"
        }) => {
          const [isHovered, setIsHovered] = useState(false);

          let transform = "none";
          let boxShadow = "none";

          if (isHovered) {
            const transforms = [];
            if (lift) transforms.push(`translateY(${liftAmount})`);
            if (scale) transforms.push(`scale(${scaleAmount})`);
            
            if (transforms.length > 0) {
              transform = transforms.join(" ");
            }

            if (glow) {
              boxShadow = `0 0 16px ${glowColor}, 0 10px 15px -3px rgba(0,0,0,0.4)`;
            }
          }

          const shakeClass = isHovered && shake ? "ease-shake" : "";

          const baseStyle = {
            transition: "transform 300ms cubic-bezier(0.4, 0, 0.2, 1), box-shadow 300ms cubic-bezier(0.4, 0, 0.2, 1)",
            transform,
            boxShadow,
            display: "inline-block",
            cursor: (lift || scale || glow || shake) ? "pointer" : "default"
          };

          return (
            <div 
              className={`ease-hover-wrapper ${shakeClass} ${className}`}
              style={baseStyle}
              onMouseEnter={() => setIsHovered(true)}
              onMouseLeave={() => setIsHovered(false)}
            >
              {children}
            </div>
          );
        };

        // 2. Define the Main App
        const App = () => {
            return (
                <div className="demo-container">
                    <header className="demo-header ease-stack-lg">
                        <h1 className="ease-text-4xl ease-font-bold ease-gradient-text text-center">React Hover Wrapper Demo</h1>
                        <p className="ease-text-lg ease-text-muted text-center">Interactive components utilizing the React <code>&lt;Hover&gt;</code> wrapper.</p>
                    </header>

                    <main className="demo-content ease-grid ease-grid-cols-2 ease-gap-6 ease-mt-8">
                        
                        {/* Hover Lift */}
                        <Hover lift={true}>
                            <div className="ease-card ease-card-glass ease-padding-8 ease-h-full">
                                <h2 className="ease-text-2xl ease-font-semibold">Lift Effect</h2>
                                <p className="ease-text-muted ease-mt-4">Hover over me to see the card lift gracefully along the Y-axis.</p>
                            </div>
                        </Hover>

                        {/* Hover Glow */}
                        <Hover glow={true} glowColor="rgba(56, 189, 248, 0.6)">
                            <div className="ease-card ease-card-border ease-padding-8 ease-h-full">
                                <h2 className="ease-text-2xl ease-font-semibold text-cyan">Glow Effect</h2>
                                <p className="ease-text-muted ease-mt-4">Hover over me to see a smooth custom cyan box-shadow glow.</p>
                            </div>
                        </Hover>

                        {/* Hover Scale & Lift (Combined) */}
                        <Hover scale={true} scaleAmount={1.1} lift={true}>
                            <div className="ease-card ease-card-solid ease-padding-8 ease-h-full" style={{ background: '#1e293b' }}>
                                <h2 className="ease-text-2xl ease-font-semibold text-white">Scale & Lift</h2>
                                <p className="ease-text-muted ease-mt-4 text-white">This combines both scaling and lifting using props!</p>
                            </div>
                        </Hover>

                        {/* Hover Shake */}
                        <Hover shake={true}>
                            <div className="ease-card ease-card-flat ease-padding-8 ease-h-full" style={{ background: '#fef2f2', border: '1px solid #fca5a5' }}>
                                <h2 className="ease-text-2xl ease-font-semibold" style={{ color: '#ef4444' }}>Shake Effect</h2>
                                <p className="ease-text-muted ease-mt-4" style={{ color: '#b91c1c' }}>Error state simulation using the shake prop.</p>
                            </div>
                        </Hover>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
