<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rich Text Editor Toolbar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .demo-container {
      width: 100%;
      max-width: 600px;
    }
    .demo-header {
      margin-bottom: 24px;
      text-align: center;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 8px 0;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
    }
    .editor-wrapper {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .editor-header {
      background: #f8fafc;
      padding: 12px 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    .editor-content {
      padding: 24px;
      min-height: 200px;
      color: #334155;
      line-height: 1.6;
      outline: none;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h1>Animated Toolbar</h1>
      <p>Hover over the buttons to see the spring-animated tooltips.</p>
    </div>
    <div id="root"></div>
  </div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useRef } = React;

    const ToolbarButton = ({ icon, tooltip, isActive, onClick }) => {
      const [isHovered, setIsHovered] = useState(false);
      
      return (
        <div 
          className="ease-toolbar-button-wrapper"
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          onFocus={() => setIsHovered(true)}
          onBlur={() => setIsHovered(false)}
        >
          <button
            type="button"
            className={`ease-toolbar-button ${isActive ? 'ease-toolbar-button-active' : ''}`}
            onClick={onClick}
            aria-label={tooltip}
            aria-pressed={isActive}
          >
            {icon}
          </button>
          
          <div 
            className={`ease-tooltip ${isHovered ? 'ease-tooltip-visible' : ''}`}
            role="tooltip"
            aria-hidden={!isHovered}
          >
            {tooltip}
          </div>
        </div>
      );
    };

    function RichTextEditorToolbar({ activeFormats = [], onFormatToggle, className = '' }) {
      const icons = {
        bold: (
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
            <path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path>
          </svg>
        ),
        italic: (
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <line x1="19" y1="4" x2="10" y2="4"></line>
            <line x1="14" y1="20" x2="5" y2="20"></line>
            <line x1="15" y1="4" x2="9" y2="20"></line>
          </svg>
        ),
        underline: (
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"></path>
            <line x1="4" y1="21" x2="20" y2="21"></line>
          </svg>
        ),
        strikethrough: (
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M17.3 4.9c-2.3-.6-4.4-1-6.2-.9-2.7.2-5.3 1.1-5.3 3.6 0 1.5 1.7 2.6 4.6 3.2l5.2 1.1c2.9.6 4.6 1.7 4.6 3.2 0 2.5-2.6 3.4-5.3 3.6-1.8.1-3.9-.3-6.2-.9"></path>
            <line x1="3" y1="12" x2="21" y2="12"></line>
          </svg>
        ),
        link: (
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>
          </svg>
        )
      };

      const handleToggle = (format) => {
        if (onFormatToggle) {
          onFormatToggle(format);
        }
      };

      const isFormatActive = (format) => activeFormats.includes(format);

      return (
        <div className={`ease-toolbar-container ${className}`} role="toolbar" aria-label="Text Formatting">
          <div className="ease-toolbar-group">
            <ToolbarButton icon={icons.bold} tooltip="Bold" isActive={isFormatActive('bold')} onClick={() => handleToggle('bold')} />
            <ToolbarButton icon={icons.italic} tooltip="Italic" isActive={isFormatActive('italic')} onClick={() => handleToggle('italic')} />
            <ToolbarButton icon={icons.underline} tooltip="Underline" isActive={isFormatActive('underline')} onClick={() => handleToggle('underline')} />
            <ToolbarButton icon={icons.strikethrough} tooltip="Strikethrough" isActive={isFormatActive('strikethrough')} onClick={() => handleToggle('strikethrough')} />
          </div>
          
          <div className="ease-toolbar-divider" aria-hidden="true" />
          
          <div className="ease-toolbar-group">
            <ToolbarButton icon={icons.link} tooltip="Insert Link" isActive={isFormatActive('link')} onClick={() => handleToggle('link')} />
          </div>
        </div>
      );
    }

    function Demo() {
      const [activeFormats, setActiveFormats] = useState(['bold']);

      const handleFormatToggle = (format) => {
        setActiveFormats(prev => {
          if (prev.includes(format)) {
            return prev.filter(f => f !== format);
          } else {
            return [...prev, format];
          }
        });
      };

      // Mock text styling based on active formats
      const contentStyle = {
        fontWeight: activeFormats.includes('bold') ? 'bold' : 'normal',
        fontStyle: activeFormats.includes('italic') ? 'italic' : 'normal',
        textDecoration: [
          activeFormats.includes('underline') ? 'underline' : '',
          activeFormats.includes('strikethrough') ? 'line-through' : ''
        ].filter(Boolean).join(' ') || 'none',
        color: activeFormats.includes('link') ? '#2563eb' : '#334155',
        cursor: activeFormats.includes('link') ? 'pointer' : 'text'
      };

      return (
        <div className="editor-wrapper">
          <div className="editor-header">
            <RichTextEditorToolbar 
              activeFormats={activeFormats} 
              onFormatToggle={handleFormatToggle} 
            />
          </div>
          <div 
            className="editor-content"
            contentEditable="true"
            style={contentStyle}
          >
            Start typing here... Notice how the toolbar buttons feel highly tactile when clicked, and how the tooltips pop into place with a spring curve!
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Demo />);
  </script>
</body>
</html>
