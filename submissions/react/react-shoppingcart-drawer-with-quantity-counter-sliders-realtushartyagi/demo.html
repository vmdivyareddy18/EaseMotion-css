<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ShoppingCart Drawer with Quantity Counter Sliders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .trigger-btn {
      background: #111827;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    .trigger-btn:hover {
      background: #374151;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import ShoppingCartDrawer from "./ShoppingCartDrawer.jsx";

    const dummyItems = [
      {
        id: "1",
        name: "Wireless Headphones",
        price: 99.99,
        quantity: 1,
        image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=150&q=80"
      },
      {
        id: "2",
        name: "Mechanical Keyboard",
        price: 129.50,
        quantity: 2,
        image: "https://images.unsplash.com/photo-1595225476474-87563907a212?w=150&q=80"
      },
      {
        id: "3",
        name: "Desk Mat",
        price: 24.00,
        quantity: 1,
        image: "https://images.unsplash.com/photo-1629851608492-f018e698379a?w=150&q=80"
      }
    ];

    function Demo() {
      const [isOpen, setIsOpen] = React.useState(false);

      return (
        <div>
          <button className="trigger-btn" onClick={() => setIsOpen(true)}>
            Open Shopping Cart
          </button>
          
          <ShoppingCartDrawer 
            isOpen={isOpen} 
            onClose={() => setIsOpen(false)}
            items={dummyItems}
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
