<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Infinite Scroll Feed Loader — Preview</title>

  <!-- React 18 via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel for JSX in-browser transform -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
    }

    /* ── Design tokens ─────────────────────────────────── */
    :root {
      --isl-bg-page: #0f1117;
      --isl-bg-card: #1a1d27;
      --isl-bg-card-hover: #1f2335;
      --isl-border: rgba(255, 255, 255, 0.07);
      --isl-accent: #7c6af7;
      --isl-accent-light: #9b8eff;
      --isl-accent-glow: rgba(124, 106, 247, 0.25);
      --isl-text-primary: #e6e9f5;
      --isl-text-secondary: #7b82a0;
      --isl-text-muted: #4a5070;
      --isl-skeleton-base: #1e2133;
      --isl-skeleton-shine: #272b45;
      --isl-radius-card: 16px;
      --isl-radius-pill: 999px;
      --isl-shadow-card: 0 2px 20px rgba(0, 0, 0, 0.4);
      --isl-shadow-hover: 0 8px 40px rgba(124, 106, 247, 0.18);
      --isl-transition: 260ms cubic-bezier(0.4, 0, 0.2, 1);
      --isl-shimmer-duration: 1.6s;
    }

    /* ── Page wrapper ──────────────────────────────────── */
    .isl-wrapper {
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
      background: var(--isl-bg-page);
      min-height: 100vh;
      color: var(--isl-text-primary);
    }

    /* ── Heading ───────────────────────────────────────── */
    .isl-heading {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--isl-text-primary);
      margin: 0 0 1.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--isl-border);
    }
    .isl-heading svg { color: var(--isl-accent); flex-shrink: 0; }

    /* ── Feed list ─────────────────────────────────────── */
    .isl-feed-list {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    /* ── Feed card ─────────────────────────────────────── */
    .isl-feed-card {
      background: var(--isl-bg-card);
      border: 1px solid var(--isl-border);
      border-radius: var(--isl-radius-card);
      padding: 1.25rem 1.375rem;
      box-shadow: var(--isl-shadow-card);
      cursor: default;
      transition:
        transform var(--isl-transition),
        box-shadow var(--isl-transition),
        border-color var(--isl-transition),
        background var(--isl-transition);
      animation: isl-card-enter 400ms var(--enter-delay, 0ms) both cubic-bezier(0.22, 1, 0.36, 1);
    }
    .isl-feed-card:hover {
      background: var(--isl-bg-card-hover);
      border-color: rgba(124, 106, 247, 0.3);
      box-shadow: var(--isl-shadow-hover);
      transform: translateY(-2px);
    }
    @keyframes isl-card-enter {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card header ───────────────────────────────────── */
    .isl-feed-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.875rem;
    }
    .isl-feed-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--isl-border);
      flex-shrink: 0;
      transition: border-color var(--isl-transition);
    }
    .isl-feed-card:hover .isl-feed-avatar { border-color: var(--isl-accent); }
    .isl-feed-meta { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; min-width: 0; }
    .isl-feed-author { font-size: 0.9rem; font-weight: 600; color: var(--isl-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .isl-feed-timestamp { font-size: 0.75rem; color: var(--isl-text-muted); }
    .isl-feed-tag {
      font-size: 0.7rem; font-weight: 600;
      padding: 0.2em 0.65em;
      border-radius: var(--isl-radius-pill);
      background: var(--isl-accent-glow);
      color: var(--isl-accent-light);
      letter-spacing: 0.02em;
      white-space: nowrap; flex-shrink: 0;
    }

    /* ── Card body ─────────────────────────────────────── */
    .isl-feed-body { margin: 0 0 1rem; font-size: 0.895rem; line-height: 1.65; color: var(--isl-text-secondary); }

    /* ── Card footer ───────────────────────────────────── */
    .isl-feed-footer {
      display: flex; align-items: center; gap: 0.5rem;
      border-top: 1px solid var(--isl-border);
      padding-top: 0.75rem;
    }
    .isl-feed-action {
      display: inline-flex; align-items: center; gap: 0.375rem;
      padding: 0.35rem 0.75rem;
      border: none; border-radius: var(--isl-radius-pill);
      background: transparent;
      color: var(--isl-text-muted);
      font-size: 0.8rem; cursor: pointer;
      transition: background var(--isl-transition), color var(--isl-transition), transform 160ms ease;
    }
    .isl-feed-action:hover {
      background: var(--isl-accent-glow);
      color: var(--isl-accent-light);
      transform: scale(1.06);
    }
    .isl-feed-action:active { transform: scale(0.95); }

    /* ── Shimmer card ──────────────────────────────────── */
    .isl-shimmer-card {
      background: var(--isl-bg-card);
      border: 1px solid var(--isl-border);
      border-radius: var(--isl-radius-card);
      padding: 1.25rem 1.375rem;
      box-shadow: var(--isl-shadow-card);
      animation: isl-card-enter 300ms both cubic-bezier(0.22, 1, 0.36, 1);
    }
    .isl-shimmer {
      background: linear-gradient(
        90deg,
        var(--isl-skeleton-base) 25%,
        var(--isl-skeleton-shine) 50%,
        var(--isl-skeleton-base) 75%
      );
      background-size: 400% 100%;
      animation: isl-shimmer-wave var(--isl-shimmer-duration) ease-in-out infinite;
      border-radius: 6px;
    }
    @keyframes isl-shimmer-wave {
      0%   { background-position: 100% 0; }
      100% { background-position: -100% 0; }
    }
    .isl-shimmer-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.875rem; }
    .isl-shimmer-avatar { width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0; }
    .isl-shimmer-header-text { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
    .isl-shimmer-name { height: 13px; width: 40%; }
    .isl-shimmer-sub  { height: 10px; width: 25%; }
    .isl-shimmer-badge { width: 64px; height: 22px; border-radius: var(--isl-radius-pill); flex-shrink: 0; }
    .isl-shimmer-body { display: flex; flex-direction: column; gap: 0.45rem; margin-bottom: 0.875rem; }
    .isl-shimmer-line { height: 12px; border-radius: 6px; width: 100%; }
    .isl-shimmer-line--short { width: 65%; }
    .isl-shimmer-footer { display: flex; gap: 0.5rem; padding-top: 0.75rem; border-top: 1px solid var(--isl-border); }
    .isl-shimmer-pill { height: 28px; width: 72px; border-radius: var(--isl-radius-pill); }

    /* ── Sentinel ──────────────────────────────────────── */
    .isl-sentinel { height: 1px; width: 100%; pointer-events: none; }

    /* ── Error state ───────────────────────────────────── */
    .isl-error {
      display: flex; flex-direction: column; align-items: center; gap: 0.75rem;
      padding: 1.5rem; border-radius: var(--isl-radius-card);
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5; font-size: 0.875rem; text-align: center;
    }
    .isl-retry-btn {
      padding: 0.45rem 1.25rem; border-radius: var(--isl-radius-pill);
      border: 1px solid rgba(239,68,68,0.5); background: rgba(239,68,68,0.15);
      color: #fca5a5; font-size: 0.8rem; cursor: pointer;
      transition: background var(--isl-transition), transform 160ms ease;
    }
    .isl-retry-btn:hover { background: rgba(239,68,68,0.3); transform: scale(1.04); }

    /* ── End-of-feed banner ────────────────────────────── */
    .isl-end-banner {
      display: flex; align-items: center; justify-content: center; gap: 0.75rem;
      padding: 1.5rem 0;
      color: var(--isl-text-muted); font-size: 0.8rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      animation: isl-card-enter 400ms both;
    }
    .isl-end-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--isl-text-muted); }

    /* ── Reduced motion ────────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .isl-feed-card, .isl-shimmer-card, .isl-end-banner { animation: none; }
      .isl-shimmer { animation: none; background: var(--isl-skeleton-base); }
      .isl-feed-card:hover, .isl-feed-action:hover { transform: none; }
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 600px) {
      .isl-wrapper { padding: 1.25rem 0.75rem 3rem; }
      .isl-feed-card, .isl-shimmer-card { padding: 1rem 1.1rem; border-radius: 12px; }
      .isl-feed-action span { display: none; }
      .isl-feed-action { padding: 0.4rem 0.55rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Mock data ─────────────────────────────────────── */
    const AVATARS = [
      "https://i.pravatar.cc/56?img=1",
      "https://i.pravatar.cc/56?img=5",
      "https://i.pravatar.cc/56?img=9",
      "https://i.pravatar.cc/56?img=14",
      "https://i.pravatar.cc/56?img=22",
      "https://i.pravatar.cc/56?img=33",
      "https://i.pravatar.cc/56?img=47",
      "https://i.pravatar.cc/56?img=60",
    ];
    const TAGS = ["React","CSS","Animation","UX","Design","Frontend","JavaScript","TypeScript","OpenSource","WebDev"];
    const BODIES = [
      "Just shipped a new micro-interaction that feels incredibly smooth. Details in the thread below 🧵",
      "Reminder: good animations tell stories. Bad animations just waste time. Know the difference.",
      "Dark mode + glassmorphism + subtle shimmer = chef's kiss UI. Are you using all three?",
      "Infinite scroll done right means the user never feels the load. They just keep flowing.",
      "CSS-only shimmer is often underrated. No JS overhead, pure GPU compositing.",
      "The Intersection Observer API is criminally underused. Stop polling. Start observing.",
      "Component isolation matters. If you can't copy-paste it, it's too coupled.",
      "Accessibility isn't optional. Check prefers-reduced-motion before every animation you ship.",
      "EaseMotion CSS makes it trivial to add polished motion without the bundle bloat.",
      "Good defaults + escape hatches = the perfect API surface for any component.",
    ];

    const defaultFetchItems = async (start, count) => {
      await new Promise(r => setTimeout(r, 0));
      return Array.from({ length: count }, (_, i) => {
        const idx = start + i;
        return {
          id: idx + 1,
          author: `User ${idx + 1}`,
          avatar: AVATARS[idx % AVATARS.length],
          tag: TAGS[idx % TAGS.length],
          body: BODIES[idx % BODIES.length],
          likes: Math.floor(Math.random() * 420) + 10,
          comments: Math.floor(Math.random() * 60),
          timestamp: `${Math.floor(Math.random() * 59) + 1}m ago`,
        };
      });
    };

    /* ── ShimmerCard ───────────────────────────────────── */
    const ShimmerCard = () => (
      <div className="isl-shimmer-card" role="status" aria-label="Loading content">
        <div className="isl-shimmer-header">
          <div className="isl-shimmer isl-shimmer-avatar" />
          <div className="isl-shimmer-header-text">
            <div className="isl-shimmer isl-shimmer-line isl-shimmer-name" />
            <div className="isl-shimmer isl-shimmer-line isl-shimmer-sub" />
          </div>
          <div className="isl-shimmer isl-shimmer-badge" />
        </div>
        <div className="isl-shimmer-body">
          <div className="isl-shimmer isl-shimmer-line" />
          <div className="isl-shimmer isl-shimmer-line" />
          <div className="isl-shimmer isl-shimmer-line isl-shimmer-line--short" />
        </div>
        <div className="isl-shimmer-footer">
          <div className="isl-shimmer isl-shimmer-pill" />
          <div className="isl-shimmer isl-shimmer-pill" />
          <div className="isl-shimmer isl-shimmer-pill" />
        </div>
      </div>
    );

    /* ── FeedCard ──────────────────────────────────────── */
    const FeedCard = ({ item, style }) => (
      <article className="isl-feed-card" style={style} aria-label={`Post by ${item.author}`}>
        <header className="isl-feed-header">
          <img className="isl-feed-avatar" src={item.avatar} alt={`Avatar of ${item.author}`} width={44} height={44} loading="lazy" />
          <div className="isl-feed-meta">
            <span className="isl-feed-author">{item.author}</span>
            <span className="isl-feed-timestamp">{item.timestamp}</span>
          </div>
          <span className="isl-feed-tag">#{item.tag}</span>
        </header>
        <p className="isl-feed-body">{item.body}</p>
        <footer className="isl-feed-footer">
          <button className="isl-feed-action" aria-label={`Like post by ${item.author}`}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
            </svg>
            <span>{item.likes}</span>
          </button>
          <button className="isl-feed-action" aria-label={`Comment on post by ${item.author}`}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
            </svg>
            <span>{item.comments}</span>
          </button>
          <button className="isl-feed-action" aria-label={`Share post by ${item.author}`}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <circle cx="18" cy="5" r="3" /><circle cx="6" cy="12" r="3" /><circle cx="18" cy="19" r="3" />
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
            </svg>
          </button>
        </footer>
      </article>
    );

    /* ── EndOfFeedBanner ───────────────────────────────── */
    const EndOfFeedBanner = () => (
      <div className="isl-end-banner" role="status">
        <span className="isl-end-dot" />
        <span>You've reached the end of the feed</span>
        <span className="isl-end-dot" />
      </div>
    );

    /* ── InfiniteScrollFeedLoader ──────────────────────── */
    const InfiniteScrollFeedLoader = ({
      batchSize = 5,
      skeletonCount = 3,
      maxItems = 50,
      loadDelay = 1400,
      fetchItems,
    }) => {
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(false);
      const [hasMore, setHasMore] = useState(true);
      const [error, setError] = useState(null);
      const sentinelRef = useRef(null);
      const loadingRef = useRef(false);
      const dataSource = fetchItems ?? defaultFetchItems;

      const triggerLoad = useCallback(async (startIndex) => {
        if (loadingRef.current) return;
        loadingRef.current = true;
        setLoading(true);
        setError(null);
        try {
          const [data] = await Promise.all([
            dataSource(startIndex, batchSize),
            new Promise(r => setTimeout(r, loadDelay)),
          ]);
          setItems(prev => {
            const combined = [...prev, ...data];
            if (combined.length >= maxItems) { setHasMore(false); return combined.slice(0, maxItems); }
            return combined;
          });
        } catch {
          setError("Failed to load more posts. Please try again.");
        } finally {
          loadingRef.current = false;
          setLoading(false);
        }
      }, [batchSize, maxItems, loadDelay, dataSource]);

      useEffect(() => { triggerLoad(0); }, []);

      useEffect(() => {
        if (!hasMore) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !loadingRef.current) {
            setItems(current => { triggerLoad(current.length); return current; });
          }
        }, { threshold: 0.1, rootMargin: "0px 0px 120px 0px" });
        const el = sentinelRef.current;
        if (el) observer.observe(el);
        return () => observer.disconnect();
      }, [hasMore, triggerLoad]);

      return (
        <section className="isl-wrapper" aria-label="Infinite Scroll Feed">
          <h1 className="isl-heading">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.08 6.08l1.91-1.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 15.92z" />
            </svg>
            Live Feed
          </h1>

          <div className="isl-feed-list">
            {items.map((item, idx) => (
              <FeedCard key={item.id} item={item} style={{ "--enter-delay": `${(idx % batchSize) * 60}ms` }} />
            ))}
            {loading && Array.from({ length: skeletonCount }, (_, i) => <ShimmerCard key={`sk-${i}`} />)}
            {error && (
              <div className="isl-error" role="alert">
                <span>{error}</span>
                <button className="isl-retry-btn" onClick={() => triggerLoad(items.length)}>Retry</button>
              </div>
            )}
          </div>

          {hasMore && !error && <div ref={sentinelRef} className="isl-sentinel" aria-hidden="true" />}
          {!hasMore && <EndOfFeedBanner />}
        </section>
      );
    };

    /* ── Mount ─────────────────────────────────────────── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<InfiniteScrollFeedLoader batchSize={5} skeletonCount={3} maxItems={50} loadDelay={1400} />);
  </script>
</body>
</html>
