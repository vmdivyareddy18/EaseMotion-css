<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>useFLIP Hook Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useLayoutEffect } = React;

    // useFLIP Hook Implementation
    function useFLIP(listRef, dependencies) {
      const rects = useRef(new Map());

      useLayoutEffect(() => {
        const list = listRef.current;
        if (!list) return;

        const children = Array.from(list.children);

        // LAST: get new positions
        children.forEach((child) => {
          const key = child.dataset.key;
          if (!key) return;
          
          const newRect = child.getBoundingClientRect();
          const oldRect = rects.current.get(key);

          if (oldRect) {
            const deltaX = oldRect.left - newRect.left;
            const deltaY = oldRect.top - newRect.top;

            if (deltaX !== 0 || deltaY !== 0) {
              // INVERT: snap back to old position
              child.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
              child.style.transition = 'none';

              // PLAY: smooth glide to new position
              requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                  child.style.transform = '';
                  child.style.transition = 'transform 0.4s cubic-bezier(0.25, 1, 0.5, 1)';
                });
              });
            }
          }
        });

        // FIRST: update cache for the next render
        rects.current.clear();
        children.forEach((child) => {
          const key = child.dataset.key;
          if (key) {
            rects.current.set(key, child.getBoundingClientRect());
          }
        });
      }, dependencies);
    }

    // App Component
    function App() {
      const [items, setItems] = useState([1, 2, 3, 4, 5, 6, 7, 8, 9]);
      const listRef = useRef(null);

      // Attach the hook
      useFLIP(listRef, [items]);

      const shuffle = () => {
        setItems(prevItems => {
          const newItems = [...prevItems];
          for (let i = newItems.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newItems[i], newItems[j]] = [newItems[j], newItems[i]];
          }
          return newItems;
        });
      };

      return (
        <div>
          <div className="ease-flip-controls-viidhii19">
            <button onClick={shuffle} className="ease-flip-button-viidhii19">
              Shuffle Cards
            </button>
          </div>
          <div ref={listRef} className="ease-flip-grid-viidhii19">
            {items.map(item => (
              <div 
                key={item} 
                data-key={item} 
                className="ease-flip-card-viidhii19"
              >
                {item}
              </div>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
