<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Hover Button Demo</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useRef, useState } = React;

    const MagneticButton = ({ children, className = '', strength = 30 }) => {
      const buttonRef = useRef(null);
      const [position, setPosition] = useState({ x: 0, y: 0 });

      const handleMouseMove = (e) => {
        if (!buttonRef.current) return;
        
        const { left, top, width, height } = buttonRef.current.getBoundingClientRect();
        const centerX = left + width / 2;
        const centerY = top + height / 2;
        
        const deltaX = e.clientX - centerX;
        const deltaY = e.clientY - centerY;
        
        const x = (deltaX / width) * strength;
        const y = (deltaY / height) * strength;
        
        setPosition({ x, y });
      };

      const handleMouseLeave = () => {
        setPosition({ x: 0, y: 0 });
      };

      return (
        <div
          ref={buttonRef}
          className={`ease-magnetic-wrapper ${className}`}
          onMouseMove={handleMouseMove}
          onMouseLeave={handleMouseLeave}
        >
          <div
            className="ease-magnetic-content"
            style={{ transform: `translate(${position.x}px, ${position.y}px)` }}
          >
            {children}
          </div>
        </div>
      );
    };

    const App = () => {
      return (
        <MagneticButton strength={30}>
          <div className="ease-btn ease-btn-primary ease-btn-lg ease-btn-pill">
            Magnetic CTA
          </div>
        </MagneticButton>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
