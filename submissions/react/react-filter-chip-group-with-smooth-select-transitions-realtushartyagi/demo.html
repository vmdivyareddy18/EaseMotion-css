<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Filter Chip Group Component</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and Babel for standalone demo -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .demo-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      max-width: 600px;
      width: 90%;
    }
    .demo-title { margin-top: 0; margin-bottom: 24px; color: #111827; }
    .demo-output {
      margin-top: 32px;
      padding: 16px;
      background: #f3f4f6;
      border-radius: 8px;
      font-family: monospace;
      color: #4b5563;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Load the Component -->
  <script type="text/babel" src="./FilterChipGroup.jsx"></script>
  
  <script type="text/babel">
    const { useState } = React;
    
    // Inline fallback if component import fails in standard HTML without bundler
    const FilterChipGroupComponent = window.FilterChipGroup || (({ options = [], multiSelect = true, initialSelected = [], onChange }) => {
      const [selectedIds, setSelectedIds] = React.useState(initialSelected);

      const handleToggle = (id) => {
        let newSelected;
        if (multiSelect) {
          if (selectedIds.includes(id)) {
            newSelected = selectedIds.filter((item) => item !== id);
          } else {
            newSelected = [...selectedIds, id];
          }
        } else {
          newSelected = selectedIds.includes(id) ? [] : [id];
        }
        setSelectedIds(newSelected);
        if (onChange) onChange(newSelected);
      };

      return (
        <div className="ease-filter-chip-group ease-staggered-group">
          {options.map((option, index) => (
            <div key={option.id} className="ease-staggered-item" style={{ '--stagger-delay': `${index * 0.05}s` }}>
              <button
                className={`ease-filter-chip ${selectedIds.includes(option.id) ? 'ease-chip-selected' : ''}`}
                onClick={() => handleToggle(option.id)}
                aria-pressed={selectedIds.includes(option.id)}
              >
                <svg className={`ease-chip-check ${selectedIds.includes(option.id) ? 'ease-check-visible' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                <span className="ease-chip-label">{option.label}</span>
              </button>
            </div>
          ))}
        </div>
      );
    });

    const App = () => {
      const [selectedFilters, setSelectedFilters] = useState(['react']);
      
      const filterOptions = [
        { id: 'react', label: 'React' },
        { id: 'vue', label: 'Vue.js' },
        { id: 'svelte', label: 'Svelte' },
        { id: 'css', label: 'CSS Animations' },
        { id: 'motion', label: 'Framer Motion' },
        { id: 'tailwind', label: 'Tailwind CSS' },
        { id: 'accessibility', label: 'Accessibility (A11y)' }
      ];

      return (
        <div className="demo-container">
          <h2 className="demo-title">Select Technologies</h2>
          
          <FilterChipGroupComponent 
            options={filterOptions}
            multiSelect={true}
            initialSelected={['react']}
            onChange={(selected) => setSelectedFilters(selected)}
          />

          <div className="demo-output">
            <strong>Active Filters:</strong><br/>
            {selectedFilters.length > 0 ? JSON.stringify(selectedFilters, null, 2) : 'None selected'}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
