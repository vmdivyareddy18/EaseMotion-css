<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audio Player Widget Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0b1020, #1c2a52);
        color: #f8f9ff;
        padding: 24px;
      }

      .demo-shell {
        width: min(100%, 520px);
      }
    </style>
  </head>
  <body>
    <div class="demo-shell">
      <div class="audio-player-widget ease-fade-in">
        <div class="audio-player-widget__card ease-hover-lift">
          <div class="audio-player-widget__header">
            <div>
              <p class="audio-player-widget__eyebrow">Now playing</p>
              <h3 class="audio-player-widget__title">Neon Nights</h3>
              <p class="audio-player-widget__artist">Astra Lane</p>
            </div>
            <button type="button" class="audio-player-widget__control-button">▶</button>
          </div>

          <div class="audio-player-widget__waveform" aria-label="Animated waveform preview">
            <span class="audio-player-widget__bar is-playing" style="height: 28%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 46%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 58%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 72%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 54%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 64%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 40%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 83%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 54%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 68%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 30%"></span>
            <span class="audio-player-widget__bar is-playing" style="height: 48%"></span>
          </div>

          <div class="audio-player-widget__meta">
            <span class="audio-player-widget__status">Playing</span>
            <span class="audio-player-widget__time">1:24 / 3:40</span>
          </div>

          <input type="range" min="0" max="220" value="84" class="audio-player-widget__range" />

          <div class="audio-player-widget__footer">
            <span class="audio-player-widget__progress-label">Tap to seek</span>
            <span class="audio-player-widget__progress-value">38%</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
