<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - React Animated Dark Mode Toggle</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import DarkModeToggle from './DarkModeToggle.jsx';

        const { useState, useEffect } = React;

        const App = () => {
            const [theme, setTheme] = useState('light');

            useEffect(() => {
                // Apply theme to body
                if (theme === 'dark') {
                    document.body.classList.add('theme-dark');
                } else {
                    document.body.classList.remove('theme-dark');
                }
            }, [theme]);

            const handleToggle = (newTheme) => {
                setTheme(newTheme);
            };

            return (
                <div className="demo-card ease-slide-up">
                    <h1 className="demo-title">Theme Switcher</h1>
                    <p className="demo-desc">
                        Click the button below to toggle between light and dark modes. 
                        Notice the satisfying rotational zoom animation on the icon and the global CSS transitions.
                    </p>
                    
                    <div style={{ display: 'flex', gap: '24px', alignItems: 'center', marginTop: '1rem' }}>
                        <DarkModeToggle initialTheme={theme} onToggle={handleToggle} size="sm" />
                        <DarkModeToggle initialTheme={theme} onToggle={handleToggle} size="md" />
                        <DarkModeToggle initialTheme={theme} onToggle={handleToggle} size="lg" />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
