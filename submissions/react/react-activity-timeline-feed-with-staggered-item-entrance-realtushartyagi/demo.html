<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Activity Timeline Feed Component</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <!-- Load React and Babel for standalone demo -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .demo-container {
      width: 100%;
      max-width: 600px;
    }
    .demo-title { margin-top: 0; margin-bottom: 32px; color: #111827; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Load the Component -->
  <script type="text/babel" src="./ActivityTimeline.jsx"></script>
  
  <script type="text/babel">
    // Inline fallback if component import fails in standard HTML without bundler
    const ActivityTimelineComponent = window.ActivityTimeline || (({ activities = [] }) => {
      const { useEffect, useState } = React;
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        setIsVisible(true);
      }, []);

      return (
        <div className={`ease-activity-timeline ${isVisible ? 'is-visible' : ''}`}>
          {activities.length === 0 ? (
            <div className="ease-timeline-empty">No activity to display.</div>
          ) : (
            activities.map((activity, idx) => (
              <div key={activity.id || idx} className="ease-timeline-item ease-staggered-entrance" style={{ '--stagger-delay': `${idx * 0.15}s` }}>
                <div className="ease-timeline-indicator">
                  <div className="ease-timeline-line"></div>
                  <div className={`ease-timeline-dot ${activity.type || 'default'}`}></div>
                </div>
                <div className="ease-timeline-content ease-hover-lift">
                  <div className="ease-timeline-header">
                    <span className="ease-timeline-title">{activity.title}</span>
                    <span className="ease-timeline-time">{activity.timestamp}</span>
                  </div>
                  <p className="ease-timeline-description">{activity.description}</p>
                  {activity.user && (
                    <div className="ease-timeline-meta">
                      <div className="ease-avatar">{activity.user.charAt(0)}</div>
                      <span className="ease-user-name">{activity.user}</span>
                    </div>
                  )}
                </div>
              </div>
            ))
          )}
        </div>
      );
    });

    const App = () => {
      const timelineData = [
        {
          id: 1,
          type: 'commit',
          title: 'Pushed to main branch',
          description: 'Merged pull request #28075 from feature/timeline-feed. Includes new React component and CSS animations.',
          timestamp: '2 mins ago',
          user: 'Alex Chen'
        },
        {
          id: 2,
          type: 'deploy',
          title: 'Deployment Successful',
          description: 'Production build finished. Environment v4.2.0 is now live on Vercel.',
          timestamp: '1 hour ago',
          user: 'System Bot'
        },
        {
          id: 3,
          type: 'comment',
          title: 'Review Requested',
          description: 'Sarah requested a review on Pull Request #28072 regarding the new typography updates.',
          timestamp: '3 hours ago',
          user: 'Sarah Jenkins'
        },
        {
          id: 4,
          type: 'alert',
          title: 'High Memory Usage',
          description: 'Warning: Server instance US-East-1 experienced a memory spike exceeding 90%.',
          timestamp: 'Yesterday',
          user: 'Monitoring Agent'
        }
      ];

      return (
        <div className="demo-container">
          <h2 className="demo-title">Project Activity</h2>
          <ActivityTimelineComponent activities={timelineData} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
