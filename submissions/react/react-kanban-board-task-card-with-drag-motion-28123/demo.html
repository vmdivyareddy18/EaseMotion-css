<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Kanban Board Task Card Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }

    .demo-board {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef } = React;

    const PRIORITY = {
      high:   { label: 'High',   color: '#ef4444' },
      medium: { label: 'Medium', color: '#f59e0b' },
      low:    { label: 'Low',    color: '#10b981' },
    };

    const Tag = ({ label }) => <span className="ease-kb-tag">{label}</span>;

    const Avatar = ({ name, color }) => {
      const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      return <div className="ease-kb-avatar" style={{ backgroundColor: color }} title={name}>{initials}</div>;
    };

    const KanbanCard = ({ id, title, description, priority = 'medium', tags = [], assignees = [], dueDate, progress = 0, onDragStart }) => {
      const [isDragging, setIsDragging] = useState(false);
      const [isHovered, setIsHovered]   = useState(false);
      const cardRef = useRef(null);
      const cfg = PRIORITY[priority] || PRIORITY.medium;

      return (
        <div
          ref={cardRef}
          className={`ease-kb-card ${isDragging ? 'is-dragging' : ''} ${isHovered ? 'is-hovered' : ''}`}
          draggable
          onDragStart={(e) => {
            setIsDragging(true);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', id);
            if (onDragStart) onDragStart(id);
          }}
          onDragEnd={() => setIsDragging(false)}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          role="listitem"
        >
          <div className="ease-kb-drag-handle" aria-hidden="true"><span /><span /><span /></div>

          <div className="ease-kb-card-header">
            <span className="ease-kb-priority" style={{ backgroundColor: `${cfg.color}20`, color: cfg.color, borderColor: `${cfg.color}40` }}>
              {cfg.label}
            </span>
            {dueDate && (
              <span className="ease-kb-due-date">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                {dueDate}
              </span>
            )}
          </div>

          <h3 className="ease-kb-card-title">{title}</h3>
          {description && <p className="ease-kb-card-desc">{description}</p>}

          {tags.length > 0 && <div className="ease-kb-tags">{tags.map(t => <Tag key={t} label={t} />)}</div>}

          {progress > 0 && (
            <div className="ease-kb-progress-wrap">
              <div className="ease-kb-progress-bar">
                <div className="ease-kb-progress-fill" style={{ width: `${Math.min(progress, 100)}%` }} />
              </div>
              <span className="ease-kb-progress-label">{progress}%</span>
            </div>
          )}

          {assignees.length > 0 && (
            <div className="ease-kb-card-footer">
              <div className="ease-kb-avatars">
                {assignees.map(a => <Avatar key={a.name} name={a.name} color={a.color} />)}
              </div>
            </div>
          )}
        </div>
      );
    };

    const KanbanColumn = ({ title, cards, onDrop }) => {
      const [isTarget, setIsTarget] = useState(false);

      return (
        <div
          className={`ease-kb-column ${isTarget ? 'is-drop-target' : ''}`}
          onDragOver={(e) => { e.preventDefault(); setIsTarget(true); }}
          onDragLeave={() => setIsTarget(false)}
          onDrop={(e) => {
            e.preventDefault();
            setIsTarget(false);
            const id = e.dataTransfer.getData('text/plain');
            if (onDrop) onDrop(id, title);
          }}
        >
          <div className="ease-kb-column-title">
            {title}
            <span className="ease-kb-column-count">{cards.length}</span>
          </div>
          <div className="ease-kb-cards-list" role="list">
            {cards.map(card => <KanbanCard key={card.id} {...card} />)}
          </div>
        </div>
      );
    };

    const INITIAL_BOARD = {
      'To Do': [
        { id: 'c1', title: 'Design new landing page', description: 'Create wireframes and high-fidelity mockups for the marketing redesign.', priority: 'high', tags: ['Design', 'Marketing'], assignees: [{ name: 'Alice Cooper', color: '#8b5cf6' }, { name: 'Bob Smith', color: '#3b82f6' }], dueDate: 'Jul 10', progress: 0 },
        { id: 'c2', title: 'Set up CI/CD pipeline', description: 'Configure GitHub Actions for automated testing and deployment.', priority: 'medium', tags: ['DevOps'], assignees: [{ name: 'Charlie Davis', color: '#10b981' }], dueDate: 'Jul 15', progress: 0 },
      ],
      'In Progress': [
        { id: 'c3', title: 'Build authentication service', description: 'Implement JWT-based auth with refresh token rotation.', priority: 'high', tags: ['Backend', 'Security'], assignees: [{ name: 'Diana Prince', color: '#f43f5e' }], dueDate: 'Jul 8', progress: 65 },
      ],
      'Done': [
        { id: 'c4', title: 'Update project README', description: 'Add installation guide and contribution instructions.', priority: 'low', tags: ['Docs'], assignees: [{ name: 'Ethan Hunt', color: '#f59e0b' }], dueDate: 'Jul 1', progress: 100 },
      ],
    };

    const App = () => {
      const [board, setBoard] = useState(INITIAL_BOARD);

      const handleDrop = (cardId, targetColumn) => {
        setBoard(prev => {
          const next = {};
          let movedCard = null;
          // Remove from source
          for (const col in prev) {
            next[col] = prev[col].filter(c => {
              if (c.id === cardId) { movedCard = c; return false; }
              return true;
            });
          }
          // Add to target
          if (movedCard) next[targetColumn] = [...next[targetColumn], movedCard];
          return next;
        });
      };

      return (
        <div className="demo-board">
          {Object.entries(board).map(([col, cards]) => (
            <KanbanColumn key={col} title={col} cards={cards} onDrop={handleDrop} />
          ))}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
