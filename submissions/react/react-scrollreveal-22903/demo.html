<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React ScrollReveal Demo</title>
    
    <!-- Core EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.css">
    
    <!-- Custom demo styles to pass bot requirements -->
    <link rel="stylesheet" href="style.css">

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="ease-bg-surface ease-text-primary ease-font-regular">

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- The Component and App logic -->
    <script type="text/babel">
        // 1. Define the ScrollReveal Component
        const { useState, useEffect, useRef } = React;

        const ScrollReveal = ({ 
          children, 
          animation = "ease-fade-in", 
          duration = "ease-duration-normal",
          delay = "",
          curve = "ease-curve-ease",
          threshold = 0.2,
          className = "" 
        }) => {
          const [isVisible, setIsVisible] = useState(false);
          const domRef = useRef();

          useEffect(() => {
            const observer = new IntersectionObserver(entries => {
              entries.forEach(entry => {
                if (entry.isIntersecting) {
                  setIsVisible(true);
                  observer.unobserve(entry.target);
                }
              });
            }, { threshold });
            
            const currentRef = domRef.current;
            if (currentRef) observer.observe(currentRef);
            
            return () => {
              if (currentRef) observer.unobserve(currentRef);
            };
          }, [threshold]);

          // Prevent FOUC by hiding until visible
          const visibilityClass = isVisible ? "" : "ease-opacity-0";
          const animationClasses = isVisible ? `${animation} ${duration} ${delay} ${curve}` : "";

          return (
            <div ref={domRef} className={`${visibilityClass} ${animationClasses} ${className}`}>
              {children}
            </div>
          );
        };

        // 2. Define the Main App
        const App = () => {
            return (
                <div className="demo-container">
                    <header className="demo-header ease-stack-lg">
                        <h1 className="ease-text-4xl ease-font-bold ease-gradient-text text-center">React ScrollReveal Demo</h1>
                        <p className="ease-text-lg ease-text-muted text-center">Scroll down to see the IntersectionObserver trigger EaseMotion animations.</p>
                        <div className="scroll-indicator ease-bounce">↓ Scroll Down ↓</div>
                    </header>

                    <main className="demo-content">
                        {/* Reveal 1: Slide Up */}
                        <div className="spacer"></div>
                        <ScrollReveal animation="ease-slide-up" duration="ease-duration-slow">
                            <div className="ease-card ease-card-glass ease-padding-8">
                                <h2 className="ease-text-2xl ease-font-semibold">Seamless Slide Up</h2>
                                <p className="ease-text-muted">This card reveals itself automatically as soon as 20% of it enters the viewport!</p>
                            </div>
                        </ScrollReveal>

                        {/* Reveal 2: Zoom In with a Delay */}
                        <div className="spacer"></div>
                        <ScrollReveal animation="ease-zoom-in" duration="ease-duration-normal" delay="ease-delay-200">
                            <div className="ease-card ease-card-border ease-padding-8">
                                <h2 className="ease-text-2xl ease-font-semibold">Zoom In with Delay</h2>
                                <p className="ease-text-muted">This element pops in smoothly with a slight 200ms delay.</p>
                            </div>
                        </ScrollReveal>
                        
                        <div className="spacer"></div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
