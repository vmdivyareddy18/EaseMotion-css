<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban Board Task Card with Drag Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 40px;
      background: #f3f4f6;
      min-height: 100vh;
    }
    h2 { color: #111827; margin-bottom: 8px; }
    p  { color: #6b7280; margin-bottom: 32px; }
    .board-col {
      background: #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .col-title {
      font-weight: 700;
      color: #374151;
      font-size: 1rem;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import KanbanTaskCard from "./KanbanTaskCard.jsx";

    function Demo() {
      return (
        <div>
          <h2>Kanban Task Card — Drag Motion Demo</h2>
          <p>Drag the cards below to see the EaseMotion scale + tilt animation.</p>
          <div className="board-col">
            <div className="col-title">🔵 In Progress</div>
            <KanbanTaskCard
              id="t1"
              title="Redesign Onboarding Flow"
              description="Update the user onboarding screens to match new brand guidelines."
              tags={[{ label: "Design", color: "#fca5a5" }, { label: "High", color: "#fcd34d" }]}
              avatar="https://i.pravatar.cc/150?img=5"
              priority="high"
            />
            <KanbanTaskCard
              id="t2"
              title="Fix Auth Token Refresh Bug"
              description="Token silently expires on mobile causing unexpected logouts."
              tags={[{ label: "Bug", color: "#93c5fd" }]}
              avatar="https://i.pravatar.cc/150?img=17"
              priority="medium"
            />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
