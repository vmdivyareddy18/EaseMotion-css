<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stepper Progress Bar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f9fafb;
      padding: 40px;
    }
    .demo-container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .controls {
      margin-top: 40px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid #d1d5db;
      background: white;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }
    button:hover:not(:disabled) {
      background: #f3f4f6;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .layout-toggle {
      margin-bottom: 30px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState } = React;

    function StepperProgressBar({ steps, currentStep = 0, orientation = 'horizontal' }) {
      return (
        <div 
          className={`ease-stepper ease-stepper--${orientation}`}
          role="progressbar" 
          aria-valuenow={currentStep} 
          aria-valuemin={0} 
          aria-valuemax={steps.length - 1}
        >
          {steps.map((step, index) => {
            const isCompleted = index < currentStep;
            const isActive = index === currentStep;
            
            return (
              <div 
                key={index} 
                className={`ease-stepper__step ${isActive ? 'ease-stepper__step--active' : ''} ${isCompleted ? 'ease-stepper__step--completed' : ''}`}
              >
                <div className="ease-stepper__node-container">
                  <div className="ease-stepper__node ease-pulse-border-emphasis">
                    {isCompleted ? (
                      <svg className="ease-stepper__icon ease-scale-in" viewBox="0 0 24 24">
                        <path fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" d="M20 6L9 17l-5-5" />
                      </svg>
                    ) : (
                      <span className="ease-stepper__index">{index + 1}</span>
                    )}
                  </div>
                  {index < steps.length - 1 && (
                    <div className="ease-stepper__line-track">
                      <div className="ease-stepper__line-fill"></div>
                    </div>
                  )}
                </div>
                
                <div className="ease-stepper__content">
                  <h4 className="ease-stepper__title">{step.title}</h4>
                  {step.description && (
                    <p className="ease-stepper__description">{step.description}</p>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function Demo() {
      const [currentStep, setCurrentStep] = useState(1);
      const [orientation, setOrientation] = useState('horizontal');

      const steps = [
        { title: 'Cart', description: 'Review your items' },
        { title: 'Shipping', description: 'Choose shipping method' },
        { title: 'Payment', description: 'Enter payment details' },
        { title: 'Review', description: 'Final order review' }
      ];

      return (
        <div className="demo-container">
          <div className="layout-toggle">
            <button onClick={() => setOrientation(o => o === 'horizontal' ? 'vertical' : 'horizontal')}>
              Toggle Layout ({orientation})
            </button>
          </div>
          
          <StepperProgressBar 
            steps={steps} 
            currentStep={currentStep} 
            orientation={orientation} 
          />
          
          <div className="controls">
            <button 
              onClick={() => setCurrentStep(s => Math.max(0, s - 1))}
              disabled={currentStep === 0}
            >
              Previous
            </button>
            <button 
              onClick={() => setCurrentStep(s => Math.min(steps.length - 1, s + 1))}
              disabled={currentStep === steps.length - 1}
            >
              Next
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
