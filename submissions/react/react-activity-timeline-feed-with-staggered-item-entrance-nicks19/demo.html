<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Activity Timeline Feed Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    .demo-container {
      width: 100%;
      max-width: 600px;
    }
    .demo-header {
      margin-bottom: 32px;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 8px 0;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
    }
    .reload-btn {
      margin-top: 16px;
      padding: 8px 16px;
      background: #e2e8f0;
      border: none;
      border-radius: 6px;
      color: #334155;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .reload-btn:hover {
      background: #cbd5e1;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h1>Activity Feed</h1>
      <p>Notice the staggered entrance animation when the items load.</p>
      <button class="reload-btn" onclick="window.location.reload()">Replay Animation</button>
    </div>
    
    <div id="root"></div>
  </div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useEffect, useState } = React;

    function ActivityTimeline({ activities = [], className = '' }) {
      const [isMounted, setIsMounted] = useState(false);

      useEffect(() => {
        // slight delay to ensure CSS transitions trigger reliably on initial mount
        const timer = setTimeout(() => setIsMounted(true), 50);
        return () => clearTimeout(timer);
      }, []);

      if (!activities || activities.length === 0) return null;

      return (
        <div className={`ease-timeline-container ${className}`}>
          {activities.map((activity, index) => {
            const animationDelay = `${index * 0.15}s`;

            return (
              <div 
                key={activity.id || index}
                className={`ease-timeline-item ${isMounted ? 'ease-timeline-item-animate' : ''}`}
                style={{ animationDelay }}
              >
                <div className="ease-timeline-track" aria-hidden="true" />
                
                <div className="ease-timeline-marker">
                  {activity.icon ? (
                    <span className="ease-timeline-icon">{activity.icon}</span>
                  ) : (
                    <span className="ease-timeline-dot" />
                  )}
                </div>

                <div className="ease-timeline-content">
                  <div className="ease-timeline-header">
                    <h4 className="ease-timeline-title">{activity.title}</h4>
                    <span className="ease-timeline-time">{activity.time}</span>
                  </div>
                  
                  {activity.description && (
                    <p className="ease-timeline-desc">{activity.description}</p>
                  )}
                  
                  {activity.user && (
                    <div className="ease-timeline-user">
                      {activity.user.avatar && (
                        <img src={activity.user.avatar} alt={activity.user.name} className="ease-timeline-avatar" />
                      )}
                      <span className="ease-timeline-username">{activity.user.name}</span>
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    const CommitIcon = (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <line x1="1.05" y1="12" x2="7" y2="12"></line>
        <line x1="17.01" y1="12" x2="22.96" y2="12"></line>
      </svg>
    );

    const CommentIcon = (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    );

    const MergeIcon = (
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="18" cy="18" r="3"></circle>
        <circle cx="6" cy="6" r="3"></circle>
        <path d="M6 21V9a9 9 0 0 0 9 9"></path>
      </svg>
    );

    function Demo() {
      const mockActivities = [
        {
          id: 1,
          title: "Merged Pull Request #27606",
          time: "Just now",
          description: "feat: Activity Timeline Component with animations.",
          icon: MergeIcon,
          user: { name: "SAPTARSHI-coder", avatar: "https://i.pravatar.cc/150?u=saptarshi" }
        },
        {
          id: 2,
          title: "Left a review comment",
          time: "1 hour ago",
          description: "Great work! Just make sure the animation delay scales dynamically.",
          icon: CommentIcon,
          user: { name: "ReviewBot", avatar: "https://i.pravatar.cc/150?u=bot" }
        },
        {
          id: 3,
          title: "Pushed 3 commits",
          time: "3 hours ago",
          description: "Updated CSS keyframes, added icons, and refined hover states.",
          icon: CommitIcon,
          user: { name: "Nicks-19", avatar: "https://i.pravatar.cc/150?u=nicks" }
        },
        {
          id: 4,
          title: "Assigned Issue #27606",
          time: "Yesterday",
          user: { name: "SAPTARSHI-coder", avatar: "https://i.pravatar.cc/150?u=saptarshi" }
        }
      ];

      return <ActivityTimeline activities={mockActivities} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Demo />);
  </script>
</body>
</html>
