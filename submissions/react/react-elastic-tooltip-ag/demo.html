    <!-- React code with Babel standalone -->
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // ==========================================
      // ELASTIC TOOLTIP COMPONENT DEFINITION
      // ==========================================
      const ElasticTooltip = ({
        content,
        position = "top",
        align = "center",
        trigger = "hover",
        visible = false,
        delayShow = 0,
        delayHide = 100,
        arrow = true,
        theme = "glass",
        portal = true,
        width = "normal",
        className = "",
        style = {},
        children,
      }) => {
        const [active, setActive] = useState(false);
        const [mounted, setMounted] = useState(false);
        const [isOpen, setIsOpen] = useState(false);
        const [coords, setCoords] = useState({ top: 0, left: 0 });
        const [arrowOffset, setArrowOffset] = useState({ x: null, y: null });

        const triggerRef = useRef(null);
        const tooltipRef = useRef(null);
        const showTimeoutRef = useRef(null);
        const hideTimeoutRef = useRef(null);

        const child = React.Children.only(children);

        useEffect(() => {
          if (trigger === "manual") {
            setActive(!!visible);
          }
        }, [visible, trigger]);

        useEffect(() => {
          let timeoutId;
          if (active) {
            setMounted(true);
            timeoutId = setTimeout(() => {
              setIsOpen(true);
            }, 20);
          } else {
            setIsOpen(false);
            timeoutId = setTimeout(() => {
              setMounted(false);
            }, 420);
          }
          return () => clearTimeout(timeoutId);
        }, [active]);

        useEffect(() => {
          return () => {
            clearTimeout(showTimeoutRef.current);
            clearTimeout(hideTimeoutRef.current);
          };
        }, []);

        const updatePosition = () => {
          if (!triggerRef.current || !tooltipRef.current) return;

          const triggerRect = triggerRef.current.getBoundingClientRect();
          const tooltipRect = tooltipRef.current.getBoundingClientRect();
          const gap = 8;

          let top = 0;
          let left = 0;

          if (portal) {
            const scrollX =
              window.pageXOffset || document.documentElement.scrollLeft;
            const scrollY =
              window.pageYOffset || document.documentElement.scrollTop;

            const targetTop = triggerRect.top + scrollY;
            const targetLeft = triggerRect.left + scrollX;

            if (position === "top") {
              top = targetTop - tooltipRect.height - gap;
              left = targetLeft + triggerRect.width / 2 - tooltipRect.width / 2;
            } else if (position === "bottom") {
              top = targetTop + triggerRect.height + gap;
              left = targetLeft + triggerRect.width / 2 - tooltipRect.width / 2;
            } else if (position === "left") {
              top = targetTop + triggerRect.height / 2 - tooltipRect.height / 2;
              left = targetLeft - tooltipRect.width - gap;
            } else if (position === "right") {
              top = targetTop + triggerRect.height / 2 - tooltipRect.height / 2;
              left = targetLeft + triggerRect.width + gap;
            }

            if (position === "top" || position === "bottom") {
              if (align === "start") {
                left = targetLeft;
              } else if (align === "end") {
                left = targetLeft + triggerRect.width - tooltipRect.width;
              }
            }

            if (position === "left" || position === "right") {
              if (align === "start") {
                top = targetTop;
              } else if (align === "end") {
                top = targetTop + triggerRect.height - tooltipRect.height;
              }
            }

            // Viewport Clamping (Containment)
            const viewportMinX = gap;
            const viewportMaxX = window.innerWidth - tooltipRect.width - gap;
            const viewportMinY = gap;
            const viewportMaxY = window.innerHeight - tooltipRect.height - gap;

            const clampedLeft = Math.max(
              viewportMinX,
              Math.min(viewportMaxX, left)
            );
            const clampedTop = Math.max(
              viewportMinY,
              Math.min(viewportMaxY, top)
            );

            setCoords({ top: clampedTop, left: clampedLeft });

            // Arrow correction calculation
            const targetCenterBodyX = targetLeft + triggerRect.width / 2;
            const targetCenterBodyY = targetTop + triggerRect.height / 2;

            if (position === "top" || position === "bottom") {
              const arrowX = targetCenterBodyX - clampedLeft;
              const clampedArrowX = Math.max(
                12,
                Math.min(tooltipRect.width - 12, arrowX)
              );
              setArrowOffset({ x: clampedArrowX, y: null });
            } else {
              const arrowY = targetCenterBodyY - clampedTop;
              const clampedArrowY = Math.max(
                12,
                Math.min(tooltipRect.height - 12, arrowY)
              );
              setArrowOffset({ x: null, y: clampedArrowY });
            }
          } else {
            if (position === "top") {
              top = -(tooltipRect.height + gap);
              left = triggerRect.width / 2 - tooltipRect.width / 2;
            } else if (position === "bottom") {
              top = triggerRect.height + gap;
              left = triggerRect.width / 2 - tooltipRect.width / 2;
            } else if (position === "left") {
              top = triggerRect.height / 2 - tooltipRect.height / 2;
              left = -(tooltipRect.width + gap);
            } else if (position === "right") {
              top = triggerRect.height / 2 - tooltipRect.height / 2;
              left = triggerRect.width + gap;
            }

            if (position === "top" || position === "bottom") {
              if (align === "start") left = 0;
              if (align === "end") left = triggerRect.width - tooltipRect.width;
            } else {
              if (align === "start") top = 0;
              if (align === "end")
                top = triggerRect.height - tooltipRect.height;
            }

            setCoords({ top, left });
            setArrowOffset({ x: null, y: null });
          }
        };

        useEffect(() => {
          if (mounted) {
            updatePosition();
            window.addEventListener("scroll", updatePosition, true);
            window.addEventListener("resize", updatePosition);

            return () => {
              window.removeEventListener("scroll", updatePosition, true);
              window.removeEventListener("resize", updatePosition);
            };
          }
        }, [mounted, position, align, portal]);

        useEffect(() => {
          if (isOpen) {
            updatePosition();
          }
        }, [isOpen]);

        const showTooltip = () => {
          if (trigger === "manual") return;
          clearTimeout(hideTimeoutRef.current);
          if (delayShow > 0) {
            showTimeoutRef.current = setTimeout(() => {
              setActive(true);
            }, delayShow);
          } else {
            setActive(true);
          }
        };

        const hideTooltip = () => {
          if (trigger === "manual") return;
          clearTimeout(showTimeoutRef.current);
          if (delayHide > 0) {
            hideTimeoutRef.current = setTimeout(() => {
              setActive(false);
            }, delayHide);
          } else {
            setActive(false);
          }
        };

        useEffect(() => {
          if (trigger !== "click" || !active) return;

          const handleClickOutside = (e) => {
            const triggerEl = triggerRef.current;
            const tooltipEl = tooltipRef.current;

            if (
              (triggerEl && triggerEl.contains(e.target)) ||
              (tooltipEl && tooltipEl.contains(e.target))
            ) {
              return;
            }
            setActive(false);
          };

          document.addEventListener("mousedown", handleClickOutside);
          document.addEventListener("touchstart", handleClickOutside);
          return () => {
            document.removeEventListener("mousedown", handleClickOutside);
            document.removeEventListener("touchstart", handleClickOutside);
          };
        }, [trigger, active]);

        const handleTooltipMouseEnter = () => {
          if (trigger === "hover") {
            clearTimeout(hideTimeoutRef.current);
            setActive(true);
          }
        };

        const handleTooltipMouseLeave = () => {
          if (trigger === "hover") {
            hideTooltip();
          }
        };

        const triggerProps = {
          ref: (node) => {
            triggerRef.current = node;
            const { ref: childRef } = child;
            if (typeof childRef === "function") {
              childRef(node);
            } else if (childRef && typeof childRef === "object") {
              childRef.current = node;
            }
          },
        };

        if (trigger === "hover") {
          triggerProps.onMouseEnter = (e) => {
            child.props.onMouseEnter?.(e);
            showTooltip();
          };
          triggerProps.onMouseLeave = (e) => {
            child.props.onMouseLeave?.(e);
            hideTooltip();
          };
          triggerProps.onFocus = (e) => {
            child.props.onFocus?.(e);
            showTooltip();
          };
          triggerProps.onBlur = (e) => {
            child.props.onBlur?.(e);
            hideTooltip();
          };
        } else if (trigger === "focus") {
          triggerProps.onFocus = (e) => {
            child.props.onFocus?.(e);
            showTooltip();
          };
          triggerProps.onBlur = (e) => {
            child.props.onBlur?.(e);
            hideTooltip();
          };
        } else if (trigger === "click") {
          triggerProps.onClick = (e) => {
            child.props.onClick?.(e);
            if (active) {
              hideTooltip();
            } else {
              showTooltip();
            }
          };
        }

        const tooltipElement = mounted && (
          <div
            className="ease-elastic-tooltip-container"
            style={{
              top: `${coords.top}px`,
              left: `${coords.left}px`,
            }}
          >
            <div
              ref={tooltipRef}
              className={`ease-elastic-tooltip-content position-${position} theme-${theme} ${width !== "normal" ? width : ""} ${!arrow ? "no-arrow" : ""} ${isOpen ? "open" : ""} ${className}`}
              style={{
                ...style,
                "--ease-tooltip-arrow-left":
                  arrowOffset.x !== null ? `${arrowOffset.x}px` : undefined,
                "--ease-tooltip-arrow-top":
                  arrowOffset.y !== null ? `${arrowOffset.y}px` : undefined,
              }}
              onMouseEnter={handleTooltipMouseEnter}
              onMouseLeave={handleTooltipMouseLeave}
              role="tooltip"
              aria-hidden={!isOpen}
            >
              {content}
            </div>
          </div>
        );

        if (!portal) {
          return (
            <div className="ease-elastic-tooltip-inline-wrapper">
              {React.cloneElement(child, triggerProps)}
              {tooltipElement}
            </div>
          );
        }

        const portalRoot =
          typeof document !== "undefined" ? document.body : null;

        return (
          <React.Fragment>
            {React.cloneElement(child, triggerProps)}
            {portalRoot &&
              ReactDOM.createPortal(
                <div className="ease-elastic-tooltip-portal-wrapper">
                  {tooltipElement}
                </div>,
                portalRoot
              )}
          </React.Fragment>
        );
      };

      // ==========================================
      // MOCK DEMO DASHBOARD APP
      // ==========================================
      const App = () => {
        const [isLightMode, setIsLightMode] = useState(false);
        const [manualVisible, setManualVisible] = useState(false);
        const [copied, setCopied] = useState(false);

        const toggleTheme = () => {
          setIsLightMode((prev) => {
            const newMode = !prev;
            if (newMode) {
              document.body.classList.add("light-mode");
            } else {
              document.body.classList.remove("light-mode");
            }
            return newMode;
          });
        };

        const handleCopyKey = () => {
          setManualVisible(true);
          setCopied(true);
          navigator.clipboard.writeText("sk-easemotion-elastic-demo-key-12345");

          setTimeout(() => {
            setManualVisible(false);
            // Wait for exit transition to complete before clearing status
            setTimeout(() => setCopied(false), 450);
          }, 1500);
        };

        return (
          <React.Fragment>
            <header>
              <div className="logo-container">
                <span className="logo-badge">EaseMotion</span>
                <div className="title-area">
                  <h1>Elastic Tooltip Component</h1>
                </div>
              </div>
              <div className="controls">
                <button className="theme-toggle-btn" onClick={toggleTheme}>
                  {isLightMode ? "🌙 Dark Mode" : "☀️ Light Mode"}
                </button>
              </div>
            </header>

            <main>
              <div style={{ marginBottom: "1.5rem" }}>
                <h2>Responsive Dashboard Preview</h2>
                <p
                  style={{
                    color: "var(--text-muted)",
                    marginTop: "0.25rem",
                    fontSize: "0.95rem",
                  }}
                >
                  Interact with the cards below to see the{" "}
                  <strong>Elastic Slide</strong> transitions and dynamic
                  collision containment.
                </p>
              </div>

              <div className="dashboard-grid">
                {/* Card 1: Growth Metric & Glass Theme (Hover) */}
                <div className="card">
                  <h3>Revenue Overview</h3>
                  <div className="metric-value">
                    $48,920
                    <ElasticTooltip
                      content="MRR grew by 12.4% this week. Click for details."
                      position="top"
                      theme="glass"
                      width="wide"
                    >
                      <span className="growth-badge">▲ 12.4%</span>
                    </ElasticTooltip>
                  </div>
                  <div className="demo-info">
                    Hovering the metric green badge reveals a{" "}
                    <strong>Glassmorphic Theme</strong> tooltip positioned at
                    the top with a springy overshoot.
                  </div>
                </div>

                {/* Card 2: Interactive Avatar List (Hover Survival) */}
                <div className="card">
                  <h3>Project Contributors</h3>
                  <div className="avatar-group">
                    <ElasticTooltip
                      content={
                        <div className="profile-tooltip-card">
                          <span className="profile-name">Saptarshi Sadhu</span>
                          <span className="profile-role">
                            Creator & Lead Architect
                          </span>
                          <a
                            href="https://github.com/SAPTARSHI-coder"
                            target="_blank"
                            className="profile-link"
                          >
                            Github Profile
                          </a>
                        </div>
                      }
                      position="bottom"
                      align="start"
                      theme="dashboard"
                      delayHide={250} // Hover survival buffer
                    >
                      <div className="avatar-wrapper">
                        <div className="avatar avatar-1">SS</div>
                      </div>
                    </ElasticTooltip>

                    <ElasticTooltip
                      content={
                        <div className="profile-tooltip-card">
                          <span className="profile-name">Sarah Connor</span>
                          <span className="profile-role">Core Reviewer</span>
                          <a href="#github" className="profile-link">
                            Github Profile
                          </a>
                        </div>
                      }
                      position="bottom"
                      align="center"
                      theme="glass-dark"
                      delayHide={250}
                    >
                      <div className="avatar-wrapper">
                        <div className="avatar avatar-2">SC</div>
                      </div>
                    </ElasticTooltip>

                    <ElasticTooltip
                      content={
                        <div className="profile-tooltip-card">
                          <span className="profile-name">Alan Turing</span>
                          <span className="profile-role">AI Integrator</span>
                          <a href="#github" className="profile-link">
                            Github Profile
                          </a>
                        </div>
                      }
                      position="bottom"
                      align="end"
                      theme="dark"
                      delayHide={250}
                    >
                      <div className="avatar-wrapper">
                        <div className="avatar avatar-3">AT</div>
                      </div>
                    </ElasticTooltip>
                  </div>
                  <div className="demo-info">
                    Hover over the avatars to see{" "}
                    <strong>Hover Survival (Safe Triangulation)</strong>. You
                    can safely hover off the avatars and click the Github links
                    inside the tooltips.
                  </div>
                </div>

                {/* Card 3: Form Inputs & Focus Trigger */}
                <div className="card">
                  <h3>Developer Settings</h3>
                  <div className="form-group">
                    <label className="form-label" htmlFor="api-key-input">
                      Webhooks Endpoint
                    </label>
                    <ElasticTooltip
                      content="URL where HTTPS POST alerts are sent. Must secure with SSL."
                      position="bottom"
                      trigger="focus"
                      theme="light"
                      width="wide"
                    >
                      <input
                        type="text"
                        id="api-key-input"
                        className="form-input"
                        placeholder="https://api.yourdashboard.com/webhooks"
                      />
                    </ElasticTooltip>
                  </div>
                  <div className="demo-info">
                    Focus (click or tab) inside the input field to trigger a{" "}
                    <strong>Light Theme</strong> elastic tooltip popping out
                    below.
                  </div>
                </div>

                {/* Card 4: Action Controls, Click and Manual Triggers */}
                <div className="card">
                  <h3>Security Actions</h3>
                  <div className="btn-row">
                    {/* Click trigger with click outside closing */}
                    <ElasticTooltip
                      content="Danger! This action is irreversible. Make sure you back up."
                      position="left"
                      trigger="click"
                      theme="dashboard"
                      width="wide"
                    >
                      <button className="btn btn-danger">
                        Delete Database
                      </button>
                    </ElasticTooltip>

                    {/* Manual trigger controlled by React state */}
                    <ElasticTooltip
                      content={copied ? "✓ Copied Key!" : "Copying..."}
                      position="top"
                      trigger="manual"
                      visible={manualVisible}
                      theme="dark"
                      arrow={false}
                    >
                      <button
                        className="btn btn-secondary"
                        onClick={handleCopyKey}
                      >
                        Copy API Key
                      </button>
                    </ElasticTooltip>
                  </div>
                  <div className="demo-info">
                    <strong>Delete</strong> uses a click-trigger (dismissed by
                    clicking outside). <strong>Copy</strong> uses a manual
                    trigger which shows a success state when clicked.
                  </div>
                </div>

                {/* Card 5: Collision Clamping & Dynamic Arrows */}
                <div className="card" style={{ overflow: "hidden" }}>
                  <h3>Edge Collision Clamping</h3>
                  <div className="boundary-showcase">
                    {/* Left edge element */}
                    <ElasticTooltip
                      content="Clamped! I shifted right so I don't go offscreen."
                      position="top"
                      theme="dashboard"
                      width="wide"
                    >
                      <button className="btn btn-secondary corner-button">
                        Left Edge Button
                      </button>
                    </ElasticTooltip>

                    {/* Right edge element */}
                    <ElasticTooltip
                      content="Clamped! I shifted left and arrow points to my trigger."
                      position="top"
                      theme="dashboard"
                      width="wide"
                    >
                      <button className="btn btn-secondary corner-button">
                        Right Edge Button
                      </button>
                    </ElasticTooltip>
                  </div>
                  <div className="demo-info">
                    Hover these edge buttons. Viewport boundaries prevent the
                    tooltips from overflowing the screen. Note that the arrows
                    dynamically slide to point exactly at the button centers.
                  </div>
                </div>
              </div>
            </main>
          </React.Fragment>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
