<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - React Animated Search Bar</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import SearchBar from './SearchBar.jsx';

        const { useState } = React;

        const App = () => {
            const handleSearch = (query) => {
                console.log(`User searched for: ${query}`);
                // In a real app, this would trigger navigation or a data fetch
                alert(`Search submitted for: ${query}`);
            };

            return (
                <div className="search-demo-wrapper">
                    <h1 className="demo-title ease-slide-down">Search the Docs</h1>
                    <p className="demo-desc ease-fade-in" style={{ animationDelay: '200ms' }}>
                        Click the search icon to expand the bar. Type to see simulated animated results.
                    </p>
                    
                    {/* The search bar is wrapped in an ease-slide-up for its initial mount */}
                    <div className="ease-slide-up" style={{ animationDelay: '400ms', width: '100%' }}>
                        <SearchBar 
                            placeholder="Search guides, tutorials, and API..."
                            onSearch={handleSearch}
                            autoFocus={true}
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
