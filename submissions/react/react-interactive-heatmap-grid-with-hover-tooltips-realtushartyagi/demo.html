<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Heatmap Grid Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Import the component (in this demo we embed the code directly)
    const HeatmapGrid = (props) => {
      const { rows, cols, data, maxValue, minValue, onCellHover } = props;
      const [hoverInfo, setHoverInfo] = React.useState(null);

      const max = React.useMemo(() => (maxValue !== undefined ? maxValue : Math.max(...data.flat())), [data, maxValue]);
      const min = React.useMemo(() => (minValue !== undefined ? minValue : Math.min(...data.flat())), [data, minValue]);

      const getColor = (value) => {
        const ratio = (value - min) / (max - min || 1);
        const r = Math.round(255 * ratio);
        const b = Math.round(255 * (1 - ratio));
        return `rgb(${r},0,${b})`;
      };

      const handleMouseEnter = (value, r, c) => {
        setHoverInfo({ value, r, c, x: null, y: null });
        if (onCellHover) onCellHover(value, r, c);
      };
      const handleMouseLeave = () => setHoverInfo(null);
      const handleMouseMove = (e) => {
        if (hoverInfo) {
          setHoverInfo((prev) => ({ ...prev, x: e.clientX, y: e.clientY }));
        }
      };

      return (
        <div className="ease-heatmap" onMouseMove={handleMouseMove}>
          {Array.from({ length: rows }).map((_, r) => (
            <div key={r} className="ease-heatmap-row">
              {Array.from({ length: cols }).map((_, c) => {
                const value = data[r][c];
                return (
                  <div
                    key={c}
                    className="ease-heatmap-cell"
                    style={{ backgroundColor: getColor(value) }}
                    onMouseEnter={() => handleMouseEnter(value, r, c)}
                    onMouseLeave={handleMouseLeave}
                    title={value}
                  />
                );
              })}
            </div>
          ))}
          {hoverInfo && (
            <div
              className="ease-heatmap-tooltip ease-fade-in-up"
              style={{ left: hoverInfo.x + 10, top: hoverInfo.y + 10 }}
            >
              <strong>Value:</strong> {hoverInfo.value}<br />
              <strong>Row:</strong> {hoverInfo.r + 1}, <strong>Col:</strong> {hoverInfo.c + 1}
            </div>
          )}
        </div>
      );
    };

    // Sample data
    const rows = 8, cols = 10;
    const data = Array.from({ length: rows }).map(() =>
      Array.from({ length: cols }).map(() => Math.floor(Math.random() * 100))
    );

    ReactDOM.createRoot(document.getElementById('root')).render(
      <HeatmapGrid rows={rows} cols={cols} data={data} />
    );
  </script>
</body>
</html>
