<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Testimonial Carousel Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .demo-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 8px 0;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
    }
    #root {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1>What Our Users Say</h1>
    <p>A responsive React carousel featuring EaseMotion fade transitions.</p>
  </div>
  
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function TestimonialCarousel({ testimonials = [], autoPlay = true, interval = 5000 }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isAnimating, setIsAnimating] = useState(false);
      
      const nextSlide = () => {
        if (isAnimating || testimonials.length <= 1) return;
        setIsAnimating(true);
        setCurrentIndex((prevIndex) => (prevIndex + 1) % testimonials.length);
      };

      const prevSlide = () => {
        if (isAnimating || testimonials.length <= 1) return;
        setIsAnimating(true);
        setCurrentIndex((prevIndex) => (prevIndex - 1 + testimonials.length) % testimonials.length);
      };

      const goToSlide = (index) => {
        if (isAnimating || index === currentIndex) return;
        setIsAnimating(true);
        setCurrentIndex(index);
      };

      useEffect(() => {
        let timer;
        if (autoPlay && testimonials.length > 1) {
          timer = setInterval(nextSlide, interval);
        }
        return () => clearInterval(timer);
      }, [currentIndex, autoPlay, interval, testimonials.length]);

      useEffect(() => {
        if (isAnimating) {
          const timeout = setTimeout(() => {
            setIsAnimating(false);
          }, 400); 
          return () => clearTimeout(timeout);
        }
      }, [currentIndex, isAnimating]);

      if (!testimonials || testimonials.length === 0) {
        return null;
      }

      return (
        <div className="ease-testimonial-wrapper">
          <div className="ease-testimonial-container">
            {testimonials.map((t, index) => {
              const isActive = index === currentIndex;
              return (
                <div 
                  key={t.id || index}
                  className={`ease-testimonial-slide ${isActive ? 'ease-fade-in-active' : 'ease-fade-out-inactive'}`}
                  aria-hidden={!isActive}
                >
                  <div className="ease-testimonial-card">
                    <div className="ease-quote-icon">
                      <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                        <path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"/>
                      </svg>
                    </div>
                    <p className="ease-testimonial-text">{t.text}</p>
                    
                    <div className="ease-testimonial-author">
                      <img 
                        src={t.avatar || 'https://via.placeholder.com/60'} 
                        alt={t.name} 
                        className="ease-author-avatar"
                      />
                      <div className="ease-author-info">
                        <h4 className="ease-author-name">{t.name}</h4>
                        <p className="ease-author-role">{t.role}</p>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {testimonials.length > 1 && (
            <div className="ease-carousel-controls">
              <button className="ease-control-btn ease-squish-button" onClick={prevSlide} aria-label="Previous testimonial">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M15 18l-6-6 6-6" />
                </svg>
              </button>
              
              <div className="ease-carousel-indicators">
                {testimonials.map((_, index) => (
                  <button
                    key={index}
                    className={`ease-indicator-dot ${index === currentIndex ? 'active' : ''}`}
                    onClick={() => goToSlide(index)}
                    aria-label={`Go to slide ${index + 1}`}
                  />
                ))}
              </div>

              <button className="ease-control-btn ease-squish-button" onClick={nextSlide} aria-label="Next testimonial">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M9 18l6-6-6-6" />
                </svg>
              </button>
            </div>
          )}
        </div>
      );
    }

    function Demo() {
      const reviews = [
        {
          id: 1,
          text: "EaseMotion has completely transformed the way we handle animations in our web apps. It's incredibly intuitive and the performance is unmatched.",
          name: "Sarah Jenkins",
          role: "Frontend Lead at TechCorp",
          avatar: "https://i.pravatar.cc/150?u=a042581f4e29026024d"
        },
        {
          id: 2,
          text: "The copy-paste nature of these components saves me hours of development time. It's the perfect balance of flexibility and ease of use.",
          name: "David Chen",
          role: "Freelance UI Engineer",
          avatar: "https://i.pravatar.cc/150?u=a042581f4e29026704d"
        },
        {
          id: 3,
          text: "Adding micro-interactions used to be a chore. Now, I just drop in the squish-button class and I'm done. My clients love the modern feel.",
          name: "Elena Rodriguez",
          role: "Digital Designer",
          avatar: "https://i.pravatar.cc/150?u=a042581f4e29026705d"
        }
      ];

      return (
        <TestimonialCarousel testimonials={reviews} autoPlay={true} interval={4000} />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
