<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dynamic Modal Dialog Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .demo-content {
      text-align: center;
      background: white;
      padding: 60px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    .demo-content h1 {
      margin-top: 0;
      color: #0f172a;
    }
    .demo-content p {
      color: #64748b;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function DynamicModal({ isOpen, onClose, title, children, footerActions, maxWidth = '500px', closeOnBackdropClick = true }) {
      const modalRef = useRef(null);
      const previouslyFocusedElement = useRef(null);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && isOpen) {
            onClose();
          }
        };

        if (isOpen) {
          previouslyFocusedElement.current = document.activeElement;
          document.addEventListener('keydown', handleKeyDown);
          document.body.style.overflow = 'hidden';
          if (modalRef.current) {
            modalRef.current.focus();
          }
        } else {
          document.body.style.overflow = '';
          if (previouslyFocusedElement.current) {
            previouslyFocusedElement.current.focus();
          }
        }

        return () => {
          document.removeEventListener('keydown', handleKeyDown);
          document.body.style.overflow = '';
        };
      }, [isOpen, onClose]);

      const handleBackdropClick = (e) => {
        if (closeOnBackdropClick && e.target === e.currentTarget) {
          onClose();
        }
      };

      if (!isOpen) return null;

      return (
        <div className="ease-modal-backdrop ease-fade-in-blur" onClick={handleBackdropClick} aria-hidden="true">
          <div 
            className="ease-modal-dialog ease-scale-up"
            role="dialog"
            aria-modal="true"
            aria-labelledby={title ? "ease-modal-title" : undefined}
            style={{ maxWidth }}
            tabIndex={-1}
            ref={modalRef}
          >
            <div className="ease-modal-header">
              {title && <h2 id="ease-modal-title" className="ease-modal-title">{title}</h2>}
              <button className="ease-modal-close-btn ease-squish-button" onClick={onClose} aria-label="Close modal">
                <svg viewBox="0 0 24 24" width="20" height="20">
                  <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
            
            <div className="ease-modal-body">
              {children}
            </div>

            {footerActions && (
              <div className="ease-modal-footer">
                {footerActions}
              </div>
            )}
          </div>
        </div>
      );
    }

    function Demo() {
      const [isOpen, setIsOpen] = useState(false);

      return (
        <div className="demo-content">
          <h1>EaseMotion CSS</h1>
          <p>Experience the dynamic modal with backdrop blur.</p>
          <button 
            className="ease-btn ease-btn-primary ease-squish-button"
            onClick={() => setIsOpen(true)}
            style={{ fontSize: '16px', padding: '12px 24px' }}
          >
            Trigger Modal
          </button>

          <DynamicModal
            isOpen={isOpen}
            onClose={() => setIsOpen(false)}
            title="Subscription Successful"
            maxWidth="450px"
            footerActions={
              <React.Fragment>
                <button 
                  className="ease-btn ease-btn-secondary ease-squish-button" 
                  onClick={() => setIsOpen(false)}
                >
                  Close
                </button>
                <button 
                  className="ease-btn ease-btn-primary ease-squish-button" 
                  onClick={() => { alert('View Dashboard'); setIsOpen(false); }}
                >
                  Go to Dashboard
                </button>
              </React.Fragment>
            }
          >
            <div style={{ textAlign: 'center', padding: '10px 0' }}>
              <div style={{ 
                background: '#dcfce7', color: '#166534', width: '64px', height: '64px', 
                borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                margin: '0 auto 16px auto'
              }}>
                <svg viewBox="0 0 24 24" width="32" height="32">
                  <path fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
                </svg>
              </div>
              <p style={{ margin: 0, fontSize: '16px', color: '#374151' }}>
                You have successfully upgraded to the Pro plan. All advanced features, including priority support and new EaseMotion animations, are now unlocked.
              </p>
            </div>
          </DynamicModal>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
