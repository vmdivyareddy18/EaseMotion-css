<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breadcrumb Trail Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .demo-container {
      background: #ffffff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 800px;
    }
    h1 {
      margin-top: 0;
      color: #0f172a;
      font-size: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 16px;
    }
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1e293b;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <h1>Navigation</h1>
    <div id="root"></div>
  </div>
  
  <div id="toast" class="toast">Navigating...</div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const HomeIcon = (
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
    );

    const FolderIcon = (
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" />
      </svg>
    );

    const FileIcon = (
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" />
        <polyline points="13 2 13 9 20 9" />
      </svg>
    );

    function BreadcrumbTrail({ items = [], onNavigate, className = '' }) {
      if (!items || items.length === 0) return null;

      return (
        <nav aria-label="Breadcrumb" className={`ease-breadcrumb-nav ${className}`}>
          <ol className="ease-breadcrumb-list">
            {items.map((item, index) => {
              const isLast = index === items.length - 1;
              
              return (
                <li key={item.id || index} className="ease-breadcrumb-item" aria-current={isLast ? 'page' : undefined}>
                  <div className="ease-breadcrumb-content">
                    {isLast ? (
                      <span className="ease-breadcrumb-text ease-breadcrumb-active">
                        {item.icon && <span className="ease-breadcrumb-icon">{item.icon}</span>}
                        {item.label}
                      </span>
                    ) : (
                      <a 
                        href={item.href || '#'} 
                        className="ease-breadcrumb-link"
                        onClick={(e) => {
                          if (onNavigate) {
                            e.preventDefault();
                            onNavigate(item);
                          }
                        }}
                      >
                        {item.icon && <span className="ease-breadcrumb-icon">{item.icon}</span>}
                        {item.label}
                      </a>
                    )}
                  </div>

                  {!isLast && (
                    <div className="ease-breadcrumb-divider" aria-hidden="true">
                      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="ease-chevron-icon">
                        <path d="M9 18l6-6-6-6" />
                      </svg>
                    </div>
                  )}
                </li>
              );
            })}
          </ol>
        </nav>
      );
    }

    function Demo() {
      const [path, setPath] = React.useState([
        { id: 'home', label: 'Dashboard', href: '/dashboard', icon: HomeIcon },
        { id: 'projects', label: 'Projects', href: '/dashboard/projects', icon: FolderIcon },
        { id: 'easemotion', label: 'EaseMotion UI', href: '/dashboard/projects/easemotion', icon: FolderIcon },
        { id: 'file', label: 'BreadcrumbTrail.jsx', icon: FileIcon }
      ]);

      const handleNavigate = (item) => {
        const toast = document.getElementById('toast');
        toast.textContent = `Navigating to: ${item.href}`;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
      };

      return (
        <div>
          <p style={{ color: '#64748b', marginBottom: '24px' }}>
            Hover over the links to see the adjacent chevron dynamically shift, signaling forward navigation flow.
          </p>
          <div style={{ padding: '16px', background: '#f8fafc', borderRadius: '8px', border: '1px solid #e2e8f0' }}>
            <BreadcrumbTrail items={path} onNavigate={handleNavigate} />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Demo />);
  </script>
</body>
</html>
