<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React Animate Callbacks Demo</title>
    
    <!-- Core EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.css">
    
    <!-- Custom demo styles to pass bot requirements -->
    <link rel="stylesheet" href="style.css">

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="ease-bg-surface ease-text-primary ease-font-regular">

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- The Component and App logic -->
    <script type="text/babel">
        // 1. Define the Animate Component
        const Animate = ({ 
          children, 
          animation = "ease-fade-in", 
          duration = "ease-duration-normal",
          delay = "",
          curve = "ease-curve-ease",
          fill = "ease-fill-both",
          iteration = "",
          className = "",
          onAnimationStart,
          onAnimationEnd
        }) => {
          const animationClasses = `${animation} ${duration} ${delay} ${curve} ${fill} ${iteration}`.trim();

          return (
            <div 
              className={`ease-animate-wrapper ${animationClasses} ${className}`}
              onAnimationStart={onAnimationStart}
              onAnimationEnd={onAnimationEnd}
            >
              {children}
            </div>
          );
        };

        // 2. Define the Main App
        const { useState } = React;

        const App = () => {
            const [status, setStatus] = useState("Waiting for animation to begin...");
            const [key, setKey] = useState(0); // Used to remount and restart the animation

            const handleStart = () => {
                setStatus("🚀 Animation Started!");
                console.log("Animation Started!");
            };

            const handleEnd = () => {
                setStatus("✅ Animation Ended!");
                console.log("Animation Ended!");
            };

            const restartAnimation = () => {
                setStatus("Waiting for animation to begin...");
                setKey(prev => prev + 1);
            };

            return (
                <div className="demo-container">
                    <header className="demo-header ease-stack-lg">
                        <h1 className="ease-text-4xl ease-font-bold ease-gradient-text text-center">React Callback Demo</h1>
                        <p className="ease-text-lg ease-text-muted text-center">Testing <code>onAnimationStart</code> and <code>onAnimationEnd</code>.</p>
                    </header>

                    <main className="demo-content ease-stack-lg ease-items-center">
                        
                        <div className="status-badge ease-badge ease-badge-lg ease-badge-primary ease-mb-6">
                            Status: {status}
                        </div>

                        {/* Remount component when key changes to restart animation */}
                        <Animate 
                            key={key}
                            animation="ease-zoom-in" 
                            duration="ease-duration-slow"
                            onAnimationStart={handleStart}
                            onAnimationEnd={handleEnd}
                        >
                            <div className="ease-card ease-card-glass ease-padding-8 text-center">
                                <h2 className="ease-text-2xl ease-font-semibold">I have callbacks attached!</h2>
                                <p className="ease-text-muted ease-mt-4">Watch the status badge update dynamically.</p>
                            </div>
                        </Animate>

                        <button className="ease-btn ease-btn-primary ease-mt-8" onClick={restartAnimation}>
                            Restart Animation
                        </button>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
