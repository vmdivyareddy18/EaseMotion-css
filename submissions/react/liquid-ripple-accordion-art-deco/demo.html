<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Liquid Ripple Accordion (Art Deco) · React</title>
  <meta name="description" content="Art Deco accordion with liquid ripple transition. React component demo.">
  <!-- The standalone demo is self-contained: React via CDN + Babel transpiling -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── Inline the component CSS so this file is self-contained ── */

    :root {
      --ease-lra-gap: 0.625rem;
      --ease-lra-radius: 4px;
      --ease-lra-max-width: 720px;
      --ease-lra-bg: #faf7f0;
      --ease-lra-item-bg: #ffffff;
      --ease-lra-item-border: #c9b89a;
      --ease-lra-header-bg: #f5efe3;
      --ease-lra-header-hover-bg: #ede5d5;
      --ease-lra-text: #2a1f0e;
      --ease-lra-text-muted: #7c6845;
      --ease-lra-accent: #9b7d3a;
      --ease-lra-accent-light: rgba(155,125,58,0.12);
      --ease-lra-ripple: rgba(155,125,58,0.35);
      --ease-lra-body-bg: #ffffff;
      --ease-lra-body-text: #3d2e15;
      --ease-lra-font: 'Georgia','Times New Roman',serif;
      --ease-lra-title-size: 1rem;
      --ease-lra-title-weight: 600;
      --ease-lra-body-size: 0.9375rem;
      --ease-lra-body-line-height: 1.7;
      --ease-lra-collapse-duration: 0.38s;
      --ease-lra-collapse-easing: cubic-bezier(0.4,0,0.2,1);
      --ease-lra-ripple-duration: 0.65s;
      --ease-lra-ripple-size: 600px;
      --ease-lra-bar-width: 4px;
    }

    .ease-lra--dark {
      --ease-lra-bg: #1a1108;
      --ease-lra-item-bg: #231810;
      --ease-lra-item-border: #5a4520;
      --ease-lra-header-bg: #2e2010;
      --ease-lra-header-hover-bg: #3a2a14;
      --ease-lra-text: #f5e8c8;
      --ease-lra-text-muted: #b89c6a;
      --ease-lra-accent: #d4a84b;
      --ease-lra-accent-light: rgba(212,168,75,0.15);
      --ease-lra-ripple: rgba(212,168,75,0.3);
      --ease-lra-body-bg: #231810;
      --ease-lra-body-text: #e8d5a8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--ease-lra-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body.dark { background: #1a1108; color: #f5e8c8; }

    h1 {
      font-size: 2.2rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.35rem;
      color: #9b7d3a;
    }

    body.dark h1 { color: #d4a84b; }

    .subtitle {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.6;
      margin-bottom: 3rem;
      text-align: center;
    }

    /* Art Deco ornamental divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 720px;
      margin-bottom: 2rem;
      color: #9b7d3a;
      opacity: 0.6;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: currentColor;
    }

    .toggle-btn {
      margin-bottom: 2.5rem;
      padding: 0.6rem 1.5rem;
      border: 1px solid #9b7d3a;
      background: transparent;
      color: #9b7d3a;
      font-family: 'Georgia', serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease;
      border-radius: 2px;
    }
    .toggle-btn:hover { background: #9b7d3a; color: white; }

    /* Component styles (mirrors LiquidRippleAccordion.css) */
    .ease-lra { display: flex; flex-direction: column; gap: var(--ease-lra-gap); width: 100%; max-width: var(--ease-lra-max-width); font-family: var(--ease-lra-font); }
    .ease-lra__item { border: 1px solid var(--ease-lra-item-border); border-radius: var(--ease-lra-radius); overflow: hidden; background: var(--ease-lra-item-bg); outline: 1px solid var(--ease-lra-item-border); outline-offset: 2px; transition: box-shadow 0.2s ease; }
    .ease-lra__item:hover:not(.is-disabled) { box-shadow: 0 4px 18px rgba(155,125,58,0.18); }
    .ease-lra__item.is-disabled { opacity: 0.48; cursor: not-allowed; }
    .ease-lra__header { position: relative; overflow: hidden; width: 100%; display: flex; align-items: center; gap: 0.75rem; padding: 1rem 1.25rem; background: var(--ease-lra-header-bg); border: none; cursor: pointer; text-align: left; transition: background var(--ease-lra-collapse-duration) ease; color: var(--ease-lra-text); }
    .ease-lra__header:hover:not(:disabled) { background: var(--ease-lra-header-hover-bg); }
    .ease-lra__header:focus-visible { outline: 2px solid var(--ease-lra-accent); outline-offset: -2px; }
    .ease-lra__accent-bar { flex-shrink: 0; width: var(--ease-lra-bar-width); height: 1.25rem; background: var(--ease-lra-accent); border-radius: 2px; transition: height var(--ease-lra-collapse-duration) ease; }
    .ease-lra__item.is-open .ease-lra__accent-bar { height: 2rem; }
    .ease-lra__icon { display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 24px; height: 24px; color: var(--ease-lra-accent); }
    .ease-lra__title { flex: 1; font-size: var(--ease-lra-title-size); font-weight: var(--ease-lra-title-weight); letter-spacing: 0.04em; text-transform: uppercase; color: var(--ease-lra-text); }
    .ease-lra__chevron { flex-shrink: 0; display: flex; width: 18px; height: 18px; color: var(--ease-lra-text-muted); transition: transform var(--ease-lra-collapse-duration) var(--ease-lra-collapse-easing); }
    .ease-lra__chevron svg { width: 100%; height: 100%; }
    .ease-lra__item.is-open .ease-lra__chevron { transform: rotate(180deg); }
    .ease-lra__body-wrapper { display: grid; grid-template-rows: 0fr; transition: grid-template-rows var(--ease-lra-collapse-duration) var(--ease-lra-collapse-easing); }
    .ease-lra__item.is-open .ease-lra__body-wrapper { grid-template-rows: 1fr; }
    .ease-lra__body { overflow: hidden; }
    .ease-lra__body > * { padding: 1.125rem 1.25rem 1.25rem calc(var(--ease-lra-bar-width) + 0.75rem + 1.25rem); font-size: var(--ease-lra-body-size); line-height: var(--ease-lra-body-line-height); color: var(--ease-lra-body-text); background: var(--ease-lra-body-bg); border-top: 1px dashed var(--ease-lra-item-border); display: block; }
    .ease-lra__accent-bar, .ease-lra__icon, .ease-lra__title, .ease-lra__chevron { position: relative; z-index: 1; }
    @keyframes ease-lra-ripple-spread { 0% { transform: translate(-50%,-50%) scale(0); opacity: 1; } 70% { opacity: 0.45; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
    .ease-lra__ripple { position: absolute; pointer-events: none; border-radius: 50%; width: var(--ease-lra-ripple-size); height: var(--ease-lra-ripple-size); background: var(--ease-lra-ripple); animation: ease-lra-ripple-spread var(--ease-lra-ripple-duration) ease-out forwards; z-index: 0; }
    @media (prefers-reduced-motion: reduce) { .ease-lra__body-wrapper { transition: none; } .ease-lra__chevron { transition: none; } .ease-lra__ripple { animation: none; display: none; } }
  </style>
</head>
<body>
  <h1>Liquid Ripple Accordion</h1>
  <p class="subtitle">Art Deco · React · EaseMotion CSS</p>

  <button class="toggle-btn" id="theme-btn" onclick="toggleTheme()">⬡ Toggle Dark Mode</button>

  <div class="divider">Single open at a time</div>
  <div id="root-single"></div>

  <br>

  <div class="divider" style="margin-top:2rem;">Allow multiple open</div>
  <div id="root-multi"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    /* ── AccordionItem ─────────────────────────────────── */
    const AccordionItem = ({ item, isOpen, onToggle }) => {
      const rippleContainerRef = useRef(null);

      const spawnRipple = useCallback((e) => {
        const container = rippleContainerRef.current;
        if (!container) return;
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const ripple = document.createElement('span');
        ripple.className = 'ease-lra__ripple';
        ripple.style.left = `${x}px`;
        ripple.style.top = `${y}px`;
        container.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      }, []);

      const handleClick = useCallback((e) => {
        if (item.disabled) return;
        spawnRipple(e);
        onToggle(item.id);
      }, [item, onToggle, spawnRipple]);

      return (
        <div className={`ease-lra__item${isOpen ? ' is-open' : ''}${item.disabled ? ' is-disabled' : ''}`} role="listitem">
          <button
            className="ease-lra__header"
            ref={rippleContainerRef}
            onClick={handleClick}
            aria-expanded={isOpen}
            aria-controls={`ease-lra-body-${item.id}`}
            aria-disabled={item.disabled || undefined}
            id={`ease-lra-header-${item.id}`}
            disabled={item.disabled}
            type="button"
          >
            <span className="ease-lra__accent-bar" aria-hidden="true" />
            {item.icon && <span className="ease-lra__icon" aria-hidden="true">{item.icon}</span>}
            <span className="ease-lra__title">{item.title}</span>
            <span className="ease-lra__chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </span>
          </button>
          <div id={`ease-lra-body-${item.id}`} role="region" aria-labelledby={`ease-lra-header-${item.id}`} className="ease-lra__body-wrapper">
            <div className="ease-lra__body">
              <div>{item.content}</div>
            </div>
          </div>
        </div>
      );
    };

    /* ── LiquidRippleAccordion ─────────────────────────── */
    const LiquidRippleAccordion = ({ items = [], allowMultiple = false, theme = 'light' }) => {
      const [openIds, setOpenIds] = useState(new Set());

      const toggleItem = useCallback((id) => {
        setOpenIds((prev) => {
          const next = new Set(prev);
          if (next.has(id)) {
            next.delete(id);
          } else {
            if (!allowMultiple) next.clear();
            next.add(id);
          }
          return next;
        });
      }, [allowMultiple]);

      return (
        <div className={`ease-lra ease-lra--${theme}`} role="list">
          {items.map(item => (
            <AccordionItem key={item.id} item={item} isOpen={openIds.has(item.id)} onToggle={toggleItem} />
          ))}
        </div>
      );
    };

    /* ── Demo data ─────────────────────────────────────── */
    const ITEMS = [
      {
        id: 'history',
        icon: '⬟',
        title: 'Origins of Art Deco',
        content: (
          <p>
            Art Deco emerged in France in the 1910s and reached the height of popularity in the
            1920s–30s, characterised by bold geometric forms, lavish ornamentation, and the belief
            that industrial craftsmanship could be elevated to fine art. It synthesised modernist
            styles with fine craftsmanship and rich materials.
          </p>
        ),
      },
      {
        id: 'principles',
        icon: '◈',
        title: 'Design Principles',
        content: (
          <p>
            Key hallmarks include symmetry and strong vertical lines, stylized and angular
            geometry, chevrons and sunburst motifs, and the use of luxurious materials — gilt,
            lacquer, marble, and exotic woods. Every surface was treated as an opportunity for
            decoration without sacrificing function.
          </p>
        ),
      },
      {
        id: 'legacy',
        icon: '◆',
        title: 'Legacy in Digital Design',
        content: (
          <p>
            Art Deco's emphasis on precision, symmetry, and purposeful ornamentation has found a
            natural second life in digital interfaces. Its vocabulary — geometric patterns,
            high-contrast gold on black, serif typography, and structured hierarchy — translates
            directly into premium UI components that feel authoritative yet elegant.
          </p>
        ),
      },
      {
        id: 'disabled',
        icon: '○',
        title: 'Restricted Section (Disabled)',
        disabled: true,
        content: <p>This panel is disabled and cannot be opened.</p>,
      },
    ];

    /* ── Wrapper with live theme prop ───────────────────── */
    /* Fix: register a setter per containerId so both instances respond
       to theme changes independently without overwriting each other. */
    window.__themeSetters = {};

    const App = ({ containerId, allowMultiple }) => {
      const [theme, setTheme] = useState('light');

      React.useEffect(() => {
        window.__themeSetters[containerId] = setTheme;
        return () => { delete window.__themeSetters[containerId]; };
      }, [containerId]);

      return (
        <LiquidRippleAccordion items={ITEMS} allowMultiple={allowMultiple} theme={theme} />
      );
    };

    ReactDOM.createRoot(document.getElementById('root-single')).render(
      <App containerId="root-single" allowMultiple={false} />
    );
    ReactDOM.createRoot(document.getElementById('root-multi')).render(
      <App containerId="root-multi" allowMultiple={true} />
    );
  </script>

  <script>
    let isDark = false;
    function toggleTheme() {
      isDark = !isDark;
      document.body.classList.toggle('dark', isDark);
      const t = isDark ? 'dark' : 'light';
      if (window.__setTheme) window.__setTheme(t);
      /* Also notify per-instance setters (both accordions) */
      Object.values(window.__themeSetters || {}).forEach(fn => fn(t));
      document.getElementById('theme-btn').textContent = isDark ? '⬡ Toggle Light Mode' : '⬡ Toggle Dark Mode';
    }
  </script>
</body>
</html>
