<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notification Center Drawer with Slide-In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 40px;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .trigger-btn {
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      transition: background 0.2s;
    }
    .trigger-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import NotificationCenterDrawer from "./NotificationCenterDrawer.jsx";

    const dummyNotifications = [
      {
        id: "1",
        title: "New Follower",
        message: "Alice started following you.",
        time: "5m ago",
        read: false
      },
      {
        id: "2",
        title: "System Update",
        message: "EaseMotion v2.0 is now available. Restart to apply changes.",
        time: "1h ago",
        read: false
      },
      {
        id: "3",
        title: "Weekly Report",
        message: "Your weekly analytics report is ready to view.",
        time: "2d ago",
        read: true
      }
    ];

    function Demo() {
      const [isOpen, setIsOpen] = React.useState(false);

      return (
        <div>
          <button className="trigger-btn" onClick={() => setIsOpen(true)}>
            Open Notifications
          </button>
          
          <NotificationCenterDrawer 
            isOpen={isOpen} 
            onClose={() => setIsOpen(false)}
            notifications={dummyNotifications}
          />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
