<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Slide Card - Fitness Tracker</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="ElasticSlideCard.css">
  
  <!-- React & ReactDOM (UMD) -->
  <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
  <!-- Tailwind for basic layout (optional, component uses raw CSS) -->
  <script src="https://cdn.tailwindcss.com/3.4.3"></script>

  <style>
    body {
      background-color: var(--ease-esc-bg-color, #121212);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
  </style>
</head>
<body>
  
  <div class="mb-12 text-center max-w-lg">
    <h1 class="text-3xl font-bold mb-4 tracking-tight">Elastic Slide Card</h1>
    <p class="text-gray-400">
      Hover or focus the cards below to see the <strong>Elastic Slide</strong> transition. 
      Designed for fitness tracker dashboards.
    </p>
  </div>

  <div id="root" class="w-full max-w-4xl flex flex-wrap justify-center gap-8"></div>

  <!-- Component Source (Loaded inline via Babel) -->
  <script type="text/babel">
    const { useState } = React;

    // --- PASTE COMPONENT DIRECTLY ---
    const ElasticSlideCard = ({ 
      icon, 
      title, 
      subtitle, 
      stats = [], 
      isActive = false,
      className = '',
      style = {},
      ...rest
    }) => {
      const [isHovered, setIsHovered] = React.useState(false);
      const [isFocused, setIsFocused] = React.useState(false);
      const open = isActive || isHovered || isFocused;

      return (
        <div 
          className={`ease-esc__wrapper ease-fade-in ease-hover-lift-shadow ${isActive ? 'ease-esc--active' : ''} ${className}`}
          tabIndex={0}
          role="region"
          aria-label={`Activity summary for ${title}`}
          style={style}
          onMouseEnter={() => setIsHovered(true)}
          onMouseLeave={() => setIsHovered(false)}
          onFocus={() => setIsFocused(true)}
          onBlur={() => setIsFocused(false)}
          {...rest}
        >
          <div className="ease-esc__header">
            <div className="ease-esc__icon-container" aria-hidden="true">
              {icon}
            </div>
            <h3 className="ease-esc__title">{title}</h3>
            <p className="ease-esc__subtitle">{subtitle}</p>
          </div>

          <div 
            className="ease-esc__panel" 
            aria-hidden={!open ? "true" : "false"}
          >
            {stats.map((stat, index) => (
              <div key={index} className="ease-esc__stat">
                <span className="ease-esc__stat-value">
                  {stat.value}
                  {stat.unit && <span className="ease-esc__stat-unit">{stat.unit}</span>}
                </span>
                <span className="ease-esc__stat-label">{stat.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // --- DEMO APP ---
    function App() {
      // Mock Lucide icons for standalone demo
      const RunningIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 4v16"/><path d="m16 8-4-4-4 4"/><path d="m8 16 4 4 4-4"/></svg>
      );
      
      const CyclingIcon = () => (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
      );

      return (
        <React.Fragment>
          <ElasticSlideCard 
            icon={<RunningIcon />}
            title="Morning Run"
            subtitle="Today, 06:30 AM"
            stats={[
              { label: 'Duration', value: '45', unit: 'm' },
              { label: 'Avg HR', value: '142', unit: 'bpm' },
              { label: 'Calories', value: '450', unit: 'kcal' },
              { label: 'Distance', value: '5.2', unit: 'km' }
            ]}
          />
          
          <ElasticSlideCard 
            icon={<CyclingIcon />}
            title="Evening Cycling"
            subtitle="Yesterday, 05:45 PM"
            style={{
              '--ease-esc-accent-color': '#00d4ff', // Cyan theme override
              '--ease-esc-surface-color': '#111827'
            }}
            stats={[
              { label: 'Duration', value: '1:20', unit: 'h' },
              { label: 'Avg HR', value: '135', unit: 'bpm' },
              { label: 'Calories', value: '820', unit: 'kcal' },
              { label: 'Distance', value: '24.5', unit: 'km' }
            ]}
          />
        </React.Fragment>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
