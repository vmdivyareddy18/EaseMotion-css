<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban Board Task Card with Drag Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 40px;
      background: #f3f4f6;
      display: flex; justify-content: center; min-height: 100vh;
    }
    .board-column {
      background: #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .board-title {
      margin: 0 0 8px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #374151;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import KanbanTaskCard from "./KanbanTaskCard.jsx";

    const demoTask = {
      id: "task-1",
      title: "Implement infinite scroll in the feed component",
      tag: "Feature",
      assignees: [
        "https://i.pravatar.cc/150?img=11",
        "https://i.pravatar.cc/150?img=33"
      ]
    };

    function Demo() {
      const handleDragStart = (id) => {
        console.log("Started dragging task:", id);
      };

      return (
        <div className="board-column">
          <h2 className="board-title">To Do (Drag Me!)</h2>
          <KanbanTaskCard task={demoTask} onDragStart={handleDragStart} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
