<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAB Speed Dial Menu Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f1f5f9;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .demo-container {
      text-align: center;
      max-width: 500px;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 12px 0;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h1>Speed Dial Menu</h1>
      <p>Look to the bottom right of the screen. Click the Floating Action Button (FAB) to see the staggered spring-animated menu entrance.</p>
    </div>
  </div>
  
  <div id="root"></div>

  <!-- React dependencies -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- React component code -->
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    function SpeedDial({ actions = [], position = 'bottom-right', mainIcon = null, activeIcon = null }) {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        
        const handleEscKey = (event) => {
          if (event.key === 'Escape') {
            setIsOpen(false);
          }
        };

        if (isOpen) {
          document.addEventListener('mousedown', handleClickOutside);
          document.addEventListener('keydown', handleEscKey);
        }

        return () => {
          document.removeEventListener('mousedown', handleClickOutside);
          document.removeEventListener('keydown', handleEscKey);
        };
      }, [isOpen]);

      const toggleDial = () => setIsOpen(!isOpen);

      const defaultMainIcon = (
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      );

      const defaultActiveIcon = (
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      );

      return (
        <div className={`ease-speed-dial-container ease-speed-dial-${position}`} ref={containerRef}>
          <div className={`ease-speed-dial-actions ${isOpen ? 'ease-speed-dial-open' : ''}`} aria-hidden={!isOpen}>
            {actions.map((action, index) => {
              const delay = `${(actions.length - 1 - index) * 0.05}s`;
              return (
                <div key={action.name} className="ease-speed-dial-action-wrapper" style={{ transitionDelay: isOpen ? delay : '0s' }}>
                  {action.tooltip && <span className="ease-speed-dial-tooltip">{action.tooltip}</span>}
                  <button
                    type="button"
                    className="ease-speed-dial-action-btn"
                    onClick={() => { action.onClick(); setIsOpen(false); }}
                    aria-label={action.name}
                    tabIndex={isOpen ? 0 : -1}
                  >
                    {action.icon}
                  </button>
                </div>
              );
            })}
          </div>

          <button
            type="button"
            className="ease-speed-dial-fab"
            onClick={toggleDial}
            aria-expanded={isOpen}
            aria-haspopup="menu"
            aria-label="Toggle speed dial menu"
          >
            <span className={`ease-speed-dial-icon ${isOpen ? 'ease-speed-dial-icon-hidden' : ''}`}>
              {mainIcon || defaultMainIcon}
            </span>
            <span className={`ease-speed-dial-active-icon ${isOpen ? 'ease-speed-dial-active-icon-visible' : ''}`}>
              {activeIcon || defaultActiveIcon}
            </span>
          </button>
        </div>
      );
    }

    const FileIcon = <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline></svg>;
    const SaveIcon = <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
    const PrintIcon = <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>;
    const ShareIcon = <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>;

    function Demo() {
      const actions = [
        { name: 'New File', tooltip: 'New File', icon: FileIcon, onClick: () => console.log('New File') },
        { name: 'Save', tooltip: 'Save Draft', icon: SaveIcon, onClick: () => console.log('Save') },
        { name: 'Print', tooltip: 'Print Document', icon: PrintIcon, onClick: () => console.log('Print') },
        { name: 'Share', tooltip: 'Share Link', icon: ShareIcon, onClick: () => console.log('Share') },
      ];

      return <SpeedDial actions={actions} position="bottom-right" />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Demo />);
  </script>
</body>
</html>
