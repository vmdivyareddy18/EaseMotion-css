<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Badge Notification Pulse Indicator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 60px;
      background: #f3f4f6;
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;
      align-items: flex-start; min-height: 100vh;
    }
    .demo-box {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .demo-label {
      font-size: 0.8rem;
      color: #6b7280;
      margin-top: 4px;
    }
    .row { display: flex; gap: 24px; align-items: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import BadgeNotification from "./BadgeNotification.jsx";

    function Demo() {
      const [count, setCount] = React.useState(3);
      return (
        <div className="demo-box">
          <div className="row">
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <BadgeNotification count={count} pulsing={true} onClick={() => setCount(0)} />
              <span className="demo-label">Pulsing (click to clear)</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <BadgeNotification count={12} pulsing={false} />
              <span className="demo-label">No pulse</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <BadgeNotification count={120} pulsing={true} />
              <span className="demo-label">99+ cap</span>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <BadgeNotification count={0} pulsing={true} />
              <span className="demo-label">Zero (hidden)</span>
            </div>
          </div>
          <div style={{marginTop:16,display:'flex',gap:10}}>
            <button onClick={() => setCount(c => c + 1)}
              style={{padding:'6px 16px',borderRadius:6,border:'1px solid #d1d5db',cursor:'pointer',background:'#fff'}}>
              + Add
            </button>
            <button onClick={() => setCount(c => Math.max(0, c - 1))}
              style={{padding:'6px 16px',borderRadius:6,border:'1px solid #d1d5db',cursor:'pointer',background:'#fff'}}>
              − Remove
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
