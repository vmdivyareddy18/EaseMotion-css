<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Premium Shopping Cart Drawer Demo (EaseMotion CSS)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Scoped custom styles -->
  <link rel="stylesheet" href="./style.css">
  
  <!-- React & Babel CDNs -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    :root {
      --font-outfit: 'Outfit', sans-serif;
      --font-jakarta: 'Plus Jakarta Sans', sans-serif;
    }
    
    body {
      margin: 0;
      background: radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.05) 0%, rgba(20, 30, 51, 0.02) 90%), #fafafa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      box-sizing: border-box;
      font-family: var(--font-jakarta);
      color: #0f172a;
    }
    
    .demo-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.05), 0 0 1px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(108, 99, 255, 0.1);
    }

    h1 {
      font-family: var(--font-outfit);
      font-size: 2.75rem;
      font-weight: 800;
      margin: 0 0 1rem 0;
      background: linear-gradient(135deg, #4b44cc, #6c63ff, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.03em;
    }

    p.subtitle {
      color: #64748b;
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .open-btn {
      padding: 1rem 2.25rem;
      font-size: 1.1rem;
      font-weight: 700;
      font-family: var(--font-outfit);
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      box-shadow: 0 8px 24px -6px rgba(108, 99, 255, 0.5);
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s;
    }

    .open-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px -6px rgba(108, 99, 255, 0.65);
    }

    .open-btn:active {
      transform: translateY(-1px);
    }

    .badge-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      min-width: 20px;
      height: 20px;
      font-size: 0.75rem;
      font-weight: 800;
      margin-left: 8px;
      vertical-align: middle;
      box-shadow: 0 2px 6px rgba(239, 68, 68, 0.4);
    }

    .framework-badge {
      display: inline-block;
      padding: 6px 12px;
      background: rgba(108, 99, 255, 0.08);
      color: #6c63ff;
      border-radius: 99px;
      font-size: 0.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Dark Mode Demo Container Override */
    @media (prefers-color-scheme: dark) {
      body {
        background: radial-gradient(circle at 10% 20%, rgba(108, 99, 255, 0.08) 0%, rgba(15, 23, 42, 0.1) 90%), #0f172a;
        color: #e2e8f0;
      }
      .demo-card {
        background: #1e293b;
        border-color: rgba(108, 99, 255, 0.15);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.3);
      }
      p.subtitle {
        color: #94a3b8;
      }
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Component Source embedded in script or loaded relative -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Mock Component Implementation for CDNs ---
    function ShoppingCartDrawer({
      isOpen = false,
      onClose,
      initialCartItems = [],
      onCheckout,
      currency = "$",
      minQty = 1,
      maxQty = 10,
    }) {
      const [items, setItems] = useState(initialCartItems);
      const [isRendered, setIsRendered] = useState(isOpen);
      const [slideDirection, setSlideDirection] = useState("closed");
      const drawerRef = useRef(null);

      useEffect(() => {
        if (initialCartItems && initialCartItems.length > 0) {
          setItems(initialCartItems);
        }
      }, [initialCartItems]);

      useEffect(() => {
        if (isOpen) {
          setIsRendered(true);
          const frame = requestAnimationFrame(() => {
            setSlideDirection("open");
          });
          return () => cancelAnimationFrame(frame);
        } else {
          setSlideDirection("closed");
          const timer = setTimeout(() => {
            setIsRendered(false);
          }, 400);
          return () => clearTimeout(timer);
        }
      }, [isOpen]);

      useEffect(() => {
        const handleKeyDown = (event) => {
          if (event.key === "Escape" && isOpen && onClose) {
            onClose();
          }
        };
        document.addEventListener("keydown", handleKeyDown);
        return () => document.removeEventListener("keydown", handleKeyDown);
      }, [isOpen, onClose]);

      useEffect(() => {
        if (isOpen) {
          document.body.style.overflow = "hidden";
        } else {
          document.body.style.overflow = "";
        }
        return () => {
          document.body.style.overflow = "";
        };
      }, [isOpen]);

      const handleOverlayClick = (e) => {
        if (drawerRef.current && !drawerRef.current.contains(e.target) && onClose) {
          onClose();
        }
      };

      const handleQuantityChange = (id, value) => {
        const numericValue = Math.max(minQty, Math.min(maxQty, value));
        setItems((prevItems) =>
          prevItems.map((item) =>
            item.id === id ? { ...item, quantity: numericValue } : item
          )
        );
      };

      const handleRemoveItem = (id) => {
        setItems((prevItems) =>
          prevItems.map((item) =>
            item.id === id ? { ...item, isRemoving: true } : item
          )
        );
        setTimeout(() => {
          setItems((prevItems) => prevItems.filter((item) => item.id !== id));
        }, 300);
      };

      const subtotal = items.reduce(
        (acc, item) => acc + item.price * (item.quantity || 1),
        0
      );
      const totalQuantity = items.reduce(
        (acc, item) => acc + (item.quantity || 1),
        0
      );

      if (!isRendered) return null;

      return (
        <div
          className={`ease-drawer-overlay ease-fade-in ${
            slideDirection === "open" ? "active" : ""
          }`}
          onClick={handleOverlayClick}
          aria-hidden="true"
        >
          <aside
            ref={drawerRef}
            className={`ease-drawer-panel ${
              slideDirection === "open" ? "slide-in" : "slide-out"
            }`}
            role="dialog"
            aria-modal="true"
            aria-label="Shopping Cart Drawer"
            onClick={(e) => e.stopPropagation()}
          >
            <header className="ease-drawer-header ease-flex ease-justify-between ease-items-center">
              <div className="ease-flex ease-items-center ease-gap-2">
                <svg
                  className="ease-cart-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  strokeWidth="2"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                >
                  <circle cx="9" cy="21" r="1" />
                  <circle cx="20" cy="21" r="1" />
                  <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                </svg>
                <h2 className="ease-drawer-title">Shopping Cart</h2>
                {totalQuantity > 0 && (
                  <span className="ease-badge ease-badge-primary ease-pulse">
                    {totalQuantity}
                  </span>
                )}
              </div>
              <button
                className="ease-close-btn ease-center ease-hover-lift"
                onClick={onClose}
                aria-label="Close cart"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  strokeWidth="2.5"
                  strokeLinecap="round"
                  strokeLinejoin="round"
                  style={{ width: "20px", height: "20px" }}
                >
                  <line x1="18" y1="6" x2="6" y2="18" />
                  <line x1="6" y1="6" x2="18" y2="18" />
                </svg>
              </button>
            </header>

            <div className="ease-drawer-body">
              {items.length === 0 ? (
                <div className="ease-empty-cart ease-center ease-flex-col ease-fade-in">
                  <div className="ease-empty-icon-wrapper">
                    <svg
                      className="ease-empty-cart-svg"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      strokeWidth="1.5"
                      strokeLinecap="round"
                      strokeLinejoin="round"
                    >
                      <circle cx="9" cy="21" r="1" />
                      <circle cx="20" cy="21" r="1" />
                      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                    </svg>
                  </div>
                  <p className="ease-empty-text">Your shopping cart is empty</p>
                  <button
                    className="ease-shop-btn ease-btn ease-hover-lift"
                    onClick={onClose}
                  >
                    Continue Shopping
                  </button>
                </div>
              ) : (
                <ul className="ease-cart-list ease-stack">
                  {items.map((item) => (
                    <li
                      key={item.id}
                      className={`ease-cart-item ease-flex ease-gap-4 ${
                        item.isRemoving ? "ease-item-removing" : "ease-fade-in"
                      }`}
                    >
                      <div
                        className="ease-item-img-container"
                        style={{
                          background: item.bgColor || "var(--ease-color-neutral-100)",
                        }}
                      >
                        {item.image ? (
                          <img
                            className="ease-item-img"
                            src={item.image}
                            alt={item.name}
                          />
                        ) : (
                          <span className="ease-item-emoji">{item.emoji || "🎁"}</span>
                        )}
                      </div>

                      <div className="ease-item-details ease-flex-1 ease-flex ease-flex-col">
                        <div className="ease-flex ease-justify-between ease-items-start">
                          <div>
                            <h4 className="ease-item-name">{item.name}</h4>
                            {item.variant && (
                              <span className="ease-item-variant">{item.variant}</span>
                            )}
                          </div>
                          <button
                            className="ease-remove-btn ease-center ease-hover-lift"
                            onClick={() => handleRemoveItem(item.id)}
                            aria-label={`Remove ${item.name}`}
                          >
                            <svg
                              viewBox="0 0 24 24"
                              fill="none"
                              stroke="currentColor"
                              strokeWidth="2"
                              strokeLinecap="round"
                              strokeLinejoin="round"
                              style={{ width: "16px", height: "16px" }}
                            >
                              <polyline points="3 6 5 6 21 6" />
                              <path d="M19 6l-1 14H6L5 6" />
                              <path d="M10 11v6M14 11v6" />
                              <path d="M9 6V4h6v2" />
                            </svg>
                          </button>
                        </div>

                        <div className="ease-item-price-row ease-flex ease-justify-between ease-items-center">
                          <span className="ease-item-price">
                            {currency}
                            {(item.price * (item.quantity || 1)).toFixed(2)}
                          </span>
                          <span className="ease-item-unit-price">
                            ({currency}
                            {item.price.toFixed(2)} each)
                          </span>
                        </div>

                        <div className="ease-qty-control-section ease-flex ease-items-center ease-gap-2">
                          <div className="ease-qty-stepper ease-flex ease-items-center">
                            <button
                              className="ease-qty-step-btn"
                              disabled={item.quantity <= minQty}
                              onClick={() =>
                                handleQuantityChange(item.id, item.quantity - 1)
                              }
                              aria-label="Decrease quantity"
                            >
                              &minus;
                            </button>
                            <div className="ease-qty-num-wrapper">
                              <span
                                key={item.quantity}
                                className="ease-qty-num ease-fade-in"
                              >
                                {item.quantity}
                              </span>
                            </div>
                            <button
                              className="ease-qty-step-btn"
                              disabled={item.quantity >= maxQty}
                              onClick={() =>
                                handleQuantityChange(item.id, item.quantity + 1)
                              }
                              aria-label="Increase quantity"
                            >
                              +
                            </button>
                          </div>

                          <div className="ease-qty-slider-container ease-flex-1 ease-flex ease-items-center">
                            <input
                              type="range"
                              min={minQty}
                              max={maxQty}
                              value={item.quantity || 1}
                              onChange={(e) =>
                                handleQuantityChange(
                                  item.id,
                                  parseInt(e.target.value, 10)
                                )
                              }
                              className="ease-qty-range-slider"
                              aria-label={`Quantity slider for ${item.name}`}
                            />
                          </div>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {items.length > 0 && (
              <footer className="ease-drawer-footer ease-stack-sm">
                <div className="ease-divider" />
                <div className="ease-subtotal-row ease-flex ease-justify-between ease-items-center">
                  <span className="ease-subtotal-label">Subtotal</span>
                  <span className="ease-subtotal-value">
                    {currency}
                    {subtotal.toFixed(2)}
                  </span>
                </div>
                <p className="ease-shipping-hint">
                  Shipping, taxes, and discounts calculated at checkout.
                </p>
                <button
                  className="ease-checkout-btn ease-btn ease-hover-lift"
                  onClick={() => onCheckout && onCheckout(items)}
                >
                  Proceed to Checkout
                </button>
              </footer>
            )}
          </aside>
        </div>
      );
    }

    // --- Demo Application ---
    const INITIAL_ITEMS = [
      {
        id: 1,
        name: "Pro Sound-Cancelling Over-Ears",
        variant: "Midnight Purple",
        price: 249.99,
        quantity: 1,
        emoji: "🎧",
        bgColor: "linear-gradient(135deg, #a09af8 0%, #6c63ff 100%)"
      },
      {
        id: 2,
        name: "Premium Mechanical Numpad Keyboard",
        variant: "Hot-swappable Custom",
        price: 159.50,
        quantity: 2,
        emoji: "⌨️",
        bgColor: "linear-gradient(135deg, #a78bfa 0%, #8b5cf6 100%)"
      },
      {
        id: 3,
        name: "Vibrant Qi2 Ambient Wireless Charger",
        price: 49.00,
        quantity: 1,
        emoji: "🔋",
        bgColor: "linear-gradient(135deg, #86efac 0%, #15803d 100%)"
      }
    ];

    function App() {
      const [isOpen, setIsOpen] = useState(false);
      const [cartItems, setCartItems] = useState(INITIAL_ITEMS);

      const totalQuantity = cartItems.reduce((acc, item) => acc + item.quantity, 0);

      const handleCheckout = (finalItems) => {
        const subtotal = finalItems.reduce((acc, item) => acc + (item.price * item.quantity), 0).toFixed(2);
        alert(`🎉 Checkout successful!\nSubtotal: $${subtotal}\nItems: ${finalItems.length}`);
        setIsOpen(false);
      };

      return (
        <div className="demo-card">
          <span className="framework-badge">EaseMotion CSS Integration</span>
          <h1>ShoppingCart Drawer</h1>
          <p className="subtitle">
            Experience the React Shopping Cart Drawer component. Modify item quantities using either the step controls (+/-) or custom sliders, and view changes synchronizing in real-time.
          </p>
          
          <button className="open-btn" onClick={() => setIsOpen(true)}>
            View Shopping Cart
            {totalQuantity > 0 && <span className="badge-indicator">{totalQuantity}</span>}
          </button>

          <ShoppingCartDrawer
            isOpen={isOpen}
            onClose={() => setIsOpen(false)}
            initialCartItems={cartItems}
            onCheckout={handleCheckout}
            currency="$"
            minQty={1}
            maxQty={10}
          />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
