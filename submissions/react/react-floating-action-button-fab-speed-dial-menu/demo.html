<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React FAB Speed Dial Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8fafc;
      min-height: 100vh;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    #root {
      width: 100%;
      height: 100vh;
      position: relative;
    }
    
    .demo-content {
      padding: 2rem;
      text-align: center;
    }
    
    .fab-placement {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const FabAction = ({ action, index, isOpen, onClick }) => {
      return (
        <div 
          className={`ease-fab-action-wrapper ${isOpen ? 'is-open' : ''}`}
          style={{ transitionDelay: `${isOpen ? index * 40 : 0}ms` }}
        >
          <span className="ease-fab-tooltip">{action.label}</span>
          <button
            className="ease-fab-action-btn"
            onClick={() => onClick(action.id)}
            aria-label={action.label}
            tabIndex={isOpen ? 0 : -1}
          >
            {action.icon}
          </button>
        </div>
      );
    };

    const FabSpeedDial = ({ actions = [], onActionClick, direction = 'up' }) => {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = useRef(null);

      useEffect(() => {
        const handleClickOutside = (event) => {
          if (containerRef.current && !containerRef.current.contains(event.target)) {
            setIsOpen(false);
          }
        };
        
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const handleActionClick = (actionId) => {
        if (onActionClick) onActionClick(actionId);
        setIsOpen(false);
      };

      return (
        <div className={`ease-fab-container dir-${direction}`} ref={containerRef}>
          <div className={`ease-fab-actions ${isOpen ? 'is-open' : ''}`} aria-hidden={!isOpen}>
            {actions.map((action, index) => (
              <FabAction 
                key={action.id}
                action={action}
                index={actions.length - 1 - index}
                isOpen={isOpen}
                onClick={handleActionClick}
              />
            ))}
          </div>

          <button 
            className={`ease-fab-main-btn ${isOpen ? 'is-open' : ''}`}
            onClick={() => setIsOpen(!isOpen)}
            aria-expanded={isOpen}
            aria-haspopup="menu"
            aria-label="Toggle speed dial"
          >
            <div className="ease-fab-icon-wrapper">
              <svg 
                className="ease-fab-icon-plus" 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2.5" 
                strokeLinecap="round" 
                strokeLinejoin="round"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </div>
          </button>
        </div>
      );
    };

    const App = () => {
      const [lastAction, setLastAction] = useState('None');

      const actions = [
        { 
          id: 'copy', 
          label: 'Copy link', 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 
        },
        { 
          id: 'save', 
          label: 'Save draft', 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg> 
        },
        { 
          id: 'share', 
          label: 'Share document', 
          icon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> 
        }
      ];

      return (
        <div>
          <div className="demo-content">
            <h1 style={{color: '#1e293b', marginBottom: '0.5rem'}}>FAB Speed Dial Menu</h1>
            <p style={{color: '#64748b'}}>Click the floating button in the bottom right.</p>
            <p style={{fontFamily: 'monospace', marginTop: '2rem', color: '#3b82f6'}}>
              Last Action Clicked: {lastAction}
            </p>
          </div>
          
          <div className="fab-placement">
            <FabSpeedDial 
              actions={actions}
              direction="up"
              onActionClick={(id) => setLastAction(id)}
            />
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
