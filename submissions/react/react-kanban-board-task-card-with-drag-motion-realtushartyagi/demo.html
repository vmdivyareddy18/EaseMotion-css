<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Kanban Board Task Card with Drag Motion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <!-- React and Babel CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 60px;
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      min-height: 100vh;
    }
    .board-column {
      background: #e5e7eb;
      padding: 16px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 400px;
      width: 320px;
      box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
    }
    .column-header {
      font-weight: 700;
      color: #374151;
      margin: 0 0 8px 0;
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import KanbanTaskCard from "./KanbanTaskCard.jsx";

    function Demo() {
      return (
        <div>
          <h2>Kanban Task Card Drag Demo</h2>
          <p style={{ color: '#4b5563', marginBottom: '32px' }}>
            Click and drag the cards to see the smooth EaseMotion scale and tilt effect.
          </p>
          <div className="board-column">
            <h3 className="column-header">In Progress</h3>
            
            <KanbanTaskCard 
              id="task-1"
              title="Design System Update"
              description="Update the core UI components to match the new brand guidelines and improve accessibility."
              tags={[{ label: 'Design', color: '#fca5a5' }, { label: 'High Priority', color: '#fcd34d' }]}
              avatar="https://i.pravatar.cc/150?img=5"
            />

            <KanbanTaskCard 
              id="task-2"
              title="Fix Navigation Bug"
              description="Resolve the issue where the mobile menu does not close after clicking a link."
              tags={[{ label: 'Bug', color: '#93c5fd' }]}
              avatar="https://i.pravatar.cc/150?img=11"
            />
          </div>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
