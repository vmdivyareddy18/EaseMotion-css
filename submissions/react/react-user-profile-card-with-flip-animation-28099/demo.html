<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Profile Card Flip Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }
    
    .demo-wrapper {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    /* ── ProfileCard Component ── */
    const ProfileCard = ({ avatarUrl, name, role, bio, stats = [], socials = [], color = '#3b82f6' }) => {
      const [isFlipped, setIsFlipped] = useState(false);
      const toggleFlip = () => setIsFlipped(prev => !prev);

      return (
        <div className="ease-profile-card-scene" style={{ '--ease-pc-color': color }}>
          <div className={`ease-profile-card-inner ${isFlipped ? 'is-flipped' : ''}`}>
            
            {/* Front */}
            <div className="ease-profile-card-face ease-profile-card-front">
              <div className="ease-pc-header">
                <div className="ease-pc-avatar">
                  <img src={avatarUrl} alt={name} />
                </div>
              </div>
              <div className="ease-pc-body">
                <h2 className="ease-pc-name">{name}</h2>
                <span className="ease-pc-role">{role}</span>
                <p className="ease-pc-bio">{bio}</p>
                {stats.length > 0 && (
                  <div className="ease-pc-stats">
                    {stats.map((s, i) => (
                      <div key={i} className="ease-pc-stat">
                        <span className="ease-pc-stat-val">{s.value}</span>
                        <span className="ease-pc-stat-label">{s.label}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
              <div className="ease-pc-footer">
                <button className="ease-pc-btn-primary">Follow</button>
                <button className="ease-pc-btn-secondary" onClick={toggleFlip}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
                </button>
              </div>
            </div>

            {/* Back */}
            <div className="ease-profile-card-face ease-profile-card-back">
              <div className="ease-pc-back-header">
                <button className="ease-pc-btn-back" onClick={toggleFlip}>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
                </button>
                <h3 className="ease-pc-back-title">Connect</h3>
              </div>
              <div className="ease-pc-back-body">
                <div className="ease-pc-socials">
                  {socials.map((social, i) => (
                    <a key={i} href={social.link} className="ease-pc-social-link" style={{ '--social-delay': `${i * 0.1}s` }}>
                      {social.icon}
                      <span className="ease-pc-social-name">{social.platform}</span>
                    </a>
                  ))}
                </div>
                <div className="ease-pc-contact">
                  <button className="ease-pc-btn-primary ease-pc-btn-full">Send Message</button>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    };

    /* ── Demo Icons ── */
    const IcoTwitter = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg>;
    const IcoGithub = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>;
    const IcoLinkedin = <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>;

    /* ── App ── */
    const App = () => {
      const user1 = {
        avatarUrl: 'https://i.pravatar.cc/150?img=33',
        name: 'Alex Rivera',
        role: 'Senior Motion Designer',
        bio: 'Crafting fluid digital experiences and physics-based interactions for the modern web.',
        color: '#8b5cf6', // Purple
        stats: [
          { label: 'Followers', value: '12.4K' },
          { label: 'Projects', value: '142' },
          { label: 'Rating', value: '4.9' },
        ],
        socials: [
          { platform: 'Twitter', link: '#', icon: IcoTwitter },
          { platform: 'GitHub', link: '#', icon: IcoGithub },
          { platform: 'LinkedIn', link: '#', icon: IcoLinkedin },
        ]
      };

      const user2 = {
        avatarUrl: 'https://i.pravatar.cc/150?img=47',
        name: 'Sarah Chen',
        role: 'Frontend Architect',
        bio: 'Building scalable design systems and reusable component libraries.',
        color: '#10b981', // Green
        stats: [
          { label: 'Followers', value: '8.1K' },
          { label: 'Commits', value: '2.4K' },
        ],
        socials: [
          { platform: 'GitHub', link: '#', icon: IcoGithub },
          { platform: 'Twitter', link: '#', icon: IcoTwitter },
        ]
      };

      return (
        <div className="demo-wrapper">
          <ProfileCard {...user1} />
          <ProfileCard {...user2} />
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
