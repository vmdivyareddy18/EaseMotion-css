<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - React Animated Breadcrumb</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import Breadcrumb from './Breadcrumb.jsx';

        const App = () => {
            const paths = [
                { label: 'Dashboard', href: '#' },
                { label: 'Products', href: '#' },
                { label: 'Categories', href: '#' },
                { label: 'Electronics', href: '#' },
                { label: 'Smartphones' } // Current page (no href)
            ];

            return (
                <div className="demo-container ease-fade-in">
                    <h2 className="demo-title">Navigation Path</h2>
                    
                    <Breadcrumb items={paths} staggerDelay={80} />
                    
                    <div style={{ marginTop: '2rem', padding: '1.5rem', background: 'rgba(255,255,255,0.02)', borderRadius: '8px', color: '#94a3b8' }}>
                        <p style={{ margin: 0, fontSize: '0.95rem', lineHeight: '1.6' }}>
                            Notice how each breadcrumb segment utilizes <code>.ease-slide-up</code> layered with a programmatic 
                            React style inject for <code>animationDelay: (index * 80ms)</code> to create the cascading entry sequence.
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
