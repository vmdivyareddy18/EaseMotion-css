<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>React Split View Resizable Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      box-sizing: border-box;
      min-height: 100vh;
    }
    h2 { color: #111827; margin-bottom: 8px; }
    .demo-subtitle { color: #6b7280; margin-bottom: 24px; }
    .demo-wrapper { width: 100%; max-width: 900px; height: 480px; border-radius: 12px; overflow: hidden; }
    .panel-content { padding: 24px; height: 100%; box-sizing: border-box; overflow: auto; }
    .panel-left { background: #f9fafb; }
    .panel-right { background: #ffffff; }
    h3 { margin-top: 0; color: #1f2937; }
    p { color: #6b7280; line-height: 1.6; }
    ul { color: #374151; }
    code {
      display: block;
      background: #1f2937;
      color: #f9fafb;
      padding: 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-top: 16px;
      white-space: pre;
    }
  </style>
</head>
<body>
  <h2>Split View Resizable Panel</h2>
  <p class="demo-subtitle">Drag the blue divider to resize the panels.</p>
  <div class="demo-wrapper" id="root"></div>

  <script type="text/babel" src="./SplitView.jsx"></script>
  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    const SplitViewComponent = window.SplitView || (({ leftPanel, rightPanel, defaultSplit = 50, minSize = 15, maxSize = 85, direction = 'horizontal' }) => {
      const [splitPercent, setSplitPercent] = useState(defaultSplit);
      const [isDragging, setIsDragging] = useState(false);
      const containerRef = useRef(null);

      const handleMouseDown = (e) => { e.preventDefault(); setIsDragging(true); };
      const handleMouseUp = () => setIsDragging(false);
      const handleMouseMove = useCallback((e) => {
        if (!isDragging || !containerRef.current) return;
        const rect = containerRef.current.getBoundingClientRect();
        let np = direction === 'horizontal'
          ? ((e.clientX - rect.left) / rect.width) * 100
          : ((e.clientY - rect.top) / rect.height) * 100;
        setSplitPercent(Math.max(minSize, Math.min(maxSize, np)));
      }, [isDragging, direction, minSize, maxSize]);

      useEffect(() => {
        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleMouseUp);
        } else {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        }
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        };
      }, [isDragging, handleMouseMove]);

      const isH = direction === 'horizontal';
      const firstStyle = isH ? { width: `${splitPercent}%` } : { height: `${splitPercent}%` };
      const secondStyle = isH ? { width: `${100 - splitPercent}%` } : { height: `${100 - splitPercent}%` };

      return (
        <div ref={containerRef} className={`ease-split-container ease-split-${direction} ${isDragging ? 'is-dragging' : ''}`}>
          <div className="ease-split-panel ease-panel-first" style={firstStyle}>{leftPanel}</div>
          <div className={`ease-split-divider ease-split-divider-${direction} ${isDragging ? 'is-active' : ''}`}
            onMouseDown={handleMouseDown} role="separator" tabIndex={0}>
            <div className="ease-divider-handle">
              <span className="ease-handle-dot"></span>
              <span className="ease-handle-dot"></span>
              <span className="ease-handle-dot"></span>
            </div>
          </div>
          <div className="ease-split-panel ease-panel-second" style={secondStyle}>{rightPanel}</div>
        </div>
      );
    });

    const LeftContent = () => (
      <div className="panel-content panel-left">
        <h3>📂 File Explorer</h3>
        <p>Drag the divider to resize the two panels fluidly.</p>
        <ul>
          <li>SplitView.jsx</li>
          <li>style.css</li>
          <li>demo.html</li>
          <li>README.md</li>
        </ul>
      </div>
    );

    const RightContent = () => (
      <div className="panel-content panel-right">
        <h3>📝 Code Preview</h3>
        <p>This panel adjusts fluidly as you drag the blue divider.</p>
        <code>{`import SplitView from './SplitView';\nimport './style.css';\n\n<SplitView\n  leftPanel={<LeftPanel />}\n  rightPanel={<RightPanel />}\n  defaultSplit={40}\n  direction="horizontal"\n/>`}</code>
      </div>
    );

    const App = () => (
      <SplitViewComponent
        leftPanel={<LeftContent />}
        rightPanel={<RightContent />}
        defaultSplit={40}
        minSize={15}
        maxSize={85}
        direction="horizontal"
      />
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
