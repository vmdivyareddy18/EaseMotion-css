<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - React Animated Rating Stars</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import RatingStars from './RatingStars.jsx';

        const { useState } = React;

        const App = () => {
            const [rating, setRating] = useState(0);
            const [halfRating, setHalfRating] = useState(3.5);

            return (
                <div className="demo-wrapper">
                    <div className="demo-section ease-slide-up">
                        <h2 className="demo-title">Interactive Rating</h2>
                        <RatingStars 
                            value={rating} 
                            onChange={setRating} 
                            size="lg"
                        />
                        <div className="rating-value ease-fade-in" key={rating}>
                            {rating > 0 ? rating : '-'}
                        </div>
                    </div>

                    <div className="demo-section ease-slide-up" style={{ animationDelay: '200ms' }}>
                        <h2 className="demo-title">Half Stars Support</h2>
                        <RatingStars 
                            value={halfRating} 
                            onChange={setHalfRating}
                            allowHalf={true}
                            size="md"
                        />
                        <div className="rating-value ease-fade-in" key={halfRating}>
                            {halfRating}
                        </div>
                    </div>

                    <div className="demo-section ease-slide-up" style={{ animationDelay: '400ms' }}>
                        <h2 className="demo-title">Read-only State</h2>
                        <RatingStars 
                            value={4} 
                            readonly={true}
                            size="sm"
                        />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
