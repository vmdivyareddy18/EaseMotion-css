<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - React Animated Scroll To Top Button</title>
    
    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.min.css">
    
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & ReactDOM (Development) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX Compilation in Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import ScrollTopButton from './ScrollTopButton.jsx';

        const App = () => {
            return (
                <div className="demo-wrapper">
                    <header className="demo-header ease-slide-down">
                        <h1 className="demo-title">Scroll Down</h1>
                        <p className="demo-desc">
                            Scroll down the page to see the back-to-top button animate into view.
                        </p>
                        
                        <div className="scroll-indicator ease-fade-in" style={{ animationDelay: '1000ms' }}>
                            <span>Scroll</span>
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <polyline points="19 12 12 19 5 12"></polyline>
                            </svg>
                        </div>
                    </header>
                    
                    {/* The component handles its own mounting/unmounting lifecycle based on scroll */}
                    <ScrollTopButton threshold={300} position="bottom-right" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
