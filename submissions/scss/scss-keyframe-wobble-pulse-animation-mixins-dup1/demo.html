<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Keyframe Wobble & Pulse Animation Mixins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 3rem;">
    <h1 style="margin: 0 0 1rem 0;">Attention Keyframes</h1>
    <p style="margin: 0; opacity: 0.8; max-width: 600px; margin: auto;">Hover over the boxes to trigger the wobble and pulse animations.</p>
  </div>

  <div class="demo-container">
    
    <!-- Wobble on hover -->
    <div class="demo-box purple hover-ease-wobble">
      Hover:<br>Wobble
    </div>

    <!-- Heartbeat on hover -->
    <div class="demo-box pink hover-ease-pulse-heartbeat">
      Hover:<br>Heartbeat
    </div>

    <!-- Soft Pulse on hover (continuous) -->
    <div class="demo-box hover-ease-pulse-soft">
      Hover:<br>Soft Pulse
    </div>

  </div>

</body>
</html>
