<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Border Draw & Glow — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1 class="demo-title">Animated Border Draw & Glow</h1>
  <p class="demo-subtitle">
    Reusable SCSS mixins that draw a border sequentially and add a pulsing glow halo.
  </p>

  <h2 class="demo-title" style="font-size: 1.15rem;">1. Border Draw Only</h2>
  <div class="demo-row" id="row-border">
    <div class="demo-box ease-border-draw">Border Draw</div>
  </div>

  <h2 class="demo-title" style="font-size: 1.15rem;">2. Glow Pulse Only</h2>
  <div class="demo-row" id="row-glow">
    <div class="demo-box ease-glow-pulse">Glow Pulse</div>
  </div>

  <h2 class="demo-title" style="font-size: 1.15rem;">3. Border + Glow Combo</h2>
  <div class="demo-row" id="row-combo">
    <div class="demo-box ease-border-glow">Border + Glow</div>
  </div>

  <button class="replay-btn" id="replayBtn">🔄 Replay Animations</button>

  <script>
    const btn = document.getElementById('replayBtn');
    const rows = ['row-border', 'row-glow', 'row-combo'].map(id => document.getElementById(id));

    btn.addEventListener('click', () => {
      rows.forEach(row => {
        [...row.children].forEach(el => {
          el.style.animation = 'none';
          void el.offsetWidth;
          el.style.animation = '';
        });
      });
    });
  </script>

</body>
</html>
