<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Button Ripple Effects Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 3rem;">
    <h1 style="margin: 0 0 1rem 0;">Ripple Micro-Interactions</h1>
    <p style="margin: 0; opacity: 0.8; max-width: 600px; margin: auto;">Click the buttons below to see the CSS-only ripple effects.</p>
  </div>

  <div class="demo-container">
    
    <!-- Light Ripple (White burst over dark button) -->
    <button class="ease-ripple-light">
      Primary Action
    </button>

    <!-- Dark Ripple (Dark burst over light button) -->
    <button class="ease-ripple-dark">
      Secondary Action
    </button>

  </div>

</body>
</html>
