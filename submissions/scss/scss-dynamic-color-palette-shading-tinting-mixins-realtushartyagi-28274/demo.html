<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SCSS Utility: Dynamic Color Palette Shading & Tinting Mixins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0; padding: 40px;
      background: #f9fafb;
    }
    h1, h2 { color: #111827; }
    .palette {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 40px;
    }
    .swatch {
      width: 100px;
      height: 100px;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      font-weight: 600;
      font-size: 0.9rem;
    }
    .dark-text { color: #111827; }
    .light-text { color: #ffffff; }
  </style>
</head>
<body>
  <h1>Dynamic SCSS Color Palettes</h1>
  <p>These swatches are rendered using classes generated by the <code>ease-generate-palette</code> SCSS mixin.</p>
  
  <h2>Primary Palette (Base: #3b82f6)</h2>
  <div class="palette">
    <div class="swatch ease-bg-primary-100 dark-text">100</div>
    <div class="swatch ease-bg-primary-200 dark-text">200</div>
    <div class="swatch ease-bg-primary-300 dark-text">300</div>
    <div class="swatch ease-bg-primary-400 dark-text">400</div>
    <div class="swatch ease-bg-primary-500 light-text">500 (Base)</div>
    <div class="swatch ease-bg-primary-600 light-text">600</div>
    <div class="swatch ease-bg-primary-700 light-text">700</div>
    <div class="swatch ease-bg-primary-800 light-text">800</div>
    <div class="swatch ease-bg-primary-900 light-text">900</div>
  </div>

  <h2>Accent Palette (Base: #14b8a6)</h2>
  <div class="palette">
    <div class="swatch ease-bg-accent-100 dark-text">100</div>
    <div class="swatch ease-bg-accent-200 dark-text">200</div>
    <div class="swatch ease-bg-accent-300 dark-text">300</div>
    <div class="swatch ease-bg-accent-400 dark-text">400</div>
    <div class="swatch ease-bg-accent-500 light-text">500 (Base)</div>
    <div class="swatch ease-bg-accent-600 light-text">600</div>
    <div class="swatch ease-bg-accent-700 light-text">700</div>
    <div class="swatch ease-bg-accent-800 light-text">800</div>
    <div class="swatch ease-bg-accent-900 light-text">900</div>
  </div>
</body>
</html>
