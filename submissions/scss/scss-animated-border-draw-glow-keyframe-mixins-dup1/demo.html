<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Animated Borders Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 4rem;">
    <h1 style="margin: 0 0 1rem 0;">Animated Borders</h1>
    <p style="margin: 0; opacity: 0.8; max-width: 600px; margin: auto;">Drawing and glowing border effects powered entirely by CSS pseudo-elements and keyframes.</p>
  </div>

  <div class="demo-container">
    
    <!-- Hover Draw -->
    <div class="demo-box ease-border-draw">
      <h3>Hover Me</h3>
      <p>Standard Draw</p>
    </div>

    <!-- Hover Draw Accent -->
    <div class="demo-box ease-border-draw-accent">
      <h3>Hover Me</h3>
      <p>Thick & Slow Draw</p>
    </div>

    <!-- Continuous Glow -->
    <div class="demo-box ease-border-glow">
      <h3>Continuous</h3>
      <p>Neon Glow</p>
    </div>

    <!-- Fast Glow -->
    <div class="demo-box ease-border-glow-success">
      <h3>Continuous</h3>
      <p>Fast Glow</p>
    </div>

  </div>

</body>
</html>
