<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Staggered Entrance Delays</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 2rem;">
    <h1 style="margin: 0 0 1rem 0;">Staggered Entrances</h1>
    <p style="margin: 0; opacity: 0.8;">Refresh the page to see the cascading list animation.</p>
  </div>

  <div class="demo-container">
    <ul class="demo-list">
      <!-- Use the base stagger item class + the specific delay number -->
      <li class="ease-stagger-item ease-delay-1">
        <span class="avatar"></span> Team Member Alpha
      </li>
      <li class="ease-stagger-item ease-delay-2">
        <span class="avatar" style="background:#ec4899"></span> Team Member Beta
      </li>
      <li class="ease-stagger-item ease-delay-3">
        <span class="avatar" style="background:#8b5cf6"></span> Team Member Gamma
      </li>
      <li class="ease-stagger-item ease-delay-4">
        <span class="avatar" style="background:#10b981"></span> Team Member Delta
      </li>
      <li class="ease-stagger-item ease-delay-5">
        <span class="avatar" style="background:#f59e0b"></span> Team Member Epsilon
      </li>
    </ul>
  </div>

</body>
</html>
