<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testing Card Hover Utility</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0f172a; 
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .demo-card {
      background: #1e293b;
      color: #f8fafc;
      padding: 3rem 2rem;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .demo-card h3 {
      margin: 0 0 10px 0;
      color: #38bdf8;
    }
    .demo-card p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="demo-card u-card-hover-tilt">
    <h3>3D Perspective Card</h3>
    <p>Hover over this card to watch the 3D depth, lift, and shadow tilt transitions work smoothly!</p>
  </div>

</body>
</html>
