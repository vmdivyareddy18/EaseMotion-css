<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SCSS Flexbox Mixins Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      margin: 0;
      background: #f8fafc;
      font-family: system-ui, sans-serif;
      padding: 2rem;
      color: #334155;
    }
    
    .demo-container {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .demo-box {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
    }

    .demo-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 16px 0;
      color: #0f172a;
    }

    .demo-item {
      background: #3b82f6;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
    }

    /* Used for demonstration */
    .demo-parent-fixed {
      height: 120px;
      background: #f1f5f9;
      border-radius: 8px;
      border: 1px dashed #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    
    <div class="demo-box">
      <h3 class="demo-title">flex-center()</h3>
      <div class="ease-flex-center demo-parent-fixed">
        <div class="demo-item">Centered</div>
      </div>
    </div>

    <div class="demo-box">
      <h3 class="demo-title">flex-between()</h3>
      <div class="ease-flex-between demo-parent-fixed" style="padding: 0 20px;">
        <div class="demo-item">Left</div>
        <div class="demo-item">Right</div>
      </div>
    </div>

    <div class="demo-box">
      <h3 class="demo-title">flex-around()</h3>
      <div class="ease-flex-around demo-parent-fixed">
        <div class="demo-item">Item 1</div>
        <div class="demo-item">Item 2</div>
        <div class="demo-item">Item 3</div>
      </div>
    </div>

    <div class="demo-box">
      <h3 class="demo-title">flex-gap($gap: 16px)</h3>
      <div class="ease-flex-gap-md demo-parent-fixed" style="padding: 20px; align-items: center;">
        <div class="demo-item">Item 1</div>
        <div class="demo-item">Item 2</div>
        <div class="demo-item">Item 3</div>
      </div>
    </div>

    <div class="demo-box">
      <h3 class="demo-title">flex-column(center, center)</h3>
      <div class="ease-flex-column-center demo-parent-fixed gap-2" style="gap: 12px;">
        <div class="demo-item">Top</div>
        <div class="demo-item">Bottom</div>
      </div>
    </div>

  </div>

</body>
</html>
