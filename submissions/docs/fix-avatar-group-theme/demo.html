<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS — Avatar Group Theme Adaptation Fix</title>
    <!-- Import Core Variables and Styles -->
    <link rel="stylesheet" href="../../../core/variables.css" />
    <link rel="stylesheet" href="../../../components/avatar.css" />
    <!-- Link the CSS overrides -->
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --ease-font-sans: "Inter", system-ui, -apple-system, sans-serif;
      }

      body {
        background-color: var(--ease-color-bg, #0b1121);
        color: var(--ease-color-text, #e2e8f0);
        font-family: var(--ease-font-sans);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        transition:
          background-color var(--ease-speed-medium, 300ms) var(--ease-ease),
          color var(--ease-speed-medium, 300ms) var(--ease-ease);
      }

      .demo-container {
        text-align: center;
        max-width: 600px;
        background: var(--ease-color-surface, #141e33);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--ease-radius-xl, 1.5rem);
        padding: 3rem 2rem;
        box-shadow: var(--ease-shadow-lg);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2rem;
        transition:
          background-color var(--ease-speed-medium, 300ms) var(--ease-ease),
          border-color var(--ease-speed-medium, 300ms) var(--ease-ease);
      }

      [data-theme="light"] .demo-container {
        border-color: rgba(0, 0, 0, 0.08);
      }

      .demo-title {
        font-size: 2rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6c63ff 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
      }

      .demo-description {
        font-size: 0.95rem;
        line-height: 1.6;
        color: var(--ease-color-muted, #94a3b8);
        margin: 0;
      }

      .btn-toggle {
        background: var(--ease-color-primary, #6c63ff);
        color: #ffffff;
        border: none;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 4px 14px rgba(108, 99, 255, 0.4);
      }

      .btn-toggle:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(108, 99, 255, 0.6);
      }

      .theme-indicator {
        display: inline-block;
        padding: 0.35rem 0.75rem;
        background: rgba(108, 99, 255, 0.1);
        border: 1px solid rgba(108, 99, 255, 0.2);
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--ease-color-primary, #6c63ff);
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <h1 class="demo-title">Avatar Group Theme Adaptation</h1>

      <p class="demo-description">
        Observe how the borders between overlapping avatars dynamically match
        the background theme. The avatar count badge also adapts to dark/light
        theme background and text colors correctly.
      </p>

      <!-- Standard Avatar Group -->
      <div class="ease-avatar-group">
        <div class="ease-avatar">
          <span style="font-size: 0.85rem">AD</span>
        </div>
        <div class="ease-avatar">
          <span style="font-size: 0.85rem">JD</span>
        </div>
        <div class="ease-avatar">
          <span style="font-size: 0.85rem">EM</span>
        </div>
        <div class="ease-avatar-group-count">+5</div>
      </div>

      <div>
        <button class="btn-toggle" onclick="toggleTheme()">Toggle Theme</button>
      </div>

      <div>
        <span class="theme-indicator" id="theme-status"
          >Active State: Dark Theme</span
        >
      </div>
    </div>

    <script>
      function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute("data-theme") || "dark";
        const target = current === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", target);

        // Update indicator text
        const indicator = document.getElementById("theme-status");
        indicator.textContent = `Active State: ${target.charAt(0).toUpperCase() + target.slice(1)} Theme`;
      }
    </script>
  </body>
</html>
