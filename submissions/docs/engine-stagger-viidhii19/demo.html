<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programmatic Stagger Delays</title>
    <!-- Local EaseMotion build -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="list-container">
        <ul id="list" em="stagger-150">
            <li class="ease-slide-up">Item 1</li>
            <li class="ease-slide-up">Item 2</li>
            <li class="ease-slide-up">Item 3</li>
            <li class="ease-slide-up">Item 4</li>
            <li class="ease-slide-up">Item 5</li>
        </ul>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const list = document.getElementById("list");
            const staggerAttr = list.getAttribute("em");

            if (staggerAttr && staggerAttr.startsWith("stagger-")) {
                const delayMs = staggerAttr.replace("stagger-", "");
                
                const style = document.createElement("style");
                style.textContent = `#list > *:nth-child(n) { animation-delay: calc(n * ${delayMs}ms); }`;
                
                document.head.appendChild(style);
            }
        });
    </script>
</body>
</html>
