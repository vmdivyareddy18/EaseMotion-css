<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toast — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 2rem; background: #f9fafb; color: #111; }
h1 { margin-bottom: .5rem; }
.btn-group { display: flex; flex-wrap: wrap; gap: .5rem; margin: 1.5rem 0; }
.btn { padding: .5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: .875rem; font-weight: 500; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #22c55e; color: #fff; }
.btn-error { background: #ef4444; color: #fff; }
.btn-warning { background: #f59e0b; color: #fff; }
.btn-outline { background: transparent; border: 1px solid #d1d5db; color: #374151; }
.btn-outline:hover { background: #f3f4f6; }
code { background: #e5e7eb; padding: .15em .4em; border-radius: 4px; font-size: .85em; }
.note { color: #6b7280; font-size: .875rem; margin-top: 1rem; }
</style>
</head>
<body>

<h1>Toast / Notification</h1>
<p>Click buttons to show toasts. Multiple toasts stack automatically.</p>

<div class="btn-group">
  <button class="btn btn-success" onclick="showToast('success')">Success</button>
  <button class="btn btn-error" onclick="showToast('error')">Error</button>
  <button class="btn btn-warning" onclick="showToast('warning')">Warning</button>
  <button class="btn btn-primary" onclick="showToast('info')">Info</button>
  <button class="btn btn-outline" onclick="document.querySelectorAll('.ease-toast').forEach(t => t.classList.add('is-dismissing'))">Dismiss All</button>
</div>

<div class="btn-group">
  <button class="btn btn-outline" onclick="setPosition('tr')">Top Right</button>
  <button class="btn btn-outline" onclick="setPosition('tl')">Top Left</button>
  <button class="btn btn-outline" onclick="setPosition('br')">Bottom Right</button>
  <button class="btn btn-outline" onclick="setPosition('bl')">Bottom Left</button>
  <button class="btn btn-outline" onclick="setPosition('tc')">Top Center</button>
  <button class="btn btn-outline" onclick="setPosition('bc')">Bottom Center</button>
</div>

<div class="ease-toast-container ease-toast-container-tr" id="container"></div>

<script>
let counter = 0;

function showToast(type) {
  const container = document.getElementById('container');
  const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
  const titles = { success: 'Saved', error: 'Error', warning: 'Warning', info: 'Info' };
  const descs = { success: 'Your changes were saved successfully.', error: 'Something went wrong. Please try again.', warning: 'Your session is about to expire.', info: 'You have 3 new notifications.' };
  counter++;
  const toast = document.createElement('div');
  toast.className = `ease-toast ease-toast-${type}`;
  toast.innerHTML = `
    <span class="ease-toast-icon">${icons[type]}</span>
    <div class="ease-toast-body">
      <div class="ease-toast-title">${titles[type]}</div>
      <div class="ease-toast-desc">${descs[type]}</div>
    </div>
    <button class="ease-toast-close" onclick="this.closest('.ease-toast').classList.add('is-dismissing')">×</button>
  `;
  container.appendChild(toast);
  setTimeout(() => toast.classList.add('is-dismissing'), 4000);
  setTimeout(() => toast.remove(), 4400);
}

function setPosition(pos) {
  const c = document.getElementById('container');
  c.className = `ease-toast-container ease-toast-container-${pos}`;
}
</script>

<div class="note">
  <strong>CSS Classes:</strong> <code>.ease-toast-container-{tl|tr|bl|br|tc|bc}</code> for positioning &bull;
  <code>.ease-toast-success</code> / <code>-error</code> / <code>-warning</code> / <code>-info</code> variants &bull;
  <code>.is-dismissing</code> for exit animation
</div>

</body>
</html>
