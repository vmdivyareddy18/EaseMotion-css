<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Filter — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-header ease-fade-in">
    <h1>Branch Filter</h1>
    <p>Select a branch below to filter job listings.</p>
  </div>

  <div class="filter-bar ease-slide-up ease-delay-100 ease-flex ease-gap-2 ease-items-center">
    <label for="branch-select" class="filter-label">Branch:</label>
    <select id="branch-select" class="filter-select">
      <option value="">All Branches</option>
      <option value="Computer Science">Computer Science</option>
      <option value="Information Technology">Information Technology</option>
      <option value="Electronics">Electronics</option>
      <option value="Mechanical">Mechanical</option>
    </select>
  </div>

  <div class="job-grid ease-grid ease-gap-4" id="job-grid"></div>

  <script>
    const jobs = [
      { title: "Frontend Developer", company: "Google", branch: "Computer Science" },
      { title: "Backend Engineer", company: "Microsoft", branch: "Computer Science" },
      { title: "Data Analyst", company: "Amazon", branch: "Information Technology" },
      { title: "IT Consultant", company: "Accenture", branch: "Information Technology" },
      { title: "Embedded Engineer", company: "Tesla", branch: "Electronics" },
      { title: "VLSI Engineer", company: "Intel", branch: "Electronics" },
      { title: "Hardware Engineer", company: "AMD", branch: "Electronics" },
      { title: "Mechanical Engineer", company: "Boeing", branch: "Mechanical" },
      { title: "Robotics Engineer", company: "Boston Dynamics", branch: "Mechanical" },
      { title: "Aerospace Engineer", company: "SpaceX", branch: "Mechanical" },
    ];

    const grid = document.getElementById("job-grid");
    const select = document.getElementById("branch-select");

    function render(jobs, delay = 0) {
      grid.innerHTML = jobs.length
        ? jobs.map((j, i) => `
          <div class="job-card ease-card ease-card-shadow ease-slide-up ease-delay-${(i % 3) * 100}">
            <h3>${j.title}</h3>
            <div class="company">${j.company}</div>
            <div class="branch-tag">${j.branch}</div>
          </div>
        `).join("")
        : '<div class="no-results">No jobs found for this branch.</div>';
    }

    select.addEventListener("change", () => {
      const branch = select.value;
      render(branch ? jobs.filter(j => j.branch === branch) : jobs);
    });

    render(jobs);
  </script>
</body>
</html>
