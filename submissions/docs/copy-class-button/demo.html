<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy Class Name Button Demo</title>
    <!-- Load EaseMotion CSS from CDN (or local if testing) -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <!-- Load the proposed feature CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f0e17;
            color: #fffffe;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .demo-container {
            background: #1e1d2b;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }
        .anim-cell {
            display: inline-block;
            margin: 1rem;
        }
        .anim-box {
            width: 100px;
            height: 100px;
            background: #6c63ff;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .tag {
            background: rgba(255,255,255,0.1);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-family: monospace;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="demo-container">
        <h2>Copy Class Name Button Demo</h2>
        <p>Hover and click the clipboard icon to copy the class name.</p>
        
        <div class="anim-cell">
            <div class="anim-box ease-fade-in">F</div>
            <span class="tag">
                ease-fade-in
                <button class="copy-btn" onclick="copyClassName('ease-fade-in', this)" aria-label="Copy class name">📋</button>
            </span>
        </div>
        
        <div class="anim-cell">
            <div class="anim-box ease-bounce">↕</div>
            <span class="tag">
                ease-bounce
                <button class="copy-btn" onclick="copyClassName('ease-bounce', this)" aria-label="Copy class name">📋</button>
            </span>
        </div>
    </div>

    <script>
        function copyClassName(className, btn) {
            navigator.clipboard.writeText(className).then(() => {
                if (btn) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = "✓";
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 1500);
                }
                console.log("Class name copied: " + className);
            }).catch(err => {
                console.error("Failed to copy text: ", err);
            });
        }
    </script>
</body>
</html>
