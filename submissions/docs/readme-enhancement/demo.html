<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS Documentation Demo</title>

    <link rel="stylesheet" href="style.css">

    <!-- Replace with actual library path -->
    <link rel="stylesheet" href="../../css/easemotion.css">
</head>
<body>

<header>
    <h1>EaseMotion CSS</h1>
    <p>Animation Documentation Demo</p>
</header>

<div class="container">

    <div class="card">
        <h2>Fade In</h2>
        <button class="demo-btn fade-in">
            Fade In
        </button>
    </div>

    <div class="card">
        <h2>Bounce</h2>
        <button class="demo-btn bounce">
            Bounce
        </button>
    </div>

    <div class="card">
        <h2>Slide Left</h2>
        <button class="demo-btn slide-left">
            Slide
        </button>
    </div>

    <div class="card">
        <h2>Zoom In</h2>
        <button class="demo-btn zoom-in">
            Zoom
        </button>
    </div>

</div>

<footer>
    Documentation Enhancement Submission
</footer>

</body>
</html>
