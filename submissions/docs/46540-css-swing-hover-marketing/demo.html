<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketing Landing Page Swing-Hover Popover</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top left, #fff 0%, #f5f3ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      color: #0f172a;
    }
    .landing-section {
      text-align: center;
      max-width: 600px;
      padding: 40px 20px;
    }
    h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.03em; margin: 0 0 16px 0; line-height: 1.15; }
    h1 span { background: linear-gradient(135deg, #ff007a 0%, #7928ca 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.lead { color: #475569; font-size: 1.1rem; margin-bottom: 40px; line-height: 1.6; }
  </style>
</head>
<body>

  <div class="landing-section">
    <h1>Scale Your Business <span>Effortlessly</span></h1>
    <p class="lead">Unlock next-generation conversion growth structures with zero runtime lag. Hover over the feature button below to see the magic.</p>

    <!-- Pure CSS Marketing Popover -->
    <div class="mkt-popover-wrapper" tabindex="0">
      <button class="mkt-trigger" aria-haspopup="true">
        See Bonus Features 🌟
      </button>
      
      <div class="mkt-popover-content" role="tooltip">
        <h4 style="margin: 0 0 8px 0; font-size: 1.1rem; font-weight: 700; color: #ff007a;">Supercharged Yields</h4>
        <p style="margin: 0 0 16px 0; font-size: 0.875rem; color: #475569; text-align: left; line-height: 1.5;">Get access to custom referral plans, weekly optimization audits, and dedicated priority queues.</p>
        <hr style="border: 0; border-top: 1px solid #f1f5f9; margin-bottom: 16px;">
        <div style="text-align: center;">
          <a href="#" style="display: inline-block; background: #0f172a; color: white; text-decoration: none; font-size: 0.8rem; font-weight: 600; padding: 8px 16px; border-radius: 30px;">Get Started Free</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
