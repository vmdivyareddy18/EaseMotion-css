<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS — Interactive Animation Playground</title>

    <!-- Font and Stylesheet -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />

    <!-- Inline theme initializer to avoid flashing -->
    <script>
      (function () {
        var savedTheme = localStorage.getItem("em-playground-theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);
      })();
    </script>
  </head>
  <body>
    <div class="container">
      <!-- Playground Header -->
      <header class="playground-header">
        <div>
          <h1 class="anim-shimmer-text">EaseMotion Playground</h1>
          <p class="subtitle">
            Search, filter, preview, and copy animations seamlessly.
          </p>
        </div>

        <!-- Theme Switcher -->
        <button
          id="themeToggleBtn"
          class="theme-toggle-btn"
          aria-label="Toggle light/dark theme"
          title="Toggle theme"
        >
          <!-- Sun Icon -->
          <svg
            class="sun-icon"
            viewBox="0 0 24 24"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <!-- Moon Icon -->
          <svg
            class="moon-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </header>

      <!-- Prominent Active Preview Hero Section -->
      <section class="hero-preview-container">
        <div class="hero-info">
          <span class="hero-tag" id="heroCategory">Category</span>
          <h2 class="hero-title" id="heroTitle">ease-fade-in</h2>
          <p class="hero-desc" id="heroDesc">Fades in from 0 to 1 opacity.</p>
          <div class="hero-actions">
            <button class="btn btn-primary" id="heroCopyBtn">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                ></path>
              </svg>
              Copy Class
            </button>
            <button class="btn btn-secondary" id="heroReplayBtn">
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"
                ></path>
              </svg>
              Replay
            </button>
          </div>
        </div>

        <div class="hero-visual">
          <div class="hero-demo-box" id="heroDemoBox">Target</div>
        </div>
      </section>

      <!-- Filter and Search Controls -->
      <section class="controls-bar">
        <!-- Search Input -->
        <div class="search-wrapper">
          <svg
            class="search-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search animations by name or description..."
            aria-label="Search animations"
          />
        </div>

        <!-- Category Pills -->
        <div class="category-tabs" id="categoryTabs">
          <button class="category-tab active" data-category="all">
            All Categories
          </button>
          <button class="category-tab" data-category="fade">Fade</button>
          <button class="category-tab" data-category="slide">Slide</button>
          <button class="category-tab" data-category="scale">Scale</button>
          <button class="category-tab" data-category="rotate">Rotate</button>
          <button class="category-tab" data-category="bounce">Bounce</button>
          <button class="category-tab" data-category="attention">
            Attention Seekers
          </button>
        </div>
      </section>

      <!-- Animation Card Grid -->
      <main class="animation-grid" id="animationGrid">
        <!-- Dynamically Injected Cards -->
      </main>

      <!-- Empty/No Results View -->
      <div class="no-results-state" id="noResultsState">
        <h3>No animations found</h3>
        <p>Try refining your search term or selecting a different category.</p>
      </div>
    </div>

    <!-- Toast Notification System -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Interactive JavaScript Controllers -->
    <script>
      // Comprehensive catalog of playground animations
      const animations = [
        {
          name: "ease-fade-in",
          category: "fade",
          description: "Smoothly fades in the element and scales up slightly.",
          className: "anim-fade-in",
        },
        {
          name: "ease-fade-out",
          category: "fade",
          description:
            "Smoothly fades out the element and scales down slightly.",
          className: "anim-fade-out",
        },
        {
          name: "ease-slide-up",
          category: "slide",
          description: "Slides the element up into position while fading in.",
          className: "anim-slide-up",
        },
        {
          name: "ease-slide-down",
          category: "slide",
          description: "Slides the element down into position while fading in.",
          className: "anim-slide-down",
        },
        {
          name: "ease-slide-in-left",
          category: "slide",
          description: "Slides the element in from the left side.",
          className: "anim-slide-in-left",
        },
        {
          name: "ease-slide-in-right",
          category: "slide",
          description: "Slides the element in from the right side.",
          className: "anim-slide-in-right",
        },
        {
          name: "ease-zoom-in",
          category: "scale",
          description: "Gradually zooms the element in with a spring effect.",
          className: "anim-zoom-in",
        },
        {
          name: "ease-zoom-out",
          category: "scale",
          description: "Gradually zooms the element out into transparency.",
          className: "anim-zoom-out",
        },
        {
          name: "ease-rotate",
          category: "rotate",
          description:
            "Continuously rotates the element in a clockwise direction.",
          className: "anim-rotate",
        },
        {
          name: "ease-flip",
          category: "rotate",
          description: "Flips the element 360-degrees on its vertical axis.",
          className: "anim-flip",
        },
        {
          name: "ease-bounce",
          category: "bounce",
          description:
            "Plays a persistent, playful bouncing motion on the Y-axis.",
          className: "anim-bounce",
        },
        {
          name: "ease-bounce-in",
          category: "bounce",
          description:
            "Fades in the element with an organic bouncing impact scale.",
          className: "anim-bounce-in",
        },
        {
          name: "ease-pulse",
          category: "attention",
          description:
            "Creates a gentle, breathing scaling effect to draw attention.",
          className: "anim-pulse",
        },
        {
          name: "ease-ping",
          category: "attention",
          description: "Creates a radar-like scaling out signal effect.",
          className: "anim-ping",
        },
        {
          name: "ease-shake",
          category: "attention",
          description:
            "Shakes the element side-to-side dynamically on focus or error.",
          className: "anim-shake",
        },
      ];

      document.addEventListener("DOMContentLoaded", () => {
        // DOM Elements Cache
        const grid = document.getElementById("animationGrid");
        const searchInput = document.getElementById("searchInput");
        const categoryTabs = document.getElementById("categoryTabs");
        const noResultsState = document.getElementById("noResultsState");

        const heroTitle = document.getElementById("heroTitle");
        const heroCategory = document.getElementById("heroCategory");
        const heroDesc = document.getElementById("heroDesc");
        const heroDemoBox = document.getElementById("heroDemoBox");
        const heroReplayBtn = document.getElementById("heroReplayBtn");
        const heroCopyBtn = document.getElementById("heroCopyBtn");
        const toastContainer = document.getElementById("toastContainer");
        const themeToggleBtn = document.getElementById("themeToggleBtn");

        // App State
        let activeCategory =
          localStorage.getItem("em-playground-category") || "all";
        let searchQuery = localStorage.getItem("em-playground-search") || "";
        let selectedAnimationName =
          localStorage.getItem("em-playground-selected") || "ease-fade-in";

        // Initialize Inputs
        searchInput.value = searchQuery;

        // ── Render Category Tabs ───────────────────────────────────────────
        function updateCategoryTabsUI() {
          document.querySelectorAll(".category-tab").forEach((tab) => {
            if (tab.dataset.category === activeCategory) {
              tab.classList.add("active");
            } else {
              tab.classList.remove("active");
            }
          });
        }

        categoryTabs.addEventListener("click", (e) => {
          const tab = e.target.closest(".category-tab");
          if (!tab) return;

          activeCategory = tab.dataset.category;
          localStorage.setItem("em-playground-category", activeCategory);

          updateCategoryTabsUI();
          renderGrid();
        });

        // ── Toast Notification System ─────────────────────────────────────
        function showToast(message) {
          const toast = document.createElement("div");
          toast.className = "toast";
          toast.innerHTML = `
          <svg class="toast-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span>${message}</span>
        `;

          toastContainer.appendChild(toast);

          // Force reflow
          void toast.offsetWidth;
          toast.classList.add("show");

          // Auto remove toast
          setTimeout(() => {
            toast.classList.remove("show");
            toast.addEventListener("transitionend", () => {
              toast.remove();
            });
          }, 2500);
        }

        // ── Copy Utility ──────────────────────────────────────────────────
        function copyToClipboard(text) {
          navigator.clipboard
            .writeText(text)
            .then(() => {
              showToast(`Copied <strong>${text}</strong> to clipboard!`);
            })
            .catch((err) => {
              console.error("Failed to copy: ", err);
            });
        }

        // ── Replay Animation ──────────────────────────────────────────────
        function triggerBoxAnimation(element, animClass) {
          // Reset classes
          element.className = element.className.split(" ")[0]; // Keep initial class

          // Force reflow
          void element.offsetWidth;

          // Apply animation class
          element.classList.add(animClass);
        }

        // ── Selection Logic ───────────────────────────────────────────────
        function selectAnimation(anim) {
          selectedAnimationName = anim.name;
          localStorage.setItem("em-playground-selected", selectedAnimationName);

          // Highlight selected card
          document.querySelectorAll(".animation-card").forEach((card) => {
            if (card.dataset.name === anim.name) {
              card.classList.add("active");
            } else {
              card.classList.remove("active");
            }
          });

          // Update Hero Preview
          heroTitle.textContent = anim.name;
          heroCategory.textContent = anim.category;
          heroDesc.textContent = anim.description;

          triggerBoxAnimation(heroDemoBox, anim.className);
        }

        // ── Create Animation Cards ────────────────────────────────────────
        function createCard(anim) {
          const card = document.createElement("div");
          card.className = "animation-card";
          if (anim.name === selectedAnimationName) {
            card.classList.add("active");
          }
          card.dataset.name = anim.name;
          card.dataset.category = anim.category;

          // Card Preview Box
          const previewBox = document.createElement("div");
          previewBox.className = "card-preview-box";

          const demoBox = document.createElement("div");
          demoBox.className = `card-demo-box ${anim.className}`;
          previewBox.appendChild(demoBox);

          // Card Info
          const info = document.createElement("div");
          info.className = "card-info";

          const title = document.createElement("h3");
          title.className = "card-title";
          title.textContent = anim.name;

          const desc = document.createElement("span");
          desc.className = "card-desc";
          desc.textContent = anim.description;

          info.appendChild(title);
          info.appendChild(desc);

          // Card Actions
          const actions = document.createElement("div");
          actions.className = "card-actions";

          const catBadge = document.createElement("span");
          catBadge.className = "card-category";
          catBadge.textContent = anim.category;

          const copyBtn = document.createElement("button");
          copyBtn.className = "copy-icon-btn";
          copyBtn.title = "Copy class name";
          copyBtn.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
        `;

          copyBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            copyToClipboard(anim.name);
          });

          actions.appendChild(catBadge);
          actions.appendChild(copyBtn);

          card.appendChild(previewBox);
          card.appendChild(info);
          card.appendChild(actions);

          // Click on card selects it and replays animation
          card.addEventListener("click", () => {
            selectAnimation(anim);
            triggerBoxAnimation(demoBox, anim.className);
          });

          // Hover over card replays preview
          card.addEventListener("mouseenter", () => {
            triggerBoxAnimation(demoBox, anim.className);
          });

          return card;
        }

        // ── Grid Rendering and Filtering ─────────────────────────────────
        function renderGrid() {
          grid.innerHTML = "";

          const query = searchQuery.toLowerCase().trim();

          const filtered = animations.filter((anim) => {
            const matchesSearch =
              anim.name.includes(query) ||
              anim.description.toLowerCase().includes(query);
            const matchesCategory =
              activeCategory === "all" || anim.category === activeCategory;
            return matchesSearch && matchesCategory;
          });

          if (filtered.length === 0) {
            noResultsState.classList.add("visible");
          } else {
            noResultsState.classList.remove("visible");
            filtered.forEach((anim) => {
              grid.appendChild(createCard(anim));
            });
          }
        }

        // ── Search Handlers (with Debounce) ────────────────────────────────
        let searchDebounceTimer;
        searchInput.addEventListener("input", (e) => {
          searchQuery = e.target.value;
          localStorage.setItem("em-playground-search", searchQuery);

          clearTimeout(searchDebounceTimer);
          searchDebounceTimer = setTimeout(() => {
            renderGrid();
          }, 150);
        });

        // ── Replay Active Hero Animation ──────────────────────────────────
        heroReplayBtn.addEventListener("click", () => {
          const activeAnim = animations.find(
            (a) => a.name === selectedAnimationName
          );
          if (activeAnim) {
            triggerBoxAnimation(heroDemoBox, activeAnim.className);
          }
        });

        heroVisualBox = document.querySelector(".hero-visual");
        heroVisualBox.addEventListener("click", () => {
          const activeAnim = animations.find(
            (a) => a.name === selectedAnimationName
          );
          if (activeAnim) {
            triggerBoxAnimation(heroDemoBox, activeAnim.className);
          }
        });

        // Copy Active Hero Animation
        heroCopyBtn.addEventListener("click", () => {
          copyToClipboard(selectedAnimationName);
        });

        // ── Theme Switcher ────────────────────────────────────────────────
        themeToggleBtn.addEventListener("click", () => {
          const currentTheme =
            document.documentElement.getAttribute("data-theme") || "dark";
          const targetTheme = currentTheme === "light" ? "dark" : "light";

          document.documentElement.setAttribute("data-theme", targetTheme);
          localStorage.setItem("em-playground-theme", targetTheme);
        });

        // ── Initialize App ────────────────────────────────────────────────
        updateCategoryTabsUI();
        renderGrid();

        // Select the active animation on load to populate the Hero
        const initialAnim =
          animations.find((a) => a.name === selectedAnimationName) ||
          animations[0];
        selectAnimation(initialAnim);
      });
    </script>
  </body>
</html>
