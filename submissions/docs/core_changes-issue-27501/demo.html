<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>ease-search — Demo</title>
<link rel="stylesheet" href="style.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f8fafc; padding:3rem 1.5rem; display:flex; flex-direction:column; align-items:center; }
@media (prefers-color-scheme:dark) { body { background:#0f172a; } }
.demo-header { text-align:center; margin-bottom:3rem; }
.demo-header h1 { font-size:clamp(2rem,5vw,3rem); color:#1e293b; }
@media (prefers-color-scheme:dark) { .demo-header h1 { color:#f1f5f9; } }
.demo-header p { color:#64748b; margin-top:0.5rem; }
</style>
</head>
<body>
<header class="demo-header"><h1>ease-search</h1><p>Search autocomplete dropdown</p></header>
<div class="ease-search">
<div class="ease-search-input-wrap">
<span class="ease-search-icon">🔍</span>
<input class="ease-search-input" id="searchInput" placeholder="Search CSS properties..." oninput="search(this.value)" onfocus="if(this.value)showResults(this.value)"/>
</div>
<div class="ease-search-dropdown" id="searchResults" style="display:none;"></div>
</div>
<script>
var data=['Animation','Background','Border','Color','Display','Flexbox','Grid','Height','Image','Justify','Keyframe','Layout','Margin','Opacity','Padding','Radius','Shadow','Transform','Width','Z-index'];
function search(v){var dd=document.getElementById('searchResults');if(v.length<1){dd.style.display='none';return;}var r=data.filter(function(i){return i.toLowerCase().includes(v.toLowerCase())}).slice(0,5);if(r.length){dd.innerHTML=r.map(function(i){return'<div class="ease-search-result" onclick="document.getElementById(\'searchInput\').value=\''+i+'\';document.getElementById(\'searchResults\').style.display=\'none\'">'+i+'</div>'}).join('');dd.style.display='block';}else{dd.style.display='none';}}
document.addEventListener('mousedown',function(e){if(!e.target.closest('.ease-search'))document.getElementById('searchResults').style.display='none'});
</script>
</body>
</html>
