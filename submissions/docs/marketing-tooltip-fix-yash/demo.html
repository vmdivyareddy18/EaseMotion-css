<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase: Marketing Tooltip Position Fix</title>

    <!-- Link the core framework stylesheet -->
    <link rel="stylesheet" href="../../easemotion.css" />

    <!-- Link the fix stylesheet containing our overrides -->
    <link rel="stylesheet" href="style.css" />

    <style>
      :root {
        --bg-color: #0b1329;
        --card-bg: #111a36;
        --text-color: #f1f5f9;
        --muted-color: #94a3b8;
        --accent-color: #8b5cf6;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: var(
          --ease-font-sans,
          system-ui,
          -apple-system,
          sans-serif
        );
        background-color: var(--bg-color);
        color: var(--text-color);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .container {
        max-width: 800px;
        width: 90%;
        text-align: center;
        padding: 2rem;
      }

      .header h1 {
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .header p {
        color: var(--muted-color);
        font-size: 1.1rem;
        margin-bottom: 3rem;
      }

      /* Showcase Card */
      .showcase-card {
        background-color: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--ease-radius-lg, 1rem);
        padding: 3rem 2rem;
        box-shadow: var(--ease-shadow-xl, 0 20px 25px -5px rgba(0, 0, 0, 0.3));
        display: flex;
        flex-direction: column;
        gap: 3rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2.5rem;
        justify-items: center;
        align-items: center;
      }

      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .demo-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
      }

      .demo-label {
        font-size: var(--ease-text-xs, 0.75rem);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted-color);
        font-weight: 600;
      }

      /* Trigger Button Style */
      .trigger-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.75rem 1.5rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: var(--ease-radius-md, 0.5rem);
        color: var(--text-color);
        font-weight: 500;
        font-size: var(--ease-text-sm, 0.875rem);
        transition:
          background 0.2s,
          border-color 0.2s;
      }

      .trigger-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--accent-color);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Marketing Tooltip Fix Showcase</h1>
        <p>
          Demonstrating visual color correction for 3D/Marketing tooltip
          indicators across all directions.
        </p>
      </div>

      <div class="showcase-card">
        <div class="grid">
          <!-- Top position -->
          <div class="demo-item">
            <span class="demo-label">Top Position</span>
            <span
              class="ease-tooltip trigger-btn"
              data-theme="marketing"
              data-position="top"
              data-tooltip="Arrow matches gradient bottom edge (#8b5cf6)"
            >
              Hover Top
            </span>
          </div>

          <!-- Bottom position -->
          <div class="demo-item">
            <span class="demo-label">Bottom Position</span>
            <span
              class="ease-tooltip trigger-btn"
              data-theme="marketing"
              data-position="bottom"
              data-tooltip="Arrow matches gradient top edge (#6366f1)"
            >
              Hover Bottom
            </span>
          </div>

          <!-- Left position -->
          <div class="demo-item">
            <span class="demo-label">Left Position</span>
            <span
              class="ease-tooltip trigger-btn"
              data-theme="marketing"
              data-position="left"
              data-tooltip="Arrow matches gradient right edge (#8b5cf6)"
            >
              Hover Left
            </span>
          </div>

          <!-- Right position -->
          <div class="demo-item">
            <span class="demo-label">Right Position</span>
            <span
              class="ease-tooltip trigger-btn"
              data-theme="marketing"
              data-position="right"
              data-tooltip="Arrow matches gradient left edge (#6366f1)"
            >
              Hover Right
            </span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
