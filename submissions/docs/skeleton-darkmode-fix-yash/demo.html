<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase: Skeleton Loader Dark Mode Fix</title>

    <!-- Link the core framework stylesheet -->
    <link rel="stylesheet" href="../../easemotion.css" />

    <!-- Link the fix stylesheet containing our overrides -->
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: var(
          --ease-font-sans,
          system-ui,
          -apple-system,
          sans-serif
        );
        background-color: var(--ease-color-neutral-100, #f1f5f9);
        color: var(--ease-color-neutral-800, #1e293b);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem 1rem;
      }

      .container {
        max-width: 900px;
        width: 100%;
      }

      header {
        text-align: center;
        margin-bottom: 2.5rem;
      }

      header h1 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        color: var(--ease-color-primary, #6c63ff);
      }

      header p {
        color: var(--ease-color-neutral-500, #64748b);
        margin: 0;
      }

      .showcase-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2rem;
      }

      @media (max-width: 768px) {
        .showcase-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Panel Wrapper */
      .panel {
        padding: 2rem;
        border-radius: var(--ease-radius-lg, 1rem);
        box-shadow: var(--ease-shadow-md);
        border: 1px solid var(--ease-color-neutral-200);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .panel-light {
        background-color: #ffffff;
        color: #1e293b;
      }

      .panel-dark {
        background-color: #0b1121;
        color: #e2e8f0;
        border-color: #1e293b;
      }

      .panel-title {
        font-weight: 700;
        font-size: 1.1rem;
        margin: 0;
        border-bottom: 1px solid var(--ease-color-neutral-200);
        padding-bottom: 0.5rem;
      }

      .panel-dark .panel-title {
        border-color: #1e293b;
      }

      /* Dummy Card Structure for Skeletons */
      .card-layout {
        border: 1px solid var(--ease-color-neutral-200);
        border-radius: var(--ease-radius-md, 0.5rem);
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .panel-dark .card-layout {
        border-color: #1e293b;
        background-color: #141e33;
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .card-body {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Skeleton Loader Dark Mode Fix</h1>
        <p>
          Demonstrating side-by-side loading shimmer compatibility in Light and
          Dark configurations.
        </p>
      </header>

      <div class="showcase-grid">
        <!-- Light Mode Showcase Panel -->
        <div class="panel panel-light" data-theme="light">
          <h3 class="panel-title">Light Theme Active</h3>

          <div class="card-layout">
            <div class="card-header">
              <div
                class="ease-skeleton ease-skeleton-circle"
                style="width: 40px; height: 40px"
              ></div>
              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  gap: 0.35rem;
                "
              >
                <div
                  class="ease-skeleton ease-skeleton-text"
                  style="width: 50%"
                ></div>
                <div
                  class="ease-skeleton ease-skeleton-text"
                  style="width: 30%"
                ></div>
              </div>
            </div>
            <div class="card-body">
              <div
                class="ease-skeleton ease-skeleton-image"
                style="height: 120px"
              ></div>
              <div
                class="ease-skeleton ease-skeleton-text"
                style="width: 90%"
              ></div>
              <div
                class="ease-skeleton ease-skeleton-text"
                style="width: 60%"
              ></div>
            </div>
          </div>
        </div>

        <!-- Dark Mode Showcase Panel -->
        <div class="panel panel-dark" data-theme="dark">
          <h3 class="panel-title">Dark Theme Active</h3>

          <div class="card-layout">
            <div class="card-header">
              <div
                class="ease-skeleton ease-skeleton-circle"
                style="width: 40px; height: 40px"
              ></div>
              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  gap: 0.35rem;
                "
              >
                <div
                  class="ease-skeleton ease-skeleton-text"
                  style="width: 50%"
                ></div>
                <div
                  class="ease-skeleton ease-skeleton-text"
                  style="width: 30%"
                ></div>
              </div>
            </div>
            <div class="card-body">
              <div
                class="ease-skeleton ease-skeleton-image"
                style="height: 120px"
              ></div>
              <div
                class="ease-skeleton ease-skeleton-text"
                style="width: 90%"
              ></div>
              <div
                class="ease-skeleton ease-skeleton-text"
                style="width: 60%"
              ></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
