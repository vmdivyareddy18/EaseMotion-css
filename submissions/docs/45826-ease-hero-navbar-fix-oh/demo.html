<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Fix: ease-hero-navbar-spacing for Light Theme</title>
  <meta name="description" content="Fixed hero section spacing that accounts for fixed navbar height across light and dark themes.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="ease-fixed-navbar">
    <div class="nav-container">
      <div class="nav-logo">EaseMotion</div>
      <button id="theme-toggle" class="ease-theme-toggle" aria-label="Toggle theme">
        <span class="toggle-icon">🌙</span>
      </button>
    </div>
  </nav>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hero-navbar-spacing</h1>
      <p class="subtitle" id="main-desc">Fixed hero section with proper navbar spacing</p>
    </header>

    <section class="ease-hero-section" id="hero">
      <h2>Welcome to EaseMotion CSS</h2>
      <p>A modern CSS framework with smooth animations</p>
      <button class="ease-cta-button">Get Started</button>
    </section>

    <section class="content-section">
      <h3>About This Fix</h3>
      <p>The hero section now properly accounts for the fixed navbar height in both light and dark themes.</p>
    </section>
  </main>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const toggleIcon = themeToggle.querySelector('.toggle-icon');
    
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('light-theme');
      toggleIcon.textContent = document.body.classList.contains('light-theme') ? '☀️' : '🌙';
    });
  </script>

</body>
</html>
