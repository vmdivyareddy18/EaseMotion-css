<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retina Text Blurriness staging</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="diagnostic-grid">
    <header class="diagnostic-header">
      <h2>Retina Scale Blurriness Auditor</h2>
      <span class="status-pill">Rendering Test</span>
    </header>

    <div class="diagnostic-body">
      <div class="test-pane">
        <h3>Standard Scale (Blurry Risk)</h3>
        <div class="scale-element legacy-scale">
          <p>This text becomes blurry during animation.</p>
        </div>
      </div>

      <div class="test-pane border-left">
        <h3>Optimized Scale (Crisp Vector)</h3>
        <div class="scale-element optimized-scale">
          <p>This text remains perfectly crisp.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
