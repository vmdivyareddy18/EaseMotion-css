<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostic: EaseMotion CDN Load Order</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="diagnostic-console">
    <header class="console-header">
      <span class="pulse-indicator status-idle" id="status-light"></span>
      <h2>EaseMotion Dependency Diagnostic Console</h2>
    </header>

    <div class="console-body">
      <div class="controls-panel">
        <h3>Simulation Controls</h3>
        <p>Simulate dynamic loading orders to test variable resolution validation:</p>
        <div class="button-group">
          <button id="btn-load-incorrect" class="btn btn-danger">Simulate Out-of-Order Load</button>
          <button id="btn-load-correct" class="btn btn-success">Simulate Correct Load Order</button>
        </div>
      </div>

      <div class="output-panel">
        <h3>Diagnostic System Logs</h3>
        <pre id="log-output" class="log-box">> System initialized. Awaiting action...</pre>
      </div>
    </div>
  </div>

  <script>
    const logBox = document.getElementById('log-output');
    const statusLight = document.getElementById('status-light');

    function log(message, type = 'info') {
      const prefix = type === 'error' ? '❌ [ERROR] ' : type === 'success' ? '✅ [SUCCESS] ' : '> ';
      logBox.textContent += `\n${prefix}${message}`;
      logBox.scrollTop = logBox.scrollHeight;
    }

    function validateEaseMotionLoad() {
      // Check if a core animation speed token is active on document root
      const sentinel = getComputedStyle(document.documentElement)
        .getPropertyValue('--ease-speed-fast')
        .trim();

      if (!sentinel) {
        log("EaseMotion CSS Warning: Core design variables are not resolved! 'core/variables.css' must load first in the head.", "error");
        statusLight.className = "pulse-indicator status-error";
        return false;
      }

      log(`EaseMotion CSS: Core variables verified successfully. (Sentinel --ease-speed-fast = ${sentinel})`, "success");
      statusLight.className = "pulse-indicator status-success";
      return true;
    }

    document.getElementById('btn-load-incorrect').addEventListener('click', () => {
      // Simulate unloading variables (resetting custom properties on root)
      document.documentElement.style.removeProperty('--ease-speed-fast');
      log("Simulated loading animations/utilities without variables.css.");
      validateEaseMotionLoad();
    });

    document.getElementById('btn-load-correct').addEventListener('click', () => {
      // Restore variables on root
      document.documentElement.style.setProperty('--ease-speed-fast', '150ms');
      log("Simulated variables.css loaded correctly first.");
      validateEaseMotionLoad();
    });
  </script>
</body>
</html>
