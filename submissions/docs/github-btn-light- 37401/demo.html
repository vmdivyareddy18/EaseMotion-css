<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Outline Button Visibility Improvement</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<button id="theme-toggle">🌙 Dark Mode</button>

<div class="container">

    <h1>GitHub Outline Button</h1>

    <p>
        Improved visibility for both Light and Dark themes.
    </p>

    <a href="#" class="outline-btn">
        GitHub ↗
    </a>

</div>

<script>

const toggle=document.getElementById("theme-toggle");

toggle.onclick=()=>{

document.body.classList.toggle("dark");

toggle.textContent=
document.body.classList.contains("dark")
?"☀️ Light Mode"
:"🌙 Dark Mode";

}

</script>

</body>
</html>
