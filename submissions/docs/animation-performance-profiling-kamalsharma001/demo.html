<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animation Performance: Layout vs Compositor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<h2>Layout-triggering vs Compositor-only animation</h2>
<div class="row">
  <div class="box bad" id="badBox">top/left (layout)</div>
  <div class="box good" id="goodBox">transform (compositor)</div>
</div>
<button id="run">Run both</button>

<h2>content-visibility on off-screen reveal items</h2>
<div class="reveal-list">
  <div class="reveal-item">Item 1 (rendered immediately)</div>
  <div class="reveal-item cv">Item 2 (content-visibility: auto)</div>
  <div class="reveal-item cv">Item 3 (content-visibility: auto)</div>
</div>

<script>
  document.getElementById('run').addEventListener('click', () => {
    document.getElementById('badBox').classList.toggle('move');
    document.getElementById('goodBox').classList.toggle('move');
  });
</script>

</body>
</html>
