<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Button Transition Fix Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .demo-container {
      padding: 2rem;
      background-color: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h2 style="margin-top: 0;">Ghost Button Hover Transition Fix</h2>
    <p style="color: #64748b; margin-bottom: 1.5rem;">Hover over the ghost button below.</p>
    
    <button class="ease-btn ease-btn-ghost">
      Hover Me
    </button>
  </div>
</body>
</html>
