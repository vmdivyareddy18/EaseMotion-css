<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Showcase: Programmatic Toast Notification API</title>

    <!-- Link the core framework stylesheet -->
    <link rel="stylesheet" href="../../easemotion.css" />

    <!-- Link our custom placement styles -->
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: var(
          --ease-font-sans,
          system-ui,
          -apple-system,
          sans-serif
        );
        background-color: #0b1121;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2.5rem 1rem;
      }

      .container {
        max-width: 680px;
        width: 100%;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 2.2rem;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      header p {
        color: var(--ease-color-muted, #94a3b8);
        margin: 0;
      }

      /* Control Panel Card */
      .control-panel {
        background-color: #141e33;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: var(--ease-radius-lg, 1rem);
        padding: 2.25rem;
        box-shadow: var(--ease-shadow-xl);
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      label {
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--ease-color-muted, #94a3b8);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      input,
      select {
        background: #0b1121;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--ease-radius-md, 0.5rem);
        padding: 0.75rem 1rem;
        color: #e2e8f0;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus,
      select:focus {
        border-color: var(--ease-color-primary, #6c63ff);
      }

      .grid-options {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }

      @media (max-width: 600px) {
        .grid-options {
          grid-template-columns: 1fr;
        }
      }

      .btn-trigger {
        background: var(--ease-color-primary, #6c63ff);
        color: #fff;
        border: none;
        padding: 1rem;
        border-radius: var(--ease-radius-md, 0.5rem);
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        margin-top: 0.5rem;
      }

      .btn-trigger:hover {
        background: var(--ease-color-primary-dark, #4b44cc);
      }

      .btn-trigger:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Programmatic Toast Notification API</h1>
        <p>
          Configure and launch stacking notifications with automated animations
          at any screen anchor.
        </p>
      </header>

      <div class="control-panel">
        <div class="grid-options">
          <!-- Title Input -->
          <div class="form-group">
            <label for="toastTitle">Toast Title</label>
            <input
              type="text"
              id="toastTitle"
              value="System Notification"
              placeholder="e.g. Success, Alert..."
            />
          </div>

          <!-- Message Input -->
          <div class="form-group">
            <label for="toastMsg">Message Body</label>
            <input
              type="text"
              id="toastMsg"
              value="Your preferences have been saved."
              placeholder="Description details..."
            />
          </div>
        </div>

        <div class="grid-options">
          <!-- Toast Type -->
          <div class="form-group">
            <label for="toastType">Notification Type</label>
            <select id="toastType">
              <option value="success">Success (Green)</option>
              <option value="info" selected>Info (Blue)</option>
              <option value="warning">Warning (Amber)</option>
              <option value="danger">Danger (Red)</option>
            </select>
          </div>

          <!-- Viewport Position -->
          <div class="form-group">
            <label for="toastPos">Viewport Anchor Location</label>
            <select id="toastPos">
              <option value="top-right" selected>Top Right</option>
              <option value="top-left">Top Left</option>
              <option value="top-center">Top Center</option>
              <option value="bottom-right">Bottom Right</option>
              <option value="bottom-left">Bottom Left</option>
              <option value="bottom-center">Bottom Center</option>
            </select>
          </div>
        </div>

        <button class="btn-trigger" id="triggerBtn">
          Launch Toast Notification
        </button>
      </div>
    </div>

    <script>
      // -------------------------------------------------------------
      // Reference implementation of EaseToast JS Controller
      // -------------------------------------------------------------
      var EaseToast = (function () {
        "use strict";

        var containers = {};

        function getContainer(position) {
          if (containers[position]) {
            return containers[position];
          }

          var container = document.createElement("div");
          container.className = "ease-toast-container ease-toast-" + position;
          document.body.appendChild(container);
          containers[position] = container;
          return container;
        }

        function show(options) {
          options = options || {};
          var title = options.title || "";
          var message = options.message || "";
          var type = options.type || "info";
          var position = options.position || "top-right";
          var duration =
            options.duration !== undefined ? options.duration : 3000;

          var container = getContainer(position);

          var toast = document.createElement("div");
          toast.className =
            "ease-toast ease-toast-" + type + " ease-toast-enter";

          // Check if there are close action classes inside toast.css
          var iconChars = {
            success: "✓",
            info: "ℹ",
            warning: "⚠",
            danger: "×",
          };

          var iconHtml =
            '<div class="ease-toast-icon" style="display:flex;align-items:center;justify-content:center;font-weight:700;">' +
            (iconChars[type] || "ℹ") +
            "</div>";

          toast.innerHTML =
            iconHtml +
            '<div class="ease-toast-body" style="flex:1;">' +
            (title
              ? '<strong style="display:block;margin-bottom:2px;">' +
                title +
                "</strong>"
              : "") +
            '<p style="margin:0;font-size:0.85rem;opacity:0.8;">' +
            message +
            "</p>" +
            "</div>";

          // Stacks top-first or bottom-first depending on anchor orientation
          if (position.indexOf("top") === 0) {
            container.insertBefore(toast, container.firstChild);
          } else {
            container.appendChild(toast);
          }

          if (duration > 0) {
            setTimeout(function () {
              dismiss(toast);
            }, duration);
          }
        }

        function dismiss(toast) {
          toast.classList.remove("ease-toast-enter");
          toast.classList.add("ease-toast-leave");

          toast.addEventListener("animationend", function () {
            if (toast.parentNode) {
              toast.parentNode.removeChild(toast);
            }
          });
        }

        return {
          show: show,
        };
      })();

      // -------------------------------------------------------------
      // Demo Page trigger handler
      // -------------------------------------------------------------
      var triggerBtn = document.getElementById("triggerBtn");
      var toastTitle = document.getElementById("toastTitle");
      var toastMsg = document.getElementById("toastMsg");
      var toastType = document.getElementById("toastType");
      var toastPos = document.getElementById("toastPos");

      triggerBtn.addEventListener("click", function () {
        EaseToast.show({
          title: toastTitle.value,
          message: toastMsg.value,
          type: toastType.value,
          position: toastPos.value,
          duration: 3000,
        });
      });
    </script>
  </body>
</html>
