<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matrix Code-Rain Telemetry Console</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="matrix-rain">
    <div class="rain-column" style="--delay: 1.2s; --left: 5%;">
      <span>A</span><span>8</span><span>K</span><span>2</span><span>P</span><span>0</span><span>X</span>
    </div>
    <div class="rain-column" style="--delay: 0.4s; --left: 15%;">
      <span>M</span><span>4</span><span>Y</span><span>6</span><span>W</span><span>1</span><span>Q</span>
    </div>
    <div class="rain-column" style="--delay: 2.1s; --left: 30%;">
      <span>H</span><span>7</span><span>O</span><span>3</span><span>B</span><span>9</span><span>Z</span>
    </div>
    <div class="rain-column" style="--delay: 0.8s; --left: 45%;">
      <span>L</span><span>2</span><span>U</span><span>5</span><span>S</span><span>8</span><span>V</span>
    </div>
    <div class="rain-column" style="--delay: 1.5s; --left: 65%;">
      <span>C</span><span>9</span><span>D</span><span>4</span><span>F</span><span>7</span><span>R</span>
    </div>
    <div class="rain-column" style="--delay: 0.2s; --left: 80%;">
      <span>T</span><span>1</span><span>E</span><span>0</span><span>G</span><span>3</span><span>J</span>
    </div>
    <div class="rain-column" style="--delay: 1.8s; --left: 95%;">
      <span>N</span><span>6</span><span>I</span><span>8</span><span>U</span><span>2</span><span>K</span>
    </div>
  </div>

  <div class="scanline"></div>

  <div class="console-box">
    <div class="console-header">
      <div class="header-left">
        <span class="status-dot pulsing"></span>
        <h2>SYS_MONITOR // TERMINAL 42</h2>
      </div>
      <div class="header-right font-mono">SECURE_SSL</div>
    </div>
    
    <div class="console-body">
      <div class="metric-card">
        <h3>ACTIVE EXECUTIONS</h3>
        <div class="value green font-mono">1,402 / sec</div>
      </div>
      <div class="metric-card">
        <h3>MEMORY HEAP</h3>
        <div class="value font-mono">412.8 MB</div>
      </div>
    </div>
    
    <div class="log-area">
      <p class="font-mono">> Fetching semantic index ... OK</p>
      <p class="font-mono">> Synthesizing local workspace ... OK</p>
      <p class="font-mono">> Active threats: 0</p>
    </div>
  </div>
</body>
</html>
