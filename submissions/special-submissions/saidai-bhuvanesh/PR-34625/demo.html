<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spatial Orbit Navigation System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="space-scene">
    <div class="radial-container">
      <input type="checkbox" id="menu-toggle" class="menu-toggle">
      <label for="menu-toggle" class="orbit-center" aria-label="Toggle Navigation">
        <div class="core-pulse"></div>
        <span class="icon">🛰️</span>
      </label>
      
      <div class="orbit-ring ring-1"></div>
      <div class="orbit-ring ring-2"></div>
      
      <nav class="orbit-items">
        <div class="orbit-item" style="--angle: 0deg;">
          <a href="#" class="item-link"><span class="item-icon">🌌</span><span class="item-tooltip">Telemetry</span></a>
        </div>
        <div class="orbit-item" style="--angle: 72deg;">
          <a href="#" class="item-link"><span class="item-icon">⚙️</span><span class="item-tooltip">Control</span></a>
        </div>
        <div class="orbit-item" style="--angle: 144deg;">
          <a href="#" class="item-link"><span class="item-icon">🔋</span><span class="item-tooltip">Power</span></a>
        </div>
        <div class="orbit-item" style="--angle: 216deg;">
          <a href="#" class="item-link"><span class="item-icon">📡</span><span class="item-tooltip">Comms</span></a>
        </div>
        <div class="orbit-item" style="--angle: 288deg;">
          <a href="#" class="item-link"><span class="item-icon">🛡️</span><span class="item-tooltip">Security</span></a>
        </div>
      </nav>
    </div>
    
    <div class="details-panel">
      <h3>Orbital Status</h3>
      <div class="status-row"><span>Orbit Mode</span><strong class="font-mono text-purple">Geostationary</strong></div>
      <div class="status-row"><span>Velocity</span><strong class="font-mono">3,075 m/s</strong></div>
    </div>
  </div>
</body>
</html>
