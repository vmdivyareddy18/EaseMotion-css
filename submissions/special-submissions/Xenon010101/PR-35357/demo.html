<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-ripple-feedback-xk – Click Ripple Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ripple-demo">
    <h1>Click Ripple</h1>
    <p>Click any button to see the ripple effect.</p>

    <div class="ripple-buttons">
      <button class="ripple-btn primary">Primary</button>
      <button class="ripple-btn secondary">Secondary</button>
      <button class="ripple-btn outline">Outline</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ripple-btn').forEach(btn => {
      btn.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const ripple = document.createElement('span');
        ripple.className = 'ripple-effect';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        this.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });
  </script>

</body>
</html>
