<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-alert-bar-slide-xk – Slide-in Alert Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="alert-bar success" role="alert">
    <span class="alert-icon">&#10003;</span>
    <span class="alert-msg">Your changes have been saved successfully!</span>
    <button class="alert-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <div class="alert-bar warning" role="alert">
    <span class="alert-icon">&#9888;</span>
    <span class="alert-msg">Your session will expire in 5 minutes.</span>
    <button class="alert-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <div class="alert-bar error" role="alert">
    <span class="alert-icon">&#10007;</span>
    <span class="alert-msg">Unable to connect to the server.</span>
    <button class="alert-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <div class="alert-bar info" role="alert">
    <span class="alert-icon">&#8505;</span>
    <span class="alert-msg">New update available. Refresh to get the latest version.</span>
    <button class="alert-dismiss" aria-label="Dismiss">&times;</button>
  </div>

  <div class="controls">
    <button class="btn" onclick="showAlert('success')">Success</button>
    <button class="btn" onclick="showAlert('warning')">Warning</button>
    <button class="btn" onclick="showAlert('error')">Error</button>
    <button class="btn" onclick="showAlert('info')">Info</button>
  </div>

  <script>
    document.querySelectorAll('.alert-dismiss').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.closest('.alert-bar').classList.add('hide');
      });
    });
    function showAlert(type) {
      const bar = document.querySelector(`.alert-bar.${type}`);
      bar.classList.remove('hide');
    }
  </script>

</body>
</html>
