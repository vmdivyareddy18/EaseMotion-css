<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-menu-slide-xk – Slide-in Nav Drawer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <button class="menu-toggle" aria-label="Open menu">&#9776;</button>

  <nav class="menu-drawer">
    <button class="menu-close" aria-label="Close menu">&times;</button>
    <ul class="menu-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">About</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Portfolio</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="menu-overlay"></div>

  <main class="menu-content">
    <h1>Slide-in Nav Drawer</h1>
    <p>Click the hamburger to open the menu. Click the overlay or &times; to close.</p>
  </main>

  <script>
    document.querySelector('.menu-toggle').addEventListener('click', () => {
      document.querySelector('.menu-drawer').classList.add('open');
      document.querySelector('.menu-overlay').classList.add('show');
    });
    document.querySelector('.menu-close').addEventListener('click', closeMenu);
    document.querySelector('.menu-overlay').addEventListener('click', closeMenu);
    function closeMenu() {
      document.querySelector('.menu-drawer').classList.remove('open');
      document.querySelector('.menu-overlay').classList.remove('show');
    }
  </script>

</body>
</html>
