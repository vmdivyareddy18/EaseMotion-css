<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-progress-bar-striped-xk – Animated Striped Progress Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="progress-group">
    <div class="progress-item">
      <div class="progress-label">
        <span>HTML</span>
        <span>90%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar striped" style="width:90%"></div>
      </div>
    </div>

    <div class="progress-item">
      <div class="progress-label">
        <span>CSS</span>
        <span>85%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar striped" style="width:85%"></div>
      </div>
    </div>

    <div class="progress-item">
      <div class="progress-label">
        <span>JavaScript</span>
        <span>70%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar striped" style="width:70%"></div>
      </div>
    </div>

    <div class="progress-item">
      <div class="progress-label">
        <span>React</span>
        <span>65%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar striped" style="width:65%"></div>
      </div>
    </div>
  </div>

</body>
</html>
