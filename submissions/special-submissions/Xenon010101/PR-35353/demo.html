<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-loader-pulse-xk – Pulse Loading Indicators</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="loaders">
    <div class="loader-card">
      <h3>Circular Pulse</h3>
      <div class="loader-circle" aria-label="Loading"></div>
    </div>

    <div class="loader-card">
      <h3>Bar Pulse</h3>
      <div class="loader-bar-track" aria-label="Loading">
        <div class="loader-bar"></div>
      </div>
    </div>

    <div class="loader-card">
      <h3>Dots Pulse</h3>
      <div class="loader-dots" aria-label="Loading">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

</body>
</html>
