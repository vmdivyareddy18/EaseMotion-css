<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Scroll-Snap Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-carousel – Scroll-Snap Fix</h2>
  <div class="ease-carousel" id="carousel">
    <button class="ease-carousel__btn ease-carousel__btn--prev" aria-label="Previous slide" onclick="scroll(-1)">‹</button>
    <div class="ease-carousel__track" id="track">
      <div class="ease-carousel__slide" role="group" aria-label="Slide 1 of 4">Slide 1</div>
      <div class="ease-carousel__slide" role="group" aria-label="Slide 2 of 4">Slide 2</div>
      <div class="ease-carousel__slide" role="group" aria-label="Slide 3 of 4">Slide 3</div>
      <div class="ease-carousel__slide" role="group" aria-label="Slide 4 of 4">Slide 4</div>
    </div>
    <button class="ease-carousel__btn ease-carousel__btn--next" aria-label="Next slide" onclick="scroll(1)">›</button>
  </div>
  <div class="ease-carousel__dots" id="dots">
    <button class="ease-carousel__dot is-active" aria-label="Go to slide 1"></button>
    <button class="ease-carousel__dot" aria-label="Go to slide 2"></button>
    <button class="ease-carousel__dot" aria-label="Go to slide 3"></button>
    <button class="ease-carousel__dot" aria-label="Go to slide 4"></button>
  </div>
  <script>
    const track = document.getElementById('track');
    const dots = document.querySelectorAll('.ease-carousel__dot');
    function scroll(dir) { track.scrollBy({ left: dir * track.offsetWidth, behavior: 'smooth' }); }
    track.addEventListener('scrollend', () => {
      const i = Math.round(track.scrollLeft / track.offsetWidth);
      dots.forEach((d,j) => d.classList.toggle('is-active', i===j));
    });
  </script>
</body>
</html>
