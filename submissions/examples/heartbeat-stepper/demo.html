<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heartbeat Stepper Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-container">
    <h1>Heartbeat Stepper</h1>
    <p class="subtitle">Pure CSS animated stepper component</p>

    <div class="ease-heartbeat-stepper">

      <div class="step completed">
        <div class="circle">✓</div>
        <span>Account</span>
      </div>

      <div class="line"></div>

      <div class="step active">
        <div class="circle">2</div>
        <span>Details</span>
      </div>

      <div class="line"></div>

      <div class="step">
        <div class="circle">3</div>
        <span>Payment</span>
      </div>

      <div class="line"></div>

      <div class="step">
        <div class="circle">4</div>
        <span>Complete</span>
      </div>

    </div>
  </div>

</body>
</html>
