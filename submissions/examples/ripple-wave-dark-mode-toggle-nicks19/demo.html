<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Wave Dark Mode Toggle - Medical Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo layout setup */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      overflow: hidden; /* Important for the ripple to not scroll */
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* Content styling to demonstrate the theme change */
    .demo-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 20px;
      /* Smoothly transition text color when body gets dark mode class/state */
      transition: color 0.5s ease;
    }

    .demo-content h1 {
      font-size: 2.5rem;
      margin: 0 0 16px 0;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    .demo-content p {
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- The hidden checkbox controlling the state -->
  <input type="checkbox" id="theme-toggle" class="ease-theme-toggle" aria-label="Toggle Dark Mode">

  <!-- The expanding ripple background -->
  <div class="ease-ripple-bg"></div>

  <!-- The Toggle Button -->
  <div class="ease-toggle-container">
    <label for="theme-toggle" class="ease-toggle-btn">
      <div class="ease-icon-wrapper">
        <!-- Sun Icon -->
        <svg class="ease-icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon Icon -->
        <svg class="ease-icon-moon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </div>
    </label>
  </div>

  <!-- Page Content -->
  <div class="demo-content ease-content">
    <h1>Patient Overview</h1>
    <p>Try the dark mode toggle in the top right. A pure CSS ripple wave will transition the UI from a clinical light theme to a restful dark theme, ideal for night shift medical staff.</p>
  </div>

</body>
</html>
