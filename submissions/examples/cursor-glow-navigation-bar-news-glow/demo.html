<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Portal Premium Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="portal-header">
    <nav class="glow-navigation-wrapper">
      <div class="brand-title">CHRONICLE</div>
      
      <ul class="nav-links-list">
        <li class="nav-item-node">
          <a href="#world" class="nav-anchor-link">
            <span class="anchor-label">World</span>
            <span class="radial-glow-element"></span>
          </a>
        </li>
        <li class="nav-item-node">
          <a href="#politics" class="nav-anchor-link">
            <span class="anchor-label">Politics</span>
            <span class="radial-glow-element"></span>
          </a>
        </li>
        <li class="nav-item-node">
          <a href="#tech" class="nav-anchor-link">
            <span class="anchor-label">Technology</span>
            <span class="radial-glow-element"></span>
          </a>
        </li>
        <li class="nav-item-node">
          <a href="#business" class="nav-anchor-link">
            <span class="anchor-label">Business</span>
            <span class="radial-glow-element"></span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <script>
    // Pure dynamic cursor simulation tracker updating CSS custom properties locally
    document.querySelectorAll('.nav-anchor-link').forEach(linkItem => {
      linkItem.addEventListener('mousemove', (e) => {
        const bounds = linkItem.getBoundingClientRect();
        const horizontalCoordinate = e.clientX - bounds.left;
        const verticalCoordinate = e.clientY - bounds.top;
        
        linkItem.style.setProperty('--cursor-pointer-x', `${horizontalCoordinate}px`);
        linkItem.style.setProperty('--cursor-pointer-y', `${verticalCoordinate}px`);
      });
    });
  </script>
</body>
</html>
