<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Terminal - Firefly User Badge Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="neon-viewport">
        <!-- Interactive Micro-Frontend Profile Container Hub Card -->
        <div class="profile-display-card">
            <!-- Profile Avatar Interactive Container Area -->
            <div class="avatar-wrapper">
                <div class="mock-avatar-image">ST</div>
                
                <!-- Advanced Pure-CSS Firefly User Badge Element -->
                <div class="firefly-user-badge ease-firefly-glow">
                    <!-- Floating Bio-Luminescent Particle Vectors -->
                    <span class="firefly-particle particle-1"></span>
                    <span class="firefly-particle particle-2"></span>
                    <span class="badge-label-text">PRO TIER</span>
                </div>
            </div>

            <div class="profile-details-node">
                <h3 class="user-handle-name">Stewartsson_Node</h3>
                <p class="user-signature-status">Core Infrastructure Integration Engineering Lead</p>
            </div>

            <footer class="profile-footer">
                <div class="stream-verification-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Bio-Telemetry Connection Fully Synced</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
