<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Select with Tags</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Multi-Select with Tags
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Search, select multiple options, and remove them as tags.
    </p>

    <div class="multi-select ease-mx-auto ease-max-w-xs">
      <!-- Search input -->
      <input type="text" id="searchInput" class="ease-input ease-w-full ease-mb-2" placeholder="Search options...">

      <!-- Dropdown -->
      <div id="dropdown" class="ease-card ease-shadow-lg ease-hidden ease-mb-2">
        <ul id="optionsList" class="ease-list-none ease-p-0 ease-m-0">
          <li class="option-item" data-value="React">React</li>
          <li class="option-item" data-value="Vue">Vue</li>
          <li class="option-item" data-value="Angular">Angular</li>
          <li class="option-item" data-value="Svelte">Svelte</li>
          <li class="option-item" data-value="Next.js">Next.js</li>
          <li class="option-item" data-value="Nuxt">Nuxt</li>
        </ul>
      </div>

      <!-- Selected tags -->
      <div id="selectedTags" class="ease-flex ease-flex-wrap ease-gap-2"></div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Tags have a smooth collapse animation on removal.
    </p>
  </div>

  <script>
    const searchInput = document.getElementById('searchInput');
    const dropdown = document.getElementById('dropdown');
    const optionsList = document.getElementById('optionsList');
    const selectedTags = document.getElementById('selectedTags');
    const optionItems = document.querySelectorAll('.option-item');

    let selected = new Set();

    // Show/hide dropdown on input focus
    searchInput.addEventListener('focus', () => {
      dropdown.classList.remove('ease-hidden');
    });
    searchInput.addEventListener('blur', () => {
      // Delay to allow clicking on option
      setTimeout(() => dropdown.classList.add('ease-hidden'), 150);
    });

    // Filter options
    searchInput.addEventListener('input', () => {
      const filter = searchInput.value.toLowerCase();
      optionItems.forEach(item => {
        const text = item.textContent.toLowerCase();
        item.style.display = text.includes(filter) ? 'block' : 'none';
      });
    });

    // Select option
    optionItems.forEach(item => {
      item.addEventListener('mousedown', (e) => {
        e.preventDefault(); // prevent blur
        const value = item.dataset.value;
        if (!selected.has(value)) {
          selected.add(value);
          addTag(value);
        }
        searchInput.value = '';
        searchInput.dispatchEvent(new Event('input'));
        searchInput.focus();
      });
    });

    // Add tag to UI
    function addTag(value) {
      const tag = document.createElement('span');
      tag.className = 'ease-badge tag-chip';
      tag.innerHTML = `${value} <button class="remove-tag" aria-label="Remove ${value}">&times;</button>`;
      selectedTags.appendChild(tag);

      // Trigger entrance animation
      requestAnimationFrame(() => tag.classList.add('tag-visible'));

      // Remove tag handler
      tag.querySelector('.remove-tag').addEventListener('click', () => {
        selected.delete(value);
        tag.classList.remove('tag-visible');
        tag.addEventListener('transitionend', () => tag.remove());
      });
    }
  </script>

</body>
</html>
