<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Cyberpunk Neon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Cyberpunk Neon</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Neon slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="cyber-btn" aria-label="Launch system">
          <span class="cyber-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </span>
          <span>Launch</span>
          <span class="cyber-line"></span>
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-glow"></div>
          <div class="slide-header">
            <span class="slide-status">ONLINE</span>
            <span class="slide-signal">
              <span></span><span></span><span></span><span></span>
            </span>
          </div>
          <div class="slide-items">
            <div class="slide-item" style="--delay: 0s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </span>
              <span>Systems Active</span>
            </div>
            <div class="slide-item" style="--delay: 0.05s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </span>
              <span>Security Level: MAX</span>
            </div>
            <div class="slide-item" style="--delay: 0.1s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12 6 12 12 16 14"/>
                </svg>
              </span>
              <span>Latency: 0.02ms</span>
            </div>
          </div>
          <div class="slide-footer">
            <button class="cyber-cta">Initialize</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Glitch</button>
          <div class="slide-popover glitch" role="tooltip"><p>Glitch animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-cyan">Cyan</button>
          <div class="slide-popover theme-cyan" role="tooltip"><p>Cyan cyberpunk theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-magenta">Magenta</button>
          <div class="slide-popover theme-magenta" role="tooltip"><p>Magenta cyberpunk theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-lime">Lime</button>
          <div class="slide-popover theme-lime" role="tooltip"><p>Lime cyberpunk theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
