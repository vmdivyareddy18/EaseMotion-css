<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skeleton Card Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center;">
  
  <div class="ease-skeleton-card">
    <div class="ease-skeleton-header">
      <div class="ease-skeleton-item ease-skeleton-avatar"></div>
      <div class="ease-skeleton-title-container">
        <div class="ease-skeleton-item ease-skeleton-title"></div>
        <div class="ease-skeleton-item ease-skeleton-subtitle"></div>
      </div>
    </div>
    
    <div class="ease-skeleton-body">
      <div class="ease-skeleton-item ease-skeleton-line"></div>
      <div class="ease-skeleton-item ease-skeleton-line"></div>
      <div class="ease-skeleton-item ease-skeleton-line"></div>
    </div>
  </div>

</body>
</html>
