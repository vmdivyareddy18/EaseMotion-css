<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Catalog Zoom-In Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="catalog">

        <span class="badge">Product Catalog</span>

        <h1>Featured Products</h1>

        <p>
            Browse our premium collection and hover over each product to
            discover additional information through elegant Zoom-In tooltips.
        </p>

        <div class="products">

            <div class="card">

                <div class="image">🎧</div>

                <h3>Wireless Headphones</h3>

                <p class="price">$129</p>

                <button class="tooltip-btn">

                    Quick View

                    <span class="tooltip">
                        Active noise cancellation with up to 40 hours of battery life.
                    </span>

                </button>

            </div>

            <div class="card">

                <div class="image">⌚</div>

                <h3>Smart Watch</h3>

                <p class="price">$249</p>

                <button class="tooltip-btn">

                    Quick View

                    <span class="tooltip">
                        Track fitness, heart rate, sleep and notifications in real time.
                    </span>

                </button>

            </div>

            <div class="card">

                <div class="image">💻</div>

                <h3>Ultra Laptop</h3>

                <p class="price">$999</p>

                <button class="tooltip-btn">

                    Quick View

                    <span class="tooltip">
                        Lightweight aluminum design powered by the latest processor.
                    </span>

                </button>

            </div>

        </div>

    </section>

</div>

</body>
</html>
