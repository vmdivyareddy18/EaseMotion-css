<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Pulse Active Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Modern SaaS

</span>

<h1>

Pulse Active Modal

</h1>

<p>

Animated modal component
with pulse-active effects
designed for modern SaaS
interfaces and dashboards.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

🚀

</div>

<h2>

Launch Faster

</h2>

<p>

Create engaging user
experiences through subtle
pulse interactions and
clean SaaS visuals.

</p>

<button>

Get Started

</button>

</div>

</div>

</div>

</section>
