<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Fill Circular Progress Loader</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Liquid Circular Progress -->
  <div class="liquid-loader">
    <div class="percentage" id="counter">0%</div>
    <div class="wave"></div>
    <div class="wave wave-back"></div>
  </div>

  <script>
    // Animate percentage count-up
    const counter = document.getElementById('counter');
    let percent = 0;
    const duration = 6000; // Matches CSS rise transition duration (6s)
    const intervalTime = duration / 70;

    const interval = setInterval(() => {
      if (percent >= 70) {
        clearInterval(interval);
      } else {
        percent++;
        counter.innerText = percent + '%';
      }
    }, intervalTime);
  </script>

</body>
</html>
