<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Transition Showcase - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pt-wrapper">

    <div class="pt-pages" id="pageContainer">
      <div class="pt-page active" data-page="0">
        <h2>Home</h2>
        <p>Welcome to the page transition showcase.</p>
        <div class="pt-decor">&#9733;</div>
      </div>
      <div class="pt-page" data-page="1">
        <h2>About</h2>
        <p>This demonstrates CSS-based page transitions including fade, slide, and zoom effects.</p>
        <div class="pt-decor">&#9829;</div>
      </div>
      <div class="pt-page" data-page="2">
        <h2>Gallery</h2>
        <p>Each transition type uses a different CSS animation class.</p>
        <div class="pt-decor">&#9830;</div>
      </div>
      <div class="pt-page" data-page="3">
        <h2>Contact</h2>
        <p>Click the navigation buttons or use arrow keys to navigate.</p>
        <div class="pt-decor">&#9993;</div>
      </div>
    </div>

    <div class="pt-indicator" id="pageIndicator">1 / 4</div>

    <div class="pt-nav">
      <button class="pt-nav-btn" id="prevBtn">&larr; Prev</button>
      <div class="pt-types">
        <button class="type-btn active" data-type="fade">Fade</button>
        <button class="type-btn" data-type="slide">Slide</button>
        <button class="type-btn" data-type="zoom">Zoom</button>
      </div>
      <button class="pt-nav-btn" id="nextBtn">Next &rarr;</button>
    </div>

  </div>

  <script>
    const pages = document.querySelectorAll('.pt-page');
    const container = document.getElementById('pageContainer');
    const indicator = document.getElementById('pageIndicator');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const typeBtns = document.querySelectorAll('.type-btn');

    let current = 0;
    let currentType = 'fade';

    function switchPage(index) {
      if (index === current) return;
      const dir = index > current ? 'next' : 'prev';
      const outgoing = pages[current];
      const incoming = pages[index];

      outgoing.classList.remove('active');
      incoming.classList.remove('fade-in', 'slide-in', 'zoom-in');

      void incoming.offsetWidth;

      incoming.classList.add(currentType + '-in');
      incoming.classList.add('active');

      current = index;
      indicator.textContent = (current + 1) + ' / ' + pages.length;
    }

    function goNext() {
      if (current < pages.length - 1) switchPage(current + 1);
    }

    function goPrev() {
      if (current > 0) switchPage(current - 1);
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight') goNext();
      if (e.key === 'ArrowLeft') goPrev();
    });

    typeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        typeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentType = btn.dataset.type;
      });
    });
  </script>

</body>
</html>
