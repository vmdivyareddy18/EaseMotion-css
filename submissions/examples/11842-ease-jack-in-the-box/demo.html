<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-jack-in-the-box</title>
  <meta name="description" content="A demonstration of the ease-jack-in-the-box animation showing a playful pop-in spring effect on entrance.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-jack-in-the-box</h1>
      <p class="subtitle" id="main-desc">Pops in with a surprise spring from a bottom center origin</p>
    </header>

    <div class="display-area">
      <!-- Target that pop in -->
      <div class="jack-target ease-jack-in-the-box" id="target-element">
        <span>📦</span>
        <span class="jack-label">Surprise!</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Entrance</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-jack-in-the-box');
      void target.offsetWidth;
      target.classList.add('ease-jack-in-the-box');
    }
  </script>

</body>
</html>
