<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cyberpunk inspired Color Shift Navigation Bar component showcasing pure CSS hover animations and focus state accessibility.">
  <title>Color Shift Navigation Bar - Cyberpunk Component Showcase</title>
  <!-- Load EaseMotion CSS Framework Core -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Load Component Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-demo-body">

  <div class="cyber-demo-container">
    <!-- Pure CSS Cyberpunk Color Shift Navigation Bar -->
    <nav class="cyber-nav-ag" aria-label="Main Navigation">
      <div class="cyber-nav-brand-ag" id="nav-brand-label">
        <span class="cyber-brand-icon-ag" aria-hidden="true">◈</span> NEURAL.NET
      </div>

      <!-- Pure CSS mobile menu toggle -->
      <input type="checkbox" id="cyber-nav-toggle-ag" class="cyber-nav-toggle-ag" aria-hidden="true">
      <label for="cyber-nav-toggle-ag" class="cyber-nav-toggle-btn-ag" aria-label="Toggle Navigation Menu">
        <span class="bar-ag"></span>
        <span class="bar-ag"></span>
        <span class="bar-ag"></span>
      </label>

      <!-- Menu links -->
      <div class="cyber-nav-menu-ag" role="menubar" aria-labelledby="nav-brand-label">
        <a href="#discover" class="cyber-nav-link-ag active" role="menuitem">
          <span class="nav-icon-ag" aria-hidden="true">◉</span> Discover
        </a>
        <a href="#network" class="cyber-nav-link-ag" role="menuitem">
          <span class="nav-icon-ag" aria-hidden="true">⧉</span> Network
        </a>
        <a href="#terminal" class="cyber-nav-link-ag" role="menuitem">
          <span class="nav-icon-ag" aria-hidden="true">⎔</span> Terminal
        </a>
        <a href="#profile" class="cyber-nav-link-ag" role="menuitem">
          <span class="nav-icon-ag" aria-hidden="true">▲</span> Profile
        </a>
      </div>
    </nav>
  </div>

</body>
</html>
