<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Underline Offset Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Text Underline Offset</h1>
    <p class="note">Controls the distance of the underline from the text.</p>

    <div class="label">underline-offset-auto</div>
    <a class="demo-link underline-offset-auto">Underline offset: auto</a>

    <div class="label">underline-offset-1 (1px)</div>
    <a class="demo-link underline-offset-1">Underline offset: 1px</a>

    <div class="label">underline-offset-4 (4px)</div>
    <a class="demo-link underline-offset-4">Underline offset: 4px</a>

    <div class="label">underline-offset-8 (8px)</div>
    <a class="demo-link underline-offset-8">Underline offset: 8px</a>
  </body>
</html>
