<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Consent Banner</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <p style="color: #94a3b8;">Scroll down to see the cookie banner.</p>
  </div>
  <div class="cookie-banner" id="cookieBanner">
    <p class="cookie-text">We use cookies to improve your experience. By using this site, you accept our cookie policy.</p>
    <div class="cookie-actions">
      <button class="cookie-btn cookie-btn-accept" id="cookieAccept">Accept</button>
      <button class="cookie-btn cookie-btn-decline" id="cookieDecline">Decline</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
