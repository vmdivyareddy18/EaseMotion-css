<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-carousel-slide-transition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cst-wrapper">
    <h1 class="cst-heading">Carousel Slide Transition</h1>
    <div class="cst-carousel" style="--cst-active-index: 0">
      <div class="cst-track">
        <div class="cst-slide" style="background: #e94560;">1</div>
        <div class="cst-slide" style="background: #0f3460;">2</div>
        <div class="cst-slide" style="background: #533483;">3</div>
        <div class="cst-slide" style="background: #1a8a5c;">4</div>
      </div>
      <button class="cst-nav cst-nav--prev" aria-label="Previous slide">&#8249;</button>
      <button class="cst-nav cst-nav--next" aria-label="Next slide">&#8250;</button>
      <div class="cst-dots">
        <span class="cst-dot" data-index="0"></span>
        <span class="cst-dot" data-index="1"></span>
        <span class="cst-dot" data-index="2"></span>
        <span class="cst-dot" data-index="3"></span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var carousel = document.querySelector('.cst-carousel');
      var slides = document.querySelectorAll('.cst-slide');
      var dots = document.querySelectorAll('.cst-dot');
      var prevBtn = document.querySelector('.cst-nav--prev');
      var nextBtn = document.querySelector('.cst-nav--next');
      var total = slides.length;
      var getIndex = function() {
        return parseInt(carousel.style.getPropertyValue('--cst-active-index')) || 0;
      };
      var setIndex = function(i) {
        i = Math.max(0, Math.min(i, total - 1));
        carousel.style.setProperty('--cst-active-index', i);
        dots.forEach(function(d) { d.classList.toggle('active', parseInt(d.dataset.index) === i); });
      };
      dots.forEach(function(dot) {
        dot.addEventListener('click', function() { setIndex(parseInt(this.dataset.index)); });
      });
      prevBtn.addEventListener('click', function() { setIndex(getIndex() - 1); });
      nextBtn.addEventListener('click', function() { setIndex(getIndex() + 1); });
      setIndex(0);
    })();
  </script>
</body>
</html>
