<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Polar Area Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <figure class="polar">
    <figcaption class="pa-title">Activity by day</figcaption>
    <svg viewBox="0 0 220 220" role="img" aria-label="Polar area chart across six days">
      <g class="pa-grid">
        <circle cx="110" cy="110" r="23" />
        <circle cx="110" cy="110" r="46" />
        <circle cx="110" cy="110" r="69" />
        <circle cx="110" cy="110" r="92" />
      </g>
      <g class="pa-segs">
        <path class="s0" d="M110 110 L110.0 32.53 A77.47 77.47 0 0 1 177.09 71.26 Z" />
        <path class="s1" d="M110 110 L156.13 83.37 A53.26 53.26 0 0 1 156.13 136.63 Z" />
        <path class="s2" d="M110 110 L187.16 154.55 A89.09 89.09 0 0 1 110.0 199.09 Z" />
        <path class="s3" d="M110 110 L110.0 148.74 A38.74 38.74 0 0 1 76.45 129.37 Z" />
        <path class="s4" d="M110 110 L51.29 143.89 A67.79 67.79 0 0 1 51.29 76.11 Z" />
        <path class="s5" d="M110 110 L59.68 80.95 A58.11 58.11 0 0 1 110.0 51.89 Z" />
      </g>
    </svg>
    <figcaption class="pa-legend">
      <span class="s0">Mon</span>
      <span class="s1">Tue</span>
      <span class="s2">Wed</span>
      <span class="s3">Thu</span>
      <span class="s4">Fri</span>
      <span class="s5">Sat</span>
    </figcaption>
  </figure>
</body>
</html>
