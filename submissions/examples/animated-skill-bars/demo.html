<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skill Bars - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>My Skills</h1>
      <p>A showcase of my technical proficiencies and experience levels.</p>
    </header>

    <!-- Skills Card -->
    <div class="skills-wrapper">
      <!-- Skill 1 -->
      <div class="skill-item ease-fade-in-up ease-delay-100">
        <div class="skill-header">
          <span class="skill-name">HTML5 & Semantic Web</span>
          <span class="skill-percent">95%</span>
        </div>
        <div class="skill-track">
          <div class="skill-fill fill-95"></div>
        </div>
      </div>

      <!-- Skill 2 -->
      <div class="skill-item ease-fade-in-up ease-delay-200">
        <div class="skill-header">
          <span class="skill-name">CSS3 & Animations</span>
          <span class="skill-percent">90%</span>
        </div>
        <div class="skill-track">
          <div class="skill-fill fill-90"></div>
        </div>
      </div>

      <!-- Skill 3 -->
      <div class="skill-item ease-fade-in-up ease-delay-300">
        <div class="skill-header">
          <span class="skill-name">JavaScript (ES6+)</span>
          <span class="skill-percent">85%</span>
        </div>
        <div class="skill-track">
          <div class="skill-fill fill-85"></div>
        </div>
      </div>

      <!-- Skill 4 -->
      <div class="skill-item ease-fade-in-up ease-delay-400">
        <div class="skill-header">
          <span class="skill-name">React & Next.js</span>
          <span class="skill-percent">80%</span>
        </div>
        <div class="skill-track">
          <div class="skill-fill fill-80"></div>
        </div>
      </div>

      <!-- Skill 5 -->
      <div class="skill-item ease-fade-in-up ease-delay-500">
        <div class="skill-header">
          <span class="skill-name">Node.js & Express</span>
          <span class="skill-percent">75%</span>
        </div>
        <div class="skill-track">
          <div class="skill-fill fill-75"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
