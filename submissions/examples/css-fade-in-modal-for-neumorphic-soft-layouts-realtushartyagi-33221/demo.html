<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-In Modal (Neumorphic UI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #e0e5ec; /* Neumorphic base background */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 16px 32px;
      background: #e0e5ec;
      color: #3182ce;
      text-decoration: none;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      border-radius: 12px;
      box-shadow: 9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .demo-trigger-btn:hover {
      box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.6), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.5);
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#neu-modal" class="demo-trigger-btn">Open Settings</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="neu-modal" class="ease-neu-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-neu-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-neu-modal-window">
      <a href="#" class="ease-neu-modal-close" aria-label="Close modal">&times;</a>
      
      <h2 class="ease-neu-modal-title">Preferences</h2>
      <p class="ease-neu-modal-text">
        Adjust your system settings. Notice the smooth <strong>Fade-In</strong> and slight scale-up interaction when this modal appears. 
        It perfectly matches the soft, tactile aesthetics of Neumorphism while utilizing pure CSS for state management.
      </p>
      
      <a href="#" class="ease-neu-modal-btn">Save Changes</a>
    </div>

  </div>

</body>
</html>
