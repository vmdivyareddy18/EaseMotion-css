<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Music Player - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="player-container ease-zoom-in">
    <!-- Album Art (Spinning Vinyl) -->
    <div class="album-art-wrapper">
      <div class="album-art ease-spin-slow">
        <div class="vinyl-hole"></div>
      </div>
    </div>

    <!-- Track Info -->
    <div class="track-info ease-fade-in-up ease-delay-200">
      <h2 class="track-title">Midnight City</h2>
      <p class="track-artist">M83</p>
    </div>

    <!-- Equalizer Bars -->
    <div class="equalizer ease-fade-in-up ease-delay-300">
      <span class="bar ease-pulse"></span>
      <span class="bar ease-pulse ease-delay-100"></span>
      <span class="bar ease-pulse ease-delay-200"></span>
      <span class="bar ease-pulse ease-delay-300"></span>
      <span class="bar ease-pulse ease-delay-100"></span>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container ease-fade-in-up ease-delay-400">
      <span class="time">1:24</span>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
      <span class="time">4:03</span>
    </div>

    <!-- Playback Controls -->
    <div class="controls ease-fade-in-up ease-delay-500">
      <button class="control-btn ease-hover-grow" aria-label="Previous">⏮</button>
      <button class="control-btn play-btn ease-hover-grow" aria-label="Play">▶</button>
      <button class="control-btn ease-hover-grow" aria-label="Next">⏭</button>
    </div>
  </div>
</body>
</html>
