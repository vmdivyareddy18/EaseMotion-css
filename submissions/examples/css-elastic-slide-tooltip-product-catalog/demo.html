<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Slide Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <section class="catalog">
    <h1>Product Catalog Tooltip</h1>

    <div class="product-card">

      <div class="tooltip-wrapper">

        <button class="product-btn" aria-describedby="tooltip">
          View Product
        </button>

        <div class="tooltip" id="tooltip" role="tooltip">
          🛒 Premium product details available
        </div>

      </div>

    </div>

  </section>

</body>
</html>
