<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Staggered Entrance Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Creative Portfolio

</span>

<h1>

Staggered Entrance Modal

</h1>

<p>

An elegant portfolio modal
featuring staggered entrance
animations designed for
creative showcases and
personal branding websites.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

View Project

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close">

✕

</label>

<div class="modal-content">

<div class="icon">

🎨

</div>

<h2>

Featured Creation

</h2>

<p>

Present projects, design
systems and branding ideas
through a refined staggered
animation sequence.

</p>

<button>

Explore Work

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
