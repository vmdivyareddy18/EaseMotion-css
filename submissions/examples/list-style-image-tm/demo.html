<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Style Image Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>List Style Image</h1>
      <p class="subtitle">Uses a custom image as the marker for list items.</p>
      <span class="badge">CSS Property: list-style-image</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">list-style-image: none</span>
          <span class="demo-value list-style-image-sm">List Style Image variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">list-style-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2216%22 height=%2216%22><rect width=%2216%22 height=%2216%22 fill=%22%236c63ff%22/></svg>')</span>
          <span class="demo-value list-style-image-md">List Style Image variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="list-style-image"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
