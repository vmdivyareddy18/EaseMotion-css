<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Virtual Drum Kit - EaseMotion CSS</title>
  <!-- Link EaseMotion core animations -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link local style sheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="drum-card">
    <!-- Header -->
    <header class="drum-header">
      <div class="brand">
        <span class="pulse-badge">BEAT ENGINE</span>
        <h1>EASEMOTION DRUMS</h1>
      </div>
    </header>

    <!-- Controls Drawer -->
    <section class="control-panel">
      <div class="control-group">
        <label for="preset-select">Sound Preset</label>
        <select id="preset-select">
          <option value="acoustic" selected>Acoustic Kit (Clean)</option>
          <option value="lofi">Lo-Fi Synth (Retro)</option>
        </select>
      </div>

      <div class="control-group volume-group">
        <label for="volume-slider">Master Volume</label>
        <div class="slider-container">
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.4">
          <span id="volume-label">40%</span>
        </div>
      </div>
    </section>

    <!-- Drum Kit Stage -->
    <main class="drum-stage">
      
      <!-- Crash Cymbal -->
      <div class="drum-element cymbal crash" data-drum="crash" data-key="A" style="--element-index: 1;">
        <div class="cymbal-inner">
          <span class="drum-label">Crash</span>
          <span class="key-bind">A</span>
        </div>
      </div>

      <!-- Hi-Hat -->
      <div class="drum-element cymbal hihat" data-drum="hihat" data-key="S" style="--element-index: 2;">
        <div class="cymbal-inner">
          <span class="drum-label">Hi-Hat</span>
          <span class="key-bind">S</span>
        </div>
      </div>

      <!-- Snare Drum -->
      <div class="drum-element drum-head snare" data-drum="snare" data-key="D" style="--element-index: 3;">
        <div class="rim">
          <div class="drum-skin">
            <span class="drum-label">Snare</span>
            <span class="key-bind">D</span>
          </div>
        </div>
      </div>

      <!-- Tom Drum -->
      <div class="drum-element drum-head tom" data-drum="tom" data-key="F" style="--element-index: 4;">
        <div class="rim">
          <div class="drum-skin">
            <span class="drum-label">Tom-Tom</span>
            <span class="key-bind">F</span>
          </div>
        </div>
      </div>

      <!-- Bass Kick Drum -->
      <div class="drum-element drum-head kick" data-drum="kick" data-key="Space" style="--element-index: 5;">
        <div class="kick-body">
          <span class="drum-label">Bass Drum</span>
          <span class="key-bind">Space</span>
        </div>
      </div>

    </main>

    <!-- Key bindings helper info -->
    <footer class="drum-footer">
      <p>Hit your keyboard keys or click the drum components directly to play!</p>
      <div class="legend-row">
        <span><kbd>A</kbd> Crash</span>
        <span><kbd>S</kbd> Hi-Hat</span>
        <span><kbd>D</kbd> Snare</span>
        <span><kbd>F</kbd> Tom-Tom</span>
        <span><kbd>Space</kbd> Bass Kick</span>
      </div>
    </footer>
  </div>

  <!-- Audio Synthesis Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // selectors
      const volumeSlider = document.getElementById('volume-slider');
      const volumeLabel = document.getElementById('volume-label');
      const presetSelect = document.getElementById('preset-select');
      const drumElements = document.querySelectorAll('.drum-element');

      let audioCtx = null;
      let noiseBuffer = null;

      // Lazy load Audio Context and generate white noise buffer
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          
          // Generate a 2-second buffer of white noise
          const bufferSize = audioCtx.sampleRate * 2;
          noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
          const data = noiseBuffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      // Master volume controls
      volumeSlider.addEventListener('input', (e) => {
        const val = Math.round(e.target.value * 100);
        volumeLabel.textContent = `${val}%`;
      });

      // Synthesis triggers
      function playDrum(type) {
        initAudio();
        if (!audioCtx) return;

        const masterVol = parseFloat(volumeSlider.value);
        const preset = presetSelect.value;
        const now = audioCtx.currentTime;

        // Visual Active Animation Trigger
        const el = document.querySelector(`[data-drum="${type}"]`);
        if (el) {
          el.classList.remove('active');
          void el.offsetWidth; // Trigger reflow for animation restart
          el.classList.add('active');
        }

        switch (type) {
          case 'kick':
            playKick(now, masterVol, preset);
            break;
          case 'snare':
            playSnare(now, masterVol, preset);
            break;
          case 'hihat':
            playHiHat(now, masterVol, preset);
            break;
          case 'tom':
            playTom(now, masterVol, preset);
            break;
          case 'crash':
            playCrash(now, masterVol, preset);
            break;
        }
      }

      // 1. Kick Drum Synthesizer (Pitch slide + Envelope)
      function playKick(time, masterVol, preset) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const startFreq = preset === 'lofi' ? 120 : 150;
        const endFreq = 0.01;
        const duration = preset === 'lofi' ? 0.35 : 0.25;

        osc.frequency.setValueAtTime(startFreq, time);
        osc.frequency.exponentialRampToValueAtTime(endFreq, time + duration);

        gainNode.gain.setValueAtTime(masterVol * 1.5, time);
        gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration);

        osc.start(time);
        osc.stop(time + duration);
      }

      // 2. Snare Drum Synthesizer (Oscillator shell snap + White noise)
      function playSnare(time, masterVol, preset) {
        // Noise source (snare wires rattle)
        const noise = audioCtx.createBufferSource();
        noise.buffer = noiseBuffer;

        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'bandpass';
        noiseFilter.frequency.value = preset === 'lofi' ? 800 : 1000;

        const noiseGain = audioCtx.createGain();
        noiseGain.gain.setValueAtTime(masterVol * 0.8, time);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, time + (preset === 'lofi' ? 0.3 : 0.2));

        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);

        // Shell snap oscillator (Triangular wave)
        const osc = audioCtx.createOscillator();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(180, time);

        const oscGain = audioCtx.createGain();
        oscGain.gain.setValueAtTime(masterVol * 0.5, time);
        oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

        osc.connect(oscGain);
        oscGain.connect(audioCtx.destination);

        noise.start(time);
        osc.start(time);
        noise.stop(time + 0.3);
        osc.stop(time + 0.1);
      }

      // 3. Hi-Hat Synthesizer (Short High-Pass Noise)
      function playHiHat(time, masterVol, preset) {
        const source = audioCtx.createBufferSource();
        source.buffer = noiseBuffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'highpass';
        filter.frequency.value = preset === 'lofi' ? 5000 : 7500;

        const gainNode = audioCtx.createGain();
        const duration = preset === 'lofi' ? 0.08 : 0.05;
        gainNode.gain.setValueAtTime(masterVol * 0.4, time);
        gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration);

        source.connect(filter);
        filter.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        source.start(time);
        source.stop(time + duration);
      }

      // 4. Tom-Tom Synthesizer (Medium Pitch Slide)
      function playTom(time, masterVol, preset) {
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const startFreq = preset === 'lofi' ? 90 : 110;
        const endFreq = 0.01;
        const duration = 0.3;

        osc.frequency.setValueAtTime(startFreq, time);
        osc.frequency.exponentialRampToValueAtTime(endFreq, time + duration);

        gainNode.gain.setValueAtTime(masterVol * 1.2, time);
        gainNode.gain.exponentialRampToValueAtTime(0.001, time + duration);

        osc.start(time);
        osc.stop(time + duration);
      }

      // 5. Crash Cymbal Synthesizer (Metallic resonating wave mix + Long Band-Pass Noise)
      function playCrash(time, masterVol, preset) {
        // Long Noise
        const source = audioCtx.createBufferSource();
        source.buffer = noiseBuffer;

        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = preset === 'lofi' ? 2500 : 3500;

        const noiseGain = audioCtx.createGain();
        const duration = preset === 'lofi' ? 1.5 : 1.2;
        noiseGain.gain.setValueAtTime(masterVol * 0.9, time);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, time + duration);

        source.connect(filter);
        filter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);

        // High frequency metallic oscillators mix
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const oscGain = audioCtx.createGain();

        osc1.frequency.value = 520;
        osc2.frequency.value = 830;

        oscGain.gain.setValueAtTime(masterVol * 0.25, time);
        oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.45);

        osc1.connect(oscGain);
        osc2.connect(oscGain);
        oscGain.connect(audioCtx.destination);

        source.start(time);
        osc1.start(time);
        osc2.start(time);

        source.stop(time + duration);
        osc1.stop(time + 0.45);
        osc2.stop(time + 0.45);
      }

      // Mouse triggers
      drumElements.forEach(el => {
        el.addEventListener('mousedown', (e) => {
          e.preventDefault();
          const type = el.getAttribute('data-drum');
          playDrum(type);
        });
      });

      // Keyboard bindings trigger
      window.addEventListener('keydown', (e) => {
        if (e.repeat) return; // Prevent key repeat retriggers
        
        let key = e.key.toLowerCase();
        if (key === ' ') {
          playDrum('kick');
        } else if (key === 'a') {
          playDrum('crash');
        } else if (key === 's') {
          playDrum('hihat');
        } else if (key === 'd') {
          playDrum('snare');
        } else if (key === 'f') {
          playDrum('tom');
        }
      });
    });
  </script>
</body>
</html>
