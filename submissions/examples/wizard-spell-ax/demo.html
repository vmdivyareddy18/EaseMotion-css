<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-wizard-spell – Wizard Spell Animation</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-900 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-4xl ease-font-bold ease-text-white ease-mb-4 ease-fade-in">
      Wizard Spell
    </h1>
    <p class="ease-text-gray-400 ease-mb-8 ease-fade-in ease-delay-200">
      Hover over the wand to cast a magical spell!
    </p>

    <!-- Spell casting area -->
    <div class="spell-area">
      <!-- Wand -->
      <div class="wand ease-hover-scale-105 ease-transition">
        <span class="wand-icon">🪄</span>
      </div>
      <!-- Magical orb that appears -->
      <div class="spell-orb"></div>
      <!-- Sparkles -->
      <div class="sparkle sparkle-1">✨</div>
      <div class="sparkle sparkle-2">✨</div>
      <div class="sparkle sparkle-3">✨</div>
      <div class="sparkle sparkle-4">✨</div>
      <div class="sparkle sparkle-5">✨</div>
    </div>

    <p class="ease-text-sm ease-text-gray-500 ease-mt-8 ease-fade-in ease-delay-500">
      Pure CSS animation — hover triggers the spell.
    </p>
  </div>

</body>
</html>
