<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Daily Habit Streak Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="habit-card">

        <div class="badge">
            🔥 Streak Master
        </div>

        <h2>Daily Habit Tracker</h2>

        <div class="streak-count">
            21 Days
        </div>

        <p class="description">
            You have successfully maintained your habits for 21 consecutive days.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Weekly Progress</span>
                <span>85%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="habit-list">

            <div class="habit completed">
                ✓ Morning Exercise
            </div>

            <div class="habit completed">
                ✓ Read 20 Pages
            </div>

            <div class="habit completed">
                ✓ Drink 2L Water
            </div>

            <div class="habit pending">
                ○ Meditation
            </div>

        </div>

        <div class="motivation-box">
            🌟 Keep going! You're building a powerful routine.
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Continue Streak
            </button>

            <button class="secondary-btn">
                View Statistics
            </button>

        </div>

    </div>

</div>

</body>
</html>
