<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hamburger Menu Cross - EaseMotion CSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>Hamburger Menu Cross</h1>
  <button class="hmc-btn" id="hmcToggle" aria-label="Toggle menu">
    <span class="hmc-line hmc-line-1"></span>
    <span class="hmc-line hmc-line-2"></span>
    <span class="hmc-line hmc-line-3"></span>
  </button>
</div>
<script>
  document.getElementById('hmcToggle').addEventListener('click', function() {
    this.classList.toggle('hmc-active');
  });
</script>
</body>
</html>
