<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Card Flip - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Contact Card Flip</h1>
    <p class="desc">Hover over the card to flip and reveal contact details</p>
    <div class="ccf-card" id="flipCard" tabindex="0" style="--card-width: 280px; --card-height: 340px; --front-bg: #1e293b; --back-bg: #0f172a; --flip-duration: 0.6s;">
      <div class="ccf-inner">
        <div class="ccf-front">
          <div class="ccf-avatar">JD</div>
          <h2>Jane Doe</h2>
          <p>Software Engineer</p>
          <p class="ccf-hint">Hover to flip</p>
        </div>
        <div class="ccf-back">
          <div class="ccf-icon">&#9993;</div>
          <p>jane.doe@email.com</p>
          <div class="ccf-icon">&#9742;</div>
          <p>+1 (555) 123-4567</p>
          <div class="ccf-icon">&#9906;</div>
          <p>@janedoe</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
