<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Checkbox - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background-color: var(--neon-bg); transition: background-color var(--ease-speed-medium, 300ms) var(--ease-ease);">
  
  <!-- Container showing the different states of the Neon Checkbox -->
  <div style="display: flex; flex-direction: column; gap: var(--ease-space-4, 1rem); padding: var(--ease-space-6, 1.5rem); border-radius: var(--ease-radius-lg, 1rem); background: var(--neon-bg); box-shadow: 6px 6px 16px var(--neon-shadow-dark), -6px -6px 16px var(--neon-shadow-light); border: 1px solid var(--neon-border); max-width: 320px; width: 100%; box-sizing: border-box;">
    
    <!-- 1. Default (Unchecked) -->
    <label class="ease-neon-checkbox">
      <input type="checkbox" class="ease-neon-checkbox-input">
      <span class="ease-neon-checkbox-box">
        <svg class="ease-neon-checkbox-checkmark" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span class="ease-neon-checkbox-text">Default Unchecked</span>
    </label>

    <!-- 2. Checked -->
    <label class="ease-neon-checkbox">
      <input type="checkbox" class="ease-neon-checkbox-input" checked>
      <span class="ease-neon-checkbox-box">
        <svg class="ease-neon-checkbox-checkmark" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span class="ease-neon-checkbox-text">Checked State</span>
    </label>

    <!-- 3. Unchecked Disabled -->
    <label class="ease-neon-checkbox is-disabled">
      <input type="checkbox" class="ease-neon-checkbox-input" disabled>
      <span class="ease-neon-checkbox-box">
        <svg class="ease-neon-checkbox-checkmark" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span class="ease-neon-checkbox-text">Disabled Unchecked</span>
    </label>

    <!-- 4. Checked Disabled -->
    <label class="ease-neon-checkbox is-disabled">
      <input type="checkbox" class="ease-neon-checkbox-input" checked disabled>
      <span class="ease-neon-checkbox-box">
        <svg class="ease-neon-checkbox-checkmark" viewBox="0 0 24 24">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </span>
      <span class="ease-neon-checkbox-text">Disabled Checked</span>
    </label>

  </div>

</body>
</html>
