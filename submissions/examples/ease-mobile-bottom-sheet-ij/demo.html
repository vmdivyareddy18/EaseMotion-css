<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-mobile-bottom-sheet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Bottom Sheet</h1>
    <p class="subtitle">Tap the trigger to slide up the sheet</p>
    <button class="trigger" id="trigger">Show Options</button>
    <div class="backdrop" id="backdrop"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-item">Edit</div>
      <div class="sheet-item">Share</div>
      <div class="sheet-item">Duplicate</div>
      <div class="sheet-item">Delete</div>
      <div class="sheet-cancel" id="cancelBtn">Cancel</div>
    </div>
  </div>
  <script>
    const trigger = document.getElementById('trigger');
    const sheet = document.getElementById('sheet');
    const backdrop = document.getElementById('backdrop');
    const cancelBtn = document.getElementById('cancelBtn');
    function openSheet() {
      sheet.classList.add('open');
      backdrop.classList.add('visible');
    }
    function closeSheet() {
      sheet.classList.remove('open');
      backdrop.classList.remove('visible');
    }
    trigger.addEventListener('click', openSheet);
    backdrop.addEventListener('click', closeSheet);
    cancelBtn.addEventListener('click', closeSheet);
  </script>
</body>
</html>
