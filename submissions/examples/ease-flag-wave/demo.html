<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-flag-wave – Waving Flag Effect</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Flag Wave Effect
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Fabric‑like distortion using <code>skewY</code> &amp; <code>scaleX</code> oscillations.
    </p>

    <!-- The flag banner -->
    <div class="flag-container">
      <div class="flag">
        <div class="flag-stripe flag-stripe--1"></div>
        <div class="flag-stripe flag-stripe--2"></div>
        <div class="flag-stripe flag-stripe--3"></div>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Great for banners, ribbons, and festive graphics.
    </p>
  </div>

</body>
</html>
