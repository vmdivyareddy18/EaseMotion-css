<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Approval Lane Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="tracker">
    <header>
      <p>Change Governance</p>
      <h1>Approval Lane Tracker</h1>
      <strong>4 of 6 lanes cleared</strong>
    </header>

    <section class="lanes" aria-label="Approval lanes">
      <article class="lane done">
        <span>Security</span>
        <strong>Cleared</strong>
        <div class="bar"><i></i></div>
      </article>
      <article class="lane done">
        <span>Data</span>
        <strong>Cleared</strong>
        <div class="bar"><i></i></div>
      </article>
      <article class="lane active">
        <span>Platform</span>
        <strong>Reviewing</strong>
        <div class="bar"><i></i></div>
      </article>
      <article class="lane done">
        <span>Support</span>
        <strong>Cleared</strong>
        <div class="bar"><i></i></div>
      </article>
      <article class="lane active">
        <span>Finance</span>
        <strong>Waiting</strong>
        <div class="bar"><i></i></div>
      </article>
      <article class="lane done">
        <span>Legal</span>
        <strong>Cleared</strong>
        <div class="bar"><i></i></div>
      </article>
    </section>
  </main>
</body>
</html>
