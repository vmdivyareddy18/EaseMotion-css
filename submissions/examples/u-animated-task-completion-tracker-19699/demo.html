<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Task Completion Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="task-card">

        <div class="badge">
            🏆 Productivity Champion
        </div>

        <h2>Project Progress</h2>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="progress-text">
            82% Complete
        </div>

        <div class="stats">

            <div class="stat-box">
                <h3>24</h3>
                <p>Completed Tasks</p>
            </div>

            <div class="stat-box">
                <h3>5</h3>
                <p>Pending Tasks</p>
            </div>

        </div>

        <div class="productivity">
            Daily Productivity Score
            <span>91%</span>
        </div>

        <div class="task-list">

            <div class="task completed">
                ✓ Design Dashboard UI
            </div>

            <div class="task completed">
                ✓ Build Responsive Layout
            </div>

            <div class="task completed">
                ✓ Add CSS Animations
            </div>

            <div class="task pending">
                ○ Write Documentation
            </div>

            <div class="task pending">
                ○ Final Testing
            </div>

        </div>

        <button class="action-btn">
            View Project
        </button>

    </div>

</div>

</body>
</html>
