<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Conic Progress Ring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

<header>
<h1>Ease Conic Progress Ring</h1>
<p>Animated CSS-only circular progress indicators.</p>
</header>

<section class="grid">

<article class="progress-card">
<div class="ring blue" style="--value:85%;">
<span>85%</span>
</div>
<h2>HTML</h2>
</article>

<article class="progress-card">
<div class="ring green" style="--value:72%;">
<span>72%</span>
</div>
<h2>CSS</h2>
</article>

<article class="progress-card">
<div class="ring purple" style="--value:94%;">
<span>94%</span>
</div>
<h2>Accessibility</h2>
</article>

</section>

</main>

</body>
</html>
