<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Policy Compliance List Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 60px 20px; margin: 0;">

  <div class="security-policy-card">
    <h4 style="margin: 0 0 4px 0; color: #0f172a; font-size: 1.2rem;">Set Account Password</h4>
    <p style="color: #64748b; font-size: 0.85rem; margin-top: 0; margin-bottom: 1rem;">
      Ensure your credential configuration aligns with security complexity standards.
    </p>

    <label style="font-size: 0.85rem; font-weight: 600; color: #334155;">New Password</label>
    <input type="password" class="security-input-field" value="Secured123!" readonly>

    <ul class="ease-policy-list">
      
      <li class="ease-policy-item valid">
        <span class="ease-policy-marker"></span>
        <span>Minimum of 8 character nodes</span>
      </li>

      <li class="ease-policy-item valid">
        <span class="ease-policy-marker"></span>
        <span>Includes alphanumeric uppercase flag</span>
      </li>

      <li class="ease-policy-item invalid">
        <span class="ease-policy-marker"></span>
        <span>Includes at least 1 special character block (&, %, #)</span>
      </li>

      <li class="ease-policy-item">
        <span class="ease-policy-marker"></span>
        <span>Excludes common blocklist sequences or leaks</span>
      </li>

    </ul>
  </div>

</body>
</html>
