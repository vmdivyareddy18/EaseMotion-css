<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Fade-Out Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Creative Portfolio

</span>

<h1>

Fade-Out Modal

</h1>

<p>

Elegant modal interaction
crafted for portfolios,
design showcases and
creative experiences.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

View Project

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

🎨

</div>

<h2>

Featured Project

</h2>

<p>

Showcase branding concepts,
creative campaigns and
portfolio highlights using
a smooth fade-out modal.

</p>

<button>

Explore Portfolio

</button>

</div>

</div>

</div>

</section>

</body>

</html>
