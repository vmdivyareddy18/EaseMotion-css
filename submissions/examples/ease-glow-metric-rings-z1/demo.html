<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Glow Metric Rings</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="metrics">

  <article class="ring-card">
    <div class="ring" style="--c:#45e9ff;">
      <span>92%</span>
    </div>
    <h3>Performance</h3>
  </article>

  <article class="ring-card">
    <div class="ring" style="--c:#8c63ff;">
      <span>78%</span>
    </div>
    <h3>Security</h3>
  </article>

  <article class="ring-card">
    <div class="ring" style="--c:#42f5a7;">
      <span>64%</span>
    </div>
    <h3>Storage</h3>
  </article>

</main>

</body>
</html>
