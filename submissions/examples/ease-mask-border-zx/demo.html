<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mask Border Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Mask Border</h1>
    <p class="note">
      Applies a mask around the border of an element using an image source.
      Requires a compatible browser.
    </p>

    <div class="label">mask border with SVG mask source</div>
    <div class="demo-box mask-border-source-url"></div>

    <div class="label">mask border with fill</div>
    <div class="demo-box mask-border-fill"></div>
  </body>
</html>
