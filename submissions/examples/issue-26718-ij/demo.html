<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-toucan-peck | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="leaf-toucan lt-1"></div>
    <div class="leaf-toucan lt-2"></div>
    <div class="toucan-body">
      <div class="toucan-head">
        <div class="eye-toucan"><div class="pupil-t"></div></div>
        <div class="beak-toucan">
          <div class="beak-line"></div>
        </div>
        <div class="beak-tip"></div>
      </div>
      <div class="fruit">
        <div class="fruit-stem"></div>
        <div class="fruit-leaf-t"></div>
      </div>
      <div class="wing-toucan"></div>
      <div class="tail-toucan">
        <div class="tail-feather-t"></div>
      </div>
    </div>
  </div>
</body>
</html>
