<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Highlighter Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-box">
        <p>This is a demonstration of the <span class="ease-highlight" id="highlightTarget">animated highlighter tool</span>. You can trigger it by hovering over the text or by clicking the button below.</p>
        <button class="trigger" id="triggerBtn">Toggle Highlight</button>
    </div>

    <script>
        const btn = document.getElementById('triggerBtn');
        const target = document.getElementById('highlightTarget');
        let isActive = false;
        
        btn.addEventListener('click', () => {
            isActive = !isActive;
            target.classList.toggle('active', isActive);
        });
    </script>
</body>
</html>
