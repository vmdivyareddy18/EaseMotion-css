<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-sharpen-in – Blur to Sharp Entrance</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Sharpen In
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      The card starts blurry and sharpens into focus while fading in.
    </p>

    <div id="sharpen-box" class="sharpen-box ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Coming Into Focus</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Blur → Sharp</p>
    </div>

    <button id="replay-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">
      Replay Animation
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      <code>filter: blur(12px)</code> + <code>opacity(0)</code> → <code>blur(0)</code> + <code>opacity(1)</code> in 0.5s ease‑out.
    </p>
  </div>

  <script>
    const box = document.getElementById('sharpen-box');
    const replayBtn = document.getElementById('replay-btn');

    function play() {
      box.classList.remove('sharp');
      void box.offsetWidth; // force reflow
      box.classList.add('sharp');
    }

    window.addEventListener('load', () => setTimeout(play, 300));
    replayBtn.addEventListener('click', play);
  </script>

</body>
</html>
