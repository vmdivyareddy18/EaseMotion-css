<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Iteration Count</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Animation Iteration Count</h1>
    <p class="subtitle">How many times an animation plays. Infinite, whole, decimal, and combined with direction.</p>

    <section class="demo-section">
      <h2>Iteration Count Values</h2>
      <div class="iter-grid">
        <div class="iter-card">
          <span class="iter-label">infinite</span>
          <div class="iter-bar"><div class="iter-ball" style="--count: infinite;"></div></div>
        </div>
        <div class="iter-card">
          <span class="iter-label">3</span>
          <div class="iter-bar"><div class="iter-ball" style="--count: 3;"></div></div>
        </div>
        <div class="iter-card">
          <span class="iter-label">2</span>
          <div class="iter-bar"><div class="iter-ball" style="--count: 2;"></div></div>
        </div>
        <div class="iter-card">
          <span class="iter-label">1</span>
          <div class="iter-bar"><div class="iter-ball" style="--count: 1;"></div></div>
        </div>
        <div class="iter-card">
          <span class="iter-label">2.5 (decimal)</span>
          <div class="iter-bar"><div class="iter-ball" style="--count: 2.5;"></div></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Iteration + Direction</h2>
      <div class="dir-grid">
        <div class="dir-card">
          <span class="dir-label">normal, 2</span>
          <div class="dir-bar"><div class="dir-box" style="--dir: normal; --count: 2;"></div></div>
        </div>
        <div class="dir-card">
          <span class="dir-label">reverse, 2</span>
          <div class="dir-bar"><div class="dir-box" style="--dir: reverse; --count: 2;"></div></div>
        </div>
        <div class="dir-card">
          <span class="dir-label">alternate, 3</span>
          <div class="dir-bar"><div class="dir-box" style="--dir: alternate; --count: 3;"></div></div>
        </div>
        <div class="dir-card">
          <span class="dir-label">alternate-reverse, 3</span>
          <div class="dir-bar"><div class="dir-box" style="--dir: alternate-reverse; --count: 3;"></div></div>
        </div>
      </div>
    </section>

    <button id="restartBtn" class="btn">Restart All</button>
  </main>
  <script>
    document.getElementById('restartBtn').addEventListener('click', () => {
      document.querySelectorAll('.iter-ball, .dir-box').forEach(el => {
        el.style.animation = 'none';
        void el.offsetHeight;
        el.style.animation = '';
      });
    });
  </script>
</body>
</html>
