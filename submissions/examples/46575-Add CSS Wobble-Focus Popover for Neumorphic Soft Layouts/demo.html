<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Wobble-Focus Popover - Neumorphic Soft</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Wobble-Focus interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="neumorphic-layout">
        <div class="neumorphic-card main-interface">
            <header class="interface-header">
                <div class="neo-btn icon-btn" aria-label="Menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </div>
                <h2>Dashboard</h2>
                <div class="neo-avatar"></div>
            </header>

            <div class="interface-body">
                <!-- THE WOBBLE-FOCUS POPOVER COMPONENT -->
                <div class="ease-popover-container">
                    
                    <div class="search-wrapper">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <!-- Focus trigger -->
                        <input type="text" class="ease-popover-trigger" placeholder="Search for settings..." aria-haspopup="true">
                    </div>
                    
                    <!-- Popover Panel -->
                    <div class="ease-popover-panel ease-wobble-focus" role="listbox">
                        <div class="ease-popover-header">
                            <h3>Quick Suggestions</h3>
                        </div>
                        <div class="ease-popover-body">
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                </div>
                                <div class="item-text">Edit Profile</div>
                            </a>
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                                </div>
                                <div class="item-text">Account Settings</div>
                            </a>
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                                </div>
                                <div class="item-text">Notification Preferences</div>
                            </a>
                        </div>
                    </div>
                </div>
                <!-- END POPOVER COMPONENT -->

                <div class="stats-grid">
                    <div class="neo-card stat-box">
                        <div class="stat-icon neo-inset">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#798292" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>
                        </div>
                        <h3>Activity</h3>
                        <p>1,245</p>
                    </div>
                    <div class="neo-card stat-box">
                        <div class="stat-icon neo-inset">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#798292" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                        </div>
                        <h3>Network</h3>
                        <p>842</p>
                    </div>
                </div>
                
                <div class="controls-section">
                    <h3>Volume Control</h3>
                    <div class="neo-track neo-inset">
                        <div class="neo-thumb neo-btn"></div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
