<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge Shine Sweep - EaseMotion CSS</title>

    <!-- Import Outfit and Inter fonts from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to custom styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-container">
      <h1>Badge Shine Sweep</h1>
      <p class="subtitle">
        A premium diagonal glare sweep effect that runs periodically across tags
        and labels.
      </p>

      <!-- Badge Grid Showcase -->
      <div class="badge-showcase-grid">
        <!-- Premium Gold Badge -->
        <div class="badge-wrapper">
          <span class="badge-label">Luxury gold</span>
          <div
            class="badge badge-premium ease-badge-shine-ag shine-tint-gold"
            id="badge-1"
          >
            Premium
          </div>
        </div>

        <!-- New Blue Badge -->
        <div class="badge-wrapper">
          <span class="badge-label">Primary blue</span>
          <div
            class="badge badge-new ease-badge-shine-ag shine-tint-blue"
            id="badge-2"
          >
            New
          </div>
        </div>

        <!-- Sale Red Badge -->
        <div class="badge-wrapper">
          <span class="badge-label">Accent red</span>
          <div class="badge badge-sale ease-badge-shine-ag" id="badge-3">
            Sale 50%
          </div>
        </div>

        <!-- Success Green Badge -->
        <div class="badge-wrapper">
          <span class="badge-label">Stable green</span>
          <div class="badge badge-success ease-badge-shine-ag" id="badge-4">
            Verified
          </div>
        </div>

        <!-- Slate Dark Badge -->
        <div class="badge-wrapper">
          <span class="badge-label">Slate pro</span>
          <div
            class="badge badge-dark ease-badge-shine-ag shine-dark"
            id="badge-5"
          >
            Pro
          </div>
        </div>
      </div>

      <!-- Interface Control Panel -->
      <div class="control-grid">
        <!-- Sweep Trigger Mode -->
        <div class="control-card">
          <span class="control-header-label">Trigger Mode</span>
          <div class="button-options-group">
            <button
              class="option-btn active"
              onclick="setTriggerMode('periodic', this)"
            >
              Periodic (Repeating)
            </button>
            <button class="option-btn" onclick="setTriggerMode('hover', this)">
              On Hover
            </button>
          </div>
        </div>

        <!-- Period Interval Control -->
        <div class="control-card">
          <span class="control-header-label">Shine Interval (Period)</span>
          <div class="slider-container">
            <input
              type="range"
              class="slider"
              min="1"
              max="8"
              step="0.5"
              value="4"
              id="period-slider"
              oninput="updatePeriod(this.value)"
            />
            <span class="slider-value" id="period-val">4.0s</span>
          </div>
        </div>
      </div>
    </div>

    <script>
      // State management
      let currentTriggerMode = "periodic";

      // Toggle trigger between infinite loop and hover trigger
      function setTriggerMode(mode, btnElement) {
        currentTriggerMode = mode;

        // Update active toggle buttons
        document
          .querySelectorAll(".option-btn")
          .forEach((btn) => btn.classList.remove("active"));
        btnElement.classList.add("active");

        const badges = document.querySelectorAll(".badge");
        const periodSlider = document.getElementById("period-slider");

        if (mode === "hover") {
          // Disable periodic slider UI since it's hover-triggered
          periodSlider.disabled = true;
          periodSlider.style.opacity = "0.4";

          badges.forEach((badge) => {
            badge.classList.add("shine-on-hover");
          });
        } else {
          // Enable periodic slider
          periodSlider.disabled = false;
          periodSlider.style.opacity = "1";

          badges.forEach((badge) => {
            badge.classList.remove("shine-on-hover");
          });
        }

        // Restart animation cycle
        triggerReset();
      }

      // Update periodic interval duration
      function updatePeriod(val) {
        document.getElementById("period-val").textContent =
          parseFloat(val).toFixed(1) + "s";
        document.documentElement.style.setProperty(
          "--ease-shine-period",
          val + "s"
        );
        triggerReset();
      }

      // Quick animation reset helper
      function triggerReset() {
        const badges = document.querySelectorAll(".badge");
        badges.forEach((badge) => {
          // Toggle display style briefly to trigger reflow
          const originalDisplay = badge.style.display;
          badge.style.display = "none";
          void badge.offsetHeight;
          badge.style.display = originalDisplay;
        });
      }
    </script>
  </body>
</html>
