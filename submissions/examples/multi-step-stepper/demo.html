<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Step Stepper — EaseMotion</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: #0f0f0f; font-family: sans-serif;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 56px; padding: 48px 24px; box-sizing: border-box;
    }
    h2 { color: #fff; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.4; margin: 0; }
    .demo-block { width: 100%; max-width: 520px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
  </style>
</head>
<body>

  <!-- 3-Step Variant -->
  <h2>3 Steps</h2>
  <div class="demo-block">
    <input type="radio" name="stepper3" id="s1" checked/>
    <input type="radio" name="stepper3" id="s2"/>
    <input type="radio" name="stepper3" id="s3"/>
    <div class="ease-stepper">
      <div class="ease-stepper__step" data-step="1">
        <label for="s1">
          <div class="ease-stepper__circle">1</div>
          <span class="ease-stepper__label">Account</span>
        </label>
      </div>
      <div class="ease-stepper__step" data-step="2">
        <label for="s2">
          <div class="ease-stepper__circle">2</div>
          <span class="ease-stepper__label">Details</span>
        </label>
      </div>
      <div class="ease-stepper__step" data-step="3">
        <label for="s3">
          <div class="ease-stepper__circle">3</div>
          <span class="ease-stepper__label">Confirm</span>
        </label>
      </div>
    </div>
  </div>

  <!-- 4-Step Variant -->
  <h2>4 Steps</h2>
  <div class="demo-block">
    <input type="radio" name="stepper4" id="s1" checked/>
    <input type="radio" name="stepper4" id="s2"/>
    <input type="radio" name="stepper4" id="s3"/>
    <input type="radio" name="stepper4" id="s4"/>
    <div class="ease-stepper">
      <div class="ease-stepper__step" data-step="1">
        <label for="s1"><div class="ease-stepper__circle">1</div><span class="ease-stepper__label">Start</span></label>
      </div>
      <div class="ease-stepper__step" data-step="2">
        <label for="s2"><div class="ease-stepper__circle">2</div><span class="ease-stepper__label">Profile</span></label>
      </div>
      <div class="ease-stepper__step" data-step="3">
        <label for="s3"><div class="ease-stepper__circle">3</div><span class="ease-stepper__label">Review</span></label>
      </div>
      <div class="ease-stepper__step" data-step="4">
        <label for="s4"><div class="ease-stepper__circle">4</div><span class="ease-stepper__label">Done</span></label>
      </div>
    </div>
  </div>

  <!-- 5-Step Variant -->
  <h2>5 Steps</h2>
  <div class="demo-block">
    <input type="radio" name="stepper5" id="s1" checked/>
    <input type="radio" name="stepper5" id="s2"/>
    <input type="radio" name="stepper5" id="s3"/>
    <input type="radio" name="stepper5" id="s4"/>
    <input type="radio" name="stepper5" id="s5"/>
    <div class="ease-stepper">
      <div class="ease-stepper__step" data-step="1">
        <label for="s1"><div class="ease-stepper__circle">1</div><span class="ease-stepper__label">Start</span></label>
      </div>
      <div class="ease-stepper__step" data-step="2">
        <label for="s2"><div class="ease-stepper__circle">2</div><span class="ease-stepper__label">Profile</span></label>
      </div>
      <div class="ease-stepper__step" data-step="3">
        <label for="s3"><div class="ease-stepper__circle">3</div><span class="ease-stepper__label">Details</span></label>
      </div>
      <div class="ease-stepper__step" data-step="4">
        <label for="s4"><div class="ease-stepper__circle">4</div><span class="ease-stepper__label">Review</span></label>
      </div>
      <div class="ease-stepper__step" data-step="5">
        <label for="s5"><div class="ease-stepper__circle">5</div><span class="ease-stepper__label">Done</span></label>
      </div>
    </div>
  </div>

</body>
</html>
