<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Nav - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<input type="checkbox" id="sb-tog" class="sb-chk">
<aside class="sb-sbar"><div class="sb-brand"><h2>EaseMotion</h2><label for="sb-tog" class="sb-close">&times;</label></div>
<nav class="sb-nav"><div class="sb-grp"><span class="sb-lbl">Main</span>
<a href="#" class="sb-a sb-act"><span class="sb-ico">&#127968;</span>Dashboard</a>
<a href="#" class="sb-a"><span class="sb-ico">&#128202;</span>Analytics</a>
</div><div class="sb-grp"><span class="sb-lbl">Account</span>
<a href="#" class="sb-a"><span class="sb-ico">&#9881;</span>Settings</a>
<a href="#" class="sb-a"><span class="sb-ico">&#128100;</span>Profile</a>
</div></nav>
<div class="sb-foot"><span>v2.0</span></div></aside>
<div class="sb-main"><header class="sb-topbar"><label for="sb-tog" class="sb-hamburger">&#9776;</label><h1>CSS Sidebar</h1></header>
<section class="sb-sec"><h2>Responsive Sidebar</h2>
<p>Checkbox-hack toggle on mobile. Desktop fixed sidebar with grouped navigation.</p>
<div class="sb-cards"><div class="sb-card"><h3>Collapsible</h3><p>Hamburger toggle</p></div><div class="sb-card"><h3>Grouped</h3><p>Section labels</p></div></div>
</section></div>
</body>
</html>
