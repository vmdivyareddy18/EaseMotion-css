<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Skeleton Image Placeholder - EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-wrapper">
    <header class="demo-header">
      <h1>Shimmer Skeleton Image Placeholder</h1>
      <p>Premium skeleton loader states for images, sweeping smooth linear highlights during asynchronous image loading cycles.</p>
    </header>

    <section class="loader-grid">
      <!-- Image Loader 1 -->
      <div class="image-wrapper" tabindex="0">
        <div class="skeleton-shimmer">
          <span class="sweep-bar"></span>
          <span class="icon-placeholder">🖼️</span>
        </div>
        <div class="meta-skeleton">
          <div class="title-skeleton"></div>
          <div class="desc-skeleton"></div>
        </div>
      </div>

      <!-- Image Loader 2 -->
      <div class="image-wrapper" tabindex="0">
        <div class="skeleton-shimmer">
          <span class="sweep-bar"></span>
          <span class="icon-placeholder">🖼️</span>
        </div>
        <div class="meta-skeleton">
          <div class="title-skeleton"></div>
          <div class="desc-skeleton"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
