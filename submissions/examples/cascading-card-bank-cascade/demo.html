<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Vault Ledger</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="finance-workspace">
    <!-- Checkbox manager to simulate dynamic loading/reveal events cleanly -->
    <div class="interactive-deck-container">
      <input type="checkbox" id="trigger-cascade-state" class="hidden-flow-checkbox" checked>
      
      <label for="trigger-cascade-state" class="refresh-deck-action" tabindex="0">
        Simulate Account Load
      </label>

      <div class="cascading-grid-matrix">
        
        <!-- Individual elements tracking distinct stagger indices -->
        <div class="banking-asset-card" style="--cascade-index: 1;">
          <div class="card-chip-node"></div>
          <div class="card-balance-row">
            <span class="currency-tag">USD</span>
            <h2>$48,920.50</h2>
          </div>
          <p class="account-meta-label">Checking Account Account ending in 4921</p>
        </div>

        <div class="banking-asset-card" style="--cascade-index: 2;">
          <div class="card-chip-node premium-tier"></div>
          <div class="card-balance-row">
            <span class="currency-tag">EUR</span>
            <h2>€12,450.00</h2>
          </div>
          <p class="account-meta-label">Investment Ledger Account ending in 8832</p>
        </div>

        <div class="banking-asset-card" style="--cascade-index: 3;">
          <div class="card-chip-node credit-tier"></div>
          <div class="card-balance-row">
            <span class="currency-tag">GBP</span>
            <h2>£8,310.25</h2>
          </div>
          <p class="account-meta-label">Line of Credit Account ending in 0114</p>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Accessibility controller tracking action key mappings
    const buttonNode = document.querySelector('.refresh-deck-action');
    buttonNode.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(buttonNode.getAttribute('for')).click();
      }
    });
  </script>
</body>
</html>
