<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Lightbox Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
      color: var(--ease-color-text);
    }
    .demo-container {
      width: 100%;
      max-width: 1000px;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="ease-center ease-margin-b-8">
      <h1 class="ease-margin-b-4">Pure CSS Image Gallery</h1>
      <p class="ease-text-muted">
        Click any image below to expand it into a full-screen lightbox. No JavaScript required.
      </p>
    </div>

    <!-- The Gallery Grid -->
    <div class="ease-lightbox-gallery">
      
      <!-- Thumbnail 1 -->
      <!-- The href="#lightbox-1" targets the ID of the overlay div -->
      <a href="#lightbox-1" class="ease-lightbox-thumbnail">
        <!-- Using picsum for demo placeholder images -->
        <img src="https://picsum.photos/id/1018/600/400" alt="Mountain Landscape">
      </a>
      
      <!-- Thumbnail 2 -->
      <a href="#lightbox-2" class="ease-lightbox-thumbnail">
        <img src="https://picsum.photos/id/1015/600/400" alt="River Valley">
      </a>
      
      <!-- Thumbnail 3 -->
      <a href="#lightbox-3" class="ease-lightbox-thumbnail">
        <img src="https://picsum.photos/id/1036/600/400" alt="Snowy Peaks">
      </a>

      <!-- Thumbnail 4 -->
      <a href="#lightbox-4" class="ease-lightbox-thumbnail">
        <img src="https://picsum.photos/id/1043/600/400" alt="Forest Pathway">
      </a>
      
    </div>

  </div>

  <!-- 
    ========================================================
    LIGHTBOX OVERLAYS 
    These are hidden at the bottom of the DOM until targeted.
    ========================================================
  -->

  <!-- Lightbox 1 -->
  <div id="lightbox-1" class="ease-lightbox-overlay">
    <!-- Background click closes lightbox by pointing to #_ -->
    <a href="#_" class="ease-lightbox-close-area" title="Click to close"></a>
    
    <div class="ease-lightbox-content">
      <a href="#_" class="ease-lightbox-close-btn">&times;</a>
      <!-- Forward/Back Navigation via IDs -->
      <a href="#lightbox-4" class="ease-lightbox-nav ease-lightbox-prev">‹</a>
      <a href="#lightbox-2" class="ease-lightbox-nav ease-lightbox-next">›</a>
      
      <!-- High-res full image -->
      <img src="https://picsum.photos/id/1018/1200/800" alt="Mountain Landscape">
      <div class="ease-lightbox-caption">Beautiful Mountain Landscape</div>
    </div>
  </div>

  <!-- Lightbox 2 -->
  <div id="lightbox-2" class="ease-lightbox-overlay">
    <a href="#_" class="ease-lightbox-close-area" title="Click to close"></a>
    <div class="ease-lightbox-content">
      <a href="#_" class="ease-lightbox-close-btn">&times;</a>
      <a href="#lightbox-1" class="ease-lightbox-nav ease-lightbox-prev">‹</a>
      <a href="#lightbox-3" class="ease-lightbox-nav ease-lightbox-next">›</a>
      <img src="https://picsum.photos/id/1015/1200/800" alt="River Valley">
      <div class="ease-lightbox-caption">Peaceful River Valley</div>
    </div>
  </div>

  <!-- Lightbox 3 -->
  <div id="lightbox-3" class="ease-lightbox-overlay">
    <a href="#_" class="ease-lightbox-close-area" title="Click to close"></a>
    <div class="ease-lightbox-content">
      <a href="#_" class="ease-lightbox-close-btn">&times;</a>
      <a href="#lightbox-2" class="ease-lightbox-nav ease-lightbox-prev">‹</a>
      <a href="#lightbox-4" class="ease-lightbox-nav ease-lightbox-next">›</a>
      <img src="https://picsum.photos/id/1036/1200/800" alt="Snowy Peaks">
      <div class="ease-lightbox-caption">Snowy Winter Peaks</div>
    </div>
  </div>

  <!-- Lightbox 4 -->
  <div id="lightbox-4" class="ease-lightbox-overlay">
    <a href="#_" class="ease-lightbox-close-area" title="Click to close"></a>
    <div class="ease-lightbox-content">
      <a href="#_" class="ease-lightbox-close-btn">&times;</a>
      <a href="#lightbox-3" class="ease-lightbox-nav ease-lightbox-prev">‹</a>
      <a href="#lightbox-1" class="ease-lightbox-nav ease-lightbox-next">›</a>
      <img src="https://picsum.photos/id/1043/1200/800" alt="Forest Pathway">
      <div class="ease-lightbox-caption">Lush Forest Pathway</div>
    </div>
  </div>

</body>
</html>
