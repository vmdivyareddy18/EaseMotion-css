<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="content" class="transition-target">Initial Content</div>
  <button id="trigger">Transition View</button>

  <script>
    document.getElementById('trigger').onclick = () => {
      // Use document.startViewTransition for browser-native transition
      document.startViewTransition(() => {
        const content = document.getElementById('content');
        content.textContent = "Transformed Content";
      });
    };
  </script>
</body>
</html>
