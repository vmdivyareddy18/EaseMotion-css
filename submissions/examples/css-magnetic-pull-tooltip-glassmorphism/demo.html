<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Magnetic Pull Tooltip - Glassmorphism UI</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-viewport">
        <div class="glass-card">
            <div class="glass-header">
                <span class="glass-badge">SECURE_TUNNEL_NODE</span>
                <span class="glass-status-val">ONLINE</span>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-text">View Network Load</span>
                        <svg class="network-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <rect x="2" y="16" width="4" height="6" rx="1"/>
                            <rect x="10" y="10" width="4" height="12" rx="1"/>
                            <rect x="18" y="4" width="4" height="18" rx="1"/>
                        </svg>
                    </button>
                    
                    <div class="magnetic-pull-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-glass">METRIC_ANALYSIS</span>
                                <p class="node-title">Bandwidth Throttle</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="node-desc">Current routing channels operating at 24% capacity. Dynamic network load shifting is managed by local edge scripts.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
