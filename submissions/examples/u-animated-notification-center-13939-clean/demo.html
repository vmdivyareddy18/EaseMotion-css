<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Notification Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="notification-center">
        <div class="header">
            <h2>Notifications</h2>
            <span class="badge">4</span>
        </div>

        <div class="notification info">
            <h3>New Message</h3>
            <p>You received a message from your team.</p>
        </div>

        <div class="notification success">
            <h3>Task Completed</h3>
            <p>Your project was successfully deployed.</p>
        </div>

        <div class="notification warning">
            <h3>Storage Warning</h3>
            <p>Your storage is almost full.</p>
        </div>

        <div class="notification error">
            <h3>Payment Failed</h3>
            <p>Please update your payment method.</p>
        </div>
    </div>
</body>
</html>
