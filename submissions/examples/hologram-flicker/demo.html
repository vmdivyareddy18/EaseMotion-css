<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hologram Flicker Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="hologram-card">
      <div class="hologram-body">
        <div class="hologram-icon">&#9733;</div>
        <h2 class="hologram-title">HOLOGRAM</h2>
        <p class="hologram-sub">Interactive Display</p>
        <div class="hologram-stats">
          <span>ACTIVE</span>
          <span>v2.4.1</span>
        </div>
      </div>
      <div class="scanlines"></div>
      <div class="glitch-line"></div>
    </div>
  </div>
</body>
</html>
