<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Toggle Switch</h1>
    <p class="subtitle">Pure CSS toggle switches using checkbox inputs</p>

    <!-- Default Toggle -->
    <div class="variant">
      <h3>Default</h3>
      <label class="toggle">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Notifications</span>
      </label>
    </div>

    <!-- Checked by Default -->
    <div class="variant">
      <h3>Checked Default</h3>
      <label class="toggle">
        <input type="checkbox" class="toggle__input" checked>
        <span class="toggle__slider"></span>
        <span class="toggle__label">Auto-save</span>
      </label>
    </div>

    <!-- Small Size -->
    <div class="variant">
      <h3>Small</h3>
      <label class="toggle toggle--sm">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Compact mode</span>
      </label>
    </div>

    <!-- Large Size -->
    <div class="variant">
      <h3>Large</h3>
      <label class="toggle toggle--lg">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Power mode</span>
      </label>
    </div>

    <!-- Success Color -->
    <div class="variant">
      <h3>Success</h3>
      <label class="toggle toggle--success">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Online status</span>
      </label>
    </div>

    <!-- Warning Color -->
    <div class="variant">
      <h3>Warning</h3>
      <label class="toggle toggle--warning">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Maintenance mode</span>
      </label>
    </div>

    <!-- Danger Color -->
    <div class="variant">
      <h3>Danger</h3>
      <label class="toggle toggle--danger">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Delete mode</span>
      </label>
    </div>

    <!-- With Icons -->
    <div class="variant">
      <h3>With Icons</h3>
      <label class="toggle toggle--icon">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider">
          <span class="toggle__icon-off">☀️</span>
          <span class="toggle__icon-on">🌙</span>
        </span>
        <span class="toggle__label">Dark mode</span>
      </label>
    </div>

    <!-- Rounded (Pill) -->
    <div class="variant">
      <h3>Rounded</h3>
      <label class="toggle toggle--rounded">
        <input type="checkbox" class="toggle__input">
        <span class="toggle__slider"></span>
        <span class="toggle__label">Airplane mode</span>
      </label>
    </div>

    <!-- Disabled -->
    <div class="variant">
      <h3>Disabled</h3>
      <label class="toggle toggle--disabled">
        <input type="checkbox" class="toggle__input" disabled>
        <span class="toggle__slider"></span>
        <span class="toggle__label">Locked feature</span>
      </label>
    </div>

    <!-- Group -->
    <div class="variant variant--full">
      <h3>Toggle Group</h3>
      <div class="toggle-group">
        <label class="toggle">
          <input type="checkbox" class="toggle__input" checked>
          <span class="toggle__slider"></span>
          <span class="toggle__label">Wi-Fi</span>
        </label>
        <label class="toggle">
          <input type="checkbox" class="toggle__input">
          <span class="toggle__slider"></span>
          <span class="toggle__label">Bluetooth</span>
        </label>
        <label class="toggle toggle--success">
          <input type="checkbox" class="toggle__input" checked>
          <span class="toggle__slider"></span>
          <span class="toggle__label">Mobile Data</span>
        </label>
        <label class="toggle toggle--danger">
          <input type="checkbox" class="toggle__input">
          <span class="toggle__slider"></span>
          <span class="toggle__label">Hotspot</span>
        </label>
      </div>
    </div>
  </div>
</body>
</html>
