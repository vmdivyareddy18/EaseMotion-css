<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radar Scan</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="radar-scan">
    <div class="radar-circle"></div>
    <div class="radar-sweep"></div>
    <div class="radar-dot" style="--angle: 30deg; --dist: 35px"></div>
    <div class="radar-dot" style="--angle: 150deg; --dist: 50px"></div>
    <div class="radar-dot" style="--angle: 270deg; --dist: 25px"></div>
  </div>
</body>
</html>
