<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Empty State Illustration Motion</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="demo-header" aria-labelledby="demo-title">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1 id="demo-title">CSS-Only Empty State Illustration Motion</h1>
      <p>Shows a calm empty-state panel with a decorative CSS illustration and reduced-motion support.</p>
    </section>
    <section class="empty-state-motion" aria-labelledby="empty-title">
      <div class="empty-illustration" aria-hidden="true">
        <span class="sun"></span>
        <span class="folder"></span>
        <span class="line line-one"></span>
        <span class="line line-two"></span>
      </div>
      <h2 id="empty-title">No projects yet</h2>
      <p>Create your first project and it will appear here.</p>
      <button class="empty-action">Create project</button>
    </section>
  </main>
</body>
</html>
