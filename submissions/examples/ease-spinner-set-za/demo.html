<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinner Set - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sp-hd"><h1>CSS Spinner Set</h1><p>Loading spinners and indicators</p></header>
<section class="sp-sc"><h2>Circle Spinners</h2>
<div class="sp-row"><div class="sp-item"><div class="sp-circle"></div><span>Default</span></div><div class="sp-item"><div class="sp-circle sp-thin"></div><span>Thin</span></div><div class="sp-item"><div class="sp-circle sp-fast"></div><span>Fast</span></div><div class="sp-item"><div class="sp-circle sp-multicolor"></div><span>Multi</span></div></div>
</section>
<section class="sp-sc"><h2>Dot Spinners</h2>
<div class="sp-row"><div class="sp-item"><div class="sp-dots"><span></span><span></span><span></span></div><span>Bounce</span></div><div class="sp-item"><div class="sp-dots sp-dots-fade"><span></span><span></span><span></span></div><span>Fade</span></div><div class="sp-item"><div class="sp-dots sp-dots-pulse"><span></span><span></span><span></span></div><span>Pulse</span></div></div>
</section>
<section class="sp-sc"><h2>Bar Spinners</h2>
<div class="sp-row"><div class="sp-item"><div class="sp-bars"><span></span><span></span><span></span><span></span></div><span>Bars</span></div><div class="sp-item"><div class="sp-bars sp-bars-alt"><span></span><span></span><span></span><span></span></div><span>Alt</span></div></div>
</section>
<section class="sp-sc"><h2>Custom Spinners</h2>
<div class="sp-row"><div class="sp-item"><div class="sp-ripple"></div><span>Ripple</span></div><div class="sp-item"><div class="sp-hourglass"></div><span>Hourglass</span></div><div class="sp-item"><div class="sp-square"></div><span>Square</span></div></div>
</section>
<section class="sp-sc"><h2>Sizes</h2>
<div class="sp-row"><div class="sp-circle sp-sm"></div><div class="sp-circle"></div><div class="sp-circle sp-lg"></div><div class="sp-circle sp-xl"></div></div>
</section>
<footer class="ftr"><p>EaseMotion - Spinners | GSSoC 2026</p></footer>
</body>
</html>
