<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation Search Component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="search-wrapper">
      <h2>EaseMotion CSS Animation Finder</h2>
      <input
        type="text"
        id="search-bar"
        placeholder="Type to filter animations (e.g., fade, bounce)..."
      />
    </div>

    <div class="animation-grid" id="animation-container">
      <div class="animation-card">
        <h3>Fade In</h3>
        <p>Smoothly transitions opacity from 0 to 1.</p>
      </div>

      <div class="animation-card">
        <h3>Bounce Out</h3>
        <p>A playful exit animation with an elastic bounce effect.</p>
      </div>

      <div class="animation-card">
        <h3>Slide Left</h3>
        <p>Slides elements horizontally from the right side.</p>
      </div>

      <div class="animation-card">
        <h3>Pulse Glow</h3>
        <p>A looping scale and shadow effect for buttons.</p>
      </div>
    </div>

    <script>
      const searchBar = document.getElementById('search-bar');
      const cards = document.querySelectorAll('.animation-card');

      searchBar.addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase().trim();

        cards.forEach((card) => {
          const title = card.querySelector('h3').textContent.toLowerCase();

          if (title.includes(query)) {
            card.style.display = 'block';
          } else {
            card.style.display = 'none';
          }
        });
      });
    </script>
  </body>
</html>
