<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-leaves-fall – Autumn Leaves Falling</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Autumn Leaves Fall
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Leaves drift down with sway and rotation — seasonal decoration.
    </p>

    <!-- Scene area where leaves fall -->
    <div id="leaf-scene" class="leaf-scene">
      <!-- Leaves will be injected by JS -->
    </div>

    <button id="drop-leaves" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-6">
      🍂 Drop Leaves
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      Each leaf has a random fall speed, drift, and rotation.
    </p>
  </div>

  <script>
    const scene = document.getElementById('leaf-scene');
    const dropBtn = document.getElementById('drop-leaves');
    const leafEmojis = ['🍂', '🍁', '🍃', '🌿'];

    function createLeaf() {
      const leaf = document.createElement('span');
      leaf.className = 'leaf';
      leaf.textContent = leafEmojis[Math.floor(Math.random() * leafEmojis.length)];
      leaf.style.left = Math.random() * 100 + '%';
      leaf.style.fontSize = (Math.random() * 20 + 18) + 'px';
      leaf.style.setProperty('--fall-duration', (Math.random() * 3 + 4) + 's');
      leaf.style.setProperty('--sway-distance', (Math.random() * 60 - 30) + 'px');
      leaf.style.setProperty('--rotation', (Math.random() * 360) + 'deg');
      leaf.style.animationDelay = Math.random() * 0.5 + 's';
      scene.appendChild(leaf);

      // Remove after animation ends
      leaf.addEventListener('animationend', () => {
        leaf.remove();
      });
    }

    dropBtn.addEventListener('click', () => {
      for (let i = 0; i < 15; i++) {
        setTimeout(createLeaf, i * 100); // stagger creation for natural look
      }
    });
  </script>

</body>
</html>
