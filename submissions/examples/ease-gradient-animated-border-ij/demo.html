<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Animated Border</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <h2>Gradient Animated Border</h2>
      <p>Color-shifting gradient border</p>
    </div>

    <div class="demo-area">
      <div class="border-box" id="borderBox">
        <div class="inner">
          <span>✦</span>
          <p>Animated Border</p>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>Border Width <input type="range" id="borderWidth" min="1" max="12" step="0.5" value="4" data-var="--border-width" data-unit="px"></label>
      <label>Gradient Start <input type="color" id="gradientStart" value="#ff6b6b" data-var="--gradient-start"></label>
      <label>Gradient End <input type="color" id="gradientEnd" value="#4ecdc4" data-var="--gradient-end"></label>
      <label>Shift Speed <input type="range" id="shiftDuration" min="1" max="10" step="0.5" value="3" data-var="--shift-duration" data-unit="s"></label>
    </div>
  </main>
  <script>
    const box = document.getElementById('borderBox');
    document.querySelectorAll('[data-var]').forEach(input => {
      const set = () => box.style.setProperty(input.dataset.var, input.dataset.unit ? input.value + input.dataset.unit : input.value);
      input.addEventListener('input', set);
      set();
    });
  </script>
</body>
</html>
