<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Loading Spinners</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>CSS Loading Spinners</h1>
        <p class="subtitle">Pure CSS loading animations - No JavaScript required!</p>

        <div class="grid">
            <!-- Spinner 1: Classic -->
            <div class="loader-box">
                <div class="loader loader-classic"></div>
                <p>Classic Spinner</p>
            </div>

            <!-- Spinner 2: Dots -->
            <div class="loader-box">
                <div class="loader loader-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>Bouncing Dots</p>
            </div>

            <!-- Spinner 3: Pulse -->
            <div class="loader-box">
                <div class="loader loader-pulse"></div>
                <p>Pulse Ring</p>
            </div>

            <!-- Spinner 4: Bars -->
            <div class="loader-box">
                <div class="loader loader-bars">
                    <span></span>
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <p>Wave Bars</p>
            </div>

            <!-- Spinner 5: Flip -->
            <div class="loader-box">
                <div class="loader loader-flip"></div>
                <p>3D Flip</p>
            </div>

            <!-- Spinner 6: Gradient -->
            <div class="loader-box">
                <div class="loader loader-gradient"></div>
                <p>Gradient Spin</p>
            </div>
        </div>
    </div>
</body>
</html>
