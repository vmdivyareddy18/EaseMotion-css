<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caret Color Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h1>Caret Color Utilities</h1>
    <p class="subtitle">
      Click inside each input to see the caret color.
    </p>

    <div class="demo-grid">

      <div class="demo-card">
        <h3>.caret-red</h3>
        <input type="text" class="caret-red" placeholder="Type here..." />
      </div>

      <div class="demo-card">
        <h3>.caret-blue</h3>
        <input type="text" class="caret-blue" placeholder="Type here..." />
      </div>

      <div class="demo-card">
        <h3>.caret-green</h3>
        <input type="text" class="caret-green" placeholder="Type here..." />
      </div>

      <div class="demo-card">
        <h3>.caret-purple</h3>
        <input type="text" class="caret-purple" placeholder="Type here..." />
      </div>

      <div class="demo-card">
        <h3>.caret-black</h3>
        <input type="text" class="caret-black" placeholder="Type here..." />
      </div>

    </div>
  </section>

</body>
</html>
