<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Developer Terminal - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="terminal-wrapper">
    <!-- Terminal Window -->
    <div class="terminal-window ease-fade-in-up">
      
      <!-- Terminal Header -->
      <div class="terminal-header">
        <div class="terminal-dots">
          <span class="dot red"></span>
          <span class="dot yellow"></span>
          <span class="dot green"></span>
        </div>
        <span class="terminal-title">bash - 80x24</span>
        <div class="header-spacer"></div>
      </div>

      <!-- Terminal Body -->
      <div class="terminal-body">
        <!-- Line 1 -->
        <div class="code-line ease-fade-in-left ease-delay-200">
          <span class="prompt">➜</span>
          <span class="path">~/projects</span>
          <span class="command">npm install easemotion-css</span>
        </div>
        
        <!-- Output 1 -->
        <div class="code-line output ease-fade-in-left ease-delay-600">
          <span class="text">added 1 package, and audited 104 packages in 2s</span>
        </div>
        <div class="code-line output ease-fade-in-left ease-delay-800">
          <span class="text success">✓ 1 package is looking for funding</span>
        </div>

        <!-- Line 2 -->
        <div class="code-line ease-fade-in-left ease-delay-1200">
          <span class="prompt">➜</span>
          <span class="path">~/projects</span>
          <span class="command">echo "Animations made easy!"</span>
        </div>

        <!-- Output 2 -->
        <div class="code-line output ease-fade-in-left ease-delay-1600">
          <span class="text success">Animations made easy!</span>
        </div>

        <!-- Line 3 (Waiting for input) -->
        <div class="code-line ease-fade-in-left ease-delay-2000">
          <span class="prompt">➜</span>
          <span class="path">~/projects</span>
          <span class="cursor ease-pulse">_</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
