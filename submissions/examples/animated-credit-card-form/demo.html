<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Credit Card Form - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Secure Checkout</h1>
      <div class="secure-badge ease-pulse">
        <span class="lock-icon">🔒</span>
        <span>256-bit SSL Encrypted</span>
      </div>
    </header>

    <div class="payment-layout">
      
      <!-- 3D Card Preview -->
      <div class="card-preview ease-fade-in-up ease-delay-100">
        <div class="card-wrapper">
          <div class="credit-card" id="credit-card">
            
            <!-- Card Front -->
            <div class="card-face card-front">
              <div class="card-chip"></div>
              <div class="card-logo" id="card-logo">
                <span class="logo-text ease-bounce-in">VISA</span>
              </div>
              <div class="card-number" id="display-number">•••• •••• •••• ••••</div>
              <div class="card-bottom">
                <div class="card-holder">
                  <span class="label">Card Holder</span>
                  <span class="value" id="display-name">FULL NAME</span>
                </div>
                <div class="card-expiry">
                  <span class="label">Expires</span>
                  <span class="value" id="display-expiry">MM/YY</span>
                </div>
              </div>
            </div>

            <!-- Card Back -->
            <div class="card-face card-back">
              <div class="magnetic-strip"></div>
              <div class="cvv-section">
                <span class="cvv-label">CVV</span>
                <div class="cvv-box">
                  <span id="display-cvv">•••</span>
                </div>
              </div>
              <div class="card-back-text">
                This card is property of the issuing bank. Use subject to the cardholder agreement.
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Payment Form -->
      <form class="payment-form" id="payment-form">
        
        <!-- Card Number -->
        <div class="form-group ease-fade-in-up ease-delay-200">
          <label for="card-number">Card Number</label>
          <div class="input-wrapper">
            <input type="text" id="card-number" placeholder="1234 5678 9012 3456" maxlength="19" required>
            <span class="input-icon">💳</span>
          </div>
        </div>

        <!-- Card Holder -->
        <div class="form-group ease-fade-in-up ease-delay-300">
          <label for="card-name">Cardholder Name</label>
          <div class="input-wrapper">
            <input type="text" id="card-name" placeholder="John Doe" required>
            <span class="input-icon">👤</span>
          </div>
        </div>

        <!-- Expiry & CVV Row -->
        <div class="form-row">
          <div class="form-group half ease-fade-in-up ease-delay-400">
            <label for="card-expiry">Expiry Date</label>
            <div class="input-wrapper">
              <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5" required>
              <span class="input-icon">📅</span>
            </div>
          </div>
          <div class="form-group half ease-fade-in-up ease-delay-500">
            <label for="card-cvv">CVV</label>
            <div class="input-wrapper">
              <input type="text" id="card-cvv" placeholder="123" maxlength="4" required>
              <span class="input-icon">🔒</span>
            </div>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="pay-btn ease-fade-in-up ease-delay-600 ease-hover-grow">
          <span>Pay $49.00</span>
          <span class="btn-arrow">→</span>
        </button>

      </form>
    </div>
  </div>

  <!-- JavaScript for Form Interactions -->
  <script>
    const card = document.getElementById('credit-card');
    const numberInput = document.getElementById('card-number');
    const nameInput = document.getElementById('card-name');
    const expiryInput = document.getElementById('card-expiry');
    const cvvInput = document.getElementById('card-cvv');
    
    const displayNumber = document.getElementById('display-number');
    const displayName = document.getElementById('display-name');
    const displayExpiry = document.getElementById('display-expiry');
    const displayCvv = document.getElementById('display-cvv');
    const cardLogo = document.getElementById('card-logo');

    // Format Card Number
    numberInput.addEventListener('input', (e) => {
      let val = e.target.value.replace(/\s/g, '').replace(/\D/g, '');
      let formatted = val.match(/.{1,4}/g)?.join(' ') || '';
      e.target.value = formatted;
      
      displayNumber.textContent = formatted.padEnd(19, '•').replace(/(.{4})/g, '$1 ').trim() || '•••• •••• •••• ••••';
      
      // Simple card type detection
      if (val.startsWith('4')) {
        cardLogo.innerHTML = '<span class="logo-text visa ease-bounce-in">VISA</span>';
      } else if (val.startsWith('5') || val.startsWith('2')) {
        cardLogo.innerHTML = '<span class="logo-text mastercard ease-bounce-in">MC</span>';
      } else {
        cardLogo.innerHTML = '<span class="logo-text ease-bounce-in">CARD</span>';
      }
    });

    // Update Name
    nameInput.addEventListener('input', (e) => {
      displayName.textContent = e.target.value.toUpperCase() || 'FULL NAME';
    });

    // Format Expiry
    expiryInput.addEventListener('input', (e) => {
      let val = e.target.value.replace(/\D/g, '');
      if (val.length >= 2) {
        val = val.substring(0, 2) + '/' + val.substring(2);
      }
      e.target.value = val;
      displayExpiry.textContent = val || 'MM/YY';
    });

    // Update CVV & Flip Card
    cvvInput.addEventListener('focus', () => {
      card.classList.add('flipped');
    });

    cvvInput.addEventListener('blur', () => {
      card.classList.remove('flipped');
    });

    cvvInput.addEventListener('input', (e) => {
      e.target.value = e.target.value.replace(/\D/g, '');
      displayCvv.textContent = e.target.value.padEnd(3, '•');
    });

    // Prevent actual submission for demo
    document.getElementById('payment-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Payment processed successfully! (Demo)');
    });
  </script>
</body>
</html>
