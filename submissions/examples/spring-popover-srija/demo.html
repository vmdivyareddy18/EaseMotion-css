<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Spring Popover Checkout</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>


    <main class="checkout">

        <details class="popover">

            <summary class="popover-trigger">
                View Order Summary
            </summary>


            <section class="popover-card">

                <h2>
                    Checkout Summary
                </h2>


                <div class="item">
                    <span>
                        Premium Plan
                    </span>

                    <strong>
                        $49
                    </strong>
                </div>


                <div class="item">
                    <span>
                        Delivery
                    </span>

                    <strong>
                        Free
                    </strong>
                </div>


                <hr>


                <div class="total">

                    <span>
                        Total
                    </span>

                    <strong>
                        $49
                    </strong>

                </div>


                <button>
                    Pay Now
                </button>


            </section>


        </details>


    </main>


</body>

</html>
