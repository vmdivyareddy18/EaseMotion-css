<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Responsive Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Responsive Dashboard</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Data slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="dash-btn" aria-label="View analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
            <path d="M22 12A10 10 0 0 0 12 2v10z"/>
          </svg>
          Analytics
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-header">
            <h4>Quick Stats</h4>
            <span class="slide-period">Today</span>
          </div>
          <div class="slide-stats">
            <div class="slide-stat" style="--delay: 0s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">2,847</span>
                <span class="stat-label">Active Users</span>
              </div>
            </div>
            <div class="slide-stat" style="--delay: 0.05s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">94.2%</span>
                <span class="stat-label">Uptime</span>
              </div>
            </div>
            <div class="slide-stat" style="--delay: 0.1s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="1" x2="12" y2="23"/>
                  <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">$12.4k</span>
                <span class="stat-label">Revenue</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Swipe</button>
          <div class="slide-popover swipe" role="tooltip"><p>Swipe animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-indigo">Indigo</button>
          <div class="slide-popover theme-indigo" role="tooltip"><p>Indigo dashboard theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-emerald">Emerald</button>
          <div class="slide-popover theme-emerald" role="tooltip"><p>Emerald dashboard theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-rose">Rose</button>
          <div class="slide-popover theme-rose" role="tooltip"><p>Rose dashboard theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
