<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Error Fallback UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-error-fallback active">
        <div class="ease-error-icon-wrap">
            <div class="ease-error-icon">⚠️</div>
        </div>
        <h3>Something went wrong</h3>
        <p>We're having trouble connecting to the server. Please check your internet connection and try again.</p>
        <div class="ease-error-actions">
            <button class="ease-error-btn ease-error-btn-secondary">Go Back</button>
            <button class="ease-error-btn ease-error-btn-primary" onclick="triggerShake()">Try Again</button>
        </div>
    </div>

    <script>
        function triggerShake() {
            const fallback = document.querySelector('.ease-error-fallback');
            fallback.classList.remove('active');
            // Trigger reflow
            void fallback.offsetWidth;
            fallback.classList.add('active');
        }
    </script>
</body>
</html>
