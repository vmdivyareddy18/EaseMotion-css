<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom-Out Tooltip - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="checkout-card">
    <h2>Checkout Summary</h2>

    <div class="field">
      <span>Shipping Address</span>

      <button class="tooltip-trigger" aria-describedby="tooltip-shipping">
        ?
        <span id="tooltip-shipping" class="tooltip" role="tooltip">
          We use this address to calculate delivery charges and estimated arrival time.
        </span>
      </button>
    </div>

    <div class="field">
      <span>Payment Method</span>

      <button class="tooltip-trigger" aria-describedby="tooltip-payment">
        ?
        <span id="tooltip-payment" class="tooltip" role="tooltip">
          Your payment details are encrypted and securely processed.
        </span>
      </button>
    </div>

    <button class="checkout-btn">Place Order</button>
  </div>

</body>
</html>
