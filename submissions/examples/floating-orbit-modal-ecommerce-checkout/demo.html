<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Modal - E-Commerce Checkout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Pure CSS Floating Orbit Modal</h1>
    <p>E-Commerce Checkout Layout</p>

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="btn">
        Complete Purchase
    </label>

    <label class="overlay" for="modal-toggle">

        <div class="modal" tabindex="0">

            <!-- Orbit Elements -->

            <span class="orbit orbit-cart">🛒</span>
            <span class="orbit orbit-card">💳</span>

            <div class="icon">
                ✓
            </div>

            <h2>Order Ready!</h2>

            <p>
                Your cart has been verified successfully.
                Continue securely to complete your payment.
            </p>

            <div class="summary">

                <div>
                    <span>Items</span>
                    <strong>3</strong>
                </div>

                <div>
                    <span>Total</span>
                    <strong>$249.99</strong>
                </div>

            </div>

            <button>
                Proceed to Checkout
            </button>

            <label for="modal-toggle" class="close">
                ✕
            </label>

        </div>

    </label>

</div>

</body>
</html>
