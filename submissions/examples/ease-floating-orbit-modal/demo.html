<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Floating Orbit Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background">

    <div class="orbit orbit1"></div>
    <div class="orbit orbit2"></div>
    <div class="orbit orbit3"></div>

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Open Glass Modal
    </label>

    <div class="overlay">

        <div class="modal">

            <label for="modal-toggle" class="close-btn">
                ✕
            </label>

            <div class="icon">
                ✨
            </div>

            <h1>Glassmorphism Modal</h1>

            <p>
                A floating orbit inspired modal created using
                pure HTML and CSS with smooth animations.
            </p>

            <div class="buttons">

                <button class="primary">
                    Explore
                </button>

                <label for="modal-toggle" class="secondary">
                    Close
                </label>

            </div>

        </div>

    </div>

</div>

</body>
</html>
