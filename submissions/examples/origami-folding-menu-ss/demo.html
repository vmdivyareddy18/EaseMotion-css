<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS-Only Origami Folding Menu — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo-only page styling (not part of the component) */
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f9fafb 0%, #eef2ff 100%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 4rem 1rem;
    }
    h1 {
      color: #1f2937;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    p.hint {
      color: #4b5563;
      text-align: center;
      margin-top: 0;
      margin-bottom: 3rem;
      font-style: italic;
    }
    .demo-row {
      display: flex;
      gap: 4rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20rem; /* extra space so the menu has room to unfold */
    }
  </style>
</head>
<body>

  <h1>🪄 CSS-Only Origami Folding Menu</h1>
  <p class="hint">Hover or focus the button — watch each panel unfold like origami.</p>

  <div class="demo-row">

    <!-- Example 1 - Navigation menu -->
    <div class="ease-origami-folding-menu">
      <button class="ease-origami-folding-menu__trigger" type="button">
        Navigation
        <span class="ease-origami-folding-menu__chevron" aria-hidden="true"></span>
      </button>
      <ul class="ease-origami-folding-menu__list">
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#home">🏠 Home</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#about">📖 About</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#services">⚙️ Services</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#portfolio">🎨 Portfolio</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#contact">✉️ Contact</a>
        </li>
      </ul>
    </div>

    <!-- Example 2 - User menu -->
    <div class="ease-origami-folding-menu">
      <button class="ease-origami-folding-menu__trigger" type="button">
        Account
        <span class="ease-origami-folding-menu__chevron" aria-hidden="true"></span>
      </button>
      <ul class="ease-origami-folding-menu__list">
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#profile">👤 Profile</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#settings">⚙️ Settings</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#billing">💳 Billing</a>
        </li>
        <li class="ease-origami-folding-menu__item">
          <a class="ease-origami-folding-menu__link" href="#logout">🚪 Log out</a>
        </li>
      </ul>
    </div>

  </div>

</body>
</html>
