<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Up Right - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-scale-right">Growing West</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-scale-right'); void b.offsetWidth; b.classList.add('ease-scale-right');">Scale Up</button>
    </div>
</body>
</html>
