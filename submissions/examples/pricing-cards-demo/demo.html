<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Cards Demo</title>

    <!-- Replace with the official EaseMotion CSS stylesheet if needed -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="pricing">

<h1 class="ease-fade-in">Pricing Plans</h1>

<div class="cards">

<div class="card ease-slide-up">

<h2>Basic</h2>

<h3>$9/mo</h3>

<ul>
<li>5 Projects</li>
<li>Email Support</li>
<li>Community Access</li>
</ul>

<button class="btn ease-hover-grow">
Choose Plan
</button>

</div>

<div class="card popular ease-slide-up">

<span class="badge">
Most Popular
</span>

<h2>Pro</h2>

<h3>$29/mo</h3>

<ul>
<li>Unlimited Projects</li>
<li>Priority Support</li>
<li>Team Collaboration</li>
</ul>

<button class="btn ease-hover-grow">
Choose Plan
</button>

</div>

<div class="card ease-slide-up">

<h2>Enterprise</h2>

<h3>$99/mo</h3>

<ul>
<li>Unlimited Users</li>
<li>Dedicated Support</li>
<li>Custom Solutions</li>
</ul>

<button class="btn ease-hover-grow">
Contact Sales
</button>

</div>

</div>

</section>

</body>
</html>
