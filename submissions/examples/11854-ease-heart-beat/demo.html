<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-heart-beat</title>
  <meta name="description" content="A demonstration of the ease-heart-beat animation showing a realistic double-beat heart rhythm with custom speed options.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-heart-beat</h1>
      <p class="subtitle" id="main-desc">Realistic double-beat heartbeat rhythm followed by a rest pause</p>
    </header>

    <div class="display-area">
      <!-- Target that beats -->
      <div class="heart-target ease-heart-beat" id="heart-element" tabindex="0" role="img" aria-label="Pulsing red heart icon">❤️</div>
    </div>

    <div class="controls">
      <label for="speed-slider" class="speed-slider-label">Speed Selector: <span id="speed-value">1.2</span>s</label>
      <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1.2" oninput="changeSpeed(this.value)">
    </div>
  </main>

  <script>
    function changeSpeed(value) {
      document.getElementById('speed-value').textContent = value;
      // Set the CSS variable dynamically on the document root
      document.documentElement.style.setProperty('--ease-heartbeat-speed', value + 's');
    }
  </script>

</body>
</html>
