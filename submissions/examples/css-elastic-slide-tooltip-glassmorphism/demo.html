<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Elastic Slide Tooltip</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <section class="container">

    <div class="tooltip-wrapper">
      <button class="tooltip-button" aria-describedby="glass-tooltip">
        Hover Me
      </button>

      <div class="tooltip" id="glass-tooltip" role="tooltip">
        Beautiful glass UI tooltip with elastic slide animation.
      </div>
    </div>

  </section>

</body>
</html>
