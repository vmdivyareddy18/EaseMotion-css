<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk 3D Flip Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="net-wrapper">
    <div class="hud-panel">
      <div class="hud-header">
        <span class="scan-line"></span>
        <h2 class="hud-title">// NET_SCANNER_v4.0</h2>
      </div>
      
      <div class="hud-row">
        <span class="hud-label">PROXY_NODE_01</span>
        <div class="ease-3d-tooltip-container">
          <button class="ease-3d-trigger" aria-describedby="proxy-tip" aria-label="Proxy 1 matrix state">ONLINE</button>
          <div id="proxy-tip" class="ease-3d-content" role="tooltip">
            <div class="cyber-glitch-text">📍 NODE_MAPPED</div>
            Encrypted tunnel established through Sector-9 sub-grid routing layers.
          </div>
        </div>
      </div>

      <div class="hud-row">
        <span class="hud-label">OVERRIDE_GATEWAY</span>
        <div class="ease-3d-tooltip-container">
          <button class="ease-3d-trigger alert-neon" aria-describedby="gateway-tip" aria-label="Override gateway bypass state">BYPASS</button>
          <div id="gateway-tip" class="ease-3d-content variant-purple" role="tooltip">
            <div class="cyber-glitch-text purple">⚠️ OVERFLOW_WARN</div>
            Quantum buffer cycles executing at max capacity. Backdoor access exposed.
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
