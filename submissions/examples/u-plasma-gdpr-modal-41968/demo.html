<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma GDPR Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="gdpr-modal">

        <div class="plasma-circle"></div>

        <h2>Privacy Preferences</h2>

        <p>
            We use cookies to improve your experience, analyze traffic,
            and personalize content. You can accept or manage your choices.
        </p>

        <div class="actions">
            <button class="secondary">Manage</button>
            <button class="primary">Accept All</button>
        </div>

    </div>

</div>

</body>
</html>
