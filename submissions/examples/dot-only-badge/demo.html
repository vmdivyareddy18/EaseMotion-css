<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dot-Only Minimal Badge — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 5rem 1rem; margin: 0;">

  <div class="ease-notification-center">
    
    <div style="margin-bottom: 1.5rem;">
      <h3 style="margin: 0 0 0.25rem 0; color: #0f172a; font-weight: 800; font-size: 1.2rem;">Live Channel Feed</h3>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem;">Minimal state metrics delivering status visibility with zero text constraints.</p>
    </div>

    <div style="display: flex; flex-direction: column;">
      
      <div class="ease-item-row">
        <div class="ease-label-meta">
          <span class="ease-badge-dot ease-badge-dot-success"></span>
          Infrastructure Node Alpha
        </div>
        <span style="font-size: 0.8rem; color: #94a3b8;">Operational</span>
      </div>

      <div class="ease-item-row">
        <div class="ease-label-meta">
          <span class="ease-badge-dot ease-badge-dot-warning"></span>
          Database Replica Sync
        </div>
        <span style="font-size: 0.8rem; color: #94a3b8;">Lagging</span>
      </div>

      <div class="ease-item-row">
        <div class="ease-label-meta">
          <span class="ease-badge-dot ease-badge-dot-danger"></span>
          Payment Gateway API
        </div>
        <span style="font-size: 0.8rem; color: #94a3b8;">Timeout Error</span>
      </div>

      <div class="ease-item-row">
        <div class="ease-label-meta">
          <span class="ease-badge-dot ease-badge-dot-primary"></span>
          Inbound Messaging Queue
        </div>
        <span style="font-size: 0.8rem; color: #94a3b8;">14 Unread</span>
      </div>

    </div>

  </div>

</body>
</html>
