<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blur Entrance Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle" hidden>

<label for="modal-toggle" class="open-btn">
    Open Dashboard Modal
</label>

<div class="overlay">

    <div class="modal" tabindex="0">

        <h2>Dashboard Summary</h2>

        <p>
            Welcome to your responsive dashboard. This modal uses a
            smooth blur entrance animation built entirely with CSS.
        </p>

        <div class="stats">
            <div class="card">
                <h3>154</h3>
                <span>Projects</span>
            </div>

            <div class="card">
                <h3>98%</h3>
                <span>Performance</span>
            </div>

            <div class="card">
                <h3>27</h3>
                <span>Tasks</span>
            </div>
        </div>

        <label for="modal-toggle" class="close-btn">
            Close
        </label>

    </div>

</div>

</body>
</html>
