<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Drive Drop Node</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="workspace-area">
    <div class="uploader-panel-container">
      
      <!-- Pure CSS focus state controller using hidden input parameters -->
      <div class="upload-drop-surface">
        <input type="file" id="native-file-node" class="hidden-uploader-input">
        
        <label for="native-file-node" class="interactive-glow-card" tabindex="0">
          <div class="ambient-glow-layer"></div>
          
          <div class="icon-sphere">
            <svg class="upload-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
          </div>

          <h3>Select Platform Files</h3>
          <p>Click to browse local assets</p>
        </label>
      </div>

    </div>
  </main>

  <script>
    // Accessibility controller tracking keyboard engagement keys
    const dropCard = document.querySelector('.interactive-glow-card');
    dropCard.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(dropCard.getAttribute('for')).click();
      }
    });
  </script>
</body>
</html>
