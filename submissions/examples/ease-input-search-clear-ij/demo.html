<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Clear</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="isc-container">
    <h1>Search</h1>
    <div class="isc-field">
      <svg class="isc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="isc-input" class="isc-input" placeholder="Search..." autocomplete="off">
      <button class="isc-clear" id="isc-clear" type="button" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const input = document.getElementById('isc-input');
    const clear = document.getElementById('isc-clear');

    function toggleClear() {
      const hasText = input.value.length > 0;
      clear.classList.toggle('isc-visible', hasText);
    }

    clear.addEventListener('click', function () {
      input.value = '';
      input.focus();
      toggleClear();
    });

    input.addEventListener('input', toggleClear);
    toggleClear();
  </script>
</body>
</html>
