<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encrypted Field Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="efi-demo">
    <h1>Encrypted Field</h1>
    <p class="efi-subtitle">Click the lock icon to toggle encrypted view</p>

    <div class="efi-card">
      <div class="efi-field">
        <label for="apiKey">API Key</label>
        <div class="efi-input-wrap">
          <input type="password" id="apiKey" class="efi-input" value="sk-proj-3F8kD9mN2vR7xL4pQ6wY1jH5tA0cZ9eB" readonly>
          <button class="efi-toggle" id="toggleApi" aria-label="Toggle encryption" onclick="toggleField('apiKey', 'iconApi')">
            <svg class="efi-lock" id="iconApi" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="efi-field">
        <label for="dbPassword">Database Password</label>
        <div class="efi-input-wrap">
          <input type="password" id="dbPassword" class="efi-input" value="P@ssw0rd!2024#secure" readonly>
          <button class="efi-toggle" id="toggleDb" aria-label="Toggle encryption" onclick="toggleField('dbPassword', 'iconDb')">
            <svg class="efi-lock" id="iconDb" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="efi-status" id="efiStatus">All fields encrypted</div>
    </div>

    <div class="efi-actions">
      <button class="efi-btn" onclick="lockAll()">Lock All</button>
      <button class="efi-btn efi-btn--outline" onclick="unlockAll()">Unlock All</button>
    </div>
  </main>

  <script>
    function toggleField(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      const isLocked = input.type === 'password';
      input.type = isLocked ? 'text' : 'password';
      icon.classList.toggle('efi-unlocked', isLocked);
      updateStatus();
    }

    function updateStatus() {
      const inputs = document.querySelectorAll('.efi-input');
      const locked = Array.from(inputs).filter(i => i.type === 'password').length;
      document.getElementById('efiStatus').textContent =
        locked === inputs.length ? 'All fields encrypted' :
        locked === 0 ? 'All fields visible' :
        `${locked} of ${inputs.length} fields encrypted`;
    }

    function lockAll() {
      document.querySelectorAll('.efi-input').forEach(i => i.type = 'password');
      document.querySelectorAll('.efi-lock').forEach(i => i.classList.remove('efi-unlocked'));
      updateStatus();
    }

    function unlockAll() {
      document.querySelectorAll('.efi-input').forEach(i => i.type = 'text');
      document.querySelectorAll('.efi-lock').forEach(i => i.classList.add('efi-unlocked'));
      updateStatus();
    }
  </script>
</body>
</html>
