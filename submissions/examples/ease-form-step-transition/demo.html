<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-form-step-transition – Multi‑Step Form</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-max-w-lg ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Multi‑Step Form
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Directional transitions: forward slides left, backward slides right.
    </p>

    <div class="form-card ease-card ease-p-6 ease-bg-white">
      <!-- Hidden radio inputs to track current step -->
      <input type="radio" name="step" id="step1" class="step-radio" checked>
      <input type="radio" name="step" id="step2" class="step-radio">
      <input type="radio" name="step" id="step3" class="step-radio">

      <!-- Step indicators -->
      <div class="step-indicators ease-flex ease-justify-center ease-gap-3 ease-mb-6">
        <label for="step1" class="step-dot"></label>
        <label for="step2" class="step-dot"></label>
        <label for="step3" class="step-dot"></label>
      </div>

      <!-- Form steps container -->
      <div class="steps-wrapper">
        <div class="step-content step-1">
          <h3 class="ease-text-lg ease-font-semibold ease-mb-4">Step 1: Personal Info</h3>
          <input type="text" placeholder="Full Name" class="ease-input ease-mb-3 ease-w-full">
          <input type="email" placeholder="Email" class="ease-input ease-mb-4 ease-w-full">
          <label for="step2" class="ease-btn ease-btn-primary ease-cursor-pointer">Next →</label>
        </div>
        <div class="step-content step-2">
          <h3 class="ease-text-lg ease-font-semibold ease-mb-4">Step 2: Address</h3>
          <input type="text" placeholder="Street" class="ease-input ease-mb-3 ease-w-full">
          <input type="text" placeholder="City" class="ease-input ease-mb-4 ease-w-full">
          <div class="ease-flex ease-gap-3">
            <label for="step1" class="ease-btn ease-btn-ghost ease-cursor-pointer">← Back</label>
            <label for="step3" class="ease-btn ease-btn-primary ease-cursor-pointer">Next →</label>
          </div>
        </div>
        <div class="step-content step-3">
          <h3 class="ease-text-lg ease-font-semibold ease-mb-4">Step 3: Confirm</h3>
          <p class="ease-text-gray-500 ease-mb-4">Review your details and submit.</p>
          <div class="ease-flex ease-gap-3">
            <label for="step2" class="ease-btn ease-btn-ghost ease-cursor-pointer">← Back</label>
            <button class="ease-btn ease-btn-primary" onclick="alert('Submitted!')">Submit</button>
          </div>
        </div>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Radio‑input tracking + CSS transitions for direction‑aware sliding.
    </p>
  </div>

</body>
</html>
