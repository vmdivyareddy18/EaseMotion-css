<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Tabs / Sidebar Tabs</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="vtabs">
      <div class="vtabs-nav">
        <button class="vtabs-tab active" data-tab="tab1">Profile</button>
        <button class="vtabs-tab" data-tab="tab2">Settings</button>
        <button class="vtabs-tab" data-tab="tab3">Notifications</button>
        <button class="vtabs-tab" data-tab="tab4">Billing</button>
      </div>
      <div class="vtabs-panels">
        <div class="vtabs-panel active" id="tab1"><h3>Profile</h3><p>Edit your public profile information.</p></div>
        <div class="vtabs-panel" id="tab2"><h3>Settings</h3><p>Configure your application preferences.</p></div>
        <div class="vtabs-panel" id="tab3"><h3>Notifications</h3><p>Manage email and push notification settings.</p></div>
        <div class="vtabs-panel" id="tab4"><h3>Billing</h3><p>View invoices and update payment methods.</p></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
