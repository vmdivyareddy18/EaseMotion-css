<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Blur Variable Fix Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            /* Add some background elements to see the blur */
            background-image: 
                radial-gradient(circle at 20% 20%, #6c63ff22 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, #8b5cf622 0%, transparent 40%);
        }
        .controls {
            margin-top: 2rem;
            padding: 1rem;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <h1>Modal Blur Variable Fix</h1>
    <p>This demo shows how the new <code>--ease-modal-blur</code> variable allows customizing the backdrop blur.</p>
    
    <a href="#modal" class="open-btn">Open Modal</a>

    <div class="controls">
        <label for="blur-slider">Adjust Blur intensity (<code>--ease-modal-blur</code>): </label>
        <input type="range" id="blur-slider" min="0" max="20" value="4" oninput="updateBlur(this.value)">
        <span id="blur-value">4px</span>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h2>Configurable Blur</h2>
            <p>The backdrop of this modal uses a CSS variable for the blur intensity.</p>
            <p>Try adjusting the slider to see it change in real-time!</p>
            <a href="#" class="close-btn">Close Modal</a>
        </div>
    </div>

    <script>
        function updateBlur(val) {
            document.documentElement.style.setProperty('--ease-modal-blur', val + 'px');
            document.getElementById('blur-value').textContent = val + 'px';
        }
    </script>
</body>
</html>
