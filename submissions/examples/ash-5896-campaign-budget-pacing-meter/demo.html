<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaign Budget Pacing Meter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Campaign Budget Pacing</h1>

        <p class="subtitle">
            Monitor advertising spend against the planned campaign budget.
        </p>

        <div class="meter">

            <div class="ring">

                <div class="inner">

                    <strong>68%</strong>

                    <span>Budget Used</span>

                </div>

            </div>

            <div class="details">

                <div class="metric">

                    <span>Total Budget</span>

                    <strong>$50,000</strong>

                </div>

                <div class="metric">

                    <span>Spent</span>

                    <strong>$34,000</strong>

                </div>

                <div class="metric">

                    <span>Remaining</span>

                    <strong class="positive">$16,000</strong>

                </div>

            </div>

        </div>

        <div class="progress">

            <div class="label">

                <span>Monthly Pacing</span>

                <strong>68%</strong>

            </div>

            <div class="bar">

                <div class="fill"></div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>CTR</span>

                <strong>4.8%</strong>

            </div>

            <div class="stat">

                <span>Conversions</span>

                <strong>1,284</strong>

            </div>

            <div class="stat">

                <span>Status</span>

                <strong class="positive">On Track</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
