<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Skeleton Loading</h1>
    <p class="subtitle">Shimmer animation — text, circle, image, card, table variants</p>

    <div class="section">
      <h2>Profile Card</h2>
      <div class="profile-skeleton">
        <div class="ease-skeleton ease-skeleton-circle avatar"></div>
        <div class="lines">
          <div class="ease-skeleton ease-skeleton-lg" style="width: 60%;"></div>
          <div class="ease-skeleton ease-skeleton-md" style="width: 40%;"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Article</h2>
      <div class="article-skeleton">
        <div class="ease-skeleton image"></div>
        <div class="ease-skeleton ease-skeleton-xl" style="width: 75%;"></div>
        <div class="ease-skeleton ease-skeleton-md"></div>
        <div class="ease-skeleton ease-skeleton-md" style="width: 90%;"></div>
        <div class="ease-skeleton ease-skeleton-md" style="width: 65%;"></div>
      </div>
    </div>

    <div class="section">
      <h2>Card Grid</h2>
      <div class="card-grid">
        <div class="card-skeleton">
          <div class="ease-skeleton card-img"></div>
          <div class="ease-skeleton ease-skeleton-lg" style="width: 80%;"></div>
          <div class="ease-skeleton ease-skeleton-md"></div>
          <div class="ease-skeleton ease-skeleton-sm" style="width: 50%;"></div>
        </div>
        <div class="card-skeleton">
          <div class="ease-skeleton card-img"></div>
          <div class="ease-skeleton ease-skeleton-lg" style="width: 70%;"></div>
          <div class="ease-skeleton ease-skeleton-md"></div>
          <div class="ease-skeleton ease-skeleton-sm" style="width: 60%;"></div>
        </div>
        <div class="card-skeleton">
          <div class="ease-skeleton card-img"></div>
          <div class="ease-skeleton ease-skeleton-lg" style="width: 75%;"></div>
          <div class="ease-skeleton ease-skeleton-md"></div>
          <div class="ease-skeleton ease-skeleton-sm" style="width: 45%;"></div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Table</h2>
      <div class="table-skeleton">
        <div class="table-row">
          <div class="ease-skeleton ease-skeleton-lg"></div>
          <div class="ease-skeleton ease-skeleton-lg"></div>
          <div class="ease-skeleton ease-skeleton-lg"></div>
          <div class="ease-skeleton ease-skeleton-lg"></div>
        </div>
        <div class="table-row"><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div></div>
        <div class="table-row"><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div></div>
        <div class="table-row"><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div><div class="ease-skeleton ease-skeleton-md"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
