<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compact List View</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="compact-list">
    <h2>Project Files</h2>

    <details class="list-group" open>
      <summary class="list-group-header">src/</summary>
      <div class="list-group-body">
        <div class="list-item">main.js</div>
        <div class="list-item">utils.js</div>
        <div class="list-item">constants.js</div>
      </div>
    </details>

    <details class="list-group">
      <summary class="list-group-header">components/</summary>
      <div class="list-group-body">
        <div class="list-item">Button.jsx</div>
        <div class="list-item">Modal.jsx</div>
        <div class="list-item">List.jsx</div>
        <div class="list-item">Header.jsx</div>
      </div>
    </details>

    <details class="list-group">
      <summary class="list-group-header">styles/</summary>
      <div class="list-group-body">
        <div class="list-item">global.css</div>
        <div class="list-item">variables.css</div>
        <div class="list-item">reset.css</div>
      </div>
    </details>

    <details class="list-group">
      <summary class="list-group-header">tests/</summary>
      <div class="list-group-body">
        <div class="list-item">app.test.js</div>
        <div class="list-item">utils.test.js</div>
      </div>
    </details>
  </div>
</body>
</html>
