<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Method Risk Indicator Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="payment-risk-card">
    <h4 style="margin: 0 0 0.25rem 0; color: #0f172a; font-size: 1.2rem;">Gateway Velocity Triage</h4>
    <p style="color: #64748b; font-size: 0.85rem; margin-top: 0; margin-bottom: 1.5rem;">
      Real-time risk scoring evaluation matrix mapped to active merchant payment instruments.
    </p>

    <div class="payment-option-row">
      <div class="payment-meta-block">
        <span style="font-size: 1.25rem;">🔒</span>
        <span class="payment-title-text">Tokenized Apple Pay</span>
      </div>
      <span class="ease-risk-badge ease-risk-low">Low Risk</span>
    </div>

    <div class="payment-option-row">
      <div class="payment-meta-block">
        <span style="font-size: 1.25rem;">💳</span>
        <span class="payment-title-text">International Credit Card</span>
      </div>
      <span class="ease-risk-badge ease-risk-elevated">Elevated</span>
    </div>

    <div class="payment-option-row">
      <div class="payment-meta-block">
        <span style="font-size: 1.25rem;">🌐</span>
        <span class="payment-title-text">Anonymous Digital Wallet</span>
      </div>
      <span class="ease-risk-badge ease-risk-high">High Risk</span>
    </div>
  </div>

</body>
</html>
