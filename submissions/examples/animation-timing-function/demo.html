<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Timing Function</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Animation Timing Functions</h1>
    <p class="subtitle">Compare how different timing functions affect motion over the same duration.</p>

    <div class="func-grid">
      <div class="func-card">
        <span class="func-name">ease</span>
        <div class="func-track"><div class="func-ball" style="--tf: ease;"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 C25,35 75,5 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg></div>
      </div>
      <div class="func-card">
        <span class="func-name">linear</span>
        <div class="func-track"><div class="func-ball" style="--tf: linear;"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 L100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg></div>
      </div>
      <div class="func-card">
        <span class="func-name">ease-in</span>
        <div class="func-track"><div class="func-ball" style="--tf: ease-in;"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 Q50,40 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg></div>
      </div>
      <div class="func-card">
        <span class="func-name">ease-out</span>
        <div class="func-track"><div class="func-ball" style="--tf: ease-out;"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 Q50,0 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg></div>
      </div>
      <div class="func-card">
        <span class="func-name">ease-in-out</span>
        <div class="func-track"><div class="func-ball" style="--tf: ease-in-out;"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 C25,40 75,0 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg></div>
      </div>
      <div class="func-card">
        <span class="func-name">cubic-bezier(0.68, -0.55, 0.27, 1.55)</span>
        <div class="func-track"><div class="func-ball" style="--tf: cubic-bezier(0.68, -0.55, 0.27, 1.55);"></div></div>
        <div class="func-graph"><svg viewBox="0 0 100 40"><path d="M0,40 C68,75 27,-15 100,0" fill="none" stroke="#f59e0b" stroke-width="2"/></svg></div>
      </div>
    </div>

    <div class="controls">
      <button id="toggleBtn" class="btn">Pause / Resume</button>
    </div>
  </main>
  <script>
    let paused = false;
    document.getElementById('toggleBtn').addEventListener('click', () => {
      paused = !paused;
      document.querySelectorAll('.func-ball').forEach(b => {
        b.style.animationPlayState = paused ? 'paused' : 'running';
      });
    });
  </script>
</body>
</html>
