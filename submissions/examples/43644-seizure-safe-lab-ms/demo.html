<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seizure-Safe Animation Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-seizure-container">
    <div class="ease-seizure-header">
      <h2 class="ease-seizure-title">Seizure-Safe Animation Lab</h2>
      <p class="ease-seizure-desc">Testing the CSS `prefers-reduced-motion` media query to prevent strobing.</p>
      
      <button id="mockToggleBtn" class="ease-seizure-btn ease-hover-lift">
        Simulate Reduced Motion ON
      </button>
    </div>

    <div id="demoGrid" class="ease-seizure-grid">
      
      <!-- Unsafe Implementation -->
      <div class="ease-seizure-col">
        <h3 class="ease-seizure-col-title">Unsafe Animation</h3>
        <p class="ease-seizure-text">This animation ignores OS preferences and flashes constantly.</p>
        
        <div class="ease-strobe-unsafe"></div>
      </div>

      <!-- Safe Implementation -->
      <div class="ease-seizure-col">
        <h3 class="ease-seizure-col-title">Safe Animation</h3>
        <p class="ease-seizure-text">This animation automatically stops if `prefers-reduced-motion` is active.</p>
        
        <div class="ease-strobe-safe"></div>
      </div>

    </div>
  </div>

  <script>
    const btn = document.getElementById('mockToggleBtn');
    const grid = document.getElementById('demoGrid');
    
    let isMockOn = false;

    // Check actual OS setting on load
    const mediaQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
    if(mediaQuery.matches) {
      btn.textContent = "OS Reduced Motion Detected";
      btn.disabled = true;
      btn.style.opacity = '0.5';
      btn.style.cursor = 'not-allowed';
    }

    // Toggle mock mode for demo
    btn.addEventListener('click', () => {
      isMockOn = !isMockOn;
      if (isMockOn) {
        grid.classList.add('mock-reduced-motion');
        btn.textContent = "Simulate Reduced Motion OFF";
        btn.style.background = "#10b981";
      } else {
        grid.classList.remove('mock-reduced-motion');
        btn.textContent = "Simulate Reduced Motion ON";
        btn.style.background = "#0f172a";
      }
    });
  </script>

</body>
</html>
