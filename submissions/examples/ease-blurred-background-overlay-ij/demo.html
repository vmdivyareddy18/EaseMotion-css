<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blurred Background Overlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page-content">
    <h1>Blurred Background Overlay</h1>
    <button class="open-overlay-btn" id="openOverlay">Open Overlay</button>
  </main>

  <div class="overlay" id="overlay">
    <div class="overlay-content">
      <button class="close-btn" id="closeOverlay" aria-label="Close">&times;</button>
      <h2>Modal Title</h2>
      <p>This is a demonstration of the blurred background overlay effect using <code>backdrop-filter</code> with a smooth fade and scale transition. Click the close button or anywhere outside the modal to dismiss.</p>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const openBtn = document.getElementById('openOverlay');
    const closeBtn = document.getElementById('closeOverlay');

    openBtn.addEventListener('click', () => overlay.classList.add('visible'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('visible'));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('visible');
    });
  </script>
</body>
</html>
