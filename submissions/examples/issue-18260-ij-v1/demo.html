<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Rating</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Star Rating</h1>
    <div class="stars" data-rating="0">
      <span class="star" data-value="1">☆</span>
      <span class="star" data-value="2">☆</span>
      <span class="star" data-value="3">☆</span>
      <span class="star" data-value="4">☆</span>
      <span class="star" data-value="5">☆</span>
    </div>
    <p class="rating-text" id="ratingText">Click a star to rate</p>
  </div>
  <script>
    const stars = document.querySelectorAll('.star');
    const ratingText = document.getElementById('ratingText');
    let currentRating = 0;

    stars.forEach(star => {
      star.addEventListener('mouseenter', () => {
        const val = parseInt(star.dataset.value);
        stars.forEach(s => {
          const sv = parseInt(s.dataset.value);
          s.textContent = sv <= val ? '★' : '☆';
          s.style.color = sv <= val ? '#f59e0b' : '#475569';
        });
      });

      star.addEventListener('mouseleave', () => {
        stars.forEach(s => {
          const sv = parseInt(s.dataset.value);
          s.textContent = sv <= currentRating ? '★' : '☆';
          s.style.color = sv <= currentRating ? '#f59e0b' : '#475569';
        });
      });

      star.addEventListener('click', () => {
        currentRating = parseInt(star.dataset.value);
        ratingText.textContent = `Rating: ${currentRating} / 5`;
      });
    });
  </script>
</body>
</html>
