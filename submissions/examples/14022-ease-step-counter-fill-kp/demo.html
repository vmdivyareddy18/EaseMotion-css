<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Counter Fill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="step-stage">
    <section class="step-card" aria-label="Step counter fill demo">
      <div class="step-ring" aria-hidden="true">
        <span class="step-progress"></span>
        <span class="step-center">82%</span>
      </div>
      <p class="step-label">Daily steps</p>
      <strong class="step-count">8,240</strong>
      <p class="step-target">Goal: 10,000 steps</p>
    </section>
  </main>
</body>
</html>
