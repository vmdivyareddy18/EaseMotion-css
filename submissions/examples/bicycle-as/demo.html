<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bicycle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="bike">
      <span class="wheel rear">
        <span class="spokes"></span>
        <span class="hub"></span>
      </span>
      <span class="wheel front">
        <span class="spokes"></span>
        <span class="hub"></span>
      </span>
      <span class="frame f1"></span>
      <span class="frame f2"></span>
      <span class="frame f3"></span>
      <span class="frame f4"></span>
      <span class="fork"></span>
      <span class="seat"></span>
      <span class="bars"></span>
      <span class="crank">
        <span class="pedal pa"></span>
        <span class="pedal pb"></span>
      </span>
    </div>
    <span class="road"></span>
  </div>
</body>
</html>
