<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Stagger Image Cropper Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f8f9fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- Cropper Component Wrapper -->
  <div class="em-cropper-container">
    
    <!-- Image Workspace Window -->
    <div class="em-cropper-window">
      <img src="https://picsum.photos" alt="Source Draft" class="em-cropper-image">
      
      <!-- Staggered Cropping Overlay Zone -->
      <div class="em-cropper-box">
        <!-- Structural Corner Handles -->
        <span class="em-crop-handle em-handle-tl"></span>
        <span class="em-crop-handle em-handle-tr"></span>
        <span class="em-crop-handle em-handle-bl"></span>
        <span class="em-crop-handle em-handle-br"></span>
      </div>
    </div>

    <!-- Interface Control Strip -->
    <div class="em-cropper-toolbar">
      <button class="em-btn em-btn-secondary">Cancel</button>
      <button class="em-btn em-btn-primary">Apply Crop</button>
    </div>

  </div>

</body>
</html>
