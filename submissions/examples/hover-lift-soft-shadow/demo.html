<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Lift & Soft Shadow Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      background-color: #f9f9f9;
    }
    .container {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
    }
    .demo-card {
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      border: 1px solid #e0e0e0;
      width: 250px;
      cursor: pointer;
    }
    .demo-button {
      padding: 12px 24px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <h1>Hover Lift & Soft Shadow Demo</h1>
  <p>Hover over the elements below to see the lift and shadow effect.</p>

  <div class="container">
    <!-- Card example -->
    <div class="demo-card hover-lift-shadow">
      <h3 style="margin-top: 0;">Interactive Card</h3>
      <p>This card gently lifts up and casts a soft shadow to indicate it is interactive.</p>
    </div>
    
    <!-- Button example -->
    <div>
      <button class="demo-button hover-lift-shadow">
        Hover Over Me!
      </button>
    </div>
  </div>

</body>
</html>
