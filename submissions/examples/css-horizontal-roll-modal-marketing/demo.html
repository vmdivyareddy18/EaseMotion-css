<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Roll Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<div class="hero">
    <h1>Launch Your Product Today</h1>
    <p>Create beautiful marketing pages with EaseMotion CSS.</p>

    <label for="modal-toggle" class="open-btn">
        Get Started
    </label>
</div>

<div class="overlay">

    <div class="ease-horizontal-roll-modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <h2>Start Your Free Trial</h2>

        <p>
            Experience modern animations and reusable CSS components
            with zero JavaScript.
        </p>

        <button>Start Free Trial</button>

    </div>

</div>

</body>
</html>
