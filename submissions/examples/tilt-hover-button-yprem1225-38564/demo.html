<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-btn-tilt · Tilt Hover Button Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f5f5fa;
    }
    h1 {
      font-size: 1.25rem;
      color: #333;
    }
    .row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    p.hint {
      color: #666;
      font-size: 0.875rem;
      text-align: center;
      max-width: 32rem;
    }
  </style>
</head>
<body>
  <h1>ease-btn-tilt — Tilt Hover Button</h1>

  <div class="row">
    <button class="ease-btn-tilt ease-btn-sm">Small</button>
    <button class="ease-btn-tilt">Hover or Tab to me</button>
    <button class="ease-btn-tilt ease-btn-lg">Large</button>
  </div>

  <!-- Custom property override example -->
  <button
    class="ease-btn-tilt"
    style="--tilt-angle: 14deg; --tilt-bg: #f97316;"
  >
    Custom tilt angle
  </button>

  <p class="hint">
    Try tabbing to each button with your keyboard — the tilt and focus ring
    trigger the same as on hover.
  </p>
</body>
</html>
