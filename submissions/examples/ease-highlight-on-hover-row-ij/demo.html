<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Highlight on Hover Row — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Highlight on Hover Row</h2>
    <p>Hover over a row to see the animated highlight.</p>
    <div class="table">
      <div class="row">Feature alpha</div>
      <div class="row">Feature beta</div>
      <div class="row">Feature gamma</div>
      <div class="row">Feature delta</div>
      <div class="row">Feature epsilon</div>
    </div>
  </div>
</body>
</html>
