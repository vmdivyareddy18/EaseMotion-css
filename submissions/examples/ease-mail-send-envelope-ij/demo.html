<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Send Envelope</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mail Send Envelope</h1>

  <div class="container">
    <div class="envelope-wrapper">
      <div class="envelope" id="envelope">
        <div class="envelope-flap" id="flap"></div>
        <div class="envelope-body"></div>
        <div class="letter" id="letter">
          <div class="letter-line"></div>
          <div class="letter-line"></div>
          <div class="letter-line short"></div>
        </div>
      </div>
      <div class="checkmark" id="checkmark">
        <span class="check-icon">&#10003;</span>
      </div>
      <div class="new-letter" id="newLetter"></div>
    </div>

    <button class="send-btn" id="sendBtn">Send</button>

    <div class="examples">
      <h2>More Examples</h2>
      <div class="example-list">
        <div class="example-item" data-demo="fast">
          <span class="example-label">Fast</span>
          <button class="send-btn small" data-duration="0.3">Send</button>
        </div>
        <div class="example-item" data-demo="slow">
          <span class="example-label">Slow</span>
          <button class="send-btn small" data-duration="1.2">Send</button>
        </div>
        <div class="example-item" data-demo="bounce">
          <span class="example-label">Bounce</span>
          <button class="send-btn small" data-duration="0.6" data-bounce="true">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const envelope = document.getElementById('envelope');
    const flap = document.getElementById('flap');
    const letter = document.getElementById('letter');
    const checkmark = document.getElementById('checkmark');
    const newLetter = document.getElementById('newLetter');
    const sendBtn = document.getElementById('sendBtn');

    function resetAnimation() {
      envelope.classList.remove('sent', 'flying', 'hidden');
      flap.classList.remove('closed');
      letter.classList.remove('slid-out');
      checkmark.classList.remove('visible');
      newLetter.classList.remove('slid-in');
      clearTimeout(envelope._foldTimer);
      clearTimeout(envelope._flyTimer);
      clearTimeout(envelope._hideTimer);
    }

    function sendMail(duration, bounce) {
      if (envelope.classList.contains('sent')) return;
      resetAnimation();

      const delay = (duration || 0.6) * 1000;

      envelope.classList.add('sending');
      flap.classList.add('closed');

      envelope._foldTimer = setTimeout(() => {
        envelope.classList.add('flying');
        envelope.style.setProperty('--fly-duration', (duration || 0.6) + 's');

        envelope._flyTimer = setTimeout(() => {
          envelope.classList.add('hidden');
          checkmark.classList.add('visible');

          setTimeout(() => {
            checkmark.classList.remove('visible');
            newLetter.classList.add('slid-in');
          }, 600);
        }, delay);
      }, delay * 0.4);
    }

    sendBtn.addEventListener('click', () => sendMail());

    document.querySelectorAll('.example-list .send-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const dur = parseFloat(btn.dataset.duration) || 0.6;
        const bounce = btn.dataset.bounce === 'true';
        sendMail(dur, bounce);
      });
    });
  </script>
</body>
</html>
