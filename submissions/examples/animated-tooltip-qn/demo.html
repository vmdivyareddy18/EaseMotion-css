<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Tooltips - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Hover over the buttons!</h2>
        
        <div class="button-row-qn">
            <!-- Top Tooltip -->
            <button class="demo-btn-qn tooltip-qn" data-tooltip="This tooltip appears on top">
                Top Tooltip
            </button>

            <!-- Bottom Tooltip -->
            <button class="demo-btn-qn tooltip-qn tooltip-bottom-qn" data-tooltip="This tooltip appears on bottom">
                Bottom Tooltip
            </button>

            <!-- Left Tooltip -->
            <button class="demo-btn-qn tooltip-qn tooltip-left-qn" data-tooltip="Tooltip on the left side">
                Left Tooltip
            </button>

            <!-- Right Tooltip -->
            <button class="demo-btn-qn tooltip-qn tooltip-right-qn" data-tooltip="Tooltip on the right side">
                Right Tooltip
            </button>
        </div>
    </div>
</body>
</html>
