<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glowing Glassmorphic Card Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="glow-card">
      <div class="card-glow"></div>
      <div class="card-content">
        <span class="badge">New Release</span>
        <h3>Glowing Card</h3>
        <p>A beautiful glassmorphic container with neon radial glow borders that track hover interactions.</p>
        <div class="card-footer">
          <span class="author">By Hasini</span>
          <a href="#" class="explore-btn">Explore</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.querySelector('.glow-card');
    const glow = document.querySelector('.card-glow');

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      glow.style.setProperty('--x', `${x}px`);
      glow.style.setProperty('--y', `${y}px`);
      glow.style.setProperty('--opacity', '1');
    });

    card.addEventListener('mouseleave', () => {
      glow.style.setProperty('--opacity', '0');
    });
  </script>
</body>
</html>
