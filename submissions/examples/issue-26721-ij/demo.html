<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-crocodile-snap | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="water-c"></div>
    <div class="bubble bub-1"></div>
    <div class="bubble bub-2"></div>
    <div class="croc-body">
      <div class="croc-scute cs-1"></div>
      <div class="croc-scute cs-2"></div>
      <div class="croc-scute cs-3"></div>
      <div class="croc-scute cs-4"></div>
      <div class="croc-scute cs-5"></div>
      <div class="croc-scute cs-6"></div>
      <div class="croc-head">
        <div class="croc-snout">
          <div class="tooth tooth-1"></div>
          <div class="tooth tooth-2"></div>
          <div class="tooth tooth-3"></div>
          <div class="tooth tooth-4"></div>
        </div>
        <div class="croc-eye">
          <div class="croc-pupil"></div>
        </div>
      </div>
      <div class="tail-croc"></div>
    </div>
  </div>
</body>
</html>
