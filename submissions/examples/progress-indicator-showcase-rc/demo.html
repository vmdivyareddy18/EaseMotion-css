<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Progress Indicators Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Animated Progress Indicators Showcase</h1>

    <p class="intro">
        A collection of animated progress indicators commonly used in modern interfaces.
    </p>

    <div class="card">
        <h2>Linear Progress Bar</h2>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
    </div>

    <div class="card">
        <h2>Gradient Progress Bar</h2>
        <div class="progress-bar">
            <div class="gradient-fill"></div>
        </div>
    </div>

    <div class="card">
        <h2>Circular Progress</h2>
        <div class="circle">
            <span>75%</span>
        </div>
    </div>

    <div class="card">
        <h2>Step Progress Tracker</h2>
        <div class="steps">
            <div class="step active">1</div>
            <div class="line"></div>
            <div class="step active">2</div>
            <div class="line"></div>
            <div class="step active">3</div>
            <div class="line"></div>
            <div class="step">4</div>
        </div>
    </div>

    <div class="card">
        <h2>Indeterminate Loader</h2>
        <div class="indeterminate">
            <div class="indeterminate-bar"></div>
        </div>
    </div>

</div>

</body>
</html>
