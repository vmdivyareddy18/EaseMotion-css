<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag Reorder List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Reorder List</h1>
  <p class="subtitle">Drag the handle to reorder items</p>

  <ul class="drag-list" id="dragList">
    <li class="drag-item" data-id="1">
      <span class="drag-handle">⠿</span>
      <span class="drag-text">Design system tokens</span>
    </li>
    <li class="drag-item" data-id="2">
      <span class="drag-handle">⠿</span>
      <span class="drag-text">Component architecture</span>
    </li>
    <li class="drag-item" data-id="3">
      <span class="drag-handle">⠿</span>
      <span class="drag-text">Accessibility audit</span>
    </li>
    <li class="drag-item" data-id="4">
      <span class="drag-handle">⠿</span>
      <span class="drag-text">Animation library</span>
    </li>
    <li class="drag-item" data-id="5">
      <span class="drag-handle">⠿</span>
      <span class="drag-text">Documentation site</span>
    </li>
  </ul>

  <script>
    const list = document.getElementById('dragList');
    let dragSrc = null;

    function getIndex(el) {
      return Array.from(list.children).indexOf(el);
    }

    function handleDragStart(e) {
      const item = e.target.closest('.drag-item');
      if (!item) return;
      dragSrc = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', item.dataset.id);
    }

    function handleDragOver(e) {
      e.preventDefault();
      const target = e.target.closest('.drag-item');
      if (!target || target === dragSrc) return;

      const srcIdx = getIndex(dragSrc);
      const tgtIdx = getIndex(target);

      if (srcIdx < tgtIdx) {
        list.insertBefore(dragSrc, target.nextElementSibling);
      } else {
        list.insertBefore(dragSrc, target);
      }

      updateItems();
    }

    function handleDragEnd(e) {
      const item = e.target.closest('.drag-item');
      if (item) item.classList.remove('dragging');
      dragSrc = null;
      updateItems();
    }

    function updateItems() {
      document.querySelectorAll('.drag-item').forEach((el, i) => {
        el.style.transform = '';
        el.classList.remove('drop-target');
      });
    }

    list.addEventListener('dragstart', handleDragStart);
    list.addEventListener('dragover', handleDragOver);
    list.addEventListener('dragend', handleDragEnd);

    list.querySelectorAll('.drag-item').forEach(el => {
      el.addEventListener('dragenter', (e) => {
        e.preventDefault();
        const item = e.target.closest('.drag-item');
        if (item && item !== dragSrc) item.classList.add('drop-target');
      });
      el.addEventListener('dragleave', (e) => {
        const item = e.target.closest('.drag-item');
        if (item) item.classList.remove('drop-target');
      });
    });
  </script>
</body>
</html>
