<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-ai-prompt Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
  <div class="ease-ai-prompt">
    <button class="ease-ai-prompt__attach" aria-label="Attach file">📎</button>

    <textarea
      class="ease-ai-prompt__textarea"
      id="promptInput"
      rows="1"
      placeholder="Message the assistant..."
    ></textarea>

    <button class="ease-ai-prompt__send" id="sendBtn" aria-label="Send message">↑</button>
  </div>

  <div class="ease-ai-prompt__hint" id="hintText">Press Enter to send</div>
</div>

<script>
  const textarea = document.getElementById('promptInput');
  const sendBtn = document.getElementById('sendBtn');
  const hint = document.getElementById('hintText');

  function autoResize() {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  }

  function updateSendState() {
    const hasText = textarea.value.trim().length > 0;
    sendBtn.classList.toggle('ease-ai-prompt__send--active', hasText);
  }

  textarea.addEventListener('input', () => {
    autoResize();
    updateSendState();
  });

  textarea.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function sendMessage() {
    if (textarea.value.trim().length === 0) return;
    hint.textContent = 'Sent: "' + textarea.value.trim().slice(0, 40) + '"';
    textarea.value = '';
    autoResize();
    updateSendState();
    setTimeout(() => { hint.textContent = 'Press Enter to send'; }, 2000);
  }
</script>

</body>
</html>
