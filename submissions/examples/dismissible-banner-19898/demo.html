<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dismissible Banner - Pure CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 
      THE CSS CHECKBOX HACK 
      This input stores the 'dismissed' state. It is hidden visually.
    -->
    <input type="checkbox" id="dismiss-toggle" class="dismiss-toggle-input" aria-hidden="true">

    <!-- 
      THE BANNER 
      Must be a sibling of the checkbox for the `~` selector to work.
    -->
    <div class="ease-banner">
        <div class="banner-content">
            <span class="badge">NEW</span>
            <p>We just launched our new Pure CSS component library! Build faster without the JS bloat.</p>
        </div>
        <!-- 
          The 'Close' button is actually a label pointing to the hidden checkbox.
        -->
        <label for="dismiss-toggle" class="dismiss-btn" aria-label="Close banner">
            &times;
        </label>
    </div>

    <!-- Page Content (to demonstrate smooth reflow) -->
    <main class="page-content">
        <header>
            <h1>Welcome to the Dashboard</h1>
            <p>Notice how the content smoothly shifts up when the banner is dismissed.</p>
        </header>
        
        <div class="card-grid">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
        </div>
    </main>

</body>
</html>
