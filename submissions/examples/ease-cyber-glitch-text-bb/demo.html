<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Glitch Text Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .demo-wrapper {
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      padding: 50px 80px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }
    h1 {
      font-size: 3.5rem;
      margin: 0 0 20px 0;
    }
    p {
      color: #8f9aa8;
      font-size: 1.1rem;
      max-width: 500px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="demo-wrapper">
    <div class="cyber-glitch-container">
      <h1 class="cyber-glitch-text" data-text="NEURAL LINK">NEURAL LINK</h1>
    </div>
    <p>A premium, highly-performant cyberpunk glitch text animation. Fully self-contained, CSS-driven, and optimized for accessibility with reduced motion safety overrides.</p>
  </div>
</body>
</html>
