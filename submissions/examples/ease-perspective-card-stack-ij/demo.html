<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Card Stack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card-stack">
      <div class="stack-card" style="--index: 0; --rotate: -3deg; --offset: 0px">
        <div class="stack-card-inner">
          <div class="card-color" style="background: linear-gradient(135deg, #e94560, #c23152)"></div>
          <div class="card-info">
            <div class="card-name">Design</div>
            <div class="card-desc">UI/UX & Branding</div>
          </div>
        </div>
      </div>
      <div class="stack-card" style="--index: 1; --rotate: 2deg; --offset: 8px">
        <div class="stack-card-inner">
          <div class="card-color" style="background: linear-gradient(135deg, #533483, #3d2366)"></div>
          <div class="card-info">
            <div class="card-name">Development</div>
            <div class="card-desc">Frontend & Backend</div>
          </div>
        </div>
      </div>
      <div class="stack-card" style="--index: 2; --rotate: -1deg; --offset: 16px">
        <div class="stack-card-inner">
          <div class="card-color" style="background: linear-gradient(135deg, #0f3460, #0a2540)"></div>
          <div class="card-info">
            <div class="card-name">Marketing</div>
            <div class="card-desc">Growth & Analytics</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
