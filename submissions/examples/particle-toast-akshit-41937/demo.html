<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Particle Toast</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../dist/easemotion.css">

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Particle Toast Demo</h1>
    <p class="subtitle">
        Pure CSS animated notification inspired by modern SaaS dashboards.
    </p>

    <div class="toast-wrapper">

        <div class="particle-toast ease-fade-in-up">

            <!-- Decorative particles -->
            <span class="particle p1"></span>
            <span class="particle p2"></span>
            <span class="particle p3"></span>
            <span class="particle p4"></span>
            <span class="particle p5"></span>
            <span class="particle p6"></span>

            <!-- Success Icon -->
            <div class="toast-icon">
                ✓
            </div>

            <!-- Content -->
            <div class="toast-content">
                <h3>Deployment Successful</h3>
                <p>
                    Your latest build has been deployed successfully and is now live.
                </p>
            </div>

            <!-- Close Button (visual only) -->
            <button class="toast-close" aria-label="Close notification">
                &times;
            </button>

        </div>

    </div>

</div>

</body>
</html>
