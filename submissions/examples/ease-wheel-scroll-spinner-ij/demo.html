<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel Scroll Spinner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wss-container">
    <h1>Wheel Scroll Spinner</h1>
    <div class="wss-toolbar">
      <button class="wss-toggle" id="directionToggle">Switch to Horizontal</button>
    </div>
    <div class="wss-viewport" id="viewport">
      <div class="wss-track" id="track"></div>
    </div>
    <div class="wss-selected" id="selectedDisplay">Selected: Item 4</div>
  </div>
  <script>
    var items = [];
    for (var i = 1; i <= 20; i++) items.push('Item ' + i);
    var track = document.getElementById('track');
    var viewport = document.getElementById('viewport');
    var selectedDisplay = document.getElementById('selectedDisplay');
    var toggleBtn = document.getElementById('directionToggle');
    var isHorizontal = false;

    for (var i = 0; i < items.length; i++) {
      var div = document.createElement('div');
      div.className = 'wss-item';
      div.textContent = items[i];
      div.setAttribute('data-index', i);
      track.appendChild(div);
    }

    function updateSelection() {
      var items = document.querySelectorAll('.wss-item');
      var viewportRect = viewport.getBoundingClientRect();
      var closest = null;
      var minDist = Infinity;

      for (var i = 0; i < items.length; i++) {
        var rect = items[i].getBoundingClientRect();
        var dist;
        if (isHorizontal) {
          var center = rect.left + rect.width / 2;
          dist = Math.abs(center - (viewportRect.left + viewportRect.width / 2));
        } else {
          var center = rect.top + rect.height / 2;
          dist = Math.abs(center - (viewportRect.top + viewportRect.height / 2));
        }
        if (dist < minDist) {
          minDist = dist;
          closest = items[i];
        }
      }

      for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
      if (closest) {
        closest.classList.add('selected');
        selectedDisplay.textContent = 'Selected: ' + closest.textContent;
      }
    }

    function applyTransforms() {
      var viewportRect = viewport.getBoundingClientRect();
      var center = isHorizontal
        ? viewportRect.left + viewportRect.width / 2
        : viewportRect.top + viewportRect.height / 2;

      var items = document.querySelectorAll('.wss-item');
      for (var i = 0; i < items.length; i++) {
        var rect = items[i].getBoundingClientRect();
        var itemCenter = isHorizontal
          ? rect.left + rect.width / 2
          : rect.top + rect.height / 2;
        var dist = Math.abs(itemCenter - center);
        var maxDist = isHorizontal ? viewportRect.width / 2 : viewportRect.height / 2;
        var ratio = Math.min(dist / maxDist, 1);
        var scale = 0.7 + (1 - ratio) * 0.3;
        items[i].style.transform = 'scale(' + scale + ')';
        items[i].style.opacity = 0.3 + (1 - ratio) * 0.7;
      }
    }

    viewport.addEventListener('scroll', function() {
      updateSelection();
      applyTransforms();
    });

    toggleBtn.addEventListener('click', function() {
      isHorizontal = !isHorizontal;
      viewport.classList.toggle('horizontal', isHorizontal);
      toggleBtn.textContent = isHorizontal ? 'Switch to Vertical' : 'Switch to Horizontal';
      setTimeout(function() {
        updateSelection();
        applyTransforms();
      }, 50);
    });

    setTimeout(function() {
      var item4 = document.querySelector('[data-index="4"]');
      if (item4) item4.scrollIntoView({ block: 'center', inline: 'center', behavior: 'auto' });
      updateSelection();
      applyTransforms();
    }, 100);
  </script>
</body>
</html>
