<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Shared Element Transition</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- LIST PAGE -->
    <section class="page page-list active" id="listPage">
        <h1>Projects</h1>

        <div class="card" id="projectCard">
            <img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200" alt="Project" />

            <div class="card-content">
                <h2>EcoTrace</h2>
                <p>Carbon footprint tracking platform.</p>
            </div>
        </div>
    </section>

    <!-- DETAIL PAGE -->
    <section class="page page-detail" id="detailPage">
        <button class="back-btn" id="backBtn">
            ← Back
        </button>

        <div class="detail-content">
            <h1>EcoTrace</h1>

            <p>
                EcoTrace helps users monitor, analyze and reduce
                their carbon footprint through interactive insights,
                recommendations and sustainability goals.
            </p>
        </div>
    </section>

    <div id="sharedElement"></div>

    <script>
        const card = document.getElementById("projectCard");
        const listPage = document.getElementById("listPage");
        const detailPage = document.getElementById("detailPage");
        const shared = document.getElementById("sharedElement");
        const backBtn = document.getElementById("backBtn");

        card.addEventListener("click", () => {

            const rect = card.getBoundingClientRect();

            shared.style.display = "block";
            shared.style.left = rect.left + "px";
            shared.style.top = rect.top + "px";
            shared.style.width = rect.width + "px";
            shared.style.height = rect.height + "px";

            shared.innerHTML = card.innerHTML;

            requestAnimationFrame(() => {
                shared.classList.add("expand");
            });

            setTimeout(() => {
                listPage.classList.remove("active");
                detailPage.classList.add("active");

                shared.style.display = "none";
                shared.classList.remove("expand");
            }, 700);
        });

        backBtn.addEventListener("click", () => {
            detailPage.classList.remove("active");
            listPage.classList.add("active");
        });
    </script>

</body>

</html>
