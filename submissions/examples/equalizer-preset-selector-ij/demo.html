<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equalizer Preset Selector - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Equalizer Preset</h1>
    <div class="eq-visualizer">
      <div class="eq-bar" style="height:30%"></div>
      <div class="eq-bar" style="height:60%"></div>
      <div class="eq-bar" style="height:90%"></div>
      <div class="eq-bar" style="height:50%"></div>
      <div class="eq-bar" style="height:80%"></div>
      <div class="eq-bar" style="height:40%"></div>
    </div>
    <div class="preset-group" id="presetGroup">
      <button class="preset-btn active" data-preset="flat">Flat</button>
      <button class="preset-btn" data-preset="rock">Rock</button>
      <button class="preset-btn" data-preset="pop">Pop</button>
      <button class="preset-btn" data-preset="jazz">Jazz</button>
      <button class="preset-btn" data-preset="classical">Classical</button>
    </div>
    <p class="description">Click a preset to select it. The active button gets an animated glow highlight.</p>
  </div>

  <script>
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
</body>
</html>
