<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Method Risk Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="payment-risk">
    <article class="method verified"><span>Verified</span><h1>Visa ending 4221</h1><p>3DS complete</p></article>
    <article class="method review"><span>Review</span><h2>Bank debit</h2><p>Name mismatch</p></article>
    <article class="method expired"><span>Expired</span><h2>Mastercard 9020</h2><p>Update needed</p></article>
    <article class="method blocked"><span>Blocked</span><h2>Virtual card</h2><p>Risk rule matched</p></article>
  </main>
</body>
</html>
