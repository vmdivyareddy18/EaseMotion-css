<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Local Time Display — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      color: #e2e8f0;
      margin-bottom: 1.25rem;
      font-weight: 500;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .controls input {
      width: 90px;
      padding: 0.3rem 0.5rem;
      border-radius: 0.35rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.8rem;
    }
    .controls input:focus { outline: none; border-color: var(--accent-color, #10b981); }
    .timezone-label {
      margin-top: 0.75rem;
      color: #64748b;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>✦ Live Clock</h2>
    <local-time-display id="demo">
      <span class="tick-dot"></span>
      <span class="time-value" id="timeValue">00:00:00</span>
      <span class="time-label">local</span>
    </local-time-display>
    <div class="timezone-label" id="tzLabel">Loading timezone…</div>
    <div class="controls">
      <label>Text
        <input type="color" id="clockColor" value="#e2e8f0">
      </label>
      <label>Accent
        <input type="color" id="accentColor" value="#10b981">
      </label>
      <label>BG
        <input type="color" id="clockBg" value="#1e293b">
      </label>
    </div>
  </div>
  <script>
    const timeValue = document.getElementById('timeValue');
    const tzLabel = document.getElementById('tzLabel');

    function updateClock() {
      const now = new Date();
      timeValue.textContent = now.toLocaleTimeString('en-US', { hour12: false });
    }

    updateClock();
    setInterval(updateClock, 1000);

    try {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      tzLabel.textContent = `Timezone: ${tz}`;
    } catch { tzLabel.textContent = ''; }

    const el = document.getElementById('demo');
    document.getElementById('clockColor').addEventListener('input', e => {
      el.style.setProperty('--clock-color', e.target.value);
    });
    document.getElementById('accentColor').addEventListener('input', e => {
      el.style.setProperty('--accent-color', e.target.value);
    });
    document.getElementById('clockBg').addEventListener('input', e => {
      el.style.setProperty('--clock-bg', e.target.value);
    });
  </script>
</body>
</html>
