<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto-resize Textarea Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Auto-resize Textarea</h1>
        <p class="subtitle">Grows as you type</p>

        <!-- AUTO-RESIZE TEXTAREA COMPONENT -->
        <div class="textarea-container">
            <div class="textarea-wrapper" id="textareaWrapper">
                <label for="autoTextarea" class="textarea-label">Your message</label>
                <div class="textarea-input-wrapper">
                    <textarea 
                        id="autoTextarea" 
                        class="textarea-input" 
                        placeholder="Type your message here... It will grow as you type!"
                        rows="1"
                    ></textarea>
                    <div class="textarea-resize-handle" id="resizeHandle">
                        <svg viewBox="0 0 24 24" width="16" height="16">
                            <path d="M22 22L2 22 22 2 22 22z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M15 22L22 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <path d="M22 9L9 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                <div class="textarea-footer">
                    <span class="textarea-stats" id="textareaStats">
                        <span class="stat-item">
                            <span class="stat-label">Characters:</span>
                            <span class="stat-value" id="charCount">0</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-label">Words:</span>
                            <span class="stat-value" id="wordCount">0</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-label">Lines:</span>
                            <span class="stat-value" id="lineCount">1</span>
                        </span>
                    </span>
                    <span class="textarea-status" id="textareaStatus">Ready</span>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="setContentBtn">Set Content</button>
            <button class="demo-btn" id="resetBtn">Reset</button>
            <button class="demo-btn" id="toggleMinHeight">Toggle Min Height</button>
            <button class="demo-btn" id="toggleMaxHeight">Toggle Max Height</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">Height:</span>
            <span class="status-value" id="heightValue">40px</span>
            <span class="status-label">Rows:</span>
            <span class="status-value" id="rowsValue">1</span>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const textarea = document.getElementById('autoTextarea');
            const wrapper = document.getElementById('textareaWrapper');
            const charCount = document.getElementById('charCount');
            const wordCount = document.getElementById('wordCount');
            const lineCount = document.getElementById('lineCount');
            const textareaStatus = document.getElementById('textareaStatus');
            const heightValue = document.getElementById('heightValue');
            const rowsValue = document.getElementById('rowsValue');
            const resizeHandle = document.getElementById('resizeHandle');
            const setContentBtn = document.getElementById('setContentBtn');
            const resetBtn = document.getElementById('resetBtn');
            const toggleMinHeightBtn = document.getElementById('toggleMinHeight');
            const toggleMaxHeightBtn = document.getElementById('toggleMaxHeight');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                minRows: 1,
                maxRows: 10,
                minHeight: 40, // px
                maxHeight: 400, // px
                lineHeight: 24, // px
                padding: 20, // px (top + bottom)
                onResize: function(height, rows) {
                    console.log(`📏 Height: ${height}px, Rows: ${rows}`);
                },
                onUpdate: function(stats) {
                    console.log(`📝 ${stats.characters} chars, ${stats.words} words, ${stats.lines} lines`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentMinHeight = CONFIG.minHeight;
            let currentMaxHeight = CONFIG.maxHeight;
            let isMinHeightToggled = false;
            let isMaxHeightToggled = false;

            // ============================================
            // HELPERS
            // ============================================
            function getTextStats(text) {
                const characters = text.length;
                const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
                const lines = text === '' ? 1 : text.split('\n').length;
                return { characters, words, lines };
            }

            function getTextareaHeight() {
                return textarea.scrollHeight;
            }

            function getTextareaRows() {
                const lines = textarea.value.split('\n').length;
                return Math.min(Math.max(lines, CONFIG.minRows), CONFIG.maxRows);
            }

            // ============================================
            // CORE RESIZE FUNCTION
            // ============================================
            function resizeTextarea() {
                // Reset height to auto to get correct scrollHeight
                textarea.style.height = 'auto';
                
                // Calculate new height
                const scrollHeight = textarea.scrollHeight;
                const minHeight = currentMinHeight;
                const maxHeight = currentMaxHeight;
                
                // Clamp height
                let newHeight = Math.min(Math.max(scrollHeight, minHeight), maxHeight);
                
                // Apply new height
                textarea.style.height = newHeight + 'px';
                
                // Update stats
                const stats = getTextStats(textarea.value);
                charCount.textContent = stats.characters;
                wordCount.textContent = stats.words;
                lineCount.textContent = stats.lines;
                
                // Update status
                const rows = getTextareaRows();
                if (stats.characters === 0) {
                    textareaStatus.textContent = 'Empty';
                    textareaStatus.style.color = '#6b7280';
                } else if (newHeight >= maxHeight) {
                    textareaStatus.textContent = '⚠️ Max height reached';
                    textareaStatus.style.color = '#f59e0b';
                } else {
                    textareaStatus.textContent = '✅ Good';
                    textareaStatus.style.color = '#34c759';
                }
                
                // Update display
                heightValue.textContent = Math.round(newHeight) + 'px';
                rowsValue.textContent = rows;
                
                // Trigger callbacks
                CONFIG.onResize(newHeight, rows);
                CONFIG.onUpdate(stats);
            }

            // ============================================
            // MANUAL RESIZE (drag handle)
            // ============================================
            let isDragging = false;
            let startY = 0;
            let startHeight = 0;

            resizeHandle.addEventListener('mousedown', function(e) {
                e.preventDefault();
                isDragging = true;
                startY = e.clientY;
                startHeight = textarea.offsetHeight;
                document.body.style.cursor = 'ns-resize';
                textarea.style.userSelect = 'none';
                resizeHandle.style.background = 'rgba(79, 172, 254, 0.15)';
            });

            document.addEventListener('mousemove', function(e) {
                if (!isDragging) return;
                const deltaY = e.clientY - startY;
                const newHeight = Math.min(
                    Math.max(startHeight + deltaY, currentMinHeight),
                    currentMaxHeight
                );
                textarea.style.height = newHeight + 'px';
                textarea.style.overflow = newHeight >= currentMaxHeight ? 'auto' : 'hidden';
                // Update stats display
                heightValue.textContent = Math.round(newHeight) + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (isDragging) {
                    isDragging = false;
                    document.body.style.cursor = '';
                    textarea.style.userSelect = '';
                    resizeHandle.style.background = 'transparent';
                    // Recalculate based on content
                    resizeTextarea();
                }
            });

            // Touch support for mobile
            resizeHandle.addEventListener('touchstart', function(e) {
                e.preventDefault();
                const touch = e.touches[0];
                isDragging = true;
                startY = touch.clientY;
                startHeight = textarea.offsetHeight;
                resizeHandle.style.background = 'rgba(79, 172, 254, 0.15)';
            }, { passive: false });

            document.addEventListener('touchmove', function(e) {
                if (!isDragging) return;
                const touch = e.touches[0];
                const deltaY = touch.clientY - startY;
                const newHeight = Math.min(
                    Math.max(startHeight + deltaY, currentMinHeight),
                    currentMaxHeight
                );
                textarea.style.height = newHeight + 'px';
                textarea.style.overflow = newHeight >= currentMaxHeight ? 'auto' : 'hidden';
                heightValue.textContent = Math.round(newHeight) + 'px';
            }, { passive: false });

            document.addEventListener('touchend', function() {
                if (isDragging) {
                    isDragging = false;
                    resizeHandle.style.background = 'transparent';
                    resizeTextarea();
                }
            });

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Auto-resize on input
            textarea.addEventListener('input', resizeTextarea);

            // Focus/Blur effects
            textarea.addEventListener('focus', function() {
                wrapper.classList.add('focused');
            });

            textarea.addEventListener('blur', function() {
                wrapper.classList.remove('focused');
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            const sampleTexts = [
                'Hello world!',
                'This is a longer message that will make the textarea grow to multiple lines.',
                'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.',
                'Line 1\nLine 2\nLine 3\nLine 4\nLine 5\nLine 6\nLine 7\nLine 8\nLine 9\nLine 10\nLine 11\nLine 12'
            ];
            let sampleIndex = 0;

            setContentBtn.addEventListener('click', function() {
                textarea.value = sampleTexts[sampleIndex];
                sampleIndex = (sampleIndex + 1) % sampleTexts.length;
                resizeTextarea();
                textarea.focus();
            });

            resetBtn.addEventListener('click', function() {
                textarea.value = '';
                resizeTextarea();
                textarea.focus();
            });

            toggleMinHeightBtn.addEventListener('click', function() {
                isMinHeightToggled = !isMinHeightToggled;
                currentMinHeight = isMinHeightToggled ? 80 : CONFIG.minHeight;
                toggleMinHeightBtn.textContent = isMinHeightToggled ? 'Reset Min Height' : 'Toggle Min Height';
                toggleMinHeightBtn.style.color = isMinHeightToggled ? '#ff3b30' : '#f59e0b';
                resizeTextarea();
            });

            toggleMaxHeightBtn.addEventListener('click', function() {
                isMaxHeightToggled = !isMaxHeightToggled;
                currentMaxHeight = isMaxHeightToggled ? 200 : CONFIG.maxHeight;
                toggleMaxHeightBtn.textContent = isMaxHeightToggled ? 'Reset Max Height' : 'Toggle Max Height';
                toggleMaxHeightBtn.style.color = isMaxHeightToggled ? '#ff3b30' : '#f59e0b';
                textarea.style.overflow = isMaxHeightToggled ? 'auto' : 'hidden';
                resizeTextarea();
            });

            // ============================================
            // KEYBOARD ACCESSIBILITY
            // ============================================
            textarea.addEventListener('keydown', function(e) {
                // Ctrl+Enter to submit (demo)
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    textareaStatus.textContent = '📨 Submitted!';
                    textareaStatus.style.color = '#4facfe';
                    setTimeout(() => {
                        resizeTextarea();
                    }, 2000);
                }
                // Tab to indent
                if (e.key === 'Tab' && !e.shiftKey) {
                    e.preventDefault();
                    const start = this.selectionStart;
                    const end = this.selectionEnd;
                    this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
                    this.selectionStart = this.selectionEnd = start + 2;
                    resizeTextarea();
                }
            });

            // ============================================
            // WINDOW RESIZE HANDLER
            // ============================================
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(resizeTextarea, 100);
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.AutoResizeTextarea = {
                resize: resizeTextarea,
                setContent: (text) => {
                    textarea.value = text;
                    resizeTextarea();
                },
                getContent: () => textarea.value,
                getStats: () => getTextStats(textarea.value),
                getHeight: () => textarea.offsetHeight,
                getRows: () => getTextareaRows(),
                reset: () => {
                    textarea.value = '';
                    resizeTextarea();
                },
                setMinHeight: (height) => {
                    currentMinHeight = height;
                    resizeTextarea();
                },
                setMaxHeight: (height) => {
                    currentMaxHeight = height;
                    textarea.style.overflow = 'auto';
                    resizeTextarea();
                },
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.minHeight) currentMinHeight = config.minHeight;
                    if (config.maxHeight) currentMaxHeight = config.maxHeight;
                    resizeTextarea();
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial height
            textarea.style.overflow = 'hidden';
            resizeTextarea();

            console.log('✅ Auto-resize Textarea initialized!');
            console.log('📖 API: window.AutoResizeTextarea');
            console.log('📖 Usage:');
            console.log('  - Type to see the textarea grow');
            console.log('  - Drag the bottom-right corner to resize manually');
            console.log('  - Use demo controls to test different scenarios');
            console.log('  - Keyboard shortcuts: Ctrl+Enter to submit, Tab to indent');

        })();
    </script>
</body>
</html>
