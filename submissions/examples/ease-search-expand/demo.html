<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expandable Search - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Expandable Search</h1>
      <p>A pure CSS search bar that expands on click and automatically collapses on blur (if empty).</p>
    </header>

    <main class="demo-grid">
      <!-- Standard Search -->
      <section class="demo-card">
        <h2>Click the icon to expand</h2>
        
        <div class="search-demo-container">
          
          <div class="ease-search-expand">
            <label for="search-1" class="ease-search-icon" aria-label="Search">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </label>
            <input type="text" id="search-1" class="ease-search-input" placeholder="Search for anything..." />
          </div>

        </div>
        
      </section>

      <!-- Alternate Variant (Darker background) -->
      <section class="demo-card">
        <h2>Nav Bar Integration Example</h2>
        
        <div class="search-demo-container fake-navbar">
          <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
          </div>

          <div class="ease-search-expand">
            <label for="search-2" class="ease-search-icon" aria-label="Search">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </label>
            <input type="text" id="search-2" class="ease-search-input" placeholder="Search..." />
          </div>
        </div>
        
      </section>
    </main>
  </div>
</body>
</html>
