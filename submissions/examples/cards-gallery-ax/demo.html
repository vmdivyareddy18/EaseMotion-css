<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards Gallery – EaseMotion CSS</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-flex-col ease-items-center ease-justify-center ease-py-12 ease-px-4">

  <h1 class="ease-text-4xl ease-font-bold ease-mb-4 ease-fade-in">Cards Gallery</h1>
  <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
    Hover over each card to see its unique animation.
  </p>

  <div class="card-grid">
    <!-- Lift Card -->
    <div class="card card-lift ease-card ease-p-6 ease-text-center ease-bg-white ease-shadow-md">
      <div class="ease-text-4xl ease-mb-4">🚀</div>
      <h3 class="ease-text-xl ease-font-semibold ease-mb-2">Lift</h3>
      <p class="ease-text-sm ease-text-gray-500">Translates upward on hover.</p>
    </div>

    <!-- Glow Card -->
    <div class="card card-glow ease-card ease-p-6 ease-text-center ease-bg-white ease-shadow-md">
      <div class="ease-text-4xl ease-mb-4">✨</div>
      <h3 class="ease-text-xl ease-font-semibold ease-mb-2">Glow</h3>
      <p class="ease-text-sm ease-text-gray-500">Adds a glowing outline.</p>
    </div>

    <!-- Flip Card -->
    <div class="card card-flip ease-card ease-p-6 ease-text-center ease-bg-white ease-shadow-md">
      <div class="ease-text-4xl ease-mb-4">🔄</div>
      <h3 class="ease-text-xl ease-font-semibold ease-mb-2">Flip</h3>
      <p class="ease-text-sm ease-text-gray-500">Rotates on Y axis.</p>
    </div>

    <!-- Pulse Card -->
    <div class="card card-pulse ease-card ease-p-6 ease-text-center ease-bg-white ease-shadow-md">
      <div class="ease-text-4xl ease-mb-4">💓</div>
      <h3 class="ease-text-xl ease-font-semibold ease-mb-2">Pulse</h3>
      <p class="ease-text-sm ease-text-gray-500">Scales gently in and out.</p>
    </div>

    <!-- Bounce Card -->
    <div class="card card-bounce ease-card ease-p-6 ease-text-center ease-bg-white ease-shadow-md">
      <div class="ease-text-4xl ease-mb-4">🏀</div>
      <h3 class="ease-text-xl ease-font-semibold ease-mb-2">Bounce</h3>
      <p class="ease-text-sm ease-text-gray-500">Bounces vertically.</p>
    </div>
  </div>

  <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
    Built with EaseMotion CSS — no custom keyframes needed.
  </p>

</body>
</html>
