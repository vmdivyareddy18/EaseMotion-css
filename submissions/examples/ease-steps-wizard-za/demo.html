<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steps Wizard - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sw-header"><h1>CSS Steps Wizard</h1><p>Multi-step progress wizard with numbered steps, connectors, and completion states</p></header>
<section class="sw-section"><h2>Wizard Progress</h2><div class="sw-wizard"><div class="sw-steps"><div class="sw-step sw-complete"><div class="sw-circle">✓</div><div class="sw-label">Cart</div></div><div class="sw-connector sw-complete"></div><div class="sw-step sw-complete"><div class="sw-circle">✓</div><div class="sw-label">Shipping</div></div><div class="sw-connector sw-complete"></div><div class="sw-step sw-active"><div class="sw-circle">3</div><div class="sw-label">Payment</div></div><div class="sw-connector"></div><div class="sw-step"><div class="sw-circle">4</div><div class="sw-label">Review</div></div><div class="sw-connector"></div><div class="sw-step"><div class="sw-circle">5</div><div class="sw-label">Confirm</div></div></div><div class="sw-content"><h3>Payment Information</h3><p>Step 3 of 5. Enter your payment details to continue.</p><div class="sw-form"><div class="sw-field"><label>Card Number</label><input type="text" placeholder="1234 5678 9012 3456"></div><div class="sw-row"><div class="sw-field"><label>Expiry</label><input type="text" placeholder="MM/YY"></div><div class="sw-field"><label>CVV</label><input type="text" placeholder="123"></div></div></div></div><div class="sw-actions"><button class="sw-btn sw-prev">← Back</button><button class="sw-btn sw-next">Continue →</button></div></div></section>
</body>
</html>
