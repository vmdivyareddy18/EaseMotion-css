<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Animated Skills Progress Bars — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      background: #0f172a;
      color: #f5f7fa;
      font-family: system-ui, sans-serif;
    }
    .spacer {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #64748b;
    }
    .demo-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }
  </style>
</head>
<body>

  <div class="spacer">Scroll down ↓ to reveal the animated skill bars</div>

  <div class="demo-wrap">
    <div class="skills-container">
      <div class="skill-bar">
        <span class="skill-label">HTML/CSS</span>
        <div class="skill-track">
          <div class="skill-fill" style="--fill-scale: 0.9"></div>
        </div>
        <span class="skill-percent">90%</span>
      </div>
      <div class="skill-bar">
        <span class="skill-label">JavaScript</span>
        <div class="skill-track">
          <div class="skill-fill" style="--fill-scale: 0.75"></div>
        </div>
        <span class="skill-percent">75%</span>
      </div>
      <div class="skill-bar">
        <span class="skill-label">React</span>
        <div class="skill-track">
          <div class="skill-fill" style="--fill-scale: 0.82"></div>
        </div>
        <span class="skill-percent">82%</span>
      </div>
      <div class="skill-bar">
        <span class="skill-label">Design</span>
        <div class="skill-track">
          <div class="skill-fill" style="--fill-scale: 0.65"></div>
        </div>
        <span class="skill-percent">65%</span>
      </div>
    </div>
  </div>

  <script src="skills-reveal.js"></script>
</body>
</html>
