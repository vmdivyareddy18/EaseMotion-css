<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Toggle Switch - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>iOS-Style Toggle Switch</h2>
        <p>Click and hold to see the stretch effect!</p>
        
        <div class="toggle-row-qn">
            <span>Wi-Fi</span>
            <label class="switch-qn">
                <input type="checkbox" class="switch-input-qn" checked>
                <span class="switch-slider-qn"></span>
            </label>
        </div>

        <div class="toggle-row-qn">
            <span>Bluetooth</span>
            <label class="switch-qn">
                <input type="checkbox" class="switch-input-qn">
                <span class="switch-slider-qn"></span>
            </label>
        </div>
    </div>
</body>
</html>
