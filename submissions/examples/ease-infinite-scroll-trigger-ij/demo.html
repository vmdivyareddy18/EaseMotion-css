<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Scroll Trigger - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Infinite Scroll</h1>
    <p class="desc">Scroll to bottom — animated load indicator appears</p>
    <div class="feed" id="feed">
      <div class="feed-item" style="--fi-delay: 0s;">Item 1</div>
      <div class="feed-item" style="--fi-delay: 0.05s;">Item 2</div>
      <div class="feed-item" style="--fi-delay: 0.1s;">Item 3</div>
      <div class="feed-item" style="--fi-delay: 0.15s;">Item 4</div>
      <div class="feed-item" style="--fi-delay: 0.2s;">Item 5</div>
      <div class="feed-item" style="--fi-delay: 0.25s;">Item 6</div>
      <div class="feed-item" style="--fi-delay: 0.3s;">Item 7</div>
      <div class="feed-item" style="--fi-delay: 0.35s;">Item 8</div>
    </div>
    <div class="load-more" id="loadMore">
      <div class="spinner-ring"></div>
      <span>Loading more items...</span>
    </div>
  </div>
  <script>
    const feed = document.getElementById('feed');
    const loadMore = document.getElementById('loadMore');
    let isLoading = false;
    let itemCount = 8;

    function loadItems() {
      if (isLoading) return;
      isLoading = true;
      loadMore.classList.add('loading');

      setTimeout(() => {
        for (let i = 0; i < 4; i++) {
          itemCount++;
          const item = document.createElement('div');
          item.className = 'feed-item';
          item.textContent = `Item ${itemCount}`;
          item.style.setProperty('--fi-delay', '0s');
          feed.appendChild(item);
        }
        isLoading = false;
        loadMore.classList.remove('loading');
      }, 1200);
    }

    const observer = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) loadItems();
    }, { rootMargin: '100px' });

    observer.observe(loadMore);
  </script>
</body>
</html>
