<!DOCTYPE html>
<html>
<head>
  <title>Toast Notification</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast success">
  <p>✔ Success! Your action was completed.</p>
</div>

<div class="toast error">

</div>

<div class="toast info">

</div>

</body>
</html>
