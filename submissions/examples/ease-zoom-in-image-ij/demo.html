<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom In Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="zii-container">
    <h1>Zoom In Image</h1>
    <div class="zii-grid">
      <div class="zii-card" data-full="https://picsum.photos/seed/1/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/1/400/300" alt="Mountain landscape">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>Mountain View</h3>
              <p>Serene alpine landscape</p>
            </div>
          </div>
        </div>
      </div>
      <div class="zii-card" data-full="https://picsum.photos/seed/2/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/2/400/300" alt="Ocean sunset">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>Ocean Sunset</h3>
              <p>Golden hour over the sea</p>
            </div>
          </div>
        </div>
      </div>
      <div class="zii-card" data-full="https://picsum.photos/seed/3/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/3/400/300" alt="Forest path">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>Forest Path</h3>
              <p>Misty woodland trail</p>
            </div>
          </div>
        </div>
      </div>
      <div class="zii-card" data-full="https://picsum.photos/seed/4/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/4/400/300" alt="City skyline">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>City Skyline</h3>
              <p>Urban lights at dusk</p>
            </div>
          </div>
        </div>
      </div>
      <div class="zii-card" data-full="https://picsum.photos/seed/5/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/5/400/300" alt="Desert dunes">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>Desert Dunes</h3>
              <p>Golden sand formations</p>
            </div>
          </div>
        </div>
      </div>
      <div class="zii-card" data-full="https://picsum.photos/seed/6/800/600">
        <div class="zii-img-wrap">
          <img src="https://picsum.photos/seed/6/400/300" alt="Northern lights">
          <div class="zii-overlay">
            <div class="zii-info">
              <h3>Northern Lights</h3>
              <p>Aurora borealis display</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="zii-modal" id="zoomModal">
    <span class="zii-modal-close">&times;</span>
    <img class="zii-modal-img" id="modalImg" src="" alt="Full size">
  </div>

  <script>
    const cards = document.querySelectorAll('.zii-card');
    const modal = document.getElementById('zoomModal');
    const modalImg = document.getElementById('modalImg');
    const closeBtn = document.querySelector('.zii-modal-close');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        const full = card.dataset.full;
        modalImg.src = full;
        modal.classList.add('open');
      });
    });

    function closeModal() {
      modal.classList.remove('open');
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
