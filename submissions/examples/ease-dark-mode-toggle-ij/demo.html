<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Toggle - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <span class="label-text">Theme Toggle</span>
    <label class="toggle-track" id="toggleTrack">
      <input type="checkbox" class="toggle-input" id="toggleInput">
      <div class="toggle-thumb"></div>
    </label>
    <span class="state-indicator" id="stateIndicator">Light Mode</span>
  </div>

  <script>
    const track = document.getElementById('toggleTrack');
    const input = document.getElementById('toggleInput');
    const indicator = document.getElementById('stateIndicator');

    input.addEventListener('change', () => {
      track.classList.toggle('active');
      indicator.classList.toggle('active');
      indicator.textContent = input.checked ? 'Dark Mode' : 'Light Mode';
      document.body.style.background = input.checked ? '#0b1120' : '#0f172a';
    });
  </script>
</body>
</html>
