<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Scale Hover Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Marketing UI

</div>

<h1>

Scale Hover Tooltip

</h1>

<p>

A vibrant tooltip interaction
designed for marketing landing
pages, product launches and
conversion-focused experiences.

</p>

<div class="tooltip-wrapper">

<button

class="trigger"

aria-describedby="tooltip"

>

Launch Campaign

</button>

<div

class="tooltip"

id="tooltip"

role="tooltip"

>

<span class="tag">

New Release

</span>

<h3>

Boost Engagement

</h3>

<p>

Scale-hover interaction with
marketing inspired gradients
and smooth transitions.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
