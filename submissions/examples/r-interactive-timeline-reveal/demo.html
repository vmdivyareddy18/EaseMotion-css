<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Timeline Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="timeline">
        <div class="timeline-item left">
            <div class="timeline-content">
                <h3>Project Started</h3>
                <p>Initial planning and research phase.</p>
            </div>
        </div>

        <div class="timeline-item right">
            <div class="timeline-content">
                <h3>Design Complete</h3>
                <p>Wireframes and UI concepts finalized.</p>
            </div>
        </div>

        <div class="timeline-item left">
            <div class="timeline-content">
                <h3>Development Phase</h3>
                <p>Core features implemented and tested.</p>
            </div>
        </div>

        <div class="timeline-item right">
            <div class="timeline-content">
                <h3>Public Launch</h3>
                <p>Application released to users.</p>
            </div>
        </div>
    </div>
</body>
</html>
