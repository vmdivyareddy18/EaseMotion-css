<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Portfolio Gallery Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="gallery-container">
        <header class="gallery-intro">
            <h1>Selected Work</h1>
            <p>A showcase of spatial concepts and digital typography layouts.</p>
        </header>

        <div class="gallery-grid">
            <!-- Item 1 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Abstract Formulations digital art project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=1" alt="Vibrant abstract colorful curves intersecting against a dark background">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Abstract Formulations</h3>
                        <span class="category-tag">Digital Art</span>
                    </figcaption>
                </figure>
            </a>

            <!-- Item 2 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Industrial Minimalism architecture project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=2" alt="Minimalist industrial building with raw concrete finishes and architectural structural contours">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Industrial Minimalism</h3>
                        <span class="category-tag">Architecture</span>
                    </figcaption>
                </figure>
            </a>

            <!-- Item 3 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Warm Japandi Spaces interior design project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=3" alt="Modern minimalist interior showing warm timber tones and balanced lighting layout">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Warm Japandi Spaces</h3>
                        <span class="category-tag">Interior</span>
                    </figcaption>
                </figure>
            </a>

            <!-- Item 4 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Brutalist Typography graphic design project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=4" alt="Brutalist graphic poster layout featuring bold editorial typography frames">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Brutalist Typography</h3>
                        <span class="category-tag">Graphic Design</span>
                    </figcaption>
                </figure>
            </a>

            <!-- Item 5 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Monochrome Facades photography project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=5" alt="High contrast black and white urban facade cast in deep dramatic shadows">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Monochrome Facades</h3>
                        <span class="category-tag">Photography</span>
                    </figcaption>
                </figure>
            </a>

            <!-- Item 6 -->
            <a href="javascript:void(0)" class="gallery-card ease-neumorphic" aria-label="Open case study for Biophilic Workspaces sustainable design project">
                <figure>
                    <div class="image-wrapper">
                        <img src="https://picsum.photos/600/400?random=6" alt="Modern commercial office space integrated with green biophilic living plant installations">
                        <div class="gallery-overlay">
                            <span class="view-tag" aria-hidden="true">View Case Study</span>
                        </div>
                    </div>
                    <figcaption>
                        <h3>Biophilic Workspaces</h3>
                        <span class="category-tag">Sustainable Design</span>
                    </figcaption>
                </figure>
            </a>
        </div>
    </main>

</body>
</html>
