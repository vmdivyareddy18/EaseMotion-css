<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Fill Mode Utilities | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="fill-mode-wrapper">
    <header class="showcase-header">
      <h1>Animation Fill Mode Utilities</h1>
      <p>A proposal for <code>core/utilities.css</code> to add <code>animation-fill-mode</code> classes.</p>
    </header>

    <div class="demo-area">
      <div class="track-container">
        
        <!-- Forwards -->
        <div class="track-label"><code>.em-fill-forwards</code> (Stays at end state)</div>
        <div class="track">
          <div class="box fill-forwards"></div>
        </div>
        
        <!-- Backwards -->
        <div class="track-label"><code>.em-fill-backwards</code> (Applies start state during delay)</div>
        <div class="track">
          <div class="box fill-backwards"></div>
        </div>
        
        <!-- Both -->
        <div class="track-label"><code>.em-fill-both</code> (Applies both start and end states)</div>
        <div class="track">
          <div class="box fill-both"></div>
        </div>
        
        <!-- None -->
        <div class="track-label"><code>.em-fill-none</code> (Default behavior)</div>
        <div class="track">
          <div class="box fill-none"></div>
        </div>
        
      </div>
      
      <div class="controls">
        <button class="trigger-btn" onclick="triggerAnimations()">Run Animations</button>
      </div>
    </div>
    
  </div>

  <script>
    function triggerAnimations() {
      const boxes = document.querySelectorAll('.box');
      boxes.forEach(box => {
        // Remove and re-add class to restart animation
        box.classList.remove('animate');
        void box.offsetWidth; // trigger reflow
        box.classList.add('animate');
      });
    }
  </script>
</body>
</html>
