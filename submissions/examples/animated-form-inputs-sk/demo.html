<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Form Inputs - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Animated Form Inputs</h1>
    <p>Reusable input fields featuring floating labels and smooth focus animations without JavaScript.</p>
    
    <div class="card pulse-hover">
      <form class="demo-form" onsubmit="event.preventDefault();">
        
        <!-- 1. Floating Label with Bottom Border -->
        <div class="form-group floating-label-group">
          <!-- MUST have placeholder=" " for the CSS trick to work -->
          <input type="text" id="username" class="ease-input input-line" placeholder=" " required />
          <label for="username" class="floating-label">Username</label>
          <div class="input-line-bar"></div>
        </div>

        <!-- 2. Outline Input with Floating Label -->
        <div class="form-group floating-label-group">
          <input type="email" id="email" class="ease-input input-outline" placeholder=" " required />
          <label for="email" class="floating-label outline-label">Email Address</label>
        </div>

        <!-- 3. Validation State (Success) -->
        <div class="form-group floating-label-group is-success">
          <input type="password" id="password" class="ease-input input-outline" placeholder=" " value="hunter2" required />
          <label for="password" class="floating-label outline-label">Password</label>
          <!-- Animated checkmark -->
          <svg class="validation-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>

        <button type="submit" class="ease-btn ease-btn-primary pulse-hover submit-btn">Create Account</button>
      </form>
    </div>
  </main>
</body>
</html>
