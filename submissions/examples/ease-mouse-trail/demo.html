<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Interactive Mouse Trail Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; user-select: none; z-index: 1;">
    <h2 style="color: #ffffff; font-weight: 800; font-size: 1.8rem; margin: 0 0 0.5rem 0; letter-spacing: -0.02em;">Fluid Mouse Trail</h2>
    <p style="margin: 0; font-size: 0.95rem;">Move your cursor fluidly across the viewport canvas window to observe the particle trail.</p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let lastMoveTime = 0;

      window.addEventListener('mousemove', (e) => {
        const now = Date.now();
        // Throttle check: creates a beautiful uniform distance spacing gap between trails (every 16ms)
        if (now - lastMoveTime < 16) return; 
        lastMoveTime = now;

        createParticle(e.clientX, e.clientY);
      });

      function createParticle(x, y) {
        const particle = document.createElement('div');
        particle.className = 'ease-trail-particle';

        // Pin point coordinates map placement offsets
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;

        document.body.appendChild(particle);

        // Auto garbage collection: removes the DOM node precisely as the 0.6s CSS decay finishes
        setTimeout(() => {
          particle.remove();
        }, 600);
      }
    });
  </script>

</body>
</html>
