<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Shift Context Menu Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="ease-container">
        <h1 class="ease-slide-up">🎨 Color Shift Context Menu</h1>
        <p class="ease-slide-up ease-delay-100">
            Right-click anywhere or hover the trigger area
        </p>

        <!-- Trigger Area -->
        <div class="ease-trigger-area" id="triggerArea">
            <p>Right-click or long-press here</p>
            <p class="ease-hint">↓ The menu will appear below ↓</p>
        </div>

        <!-- Context Menu -->
        <div class="ease-context-menu" id="contextMenu">
            <ul class="ease-menu-list">
                <li class="ease-menu-item" data-action="copy">
                    <span class="ease-menu-icon">📋</span> Copy
                    <span class="ease-shortcut">Ctrl+C</span>
                </li>
                <li class="ease-menu-item" data-action="paste">
                    <span class="ease-menu-icon">📄</span> Paste
                    <span class="ease-shortcut">Ctrl+V</span>
                </li>
                <li class="ease-menu-item" data-action="rename">
                    <span class="ease-menu-icon">✏️</span> Rename
                    <span class="ease-shortcut">F2</span>
                </li>
                <li class="ease-menu-divider"></li>
                <li class="ease-menu-item" data-action="delete">
                    <span class="ease-menu-icon">🗑️</span> Delete
                    <span class="ease-shortcut">Del</span>
                </li>
            </ul>
        </div>
    </div>

    <script>
        const trigger = document.getElementById('triggerArea');
        const menu = document.getElementById('contextMenu');

        // Show menu on right-click
        trigger.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            showMenu(e.clientX, e.clientY);
        });

        // Show menu on click (for demo purposes)
        trigger.addEventListener('click', (e) => {
            showMenu(e.clientX, e.clientY);
        });

        // Hide menu on click outside
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== trigger) {
                hideMenu();
            }
        });

        function showMenu(x, y) {
            // Position menu
            menu.style.left = x + 'px';
            menu.style.top = y + 'px';
            
            // Remove hidden class and trigger animation
            menu.classList.remove('ease-menu-hidden');
            menu.style.display = 'block';
            
            // Force reflow for animation
            void menu.offsetWidth;
            menu.classList.add('ease-menu-visible');
        }

        function hideMenu() {
            menu.classList.remove('ease-menu-visible');
            menu.classList.add('ease-menu-hidden');
            setTimeout(() => {
                menu.style.display = 'none';
            }, 300);
        }

        // Handle menu item clicks
        document.querySelectorAll('.ease-menu-item[data-action]').forEach((item) => {
            item.addEventListener('click', () => {
                const action = item.dataset.action;
                alert(`Action: ${action}`);
                hideMenu();
            });
        });

        // Keyboard support (Escape to close)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideMenu();
        });
    </script>
</body>
</html>
