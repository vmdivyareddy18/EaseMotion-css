<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS - Morph Share Button</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo-container">
    <h1>Morph Share Button</h1>
    <p>Hover over the button to reveal share options.</p>

    <div class="ease-share-wrapper">
      <button class="ease-share-btn" aria-label="Share">
        <span class="share-text">Share</span>

        <div class="share-icons" aria-hidden="true">
          <a href="#" class="icon twitter" title="Twitter">
            <span>T</span>
          </a>

          <a href="#" class="icon facebook" title="Facebook">
            <span>F</span>
          </a>

          <a href="#" class="icon linkedin" title="LinkedIn">
            <span>in</span>
          </a>

          <a href="#" class="icon mail" title="Email">
            <span>@</span>
          </a>
        </div>
      </button>
    </div>

  </main>

</body>
</html>
