<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS field-sizing: content Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>CSS field-sizing: content Demo</h2>
        <p>Type into the fields below to see them resize automatically without JavaScript!</p>
        
        <form>
            <div class="form-group">
                <label for="username">Auto-Expanding Input (Horizontal):</label>
                <input type="text" id="username" placeholder="Type a very long text here...">
            </div>

            <div class="form-group">
                <label for="bio">Auto-Growing Textarea (Vertical):</label>
                <textarea id="bio" placeholder="Press Enter to add new lines and watch it grow vertically..."></textarea>
            </div>
        </form>
    </div>
</body>
</html>
