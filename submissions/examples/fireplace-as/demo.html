<!DOCTYPE html>

  <title>Fireplace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">

      <span class="mantel"></span>
      <div class="firebox">
        <span class="glowbox"></span>
        <span class="flame fo"></span>
        <span class="flame fm"></span>
        <span class="flame fi"></span>
        <span class="logf lg1"></span>
        <span class="logf lg2"></span>
        <span class="sparkf sk1"></span>
        <span class="sparkf sk2"></span>
        <span class="sparkf sk3"></span>
      </div>
      <span class="bricks"></span>
      <span class="jarf jl"></span>
      <span class="jarf jr"></span>
      <span class="clockf"></span>
    </div>
    <span class="rug"></span>
  </div>
