<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Horizontal Roll Popover - Creative Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Creative Portfolio</span>
      <h1>Horizontal Roll Popover</h1>
      <p class="subtitle">Elegant roll animation for portfolios</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="portfolio-btn" aria-label="View portfolio">
          <div class="portfolio-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="portfolio-name">Alex Design</span>
        </button>
        <div class="roll-popover" role="tooltip">
          <div class="roll-header">
            <span class="roll-tag">Featured</span>
            <span class="roll-badge">Top Rated</span>
          </div>
          <div class="roll-items">
            <div class="roll-item" style="--delay: 0s">
              <span class="roll-dot"></span>
              <span>Brand Identity</span>
            </div>
            <div class="roll-item" style="--delay: 0.05s">
              <span class="roll-dot"></span>
              <span>UI/UX Design</span>
            </div>
            <div class="roll-item" style="--delay: 0.1s">
              <span class="roll-dot"></span>
              <span>Print Design</span>
            </div>
          </div>
          <div class="roll-footer">
            <button class="roll-btn">View Profile</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="roll-popover slide" role="tooltip"><p>Slide roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Accordion</button>
          <div class="roll-popover accordion" role="tooltip"><p>Accordion roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Twist</button>
          <div class="roll-popover twist" role="tooltip"><p>Twist roll animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-gold">Gold</button>
          <div class="roll-popover theme-gold" role="tooltip"><p>Gold theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="roll-popover theme-violet" role="tooltip"><p>Violet theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-coral">Coral</button>
          <div class="roll-popover theme-coral" role="tooltip"><p>Coral theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
