<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Mouse Cursor Effect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cursor"></div>

    <section class="container">
        <h1>Animated Mouse Cursor Effect</h1>
        <p>
            Move your mouse around to see the glowing custom cursor animation.
            Hover over the button to experience an interactive scaling effect.
        </p>

        <button class="hover-btn">Hover Me</button>
    </section>

    <script>
        const cursor = document.querySelector(".cursor");
        const button = document.querySelector(".hover-btn");

        document.addEventListener("mousemove", (e) => {
            cursor.style.left = e.clientX + "px";
            cursor.style.top = e.clientY + "px";
        });

        button.addEventListener("mouseenter", () => {
            cursor.classList.add("active");
        });

        button.addEventListener("mouseleave", () => {
            cursor.classList.remove("active");
        });
    </script>

</body>
</html>
