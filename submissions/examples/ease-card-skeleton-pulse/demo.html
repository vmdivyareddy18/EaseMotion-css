<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-card-skeleton-pulse – Pulse Card Skeleton</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-8 ease-text-center ease-fade-in">
      Content Loading...
    </h1>

    <!-- Skeleton card grid -->
    <div class="ease-grid ease-grid-cols-1 ease-md-grid-cols-3 ease-gap-8">
      <!-- Skeleton Card 1 -->
      <div class="skeleton-card ease-card ease-p-4">
        <div class="skeleton-block skeleton-image"></div>
        <div class="skeleton-block skeleton-title"></div>
        <div class="skeleton-block skeleton-text"></div>
        <div class="skeleton-block skeleton-text skeleton-text--short"></div>
        <div class="skeleton-block skeleton-button"></div>
      </div>
      <!-- Skeleton Card 2 -->
      <div class="skeleton-card ease-card ease-p-4">
        <div class="skeleton-block skeleton-image"></div>
        <div class="skeleton-block skeleton-title"></div>
        <div class="skeleton-block skeleton-text"></div>
        <div class="skeleton-block skeleton-text skeleton-text--short"></div>
        <div class="skeleton-block skeleton-button"></div>
      </div>
      <!-- Skeleton Card 3 -->
      <div class="skeleton-card ease-card ease-p-4">
        <div class="skeleton-block skeleton-image"></div>
        <div class="skeleton-block skeleton-title"></div>
        <div class="skeleton-block skeleton-text"></div>
        <div class="skeleton-block skeleton-text skeleton-text--short"></div>
        <div class="skeleton-block skeleton-button"></div>
      </div>
    </div>

    <p class="ease-text-center ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Cards loading — pulse effect
    </p>
  </div>

</body>
</html>
