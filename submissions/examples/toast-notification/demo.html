<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Toast Notification</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; background:#0f172a; font-family:sans-serif;">

  <h2 style="color:white;">Toast Notification Demo</h2>

  <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
    <button onclick="showToast('success', '✓ Changes saved successfully!')" style="padding:10px 20px; background:#16a34a; color:white; border:none; border-radius:8px; cursor:pointer;">Success</button>
    <button onclick="showToast('error', '✕ Something went wrong.')" style="padding:10px 20px; background:#dc2626; color:white; border:none; border-radius:8px; cursor:pointer;">Error</button>
    <button onclick="showToast('warning', '⚠ Please check your input.')" style="padding:10px 20px; background:#d97706; color:white; border:none; border-radius:8px; cursor:pointer;">Warning</button>
    <button onclick="showToast('info', 'ℹ Update available.')" style="padding:10px 20px; background:#2563eb; color:white; border:none; border-radius:8px; cursor:pointer;">Info</button>
  </div>

  <!-- Toast Container -->
  <div class="ease-toast-container ease-toast-top-right" id="toast-container"></div>

  <script>
    function showToast(type, message) {
      const container = document.getElementById('toast-container');

      const toast = document.createElement('div');
      toast.className = `ease-toast ease-toast-${type}`;
      toast.innerHTML = `
        <span>${message}</span>
        <button class="ease-toast-close" onclick="this.parentElement.remove()">✕</button>
      `;

      container.appendChild(toast);

      // auto-dismiss after 3s + fade duration
      setTimeout(() => toast.remove(), 3400);
    }
  </script>

</body>
</html>
