<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Star Rating Demo</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: sans-serif; padding: 40px; background: #111; color: #eee; }
</style>
</head>
<body>
  <div class="star-rating" data-rating="0">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

  <script>
    const rating = document.querySelector('.star-rating');
    const stars = rating.querySelectorAll('.star');
    let selected = 0;

    function paint(count) {
      stars.forEach(s => {
        s.classList.toggle('filled', Number(s.dataset.value) <= count);
      });
    }

    stars.forEach(star => {
      star.addEventListener('mouseenter', () => paint(Number(star.dataset.value)));
      star.addEventListener('click', () => {
        selected = Number(star.dataset.value);
        rating.dataset.rating = selected;
        paint(selected);
      });
    });

    rating.addEventListener('mouseleave', () => paint(selected));
  </script>
</body>
</html>
