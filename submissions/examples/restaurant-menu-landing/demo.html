<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saffron Table</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="ease-container ease-flex ease-items-center ease-justify-between ease-py-4 ease-px-8">
      <div class="ease-text-2xl ease-font-bold ease-fade-in">Saffron Table</div>
      <div class="ease-flex ease-gap-6 ease-text-sm ease-fade-in">
        <a href="#Menu" class="ease-text-hover-glow">Menu</a>
        <a href="#Reservation" class="ease-text-hover-glow">Reservation</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="hero">
    <div class="ease-text-center ease-px-4">
      <h1 class="ease-fade-in ease-text-5xl ease-font-bold ease-mb-4">Saffron Table</h1>
<p class="ease-fade-in ease-delay-100 ease-text-xl ease-mb-8 ease-opacity-90">Mediterranean flavors, timeless tradition</p>
<a href="#menu" class="ease-btn ease-btn-primary ease-btn-lg ease-btn-hover ease-hover-lift">Explore Menu</a>
    </div>
  </section>

  <section id="menu" class="ease-container ease-py-16">
  <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Our Menu</h2>
  <div class="menu-category ease-fade-in"><h3>Appetizers</h3><div class="menu-item"><span>Hummus Bowl</span><span class="price"></span></div><div class="menu-item"><span>Bruschetta</span><span class="price"></span></div><div class="menu-item"><span>Stuffed Grape Leaves</span><span class="price"></span></div></div>
  <div class="menu-category ease-fade-in ease-delay-100"><h3>Mains</h3><div class="menu-item"><span>Grilled Salmon</span><span class="price"></span></div><div class="menu-item"><span>Lamb Tagine</span><span class="price"></span></div><div class="menu-item"><span>Vegetable Paella</span><span class="price"></span></div></div>
  <div class="menu-category ease-fade-in ease-delay-200"><h3>Desserts</h3><div class="menu-item"><span>Baklava</span><span class="price"></span></div><div class="menu-item"><span>Panna Cotta</span><span class="price"></span></div></div>
</section>
<section id="reservation" class="reservation ease-py-16">
  <div class="ease-container">
    <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Make a Reservation</h2>
    <div class="reservation-form"><input type="text" placeholder="Your name" class="ease-fade-in"><input type="email" placeholder="Email" class="ease-fade-in ease-delay-100"><input type="date" class="ease-fade-in ease-delay-200"><select class="ease-fade-in ease-delay-300"><option>2 guests</option><option>4 guests</option><option>6 guests</option></select><button class="ease-btn ease-btn-primary ease-btn-block ease-btn-lg ease-mt-4 ease-hover-lift">Reserve</button></div>
  </div>
</section>

  <footer class="footer">
    <div class="ease-container">
      <p class="ease-text-sm ease-opacity-70">© 2026 Saffron Table.</p>
    </div>
  </footer>
</body>
</html>
