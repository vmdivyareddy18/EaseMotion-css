<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Searchable Filter Tags - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Filter Tags</h1>

    <input type="text" class="search-input" id="searchInput" placeholder="Search tags...">

    <div class="tag-list" id="tagList"></div>

    <div class="active-filters">
      <h3>Active Filters</h3>
      <div class="filter-chips" id="filterChips">
        <span style="color:#555;font-size:0.85rem;">No filters selected</span>
      </div>
    </div>

  </div>

  <script>
    const tags = [
      { label: 'JavaScript', count: 42 },
      { label: 'CSS', count: 38 },
      { label: 'HTML', count: 35 },
      { label: 'React', count: 28 },
      { label: 'Node.js', count: 22 },
      { label: 'Python', count: 19 },
      { label: 'TypeScript', count: 17 },
      { label: 'Vue.js', count: 14 },
      { label: 'Angular', count: 11 },
      { label: 'Sass', count: 9 },
      { label: 'Tailwind', count: 8 },
      { label: 'GraphQL', count: 6 },
    ];

    let selected = new Set();

    const tagList = document.getElementById('tagList');
    const searchInput = document.getElementById('searchInput');
    const filterChips = document.getElementById('filterChips');

    function renderTags(query) {
      const q = query.toLowerCase().trim();
      const filtered = q ? tags.filter(t => t.label.toLowerCase().includes(q)) : tags;

      if (filtered.length === 0) {
        tagList.innerHTML = '<div class="no-match">No tags match your search</div>';
        return;
      }

      tagList.innerHTML = filtered.map(t => {
        const sel = selected.has(t.label) ? 'selected' : '';
        return '<div class="tag-item ' + sel + '" data-tag="' + t.label + '">' +
          '<span class="checkbox">&#10003;</span>' +
          '<span class="tag-label">' + t.label + '</span>' +
          '<span class="tag-count">' + t.count + '</span>' +
        '</div>';
      }).join('');

      document.querySelectorAll('.tag-item').forEach(el => {
        el.addEventListener('click', function () {
          const tag = this.dataset.tag;
          if (selected.has(tag)) {
            selected.delete(tag);
            this.classList.remove('selected');
          } else {
            selected.add(tag);
            this.classList.add('selected');
          }
          renderActiveFilters();
        });
      });
    }

    function renderActiveFilters() {
      if (selected.size === 0) {
        filterChips.innerHTML = '<span style="color:#555;font-size:0.85rem;">No filters selected</span>';
        return;
      }
      filterChips.innerHTML = Array.from(selected).map(tag =>
        '<span class="filter-chip">' + tag +
          '<span class="remove-chip" data-tag="' + tag + '">&times;</span>' +
        '</span>'
      ).join('');

      document.querySelectorAll('.remove-chip').forEach(el => {
        el.addEventListener('click', function (e) {
          e.stopPropagation();
          const tag = this.dataset.tag;
          selected.delete(tag);
          renderActiveFilters();
          renderTags(searchInput.value);
        });
      });
    }

    searchInput.addEventListener('input', function () {
      renderTags(this.value);
    });

    renderTags('');
  </script>

</body>
</html>
