<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Orbit Avatar Ring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="wrapper">

<header>
<h1>Ease Orbit Avatar Ring</h1>
<p>Animated orbit indicators built entirely with CSS.</p>
</header>

<section class="grid">

<article class="card">
<div class="orbit blue">
<div class="avatar">A</div>
</div>
<h2>Alex</h2>
<p>Frontend Engineer</p>
</article>

<article class="card">
<div class="orbit green">
<div class="avatar">S</div>
</div>
<h2>Sarah</h2>
<p>UI Designer</p>
</article>

<article class="card">
<div class="orbit purple">
<div class="avatar">M</div>
</div>
<h2>Michael</h2>
<p>Product Lead</p>
</article>

</section>

</main>

</body>
</html>
