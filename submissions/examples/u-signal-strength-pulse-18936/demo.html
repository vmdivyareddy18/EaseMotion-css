<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Strength Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Signal Strength Pulse</h1>

  <p class="subtitle">
    Simulate weak, medium and strong network signals.
  </p>

  <div class="signal-container">
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
    <div class="signal-bar"></div>
  </div>

  <div class="controls">
    <button onclick="setSignal(2)">Weak Signal</button>
    <button onclick="setSignal(3)">Medium Signal</button>
    <button onclick="setSignal(5)">Strong Signal</button>
  </div>
</div>

<script>
const bars = document.querySelectorAll(".signal-bar");

function setSignal(level) {
  bars.forEach((bar, index) => {
    if (index < level) {
      bar.classList.add("active");
    } else {
      bar.classList.remove("active");
    }
  });
}

setSignal(3);
</script>

</body>
</html>
