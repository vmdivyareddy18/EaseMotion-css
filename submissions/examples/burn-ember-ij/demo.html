<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burn Ember - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Burn Ember</h1>

    <div class="ember-card" id="emberCard">
      <div class="ember-content">
        <div class="ember-icon">
          <div class="flame f1"></div>
          <div class="flame f2"></div>
          <div class="flame f3"></div>
        </div>
        <span class="ember-title">Smoldering</span>
      </div>
      <div class="ember-glows"></div>
      <button class="ember-btn" id="emberBtn">&#128293; Ignite</button>
    </div>

    <div class="variant-row">
      <div class="ember-card sm">
        <div class="ember-content">
          <div class="ember-icon">
            <div class="flame f1 burned"></div>
            <div class="flame f2 burned"></div>
            <div class="flame f3 burned"></div>
          </div>
          <span class="ember-title">Burned Out</span>
        </div>
      </div>
    </div>

    <p class="description">Element edges glow with flickering orange/red ember-like light using box-shadow with irregular timing. Rising ember particles float upward from the bottom edge.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
