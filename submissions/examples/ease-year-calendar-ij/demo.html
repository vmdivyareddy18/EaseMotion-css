<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-year-calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>📅 Year Calendar</h1>
    <div class="animation-wrapper">
      <div class="calendar">
        <div class="calendar-month" style="--i:0">Jan</div>
        <div class="calendar-month" style="--i:1">Feb</div>
        <div class="calendar-month" style="--i:2">Mar</div>
        <div class="calendar-month" style="--i:3">Apr</div>
        <div class="calendar-month" style="--i:4">May</div>
        <div class="calendar-month" style="--i:5">Jun</div>
        <div class="calendar-month" style="--i:6">Jul</div>
        <div class="calendar-month" style="--i:7">Aug</div>
        <div class="calendar-month" style="--i:8">Sep</div>
        <div class="calendar-month" style="--i:9">Oct</div>
        <div class="calendar-month" style="--i:10">Nov</div>
        <div class="calendar-month" style="--i:11">Dec</div>
      </div>
    </div>
    <div class="controls">
      <label>
        Calendar BG
        <input type="color" class="js-color" value="#2d2d44" data-var="--cal-bg" />
      </label>
      <label>
        Month Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--month-color" />
      </label>
      <label>
        Reveal Duration
        <input type="range" class="js-range" min="0.2" max="1.5" step="0.05" value="0.5" data-var="--reveal-duration" />
        <span class="js-range-value">0.5s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
