<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pulse Offline Banner - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Hidden checkbox acts as the toggle to simulate online/offline state natively -->
    <input type="checkbox" id="offline-toggle" class="offline-mock-trigger" checked>

    <div class="banner-container">
        <div class="retro-banner">
            <div class="status-indicator">
                <span class="pulse-dot"></span>
            </div>
            <div class="banner-text">
                <strong>YOU ARE OFFLINE</strong>
                <span>Check your connection. Retro mode engaged.</span>
            </div>
            <label for="offline-toggle" class="retro-btn" role="button">Dismiss</label>
        </div>
    </div>

    <main class="demo-content">
        <h1>Retro Pulse Offline Banner</h1>
        <p>A pure CSS component designed with classic 90s digital interfaces in mind.</p>
        <label for="offline-toggle" class="control-panel-btn">Toggle Offline State</label>
    </main>

</body>
</html>
