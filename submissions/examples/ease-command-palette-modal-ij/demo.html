<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Palette Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="trigger-btn" onclick="togglePalette()">Open Command Palette</button>

  <div class="palette-overlay" id="paletteOverlay" onclick="togglePalette()">
    <div class="palette-modal" id="paletteModal" onclick="event.stopPropagation()">
      <div class="palette-header">
        <input type="text" class="palette-search" placeholder="Type a command..." />
      </div>
      <ul class="palette-items">
        <li class="palette-item" style="--i: 0"><span class="item-icon">&#128269;</span> Search Files</li>
        <li class="palette-item" style="--i: 1"><span class="item-icon">&#9881;</span> Open Settings</li>
        <li class="palette-item" style="--i: 2"><span class="item-icon">&#128200;</span> Toggle Dashboard</li>
        <li class="palette-item" style="--i: 3"><span class="item-icon">&#128451;</span> Run Build</li>
        <li class="palette-item" style="--i: 4"><span class="item-icon">&#128190;</span> Deploy Project</li>
        <li class="palette-item" style="--i: 5"><span class="item-icon">&#128295;</span> Clear Cache</li>
      </ul>
    </div>
  </div>

  <script>
    function togglePalette() {
      const overlay = document.getElementById('paletteOverlay');
      const modal = document.getElementById('paletteModal');
      overlay.classList.toggle('active');
      modal.classList.toggle('active');
    }
  </script>
</body>
</html>
