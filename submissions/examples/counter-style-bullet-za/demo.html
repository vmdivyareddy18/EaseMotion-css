<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Style Bullets</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Custom Counters &amp; Bullets</h1>
  <div class="list-grid">
    <div class="list-card">
      <h2>Arrow Bullets</h2>
      <ul class="arrow-list">
        <li>Getting started</li>
        <li>Installation guide</li>
        <li>Configuration</li>
        <li>Deployment</li>
      </ul>
    </div>
    <div class="list-card">
      <h2>Check Bullets</h2>
      <ul class="check-list">
        <li>Design review</li>
        <li>Code review</li>
        <li>QA testing</li>
        <li>Production release</li>
      </ul>
    </div>
    <div class="list-card">
      <h2>Star Bullets</h2>
      <ul class="star-list">
        <li>Feature requests</li>
        <li>Bug reports</li>
        <li>Documentation</li>
        <li>Community</li>
      </ul>
    </div>
  </div>
</body>
</html>
