<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-recipe-timer-ring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Recipe Timer Ring</h1>
    <p class="subtitle">
        Cooking timer with animated steam effect
    </p>

    <div class="timer-section">

        <div class="timer-card">

            <div class="steam steam1"></div>
            <div class="steam steam2"></div>
            <div class="steam steam3"></div>

            <div class="timer-ring">
                <div class="inner-circle">
                    <span>12:45</span>
                    <small>Remaining</small>
                </div>
            </div>

            <h2>Pasta Cooking</h2>
            <p>Boil until perfectly cooked.</p>

        </div>

    </div>

    <div class="recipe-grid">

        <div class="recipe-card">
            <h3>Soup</h3>
            <div class="mini-ring">75%</div>
        </div>

        <div class="recipe-card">
            <h3>Rice</h3>
            <div class="mini-ring">50%</div>
        </div>

        <div class="recipe-card">
            <h3>Tea</h3>
            <div class="mini-ring">90%</div>
        </div>

    </div>

</div>

</body>
</html>
