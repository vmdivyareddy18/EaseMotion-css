<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Cloud Upload Float</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Cloud Upload Float</h1>

    <p>
      A cloud upload animation designed for storage platforms,
      backups, sync systems, and file management interfaces.
    </p>

    <div class="demo-grid">

      <button class="upload-button">
        <span class="upload-icon">☁️⬆️</span>
      </button>

      <button class="upload-button card-style">
        <span class="upload-icon">☁️⬆️</span>
        <span>Upload Files</span>
      </button>

      <div class="upload-card">
        <h3>Cloud Backup</h3>

        <p>
          Your files are ready to be uploaded securely.
        </p>

        <button class="upload-button small">
          <span class="upload-icon">☁️⬆️</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
