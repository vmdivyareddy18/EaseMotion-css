<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bounce Spinner</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="glass-card">
        <h2>Loading...</h2>
        <p>Please wait while we prepare everything for you.</p>
        <div class="bounce-spinner">
          <span class="dot ease-bounce delay-1"></span>
          <span class="dot ease-bounce delay-2"></span>
          <span class="dot ease-bounce delay-3"></span>
        </div>
      </div>
    </div>
  </body>
</html>
