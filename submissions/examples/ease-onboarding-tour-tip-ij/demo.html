<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding Tour Tip — EaseMotion CSS</title>
  <meta name="description" content="Multi-step onboarding tour tip with scale-and-fade animations, arrow pointers, progress dots, and skip/next/previous controls.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ott-container">
    <header>
      <span class="ott-badge">EaseMotion CSS — Tour Tip</span>
      <h1>Onboarding Tour Tip</h1>
      <p class="ott-desc">
        Interactive product tour with arrow-anchored tooltips, step progression,
        and skip capability.
      </p>
    </header>

    <div class="ott-stage">
      <!-- Simulated UI elements the tour points to -->
      <div class="ott-demo-ui">
        <div class="ott-target" id="ottTarget1">
          <span class="ott-target-icon">&#128230;</span>
          <span class="ott-target-label">Dashboard</span>
        </div>
        <div class="ott-target" id="ottTarget2">
          <span class="ott-target-icon">&#128269;</span>
          <span class="ott-target-label">Search</span>
        </div>
        <div class="ott-target" id="ottTarget3">
          <span class="ott-target-icon">&#9881;</span>
          <span class="ott-target-label">Settings</span>
        </div>
      </div>

      <!-- Tour Tip -->
      <div class="ott-tip" id="ottTip">
        <div class="ott-tip-arrow" id="ottArrow"></div>
        <div class="ott-tip-body">
          <h3 class="ott-tip-title" id="ottTitle"></h3>
          <p class="ott-tip-text" id="ottText"></p>
          <div class="ott-progress-dots" id="ottDots"></div>
          <div class="ott-actions">
            <button class="ott-btn ott-btn-skip" id="ottSkip" type="button">Skip Tour</button>
            <div class="ott-nav-group">
              <button class="ott-btn ott-btn-prev" id="ottPrev" type="button" aria-label="Previous step">&#8592; Prev</button>
              <button class="ott-btn ott-btn-next" id="ottNext" type="button" aria-label="Next step">Next &#8594;</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const steps = [
      { target: 'ottTarget1', title: 'Welcome to Dashboard', text: 'View your key metrics and recent activity at a glance. Customise widgets to suit your workflow.', position: 'bottom' },
      { target: 'ottTarget2', title: 'Smart Search', text: 'Find anything instantly — files, people, and settings. Filters narrow results as you type.', position: 'top' },
      { target: 'ottTarget3', title: 'Settings & Preferences', text: 'Configure your account, notifications, theme, and privacy options all in one place.', position: 'bottom' }
    ];

    const tip = document.getElementById('ottTip');
    const arrow = document.getElementById('ottArrow');
    const titleEl = document.getElementById('ottTitle');
    const textEl = document.getElementById('ottText');
    const dotsEl = document.getElementById('ottDots');
    const prevBtn = document.getElementById('ottPrev');
    const nextBtn = document.getElementById('ottNext');
    const skipBtn = document.getElementById('ottSkip');
    let current = 0;

    function positionTip(index) {
      const step = steps[index];
      const targetEl = document.getElementById(step.target);
      if (!targetEl) return;

      const targetRect = targetEl.getBoundingClientRect();
      const stageRect = document.querySelector('.ott-stage').getBoundingClientRect();

      let top, left;
      if (step.position === 'bottom') {
        top = targetRect.bottom - stageRect.top + 16;
        left = targetRect.left + targetRect.width / 2 - stageRect.left;
        arrow.style.top = '-8px';
        arrow.style.left = '50%';
        arrow.style.transform = 'translateX(-50%) rotate(45deg)';
      } else {
        top = targetRect.top - stageRect.top - 16 - tip.offsetHeight;
        left = targetRect.left + targetRect.width / 2 - stageRect.left;
        arrow.style.bottom = '-8px';
        arrow.style.top = 'auto';
        arrow.style.left = '50%';
        arrow.style.transform = 'translateX(-50%) rotate(45deg)';
      }

      tip.style.left = Math.max(10, Math.min(left - 120, stageRect.width - 260)) + 'px';
      tip.style.top = Math.max(10, top) + 'px';
    }

    function setStep(index) {
      const step = steps[index];
      titleEl.textContent = step.title;
      textEl.textContent = step.text;

      tip.classList.remove('ott-active');
      void tip.offsetWidth;
      tip.classList.add('ott-active');

      requestAnimationFrame(function () {
        positionTip(index);
      });

      prevBtn.disabled = index === 0;
      nextBtn.textContent = index === steps.length - 1 ? 'Done' : 'Next \u2192';

      const dotItems = dotsEl.querySelectorAll('.ott-dot');
      dotItems.forEach(function (dot, i) {
        dot.classList.toggle('is-active', i === index);
      });
    }

    function buildDots() {
      dotsEl.innerHTML = '';
      steps.forEach(function (_, i) {
        const dot = document.createElement('span');
        dot.className = 'ott-dot';
        dotsEl.appendChild(dot);
      });
    }

    nextBtn.addEventListener('click', function () {
      if (current === steps.length - 1) {
        tip.classList.remove('ott-active');
        return;
      }
      current = Math.min(current + 1, steps.length - 1);
      setStep(current);
    });

    prevBtn.addEventListener('click', function () {
      current = Math.max(current - 1, 0);
      setStep(current);
    });

    skipBtn.addEventListener('click', function () {
      tip.classList.remove('ott-active');
    });

    buildDots();
    setStep(0);
  </script>

</body>
</html>
