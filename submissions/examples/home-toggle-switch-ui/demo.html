<!DOCTYPE html>
<html>
<head>
  <title>Home Toggle Switch UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<label class="switch">
  <input type="checkbox" onclick="toggleText(this)">
  <span class="slider"></span>
</label>

<p id="status">OFF</p>

<script>
function toggleText(el) {
  document.getElementById("status").innerText = el.checked ? "ON" : "OFF";
}
</script>

</body>
</html>
