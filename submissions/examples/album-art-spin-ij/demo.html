<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Album Art Spin - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Now Spinning</h1>
    <div class="vinyl-container">
      <div class="vinyl-record" id="vinylRecord">
        <div class="vinyl-label">
          <div class="vinyl-hole"></div>
        </div>
      </div>
      <div class="tonearm" id="tonearm">
        <div class="tonearm-base"></div>
        <div class="tonearm-arm"></div>
        <div class="tonearm-head"></div>
      </div>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="playBtn">&#9654; Play</button>
    </div>
    <p class="description">Click play to spin the vinyl. The album art rotates smoothly and pauses gracefully.</p>
  </div>

  <script>
    const vinyl = document.getElementById('vinylRecord');
    const tonearm = document.getElementById('tonearm');
    const playBtn = document.getElementById('playBtn');
    let isPlaying = false;

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      vinyl.classList.toggle('playing', isPlaying);
      tonearm.classList.toggle('playing', isPlaying);
      playBtn.innerHTML = isPlaying ? '&#9646;&#9646; Pause' : '&#9654; Play';
    });
  </script>
</body>
</html>
