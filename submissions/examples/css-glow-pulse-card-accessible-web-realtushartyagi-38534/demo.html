<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="accessible-layout-container">
    
    <!-- Accessible Glow Pulse Card -->
    <div class="ease-accessible-glow-card" tabindex="0">
      <div class="ease-accessible-content">
        <div class="accessible-header">
          <span class="accessible-badge">Focus Mode</span>
          <h2 class="accessible-title">Accessibility First</h2>
        </div>
        <p class="accessible-description">
          This card features a high-contrast design with a subtle, non-distracting glow pulse. 
          The animation respects user system preferences for reduced motion, ensuring a comfortable reading experience.
        </p>
        <div class="accessible-actions">
          <button class="accessible-btn" aria-label="Learn more about accessibility features">Learn More</button>
        </div>
      </div>
      <!-- Background Glow Layers -->
      <div class="ease-accessible-glow-layer layer-1"></div>
      <div class="ease-accessible-glow-layer layer-2"></div>
    </div>

  </div>

</body>
</html>
