<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishlist Heart Pop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="heart-title">
        <p class="eyebrow">Wishlist feedback</p>
        <h1 id="heart-title">Heart pop animation</h1>
        <p class="demo-copy">
          Hover or focus the heart button to see it fill, pop, and release small
          sparkle accents.
        </p>

        <button
          class="wishlist-heart-button"
          type="button"
          aria-label="Add to wishlist"
        >
          <span class="heart-shape"></span>
          <span class="heart-spark spark-one"></span>
          <span class="heart-spark spark-two"></span>
          <span class="heart-spark spark-three"></span>
        </button>
      </section>
    </main>
  </body>
</html>
