<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Card – Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 32px;
      color: #0f172a;
    }
    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 32px;
      justify-content: center;
    }
    .demo-label {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <h1>Skeleton Card Variants</h1>
  <div class="demo-grid">

    <!-- Text Block -->
    <div>
      <p class="demo-label">Text Block</p>
      <div class="skeleton-card skeleton-card--text-block">
        <div class="skeleton-card__title skeleton-card__shimmer"></div>
        <div class="skeleton-card__line skeleton-card__shimmer"></div>
        <div class="skeleton-card__line skeleton-card__shimmer"></div>
        <div class="skeleton-card__line skeleton-card__shimmer"></div>
        <div class="skeleton-card__line skeleton-card__line--short skeleton-card__shimmer"></div>
      </div>
    </div>

    <!-- Avatar + Text -->
    <div>
      <p class="demo-label">Avatar + Text</p>
      <div class="skeleton-card skeleton-card--avatar-text">
        <div class="skeleton-card__avatar skeleton-card__shimmer"></div>
        <div class="skeleton-card__body">
          <div class="skeleton-card__line skeleton-card__shimmer"></div>
          <div class="skeleton-card__line skeleton-card__shimmer"></div>
          <div class="skeleton-card__line skeleton-card__line--short skeleton-card__shimmer"></div>
        </div>
      </div>
    </div>

    <!-- Card Image -->
    <div>
      <p class="demo-label">Card Image</p>
      <div class="skeleton-card skeleton-card--card-image">
        <div class="skeleton-card__image skeleton-card__shimmer"></div>
        <div class="skeleton-card__title skeleton-card__shimmer"></div>
        <div class="skeleton-card__desc skeleton-card__shimmer"></div>
        <div class="skeleton-card__desc skeleton-card__shimmer"></div>
        <div class="skeleton-card__desc skeleton-card__desc--short skeleton-card__shimmer"></div>
      </div>
    </div>

    <!-- Full Page -->
    <div>
      <p class="demo-label">Full Page</p>
      <div class="skeleton-card skeleton-card--full-page">
        <div class="skeleton-card__header">
          <div class="skeleton-card__header-avatar skeleton-card__shimmer"></div>
          <div class="skeleton-card__header-lines">
            <div class="skeleton-card__header-line skeleton-card__shimmer"></div>
            <div class="skeleton-card__header-line skeleton-card__header-line--short skeleton-card__shimmer"></div>
          </div>
        </div>
        <div class="skeleton-card__hero skeleton-card__shimmer"></div>
        <div class="skeleton-card__row">
          <div class="skeleton-card__col">
            <div class="skeleton-card__col-line skeleton-card__shimmer"></div>
            <div class="skeleton-card__col-line skeleton-card__shimmer"></div>
            <div class="skeleton-card__col-line skeleton-card__col-line--short skeleton-card__shimmer"></div>
          </div>
          <div class="skeleton-card__col">
            <div class="skeleton-card__col-line skeleton-card__shimmer"></div>
            <div class="skeleton-card__col-line skeleton-card__shimmer"></div>
            <div class="skeleton-card__col-line skeleton-card__col-line--short skeleton-card__shimmer"></div>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
