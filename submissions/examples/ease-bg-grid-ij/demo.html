<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Grid — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Background Grid</h1>
    <p class="subtitle">Grid line pattern using <code>linear-gradient</code></p>

    <div class="demo-panel ease-bg-grid" id="gridDemo">
      <p>Grid Pattern Background</p>
    </div>

    <div class="control-group">
      <div>
        <label>Size: <span id="sizeVal">40px</span></label>
        <input type="range" id="sizeSlider" min="10" max="80" value="40" step="5">
      </div>
      <div>
        <label>Opacity: <span id="opacityVal">0.06</span></label>
        <input type="range" id="opacitySlider" min="1" max="20" value="6" step="1">
      </div>
      <button id="toggleGridBtn">Toggle Grid</button>
    </div>
  </div>

  <script>
    const demo = document.getElementById('gridDemo');
    const sizeSlider = document.getElementById('sizeSlider');
    const opacitySlider = document.getElementById('opacitySlider');
    const sizeVal = document.getElementById('sizeVal');
    const opacityVal = document.getElementById('opacityVal');
    const toggleBtn = document.getElementById('toggleGridBtn');
    let visible = true;

    function updateGrid() {
      const size = sizeSlider.value + 'px';
      const opacity = opacitySlider.value / 100;
      const color = `rgba(255, 255, 255, ${opacity})`;
      sizeVal.textContent = size;
      opacityVal.textContent = opacity.toFixed(2);
      document.documentElement.style.setProperty('--ease-grid-size', size);
      document.documentElement.style.setProperty('--ease-grid-color', color);
    }

    sizeSlider.addEventListener('input', updateGrid);
    opacitySlider.addEventListener('input', updateGrid);

    toggleBtn.addEventListener('click', () => {
      visible = !visible;
      demo.style.backgroundImage = visible
        ? 'linear-gradient(var(--ease-grid-color) 1px, transparent 1px), linear-gradient(90deg, var(--ease-grid-color) 1px, transparent 1px)'
        : 'none';
      toggleBtn.textContent = visible ? 'Hide Grid' : 'Show Grid';
    });
  </script>

</body>
</html>
