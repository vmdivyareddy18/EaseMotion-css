    <div class="ui-panel">
      <h1>JWST Calibration Sequence</h1>
      <p>Click all 18 primary mirrors to align them to the focal plane.</p>
    </div>

    <div class="jwst-mirror-array">
      <input type="checkbox" id="mirror-1" class="state-toggle" />
      <input type="checkbox" id="mirror-2" class="state-toggle" />
      <input type="checkbox" id="mirror-3" class="state-toggle" />
      <input type="checkbox" id="mirror-4" class="state-toggle" />
      <input type="checkbox" id="mirror-5" class="state-toggle" />
      <input type="checkbox" id="mirror-6" class="state-toggle" />
      <input type="checkbox" id="mirror-7" class="state-toggle" />
      <input type="checkbox" id="mirror-8" class="state-toggle" />
      <input type="checkbox" id="mirror-9" class="state-toggle" />
      <input type="checkbox" id="mirror-10" class="state-toggle" />
      <input type="checkbox" id="mirror-11" class="state-toggle" />

      <input type="checkbox" id="mirror-16" class="state-toggle" />
      <input type="checkbox" id="mirror-17" class="state-toggle" />
      <input type="checkbox" id="mirror-18" class="state-toggle" />

      <div class="honeycomb-grid">
        <label for="mirror-1" class="hex-mirror" id="hex-1"><div class="hex-inner"></div></label>
        <label for="mirror-2" class="hex-mirror" id="hex-2"><div class="hex-inner"></div></label>
        <label for="mirror-3" class="hex-mirror" id="hex-3"><div class="hex-inner"></div></label>
        <label for="mirror-4" class="hex-mirror" id="hex-4"><div class="hex-inner"></div></label>

        <label for="mirror-6" class="hex-mirror" id="hex-6"><div class="hex-inner"></div></label>
        <label for="mirror-7" class="hex-mirror" id="hex-7"><div class="hex-inner"></div></label>

        <label for="mirror-9" class="hex-mirror" id="hex-9"><div class="hex-inner"></div></label>

        <label for="mirror-14" class="hex-mirror" id="hex-14"><div class="hex-inner"></div></label>
        <label for="mirror-15" class="hex-mirror" id="hex-15"><div class="hex-inner"></div></label>
