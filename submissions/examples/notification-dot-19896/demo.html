<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Dot - Pure CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="demo-container">
        <header>
            <h1>EaseMotion Notification Dots</h1>
            <p>Pure CSS, perfectly positioned, pulsing notification indicators.</p>
        </header>

        <div class="component-grid">
            
            <!-- Example 1: Standard Bell Icon with Red Pulse Dot -->
            <div class="demo-card">
                <h3>System Alert</h3>
                <div class="icon-wrapper">
                    <!-- SVG Bell Icon -->
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                    <!-- The Notification Dot -->
                    <span class="ease-notification-dot dot-danger pulse"></span>
                </div>
            </div>

            <!-- Example 2: User Avatar with Online Status Dot -->
            <div class="demo-card">
                <h3>User Online</h3>
                <div class="avatar-wrapper">
                    <img src="https://ui-avatars.com/api/?name=User&background=random" alt="Avatar" class="avatar">
                    <!-- The Notification Dot (Success/Green, No Pulse) -->
                    <span class="ease-notification-dot dot-success bottom-right"></span>
                </div>
            </div>

            <!-- Example 3: Messages Icon with Number Badge -->
            <div class="demo-card">
                <h3>Unread Messages</h3>
                <div class="icon-wrapper">
                    <!-- SVG Mail Icon -->
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                        <polyline points="22,6 12,13 2,6"></polyline>
                    </svg>
                    <!-- The Notification Badge (Contains Text) -->
                    <span class="ease-notification-dot dot-primary pulse badge">5</span>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
