<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ease-responsive-header Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">

<header class="ease-header">
  <a class="ease-header__logo" href="#">
    <span class="ease-header__logo-mark" aria-hidden="true">⚡</span>
    EaseMotion
  </a>

  <!-- Desktop navigation, hidden below 768px -->
  <nav class="ease-header__nav" aria-label="Primary">
    <ul class="ease-header__nav-list">
      <li><a class="ease-header__nav-link" href="#">Features</a></li>
      <li><a class="ease-header__nav-link" href="#">Docs</a></li>
      <li><a class="ease-header__nav-link" href="#">Pricing</a></li>
      <li><a class="ease-header__nav-link" href="#">Blog</a></li>
    </ul>
    <a class="ease-header__cta" href="#">Get Started</a>
  </nav>

  <!-- Hamburger toggle, visible only below 768px -->
  <button
    class="ease-header__toggle"
    id="easeHeaderToggle"
    type="button"
    aria-expanded="false"
    aria-controls="easeHeaderDrawer"
    aria-label="Toggle navigation menu"
  >
    <span class="ease-header__toggle-bar" aria-hidden="true"></span>
    <span class="ease-header__toggle-bar" aria-hidden="true"></span>
    <span class="ease-header__toggle-bar" aria-hidden="true"></span>
  </button>
</header>

<!-- Backdrop, closes drawer on click -->
<div class="ease-header__drawer-backdrop" id="easeHeaderBackdrop"></div>

<!-- Mobile drawer -->
<nav class="ease-header__drawer" id="easeHeaderDrawer" aria-label="Mobile" aria-hidden="true">
  <ul class="ease-header__drawer-list">
    <li><a class="ease-header__drawer-link" href="#">Features</a></li>
    <li><a class="ease-header__drawer-link" href="#">Docs</a></li>
    <li><a class="ease-header__drawer-link" href="#">Pricing</a></li>
    <li><a class="ease-header__drawer-link" href="#">Blog</a></li>
  </ul>
  <a class="ease-header__drawer-cta" href="#">Get Started</a>
</nav>

<script>
  // Minimal JS to toggle the mobile drawer and keep ARIA state in sync.
  // All visuals (slide-in, hamburger-to-X, fade) are pure CSS.
  (function () {
    var toggle = document.getElementById('easeHeaderToggle');
    var drawer = document.getElementById('easeHeaderDrawer');
    var backdrop = document.getElementById('easeHeaderBackdrop');

    function openDrawer() {
      drawer.classList.add('is-open');
      backdrop.classList.add('is-open');
      toggle.setAttribute('aria-expanded', 'true');
      drawer.setAttribute('aria-hidden', 'false');
    }

    function closeDrawer() {
      drawer.classList.remove('is-open');
      backdrop.classList.remove('is-open');
      toggle.setAttribute('aria-expanded', 'false');
      drawer.setAttribute('aria-hidden', 'true');
    }

    toggle.addEventListener('click', function () {
      var isOpen = drawer.classList.contains('is-open');
      isOpen ? closeDrawer() : openDrawer();
    });

    backdrop.addEventListener('click', closeDrawer);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && drawer.classList.contains('is-open')) {
        closeDrawer();
        toggle.focus();
      }
    });

    // Close drawer automatically if the viewport is resized back to desktop
    window.addEventListener('resize', function () {
      if (window.innerWidth > 768) closeDrawer();
    });
  })();
</script>

</body>
</html>
