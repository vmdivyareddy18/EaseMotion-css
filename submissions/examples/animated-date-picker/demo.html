<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Date Picker - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Calendar Card -->
    <div class="calendar-card ease-fade-in-down">
      
      <!-- Header -->
      <header class="calendar-header">
        <button class="nav-btn prev ease-hover-grow" aria-label="Previous month">
          <span>←</span>
        </button>
        <h2 class="current-month">July 2026</h2>
        <button class="nav-btn next ease-hover-grow" aria-label="Next month">
          <span>→</span>
        </button>
      </header>

      <!-- Weekdays -->
      <div class="weekdays">
        <span>Sun</span>
        <span>Mon</span>
        <span>Tue</span>
        <span>Wed</span>
        <span>Thu</span>
        <span>Fri</span>
        <span>Sat</span>
      </div>

      <!-- Days Grid -->
      <div class="days-grid ease-fade-in ease-delay-200">
        <!-- Week 1 -->
        <span class="day empty"></span>
        <span class="day empty"></span>
        <span class="day empty"></span>
        <span class="day">1</span>
        <span class="day">2</span>
        <span class="day">3</span>
        <span class="day">4</span>
        
        <!-- Week 2 -->
        <span class="day">5</span>
        <span class="day">6</span>
        <span class="day">7</span>
        <span class="day">8</span>
        <span class="day">9</span>
        <span class="day">10</span>
        <span class="day today selected ease-bounce-in ease-delay-300">11</span>
        
        <!-- Week 3 -->
        <span class="day">12</span>
        <span class="day has-event">13</span>
        <span class="day">14</span>
        <span class="day has-event">15</span>
        <span class="day">16</span>
        <span class="day">17</span>
        <span class="day">18</span>
        
        <!-- Week 4 -->
        <span class="day">19</span>
        <span class="day">20</span>
        <span class="day has-event">21</span>
        <span class="day">22</span>
        <span class="day">23</span>
        <span class="day">24</span>
        <span class="day">25</span>
        
        <!-- Week 5 -->
        <span class="day">26</span>
        <span class="day">27</span>
        <span class="day">28</span>
        <span class="day">29</span>
        <span class="day">30</span>
        <span class="day">31</span>
        <span class="day empty"></span>
      </div>

      <!-- Footer -->
      <footer class="calendar-footer ease-fade-in-up ease-delay-400">
        <span class="legend-item">
          <span class="legend-dot today-dot"></span> Today
        </span>
        <span class="legend-item">
          <span class="legend-dot event-dot"></span> Has Event
        </span>
      </footer>

    </div>
  </div>

  <!-- JavaScript for Date Selection -->
  <script>
    const days = document.querySelectorAll('.day:not(.empty)');
    
    days.forEach(day => {
      day.addEventListener('click', () => {
        // Remove selected class from all days
        days.forEach(d => {
          d.classList.remove('selected');
          d.classList.remove('ease-bounce-in');
        });
        
        // Add selected class and animation to clicked day
        day.classList.add('selected');
        day.classList.add('ease-bounce-in');
      });
    });
  </script>
</body>
</html>
