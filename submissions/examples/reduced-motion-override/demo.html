<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Global Reduced Motion Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo specific styles */
    body {
      font-family: sans-serif;
      padding: 2rem;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
      text-align: center;
    }
    .demo-box {
      width: 100px;
      height: 100px;
      background-color: #3b82f6;
      border-radius: 8px;
      animation: pulse 2s infinite;
      transition: transform 0.3s;
    }
    .demo-box:hover {
      transform: scale(1.2);
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <h1>Prefers Reduced Motion Override</h1>
  <p>To test this demo, enable "Reduce Motion" in your operating system accessibility settings. The animation and hover transition below should instantly stop or become instantaneous.</p>
  
  <div class="demo-box"></div>
</body>
</html>
