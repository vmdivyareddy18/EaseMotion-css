<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Toast - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Notification Toast System</h1>
      <p>Click the buttons below to trigger different types of animated notifications.</p>
    </header>

    <!-- Trigger Buttons -->
    <div class="button-grid">
      <button class="trigger-btn success ease-hover-grow" data-type="success" data-message="Operation completed successfully!">
        <span class="btn-icon">✓</span>
        Success Toast
      </button>
      
      <button class="trigger-btn error ease-hover-grow" data-type="error" data-message="An error occurred. Please try again.">
        <span class="btn-icon">✕</span>
        Error Toast
      </button>
      
      <button class="trigger-btn warning ease-hover-grow" data-type="warning" data-message="Warning: This action cannot be undone.">
        <span class="btn-icon">⚠</span>
        Warning Toast
      </button>
      
      <button class="trigger-btn info ease-hover-grow" data-type="info" data-message="Here's some helpful information.">
        <span class="btn-icon">ℹ</span>
        Info Toast
      </button>
    </div>

    <!-- Position Options -->
    <div class="position-options ease-fade-in-up ease-delay-200">
      <h3>Toast Position</h3>
      <div class="position-buttons">
        <button class="pos-btn active" data-position="top-right">Top Right</button>
        <button class="pos-btn" data-position="top-left">Top Left</button>
        <button class="pos-btn" data-position="bottom-right">Bottom Right</button>
        <button class="pos-btn" data-position="bottom-left">Bottom Left</button>
      </div>
    </div>

    <!-- Duration Options -->
    <div class="duration-options ease-fade-in-up ease-delay-300">
      <h3>Auto-Dismiss Duration</h3>
      <div class="duration-buttons">
        <button class="dur-btn" data-duration="3000">3s</button>
        <button class="dur-btn active" data-duration="5000">5s</button>
        <button class="dur-btn" data-duration="8000">8s</button>
        <button class="dur-btn" data-duration="0">No Auto-Dismiss</button>
      </div>
    </div>

  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- JavaScript for Toast Functionality -->
  <script>
    const toastContainer = document.getElementById('toast-container');
    const triggerBtns = document.querySelectorAll('.trigger-btn');
    const posBtns = document.querySelectorAll('.pos-btn');
    const durBtns = document.querySelectorAll('.dur-btn');
    
    let currentPosition = 'top-right';
    let currentDuration = 5000;

    // Update position
    posBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        posBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentPosition = btn.dataset.position;
        toastContainer.className = `toast-container ${currentPosition}`;
      });
    });

    // Update duration
    durBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        durBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentDuration = parseInt(btn.dataset.duration);
      });
    });

    // Trigger toasts
    triggerBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const type = btn.dataset.type;
        const message = btn.dataset.message;
        showToast(type, message);
      });
    });

    // Show toast function
    function showToast(type, message) {
      const toast = document.createElement('div');
      toast.className = `toast ${type} ease-slide-in-right`;
      
      const icons = {
        success: '✓',
        error: '✕',
        warning: '⚠',
        info: 'ℹ'
      };

      toast.innerHTML = `
        <div class="toast-icon">${icons[type]}</div>
        <div class="toast-content">
          <div class="toast-title">${type.charAt(0).toUpperCase() + type.slice(1)}</div>
          <div class="toast-message">${message}</div>
        </div>
        <button class="toast-close ease-hover-grow" aria-label="Close notification">×</button>
        ${currentDuration > 0 ? '<div class="toast-progress"><div class="progress-bar"></div></div>' : ''}
      `;

      toastContainer.appendChild(toast);

      // Close button
      const closeBtn = toast.querySelector('.toast-close');
      closeBtn.addEventListener('click', () => removeToast(toast));

      // Auto-dismiss with progress
      if (currentDuration > 0) {
        const progressBar = toast.querySelector('.progress-bar');
        progressBar.style.animationDuration = `${currentDuration}ms`;
        
        setTimeout(() => {
          removeToast(toast);
        }, currentDuration);
      }
    }

    // Remove toast function
    function removeToast(toast) {
      toast.classList.remove('ease-slide-in-right');
      toast.classList.add('ease-slide-out-right');
      setTimeout(() => {
        toast.remove();
      }, 300);
    }

    // Initialize container position
    toastContainer.className = `toast-container ${currentPosition}`;
  </script>
</body>
</html>
