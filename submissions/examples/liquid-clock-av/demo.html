<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Liquid Clock • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <span class="badge">
        LIQUID CLOCK
    </span>

    <h1>Time Flows Like Water</h1>

    <p>
        A futuristic glassmorphism clock with floating liquid layers,
        glowing gradients and animated waves.
    </p>

    <div class="clock">

        <div class="blob blob-one"></div>
        <div class="blob blob-two"></div>

        <div class="wave wave-one"></div>
        <div class="wave wave-two"></div>

        <div class="time">

            <span>09</span>

            <span class="colon">:</span>

            <span>41</span>

            <span class="colon">:</span>

            <span>26</span>

        </div>

    </div>

</div>

</body>
</html>
