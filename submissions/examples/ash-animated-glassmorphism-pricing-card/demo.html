<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Glassmorphism Pricing Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-glow glow-1"></div>
<div class="background-glow glow-2"></div>

<section class="pricing-wrapper">

  <div class="pricing-card">

    <span class="popular-badge">
      Most Popular
    </span>

    <h2>Pro Plan</h2>

    <div class="price">
      <span class="currency">$</span>
      <span class="amount">29</span>
      <span class="period">/month</span>
    </div>

    <p class="description">
      Perfect for startups and growing teams that need advanced features and collaboration tools.
    </p>

    <ul class="features">

      <li>✓ Unlimited Projects</li>
      <li>✓ Team Collaboration</li>
      <li>✓ Priority Support</li>
      <li>✓ Analytics Dashboard</li>
      <li>✓ Custom Integrations</li>

    </ul>

    <button class="cta-btn">
      Start Free Trial
    </button>

  </div>

</section>

</body>
</html>
