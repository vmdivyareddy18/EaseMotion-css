<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constellation Link Hover Effect - EaseMotion CSS</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <!-- Link to the effect's stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <h1>Constellation Effect</h1>
    
    <!-- Semantic Navigation Markup -->
    <nav class="constellation-nav" id="demo-nav">
      <a href="#" class="constellation-link" id="nav-products">
        <span>Products</span>
      </a>

      <a href="#" class="constellation-link" id="nav-features">
        <span>Features</span>
      </a>

      <a href="#" class="constellation-link" id="nav-pricing">
        <span>Pricing</span>
      </a>

      <a href="#" class="constellation-link" id="nav-contact">
        <span>Contact</span>
      </a>
    </nav>

    <p class="description">
      Hover over any navigation link to draw custom luminous constellation lines and reveal glowing star nodes at key vertices.
    </p>
  </div>

</body>
</html>
