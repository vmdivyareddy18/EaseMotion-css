<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Font Switcher - Cyberpunk Ripple Variant</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cyberpunk-viewport">
        <div class="switcher-panel-card">
            <span class="matrix-badge">CORE_SYSTEM_TYPOGRAPHY</span>
            
            <div class="preview-text-box">
                <span class="preview-string">NEO_TOKYO_2026</span>
            </div>
            
            <div class="switcher-control-deck">
                <label class="control-node font-sans-node">
                    <input type="radio" name="font-switch" class="switch-radio-input" checked>
                    <div class="node-overlay-glow"></div>
                    <div class="node-ripple-layer">
                        <span class="wave ring-1"></span>
                        <span class="wave ring-2"></span>
                    </div>
                    <span class="node-label">SANS_INTERFACE</span>
                </label>
                
                <label class="control-node font-mono-node">
                    <input type="radio" name="font-switch" class="switch-radio-input">
                    <div class="node-overlay-glow"></div>
                    <div class="node-ripple-layer">
                        <span class="wave ring-1"></span>
                        <span class="wave ring-2"></span>
                    </div>
                    <span class="node-label">MATRIX_MONO</span>
                </label>
                
                <label class="control-node font-serif-node">
                    <input type="radio" name="font-switch" class="switch-radio-input">
                    <div class="node-overlay-glow"></div>
                    <div class="node-ripple-layer">
                        <span class="wave ring-1"></span>
                        <span class="wave ring-2"></span>
                    </div>
                    <span class="node-label">RETRO_SERIF</span>
                </label>
            </div>
        </div>
    </div>

</body>
</html>
