<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Lift on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Shadow Lift on Hover</h1>
  <p class="subtitle">Shadow lifts and spreads when hovering — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the card to see the shadow lift effect</p>
    <div class="shadow-card"><p>Hover me</p></div>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>A <code>box-shadow</code> transition increases offset and spread on hover, making the element appear to lift off the page.</p>
  </section>
</body>
</html>
