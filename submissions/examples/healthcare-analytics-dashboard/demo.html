<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Healthcare Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="health-dashboard">
    <header class="header">
      <div>
        <span class="badge">Clinical Station</span>
        <h1>Patient Metrics Hub</h1>
      </div>
    </header>

    <section class="stats-grid">
      <div class="card stat-card">
        <h3>Patient Flow</h3>
        <p>Total Scheduled today</p>
        <h2>48 Patients</h2>
      </div>

      <div class="card stat-card">
        <h3>Alerts Flagged</h3>
        <p>High blood pressure anomalies</p>
        <h2 class="alert-text">3 Alerts</h2>
      </div>
    </section>
  </main>
</body>
</html>
