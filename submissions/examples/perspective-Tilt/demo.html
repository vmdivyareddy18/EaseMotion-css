<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Perspective Tilt Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Creative Portfolio Modal</h1>
    <p class="subtitle">
        Pure CSS 3D Perspective Tilt Animation
    </p>

    <!-- Toggle -->
    <input type="checkbox" id="modal-toggle" class="modal-toggle">

    <!-- Open Button -->
    <label for="modal-toggle" class="open-btn">
        View Project
    </label>

    <!-- Overlay -->
    <div class="overlay">

        <!-- Click outside to close -->
        <label for="modal-toggle" class="overlay-close"></label>

        <!-- Modal -->
        <section
            class="modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
            aria-describedby="modal-description"
            tabindex="0">

            <div class="modal-header">

                <div class="badge">
                    Featured
                </div>

                <label
                    for="modal-toggle"
                    class="close-btn"
                    aria-label="Close Modal">
                    ✕
                </label>

            </div>

            <div class="preview">
                🎨
            </div>

            <h2 id="modal-title">
                Portfolio Showcase
            </h2>

            <p id="modal-description">
                Experience a modern modal with a smooth
                3D Perspective Tilt animation built entirely
                using CSS. Designed for creative portfolios,
                case studies and agency websites.
            </p>

            <div class="actions">

                <label
                    for="modal-toggle"
                    class="secondary-btn">
                    Close
                </label>

                <a href="#" class="primary-btn">
                    Explore
                </a>

            </div>

        </section>

    </div>

</div>

</body>
</html>
