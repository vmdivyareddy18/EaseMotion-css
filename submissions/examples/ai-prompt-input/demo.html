<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic AI Prompt Input</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Premium Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Advanced SVG Filters for Liquid Aurora effect -->
    <svg style="display:none;">
        <defs>
            <filter id="liquid-warp">
                <feTurbulence type="fractalNoise" baseFrequency="0.01 0.01" numOctaves="3" result="noise" seed="1" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="40" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <!-- Subtle mesh background -->
    <div class="mesh-bg"></div>

    <div class="chat-interface">
        
        <div class="welcome-text ease-fade-in ease-slide-up" style="animation-delay: 0.1s;">
            <h1>How can I help you today?</h1>
        </div>

        <!-- Floating Prompt Bar -->
        <div class="prompt-wrapper ease-fade-in ease-slide-up" style="animation-delay: 0.3s;">
            
            <!-- Liquid Aurora Background Layer with SVG Warp -->
            <div class="aurora-bg"></div>
            
            <!-- Floating Magic Particles -->
            <div class="particle-container">
                <div class="particle p1"></div>
                <div class="particle p2"></div>
                <div class="particle p3"></div>
                <div class="particle p4"></div>
                <div class="particle p5"></div>
            </div>
            
            <!-- The Glass Container -->
            <div class="prompt-glass">
                
                <!-- Attachment Button -->
                <button class="icon-btn attach-btn ease-hover-grow" aria-label="Attach file">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>

                <!-- Dynamic Waveform (Mic/Audio Visualizer) -->
                <div class="waveform">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

                <textarea class="prompt-input" rows="1" placeholder="Type a message or use voice..." autocomplete="off"></textarea>
                
                <div class="actions-area">
                    <!-- Voice Input Button -->
                    <button class="icon-btn voice-btn ease-hover-grow" aria-label="Voice Input">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" x2="12" y1="19" y2="22"/>
                        </svg>
                    </button>

                    <!-- Send Button -->
                    <button class="send-btn" aria-label="Send message">
                        <div class="btn-glow"></div>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" x2="11" y1="2" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <!-- Dual Glowing border at the bottom -->
            <div class="bottom-glow-line primary"></div>
            <div class="bottom-glow-line secondary"></div>
        </div>
        
    </div>

    <!-- Script to auto-resize textarea and animate SVG turbulence -->
    <script>
        const tx = document.querySelector('.prompt-input');
        const turbulence = document.querySelector('feTurbulence');
        const waveform = document.querySelector('.waveform');
        
        // Auto resize
        tx.addEventListener("input", function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + "px";
        }, false);

        // Animate the SVG liquid filter
        let frame = 0;
        function animateLiquid() {
            frame += 0.01;
            turbulence.setAttribute('baseFrequency', `${0.01 + Math.sin(frame)*0.005} ${0.01 + Math.cos(frame)*0.005}`);
            requestAnimationFrame(animateLiquid);
        }
        animateLiquid();

        // Simulate waveform jumping when input is focused
        tx.addEventListener('focus', () => waveform.classList.add('active'));
        tx.addEventListener('blur', () => {
            if(tx.value.trim() === '') waveform.classList.remove('active');
        });
    </script>
</body>
</html>
