<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jello Tooltip Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <h2>Attention Seeker: Jello Tooltip</h2>
        <p>Hover over or focus the button below to see the jello tooltip effect.</p>

        <div class="tooltip-wrapper-ag">
            <button class="trigger-button-ag" aria-describedby="jello-tooltip-ag">
                Hover Me
            </button>
            <div id="jello-tooltip-ag" class="ease-jello-tooltip-ag" role="tooltip">
                Here is some helpful information!
                <div class="tooltip-arrow-ag"></div>
            </div>
        </div>
    </div>
</body>
</html>
