<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wobble-Focus Accordion Demo — Responsive Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 40px 16px; margin: 0; background: #f1f5f9; box-sizing: border-box; }
    h2 { color: #0f172a; text-align: center; font-size: 20px; }
    p.hint { text-align: center; color: #64748b; font-size: 13px; }
  </style>
</head>
<body>
  <h2>CSS Wobble-Focus Accordion — Responsive Dashboard</h2>
  <p class="hint">Resize the window or tab through headers to test responsiveness and focus wobble.</p>

  <div class="ease-accordion">
    <div class="ease-accordion__item" data-open="true">
      <button class="ease-accordion__header" aria-expanded="true">
        <span>Server Health</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          All systems operational. Uptime 99.98% over the last 30 days.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Active Sessions</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          1,204 users currently active across web and mobile clients.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Recent Alerts</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          No critical alerts in the past 24 hours.
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ease-accordion__header').forEach((btn) => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.ease-accordion__item');
        const isOpen = item.getAttribute('data-open') === 'true';
        item.setAttribute('data-open', String(!isOpen));
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    });
  </script>
</body>
</html>
