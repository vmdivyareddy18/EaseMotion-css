<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-tiger-pounce | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="ground-tiger"></div>
    <div class="dust dust-1"></div>
    <div class="dust dust-2"></div>
    <div class="dust dust-3"></div>
    <div class="tiger-body">
      <div class="stripe s-1"></div>
      <div class="stripe s-2"></div>
      <div class="stripe s-3"></div>
      <div class="stripe s-4"></div>
      <div class="stripe s-5"></div>
      <div class="stripe s-6"></div>
      <div class="tiger-head">
        <div class="ear ear-l"></div>
        <div class="ear ear-r"></div>
        <div class="eye-tiger eye-tl"></div>
        <div class="eye-tiger eye-tr"></div>
        <div class="nose"></div>
      </div>
      <div class="leg-tiger tleg-fl"></div>
      <div class="leg-tiger tleg-fr"></div>
      <div class="leg-tiger tleg-bl"></div>
      <div class="leg-tiger tleg-br"></div>
      <div class="tail-tiger"></div>
    </div>
  </div>
</body>
</html>
