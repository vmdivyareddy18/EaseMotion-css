<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS button-dashed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Dashed Buttons</h1>
    <div class="button-grid">
      <button class="btn-dashed primary">Primary</button>
      <button class="btn-dashed success">Success</button>
      <button class="btn-dashed danger">Danger</button>
      <button class="btn-dashed loading">
        <span class="spinner-dot s1"></span>
        <span class="spinner-dot s2"></span>
        <span class="spinner-dot s3"></span>
        Loading
      </button>
    </div>
  </div>
</body>
</html>
