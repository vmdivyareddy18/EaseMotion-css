<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Strength Meter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Password Strength</h1>
      <p>Animated multi-segment indicator that responds to password complexity.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>Create Password</h2>
        
        <div class="form-group">
          <label for="password-input">Password</label>
          <input type="password" id="password-input" class="password-input" placeholder="Start typing..." />
          
          <!-- The Password Strength Component -->
          <div class="ease-password-meter" id="strength-meter" style="--ease-strength: 0" data-strength="0">
            <div class="ease-password-segment"></div>
            <div class="ease-password-segment"></div>
            <div class="ease-password-segment"></div>
            <div class="ease-password-segment"></div>
          </div>
          
          <div class="strength-text" id="strength-text">Too weak</div>
        </div>
        
      </section>
    </main>
  </div>

  <script>
    const passwordInput = document.getElementById('password-input');
    const meter = document.getElementById('strength-meter');
    const strengthText = document.getElementById('strength-text');

    const labels = ["Too weak", "Weak", "Fair", "Good", "Strong"];

    // Basic password strength algorithm
    function calculateStrength(password) {
      let score = 0;
      if (!password) return 0;
      
      if (password.length > 5) score += 1; // Length > 5
      if (password.length > 8) score += 1; // Length > 8
      if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score += 1; // Upper and lower case
      if (/[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) score += 1; // Numbers and special chars
      
      return Math.min(score, 4);
    }

    passwordInput.addEventListener('input', (e) => {
      const score = calculateStrength(e.target.value);
      
      // Update the CSS variable and data attribute
      meter.style.setProperty('--ease-strength', score);
      meter.setAttribute('data-strength', score);
      
      // Update text label
      strengthText.textContent = labels[score];
      strengthText.setAttribute('data-strength', score);
    });
  </script>
</body>
</html>
