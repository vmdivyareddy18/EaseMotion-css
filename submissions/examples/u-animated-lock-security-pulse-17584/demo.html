<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Lock Security Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Lock Security Pulse</h1>

    <p class="intro">
      A reusable lock pulse animation for authentication systems,
      banking apps, security dashboards, and login interfaces.
    </p>

    <div class="demo-grid">

      <div class="lock-card">
        <div class="lock-security-pulse">
          🔒
        </div>
        <h3>Secure Login</h3>
      </div>

      <div class="lock-card">
        <div class="lock-security-pulse large">
          🔒
        </div>
        <p>Protected Data</p>
      </div>

      <div class="lock-card">
        <div class="lock-security-pulse">
          🔒
        </div>
        <button>Authenticate</button>
      </div>

    </div>

  </main>

</body>
</html>
