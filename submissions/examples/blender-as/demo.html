<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blender</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="blender" tabindex="0">
      <span class="lid"></span>
      <div class="jar">
        <span class="smoothie"></span>
        <span class="chunk ch1"></span>
        <span class="chunk ch2"></span>
        <span class="chunk ch3"></span>
        <span class="chunk ch4"></span>
        <span class="blade"></span>
        <span class="shine"></span>
      </div>
      <div class="base">
        <span class="knob"></span>
        <span class="led"></span>
      </div>
    </div>
    <p class="hint">hover to blend</p>
  </div>
</body>
</html>
