<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Chip Showcase</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background-color: #060813; /* Premium dark mode */
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .wrapper {
      text-align: center;
      margin-bottom: 2rem;
      max-width: 440px;
    }
    .wrapper h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #38dbff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .wrapper p {
      color: #64748b;
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .panel {
      background-color: #0e101f;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 1rem;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      width: 100%;
      max-width: 550px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Scale Chips</h1>
    <p>Hover to elevate tags in 3D. Click to select them, triggers a springy checkmark scale animation.</p>
  </div>

  <div class="panel">
    <div class="chips-perspective-container">
      <!-- 1. Web Development -->
      <input type="checkbox" id="chip-web" class="chip-input" checked>
      <label for="chip-web" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Web Dev</span>
      </label>

      <!-- 2. UI/UX Design -->
      <input type="checkbox" id="chip-design" class="chip-input">
      <label for="chip-design" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Design</span>
      </label>

      <!-- 3. Machine Learning -->
      <input type="checkbox" id="chip-ml" class="chip-input">
      <label for="chip-ml" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>AI / ML</span>
      </label>

      <!-- 4. Cloud Computing -->
      <input type="checkbox" id="chip-cloud" class="chip-input" checked>
      <label for="chip-cloud" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Cloud</span>
      </label>

      <!-- 5. Cybersecurity -->
      <input type="checkbox" id="chip-cyber" class="chip-input">
      <label for="chip-cyber" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Security</span>
      </label>

      <!-- 6. Blockchain -->
      <input type="checkbox" id="chip-block" class="chip-input">
      <label for="chip-block" class="scale-chip">
        <svg class="chip-check-icon" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Crypto</span>
      </label>
    </div>
  </div>
</body>
</html>
