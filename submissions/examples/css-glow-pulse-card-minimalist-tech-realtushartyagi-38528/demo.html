<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="minimal-layout-container">
    
    <!-- Minimalist Tech Glow Pulse Card -->
    <div class="ease-minimal-glow-card">
      
      <!-- Subtle Glow Layers -->
      <div class="ease-minimal-glow-layer layer-1"></div>
      
      <!-- Card Content -->
      <div class="ease-minimal-content">
        
        <div class="minimal-header">
          <svg class="minimal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
            <line x1="12" y1="22.08" x2="12" y2="12"></line>
          </svg>
          <span class="minimal-badge">BETA</span>
        </div>
        
        <h3 class="minimal-title">Serverless Compute</h3>
        <p class="minimal-description">
          Deploy your code at the edge with zero configuration. Scale instantly to meet demand globally.
        </p>
        
        <ul class="minimal-features">
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Edge Routing
          </li>
          <li>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Instant Rollbacks
          </li>
        </ul>
        
        <a href="#" class="minimal-link">
          Explore Compute <span class="link-arrow">&rarr;</span>
        </a>
        
      </div>
      
    </div>

  </div>

</body>
</html>
