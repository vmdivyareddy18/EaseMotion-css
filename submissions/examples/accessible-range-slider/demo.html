<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accessible Range Slider with Tooltip and Tick Marks</title>
  <meta name="description" content="A premium, fully accessible range slider component with a live tooltip, tick marks, and dark/light theming — built with vanilla HTML, CSS and JavaScript." />

  <!-- Google Fonts: Poppins (display) + Inter (body/data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient background glow layer (purely decorative) -->
  <div class="bg-glow" aria-hidden="true"></div>

  <div class="app">

    <!-- ===================== Header ===================== -->
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div class="brand-text">
          <p class="eyebrow">EaseMotion&nbsp;CSS</p>
          <h1 class="brand-title">Range Slider</h1>
        </div>
      </div>

      <!-- Theme toggle: keyboard accessible button, state exposed via aria-pressed -->
      <button
        type="button"
        id="themeToggle"
        class="theme-toggle"
        aria-pressed="false"
        aria-label="Switch to light theme"
      >
        <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z" />
        </svg>
        <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
        </svg>
      </button>
    </header>

    <!-- ===================== Main Slider Card ===================== -->
    <main class="slider-card" aria-labelledby="sliderTitle">
      <h2 id="sliderTitle" class="card-title">Adjust the value</h2>
      <p class="card-subtitle">
        Drag the handle, click the track, or use your keyboard
        (Arrow keys, Home, End, Page Up/Down).
      </p>

      <!-- Slider + floating tooltip + tick marks -->
      <div class="slider-wrapper">

        <!-- Floating tooltip that tracks the thumb position -->
        <div class="tooltip" id="tooltip" role="status" aria-hidden="true">
          <span id="tooltipValue">50</span>
        </div>

        <input
          type="range"
          id="rangeSlider"
          class="range-slider"
          min="0"
          max="100"
          value="50"
          step="1"
          aria-label="Adjustable value slider"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="50"
          aria-describedby="stateReadout"
        />

        <!-- Tick marks + labels are generated by script.js -->
        <div class="ticks" id="ticks" aria-hidden="true"></div>
      </div>

      <!-- Visually hidden live region for screen reader announcements -->
      <p class="sr-only" id="liveRegion" aria-live="polite"></p>

      <!-- ================= Live Information Panel ================= -->
      <section class="info-panel" aria-label="Current slider statistics">
        <div class="info-item">
          <span class="info-label">Value</span>
          <span class="info-value" id="infoValue">50</span>
        </div>
        <div class="info-item">
          <span class="info-label">Percentage</span>
          <span class="info-value" id="infoPercentage">50%</span>
        </div>
        <div class="info-item">
          <span class="info-label">Min</span>
          <span class="info-value" id="infoMin">0</span>
        </div>
        <div class="info-item">
          <span class="info-label">Max</span>
          <span class="info-value" id="infoMax">100</span>
        </div>
        <div class="info-item info-item-state">
          <span class="info-label">State</span>
          <span class="info-value state-badge" id="stateReadout">Medium</span>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>Built with HTML, CSS &amp; vanilla JavaScript &middot; No frameworks, no dependencies.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
