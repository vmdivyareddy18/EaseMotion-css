<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous Trust Intelligence Network</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="trust-dashboard">
    <header class="header">
      <span class="badge">Trust Network</span>
      <h1>Autonomous Trust Intelligence Network</h1>
      <p class="subtitle">Continuous trust score evaluation, identity credentials checking, and assurance stats.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-trust">
        <h3>📜 Trust Validation Criteria</h3>
        <ul class="check-list">
          <li class="ok">Hardware Signature Matching (Verified)</li>
          <li class="ok">Port Configuration Check (Verified)</li>
        </ul>
      </section>

      <section class="side-panel">
        <div class="panel-card score-card">
          <h3>📊 System Trust score</h3>
          <div class="dial-wrapper">
            <div class="dial">
              <span class="val">96%</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
