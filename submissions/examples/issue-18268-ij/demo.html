<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Range Slider</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Dual Range Slider</h1>
    <div class="slider-container">
      <div class="slider-track">
        <div class="slider-fill" id="sliderFill"></div>
      </div>
      <input type="range" class="range-input" id="rangeMin" min="0" max="100" value="20">
      <input type="range" class="range-input" id="rangeMax" min="0" max="100" value="80">
    </div>
    <div class="values">
      <span id="valMin">20</span> — <span id="valMax">80</span>
    </div>
  </div>
  <script>
    const rangeMin = document.getElementById('rangeMin');
    const rangeMax = document.getElementById('rangeMax');
    const sliderFill = document.getElementById('sliderFill');
    const valMin = document.getElementById('valMin');
    const valMax = document.getElementById('valMax');

    function updateSlider() {
      const min = parseInt(rangeMin.value);
      const max = parseInt(rangeMax.value);
      if (min > max) {
        if (this === rangeMin) {
          rangeMax.value = min;
        } else {
          rangeMin.value = max;
        }
      }
      const minVal = parseInt(rangeMin.value);
      const maxVal = parseInt(rangeMax.value);
      const pctMin = (minVal / 100) * 100;
      const pctMax = (maxVal / 100) * 100;
      sliderFill.style.left = pctMin + '%';
      sliderFill.style.width = (pctMax - pctMin) + '%';
      valMin.textContent = minVal;
      valMax.textContent = maxVal;
    }

    rangeMin.addEventListener('input', updateSlider);
    rangeMax.addEventListener('input', updateSlider);
    updateSlider();
  </script>
</body>
</html>
