<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Shading Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual color palette showcase demonstrating dynamic tinting and shading levels using color blending.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Color Palette Shading</h1>
      <p class="description">
        Demonstrates surface tint scaling. Compare the light tint and 
        dark shade steps based on a primary purple base.
      </p>
    </header>

    <main class="showcase">
      <div class="palette-card">
        <h2>Purple Color Scale</h2>
        
        <div class="color-scale">
          <!-- Tint 2 (Lightest) -->
          <div class="color-box tint-2">
            <span>Tint 2 (Lightest)</span>
          </div>

          <!-- Tint 1 -->
          <div class="color-box tint-1">
            <span>Tint 1</span>
          </div>

          <!-- Base Primary -->
          <div class="color-box base-primary">
            <span>Base Primary</span>
          </div>

          <!-- Shade 1 -->
          <div class="color-box shade-1">
            <span>Shade 1</span>
          </div>

          <!-- Shade 2 (Darkest) -->
          <div class="color-box shade-2">
            <span>Shade 2 (Darkest)</span>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
