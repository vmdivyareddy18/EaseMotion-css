<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-yarn-unwind</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🧶 Yarn Unwind</h1>
    <div class="animation-wrapper">
      <div class="yarn-ball">
        <div class="yarn-trail"></div>
        <div class="yarn-sphere"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Yarn Color
        <input type="color" class="js-color" value="#e8a87c" data-var="--yarn-color" />
      </label>
      <label>
        Unwind Duration
        <input type="range" class="js-range" min="1" max="8" step="0.25" value="3" data-var="--unwind-duration" />
        <span class="js-range-value">3s</span>
      </label>
      <label>
        Ball Size
        <input type="range" class="js-range" min="30" max="100" step="2" value="60" data-var="--ball-size" />
        <span class="js-range-value">60px</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      const raw = el.dataset.raw;
      el.addEventListener('input', () => {
        let val = el.value;
        if (raw === 'px') val += 'px';
        else val += 's';
        document.documentElement.style.setProperty(el.dataset.var, val);
        if (display) display.textContent = val;
      });
    });
  </script>
</body>
</html>
