<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ribbon Badge Strap | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Ribbon Badge Strap</h1>
    <p class="subtitle">Elegant fold animations for badges and ribbons</p>

    <div class="demo-grid">
      <div class="card">
        <div class="ribbon-wrap top-left">
          <div class="ribbon" id="ribbon1">
            <span class="ribbon-text">New!</span>
            <div class="ribbon-fold"></div>
          </div>
        </div>
        <h2>Top Left</h2>
        <p>Default position with fold animation.</p>
        <button class="ctrl-btn" data-ribbon="ribbon1" data-action="toggle">Toggle</button>
        <button class="ctrl-btn" data-ribbon="ribbon1" data-action="remove">Remove</button>
      </div>

      <div class="card">
        <div class="ribbon-wrap top-right">
          <div class="ribbon" id="ribbon2">
            <span class="ribbon-text">Sale!</span>
            <div class="ribbon-fold"></div>
          </div>
        </div>
        <h2>Top Right</h2>
        <p>Mirrored for the opposite corner.</p>
        <button class="ctrl-btn" data-ribbon="ribbon2" data-action="toggle">Toggle</button>
        <button class="ctrl-btn" data-ribbon="ribbon2" data-action="remove">Remove</button>
      </div>

      <div class="card">
        <div class="ribbon-wrap top-left">
          <div class="ribbon" id="ribbon3">
            <span class="ribbon-text">Popular</span>
            <div class="ribbon-fold"></div>
          </div>
        </div>
        <h2>Custom Color</h2>
        <p>Styled with a different palette.</p>
        <button class="ctrl-btn" data-ribbon="ribbon3" data-action="toggle">Toggle</button>
        <button class="ctrl-btn" data-ribbon="ribbon3" data-action="remove">Remove</button>
      </div>
    </div>

    <footer class="footer">
      <p>Part of the <a href="https://github.com/anomalyco/EaseMotion-css" target="_blank">EaseMotion-css</a> collection</p>
    </footer>
  </div>

  <script src="demo.js"></script>
</body>
</html>
