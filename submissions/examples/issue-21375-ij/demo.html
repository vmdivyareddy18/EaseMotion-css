<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ant March — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="ant-colony">
      <div class="animal ant" style="animation-delay: 0s"></div>
      <div class="animal ant" style="animation-delay: 0.2s"></div>
      <div class="animal ant" style="animation-delay: 0.4s"></div>
      <div class="animal ant" style="animation-delay: 0.6s"></div>
      <div class="animal ant" style="animation-delay: 0.8s"></div>
    </div>
    <p class="label">Ants Marching</p>
  </div>
</body>
</html>
