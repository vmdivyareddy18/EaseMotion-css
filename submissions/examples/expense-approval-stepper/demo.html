<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Approval Stepper Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="expense-stepper-card">
    <div style="margin-bottom: 1.75rem;">
      <h4 style="margin: 0 0 4px 0; color: #0f172a; font-size: 1.25rem;">Disbursement Lifecycle Track</h4>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem;">Audit pipeline progression for operational claim verification profiles.</p>
    </div>

    <div class="ease-stepper-track">
      <div class="ease-step-node completed">
        <div class="ease-step-marker">✓</div>
        <div class="ease-step-label">Submitted</div>
      </div>

      <div class="ease-step-node active">
        <div class="ease-step-marker">2</div>
        <div class="ease-step-label">Manager Review</div>
      </div>

      <div class="ease-step-node">
        <div class="ease-step-marker">3</div>
        <div class="ease-step-label">Finance Audit</div>
      </div>

      <div class="ease-step-node">
        <div class="ease-step-marker">4</div>
        <div class="ease-step-label">Disbursement</div>
      </div>
    </div>

    <div class="report-details-panel">
      <div class="meta-row">
        <span style="color: #64748b; font-weight: 500;">Claim ID:</span>
        <span style="font-family: monospace; font-weight: 700; color: #1e293b;">EXP-2026-9041</span>
      </div>
      <div class="meta-row">
        <span style="color: #64748b; font-weight: 500;">Total Capital Volume:</span>
        <span style="font-weight: 700; color: #2563eb;">$1,420.50 USD</span>
      </div>
      <div class="meta-row">
        <span style="color: #64748b; font-weight: 500;">Current Bottleneck Allocation:</span>
        <span style="font-weight: 600; color: #d97706;">Pending Line-Manager Signature</span>
      </div>
    </div>
  </div>

</body>
</html>
