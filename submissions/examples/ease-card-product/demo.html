<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Card Product</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="products">

    <article class="ease-card-product">

        <div class="product-image">

            <img
                src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600"
                alt="Running Shoes">

            <div class="quick-view">
                <button class="ease-btn">Quick View</button>
            </div>

        </div>

        <div class="product-content">

            <h3>Running Shoes</h3>

            <div class="ease-rating-stars">
                ★★★★★
            </div>

            <p class="price">$89.99</p>

            <button class="ease-btn">
                Add to Cart
            </button>

        </div>

    </article>

</div>

</body>
</html>
