<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Perspective Carousel</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="carousel-container">
    <header class="carousel-header">
      <h1>3D Perspective Showcase</h1>
      <p>A rotating 3D gallery highlighting structural animations, card depth details, and smooth transitions.</p>
    </header>

    <div class="carousel-perspective">
      <div class="carousel-track" id="track">
        <div class="carousel-card card-1" style="--rot: 0deg;" tabindex="0">
          <h3>Nebula Deck</h3>
        </div>
        <div class="carousel-card card-2" style="--rot: 120deg;" tabindex="0">
          <h3>Supernova</h3>
        </div>
        <div class="carousel-card card-3" style="--rot: 240deg;" tabindex="0">
          <h3>Galaxy</h3>
        </div>
      </div>
    </div>

    <div class="nav-controls">
      <button class="nav-btn" id="prevBtn" aria-label="Previous card">Previous</button>
      <button class="nav-btn" id="nextBtn" aria-label="Next card">Next</button>
    </div>
  </main>

  <script>
    const track = document.getElementById('track');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    let angle = 0;

    nextBtn.addEventListener('click', () => {
      angle -= 120;
      track.style.transform = `translateZ(-250px) rotateY(${angle}deg)`;
    });

    prevBtn.addEventListener('click', () => {
      angle += 120;
      track.style.transform = `translateZ(-250px) rotateY(${angle}deg)`;
    });
  </script>
</body>
</html>
