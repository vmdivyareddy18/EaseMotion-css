<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rating Star Bar</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="rating-wrapper">

    <h1>Rate this Demo</h1>

    <div
        class="rating"
        role="radiogroup"
        aria-label="Rating">

        <button class="star" data-value="1" aria-label="1 Star">★</button>
        <button class="star" data-value="2" aria-label="2 Stars">★</button>
        <button class="star" data-value="3" aria-label="3 Stars">★</button>
        <button class="star" data-value="4" aria-label="4 Stars">★</button>
        <button class="star" data-value="5" aria-label="5 Stars">★</button>

    </div>

    <p id="ratingText">Select a rating</p>

</div>

<script>

const stars = document.querySelectorAll(".star");
const text = document.getElementById("ratingText");

let currentRating = 0;

function paint(rating){

    stars.forEach((star,index)=>{

        star.classList.toggle("active",index<rating);

    });

}

stars.forEach((star)=>{

    star.addEventListener("mouseenter",()=>{

        paint(Number(star.dataset.value));

    });

    star.addEventListener("mouseleave",()=>{

        paint(currentRating);

    });

    star.addEventListener("click",()=>{

        currentRating=Number(star.dataset.value);

        paint(currentRating);

        text.textContent=`Rating: ${currentRating}/5`;

        star.classList.remove("burst");

        void star.offsetWidth;

        star.classList.add("burst");

    });

    star.addEventListener("keydown",(e)=>{

        if(e.key==="Enter" || e.key===" "){

            e.preventDefault();

            star.click();

        }

    });

});

</script>

</body>
</html>
