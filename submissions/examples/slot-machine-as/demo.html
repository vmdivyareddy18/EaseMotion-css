<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slot Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="slot">
    <div class="slot-marquee">JACKPOT</div>

    <div class="slot-window">
      <div class="reel">
        <span class="strip r1"><i>7</i><i>&#9733;</i><i>&#9830;</i><i>7</i><i>&#9733;</i><i>7</i></span>
      </div>
      <div class="reel">
        <span class="strip r2"><i>&#9830;</i><i>7</i><i>&#9733;</i><i>7</i><i>&#9830;</i><i>7</i></span>
      </div>
      <div class="reel">
        <span class="strip r3"><i>&#9733;</i><i>7</i><i>&#9830;</i><i>7</i><i>&#9733;</i><i>7</i></span>
      </div>
    </div>

    <div class="slot-foot">
      <span class="credits">CREDIT <b>888</b></span>
      <span class="bet">BET 3</span>
    </div>

    <div class="lever">
      <span class="lever-stick"></span>
      <span class="lever-ball"></span>
    </div>
  </div>
</body>
</html>
