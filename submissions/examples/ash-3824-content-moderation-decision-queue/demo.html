<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Moderation Decision Queue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Moderation Queue</h1>

    <p class="subtitle">
        Review reported content and take moderation actions.
    </p>

    <div class="queue">

        <div class="card">

            <div class="severity high">
                High Risk
            </div>

            <div class="content">

                <h3>Reported Comment</h3>

                <p>
                    Flagged for abusive language by multiple users.
                </p>

            </div>

            <div class="actions">

                <button class="approve">
                    Approve
                </button>

                <button class="reject">
                    Remove
                </button>

            </div>

        </div>

        <div class="card">

            <div class="severity medium">
                Medium Risk
            </div>

            <div class="content">

                <h3>Image Submission</h3>

                <p>
                    Awaiting manual review for policy compliance.
                </p>

            </div>

            <div class="actions">

                <button class="approve">
                    Approve
                </button>

                <button class="reject">
                    Reject
                </button>

            </div>

        </div>

        <div class="card">

            <div class="severity low">
                Low Risk
            </div>

            <div class="content">

                <h3>Profile Update</h3>

                <p>
                    Requires verification before publication.
                </p>

            </div>

            <div class="actions">

                <button class="approve">
                    Publish
                </button>

                <button class="reject">
                    Hold
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
