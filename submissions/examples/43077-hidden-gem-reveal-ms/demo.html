<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Gem Reveal Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #050505; font-family: 'Inter', sans-serif;">

  <div class="ease-gem-container">
    
    <!-- The Hidden Gem (revealed on hover) -->
    <div class="ease-gem-revealed">
      <div class="ease-gem-glow"></div>
      <svg class="ease-gem-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 2 7 12 22 22 7 12 2"></polygon>
        <polyline points="2 7 12 7 22 7"></polyline>
        <polyline points="12 22 12 7"></polyline>
        <polyline points="12 2 6 7 12 22"></polyline>
        <polyline points="12 2 18 7 12 22"></polyline>
      </svg>
      <h3 class="ease-gem-title">Rare Sapphire</h3>
      <p class="ease-gem-desc">You uncovered a legendary artifact.</p>
    </div>

    <!-- The Cover (hides the gem initially) -->
    <div class="ease-gem-cover">
      <svg class="ease-cover-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="7 10 12 15 17 10"></polyline>
        <line x1="12" y1="15" x2="12" y2="3"></line>
      </svg>
      <span class="ease-cover-text">Hover to unearth</span>
    </div>

  </div>

</body>
</html>
