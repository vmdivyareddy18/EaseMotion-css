<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-blur-in-right</title>
  <meta name="description" content="A demonstration of the ease-blur-in-right animation showing an element blurring in and translating in from the right.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-blur-in-right</h1>
      <p class="subtitle" id="main-desc">Blurs in smoothly while translating from the right side</p>
    </header>

    <div class="display-area">
      <!-- Target that blurs in from right -->
      <div class="blur-target ease-blur-in-right" id="target-element">
        <span class="arrow-icon">←</span>
        <span>Slide In</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Animation</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-blur-in-right');
      void target.offsetWidth;
      target.classList.add('ease-blur-in-right');
    }
  </script>

</body>
</html>
