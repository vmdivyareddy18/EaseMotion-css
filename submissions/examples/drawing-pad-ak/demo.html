<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawing Pad - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dp-wrapper">

    <h1>Drawing Pad</h1>

    <div class="dp-toolbar">
      <input type="color" id="brushColor" value="#6366f1" class="color-picker">
      <input type="range" id="brushSize" min="1" max="20" value="4" class="size-slider">
      <span class="size-label" id="sizeLabel">4px</span>
      <button class="tool-btn" id="eraserBtn">Eraser</button>
      <button class="tool-btn" id="clearBtn">Clear</button>
      <button class="tool-btn" id="saveBtn">Save</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="drawCanvas" width="600" height="400"></canvas>
    </div>

  </div>

  <script>
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const colorPicker = document.getElementById('brushColor');
    const sizeSlider = document.getElementById('brushSize');
    const sizeLabel = document.getElementById('sizeLabel');
    const eraserBtn = document.getElementById('eraserBtn');
    const clearBtn = document.getElementById('clearBtn');
    const saveBtn = document.getElementById('saveBtn');

    let drawing = false;
    let isEraser = false;
    let lastX, lastY;

    ctx.fillStyle = '#0f0f0f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX || e.touches[0].clientX) - rect.left;
      const y = (e.clientY || e.touches[0].clientY) - rect.top;
      return { x, y };
    }

    function startDrawing(e) {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      lastX = pos.x; lastY = pos.y;
    }

    function draw(e) {
      e.preventDefault();
      if (!drawing) return;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.strokeStyle = isEraser ? '#0f0f0f' : colorPicker.value;
      ctx.lineWidth = parseInt(sizeSlider.value);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.stroke();
      lastX = pos.x; lastY = pos.y;
    }

    function stopDrawing() { drawing = false; }

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseleave', stopDrawing);
    canvas.addEventListener('touchstart', startDrawing);
    canvas.addEventListener('touchmove', draw);
    canvas.addEventListener('touchend', stopDrawing);

    sizeSlider.addEventListener('input', () => {
      sizeLabel.textContent = sizeSlider.value + 'px';
    });

    eraserBtn.addEventListener('click', () => {
      isEraser = !isEraser;
      eraserBtn.classList.toggle('active');
      eraserBtn.textContent = isEraser ? 'Draw' : 'Eraser';
    });

    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    saveBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = 'drawing.png';
      link.href = canvas.toDataURL();
      link.click();
    });
  </script>

</body>
</html>
