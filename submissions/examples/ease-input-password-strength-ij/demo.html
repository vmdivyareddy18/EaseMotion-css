<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Meter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ips-container">
    <h1>Password Strength</h1>
    <div class="ips-field">
      <label for="ips-input">Enter password</label>
      <input type="password" id="ips-input" class="ips-input" placeholder="Create a strong password" autocomplete="new-password">
      <div class="ips-bar-track">
        <div class="ips-bar" id="ips-bar"></div>
      </div>
      <div class="ips-footer">
        <span class="ips-label" id="ips-label">Type to begin</span>
        <span class="ips-score" id="ips-score">0 / 4</span>
      </div>
      <ul class="ips-tips" id="ips-tips">
        <li data-criteria="length">At least 8 characters</li>
        <li data-criteria="lower">Contains lowercase letter</li>
        <li data-criteria="upper">Contains uppercase letter</li>
        <li data-criteria="number">Contains a number</li>
        <li data-criteria="symbol">Contains a symbol</li>
      </ul>
    </div>
  </div>

  <script>
    const input = document.getElementById('ips-input');
    const bar = document.getElementById('ips-bar');
    const label = document.getElementById('ips-label');
    const score = document.getElementById('ips-score');
    const tips = document.querySelectorAll('#ips-tips li');

    function checkStrength(val) {
      const checks = [
        val.length >= 8,
        /[a-z]/.test(val),
        /[A-Z]/.test(val),
        /[0-9]/.test(val),
        /[^a-zA-Z0-9]/.test(val)
      ];

      const passed = checks.filter(Boolean).length;
      const strength = Math.min(passed, 4);

      tips.forEach((tip, i) => {
        tip.classList.toggle('ips-met', checks[i]);
      });

      return strength;
    }

    function getStrengthConfig(strength) {
      if (strength === 0) return { pct: 0,   color: 'var(--ips-weak)',     text: 'Very weak' };
      if (strength === 1) return { pct: 25,  color: 'var(--ips-weak)',     text: 'Weak' };
      if (strength === 2) return { pct: 50,  color: 'var(--ips-medium)',   text: 'Fair' };
      if (strength === 3) return { pct: 75,  color: 'var(--ips-strong)',   text: 'Strong' };
      return { pct: 100, color: 'var(--ips-strong)', text: 'Very strong' };
    }

    function updateStrength() {
      const val = input.value;
      const strength = val.length === 0 ? 0 : checkStrength(val);
      const cfg = getStrengthConfig(strength);

      bar.style.setProperty('--ips-bar-width', cfg.pct + '%');
      bar.style.setProperty('--ips-bar-color', cfg.color);
      label.textContent = val.length === 0 ? 'Type to begin' : cfg.text;
      score.textContent = `${strength} / 4`;
    }

    input.addEventListener('input', updateStrength);
    updateStrength();
  </script>
</body>
</html>
