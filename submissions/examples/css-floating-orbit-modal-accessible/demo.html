<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Floating Orbit Modal</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<input type="checkbox" id="modal-toggle" hidden>

<div class="container">

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

    <div class="overlay">

        <div
            class="modal"
            role="dialog"
            aria-labelledby="modal-title"
            aria-modal="true">

            <span class="orbit orbit1"></span>
            <span class="orbit orbit2"></span>
            <span class="orbit orbit3"></span>

            <h2 id="modal-title">
                Floating Orbit Modal
            </h2>

            <p>
                A modern CSS-only modal featuring floating motion,
                orbit animations, accessibility and responsive layout.
            </p>

            <label
                for="modal-toggle"
                class="close-btn">

                Close

            </label>

        </div>

    </div>

</div>

</body>
</html>
