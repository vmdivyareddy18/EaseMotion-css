<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="profile-dashboard">
        <div class="profile-card">
            <div class="avatar">RC</div>
            <h2>Richa Chauhan</h2>
            <p>Frontend Developer</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Projects</h3>
                <span>24</span>
            </div>

            <div class="stat-card">
                <h3>Followers</h3>
                <span>1.2K</span>
            </div>

            <div class="stat-card">
                <h3>Contributions</h3>
                <span>320</span>
            </div>
        </div>

        <div class="achievement-section">
            <h3>Achievements</h3>

            <div class="badges">
                <span class="badge">🏆 Top Contributor</span>
                <span class="badge">⭐ Open Source</span>
                <span class="badge">🚀 Fast Learner</span>
            </div>
        </div>

        <div class="activity-card">
            <h3>Recent Activity</h3>
            <ul>
                <li>Opened PR #13417</li>
                <li>Completed dashboard component</li>
                <li>Updated documentation</li>
            </ul>
        </div>
    </section>
</body>
</html>
