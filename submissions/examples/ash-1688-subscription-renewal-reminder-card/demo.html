<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Renewal Reminder Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="renewal-card">

        <div class="badge">
            Renewal Due Soon
        </div>

        <div class="icon">
            🔔
        </div>

        <h1>Premium Plan</h1>

        <p class="description">
            Your subscription renews automatically in
            <strong>7 days</strong>.
        </p>

        <div class="countdown">

            <div class="count-box">
                <span>07</span>
                <small>Days</small>
            </div>

            <div class="count-box">
                <span>12</span>
                <small>Hours</small>
            </div>

            <div class="count-box">
                <span>44</span>
                <small>Minutes</small>
            </div>

        </div>

        <div class="billing-section">

            <div class="row">
                <span>Plan</span>
                <strong>Premium Annual</strong>
            </div>

            <div class="row">
                <span>Renewal Date</span>
                <strong>July 28, 2026</strong>
            </div>

            <div class="row">
                <span>Amount</span>
                <strong>$129.00</strong>
            </div>

            <div class="row">
                <span>Auto Renew</span>
                <strong class="enabled">
                    Enabled
                </strong>
            </div>

        </div>

        <div class="progress-section">

            <div class="progress-header">
                <span>Renewal Progress</span>
                <span>82%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="actions">

            <button class="renew-btn">
                Renew Now
            </button>

            <button class="manage-btn">
                Manage Plan
            </button>

        </div>

    </div>

</div>

</body>
</html>
