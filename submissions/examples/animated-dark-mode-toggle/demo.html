<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dark Mode Toggle - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Theme Wrapper (Contains the checkbox hack) -->
  <div class="theme-wrapper">
    <!-- Hidden Checkbox -->
    <input type="checkbox" id="theme-toggle" class="sr-only">

    <!-- Background Stars (Visible only in Dark Mode) -->
    <div class="stars-bg">
      <span class="star star-1 ease-pulse"></span>
      <span class="star star-2 ease-pulse ease-delay-200"></span>
      <span class="star star-3 ease-pulse ease-delay-400"></span>
      <span class="star star-4 ease-pulse ease-delay-600"></span>
      <span class="star star-5 ease-pulse ease-delay-800"></span>
    </div>

    <!-- Main Content -->
    <div class="container">
      <header class="header ease-fade-in-down">
        <h1>Choose Your Theme</h1>
        <p>Toggle the switch below to see the magic happen.</p>
      </header>

      <div class="toggle-card ease-zoom-in ease-delay-200">
        <!-- The Toggle Switch -->
        <label class="theme-switch" for="theme-toggle">
          <span class="slider-track">
            <span class="slider-knob">
              <span class="icon sun">🌞</span>
              <span class="icon moon">🌙</span>
            </span>
          </span>
        </label>
        
        <!-- Card Content -->
        <div class="card-content">
          <h2>Adaptive UI Design</h2>
          <p>This card smoothly transitions between light and dark modes. Notice how the background colors, text, and even the twinkling stars in the background animate seamlessly without any JavaScript.</p>
          <button class="btn ease-hover-grow">Explore Features</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
