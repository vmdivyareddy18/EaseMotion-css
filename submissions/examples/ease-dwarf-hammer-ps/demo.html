<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Dwarf Hammer Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #27272a;
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }
    
    .demo-hammer {
      font-size: 6rem;
      cursor: pointer;
      display: inline-block;
      /* Adjust rotation point to the handle base */
      transform-origin: bottom left; 
    }
    
    .instruction {
      color: #d4d4d8;
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>
  
  <p class="instruction">Hover over the hammer to trigger the Dwarf Smash!</p>

  <div class="ease-dwarf-hammer-hover-ps demo-hammer">
    🔨
  </div>

</body>
</html>
