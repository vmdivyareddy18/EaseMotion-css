<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Pop Product Card - Finance Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-grid">
    <!-- Premium Card Instance -->
    <div class="product-card premium">
      <div class="badge">Trending</div>
      <div class="icon-container">
        <svg xmlns="http://w3.org" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="finance-icon">
          <line x1="12" y1="1" x2="12" y2="23"></line>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
        </svg>
      </div>
      <h3 class="product-title">Alpha Yield Fund</h3>
      <p class="product-desc">High-frequency algorithmic trading asset with automated hedging strategies.</p>
      
      <div class="metrics">
        <div class="metric-item">
          <span class="label">Target APY</span>
          <span class="value green">+14.2%</span>
        </div>
        <div class="metric-item">
          <span class="label">Risk Profile</span>
          <span class="value">Moderate</span>
        </div>
      </div>

      <button class="action-btn">Invest Now</button>
    </div>
  </div>

</body>
</html>
