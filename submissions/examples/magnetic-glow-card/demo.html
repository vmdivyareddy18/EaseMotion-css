<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Glow Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card-scene">
    <div class="magnetic-card">
      <div class="card-inner">

        <!-- Floating particles (shown on hover) -->
        <div class="particles">
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
          <span class="particle"></span>
        </div>

        <div class="card-icon">⚡</div>
        <h2 class="card-title">Magnetic Glow Card</h2>
        <p class="card-desc">
          Hover to activate the magnetic lift, gradient border glow,
          and ambient floating particle trail — all pure CSS.
        </p>
        <span class="card-badge">EaseMotion CSS</span>

      </div>
    </div>
  </div>

</body>
</html>
