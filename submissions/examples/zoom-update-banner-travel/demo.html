<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Update Banner - Travel App Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="travel-viewport">
        <div class="zoom-banner-card">
            <div class="banner-bg-zoom"></div>
            <div class="banner-glass-shield"></div>
            
            <div class="banner-layout">
                <div class="banner-badge-row">
                    <span class="travel-badge">FLIGHT FLUIDITY // ITINERARY UPDATE</span>
                </div>
                
                <div class="banner-core-message">
                    <h3>GATE ROUTING ADJUSTED</h3>
                    <p>Terminal 3 transit access structures have updated dynamically. Your connection pipeline now boards via Concourse E West Gates.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
