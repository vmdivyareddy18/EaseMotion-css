<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting Scheduler Card — EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" style="--card-bg: #1e1e32; --slot-hover-bg: #2d2d4a; --selected-color: #7c5cfc; --select-duration: 0.25s;">
    <div class="scheduler">
      <div class="header">
        <h2>Schedule Meeting</h2>
        <span class="date">Mon, Jul 6</span>
      </div>
      <div class="time-slots" id="timeSlots">
        <button class="slot">09:00</button>
        <button class="slot">09:30</button>
        <button class="slot">10:00</button>
        <button class="slot">10:30</button>
        <button class="slot">11:00</button>
        <button class="slot">11:30</button>
        <button class="slot">13:00</button>
        <button class="slot">13:30</button>
        <button class="slot">14:00</button>
        <button class="slot">14:30</button>
        <button class="slot">15:00</button>
        <button class="slot">15:30</button>
      </div>
      <div class="actions">
        <span class="selected-display" id="selectedDisplay">No slot selected</span>
        <button class="confirm-btn" id="confirmBtn" disabled>Confirm</button>
      </div>
    </div>
  </div>
  <script>
    const slots = document.querySelectorAll('.slot');
    const display = document.getElementById('selectedDisplay');
    const confirm = document.getElementById('confirmBtn');
    slots.forEach(s => s.addEventListener('click', () => {
      slots.forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
      display.textContent = 'Selected: ' + s.textContent;
      confirm.disabled = false;
    }));
    confirm.addEventListener('click', () => {
      const sel = document.querySelector('.slot.selected');
      if (sel) { display.textContent = 'Meeting at ' + sel.textContent + ' confirmed!'; }
    });
  </script>
</body>
</html>
