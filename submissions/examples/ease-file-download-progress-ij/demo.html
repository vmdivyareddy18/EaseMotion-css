<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Download Progress</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>File Download Progress</h1>
  <div class="fd-container">
    <div class="fd-bar">
      <div class="fd-bar-fill" id="barFill"></div>
    </div>
    <p class="fd-status" id="status">Ready</p>
    <button class="fd-btn" id="downloadBtn">Download</button>
  </div>
  <script>
    (function() {
      const btn = document.getElementById('downloadBtn');
      const barFill = document.getElementById('barFill');
      const status = document.getElementById('status');
      let active = false;
      let frame = null;
      let progress = 0;

      function animate() {
        progress += Math.random() * 3 + 1;
        if (progress >= 100) {
          progress = 100;
          barFill.style.width = '100%';
          status.textContent = 'Complete!';
          btn.textContent = 'Reset';
          active = false;
          cancelAnimationFrame(frame);
          return;
        }
        barFill.style.width = progress + '%';
        status.textContent = 'Downloading... ' + Math.floor(progress) + '%';
        frame = requestAnimationFrame(animate);
      }

      btn.addEventListener('click', function() {
        if (active) return;
        if (barFill.style.width === '100%' || progress >= 100) {
          progress = 0;
          barFill.style.width = '0%';
          status.textContent = 'Ready';
          btn.textContent = 'Download';
          return;
        }
        active = true;
        btn.textContent = 'Downloading...';
        animate();
      });
    })();
  </script>
</body>
</html>
