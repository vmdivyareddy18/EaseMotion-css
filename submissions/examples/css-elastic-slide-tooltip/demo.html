<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Slide Tooltip - Crypto Exchange</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="crypto-container">

    <h1>Crypto Exchange Dashboard</h1>

    <div class="coins">

        <div class="coin">
            <button class="crypto-btn" aria-describedby="btc-tooltip">
                ₿ BTC
            </button>

            <div class="tooltip" id="btc-tooltip" role="tooltip">
                Bitcoin Price: $68,420
            </div>
        </div>


        <div class="coin">
            <button class="crypto-btn" aria-describedby="eth-tooltip">
                Ξ ETH
            </button>

            <div class="tooltip" id="eth-tooltip" role="tooltip">
                Ethereum Price: $3,620
            </div>
        </div>


        <div class="coin">
            <button class="crypto-btn" aria-describedby="sol-tooltip">
                ◎ SOL
            </button>

            <div class="tooltip" id="sol-tooltip" role="tooltip">
                Solana Price: $170
            </div>
        </div>

    </div>

</section>

</body>
</html>
