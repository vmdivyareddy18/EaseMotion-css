<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noise Texture Generator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="nt-wrapper">

    <h1>Noise Texture Generator</h1>

    <div class="nt-preview" id="preview"></div>

    <div class="nt-controls">
      <div class="nt-field">
        <label>Intensity</label>
        <input type="range" id="intensity" min="0.01" max="1" step="0.01" value="0.5">
      </div>
      <div class="nt-field">
        <label>Color</label>
        <input type="color" id="noiseColor" value="#6366f1">
      </div>
      <div class="nt-field">
        <label>Opacity</label>
        <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.15">
      </div>
      <button class="nt-btn" id="copyCssBtn">Copy CSS</button>
    </div>

    <textarea class="nt-css-output" id="cssOutput" readonly></textarea>

  </div>

  <script>
    const preview = document.getElementById('preview');
    const intensity = document.getElementById('intensity');
    const noiseColor = document.getElementById('noiseColor');
    const opacity = document.getElementById('opacity');
    const output = document.getElementById('cssOutput');
    const copyBtn = document.getElementById('copyCssBtn');

    function generateCSS() {
      const c = noiseColor.value;
      const o = parseFloat(opacity.value);
      const i = parseFloat(intensity.value);

      const steps = Math.round(6 + i * 20);
      const positions = [];
      for (let s = 0; s <= 100; s += Math.round(100 / steps) || 1) {
        const r = Math.random() * 255;
        const g = Math.random() * 255;
        const b = Math.random() * 255;
        positions.push(`rgba(${Math.round(r)},${Math.round(g)},${Math.round(b)},${o}) ${s}%`);
      }

      const css = `.noise-bg {
  position: relative;
}

.noise-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-conic-gradient(${c} 0% 25%, transparent 0% 50%) 0 0 / ${i * 8}px ${i * 8}px,
              repeating-conic-gradient(${c} 0% 25%, transparent 0% 50%) 0 0 / ${i * 4}px ${i * 4}px;
  opacity: ${o};
  mix-blend-mode: overlay;
  pointer-events: none;
}`;

      output.value = css;
      preview.style.background = `repeating-conic-gradient(${c} 0% 25%, transparent 0% 50%) 0 0 / ${i * 8}px ${i * 8}px, repeating-conic-gradient(${c} 0% 25%, transparent 0% 50%) 0 0 / ${i * 4}px ${i * 4}px`;
      preview.style.opacity = o;
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(output.value);
      const t = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = t, 1500);
    });

    intensity.addEventListener('input', generateCSS);
    noiseColor.addEventListener('input', generateCSS);
    opacity.addEventListener('input', generateCSS);
    generateCSS();
  </script>

</body>
</html>
