<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Pricing Grid | EaseMotion-css</title>
    <link rel="stylesheet" href="../../../src/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pricing-container">
        <!-- Card 1: Hobby -->
        <div class="pricing-card ease-fade-in">
            <h3>Hobby</h3>
            <div class="price">$0<span>/mo</span></div>
            <p>Perfect for testing out local layout concepts and personal sandboxes.</p>
            <button class="pricing-btn ease-hover-grow">Get Started</button>
        </div>

        <!-- Card 2: Pro (Featured) -->
        <div class="pricing-card featured ease-zoom-in">
            <div class="badge">Popular</div>
            <h3>Developer Pro</h3>
            <div class="price">$29<span>/mo</span></div>
            <p>Unlock advanced indexing structures, unlimited parsing runs, and API wrappers.</p>
            <button class="pricing-btn ease-hover-grow">Upgrade Now</button>
        </div>

        <!-- Card 3: Enterprise -->
        <div class="pricing-card ease-fade-in">
            <h3>Enterprise</h3>
            <div class="price">$99<span>/mo</span></div>
            <p>Custom micro-service deployments with priority server clustering support.</p>
            <button class="pricing-btn ease-hover-grow">Contact Sales</button>
        </div>
    </div>
</body>
</html>
