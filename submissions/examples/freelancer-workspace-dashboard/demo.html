<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freelancer Workspace Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="workspace">
    <header class="header">
      <div>
        <span class="badge">Freelance Terminal</span>
        <h1>Productivity Studio</h1>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h3>Active Tasks</h3>
        <h2>12 Tasks</h2>
      </div>
      <div class="card">
        <h3>Revenue Month</h3>
        <h2>$4,820.00</h2>
      </div>
    </div>
  </main>
</body>
</html>
