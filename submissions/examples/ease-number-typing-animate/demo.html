<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-number-typing-animate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">EaseMotion CSS · CSS Animation</p>
      <h1>ease-number-typing-animate</h1>
      <p class="hero-copy">A CSS-only number typing animation with a cursor-style blink effect.</p>
    </section>

    <section class="demo-panel">
      <div class="demo-header">
        <h2>Interactive Demo</h2>
        <span class="status-pill">Typing effect preview</span>
      </div>

      <div class="typing-card" aria-label="Number typing animation demo">
        <div class="typing-label">Live counter</div>
        <div class="typing-wrap">
          <span class="typing-number" style="--digits: 8;">127,450</span>
          <span class="typing-cursor" aria-hidden="true"></span>
        </div>
        <p class="typing-note">The number appears like it is being typed, with a blinking cursor at the end.</p>
      </div>

      <div class="typing-grid">
        <div class="mini-card">
          <span class="mini-label">Revenue</span>
          <strong class="mini-number" style="--digits: 7;">48,920</strong>
        </div>
        <div class="mini-card">
          <span class="mini-label">Users</span>
          <strong class="mini-number" style="--digits: 6;">9,804</strong>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
