<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Column Gap – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    h3 { color: #444; margin-bottom: 8px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      background: #e0e7ff;
      border-radius: 8px;
      padding: 16px;
    }
    .flex-row {
      display: flex;
      background: #e0e7ff;
      border-radius: 8px;
      padding: 16px;
    }
    .box {
      background: #4f46e5;
      color: white;
      padding: 12px;
      border-radius: 6px;
      text-align: center;
      font-size: 0.85rem;
      flex: 1;
    }
    .label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

  <h2>Column Gap Utilities</h2>

  <h3>ease-col-gap-2 (8px)</h3>
  <div class="grid ease-col-gap-2">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>

  <h3>ease-col-gap-4 (16px)</h3>
  <div class="grid ease-col-gap-4">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>

  <h3>ease-col-gap-6 (24px)</h3>
  <div class="grid ease-col-gap-6">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>

  <h3>ease-col-gap-8 (32px)</h3>
  <div class="grid ease-col-gap-8">
    <div class="box">Box 1</div>
    <div class="box">Box 2</div>
    <div class="box">Box 3</div>
  </div>

  <h3>Works with Flexbox too</h3>
  <div class="flex-row ease-col-gap-6">
    <div class="box">Flex 1</div>
    <div class="box">Flex 2</div>
    <div class="box">Flex 3</div>
  </div>

</body>
</html>
