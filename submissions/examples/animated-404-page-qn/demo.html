<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="error-container-qn">
        <!-- Floating Elements -->
        <div class="floating-elements-qn">
            <span class="float-el-qn el-1-qn"></span>
            <span class="float-el-qn el-2-qn"></span>
            <span class="float-el-qn el-3-qn"></span>
            <span class="float-el-qn el-4-qn"></span>
            <span class="float-el-qn el-5-qn"></span>
        </div>

        <!-- 404 Illustration -->
        <div class="error-illustration-qn">
            <div class="error-number-qn">
                <span class="num-4-qn">4</span>
                <span class="num-0-qn">
                    <div class="astronaut-qn"></div>
                </span>
                <span class="num-4-qn">4</span>
            </div>
        </div>

        <!-- Error Message -->
        <div class="error-content-qn">
            <h1 class="error-title-qn">Oops! Page Not Found</h1>
            <p class="error-text-qn">The page you're looking for has drifted into deep space. Let's get you back on track.</p>
            <a href="#" class="error-btn-qn">
                <span>Go Home</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>
    </div>
</body>
</html>
