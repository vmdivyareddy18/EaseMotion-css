<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Fade Slide</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Scroll Fade Slide</h1>
  <p>Scroll down to see elements animate in.</p>
  <div class="section">
    <h2 class="fade-up">Fade Up</h2>
    <div class="card fade-up">Cards animate in on scroll</div>
    <div class="card fade-up" style="--anim-delay:0.15s">With configurable delay</div>
    <div class="card fade-up" style="--anim-delay:0.3s">And smooth easing</div>
  </div>
  <div class="section">
    <h2 class="fade-left">Fade In From Left</h2>
    <div class="card fade-left">This card slides in from the left</div>
    <div class="card fade-left">Notice the direction change</div>
  </div>
</div>
<script>
const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.12 });
document.querySelectorAll('.fade-up, .fade-left').forEach(el => observer.observe(el));
</script>
</body></html>
