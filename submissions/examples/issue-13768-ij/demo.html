<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-product-quick-view – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Product Quick View</h1>
    <p class="subtitle">Hover a card to reveal "Quick View" — click to open the modal.</p>
    <div class="product-grid">
      <div class="product-card" data-product="Wireless Headphones" data-price="$79.99" data-emoji="🎧">
        <div class="image-placeholder">🎧</div>
        <h3>Wireless Headphones</h3>
        <span class="price">$79.99</span>
        <button class="quick-view-btn">Quick View</button>
      </div>
      <div class="product-card" data-product="Mechanical Keyboard" data-price="$129.99" data-emoji="⌨️">
        <div class="image-placeholder">⌨️</div>
        <h3>Mechanical Keyboard</h3>
        <span class="price">$129.99</span>
        <button class="quick-view-btn">Quick View</button>
      </div>
      <div class="product-card" data-product="Minimalist Watch" data-price="$249.99" data-emoji="⌚">
        <div class="image-placeholder">⌚</div>
        <h3>Minimalist Watch</h3>
        <span class="price">$249.99</span>
        <button class="quick-view-btn">Quick View</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-img" id="modalImg">🎧</div>
      <h2 id="modalTitle">Product</h2>
      <p class="price" id="modalPrice">$0</p>
      <p class="subtitle" style="margin-bottom:1.5rem;">Premium quality with sleek design. Fast shipping included.</p>
      <button class="close-btn" id="closeModal">Close</button>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalPrice = document.getElementById('modalPrice');
    const closeBtn = document.getElementById('closeModal');

    document.querySelectorAll('.quick-view-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const card = btn.closest('.product-card');
        modalImg.textContent = card.dataset.emoji;
        modalTitle.textContent = card.dataset.product;
        modalPrice.textContent = card.dataset.price;
        overlay.classList.add('active');
      });
    });

    closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('active'); });
  </script>
</body>
</html>
