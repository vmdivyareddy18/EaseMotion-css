<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth Blur Image - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <span class="label-text">Depth Blur Reveal</span>
    <div class="image-wrapper">
      <img
        class="blur-image"
        id="blurImage"
        src="https://picsum.photos/seed/easemotion/800/600"
        alt="Depth blur demo"
        loading="lazy"
      >
    </div>
    <div class="scroll-track" id="scrollTrack">
      <div class="scroll-thumb" id="scrollThumb"></div>
    </div>
    <span class="blur-value" id="blurValue">Blur: 20px</span>
    <div class="scroll-hint">
      <div class="scroll-arrow"></div>
      <span>Drag slider to reveal</span>
    </div>
  </div>

  <script>
    const blurImage = document.getElementById('blurImage');
    const scrollTrack = document.getElementById('scrollTrack');
    const scrollThumb = document.getElementById('scrollThumb');
    const blurValue = document.getElementById('blurValue');
    let isDragging = false;

    function setBlur(fraction) {
      const clamped = Math.max(0, Math.min(1, fraction));
      const blur = Math.round((1 - clamped) * 20);
      blurImage.style.filter = `blur(${blur}px)`;
      scrollThumb.style.left = (clamped * 80) + '%';
      blurValue.textContent = `Blur: ${blur}px`;
      if (clamped >= 0.95) {
        blurImage.classList.add('revealed');
      } else {
        blurImage.classList.remove('revealed');
      }
    }

    function handleMove(clientX) {
      const rect = scrollTrack.getBoundingClientRect();
      const fraction = (clientX - rect.left) / rect.width;
      setBlur(fraction);
    }

    scrollTrack.addEventListener('mousedown', (e) => {
      isDragging = true;
      handleMove(e.clientX);
    });

    document.addEventListener('mousemove', (e) => {
      if (isDragging) handleMove(e.clientX);
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    scrollTrack.addEventListener('touchstart', (e) => {
      isDragging = true;
      handleMove(e.touches[0].clientX);
    });

    document.addEventListener('touchmove', (e) => {
      if (isDragging) handleMove(e.touches[0].clientX);
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    setBlur(0);
  </script>
</body>
</html>
