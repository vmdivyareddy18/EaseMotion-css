<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Investment Growth Chart</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Investment Growth Chart</h1>

  <p class="intro">
    A reusable chart growth animation for investment platforms,
    trading dashboards, fintech apps, and analytics systems.
  </p>

  <div class="demo-grid">

    <div class="chart-card">
      <div class="growth-chart">
        <div class="chart-line"></div>
        <span class="point p1"></span>
        <span class="point p2"></span>
        <span class="point p3"></span>
        <span class="point p4"></span>
      </div>
      <h3>Portfolio Growth</h3>
    </div>

    <div class="chart-card">
      <div class="growth-chart large">
        <div class="chart-line"></div>
        <span class="point p1"></span>
        <span class="point p2"></span>
        <span class="point p3"></span>
        <span class="point p4"></span>
      </div>
      <p>Investment Tracking</p>
    </div>

    <div class="chart-card">
      <div class="growth-chart">
        <div class="chart-line"></div>
        <span class="point p1"></span>
        <span class="point p2"></span>
        <span class="point p3"></span>
        <span class="point p4"></span>
      </div>
      <button>View Portfolio</button>
    </div>

  </div>

</main>

</body>
</html>
