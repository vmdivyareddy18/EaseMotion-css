<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Text Rendering Utilities</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: Georgia, serif; max-width: 700px; margin: 60px auto; padding: 0 20px; background: #0f172a; color: #f1f5f9; }
    h1 { font-size: 1.4rem; margin-bottom: 30px; }
    .demo-block { font-size: 2rem; margin-bottom: 28px; padding: 16px; border-left: 3px solid #38bdf8; background: #1e293b; }
    code { display: block; font-size: 0.8rem; color: #38bdf8; margin-top: 8px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Ease Text Rendering Utilities</h1>
  <div class="demo-block ease-render-auto">AaBbCc — Auto Rendering<code>.ease-render-auto</code></div>
  <div class="demo-block ease-render-optimize-speed">AaBbCc — Optimized for Speed<code>.ease-render-optimize-speed</code></div>
  <div class="demo-block ease-render-optimize-legibility">AaBbCc — Optimized for Legibility<code>.ease-render-optimize-legibility</code></div>
  <div class="demo-block ease-render-geometric-precision" style="transform: scale(1.5); transform-origin: left;">AaBbCc — Geometric Precision<code>.ease-render-geometric-precision</code></div>
</body>
</html>
