<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catapult Date Picker - Glassmorphism</title>
  <link rel="stylesheet" href="style.css">
  <!-- Simulating EaseMotion CSS Core variables and keyframes locally for pure CSS execution -->
  <style>
    :root {
      --ease-in-out-cubic: cubic-bezier(0.645, 0.045, 0.355, 1);
      --ease-bounce: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes ease-catapult {
      0% { transform: translateY(100%) scale(0.3); opacity: 0; }
      70% { transform: translateY(-15%) scale(1.05); opacity: 0.9; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Hidden checkbox to control the state without JavaScript -->
    <input type="checkbox" id="date-picker-toggle" class="toggle-input">
    
    <!-- Trigger Button -->
    <label for="date-picker-toggle" class="trigger-btn">
      <span>📅 Select Target Date</span>
    </label>

    <!-- Glassmorphic Date Picker Modal Container -->
    <div class="date-picker-wrapper">
      <div class="glass-card">
        <div class="calendar-header">
          <label for="date-picker-toggle" class="close-btn">&times;</label>
          <h3>July 2026</h3>
          <p>Catapult Motion Active</p>
        </div>
        
        <!-- Calendar Grid -->
        <div class="calendar-grid">
          <span class="day-name">Su</span>
          <span class="day-name">Mo</span>
          <span class="day-name">Tu</span>
          <span class="day-name">We</span>
          <span class="day-name">Th</span>
          <span class="day-name">Fr</span>
          <span class="day-name">Sa</span>
          
          <!-- Empty slots for alignment -->
          <span></span><span></span><span></span><span></span><span></span><span></span>
          
          <!-- Days -->
          <button class="day-cell">1</button>
          <button class="day-cell">2</button>
          <button class="day-cell">3</button>
          <button class="day-cell">4</button>
          <button class="day-cell">5</button>
          <button class="day-cell">6</button>
          <button class="day-cell">7</button>
          <button class="day-cell">8</button>
          <button class="day-cell">9</button>
          <button class="day-cell active">10</button>
          <button class="day-cell">11</button>
          <button class="day-cell">12</button>
          <button class="day-cell">13</button>
          <button class="day-cell">14</button>
          <button class="day-cell">15</button>
        </div>
        
        <div class="calendar-footer">
          <label for="date-picker-toggle" class="action-btn">Confirm Date</label>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
