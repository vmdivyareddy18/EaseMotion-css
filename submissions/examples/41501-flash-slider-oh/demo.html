<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-flash-slider</title>
  <meta name="description" content="Range slider with flash animation effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-flash-slider</h1>
      <p class="subtitle" id="main-desc">Range slider with flash animation</p>
    </header>

    <div class="display-area">
      
      <div class="slider-showcase">
        
        <!-- Default -->
        <div class="slider-item">
          <label class="slider-label">Default</label>
          <div class="ease-flash-slider">
            <input type="range" class="slider-input" min="0" max="100" value="50">
            <div class="slider-track">
              <div class="slider-fill" style="width: 50%;"></div>
            </div>
            <div class="slider-thumb" style="left: 50%;">
              <div class="thumb-glow"></div>
              <div class="thumb-flash"></div>
            </div>
          </div>
          <div class="slider-value">Value: <span>50</span></div>
        </div>

        <!-- Primary -->
        <div class="slider-item">
          <label class="slider-label">Primary</label>
          <div class="ease-flash-slider ease-flash-primary">
            <input type="range" class="slider-input" min="0" max="100" value="70">
            <div class="slider-track">
              <div class="slider-fill" style="width: 70%;"></div>
            </div>
            <div class="slider-thumb" style="left: 70%;">
              <div class="thumb-glow"></div>
              <div class="thumb-flash"></div>
            </div>
          </div>
          <div class="slider-value">Value: <span>70</span></div>
        </div>

        <!-- Success -->
        <div class="slider-item">
          <label class="slider-label">Success</label>
          <div class="ease-flash-slider ease-flash-success">
            <input type="range" class="slider-input" min="0" max="100" value="85">
            <div class="slider-track">
              <div class="slider-fill" style="width: 85%;"></div>
            </div>
            <div class="slider-thumb" style="left: 85%;">
              <div class="thumb-glow"></div>
              <div class="thumb-flash"></div>
            </div>
          </div>
          <div class="slider-value">Value: <span>85</span></div>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Volume Control Example</h3>
      <div class="volume-control">
        <div class="ease-flash-slider ease-flash-lg ease-flash-primary">
          <input type="range" class="slider-input" id="volumeSlider" min="0" max="100" value="60">
          <div class="slider-track">
            <div class="slider-fill" style="width: 60%;"></div>
          </div>
          <div class="slider-thumb" style="left: 60%;">
            <div class="thumb-glow"></div>
            <div class="thumb-flash"></div>
          </div>
        </div>
        <div class="volume-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </div>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.ease-flash-slider').forEach(slider => {
      const input = slider.querySelector('.slider-input');
      const fill = slider.querySelector('.slider-fill');
      const thumb = slider.querySelector('.slider-thumb');
      const valueDisplay = slider.closest('.slider-item')?.querySelector('.slider-value span');
      
      input.addEventListener('input', () => {
        const value = input.value;
        fill.style.width = value + '%';
        thumb.style.left = value + '%';
        if (valueDisplay) valueDisplay.textContent = value;
        
        thumb.classList.add('is-flashing');
        setTimeout(() => thumb.classList.remove('is-flashing'), 300);
      });
    });
  </script>

</body>
</html>
