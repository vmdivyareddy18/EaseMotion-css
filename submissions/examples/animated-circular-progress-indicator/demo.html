<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Circular Progress Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 class="title">
        Animated Circular Progress Indicators
    </h1>

    <div class="progress-container">

        <!-- Skill 1 -->
        <div class="progress-card">

            <div class="circle progress-90">
                <div class="inner">
                    <span>90%</span>
                </div>
            </div>

            <h2>HTML</h2>
            <p>Frontend Structure</p>

        </div>


        <!-- Skill 2 -->
        <div class="progress-card">

            <div class="circle progress-75">
                <div class="inner">
                    <span>75%</span>
                </div>
            </div>

            <h2>CSS</h2>
            <p>Creative Styling</p>

        </div>


        <!-- Skill 3 -->
        <div class="progress-card">

            <div class="circle progress-60">
                <div class="inner">
                    <span>60%</span>
                </div>
            </div>

            <h2>JavaScript</h2>
            <p>Interactive Experience</p>

        </div>


        <!-- Skill 4 -->
        <div class="progress-card">

            <div class="circle progress-95">
                <div class="inner">
                    <span>95%</span>
                </div>
            </div>

            <h2>Design</h2>
            <p>Modern UI Concepts</p>

        </div>

    </div>

</body>
</html>
