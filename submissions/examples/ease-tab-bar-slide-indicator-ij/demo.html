<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Bar Slide Indicator - EaseMotion CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tbsi-container">
        <h1>Tab Bar Slide Indicator</h1>
        <p class="tbsi-description">Click a tab to see the underline indicator slide to the active item using CSS custom properties.</p>

        <div class="tbsi-tabs" id="tbsiTabs" style="--active-index: 0;">
            <button class="tbsi-tab" data-index="0">Home</button>
            <button class="tbsi-tab" data-index="1">Explore</button>
            <button class="tbsi-tab" data-index="2">Library</button>
            <button class="tbsi-tab" data-index="3">Settings</button>
            <div class="tbsi-indicator"></div>
        </div>

        <p class="tbsi-footer">The indicator position is controlled entirely via <code>--active-index</code> on the container.</p>
    </div>

    <script>
        const tabs = document.getElementById('tbsiTabs');
        const tabButtons = tabs.querySelectorAll('.tbsi-tab');

        tabButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                tabs.style.setProperty('--active-index', btn.getAttribute('data-index'));
            });
        });
    </script>
</body>
</html>
