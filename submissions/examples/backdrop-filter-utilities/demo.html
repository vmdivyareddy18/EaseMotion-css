<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
      justify-content: center;
      font-family: Arial;
      background: url("https://picsum.photos/1200/800") no-repeat center/cover;
    }

    .card {
      width: 180px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      text-align: center;
    }

    /* Optional fallback blur layer for visibility */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
    }
  </style>
</head>

<body>

  <div class="card ease-backdrop-blur-sm">blur-sm</div>
  <div class="card ease-backdrop-blur">blur</div>
  <div class="card ease-backdrop-blur-lg">blur-lg</div>
  <div class="card ease-backdrop-blur-xl">blur-xl</div>

  <div class="card ease-backdrop-grayscale">grayscale</div>

</body>
</html>
