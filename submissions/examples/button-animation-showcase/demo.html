<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Button Animation Showcase</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>EaseMotion Button Showcase</h1>

<div class="buttons">

<button class="btn primary ease-hover-grow">
Primary Button
</button>

<button class="btn secondary ease-fade-in">
Secondary Button
</button>

<button class="btn outline ease-slide-up">
Outline Button
</button>

<button class="btn rounded ease-hover-grow">
Rounded Button
</button>

<button class="btn icon ease-fade-in">
⭐ Icon Button
</button>

</div>

</body>
</html>
