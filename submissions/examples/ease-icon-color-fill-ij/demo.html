<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Color Fill – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-grid">
    <h1 class="demo-title">❤️ Icon Color Fill</h1>
    <div class="card-row">
      <div class="card">
        <h2 class="card-label">Click to fill</h2>
        <div class="icon-wrap morph-fill" id="colorFillIcon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="var(--empty-color)"/>
          </svg>
        </div>
        <div class="controls">
          <label>Icon Size <input type="range" min="32" max="120" value="64" data-prop="--icon-size"></label>
          <label>Fill Color <input type="color" value="#f38ba8" data-prop="--fill-color"></label>
          <label>Empty Color <input type="color" value="#585b70" data-prop="--empty-color"></label>
          <label>Fill Duration <input type="range" min="0.2" max="2" step="0.1" value="0.8" data-prop="--fill-duration"></label>
        </div>
        <p class="hint">Click the heart to toggle the morph fill animation.</p>
      </div>
    </div>
  </main>
  <script>
    const wrap = document.getElementById('colorFillIcon');
    let filled = false;

    document.querySelectorAll('[data-prop]').forEach(input => {
      input.addEventListener('input', () => {
        const val = input.type === 'color' ? input.value : input.type === 'range' && input.step === '0.1' ? input.value + 's' : input.value + 'px';
        wrap.style.setProperty(input.dataset.prop, val);
      });
    });

    wrap.addEventListener('click', () => {
      filled = !filled;
      wrap.classList.toggle('is-filled', filled);
    });
  </script>
</body>
</html>
