<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gooey Floating Action Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>CSS-only Gooey Floating Action Menu</h1>
    <p>Click the floating button.</p>
</div>
<div class="fab-container">
    <input type="checkbox" id="fab-toggle">
    <label for="fab-toggle" class="fab"> + </label>
    <div class="fab-menu">
        <a href="#" class="item">🏠</a>
        <a href="#" class="item">❤️</a>
        <a href="#" class="item">📧</a>
        <a href="#" class="item">⚙️</a>
    </div>
</div>
</body>
</html>
