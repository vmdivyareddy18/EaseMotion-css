<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heartbeat Voice Recorder - Creative Agency Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="creative-viewport">
        <div class="recorder-card">
            <span class="studio-tag">STUDIO // CAPTURE_MODE</span>
            
            <div class="pulse-engine-container">
                <div class="pulse-wave wave-1" style="--wave-delay: 0s;"></div>
                <div class="pulse-wave wave-2" style="--wave-delay: 0.8s;"></div>
                <div class="pulse-wave wave-3" style="--wave-delay: 1.6s;"></div>
                
                <button class="recorder-core-node" aria-label="Toggle Recording">
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
                        <line x1="12" x2="12" y1="19" y2="22"/>
                    </svg>
                </button>
            </div>
            
            <div class="recorder-metadata">
                <span class="duration-counter">00:04:22</span>
                <p class="stream-status">STREAMING LIVE AUDIO NODE...</p>
            </div>
        </div>
    </div>

</body>
</html>
