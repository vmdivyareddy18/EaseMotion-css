<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Landing Page Neon Glow Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="marketing-container">
        <div class="feature-wrapper">
            <span class="feature-intro">NEXT-GEN TECH</span>

            <div class="tooltip-wrapper">
                <button class="marketing-glow-btn" aria-describedby="marketing-neon-tooltip">
                    AI-Driven Analytics
                </button>

                <div id="marketing-neon-tooltip" class="marketing-tooltip" role="tooltip">
                    <span class="tooltip-neon-bar"></span>
                    <span class="tooltip-tag">Instant Optimization</span>
                    <p class="tooltip-body">Processes over 10M datapoints per second to deliver automated performance
                        enhancements live.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
