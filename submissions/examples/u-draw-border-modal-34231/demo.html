<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Draw Border Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Accessible Web

</span>

<h1>

Draw-Border Modal

</h1>

<p>

Accessible modal component
featuring a smooth draw-border
animation for modern web
interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="icon">

♿

</div>

<h2>

Accessible Experience

</h2>

<p>

A fully responsive modal with
animated border drawing,
keyboard accessibility and
customizable CSS variables.

</p>

<button>

Continue

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
