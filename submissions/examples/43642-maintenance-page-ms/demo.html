<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful Maintenance Page Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif;">
  
  <div class="ease-maintenance-wrapper">
    <!-- Animated background shapes -->
    <div class="ease-maintenance-bg-shape ease-maintenance-shape-1"></div>
    <div class="ease-maintenance-bg-shape ease-maintenance-shape-2"></div>
    
    <!-- Main content -->
    <div class="ease-maintenance-content">
      <div class="ease-maintenance-icon">⚙️</div>
      <h1 class="ease-maintenance-title">We're improving our <span>system</span></h1>
      <p class="ease-maintenance-desc">We are currently performing scheduled maintenance to upgrade our infrastructure and bring you a better experience. We'll be back shortly!</p>
      
      <div class="ease-maintenance-badge">
        <span class="ease-maintenance-dot"></span>
        Estimated downtime: 2 hours
      </div>
    </div>
  </div>

</body>
</html>
