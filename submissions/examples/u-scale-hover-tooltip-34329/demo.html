<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Scale Hover Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Accessible UI

</span>

<h1>

Scale Hover Tooltip

</h1>

<p>

Responsive and keyboard-friendly
tooltip designed for accessible
web experiences.

</p>

<div class="tooltip-wrapper">

<button

class="trigger"

aria-describedby="tooltip"

>

Learn More

</button>

<div

id="tooltip"

class="tooltip"

role="tooltip"

>

<h3>

Accessibility First

</h3>

<p>

Smooth scaling tooltip with
enhanced focus states and
high contrast visuals.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
