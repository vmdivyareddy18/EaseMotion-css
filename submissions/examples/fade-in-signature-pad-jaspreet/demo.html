<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In Signature Pad Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="signature-card ease-fade-in" role="form" aria-labelledby="form-title">
        <h2 id="form-title">Sign Agreement</h2>
        
        <div class="signature-container" role="group" aria-label="Signature Capture Area">
            <div class="signature-pad" tabindex="0" aria-label="Signature pad">
                <span class="signature-placeholder">Sign here</span>
            </div>
        </div>

        <div class="input-group">
            <label for="full-name">Full Name</label>
            <input type="text" id="full-name" placeholder="Jaspreet Kaur" required aria-required="true">
        </div>

        <div class="action-buttons">
            <button type="button" class="btn btn-secondary">Clear</button>
            <a href="#" class="btn btn-primary">Submit</a>
        </div>
    </div>

</body>
</html>
