<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Step Wizard Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 2.5rem;
      padding: 2rem;
      box-sizing: border-box;
    }

    h1 { margin-bottom: 0.25rem; text-align: center; }
    p  { color: #64748b; text-align: center; margin-bottom: 0; }

    .card {
      background: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.07);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 680px;
    }

    /* Step content panel */
    .step-content {
      margin-top: 2rem;
      padding: 1.5rem;
      background-color: #f8f7ff;
      border: 1.5px solid #ede9fe;
      border-radius: 0.75rem;
      color: #4338ca;
      font-size: 0.9375rem;
      line-height: 1.6;
    }

    .step-content h3 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
    }

    .step-content p { color: #6d28d9; margin: 0; text-align: left; }

    /* Nav buttons */
    .step-nav {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
    }

    .btn {
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background-color 0.2s, opacity 0.2s;
    }

    .btn-outline {
      background: transparent;
      border: 1.5px solid #e2e8f0;
      color: #64748b;
    }

    .btn-outline:hover { background: #f1f5f9; }

    .btn-primary {
      background: #6c63ff;
      color: #ffffff;
    }

    .btn-primary:hover { background: #4b44cc; }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Step Wizard</h1>
  <p>A 4-step progress stepper with animated transitions. Pure CSS states, minimal JS for navigation.</p>

  <div class="card">
    <!-- Stepper -->
    <ol class="stepper" id="stepper" aria-label="Checkout progress">
      <li class="step completed" id="step-1">
        <div class="step-circle" aria-label="Step 1 completed">✓</div>
        <span class="step-label">Cart</span>
      </li>
      <li class="step completed" id="step-2">
        <div class="step-circle" aria-label="Step 2 completed">✓</div>
        <span class="step-label">Shipping</span>
      </li>
      <li class="step active" id="step-3">
        <div class="step-circle" aria-current="step">3</div>
        <span class="step-label">Payment</span>
      </li>
      <li class="step" id="step-4">
        <div class="step-circle">4</div>
        <span class="step-label">Confirm</span>
      </li>
    </ol>

    <!-- Content area -->
    <div class="step-content" id="step-content">
      <h3>💳 Payment Details</h3>
      <p>Enter your card information to complete your purchase. Your data is secure and encrypted.</p>
    </div>

    <!-- Navigation -->
    <div class="step-nav">
      <button class="btn btn-outline" id="btn-back" onclick="navigate(-1)">← Back</button>
      <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <script>
    const steps = [
      { label: "🛒 Your Cart",       text: "Review the items in your cart before proceeding to checkout." },
      { label: "📦 Shipping Address", text: "Enter your delivery address and choose a shipping method." },
      { label: "💳 Payment Details",  text: "Enter your card information to complete your purchase. Your data is secure and encrypted." },
      { label: "✅ Order Confirmed!", text: "Your order has been placed successfully. A confirmation email will be sent shortly." }
    ];

    let current = 2; // 0-indexed, starts at step 3

    function navigate(dir) {
      const next = current + dir;
      if (next < 0 || next >= steps.length) return;
      current = next;
      render();
    }

    function render() {
      document.getElementById('step-content').innerHTML =
        `<h3>${steps[current].label}</h3><p>${steps[current].text}</p>`;

      document.getElementById('btn-back').disabled = current === 0;
      document.getElementById('btn-next').disabled = current === steps.length - 1;
      document.getElementById('btn-next').textContent = current === steps.length - 1 ? '✓ Done' : 'Next →';

      for (let i = 0; i < steps.length; i++) {
        const el = document.getElementById(`step-${i + 1}`);
        const circle = el.querySelector('.step-circle');
        el.className = 'step';
        if (i < current) {
          el.classList.add('completed');
          circle.textContent = '✓';
          circle.removeAttribute('aria-current');
        } else if (i === current) {
          el.classList.add('active');
          circle.textContent = i + 1;
          circle.setAttribute('aria-current', 'step');
        } else {
          circle.textContent = i + 1;
          circle.removeAttribute('aria-current');
        }
      }
    }

    render();
  </script>
</body>
</html>
