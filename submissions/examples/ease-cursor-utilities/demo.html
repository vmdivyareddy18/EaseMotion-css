<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-cursor Utilities Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      min-height: 100vh;
      background: #f8fafc;
    }
    h2 { color: #7c3aed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }
    .box {
      padding: 1rem 1.5rem;
      background: #fff;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      text-align: center;
      font-size: 0.85rem;
      font-weight: 500;
      color: #334155;
    }
  </style>
</head>
<body>

  <h2>ease-cursor Utilities</h2>
  <p>Hover over each box to see the cursor change</p>

  <div class="grid">
    <div class="box ease-cursor-pointer">pointer</div>
    <div class="box ease-cursor-default">default</div>
    <div class="box ease-cursor-not-allowed">not-allowed</div>
    <div class="box ease-cursor-grab">grab</div>
    <div class="box ease-cursor-grabbing">grabbing</div>
    <div class="box ease-cursor-crosshair">crosshair</div>
    <div class="box ease-cursor-text">text</div>
    <div class="box ease-cursor-none">none</div>
  </div>

</body>
</html>
