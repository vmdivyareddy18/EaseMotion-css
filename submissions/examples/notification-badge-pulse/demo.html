<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Badge with Pulse — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Notification Badge with Pulse</h1>
  <p class="demo-description">
    A lightweight, pure-CSS badge component with a soft expanding pulse
    animation — ideal for unread counts, message indicators, and alerts.
  </p>

  <div class="demo-row">
    <!-- Counter badge -->
    <button class="icon-btn" aria-label="Notifications, 3 unread">
      🔔
      <span class="notif-badge" aria-hidden="true">3</span>
    </button>

    <!-- Dot-only badge (no count) -->
    <button class="icon-btn" aria-label="Messages, unread">
      💬
      <span class="notif-badge notif-dot" aria-hidden="true"></span>
    </button>

    <!-- Themed badge using the .notif-blue class -->
    <button class="icon-btn" aria-label="Alerts, 12 unread">
      ⚠️
      <span class="notif-badge notif-blue" aria-hidden="true">12</span>
    </button>
  </div>
</body>
</html>
