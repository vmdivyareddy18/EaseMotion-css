<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chronos Pulse-Ring Checkbox Demo</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="demo-container">
  <label class="chronos-checkbox-label">
    <input type="checkbox" class="chronos-input">
    <div class="chronos-frame">
      <div class="chronos-core"></div>
      <div class="pulse-ring ring-alpha"></div>
      <div class="pulse-ring ring-beta"></div>
    </div>
    <span class="label-text">Sync Automation Timeline</span>
  </label>
</div>
</body>
</html>
