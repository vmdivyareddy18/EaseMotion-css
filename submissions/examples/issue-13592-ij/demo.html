<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nav Underline Indicator - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Nav Underline Indicator</h1>
    <div class="nav-wrapper">
      <ul class="nav" id="nav">
        <div class="nav-hover-bg" id="hoverBg"></div>
        <li class="nav-item">
          <a class="nav-link active" data-index="0">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-index="1">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-index="2">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-index="3">Portfolio</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" data-index="4">Contact</a>
        </li>
        <div class="nav-indicator" id="indicator"></div>
      </ul>
    </div>
  </div>

  <script>
    const nav = document.getElementById('nav');
    const links = nav.querySelectorAll('.nav-link');
    const indicator = document.getElementById('indicator');
    const hoverBg = document.getElementById('hoverBg');

    function updateIndicator(el) {
      const rect = el.getBoundingClientRect();
      const navRect = nav.getBoundingClientRect();
      indicator.style.left = (rect.left - navRect.left) + 'px';
      indicator.style.width = rect.width + 'px';
      hoverBg.style.left = (rect.left - navRect.left) + 'px';
      hoverBg.style.width = rect.width + 'px';
    }

    function setActive(el) {
      links.forEach(l => l.classList.remove('active'));
      el.classList.add('active');
      updateIndicator(el);
    }

    links.forEach(link => {
      link.addEventListener('click', function(e) {
        setActive(this);
      });
      link.addEventListener('mouseenter', function() {
        updateIndicator(this);
      });
    });

    nav.addEventListener('mouseleave', function() {
      const active = nav.querySelector('.nav-link.active');
      if (active) updateIndicator(active);
    });

    const activeLink = nav.querySelector('.nav-link.active');
    if (activeLink) updateIndicator(activeLink);
  </script>
</body>
</html>
