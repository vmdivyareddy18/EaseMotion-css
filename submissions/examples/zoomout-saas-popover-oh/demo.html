<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Zoom-Out Popover - SaaS Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">SaaS Showcase</span>
      <h1>Zoom-Out Popover</h1>
      <p class="subtitle">SaaS zoom animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="saas-btn" aria-label="More options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="19" cy="12" r="1"/>
            <circle cx="5" cy="12" r="1"/>
          </svg>
          Actions
        </button>
        <div class="zoom-popover" role="tooltip">
          <div class="zoom-header">
            <span class="zoom-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
              </svg>
            </span>
            <div class="zoom-info">
              <h4>Quick Actions</h4>
              <p>Manage your workflow</p>
            </div>
          </div>
          <div class="zoom-actions">
            <a href="#" class="zoom-action" style="--delay: 0s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
              </span>
              <span>Create New</span>
            </a>
            <a href="#" class="zoom-action" style="--delay: 0.05s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </span>
              <span>Search</span>
            </a>
            <a href="#" class="zoom-action" style="--delay: 0.1s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
              </span>
              <span>Projects</span>
            </a>
            <a href="#" class="zoom-action" style="--delay: 0.15s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </span>
              <span>Settings</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Scale</button>
          <div class="zoom-popover scale" role="tooltip"><p>Scale zoom animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Pulse</button>
          <div class="zoom-popover pulse" role="tooltip"><p>Pulse zoom animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Bounce</button>
          <div class="zoom-popover bounce" role="tooltip"><p>Bounce zoom animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-indigo">Indigo</button>
          <div class="zoom-popover theme-indigo" role="tooltip"><p>Indigo SaaS theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-emerald">Emerald</button>
          <div class="zoom-popover theme-emerald" role="tooltip"><p>Emerald SaaS theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-rose">Rose</button>
          <div class="zoom-popover theme-rose" role="tooltip"><p>Rose SaaS theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
