<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Thumb · EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Before &amp; After Slider</h1>
    <div class="slider" id="slider">
      <div class="slider__after">
        <span class="slider__label slider__label--after">After</span>
      </div>
      <div class="slider__before" id="sliderBefore">
        <span class="slider__label slider__label--before">Before</span>
      </div>
      <div class="slider__thumb" id="sliderThumb">
        <span class="slider__handle">⇔</span>
      </div>
    </div>
    <p class="hint">Drag the thumb left or right to compare</p>
  </div>
  <script>
    var slider = document.getElementById('slider');
    var beforeEl = document.getElementById('sliderBefore');
    var thumb = document.getElementById('sliderThumb');
    var handle = thumb.querySelector('.slider__handle');
    var active = false;

    function setPos(clientX) {
      var rect = slider.getBoundingClientRect();
      var pct = ((clientX - rect.left) / rect.width) * 100;
      if (pct < 0) pct = 0;
      if (pct > 100) pct = 100;
      beforeEl.style.clipPath = 'inset(0 ' + (100 - pct) + '% 0 0)';
      thumb.style.left = pct + '%';
    }

    slider.addEventListener('mousedown', function (e) {
      active = true;
      handle.classList.add('dragging');
      setPos(e.clientX);
    });

    document.addEventListener('mousemove', function (e) {
      if (!active) return;
      setPos(e.clientX);
    });

    document.addEventListener('mouseup', function () {
      active = false;
      handle.classList.remove('dragging');
    });

    slider.addEventListener('touchstart', function (e) {
      active = true;
      handle.classList.add('dragging');
      setPos(e.touches[0].clientX);
    }, { passive: true });

    document.addEventListener('touchmove', function (e) {
      if (!active) return;
      setPos(e.touches[0].clientX);
    }, { passive: true });

    document.addEventListener('touchend', function () {
      active = false;
      handle.classList.remove('dragging');
    });
  </script>
</body>
</html>
