<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>avatar-presence-pulse – Avatar with Presence Pulse</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Avatar Presence Pulse</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Online users have a pulsing green ring around their avatar.
    </p>

    <div class="ease-flex ease-justify-center ease-gap-10 ease-flex-wrap">

      <!-- Online avatar -->
      <div class="avatar-wrapper online">
        <img src="https://placehold.co/80x80" alt="User online" class="avatar-img">
        <span class="presence-ring"></span>
      </div>

      <!-- Offline avatar (no ring) -->
      <div class="avatar-wrapper offline">
        <img src="https://placehold.co/80x80" alt="User offline" class="avatar-img">
      </div>

    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Pure CSS keyframe animation on the <code>::after</code> pseudo‑element.
    </p>
  </div>

</body>
</html>
