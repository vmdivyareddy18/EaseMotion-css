<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harmonica Play Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="harmonica">
    <div class="hcover top"></div>
    <div class="hcover bottom"></div>
    <div class="hcomb">
      <div class="hole" style="--i:0"></div>
      <div class="hole" style="--i:1"></div>
      <div class="hole" style="--i:2"></div>
      <div class="hole" style="--i:3"></div>
      <div class="hole" style="--i:4"></div>
      <div class="hole" style="--i:5"></div>
      <div class="hole" style="--i:6"></div>
      <div class="hole" style="--i:7"></div>
      <div class="hole" style="--i:8"></div>
      <div class="hole" style="--i:9"></div>
    </div>
    <div class="reed" style="--i:0"></div>
    <div class="reed" style="--i:1"></div>
    <div class="reed" style="--i:2"></div>
  </div>
</body>
</html>
