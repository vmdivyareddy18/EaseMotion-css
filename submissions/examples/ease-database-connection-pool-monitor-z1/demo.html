<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Database Connection Pool Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Database Connection Pool</h2>

<div class="pool healthy">
<div>
<h3>Active Connections</h3>
<p>84 of 120 connections currently in use</p>
</div>
<span>Healthy</span>
</div>

<div class="pool active">
<div>
<h3>Idle Connections</h3>
<p>36 standby connections available</p>
</div>
<span>Ready</span>
</div>

<div class="pool warning">
<div>
<h3>Waiting Requests</h3>
<p>8 requests queued for allocation</p>
</div>
<span>Monitor</span>
</div>

<div class="pool critical">
<div>
<h3>Pool Capacity</h3>
<p>Utilization exceeds 90% threshold</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
