<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Shift Empty State — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #0e101f 0%, #030408 100%);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 40px 20px;
        color: #f8fafc;
        box-sizing: border-box;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px
          );
        background-size: 30px 30px;
      }
      .demo-header {
        text-align: center;
        margin-bottom: 48px;
      }
      .demo-header h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 12px 0;
        background: linear-gradient(135deg, #10b981 0%, #8b5cf6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1px;
      }
      .demo-header p {
        font-size: 15px;
        color: #4f5b7d;
        margin: 0;
        max-width: 500px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Color Shift Empty State</h1>
      <p>
        Health and fitness themed illustration card with continuous backdrop
        color rotations and heartbeat animations.
      </p>
    </div>

    <div class="empty-state-card">
      <!-- Glow Backdrop Aura -->
      <div class="glow-backdrop"></div>

      <!-- Heart Rate / Pulse Illustration -->
      <div class="illustration-container">
        <svg class="heart-svg" viewBox="0 0 24 24">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
          ></path>
        </svg>
      </div>

      <!-- Message info -->
      <h3 class="empty-title">No Activity Logged Today</h3>
      <p class="empty-text">
        Lace up your shoes! Your fitness stats are waiting for their first spark
        of energy today.
      </p>

      <!-- Call to action button -->
      <button class="empty-action-btn">Start Workout Session</button>
    </div>
  </body>
</html>
