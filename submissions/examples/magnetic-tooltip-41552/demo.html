<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Magnetic Tooltip</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <main class="page">

        <h1>
            Magnetic Tooltip
        </h1>

        <p class="subtitle">
            Hover or focus the buttons below to preview a
            retro-inspired magnetic tooltip interaction.
        </p>

        <section class="demo-area">

            <div class="tooltip-wrapper">

                <button
                    class="retro-btn">

                    Save

                </button>

                <div
                    class="tooltip"
                    role="tooltip">

                    Save your current progress.

                </div>

            </div>

            <div class="tooltip-wrapper">

                <button
                    class="retro-btn">

                    Upload

                </button>

                <div
                    class="tooltip"
                    role="tooltip">

                    Upload files securely.

                </div>

            </div>

            <div class="tooltip-wrapper">

                <button
                    class="retro-btn">

                    Settings

                </button>

                <div
                    class="tooltip"
                    role="tooltip">

                    Configure preferences instantly.

                </div>

            </div>

        </section>

    </main>

</body>

</html>
