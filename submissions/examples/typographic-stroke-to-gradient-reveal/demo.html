<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typographic Stroke-to-Gradient Reveal — EaseMotion CSS</title>
    <meta
      name="description"
      content="An elegant typographic hover interaction showing outline text revealing a vibrant gradient on hover."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Premium Ambient Background Glows -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <!-- Header Navigation Mockup for Premium Aesthetic -->
    <header class="header">
      <div class="logo">EaseMotion<span>.css</span></div>
      <nav class="nav">
        <a href="#" class="nav-link">Features</a>
        <a href="#" class="nav-link">Docs</a>
        <a href="#" class="nav-link active">Playground</a>
      </nav>
    </header>

    <!-- Hero Content Wrapper -->
    <main class="hero-container">
      <!-- Floating Pill Badge -->
      <div class="badge-pill">
        <span class="badge-dot"></span>
        Typographic Interaction
      </div>

      <!-- Headline with Stroke-to-Gradient Reveal -->
      <h1 class="em-stroke-reveal-text" data-text="Future of Motion">
        Future of Motion
      </h1>

      <!-- Subheading -->
      <p class="hero-subtitle">
        Hover to transition from a minimalist outline to a vibrant, liquid
        gradient reveal.
      </p>

      <!-- Interactive Hint -->
      <div class="hover-hint">
        <span class="hint-icon"></span>
        Hover text to reveal
      </div>
    </main>

    <!-- Footer Meta -->
    <footer class="footer">
      Build premium web experiences. Zero JS, 100% CSS.
    </footer>
  </body>
</html>
