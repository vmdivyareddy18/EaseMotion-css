<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Luminous Node Tree</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="tree">

  <div class="root">Core</div>

  <span class="line left"></span>
  <span class="line right"></span>

  <div class="branch b1">API</div>
  <div class="branch b2">UI</div>

  <span class="line l1"></span>
  <span class="line l2"></span>
  <span class="line l3"></span>
  <span class="line l4"></span>

  <div class="leaf a">Auth</div>
  <div class="leaf b">Data</div>
  <div class="leaf c">Theme</div>
  <div class="leaf d">Motion</div>

</main>

</body>
</html>
