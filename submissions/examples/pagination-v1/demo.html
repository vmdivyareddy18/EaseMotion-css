<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagination Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Pagination</h1>
    <p class="subtitle">Compact & Expanded variants with active states</p>

    <!-- Expanded Variant (Full pagination) -->
    <div class="variant">
      <h3>Expanded</h3>
      <nav class="pagination pagination--expanded" aria-label="Page navigation">
        <a href="#" class="pagination__arrow pagination__arrow--prev" aria-label="Previous page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        
        <a href="#" class="pagination__page">1</a>
        <a href="#" class="pagination__page">2</a>
        <a href="#" class="pagination__page pagination__page--active" aria-current="page">3</a>
        <a href="#" class="pagination__page">4</a>
        <a href="#" class="pagination__page">5</a>
        <span class="pagination__ellipsis">...</span>
        <a href="#" class="pagination__page">12</a>
        
        <a href="#" class="pagination__arrow pagination__arrow--next" aria-label="Next page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </nav>
    </div>

    <!-- Compact Variant (Minimal) -->
    <div class="variant">
      <h3>Compact</h3>
      <nav class="pagination pagination--compact" aria-label="Page navigation">
        <a href="#" class="pagination__arrow pagination__arrow--prev" aria-label="Previous page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        
        <span class="pagination__info">Page 3 of 12</span>
        
        <a href="#" class="pagination__arrow pagination__arrow--next" aria-label="Next page">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </nav>
    </div>

    <!-- Expanded with First/Last -->
    <div class="variant">
      <h3>Expanded with First/Last</h3>
      <nav class="pagination pagination--expanded" aria-label="Page navigation">
        <a href="#" class="pagination__edge">First</a>
        <a href="#" class="pagination__arrow pagination__arrow--prev" aria-label="Previous page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        
        <a href="#" class="pagination__page">1</a>
        <span class="pagination__ellipsis">...</span>
        <a href="#" class="pagination__page">4</a>
        <a href="#" class="pagination__page pagination__page--active" aria-current="page">5</a>
        <a href="#" class="pagination__page">6</a>
        <span class="pagination__ellipsis">...</span>
        <a href="#" class="pagination__page">20</a>
        
        <a href="#" class="pagination__arrow pagination__arrow--next" aria-label="Next page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
        <a href="#" class="pagination__edge">Last</a>
      </nav>
    </div>

    <!-- Rounded Style -->
    <div class="variant">
      <h3>Rounded Style</h3>
      <nav class="pagination pagination--expanded pagination--rounded" aria-label="Page navigation">
        <a href="#" class="pagination__arrow pagination__arrow--prev" aria-label="Previous page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        
        <a href="#" class="pagination__page">1</a>
        <a href="#" class="pagination__page">2</a>
        <a href="#" class="pagination__page pagination__page--active" aria-current="page">3</a>
        <a href="#" class="pagination__page">4</a>
        <a href="#" class="pagination__page">5</a>
        
        <a href="#" class="pagination__arrow pagination__arrow--next" aria-label="Next page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </nav>
    </div>

    <!-- Disabled State Demo -->
    <div class="variant">
      <h3>Disabled States</h3>
      <nav class="pagination pagination--expanded" aria-label="Page navigation">
        <span class="pagination__arrow pagination__arrow--prev pagination__arrow--disabled" aria-label="Previous page" aria-disabled="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </span>
        
        <a href="#" class="pagination__page pagination__page--active" aria-current="page">1</a>
        <a href="#" class="pagination__page">2</a>
        <a href="#" class="pagination__page">3</a>
        
        <a href="#" class="pagination__arrow pagination__arrow--next" aria-label="Next page">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>
      </nav>
    </div>
  </div>
</body>
</html>
