<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lightbox Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Lightbox</h1>
        <p class="subtitle">Fullscreen gallery with swipe support</p>

        <!-- LIGHTBOX COMPONENT -->
        <div class="lightbox-container">
            <div class="lightbox-wrapper">
                <div class="gallery-grid" id="galleryGrid">
                    <!-- Gallery items will be generated by JavaScript -->
                </div>

                <!-- Lightbox -->
                <div class="lightbox-overlay" id="lightboxOverlay">
                    <div class="lightbox-content">
                        <button class="lightbox-close" id="lightboxClose" aria-label="Close lightbox">✕</button>
                        <button class="lightbox-nav prev" id="lightboxPrev" aria-label="Previous">‹</button>
                        <button class="lightbox-nav next" id="lightboxNext" aria-label="Next">›</button>
                        <div class="lightbox-image-wrapper" id="lightboxImageWrapper">
                            <img class="lightbox-image" id="lightboxImage" src="" alt="Lightbox image" />
                        </div>
                        <div class="lightbox-info" id="lightboxInfo">
                            <span class="lightbox-title" id="lightboxTitle">Image Title</span>
                            <span class="lightbox-counter" id="lightboxCounter">1 / 1</span>
                        </div>
                        <div class="lightbox-thumbnails" id="lightboxThumbnails">
                            <!-- Thumbnails will be generated -->
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="lightbox-controls">
                    <button class="lightbox-btn" id="openBtn">🔍 Open Lightbox</button>
                    <button class="lightbox-btn" id="addImageBtn">➕ Add Image</button>
                    <button class="lightbox-btn" id="removeImageBtn">➖ Remove Last</button>
                    <button class="lightbox-btn" id="resetBtn">⟳ Reset</button>
                </div>

                <div class="lightbox-status">
                    <span class="status-label">Images:</span>
                    <span class="status-value" id="imageCount">0</span>
                    <span class="status-label">Current:</span>
                    <span class="status-value" id="currentIndex">-</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                        <span>🖼️</span>
                    </div>
                    <span class="variant-label">Gradient</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                        <span>🖼️</span>
                    </div>
                    <span class="variant-label">Nature</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                        <span>🖼️</span>
                    </div>
                    <span class="variant-label">Art</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f9d976 0%, #f39c12 100%);">
                        <span>🖼️</span>
                    </div>
                    <span class="variant-label">Warm</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const galleryGrid = document.getElementById('galleryGrid');
            const lightboxOverlay = document.getElementById('lightboxOverlay');
            const lightboxImage = document.getElementById('lightboxImage');
            const lightboxTitle = document.getElementById('lightboxTitle');
            const lightboxCounter = document.getElementById('lightboxCounter');
            const lightboxThumbnails = document.getElementById('lightboxThumbnails');
            const lightboxClose = document.getElementById('lightboxClose');
            const lightboxPrev = document.getElementById('lightboxPrev');
            const lightboxNext = document.getElementById('lightboxNext');
            const imageCount = document.getElementById('imageCount');
            const currentIndex = document.getElementById('currentIndex');
            const openBtn = document.getElementById('openBtn');
            const addImageBtn = document.getElementById('addImageBtn');
            const removeImageBtn = document.getElementById('removeImageBtn');
            const resetBtn = document.getElementById('resetBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                animationDuration: 300,
                swipeThreshold: 50,
                zoomEnabled: true,
                showThumbnails: true,
                autoPlay: false,
                autoPlayInterval: 3000,
                onOpen: function(index) {
                    console.log(`📂 Lightbox opened at index ${index}`);
                },
                onClose: function() {
                    console.log('📂 Lightbox closed');
                },
                onNavigate: function(index, total) {
                    console.log(`📄 Navigated to ${index + 1}/${total}`);
                }
            };

            // ============================================
            // DATA
            // ============================================
            const defaultImages = [
                { src: 'https://picsum.photos/seed/1/800/600', title: 'Mountain Landscape', color: '#4facfe' },
                { src: 'https://picsum.photos/seed/2/800/600', title: 'Ocean Sunset', color: '#43e97b' },
                { src: 'https://picsum.photos/seed/3/800/600', title: 'Forest Path', color: '#f093fb' },
                { src: 'https://picsum.photos/seed/4/800/600', title: 'City Lights', color: '#f5576c' },
                { src: 'https://picsum.photos/seed/5/800/600', title: 'Starry Night', color: '#f9d976' },
                { src: 'https://picsum.photos/seed/6/800/600', title: 'Desert Dunes', color: '#f39c12' },
                { src: 'https://picsum.photos/seed/7/800/600', title: 'Waterfall', color: '#e74c3c' },
                { src: 'https://picsum.photos/seed/8/800/600', title: 'Meadow', color: '#3498db' }
            ];

            // ============================================
            // STATE
            // ============================================
            let images = [];
            let currentIndexState = 0;
            let isOpen = false;
            let isTransitioning = false;
            let touchStartX = 0;
            let touchStartY = 0;
            let autoPlayTimer = null;

            // ============================================
            // INITIALIZATION
            // ============================================
            function init() {
                images = defaultImages.map(img => ({ ...img }));
                renderGallery();
                renderThumbnails();
                updateStatus();
            }

            // ============================================
            // RENDER FUNCTIONS
            // ============================================
            function renderGallery() {
                galleryGrid.innerHTML = '';
                images.forEach((img, index) => {
                    const item = document.createElement('div');
                    item.className = 'gallery-item';
                    item.style.backgroundColor = img.color || '#e5e7eb';
                    item.innerHTML = `
                        <img src="${img.src}" alt="${img.title}" loading="lazy" />
                        <div class="gallery-item-overlay">
                            <span class="gallery-item-title">${img.title}</span>
                            <span class="gallery-item-icon">🔍</span>
                        </div>
                    `;
                    item.addEventListener('click', () => openLightbox(index));
                    galleryGrid.appendChild(item);
                });
                imageCount.textContent = images.length;
            }

            function renderThumbnails() {
                lightboxThumbnails.innerHTML = '';
                images.forEach((img, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = 'lightbox-thumbnail';
                    if (index === currentIndexState) {
                        thumb.classList.add('active');
                    }
                    thumb.innerHTML = `<img src="${img.src}" alt="${img.title}" />`;
                    thumb.addEventListener('click', () => navigateTo(index));
                    lightboxThumbnails.appendChild(thumb);
                });
            }

            function updateLightbox(index) {
                const img = images[index];
                if (!img) return;
                
                lightboxImage.src = img.src;
                lightboxImage.alt = img.title;
                lightboxTitle.textContent = img.title;
                lightboxCounter.textContent = `${index + 1} / ${images.length}`;
                currentIndexState = index;
                currentIndex.textContent = index + 1;
                
                // Update thumbnails
                document.querySelectorAll('.lightbox-thumbnail').forEach((el, i) => {
                    el.classList.toggle('active', i === index);
                });
                
                CONFIG.onNavigate(index, images.length);
            }

            function updateStatus() {
                currentIndex.textContent = images.length > 0 ? currentIndexState + 1 : '-';
            }

            // ============================================
            // LIGHTBOX CONTROLS
            // ============================================
            function openLightbox(index = 0) {
                if (images.length === 0) return;
                isOpen = true;
                currentIndexState = Math.min(index, images.length - 1);
                document.body.style.overflow = 'hidden';
                lightboxOverlay.classList.add('active');
                updateLightbox(currentIndexState);
                CONFIG.onOpen(currentIndexState);
                
                // Start auto-play if enabled
                if (CONFIG.autoPlay) {
                    startAutoPlay();
                }
            }

            function closeLightbox() {
                if (!isOpen) return;
                isOpen = false;
                document.body.style.overflow = '';
                lightboxOverlay.classList.remove('active');
                CONFIG.onClose();
                stopAutoPlay();
            }

            function navigateTo(index) {
                if (isTransitioning || images.length === 0) return;
                if (index < 0) index = images.length - 1;
                if (index >= images.length) index = 0;
                if (index === currentIndexState) return;
                
                isTransitioning = true;
                currentIndexState = index;
                updateLightbox(index);
                
                setTimeout(() => {
                    isTransitioning = false;
                }, CONFIG.animationDuration);
            }

            function nextImage() {
                navigateTo(currentIndexState + 1);
            }

            function prevImage() {
                navigateTo(currentIndexState - 1);
            }

            // ============================================
            // AUTO-PLAY
            // ============================================
            function startAutoPlay() {
                stopAutoPlay();
                autoPlayTimer = setInterval(() => {
                    if (isOpen) {
                        nextImage();
                    }
                }, CONFIG.autoPlayInterval);
            }

            function stopAutoPlay() {
                if (autoPlayTimer) {
                    clearInterval(autoPlayTimer);
                    autoPlayTimer = null;
                }
            }

            function toggleAutoPlay() {
                if (autoPlayTimer) {
                    stopAutoPlay();
                } else {
                    startAutoPlay();
                }
            }

            // ============================================
            // SWIPE SUPPORT
            // ============================================
            function handleTouchStart(e) {
                const touch = e.touches[0];
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
            }

            function handleTouchEnd(e) {
                if (!touchStartX) return;
                
                const touch = e.changedTouches[0];
                const deltaX = touch.clientX - touchStartX;
                const deltaY = touch.clientY - touchStartY;
                
                // Only handle horizontal swipes
                if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > CONFIG.swipeThreshold) {
                    if (deltaX > 0) {
                        prevImage();
                    } else {
                        nextImage();
                    }
                }
                
                touchStartX = 0;
                touchStartY = 0;
            }

            // ============================================
            // KEYBOARD SUPPORT
            // ============================================
            function handleKeydown(e) {
                if (!isOpen) return;
                
                switch (e.key) {
                    case 'Escape':
                        closeLightbox();
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        prevImage();
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        nextImage();
                        break;
                    case ' ':
                        e.preventDefault();
                        toggleAutoPlay();
                        break;
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Lightbox controls
            lightboxClose.addEventListener('click', closeLightbox);
            lightboxPrev.addEventListener('click', prevImage);
            lightboxNext.addEventListener('click', nextImage);

            // Click outside image to close
            lightboxOverlay.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeLightbox();
                }
            });

            // Keyboard
            document.addEventListener('keydown', handleKeydown);

            // Swipe (touch)
            lightboxImage.addEventListener('touchstart', handleTouchStart, { passive: true });
            lightboxImage.addEventListener('touchend', handleTouchEnd, { passive: true });

            // Window resize for thumbnails
            window.addEventListener('resize', function() {
                // Thumbnails will reflow naturally
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            openBtn.addEventListener('click', () => openLightbox(0));

            addImageBtn.addEventListener('click', function() {
                const newImages = [
                    { src: `https://picsum.photos/seed/${Date.now()}/800/600`, title: `Image ${images.length + 1}`, color: '#9b59b6' },
                    { src: `https://picsum.photos/seed/${Date.now() + 1}/800/600`, title: `Image ${images.length + 2}`, color: '#e67e22' }
                ];
                images = [...images, ...newImages];
                renderGallery();
                renderThumbnails();
                updateStatus();
            });

            removeImageBtn.addEventListener('click', function() {
                if (images.length <= 1) {
                    alert('Cannot remove the last image');
                    return;
                }
                images.pop();
                if (currentIndexState >= images.length) {
                    currentIndexState = images.length - 1;
                }
                renderGallery();
                renderThumbnails();
                updateStatus();
                if (isOpen) {
                    updateLightbox(currentIndexState);
                }
            });

            resetBtn.addEventListener('click', function() {
                images = defaultImages.map(img => ({ ...img }));
                currentIndexState = 0;
                renderGallery();
                renderThumbnails();
                updateStatus();
                if (isOpen) {
                    updateLightbox(currentIndexState);
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                card.addEventListener('click', function() {
                    const colors = ['#4facfe', '#43e97b', '#f093fb', '#f9d976'];
                    const titles = ['Gradient View', 'Nature Scene', 'Art Gallery', 'Warm Sunset'];
                    const preview = this.querySelector('.variant-preview');
                    const label = this.querySelector('.variant-label');
                    const color = preview.style.background.match(/linear-gradient\([^)]*\)/)?.[0] || '';
                    
                    // Create a simple gallery preview
                    const items = [
                        { src: 'https://picsum.photos/seed/v1/400/300', title: 'Image 1' },
                        { src: 'https://picsum.photos/seed/v2/400/300', title: 'Image 2' },
                        { src: 'https://picsum.photos/seed/v3/400/300', title: 'Image 3' }
                    ];
                    
                    // Show lightbox with variant theme
                    images = items.map(img => ({ ...img, color: '#4facfe' }));
                    renderGallery();
                    renderThumbnails();
                    updateStatus();
                    openLightbox(0);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.Lightbox = {
                open: openLightbox,
                close: closeLightbox,
                next: nextImage,
                prev: prevImage,
                goTo: navigateTo,
                toggleAutoPlay: toggleAutoPlay,
                isOpen: () => isOpen,
                getImages: () => images,
                setImages: (newImages) => {
                    images = newImages.map(img => ({ ...img }));
                    renderGallery();
                    renderThumbnails();
                    updateStatus();
                    if (isOpen) {
                        updateLightbox(Math.min(currentIndexState, images.length - 1));
                    }
                },
                addImages: (newImages) => {
                    images = [...images, ...newImages.map(img => ({ ...img }))];
                    renderGallery();
                    renderThumbnails();
                    updateStatus();
                },
                removeImage: (index) => {
                    if (images.length <= 1) return;
                    images.splice(index, 1);
                    if (currentIndexState >= images.length) {
                        currentIndexState = images.length - 1;
                    }
                    renderGallery();
                    renderThumbnails();
                    updateStatus();
                    if (isOpen) {
                        updateLightbox(currentIndexState);
                    }
                },
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.autoPlay) {
                        startAutoPlay();
                    } else {
                        stopAutoPlay();
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            init();

            console.log('✅ Lightbox initialized!');
            console.log('📖 API: window.Lightbox');
            console.log('📖 Usage:');
            console.log('  - Click any image to open lightbox');
            console.log('  - Use arrow keys or swipe to navigate');
            console.log('  - Press Escape to close');
            console.log('  - Press Space to toggle auto-play');

        })();
    </script>
</body>
</html>
