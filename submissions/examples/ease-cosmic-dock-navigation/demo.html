<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Dock Navigation</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="stars-bg"></div>
  <div class="nebula-bg"></div>

  <main class="dock-container">
    <header class="dock-header">
      <h1>Cosmic Dock Navigation</h1>
      <p>A desktop-inspired floating dock with fluid magnetic transitions, ambient status glows, and full keyboard accessibility.</p>
    </header>

    <nav class="cosmic-dock" role="navigation" aria-label="Desktop shortcuts">
      <ul class="dock-list" role="menubar">
        <li role="none">
          <a href="#home" class="dock-item" role="menuitem" aria-label="Home Workspace" tabindex="0">
            <span class="icon home-icon"></span>
            <span class="tooltip">Home Workspace</span>
            <span class="status-dot active"></span>
          </a>
        </li>
        <li role="none">
          <a href="#analytics" class="dock-item" role="menuitem" aria-label="System Analytics" tabindex="0">
            <span class="icon chart-icon"></span>
            <span class="tooltip">System Analytics</span>
            <span class="status-dot"></span>
          </a>
        </li>
        <li role="none">
          <a href="#terminal" class="dock-item" role="menuitem" aria-label="Glitch Console" tabindex="0">
            <span class="icon console-icon"></span>
            <span class="tooltip">Glitch Console</span>
            <span class="status-dot active"></span>
          </a>
        </li>
        <li role="none">
          <a href="#music" class="dock-item" role="menuitem" aria-label="Media Player" tabindex="0">
            <span class="icon media-icon"></span>
            <span class="tooltip">Media Player</span>
            <span class="status-dot"></span>
          </a>
        </li>
        <li role="none">
          <a href="#settings" class="dock-item" role="menuitem" aria-label="System Settings" tabindex="0">
            <span class="icon settings-icon"></span>
            <span class="tooltip">Settings</span>
            <span class="status-dot"></span>
          </a>
        </li>
      </ul>
    </nav>
  </main>

  <script>
    // Add magnetic scaling cues for sibling nodes using simple JS tracking
    const dockItems = document.querySelectorAll('.dock-item');
    dockItems.forEach(item => {
      item.addEventListener('mouseenter', () => {
        const prev = item.parentElement.previousElementSibling?.firstElementChild;
        const next = item.parentElement.nextElementSibling?.firstElementChild;
        if (prev) prev.classList.add('scale-near');
        if (next) next.classList.add('scale-near');
      });
      item.addEventListener('mouseleave', () => {
        dockItems.forEach(i => i.classList.remove('scale-near'));
      });
    });
  </script>
</body>
</html>
