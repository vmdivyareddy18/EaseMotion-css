<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Progress Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stack-page">
    <h1>Stacked Progress</h1>
    <div class="progress-card">
      <h3>Project Sprint Progress</h3>
      <div class="stacked-bar">
        <div class="stack-segment seg-done" style="width:45%"></div>
        <div class="stack-segment seg-progress" style="width:25%"></div>
        <div class="stack-segment seg-review" style="width:15%"></div>
        <div class="stack-segment seg-todo" style="width:15%"></div>
      </div>
      <div class="stack-legend">
        <span><span class="dot" style="background:#22c55e"></span> Done (45%)</span>
        <span><span class="dot" style="background:#6366f1"></span> In Progress (25%)</span>
        <span><span class="dot" style="background:#f59e0b"></span> Review (15%)</span>
        <span><span class="dot" style="background:#64748b"></span> Todo (15%)</span>
      </div>
    </div>
  </div>
</body>
</html>
