<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid User Badge</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #0f172a; font-family: system-ui, sans-serif;">
  
  <div class="badge-container ease-fade-in-up">
    <!-- Liquid glow effect using EaseMotion pulse -->
    <div class="liquid-glow ease-pulse"></div>
    
    <div class="user-badge ease-hover-scale">
      <div class="avatar-container">
        <img src="https://i.pravatar.cc/150?u=a042581f4e29026024d" alt="User Avatar" class="avatar">
        <!-- The liquid border morphs shape -->
        <div class="liquid-border"></div>
      </div>
      <div class="user-info">
        <h3>Astra Developer</h3>
        <span class="role">Space Commander</span>
      </div>
    </div>
  </div>

</body>
</html>
