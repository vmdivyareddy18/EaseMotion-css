<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Scale Chat Bubble</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg"><span></span><span></span></div>
    <main class="phone" aria-label="Chat preview">
      <header>
        <div class="avatar"></div>
        <div>
          <h1>Sammy</h1>
          <p><i class="dot"></i>Online</p>
        </div>
      </header>
      <section class="chat">
        <div class="msg left" style="--d: 0.1s">
          <p>Hey! Did you finish the design?</p>
          <time>09:41</time>
        </div>
        <div class="msg right" style="--d: 0.4s">
          <p>Almost! Adding the final glass effects</p>
          <time>09:42</time>
        </div>
        <div class="msg left" style="--d: 0.7s">
          <p>Looks premium already.</p>
          <time>09:43</time>
        </div>
        <div class="msg right" style="--d: 1s">
          <p>Ready for the PR</p>
          <time>09:44</time>
        </div>
      </section>
    </main>
  </body>
</html>
