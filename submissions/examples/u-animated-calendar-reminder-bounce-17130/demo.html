<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Calendar Reminder Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Calendar Reminder Bounce</h1>

    <p>
      A reusable calendar animation for reminders, events,
      schedules, bookings, and productivity applications.
    </p>

    <div class="demo-grid">

      <button class="calendar-button">
        <span class="calendar-icon">📅</span>
      </button>

      <button class="calendar-button card-style">
        <span class="calendar-icon">📅</span>
        <span>Upcoming Event</span>
      </button>

      <div class="calendar-card">
        <h3>Meeting Reminder</h3>

        <p>
          Team meeting starts in 15 minutes.
        </p>

        <button class="calendar-button small">
          <span class="calendar-icon">📅</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
