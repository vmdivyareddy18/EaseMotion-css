<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-spin-once – Single 360° Spin</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Spin Once
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button to make the icon spin exactly one full rotation and stop.
    </p>

    <!-- Spinning element -->
    <div id="spin-target" class="spin-once-icon ease-mx-auto ease-text-6xl">
      🔄
    </div>

    <button id="spin-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">
      Spin
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      One-shot <code>rotate(360deg)</code> with <code>animation-fill-mode: forwards</code>.
    </p>
  </div>

  <script>
    const target = document.getElementById('spin-target');
    const btn = document.getElementById('spin-btn');

    btn.addEventListener('click', () => {
      target.classList.remove('spin');
      void target.offsetWidth;          // force reflow to restart animation
      target.classList.add('spin');
    });
  </script>

</body>
</html>
