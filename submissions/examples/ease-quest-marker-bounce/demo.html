<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-quest-marker-bounce – Quest Marker Bounce</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Quest Marker Bounce
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      A pin bounces gently to draw attention – perfect for objectives or points of interest.
    </p>

    <!-- Map-like area with a bouncing marker -->
    <div class="map-area ease-mx-auto">
      <div class="quest-marker">
        <span class="marker-icon">📍</span>
        <div class="marker-shadow"></div>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Continuous <code>translateY</code> bounce with subtle shadow.
    </p>
  </div>

</body>
</html>
