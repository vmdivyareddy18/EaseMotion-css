<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shimmer Sweep Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <button class="open-btn">Launch Modal</button>

  <input type="checkbox" id="modal-toggle">

  <label for="modal-toggle" class="overlay"></label>

  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="shimmer"></div>

      <label for="modal-toggle" class="close-btn">&times;</label>

      <h2 id="modal-title">Shimmer Sweep Modal</h2>

      <p>
        A modern SaaS-inspired modal built with pure HTML & CSS.
        It includes an animated shimmer sweep, responsive layout,
        smooth transitions, and CSS custom properties for easy customization.
      </p>

      <div class="actions">
        <button>Get Started</button>
        <button class="secondary">Learn More</button>
      </div>
  </div>
</div>

<script>
document.querySelector(".open-btn").addEventListener("click",()=>{
    document.getElementById("modal-toggle").checked=true;
});

document.addEventListener("keydown",(e)=>{
    if(e.key==="Escape"){
        document.getElementById("modal-toggle").checked=false;
    }
});
</script>

</body>
</html>
