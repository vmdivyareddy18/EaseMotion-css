<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Horizontal Roll Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Glassmorphism UI

</span>

<h1>

Horizontal Roll Modal

</h1>

<p>

Modern glassmorphism modal
featuring a smooth horizontal
roll interaction designed for
futuristic user experiences.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="icon">

✨

</div>

<h2>

Glass Interface

</h2>

<p>

A pure CSS modal with
glassmorphism styling,
backdrop blur and
horizontal rolling motion.

</p>

<button>

Explore UI

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
