<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion - Focal Point CSS Utility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header>
      <h1>EaseMotion Focal Point Utility</h1>
      <p>Demonstrating image focal region selection using the modern CSS <code>object-view-box</code> property integrated with EaseMotion design tokens.</p>
    </header>

    <main class="grid">
      <div class="card">
        <h3>Original Image (Full)</h3>
        <div class="image-container">
          <img class="focal-image" src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809" alt="Original abstract gradient">
        </div>
      </div>

      <div class="card">
        <h3>Focal Point: Top-Left</h3>
        <div class="image-container">
          <img class="focal-image focal-top-left" src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809" alt="Top left focus">
        </div>
      </div>

      <div class="card">
        <h3>Focal Point: Center (Zoomed)</h3>
        <div class="image-container">
          <img class="focal-image focal-center" src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809" alt="Center focus">
        </div>
      </div>

      <div class="card">
        <h3>Focal Point: Bottom-Right</h3>
        <div class="image-container">
          <img class="focal-image focal-bottom-right" src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809" alt="Bottom right focus">
        </div>
      </div>
    </main>
  </div>

</body>
</html>
