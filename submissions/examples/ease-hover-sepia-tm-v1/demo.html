<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-sepia Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>ease-hover-sepia</h1>
    <p>Hover over each item to apply a warm sepia tone — like a vintage photo filter.</p>

    <div class="photo-strip">
      <div class="photo-card sepia-photo">
        <div class="photo-placeholder photo-1"></div>
        <span>Portrait</span>
      </div>
      <div class="photo-card sepia-photo">
        <div class="photo-placeholder photo-2"></div>
        <span>Landscape</span>
      </div>
      <div class="photo-card sepia-photo">
        <div class="photo-placeholder photo-3"></div>
        <span>Architecture</span>
      </div>
      <div class="photo-card sepia-photo">
        <div class="photo-placeholder photo-4"></div>
        <span>Nature</span>
      </div>
    </div>

    <div class="filter-demo">
      <div class="filter-box">
        <div class="filter-swatch swatch-normal"></div>
        <p>Normal</p>
      </div>
      <div class="filter-box sepia-box">
        <div class="filter-swatch swatch-sepia"></div>
        <p>Hover: sepia(1)</p>
      </div>
    </div>
  </div>
</body>
</html>
