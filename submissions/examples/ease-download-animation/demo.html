<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Animation · Iron Pulse</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="download-wrapper">
    <h1>📥 Download Progress</h1>
    <p class="subtitle">Iron Pulse · Gym App v2.4.1</p>

    <!-- Download Card -->
    <div class="download-card">
      <div class="file-info">
        <span class="file-icon">📄</span>
        <div class="file-details">
          <span class="file-name">iron-pulse-setup.exe</span>
          <span class="file-size">124 MB · 2 min remaining</span>
        </div>
        <span class="file-status">Downloading...</span>
      </div>

      <!-- Progress Bar with Pure CSS Animation -->
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <!-- Progress Percentage (CSS animated) -->
      <div class="progress-text">
        <span class="progress-percent">0%</span>
        <span class="progress-speed">1.2 MB/s</span>
      </div>

      <!-- Control Buttons (visual only - no JS) -->
      <div class="button-group">
        <button class="btn-pause">⏸️ Pause</button>
        <button class="btn-cancel">✖ Cancel</button>
      </div>
    </div>

    <!-- Status Message -->
    <div class="status-message">
      ⬇️ Download in progress...
    </div>

    <!-- Download Complete Animation (triggers after CSS animation) -->
    <div class="complete-wrapper">
      <div class="complete-animation">
        <div class="checkmark">✅</div>
        <h2>Download Complete!</h2>
        <p>Iron Pulse is ready to install 🚀</p>
        <a href="#" class="btn-primary">🔄 New Download</a>
      </div>
    </div>
  </div>
</body>
</html>
