<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Web Layout Tooltip // Pure CSS Rotate Click Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #f1f5f9;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-accessible-tooltip-wrapper">
    <button class="ease-accessible-tooltip-target" aria-describedby="accessible-action-tooltip">
      Trigger Form Validation
    </button>

    <div id="accessible-action-tooltip" class="ease-accessible-tooltip-content" role="tooltip">
      Submits current system vector entries safely.
    </div>
  </div>

</body>
</html>
