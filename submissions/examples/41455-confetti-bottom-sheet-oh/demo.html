<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-confetti-bottom-sheet</title>
  <meta name="description" content="Bottom sheet with confetti animation effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-confetti-bottom-sheet</h1>
      <p class="subtitle" id="main-desc">Bottom sheet with confetti animation</p>
    </header>

    <div class="display-area">
      
      <button class="open-sheet-btn" onclick="toggleSheet('sheet1')">
        Open Bottom Sheet
      </button>

      <div class="ease-confetti-sheet" id="sheet1">
        <div class="sheet-backdrop" onclick="toggleSheet('sheet1')"></div>
        <div class="sheet-content">
          <div class="confetti-container">
            <div class="confetti confetti-1"></div>
            <div class="confetti confetti-2"></div>
            <div class="confetti confetti-3"></div>
            <div class="confetti confetti-4"></div>
            <div class="confetti confetti-5"></div>
            <div class="confetti confetti-6"></div>
            <div class="confetti confetti-7"></div>
            <div class="confetti confetti-8"></div>
          </div>
          <div class="sheet-header">
            <div class="sheet-handle"></div>
          </div>
          <div class="sheet-body">
            <h2>Congratulations!</h2>
            <p>You've successfully completed your task. Keep up the great work!</p>
            <div class="sheet-actions">
              <button class="sheet-btn sheet-btn-primary">Share</button>
              <button class="sheet-btn sheet-btn-secondary" onclick="toggleSheet('sheet1')">Close</button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-row">
        <button class="open-sheet-btn ease-confetti-sheet-btn" onclick="toggleSheet('sheet2')">
          Primary
        </button>
        <button class="open-sheet-btn ease-confetti-sheet-btn ease-confetti-success" onclick="toggleSheet('sheet3')">
          Success
        </button>
      </div>

      <!-- Primary Sheet -->
      <div class="ease-confetti-sheet ease-confetti-primary" id="sheet2">
        <div class="sheet-backdrop" onclick="toggleSheet('sheet2')"></div>
        <div class="sheet-content">
          <div class="confetti-container">
            <div class="confetti confetti-1"></div>
            <div class="confetti confetti-2"></div>
            <div class="confetti confetti-3"></div>
            <div class="confetti confetti-4"></div>
            <div class="confetti confetti-5"></div>
          </div>
          <div class="sheet-header">
            <div class="sheet-handle"></div>
          </div>
          <div class="sheet-body">
            <h2>Primary Theme</h2>
            <p>This is a bottom sheet with the primary color theme.</p>
            <button class="sheet-btn sheet-btn-primary" onclick="toggleSheet('sheet2')">Got it</button>
          </div>
        </div>
      </div>

      <!-- Success Sheet -->
      <div class="ease-confetti-sheet ease-confetti-success" id="sheet3">
        <div class="sheet-backdrop" onclick="toggleSheet('sheet3')"></div>
        <div class="sheet-content">
          <div class="confetti-container">
            <div class="confetti confetti-1"></div>
            <div class="confetti confetti-2"></div>
            <div class="confetti confetti-3"></div>
            <div class="confetti confetti-4"></div>
            <div class="confetti confetti-5"></div>
          </div>
          <div class="sheet-header">
            <div class="sheet-handle"></div>
          </div>
          <div class="sheet-body">
            <h2>Success!</h2>
            <p>Your action was completed successfully.</p>
            <button class="sheet-btn sheet-btn-success" onclick="toggleSheet('sheet3')">Done</button>
          </div>
        </div>
      </div>
    </section>

  </main>

  <script>
    function toggleSheet(id) {
      document.getElementById(id).classList.toggle('is-open');
    }
  </script>

</body>
</html>
