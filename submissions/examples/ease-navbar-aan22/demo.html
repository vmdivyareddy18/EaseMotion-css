<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Animated Responsive Navigation Bar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="ease-navbar" id="mainNav">
    <div class="ease-navbar__brand">⚡ EaseMotion</div>
    <div class="ease-navbar__menu" id="navMenu">
      <a href="#" class="ease-navbar__link active">Home</a>
      <a href="#" class="ease-navbar__link">Components</a>
      <div class="ease-navbar__dropdown">
        <a href="#" class="ease-navbar__link ease-navbar__link--dropdown">
          Examples ▾
        </a>
        <div class="ease-navbar__dropdown-menu">
          <a href="#" class="ease-navbar__dropdown-item">Animations</a>
          <a href="#" class="ease-navbar__dropdown-item">Hover Effects</a>
          <a href="#" class="ease-navbar__dropdown-item">Components</a>
        </div>
      </div>
      <a href="#" class="ease-navbar__link">Docs</a>
      <a href="#" class="ease-navbar__link">GitHub</a>
    </div>
    <button class="ease-navbar__hamburger" id="navHamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main style="height: 200vh; padding: 8rem 2rem 2rem; color: #94a3b8; font-family: sans-serif;">
    <h1 style="color:#f1f5f9;">Scroll down to see the navbar transition</h1>
    <p>The navbar transitions from transparent to solid with a blurred background as you scroll. Resize the window below 768px to see the mobile hamburger menu.</p>
  </main>

  <script>
    const nav = document.getElementById('mainNav');
    const menu = document.getElementById('navMenu');
    const hamburger = document.getElementById('navHamburger');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 20) {
        nav.classList.add('scrolled');
      } else {
        nav.classList.remove('scrolled');
      }
    });

    hamburger.addEventListener('click', () => {
      menu.classList.toggle('open');
      hamburger.classList.toggle('open');
    });
  </script>

</body>
</html>
