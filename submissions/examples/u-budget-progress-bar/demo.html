<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-budget-progress-bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Budget Progress Tracker</h1>
    <p class="subtitle">
        Animated budget spending progress bars
    </p>

    <div class="budget-card">

        <h3>Monthly Budget</h3>
        <p>$1,200 spent of $2,000</p>

        <div class="progress-track">
            <div class="progress-fill under-budget"></div>
        </div>

        <span class="status success">60% Used</span>

    </div>

    <div class="budget-card">

        <h3>Travel Budget</h3>
        <p>$950 spent of $1,000</p>

        <div class="progress-track">
            <div class="progress-fill warning"></div>
        </div>

        <span class="status warning-text">95% Used</span>

    </div>

    <div class="budget-card">

        <h3>Shopping Budget</h3>
        <p>$1,250 spent of $1,000</p>

        <div class="progress-track">
            <div class="progress-fill over-budget"></div>
        </div>

        <span class="status danger">125% Used</span>

    </div>

</div>

</body>
</html>
