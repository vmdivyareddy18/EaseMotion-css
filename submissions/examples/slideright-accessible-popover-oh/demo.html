<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Accessible Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Accessible Web</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Accessible slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="access-btn" aria-label="More options" aria-haspopup="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="19" cy="12" r="1"/>
            <circle cx="5" cy="12" r="1"/>
          </svg>
        </button>
        <div class="slide-popover" role="tooltip" aria-label="Quick options">
          <div class="slide-header">
            <span class="slide-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4"/>
                <path d="M12 8h.01"/>
              </svg>
            </span>
            <div class="slide-info">
              <h4 id="popover-title">Accessibility Options</h4>
              <p>Customize your experience</p>
            </div>
          </div>
          <div class="slide-actions" role="menu">
            <button class="slide-action" role="menuitem" style="--delay: 0s">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="5"/>
                  <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
              </span>
              <span>High Contrast</span>
            </button>
            <button class="slide-action" role="menuitem" style="--delay: 0.05s">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </span>
              <span>Screen Reader</span>
            </button>
            <button class="slide-action" role="menuitem" style="--delay: 0.1s">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <text x="2" y="18" font-size="18" font-weight="bold" stroke="none" fill="currentColor">A</text>
                  <text x="14" y="10" font-size="10" font-weight="bold" stroke="none" fill="currentColor">A</text>
                </svg>
              </span>
              <span>Text Size</span>
            </button>
            <button class="slide-action" role="menuitem" style="--delay: 0.15s">
              <span class="action-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
                </svg>
              </span>
              <span>Reduce Motion</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small" aria-label="Slide animation">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small" aria-label="Swipe animation">Swipe</button>
          <div class="slide-popover swipe" role="tooltip"><p>Swipe animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small" aria-label="Sweep animation">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-blue" aria-label="Blue theme">Blue</button>
          <div class="slide-popover theme-blue" role="tooltip"><p>Blue accessible theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-teal" aria-label="Teal theme">Teal</button>
          <div class="slide-popover theme-teal" role="tooltip"><p>Teal accessible theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-gray" aria-label="Gray theme">Gray</button>
          <div class="slide-popover theme-gray" role="tooltip"><p>Gray accessible theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
