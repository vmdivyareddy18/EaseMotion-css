<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Pull Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

    <div class="overlay">

        <div class="modal" tabindex="0">

            <h2>Magnetic Pull Modal</h2>

            <p>
                A pure CSS modal featuring a smooth magnetic pull animation
                designed for modern neumorphic interfaces.
            </p>

            <label for="modal-toggle" class="close-btn">
                Close
            </label>

        </div>

    </div>

</div>

</body>
</html>
