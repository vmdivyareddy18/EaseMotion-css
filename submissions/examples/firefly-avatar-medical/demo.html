<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Firefly Avatar (Medical Interface)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Medical Dashboard Application Environment -->
  <div class="dashboard-viewport">
    
    <div class="glass-panel em-fade-in">
      
      <!-- Panel Header -->
      <header class="panel-header">
        <div class="status-indicator">
          <span class="pulse-dot"></span>
          LIVE MONITORING
        </div>
        <div class="patient-id">ID: 882-001-ALPHA</div>
      </header>

      <!-- The Firefly Avatar Component -->
      <div class="firefly-avatar-container">
        <div class="avatar-stage">
          
          <!-- Layer 1: Firefly Glow Orb Cluster -->
          <div class="firefly-emitter">
            <span class="firefly ff-1"></span>
            <span class="firefly ff-2"></span>
            <span class="firefly ff-3"></span>
            <span class="firefly ff-4"></span>
            <span class="firefly ff-5"></span>
            <span class="firefly ff-6"></span>
          </div>
          
          <!-- Layer 2: Main Profile Photo -->
          <img class="avatar-image" src="https://images.unsplash.com/photo-1559839734-2b71ea197ec2?w=160&auto=format&fit=crop&q=80" alt="Dr. Evelyn Reed - Lead Cardiologist">
          
          <!-- Layer 3: Online Status Accent -->
          <div class="status-badge-online" title="Active"></div>
        </div>
      </div>

      <!-- Practitioner Information details -->
      <div class="practitioner-details">
        <h3>Dr. Evelyn Reed</h3>
        <p class="specialty">Lead Cardiologist</p>
        <p class="organization">St. Jude Medical Center</p>
      </div>

      <!-- Quick Action Grid -->
      <div class="action-grid">
        <div class="action-card">Vitals</div>
        <div class="action-card">Reports</div>
        <div class="action-card active">Contact</div>
      </div>
      
    </div>
  </div>

</body>
</html>
