<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Bounce Tooltip Demo - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="analytics-card">
    <h2 style="margin-top: 0; font-size: 1.25rem; color: #94a3b8;">Conversion Rate</h2>
    <p style="font-size: 2.5rem; font-weight: 700; margin: 0.5rem 0 1.5rem 0;">2.48%</p>

    <div class="tooltip-wrapper">
      <button class="tooltip-trigger" aria-describedby="analytics-tooltip">
        View Breakdown
      </button>
      
      <div class="tooltip-box" id="analytics-tooltip" role="tooltip">
        <div class="tooltip-header">
          <span>Target Met</span>
          <span style="color: #10b981;">+12.4%</span>
        </div>
        <div class="tooltip-body">
          Quarterly performance metrics show dynamic user acquisition scaling cleanly.
        </div>
      </div>
    </div>
  </main>

</body>
</html>
