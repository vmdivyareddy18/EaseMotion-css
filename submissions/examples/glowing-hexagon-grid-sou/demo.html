<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowing Hexagon Grid — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="hex-page-sou">
    <header class="hex-header-sou">
      <h1>Glowing Hexagon Grid</h1>
      <p class="hex-subtitle-sou">
        A CSS-only honeycomb of hexagons emitting a neon glow in a ripple
        pattern. Pure CSS Grid + staggered animation delays. No JavaScript.
      </p>
    </header>

    <!-- ===========================================================
         Variant 1: Cyan ripple (default)
         =========================================================== -->
    <section class="hex-section-sou">
      <h2 class="hex-label-sou">Cyan Ripple</h2>
      <div class="hex-grid-sou" aria-hidden="true">
        <!-- Row 1 -->
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.0s"></div>
          <div class="hex-cell-sou" style="--d:0.2s"></div>
          <div class="hex-cell-sou" style="--d:0.4s"></div>
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.8s"></div>
          <div class="hex-cell-sou" style="--d:1.0s"></div>
        </div>
        <!-- Row 2 (offset) -->
        <div class="hex-row-sou hex-row-offset-sou">
          <div class="hex-cell-sou" style="--d:0.2s"></div>
          <div class="hex-cell-sou" style="--d:0.4s"></div>
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.8s"></div>
          <div class="hex-cell-sou" style="--d:1.0s"></div>
        </div>
        <!-- Row 3 -->
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.4s"></div>
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.8s"></div>
          <div class="hex-cell-sou" style="--d:1.0s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.4s"></div>
        </div>
        <!-- Row 4 (offset) -->
        <div class="hex-row-sou hex-row-offset-sou">
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.8s"></div>
          <div class="hex-cell-sou" style="--d:1.0s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.4s"></div>
        </div>
        <!-- Row 5 -->
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.8s"></div>
          <div class="hex-cell-sou" style="--d:1.0s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.4s"></div>
          <div class="hex-cell-sou" style="--d:1.6s"></div>
          <div class="hex-cell-sou" style="--d:1.8s"></div>
        </div>
      </div>
    </section>

    <!-- ===========================================================
         Variant 2: Magenta ripple
         =========================================================== -->
    <section class="hex-section-sou">
      <h2 class="hex-label-sou">Magenta Pulse</h2>
      <div class="hex-grid-sou hex-theme-magenta-sou" aria-hidden="true">
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.0s"></div>
          <div class="hex-cell-sou" style="--d:0.3s"></div>
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.9s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.5s"></div>
        </div>
        <div class="hex-row-sou hex-row-offset-sou">
          <div class="hex-cell-sou" style="--d:0.3s"></div>
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.9s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.5s"></div>
        </div>
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.6s"></div>
          <div class="hex-cell-sou" style="--d:0.9s"></div>
          <div class="hex-cell-sou" style="--d:1.2s"></div>
          <div class="hex-cell-sou" style="--d:1.5s"></div>
          <div class="hex-cell-sou" style="--d:1.8s"></div>
          <div class="hex-cell-sou" style="--d:2.1s"></div>
        </div>
      </div>
    </section>

    <!-- ===========================================================
         Variant 3: Green matrix ripple
         =========================================================== -->
    <section class="hex-section-sou">
      <h2 class="hex-label-sou">Matrix Green</h2>
      <div class="hex-grid-sou hex-theme-green-sou" aria-hidden="true">
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.0s"></div>
          <div class="hex-cell-sou" style="--d:0.15s"></div>
          <div class="hex-cell-sou" style="--d:0.30s"></div>
          <div class="hex-cell-sou" style="--d:0.45s"></div>
          <div class="hex-cell-sou" style="--d:0.60s"></div>
          <div class="hex-cell-sou" style="--d:0.75s"></div>
        </div>
        <div class="hex-row-sou hex-row-offset-sou">
          <div class="hex-cell-sou" style="--d:0.15s"></div>
          <div class="hex-cell-sou" style="--d:0.30s"></div>
          <div class="hex-cell-sou" style="--d:0.45s"></div>
          <div class="hex-cell-sou" style="--d:0.60s"></div>
          <div class="hex-cell-sou" style="--d:0.75s"></div>
        </div>
        <div class="hex-row-sou">
          <div class="hex-cell-sou" style="--d:0.30s"></div>
          <div class="hex-cell-sou" style="--d:0.45s"></div>
          <div class="hex-cell-sou" style="--d:0.60s"></div>
          <div class="hex-cell-sou" style="--d:0.75s"></div>
          <div class="hex-cell-sou" style="--d:0.90s"></div>
          <div class="hex-cell-sou" style="--d:1.05s"></div>
        </div>
      </div>
    </section>

    <footer class="hex-footer-sou">
      <p>Pure CSS · No JavaScript · Powered by CSS Grid &amp; staggered <code>animation-delay</code></p>
    </footer>
  </main>
</body>
</html>
