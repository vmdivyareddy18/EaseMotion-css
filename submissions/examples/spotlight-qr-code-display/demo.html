<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight QR Code Display — Dark Mode</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper ease-fade-in">

    <h1 class="demo-title">Spotlight QR Code Display</h1>

    <p class="demo-sub">
      A pure CSS QR code display featuring a moving spotlight animation and dark mode aesthetics.
    </p>

    <div class="qr-card">

      <h2 class="qr-heading">
        Scan to Connect
      </h2>

      <div
        class="qr-wrapper"
        aria-label="QR Code">

        <div class="spotlight"></div>

        <div class="qr-grid" aria-hidden="true">

          <span></span><span class="filled"></span><span></span><span class="filled"></span><span class="filled"></span><span></span><span class="filled"></span><span></span>

          <span class="filled"></span><span></span><span class="filled"></span><span></span><span></span><span class="filled"></span><span></span><span class="filled"></span>

          <span></span><span class="filled"></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span>

          <span class="filled"></span><span></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span>

          <span class="filled"></span><span class="filled"></span><span></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span>

          <span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span>

          <span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span>

          <span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span><span></span><span class="filled"></span>

        </div>

      </div>

      <p class="qr-footer">
        Scan with your mobile device
      </p>

    </div>

  </div>

</body>
</html>
