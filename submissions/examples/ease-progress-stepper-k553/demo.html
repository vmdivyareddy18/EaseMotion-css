<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Progress Stepper Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-controls">
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
  </div>

  <h3>Horizontal Stepper</h3>
  <div class="ease-stepper ease-stepper--horizontal" id="stepperH">
    <div class="ease-stepper__track">
      <div class="ease-stepper__fill" id="fillH"></div>
    </div>
    <div class="ease-stepper__steps">
      <div class="ease-stepper__step is-active" data-step="0">
        <span class="ease-stepper__dot">1</span>
        <span class="ease-stepper__label">Cart</span>
      </div>
      <div class="ease-stepper__step" data-step="1">
        <span class="ease-stepper__dot">2</span>
        <span class="ease-stepper__label">Shipping</span>
      </div>
      <div class="ease-stepper__step" data-step="2" data-optional="true">
        <span class="ease-stepper__dot">3</span>
        <span class="ease-stepper__label">Gift Wrap <small>(optional)</small></span>
      </div>
      <div class="ease-stepper__step" data-step="3">
        <span class="ease-stepper__dot">4</span>
        <span class="ease-stepper__label">Payment</span>
      </div>
      <div class="ease-stepper__step" data-step="4">
        <span class="ease-stepper__dot">5</span>
        <span class="ease-stepper__label">Confirm</span>
      </div>
    </div>
  </div>

  <h3>Vertical Stepper</h3>
  <div class="ease-stepper ease-stepper--vertical" id="stepperV">
    <div class="ease-stepper__track">
      <div class="ease-stepper__fill" id="fillV"></div>
    </div>
    <div class="ease-stepper__steps">
      <div class="ease-stepper__step is-active" data-step="0">
        <span class="ease-stepper__dot">1</span>
        <span class="ease-stepper__label">Account created</span>
      </div>
      <div class="ease-stepper__step" data-step="1">
        <span class="ease-stepper__dot">2</span>
        <span class="ease-stepper__label">Email verified</span>
      </div>
      <div class="ease-stepper__step" data-step="2">
        <span class="ease-stepper__dot">3</span>
        <span class="ease-stepper__label">Profile completed</span>
      </div>
    </div>
  </div>

  <script>
    function setupStepper(stepperEl, fillEl) {
      const steps = [...stepperEl.querySelectorAll('.ease-stepper__step')];
      let current = 0;

      function render() {
        steps.forEach((step, i) => {
          step.classList.remove('is-active', 'is-complete', 'is-skipped');
          if (i < current) {
            step.classList.add(step.dataset.optional ? 'is-skipped' : 'is-complete');
          } else if (i === current) {
            step.classList.add('is-active');
          }
        });
        const pct = (current / (steps.length - 1)) * 100;
        fillEl.style.setProperty('--fill', pct + '%');
      }

      render();

      return {
        next: () => { if (current < steps.length - 1) { current++; render(); } },
        prev: () => { if (current > 0) { current--; render(); } }
      };
    }

    const h = setupStepper(document.getElementById('stepperH'), document.getElementById('fillH'));
    const v = setupStepper(document.getElementById('stepperV'), document.getElementById('fillV'));

    document.getElementById('nextBtn').addEventListener('click', () => { h.next(); v.next(); });
    document.getElementById('prevBtn').addEventListener('click', () => { h.prev(); v.prev(); });
  </script>

</body>
</html>
