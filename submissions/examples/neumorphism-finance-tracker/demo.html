<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism Finance Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="finance-tracker">
    <header class="tracker-header neu-inset">
      <div class="user-block">
        <div class="avatar-neu neu-flat"></div>
        <div>
          <h2>Balance Status</h2>
          <p>Active Account</p>
        </div>
      </div>
      <div class="balance neu-flat">
        <h3>$14,248.50</h3>
      </div>
    </header>

    <div class="action-grid">
      <button class="btn-neu neu-flat">📥 Deposit</button>
      <button class="btn-neu neu-flat">📤 Send</button>
    </div>

    <section class="transaction-panel neu-flat">
      <h3>Recent Transactions</h3>
      <div class="trans-list">
        <div class="trans-item neu-inset">
          <span class="icon">🛒</span>
          <div class="info">
            <h4>Store Purchase</h4>
            <p>June 20, 2026</p>
          </div>
          <span class="amount negative">-$84.20</span>
        </div>
        <div class="trans-item neu-inset">
          <span class="icon">💼</span>
          <div class="info">
            <h4>Salary Inbound</h4>
            <p>June 15, 2026</p>
          </div>
          <span class="amount positive">+$4,200.00</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
