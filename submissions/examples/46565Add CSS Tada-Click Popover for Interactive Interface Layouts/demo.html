<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Tada-Click Popover - Interactive Interface</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Tada-Click interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="interactive-layout">
        
        <!-- Top Navigation Bar -->
        <header class="app-header">
            <div class="app-logo">
                <div class="logo-shape"></div>
                <h2>PlayUI</h2>
            </div>
            
            <div class="app-controls">
                <button class="btn-icon" aria-label="Search">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
                
                <!-- THE TADA-CLICK POPOVER COMPONENT -->
                <div class="ease-popover-container">
                    <!-- Checkbox Hack for Pure CSS Click Toggle -->
                    <input type="checkbox" id="notification-toggle" class="ease-popover-toggle" aria-hidden="true">
                    
                    <label for="notification-toggle" class="ease-popover-trigger" tabindex="0" role="button" aria-haspopup="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                        <span class="notification-badge">3</span>
                    </label>
                    
                    <!-- Popover Panel -->
                    <div class="ease-popover-panel ease-tada-click" role="menu">
                        <div class="ease-popover-header">
                            <h3>Notifications</h3>
                            <!-- Close button (also a label pointing to the checkbox) -->
                            <label for="notification-toggle" class="close-btn" aria-label="Close" tabindex="0" role="button">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                            </label>
                        </div>
                        <div class="ease-popover-body">
                            <div class="notification-item unread">
                                <div class="notif-avatar bg-pink"></div>
                                <div class="notif-content">
                                    <strong>Sarah completed a task</strong>
                                    <span>"Update user interface"</span>
                                </div>
                            </div>
                            <div class="notification-item unread">
                                <div class="notif-avatar bg-yellow"></div>
                                <div class="notif-content">
                                    <strong>New achievement unlocked!</strong>
                                    <span>You reached level 10</span>
                                </div>
                            </div>
                            <div class="notification-item">
                                <div class="notif-avatar bg-blue"></div>
                                <div class="notif-content">
                                    <strong>System updated</strong>
                                    <span>Version 2.4.1 is now active</span>
                                </div>
                            </div>
                        </div>
                        <div class="ease-popover-footer">
                            <button class="btn-action">Mark all as read</button>
                        </div>
                    </div>
                </div>
                <!-- END POPOVER COMPONENT -->
                
                <div class="user-avatar"></div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <section class="app-workspace">
            <div class="workspace-header">
                <h1>Welcome back, Creator! 🎨</h1>
                <p>Ready to build something amazing today?</p>
            </div>
            
            <div class="bento-grid">
                <div class="bento-card col-span-2 bg-gradient">
                    <div class="card-content">
                        <h3>Weekly Activity</h3>
                        <div class="activity-bars">
                            <div class="bar" style="height: 40%"></div>
                            <div class="bar" style="height: 80%"></div>
                            <div class="bar" style="height: 60%"></div>
                            <div class="bar" style="height: 100%"></div>
                            <div class="bar" style="height: 30%"></div>
                            <div class="bar" style="height: 70%"></div>
                        </div>
                    </div>
                </div>
                <div class="bento-card">
                    <div class="card-content centered">
                        <div class="stat-circle">
                            <span>84%</span>
                        </div>
                        <h3>Productivity</h3>
                    </div>
                </div>
                <div class="bento-card">
                    <div class="card-content">
                        <h3>Quick Actions</h3>
                        <div class="action-grid">
                            <div class="action-btn"></div>
                            <div class="action-btn"></div>
                            <div class="action-btn"></div>
                            <div class="action-btn"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
    </main>
</body>
</html>
