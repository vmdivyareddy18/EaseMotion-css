<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Column Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Animated Column Chart</h1>
  <div class="chart-wrapper">
    <div class="chart" id="chart"></div>
  </div>
  <button class="replay-btn" id="replayBtn">Replay Animation</button>

  <script>
    const data = [
      { label: 'Jan', value: 65 },
      { label: 'Feb', value: 80 },
      { label: 'Mar', value: 45 },
      { label: 'Apr', value: 95 },
      { label: 'May', value: 55 },
      { label: 'Jun', value: 72 },
      { label: 'Jul', value: 88 },
      { label: 'Aug', value: 40 }
    ];

    const chart = document.getElementById('chart');
    const replayBtn = document.getElementById('replayBtn');

    function buildChart() {
      chart.innerHTML = '';
      data.forEach((d, i) => {
        const col = document.createElement('div');
        col.className = 'column';
        col.style.setProperty('--col-height', `${d.value}%`);
        col.style.setProperty('--col-delay', `${i * 0.08}s`);

        const bar = document.createElement('div');
        bar.className = 'bar';

        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = d.value;

        const month = document.createElement('span');
        month.className = 'month';
        month.textContent = d.label;

        bar.appendChild(label);
        col.appendChild(bar);
        col.appendChild(month);
        chart.appendChild(col);
      });
    }

    function animate() {
      chart.classList.remove('animate');
      void chart.offsetHeight;
      chart.classList.add('animate');
    }

    buildChart();
    animate();

    replayBtn.addEventListener('click', animate);
  </script>
</body>
</html>
