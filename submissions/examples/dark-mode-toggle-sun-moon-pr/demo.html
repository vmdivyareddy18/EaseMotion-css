<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Dark Mode Toggle Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      transition: background 0.4s ease, color 0.4s ease;
    }

    [data-theme="dark"] body {
      background: #0f172a;
      color: #f1f5f9;
    }

    h2 { margin: 0; }
    p { margin: 0; font-size: 0.85rem; opacity: 0.7; }
  </style>
</head>
<body>

  <h2>Toggle the theme</h2>
  <p>Sun and moon morph into each other</p>

  <button class="ease-theme-toggle" onclick="document.body.parentElement.toggleAttribute('data-theme', !document.documentElement.hasAttribute('data-theme') ? 'dark' : null); document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">
    <span class="ease-theme-icon-light">☀️</span>
    <span class="ease-theme-icon-dark">🌙</span>
  </button>

  <script>
    // Cleaner toggle logic
    const root = document.documentElement;
    const btn = document.querySelector('.ease-theme-toggle');
    btn.onclick = () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      root.setAttribute('data-theme', isDark ? 'light' : 'dark');
    };
  </script>

</body>
</html>
