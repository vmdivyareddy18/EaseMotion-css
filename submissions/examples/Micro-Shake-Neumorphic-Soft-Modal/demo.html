<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Shake Neumorphic Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Modal
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="icon">☁️</div>

        <h2>Neumorphic Workspace</h2>

        <p>
            Experience a soft neumorphic interface with a subtle
            Micro Shake interaction built entirely using HTML and CSS.
        </p>

        <div class="actions">

            <button>Continue</button>
            <button class="secondary">Cancel</button>

        </div>

    </div>

</div>

</body>
</html>
