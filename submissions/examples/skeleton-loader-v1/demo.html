<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Skeleton Loader Component - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Skeleton Loader / Shimmer Placeholder Component</h1>

      <section class="skeleton-demo" aria-label="Loading content preview">
        <article class="skeleton-card" aria-hidden="true">
          <div class="skeleton skeleton-media"></div>

          <div class="skeleton-card-body">
            <div class="skeleton-row">
              <div class="skeleton skeleton-avatar"></div>

              <div class="skeleton-text-group">
                <div class="skeleton skeleton-line skeleton-line-md"></div>
                <div class="skeleton skeleton-line skeleton-line-sm"></div>
              </div>
            </div>

            <div class="skeleton skeleton-line skeleton-line-full"></div>
            <div class="skeleton skeleton-line skeleton-line-lg"></div>
            <div class="skeleton skeleton-line skeleton-line-xs"></div>
          </div>
        </article>

        <article class="skeleton-card skeleton-card-compact" aria-hidden="true">
          <div class="skeleton-row">
            <div class="skeleton skeleton-avatar"></div>

            <div class="skeleton-text-group">
              <div class="skeleton skeleton-line skeleton-line-lg"></div>
              <div class="skeleton skeleton-line skeleton-line-sm"></div>
            </div>
          </div>

          <div class="skeleton skeleton-line skeleton-line-full"></div>
          <div class="skeleton skeleton-line skeleton-line-md"></div>
        </article>
      </section>

      <p class="description" style="margin-top: 2rem">
        This demo shows a reusable skeleton loader component for displaying
        temporary loading placeholders before real content appears.
      </p>
    </div>
  </body>
</html>
