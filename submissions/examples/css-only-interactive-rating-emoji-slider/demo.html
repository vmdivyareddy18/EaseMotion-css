<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="feedback-widget">
        <div class="emoji-display">😐</div>
        <input type="range" class="mood-slider" min="1" max="5" value="3" step="1">
        <div class="labels">
            <span>Poor</span>
            <span>Great</span>
        </div>
    </div>
</body>
</html>
