<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Explosion Shockwave - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Explosion Shockwave</h1>

    <div class="exp-card">
      <div class="exp-icon" id="expIcon">
        <div class="shockwave-ring r1"></div>
        <div class="shockwave-ring r2"></div>
        <div class="shockwave-core"></div>
        <div class="debris d1"></div>
        <div class="debris d2"></div>
        <div class="debris d3"></div>
        <div class="debris d4"></div>
      </div>
      <span class="exp-label">Detonate</span>
      <button class="exp-btn" id="expBtn">&#9889; Trigger</button>
    </div>

    <div class="variant-row">
      <div class="exp-card sm">
        <div class="exp-icon">
          <div class="shockwave-ring r1 residue"></div>
          <div class="shockwave-core residue"></div>
        </div>
        <span class="exp-label">Spent</span>
      </div>
    </div>

    <p class="description">A ring rapidly expands from scale(0) to scale(3) with opacity fading out. Optional debris particles fly outward for extra impact.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
