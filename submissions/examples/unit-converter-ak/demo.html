<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="uc-wrapper">

    <h1>Unit Converter</h1>

    <div class="cat-tabs" id="catTabs">
      <button class="cat-btn active" data-cat="length">Length</button>
      <button class="cat-btn" data-cat="weight">Weight</button>
      <button class="cat-btn" data-cat="temp">Temperature</button>
      <button class="cat-btn" data-cat="volume">Volume</button>
    </div>

    <div class="converter-body">
      <div class="uc-row">
        <input type="number" id="inputVal" class="uc-input" value="1" min="0" step="any">
        <select id="fromUnit" class="uc-select"></select>
      </div>
      <div class="uc-eq">=</div>
      <div class="uc-row">
        <input type="text" id="outputVal" class="uc-output" readonly value="--">
        <select id="toUnit" class="uc-select"></select>
      </div>
    </div>

  </div>

  <script>
    const units = {
      length: { m: 1, km: 0.001, cm: 100, mm: 1000, mi: 0.000621371, yd: 1.09361, ft: 3.28084, in: 39.3701 },
      weight: { kg: 1, g: 1000, mg: 1000000, lb: 2.20462, oz: 35.274, st: 0.157473, t: 0.001 },
      temp: { C: 'c', F: 'f', K: 'k' },
      volume: { L: 1, mL: 1000, gal: 0.264172, qt: 1.05669, pt: 2.11338, cup: 4.22675, floz: 33.814, tbsp: 67.628, tsp: 202.884 }
    };

    const labels = {
      length: { m: 'Meters', km: 'Kilometers', cm: 'Centimeters', mm: 'Millimeters', mi: 'Miles', yd: 'Yards', ft: 'Feet', in: 'Inches' },
      weight: { kg: 'Kilograms', g: 'Grams', mg: 'Milligrams', lb: 'Pounds', oz: 'Ounces', st: 'Stones', t: 'Tons' },
      temp: { C: 'Celsius', F: 'Fahrenheit', K: 'Kelvin' },
      volume: { L: 'Liters', mL: 'Milliliters', gal: 'Gallons', qt: 'Quarts', pt: 'Pints', cup: 'Cups', floz: 'Fluid Ounces', tbsp: 'Tablespoons', tsp: 'Teaspoons' }
    };

    const inputVal = document.getElementById('inputVal');
    const outputVal = document.getElementById('outputVal');
    const fromUnit = document.getElementById('fromUnit');
    const toUnit = document.getElementById('toUnit');
    const catBtns = document.querySelectorAll('.cat-btn');

    let currentCat = 'length';

    function populate(cat) {
      const keys = Object.keys(units[cat]);
      const u = units[cat];
      const l = labels[cat];
      fromUnit.innerHTML = keys.map(k => '<option value="' + k + '">' + l[k] + ' (' + k + ')</option>').join('');
      toUnit.innerHTML = fromUnit.innerHTML;
      if (cat === 'temp') { fromUnit.value = 'C'; toUnit.value = 'F'; }
      else { fromUnit.value = keys[0]; toUnit.value = keys[1] || keys[0]; }
      convert();
    }

    function convert() {
      const val = parseFloat(inputVal.value) || 0;
      const from = fromUnit.value;
      const to = toUnit.value;
      const cat = currentCat;
      const u = units[cat];
      let result;

      if (cat === 'temp') {
        let celsius;
        if (from === 'C') celsius = val;
        else if (from === 'F') celsius = (val - 32) * 5 / 9;
        else celsius = val - 273.15;

        if (to === 'C') result = celsius;
        else if (to === 'F') result = celsius * 9 / 5 + 32;
        else result = celsius + 273.15;
      } else {
        const base = val / u[from];
        result = base * u[to];
      }

      outputVal.value = result.toFixed(6).replace(/\.?0+$/, '');
    }

    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        catBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        populate(currentCat);
      });
    });

    inputVal.addEventListener('input', convert);
    fromUnit.addEventListener('change', convert);
    toUnit.addEventListener('change', convert);

    populate('length');
  </script>

</body>
</html>
