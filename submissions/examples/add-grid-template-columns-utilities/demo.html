<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Template Columns Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h1>Grid Template Columns Utilities</h1>
    <p class="subtitle">
      Utility classes for creating grid layouts with different column counts.
    </p>

    <div class="demo-card">
      <h3>.grid-cols-2</h3>
      <div class="grid-demo grid-cols-2">
        <div class="item">1</div>
        <div class="item">2</div>
      </div>
    </div>

    <div class="demo-card">
      <h3>.grid-cols-3</h3>
      <div class="grid-demo grid-cols-3">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
      </div>
    </div>

    <div class="demo-card">
      <h3>.grid-cols-4</h3>
      <div class="grid-demo grid-cols-4">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
      </div>
    </div>

    <div class="demo-card">
      <h3>.grid-cols-5</h3>
      <div class="grid-demo grid-cols-5">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
      </div>
    </div>
  </section>

</body>
</html>
