<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autonomous AI Drone Swarm Delivery Hub - Phase #1011</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container em-fade-in">
        
        <header class="hub-header">
            <div class="logo-area">
                <div class="status-pulse em-pulse"></div>
                <h1>AERO-SWARM <span class="highlight">CORE v1011</span></h1>
            </div>
            <div class="system-time">SYSTEM STATUS: <span class="online-text">OPTIMAL</span></div>
        </header>

        <main class="hub-grid">
            
            <section class="hub-card em-slide-up-delay-1">
                <div class="card-header">
                    <h2>SWARM METRICS</h2>
                    <span class="tech-id">#MTRX-01</span>
                </div>
                <div class="metric-group">
                    <div class="metric-item">
                        <span class="label">ACTIVE DRONES</span>
                        <span class="value em-counter">1,420</span>
                    </div>
                    <div class="metric-item">
                        <span class="label">BATTERY EFFICIENCY</span>
                        <span class="value">94.2%</span>
                    </div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar em-loading-bar"></div>
                </div>
            </section>

            <section class="hub-card map-card em-slide-up-delay-2">
                <div class="card-header">
                    <h2>ACTIVE DELIVERY GRID MAP</h2>
                    <span class="tech-id">LIVE FEED</span>
                </div>
                <div class="map-visualization">
                    <div class="radar-circle em-radar"></div>
                    <div class="drone-node node-1 em-float"></div>
                    <div class="drone-node node-2 em-float-delayed"></div>
                    <div class="drone-node node-3 em-float"></div>
                </div>
                <div class="controls-row">
                    <button class="em-btn btn-primary">LAUNCH SWARM</button>
                    <button class="em-btn btn-secondary">RECALL ALL</button>
                </div>
            </section>

            <section class="hub-card em-slide-up-delay-3">
                <div class="card-header">
                    <h2>DELIVERY DISPATCH QUEUE</h2>
                    <span class="tech-id">#Q-LIST</span>
                </div>
                <ul class="queue-list">
                    <li class="queue-item em-hover-lift">
                        <span class="pkg-id">PKG-9920</span>
                        <span class="pkg-status priority">CRITICAL</span>
                    </li>
                    <li class="queue-item em-hover-lift">
                        <span class="pkg-id">PKG-8841</span>
                        <span class="pkg-status routing">ROUTING</span>
                    </li>
                    <li class="queue-item em-hover-lift">
                        <span class="pkg-id">PKG-7712</span>
                        <span class="pkg-status standby">STANDBY</span>
                    </li>
                </ul>
            </section>

        </main>
    </div>

</body>
</html>
