<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-glassmorphism-contact-form – Glassmorphism Contact Form</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center"
      style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">

  <div class="ease-container ease-py-16">
    <div class="glass-form ease-mx-auto ease-max-w-md ease-p-8 ease-rounded-2xl ease-shadow-2xl ease-fade-in">
      <h2 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-2 ease-text-center">Get in Touch</h2>
      <p class="ease-text-sm ease-text-white/70 ease-mb-8 ease-text-center">We'd love to hear from you.</p>

      <form class="ease-flex ease-flex-col ease-gap-6">
        <!-- Name -->
        <div class="input-group">
          <input type="text" id="name" class="floating-input" placeholder=" " required>
          <label for="name" class="floating-label">Full Name</label>
        </div>
        <!-- Email -->
        <div class="input-group">
          <input type="email" id="email" class="floating-input" placeholder=" " required>
          <label for="email" class="floating-label">Email Address</label>
        </div>
        <!-- Message -->
        <div class="input-group">
          <textarea id="message" rows="4" class="floating-input" placeholder=" " required></textarea>
          <label for="message" class="floating-label">Your Message</label>
        </div>

        <button type="submit" class="ease-btn ease-btn-primary ease-w-full ease-hover-scale-105 ease-transition">
          Send Message
        </button>
      </form>
    </div>

    <p class="ease-text-sm ease-text-white/50 ease-mt-8 ease-text-center ease-fade-in ease-delay-500">
      Glassmorphism effect using <code>backdrop-filter</code> and floating labels.
    </p>
  </div>

</body>
</html>
