<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-only Animated Pagination - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-wrapper">
        <h2>Morphic Pure CSS Pagination</h2>
        <p>Click on any page index below. Watch the active selection indicator stretch and morph smoothly into its new position without a single line of JavaScript.</p>

        <div class="pagination-container">
            <input type="radio" name="page-group" id="page-1" checked>
            <input type="radio" name="page-group" id="page-2">
            <input type="radio" name="page-group" id="page-3">
            <input type="radio" name="page-group" id="page-4">
            <input type="radio" name="page-group" id="page-5">

            <div class="active-pill-indicator"></div>

            <label for="page-1" class="page-item" tabindex="0">1</label>
            <label for="page-2" class="page-item" tabindex="0">2</label>
            <label for="page-3" class="page-item" tabindex="0">3</label>
            <label for="page-4" class="page-item" tabindex="0">4</label>
            <label for="page-5" class="page-item" tabindex="0">5</label>
        </div>
    </div>

    <script>
        // Optional Accessibility Helper: Allows Keyboard Enter key to toggle labels seamlessly
        document.querySelectorAll('.page-item').forEach(label => {
            label.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    document.getElementById(label.getAttribute('for')).click();
                }
            });
        });
    </script>
</body>
</html>
