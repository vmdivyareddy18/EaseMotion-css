<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appointment Reschedule Option Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Reschedule Appointment</h1>

    <p class="subtitle">
        Select a new available appointment slot.
    </p>

    <div class="cards">

        <div class="option-card selected">

            <div class="date">
                <h2>Mon</h2>
                <span>28 Jul</span>
            </div>

            <div class="details">
                <h3>09:30 AM</h3>
                <p>Dr. Sarah Wilson</p>
                <span>Available</span>
            </div>

        </div>

        <div class="option-card">

            <div class="date">
                <h2>Tue</h2>
                <span>29 Jul</span>
            </div>

            <div class="details">
                <h3>11:00 AM</h3>
                <p>Dr. Sarah Wilson</p>
                <span>Available</span>
            </div>

        </div>

        <div class="option-card">

            <div class="date">
                <h2>Wed</h2>
                <span>30 Jul</span>
            </div>

            <div class="details">
                <h3>02:15 PM</h3>
                <p>Dr. Sarah Wilson</p>
                <span>Available</span>
            </div>

        </div>

    </div>

    <button class="confirm-btn">
        Confirm Reschedule
    </button>

</div>

</body>
</html>
