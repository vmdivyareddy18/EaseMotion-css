<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holy Light Rays - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="wrapper">
      <h1>Holy Light Rays</h1>
      <p class="description">
        Beams of holy light shining down with a shimmering glow.
      </p>
      <div
        class="rays-container"
        tabindex="0"
        role="img"
        aria-label="Holy light rays animation"
      >
        <div class="ray r1"></div>
        <div class="ray r2"></div>
        <div class="ray r3"></div>
        <div class="ray r4"></div>
        <div class="ray r5"></div>
        <div class="ray r6"></div>
        <div class="ray r7"></div>
      </div>
    </div>
  </body>
</html>
