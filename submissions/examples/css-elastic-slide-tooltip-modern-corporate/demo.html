<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Corporate Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="corporate">

    <h1>Corporate Dashboard</h1>
    <p>Professional business interface</p>

    <div class="cards">

        <div class="card">

            <button class="corp-btn" aria-describedby="tooltip-1">
                Analytics
            </button>

            <div class="tooltip" id="tooltip-1" role="tooltip">
                View business analytics
            </div>

        </div>


        <div class="card">

            <button class="corp-btn" aria-describedby="tooltip-2">
                Reports
            </button>

            <div class="tooltip" id="tooltip-2" role="tooltip">
                Generate company reports
            </div>

        </div>


        <div class="card">

            <button class="corp-btn" aria-describedby="tooltip-3">
                Team
            </button>

            <div class="tooltip" id="tooltip-3" role="tooltip">
                Manage team members
            </div>

        </div>

    </div>

</section>

</body>
</html>
