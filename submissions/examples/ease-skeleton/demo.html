<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-skeleton | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.2rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      text-transform: uppercase;
    }

    .section-label {
      color: #ffffff30;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: -1.5rem;
    }

    .demo-row {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Text lines demo --- */
    .text-block {
      width: 280px;
    }

    /* --- Avatar row --- */
    .avatar-row {
      display: flex;
      gap: 1.2rem;
    }

    /* --- Image demo --- */
    .image-block {
      width: 280px;
    }

    /* --- Card header demo --- */
    .card-name {
      width: 120px;
    }

    .card-sub {
      width: 80px;
    }

    /* --- Speed comparison --- */
    .speed-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .speed-block {
      width: 140px;
      height: 80px;
    }

    .speed-label {
      color: #a0a0c0;
      font-size: 0.72rem;
    }

    /* --- Light theme demo --- */
    .light-wrapper {
      background: #f5f5fa;
      padding: 1.2rem;
      border-radius: 14px;
      width: 260px;
    }

    .hint {
      color: #ffffff20;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>skeleton — Shimmer loading placeholders</h1>

  <span class="section-label">Text Lines</span>
  <div class="text-block">
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <span class="section-label">Avatars</span>
  <div class="avatar-row">
    <div class="skeleton skeleton-avatar"></div>
    <div class="skeleton skeleton-avatar"></div>
    <div class="skeleton skeleton-avatar"></div>
  </div>

  <span class="section-label">Image Placeholder</span>
  <div class="image-block">
    <div class="skeleton skeleton-image"></div>
  </div>

  <span class="section-label">Full Card (avatar + text combined)</span>
  <div class="skeleton-card">
    <div class="skeleton-card-header">
      <div class="skeleton skeleton-avatar"></div>
      <div style="display:flex; flex-direction:column; gap:6px;">
        <div class="skeleton skeleton-text card-name"></div>
        <div class="skeleton skeleton-text card-sub"></div>
      </div>
    </div>
    <div class="skeleton skeleton-image"></div>
    <div class="skeleton skeleton-text"></div>
    <div class="skeleton skeleton-text short"></div>
  </div>

  <span class="section-label">Speed Variants</span>
  <div class="demo-row">
    <div class="speed-item">
      <div class="skeleton skeleton-image speed-block skeleton-fast"></div>
      <span class="speed-label">skeleton-fast</span>
    </div>
    <div class="speed-item">
      <div class="skeleton skeleton-image speed-block"></div>
      <span class="speed-label">default</span>
    </div>
    <div class="speed-item">
      <div class="skeleton skeleton-image speed-block skeleton-slow"></div>
      <span class="speed-label">skeleton-slow</span>
    </div>
  </div>

  <span class="section-label">Light Theme</span>
  <div class="light-wrapper">
    <div class="skeleton skeleton-light skeleton-avatar" style="margin-bottom:10px;"></div>
    <div class="skeleton skeleton-light skeleton-text"></div>
    <div class="skeleton skeleton-light skeleton-text short"></div>
  </div>

  <p class="hint">Pure CSS — no JavaScript required for the shimmer effect</p>

</body>
</html>
