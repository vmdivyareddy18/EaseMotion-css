<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Typing Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="terminal-container">
        <header class="terminal-header">
            <div class="circle red"></div>
            <div class="circle yellow"></div>
            <div class="circle green"></div>
            <span class="title">bash - ease-motion</span>
        </header>
        
        <div class="terminal-body">
            <!-- 
              The classes `.typewriter` trigger the animation. 
              The inline style sets the step count dynamically based on string length for perfect letter-by-letter rendering. 
            -->
            <p class="prompt">> <span class="typewriter" style="--char-count: 26;">Initializing boot sequence...</span></p>
            
            <p class="prompt delayed-1">> <span class="typewriter" style="--char-count: 36;">Loading pure CSS animation modules...</span></p>
            
            <p class="prompt delayed-2">> <span class="typewriter success" style="--char-count: 22;">SYSTEM ONLINE. Hello, User.</span></p>
        </div>
    </main>

</body>
</html>
