<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Log Stream Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="viewer">

<div class="header">

<h2>Live Logs</h2>

<div class="status">
<span class="dot"></span>
Streaming
</div>

</div>

<div class="logs">

<div class="log info">INFO : Server started successfully.</div>

<div class="log success">SUCCESS : Connected to database.</div>

<div class="log warning">WARNING : High memory usage detected.</div>

<div class="log error">ERROR : Retry request timeout.</div>

<div class="log info">INFO : Listening on port 3000.</div>

</div>

</div>

</body>
</html>
