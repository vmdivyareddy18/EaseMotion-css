<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meeting Room Availability Timeline</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Meeting Room Availability</h1>

    <p class="subtitle">
        Check room occupancy throughout the workday.
    </p>

    <div class="timeline-card">

        <div class="room-header">

            <h2>Conference Room A</h2>

            <span class="status available">
                Available Now
            </span>

        </div>

        <div class="timeline">

            <div class="slot booked">
                <span>09:00</span>
                <div class="bar"></div>
                <small>Booked</small>
            </div>

            <div class="slot available-slot">
                <span>10:00</span>
                <div class="bar"></div>
                <small>Available</small>
            </div>

            <div class="slot booked">
                <span>11:00</span>
                <div class="bar"></div>
                <small>Booked</small>
            </div>

            <div class="slot available-slot">
                <span>12:00</span>
                <div class="bar"></div>
                <small>Available</small>
            </div>

            <div class="slot maintenance">
                <span>01:00</span>
                <div class="bar"></div>
                <small>Maintenance</small>
            </div>

            <div class="slot available-slot">
                <span>02:00</span>
                <div class="bar"></div>
                <small>Available</small>
            </div>

        </div>

        <button>
            Book Room
        </button>

    </div>

</div>

</body>
</html>
