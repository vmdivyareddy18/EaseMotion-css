<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Soft Neumorphic Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="interface-card">
    <div class="card-header">
      <h2 class="interface-title">CONTROL NODE</h2>
      <p class="interface-subtitle">Adjust parameters to initialize system</p>
    </div>

    <div class="control-grid">
      
      <div class="media-container">
        <div class="tilt-button-wrapper theme-lavender shape-circle">
          <div class="tilt-zone top-left"></div>
          <div class="tilt-zone top-right"></div>
          <div class="tilt-zone bottom-left"></div>
          <div class="tilt-zone bottom-right"></div>
          
          <button class="tilt-btn play-node" aria-label="Play Media Node">
            <span class="play-glyph"></span>
          </button>
        </div>
        <span class="element-label">MEDIA_PLAY</span>
      </div>

      <div class="button-container">
        <div class="tilt-button-wrapper theme-pure">
          <div class="tilt-zone top-left"></div>
          <div class="tilt-zone top-right"></div>
          <div class="tilt-zone bottom-left"></div>
          <div class="tilt-zone bottom-right"></div>
          
          <button class="tilt-btn" aria-label="Initialize Core Node">
            <span class="btn-text">INITIALIZE</span>
          </button>
        </div>
        <span class="element-label">SYSTEM_EXEC</span>
      </div>

    </div>
  </div>

</body>
</html>
