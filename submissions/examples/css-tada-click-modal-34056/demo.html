<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click SaaS Showcase Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div
        class="saas-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="0"
    >

        <div class="plan-badge">
            🚀 PRO PLAN
        </div>

        <h2 id="modal-title">Scale Your Business</h2>

        <p class="subtitle">
            Unlock premium features designed for growing teams and modern SaaS businesses.
        </p>

        <div class="divider"></div>

        <section class="features">

            <div class="feature">
                <span>✔</span>
                <p>Unlimited Projects</p>
            </div>

            <div class="feature">
                <span>✔</span>
                <p>Team Collaboration</p>
            </div>

            <div class="feature">
                <span>✔</span>
                <p>Advanced Analytics Dashboard</p>
            </div>

            <div class="feature">
                <span>✔</span>
                <p>Priority Email Support</p>
            </div>

            <div class="feature">
                <span>✔</span>
                <p>Custom API Access</p>
            </div>

            <div class="feature">
                <span>✔</span>
                <p>99.9% Uptime Guarantee</p>
            </div>

        </section>

        <div class="divider"></div>

        <div class="pricing">

            <div class="price">
                <h3>$29</h3>
                <span>/month</span>
            </div>

            <button class="trial-btn">
                Start Free Trial
            </button>

        </div>

    </div>

</div>

</body>
</html>
