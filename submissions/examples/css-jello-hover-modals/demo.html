<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Jello-Hover Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="hero">
  <h1>SaaS Showcase</h1>
  <p>Pure CSS Jello-Hover Modal</p>

  <a href="#jelloModal" class="open-btn">
    Launch Modal
  </a>
</div>

<div id="jelloModal" class="modal">

  <div class="backdrop"></div>

  <div
    class="modal-card"
    role="dialog"
    aria-labelledby="modal-title"
    aria-describedby="modal-desc"
  >

    <a href="#" class="close-btn" aria-label="Close">&times;</a>

    <span class="tag">NEW</span>

    <h2 id="modal-title">Jello-Hover Modal</h2>

    <p id="modal-desc">
      A modern modal designed for SaaS landing pages. Hover over the
      modal card to experience a smooth Jello animation built entirely
      with HTML and CSS.
    </p>

    <div class="feature-list">
      <div>✔ Pure CSS</div>
      <div>✔ Responsive</div>
      <div>✔ Keyboard Accessible</div>
    </div>

    <div class="actions">
      <a href="#" class="secondary-btn">Cancel</a>
      <a href="#" class="primary-btn">Get Started</a>
    </div>

  </div>

</div>

</body>
</html>
