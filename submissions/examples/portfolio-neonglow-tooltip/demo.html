<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio Neon Glow Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="portfolio-container">
        <div class="portfolio-item">
            <div class="project-number">01 // VISUAL DESIGN</div>

            <div class="tooltip-wrapper">

                <div id="portfolio-neon-tooltip" class="portfolio-tooltip" role="tooltip">
                    <span class="tooltip-client-name">Aether Studio</span>

                        development.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
