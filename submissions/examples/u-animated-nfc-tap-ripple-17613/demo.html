<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated NFC Tap Ripple</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated NFC Tap Ripple</h1>

  <p class="intro">
    A reusable contactless payment animation for fintech apps,
    digital wallets, banking platforms, and POS systems.
  </p>

  <div class="demo-grid">

    <div class="nfc-card">
      <div class="nfc-tap-ripple">
        <span class="device">📱</span>
        <span class="ripple ripple-1"></span>
        <span class="ripple ripple-2"></span>
      </div>
      <h3>Tap to Pay</h3>
    </div>

    <div class="nfc-card">
      <div class="nfc-tap-ripple large">
        <span class="device">📱</span>
        <span class="ripple ripple-1"></span>
        <span class="ripple ripple-2"></span>
      </div>
      <p>Payment Ready</p>
    </div>

    <div class="nfc-card">
      <div class="nfc-tap-ripple">
        <span class="device">📱</span>
        <span class="ripple ripple-1"></span>
        <span class="ripple ripple-2"></span>
      </div>
      <button>Pay Now</button>
    </div>

  </div>

</main>

</body>
</html>
