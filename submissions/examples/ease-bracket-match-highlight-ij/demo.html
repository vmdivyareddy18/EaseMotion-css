<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-bracket-match-highlight</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.05em; font-family: system-ui, sans-serif; margin-bottom: 0.25rem; }
    p { font-size: 0.9rem; color: #888; margin-bottom: 2rem; font-family: system-ui, sans-serif; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .controls button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
      font-family: system-ui, sans-serif;
    }
    .controls button:hover { background: #333; border-color: #888; }
    .controls button.active { background: var(--match-color, #00b894); border-color: var(--match-color, #00b894); color: #fff; }
    .playground { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .code-block {
      background: #1a1a2e;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      border: 1px solid #333;
      font-size: 1.3rem;
      line-height: 2;
      max-width: 500px;
    }
    .code-block .ease-bracket-match-highlight { display: inline; }
    .slider-group { display: flex; align-items: center; gap: 0.75rem; }
    .slider-group label { font-size: 0.85rem; color: #aaa; min-width: 6rem; font-family: system-ui, sans-serif; }
    .slider-group input[type="range"] { width: 140px; accent-color: var(--match-color, #00b894); }
    .slider-group output { font-size: 0.8rem; color: #888; min-width: 2.5rem; text-align: right; font-family: system-ui, sans-serif; }
    .color-group { display: flex; align-items: center; gap: 0.75rem; }
    .color-group label { font-size: 0.85rem; color: #aaa; font-family: system-ui, sans-serif; }
    .color-group input[type="color"] { width: 40px; height: 32px; border: 1px solid #444; border-radius: 4px; background: transparent; cursor: pointer; }
    .toggle-group { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .toggle-group label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; color: #aaa; cursor: pointer; font-family: system-ui, sans-serif; }
    .toggle-group input[type="checkbox"] { accent-color: var(--match-color, #00b894); width: 16px; height: 16px; cursor: pointer; }
    .bracket-line { margin: 0.25rem 0; white-space: nowrap; }
  </style>
</head>
<body>

  <h1>ease-bracket-match-highlight</h1>
  <p>Bracket/parenthesis pair matching with animated highlight</p>

  <div class="controls">
    <button id="toggleBtn">⟳ Toggle Highlight</button>
  </div>

  <div class="playground">
    <div class="code-block" id="codeBlock">
      <div class="bracket-line"><span class="ease-bracket-match-highlight" id="pair1"><span class="open">[</span>object, <span class="close">]</span></span></div>
      <div class="bracket-line"><span class="ease-bracket-match-highlight" id="pair2"><span class="open">{</span> key: value <span class="close">}</span></span></div>
      <div class="bracket-line"><span class="ease-bracket-match-highlight" id="pair3"><span class="open">(</span>1 + 2 * 3<span class="close">)</span></span></div>
    </div>

    <div class="toggle-group">
      <label><input type="checkbox" id="hoverToggle" checked /> Enable hover</label>
      <label><input type="checkbox" id="focusToggle" checked /> Enable focus</label>
    </div>

    <div class="slider-group">
      <label for="sizeRange">--bracket-size</label>
      <input type="range" id="sizeRange" min="1" max="3" value="1.8" step="0.1" />
      <output id="sizeVal">1.8</output>
    </div>

    <div class="color-group">
      <label for="matchColor">--match-color</label>
      <input type="color" id="matchColor" value="#00b894" />
    </div>

    <div class="color-group">
      <label for="bgColor">--highlight-bg</label>
      <input type="color" id="bgColor" value="#00b89420" />
    </div>
  </div>

  <script>
    (function() {
      var pairs = [].slice.call(document.querySelectorAll('.ease-bracket-match-highlight'));
      var toggleBtn = document.getElementById('toggleBtn');
      var hoverCheck = document.getElementById('hoverToggle');
      var focusCheck = document.getElementById('focusToggle');
      var sizeRange = document.getElementById('sizeRange');
      var sizeVal = document.getElementById('sizeVal');
      var matchColor = document.getElementById('matchColor');
      var bgColor = document.getElementById('bgColor');

      function updatePairs(prop, val) {
        pairs.forEach(function(p) { p.style.setProperty(prop, val); });
      }

      function updateSize(val) {
        sizeVal.textContent = val;
        updatePairs('--bracket-size', val + 'rem');
      }
      function updateMatchColor(val) {
        updatePairs('--match-color', val);
      }
      function updateBgColor(val) {
        updatePairs('--highlight-bg', val);
      }
      function updateHover(enabled) {
        pairs.forEach(function(p) { p.style.setProperty('pointer-events', enabled ? 'auto' : 'none'); });
      }
      function updateFocus(enabled) {
        pairs.forEach(function(p) { p.tabIndex = enabled ? 0 : -1; });
      }

      var active = false;
      toggleBtn.addEventListener('click', function() {
        active = !active;
        pairs.forEach(function(p) { p.classList.toggle('active', active); });
        toggleBtn.classList.toggle('active', active);
        toggleBtn.textContent = active ? '⟳ Hide Highlight' : '⟳ Toggle Highlight';
      });

      updateSize(sizeRange.value);
      updateMatchColor(matchColor.value);
      updateBgColor(bgColor.value);
      updateHover(hoverCheck.checked);
      updateFocus(focusCheck.checked);

      sizeRange.addEventListener('input', function() { updateSize(this.value); });
      matchColor.addEventListener('input', function() { updateMatchColor(this.value); });
      bgColor.addEventListener('input', function() { updateBgColor(this.value); });
      hoverCheck.addEventListener('change', function() { updateHover(this.checked); });
      focusCheck.addEventListener('change', function() { updateFocus(this.checked); });

      pairs.forEach(function(p) {
        p.addEventListener('focus', function() { if (focusCheck.checked) p.classList.add('active'); });
        p.addEventListener('blur', function() { if (!active) p.classList.remove('active'); });
        p.addEventListener('mouseenter', function() { if (hoverCheck.checked) p.classList.add('active'); });
        p.addEventListener('mouseleave', function() { if (!active) p.classList.remove('active'); });
      });
    })();
  </script>
</body>
</html>
