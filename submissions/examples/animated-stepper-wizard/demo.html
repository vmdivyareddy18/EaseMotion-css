<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Stepper Wizard - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Checkout Process</h1>
      <p>Complete the steps below to finalize your order.</p>
    </header>

    <!-- Wizard Card -->
    <div class="wizard-card ease-fade-in-up ease-delay-100">
      
      <!-- Stepper Progress -->
      <div class="stepper">
        <!-- Step 1: Completed -->
        <div class="step-item completed">
          <div class="step-circle ease-bounce-in ease-delay-200">
            <span class="check-icon">✓</span>
          </div>
          <span class="step-label">Cart</span>
        </div>
        
        <div class="step-line filled"></div>

        <!-- Step 2: Active -->
        <div class="step-item active">
          <div class="step-circle ease-pulse ease-delay-300">
            <span class="step-num">2</span>
          </div>
          <span class="step-label">Shipping</span>
        </div>

        <div class="step-line"></div>

        <!-- Step 3: Upcoming -->
        <div class="step-item">
          <div class="step-circle ease-delay-400">
            <span class="step-num">3</span>
          </div>
          <span class="step-label">Payment</span>
        </div>

        <div class="step-line"></div>

        <!-- Step 4: Upcoming -->
        <div class="step-item">
          <div class="step-circle ease-delay-500">
            <span class="step-num">4</span>
          </div>
          <span class="step-label">Review</span>
        </div>
      </div>

      <!-- Form Content Area -->
      <div class="wizard-content ease-fade-in-up ease-delay-600">
        <h2>Shipping Information</h2>
        <p class="content-desc">Please enter your shipping details so we can deliver your order.</p>
        
        <div class="form-grid">
          <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="john@example.com">
          </div>
          <div class="form-group full-width">
            <label for="address">Street Address</label>
            <input type="text" id="address" placeholder="123 Main St, Apt 4">
          </div>
          <div class="form-group">
            <label for="city">City</label>
            <input type="text" id="city" placeholder="San Francisco">
          </div>
          <div class="form-group">
            <label for="zip">ZIP Code</label>
            <input type="text" id="zip" placeholder="94103">
          </div>
        </div>
      </div>

      <!-- Navigation Actions -->
      <div class="wizard-actions ease-fade-in-up ease-delay-700">
        <button class="btn btn-back ease-hover-grow">
          <span class="btn-icon">←</span> Back
        </button>
        <button class="btn btn-next ease-hover-grow">
          Continue <span class="btn-icon">→</span>
        </button>
      </div>

    </div>
  </div>
</body>
</html>
