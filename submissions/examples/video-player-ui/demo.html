<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Player UI</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-video-player">
    <div class="ease-video-container">
      <div class="ease-video-preview">
        <svg class="ease-play-overlay" viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="38" fill="rgba(0,0,0,0.6)" stroke="#fff" stroke-width="2" />
          <polygon points="32,24 32,56 60,40" fill="#fff" />
        </svg>
        <span class="ease-video-duration">12:34</span>
      </div>

      <div class="ease-controls">
        <div class="ease-controls-main">
          <button class="ease-control-btn" aria-label="Play/Pause">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <polygon points="6,4 6,20 20,12" />
            </svg>
          </button>

          <div class="ease-video-progress">
            <div class="ease-progress-track">
              <div class="ease-progress-fill" style="width: 34%;"></div>
              <div class="ease-progress-thumb" style="left: 34%;"></div>
            </div>
          </div>

          <span class="ease-video-time">04:12 / 12:34</span>

          <button class="ease-control-btn" aria-label="Volume">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" />
            </svg>
          </button>

          <button class="ease-control-btn" aria-label="Fullscreen">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
