<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Ripple Effects — EaseMotion CSS</title>
  <meta name="description" content="Visual button showcase demonstrating absolute-positioned background ripple expansion transitions.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — SCSS Utilities</span>
      <h1>Button Ripple Effects</h1>
      <p class="description">
        Demonstrates animated button background overlays. Click the buttons below 
        to trigger the expanding radial ripple.
      </p>
    </header>

    <main class="showcase">
      
      <!-- Ripple Button 1: Cyan -->
      <section class="card">
        <button class="ripple-btn ripple-cyan" type="button">Cyan Ripple</button>
        <span class="badge">transition: scale 0.4s</span>
      </section>

      <!-- Ripple Button 2: Violet -->
      <section class="card">
        <button class="ripple-btn ripple-violet" type="button">Violet Ripple</button>
        <span class="badge">transition: scale 0.4s</span>
      </section>

    </main>
  </div>

</body>
</html>
