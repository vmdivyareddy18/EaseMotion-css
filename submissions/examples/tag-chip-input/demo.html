<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Input / Chip Input Component</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="chip-input-wrapper">
      <div class="chip-list" id="chipList">
        <span class="chip">JavaScript <button class="chip-remove" data-tag="JavaScript">&times;</button></span>
        <span class="chip">CSS <button class="chip-remove" data-tag="CSS">&times;</button></span>
        <span class="chip">React <button class="chip-remove" data-tag="React">&times;</button></span>
      </div>
      <div class="chip-input-row">
        <input type="text" class="chip-input" id="chipInput" placeholder="Add a tag..." />
        <button class="chip-add-btn" id="chipAddBtn">Add</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
