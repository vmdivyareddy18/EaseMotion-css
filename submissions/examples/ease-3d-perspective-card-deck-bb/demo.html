<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive 3D Perspective Card Deck</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="title-section">
    <h1>Interactive 3D Deck</h1>
    <p>Hover over the cards to explore smooth fanned-out perspective shifts</p>
  </div>

  <div class="deck-container">
    <div class="card card-1">
      <div class="card-brand">VaporWave</div>
      <div class="card-main">
        <h2>Gradient Flow Design</h2>
      </div>
      <div class="card-footer">
        <span>01 / 03</span>
        <div class="badge">Active</div>
      </div>
    </div>
    
    <div class="card card-2">
      <div class="card-brand">NeonPulse</div>
      <div class="card-main">
        <h2>Cyberpunk Aesthetic</h2>
      </div>
      <div class="card-footer">
        <span>02 / 03</span>
        <div class="badge">Locked</div>
      </div>
    </div>
    
    <div class="card card-3">
      <div class="card-brand">SolarGlow</div>
      <div class="card-main">
        <h2>Warm Sun Palette</h2>
      </div>
      <div class="card-footer">
        <span>03 / 03</span>
        <div class="badge">Locked</div>
      </div>
    </div>
  </div>

</body>
</html>
