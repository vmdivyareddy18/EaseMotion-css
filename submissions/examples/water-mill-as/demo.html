<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Mill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="hillWm"></span>
    <div class="mill">
      <span class="millHouse"></span>
      <span class="millRoof"></span>
      <span class="millDoor"></span>
      <span class="millWin"></span>
      <div class="wheelWm">
        <span class="rimWm"></span>
        <span class="spokeWm"></span>
        <span class="paddleWm pw1"></span>
        <span class="paddleWm pw2"></span>
        <span class="paddleWm pw3"></span>
        <span class="paddleWm pw4"></span>
        <span class="paddleWm pw5"></span>
        <span class="paddleWm pw6"></span>
        <span class="paddleWm pw7"></span>
        <span class="paddleWm pw8"></span>
        <span class="hubWm"></span>
      </div>
      <span class="flume"></span>
      <span class="fallWater"></span>
    </div>
    <span class="splashWm sw1"></span>
    <span class="splashWm sw2"></span>
    <span class="riverWm"></span>
  </div>
</body>
</html>
