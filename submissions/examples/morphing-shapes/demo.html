<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing Shapes Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Morphing Shapes</h1>
    
    <!-- Default Variant -->
    <div class="variant">
      <div class="morph"></div>
      <span class="label">Default</span>
    </div>
    
    <!-- Small Fast Variant -->
    <div class="variant">
      <div class="morph morph--small morph--fast"></div>
      <span class="label">Small & Fast</span>
    </div>
    
    <!-- Large Slow Variant -->
    <div class="variant">
      <div class="morph morph--large morph--slow"></div>
      <span class="label">Large & Slow</span>
    </div>
    
    <!-- Monochrome Variant -->
    <div class="variant">
      <div class="morph morph--mono"></div>
      <span class="label">Monochrome</span>
    </div>
  </div>
</body>
</html>
