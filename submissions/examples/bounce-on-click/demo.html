<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Bounce on Click</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; text-align: center; }
        .bounce-card { background: #1a1a2e; border-radius: 1rem; padding: 2rem; cursor: pointer; transition: transform 0.2s; }
        .bounce-card:hover { transform: translateY(-5px); }
        .bounce-card h3 { color: #c4b5fd; margin-top: 0; }
        .bounce-card p { color: #a1a1aa; font-size: 0.875rem; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
        button { background: #6c63ff; border: none; padding: 0.75rem 1.5rem; border-radius: 0.5rem; color: white; cursor: pointer; font-size: 1rem; margin: 0.5rem; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Bounce on Click</h1>
    <p>Click any element to see it bounce</p>
</div>

<div class="demo-grid">
    <div class="bounce-card ease-bounce-click">
        <h3>Card 1</h3>
        <p>Click me to bounce</p>
    </div>

    <div class="bounce-card ease-bounce-click ease-bounce-fast">
        <h3>Fast Bounce</h3>
        <p>Quick bounce animation</p>
    </div>

    <div class="bounce-card ease-bounce-click ease-bounce-slow">
        <h3>Slow Bounce</h3>
        <p>Gentle bounce</p>
    </div>

    <div class="bounce-card ease-bounce-click ease-bounce-rotate">
        <h3>Rotate Bounce</h3>
        <p>Bounce with rotation</p>
    </div>

    <div class="bounce-card ease-bounce-click ease-bounce-shake">
        <h3>Shake Bounce</h3>
        <p>Bounce + shake</p>
    </div>
</div>

<div class="note" style="text-align: center;">
    <button class="ease-bounce-click">Button with Bounce</button>
    <button class="ease-bounce-click ease-bounce-fast">Fast Button</button>
    <button class="ease-bounce-click ease-bounce-rotate">Rotate Button</button>
</div>

<div class="note">
    💡 Click any card or button to see the bounce effect.
</div>

<script>
    document.querySelectorAll('.ease-bounce-click').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            this.classList.add('ease-bounce-active');
            setTimeout(function() {
                el.classList.remove('ease-bounce-active');
            }, 500);
        });
    });
</script>

</body>
</html>
