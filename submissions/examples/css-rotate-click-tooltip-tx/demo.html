<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Rotate-Click Tooltip</title>
    <!-- Import global EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component specific styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-app-bg interactive-interface">
    <div class="demo-container ease-fade-in">
        <header class="demo-header">
            <h1 class="demo-title">Interactive Interface</h1>
            <p class="demo-subtitle">Pure CSS Rotate-Click Tooltip Interaction</p>
        </header>

        <main class="tooltip-demo-area">
            <div class="interactive-card">
                <div class="card-header">
                    <h2>System Status</h2>
                    
                    <!-- Pure CSS Rotate-Click Tooltip Wrapper -->
                    <div class="tooltip-wrapper">
                        <!-- Hidden Checkbox for State -->
                        <input type="checkbox" id="tooltip-trigger" class="tooltip-trigger-input" aria-hidden="true" />
                        
                        <!-- Tooltip Trigger Button -->
                        <label for="tooltip-trigger" class="tooltip-trigger-btn ease-hover-lift" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" aria-controls="tooltip-content" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()" aria-label="More information">
                            <svg class="trigger-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"></circle>
                                <line x1="12" y1="16" x2="12" y2="12"></line>
                                <line x1="12" y1="8" x2="12.01" y2="8"></line>
                            </svg>
                        </label>

                        <!-- Tooltip Content -->
                        <div id="tooltip-content" class="tooltip-content-box" role="tooltip">
                            <h4 class="tooltip-title">Detailed Metrics</h4>
                            <p class="tooltip-text">Clicking the icon triggers a smooth rotation, simultaneously expanding this tooltip via pure CSS state management.</p>
                            <a href="#" class="tooltip-link">View documentation &rarr;</a>
                        </div>
                    </div>
                </div>

                <div class="card-body">
                    <div class="status-row">
                        <span class="status-label">Network</span>
                        <span class="status-value success">Operational</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Database</span>
                        <span class="status-value success">Operational</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">API Gateway</span>
                        <span class="status-value warning">Degraded</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Background click to close hack -->
    <label for="tooltip-trigger" class="tooltip-backdrop"></label>
</body>
</html>
