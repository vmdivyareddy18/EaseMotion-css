<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Typography Toggle Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="preview-stage">
    <div class="switcher-card">
      <header class="card-intro">
        <h2>Typography Controller</h2>
        <p>Select a typeface layout style to preview application rendering.</p>
      </header>

      <!-- Pure CSS Form Controller for Option Selection -->
      <form class="font-toggle-container" onsubmit="return false;">
        
        <input type="radio" id="font-opt-sans" name="typeface-selection" class="hidden-radio-node" checked>
        <label for="font-opt-sans" class="ui-toggle-label" tabindex="0">
          <span class="label-txt">Modern Sans</span>
          <span class="draw-border-top"></span>
          <span class="draw-border-right"></span>
          <span class="draw-border-bottom"></span>
          <span class="draw-border-left"></span>
        </label>

        <input type="radio" id="font-opt-serif" name="typeface-selection" class="hidden-radio-node">
        <label for="font-opt-serif" class="ui-toggle-label" tabindex="0">
          <span class="label-txt">Classic Serif</span>
          <span class="draw-border-top"></span>
          <span class="draw-border-right"></span>
          <span class="draw-border-bottom"></span>
          <span class="draw-border-left"></span>
        </label>

        <input type="radio" id="font-opt-mono" name="typeface-selection" class="hidden-radio-node">
        <label for="font-opt-mono" class="ui-toggle-label" tabindex="0">
          <span class="label-txt">Tech Mono</span>
          <span class="draw-border-top"></span>
          <span class="draw-border-right"></span>
          <span class="draw-border-bottom"></span>
          <span class="draw-border-left"></span>
        </label>

        <!-- Live Preview Target Box containing dynamic text layout -->
        <div class="dynamic-text-viewport">
          <p class="sample-paragraph">
            The quick brown fox jumps over the lazy dog. Expanding scalable user experiences requires clean layout optimization matrices.
          </p>
        </div>

      </form>
    </div>
  </main>

  <script>
    // Native keyboard listener mapping spacebar and enter keys to toggle state
    document.querySelectorAll('.ui-toggle-label').forEach(btn => {
      btn.addEventListener('keydown', (event) => {
        if (event.key === ' ' || event.key === 'Enter') {
          event.preventDefault();
          const targetInput = document.getElementById(btn.getAttribute('for'));
          if (targetInput) targetInput.click();
        }
      });
    });
  </script>
</body>
</html>
