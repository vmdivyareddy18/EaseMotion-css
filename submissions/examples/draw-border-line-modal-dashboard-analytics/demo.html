<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
View Analytics
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal">

<span class="line top"></span>
<span class="line right"></span>
<span class="line bottom"></span>
<span class="line left"></span>

<label for="modal-toggle" class="close">&times;</label>

<h2>Analytics Overview</h2>

<div class="stats">

<div class="card">
<h3>Revenue</h3>
<strong>$18.2K</strong>
</div>

<div class="card">
<h3>Users</h3>
<strong>4,281</strong>
</div>

<div class="card">
<h3>Growth</h3>
<strong>+23%</strong>
</div>

</div>

<div class="progress">
<div class="fill"></div>
</div>

<button>Open Dashboard</button>

</div>

</body>
</html>
