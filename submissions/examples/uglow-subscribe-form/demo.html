<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Glow Subscribe Form</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <section class="subscribe-card">

            <h1>Stay Updated</h1>

            <p>
                Subscribe to receive the latest product updates,
                news and exclusive offers.
            </p>

            <form class="ease-subscribe-form">

                <label for="email" class="sr-only">
                    Email Address
                </label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

                <button
                    type="submit"
                    class="ease-glow-button">

                    Subscribe

                </button>

            </form>

            <div class="feature-list">

                <span class="feature">
                    ✓ Weekly Updates
                </span>

                <span class="feature">
                    ✓ No Spam
                </span>

                <span class="feature">
                    ✓ Cancel Anytime
                </span>

            </div>

        </section>

    </main>

</body>

</html>
