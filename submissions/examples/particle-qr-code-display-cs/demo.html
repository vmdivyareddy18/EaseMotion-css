    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta
      name="description"
      content="A reusable particle animation and scanning effect for QR codes."
    />

    <title>Particle QR Code Display — EaseMotion CSS</title>

    <link rel="stylesheet" href="../../../easemotion.css" />

    <link rel="stylesheet" href="./style.css" />

        aria-label="Animated QR code with floating particles and a scanning beam"

          <span
            class="ease-particle-qr__particle ease-particle-qr__particle--1"

          <span
