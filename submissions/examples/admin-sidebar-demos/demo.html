<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard Workspace Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-wrapper">
    <!-- State controller for absolute toggle behavior without heavy JS layout loops -->
    <input type="checkbox" id="sidebar-toggle-check">

    <!-- Dashboard Sidebar Navigation Panel -->
    <aside class="sidebar">
      <div class="logo-container">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"></path><path d="M2 17l10 5 10-5"></path><path d="M2 12l10 5 10-5"></path></svg>
        <span>NexusAdmin</span>
      </div>
      <nav>
        <ul class="nav-links-list">
          <li><a href="#" class="nav-item-link active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg> Dashboard</a></li>
          <li><a href="#" class="nav-item-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg> Users</a></li>
          <li><a href="#" class="nav-item-link"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Settings</a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main Workspace Frame -->
    <main class="main-workspace">
      <header class="dashboard-header ease-fade-in">
        <div class="header-title">
          <h1>System Overview</h1>
        </div>
        <!-- Hamburger Menu Button linking directly to checkbox state -->
        <label for="sidebar-toggle-check" class="toggle-label">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </label>
      </header>

      <div class="dashboard-view-body">
        <!-- Dashboard Content Summary Analytics Cards -->
        <div class="cards-grid">
          <div class="dash-card ease-fade-in ease-slide-up">
            <div class="card-title">Net Revenue</div>
            <div class="card-metric">$48,250</div>
          </div>
          <div class="dash-card ease-fade-in ease-slide-up">
            <div class="card-title">Active Server Hubs</div>
            <div class="card-metric">12 / 12</div>
          </div>
          <div class="dash-card ease-fade-in ease-slide-up">
            <div class="card-title">Concurrent API Queries</div>
            <div class="card-metric">3,841</div>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
