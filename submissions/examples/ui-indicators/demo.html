<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Indicators Component</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  
  <!-- Component Specific CSS -->
  <link rel="stylesheet" href="../../../components/cards.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 600px;
      width: 100%;
    }
    h1 {
      color: var(--ease-color-text);
      margin-bottom: var(--ease-space-6);
    }
    h2 {
      font-size: var(--ease-text-lg);
      margin-top: var(--ease-space-6);
      margin-bottom: var(--ease-space-3);
      border-bottom: 1px solid var(--ease-color-neutral-200);
      padding-bottom: var(--ease-space-2);
      color: var(--ease-color-text);
    }
    .demo-row {
      display: flex;
      gap: var(--ease-space-4);
      align-items: center;
      margin-bottom: var(--ease-space-4);
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h1>UI Indicators</h1>
    
    <div class="ease-card ease-card-shadow ease-padding-6">
      
      <!-- Badges -->
      <h2>Badges & Tags</h2>
      <div class="demo-row">
        <span class="ease-badge">Default</span>
        <span class="ease-badge ease-badge-primary ease-badge-pill">Primary Pill</span>
        <span class="ease-badge ease-badge-success">Success</span>
        <span class="ease-badge ease-badge-danger ease-badge-pulse">Live Pulse</span>
      </div>

      <!-- Avatars -->
      <h2>Avatars</h2>
      <div class="demo-row">
        <!-- Initials Avatar -->
        <div class="ease-avatar">
          JD
        </div>
        
        <!-- Large Avatar with Online Status -->
        <div class="ease-avatar ease-avatar-lg">
          <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="User" class="ease-avatar-img">
          <span class="ease-avatar-status ease-status-online"></span>
        </div>
        
        <!-- Small Avatar with Busy Status -->
        <div class="ease-avatar ease-avatar-sm">
          <img src="https://i.pravatar.cc/150?u=a04258a2462d826712d" alt="User" class="ease-avatar-img">
          <span class="ease-avatar-status ease-status-busy"></span>
        </div>
      </div>

      <!-- Progress Bars -->
      <h2>Progress Bars</h2>
      
      <p class="ease-text-sm ease-text-muted ease-margin-b-2">Static Progress (75%)</p>
      <div class="ease-progress ease-margin-b-4" style="margin-bottom: 1.5rem;">
        <div class="ease-progress-bar" style="width: 75%;"></div>
      </div>
      
      <p class="ease-text-sm ease-text-muted ease-margin-b-2">Indeterminate Loading</p>
      <div class="ease-progress">
        <div class="ease-progress-bar ease-progress-indeterminate"></div>
      </div>

    </div>
  </div>

</body>
</html>
