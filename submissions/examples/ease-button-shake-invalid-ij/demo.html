<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Shake Invalid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Button Shake on Invalid</h1>
    <p class="subtitle">Submit the form with an empty name field to trigger the shake animation.</p>

    <form class="shake-form" id="demoForm">
      <div class="field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your name" required>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" value="test@example.com">
      </div>

      <button class="btn-shake" type="submit">Submit</button>
    </form>

    <p class="hint" id="hint">Enter your name above, then click Submit.</p>
  </div>

  <script>
    const form = document.getElementById('demoForm');
    const nameInput = document.getElementById('name');
    const hint = document.getElementById('hint');
    const btn = document.querySelector('.btn-shake');

    form.addEventListener('submit', function(e) {
      e.preventDefault();

      if (!nameInput.value.trim()) {
        btn.classList.remove('shake');
        void btn.offsetWidth;  /* force reflow */
        btn.classList.add('shake');
        hint.textContent = '❌ Name field is required — shaking!';
        nameInput.focus();
      } else {
        hint.textContent = '✓ Form submitted successfully!';
      }
    });

    btn.addEventListener('animationend', function() {
      this.classList.remove('shake');
    });
  </script>
</body>
</html>
