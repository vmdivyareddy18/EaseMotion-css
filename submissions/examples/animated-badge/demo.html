<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Badge</title>
  <meta name="description" content="CSS-only animated notification dot badge and count badge with pulse animation, position modifiers, and entrance effects.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Animated Badge</h1>
      <p class="subtitle">Notification dot, count badge, and pulse animation variants</p>
    </header>

    <div class="demo-section">
      <div class="section-label">Notification Dot</div>
      <div class="icon-row">
        <div class="icon-wrapper">
          &#9993;
          <span class="ease-badge-dot pulse"></span>
        </div>
        <div class="icon-wrapper">
          &#128276;
          <span class="ease-badge-dot"></span>
        </div>
        <div class="icon-wrapper">
          &#128172;
          <span class="ease-badge-dot pulse"></span>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <div class="section-label">Count Badge</div>
      <div class="icon-row">
        <div class="icon-wrapper">
          &#128276;
          <span class="ease-badge-notification is-updated" id="badge-count">3</span>
        </div>
        <div class="icon-wrapper">
          &#128722;
          <span class="ease-badge-notification" id="badge-cart">2</span>
        </div>
        <div class="icon-wrapper">
          &#128100;
          <span class="ease-badge-notification" id="badge-friend">5</span>
        </div>
      </div>
      <div style="display:flex; gap:0.75rem; justify-content:center; margin-top:1.5rem;">
        <button class="trigger-btn" onclick="triggerUpdate('badge-count')">Pulse Bell</button>
        <button class="trigger-btn" onclick="triggerUpdate('badge-cart')">Pulse Cart</button>
        <button class="trigger-btn" onclick="triggerUpdate('badge-friend')">Pulse Friend</button>
      </div>
    </div>

    <div class="demo-section">
      <div class="section-label">Position Modifiers &amp; Entrance</div>
      <div class="badge-grid">
        <div class="badge-card">
          <div class="icon-wrapper">
            &#9879;
            <span class="ease-badge-dot pulse top-left"></span>
          </div>
          <span class="badge-card-label">top-left</span>
        </div>
        <div class="badge-card">
          <div class="icon-wrapper">
            &#9879;
            <span class="ease-badge-dot pulse"></span>
          </div>
          <span class="badge-card-label">top-right</span>
        </div>
        <div class="badge-card">
          <div class="icon-wrapper">
            &#9879;
            <span class="ease-badge-dot pulse bottom-left"></span>
          </div>
          <span class="badge-card-label">bottom-left</span>
        </div>
        <div class="badge-card">
          <div class="icon-wrapper">
            &#9879;
            <span class="ease-badge-dot pulse bottom-right"></span>
          </div>
          <span class="badge-card-label">bottom-right</span>
        </div>
      </div>
      <div style="text-align:center; margin-top:1.5rem;">
        <span class="ease-badge-notification ease-badge-enter" style="position:relative; top:auto; right:auto; display:inline-flex;">New</span>
        <span style="margin:0 0.5rem;color:var(--color-text-muted);">Entrance via <code>.ease-badge-enter</code></span>
      </div>
    </div>

  </main>

  <script>
    function triggerUpdate(id) {
      const el = document.getElementById(id);
      el.classList.remove('is-updated');
      void el.offsetWidth;
      el.classList.add('is-updated');
    }
  </script>

</body>
</html>
