<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-hover-border-glow-isk</title>
  <meta name="description" content="A demonstration of the ease-hover-border-glow-isk animation showing elements (button, input, card) gaining a border glow on hover/focus.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hover-border-glow-isk</h1>
      <p class="subtitle" id="main-desc">Hover or focus on the elements below to see the border glow effect</p>
    </header>

    <div class="display-area">
      <!-- Demo Button -->
      <button class="demo-button ease-hover-border-glow-isk" id="button-target">
        Interactive Button
      </button>

      <!-- Demo Input -->
      <input type="text" class="demo-input ease-hover-border-glow-isk" id="input-target" placeholder="Click to focus / Hover over me...">

      <!-- Demo Card -->
      <div class="demo-card ease-hover-border-glow-isk" id="card-target">
        <h3>Glow Card</h3>
        <p>This card gains a vibrant, soft blue border glow on hover, perfect for card layouts or dashboard grids.</p>
      </div>
    </div>
  </main>

</body>
</html>
