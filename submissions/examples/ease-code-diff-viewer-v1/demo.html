<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Code Diff Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="viewer">

<h1>Ease Code Diff Viewer</h1>

<div class="diff">

<div class="panel">

<h2>Before</h2>

<div class="line remove">
<span class="num">1</span>
<span>const count = 0;</span>
</div>

<div class="line remove">
<span class="num">2</span>
<span>console.log(count);</span>
</div>

</div>

<div class="panel">

<h2>After</h2>

<div class="line add">
<span class="num">1</span>
<span>let count = 10;</span>
</div>

<div class="line add">
<span class="num">2</span>
<span>console.log(count);</span>
</div>

</div>

</div>

</div>

</body>
</html>
