<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Badge Dot | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1 class="badge__heading">Status Badge Dots</h1>

  <div class="badge__row">
    <div class="badge__size-label">Small</div>
    <div class="badge__group">
      <span class="badge badge--small badge--online"></span>
      <span class="badge badge--small badge--offline"></span>
      <span class="badge badge--small badge--away"></span>
      <span class="badge badge--small badge--busy"></span>
    </div>
  </div>

  <div class="badge__row">
    <div class="badge__size-label">Medium</div>
    <div class="badge__group">
      <span class="badge badge--medium badge--online"></span>
      <span class="badge badge--medium badge--offline"></span>
      <span class="badge badge--medium badge--away"></span>
      <span class="badge badge--medium badge--busy"></span>
    </div>
  </div>

  <div class="badge__row">
    <div class="badge__size-label">Large</div>
    <div class="badge__group">
      <span class="badge badge--large badge--online"></span>
      <span class="badge badge--large badge--offline"></span>
      <span class="badge badge--large badge--away"></span>
      <span class="badge badge--large badge--busy"></span>
    </div>
  </div>

  <div class="badge__demo">
    <div class="badge__avatar">
      <img src="https://i.pravatar.cc/60?u=avatar1" alt="avatar" class="badge__avatar-img" />
      <span class="badge badge--medium badge--online badge--pulse"></span>
    </div>
    <div class="badge__avatar">
      <img src="https://i.pravatar.cc/60?u=avatar2" alt="avatar" class="badge__avatar-img" />
      <span class="badge badge--medium badge--away badge--pulse"></span>
    </div>
    <div class="badge__avatar">
      <img src="https://i.pravatar.cc/60?u=avatar3" alt="avatar" class="badge__avatar-img" />
      <span class="badge badge--medium badge--busy badge--pulse"></span>
    </div>
    <div class="badge__avatar">
      <img src="https://i.pravatar.cc/60?u=avatar4" alt="avatar" class="badge__avatar-img" />
      <span class="badge badge--medium badge--offline"></span>
    </div>
  </div>

  <p class="badge__footnote">Online (green) · Away (amber) · Busy (red) · Offline (gray)</p>
</body>
</html>
