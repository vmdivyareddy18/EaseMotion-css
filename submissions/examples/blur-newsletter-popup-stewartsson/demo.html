<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Hub - Blur Newsletter Popup Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="corporate-viewport">
        <!-- Mock Corporate Dashboard Surface Backdrop -->
        <div class="dashboard-background-mock">
            <div class="mock-nav"></div>
            <div class="mock-grid">
                <div class="mock-box"></div>
                <div class="mock-box"></div>
            </div>
        </div>

        <!-- Pure-CSS Functional Modal Dismissal Trigger Gate Checkbox -->
        <input type="checkbox" id="popup-dismiss-gate" class="popup-input-gate">

        <!-- Advanced Backdrop Blur Glassmorphism Modal Layer Container -->
        <div class="blur-popup-overlay ease-backdrop-fade">
            <!-- Central Interactive Corporate Card Modal Shell -->
            <div class="popup-modal-card ease-modal-zoom">
                <header class="popup-header">
                    <span class="corp-badge">Enterprise Insights</span>
                    <h2 class="popup-title">Join Executive Network</h2>
                    <p class="popup-subtitle">Subscribe to receive priority telemetry analytical data and repository update loops straight to your ledger terminal.</p>
                </header>

                <!-- Mock Functional Corporate Subscription Form Section -->
                <form class="popup-form-box" onsubmit="return false;">
                    <input type="email" class="form-input-field" placeholder="Enter corporate email address..." required>
                    <button type="submit" class="form-submit-btn">Secure Subscription Channel</button>
                </form>

                <!-- Interactive Dismissal Cross Button Label Hook Selector -->
                <label for="popup-dismiss-gate" class="modal-close-trigger-btn">&times;</label>
            </div>
        </div>
    </div>
</body>
</html>
