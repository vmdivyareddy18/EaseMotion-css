<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>justify-self &amp; justify-items — Grid Horizontal Alignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1><code>justify-self</code> &amp; <code>justify-items</code></h1>
    <p>Individual vs container-level horizontal alignment in grid</p>
  </header>
  <main>
    <section class="demo-card">
      <h2>Container: <code>justify-items: stretch</code></h2>
      <div class="grid-demo stretch-items">
        <div class="gi">1</div>
        <div class="gi">2</div>
        <div class="gi">3</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>Container: <code>justify-items: center</code></h2>
      <div class="grid-demo center-items">
        <div class="gi">1</div>
        <div class="gi">2</div>
        <div class="gi">3</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>Individual <code>justify-self</code></h2>
      <div class="grid-demo individual-js">
        <div class="gi js-start">start</div>
        <div class="gi js-center">center</div>
        <div class="gi js-end">end</div>
        <div class="gi js-stretch">stretch</div>
      </div>
    </section>
  </main>
  <footer>
    <p><code>justify-self</code> on a grid item overrides <code>justify-items</code> set on the container.</p>
  </footer>
</body>
</html>
