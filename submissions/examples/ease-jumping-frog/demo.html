<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jumping Frog</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🐸 Jumping Frog</h1>
        <p class="subtitle">Frog that hops when clicked</p>

        <div class="frog-wrapper">
            <canvas id="frogCanvas"></canvas>

            <div class="controls">
                <button id="jumpBtn">🐸 Jump!</button>
                <button id="colorBtn">Color: Green</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🐸 Ready to hop</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('frogCanvas');
        const ctx = canvas.getContext('2d');
        const jumpBtn = document.getElementById('jumpBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let frog = {
            x: 0,
            y: 0,
            size: 50,
            jumpHeight: 0,
            jumpVelocity: 0,
            isJumping: false,
            jumpPhase: 0,
            rotation: 0,
            scaleX: 1,
            scaleY: 1,
            legAngle: 0,
            eyeAngle: 0,
            mouthOpen: 0,
            bodyBob: 0,
        };
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let particles = [];
        let isSquished = false;
        let squishTimer = 0;
        let jumpCount = 0;

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Green',
                body: '#2d7d46',
                belly: '#4a9a5a',
                eye: '#ffd93d',
                pupil: '#1a1a1a',
                spot: '#1a5a30',
                tongue: '#ff6b6b',
                leg: '#3a8a50',
                toe: '#2a6a3a'
            },
            {
                name: 'Blue',
                body: '#2a5a8a',
                belly: '#4a7aaa',
                eye: '#ffd93d',
                pupil: '#1a1a2a',
                spot: '#1a3a6a',
                tongue: '#ff6b6b',
                leg: '#3a6a9a',
                toe: '#2a4a7a'
            },
            {
                name: 'Red',
                body: '#8a2a2a',
                belly: '#aa4a4a',
                eye: '#ffd93d',
                pupil: '#2a1a1a',
                spot: '#6a1a1a',
                tongue: '#ff6b6b',
                leg: '#9a3a3a',
                toe: '#7a2a2a'
            },
            {
                name: 'Golden',
                body: '#c4a02a',
                belly: '#d4b04a',
                eye: '#ffd93d',
                pupil: '#1a1a0a',
                spot: '#a0801a',
                tongue: '#ff6b6b',
                leg: '#b4903a',
                toe: '#a0802a'
            },
            {
                name: 'Purple',
                body: '#5a2a8a',
                belly: '#7a4aaa',
                eye: '#ffd93d',
                pupil: '#1a0a2a',
                spot: '#4a1a6a',
                tongue: '#ff6b6b',
                leg: '#6a3a9a',
                toe: '#4a2a7a'
            },
            {
                name: 'Rainbow',
                body: '#4d96ff',
                belly: '#6bcb77',
                eye: '#ffd93d',
                pupil: '#1a1a1a',
                spot: '#ff6b6b',
                tongue: '#ff6b6b',
                leg: '#9b59b6',
                toe: '#e67e22'
            },
        ];

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color || '#ffd93d';
                this.size = 2 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 6;
                this.vy = (Math.random() - 0.5) * 6 - 2;
                this.life = 1;
                this.maxLife = 20 + Math.random() * 30;
                this.age = 0;
                this.gravity = 0.05 + Math.random() * 0.05;
                this.phase = Math.random() * Math.PI * 2;
                this.glow = 0.3 + Math.random() * 0.4;
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.life = 1 - this.age / this.maxLife;
                this.size *= 0.995;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                grad.addColorStop(0, this.color + '60');
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.3;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.8;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color + '60';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== DRAW FROG =====
        function drawFrog(ctx, cx, cy, scale) {
            const palette = colorPalettes[colorMode];
            const s = scale || 1;
            const size = frog.size * s;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(frog.rotation);
            ctx.scale(frog.scaleX, frog.scaleY);

            // Shadow
            const shadowY = frog.isJumping ? size * 0.6 : size * 0.8;
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.beginPath();
            ctx.ellipse(0, shadowY, size * 0.6, size * 0.15, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fill();
            ctx.shadowBlur = 0;

            // Back legs
            const legOffset = frog.legAngle * 0.3;

            // Left back leg
            ctx.save();
            ctx.translate(-size * 0.4, size * 0.2);
            ctx.rotate(-0.2 + legOffset);
            ctx.fillStyle = palette.leg;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.25, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            // Foot
            ctx.fillStyle = palette.toe;
            ctx.beginPath();
            ctx.ellipse(size * 0.15, size * 0.35, size * 0.2, size * 0.15, 0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Right back leg
            ctx.save();
            ctx.translate(size * 0.4, size * 0.2);
            ctx.rotate(0.2 - legOffset);
            ctx.fillStyle = palette.leg;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.25, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = palette.toe;
            ctx.beginPath();
            ctx.ellipse(-size * 0.15, size * 0.35, size * 0.2, size * 0.15, -0.3, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Body
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.15)';
            ctx.fillStyle = palette.body;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.5, size * 0.4, 0, 0, Math.PI * 2);
            ctx.fill();

            // Belly
            ctx.fillStyle = palette.belly;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.ellipse(0, size * 0.05, size * 0.35, size * 0.25, 0, 0, Math.PI * 2);
            ctx.fill();

            // Spots
            ctx.fillStyle = palette.spot;
            ctx.globalAlpha = 0.3;
            for (let i = 0; i < 3; i++) {
                const angle = (i / 3) * Math.PI * 2 + 0.5;
                const dx = Math.cos(angle) * size * 0.2;
                const dy = Math.sin(angle) * size * 0.15 - size * 0.05;
                ctx.beginPath();
                ctx.arc(dx, dy, size * 0.06, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // Front legs
            // Left front leg
            ctx.save();
            ctx.translate(-size * 0.25, size * 0.25);
            ctx.rotate(-0.1 + legOffset * 0.5);
            ctx.fillStyle = palette.leg;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.12, size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            // Foot
            ctx.fillStyle = palette.toe;
            ctx.beginPath();
            ctx.ellipse(0, size * 0.25, size * 0.15, size * 0.08, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Right front leg
            ctx.save();
            ctx.translate(size * 0.25, size * 0.25);
            ctx.rotate(0.1 - legOffset * 0.5);
            ctx.fillStyle = palette.leg;
            ctx.beginPath();
            ctx.ellipse(0, 0, size * 0.12, size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = palette.toe;
            ctx.beginPath();
            ctx.ellipse(0, size * 0.25, size * 0.15, size * 0.08, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Head
            ctx.fillStyle = palette.body;
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.beginPath();
            ctx.ellipse(0, -size * 0.25, size * 0.4, size * 0.3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // Eyes
            const eyeSize = size * 0.18;
            const eyeY = -size * 0.35;

            // Left eye
            ctx.save();
            ctx.translate(-size * 0.18, eyeY);
            ctx.rotate(frog.eyeAngle * 0.1);
            ctx.fillStyle = palette.eye;
            ctx.shadowBlur = 10;
            ctx.shadowColor = palette.eye + '40';
            ctx.beginPath();
            ctx.ellipse(0, 0, eyeSize, eyeSize * 1.1, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // Pupil
            ctx.fillStyle = palette.pupil;
            ctx.beginPath();
            ctx.arc(eyeSize * 0.1, eyeSize * 0.1, eyeSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            // Highlight
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(-eyeSize * 0.1, -eyeSize * 0.2, eyeSize * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();

            // Right eye
            ctx.save();
            ctx.translate(size * 0.18, eyeY);
            ctx.rotate(-frog.eyeAngle * 0.1);
            ctx.fillStyle = palette.eye;
            ctx.shadowBlur = 10;
            ctx.shadowColor = palette.eye + '40';
            ctx.beginPath();
            ctx.ellipse(0, 0, eyeSize, eyeSize * 1.1, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = palette.pupil;
            ctx.beginPath();
            ctx.arc(-eyeSize * 0.1, eyeSize * 0.1, eyeSize * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = 0.6;
            ctx.beginPath();
            ctx.arc(eyeSize * 0.1, -eyeSize * 0.2, eyeSize * 0.15, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.restore();

            // Mouth
            ctx.fillStyle = '#1a1a1a';
            ctx.beginPath();
            ctx.arc(0, -size * 0.1, size * 0.15, 0.1, Math.PI - 0.1);
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Tongue (when jumping)
            if (frog.isJumping && frog.jumpPhase > 0.2) {
                ctx.fillStyle = palette.tongue;
                ctx.globalAlpha = 0.5;
                ctx.beginPath();
                ctx.ellipse(0, -size * 0.05, size * 0.1, size * 0.05, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            ctx.restore();
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a1a0e');
            grad.addColorStop(0.5, '#060f06');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Lily pads
            for (let i = 0; i < 3; i++) {
                const x = (i / 3) * w + 40 + Math.sin(i * 0.7 + time * 0.003) * 20;
                const y = h * 0.7 + Math.cos(i * 0.5 + time * 0.004) * 15;
                const size = 20 + i * 10;
                ctx.beginPath();
                ctx.ellipse(x, y, size, size * 0.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(30, 60, 30, ${0.05 + i * 0.03})`;
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x, y - size * 0.2);
                ctx.strokeStyle = `rgba(30, 60, 30, 0.05)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Grass
            for (let i = 0; i < 20; i++) {
                const x = (i / 20) * w + Math.sin(i * 0.5 + time * 0.005) * 5;
                const y = h * 0.7 + Math.sin(i * 1.3 + time * 0.008) * 3;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(
                    x + Math.sin(i + time * 0.005) * 4,
                    y - 10 - Math.sin(i * 0.7 + time * 0.01) * 5,
                    x + Math.sin(i * 1.5 + time * 0.006) * 6,
                    y - 15 - Math.sin(i * 1.1 + time * 0.01) * 6
                );
                ctx.strokeStyle = `rgba(40, 80, 40, ${0.1 + Math.sin(i + time * 0.005) * 0.05})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Ground
            const groundY = h * 0.7;
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, h);
            groundGrad.addColorStop(0, 'rgba(30, 60, 30, 0)');
            groundGrad.addColorStop(0.3, 'rgba(30, 60, 30, 0.05)');
            groundGrad.addColorStop(0.7, 'rgba(30, 60, 30, 0.1)');
            groundGrad.addColorStop(1, 'rgba(30, 60, 30, 0.15)');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, w, h - groundY);

            // Ground line
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(w, groundY);
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // ===== JUMP =====
        function jump() {
            if (frog.isJumping) return;

            frog.isJumping = true;
            frog.jumpVelocity = -12;
            frog.jumpHeight = 0;
            frog.jumpPhase = 0;
            jumpCount++;

            // Particles on jump
            const palette = colorPalettes[colorMode];
            for (let i = 0; i < 15; i++) {
                const p = new Particle(
                    frog.x + (Math.random() - 0.5) * 30,
                    frog.y + (Math.random() - 0.5) * 10,
                    palette.body
                );
                p.vx = (Math.random() - 0.5) * 5;
                p.vy = -Math.random() * 4 - 1;
                particles.push(p);
            }

            statusText.textContent = '🐸 Hop!';
            setTimeout(() => {
                statusText.textContent = `🐸 ${jumpCount} hops`;
            }, 500);
        }

        // ===== RESET =====
        function resetFrog() {
            frog.isJumping = false;
            frog.jumpHeight = 0;
            frog.jumpVelocity = 0;
            frog.jumpPhase = 0;
            frog.rotation = 0;
            frog.scaleX = 1;
            frog.scaleY = 1;
            frog.legAngle = 0;
            frog.eyeAngle = 0;
            frog.bodyBob = 0;
            particles = [];
            jumpCount = 0;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = '🐸 Ready to hop';
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2 + 20;
            const scale = Math.min(w, h) / 400;
            time += 0.01;

            // Jump physics
            if (frog.isJumping) {
                frog.jumpVelocity += 0.4;
                frog.jumpHeight += frog.jumpVelocity;
                frog.jumpPhase += 0.05;

                // Rotation during jump
                frog.rotation = frog.jumpVelocity * 0.02;

                // Squish on landing
                if (frog.jumpHeight > 0) {
                    frog.scaleX = 1 + Math.abs(frog.jumpVelocity) * 0.01;
                    frog.scaleY = 1 - Math.abs(frog.jumpVelocity) * 0.01;
                }

                // Leg animation
                frog.legAngle = Math.sin(frog.jumpPhase * 2) * 0.3;

                // Eye animation
                frog.eyeAngle = Math.sin(frog.jumpPhase * 3) * 0.1;

                // Check landing
                if (frog.jumpHeight >= 0 && frog.jumpVelocity >= 0) {
                    frog.isJumping = false;
                    frog.jumpHeight = 0;
                    frog.jumpVelocity = 0;
                    frog.rotation = 0;
                    frog.scaleX = 1;
                    frog.scaleY = 1;
                    frog.legAngle = 0;
                    frog.eyeAngle = 0;
                    
                    // Landing particles
                    const palette = colorPalettes[colorMode];
                    for (let i = 0; i < 10; i++) {
                        const p = new Particle(
                            cx + (Math.random() - 0.5) * 40,
                            cy + 20 + (Math.random() - 0.5) * 10,
                            palette.body
                        );
                        p.vx = (Math.random() - 0.5) * 4;
                        p.vy = -Math.random() * 3 - 1;
                        particles.push(p);
                    }
                }

                frog.y = -frog.jumpHeight * 0.5;
            } else {
                // Idle animation
                frog.bodyBob = Math.sin(time * 0.5) * 1;
                frog.legAngle = Math.sin(time * 0.3) * 0.02;
                frog.eyeAngle = Math.sin(time * 0.2) * 0.02;
                frog.y = frog.bodyBob;
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw particles
            for (const p of particles) {
                p.draw(ctx);
            }

            // Draw frog
            frog.x = cx;
            frog.y = cy + frog.y;
            drawFrog(ctx, frog.x, frog.y, scale);

            // Update status
            if (frameCount % 30 === 0) {
                const state = frog.isJumping ? '🔄 Jumping!' : '🐸 Ready';
                statusText.textContent = `${state} • ${colorPalettes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Jump
        jumpBtn.addEventListener('click', jump);

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = '🐸 Ready to hop';
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetFrog);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'j' || e.key === 'J') {
                jumpBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                jumpBtn.click();
            }
        });

        // ===== CANVAS CLICK =====
        canvas.addEventListener('click', jump);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        }, { passive: false });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ===== INIT =====
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = '🐸 Ready to hop';
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🐸 Jumping Frog loaded!');
        console.log('💡 J - Jump');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Jump');
        console.log('💡 Click frog - Jump');
    </script>
</body>
</html>
