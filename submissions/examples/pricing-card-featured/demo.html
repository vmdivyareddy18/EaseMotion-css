<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Card with Featured Tier</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9; gap: 1rem; flex-wrap: wrap; padding: 2rem;">
    <div class="pricing-card">
      <h3 class="pricing-tier">Starter</h3>
      <div class="pricing-amount"><span class="pricing-currency">$</span>19<span class="pricing-period">/mo</span></div>
      <ul class="pricing-features">
        <li>5 projects</li>
        <li>10 GB storage</li>
        <li>Basic support</li>
      </ul>
      <button class="pricing-btn">Get Started</button>
    </div>
    <div class="pricing-card pricing-featured">
      <span class="pricing-badge">Popular</span>
      <h3 class="pricing-tier">Professional</h3>
      <div class="pricing-amount"><span class="pricing-currency">$</span>49<span class="pricing-period">/mo</span></div>
      <ul class="pricing-features">
        <li>Unlimited projects</li>
        <li>100 GB storage</li>
        <li>Priority support</li>
        <li>Advanced analytics</li>
      </ul>
      <button class="pricing-btn pricing-btn-primary">Get Started</button>
    </div>
    <div class="pricing-card">
      <h3 class="pricing-tier">Enterprise</h3>
      <div class="pricing-amount"><span class="pricing-currency">$</span>99<span class="pricing-period">/mo</span></div>
      <ul class="pricing-features">
        <li>Unlimited everything</li>
        <li>1 TB storage</li>
        <li>Dedicated support</li>
        <li>Custom integrations</li>
      </ul>
      <button class="pricing-btn">Contact Us</button>
    </div>
  </div>
</body>
</html>
