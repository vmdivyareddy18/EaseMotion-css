<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-rotate-in-up-right</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-rotate-in-up-right</h1>

    <p>
        Rotates into view from the lower-left direction using a
        top-right transform origin.
    </p>

    <div class="demo-grid">

        <div class="card ease-rotate-in-up-right">
            <h2>Analytics</h2>
            <p>Track performance with animated insights.</p>
        </div>

        <div class="card ease-rotate-in-up-right delay-1">
            <h2>Growth</h2>
            <p>Monitor trends and business metrics.</p>
        </div>

        <div class="card ease-rotate-in-up-right delay-2">
            <h2>Revenue</h2>
            <p>Visualize financial performance.</p>
        </div>

    </div>

</div>

</body>
</html>
