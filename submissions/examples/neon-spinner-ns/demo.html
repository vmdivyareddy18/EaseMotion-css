<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Spinner - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="showcase-ns">
      <div class="spinner-row-ns">
        <div class="spinner-item-ns">
          <div
            class="neon-spinner-ns"
            role="status"
            aria-live="polite"
            aria-busy="true"
            aria-label="Loading progress"
          >
            <div class="neon-spinner-ring-ns"></div>
            <div class="neon-spinner-orb-ns"></div>
          </div>
          <span class="spinner-label-ns">Learn</span>
        </div>

        <div class="spinner-item-ns">
          <div
            class="neon-spinner-ns neon-spinner-success-ns"
            role="status"
            aria-live="polite"
            aria-busy="true"
            aria-label="Milestone complete"
          >
            <div class="neon-spinner-ring-ns"></div>
            <div class="neon-spinner-orb-ns"></div>
          </div>
          <span class="spinner-label-ns">Success</span>
        </div>

        <div class="spinner-item-ns">
          <div
            class="neon-spinner-ns neon-spinner-spark-ns"
            role="status"
            aria-live="polite"
            aria-busy="true"
            aria-label="Processing active task"
          >
            <div class="neon-spinner-ring-ns"></div>
            <div class="neon-spinner-orb-ns"></div>
          </div>
          <span class="spinner-label-ns">Spark</span>
        </div>
      </div>
    </div>
  </body>
</html>
