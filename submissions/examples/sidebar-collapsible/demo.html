<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar with Collapsible Sections</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex" style="min-height: 100vh; background: #f8fafc;">
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <div class="sidebar-section">
          <button class="sidebar-header" data-target="sec1">
            <span>Getting Started</span>
            <span class="sidebar-arrow">▶</span>
          </button>
          <div class="sidebar-items" id="sec1">
            <a class="sidebar-link active" href="#">Installation</a>
            <a class="sidebar-link" href="#">Quick Start</a>
          </div>
        </div>
        <div class="sidebar-section">
          <button class="sidebar-header" data-target="sec2">
            <span>Components</span>
            <span class="sidebar-arrow">▶</span>
          </button>
          <div class="sidebar-items" id="sec2">
            <a class="sidebar-link" href="#">Buttons</a>
            <a class="sidebar-link" href="#">Forms</a>
            <a class="sidebar-link" href="#">Cards</a>
            <a class="sidebar-link" href="#">Modals</a>
          </div>
        </div>
        <div class="sidebar-section">
          <button class="sidebar-header" data-target="sec3">
            <span>Utilities</span>
            <span class="sidebar-arrow">▶</span>
          </button>
          <div class="sidebar-items" id="sec3">
            <a class="sidebar-link" href="#">Typography</a>
            <a class="sidebar-link" href="#">Spacing</a>
          </div>
        </div>
      </nav>
    </aside>
    <main class="sidebar-main">
      <h1>Collapsible Sidebar</h1>
      <p>Click each section header to expand or collapse its items.</p>
    </main>
  </div>
  <script src="script.js"></script>
</body>
</html>
