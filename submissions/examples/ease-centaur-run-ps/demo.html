<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Centaur Run Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #dcfce7; /* Soft grass color */
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
      /* Background lines to simulate motion */
      background-image: repeating-linear-gradient(90deg, transparent, transparent 100px, rgba(22, 163, 74, 0.1) 100px, rgba(22, 163, 74, 0.1) 102px);
      background-size: 200px 100%;
      animation: bg-scroll 2s linear infinite;
    }
    
    @keyframes bg-scroll {
      from { background-position: 0 0; }
      to { background-position: -200px 0; }
    }

    .demo-horse {
      font-size: 6rem;
      display: inline-block;
      filter: drop-shadow(0 15px 5px rgba(0,0,0,0.15));
    }
    
    .instruction {
      color: #166534;
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 3rem;
      background: white;
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  
  <p class="instruction">The Centaur is running...</p>

  <!-- We use the infinite animation class -->
  <div class="ease-centaur-run-ps demo-horse">
    🐎
  </div>

</body>
</html>
