<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Price Strikethrough - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Price Strikethrough</h1>

    <div class="price-card">
      <div class="price-old">
        <span class="old-amount">$249</span>
        <span class="strike-line"></span>
      </div>
      <div class="price-new">$149</div>
      <span class="price-badge">Sale</span>
    </div>

    <div class="variant-row">
      <div class="price-card sm">
        <div class="price-old">
          <span class="old-amount">$89.99</span>
          <span class="strike-line done"></span>
        </div>
        <div class="price-new">$59.99</div>
        <span class="price-badge">-33%</span>
      </div>
    </div>

    <p class="description">The strikethrough line draws from left to right across the original price, emphasizing the discount. A sale badge pulses to draw attention.</p>
  </div>
</body>
</html>
