<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AegisGraph Sentinel X Ultimate Platform</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="core-dashboard">
    <header class="header">
      <span class="badge">Ultimate Sentinel X</span>
      <h1>AegisGraph Sentinel X Ultimate Platform</h1>
      <p class="subtitle">Unified master dashboard: radial rotating cores, swarm agent registries, and threat metrics.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-core">
        <h3>🌀 X-Core Master Engine</h3>
        <div class="radial-container">
          <div class="radial-core">
            <span class="pulse-rate">100%</span>
            <span class="lbl">Convergence</span>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card swarm-card">
          <h3>🐝 Autonomous Agent Swarm</h3>
          <ul class="stats-list">
            <li>Active Swarm Agents: <strong style="color: var(--primary)">4,890</strong></li>
            <li>Database Sync Rate: <strong>Synced (100%)</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
