<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Newsletter Popup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="checkbox" id="popup-toggle" />
    <label for="popup-toggle" class="open-btn"> Subscribe Newsletter </label>
    <div class="overlay">
      <div class="popup">
        <label for="popup-toggle" class="close">&times;</label>
        <div class="icon">✉️</div>
        <h2>Stay Updated</h2>
        <p>
          Get the latest articles, product updates and exclusive content
          delivered directly to your inbox.
        </p>
        <form>
          <input type="email" placeholder="Enter your email" required />
          <button>Subscribe</button>
        </form>
      </div>
    </div>
  </body>
</html>
