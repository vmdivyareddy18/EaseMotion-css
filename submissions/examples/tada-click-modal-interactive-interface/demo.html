<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Launch Modal
</label>

<div class="overlay">
    <div class="modal" tabindex="0">
        <h2>Interactive Interface Modal</h2>
        <p>
            Experience a smooth Tada-Click animation built entirely with HTML and CSS.
        </p>

        <div class="actions">
            <label for="modal-toggle" class="secondary-btn">Close</label>
            <button class="primary-btn">Continue</button>
        </div>
    </div>
</div>

</body>
</html>
