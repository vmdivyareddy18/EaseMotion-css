<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Troll Stomp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Ease Troll Stomp</h1>
        <p>
            Click the troll to trigger a powerful stomp animation.
        </p>

        <div class="stage">

            <div class="ground"></div>

            <div class="shockwave"></div>

            <div class="troll" id="troll">

                <div class="head"></div>

                <div class="body"></div>

                <div class="legs">
                    <div class="leg left-leg"></div>
                    <div class="leg right-leg"></div>
                </div>

            </div>

        </div>

        <button id="stompBtn">
            STOMP
        </button>

    </main>

    <script>
        const troll = document.getElementById("troll");
        const btn = document.getElementById("stompBtn");

        function stomp() {

            troll.classList.remove("stomp");

            void troll.offsetWidth;

            troll.classList.add("stomp");
        }

        btn.addEventListener("click", stomp);
        troll.addEventListener("click", stomp);
    </script>

</body>

</html>
