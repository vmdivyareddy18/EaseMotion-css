<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Tooltip Light and Small - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Tooltip — Light Variant and Small Size</h1>
    <p class="description">
      Hover the buttons below to see the new tooltip variants.
    </p>

    <div class="tooltip-row">
      <span class="ease-tooltip demo-btn" data-tooltip="Default dark">Default</span>
      <span class="ease-tooltip ease-tooltip-light demo-btn" data-tooltip="Light variant">Light</span>
      <span class="ease-tooltip ease-tooltip-sm demo-btn" data-tooltip="Small">Small</span>
      <span class="ease-tooltip ease-tooltip-light ease-tooltip-sm demo-btn" data-tooltip="Light + small">Both</span>
    </div>

  </div>

</body>
</html>
