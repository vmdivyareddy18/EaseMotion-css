<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Pagination UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Pagination UI Example</h1>
      <p>Pagination controls with animated active indicators and smooth transitions.</p>
    </header>

    <section class="pagination-grid">
      <div class="pagination-group">
        <h3>Standard Pagination</h3>
        <nav class="pagination" aria-label="Pagination">
          <button class="pagination__btn pagination__prev">← Prev</button>
          <button class="pagination__number" aria-current="page">1</button>
          <button class="pagination__number">2</button>
          <button class="pagination__number">3</button>
          <button class="pagination__number">4</button>
          <button class="pagination__number">5</button>
          <button class="pagination__btn pagination__next">Next →</button>
        </nav>
      </div>

      <div class="pagination-group">
        <h3>Minimal Pagination</h3>
        <nav class="pagination pagination--minimal" aria-label="Pagination">
          <button class="pagination__btn pagination__prev">‹</button>
          <button class="pagination__number" aria-current="page">1</button>
          <button class="pagination__number">2</button>
          <button class="pagination__number">3</button>
          <button class="pagination__btn pagination__next">›</button>
        </nav>
      </div>

      <div class="pagination-group">
        <h3>Accent Color Pagination</h3>
        <nav class="pagination pagination--accent" aria-label="Pagination">
          <button class="pagination__btn pagination__prev">Previous</button>
          <button class="pagination__number" aria-current="page">1</button>
          <button class="pagination__number">2</button>
          <button class="pagination__number">3</button>
          <button class="pagination__number">4</button>
          <button class="pagination__btn pagination__next">Next</button>
        </nav>
      </div>

      <div class="pagination-group">
        <h3>Large Pagination</h3>
        <nav class="pagination pagination--large" aria-label="Pagination">
          <button class="pagination__btn pagination__prev">← Previous</button>
          <button class="pagination__number" aria-current="page">1</button>
          <button class="pagination__number">2</button>
          <button class="pagination__number">3</button>
          <button class="pagination__number">...</button>
          <button class="pagination__number">10</button>
          <button class="pagination__btn pagination__next">Next →</button>
        </nav>
      </div>

      <div class="pagination-group">
        <h3>Compact Pagination</h3>
        <nav class="pagination pagination--compact" aria-label="Pagination">
          <button class="pagination__btn pagination__prev" title="Previous page">‹</button>
          <span class="pagination__info">Page 1 of 10</span>
          <button class="pagination__btn pagination__next" title="Next page">›</button>
        </nav>
      </div>

      <div class="pagination-group">
        <h3>Dots Pagination</h3>
        <nav class="pagination pagination--dots" aria-label="Pagination">
          <button class="pagination__dot" aria-current="page"></button>
          <button class="pagination__dot"></button>
          <button class="pagination__dot"></button>
          <button class="pagination__dot"></button>
          <button class="pagination__dot"></button>
        </nav>
      </div>
    </section>
  </main>
</body>
</html>
