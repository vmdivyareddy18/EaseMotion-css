<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Progress Tracker - Clip Path Step Indicator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fitness-container">
        <div class="tracker-card">
            <header class="tracker-header">
                <h2 class="tracker-title">Daily Workout Progress</h2>
                <p class="tracker-subtitle">Complete all milestone sets to lock in your daily streak.</p>
            </header>

            <!-- Pure-CSS Clip Path Step Indicator Component Container -->
            <div class="step-indicator-wrapper">
                <div class="step-node completed">
                    <div class="clip-polygon">
                        <span class="step-number">1</span>
                    </div>
                    <span class="step-label">Warmup</span>
                </div>
                
                <div class="step-connector completed"></div>

                <div class="step-node active">
                    <div class="clip-polygon">
                        <span class="step-number">2</span>
                    </div>
                    <span class="step-label">Cardio</span>
                </div>

                <div class="step-connector"></div>

                <div class="step-node">
                    <div class="clip-polygon">
                        <span class="step-number">3</span>
                    </div>
                    <span class="step-label">Strength</span>
                </div>

                <div class="step-connector"></div>

                <div class="step-node">
                    <div class="clip-polygon">
                        <span class="step-number">4</span>
                    </div>
                    <span class="step-label">Cooldown</span>
                </div>
            </div>

            <!-- Dashboard Analytics Panel Summary Nodes -->
            <div class="workout-summary-box">
                <div class="summary-metric">
                    <span class="metric-label">Active Burn</span>
                    <span class="metric-value color-teal">340 kcal</span>
                </div>
                <div class="summary-metric">
                    <span class="metric-label">Time Elapsed</span>
                    <span class="metric-value color-indigo">24 mins</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
