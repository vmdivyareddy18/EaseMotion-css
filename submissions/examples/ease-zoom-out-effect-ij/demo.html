<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Out Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="zoe-section zoe-hero" id="hero">
    <div class="zoe-hero-content">
      <h1>Zoom Out Effect</h1>
      <p>Scroll down to see the section zoom out and reveal content below.</p>
      <span class="zoe-scroll-hint">↓ Scroll ↓</span>
    </div>
  </section>

  <section class="zoe-section zoe-next">
    <div class="zoe-next-content">
      <h2>Content Revealed</h2>
      <p>As the hero section zooms out, this section scrolls into view with its own content.</p>
    </div>
  </section>

  <section class="zoe-section zoe-final">
    <div class="zoe-final-content">
      <h2>More Content</h2>
      <p>Continue scrolling for additional sections with the parallax zoom-out feel.</p>
    </div>
  </section>

  <script>
    const hero = document.getElementById('hero');
    const heroContent = hero.querySelector('.zoe-hero-content');

    function onScroll() {
      const rect = hero.getBoundingClientRect();
      const windowH = window.innerHeight;
      const progress = Math.max(0, Math.min(1, (windowH - rect.top) / windowH));

      const scale = 1 - (progress * (1 - 0.6));
      const opacity = 1 - (progress * 1.2);
      heroContent.style.transform = `scale(${scale})`;
      heroContent.style.opacity = Math.max(0, opacity);
    }

    window.addEventListener('scroll', onScroll);
    onScroll();
  </script>
</body>
</html>
