<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Credit Card Form | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <div class="container">
      <h1 class="demo-title">Animated Credit Card Form</h1>
      <p class="demo-subtitle">CSS-only credit card form with floating labels, card preview, and input formatting.</p>

      <div class="card-form-wrapper">
        <div class="card-preview">
          <div class="card-preview__inner">
            <div class="card-preview__chip"></div>
            <div class="card-preview__type">
              <svg width="40" height="28" viewBox="0 0 48 32" fill="none">
                <rect width="48" height="32" rx="4" fill="#1a1f36" opacity="0.6"/>
                <text x="24" y="20" text-anchor="middle" fill="white" font-size="10" font-family="sans-serif" font-weight="600">VISA</text>
              </svg>
            </div>
            <div class="card-preview__number">4242 4242 4242 4242</div>
            <div class="card-preview__details">
              <div class="card-preview__holder">
                <span class="card-preview__label">Card Holder</span>
                <span class="card-preview__value">FULL NAME</span>
              </div>
              <div class="card-preview__expiry">
                <span class="card-preview__label">Expires</span>
                <span class="card-preview__value">MM/YY</span>
              </div>
            </div>
          </div>
        </div>

        <form class="card-form" novalidate>
          <div class="form-group">
            <div class="form-field">
              <input type="text" class="form-input" id="card-number" placeholder=" " value="4242 4242 4242 4242">
              <label class="form-label" for="card-number">Card Number</label>
            </div>
          </div>

          <div class="form-group">
            <div class="form-field">
              <input type="text" class="form-input" id="card-holder" placeholder=" " value="John Doe">
              <label class="form-label" for="card-holder">Card Holder</label>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group form-group--half">
              <div class="form-field">
                <input type="text" class="form-input" id="card-expiry" placeholder=" " value="12/28">
                <label class="form-label" for="card-expiry">Expiry Date</label>
              </div>
            </div>
            <div class="form-group form-group--half">
              <div class="form-field">
                <input type="text" class="form-input" id="card-cvv" placeholder=" " value="123">
                <label class="form-label" for="card-cvv">CVV</label>
              </div>
            </div>
          </div>

          <button type="submit" class="form-submit">
            <span>Pay $99.99</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>

          <div class="form-footer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span>Secured with 256-bit SSL encryption</span>
          </div>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
