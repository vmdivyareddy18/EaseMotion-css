<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Onboarding Tour - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Mock Dashboard Interface -->
  <div class="dashboard">
    <header class="dashboard-header">
      <div class="logo">🚀 Dashboard</div>
      <nav class="dashboard-nav">
        <a href="#" class="nav-item" id="tour-nav">📊 Analytics</a>
        <a href="#" class="nav-item">👥 Users</a>
        <a href="#" class="nav-item" id="tour-settings">⚙️ Settings</a>
      </nav>
      <div class="user-menu" id="tour-profile">
        <span class="user-avatar">👤</span>
      </div>
    </header>

    <main class="dashboard-content">
      <div class="widget" id="tour-widget1">
        <h3>Revenue</h3>
        <div class="widget-value">$48,295</div>
        <div class="widget-chart"></div>
      </div>
      <div class="widget" id="tour-widget2">
        <h3>Users</h3>
        <div class="widget-value">12,847</div>
        <div class="widget-chart"></div>
      </div>
      <div class="widget" id="tour-widget3">
        <h3>Orders</h3>
        <div class="widget-value">1,429</div>
        <div class="widget-chart"></div>
      </div>
    </main>
  </div>

  <!-- Onboarding Tour Overlay -->
  <div class="tour-overlay" id="tour-overlay">
    <!-- Spotlight Effect -->
    <div class="tour-spotlight ease-zoom-in" id="tour-spotlight"></div>

    <!-- Tour Tooltip -->
    <div class="tour-tooltip ease-fade-in-up" id="tour-tooltip">
      <div class="tooltip-content">
        <div class="tooltip-step">Step <span id="current-step">1</span> of <span id="total-steps">5</span></div>
        <h3 class="tooltip-title" id="tooltip-title">Welcome to Your Dashboard!</h3>
        <p class="tooltip-text" id="tooltip-text">Let's take a quick tour to help you get started. We'll show you around the key features.</p>
      </div>
      
      <div class="tooltip-actions">
        <button class="btn-skip" id="btn-skip">Skip Tour</button>
        <div class="tooltip-buttons">
          <button class="btn-prev" id="btn-prev" disabled>← Back</button>
          <button class="btn-next" id="btn-next">Next →</button>
        </div>
      </div>

      <!-- Progress Dots -->
      <div class="tooltip-progress">
        <span class="progress-dot active"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
        <span class="progress-dot"></span>
      </div>
    </div>
  </div>

  <!-- Start Tour Button -->
  <button class="start-tour-btn ease-fade-in-up ease-delay-500" id="start-tour">
    🎯 Start Guided Tour
  </button>

  <!-- JavaScript for Tour Functionality -->
  <script>
    const tourSteps = [
      {
        target: null,
        title: 'Welcome to Your Dashboard!',
        text: 'Let\'s take a quick tour to help you get started. We\'ll show you around the key features.',
        position: 'center'
      },
      {
        target: '#tour-nav',
        title: 'Analytics Navigation',
        text: 'Access your analytics and reports from here. Track performance metrics and insights.',
        position: 'bottom'
      },
      {
        target: '#tour-widget1',
        title: 'Revenue Widget',
        text: 'This widget shows your total revenue. Click to view detailed breakdowns and trends.',
        position: 'right'
      },
      {
        target: '#tour-settings',
        title: 'Settings',
        text: 'Configure your account settings, preferences, and integrations from here.',
        position: 'bottom'
      },
      {
        target: '#tour-profile',
        title: 'Your Profile',
        text: 'Access your profile, view notifications, and manage your account settings.',
        position: 'bottom'
      }
    ];

    let currentStep = 0;
    const overlay = document.getElementById('tour-overlay');
    const spotlight = document.getElementById('tour-spotlight');
    const tooltip = document.getElementById('tour-tooltip');
    const startBtn = document.getElementById('start-tour');

    // Start tour
    startBtn.addEventListener('click', () => {
      overlay.classList.add('active');
      showStep(0);
    });

    // Show step
    function showStep(stepIndex) {
      const step = tourSteps[stepIndex];
      currentStep = stepIndex;

      // Update content
      document.getElementById('current-step').textContent = stepIndex + 1;
      document.getElementById('total-steps').textContent = tourSteps.length;
      document.getElementById('tooltip-title').textContent = step.title;
      document.getElementById('tooltip-text').textContent = step.text;

      // Update progress dots
      document.querySelectorAll('.progress-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i <= stepIndex);
      });

      // Update buttons
      document.getElementById('btn-prev').disabled = stepIndex === 0;
      document.getElementById('btn-next').textContent = stepIndex === tourSteps.length - 1 ? 'Finish ✓' : 'Next →';

      // Position spotlight and tooltip
      if (step.target) {
        const targetEl = document.querySelector(step.target);
        const rect = targetEl.getBoundingClientRect();
        
        spotlight.style.top = `${rect.top - 10}px`;
        spotlight.style.left = `${rect.left - 10}px`;
        spotlight.style.width = `${rect.width + 20}px`;
        spotlight.style.height = `${rect.height + 20}px`;
        spotlight.style.borderRadius = '12px';

        // Position tooltip
        tooltip.style.position = 'fixed';
        if (step.position === 'bottom') {
          tooltip.style.top = `${rect.bottom + 20}px`;
          tooltip.style.left = `${rect.left}px`;
        } else if (step.position === 'right') {
          tooltip.style.top = `${rect.top}px`;
          tooltip.style.left = `${rect.right + 20}px`;
        }
      } else {
        // Center tooltip for first step
        spotlight.style.display = 'none';
        tooltip.style.position = 'fixed';
        tooltip.style.top = '50%';
        tooltip.style.left = '50%';
        tooltip.style.transform = 'translate(-50%, -50%)';
      }

      // Animate tooltip
      tooltip.classList.remove('ease-fade-in-up');
      void tooltip.offsetWidth; // Trigger reflow
      tooltip.classList.add('ease-fade-in-up');
    }

    // Next button
    document.getElementById('btn-next').addEventListener('click', () => {
      if (currentStep < tourSteps.length - 1) {
        showStep(currentStep + 1);
      } else {
        endTour();
      }
    });

    // Previous button
    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentStep > 0) {
        showStep(currentStep - 1);
      }
    });

    // Skip button
    document.getElementById('btn-skip').addEventListener('click', endTour);

    // End tour
    function endTour() {
      overlay.classList.remove('active');
      spotlight.style.display = 'block';
    }
  </script>
</body>
</html>
