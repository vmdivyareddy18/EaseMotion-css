<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conic Progress Ring</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Conic Progress Ring</h1>

        <div class="ring-grid">

            <div class="progress-ring progress-25">
                <div class="ring-center">25%</div>
            </div>

            <div class="progress-ring progress-50">
                <div class="ring-center">50%</div>
            </div>

            <div class="progress-ring progress-75">
                <div class="ring-center">75%</div>
            </div>

            <div class="progress-ring progress-100">
                <div class="ring-center">100%</div>
            </div>

        </div>
    </div>

</body>
</html>
