<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Product Catalog Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="product-card">

        <img
            src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=700"
            alt="Wireless Headphones">

        <h2>Wireless Headphones</h2>

        <p class="price">$149</p>

        <a href="#modal" class="btn">
            View Details
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="product-title">

        <a href="#" class="close">&times;</a>

        <img
            src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=700"
            alt="Wireless Headphones">

        <h2 id="product-title">
            Wireless Headphones
        </h2>

        <p>

            Premium over-ear wireless headphones with Active Noise
            Cancellation, Bluetooth 5.3 and 40-hour battery life.

        </p>

        <ul>

            <li>🎧 Bluetooth 5.3</li>

            <li>🔋 40 Hour Battery</li>

            <li>⚡ USB-C Fast Charging</li>

            <li>🎵 Active Noise Cancellation</li>

        </ul>

        <h3>$149</h3>

        <button>
            Buy Now
        </button>

    </div>

</div>

</body>
</html>
