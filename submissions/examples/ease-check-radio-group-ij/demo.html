<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox & Radio Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo">
    <h1>Checkbox &amp; Radio Group</h1>

    <section class="group">
      <h2>Checkboxes</h2>
      <label class="cr">
        <input type="checkbox" checked>
        <span class="cr-indicator"></span>
        Option A
      </label>
      <label class="cr">
        <input type="checkbox">
        <span class="cr-indicator"></span>
        Option B
      </label>
      <label class="cr">
        <input type="checkbox" checked>
        <span class="cr-indicator"></span>
        Option C
      </label>
    </section>

    <section class="group">
      <h2>Radio Buttons</h2>
      <label class="cr">
        <input type="radio" name="radio-group" checked>
        <span class="cr-indicator"></span>
        Choice 1
      </label>
      <label class="cr">
        <input type="radio" name="radio-group">
        <span class="cr-indicator"></span>
        Choice 2
      </label>
      <label class="cr">
        <input type="radio" name="radio-group">
        <span class="cr-indicator"></span>
        Choice 3
      </label>
    </section>
  </main>
</body>
</html>
