<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Component Title Showcase 188 (sou)</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo page styles only (not part of the component) */
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    body {
      display: grid;
      place-items: center;
      padding: 60px 20px;
      background:
        radial-gradient(1200px 600px at 10% 10%, rgba(34, 211, 238, 0.15), transparent 60%),
        radial-gradient(900px 600px at 90% 90%, rgba(168, 85, 247, 0.18), transparent 60%),
        #05070f;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <!-- ============================================================
       Component: Animated Showcase Card (variation: sou)
       Pure CSS, no JS, no external assets, single root class:
       .ease-showcase-188-sou
       ============================================================ -->
  <article class="ease-showcase-188-sou" aria-label="Component Title Showcase 188">
    <div class="ease-showcase-188-sou__inner">

      <span class="ease-showcase-188-sou__badge">Premium · 188</span>

      <h2 class="ease-showcase-188-sou__title">
        Component Title Showcase 188
      </h2>

      <p class="ease-showcase-188-sou__desc">
        A self-contained, pure-CSS showcase card featuring a rotating
        conic-gradient border, glassmorphism surface, shimmer title,
        and a magnetic-glow call-to-action — built for EaseMotion CSS.
      </p>

      <div class="ease-showcase-188-sou__meta">
        <div>
          <span>Type</span>
          <span>Showcase</span>
        </div>
        <div>
          <span>Variant</span>
          <span>sou</span>
        </div>
        <div>
          <span>Motion</span>
          <span>Subtle</span>
        </div>
      </div>

      <button type="button" class="ease-showcase-188-sou__cta" aria-label="Explore component 188">
        Explore
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round"
             aria-hidden="true">
          <path d="M5 12h14"></path>
          <path d="M13 6l6 6-6 6"></path>
        </svg>
      </button>

    </div>
  </article>

</body>
</html>
