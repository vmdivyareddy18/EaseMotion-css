<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Animated Conic-Gradient Border Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <h1 class="title">Rotating Conic-Gradient Border</h1>
    <p class="subtitle">Powered by <code>@property --ease-angle</code> + a masked conic-gradient pseudo-element.</p>

    <div class="card-grid">
      <div class="ease-card-border-rotate">
        <h2>Default Speed</h2>
        <p>--ease-border-rotate-speed: 4s</p>
      </div>

      <div class="ease-card-border-rotate card-fast">
        <h2>Fast</h2>
        <p>--ease-border-rotate-speed: 1.5s</p>
      </div>

      <div class="ease-card-border-rotate card-slow">
        <h2>Slow</h2>
        <p>--ease-border-rotate-speed: 10s</p>
      </div>

      <div class="ease-card-border-rotate card-thick">
        <h2>Thick Border</h2>
        <p>--ease-border-width: 6px</p>
      </div>
    </div>
  </main>

</body>
</html>
