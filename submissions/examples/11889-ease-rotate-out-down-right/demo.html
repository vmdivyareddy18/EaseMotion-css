<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-rotate-out-down-right</title>
  <meta name="description" content="A demonstration of the ease-rotate-out-down-right animation showing an element rotating out of view toward the lower-right corner.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-rotate-out-down-right</h1>
      <p class="subtitle" id="main-desc">Rotates out to the lower-right corner using transform-origin: right bottom</p>
    </header>

    <div class="display-area">
      <!-- Target that rotates out -->
      <div class="rotate-target" id="target-element">
        <span>Rotate Out</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Exit</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-rotate-out-down-right');
      void target.offsetWidth;
      target.classList.add('ease-rotate-out-down-right');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-rotate-out-down-right');
    }
  </script>

</body>
</html>
