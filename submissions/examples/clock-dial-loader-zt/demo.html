<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock Dial Loader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="loader-page">
      <section class="loader-card ease-fade-in">
        <div class="loader-visual">
          <div class="clock-ring"></div>
          <div class="clock-hand"></div>
          <div class="clock-center"></div>
          <ol class="hour-markers">
            <li style="--i: 0">12</li>
            <li style="--i: 1">1</li>
            <li style="--i: 2">2</li>
            <li style="--i: 3">3</li>
            <li style="--i: 4">4</li>
            <li style="--i: 5">5</li>
            <li style="--i: 6">6</li>
            <li style="--i: 7">7</li>
            <li style="--i: 8">8</li>
            <li style="--i: 9">9</li>
            <li style="--i: 10">10</li>
            <li style="--i: 11">11</li>
          </ol>
        </div>

        <div class="loader-copy">
          <p class="eyebrow">Loading</p>
          <h1>Clock Dial Loader</h1>
          <p>Elegant CSS-only loader with a rotating clock hand and premium dark dashboard polish.</p>
        </div>
      </section>
    </main>
  </body>
</html>
