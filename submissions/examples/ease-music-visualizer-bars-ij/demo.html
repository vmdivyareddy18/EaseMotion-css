<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Visualizer Bars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mvb-container">
    <h1>Music Visualizer</h1>

    <div class="mvb-visualizer" id="mvb-visualizer">
      <div class="mvb-bar" data-index="0"></div>
      <div class="mvb-bar" data-index="1"></div>
      <div class="mvb-bar" data-index="2"></div>
      <div class="mvb-bar" data-index="3"></div>
      <div class="mvb-bar" data-index="4"></div>
      <div class="mvb-bar" data-index="5"></div>
      <div class="mvb-bar" data-index="6"></div>
      <div class="mvb-bar" data-index="7"></div>
      <div class="mvb-bar" data-index="8"></div>
      <div class="mvb-bar" data-index="9"></div>
      <div class="mvb-bar" data-index="10"></div>
      <div class="mvb-bar" data-index="11"></div>
      <div class="mvb-bar" data-index="12"></div>
      <div class="mvb-bar" data-index="13"></div>
      <div class="mvb-bar" data-index="14"></div>
      <div class="mvb-bar" data-index="15"></div>
      <div class="mvb-bar" data-index="16"></div>
      <div class="mvb-bar" data-index="17"></div>
      <div class="mvb-bar" data-index="18"></div>
      <div class="mvb-bar" data-index="19"></div>
    </div>

    <div class="mvb-controls">
      <button class="mvb-btn" id="mvb-play">&#9654; Play</button>
      <button class="mvb-btn" id="mvb-pause">&#10074;&#10074; Pause</button>
      <div class="mvb-presets">
        <label>Preset:
          <select id="mvb-preset">
            <option value="pop">Pop</option>
            <option value="rock">Rock</option>
            <option value="electronic">Electronic</option>
            <option value="classical" selected>Classical</option>
            <option value="bass">Bass</option>
          </select>
        </label>
      </div>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
