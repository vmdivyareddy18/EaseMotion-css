<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Toast Notification Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-controls">
    <button onclick="spawnToast('success')">Success Toast</button>
    <button onclick="spawnToast('error')">Error Toast</button>
    <button onclick="spawnToast('warning')">Warning Toast</button>
    <button onclick="spawnToast('info')">Info Toast</button>
  </div>

  <div class="ease-toast-container" id="toastContainer"></div>

  <script>
    const messages = {
      success: "Changes saved successfully!",
      error: "Something went wrong.",
      warning: "This action cannot be undone.",
      info: "New update available."
    };

    function spawnToast(type) {
      const container = document.getElementById('toastContainer');

      const toast = document.createElement('div');
      toast.className = `ease-toast ease-toast--${type}`;
      toast.innerHTML = `
        <div class="ease-toast__content">
          <span class="ease-toast__message">${messages[type]}</span>
          <button class="ease-toast__close" aria-label="Close">&times;</button>
        </div>
        <div class="ease-toast__progress"></div>
      `;

      container.appendChild(toast);

      // trigger enter animation
      requestAnimationFrame(() => toast.classList.add('is-visible'));

      const duration = 4000;
      let remaining = duration;
      let startTime = Date.now();
      let timerId;

      const progressBar = toast.querySelector('.ease-toast__progress');
      progressBar.style.animationDuration = `${duration}ms`;

      const dismiss = () => {
        toast.classList.remove('is-visible');
        toast.classList.add('is-leaving');
        toast.addEventListener('transitionend', () => toast.remove(), { once: true });
      };

      const startTimer = (time) => {
        startTime = Date.now();
        timerId = setTimeout(dismiss, time);
      };

      startTimer(remaining);

      toast.addEventListener('mouseenter', () => {
        clearTimeout(timerId);
        remaining -= (Date.now() - startTime);
        progressBar.style.animationPlayState = 'paused';
      });

      toast.addEventListener('mouseleave', () => {
        progressBar.style.animationPlayState = 'running';
        startTimer(remaining);
      });

      toast.querySelector('.ease-toast__close').addEventListener('click', dismiss);
    }
  </script>

</body>
</html>
