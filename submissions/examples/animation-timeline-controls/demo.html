<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Timeline Controls Playground</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container { text-align: center; max-width: 600px; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; background: linear-gradient(to right, #f43f5e, #fb7185); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; margin-bottom: 50px; }
        .stage-view { height: 200px; display: flex; align-items: center; justify-content: center; background: #020617; border-radius: 16px; border: 1px solid #1e293b; width: 100%; min-width: 500px; margin-bottom: 30px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Timeline Utility Controls</h1>
        <p>Demonstration of utility properties mapping keyframe playing states, speeds, and directions dynamically.</p>

        <div class="stage-view">
            <div id="targetBox" class="timeline-target-box">ORBIT</div>
        </div>

        <!-- Dashboard Panel Controls -->
        <div class="control-dashboard">
            <button class="timeline-btn active-state" id="btnPlay">Resume</button>
            <button class="timeline-btn" id="btnPause">Pause</button>
            <button class="timeline-btn" id="btnReverse">Reverse Direction</button>
        </div>
    </div>

    <script>
        // Optional JavaScript helper toggles handling class injections cleanly
        const box = document.getElementById('targetBox');
        const btnPlay = document.getElementById('btnPlay');
        const btnPause = document.getElementById('btnPause');
        const btnReverse = document.getElementById('btnReverse');

        btnPause.addEventListener('click', () => {
            box.classList.remove('ease-resume');
            box.classList.add('ease-pause');
            
            btnPause.classList.add('active-state');
            btnPlay.classList.remove('active-state');
        });

        btnPlay.addEventListener('click', () => {
            box.classList.remove('ease-pause');
            box.classList.add('ease-resume');
            
            btnPlay.classList.add('active-state');
            btnPause.classList.remove('active-state');
        });

        btnReverse.addEventListener('click', () => {
            box.classList.toggle('ease-reverse');
            btnReverse.classList.toggle('active-state');
        });
    </script>
</body>
</html>
