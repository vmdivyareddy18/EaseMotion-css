<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animated Tooltips | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <h2>CSS-Only Animated Tooltips</h2>
    <p>Hover or focus on the buttons below to see the tooltips in action.</p>
    
    <div class="tooltip-grid">
      <!-- Top Tooltip -->
      <div class="ease-tooltip-parent">
        <button class="demo-btn">Top</button>
        <div class="ease-tooltip ease-tooltip--top" role="tooltip">
          Tooltip on top!
        </div>
      </div>
      
      <!-- Bottom Tooltip -->
      <div class="ease-tooltip-parent">
        <button class="demo-btn">Bottom</button>
        <div class="ease-tooltip ease-tooltip--bottom" role="tooltip">
          Tooltip on bottom!
        </div>
      </div>
      
      <!-- Left Tooltip -->
      <div class="ease-tooltip-parent">
        <button class="demo-btn">Left</button>
        <div class="ease-tooltip ease-tooltip--left" role="tooltip">
          Tooltip on left!
        </div>
      </div>
      
      <!-- Right Tooltip -->
      <div class="ease-tooltip-parent">
        <button class="demo-btn">Right</button>
        <div class="ease-tooltip ease-tooltip--right" role="tooltip">
          Tooltip on right!
        </div>
      </div>
    </div>
  </div>

</body>
</html>
