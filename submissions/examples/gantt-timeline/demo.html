<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gantt Timeline Component — EaseMotion CSS Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2 family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root {
      --bg-dark: #0b0f19;
      --text-slate: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 750px;
      width: 100%;
    }
    header {
      margin-bottom: 2.5rem;
    }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      color: #a855f7;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 0.5rem 0;
    }
    p {
      color: var(--text-slate);
      margin: 0;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="tag">// Layout Engine Component</div>
      <h1>Gantt Timeline Management</h1>
      <p>Synchronized scheduling matrices leveraging browser layout calculations for optimal 60fps tracking transitions.</p>
    </header>

    <div class="ease-gantt-container">
      
      <div class="ease-gantt-track">
        <div class="ease-gantt-bar ease-span-25" style="--row-delay: 1;">
          Phase 1: Architecture
        </div>
      </div>
      
      <div class="ease-gantt-track">
        <div class="ease-gantt-bar ease-gantt-secondary ease-span-70" style="--row-delay: 2;">
          Phase 2: Alpha Framework Core
        </div>
      </div>
      
      <div class="ease-gantt-track">
        <div class="ease-gantt-bar ease-span-45" style="--row-delay: 3;">
          Phase 3: Integration Audits
        </div>
      </div>
      
      <div class="ease-gantt-track">
        <div class="ease-gantt-bar ease-gantt-accent ease-span-95" style="--row-delay: 4;">
          Phase 4: Global CDN Edge Rollout
        </div>
      </div>

    </div>
  </div>

</body>
</html>
