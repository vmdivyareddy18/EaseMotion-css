<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skeleton Shimmer Loaders | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h2>Animated Skeleton Loaders</h2>
      <p>Composable, purely CSS-driven layout placeholders for loading states. Perfect for reducing perceived latency during async data fetching.</p>
    </div>

    <!-- Example Card Skeleton -->
    <div class="skeleton-card">
      
      <!-- Header with Avatar and Title -->
      <div class="skeleton-header">
        <div class="ease-skeleton ease-skeleton--avatar"></div>
        <div class="skeleton-title-group">
          <div class="ease-skeleton ease-skeleton--title"></div>
          <div class="ease-skeleton ease-skeleton--subtitle"></div>
        </div>
      </div>

      <!-- Body Content Lines -->
      <div class="skeleton-body">
        <div class="ease-skeleton ease-skeleton--text"></div>
        <div class="ease-skeleton ease-skeleton--text"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 75%;"></div>
      </div>
      
      <!-- Footer or Image Block -->
      <div class="ease-skeleton ease-skeleton--block"></div>

    </div>
  </div>

</body>
</html>
