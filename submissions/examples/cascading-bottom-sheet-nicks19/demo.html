<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascading Bottom Sheet - Analytics Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f0f2f5;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }
    
    .demo-dashboard {
      background: white;
      width: 100%;
      max-width: 400px;
      height: 600px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .demo-header {
      padding: 30px 20px;
      background: #1e1e2d;
      color: white;
      border-radius: 24px 24px 0 0;
    }

    .demo-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .demo-header h1 {
      margin: 10px 0 0;
      font-size: 2.5rem;
    }

    .demo-content {
      padding: 20px;
      flex: 1;
    }

    /* Open Button */
    .ease-btn-open {
      display: inline-block;
      width: 100%;
      padding: 16px;
      background: #4f46e5;
      color: white;
      text-align: center;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: auto;
      transition: background 0.2s;
    }
    .ease-btn-open:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>

  <div class="demo-dashboard">
    <div class="demo-header">
      <h2>Total Revenue</h2>
      <h1>$124,500</h1>
    </div>
    
    <div class="demo-content">
      <p style="color: #6b7280; margin-bottom: 40px;">Tap the button below to view the detailed breakdown for Q3.</p>
      
      <!-- The Checkbox Hack to control state -->
      <input type="checkbox" id="sheet-toggle" class="ease-sheet-toggle">
      
      <label for="sheet-toggle" class="ease-btn-open">View Breakdown</label>

      <!-- Overlay -->
      <label for="sheet-toggle" class="ease-sheet-overlay"></label>

      <!-- The Bottom Sheet -->
      <div class="ease-bottom-sheet">
        <div class="ease-sheet-header">
          <h3>Q3 Breakdown</h3>
          <label for="sheet-toggle" class="ease-sheet-close">&times;</label>
        </div>
        
        <!-- Cascading Analytics Items -->
        <div class="ease-sheet-content">
          
          <div class="ease-metric-card ease-cascade-item" style="--ease-delay: 1">
            <div class="metric-icon" style="background: #e0e7ff; color: #4f46e5;">📈</div>
            <div class="metric-info">
              <h4>Organic Search</h4>
              <p>+24% from last quarter</p>
            </div>
            <div class="metric-value">$45,200</div>
          </div>

          <div class="ease-metric-card ease-cascade-item" style="--ease-delay: 2">
            <div class="metric-icon" style="background: #fce7f3; color: #db2777;">📱</div>
            <div class="metric-info">
              <h4>Social Media</h4>
              <p>+12% from last quarter</p>
            </div>
            <div class="metric-value">$32,800</div>
          </div>

          <div class="ease-metric-card ease-cascade-item" style="--ease-delay: 3">
            <div class="metric-icon" style="background: #dcfce7; color: #16a34a;">✉️</div>
            <div class="metric-info">
              <h4>Email Campaigns</h4>
              <p>-4% from last quarter</p>
            </div>
            <div class="metric-value">$18,400</div>
          </div>

          <div class="ease-metric-card ease-cascade-item" style="--ease-delay: 4">
            <div class="metric-icon" style="background: #ffedd5; color: #ea580c;">🤝</div>
            <div class="metric-info">
              <h4>Referrals</h4>
              <p>+8% from last quarter</p>
            </div>
            <div class="metric-value">$28,100</div>
          </div>

        </div>
      </div>
    </div>
  </div>

</body>
</html>
