<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key-Value Pair Viewer | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Key-Value Pair Viewer</h1>
  <p>View, add, and remove key-value pairs with animated row entrance and a copy button for each pair.</p>

  <div class="kv-controls">
    <input type="text" id="keyInput" placeholder="Key" class="kv-input">
    <input type="text" id="valueInput" placeholder="Value" class="kv-input">
    <button id="addBtn" class="kv-btn kv-btn--add">+ Add Pair</button>
  </div>

  <div id="kvContainer" class="kv-container"></div>

  <template id="rowTemplate">
    <div class="kv-row">
      <span class="kv-key"></span>
      <span class="kv-value"></span>
      <button class="kv-btn kv-btn--copy">Copy</button>
      <button class="kv-btn kv-btn--remove">×</button>
    </div>
  </template>

  <script>
    const container = document.getElementById('kvContainer');
    const keyInput = document.getElementById('keyInput');
    const valueInput = document.getElementById('valueInput');
    const addBtn = document.getElementById('addBtn');
    const template = document.getElementById('rowTemplate');

    let rowCount = 0;

    function createRow(key, value) {
      const clone = template.content.cloneNode(true);
      const row = clone.querySelector('.kv-row');
      row.querySelector('.kv-key').textContent = key;
      row.querySelector('.kv-value').textContent = value;

      row.style.setProperty('--kv-row-index', rowCount++);

      row.querySelector('.kv-btn--copy').addEventListener('click', () => {
        navigator.clipboard.writeText(`${key}: ${value}`).then(() => {
          const btn = row.querySelector('.kv-btn--copy');
          btn.textContent = 'Copied!';
          setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
        });
      });

      row.querySelector('.kv-btn--remove').addEventListener('click', () => {
        row.classList.add('kv-row--removing');
        setTimeout(() => row.remove(), 300);
      });

      return row;
    }

    addBtn.addEventListener('click', () => {
      const key = keyInput.value.trim();
      const value = valueInput.value.trim();
      if (!key || !value) return;
      container.appendChild(createRow(key, value));
      keyInput.value = '';
      valueInput.value = '';
      keyInput.focus();
    });

    keyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') valueInput.focus();
    });
    valueInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    container.appendChild(createRow('username', 'johndoe'));
    container.appendChild(createRow('email', 'john@example.com'));
    container.appendChild(createRow('role', 'admin'));
  </script>
</body>
</html>
