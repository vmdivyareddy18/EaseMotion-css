<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mood Tracker Dots — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="mood-tracker" style="--dot-size: 44px; --selected-scale: 1.35; --mood-colors: #f39c12 #55c7a6 #6c5ce7 #e74c3c #f1c40f; --select-duration: 0.35s;">
    <h2>How are you feeling?</h2>
    <div class="mood-row">
      <button class="mood-dot" data-mood="great" style="--mood-color: #f39c12;">😊</button>
      <button class="mood-dot" data-mood="good" style="--mood-color: #55c7a6;">🙂</button>
      <button class="mood-dot" data-mood="meh" style="--mood-color: #6c5ce7;">😐</button>
      <button class="mood-dot" data-mood="bad" style="--mood-color: #e74c3c;">😢</button>
      <button class="mood-dot" data-mood="awful" style="--mood-color: #f1c40f;">😫</button>
    </div>
    <p class="mood-feedback">Tap a mood above</p>
  </div>

  <script>
    document.querySelectorAll('.mood-dot').forEach(dot => {
      dot.addEventListener('click', () => {
        document.querySelectorAll('.mood-dot').forEach(d => d.classList.remove('selected'));
        dot.classList.add('selected');
        document.querySelector('.mood-feedback').textContent = `Selected: ${dot.dataset.mood}`;
      });
    });
  </script>
</body>
</html>
