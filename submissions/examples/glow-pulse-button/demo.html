<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Glow Pulse Button</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .palette-container {
      width: 100%;
      max-width: 400px;
      background: rgba(20, 25, 40, 0.8);
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 8px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
    }

    h2 {
      color: #e0e6ff;
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 1rem 0;
      opacity: 0.7;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="palette-container">
    <h2>Command Palette</h2>
    <div class="button-group">
      <button class="glow-pulse-btn glow-blue">Execute</button>
      <button class="glow-pulse-btn glow-purple">Deploy</button>
      <button class="glow-pulse-btn glow-cyan">Activate</button>
      <button class="glow-pulse-btn glow-green">Confirm</button>
    </div>
  </div>

</body>
</html>
