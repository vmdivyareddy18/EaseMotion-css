<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Color Shift Diff Viewer — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e4e9f0;
      padding: 40px;
    }
  </style>
</head>
<body>

  <div class="ease-diff">
    <div class="diff-header">
      <span class="diff-filename">📄 utils/formatDate.js</span>

      <input type="checkbox" id="diffView" class="diff-toggle-input" />
      <label for="diffView" class="diff-toggle-label">🔀 Split View</label>
    </div>

    <div class="diff-body">
      <div class="diff-line">
        <span class="line-marker"> </span>
        <span class="line-code">function formatDate(date) {</span>
      </div>
      <div class="diff-line is-removed">
        <span class="line-marker">−</span>
        <span class="line-code">  return date.toString();</span>
      </div>
      <div class="diff-line is-added">
        <span class="line-marker">+</span>
        <span class="line-code">  return date.toISOString().split('T')[0];</span>
      </div>
      <div class="diff-line">
        <span class="line-marker"> </span>
        <span class="line-code">}</span>
      </div>
      <div class="diff-line is-modified">
        <span class="line-marker">~</span>
        <span class="line-code">export default formatDate;</span>
      </div>
    </div>

    <div class="diff-legend">
      <span><span class="legend-dot added"></span>Added</span>
      <span><span class="legend-dot removed"></span>Removed</span>
      <span><span class="legend-dot modified"></span>Modified</span>
    </div>
  </div>

</body>
</html>
