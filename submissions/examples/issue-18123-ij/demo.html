<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-confetti-burst - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Confetti Burst</h1>
    <div class="confetti-wrap" id="confettiWrap">
      <button class="confetti-btn" id="confettiBtn">Burst!</button>
    </div>
  </div>
  <script>
    const wrap = document.getElementById('confettiWrap');
    document.getElementById('confettiBtn').addEventListener('click', () => {
      const colors = ['#6366f1','#a855f7','#ec4899','#f43f5e','#f97316','#eab308','#22c55e','#06b6d4'];
      for (let i = 0; i < 80; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        const size = 5 + Math.random() * 8;
        piece.style.width = size + 'px';
        piece.style.height = size * (0.4 + Math.random() * 0.6) + 'px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        piece.style.left = (30 + Math.random() * 40) + '%';
        piece.style.top = '40%';
        piece.style.opacity = '1';
        wrap.appendChild(piece);
        const angle = Math.random() * 360;
        const vel = 300 + Math.random() * 400;
        const vx = Math.cos(angle * Math.PI / 180) * vel;
        const vy = Math.sin(angle * Math.PI / 180) * vel - 200;
        const start = performance.now();
        const dur = 1200 + Math.random() * 800;
        const rot = Math.random() * 720;
        function anim(now) {
          const t = (now - start) / dur;
          if (t >= 1) { piece.remove(); return; }
          const x = vx * t;
          const y = vy * t + 0.5 * 980 * t * t;
          piece.style.transform = 'translate(' + x + 'px,' + y + 'px) rotate(' + (rot * t) + 'deg)';
          piece.style.opacity = 1 - t;
          requestAnimationFrame(anim);
        }
        requestAnimationFrame(anim);
      }
    });
  </script>
</body>
</html>
