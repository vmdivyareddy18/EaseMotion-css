<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Spotlight Badge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="wrapper">

<h1>Ease Spotlight Badge</h1>

<p class="subtitle">
Animated CSS badges for featured content.
</p>

<section class="badge-grid">

<span class="badge blue">Featured</span>

<span class="badge green">Success</span>

<span class="badge orange">Trending</span>

<span class="badge pink">Popular</span>

<span class="badge purple">Premium</span>

<span class="badge dark">Beta</span>

</section>

<section class="card">

<h2>Usage</h2>

<p>
Attach the badge beside cards, sections,
headings or products to attract attention
without JavaScript.
</p>

<div class="example">

<span class="badge blue small">
New
</span>

<span>
CSS Utility Component
</span>

</div>

</section>

</main>

</body>
</html>
