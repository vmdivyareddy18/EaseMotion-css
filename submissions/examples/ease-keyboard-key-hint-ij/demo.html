<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keyboard Key Hint</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <article class="card">
    <h2>Keyboard Shortcut</h2>
    <p>Press</p>
    <div class="key-hint" style="--key-bg: #3a3a4a; --key-color: #e0e0e0; --key-border: #6a6a7a; --press-duration: 0.12s">
      <kbd class="key">Ctrl</kbd>
      <span class="plus">+</span>
      <kbd class="key">K</kbd>
      <span class="plus">+</span>
      <kbd class="key">P</kbd>
    </div>
    <p class="hint">Click any key to press it</p>
  </article>
  <script>
    document.querySelectorAll('.key').forEach(el => {
      el.addEventListener('click', () => {
        el.classList.remove('pressed');
        void el.offsetWidth;
        el.classList.add('pressed');
      });
    });
  </script>
</body>
</html>
