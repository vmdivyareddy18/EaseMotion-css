<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Expanding Search Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Expanding Search Bar Reveal</h1>
    <p class="demo-desc">A compact search icon that smoothly expands into a full search input when clicked or focused.</p>

    <div class="navbar-mock">
      <span class="navbar-brand">EaseMotion</span>

      <div class="ease-expand-search">
        <input type="text" class="ease-expand-search-input" placeholder="Search...">
        <button class="ease-expand-search-btn" aria-label="Toggle search">
          <svg class="ease-expand-search-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>

    <p class="hint">Click the search icon (or Tab to the input) to expand the search field. Click elsewhere or blur to collapse it again.</p>
  </div>
</body>
</html>
