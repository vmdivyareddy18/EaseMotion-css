<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-command-palette-nav Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="ease-cpnav-trigger" id="openBtn">Open Command Palette (⌘K)</button>

<div class="ease-cpnav-overlay" id="overlay">
  <div class="ease-cpnav-palette" id="palette">
    <div class="ease-cpnav-search">
      <span class="ease-cpnav-search-icon">⌘</span>
      <input class="ease-cpnav-input" id="searchInput" type="text" placeholder="Type a command or search...">
      <kbd class="ease-cpnav-esc">ESC</kbd>
    </div>

    <div class="ease-cpnav-list" id="commandList">
      <div class="ease-cpnav-group ease-cpnav-group--recent" data-group="recent">
        <div class="ease-cpnav-group-title">Recent</div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Open Dashboard">
          <span class="ease-cpnav-item-icon">◧</span>
          <span class="ease-cpnav-item-label">Open Dashboard</span>
          <kbd class="ease-cpnav-kbd">⌘1</kbd>
        </div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Search Files">
          <span class="ease-cpnav-item-icon">⌕</span>
          <span class="ease-cpnav-item-label">Search Files</span>
          <kbd class="ease-cpnav-kbd">⌘F</kbd>
        </div>
      </div>

      <div class="ease-cpnav-divider"></div>

      <div class="ease-cpnav-group" data-group="navigation">
        <div class="ease-cpnav-group-title">Navigation</div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Create Project">
          <span class="ease-cpnav-item-icon">▣</span>
          <span class="ease-cpnav-item-label">Create Project</span>
          <kbd class="ease-cpnav-kbd">⌘P</kbd>
        </div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Go to Settings">
          <span class="ease-cpnav-item-icon">⚙</span>
          <span class="ease-cpnav-item-label">Go to Settings</span>
          <kbd class="ease-cpnav-kbd">⌘,</kbd>
        </div>
      </div>

      <div class="ease-cpnav-divider"></div>

      <div class="ease-cpnav-group" data-group="actions">
        <div class="ease-cpnav-group-title">Actions</div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Invite Team Member">
          <span class="ease-cpnav-item-icon">+</span>
          <span class="ease-cpnav-item-label">Invite Team Member</span>
          <kbd class="ease-cpnav-kbd">⌘I</kbd>
        </div>
        <div class="ease-cpnav-item" tabindex="0" role="option" data-label="Log Out">
          <span class="ease-cpnav-item-icon">⏻</span>
          <span class="ease-cpnav-item-label">Log Out</span>
          <kbd class="ease-cpnav-kbd">⌘Q</kbd>
        </div>
      </div>

      <div class="ease-cpnav-empty" id="emptyState">
        <span class="ease-cpnav-empty-icon">⌕</span>
        <p class="ease-cpnav-empty-title">No results found</p>
        <p class="ease-cpnav-empty-subtitle">Try a different search term</p>
      </div>
    </div>
  </div>
</div>

<script>
  const overlay = document.getElementById('overlay');
  const openBtn = document.getElementById('openBtn');
  const searchInput = document.getElementById('searchInput');
  const commandList = document.getElementById('commandList');
  const emptyState = document.getElementById('emptyState');
  const items = Array.from(commandList.querySelectorAll('.ease-cpnav-item'));
  let activeIndex = -1;

  function openPalette() {
    overlay.classList.add('ease-cpnav-overlay--open');
    searchInput.value = '';
    filterItems('');
    setTimeout(() => searchInput.focus(), 50);
    activeIndex = -1;
  }

  function closePalette() {
    overlay.classList.remove('ease-cpnav-overlay--open');
  }

  openBtn.addEventListener('click', openPalette);

  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closePalette();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePalette();

    if (overlay.classList.contains('ease-cpnav-overlay--open')) {
      const visibleItems = items.filter(i => i.style.display !== 'none');

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIndex = Math.min(activeIndex + 1, visibleItems.length - 1);
        visibleItems.forEach((i, idx) => i.setAttribute('aria-selected', idx === activeIndex));
        visibleItems[activeIndex]?.focus();
      }

      if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIndex = Math.max(activeIndex - 1, 0);
        visibleItems.forEach((i, idx) => i.setAttribute('aria-selected', idx === activeIndex));
        visibleItems[activeIndex]?.focus();
      }

      if (e.key === 'Enter' && activeIndex >= 0) {
        visibleItems[activeIndex]?.click();
      }
    }
  });

  function filterItems(query) {
    const q = query.trim().toLowerCase();
    let visibleCount = 0;

    items.forEach(item => {
      const label = item.dataset.label;
      const labelEl = item.querySelector('.ease-cpnav-item-label');
      const matches = label.toLowerCase().includes(q);
      item.style.display = matches ? 'flex' : 'none';
      item.setAttribute('aria-selected', 'false');

      if (matches) {
        visibleCount++;
        if (q) {
          const idx = label.toLowerCase().indexOf(q);
          labelEl.innerHTML =
            label.slice(0, idx) +
            '<mark>' + label.slice(idx, idx + q.length) + '</mark>' +
            label.slice(idx + q.length);
        } else {
          labelEl.textContent = label;
        }
      }
    });

    document.querySelectorAll('.ease-cpnav-group').forEach(group => {
      const groupItems = Array.from(group.querySelectorAll('.ease-cpnav-item'));
      const anyVisible = groupItems.some(i => i.style.display !== 'none');
      group.style.display = anyVisible ? 'block' : 'none';
    });

    emptyState.classList.toggle('ease-cpnav-empty--show', visibleCount === 0);
  }

  searchInput.addEventListener('input', (e) => filterItems(e.target.value));

  items.forEach(item => {
    item.addEventListener('click', () => {
      alert('Executed: ' + item.dataset.label);
      closePalette();
    });
  });
</script>

</body>
</html>
