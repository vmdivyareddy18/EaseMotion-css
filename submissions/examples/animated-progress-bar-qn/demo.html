<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Progress Bar - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Animated Progress Bars</h2>
        
        <!-- Progress Bar 1: HTML/CSS -->
        <div class="progress-wrapper-qn">
            <div class="progress-header-qn">
                <span class="progress-label-qn">HTML & CSS</span>
                <span class="progress-percent-qn">95%</span>
            </div>
            <div class="progress-bar-qn">
                <div class="progress-fill-qn progress-95-qn"></div>
            </div>
        </div>

        <!-- Progress Bar 2: JavaScript -->
        <div class="progress-wrapper-qn">
            <div class="progress-header-qn">
                <span class="progress-label-qn">JavaScript</span>
                <span class="progress-percent-qn">85%</span>
            </div>
            <div class="progress-bar-qn">
                <div class="progress-fill-qn progress-85-qn"></div>
            </div>
        </div>

        <!-- Progress Bar 3: React -->
        <div class="progress-wrapper-qn">
            <div class="progress-header-qn">
                <span class="progress-label-qn">React</span>
                <span class="progress-percent-qn">75%</span>
            </div>
            <div class="progress-bar-qn">
                <div class="progress-fill-qn progress-75-qn"></div>
            </div>
        </div>

        <!-- Progress Bar 4: Node.js -->
        <div class="progress-wrapper-qn">
            <div class="progress-header-qn">
                <span class="progress-label-qn">Node.js</span>
                <span class="progress-percent-qn">60%</span>
            </div>
            <div class="progress-bar-qn">
                <div class="progress-fill-qn progress-60-qn"></div>
            </div>
        </div>
    </div>
</body>
</html>
