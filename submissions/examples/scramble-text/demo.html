<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hacker Text Scramble - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/cards.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-card">
    <h2 style="margin: 0; font-weight: 800;">Text Scramble Effect</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
      Hacker decoder scan cycling letters randomly before revealing target text.
    </p>

    <!-- Scramble Target Container -->
    <div class="scramble-box">
      <h1 id="target-el" class="ease-scramble-text" style="font-size: 2.5rem; margin: 0;" data-value="EASEMOTION">EASEMOTION</h1>
    </div>

    <!-- Controls -->
    <div class="ease-flex ease-gap-4">
      <button id="trigger-btn" class="ease-btn ease-btn-primary ease-btn-sm ease-btn-pill ease-btn-hover" style="color:white;">
        👾 Scramble Text
      </button>
    </div>
  </div>

  <script>
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const el = document.getElementById('target-el');
    const trigger = document.getElementById('trigger-btn');
    let interval = null;

    const runScramble = () => {
      let iteration = 0;
      clearInterval(interval);
      el.classList.add('ease-scrambling');

      interval = setInterval(() => {
        el.innerText = el.innerText
          .split("")
          .map((letter, index) => {
            if (index < iteration) {
              return el.dataset.value[index];
            }
            return letters[Math.floor(Math.random() * 26)];
          })
          .join("");

        if (iteration >= el.dataset.value.length) {
          clearInterval(interval);
          el.classList.remove('ease-scrambling');
        }
        iteration += 1 / 3;
      }, 30);
    };

    // Auto run on load
    runScramble();

    trigger.addEventListener('click', runScramble);
  </script>

</body>
</html>
