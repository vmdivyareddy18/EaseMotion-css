<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blur Button Example</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="blur-button-page-sum">
      <h1>Blur Button</h1>
      <p>Button used as a loading indicator with a smooth blur pulse.</p>

      <button
        type="button"
        class="blur-button-sum"
        aria-busy="true"
        aria-live="polite"
        aria-label="Loading, please wait"
      >
        <span class="blur-button-sum__label" aria-hidden="true">Loading…</span>
      </button>
    </main>
  </body>
</html>
