<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Prompt Engineering Workspace</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="glow-bg"></div>
  <div class="workspace-wrapper">
    <aside class="sidebar">
      <div class="logo">PromptStudio</div>
      <nav class="nav">
        <a href="#" class="item active">Editor</a>
        <a href="#" class="item">Library</a>
        <a href="#" class="item">History</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <h1>Prompt Workspace</h1>
        <span class="status-badge">Model: GPT-4o</span>
      </header>

      <section class="editor-section card">
        <div class="editor-header">
          <h3>System Message & User Input</h3>
        </div>
        <textarea class="system-input" placeholder="You are a helpful AI assistant..."></textarea>
        <textarea class="user-input" placeholder="Enter your prompt here..."></textarea>
        <div class="editor-actions">
          <button class="btn btn-primary">Run Prompt</button>
        </div>
      </section>

      <section class="preview-section card">
        <h3>Response Preview</h3>
        <div class="preview-box">
          <p>Response will be displayed here after running the prompt.</p>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
