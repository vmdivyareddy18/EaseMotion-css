<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Input Spin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>
    <h1>Number Input Spin</h1>
    <div class="nis-wrapper">
      <button class="nis-btn" id="nisDown" aria-label="Decrease">−</button>
      <input type="text" class="nis-input" id="nisInput" value="0" readonly />
      <button class="nis-btn" id="nisUp" aria-label="Increase">+</button>
    </div>
  </main>

  <script>
    const input = document.getElementById('nisInput');
    const up = document.getElementById('nisUp');
    const down = document.getElementById('nisDown');

    let value = 0;

    function update() {
      input.value = value;
      input.style.transform = 'scale(1.15)';
      setTimeout(() => { input.style.transform = 'scale(1)'; }, 150);
    }

    up.addEventListener('click', () => { value++; update(); });
    down.addEventListener('click', () => { value--; update(); });
  </script>
</body>
</html>
