<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Cover Flow Carousel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>3D Cover Flow Carousel</h1>
  <div class="carousel-wrapper">
    <button class="carousel-btn carousel-btn--prev" aria-label="Previous">&#8249;</button>
    <div class="carousel-stage">
      <div class="carousel-slide" data-index="0">
        <img src="https://picsum.photos/id/1015/400/300" alt="Mountain landscape">
      </div>
      <div class="carousel-slide" data-index="1">
        <img src="https://picsum.photos/id/1016/400/300" alt="Road in the woods">
      </div>
      <div class="carousel-slide" data-index="2">
        <img src="https://picsum.photos/id/1018/400/300" alt="Mountain peak">
      </div>
      <div class="carousel-slide" data-index="3">
        <img src="https://picsum.photos/id/1020/400/300" alt="Dog on a lake">
      </div>
      <div class="carousel-slide" data-index="4">
        <img src="https://picsum.photos/id/1024/400/300" alt="Bird in nature">
      </div>
    </div>
    <button class="carousel-btn carousel-btn--next" aria-label="Next">&#8250;</button>
  </div>
  <script>
    const stage = document.querySelector('.carousel-stage');
    const slides = document.querySelectorAll('.carousel-slide');
    const prevBtn = document.querySelector('.carousel-btn--prev');
    const nextBtn = document.querySelector('.carousel-btn--next');
    const style = getComputedStyle(document.documentElement);
    const slideWidth = parseInt(style.getPropertyValue('--c3d-slide-width')) || 280;
    const gap = 40;
    let current = 0;

    function updateCarousel() {
      slides.forEach((slide, i) => {
        const offset = i - current;
        slide.classList.remove('active');
        slide.style.setProperty('--c3d-offset', offset);
        if (offset === 0) slide.classList.add('active');
      });
    }

    prevBtn.addEventListener('click', () => {
      current = (current - 1 + slides.length) % slides.length;
      updateCarousel();
    });

    nextBtn.addEventListener('click', () => {
      current = (current + 1) % slides.length;
      updateCarousel();
    });

    updateCarousel();
  </script>
</body>
</html>
