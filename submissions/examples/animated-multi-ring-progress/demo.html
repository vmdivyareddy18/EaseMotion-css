<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Multi-Ring Progress - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Activity Rings</h1>
      <p>Track your daily goals with animated progress rings.</p>
    </header>

    <!-- Rings Display -->
    <div class="rings-display ease-zoom-in ease-delay-100">
      
      <!-- Outer Ring: Move -->
      <div class="ring ring-outer ring-75">
        <div class="ring-progress"></div>
      </div>

      <!-- Middle Ring: Exercise -->
      <div class="ring ring-middle ring-60">
        <div class="ring-progress"></div>
      </div>

      <!-- Inner Ring: Stand -->
      <div class="ring ring-inner ring-90">
        <div class="ring-progress"></div>
      </div>

      <!-- Center Content -->
      <div class="ring-center ease-fade-in ease-delay-500">
        <div class="center-value">75%</div>
        <div class="center-label">Overall</div>
      </div>

    </div>

    <!-- Legend -->
    <div class="legend ease-fade-in-up ease-delay-600">
      <div class="legend-item">
        <span class="legend-color move"></span>
        <div class="legend-text">
          <span class="legend-title">Move</span>
          <span class="legend-value">450/600 kcal</span>
        </div>
      </div>
      <div class="legend-item">
        <span class="legend-color exercise"></span>
        <div class="legend-text">
          <span class="legend-title">Exercise</span>
          <span class="legend-value">18/30 min</span>
        </div>
      </div>
      <div class="legend-item">
        <span class="legend-color stand"></span>
        <div class="legend-text">
          <span class="legend-title">Stand</span>
          <span class="legend-value">9/10 hours</span>
        </div>
      </div>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
      <div class="stat-card ease-fade-in-up ease-delay-700">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
          <span class="stat-value">450</span>
          <span class="stat-label">Calories</span>
        </div>
      </div>
      <div class="stat-card ease-fade-in-up ease-delay-800">
        <div class="stat-icon">⏱️</div>
        <div class="stat-info">
          <span class="stat-value">18</span>
          <span class="stat-label">Minutes</span>
        </div>
      </div>
      <div class="stat-card ease-fade-in-up ease-delay-900">
        <div class="stat-icon">🧍</div>
        <div class="stat-info">
          <span class="stat-value">9</span>
          <span class="stat-label">Hours</span>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
