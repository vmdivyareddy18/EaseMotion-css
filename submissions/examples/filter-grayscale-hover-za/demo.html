<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grayscale Hover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Hover to Reveal Color</h1>
  <div class="gallery">
    <figure class="art-card">
      <div class="art-img" style="background:linear-gradient(135deg,#f472b6,#ec4899)"></div>
      <figcaption>Sunset Glow</figcaption>
    </figure>
    <figure class="art-card">
      <div class="art-img" style="background:linear-gradient(135deg,#6366f1,#4f46e5)"></div>
      <figcaption>Ocean Depth</figcaption>
    </figure>
    <figure class="art-card">
      <div class="art-img" style="background:linear-gradient(135deg,#22c55e,#16a34a)"></div>
      <figcaption>Forest Canopy</figcaption>
    </figure>
  </div>
</body>
</html>
