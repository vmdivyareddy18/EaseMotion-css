<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Music Player</title>
    <!-- Use relative path to core framework -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: var(--ease-color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--ease-font-sans);
        }
    </style>
</head>
<body>

    <div class="music-player-container ease-fade-in">
        <!-- Album Art -->
        <div class="album-art-wrapper">
            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&h=400&auto=format&fit=crop" alt="Album Art" class="album-art" id="album-art">
        </div>

        <!-- Track Info -->
        <div class="track-info track-transition-wrapper" id="track-info">
            <h2 class="track-name">Midnight City</h2>
            <p class="artist-name">Synthwave Collective</p>
        </div>

        <!-- Visualizer -->
        <div class="visualizer" id="visualizer">
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
            <div class="visualizer-bar"></div>
        </div>

        <!-- Progress -->
        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-info">
                <span>1:45</span>
                <span>3:50</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn ease-hover-shrink" id="prev-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="control-btn play-pause-btn ease-hover-grow" id="play-btn">
                <svg class="icon" viewBox="0 0 24 24" id="play-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="control-btn ease-hover-shrink" id="next-btn">
                <svg class="icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>

        <!-- Volume -->
        <div class="volume-control">
            <svg class="icon" style="width: 18px; color: var(--ease-color-muted);" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <div class="volume-slider">
                <div class="volume-fill"></div>
            </div>
        </div>

        <!-- Playlist Toggle -->
        <button class="control-btn" style="position: absolute; top: var(--ease-space-4); right: var(--ease-space-4); color: var(--ease-color-muted);" id="playlist-toggle">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 10h11v2H3zm0-4h11v2H3zm0 8h7v2H3zm13-1v8l7-4z"/></svg>
        </button>

        <!-- Playlist Drawer -->
        <div class="playlist-drawer" id="playlist-drawer">
            <div class="playlist-header">
                <h3>Up Next</h3>
                <button class="control-btn" id="close-playlist">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="playlist-item active">
                <div style="flex: 1">
                    <div style="font-weight: 600">Midnight City</div>
                    <div style="font-size: 12px; opacity: 0.7">Synthwave Collective</div>
                </div>
                <span>3:50</span>
            </div>
            <div class="playlist-item">
                <div style="flex: 1">
                    <div style="font-weight: 600">Neon Lights</div>
                    <div style="font-size: 12px; opacity: 0.7">Future Funk</div>
                </div>
                <span>4:12</span>
            </div>
            <div class="playlist-item">
                <div style="flex: 1">
                    <div style="font-weight: 600">Digital Dream</div>
                    <div style="font-size: 12px; opacity: 0.7">Retro Beats</div>
                </div>
                <span>3:25</span>
            </div>
        </div>
    </div>

    <script>
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const albumArt = document.getElementById('album-art');
        const visualizer = document.getElementById('visualizer');
        const playlistToggle = document.getElementById('playlist-toggle');
        const playlistDrawer = document.getElementById('playlist-drawer');
        const closePlaylist = document.getElementById('close-playlist');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const trackInfo = document.getElementById('track-info');

        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
                albumArt.classList.add('playing');
                visualizer.classList.add('playing');
            } else {
                playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
                albumArt.classList.remove('playing');
                visualizer.classList.remove('playing');
            }
        });

        playlistToggle.addEventListener('click', () => {
            playlistDrawer.classList.add('open');
        });

        closePlaylist.addEventListener('click', () => {
            playlistDrawer.classList.remove('open');
        });

        const tracks = [
            { name: "Midnight City", artist: "Synthwave Collective" },
            { name: "Neon Lights", artist: "Future Funk" },
            { name: "Digital Dream", artist: "Retro Beats" }
        ];
        let currentTrack = 0;

        function changeTrack(direction) {
            trackInfo.classList.add(direction === 'next' ? 'slide-left-exit' : 'slide-right-exit');
            
            setTimeout(() => {
                currentTrack = (currentTrack + (direction === 'next' ? 1 : -1) + tracks.length) % tracks.length;
                trackInfo.querySelector('.track-name').textContent = tracks[currentTrack].name;
                trackInfo.querySelector('.artist-name').textContent = tracks[currentTrack].artist;
                
                trackInfo.classList.remove('slide-left-exit', 'slide-right-exit');
                trackInfo.classList.add('slide-in');
                
                setTimeout(() => {
                    trackInfo.classList.remove('slide-in');
                }, 300);
            }, 300);
        }

        nextBtn.addEventListener('click', () => changeTrack('next'));
        prevBtn.addEventListener('click', () => changeTrack('prev'));
    </script>
</body>
</html>
