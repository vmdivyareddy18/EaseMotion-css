<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Avatar Showcase</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background-color: #06070d; /* Dark theme */
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }
    .blog-card {
      background-color: #0f111a;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 3rem 2rem 2.5rem;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      box-sizing: border-box;
    }
    .author-info {
      margin-top: 1.5rem;
    }
    .author-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #ffffff;
      margin: 0 0 6px;
    }
    .author-role {
      font-size: 0.85rem;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      margin: 0 0 1.25rem;
    }
    .author-bio {
      color: #94a3b8;
      font-size: 0.9rem;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="blog-card">
    <!-- Aurora Avatar Component -->
    <div class="aurora-avatar-container">
      <!-- Glow layers -->
      <div class="aurora-glow-wrap">
        <div class="glow-blob blob-cyan"></div>
        <div class="glow-blob blob-purple"></div>
        <div class="glow-blob blob-pink"></div>
      </div>
      
      <!-- Avatar mask and SVG Profile -->
      <div class="avatar-img-wrap">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="50" cy="50" r="50" fill="#1b1d30"/>
          <!-- Body -->
          <path d="M15 88C15 72.536 27.536 60 43 60H57C72.464 60 85 72.536 85 88" fill="#6c63ff"/>
          <!-- Head -->
          <circle cx="50" cy="38" r="18" fill="#fbcfe8"/>
          <!-- Glasses -->
          <rect x="36" y="34" width="12" height="6" rx="2" fill="#111422"/>
          <rect x="52" y="34" width="12" height="6" rx="2" fill="#111422"/>
          <line x1="48" y1="37" x2="52" y2="37" stroke="#111422" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <!-- Author details -->
    <div class="author-info">
      <h3 class="author-name">Alex Rivera</h3>
      <p class="author-role">Creative Director</p>
      <p class="author-bio">
        Designing interactive web systems and fluid animation paradigms at the intersection of design engineering and motion design.
      </p>
    </div>
  </div>
</body>
</html>
