<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Authentication Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Master Authentication Card Container -->
  <main class="auth-container ease-fade-in ease-slide-up">
    
    <!-- State management controllers -->
    <input type="radio" id="tab-login" name="auth-tabs" class="tab-input" checked>
    <input type="radio" id="tab-signup" name="auth-tabs" class="tab-input">

    <!-- Tab Switching Navigation Bar -->
    <nav class="tabs-nav">
      <label for="tab-login" class="tab-label">Sign In</label>
      <label for="tab-signup" class="tab-label">Register</label>
    </nav>

    <!-- Login Panel Context -->
    <div id="login-form-wrapper" class="auth-form-wrapper ease-fade-in">
      <form action="#" method="POST" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" required placeholder="name@company.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth-submit">Access Workspace</button>
      </form>
    </div>

    <!-- Signup Panel Context -->
    <div id="signup-form-wrapper" class="auth-form-wrapper ease-fade-in">
      <form action="#" method="POST" onsubmit="event.preventDefault();">
        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" required placeholder="Jane Doe">
        </div>
        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" required placeholder="name@company.com">
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" required placeholder="••••••••">
        </div>
        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-auth-submit">Create Account</button>
      </form>
    </div>

  </main>

</body>
</html>
