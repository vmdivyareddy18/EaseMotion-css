<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Image Reveal Slider</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="reveal-container">
    <header class="reveal-header">
      <h1>Fluid Image Reveal</h1>
      <p>Drag the slider back and forth to compare before/after images in real time.</p>
    </header>

    <div class="reveal-wrapper" id="revealWrapper">
      <!-- Background / Before Image -->
      <div class="image-box before-image">
        <div class="label-badge before-label">Before</div>
      </div>
      
      <!-- Foreground / After Image -->
      <div class="image-box after-image" id="afterImage">
        <div class="label-badge after-label">After</div>
      </div>

      <!-- Draggable Slider Handle -->
      <div class="slider-handle" id="sliderHandle">
        <div class="handle-line"></div>
        <div class="handle-circle">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div class="handle-line"></div>
      </div>

      <input type="range" class="control-range" id="revealRange" min="0" max="100" value="50" aria-label="Comparison slider position">
    </div>
  </main>

  <script>
    const range = document.getElementById('revealRange');
    const afterImage = document.getElementById('afterImage');
    const handle = document.getElementById('sliderHandle');

    function updateReveal() {
      const val = range.value;
      afterImage.style.clipPath = `polygon(${val}% 0, 100% 0, 100% 100%, ${val}% 100%)`;
      handle.style.left = `${val}%`;
    }

    range.addEventListener('input', updateReveal);
    updateReveal();
  </script>
</body>
</html>
