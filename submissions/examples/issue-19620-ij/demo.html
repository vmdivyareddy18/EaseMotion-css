<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermometer Fill – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="thermometer-wrapper">
    <div class="thermometer" role="meter" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
      <div class="tube">
        <div class="mercury"></div>
      </div>
      <div class="bulb"></div>
      <span class="thermometer-value">45°C</span>
    </div>
    <span class="thermometer-title">Thermometer Fill</span>
  </div>
</body>
</html>
