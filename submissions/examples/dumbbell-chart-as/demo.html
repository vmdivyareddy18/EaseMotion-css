<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dumbbell Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <figure class="dumbbell">
    <figcaption class="db-title">Before vs after</figcaption>

    <div class="db-row">
      <span class="db-cat">Q1</span>
      <span class="db-track" style="--a: 30%; --b: 62%;">
        <span class="db-line"></span>
        <span class="db-dot start"></span>
        <span class="db-dot end"></span>
      </span>
    </div>
    <div class="db-row">
      <span class="db-cat">Q2</span>
      <span class="db-track" style="--a: 45%; --b: 58%;">
        <span class="db-line"></span>
        <span class="db-dot start"></span>
        <span class="db-dot end"></span>
      </span>
    </div>
    <div class="db-row">
      <span class="db-cat">Q3</span>
      <span class="db-track" style="--a: 25%; --b: 70%;">
        <span class="db-line"></span>
        <span class="db-dot start"></span>
        <span class="db-dot end"></span>
      </span>
    </div>
    <div class="db-row">
      <span class="db-cat">Q4</span>
      <span class="db-track" style="--a: 55%; --b: 80%;">
        <span class="db-line"></span>
        <span class="db-dot start"></span>
        <span class="db-dot end"></span>
      </span>
    </div>
    <div class="db-row">
      <span class="db-cat">Q5</span>
      <span class="db-track" style="--a: 40%; --b: 52%;">
        <span class="db-line"></span>
        <span class="db-dot start"></span>
        <span class="db-dot end"></span>
      </span>
    </div>

    <figcaption class="db-legend">
      <span class="start">2024</span>
      <span class="end">2026</span>
    </figcaption>
  </figure>
</body>
</html>
