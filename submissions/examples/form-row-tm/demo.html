<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Form Row Layout - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Form Row Layout</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-form-row</code> utility. Resize the viewport to
      see the fields collapse from side-by-side to stacked.
    </p>

    <form class="demo-form" novalidate>

      <div class="ease-form-row">
        <div class="ease-field">
          <label class="ease-field-label" for="first">First name</label>
          <input class="ease-input" id="first" type="text" placeholder="Ada">
        </div>
        <div class="ease-field">
          <label class="ease-field-label" for="last">Last name</label>
          <input class="ease-input" id="last" type="text" placeholder="Lovelace">
        </div>
      </div>

      <div class="ease-field">
        <label class="ease-field-label" for="email">Email</label>
        <input class="ease-input" id="email" type="email" placeholder="ada@example.com">
      </div>

    </form>

  </div>

</body>
</html>
