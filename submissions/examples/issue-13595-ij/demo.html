<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drawer Right - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-drawer-right</h1>
    <p class="subtitle">Animated right-side drawer panel — perfect for carts and filters</p>

    <button class="open-btn" onclick="openDrawer()">🛒 Open Cart</button>
  </div>

  <div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <h3>Shopping Cart</h3>
      <button class="drawer-close" onclick="closeDrawer()">✕</button>
    </div>
    <div class="drawer-body">
      <div class="cart-item">
        <div class="item-img">👟</div>
        <div class="item-info">
          <div class="item-name">Running Sneakers</div>
          <div class="item-price">$89.99</div>
        </div>
        <div class="item-qty">×1</div>
      </div>
      <div class="cart-item">
        <div class="item-img">🎧</div>
        <div class="item-info">
          <div class="item-name">Wireless Headphones</div>
          <div class="item-price">$129.99</div>
        </div>
        <div class="item-qty">×2</div>
      </div>
      <div class="cart-item">
        <div class="item-img">⌚</div>
        <div class="item-info">
          <div class="item-name">Smart Watch</div>
          <div class="item-price">$249.99</div>
        </div>
        <div class="item-qty">×1</div>
      </div>
    </div>
  </div>

  <script>
    function openDrawer() {
      document.getElementById('drawer').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function closeDrawer() {
      document.getElementById('drawer').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
    }
  </script>
</body>
</html>
