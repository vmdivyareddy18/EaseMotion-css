<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Spin on Load – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-grid">
    <h1 class="demo-title">🔄 Icon Spin on Load</h1>
    <div class="card-row">
      <div class="card">
        <h2 class="card-label">Replay entrance</h2>
        <div class="icon-wrap load-spin" id="spinIcon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="var(--icon-color)"/>
          </svg>
        </div>
        <div class="controls">
          <label>Icon Color <input type="color" value="#fab387" data-prop="--icon-color"></label>
          <label>Icon Size <input type="range" min="32" max="120" value="64" data-prop="--icon-size"></label>
          <label>Spin Duration <input type="range" min="0.3" max="2" step="0.1" value="0.8" data-prop="--spin-duration"></label>
          <label>Easing
            <select data-prop="--entrance-easing">
              <option value="ease-out">ease-out</option>
              <option value="ease-in-out">ease-in-out</option>
              <option value="ease-out-back" selected>ease-out-back (cubic-bezier(0.34, 1.56, 0.64, 1))</option>
              <option value="bounce">bounce (cubic-bezier(0.68, -0.55, 0.27, 1.55))</option>
              <option value="linear">linear</option>
            </select>
          </label>
        </div>
        <p class="hint">The icon spins on page load. Click "Replay" to play again.</p>
        <button class="replay-btn" onclick="replaySpin()">↻ Replay</button>
      </div>
    </div>
  </main>
  <script>
    document.querySelectorAll('[data-prop]').forEach(input => {
      input.addEventListener('input', () => {
        const wrap = document.querySelector('.icon-wrap');
        if (input.tagName === 'SELECT') {
          const map = {
            'ease-out': 'ease-out',
            'ease-in-out': 'ease-in-out',
            'ease-out-back': 'cubic-bezier(0.34, 1.56, 0.64, 1)',
            'bounce': 'cubic-bezier(0.68, -0.55, 0.27, 1.55)',
            'linear': 'linear'
          };
          wrap.style.setProperty('--entrance-easing', map[input.value]);
        } else {
          const val = input.type === 'color' ? input.value : input.type === 'range' && input.step === '0.1' ? input.value + 's' : input.value + 'px';
          wrap.style.setProperty(input.dataset.prop, val);
        }
      });
    });

    function replaySpin() {
      const wrap = document.querySelector('.load-spin');
      wrap.classList.remove('load-spin');
      void wrap.offsetWidth;
      wrap.classList.add('load-spin');
    }
  </script>
</body>
</html>
