<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Glassmorphism Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Animated background ambient orbs to showcase the glass transparency -->
    <div class="ambient-glow-wrapper">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <main class="preview-container">
        <!-- The Glassmorphism Card Feature -->
        <div class="glass-card">
            <div class="glass-card-header">
                <div class="glass-icon-wrapper">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="glass-svg"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
                </div>
                <span class="glass-badge">Premium Feature</span>
            </div>
            
            <div class="glass-card-body">
                <h3>Glassmorphism UI Engine</h3>
                <p>A highly responsive interface card using stacked backdrop filters, dynamic transparency layers, and hardware-accelerated micro-reflections.</p>
            </div>
            
            <div class="glass-card-footer">
                <button class="glass-btn">
                    <span>Explore Engine</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="arrow-svg"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
