<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tada Avatar - Food Delivery Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f7f7f8;
    }
    
    .demo-container {
      display: flex;
      gap: 40px;
    }

    .demo-card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
      text-align: center;
      width: 200px;
    }

    .demo-card h3 {
      margin: 15px 0 5px;
      font-size: 1.1rem;
      color: #333;
    }

    .demo-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #777;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <!-- Hover variant -->
    <div class="demo-card">
      <div class="ease-tada-avatar hover-trigger">
        <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix&backgroundColor=ffdfbf" alt="Courier Avatar" class="ease-avatar-img">
        <div class="ease-avatar-badge">🛵</div>
      </div>
      <h3>Hover Me</h3>
      <p>Your driver is arriving soon!</p>
    </div>

    <!-- Infinite variant -->
    <div class="demo-card">
      <div class="ease-tada-avatar ease-animate-infinite">
        <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Aneka&backgroundColor=b6e3f4" alt="Chef Avatar" class="ease-avatar-img">
        <div class="ease-avatar-badge">⭐</div>
      </div>
      <h3>Top Chef</h3>
      <p>Preparing your meal</p>
    </div>
  </div>

</body>
</html>
