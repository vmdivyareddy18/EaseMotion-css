<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse Futuristic HUD Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="hud-card">

    <div class="scan-line"></div>

    <div class="status">SYSTEM ONLINE</div>

    <h2>HUD Control Panel</h2>

    <p>
        Monitor critical system metrics through a futuristic holographic
        interface featuring a smooth Glow Pulse animation.
    </p>

    <div class="metrics">

        <div class="metric">
            <span>CPU</span>
            <strong>84%</strong>
        </div>

        <div class="metric">
            <span>Energy</span>
            <strong>92%</strong>
        </div>

        <div class="metric">
            <span>Network</span>
            <strong>1.2Gb/s</strong>
        </div>

    </div>

    <button>Access Console</button>

</div>

</body>
</html>
