<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetary Security Intelligence Grid</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="grid-dashboard">
    <header class="header">
      <span class="badge">Grid Control</span>
      <h1>Planetary Security Intelligence Grid</h1>
      <p class="subtitle">Global risk levels, regional status indices, and sync maps.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-grid">
        <h3>🌍 Connected Region Grid</h3>
        <div class="nodes-list">
          <div class="node-row"><span>US-East Grid</span><span class="status-val">Online</span></div>
          <div class="node-row"><span>EU-West Grid</span><span class="status-val">Online</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Latency analytics</h3>
          <div class="chart-box">
            <svg viewBox="0 0 200 65" style="width:100%; height:auto;">
              <path d="M 0 50 Q 50 10, 100 40 T 200 20" fill="none" stroke="var(--primary)" stroke-width="2.5"></path>
            </svg>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
