<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruler Measure Guide | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Ruler Measure Guide</h1>
    <p class="subtitle">On-screen measurement rulers with snap indicators</p>

    <div class="controls">
      <button class="ctrl-btn" id="toggleRulers">Toggle Rulers</button>
      <button class="ctrl-btn" id="resetRulers">Reset</button>
    </div>

    <div class="canvas" id="canvas">
      <div class="measure-box" id="box1">
        <span class="box-label">Box 1</span>
      </div>
      <div class="measure-box" id="box2">
        <span class="box-label">Box 2</span>
      </div>
      <div class="measure-line h-line" id="hline1">
        <span class="measure-label">120px</span>
      </div>
      <div class="measure-line v-line" id="vline1">
        <span class="measure-label">80px</span>
      </div>
    </div>

    <div class="info">
      <p>Rulers slide in from the edges with tick marks. Measurement lines snap to elements.</p>
    </div>

    <footer class="footer">
      <p>Part of the <a href="https://github.com/anomalyco/EaseMotion-css" target="_blank">EaseMotion-css</a> collection</p>
    </footer>
  </div>

  <!-- Ruler elements positioned at edges -->
  <div class="ruler ruler-top" id="rulerTop"></div>
  <div class="ruler ruler-left" id="rulerLeft"></div>

  <script src="demo.js"></script>
</body>
</html>
