<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sticky Notes Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="board-header">
      <h1 class="title">Sticky Notes</h1>
      <span class="note-count" id="noteCount">0 notes</span>
    </div>
    <div class="board-toolbar">
      <button class="toolbar-btn" id="addNoteBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Note
      </button>
      <button class="toolbar-btn secondary" id="clearAllBtn">Clear All</button>
    </div>
    <div class="notes-board" id="notesBoard"></div>
  </div>
  <script>
    const STORAGE_KEY = 'sticky-notes-ak';
    const colors = ['#6366f1', '#f59e0b', '#22c55e', '#ec4899', '#14b8a6', '#f97316'];

    let notes = [];

    const notesBoard = document.getElementById('notesBoard');
    const noteCount = document.getElementById('noteCount');
    const addNoteBtn = document.getElementById('addNoteBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');

    function loadNotes() {
      const raw = localStorage.getItem(STORAGE_KEY);
      notes = raw ? JSON.parse(raw) : [];
    }

    function saveNotes() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    function renderNotes() {
      notesBoard.innerHTML = '';
      notes.forEach((note, i) => {
        const el = document.createElement('div');
        el.className = 'sticky-note';
        el.style.setProperty('--note-color', note.color);
        el.innerHTML = `
          <div class="sticky-header">
            <div class="color-dot" style="background: ${note.color}"></div>
            <button class="sticky-delete" data-idx="${i}">&times;</button>
          </div>
          <div class="sticky-body">
            <textarea class="sticky-textarea" data-idx="${i}" placeholder="Write something...">${note.text}</textarea>
          </div>
          <div class="sticky-footer">
            <span class="sticky-date">${note.date}</span>
          </div>
        `;
        notesBoard.appendChild(el);
      });

      noteCount.textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');

      document.querySelectorAll('.sticky-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          notes.splice(parseInt(btn.dataset.idx), 1);
          saveNotes();
          renderNotes();
        });
      });

      document.querySelectorAll('.sticky-textarea').forEach(ta => {
        ta.addEventListener('input', () => {
          const idx = parseInt(ta.dataset.idx);
          notes[idx].text = ta.value;
          notes[idx].date = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
          saveNotes();
          const footer = ta.closest('.sticky-note').querySelector('.sticky-date');
          footer.textContent = notes[idx].date;
        });
      });
    }

    function addNote() {
      notes.unshift({
        text: '',
        color: colors[Math.floor(Math.random() * colors.length)],
        date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      });
      saveNotes();
      renderNotes();
      const firstTextarea = notesBoard.querySelector('.sticky-textarea');
      if (firstTextarea) firstTextarea.focus();
    }

    clearAllBtn.addEventListener('click', () => {
      if (notes.length > 0 && confirm('Clear all sticky notes?')) {
        notes = [];
        saveNotes();
        renderNotes();
      }
    });

    addNoteBtn.addEventListener('click', addNote);

    loadNotes();
    renderNotes();
    if (notes.length === 0) addNote();
  </script>
</body>
</html>
