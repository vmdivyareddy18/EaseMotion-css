<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Stepper - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Checkout Process</h1>
      <p>Complete your order in just a few simple steps.</p>
    </header>

    <!-- Progress Stepper -->
    <div class="stepper-wrapper">
      <div class="stepper">
        
        <!-- Step 1: Cart (Completed) -->
        <div class="step completed ease-fade-in-up ease-delay-100">
          <div class="step-circle">
            <span class="step-icon">✓</span>
          </div>
          <div class="step-label">
            <h4>Cart</h4>
            <p>Review items</p>
          </div>
        </div>

        <!-- Connecting Line 1 -->
        <div class="step-line completed ease-fade-in ease-delay-200"></div>

        <!-- Step 2: Shipping (Active) -->
        <div class="step active ease-fade-in-up ease-delay-300">
          <div class="step-circle">
            <span class="step-number">2</span>
          </div>
          <div class="step-label">
            <h4>Shipping</h4>
            <p>Enter address</p>
          </div>
        </div>

        <!-- Connecting Line 2 -->
        <div class="step-line ease-fade-in ease-delay-400"></div>

        <!-- Step 3: Payment (Upcoming) -->
        <div class="step ease-fade-in-up ease-delay-500">
          <div class="step-circle">
            <span class="step-number">3</span>
          </div>
          <div class="step-label">
            <h4>Payment</h4>
            <p>Add method</p>
          </div>
        </div>

        <!-- Connecting Line 3 -->
        <div class="step-line ease-fade-in ease-delay-600"></div>

        <!-- Step 4: Confirmation (Upcoming) -->
        <div class="step ease-fade-in-up ease-delay-700">
          <div class="step-circle">
            <span class="step-number">4</span>
          </div>
          <div class="step-label">
            <h4>Confirm</h4>
            <p>Review order</p>
          </div>
        </div>

      </div>
    </div>

    <!-- Form Content (Mock) -->
    <div class="form-content ease-fade-in-up ease-delay-800">
      <div class="form-card">
        <h2>Shipping Information</h2>
        <p>Enter your delivery address below.</p>
        
        <div class="form-row">
          <input type="text" placeholder="Full Name" class="form-input">
          <input type="text" placeholder="Street Address" class="form-input">
        </div>
        <div class="form-row">
          <input type="text" placeholder="City" class="form-input">
          <input type="text" placeholder="ZIP Code" class="form-input">
        </div>
        
        <div class="form-actions">
          <button class="btn btn-secondary ease-hover-grow">← Back</button>
          <button class="btn btn-primary ease-hover-grow">Continue →</button>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
