<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub - Slide-Right Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="marketing-viewport">
        <!-- Main Premium Marketing Campaign Card Elevation Container Hub Shell -->
        <div class="campaign-container-card">
            <header class="campaign-header">
                <div class="neon-matrix-badge">CONVERSION CORE v4</div>
                <h2 class="campaign-title">Enterprise Analytics Deck</h2>
                <p class="campaign-subtitle">Hover over the primary action selector button below to trigger the pure-CSS horizontal slide-right popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">📈</span>
                        <span class="btn-text">View Conversion Metrics</span>
                    </button>

                    <!-- Floating Popover Horizontal Slide-Right Overlay Menu Shell Box -->
                    <div class="slide-right-popover ease-slide-right-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Priority Insights</h4>
                            <ul class="marketing-actions-list">
                                <li class="menu-item"><a href="#growth" class="action-link-node">Map Traffic Growth</a></li>
                                <li class="menu-item"><a href="#funnel" class="action-link-node">Analyze Funnel Sync</a></li>
                                <li class="menu-item"><a href="#clear" class="action-link-node action-danger">Reset Telemetry</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="campaign-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Custom CSS Parameters Verified Pass</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
