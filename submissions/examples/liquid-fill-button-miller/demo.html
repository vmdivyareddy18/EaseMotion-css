<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Liquid Fill Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Liquid Fill Button Hover Effect</h1>
    <p class="demo-desc">A liquid-like wave rises from the bottom and fills the button background on hover.</p>

    <div class="button-row">
      <button class="ease-liquid-btn">Explore</button>
      <button class="ease-liquid-btn ease-liquid-btn--alt">Get Started</button>
      <button class="ease-liquid-btn ease-liquid-btn--outline">Learn More</button>
    </div>

    <p class="hint">Hover over each button to see the liquid fill animation.</p>
  </div>
</body>
</html>
