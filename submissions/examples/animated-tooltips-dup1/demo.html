<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tooltips - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Animated Tooltips</h1>
      <p>Hover over the elements to see smooth tooltip animations.</p>
    </header>

    <!-- Tooltip Examples -->
    <div class="examples-grid">
      
      <!-- Example 1: Top Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-100">
        <h3>Top Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger" data-tooltip="This tooltip appears on top" data-position="top">
            Hover me (Top)
          </button>
        </div>
      </div>

      <!-- Example 2: Bottom Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-200">
        <h3>Bottom Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger" data-tooltip="This tooltip appears on bottom" data-position="bottom">
            Hover me (Bottom)
          </button>
        </div>
      </div>

      <!-- Example 3: Left Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-300">
        <h3>Left Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger" data-tooltip="This tooltip appears on left" data-position="left">
            Hover me (Left)
          </button>
        </div>
      </div>

      <!-- Example 4: Right Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-400">
        <h3>Right Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger" data-tooltip="This tooltip appears on right" data-position="right">
            Hover me (Right)
          </button>
        </div>
      </div>

      <!-- Example 5: Success Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-500">
        <h3>Success Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger success" data-tooltip="Operation completed successfully!" data-position="top">
            ✓ Success
          </button>
        </div>
      </div>

      <!-- Example 6: Warning Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-600">
        <h3>Warning Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger warning" data-tooltip="Warning: This action cannot be undone" data-position="top">
            ⚠ Warning
          </button>
        </div>
      </div>

      <!-- Example 7: Error Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-700">
        <h3>Error Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger error" data-tooltip="Error: Please check your input" data-position="top">
            ✕ Error
          </button>
        </div>
      </div>

      <!-- Example 8: Icon Tooltip -->
      <div class="example-card ease-fade-in-up ease-delay-800">
        <h3>Icon Tooltip</h3>
        <div class="demo-area">
          <button class="tooltip-trigger icon-btn" data-tooltip="More information" data-position="top">
            <span>ℹ️</span>
          </button>
        </div>
      </div>

    </div>

    <!-- Real-world Example -->
    <div class="real-world-example ease-fade-in-up ease-delay-900">
      <h3>Real-World Example: Form Validation</h3>
      <div class="form-demo">
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="email" placeholder="Enter your email" value="invalid-email">
            <span class="tooltip-trigger error-icon" data-tooltip="Please enter a valid email address" data-position="right">⚠️</span>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" placeholder="Enter password" value="123">
            <span class="tooltip-trigger error-icon" data-tooltip="Password must be at least 8 characters" data-position="right">⚠️</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- JavaScript for Tooltip Functionality -->
  <script>
    // Create tooltips dynamically
    document.querySelectorAll('.tooltip-trigger').forEach(trigger => {
      const tooltip = document.createElement('div');
      tooltip.className = 'tooltip';
      tooltip.textContent = trigger.dataset.tooltip;
      
      // Add position class
      const position = trigger.dataset.position || 'top';
      tooltip.classList.add(`tooltip-${position}`);
      
      // Add EaseMotion animation class based on position
      const animationMap = {
        'top': 'ease-fade-in-up',
        'bottom': 'ease-fade-in-down',
        'left': 'ease-fade-in-right',
        'right': 'ease-fade-in-left'
      };
      tooltip.classList.add(animationMap[position]);
      
      document.body.appendChild(tooltip);
      
      // Position tooltip
      function positionTooltip() {
        const triggerRect = trigger.getBoundingClientRect();
        const tooltipRect = tooltip.getBoundingClientRect();
        
        let top, left;
        
        switch(position) {
          case 'top':
            top = triggerRect.top - tooltipRect.height - 10;
            left = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
            break;
          case 'bottom':
            top = triggerRect.bottom + 10;
            left = triggerRect.left + (triggerRect.width / 2) - (tooltipRect.width / 2);
            break;
          case 'left':
            top = triggerRect.top + (triggerRect.height / 2) - (tooltipRect.height / 2);
            left = triggerRect.left - tooltipRect.width - 10;
            break;
          case 'right':
            top = triggerRect.top + (triggerRect.height / 2) - (tooltipRect.height / 2);
            left = triggerRect.right + 10;
            break;
        }
        
        tooltip.style.top = `${top}px`;
        tooltip.style.left = `${left}px`;
      }
      
      // Show/hide tooltip
      trigger.addEventListener('mouseenter', () => {
        positionTooltip();
        tooltip.classList.add('active');
      });
      
      trigger.addEventListener('mouseleave', () => {
        tooltip.classList.remove('active');
      });
    });
  </script>
</body>
</html>
