<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Card Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'card-bg') root.style.setProperty('--card-bg', t.value);
      if (t.name === 'card-border') root.style.setProperty('--card-border', t.value);
      if (t.name === 'pop-scale') root.style.setProperty('--pop-scale', t.value);
      if (t.name === 'stagger-delay') root.style.setProperty('--stagger-delay', t.value + 's');
    });
  </script>
  <div class="container">
    <p class="title">Grid Card Layout</p>
    <div class="grid">
      <div class="card">1</div><div class="card">2</div><div class="card">3</div>
      <div class="card">4</div><div class="card">5</div><div class="card">6</div>
      <div class="card">7</div><div class="card">8</div><div class="card">9</div>
    </div>
    <div class="controls">
      <label>Card BG: <input type="color" name="card-bg" value="#2d2d44"></label>
      <label>Border: <input type="color" name="card-border" value="#4a4a6a"></label>
      <label>Pop Scale: <input type="range" name="pop-scale" min="1" max="1.3" step="0.01" value="1.08"></label>
      <label>Stagger: <input type="range" name="stagger-delay" min="0.02" max="0.3" step="0.01" value="0.08"></label>
    </div>
  </div>
</body>
</html>
