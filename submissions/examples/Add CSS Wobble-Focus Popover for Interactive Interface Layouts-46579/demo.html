<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Wobble-Focus Popover - Interactive Interface</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Wobble-Focus interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="interactive-layout">
        
        <!-- Top Navigation Bar -->
        <header class="app-header">
            <div class="app-logo">
                <div class="logo-shape"></div>
                <h2>PlayUI</h2>
            </div>
            
            <div class="header-center">
                <!-- THE WOBBLE-FOCUS POPOVER COMPONENT -->
                <div class="ease-popover-container">
                    <div class="search-wrapper">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <!-- Focus trigger -->
                        <input type="text" class="ease-popover-trigger" placeholder="Search anything... (Click to focus)" aria-haspopup="true">
                        <div class="search-kbd">⌘K</div>
                    </div>
                    
                    <!-- Popover Panel -->
                    <div class="ease-popover-panel ease-wobble-focus" role="listbox">
                        <div class="ease-popover-header">
                            <h3>Quick Actions</h3>
                        </div>
                        <div class="ease-popover-body">
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon bg-pink">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                </div>
                                <div class="item-text">
                                    <strong>Create New Project</strong>
                                    <span>Start a blank canvas</span>
                                </div>
                            </a>
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon bg-blue">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                </div>
                                <div class="item-text">
                                    <strong>Recent Activity</strong>
                                    <span>View your latest edits</span>
                                </div>
                            </a>
                            <a href="#" class="ease-popover-item" role="option">
                                <div class="item-icon bg-yellow">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                                </div>
                                <div class="item-text">
                                    <strong>Starred Items</strong>
                                    <span>Access your favorites</span>
                                </div>
                            </a>
                        </div>
                        <div class="ease-popover-footer">
                            <button class="btn-action">Advanced Search &rarr;</button>
                        </div>
                    </div>
                </div>
                <!-- END POPOVER COMPONENT -->
            </div>
            
            <div class="app-controls">
                <button class="btn-icon" aria-label="Notifications">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                </button>
                <div class="user-avatar"></div>
            </div>
        </header>

        <!-- Main Content Grid -->
        <section class="app-workspace">
            <div class="workspace-header">
                <h1>Interactive Dashboard 🚀</h1>
                <p>Click the search bar above to see the Wobble-Focus popover in action!</p>
            </div>
            
            <div class="bento-grid">
                <div class="bento-card col-span-2 bg-gradient">
                    <div class="card-content">
                        <h3>Weekly Activity</h3>
                        <div class="activity-bars">
                            <div class="bar" style="height: 40%"></div>
                            <div class="bar" style="height: 80%"></div>
                            <div class="bar" style="height: 60%"></div>
                            <div class="bar" style="height: 100%"></div>
                            <div class="bar" style="height: 30%"></div>
                            <div class="bar" style="height: 70%"></div>
                        </div>
                    </div>
                </div>
                <div class="bento-card">
                    <div class="card-content centered">
                        <div class="stat-circle">
                            <span>84%</span>
                        </div>
                        <h3>Productivity</h3>
                    </div>
                </div>
            </div>
        </section>
        
    </main>
</body>
</html>
