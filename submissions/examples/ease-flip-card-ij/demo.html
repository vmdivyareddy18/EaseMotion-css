<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-flip-card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>3D Flip Cards</h1>
    <div class="card-grid">
      <div class="flip-card">
        <div class="flip-inner">
          <div class="flip-front" style="background: linear-gradient(135deg, #e94560, #533483);">
            <span class="card-icon">&#9733;</span>
            <span class="card-label">Premium</span>
          </div>
          <div class="flip-back" style="background: linear-gradient(135deg, #533483, #e94560);">
            <span class="card-price">$49/mo</span>
            <span class="card-desc">Full access</span>
          </div>
        </div>
      </div>
      <div class="flip-card delay-1">
        <div class="flip-inner">
          <div class="flip-front" style="background: linear-gradient(135deg, #2ecc71, #3498db);">
            <span class="card-icon">&#9881;</span>
            <span class="card-label">Settings</span>
          </div>
          <div class="flip-back" style="background: linear-gradient(135deg, #3498db, #2ecc71);">
            <span class="card-price">Advanced</span>
            <span class="card-desc">Config panel</span>
          </div>
        </div>
      </div>
      <div class="flip-card delay-2">
        <div class="flip-inner">
          <div class="flip-front" style="background: linear-gradient(135deg, #f39c12, #e74c3c);">
            <span class="card-icon">&#128274;</span>
            <span class="card-label">Security</span>
          </div>
          <div class="flip-back" style="background: linear-gradient(135deg, #e74c3c, #f39c12);">
            <span class="card-price">2FA</span>
            <span class="card-desc">Protected</span>
          </div>
        </div>
      </div>
    </div>
    <p class="hint">Hover or focus a card to flip</p>
  </div>
</body>
</html>
