<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laptop Mockup Slider - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lms-wrapper">
    <h1>Laptop Mockup Slider</h1>
    <p class="lms-desc">Device mockup with slide transitions between screens</p>
    <div class="lms-device" style="--lms-slide: 0">
      <div class="lms-notch"></div>
      <div class="lms-frame">
        <div class="lms-bar">
          <span class="lms-dot lms-dot--red"></span>
          <span class="lms-dot lms-dot--yellow"></span>
          <span class="lms-dot lms-dot--green"></span>
          <span class="lms-url">easingmotion.css</span>
        </div>
        <div class="lms-screen">
          <div class="lms-track">
            <div class="lms-slide" style="background: linear-gradient(135deg, #0f3460, #533483);">
              <div class="lms-slide-content">
                <h2>Smooth Transitions</h2>
                <p>CSS transitions made effortless</p>
              </div>
            </div>
            <div class="lms-slide" style="background: linear-gradient(135deg, #1a8a5c, #2a9d8f);">
              <div class="lms-slide-content">
                <h2>Custom Properties</h2>
                <p>Configurable timing &amp; easing</p>
              </div>
            </div>
            <div class="lms-slide" style="background: linear-gradient(135deg, #e94560, #533483);">
              <div class="lms-slide-content">
                <h2>Interactive Demos</h2>
                <p>Click through the slides</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="lms-nav">
      <button class="lms-btn lms-btn--prev" aria-label="Previous slide">&#8249;</button>
      <div class="lms-dots">
        <span class="lms-dot" data-index="0"></span>
        <span class="lms-dot" data-index="1"></span>
        <span class="lms-dot" data-index="2"></span>
      </div>
      <button class="lms-btn lms-btn--next" aria-label="Next slide">&#8250;</button>
    </div>
  </div>
  <script>
    (function() {
      var device = document.querySelector('.lms-device');
      var dots = document.querySelectorAll('.lms-dot');
      var prevBtn = document.querySelector('.lms-btn--prev');
      var nextBtn = document.querySelector('.lms-btn--next');
      var total = 3;

      function getIndex() { return parseInt(device.style.getPropertyValue('--lms-slide')) || 0; }

      function setIndex(i) {
        i = Math.max(0, Math.min(i, total - 1));
        device.style.setProperty('--lms-slide', i);
        dots.forEach(function(d) { d.classList.toggle('active', parseInt(d.dataset.index) === i); });
      }

      dots.forEach(function(dot) {
        dot.addEventListener('click', function() { setIndex(parseInt(this.dataset.index)); });
      });
      prevBtn.addEventListener('click', function() { setIndex(getIndex() - 1); });
      nextBtn.addEventListener('click', function() { setIndex(getIndex() + 1); });
      setIndex(0);
    })();
  </script>
</body>
</html>
