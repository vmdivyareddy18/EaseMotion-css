<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Image Gallery Masonry - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-wrapper">
        <h2>Staggered Masonry Gallery</h2>
        <p>Watch items load with a staggered entry delay. Hover over individual items to experience the smooth interactive scaling zoom.</p>

        <div class="masonry-gallery">
            
            <div class="masonry-item" style="--stagger-index: 1;">
                <div class="gallery-card tall bg-gradient-1">
                    <span class="card-label">Abstract Fluid</span>
                </div>
            </div>

            <div class="masonry-item" style="--stagger-index: 2;">
                <div class="gallery-card short bg-gradient-2">
                    <span class="card-label">Cyberpunk City</span>
                </div>
            </div>

            <div class="masonry-item" style="--stagger-index: 3;">
                <div class="gallery-card medium bg-gradient-3">
                    <span class="card-label">Neon Nights</span>
                </div>
            </div>

            <div class="masonry-item" style="--stagger-index: 4;">
                <div class="gallery-card tall bg-gradient-4">
                    <span class="card-label">Minimalist Dunes</span>
                </div>
            </div>

            <div class="masonry-item" style="--stagger-index: 5;">
                <div class="gallery-card short bg-gradient-5">
                    <span class="card-label">Ocean Foam</span>
                </div>
            </div>

            <div class="masonry-item" style="--stagger-index: 6;">
                <div class="gallery-card medium bg-gradient-1">
                    <span class="card-label">Forest Mist</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
