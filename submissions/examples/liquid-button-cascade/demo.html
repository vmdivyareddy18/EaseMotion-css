<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid/Gooey Button Effect - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .info-text {
      color: #667eea;
      font-size: 0.875rem;
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Liquid/Gooey Button Effect</h1>
    <p class="subtitle">Buttons with organic morphing shapes that flow like liquid</p>
    
    <div class="button-grid">
      <div class="button-grid-item">
        <button class="liquid-button">
          <span>Get Started</span>
        </button>
        <span class="button-label">Default (Hover to Morph)</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-cyan">
          <span>Learn More</span>
        </button>
        <span class="button-label">Cyan Variant</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-green">
          <span>Download</span>
        </button>
        <span class="button-label">Green Variant</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-pink">
          <span>Sign Up</span>
        </button>
        <span class="button-label">Pink Variant</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-sm">
          <span>Small</span>
        </button>
        <span class="button-label">Small Size</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-lg">
          <span>Large Button</span>
        </button>
        <span class="button-label">Large Size</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-animated">
          <span>Animated</span>
        </button>
        <span class="button-label">Continuous Animation</span>
      </div>

      <div class="button-grid-item">
        <button class="liquid-button liquid-animated liquid-cyan">
          <span>Animated Cyan</span>
        </button>
        <span class="button-label">Animated + Color</span>
      </div>
    </div>

    <p class="info-text">Hover over buttons to see the morphing effect, or watch the animated variant</p>
  </div>
</body>
</html>
