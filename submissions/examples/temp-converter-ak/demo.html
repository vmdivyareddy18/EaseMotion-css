<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Converter - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tc-wrapper">

    <h1>Temperature Converter</h1>

    <div class="inputs-row">
      <div class="temp-input-group">
        <input type="number" id="celsius" class="temp-input" value="25" step="any">
        <span class="temp-label">&deg;C</span>
      </div>
      <div class="temp-input-group">
        <input type="number" id="fahrenheit" class="temp-input" value="77" step="any">
        <span class="temp-label">&deg;F</span>
      </div>
      <div class="temp-input-group">
        <input type="number" id="kelvin" class="temp-input" value="298.15" step="any">
        <span class="temp-label">K</span>
      </div>
    </div>

    <div class="thermometer">
      <div class="thermo-track">
        <div class="thermo-fill" id="thermoFill"></div>
      </div>
      <div class="thermo-scale">
        <span>-50&deg;C</span>
        <span>0&deg;C</span>
        <span>50&deg;C</span>
        <span>100&deg;C</span>
      </div>
    </div>

  </div>

  <script>
    const cEl = document.getElementById('celsius');
    const fEl = document.getElementById('fahrenheit');
    const kEl = document.getElementById('kelvin');
    const fill = document.getElementById('thermoFill');

    function updateFromC(c) {
      const f = c * 9 / 5 + 32;
      const k = c + 273.15;
      fEl.value = isFinite(f) ? parseFloat(f.toFixed(2)) : '';
      kEl.value = isFinite(k) ? parseFloat(k.toFixed(2)) : '';

      const pct = Math.max(0, Math.min(100, ((c + 50) / 150) * 100));
      fill.style.height = pct + '%';

      if (c <= 0) fill.style.background = 'linear-gradient(to top, #3b82f6, #60a5fa)';
      else if (c <= 30) fill.style.background = 'linear-gradient(to top, #22c55e, #4ade80)';
      else if (c <= 60) fill.style.background = 'linear-gradient(to top, #f59e0b, #fbbf24)';
      else fill.style.background = 'linear-gradient(to top, #ef4444, #f87171)';
    }

    cEl.addEventListener('input', () => {
      const v = parseFloat(cEl.value);
      if (!isNaN(v)) updateFromC(v);
    });

    fEl.addEventListener('input', () => {
      const v = parseFloat(fEl.value);
      if (!isNaN(v)) {
        const c = (v - 32) * 5 / 9;
        cEl.value = parseFloat(c.toFixed(2));
        updateFromC(c);
      }
    });

    kEl.addEventListener('input', () => {
      const v = parseFloat(kEl.value);
      if (!isNaN(v)) {
        const c = v - 273.15;
        cEl.value = parseFloat(c.toFixed(2));
        updateFromC(c);
      }
    });

    updateFromC(25);
  </script>

</body>
</html>
