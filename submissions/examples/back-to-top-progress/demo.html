<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Back to Top with Progress Ring</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div style="max-width: 600px; margin: 0 auto; padding: 2rem; color: #475569; line-height: 1.8;">
    <h1 style="color: #1e293b;">Long Page Demo</h1>
    <p>Scroll down to see the back-to-top button with a progress ring.</p>
    <div style="height: 200vh; background: linear-gradient(#f8fafc, #e2e8f0); border-radius: 12px; margin-top: 1rem;"></div>
    <p style="margin-top: 1rem;">You've reached the bottom!</p>
  </div>
  <button class="btt-btn" id="bttBtn" aria-label="Back to top">
    <svg viewBox="0 0 36 36" width="56" height="56" class="btt-svg">
      <circle class="btt-track" cx="18" cy="18" r="16" />
      <circle class="btt-fill" id="bttFill" cx="18" cy="18" r="16" stroke-dasharray="100.53" stroke-dashoffset="100.53" />
    </svg>
    <span class="btt-icon">↑</span>
  </button>
  <script src="script.js"></script>
</body>
</html>
