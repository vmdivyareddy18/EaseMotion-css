  <title>Tuning Fork</title>

<body>

      <span class="tineT tnR"></span>

    <span class="blockT"></span>
    <span class="nodeT ndL"></span>
    <span class="nodeT ndR"></span>
    <span class="capT">antinode at the tips, node at the yoke</span>
  </div>
