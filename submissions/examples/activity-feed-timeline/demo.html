<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Feed / Notification Timeline</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="feed">
      <h3 class="feed-title">Activity</h3>
      <div class="feed-item">
        <div class="feed-dot"></div>
        <div class="feed-body">
          <p class="feed-text"><strong>Alex</strong> commented on your pull request.</p>
          <span class="feed-time">2 minutes ago</span>
        </div>
      </div>
      <div class="feed-item">
        <div class="feed-dot"></div>
        <div class="feed-body">
          <p class="feed-text"><strong>Sam</strong> merged your branch <code>feat/nav</code>.</p>
          <span class="feed-time">1 hour ago</span>
        </div>
      </div>
      <div class="feed-item">
        <div class="feed-dot"></div>
        <div class="feed-body">
          <p class="feed-text"><strong>Jordan</strong> assigned you to <strong>Issue #128</strong>.</p>
          <span class="feed-time">3 hours ago</span>
        </div>
      </div>
      <div class="feed-item">
        <div class="feed-dot"></div>
        <div class="feed-body">
          <p class="feed-text">Your deployment to <strong>Production</strong> succeeded.</p>
          <span class="feed-time">Yesterday</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
