<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Hover Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cards-wrapper">
        <div class="magnetic-card-container">
            <!-- Invisible hover detection grid -->
            <div class="hover-grid">
                <div class="cell top-left"></div>
                <div class="cell top-center"></div>
                <div class="cell top-right"></div>
                <div class="cell mid-left"></div>
                <div class="cell mid-center"></div>
                <div class="cell mid-right"></div>
                <div class="cell bot-left"></div>
                <div class="cell bot-center"></div>
                <div class="cell bot-right"></div>
            </div>
            
            <div class="card-content">
                <div class="glow"></div>
                <h2>Pro Plan</h2>
                <p>$29 / month</p>
                <ul>
                    <li>Unlimited Access</li>
                    <li>24/7 Support</li>
                    <li>Premium Analytics</li>
                </ul>
                <button>Get Started</button>
            </div>
        </div>
    </div>
</body>
</html>
