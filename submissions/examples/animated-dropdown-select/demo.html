<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dropdown Select - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Dropdown Select Component</h1>
      <p>Click the dropdown to see smooth animations in action.</p>
    </header>

    <!-- Demo Form -->
    <div class="form-demo ease-fade-in-up ease-delay-100">
      
      <!-- Single Select Dropdown -->
      <div class="form-group">
        <label class="form-label">Select Country</label>
        <div class="dropdown-wrapper">
          <button class="dropdown-trigger ease-hover-grow" aria-expanded="false" aria-haspopup="listbox">
            <span class="selected-value">Choose a country...</span>
            <span class="dropdown-arrow">▼</span>
          </button>
          
          <div class="dropdown-menu ease-fade-in-down">
            <!-- Search Input -->
            <div class="dropdown-search">
              <span class="search-icon">🔍</span>
              <input type="text" placeholder="Search countries..." class="search-input">
            </div>

            <!-- Options List -->
            <ul class="dropdown-options" role="listbox">
              <li class="dropdown-option ease-fade-in-up ease-delay-100" role="option" data-value="us">
                <span class="option-flag">🇺🇸</span>
                <span class="option-text">United States</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-200" role="option" data-value="uk">
                <span class="option-flag">🇬🇧</span>
                <span class="option-text">United Kingdom</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-300" role="option" data-value="ca">
                <span class="option-flag">🇨🇦</span>
                <span class="option-text">Canada</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-400" role="option" data-value="au">
                <span class="option-flag">🇦🇺</span>
                <span class="option-text">Australia</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-500" role="option" data-value="de">
                <span class="option-flag">🇩🇪</span>
                <span class="option-text">Germany</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-600" role="option" data-value="fr">
                <span class="option-flag">🇫🇷</span>
                <span class="option-text">France</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-700" role="option" data-value="jp">
                <span class="option-flag">🇯🇵</span>
                <span class="option-text">Japan</span>
                <span class="option-check">✓</span>
              </li>
            </ul>
          </div>
        </div>
      </div>

      <!-- Multi-Select Dropdown -->
      <div class="form-group">
        <label class="form-label">Select Skills (Multiple)</label>
        <div class="dropdown-wrapper multi-select">
          <button class="dropdown-trigger ease-hover-grow" aria-expanded="false" aria-haspopup="listbox">
            <div class="selected-tags">
              <span class="tag ease-bounce-in">JavaScript</span>
              <span class="tag ease-bounce-in ease-delay-100">React</span>
            </div>
            <span class="dropdown-arrow">▼</span>
          </button>
          
          <div class="dropdown-menu ease-fade-in-down">
            <ul class="dropdown-options" role="listbox" aria-multiselectable="true">
              <li class="dropdown-option selected ease-fade-in-up ease-delay-100" role="option" aria-selected="true">
                <span class="option-text">JavaScript</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option selected ease-fade-in-up ease-delay-200" role="option" aria-selected="true">
                <span class="option-text">React</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-300" role="option">
                <span class="option-text">Vue.js</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-400" role="option">
                <span class="option-text">Angular</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-500" role="option">
                <span class="option-text">Node.js</span>
                <span class="option-check">✓</span>
              </li>
              <li class="dropdown-option ease-fade-in-up ease-delay-600" role="option">
                <span class="option-text">Python</span>
                <span class="option-check">✓</span>
              </li>
            </ul>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- JavaScript for Dropdown Functionality -->
  <script>
    // Toggle dropdown
    document.querySelectorAll('.dropdown-trigger').forEach(trigger => {
      trigger.addEventListener('click', function() {
        const wrapper = this.closest('.dropdown-wrapper');
        const menu = wrapper.querySelector('.dropdown-menu');
        const isOpen = menu.classList.contains('open');
        
        // Close all other dropdowns
        document.querySelectorAll('.dropdown-menu').forEach(m => {
          m.classList.remove('open');
          m.closest('.dropdown-wrapper').querySelector('.dropdown-trigger').setAttribute('aria-expanded', 'false');
        });
        
        // Toggle current
        if (!isOpen) {
          menu.classList.add('open');
          this.setAttribute('aria-expanded', 'true');
        }
      });
    });

    // Select option
    document.querySelectorAll('.dropdown-option').forEach(option => {
      option.addEventListener('click', function() {
        const wrapper = this.closest('.dropdown-wrapper');
        const isMulti = wrapper.classList.contains('multi-select');
        
        if (!isMulti) {
          // Single select
          wrapper.querySelectorAll('.dropdown-option').forEach(opt => opt.classList.remove('selected'));
          this.classList.add('selected');
          
          const trigger = wrapper.querySelector('.dropdown-trigger');
          const selectedText = this.querySelector('.option-text').textContent;
          trigger.querySelector('.selected-value').textContent = selectedText;
          
          wrapper.querySelector('.dropdown-menu').classList.remove('open');
          trigger.setAttribute('aria-expanded', 'false');
        } else {
          // Multi-select
          this.classList.toggle('selected');
          this.setAttribute('aria-selected', this.classList.contains('selected'));
        }
      });
    });

    // Close on outside click
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.dropdown-wrapper')) {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
          menu.classList.remove('open');
          menu.closest('.dropdown-wrapper').querySelector('.dropdown-trigger').setAttribute('aria-expanded', 'false');
        });
      }
    });
  </script>
</body>
</html>
