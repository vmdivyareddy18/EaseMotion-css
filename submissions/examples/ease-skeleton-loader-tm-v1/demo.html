<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Loader</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Skeleton Loader</h1>
  <p>Loading states for common UI patterns.</p>
  <div class="skeleton-card">
    <div class="skeleton-avatar"></div>
    <div class="skeleton-text">
      <div class="skeleton-line" style="width:60%;height:14px;"></div>
      <div class="skeleton-line" style="width:90%;height:12px;"></div>
      <div class="skeleton-line" style="width:75%;height:12px;"></div>
    </div>
  </div>
  <div class="skeleton-card">
    <div class="skeleton-image"></div>
    <div class="skeleton-text">
      <div class="skeleton-line" style="width:80%;height:16px;margin-bottom:8px;"></div>
      <div class="skeleton-line" style="width:100%;height:12px;"></div>
    </div>
  </div>
  <div class="skeleton-form">
    <div class="skeleton-input"></div>
    <div class="skeleton-input"></div>
    <div class="skeleton-btn"></div>
  </div>
</div>
</body></html>
