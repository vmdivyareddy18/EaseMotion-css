<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notifications | EaseMotion CSS</title>
  
  <!-- Main Framework -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Component specific style -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: var(--ease-color-bg, #f8fafc);
      color: var(--ease-color-text, #1e293b);
      padding: 4rem 2rem;
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      max-width: 800px;
      margin: 0 auto;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .demo-header h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
    }
  </style>
</head>
<body>

  <header class="demo-header">
    <h1>Toast Notifications</h1>
    <p>Animated, auto-dismissing snackbars for feedback.</p>
  </header>

  <div class="demo-grid">
    <button class="ease-btn ease-btn-success" onclick="easeToast.success('Your changes have been saved.', 'Profile Updated')">
      Success Toast
    </button>

    <button class="ease-btn ease-btn-danger" onclick="easeToast.error('A network error occurred while saving.', 'Connection Failed')">
      Error Toast
    </button>

    <button class="ease-btn ease-btn-warning" onclick="easeToast.warning('Your session will expire in 5 minutes.', 'Session Warning')">
      Warning Toast
    </button>

    <button class="ease-btn ease-btn-primary" onclick="easeToast.info('A new software update is available.', 'Update Available')">
      Info Toast
    </button>

    <button class="ease-btn ease-btn-outline" onclick="easeToast.show({ title: 'Sticky Message', message: 'I will not close automatically.', type: 'primary', duration: 0 })">
      Sticky Toast (No timeout)
    </button>
  </div>

  <!-- Toast Utility JS -->
  <script src="ease-toast.js"></script>

</body>
</html>
