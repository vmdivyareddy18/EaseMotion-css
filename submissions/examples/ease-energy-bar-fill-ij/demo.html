<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Energy Bar Fill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ebf-demo">
    <h1>Energy Bar</h1>
    <p class="ebf-subtitle">Animated gauge with configurable fill level</p>

    <div class="ebf-grid">
      <div class="ebf-card">
        <div class="ebf-head">
          <h2>Player Health</h2>
          <span class="ebf-tag">HP</span>
        </div>
        <div class="ebf-bar" id="barHealth">
          <div class="ebf-fill" style="--fill-level: 0.85;"></div>
          <span class="ebf-label">85%</span>
        </div>
        <div class="ebf-ctrl">
          <input type="range" min="0" max="100" value="85" oninput="setEnergy('barHealth', +this.value)">
        </div>
      </div>

      <div class="ebf-card">
        <div class="ebf-head">
          <h2>Mana</h2>
          <span class="ebf-tag ebf-tag--mana">MP</span>
        </div>
        <div class="ebf-bar ebf-bar--mana" id="barMana">
          <div class="ebf-fill" style="--fill-level: 0.45;"></div>
          <span class="ebf-label">45%</span>
        </div>
        <div class="ebf-ctrl">
          <input type="range" min="0" max="100" value="45" oninput="setEnergy('barMana', +this.value)">
        </div>
      </div>

      <div class="ebf-card">
        <div class="ebf-head">
          <h2>Stamina</h2>
          <span class="ebf-tag ebf-tag--stamina">SP</span>
        </div>
        <div class="ebf-bar ebf-bar--stamina" id="barStamina">
          <div class="ebf-fill" style="--fill-level: 0.6;"></div>
          <span class="ebf-label">60%</span>
        </div>
        <div class="ebf-ctrl">
          <input type="range" min="0" max="100" value="60" oninput="setEnergy('barStamina', +this.value)">
        </div>
      </div>

      <div class="ebf-card">
        <div class="ebf-head">
          <h2>Shield</h2>
          <span class="ebf-tag ebf-tag--shield">SHD</span>
        </div>
        <div class="ebf-bar ebf-bar--shield" id="barShield">
          <div class="ebf-fill" style="--fill-level: 1;"></div>
          <span class="ebf-label">100%</span>
        </div>
        <div class="ebf-ctrl">
          <input type="range" min="0" max="100" value="100" oninput="setEnergy('barShield', +this.value)">
        </div>
      </div>
    </div>

    <div class="ebf-actions">
      <button class="ebf-btn" onclick="randomEnergy()">Randomize</button>
      <button class="ebf-btn ebf-btn--outline" onclick="depleteAll()">Deplete All</button>
    </div>
  </main>

  <script>
    function setEnergy(id, value) {
      const bar = document.getElementById(id);
      const fill = bar.querySelector('.ebf-fill');
      const label = bar.querySelector('.ebf-label');
      const pct = value / 100;
      fill.style.setProperty('--fill-level', pct);
      label.textContent = Math.round(value) + '%';
    }

    function animateEnergy(id, target) {
      const bar = document.getElementById(id);
      const fill = bar.querySelector('.ebf-fill');
      const label = bar.querySelector('.ebf-label');
      const root = document.documentElement;
      const dur = parseFloat(getComputedStyle(root).getPropertyValue('--fill-duration')) * 1000 || 1200;
      const start = performance.now();
      const from = parseFloat(label.textContent) || 0;

      function step(now) {
        const t = Math.min((now - start) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        const current = from + (target - from) * ease;
        fill.style.setProperty('--fill-level', current / 100);
        label.textContent = Math.round(current) + '%';
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function randomEnergy() {
      ['barHealth', 'barMana', 'barStamina', 'barShield'].forEach(id => {
        animateEnergy(id, Math.round(Math.random() * 100));
      });
      document.querySelectorAll('.ebf-ctrl input').forEach(inp => {
        inp.value = Math.round(Math.random() * 100);
      });
    }

    function depleteAll() {
      ['barHealth', 'barMana', 'barStamina', 'barShield'].forEach(id => animateEnergy(id, 0));
      document.querySelectorAll('.ebf-ctrl input').forEach(inp => inp.value = 0);
    }

    document.querySelectorAll('.ebf-ctrl input').forEach(inp => {
      inp.addEventListener('input', () => setEnergy(inp.closest('.ebf-card').querySelector('.ebf-bar').id, +inp.value));
    });
  </script>
</body>
</html>
