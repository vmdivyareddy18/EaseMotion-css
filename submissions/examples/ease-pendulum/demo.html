<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-pendulum | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      gap: 3rem;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 1.1rem;
      letter-spacing: 0.12em;
      opacity: 0.4;
      text-transform: uppercase;
    }

    .section-label {
      color: #ffffff20;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: -1.5rem;
    }

    .demo-row {
      display: flex;
      gap: 3rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* --- Pendulum Container --- */
    .pendulum-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    /* anchor dot at top */
    .anchor {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a3a5c;
      margin-bottom: -2px;
      position: relative;
      z-index: 1;
    }

    /* string connecting anchor to bob */
    .string {
      width: 2px;
      height: 60px;
      background: linear-gradient(to bottom, #3a3a5c, #5a5a8c);
      margin: 0 auto;
    }

    /* the swinging bob */
    .bob {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      border: 2px solid;
    }

    .bob-purple {
      background: #1e1e3e;
      border-color: #7c6ef7;
      box-shadow: 0 0 20px rgba(124, 110, 247, 0.3);
    }

    .bob-pink {
      background: #2e1a2e;
      border-color: #ec4899;
      box-shadow: 0 0 20px rgba(236, 72, 153, 0.3);
    }

    .bob-green {
      background: #0f2e1a;
      border-color: #22c55e;
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.3);
    }

    .bob-gold {
      background: #2e1a0f;
      border-color: #d97706;
      box-shadow: 0 0 20px rgba(217, 119, 6, 0.3);
    }

    .pendulum-label {
      color: #a0a0c0;
      font-size: 0.72rem;
      margin-top: 0.5rem;
    }

    /* --- Clock Demo --- */
    .clock-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .clock-face {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.05em;
      font-family: 'Courier New', monospace;
    }

    .clock-label {
      color: #a0a0c0;
      font-size: 0.8rem;
    }

    /* --- Loader Demo --- */
    .loader-card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .loader-dots {
      display: flex;
      gap: 0.8rem;
      align-items: flex-start;
    }

    .loader-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #7c6ef7;
    }

    .loader-text {
      color: #a0a0c0;
      font-size: 0.8rem;
    }

    .hint {
      color: #ffffff15;
      font-size: 0.75rem;
    }
  </style>
</head>
<body>

  <h1>ease-pendulum — Hypnotic swing loop</h1>

  <span class="section-label">Pendulum Bobs</span>
  <div class="demo-row">

    <!-- Normal -->
    <div class="pendulum-wrapper">
      <div class="anchor"></div>
      <div class="pendulum pendulum-purple" style="display:flex; flex-direction:column; align-items:center;">
        <div class="string"></div>
        <div class="bob bob-purple">⏰</div>
      </div>
      <span class="pendulum-label">Normal</span>
    </div>

    <!-- Slow & Wide -->
    <div class="pendulum-wrapper">
      <div class="anchor"></div>
      <div class="pendulum pendulum-slow pendulum-wide pendulum-pink" style="display:flex; flex-direction:column; align-items:center;">
        <div class="string"></div>
        <div class="bob bob-pink">🔔</div>
      </div>
      <span class="pendulum-label">Slow & Wide</span>
    </div>

    <!-- Fast & Narrow -->
    <div class="pendulum-wrapper">
      <div class="anchor"></div>
      <div class="pendulum pendulum-fast pendulum-narrow pendulum-green" style="display:flex; flex-direction:column; align-items:center;">
        <div class="string"></div>
        <div class="bob bob-green">⚡</div>
      </div>
      <span class="pendulum-label">Fast & Narrow</span>
    </div>

    <!-- Pause on Hover -->
    <div class="pendulum-wrapper">
      <div class="anchor"></div>
      <div class="pendulum pendulum-gold pendulum-pause" style="display:flex; flex-direction:column; align-items:center;">
        <div class="string"></div>
        <div class="bob bob-gold">🏆</div>
      </div>
      <span class="pendulum-label">Hover to Pause</span>
    </div>

  </div>

  <span class="section-label">Real World Use Cases</span>
  <div class="demo-row">

    <!-- Clock Card -->
    <div class="clock-card">
      <div class="pendulum pendulum-slow pendulum-purple pendulum-pause">⏱️</div>
      <div class="clock-face" id="clock">00:00:00</div>
      <span class="clock-label">Live Clock</span>
    </div>

    <!-- Loader Card -->
    <div class="loader-card">
      <div class="loader-dots">
        <div class="loader-dot pendulum pendulum-fast pendulum-purple"
             style="animation-delay: 0s;"></div>
        <div class="loader-dot pendulum pendulum-fast pendulum-pink"
             style="animation-delay: 0.15s;"></div>
        <div class="loader-dot pendulum pendulum-fast pendulum-green"
             style="animation-delay: 0.3s;"></div>
      </div>
      <span class="loader-text">Loading...</span>
    </div>

  </div>

  <p class="hint">↑ hover "Hover to Pause" and the clock pendulum to pause them</p>

  <script>
    // live clock
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>
</html>
