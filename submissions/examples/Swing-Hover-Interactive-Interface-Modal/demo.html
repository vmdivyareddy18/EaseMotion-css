<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Interface Swing Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="trigger">
    Launch Interface
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="header">
            <h2>Interactive Workspace</h2>
            <p>Manage actions without leaving your current workflow.</p>
        </div>

        <div class="cards">

            <div class="card">
                <span>⚡</span>
                <h4>Quick Action</h4>
            </div>

            <div class="card">
                <span>📁</span>
                <h4>Projects</h4>
            </div>

            <div class="card">
                <span>📈</span>
                <h4>Analytics</h4>
            </div>

        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
