<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Menu - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-floating-action-menu</h1>
    <p class="subtitle">FAB with expanding sub-actions — click to reveal</p>

    <div class="fab-wrapper">
      <div class="fab-container">
        <input type="checkbox" id="fabToggle" class="fab-checkbox">
        <label for="fabToggle" class="fab-main">
          <span class="fab-icon">+</span>
        </label>
        <div class="sub-actions">
          <button class="sub-action sa-1">✏️</button>
          <button class="sub-action sa-2">📷</button>
          <button class="sub-action sa-3">🎵</button>
          <button class="sub-action sa-4">⚙️</button>
        </div>
        <span class="fab-label">Tap to expand</span>
      </div>
    </div>
  </div>
</body>
</html>
