<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<script>
document.addEventListener("mousemove", function(e) {
  const dot = document.createElement("div");
  dot.className = "trail";
  dot.style.left = e.pageX + "px";
  dot.style.top = e.pageY + "px";
  document.body.appendChild(dot);

  setTimeout(() => {
    dot.remove();
  }, 500);
});
</script>

</body>
</html>
