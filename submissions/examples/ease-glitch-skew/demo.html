<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-glitch-skew Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }
    h2 {
      font-size: 0.85rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 0 0 20px;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .glitch-title {
      font-size: 3rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .glitch-subtitle {
      font-size: 1.5rem;
      font-weight: bold;
    }
    .btn {
      padding: 14px 32px;
      border: 2px solid #00ffff;
      background: transparent;
      color: #00ffff;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .card {
      border: 1px solid #333;
      padding: 24px 32px;
      background: #111;
      text-align: center;
    }
    .card p { color: #888; font-size: 0.9rem; margin: 8px 0 0; }
  </style>
</head>
<body>

  <!-- Always-on glitch -->
  <div class="demo-section">
    <h2>Always On — ease-glitch-skew</h2>
    <span class="glitch-title ease-glitch-skew" data-text="GLITCH">GLITCH</span>
  </div>

  <!-- Hover trigger -->
  <div class="demo-section">
    <h2>Hover Trigger — ease-glitch-skew-hover</h2>
    <span class="glitch-title ease-glitch-skew-hover" data-text="HOVER ME">HOVER ME</span>
  </div>

  <!-- Button -->
  <div class="demo-section">
    <h2>Glitch Button</h2>
    <button class="btn ease-glitch-skew-hover" data-text="EXECUTE">EXECUTE</button>
  </div>

  <!-- Card -->
  <div class="demo-section">
    <h2>Glitch Card Title</h2>
    <div class="card">
      <span class="glitch-subtitle ease-glitch-skew-hover" data-text="SYSTEM ERROR">SYSTEM ERROR</span>
      <p>Hover the title to trigger glitch effect</p>
    </div>
  </div>

</body>
</html>
