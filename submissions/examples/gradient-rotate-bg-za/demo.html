<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotating Gradient Background</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rotate-bg">
    <div class="overlay-card">
      <h1>Rotating Gradient</h1>
      <p>The gradient angle continuously rotates 360 degrees, creating a smooth animated backdrop.</p>
      <div class="speed-control">
        <button onclick="document.querySelector('.rotate-bg').style.setProperty('--speed', '3s')">Fast</button>
        <button onclick="document.querySelector('.rotate-bg').style.setProperty('--speed', '8s')">Normal</button>
        <button onclick="document.querySelector('.rotate-bg').style.setProperty('--speed', '20s')">Slow</button>
      </div>
    </div>
  </div>
</body>
</html>
