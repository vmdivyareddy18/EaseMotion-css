<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech Pulse-Active Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <a href="#modal" class="open-btn">
        Launch Dashboard
    </a>

</div>

<div id="modal" class="overlay">

    <div class="modal" tabindex="0">

        <a href="#" class="close-btn" aria-label="Close">&times;</a>

        <div class="status-indicator"></div>

        <h2>System Online</h2>

        <p>
            AI services are active and your workspace is synchronized.
        </p>

        <div class="dashboard">

            <div class="card">
                <h3>23%</h3>
                <span>CPU</span>
            </div>

            <div class="card">
                <h3>58%</h3>
                <span>Memory</span>
            </div>

            <div class="card">
                <h3>99%</h3>
                <span>Network</span>
            </div>

        </div>

        <button class="action-btn">
            Open Dashboard
        </button>

    </div>

</div>

</body>
</html>
