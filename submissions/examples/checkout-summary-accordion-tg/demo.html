<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Summary Accordion</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<div class="checkout-card">

  <h2>Checkout Summary</h2>

  <div class="summary-row">
    <span>Subtotal</span>
    <span>$89.99</span>
  </div>

  <div class="summary-row">
    <span>Shipping</span>
    <span>$7.50</span>
  </div>

  <div class="summary-row">
    <span>Tax</span>
    <span>$5.40</span>
  </div>

  <div class="summary-row total">
    <span>Total</span>
    <span>$102.89</span>
  </div>

  <button
    id="accordionButton"
    class="accordion-button"
    aria-expanded="false"
    aria-controls="accordionContent"
  >
    <span>Order Details</span>
    <span id="icon" class="icon">⌄</span>
  </button>

  <div
    id="accordionContent"
    class="accordion-content"
  >
    <div class="content-inner">
      <p>• Wireless Mouse ×1</p>
      <p>• Mechanical Keyboard ×1</p>
      <p>• USB-C Cable ×2</p>

      <hr>

      <p>Estimated Delivery: <strong>2–4 Business Days</strong></p>

      <p>Payment Method: <strong>Visa •••• 4721</strong></p>
    </div>
  </div>

</div>

<script>
const button = document.getElementById("accordionButton");
const content = document.getElementById("accordionContent");
const icon = document.getElementById("icon");

button.addEventListener("click", toggleAccordion);

button.addEventListener("keydown", function(e){
    if(e.key==="Enter" || e.key===" "){
        e.preventDefault();
        toggleAccordion();
    }
});

function toggleAccordion(){

    const expanded = button.getAttribute("aria-expanded")==="true";

    button.setAttribute("aria-expanded", !expanded);

    if(expanded){
        content.style.maxHeight="0";
        icon.classList.remove("rotate");
    }else{
        content.style.maxHeight=content.scrollHeight+"px";
        icon.classList.add("rotate");
    }
}
</script>

</body>
</html>
