<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Magnetic Pull Modal (Checkout)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    .checkout-container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      font-size: 1.5rem;
      color: #1a1a2e;
      margin-top: 0;
      margin-bottom: 2rem;
    }
    .order-summary {
      background: #f8fafc;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 2rem;
      text-align: left;
    }
    .order-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      color: #475569;
      font-size: 0.95rem;
    }
    .order-total {
      display: flex;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      font-weight: 700;
      color: #1a1a2e;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="checkout-container">
    <h1>Complete Your Order</h1>
    <div class="order-summary">
      <div class="order-row">
        <span>Premium Subscription</span>
        <span>$49.00</span>
      </div>
      <div class="order-row">
        <span>Taxes</span>
        <span>$4.90</span>
      </div>
      <div class="order-total">
        <span>Total</span>
        <span>$53.90</span>
      </div>
    </div>
    
    <!-- Trigger link (uses anchor hash to target the modal ID) -->
    <a href="#checkout-modal" class="ease-magnetic-trigger-btn" style="width: 100%; box-sizing: border-box;">Pay $53.90 Now</a>
  </div>

  <!-- Modal Overlay (Targeted via ID) -->
  <div id="checkout-modal" class="ease-magnetic-ecom-modal-overlay">
    <!-- Animated Content Box -->
    <div class="ease-magnetic-ecom-modal-content">
      <!-- Close Button -->
      <a href="#" class="ease-magnetic-ecom-modal-close" aria-label="Close modal">
        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </a>
      
      <!-- Checkmark Icon -->
      <div class="ease-ecom-icon">
        <svg style="width: 32px; height: 32px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
      </div>
      
      <h2 style="margin-top:0; font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: 12px;">Payment Successful!</h2>
      <p style="font-size: 1rem; line-height: 1.5; color: #718096; margin-bottom: 32px;">
        This modal uses a CSS-only <strong>Magnetic Pull</strong> animation. Notice how it snaps into place with a satisfying, spring-like elastic overshoot designed to reassure the user.
      </p>
      
      <a href="#" class="ease-magnetic-trigger-btn" style="width: 100%; box-sizing: border-box; background: var(--ease-ecom-accent);">View Receipt</a>
    </div>
  </div>

</body>
</html>
