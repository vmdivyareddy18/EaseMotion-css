<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catapult Lightbox - Finance Dashboard Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mock-terminal-container">
        <!-- Persistent Interactive Layer Stack -->
        <div class="lightbox-overlay-wrapper">
            <div class="lightbox-darkener"></div>
            
            <div class="catapult-lightbox-frame" role="dialog" aria-modal="true">
                <div class="lightbox-header-bar">
                    <span class="terminal-tag">SYSTEM // SECURE_CLEARANCE</span>
                    <div class="window-controls">
                        <span class="dot-win"></span>
                        <span class="dot-win"></span>
                    </div>
                </div>
                
                <div class="lightbox-body">
                    <h3>TRANSACTION AUTHORIZATION</h3>
                    <p class="lightbox-desc">An outbound routing signal is requesting execution authorization for batch ledger allocation array index 42422.</p>
                    
                    <div class="metric-data-block">
                        <div class="metric-row"><span>Ledger Node:</span> <strong class="code-font">LN-992-X</strong></div>
                        <div class="metric-row"><span>Volatility Index:</span> <strong class="code-font text-warning">0.024σ</strong></div>
                    </div>
                    
                    <div class="lightbox-actions">
                        <button class="btn-action confirm">Approve Execution</button>
                        <button class="btn-action cancel">Abort</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
