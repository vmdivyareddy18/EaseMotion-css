<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio Swing Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="portfolio-container">
        <header class="portfolio-header">
            <span class="category-tag">Selected Works</span>
            <h1>Curated Exhibition</h1>
        </header>

        <article class="project-card">
            <div class="project-image-wrapper">
                <div class="mock-image"></div>
                
                <div class="tooltip-container">
                    <button class="tooltip-trigger" aria-label="View project metadata" aria-describedby="project-meta">
                        i
                    </button>
                    
                    <div id="project-meta" class="tooltip-bubble" role="tooltip">
                        <div class="tooltip-arrow"></div>
                        <div class="tooltip-content">
                            <h4>Branding Concept</h4>
                            <p>Art Directed by Studio Ava &mdash; Tokyo, 2026</p>
                        </div>
                    </div>
                </div>

            </div>
            <div class="project-info">
                <h3>Aetherial Aesthetics</h3>
                <p>Digital Immersive Design</p>
            </div>
        </article>
    </main>

</body>
</html>
