<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Rain Icon - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Rain Icon</h1>
    <div class="weather-icon rain-icon">
      <div class="rain-cloud">
        <div class="cloud-body"></div>
        <div class="cloud-body cloud-body--right"></div>
      </div>
      <div class="rain-drop drop-1"></div>
      <div class="rain-drop drop-2"></div>
      <div class="rain-drop drop-3"></div>
      <div class="rain-drop drop-4"></div>
      <div class="rain-drop drop-5"></div>
    </div>
    <p class="description">Cloud icon with small animated rain drops falling continuously.</p>
  </div>
</body>
</html>
