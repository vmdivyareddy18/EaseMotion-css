<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Strength Bars Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-panel">
    <div class="panel-header">
      <h2>Broadcasting Node</h2>
      <div class="panel-status">Scanning Active</div>
    </div>

    <!-- Signal Bars Indicator -->
    <div class="signal-container">
      <div class="signal-bar bar-1"></div>
      <div class="signal-bar bar-2"></div>
      <div class="signal-bar bar-3"></div>
      <div class="signal-bar bar-4"></div>
      <div class="signal-bar bar-5"></div>
    </div>

    <div class="telemetry-details">
      <div>Frequency: 5.8 GHz</div>
      <div style="margin-top: 0.25rem;">Rate: 866.7 Mbps</div>
    </div>
  </div>

</body>
</html>
