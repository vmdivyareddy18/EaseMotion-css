<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forklift</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="lift">
      <span class="mast"></span>
      <div class="carriage">
        <span class="forkF ff1"></span>
        <span class="forkF ff2"></span>
        <div class="crate">
          <span class="crateBody"></span>
          <span class="crateBand"></span>
        </div>
      </div>
      <span class="bodyF"></span>
      <span class="cabF"></span>
      <span class="roofF"></span>
      <span class="seatF"></span>
      <span class="beaconF"></span>
      <span class="wheelF wf1"></span>
      <span class="wheelF wf2"></span>
    </div>
    <span class="shelfF"></span>
    <span class="floorF"></span>
    <span class="lineF"></span>
  </div>
</body>
</html>
