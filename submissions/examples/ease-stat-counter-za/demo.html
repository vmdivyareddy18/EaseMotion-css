<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stat Counter - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sc-hd"><h1>CSS Stat Counters</h1><p>Animated number counters</p></header>
<section class="sc-sc"><h2>Row Layout</h2>
<div class="sc-row"><div class="sc-crd"><span class="sc-num" data-target="1250">0</span><span class="sc-lbl">Users</span></div><div class="sc-crd"><span class="sc-num" data-target="340">0</span><span class="sc-lbl">Projects</span></div><div class="sc-crd"><span class="sc-num" data-target="28">0</span><span class="sc-lbl">Awards</span></div><div class="sc-crd"><span class="sc-num" data-target="99">0</span><span class="sc-lbl">% Uptime</span></div></div>
</section>
<section class="sc-sc"><h2>Grid with Icons</h2>
<div class="sc-grid"><div class="sc-crd sc-icon"><div class="sc-ico">&#128200;</div><span class="sc-num" data-target="15000">0</span><span class="sc-lbl">Downloads</span></div><div class="sc-crd sc-icon"><div class="sc-ico">&#127760;</div><span class="sc-num" data-target="89">0</span><span class="sc-lbl">Countries</span></div><div class="sc-crd sc-icon"><div class="sc-ico">&#128101;</div><span class="sc-num" data-target="500">0</span><span class="sc-lbl">Team Members</span></div></div>
</section>
<section class="sc-sc"><h2>Inline Stats</h2>
<div class="sc-inline"><span class="sc-item"><span class="sc-num" data-target="100">0</span>% Satisfaction</span><span class="sc-item"><span class="sc-num" data-target="24">0</span>/7 Support</span><span class="sc-item"><span class="sc-num" data-target="10">0</span>+ Years</span></div>
</section>
<footer class="ftr"><p>EaseMotion - Stat Counters | GSSoC 2026</p></footer>
</body>
</html>
