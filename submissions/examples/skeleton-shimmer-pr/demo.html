<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Fluid Animated Skeleton Shimmer Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 style="margin: 0; font-size: 1.75rem; text-align: center;">Skeleton Shimmer Loaders</h1>
  <p style="color: #475569; margin: 0.25rem 0 0 0; text-align: center;">Composable structural placeholders to optimize perceived user application load states.</p>

  <div class="demo-container">
    
    <div class="mock-card">
      
      <div class="card-header-group">
        <div class="skeleton-shimmer skeleton-avatar"></div>
        <div class="text-group">
          <div class="skeleton-shimmer skeleton-title"></div>
          <div class="skeleton-shimmer skeleton-line short" style="height: 10px;"></div>
        </div>
      </div>

      <div class="skeleton-shimmer skeleton-media"></div>

      <div class="text-group" style="gap: 0.6rem;">
        <div class="skeleton-shimmer skeleton-line"></div>
        <div class="skeleton-shimmer skeleton-line"></div>
        <div class="skeleton-shimmer skeleton-line short"></div>
      </div>
      
    </div>
    
  </div>

</body>
</html>
