<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter Effect — Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      font-family: 'Courier New', monospace;
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    .demo-card {
      max-width: 600px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      min-height: 1.2em;
      margin-bottom: 0.5rem;
    }
    p {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 0.9rem;
    }
    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }
    button {
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.85rem;
      transition: background 0.2s;
    }
    button:hover {
      background: #334155;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <h1 id="typewriterEl" class="typewriter"></h1>
    <p>A character-by-character typing effect with a blinking cursor, built with requestAnimationFrame timing.</p>
    <div class="controls">
      <button onclick="startTypewriter()">Replay</button>
    </div>
    <div class="hint">Configurable: speed, cursor toggle, loop mode</div>
  </div>

  <script>
    var el = document.getElementById('typewriterEl');
    var text = 'Hello, I am a typewriter effect.';

    function startTypewriter() {
      el.textContent = '';
      el.classList.remove('typewriter--done');
      var i = 0;
      var speed = 60;
      function type() {
        if (i < text.length) {
          el.textContent += text.charAt(i);
          i++;
          setTimeout(type, speed);
        } else {
          el.classList.add('typewriter--done');
        }
      }
      type();
    }

    startTypewriter();
  </script>
</body>
</html>
