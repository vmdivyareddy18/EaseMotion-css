<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Checkout Wobble-Focus Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="checkout-container">
        <h2 class="checkout-title">Payment Details</h2>

        <div class="form-group">
            <label for="cvv-input" class="form-label">Security Code (CVV)</label>

            <div class="tooltip-wrapper">
                <div class="input-container">
                    <input type="text" id="cvv-input" class="checkout-input" placeholder="123" maxlength="4"
                        aria-describedby="cvv-tooltip">
                    <button type="button" class="tooltip-trigger" aria-label="More information regarding CVV">?</button>

                    <div id="cvv-tooltip" class="checkout-tooltip" role="tooltip">
                        <span class="tooltip-heading">Where to find it?</span>
                        <p class="tooltip-body">The 3-digit code located on the back of your card. Amex cards feature a
                            4-digit code on the front.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
