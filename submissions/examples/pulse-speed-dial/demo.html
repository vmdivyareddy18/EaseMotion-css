<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pulse Speed Dial - Gaming HUD Floating Action Menu for EaseMotion CSS"
    />
    <title>Pulse Speed Dial (Gaming Pattern) | EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <main class="demo-container">
      <header class="demo-header">
        <h1>Pulse Speed Dial</h1>
        <p>
          A CSS-only floating action menu with a multi-step concentric pulse
          animation designed for gaming HUD interfaces.
        </p>
      </header>

      <div class="em-pulse-dial-wrapper">
        <input
          type="checkbox"
          id="em-pulse-dial-checkbox"
          class="em-pulse-dial-toggle"
          aria-label="Toggle Gaming HUD Menu"
          aria-haspopup="true"
        />

        <label for="em-pulse-dial-checkbox" class="em-pulse-dial-trigger">
          <span class="em-pulse-rings">
            <span class="em-pulse-ring em-pulse-ring-1"></span>
            <span class="em-pulse-ring em-pulse-ring-2"></span>
            <span class="em-pulse-ring em-pulse-ring-3"></span>
          </span>
          <svg
            class="em-pulse-dial-hud-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="9"></circle>
            <line x1="12" y1="8" x2="12" y2="16"></line>
            <line x1="8" y1="12" x2="16" y2="12"></line>
          </svg>
        </label>

        <div class="em-pulse-dial-actions" role="menu">
          <a
            href="#profile"
            class="em-pulse-dial-action em-action-profile"
            data-label="Hero Profile"
            role="menuitem"
            tabindex="0"
          >
            <svg
              viewBox="0 0 24 24"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </a>

          <a
            href="#quests"
            class="em-pulse-dial-action em-action-quests"
            data-label="Quests Journal"
            role="menuitem"
            tabindex="0"
          >
            <svg
              viewBox="0 0 24 24"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
          </a>

          <a
            href="#shop"
            class="em-pulse-dial-action em-action-shop"
            data-label="Armory Shop"
            role="menuitem"
            tabindex="0"
          >
            <svg
              viewBox="0 0 24 24"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5"></polyline>
              <line x1="13" y1="19" x2="19" y2="13"></line>
              <line x1="16" y1="16" x2="20" y2="20"></line>
              <line x1="19" y1="21" x2="21" y2="19"></line>
            </svg>
          </a>

          <a
            href="#settings"
            class="em-pulse-dial-action em-action-settings"
            data-label="HUD Settings"
            role="menuitem"
            tabindex="0"
          >
            <svg
              viewBox="0 0 24 24"
              stroke="currentColor"
              fill="none"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
