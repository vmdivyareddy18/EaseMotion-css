<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion Class Search — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>EaseMotion Class Search</h1>
    <p class="subtitle">Search and filter available EaseMotion animation classes</p>

    <input type="text" class="search-bar" id="searchInput" placeholder="Search classes (e.g. fade, slide, bounce)...">

    <div class="card-grid" id="classGrid"></div>
  </div>

  <script>
    const classes = [
      { name: 'ease-fade-in', type: 'Entrance' },
      { name: 'ease-fade-out', type: 'Exit' },
      { name: 'ease-slide-up', type: 'Entrance' },
      { name: 'ease-slide-down', type: 'Entrance' },
      { name: 'ease-slide-left', type: 'Entrance' },
      { name: 'ease-slide-right', type: 'Entrance' },
      { name: 'ease-scale-in', type: 'Entrance' },
      { name: 'ease-scale-out', type: 'Exit' },
      { name: 'ease-rotate-in', type: 'Entrance' },
      { name: 'ease-rotate-out', type: 'Exit' },
      { name: 'ease-flip', type: 'Entrance' },
      { name: 'ease-bounce', type: 'Emphasis' },
      { name: 'ease-pulse', type: 'Emphasis' },
      { name: 'ease-shake', type: 'Emphasis' },
      { name: 'ease-spinner', type: 'Loading' },
      { name: 'ease-delay-100', type: 'Modifier' },
      { name: 'ease-delay-200', type: 'Modifier' },
      { name: 'ease-delay-500', type: 'Modifier' },
      { name: 'ease-delay-1000', type: 'Modifier' },
      { name: 'ease-slow', type: 'Modifier' },
      { name: 'ease-fast', type: 'Modifier' },
      { name: 'ease-hover-lift', type: 'Hover' },
    ];

    function renderGrid(filter = '') {
      const grid = document.getElementById('classGrid');
      const filtered = classes.filter(c =>
        c.name.toLowerCase().includes(filter.toLowerCase()) ||
        c.type.toLowerCase().includes(filter.toLowerCase())
      );
      grid.innerHTML = filtered.map(c => `
        <div class="class-card">
          <div class="class-name">${c.name}</div>
          <div class="class-type">${c.type}</div>
        </div>
      `).join('');
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      renderGrid(e.target.value);
    });

    renderGrid();
  </script>

</body>
</html>
