<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Animated Notification Bell</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-mockup">
    <header class="nav-header">
      <div class="logo">Dashboard</div>
      
      <div class="ease-notif-container" tabindex="0">
        <button class="ease-bell-btn" aria-label="View notifications">
          <svg class="ease-bell-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="ease-bell-badge">3</span>
        </button>

        <div class="ease-notif-dropdown">
          <div class="dropdown-header">
            <h4>Recent Alerts</h4>
          </div>
          
          <div class="dropdown-list">
            <div class="ease-notif-item">
              <p>New comment on your post</p>
              <span class="notif-time">2m ago</span>
            </div>
            <div class="ease-notif-item">
              <p>Your analytics report is ready</p>
              <span class="notif-time">1h ago</span>
            </div>
            <div class="ease-notif-item">
              <p>Security keys updated successfully</p>
              <span class="notif-time">5h ago</span>
            </div>
          </div>
        </div>
      </div>

    </header>
    
    <main class="dashboard-body">
      <h2>Welcome Back!</h2>
      <p>Click on the ringing notification bell icon in the top right corner to preview recent timeline adjustments via pure CSS tracking layers.</p>
    </main>
  </div>

</body>
</html>
