<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bell Notification Ring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Bell Notification Ring</h1>

    <p>
      A reusable bell animation inspired by modern notification systems.
    </p>

    <div class="demo-grid">

      <button class="bell-button">
        <span class="bell-icon">🔔</span>
      </button>

      <button class="bell-button card-style">
        <span class="bell-icon">🔔</span>
        <span>Notifications</span>
      </button>

      <div class="notification-card">
        <h3>Updates Available</h3>
        <p>Stay informed with animated notification indicators.</p>

        <button class="bell-button small">
          <span class="bell-icon">🔔</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
