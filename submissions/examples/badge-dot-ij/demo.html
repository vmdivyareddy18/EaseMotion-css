<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS badge-dot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Status Dots</h1>
    <div class="dot-grid">
      <div class="status-item"><span class="s-dot online"></span> Online</div>
      <div class="status-item"><span class="s-dot away"></span> Away</div>
      <div class="status-item"><span class="s-dot busy"></span> Busy</div>
      <div class="status-item"><span class="s-dot offline"></span> Offline</div>
    </div>
  </div>
</body>
</html>
