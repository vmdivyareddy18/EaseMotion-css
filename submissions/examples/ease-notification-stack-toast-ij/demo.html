<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notification Stack Toast</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='toast-bg')r.style.setProperty('--toast-bg',t.value);if(t.name==='toast-color')r.style.setProperty('--toast-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const c=document.querySelector('.toast-container');const b=document.querySelector('.add-btn');const msgs=['File saved successfully!','New message received','Update available','Connection restored'];let i=0;b.addEventListener('click',()=>{const t=document.createElement('div');t.className='toast';t.textContent=msgs[i%msgs.length];i++;t.style.animation='toastSlideIn var(--slide-duration,0.3s) ease-out';c.prepend(t);setTimeout(()=>{t.style.animation='toastSlideOut var(--slide-duration,0.3s) ease-in forwards';setTimeout(()=>t.remove(),300)},2500)})})
</script>
<div class="container"><p class="title">Notification Stack Toast</p><button class="add-btn">Add Toast</button><div class="toast-container"></div>
<div class="controls"><label>Toast BG: <input type="color" name="toast-bg" value="#2d2d44"></label><label>Text: <input type="color" name="toast-color" value="#eee"></label><label>Speed: <input type="range" name="slide-duration" min="0.15" max="0.6" step="0.05" value="0.3"></label></div></div></body></html>
