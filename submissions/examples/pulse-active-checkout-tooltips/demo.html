<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pulse-Active Tooltip - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="checkout-layout">
    <div class="summary-card">
      <header class="summary-header">
        <h2>Review Order</h2>
        <p>Confirm totals and security credentials before processing payment packets.</p>
      </header>

      <div class="price-row">
        <span>Cart Subtotal (3 items)</span>
        <span class="value">$345.00</span>
      </div>
      <div class="price-row premium-accent">
        <span>Shipping Protection</span>
        <span class="status-free">WAIVED</span>
      </div>

      <hr class="summary-divider">

      <div class="security-badge-wrapper">
        <span class="security-badge tooltip-container" tabindex="0" aria-describedby="tip-security">
          🛡️ AES-256 Verified Secure
          <span id="tip-security" class="tooltip" role="tooltip">
            <span class="pulse-ring"></span>
            Encrypted payment gateway tunnel is active.
          </span>
        </span>
      </div>

      <div class="price-row grand-total">
        <span>Total Due</span>
        <span class="value">$345.00</span>
      </div>

      <button class="checkout-submit-btn tooltip-container" aria-describedby="tip-gateway">
        Authorize & Pay
        <span id="tip-gateway" class="tooltip" role="tooltip">
          <span class="pulse-ring"></span>
          Redirecting to authorized dynamic banking layer.
        </span>
      </button>
    </div>
  </main>

</body>
</html>
