<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A social-media-inspired sidebar with a CSS-only text reveal animation." />
    <title>Text Reveal Sidebar</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell" id="top">
      <aside class="sidebar ease-card ease-card-glass ease-card-hover" aria-label="Social sidebar navigation">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">S</div>
          <div class="brand-text">
            <h1>SocialFlow</h1>
            <p>Creator Studio</p>
          </div>
        </div>

        <section class="profile" aria-label="Profile preview">
          <div class="avatar" aria-hidden="true">AL</div>
          <div class="profile-copy">
            <h2>Ava Lane</h2>
            <p>Design Strategist</p>
          </div>
        </section>

        <nav class="nav" aria-label="Sidebar menu">
          <ul>
            <li>
              <a href="#top" class="nav-link active">
                <span class="icon" aria-hidden="true">◉</span>
                <span class="label">Home</span>
              </a>
            </li>
            <li>
              <a href="#top" class="nav-link">
                <span class="icon" aria-hidden="true">✦</span>
                <span class="label">Explore</span>
              </a>
            </li>
            <li>
              <a href="#top" class="nav-link">
                <span class="icon" aria-hidden="true">⬢</span>
                <span class="label">Messages</span>
                <span class="badge" aria-label="Two new messages">2</span>
              </a>
            </li>
            <li>
              <a href="#top" class="nav-link">
                <span class="icon" aria-hidden="true">☼</span>
                <span class="label">Analytics</span>
              </a>
            </li>
          </ul>
        </nav>

        <button type="button" class="ease-btn ease-btn-primary create-btn">Create Post</button>
      </aside>

      <section class="content-panel" aria-labelledby="content-title">
        <p class="eyebrow">Social media UI</p>
        <h2 id="content-title" class="content-title ease-fade-in">Reveal more as you hover.</h2>
        <p class="content-copy ease-slide-up">
          The sidebar stays compact by default and expands smoothly when the user hovers or focuses it.
        </p>
      </section>
    </main>
  </body>
</html>
