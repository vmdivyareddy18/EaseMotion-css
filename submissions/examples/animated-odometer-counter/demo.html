<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Odometer Counter</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; gap: 2rem; flex-wrap: wrap;">
    <div class="odometer">
      <span class="odometer-digit" id="odometer1">0</span>
      <span class="odometer-label">Downloads</span>
    </div>
    <div class="odometer">
      <span class="odometer-digit" id="odometer2">0</span>
      <span class="odometer-label">Users</span>
    </div>
    <div class="odometer">
      <span class="odometer-digit" id="odometer3">0</span>
      <span class="odometer-label">Stars</span>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
