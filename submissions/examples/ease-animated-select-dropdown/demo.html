<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Select Dropdown Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Animated Select Dropdown</h1>
        <p class="subtitle">Smooth expand with icons</p>

        <!-- ANIMATED SELECT DROPDOWN COMPONENT -->
        <div class="select-container" id="selectContainer">
            <div class="select-wrapper" id="selectWrapper">
                <button class="select-trigger" id="selectTrigger" aria-haspopup="listbox" aria-expanded="false">
                    <span class="select-value" id="selectValue">
                        <span class="select-option-icon">🌐</span>
                        <span class="select-option-text">Select an option</span>
                    </span>
                    <span class="select-arrow" id="selectArrow">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                        </svg>
                    </span>
                </button>

                <div class="select-options" id="selectOptions" role="listbox">
                    <button class="select-option" data-value="dashboard" role="option" aria-selected="false">
                        <span class="select-option-icon">📊</span>
                        <span class="select-option-text">Dashboard</span>
                        <span class="select-option-check">✓</span>
                    </button>
                    <button class="select-option" data-value="profile" role="option" aria-selected="false">
                        <span class="select-option-icon">👤</span>
                        <span class="select-option-text">Profile</span>
                        <span class="select-option-check">✓</span>
                    </button>
                    <button class="select-option" data-value="settings" role="option" aria-selected="false">
                        <span class="select-option-icon">⚙️</span>
                        <span class="select-option-text">Settings</span>
                        <span class="select-option-check">✓</span>
                    </button>
                    <button class="select-option" data-value="notifications" role="option" aria-selected="false">
                        <span class="select-option-icon">🔔</span>
                        <span class="select-option-text">Notifications</span>
                        <span class="select-option-check">✓</span>
                    </button>
                    <button class="select-option" data-value="help" role="option" aria-selected="false">
                        <span class="select-option-icon">❓</span>
                        <span class="select-option-text">Help & Support</span>
                        <span class="select-option-check">✓</span>
                    </button>
                    <button class="select-option" data-value="logout" role="option" aria-selected="false">
                        <span class="select-option-icon">🚪</span>
                        <span class="select-option-text">Logout</span>
                        <span class="select-option-check">✓</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Selected Value Display -->
        <div class="selected-display">
            <span class="display-label">Selected:</span>
            <span class="display-value" id="displayValue">None</span>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="openBtn">Open</button>
            <button class="demo-btn" id="closeBtn">Close</button>
            <button class="demo-btn" id="resetBtn">Reset</button>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="select-container variant-primary">
                    <div class="select-wrapper">
                        <button class="select-trigger">
                            <span class="select-value">
                                <span class="select-option-icon">🔵</span>
                                <span class="select-option-text">Primary</span>
                            </span>
                            <span class="select-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                        <div class="select-options">
                            <button class="select-option" data-value="primary1">
                                <span class="select-option-icon">🔵</span>
                                <span class="select-option-text">Option 1</span>
                            </button>
                            <button class="select-option" data-value="primary2">
                                <span class="select-option-icon">🔵</span>
                                <span class="select-option-text">Option 2</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="select-container variant-success">
                    <div class="select-wrapper">
                        <button class="select-trigger">
                            <span class="select-value">
                                <span class="select-option-icon">✅</span>
                                <span class="select-option-text">Success</span>
                            </span>
                            <span class="select-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                        <div class="select-options">
                            <button class="select-option" data-value="success1">
                                <span class="select-option-icon">✅</span>
                                <span class="select-option-text">Option 1</span>
                            </button>
                            <button class="select-option" data-value="success2">
                                <span class="select-option-icon">✅</span>
                                <span class="select-option-text">Option 2</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="select-container variant-danger">
                    <div class="select-wrapper">
                        <button class="select-trigger">
                            <span class="select-value">
                                <span class="select-option-icon">🔴</span>
                                <span class="select-option-text">Danger</span>
                            </span>
                            <span class="select-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                        <div class="select-options">
                            <button class="select-option" data-value="danger1">
                                <span class="select-option-icon">🔴</span>
                                <span class="select-option-text">Option 1</span>
                            </button>
                            <button class="select-option" data-value="danger2">
                                <span class="select-option-icon">🔴</span>
                                <span class="select-option-text">Option 2</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="select-container variant-dark">
                    <div class="select-wrapper">
                        <button class="select-trigger">
                            <span class="select-value">
                                <span class="select-option-icon">⚫</span>
                                <span class="select-option-text">Dark</span>
                            </span>
                            <span class="select-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                        <div class="select-options">
                            <button class="select-option" data-value="dark1">
                                <span class="select-option-icon">⚫</span>
                                <span class="select-option-text">Option 1</span>
                            </button>
                            <button class="select-option" data-value="dark2">
                                <span class="select-option-icon">⚫</span>
                                <span class="select-option-text">Option 2</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const container = document.getElementById('selectContainer');
            const wrapper = document.getElementById('selectWrapper');
            const trigger = document.getElementById('selectTrigger');
            const valueDisplay = document.getElementById('selectValue');
            const optionsContainer = document.getElementById('selectOptions');
            const arrow = document.getElementById('selectArrow');
            const displayValue = document.getElementById('displayValue');
            const openBtn = document.getElementById('openBtn');
            const closeBtn = document.getElementById('closeBtn');
            const resetBtn = document.getElementById('resetBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                placeholder: 'Select an option',
                animationDuration: 300, // ms
                onSelect: function(value, label, icon) {
                    console.log(`📌 Selected: ${label} (${value})`);
                },
                onOpen: function() {
                    console.log('📂 Dropdown opened');
                },
                onClose: function() {
                    console.log('📁 Dropdown closed');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isOpen = false;
            let selectedValue = null;
            let selectedLabel = CONFIG.placeholder;
            let selectedIcon = '🌐';
            let isAnimating = false;

            // ============================================
            // HELPERS
            // ============================================
            function getOptionData(option) {
                const icon = option.querySelector('.select-option-icon')?.textContent || '📄';
                const text = option.querySelector('.select-option-text')?.textContent || 'Option';
                const value = option.dataset.value || text.toLowerCase().replace(/\s+/g, '-');
                return { icon, text, value };
            }

            function getSelectedOption() {
                return optionsContainer.querySelector('.select-option.selected');
            }

            // ============================================
            // OPEN/CLOSE FUNCTIONS
            // ============================================
            function openDropdown() {
                if (isOpen || isAnimating) return;
                isOpen = true;
                isAnimating = true;

                wrapper.classList.add('open');
                trigger.setAttribute('aria-expanded', 'true');
                arrow.style.transform = 'rotate(180deg)';

                // Animate options
                const options = optionsContainer.querySelectorAll('.select-option');
                options.forEach((opt, index) => {
                    opt.style.transitionDelay = (index * 40) + 'ms';
                    opt.style.opacity = '1';
                    opt.style.transform = 'translateY(0)';
                });

                setTimeout(() => {
                    isAnimating = false;
                }, CONFIG.animationDuration);

                CONFIG.onOpen();
            }

            function closeDropdown() {
                if (!isOpen || isAnimating) return;
                isOpen = false;
                isAnimating = true;

                wrapper.classList.remove('open');
                trigger.setAttribute('aria-expanded', 'false');
                arrow.style.transform = 'rotate(0deg)';

                // Animate options out
                const options = optionsContainer.querySelectorAll('.select-option');
                options.forEach((opt, index) => {
                    opt.style.transitionDelay = '0ms';
                    opt.style.opacity = '0';
                    opt.style.transform = 'translateY(-8px)';
                });

                setTimeout(() => {
                    isAnimating = false;
                }, CONFIG.animationDuration);

                CONFIG.onClose();
            }

            function toggleDropdown() {
                if (isOpen) {
                    closeDropdown();
                } else {
                    openDropdown();
                }
            }

            // ============================================
            // SELECTION FUNCTIONS
            // ============================================
            function selectOption(option) {
                const data = getOptionData(option);
                selectedValue = data.value;
                selectedLabel = data.text;
                selectedIcon = data.icon;

                // Update display
                valueDisplay.innerHTML = `
                    <span class="select-option-icon">${data.icon}</span>
                    <span class="select-option-text">${data.text}</span>
                `;

                // Update selected state
                optionsContainer.querySelectorAll('.select-option').forEach(opt => {
                    opt.classList.remove('selected');
                    opt.setAttribute('aria-selected', 'false');
                    const check = opt.querySelector('.select-option-check');
                    if (check) check.style.opacity = '0';
                });

                option.classList.add('selected');
                option.setAttribute('aria-selected', 'true');
                const check = option.querySelector('.select-option-check');
                if (check) check.style.opacity = '1';

                // Update display
                displayValue.textContent = `${data.icon} ${data.text}`;
                displayValue.style.color = 'var(--text-primary)';

                // Close dropdown
                closeDropdown();

                // Trigger callback
                CONFIG.onSelect(data.value, data.text, data.icon);
            }

            function resetSelection() {
                selectedValue = null;
                selectedLabel = CONFIG.placeholder;
                selectedIcon = '🌐';

                valueDisplay.innerHTML = `
                    <span class="select-option-icon">🌐</span>
                    <span class="select-option-text">${CONFIG.placeholder}</span>
                `;

                optionsContainer.querySelectorAll('.select-option').forEach(opt => {
                    opt.classList.remove('selected');
                    opt.setAttribute('aria-selected', 'false');
                    const check = opt.querySelector('.select-option-check');
                    if (check) check.style.opacity = '0';
                });

                displayValue.textContent = 'None';
                displayValue.style.color = '#6b7280';

                closeDropdown();
                CONFIG.onSelect(null, null, null);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Trigger click
            trigger.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                toggleDropdown();
            });

            // Option clicks
            optionsContainer.addEventListener('click', function(e) {
                const option = e.target.closest('.select-option');
                if (!option) return;
                e.stopPropagation();
                selectOption(option);
            });

            // Keyboard navigation
            trigger.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleDropdown();
                }
                if (e.key === 'Escape' && isOpen) {
                    closeDropdown();
                    trigger.focus();
                }
                if (e.key === 'ArrowDown' && !isOpen) {
                    e.preventDefault();
                    openDropdown();
                    const firstOption = optionsContainer.querySelector('.select-option');
                    if (firstOption) firstOption.focus();
                }
            });

            // Keyboard navigation for options
            optionsContainer.addEventListener('keydown', function(e) {
                const options = Array.from(this.querySelectorAll('.select-option'));
                const currentIndex = options.indexOf(document.activeElement);

                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    const nextIndex = (currentIndex + 1) % options.length;
                    options[nextIndex].focus();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const prevIndex = currentIndex <= 0 ? options.length - 1 : currentIndex - 1;
                    options[prevIndex].focus();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const focused = document.activeElement;
                    if (focused && focused.classList.contains('select-option')) {
                        selectOption(focused);
                    }
                } else if (e.key === 'Escape') {
                    closeDropdown();
                    trigger.focus();
                }
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (isOpen && !container.contains(e.target)) {
                    closeDropdown();
                }
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            openBtn.addEventListener('click', openDropdown);
            closeBtn.addEventListener('click', closeDropdown);
            resetBtn.addEventListener('click', resetSelection);

            // ============================================
            // KEYBOARD SHORTCUTS (demo)
            // ============================================
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+D to toggle
                if (e.key === 'D' && e.ctrlKey && e.shiftKey) {
                    e.preventDefault();
                    toggleDropdown();
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.AnimatedSelect = {
                open: openDropdown,
                close: closeDropdown,
                toggle: toggleDropdown,
                select: selectOption,
                reset: resetSelection,
                isOpen: () => isOpen,
                getSelected: () => ({
                    value: selectedValue,
                    label: selectedLabel,
                    icon: selectedIcon
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                },
                // Add option programmatically
                addOption: (value, label, icon = '📄', prepend = false) => {
                    const option = document.createElement('button');
                    option.className = 'select-option';
                    option.dataset.value = value;
                    option.role = 'option';
                    option.setAttribute('aria-selected', 'false');
                    option.innerHTML = `
                        <span class="select-option-icon">${icon}</span>
                        <span class="select-option-text">${label}</span>
                        <span class="select-option-check">✓</span>
                    `;
                    option.style.opacity = '0';
                    option.style.transform = 'translateY(-8px)';
                    if (prepend) {
                        optionsContainer.prepend(option);
                    } else {
                        optionsContainer.appendChild(option);
                    }
                    return option;
                },
                // Remove option
                removeOption: (value) => {
                    const option = optionsContainer.querySelector(`[data-value="${value}"]`);
                    if (option) {
                        if (option.classList.contains('selected')) {
                            resetSelection();
                        }
                        option.remove();
                        return true;
                    }
                    return false;
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial state
            optionsContainer.querySelectorAll('.select-option').forEach(opt => {
                opt.style.opacity = '0';
                opt.style.transform = 'translateY(-8px)';
                const check = opt.querySelector('.select-option-check');
                if (check) check.style.opacity = '0';
            });

            console.log('✅ Animated Select Dropdown initialized!');
            console.log('📖 API: window.AnimatedSelect');
            console.log('📖 Usage:');
            console.log('  - Click the trigger to open/close');
            console.log('  - Use arrow keys to navigate options');
            console.log('  - Press Enter/Space to select');
            console.log('  - Press Escape to close');
            console.log('  - Keyboard shortcut: Ctrl+Shift+D to toggle');

        })();
    </script>
</body>
</html>
