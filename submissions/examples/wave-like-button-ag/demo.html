<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A pure CSS wave like button inspired by retro design patterns.">
  <title>Wave Like Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="demo-wrapper">
    <section aria-labelledby="title">
      <h1 id="title" class="demo-title">Wave Like Button</h1>
      <p class="demo-desc">
        Hover or focus to feel the organic fluid motion, and click to toggle the liked state.
      </p>

      <div class="wave-like-container">
        <input type="checkbox" id="wave-like-checkbox" class="wave-like-checkbox">
        <label for="wave-like-checkbox" class="wave-like-btn" aria-label="Like content">
          <span class="wave-container" aria-hidden="true"></span>
          <span class="btn-content">
            <svg class="heart-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 0 0 0-7.78Z" />
            </svg>
            <span class="unliked-text">Like</span>
            <span class="liked-text">Liked</span>
          </span>
        </label>
      </div>
    </section>
  </main>

</body>

</html>
