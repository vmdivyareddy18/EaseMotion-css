<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Badge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="title">
        Ease-Live-Indicator
    </div>
    <div class="subtitle"><span class="code">ease-live-indicator-pulse</span> — 'LIVE' badge pulses red to indicate live status</div>
  <div class="demo-row">
    <span class="live-badge">
      <span class="live-dot"></span>
      LIVE
    </span>

    <span class="live-badge live-badge--outline">
      <span class="live-dot"></span>
      LIVE
    </span>

    <span class="live-badge live-badge--solid">
      <span class="live-dot"></span>
      LIVE
    </span>
  </div>
</body>
</html>
