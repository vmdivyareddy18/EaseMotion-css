<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click Dashboard Analytics Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div
        class="dashboard-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="0"
    >

        <div class="badge">
            📊 Analytics
        </div>

        <h2 id="modal-title">Monthly Performance</h2>

        <p class="subtitle">
            Your dashboard summary for the current month with key business insights.
        </p>

        <div class="divider"></div>

        <section class="stats">

            <div class="stat-card">
                <h3>$48,920</h3>
                <span>Revenue</span>
            </div>

            <div class="stat-card">
                <h3>12,480</h3>
                <span>Active Users</span>
            </div>

            <div class="stat-card">
                <h3>6.8%</h3>
                <span>Conversion Rate</span>
            </div>

            <div class="stat-card">
                <h3>842</h3>
                <span>New Signups</span>
            </div>

        </section>

        <div class="divider"></div>

        <div class="summary">

            <div class="summary-item">
                <span>Traffic Growth</span>
                <strong>+18%</strong>
            </div>

            <div class="summary-item">
                <span>Customer Satisfaction</span>
                <strong>96%</strong>
            </div>

        </div>

        <button class="report-btn">
            View Full Report
        </button>

    </div>

</div>

</body>
</html>
