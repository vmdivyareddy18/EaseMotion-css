<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Date Range Selection Preview</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Date picker</p>
      <h1 id="demo-title">Calendar range preview</h1>
      <p>A static date-range selection preview with start, in-range, end, and muted outside-day states.</p>
    </section>
    <section class="calendar-grid" aria-label="Calendar Date Range Selection Preview">
        <button type="button" class="day">10</button>
        <button type="button" class="day">11</button>
        <button type="button" class="day is-start">12</button>
        <button type="button" class="day is-range">13</button>
        <button type="button" class="day is-range">14</button>
        <button type="button" class="day is-range">15</button>
        <button type="button" class="day is-range">16</button>
        <button type="button" class="day is-range">17</button>
        <button type="button" class="day is-end">18</button>
        <button type="button" class="day">19</button>
        <button type="button" class="day">20</button>
        <button type="button" class="day">21</button>
    </section>
  </main>
</body>
</html>
