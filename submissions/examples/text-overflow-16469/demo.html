<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Text Overflow Utility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h3>Single Line Ellipsis</h3>
      <p class="truncate-text">This is a long string of text that will be truncated using the text-overflow: ellipsis utility.</p>
    </div>
    <div class="card">
      <h3>Multi-line Clamp</h3>
      <p class="clamp-2-lines">This text is designed to span multiple lines but will be clamped at exactly two lines using the webkit-line-clamp utility, ensuring clean layout design.</p>
    </div>
  </div>
</body>
</html>
