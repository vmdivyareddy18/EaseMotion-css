<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Glitch Engine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="engine-container">
        <!-- Layer 1: Background dimension -->
        <div class="layer layer-1 dimension-background"></div>
        
        <!-- Layer 6: Dimension reveal -->
        <div class="layer layer-reveal dimension-reveal-layer"></div>

        <!-- Layer 5: Energy particles -->
        <div class="layer layer-5 energy-particles">
            <div class="particle" style="--i: 1;"></div>
            <div class="particle" style="--i: 2;"></div>
            <div class="particle" style="--i: 3;"></div>
            <div class="particle" style="--i: 4;"></div>
            <div class="particle" style="--i: 5;"></div>
            <div class="particle" style="--i: 6;"></div>
            <div class="particle" style="--i: 7;"></div>
            <div class="particle" style="--i: 8;"></div>
            <div class="particle" style="--i: 9;"></div>
            <div class="particle" style="--i: 10;"></div>
            <div class="particle" style="--i: 11;"></div>
            <div class="particle" style="--i: 12;"></div>
            <div class="particle" style="--i: 13;"></div>
            <div class="particle" style="--i: 14;"></div>
            <div class="particle" style="--i: 15;"></div>
        </div>

        <!-- Energy Cracks -->
        <div class="layer energy-cracks">
            <div class="crack c1"></div>
            <div class="crack c2"></div>
            <div class="crack c3"></div>
            <div class="crack c4"></div>
        </div>

        <!-- Layer 2 & 3: Reality surface -->
        <div class="layer layer-2-3 reality-surface">
            <div class="fragment f1"><div class="fragment-inner"></div></div>
            <div class="fragment f2"><div class="fragment-inner"></div></div>
            <div class="fragment f3"><div class="fragment-inner"></div></div>
            <div class="fragment f4"><div class="fragment-inner"></div></div>
            <div class="fragment f5"><div class="fragment-inner"></div></div>
            <div class="fragment f6"><div class="fragment-inner"></div></div>
            <div class="fragment f7"><div class="fragment-inner"></div></div>
            <div class="fragment f8"><div class="fragment-inner"></div></div>
            <div class="fragment f9"><div class="fragment-inner"></div></div>
        </div>

        <!-- Layer 4: Glitch overlay -->
        <div class="layer layer-4 glitch-overlay">
            <div class="scanlines"></div>
            <div class="noise"></div>
            <div class="pixels">
                <div class="pixel" style="--x: 10; --y: 20; --d: 0.1s;"></div>
                <div class="pixel" style="--x: 40; --y: 70; --d: 0.5s;"></div>
                <div class="pixel" style="--x: 80; --y: 30; --d: 0.2s;"></div>
                <div class="pixel" style="--x: 20; --y: 80; --d: 0.8s;"></div>
                <div class="pixel" style="--x: 90; --y: 10; --d: 0.4s;"></div>
                <div class="pixel" style="--x: 50; --y: 50; --d: 0.9s;"></div>
                <div class="pixel" style="--x: 70; --y: 90; --d: 0.3s;"></div>
                <div class="pixel" style="--x: 30; --y: 40; --d: 0.7s;"></div>
            </div>
        </div>

        <!-- Layer 6: Repair pulse -->
        <div class="layer layer-6 repair-pulse"></div>

        <!-- Center Panel & Repair Trigger -->
        <div class="center-panel-container">
            <div class="center-panel">
                <div class="panel-content">
                    <div class="glitch-text" data-text="REALITY ENGINE">REALITY ENGINE</div>
                    <div class="status-grid">
                        <div class="status-row">
                            <span class="label">STATUS</span>
                            <span class="value v-unstable"><span class="txt">UNSTABLE</span></span>
                        </div>
                        <div class="status-row">
                            <span class="label">DIMENSION</span>
                            <span class="value v-dim"><span class="txt">SECONDARY LAYER DETECTED</span></span>
                        </div>
                        <div class="status-row">
                            <span class="label">INTEGRITY</span>
                            <span class="value v-warn"><span class="txt">37%</span></span>
                        </div>
                        <div class="status-row">
                            <span class="label">SIGNAL</span>
                            <span class="value v-err"><span class="txt">CORRUPTED</span></span>
                        </div>
                    </div>
                </div>
                <!-- Frame decorative elements -->
                <div class="frame-corner top-left"></div>
                <div class="frame-corner top-right"></div>
                <div class="frame-corner bottom-left"></div>
                <div class="frame-corner bottom-right"></div>
            </div>
        </div>
    </div>
</body>
</html>
