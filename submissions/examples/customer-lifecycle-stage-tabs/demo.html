<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Lifecycle Stage Tabs Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="crm-panel-shell">
    <div style="margin-bottom: 1.5rem;">
      <h4 style="margin: 0 0 4px 0; color: #0f172a; font-size: 1.25rem;">Account Pipeline Segments</h4>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem;">Filter contacts rapidly across critical lifecycle retention thresholds.</p>
    </div>

    <div class="ease-lifecycle-tabs">
      <div class="ease-lifecycle-tab" onclick="switchTab(this, 'leads')">Leads <span class="stage-count-badge">14</span></div>
      <div class="ease-lifecycle-tab active" onclick="switchTab(this, 'mql')">MQL <span class="stage-count-badge">8</span></div>
      <div class="ease-lifecycle-tab" onclick="switchTab(this, 'sql')">SQL <span class="stage-count-badge">3</span></div>
      <div class="ease-lifecycle-tab" onclick="switchTab(this, 'won')">Closed-Won <span class="stage-count-badge">42</span></div>
    </div>

    <div style="margin-top: 1.25rem;">
      <div class="lead-row">
        <div>
          <span style="font-weight: 600; font-size: 0.95rem; color: #0f172a; display: block;">Acme Logistics Corp</span>
          <span style="font-size: 0.8rem; color: #64748b;">Domain Priority: High · Updated 2h ago</span>
        </div>
        <span style="font-size: 0.85rem; font-weight: 700; color: #475569;">$12,500/yr</span>
      </div>
      <div class="lead-row">
        <div>
          <span style="font-weight: 600; font-size: 0.95rem; color: #0f172a; display: block;">Stark Industries Ltd</span>
          <span style="font-size: 0.8rem; color: #64748b;">Domain Priority: Medium · Updated 5h ago</span>
        </div>
        <span style="font-size: 0.85rem; font-weight: 700; color: #475569;">$8,200/yr</span>
      </div>
    </div>
  </div>

  <script>
    function switchTab(element, stageCode) {
      const tabs = document.querySelectorAll('.ease-lifecycle-tab');
      tabs.forEach(tab => tab.classList.remove('active'));
      element.classList.add('active');
    }
  </script>
</body>
</html>
