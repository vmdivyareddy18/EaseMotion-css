<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Cards Demo</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="products">

<h1 class="ease-fade-in">Featured Products</h1>

<div class="grid">

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/300x200"
     alt="Wireless Headphones">

<h2>Wireless Headphones</h2>

<p class="price">$89.99</p>

<p>⭐⭐⭐⭐⭐</p>

<button class="btn ease-hover-grow">
Buy Now
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/300x200"
     alt="Smart Watch">

<h2>Smart Watch</h2>

<p class="price">$129.99</p>

<p>⭐⭐⭐⭐☆</p>

<button class="btn ease-hover-grow">
Buy Now
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/300x200"
     alt="Bluetooth Speaker">

<h2>Bluetooth Speaker</h2>

<p class="price">$59.99</p>

<p>⭐⭐⭐⭐⭐</p>

<button class="btn ease-hover-grow">
Buy Now
</button>

</div>

</div>

</section>

</body>
</html>
