<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split-Screen Image Comparison</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #0f172a;">
    <div class="split">
      <div class="split-half split-before">
        <span class="split-label">Before</span>
      </div>
      <div class="split-divider"></div>
      <div class="split-half split-after">
        <span class="split-label">After</span>
      </div>
    </div>
  </div>
</body>
</html>
