<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aspect Ratio TM v2 Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <h1>Aspect Ratio TM v2 Utilities</h1>
        <p>
            Responsive containers with fixed aspect ratios using utility classes.
        </p>
    </header>

    <main class="container">

        <div class="demo-grid">

            <div class="card">
                <h2>Square (1:1)</h2>
                <div class="aspect-ratio-1-1 demo-box">
                    <span>1 : 1</span>
                </div>
            </div>

            <div class="card">
                <h2>Video (16:9)</h2>
                <div class="aspect-ratio-16-9 demo-box">
                    <span>16 : 9</span>
                </div>
            </div>

            <div class="card">
                <h2>Classic (4:3)</h2>
                <div class="aspect-ratio-4-3 demo-box">
                    <span>4 : 3</span>
                </div>
            </div>

            <div class="card">
                <h2>Portrait (3:4)</h2>
                <div class="aspect-ratio-3-4 demo-box">
                    <span>3 : 4</span>
                </div>
            </div>

            <div class="card">
                <h2>Cinema (21:9)</h2>
                <div class="aspect-ratio-21-9 demo-box">
                    <span>21 : 9</span>
                </div>
            </div>

            <div class="card">
                <h2>Mobile (9:16)</h2>
                <div class="aspect-ratio-9-16 demo-box">
                    <span>9 : 16</span>
                </div>
            </div>

        </div>

    </main>

</body>

</html>
