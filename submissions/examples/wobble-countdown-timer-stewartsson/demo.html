<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberTerminal - Wobble Countdown Timer Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyber-viewport">
        <!-- Interactive Micro-Frontend Cyberpunk Terminal Overlay Frame Container -->
        <div class="terminal-card-node">
            <header class="terminal-header">
                <div class="neon-glitch-badge">SYSTEM LOCKDOWN</div>
                <h1 class="terminal-title">REPLICATOR // SYNC</h1>
                <p class="terminal-subtitle">Core server infrastructure ledgers re-indexing. Clear data blocks before absolute timer expiration.</p>
            </header>

            <!-- Advanced Pure-CSS Wobbling Distortion Overlay Display Stage Canvas Area -->
            <div class="timer-workspace">
                <div class="wobble-timer-display">
                    <!-- Coordinated Cascading Wobble Digit Group Nodes Matrix -->
                    <div class="timer-segment segment-hours ease-wobble-skew-1">
                        <span class="digit-layer text-cyan" data-text="02">02</span>
                        <span class="unit-tag">HRS</span>
                    </div>
                    
                    <div class="timer-divider text-pink">:</div>

                    <div class="timer-segment segment-minutes ease-wobble-skew-2">
                        <span class="digit-layer text-pink" data-text="14">14</span>
                        <span class="unit-tag">MIN</span>
                    </div>

                    <div class="timer-divider text-cyan">:</div>

                    <div class="timer-segment segment-seconds ease-wobble-skew-3">
                        <span class="digit-layer text-gold" data-text="42">42</span>
                        <span class="unit-tag">SEC</span>
                    </div>
                </div>
            </div>

            <footer class="terminal-footer">
                <div class="node-sync-status">
                    <span class="status-beacon-pulse"></span>
                    <span class="status-text">Quantum Tunnel Protocols Fully Active</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
