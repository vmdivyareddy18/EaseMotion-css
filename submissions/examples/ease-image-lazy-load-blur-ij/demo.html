<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Lazy Load Blur - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Image Lazy Load Blur</h1>
    <p class="desc">Images load with a blurred low-res placeholder that transitions to a sharp full-resolution image. Scroll to see them lazy-load.</p>
    <div class="ll-grid" id="llGrid">
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/mountain/800/600" alt="Mountain" width="800" height="600">
        </div>
        <span class="ll-label">Mountain</span>
      </div>
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/forest/800/600" alt="Forest" width="800" height="600">
        </div>
        <span class="ll-label">Forest</span>
      </div>
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/ocean/800/600" alt="Ocean" width="800" height="600">
        </div>
        <span class="ll-label">Ocean</span>
      </div>
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/city/800/600" alt="City" width="800" height="600">
        </div>
        <span class="ll-label">City</span>
      </div>
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/desert/800/600" alt="Desert" width="800" height="600">
        </div>
        <span class="ll-label">Desert</span>
      </div>
      <div class="ll-card">
        <div class="ll-image-wrap">
          <div class="ll-placeholder"></div>
          <img class="ll-image" data-src="https://picsum.photos/seed/aurora/800/600" alt="Aurora" width="800" height="600">
        </div>
        <span class="ll-label">Aurora</span>
      </div>
    </div>
  </section>
  <script>
    (function() {
      var images = document.querySelectorAll('.ll-image');
      function loadImage(img) {
        if (img.classList.contains('ll-loaded') || img.classList.contains('ll-loading')) return;
        img.classList.add('ll-loading');
        var src = img.getAttribute('data-src');
        if (!src) return;
        var temp = new Image();
        temp.onload = function() {
          img.src = src;
          img.classList.remove('ll-loading');
          img.classList.add('ll-loaded');
          var wrap = img.closest('.ll-image-wrap');
          if (wrap) {
            var placeholder = wrap.querySelector('.ll-placeholder');
            if (placeholder) {
              placeholder.style.opacity = '0';
            }
          }
        };
        temp.onerror = function() {
          img.classList.remove('ll-loading');
          img.classList.add('ll-error');
        };
        temp.src = src;
      }
      function onIntersect(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            loadImage(entry.target);
          }
        });
      }
      var observer;
      if ('IntersectionObserver' in window) {
        observer = new IntersectionObserver(onIntersect, { rootMargin: '200px' });
        images.forEach(function(img) { observer.observe(img); });
      } else {
        images.forEach(function(img) { loadImage(img); });
      }
    })();
  </script>
</body>
</html>
