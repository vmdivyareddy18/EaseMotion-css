<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost in Space | EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="error-container">
    <!-- Background Stars -->
    <div class="stars">
      <span class="star star-1 ease-pulse"></span>
      <span class="star star-2 ease-pulse ease-delay-200"></span>
      <span class="star star-3 ease-pulse ease-delay-400"></span>
      <span class="star star-4 ease-pulse ease-delay-600"></span>
      <span class="star star-5 ease-pulse ease-delay-800"></span>
    </div>

    <!-- Main Content -->
    <div class="error-content">
      <div class="astronaut ease-float">👨‍🚀</div>
      <h1 class="error-code">404</h1>
      <h2 class="error-title ease-fade-in-up ease-delay-100">Lost in Space</h2>
      <p class="error-text ease-fade-in-up ease-delay-200">
        Looks like the page you're looking for has drifted into a black hole. 
        Don't worry, our rescue team is on it!
      </p>
      <a href="/" class="btn-return ease-bounce-in ease-delay-300 ease-hover-grow">
        🚀 Return to Earth
      </a>
    </div>
  </section>
</body>
</html>
