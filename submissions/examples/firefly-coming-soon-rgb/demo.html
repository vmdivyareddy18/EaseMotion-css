<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly Coming Soon</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="firefly-container">
    <!-- Firefly particles -->
    <div class="firefly firefly-1"></div>
    <div class="firefly firefly-2"></div>
    <div class="firefly firefly-3"></div>
    <div class="firefly firefly-4"></div>
    <div class="firefly firefly-5"></div>
    <div class="firefly firefly-6"></div>
    <div class="firefly firefly-7"></div>
    <div class="firefly firefly-8"></div>
    <div class="firefly firefly-9"></div>
    <div class="firefly firefly-10"></div>

    <!-- Content -->
    <div class="coming-soon-content">
      <h1 class="coming-soon-title">Coming Soon</h1>
      <p class="coming-soon-subtitle">Something magical is on the way...</p>
      
      <div class="coming-soon-description">
        <p>We're crafting something extraordinary for you.</p>
        <p>Stay tuned for the grand reveal!</p>
      </div>

      <form class="email-form">
        <input 
          type="email" 
          placeholder="Enter your email" 
          required
          class="email-input"
        >
        <button type="submit" class="notify-btn">Notify Me</button>
      </form>

      <div class="social-links">
        <a href="#" class="social-link">Twitter</a>
        <a href="#" class="social-link">Discord</a>
        <a href="#" class="social-link">GitHub</a>
      </div>
    </div>
  </div>
</body>
</html>
