<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gauge Meter Fill — Needle Sweep</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gauge-demo">
    <h1>Gauge Meter Fill</h1>
    <p class="subtitle">Click to animate the needle sweep with fill transition</p>

    <div class="gauge-wrapper" style="--gauge-bg: #1e1e28; --fill-color: #4fc3a1; --needle-color: #e8e8ed; --fill-duration: 1.8s;">
      <div class="gauge">
        <!-- Background arc track -->
        <svg viewBox="0 0 200 120" class="gauge-svg">
          <path d="M 20 100 A 80 80 0 0 1 180 100"
                fill="none"
                stroke="var(--gauge-bg, #1e1e28)"
                stroke-width="18"
                stroke-linecap="round"/>

          <!-- Fill arc (masked via stroke-dasharray animation) -->
          <path id="fillArc"
                d="M 20 100 A 80 80 0 0 1 180 100"
                fill="none"
                stroke="var(--fill-color, #4fc3a1)"
                stroke-width="18"
                stroke-linecap="round"
                stroke-dasharray="0 251.2"/>

          <!-- Needle -->
          <line id="needle"
                x1="100" y1="100"
                x2="100" y2="30"
                stroke="var(--needle-color, #e8e8ed)"
                stroke-width="3"
                stroke-linecap="round"
                transform-origin="100 100"/>
          <circle cx="100" cy="100" r="6" fill="var(--needle-color, #e8e8ed)"/>
        </svg>

        <!-- Value readout -->
        <div class="gauge-value" id="gaugeValue">0%</div>
      </div>

      <button class="gauge-btn" id="gaugeBtn">Sweep</button>
    </div>

    <div class="controls">
      <span>Click "Sweep" to animate the gauge</span>
    </div>
  </div>

  <script>
    const btn = document.getElementById('gaugeBtn');
    const fillArc = document.getElementById('fillArc');
    const needle = document.getElementById('needle');
    const valueDisplay = document.getElementById('gaugeValue');

    const CIRCUMFERENCE = 2 * Math.PI * 40; // r=40 scaled in viewBox => 251.2
    const MAX_DASH = 201; // ~80% of circumference

    let animating = false;

    btn.addEventListener('click', () => {
      if (animating) return;
      animating = true;
      btn.disabled = true;

      const fillDur = 1800; // ms
      const start = performance.now();

      fillArc.style.transition = 'none';
      needle.style.transition = 'none';
      fillArc.style.strokeDasharray = '0 251.2';
      needle.style.transform = 'rotate(0deg)';
      valueDisplay.textContent = '0%';

      requestAnimationFrame(function step(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / fillDur, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic

        const dash = eased * MAX_DASH;
        const angle = eased * 140 - 70; // -70 to +70 degrees

        fillArc.style.strokeDasharray = `${dash} 251.2`;
        needle.style.transform = `rotate(${angle}deg)`;
        valueDisplay.textContent = `${Math.round(eased * 100)}%`;

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          animating = false;
          btn.disabled = false;
        }
      });
    });
  </script>
</body>
</html>
