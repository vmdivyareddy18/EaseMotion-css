<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lazy Load Image</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <article class="card">
    <h2>Lazy Loaded Image</h2>
    <p class="desc">Blur-up placeholder while loading</p>
    <div class="image-wrapper" style="--placeholder-bg: #2a2a34; --image-src: https://picsum.photos/seed/ease/600/400; --blur-amount: 20px; --load-duration: 0.6s">
      <img src="" data-src="https://picsum.photos/seed/ease/600/400" alt="Random landscape" class="lazy-img" />
      <div class="placeholder"></div>
    </div>
    <p class="status" id="status">Loading…</p>
  </article>
  <script>
    const img = document.querySelector('.lazy-img');
    const placeholder = document.querySelector('.placeholder');
    const status = document.getElementById('status');

    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        img.src = img.dataset.src;
        observer.unobserve(img);
      }
    }, { rootMargin: '200px' });
    observer.observe(img);

    img.addEventListener('load', () => {
      placeholder.classList.add('loaded');
      status.textContent = '✓ Image loaded';
      status.style.color = '#6f6';
    });

    img.addEventListener('error', () => {
      status.textContent = '✗ Failed to load';
      status.style.color = '#f66';
    });
  </script>
</body>
</html>
