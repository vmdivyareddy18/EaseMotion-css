<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tag Cloud</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tag-cloud">
    <h2 class="tag-cloud__title">Popular Tags</h2>
    <div class="tag-cloud__list">
      <span class="tag tag--popular tag--css">CSS</span>
      <span class="tag tag--popular tag--js">JavaScript</span>
      <span class="tag tag--react">React</span>
      <span class="tag tag--design">Design</span>
      <span class="tag tag--popular tag--anim">Animation</span>
      <span class="tag tag--grid">Grid</span>
      <span class="tag tag--popular tag--flex">Flexbox</span>
      <span class="tag tag--ts">TypeScript</span>
      <span class="tag tag--vue">Vue</span>
      <span class="tag tag--node">Node</span>
    </div>
  </div>
</body>
</html>
