<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Button – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Floating Action Button</h1>
  <p>Click a FAB to trigger an action. Pulse animation gently draws attention.</p>

  <div class="fab-container">
    <button class="fab fab--bottom-right" id="fabAdd">
      <span class="fab__icon">+</span>
    </button>
    <button class="fab fab--bottom-left" id="fabEdit">
      <span class="fab__icon">✎</span>
    </button>
    <button class="fab fab--top-right" id="fabShare">
      <span class="fab__icon">↗</span>
    </button>
  </div>

  <div class="controls">
    <button id="togglePulse">Toggle Pulse</button>
  </div>

  <script>
    const showToast = (msg) => {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.classList.add('toast--visible'), 10);
      setTimeout(() => {
        toast.classList.remove('toast--visible');
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    };

    const toggles = {};

    document.querySelectorAll('.fab').forEach(btn => {
      const id = btn.id;
      toggles[id] = true;
      btn.addEventListener('click', () => {
        showToast(`${id} action triggered`);
      });
    });

    document.getElementById('togglePulse').addEventListener('click', () => {
      document.querySelectorAll('.fab').forEach(btn => {
        btn.classList.toggle('fab--no-pulse');
      });
    });
  </script>
</body>
</html>
