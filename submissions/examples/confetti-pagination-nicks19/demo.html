<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Pagination - Music Player Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #121212;
      font-family: 'Inter', -apple-system, sans-serif;
      color: white;
    }
    
    .demo-title {
      margin-bottom: 40px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #fff;
    }
  </style>
</head>
<body>

  <h2 class="demo-title">NOW PLAYING</h2>

  <div class="ease-pagination-wrapper">
    <!-- Page 1 -->
    <div class="ease-page-item">
      <input type="radio" name="pagination" id="page-1" class="ease-page-radio" checked>
      <label for="page-1" class="ease-page-label">1</label>
      <div class="ease-confetti-container">
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 15deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 45deg; --c-dist: 50px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #f5d300; --c-deg: 135deg; --c-dist: 45px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #00d2ff; --c-deg: 165deg; --c-dist: 35px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #b845ff; --c-deg: 195deg; --c-dist: 55px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 315deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 345deg; --c-dist: 45px;"></i>
      </div>
    </div>

    <!-- Page 2 -->
    <div class="ease-page-item">
      <input type="radio" name="pagination" id="page-2" class="ease-page-radio">
      <label for="page-2" class="ease-page-label">2</label>
      <div class="ease-confetti-container">
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 15deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 45deg; --c-dist: 50px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #f5d300; --c-deg: 135deg; --c-dist: 45px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #00d2ff; --c-deg: 165deg; --c-dist: 35px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #b845ff; --c-deg: 195deg; --c-dist: 55px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 315deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 345deg; --c-dist: 45px;"></i>
      </div>
    </div>

    <!-- Page 3 -->
    <div class="ease-page-item">
      <input type="radio" name="pagination" id="page-3" class="ease-page-radio">
      <label for="page-3" class="ease-page-label">3</label>
      <div class="ease-confetti-container">
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 15deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 45deg; --c-dist: 50px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #f5d300; --c-deg: 135deg; --c-dist: 45px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #00d2ff; --c-deg: 165deg; --c-dist: 35px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #b845ff; --c-deg: 195deg; --c-dist: 55px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 315deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 345deg; --c-dist: 45px;"></i>
      </div>
    </div>

    <!-- Page 4 -->
    <div class="ease-page-item">
      <input type="radio" name="pagination" id="page-4" class="ease-page-radio">
      <label for="page-4" class="ease-page-label">4</label>
      <div class="ease-confetti-container">
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 15deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 45deg; --c-dist: 50px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #f5d300; --c-deg: 135deg; --c-dist: 45px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #00d2ff; --c-deg: 165deg; --c-dist: 35px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #b845ff; --c-deg: 195deg; --c-dist: 55px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #1db954; --c-deg: 315deg; --c-dist: 40px;"></i>
        <i class="ease-confetti-particle" style="--c-color: #ff4b4b; --c-deg: 345deg; --c-dist: 45px;"></i>
      </div>
    </div>
  </div>

</body>
</html>
