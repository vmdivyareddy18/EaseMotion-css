<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered List Animation</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <ul class="stagger-list">
      <li class="stagger-item" style="--i: 0;">Plan your project structure</li>
      <li class="stagger-item" style="--i: 1;">Set up the development environment</li>
      <li class="stagger-item" style="--i: 2;">Create the user interface</li>
      <li class="stagger-item" style="--i: 3;">Implement business logic</li>
      <li class="stagger-item" style="--i: 4;">Write and run tests</li>
      <li class="stagger-item" style="--i: 5;">Deploy to production</li>
    </ul>
  </div>
</body>
</html>
