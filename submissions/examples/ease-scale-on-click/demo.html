<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scale on Click Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Scale on Click</h1>
        <p class="subtitle">Button depresses and rebounds</p>

        <!-- SCALE ON CLICK COMPONENT -->
        <div class="scale-container">
            <div class="scale-wrapper">
                <!-- Basic Buttons -->
                <div class="scale-section">
                    <h3>Basic Buttons</h3>
                    <div class="scale-grid">
                        <button class="scale-btn scale-primary" id="btn1">Click Me</button>
                        <button class="scale-btn scale-success" id="btn2">Success</button>
                        <button class="scale-btn scale-danger" id="btn3">Danger</button>
                        <button class="scale-btn scale-warning" id="btn4">Warning</button>
                        <button class="scale-btn scale-dark" id="btn5">Dark</button>
                        <button class="scale-btn scale-outline" id="btn6">Outline</button>
                    </div>
                </div>

                <!-- Scale Variations -->
                <div class="scale-section">
                    <h3>Scale Variations</h3>
                    <div class="scale-grid">
                        <button class="scale-btn scale-small" id="btn7">Small</button>
                        <button class="scale-btn scale-medium" id="btn8">Medium</button>
                        <button class="scale-btn scale-large" id="btn9">Large</button>
                        <button class="scale-btn scale-bounce" id="btn10">Bounce</button>
                        <button class="scale-btn scale-elastic" id="btn11">Elastic</button>
                        <button class="scale-btn scale-slow" id="btn12">Slow</button>
                    </div>
                </div>

                <!-- Interactive Demo -->
                <div class="scale-section">
                    <h3>Interactive Demo</h3>
                    <div class="scale-demo">
                        <button class="scale-btn scale-primary scale-large" id="demoBtn">
                            <span class="demo-icon">🎯</span>
                            Click Me!
                            <span class="demo-count" id="clickCount">0</span>
                        </button>
                        <div class="demo-feedback" id="demoFeedback">
                            <span class="feedback-text">Click the button above!</span>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="scale-controls">
                    <button class="scale-ctrl-btn" id="toggleScaleBtn">⏸ Toggle Scale</button>
                    <button class="scale-ctrl-btn" id="resetAllBtn">⟳ Reset All</button>
                    <button class="scale-ctrl-btn" id="toggleIntensityBtn">⚡ Toggle Intensity</button>
                </div>

                <div class="scale-status">
                    <span class="status-label">Scale:</span>
                    <span class="status-value" id="scaleStatus">Active</span>
                    <span class="status-label">Intensity:</span>
                    <span class="status-value" id="intensityDisplay">Medium</span>
                    <span class="status-label">Clicks:</span>
                    <span class="status-value" id="totalClicks">0</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-box scale-primary" id="var1">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Primary</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-box scale-success" id="var2">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Success</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-box scale-danger" id="var3">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Danger</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-box scale-bounce" id="var4">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Bounce</span>
                </div>
                <div class="variant-card" id="variant5">
                    <div class="variant-box scale-elastic" id="var5">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Elastic</span>
                </div>
                <div class="variant-card" id="variant6">
                    <div class="variant-box scale-large" id="var6">
                        <span>Click</span>
                    </div>
                    <span class="variant-label">Large</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const scaleStatus = document.getElementById('scaleStatus');
            const intensityDisplay = document.getElementById('intensityDisplay');
            const totalClicks = document.getElementById('totalClicks');
            const clickCount = document.getElementById('clickCount');
            const demoFeedback = document.getElementById('demoFeedback');
            const toggleScaleBtn = document.getElementById('toggleScaleBtn');
            const resetAllBtn = document.getElementById('resetAllBtn');
            const toggleIntensityBtn = document.getElementById('toggleIntensityBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                enabled: true,
                intensity: 'medium', // 'low', 'medium', 'high'
                duration: 300, // ms
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                onScale: function(element) {
                    console.log(`📐 Scaled: ${element.tagName}`);
                },
                onToggle: function(enabled) {
                    console.log(`📐 Scale ${enabled ? 'enabled' : 'disabled'}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isEnabled = CONFIG.enabled;
            let currentIntensity = CONFIG.intensity;
            let totalClickCount = 0;
            let demoClickCount = 0;

            // ============================================
            // INTENSITY PRESETS
            // ============================================
            const INTENSITY_MAP = {
                low: {
                    scale: 0.92,
                    label: 'Low'
                },
                medium: {
                    scale: 0.88,
                    label: 'Medium'
                },
                high: {
                    scale: 0.82,
                    label: 'High'
                }
            };

            // ============================================
            // SCALE FUNCTIONS
            // ============================================
            function applyScale(element) {
                if (!isEnabled) return;
                
                const intensity = INTENSITY_MAP[currentIntensity];
                const scale = intensity.scale;
                
                // Remove existing animation
                element.style.animation = 'none';
                element.style.transform = 'none';
                
                // Force reflow
                void element.offsetWidth;
                
                // Apply scale with transition
                element.style.transition = `transform ${CONFIG.duration}ms ${CONFIG.easing}`;
                element.style.transform = `scale(${scale})`;
                
                // Trigger callback
                CONFIG.onScale(element);
                
                // Reset after duration
                setTimeout(() => {
                    element.style.transform = 'scale(1)';
                }, CONFIG.duration);
            }

            function updateScale() {
                // Update status
                scaleStatus.textContent = isEnabled ? 'Active' : 'Paused';
                scaleStatus.style.color = isEnabled ? '#34c759' : '#ff3b30';
                intensityDisplay.textContent = INTENSITY_MAP[currentIntensity].label;
                
                // Update toggle button
                toggleScaleBtn.textContent = isEnabled ? '⏸ Toggle Scale' : '▶ Toggle Scale';
                
                CONFIG.onToggle(isEnabled);
            }

            function toggleScale() {
                isEnabled = !isEnabled;
                updateScale();
            }

            function setIntensity(level) {
                if (INTENSITY_MAP[level]) {
                    currentIntensity = level;
                    CONFIG.intensity = level;
                    intensityDisplay.textContent = INTENSITY_MAP[level].label;
                }
            }

            function toggleIntensity() {
                const levels = ['low', 'medium', 'high'];
                const currentIndex = levels.indexOf(currentIntensity);
                const nextIndex = (currentIndex + 1) % levels.length;
                setIntensity(levels[nextIndex]);
                toggleIntensityBtn.textContent = `⚡ ${INTENSITY_MAP[levels[nextIndex]].label}`;
            }

            function resetAll() {
                // Reset all buttons
                document.querySelectorAll('.scale-btn, .variant-box').forEach(el => {
                    el.style.transition = 'none';
                    el.style.transform = 'scale(1)';
                    void el.offsetWidth;
                    el.style.transition = '';
                });
                
                // Reset counters
                totalClickCount = 0;
                demoClickCount = 0;
                totalClicks.textContent = '0';
                clickCount.textContent = '0';
                demoFeedback.innerHTML = '<span class="feedback-text">Click the button above!</span>';
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // All scale buttons
            document.querySelectorAll('.scale-btn').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    applyScale(this);
                    totalClickCount++;
                    totalClicks.textContent = totalClickCount;
                });
            });

            // Demo button
            document.getElementById('demoBtn').addEventListener('click', function(e) {
                demoClickCount++;
                clickCount.textContent = demoClickCount;
                totalClickCount++;
                totalClicks.textContent = totalClickCount;
                
                // Update feedback
                const messages = [
                    '🎉 Great click!',
                    '💪 Nice one!',
                    '✨ Awesome!',
                    '🚀 Keep going!',
                    '🌟 You\'re on fire!',
                    '🎯 Right on target!',
                    '💥 Boom!',
                    '⭐ Amazing!'
                ];
                const message = messages[Math.floor(Math.random() * messages.length)];
                demoFeedback.innerHTML = `<span class="feedback-text">${message} (${demoClickCount} clicks)</span>`;
            });

            // Controls
            toggleScaleBtn.addEventListener('click', toggleScale);
            resetAllBtn.addEventListener('click', resetAll);
            toggleIntensityBtn.addEventListener('click', toggleIntensity);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 's' && e.ctrlKey) {
                    e.preventDefault();
                    toggleScale();
                }
                if (e.key === 'Escape') {
                    resetAll();
                }
                if (e.key === '1' && e.ctrlKey) {
                    e.preventDefault();
                    setIntensity('low');
                    toggleIntensityBtn.textContent = '⚡ Low';
                }
                if (e.key === '2' && e.ctrlKey) {
                    e.preventDefault();
                    setIntensity('medium');
                    toggleIntensityBtn.textContent = '⚡ Medium';
                }
                if (e.key === '3' && e.ctrlKey) {
                    e.preventDefault();
                    setIntensity('high');
                    toggleIntensityBtn.textContent = '⚡ High';
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const box = card.querySelector('.variant-box');
                const label = card.querySelector('.variant-label');
                
                box.addEventListener('click', function(e) {
                    e.stopPropagation();
                    applyScale(this);
                    
                    // Update label feedback
                    const originalText = label.textContent;
                    label.textContent = '✓ Clicked!';
                    label.style.color = '#34c759';
                    setTimeout(() => {
                        label.textContent = originalText;
                        label.style.color = '';
                    }, 600);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.ScaleClick = {
                apply: applyScale,
                toggle: toggleScale,
                setIntensity: setIntensity,
                toggleIntensity: toggleIntensity,
                reset: resetAll,
                isEnabled: () => isEnabled,
                getIntensity: () => currentIntensity,
                getState: () => ({
                    enabled: isEnabled,
                    intensity: currentIntensity,
                    totalClicks: totalClickCount
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.intensity) {
                        setIntensity(config.intensity);
                    }
                    if (config.enabled !== undefined) {
                        isEnabled = config.enabled;
                    }
                    updateScale();
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateScale();
            intensityDisplay.textContent = INTENSITY_MAP[currentIntensity].label;
            toggleIntensityBtn.textContent = `⚡ ${INTENSITY_MAP[currentIntensity].label}`;

            console.log('✅ Scale on Click initialized!');
            console.log('📖 API: window.ScaleClick');
            console.log('📖 Usage:');
            console.log('  - Click buttons to see the scale effect');
            console.log('  - Keyboard shortcuts: Ctrl+S (toggle), Escape (reset)');
            console.log('  - Ctrl+1-3 (intensity), click variants for demo');

        })();
    </script>
</body>
</html>
