<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ease Spiral Navigation Bar — Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo-wrap">
    <h1>Ease Spiral Navigation Bar</h1>
    <p>A navigation bar where each link reveals a rotating spiral glow behind it on hover/focus. Pure CSS, no JavaScript required.</p>

    <nav class="ease-spiral-nav" aria-label="Primary">
      <a href="#" class="ease-spiral-nav-link ease-spiral-nav-link--active" aria-current="page">
        <span class="ease-spiral-nav-glow" aria-hidden="true"></span>
        <span class="ease-spiral-nav-label">Home</span>
      </a>
      <a href="#" class="ease-spiral-nav-link">
        <span class="ease-spiral-nav-glow" aria-hidden="true"></span>
        <span class="ease-spiral-nav-label">Accounts</span>
      </a>
      <a href="#" class="ease-spiral-nav-link">
        <span class="ease-spiral-nav-glow" aria-hidden="true"></span>
        <span class="ease-spiral-nav-label">Transfers</span>
      </a>
      <a href="#" class="ease-spiral-nav-link">
        <span class="ease-spiral-nav-glow" aria-hidden="true"></span>
        <span class="ease-spiral-nav-label">Cards</span>
      </a>
      <a href="#" class="ease-spiral-nav-link">
        <span class="ease-spiral-nav-glow" aria-hidden="true"></span>
        <span class="ease-spiral-nav-label">Support</span>
      </a>
    </nav>
  </main>

</body>
</html>
