<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Ratio Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of aspect-ratio utility classes displaying responsive 16:9 widescreen and 1:1 square scaling.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Aspect Ratio Utilities</h1>
      <p class="description">
        Demonstrates media box consistency. The elements below maintain their 
        proportions across changing viewport widths.
      </p>
    </header>

    <main class="showcase">
      <!-- 16:9 Widescreen Container -->
      <div class="showcase-card">
        <h3>16:9 Widescreen</h3>
        <div class="ratio-box ratio-16-9">
          <span>16:9 Content</span>
        </div>
      </div>

      <!-- 1:1 Square Container -->
      <div class="showcase-card">
        <h3>1:1 Square</h3>
        <div class="ratio-box ratio-1-1">
          <span>1:1 Content</span>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
