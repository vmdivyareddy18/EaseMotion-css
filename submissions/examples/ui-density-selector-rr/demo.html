<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Density Selector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>⚙️ UI Density Selector</h1>
        <p>Choose the layout density that best fits your workflow.</p>
    </header>

    <section class="density-grid">

        <div class="density-card compact">
            <h3>Compact</h3>

            <div class="preview">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>

            <span>Maximum information density</span>
        </div>

        <div class="density-card comfortable active">
            <h3>Comfortable</h3>

            <div class="preview comfortable-preview">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>

            <span>Balanced spacing and readability</span>
        </div>

        <div class="density-card spacious">
            <h3>Spacious</h3>

            <div class="preview spacious-preview">
                <div class="line"></div>
                <div class="line"></div>
            </div>

            <span>Extra room for focus and accessibility</span>
        </div>

    </section>

</div>

</body>
</html>
