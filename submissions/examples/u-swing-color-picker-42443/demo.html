<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swing Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="ease-color-picker">

        <h2>Choose Accent Color</h2>

        <div class="swatches">

            <button class="color pink" aria-label="Pink"></button>
            <button class="color blue" aria-label="Blue"></button>
            <button class="color green" aria-label="Green"></button>
            <button class="color orange" aria-label="Orange"></button>
            <button class="color purple" aria-label="Purple"></button>

        </div>

    </div>

</div>

</body>
</html>
