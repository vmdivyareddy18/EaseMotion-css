<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Pagination Component</h1>
    <p>This is a simple pagination component using EaseMotion CSS.</p>
    <ul class="ease-pagination">
  <li class="ease-page-item ease-disabled"><a class="ease-page-link">Prev</a></li>
  <li class="ease-page-item ease-active"><a class="ease-page-link">1</a></li>
  <li class="ease-page-item"><a class="ease-page-link">2</a></li>
  <li class="ease-page-item"><a class="ease-page-link">Next</a></li>
</ul>
</body>
</html>
