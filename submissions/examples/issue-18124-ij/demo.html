<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-3d-tilt-card - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>3D Tilt Card</h1>
    <div class="tilt-card" id="tiltCard">
      <div class="tilt-inner" id="tiltInner">
        <h2>EaseMotion</h2>
        <p>Move your mouse over this card to see the 3D perspective tilt effect in action.</p>
      </div>
    </div>
  </div>
  <script>
    const card = document.getElementById('tiltCard');
    const inner = document.getElementById('tiltInner');
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const rx = (y - 0.5) * -30;
      const ry = (x - 0.5) * 30;
      inner.style.transform = 'rotateX(' + rx + 'deg) rotateY(' + ry + 'deg)';
    });
    card.addEventListener('mouseleave', () => {
      inner.style.transform = 'rotateX(0) rotateY(0)';
    });
  </script>
</body>
</html>
