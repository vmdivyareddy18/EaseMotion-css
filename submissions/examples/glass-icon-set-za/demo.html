<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Icon Set</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glass-page">
    <h1>Glass Icons</h1>
    <div class="glass-grid">
      <div class="glass-icon" style="--c:#6366f1">
        <span class="icon-emoji">&#9889;</span>
        <span class="icon-label">Lightning</span>
      </div>
      <div class="glass-icon" style="--c:#a855f7">
        <span class="icon-emoji">&#9733;</span>
        <span class="icon-label">Star</span>
      </div>
      <div class="glass-icon" style="--c:#ec4899">
        <span class="icon-emoji">&#9829;</span>
        <span class="icon-label">Heart</span>
      </div>
      <div class="glass-icon" style="--c:#22c55e">
        <span class="icon-emoji">&#10003;</span>
        <span class="icon-label">Check</span>
      </div>
      <div class="glass-icon" style="--c:#f59e0b">
        <span class="icon-emoji">&#9881;</span>
        <span class="icon-label">Gear</span>
      </div>
      <div class="glass-icon" style="--c:#06b6d4">
        <span class="icon-emoji">&#128752;</span>
        <span class="icon-label">Drop</span>
      </div>
    </div>
  </div>
</body>
</html>
