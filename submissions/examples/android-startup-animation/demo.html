<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Startup Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="startup-screen">

    <div class="robot">

        <div class="head">
            <span class="antenna left"></span>
            <span class="antenna right"></span>

            <div class="eyes">
                <span class="eye"></span>
                <span class="eye"></span>
            </div>
        </div>

        <div class="body">
            <div class="arm left-arm"></div>
            <div class="torso"></div>
            <div class="arm right-arm"></div>
        </div>

        <div class="legs">
            <div class="leg left-leg"></div>
            <div class="leg right-leg"></div>
        </div>

    </div>

    <h2>ANDROID</h2>

    <div class="loading">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="progress-container">
        <div class="progress"></div>
    </div>

    <div class="status"></div>

    <div class="version">
        Android v16 • EaseMotion CSS
    </div>

</div>

</body>
</html>
