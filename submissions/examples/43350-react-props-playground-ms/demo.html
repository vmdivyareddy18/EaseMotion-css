<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Props Playground Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-react-container">
    <div class="ease-react-header">
      <h2 class="ease-react-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        React &lt;Animate&gt; Wrapper
      </h2>
      <p class="ease-react-desc">Demonstrating how to map React props to EaseMotion utility classes and inline styles.</p>
    </div>

    <div class="ease-react-layout">
      
      <!-- Controls -->
      <div class="ease-react-controls">
        <div class="ease-react-control-group">
          <label class="ease-react-label">type="<span id="lblType" class="ease-react-val-display">fade-in-up</span>"</label>
          <select id="propType" class="ease-react-select">
            <option value="fade-in-up">fade-in-up</option>
            <option value="fade-in-down">fade-in-down</option>
            <option value="bounce-in">bounce-in</option>
            <option value="zoom-in">zoom-in</option>
            <option value="flip-in-x">flip-in-x</option>
          </select>
        </div>

        <div class="ease-react-control-group">
          <label class="ease-react-label">duration={<span id="lblDuration" class="ease-react-val-display">0.5</span>}</label>
          <input type="range" id="propDuration" class="ease-react-range" min="0.1" max="2" step="0.1" value="0.5">
        </div>

        <div class="ease-react-control-group">
          <label class="ease-react-label">delay={<span id="lblDelay" class="ease-react-val-display">0</span>}</label>
          <input type="range" id="propDelay" class="ease-react-range" min="0" max="1" step="0.1" value="0">
        </div>
      </div>

      <!-- Stage -->
      <div class="ease-react-stage">
        <div class="ease-react-stage-header">
          &lt;Animate <span id="codePreview">type="fade-in-up" duration={0.5} delay={0}</span>&gt;
        </div>
        <div class="ease-react-stage-body">
          
          <div id="targetElement" class="ease-react-box">
            Child Component
          </div>

          <button id="remountBtn" class="ease-react-btn">Remount</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const typeSelect = document.getElementById('propType');
    const durInput = document.getElementById('propDuration');
    const delInput = document.getElementById('propDelay');
    
    const lblType = document.getElementById('lblType');
    const lblDur = document.getElementById('lblDuration');
    const lblDel = document.getElementById('lblDelay');
    const codePreview = document.getElementById('codePreview');
    
    const target = document.getElementById('targetElement');
    const remountBtn = document.getElementById('remountBtn');

    function updatePreview() {
      const type = typeSelect.value;
      const dur = durInput.value;
      const del = delInput.value;

      // Update Labels
      lblType.textContent = type;
      lblDur.textContent = dur;
      lblDel.textContent = del;
      codePreview.textContent = `type="${type}" duration={${dur}} delay={${del}}`;

      // Apply to element
      // Reset animation
      target.className = 'ease-react-box';
      void target.offsetWidth; // trigger reflow
      
      // Apply new classes and inline styles (simulating React style={{}})
      target.className = `ease-react-box ease-${type}`;
      target.style.animationDuration = `${dur}s`;
      target.style.animationDelay = `${del}s`;
    }

    [typeSelect, durInput, delInput].forEach(el => {
      el.addEventListener('input', updatePreview);
    });

    remountBtn.addEventListener('click', updatePreview);

    // Init
    updatePreview();
  </script>

</body>
</html>
