<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Badge Pulse With Quiet Mode</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <header class="demo-header">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1>Notification Badge Pulse With Quiet Mode</h1>
      <p>Shows animated unread notification badges alongside a calm static variant.</p>
    </header>
    <section class="notification-grid">
      <button class="notification-button" type="button">Inbox <span class="notification-badge">3</span></button>
      <button class="notification-button quiet" type="button">Quiet inbox <span class="notification-badge">8</span></button>
    </section>
  </main>
</body>
</html>
