<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Countdown Timer</h1>
    <div class="countdown" id="countdown">
      <div class="digit-group">
        <div class="digit-wrap"><span class="digit" id="m1">0</span></div>
        <div class="digit-wrap"><span class="digit" id="m2">5</span></div>
      </div>
      <span class="separator">:</span>
      <div class="digit-group">
        <div class="digit-wrap"><span class="digit" id="s1">0</span></div>
        <div class="digit-wrap"><span class="digit" id="s2">0</span></div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="startCountdown()">Start</button>
      <button class="ctrl-btn" onclick="resetCountdown()">Reset</button>
    </div>
  </div>
  <script>
    let totalSeconds = 300;
    let timer = null;
    let running = false;

    function updateDisplay() {
      const m = Math.floor(totalSeconds / 60);
      const s = totalSeconds % 60;
      document.getElementById('m1').textContent = Math.floor(m / 10);
      document.getElementById('m2').textContent = m % 10;
      document.getElementById('s1').textContent = Math.floor(s / 10);
      document.getElementById('s2').textContent = s % 10;
    }

    function animateDigit(id, newVal) {
      const el = document.getElementById(id);
      if (el.textContent !== String(newVal)) {
        el.classList.remove('slide-in');
        void el.offsetWidth;
        el.textContent = newVal;
        el.classList.add('slide-in');
      }
    }

    function tick() {
      if (totalSeconds <= 0) { clearInterval(timer); running = false; return; }
      const oldM = Math.floor(totalSeconds / 60);
      const oldS = totalSeconds % 60;
      totalSeconds--;
      const newM = Math.floor(totalSeconds / 60);
      const newS = totalSeconds % 60;
      animateDigit('m1', Math.floor(newM / 10));
      animateDigit('m2', newM % 10);
      animateDigit('s1', Math.floor(newS / 10));
      animateDigit('s2', newS % 10);
    }

    function startCountdown() {
      if (running) return;
      if (totalSeconds <= 0) return;
      running = true;
      timer = setInterval(tick, 1000);
    }

    function resetCountdown() {
      clearInterval(timer);
      running = false;
      totalSeconds = 300;
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
