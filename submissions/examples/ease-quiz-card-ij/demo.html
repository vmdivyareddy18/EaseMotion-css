<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Quiz Card</h1>
    <p class="subtitle">Click the card to flip and reveal the answer</p>
    <div class="flip-card" id="flipCard">
      <div class="flip-card-inner">
        <div class="flip-card-front">
          <h2>What does CSS stand for?</h2>
          <p>Click to reveal</p>
        </div>
        <div class="flip-card-back">
          <h3>Cascading Style Sheets</h3>
          <p>A stylesheet language used to describe the presentation of a document written in HTML or XML.</p>
        </div>
      </div>
    </div>
    <p class="hint">Click the card to flip</p>
  </section>

  <div class="controls">
    <div class="control-group">
      <label for="cardBg">Card BG</label>
      <input type="color" id="cardBg" value="#2d2d44">
    </div>
    <div class="control-group">
      <label for="borderColor">Border</label>
      <input type="color" id="borderColor" value="#4ecdc4">
    </div>
    <div class="control-group">
      <label for="flipDuration">Duration: <span id="flipDurationVal">0.6</span>s</label>
      <input type="range" id="flipDuration" min="0.1" max="1.5" step="0.05" value="0.6">
    </div>
  </div>

  <script>
    document.getElementById('flipCard').addEventListener('click', function() {
      this.classList.toggle('flipped');
    });
    document.getElementById('cardBg').addEventListener('input', function() {
      document.documentElement.style.setProperty('--card-bg', this.value);
    });
    document.getElementById('borderColor').addEventListener('input', function() {
      document.documentElement.style.setProperty('--border-color', this.value);
    });
    document.getElementById('flipDuration').addEventListener('input', function() {
      document.documentElement.style.setProperty('--flip-duration', this.value + 's');
      document.getElementById('flipDurationVal').textContent = this.value;
    });
  </script>
</body>
</html>
