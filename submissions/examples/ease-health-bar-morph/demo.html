<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health Bar Morph – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>❤️ Health Bar Morph</h1>
    <p class="subtitle">Health bar with liquid fill effect</p>

    <div class="hb-container">
      <div class="hb-scene">
        <!-- Health bar container -->
        <div class="health-bar-container">
          <!-- Health bar background -->
          <div class="health-bar-bg"></div>

          <!-- Liquid fill -->
          <div class="liquid-fill">
            <!-- Liquid surface waves -->
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
            <div class="wave wave-3"></div>

            <!-- Liquid glow -->
            <div class="liquid-glow"></div>

            <!-- Bubbles -->
            <div class="bubble b1"></div>
            <div class="bubble b2"></div>
            <div class="bubble b3"></div>
            <div class="bubble b4"></div>
            <div class="bubble b5"></div>
            <div class="bubble b6"></div>
            <div class="bubble b7"></div>
            <div class="bubble b8"></div>
            <div class="bubble b9"></div>
            <div class="bubble b10"></div>

            <!-- Highlight -->
            <div class="highlight"></div>
          </div>

          <!-- Health bar frame -->
          <div class="health-bar-frame">
            <div class="frame-corner fc-tl"></div>
            <div class="frame-corner fc-tr"></div>
            <div class="frame-corner fc-bl"></div>
            <div class="frame-corner fc-br"></div>
            <div class="frame-edge fe-top"></div>
            <div class="frame-edge fe-bottom"></div>
            <div class="frame-edge fe-left"></div>
            <div class="frame-edge fe-right"></div>
          </div>

          <!-- Health text -->
          <div class="health-text">
            <span class="health-value" id="healthValue">100</span>
            <span class="health-label">HP</span>
          </div>

          <!-- Status icon -->
          <div class="status-icon">❤️</div>

          <!-- Damage flash -->
          <div class="damage-flash"></div>

          <!-- Heal glow -->
          <div class="heal-glow"></div>
        </div>

        <!-- Controls panel -->
        <div class="health-controls">
          <button id="damageBtn">💥 Damage</button>
          <button id="healBtn">💚 Heal</button>
          <button id="resetBtn">⟳ Reset</button>
          <label>
            Fill Speed
            <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
          </label>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const liquidFill = document.querySelector('.liquid-fill');
      const healthValue = document.getElementById('healthValue');
      const damageFlash = document.querySelector('.damage-flash');
      const healGlow = document.querySelector('.heal-glow');
      const waves = document.querySelectorAll('.wave');
      const bubbles = document.querySelectorAll('.bubble');
      const highlight = document.querySelector('.highlight');
      const statusIcon = document.querySelector('.status-icon');

      const damageBtn = document.getElementById('damageBtn');
      const healBtn = document.getElementById('healBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');

      let currentHealth = 100;
      let targetHealth = 100;
      let maxHealth = 100;
      let speedMultiplier = 1;
      let isAnimating = false;
      let animationFrame = null;
      let lastTimestamp = 0;
      let wavePhase = 0;

      // ----- Apply speed -----
      function applySpeed() {
        // Wave animation
        waves.forEach((wave, i) => {
          const duration = (2 + i * 0.3) / speedMultiplier;
          wave.style.setProperty('--wave-duration', duration + 's');
          wave.style.setProperty('--wave-delay', ((i * 0.1) / speedMultiplier) + 's');
        });

        // Bubble animation
        bubbles.forEach((bubble, i) => {
          const duration = (3 + (i % 3) * 0.5) / speedMultiplier;
          bubble.style.setProperty('--bubble-duration', duration + 's');
          bubble.style.setProperty('--bubble-delay', ((i * 0.2) / speedMultiplier) + 's');
        });

        // Highlight shimmer
        highlight.style.setProperty('--highlight-duration', (1.5 / speedMultiplier) + 's');

        // Damage flash
        damageFlash.style.setProperty('--flash-duration', (0.3 / speedMultiplier) + 's');

        // Heal glow
        healGlow.style.setProperty('--heal-duration', (0.8 / speedMultiplier) + 's');
      }

      // ----- Update health bar -----
      function updateHealth(newHealth, animate = true) {
        targetHealth = Math.max(0, Math.min(maxHealth, newHealth));

        if (animate) {
          isAnimating = true;
          // Animate the fill
          liquidFill.style.transition = `height ${0.8 / speedMultiplier}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
          liquidFill.style.height = (targetHealth / maxHealth) * 100 + '%';

          // Update text with counter animation
          animateCounter(currentHealth, targetHealth);

          // Trigger effects
          if (targetHealth < currentHealth) {
            // Damage effect
            damageFlash.style.opacity = '0.6';
            setTimeout(() => {
              damageFlash.style.opacity = '0';
            }, 300 / speedMultiplier);

            statusIcon.textContent = '💔';
            setTimeout(() => {
              statusIcon.textContent = '❤️';
            }, 500 / speedMultiplier);

            // Change color to red
            liquidFill.style.setProperty('--liquid-color', '#ff4444');
            setTimeout(() => {
              liquidFill.style.setProperty('--liquid-color', '#ff6b6b');
            }, 800 / speedMultiplier);

          } else if (targetHealth > currentHealth) {
            // Heal effect
            healGlow.style.opacity = '0.6';
            setTimeout(() => {
              healGlow.style.opacity = '0';
            }, 800 / speedMultiplier);

            statusIcon.textContent = '💚';
            setTimeout(() => {
              statusIcon.textContent = '❤️';
            }, 500 / speedMultiplier);

            // Change color to green temporarily
            liquidFill.style.setProperty('--liquid-color', '#44ff44');
            setTimeout(() => {
              liquidFill.style.setProperty('--liquid-color', '#ff6b6b');
            }, 800 / speedMultiplier);
          }

          currentHealth = targetHealth;

          setTimeout(() => {
            isAnimating = false;
          }, 800 / speedMultiplier);

        } else {
          currentHealth = targetHealth;
          liquidFill.style.height = (targetHealth / maxHealth) * 100 + '%';
          healthValue.textContent = Math.round(targetHealth);
        }
      }

      // ----- Animate counter -----
      function animateCounter(from, to) {
        const duration = 400 / speedMultiplier;
        const startTime = Date.now();

        function updateCounter() {
          const elapsed = Date.now() - startTime;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.round(from + (to - from) * eased);

          healthValue.textContent = current;

          if (progress < 1) {
            requestAnimationFrame(updateCounter);
          } else {
            healthValue.textContent = Math.round(to);
          }
        }

        updateCounter();
      }

      // ----- Damage -----
      function damage(amount) {
        if (isAnimating) return;
        const newHealth = Math.max(0, currentHealth - amount);
        updateHealth(newHealth, true);
      }

      // ----- Heal -----
      function heal(amount) {
        if (isAnimating) return;
        const newHealth = Math.min(maxHealth, currentHealth + amount);
        updateHealth(newHealth, true);
      }

      // ----- Reset -----
      function resetHealth() {
        if (isAnimating) return;
        updateHealth(maxHealth, true);
      }

      // ----- Update wave -----
      function updateWave(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        const speed = 0.01 * speedMultiplier;
        wavePhase += speed;

        if (wavePhase > 1) wavePhase = 0;

        // Move waves based on fill level
        const fillPercent = parseFloat(liquidFill.style.height) || 100;
        const waveY = 100 - fillPercent;

        waves.forEach((wave, i) => {
          const offset = i * 0.2;
          const x = Math.sin((wavePhase + offset) * Math.PI * 2) * 10;
          const y = waveY + Math.sin((wavePhase + offset + 0.5) * Math.PI * 2) * 3;
          wave.style.transform = `translate(${x}px, ${y}%)`;
        });

        // Animate bubbles
        bubbles.forEach((bubble, i) => {
          const offset = i * 0.3;
          const rise = (wavePhase + offset) % 1;
          const xPos = (i / bubbles.length) * 100 + Math.sin(wavePhase * 2 + i) * 15;
          bubble.style.left = Math.max(5, Math.min(95, xPos)) + '%';
          bubble.style.bottom = (rise * 80 + 10) + '%';
          bubble.style.opacity = 0.3 + Math.sin(wavePhase * 3 + i) * 0.2;
        });

        animationFrame = requestAnimationFrame(updateWave);
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- Init -----
      function init() {
        // Set initial state
        liquidFill.style.height = '100%';
        healthValue.textContent = '100';
        currentHealth = 100;
        targetHealth = 100;
        liquidFill.style.setProperty('--liquid-color', '#ff6b6b');

        applySpeed();

        // Start wave animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(updateWave);

        // Auto damage after 2 seconds to show effect
        setTimeout(() => {
          damage(30);
        }, 2000);

        // Auto heal after 4 seconds
        setTimeout(() => {
          heal(20);
        }, 4500);

        // Auto damage again
        setTimeout(() => {
          damage(50);
        }, 7000);

        // Auto heal to full
        setTimeout(() => {
          heal(60);
        }, 9000);
      }

      // ----- Event listeners -----
      damageBtn.addEventListener('click', () => damage(25));
      healBtn.addEventListener('click', () => heal(25));
      resetBtn.addEventListener('click', resetHealth);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });

      init();
    })();
  </script>

</body>
</html>
