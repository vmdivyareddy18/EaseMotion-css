<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EaseMotion CSS Demo</title>

    <link rel="stylesheet" href="style.css">

    <!-- Replace this path with the project's actual CSS file -->
    <link rel="stylesheet" href="../../css/easemotion.css">

</head>

<body>

    <header>
        <h1>EaseMotion CSS</h1>
        <p>Interactive Animation Demo</p>
    </header>

    <section class="container">

        <div class="card">
            <h2>Fade In</h2>
            <button class="demo-btn fade-in">
                Preview
            </button>
        </div>

        <div class="card">
            <h2>Bounce</h2>
            <button class="demo-btn bounce">
                Preview
            </button>
        </div>

        <div class="card">
            <h2>Slide Left</h2>
            <button class="demo-btn slide-left">
                Preview
            </button>
        </div>

        <div class="card">
            <h2>Zoom In</h2>
            <button class="demo-btn zoom-in">
                Preview
            </button>
        </div>

        <div class="card">
            <h2>Rotate</h2>
            <button class="demo-btn rotate">
                Preview
            </button>
        </div>

        <div class="card">
            <h2>Pulse</h2>
            <button class="demo-btn pulse">
                Preview
            </button>
        </div>

    </section>

    <footer>
        <p>EaseMotion CSS Demo Page</p>
    </footer>

</body>

</html>
