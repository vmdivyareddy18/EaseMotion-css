<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Span Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Column Span</h1>
      <p class="subtitle">Makes an element span across all columns in a multi-column layout.</p>
      <span class="badge">CSS Property: column-span</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">column-span: none</span>
          <span class="demo-value column-span-sm">Column Span variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">column-span: all</span>
          <span class="demo-value column-span-md">Column Span variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="column-span"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
