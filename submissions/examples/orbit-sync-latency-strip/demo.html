<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>orbit sync latency strip demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="orbit sync latency strip demo">
    <section class="motion-card" data-pattern="strip">
      <div class="status-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="card-copy">
        <p class="eyebrow">Latency</p>
        <h1>orbit sync latency strip</h1>
        <p>3 regions synced with a focused motion cue that keeps status changes easy to scan.</p>
      </div>
      <div class="metric-panel" aria-label="Latency value">
        <strong>42ms</strong>
        <span>Latency</span>
      </div>
      <div class="progress-row" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
