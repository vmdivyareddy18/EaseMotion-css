<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Mouse Follow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tmf-container">
    <h1>Tooltip Mouse Follow</h1>
    <p class="tmf-subtitle">Tooltip that follows the cursor with smooth scale+fade entrance</p>

    <div class="tmf-grid">
      <div class="tmf-item" data-tip="Hello! I'm a default tooltip">Hover me</div>
      <div class="tmf-item" data-tip="I have rich content<br><strong>Bold text</strong> and <em>italics</em>">Rich content</div>
      <div class="tmf-item" data-tip="A very long tooltip message that spans multiple lines to test text wrapping behavior">Long text</div>
      <div class="tmf-item" data-tip="🔹 Lists<br>🔹 Items<br>🔹 Here">With bullets</div>
      <div class="tmf-item" data-tip="Pure CSS animated tooltip. The delay makes it feel smooth and natural." data-tip-pos="top">Position: top</div>
      <div class="tmf-item" data-tip="This follows your mouse with a slight lag for a premium feel." data-tip-pos="bottom">Position: bottom</div>
      <div class="tmf-item" data-tip="Tooltips are great for UX!" data-tip-pos="left">Position: left</div>
      <div class="tmf-item" data-tip="Enhance user experience with contextual help." data-tip-pos="right">Position: right</div>
    </div>
  </div>

  <div class="tmf-tooltip" id="tmf-tooltip">
    <div class="tmf-tooltip-content"></div>
  </div>

  <script>
    const tooltip = document.getElementById('tmf-tooltip');
    const content = tooltip.querySelector('.tmf-tooltip-content');
    const items = document.querySelectorAll('.tmf-item');
    let currentTarget = null;
    let mouseX = 0, mouseY = 0;
    let tooltipX = 0, tooltipY = 0;
    let isVisible = false;

    items.forEach(item => {
      item.addEventListener('mouseenter', e => {
        currentTarget = item;
        const html = item.dataset.tip;
        content.innerHTML = html;
        tooltip.classList.add('tmf-tooltip-visible');
        isVisible = true;
      });

      item.addEventListener('mouseleave', () => {
        currentTarget = null;
        tooltip.classList.remove('tmf-tooltip-visible');
        isVisible = false;
      });

      item.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });
    });

    function animateTooltip() {
      if (isVisible) {
        const pos = currentTarget ? (currentTarget.dataset.tipPos || 'bottom') : 'bottom';
        let offsetX = 0, offsetY = 0;
        switch (pos) {
          case 'top':    offsetY = -20; break;
          case 'bottom': offsetY = 20;  break;
          case 'left':   offsetX = -20; break;
          case 'right':  offsetX = 20;  break;
        }

        tooltipX += (mouseX + offsetX - tooltipX) * 0.1;
        tooltipY += (mouseY + offsetY - tooltipY) * 0.1;
        tooltip.style.transform = `translate(${tooltipX}px, ${tooltipY}px)`;
      }
      requestAnimationFrame(animateTooltip);
    }
    animateTooltip();
  </script>
</body>
</html>
