<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-tilt-left – Tilt Left</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Tilt Left</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Hover over the card to tilt it to the left.</p>

    <div class="tilt-left-card ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-hover-shadow-xl ease-transition"
         style="--ease-tilt-deg: -5deg;">
      <p class="ease-text-lg ease-font-semibold">Tilted Card</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Smooth 0.3s rotation</p>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">Rotates <code>var(--ease-tilt-deg)</code> on hover (default -5deg).</p>
  </div>

</body>
</html>
