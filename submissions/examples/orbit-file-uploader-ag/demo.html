<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A premium minimalist Orbit File Uploader component featuring dual-concentric rotating orbit trajectories and satellite nodes built on EaseMotion variables."
    />
    <title>Orbit File Uploader | EaseMotion CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../core/variables.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --demo-bg: #fafafa;
        --demo-card-bg: #ffffff;
        --demo-text: #0f172a;
        --demo-muted: #64748b;
        --demo-border: #e2e8f0;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --demo-bg: #090a0f;
          --demo-card-bg: #12141c;
          --demo-text: #f8fafc;
          --demo-muted: #94a3b8;
          --demo-border: #1e293b;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--demo-bg);
        color: var(--demo-text);
        font-family:
          "Plus Jakarta Sans",
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 3rem 1.5rem;
      }

      .demo-layout {
        width: 100%;
        max-width: 440px;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .demo-header {
        text-align: center;
        margin-bottom: 0.5rem;
      }

      .demo-header h1 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0 0 0.5rem;
        letter-spacing: -0.02em;
      }

      .demo-header p {
        font-size: 0.875rem;
        color: var(--demo-muted);
        margin: 0;
      }

      /* Simulated Progress Bar */
      .simulated-progress-container-ag {
        width: 100%;
        height: 4px;
        background-color: var(--demo-border);
        border-radius: 999px;
        margin-top: 1rem;
        overflow: hidden;
        display: none;
      }

      .simulated-progress-bar-ag {
        width: 0%;
        height: 100%;
        background-color: var(--ease-color-primary, #6c63ff);
        border-radius: 999px;
        transition: width 0.1s linear;
      }

      /* Demo Interactive Controls panel */
      .controls-card {
        background-color: var(--demo-card-bg);
        border: 1px solid var(--demo-border);
        border-radius: 12px;
        padding: 1.25rem;
      }

      .controls-card h2 {
        font-size: 0.875rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin: 0 0 1rem;
        color: var(--demo-muted);
      }

      .control-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
      }

      .btn-control {
        background-color: var(--demo-bg);
        border: 1px solid var(--demo-border);
        color: var(--demo-text);
        padding: 0.625rem 0.875rem;
        border-radius: 8px;
        font-size: 0.8125rem;
        font-weight: 500;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s ease;
      }

      .btn-control:hover:not(:disabled) {
        border-color: var(--ease-color-primary, #6c63ff);
        background-color: rgba(108, 99, 255, 0.04);
      }

      .btn-control.active {
        background-color: var(--ease-color-primary, #6c63ff);
        border-color: var(--ease-color-primary, #6c63ff);
        color: #ffffff;
      }

      /* Uploaded Files Section */
      .files-section {
        display: none;
        flex-direction: column;
        gap: 0.5rem;
      }

      .files-section-title {
        font-size: 0.8125rem;
        font-weight: 600;
        color: var(--demo-muted);
        margin: 0.5rem 0 0.25rem;
      }

      .file-item {
        background-color: var(--demo-card-bg);
        border: 1px solid var(--demo-border);
        border-radius: 8px;
        padding: 0.75rem 1rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 0.8125rem;
        animation: file-item-appear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)
          forwards;
      }

      @keyframes file-item-appear {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.98);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .file-item-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .file-item-icon {
        color: var(--ease-color-primary, #6c63ff);
        display: flex;
      }

      .file-item-meta {
        display: flex;
        flex-direction: column;
      }

      .file-name {
        font-weight: 600;
        color: var(--demo-text);
      }

      .file-size {
        font-size: 0.75rem;
        color: var(--demo-muted);
      }

      .btn-delete-file {
        background: none;
        border: none;
        color: var(--demo-muted);
        cursor: pointer;
        padding: 0.25rem;
        border-radius: 4px;
        display: flex;
        transition: all 0.15s ease;
      }

      .btn-delete-file:hover {
        background-color: rgba(220, 38, 38, 0.08);
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div class="demo-layout">
      <!-- Uploader Title -->
      <header class="demo-header">
        <h1>Orbit File Uploader</h1>
        <p>Minimalist uploader featuring responsive orbit feedback.</p>
      </header>

      <!-- Main Component Uploader Card -->
      <div class="orbit-uploader-card-ag">
        <label
          for="file-input"
          class="orbit-uploader-dropzone-ag"
          id="dropzone"
          tabindex="0"
          role="button"
          aria-label="Upload files"
          aria-describedby="upload-hint"
        >
          <input
            type="file"
            id="file-input"
            class="orbit-uploader-input-ag"
            multiple
            accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.zip"
          />

          <div class="orbit-uploader-system-ag">
            <div class="orbit-uploader-ring-outer-ag">
              <span class="orbit-uploader-satellite-ag"></span>
            </div>
            <div class="orbit-uploader-ring-inner-ag">
              <span class="orbit-uploader-satellite-ag"></span>
            </div>
            <div class="orbit-uploader-badge-ag">
              <!-- Central Upload Icon -->
              <svg
                id="badge-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="22"
                height="22"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
            </div>
            <div class="orbit-uploader-ripple-ag"></div>
          </div>

          <div class="orbit-uploader-text-area-ag">
            <h3 class="orbit-uploader-title-ag" id="upload-title">
              Select files to upload
            </h3>
            <p class="orbit-uploader-description-ag" id="upload-desc">
              or drag and drop them here
            </p>
            <p class="orbit-uploader-hint-ag" id="upload-hint">
              PDF, ZIP, DOCX, PNG, or JPG (max. 50MB)
            </p>
          </div>

          <!-- Progress bar shown during simulated upload -->
          <div class="simulated-progress-container-ag" id="progress-container">
            <div class="simulated-progress-bar-ag" id="progress-bar"></div>
          </div>
        </label>
      </div>

      <!-- Uploaded Files Section -->
      <section class="files-section" id="files-section">
        <h2 class="files-section-title">Completed Uploads</h2>
        <div id="files-list"></div>
      </section>

      <!-- Interactive Simulation Control Panel -->
      <section class="controls-card">
        <h2>Interactive States Simulation</h2>
        <div class="control-grid">
          <button class="btn-control" id="btn-simulate-upload">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="14"
              height="14"
            >
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Simulate Upload
          </button>
          <button class="btn-control" id="btn-simulate-drag">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="14"
              height="14"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
            Drag Over (CSS)
          </button>
          <button class="btn-control" id="btn-toggle-disable">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="14"
              height="14"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"></line>
            </svg>
            Toggle Disabled
          </button>
          <button class="btn-control" id="btn-reset">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              width="14"
              height="14"
            >
              <path
                d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"
              ></path>
            </svg>
            Reset State
          </button>
        </div>
      </section>
    </div>

    <!-- Scripting for interactivity, accessibility, and demo simulations -->
    <script>
      const dropzone = document.getElementById("dropzone");
      const fileInput = document.getElementById("file-input");
      const uploadTitle = document.getElementById("upload-title");
      const uploadDesc = document.getElementById("upload-desc");
      const badgeIcon = document.getElementById("badge-icon");
      const progressContainer = document.getElementById("progress-container");
      const progressBar = document.getElementById("progress-bar");
      const filesSection = document.getElementById("files-section");
      const filesList = document.getElementById("files-list");

      // Control Buttons
      const btnSimulateUpload = document.getElementById("btn-simulate-upload");
      const btnSimulateDrag = document.getElementById("btn-simulate-drag");
      const btnToggleDisable = document.getElementById("btn-toggle-disable");
      const btnReset = document.getElementById("btn-reset");

      let uploadedFiles = [];
      let isUploading = false;
      let isDisabled = false;

      // ── Keydown Accessibility for Label Element ──
      dropzone.addEventListener("keydown", (e) => {
        if (isDisabled || isUploading) return;
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          fileInput.click();
        }
      });

      // ── Drag & Drop Interactivity ──
      ["dragenter", "dragover"].forEach((eventName) => {
        dropzone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            if (isDisabled || isUploading) return;
            dropzone.classList.add("drag-over");
          },
          false
        );
      });

      ["dragleave", "dragend", "drop"].forEach((eventName) => {
        dropzone.addEventListener(
          eventName,
          (e) => {
            e.preventDefault();
            dropzone.classList.remove("drag-over");
          },
          false
        );
      });

      dropzone.addEventListener("drop", (e) => {
        if (isDisabled || isUploading) return;
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length > 0) {
          handleFiles(files);
        }
      });

      fileInput.addEventListener("change", (e) => {
        if (fileInput.files.length > 0) {
          handleFiles(fileInput.files);
        }
      });

      // ── File Upload Processor ──
      function handleFiles(files) {
        if (isUploading) return;
        isUploading = true;

        // Reset visual state
        dropzone.className = "orbit-uploader-dropzone-ag is-uploading";
        btnSimulateUpload.disabled = true;
        btnSimulateDrag.disabled = true;

        uploadTitle.textContent = "Uploading assets...";
        uploadDesc.textContent = "Establishing secure orbital connection...";
        progressContainer.style.display = "block";
        progressBar.style.width = "0%";

        let progress = 0;
        const fileNames = Array.from(files)
          .map((f) => f.name)
          .join(", ");
        const totalSize = Array.from(files).reduce((acc, f) => acc + f.size, 0);

        const interval = setInterval(() => {
          progress += 5;
          progressBar.style.width = `${progress}%`;
          uploadDesc.textContent = `Transmitting file packet: ${progress}%`;

          if (progress >= 100) {
            clearInterval(interval);
            completeUpload(files);
          }
        }, 80);
      }

      function completeUpload(files) {
        // Switch to success class triggers ripples and green highlights
        dropzone.className = "orbit-uploader-dropzone-ag is-success";
        uploadTitle.textContent = "Files Saved Successfully";
        uploadDesc.textContent = "Synchronized to secure drive.";
        progressContainer.style.display = "none";

        // Modern thin SVG Checkmark icon during success
        badgeIcon.innerHTML = `
          <polyline points="20 6 9 17 4 12"></polyline>
        `;

        // Register files into uploaded registry
        Array.from(files).forEach((file) => {
          uploadedFiles.push({
            name: file.name,
            size: formatBytes(file.size),
          });
        });

        renderFilesList();

        setTimeout(() => {
          resetToIdle();
        }, 3000);
      }

      function resetToIdle() {
        isUploading = false;
        dropzone.className = "orbit-uploader-dropzone-ag";
        uploadTitle.textContent = "Select files to upload";
        uploadDesc.textContent = "or drag and drop them here";
        progressContainer.style.display = "none";
        progressBar.style.width = "0%";

        // Revert to Upload arrow SVG icon
        badgeIcon.innerHTML = `
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        `;

        btnSimulateUpload.disabled = false;
        btnSimulateDrag.disabled = false;
        fileInput.value = "";
      }

      // ── Simulation Controls ──
      btnSimulateUpload.addEventListener("click", () => {
        if (isDisabled || isUploading) return;
        const simulatedFile = [
          { name: "orbit_design_draft.pdf", size: 4500000 },
        ];
        handleFiles(simulatedFile);
      });

      btnSimulateDrag.addEventListener("click", () => {
        if (isDisabled || isUploading) return;
        btnSimulateDrag.classList.toggle("active");
        if (btnSimulateDrag.classList.contains("active")) {
          dropzone.classList.add("drag-over");
        } else {
          dropzone.classList.remove("drag-over");
        }
      });

      btnToggleDisable.addEventListener("click", () => {
        isDisabled = !isDisabled;
        btnToggleDisable.classList.toggle("active", isDisabled);
        btnSimulateUpload.disabled = isDisabled;
        btnSimulateDrag.disabled = isDisabled;

        if (isDisabled) {
          dropzone.classList.add("is-disabled");
          uploadTitle.textContent = "Uploader Disabled";
          uploadDesc.textContent = "Requires system admin authorization.";
        } else {
          dropzone.classList.remove("is-disabled");
          resetToIdle();
        }
      });

      btnReset.addEventListener("click", () => {
        isDisabled = false;
        btnToggleDisable.classList.remove("active");
        btnSimulateDrag.classList.remove("active");
        uploadedFiles = [];
        renderFilesList();
        resetToIdle();
      });

      // Helper utilities
      function formatBytes(bytes, decimals = 1) {
        if (bytes === 0) return "0 Bytes";
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ["Bytes", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (
          parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + " " + sizes[i]
        );
      }

      function renderFilesList() {
        if (uploadedFiles.length === 0) {
          filesSection.style.display = "none";
          filesList.innerHTML = "";
          return;
        }

        filesSection.style.display = "flex";
        filesList.innerHTML = uploadedFiles
          .map(
            (file, idx) => `
          <div class="file-item">
            <div class="file-item-info">
              <span class="file-item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                </svg>
              </span>
              <div class="file-item-meta">
                <span class="file-name">${file.name}</span>
                <span class="file-size">${file.size}</span>
              </div>
            </div>
            <button class="btn-delete-file" aria-label="Remove file" onclick="removeFile(${idx})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
              </svg>
            </button>
          </div>
        `
          )
          .join("");
      }

      window.removeFile = function (index) {
        uploadedFiles.splice(index, 1);
        renderFilesList();
      };
    </script>
  </body>
</html>
