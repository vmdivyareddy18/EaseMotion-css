<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Reveal on Scroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Image Reveal on Scroll</h1>
    <p>Scroll down to see images reveal with a smooth clip-path animation.</p>
  </header>

  <section class="gallery">
    <div class="reveal-container">
      <div class="reveal-overlay"></div>
      <img src="https://picsum.photos/id/1015/800/600" alt="Mountain landscape" loading="lazy">
    </div>

    <div class="reveal-container" style="--rev-delay: 0.2s;">
      <div class="reveal-overlay"></div>
      <img src="https://picsum.photos/id/1018/800/600" alt="Ocean view" loading="lazy">
    </div>

    <div class="reveal-container" style="--rev-delay: 0.4s;">
      <div class="reveal-overlay"></div>
      <img src="https://picsum.photos/id/1039/800/600" alt="Sunset" loading="lazy">
    </div>

    <div class="reveal-container" style="--rev-delay: 0.6s;">
      <div class="reveal-overlay"></div>
      <img src="https://picsum.photos/id/1043/800/600" alt="Waterfall" loading="lazy">
    </div>
  </section>

  <footer>
    <p>EaseMotion CSS — Image Reveal on Scroll</p>
  </footer>

  <script>
    const reveals = document.querySelectorAll('.reveal-container');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.2 });

    reveals.forEach(el => observer.observe(el));
  </script>
</body>
</html>
