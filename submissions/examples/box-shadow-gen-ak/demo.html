<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Shadow Generator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bs-wrapper">

    <h1>Box Shadow Generator</h1>

    <div class="bs-preview">
      <div class="bs-box" id="previewBox">Preview</div>
    </div>

    <div class="bs-controls">
      <div class="bs-field"><label>X Offset</label><input type="range" id="offsetX" min="-50" max="50" value="4"><span id="oxVal">4px</span></div>
      <div class="bs-field"><label>Y Offset</label><input type="range" id="offsetY" min="-50" max="50" value="4"><span id="oyVal">4px</span></div>
      <div class="bs-field"><label>Blur</label><input type="range" id="blur" min="0" max="50" value="10"><span id="blurVal">10px</span></div>
      <div class="bs-field"><label>Spread</label><input type="range" id="spread" min="0" max="40" value="0"><span id="spreadVal">0px</span></div>
      <div class="bs-field"><label>Color</label><input type="color" id="shadowColor" value="#000000"></div>
      <div class="bs-field"><label>Opacity</label><input type="range" id="opacity" min="0" max="1" step="0.05" value="0.3"><span id="opVal">0.30</span></div>
      <div class="bs-field inset-field"><label><input type="checkbox" id="inset"> Inset</label></div>
      <button class="bs-btn" id="copyShadowBtn">Copy CSS</button>
    </div>

    <textarea class="bs-output" id="cssShadowOutput" readonly></textarea>

  </div>

  <script>
    const box = document.getElementById('previewBox');
    const ox = document.getElementById('offsetX');
    const oy = document.getElementById('offsetY');
    const bl = document.getElementById('blur');
    const spr = document.getElementById('spread');
    const col = document.getElementById('shadowColor');
    const op = document.getElementById('opacity');
    const inset = document.getElementById('inset');
    const oxV = document.getElementById('oxVal');
    const oyV = document.getElementById('oyVal');
    const blV = document.getElementById('blurVal');
    const sprV = document.getElementById('spreadVal');
    const opV = document.getElementById('opVal');
    const output = document.getElementById('cssShadowOutput');
    const copyBtn = document.getElementById('copyShadowBtn');

    function update() {
      const x = parseInt(ox.value);
      const y = parseInt(oy.value);
      const b = parseInt(bl.value);
      const s = parseInt(spr.value);
      const c = col.value;
      const o = parseFloat(op.value);
      const ins = inset.checked;

      const rgba = hexToRgba(c, o);
      const insStr = ins ? 'inset ' : '';
      const shadow = `${insStr}${x}px ${y}px ${b}px ${s}px ${rgba}`;

      box.style.boxShadow = shadow;
      output.value = `box-shadow: ${shadow};`;

      oxV.textContent = x + 'px';
      oyV.textContent = y + 'px';
      blV.textContent = b + 'px';
      sprV.textContent = s + 'px';
      opV.textContent = o.toFixed(2);
    }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(output.value);
      const t = copyBtn.textContent;
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = t, 1500);
    });

    [ox, oy, bl, spr, col, op, inset].forEach(el => el.addEventListener('input', update));
    update();
  </script>

</body>
</html>
