<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Image Gallery - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Photo Gallery</h1>
      <p>Click on any image to view it in the lightbox.</p>
    </header>

    <!-- Gallery Grid -->
    <div class="gallery-grid">
      
      <!-- Image 1 -->
      <div class="gallery-item ease-fade-in-up ease-delay-100 ease-hover-grow" data-index="0">
        <div class="image-wrapper">
          <div class="placeholder-image img-1"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>Mountain Landscape</h3>
          <p>Nature • Landscape</p>
        </div>
      </div>

      <!-- Image 2 -->
      <div class="gallery-item ease-fade-in-up ease-delay-200 ease-hover-grow" data-index="1">
        <div class="image-wrapper">
          <div class="placeholder-image img-2"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>City Skyline</h3>
          <p>Urban • Architecture</p>
        </div>
      </div>

      <!-- Image 3 -->
      <div class="gallery-item ease-fade-in-up ease-delay-300 ease-hover-grow" data-index="2">
        <div class="image-wrapper">
          <div class="placeholder-image img-3"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>Ocean Sunset</h3>
          <p>Nature • Seascape</p>
        </div>
      </div>

      <!-- Image 4 -->
      <div class="gallery-item ease-fade-in-up ease-delay-400 ease-hover-grow" data-index="3">
        <div class="image-wrapper">
          <div class="placeholder-image img-4"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>Forest Path</h3>
          <p>Nature • Forest</p>
        </div>
      </div>

      <!-- Image 5 -->
      <div class="gallery-item ease-fade-in-up ease-delay-500 ease-hover-grow" data-index="4">
        <div class="image-wrapper">
          <div class="placeholder-image img-5"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>Desert Dunes</h3>
          <p>Nature • Desert</p>
        </div>
      </div>

      <!-- Image 6 -->
      <div class="gallery-item ease-fade-in-up ease-delay-600 ease-hover-grow" data-index="5">
        <div class="image-wrapper">
          <div class="placeholder-image img-6"></div>
          <div class="image-overlay">
            <span class="zoom-icon">🔍</span>
          </div>
        </div>
        <div class="image-caption">
          <h3>Northern Lights</h3>
          <p>Nature • Aurora</p>
        </div>
      </div>

    </div>
  </div>

  <!-- Lightbox Modal -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close ease-hover-grow" id="lightbox-close" aria-label="Close lightbox">&times;</button>
    <button class="lightbox-nav lightbox-prev ease-hover-grow" id="lightbox-prev" aria-label="Previous image">←</button>
    <button class="lightbox-nav lightbox-next ease-hover-grow" id="lightbox-next" aria-label="Next image">→</button>
    
    <div class="lightbox-content ease-zoom-in" id="lightbox-content">
      <div class="lightbox-image" id="lightbox-image"></div>
      <div class="lightbox-caption" id="lightbox-caption">
        <h3 id="lightbox-title"></h3>
        <p id="lightbox-category"></p>
      </div>
    </div>

    <div class="lightbox-counter">
      <span id="lightbox-counter">1 / 6</span>
    </div>
  </div>

  <!-- JavaScript for Lightbox Functionality -->
  <script>
    const galleryItems = document.querySelectorAll('.gallery-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImage = document.getElementById('lightbox-image');
    const lightboxTitle = document.getElementById('lightbox-title');
    const lightboxCategory = document.getElementById('lightbox-category');
    const lightboxCounter = document.getElementById('lightbox-counter');
    const lightboxClose = document.getElementById('lightbox-close');
    const lightboxPrev = document.getElementById('lightbox-prev');
    const lightboxNext = document.getElementById('lightbox-next');
    
    let currentIndex = 0;
    const totalImages = galleryItems.length;

    // Image data
    const images = [
      { class: 'img-1', title: 'Mountain Landscape', category: 'Nature • Landscape' },
      { class: 'img-2', title: 'City Skyline', category: 'Urban • Architecture' },
      { class: 'img-3', title: 'Ocean Sunset', category: 'Nature • Seascape' },
      { class: 'img-4', title: 'Forest Path', category: 'Nature • Forest' },
      { class: 'img-5', title: 'Desert Dunes', category: 'Nature • Desert' },
      { class: 'img-6', title: 'Northern Lights', category: 'Nature • Aurora' }
    ];

    // Open lightbox
    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    // Close lightbox
    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Update lightbox content
    function updateLightbox() {
      const image = images[currentIndex];
      lightboxImage.className = 'lightbox-image ' + image.class;
      lightboxTitle.textContent = image.title;
      lightboxCategory.textContent = image.category;
      lightboxCounter.textContent = `${currentIndex + 1} / ${totalImages}`;
    }

    // Navigate
    function nextImage() {
      currentIndex = (currentIndex + 1) % totalImages;
      updateLightbox();
    }

    function prevImage() {
      currentIndex = (currentIndex - 1 + totalImages) % totalImages;
      updateLightbox();
    }

    // Event listeners
    galleryItems.forEach((item, index) => {
      item.addEventListener('click', () => openLightbox(index));
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxNext.addEventListener('click', nextImage);
    lightboxPrev.addEventListener('click', prevImage);

    // Close on backdrop click
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') nextImage();
      if (e.key === 'ArrowLeft') prevImage();
    });
  </script>
</body>
</html>
