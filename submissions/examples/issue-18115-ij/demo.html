<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Magnetic Hover</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="magnetic-wrap">
    <h1 class="magnetic-title">Magnetic Hover</h1>
    <button class="magnetic-btn" id="magneticBtn">Hover Me</button>
    <p class="magnetic-sub">Button follows your cursor within its bounds</p>
  </div>
</div>
<script>
const btn = document.getElementById('magneticBtn');
const strength = 0.3;
btn.addEventListener('mousemove', (e) => {
  const rect = btn.getBoundingClientRect();
  const x = (e.clientX - rect.left - rect.width / 2) * strength;
  const y = (e.clientY - rect.top - rect.height / 2) * strength;
  btn.style.transform = `translate(${x}px, ${y}px)`;
});
btn.addEventListener('mouseleave', () => {
  btn.style.transform = 'translate(0, 0)';
});
</script>
</body>
</html>
