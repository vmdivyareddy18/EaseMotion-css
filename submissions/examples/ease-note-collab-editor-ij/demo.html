<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Note Collab Editor</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='editor-bg')r.style.setProperty('--editor-bg',t.value);if(t.name==='cursor-color')r.style.setProperty('--cursor-color',t.value);if(t.name==='accent-color')r.style.setProperty('--accent-color',t.value);if(t.name==='blink-duration')r.style.setProperty('--blink-duration',t.value+'s')})</script>
<div class="container"><p class="title">Note Collab Editor</p>
<div class="editor"><div class="editor-toolbar"><span class="tool-title">collab.md</span><span class="tool-users"><span class="user-dot" style="background:var(--cursor-color,#4ecdc4)"></span><span class="user-dot" style="background:#f72585"></span><span class="user-dot" style="background:#4ea8de"></span></span></div>
<div class="editor-body"><p class="editor-line"><span class="cursor-pos" style="left:4ch"></span><span class="line-text"># Collaborative Editing</span></p><p class="editor-line"><span class="line-text">Two cursors visible in real-time.</span></p><p class="editor-line"><span class="cursor-pos" style="left:8ch;background:var(--cursor-color,#4ecdc4)"></span><span class="line-text">Type together seamlessly.</span></p></div></div>
<div class="controls"><label>BG: <input type="color" name="editor-bg" value="#1e1e36"></label><label>Cursor: <input type="color" name="cursor-color" value="#4ecdc4"></label><label>Accent: <input type="color" name="accent-color" value="#4a4a6a"></label><label>Blink: <input type="range" name="blink-duration" min="0.3" max="2" step="0.1" value="1"></label></div></div></body></html>
