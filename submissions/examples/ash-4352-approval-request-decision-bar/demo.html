<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approval Request Decision Bar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="decision-bar">

        <div class="icon">
            📄
        </div>

        <div class="content">

            <h2>Approval Request Pending</h2>

            <p>
                <strong>Marketing Budget Q3.pdf</strong> requires your approval before deployment.
            </p>

        </div>

        <div class="details">

            <div class="item">

                <span class="label">
                    Requested By
                </span>

                <strong>Sarah Lee</strong>

            </div>

            <div class="item">

                <span class="label">
                    Priority
                </span>

                <strong>High</strong>

            </div>

        </div>

        <div class="actions">

            <button class="approve">
                Approve
            </button>

            <button class="reject">
                Reject
            </button>

        </div>

    </div>

</div>

</body>
</html>
