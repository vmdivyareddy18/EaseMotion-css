<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Showcase Modal Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="saas-sandbox-root">

  <input type="checkbox" id="saas-toggle">

  <button class="saas-trigger-btn" onclick="document.getElementById('saas-toggle').checked = true">
    View Pro Features
  </button>

  <div class="saas-overlay">
    <div class="saas-modal-card">
      <div class="saas-close-icon" onclick="document.getElementById('saas-toggle').checked = false">×</div>
      
      <div class="saas-depth-inner">
        <h3>Unlock Analytics Suite</h3>
        <p>Integrate our multi-axis presentation layer into your core product dashboard layout. This module operates entirely on native CSS transforms with absolutely zero runtime scripts.</p>
        
        <div class="saas-btn-container">
          <button class="saas-btn saas-btn-primary" onclick="document.getElementById('saas-toggle').checked = false">Upgrade Now</button>
          <button class="saas-btn saas-btn-secondary" onclick="document.getElementById('saas-toggle').checked = false">Maybe Later</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
