<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Range Slider Fill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="slider-card">
        <div class="slider-header">
            <h3>Animation Speed</h3>
            <span id="slider-value">50%</span>
        </div>
        
        <div class="slider-container">
            <input 
                type="range" 
                id="ease-slider" 
                min="0" 
                max="100" 
                value="50" 
                style="--value: 50%;"
                oninput="this.style.setProperty('--value', this.value + '%'); document.getElementById('slider-value').innerText = this.value + '%';"
            >
        </div>
        <p class="slider-hint">Drag the thumb handler to see the fill scaling transition</p>
    </div>
</body>
</html>
