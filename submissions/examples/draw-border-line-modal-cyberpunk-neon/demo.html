<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Neon Draw Border Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Launch System
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal" role="dialog" aria-modal="true">

    <span class="line top"></span>
    <span class="line right"></span>
    <span class="line bottom"></span>
    <span class="line left"></span>

    <label for="modal-toggle" class="close">&times;</label>

    <h2>ACCESS GRANTED</h2>

    <p>
        Welcome to the Cyberpunk Control Center. Secure systems are now online.
    </p>

    <button>Continue</button>

</div>

</body>
</html>
