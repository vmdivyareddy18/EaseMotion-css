<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>How to Contribute - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>How to Contribute Your First Animation</h1>
    <p class="subtitle">A beginner-friendly guide to open source contribution</p>

    <div class="steps">
      <div class="step">
        <span class="number">1</span>
        <p>Fork the repository on GitHub</p>
      </div>
      <div class="step">
        <span class="number">2</span>
        <p>Clone your fork locally</p>
      </div>
      <div class="step">
        <span class="number">3</span>
        <p>Create a new branch</p>
      </div>
      <div class="step">
        <span class="number">4</span>
        <p>Build your animation</p>
      </div>
      <div class="step">
        <span class="number">5</span>
        <p>Submit a Pull Request</p>
      </div>
    </div>

    <div class="demo-box ease-bounce">
      I am bouncing! 🎉
    </div>

  </div>

</body>
</html>
