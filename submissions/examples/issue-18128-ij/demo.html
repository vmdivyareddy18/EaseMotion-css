<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-stagger-fade - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Stagger Fade</h1>
    <p style="color:var(--text-secondary);margin-bottom:16px;">Items fade in one by one with a spring bounce</p>
    <div id="staggerList">
      <div class="stagger-item">Staggered Animation</div>
      <div class="stagger-item">Smooth Fade In</div>
      <div class="stagger-item">Spring Bounce Effect</div>
      <div class="stagger-item">Sequential Reveal</div>
      <div class="stagger-item">EaseMotion Power</div>
    </div>
  </div>
  <script>
    const items = document.querySelectorAll('.stagger-item');
    items.forEach((item, i) => {
      setTimeout(() => item.classList.add('show'), i * 150);
    });
  </script>
</body>
</html>
