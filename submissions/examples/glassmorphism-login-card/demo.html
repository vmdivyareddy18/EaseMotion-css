<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Login Card | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="glc-bg"></div>

  <main class="glc-page">

    <div class="glc-card">
      <div class="glc-card__header">
        <div class="glc-card__logo">EM</div>
        <h1 class="glc-card__title">Welcome back</h1>
        <p class="glc-card__subtitle">Sign in to continue to your dashboard</p>
      </div>

      <form class="glc-form" onsubmit="return false;">

        <div class="glc-field">
          <input class="glc-field__input" type="email" id="glc-email" placeholder=" " required />
          <label class="glc-field__label" for="glc-email">Email address</label>
        </div>

        <div class="glc-field">
          <input class="glc-field__input" type="password" id="glc-password" placeholder=" " required />
          <label class="glc-field__label" for="glc-password">Password</label>
        </div>

        <div class="glc-form__row">
          <label class="glc-checkbox">
            <input type="checkbox" />
            <span>Remember me</span>
          </label>
          <a class="glc-link" href="#">Forgot password?</a>
        </div>

        <button class="glc-submit" type="submit">Sign in</button>

        <div class="glc-divider">
          <span>or continue with</span>
        </div>

        <div class="glc-social">
          <button class="glc-social__btn" type="button">Google</button>
          <button class="glc-social__btn" type="button">GitHub</button>
        </div>

        <p class="glc-footer-text">
          Don't have an account? <a class="glc-link" href="#">Sign up</a>
        </p>

      </form>
    </div>

  </main>

</body>
</html>
