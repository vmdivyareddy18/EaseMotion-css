<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Button - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Floating Action Button (FAB) Menu</h1>
    <p>A pure CSS expandable FAB menu for mobile-first interfaces. It features staggered animations, hover effects, and complete keyboard accessibility without requiring JavaScript.</p>
  </main>

  <!-- Pure CSS FAB Menu -->
  <div class="fab-container">
    <input type="checkbox" id="fab-toggle" class="fab-toggle" aria-label="Toggle floating menu" />
    
    <!-- Secondary Actions Menu -->
    <div class="fab-menu">
      <a href="#" class="fab-item" aria-label="Create new document">
        <span class="fab-label">New Document</span>
        <div class="fab-icon-btn pulse-hover">📄</div>
      </a>
      <a href="#" class="fab-item" aria-label="Upload file">
        <span class="fab-label">Upload File</span>
        <div class="fab-icon-btn pulse-hover">📤</div>
      </a>
      <a href="#" class="fab-item" aria-label="Share">
        <span class="fab-label">Share</span>
        <div class="fab-icon-btn pulse-hover">🔗</div>
      </a>
    </div>

    <!-- Main FAB Trigger -->
    <label for="fab-toggle" class="fab-trigger pulse-hover">
      <svg class="fab-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </label>
  </div>
</body>
</html>
