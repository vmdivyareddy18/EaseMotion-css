<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WCAG Color Contrast Checker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cc-wrapper">

    <h1>Color Contrast Checker</h1>

    <div class="color-inputs">
      <div class="color-group">
        <label for="fgColor">Foreground</label>
        <div class="color-row">
          <input type="color" id="fgColor" value="#6366f1">
          <input type="text" id="fgHex" class="hex-input" value="#6366f1">
        </div>
      </div>
      <div class="color-group">
        <label for="bgColor">Background</label>
        <div class="color-row">
          <input type="color" id="bgColor" value="#0f0f0f">
          <input type="text" id="bgHex" class="hex-input" value="#0f0f0f">
        </div>
      </div>
    </div>

    <div class="preview-box" id="previewBox">
      <span class="preview-sample" id="previewSample">Sample Text</span>
    </div>

    <div class="results" id="results">
      <div class="ratio-display">
        <span class="ratio-value" id="ratioValue">7.51</span>
        <span class="ratio-label">Contrast Ratio</span>
      </div>
      <div class="wcag-results">
        <div class="wcag-row pass" id="aaNormal">AA Normal Text <span class="wcag-icon">PASS</span></div>
        <div class="wcag-row pass" id="aaLarge">AA Large Text <span class="wcag-icon">PASS</span></div>
        <div class="wcag-row pass" id="aaaNormal">AAA Normal Text <span class="wcag-icon">PASS</span></div>
        <div class="wcag-row pass" id="aaaLarge">AAA Large Text <span class="wcag-icon">PASS</span></div>
      </div>
    </div>

  </div>

  <script>
    const fgPicker = document.getElementById('fgColor');
    const bgPicker = document.getElementById('bgColor');
    const fgHex = document.getElementById('fgHex');
    const bgHex = document.getElementById('bgHex');
    const previewBox = document.getElementById('previewBox');
    const previewSample = document.getElementById('previewSample');
    const ratioEl = document.getElementById('ratioValue');
    const aaN = document.getElementById('aaNormal');
    const aaL = document.getElementById('aaLarge');
    const aaaN = document.getElementById('aaaNormal');
    const aaaL = document.getElementById('aaaLarge');

    function hexToRgb(hex) {
      const v = parseInt(hex.slice(1), 16);
      return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
    }

    function luminance(r, g, b) {
      const [rs, gs, bs] = [r, g, b].map(c => {
        c = c / 255;
        return c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
      });
      return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
    }

    function contrastRatio(fg, bg) {
      const l1 = luminance(...fg) + 0.05;
      const l2 = luminance(...bg) + 0.05;
      return l1 > l2 ? l1 / l2 : l2 / l1;
    }

    function updateColor() {
      const fg = fgPicker.value;
      const bg = bgPicker.value;
      fgHex.value = fg;
      bgHex.value = bg;

      const fgRgb = hexToRgb(fg);
      const bgRgb = hexToRgb(bg);
      const ratio = contrastRatio(fgRgb, bgRgb);

      ratioEl.textContent = ratio.toFixed(2) + ':1';
      previewBox.style.background = bg;
      previewSample.style.color = fg;

      const updateRow = (el, passes) => {
        el.className = 'wcag-row ' + (passes ? 'pass' : 'fail');
        el.querySelector('.wcag-icon').textContent = passes ? 'PASS' : 'FAIL';
      };

      updateRow(aaN, ratio >= 4.5);
      updateRow(aaL, ratio >= 3.0);
      updateRow(aaaN, ratio >= 7.0);
      updateRow(aaaL, ratio >= 4.5);
    }

    fgPicker.addEventListener('input', updateColor);
    bgPicker.addEventListener('input', updateColor);

    fgHex.addEventListener('input', () => {
      const v = fgHex.value;
      if (/^#[0-9a-f]{6}$/i.test(v)) { fgPicker.value = v; updateColor(); }
    });
    bgHex.addEventListener('input', () => {
      const v = bgHex.value;
      if (/^#[0-9a-f]{6}$/i.test(v)) { bgPicker.value = v; updateColor(); }
    });

    updateColor();
  </script>

</body>
</html>
