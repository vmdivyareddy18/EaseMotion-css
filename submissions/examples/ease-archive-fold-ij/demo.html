<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Fold – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Archive Fold</h1>
  <p class="subtitle">Click the folder to open/close it</p>

  <div class="af-container">
    <div class="af-folder" id="folder">
      <div class="af-folder-front">
        <div class="af-flap"></div>
        <div class="af-label">Projects</div>
      </div>
      <div class="af-folder-body">
        <div class="af-file" style="--i:0;">report-q2.pdf</div>
        <div class="af-file" style="--i:1;">design-specs.fig</div>
        <div class="af-file" style="--i:2;">meeting-notes.md</div>
        <div class="af-file" style="--i:3;">budget.xlsx</div>
        <div class="af-file" style="--i:4;">roadmap.pptx</div>
      </div>
    </div>
  </div>

  <button class="af-toggle" id="toggleBtn">Open Folder</button>

  <script>
    const folder = document.getElementById('folder');
    const btn = document.getElementById('toggleBtn');
    let open = false;

    btn.addEventListener('click', () => {
      open = !open;
      folder.classList.toggle('open', open);
      btn.textContent = open ? 'Close Folder' : 'Open Folder';
    });
  </script>
</body>
</html>
