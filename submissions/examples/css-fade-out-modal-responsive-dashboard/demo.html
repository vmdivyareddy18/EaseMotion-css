<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Dashboard Modal // Pure CSS Fade-Out Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #0f172a; /* Mapped to match base dashboard space fill */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <a href="#dashboard-telemetry-modal" class="ease-dash-trigger-btn">
    Launch Data Metrics Override
  </a>

  <div id="dashboard-telemetry-modal" class="ease-dash-modal-overlay" role="dialog" aria-labelledby="dash-modal-header" aria-modal="true">
    <div class="ease-dash-modal-box">
      
      <a href="#" class="ease-dash-close-x" aria-label="Dismiss System Modal">&times;</a>
      
      <h2 id="dash-modal-header" class="ease-dash-title">Telemetry Stream Sync</h2>
      <p class="ease-dash-desc">
        Are you tracking to reset the system buffer allocations? This action synchronizes all remote sensor clusters across adaptive grid boundaries and clears active thread logs.
      </p>
      
      <div style="text-align: right;">
        <a href="#" class="ease-dash-trigger-btn ease-dash-btn-secondary">ABORT_SYNC</a>
        <a href="#" class="ease-dash-trigger-btn">EXECUTE_RELOAD</a>
      </div>
      
    </div>
  </div>

</body>
</html>
