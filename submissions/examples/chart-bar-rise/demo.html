<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Bar Rise</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion data</p>
    <h1 id="demo-title">Chart bar rise</h1>
    <p class="intro">A small analytics chart where bars rise from the baseline with staggered timing.</p>

    <figure class="chart" aria-label="Weekly activity chart">
      <span style="--height: 42%"></span>
      <span style="--height: 68%"></span>
      <span style="--height: 54%"></span>
      <span style="--height: 82%"></span>
      <span style="--height: 72%"></span>
    </figure>
  </main>
</body>
</html>
