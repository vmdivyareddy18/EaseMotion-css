<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Elastic Slide Card - Command Palette</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="palette-container">
    <!-- Search Header Simulation -->
    <div class="palette-search">
      <span class="search-icon">⌘</span>
      <input type="text" placeholder="Search commands or tools..." readonly>
      <span class="shortcut-badge">Esc</span>
    </div>

    <!-- Results/Cards Grid -->
    <div class="palette-results">
      
      <!-- Elastic Card 1 -->
      <div class="elastic-card" tabindex="0">
        <div class="card-bg-slide"></div>
        <div class="card-content">
          <div class="card-icon">⚡</div>
          <div class="card-text">
            <h3>Optimize Performance</h3>
            <p>Run automated audits to clear heavy cached assets.</p>
          </div>
          <span class="action-arrow">→</span>
        </div>
      </div>

      <!-- Elastic Card 2 -->
      <div class="elastic-card" tabindex="0">
        <div class="card-bg-slide"></div>
        <div class="card-content">
          <div class="card-icon">🎨</div>
          <div class="card-text">
            <h3>Theme Customizer</h3>
            <p>Switch between dark, light, and high-contrast modes instantly.</p>
          </div>
          <span class="action-arrow">→</span>
        </div>
      </div>

      <!-- Elastic Card 3 -->
      <div class="elastic-card" tabindex="0">
        <div class="card-bg-slide"></div>
        <div class="card-content">
          <div class="card-icon">🔒</div>
          <div class="card-text">
            <h3>API Access Tokens</h3>
            <p>Manage application secrets and rotation intervals safely.</p>
          </div>
          <span class="action-arrow">→</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
