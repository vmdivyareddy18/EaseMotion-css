<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Origami Folding Menu - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper"> 
    <h1>3D Origami Fold Menu</h1>
    <p class="subtitle">Hover to unfold the paper-folding list animation</p>

    <div class="origami-menu-container">
      <button class="origami-trigger">
        Explore Features
      </button>
      <ul class="origami-list">
        <li class="origami-item">
          <a class="origami-link" href="#animations">⚡ Animations First</a>
        </li>
        <li class="origami-item">
          <a class="origami-link" href="#responsive">📱 Fully Responsive</a>
        </li>
        <li class="origami-item">
          <a class="origami-link" href="#custom">🎨 Custom Tokens</a>
        </li>
        <li class="origami-item">
          <a class="origami-link" href="#a11y">♿ A11y Support</a>
        </li>
      </ul>
    </div>

    <p class="description">
      This demo showcases a pure CSS menu that expands with a 3D paper-folding effect. It uses CSS perspective and staggered delays.
    </p>
  </div>

</body>
</html>
