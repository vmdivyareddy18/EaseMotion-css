<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Circular Progress - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Developer Skills</h1>
      <p>Track your progress and mastery across different technologies.</p>
    </header>

    <!-- Progress Grid -->
    <div class="progress-grid">
      
      <!-- Skill 1: HTML -->
      <div class="progress-card ease-zoom-in ease-delay-100">
        <div class="ring-wrapper">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
            <circle class="ring-progress color-1" cx="60" cy="60" r="50" style="--percent: 90; --delay: 0.3s;"></circle>
          </svg>
          <div class="ring-text ease-fade-in-up ease-delay-300">
            <span class="ring-value">90</span>
            <span class="ring-percent">%</span>
          </div>
        </div>
        <h3 class="skill-name ease-fade-in-up ease-delay-400">HTML5</h3>
        <p class="skill-level ease-fade-in-up ease-delay-500">Expert</p>
      </div>

      <!-- Skill 2: CSS -->
      <div class="progress-card ease-zoom-in ease-delay-200">
        <div class="ring-wrapper">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
            <circle class="ring-progress color-2" cx="60" cy="60" r="50" style="--percent: 85; --delay: 0.5s;"></circle>
          </svg>
          <div class="ring-text ease-fade-in-up ease-delay-400">
            <span class="ring-value">85</span>
            <span class="ring-percent">%</span>
          </div>
        </div>
        <h3 class="skill-name ease-fade-in-up ease-delay-500">CSS3</h3>
        <p class="skill-level ease-fade-in-up ease-delay-600">Advanced</p>
      </div>

      <!-- Skill 3: JavaScript -->
      <div class="progress-card ease-zoom-in ease-delay-300">
        <div class="ring-wrapper">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
            <circle class="ring-progress color-3" cx="60" cy="60" r="50" style="--percent: 75; --delay: 0.7s;"></circle>
          </svg>
          <div class="ring-text ease-fade-in-up ease-delay-500">
            <span class="ring-value">75</span>
            <span class="ring-percent">%</span>
          </div>
        </div>
        <h3 class="skill-name ease-fade-in-up ease-delay-600">JavaScript</h3>
        <p class="skill-level ease-fade-in-up ease-delay-700">Proficient</p>
      </div>

      <!-- Skill 4: React -->
      <div class="progress-card ease-zoom-in ease-delay-400">
        <div class="ring-wrapper">
          <svg class="progress-ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
            <circle class="ring-progress color-4" cx="60" cy="60" r="50" style="--percent: 60; --delay: 0.9s;"></circle>
          </svg>
          <div class="ring-text ease-fade-in-up ease-delay-600">
            <span class="ring-value">60</span>
            <span class="ring-percent">%</span>
          </div>
        </div>
        <h3 class="skill-name ease-fade-in-up ease-delay-700">React</h3>
        <p class="skill-level ease-fade-in-up ease-delay-800">Intermediate</p>
      </div>

    </div>
  </div>
</body>
</html>
