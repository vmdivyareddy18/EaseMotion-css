<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Dark Mode UI Demo</h1>

    <p>
        A simple dark mode interface demonstrating cards, buttons,
        inputs and hover effects.
    </p>

    <div class="card">
        <h2>Profile Card</h2>

        <p>
            This component demonstrates a clean dark theme with
            readable typography.
        </p>

        <button class="primary-btn">
            Get Started
        </button>
    </div>

    <div class="card">

        <h2>Login Form</h2>

        <input
            type="text"
            placeholder="Username"
        >

        <input
            type="password"
            placeholder="Password"
        >

        <button class="secondary-btn">
            Login
        </button>

    </div>

</div>

</body>
</html>
