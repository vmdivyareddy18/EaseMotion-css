<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Rating - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sr-hdr"><h1>CSS Star Rating</h1><p>Interactive star rating with CSS hacks</p></header>
<section class="sr-sec"><h2>Radio Rating</h2>
<div class="sr-stars"><input type="radio" name="s" id="s5" class="sr-inp"><label for="s5" class="sr-lab">&#9733;</label>
<input type="radio" name="s" id="s4" class="sr-inp"><label for="s4" class="sr-lab">&#9733;</label>
<input type="radio" name="s" id="s3" class="sr-inp" checked><label for="s3" class="sr-lab">&#9733;</label>
<input type="radio" name="s" id="s2" class="sr-inp"><label for="s2" class="sr-lab">&#9733;</label>
<input type="radio" name="s" id="s1" class="sr-inp"><label for="s1" class="sr-lab">&#9733;</label>
</div>
</section>
<section class="sr-sec"><h2>Checkbox Rating</h2>
<div class="sr-stars cb"><input type="checkbox" id="c5" class="sr-inp"><label for="c5" class="sr-lab">&#9733;</label>
<input type="checkbox" id="c4" class="sr-inp"><label for="c4" class="sr-lab">&#9733;</label>
<input type="checkbox" id="c3" class="sr-inp"><label for="c3" class="sr-lab">&#9733;</label>
<input type="checkbox" id="c2" class="sr-inp"><label for="c2" class="sr-lab">&#9733;</label>
<input type="checkbox" id="c1" class="sr-inp"><label for="c1" class="sr-lab">&#9733;</label>
</div>
</section>
<section class="sr-sec"><h2>Sizes</h2>
<div class="sr-row"><span class="sr-disp sr-xs">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
<span class="sr-disp sr-sm">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
<span class="sr-disp sr-md">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
<span class="sr-disp sr-lg">&#9733;&#9733;&#9733;&#9733;&#9734;</span>
</div>
</section>
<section class="sr-sec"><h2>Score Badges</h2>
<div class="sr-row"><span class="sr-score sr-high">4.8</span><span class="sr-score sr-mid">3.5</span><span class="sr-score sr-low">1.2</span>
</div>
</section>
<footer class="ftr"><p>EaseMotion - Star Rating | GSSoC 2026</p></footer>
</body>
</html>
