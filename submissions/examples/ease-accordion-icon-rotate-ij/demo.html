<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accordion Icon Rotate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Accordion Icon Rotate</h1>
  <div class="air-accordion">
    <div class="air-item" id="item1">
      <button class="air-header">
        <span>Section One</span>
        <span class="air-icon">&#9660;</span>
      </button>
      <div class="air-content"><p>Content for section one. The arrow icon rotates 180 degrees when expanded.</p></div>
    </div>
    <div class="air-item" id="item2">
      <button class="air-header">
        <span>Section Two</span>
        <span class="air-icon">&#9660;</span>
      </button>
      <div class="air-content"><p>Content for section two. Toggle via <code>.air-open</code> class.</p></div>
    </div>
    <div class="air-item" id="item3">
      <button class="air-header">
        <span>Section Three</span>
        <span class="air-icon">&#9660;</span>
      </button>
      <div class="air-content"><p>Content for section three. Only one item is open at a time.</p></div>
    </div>
  </div>
  <script>
    (function() {
      const items = document.querySelectorAll('.air-item');

      items.forEach(function(item) {
        const header = item.querySelector('.air-header');
        header.addEventListener('click', function() {
          items.forEach(function(other) {
            if (other !== item) {
              other.classList.remove('air-open');
            }
          });
          item.classList.toggle('air-open');
        });
      });
    })();
  </script>
</body>
</html>
