<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stagger Loading Screen</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css" />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="loader-wrapper ease-fade-in">

    <section class="loader-card">

      <div class="loader">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <h2 class="ease-slide-up">Loading...</h2>

      <p>
        Please wait while we prepare your experience.
      </p>

    </section>

  </main>

</body>
</html>
