<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voice Recording Wave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="vrw-container">
    <h1>Voice Recording Wave</h1>
    <div class="vrw-recording-indicator">
      <span class="vrw-dot" id="dot"></span>
      <span class="vrw-status" id="status">Ready</span>
    </div>
    <div class="vrw-timer" id="timer">00:00.00</div>
    <div class="vrw-waveform" id="waveform"></div>
    <button class="vrw-btn" id="recordBtn">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <circle cx="12" cy="12" r="6"/>
      </svg>
      <span id="btnLabel">Record</span>
    </button>
  </div>
  <script>
    const BAR_COUNT = 32;
    const waveform = document.getElementById('waveform');
    for (let i = 0; i < BAR_COUNT; i++) {
      const bar = document.createElement('div');
      bar.className = 'vrw-bar';
      bar.style.animationDelay = (i / BAR_COUNT * 0.5) + 's';
      waveform.appendChild(bar);
    }
    const bars = document.querySelectorAll('.vrw-bar');
    const recordBtn = document.getElementById('recordBtn');
    const btnLabel = document.getElementById('btnLabel');
    const statusEl = document.getElementById('status');
    const dot = document.getElementById('dot');
    const timerEl = document.getElementById('timer');
    let recording = false;
    let startTime = 0;
    let timerInterval = null;
    let volumeInterval = null;

    function formatTime(ms) {
      const totalSec = ms / 1000;
      const min = Math.floor(totalSec / 60);
      const sec = Math.floor(totalSec % 60);
      const cent = Math.floor((totalSec % 1) * 100);
      return String(min).padStart(2,'0') + ':' + String(sec).padStart(2,'0') + '.' + String(cent).padStart(2,'0');
    }

    function updateTimer() {
      timerEl.textContent = formatTime(Date.now() - startTime);
    }

    function simulateVolume() {
      bars.forEach(bar => {
        bar.style.height = (20 + Math.random() * 100) + 'px';
        bar.style.opacity = 0.4 + Math.random() * 0.6;
      });
    }

    function stopSimulation() {
      bars.forEach(bar => {
        bar.style.height = '4px';
        bar.style.opacity = 0.2;
      });
    }

    recordBtn.addEventListener('click', () => {
      recording = !recording;
      if (recording) {
        startTime = Date.now();
        timerInterval = setInterval(updateTimer, 10);
        volumeInterval = setInterval(simulateVolume, 100);
        recordBtn.classList.add('recording');
        dot.classList.add('active');
        statusEl.textContent = 'Recording';
        btnLabel.textContent = 'Stop';
      } else {
        clearInterval(timerInterval);
        clearInterval(volumeInterval);
        recordBtn.classList.remove('recording');
        dot.classList.remove('active');
        statusEl.textContent = 'Stopped';
        btnLabel.textContent = 'Record';
        stopSimulation();
      }
    });
  </script>
</body>
</html>
