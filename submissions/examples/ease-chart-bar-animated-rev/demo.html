<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Bar Chart Demo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="chart-container">
        <h2 class="chart-title">Monthly Sales Data</h2>
        <div class="bar-chart">
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 65%; --bar-delay: 0s;">
                    <span class="bar-label">Jan</span>
                    <span class="bar-value">65%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 85%; --bar-delay: 0.1s;">
                    <span class="bar-label">Feb</span>
                    <span class="bar-value">85%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 45%; --bar-delay: 0.2s;">
                    <span class="bar-label">Mar</span>
                    <span class="bar-value">45%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 90%; --bar-delay: 0.3s;">
                    <span class="bar-label">Apr</span>
                    <span class="bar-value">90%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 70%; --bar-delay: 0.4s;">
                    <span class="bar-label">May</span>
                    <span class="bar-value">70%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 55%; --bar-delay: 0.5s;">
                    <span class="bar-label">Jun</span>
                    <span class="bar-value">55%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 80%; --bar-delay: 0.6s;">
                    <span class="bar-label">Jul</span>
                    <span class="bar-value">80%</span>
                </div>
            </div>
            <div class="bar-wrapper">
                <div class="bar" style="--bar-height: 95%; --bar-delay: 0.7s;">
                    <span class="bar-label">Aug</span>
                    <span class="bar-value">95%</span>
                </div>
            </div>
        </div>
        <button class="replay-btn" onclick="replayAnimation()">Replay Animation</button>
    </div>

    <script>
        function replayAnimation() {
            const bars = document.querySelectorAll('.bar');
            bars.forEach(bar => {
                bar.style.animation = 'none';
                bar.offsetHeight; // Trigger reflow
                bar.style.animation = null;
            });
        }
    </script>
</body>
</html>
