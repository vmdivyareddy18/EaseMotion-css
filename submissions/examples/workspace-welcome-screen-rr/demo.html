<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace Welcome Screen</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="welcome-container">

    <section class="hero">
        <h1>👋 Welcome Back, Alex</h1>
        <p>Let's make today productive and achieve your goals.</p>

        <button class="cta-btn">Start New Project</button>
    </section>

    <section class="quick-actions">

        <div class="action-card">
            <span>📁</span>
            <h3>New Project</h3>
        </div>

        <div class="action-card">
            <span>👥</span>
            <h3>Invite Team</h3>
        </div>

        <div class="action-card">
            <span>📊</span>
            <h3>View Reports</h3>
        </div>

    </section>

    <section class="stats">

        <div class="stat-card">
            <h2>12</h2>
            <p>Projects</p>
        </div>

        <div class="stat-card">
            <h2>84</h2>
            <p>Tasks</p>
        </div>

        <div class="stat-card">
            <h2>18</h2>
            <p>Team Members</p>
        </div>

    </section>

</div>

</body>
</html>
