<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Elastic Bounce Modal (E-Commerce Checkout)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f1f5f9; /* Slate 100 */
      color: #0f172a;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
    }

    .demo-trigger-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      background: #0f172a;
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
      border-radius: 8px;
      transition: all 0.2s ease;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .demo-trigger-btn:hover {
      background: #1e293b;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#chk-modal" class="demo-trigger-btn">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
    Proceed to Checkout
  </a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="chk-modal" class="ease-bounce-chk-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-bounce-chk-backdrop-close" tabindex="-1"></a>

    <div class="ease-bounce-chk-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      
      <div class="ease-bounce-chk-header">
        <h2 id="modal-title" class="ease-bounce-chk-title">
          Complete Purchase
        </h2>
        <a href="#" class="ease-bounce-chk-close" aria-label="Close modal dialog">&times;</a>
      </div>
      
      <div class="ease-bounce-chk-body">
        
        <div class="ease-bounce-chk-order-item">
          <span>Premium Wireless Headphones</span>
          <span>$249.00</span>
        </div>
        <div class="ease-bounce-chk-order-item">
          <span>Express Shipping</span>
          <span>$15.00</span>
        </div>
        <div class="ease-bounce-chk-order-item">
          <span>Estimated Tax</span>
          <span>$21.12</span>
        </div>
        
        <div class="ease-bounce-chk-order-total">
          <span>Total Due</span>
          <span>$285.12</span>
        </div>
        
        <div class="ease-bounce-chk-trust">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Secure 256-bit SSL Encryption
        </div>
        
        <a href="#" class="ease-bounce-chk-btn">
          Pay $285.12
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
        
      </div>
      
    </div>

  </div>

</body>
</html>
