<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Order Summary Slide</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='summary-bg')r.style.setProperty('--summary-bg',t.value);if(t.name==='item-bg')r.style.setProperty('--item-bg',t.value);if(t.name==='expand-color')r.style.setProperty('--expand-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelector('.expand-btn').addEventListener('click',function(){document.querySelector('.order-items').classList.toggle('expanded');this.textContent=document.querySelector('.order-items').classList.contains('expanded')?'Hide Details':'Show Details'})})</script>
<div class="container"><p class="title">Order Summary Slide</p>
<div class="summary-card"><div class="order-header"><span class="order-id">#ORD-48291</span><span class="order-total">$129.97</span></div>
<div class="order-items"><div class="order-item"><span>Widget Pro</span><span class="item-price">$49.99</span></div><div class="order-item"><span>Accessory Kit</span><span class="item-price">$29.99</span></div><div class="order-item"><span>Shipping</span><span class="item-price">$9.99</span></div><div class="order-item"><span>Tax</span><span class="item-price">$12.00</span></div><div class="order-item"><span>T-Shirt</span><span class="item-price">$28.00</span></div></div>
<button class="expand-btn">Show Details</button></div>
<div class="controls"><label>BG: <input type="color" name="summary-bg" value="#2d2d44"></label><label>Item: <input type="color" name="item-bg" value="#3a3a5a"></label><label>Accent: <input type="color" name="expand-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="slide-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div></body></html>
