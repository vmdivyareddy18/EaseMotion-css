<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Heatmap Tool</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="saas-container">
        <div class="header">
            <h1>See What Users <span class="accent-orange">Actually Do</span></h1>
            <p>Uncover user behavior with high-fidelity heatmaps and pixel-perfect session replays.</p>
        </div>

        <div class="heatmap-mockup">
            <!-- Simulated Website Content -->
            <div class="mock-website">
                <div class="mock-nav">
                    <div class="mock-logo"></div>
                    <div class="mock-links"><span></span><span></span><span></span></div>
                </div>
                <div class="mock-hero">
                    <div class="mock-title"></div>
                    <div class="mock-subtitle"></div>
                    <div class="mock-btn"></div>
                </div>
                <div class="mock-cards">
                    <div class="mock-card"></div>
                    <div class="mock-card"></div>
                    <div class="mock-card"></div>
                </div>
            </div>

            <!-- Heatmap Overlay -->
            <div class="heatmap-overlay">
                <!-- Heat spots -->
                <div class="heat-spot spot-1"></div>
                <div class="heat-spot spot-2"></div>
                <div class="heat-spot spot-3"></div>
                <div class="heat-spot spot-4"></div>
            </div>

            <!-- Session Replay Cursor -->
            <div class="replay-cursor">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2" stroke-linejoin="round">
                    <path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z" fill="#fff"/>
                </svg>
                <div class="click-ripple"></div>
            </div>
        </div>
    </div>
</body>
</html>
