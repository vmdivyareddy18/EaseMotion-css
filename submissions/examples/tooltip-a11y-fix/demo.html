<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-tooltip Keyboard + Touch A11y Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 4rem 2rem;
      font-family: sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
    }
    h2 { margin: 0; }
    .row { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
    p.note { font-size: 0.85rem; opacity: 0.6; text-align: center; max-width: 480px; }
  </style>
</head>
<body>
  <h2>ease-tooltip — Keyboard & Touch Fix</h2>

  <div class="row">

    <!--
      REQUIRED: tabindex="0" makes non-interactive elements focusable
      REQUIRED: role="tooltip" on the trigger's described element
      REQUIRED: aria-describedby links trigger to tooltip content
    -->

    <!-- Example 1: icon-only span trigger -->
    <span
      class="ease-tooltip"
      data-tip="Copy to clipboard"
      tabindex="0"
      role="button"
      aria-describedby="tip-copy"
    >
      📋
      <!-- Hidden tooltip text for screen readers -->
      <span id="tip-copy" role="tooltip" hidden>Copy to clipboard</span>
    </span>

    <!-- Example 2: info icon -->
    <span
      class="ease-tooltip"
      data-tip="This field is required"
      tabindex="0"
      role="button"
      aria-describedby="tip-info"
    >
      ℹ️
      <span id="tip-info" role="tooltip" hidden>This field is required</span>
    </span>

    <!-- Example 3: native button (already focusable, tabindex not needed) -->
    <button
      class="ease-btn ease-btn-outline ease-tooltip"
      data-tip="Opens in a new tab"
      aria-describedby="tip-link"
    >
      Open ↗
      <span id="tip-link" role="tooltip" hidden>Opens in a new tab</span>
    </button>

  </div>

  <p class="note">
    Tab through the elements above — tooltip appears on focus.<br />
    On touch: tap to toggle. Tap outside or press Escape to dismiss.
  </p>

  <script src="tooltip-touch.js"></script>
</body>
</html>
