<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Glass Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="palette">

  <header>
    <input type="text" placeholder="Search command..." readonly>
  </header>

  <button class="command active">
    <span>⌘</span>
    <p>Create Component</p>
  </button>

  <button class="command">
    <span>⚡</span>
    <p>Deploy Project</p>
  </button>

  <button class="command">
    <span>✦</span>
    <p>Open Dashboard</p>
  </button>

  <button class="command">
    <span>☁</span>
    <p>Sync Workspace</p>
  </button>

</main>

</body>
</html>
