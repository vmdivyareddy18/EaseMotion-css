<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Confetti QR Code Display</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="qr-container">
    <div class="confetti confetti-one"></div>
    <div class="confetti confetti-two"></div>
    <div class="confetti confetti-three"></div>
    <div class="confetti confetti-four"></div>

    <div class="qr-card">
      <h1>Scan QR</h1>

      <div class="qr-code" role="img" aria-label="Sample QR code">
        <span></span>
      </div>

      <p>Scan to connect</p>
    </div>
  </main>
</body>
</html>
