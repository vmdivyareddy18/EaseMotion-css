<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-checkbox-fill — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f8fafc;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #0f172a; font-size: 1.5rem; }
    .section { display: flex; flex-direction: column; gap: 0.9rem; width: 100%; max-width: 400px; }
    h2 { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 0.25rem; }
  </style>
</head>
<body>

  <h1>ease-checkbox-fill Demo</h1>

  <div class="section">
    <h2>Color variants</h2>
    <label class="ease-checkbox ease-checkbox-primary">
      <input type="checkbox" checked />
      <span class="ease-checkbox-label">Primary (indigo)</span>
    </label>
    <label class="ease-checkbox ease-checkbox-success">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Success (green)</span>
    </label>
    <label class="ease-checkbox ease-checkbox-danger">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Danger (red)</span>
    </label>
    <label class="ease-checkbox ease-checkbox-warning">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Warning (amber)</span>
    </label>
    <label class="ease-checkbox ease-checkbox-pink">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Pink</span>
    </label>
  </div>

  <div class="section">
    <h2>Size variants</h2>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-sm">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Small</span>
    </label>
    <label class="ease-checkbox ease-checkbox-primary">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Default</span>
    </label>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-lg">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Large</span>
    </label>
  </div>

  <div class="section">
    <h2>Shape variants</h2>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-round">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Rounded (circle)</span>
    </label>
    <label class="ease-checkbox ease-checkbox-success ease-checkbox-bounce">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Bounce fill animation</span>
    </label>
  </div>

  <div class="section">
    <h2>Strikethrough on check (todo list)</h2>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-strike">
      <input type="checkbox" checked />
      <span class="ease-checkbox-label">Buy groceries</span>
    </label>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-strike">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Write documentation</span>
    </label>
    <label class="ease-checkbox ease-checkbox-primary ease-checkbox-strike">
      <input type="checkbox" />
      <span class="ease-checkbox-label">Submit pull request</span>
    </label>
  </div>

</body>
</html>
