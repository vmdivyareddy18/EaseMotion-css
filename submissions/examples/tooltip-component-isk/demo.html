<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible CSS Tooltip - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to tooltip specific styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">Accessible CSS Tooltips</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 2.5rem;">
      A zero-JavaScript tooltip component driven entirely by HTML <code>data-tooltip</code> attributes and CSS. Fully keyboard accessible (shows on focus) and responsive.
    </p>

    <div class="demo-grid">
      <!-- Top Tooltip -->
      <div>
        <button class="btn-demo ease-tooltip ease-tooltip-top" data-tooltip="This is a tooltip on top!">
          Tooltip Top
        </button>
      </div>

      <!-- Bottom Tooltip -->
      <div>
        <button class="btn-demo ease-tooltip ease-tooltip-bottom" data-tooltip="Here is a bottom tooltip!">
          Tooltip Bottom
        </button>
      </div>

      <!-- Left Tooltip -->
      <div>
        <button class="btn-demo ease-tooltip ease-tooltip-left" data-tooltip="Aligned to the left side">
          Tooltip Left
        </button>
      </div>

      <!-- Right Tooltip -->
      <div>
        <button class="btn-demo ease-tooltip ease-tooltip-right" data-tooltip="Positioned to the right side">
          Tooltip Right
        </button>
      </div>
    </div>

    <p style="font-size: 0.875rem; color: var(--ease-color-muted, #64748b);">
      Press <kbd style="background: #e2e8f0; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem;">Tab</kbd> to focus and test keyboard accessibility.
    </p>
  </div>

</body>
</html>
