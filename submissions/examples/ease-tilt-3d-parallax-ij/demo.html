<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tilt Parallax</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="t3d-container">
  <h1>🌀 3D Tilt Parallax</h1>
  <p class="t3d-subtitle">Move your mouse over the card to see the 3D tilt effect</p>

  <div class="t3d-stage" id="stage">
    <div class="t3d-card" id="card">
      <div class="t3d-glare" id="glare"></div>
      <div class="t3d-content">
        <div class="t3d-icon" id="icon">🚀</div>
        <h2 class="t3d-title" id="title">EaseMotion</h2>
        <p class="t3d-desc" id="desc">Smooth CSS animations &amp; transitions at the speed of thought.</p>
        <div class="t3d-meta" id="meta">
          <span class="t3d-tag">CSS</span>
          <span class="t3d-tag">JS</span>
          <span class="t3d-tag">3D</span>
        </div>
      </div>
    </div>
  </div>

  <p class="t3d-hint">Move mouse away to reset</p>
</div>

<script>
const stage = document.getElementById('stage');
const card = document.getElementById('card');
const glare = document.getElementById('glare');
const icon = document.getElementById('icon');
const title = document.getElementById('title');
const desc = document.getElementById('desc');
const meta = document.getElementById('meta');

stage.addEventListener('mousemove', e => {
  const rect = stage.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const centerX = rect.width / 2;
  const centerY = rect.height / 2;
  const rotateX = ((y - centerY) / centerY) * -12;
  const rotateY = ((x - centerX) / centerX) * 12;

  card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

  const glareX = (x / rect.width) * 100;
  const glareY = (y / rect.height) * 100;
  glare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, var(--t3d-glare-color), transparent 70%)`;
  glare.style.opacity = '1';

  const parallax = 8;
  icon.style.transform = `translateX(${(rotateY * parallax) / 20}px) translateY(${(rotateX * parallax) / -20}px)`;
  title.style.transform = `translateX(${rotateY * 1.2}px) translateY(${rotateX * -1.2}px)`;
  desc.style.transform = `translateX(${rotateY * 0.6}px) translateY(${rotateX * -0.6}px)`;
  meta.style.transform = `translateX(${rotateY * 0.4}px) translateY(${rotateX * -0.4}px)`;
});

stage.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateX(0deg) rotateY(0deg)';
  glare.style.opacity = '0';
  icon.style.transform = '';
  title.style.transform = '';
  desc.style.transform = '';
  meta.style.transform = '';
});
</script>
</body>
</html>
