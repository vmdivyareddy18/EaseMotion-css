<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Node Matrix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="analytics-workspace">
    <div class="metrics-display-card">
      
      <div class="card-meta-header">
        <h4>DATA DISK ALLOCATION</h4>
        <span class="percentage-label">78% FILLED</span>
      </div>

      <!-- Pure CSS Skewed Loading Tracking Engine Container -->
      <div class="skew-progress-container">
        <div class="skew-progress-track">
          <div class="skew-progress-fill-bar">
            <div class="shimmer-glow-layer"></div>
          </div>
        </div>
      </div>

      <div class="card-footer-metrics">
        <span>Sector Sync: Stable</span>
        <span>Index Nodes: 4,096/5,248</span>
      </div>

    </div>
  </main>

</body>
</html>
