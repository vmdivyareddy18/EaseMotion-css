<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spiral File Uploader — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo-page-only styling (not part of the component) */
    body {
      margin: 0;
      background: #1a1b23;
      min-height: 100vh;
    }
    .ease-spiral-demo-header {
      text-align: center;
      padding: 2.5rem 1.5rem 0;
      color: #f5f5f7;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .ease-spiral-demo-header h1 {
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
    }
    .ease-spiral-demo-header p {
      margin: 0;
      color: #9a9aa8;
      font-size: 0.95rem;
    }
    .ease-spiral-demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .ease-spiral-demo-label {
      color: #9a9aa8;
      font-size: 0.8rem;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-spiral-demo-header">
    <h1>Spiral File Uploader</h1>
    <p>Hover or focus a dropzone to watch its border spiral speed up.</p>
  </div>

  <div class="ease-spiral-uploader-demo-grid">

    <div class="ease-spiral-demo-section">
      <label class="ease-spiral-uploader" tabindex="0">
        <input type="file" aria-label="Upload a bank statement" />
        <span class="ease-spiral-uploader-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 3v12" />
            <path d="M7 8l5-5 5 5" />
            <path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
          </svg>
        </span>
        <p class="ease-spiral-uploader-title">Drop your statement here</p>
        <p class="ease-spiral-uploader-hint">or click to browse — PDF, CSV up to 10MB</p>
      </label>
      <span class="ease-spiral-demo-label">Idle / interactive</span>
    </div>

    <div class="ease-spiral-demo-section">
      <div class="ease-spiral-uploader ease-spiral-uploader--success">
        <span class="ease-spiral-uploader-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 6 9 17l-5-5" />
          </svg>
        </span>
        <p class="ease-spiral-uploader-title">Upload complete</p>
        <p class="ease-spiral-uploader-hint">1 file ready for review</p>
        <span class="ease-spiral-uploader-file">📄 statement-june.pdf</span>
      </div>
      <span class="ease-spiral-demo-label">Success state</span>
    </div>

    <div class="ease-spiral-demo-section">
      <div class="ease-spiral-uploader ease-spiral-uploader--error">
        <span class="ease-spiral-uploader-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 9v4" />
            <path d="M12 17h.01" />
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0Z" />
          </svg>
        </span>
        <p class="ease-spiral-uploader-title">Upload failed</p>
        <p class="ease-spiral-uploader-hint">File exceeds 10MB limit</p>
      </div>
      <span class="ease-spiral-demo-label">Error state</span>
    </div>

  </div>

</body>
</html>
