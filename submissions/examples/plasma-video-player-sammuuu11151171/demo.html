<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plasma Video Player | EaseMotion CSS</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css" />

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="background-blobs">
      <span class="blob blob1"></span>
      <span class="blob blob2"></span>
      <span class="blob blob3"></span>
    </div>

    <div class="player-wrapper ease-fade-in">
      <h1>Plasma Video Player</h1>

      <p class="subtitle">
        Elegant CSS-only animated video player component for EaseMotion CSS.
      </p>

      <div class="video-card ease-scale-in">
        <div class="plasma-border"></div>

        <div class="video-screen">
          <div class="thumbnail-overlay">
            <button class="play-btn" aria-label="Play video">▶</button>
          </div>

          <div class="video-info">
            <h2>Building Beautiful UI Components</h2>

            <p>EaseMotion Academy</p>
          </div>
        </div>

        <div class="controls">
          <span>00:32</span>

          <div class="progress">
            <div class="progress-fill"></div>
          </div>

          <span>08:45</span>
        </div>

        <div class="icons">
          <span>🔊</span>

          <span>⚙</span>

          <span>⛶</span>
        </div>
      </div>
    </div>
  </body>
</html>
