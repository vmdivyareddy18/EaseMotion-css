<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level Progress Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Level Progress Bar</h1>
  <p class="subtitle">Gamified progress bar with milestone badges and XP tracking</p>

  <div class="lvl-card">
    <div class="lvl-header">
      <div class="lvl-badge" id="lvlBadge">1</div>
      <div class="lvl-info">
        <span class="lvl-label" id="lvlLabel">Level 1</span>
        <span class="lvl-xp" id="lvlXp">0 / 100 XP</span>
      </div>
    </div>

    <div class="lvl-track-wrap">
      <div class="lvl-track" id="lvlTrack">
        <div class="lvl-fill" id="lvlFill" style="width:0%"></div>
        <div class="lvl-milestone" style="left:25%;" data-reached="false"></div>
        <div class="lvl-milestone" style="left:50%;" data-reached="false"></div>
        <div class="lvl-milestone" style="left:75%;" data-reached="false"></div>
        <div class="lvl-milestone lvl-milestone--final" style="left:100%;" data-reached="false"></div>
      </div>
      <div class="lvl-labels">
        <span>0</span>
        <span>25</span>
        <span>50</span>
        <span>75</span>
        <span>100</span>
      </div>
    </div>

    <div class="lvl-actions">
      <button class="ctrl-btn" id="gainXpBtn">+10 XP</button>
      <button class="ctrl-btn ctrl-btn--outline" id="resetBtn">Reset</button>
    </div>

    <p class="lvl-msg" id="lvlMsg"></p>
  </div>

  <script>
    let xp = 0;
    const maxXp = 100;
    let level = 1;

    const lvlFill = document.getElementById('lvlFill');
    const lvlBadge = document.getElementById('lvlBadge');
    const lvlLabel = document.getElementById('lvlLabel');
    const lvlXp = document.getElementById('lvlXp');
    const lvlMsg = document.getElementById('lvlMsg');
    const milestones = document.querySelectorAll('.lvl-milestone');

    function update() {
      const pct = Math.min((xp / maxXp) * 100, 100);
      lvlFill.style.width = pct + '%';

      milestones.forEach(m => {
        const threshold = parseFloat(m.style.left);
        const reached = pct >= threshold;
        m.classList.toggle('lvl-milestone--reached', reached);
        m.dataset.reached = reached;
      });

      lvlXp.textContent = `${xp} / ${maxXp} XP`;
      lvlBadge.textContent = level;
      lvlLabel.textContent = `Level ${level}`;
    }

    function gainXp(amount) {
      xp += amount;
      if (xp >= maxXp) {
        xp = xp - maxXp;
        level++;
        lvlBadge.classList.remove('lvl-badge--pop');
        void lvlBadge.offsetWidth;
        lvlBadge.classList.add('lvl-badge--pop');
        lvlMsg.textContent = `🎉 Level up! You reached Level ${level}!`;
        lvlMsg.classList.remove('lvl-msg--show');
        void lvlMsg.offsetWidth;
        lvlMsg.classList.add('lvl-msg--show');
      }
      update();
    }

    document.getElementById('gainXpBtn').addEventListener('click', () => gainXp(10));
    document.getElementById('resetBtn').addEventListener('click', () => {
      xp = 0;
      level = 1;
      lvlMsg.classList.remove('lvl-msg--show');
      update();
    });

    update();
  </script>
</body>
</html>
