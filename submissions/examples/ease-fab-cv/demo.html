<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated FAB</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Floating Action Buttons</h1>

<div class="fab-group">

<button class="fab primary">
    <span>+</span>
</button>

<button class="fab info">
    <span>✉</span>
</button>

<button class="fab success">
    <span>✓</span>
</button>

<button class="fab danger">
    <span>!</span>
</button>

</div>

<h2>Expandable FAB</h2>

<div class="fab-expand">

<a href="#" class="mini">📷</a>
<a href="#" class="mini">✉</a>
<a href="#" class="mini">📄</a>

<button class="fab primary main">
    <span>+</span>
</button>

</div>

</div>

</body>
</html>
