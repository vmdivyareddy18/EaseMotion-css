<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Live Chat Widget</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="saas-hero">
        <h1>Connect with your customers <br><span class="accent-text">instantly.</span></h1>
        <p>Embed our live chat widget in 2 minutes and start closing deals faster.</p>
    </div>

    <!-- Pure CSS Chat Widget -->
    <div class="chat-widget-container">
        <input type="checkbox" id="chat-toggle" hidden>
        
        <div class="chat-window">
            <div class="chat-header">
                <div class="agent-info">
                    <div class="agent-avatar">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&auto=format&fit=crop" alt="Agent">
                        <span class="status-dot"></span>
                    </div>
                    <div>
                        <h3>Sarah</h3>
                        <p>Customer Success</p>
                    </div>
                </div>
                <label for="chat-toggle" class="close-chat">&times;</label>
            </div>
            
            <div class="chat-messages">
                <div class="message msg-received pop-msg-1">
                    Hi there! 👋 How can I help you today?
                </div>
                <div class="message msg-sent pop-msg-2">
                    I have a question about pricing.
                </div>
                <div class="message msg-received pop-msg-3">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" placeholder="Type your message..." disabled>
                <button class="send-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path></svg>
                </button>
            </div>
        </div>

        <label for="chat-toggle" class="chat-trigger-btn">
            <svg class="chat-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            <svg class="close-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </label>
    </div>
</body>
</html>
