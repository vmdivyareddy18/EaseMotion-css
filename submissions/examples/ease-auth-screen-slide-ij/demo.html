<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth Screen Slide – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Auth Screen</h1>
  <p class="subtitle">Login / Signup with sliding panel</p>

  <div class="ass-container" id="authContainer">
    <div class="ass-forms" id="formsPanel">
      <div class="ass-form login-form" id="loginForm">
        <h2>Welcome Back</h2>
        <p class="ass-form-sub">Sign in to your account</p>
        <div class="ass-input-group" style="--i:0;">
          <label>Email</label>
          <input type="email" placeholder="you@example.com">
        </div>
        <div class="ass-input-group" style="--i:1;">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>
        <button class="ass-submit">Sign In</button>
        <div class="ass-social">
          <button class="ass-social-btn">G</button>
          <button class="ass-social-btn">T</button>
          <button class="ass-social-btn">F</button>
        </div>
      </div>

      <div class="ass-form signup-form" id="signupForm">
        <h2>Create Account</h2>
        <p class="ass-form-sub">Join our community</p>
        <div class="ass-input-group" style="--i:0;">
          <label>Full Name</label>
          <input type="text" placeholder="Jane Doe">
        </div>
        <div class="ass-input-group" style="--i:1;">
          <label>Email</label>
          <input type="email" placeholder="you@example.com">
        </div>
        <div class="ass-input-group" style="--i:2;">
          <label>Password</label>
          <input type="password" placeholder="••••••••">
        </div>
        <button class="ass-submit">Sign Up</button>
        <div class="ass-social">
          <button class="ass-social-btn">G</button>
          <button class="ass-social-btn">T</button>
          <button class="ass-social-btn">F</button>
        </div>
      </div>
    </div>

    <div class="ass-panel" id="togglePanel">
      <div class="ass-panel-content">
        <h2 id="panelTitle">New Here?</h2>
        <p id="panelText">Create an account and get started.</p>
        <button class="ass-panel-btn" id="toggleBtn">Sign Up</button>
      </div>
    </div>
  </div>

  <script>
    const container = document.getElementById('authContainer');
    const toggleBtn = document.getElementById('toggleBtn');
    const panelTitle = document.getElementById('panelTitle');
    const panelText = document.getElementById('panelText');
    let isLogin = true;

    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      container.classList.toggle('show-signup', isLogin);
      container.classList.toggle('show-login', !isLogin);

      if (isLogin) {
        panelTitle.textContent = 'New Here?';
        panelText.textContent = 'Create an account and get started.';
        toggleBtn.textContent = 'Sign Up';
      } else {
        panelTitle.textContent = 'Welcome Back';
        panelText.textContent = 'Sign in to your account.';
        toggleBtn.textContent = 'Sign In';
      }
    });

    container.classList.add('show-login');
  </script>
</body>
</html>
