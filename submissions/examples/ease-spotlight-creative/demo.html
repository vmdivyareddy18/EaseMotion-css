<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-spotlight</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
      gap: 24px;
    }

    h1 {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card {
      width: 600px;
      height: 350px;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
    }

    .card h2 {
      color: #fff;
      font-size: 28px;
      position: relative;
      z-index: 10;
    }

    .card p {
      color: rgba(255,255,255,0.5);
      font-size: 14px;
      position: relative;
      z-index: 10;
    }

    .card span {
      display: inline-block;
      padding: 6px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body>

  <h1>ease-spotlight-creative — hover over the card</h1>

  <div class="card spotlight-creative">
    <h2>Creative Spotlight</h2>
    <p>Move your cursor over this card to see the effect</p>
    <span>Pure CSS + Minimal JS</span>
  </div>

  <script>
    document.querySelectorAll('.spotlight-creative')
      .forEach(el => {
        el.addEventListener('mousemove', e => {
          const rect = el.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          el.style.setProperty('--x', `${x}%`);
          el.style.setProperty('--y', `${y}%`);
        });

        el.addEventListener('mouseleave', () => {
          el.style.setProperty('--x', '50%');
          el.style.setProperty('--y', '50%');
        });
      });
  </script>

</body>
</html>
