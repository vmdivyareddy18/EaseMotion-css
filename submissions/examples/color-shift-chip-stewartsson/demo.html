<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Dashboard - Color Shift Chip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="analytics-viewport">
        <!-- Premium Inset Analytics Control Panel Container Layout -->
        <div class="dashboard-card-node">
            <header class="dashboard-header">
                <span class="system-badge">Live Metrics Feed</span>
                <h3 class="dashboard-title">Network Hub Stream</h3>
                <p class="dashboard-subtitle">Monitor interactive server telemetry nodes using pure-CSS color shifts.</p>
            </header>

            <!-- Chip Segment Infrastructure Showcase Matrix Canvas -->
            <div class="chip-workspace-area">
                <!-- Interactive Pure-CSS Color Shifting Chip Variant 1 -->
                <div class="color-shift-chip ease-hue-cycle-primary">
                    <span class="chip-indicator"></span>
                    <span class="chip-label-text">Active Terminal</span>
                </div>

                <!-- Interactive Pure-CSS Color Shifting Chip Variant 2 -->
                <div class="color-shift-chip ease-hue-cycle-secondary">
                    <span class="chip-indicator"></span>
                    <span class="chip-label-text">Sync Complete</span>
                </div>
            </div>

            <footer class="dashboard-footer">
                <div class="stream-verification-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">All Analytics Channels Fully Calibrated</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
