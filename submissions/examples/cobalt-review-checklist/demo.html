<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cobalt review checklist demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="cobalt review checklist">
    <section class="status-card">
      <div class="card-copy">
        <p>Review Gate</p>
        <h1>cobalt review checklist</h1>
        <span>Pull request review status</span>
      </div>
      <div class="metric" aria-label="Checks value">
        <strong>6</strong>
        <em>Checks</em>
      </div>
      <div class="motion-bars" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
