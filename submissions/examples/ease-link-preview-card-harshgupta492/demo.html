<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Link Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <div class="link-card">

            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200&q=80" alt="Website Preview"
                class="preview-image">

            <div class="content">

                <span class="domain">
                    🌐 openai.com
                </span>

                <h2>OpenAI</h2>

                <p>
                    Building safe and useful AI systems that help people
                    solve real-world problems through research and innovation.
                </p>

                <a href="https://openai.com" target="_blank">
                    Visit Website →
                </a>

            </div>

        </div>
    </div>

</body>

</html>
