<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Wobble-Focus Popover for Marketing</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="marketing-container">
    <div class="popover-wrapper">
      <button class="trigger-btn" aria-describedby="marketing-wobble-popover">
        Join the Waitlist ✨
      </button>
      
      <div id="marketing-wobble-popover" class="ease-wobble-popover" role="dialog" aria-labelledby="popover-title">
        <div class="popover-content">
          <h3 id="popover-title">You're almost in!</h3>
          <p>Drop your email below to get exclusive early access and a 30% lifetime discount when we launch.</p>
          <div class="popover-form">
            <input type="email" placeholder="hello@example.com" class="waitlist-input" aria-label="Email Address">
            <button class="submit-btn">Reserve My Spot</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
