<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard Skew-Active Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="dashboard-container">
        <div class="analytics-card">
            <div class="analytics-header">
                <span class="card-title">Memory Allocation</span>
                <span class="status-indicator status-optimal">Optimal</span>
            </div>

            <p class="analytics-body">
                Dynamic swap memory clusters are processing operations inside nominal parameters.
            </p>

            <div class="tooltip-wrapper">
                <button type="button" class="dashboard-action-btn" aria-describedby="dash-skew-tooltip">
                    Analyze Cache Clusters
                </button>

                <div id="dash-skew-tooltip" class="dashboard-tooltip" role="tooltip">
                    <span class="tooltip-category">Cluster Registry</span>
                    <p class="tooltip-text">L1/L2 Cache hits are holding steady at 98.4% efficiency across all nodes.
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
