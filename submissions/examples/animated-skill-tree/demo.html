<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Developer Skill Tree</title>
  <meta name="description" content="A visual skill tree component with animated connection paths and unlock states for developer learning roadmaps.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Developer Skill Tree</h1>
      <p class="subtitle">A visual progression roadmap with animated nodes and connection paths</p>
    </header>

    <div class="skill-tree">

      <div class="skill-row">
        <div class="skill-node completed">HTML</div>
      </div>
      <div class="skill-connector completed">
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
      </div>

      <div class="skill-row">
        <div class="skill-node completed">CSS</div>
      </div>
      <div class="skill-connector completed">
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
      </div>

      <div class="skill-row">
        <div class="skill-node active">JavaScript</div>
      </div>
      <div class="skill-connector active">
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
      </div>

      <div class="skill-row">
        <div class="skill-node locked">React</div>
      </div>
      <div class="skill-connector locked">
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
      </div>

      <div class="skill-row">
        <div class="skill-node locked">Node.js</div>
      </div>
      <div class="skill-connector locked">
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
        <span class="connector-dot"></span>
      </div>

      <div class="skill-row">
        <div class="skill-node locked">System<br>Design</div>
      </div>

    </div>

    <div class="legend">
      <div class="legend-item">
        <span class="legend-dot completed-dot"></span>
        Completed
      </div>
      <div class="legend-item">
        <span class="legend-dot active-dot"></span>
        In Progress
      </div>
      <div class="legend-item">
        <span class="legend-dot locked-dot"></span>
        Locked
      </div>
    </div>
  </main>

</body>
</html>
