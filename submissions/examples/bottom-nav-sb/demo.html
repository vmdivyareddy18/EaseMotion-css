<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bottom Navigation Bar</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="phone-preview">
      <section class="app-screen" aria-labelledby="nav-title">
        <p class="eyebrow">Mobile component</p>
        <h1 id="nav-title">Bottom navigation</h1>
        <p class="intro">
          A fixed iOS-style tab bar with icons, labels, active states, and
          thumb-friendly hit targets.
        </p>

        <div class="content-card">
          <span class="metric">84%</span>
          <p>Weekly goal progress</p>
        </div>

        <nav class="ease-bottom-nav" aria-label="Primary">
          <a class="ease-bottom-nav-item ease-active" href="#home">
            <span class="ease-bottom-nav-icon" aria-hidden="true">⌂</span>
            <span class="ease-bottom-nav-label">Home</span>
          </a>
          <a class="ease-bottom-nav-item" href="#search">
            <span class="ease-bottom-nav-icon" aria-hidden="true">⌕</span>
            <span class="ease-bottom-nav-label">Search</span>
          </a>
          <a class="ease-bottom-nav-item" href="#tasks">
            <span class="ease-bottom-nav-icon" aria-hidden="true">✓</span>
            <span class="ease-bottom-nav-label">Tasks</span>
          </a>
          <a class="ease-bottom-nav-item" href="#profile">
            <span class="ease-bottom-nav-icon" aria-hidden="true">◌</span>
            <span class="ease-bottom-nav-label">Profile</span>
          </a>
        </nav>
      </section>
    </main>
  </body>
</html>
