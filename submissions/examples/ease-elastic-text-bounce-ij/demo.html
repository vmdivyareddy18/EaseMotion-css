<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Text Bounce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h2 class="card-title">Elastic Text Bounce</h2>
    <p class="card-subtitle">Springy letter animation — hover to trigger</p>

    <div class="text-display" data-testid="text-display">
      <span class="bounce-char" style="--char-index: 0">E</span>
      <span class="bounce-char" style="--char-index: 1">l</span>
      <span class="bounce-char" style="--char-index: 2">a</span>
      <span class="bounce-char" style="--char-index: 3">s</span>
      <span class="bounce-char" style="--char-index: 4">t</span>
      <span class="bounce-char" style="--char-index: 5">i</span>
      <span class="bounce-char" style="--char-index: 6">c</span>
      <span class="bounce-char" style="--char-index: 8">&nbsp;</span>
      <span class="bounce-char" style="--char-index: 9">B</span>
      <span class="bounce-char" style="--char-index: 10">o</span>
      <span class="bounce-char" style="--char-index: 11">u</span>
      <span class="bounce-char" style="--char-index: 12">n</span>
      <span class="bounce-char" style="--char-index: 13">c</span>
      <span class="bounce-char" style="--char-index: 14">e</span>
    </div>

    <div class="controls-row">
      <div class="ctrl">
        <label>Bounce Height</label>
        <input type="range" class="bounce-height" min="10" max="60" value="40" />
        <span class="val bh-val">40px</span>
      </div>
      <div class="ctrl">
        <label>Stiffness</label>
        <input type="range" class="spring-stiffness" min="2" max="12" value="6" step="0.5" />
        <span class="val ss-val">6</span>
      </div>
      <div class="ctrl">
        <label>Letter Delay</label>
        <input type="range" class="letter-delay" min="20" max="120" value="60" step="5" />
        <span class="val ld-val">60ms</span>
      </div>
    </div>

    <div class="btn-group">
      <button class="bounce-btn" data-testid="bounce-btn">Bounce!</button>
      <button class="reset-btn">Reset</button>
    </div>

    <div class="hint">Hover the text or click Bounce!</div>
  </div>

  <script>
    const chars = document.querySelectorAll('.bounce-char');
    const bounceBtn = document.querySelector('.bounce-btn');
    const resetBtn = document.querySelector('.reset-btn');
    const textDisplay = document.querySelector('.text-display');

    const bhSlider = document.querySelector('.bounce-height');
    const ssSlider = document.querySelector('.spring-stiffness');
    const ldSlider = document.querySelector('.letter-delay');
    const bhVal = document.querySelector('.bh-val');
    const ssVal = document.querySelector('.ss-val');
    const ldVal = document.querySelector('.ld-val');

    function animateChars() {
      chars.forEach((ch, i) => {
        const delay = parseInt(ldSlider.value) * i;
        const height = parseInt(bhSlider.value);
        const stiffness = parseFloat(ssSlider.value);
        ch.style.setProperty('--bounce-height', height + 'px');
        ch.style.setProperty('--spring-stiffness', stiffness);
        ch.style.setProperty('--letter-delay', delay + 'ms');
        ch.classList.remove('bouncing');
        void ch.offsetWidth;
        ch.classList.add('bouncing');
      });
    }

    function resetChars() {
      chars.forEach(ch => ch.classList.remove('bouncing'));
    }

    bounceBtn.addEventListener('click', animateChars);
    resetBtn.addEventListener('click', resetChars);
    textDisplay.addEventListener('mouseenter', animateChars);

    bhSlider.addEventListener('input', () => {
      bhVal.textContent = bhSlider.value + 'px';
    });
    ssSlider.addEventListener('input', () => {
      ssVal.textContent = ssSlider.value;
    });
    ldSlider.addEventListener('input', () => {
      ldVal.textContent = ldSlider.value + 'ms';
    });
  </script>
</body>
</html>
