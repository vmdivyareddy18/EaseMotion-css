<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-quadrant-chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Quadrant Chart</h1>
    <div class="animation-wrapper">
      <div class="quadrant-chart">
        <div class="quadrant q1"></div>
        <div class="quadrant q2"></div>
        <div class="quadrant q3"></div>
        <div class="quadrant q4"></div>
        <div class="crosshair-h"></div>
        <div class="crosshair-v"></div>
        <div class="center-dot"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Quad Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--quad-color" />
      </label>
      <label>
        Chart BG
        <input type="color" class="js-color" value="#1a1a2e" data-var="--chart-bg" />
      </label>
      <label>
        Fill Duration
        <input type="range" class="js-range" min="0.2" max="3" step="0.1" value="1" data-var="--fill-duration" />
        <span class="js-range-value">1s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
