<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch with Lap Recording - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="stopwatch-wrapper">

    <h1>Stopwatch</h1>

    <div class="timer-display" id="timerDisplay">00:00:00.00</div>

    <div class="controls">
      <button class="ctrl-btn start-btn" id="startBtn">Start</button>
      <button class="ctrl-btn" id="lapBtn" disabled>Lap</button>
      <button class="ctrl-btn" id="resetBtn">Reset</button>
    </div>

    <div class="laps-section" id="lapsSection" style="display:none">
      <h2>Laps</h2>
      <ul class="laps-list" id="lapsList"></ul>
    </div>

  </div>

  <script>
    let startTime = 0;
    let elapsed = 0;
    let isRunning = false;
    let interval = null;
    let lapCount = 0;
    let lastLapTime = 0;

    const display = document.getElementById('timerDisplay');
    const startBtn = document.getElementById('startBtn');
    const lapBtn = document.getElementById('lapBtn');
    const resetBtn = document.getElementById('resetBtn');
    const lapsSection = document.getElementById('lapsSection');
    const lapsList = document.getElementById('lapsList');

    function format(ms) {
      const total = Math.floor(ms);
      const h = Math.floor(total / 3600000);
      const m = Math.floor((total % 3600000) / 60000);
      const s = Math.floor((total % 60000) / 1000);
      const cs = Math.floor((total % 1000) / 10);
      return String(h).padStart(2, '0') + ':' +
             String(m).padStart(2, '0') + ':' +
             String(s).padStart(2, '0') + '.' +
             String(cs).padStart(2, '0');
    }

    function updateDisplay() {
      display.textContent = format(elapsed + (isRunning ? Date.now() - startTime : 0));
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startTime = Date.now();
      interval = setInterval(updateDisplay, 20);
      startBtn.textContent = 'Stop';
      startBtn.classList.add('stopped');
      lapBtn.disabled = false;
    }

    function stopTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(interval);
      elapsed += Date.now() - startTime;
      startBtn.textContent = 'Resume';
      startBtn.classList.remove('stopped');
      lapBtn.disabled = true;
    }

    function resetTimer() {
      stopTimer();
      if (isRunning) return;
      elapsed = 0;
      lapCount = 0;
      lastLapTime = 0;
      lapsList.innerHTML = '';
      lapsSection.style.display = 'none';
      display.textContent = '00:00:00.00';
      startBtn.textContent = 'Start';
      startBtn.classList.remove('stopped');
    }

    function recordLap() {
      const current = elapsed + (isRunning ? Date.now() - startTime : 0);
      lapCount++;
      const lapMs = current - lastLapTime;
      lastLapTime = current;

      const li = document.createElement('li');
      li.className = 'lap-item';
      li.innerHTML = '<span class="lap-label">Lap ' + lapCount + '</span><span class="lap-time">' + format(lapMs) + '</span>';
      lapsList.appendChild(li);
      lapsSection.style.display = 'block';
    }

    startBtn.addEventListener('click', () => {
      if (isRunning) {
        stopTimer();
      } else {
        if (elapsed === 0) {
          lastLapTime = 0;
        }
        startTimer();
      }
    });

    lapBtn.addEventListener('click', recordLap);
    resetBtn.addEventListener('click', resetTimer);
  </script>

</body>
</html>
