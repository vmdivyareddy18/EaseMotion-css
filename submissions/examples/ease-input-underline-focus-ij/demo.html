<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underline Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="iuf-container">
    <h1>Contact</h1>
    <form class="iuf-form" id="iuf-form">
      <div class="iuf-group">
        <label for="iuf-name">Full name</label>
        <div class="iuf-wrap">
          <input type="text" id="iuf-name" class="iuf-input" placeholder="John Doe" autocomplete="name">
        </div>
      </div>
      <div class="iuf-group">
        <label for="iuf-email">Email address</label>
        <div class="iuf-wrap">
          <input type="email" id="iuf-email" class="iuf-input" placeholder="john@example.com" autocomplete="email">
        </div>
      </div>
      <div class="iuf-group">
        <label for="iuf-subject">Subject</label>
        <div class="iuf-wrap">
          <input type="text" id="iuf-subject" class="iuf-input" placeholder="What is this about?">
        </div>
      </div>
      <div class="iuf-group">
        <label for="iuf-message">Message</label>
        <div class="iuf-wrap">
          <textarea id="iuf-message" class="iuf-input iuf-textarea" rows="4" placeholder="Write your message..."></textarea>
        </div>
      </div>
    </form>
  </div>

  <script>
    const form = document.getElementById('iuf-form');
    const inputs = form.querySelectorAll('.iuf-input');

    inputs.forEach(inp => {
      inp.addEventListener('focus', function () {
        this.closest('.iuf-wrap').classList.add('iuf-focused');
      });
      inp.addEventListener('blur', function () {
        this.closest('.iuf-wrap').classList.remove('iuf-focused');
      });
    });
  </script>
</body>
</html>
