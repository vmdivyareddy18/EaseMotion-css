<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Countdown Timer - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <span class="label-text">Countdown</span>
    <div class="countdown" id="countdown">
      <div class="flip-unit">
        <div class="flip-card" id="daysCard">
          <span class="flip-value" id="days">00</span>
        </div>
        <span class="flip-label">Days</span>
      </div>
      <span class="separator">:</span>
      <div class="flip-unit">
        <div class="flip-card" id="hoursCard">
          <span class="flip-value" id="hours">00</span>
        </div>
        <span class="flip-label">Hours</span>
      </div>
      <span class="separator">:</span>
      <div class="flip-unit">
        <div class="flip-card" id="minutesCard">
          <span class="flip-value" id="minutes">00</span>
        </div>
        <span class="flip-label">Minutes</span>
      </div>
      <span class="separator">:</span>
      <div class="flip-unit">
        <div class="flip-card" id="secondsCard">
          <span class="flip-value" id="seconds">00</span>
        </div>
        <span class="flip-label">Seconds</span>
      </div>
    </div>
    <span class="target-date" id="targetDate"></span>
  </div>

  <script>
    const target = new Date();
    target.setDate(target.getDate() + 14);
    target.setHours(0, 0, 0, 0);

    document.getElementById('targetDate').textContent =
      'Target: ' + target.toLocaleDateString('en-US', {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });

    const cards = {
      days: { card: document.getElementById('daysCard'), val: document.getElementById('days') },
      hours: { card: document.getElementById('hoursCard'), val: document.getElementById('hours') },
      minutes: { card: document.getElementById('minutesCard'), val: document.getElementById('minutes') },
      seconds: { card: document.getElementById('secondsCard'), val: document.getElementById('seconds') }
    };

    let prev = { days: -1, hours: -1, minutes: -1, seconds: -1 };

    function update() {
      const now = new Date();
      const diff = Math.max(0, Math.floor((target - now) / 1000));
      const d = Math.floor(diff / 86400);
      const h = Math.floor((diff % 86400) / 3600);
      const m = Math.floor((diff % 3600) / 60);
      const s = diff % 60;

      const parts = { days: d, hours: h, minutes: m, seconds: s };

      for (const [key, value] of Object.entries(parts)) {
        const str = String(value).padStart(2, '0');
        const el = cards[key];
        if (el.val.textContent !== str) {
          el.card.classList.remove('flip');
          void el.card.offsetWidth;
          el.val.textContent = str;
          el.card.classList.add('flip');
          setTimeout(() => el.card.classList.remove('flip'), 700);
        }
      }
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
