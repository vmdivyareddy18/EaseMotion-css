<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Orbit Popover - Accessible Layout</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="demo-container">

    <section class="orbit-popover">

      <button 
        class="orbit-trigger"
        aria-label="Open accessibility information">
        Accessibility Info
      </button>

      <div class="orbit-content" role="dialog">
        <h2>Accessible Web</h2>
        <p>
          Designed with keyboard-friendly interaction,
          responsive layouts, and smooth CSS animations.
        </p>

        <button class="action-btn">
          Learn More
        </button>
      </div>

    </section>

  </main>

</body>
</html>
