<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Speed Dial FAB</title>
</head>
<body>
  <main>
    <h1>Speed Dial FAB</h1>
    <p class="subtitle">Click the button to expand actions</p>
    <div class="fab-container">
      <div class="fab-actions" id="fabActions">
        <button class="fab-action" data-label="Edit" style="--i:0">&#9998;</button>
        <button class="fab-action" data-label="Share" style="--i:1">&#128228;</button>
        <button class="fab-action" data-label="Delete" style="--i:2">&#128465;</button>
        <button class="fab-action" data-label="Settings" style="--i:3">&#9881;</button>
      </div>
      <button class="fab-main" id="fabMain">+</button>
    </div>
  </main>
  <script>
    const fabMain = document.getElementById('fabMain');
    const fabActions = document.getElementById('fabActions');
    let expanded = false;

    fabMain.addEventListener('click', () => {
      expanded = !expanded;
      fabMain.classList.toggle('expanded', expanded);
      fabActions.classList.toggle('visible', expanded);
    });
  </script>
</body>
</html>
