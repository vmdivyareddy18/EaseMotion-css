<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like Button Heartbeat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Like Button Heartbeat</h1>
    <p>Click the heart to like each item.</p>
    <div class="items">
      <div class="item">
        <div class="item-thumbnail"></div>
        <div class="item-info">
          <p class="item-title">Mountain Sunset</p>
          <button class="like-btn" aria-label="Like">
            <span class="heart-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </span>
            <span class="like-count">12</span>
          </button>
        </div>
      </div>
      <div class="item">
        <div class="item-thumbnail"></div>
        <div class="item-info">
          <p class="item-title">Ocean Waves</p>
          <button class="like-btn" aria-label="Like">
            <span class="heart-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </span>
            <span class="like-count">8</span>
          </button>
        </div>
      </div>
      <div class="item">
        <div class="item-thumbnail"></div>
        <div class="item-info">
          <p class="item-title">Forest Trail</p>
          <button class="like-btn" aria-label="Like">
            <span class="heart-icon">
              <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
              </svg>
            </span>
            <span class="like-count">5</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.querySelectorAll('.like-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const isActive = btn.classList.toggle('active');
        const countSpan = btn.querySelector('.like-count');
        let count = parseInt(countSpan.textContent);
        count = isActive ? count + 1 : count - 1;
        countSpan.textContent = count;
        countSpan.classList.remove('bounce');
        void countSpan.offsetWidth;
        countSpan.classList.add('bounce');
        const heart = btn.querySelector('.heart-icon');
        heart.classList.remove('heartbeat');
        void heart.offsetWidth;
        heart.classList.add('heartbeat');
      });
    });
  </script>
</body>
</html>
