<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Elastic Button Bounce</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    padding: 80px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
    min-height: 100vh;
    margin: 0;
  }
  h2 { color: #e2e8f0; margin: 0 0 20px; font-weight: 500; font-size: 18px; }
  .demo-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .demo-row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .demo-buttons {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .demo-hint {
    color: #64748b;
    font-size: 13px;
    margin-top: 16px;
  }
</style>
</head>
<body>

  <div class="demo-row">
    <div class="demo-card">
      <h2>Default</h2>
      <div class="demo-buttons">
        <button class="ease-elastic-btn" data-bounce>
          Click Me
        </button>
        <button class="ease-elastic-btn" data-bounce style="--btn-bg: #22c55e;">
          <svg class="ease-elastic-btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          With Icon
        </button>
      </div>
      <div class="demo-hint">Click a button to see the bounce</div>
    </div>

    <div class="demo-card">
      <h2>Sizes</h2>
      <div class="demo-buttons">
        <button class="ease-elastic-btn ease-elastic-btn--sm" data-bounce style="--btn-bg: #f59e0b;">
          Small
        </button>
        <button class="ease-elastic-btn" data-bounce style="--btn-bg: #ef4444;">
          Default
        </button>
        <button class="ease-elastic-btn ease-elastic-btn--lg" data-bounce style="--btn-bg: #8b5cf6;">
          Large
        </button>
      </div>
    </div>

    <div class="demo-card">
      <h2>Variants</h2>
      <div class="demo-buttons">
        <button class="ease-elastic-btn" data-bounce>
          Solid
        </button>
        <button class="ease-elastic-btn ease-elastic-btn--outline" data-bounce style="--btn-bg: #6366f1;">
          Outline
        </button>
        <button class="ease-elastic-btn ease-elastic-btn--ghost" data-bounce style="--btn-bg: #6366f1;">
          Ghost
        </button>
      </div>
    </div>

    <div class="demo-card" style="--bounce-height: 16px; --press-duration: 0.8s;">
      <h2>High Bounce</h2>
      <div class="demo-buttons" style="--bounce-height: 16px; --press-duration: 0.8s;">
        <button class="ease-elastic-btn" data-bounce style="--bounce-height: 16px; --press-duration: 0.8s; --btn-bg: #06b6d4;">
          Boing!
        </button>
        <button class="ease-elastic-btn" data-bounce style="--bounce-height: 16px; --press-duration: 0.8s; --btn-bg: #f97316; --bounce-height: 24px;">
          Super Boing!
        </button>
      </div>
      <div class="demo-hint">Custom --bounce-height and --press-duration</div>
    </div>
  </div>

<script>
  document.querySelectorAll('[data-bounce]').forEach(btn => {
    btn.addEventListener('click', function() {
      this.classList.remove('is-bouncing');
      void this.offsetWidth;
      this.classList.add('is-bouncing');
      setTimeout(() => this.classList.remove('is-bouncing'), 800);
    });
  });
</script>

</body>
</html>
