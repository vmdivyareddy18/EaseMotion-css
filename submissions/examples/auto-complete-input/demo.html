<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Complete Input Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo container styling for presentation only */
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .search-wrapper {
      width: 100%;
      max-width: 360px;
    }
  </style>
</head>
<body>

  <div class="search-wrapper">
    <div class="ease-autocomplete-container">
      <input 
        type="text" 
        class="ease-autocomplete-input" 
        placeholder="Search frameworks..." 
        aria-autocomplete="list" 
        aria-controls="autocomplete-list"
        aria-expanded="false"
      />
      
      <ul class="ease-autocomplete-list" id="autocomplete-list" role="listbox">
        <li class="ease-autocomplete-item" role="option" tabindex="0">React.js</li>
        <li class="ease-autocomplete-item" role="option" tabindex="0">Vue.js</li>
        <li class="ease-autocomplete-item" role="option" tabindex="0">Angular</li>
        <li class="ease-autocomplete-item" role="option" tabindex="0">Svelte</li>
        <li class="ease-autocomplete-item" role="option" tabindex="0">SolidJS</li>
      </ul>
    </div>
  </div>

</body>
</html>
