<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Newton Cradle Loader</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='cradle-bg')r.style.setProperty('--cradle-bg',t.value);if(t.name==='ball-color')r.style.setProperty('--ball-color',t.value);if(t.name==='string-color')r.style.setProperty('--string-color',t.value);if(t.name==='swing-duration')r.style.setProperty('--swing-duration',t.value+'s')})</script>
<div class="container"><p class="title">Newton Cradle Loader</p>
<div class="cradle"><div class="cradle-arm"></div><div class="cradle-balls"><div class="ball ball-1"></div><div class="ball ball-2"></div><div class="ball ball-3"></div><div class="ball ball-4"></div><div class="ball ball-5"></div></div><div class="cradle-strings"><div class="string" style="left:10%"></div><div class="string" style="left:30%"></div><div class="string" style="left:50%"></div><div class="string" style="left:70%"></div><div class="string" style="left:90%"></div></div></div>
<div class="controls"><label>BG: <input type="color" name="cradle-bg" value="#2d2d44"></label><label>Ball: <input type="color" name="ball-color" value="#4ecdc4"></label><label>String: <input type="color" name="string-color" value="#666"></label><label>Speed: <input type="range" name="swing-duration" min="0.5" max="3" step="0.1" value="1.2"></label></div></div></body></html>
