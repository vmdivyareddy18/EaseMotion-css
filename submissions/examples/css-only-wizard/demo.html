<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Multi-Step Wizard</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--ease-color-neutral-100);
            padding: 60px 20px;
        }
    </style>
</head>
<body class="ease-text-primary">

    <div class="ease-container ease-stack-lg" style="max-width: 800px;">
        <div class="ease-text-center ease-fade-in ease-slide-down">
            <h1 class="ease-text-3xl ease-font-bold ease-mb-2">Checkout Flow</h1>
            <p class="ease-text-muted">A fully functional multi-step wizard using pure CSS state management.</p>
        </div>

        <div class="ease-wizard ease-fade-in ease-delay-200">
            <!-- The Hidden State Machine -->
            <input type="radio" id="step1" name="wizard" class="ease-sr-only ease-wizard-trigger" checked>
            <input type="radio" id="step2" name="wizard" class="ease-sr-only ease-wizard-trigger">
            <input type="radio" id="step3" name="wizard" class="ease-sr-only ease-wizard-trigger">
            
            <!-- Progress Tracker -->
            <div class="ease-wizard-progress">
                <div class="ease-wizard-progress-bar"></div>
                <div class="ease-wizard-step step1" data-step="1"><span>Personal Info</span></div>
                <div class="ease-wizard-step step2" data-step="2"><span>Payment</span></div>
                <div class="ease-wizard-step step3" data-step="3"><span>Confirm</span></div>
            </div>

            <!-- Form Panels -->
            <div class="ease-wizard-panels">
                
                <!-- Panel 1: Personal Info -->
                <div class="ease-wizard-panel panel1">
                    <h2 class="ease-text-2xl ease-font-bold ease-mb-6">Personal Information</h2>
                    
                    <div class="ease-form-group">
                        <label class="ease-form-label">Full Name</label>
                        <input type="text" class="ease-form-input" placeholder="John Doe">
                    </div>
                    <div class="ease-form-group">
                        <label class="ease-form-label">Email Address</label>
                        <input type="email" class="ease-form-input" placeholder="john@example.com">
                    </div>

                    <div class="ease-wizard-actions" style="justify-content: flex-end;">
                        <!-- 'Next' button points to step2 radio -->
                        <label for="step2" class="ease-btn ease-btn-primary ease-btn-hover ease-hover-lift" style="cursor: pointer;">Next Step &rarr;</label>
                    </div>
                </div>

                <!-- Panel 2: Payment -->
                <div class="ease-wizard-panel panel2">
                    <h2 class="ease-text-2xl ease-font-bold ease-mb-6">Payment Details</h2>
                    
                    <div class="ease-form-group">
                        <label class="ease-form-label">Card Number</label>
                        <input type="text" class="ease-form-input" placeholder="0000 0000 0000 0000">
                    </div>
                    <div class="ease-flex ease-gap-4">
                        <div class="ease-form-group" style="flex: 1;">
                            <label class="ease-form-label">Expiry</label>
                            <input type="text" class="ease-form-input" placeholder="MM/YY">
                        </div>
                        <div class="ease-form-group" style="flex: 1;">
                            <label class="ease-form-label">CVC</label>
                            <input type="text" class="ease-form-input" placeholder="123">
                        </div>
                    </div>

                    <div class="ease-wizard-actions">
                        <!-- 'Back' button points to step1 radio -->
                        <label for="step1" class="ease-btn ease-btn-outline ease-btn-hover ease-hover-lift" style="cursor: pointer;">&larr; Back</label>
                        <label for="step3" class="ease-btn ease-btn-primary ease-btn-hover ease-hover-lift" style="cursor: pointer;">Review Order &rarr;</label>
                    </div>
                </div>

                <!-- Panel 3: Confirm -->
                <div class="ease-wizard-panel panel3">
                    <div class="ease-text-center ease-py-8">
                        <div class="ease-mb-4" style="font-size: 48px;">🎉</div>
                        <h2 class="ease-text-2xl ease-font-bold ease-mb-2">Almost Done!</h2>
                        <p class="ease-text-muted">Please review your information before submitting.</p>
                    </div>

                    <div class="ease-wizard-actions">
                        <label for="step2" class="ease-btn ease-btn-outline ease-btn-hover ease-hover-lift" style="cursor: pointer;">&larr; Back</label>
                        <!-- Final submit button -->
                        <button type="submit" class="ease-btn ease-btn-success ease-btn-hover ease-hover-lift">Submit Order</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
