<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Wave Speed Dial</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #f1f5f9; font-family: 'Georgia', serif; padding: 2rem;">
  
  <div class="content ease-fade-in-up" style="max-width: 600px; margin: 0 auto;">
    <h1 style="color: #1e293b; border-bottom: 2px solid #cbd5e1; padding-bottom: 1rem;">Daily News Portal</h1>
    <p style="color: #475569; line-height: 1.6;">Stay updated with the latest headlines. The Speed Dial on the bottom right gives you quick access to sharing, saving, and printing the current article.</p>
  </div>

  <!-- Speed Dial Component -->
  <div class="speed-dial-container">
    <input type="checkbox" id="speed-dial-toggle" class="speed-dial-toggle">
    
    <!-- Action Items (Hidden initially, pop out when toggled) -->
    <div class="action-items">
      <button class="action-btn ease-hover-pop tooltip-container" aria-label="Share">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
        <span class="tooltip">Share</span>
      </button>
      
      <button class="action-btn ease-hover-pop tooltip-container" aria-label="Bookmark">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg>
        <span class="tooltip">Bookmark</span>
      </button>
      
      <button class="action-btn ease-hover-pop tooltip-container" aria-label="Print">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
        <span class="tooltip">Print</span>
      </button>
    </div>

    <!-- Main FAB Trigger -->
    <label for="speed-dial-toggle" class="fab ease-pulse">
      <div class="ripple-wave"></div>
      <svg class="plus-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </label>
  </div>

</body>
</html>
