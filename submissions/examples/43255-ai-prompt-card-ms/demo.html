<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated AI Prompt Card Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem;">
  
  <div class="ease-ai-prompt-wrapper">
    <div class="ease-ai-prompt-inner">
      <textarea class="ease-ai-prompt-input" rows="1" placeholder="Ask AI anything..."></textarea>
      <button class="ease-ai-prompt-btn" aria-label="Send prompt">
        <span class="ease-ai-prompt-icon">↑</span>
      </button>
    </div>
  </div>

</body>
</html>
