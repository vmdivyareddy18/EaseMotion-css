<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Animation Demo</title>

    <!-- Replace with the official EaseMotion CSS CDN if different -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 class="ease-fade-in">Dark Mode Demo</h1>
    <p>Responsive dark-themed example using EaseMotion CSS.</p>
</header>

<main class="cards">

    <div class="card ease-slide-up">
        <h2>Fade Animation</h2>
        <p>This card uses EaseMotion animations in dark mode.</p>
    </div>

    <div class="card ease-hover-grow">
        <h2>Hover Effect</h2>
        <p>Hover over this card to preview the animation.</p>
    </div>

    <div class="card ease-fade-in">
        <h2>Reusable Component</h2>
        <p>Animations work consistently with dark UI elements.</p>
    </div>

</main>

</body>
</html>
