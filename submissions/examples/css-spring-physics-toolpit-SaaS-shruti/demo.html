<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring Physics Tooltip - SaaS Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <button
    class="ease-tooltip-trigger"
    aria-describedby="tooltip1">
    View Pricing

    <span
      class="ease-tooltip"
      id="tooltip1"
      role="tooltip">
      Flexible monthly and yearly plans for every team.
    </span>

  </button>

</div>

</body>
</html>
