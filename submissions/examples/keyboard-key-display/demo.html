<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Key Display Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Keyboard Key Component Demo</h1>

    <section class="demo-section">
      <h2>Text Editing Shortcuts</h2>

      <p>
        Copy
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">C</kbd>
        </span>
      </p>

      <p>
        Paste
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">V</kbd>
        </span>
      </p>

      <p>
        Cut
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">X</kbd>
        </span>
      </p>

      <p>
        Undo
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">Z</kbd>
        </span>
      </p>
    </section>

    <section class="demo-section">
      <h2>Browser Shortcuts</h2>

      <p>
        Find
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">F</kbd>
        </span>
      </p>

      <p>
        New Tab
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">T</kbd>
        </span>
      </p>

      <p>
        Close Tab
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">W</kbd>
        </span>
      </p>

      <p>
        Reopen Tab
        <span class="shortcut">
          <kbd class="ease-kbd">Ctrl</kbd>
          <kbd class="ease-kbd">Shift</kbd>
          <kbd class="ease-kbd">T</kbd>
        </span>
      </p>

    </section>

  </div>

</body>
</html>
