<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Micro Shake Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Responsive Dashboard

</span>

<h1>

Micro Shake Modal

</h1>

<p>

Dashboard-oriented modal
with subtle micro-shake
feedback designed for
analytics interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Insights

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

📊

</div>

<h2>

Performance Metrics

</h2>

<p>

Monitor KPIs, reports and
business intelligence data
using an animated modal
experience.

</p>

<button>

View Reports

</button>

</div>

</div>

</div>

</section>

</body>

</html>
