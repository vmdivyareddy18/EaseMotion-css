<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradient Share Button - Startup Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="startup-viewport">
        <div class="share-wrapper">
            <button class="gradient-share-trigger" aria-label="Open Share Menu">
                <span class="gradient-bg-mesh"></span>
                <span class="gradient-glow-layer"></span>
                <div class="btn-content">
                    <svg class="share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v8"/>
                        <polyline points="16 6 12 2 8 6"/>
                        <line x1="12" x2="12" y1="2" y2="15"/>
                    </svg>
                    <span class="btn-text">Share Project</span>
                </div>
            </button>
        </div>
    </div>

</body>
</html>
