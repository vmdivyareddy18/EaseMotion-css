<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
    }
    .container {
      width: 100%;
      max-width: 600px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 40px;
      font-weight: 400;
    }
    .demo-item {
      margin-bottom: 30px;
    }
    .demo-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .demo-value {
      font-weight: 600;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Progress Bar with Stripes</h2>
    
    <!-- Default Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Uploading file...</span>
        <span class="demo-value">75%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: 75%;"></div>
      </div>
    </div>
    
    <!-- Success Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Complete</span>
        <span class="demo-value">100%</span>
      </div>
      <div class="progress-bar progress-success">
        <div class="progress-fill" style="width: 100%;"></div>
      </div>
    </div>
    
    <!-- Warning Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Processing...</span>
        <span class="demo-value">45%</span>
      </div>
      <div class="progress-bar progress-warning">
        <div class="progress-fill" style="width: 45%;"></div>
      </div>
    </div>
    
    <!-- Error Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Failed</span>
        <span class="demo-value">30%</span>
      </div>
      <div class="progress-bar progress-error">
        <div class="progress-fill" style="width: 30%;"></div>
      </div>
    </div>
    
    <!-- Striped Animated -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Loading...</span>
        <span class="demo-value">60%</span>
      </div>
      <div class="progress-bar progress-striped">
        <div class="progress-fill progress-animated" style="width: 60%;"></div>
      </div>
    </div>
    
    <!-- Indeterminate -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Please wait...</span>
        <span class="demo-value">--</span>
      </div>
      <div class="progress-bar progress-indeterminate">
        <div class="progress-fill"></div>
      </div>
    </div>
    
    <!-- Thin Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Thin style</span>
        <span class="demo-value">85%</span>
      </div>
      <div class="progress-bar progress-thin">
        <div class="progress-fill" style="width: 85%;"></div>
      </div>
    </div>
    
    <!-- Large Progress -->
    <div class="demo-item">
      <div class="demo-label">
        <span>Large style</span>
        <span class="demo-value">50%</span>
      </div>
      <div class="progress-bar progress-large">
        <div class="progress-fill" style="width: 50%;"></div>
      </div>
    </div>
  </div>
</body>
</html>
