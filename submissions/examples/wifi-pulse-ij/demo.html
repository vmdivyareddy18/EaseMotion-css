<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi Pulse - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>WiFi Signal</h1>

    <div class="wifi-card">
      <div class="wifi-icon">
        <div class="wifi-dot"></div>
        <div class="wifi-ring r1"></div>
        <div class="wifi-ring r2"></div>
        <div class="wifi-ring r3"></div>
      </div>
      <span class="wifi-label">Connected</span>
    </div>

    <div class="variant-row">
      <div class="wifi-card sm">
        <div class="wifi-icon">
          <div class="wifi-dot"></div>
          <div class="wifi-ring r1"></div>
          <div class="wifi-ring r2"></div>
          <div class="wifi-ring r3"></div>
        </div>
        <span class="wifi-label">Searching</span>
      </div>
    </div>

    <p class="description">Concentric arc rings pulse outward from the wifi dot with staggered opacity animation, simulating signal transmission.</p>
  </div>
</body>
</html>
