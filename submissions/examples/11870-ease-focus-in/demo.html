<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-focus-in</title>
  <meta name="description" content="A demonstration of the ease-focus-in animation showing an element entering by going from blurred to sharp focus.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-focus-in</h1>
      <p class="subtitle" id="main-desc">Soft blur entrance from blur(var(--ease-blur-start, 20px)) to sharp focus</p>
    </header>

    <div class="display-area">
      <!-- Target that blurs in -->
      <div class="focus-target ease-focus-in" id="target-element">
        <span>✨</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Entrance</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-focus-in');
      void target.offsetWidth;
      target.classList.add('ease-focus-in');
    }
  </script>

</body>
</html>
