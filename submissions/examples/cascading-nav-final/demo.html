<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Navigation Bar - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-container">
        <!-- Pure CSS Toggle Trigger via Checkbox -->
        <input type="checkbox" id="menu-toggle" class="menu-toggle-input">
        
        <div class="nav-header">
            <span class="logo">EaseMotion</span>
            <label for="menu-toggle" class="menu-button" aria-label="Toggle Navigation">
                <span class="burger-icon"></span>
            </label>
        </div>

        <!-- Dynamic Stagger Delay using CSS Scoped Custom Properties -->
        <ul class="nav-links">
            <li style="--item-index: 1;"><a href="#home">Home</a></li>
            <li style="--item-index: 2;"><a href="#features">Features</a></li>
            <li style="--item-index: 3;"><a href="#components">Components</a></li>
            <li style="--item-index: 4;"><a href="#docs">Docs</a></li>
            <li style="--item-index: 5;"><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <main class="demo-content">
        <h1>Pure CSS Cascading Nav Bar</h1>
        <p>Inspired by Neumorphic design patterns and built for the EaseMotion CSS Library.</p>
    </main>

</body>
</html>
