<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Flex Content Shrink Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 440px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Flex Main-Axis Squeezing Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Examine the buttons inside the narrow panel below. Injecting <code>flex-shrink: 0</code> blocks text vanishing glitches natively with 0 scripts.</p>
  </header>

  <div class="alm-narrow-grid-lane">
    
    <span style="font-size: 0.65rem; color: #64748b; font-family: monospace; display: block; margin-bottom: 2px;">LANE_WIDTH // 160PX</span>

    <button class="alm-flex-action-btn" type="button">
      <span class="alm-btn-vector-icon">📥</span>
      <span class="alm-button-text-label">Download Telemetry Log</span>
    </button>

    <button class="alm-flex-action-btn" type="button" style="background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.08); color: #f8fafc;">
      <span class="alm-btn-vector-icon">⚙️</span>
      <span class="alm-button-text-label">Configure Cluster Options</span>
    </button>

  </div>

</body>
</html>
