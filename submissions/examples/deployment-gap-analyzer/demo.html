<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Gap Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="gap">
    <section class="intro">
      <p>Release Audit</p>
      <h1>Deployment Gap Analyzer</h1>
      <span>3 gaps before go-live</span>
    </section>

    <section class="checks" aria-label="Deployment gap checks">
      <article class="pass">
        <strong>Smoke tests</strong>
        <span>Pass</span>
        <p>Critical user paths verified on the release candidate.</p>
      </article>
      <article class="risk">
        <strong>Feature flags</strong>
        <span>Risk</span>
        <p>Two flags still need rollback owner assignment.</p>
      </article>
      <article class="block">
        <strong>Data migration</strong>
        <span>Block</span>
        <p>Dry run report is missing row-count reconciliation.</p>
      </article>
    </section>
  </main>
</body>
</html>
