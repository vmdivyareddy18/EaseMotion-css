<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Snap Carousel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Scroll Snap Carousel</h1>
    <p class="subtitle">CSS scroll-snap with interactive controls</p>

    <div class="carousel-container">
      <button class="carousel-btn carousel-btn--prev" aria-label="Previous slide">&lsaquo;</button>
      <div class="carousel-track" id="carouselTrack">
        <div class="carousel-card" style="--card-hue: 0"><span>1</span><p>Explore the unknown</p></div>
        <div class="carousel-card" style="--card-hue: 60"><span>2</span><p>Creative horizons</p></div>
        <div class="carousel-card" style="--card-hue: 120"><span>3</span><p>Nature's beauty</p></div>
        <div class="carousel-card" style="--card-hue: 180"><span>4</span><p>Urban rhythms</p></div>
        <div class="carousel-card" style="--card-hue: 240"><span>5</span><p>Deep focus</p></div>
        <div class="carousel-card" style="--card-hue: 300"><span>6</span><p>Dream states</p></div>
      </div>
      <button class="carousel-btn carousel-btn--next" aria-label="Next slide">&rsaquo;</button>
    </div>

    <div class="carousel-dots" id="carouselDots"></div>

    <label class="auto-play-label">
      <input type="checkbox" id="autoPlayToggle" checked>
      <span>Auto-play</span>
    </label>
  </main>

  <script>
    const track = document.getElementById('carouselTrack');
    const dotsContainer = document.getElementById('carouselDots');
    const prevBtn = document.querySelector('.carousel-btn--prev');
    const nextBtn = document.querySelector('.carousel-btn--next');
    const autoToggle = document.getElementById('autoPlayToggle');
    const cards = track.querySelectorAll('.carousel-card');
    let autoInterval = null;
    let currentIndex = 0;

    function createDots() {
      cards.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.classList.add('carousel-dot');
        dot.setAttribute('aria-label', `Go to slide ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });
      updateDots();
    }

    function updateDots() {
      const dots = dotsContainer.querySelectorAll('.carousel-dot');
      const cardWidth = cards[0].getBoundingClientRect().width + parseFloat(getComputedStyle(track).gap) || 0;
      const scrollPos = track.scrollLeft;
      const idx = Math.round(scrollPos / cardWidth);
      currentIndex = idx;
      dots.forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    function goTo(index) {
      currentIndex = Math.max(0, Math.min(index, cards.length - 1));
      const cardWidth = cards[0].getBoundingClientRect().width + parseFloat(getComputedStyle(track).gap) || 0;
      track.scrollTo({ left: cardWidth * currentIndex, behavior: 'smooth' });
    }

    function goNext() { goTo(currentIndex + 1); }
    function goPrev() { goTo(currentIndex - 1); }

    function startAuto() {
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(goNext, 3000);
    }

    function stopAuto() {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
      }
    }

    prevBtn.addEventListener('click', goPrev);
    nextBtn.addEventListener('click', goNext);

    let scrollTimeout;
    track.addEventListener('scroll', () => {
      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(updateDots, 50);
    });

    autoToggle.addEventListener('change', () => {
      if (autoToggle.checked) startAuto(); else stopAuto();
    });

    createDots();
    if (autoToggle.checked) startAuto();
  </script>
</body>
</html>
