<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Subscription Seat Utilization Table</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div style="text-align:center;">
    <h1>Subscription Seat Utilization</h1>
    <p class="subtitle">Monitor seat usage across all subscription plans in real time</p>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid" id="summaryGrid">
    <div class="summary-card">
      <span class="card-value blue" id="totalOrgs">0</span>
      <span class="card-label">Total Orgs</span>
    </div>
    <div class="summary-card">
      <span class="card-value green" id="totalSeats">0</span>
      <span class="card-label">Total Seats</span>
    </div>
    <div class="summary-card">
      <span class="card-value orange" id="usedSeats">0</span>
      <span class="card-label">Seats Used</span>
    </div>
    <div class="summary-card">
      <span class="card-value red" id="criticalCount">0</span>
      <span class="card-label">Critical (&gt;90%)</span>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <div class="toolbar">
      <span class="toolbar-title">All Subscriptions</span>
      <div class="toolbar-right">
        <input class="search-input" id="searchInput"
               placeholder="Search org or plan..." type="text"/>
        <select class="filter-select" id="planFilter">
          <option value="">All Plans</option>
          <option value="Enterprise">Enterprise</option>
          <option value="Business">Business</option>
          <option value="Starter">Starter</option>
          <option value="Free">Free</option>
        </select>
        <select class="filter-select" id="statusFilter">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Warning">Warning</option>
          <option value="Critical">Critical</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th data-col="org"      class="sorted">Organisation <span class="sort-icon">&#9650;</span></th>
            <th data-col="plan">Plan <span class="sort-icon">&#9650;</span></th>
            <th data-col="seats">Seats Used <span class="sort-icon">&#9650;</span></th>
            <th data-col="util">Utilization <span class="sort-icon">&#9650;</span></th>
            <th data-col="trend">30d Trend <span class="sort-icon">&#9650;</span></th>
            <th data-col="status">Status <span class="sort-icon">&#9650;</span></th>
            <th data-col="renewal">Renewal <span class="sort-icon">&#9650;</span></th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="pagination">
      <span id="pageInfo">Showing 0 of 0</span>
      <div class="page-btns">
        <button class="page-btn" id="prevBtn" onclick="changePage(-1)">&#8592; Prev</button>
        <button class="page-btn active" id="pageNum">1</button>
        <button class="page-btn" id="nextBtn" onclick="changePage(1)">Next &#8594;</button>
      </div>
    </div>
  </div>

<script>
const DATA = [
  { org:"Acme Corp",       plan:"Enterprise", total:500, used:487, trend:5,  status:"Critical", renewal:"2025-08-15" },
  { org:"TechNova Ltd",    plan:"Business",   total:100, used:91,  trend:8,  status:"Critical", renewal:"2025-09-01" },
  { org:"Skyline Media",   plan:"Business",   total:50,  used:38,  trend:-2, status:"Active",   renewal:"2025-11-20" },
  { org:"DataBridge Inc",  plan:"Enterprise", total:200, used:162, trend:3,  status:"Active",   renewal:"2026-01-10" },
  { org:"PixelForge",      plan:"Starter",    total:25,  used:24,  trend:1,  status:"Warning",  renewal:"2025-07-30" },
  { org:"CloudSprint",     plan:"Enterprise", total:300, used:218, trend:-5, status:"Active",   renewal:"2026-03-15" },
  { org:"NovaPulse",       plan:"Business",   total:75,  used:69,  trend:6,  status:"Warning",  renewal:"2025-10-05" },
  { org:"Greenleaf SaaS",  plan:"Starter",    total:10,  used:3,   trend:0,  status:"Active",   renewal:"2025-12-01" },
  { org:"Orbital Systems", plan:"Enterprise", total:400, used:397, trend:12, status:"Critical", renewal:"2025-08-22" },
  { org:"Mintboard Co",    plan:"Free",       total:5,   used:5,   trend:0,  status:"Critical", renewal:"N/A" },
  { org:"Redwood Analytics",plan:"Business",  total:60,  used:22,  trend:-3, status:"Active",   renewal:"2026-02-14" },
  { org:"Vortex Design",   plan:"Starter",    total:15,  used:12,  trend:2,  status:"Warning",  renewal:"2025-09-18" },
  { org:"Luminary Health", plan:"Enterprise", total:250, used:101, trend:-8, status:"Active",   renewal:"2026-04-01" },
  { org:"Cascade Logic",   plan:"Business",   total:80,  used:74,  trend:4,  status:"Warning",  renewal:"2025-10-30" },
  { org:"Driftwave Labs",  plan:"Free",       total:5,   used:2,   trend:0,  status:"Inactive", renewal:"N/A" },
];

const PAGE_SIZE = 8;
let page = 1;
let sortCol = "org";
let sortAsc = true;
let filtered = [...DATA];

function utilClass(pct) {
  if (pct >= 90) return "high";
  if (pct >= 70) return "medium";
  return "low";
}
function statusClass(s) {
  return { Active:"active", Warning:"warning", Critical:"critical", Inactive:"inactive" }[s] || "inactive";
}
function planClass(p) {
  return { Enterprise:"plan-enterprise", Business:"plan-business", Starter:"plan-starter", Free:"plan-free" }[p] || "plan-free";
}
function trendClass(t) {
  return t > 0 ? "up" : t < 0 ? "down" : "flat";
}
function trendLabel(t) {
  return t > 0 ? "&#9650; +" + t + "%" : t < 0 ? "&#9660; " + t + "%" : "&#8212; 0%";
}

function render() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const plan   = document.getElementById("planFilter").value;
  const status = document.getElementById("statusFilter").value;

  filtered = DATA.filter(r => {
    const matchSearch = r.org.toLowerCase().includes(search) || r.plan.toLowerCase().includes(search);
    const matchPlan   = !plan   || r.plan   === plan;
    const matchStatus = !status || r.status === status;
    return matchSearch && matchPlan && matchStatus;
  });

  filtered.sort((a, b) => {
    let av, bv;
    if      (sortCol === "org")     { av = a.org;    bv = b.org; }
    else if (sortCol === "plan")    { av = a.plan;   bv = b.plan; }
    else if (sortCol === "seats")   { av = a.used;   bv = b.used; }
    else if (sortCol === "util")    { av = a.used/a.total; bv = b.used/b.total; }
    else if (sortCol === "trend")   { av = a.trend;  bv = b.trend; }
    else if (sortCol === "status")  { av = a.status; bv = b.status; }
    else if (sortCol === "renewal") { av = a.renewal; bv = b.renewal; }
    else                            { av = a.org;    bv = b.org; }
    if (av < bv) return sortAsc ? -1 : 1;
    if (av > bv) return sortAsc ? 1 : -1;
    return 0;
  });

  // Summary
  const totalSeats = DATA.reduce((s,r) => s + r.total, 0);
  const usedSeats  = DATA.reduce((s,r) => s + r.used,  0);
  const critical   = DATA.filter(r => (r.used/r.total) >= 0.9).length;
  document.getElementById("totalOrgs").textContent    = DATA.length;
  document.getElementById("totalSeats").textContent   = totalSeats.toLocaleString();
  document.getElementById("usedSeats").textContent    = usedSeats.toLocaleString();
  document.getElementById("criticalCount").textContent = critical;

  // Pagination
  const total = filtered.length;
  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (page > pages) page = pages;
  const start = (page - 1) * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById("pageInfo").textContent =
    `Showing ${start + 1}&#8211;${Math.min(start + PAGE_SIZE, total)} of ${total}`;
  document.getElementById("pageNum").textContent = page;
  document.getElementById("prevBtn").disabled = page <= 1;
  document.getElementById("nextBtn").disabled = page >= pages;

  // Rows
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = slice.map(r => {
    const pct   = Math.round((r.used / r.total) * 100);
    const cls   = utilClass(pct);
    const sCls  = statusClass(r.status);
    const pCls  = planClass(r.plan);
    const tCls  = trendClass(r.trend);
    return `<tr>
      <td><strong>${r.org}</strong></td>
      <td><span class="plan-badge ${pCls}">${r.plan}</span></td>
      <td><span class="seats-text"><strong>${r.used}</strong> / ${r.total}</span></td>
      <td>
        <div class="util-cell">
          <div class="util-bar-track">
            <div class="util-bar-fill ${cls}" style="width:${pct}%"></div>
          </div>
          <span class="util-pct ${cls}">${pct}%</span>
        </div>
      </td>
      <td><span class="trend ${tCls}">${trendLabel(r.trend)}</span></td>
      <td>
        <span class="status-badge status-${sCls}">
          <span class="status-dot"></span>${r.status}
        </span>
      </td>
      <td style="font-size:0.82rem;color:#64748b;">${r.renewal}</td>
      <td><button class="action-btn">Manage</button></td>
    </tr>`;
  }).join("");
}

function changePage(dir) {
  const pages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  page = Math.max(1, Math.min(pages, page + dir));
  render();
}

// Sort on header click
document.querySelectorAll("th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    document.querySelectorAll("th").forEach(t => t.classList.remove("sorted"));
    th.classList.add("sorted");
    page = 1;
    render();
  });
});

document.getElementById("searchInput").addEventListener("input", () => { page = 1; render(); });
document.getElementById("planFilter").addEventListener("change",  () => { page = 1; render(); });
document.getElementById("statusFilter").addEventListener("change", () => { page = 1; render(); });

render();
</script>
</body>
</html>
