<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble Card Hover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card-grid">
      <div class="wobble-card" style="--hue: 0">
        <div class="wobble-card-inner">
          <div class="wobble-icon">⚡</div>
          <div class="wobble-title">Lightning</div>
          <div class="wobble-desc">Fast and responsive</div>
        </div>
      </div>
      <div class="wobble-card" style="--hue: 140">
        <div class="wobble-card-inner">
          <div class="wobble-icon">🌿</div>
          <div class="wobble-title">Nature</div>
          <div class="wobble-desc">Organic and fluid</div>
        </div>
      </div>
      <div class="wobble-card" style="--hue: 260">
        <div class="wobble-card-inner">
          <div class="wobble-icon">🌀</div>
          <div class="wobble-title">Vortex</div>
          <div class="wobble-desc">Spinning energy</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
