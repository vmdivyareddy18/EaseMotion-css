<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Toggle Switch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Power Toggle Switch</h1>

  <div class="pot-variants">
    <!-- Default -->
    <div class="pot-wrapper">
      <span class="pot-label">Default</span>
      <div class="pot-toggle" data-variant="default">
        <div class="pot-track">
          <div class="pot-handle">
            <svg class="pot-icon pot-icon-off" viewBox="0 0 24 24" width="14" height="14">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="pot-icon pot-icon-on" viewBox="0 0 24 24" width="14" height="14">
              <path d="M12 2v8m0 0l-3-3m3 3l3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 12a6 6 0 0 0 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Slim -->
    <div class="pot-wrapper">
      <span class="pot-label">Slim</span>
      <div class="pot-toggle" data-variant="slim">
        <div class="pot-track">
          <div class="pot-handle">
            <svg class="pot-icon pot-icon-off" viewBox="0 0 24 24" width="12" height="12">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="pot-icon pot-icon-on" viewBox="0 0 24 24" width="12" height="12">
              <path d="M12 2v8m0 0l-3-3m3 3l3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 12a6 6 0 0 0 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Large -->
    <div class="pot-wrapper">
      <span class="pot-label">Large</span>
      <div class="pot-toggle" data-variant="large">
        <div class="pot-track">
          <div class="pot-handle">
            <svg class="pot-icon pot-icon-off" viewBox="0 0 24 24" width="18" height="18">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="pot-icon pot-icon-on" viewBox="0 0 24 24" width="18" height="18">
              <path d="M12 2v8m0 0l-3-3m3 3l3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 12a6 6 0 0 0 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Neon -->
    <div class="pot-wrapper">
      <span class="pot-label">Neon</span>
      <div class="pot-toggle" data-variant="neon">
        <div class="pot-track">
          <div class="pot-handle">
            <svg class="pot-icon pot-icon-off" viewBox="0 0 24 24" width="14" height="14">
              <path d="M18.36 6.64a9 9 0 1 1-12.73 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <svg class="pot-icon pot-icon-on" viewBox="0 0 24 24" width="14" height="14">
              <path d="M12 2v8m0 0l-3-3m3 3l3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 12a6 6 0 0 0 12 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>

  <p class="pot-status">Status: <span id="potStatus">Off</span></p>

  <script>
    document.querySelectorAll('.pot-toggle').forEach(toggle => {
      toggle.addEventListener('click', function () {
        this.classList.toggle('on');
        const anyOn = document.querySelector('.pot-toggle.on');
        document.getElementById('potStatus').textContent = anyOn ? 'On' : 'Off';
      });
    });
  </script>
</body>
</html>
