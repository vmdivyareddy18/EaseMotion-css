<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Restaurant Analytics Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Restaurant Analytics Dashboard</h1>

<p>Monitor reservations, orders and revenue.</p>

</div>

<button class="action-btn">

+ Add Reservation

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">🍽️</span>

<h3>Total Orders</h3>

<h2>1,285</h2>

<div class="progress-bar">

<div class="progress orders"></div>

</div>

</div>

<div class="card">

<span class="icon">📅</span>

<h3>Reservations</h3>

<h2>482</h2>

<div class="progress-bar">

<div class="progress reservations"></div>

</div>

</div>

<div class="card">

<span class="icon">💰</span>

<h3>Revenue</h3>

<h2>$52K</h2>

<div class="progress-bar">

<div class="progress revenue"></div>

</div>

</div>

<div class="card">

<span class="icon">⭐</span>

<h3>Satisfaction</h3>

<h2>4.9</h2>

<div class="progress-bar">

<div class="progress satisfaction"></div>

</div>

</div>

</section>

<section class="card activity">

<h2>Recent Activity</h2>

<div class="activity-item">

<h4>Reservation Confirmed</h4>

<p>Table 12 booked.</p>

</div>

<div class="activity-item">

<h4>Order Completed</h4>

<p>Order #524 delivered.</p>

</div>

<div class="activity-item">

<h4>Payment Received</h4>

<p>$450 transaction.</p>

</div>

</section>

</div>

</body>

</html>
