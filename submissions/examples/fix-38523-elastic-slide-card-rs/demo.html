<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Slide Card Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <div class="section before">
            <h2>Standard Card (Before)</h2>
            <div class="card standard-card">
                <div class="card-image"></div>
                <div class="card-content">
                    <span class="card-tag">Technology</span>
                    <h3 class="card-title">The Future of Minimal Design</h3>
                    <p class="card-excerpt">Exploring how less is more in modern web interfaces.</p>
                </div>
            </div>
        </div>

        <div class="section after">
            <h2>Elastic Slide Card (After)</h2>
            <div class="card elastic-slide-card">
                <div class="card-image"></div>
                <div class="card-content">
                    <span class="card-tag">Technology</span>
                    <h3 class="card-title">The Future of Minimal Design</h3>
                    <p class="card-excerpt">Exploring how less is more in modern web interfaces.</p>
                    <a href="#" class="card-link">Read more <span>&rarr;</span></a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
