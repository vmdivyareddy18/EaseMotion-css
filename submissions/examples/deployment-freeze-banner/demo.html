<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Freeze Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="freeze-shell" aria-labelledby="freeze-title">
    <section class="freeze-banner">
      <div class="freeze-copy">
        <p class="eyebrow">release governance</p>
        <h1 id="freeze-title">Deployment freeze banner</h1>
        <p>Animated freeze notices make blackout windows and exception status easy to see before teams ship changes.</p>
      </div>

      <div class="freeze-meter" aria-label="Deployment freeze window">
        <span class="status-dot"></span>
        <strong>Freeze active</strong>
        <small>Exception review opens in 2h 15m</small>
        <div class="timeline" aria-hidden="true">
          <span></span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
