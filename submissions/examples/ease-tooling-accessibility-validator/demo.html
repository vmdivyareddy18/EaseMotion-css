<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessibility Validator Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tool-wrapper">
    <div class="tool-header">
      <h1>A11y Baseline Validator</h1>
      <p>This UI demonstrates the logic of the accessibility script requested in #15872.</p>
    </div>
    
    <div class="tool-grid">
      <div class="input-panel">
        <h3>Paste CSS</h3>
        <textarea id="cssInput" placeholder="Paste style.css here...">
.btn:hover { background: red; }
        </textarea>
      </div>
      <div class="input-panel">
        <h3>Paste HTML</h3>
        <textarea id="htmlInput" placeholder="Paste demo.html here...">
<button class="btn">Click Me</button>
        </textarea>
      </div>
    </div>
    
    <button class="validate-btn" onclick="runValidation()">Run Validator</button>
    
    <div id="resultBox" class="result-box">
      Waiting for input...
    </div>
  </div>

  <script>
    function runValidation() {
      const css = document.getElementById('cssInput').value;
      const html = document.getElementById('htmlInput').value;
      const resultBox = document.getElementById('resultBox');
      
      const isInteractiveHtml = /<(button|a\s+href|input|select|textarea)/i.test(html);
      const isInteractiveCss = /:hover\b/i.test(css);
      const isInteractive = isInteractiveHtml || isInteractiveCss;
      
      if (!isInteractive) {
        resultBox.className = 'result-box success';
        resultBox.innerHTML = '✅ <strong>Skipped:</strong> No interactive elements or hover states detected.';
        return;
      }
      
      const hasFocus = /:(focus|focus-visible)\b/i.test(css);
      if (hasFocus) {
        resultBox.className = 'result-box success';
        resultBox.innerHTML = '✅ <strong>Passed:</strong> Focus states correctly defined.';
      } else {
        resultBox.className = 'result-box error';
        resultBox.innerHTML = '❌ <strong>Failed:</strong> Interactive element detected, but no :focus or :focus-visible rules found. Keyboard accessibility compromised.';
      }
    }
  </script>
</body>
</html>
