<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Billing Cycle Renewal Meter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Billing Cycle</h1>

        <p class="subtitle">
            Your subscription renews in 8 days.
        </p>

        <div class="meter">

            <div class="progress-ring">

                <div class="progress-value">
                    73%
                </div>

            </div>

        </div>

        <div class="info">

            <div class="item">

                <span>Current Plan</span>

                <strong>Pro</strong>

            </div>

            <div class="item">

                <span>Renewal Date</span>

                <strong>August 03, 2026</strong>

            </div>

            <div class="item">

                <span>Billing Status</span>

                <span class="badge active">
                    Active
                </span>

            </div>

        </div>

        <button class="renew-btn">
            Manage Subscription
        </button>

    </div>

</div>

</body>
</html>
