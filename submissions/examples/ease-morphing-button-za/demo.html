<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing Button - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="mph-header"><h1>CSS Morphing Buttons</h1><p>Buttons that smoothly morph between shapes and sizes on interaction</p></header>
<section class="mph-section"><h2>Circle to Rectangle</h2><div class="mph-row"><button class="mph-btn mph-circle-rect">Hover Me</button></div></section>
<section class="mph-section"><h2>Expand Width</h2><div class="mph-row"><button class="mph-btn mph-expand">&#9654; Play</button><button class="mph-btn mph-expand">&#9658; Watch</button><button class="mph-btn mph-expand">&#9835; Listen</button></div></section>
<section class="mph-section"><h2>Border to Fill</h2><div class="mph-row"><button class="mph-btn mph-border-fill">Submit</button><button class="mph-btn mph-border-fill mph-accent">Send</button><button class="mph-btn mph-border-fill mph-success">Save</button><button class="mph-btn mph-border-fill mph-danger">Delete</button></div></section>
<section class="mph-section"><h2>Icon Expand</h2><div class="mph-row"><button class="mph-btn mph-icon-expand"><span class="mph-icon">&#9654;</span><span class="mph-text">Watch Video</span></button><button class="mph-btn mph-icon-expand mph-accent"><span class="mph-icon">&#8595;</span><span class="mph-text">Download</span></button><button class="mph-btn mph-icon-expand mph-success"><span class="mph-icon">&#9993;</span><span class="mph-text">Send Mail</span></button></div></section>
<section class="mph-section"><h2>Skew on Hover</h2><div class="mph-row"><button class="mph-btn mph-skew">Skew Me</button><button class="mph-btn mph-skew mph-accent">Skew Accent</button><button class="mph-btn mph-skew mph-success">Skew Green</button></div></section>
<section class="mph-section"><h2>Slide Shimmer</h2><div class="mph-row mph-shimmer-row"><button class="mph-btn mph-shimmer-btn">Get Started</button><button class="mph-btn mph-shimmer-btn mph-accent">Learn More</button></div></section>
</body>
</html>
