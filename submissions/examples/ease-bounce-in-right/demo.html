<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Bounce In Right - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-bounce-right">Right Entrance</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-bounce-right'); void b.offsetWidth; b.classList.add('ease-bounce-right');">Bounce In</button>
    </div>
</body>
</html>
