<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Scale-Hover Popover</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1rem;
    }
    .panel-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      padding: 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      justify-content: center;
      min-height: 300px; /* Give space for popover to show */
    }
    .action-btn {
      background: var(--ease-color-primary, #6c63ff);
      border: none;
      color: white;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      font-size: 0.875rem;
      transition: background 0.2s ease;
    }
    .action-btn:hover {
      background: #5b54d6;
    }
    .popover-header {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    .popover-body {
      color: #94a3b8;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .popover-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
    }
    .btn-small {
      background: rgba(255,255,255,0.1);
      border: none;
      color: white;
      padding: 0.35rem 0.75rem;
      border-radius: 0.25rem;
      cursor: pointer;
      font-size: 0.75rem;
    }
    .btn-small:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>

  <header style="text-align: center; max-width: 500px; margin-bottom: 2.5rem;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Scale-Hover Popover</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">A responsive, keyboard accessible popover using pure CSS. Smooth scale transitions out of the box.</p>
  </header>

  <div class="panel-box">
    
    <div class="popover-container">
      <button class="action-btn" aria-haspopup="true" aria-expanded="false">
        ⚙️ Dashboard Settings
      </button>

      <div class="popover-content" role="tooltip">
        <div class="popover-header">Configuration</div>
        <div class="popover-body">
          Adjust your dashboard preferences here. Changes are saved automatically.
        </div>
        <div class="popover-actions">
          <button class="btn-small">Cancel</button>
          <button class="btn-small" style="background: var(--ease-color-primary, #6c63ff);">Apply</button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
