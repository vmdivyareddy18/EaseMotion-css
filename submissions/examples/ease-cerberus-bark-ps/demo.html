<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Cerberus Bark Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #27272a;
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }
    
    .demo-dog {
      font-size: 6rem;
      cursor: pointer;
      display: inline-block;

      color: #ef4444;

      margin-bottom: 4rem;

</head>
<body>
  
  <p class="instruction">Beware of the dog... hover to trigger!</p>

  <div class="ease-cerberus-bark-hover-ps demo-dog">

</html>
