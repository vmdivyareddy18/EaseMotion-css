<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Testimonial Carousel — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Testimonial Carousel</h1>
  <p class="subtitle">Slide-in animation, star ratings, dot indicators, prev/next buttons</p>

  <div class="ease-testimonial-carousel">
    <div class="ease-testimonial-track" id="track">
      <div class="ease-testimonial-slide">
        <div class="ease-testimonial">
          <div class="ease-testimonial-quote">"</div>
          <p class="ease-testimonial-text">
            EaseMotion CSS transformed how we build UIs. The animation-first approach
            lets us create polished interfaces without writing a single keyframe.
          </p>
          <div class="ease-testimonial-stars">★★★★★</div>
          <div class="ease-testimonial-author">
            <img class="ease-testimonial-avatar" src="https://i.pravatar.cc/96?img=1" alt="Sarah Chen">
            <div class="ease-testimonial-info">
              <div class="ease-testimonial-name">Sarah Chen</div>
              <div class="ease-testimonial-title">Lead Engineer, Acme Corp</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="ease-testimonial-nav">
      <button class="ease-testimonial-btn" id="prevBtn" aria-label="Previous">‹</button>
      <div class="ease-testimonial-dots" id="dots"></div>
      <button class="ease-testimonial-btn" id="nextBtn" aria-label="Next">›</button>
    </div>
  </div>

  <script>
    const testimonials = [
      {
        text: "EaseMotion CSS transformed how we build UIs. The animation-first approach lets us create polished interfaces without writing a single keyframe.",
        stars: 5, name: "Sarah Chen", title: "Lead Engineer, Acme Corp", img: "https://i.pravatar.cc/96?img=1"
      },
      {
        text: "We switched from Tailwind to EaseMotion and our build times dropped. The human-readable class names make onboarding new devs effortless.",
        stars: 5, name: "Marcus Johnson", title: "CTO, Webflow Labs", img: "https://i.pravatar.cc/96?img=3"
      },
      {
        text: "The composable animations are a game-changer. We built an entire landing page with just HTML classes — no custom CSS needed.",
        stars: 4, name: "Priya Patel", title: "Design Lead, Pixel Studios", img: "https://i.pravatar.cc/96?img=5"
      },
      {
        text: "Dark mode works out of the box, the docs are clear, and the community is helpful. EaseMotion is my go-to for any new project.",
        stars: 5, name: "Alex Rivera", title: "Freelance Developer", img: "https://i.pravatar.cc/96?img=8"
      }
    ];

    let current = 0;
    const track = document.getElementById('track');
    const dots = document.getElementById('dots');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let autoTimer;

    function renderSlide(i) {
      const t = testimonials[i];
      const stars = '★'.repeat(t.stars) + '☆'.repeat(5 - t.stars);
      track.innerHTML = `
        <div class="ease-testimonial-slide">
          <div class="ease-testimonial">
            <div class="ease-testimonial-quote">"</div>
            <p class="ease-testimonial-text">${t.text}</p>
            <div class="ease-testimonial-stars">${stars}</div>
            <div class="ease-testimonial-author">
              <img class="ease-testimonial-avatar" src="${t.img}" alt="${t.name}">
              <div class="ease-testimonial-info">
                <div class="ease-testimonial-name">${t.name}</div>
                <div class="ease-testimonial-title">${t.title}</div>
              </div>
            </div>
          </div>
        </div>
      `;
      document.querySelectorAll('.ease-testimonial-dot').forEach((d, idx) => {
        d.classList.toggle('active', idx === i);
      });
    }

    function goTo(i) {
      if (i < 0) i = testimonials.length - 1;
      if (i >= testimonials.length) i = 0;
      current = i;
      renderSlide(i);
      resetAuto();
    }

    function resetAuto() {
      clearInterval(autoTimer);
      autoTimer = setInterval(() => goTo(current + 1), 4000);
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    testimonials.forEach((_, i) => {
      const dot = document.createElement('button');
      dot.className = 'ease-testimonial-dot' + (i === 0 ? ' active' : '');
      dot.addEventListener('click', () => goTo(i));
      dots.appendChild(dot);
    });

    renderSlide(0);
    resetAuto();

    document.querySelector('.ease-testimonial-carousel').addEventListener('mouseenter', () => clearInterval(autoTimer));
    document.querySelector('.ease-testimonial-carousel').addEventListener('mouseleave', resetAuto);
  </script>
</body>
</html>
