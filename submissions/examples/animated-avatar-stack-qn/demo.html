<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Avatar Stack - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Team Members</h2>
        <p>Hover over the avatars to see them spread out</p>
        
        <!-- Avatar Stack Container -->
        <div class="avatar-stack-qn">
            <!-- Avatar 1 -->
            <div class="avatar-qn" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                <span class="avatar-initials-qn">JD</span>
            </div>
            
            <!-- Avatar 2 -->
            <div class="avatar-qn" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                <span class="avatar-initials-qn">SM</span>
            </div>
            
            <!-- Avatar 3 -->
            <div class="avatar-qn" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                <span class="avatar-initials-qn">AK</span>
            </div>
            
            <!-- Avatar 4 -->
            <div class="avatar-qn" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                <span class="avatar-initials-qn">RB</span>
            </div>
            
            <!-- Avatar 5 -->
            <div class="avatar-qn" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);">
                <span class="avatar-initials-qn">TL</span>
            </div>
            
            <!-- More Indicator -->
            <div class="avatar-more-qn">
                <span>+3</span>
            </div>
        </div>
        
        <!-- Alternative: With Images -->
        <h3 style="margin-top: 60px;">With Images</h3>
        <div class="avatar-stack-qn">
            <div class="avatar-qn avatar-image-qn" style="background-image: url('https://i.pravatar.cc/150?img=1');"></div>
            <div class="avatar-qn avatar-image-qn" style="background-image: url('https://i.pravatar.cc/150?img=2');"></div>
            <div class="avatar-qn avatar-image-qn" style="background-image: url('https://i.pravatar.cc/150?img=3');"></div>
            <div class="avatar-qn avatar-image-qn" style="background-image: url('https://i.pravatar.cc/150?img=4');"></div>
            <div class="avatar-qn avatar-image-qn" style="background-image: url('https://i.pravatar.cc/150?img=5');"></div>
        </div>
    </div>
</body>
</html>
