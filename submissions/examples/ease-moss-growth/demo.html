<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moss Growth</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🌿 Moss Growth</h1>
        <p class="subtitle">Green patches that slowly spread like moss on surfaces</p>

        <div class="moss-wrapper">
            <canvas id="mossCanvas"></canvas>

            <div class="controls">
                <button id="spawnBtn">🌱 Spawn</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="densityBtn">Density: Medium</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🌿 Growing moss</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('mossCanvas');
        const ctx = canvas.getContext('2d');
        const spawnBtn = document.getElementById('spawnBtn');
        const speedBtn = document.getElementById('speedBtn');
        const densityBtn = document.getElementById('densityBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let mossParticles = [];
        let growthMap = [];
        let spores = [];
        let speed = 0.02;
        let speedLevel = 1;
        let density = 1;
        let densityLevel = 1;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let isGrowing = true;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== DENSITY OPTIONS =====
        const densities = [
            { name: 'Sparse', value: 0.5 },
            { name: 'Medium', value: 1 },
            { name: 'Dense', value: 1.5 },
            { name: 'Lush', value: 2 },
        ];

        // ===== MOSS PARTICLE CLASS =====
        class MossParticle {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size || 2 + Math.random() * 4;
                this.targetSize = this.size * (1.5 + Math.random() * 1.5);
                this.growth = 0;
                this.growthSpeed = 0.01 + Math.random() * 0.02;
                this.color = color || this.randomColor();
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.01 + Math.random() * 0.02;
                this.alive = true;
                this.age = 0;
                this.maxAge = 200 + Math.random() * 300;
                this.children = [];
                this.hasSpawned = false;
                this.spawnChance = 0.003 + Math.random() * 0.005;
                this.variation = 0.8 + Math.random() * 0.4;
                this.shape = Math.random() > 0.5 ? 'round' : 'irregular';
                this.clusterSize = 3 + Math.floor(Math.random() * 5);
            }

            randomColor() {
                const hue = 90 + Math.random() * 40;
                const sat = 50 + Math.random() * 40;
                const light = 20 + Math.random() * 30;
                return { hue, sat, light };
            }

            update(time, speed, density) {
                if (!this.alive) return;

                this.age += speed * 2;
                this.phase += this.pulseSpeed * speed * 5;

                // Growth
                if (this.growth < 1) {
                    this.growth += this.growthSpeed * speed * 10 * density;
                    if (this.growth > 1) this.growth = 1;
                }

                // Spawn children
                if (!this.hasSpawned && this.growth > 0.5 && Math.random() < this.spawnChance * speed * 30 * density) {
                    this.spawnChild(time);
                }

                // Death
                if (this.age > this.maxAge && Math.random() < 0.001 * speed * 20) {
                    this.alive = false;
                }

                // Update children
                for (let i = this.children.length - 1; i >= 0; i--) {
                    const child = this.children[i];
                    child.update(time, speed, density);
                    if (!child.alive) {
                        this.children.splice(i, 1);
                    }
                }
            }

            spawnChild(time) {
                this.hasSpawned = true;
                const angle = Math.random() * Math.PI * 2;
                const dist = this.size * (1 + Math.random() * 3);
                const x = this.x + Math.cos(angle) * dist;
                const y = this.y + Math.sin(angle) * dist;
                const newSize = this.size * (0.6 + Math.random() * 0.4);

                const child = new MossParticle(x, y, newSize, this.color);
                child.growth = 0.3 + Math.random() * 0.3;
                child.growthSpeed = this.growthSpeed * (0.7 + Math.random() * 0.6);
                child.maxAge = this.maxAge * (0.7 + Math.random() * 0.6);
                child.spawnChance = this.spawnChance * 0.9;
                child.clusterSize = this.clusterSize;
                this.children.push(child);
            }

            draw(ctx) {
                if (!this.alive || this.growth <= 0) return;

                const size = this.size * this.growth * this.variation;
                const pulse = 0.8 + 0.2 * Math.sin(this.phase);
                const currentSize = size * pulse;

                const { hue, sat, light } = this.color;
                const alpha = 0.6 + 0.4 * this.growth;

                // Glow
                const grad = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, currentSize * 3
                );
                grad.addColorStop(0, `hsla(${hue}, ${sat}%, ${light + 20}%, ${alpha * 0.1})`);
                grad.addColorStop(1, `hsla(${hue}, ${sat}%, ${light}%, 0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, currentSize * 3, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Main moss blob
                if (this.shape === 'round') {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, currentSize, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.3)`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    // Irregular shape
                    ctx.beginPath();
                    const points = 6 + Math.floor(Math.random() * 4);
                    for (let i = 0; i < points; i++) {
                        const angle = (i / points) * Math.PI * 2 + this.phase * 0.1;
                        const r = currentSize * (0.7 + 0.3 * Math.sin(angle * 2 + this.phase));
                        const px = this.x + Math.cos(angle) * r;
                        const py = this.y + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${alpha})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.3)`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Texture dots
                for (let i = 0; i < 3; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * currentSize * 0.6;
                    const dx = this.x + Math.cos(angle) * dist;
                    const dy = this.y + Math.sin(angle) * dist;
                    ctx.beginPath();
                    ctx.arc(dx, dy, currentSize * 0.1 + Math.random() * 0.1, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${hue + 10}, ${sat - 10}%, ${light + 20}%, ${alpha * 0.3})`;
                    ctx.fill();
                }

                // Highlight
                ctx.beginPath();
                ctx.arc(
                    this.x - currentSize * 0.2,
                    this.y - currentSize * 0.2,
                    currentSize * 0.15,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = `hsla(${hue + 20}, ${sat - 20}%, ${light + 40}%, ${alpha * 0.2})`;
                ctx.fill();
            }

            isDead() {
                return !this.alive;
            }
        }

        // ===== SPORE CLASS =====
        class Spore {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 1 + Math.random() * 2;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -0.5 - Math.random() * 0.5;
                this.life = 1;
                this.maxLife = 80 + Math.random() * 120;
                this.age = 0;
                this.phase = Math.random() * Math.PI * 2;
                this.color = {
                    hue: 90 + Math.random() * 40,
                    sat: 50 + Math.random() * 30,
                    light: 60 + Math.random() * 20
                };
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.002;
                this.vx += Math.sin(this.phase) * 0.01;
                this.phase += 0.05;
                this.life = 1 - this.age / this.maxLife;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const { hue, sat, light } = this.color;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${this.life * 0.5})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.2)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== INIT MOSS =====
        function initMoss(count) {
            const w = canvas.width;
            const h = canvas.height;
            mossParticles = [];
            spores = [];
            growthMap = [];

            for (let i = 0; i < count; i++) {
                const x = 20 + Math.random() * (w - 40);
                const y = 20 + Math.random() * (h - 40);
                const size = 3 + Math.random() * 5;
                const moss = new MossParticle(x, y, size);
                moss.growth = Math.random() * 0.5;
                mossParticles.push(moss);
            }
        }
        initMoss(15);

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            // Surface gradient
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#1a1a2a');
            grad.addColorStop(0.3, '#14141e');
            grad.addColorStop(0.6, '#0a0a12');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Subtle surface texture
            for (let i = 0; i < 50; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h;
                const size = 0.5 + Math.random() * 1.5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${0.01 + Math.random() * 0.02})`;
                ctx.fill();
            }

            // Grid lines (subtle surface)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.lineWidth = 0.5;
            const step = 40;
            for (let x = 0; x <= w; x += step) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, h);
                ctx.stroke();
            }
            for (let y = 0; y <= h; y += step) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            time += speed;

            // Draw background
            drawBackground(ctx, w, h);

            // Update and draw moss
            for (const moss of mossParticles) {
                moss.update(time, speed, density);
                moss.draw(ctx);
            }

            // Spawn spores from mature moss
            for (const moss of mossParticles) {
                if (moss.growth > 0.8 && Math.random() < 0.001 * speed * 30 * density) {
                    const spore = new Spore(
                        moss.x + (Math.random() - 0.5) * moss.size,
                        moss.y + (Math.random() - 0.5) * moss.size
                    );
                    spores.push(spore);
                }
            }

            // Update and draw spores
            for (let i = spores.length - 1; i >= 0; i--) {
                const spore = spores[i];
                spore.update();
                spore.draw(ctx);
                if (spore.isDead()) {
                    spores.splice(i, 1);
                }
            }

            // Spore landing - create new moss
            for (let i = spores.length - 1; i >= 0; i--) {
                const spore = spores[i];
                if (spore.y > h - 10 || spore.life < 0.1) {
                    const x = spore.x;
                    const y = Math.min(spore.y, h - 10);
                    // Check if there's already moss nearby
                    let nearby = false;
                    for (const moss of mossParticles) {
                        const dx = moss.x - x;
                        const dy = moss.y - y;
                        if (dx * dx + dy * dy < 100) {
                            nearby = true;
                            break;
                        }
                    }
                    if (!nearby) {
                        const newMoss = new MossParticle(x, y, 2 + Math.random() * 3);
                        newMoss.growth = 0.1 + Math.random() * 0.2;
                        mossParticles.push(newMoss);
                    }
                    spores.splice(i, 1);
                }
            }

            // Limit moss count
            if (mossParticles.length > 500) {
                mossParticles.sort((a, b) => a.size - b.size);
                mossParticles = mossParticles.slice(0, 400);
            }

            // Update status
            if (frameCount % 30 === 0) {
                const totalMoss = mossParticles.length;
                const totalSpores = spores.length;
                statusText.textContent = `🌿 ${totalMoss} patches • ${totalSpores} spores • ${densities[densityLevel].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Spawn
        spawnBtn.addEventListener('click', () => {
            const w = canvas.width;
            const h = canvas.height;
            const count = 5 + Math.floor(Math.random() * 5);
            for (let i = 0; i < count; i++) {
                const x = 20 + Math.random() * (w - 40);
                const y = 20 + Math.random() * (h - 40);
                const size = 2 + Math.random() * 4;
                const moss = new MossParticle(x, y, size);
                moss.growth = 0.3 + Math.random() * 0.4;
                mossParticles.push(moss);
            }
            statusText.textContent = `🌱 Spawned ${count} patches!`;
            setTimeout(() => {
                statusText.textContent = `🌿 ${mossParticles.length} patches`;
            }, 1000);
        });

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🌿 ${mossParticles.length} patches`;
            }, 1000);
        });

        // Density
        densityBtn.addEventListener('click', () => {
            densityLevel = (densityLevel + 1) % densities.length;
            density = densities[densityLevel].value;
            densityBtn.textContent = `Density: ${densities[densityLevel].name}`;
            statusText.textContent = `🌿 ${densities[densityLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🌿 ${mossParticles.length} patches`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            initMoss(15);
            spores = [];
            speedLevel = 1;
            speed = speeds[1].value;
            densityLevel = 1;
            density = densities[1].value;
            
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            densityBtn.textContent = `Density: ${densities[1].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `🌿 ${mossParticles.length} patches`;
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                spawnBtn.click();
            }
            if (e.key === 'p' || e.key === 'P') {
                speedBtn.click();
            }
            if (e.key === 'd' || e.key === 'D') {
                densityBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                spawnBtn.click();
            }
        });

        // ===== MOUSE INTERACTION =====
        let isPainting = false;
        let paintX = 0;
        let paintY = 0;

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            paintX = (e.clientX - rect.left) * scaleX;
            paintY = (e.clientY - rect.top) * scaleY;
            isPainting = true;
            spawnMossAt(paintX, paintY);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isPainting) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                if (Math.sqrt((x - paintX) ** 2 + (y - paintY) ** 2) > 10) {
                    paintX = x;
                    paintY = y;
                    spawnMossAt(x, y);
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            isPainting = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isPainting = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (touch.clientX - rect.left) * scaleX;
            const y = (touch.clientY - rect.top) * scaleY;
            isPainting = true;
            spawnMossAt(x, y);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isPainting) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (touch.clientX - rect.left) * scaleX;
                const y = (touch.clientY - rect.top) * scaleY;
                spawnMossAt(x, y);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isPainting = false;
        });

        function spawnMossAt(x, y) {
            const size = 2 + Math.random() * 3;
            const moss = new MossParticle(x, y, size);
            moss.growth = 0.4 + Math.random() * 0.3;
            mossParticles.push(moss);
        }

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            // Keep existing moss, reposition if needed
            for (const moss of mossParticles) {
                moss.x = Math.min(moss.x, canvas.width - 5);
                moss.y = Math.min(moss.y, canvas.height - 5);
            }
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        densityBtn.textContent = `Density: ${densities[1].name}`;
        statusText.textContent = `🌿 ${mossParticles.length} patches`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🌿 Moss Growth loaded!');
        console.log('💡 S - Spawn moss');
        console.log('💡 P - Change speed');
        console.log('💡 D - Change density');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Spawn moss');
        console.log('💡 Click/drag to paint moss');
    </script>
</body>
</html>
