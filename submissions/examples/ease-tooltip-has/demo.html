<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micro-Spring Tooltip Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Micro-Spring Tooltip</h2>
      <p class="subtitle">Hover over the element to reveal the animated tooltip with elastic scaling.</p>
      
      <div class="demo-wrapper">
        <div class="tooltip-container">
          <button class="action-btn">Hover Me</button>
          <span class="tooltip-text">A micro-spring animation tooltip ✨</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
