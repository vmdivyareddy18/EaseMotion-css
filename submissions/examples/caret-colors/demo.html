<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caret Color Utilities Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <h1>Caret Color Utilities</h1>
        <p>
            Click inside each input field to see different caret (text cursor)
            colors provided by utility classes.
        </p>
    </header>

    <main class="container">

        <div class="demo-grid">

            <div class="card">
                <h2>Default</h2>
                <input type="text" class="input" placeholder="Default caret color">
            </div>

            <div class="card">
                <h2>Blue Caret</h2>
                <input type="text" class="input caret-blue" placeholder="Click here">
            </div>

            <div class="card">
                <h2>Red Caret</h2>
                <input type="text" class="input caret-red" placeholder="Click here">
            </div>

            <div class="card">
                <h2>Green Caret</h2>
                <input type="text" class="input caret-green" placeholder="Click here">
            </div>

            <div class="card">
                <h2>Purple Caret</h2>
                <input type="text" class="input caret-purple" placeholder="Click here">
            </div>

            <div class="card">
                <h2>Orange Caret</h2>
                <input type="text" class="input caret-orange" placeholder="Click here">
            </div>

        </div>

    </main>

</body>

</html>
