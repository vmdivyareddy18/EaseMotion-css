<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Decoration Styles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="deco-page">
    <h1>Text Decoration</h1>
    <div class="deco-list">
      <p class="deco-item" style="--deco-style: solid; --deco-color: #6366f1">Solid underline with color shift</p>
      <p class="deco-item" style="--deco-style: wavy; --deco-color: #ec4899">Wavy underline in pink</p>
      <p class="deco-item" style="--deco-style: dotted; --deco-color: #22c55e">Dotted underline in green</p>
      <p class="deco-item" style="--deco-style: dashed; --deco-color: #f59e0b">Dashed underline in amber</p>
      <p class="deco-item" style="--deco-style: double; --deco-color: #a855f7">Double underline with glow</p>
    </div>
  </section>
</body>
</html>
