<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Sun Rotate - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Sun Rotate</h1>
    <div class="weather-icon sun-icon">
      <div class="sun-body"></div>
      <div class="ray ray-1"></div>
      <div class="ray ray-2"></div>
      <div class="ray ray-3"></div>
      <div class="ray ray-4"></div>
      <div class="ray ray-5"></div>
      <div class="ray ray-6"></div>
      <div class="ray ray-7"></div>
      <div class="ray ray-8"></div>
    </div>
    <p class="description">Sun icon slowly rotates continuously with rays subtly pulsing in opacity.</p>
  </div>
</body>
</html>
