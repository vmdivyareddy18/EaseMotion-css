<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Pie – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pie-wrapper">
    <div class="pie" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
      <span class="pie-label">75%</span>
    </div>
    <span class="pie-title">Progress Pie</span>
  </div>
</body>
</html>
