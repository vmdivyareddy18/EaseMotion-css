<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive SaaS Landing Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>

    <nav>

        <div class="logo">EaseMotion</div>

        <div class="nav-links">
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Docs</a>
        </div>

    </nav>

    <section class="hero">

        <h1>
            Build Beautiful Interfaces
            With Motion First CSS
        </h1>

        <p>
            Create modern experiences using
            expressive animations and reusable UI patterns.
        </p>

        <button>
            Get Started
        </button>

    </section>

</header>

<section class="features">

    <div class="feature-card">
        ⚡ Performance
    </div>

    <div class="feature-card">
        🎨 Design System
    </div>

    <div class="feature-card">
        🚀 Productivity
    </div>

</section>

<section class="pricing">

    <div class="price-card">
        <h3>Starter</h3>
        <span>$0</span>
    </div>

    <div class="price-card featured">
        <h3>Pro</h3>
        <span>$19</span>
    </div>

    <div class="price-card">
        <h3>Enterprise</h3>
        <span>$99</span>
    </div>

</section>

<section class="cta">

    <h2>Start Building Today</h2>

    <button>
        Launch Project
    </button>

</section>

</body>
</html>
