<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Animation Performance Test</title>
  <style>
    @keyframes blurInLeft {
      from {
        opacity: 0;
        filter: blur(6px);
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateX(0);
      }
    }

    body {
      background: #0f0f0f;
      padding: 20px;
    }

    h2 {
      color: white;
    }

    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .box {
      width: 60px;
      height: 60px;
      background: #7c3aed;
      border-radius: 8px;
      opacity: 0;
      animation: blurInLeft 0.6s ease forwards;
    }
  </style>
</head>
<body>
  <h2>Animation Performance Test — 120 Elements</h2>
  <div class="grid" id="grid"></div>

  <script>
    const grid = document.getElementById('grid');
    for (let i = 0; i < 120; i++) {
      const box = document.createElement('div');
      box.className = 'box';
      box.style.animationDelay = `${i * 0.03}s`;
      grid.appendChild(box);
    }
  </script>
</body>
</html>
