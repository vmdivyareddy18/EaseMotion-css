<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Number Counter Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Number Counter Up</h1>
  <p class="subtitle">Counters animate from 0 to their target. Click to replay.</p>

  <div class="counters">
    <div class="counter-card" data-target="1520">
      <span class="counter" data-target="1520">0</span>
      <span class="counter-label">Downloads</span>
    </div>
    <div class="counter-card" data-target="87500">
      <span class="counter" data-target="87500">0</span>
      <span class="counter-label">Lines of Code</span>
    </div>
    <div class="counter-card" data-target="3400">
      <span class="counter" data-target="3400">0</span>
      <span class="counter-label">GitHub Stars</span>
    </div>
    <div class="counter-card" data-target="128">
      <span class="counter" data-target="128">0</span>
      <span class="counter-label">Contributors</span>
    </div>
  </div>

  <p class="hint">Click any counter to replay its animation</p>

  <script>
    function formatNumber(n) {
      return n.toLocaleString('en-US');
    }

    function animateCounter(el) {
      const target = parseInt(el.getAttribute('data-target'), 10);
      const duration = 2000;
      const start = performance.now();

      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(eased * target);
        el.textContent = formatNumber(current);
        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          el.textContent = formatNumber(target);
        }
      }

      requestAnimationFrame(tick);
    }

    const counters = document.querySelectorAll('.counter');
    counters.forEach(counter => {
      animateCounter(counter);
      counter.closest('.counter-card').addEventListener('click', () => {
        counter.textContent = '0';
        animateCounter(counter);
      });
    });
  </script>
</body>
</html>
