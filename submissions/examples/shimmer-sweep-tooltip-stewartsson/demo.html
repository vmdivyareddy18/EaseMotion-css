<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard - Shimmer Sweep Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-viewport">
        <!-- Main Premium Dashboard Card Container Hub Shell -->
        <div class="dashboard-container-card">
            <header class="dashboard-header">
                <div class="neon-matrix-badge">NODE: SHIMMER_TRK</div>
                <h2 class="dashboard-title">System Metrics Hub</h2>
                <p class="dashboard-subtitle">Hover over or interact with the action info target trigger below to reveal the pure-CSS shimmer sweep tooltip overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">📊</span>
                        <span class="btn-text">Data Ingress Stream</span>
                    </button>

                    <!-- Floating Tooltip Continuous Shimmer Sweep Overlay Shell Box -->
                    <div class="shimmer-sweep-tooltip ease-shimmer-sweep">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Ingress Load: Optimal</span>
                            <span class="tooltip-meta">85% Alloc Efficiency</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="dashboard-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
