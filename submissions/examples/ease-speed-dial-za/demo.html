<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speed Dial - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="spd-header"><h1>CSS Speed Dial</h1><p>Floating action button that expands to reveal multiple actions</p></header>
<section class="spd-section"><h2>Vertical (Upward)</h2><div class="spd-container"><div class="spd-fab spd-up"><input type="checkbox" id="spd-tog1" class="spd-toggle"><label for="spd-tog1" class="spd-main">+</label><div class="spd-actions"><a href="#" class="spd-action" style="background:#667eea" title="Share">&#9654;</a><a href="#" class="spd-action" style="background:#48bb78" title="Edit">&#9998;</a><a href="#" class="spd-action" style="background:#f6ad55" title="Star">&#9733;</a><a href="#" class="spd-action" style="background:#f5576c" title="Delete">&#10005;</a></div></div></div></section>
<section class="spd-section"><h2>Horizontal (Right)</h2><div class="spd-container"><div class="spd-fab spd-right"><input type="checkbox" id="spd-tog2" class="spd-toggle"><label for="spd-tog2" class="spd-main">+</label><div class="spd-actions"><a href="#" class="spd-action" style="background:#a855f7" title="Add">+</a><a href="#" class="spd-action" style="background:#3b82f6" title="Upload">&#8593;</a><a href="#" class="spd-action" style="background:#ec4899" title="Photo">&#9679;</a><a href="#" class="spd-action" style="background:#10b981" title="Link">&#9872;</a></div></div></div></section>
<section class="spd-section"><h2>Circular Layout</h2><div class="spd-container"><div class="spd-fab spd-circle"><input type="checkbox" id="spd-tog3" class="spd-toggle"><label for="spd-tog3" class="spd-main">+</label><div class="spd-actions"><a href="#" class="spd-action" style="background:#667eea" title="Mail">&#9993;</a><a href="#" class="spd-action" style="background:#f5576c" title="Chat">&#9992;</a><a href="#" class="spd-action" style="background:#48bb78" title="Call">&#9742;</a><a href="#" class="spd-action" style="background:#f6ad55" title="Map">&#9873;</a></div></div></div></section>
<section class="spd-section"><h2>Hover Activated</h2><div class="spd-container"><div class="spd-fab spd-up spd-hover"><label class="spd-main spd-hov">+</label><div class="spd-actions"><a href="#" class="spd-action" style="background:#667eea" title="A">A</a><a href="#" class="spd-action" style="background:#48bb78" title="B">B</a><a href="#" class="spd-action" style="background:#f5576c" title="C">C</a></div></div></div></section>
</body>
</html>
