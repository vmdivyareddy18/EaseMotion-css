<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Circular Skeleton Loader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="heading">Circular Skeleton Shimmer</h1>

  <!-- Loader circles -->
  <div class="loader-container">
    <div class="skeleton-circle sm"></div>
    <div class="skeleton-circle md"></div>
    <div class="skeleton-circle lg"></div>
  </div>

  <!-- Profile skeleton card -->
  <div class="skeleton-card">

    <div class="card-header">
      <div class="skeleton-circle avatar"></div>
      <div class="text-lines">
        <div class="line short"></div>
        <div class="line long"></div>
      </div>
    </div>

  </div>

</body>
</html>
