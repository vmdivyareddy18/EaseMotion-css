<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Sync - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Cloud Sync</h1>

    <div class="sync-card">
      <div class="sync-icon">
        <div class="cloud-body"></div>
        <div class="cloud-arrow arrow-left"></div>
        <div class="cloud-arrow arrow-right"></div>
        <div class="sync-status"></div>
      </div>
      <span class="sync-label">Syncing...</span>
    </div>

    <div class="variant-row">
      <div class="sync-card sm">
        <div class="sync-icon">
          <div class="cloud-body"></div>
          <div class="cloud-arrow arrow-left"></div>
          <div class="cloud-arrow arrow-right"></div>
          <div class="sync-status done"></div>
        </div>
        <span class="sync-label">Synced</span>
      </div>
    </div>

    <p class="description">Sync arrows rotate continuously around a pulsing cloud icon. The status dot shows active syncing (amber) or complete (green).</p>
  </div>
</body>
</html>
