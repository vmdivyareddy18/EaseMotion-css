<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Diff Viewer | EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="orbit-page">
      <section
        class="orbit-diff ease-fade-in"
        aria-labelledby="orbit-diff-title"
      >
        <header class="orbit-diff__header">
          <div>
            <p class="orbit-diff__eyebrow">Deployment comparison</p>
            <h1 id="orbit-diff-title">Orbit release</h1>
          </div>
          <span class="orbit-diff__status">3 changes</span>
        </header>

        <fieldset class="orbit-diff__controls">
          <legend>Comparison view</legend>
          <input checked id="orbit-unified" name="orbit-view" type="radio" />
          <label for="orbit-unified">Unified</label>
          <input id="orbit-split" name="orbit-view" type="radio" />
          <label for="orbit-split">Split</label>
        </fieldset>

        <div class="orbit-diff__stage">
          <div class="orbit-diff__rings" aria-hidden="true">
            <span></span><span></span><i></i>
          </div>

          <div class="orbit-diff__comparison">
            <section
              class="orbit-diff__panel orbit-diff__panel--before"
              aria-label="Before release"
            >
              <p class="orbit-diff__panel-label">Before</p>
              <ul class="orbit-diff__list">
                <li>
                  <span class="orbit-diff__line">01</span
                  ><code>const theme = "midnight";</code>
                </li>
                <li class="is-removed">
                  <span class="orbit-diff__line">02</span
                  ><code>shadow: "soft"</code>
                </li>
                <li>
                  <span class="orbit-diff__line">03</span
                  ><code>radius: "16px"</code>
                </li>
              </ul>
            </section>

            <div class="orbit-diff__axis" aria-hidden="true">
              <span>⇄</span>
            </div>

            <section
              class="orbit-diff__panel orbit-diff__panel--after"
              aria-label="After release"
            >
              <p class="orbit-diff__panel-label">After</p>
              <ul class="orbit-diff__list">
                <li>
                  <span class="orbit-diff__line">01</span
                  ><code>const theme = "midnight";</code>
                </li>
                <li class="is-added">
                  <span class="orbit-diff__line">02</span
                  ><code>shadow: "orbit"</code>
                </li>
                <li class="is-added">
                  <span class="orbit-diff__line">03</span
                  ><code>glow: "violet"</code>
                </li>
              </ul>
            </section>
          </div>
        </div>

        <footer class="orbit-diff__footer">
          <span
            ><i class="orbit-diff__dot orbit-diff__dot--removed"></i
            >Removed</span
          >
          <span
            ><i class="orbit-diff__dot orbit-diff__dot--added"></i>Added</span
          >
          <span class="orbit-diff__hint">Use arrow keys to change view</span>
        </footer>
      </section>
    </main>
  </body>
</html>
