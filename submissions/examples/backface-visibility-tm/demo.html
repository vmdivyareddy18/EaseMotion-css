<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Backface Visibility Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; gap: 40px; justify-content: center; padding: 60px; background: #f0f0f0; }
    .card { width: 150px; height: 150px; position: relative; transform-style: preserve-3d; transition: transform 0.8s; cursor: pointer; }
    .card:hover { transform: rotateY(180deg); }
    .front, .back { position: absolute; width: 100%; height: 100%; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; }
    .front { background: #4f46e5; color: white; }
    .back { background: #10b981; color: white; transform: rotateY(180deg); }
  </style>
</head>
<body>
  <div>
    <p style="text-align:center">backface-hidden</p>
    <div class="card">
      <div class="front backface-hidden">Front</div>
      <div class="back backface-hidden">Back</div>
    </div>
  </div>
  <div>
    <p style="text-align:center">backface-visible</p>
    <div class="card">
      <div class="front backface-visible">Front</div>
      <div class="back backface-visible">Back</div>
    </div>
  </div>
</body>
</html>
