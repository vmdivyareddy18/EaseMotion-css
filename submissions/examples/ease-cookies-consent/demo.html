<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Cookie Consent Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-controls">
    <button onclick="showBanner('bottom')">Show Bottom Banner</button>
    <button onclick="showBanner('floating')">Show Floating Card</button>
    <button onclick="toggleDark()">Toggle Dark Mode</button>
  </div>

  <div class="ease-cookie-consent ease-cookie-consent--bottom" id="cookieBanner">
    <div class="ease-cookie-consent__main">
      <p class="ease-cookie-consent__text">
        We use cookies to enhance your experience. Choose which categories you're okay with.
      </p>
      <div class="ease-cookie-consent__actions">
        <button class="btn btn--ghost" id="prefsToggle">Manage Preferences</button>
        <button class="btn btn--outline" id="rejectBtn">Reject All</button>
        <button class="btn btn--primary" id="acceptBtn">Accept All</button>
      </div>
    </div>

    <div class="ease-cookie-consent__prefs" id="prefsPanel">
      <label class="pref-row">
        <span>Essential <small>(always active)</small></span>
        <input type="checkbox" checked disabled />
      </label>
      <label class="pref-row">
        <span>Analytics</span>
        <input type="checkbox" checked />
      </label>
      <label class="pref-row">
        <span>Marketing</span>
        <input type="checkbox" />
      </label>
      <label class="pref-row">
        <span>Personalization</span>
        <input type="checkbox" checked />
      </label>
      <button class="btn btn--primary btn--save" id="savePrefsBtn">Save Preferences</button>
    </div>
  </div>

  <script>
    const banner = document.getElementById('cookieBanner');
    const prefsPanel = document.getElementById('prefsPanel');

    document.getElementById('prefsToggle').addEventListener('click', () => {
      prefsPanel.classList.toggle('is-open');
    });

    ['acceptBtn', 'rejectBtn', 'savePrefsBtn'].forEach(id => {
      document.getElementById(id).addEventListener('click', () => {
        banner.classList.add('is-dismissing');
        setTimeout(() => banner.classList.add('is-hidden'), 400);
      });
    });

    function showBanner(layout) {
      banner.classList.remove('is-dismissing', 'is-hidden');
      banner.classList.remove('ease-cookie-consent--bottom', 'ease-cookie-consent--floating');
      void banner.offsetWidth; // restart animation
      banner.classList.add(`ease-cookie-consent--${layout}`);
    }

    function toggleDark() {
      document.body.classList.toggle('dark');
    }
  </script>

</body>
</html>
