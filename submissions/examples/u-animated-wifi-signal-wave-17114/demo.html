<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated WiFi Signal Wave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated WiFi Signal Wave</h1>

    <p>
      A reusable WiFi signal animation for connectivity indicators,
      network dashboards, IoT devices, and communication interfaces.
    </p>

    <div class="demo-grid">

      <button class="wifi-button">
        <span class="wifi-icon">📶</span>
      </button>

      <button class="wifi-button card-style">
        <span class="wifi-icon">📶</span>
        <span>Connected</span>
      </button>

      <div class="wifi-card">
        <h3>Network Status</h3>

        <p>
          Your wireless connection is active and stable.
        </p>

        <button class="wifi-button small">
          <span class="wifi-icon">📶</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
