<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pause Play Morph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ppm-container">
    <h1>Pause / Play Morph</h1>
    <p class="ppm-subtitle">Click the button to morph between play and pause icons</p>

    <div class="ppm-demos">
      <div class="ppm-card">
        <span class="ppm-label">Default</span>
        <button class="ppm-btn" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="40" height="40">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>

      <div class="ppm-card">
        <span class="ppm-label">Large</span>
        <button class="ppm-btn ppm-lg" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="56" height="56">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>

      <div class="ppm-card">
        <span class="ppm-label">Small</span>
        <button class="ppm-btn ppm-sm" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="28" height="28">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>

      <div class="ppm-card">
        <span class="ppm-label">Rounded</span>
        <button class="ppm-btn ppm-rounded" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="40" height="40">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>

      <div class="ppm-card">
        <span class="ppm-label">Large Icon</span>
        <button class="ppm-btn ppm-icon-lg" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="48" height="48">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>

      <div class="ppm-card">
        <span class="ppm-label">Custom Color</span>
        <button class="ppm-btn ppm-custom" aria-label="Play">
          <svg class="ppm-icon" viewBox="0 0 24 24" width="40" height="40">
            <path class="ppm-path" d="M8 5v14l11-7z"/>
          </svg>
        </button>
        <span class="ppm-state">Paused</span>
      </div>
    </div>
  </div>

  <script>
    const PAUSE_PATH = 'M6 4h4v16H6zM14 4h4v16h-4z';
    const PLAY_PATH = 'M8 5v14l11-7z';

    document.querySelectorAll('.ppm-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const isPlaying = btn.dataset.playing === 'true';
        btn.dataset.playing = isPlaying ? 'false' : 'true';
        btn.classList.toggle('ppm-active', !isPlaying);
        const path = btn.querySelector('.ppm-path');
        if (path) {
          path.setAttribute('d', isPlaying ? PLAY_PATH : PAUSE_PATH);
        }
        const card = btn.closest('.ppm-card');
        if (card) {
          const state = card.querySelector('.ppm-state');
          if (state) state.textContent = isPlaying ? 'Paused' : 'Playing';
        }
        btn.setAttribute('aria-label', isPlaying ? 'Play' : 'Pause');
      });
    });
  </script>
</body>
</html>
