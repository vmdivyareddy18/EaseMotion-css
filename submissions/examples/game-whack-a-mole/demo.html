<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔨 Whack-a-Mole</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🔨 Whack-a-Mole</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">⏱️ Time</span>
        <span class="stat-value" id="timerDisplay">30</span>
        <span class="stat-unit">s</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Score</span>
        <span class="stat-value" id="scoreDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎯 High Score</span>
        <span class="stat-value" id="highScoreDisplay">0</span>
      </div>
    </div>

    <div class="game-board" id="gameBoard">
      <!-- 9 holes generated by JavaScript -->
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Game</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
    </div>

    <div class="game-status" id="gameStatus">Click "Start Game" to begin!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const gameBoard = document.getElementById('gameBoard');
      const timerDisplay = document.getElementById('timerDisplay');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const highScoreDisplay = document.getElementById('highScoreDisplay');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Game State ----------
      let holes = [];
      let score = 0;
      let highScore = parseInt(localStorage.getItem('whackHighScore')) || 0;
      let timeLeft = 30;
      let gameRunning = false;
      let gameTimer = null;
      let moleTimer = null;
      let moleTimeout = null;
      let currentSpeed = 1500; // ms between mole appearances
      const BASE_SPEED = 1500;
      const MIN_SPEED = 400;
      const SPEED_INCREMENT = 80;

      // ---------- DOM Setup ----------
      highScoreDisplay.textContent = highScore;

      // Create 9 holes
      for (let i = 0; i < 9; i++) {
        const hole = document.createElement('div');
        hole.className = 'hole disabled';
        hole.dataset.index = i;
        hole.dataset.active = 'false';
        hole.addEventListener('click', () => handleHoleClick(i));
        gameBoard.appendChild(hole);
        holes.push({
          element: hole,
          active: false,
          moleElement: null,
          moleTimeout: null
        });
      }

      // ---------- Helper Functions ----------
      function updateScoreDisplay() {
        scoreDisplay.textContent = score;
      }

      function updateTimerDisplay() {
        timerDisplay.textContent = timeLeft;
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('whackHighScore', highScore);
          highScoreDisplay.textContent = highScore;
        }
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#f5d742' : '#ff7a7a';
      }

      // ---------- Mole Logic ----------
      function spawnMole() {
        if (!gameRunning) return;

        // Find inactive holes
        const inactiveHoles = holes.filter(h => !h.active);
        if (inactiveHoles.length === 0) {
          // All holes have moles - try again later
          scheduleMole();
          return;
        }

        // Pick random inactive hole
        const randomIndex = Math.floor(Math.random() * inactiveHoles.length);
        const hole = inactiveHoles[randomIndex];
        const holeIndex = holes.indexOf(hole);

        // Create mole element
        const mole = document.createElement('div');
        mole.className = 'mole';
        mole.innerHTML = `
          <div class="nose"></div>
          <div class="smile"></div>
        `;

        // Add to hole
        hole.element.appendChild(mole);
        hole.active = true;
        hole.moleElement = mole;
        hole.element.classList.remove('disabled');

        // Remove mole after time (depends on speed)
        const moleDuration = Math.max(600, currentSpeed * 0.6);
        const timeoutId = setTimeout(() => {
          removeMole(holeIndex, false);
        }, moleDuration);

        // Store timeout reference
        hole.moleTimeout = timeoutId;

        // Schedule next mole
        scheduleMole();
      }

      function removeMole(index, wasHit) {
        const hole = holes[index];
        if (!hole.active) return;

        // Clear the timeout
        if (hole.moleTimeout) {
          clearTimeout(hole.moleTimeout);
          hole.moleTimeout = null;
        }

        // Remove mole with animation
        const mole = hole.moleElement;
        if (mole) {
          if (wasHit) {
            mole.classList.add('hit');
            setTimeout(() => {
              if (mole.parentNode) mole.remove();
            }, 300);
          } else {
            mole.remove();
          }
        }

        hole.active = false;
        hole.moleElement = null;
        hole.element.classList.add('disabled');
      }

      function handleHoleClick(index) {
        if (!gameRunning) return;
        const hole = holes[index];
        if (!hole.active) return;

        // Whack the mole!
        removeMole(index, true);
        score++;
        updateScoreDisplay();
        
        // Speed up slightly
        if (currentSpeed > MIN_SPEED) {
          currentSpeed = Math.max(MIN_SPEED, currentSpeed - SPEED_INCREMENT);
        }
      }

      function scheduleMole() {
        if (moleTimeout) {
          clearTimeout(moleTimeout);
          moleTimeout = null;
        }

        if (!gameRunning) return;

        // Random delay between moles (with some variance)
        const delay = currentSpeed + Math.random() * 400 - 200;
        moleTimeout = setTimeout(() => {
          spawnMole();
        }, Math.max(300, delay));
      }

      // ---------- Timer ----------
      function startTimer() {
        if (gameTimer) {
          clearInterval(gameTimer);
          gameTimer = null;
        }

        gameTimer = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // ---------- Game Control ----------
      function startGame() {
        if (gameRunning) return;

        // Reset game state
        resetGameState();

        gameRunning = true;
        timeLeft = 30;
        currentSpeed = BASE_SPEED;
        updateTimerDisplay();
        setGameStatus('🔨 Whack those moles!', true);
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Playing...';

        // Enable holes
        holes.forEach(h => h.element.classList.remove('disabled'));

        // Start timer
        startTimer();

        // Start spawning moles
        spawnMole();
      }

      function resetGameState() {
        // Clear all moles
        holes.forEach((hole, index) => {
          if (hole.active) {
            removeMole(index, false);
          }
          hole.active = false;
          hole.moleElement = null;
          if (hole.moleTimeout) {
            clearTimeout(hole.moleTimeout);
            hole.moleTimeout = null;
          }
          hole.element.classList.add('disabled');
        });

        if (moleTimeout) {
          clearTimeout(moleTimeout);
          moleTimeout = null;
        }

        if (gameTimer) {
          clearInterval(gameTimer);
          gameTimer = null;
        }

        score = 0;
        timeLeft = 30;
        currentSpeed = BASE_SPEED;
        gameRunning = false;
        updateScoreDisplay();
        updateTimerDisplay();
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        setGameStatus('🔄 Game reset. Click "Start Game" to play!', true);
      }

      function endGame() {
        gameRunning = false;

        // Clear intervals
        if (gameTimer) {
          clearInterval(gameTimer);
          gameTimer = null;
        }
        if (moleTimeout) {
          clearTimeout(moleTimeout);
          moleTimeout = null;
        }

        // Remove all moles
        holes.forEach((hole, index) => {
          if (hole.active) {
            removeMole(index, false);
          }
          hole.active = false;
          hole.moleElement = null;
          if (hole.moleTimeout) {
            clearTimeout(hole.moleTimeout);
            hole.moleTimeout = null;
          }
          hole.element.classList.add('disabled');
        });

        // Update high score
        updateHighScore();

        // Update UI
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        setGameStatus(`⏰ Time's up! Final Score: ${score} 🏆`, score > 0);
      }

      function resetGame() {
        if (gameRunning) {
          gameRunning = false;
          if (gameTimer) {
            clearInterval(gameTimer);
            gameTimer = null;
          }
          if (moleTimeout) {
            clearTimeout(moleTimeout);
            moleTimeout = null;
          }
        }

        resetGameState();
        setGameStatus('🔄 Game reset. Click "Start Game" to play!', true);
      }

      // ---------- Event Listeners ----------
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);

      // ---------- Keyboard shortcuts ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          if (!gameRunning && !startBtn.disabled) {
            startGame();
          }
        }
        if (e.key === 'r' || e.key === 'R') {
          resetGame();
        }
      });

      // ---------- Init ----------
      resetGameState();
      setGameStatus('🎯 Click "Start Game" or press Space/Enter to begin!', true);

    })();
  </script>
</body>
</html>
