<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagger Context Menu - Health & Fitness</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f0fdfa; /* Light Teal background */
      font-family: 'Inter', -apple-system, sans-serif;
    }

    .demo-app-container {
      width: 100%;
      max-width: 360px;
      background: white;
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(13, 148, 136, 0.1);
    }

    .demo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .demo-header h2 {
      margin: 0;
      font-size: 1.25rem;
      color: #0f766e;
    }

    .demo-activity-card {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .demo-activity-info h3 {
      margin: 0 0 4px 0;
      font-size: 1rem;
      color: #1e293b;
    }

    .demo-activity-info p {
      margin: 0;
      font-size: 0.85rem;
      color: #64748b;
    }

    /* Menu trigger button (simulated as label) */
    .ease-menu-trigger {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #f1f5f9;
      color: #64748b;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }

    .ease-menu-trigger:hover {
      background: #e2e8f0;
    }

  </style>
</head>
<body>

  <div class="demo-app-container">
    <div class="demo-header">
      <h2>Today's Plan</h2>
      <div style="width: 40px; height: 40px; background: #0d9488; border-radius: 50%;"></div>
    </div>

    <!-- Activity Item with Context Menu -->
    <div class="demo-activity-card">
      <div class="demo-activity-info">
        <h3>Morning Run</h3>
        <p>5.0 km • 350 kcal</p>
      </div>

      <!-- State Controller -->
      <input type="checkbox" id="menu-toggle-1" class="ease-menu-toggle">
      
      <!-- Trigger Button -->
      <label for="menu-toggle-1" class="ease-menu-trigger">⋮</label>

      <!-- The Context Menu -->
      <div class="ease-stagger-menu">
        <label for="menu-toggle-1" class="ease-menu-overlay"></label>
        
        <ul class="ease-menu-list">
          <li style="--ease-delay: 1"><button>▶ Start Workout</button></li>
          <li style="--ease-delay: 2"><button>✏️ Edit Details</button></li>
          <li style="--ease-delay: 3"><button>📊 View History</button></li>
          <li style="--ease-delay: 4"><button class="danger">🗑️ Delete</button></li>
        </ul>
      </div>

    </div>
  </div>

</body>
</html>
