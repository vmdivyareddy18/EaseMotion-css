<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firefly Font Switcher</title>

    <link rel="stylesheet" href="../../src/easemotion.css">
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Merriweather:wght@400;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
</head>
<body>

<div class="firefly-wrapper ease-fade-in">

    <h1>Firefly Font Switcher</h1>

    <div class="font-switcher ease-firefly">

        <input type="radio" id="font1" name="font" checked>
        <label for="font1" class="font-card poppins">
            Poppins
        </label>

        <input type="radio" id="font2" name="font">
        <label for="font2" class="font-card merri">
            Merriweather
        </label>

        <input type="radio" id="font3" name="font">
        <label for="font3" class="font-card playfair">
            Playfair
        </label>

    </div>

    <div class="preview">

        <p class="sample poppins-text">
            The quick brown fox jumps over the lazy dog.
        </p>

        <p class="sample merri-text">
            The quick brown fox jumps over the lazy dog.
        </p>

        <p class="sample playfair-text">
            The quick brown fox jumps over the lazy dog.
        </p>

    </div>

</div>

</body>
</html>
