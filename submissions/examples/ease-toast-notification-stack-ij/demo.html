<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Stack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tns-container">
    <h1>Toast Notification Stack</h1>
    <p class="tns-subtitle">Stackable toast notifications with auto-dismiss and progress bars</p>

    <div class="tns-controls">
      <button class="tns-btn tns-btn-success" data-type="success">Success</button>
      <button class="tns-btn tns-btn-error" data-type="error">Error</button>
      <button class="tns-btn tns-btn-info" data-type="info">Info</button>
      <button class="tns-btn tns-btn-warning" data-type="warning">Warning</button>
      <button class="tns-btn tns-btn-dismiss-all" id="tns-dismiss-all">Dismiss All</button>
    </div>

    <div class="tns-toast-container"></div>
  </div>

  <script>
    const container = document.querySelector('.tns-toast-container');
    const dismissAll = document.getElementById('tns-dismiss-all');
    let toastCount = 0;

    const toastData = {
      success: { icon: '✓', label: 'Success', bg: 'var(--tns-success)' },
      error: { icon: '✕', label: 'Error', bg: 'var(--tns-error)' },
      info: { icon: 'ℹ', label: 'Info', bg: '#3b82f6' },
      warning: { icon: '⚠', label: 'Warning', bg: '#f59e0b' }
    };

    function createToast(type) {
      const data = toastData[type];
      toastCount++;
      const id = toastCount;

      const toast = document.createElement('div');
      toast.className = `tns-toast tns-toast-${type}`;
      toast.dataset.id = id;
      toast.innerHTML = `
        <div class="tns-toast-icon">${data.icon}</div>
        <div class="tns-toast-content">
          <div class="tns-toast-title">${data.label} Notification</div>
          <div class="tns-toast-message">This is a ${data.label.toLowerCase()} toast message #${id}.</div>
        </div>
        <button class="tns-toast-close" data-id="${id}">✕</button>
        <div class="tns-toast-progress"><div class="tns-toast-progress-bar"></div></div>
      `;
      container.appendChild(toast);

      requestAnimationFrame(() => toast.classList.add('tns-toast-visible'));

      const bar = toast.querySelector('.tns-toast-progress-bar');
      bar.style.transition = `width 3s linear`;
      requestAnimationFrame(() => bar.style.width = '0%');

      setTimeout(() => dismissToast(id), 3000);

      toast.querySelector('.tns-toast-close').addEventListener('click', () => dismissToast(id));
    }

    function dismissToast(id) {
      const toast = container.querySelector(`.tns-toast[data-id="${id}"]`);
      if (!toast || toast.classList.contains('tns-toast-dismissing')) return;
      toast.classList.remove('tns-toast-visible');
      toast.classList.add('tns-toast-dismissing');
      setTimeout(() => toast.remove(), 400);
    }

    document.querySelectorAll('.tns-btn[data-type]').forEach(btn => {
      btn.addEventListener('click', () => createToast(btn.dataset.type));
    });

    dismissAll.addEventListener('click', () => {
      document.querySelectorAll('.tns-toast-visible, .tns-toast-dismissing').forEach(t => {
        dismissToast(t.dataset.id);
      });
    });
  </script>
</body>
</html>
