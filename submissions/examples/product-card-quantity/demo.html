<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Card with Quantity Selector</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="pcard">
      <div class="pcard-img"></div>
      <div class="pcard-body">
        <span class="pcard-category">Footwear</span>
        <h3 class="pcard-title">Classic Sneakers</h3>
        <p class="pcard-price">$79.99</p>
        <div class="pcard-qty">
          <button class="pcard-qty-btn" id="qtyDec">−</button>
          <span class="pcard-qty-val" id="qtyVal">1</span>
          <button class="pcard-qty-btn" id="qtyInc">+</button>
        </div>
        <button class="pcard-add">Add to Cart</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
