<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Shake E-Commerce Checkout Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="checkout-toggle">

<label for="checkout-toggle" class="checkout-btn">
    Checkout
</label>

<div class="overlay">

    <div class="modal">

        <label for="checkout-toggle" class="close-btn">&times;</label>

        <h2>Order Summary</h2>

        <div class="product">

            <div>
                <strong>Wireless Headphones</strong>
                <p>Premium Audio</p>
            </div>

            <span>$129</span>

        </div>

        <div class="product">

            <div>
                <strong>Delivery</strong>
                <p>Standard Shipping</p>
            </div>

            <span>Free</span>

        </div>

        <div class="total">

            <span>Total</span>
            <strong>$129</strong>

        </div>

        <div class="secure">

            🔒 Secure Checkout

        </div>

        <button>Pay Now</button>

    </div>

</div>

</body>
</html>
