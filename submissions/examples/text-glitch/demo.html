<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Glitch Effect - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glitch-container">
        <!-- The data-text attribute must match the inner text for the pseudo-elements to work -->
        <h1 class="glitch-text" data-text="EASEMOTION">EASEMOTION</h1>
    </div>
</body>
</html>
