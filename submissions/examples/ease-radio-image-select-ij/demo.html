<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Radio Image Select Component Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-container">
    <header class="ease-header">
      <h2>Choose Your Creative Theme</h2>
      <p>Select a workspace aesthetic. Built with native radio inputs and smooth CSS micro-interactions.</p>
    </header>

    <form class="ease-image-select-group">
      
      <!-- Option 1 -->
      <label class="ease-radio-card">
        <input type="radio" name="theme-select" value="minimalist" checked>
        <div class="ease-card-content">
          <div class="ease-image-wrapper">
            <img src="https://picsum.photos/id/1062/400/300" alt="Minimalist Workspace">
            <div class="ease-checkmark">✓</div>
          </div>
          <div class="ease-card-info">
            <h3>Minimalist</h3>
            <p>Clean lines, ample whitespace, and focused calming tones.</p>
          </div>
        </div>
      </label>

      <!-- Option 2 -->
      <label class="ease-radio-card">
        <input type="radio" name="theme-select" value="cyberpunk">
        <div class="ease-card-content">
          <div class="ease-image-wrapper">
            <img src="https://picsum.photos/id/1084/400/300" alt="Cyberpunk Setup">
            <div class="ease-checkmark">✓</div>
          </div>
          <div class="ease-card-info">
            <h3>Neon Cyber</h3>
            <p>High contrast dark setups illuminated by brilliant neon hues.</p>
          </div>
        </div>
      </label>

      <!-- Option 3 -->
      <label class="ease-radio-card">
        <input type="radio" name="theme-select" value="warm-cozy">
        <div class="ease-card-content">
          <div class="ease-image-wrapper">
            <img src="https://picsum.photos/id/433/400/300" alt="Warm Cozy Cabin Interior">
            <div class="ease-checkmark">✓</div>
          </div>
          <div class="ease-card-info">
            <h3>Warm Cozy</h3>
            <p>Natural woods, ambient lighting, and deeply comforting textures.</p>
          </div>
        </div>
      </label>

    </form>
  </div>

</body>
</html>
