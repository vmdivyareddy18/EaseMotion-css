<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Animated Expanding Search Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Animated Expanding Search Bar</h1>
      <p class="subtitle">Click the search icon to expand</p>
    </header>

    <div class="display-area">
      <div class="search-container">
        <div class="search-wrapper">
          <input type="text" class="search-input" placeholder="Search...">
          <button class="search-btn" onclick="toggleSearch(this)">
            <span class="icon">🔍</span>
          </button>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-grid">
        <div class="search-wrapper pill">
          <input type="text" class="search-input" placeholder="Search...">
          <button class="search-btn" onclick="toggleSearch(this)"><span>🔍</span></button>
        </div>
        <div class="search-wrapper rounded">
          <input type="text" class="search-input" placeholder="Search...">
          <button class="search-btn" onclick="toggleSearch(this)"><span>🔍</span></button>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Copy Code</h3>
      <div class="code-block">
        <div class="code-header">
          <span>HTML</span>
        </div>
        <pre>&lt;div class="search-wrapper"&gt;
  &lt;input type="text" class="search-input" placeholder="Search..."&gt;
  &lt;button class="search-btn" onclick="toggleSearch(this)"&gt;
    &lt;span&gt;🔍&lt;/span&gt;
  &lt;/button&gt;
&lt;/div&gt;</pre>
      </div>
    </section>

  </main>

  <script>
    function toggleSearch(btn) {
      const wrapper = btn.closest('.search-wrapper');
      wrapper.classList.toggle('active');
      if (wrapper.classList.contains('active')) {
        wrapper.querySelector('.search-input').focus();
      }
    }
  </script>

</body>
</html>
