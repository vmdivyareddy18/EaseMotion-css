<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Fill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Progress Bar Fill</h1>

    <div class="progress-group">
      <div class="progress-label">
        <span class="progress-name">Loading Assets</span>
        <span class="progress-value" id="val-0">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill-0" style="width: 0%;"></div>
      </div>
      <div class="progress-controls">
        <button class="btn" data-target="0" data-delta="-10">-10</button>
        <button class="btn" data-target="0" data-delta="10">+10</button>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span class="progress-name">Processing Data</span>
        <span class="progress-value" id="val-1">25%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill-1" style="width: 25%;"></div>
      </div>
      <div class="progress-controls">
        <button class="btn" data-target="1" data-delta="-10">-10</button>
        <button class="btn" data-target="1" data-delta="10">+10</button>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span class="progress-name">Compiling Source</span>
        <span class="progress-value" id="val-2">50%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill-2" style="width: 50%;"></div>
      </div>
      <div class="progress-controls">
        <button class="btn" data-target="2" data-delta="-10">-10</button>
        <button class="btn" data-target="2" data-delta="10">+10</button>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span class="progress-name">Running Tests</span>
        <span class="progress-value" id="val-3">75%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill-3" style="width: 75%;"></div>
      </div>
      <div class="progress-controls">
        <button class="btn" data-target="3" data-delta="-10">-10</button>
        <button class="btn" data-target="3" data-delta="10">+10</button>
      </div>
    </div>

    <div class="progress-group">
      <div class="progress-label">
        <span class="progress-name">Deploying Build</span>
        <span class="progress-value" id="val-4">100%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="fill-4" style="width: 100%;"></div>
      </div>
      <div class="progress-controls">
        <button class="btn" data-target="4" data-delta="-10">-10</button>
        <button class="btn" data-target="4" data-delta="10">+10</button>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn').forEach(btn => {
      btn.addEventListener('click', function () {
        const target = this.dataset.target;
        const delta = parseInt(this.dataset.delta);
        const fill = document.getElementById('fill-' + target);
        const valEl = document.getElementById('val-' + target);
        let current = parseInt(fill.style.width);
        let next = Math.max(0, Math.min(100, current + delta));
        fill.style.width = next + '%';
        valEl.textContent = next + '%';
      });
    });
  </script>
</body>
</html>
