<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loader Shimmer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Skeleton Loader Shimmer</h1>

  <div class="sls-card" id="slsCard">
    <div class="sls-skeleton sls-image"></div>
    <div class="sls-content">
      <div class="sls-skeleton sls-line sls-line--title"></div>
      <div class="sls-skeleton sls-line sls-line--subtitle"></div>
      <div class="sls-skeleton sls-line sls-line--body"></div>
      <div class="sls-skeleton sls-line sls-line--body-short"></div>
    </div>
  </div>

  <button id="slsToggleBtn">Simulate Load</button>

  <script>
    const card = document.getElementById('slsCard');
    const btn = document.getElementById('slsToggleBtn');
    let loaded = false;

    btn.addEventListener('click', () => {
      if (!loaded) {
        card.classList.add('loading');
        btn.disabled = true;
        btn.textContent = 'Loading...';

        setTimeout(() => {
          const skeletons = card.querySelectorAll('.sls-skeleton');
          skeletons.forEach(el => el.remove());
          card.classList.remove('loading');

          const img = document.createElement('img');
          img.className = 'sls-real-img';
          img.src = 'https://picsum.photos/seed/ease/300/200';
          img.alt = 'Placeholder';
          card.insertBefore(img, card.querySelector('.sls-content'));

          const content = card.querySelector('.sls-content');
          content.innerHTML = `
            <h2>Article Title</h2>
            <p class="sls-subtitle">By Jane Doe &middot; 3 min read</p>
            <p>This is the actual content that replaces the skeleton placeholders after loading completes. The shimmer animation gives visual feedback while data is being fetched.</p>
            <p>Donec ullamcorper nulla non metus auctor fringilla.</p>
          `;

          btn.textContent = 'Reset';
          btn.disabled = false;
          loaded = true;
        }, 2000);
      } else {
        location.reload();
      }
    });
  </script>
</body>
</html>
