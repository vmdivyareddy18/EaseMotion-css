<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade-Out Popover Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <h1>Analytics Dashboard</h1>

    <div class="popover-wrapper">

        <button class="dashboard-btn">
            View Analytics
        </button>


        <div class="popover">

            <h2>Dashboard Stats</h2>

            <p>
                Monitor users, revenue and performance
                from one place.
            </p>


            <div class="stats">
                <span>Users: 10K</span>
                <span>Revenue: $50K</span>
                <span>Growth: 25%</span>
            </div>

        </div>

    </div>

</div>


</body>
</html>
