<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Hover Scale</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Scale on Hover Buttons</h1>
  <div class="scale-group">
    <button class="scale-btn scale-btn--sm">Small</button>
    <button class="scale-btn">Default</button>
    <button class="scale-btn scale-btn--lg">Large</button>
    <button class="scale-btn scale-btn--pill">Pill</button>
    <button class="scale-btn scale-btn--ghost">Ghost</button>
  </div>
</body>
</html>
