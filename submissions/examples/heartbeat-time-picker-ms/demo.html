<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartbeat Time Picker</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #fafaf9; font-family: system-ui, sans-serif;">
  
  <div class="picker-card ease-fade-in-up">
    <div class="picker-header">
      <h2>Schedule Viewing</h2>
      <p>Select a time for your property tour</p>
    </div>
    
    <div class="time-selector">
      <!-- Hidden radios for CSS-only state -->
      <input type="radio" name="time" id="t-09" class="time-radio">
      <label for="t-09" class="time-slot ease-hover-pop">09:00 AM</label>
      
      <input type="radio" name="time" id="t-10" class="time-radio" checked>
      <label for="t-10" class="time-slot ease-hover-pop">10:30 AM</label>
      
      <input type="radio" name="time" id="t-13" class="time-radio">
      <label for="t-13" class="time-slot ease-hover-pop">01:00 PM</label>
      
      <input type="radio" name="time" id="t-15" class="time-radio">
      <label for="t-15" class="time-slot ease-hover-pop">03:45 PM</label>
      
      <input type="radio" name="time" id="t-17" class="time-radio">
      <label for="t-17" class="time-slot ease-hover-pop">05:15 PM</label>
    </div>
    
    <button class="confirm-btn ease-hover-scale">
      <span class="btn-text">Confirm Time</span>
      <div class="heartbeat-icon ease-heartbeat">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>
    </button>
  </div>

</body>
</html>
