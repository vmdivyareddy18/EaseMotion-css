<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Image Gallery Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<section class="gallery-section">

<h1 class="ease-fade-in">
Responsive Image Gallery
</h1>

<div class="gallery">

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=1" alt="Gallery Image">
<h3>Mountain View</h3>
</div>

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=2" alt="Gallery Image">
<h3>Forest Trail</h3>
</div>

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=3" alt="Gallery Image">
<h3>Ocean Waves</h3>
</div>

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=4" alt="Gallery Image">
<h3>Desert Sunset</h3>
</div>

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=5" alt="Gallery Image">
<h3>City Lights</h3>
</div>

<div class="card ease-slide-up">
<img src="https://picsum.photos/400/300?random=6" alt="Gallery Image">
<h3>Snow Peaks</h3>
</div>

</div>

</section>

</body>
</html>
