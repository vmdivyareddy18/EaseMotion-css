<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-yoyo-bounce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🪀 Yoyo Bounce</h1>
    <div class="animation-wrapper">
      <div class="yoyo">
        <div class="yoyo-string"></div>
        <div class="yoyo-body"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Yoyo Color
        <input type="color" class="js-color" value="#ff6b6b" data-var="--yoyo-color" />
      </label>
      <label>
        String Color
        <input type="color" class="js-color" value="#ddd" data-var="--string-color" />
      </label>
      <label>
        Bounce Duration
        <input type="range" class="js-range" min="0.2" max="1.5" step="0.05" value="0.6" data-var="--bounce-duration" />
        <span class="js-range-value">0.6s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
