<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate Card 3D | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Rotate Card 3D</h1>
    <p class="subtitle">Flip cards with smooth 3D perspective transforms</p>

    <div class="demo-grid">
      <div class="card-3d" id="card1">
        <div class="card-inner">
          <div class="card-front" style="--rc3-card-front: #6c5ce7;">
            <h2>Front Side</h2>
            <p>Hover or click to flip</p>
          </div>
          <div class="card-back" style="--rc3-card-back: #2d2d44;">
            <h2>Back Side</h2>
            <p>Surprise! 🎉</p>
          </div>
        </div>
      </div>

      <div class="card-3d" id="card2">
        <div class="card-inner">
          <div class="card-front" style="--rc3-card-front: #e74c3c;">
            <h2>Red Card</h2>
            <p>Flip to see the back</p>
          </div>
          <div class="card-back" style="--rc3-card-back: #2d2d44;">
            <h2>Info</h2>
            <p>You found the back!</p>
          </div>
        </div>
      </div>

      <div class="card-3d" id="card3">
        <div class="card-inner">
          <div class="card-front" style="--rc3-card-front: #2ecc71;">
            <h2>Green Card</h2>
            <p>Click to flip</p>
          </div>
          <div class="card-back" style="--rc3-card-back: #2d2d44;">
            <h2>Details</h2>
            <p>Smooth 3D transform</p>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>Part of the <a href="https://github.com/anomalyco/EaseMotion-css" target="_blank">EaseMotion-css</a> collection</p>
    </footer>
  </div>

  <script src="demo.js"></script>
</body>
</html>
