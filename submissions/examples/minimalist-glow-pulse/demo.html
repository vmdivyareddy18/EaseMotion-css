<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Glow Pulse</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <div class="tech-card">
      <div class="card-header">
        <h2 class="card-title">Production Environment</h2>
        
        <div class="status-badge">
          <span class="glow-dot" aria-hidden="true"></span>
          System Active
        </div>
      </div>

      <p class="card-desc">All microservices are running optimally. Latency is within acceptable thresholds across all edge regions.</p>

      <div class="card-actions">
        <button class="btn btn-secondary">View Logs</button>
        <button class="btn btn-primary glow-button">Initialize Sync</button>
      </div>
    </div>
  </main>
</body>
</html>
