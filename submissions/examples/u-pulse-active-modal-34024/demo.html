<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Pulse Active Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Dashboard Analytics

</span>

<h1>

Pulse Active Modal

</h1>

<p>

A modern dashboard modal
featuring pulse interactions
for reports, analytics and
business insights.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Dashboard

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

📈

</div>

<h2>

Analytics Overview

</h2>

<p>

Explore performance trends,
user engagement and KPIs
through an elegant pulse
animation experience.

</p>

<button>

View Insights

</button>

</div>

</div>

</div>

</section>

</body>

</html>
