<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>text-anchor-mp Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0a0a12;
      color: #e0e0e0;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2.5rem 1.5rem;
      box-sizing: border-box;
      gap: 2rem;
    }

    h1 {
      color: #a78bfa;
      font-size: 1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 0;
    }

    .section-title {
      font-size: 0.72rem;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      width: 100%;
      max-width: 760px;
      border-bottom: 1px solid #1e1e2e;
      padding-bottom: 0.4rem;
      margin-bottom: -0.5rem;
    }

    .demo-svg-wrap {
      width: 100%;
      max-width: 760px;
      background: #12121e;
      border: 1px solid #1e1e2e;
      border-radius: 0.75rem;
      padding: 0.5rem 0;
      box-sizing: border-box;
    }

    svg {
      width: 100%;
      display: block;
    }

    /* Anchor guide line */
    .guide { stroke: #2a2a3e; stroke-width: 1; stroke-dasharray: 4 4; }

    .class-label {
      font-size: 0.68rem;
      fill: #4b5563;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <h1>text-anchor-mp · Demo</h1>

  <!-- Core: start / middle / end -->
  <p class="section-title">text-anchor: start / middle / end</p>
  <div class="demo-svg-wrap">
    <svg viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg">

      <!-- Guide lines at x=60, x=380, x=700 -->
      <line class="guide" x1="60"  y1="0" x2="60"  y2="220"/>
      <line class="guide" x1="380" y1="0" x2="380" y2="220"/>
      <line class="guide" x1="700" y1="0" x2="700" y2="220"/>

      <!-- start -->
      <text class="text-anchor-mp text-anchor-mp-start text-anchor-mp-purple text-anchor-mp-xl text-anchor-mp-bold"
            x="60" y="80">AnchorStart</text>
      <text class="class-label text-anchor-mp-start" x="60" y="100">.text-anchor-mp-start</text>

      <!-- middle -->
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-cyan text-anchor-mp-xl text-anchor-mp-bold"
            x="380" y="140">AnchorMiddle</text>
      <text class="class-label text-anchor-mp-middle" x="380" y="160">.text-anchor-mp-middle</text>

      <!-- end -->
      <text class="text-anchor-mp text-anchor-mp-end text-anchor-mp-pink text-anchor-mp-xl text-anchor-mp-bold"
            x="700" y="80">AnchorEnd</text>
      <text class="class-label text-anchor-mp-end" x="700" y="100">.text-anchor-mp-end</text>

    </svg>
  </div>

  <!-- Animated slide-in variants -->
  <p class="section-title">Animated — slide in from anchor point</p>
  <div class="demo-svg-wrap">
    <svg viewBox="0 0 760 160" xmlns="http://www.w3.org/2000/svg">

      <line class="guide" x1="60"  y1="0" x2="60"  y2="160"/>
      <line class="guide" x1="380" y1="0" x2="380" y2="160"/>
      <line class="guide" x1="700" y1="0" x2="700" y2="160"/>

      <text class="text-anchor-mp text-anchor-mp-animate-start text-anchor-mp-green text-anchor-mp-lg text-anchor-mp-bold"
            x="60" y="80">SlideFromStart</text>
      <text class="class-label text-anchor-mp-start" x="60" y="100">.text-anchor-mp-animate-start</text>

      <text class="text-anchor-mp text-anchor-mp-animate-middle text-anchor-mp-orange text-anchor-mp-lg text-anchor-mp-bold"
            x="380" y="80">SlideFromMiddle</text>
      <text class="class-label text-anchor-mp-middle" x="380" y="100">.text-anchor-mp-animate-middle</text>

      <text class="text-anchor-mp text-anchor-mp-animate-end text-anchor-mp-pink text-anchor-mp-lg text-anchor-mp-bold"
            x="700" y="80">SlideFromEnd</text>
      <text class="class-label text-anchor-mp-end" x="700" y="100">.text-anchor-mp-animate-end</text>

    </svg>
  </div>

  <!-- Draw / stroke animation -->
  <p class="section-title">Animated — stroke draw effect</p>
  <div class="demo-svg-wrap">
    <svg viewBox="0 0 760 120" xmlns="http://www.w3.org/2000/svg">
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-draw text-anchor-mp-2xl text-anchor-mp-bold text-anchor-mp-purple"
            x="380" y="80">EaseMotion CSS</text>
    </svg>
  </div>

  <!-- Font size scale -->
  <p class="section-title">Font Size Scale</p>
  <div class="demo-svg-wrap">
    <svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg">
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-muted text-anchor-mp-sm" x="380" y="40">sm — 0.75rem</text>
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-muted text-anchor-mp-md" x="380" y="70">md — 1rem</text>
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-cyan text-anchor-mp-lg" x="380" y="105">lg — 1.5rem</text>
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-purple text-anchor-mp-xl" x="380" y="148">xl — 2rem</text>
      <text class="text-anchor-mp text-anchor-mp-middle text-anchor-mp-pink text-anchor-mp-2xl text-anchor-mp-bold" x="380" y="195">2xl — 2.5rem</text>
    </svg>
  </div>

</body>
</html>
