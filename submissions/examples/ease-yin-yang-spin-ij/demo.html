<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-yin-yang-spin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Yin Yang Spin</h1>
    <div class="animation-wrapper">
      <div class="yin-yang"></div>
    </div>
    <div class="controls">
      <label>
        Yin Color
        <input type="color" class="js-color" value="#333333" data-var="--yin-color" />
      </label>
      <label>
        Yang Color
        <input type="color" class="js-color" value="#ffffff" data-var="--yang-color" />
      </label>
      <label>
        Spin Duration
        <input type="range" class="js-range" min="2" max="20" step="0.5" value="8" data-var="--spin-duration" />
        <span class="js-range-value">8s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
