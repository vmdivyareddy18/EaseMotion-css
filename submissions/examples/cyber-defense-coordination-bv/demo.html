<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Cyber Defense Coordination Network</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="coord-dashboard">
    <header class="header">
      <span class="badge">Joint Task Force Network</span>
      <h1>Global Cyber Defense Coordination Network</h1>
      <p class="subtitle">Real-time threat collaboration and cross-enterprise active defense sharing.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-collab">
        <h3>🚨 Real-Time Joint Security Incident Log</h3>
        <div class="incident-table">
          <div class="table-header">
            <span>Incident</span>
            <span>Origin</span>
            <span>Severity</span>
          </div>
          <div class="table-row">
            <span>SSH Spray</span>
            <span>Tel-Aviv</span>
            <span class="severity critical">Critical</span>
          </div>
          <div class="table-row">
            <span>Ransom DNS</span>
            <span>Unknown</span>
            <span class="severity warning">Medium</span>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card controls-card">
          <h3>⚡ Coordination Controls</h3>
          <button class="action-btn escalate">Escalate Joint Alert</button>
          <button class="action-btn sync">Synchronize Registry</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
