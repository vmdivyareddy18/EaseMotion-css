<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Bar Step - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Step Progress</h1>
    <p class="desc">Multi-step progress bar with active step via --pb-step</p>
    <div class="progress-card">
      <div class="progress-steps" style="--pb-step: 2; --pb-total: 4;">
        <div class="pb-step">
          <div class="pb-dot" data-index="0"></div>
          <span class="pb-label">Start</span>
        </div>
        <div class="pb-step">
          <div class="pb-dot" data-index="1"></div>
          <span class="pb-label">Shipping</span>
        </div>
        <div class="pb-step">
          <div class="pb-dot" data-index="2"></div>
          <span class="pb-label">Payment</span>
        </div>
        <div class="pb-step">
          <div class="pb-dot" data-index="3"></div>
          <span class="pb-label">Done</span>
        </div>
      </div>
      <div class="progress-actions">
        <button id="prevBtn">Previous</button>
        <button id="nextBtn">Next</button>
      </div>
    </div>
  </div>
  <script>
    const container = document.querySelector('.progress-steps');
    const dots = document.querySelectorAll('.pb-dot');
    const labels = document.querySelectorAll('.pb-label');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    let step = 1;
    const total = 4;

    function updateUI() {
      container.style.setProperty('--pb-step', step);
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i < step);
      });
      labels.forEach((label, i) => {
        label.classList.toggle('active', i < step);
      });
    }

    prevBtn.addEventListener('click', () => {
      if (step > 1) { step--; updateUI(); }
    });
    nextBtn.addEventListener('click', () => {
      if (step < total) { step++; updateUI(); }
    });

    updateUI();
  </script>
</body>
</html>
