<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Ratio Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h1>Aspect Ratio Utilities Demo</h1>
    <p class="subtitle">
      Utility classes for maintaining consistent aspect ratios.
    </p>

    <div class="demo-grid">
      <div class="demo-card">
        <h3>.aspect-square</h3>
        <div class="box aspect-square">1:1</div>
      </div>

      <div class="demo-card">
        <h3>.aspect-4-3</h3>
        <div class="box aspect-4-3">4:3</div>
      </div>

      <div class="demo-card">
        <h3>.aspect-3-2</h3>
        <div class="box aspect-3-2">3:2</div>
      </div>

      <div class="demo-card">
        <h3>.aspect-16-9</h3>
        <div class="box aspect-16-9">16:9</div>
      </div>

      <div class="demo-card">
        <h3>.aspect-video</h3>
        <div class="box aspect-video">Video</div>
      </div>
    </div>
  </section>

</body>
</html>
