<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Motion System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container spotlight" id="spotlight">
  <h1 class="ease-fade-in">Motion System 🚀</h1>

  <div class="items">
    <div class="item">A</div>
    <div class="item">B</div>
    <div class="item">C</div>
  </div>

</section>

<div class="orb" id="orb"></div>

<script>
/* ORB FOLLOW */
const orb = document.getElementById("orb");

let mouseX = 0, mouseY = 0;
let posX = 0, posY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  document.getElementById("spotlight")
    .style.setProperty("--x", mouseX + "px");

  document.getElementById("spotlight")
    .style.setProperty("--y", mouseY + "px");
});

function animate() {
  posX += (mouseX - posX) * 0.1;
  posY += (mouseY - posY) * 0.1;

  orb.style.left = posX + "px";
  orb.style.top = posY + "px";

  requestAnimationFrame(animate);
}
animate();

/* MAGNETIC */
const items = document.querySelectorAll(".item");

document.addEventListener("mousemove", (e) => {
  items.forEach(item => {
    const rect = item.getBoundingClientRect();
    const dx = e.clientX - (rect.left + rect.width / 2);
    const dy = e.clientY - (rect.top + rect.height / 2);
    const distance = Math.sqrt(dx*dx + dy*dy);

    if (distance < 120) {
      item.style.transform = `translate(${dx/8}px, ${dy/8}px)`;
    } else {
      item.style.transform = "translate(0,0)";
    }
  });
});
</script>

</body>
</html>
