<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typewriter on Scroll - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-content">

    <h1>Typewriter on Scroll</h1>
    <p class="demo-caption">Scroll down — each heading below types itself out the moment it scrolls into view, once, then stays finished even if you scroll past it and back.</p>

    <div class="demo-spacer"></div>

    <h2 class="ease-typewriter-on-scroll" data-text="Building Interfaces That Move" style="--ease-typewriter-length: 30ch;"></h2>

    <div class="demo-spacer"></div>

    <h2 class="ease-typewriter-on-scroll" data-text="Animation Should Feel Earned" style="--ease-typewriter-length: 29ch;"></h2>

    <div class="demo-spacer"></div>

    <h2 class="ease-typewriter-on-scroll" data-text="One Shot, Right When You Arrive" style="--ease-typewriter-length: 32ch;"></h2>

    <div class="demo-spacer"></div>

    <p class="demo-end">Scroll back up — none of the headings above will retype themselves. They only ever run once per page session.</p>

  </div>

<script>
  const typewriterEls = document.querySelectorAll(".ease-typewriter-on-scroll");

  typewriterEls.forEach((el) => {
    // Set the actual text content from data-text so it can be
    // authored once in HTML and reused without duplicating markup.
    el.textContent = el.dataset.text;

    // One-shot per session: if this exact heading already played
    // earlier in this browser tab's session, skip straight to the
    // finished state instead of re-animating.
    const sessionKey = `ease-typewriter-played:${el.dataset.text}`;
    if (sessionStorage.getItem(sessionKey)) {
      el.classList.add("is-typed", "is-done");
      return;
    }

    const observer = new IntersectionObserver(
      (entries, obs) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            el.classList.add("is-typed");
            sessionStorage.setItem(sessionKey, "1");

            // Stop the typing animation in its finished state once
            // the steps() animation duration has elapsed, so the
            // cursor doesn't keep blinking forever.
            const duration = parseFloat(getComputedStyle(el).getPropertyValue("--ease-typewriter-duration")) || 1.5;
            setTimeout(() => el.classList.add("is-done"), duration * 1000);

            // One-shot: never observe this element again
            obs.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.4 }
    );

    observer.observe(el);
  });
</script>

</body>
</html>
