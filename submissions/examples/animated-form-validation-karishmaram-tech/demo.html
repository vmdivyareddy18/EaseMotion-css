<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Animated Form Validation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="form-wrapper">
    <header class="form-header">
      <h1>Get In Touch</h1>
      <p>Experience smooth label mechanics and live browser-native visual feedback with zero JavaScript overhead.</p>
    </header>

    <form class="ease-animated-form" novalidate>
      
      <div class="ease-form-field">
        <input type="text" id="name" required pattern="^[A-Za-z]{2,}(\s[A-Za-z]{2,})*$" placeholder=" ">
        <label for="name">Your Name</label>
        <div class="field-indicator-bar"></div>
        <span class="field-error">Please enter a valid name (minimum 2 characters).</span>
      </div>

      <div class="ease-form-field">
        <input type="email" id="email" required placeholder=" ">
        <label for="email">Email Address</label>
        <div class="field-indicator-bar"></div>
        <span class="field-error">Please provide a valid email format.</span>
      </div>

      <div class="ease-form-field">
        <textarea id="message" required placeholder=" " rows="4"></textarea>
        <label for="message">Your Message</label>
        <div class="field-indicator-bar"></div>
        <span class="field-error">Message box cannot be left empty.</span>
      </div>

      <button type="submit" class="ease-submit-btn">
        <span>Send Message</span>
        <div class="btn-glow-layer"></div>
      </button>
    </form>
  </div>

</body>
</html>
