<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Scale-Hover Tooltip | EaseMotion-css</title>
    <meta
      name="description"
      content="Pure CSS Scale-Hover Tooltip styled to complement Glassmorphism UI layouts. Monochromatic, responsive, and keyboard accessible."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Profile Card Container -->
    <main class="profile-card" id="profile-container">
      <!-- Avatar Section with Status Indicator -->
      <div class="avatar-container">
        <div class="avatar">AA</div>
        
        <!-- Focusable Status Indicator Trigger -->
        <button
          class="status-dot tooltip-trigger"
          aria-describedby="status-tooltip"
          aria-label="Current status: Active"
          type="button"
        >
          <!-- Glassmorphic Tooltip Box -->
          <span class="tooltip-box" role="tooltip" id="status-tooltip">
            <span class="tooltip-header">Availability</span>
            <span class="tooltip-body">Currently online. Synced and accepting freelance work.</span>
          </span>
        </button>
      </div>

      <!-- Identity -->
      <h1 class="profile-name">Alex A</h1>
      <p class="profile-title">Software Engineer</p>

      <!-- Clean Actions Row -->
      <div class="actions-row">
        <!-- Action 1: Projects (Focusable Button) -->
        <button
          class="action-btn tooltip-trigger"
          aria-describedby="projects-tooltip"
          type="button"
        >
          Projects

          <!-- Glassmorphic Tooltip Box -->
          <span class="tooltip-box" role="tooltip" id="projects-tooltip">
            <span class="tooltip-header">Works Portfolio</span>
            <span class="tooltip-body">Explore 12 active open-source repositories and packages.</span>
          </span>
        </button>

        <!-- Action 2: GitHub (Focusable Button) -->
        <button
          class="action-btn tooltip-trigger"
          aria-describedby="github-tooltip"
          type="button"
        >
          GitHub

          <!-- Glassmorphic Tooltip Box -->
          <span class="tooltip-box" role="tooltip" id="github-tooltip">
            <span class="tooltip-header">Code Profile</span>
            <span class="tooltip-body">View commits, pull requests, and package contributions.</span>
          </span>
        </button>

        <!-- Action 3: Contact (Focusable Button) -->
        <button
          class="action-btn tooltip-trigger"
          aria-describedby="contact-tooltip"
          type="button"
        >
          Contact

          <!-- Glassmorphic Tooltip Box -->
          <span class="tooltip-box" role="tooltip" id="contact-tooltip">
            <span class="tooltip-header">Direct Channel</span>
            <span class="tooltip-body">Send an email message or establish a secure chat.</span>
          </span>
        </button>
      </div>
    </main>
  </body>
</html>
