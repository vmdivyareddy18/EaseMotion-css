<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Slide Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Border Slide Buttons</h1>

  <section class="demo-group">
    <button class="btn-bs btn-bs--bottom">Hover me</button>
    <button class="btn-bs btn-bs--left">Hover me</button>
    <button class="btn-bs btn-bs--draw">Hover me</button>
  </section>

  <section class="demo-group">
    <button class="btn-bs btn-bs--bottom btn-bs--alt">Hover me</button>
    <button class="btn-bs btn-bs--bottom btn-bs--rounded">Hover me</button>
  </section>
</body>
</html>
