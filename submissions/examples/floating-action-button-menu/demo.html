<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Floating Action Button</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
            min-height: 100vh;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-section { background: #1a1a2e; border-radius: 1rem; padding: 2rem; margin-bottom: 2rem; text-align: center; min-height: 400px; position: relative; }
        .demo-section h3 { color: #c4b5fd; margin-top: 0; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Floating Action Button (FAB)</h1>
    <p>Click to expand menu options</p>
</div>

<div class="demo-section">
    <h3>Default FAB (Bottom Right)</h3>
    
    <div class="ease-fab-container">
        <input type="checkbox" id="fabToggle" class="ease-fab-checkbox">
        <label for="fabToggle" class="ease-fab-button">+</label>
        <div class="ease-fab-menu">
            <a href="#" class="ease-fab-item">📁</a>
            <a href="#" class="ease-fab-item">❤️</a>
            <a href="#" class="ease-fab-item">🔔</a>
            <a href="#" class="ease-fab-item">⚙️</a>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Left Side FAB</h3>
    
    <div class="ease-fab-container ease-fab-left">
        <input type="checkbox" id="fabToggleLeft" class="ease-fab-checkbox">
        <label for="fabToggleLeft" class="ease-fab-button">+</label>
        <div class="ease-fab-menu">
            <a href="#" class="ease-fab-item">📁</a>
            <a href="#" class="ease-fab-item">❤️</a>
            <a href="#" class="ease-fab-item">🔔</a>
            <a href="#" class="ease-fab-item">⚙️</a>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Top Right FAB</h3>
    
    <div class="ease-fab-container ease-fab-top">
        <input type="checkbox" id="fabToggleTop" class="ease-fab-checkbox">
        <label for="fabToggleTop" class="ease-fab-button">+</label>
        <div class="ease-fab-menu">
            <a href="#" class="ease-fab-item">📁</a>
            <a href="#" class="ease-fab-item">❤️</a>
            <a href="#" class="ease-fab-item">🔔</a>
            <a href="#" class="ease-fab-item">⚙️</a>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Rainbow FAB</h3>
    
    <div class="ease-fab-container">
        <input type="checkbox" id="fabToggleRainbow" class="ease-fab-checkbox">
        <label for="fabToggleRainbow" class="ease-fab-button ease-fab-rainbow">+</label>
        <div class="ease-fab-menu">
            <a href="#" class="ease-fab-item ease-fab-item-rainbow">📁</a>
            <a href="#" class="ease-fab-item ease-fab-item-rainbow">❤️</a>
            <a href="#" class="ease-fab-item ease-fab-item-rainbow">🔔</a>
            <a href="#" class="ease-fab-item ease-fab-item-rainbow">⚙️</a>
        </div>
    </div>
</div>

<div class="note">
    💡 Click the + button to expand the menu. Pure CSS, no JavaScript!
</div>

</body>
</html>
