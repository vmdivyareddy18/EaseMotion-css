<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ease-bounce-in-right - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to style.css containing our component and demo layout -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>ease-bounce-in-right</h1>
      <p>
        Elastic entrance animation sliding in from the right with overshoot and
        customizable bounce distance.
      </p>
    </header>

    <div class="demo-container">
      <!-- Left Column: Interactive Live Preview -->
      <div class="preview-panel">
        <div class="preview-grid-bg"></div>

        <div class="preview-card-wrapper">
          <!-- Animating Credit Card Component -->
          <div class="ease-bounce-in-right preview-card" id="target-card">
            <div class="card-chip"></div>
            <div class="card-number">•••• •••• •••• 1024</div>
            <div class="card-footer">
              <div class="card-holder">
                Card Holder
                <div>Alex Morgan</div>
              </div>
              <div class="card-logo">NEON</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Right Column: Interactive Configuration Panel -->
      <div class="controls-panel">
        <!-- Trigger Control -->
        <div class="control-card">
          <h3>Trigger Animation</h3>
          <div class="control-group">
            <button class="btn-trigger" id="trigger-btn">
              Replay Animation
            </button>
          </div>
        </div>

        <!-- Distance Control -->
        <div class="control-card">
          <h3>Bounce Distance</h3>
          <div class="control-group">
            <label class="control-label">Unit Type</label>
            <div class="segmented-control" id="unit-control">
              <button class="segment-btn active" data-unit="%">
                Percentage (%)
              </button>
              <button class="segment-btn" data-unit="px">Pixels (px)</button>
            </div>
          </div>
          <div class="control-group">
            <label class="control-label" for="distance-slider"
              >Distance Value <span id="distance-val">120%</span></label
            >
            <input
              type="range"
              id="distance-slider"
              class="slider"
              min="50"
              max="200"
              value="120"
            />
          </div>
        </div>

        <!-- Speed Control -->
        <div class="control-card">
          <h3>Animation Speed</h3>
          <div class="control-group">
            <div class="segmented-control" id="speed-control">
              <button class="segment-btn" data-speed="slow">Slow</button>
              <button class="segment-btn active" data-speed="normal">
                Normal
              </button>
              <button class="segment-btn" data-speed="fast">Fast</button>
            </div>
          </div>
        </div>

        <!-- Live Code Generator -->
        <div class="control-card code-card">
          <div class="code-header">
            <h4>Integration Code</h4>
            <button class="copy-btn" id="copy-code-btn">Copy HTML & CSS</button>
          </div>
          <div class="code-container">
            <pre id="code-output"></pre>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Elements
      const targetCard = document.getElementById("target-card");
      const triggerBtn = document.getElementById("trigger-btn");
      const distanceSlider = document.getElementById("distance-slider");
      const distanceVal = document.getElementById("distance-val");
      const unitControl = document.getElementById("unit-control");
      const speedControl = document.getElementById("speed-control");
      const codeOutput = document.getElementById("code-output");
      const copyCodeBtn = document.getElementById("copy-code-btn");

      const unitButtons = unitControl.querySelectorAll(".segment-btn");
      const speedButtons = speedControl.querySelectorAll(".segment-btn");

      // Configuration state
      let distanceUnit = "%"; // % or px
      let distanceValue = 120;
      let animSpeed = "normal"; // slow, normal, fast

      // Replay animation utility
      function replayAnimation() {
        // Remove classes
        targetCard.classList.remove("ease-bounce-in-right");
        targetCard.classList.remove("ease-bounce-in-fast");
        targetCard.classList.remove("ease-bounce-in-slow");

        // Force repaint to reset CSS animation state
        void targetCard.offsetWidth;

        // Re-apply distance custom property
        targetCard.style.setProperty(
          "--ease-bounce-distance",
          `${distanceValue}${distanceUnit}`
        );

        // Add classes back
        targetCard.classList.add("ease-bounce-in-right");
        if (animSpeed === "fast") {
          targetCard.classList.add("ease-bounce-in-fast");
        } else if (animSpeed === "slow") {
          targetCard.classList.add("ease-bounce-in-slow");
        }
      }

      // Trigger Event
      triggerBtn.addEventListener("click", replayAnimation);

      // Unit Change Event
      unitButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          unitButtons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          distanceUnit = btn.dataset.unit;

          // Reset slider values depending on unit
          if (distanceUnit === "%") {
            distanceSlider.min = 50;
            distanceSlider.max = 250;
            distanceSlider.value = 120;
          } else {
            distanceSlider.min = 100;
            distanceSlider.max = 1000;
            distanceSlider.value = 400;
          }

          distanceValue = distanceSlider.value;
          distanceVal.textContent = `${distanceValue}${distanceUnit}`;

          replayAnimation();
          updateCode();
        });
      });

      // Distance Slider Event
      distanceSlider.addEventListener("input", (e) => {
        distanceValue = e.target.value;
        distanceVal.textContent = `${distanceValue}${distanceUnit}`;

        // Apply variable directly for live dragging feel (though not retriggering full animation during drag)
        targetCard.style.setProperty(
          "--ease-bounce-distance",
          `${distanceValue}${distanceUnit}`
        );
        updateCode();
      });

      distanceSlider.addEventListener("change", replayAnimation);

      // Speed Control Event
      speedButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          speedButtons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          animSpeed = btn.dataset.speed;

          replayAnimation();
          updateCode();
        });
      });

      // Update Code Display
      function updateCode() {
        // HTML classes
        let htmlClass = "ease-bounce-in-right";
        if (animSpeed === "fast") htmlClass += " ease-bounce-in-fast";
        if (animSpeed === "slow") htmlClass += " ease-bounce-in-slow";

        // Custom property string
        const fullDistance = `${distanceValue}${distanceUnit}`;
        const styleAttr =
          fullDistance !== "120%"
            ? ` style="--ease-bounce-distance: ${fullDistance}"`
            : "";

        const htmlBlock = `&lt;<span class="code-keyword">div</span> <span class="code-property">class</span>=<span class="code-string">"${htmlClass}"</span>${styleAttr}&gt;Content&lt;/<span class="code-keyword">div</span>&gt;`;

        let cssBlock = `<span class="code-comment">/* Customize in stylesheet */</span>\n.<span class="code-keyword">custom-bounce-in</span> {`;
        if (fullDistance !== "120%") {
          cssBlock += `\n  <span class="code-property">--ease-bounce-distance</span>: <span class="code-value">${fullDistance}</span>;\n}`;
        } else {
          cssBlock += `\n  <span class="code-comment">/* Use defaults, or custom length/percentage */</span>\n  <span class="code-property">--ease-bounce-distance</span>: <span class="code-value">400px</span>;\n}`;
        }

        codeOutput.innerHTML = `${htmlBlock}\n\n${cssBlock}`;
      }

      // Copy Code Button
      copyCodeBtn.addEventListener("click", () => {
        let htmlClass = "ease-bounce-in-right";
        if (animSpeed === "fast") htmlClass += " ease-bounce-in-fast";
        if (animSpeed === "slow") htmlClass += " ease-bounce-in-slow";

        const fullDistance = `${distanceValue}${distanceUnit}`;
        const styleAttr =
          fullDistance !== "120%"
            ? ` style="--ease-bounce-distance: ${fullDistance}"`
            : "";

        const rawHtml = `<div class="${htmlClass}"${styleAttr}>Content</div>`;

        let rawCss = `/* Custom Bounce In Style */\n.custom-bounce-in {`;
        if (fullDistance !== "120%") {
          rawCss += `\n  --ease-bounce-distance: ${fullDistance};\n}`;
        } else {
          rawCss += `\n  --ease-bounce-distance: 400px;\n}`;
        }

        const fullCode = `${rawHtml}\n\n${rawCss}`;

        navigator.clipboard.writeText(fullCode).then(() => {
          copyCodeBtn.textContent = "Copied!";
          copyCodeBtn.classList.add("copied");

          setTimeout(() => {
            copyCodeBtn.textContent = "Copy HTML & CSS";
            copyCodeBtn.classList.remove("copied");
          }, 2000);
        });
      });

      // Initial load
      updateCode();
    </script>
  </body>
</html>
