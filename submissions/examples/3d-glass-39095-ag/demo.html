<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced 3D Glassmorphism Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual card showcase demonstrating 3D interactive glassmorphism containers and blur backdrops.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Showcase</span>
      <h1>3D Glassmorphism</h1>
      <p class="description">
        Demonstrates interactive 3D frosting. Move your cursor over the card 
        below to tilt it dynamically.
      </p>
    </header>

    <main class="showcase">
      <!-- 3D Glassmorphic Card under Test -->
      <div class="glass-perspective" id="glass-parent">
        <div class="glass-card">
          <div class="glass-glow"></div>
          <div class="card-inner">
            <h3>Premium Card</h3>
            <p>Combines CSS backdrop-filters, semi-transparent borders, and dynamic mouse rotation matrices to create a realistic glass slab.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const wrapper = document.getElementById('glass-parent');
    const card = wrapper.querySelector('.glass-card');
    const glow = wrapper.querySelector('.glass-glow');

    wrapper.addEventListener('mousemove', (e) => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const px = (x / rect.width) * 2 - 1; // -1 to 1
      const py = (y / rect.height) * 2 - 1; // -1 to 1
      
      card.style.transform = `rotateY(${px * 15}deg) rotateX(${py * -15}deg)`;
      
      // Position the highlight glow reflect
      glow.style.top = `${y - 100}px`;
      glow.style.left = `${x - 100}px`;
      glow.style.opacity = '1';
    });

    wrapper.addEventListener('mouseleave', () => {
      card.style.transform = null;
      glow.style.opacity = '0';
    });
  </script>

</body>
</html>
