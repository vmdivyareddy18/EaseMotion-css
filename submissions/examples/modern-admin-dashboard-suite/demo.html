<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Admin Dashboard Suite</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="admin-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">AdminX</div>
      <nav class="nav">
        <a href="#" class="item active">Overview</a>
        <a href="#" class="item">Users</a>
        <a href="#" class="item">Billing</a>
      </nav>
    </aside>

    <!-- Main Workspace -->
    <main class="workspace">
      <header class="header">
        <h1>Dashboard Suite</h1>
        <div class="user-block">
          <div class="avatar"></div>
        </div>
      </header>

      <section class="metric-tiles">
        <div class="tile">
          <span>Active Users</span>
          <h3>14,842</h3>
        </div>
        <div class="tile">
          <span>Monthly Revenue</span>
          <h3>$42,104</h3>
        </div>
      </section>

      <section class="table-section">
        <h3>Active System Operations</h3>
        <table class="ops-table">
          <thead>
            <tr>
              <th>Operation</th>
              <th>Status</th>
              <th>Load</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Ingest loop</td>
              <td><span class="status green">Healthy</span></td>
              <td>12%</td>
            </tr>
            <tr>
              <td>Indexing pipeline</td>
              <td><span class="status orange">Slow</span></td>
              <td>84%</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </div>
</body>
</html>
