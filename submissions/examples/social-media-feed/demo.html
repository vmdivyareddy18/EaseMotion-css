<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Social Media Feed — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 2rem 1rem; margin: 0;">

  <div class="ease-feed-viewport">
    <div class="ease-post-card">
      <div class="ease-post-header">
        <div class="ease-post-avatar" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80&q=80'); background-size: cover;"></div>
        <div class="ease-post-userinfo">
          <span class="ease-post-username">Sarah Jenkins</span>
          <span class="ease-post-time">2 hours ago</span>
        </div>
      </div>
      
      <p class="ease-post-caption">Golden hour walks hit differently when the framework compiles on the first attempt. ✨ #devlife #uiux</p>
      
      <img class="ease-post-media" src="https://images.unsplash.com/photo-1472214222541-d510753a8707?w=600&q=80" alt="Post Viewport" />
      
      <div class="ease-post-actions">
        <button class="ease-action-btn" onclick="toggleLike(this)">
          <span class="ease-heart-icon" style="display:inline-block;">❤️</span>
          <span class="like-count">142</span>
        </button>
        <button class="ease-action-btn" id="openShareBtn">
          <span>📤</span>
          <span>Share</span>
        </button>
      </div>
    </div>
  </div>

  <div class="ease-share-overlay" id="shareOverlay">
    <div class="ease-share-sheet">
      <h3 class="ease-share-header">Share Post</h3>
      <div class="ease-share-grid">
        <button class="ease-share-option" onclick="closeShare()">
          <div class="ease-share-icon-wrapper">🔗</div>
          <span class="ease-share-label">Copy Link</span>
        </button>
        <button class="ease-share-option" onclick="closeShare()">
          <div class="ease-share-icon-wrapper">💬</div>
          <span class="ease-share-label">Messages</span>
        </button>
        <button class="ease-share-option" onclick="closeShare()">
          <div class="ease-share-icon-wrapper">🐦</div>
          <span class="ease-share-label">Twitter</span>
        </button>
        <button class="ease-share-option" onclick="closeShare()">
          <div class="ease-share-icon-wrapper">📥</div>
          <span class="ease-share-label">Save Image</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('shareOverlay');
    const openBtn = document.getElementById('openShareBtn');

    openBtn.addEventListener('click', () => overlay.classList.add('is-visible'));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeShare();
    });

    function closeShare() {
      overlay.classList.remove('is-visible');
    }

    function toggleLike(btn) {
      const isLiked = btn.classList.toggle('like-active');
      const countEl = btn.querySelector('.like-count');
      let currentCount = parseInt(countEl.textContent);
      countEl.textContent = isLiked ? currentCount + 1 : currentCount - 1;
    }
  </script>
</body>
</html>
