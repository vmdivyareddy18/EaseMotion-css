<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Analytics - Slide-Right Modal Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard">
    <header class="dash-header">
      <h2>Analytics Panel</h2>
      <a href="#sidebar-modal" class="btn btn-primary" role="button">Open Filter Panel</a>
    </header>

    <div class="metrics-grid">
      <div class="card"><h3>Total Traffic</h3><p class="value">94.2k</p></div>
      <div class="card"><h3>Session Duration</h3><p class="value">2m 14s</p></div>
    </div>
  </div>

  <div id="sidebar-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <a href="#" class="modal-close-overlay" aria-label="Close modal"></a>
    
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="modal-title">Advanced Filters</h3>
        <a href="#" class="modal-close-btn" aria-label="Close modal">&times;</a>
      </div>
      <div class="modal-body">
        <p>This panel slides in from the right hand side of the viewport and transitions seamlessly backwards upon dismissal using pure CSS hardware acceleration.</p>
        
        <div class="filter-group">
          <label>Date Range</label>
          <select class="form-control">
            <option>Last 7 Days</option>
            <option>Last 30 Days</option>
            <option>Custom Range</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <a href="#" class="btn btn-secondary">Clear All</a>
        <a href="#" class="btn btn-primary">Apply Filters</a>
      </div>
    </div>
  </div>

</body>
</html>
