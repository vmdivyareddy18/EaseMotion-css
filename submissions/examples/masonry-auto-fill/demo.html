<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Layout with auto-fill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1>CSS Masonry — <code>auto-fill</code></h1>
    <p>Responsive masonry columns with gap and item sizing</p>
  </header>
  <main>
    <section class="demo-card">
      <h2>Masonry Grid — auto-fill columns</h2>
      <div class="masonry-grid">
        <div class="m-item" style="height:180px">Item 1</div>
        <div class="m-item" style="height:240px">Item 2</div>
        <div class="m-item" style="height:160px">Item 3</div>
        <div class="m-item" style="height:280px">Item 4</div>
        <div class="m-item" style="height:200px">Item 5</div>
        <div class="m-item" style="height:220px">Item 6</div>
        <div class="m-item" style="height:150px">Item 7</div>
        <div class="m-item" style="height:260px">Item 8</div>
        <div class="m-item" style="height:190px">Item 9</div>
        <div class="m-item" style="height:210px">Item 10</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>With Gap &amp; Auto-Fill Tracks</h2>
      <div class="masonry-grid wide-gap">
        <div class="m-item" style="height:170px">A</div>
        <div class="m-item" style="height:230px">B</div>
        <div class="m-item" style="height:190px">C</div>
        <div class="m-item" style="height:250px">D</div>
      </div>
    </section>
  </main>
  <footer>
    <p>Experimental CSS masonry — columns auto-fill based on available space.</p>
  </footer>
</body>
</html>
