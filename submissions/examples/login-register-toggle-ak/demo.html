<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register Toggle - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1 style="text-align:center;font-size:1.5rem;margin-bottom:0.5rem;color:#888;">Welcome</h1>
    <p style="text-align:center;color:#666;font-size:0.85rem;margin-bottom:1.5rem;">Sign in or create an account</p>

    <div class="form-toggle">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Register</button>
    </div>

    <div class="form-container">

      <div class="form-panel active" id="loginForm">
        <h2>Sign In</h2>
        <p>Welcome back! Please enter your credentials.</p>
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="submit-btn" id="loginBtn">Sign In</button>
        <div id="loginMsg" class="error-msg"></div>
      </div>

      <div class="form-panel" id="registerForm">
        <h2>Create Account</h2>
        <p>Fill in the details to get started.</p>
        <div class="form-group">
          <label for="regName">Full Name</label>
          <input type="text" id="regName" placeholder="John Doe">
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="••••••••">
        </div>
        <button class="submit-btn" id="registerBtn">Create Account</button>
        <div id="registerMsg" class="error-msg"></div>
      </div>

    </div>

  </div>

  <script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const loginMsg = document.getElementById('loginMsg');
    const registerMsg = document.getElementById('registerMsg');

    function showForm(form) {
      loginForm.classList.remove('active');
      registerForm.classList.remove('active');
      loginTab.classList.remove('active');
      registerTab.classList.remove('active');
      loginMsg.textContent = '';
      registerMsg.textContent = '';
      form.classList.add('active');
      if (form === loginForm) loginTab.classList.add('active');
      else registerTab.classList.add('active');
    }

    loginTab.addEventListener('click', function () { showForm(loginForm); });
    registerTab.addEventListener('click', function () { showForm(registerForm); });

    function validate(form) {
      const inputs = form.querySelectorAll('input');
      for (const inp of inputs) {
        if (!inp.value.trim()) {
          return inp.previousElementSibling.textContent + ' is required.';
        }
      }
      const email = form.querySelector('input[type="email"]');
      if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
        return 'Please enter a valid email address.';
      }
      const pwd = form.querySelector('input[type="password"]');
      if (pwd && pwd.value.length < 6) {
        return 'Password must be at least 6 characters.';
      }
      return '';
    }

    loginBtn.addEventListener('click', function () {
      const err = validate(loginForm);
      loginMsg.className = err ? 'error-msg' : 'success-msg';
      loginMsg.textContent = err || 'Login successful! (demo)';
    });

    registerBtn.addEventListener('click', function () {
      const err = validate(registerForm);
      registerMsg.className = err ? 'error-msg' : 'success-msg';
      registerMsg.textContent = err || 'Account created! (demo)';
    });
  </script>

</body>
</html>
