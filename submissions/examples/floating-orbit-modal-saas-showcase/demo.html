<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Modal - SaaS Showcase</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal">

<label for="modal" class="launch-btn">
    View Product Demo
</label>

<div class="overlay">

    <div class="modal" tabindex="0">

        <label for="modal" class="close">&times;</label>

        <span class="orbit orbit-one"></span>
        <span class="orbit orbit-two"></span>

        <h2>Cloud Analytics Suite</h2>

        <p>
            Increase team productivity with real-time dashboards,
            AI-powered reports, workflow automation, and secure cloud
            collaboration.
        </p>

        <div class="actions">
            <button>Start Free</button>
            <button class="secondary">Learn More</button>
        </div>

    </div>

</div>

</body>
</html>
