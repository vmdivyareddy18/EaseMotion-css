<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Search Icon Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Search Icon Pulse</h1>

    <p>
      A subtle search icon animation designed to improve discoverability
      in navigation bars, dashboards, and search interfaces.
    </p>

    <div class="search-demo">

      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search anything..." />
      </div>

      <button class="search-button">
        <span class="search-icon">🔍</span>
      </button>

      <button class="search-button secondary">
        <span class="search-icon">🔍</span>
        Search
      </button>

    </div>

  </main>

</body>
</html>
