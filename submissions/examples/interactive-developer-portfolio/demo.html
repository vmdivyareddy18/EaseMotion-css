<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Developer Portfolio Hero Demo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero-container">
      <div class="profile-card">
        <div class="avatar-glow">
          <div class="user-avatar"></div>
        </div>
        <div class="status-badge">
          <span class="pulse-dot"></span>
          Available for Work
        </div>
      </div>

      <div class="hero-content">
        <h1 class="hero-title">
          Hi, I'm a <span class="text-animate">Developer</span>
        </h1>
        <p class="hero-subtitle">
          Building full-stack web applications with modern design systems and
          clean, responsive code interfaces.
        </p>

        <div class="tech-badges">
          <span class="badge">HTML5</span>
          <span class="badge">CSS3</span>
          <span class="badge">JavaScript</span>
          <span class="badge">React</span>
        </div>

        <div class="hero-actions">
          <a href="#projects" class="btn btn-primary">View My Work</a>
          <a href="#contact" class="btn btn-secondary">Let's Talk</a>
        </div>
      </div>
    </section>
  </body>
</html>
