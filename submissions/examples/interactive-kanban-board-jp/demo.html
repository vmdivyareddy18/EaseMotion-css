<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Kanban Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="board-container">

    <div class="board-column">
        <h2>📋 To Do</h2>

        <div class="task-card high">
            <span class="status"></span>
            Design Landing Page
        </div>

        <div class="task-card medium">
            <span class="status"></span>
            Create Dashboard Layout
        </div>

        <div class="task-card low">
            <span class="status"></span>
            Write Documentation
        </div>
    </div>

    <div class="board-column active">
        <h2>⚡ In Progress</h2>

        <div class="task-card high dragging">
            <span class="status"></span>
            Kanban Animation Setup
        </div>

        <div class="task-card medium">
            <span class="status"></span>
            Responsive Testing
        </div>
    </div>

    <div class="board-column">
        <h2>✅ Done</h2>

        <div class="task-card completed">
            <span class="status"></span>
            Project Structure
        </div>

        <div class="task-card completed">
            <span class="status"></span>
            Base Components
        </div>
    </div>

</div>

</body>
</html>
