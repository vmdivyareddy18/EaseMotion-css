<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Course Progress Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">My Courses</h1>
    <div class="course-grid" id="courseGrid"></div>
  </div>
  <script>
    const courses = [
      { title: 'JavaScript Fundamentals', instructor: 'Sarah Chen', total: 24, completed: 18, color: '#f59e0b' },
      { title: 'React & Modern Frontend', instructor: 'Marcus Webb', total: 18, completed: 12, color: '#6366f1' },
      { title: 'Python for Data Science', instructor: 'Dr. Lisa Park', total: 30, completed: 8, color: '#22c55e' },
      { title: 'CSS Mastery', instructor: 'Alex Turner', total: 15, completed: 15, color: '#ec4899' },
      { title: 'Node.js Backend', instructor: 'Raj Patel', total: 20, completed: 5, color: '#14b8a6' },
      { title: 'UI/UX Design Principles', instructor: 'Emily Wright', total: 12, completed: 10, color: '#8b5cf6' },
    ];

    const courseGrid = document.getElementById('courseGrid');

    function renderCourses() {
      courseGrid.innerHTML = courses.map((c, i) => {
        const pct = Math.round((c.completed / c.total) * 100);
        return `
          <div class="course-card">
            <div class="course-top">
              <div class="course-icon" style="background: ${c.color}20; color: ${c.color}">${c.title[0]}</div>
              <span class="course-pct">${pct}%</span>
            </div>
            <h3 class="course-title">${c.title}</h3>
            <p class="course-instructor">${c.instructor}</p>
            <div class="course-progress-track">
              <div class="course-progress-fill" style="width: ${pct}%; background: ${c.color}"></div>
            </div>
            <div class="course-stats">
              <span>${c.completed} / ${c.total} lessons</span>
              <span>${pct}% complete</span>
            </div>
            <button class="course-btn" data-idx="${i}">${pct === 100 ? 'Review' : 'Continue'}</button>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.course-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.idx);
          const c = courses[idx];
          if (c.completed < c.total) {
            c.completed = Math.min(c.total, c.completed + 1);
            renderCourses();
          }
        });
      });
    }

    renderCourses();
  </script>
</body>
</html>
