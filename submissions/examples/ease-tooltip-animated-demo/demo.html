<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tooltip Component | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h2>CSS Animated Tooltip</h2>
      <p>A completely pure CSS tooltip implementation with fade and scale animations. Hover over the buttons below.</p>
    </div>

    <div class="demo-section">
      <div class="tooltip-grid">
        
        <!-- Top Tooltip -->
        <button class="ease-tooltip ease-tooltip--top" aria-label="This is a top tooltip!">
          Hover Me (Top)
        </button>

        <!-- Right Tooltip -->
        <button class="ease-tooltip ease-tooltip--right" aria-label="This is a right tooltip!">
          Hover Me (Right)
        </button>

        <!-- Left Tooltip -->
        <button class="ease-tooltip ease-tooltip--left" aria-label="This is a left tooltip!">
          Hover Me (Left)
        </button>

        <!-- Bottom Tooltip -->
        <button class="ease-tooltip ease-tooltip--bottom" aria-label="This is a bottom tooltip!">
          Hover Me (Bottom)
        </button>

      </div>
    </div>
    
    <div class="demo-section" style="margin-top: 40px; text-align: center;">
       <p style="color: #64748b; margin-bottom: 20px;">Custom Color Example (Override Variables)</p>
       <button class="ease-tooltip ease-tooltip--top custom-tooltip" aria-label="Success action completed!">
          Success Action
        </button>
    </div>
  </div>

</body>
</html>
