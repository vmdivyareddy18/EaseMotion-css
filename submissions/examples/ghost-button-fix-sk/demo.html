<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Button Text Visibility Demo</title>

    <link rel="stylesheet" href="../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0b132b;
            font-family: Inter, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
        }

        h2 {
            margin-bottom: 1rem;
        }

        p {
            color: #cbd5e1;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Ghost Button Text Visibility Fix</h2>

    <p>
        This demo improves the Ghost button by keeping the text readable
        before and after hovering. The updated styling provides better
        contrast while preserving the Ghost button's minimal appearance.
    </p>

    <button class="ease-btn ease-btn-ghost">
        Ghost
    </button>

</div>

</body>
</html>
