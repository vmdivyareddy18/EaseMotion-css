<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-cursor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Custom Cursor Styles</h1>
    <div class="grid">
      <div class="card cursor-pointer"><span>Pointer</span></div>
      <div class="card cursor-glow"><span>Glow</span></div>
      <div class="card cursor-trail"><span>Trail</span></div>
      <div class="card cursor-ring"><span>Ring</span></div>
    </div>
    <div class="cursor-ring-follow"></div>
    <div class="cursor-dot"></div>
  </div>
</body>
</html>
