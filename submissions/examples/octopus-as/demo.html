<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Octopus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="bub b1"></span>
    <span class="bub b2"></span>
    <span class="bub b3"></span>
    <div class="octo">
      <div class="tents">
        <span class="tent tn1"></span>
        <span class="tent tn2"></span>
        <span class="tent tn3"></span>
        <span class="tent tn4"></span>
        <span class="tent tn5"></span>
        <span class="tent tn6"></span>
        <span class="tent tn7"></span>
        <span class="tent tn8"></span>
      </div>
      <div class="head">
        <span class="eye el"></span>
        <span class="eye er"></span>
        <span class="blush bl"></span>
        <span class="blush br"></span>
        <span class="mouth"></span>
        <span class="gloss"></span>
      </div>
    </div>
  </div>
</body>
</html>
