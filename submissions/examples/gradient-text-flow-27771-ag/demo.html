<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Text Flow Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of gradient text animation utility classes demonstrating multiple flowing color schemes.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Gradient Text Flow</h1>
      <p class="description">
        Demonstrates modern text typography. Review the shifting sunset 
        and ocean wave gradients below.
      </p>
    </header>

    <main class="showcase">
      <div class="showcase-card">
        <!-- Sunset Gold Theme -->
        <h2 class="flow-text flow-sunset">Sunset Gold Shift</h2>
        <p class="card-desc">Warm orange-to-purple sliding gradient animation.</p>
      </div>

      <div class="showcase-card">
        <!-- Ocean Wave Theme -->
        <h2 class="flow-text flow-ocean">Ocean Wave Shift</h2>
        <p class="card-desc">Cool cyan-to-royal-blue flowing gradient animation.</p>
      </div>
    </main>
  </div>

</body>
</html>
