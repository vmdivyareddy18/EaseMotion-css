<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Text - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <p class="label">Default (3s)</p>
    <h1 class="text-gradient">Build The Future Faster</h1>

    <p class="label">Fast (1.5s)</p>
    <h2 class="text-gradient text-gradient-fast">Launch Your Product Today</h2>

    <p class="label">Slow (6s)</p>
    <p class="text-gradient text-gradient-slow">Experience the next generation of design tools</p>
  </div>
</body>
</html>
