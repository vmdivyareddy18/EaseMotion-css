<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underline Draw GDPR Modal | EaseMotion CSS</title>
  
  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.min.css" />
  <!-- For CDN usage: <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css" /> -->
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="./style.css" />

  <style>
    body {
      background-color: var(--ease-color-neutral-100);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      font-family: var(--ease-font-sans);
    }
  </style>
</head>
<body>

  <!-- Example Background Content -->
  <div class="ease-center ease-fade-in">
    <h1 class="ease-slide-up">Welcome to our site</h1>
    <p class="ease-text-muted ease-slide-up ease-delay-100">The GDPR modal is active at the bottom.</p>
  </div>

  <!-- GDPR Modal -->
  <div class="ease-gdpr-modal ease-slide-up ease-delay-300">
    <div class="ease-gdpr-content">
      <h3 class="ease-gdpr-title">We value your privacy</h3>
      <p class="ease-gdpr-text">
        We use cookies to enhance your browsing experience, serve personalized ads or content, and analyze our traffic. By clicking "Accept All", you consent to our use of cookies.
      </p>
    </div>
    <div class="ease-gdpr-actions">
      <a href="#" class="ease-gdpr-link ease-underline-draw">Decline</a>
      <a href="#" class="ease-gdpr-link ease-underline-draw ease-gdpr-primary">Accept All</a>
    </div>
  </div>

</body>
</html>
