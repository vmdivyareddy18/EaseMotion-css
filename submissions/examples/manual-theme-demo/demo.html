<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manual Theme Demo - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Manual Theme Demo</h1>

      <div class="theme-card demo-box">
        <h2 class="card-title">Theme Card</h2>
        <p class="card-text">
          This card adapts its colors using CSS variables based on the active
          theme.
        </p>
        <button class="theme-toggle-btn" id="themeToggleBtn">
          Toggle Theme
        </button>
      </div>

      <p class="description">
        This demo shows how to use CSS variables to create a manual light/dark
        theme switcher, adapting colors seamlessly without changing markup.
      </p>
    </div>

    <script>
      const btn = document.getElementById("themeToggleBtn");
      btn.addEventListener("click", () => {
        document.body.classList.toggle("dark-theme");
      });
    </script>
  </body>
</html>
