<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Responsive Fix Demo — Issue #17313</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Tooltip Responsive Animation Fix</h1>
    <p>Resize the window to less than 640px to see the fallback positioning.</p>
    <div class="tooltip-wrapper">
      <button class="demo-btn">Hover Me</button>
      <div class="demo-tooltip" data-position="top">
        Tooltip text
        <div class="demo-tooltip-arrow"></div>
      </div>
    </div>
  </main>
</body>
</html>
