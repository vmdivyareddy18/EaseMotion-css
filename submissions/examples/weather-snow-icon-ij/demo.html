<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Snow Icon - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Snow Icon</h1>
    <div class="weather-icon snow-icon">
      <div class="snow-cloud">
        <div class="cloud-body"></div>
        <div class="cloud-body cloud-body--right"></div>
      </div>
      <div class="snowflake-dot dot-1"></div>
      <div class="snowflake-dot dot-2"></div>
      <div class="snowflake-dot dot-3"></div>
      <div class="snowflake-dot dot-4"></div>
      <div class="snowflake-dot dot-5"></div>
      <div class="snowflake-dot dot-6"></div>
    </div>
    <p class="description">Falling snowflakes with a gentle sway, scaled for a weather app icon.</p>
  </div>
</body>
</html>
