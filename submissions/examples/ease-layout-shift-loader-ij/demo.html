<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Shift Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Layout Shift Loader</h1>
  <p class="subtitle">Simulated content loading with skeleton shimmer and staggered reveal</p>

  <div class="controls">
    <button class="ctrl-btn" id="toggleBtn">Reload</button>
  </div>

  <div class="card-list" id="cardList">
    <article class="ls-card">
      <div class="ls-card__avatar skeleton"></div>
      <div class="ls-card__body">
        <div class="ls-card__line skeleton skeleton--text w-60"></div>
        <div class="ls-card__line skeleton skeleton--text w-80"></div>
        <div class="ls-card__line skeleton skeleton--text w-40"></div>
      </div>
    </article>
    <article class="ls-card">
      <div class="ls-card__avatar skeleton"></div>
      <div class="ls-card__body">
        <div class="ls-card__line skeleton skeleton--text w-70"></div>
        <div class="ls-card__line skeleton skeleton--text w-50"></div>
        <div class="ls-card__line skeleton skeleton--text w-90"></div>
      </div>
    </article>
    <article class="ls-card">
      <div class="ls-card__avatar skeleton"></div>
      <div class="ls-card__body">
        <div class="ls-card__line skeleton skeleton--text w-55"></div>
        <div class="ls-card__line skeleton skeleton--text w-75"></div>
        <div class="ls-card__line skeleton skeleton--text w-65"></div>
      </div>
    </article>
  </div>

  <script>
    const cardList = document.getElementById('cardList');
    const toggleBtn = document.getElementById('toggleBtn');

    function shuffle(loading) {
      cardList.classList.toggle('is-loading', loading);
      cardList.classList.toggle('is-loaded', !loading);
    }

    toggleBtn.addEventListener('click', () => {
      shuffle(true);
      setTimeout(() => shuffle(false), 2000);
    });

    shuffle(false);
  </script>
</body>
</html>
