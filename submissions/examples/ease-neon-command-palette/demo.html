<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Neon Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="palette">
  <header class="search-bar">
    <span>⌘</span>
    <input type="text" placeholder="Search commands..." disabled>
  </header>

  <section class="commands">
    <article class="item">
      <strong>Open Dashboard</strong>
      <small>Workspace</small>
    </article>

    <article class="item">
      <strong>Theme Switch</strong>
      <small>Appearance</small>
    </article>

    <article class="item">
      <strong>Deploy Project</strong>
      <small>Automation</small>
    </article>

    <article class="item">
      <strong>Open Settings</strong>
      <small>Preferences</small>
    </article>

    <article class="item">
      <strong>View Analytics</strong>
      <small>Insights</small>
    </article>
  </section>

  <footer>
    <kbd>↑↓</kbd>
    <kbd>Enter</kbd>
    <kbd>Esc</kbd>
  </footer>
</main>

</body>
</html>
