<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time Test - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="rt-wrapper">

    <h1>Reaction Time Test</h1>

    <div class="rt-area" id="reactionArea">
      <div class="rt-status" id="statusText">Click to start</div>
    </div>

    <div class="rt-results">
      <div class="rt-stat"><span class="rt-val" id="lastTime">--</span><span class="rt-lbl">Last (ms)</span></div>
      <div class="rt-stat"><span class="rt-val" id="avgTime">--</span><span class="rt-lbl">Average (ms)</span></div>
      <div class="rt-stat"><span class="rt-val" id="bestTime">--</span><span class="rt-lbl">Best (ms)</span></div>
    </div>

    <button class="rt-btn" id="resetReactionBtn">Reset</button>

  </div>

  <script>
    const area = document.getElementById('reactionArea');
    const status = document.getElementById('statusText');
    const lastEl = document.getElementById('lastTime');
    const avgEl = document.getElementById('avgTime');
    const bestEl = document.getElementById('bestTime');

    let state = 'waiting'; // waiting, ready, success
    let timeoutId = null;
    let startTime = 0;
    let times = [];

    function resetState() {
      clearTimeout(timeoutId);
      state = 'waiting';
      area.className = 'rt-area waiting';
      status.textContent = 'Click to start';
    }

    function startRound() {
      state = 'ready';
      area.className = 'rt-area ready';
      status.textContent = 'Wait for green...';

      const delay = 1000 + Math.random() * 3000;
      timeoutId = setTimeout(() => {
        state = 'success';
        area.className = 'rt-area success';
        status.textContent = 'Click now!';
        startTime = performance.now();
      }, delay);
    }

    function handleClick() {
      if (state === 'waiting') {
        startRound();
      } else if (state === 'ready') {
        resetState();
        status.textContent = 'Too soon! Click to retry';
      } else if (state === 'success') {
        const elapsed = performance.now() - startTime;
        times.push(elapsed);
        lastEl.textContent = elapsed.toFixed(0);

        const avg = times.reduce((a, b) => a + b, 0) / times.length;
        avgEl.textContent = avg.toFixed(0);

        const best = Math.min(...times);
        bestEl.textContent = best.toFixed(0);

        resetState();
        status.textContent = elapsed.toFixed(0) + ' ms! Click again';
      }
    }

    area.addEventListener('click', handleClick);

    document.getElementById('resetReactionBtn').addEventListener('click', () => {
      times = [];
      lastEl.textContent = '--';
      avgEl.textContent = '--';
      bestEl.textContent = '--';
      resetState();
      status.textContent = 'Click to start';
    });
  </script>

</body>
</html>
