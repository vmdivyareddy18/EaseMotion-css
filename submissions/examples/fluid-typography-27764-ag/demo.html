<!DOCTYPE html>
<html lang="en">

  <title>Fluid Typography Showcase — EaseMotion CSS</title>

  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">

<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
