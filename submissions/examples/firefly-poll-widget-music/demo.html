<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly Poll Widget — Music Player Demo</title>
  <!-- Link to core EaseMotion variables and utility classes -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden Radio States (Tab navigable option triggers) -->
  <input type="radio" name="music-vibe" id="opt-1" class="ease-poll-radio">
  <input type="radio" name="music-vibe" id="opt-2" class="ease-poll-radio">
  <input type="radio" name="music-vibe" id="opt-3" class="ease-poll-radio">

  <!-- Firefly Poll Widget Card -->
  <div class="ease-firefly-poll-widget" role="presentation">
    
    <!-- Background firefly glowing pulse lights -->
    <div class="ease-firefly-pulse-spot spot-1" aria-hidden="true"></div>
    <div class="ease-firefly-pulse-spot spot-2" aria-hidden="true"></div>

    <!-- Music Player Header section -->
    <header class="ease-poll__header">
      <!-- Vinyl record spinning disc -->
      <div class="ease-vinyl-art-wrapper" aria-hidden="true">
        <div class="ease-vinyl-record">
          <div class="ease-vinyl-center"></div>
        </div>
      </div>
      <!-- Track metadata -->
      <div class="ease-track-details">
        <span class="ease-track-name">Starlight Mix</span>
        <span class="ease-artist-name">The Fireflies</span>
      </div>
      <!-- Mini media control icons -->
      <div class="ease-media-controls">
        <button class="ease-media-btn" aria-label="Previous track">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" style="width: 14px; height: 14px;">
            <path d="M9.195 18.44c0 .356-.388.583-.7.4L3.195 12.4a.45.45 0 0 1 0-.8l5.3-6.44c.312-.183.7.044.7.4v12.88ZM17.195 18.44c0 .356-.388.583-.7.4l-5.3-6.44a.45.45 0 0 1 0-.8l5.3-6.44c.312-.183.7.044.7.4v12.88Z" />
          </svg>
        </button>
        <button class="ease-media-btn" aria-label="Play track" style="color: #ffffff;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" style="width: 16px; height: 16px;">
            <path d="M8 5.14v14c0 .86.94 1.39 1.66.9l10-7c.61-.43.61-1.37 0-1.8l-10-7C8.94 3.75 8 4.28 8 5.14Z" />
          </svg>
        </button>
        <button class="ease-media-btn" aria-label="Next track">
          <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" style="width: 14px; height: 14px;">
            <path d="M5.005 5.56c0-.356.388-.583.7-.4l5.3 6.44a.45.45 0 0 1 0 .8l-5.3 6.44c-.312.183-.7-.044-.7-.4V5.56ZM13.005 5.56c0-.356.388-.583.7-.4l5.3 6.44a.45.45 0 0 1 0 .8l-5.3 6.44c-.312.183-.7-.044-.7-.4V5.56Z" />
          </svg>
        </button>
      </div>
    </header>

    <!-- Poll Options body container -->
    <main class="ease-poll-body" role="radiogroup" aria-label="Vote for next track theme">
      <h2 class="ease-poll-question">Next Vibe Selection</h2>
      
      <!-- Option 1: Lo-Fi Beats -->
      <label for="opt-1" class="ease-poll__option" role="radio" aria-checked="false" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('opt-1').click();}">
        <!-- Label description -->
        <span class="ease-poll__label">Lo-Fi Beats</span>
        <!-- Percentages value -->
        <span class="ease-poll-percentage">54%</span>
        <!-- Radio checkmark indicator circle -->
        <div class="ease-poll__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
          </svg>
        </div>
        <!-- Progress bar background tracking -->
        <div class="ease-poll__progress" aria-hidden="true">
          <div class="ease-poll__progress-fill"></div>
        </div>
      </label>
      
      <!-- Option 2: Synthwave Glow -->
      <label for="opt-2" class="ease-poll__option" role="radio" aria-checked="false" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('opt-2').click();}">
        <span class="ease-poll__label">Synthwave Glow</span>
        <span class="ease-poll-percentage">28%</span>
        <div class="ease-poll__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
          </svg>
        </div>
        <div class="ease-poll__progress" aria-hidden="true">
          <div class="ease-poll__progress-fill"></div>
        </div>
      </label>
      
      <!-- Option 3: Acoustic Ambient -->
      <label for="opt-3" class="ease-poll__option" role="radio" aria-checked="false" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('opt-3').click();}">
        <span class="ease-poll__label">Acoustic Ambient</span>
        <span class="ease-poll-percentage">18%</span>
        <div class="ease-poll__icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5" />
          </svg>
        </div>
        <div class="ease-poll__progress" aria-hidden="true">
          <div class="ease-poll__progress-fill"></div>
        </div>
      </label>
    </main>

    <!-- Footer count stats -->
    <footer style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--ease-border-color); padding-top: 1rem; font-size: 0.75rem; color: var(--ease-text-muted);">
      <span>1,420 listeners voted</span>
      <span style="display: inline-flex; align-items: center; gap: 0.25rem;">
        <span style="width: 6px; height: 6px; border-radius: 50%; background-color: var(--ease-color-gold); box-shadow: 0 0 6px var(--ease-color-gold);"></span>
        Live Poll
      </span>
    </footer>

  </div>

</body>
</html>
