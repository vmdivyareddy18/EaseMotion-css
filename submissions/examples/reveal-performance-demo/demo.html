<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reveal Performance Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <h1>Reveal animation with smoother performance</h1>
      <p>This demo highlights a reveal pattern that activates elements as they enter view while staying lightweight and responsive.</p>

      <section class="card-grid">
        <article class="reveal-card">Smooth reveal entry</article>
        <article class="reveal-card">Responsive motion</article>
        <article class="reveal-card">Reduced motion support</article>
      </section>
    </main>

    <script>
      const cards = document.querySelectorAll('.reveal-card');
      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            obs.unobserve(entry.target);
          }
        });
      }, { threshold: 0.2 });

      cards.forEach((card) => observer.observe(card));
    </script>
  </body>
</html>
