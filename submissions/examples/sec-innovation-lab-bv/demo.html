<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous Security Innovation Laboratory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="lab-dashboard">
    <header class="header">
      <span class="badge">Innovation Lab</span>
      <h1>Autonomous Security Innovation Laboratory</h1>
      <p class="subtitle">Continuously generating defensive rules and validation frameworks.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-lab">
        <h3>🔬 Active lab simulations</h3>
        <div class="experiment-list">
          <div class="exp-item">
            <span class="status pulse">Testing</span>
            <h5>Sandboxed Malware Triage</h5>
            <p>Injecting telemetry signatures to calculate defense effectiveness.</p>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card progress-card">
          <h3>⚡ Progress</h3>
          <div class="bar-container">
            <div class="bar"><div class="fill" style="width: 88%"></div></div>
            <span class="lbl">Phase 1 validation: 88%</span>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
