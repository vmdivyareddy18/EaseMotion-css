<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings Panel UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="settings-container">

    <aside class="sidebar">

        <h2>Settings</h2>

        <div class="menu-item active">
            Profile
        </div>

        <div class="menu-item">
            Appearance
        </div>

        <div class="menu-item">
            Notifications
        </div>

        <div class="menu-item">
            Security
        </div>

        <div class="menu-item">
            Billing
        </div>

    </aside>

    <main class="settings-panel">

        <h1>Profile Settings</h1>

        <div class="setting-card">

            <div>
                <h3>Public Profile</h3>
                <p>Control your public information.</p>
            </div>

            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>

        </div>

        <div class="setting-card">

            <div>
                <h3>Email Notifications</h3>
                <p>Receive updates and alerts.</p>
            </div>

            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>

        </div>

        <div class="setting-card">

            <div>
                <h3>Two-Factor Authentication</h3>
                <p>Improve account security.</p>
            </div>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>

        </div>

    </main>

</div>

</body>
</html>
