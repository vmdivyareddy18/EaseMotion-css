<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Click Ripple</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Click Ripple Effect</h1>
  <p>Click any button to see the ripple expand from your cursor.</p>
  <div class="demo-grid">
    <button class="ripple-btn primary">Primary Button</button>
    <button class="ripple-btn secondary">Secondary</button>
    <button class="ripple-btn ghost">Ghost Button</button>
    <button class="ripple-btn danger">Danger</button>
    <div class="ripple-card"><h3>Click Card</h3><p>Click anywhere on this card.</p></div>
    <div class="ripple-icon-btn">&#9829;</div>
  </div>
</div>
<script>
document.querySelectorAll('.ripple-btn, .ripple-card, .ripple-icon-btn').forEach(el => {
  el.addEventListener('click', (e) => {
    const rect = el.getBoundingClientRect();
    el.style.setProperty('--rx', (e.clientX - rect.left) + 'px');
    el.style.setProperty('--ry', (e.clientY - rect.top) + 'px');
    el.classList.remove('rippling'); void el.offsetWidth;
    el.classList.add('rippling');
    setTimeout(() => el.classList.remove('rippling'), 700);
  });
});
</script>
</body></html>
