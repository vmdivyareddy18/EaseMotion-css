<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Glowing Status Badge</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Cyberpunk status badging layout -->
  <div class="badge-group">
    <div class="cyber-badge online">
      <div class="scanline"></div>
      System Active
    </div>

    <div class="cyber-badge warning">
      <div class="scanline"></div>
      High Load
    </div>

    <div class="cyber-badge offline">
      <div class="scanline"></div>
      Server Down
    </div>
  </div>

</body>
</html>
