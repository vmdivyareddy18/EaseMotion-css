<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Three-State Toggle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-3state-wrapper">
    <div class="ease-3state-card">
      <h2 class="ease-3state-title">Notification Level</h2>
      <div class="ease-3state-toggle" id="toggle" role="radiogroup" aria-label="Notification level">
        <button class="ease-3state-option ease-3state-active" data-value="low" role="radio" aria-checked="true">Low</button>
        <button class="ease-3state-option" data-value="medium" role="radio" aria-checked="false">Medium</button>
        <button class="ease-3state-option" data-value="high" role="radio" aria-checked="false">High</button>
        <div class="ease-3state-thumb" id="thumb"></div>
      </div>
      <p class="ease-3state-result">Current: <strong id="resultText">Low</strong></p>
    </div>
  </div>
  <script>
    const toggle = document.getElementById('toggle');
    const thumb = document.getElementById('thumb');
    const options = toggle.querySelectorAll('.ease-3state-option');
    const resultText = document.getElementById('resultText');
    const positions = { low: 0, medium: 1, high: 2 };

    function moveThumb(value) {
      const index = positions[value];
      thumb.style.transform = `translateX(${index * 100}%)`;
    }

    options.forEach(opt => {
      opt.addEventListener('click', () => {
        options.forEach(o => {
          o.classList.remove('ease-3state-active');
          o.setAttribute('aria-checked', 'false');
        });
        opt.classList.add('ease-3state-active');
        opt.setAttribute('aria-checked', 'true');
        const value = opt.dataset.value;
        moveThumb(value);
        resultText.textContent = opt.textContent;
      });
    });

    moveThumb('low');
  </script>
</body>
</html>
