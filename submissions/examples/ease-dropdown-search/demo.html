<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dropdown Search - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Search Dropdown</h1>
      <p>Custom select menu with built-in search filtering and smooth collapsing animations.</p>
    </header>

    <main class="demo-grid">
      
      <!-- The Dropdown Component -->
      <div class="ease-dropdown" id="dropdown-container">
        
        <!-- The Trigger Button -->
        <button class="ease-dropdown-trigger" id="dropdown-btn" aria-haspopup="listbox" aria-expanded="false">
          <span id="trigger-text">Select a framework...</span>
          <svg class="ease-dropdown-icon" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        
        <!-- The Pop-out Menu -->
        <div class="ease-dropdown-menu">
          
          <div class="ease-search-wrapper">
            <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" class="ease-search-input" id="dropdown-search" placeholder="Search frameworks..." autocomplete="off">
          </div>
          
          <ul class="ease-dropdown-list" id="dropdown-list" role="listbox">
            <li role="option" tabindex="-1">React</li>
            <li role="option" tabindex="-1">Vue.js</li>
            <li role="option" tabindex="-1">Angular</li>
            <li role="option" tabindex="-1">Svelte</li>
            <li role="option" tabindex="-1">SolidJS</li>
            <li role="option" tabindex="-1">Next.js</li>
            <li role="option" tabindex="-1">Nuxt.js</li>
            <li role="option" tabindex="-1">Ember</li>
          </ul>
          
          <div class="ease-no-results" id="dropdown-no-results">No frameworks found.</div>
          
        </div>
      </div>

    </main>
  </div>

  <script>
    const dropdown = document.getElementById('dropdown-container');
    const trigger = document.getElementById('dropdown-btn');
    const triggerText = document.getElementById('trigger-text');
    const search = document.getElementById('dropdown-search');
    const list = document.getElementById('dropdown-list');
    const items = Array.from(list.querySelectorAll('li'));
    const noResults = document.getElementById('dropdown-no-results');

    // Toggle Dropdown
    function toggleDropdown() {
      const isOpen = dropdown.classList.toggle('open');
      trigger.setAttribute('aria-expanded', isOpen);
      
      if (isOpen) {
        // Reset search and focus input when opened
        search.value = '';
        filterList('');
        search.focus();
        focusIndex = -1;
        updateFocus(items.filter(i => !i.classList.contains('hidden')));
      }
    }

    trigger.addEventListener('click', toggleDropdown);

    // Filter Logic
    function filterList(query) {
      const q = query.toLowerCase();
      let matchCount = 0;
      
      items.forEach(item => {
        if (item.textContent.toLowerCase().includes(q)) {
          item.classList.remove('hidden');
          matchCount++;
        } else {
          item.classList.add('hidden');
          item.classList.remove('keyboard-focus');
        }
      });
      
      if (matchCount === 0) noResults.classList.add('visible');
      else noResults.classList.remove('visible');
    }

    search.addEventListener('input', (e) => filterList(e.target.value));

    // Keyboard Navigation
    let focusIndex = -1;
    search.addEventListener('keydown', (e) => {
      const visibleItems = items.filter(i => !i.classList.contains('hidden'));
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusIndex = (focusIndex + 1) % visibleItems.length;
        updateFocus(visibleItems);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusIndex = focusIndex - 1;
        if (focusIndex < 0) focusIndex = visibleItems.length - 1;
        updateFocus(visibleItems);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (focusIndex >= 0 && visibleItems[focusIndex]) {
          selectItem(visibleItems[focusIndex]);
        }
      } else if (e.key === 'Escape') {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
        trigger.focus();
      }
    });

    function updateFocus(visibleItems) {
      items.forEach(i => i.classList.remove('keyboard-focus'));
      if (visibleItems[focusIndex]) {
        visibleItems[focusIndex].classList.add('keyboard-focus');
        // Scroll list if item is out of view
        visibleItems[focusIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    // Selection Logic
    function selectItem(item) {
      triggerText.textContent = item.textContent;
      dropdown.classList.remove('open');
      trigger.setAttribute('aria-expanded', 'false');
      trigger.focus();
    }

    items.forEach(item => {
      item.addEventListener('click', () => selectItem(item));
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target)) {
        dropdown.classList.remove('open');
        trigger.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
