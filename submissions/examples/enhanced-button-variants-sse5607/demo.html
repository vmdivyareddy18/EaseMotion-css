<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enhanced Button Variants — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <header class="demo-header">
      <h1>Enhanced Button Variants</h1>
      <p>A set of reusable button styles that extend the EaseMotion button system.</p>
    </header>

    <section class="demo-section">
      <h2>Variants</h2>
      <div class="btn-row">
        <button class="ease-btn-sse ease-btn-secondary-sse">Secondary</button>
        <button class="ease-btn-sse ease-btn-warning-sse">Warning</button>
        <button class="ease-btn-sse ease-btn-info-sse">Info</button>
        <button class="ease-btn-sse ease-btn-gradient-sse">Gradient</button>
        <button class="ease-btn-sse ease-btn-soft-sse">Soft</button>
      </div>
    </section>

    <section class="demo-section">
      <h2>With Hover</h2>
      <div class="btn-row">
        <button class="ease-btn-sse ease-btn-secondary-sse ease-btn-hover-sse">Hover Me</button>
        <button class="ease-btn-sse ease-btn-warning-sse ease-btn-hover-sse">Hover Me</button>
        <button class="ease-btn-sse ease-btn-info-sse ease-btn-hover-sse">Hover Me</button>
        <button class="ease-btn-sse ease-btn-gradient-sse ease-btn-hover-sse">Hover Me</button>
        <button class="ease-btn-sse ease-btn-soft-sse ease-btn-hover-sse">Hover Me</button>
      </div>
    </section>

    <section class="demo-section">
      <h2>Sizes</h2>
      <div class="btn-row btn-row-align">
        <button class="ease-btn-sse ease-btn-gradient-sse ease-btn-sm-sse">Small</button>
        <button class="ease-btn-sse ease-btn-gradient-sse">Default</button>
        <button class="ease-btn-sse ease-btn-gradient-sse ease-btn-lg-sse">Large</button>
        <button class="ease-btn-sse ease-btn-gradient-sse ease-btn-xl-sse">X-Large</button>
      </div>
    </section>
  </main>
</body>
</html>
