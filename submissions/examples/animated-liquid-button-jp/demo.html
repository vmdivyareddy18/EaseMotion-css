<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Liquid Button Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Liquid Button Collection</h1>

        <p>
            Futuristic CSS-only liquid buttons with flowing waves,
            glowing colors, and smooth interactive effects.
        </p>

        <div class="button-group">

            <button class="liquid-btn blue">
                Start Journey
            </button>

            <button class="liquid-btn pink">
                Play Now
            </button>

            <button class="liquid-btn green">
                Download
            </button>

        </div>

    </div>

</body>
</html>
