<!DOCTYPE html>
<html>
<head>
  <title>Cookie Banner UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cookie">
  <p>🍪 This website uses cookies to improve experience.</p>
  <button onclick="hideBanner()">Accept</button>
</div>

<script>
function hideBanner() {
  document.querySelector(".cookie").style.display = "none";
}
</script>

</body>
</html>
