<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Search Results Counter Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Live Search Results Counter Demo</h1>

  <div class="search-container">
    <input
      type="text"
      id="searchInput"
      placeholder="Search animations..."
    />

    <p id="resultsCount">Showing 5 animations</p>

    <div id="animationList">
      <div class="demo-card">Fade In</div>
      <div class="demo-card">Slide Up</div>
      <div class="demo-card">Bounce</div>
      <div class="demo-card">Flip 3D</div>
      <div class="demo-card">Shimmer Text</div>
    </div>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const items = document.querySelectorAll(".demo-card");
    const resultsCount = document.getElementById("resultsCount");

    searchInput.addEventListener("input", () => {
      const search = searchInput.value.toLowerCase();
      let visibleCount = 0;

      items.forEach(item => {
        const match = item.textContent.toLowerCase().includes(search);

        item.style.display = match ? "block" : "none";

        if (match) visibleCount++;
      });

      resultsCount.textContent =
        `Showing ${visibleCount} animation${visibleCount !== 1 ? "s" : ""}`;
    });
  </script>

</body>
</html>
