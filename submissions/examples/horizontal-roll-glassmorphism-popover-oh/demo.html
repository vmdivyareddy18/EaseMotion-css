<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Horizontal Roll Popover - Glassmorphism UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Glassmorphism UI</span>
      <h1>Horizontal Roll Popover</h1>
      <p class="subtitle">Glass blur with roll animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="glass-btn" aria-label="View profile">
          <div class="glass-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </button>
        <div class="roll-popover" role="tooltip">
          <div class="roll-blur"></div>
          <div class="roll-profile">
            <div class="profile-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="profile-info">
              <h4>Sarah Chen</h4>
              <span>Product Designer</span>
            </div>
          </div>
          <div class="roll-items">
            <div class="roll-item" style="--delay: 0.05s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <span>My Profile</span>
            </div>
            <div class="roll-item" style="--delay: 0.1s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06"/>
                </svg>
              </span>
              <span>Settings</span>
            </div>
            <div class="roll-item" style="--delay: 0.15s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16,17 21,12 16,7"/>
                </svg>
              </span>
              <span>Logout</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Blur</button>
          <div class="roll-popover blur" role="tooltip"><p>Blur roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Shine</button>
          <div class="roll-popover shine" role="tooltip"><p>Shine roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Frost</button>
          <div class="roll-popover frost" role="tooltip"><p>Frost roll animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="roll-popover theme-violet" role="tooltip"><p>Violet glass theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-blue">Blue</button>
          <div class="roll-popover theme-blue" role="tooltip"><p>Blue glass theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-pink">Pink</button>
          <div class="roll-popover theme-pink" role="tooltip"><p>Pink glass theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
