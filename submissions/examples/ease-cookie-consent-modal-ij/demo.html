<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cookie Consent Modal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Cookie Consent Modal</h1>
    <p class="description">This page demonstrates a slide-in cookie consent banner with dismiss and re-trigger.</p>
    <button id="reopen-btn" class="reopen-btn">Show Cookie Banner</button>
  </div>

  <div id="cookie-banner" class="cookie-banner">
    <div class="cookie-content">
      <p class="cookie-text">We use cookies to improve your experience. By continuing, you agree to our use of cookies.</p>
      <div class="cookie-actions">
        <button id="accept-btn" class="cookie-btn cookie-btn--accept">Accept</button>
        <button id="reject-btn" class="cookie-btn cookie-btn--reject">Reject</button>
      </div>
    </div>
  </div>

  <script>
    const banner = document.getElementById('cookie-banner');
    const acceptBtn = document.getElementById('accept-btn');
    const rejectBtn = document.getElementById('reject-btn');
    const reopenBtn = document.getElementById('reopen-btn');

    function showBanner() {
      banner.classList.remove('cookie-banner--hidden');
      banner.classList.remove('cookie-banner--dismissed');
      requestAnimationFrame(() => {
        banner.classList.add('cookie-banner--visible');
      });
    }

    function hideBanner() {
      banner.classList.remove('cookie-banner--visible');
      banner.classList.add('cookie-banner--dismissed');
    }

    acceptBtn.addEventListener('click', hideBanner);
    rejectBtn.addEventListener('click', hideBanner);
    reopenBtn.addEventListener('click', showBanner);

    banner.addEventListener('animationend', (e) => {
      if (e.animationName === 'slideOut' && banner.classList.contains('cookie-banner--dismissed')) {
        banner.classList.add('cookie-banner--hidden');
      }
    });

    showBanner();
  </script>
</body>
</html>
