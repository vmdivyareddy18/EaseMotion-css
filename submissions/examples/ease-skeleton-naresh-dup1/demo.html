<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Skeleton Loaders Showcase</title>
  <meta name="description" content="Interactive demo and guide showing pure CSS skeleton loader placeholders with shimmer gradient animations.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Skeleton Loaders</h1>
      <p>Hardware-accelerated shimmer effects to enhance content loading UX</p>
    </header>

    <div class="controls-bar">
      <button id="btn-toggle-state" class="btn" onclick="toggleCardState()">Toggle Active Content</button>
      <button id="btn-toggle-theme" class="btn btn-secondary" onclick="toggleLightMode()">Toggle Light Theme</button>
    </div>

    <!-- Toggle container wrapping the loading layout -->
    <main id="skeleton-demo-card" class="preview-card">
      
      <!-- LOADING STATE (Skeleton Placeholders) -->
      <div id="loading-group" class="content-group active" aria-busy="true" aria-live="polite">
        <div class="user-meta">
          <!-- Avatar skeleton circle -->
          <div class="ease-skeleton ease-skeleton--avatar" aria-hidden="true"></div>
          <div class="user-details" style="width: 60%;">
            <!-- Header title skeletons -->
            <div class="ease-skeleton ease-skeleton--text" style="width: 80%; height: 0.85rem;" aria-hidden="true"></div>
            <div class="ease-skeleton ease-skeleton--text" style="width: 50%; height: 0.7rem; margin: 0;" aria-hidden="true"></div>
          </div>
        </div>

        <!-- Banner image skeleton card -->
        <div class="ease-skeleton ease-skeleton--card" aria-hidden="true"></div>

        <!-- Body text skeletons -->
        <div style="width: 100%;">
          <div class="ease-skeleton ease-skeleton--text" style="width: 100%;" aria-hidden="true"></div>
          <div class="ease-skeleton ease-skeleton--text" style="width: 90%;" aria-hidden="true"></div>
          <div class="ease-skeleton ease-skeleton--text" style="width: 40%; margin: 0;" aria-hidden="true"></div>
        </div>
      </div>

      <!-- LOADED STATE (Actual content) -->
      <div id="loaded-group" class="content-group">
        <div class="user-meta">
          <!-- Profile image details -->
          <div class="avatar-img"></div>
          <div class="user-details">
            <h3>Naresh Kumawat</h3>
            <span>UI Engineer & Developer</span>
          </div>
        </div>

        <!-- Banner image featured block -->
        <div class="feature-img" style="background: linear-gradient(135deg, #4f46e5 0%, #ec4899 100%);"></div>

        <!-- Bios description details -->
        <p class="card-text">
          Building high-performance, logical CSS frameworks with focus on hardware-accelerated animations, transitions, fluid typography, and premium micro-interactions.
        </p>
      </div>

    </main>
  </div>

  <script>
    function toggleCardState() {
      const loadingGroup = document.getElementById('loading-group');
      const loadedGroup = document.getElementById('loaded-group');
      const toggleBtn = document.getElementById('btn-toggle-state');

      if (loadingGroup.classList.contains('active')) {
        loadingGroup.classList.remove('active');
        loadedGroup.classList.add('active');
        toggleBtn.innerText = 'Show Skeleton Loader';
      } else {
        loadedGroup.classList.remove('active');
        loadingGroup.classList.add('active');
        toggleBtn.innerText = 'Toggle Active Content';
      }
    }

    function toggleLightMode() {
      const root = document.getElementById('skeleton-demo-card');
      const toggleThemeBtn = document.getElementById('btn-toggle-theme');

      if (root.style.getPropertyValue('--ease-skeleton-base') === '#e2e8f0') {
        // Switch back to dark mode presets
        root.style.removeProperty('--ease-skeleton-base');
        root.style.removeProperty('--ease-skeleton-shine');
        root.style.removeProperty('background-color');
        root.style.removeProperty('border-color');
        root.style.removeProperty('color');
        toggleThemeBtn.innerText = 'Toggle Light Theme';
      } else {
        // Set inline overrides for light mode theme
        root.style.setProperty('--ease-skeleton-base', '#e2e8f0');
        root.style.setProperty('--ease-skeleton-shine', '#f1f5f9');
        root.style.setProperty('background-color', '#ffffff');
        root.style.setProperty('border-color', '#e2e8f0');
        root.style.setProperty('color', '#0f172a');
        toggleThemeBtn.innerText = 'Toggle Dark Theme';
      }
    }
  </script>
</body>
</html>
