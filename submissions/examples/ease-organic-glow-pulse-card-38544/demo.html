<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Organic Glow Pulse Card — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      gap: 28px;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: #ece4d6;
    }
  </style>
</head>
<body>

  <div class="ease-glow-card" tabindex="0">
    <div class="card-content">
      <div class="card-icon">🌿</div>
      <h3 class="card-title">Handcrafted Ceramics</h3>
      <p class="card-description">
        Each piece is shaped, glazed, and fired by hand — no two are exactly alike.
      </p>
      <span class="card-tag">Organic Craft</span>
    </div>
  </div>

  <div class="ease-glow-card" tabindex="0" style="--glow-color: rgba(138,154,91,0.35); --glow-color-soft: rgba(196,130,89,0.25);">
    <div class="card-content">
      <div class="card-icon">🪵</div>
      <h3 class="card-title">Reclaimed Woodwork</h3>
      <p class="card-description">
        Sourced from fallen timber, finished with natural oils for a warm, tactile grain.
      </p>
      <span class="card-tag">Sustainable</span>
    </div>
  </div>

</body>
</html>
