<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Shimmer Sweep Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Marketing Landing

</span>

<h1>

Shimmer Sweep Modal

</h1>

<p>

Modern marketing modal
designed with a subtle
shimmer sweep animation
for campaign experiences.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Launch Campaign

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="tag">

New Release

</div>

<h2>

Boost Engagement

</h2>

<p>

A pure CSS marketing modal
featuring shimmer effects,
responsive design and
keyboard accessibility.

</p>

<button>

Get Started

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
