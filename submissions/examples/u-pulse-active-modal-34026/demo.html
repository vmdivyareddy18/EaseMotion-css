<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pulse Active Modal</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Product Catalog

</span>

<h1>

Pulse Active Modal

</h1>

<p>

Showcase featured products,
exclusive offers and
shopping experiences with
a modern pulse animation.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Preview Product

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

🛍️

</div>

<h2>

Featured Collection

</h2>

<p>

Highlight products using a
smooth pulse interaction
crafted for catalog and
e-commerce experiences.

</p>

<button>

Shop Now

</button>

</div>

</div>

</div>

</section>

</body>

</html>
