<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dropdown Entry Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="trigger-btn" id="menuBtn">Options ▾</button>
        <div class="dropdown-menu ease-dropdown-entry" id="dropdownMenu">
            <a href="#" class="dropdown-item">Profile</a>
            <a href="#" class="dropdown-item">Settings</a>
            <a href="#" class="dropdown-item">Help</a>
            <a href="#" class="dropdown-item" style="color: #ef4444;">Logout</a>
        </div>
    </div>

    <script>
        const btn = document.getElementById('menuBtn');
        const menu = document.getElementById('dropdownMenu');
        
        btn.addEventListener('click', () => {
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
                // Remove and re-add class to trigger animation again next time
                menu.classList.remove('ease-dropdown-entry');
            } else {
                menu.classList.add('active');
                menu.classList.add('ease-dropdown-entry');
            }
        });

        // Close when clicking outside
        document.addEventListener('click', (e) => {
            if (!btn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.remove('active');
                menu.classList.remove('ease-dropdown-entry');
            }
        });
    </script>
</body>
</html>
