<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Split View - Pure CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page-container">
        
        <header class="section-header">
            <h1>Choose Your Path</h1>
            <p>Hover over a side to explore. Pure CSS Flexbox transitions.</p>
        </header>

        <!-- 
          The core `ease-split-view` component. 
          It contains exactly two `split-pane` children.
        -->
        <div class="ease-split-view">
            
            <!-- Left Pane -->
            <div class="split-pane left-pane">
                <div class="pane-content">
                    <h2>For Developers</h2>
                    <p>Build faster with raw API access, comprehensive SDKs, and unopinionated UI primitives.</p>
                    <button class="action-btn">View Documentation</button>
                </div>
            </div>
            
            <!-- Right Pane -->
            <div class="split-pane right-pane">
                <div class="pane-content">
                    <h2>For Designers</h2>
                    <p>Craft beautiful experiences with our intuitive drag-and-drop editor and extensive component library.</p>
                    <button class="action-btn">Start Designing</button>
                </div>
            </div>

        </div>
        
    </main>

</body>
</html>
