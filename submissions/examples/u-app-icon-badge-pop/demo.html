<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-app-icon-badge-pop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-app-icon-badge-pop</h1>
    <p class="subtitle">
        App icon notification badge pop animation
    </p>

    <div class="apps-grid">

        <div class="app-card">
            <div class="app-icon mail">
                📧
                <span class="badge">3</span>
            </div>
            <h3>Mail</h3>
        </div>

        <div class="app-card">
            <div class="app-icon chat">
                💬
                <span class="badge">8</span>
            </div>
            <h3>Messages</h3>
        </div>

        <div class="app-card">
            <div class="app-icon social">
                ❤️
                <span class="badge">12</span>
            </div>
            <h3>Social</h3>
        </div>

        <div class="app-card">
            <div class="app-icon updates">
                🔔
                <span class="badge">99+</span>
            </div>
            <h3>Notifications</h3>
        </div>

    </div>

    <section class="demo-section">

        <h2>Badge States</h2>

        <div class="badge-showcase">

            <div class="showcase-item">
                <span class="mini-badge pop">1</span>
                <p>New Message</p>
            </div>

            <div class="showcase-item">
                <span class="mini-badge pop delay1">5</span>
                <p>Unread Chats</p>
            </div>

            <div class="showcase-item">
                <span class="mini-badge pop delay2">15</span>
                <p>App Updates</p>
            </div>

        </div>

    </section>

</div>

</body>
</html>
