<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-xylophone-bars</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Xylophone Bars</h1>
    <div class="xylophone-wrapper">
      <div class="xylophone">
        <div class="hammer">
          <div class="hammer-head"></div>
        </div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Bar Color
        <input type="color" class="js-color" value="#ff6b6b" data-var="--bar-color" />
      </label>
      <label>
        Hammer Color
        <input type="color" class="js-color" value="#ddd" data-var="--hammer-color" />
      </label>
      <label>
        Hit Duration
        <input type="range" class="js-range" min="0.15" max="1" step="0.05" value="0.4" data-var="--hit-duration" />
        <span class="js-range-value">0.4s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
