<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toggle Switch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="toggle-container">

    <div class="toggle-wrapper">

      <input
        type="checkbox"
        id="toggle1"
        class="toggle-input"
        checked
      >

      <label for="toggle1" class="toggle-switch"></label>

      <span class="toggle-label">
        Notifications
      </span>

    </div>

    <div class="toggle-wrapper">

      <input
        type="checkbox"
        id="toggle2"
        class="toggle-input"
      >

      <label for="toggle2" class="toggle-switch"></label>

      <span class="toggle-label">
        Dark Mode
      </span>

    </div>

  </div>

</body>
</html>
