<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Cast Burst - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Spell Cast Burst</h1>
    <p class="description">A magical burst of energy when a spell is cast.</p>
    <div class="burst" tabindex="0" role="img" aria-label="Spell cast burst">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <div class="ring r3"></div>
      <span class="part p1">✦</span>
      <span class="part p2">✦</span>
      <span class="part p3">✦</span>
      <span class="part p4">✦</span>
      <span class="part p5">✦</span>
      <span class="part p6">✦</span>
      <span class="part p7">✦</span>
      <span class="part p8">✦</span>
    </div>
  </div>
</body>
</html>
