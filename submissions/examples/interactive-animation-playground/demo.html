<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Animation Playground</title>

<!-- Replace with the official EaseMotion CSS CDN if different -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>EaseMotion Animation Playground</h1>

<div class="controls">

<label for="animationSelect">
Choose Animation
</label>

<select id="animationSelect">

<option value="ease-fade-in">Fade In</option>

<option value="ease-slide-up">Slide Up</option>

<option value="ease-hover-grow">Hover Grow</option>

</select>

<button id="playButton">
Play Animation
</button>

</div>

<div id="previewBox" class="preview">

Preview Box

</div>

<script>

const preview=document.getElementById("previewBox");

const select=document.getElementById("animationSelect");

document.getElementById("playButton").addEventListener("click",()=>{

preview.className="preview";

void preview.offsetWidth;

preview.classList.add(select.value);

});

</script>

</body>
</html>
