<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Fix: btn-loading Firefox overflow:hidden — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="main-content">
    <h1>Bug Fix: .btn-loading Spinner in Firefox with overflow:hidden</h1>
    <p>Demonstrates that the loading spinner is visible even when the button's parent has <code>overflow:hidden</code> and <code>border-radius</code>.</p>

    <section>
      <h2>Without fix (spinner clipped in Firefox)</h2>
      <div class="card-clipped">
        <button class="btn btn-primary btn-loading-broken" aria-label="Loading, please wait" aria-busy="true">
          Loading
        </button>
      </div>
    </section>

    <section>
      <h2>With fix (spinner always visible)</h2>
      <div class="card-clipped">
        <button class="btn btn-primary btn-loading-fixed" aria-label="Loading, please wait" aria-busy="true">
          Loading
        </button>
      </div>
    </section>

    <section>
      <h2>Standalone (no parent clipping)</h2>
      <button class="btn btn-primary btn-loading-fixed" aria-label="Loading, please wait" aria-busy="true">
        Loading
      </button>
    </section>
  </main>
</body>
</html>
