<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modular CSS Size Calculator</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-calc-container">
    <div class="ease-calc-header">
      <h2 class="ease-calc-title">Modular Import Size Calculator</h2>
      <p class="ease-calc-desc">EaseMotion is modular. Select the animation groups you actually need to see the estimated footprint (Gzipped).</p>
    </div>

    <div class="ease-calc-form" id="calcForm">
      <!-- Generated via JS -->
    </div>

    <div class="ease-calc-result">
      <h3 class="ease-calc-result-title">Estimated Total (Gzip):</h3>
      <div id="totalSizeDisplay" class="ease-calc-total ease-hover-lift">0 KB</div>
    </div>
  </div>

  <script>
    const modules = [
      { id: 'core', name: 'Core Engine (Required)', size: 1.2, required: true },
      { id: 'fades', name: 'Fades (fade-in, fade-out)', size: 0.8, required: false },
      { id: 'slides', name: 'Slides (slide-up, slide-down)', size: 1.5, required: false },
      { id: 'bounces', name: 'Bounces (bounce, rubberBand)', size: 2.1, required: false },
      { id: 'hovers', name: 'Hover Micro-interactions', size: 1.1, required: false }
    ];

    const form = document.getElementById('calcForm');
    const display = document.getElementById('totalSizeDisplay');

    function calculateTotal() {
      let total = 0;
      const checkboxes = document.querySelectorAll('.ease-calc-checkbox');
      checkboxes.forEach(cb => {
        if (cb.checked) {
          total += parseFloat(cb.dataset.size);
        }
      });
      
      // Update display with a pop animation
      display.textContent = `${total.toFixed(2)} KB`;
      display.classList.remove('ease-pop');
      void display.offsetWidth; // trigger reflow
      display.classList.add('ease-pop');
    }

    // Render list
    modules.forEach(mod => {
      const item = document.createElement('label');
      item.className = 'ease-calc-item';
      
      const isChecked = mod.required ? 'checked disabled' : '';
      
      item.innerHTML = `
        <div class="ease-calc-label">
          <input type="checkbox" class="ease-calc-checkbox" data-size="${mod.size}" ${isChecked}>
          ${mod.name}
        </div>
        <span class="ease-calc-size-badge">+${mod.size} KB</span>
      `;
      
      form.appendChild(item);
    });

    // Add event listeners
    document.querySelectorAll('.ease-calc-checkbox').forEach(cb => {
      cb.addEventListener('change', calculateTotal);
    });

    // Initial calc
    calculateTotal();
  </script>

</body>
</html>
