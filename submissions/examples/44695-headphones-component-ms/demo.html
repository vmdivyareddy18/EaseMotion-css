<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headphones Component Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; font-family: 'Space Grotesk', sans-serif;">

  <div class="ease-headphone-card">
    <div class="ease-headphone-glow"></div>
    <div class="ease-headphone-image-container">
      <svg class="ease-headphone-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
        <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
      </svg>
    </div>
    
    <div class="ease-headphone-info">
      <h3 class="ease-headphone-title">SonicPro Max</h3>
      <p class="ease-headphone-desc">Experience pure, uninterrupted sound with adaptive noise cancellation.</p>
      
      <div class="ease-headphone-price-row">
        <span class="ease-headphone-price">$299</span>
        <button class="ease-headphone-btn">Add to Cart</button>
      </div>
    </div>
  </div>

</body>
</html>
