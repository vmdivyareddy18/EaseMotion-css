<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-avatar-group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Team Avatars</h1>
    <div class="avatar-group">
      <div class="avatar a1" style="background:#e94560;"><span>A</span></div>
      <div class="avatar a2" style="background:#533483;"><span>B</span></div>
      <div class="avatar a3" style="background:#2ecc71;"><span>C</span></div>
      <div class="avatar a4" style="background:#f39c12;"><span>D</span></div>
      <div class="avatar a5" style="background:#3498db;"><span>E</span></div>
      <div class="avatar a6" style="background:#e74c3c;"><span>F</span></div>
      <div class="avatar remaining"><span>+3</span></div>
    </div>
    <div class="tooltip">Hover over avatars</div>
  </div>
</body>
</html>
