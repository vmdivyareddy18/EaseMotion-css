<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Global Animation Marketplace</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 151 • Developer Platform</span>
        <h1>Global Animation Marketplace</h1>
        <p class="subtitle">Create centralized animation discovery platform.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card main-panel">
          <h3>🛍️ Discovery Grid</h3>
          <div class="marketplace-grid">
            <div class="animation-card">
              <h4>ease-elastic-bounce</h4>
              <span class="preview-box elastic-bounce">Preview</span>
              <div class="card-footer">
                <span class="price">$0.00</span>
                <button class="btn btn-primary">Install</button>
              </div>
            </div>
            <div class="animation-card">
              <h4>ease-aurora-glow</h4>
              <span class="preview-box aurora-glow">Preview</span>
              <div class="card-footer">
                <span class="price">$2.99</span>
                <button class="btn btn-secondary">Purchase</button>
              </div>
            </div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Core Hub</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
