<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Landing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero spotlight" id="spotlight">
  <h1 class="ease-fade-in">EaseMotion Showcase 🚀</h1>
  <p class="ease-slide-up">Interactive Animation Landing</p>
</section>

<div class="cards">
  <div class="card">Hover Me</div>
  <div class="card">Explore</div>
  <div class="card">Animate</div>
</div>

<div class="orb" id="orb"></div>

<script>
let mouseX = 0, mouseY = 0;
let posX = 0, posY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  document.getElementById("spotlight")
    .style.setProperty("--x", mouseX + "px");

  document.getElementById("spotlight")
    .style.setProperty("--y", mouseY + "px");
});

const orb = document.getElementById("orb");

function animate() {
  posX += (mouseX - posX) * 0.1;
  posY += (mouseY - posY) * 0.1;

  orb.style.left = posX + "px";
  orb.style.top = posY + "px";

  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
