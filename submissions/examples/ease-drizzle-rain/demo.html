<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drizzle Rain</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Rain Effect</h2>
    <div class="rain-scene">
      <div class="raindrop" style="--x:10%;--d:0s"></div>
      <div class="raindrop" style="--x:30%;--d:0.4s"></div>
      <div class="raindrop" style="--x:50%;--d:0.8s"></div>
      <div class="raindrop" style="--x:70%;--d:0.2s"></div>
      <div class="raindrop" style="--x:90%;--d:0.6s"></div>
    </div>
  </div>
</body>
</html>
