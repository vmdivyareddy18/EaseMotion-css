<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GPS Locating Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="gps-title">
        <div class="gps-locator" role="img" aria-label="GPS locating animation">
          <span class="gps-ring ring-one"></span>
          <span class="gps-ring ring-two"></span>
          <span class="gps-pin"></span>
        </div>
        <p class="eyebrow">Location state</p>
        <h1 id="gps-title">GPS locating pulse</h1>
        <p class="demo-copy">
          A location marker holds steady while scan rings expand outward to show
          an active search state.
        </p>
      </section>
    </main>
  </body>
</html>
