<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pricing-section">
        <input type="checkbox" id="pricing-toggle" hidden>
        <div class="toggle-wrapper">
            <span>Monthly</span>
            <label for="pricing-toggle" class="toggle-switch"></label>
            <span>Yearly (Save 20%)</span>
        </div>
        
        <div class="cards-container">
            <div class="pricing-card">
                <h3>Basic</h3>
                <div class="price">
                    <span class="monthly-price">$19</span>
                    <span class="yearly-price">$190</span>
                    <span class="period"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
