<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Fitness Tracking Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Fitness Dashboard</h1>

<p>Track workouts and health goals.</p>

</div>

<button class="action-btn">

+ New Workout

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">🏋️</span>

<h3>Workouts</h3>










<h2>248</h2>

<div class="progress-bar">

<div class="progress workouts"></div>

</div>

</div>

<div class="card">

<span class="icon">🔥</span>

<h3>Calories</h3>

<h2>12,840</h2>

<div class="progress-bar">

<div class="progress calories"></div>

</div>







</div>

<div class="card">

<span class="icon">👟</span>

<h3>Steps</h3>

<h2>18,920</h2>

<div class="progress-bar">

<div class="progress steps"></div>

</div>

</div>




<div class="card">




<span class="icon">❤️</span>



<h3>Heart Rate</h3>





<h2>78 bpm</h2>

<div class="progress-bar">

<div class="progress heart"></div>

</div>






</div>


</section>


</div>


</body>



</html>
