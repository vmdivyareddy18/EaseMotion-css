<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS counter-reset — Timelines</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Timeline</h1>
    <div class="cr-timeline">
      <div class="cr-event">
        <span class="cr-date">2024 Q1</span>
        <p class="cr-desc">Project kickoff</p>
      </div>
      <div class="cr-event">
        <span class="cr-date">2024 Q2</span>
        <p class="cr-desc">Alpha release</p>
      </div>
      <div class="cr-event">
        <span class="cr-date">2024 Q3</span>
        <p class="cr-desc">Beta testing</p>
      </div>
      <div class="cr-event">
        <span class="cr-date">2024 Q4</span>
        <p class="cr-desc">Launch</p>
      </div>
    </div>
  </div>
</body>
</html>
