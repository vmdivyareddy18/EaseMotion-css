<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Progress Ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Upload Progress</h1>
    <div class="upload-list">
      <div class="upload-item">
        <svg class="progress-ring" viewBox="0 0 48 48" width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="20" fill="none" stroke-width="4" />
          <circle class="ring-fill" cx="24" cy="24" r="20" fill="none" stroke-width="4"
            stroke-dasharray="125.6" stroke-dashoffset="100.5" style="--progress:20" />
        </svg>
        <div class="upload-info">
          <div class="upload-name">project-assets.zip</div>
          <div class="upload-size">34 MB — 20%</div>
        </div>
        <span class="upload-status">Uploading</span>
      </div>
      <div class="upload-item">
        <svg class="progress-ring" viewBox="0 0 48 48" width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="20" fill="none" stroke-width="4" />
          <circle class="ring-fill" cx="24" cy="24" r="20" fill="none" stroke-width="4"
            stroke-dasharray="125.6" stroke-dashoffset="62.8" style="--progress:50" />
        </svg>
        <div class="upload-info">
          <div class="upload-name">hero-image.webp</div>
          <div class="upload-size">2.1 MB — 50%</div>
        </div>
        <span class="upload-status">Uploading</span>
      </div>
      <div class="upload-item complete">
        <svg class="progress-ring" viewBox="0 0 48 48" width="48" height="48">
          <circle class="ring-bg" cx="24" cy="24" r="20" fill="none" stroke-width="4" />
          <circle class="ring-fill" cx="24" cy="24" r="20" fill="none" stroke-width="4"
            stroke-dasharray="125.6" stroke-dashoffset="0" style="--progress:100" />
        </svg>
        <div class="upload-info">
          <div class="upload-name">style-guide.pdf</div>
          <div class="upload-size">1.4 MB — 100%</div>
        </div>
        <span class="upload-status done">&#10003; Done</span>
      </div>
    </div>
    <button class="simulate-btn" id="simBtn">Simulate Upload</button>
    <p class="description">Circular progress ring fills as upload progresses. JS updates via CSS custom property.</p>
  </div>

  <script>
    const simBtn = document.getElementById('simBtn');

    simBtn.addEventListener('click', () => {
      const items = document.querySelectorAll('.upload-item:not(.complete)');
      if (items.length === 0) return;
      const target = items[0];
      const ringFill = target.querySelector('.ring-fill');
      const sizeEl = target.querySelector('.upload-size');
      const statusEl = target.querySelector('.upload-status');
      const circumference = 125.6;
      let progress = parseInt(ringFill.getAttribute('style').match(/--progress:(\d+)/)[1]);

      const interval = setInterval(() => {
        progress += 2;
        if (progress > 100) {
          clearInterval(interval);
          progress = 100;
          target.classList.add('complete');
          statusEl.innerHTML = '&#10003; Done';
          statusEl.classList.add('done');
        }
        const offset = circumference - (progress / 100) * circumference;
        ringFill.setAttribute('stroke-dashoffset', offset);
        ringFill.setAttribute('style', '--progress:' + progress);
        sizeEl.textContent = sizeEl.textContent.replace(/\d+%/, progress + '%');
      }, 80);
    });
  </script>
</body>
</html>
