<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Floating Orbit Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <input type="checkbox" id="orbit-modal-toggle" class="modal-state-gate" hidden>

  <main class="interactive-layout">
    <div class="welcome-card">
      <div class="ambient-glow"></div>
      <h1>Interactive Systems</h1>
      <p>Launch the configuration interface to view immersive backdrop orbits.</p>
      
      <label for="orbit-modal-toggle" class="action-trigger" role="button" tabindex="0" onkeydown="if(event.key === ' ' || event.key === 'Enter') { this.click(); event.preventDefault(); }">
        Launch Control
      </label>
    </div>
  </main>

  <div class="modal-backdrop">
    
    <div class="orbit-universe">
      <div class="orbit-ring ring-primary">
        <div class="orbiting-node node-alpha"></div>
      </div>
      <div class="orbit-ring ring-secondary">
        <div class="orbiting-node node-beta"></div>
      </div>
    </div>

    <div class="modal-window" role="dialog" aria-modal="true" aria-labelledby="modal-headline">
      <div class="modal-header">
        <h2 id="modal-headline">System Diagnostics</h2>
        <label for="orbit-modal-toggle" class="close-icon-btn" aria-label="Close modal" tabindex="0" onkeydown="if(event.key === ' ' || event.key === 'Enter') { this.click(); event.preventDefault(); }">&times;</label>
      </div>
      
      <div class="modal-body">
        <p>The system is performing optimally. Ambient decorative orbits are handling spatial rotation mechanics across modern, accelerated rendering threads.</p>
        
        <div class="metrics-grid">
          <div class="metric-pill"><span>FPS</span><strong>60 Hz</strong></div>
          <div class="metric-pill"><span>JS Load</span><strong>0.0 ms</strong></div>
        </div>
      </div>

      <div class="modal-footer">
        <label for="orbit-modal-toggle" class="action-trigger dismiss-trigger" role="button" tabindex="0" onkeydown="if(event.key === ' ' || event.key === 'Enter') { this.click(); event.preventDefault(); }">
          Acknowledge
        </label>
      </div>
    </div>

  </div>

</body>
</html>
