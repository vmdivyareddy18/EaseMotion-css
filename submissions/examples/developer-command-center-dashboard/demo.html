<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Command Center Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="dev-dashboard">
    <header class="header">
      <div>
        <span class="badge">Developer Console</span>
        <h1>Command Center</h1>
      </div>
      <div class="streak-block">
        <span>Coding Streak: </span>
        <span class="value">28 Days 🔥</span>
      </div>
    </header>

    <div class="grid">
      <div class="card">
        <h3>GitHub Commits</h3>
        <h2>142 Commits</h2>
        <p>This week</p>
      </div>

      <div class="card">
        <h3>Active Branches</h3>
        <h2>4 Branches</h2>
        <p>Awaiting review</p>
      </div>
    </div>
  </main>
</body>
</html>
