<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu Accordion Sidebar — EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" style="--sidebar-bg: #1a1a2e; --menu-item-bg: #262640; --expand-duration: 0.3s; --active-color: #7c5cfc;">
    <nav class="sidebar">
      <div class="brand">EaseMotion</div>
      <ul class="menu">
        <li><button class="menu-item" data-target="dashboard">📊 Dashboard</button></li>
        <li>
          <button class="menu-item has-sub" data-target="projects">📁 Projects <span class="chevron">▶</span></button>
          <ul class="submenu" id="sub-projects">
            <li><button class="menu-item sub" data-target="active">Active</button></li>
            <li><button class="menu-item sub" data-target="archived">Archived</button></li>
            <li><button class="menu-item sub" data-target="templates">Templates</button></li>
          </ul>
        </li>
        <li>
          <button class="menu-item has-sub" data-target="team">👥 Team <span class="chevron">▶</span></button>
          <ul class="submenu" id="sub-team">
            <li><button class="menu-item sub" data-target="members">Members</button></li>
            <li><button class="menu-item sub" data-target="roles">Roles</button></li>
          </ul>
        </li>
        <li><button class="menu-item" data-target="settings">⚙️ Settings</button></li>
      </ul>
    </nav>
  </div>
  <script>
    document.querySelectorAll('.has-sub').forEach(btn => {
      btn.addEventListener('click', () => {
        const sub = document.getElementById('sub-' + btn.dataset.target);
        const chevron = btn.querySelector('.chevron');
        const isOpen = sub.classList.contains('open');
        sub.classList.toggle('open');
        chevron.textContent = isOpen ? '▶' : '▼';
      });
    });
    document.querySelectorAll('.menu-item:not(.has-sub)').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.menu-item').forEach(x => x.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
