<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-attention-wiggle Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wiggle-trigger-card">
    <span class="alert-badge ease-attention-wiggle" style="--ease-wiggle-amount: 6px; --ease-wiggle-speed: 0.7s;">
      New Feature
    </span>
    <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem;">Interactive Dashboard</h3>
    <p style="margin: 0; color: #94a3b8; font-size: 0.85rem; line-height: 1.5;">Notice how the slower horizontal wiggle pulls your focus playfully without feeling aggressive.</p>
  </div>

  <p style="color: #4b5563; margin-top: 2rem; font-size: 0.9rem;">Refreshes the layout cycle on page loading vectors.</p>

</body>
</html>
