<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gauge Meter – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gauge-wrapper">
    <div class="gauge" role="meter" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
      <div class="gauge-track"></div>
      <div class="gauge-fill"></div>
      <div class="needle"></div>
      <span class="gauge-value">50</span>
    </div>
    <span class="gauge-title">Gauge Meter</span>
  </div>
</body>
</html>
