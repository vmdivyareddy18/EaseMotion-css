<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Group Select</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Button Group Select</h1>
  <div class="btn-group" role="group" aria-label="View options">
    <button class="btn-group__item btn-group__item--active" data-value="day">Day</button>
    <button class="btn-group__item" data-value="week">Week</button>
    <button class="btn-group__item" data-value="month">Month</button>
    <button class="btn-group__item" data-value="year">Year</button>
  </div>
  <p class="selected-label">Selected: <span id="selected-value">Day</span></p>

  <script>
    const group = document.querySelector('.btn-group');
    group.addEventListener('click', (e) => {
      const btn = e.target.closest('.btn-group__item');
      if (!btn) return;
      group.querySelectorAll('.btn-group__item').forEach(b => b.classList.remove('btn-group__item--active'));
      btn.classList.add('btn-group__item--active');
      document.getElementById('selected-value').textContent = btn.textContent;
    });
  </script>
</body>
</html>
