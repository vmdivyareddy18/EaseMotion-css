<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Group Stack Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo presentation layout */
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    .demo-label {
      color: #94a3b8;
      font-size: 0.875rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <span class="demo-label">Active Project Contributors</span>

  <div class="ease-avatar-group" aria-label="Current team contributors" role="group">
    
    <div class="ease-avatar-item" tabindex="0">
      <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100&h=100&fit=crop" alt="Alice Vance">
    </div>
    
    <div class="ease-avatar-item" tabindex="0">
      <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=100&h=100&fit=crop" alt="Marcus Chen">
    </div>
    
    <div class="ease-avatar-item" tabindex="0">
      <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=100&h=100&fit=crop" alt="Sarah Jenkins">
    </div>
    
    <div class="ease-avatar-item" tabindex="0">
      <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=100&h=100&fit=crop" alt="David Kim">
    </div>
    
    <div class="ease-avatar-item ease-avatar-more" tabindex="0" aria-label="And 12 more contributors">
      <span>+12</span>
    </div>

  </div>

</body>
</html>
