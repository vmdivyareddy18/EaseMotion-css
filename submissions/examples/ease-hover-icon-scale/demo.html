<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Scale on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Icon Scale on Hover</h1>
  <p class="subtitle">Icon inside a button scales up on button hover — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the button — the icon scales up</p>
    <button class="icon-btn"><span class="ib-icon">✦</span><span class="ib-text">Explore</span></button>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>The icon receives <code>scale(1.3)</code> on button hover via <code>transition: transform</code>, creating a scaling effect.</p>
  </section>
</body>
</html>
