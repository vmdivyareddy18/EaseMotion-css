<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feature Tour with Wave Animation</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="tour-container">
        <h1 class="tour-title">Feature Tour</h1>
        <p class="tour-subtitle">Hover over items to see the wave animation</p>

        <div class="tour-items">
            <!-- Tour Item 1 -->
            <div class="tour-item">
                <div class="tour-number">1</div>
                <h3 class="tour-heading">Discover</h3>
                <p class="tour-text">Explore new features with smooth animations</p>
                <div class="tour-wave"></div>
            </div>

            <!-- Tour Item 2 -->
            <div class="tour-item">
                <div class="tour-number">2</div>
                <h3 class="tour-heading">Interact</h3>
                <p class="tour-text">Wave animation guides user attention</p>
                <div class="tour-wave"></div>
            </div>

            <!-- Tour Item 3 -->
            <div class="tour-item">
                <div class="tour-number">3</div>
                <h3 class="tour-heading">Engage</h3>
                <p class="tour-text">Beautiful motion improves user experience</p>
                <div class="tour-wave"></div>
            </div>

            <!-- Tour Item 4 -->
            <div class="tour-item">
                <div class="tour-number">4</div>
                <h3 class="tour-heading">Succeed</h3>
                <p class="tour-text">Complete your feature tour journey</p>
                <div class="tour-wave"></div>
            </div>
        </div>
    </div>
</body>

</html>
