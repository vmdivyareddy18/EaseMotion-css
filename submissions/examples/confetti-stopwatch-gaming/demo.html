<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Stopwatch – Gaming UI Demo</title>
  <!-- Link to core EaseMotion variables, utility styles and animations -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden Radio Toggles for State Control (Pure CSS State Machine) -->
  <input type="radio" name="stopwatch-state" id="stopwatch-reset" class="ease-stopwatch-state-input" checked>
  <input type="radio" name="stopwatch-state" id="stopwatch-start" class="ease-stopwatch-state-input">
  <input type="radio" name="stopwatch-state" id="stopwatch-pause" class="ease-stopwatch-state-input">
  <input type="radio" name="stopwatch-state" id="stopwatch-victory" class="ease-stopwatch-state-input">

  <!-- Interactive Dashboard Overlay Wrapper -->
  <div class="ease-stopwatch-container">
    
    <!-- Stopwatch Gaming UI Card -->
    <main class="ease-stopwatch-card">
      
      <!-- Top info bar -->
      <div class="ease-stopwatch-header">
        <span class="ease-game-title">SPEEDRUN MODE</span>
        
        <!-- Reactive status indicator badges -->
        <div class="ease-status-badge ease-status-idle" aria-label="Status: Idle">
          <span class="ease-status-dot"></span> IDLE
        </div>
        <div class="ease-status-badge ease-status-running" aria-label="Status: Running">
          <span class="ease-status-dot"></span> RUNNING
        </div>
        <div class="ease-status-badge ease-status-paused" aria-label="Status: Paused">
          <span class="ease-status-dot"></span> PAUSED
        </div>
        <div class="ease-status-badge ease-status-victory" aria-label="Status: Completed">
          <span class="ease-status-dot"></span> COMPLETED
        </div>
      </div>

      <!-- Main Stopwatch Digital Display -->
      <section class="ease-stopwatch-display" aria-label="Timer Display">
        
        <!-- Minutes block -->
        <div class="ease-time-block" aria-label="Minutes">
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-6 ease-stopwatch-min-tens">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          </div>
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-10 ease-stopwatch-min-units">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
          </div>
        </div>

        <div class="ease-time-divider" aria-hidden="true">:</div>

        <!-- Seconds block -->
        <div class="ease-time-block" aria-label="Seconds">
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-6 ease-stopwatch-sec-tens">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
          </div>
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-10 ease-stopwatch-sec-units">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
          </div>
        </div>

        <div class="ease-time-divider" aria-hidden="true">.</div>

        <!-- Centiseconds block (Subseconds) -->
        <div class="ease-time-block ease-time-centiseconds" aria-label="Centiseconds">
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-10 ease-stopwatch-tenths">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
          </div>
          <div class="ease-stopwatch-digit-strip ease-stopwatch-strip-10 ease-stopwatch-hundredths">
            <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
          </div>
        </div>

        <!-- CSS Confetti Explosion Particles (Triggers on Victory) -->
        <div class="ease-confetti-container" aria-hidden="true">
          <!-- 40 particles scattered via custom physics values -->
          <div class="ease-confetti-particle" style="--tx: -120px; --ty: -280px; --rot: 720deg;  --delay: 0.05s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: 130px;  --ty: -240px; --rot: -540deg; --delay: 0.12s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: -50px;  --ty: -310px; --rot: 480deg;  --delay: 0.02s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: 80px;   --ty: -290px; --rot: -360deg; --delay: 0.08s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: -180px; --ty: -180px; --rot: 600deg;  --delay: 0.15s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: 190px;  --ty: -190px; --rot: -720deg; --delay: 0.22s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: -90px;  --ty: -260px; --rot: 300deg;  --delay: 0.18s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: 60px;   --ty: -270px; --rot: -450deg; --delay: 0.04s; --color: var(--ease-stopwatch-confetti-4);"></div>
          
          <div class="ease-confetti-particle" style="--tx: -140px; --ty: -210px; --rot: -640deg; --delay: 0.28s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: 150px;  --ty: -220px; --rot: 520deg;  --delay: 0.25s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: -30px;  --ty: -330px; --rot: -400deg; --delay: 0.32s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: 40px;   --ty: -320px; --rot: 320deg;  --delay: 0.30s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: -200px; --ty: -150px; --rot: 580deg;  --delay: 0.38s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: 210px;  --ty: -140px; --rot: -620deg; --delay: 0.35s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: -100px; --ty: -230px; --rot: -480deg; --delay: 0.42s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: 110px;  --ty: -250px; --rot: 360deg;  --delay: 0.45s; --color: var(--ease-stopwatch-confetti-2);"></div>

          <div class="ease-confetti-particle" style="--tx: -160px; --ty: -250px; --rot: 720deg;  --delay: 0.08s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: 140px;  --ty: -270px; --rot: -540deg; --delay: 0.18s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: -70px;  --ty: -290px; --rot: 480deg;  --delay: 0.12s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: 90px;   --ty: -300px; --rot: -360deg; --delay: 0.06s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: -110px; --ty: -190px; --rot: 600deg;  --delay: 0.22s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: 120px;  --ty: -200px; --rot: -720deg; --delay: 0.15s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: -80px;  --ty: -240px; --rot: 300deg;  --delay: 0.26s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: 70px;   --ty: -260px; --rot: -450deg; --delay: 0.20s; --color: var(--ease-stopwatch-confetti-2);"></div>
          
          <div class="ease-confetti-particle" style="--tx: -130px; --ty: -200px; --rot: -640deg; --delay: 0.35s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: 160px;  --ty: -230px; --rot: 520deg;  --delay: 0.32s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: -40px;  --ty: -300px; --rot: -400deg; --delay: 0.40s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: 50px;   --ty: -310px; --rot: 320deg;  --delay: 0.38s; --color: var(--ease-stopwatch-confetti-3);"></div>
          <div class="ease-confetti-particle" style="--tx: -170px; --ty: -170px; --rot: 580deg;  --delay: 0.45s; --color: var(--ease-stopwatch-confetti-1);"></div>
          <div class="ease-confetti-particle" style="--tx: 180px;  --ty: -180px; --rot: -620deg; --delay: 0.42s; --color: var(--ease-stopwatch-confetti-4);"></div>
          <div class="ease-confetti-particle" style="--tx: -120px; --ty: -210px; --rot: -480deg; --delay: 0.48s; --color: var(--ease-stopwatch-confetti-2);"></div>
          <div class="ease-confetti-particle" style="--tx: 100px;  --ty: -220px; --rot: 360deg;  --delay: 0.50s; --color: var(--ease-stopwatch-confetti-3);"></div>
        </div>

      </section>

      <!-- Victory Banner message panel -->
      <div class="ease-victory-banner" aria-live="polite">
        <span class="ease-banner-heading">STAGE CLEARED</span>
        <span class="ease-banner-sub">NEW SPEEDRUN RECORD RECORDED</span>
      </div>

      <!-- Controls Panel Buttons -->
      <nav class="ease-stopwatch-controls" aria-label="Stopwatch Timer Controls">
        <!-- START Button label (Checked: #stopwatch-start) -->
        <label for="stopwatch-start" class="ease-control-label ease-btn-start" role="button" tabindex="0" aria-label="Start stopwatch" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('stopwatch-start').click();}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 16px; height: 16px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z" />
          </svg>
          Start
        </label>

        <!-- PAUSE Button label (Checked: #stopwatch-pause) -->
        <label for="stopwatch-pause" class="ease-control-label ease-btn-pause" role="button" tabindex="0" aria-label="Pause stopwatch" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('stopwatch-pause').click();}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 16px; height: 16px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" />
          </svg>
          Pause
        </label>

        <!-- RESET Button label (Checked: #stopwatch-reset) -->
        <label for="stopwatch-reset" class="ease-control-label ease-btn-reset" role="button" tabindex="0" aria-label="Reset stopwatch" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('stopwatch-reset').click();}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 16px; height: 16px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
          </svg>
          Reset
        </label>

        <!-- CLAIM VICTORY / FINISH button label (Checked: #stopwatch-victory) -->
        <label for="stopwatch-victory" class="ease-control-label ease-btn-victory" role="button" tabindex="0" aria-label="Finish and claim victory" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault(); document.getElementById('stopwatch-victory').click();}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 16px; height: 16px;">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 18.75h-9m9 0a3 3 0 0 1 3-3V12m-12 6.75a3 3 0 0 0-3-3V12m18 0v-1.5L21 9.75V9m-18 3V10.5L3 9.75V9m18 0a3 3 0 0 0-3-3v-1.5m-12 4.5a3 3 0 0 1-3-3v-1.5m15 1.5H6m12 0v-3a3 3 0 0 0-3-3H9a3 3 0 0 0-3 3v3m12 0v3m-12-3v3m12 3v3.75a.75.75 0 0 1-.75.75H6.75a.75.75 0 0 1-.75-.75V15m12 0v1.5m-12-1.5v1.5" />
          </svg>
          Claim Victory!
        </label>
      </nav>

    </main>
  </div>

</body>
</html>
