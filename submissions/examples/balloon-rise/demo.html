<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balloon Rise & Sway - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-balloon-container">
    
    <!-- Floating Balloons -->
    <!-- Balloon 1 (Red) -->
    <div class="ease-balloon-rise" style="left: 15%; animation-duration: 8s;">
      <svg class="balloon-svg" viewBox="0 0 60 80">
        <ellipse cx="30" cy="35" rx="25" ry="30" fill="#ef4444" />
        <polygon points="30,65 26,72 34,72" fill="#ef4444" />
        <path d="M30,72 Q25,82 35,90" stroke="#94a3b8" stroke-width="1.5" fill="none" />
      </svg>
    </div>

    <!-- Balloon 2 (Blue) -->
    <div class="ease-balloon-rise" style="left: 45%; animation-duration: 9.5s; animation-delay: -3s;">
      <svg class="balloon-svg" viewBox="0 0 60 80">
        <ellipse cx="30" cy="35" rx="25" ry="30" fill="#3b82f6" />
        <polygon points="30,65 26,72 34,72" fill="#3b82f6" />
        <path d="M30,72 Q35,82 25,90" stroke="#94a3b8" stroke-width="1.5" fill="none" />
      </svg>
    </div>

    <!-- Balloon 3 (Yellow) -->
    <div class="ease-balloon-rise" style="left: 75%; animation-duration: 7s; animation-delay: -5s;">
      <svg class="balloon-svg" viewBox="0 0 60 80">
        <ellipse cx="30" cy="35" rx="25" ry="30" fill="#eab308" />
        <polygon points="30,65 26,72 34,72" fill="#eab308" />
        <path d="M30,72 Q28,80 32,88" stroke="#94a3b8" stroke-width="1.5" fill="none" />
      </svg>
    </div>

    <!-- Intro Card -->
    <div class="intro-card">
      <h2 style="margin: 0 0 var(--ease-space-2) 0; font-weight: 800; background: linear-gradient(135deg, var(--ease-color-primary), var(--ease-color-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Balloon Rise & Sway</h2>
      <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
        Slow, dreamy lighter-than-air float dynamics combining Translate3d rises and rotate swaying oscillations.
      </p>
    </div>

  </div>

</body>
</html>
