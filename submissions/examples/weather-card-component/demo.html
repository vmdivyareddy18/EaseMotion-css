<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Animated Weather Card Component — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="ease-weather-demo">
    <header>
      <h1>Animated Weather Card Component</h1>
      <p class="lead">A responsive, CSS-only weather dashboard with animated icons and a clean modern card design.</p>
    </header>

    <section class="ease-weather-grid">
      <article class="ease-weather-card">
        <div class="ease-weather-icon sunny" aria-hidden="true"><span>☀️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">31°C</p>
          <p class="ease-weather-condition">Sunny</p>
        </div>
        <p class="ease-weather-location">Los Angeles</p>
      </article>

      <article class="ease-weather-card">
        <div class="ease-weather-icon cloudy" aria-hidden="true"><span>☁️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">22°C</p>
          <p class="ease-weather-condition">Cloudy</p>
        </div>
        <p class="ease-weather-location">Seattle</p>
      </article>

      <article class="ease-weather-card">
        <div class="ease-weather-icon rainy" aria-hidden="true"><span>🌧️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">18°C</p>
          <p class="ease-weather-condition">Rainy</p>
        </div>
        <p class="ease-weather-location">London</p>
      </article>

      <article class="ease-weather-card">
        <div class="ease-weather-icon snowy" aria-hidden="true"><span>❄️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">-4°C</p>
          <p class="ease-weather-condition">Snowy</p>
        </div>
        <p class="ease-weather-location">Reykjavík</p>
      </article>

      <article class="ease-weather-card">
        <div class="ease-weather-icon stormy" aria-hidden="true"><span>⛈️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">24°C</p>
          <p class="ease-weather-condition">Stormy</p>
        </div>
        <p class="ease-weather-location">Miami</p>
      </article>

      <article class="ease-weather-card">
        <div class="ease-weather-icon windy" aria-hidden="true"><span>🌬️</span></div>
        <div class="ease-weather-meta">
          <p class="ease-weather-temp">15°C</p>
          <p class="ease-weather-condition">Windy</p>
        </div>
        <p class="ease-weather-location">Chicago</p>
      </article>
    </section>
  </main>
</body>
</html>
