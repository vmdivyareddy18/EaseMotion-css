<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shake Border Entrance Demo</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <main class="demo-shell">
            <section class="demo-panel" aria-labelledby="demo-title">
                <p class="eyebrow">EaseMotion CSS submission</p>
                <h1 id="demo-title">Shake Border Entrance</h1>
                <p class="demo-copy">
                    A lightweight entrance animation that gives a bordered panel a quick,
                    directional shake before settling into place.
                </p>

                <div class="preview-stack" aria-label="Animation examples">
                    <article class="shake-border-card">
                        <span class="status-dot" aria-hidden="true"></span>
                        <h2>Security Notice</h2>
                        <p>Use this for validation states, warning cards, or onboarding highlights.</p>
                    </article>

                    <button class="shake-border-button" type="button">
                        Review changes
                    </button>
                </div>
            </section>
        </main>
    </body>
</html>
