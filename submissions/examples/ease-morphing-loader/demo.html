<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphing Loader Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Morphing Loader</h1>
        <p class="subtitle">Loader that changes shapes (circle→square→triangle)</p>

        <!-- MORPHING LOADER COMPONENT -->
        <div class="loader-container">
            <div class="loader-wrapper">
                <div class="loader-display">
                    <div class="morphing-loader" id="morphingLoader">
                        <div class="morph-shape" id="morphShape"></div>
                        <div class="morph-particles" id="morphParticles"></div>
                    </div>
                    <div class="loader-label" id="loaderLabel">Loading...</div>
                    <div class="loader-sub" id="loaderSub">Circle</div>
                </div>

                <!-- Controls -->
                <div class="loader-controls">
                    <div class="control-group">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1" />
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="control-group">
                        <label for="colorPicker">Color:</label>
                        <input type="color" id="colorPicker" value="#4facfe" />
                    </div>
                    <div class="control-group">
                        <label for="sizeSlider">Size:</label>
                        <input type="range" id="sizeSlider" min="40" max="100" step="5" value="60" />
                        <span id="sizeValue">60px</span>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="particlesToggle" checked />
                            Particles
                        </label>
                    </div>
                </div>

                <div class="loader-actions">
                    <button class="loader-ctrl-btn" id="toggleBtn">⏸ Pause</button>
                    <button class="loader-ctrl-btn" id="resetBtn">⟳ Reset</button>
                    <button class="loader-ctrl-btn" id="randomColorBtn">🎲 Random</button>
                    <button class="loader-ctrl-btn" id="shapeCycleBtn">🔄 Cycle Shapes</button>
                </div>

                <div class="loader-status">
                    <span class="status-label">Shape:</span>
                    <span class="status-value" id="shapeDisplay">Circle</span>
                    <span class="status-label">State:</span>
                    <span class="status-value" id="stateDisplay">Running</span>
                    <span class="status-label">Progress:</span>
                    <span class="status-value" id="progressDisplay">0%</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: #4facfe;"></div>
                    </div>
                    <span class="variant-label">Blue</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: #34c759;"></div>
                    </div>
                    <span class="variant-label">Green</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: #ff3b30;"></div>
                    </div>
                    <span class="variant-label">Red</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: linear-gradient(135deg, #f093fb, #f5576c);"></div>
                    </div>
                    <span class="variant-label">Gradient</span>
                </div>
                <div class="variant-card" id="variant5">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: #f9d976; border-radius: 50%;"></div>
                    </div>
                    <span class="variant-label">Gold</span>
                </div>
                <div class="variant-card" id="variant6">
                    <div class="variant-loader">
                        <div class="morph-shape" style="background: #6c5ce7;"></div>
                    </div>
                    <span class="variant-label">Purple</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const shape = document.getElementById('morphShape');
            const particles = document.getElementById('morphParticles');
            const loaderLabel = document.getElementById('loaderLabel');
            const loaderSub = document.getElementById('loaderSub');
            const shapeDisplay = document.getElementById('shapeDisplay');
            const stateDisplay = document.getElementById('stateDisplay');
            const progressDisplay = document.getElementById('progressDisplay');
            const speedSlider = document.getElementById('speedSlider');
            const colorPicker = document.getElementById('colorPicker');
            const sizeSlider = document.getElementById('sizeSlider');
            const speedValue = document.getElementById('speedValue');
            const sizeValue = document.getElementById('sizeValue');
            const particlesToggle = document.getElementById('particlesToggle');
            const toggleBtn = document.getElementById('toggleBtn');
            const resetBtn = document.getElementById('resetBtn');
            const randomColorBtn = document.getElementById('randomColorBtn');
            const shapeCycleBtn = document.getElementById('shapeCycleBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                shapes: ['circle', 'square', 'triangle', 'diamond', 'star', 'hexagon'],
                duration: 3000, // ms per shape
                color: '#4facfe',
                size: 60,
                speed: 1,
                particles: true,
                onShapeChange: function(shape) {
                    console.log(`🔄 Shape changed to: ${shape}`);
                },
                onCycleComplete: function() {
                    console.log('🔄 Full cycle complete');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentShapeIndex = 0;
            let isPaused = false;
            let progress = 0;
            let animationId = null;
            let startTime = 0;
            let particleSystem = [];
            let isParticleEnabled = CONFIG.particles;

            // ============================================
            // SHAPE FUNCTIONS
            // ============================================
            function getShapePath(shape, size) {
                const s = size / 2;
                const c = size / 2;
                const paths = {
                    circle: `M${c},${c - s} A${s},${s} 0 1,1 ${c},${c + s} A${s},${s} 0 1,1 ${c},${c - s} Z`,
                    square: `M${c - s},${c - s} L${c + s},${c - s} L${c + s},${c + s} L${c - s},${c + s} Z`,
                    triangle: `M${c},${c - s} L${c + s},${c + s} L${c - s},${c + s} Z`,
                    diamond: `M${c},${c - s} L${c + s},${c} L${c},${c + s} L${c - s},${c} Z`,
                    star: function() {
                        const points = 5;
                        const outer = s;
                        const inner = s * 0.4;
                        let path = '';
                        for (let i = 0; i < points * 2; i++) {
                            const radius = i % 2 === 0 ? outer : inner;
                            const angle = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
                            const x = c + Math.cos(angle) * radius;
                            const y = c + Math.sin(angle) * radius;
                            path += (i === 0 ? 'M' : 'L') + x + ',' + y;
                        }
                        return path + 'Z';
                    },
                    hexagon: function() {
                        const points = 6;
                        let path = '';
                        for (let i = 0; i < points; i++) {
                            const angle = (i / points) * Math.PI * 2 - Math.PI / 2;
                            const x = c + Math.cos(angle) * s;
                            const y = c + Math.sin(angle) * s;
                            path += (i === 0 ? 'M' : 'L') + x + ',' + y;
                        }
                        return path + 'Z';
                    }
                };

                if (typeof paths[shape] === 'function') {
                    return paths[shape]();
                }
                return paths[shape] || paths.circle;
            }

            function getShapeName(shape) {
                return shape.charAt(0).toUpperCase() + shape.slice(1);
            }

            function getNextShape(index) {
                return CONFIG.shapes[(index + 1) % CONFIG.shapes.length];
            }

            // ============================================
            // MORPHING ENGINE
            // ============================================
            function updateShape(progress) {
                const currentShapeName = CONFIG.shapes[currentShapeIndex];
                const nextShapeName = getNextShape(currentShapeIndex);
                const size = parseInt(sizeSlider.value);
                const color = colorPicker.value;

                // Interpolate between shapes
                const currentPath = getShapePath(currentShapeName, size);
                const nextPath = getShapePath(nextShapeName, size);

                // Update shape with morphing
                const morphProgress = progress;
                const isComplete = morphProgress >= 1;

                if (isComplete) {
                    // Move to next shape
                    currentShapeIndex = (currentShapeIndex + 1) % CONFIG.shapes.length;
                    const newShapeName = CONFIG.shapes[currentShapeIndex];
                    const newPath = getShapePath(newShapeName, size);
                    shape.style.d = newPath;
                    shape.style.fill = color;
                    loaderSub.textContent = getShapeName(newShapeName);
                    shapeDisplay.textContent = getShapeName(newShapeName);
                    CONFIG.onShapeChange(newShapeName);

                    if (currentShapeIndex === 0) {
                        CONFIG.onCycleComplete();
                    }
                } else {
                    // Morph between shapes using path interpolation
                    // For simplicity, we use the current shape path
                    // In a real implementation, you'd interpolate between path points
                    // For this demo, we use a simplified approach with the current shape
                    // and a smooth transition effect

                    // Apply morphing through CSS transitions
                    shape.style.d = currentPath;
                    shape.style.fill = color;
                    shape.style.transition = `d ${CONFIG.duration / 1000 * (1 - progress) * 0.5}s ease-in-out`;

                    // Update progress display
                    progressDisplay.textContent = Math.round(morphProgress * 100) + '%';
                }

                // Update size
                shape.style.width = size + 'px';
                shape.style.height = size + 'px';

                // Update loader text
                loaderLabel.textContent = isComplete ? 'Loading...' : 'Morphing...';
            }

            // ============================================
            // PARTICLES SYSTEM
            // ============================================
            class Particle {
                constructor(x, y) {
                    this.x = x || 0;
                    this.y = y || 0;
                    this.size = 2 + Math.random() * 4;
                    this.speedX = (Math.random() - 0.5) * 2;
                    this.speedY = (Math.random() - 0.5) * 2;
                    this.opacity = 0.3 + Math.random() * 0.7;
                    this.life = 1;
                    this.decay = 0.005 + Math.random() * 0.01;
                    this.angle = Math.random() * Math.PI * 2;
                    this.distance = 20 + Math.random() * 40;
                }

                update(centerX, centerY) {
                    this.angle += 0.02;
                    this.x = centerX + Math.cos(this.angle) * this.distance;
                    this.y = centerY + Math.sin(this.angle) * this.distance;
                    this.life -= this.decay;
                    this.opacity = Math.max(0, this.life * 0.8);
                }

                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = colorPicker.value + Math.floor(this.opacity * 200).toString(16).padStart(2, '0');
                    ctx.fill();
                }
            }

            function initParticles() {
                particleSystem = [];
                for (let i = 0; i < 20; i++) {
                    particleSystem.push(new Particle());
                }
            }

            function updateParticles(ctx, centerX, centerY) {
                if (!isParticleEnabled) return;

                particleSystem.forEach(p => {
                    p.update(centerX, centerY);
                    p.draw(ctx);
                });
            }

            // ============================================
            // MAIN ANIMATION LOOP
            // ============================================
            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const elapsed = (timestamp - startTime) / (CONFIG.duration / CONFIG.speed);
                progress = Math.min(elapsed, 1);

                // Update shape
                updateShape(progress);

                // Update state
                stateDisplay.textContent = isPaused ? 'Paused' : 'Running';
                stateDisplay.style.color = isPaused ? '#f59e0b' : '#34c759';

                if (!isPaused) {
                    if (progress >= 1) {
                        startTime = timestamp;
                        progress = 0;
                    }
                }

                // Draw particles on a canvas overlay
                const loaderRect = document.getElementById('morphingLoader').getBoundingClientRect();
                // For particles, we use a canvas overlay approach
                // but since we're using DOM elements, we'll use a simplified particle system
                // with CSS animations or skip for now to keep it clean

                animationId = requestAnimationFrame(animate);
            }

            // ============================================
            // SIMPLIFIED MORPHING (CSS-based)
            // ============================================
            function morphShape(shapeName) {
                const size = parseInt(sizeSlider.value);
                const color = colorPicker.value;
                const path = getShapePath(shapeName, size);
                shape.style.d = path;
                shape.style.fill = color;
                loaderSub.textContent = getShapeName(shapeName);
                shapeDisplay.textContent = getShapeName(shapeName);
            }

            function cycleToNextShape() {
                currentShapeIndex = (currentShapeIndex + 1) % CONFIG.shapes.length;
                const shapeName = CONFIG.shapes[currentShapeIndex];
                morphShape(shapeName);
                CONFIG.onShapeChange(shapeName);
            }

            // ============================================
            // CONTROLS
            // ============================================
            function togglePause() {
                isPaused = !isPaused;
                toggleBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
                if (!isPaused) {
                    startTime = 0;
                }
            }

            function resetLoader() {
                currentShapeIndex = 0;
                const shapeName = CONFIG.shapes[0];
                morphShape(shapeName);
                progress = 0;
                progressDisplay.textContent = '0%';
                startTime = 0;
                if (isPaused) {
                    togglePause();
                }
                loaderLabel.textContent = 'Loading...';
            }

            function randomizeColor() {
                const colors = ['#4facfe', '#34c759', '#ff3b30', '#f59e0b', '#6c5ce7', '#fd79a8', '#00d2d3', '#ff9f43', '#a29bfe', '#55efc4'];
                const random = colors[Math.floor(Math.random() * colors.length)];
                colorPicker.value = random;
                CONFIG.color = random;
                // Update current shape
                const shapeName = CONFIG.shapes[currentShapeIndex];
                morphShape(shapeName);
            }

            function updateSize() {
                const size = parseInt(sizeSlider.value);
                sizeValue.textContent = size + 'px';
                CONFIG.size = size;
                const shapeName = CONFIG.shapes[currentShapeIndex];
                morphShape(shapeName);
            }

            function updateSpeed() {
                const speed = parseFloat(speedSlider.value);
                speedValue.textContent = speed.toFixed(1) + 'x';
                CONFIG.speed = speed;
                CONFIG.duration = 3000 / speed;
            }

            function toggleParticles() {
                isParticleEnabled = particlesToggle.checked;
                CONFIG.particles = isParticleEnabled;
                if (isParticleEnabled) {
                    initParticles();
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            speedSlider.addEventListener('input', updateSpeed);
            colorPicker.addEventListener('input', function() {
                CONFIG.color = this.value;
                const shapeName = CONFIG.shapes[currentShapeIndex];
                morphShape(shapeName);
            });
            sizeSlider.addEventListener('input', updateSize);
            particlesToggle.addEventListener('change', toggleParticles);

            toggleBtn.addEventListener('click', togglePause);
            resetBtn.addEventListener('click', resetLoader);
            randomColorBtn.addEventListener('click', randomizeColor);
            shapeCycleBtn.addEventListener('click', cycleToNextShape);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    togglePause();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetLoader();
                }
                if (e.key === 'c' || e.key === 'C') {
                    cycleToNextShape();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const loader = card.querySelector('.variant-loader');
                const shapeEl = loader.querySelector('.morph-shape');
                
                card.addEventListener('click', function() {
                    const color = shapeEl.style.background || '#4facfe';
                    colorPicker.value = color;
                    CONFIG.color = color;
                    const shapeName = CONFIG.shapes[currentShapeIndex];
                    morphShape(shapeName);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.MorphingLoader = {
                toggle: togglePause,
                reset: resetLoader,
                cycleShape: cycleToNextShape,
                setShape: (shape) => {
                    const index = CONFIG.shapes.indexOf(shape);
                    if (index !== -1) {
                        currentShapeIndex = index;
                        morphShape(shape);
                    }
                },
                setColor: (color) => {
                    colorPicker.value = color;
                    CONFIG.color = color;
                    const shapeName = CONFIG.shapes[currentShapeIndex];
                    morphShape(shapeName);
                },
                setSpeed: (speed) => {
                    speedSlider.value = speed;
                    updateSpeed();
                },
                setSize: (size) => {
                    sizeSlider.value = size;
                    updateSize();
                },
                isPaused: () => isPaused,
                getState: () => ({
                    shape: CONFIG.shapes[currentShapeIndex],
                    color: CONFIG.color,
                    speed: CONFIG.speed,
                    size: CONFIG.size,
                    paused: isPaused,
                    progress: progress
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        colorPicker.value = config.color;
                    }
                    if (config.shapes) {
                        // Keep current shape index valid
                        if (currentShapeIndex >= config.shapes.length) {
                            currentShapeIndex = 0;
                        }
                    }
                    resetLoader();
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            const initialShape = CONFIG.shapes[0];
            morphShape(initialShape);
            updateSize();
            updateSpeed();
            initParticles();
            stateDisplay.textContent = 'Running';
            stateDisplay.style.color = '#34c759';

            console.log('✅ Morphing Loader initialized!');
            console.log('📖 API: window.MorphingLoader');
            console.log('📖 Usage:');
            console.log('  - Loader morphs between shapes: circle → square → triangle → ...');
            console.log('  - Keyboard shortcuts: Space (pause), R (reset), C (cycle shapes)');
            console.log('  - Adjust speed, color, and size');

        })();
    </script>
</body>
</html>
