<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semantic Badge Variants — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 5rem 1rem; margin: 0;">

  <div class="ease-badge-showcase">
    
    <div style="margin-bottom: 1.75rem;">
      <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.25rem;">Semantic Component Feed</h3>
      <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Verify rendering metrics, color weights, and character clarity across new semantic layouts.</p>
    </div>

    <div class="ease-badge-grid">
      
      <div class="ease-badge-item-row">
        <span style="font-size: 0.9rem; font-weight: 500; color: #334155;">Documentation Link</span>
        <span class="ease-badge ease-badge-info">Optional Guide</span>
      </div>

      <div class="ease-badge-item-row">
        <span style="font-size: 0.9rem; font-weight: 500; color: #334155;">API Rate Boundary</span>
        <span class="ease-badge ease-badge-warning">82% Exhausted</span>
      </div>

    </div>

  </div>

</body>
</html>
