<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Statistics Demo</title>

    <!-- Replace with the official EaseMotion CSS stylesheet if needed -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">

<h1 class="ease-fade-in">
Dashboard Overview
</h1>

<div class="cards">

<div class="card ease-slide-up">
<h2>👥 Users</h2>
<h3>12,548</h3>
<p>Active Users</p>
</div>

<div class="card ease-slide-up">
<h2>💰 Revenue</h2>
<h3>$84,350</h3>
<p>This Month</p>
</div>

<div class="card ease-slide-up">
<h2>📦 Orders</h2>
<h3>1,254</h3>
<p>Completed Orders</p>
</div>

<div class="card ease-slide-up">
<h2>🛍 Products</h2>
<h3>582</h3>
<p>Available Products</p>
</div>

</div>

</section>

</body>
</html>
