<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Page Loader Progress</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='loader-bg')r.style.setProperty('--loader-bg',t.value);if(t.name==='fill-color')r.style.setProperty('--fill-color',t.value);if(t.name==='track-height')r.style.setProperty('--track-height',t.value+'px');if(t.name==='fill-duration')r.style.setProperty('--fill-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{let p=0;const bar=document.querySelector('.progress-fill');const lb=document.querySelector('.progress-label');const btn=document.querySelector('.reset-btn');function fill(){if(p>=100){p=0}const target=Math.min(p+30+Math.random()*40,100);const start=p;const dur=800+Math.random()*600;const t0=performance.now();function anim(now){const f=Math.min((now-t0)/dur,1);const val=start+(target-start)*f;bar.style.width=val+'%';lb.textContent=Math.round(val)+'%';if(f<1){requestAnimationFrame(anim)}else{p=val;if(p<100){setTimeout(fill,400)}else{lb.textContent='Complete!'}}}requestAnimationFrame(anim)}btn.addEventListener('click',()=>{p=0;bar.style.width='0%';lb.textContent='0%';setTimeout(fill,300)});setTimeout(fill,500)})
</script>
<div class="container"><p class="title">Page Loader Progress</p>
<div class="progress-track"><div class="progress-fill"></div></div>
<div class="progress-label">0%</div>
<button class="reset-btn">Reset</button>
<div class="controls"><label>Track: <input type="color" name="loader-bg" value="#2d2d44"></label><label>Fill: <input type="color" name="fill-color" value="#4ecdc4"></label><label>Height: <input type="range" name="track-height" min="4" max="24" value="8"></label><label>Speed: <input type="range" name="fill-duration" min="0.5" max="5" step="0.1" value="2"></label></div></div></body></html>
