<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Object-Fit Gallery | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h2>CSS Object-Fit Gallery</h2>
      <p>A responsive image grid using <code>object-fit: cover</code> to maintain perfect aspect ratios without distortion. Hover for EaseMotion animations!</p>
    </div>

    <div class="gallery-grid">
      
      <!-- Image 1 -->
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?auto=format&fit=crop&w=800&q=80" alt="Mountain Landscape" class="ease-object-fit">
        <div class="gallery-overlay"><span>Landscape</span></div>
      </div>

      <!-- Image 2 -->
      <div class="gallery-item gallery-item--tall">
        <img src="https://images.unsplash.com/photo-1682687982501-1e58ea813244?auto=format&fit=crop&w=800&q=80" alt="Desert Dunes" class="ease-object-fit">
        <div class="gallery-overlay"><span>Desert Dunes</span></div>
      </div>

      <!-- Image 3 -->
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1682687220063-4742bd7fd538?auto=format&fit=crop&w=800&q=80" alt="Ocean View" class="ease-object-fit">
        <div class="gallery-overlay"><span>Ocean View</span></div>
      </div>

      <!-- Image 4 -->
      <div class="gallery-item gallery-item--wide">
        <img src="https://images.unsplash.com/photo-1682695796254-bf61bf430261?auto=format&fit=crop&w=1200&q=80" alt="Forest" class="ease-object-fit">
        <div class="gallery-overlay"><span>Forest</span></div>
      </div>

    </div>
  </div>

</body>
</html>
