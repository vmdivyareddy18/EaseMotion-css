<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Interactive Input Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="landing-workspace">
    <div class="mention-card-wrapper">
      
      <div class="card-meta-header">
        <h4>COMMUNITY ENGAGEMENT HUB</h4>
        <span class="pulse-node">ACTIVE MODE</span>
      </div>

      <!-- Pure CSS Interactive Input Structure -->
      <div class="mention-input-container">
        <div class="input-glow-mesh"></div>
        
        <!-- Editable rich field tracking user typing interactions -->
        <div class="rich-mention-field" contenteditable="true" placeholder="Type @username to activate color shifting..." tabindex="0">Type <span class="mention-tag-token">@design_system</span> to spark engagement!</div>
      </div>

      <p class="panel-caption-footer">Hover or focus the mention target to view fluid ambient color-shifting meshes natively.</p>
    </div>
  </main>

</body>
</html>
