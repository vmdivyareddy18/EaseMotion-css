<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotation Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
    }
  </style>
</head>
<body>

  <h1>Rotation Utilities Demo</h1>

  <div class="container">
    <div class="demo-box ease-rotate-0">0°</div>
    <div class="demo-box ease-rotate-45">45°</div>
    <div class="demo-box ease-rotate-90">90°</div>
    <div class="demo-box ease-rotate-180">180°</div>
    <div class="demo-box ease-rotate-270">270°</div>
  </div>

</body>
</html>
