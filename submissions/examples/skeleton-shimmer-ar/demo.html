<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>skeleton-shimmer – Skeleton Loading Shimmer</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Skeleton Shimmer Loading</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Placeholder cards with a diagonal shimmer sweep – pure CSS.</p>

    <div class="ease-grid ease-grid-cols-1 ease-md-grid-cols-2 ease-lg-grid-cols-3 ease-gap-6 ease-max-w-5xl ease-mx-auto">
      <!-- Skeleton card 1 -->
      <div class="skeleton-card ease-card ease-p-6">
        <div class="shimmer-line shimmer-img"></div>
        <div class="shimmer-line shimmer-title"></div>
        <div class="shimmer-line shimmer-text"></div>
        <div class="shimmer-line shimmer-text short"></div>
      </div>
      <!-- Skeleton card 2 -->
      <div class="skeleton-card ease-card ease-p-6">
        <div class="shimmer-line shimmer-img"></div>
        <div class="shimmer-line shimmer-title"></div>
        <div class="shimmer-line shimmer-text"></div>
        <div class="shimmer-line shimmer-text short"></div>
      </div>
      <!-- Skeleton card 3 -->
      <div class="skeleton-card ease-card ease-p-6">
        <div class="shimmer-line shimmer-img"></div>
        <div class="shimmer-line shimmer-title"></div>
        <div class="shimmer-line shimmer-text"></div>
        <div class="shimmer-line shimmer-text short"></div>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Uses animated <code>background-position</code> on a diagonal gradient – infinite shimmer loop.
    </p>
  </div>

</body>
</html>
