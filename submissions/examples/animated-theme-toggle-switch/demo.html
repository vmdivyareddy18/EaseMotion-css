<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Theme Toggle Switch - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-wrapper">
    
    <!-- Theme Toggle Switch -->
    <div class="toggle-container ease-fade-in-down">
      <label class="theme-switch" aria-label="Toggle dark mode">
        <input type="checkbox" id="theme-checkbox">
        <span class="slider">
          <!-- Stars (Visible in dark mode) -->
          <span class="stars">
            <span class="star star-1"></span>
            <span class="star star-2"></span>
            <span class="star star-3"></span>
            <span class="star star-4"></span>
          </span>
          
          <!-- Sliding Knob -->
          <span class="knob">
            <!-- Sun Rays (Spinning in light mode) -->
            <span class="sun-rays ease-spin-slow">
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
              <span class="ray"></span>
            </span>
            <!-- Moon Craters (Visible in dark mode) -->
            <span class="moon-craters">
              <span class="crater c1"></span>
              <span class="crater c2"></span>
              <span class="crater c3"></span>
            </span>
          </span>
        </span>
      </label>
      <span class="toggle-label" id="theme-label">Light Mode</span>
    </div>

    <!-- Mock Content Card -->
    <div class="content-card ease-fade-in-up ease-delay-200">
      <h1>Smooth Theme Transitions</h1>
      <p>Click the toggle switch above to experience a buttery-smooth transition between light and dark modes. Notice how the sun rays spin, the moon craters appear, and the stars fade in!</p>
      <div class="mock-ui">
        <div class="mock-bar"></div>
        <div class="mock-bar short"></div>
        <div class="mock-bar"></div>
      </div>
    </div>

  </div>

  <!-- JavaScript for Theme Toggle -->
  <script>
    const checkbox = document.getElementById('theme-checkbox');
    const html = document.documentElement;
    const label = document.getElementById('theme-label');

    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        html.setAttribute('data-theme', 'dark');
        label.textContent = 'Dark Mode';
      } else {
        html.setAttribute('data-theme', 'light');
        label.textContent = 'Light Mode';
      }
    });
  </script>
</body>
</html>
