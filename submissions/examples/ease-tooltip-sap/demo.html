<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <p>Hover the trigger or tab to it to reveal the tooltip motion above the button.</p>

  <div class="tooltip-container-sap">
    <button aria-describedby="tooltip-sap">
      Hover or focus me</button>
    <div class="tooltip-content-sap" id="tooltip-sap" role="tooltip">
      Tooltip Text
    </div>
  </div>

</body>
</html>
