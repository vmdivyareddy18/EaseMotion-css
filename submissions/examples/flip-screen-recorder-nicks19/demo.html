<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Screen Recorder - Music Player Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0f172a; /* Deep Slate Dark Mode */
      background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f8fafc;
    }

    .demo-title {
      text-align: center;
      margin-bottom: 40px;
    }

    .demo-title h2 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .demo-title p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="demo-title">
    <h2>Screen Capture</h2>
    <p>Music Player Theme</p>
  </div>

  <!-- Checkbox to control the flip state -->
  <input type="checkbox" id="record-toggle" class="ease-record-toggle">

  <!-- The 3D Scene -->
  <div class="ease-flip-scene">
    <!-- The Flipping Card -->
    <div class="ease-flip-card">

      <!-- FRONT FACE (Idle State) -->
      <div class="ease-flip-face ease-flip-front">
        <div class="ease-recorder-header">
          <span>Ready to Record</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14v-4z"></path><rect x="3" y="6" width="12" height="12" rx="2" ry="2"></rect></svg>
        </div>
        
        <div class="ease-recorder-body">
          <div class="ease-mic-level">
            <div class="ease-bar"></div><div class="ease-bar"></div><div class="ease-bar"></div><div class="ease-bar"></div><div class="ease-bar"></div>
          </div>
        </div>

        <label for="record-toggle" class="ease-action-btn ease-start-btn">
          <span class="ease-record-dot"></span>
          REC
        </label>
      </div>

      <!-- BACK FACE (Recording State) -->
      <div class="ease-flip-face ease-flip-back">
        <div class="ease-recorder-header">
          <span class="ease-recording-text"><span class="ease-pulse-dot"></span> Recording...</span>
          <span class="ease-timer">00:04</span>
        </div>
        
        <div class="ease-recorder-body">
          <!-- Active Audio Visualizer (Music Player Pattern) -->
          <div class="ease-visualizer">
            <div class="ease-v-bar" style="--ease-delay: 1"></div>
            <div class="ease-v-bar" style="--ease-delay: 2"></div>
            <div class="ease-v-bar" style="--ease-delay: 3"></div>
            <div class="ease-v-bar" style="--ease-delay: 4"></div>
            <div class="ease-v-bar" style="--ease-delay: 2"></div>
            <div class="ease-v-bar" style="--ease-delay: 5"></div>
            <div class="ease-v-bar" style="--ease-delay: 3"></div>
          </div>
        </div>

        <label for="record-toggle" class="ease-action-btn ease-stop-btn">
          <span class="ease-stop-square"></span>
          STOP
        </label>
      </div>

    </div>
  </div>

</body>
</html>
