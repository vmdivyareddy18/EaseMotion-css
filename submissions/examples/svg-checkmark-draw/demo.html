<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Checkmark Draw - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/cards.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-card">
    <h2 style="margin: 0; font-weight: 800;">SVG Checkmark Draw</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
      Satisfying success checkmark drawing animation triggered stroke-by-stroke.
    </p>

    <!-- Animated Checkmark Container -->
    <div id="checkmark-wrapper" style="min-height: 56px; display: flex; align-items: center;">
      <svg class="ease-checkmark" viewBox="0 0 52 52">
        <circle class="ease-checkmark-circle" cx="26" cy="26" r="25" fill="none" />
        <path class="ease-checkmark-draw" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
      </svg>
    </div>

    <div class="ease-flex ease-gap-4">
      <button id="trigger-btn" class="ease-btn ease-btn-primary ease-btn-sm ease-btn-pill ease-btn-hover" style="color:white;">
        🔄 Re-trigger Draw
      </button>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('checkmark-wrapper');
    const trigger = document.getElementById('trigger-btn');

    trigger.addEventListener('click', () => {
      // Re-trigger by replacing checkmark SVG contents
      wrapper.innerHTML = `
        <svg class="ease-checkmark" viewBox="0 0 52 52">
          <circle class="ease-checkmark-circle" cx="26" cy="26" r="25" fill="none" />
          <path class="ease-checkmark-draw" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
        </svg>
      `;
    });
  </script>

</body>
</html>
