<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Language Selector Dropdown</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-lang-selector">
        <input type="checkbox" id="lang-toggle" class="ease-lang-toggle-input">
        <label for="lang-toggle" class="ease-lang-button">
            <span class="ease-lang-icon">🌐</span>
            <span>English</span>
            <span class="ease-lang-arrow">▼</span>
        </label>
        
        <div class="ease-lang-menu">
            <div class="ease-lang-item active">
                <span class="ease-lang-item-flag">🇺🇸</span>
                <span class="ease-lang-item-name">English</span>
                <span class="ease-lang-item-check">✓</span>
            </div>
            <div class="ease-lang-item">
                <span class="ease-lang-item-flag">🇪🇸</span>
                <span class="ease-lang-item-name">Español</span>
                <span class="ease-lang-item-check">✓</span>
            </div>
            <div class="ease-lang-item">
                <span class="ease-lang-item-flag">🇫🇷</span>
                <span class="ease-lang-item-name">Français</span>
                <span class="ease-lang-item-check">✓</span>
            </div>
            <div class="ease-lang-item">
                <span class="ease-lang-item-flag">🇩🇪</span>
                <span class="ease-lang-item-name">Deutsch</span>
                <span class="ease-lang-item-check">✓</span>
            </div>
        </div>
    </div>
</body>
</html>
