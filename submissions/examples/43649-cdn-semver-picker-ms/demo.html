<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CDN Version Picker Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-cdn-container">
    <div class="ease-cdn-header">
      <h2 class="ease-cdn-title">EaseMotion CDN Link Generator</h2>
      <p class="ease-cdn-desc">Pin your CSS to a specific semver release to prevent unexpected breaking changes.</p>
    </div>

    <div class="ease-cdn-controls">
      <label class="ease-cdn-label">Select Version:</label>
      <select id="versionSelect" class="ease-cdn-select">
        <option value="latest">latest</option>
        <option value="2.1.0">v2.1.0 (Stable)</option>
        <option value="2.0.5">v2.0.5 (Legacy)</option>
        <option value="1.5.0">v1.5.0 (Deprecated)</option>
      </select>
    </div>

    <div class="ease-cdn-output-card">
      <button id="copyBtn" class="ease-cdn-copy">Copy</button>
      <span class="ease-cdn-output-label">HTML Link Tag</span>
      <p id="codeOutput" class="ease-cdn-code ease-fade-in">&lt;link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion@latest/dist/easemotion.min.css"&gt;</p>
    </div>
  </div>

  <script>
    const select = document.getElementById('versionSelect');
    const output = document.getElementById('codeOutput');
    const copyBtn = document.getElementById('copyBtn');

    function updateCode() {
      const v = select.value;
      const url = `https://cdn.jsdelivr.net/npm/easemotion@${v}/dist/easemotion.min.css`;
      const htmlString = `&lt;link rel="stylesheet" href="${url}"&gt;`;
      
      output.innerHTML = htmlString;
      
      // Re-trigger animation
      output.classList.remove('ease-fade-in');
      void output.offsetWidth; // trigger reflow
      output.classList.add('ease-fade-in');
    }

    select.addEventListener('change', updateCode);

    copyBtn.addEventListener('click', () => {
      const v = select.value;
      const textToCopy = `<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion@${v}/dist/easemotion.min.css">`;
      navigator.clipboard.writeText(textToCopy);
      
      copyBtn.textContent = 'Copied!';
      setTimeout(() => {
        copyBtn.textContent = 'Copy';
      }, 1500);
    });
  </script>

</body>
</html>
