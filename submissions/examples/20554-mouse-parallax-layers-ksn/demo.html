<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mouse Parallax Layers Demo</title>
  <!-- Import Inter font for premium styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Link component styles -->
  <link rel="stylesheet" href="./style.css">

  <style>
    /* Demo Page Layout & Aesthetics */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top right, #1e1b4b, #0f0c1b, #03001e);
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
      overflow: hidden;
    }

    .demo-wrapper {
      width: 90%;
      max-width: 720px;
      text-align: center;
    }

    .demo-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      color: #c084fc;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    .demo-title {
      font-size: 2rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      background: linear-gradient(to right, #f8fafc, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .demo-description {
      font-size: 0.9rem;
      color: #94a3b8;
      max-width: 480px;
      margin: 0 auto 2.5rem auto;
      line-height: 1.6;
    }

    .instructions {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* Logo inside mid-layer card */
    .logo-symbol {
      color: white;
      font-size: 2rem;
      font-weight: 800;
    }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <div class="demo-badge">3D Depth Effect</div>
    <h1 class="demo-title">Multi-Layer Mouse Parallax</h1>
    <p class="demo-description">
      Move your cursor over the card below. Stacked depth layers shift at different speeds (0.5x, 1x, 1.5x) to create a premium 3D parallax effect.
    </p>

    <!-- Parallax Container -->
    <div class="parallax-container">
      <!-- Background Layer (Speed 0.5x) -->
      <div class="parallax-layer layer-back" style="--parallax-speed: 0.5;"></div>
      
      <!-- Middle Ground Layer (Speed 1.0x) -->
      <div class="parallax-layer layer-mid" style="--parallax-speed: 1.0;">
        <div class="layer-mid-card">
          <div class="layer-mid-logo">
            <span class="logo-symbol">⚡</span>
          </div>
        </div>
      </div>
      
      <!-- Foreground Layer (Speed 1.5x) -->
      <div class="parallax-layer layer-fore" style="--parallax-speed: 1.5;">
        <div class="layer-fore-circle circle-1"></div>
        <div class="layer-fore-circle circle-2"></div>
      </div>
    </div>

    <div class="instructions">
      Move your mouse across the screen
    </div>
  </div>

  <!-- JavaScript logic to track cursor coordinate offsets -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('.parallax-container');
      const maxMove = 30; // Maximum translation displacement in pixels

      document.addEventListener('mousemove', (e) => {
        const width = window.innerWidth;
        const height = window.innerHeight;

        // Calculate coordinate relative to viewport center (-0.5 to 0.5)
        const x = (e.clientX / width) - 0.5;
        const y = (e.clientY / height) - 0.5;

        // Calculate coordinate offsets
        const moveX = x * maxMove;
        const moveY = y * maxMove;

        // Apply offsets as custom properties to the parent container
        container.style.setProperty('--parallax-x', `${moveX.toFixed(2)}px`);
        container.style.setProperty('--parallax-y', `${moveY.toFixed(2)}px`);
      });
    });
  </script>
</body>
</html>
