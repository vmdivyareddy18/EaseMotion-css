<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Draw-Border Portfolio Popover</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #333;
            padding: 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        
        h1 {
            color: #111827;
            margin-bottom: 5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            font-size: 2rem;
            text-align: center;
        }
        
        .demo-container {
            display: flex;
            gap: 4rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        /* Creative Portfolio Minimal Buttons */
        .creative-btn {
            background-color: #fff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            padding: 0.75rem 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        .creative-btn:hover, .creative-btn:focus {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
            outline: none;
            border-color: #d1d5db;
        }
        
        /* Popover Content Styling */
        .popover-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--pt-border-color);
        }
        
        .popover-body {
            color: var(--pt-text-color);
            font-size: 0.9rem;
            line-height: 1.5;
            opacity: 0.8;
        }
        
        /* Dark Theme Body Background */
        body.dark-mode {
            background-color: #030712;
            color: #f9fafb;
            background-image: radial-gradient(#1f2937 1px, transparent 1px);
        }
        
        body.dark-mode h1 {
            color: #f9fafb;
        }
        
        .dark-mode .creative-btn {
            background-color: #111827;
            color: #f9fafb;
            border-color: #374151;
        }
        
        .dark-mode .creative-btn:hover {
            border-color: #4b5563;
        }
    </style>
</head>
<body>
    <h1>Creative Portfolio - Draw Border Popovers</h1>
    
    <div class="demo-container">
        <!-- Demo 1: Default Light Theme -->
        <div class="portfolio-trigger">
            <button class="creative-btn" aria-haspopup="true">View Case Study</button>
            <div class="portfolio-popover">
                <div class="portfolio-popover-border"></div>
                <div class="popover-header">Project Alpha</div>
                <div class="popover-body">An exploration of minimal interfaces and subtle animations.</div>
            </div>
        </div>
        
        <!-- Demo 2: Dark Theme Overlay -->
        <div class="portfolio-trigger dark-portfolio">
            <button class="creative-btn" aria-haspopup="true" style="background:#111827; color:#fff; border-color:#374151;">Contact Studio</button>
            <div class="portfolio-popover">
                <div class="portfolio-popover-border"></div>
                <div class="popover-header">Let's Talk</div>
                <div class="popover-body">Available for freelance web design and front-end development projects.</div>
            </div>
        </div>
    </div>
</body>
</html>
