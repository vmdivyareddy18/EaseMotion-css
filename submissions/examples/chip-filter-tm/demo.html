<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Chip Filter</title>
<link rel="stylesheet" href="../../../easemotion.css">
<link rel="stylesheet" href="style.css">
</head>
<body><div class="demo-wrapper">
<h1>Filter by language</h1>
<div class="ease-chip-filter">
<button class="ease-chip-filter-item ease-chip-active">All</button>
<button class="ease-chip-filter-item">JavaScript</button>
<button class="ease-chip-filter-item">Python</button>
<button class="ease-chip-filter-item">Rust</button>
<button class="ease-chip-filter-item">Go</button>
</div>
<script>document.querySelectorAll('.ease-chip-filter-item').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.ease-chip-filter-item').forEach(x=>x.classList.remove('ease-chip-active'));b.classList.add('ease-chip-active');}));</script>
</div></body></html>
