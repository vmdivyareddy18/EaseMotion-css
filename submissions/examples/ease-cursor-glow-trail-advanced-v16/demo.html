<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Advanced Cursor Trail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Advanced Cursor Trail 🌈</h1>
  <p class="ease-slide-up">Smooth multi-color glow trail</p>
</section>

<script>
let trails = [];

document.addEventListener("mousemove", e => {
  trails.push({ x: e.clientX, y: e.clientY });

  const trail = document.createElement("div");
  trail.classList.add("trail");

  trail.style.left = e.clientX + "px";
  trail.style.top = e.clientY + "px";

  // random color
  const colors = ["#22c55e","#3b82f6","#f59e0b","#ec4899"];
  trail.style.background = colors[Math.floor(Math.random() * colors.length)];

  document.body.appendChild(trail);

  setTimeout(() => {
    trail.remove();
  }, 700);
});
</script>

</body>
</html>
