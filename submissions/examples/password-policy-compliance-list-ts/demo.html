<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Policy Compliance List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="policy-list">
    <div class="rule met"><strong>12+ characters</strong><span>Met</span></div>
    <div class="rule met"><strong>Number required</strong><span>Met</span></div>
    <div class="rule missing"><strong>Special character</strong><span>Missing</span></div>
    <div class="rule recommended"><strong>No reused password</strong><span>Recommended</span></div>
    <div class="rule blocked"><strong>Common phrase</strong><span>Blocked</span></div>
  </main>
</body>
</html>
