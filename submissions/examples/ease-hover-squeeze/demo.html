<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squeeze on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Squeeze on Hover</h1>
  <p class="subtitle">Element squeezes horizontally when hovered — pure CSS.</p>

  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the card to see the horizontal squeeze</p>
    <div class="squeeze-card">
      <span class="squeeze-icon">⬡</span>
      <p>Hover to squeeze</p>
    </div>
  </section>

  <section>
    <h2>How It Works</h2>
    <p>The card uses <code>scaleX()</code> on hover to compress horizontally. A subtle <code>scaleY()</code> counter-movement adds the squeeze feel.</p>
  </section>
</body>
</html>
