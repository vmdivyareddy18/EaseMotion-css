<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Stack - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Card Stack</h1>
      <p>Tinder-style card stack with CSS-powered offsets and dismiss animations.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card-container">
        <h2>Review Profiles</h2>
        <p class="instruction">Click the top card to dismiss it.</p>
        
        <div class="ease-card-stack" id="profile-stack">
          <!-- Cards injected in reverse DOM order so the first one is visually on top -->
          <div class="ease-card" style="--card-index: 3;">
            <div class="card-content" style="background: linear-gradient(135deg, #e0e7ff, #c7d2fe);">
              <h3>Card 4</h3>
            </div>
          </div>
          
          <div class="ease-card" style="--card-index: 2;">
            <div class="card-content" style="background: linear-gradient(135deg, #dcfce7, #bbf7d0);">
              <h3>Card 3</h3>
            </div>
          </div>
          
          <div class="ease-card" style="--card-index: 1;">
            <div class="card-content" style="background: linear-gradient(135deg, #fef3c7, #fde68a);">
              <h3>Card 2</h3>
            </div>
          </div>
          
          <div class="ease-card" style="--card-index: 0;">
            <div class="card-content" style="background: linear-gradient(135deg, #fee2e2, #fecaca);">
              <h3>Card 1</h3>
            </div>
          </div>
        </div>
        
        <button id="reset-btn" class="reset-button">Reset Stack</button>
      </section>
    </main>
  </div>

  <script>
    const stack = document.getElementById('profile-stack');
    
    // The dismiss logic
    stack.addEventListener('click', (e) => {
      // Find all cards that haven't been dismissed yet
      // We read backwards because the last DOM element is visually the "top" card
      const activeCards = Array.from(stack.querySelectorAll('.ease-card:not(.ease-card-dismiss)'));
      if (activeCards.length === 0) return;
      
      const topCard = activeCards[activeCards.length - 1]; // Top card is the last in DOM
      
      // 1. Trigger the CSS exit animation
      topCard.classList.add('ease-card-dismiss');
      
      // 2. Remove it from DOM after animation completes (400ms)
      setTimeout(() => {
        if(topCard.parentNode) topCard.parentNode.removeChild(topCard);
      }, 400);

      // 3. Update the CSS indexes of the remaining cards so they animate forward!
      const remainingCards = activeCards.slice(0, -1);
      remainingCards.forEach((card, index) => {
        // Reverse the index math so the new top card gets index 0
        const newIndex = remainingCards.length - 1 - index;
        card.style.setProperty('--card-index', newIndex);
      });
    });

    // Just for the demo - refresh page to reset
    document.getElementById('reset-btn').addEventListener('click', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
