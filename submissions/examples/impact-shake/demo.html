<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impact Shake - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/cards.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="container-element" class="demo-box">
    <h2 style="margin: 0 0 var(--ease-space-2) 0; font-weight: 800;">Target Module</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin-bottom: var(--ease-space-4);">
      Simulate a collision impact to trigger a high-frequency decaying screen vibration.
    </p>

    <!-- Simulated health metrics visualizer -->
    <div style="text-align: left; font-size: var(--ease-text-xs); font-weight: 700;">Hull Integrity</div>
    <div class="health-bar-container">
      <div id="health-fill" class="health-bar-fill"></div>
    </div>

    <div class="ease-flex ease-justify-between ease-items-center ease-pt-4">
      <button id="strike-btn" class="ease-btn ease-btn-danger ease-btn-sm ease-btn-pill ease-btn-hover" style="color:white;">
        💥 Strike Module
      </button>
      <button id="repair-btn" class="ease-btn ease-btn-outline ease-btn-sm ease-btn-pill ease-btn-hover">
        🔧 Repair
      </button>
    </div>
  </div>

  <script>
    const container = document.getElementById('container-element');
    const health = document.getElementById('health-fill');
    const strike = document.getElementById('strike-btn');
    const repair = document.getElementById('repair-btn');
    let currentHealth = 100;

    strike.addEventListener('click', () => {
      // Apply impact class
      container.classList.remove('ease-impact-shake');
      void container.offsetWidth; // Trigger reflow
      container.classList.add('ease-impact-shake');

      // Update simulated hull points
      currentHealth = Math.max(0, currentHealth - 25);
      health.style.width = currentHealth + '%';

      if (currentHealth === 0) {
        strike.disabled = true;
      }
    });

    repair.addEventListener('click', () => {
      currentHealth = 100;
      health.style.width = '100%';
      strike.disabled = false;
      container.classList.remove('ease-impact-shake');
    });

    // Cleanup class on animation finish
    container.addEventListener('animationend', () => {
      container.classList.remove('ease-impact-shake');
    });
  </script>

</body>
</html>
