<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Border Glow Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual card showcase demonstrating animated border glow highlights and linear gradient color rotations.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Border Draw &amp; Glow</h1>
      <p class="description">
        Demonstrates modern card highlights. Hover over the panels below 
        to trigger the animated border glow effects.
      </p>

    <main class="showcase">
      <!-- Glow Card Component under Test -->
      <div class="glow-card">
        <div class="glow-border"></div>
        <div class="card-content">
          <h2>Interactive Panel</h2>
          <p>This layout uses absolute pseudo-elements to create a rotating gradient glow behind the content card boundaries.</p>
        </div>
      </div>
    </main>
  </div>
