<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Button Bug Fix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h2>Ghost Button Hover Fix</h2>
    <p>In dark mode, the previous ghost button hover state caused zero contrast because the background and text both became light. This patch uses a <code>color-mix()</code> semi-transparent overlay to ensure contrast on any background.</p>
    
    <div style="margin-top: 30px;">
      <button class="ease-btn ease-btn-ghost">Hover me (Fixed Ghost)</button>
    </div>
  </div>
</body>
</html>
