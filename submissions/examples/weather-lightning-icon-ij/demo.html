<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Lightning Icon - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Lightning Icon</h1>
    <div class="weather-icon lightning-icon">
      <div class="icon-bg"></div>
      <div class="lightning-bolt">
        <div class="bolt-shard bolt-main"></div>
        <div class="bolt-shard bolt-branch"></div>
      </div>
    </div>
    <p class="description">Lightning bolt flashes with irregular opacity/brightness timing at icon scale.</p>
  </div>
</body>
</html>
