<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-notification-slide-stack – Notification Stack</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Notification Slide Stack
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click "Add Notification" — new items slide in and push others down.
    </p>

    <button id="add-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mb-6">
      + Add Notification
    </button>

    <div id="stack" class="notification-stack"></div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Uses CSS transitions on position + FLIP technique.
    </p>
  </div>

  <script>
    const stack = document.getElementById('stack');
    const addBtn = document.getElementById('add-btn');
    let count = 0;

    const messages = [
      'New login from Chrome on Windows',
      'Your report is ready to download',
      'Meeting starts in 10 minutes',
      'Payment of ₹1,200 received',
      'New comment on your post'
    ];

    function addNotification() {
      const oldItems = [...stack.children];

      // Record old positions (FLIP)
      const oldRects = oldItems.map(el => el.getBoundingClientRect());

      // Create new notification
      const notif = document.createElement('div');
      notif.className = 'notification';
      notif.innerHTML = 
        <span></span>
        <button class="close-btn">✕</button>
      ;
      stack.prepend(notif);

      // Animate new item in
      requestAnimationFrame(() => {
        notif.classList.add('visible');

        // FLIP existing items
        const newItems = [...stack.children].slice(1);
        newItems.forEach((el, i) => {
          const oldIdx = oldItems.indexOf(el);
          if (oldIdx !== -1) {
            const oldRect = oldRects[oldIdx];
            const newRect = el.getBoundingClientRect();
            const dy = oldRect.top - newRect.top;
            if (dy !== 0) {
              el.style.transition = 'none';
              el.style.transform = 	ranslateY(px);
              requestAnimationFrame(() => {
                el.style.transition = 'transform 0.35s ease';
                el.style.transform = '';
              });
            }
          }
        });
      });

      count++;

      // Auto-dismiss after 4 seconds
      setTimeout(() => {
        notif.classList.remove('visible');
        notif.addEventListener('transitionend', () => notif.remove());
      }, 4000);

      // Close button
      notif.querySelector('.close-btn').addEventListener('click', () => {
        notif.classList.remove('visible');
        notif.addEventListener('transitionend', () => notif.remove());
      });
    }

    addBtn.addEventListener('click', addNotification);
  </script>

</body>
</html>
