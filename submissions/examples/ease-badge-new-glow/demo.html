<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge-new-glow – NEW Badge Glow</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-6 ease-fade-in">
      Promotional Badge Glow
    </h1>
    <p class="ease-text-gray-500 ease-mb-10 ease-fade-in ease-delay-200">
      The <span class="ease-font-semibold ease-text-blue-700">"NEW"</span> badge pulses with a soft glow to grab attention.
    </p>

    <!-- Product Card with glowing badge -->
    <div class="product-card ease-card ease-relative ease-overflow-hidden ease-hover-shadow-xl ease-transition">
      <img src="https://placehold.co/400x300" alt="Product" class="ease-w-full ease-object-cover">
      <div class="ease-p-4 ease-text-left">
        <h3 class="ease-text-lg ease-font-semibold ease-mb-1">Premium Headphones</h3>
        <p class="ease-text-gray-500 ease-text-sm ease-mb-2">Noise cancelling · Wireless · 30h battery</p>
        <span class="ease-text-blue-600 ease-font-bold">₹1,499</span>
      </div>
      <!-- The glowing NEW badge -->
      <span class="badge-new-glow">NEW</span>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Continuous subtle box‑shadow pulse — great for “New”, “Sale”, or “Featured” labels.
    </p>
  </div>

</body>
</html>
