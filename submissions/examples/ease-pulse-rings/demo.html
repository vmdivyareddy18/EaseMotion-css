<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Rings · Expanding Ripple Effect</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="card">
        <h2>〰️ Pulse Rings</h2>
        <p class="sub">expanding ripple rings</p>

        <!-- === PULSE RINGS === -->
        <div class="pulse-container" id="pulseContainer">
            <div class="pulse-ring ring-1"></div>
            <div class="pulse-ring ring-2"></div>
            <div class="pulse-ring ring-3"></div>
            <div class="pulse-ring ring-4"></div>
            <div class="pulse-ring ring-5"></div>
            <div class="pulse-center">
                <i class="fas fa-circle"></i>
            </div>
        </div>

        <p style="margin-top: 2rem; font-size: 0.85rem; color: #64748b;">
            Expanding ripple rings · pulsing animation
        </p>
    </div>

    <!-- Embedded JavaScript -->
    <script>
        (function() {
            'use strict';

            const container = document.getElementById('pulseContainer');

            // Click feedback - restart animation
            container.addEventListener('click', function(e) {
                const rings = this.querySelectorAll('.pulse-ring');
                rings.forEach(ring => {
                    ring.classList.remove('pulsing');
                    void ring.offsetWidth;
                    ring.classList.add('pulsing');
                });
                this.classList.add('click-pulse');
                setTimeout(() => {
                    this.classList.remove('click-pulse');
                }, 300);
                console.log('〰️ Pulse rings triggered!');
            });

            // Keyboard accessibility
            container.setAttribute('tabindex', '0');
            container.setAttribute('role', 'button');
            container.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    this.click();
                }
            });

            // Trigger initial animation on load
            setTimeout(() => {
                const rings = container.querySelectorAll('.pulse-ring');
                rings.forEach(ring => {
                    ring.classList.add('pulsing');
                });
            }, 300);

            console.log('〰️ Pulse rings initialized!');

        })();
    </script>

</body>
</html>
