<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Skew Active Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Modern SaaS

</div>

<h1>

Skew Active Tooltip

</h1>

<p>

Interactive tooltip component
designed for modern SaaS
interfaces featuring a smooth
skew-active transition.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Explore Features

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="tag">

Premium

</span>

<h3>

AI Workspace

</h3>

<p>

Elegant CSS skew animation
crafted for SaaS products,
dashboards and landing pages.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
