<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Text Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="reveal slide-up">
        <span>Slide Up Reveal</span>
    </h1>

    <h1 class="reveal blur">
        <span>Blur Reveal Animation</span>
    </h1>

    <h1 class="reveal clip">
        <span>Clip Path Reveal</span>
    </h1>

    <h1 class="letters">
        <span>A</span>
        <span>d</span>
        <span>v</span>
        <span>a</span>
        <span>n</span>
        <span>c</span>
        <span>e</span>
        <span>d</span>

        <span>&nbsp;</span>

        <span>T</span>
        <span>e</span>
        <span>x</span>
        <span>t</span>

        <span>&nbsp;</span>

        <span>R</span>
        <span>e</span>
        <span>v</span>
        <span>e</span>
        <span>a</span>
        <span>l</span>
    </h1>

</div>

</body>
</html>
