<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flute Play Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="flute">
    <div class="flute-body"></div>
    <div class="embouchure"></div>
    <div class="keys">
      <div class="flute-key" style="--i:0"></div>
      <div class="flute-key" style="--i:1"></div>
      <div class="flute-key" style="--i:2"></div>
      <div class="flute-key" style="--i:3"></div>
      <div class="flute-key" style="--i:4"></div>
    </div>
    <div class="note" style="--i:0">♪</div>
    <div class="note" style="--i:1">♫</div>
    <div class="note" style="--i:2">♩</div>
  </div>
</body>
</html>
