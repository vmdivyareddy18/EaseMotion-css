<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playful Easing Variables | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="easing-showcase-wrapper">
    <header class="showcase-header">
      <h1>Playful Easing Variables</h1>
      <p>A proposal for <code>core/variables.css</code> and <code>core/utilities.css</code> to add bounce and elastic effects.</p>
    </header>

    <div class="demo-area">
      <div class="track-container">
        <!-- Bounce Demo -->
        <div class="track-label">Bounce Easing (<code>.em-ease-bounce</code>)</div>
        <div class="track">
          <div class="ball em-ease-bounce"></div>
        </div>
        
        <!-- Elastic Demo -->
        <div class="track-label">Elastic Easing (<code>.em-ease-elastic</code>)</div>
        <div class="track">
          <div class="ball em-ease-elastic"></div>
        </div>
        
        <!-- Standard Ease-Out (for comparison) -->
        <div class="track-label">Standard Ease-Out (Comparison)</div>
        <div class="track">
          <div class="ball em-ease-standard"></div>
        </div>
      </div>
      
      <div class="controls">
        <button class="trigger-btn" onclick="triggerAnimations()">Trigger Animation</button>
      </div>
    </div>
    
  </div>

  <script>
    function triggerAnimations() {
      const balls = document.querySelectorAll('.ball');
      balls.forEach(ball => {
        // Toggle the 'move' class to trigger the transform transition
        ball.classList.toggle('move');
      });
    }
  </script>
</body>
</html>
