<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter Increment</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Counter Increment Animation</h1>
  <p>Numbers animate from 0 to target when scrolled into view.</p>
  <div class="stats-grid">
    <div class="stat-card" data-count="5000" data-suffix="+"><span class="stat-number">0</span></div>
    <div class="stat-card" data-count="1200" data-suffix="+"><span class="stat-number">0</span></div>
    <div class="stat-card" data-count="98" data-suffix="%"><span class="stat-number">0</span></div>
    <div class="stat-card" data-count="250" data-suffix="ms" data-prefix="<"><span class="stat-number">0</span></div>
  </div>
  <div class="extra-stats">
    <div class="stat-card" data-count="9999" data-prefix="$"><span class="stat-number">0</span><small>Revenue</small></div>
    <div class="stat-card" data-count="72" data-suffix=" languages"><span class="stat-number">0</span><small>Supported</small></div>
  </div>
</div>
<script>
function easeOutQuad(t) { return t * (2 - t); }
function animateCounter(el) {
  const target = parseInt(el.dataset.count, 10);
  const suffix = el.dataset.suffix || '';
  const prefix = el.dataset.prefix || '';
  const duration = 1800;
  const numberEl = el.querySelector('.stat-number');
  const start = performance.now();
  function update(now) {
    const progress = Math.min((now - start) / duration, 1);
    const eased = easeOutQuad(progress);
    numberEl.textContent = prefix + Math.round(eased * target).toLocaleString() + suffix;
    if (progress < 1) requestAnimationFrame(update);
  }
  requestAnimationFrame(update);
}
const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) { animateCounter(e.target); observer.unobserve(e.target); } }); }, { threshold: 0.5 });
document.querySelectorAll('.stat-card').forEach(el => observer.observe(el));
</script>
</body></html>
