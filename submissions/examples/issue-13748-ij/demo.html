<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-freeze-frost – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Freeze Frost</h1>
    <p class="subtitle">A frost effect that spreads across an element with a crystalline pattern.</p>
    <div class="frost-container" id="frostContainer">
      <span class="content">❄️</span>
    </div>
    <p class="frost-status" id="frostStatus">Warm</p>
    <button id="triggerBtn">Freeze</button>
  </div>

  <script>
    const container = document.getElementById('frostContainer');
    const status = document.getElementById('frostStatus');
    const triggerBtn = document.getElementById('triggerBtn');

    triggerBtn.addEventListener('click', () => {
      container.classList.remove('frosted');
      void container.offsetWidth;
      container.classList.add('frosted');
      status.textContent = 'Frozen';
      triggerBtn.textContent = 'Melt';
      triggerBtn.onclick = () => {
        container.classList.remove('frosted');
        status.textContent = 'Warm';
        triggerBtn.textContent = 'Freeze';
        triggerBtn.onclick = null;
      };
    });
  </script>
</body>
</html>
