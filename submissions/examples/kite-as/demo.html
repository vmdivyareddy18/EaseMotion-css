<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kite</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="cloud cl1"></span>
    <span class="cloud cl2"></span>
    <div class="kite">
      <div class="diamond">
        <span class="q top"></span>
        <span class="q left"></span>
        <span class="q right"></span>
        <span class="q bottom"></span>
        <span class="spine"></span>
        <span class="crossbar"></span>
      </div>
      <div class="tail">
        <span class="bow b1"></span>
        <span class="bow b2"></span>
        <span class="bow b3"></span>
        <span class="bow b4"></span>
      </div>
    </div>
  </div>
</body>
</html>
