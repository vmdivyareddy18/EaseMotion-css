<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opacity Utilities - EaseMotion CSS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>Opacity Utilities</h1>
        <p class="subtitle">
          Control element transparency from solid to completely invisible.
        </p>
      </header>

      <div class="demo-grid">
        <div class="demo-card">
          <div class="opacity-box opacity-100"></div>
          <p class="demo-label">opacity-100</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-90"></div>
          <p class="demo-label">opacity-90</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-80"></div>
          <p class="demo-label">opacity-80</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-75"></div>
          <p class="demo-label">opacity-75</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-60"></div>
          <p class="demo-label">opacity-60</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-50"></div>
          <p class="demo-label">opacity-50</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-40"></div>
          <p class="demo-label">opacity-40</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-30"></div>
          <p class="demo-label">opacity-30</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-25"></div>
          <p class="demo-label">opacity-25</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-20"></div>
          <p class="demo-label">opacity-20</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-10"></div>
          <p class="demo-label">opacity-10</p>
        </div>
        <div class="demo-card">
          <div class="opacity-box opacity-5"></div>
          <p class="demo-label">opacity-5</p>
        </div>
      </div>
    </div>
  </body>
</html>
