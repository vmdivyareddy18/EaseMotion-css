<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Log Ingestion Pipeline Monitor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Log Ingestion Pipeline</h2>

<div class="pipeline healthy">
<div>
<h3>Application Logs</h3>
<p>24.8K Events / Minute</p>
</div>
<span>Healthy</span>
</div>

<div class="pipeline active">
<div>
<h3>Processing Queue</h3>
<p>Delay: 1.2 Seconds</p>
</div>
<span>Stable</span>
</div>

<div class="pipeline warning">
<div>
<h3>Error Logs</h3>
<p>327 Failed Events</p>
</div>
<span>Warning</span>
</div>

<div class="pipeline critical">
<div>
<h3>Security Stream</h3>
<p>Pipeline Interrupted</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
