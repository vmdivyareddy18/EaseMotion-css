<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heart Burst Like Button Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <button class="heart-burst-btn" aria-label="Like">♡</button>

  <script>
    var colors = ['#ff4d6d', '#ff758f', '#ff8fa3', '#e63950'];

    document.querySelectorAll('.heart-burst-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        // toggle filled/liked state
        btn.classList.toggle('is-liked');
        btn.textContent = btn.classList.contains('is-liked') ? '♥' : '♡';

        // only burst particles when liking (not un-liking)
        if (!btn.classList.contains('is-liked')) return;

        var particleCount = 6;
        for (var i = 0; i < particleCount; i++) {
          var span = document.createElement('span');
          span.className = 'burst-particle';
          span.textContent = '♥';

          var angle = (Math.PI * 2 * i) / particleCount;
          var distance = 30 + Math.random() * 20;
          var x = Math.cos(angle) * distance;
          var y = Math.sin(angle) * distance;

          span.style.setProperty('--x', x + 'px');
          span.style.setProperty('--y', y + 'px');
          span.style.color = colors[i % colors.length];

          btn.appendChild(span);

          (function (el) {
            el.addEventListener('animationend', function () {
              el.remove();
            });
          })(span);
        }
      });
    });
  </script>

</body>
</html>
