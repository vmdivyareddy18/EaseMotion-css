<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Tally Counter - Creative Agency Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="creative-viewport">
        <div class="counter-display-card">
            <span class="agency-badge">VISITOR METRICS</span>
            
            <!-- Pure CSS Interactive Tally System -->
            <div class="tally-box">
                <div class="digit-strip-wrapper">
                    <!-- Column 1: Thousands -->
                    <div class="digit-column" style="--digit-target: -400px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <!-- Column 2: Hundreds -->
                    <div class="digit-column" style="--digit-target: -200px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <!-- Column 3: Tens -->
                    <div class="digit-column" style="--digit-target: -900px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <!-- Column 4: Units -->
                    <div class="digit-column" style="--digit-target: -700px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                </div>
            </div>
            
            <div class="counter-meta">
                <p class="status-indicator">REAL-TIME TRAFFIC RECORDED</p>
            </div>
        </div>
    </div>

</body>
</html>
