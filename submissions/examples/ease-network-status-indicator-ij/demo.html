<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Network Status Indicator</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='indicator-bg')r.style.setProperty('--indicator-bg',t.value);if(t.name==='online-color')r.style.setProperty('--online-color',t.value);if(t.name==='offline-color')r.style.setProperty('--offline-color',t.value);if(t.name==='pulse-duration')r.style.setProperty('--pulse-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const el=document.querySelector('.status-indicator');const label=document.querySelector('.status-label');const btn=document.querySelector('.toggle-status');let online=true;btn.addEventListener('click',()=>{online=!online;el.classList.toggle('online',online);el.classList.toggle('offline',!online);label.textContent=online?'Online':'Offline';btn.textContent=online?'Go Offline':'Go Online'})})</script>
<div class="container"><p class="title">Network Status Indicator</p>
<div class="status-card"><div class="status-indicator online"></div><span class="status-label">Online</span></div>
<button class="toggle-status">Go Offline</button>
<div class="controls"><label>BG: <input type="color" name="indicator-bg" value="#2d2d44"></label><label>Online: <input type="color" name="online-color" value="#4ecdc4"></label><label>Offline: <input type="color" name="offline-color" value="#f72585"></label><label>Speed: <input type="range" name="pulse-duration" min="0.5" max="4" step="0.1" value="2"></label></div></div></body></html>
