<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Open/Close Toggle</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='toggle-bg')r.style.setProperty('--toggle-bg',t.value);if(t.name==='handle-color')r.style.setProperty('--handle-color',t.value);if(t.name==='open-color')r.style.setProperty('--open-color',t.value);if(t.name==='rotate-duration')r.style.setProperty('--rotate-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelector('.toggle-btn').addEventListener('click',function(){this.classList.toggle('open');const lb=document.querySelector('.toggle-label');lb.textContent=this.classList.contains('open')?'Open':'Closed'})})</script>
<div class="container"><p class="title">Open/Close Toggle</p>
<button class="toggle-btn"><div class="toggle-handle"></div></button>
<div class="toggle-label">Closed</div>
<div class="controls"><label>BG: <input type="color" name="toggle-bg" value="#2d2d44"></label><label>Handle: <input type="color" name="handle-color" value="#888"></label><label>Open: <input type="color" name="open-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="rotate-duration" min="0.15" max="0.8" step="0.05" value="0.3"></label></div></div></body></html>
