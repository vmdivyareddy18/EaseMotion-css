<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alarm Clock - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ac-wrapper">
    <h1>Alarm Clock</h1>
    <div class="ac-clock-face">
      <div class="ac-display">
        <span class="ac-time" id="acTime">00:00:00</span>
        <span class="ac-ampm" id="acAmPm">AM</span>
      </div>
      <div class="ac-alarm-set">
        <label>Set Alarm: <input type="time" id="acAlarmInput" value="08:00"></label>
        <button class="ac-btn" id="acToggleAlarm">Enable Alarm</button>
      </div>
      <div class="ac-status" id="acStatus">Alarm off</div>
      <button class="ac-btn ac-snooze" id="acSnooze">Snooze (5 min)</button>
    </div>
  </div>
  <script>
    (function() {
      var timeEl = document.getElementById('acTime');
      var ampmEl = document.getElementById('acAmPm');
      var alarmInput = document.getElementById('acAlarmInput');
      var toggleBtn = document.getElementById('acToggleAlarm');
      var statusEl = document.getElementById('acStatus');
      var snoozeBtn = document.getElementById('acSnooze');
      var alarmEnabled = false;
      var alarmRinging = false;
      var alarmHour = 0, alarmMinute = 0;
      var clockEl = document.querySelector('.ac-clock-face');

      function updateTime() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        var ampm = h >= 12 ? 'PM' : 'AM';
        var h12 = h % 12 || 12;
        timeEl.textContent =
          String(h12).padStart(2, '0') + ':' +
          String(m).padStart(2, '0') + ':' +
          String(s).padStart(2, '0');
        ampmEl.textContent = ampm;

        if (alarmEnabled && !alarmRinging && h === alarmHour && m === alarmMinute && s === 0) {
          alarmRinging = true;
          clockEl.classList.add('ac-ringing');
          statusEl.textContent = 'ALARM! RINGING';
        }
      }

      function parseAlarmTime(val) {
        if (!val) return;
        var parts = val.split(':');
        alarmHour = parseInt(parts[0], 10);
        alarmMinute = parseInt(parts[1], 10);
      }

      toggleBtn.addEventListener('click', function() {
        alarmEnabled = !alarmEnabled;
        if (alarmEnabled) {
          parseAlarmTime(alarmInput.value);
          toggleBtn.textContent = 'Disable Alarm';
          statusEl.textContent = 'Alarm enabled at ' + alarmInput.value;
          clockEl.classList.add('ac-alarm-on');
        } else {
          toggleBtn.textContent = 'Enable Alarm';
          statusEl.textContent = 'Alarm off';
          clockEl.classList.remove('ac-alarm-on');
          clockEl.classList.remove('ac-ringing');
          alarmRinging = false;
        }
      });

      snoozeBtn.addEventListener('click', function() {
        if (alarmRinging) {
          clockEl.classList.remove('ac-ringing');
          alarmRinging = false;
          statusEl.textContent = 'Snoozed for 5 min';
          var now = new Date();
          now.setMinutes(now.getMinutes() + 5);
          alarmHour = now.getHours();
          alarmMinute = now.getMinutes();
        }
      });

      updateTime();
      setInterval(updateTime, 1000);
    })();
  </script>
</body>
</html>
