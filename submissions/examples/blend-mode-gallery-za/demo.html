<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blend Mode Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Mix Blend Modes</h1>
  <div class="blend-grid">
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#fcd34d,#f472b6)"></div>
        <div class="blend-fg multiply">multiply</div>
      </div>
      <span class="blend-tag">multiply</span>
    </div>
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#67e8f9,#818cf8)"></div>
        <div class="blend-fg screen">screen</div>
      </div>
      <span class="blend-tag">screen</span>
    </div>
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#86efac,#fbbf24)"></div>
        <div class="blend-fg overlay">overlay</div>
      </div>
      <span class="blend-tag">overlay</span>
    </div>
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#c4b5fd,#f9a8d4)"></div>
        <div class="blend-fg difference">differ</div>
      </div>
      <span class="blend-tag">difference</span>
    </div>
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#6ee7b7,#60a5fa)"></div>
        <div class="blend-fg exclusion">exclusion</div>
      </div>
      <span class="blend-tag">exclusion</span>
    </div>
    <div class="blend-card">
      <div class="blend-stage">
        <div class="blend-bg" style="background:linear-gradient(135deg,#fca5a5,#fde68a)"></div>
        <div class="blend-fg hard-light">h-light</div>
      </div>
      <span class="blend-tag">hard-light</span>
    </div>
  </div>
</body>
</html>
