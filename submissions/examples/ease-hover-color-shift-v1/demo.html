<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-color-shift — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; background: #0f0f0f; color: #d1d5db; font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; }
    h1 { color: #ffffff; font-size: 1.75rem; margin-bottom: 0.25rem; }
    p.subtitle { line-height: 1.7; margin-bottom: 2rem; color: #9ca3af; }
    section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    h2 { color: #ffffff; font-size: 1.1rem; margin: 0 0 0.5rem; }
    .sec-desc { font-size: 0.85rem; color: #9ca3af; margin: 0 0 1rem; font-family: monospace; }
    code { background: #2a2a2a; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>ease-hover-color-shift</h1>
  <p class="subtitle">Background color smoothly shifts on hover — pure CSS, no JavaScript.</p>

  <section>
    <h2>Default Shifts</h2>
    <p class="sec-desc">Hover each card to see the background transition</p>
    <div class="demo-grid">
      <div class="card shift-blue">Blue → Purple</div>
      <div class="card shift-green">Green → Teal</div>
      <div class="card shift-amber">Amber → Rose</div>
    </div>
  </section>

  <section>
    <h2>Custom Property</h2>
    <p class="sec-desc">Using <code>--ease-color-shift-to</code> to control the target color</p>
    <div class="demo-grid">
      <div class="card shift-custom" style="--ease-color-shift-to: #22c55e;">→ green</div>
      <div class="card shift-custom" style="--ease-color-shift-to: #a78bfa;">→ purple</div>
      <div class="card shift-custom" style="--ease-color-shift-to: #f59e0b;">→ amber</div>
    </div>
  </section>

</body>
</html>
