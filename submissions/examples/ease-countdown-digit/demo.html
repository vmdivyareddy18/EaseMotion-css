<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Digit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Countdown</h2>
    <div class="countdown">
      <div class="digit" style="--d:1">3</div>
      <div class="digit" style="--d:2">2</div>
      <div class="digit" style="--d:3">1</div>
    </div>
  </div>
</body>
</html>
