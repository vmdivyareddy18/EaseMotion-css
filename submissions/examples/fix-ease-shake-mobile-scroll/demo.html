<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Safe Shake Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Mobile Safe Shake Animation</h1>

    <p>
        Demonstrates a shake animation that avoids horizontal scrollbar flashes on small mobile screens.
    </p>

    <div class="ease-shake-wrapper">

        <div class="ease-shake card">
            Invalid Password
        </div>

    </div>

    <div class="buttons">

        <button class="ease-shake-wrapper">
            <span class="ease-shake">
                Submit Form
            </span>
        </button>

        <button class="ease-shake-wrapper secondary">
            <span class="ease-shake">
                Retry
            </span>
        </button>

    </div>

</div>

</body>
</html>
