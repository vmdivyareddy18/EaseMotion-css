<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>skeleton-shapes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Skeleton Loader Variants</h1>
    <p class="subtitle">Common skeleton shapes with shimmer animation</p>

    <div class="demo-grid">

        <div class="card">
            <div class="card-avatar">
                <div class="ease-skeleton ease-skeleton-circle"></div>
            </div>
            <div class="card-content">
                <div class="ease-skeleton ease-skeleton-heading"></div>
                <div class="ease-skeleton ease-skeleton-text w-80"></div>
                <div class="ease-skeleton ease-skeleton-text w-60"></div>
                <div class="ease-skeleton ease-skeleton-text w-90"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-avatar">
                <div class="ease-skeleton ease-skeleton-circle size-lg"></div>
            </div>
            <div class="card-content">
                <div class="ease-skeleton ease-skeleton-heading"></div>
                <div class="ease-skeleton ease-skeleton-text w-70"></div>
                <div class="ease-skeleton ease-skeleton-text w-50"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-icon">
                <div class="ease-skeleton ease-skeleton-circle size-sm"></div>
            </div>
            <div class="card-content">
                <div class="ease-skeleton ease-skeleton-heading w-60"></div>
                <div class="ease-skeleton ease-skeleton-text w-90"></div>
                <div class="ease-skeleton ease-skeleton-text w-75"></div>
                <div class="ease-skeleton ease-skeleton-text w-85"></div>
            </div>
        </div>

    </div>

    <p class="caption">Shimmer animation runs on loop. Use prefers-reduced-motion to disable.</p>

</div>

</body>
</html>
