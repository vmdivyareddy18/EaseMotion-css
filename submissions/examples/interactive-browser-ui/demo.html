<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Browser UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="browser">

    <aside class="sidebar">

        <div class="sidebar-icon">🏠</div>
        <div class="sidebar-icon">⭐</div>
        <div class="sidebar-icon">📚</div>
        <div class="sidebar-icon">⚙️</div>

    </aside>

    <main class="browser-main">

        <div class="tab-bar">

            <div class="tab active">
                EaseMotion CSS
            </div>

            <div class="tab">
                Documentation
            </div>

            <div class="tab">
                GitHub
            </div>

        </div>

        <div class="toolbar">

            <button>←</button>
            <button>→</button>

            <div class="address-bar">
                https://easemotion.dev
            </div>

        </div>

        <div class="bookmarks">

            <span>Docs</span>
            <span>Components</span>
            <span>Animations</span>
            <span>Examples</span>

        </div>

        <div class="website">

            <h1>EaseMotion CSS</h1>

            <p>
                Build modern interfaces with
                human-readable animation utilities.
            </p>

            <div class="hero-card">
                ⚡ Motion First Design System
            </div>

        </div>

    </main>

    <aside class="downloads">

        <h3>Downloads</h3>

        <div class="download-item">
            easemotion.zip
        </div>

        <div class="download-item">
            docs.pdf
        </div>

    </aside>

</div>

</body>
</html>
