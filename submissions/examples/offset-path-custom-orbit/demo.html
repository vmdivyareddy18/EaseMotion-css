<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - offset-path Custom Orbit Spinners</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0d1117;
        color: #e6edf3;
        margin: 0;
        padding: 4rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3rem;
      }

      h1 {
        margin: 0;
        background: linear-gradient(135deg, #a78bfa, #3b82f6);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-align: center;
      }

      p.desc {
        color: #8b949e;
        text-align: center;
        max-width: 600px;
        line-height: 1.6;
        margin-bottom: 2rem;
      }

      .demo-grid {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 2rem;
        width: 100%;
        max-width: 900px;
      }

      .demo-card {
        background: #161b22;
        border: 1px solid #21262d;
        border-radius: 16px;
        padding: 2.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
        flex: 1;
        min-width: 250px;
      }

      .demo-card h3 {
        margin: 0;
        font-size: 1rem;
        color: #c9d1d9;
      }

      .path-svg {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        pointer-events: none;
      }

      .path-svg path {
        fill: none;
        stroke: #21262d;
        stroke-width: 2;
        stroke-dasharray: 4 4;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>Custom SVG Orbital Spinners</h1>
      <p class="desc">
        Unlike <code>transform: rotate()</code> which is limited to perfect
        circles, <code>offset-path</code> lets you animate elements along any
        arbitrary SVG path vector.
      </p>
    </div>

    <div class="demo-grid">
      <!-- Demo 1: Figure-Eight -->
      <div class="demo-card">
        <h3>Figure-Eight (3 Dots)</h3>
        <div class="orbit-stage figure-eight">
          <!-- Background SVG just to visualize the invisible offset-path -->
          <svg class="path-svg" viewBox="0 0 200 200">
            <path
              d="M 100,100 C 100,100 100,50 150,50 C 200,50 200,150 150,150 C 100,150 100,50 50,50 C 0,50 0,150 50,150 C 100,150 100,100 100,100 Z"
            />
          </svg>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
        </div>
      </div>

      <!-- Demo 2: Pentagon -->
      <div class="demo-card">
        <h3>Pentagon (auto-rotate)</h3>
        <div class="orbit-stage pentagon">
          <svg class="path-svg" viewBox="0 0 200 200">
            <path d="M 100,20 L 176,75 L 147,165 L 53,165 L 24,75 Z" />
          </svg>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
        </div>
      </div>

      <!-- Demo 3: Ellipse with ease-in-out -->
      <div class="demo-card">
        <h3>Ellipse (ease-in-out speed)</h3>
        <div class="orbit-stage ellipse">
          <svg class="path-svg" viewBox="0 0 200 200">
            <path d="M 100,40 A 80,60 0 1,1 99.9,40" />
          </svg>
          <div class="orbit-dot"></div>
          <div class="orbit-dot"></div>
        </div>
      </div>
    </div>
  </body>
</html>
