<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS shimmer pulse Modal (Product Catalog)</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <a href="#modal" class="trigger-btn">Open Modal</a>
  <div id="modal" class="modal-overlay">
    <a href="#" class="backdrop-close" tabindex="-1"></a>
    <div class="modal-window" role="dialog">
      <div class="modal-header">
        <h2 class="modal-title">Product Catalog Modal</h2>
        <a href="#" class="modal-close">&times;</a>
      </div>
      <div class="modal-body">
        <p>This is a pure CSS shimmer pulse modal styled for Product Catalog aesthetics.</p>
      </div>
      <div class="modal-footer">
        <a href="#" class="modal-btn">Cancel</a>
        <a href="#" class="modal-btn modal-btn-primary">Confirm</a>
      </div>
    </div>
  </div>
</body>
</html>
