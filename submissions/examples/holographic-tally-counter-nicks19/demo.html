<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Tally Counter Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #050a0f;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 100% 100%, 30px 30px, 30px 30px;
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #fff;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }
        h3 {
            color: #0ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin: 0;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Daily Step Goal</h3>
        
        <div class="ease-holographic-tally">
            <button class="ease-holo-btn" onclick="updateCounter(-100)">-</button>
            <div class="ease-holo-display" id="counter">8400</div>
            <button class="ease-holo-btn" onclick="updateCounter(100)">+</button>
        </div>
    </div>

    <script>
        let count = 8400;
        const display = document.getElementById('counter');

        function updateCounter(change) {
            count += change;
            display.innerText = count;
            
            // Trigger glitch animation
            display.classList.remove('glitch');
            void display.offsetWidth; // trigger reflow
            display.classList.add('glitch');
        }
    </script>
</body>
</html>
