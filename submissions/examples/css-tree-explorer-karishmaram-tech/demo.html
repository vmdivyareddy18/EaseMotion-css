<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — CSS Folder Tree Explorer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="explorer-wrapper">
    <header class="explorer-header">
      <h1>File Tree Explorer</h1>
      <p>An interactive, nested directory tree optimized with smooth grid-row expansions and zero script interferences.</p>
    </header>

    <div class="ease-tree-container">
      <ul class="ease-file-tree">
        
        <li class="tree-branch">
          <input type="checkbox" id="folder-src" class="tree-toggle-input" checked>
          <label for="folder-src" class="folder-label">
            <span class="folder-icon"></span>src
          </label>
          
          <div class="folder-contents-wrapper">
            <ul class="folder-contents">
              <li class="file-item"><span class="file-icon html-icon"></span>index.html</li>
              <li class="file-item"><span class="file-icon css-icon"></span>style.css</li>
              
              <li class="tree-branch">
                <input type="checkbox" id="folder-components" class="tree-toggle-input">
                <label for="folder-components" class="folder-label">
                  <span class="folder-icon"></span>components
                </label>
                
                <div class="folder-contents-wrapper">
                  <ul class="folder-contents">
                    <li class="file-item"><span class="file-icon js-icon"></span>Header.jsx</li>
                    <li class="file-item"><span class="file-icon js-icon"></span>Footer.jsx</li>
                  </ul>
                </div>
              </li>
              
              <li class="file-item"><span class="file-icon config-icon"></span>vite.config.js</li>
            </ul>
          </div>
        </li>

        <li class="tree-branch">
          <input type="checkbox" id="folder-public" class="tree-toggle-input">
          <label for="folder-public" class="folder-label">
            <span class="folder-icon"></span>public
          </label>
          <div class="folder-contents-wrapper">
            <ul class="folder-contents">
              <li class="file-item"><span class="file-icon asset-icon"></span>favicon.ico</li>
              <li class="file-item"><span class="file-icon asset-icon"></span>logo.svg</li>
            </ul>
          </div>
        </li>

        <li class="file-item"><span class="file-icon readme-icon"></span>README.md</li>
        <li class="file-item"><span class="file-icon package-icon"></span>package.json</li>
      </ul>
    </div>
  </div>

</body>
</html>
