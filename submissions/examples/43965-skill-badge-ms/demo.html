<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skill Badge Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-flex ease-justify-center ease-items-center ease-h-screen ease-bg-neutral-50" style="font-family: system-ui, -apple-system, sans-serif;">
  
  <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
    <div class="ease-skill-badge">
      <span class="ease-skill-badge-icon">⚛️</span>
      React
    </div>
    
    <div class="ease-skill-badge" style="color: #0284c7; background: rgba(2, 132, 199, 0.1); border-color: rgba(2, 132, 199, 0.2);">
      <span class="ease-skill-badge-icon">💧</span>
      CSS
    </div>
    
    <div class="ease-skill-badge" style="color: #15803d; background: rgba(21, 128, 61, 0.1); border-color: rgba(21, 128, 61, 0.2);">
      <span class="ease-skill-badge-icon">🌿</span>
      Node.js
    </div>
  </div>

</body>
</html>
