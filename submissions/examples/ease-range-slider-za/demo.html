<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Range Slider - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="rsl-hdr"><h1>Custom Range Slider</h1><p>CSS-styled range inputs with track, fill, and thumb customization</p></header>
<section class="rsl-sec"><h2>Color Themes</h2>
<div class="rsl-group"><label class="rsl-label">Primary <span class="rsl-val">50</span></label><input type="range" min="0" max="100" value="50" class="rsl-slider rsl-primary"></div>
<div class="rsl-group"><label class="rsl-label">Success <span class="rsl-val">75</span></label><input type="range" min="0" max="100" value="75" class="rsl-slider rsl-success"></div>
<div class="rsl-group"><label class="rsl-label">Danger <span class="rsl-val">25</span></label><input type="range" min="0" max="100" value="25" class="rsl-slider rsl-danger"></div>
<div class="rsl-group"><label class="rsl-label">Gold <span class="rsl-val">60</span></label><input type="range" min="0" max="100" value="60" class="rsl-slider rsl-gold"></div>
<div class="rsl-group"><label class="rsl-label">Purple <span class="rsl-val">40</span></label><input type="range" min="0" max="100" value="40" class="rsl-slider rsl-purple"></div></section>
<section class="rsl-sec"><h2>Sizes</h2>
<div class="rsl-group"><label class="rsl-label">Small</label><input type="range" min="0" max="100" value="30" class="rsl-slider rsl-primary rsl-sm"></div>
<div class="rsl-group"><label class="rsl-label">Default</label><input type="range" min="0" max="100" value="50" class="rsl-slider rsl-primary"></div>
<div class="rsl-group"><label class="rsl-label">Large</label><input type="range" min="0" max="100" value="70" class="rsl-slider rsl-primary rsl-lg"></div></section>
<section class="rsl-sec"><h2>Thumb Shapes</h2>
<div class="rsl-group"><label class="rsl-label">Circle <span class="rsl-val">45</span></label><input type="range" min="0" max="100" value="45" class="rsl-slider rsl-primary rsl-circle"></div>
<div class="rsl-group"><label class="rsl-label">Square <span class="rsl-val">55</span></label><input type="range" min="0" max="100" value="55" class="rsl-slider rsl-success rsl-square"></div>
<div class="rsl-group"><label class="rsl-label">Pill <span class="rsl-val">65</span></label><input type="range" min="0" max="100" value="65" class="rsl-slider rsl-gold rsl-pill"></div></section>
<section class="rsl-sec"><h2>Disabled State</h2>
<div class="rsl-group"><label class="rsl-label">Disabled</label><input type="range" min="0" max="100" value="35" class="rsl-slider rsl-primary" disabled></div></section>
<footer class="ftr"><p>EaseMotion - Range Slider | GSSoC 2026</p></footer>
</body>
</html>
