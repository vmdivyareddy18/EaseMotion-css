<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

3D Flip Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<div class="container">

<div class="badge">

Responsive Dashboard

</div>

<h1>

3D Flip Tooltip

</h1>

<p>

A modern dashboard tooltip
interaction featuring a smooth
3D flip transition designed
for analytics interfaces.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Show Insights

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="metric">

92%

</div>

<h3>

Performance Score

</h3>

<p>

Track key metrics with an
interactive tooltip optimized
for responsive dashboards
and analytics platforms.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
