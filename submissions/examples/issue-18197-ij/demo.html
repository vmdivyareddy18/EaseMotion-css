<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Indicator – Issue 18197</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Typing Indicator</h1>
    <p class="subtitle">Three dots animate as if someone is typing</p>
    <div class="typing-indicator" id="typingIndicator">
      <span class="dot" style="--dot-i:0;"></span>
      <span class="dot" style="--dot-i:1;"></span>
      <span class="dot" style="--dot-i:2;"></span>
    </div>
  </div>
</body>
</html>
