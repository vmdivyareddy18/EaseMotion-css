<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech Tada Click Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <a href="#modal" class="open-btn">Open Tech Panel</a>
</div>

<div id="modal" class="overlay">

    <div class="modal" tabindex="0">

        <a href="#" class="close-btn" aria-label="Close">&times;</a>

        <div class="icon">⚡</div>

        <h2>Developer Console</h2>

        <p>
            Your workspace is synchronized and all development services are online.
        </p>

        <div class="info-grid">

            <div>
                <strong>API</strong>
                <span>Healthy</span>
            </div>

            <div>
                <strong>Database</strong>
                <span>Connected</span>
            </div>

            <div>
                <strong>Storage</strong>
                <span>Available</span>
            </div>

        </div>

        <button class="action-btn">
            Continue
        </button>

    </div>

</div>

</body>
</html>
