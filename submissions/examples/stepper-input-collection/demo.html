<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Stepper Input Collection - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated Stepper Input</h1>
      <p>A highly tactile counter component featuring directional entry bumps, interactive click feedback, and boundary-limit alerts.</p>
    </header>

    <div class="ease-stepper" id="stepper-widget">
      <button class="ease-stepper-btn" id="dec-btn" aria-label="Decrease">−</button>
      <span class="ease-stepper-value" id="stepper-val">1</span>
      <button class="ease-stepper-btn" id="inc-btn" aria-label="Increase">+</button>
    </div>
    
    <div class="boundary-caption">Min Bound: 1 | Max Bound: 5</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const stepper = document.getElementById('stepper-widget');
      const valueEl = document.getElementById('stepper-val');
      const decBtn = document.getElementById('dec-btn');
      const incBtn = document.getElementById('inc-btn');

      let currentVal = 1;
      const MIN_LIMIT = 1;
      const MAX_LIMIT = 5;

      // Reset animation wrapper helper
      function resetAnimation(element, className) {
        element.classList.remove(className);
        void element.offsetWidth; // Force layout re-calculation to re-trigger keyframe
        element.classList.add(className);
      }

      // --- Increment Event ---
      incBtn.addEventListener('click', () => {
        if (currentVal < MAX_LIMIT) {
          currentVal++;
          valueEl.textContent = currentVal;
          // Apply directional translation/scale bump going UP
          resetAnimation(valueEl, 'ease-stepper-value-bump-up');
        } else {
          // Fire boundary error shake across entire stepper frame
          resetAnimation(stepper, 'ease-stepper-limit-shake');
        }
      });

      // --- Decrement Event ---
      decBtn.addEventListener('click', () => {
        if (currentVal > MIN_LIMIT) {
          currentVal--;
          valueEl.textContent = currentVal;
          // Apply directional translation/scale bump going DOWN
          resetAnimation(valueEl, 'ease-stepper-value-bump-down');
        } else {
          // Fire boundary error shake across entire stepper frame
          resetAnimation(stepper, 'ease-stepper-limit-shake');
        }
      });

      // Handle cleaning up classes cleanly after animation intervals finish
      valueEl.addEventListener('animationend', (e) => {
        valueEl.classList.remove('ease-stepper-value-bump-up', 'ease-stepper-value-bump-down');
      });

      stepper.addEventListener('animationend', () => {
        stepper.classList.remove('ease-stepper-limit-shake');
      });
    });
  </script>
</body>
</html>
