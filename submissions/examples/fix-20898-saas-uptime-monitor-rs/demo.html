<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Uptime Monitor</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="uptime-container">
        <div class="header">
            <h1>Never Miss a <span class="accent-green">Downtime</span></h1>
            <p>Get instant alerts via Slack, SMS, or Email the second your services go offline. Know before your customers do.</p>
        </div>

        <div class="monitor-dashboard">
            <div class="dash-header">
                <div class="service-name">api.production.main</div>
                <div class="status-badge">
                    <span class="pulse-dot"></span> Operational
                </div>
            </div>

            <!-- Uptime Timeline Grid -->
            <div class="uptime-timeline">
                <div class="day-col">
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                </div>
                <div class="day-col">
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                </div>
                <!-- Simulated Downtime Event -->
                <div class="day-col down-event">
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-down glitch"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    
                    <!-- Alert Tooltip -->
                    <div class="alert-tooltip">
                        <strong>Downtime Detected</strong>
                        <span>14 mins - HTTP 502</span>
                    </div>
                </div>
                <div class="day-col">
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                </div>
                <div class="day-col">
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                    <div class="block b-ok"></div>
                </div>
            </div>
            
            <div class="dash-footer">
                <span>99.98% Uptime</span>
                <span>Last 30 Days</span>
            </div>
        </div>
    </div>
</body>
</html>
