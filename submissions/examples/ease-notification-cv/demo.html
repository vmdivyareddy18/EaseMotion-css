<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Notification Badge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Notification Badge</h1>

<h2>Pulse Badge</h2>

<div class="icon">
    🔔
    <span class="badge pulse">3</span>
</div>

<h2>Bounce Badge</h2>

<div class="icon">
    💬
    <span class="badge bounce">12</span>
</div>

<h2>Glow Badge</h2>

<div class="icon">
    🛒
    <span class="badge glow">99+</span>
</div>

</div>

</body>
</html>
