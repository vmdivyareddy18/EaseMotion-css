<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Interactive Image Hotspots</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--ease-color-neutral-50);
            padding: 40px 20px;
        }
        
        /* Just for demo aesthetics */
        .hotspot-price {
            font-weight: 800;
            color: var(--ease-color-primary);
            margin-top: var(--ease-space-2);
        }
    </style>
</head>
<body class="ease-text-primary">

    <div class="ease-container ease-stack-lg" style="max-width: 1000px;">
        <div class="ease-text-center ease-fade-in ease-slide-down">
            <h1 class="ease-text-3xl ease-font-bold ease-mb-2">Shop the Room</h1>
            <p class="ease-text-muted">Hover over the pulsating dots to view product details.</p>
        </div>

        <div class="ease-hotspot-container ease-fade-in ease-delay-200">
            <!-- Background Image -->
            <img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=1200&q=80" alt="Modern Living Room Setup" />
            
            <!-- Hotspot 1: The Lamp (Top Leftish) -->
            <div class="ease-hotspot" style="top: 25%; left: 35%;" tabindex="0" aria-label="View Lamp details">
                <div class="ease-hotspot-marker"></div>
                <div class="ease-hotspot-card">
                    <h4 class="ease-text-sm ease-font-bold">Nordic Floor Lamp</h4>
                    <p class="ease-text-xs ease-text-muted ease-mt-1">Matte black finish with adjustable arm.</p>
                    <div class="hotspot-price">$89.99</div>
                    <button class="ease-btn ease-btn-sm ease-btn-primary ease-mt-3 ease-w-full">View Item</button>
                </div>
            </div>

            <!-- Hotspot 2: The Sofa (Center) -->
            <div class="ease-hotspot" style="top: 65%; left: 55%;" tabindex="0" aria-label="View Sofa details">
                <div class="ease-hotspot-marker"></div>
                <div class="ease-hotspot-card">
                    <h4 class="ease-text-sm ease-font-bold">Lounge Sofa</h4>
                    <p class="ease-text-xs ease-text-muted ease-mt-1">Three-seater in premium grey linen.</p>
                    <div class="hotspot-price">$849.00</div>
                    <button class="ease-btn ease-btn-sm ease-btn-primary ease-mt-3 ease-w-full">View Item</button>
                </div>
            </div>

            <!-- Hotspot 3: The Plant (Bottom Right) -->
            <!-- We add ease-tooltip-top so the card pops up instead of down, preventing it from clipping out of the image -->
            <div class="ease-hotspot ease-tooltip-top" style="top: 80%; left: 85%;" tabindex="0" aria-label="View Plant details">
                <div class="ease-hotspot-marker"></div>
                <div class="ease-hotspot-card">
                    <h4 class="ease-text-sm ease-font-bold">Monstera Deliciosa</h4>
                    <p class="ease-text-xs ease-text-muted ease-mt-1">Large indoor plant in ceramic pot.</p>
                    <div class="hotspot-price">$35.00</div>
                    <button class="ease-btn ease-btn-sm ease-btn-primary ease-mt-3 ease-w-full">View Item</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
