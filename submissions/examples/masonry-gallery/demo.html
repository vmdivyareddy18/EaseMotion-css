<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="masonry">
    <div class="item">
      <img src="https://via.placeholder.com/400x300/3b82f6/ffffff" alt="1">
      <div class="overlay">Image 1</div>
    </div>
    <div class="item">
      <img src="https://via.placeholder.com/400x500/ef4444/ffffff" alt="2">
      <div class="overlay">Image 2</div>
    </div>
    <div class="item">
      <img src="https://via.placeholder.com/400x250/22c55e/ffffff" alt="3">
      <div class="overlay">Image 3</div>
    </div>
    <div class="item">
      <img src="https://via.placeholder.com/400x600/f59e0b/ffffff" alt="4">
      <div class="overlay">Image 4</div>
    </div>
  </div>
</body>
</html>
