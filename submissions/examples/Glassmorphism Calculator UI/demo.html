<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Calculator UI</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">

    <!-- Example Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="ease-center">

    <section class="calculator ease-fade-in">

        <div class="display ease-slide-up" id="display">
            0
        </div>

        <div class="buttons">

            <button class="ease-btn ease-hover-grow" data-action="clear">AC</button>
            <button class="ease-btn ease-hover-grow" data-action="backspace">⌫</button>
            <button class="ease-btn ease-hover-grow" data-value="%">%</button>
            <button class="ease-btn ease-btn-primary ease-hover-grow" data-value="/">÷</button>

            <button class="ease-btn ease-hover-grow" data-value="7">7</button>
            <button class="ease-btn ease-hover-grow" data-value="8">8</button>
            <button class="ease-btn ease-hover-grow" data-value="9">9</button>
            <button class="ease-btn ease-btn-primary ease-hover-grow" data-value="*">×</button>

            <button class="ease-btn ease-hover-grow" data-value="4">4</button>
            <button class="ease-btn ease-hover-grow" data-value="5">5</button>
            <button class="ease-btn ease-hover-grow" data-value="6">6</button>
            <button class="ease-btn ease-btn-primary ease-hover-grow" data-value="-">−</button>

            <button class="ease-btn ease-hover-grow" data-value="1">1</button>
            <button class="ease-btn ease-hover-grow" data-value="2">2</button>
            <button class="ease-btn ease-hover-grow" data-value="3">3</button>
            <button class="ease-btn ease-btn-primary ease-hover-grow" data-value="+">+</button>

            <button class="ease-btn ease-hover-grow zero" data-value="0">0</button>
            <button class="ease-btn ease-hover-grow" data-value=".">.</button>
            <button class="ease-btn ease-btn-primary ease-hover-grow" data-action="calculate">=</button>

        </div>

    </section>

</main>

<script>
const display = document.getElementById("display");
const buttons = document.querySelectorAll(".buttons button");

let expression = "";

function updateDisplay() {
    display.textContent = expression || "0";
}

buttons.forEach(button => {
    button.addEventListener("click", () => {

        const value = button.dataset.value;
        const action = button.dataset.action;

        if (action === "clear") {
            expression = "";
            updateDisplay();
            return;
        }

        if (action === "backspace") {
            expression = expression.slice(0, -1);
            updateDisplay();
            return;
        }

        if (action === "calculate") {

            if (expression.trim() === "") return;

            try {
                const result = Function('"use strict"; return (' + expression + ')')();

                if (!isFinite(result)) {
                    display.textContent = "Error";
                    expression = "";
                    return;
                }

                expression = String(result);
                updateDisplay();

            } catch {
                display.textContent = "Error";
                expression = "";
            }

            return;
        }

        expression += value;
        updateDisplay();

    });
});

// Keyboard Support
document.addEventListener("keydown", (e) => {

    const allowed = "0123456789+-*/.%";

    if (allowed.includes(e.key)) {
        expression += e.key;
        updateDisplay();
    }

    if (e.key === "Enter") {
        e.preventDefault();

        try {
            expression = String(
                Function('"use strict"; return (' + expression + ')')()
            );
            updateDisplay();
        } catch {
            display.textContent = "Error";
            expression = "";
        }
    }

    if (e.key === "Backspace") {
        expression = expression.slice(0, -1);
        updateDisplay();
    }

    if (e.key === "Escape") {
        expression = "";
        updateDisplay();
    }

});
</script>

</body>
</html>
