<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direction-Aware Slide Animations | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="slide-showcase-wrapper">
    <header class="showcase-header">
      <h1>Diagonal Slide Animations</h1>
      <p>A proposal for <code>core/animations.css</code> to add diagonal entry animations.</p>
    </header>

    <div class="demo-area">
      <div class="demo-grid">
        <div class="slide-box ease-slide-in-top-left">Top Left</div>
        <div class="slide-box ease-slide-in-top-right">Top Right</div>
        <div class="slide-box ease-slide-in-bottom-left">Bottom Left</div>
        <div class="slide-box ease-slide-in-bottom-right">Bottom Right</div>
      </div>
    </div>
    
    <div class="controls">
      <button class="replay-btn" onclick="replayAnimations()">Replay Animations</button>
    </div>
  </div>

  <!-- Tiny JS snippet ONLY for the demo reset button. The CSS animations are pure CSS -->
  <script>
    function replayAnimations() {
      const boxes = document.querySelectorAll('.slide-box');
      boxes.forEach(box => {
        box.style.animation = 'none';
        box.offsetHeight; /* trigger reflow */
        box.style.animation = null; 
      });
    }
  </script>
</body>
</html>
