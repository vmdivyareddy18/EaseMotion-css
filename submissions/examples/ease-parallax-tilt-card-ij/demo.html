<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Tilt Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Parallax Tilt</h1>
    <p class="desc">Card tilts with mouse position — CSS handles perspective via --tilt-x and --tilt-y</p>
    <div class="tilt-card" id="tiltCard" style="--tilt-x: 0deg; --tilt-y: 0deg;">
      <div class="tilt-inner">
        <div class="tilt-icon">✦</div>
        <h2>Interactive Card</h2>
        <p>Move mouse to tilt</p>
      </div>
    </div>
  </div>
  <script>
    const card = document.getElementById('tiltCard');

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const y = (e.clientY - rect.top) / rect.height;
      const tiltX = (y - 0.5) * -20;
      const tiltY = (x - 0.5) * 20;
      card.style.setProperty('--tilt-x', `${tiltX}deg`);
      card.style.setProperty('--tilt-y', `${tiltY}deg`);
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--tilt-x', '0deg');
      card.style.setProperty('--tilt-y', '0deg');
    });
  </script>
</body>
</html>
