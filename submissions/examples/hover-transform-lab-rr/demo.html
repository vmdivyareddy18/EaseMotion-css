<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Transformation Laboratory</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🧪 Hover Transformation Laboratory</h1>
        <p>Explore common CSS transform effects through interactive hover demonstrations.</p>
    </header>

    <section class="lab-grid">

        <div class="transform-card scale">
            <h3>Scale</h3>
            <p>Grows on hover</p>
        </div>

        <div class="transform-card rotate">
            <h3>Rotate</h3>
            <p>Rotates on hover</p>
        </div>

        <div class="transform-card translate">
            <h3>Translate</h3>
            <p>Moves upward</p>
        </div>

        <div class="transform-card skew">
            <h3>Skew</h3>
            <p>Skews on hover</p>
        </div>

        <div class="transform-card flip">
            <h3>Flip</h3>
            <p>Horizontal flip effect</p>
        </div>

        <div class="transform-card rotate3d">
            <h3>3D Rotate</h3>
            <p>Perspective rotation</p>
        </div>

    </section>

</div>

</body>
</html>
