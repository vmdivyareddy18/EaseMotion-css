<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimalist Tech Swing Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Workspace
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="status-dot"></div>

        <h2>Minimal Workspace</h2>

        <p>
            A clean, distraction-free modal built with pure HTML and CSS,
            featuring a smooth Swing-Hover animation.
        </p>

        <div class="info-grid">

            <div class="info-card">
                <span>Projects</span>
                <strong>12</strong>
            </div>

            <div class="info-card">
                <span>Tasks</span>
                <strong>28</strong>
            </div>

            <div class="info-card">
                <span>Updates</span>
                <strong>5</strong>
            </div>

        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
