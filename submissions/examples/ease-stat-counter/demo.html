<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-stat-counter – Animated Statistics Counter</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Trusted by Thousands</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Our impact in numbers.</p>

    <!-- Stats grid -->
    <div class="stat-grid ease-grid ease-grid-cols-2 ease-md-grid-cols-4 ease-gap-8 ease-max-w-4xl ease-mx-auto">
      <div class="stat-card ease-text-center ease-fade-in">
        <div class="stat-number" data-target="120" data-suffix="K+">0</div>
        <p class="stat-label ease-text-sm ease-text-gray-500 ease-mt-2">Active Users</p>
      </div>
      <div class="stat-card ease-text-center ease-fade-in">
        <div class="stat-number" data-target="45" data-suffix="M+">0</div>
        <p class="stat-label ease-text-sm ease-text-gray-500 ease-mt-2">Downloads</p>
      </div>
      <div class="stat-card ease-text-center ease-fade-in">
        <div class="stat-number" data-target="99" data-suffix="%">0</div>
        <p class="stat-label ease-text-sm ease-text-gray-500 ease-mt-2">Uptime</p>
      </div>
      <div class="stat-card ease-text-center ease-fade-in">
        <div class="stat-number" data-target="500" data-suffix="+">0</div>
        <p class="stat-label ease-text-sm ease-text-gray-500 ease-mt-2">Team Members</p>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">Numbers count up when visible (IntersectionObserver).</p>
  </div>

  <script>
    const counters = document.querySelectorAll('.stat-number');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const target = parseInt(el.dataset.target);
          const suffix = el.dataset.suffix || '';
          animateValue(el, 0, target, 2000, suffix);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.3 });

    counters.forEach(counter => observer.observe(counter));

    function animateValue(el, start, end, duration, suffix) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const current = Math.floor(progress * (end - start) + start);
        el.textContent = current + suffix;
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      };
      window.requestAnimationFrame(step);
    }
  </script>

</body>
</html>
