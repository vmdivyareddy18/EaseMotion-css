<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Health Compass</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="compass-shell" aria-labelledby="compass-title">
    <section class="compass-panel">
      <div class="copy">
        <p class="eyebrow">operations queue</p>
        <h1 id="compass-title">Queue health compass</h1>
        <p>A directional health indicator rotates toward the busiest queue while supporting metrics settle into view.</p>
      </div>

      <div class="compass-card" aria-label="Queue health compass">
        <div class="dial">
          <span class="needle"></span>
          <span class="north">N</span>
          <span class="south">S</span>
        </div>
        <div class="metrics">
          <span><strong>Backlog</strong> 124</span>
          <span><strong>Oldest</strong> 18m</span>
          <span><strong>Drain</strong> 72%</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
