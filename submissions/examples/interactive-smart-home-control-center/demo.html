<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Home Control Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="header">

        <h1>Smart Home</h1>

        <div class="status">
            🟢 All Systems Online
        </div>

    </header>

    <section class="overview">

        <div class="overview-card">
            <h3>Energy Usage</h3>
            <span>12.4 kWh</span>
        </div>

        <div class="overview-card">
            <h3>Temperature</h3>
            <span>22°C</span>
        </div>

        <div class="overview-card">
            <h3>Security</h3>
            <span>Secure</span>
        </div>

    </section>

    <section class="rooms">

        <div class="room-card">
            <div class="room-icon">💡</div>
            <h3>Living Room</h3>
            <p>Lights Active</p>
        </div>

        <div class="room-card">
            <div class="room-icon">❄️</div>
            <h3>Bedroom</h3>
            <p>Climate Control</p>
        </div>

        <div class="room-card">
            <div class="room-icon">📺</div>
            <h3>Entertainment</h3>
            <p>Media Center</p>
        </div>

        <div class="room-card">
            <div class="room-icon">🔒</div>
            <h3>Security</h3>
            <p>Monitoring Active</p>
        </div>

    </section>

    <section class="security-panel">

        <h2>Security Center</h2>

        <div class="security-item">
            Front Door Locked
        </div>

        <div class="security-item">
            Garage Closed
        </div>

        <div class="security-item">
            Cameras Online
        </div>

    </section>

</div>

</body>
</html>
