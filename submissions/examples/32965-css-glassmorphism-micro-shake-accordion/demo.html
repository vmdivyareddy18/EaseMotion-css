<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Shake Accordion - Glassmorphism UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Abstract colorful background for glassmorphism effect -->
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="glass-layout">
        
        <header class="glass-header">
            <h1>Creative Cloud Settings</h1>
            <p>Manage your preferences and workspace configurations.</p>
        </header>

        <main class="accordion-container">
            
            <div class="shake-accordion">
                
                <!-- Section 1 -->
                <div class="accordion-item glass-panel">
                    <input type="radio" name="glass-accordion" id="setting-1" class="accordion-toggle" aria-hidden="true" checked>
                    
                    <label for="setting-1" class="accordion-trigger" tabindex="0">
                        <div class="trigger-left">
                            <span class="icon-circle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </span>
                            <div class="title-group">
                                <h2 class="title">Appearance</h2>
                                <span class="subtitle">Theme & Typography</span>
                            </div>
                        </div>
                        <div class="trigger-right">
                            <span class="chevron">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </span>
                        </div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="glass-block">
                                <div class="setting-row">
                                    <span>Dark Mode</span>
                                    <div class="toggle-switch active"></div>
                                </div>
                                <div class="setting-row">
                                    <span>Vibrancy Effect</span>
                                    <div class="toggle-switch active"></div>
                                </div>
                                <div class="setting-row">
                                    <span>Accent Color</span>
                                    <div class="color-picker">
                                        <div class="swatch c1"></div>
                                        <div class="swatch c2"></div>
                                        <div class="swatch c3 active"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2 -->
                <div class="accordion-item glass-panel">
                    <input type="radio" name="glass-accordion" id="setting-2" class="accordion-toggle" aria-hidden="true">
                    
                    <label for="setting-2" class="accordion-trigger" tabindex="0">
                        <div class="trigger-left">
                            <span class="icon-circle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6"></path><path d="M21 13a9 9 0 1 1-3-7.7L21 8"></path></svg>
                            </span>
                            <div class="title-group">
                                <h2 class="title">Synchronization</h2>
                                <span class="subtitle">Cloud saves & backups</span>
                            </div>
                        </div>
                        <div class="trigger-right">
                            <span class="chevron">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </span>
                        </div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="glass-block">
                                <div class="setting-row">
                                    <span>Auto-sync Assets</span>
                                    <div class="toggle-switch active"></div>
                                </div>
                                <div class="setting-row">
                                    <span>Download over Cellular</span>
                                    <div class="toggle-switch"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 3 -->
                <div class="accordion-item glass-panel">
                    <input type="radio" name="glass-accordion" id="setting-3" class="accordion-toggle" aria-hidden="true">
                    
                    <label for="setting-3" class="accordion-trigger" tabindex="0">
                        <div class="trigger-left">
                            <span class="icon-circle">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            </span>
                            <div class="title-group">
                                <h2 class="title">Privacy & Security</h2>
                                <span class="subtitle">Data sharing & permissions</span>
                            </div>
                        </div>
                        <div class="trigger-right">
                            <span class="chevron">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                            </span>
                        </div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="glass-block">
                                <div class="setting-row">
                                    <span>Share Crash Reports</span>
                                    <div class="toggle-switch active"></div>
                                </div>
                                <div class="setting-row">
                                    <span>Analytics Tracking</span>
                                    <div class="toggle-switch"></div>
                                </div>
                                <button class="glass-btn">Manage Data</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
