<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Renewal Reminder Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card-container">

    <div class="renewal-card">

        <div class="badge">
            Renewal Soon
        </div>

        <div class="icon">
            🔔
        </div>

        <h1>Pro Subscription</h1>

        <p class="description">
            Your subscription will renew automatically in
            <strong>5 days</strong>.
        </p>

        <div class="countdown">

            <div class="count-box">
                <span>05</span>
                <small>Days</small>
            </div>

            <div class="count-box">
                <span>14</span>
                <small>Hours</small>
            </div>

            <div class="count-box">
                <span>22</span>
                <small>Mins</small>
            </div>

        </div>

        <div class="billing-info">

            <div class="row">
                <span>Plan</span>
                <strong>Pro Annual</strong>
            </div>

            <div class="row">
                <span>Renewal Date</span>
                <strong>July 12, 2026</strong>
            </div>

            <div class="row">
                <span>Amount</span>
                <strong>$99.00</strong>
            </div>

            <div class="row">
                <span>Auto Renew</span>
                <strong class="active-status">
                    Enabled
                </strong>
            </div>

        </div>

        <div class="progress-section">

            <div class="progress-label">
                <span>Renewal Countdown</span>
                <span>83%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="actions">

            <button class="primary-btn">
                Renew Now
            </button>

            <button class="secondary-btn">
                Manage Plan
            </button>

        </div>

    </div>

</div>

</body>
</html>
