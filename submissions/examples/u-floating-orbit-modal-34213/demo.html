<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Floating Orbit Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Minimalist Tech

</span>

<h1>

Floating Orbit Modal

</h1>

<p>

A lightweight modal featuring
floating orbit decorations
for clean modern interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Launch Modal

</label>

<div class="overlay">

<div class="modal">

<div class="orbit orbit-1"></div>

<div class="orbit orbit-2"></div>

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

◎

</div>

<h2>

Minimal Experience

</h2>

<p>

Elegant floating orbit
motion for modern
technology interfaces.

</p>

<button>

Continue

</button>

</div>

</div>

</div>

</section>

</body>

</html>
