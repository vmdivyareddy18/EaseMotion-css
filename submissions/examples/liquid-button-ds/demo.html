<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Fill Button</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="demo-panel" aria-labelledby="demo-heading">
      <header class="demo-header">
        <p class="label">Interactive CTA</p>
        <h1 id="demo-heading">Liquid Fill Button</h1>
        <p class="description">
          Hover over the button to watch a smooth liquid wave rise from the bottom and fill the button with color.
        </p>
      </header>

      <div class="button-row">
        <button class="liquid-button" type="button">
          Start Your Flow
        </button>
      </div>
    </section>
  </main>
</body>
</html>
