<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Focus Ring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Focus Ring</h1>
    <p class="subtitle">Use keyboard (Tab) to navigate and see the animated focus ring on each element.</p>
    <div class="display-area" style="flex-direction:column; gap:0.5rem; padding:1.5rem;">
      <div class="focus-demo">
        <button>Button</button>
        <a href="#">Link</a>
        <input type="text" placeholder="Text input">
        <label><input type="checkbox"> Checkbox</label>
      </div>
    </div>
    <p style="color:var(--color-text-muted);font-size:0.85rem;">
      Focus ring color uses <code>--ease-focus-color</code> (default #3b82f6).
      Outline animates in smoothly on <code>:focus-visible</code>.
    </p>
  </div>
</body>
</html>
