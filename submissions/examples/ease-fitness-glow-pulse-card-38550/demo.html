<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Fitness Glow Pulse Card — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: center;
      justify-content: center;
      padding: 50px;
      background: #05060a;
    }
  </style>
</head>
<body>

  <div class="ease-fitness-card" tabindex="0">
    <div class="card-content">
      <div class="card-stat-ring">
        <div class="card-stat-ring-inner">🔥</div>
      </div>
      <p class="card-metric">842</p>
      <h3 class="card-title">Calories Burned</h3>
      <p class="card-description">72% of your daily goal reached.</p>
      <span class="card-tag">⚡ Live Tracking</span>
    </div>
  </div>

  <div class="ease-fitness-card" tabindex="0" style="--glow-color: rgba(0,240,255,0.4); --glow-color-soft: rgba(163,255,0,0.3); --accent: #00f0ff;">
    <div class="card-content">
      <div class="card-stat-ring">
        <div class="card-stat-ring-inner">👟</div>
      </div>
      <p class="card-metric">9,214</p>
      <h3 class="card-title">Steps Today</h3>
      <p class="card-description">Great pace — 1.2k steps above average.</p>
      <span class="card-tag">⚡ Live Tracking</span>
    </div>
  </div>

</body>
</html>
