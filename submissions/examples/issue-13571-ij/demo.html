<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-cookie-banner - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-cookie-banner</h1>
    <p class="content-text">The cookie consent banner will slide up from the bottom. Click "Accept" or "Decline" to dismiss it with animation.</p>
  </div>
  <div class="cookie-banner show" id="cookieBanner">
    <div class="cookie-content">
      <p><strong>🍪 We use cookies</strong><br>This site uses cookies to improve your experience. By continuing, you agree to our use of cookies.</p>
      <div class="cookie-buttons">
        <button class="btn btn-accept" onclick="dismissCookie()">Accept</button>
        <button class="btn btn-decline" onclick="dismissCookie()">Decline</button>
      </div>
    </div>
  </div>
  <script>
    function dismissCookie() {
      const banner = document.getElementById('cookieBanner');
      banner.classList.add('dismissing');
      setTimeout(() => {
        banner.style.display = 'none';
      }, 400);
    }
  </script>
</body>
</html>
