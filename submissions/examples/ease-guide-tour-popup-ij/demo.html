<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guide Tour Popup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'popup-bg') root.style.setProperty('--popup-bg', t.value);
      if (t.name === 'accent-color') root.style.setProperty('--accent-color', t.value);
      if (t.name === 'step-color') root.style.setProperty('--step-color', t.value);
      if (t.name === 'transition-speed') root.style.setProperty('--transition-speed', t.value + 's');
    });
    const steps = ['Welcome! Let us walk you through the key features.','Click the search icon to expand the search bar.','Use the color pickers to customize the theme.',"That's it! You're all set to explore."];
    let cs = 0;
    document.addEventListener('DOMContentLoaded', () => { update(); document.querySelector('.next').onclick = next; document.querySelector('.prev').onclick = prev; });
    function update() {
      document.querySelector('.tour-text').textContent = steps[cs];
      document.querySelectorAll('.step-dot').forEach((d, i) => { d.className = 'step-dot'; if (i === cs) d.classList.add('active'); else if (i < cs) d.classList.add('completed'); });
      document.querySelector('.prev').disabled = cs === 0;
      document.querySelector('.next').textContent = cs === steps.length - 1 ? 'Finish' : 'Next';
    }
    function next() { if (cs < steps.length - 1) { cs++; update(); } }
    function prev() { if (cs > 0) { cs--; update(); } }
  </script>
  <div class="container">
    <p class="title">Guide Tour Popup</p>
    <div class="tour-popup">
      <div class="tour-content">
        <div class="tour-step-indicators">
          <span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span><span class="step-dot"></span>
        </div>
        <div class="tour-text"></div>
      </div>
      <div class="tour-actions">
        <button class="tour-btn prev" disabled>Back</button>
        <button class="tour-btn next">Next</button>
      </div>
    </div>
    <div class="controls">
      <label>BG: <input type="color" name="popup-bg" value="#2d2d44"></label>
      <label>Accent: <input type="color" name="accent-color" value="#4ecdc4"></label>
      <label>Step: <input type="color" name="step-color" value="#ffd93d"></label>
      <label>Speed: <input type="range" name="transition-speed" min="0.1" max="1" step="0.05" value="0.3"></label>
    </div>
  </div>
</body>
</html>
