<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Cyberpunk Neon Tilt Hover Button</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0014 0%, #1a0033 50%, #0d001f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      padding: 2rem;
      gap: 4rem;
    }

    header {
      text-align: center;
      max-width: 600px;
      margin-bottom: 2rem;
    }

    h1 {
      color: #00ffff;
      font-size: clamp(1.5rem, 5vw, 2.5rem);
      margin-bottom: 0.5rem;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.5), 0 0 40px rgba(255, 0, 255, 0.3);
      letter-spacing: 2px;
    }

    p {
      color: #b0b0b0;
      font-size: 0.875rem;
      line-height: 1.6;
      margin-top: 0.5rem;
    }

    section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      width: 100%;
    }

    .demo-group {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      width: 100%;
    }

    .demo-label {
      color: #00ffff;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      opacity: 0.7;
    }

    @media (max-width: 768px) {
      body {
        gap: 2rem;
        padding: 1rem;
      }

      .demo-group {
        gap: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>⚡ Cyberpunk Neon Tilt</h1>
    <p>Pure CSS 3D perspective hover animation. No JavaScript required. Smooth, responsive, and keyboard accessible.</p>
  </header>

  <!-- Primary Neon Buttons -->
  <section>
    <div class="demo-label">Primary Neon (Cyan)</div>
    <div class="demo-group">
      <button class="neon-tilt-btn neon-cyan">ACTIVATE</button>
      <button class="neon-tilt-btn neon-cyan">ENGAGE</button>
      <button class="neon-tilt-btn neon-cyan">EXECUTE</button>
    </div>
  </section>

  <!-- Secondary Neon Buttons -->
  <section>
    <div class="demo-label">Secondary Neon (Magenta)</div>
    <div class="demo-group">
      <button class="neon-tilt-btn neon-magenta">INFILTRATE</button>
      <button class="neon-tilt-btn neon-magenta">DECRYPT</button>
      <button class="neon-tilt-btn neon-magenta">LAUNCH</button>
    </div>
  </section>

  <!-- Tertiary Neon Buttons -->
  <section>
    <div class="demo-label">Tertiary Neon (Purple)</div>
    <div class="demo-group">
      <button class="neon-tilt-btn neon-purple">SYNC</button>
      <button class="neon-tilt-btn neon-purple">UPLOAD</button>
      <button class="neon-tilt-btn neon-purple">TRANSMIT</button>
    </div>
  </section>

  <!-- Accent Neon Buttons -->
  <section>
    <div class="demo-label">Accent Neon (Lime)</div>
    <div class="demo-group">
      <button class="neon-tilt-btn neon-lime">CONFIRM</button>
      <button class="neon-tilt-btn neon-lime">PROCEED</button>
      <button class="neon-tilt-btn neon-lime">CONNECT</button>
    </div>
  </section>

  <!-- Responsive Button Sizes -->
  <section>
    <div class="demo-label">Responsive Sizes</div>
    <div class="demo-group" style="gap: 1rem;">
      <button class="neon-tilt-btn neon-cyan" style="--btn-size: 0.75;">SMALL</button>
      <button class="neon-tilt-btn neon-cyan" style="--btn-size: 1;">MEDIUM</button>
      <button class="neon-tilt-btn neon-cyan" style="--btn-size: 1.25;">LARGE</button>
    </div>
  </section>

  <!-- Disabled State -->
  <section>
    <div class="demo-label">Disabled State</div>
    <div class="demo-group">
      <button class="neon-tilt-btn neon-cyan" disabled>LOCKED</button>
      <button class="neon-tilt-btn neon-magenta" disabled>OFFLINE</button>
      <button class="neon-tilt-btn neon-purple" disabled>INACTIVE</button>
    </div>
  </section>

</body>
</html>
