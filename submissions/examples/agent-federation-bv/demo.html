<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal AI Security Agent Federation</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="os-dashboard">
    <header class="header">
      <span class="badge">Federation Hub</span>
      <h1>Universal AI Security Agent Federation</h1>
      <p class="subtitle">Distributed federated AI swarms, queue registries, and status checks.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card agent-mon">
        <h3>🤖 Swarm Agents Registry</h3>
        <div class="agent-list">
          <div class="agent-item active">
            <h5>Agent Swarm Hub</h5>
            <p>Active agents globally: 4.8M nodes.</p>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Swarm metrics</h3>
          <ul class="stats-list">
            <li>Sync status: <strong>100%</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
