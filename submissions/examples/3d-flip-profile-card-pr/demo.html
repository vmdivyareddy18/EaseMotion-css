<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Flip Profile Card Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    p.hint {
      color: #888;
      font-size: 0.85rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <p class="hint">Hover the card to flip</p>

  <div class="flip-card">
    <div class="flip-card-inner">

      <div class="flip-front">
        <div class="avatar">👤</div>
        <h3>Jane Doe</h3>
        <p>Frontend Developer</p>
      </div>

      <div class="flip-back">
        <h3>About Jane</h3>
        <p>Passionate about building accessible, animated UI components with pure CSS.</p>
      </div>

    </div>
  </div>

</body>
</html>
