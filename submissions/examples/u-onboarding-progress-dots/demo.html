<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-onboarding-progress-dots</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="onboarding-container">

    <div class="phone-frame">

        <div class="slide active">
            <div class="icon">🚀</div>
            <h2>Welcome</h2>
            <p>Discover powerful animations with EaseMotion CSS.</p>
        </div>

        <div class="slide">
            <div class="icon">🎨</div>
            <h2>Customize</h2>
            <p>Create beautiful interfaces with reusable components.</p>
        </div>

        <div class="slide">
            <div class="icon">⚡</div>
            <h2>Fast Setup</h2>
            <p>Build interactive UI experiences in minutes.</p>
        </div>

        <div class="progress-wrapper">

            <span class="dot active-dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>

        </div>

        <div class="buttons">
            <button class="skip-btn">Skip</button>
            <button class="next-btn">Next</button>
        </div>

    </div>

</div>

<section class="showcase">

    <div class="demo-card">
        <h3>Step 1</h3>
        <div class="demo-dots">
            <span class="dot active-dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
    </div>

    <div class="demo-card">
        <h3>Step 2</h3>
        <div class="demo-dots">
            <span class="dot"></span>
            <span class="dot active-dot delay"></span>
            <span class="dot"></span>
        </div>
    </div>

    <div class="demo-card">
        <h3>Step 3</h3>
        <div class="demo-dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot active-dot delay2"></span>
        </div>
    </div>

</section>

</body>
</html>
