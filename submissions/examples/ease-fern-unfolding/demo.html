<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fern Unfolding</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🌿 Fern Unfolding</h1>
        <p class="subtitle">Fern frond unfurling with spiral motion</p>

        <div class="fern-wrapper">
            <canvas id="fernCanvas"></canvas>

            <div class="controls">
                <button id="unfoldBtn">🌿 Unfold</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Color: Green</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🌿 Ready to unfold</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('fernCanvas');
        const ctx = canvas.getContext('2d');
        const unfoldBtn = document.getElementById('unfoldBtn');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let fern = {
            fronds: [],
            progress: 0,
            isUnfolding: false,
            spiralAngle: 0,
            stemLength: 0,
            leaflets: [],
        };
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let particles = [];

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Green',
                stem: '#2d5a27',
                leaf: ['#3a7a33', '#4a8a43', '#5a9a53', '#6aaa63', '#7aba73'],
                tip: '#8aca7a'
            },
            {
                name: 'Golden',
                stem: '#8a7a3a',
                leaf: ['#b4a04a', '#c4b05a', '#d4c06a', '#e4d07a', '#f4e08a'],
                tip: '#f4e08a'
            },
            {
                name: 'Blue',
                stem: '#2a4a6a',
                leaf: ['#3a6a8a', '#4a7a9a', '#5a8aaa', '#6a9aba', '#7aaaca'],
                tip: '#8abada'
            },
            {
                name: 'Purple',
                stem: '#4a2a5a',
                leaf: ['#6a3a7a', '#7a4a8a', '#8a5a9a', '#9a6aaa', '#aa7aba'],
                tip: '#ba8aca'
            },
            {
                name: 'Red',
                stem: '#5a2a2a',
                leaf: ['#7a3a3a', '#8a4a4a', '#9a5a5a', '#aa6a6a', '#ba7a7a'],
                tip: '#ca8a8a'
            },
            {
                name: 'Rainbow',
                stem: '#4a4a4a',
                leaf: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#9b59b6'],
                tip: '#ffd93d'
            },
        ];

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color || '#8aca7a';
                this.size = 1 + Math.random() * 3;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 0.5 - 0.2;
                this.life = 1;
                this.maxLife = 20 + Math.random() * 30;
                this.age = 0;
                this.gravity = 0.005 + Math.random() * 0.01;
                this.phase = Math.random() * Math.PI * 2;
                this.glow = 0.3 + Math.random() * 0.4;
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.life = 1 - this.age / this.maxLife;
                this.size *= 0.998;
                this.phase += 0.05;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                grad.addColorStop(0, this.color + '80');
                grad.addColorStop(0.5, this.color + '40');
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.3;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.6;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color + '60';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== FERN FROND CLASS =====
        class FernFrond {
            constructor(x, y, angle, length, depth) {
                this.x = x;
                this.y = y;
                this.angle = angle || -Math.PI / 2;
                this.length = length || 120 + Math.random() * 40;
                this.depth = depth || 0;
                this.progress = 0;
                this.targetProgress = 0;
                this.children = [];
                this.leaflets = [];
                this.colorOffset = Math.random();
                this.spiralPhase = Math.random() * Math.PI * 2;
                this.growthSpeed = 0.01 + Math.random() * 0.02;
                this.maxDepth = 4;
                this.branchAngle = 0.4 + Math.random() * 0.3;
                this.branchChance = 0.6 + Math.random() * 0.3;
                this.isTip = true;
                this.tipSize = 3 + Math.random() * 3;
                this.width = 3 - this.depth * 0.3 + Math.random() * 0.5;
                this.leafCount = 6 + Math.floor(Math.random() * 6);
                this.leafSize = 5 + Math.random() * 5;
                this.curlAmount = 0.5 + Math.random() * 0.5;
                this.curlSpeed = 0.5 + Math.random() * 0.5;
                this.phase = Math.random() * Math.PI * 2;
            }

            update(progress, time) {
                this.targetProgress = Math.min(progress, 1);
                this.progress += (this.targetProgress - this.progress) * 0.05;
                this.phase += 0.005;

                // Spiral motion
                this.spiralPhase += 0.02 * (1 - this.progress * 0.5);

                // Grow children
                if (this.progress > 0.3 && this.children.length === 0 && this.depth < this.maxDepth) {
                    if (Math.random() < this.branchChance * this.progress) {
                        this.branch();
                    }
                }

                // Update children
                for (const child of this.children) {
                    child.update(progress * 0.8, time);
                }
            }

            branch() {
                const numBranches = 1 + Math.floor(Math.random() * 1);
                for (let i = 0; i < numBranches; i++) {
                    const side = i === 0 ? -1 : 1;
                    const angle = this.angle + side * this.branchAngle * (0.5 + 0.5 * Math.random());
                    const length = this.length * (0.6 + 0.4 * Math.random());
                    const child = new FernFrond(
                        this.getEndX(),
                        this.getEndY(),
                        angle,
                        length,
                        this.depth + 1
                    );
                    child.branchAngle = this.branchAngle * (0.7 + 0.3 * Math.random());
                    child.branchChance = this.branchChance * 0.7;
                    child.maxDepth = this.maxDepth;
                    child.leafSize = this.leafSize * 0.7;
                    child.width = this.width * 0.6;
                    child.colorOffset = this.colorOffset + (Math.random() - 0.5) * 0.2;
                    child.curlAmount = this.curlAmount * (0.7 + 0.3 * Math.random());
                    child.curlSpeed = this.curlSpeed * (0.7 + 0.3 * Math.random());
                    this.children.push(child);
                }
                this.isTip = false;
            }

            getEndX() {
                const grownLength = this.length * this.progress;
                const curl = Math.sin(this.spiralPhase * this.curlSpeed) * this.curlAmount * 0.1;
                return this.x + Math.cos(this.angle + curl) * grownLength;
            }

            getEndY() {
                const grownLength = this.length * this.progress;
                const curl = Math.sin(this.spiralPhase * this.curlSpeed) * this.curlAmount * 0.1;
                return this.y + Math.sin(this.angle + curl) * grownLength;
            }

            draw(ctx, time) {
                if (this.progress <= 0) return;

                const palette = colorPalettes[colorMode];
                const colors = palette.leaf;
                const colorIdx = Math.floor((this.colorOffset + time * 0.01) * colors.length);
                const color = colors[colorIdx % colors.length];
                const stemColor = palette.stem;
                const tipColor = palette.tip;

                const grownLength = this.length * this.progress;
                const curl = Math.sin(this.spiralPhase * this.curlSpeed) * this.curlAmount * 0.1;
                const endX = this.x + Math.cos(this.angle + curl) * grownLength;
                const endY = this.y + Math.sin(this.angle + curl) * grownLength;

                // Stem
                const stemGrad = ctx.createLinearGradient(this.x, this.y, endX, endY);
                stemGrad.addColorStop(0, stemColor);
                stemGrad.addColorStop(1, stemColor + '80');
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = stemGrad;
                ctx.lineWidth = this.width * (0.3 + 0.7 * this.progress);
                ctx.lineCap = 'round';
                ctx.shadowBlur = 5;
                ctx.shadowColor = 'rgba(0,30,0,0.1)';
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Tip (fiddlehead curl)
                if (this.isTip && this.progress < 0.9) {
                    const tipSize = this.tipSize * (1 - this.progress * 0.5);
                    const tipX = endX + Math.cos(this.angle + curl + 0.3) * 5;
                    const tipY = endY + Math.sin(this.angle + curl + 0.3) * 5;
                    const tipGrad = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, tipSize * 2);
                    tipGrad.addColorStop(0, tipColor + '80');
                    tipGrad.addColorStop(0.5, tipColor + '40');
                    tipGrad.addColorStop(1, tipColor + '00');
                    ctx.beginPath();
                    ctx.arc(tipX, tipY, tipSize * 2, 0, Math.PI * 2);
                    ctx.fillStyle = tipGrad;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(tipX, tipY, tipSize, 0, Math.PI * 2);
                    ctx.fillStyle = tipColor;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = tipColor + '60';
                    ctx.fill();
                    ctx.shadowBlur = 0;

                    // Spiral tip detail
                    for (let i = 0; i < 3; i++) {
                        const angle2 = (i / 3) * Math.PI * 2 + this.spiralPhase;
                        const dist = tipSize * (0.3 + 0.5 * (1 - i / 3));
                        const sx = tipX + Math.cos(angle2) * dist;
                        const sy = tipY + Math.sin(angle2) * dist;
                        ctx.beginPath();
                        ctx.arc(sx, sy, tipSize * 0.1 * (1 - i / 3), 0, Math.PI * 2);
                        ctx.fillStyle = tipColor;
                        ctx.globalAlpha = 0.3 + 0.3 * (1 - i / 3);
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }

                // Leaflets (pinnae)
                if (this.progress > 0.2) {
                    const numLeaflets = this.leafCount;
                    for (let i = 0; i < numLeaflets; i++) {
                        const t = (i + 1) / (numLeaflets + 1);
                        const pos = t * grownLength;
                        const px = this.x + Math.cos(this.angle + curl) * pos;
                        const py = this.y + Math.sin(this.angle + curl) * pos;
                        const leafAngle = this.angle + Math.PI / 2 + Math.sin(t * 3 + this.phase) * 0.1;
                        const leafSize = this.leafSize * (1 - t * 0.5) * this.progress;

                        // Leaflet glow
                        const leafGrad = ctx.createRadialGradient(px, py, 0, px, py, leafSize * 1.5);
                        const leafColor = colors[(colorIdx + i) % colors.length];
                        leafGrad.addColorStop(0, leafColor + '40');
                        leafGrad.addColorStop(1, leafColor + '00');
                        ctx.beginPath();
                        ctx.arc(px, py, leafSize * 1.5, 0, Math.PI * 2);
                        ctx.fillStyle = leafGrad;
                        ctx.fill();

                        // Left leaflet
                        ctx.save();
                        ctx.translate(px, py);
                        ctx.rotate(leafAngle);
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(-leafSize * 0.8, -leafSize * 0.5, -leafSize * 1.2, 0);
                        ctx.quadraticCurveTo(-leafSize * 0.8, leafSize * 0.5, 0, 0);
                        ctx.closePath();
                        ctx.fillStyle = leafColor;
                        ctx.globalAlpha = 0.5 + 0.5 * this.progress;
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = leafColor + '40';
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        // Right leaflet
                        ctx.beginPath();
                        ctx.moveTo(0, 0);
                        ctx.quadraticCurveTo(leafSize * 0.8, -leafSize * 0.5, leafSize * 1.2, 0);
                        ctx.quadraticCurveTo(leafSize * 0.8, leafSize * 0.5, 0, 0);
                        ctx.closePath();
                        ctx.fillStyle = leafColor;
                        ctx.globalAlpha = 0.5 + 0.5 * this.progress;
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = leafColor + '40';
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        ctx.restore();

                        // Leaflet vein
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + Math.cos(leafAngle) * leafSize * 0.5, py + Math.sin(leafAngle) * leafSize * 0.5);
                        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
                        ctx.lineWidth = 0.3;
                        ctx.stroke();
                    }
                }

                // Draw children
                for (const child of this.children) {
                    child.draw(ctx, time);
                }
            }

            isComplete() {
                return this.progress >= 1;
            }
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a1a0e');
            grad.addColorStop(0.3, '#060f06');
            grad.addColorStop(0.6, '#030803');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Ambient glow
            const palette = colorPalettes[colorMode];
            const glowColor = palette.tip || '#8aca7a';
            const ambientGlow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.3);
            ambientGlow.addColorStop(0, glowColor + '08');
            ambientGlow.addColorStop(1, glowColor + '00');
            ctx.fillStyle = ambientGlow;
            ctx.fillRect(0, 0, w, h);

            // Floating particles (spores)
            for (let i = 0; i < 20; i++) {
                const x = (i * 37 + Math.sin(i * 0.3 + time * 0.002) * 30) % w;
                const y = (i * 23 + Math.cos(i * 0.5 + time * 0.003) * 20) % h;
                const size = 0.5 + Math.sin(i + time * 0.01) * 0.3;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 200, 100, ${0.02 + Math.sin(i + time * 0.005) * 0.02})`;
                ctx.fill();
            }

            // Ground
            const groundY = h * 0.85;
            const groundGrad = ctx.createLinearGradient(0, groundY, 0, h);
            groundGrad.addColorStop(0, 'rgba(20, 40, 20, 0)');
            groundGrad.addColorStop(0.3, 'rgba(20, 40, 20, 0.05)');
            groundGrad.addColorStop(0.7, 'rgba(20, 40, 20, 0.1)');
            groundGrad.addColorStop(1, 'rgba(20, 40, 20, 0.15)');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, groundY, w, h - groundY);

            // Ground line
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            for (let i = 0; i <= w; i += 2) {
                const yOffset = Math.sin(i * 0.02 + time * 0.005) * 2;
                ctx.lineTo(i, groundY + yOffset);
            }
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // ===== UNFOLD =====
        function unfoldFern() {
            if (fern.isUnfolding) return;

            fern.isUnfolding = true;
            fern.progress = 0;
            statusText.textContent = '🌿 Unfolding...';
            unfoldBtn.textContent = '🌿 Unfolding...';

            // Create new fern
            const cx = canvas.width / 2;
            const cy = canvas.height / 2 + 20;
            fern.fronds = [];
            const root = new FernFrond(cx, cy, -Math.PI / 2, 140 + Math.random() * 40, 0);
            root.maxDepth = 4 + Math.floor(Math.random() * 2);
            root.branchAngle = 0.4 + Math.random() * 0.3;
            root.branchChance = 0.6 + Math.random() * 0.3;
            root.leafCount = 8 + Math.floor(Math.random() * 6);
            root.leafSize = 6 + Math.random() * 4;
            root.curlAmount = 0.5 + Math.random() * 0.5;
            root.curlSpeed = 0.5 + Math.random() * 0.5;
            fern.fronds.push(root);

            // Spawn particles
            const palette = colorPalettes[colorMode];
            for (let i = 0; i < 20; i++) {
                const p = new Particle(
                    cx + (Math.random() - 0.5) * 40,
                    cy + (Math.random() - 0.5) * 40,
                    palette.tip || '#8aca7a'
                );
                p.vx = (Math.random() - 0.5) * 2;
                p.vy = -Math.random() * 1 - 0.5;
                particles.push(p);
            }

            const interval = setInterval(() => {
                fern.progress += 0.02;

                for (const frond of fern.fronds) {
                    frond.update(fern.progress, time);
                }

                if (fern.progress >= 1) {
                    clearInterval(interval);
                    fern.isUnfolding = false;
                    unfoldBtn.textContent = '🌿 Unfold';
                    statusText.textContent = '🌿 Fully unfurled!';
                    setTimeout(() => {
                        statusText.textContent = '🌿 Ready to unfold';
                    }, 1500);
                }
            }, 50);
        }

        // ===== RESET =====
        function resetFern() {
            fern.fronds = [];
            fern.progress = 0;
            fern.isUnfolding = false;
            particles = [];
            speedLevel = 1;
            speed = speeds[1].value;
            colorMode = 0;
            unfoldBtn.textContent = '🌿 Unfold';
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = '🌿 Ready to unfold';
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            time += 0.01;

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Spawn particles during unfolding
            if (fern.isUnfolding && Math.random() < 0.05) {
                const palette = colorPalettes[colorMode];
                const p = new Particle(
                    canvas.width / 2 + (Math.random() - 0.5) * 60,
                    canvas.height / 2 + (Math.random() - 0.5) * 40,
                    palette.tip || '#8aca7a'
                );
                p.vx = (Math.random() - 0.5) * 1.5;
                p.vy = -Math.random() * 0.8 - 0.3;
                particles.push(p);
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw particles
            for (const p of particles) {
                p.draw(ctx);
            }

            // Draw fern
            for (const frond of fern.fronds) {
                frond.draw(ctx, time);
            }

            // Update status
            if (frameCount % 30 === 0) {
                const state = fern.isUnfolding ? '🌿 Unfolding' : '🌿 Ready';
                statusText.textContent = `${state} • ${colorPalettes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Unfold
        unfoldBtn.addEventListener('click', unfoldFern);

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = '🌿 Ready to unfold';
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = '🌿 Ready to unfold';
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetFern);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'u' || e.key === 'U') unfoldBtn.click();
            if (e.key === 's' || e.key === 'S') speedBtn.click();
            if (e.key === 'c' || e.key === 'C') colorBtn.click();
            if (e.key === 'r' || e.key === 'R') resetBtn.click();
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                unfoldBtn.click();
            }
        });

        // ===== CANVAS CLICK =====
        canvas.addEventListener('click', unfoldFern);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            unfoldFern();
        }, { passive: false });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = '🌿 Ready to unfold';
        lastFpsUpdate = performance.now();

        // Create initial fern
        setTimeout(() => {
            unfoldFern();
        }, 500);

        render(lastFpsUpdate);

        console.log('🌿 Fern Unfolding loaded!');
        console.log('💡 U - Unfold');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Unfold');
        console.log('💡 Click canvas - Unfold');
    </script>
</body>
</html>
