<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimalist Tech 3D Flip Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="hero">

        <span class="tag">Minimal Tech</span>

        <h1>Hover Over The Controls</h1>

        <p>
            A clean, distraction-free interface featuring smooth 3D flip
            tooltips built entirely with HTML and CSS.
        </p>

        <div class="actions">

            <button class="tooltip-btn">

                Sync

                <span class="tooltip">
                    Synchronize all devices instantly.
                </span>

            </button>

            <button class="tooltip-btn">

                Deploy

                <span class="tooltip">
                    Deploy your latest production build.
                </span>

            </button>

            <button class="tooltip-btn">

                Monitor

                <span class="tooltip">
                    View real-time system health.
                </span>

            </button>

        </div>

    </section>

</div>

</body>
</html>
