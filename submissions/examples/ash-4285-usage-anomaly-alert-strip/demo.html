<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Anomaly Alert Strip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="alert-strip">

        <div class="icon">
            ⚠️
        </div>

        <div class="content">

            <h2>Usage Anomaly Detected</h2>

            <p>
                API requests have increased by <strong>247%</strong> compared to your normal daily average.
            </p>

        </div>

        <div class="stats">

            <div class="metric">

                <span class="label">
                    Current
                </span>

                <strong>12.8K</strong>

            </div>

            <div class="metric">

                <span class="label">
                    Average
                </span>

                <strong>5.2K</strong>

            </div>

        </div>

        <button>
            Review Usage
        </button>

    </div>

</div>

</body>
</html>
