<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Pricing Tier Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tier-grid">

    <div class="tier-card">
      <div class="tier-name">Starter</div>
      <div class="tier-price"><span class="tier-currency">$</span>9<span class="tier-period">/mo</span></div>
      <ul class="tier-features">
        <li>5 projects</li>
        <li>10GB storage</li>
        <li>Community support</li>
      </ul>
      <button class="tier-cta" type="button">Get Started</button>
    </div>

    <div class="tier-card tier-card--popular">
      <span class="tier-badge">★ Most Popular</span>
      <div class="tier-name">Pro</div>
      <div class="tier-price"><span class="tier-currency">$</span>29<span class="tier-period">/mo</span></div>
      <ul class="tier-features">
        <li>Unlimited projects</li>
        <li>100GB storage</li>
        <li>Priority support</li>
        <li>Team collaboration</li>
      </ul>
      <button class="tier-cta tier-cta--primary" type="button">Get Started</button>
    </div>

    <div class="tier-card">
      <div class="tier-name">Enterprise</div>
      <div class="tier-price"><span class="tier-currency">$</span>99<span class="tier-period">/mo</span></div>
      <ul class="tier-features">
        <li>Unlimited everything</li>
        <li>1TB storage</li>
        <li>Dedicated support</li>
      </ul>
      <button class="tier-cta" type="button">Contact Sales</button>
    </div>

  </div>

</body>
</html>
