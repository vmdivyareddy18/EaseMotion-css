<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Text Color Wipe Hover — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .demo-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
  </style>
</head>
<body>
    
  <div class="demo-block">
    <p class="label">Default (hover me)</p>
    <h1 class="ease-hover-color-wipe">Build faster.</h1>
  </div>

  <div class="demo-block">
    <p class="label">Custom colors via CSS variables</p>
    <h1 class="ease-hover-color-wipe"
        style="--ease-wipe-from: #e5e5e5; --ease-wipe-to: #f97316;">
      Animation-first CSS.
    </h1>
  </div>

  <div class="demo-block">
    <p class="label">Works on any text size</p>
    <h2 class="ease-hover-color-wipe"
        style="--ease-wipe-from: #e5e5e5; --ease-wipe-to: #10b981;">
      Zero dependencies.
    </h2>
  </div>

</body>
</html>
