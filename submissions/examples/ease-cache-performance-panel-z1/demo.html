<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cache Performance Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="cache-card">
<h2>Cache Performance</h2>
<div class="metric"><span>Hit Ratio</span><b class="good">98%</b></div>
<div class="metric"><span>Miss Ratio</span><b class="warn">2%</b></div>
<div class="metric"><span>Avg Response</span><b class="good">12ms</b></div>
<div class="metric"><span>Cache Size</span><b>256 MB</b></div>
</section>
</body>
</html>
