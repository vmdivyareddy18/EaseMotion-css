<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Split Text Reveal</title>
</head>
<body>
  <main>
    <h1>Split Text Reveal</h1>
    <div class="controls">
      <button data-dir="up">&#8593; Up</button>
      <button data-dir="down">&#8595; Down</button>
      <button data-dir="left">&#8592; Left</button>
      <button data-dir="right">&#8594; Right</button>
      <button id="replayBtn">&#8635; Replay</button>
    </div>
    <p class="reveal-text" id="revealText">EaseMotion</p>
  </main>
  <script>
    const textEl = document.getElementById('revealText');
    const replayBtn = document.getElementById('replayBtn');
    const rawText = textEl.textContent;
    let direction = 'up';
    let charSpans = [];

    function splitText(dir) {
      textEl.textContent = '';
      charSpans = [];
      for (let i = 0; i < rawText.length; i++) {
        const span = document.createElement('span');
        span.textContent = rawText[i] === ' ' ? '\u00A0' : rawText[i];
        span.className = 'char';
        span.style.setProperty('--i', i);
        span.dataset.dir = dir;
        textEl.appendChild(span);
        charSpans.push(span);
      }
    }

    function reveal() {
      charSpans.forEach(el => {
        el.classList.remove('revealed');
        void el.offsetWidth;
        el.classList.add('revealed');
      });
    }

    function setDirection(dir) {
      direction = dir;
      splitText(dir);
      requestAnimationFrame(() => reveal());
    }

    splitText(direction);
    reveal();

    document.querySelectorAll('.controls [data-dir]').forEach(btn => {
      btn.addEventListener('click', () => setDirection(btn.dataset.dir));
    });

    replayBtn.addEventListener('click', reveal);
  </script>
</body>
</html>
