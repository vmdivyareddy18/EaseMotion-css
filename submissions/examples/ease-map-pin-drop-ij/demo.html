<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Pin Drop — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="component-card">
    <h2 class="card-title">Map Pin Drop</h2>
    <p class="card-desc">Watch pins drop from above with a bouncy landing animation.</p>
    <div class="demo-area">
      <div class="map-container">
        <div class="pin pin-1" style="top: 30%; left: 30%;">📍</div>
        <div class="pin pin-2" style="top: 55%; left: 60%;">📍</div>
        <div class="pin pin-3" style="top: 20%; left: 70%;">📍</div>
        <div class="pin pin-4" style="top: 70%; left: 25%;">📍</div>
        <button class="drop-btn">Drop Pins</button>
      </div>
    </div>
    <div class="vars-panel">
      <label>--pin-color <input type="color" value="#ff375f" data-var="--pin-color"></label>
      <label>--pin-size <input type="range" min="24" max="64" value="40" data-var="--pin-size"> <span class="val">40px</span></label>
      <label>--bounce-height <input type="range" min="20" max="120" value="60" data-var="--bounce-height"> <span class="val">60px</span></label>
      <label>--drop-duration <input type="range" min="0.3" max="2" step="0.1" value="0.8" data-var="--drop-duration"> <span class="val">0.8s</span></label>
    </div>
  </div>
  <script>
    const pins = document.querySelectorAll('.pin');
    const dropBtn = document.querySelector('.drop-btn');
    const demo = document.querySelector('.demo-area');

    function dropPins() {
      pins.forEach(p => p.classList.remove('drop'));
      void demo.offsetWidth;
      pins.forEach((p, i) => {
        setTimeout(() => p.classList.add('drop'), i * 150);
      });
    }

    dropBtn.addEventListener('click', dropPins);
    dropPins();

    document.querySelectorAll('.vars-panel input[data-var]').forEach(el => {
      el.addEventListener('input', () => {
        let val = el.value;
        if (el.type === 'color') val = el.value;
        else if (el.dataset.var === '--drop-duration') val += 's';
        else if (el.dataset.var === '--bounce-height') val += 'px';
        else if (el.dataset.var === '--pin-size') val += 'px';
        demo.style.setProperty(el.dataset.var, val);
        if (el.type === 'range') el.nextElementSibling.textContent = val;
      });
    });
  </script>
</body>
</html>
