<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-date-range-picker – Date Range Selection</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Date Range Picker</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Pick a start and end date — the selection bar highlights when both are valid.
    </p>

    <div class="date-range-wrapper ease-flex ease-items-center ease-gap-4 ease-mx-auto ease-max-w-xs">
      <div class="input-group">
        <label for="start-date" class="ease-text-sm ease-font-semibold ease-mb-1 ease-block">Start Date</label>
        <input type="date" id="start-date" class="date-input" required>
      </div>
      <div class="input-group">
        <label for="end-date" class="ease-text-sm ease-font-semibold ease-mb-1 ease-block">End Date</label>
        <input type="date" id="end-date" class="date-input" required>
      </div>
    </div>

    <!-- Visual range highlight (shows when both inputs are valid) -->
    <div class="range-highlight"></div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Pure CSS — uses <code>:valid</code> pseudo‑class on both inputs to trigger the highlight.
    </p>
  </div>

</body>
</html>
