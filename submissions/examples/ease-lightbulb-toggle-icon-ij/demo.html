<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbulb Toggle Icon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="off">
  <div class="container">
    <h1>Lightbulb Toggle</h1>
    <p>Click the bulb or button to toggle the light on and off.</p>
    <div class="bulb-wrapper" id="bulbWrapper">
      <div class="glow"></div>
      <svg class="bulb" viewBox="0 0 24 24" width="120" height="120" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path class="bulb-glass" d="M12 2a7 7 0 0 0-7 7c0 2.4 1.2 4.5 3 5.7V17h8v-2.3c1.8-1.3 3-3.4 3-5.7a7 7 0 0 0-7-7z"/>
        <line class="bulb-base-top" x1="9" y1="17" x2="15" y2="17"/>
        <line class="bulb-base-bottom" x1="10" y1="21" x2="14" y2="21"/>
        <path class="filament" d="M10 7Q12 11 14 7"/>
        <line class="filament-wire" x1="10" y1="7" x2="9" y2="13"/>
        <line class="filament-wire" x1="14" y1="7" x2="15" y2="13"/>
      </svg>
    </div>
    <button class="toggle-btn" id="lightToggle">Turn On</button>
  </div>
  <script>
    const btn = document.getElementById('lightToggle');
    const wrapper = document.getElementById('bulbWrapper');
    const body = document.body;
    function toggle() {
      body.classList.toggle('on');
      body.classList.toggle('off');
      btn.textContent = body.classList.contains('on') ? 'Turn Off' : 'Turn On';
    }
    btn.addEventListener('click', toggle);
    wrapper.addEventListener('click', toggle);
  </script>
</body>
</html>
