<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Animated Typing Placeholder Input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Animated Typing Placeholder Input</h1>
    <p class="demo-desc">An input field with a typing animation that cycles through placeholder suggestions, character-by-character, with a blinking cursor.</p>

    <div class="ease-typing-input">
      <input type="text" class="ease-typing-input-field" aria-label="Search">
      <span class="ease-typing-placeholder" id="typing-placeholder"></span>
    </div>

    <p class="hint">Click into the field to type your own text — the animated placeholder disappears once you start typing.</p>
  </div>

  <script>
    const suggestions = [
      "Search anything...",
      "Try 'animated buttons'...",
      "Explore CSS components...",
      "Find your next idea..."
    ];

    const placeholderEl = document.getElementById('typing-placeholder');
    const inputEl = document.querySelector('.ease-typing-input-field');

    let suggestionIndex = 0;
    let charIndex = 0;
    let typingTimeout;

    function typeNext() {
      const current = suggestions[suggestionIndex];

      if (charIndex <= current.length) {
        placeholderEl.textContent = current.slice(0, charIndex);
        charIndex++;
        typingTimeout = setTimeout(typeNext, 70);
      } else {
        typingTimeout = setTimeout(eraseNext, 1800);
      }
    }

    function eraseNext() {
      const current = suggestions[suggestionIndex];

      if (charIndex >= 0) {
        placeholderEl.textContent = current.slice(0, charIndex);
        charIndex--;
        typingTimeout = setTimeout(eraseNext, 35);
      } else {
        suggestionIndex = (suggestionIndex + 1) % suggestions.length;
        charIndex = 0;
        typingTimeout = setTimeout(typeNext, 400);
      }
    }

    function startAnimation() {
      clearTimeout(typingTimeout);
      typeNext();
    }

    function stopAnimation() {
      clearTimeout(typingTimeout);
      placeholderEl.textContent = '';
    }

    inputEl.addEventListener('focus', () => {
      if (inputEl.value === '') {
        // keep animation running while focused but empty
      }
    });

    inputEl.addEventListener('input', () => {
      if (inputEl.value.length > 0) {
        stopAnimation();
      } else {
        startAnimation();
      }
    });

    startAnimation();
  </script>
</body>
</html>
