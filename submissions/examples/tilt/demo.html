<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-tilt Demo</title>

  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 2rem;
      text-align: center;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>ease-tilt Demo</h1>

  <div class="grid">

    <div class="card ease-tilt">
      Default Tilt
    </div>

    <div class="card ease-tilt ease-tilt-strong">
      Strong Tilt
    </div>

    <div class="card ease-tilt ease-tilt-subtle">
      Subtle Tilt
    </div>

    <div class="card ease-tilt ease-tilt-left">
      Tilt Left
    </div>

    <div class="card ease-tilt ease-tilt-right">
      Tilt Right
    </div>

    <div class="card ease-tilt ease-tilt-up">
      Tilt Up
    </div>

    <div class="card ease-tilt ease-tilt-shadow">
      Tilt + Shadow
    </div>

    <div class="card ease-tilt ease-tilt-strong ease-tilt-shadow">
      Strong + Shadow
    </div>

  </div>

</body>
</html>
