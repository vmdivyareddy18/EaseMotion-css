<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-firefly-avatar</title>
  <meta name="description" content="Avatar with animated firefly particles effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-firefly-avatar</h1>
      <p class="subtitle" id="main-desc">Avatar with firefly particle animation</p>
    </header>

    <div class="display-area">
      
      <div class="avatar-showcase">
        
        <!-- Default -->
        <div class="avatar-item">
          <div class="ease-firefly-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Oliver" alt="User avatar">
            <div class="firefly firefly-1"></div>
            <div class="firefly firefly-2"></div>
            <div class="firefly firefly-3"></div>
            <div class="firefly firefly-4"></div>
          </div>
          <span class="avatar-label">Default</span>
        </div>

        <!-- Primary -->
        <div class="avatar-item">
          <div class="ease-firefly-avatar ease-firefly-primary">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Sophie" alt="User avatar">
            <div class="firefly firefly-1"></div>
            <div class="firefly firefly-2"></div>
            <div class="firefly firefly-3"></div>
            <div class="firefly firefly-4"></div>
          </div>
          <span class="avatar-label">Primary</span>
        </div>

        <!-- Success -->
        <div class="avatar-item">
          <div class="ease-firefly-avatar ease-firefly-success">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Liam" alt="User avatar">
            <div class="firefly firefly-1"></div>
            <div class="firefly firefly-2"></div>
            <div class="firefly firefly-3"></div>
            <div class="firefly firefly-4"></div>
          </div>
          <span class="avatar-label">Success</span>
        </div>

        <!-- Warning -->
        <div class="avatar-item">
          <div class="ease-firefly-avatar ease-firefly-warning">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mia" alt="User avatar">
            <div class="firefly firefly-1"></div>
            <div class="firefly firefly-2"></div>
            <div class="firefly firefly-3"></div>
            <div class="firefly firefly-4"></div>
          </div>
          <span class="avatar-label">Warning</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Team Members Example</h3>
      <div class="team-avatars">
        <div class="ease-firefly-avatar ease-firefly-sm ease-firefly-primary">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Emma" alt="Team member">
          <div class="firefly firefly-1"></div>
          <div class="firefly firefly-2"></div>
        </div>
        <div class="ease-firefly-avatar ease-firefly-sm ease-firefly-success">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Noah" alt="Team member">
          <div class="firefly firefly-1"></div>
          <div class="firefly firefly-2"></div>
        </div>
        <div class="ease-firefly-avatar ease-firefly-sm ease-firefly-warning">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ava" alt="Team member">
          <div class="firefly firefly-1"></div>
          <div class="firefly firefly-2"></div>
        </div>
        <div class="ease-firefly-avatar ease-firefly-sm ease-firefly-danger">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=James" alt="Team member">
          <div class="firefly firefly-1"></div>
          <div class="firefly firefly-2"></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
