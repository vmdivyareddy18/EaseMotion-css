<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Load More Button — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lmb-wrapper">
    <h1>Load More Button</h1>
    <div class="lmb-list" id="lmbList">
      <div class="lmb-item">Item 1</div>
      <div class="lmb-item">Item 2</div>
      <div class="lmb-item">Item 3</div>
      <div class="lmb-item">Item 4</div>
      <div class="lmb-item">Item 5</div>
    </div>
    <button class="lmb-btn" id="lmbBtn">
      <span class="lmb-btn-text" id="lmbBtnText">Load More</span>
      <span class="lmb-spinner" id="lmbSpinner"></span>
    </button>
    <p class="lmb-status" id="lmbStatus">Showing 5 of 20</p>
  </div>
  <script>
    const btn = document.getElementById('lmbBtn');
    const btnText = document.getElementById('lmbBtnText');
    const spinner = document.getElementById('lmbSpinner');
    const list = document.getElementById('lmbList');
    const status = document.getElementById('lmbStatus');
    const totalItems = 20;
    const batchSize = 5;
    let currentCount = 5;
    let loading = false;

    btn.addEventListener('click', () => {
      if (loading || currentCount >= totalItems) return;
      loading = true;
      btn.classList.add('lmb-loading');
      btnText.textContent = 'Loading...';

      setTimeout(() => {
        const nextBatch = Math.min(batchSize, totalItems - currentCount);
        for (let i = 0; i < nextBatch; i++) {
          const num = currentCount + i + 1;
          const el = document.createElement('div');
          el.className = 'lmb-item';
          el.style.animationDelay = (i * 0.08) + 's';
          el.textContent = 'Item ' + num;
          list.appendChild(el);
        }
        currentCount += nextBatch;
        status.textContent = 'Showing ' + currentCount + ' of ' + totalItems;
        loading = false;
        btn.classList.remove('lmb-loading');
        if (currentCount >= totalItems) {
          btnText.textContent = 'All Items Loaded';
          btn.disabled = true;
          btn.classList.add('lmb-all-loaded');
        } else {
          btnText.textContent = 'Load More';
        }
      }, 800);
    });
  </script>
</body>
</html>
