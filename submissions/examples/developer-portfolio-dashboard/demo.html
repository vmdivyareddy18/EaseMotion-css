<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Portfolio Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <aside class="profile-card">

        <div class="avatar">
            AK
        </div>

        <h2>Aryan Kumar</h2>

        <p>Frontend Developer</p>

        <div class="socials">
            <span>GitHub</span>
            <span>LinkedIn</span>
            <span>X</span>
        </div>

    </aside>

    <main class="content">

        <section class="stats">

            <div class="stat-card">
                <h3>Repositories</h3>
                <span>42</span>
            </div>

            <div class="stat-card">
                <h3>Stars</h3>
                <span>1.2K</span>
            </div>

            <div class="stat-card">
                <h3>Followers</h3>
                <span>850</span>
            </div>

        </section>

        <section class="activity">

            <h2>Recent Activity</h2>

            <div class="activity-item">
                🚀 Released EaseMotion CSS v2.0
            </div>

            <div class="activity-item">
                🎨 Added new animation utilities
            </div>

            <div class="activity-item">
                ⭐ Reached 1000 GitHub stars
            </div>

        </section>

    </main>

</div>

</body>
</html>
