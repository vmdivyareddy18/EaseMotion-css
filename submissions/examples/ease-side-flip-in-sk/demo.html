<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side Flip-In Animation — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="demo-header">
        <h1 class="demo-title">Side Flip-In</h1>
        <p class="demo-subtitle">
            A dynamic entrance animation where the element flips in from the side (Y-axis).
            Features integrated perspective and hidden backfaces for a realistic physical motion.
        </p>
    </header>

    <div class="demo-grid" id="cardGrid">
        <!-- Card 1 -->
        <div class="demo-card ease-side-flip-in">
            ♠
            <div class="demo-card-suit">Spades</div>
        </div>

        <!-- Card 2 -->
        <div class="demo-card ease-side-flip-in delay-100">
            <span style="color: #ef4444;">♥</span>
            <div class="demo-card-suit">Hearts</div>
        </div>

        <!-- Card 3 -->
        <div class="demo-card ease-side-flip-in delay-200">
            ♣
            <div class="demo-card-suit">Clubs</div>
        </div>

        <!-- Card 4 -->
        <div class="demo-card ease-side-flip-in delay-300">
            <span style="color: #ef4444;">♦</span>
            <div class="demo-card-suit">Diamonds</div>
        </div>
    </div>

    <button class="demo-btn" id="replayBtn">
        Replay Animation
    </button>

    <script>
        const btn = document.getElementById('replayBtn');
        const grid = document.getElementById('cardGrid');

        btn.addEventListener('click', () => {
            // Remove classes
            const cards = grid.querySelectorAll('.demo-card');
            cards.forEach(card => {
                card.style.animation = 'none';
            });
            
            // Force reflow
            void grid.offsetWidth;

            // Re-add animations
            cards.forEach(card => {
                card.style.animation = '';
            });
        });
    </script>
</body>
</html>
