<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-shimmer-loading-card — EaseMotion CSS</title>
  <!-- Component styles — no external dependencies -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <p class="demo-label">EaseMotion CSS Component</p>
  <h1 class="demo-title">Shimmer Loading Card</h1>
  <p class="demo-subtitle">
    A pure-CSS skeleton placeholder with a continuous shimmer effect.
    Avatar circle + two text lines. No JavaScript, no external fonts.
  </p>

  <!-- ── Card grid ──────────────────────────────────────────────────── -->
  <div class="demo-grid">

    <!--
      ease-shimmer-loading-card
      ─────────────────────────
      Usage:
        1. Add the class  ease-shimmer-loading-card  to a container element.
        2. Inside, build your placeholder layout using .shimmer-block shapes:
             .shimmer-avatar   → circle placeholder
             .shimmer-line-primary   → wide text-line placeholder
             .shimmer-line-secondary → narrow text-line placeholder
        3. Wrap lines in .shimmer-text-group to align them next to the avatar.
        4. Wrap everything in .shimmer-avatar-row for the flex row layout.
    -->

    <!-- Card A — single avatar + text row (minimal) -->
    <div class="ease-shimmer-loading-card" aria-busy="true" aria-label="Loading content">

      <!-- Avatar + two text lines -->
      <div class="shimmer-avatar-row">
        <span class="shimmer-block shimmer-avatar" aria-hidden="true"></span>
        <div class="shimmer-text-group">
          <span class="shimmer-block shimmer-line-primary"  aria-hidden="true"></span>
          <span class="shimmer-block shimmer-line-secondary" aria-hidden="true"></span>
        </div>
      </div>

    </div>

    <!-- Card B — avatar + text row + an extra body text line below -->
    <div class="ease-shimmer-loading-card" aria-busy="true" aria-label="Loading content">

      <!-- Avatar + two text lines -->
      <div class="shimmer-avatar-row">
        <span class="shimmer-block shimmer-avatar" aria-hidden="true"></span>
        <div class="shimmer-text-group">
          <span class="shimmer-block shimmer-line-primary"  aria-hidden="true"></span>
          <span class="shimmer-block shimmer-line-secondary" aria-hidden="true"></span>
        </div>
      </div>

      <!--
        Extra body placeholder lines — reuse .shimmer-block with inline widths
        to represent a paragraph preview beneath the avatar row.
      -->
      <span class="shimmer-block"
            style="height:12px; width:100%; border-radius:4px;"
            aria-hidden="true"></span>
      <span class="shimmer-block"
            style="height:12px; width:80%; border-radius:4px;"
            aria-hidden="true"></span>

    </div>

  </div>
  <!-- ── /Card grid ─────────────────────────────────────────────────── -->

  <p class="demo-footer">Part of the <strong>EaseMotion CSS</strong> library</p>

</body>
</html>
