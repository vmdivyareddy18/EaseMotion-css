<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-button-magnetic-pull</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <button class="magnetic-btn">
        Hover Near Me
    </button>

</div>

<script>
const button = document.querySelector('.magnetic-btn');

button.addEventListener('mousemove', (e) => {
    const rect = button.getBoundingClientRect();

    const x = e.clientX - rect.left - rect.width / 2;
    const y = e.clientY - rect.top - rect.height / 2;

    button.style.setProperty('--x', `${x * 0.2}px`);
    button.style.setProperty('--y', `${y * 0.2}px`);
});

button.addEventListener('mouseleave', () => {
    button.style.setProperty('--x', '0px');
    button.style.setProperty('--y', '0px');
});
</script>

</body>
</html>
