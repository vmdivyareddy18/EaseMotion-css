<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Loading Components</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Skeleton Loading Components</h1>

    <p class="intro">
        Common loading placeholders with shimmer animations.
    </p>

    <div class="grid">

        <div class="card">
            <h3>Profile Card</h3>
            <div class="avatar skeleton"></div>
            <div class="line skeleton"></div>
            <div class="line short skeleton"></div>
        </div>

        <div class="card">
            <h3>Article</h3>
            <div class="image skeleton"></div>
            <div class="line skeleton"></div>
            <div class="line skeleton"></div>
            <div class="line short skeleton"></div>
        </div>

        <div class="card">
            <h3>Product Card</h3>
            <div class="product skeleton"></div>
            <div class="line skeleton"></div>
            <div class="line short skeleton"></div>
        </div>

        <div class="card">
            <h3>Dashboard Widget</h3>
            <div class="widget skeleton"></div>
            <div class="widget skeleton"></div>
            <div class="widget skeleton"></div>
        </div>

    </div>

</div>

</body>
</html>
