<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Storefront Hub - Draw-Border Line Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ecommerce-viewport">
        <!-- Main Premium E-Commerce Checkout Card Elevation Container Hub Shell -->
        <div class="checkout-container-card">
            <header class="checkout-header">
                <div class="neon-matrix-badge">SECURE CHECKOUT v6</div>
                <h2 class="checkout-title">Payment Information</h2>
                <p class="checkout-subtitle">Hover over or interact with the secure info target below to witness the pure-CSS double-axis draw-border line tooltip sweep.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">💳</span>
                        <span class="btn-text">Review Processing Surcharges</span>
                    </button>

                    <!-- Floating Tooltip Draw-Border Line Overlay Menu Shell Box -->
                    <div class="draw-border-line-tooltip ease-border-draw">
                        <!-- Dual-Axis Outline Draw Border Line Segment Components -->
                        <div class="border-line line-top-left"></div>
                        <div class="border-line line-bottom-right"></div>
                        
                        <!-- Internal Tooltip Grid Content Overlay Block Container -->
                        <div class="tooltip-inner-content">
                            <span class="fee-row">Gateway Surcharge: $0.45</span>
                            <span class="fee-meta">SSL Vault Verified</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="checkout-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
