<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-swing — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-weight: 600; margin: 0; }
    p.sub { color: #94a3b8; margin: 0 0 1rem; }
    .demo-area {
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
    }
    .bell-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .bell {
      font-size: 4rem;
      display: inline-block;
      cursor: pointer;
      user-select: none;
    }
    .bell-label {
      font-size: 0.9rem;
      color: #94a3b8;
    }
    .btn-area {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>ease-swing</h1>
  <p class="sub">Pendulum swing from top center — great for notification bells and attention-drawing icons</p>

  <div class="demo-area">
    <div class="bell-card">
      <span class="bell ease-swing" id="bell1">🔔</span>
      <span class="bell-label">Swing (once)</span>
    </div>
    <div class="bell-card">
      <span class="bell ease-swing ease-infinite" id="bell2">🔔</span>
      <span class="bell-label">Swing (infinite)</span>
    </div>
  </div>

  <div class="btn-area">
    <button class="btn-primary" onclick="replay()">Replay Once</button>
    <button class="btn-secondary" onclick="toggleInfinite()">Toggle Infinite</button>
  </div>

  <script>
    function replay() {
      const b = bell1;
      b.style.animation = 'none';
      void b.offsetWidth;
      b.style.animation = '';
    }

    function toggleInfinite() {
      bell2.classList.toggle('ease-infinite');
    }
  </script>
</body>
</html>
