<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Card Event</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="events">

    <article class="ease-card-event">

        <div class="date-badge">
            <span class="day">24</span>
            <span class="month">JUL</span>
        </div>

        <div class="event-content">

            <h2>EaseMotion CSS Workshop</h2>

            <p class="location">
                📍 Bengaluru, India
            </p>

            <p class="time">
                🕒 10:00 AM – 1:00 PM
            </p>

            <button class="ease-btn">
                Register
            </button>

        </div>

    </article>

</div>

</body>
</html>
