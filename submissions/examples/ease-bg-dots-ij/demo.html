<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Dots — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Background Dots</h1>
    <p class="subtitle">Repeating dot pattern using <code>radial-gradient</code></p>

    <div class="demo-panel ease-bg-dots" id="dotDemo">
      <p>Dot Pattern Background</p>
    </div>

    <div class="control-group">
      <div>
        <label>Size: <span id="sizeVal">2px</span></label>
        <input type="range" id="sizeSlider" min="1" max="6" value="2" step="1">
      </div>
      <div>
        <label>Spacing: <span id="spacingVal">20px</span></label>
        <input type="range" id="spacingSlider" min="10" max="50" value="20" step="2">
      </div>
      <button id="toggleDotBtn">Toggle Dots</button>
    </div>
  </div>

  <script>
    const demo = document.getElementById('dotDemo');
    const sizeSlider = document.getElementById('sizeSlider');
    const spacingSlider = document.getElementById('spacingSlider');
    const sizeVal = document.getElementById('sizeVal');
    const spacingVal = document.getElementById('spacingVal');
    const toggleBtn = document.getElementById('toggleDotBtn');
    let visible = true;

    sizeSlider.addEventListener('input', () => {
      const v = sizeSlider.value + 'px';
      sizeVal.textContent = v;
      document.documentElement.style.setProperty('--ease-dot-size', v);
    });

    spacingSlider.addEventListener('input', () => {
      const v = spacingSlider.value + 'px';
      spacingVal.textContent = v;
      document.documentElement.style.setProperty('--ease-dot-spacing', v);
    });

    toggleBtn.addEventListener('click', () => {
      visible = !visible;
      demo.style.backgroundImage = visible
        ? 'radial-gradient(var(--ease-dot-color) var(--ease-dot-size), transparent var(--ease-dot-size))'
        : 'none';
      toggleBtn.textContent = visible ? 'Hide Dots' : 'Show Dots';
    });
  </script>

</body>
</html>
