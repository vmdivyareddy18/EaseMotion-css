<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Keys Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="piano">
    <div class="key white" style="--i:0"></div>
    <div class="key black" style="--i:0"></div>
    <div class="key white" style="--i:1"></div>
    <div class="key black" style="--i:1"></div>
    <div class="key white" style="--i:2"></div>
    <div class="key white" style="--i:3"></div>
    <div class="key black" style="--i:2"></div>
    <div class="key white" style="--i:4"></div>
    <div class="key black" style="--i:3"></div>
    <div class="key white" style="--i:5"></div>
    <div class="key black" style="--i:4"></div>
    <div class="key white" style="--i:6"></div>
    <div class="key white" style="--i:7"></div>
    <div class="key black" style="--i:5"></div>
    <div class="key white" style="--i:8"></div>
    <div class="key black" style="--i:6"></div>
    <div class="key white" style="--i:9"></div>
    <div class="key black" style="--i:7"></div>
    <div class="key white" style="--i:10"></div>
    <div class="key white" style="--i:11"></div>
    <div class="key black" style="--i:8"></div>
    <div class="key white" style="--i:12"></div>
    <div class="key black" style="--i:9"></div>
    <div class="key white" style="--i:13"></div>
  </div>
</body>
</html>
