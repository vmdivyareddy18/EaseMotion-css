<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Habit Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="tracker-header">
      <h1 class="title">Daily Habits</h1>
      <span class="date-display" id="dateDisplay"></span>
    </div>

    <div class="stats-card">
      <div class="stat">
        <span class="stat-value" id="completedCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="totalCount">5</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-value" id="streakCount">0</span>
        <span class="stat-label">Streak</span>
      </div>
    </div>

    <div class="habit-list" id="habitList"></div>

    <div class="add-habit">
      <input type="text" class="habit-input" id="habitInput" placeholder="Add a new habit..." maxlength="50">
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <button class="reset-day-btn" id="resetDay">Reset Day</button>
  </div>
  <script>
    const DEFAULT_HABITS = ['Meditate', 'Exercise', 'Read', 'Drink Water', 'Write Journal'];
    const STORAGE_KEY = 'habit-tracker-ak';

    let habits = [];
    let streak = 0;

    const habitList = document.getElementById('habitList');
    const habitInput = document.getElementById('habitInput');
    const addBtn = document.getElementById('addBtn');
    const completedCount = document.getElementById('completedCount');
    const totalCount = document.getElementById('totalCount');
    const streakCount = document.getElementById('streakCount');
    const resetDay = document.getElementById('resetDay');
    const dateDisplay = document.getElementById('dateDisplay');

    function getToday() {
      return new Date().toISOString().split('T')[0];
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const data = JSON.parse(raw);
        if (data.date === getToday()) {
          habits = data.habits;
          streak = data.streak || 0;
          return;
        }
        const completed = data.habits.filter(h => h.done).length;
        if (completed === data.habits.length && data.habits.length > 0) {
          streak = (data.streak || 0) + 1;
        } else {
          streak = 0;
        }
      }
      habits = DEFAULT_HABITS.map(name => ({ name, done: false }));
      saveData();
    }

    function saveData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: getToday(), habits, streak }));
    }

    function render() {
      habitList.innerHTML = '';
      habits.forEach((habit, i) => {
        const el = document.createElement('div');
        el.className = 'habit-item' + (habit.done ? ' done' : '');
        el.innerHTML = `
          <button class="check-btn">${habit.done ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : ''}</button>
          <span class="habit-name">${habit.name}</span>
          <button class="delete-btn" title="Delete">&times;</button>
        `;
        el.querySelector('.check-btn').addEventListener('click', () => toggleHabit(i));
        el.querySelector('.delete-btn').addEventListener('click', () => deleteHabit(i));
        habitList.appendChild(el);
      });
      updateStats();
      saveData();
    }

    function toggleHabit(i) {
      habits[i].done = !habits[i].done;
      render();
    }

    function deleteHabit(i) {
      habits.splice(i, 1);
      render();
    }

    function addHabit() {
      const name = habitInput.value.trim();
      if (!name) return;
      habits.push({ name, done: false });
      habitInput.value = '';
      render();
    }

    function updateStats() {
      const done = habits.filter(h => h.done).length;
      completedCount.textContent = done;
      totalCount.textContent = habits.length;
      streakCount.textContent = streak;
    }

    function resetToday() {
      habits = habits.map(h => ({ ...h, done: false }));
      render();
    }

    function setDate() {
      const now = new Date();
      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      dateDisplay.textContent = now.toLocaleDateString('en-US', opts);
    }

    habitInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addHabit();
    });
    addBtn.addEventListener('click', addHabit);
    resetDay.addEventListener('click', resetToday);

    setDate();
    loadData();
    render();
  </script>
</body>
</html>
