<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Wobble-Focus Modal - Dashboard Analytics Layouts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">
    <header class="demo-header">
      <h1>EaseMotion CSS</h1>
      <p>Wobble-Focus Modal (Dashboard Analytics)</p>
    </header>

    <!-- The Trigger Button (Label linked to checkbox) -->
    <label for="wobble-modal-trigger" class="ease-btn-trigger" tabindex="0">
      View Weekly Report
    </label>
  </main>

  <!-- Hidden Checkbox for State Management -->
  <input type="checkbox" id="wobble-modal-trigger" class="ease-modal-trigger-hidden" aria-hidden="true" />

  <!-- The Modal Backdrop -->
  <div class="ease-modal-backdrop">
    
    <!-- Click backdrop to close -->
    <label for="wobble-modal-trigger" class="ease-modal-backdrop-close" aria-label="Close modal"></label>

    <!-- The Modal Dialog -->
    <div class="ease-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <div class="ease-modal-header">
        <h2 id="modal-title" class="ease-modal-title">Weekly Analytics</h2>
        <!-- Close Button -->
        <label for="wobble-modal-trigger" class="ease-btn-close" aria-label="Close modal" tabindex="0">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </label>
      </div>

      <div class="ease-modal-body">
        <div class="analytics-mockup">
          <!-- Mock Chart -->
          <div class="analytics-chart">
            <div class="bar" style="height: 40%"></div>
            <div class="bar" style="height: 70%"></div>
            <div class="bar" style="height: 50%"></div>
            <div class="bar" style="height: 90%; background-color: var(--ease-ana-accent);"></div>
            <div class="bar" style="height: 60%"></div>
          </div>
          
          <p>
            When this modal enters, it uses a custom <code>Wobble-Focus</code> keyframe animation. By translating on the X-axis while slightly rotating, it creates a tactile "settling" motion that draws immediate user focus.
          </p>
        </div>
      </div>
      
      <div class="ease-modal-footer">
        <label for="wobble-modal-trigger" class="ease-btn-secondary" tabindex="0">Dismiss</label>
        <button class="ease-btn-primary">Download CSV</button>
      </div>

    </div>
  </div>

  <!-- Script for keyboard accessibility (Space/Enter to toggle label) -->
  <script>
    document.querySelectorAll('.ease-btn-trigger, .ease-btn-close, .ease-btn-secondary').forEach(btn => {
      btn.addEventListener('keydown', e => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetId = btn.getAttribute('for');
          const checkbox = document.getElementById(targetId);
          checkbox.checked = !checkbox.checked;
        }
      });
    });
  </script>
</body>
</html>
