<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Retention Policy Selector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Data Retention Policy</h1>

        <p class="subtitle">
            Select how long your organization's data should be retained before automatic deletion.
        </p>

        <div class="policies">

            <label class="policy">

                <input type="radio" name="retention">

                <span class="indicator"></span>

                <div class="content">

                    <h3>30 Days</h3>

                    <p>Ideal for temporary logs and testing environments.</p>

                </div>

                <span class="tag low">
                    Basic
                </span>

            </label>

            <label class="policy">

                <input type="radio" name="retention" checked>

                <span class="indicator"></span>

                <div class="content">

                    <h3>1 Year</h3>

                    <p>Recommended for most production workloads.</p>

                </div>

                <span class="tag recommended">
                    Recommended
                </span>

            </label>

            <label class="policy">

                <input type="radio" name="retention">

                <span class="indicator"></span>

                <div class="content">

                    <h3>7 Years</h3>

                    <p>Suitable for financial and compliance records.</p>

                </div>

                <span class="tag compliance">
                    Compliance
                </span>

            </label>

        </div>

        <button>
            Save Policy
        </button>

    </div>

</div>

</body>
</html>
