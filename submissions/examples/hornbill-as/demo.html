<!DOCTYPE html>
<html lang="en">
<head>

  <title>Hornbill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="sunH"></span>
    <span class="branchH"></span>
    <div class="hornH">
      <span class="tailH"></span>
      <span class="wingH"></span>
      <span class="bodyH"></span>
      <span class="footH"></span>
      <span class="neckH"></span>
      <div class="headH">
        <span class="caskH"></span>
        <span class="skullH"></span>
        <span class="lowerH"></span>
        <span class="upperH"></span>
        <span class="eyeH"></span>
        <span class="lashH"></span>
      </div>
    </div>
    <span class="figH"></span>
    <span class="leafH lh1"></span>
    <span class="leafH lh2"></span>
    <span class="canopyH"></span>
  </div>

</html>
