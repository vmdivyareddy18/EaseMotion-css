<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confetti Burst Animation — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-box">
        <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">Confetti Burst</h1>
        <p style="color: #94a3b8; margin-bottom: 2.5rem;">Click the button to trigger a celebratory explosion!</p>

        <!-- Confetti Container Wrapper -->
        <div class="ease-confetti-container" id="confetti-container">
            <!-- Particles (positioned spans) -->
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>
            <span class="confetti-particle"></span>

            <!-- Trigger Element -->
            <button class="celebrate-btn" onclick="triggerBurst()">
                Celebrate! 🎉
            </button>
        </div>
    </div>

    <div style="margin-top: 3rem; text-align: center; color: #64748b; font-size: 0.9rem;">
        <p>Advanced success-state animation for <strong>EaseMotion CSS</strong>.</p>
    </div>

    <script>
        function triggerBurst() {
            const container = document.getElementById('confetti-container');
            
            // Remove class if it already exists to allow re-triggering
            container.classList.remove('burst-active');
            
            // Force Reflow
            void container.offsetWidth;
            
            // Add the trigger class
            container.classList.add('burst-active');
            
            // Optional: Clean up after animation finishes (0.8s)
            setTimeout(() => {
                // container.classList.remove('burst-active');
            }, 800);
        }
    </script>
</body>
</html>
