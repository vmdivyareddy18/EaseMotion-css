<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Indeterminate - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Indeterminate Checkbox</h1>
    <p class="desc">Animated cycling through checked / unchecked / indeterminate states</p>
    <div class="ci-card">
      <div class="ci-states">
        <label class="ci-checkbox ci-checked" id="ciBox">
          <input type="checkbox" checked aria-label="Demo checkbox" />
          <span class="ci-box">
            <span class="ci-icon">✓</span>
          </span>
        </label>
        <span class="ci-label">Select all options</span>
        <span class="ci-status" id="ciStatus">checked</span>
      </div>
      <div class="ci-controls">
        <button class="ci-btn" id="ciCycle">Cycle State</button>
      </div>
    </div>
  </div>
  <script>
    const box = document.getElementById('ciBox');
    const status = document.getElementById('ciStatus');
    const input = box.querySelector('input');
    const states = ['ci-checked', 'ci-indeterminate'];
    let idx = 0;

    function setState(i) {
      box.classList.remove('ci-checked', 'ci-indeterminate');
      if (i === 0) {
        box.classList.add('ci-checked');
        input.checked = true;
        input.indeterminate = false;
        status.textContent = 'checked';
      } else if (i === 1) {
        box.classList.add('ci-indeterminate');
        input.checked = false;
        input.indeterminate = true;
        status.textContent = 'indeterminate';
      } else {
        input.checked = false;
        input.indeterminate = false;
        status.textContent = 'unchecked';
      }
    }

    setState(0);

    document.getElementById('ciCycle').addEventListener('click', () => {
      idx = (idx + 1) % 3;
      setState(idx);
    });
  </script>
</body>
</html>
