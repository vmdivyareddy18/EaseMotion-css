<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Spinner UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Loading Spinner UI Example</h1>
      <p>CSS-only loading spinners with multiple animation styles.</p>
    </header>

    <section class="spinner-grid">
      <div class="spinner-group">
        <h3>Rotating Ring</h3>
        <div class="loader loader--ring"></div>
      </div>

      <div class="spinner-group">
        <h3>Gradient Spinner</h3>
        <div class="loader loader--gradient"></div>
      </div>

      <div class="spinner-group">
        <h3>Pulsing Dots</h3>
        <div class="loader loader--dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="spinner-group">
        <h3>Double Ring</h3>
        <div class="loader loader--double"></div>
      </div>

      <div class="spinner-group">
        <h3>Bounce Dots</h3>
        <div class="loader loader--bounce">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="spinner-group">
        <h3>Stripe Spinner</h3>
        <div class="loader loader--stripes"></div>
      </div>
    </section>
  </main>
</body>
</html>
