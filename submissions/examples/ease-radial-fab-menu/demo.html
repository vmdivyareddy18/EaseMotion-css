<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radial FAB Menu</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="radial-container">
    <header class="header">
      <h1>Radial FAB Menu</h1>
      <p>Click the floating action button to expand a beautiful staggered radial shortcut menu.</p>
    </header>

    <div class="fab-wrapper" id="fabWrapper">
      <button type="button" class="main-fab" id="mainFab" aria-expanded="false" aria-label="Toggle menu shortcuts">
        <svg class="plus-icon" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>

      <ul class="radial-list" role="menu">
        <li style="--i: 1;" role="none">
          <button type="button" class="radial-item" role="menuitem" aria-label="Profile Settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </li>
        <li style="--i: 2;" role="none">
          <button type="button" class="radial-item" role="menuitem" aria-label="Direct Messaging">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </button>
        </li>
        <li style="--i: 3;" role="none">
          <button type="button" class="radial-item" role="menuitem" aria-label="Upload File">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
        </li>
      </ul>
    </div>
  </main>

  <script>
    const mainFab = document.getElementById('mainFab');
    const fabWrapper = document.getElementById('fabWrapper');

    mainFab.addEventListener('click', () => {
      const isExpanded = mainFab.getAttribute('aria-expanded') === 'true';
      mainFab.setAttribute('aria-expanded', !isExpanded);
      fabWrapper.classList.toggle('open');
    });
  </script>
</body>
</html>
