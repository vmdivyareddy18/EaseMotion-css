<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Pricing Table</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pricing-table">
    <div class="pricing-card">
      <h3>Starter</h3>
      <div class="price"><span>$0</span> /mo</div>
      <ul>
        <li>1 project</li>
        <li>Community support</li>
        <li>Basic analytics</li>
      </ul>
      <a href="#" class="pricing-cta">Choose Starter</a>
    </div>

    <div class="pricing-card is-popular">
      <span class="pricing-badge">Most Popular</span>
      <h3>Pro</h3>
      <div class="price"><span>$12</span> /mo</div>
      <ul>
        <li>Unlimited projects</li>
        <li>Priority support</li>
        <li>Advanced analytics</li>
        <li>Custom domains</li>
      </ul>
      <a href="#" class="pricing-cta">Choose Pro</a>
    </div>

    <div class="pricing-card">
      <h3>Team</h3>
      <div class="price"><span>$29</span> /mo</div>
      <ul>
        <li>Everything in Pro</li>
        <li>Team roles</li>
        <li>Audit log</li>
      </ul>
      <a href="#" class="pricing-cta">Choose Team</a>
    </div>
  </div>
</body>
</html>
