<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empty State Component Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: sans-serif;
        background-color: #f3f4f6;
        padding: 2rem;
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .demo-section {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
    </style>
  </head>
  <body>
    <div class="demo-section">
      <h2>Compact Empty State</h2>
      <!-- Compact Empty State -->
      <div class="empty-state compact">
        <div class="empty-icon">📁</div>

        <h3>No Files Found</h3>

        <p>Upload your first file to get started.</p>

        <button class="empty-btn">Upload File</button>
      </div>
    </div>

    <div class="demo-section">
      <h2>Full Page Empty State</h2>
      <!-- Full Page Empty State -->
      <div class="empty-state full-page">
        <div class="empty-icon">📊</div>

        <h2>No Analytics Available</h2>

        <p>Data will appear here once activity is detected.</p>

        <button class="empty-btn">Refresh Data</button>
      </div>
    </div>
  </body>
</html>
