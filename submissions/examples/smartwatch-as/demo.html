<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartwatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="watch">
    <span class="strap top"></span>
    <span class="strap bottom"></span>

    <div class="case">
      <span class="crown"></span>
      <div class="screen" style="--ring: 74;">
        <span class="ring"></span>
        <div class="face">
          <span class="date">MON 12</span>
          <span class="time">10:09</span>
          <div class="comps">
            <span class="comp hr">&#10084; 72</span>
            <span class="comp st">&#128694; 8.4k</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
