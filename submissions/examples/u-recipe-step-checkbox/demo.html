<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-recipe-step-checkbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Recipe Step Checklist</h1>
    <p class="subtitle">
        Animated strikethrough completion effect
    </p>

    <div class="recipe-card">

        <h2>Classic Pasta Recipe</h2>

        <div class="step completed">
            <div class="checkmark">✓</div>
            <div class="step-text">
                Boil water in a large pot
            </div>
        </div>

        <div class="step completed">
            <div class="checkmark">✓</div>
            <div class="step-text">
                Add pasta and cook for 10 minutes
            </div>
        </div>

        <div class="step">
            <div class="checkmark empty"></div>
            <div class="step-text">
                Prepare tomato sauce
            </div>
        </div>

        <div class="step">
            <div class="checkmark empty"></div>
            <div class="step-text">
                Mix pasta with sauce
            </div>
        </div>

        <div class="step">
            <div class="checkmark empty"></div>
            <div class="step-text">
                Serve and garnish with cheese
            </div>
        </div>

    </div>

    <div class="showcase">

        <div class="demo-card">
            <h3>Completed Step</h3>
            <div class="sample completed-sample">
                Chop vegetables
            </div>
        </div>

        <div class="demo-card">
            <h3>Pending Step</h3>
            <div class="sample">
                Heat cooking pan
            </div>
        </div>

    </div>

</div>

</body>
</html>
