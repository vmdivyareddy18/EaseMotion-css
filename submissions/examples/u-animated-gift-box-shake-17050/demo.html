<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gift Box Shake</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Gift Box Shake</h1>

    <p>
      A playful gift box animation designed for rewards,
      promotions, celebrations, and gamification interfaces.
    </p>

    <div class="demo-grid">

      <button class="gift-button">
        <span class="gift-icon">🎁</span>
      </button>

      <button class="gift-button card-style">
        <span class="gift-icon">🎁</span>
        <span>Claim Reward</span>
      </button>

      <div class="reward-card">
        <h3>Daily Bonus</h3>
        <p>
          Open your reward box and collect today's surprise.
        </p>

        <button class="gift-button small">
          <span class="gift-icon">🎁</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
