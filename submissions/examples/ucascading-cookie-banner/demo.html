<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Cascading Cookie Banner</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="page-content">

        <h1>Music Streaming Dashboard</h1>

        <p>
            Scroll through the page to see how the cookie banner
            fits naturally into a modern music player interface.
        </p>

    </main>

    <aside
        class="ease-cookie-banner ease-cascading"
        role="dialog"
        aria-labelledby="cookie-title"
        aria-describedby="cookie-description">

        <div class="banner-content">

            <h2 id="cookie-title">
                🍪 Cookie Preferences
            </h2>

            <p id="cookie-description">
                We use cookies to personalize your experience,
                improve performance, and remember your preferences.
            </p>

        </div>

        <div class="banner-actions">

            <button class="btn secondary">
                Decline
            </button>

            <button class="btn primary">
                Accept
            </button>

        </div>

    </aside>

</body>

</html>
