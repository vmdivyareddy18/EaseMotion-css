<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Urban Food Hall</title>
</head>
<body>
  <header class="hero-hall">
    <h1>Taste the City.</h1>
    <p>A curated collective of local chefs and artisan flavors.</p>
  </header>
  <section class="vendor-grid">
    <div class="vendor-card">
        <h3>Taco Foundry</h3>
        <p><span class="tag-badge">Street Food</span></p>
    </div>
    <div class="vendor-card">
        <h3>Sushi Lab</h3>
        <p><span class="tag-badge">Japanese Fusion</span></p>
    </div>
  </section>
</body>
</html>
