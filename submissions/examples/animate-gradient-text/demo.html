<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Gradient Text Utility — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #0f172a; margin: 0; padding: 4rem 0; display: flex; align-items: center; min-height: 80vh;">

  <div class="ease-gradient-showcase">
    
    <div style="margin-bottom: 3rem;">
      <h1 class="ease-animate-gradient" style="font-size: 3.5rem; margin: 0 0 1rem 0; line-height: 1.1;">
        Next-Gen Motion Frameworks
      </h1>
      <p style="color: #94a3b8; font-size: 1.1rem; margin: 0;">
        Smooth multi-stop text gradients running smoothly inside native viewport threads.
      </p>
    </div>

    <div>
      <h2 class="ease-animate-gradient is-oceanic" style="font-size: 2.25rem; margin: 0 0 0.5rem 0;">
        Hardware-Accelerated Repaints
      </h2>
      <p style="color: #64748b; font-size: 0.95rem; margin: 0;">
        Using clipped background coordinate sets to preserve performance limits.
      </p>
    </div>

  </div>

</body>
</html>
