<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Skew Dark Mode Toggle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <h1>Skew Dark Mode Toggle</h1>

    <label class="toggle" aria-label="Toggle dark mode">
      <input type="checkbox">
      <span class="slider">
        <span class="sun">☀</span>
        <span class="moon">☾</span>
      </span>
    </label>

    <p>Animated skew style dark mode toggle using pure CSS.</p>
  </main>

</body>
</html>
