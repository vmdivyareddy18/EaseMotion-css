<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Labels Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
      padding: 40px;
    }
    .container {
      width: 100%;
      max-width: 500px;
    }
    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 40px;
      font-weight: 400;
    }
    .demo-section {
      margin-bottom: 40px;
      padding: 30px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }
    .demo-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Floating Labels Form Input</h2>
    
    <!-- Default Floating Labels -->
    <div class="demo-section">
      <div class="demo-label">Default Style</div>
      <div class="float-group">
        <input type="text" id="name" placeholder=" " required>
        <label for="name">Full Name</label>
      </div>
      <div class="float-group">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">Email Address</label>
      </div>
      <div class="float-group">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Password</label>
      </div>
    </div>
    
    <!-- Underline Style -->
    <div class="demo-section">
      <div class="demo-label">Underline Style</div>
      <div class="float-group float-underline">
        <input type="text" id="uname" placeholder=" " required>
        <label for="uname">Username</label>
      </div>
      <div class="float-group float-underline">
        <input type="tel" id="phone" placeholder=" " required>
        <label for="phone">Phone Number</label>
      </div>
    </div>
    
    <!-- Filled Style -->
    <div class="demo-section">
      <div class="demo-label">Filled Style</div>
      <div class="float-group float-filled">
        <input type="text" id="company" placeholder=" " required>
        <label for="company">Company</label>
      </div>
      <div class="float-group float-filled">
        <input type="text" id="role" placeholder=" " required>
        <label for="role">Job Title</label>
      </div>
    </div>
    
    <!-- With Icons -->
    <div class="demo-section">
      <div class="demo-label">With Icons</div>
      <div class="float-group float-icon">
        <span class="float-icon-left">👤</span>
        <input type="text" id="user" placeholder=" " required>
        <label for="user">Username</label>
      </div>
      <div class="float-group float-icon">
        <span class="float-icon-left">🔒</span>
        <input type="password" id="pass" placeholder=" " required>
        <label for="pass">Password</label>
      </div>
    </div>
    
    <!-- Textarea -->
    <div class="demo-section">
      <div class="demo-label">Textarea</div>
      <div class="float-group">
        <textarea id="message" placeholder=" " rows="4" required></textarea>
        <label for="message">Your Message</label>
      </div>
    </div>
  </div>
</body>
</html>
