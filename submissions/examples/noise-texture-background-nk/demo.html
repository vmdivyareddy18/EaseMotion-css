<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Texture Background Utility</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero noise-bg">
    <div class="hero-content">
        <span class="badge">NEW UTILITY</span>

        <h1>Noise Texture Background</h1>

        <p>
            Add subtle grain and depth to interfaces using
            a reusable pure CSS noise texture utility.
        </p>

        <button>Explore Utility</button>
    </div>
</section>

<section class="cards">

    <div class="card noise-soft">
        <h3>Soft Grain</h3>
        <p>Light noise texture for elegant surfaces.</p>
    </div>

    <div class="card noise-medium">
        <h3>Medium Grain</h3>
        <p>Balanced texture for dashboards and cards.</p>
    </div>

    <div class="card noise-heavy">
        <h3>Heavy Grain</h3>
        <p>Bold textured effect for hero sections.</p>
    </div>

</section>

</body>
</html>
