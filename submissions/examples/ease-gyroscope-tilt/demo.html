<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Gyroscope Tilt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Ease Gyroscope Tilt</h1>
        <p>
            Move your phone to see the card react to gyroscope movement.
            On desktop, move your mouse over the card.
        </p>

        <div class="tilt-card" id="tiltCard">
            <div class="card-glow"></div>

            <div class="card-content">
                <h2>Interactive Card</h2>
                <p>
                    This element tilts smoothly using device orientation
                    data from your phone's gyroscope.
                </p>
            </div>
        </div>

        <button id="enableGyro">
            Enable Gyroscope
        </button>

    </div>

    <script>
        const card = document.getElementById("tiltCard");
        const button = document.getElementById("enableGyro");

        const maxTilt = 18;

        function applyTilt(x, y) {
            card.style.transform =
                `rotateX(${y}deg) rotateY(${x}deg)`;
        }

        /* Desktop Fallback */

        card.addEventListener("mousemove", (e) => {

            const rect = card.getBoundingClientRect();

            const x =
                ((e.clientX - rect.left) / rect.width - 0.5) * 2;

            const y =
                ((e.clientY - rect.top) / rect.height - 0.5) * 2;

            applyTilt(
                x * maxTilt,
                -y * maxTilt
            );
        });

        card.addEventListener("mouseleave", () => {
            applyTilt(0, 0);
        });

        /* Mobile Gyroscope */

        async function enableGyroscope() {

            try {

                if (
                    typeof DeviceOrientationEvent !== "undefined" &&
                    typeof DeviceOrientationEvent.requestPermission === "function"
                ) {

                    const permission =
                        await DeviceOrientationEvent.requestPermission();

                    if (permission !== "granted") {
                        return;
                    }
                }

                window.addEventListener(
                    "deviceorientation",
                    (event) => {

                        let x =
                            (event.gamma / 45) * maxTilt;

                        let y =
                            (event.beta / 45) * maxTilt;

                        x = Math.max(
                            -maxTilt,
                            Math.min(maxTilt, x)
                        );

                        y = Math.max(
                            -maxTilt,
                            Math.min(maxTilt, y)
                        );

                        applyTilt(x, -y);
                    }
                );

                button.style.display = "none";

            } catch (error) {
                console.error(error);
            }
        }

        button.addEventListener(
            "click",
            enableGyroscope
        );
    </script>

</body>

</html>
