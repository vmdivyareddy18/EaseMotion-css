<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Linear Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Line Chart – Linear Growth</h1>

  <div class="chart-wrapper">
    <svg viewBox="0 0 500 250" class="chart-svg" id="chartSvg">
      <line x1="40" y1="210" x2="460" y2="210" stroke="#ccc" stroke-width="1" />
      <line x1="40" y1="210" x2="40" y2="20" stroke="#ccc" stroke-width="1" />
      <polyline class="chart-line" id="chartLine"
        points="50,200 130,160 210,100 290,140 370,60 450,110"
        fill="none" />
      <circle class="chart-point" cx="50" cy="200" r="5" />
      <circle class="chart-point" cx="130" cy="160" r="5" />
      <circle class="chart-point" cx="210" cy="100" r="5" />
      <circle class="chart-point" cx="290" cy="140" r="5" />
      <circle class="chart-point" cx="370" cy="60" r="5" />
      <circle class="chart-point" cx="450" cy="110" r="5" />
    </svg>
  </div>

  <button id="replayBtn">Replay</button>

  <script>
    const chartLine = document.getElementById('chartLine');
    const replayBtn = document.getElementById('replayBtn');

    function triggerAnimation() {
      chartLine.classList.remove('animate');
      void chartLine.offsetWidth;
      chartLine.classList.add('animate');
    }

    replayBtn.addEventListener('click', triggerAnimation);

    window.addEventListener('load', triggerAnimation);
  </script>
</body>
</html>
