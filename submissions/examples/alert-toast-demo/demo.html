<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert and Toast Notification Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Alert and Toast Notifications</h1>
    <p class="description">A CSS-only Alert and Toast Notification Component demo for common messaging patterns.</p>

    <!-- Alert Examples -->
    <div class="alert success">
      ✔ Operation completed successfully.
    </div>

    <div class="alert warning">
      ⚠ Please review your input before continuing.
    </div>

    <div class="alert error">
      ✖ Something went wrong.
    </div>

    <div class="alert info">
      ℹ New update available.
    </div>

    <!-- Toast Example -->
    <div class="toast success-toast">
      ✔ File uploaded successfully.
    </div>
  </div>
</body>
</html>
