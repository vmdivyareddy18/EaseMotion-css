<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Shake SaaS Showcase Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Launch Dashboard
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="badge">SaaS Analytics</div>

        <h2>Performance Overview</h2>

        <p>
            Monitor business growth with a responsive SaaS dashboard featuring
            a smooth Micro Shake animation built entirely using HTML and CSS.
        </p>

        <div class="metrics">

            <div class="metric">
                <span>Revenue</span>
                <strong>$18.4K</strong>
            </div>

            <div class="metric">
                <span>Users</span>
                <strong>12.8K</strong>
            </div>

            <div class="metric">
                <span>Growth</span>
                <strong>+24%</strong>
            </div>

        </div>

        <button>View Dashboard</button>

    </div>

</div>

</body>
</html>
