<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Minimalist Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="minimal">

    <h1>Dark Minimalist UI</h1>
    <p>Simple and elegant interface</p>

    <div class="items">

        <div class="item">

            <button class="dark-btn" aria-describedby="tooltip-1">
                Profile
            </button>

            <div class="tooltip" id="tooltip-1" role="tooltip">
                View user profile
            </div>

        </div>


        <div class="item">

            <button class="dark-btn" aria-describedby="tooltip-2">
                Settings
            </button>

            <div class="tooltip" id="tooltip-2" role="tooltip">
                Manage preferences
            </div>

        </div>


        <div class="item">

            <button class="dark-btn" aria-describedby="tooltip-3">
                Dashboard
            </button>

            <div class="tooltip" id="tooltip-3" role="tooltip">
                Open analytics dashboard
            </div>

        </div>

    </div>

</section>

</body>
</html>
