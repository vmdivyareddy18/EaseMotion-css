<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Checkout Micro Shake Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="checkout-container">
        <div class="checkout-form-row">
            <label for="promo-input" class="field-label">Promo Code or Gift Card</label>

            <div class="tooltip-wrapper">
                <div class="input-action-group">
                    <input type="text" id="promo-input" class="checkout-field" placeholder="SUMMER25"
                        aria-describedby="promo-shake-tooltip">
                    <button type="button" class="apply-btn">Apply</button>

                    <div id="promo-shake-tooltip" class="checkout-tooltip" role="tooltip">
                        <span class="tooltip-header-alert">Discount Rules</span>
                        <p class="tooltip-body">Only one promotional code can be applied per checkout sequence. Excludes
                            sale items.</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
