<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech Rotate Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="tech-card">

        <h2>Minimal Tech</h2>

        <p>
            A clean dashboard interface with a smooth rotate-click modal built entirely with HTML and CSS.
        </p>

        <a href="#modal" class="btn">
            Open Dashboard
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">Dashboard Summary</h2>

        <div class="stats">

            <div class="stat">
                <h3>Projects</h3>
                <span>18</span>
            </div>

            <div class="stat">
                <h3>Tasks</h3>
                <span>146</span>
            </div>

            <div class="stat">
                <h3>Completed</h3>
                <span>92%</span>
            </div>

            <div class="stat">
                <h3>Team</h3>
                <span>12</span>
            </div>

        </div>

        <button class="action-btn">
            View Analytics
        </button>

    </div>

</div>

</body>
</html>
