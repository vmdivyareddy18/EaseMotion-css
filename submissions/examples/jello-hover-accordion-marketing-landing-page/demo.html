<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jello-Hover Accordion Demo — Marketing Landing Page</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #f8fafc; }
    h2 { color: #0f172a; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Jello-Hover Accordion — Marketing Landing Page</h2>

  <div class="ease-accordion">
    <div class="ease-accordion__item" data-open="true">
      <button class="ease-accordion__header" aria-expanded="true">
        <span>How does the free trial work?</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Sign up and get full access for 14 days — no credit card required.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Can I upgrade or downgrade later?</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Yes, you can change your plan anytime from your account settings.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Is there a discount for annual billing?</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Yes — annual plans save you 20% compared to monthly billing.
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ease-accordion__header').forEach((btn) => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.ease-accordion__item');
        const isOpen = item.getAttribute('data-open') === 'true';
        item.setAttribute('data-open', String(!isOpen));
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    });
  </script>
</body>
</html>
