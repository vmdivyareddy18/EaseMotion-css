<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Marker Cluster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Map Marker Cluster</h1>

  <div class="container">
    <div class="map" id="map">

      <div class="cluster" id="cluster1" data-expanded="false" data-count="4">
        <div class="cluster-bubble">
          <span class="cluster-count">4</span>
        </div>
        <div class="cluster-pulse"></div>

        <div class="markers">
          <div class="marker" data-index="0" style="--i:0">
            <div class="marker-pin"></div>
            <div class="marker-label">Cafe</div>
          </div>
          <div class="marker" data-index="1" style="--i:1">
            <div class="marker-pin"></div>
            <div class="marker-label">Park</div>
          </div>
          <div class="marker" data-index="2" style="--i:2">
            <div class="marker-pin"></div>
            <div class="marker-label">Library</div>
          </div>
          <div class="marker" data-index="3" style="--i:3">
            <div class="marker-pin"></div>
            <div class="marker-label">Gym</div>
          </div>
        </div>
      </div>

      <div class="cluster" id="cluster2" data-expanded="false" data-count="3">
        <div class="cluster-bubble">
          <span class="cluster-count">3</span>
        </div>
        <div class="cluster-pulse"></div>

        <div class="markers">
          <div class="marker" data-index="0" style="--i:0">
            <div class="marker-pin"></div>
            <div class="marker-label">Hotel</div>
          </div>
          <div class="marker" data-index="1" style="--i:1">
            <div class="marker-pin"></div>
            <div class="marker-label">Mall</div>
          </div>
          <div class="marker" data-index="2" style="--i:2">
            <div class="marker-pin"></div>
            <div class="marker-label">Cinema</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    document.querySelectorAll('.cluster').forEach(cluster => {
      const bubble = cluster.querySelector('.cluster-bubble');
      const markers = cluster.querySelector('.markers');
      const pulse = cluster.querySelector('.cluster-pulse');

      bubble.addEventListener('click', (e) => {
        e.stopPropagation();
        const expanded = cluster.dataset.expanded === 'true';

        if (expanded) {
          cluster.dataset.expanded = 'false';
          cluster.classList.remove('expanded');
          markers.querySelectorAll('.marker').forEach(m => m.classList.remove('visible'));
        } else {
          document.querySelectorAll('.cluster.expanded').forEach(c => {
            c.dataset.expanded = 'false';
            c.classList.remove('expanded');
            c.querySelectorAll('.marker').forEach(m => m.classList.remove('visible'));
          });

          cluster.dataset.expanded = 'true';
          cluster.classList.add('expanded');

          markers.querySelectorAll('.marker').forEach(m => {
            setTimeout(() => m.classList.add('visible'), 50);
          });
        }
      });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.cluster')) {
        document.querySelectorAll('.cluster.expanded').forEach(c => {
          c.dataset.expanded = 'false';
          c.classList.remove('expanded');
          c.querySelectorAll('.marker').forEach(m => m.classList.remove('visible'));
        });
      }
    });
  </script>
</body>
</html>
