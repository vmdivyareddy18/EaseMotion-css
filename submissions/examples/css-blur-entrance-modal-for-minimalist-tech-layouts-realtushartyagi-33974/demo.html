<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Blur-Entrance Modal (Minimalist Tech)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #fafafa;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 10px 24px;
      background: #000000;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.875rem;
      border: 1px solid #000000;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .demo-trigger-btn:hover {
      background: #333333;
      border-color: #333333;
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#min-modal" class="demo-trigger-btn">Configure API Key</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="min-modal" class="ease-min-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-min-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-min-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <a href="#" class="ease-min-modal-close" aria-label="Close modal dialog">&times;</a>
      
      <h2 id="modal-title" class="ease-min-modal-title">API Configuration</h2>
      <p class="ease-min-modal-text">
        Notice the snappy <strong>Blur-Entrance</strong> interaction. It fades in while un-blurring, capturing the stark, functional aesthetics of minimalist tech tools using pure CSS.
      </p>
      
      <div class="ease-min-input-group">
        <label class="ease-min-label">Secret Key</label>
        <input type="password" class="ease-min-input" value="sk_test_1234567890abcdef" readonly>
      </div>
      
      <div class="ease-min-modal-actions">
        <a href="#" class="ease-min-modal-btn ease-min-modal-btn-secondary">Cancel</a>
        <a href="#" class="ease-min-modal-btn">Regenerate Key</a>
      </div>
    </div>

  </div>

</body>
</html>
