<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS avatar-bordered</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Bordered Avatars</h1>
    <div class="avatar-row">
      <div class="b-avatar" style="background:#e94560;"><span class="ba-inner">A</span></div>
      <div class="b-avatar" style="background:#533483;"><span class="ba-inner">B</span></div>
      <div class="b-avatar" style="background:#2ecc71;"><span class="ba-inner">C</span></div>
      <div class="b-avatar" style="background:#f39c12;"><span class="ba-inner">D</span></div>
    </div>
  </div>
</body>
</html>
