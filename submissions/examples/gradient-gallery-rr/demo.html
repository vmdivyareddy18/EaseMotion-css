<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Collection Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🌈 Gradient Collection Gallery</h1>
        <p>Explore beautiful modern gradients for your next project.</p>
    </header>

    <section class="gallery">

        <div class="gradient-card purple-blue">
            <h3>Purple Bliss</h3>
            <span>#8B5CF6 → #3B82F6</span>
        </div>

        <div class="gradient-card sunset">
            <h3>Sunset Glow</h3>
            <span>#F97316 → #EC4899</span>
        </div>

        <div class="gradient-card aurora">
            <h3>Aurora Sky</h3>
            <span>#06B6D4 → #22C55E</span>
        </div>

        <div class="gradient-card ocean">
            <h3>Ocean Wave</h3>
            <span>#0EA5E9 → #1D4ED8</span>
        </div>

        <div class="gradient-card cosmic">
            <h3>Cosmic Night</h3>
            <span>#4F46E5 → #EC4899</span>
        </div>

        <div class="gradient-card fire">
            <h3>Fire Burst</h3>
            <span>#F59E0B → #EF4444</span>
        </div>

    </section>

</div>

</body>
</html>
