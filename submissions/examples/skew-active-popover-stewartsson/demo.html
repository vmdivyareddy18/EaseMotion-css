<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Portfolio - Skew-Active Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="portfolio-viewport">
        <!-- Main Premium Portfolio Card Elevation Container Hub Shell -->
        <div class="showcase-card-node">
            <header class="showcase-header">
                <span class="portfolio-badge">Creative Studio v6</span>
                <h3 class="showcase-title">Dynamic Layer Matrix</h3>
                <p class="showcase-subtitle">Hover over the action module selector below to trigger the pure-CSS horizontal skew-active popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">🎨</span>
                        <span class="btn-text">Open Works Deck</span>
                    </button>

                    <!-- Floating Popover Horizontal Skew-Active Overlay Menu Shell Box -->
                    <div class="skew-active-popover ease-skew-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Project Categories</h4>
                            <ul class="portfolio-actions-list">
                                <li class="menu-item"><a href="#3d" class="action-link-node">3D Spatial Models</a></li>
                                <li class="menu-item"><a href="#motion" class="action-link-node">Motion Keyframes</a></li>
                                <li class="menu-item"><a href="#purge" class="action-link-node action-danger">Purge Asset Cache</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="showcase-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
