<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modal Class Name Conflict Demo</title>
  <link rel="stylesheet" href="style.css">
  <!-- Simulating the core CSS being loaded -->
  <style>
    /* Simulated core EaseMotion modal CSS */
    .ease-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .ease-modal.active {
      display: block;
    }
    .ease-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 999;
    }
    .ease-modal-overlay.active {
      display: block;
    }
  </style>
</head>
<body>

  <!-- External framework or user global styles conflicting -->
  <div class="content">
    <h1>Modal Class Conflict Demo</h1>
    <p>Click the button below to see how external styles break the modal appearance.</p>
    <button onclick="toggleModal()">Open Modal</button>
  </div>

  <div id="modal-overlay" class="ease-modal-overlay"></div>
  <div id="my-modal" class="ease-modal modal">
    <h2>Conflict Detected</h2>
    <p>This modal inherits a generic <code>.modal</code> class from an external stylesheet that overrides its dimensions and positioning, breaking the intended EaseMotion design.</p>
    <button onclick="toggleModal()">Close</button>
  </div>

  <script>
    function toggleModal() {
      document.getElementById('my-modal').classList.toggle('active');
      document.getElementById('modal-overlay').classList.toggle('active');
    }
  </script>
</body>
</html>
