<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Finance Share Portal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="vault-workspace">
    <div class="slingshot-widget-wrapper">
      
      <!-- Sibling checkbox controller to handle interaction state transitions purely in CSS -->
      <input type="checkbox" id="slingshot-expanded-state" class="hidden-state-input">
      
      <label for="slingshot-expanded-state" class="slingshot-master-trigger" tabindex="0">
        <span class="trigger-dot"></span>
        <span class="action-text-node">Distribute Ledger</span>
      </label>

      <!-- Slingshot Action Bar Drawer -->
      <div class="slingshot-drawer-tray">
        <a href="#secure-copy" class="slingshot-action-item" style="--slingshot-index: 1;">
          <span class="item-icon">🔗</span>
          <span class="item-lbl">Secure Link</span>
        </a>
        <a href="#encrypted-mail" class="slingshot-action-item" style="--slingshot-index: 2;">
          <span class="item-icon">✉️</span>
          <span class="item-lbl">Encrypted Email</span>
        </a>
        <a href="#download-pdf" class="slingshot-action-item" style="--slingshot-index: 3;">
          <span class="item-icon">📊</span>
          <span class="item-lbl">Audit Sheet</span>
        </a>
      </div>

    </div>
  </main>

  <script>
    // Map spacebar and enter keys for focusable label interactions
    const triggerNode = document.querySelector('.slingshot-master-trigger');
    triggerNode.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(triggerNode.getAttribute('for')).click();
      }
    });
  </script>
</body>
</html>
