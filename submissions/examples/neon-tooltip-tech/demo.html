<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Neon Tooltip — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="sandbox-container">
    <div class="brand-header">
      <span class="badge">EASEMOTION LABS</span>
      <h1>Minimalist Tech Tooltip</h1>
      <p>Zero-JS interactive micro-monitors engineered with structural CSS pseudo-anchors.</p>
    </div>

    <div class="interactive-grid">
      
      <!-- Component 1: Matrix Emerald Variant -->
      <button class="tooltip-trigger emerald-variant" data-tooltip="CORE // STABLE — LATENCY 12ms">
        <span class="status-dot"></span>
        System Engine
      </button>
      
      <!-- Component 2: Cyber Quartz Variant (Default Anchor) -->
      <div class="tooltip-trigger input-field-wrapper" data-tooltip="SECURE NODE // AES-256 ENCRYPTED">
        <input type="text" value="0x71C...B29" readonly aria-label="Cryptographic Node ID">
      </div>

      <!-- Component 3: Solar Amber Variant -->
      <button class="tooltip-trigger amber-variant" data-tooltip="WARN // OVERFLOW CAPACITY AT 89%">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Node Diagnostic
      </button>

    </div>
  </main>

</body>
</html>
