<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Slide Loop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="carousel">
    <h1 class="carousel-title">Carousel Slide Loop</h1>
    <div class="carousel-container">
      <button class="carousel-btn carousel-btn--prev" aria-label="Previous slide">&lt;</button>
      <div class="carousel-track-wrapper">
        <div class="carousel-track" id="track">
          <div class="carousel-slide" style="background: #FF6B6B;">Slide 1</div>
          <div class="carousel-slide" style="background: #4ECDC4;">Slide 2</div>
          <div class="carousel-slide" style="background: #45B7D1;">Slide 3</div>
          <div class="carousel-slide" style="background: #96CEB4;">Slide 4</div>
          <div class="carousel-slide" style="background: #FFEAA7;">Slide 5</div>
        </div>
      </div>
      <button class="carousel-btn carousel-btn--next" aria-label="Next slide">&gt;</button>
    </div>
    <div class="carousel-dots" id="dots">
      <button class="carousel-dot active" data-index="0" aria-label="Go to slide 1"></button>
      <button class="carousel-dot" data-index="1" aria-label="Go to slide 2"></button>
      <button class="carousel-dot" data-index="2" aria-label="Go to slide 3"></button>
      <button class="carousel-dot" data-index="3" aria-label="Go to slide 4"></button>
      <button class="carousel-dot" data-index="4" aria-label="Go to slide 5"></button>
    </div>
  </div>
  <script>
    const track = document.getElementById('track');
    const slides = Array.from(track.children);
    const dots = document.querySelectorAll('.carousel-dot');
    const prevBtn = document.querySelector('.carousel-btn--prev');
    const nextBtn = document.querySelector('.carousel-btn--next');
    const carouselContainer = document.querySelector('.carousel-container');

    let currentIndex = 0;
    let interval;

    const updateCarousel = () => {
      const slideWidth = slides[0].getBoundingClientRect().width;
      track.style.transform = 'translateX(-' + (currentIndex * slideWidth) + 'px)';
      dots.forEach(function (dot, i) {
        dot.classList.toggle('active', i === currentIndex);
      });
    };

    const goToSlide = function (index) {
      currentIndex = index;
      updateCarousel();
    };

    const nextSlide = function () {
      currentIndex = (currentIndex + 1) % slides.length;
      updateCarousel();
    };

    const prevSlide = function () {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      updateCarousel();
    };

    const startAutoSlide = function () {
      interval = setInterval(nextSlide, 3000);
    };

    const stopAutoSlide = function () {
      clearInterval(interval);
    };

    nextBtn.addEventListener('click', function () {
      stopAutoSlide();
      nextSlide();
      startAutoSlide();
    });

    prevBtn.addEventListener('click', function () {
      stopAutoSlide();
      prevSlide();
      startAutoSlide();
    });

    dots.forEach(function (dot) {
      dot.addEventListener('click', function () {
        stopAutoSlide();
        goToSlide(parseInt(dot.getAttribute('data-index')));
        startAutoSlide();
      });
    });

    carouselContainer.addEventListener('mouseenter', stopAutoSlide);
    carouselContainer.addEventListener('mouseleave', startAutoSlide);
    window.addEventListener('resize', updateCarousel);

    startAutoSlide();
  </script>
</body>
</html>
