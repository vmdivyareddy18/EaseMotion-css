<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS button-text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Text Buttons</h1>
    <div class="button-grid">
      <button class="btn-text"><span class="btn-label">Hover Me</span><span class="btn-arrow">&#8594;</span></button>
      <button class="btn-text"><span class="btn-label">Get Started</span><span class="btn-arrow">&#8594;</span></button>
      <button class="btn-text"><span class="btn-label">Learn More</span><span class="btn-arrow">&#8594;</span></button>
    </div>
  </div>
</body>
</html>
