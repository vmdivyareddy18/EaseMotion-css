<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Physics Sandbox</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🏖️ Physics Sandbox</h1>
        <p class="subtitle">Falling sand particles with interactive barriers</p>

        <div class="sandbox-wrapper">
            <canvas id="sandboxCanvas"></canvas>

            <div class="controls">
                <button id="brushBtn">Brush: Circle</button>
                <button id="sizeBtn">Size: Medium</button>
                <button id="colorBtn">Color: Sand</button>
                <button id="clearBtn">Clear</button>
            </div>

            <div class="status">
                <span id="statusText">🏖️ Click and drag to paint sand</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('sandboxCanvas');
        const ctx = canvas.getContext('2d');
        const brushBtn = document.getElementById('brushBtn');
        const sizeBtn = document.getElementById('sizeBtn');
        const colorBtn = document.getElementById('colorBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        const CELL_SIZE = 4;
        let grid = [];
        let width = 0;
        let height = 0;
        let cols = 0;
        let rows = 0;
        let brushType = 0;
        let brushSize = 2;
        let colorMode = 0;
        let isDrawing = false;
        let mouseX = 0;
        let mouseY = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let barriers = [];

        // ===== BRUSH OPTIONS =====
        const brushTypes = ['Circle', 'Square', 'Line', 'Spray', 'Eraser'];

        // ===== SIZE OPTIONS =====
        const brushSizes = [
            { name: 'Small', value: 1 },
            { name: 'Medium', value: 2 },
            { name: 'Large', value: 3 },
            { name: 'Huge', value: 5 },
        ];

        // ===== COLOR OPTIONS =====
        const colorModes = [
            { name: 'Sand', colors: ['#d4a574', '#c4946a', '#b4845a', '#a4744a', '#94643a'] },
            { name: 'Rainbow', colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#9b59b6'] },
            { name: 'Ocean', colors: ['#006994', '#0077b6', '#00b4d8', '#48cae4', '#90e0ef'] },
            { name: 'Fire', colors: ['#ff0000', '#ff4500', '#ff6b00', '#ff8c00', '#ffa500'] },
            { name: 'Galaxy', colors: ['#7c3aed', '#8b5cf6', '#a78bfa', '#c084fc', '#e0a0ff'] },
            { name: 'Neon', colors: ['#ff00ff', '#ff0080', '#00ffff', '#ff00aa', '#00ff80'] },
            { name: 'Pastel', colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff'] },
            { name: 'Monochrome', colors: ['#ffffff', '#cccccc', '#999999', '#666666', '#333333'] },
        ];

        // ===== GRID FUNCTIONS =====
        function initGrid() {
            width = canvas.width;
            height = canvas.height;
            cols = Math.ceil(width / CELL_SIZE);
            rows = Math.ceil(height / CELL_SIZE);
            
            grid = [];
            for (let i = 0; i < cols; i++) {
                grid[i] = [];
                for (let j = 0; j < rows; j++) {
                    grid[i][j] = { type: 'empty', color: null, settled: false };
                }
            }
        }
        initGrid();

        // ===== BARRIER FUNCTIONS =====
        function addBarrier(x, y, w, h) {
            const col1 = Math.floor(x / CELL_SIZE);
            const row1 = Math.floor(y / CELL_SIZE);
            const col2 = Math.floor((x + w) / CELL_SIZE);
            const row2 = Math.floor((y + h) / CELL_SIZE);
            
            for (let i = col1; i <= col2; i++) {
                for (let j = row1; j <= row2; j++) {
                    if (i >= 0 && i < cols && j >= 0 && j < rows) {
                        grid[i][j] = { type: 'barrier', color: null, settled: true };
                    }
                }
            }
            barriers.push({ x, y, w, h });
        }

        // ===== SAND FUNCTIONS =====
        function addSand(x, y, color) {
            const col = Math.floor(x / CELL_SIZE);
            const row = Math.floor(y / CELL_SIZE);
            
            if (col >= 0 && col < cols && row >= 0 && row < rows) {
                if (grid[col][row].type === 'empty') {
                    grid[col][row] = { 
                        type: 'sand', 
                        color: color || colorModes[colorMode].colors[Math.floor(Math.random() * 5)],
                        settled: false 
                    };
                }
            }
        }

        function updateSand() {
            // Randomize update order for natural look
            const order = [];
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    order.push({ i, j });
                }
            }
            // Shuffle for randomness
            for (let k = order.length - 1; k > 0; k--) {
                const m = Math.floor(Math.random() * (k + 1));
                [order[k], order[m]] = [order[m], order[k]];
            }

            for (const pos of order) {
                const { i, j } = pos;
                const cell = grid[i][j];
                
                if (cell.type === 'sand' && !cell.settled) {
                    let moved = false;
                    
                    // Check down
                    if (j + 1 < rows && grid[i][j + 1].type === 'empty') {
                        grid[i][j + 1] = { type: 'sand', color: cell.color, settled: false };
                        grid[i][j] = { type: 'empty', color: null, settled: false };
                        moved = true;
                    } 
                    // Check down-left and down-right
                    else if (j + 1 < rows) {
                        const dir = Math.random() > 0.5 ? 1 : -1;
                        const left = i + dir;
                        const right = i - dir;
                        
                        if (left >= 0 && left < cols && grid[left][j + 1].type === 'empty') {
                            grid[left][j + 1] = { type: 'sand', color: cell.color, settled: false };
                            grid[i][j] = { type: 'empty', color: null, settled: false };
                            moved = true;
                        } else if (right >= 0 && right < cols && grid[right][j + 1].type === 'empty') {
                            grid[right][j + 1] = { type: 'sand', color: cell.color, settled: false };
                            grid[i][j] = { type: 'empty', color: null, settled: false };
                            moved = true;
                        }
                    }
                    
                    // Settle if can't move
                    if (!moved) {
                        cell.settled = true;
                    }
                }
            }
        }

        // ===== DRAW FUNCTIONS =====
        function drawGrid() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const cell = grid[i][j];
                    const idx = (j * cols + i) * 4 * CELL_SIZE * CELL_SIZE;
                    
                    if (cell.type === 'sand' && cell.color) {
                        const color = hexToRgb(cell.color);
                        for (let dy = 0; dy < CELL_SIZE; dy++) {
                            for (let dx = 0; dx < CELL_SIZE; dx++) {
                                const pixelIdx = ((j * CELL_SIZE + dy) * width + (i * CELL_SIZE + dx)) * 4;
                                data[pixelIdx] = color.r;
                                data[pixelIdx + 1] = color.g;
                                data[pixelIdx + 2] = color.b;
                                data[pixelIdx + 3] = 255;
                            }
                        }
                    } else if (cell.type === 'barrier') {
                        for (let dy = 0; dy < CELL_SIZE; dy++) {
                            for (let dx = 0; dx < CELL_SIZE; dx++) {
                                const pixelIdx = ((j * CELL_SIZE + dy) * width + (i * CELL_SIZE + dx)) * 4;
                                data[pixelIdx] = 100;
                                data[pixelIdx + 1] = 100;
                                data[pixelIdx + 2] = 120;
                                data[pixelIdx + 3] = 200;
                            }
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        // ===== DRAW BRUSH PREVIEW =====
        function drawBrushPreview() {
            const x = mouseX;
            const y = mouseY;
            const size = brushSize * 10;
            const color = colorModes[colorMode].colors[0];

            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            
            if (brushType === 0) { // Circle
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.stroke();
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.1;
                ctx.fill();
            } else if (brushType === 1) { // Square
                ctx.strokeRect(x - size, y - size, size * 2, size * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.1;
                ctx.fillRect(x - size, y - size, size * 2, size * 2);
            } else if (brushType === 3) { // Spray
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * size;
                    const px = x + Math.cos(angle) * dist;
                    const py = y + Math.sin(angle) * dist;
                    ctx.beginPath();
                    ctx.arc(px, py, 1, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (brushType === 4) { // Eraser
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.strokeStyle = '#ff6b6b';
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 0, 0, 0.05)';
                ctx.fill();
            }
            
            ctx.restore();
        }

        // ===== PAINT FUNCTIONS =====
        function paintSand(x, y) {
            const col = Math.floor(x / CELL_SIZE);
            const row = Math.floor(y / CELL_SIZE);
            const size = brushSize;
            const colors = colorModes[colorMode].colors;

            if (brushType === 4) { // Eraser
                for (let i = -size; i <= size; i++) {
                    for (let j = -size; j <= size; j++) {
                        const ci = col + i;
                        const rj = row + j;
                        if (ci >= 0 && ci < cols && rj >= 0 && rj < rows) {
                            if (grid[ci][rj].type === 'sand') {
                                grid[ci][rj] = { type: 'empty', color: null, settled: false };
                            }
                        }
                    }
                }
                return;
            }

            if (brushType === 0) { // Circle
                for (let i = -size; i <= size; i++) {
                    for (let j = -size; j <= size; j++) {
                        const dist = Math.sqrt(i * i + j * j);
                        if (dist <= size) {
                            const ci = col + i;
                            const rj = row + j;
                            if (ci >= 0 && ci < cols && rj >= 0 && rj < rows) {
                                if (grid[ci][rj].type === 'empty' || grid[ci][rj].type === 'sand') {
                                    const color = colors[Math.floor(Math.random() * colors.length)];
                                    grid[ci][rj] = { type: 'sand', color: color, settled: false };
                                }
                            }
                        }
                    }
                }
            } else if (brushType === 1) { // Square
                for (let i = -size; i <= size; i++) {
                    for (let j = -size; j <= size; j++) {
                        const ci = col + i;
                        const rj = row + j;
                        if (ci >= 0 && ci < cols && rj >= 0 && rj < rows) {
                            if (grid[ci][rj].type === 'empty' || grid[ci][rj].type === 'sand') {
                                const color = colors[Math.floor(Math.random() * colors.length)];
                                grid[ci][rj] = { type: 'sand', color: color, settled: false };
                            }
                        }
                    }
                }
            } else if (brushType === 2) { // Line
                for (let i = -size * 2; i <= size * 2; i++) {
                    const ci = col + i;
                    const rj = row + Math.floor(Math.sin(i * 0.2) * size * 0.5);
                    if (ci >= 0 && ci < cols && rj >= 0 && rj < rows) {
                        if (grid[ci][rj].type === 'empty' || grid[ci][rj].type === 'sand') {
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            grid[ci][rj] = { type: 'sand', color: color, settled: false };
                        }
                    }
                }
            } else if (brushType === 3) { // Spray
                for (let i = 0; i < size * 3; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * size * 2;
                    const ci = col + Math.floor(Math.cos(angle) * dist);
                    const rj = row + Math.floor(Math.sin(angle) * dist);
                    if (ci >= 0 && ci < cols && rj >= 0 && rj < rows) {
                        if (grid[ci][rj].type === 'empty' || grid[ci][rj].type === 'sand') {
                            const color = colors[Math.floor(Math.random() * colors.length)];
                            grid[ci][rj] = { type: 'sand', color: color, settled: false };
                        }
                    }
                }
            }
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground() {
            const grad = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height) * 0.7
            );
            grad.addColorStop(0, '#0a0a1e');
            grad.addColorStop(0.5, '#060612');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ===== RENDER LOOP =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            time += 0.01;

            // Update sand physics
            for (let i = 0; i < 3; i++) {
                updateSand();
            }

            // Draw
            drawBackground();
            drawGrid();
            
            // Draw brush preview
            if (isDrawing || (mouseX > 0 && mouseY > 0)) {
                drawBrushPreview();
            }

            // Update status
            if (frameCount % 30 === 0) {
                let sandCount = 0;
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        if (grid[i][j].type === 'sand') sandCount++;
                    }
                }
                statusText.textContent = `🏖️ ${sandCount} grains • ${colorModes[colorMode].name} • ${brushTypes[brushType]}`;
            }

            requestAnimationFrame(render);
        }

        // ===== EVENT LISTENERS =====

        // Mouse
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            isDrawing = true;
            paintSand(mouseX, mouseY);
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            
            if (isDrawing) {
                paintSand(mouseX, mouseY);
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            isDrawing = true;
            paintSand(mouseX, mouseY);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            if (isDrawing) {
                paintSand(mouseX, mouseY);
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        // ===== CONTROLS =====

        // Brush
        brushBtn.addEventListener('click', () => {
            brushType = (brushType + 1) % brushTypes.length;
            brushBtn.textContent = `Brush: ${brushTypes[brushType]}`;
            statusText.textContent = `🖌️ ${brushTypes[brushType]}`;
            setTimeout(() => {
                statusText.textContent = '🏖️ Click and drag to paint sand';
            }, 1000);
        });

        // Size
        sizeBtn.addEventListener('click', () => {
            const currentIndex = brushSizes.findIndex(s => s.value === brushSize);
            const nextIndex = (currentIndex + 1) % brushSizes.length;
            brushSize = brushSizes[nextIndex].value;
            sizeBtn.textContent = `Size: ${brushSizes[nextIndex].name}`;
            statusText.textContent = `📏 ${brushSizes[nextIndex].name}`;
            setTimeout(() => {
                statusText.textContent = '🏖️ Click and drag to paint sand';
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorModes.length;
            colorBtn.textContent = `Color: ${colorModes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorModes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = '🏖️ Click and drag to paint sand';
            }, 1000);
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            initGrid();
            statusText.textContent = '🧹 Cleared!';
            setTimeout(() => {
                statusText.textContent = '🏖️ Click and drag to paint sand';
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'b' || e.key === 'B') {
                brushBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                sizeBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'x' || e.key === 'X') {
                clearBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                // Drop a random barrier
                const x = 50 + Math.random() * (canvas.width - 100);
                const y = 50 + Math.random() * (canvas.height - 100);
                const w = 30 + Math.random() * 40;
                const h = 30 + Math.random() * 40;
                addBarrier(x, y, w, h);
                statusText.textContent = '🧱 Barrier placed!';
                setTimeout(() => {
                    statusText.textContent = '🏖️ Click and drag to paint sand';
                }, 1000);
            }
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initGrid();
        });

        // ===== INIT =====
        brushBtn.textContent = `Brush: ${brushTypes[0]}`;
        sizeBtn.textContent = `Size: ${brushSizes[1].name}`;
        colorBtn.textContent = `Color: ${colorModes[0].name}`;
        statusText.textContent = '🏖️ Click and drag to paint sand';
        lastFpsUpdate = performance.now();

        // Add some initial sand
        setTimeout(() => {
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                addSand(x, y);
            }
        }, 100);

        // Start animation
        render(lastFpsUpdate);

        console.log('🏖️ Physics Sandbox loaded!');
        console.log('💡 Click and drag to paint sand');
        console.log('💡 B - Change brush');
        console.log('💡 S - Change size');
        console.log('💡 C - Change color');
        console.log('💡 X - Clear');
        console.log('💡 SPACE - Add barrier');
    </script>
</body>
</html>
