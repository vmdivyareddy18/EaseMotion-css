<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Motion CSS - Pencil Sketch Effect Studio</title>
  
  <!-- Typography Pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Share+Tech+Mono&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  
  <!-- Import the Custom Element -->
  <script type="module" src="./ease-pencil-sketch-effect.js"></script>

  <style>
    /* Design Tokens for Drafting Studio Demo */
    :root {
      --mat-bg: #12241C;
      --mat-grid-major: rgba(36, 74, 56, 0.4);
      --mat-grid-minor: rgba(36, 74, 56, 0.15);
      --hardware-steel: #E2E8F0;
      --hardware-steel-dark: #64748B;
      --hardware-brass: #C48B58;
      --hardware-ink: #1E2220;
      --paper-bg: #FCFCF9;
      --accent-color: #D97706;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--mat-bg);
      /* CSS grid representing a self-healing cutting mat */
      background-image: 
        linear-gradient(var(--mat-grid-major) 1px, transparent 1px),
        linear-gradient(90deg, var(--mat-grid-major) 1px, transparent 1px),
        linear-gradient(var(--mat-grid-minor) 1px, transparent 1px),
        linear-gradient(90deg, var(--mat-grid-minor) 1px, transparent 1px);
      background-size: 100px 100px, 100px 100px, 10px 10px, 10px 10px;
      color: var(--paper-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    /* Cutting mat borders and measurements */
    body::before {
      content: 'STUDIO MEASURE SYSTEM - EASE MOTION';
      position: absolute;
      top: 15px;
      left: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: rgba(36, 74, 56, 0.6);
      letter-spacing: 2px;
    }

    .studio-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 30px;
      max-width: 1200px;
      width: 100%;
      align-items: start;
    }

    @media (max-width: 900px) {
      .studio-layout {
        grid-template-columns: 1fr;
      }
    }

    /* The Main Drawing Board Sheet */
    .drawing-board {
      background-color: var(--paper-bg);
      border: 8px solid #F1F5F9;
      box-shadow: 
        0 25px 50px -12px rgba(0, 0, 0, 0.5),
        inset 0 0 40px rgba(0,0,0,0.06);
      padding: 24px;
      position: relative;
    }

    /* Tiny corner clips mimicking tape or metal corners on a drawing table */
    .board-clip {
      position: absolute;
      width: 40px;
      height: 40px;
      background-color: rgba(226, 232, 240, 0.85);
      border: 1px solid var(--hardware-steel-dark);
      z-index: 10;
    }
    .clip-tl { top: -4px; left: -4px; transform: rotate(-45deg); border-bottom: none; border-right: none; }
    .clip-tr { top: -4px; right: -4px; transform: rotate(45deg); border-bottom: none; border-left: none; }
    .clip-bl { bottom: -4px; left: -4px; transform: rotate(45deg); border-top: none; border-right: none; }
    .clip-br { bottom: -4px; right: -4px; transform: rotate(-45deg); border-top: none; border-left: none; }

    /* Technical details on the sheet */
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px double var(--hardware-steel-dark);
      padding-bottom: 8px;
      margin-bottom: 20px;
      color: var(--hardware-ink);
    }

    .sheet-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 20px;
      letter-spacing: -0.5px;
    }

    .sheet-header .sheet-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--hardware-steel-dark);
    }

    .preview-container {
      width: 100%;
      background-color: #E2E8F0;
      border: 1px solid var(--hardware-ink);
    }

    .sheet-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--hardware-steel-dark);
    }

    /* Control Panel mimicking a drafting rule hardware bracket */
    .control-bracket {
      background: linear-gradient(145deg, #eef1f6, #cbd5e1);
      border: 2px solid var(--hardware-ink);
      color: var(--hardware-ink);
      padding: 30px 24px;
      position: relative;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
    }

    /* Brass Rivets on Bracket Corners */
    .rivet {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: var(--hardware-brass);
      border: 1px solid var(--hardware-ink);
      border-radius: 50%;
    }
    .rivet::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 1px;
      background-color: var(--hardware-ink);
      transform: translateY(-50%) rotate(45deg);
    }
    .rivet-tl { top: 8px; left: 8px; }
    .rivet-tr { top: 8px; right: 8px; }
    .rivet-bl { bottom: 8px; left: 8px; }
    .rivet-br { bottom: 8px; right: 8px; }

    .bracket-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--hardware-ink);
      padding-bottom: 6px;
      margin-bottom: 24px;
      color: var(--hardware-ink);
    }

    .control-group {
      margin-bottom: 24px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .control-label span.value-readout {
      color: var(--accent-color);
    }

    /* Custom native selection */
    .studio-select, .studio-input-range {
      width: 100%;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--hardware-ink);
      background-color: var(--paper-bg);
      padding: 10px 12px;
      font-size: 14px;
      outline: none;
      cursor: pointer;
      color: var(--hardware-ink);
      transition: box-shadow 0.15s ease;
    }

    .studio-select:focus, .studio-input-range:focus {
      box-shadow: 0 0 0 2px var(--accent-color);
    }

    /* Styled Bracket Range Input (Intensity Ruler) */
    .studio-input-range {
      -webkit-appearance: none;
      appearance: none;
      height: 36px;
      padding: 0 8px;
      background: #D1D5DB;
    }

    .studio-input-range::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 24px;
      background-color: var(--hardware-brass);
      border: 1px solid var(--hardware-ink);
      cursor: pointer;
    }

    .studio-input-range::-moz-range-thumb {
      width: 16px;
      height: 24px;
      background-color: var(--hardware-brass);
      border: 1px solid var(--hardware-ink);
      cursor: pointer;
      border-radius: 0;
    }

    /* Segmented Mode Button selectors */
    .segmented-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border: 1px solid var(--hardware-ink);
      overflow: hidden;
    }

    .segmented-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: bold;
      font-size: 13px;
      padding: 10px 0;
      border: none;
      background-color: var(--paper-bg);
      color: var(--hardware-steel-dark);
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s, color 0.2s;
    }

    .segmented-btn:first-child {
      border-right: 1px solid var(--hardware-ink);
    }

    .segmented-btn.active {
      background-color: var(--hardware-ink);
      color: var(--paper-bg);
    }

    .segmented-btn:focus-visible {
      outline: 2px solid var(--accent-color);
      z-index: 2;
    }

    /* Info plate */
    .technical-specs {
      background-color: rgba(30, 41, 59, 0.05);
      border: 1px dashed var(--hardware-steel-dark);
      padding: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--hardware-steel-dark);
      line-height: 1.6;
    }

    .spec-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .spec-line span:last-child {
      color: var(--hardware-ink);
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="studio-layout">
    
    <!-- Left column: Drawing board workspace -->
    <div class="drawing-board" aria-label="Drawing table workspace">
      <div class="board-clip clip-tl"></div>
      <div class="board-clip clip-tr"></div>
      <div class="board-clip clip-bl"></div>
      <div class="board-clip clip-br"></div>

      <header class="sheet-header">
        <h1>PENCIL SKETCH EFFECT</h1>
        <div class="sheet-meta" id="sketch-resolution">resolution: -- x --</div>
      </header>

      <div class="preview-container">
        <!-- Web Component Instance -->
        <ease-pencil-sketch-effect 
          id="sketch-effect" 
          src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80" 
          intensity="50" 
          mode="pencil">
        </ease-pencil-sketch-effect>
      </div>

      <footer class="sheet-footer">
        <div>EASEMOTION COMPONENT: &lt;ease-pencil-sketch-effect&gt;</div>
        <div>SHEET NO. 01 / CANVAS 2D</div>
      </footer>
    </div>

    <!-- Right column: Mechanical Control Bracket -->
    <aside class="control-bracket" aria-label="Studio hardware controls">
      <div class="rivet rivet-tl"></div>
      <div class="rivet rivet-tr"></div>
      <div class="rivet rivet-bl"></div>
      <div class="rivet rivet-br"></div>

      <h2 class="bracket-title">STUDIO CONTROLS</h2>

      <!-- Image Source Selection -->
      <div class="control-group">
        <label class="control-label" for="image-select">
          Image Source
        </label>
        <select id="image-select" class="studio-select" aria-label="Select source image">
          <option value="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=800&q=80">Portrait (Woman)</option>
          <option value="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80">Architecture (Modern House)</option>
          <option value="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=800&q=80">Nature (Misty Forest)</option>
          <option value="https://invalid-domain-for-cors-testing-error.xyz/image.jpg">Tainted Source (CORS Error Test)</option>
        </select>
      </div>

      <!-- Intensity Slider -->
      <div class="control-group">
        <label class="control-label" for="intensity-slider">
          Sketch Intensity
          <span class="value-readout" id="intensity-val">50%</span>
        </label>
        <input 
          type="range" 
          id="intensity-slider" 
          class="studio-input-range" 
          min="0" 
          max="100" 
          value="50" 
          step="1"
          aria-label="Adjust sketch intensity"
        />
      </div>

      <!-- Mode Selector -->
      <div class="control-group">
        <label class="control-label">
          Medium Mode
          <span class="value-readout" id="mode-val">PENCIL</span>
        </label>
        <div class="segmented-selector">
          <button type="button" id="btn-pencil" class="segmented-btn active" aria-pressed="true">PENCIL</button>
          <button type="button" id="btn-charcoal" class="segmented-btn" aria-pressed="false">CHARCOAL</button>
        </div>
      </div>

      <!-- Technical spec reader -->
      <div class="technical-specs">
        <div class="bracket-title" style="margin-bottom: 12px; font-size: 11px;">METRIC LABELS</div>
        <div class="spec-line">
          <span>Engine:</span>
          <span>HTML5 Canvas 2D</span>
        </div>
        <div class="spec-line">
          <span>Hardware Blending:</span>
          <span>Color Dodge</span>
        </div>
        <div class="spec-line">
          <span>Scale Cap:</span>
          <span>1600px max limit</span>
        </div>
        <div class="spec-line">
          <span>Status:</span>
          <span id="studio-status" style="color: #059669;">CALIBRATING</span>
        </div>
      </div>

    </aside>

  </div>

  <script>
    const comp = document.getElementById('sketch-effect');
    const imageSelect = document.getElementById('image-select');
    const intensitySlider = document.getElementById('intensity-slider');
    const intensityVal = document.getElementById('intensity-val');
    const modeVal = document.getElementById('mode-val');
    const btnPencil = document.getElementById('btn-pencil');
    const btnCharcoal = document.getElementById('btn-charcoal');
    const resReadout = document.getElementById('sketch-resolution');
    const statusLabel = document.getElementById('studio-status');

    // Handle Image source change
    imageSelect.addEventListener('change', (e) => {
      statusLabel.textContent = "LOADING IMAGE";
      statusLabel.style.color = "#D97706";
      comp.src = e.target.value;
    });

    // Handle Intensity slider change
    intensitySlider.addEventListener('input', (e) => {
      const val = e.target.value;
      intensityVal.textContent = `${val}%`;
      comp.intensity = val;
    });

    // Handle Mode button actions
    btnPencil.addEventListener('click', () => {
      setMode('pencil');
    });

    btnCharcoal.addEventListener('click', () => {
      setMode('charcoal');
    });

    function setMode(mode) {
      if (mode === 'pencil') {
        btnPencil.classList.add('active');
        btnPencil.setAttribute('aria-pressed', 'true');
        btnCharcoal.classList.remove('active');
        btnCharcoal.setAttribute('aria-pressed', 'false');
        modeVal.textContent = 'PENCIL';
        comp.mode = 'pencil';
      } else {
        btnCharcoal.classList.add('active');
        btnCharcoal.setAttribute('aria-pressed', 'true');
        btnPencil.classList.remove('active');
        btnPencil.setAttribute('aria-pressed', 'false');
        modeVal.textContent = 'CHARCOAL';
        comp.mode = 'charcoal';
      }
    }

    // Listen to the custom Web Component Event
    comp.addEventListener('ease-sketch-ready', (e) => {
      const { width, height } = e.detail;
      resReadout.textContent = `resolution: ${width} x ${height}px`;
      statusLabel.textContent = "READY";
      statusLabel.style.color = "#059669";
    });

    // Catch Errors / Taint fallback
    window.addEventListener('error', (e) => {
      // General error capture
      if (e.target && e.target.tagName === 'EASE-PENCIL-SKETCH-EFFECT') {
        statusLabel.textContent = "INTERRUPTED";
        statusLabel.style.color = "#DC2626";
      }
    }, true);
  </script>
</body>
</html>
