<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Badge Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'badge-color') root.style.setProperty('--badge-color', t.value);
      if (t.name === 'pulse-color') root.style.setProperty('--pulse-color', t.value);
      if (t.name === 'badge-size') root.style.setProperty('--badge-size', t.value + 'px');
      if (t.name === 'pulse-duration') root.style.setProperty('--pulse-duration', t.value + 's');
    });
  </script>
  <div class="container">
    <p class="title">Label Badge Pulse</p>
    <div class="badge-wrapper">
      <span class="label-text">Notifications</span>
      <div class="badge">3</div>
    </div>
    <div class="controls">
      <label>Badge: <input type="color" name="badge-color" value="#ff6b6b"></label>
      <label>Pulse: <input type="color" name="pulse-color" value="#ff6b6b"></label>
      <label>Size: <input type="range" name="badge-size" min="16" max="48" value="24"></label>
      <label>Duration: <input type="range" name="pulse-duration" min="0.5" max="4" step="0.1" value="1.5"></label>
    </div>
  </div>
</body>
</html>
