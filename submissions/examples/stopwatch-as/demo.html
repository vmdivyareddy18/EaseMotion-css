<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stopwatch</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stopwatch">
    <div class="sw-display">
      <span class="sw-main">01:42</span>
      <span class="sw-cs">.<b>68</b></span>
    </div>

    <div class="sw-controls">
      <button type="button" class="sw-btn lap">Lap</button>
      <button type="button" class="sw-btn stop">Stop</button>
      <button type="button" class="sw-btn reset">Reset</button>
    </div>

    <ul class="sw-laps">
      <li><span class="lap-no">Lap 3</span><span class="lap-t">00:31.02</span><span class="lap-d best">-1.14</span></li>
      <li><span class="lap-no">Lap 2</span><span class="lap-t">00:32.16</span><span class="lap-d">+0.44</span></li>
      <li><span class="lap-no">Lap 1</span><span class="lap-t">00:31.72</span><span class="lap-d worst">+1.02</span></li>
    </ul>
  </div>
</body>
</html>
