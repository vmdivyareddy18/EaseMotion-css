<!DOCTYPE html>
<html>
<head>
  <title>Accessibility Checker UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Accessibility Checker</h2>

<button onclick="runCheck()">Run Accessibility Check</button>

<ul id="results"></ul>

<script>
function runCheck() {
  let results = document.getElementById("results");
  results.innerHTML = "";

  let issues = [];

  // Example checks
  if (!document.querySelector("img[alt]")) {
    issues.push("⚠️ Missing alt attribute in images");
  }

  if (!document.querySelector("button")) {
    issues.push("⚠️ No button elements found");
  }

  if (issues.length === 0) {
    issues.push("✅ No basic accessibility issues found");
  }

  issues.forEach(issue => {
    let li = document.createElement("li");
    li.innerText = issue;
    results.appendChild(li);
  });
}
</script>

</body>
</html>
