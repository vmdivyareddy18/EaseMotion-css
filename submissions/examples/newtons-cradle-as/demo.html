<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newton's Cradle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cradle">
    <span class="frame-bar"></span>
    <span class="frame-leg left"></span>
    <span class="frame-leg right"></span>

    <div class="balls">
      <span class="pend p1"><span class="string"></span><span class="ball"></span></span>
      <span class="pend"><span class="string"></span><span class="ball"></span></span>
      <span class="pend"><span class="string"></span><span class="ball"></span></span>
      <span class="pend"><span class="string"></span><span class="ball"></span></span>
      <span class="pend p5"><span class="string"></span><span class="ball"></span></span>
    </div>
  </div>
</body>
</html>
