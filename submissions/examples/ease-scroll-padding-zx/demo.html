<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Padding Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .nav {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .nav a {
        padding: 0.4rem 0.8rem;
        background: #f1f5f9;
        border-radius: 6px;
        text-decoration: none;
        color: #475569;
        font-size: 0.85rem;
        cursor: pointer;
      }
      .nav a:hover {
        background: #e2e8f0;
      }
    </style>
  </head>
  <body>
    <h1>Scroll Padding</h1>
    <p class="note">
      Adds padding inside a scroll container so content doesn't stick to edges.
    </p>

    <div class="label">scroll-p-2 (padding inside scrollport)</div>
    <div class="scroll-container scroll-p-2">
      <div class="item" id="sp1">Item 1</div>
      <div class="item" id="sp2">Item 2</div>
      <div class="item" id="sp3">Item 3</div>
      <div class="item" id="sp4">Item 4</div>
      <div class="item" id="sp5">Item 5</div>
    </div>

    <div class="label">scroll-pt-2 (top padding only)</div>
    <div class="scroll-container scroll-pt-2">
      <div class="item">Item A</div>
      <div class="item">Item B</div>
      <div class="item">Item C</div>
      <div class="item">Item D</div>
      <div class="item">Item E</div>
    </div>
  </body>
</html>
