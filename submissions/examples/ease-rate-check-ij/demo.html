<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Rate Check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-rate-container">
        <h3 class="ease-rate-title">How was your experience?</h3>
        <!-- Notice the reverse order so CSS ~ selector works left-to-right -->
        <div class="ease-rate-group">
            <input type="radio" name="rating" id="star-5" class="ease-rate-input" value="5">
            <label for="star-5" class="ease-rate-star">★</label>
            
            <input type="radio" name="rating" id="star-4" class="ease-rate-input" value="4">
            <label for="star-4" class="ease-rate-star">★</label>
            
            <input type="radio" name="rating" id="star-3" class="ease-rate-input" value="3">
            <label for="star-3" class="ease-rate-star">★</label>
            
            <input type="radio" name="rating" id="star-2" class="ease-rate-input" value="2">
            <label for="star-2" class="ease-rate-star">★</label>
            
            <input type="radio" name="rating" id="star-1" class="ease-rate-input" value="1">
            <label for="star-1" class="ease-rate-star">★</label>
        </div>
    </div>
</body>
</html>
