<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Clip Rounded</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Clip Rounded</h1>
    <p class="subtitle">Content with rounded corners via <code>clip-path: inset(0 round ...)</code>.</p>
    <div class="display-area" style="flex-direction:column; gap:0.75rem; padding:1.5rem;">
      <div class="ease-clip-rounded" id="clipBox">
        <div class="clip-demo-box">
          <span>📺 Video Placeholder</span>
        </div>
      </div>
      <div class="clip-label">Border radius: <span id="radiusLabel">12px</span></div>
    </div>
    <div class="radius-controls">
      <button data-radius="4">4px</button>
      <button data-radius="12">12px</button>
      <button data-radius="24">24px</button>
      <button data-radius="9999">Full</button>
    </div>
  </div>
  <script>
    const clipBox = document.getElementById('clipBox');
    const radiusLabel = document.getElementById('radiusLabel');
    document.querySelectorAll('[data-radius]').forEach(btn => {
      btn.addEventListener('click', () => {
        const r = btn.dataset.radius;
        clipBox.style.setProperty('--ease-radius', r + 'px');
        radiusLabel.textContent = r === '9999' ? '9999px (full)' : r + 'px';
      });
    });
  </script>
</body>
</html>
