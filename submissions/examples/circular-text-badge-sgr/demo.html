<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotating Circular Text Badge Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: #1e293b;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid #334155;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3rem;
      justify-items: center;
      align-items: center;
    }

    @media (max-width: 640px) {
      .badge-grid {
        grid-template-columns: 1fr;
        gap: 2rem;
      }
    }

    .card {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 220px;
      text-align: center;
    }

    .card-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-top: 1.5rem;
      font-weight: 600;
    }

    /* Center Content Slot Icon styling */
    .center-icon {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .ease-circular-badge-center svg {
      transition: transform 0.3s ease;
    }

    .ease-circular-badge:hover .ease-circular-badge-center svg {
      transform: scale(1.1);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Circular Text Badge</h1>
    <div class="subtitle">Animation-first rotating typography badges using pure CSS and SVG</div>

    <div class="badge-grid">
      <!-- 1. Default Rotating Badge -->
      <div class="card">
        <div class="ease-circular-badge">
          <svg viewBox="0 0 100 100" class="ease-circular-badge-svg">
            <path id="path-default" class="ease-circular-badge-path" d="M 10 50 a 40 40 0 1 0 80 0 a 40 40 0 1 0 -80 0" />
            <text class="ease-circular-badge-text">
              <textPath href="#path-default">Scroll to Explore • View Details • </textPath>
            </text>
          </svg>
          <div class="ease-circular-badge-center" style="color: #3b82f6;">
            <svg class="center-icon" viewBox="0 0 24 24">
              <path d="M7.41,8.58L12,13.17L16.59,8.58L18,10L12,16L6,10L7.41,8.58Z"/>
            </svg>
          </div>
        </div>
        <div class="card-title">Default Rotate</div>
      </div>

      <!-- 2. Hover Pause Badge -->
      <div class="card">
        <div class="ease-circular-badge ease-circular-badge-hover-pause ease-circular-badge-success" style="--badge-speed: 8s;">
          <svg viewBox="0 0 100 100" class="ease-circular-badge-svg">
            <path id="path-pause" class="ease-circular-badge-path" d="M 10 50 a 40 40 0 1 0 80 0 a 40 40 0 1 0 -80 0" />
            <text class="ease-circular-badge-text">
              <textPath href="#path-pause">Hover to Pause • Tap to Interactive • </textPath>
            </text>
          </svg>
          <div class="ease-circular-badge-center" style="color: #10b981;">
            <svg class="center-icon" viewBox="0 0 24 24">
              <path d="M19,19H14V5H19M9,19H4V5H9V19Z"/>
            </svg>
          </div>
        </div>
        <div class="card-title">Hover Pause</div>
      </div>

      <!-- 3. Warning Reverse Badge -->
      <div class="card">
        <div class="ease-circular-badge ease-circular-badge-hover-reverse ease-circular-badge-danger" style="--badge-speed: 15s;">
          <svg viewBox="0 0 100 100" class="ease-circular-badge-svg">
            <path id="path-reverse" class="ease-circular-badge-path" d="M 10 50 a 40 40 0 1 0 80 0 a 40 40 0 1 0 -80 0" />
            <text class="ease-circular-badge-text">
              <textPath href="#path-reverse">Danger • System Critical • Alert • </textPath>
            </text>
          </svg>
          <div class="ease-circular-badge-center" style="color: #ef4444;">
            <svg class="center-icon" viewBox="0 0 24 24">
              <path d="M12,2L1,21H23L12,2M12,6L19.8,20H4.2L12,6M11,10V14H13V10H11M11,16V18H13V16H11Z"/>
            </svg>
          </div>
        </div>
        <div class="card-title">Hover Reverse</div>
      </div>

      <!-- 4. Glowing Radar Badge -->
      <div class="card">
        <div class="ease-circular-badge ease-circular-badge-glow ease-circular-badge-hover-fast ease-circular-badge-warning" style="--badge-speed: 10s;">
          <svg viewBox="0 0 100 100" class="ease-circular-badge-svg">
            <path id="path-glow" class="ease-circular-badge-path" d="M 10 50 a 40 40 0 1 0 80 0 a 40 40 0 1 0 -80 0" />
            <text class="ease-circular-badge-text">
              <textPath href="#path-glow">Futuristic Radar • Scan Target • </textPath>
            </text>
          </svg>
          <div class="ease-circular-badge-center" style="color: #f59e0b;">
            <svg class="center-icon" viewBox="0 0 24 24">
              <path d="M12,8A4,4 0 0,0 8,12A4,4 0 0,0 12,16A4,4 0 0,0 16,12A4,4 0 0,0 12,8Z"/>
            </svg>
          </div>
        </div>
        <div class="card-title">Glow & Hover Fast</div>
      </div>
    </div>
  </div>

</body>
</html>
