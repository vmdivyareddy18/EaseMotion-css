<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>justify-tracks — Grid Masonry Column Alignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1><code>justify-tracks</code></h1>
    <p>Distribution of extra space in masonry tracks — space-between &amp; space-evenly</p>
  </header>
  <main>
    <section class="demo-card">
      <h2>justify-tracks: space-between</h2>
      <div class="masonry jt-between">
        <div class="masonry-item">1</div>
        <div class="masonry-item">2</div>
        <div class="masonry-item">3</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>justify-tracks: space-evenly</h2>
      <div class="masonry jt-evenly">
        <div class="masonry-item">1</div>
        <div class="masonry-item">2</div>
        <div class="masonry-item">3</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>justify-tracks: center</h2>
      <div class="masonry jt-center">
        <div class="masonry-item">1</div>
        <div class="masonry-item">2</div>
        <div class="masonry-item">3</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>justify-tracks: start</h2>
      <div class="masonry jt-start">
        <div class="masonry-item">1</div>
        <div class="masonry-item">2</div>
        <div class="masonry-item">3</div>
      </div>
    </section>
  </main>
  <footer>
    <p>Experimental — requires browser support for CSS masonry layout.</p>
  </footer>
</body>
</html>
