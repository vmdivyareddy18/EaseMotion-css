<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <header class="header">
      <h1>Tooltip Component</h1>
      <p>Sample layout for a responsive tooltip demo.</p>
    </header>

    <section class="dashboard">

      <div class="card">
        <h2>Analytics</h2>

        <div class="tooltip-wrapper">

          <button
            class="tooltip-trigger"
            aria-describedby="tooltip-1"
          >
            Hover Me
          </button>

          <div
            id="tooltip-1"
            class="tooltip"
            role="tooltip"
          >
            Tooltip text goes here.
          </div>

        </div>

      </div>

      <div class="card">
        <h2>Reports</h2>

        <div class="tooltip-wrapper">

          <span
            class="tooltip-trigger"
            tabindex="0"
            aria-describedby="tooltip-2"
          >
            Focus Me
          </span>

          <div
            id="tooltip-2"
            class="tooltip"
            role="tooltip"
          >
            Another tooltip example.
          </div>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
