<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Glowing Fingerprint Scan Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <h2>Biometric Authentication</h2>
        <p class="subtitle">Hover or focus on the scanner to initialize the sweeping laser sequence.</p>

        <div class="scanner-box" tabindex="0" aria-label="Fingerprint biometric scanner">
            <div class="icon-wrapper">
                <svg class="fingerprint-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22v-3" />
                    <path d="M12 14v-4" />
                    <path d="M14 16.5a2.5 2.5 0 0 0-5 0v3.5" />
                    <path d="M17 19.5a5 5 0 0 0-10 0v1.5" />
                    <path d="M12 2a10 10 0 0 0-10 10v1.5" />
                    <path d="M22 12a10 10 0 0 0-14-9.3" />
                    <path d="M2 13.5A10 10 0 0 0 17.5 21" />
                    <path d="M22 13.5a10 10 0 0 1-7.5 7.5" />
                    <path d="M9 10a3 3 0 0 1 6 0v2.5" />
                </svg>
                
                <div class="laser-line"></div>
            </div>
            <div class="scan-status-text">Ready to Scan</div>
        </div>
    </div>

</body>
</html>
