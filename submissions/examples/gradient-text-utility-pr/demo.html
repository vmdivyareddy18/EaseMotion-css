<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gradient Text Utility Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.25rem;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-align: center;
      width: 320px;
    }

    h1, h2, h3 {
      margin: 0.4rem 0;
    }

    p {
      margin: 0;
      font-size: 0.8rem;
      color: #888;
    }

    /* Custom token override example */
    .custom-gradient {
      --ease-gradient-text-from: #14b8a6;
      --ease-gradient-text-to: #6366f1;
    }
  </style>
</head>
<body>
<div class="demo-card">
  <h1 class="ease-text-gradient">Build Beautiful UIs</h1>
  <h2 class="ease-text-gradient ease-text-gradient-sunset">Sale Ends Soon</h2>
  <h2 class="ease-text-gradient ease-text-gradient-ocean">Dive Into the Ocean</h2>
  <h2 class="ease-text-gradient ease-text-gradient-forest">Fresh Forest Vibes</h2>
  <h2 class="ease-text-gradient ease-text-gradient-candy">Sweet Candy Theme</h2>
  <h3 class="ease-text-gradient custom-gradient">Custom Tokens</h3>
  <p>5 presets + customizable via CSS variables</p>
</div>
</body>
</html>
