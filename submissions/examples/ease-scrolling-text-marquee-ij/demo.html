<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrolling Text Marquee - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Scrolling Marquee</h1>
    <p class="desc">Infinite horizontal scroll with CSS animation</p>
    <div class="marquee-wrap">
      <div class="marquee-track">
        <div class="marquee-inner" style="--marquee-dur: 20s;">
          <span>✦ CSS Animations ✦ Motion ✦ Scrolling Text ✦ Marquee ✦</span>
          <span>✦ CSS Animations ✦ Motion ✦ Scrolling Text ✦ Marquee ✦</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="pauseBtn">Pause</button>
    </div>
  </div>
  <script>
    const inner = document.querySelector('.marquee-inner');
    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', () => {
      const paused = inner.style.animationPlayState === 'paused';
      inner.style.animationPlayState = paused ? 'running' : 'paused';
      pauseBtn.textContent = paused ? 'Pause' : 'Play';
    });
  </script>
</body>
</html>
