<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Subscribe Card — EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header class="hero">

        <span class="badge">
            EMAIL COMPONENT
        </span>

        <h1>
            Newsletter Subscription
        </h1>

        <p>
            A clean email subscription card with premium styling,
            responsive layout and smooth hover interactions.
        </p>

    </header>

    <section class="card">

        <div class="icon">
            ✉
        </div>

        <h2>Stay Updated</h2>

        <p>
            Receive product updates, release notes,
            and design inspiration directly in your inbox.
        </p>

        <form>

            <input
                type="email"
                placeholder="Enter your email address"
            >

            <button type="submit">
                Subscribe
            </button>

        </form>

        <small>
            No spam. Unsubscribe anytime.
        </small>

    </section>

</div>

</body>
</html>
