<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heartbeat Mention Input</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Notify Your Team</h2>
        <p>Mention a teammate in your product discussion.</p>
        <div class="mention-box">
          <label for="mention"> Mention </label>
          <textarea
            id="mention"
            placeholder="@john Please review this product..."
            rows="5"
            required
          ></textarea>
        </div>
      </div>
    </div>
  </body>
</html>
