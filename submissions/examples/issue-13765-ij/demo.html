<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-upload-bounce – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Upload Bounce</h1>
    <p class="subtitle">A bouncing upload arrow that emphasises upward direction.</p>
    <div class="upload-wrapper">
      <div class="upload-arrow" id="uploadArrow">⬆️</div>
      <span class="upload-label">Uploading…</span>
    </div>
    <button id="toggleBtn">Pause</button>
  </div>

  <script>
    const arrow = document.getElementById('uploadArrow');
    const toggleBtn = document.getElementById('toggleBtn');
    let running = true;

    toggleBtn.addEventListener('click', () => {
      running = !running;
      arrow.classList.toggle('paused', !running);
      toggleBtn.textContent = running ? 'Pause' : 'Resume';
    });
  </script>
</body>
</html>
