<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Onboarding Step Indicator</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='step-bg')r.style.setProperty('--step-bg',t.value);if(t.name==='active-color')r.style.setProperty('--active-color',t.value);if(t.name==='completed-color')r.style.setProperty('--completed-color',t.value);if(t.name==='transition-speed')r.style.setProperty('--transition-speed',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{let s=0;const dots=document.querySelectorAll('.step-dot');const labels=['Welcome','Profile','Preferences','Done'];function go(n){if(n<0||n>3)return;s=n;dots.forEach((d,i)=>{d.classList.toggle('completed',i<s);d.classList.toggle('active',i===s);});document.querySelector('.step-label').textContent=labels[s]}dots.forEach(d=>d.addEventListener('click',()=>go(parseInt(d.dataset.index))));go(0)})</script>
<div class="container"><p class="title">Onboarding Step Indicator</p>
<div class="steps"><div class="step-dot" data-index="0"><span>1</span></div><div class="step-line"></div><div class="step-dot" data-index="1"><span>2</span></div><div class="step-line"></div><div class="step-dot" data-index="2"><span>3</span></div><div class="step-line"></div><div class="step-dot" data-index="3"><span>4</span></div></div>
<div class="step-label">Welcome</div>
<div class="controls"><label>Inactive: <input type="color" name="step-bg" value="#2d2d44"></label><label>Active: <input type="color" name="active-color" value="#4ecdc4"></label><label>Complete: <input type="color" name="completed-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="transition-speed" min="0.15" max="0.8" step="0.05" value="0.3"></label></div></div></body></html>
