<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Time Picker - Startup</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <div class="meeting-card">
      
      <div class="card-header">
        <h2 class="card-title">Schedule Meeting</h2>
        <p class="card-subtitle">Select a time for your onboarding call.</p>
      </div>

      <div class="ease-flip-time-picker">
        <div class="picker-highlight" aria-hidden="true"></div>

        <div class="picker-column" aria-label="Select Hour" tabindex="0">
          <div class="picker-pad"></div>
          <div class="picker-item">08</div>
          <div class="picker-item">09</div>
          <div class="picker-item">10</div>
          <div class="picker-item">11</div>
          <div class="picker-item">12</div>
          <div class="picker-item">01</div>
          <div class="picker-item">02</div>
          <div class="picker-item">03</div>
          <div class="picker-pad"></div>
        </div>

        <div class="picker-separator">:</div>

        <div class="picker-column" aria-label="Select Minute" tabindex="0">
          <div class="picker-pad"></div>
          <div class="picker-item">00</div>
          <div class="picker-item">15</div>
          <div class="picker-item">30</div>
          <div class="picker-item">45</div>
          <div class="picker-pad"></div>
        </div>

        <div class="picker-column am-pm" aria-label="Select AM or PM" tabindex="0">
          <div class="picker-pad"></div>
          <div class="picker-item">AM</div>
          <div class="picker-item">PM</div>
          <div class="picker-pad"></div>
        </div>
      </div>

      <div class="card-actions">
        <button class="btn btn-primary">Confirm Time</button>
      </div>

    </div>
  </main>
</body>
</html>
