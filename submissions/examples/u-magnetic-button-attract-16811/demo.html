<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS - Magnetic Button Attract</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <div class="hero">
      <span class="badge">EaseMotion CSS</span>

      <h1>Magnetic Button Attract Effect</h1>

      <p>
        Move your cursor around the button and watch it subtly
        gravitate toward the pointer, creating a playful and modern
        interaction.
      </p>

      <button class="magnetic-button" id="magneticButton">
        Hover Near Me
      </button>

      <div class="controls">
        <button class="demo-btn">Primary Action</button>
        <button class="demo-btn outline">Secondary Action</button>
      </div>
    </div>
  </main>

  <script>
    const magneticButton = document.getElementById("magneticButton");

    magneticButton.addEventListener("mousemove", (event) => {
      const rect = magneticButton.getBoundingClientRect();

      const x =
        (event.clientX - rect.left - rect.width / 2) /
        (rect.width / 2);

      const y =
        (event.clientY - rect.top - rect.height / 2) /
        (rect.height / 2);

      magneticButton.style.setProperty("--mouse-x", x);
      magneticButton.style.setProperty("--mouse-y", y);
    });

    magneticButton.addEventListener("mouseleave", () => {
      magneticButton.style.setProperty("--mouse-x", 0);
      magneticButton.style.setProperty("--mouse-y", 0);
    });
  </script>

</body>
</html>
