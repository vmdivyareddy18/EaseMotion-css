<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-side-flip-out — Demo #11895</title>
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg: #f8fafc;
        --text: #1e293b;
        --card-bg: #ffffff;
        --border: #e2e8f0;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 2rem;
        box-sizing: border-box;
      }

      .header {
        text-align: center;
        margin-bottom: 3rem;
      }

      h1 {
        margin: 0 0 0.5rem 0;
        font-size: 2rem;
      }

      p.subtitle {
        color: #64748b;
        margin: 0;
      }

      .demo-container {
        /* Adding perspective to the container can enhance 3D effect if children use 3D transforms */
        perspective: 1000px;
        margin-bottom: 2rem;
        height: 350px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 2.5rem 2rem;
        width: 280px;
        height: 320px;
        box-shadow:
          0 10px 25px -5px rgba(0, 0, 0, 0.1),
          0 8px 10px -6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        border: 1px solid var(--border);
        /* Base origin for flip - left side flip is default center */
        transform-origin: center;
      }

      .card h3 {
        margin-top: 0;
        margin-bottom: 1rem;
        font-size: 1.5rem;
      }

      .card p {
        color: #64748b;
        line-height: 1.5;
      }

      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }

      .controls {
        display: flex;
        gap: 1rem;
      }

      button {
        padding: 0.75rem 1.5rem;
        border: none;
        background: var(--primary);
        color: white;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: background 0.2s;
      }

      button:hover {
        background: var(--primary-hover);
      }

      button.secondary {
        background: #e2e8f0;
        color: #334155;
      }

      button.secondary:hover {
        background: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ease-side-flip-out</h1>
      <p class="subtitle">Issue #11895 — Card flips out to the side</p>
    </div>

    <div class="demo-container">
      <div class="card" id="demoCard">
        <div class="icon">👋</div>
        <h3>Farewell!</h3>
        <p>I am going to flip out to the side now.</p>
      </div>
    </div>

    <div class="controls">
      <button onclick="triggerAnimation()">Trigger Exit</button>
      <button onclick="resetAnimation()" class="secondary">Reset</button>
    </div>

    <script>
      function triggerAnimation() {
        const card = document.getElementById("demoCard");
        // Remove class if it exists to reset
        card.classList.remove("ease-side-flip-out");

        // Trigger reflow to restart animation
        void card.offsetWidth;

        // Add animation class
        card.classList.add("ease-side-flip-out");
      }

      function resetAnimation() {
        const card = document.getElementById("demoCard");
        card.classList.remove("ease-side-flip-out");
      }
    </script>
  </body>
</html>
