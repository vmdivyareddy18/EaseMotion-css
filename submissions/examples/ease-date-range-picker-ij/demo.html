<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Range Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dp-container">
    <h1>Date Range Picker</h1>
    <div class="dp-picker" id="dpPicker">
      <div class="dp-months" id="dpMonths">
        <div class="dp-month" id="dpMonth0">
          <div class="dp-month-header">
            <button class="dp-nav" data-dir="-1">&#8249;</button>
            <span class="dp-month-label" id="dpLabel0"></span>
            <button class="dp-nav" data-dir="1">&#8250;</button>
          </div>
          <div class="dp-weekdays">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div class="dp-days" id="dpDays0"></div>
        </div>
        <div class="dp-month" id="dpMonth1">
          <div class="dp-month-header">
            <button class="dp-nav" data-dir="-1">&#8249;</button>
            <span class="dp-month-label" id="dpLabel1"></span>
            <button class="dp-nav" data-dir="1">&#8250;</button>
          </div>
          <div class="dp-weekdays">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div class="dp-days" id="dpDays1"></div>
        </div>
      </div>
      <div class="dp-footer">
        <span id="dpRangeDisplay">Select a date range</span>
        <button class="dp-clear" id="dpClear">Clear</button>
      </div>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
