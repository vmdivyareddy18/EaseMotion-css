<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Witch's Familiar – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🐈‍⬛ Witch's Familiar</h1>
    <p class="subtitle">Black cat with glowing eyes</p>

    <div class="wf-container">
      <div class="wf-scene">
        <!-- Background -->
        <div class="bg-gradient"></div>

        <!-- Moon -->
        <div class="moon">
          <div class="moon-glow"></div>
        </div>

        <!-- Stars -->
        <div class="star st1"></div>
        <div class="star st2"></div>
        <div class="star st3"></div>
        <div class="star st4"></div>
        <div class="star st5"></div>
        <div class="star st6"></div>
        <div class="star st7"></div>
        <div class="star st8"></div>
        <div class="star st9"></div>
        <div class="star st10"></div>
        <div class="star st11"></div>
        <div class="star st12"></div>

        <!-- Fog -->
        <div class="fog fog-1"></div>
        <div class="fog fog-2"></div>
        <div class="fog fog-3"></div>

        <!-- Black Cat -->
        <div class="cat">
          <!-- Cat body -->
          <div class="cat-body">
            <!-- Body shape -->
            <div class="body-shape"></div>
            
            <!-- Tail -->
            <div class="tail">
              <div class="tail-segment ts1"></div>
              <div class="tail-segment ts2"></div>
              <div class="tail-segment ts3"></div>
              <div class="tail-segment ts4"></div>
            </div>

            <!-- Head -->
            <div class="head">
              <!-- Head shape -->
              <div class="head-shape"></div>
              
              <!-- Left ear -->
              <div class="ear ear-left">
                <div class="ear-inner"></div>
              </div>
              
              <!-- Right ear -->
              <div class="ear ear-right">
                <div class="ear-inner"></div>
              </div>

              <!-- Left eye -->
              <div class="eye eye-left">
                <div class="eye-glow"></div>
                <div class="pupil"></div>
              </div>

              <!-- Right eye -->
              <div class="eye eye-right">
                <div class="eye-glow"></div>
                <div class="pupil"></div>
              </div>

              <!-- Nose -->
              <div class="nose"></div>

              <!-- Whiskers -->
              <div class="whisker w-left-1"></div>
              <div class="whisker w-left-2"></div>
              <div class="whisker w-left-3"></div>
              <div class="whisker w-right-1"></div>
              <div class="whisker w-right-2"></div>
              <div class="whisker w-right-3"></div>

              <!-- Mouth -->
              <div class="mouth"></div>
            </div>

            <!-- Paws -->
            <div class="paw paw-front-left"></div>
            <div class="paw paw-front-right"></div>
            <div class="paw paw-back-left"></div>
            <div class="paw paw-back-right"></div>
          </div>

          <!-- Cat glow -->
          <div class="cat-glow"></div>

          <!-- Magic particles -->
          <div class="magic-particle mp1"></div>
          <div class="magic-particle mp2"></div>
          <div class="magic-particle mp3"></div>
          <div class="magic-particle mp4"></div>
          <div class="magic-particle mp5"></div>
          <div class="magic-particle mp6"></div>
          <div class="magic-particle mp7"></div>
          <div class="magic-particle mp8"></div>
          <div class="magic-particle mp9"></div>
          <div class="magic-particle mp10"></div>
          <div class="magic-particle mp11"></div>
          <div class="magic-particle mp12"></div>
        </div>

        <!-- Ambient glow -->
        <div class="ambient-glow"></div>
      </div>
    </div>

    <div class="controls">
      <button id="glowBtn">👁️ Glow Eyes</button>
      <button id="resetBtn">⟳ Reset</button>
      <label>
        Eye Glow Speed
        <input type="range" id="speedControl" min="0.3" max="3" step="0.1" value="1" />
      </label>
      <label>
        Glow Intensity
        <input type="range" id="intensityControl" min="0.3" max="2" step="0.05" value="1" />
      </label>
    </div>
  </div>

  <script>
    (function() {
      const cat = document.querySelector('.cat');
      const eyes = document.querySelectorAll('.eye');
      const eyeGlows = document.querySelectorAll('.eye-glow');
      const catGlow = document.querySelector('.cat-glow');
      const ambientGlow = document.querySelector('.ambient-glow');
      const magicParticles = document.querySelectorAll('.magic-particle');
      const tail = document.querySelector('.tail');

      const glowBtn = document.getElementById('glowBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');

      let speedMultiplier = 1;
      let intensityMultiplier = 1;
      let isGlowing = false;
      let glowTimeout = null;
      let animationFrame = null;
      let lastTimestamp = 0;
      let blinkTimeout = null;

      // ----- Apply speed -----
      function applySpeed() {
        // Eye blink
        eyes.forEach((eye) => {
          eye.style.setProperty('--blink-duration', (0.15 / speedMultiplier) + 's');
        });

        // Tail sway
        tail.style.setProperty('--tail-duration', (1.5 / speedMultiplier) + 's');

        // Cat glow
        catGlow.style.setProperty('--glow-duration', (2 / speedMultiplier) + 's');

        // Ambient glow
        ambientGlow.style.setProperty('--ambient-duration', (3 / speedMultiplier) + 's');

        // Magic particles
        magicParticles.forEach((p, i) => {
          const duration = (3 + (i % 3) * 0.5) / speedMultiplier;
          p.style.setProperty('--particle-duration', duration + 's');
          p.style.setProperty('--particle-delay', ((i * 0.05) / speedMultiplier) + 's');
        });
      }

      // ----- Apply intensity -----
      function applyIntensity() {
        // Eye glow
        eyeGlows.forEach((glow) => {
          const opacity = Math.min(0.3 * intensityMultiplier, 0.6);
          glow.style.setProperty('--eye-glow-intensity', opacity);
          const size = 30 * intensityMultiplier;
          glow.style.setProperty('--eye-glow-size', size + 'px');
        });

        // Cat glow
        const catOpacity = Math.min(0.08 * intensityMultiplier, 0.15);
        catGlow.style.setProperty('--cat-glow-intensity', catOpacity);
        const catSize = 200 * intensityMultiplier;
        catGlow.style.setProperty('--cat-glow-size', catSize + 'px');

        // Ambient glow
        const ambientOpacity = Math.min(0.05 * intensityMultiplier, 0.1);
        ambientGlow.style.setProperty('--ambient-intensity', ambientOpacity);
        const ambientSize = 300 * intensityMultiplier;
        ambientGlow.style.setProperty('--ambient-size', ambientSize + 'px');

        // Magic particles
        magicParticles.forEach((p) => {
          const opacity = Math.min(0.15 * intensityMultiplier, 0.3);
          p.style.setProperty('--particle-intensity', opacity);
        });
      }

      // ----- Glow eyes -----
      function glowEyes() {
        if (isGlowing) {
          // Turn off glow
          isGlowing = false;
          eyes.forEach(eye => {
            eye.classList.remove('glowing');
          });
          catGlow.classList.remove('glowing');
          ambientGlow.classList.remove('glowing');
          glowBtn.textContent = '👁️ Glow Eyes';
          if (glowTimeout) {
            clearTimeout(glowTimeout);
            glowTimeout = null;
          }
          return;
        }

        isGlowing = true;
        eyes.forEach(eye => {
          eye.classList.add('glowing');
        });
        catGlow.classList.add('glowing');
        ambientGlow.classList.add('glowing');

        // Magic particles burst
        magicParticles.forEach((p, i) => {
          p.classList.add('active');
          setTimeout(() => {
            p.classList.remove('active');
          }, 1500 / speedMultiplier);
        });

        glowBtn.textContent = '👁️ Glowing...';
        setTimeout(() => {
          glowBtn.textContent = '👁️ Turn Off Glow';
        }, 500 / speedMultiplier);

        // Auto-turn off after 5 seconds
        if (glowTimeout) {
          clearTimeout(glowTimeout);
          glowTimeout = null;
        }
        glowTimeout = setTimeout(() => {
          if (isGlowing) {
            glowEyes();
          }
        }, 5000 / speedMultiplier);
      }

      // ----- Blink -----
      function blink() {
        if (!isGlowing) {
          eyes.forEach(eye => {
            eye.classList.add('blinking');
            setTimeout(() => {
              eye.classList.remove('blinking');
            }, 150 / speedMultiplier);
          });
        }

        const nextBlink = 3000 + Math.random() * 3000;
        blinkTimeout = setTimeout(blink, nextBlink / speedMultiplier);
      }

      // ----- Reset -----
      function resetCat() {
        if (isGlowing) {
          isGlowing = false;
          eyes.forEach(eye => {
            eye.classList.remove('glowing');
          });
          catGlow.classList.remove('glowing');
          ambientGlow.classList.remove('glowing');
          glowBtn.textContent = '👁️ Glow Eyes';
          if (glowTimeout) {
            clearTimeout(glowTimeout);
            glowTimeout = null;
          }
        }

        magicParticles.forEach(p => {
          p.classList.remove('active');
        });

        lastTimestamp = 0;
      }

      // ----- Update speed -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
        // Reset blink timing
        if (blinkTimeout) {
          clearTimeout(blinkTimeout);
          blinkTimeout = null;
          setTimeout(blink, 1000 / speedMultiplier);
        }
      }

      // ----- Update intensity -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        applyIntensity();
      }

      // ----- Animation loop -----
      function animate(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const deltaTime = Math.min((timestamp - lastTimestamp) / 16.67, 3);
        lastTimestamp = timestamp;

        // Subtle cat sway
        const sway = Math.sin(timestamp / 4000) * 2;
        cat.style.transform = `translateX(-50%) translateY(-50%) rotate(${sway * 0.3}deg)`;

        // Tail sway
        const tailSway = Math.sin(timestamp / 1500) * 8;
        tail.style.transform = `translateX(-50%) rotate(${tailSway}deg)`;

        // Eye glow pulse when active
        if (isGlowing) {
          const pulse = Math.sin(timestamp / 800) * 0.15 + 0.85;
          eyeGlows.forEach((glow) => {
            glow.style.transform = `translate(-50%, -50%) scale(${pulse})`;
          });
        }

        animationFrame = requestAnimationFrame(animate);
      }

      // ----- Init -----
      function init() {
        applySpeed();
        applyIntensity();

        // Start animation
        lastTimestamp = 0;
        if (animationFrame) cancelAnimationFrame(animationFrame);
        animationFrame = requestAnimationFrame(animate);

        // Start blinking after 1 second
        setTimeout(() => {
          blink();
        }, 1000 / speedMultiplier);

        // Auto-glow after 2 seconds
        setTimeout(() => {
          glowEyes();
        }, 2000 / speedMultiplier);

        // Auto-turn off and on
        setTimeout(() => {
          if (isGlowing) {
            glowEyes();
          }
          setTimeout(() => {
            glowEyes();
          }, 500 / speedMultiplier);
        }, 7000 / speedMultiplier);
      }

      // ----- Event listeners -----
      glowBtn.addEventListener('click', glowEyes);
      resetBtn.addEventListener('click', resetCat);
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });
      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      // Click on cat to toggle glow
      cat.addEventListener('click', glowEyes);

      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        if (blinkTimeout) clearTimeout(blinkTimeout);
        if (glowTimeout) clearTimeout(glowTimeout);
      });

      init();
    })();
  </script>

</body>
</html>
