<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Sentiment Breakdown Bars</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Customer Feedback</h1>

    <p class="subtitle">
        Overall sentiment collected from recent customer reviews.
    </p>

    <div class="card">

        <div class="sentiment">

            <div class="label">
                <span>😊 Positive</span>
                <span>72%</span>
            </div>

            <div class="bar">
                <div class="fill positive"></div>
            </div>

        </div>

        <div class="sentiment">

            <div class="label">
                <span>😐 Neutral</span>
                <span>18%</span>
            </div>

            <div class="bar">
                <div class="fill neutral"></div>
            </div>

        </div>

        <div class="sentiment">

            <div class="label">
                <span>☹ Negative</span>
                <span>10%</span>
            </div>

            <div class="bar">
                <div class="fill negative"></div>
            </div>

        </div>

    </div>

</div>

</body>
</html>
