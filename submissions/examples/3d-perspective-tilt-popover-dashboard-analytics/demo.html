<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Popover Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">

  <div class="tilt-popover">

    <button class="tilt-trigger">
      View Analytics
    </button>

    <div class="tilt-panel">
      <h2>Analytics Report</h2>
      <p>
        Monitor user growth, revenue trends and performance metrics
        with interactive dashboard insights.
      </p>

      <div class="stats">
        <strong>85%</strong>
        <span>Growth Rate</span>
      </div>

    </div>

  </div>

</section>

</body>
</html>
