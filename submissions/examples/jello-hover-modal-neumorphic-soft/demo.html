<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jello-Hover Modal - Neumorphic Soft Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

    <div class="overlay">

        <div class="modal" tabindex="0">

            <h2>Jello-Hover Modal</h2>

            <p>
                A responsive CSS-only modal featuring a smooth
                <strong>Jello-Hover</strong> animation with a soft
                neumorphic design. No JavaScript required.
            </p>

            <div class="actions">
                <label for="modal-toggle" class="secondary-btn">
                    Close
                </label>

                <button class="primary-btn">
                    Explore
                </button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
