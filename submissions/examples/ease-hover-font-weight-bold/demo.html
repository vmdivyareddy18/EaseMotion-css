<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Font Weight Hover Bold</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1 class="ease-hover-font-weight-bold">Hover This Heading</h1>

    <p class="ease-hover-font-weight-bold">
      This text becomes bold when you hover over it.
    </p>

    <button class="ease-hover-font-weight-bold btn">
      Hover Me
    </button>
  </div>

</body>
</html>
