<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Charge – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="battery-wrapper">
    <div class="battery" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
      <div class="battery-body">
        <div class="battery-fill"></div>
        <div class="battery-segment"></div>
        <div class="battery-segment"></div>
        <div class="battery-segment"></div>
        <span class="battery-percent">50%</span>
      </div>
      <div class="battery-terminal"></div>
    </div>
    <span class="battery-title">Battery Charge</span>
  </div>
</body>
</html>
