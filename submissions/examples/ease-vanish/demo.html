<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-vanish – Shrink to Nothing</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Vanish</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the button to make the card shrink to a point and fade out.</p>

    <div id="vanish-box" class="vanish-card ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">I'll disappear</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Goodbye!</p>
    </div>

    <div class="ease-flex ease-justify-center ease-gap-4 ease-mt-8">
      <button id="vanish-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">Vanish</button>
      <button id="reset-btn" class="ease-btn ease-btn-secondary ease-hover-scale-105 ease-transition">Reset</button>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500"><code>scale(1) → scale(0)</code> + <code>opacity(0)</code> with center origin, fast exit.</p>
  </div>

  <script>
    const box = document.getElementById('vanish-box');
    document.getElementById('vanish-btn').addEventListener('click', () => {
      box.classList.add('vanish');
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      box.classList.remove('vanish');
    });
  </script>

</body>
</html>
