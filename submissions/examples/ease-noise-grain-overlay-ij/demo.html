<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Noise Grain Overlay</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='overlay-opacity')r.style.setProperty('--overlay-opacity',t.value);if(t.name==='grain-color')r.style.setProperty('--grain-color',t.value);if(t.name==='blend-mode'){r.style.setProperty('--blend-mode',t.value)};if(t.name==='anim-speed')r.style.setProperty('--anim-speed',t.value+'s')})</script>
<div class="container"><p class="title">Noise Grain Overlay</p>
<div class="demo-card"><div class="grain-overlay"></div><div class="card-content"><h2>Noise Texture</h2><p>Film grain effect overlay using CSS.</p></div></div>
<div class="controls"><label>Opacity: <input type="range" name="overlay-opacity" min="0.05" max="0.5" step="0.05" value="0.15"></label><label>Color: <input type="color" name="grain-color" value="#000"></label><label>Blend: <select name="blend-mode" onchange="document.documentElement.style.setProperty('--blend-mode',this.value)"><option value="overlay">Overlay</option><option value="multiply">Multiply</option><option value="screen">Screen</option><option value="difference">Difference</option></select></label><label>Speed: <input type="range" name="anim-speed" min="0.1" max="1" step="0.05" value="0.3"></label></div></div></body></html>
