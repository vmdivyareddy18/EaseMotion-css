<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catapult File Uploader - Medical Dashboard UI</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-medical-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-timing-fast: cubic-bezier(0.25, 1, 0.5, 1);
    }
    @keyframes ease-catapult-upload {
      0% { transform: translateY(60px) scale(0.85); opacity: 0; }
      50% { transform: translateY(-12px) scale(1.02); opacity: 0.8; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }
    @keyframes heartbeat-pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0.4); }
      70% { transform: scale(1.03); box-shadow: 0 0 0 10px rgba(14, 165, 233, 0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(14, 165, 233, 0); }
    }
  </style>
</head>
<body>

  <!-- Medical Dashboard Mock Wrapper -->
  <div class="dashboard-wrapper">
    <div class="dashboard-header">
      <div class="medical-brand">
        <span class="pulse-cross">✚</span>
        <h2>MedOS Portal</h2>
      </div>
      <span class="badge">Lab Diagnostics v2.6</span>
    </div>

    <!-- Hidden state controller for pure CSS file upload visual feedback -->
    <input type="checkbox" id="file-state-toggle" class="state-toggle">

    <!-- The File Uploader Dropzone Component -->
    <div class="uploader-component">
      <label for="file-state-toggle" class="dropzone-card">
        
        <!-- Upload Icon Area -->
        <div class="icon-container">
          <div class="arrow-up">▲</div>
          <div class="tray-line"></div>
        </div>

        <h3>Upload Patient Record</h3>
        <p class="file-specs">DICOM, PDF, or XML max 25MB</p>
        
        <!-- Simulated native file selection marker -->
        <div class="select-file-btn">Browse Local Drive</div>
      </label>

      <!-- Catapult Success Layer (Triggers natively when checkbox is clicked) -->
      <div class="catapult-success-layer">
        <div class="success-card">
          <div class="success-icon">✓</div>
          <div class="meta-info">
            <h4>EHR_Report_42582.pdf</h4>
            <div class="progress-track">
              <div class="progress-bar-fill"></div>
            </div>
            <p class="status-text">Encrypted & Ready for Processing</p>
          </div>
          <label for="file-state-toggle" class="clear-btn">&times;</label>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
