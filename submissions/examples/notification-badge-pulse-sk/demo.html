<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Badges - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Animated Notification Badges</h1>
    <p>Reusable notification badges with pulse, bounce, and ripple effects for attention-grabbing alerts.</p>
    
    <div class="demo-grid">
      
      <!-- Pulse Dot Badge -->
      <div class="demo-card">
        <h3>Pulse Dot</h3>
        <button class="icon-btn pulse-hover">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
          <span class="badge badge-dot badge-pulse" aria-label="1 unread notification"></span>
        </button>
      </div>

      <!-- Ripple Numeric Badge -->
      <div class="demo-card">
        <h3>Ripple Number</h3>
        <button class="icon-btn pulse-hover">
          Inbox
          <span class="badge badge-numeric badge-ripple" aria-label="3 unread messages">3</span>
        </button>
      </div>

      <!-- Bounce Avatar Badge -->
      <div class="demo-card">
        <h3>Bounce Avatar</h3>
        <div class="avatar-wrapper pulse-hover" tabindex="0" role="button" aria-label="User profile with updates">
          <img src="https://i.pravatar.cc/150?img=3" alt="Avatar" class="avatar-img" />
          <span class="badge badge-dot badge-bounce"></span>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
