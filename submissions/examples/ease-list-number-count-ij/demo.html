<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease List Number Count — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      color: #e2e8f0;
      margin-bottom: 1.25rem;
      font-weight: 500;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .controls input {
      width: 100px;
      padding: 0.3rem 0.5rem;
      border-radius: 0.35rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.8rem;
    }
    .controls input:focus { outline: none; border-color: var(--number-color, #3b82f6); }
    .replay-btn {
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 0.4rem;
      background: #3b82f6;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .replay-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h2>✦ Step Counter</h2>
    <list-number-count id="demo">
      <ol>
        <li style="--idx:0">Plan the sprint</li>
        <li style="--idx:1">Design the UI</li>
        <li style="--idx:2">Implement features</li>
        <li style="--idx:3">Review code</li>
        <li style="--idx:4">Deploy to staging</li>
      </ol>
    </list-number-count>
    <div class="controls">
      <label>Accent
        <input type="color" id="numberColor" value="#3b82f6">
      </label>
      <label>Speed
        <input type="range" id="countSpeed" min="0.2" max="1.2" step="0.05" value="0.6">
      </label>
      <label>Delay
        <input type="range" id="staggerDelay" min="0.04" max="0.4" step="0.02" value="0.12">
      </label>
    </div>
    <button class="replay-btn" id="replay">Replay Animation</button>
  </div>
  <script>
    const el = document.getElementById('demo');
    document.getElementById('numberColor').addEventListener('input', e => {
      el.style.setProperty('--number-color', e.target.value);
    });
    document.getElementById('countSpeed').addEventListener('input', e => {
      el.style.setProperty('--count-duration', e.target.value + 's');
    });
    document.getElementById('staggerDelay').addEventListener('input', e => {
      el.style.setProperty('--stagger-delay', e.target.value + 's');
    });
    document.getElementById('replay').addEventListener('click', () => {
      el.querySelectorAll('li').forEach(li => {
        li.style.animation = 'none';
        void li.offsetHeight;
        li.style.animation = '';
      });
    });
  </script>
</body>
</html>
