<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overflow Anchor Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Overflow Anchor</h1>
      <p class="subtitle">Opts out of scroll anchoring behavior in a scrollable region.</p>
      <span class="badge">CSS Property: overflow-anchor</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">overflow-anchor: auto</span>
          <span class="demo-value overflow-anchor-sm">Overflow Anchor variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">overflow-anchor: none</span>
          <span class="demo-value overflow-anchor-md">Overflow Anchor variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="overflow-anchor"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
