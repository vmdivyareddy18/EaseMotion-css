<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-Out Modal (Checkout)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f7fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Roboto', system-ui, -apple-system, sans-serif;
    }
    .checkout-container {
      background: white;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      border: 1px solid #e2e8f0;
      width: 100%;
      max-width: 380px;
      text-align: center;
    }
    h1 {
      font-size: 1.25rem;
      color: #2d3748;
      margin-top: 0;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      color: #4a5568;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="checkout-container">
    <h1>Review Your Cart</h1>
    <div style="background: #edf2f7; padding: 16px; border-radius: 6px; margin-bottom: 24px; text-align: left;">
      <div class="cart-item">
        <span>Wireless Headphones</span>
        <span>$129.99</span>
      </div>
      <div class="cart-item" style="margin-bottom: 0; font-weight: 700; color: #2d3748; border-top: 1px solid #cbd5e0; padding-top: 12px; margin-top: 12px;">
        <span>Total</span>
        <span>$129.99</span>
      </div>
    </div>
    
    <!-- Trigger link (uses anchor hash to target the modal ID) -->
    <a href="#checkout-modal" class="ease-fade-trigger-btn" style="width: 100%; box-sizing: border-box;">Confirm Order</a>
  </div>

  <!-- Modal Overlay (Targeted via ID) -->
  <div id="checkout-modal" class="ease-fade-ecom-modal-overlay">
    <!-- Animated Content Box -->
    <div class="ease-fade-ecom-modal-content">
      <!-- Close Button -->
      <a href="#" class="ease-fade-ecom-modal-close" aria-label="Close modal">
        <svg style="width: 16px; height: 16px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </a>
      
      <!-- Checkmark Icon -->
      <div class="ease-ecom-icon">
        <svg style="width: 28px; height: 28px;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
      </div>
      
      <h2 style="margin-top:0; font-size: 1.5rem; font-weight: 700; color: #2d3748; margin-bottom: 12px;">Order Confirmed!</h2>
      <p style="font-size: 0.95rem; line-height: 1.5; color: #718096; margin-bottom: 28px;">
        This modal uses a CSS-only <strong>Fade-Out</strong> animation. Notice how it fades in quickly when opened, but fades out more slowly and smoothly when closed.
      </p>
      
      <a href="#" class="ease-fade-trigger-btn" style="width: 100%; box-sizing: border-box; background: var(--ease-ecom-success); box-shadow: none;">Continue Shopping</a>
    </div>
  </div>

</body>
</html>
