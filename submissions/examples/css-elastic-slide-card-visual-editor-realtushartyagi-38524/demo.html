<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Slide Card - Visual Editor Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="editor-layout-container">
    
    <!-- Elastic Slide Card Component -->
    <div class="ease-editor-slide-card" tabindex="0">
      
      <!-- Visible Card Front (Preview / Element Info) -->
      <div class="ease-editor-front">
        <div class="preview-area">
          <div class="preview-element">
            <span class="preview-text">Header Element</span>
          </div>
        </div>
        
        <div class="element-info">
          <h3 class="element-title">Hero Section</h3>
          <span class="element-tag">&lt;header&gt;</span>
        </div>
      </div>
      
      <!-- Elastic Sliding Back Panel (Editor Controls) -->
      <div class="ease-editor-back">
        
        <div class="panel-header">
          <h4 class="panel-title">Style Properties</h4>
          <button class="icon-btn close-btn" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"></path></svg>
          </button>
        </div>

        <div class="property-group">
          <div class="property-header">
            <span>Dimensions</span>
          </div>
          <div class="property-controls">
            <div class="input-wrap">
              <label>W</label>
              <input type="text" value="100%" readonly>
            </div>
            <div class="input-wrap">
              <label>H</label>
              <input type="text" value="Auto" readonly>
            </div>
          </div>
        </div>

        <div class="property-group">
          <div class="property-header">
            <span>Spacing</span>
          </div>
          <div class="visual-spacing">
            <div class="spacing-box margin-box">
              <span class="spacing-val top">40</span>
              <span class="spacing-val bottom">40</span>
              <span class="spacing-val left">-</span>
              <span class="spacing-val right">-</span>
              <div class="spacing-box padding-box">
                <span class="spacing-val top">16</span>
                <span class="spacing-val bottom">16</span>
                <span class="spacing-val left">24</span>
                <span class="spacing-val right">24</span>
                <div class="content-box"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="property-group">
          <div class="property-header">
            <span>Background</span>
          </div>
          <div class="color-picker">
            <div class="color-swatch"></div>
            <span class="color-hex">#2563eb</span>
          </div>
        </div>
        
        <div class="action-row">
          <button class="action-btn outline">Reset</button>
          <button class="action-btn primary">Apply</button>
        </div>

      </div>
      
    </div>

  </div>

</body>
</html>
