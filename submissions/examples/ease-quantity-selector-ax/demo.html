<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-quantity-selector – Product Quantity Selector</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Quantity Selector</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click ± to adjust the quantity. Min 1, max 99.</p>

    <div class="quantity-selector ease-flex ease-items-center ease-gap-0 ease-mx-auto ease-w-fit">
      <button id="decrement-btn" class="qty-btn ease-btn ease-btn-primary ease-btn-sm">−</button>
      <span id="qty-display" class="qty-display ease-text-xl ease-font-semibold ease-px-4">1</span>
      <button id="increment-btn" class="qty-btn ease-btn ease-btn-primary ease-btn-sm">+</button>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">Buttons have press feedback. Number pops on change.</p>
  </div>

  <script>
    const decrementBtn = document.getElementById('decrement-btn');
    const incrementBtn = document.getElementById('increment-btn');
    const display = document.getElementById('qty-display');
    const min = 1, max = 99;
    let quantity = min;

    function updateDisplay() {
      display.textContent = quantity;
      // Trigger a quick pop animation
      display.classList.remove('pop');
      void display.offsetWidth; // force reflow to restart animation
      display.classList.add('pop');
    }

    decrementBtn.addEventListener('click', () => {
      if (quantity > min) {
        quantity--;
        updateDisplay();
      }
    });

    incrementBtn.addEventListener('click', () => {
      if (quantity < max) {
        quantity++;
        updateDisplay();
      }
    });
  </script>

</body>
</html>
