<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signature Canvas Pad - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sp-wrapper">
    <h1>Signature Pad</h1>
    <p class="sp-sub">Draw your signature below</p>
    <div class="sp-canvas-wrap">
      <canvas id="sigCanvas" width="500" height="200"></canvas>
    </div>
    <div class="sp-actions">
      <button class="sp-btn sp-btn-clear" id="clearBtn">Clear</button>
      <button class="sp-btn sp-btn-save" id="saveBtn">Save as PNG</button>
    </div>
    <p class="sp-status" id="statusMsg"></p>
  </div>

  <script>
    const canvas = document.getElementById('sigCanvas');
    const ctx = canvas.getContext('2d');
    const clearBtn = document.getElementById('clearBtn');
    const saveBtn = document.getElementById('saveBtn');
    const status = document.getElementById('statusMsg');

    let drawing = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function draw(e) {
      e.preventDefault();
      if (!drawing) return;
      const pos = getPos(e);
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.strokeStyle = '#6366f1';
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
    }

    function stopDraw(e) {
      e.preventDefault();
      drawing = false;
      ctx.beginPath();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);

    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw, { passive: false });

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      status.textContent = 'Canvas cleared';
    }

    function saveCanvas() {
      const link = document.createElement('a');
      link.download = 'signature.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      status.textContent = 'Signature saved as PNG';
    }

    clearBtn.addEventListener('click', clearCanvas);
    saveBtn.addEventListener('click', saveCanvas);

    clearCanvas();
  </script>
</body>
</html>
