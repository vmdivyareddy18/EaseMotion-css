<!DOCTYPE html>
<html>
<head>
  <title>Scroll Text Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section>
  <h1 class="reveal">Scroll to Reveal Text</h1>
</section>

<script>
  const text = document.querySelector(".reveal");

  window.addEventListener("scroll", () => {
    const pos = text.getBoundingClientRect().top;
    const screen = window.innerHeight;

    if (pos < screen - 100) {
      text.classList.add("active");
    }
  });
</script>

</body>
</html>
