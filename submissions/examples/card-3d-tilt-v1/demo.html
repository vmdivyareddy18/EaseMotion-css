<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card 3D Tilt Hover Effect</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #0f172a; gap: 1.5rem; flex-wrap: wrap;">
    <div class="tilt-card" id="tilt1">
      <div class="tilt-inner">
        <div class="tilt-icon">🚀</div>
        <h3 class="tilt-title">Space Theme</h3>
        <p class="tilt-desc">Hover to see the 3D tilt effect in action.</p>
      </div>
    </div>
    <div class="tilt-card tilt-card-alt" id="tilt2">
      <div class="tilt-inner">
        <div class="tilt-icon">🎨</div>
        <h3 class="tilt-title">Design System</h3>
        <p class="tilt-desc">Interactive cards with a realistic 3D perspective.</p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
