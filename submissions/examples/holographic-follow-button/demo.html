<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EaseMotion CSS • Holographic Follow Button</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- EaseMotion CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="ease-center">

  <main class="demo-container ease-fade-in">

    <header class="demo-header ease-slide-up">
      <h1>🌿 Holographic Follow Button</h1>

      <p>
        A nature-inspired holographic follow button featuring layered gradients,
        soft glow effects, and smooth hover animations built entirely with CSS.
      </p>
    </header>

    <section
      class="follow-card ease-slide-up ease-delay-200"
      aria-labelledby="profile-heading"
    >

      <div class="profile-avatar" aria-hidden="true">
        🌱
      </div>

      <h2 id="profile-heading">
        Green Horizons
      </h2>

      <p class="profile-description">
        Sustainable living, nature photography, and eco-friendly inspiration.
      </p>

      <button
        class="follow-btn ease-hover-grow"
        type="button"
        aria-label="Follow Green Horizons"
      >
        <span>Follow</span>
      </button>

    </section>

  </main>

</body>
</html>
