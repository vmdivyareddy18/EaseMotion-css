
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underline Draw Notification Bell — Neon Mode</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper ease-fade-in">

    <h1 class="demo-title">Underline Draw Notification Bell</h1>

    <p class="demo-sub">
      A pure CSS notification bell featuring a neon glow and animated underline draw effect.
    </p>

    <div class="notification-card">

      <button
        class="notification-button ease-hover-grow"
        aria-label="Notifications">

        <span class="bell-wrapper">
          🔔
          <span class="notification-badge">3</span>
        </span>

        <span class="notification-text">
          Notifications
        </span>

        <span class="underline"></span>

      </button>

    </div>

  </div>

</body>
</html>
