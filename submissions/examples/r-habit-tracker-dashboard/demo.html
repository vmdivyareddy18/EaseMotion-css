<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="habit-dashboard">
        <h1>Habit Tracker Dashboard</h1>

        <div class="habit-grid">
            <article class="habit-card">
                <h3>Read 30 Minutes</h3>
                <span class="streak">🔥 12 Day Streak</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-80"></div>
                </div>

                <p>80% Complete</p>
            </article>

            <article class="habit-card">
                <h3>Morning Exercise</h3>
                <span class="streak">🔥 20 Day Streak</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-100"></div>
                </div>

                <p>100% Complete</p>
            </article>

            <article class="habit-card">
                <h3>Drink Water</h3>
                <span class="streak">🔥 8 Day Streak</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-60"></div>
                </div>

                <p>60% Complete</p>
            </article>

            <article class="habit-card">
                <h3>Practice Coding</h3>
                <span class="streak">🔥 15 Day Streak</span>

                <div class="progress-bar">
                    <div class="progress-fill progress-90"></div>
                </div>

                <p>90% Complete</p>
            </article>
        </div>

        <div class="achievement-section">
            <h2>Achievements</h2>

            <div class="badges">
                <span class="badge">🏆 Consistency Master</span>
                <span class="badge">⭐ 30-Day Goal</span>
                <span class="badge">🚀 Productivity Pro</span>
            </div>
        </div>
    </section>
</body>
</html>
