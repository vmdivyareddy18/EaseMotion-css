<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bulk Selection Action Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="selection-demo">
    <header>
      <p class="eyebrow">Team directory</p>
      <h1>Bulk selection states</h1>
    </header>

    <section class="directory" aria-label="Selected team members">
      <div class="action-bar" role="status">
        <strong>2 members selected</strong>
        <div class="actions">
          <button type="button">Move</button>
          <button type="button">Export</button>
          <button class="danger" type="button">Remove</button>
        </div>
      </div>

      <label class="member selected">
        <input type="checkbox" checked>
        <span class="avatar">AM</span>
        <span><strong>Amina Malik</strong><small>Product design</small></span>
        <span class="status">Active</span>
      </label>
      <label class="member selected">
        <input type="checkbox" checked>
        <span class="avatar">JL</span>
        <span><strong>Jon Lee</strong><small>Engineering</small></span>
        <span class="status">Active</span>
      </label>
      <label class="member">
        <input type="checkbox">
        <span class="avatar">SK</span>
        <span><strong>Sofia Khan</strong><small>Operations</small></span>
        <span class="status away">Away</span>
      </label>
    </section>
  </main>
</body>
</html>
