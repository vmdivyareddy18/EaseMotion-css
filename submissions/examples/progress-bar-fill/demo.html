<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Bar Fill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="progress-card" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion progress</p>
    <h1 id="demo-title">Progress bar fill</h1>
    <p class="intro">A smooth progress fill pattern for onboarding, uploads, and setup completion screens.</p>

    <section class="progress-panel" aria-label="Project setup progress">
      <div class="progress-meta">
        <strong>Project setup</strong>
        <span>72%</span>
      </div>
      <div class="track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="72">
        <span class="fill"></span>
      </div>
    </section>
  </main>
</body>
</html>
