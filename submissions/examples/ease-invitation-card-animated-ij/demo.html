<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Invitation Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="invitation-container">
    <div class="invitation-card" id="invitationCard">
      <div class="card-inner" id="cardInner">
        <div class="card-front">
          <div class="invitation-icon">&#x1F48C;</div>
          <h2>You're Invited</h2>
          <div class="decorative-line"></div>
          <h1>EaseMotion<br>Launch Event</h1>
          <p class="date">Friday, December 15 · 7:00 PM</p>
          <button class="open-btn" id="openBtn">Open Invitation</button>
          <div class="gold-border"></div>
        </div>
        <div class="card-back">
          <div class="back-content">
            <div class="invitation-icon">&#x1F389;</div>
            <h1>Join Us!</h1>
            <div class="decorative-line"></div>
            <p class="details">
              The Innovation Hub<br>
              123 Creative Lane, Suite 400<br>
              San Francisco, CA 94102<br><br>
              Cocktails & hors d'oeuvres served.<br>
              RSVP by December 1st.
            </p>
          </div>
          <div class="gold-border"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="confetti-container" id="confettiContainer"></div>

  <script>
    const openBtn = document.getElementById("openBtn");
    const cardInner = document.getElementById("cardInner");
    const confettiContainer = document.getElementById("confettiContainer");
    let isOpen = false;

    const confettiColors = ["#f59e0b", "#ef4444", "#3b82f6", "#10b981", "#8b5cf6", "#ec4899"];

    function createConfetti() {
      for (let i = 0; i < 60; i++) {
        const el = document.createElement("div");
        el.className = "confetti";
        el.style.left = Math.random() * 100 + "%";
        el.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        el.style.width = Math.random() * 8 + 4 + "px";
        el.style.height = Math.random() * 8 + 4 + "px";
        el.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        el.style.animationDelay = Math.random() * 0.8 + "s";
        el.style.animationDuration = 2 + Math.random() * 1.5 + "s";
        confettiContainer.appendChild(el);
        requestAnimationFrame(() => el.classList.add("show"));
      }
    }

    openBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!isOpen) {
        cardInner.classList.add("opened");
        isOpen = true;
        createConfetti();
      }
    });

    document.addEventListener("click", () => {
      if (isOpen) {
        cardInner.classList.remove("opened");
        isOpen = false;
        confettiContainer.querySelectorAll(".confetti").forEach((c) => c.remove());
      }
    });

    openBtn.addEventListener("click", (e) => e.stopPropagation());
  </script>
</body>
</html>
