<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Bounce Badge</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Bounce Badge</h1>

    <p>
        Hover over the badges to activate the bounce animation.
    </p>

    <div class="badge-group">

        <span class="ease-badge ease-bounce primary">
            New
        </span>

        <span class="ease-badge ease-bounce success">
            Success
        </span>

        <span class="ease-badge ease-bounce warning">
            Premium
        </span>

        <span class="ease-badge ease-bounce danger">
            Sale
        </span>

    </div>

</div>

</body>
</html>
