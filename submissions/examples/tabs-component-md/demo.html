<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <button class="tab active" onclick="openTab(0)">Tab 1</button>
  <button class="tab" onclick="openTab(1)">Tab 2</button>
  <button class="tab" onclick="openTab(2)">Tab 3</button>
</div>

<div class="content active">Content 1</div>
<div class="content">Content 2</div>
<div class="content">Content 3</div>

<script>
function openTab(index) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".content").forEach(c => c.classList.remove("active"));

  document.querySelectorAll(".tab")[index].classList.add("active");
  document.querySelectorAll(".content")[index].classList.add("active");
}
</script>

</body>
</html>
