<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Animated Language Switcher</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <header class="demo-header">
            <h1>Language Switcher</h1>
            <p>A pure CSS animated language/locale dropdown.</p>
        </header>
        
        <div class="lang-switcher-container">
            <input type="checkbox" id="lang-toggle" class="lang-toggle" hidden>
            <label for="lang-toggle" class="lang-button">
                <span class="lang-icon">🌐</span>
                <span class="lang-current">English (US)</span>
                <span class="lang-arrow">▼</span>
            </label>
            <div class="lang-dropdown">
                <ul class="lang-list">
                    <li class="lang-item active"><a href="#">🇺🇸 English (US)</a></li>
                    <li class="lang-item"><a href="#">🇬🇧 English (UK)</a></li>
                    <li class="lang-item"><a href="#">🇪🇸 Español</a></li>
                    <li class="lang-item"><a href="#">🇫🇷 Français</a></li>
                    <li class="lang-item"><a href="#">🇩🇪 Deutsch</a></li>
                    <li class="lang-item"><a href="#">🇯🇵 日本語</a></li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
