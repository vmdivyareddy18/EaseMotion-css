<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Tooltip - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="checkout-container">
    <h2>Secure Checkout</h2>
    <p class="subtitle">Complete your payment details below.</p>
    
    <form class="checkout-form" onsubmit="event.preventDefault();">
      <div class="form-group">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="4111 2222 3333 4444" autocomplete="cc-number">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="expiry">Expiry Date</label>
          <input type="text" id="expiry" placeholder="MM / YY" autocomplete="cc-exp">
        </div>

        <div class="form-group">
          <label for="cvv">
            Security Code (CVV)
            <span class="tooltip-wrapper" tabindex="0" aria-describedby="cvv-hint">
              <span class="tooltip-trigger">?</span>
              <span id="cvv-hint" class="tooltip-content" role="tooltip">
                The 3-digit code located on the back signature strip of your credit or debit card.
              </span>
            </span>
          </label>
          <input type="password" id="cvv" placeholder="•••" maxlength="4" autocomplete="cc-csc">
        </div>
      </div>

      <button type="submit" class="submit-btn">Pay Now</button>
    </form>
  </div>

</body>
</html>
