<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Payment Success Checkmark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Payment Success Checkmark</h1>

  <p class="intro">
    A reusable success confirmation animation for payment apps,
    checkout flows, banking platforms, and transaction dashboards.
  </p>

  <div class="demo-grid">

    <div class="success-card">
      <div class="payment-success">
        <span class="checkmark">✓</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <h3>Payment Complete</h3>
    </div>

    <div class="success-card">
      <div class="payment-success large">
        <span class="checkmark">✓</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <p>Transaction Successful</p>
    </div>

    <div class="success-card">
      <div class="payment-success">
        <span class="checkmark">✓</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <button>Continue</button>
    </div>

  </div>

</main>

</body>
</html>
