<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-cart-icon-bounce – Cart Bounce on Add</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Add to Cart Animation
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the product’s "Add to Cart" button to see the icon bounce.
    </p>

    <!-- Product card -->
    <div class="product-card ease-card ease-p-6 ease-mb-8 ease-hover-shadow-lg ease-transition">
      <div class="ease-text-5xl ease-mb-4">🛍️</div>
      <h3 class="ease-text-lg ease-font-semibold ease-mb-2">Stylish Backpack</h3>
      <p class="ease-text-sm ease-text-gray-500 ease-mb-4">₹1,299</p>
      <button id="add-to-cart-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">
        Add to Cart
      </button>
    </div>

    <!-- Cart icon with badge -->
    <div id="cart-icon" class="cart-icon">
      <span class="cart-emoji">🛒</span>
      <span id="cart-badge" class="cart-badge">0</span>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Icon bounces + badge count pops.
    </p>
  </div>

  <script>
    const cartIcon = document.getElementById('cart-icon');
    const badge = document.getElementById('cart-badge');
    const addBtn = document.getElementById('add-to-cart-btn');
    let count = 0;

    addBtn.addEventListener('click', () => {
      count++;
      badge.textContent = count;

      // Remove animation class if already present, then re-add to retrigger
      cartIcon.classList.remove('ease-cart-update');
      void cartIcon.offsetWidth; // force reflow
      cartIcon.classList.add('ease-cart-update');
    });
  </script>

</body>
</html>
