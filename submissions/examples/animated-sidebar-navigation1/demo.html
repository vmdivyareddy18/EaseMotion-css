<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Sidebar Navigation - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar ease-slide-in-left">
      <!-- Logo -->
      <div class="sidebar-header ease-fade-in-down ease-delay-100">
        <div class="logo">
          <span class="logo-icon">🚀</span>
          <span class="logo-text">Dashboard</span>
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav class="sidebar-nav">
        <ul class="nav-list">
          <li class="nav-item active ease-fade-in-right ease-delay-200">
            <a href="#" class="nav-link">
              <span class="nav-icon">📊</span>
              <span class="nav-text">Dashboard</span>
              <span class="active-indicator"></span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-300">
            <a href="#" class="nav-link">
              <span class="nav-icon">📈</span>
              <span class="nav-text">Analytics</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-400">
            <a href="#" class="nav-link">
              <span class="nav-icon">👥</span>
              <span class="nav-text">Users</span>
              <span class="badge">12</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-500">
            <a href="#" class="nav-link">
              <span class="nav-icon">📦</span>
              <span class="nav-text">Products</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-600">
            <a href="#" class="nav-link">
              <span class="nav-icon">💰</span>
              <span class="nav-text">Revenue</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-700">
            <a href="#" class="nav-link">
              <span class="nav-icon">📧</span>
              <span class="nav-text">Messages</span>
              <span class="badge new">3</span>
            </a>
          </li>
        </ul>

        <div class="nav-divider"></div>

        <ul class="nav-list">
          <li class="nav-section-title ease-fade-in-right ease-delay-800">Settings</li>
          <li class="nav-item ease-fade-in-right ease-delay-900">
            <a href="#" class="nav-link">
              <span class="nav-icon">⚙️</span>
              <span class="nav-text">Preferences</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-1000">
            <a href="#" class="nav-link">
              <span class="nav-icon">🔒</span>
              <span class="nav-text">Security</span>
            </a>
          </li>
          <li class="nav-item ease-fade-in-right ease-delay-1100">
            <a href="#" class="nav-link">
              <span class="nav-icon">🚪</span>
              <span class="nav-text">Logout</span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- User Profile -->
      <div class="sidebar-footer ease-fade-in-up ease-delay-1200">
        <div class="user-profile">
          <div class="user-avatar">👩‍💻</div>
          <div class="user-info">
            <span class="user-name">Sarah Chen</span>
            <span class="user-role">Admin</span>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content ease-fade-in">
      <header class="content-header">
        <h1>Dashboard Overview</h1>
        <p>Welcome back! Here's what's happening today.</p>
      </header>
      
      <div class="content-placeholder">
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
        <div class="placeholder-card"></div>
      </div>
    </main>

  </div>
</body>
</html>
