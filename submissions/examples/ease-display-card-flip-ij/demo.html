<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Card Flip | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="flip-container" id="flipCard">
      <div class="flip-inner">
        <div class="flip-front">
          <h2>EaseMotion</h2>
          <p>Click to flip</p>
        </div>
        <div class="flip-back">
          <h2>✨ v1.0.0</h2>
          <p>CSS animation library built with custom properties for flexible, performant motion design.</p>
        </div>
      </div>
    </div>
    <div class="flip-hint">click the card to flip</div>
  </div>
  <script>
    document.getElementById('flipCard').addEventListener('click', function () {
      this.classList.toggle('flipped');
    });
  </script>
</body>
</html>
