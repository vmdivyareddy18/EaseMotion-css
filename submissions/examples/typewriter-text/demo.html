<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Typewriter Text — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: monospace;
      background: #0f0f0f;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.5rem;
    }

    .demo-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
  </style>
</head>
<body>

  <div class="demo-block">
    <p class="label">Default (20 chars)</p>
    <h1 class="ease-typewriter">Hello, EaseMotion!</h1>
  </div>

  <div class="demo-block">
    <p class="label">Custom chars via CSS variable</p>
    <h2 class="ease-typewriter" style="--ease-typewriter-chars: 30">
      Animation-first CSS for humans.
    </h2>
  </div>

  <div class="demo-block">
    <p class="label">No cursor variant</p>
    <h2 class="ease-typewriter ease-typewriter-no-cursor" style="--ease-typewriter-chars: 12">
      Build faster.
    </h2>
  </div>

</body>
</html>
