<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Session Trust List</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="header">

        <div>
            <h1>Device Session Trust List</h1>
            <p>Manage trusted devices and active account sessions</p>
        </div>

        <button class="security-btn">
            Security Settings
        </button>

    </div>

    <div class="security-summary">

        <div class="summary-card">
            <h3>Trusted Devices</h3>
            <span>8</span>
        </div>

        <div class="summary-card">
            <h3>Active Sessions</h3>
            <span>5</span>
        </div>

        <div class="summary-card">
            <h3>Risk Alerts</h3>
            <span class="safe">0</span>
        </div>

    </div>

    <div class="sessions-list">

        <div class="session-card current">

            <div class="device-info">

                <div class="device-icon">💻</div>

                <div>
                    <h3>MacBook Pro</h3>
                    <p>Current Device • Vijayawada, India</p>
                </div>

            </div>

            <div class="session-meta">

                <span class="trusted">
                    Trusted
                </span>

                <small>Active Now</small>

            </div>

        </div>

        <div class="session-card">

            <div class="device-info">

                <div class="device-icon">📱</div>

                <div>
                    <h3>iPhone 15</h3>
                    <p>Mumbai, India</p>
                </div>

            </div>

            <div class="session-meta">

                <span class="trusted">
                    Trusted
                </span>

                <small>2 Hours Ago</small>

            </div>

        </div>

        <div class="session-card warning">

            <div class="device-info">

                <div class="device-icon">🖥️</div>

                <div>
                    <h3>Windows Desktop</h3>
                    <p>Unknown Location</p>
                </div>

            </div>

            <div class="session-meta">

                <span class="review">
                    Review
                </span>

                <button class="revoke-btn">
                    Revoke
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
