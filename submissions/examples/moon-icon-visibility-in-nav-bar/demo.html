<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Fix: Theme Toggle Contrast in Light Mode — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
    <nav class="demo-nav" style="padding-left: 10px;">
    <div class="ease-container demo-nav-inner">
      <a href="index.html" class="demo-logo" style="text-decoration: none; display: flex; align-items: center;">
        <img src="assets/logo.svg" alt="EaseMotion CSS" style="height: 36px; width: auto; display: block;" />
      </a>
      <ul class="demo-nav-links">
        <li><a href="#buttons">Buttons</a></li>
        <li><a href="#cards">Cards</a></li>
        <li><a href="#animations">Animations</a></li>
        <li><a href="#layout">Layout</a></li>
        <li><a href="./">Docs</a></li>
        <li>
          <button
            id="theme-toggle"
            class="theme-toggle-btn ease-hover-grow"
            aria-label="Toggle dark/light theme"
          >
            <svg class="sun-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.72" x2="5.64" y2="18.3"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
        </li>
      </ul>
    </div>
  </nav>
  
  <main class="docs-shell">
    <div class="content-box">
      <h2>Contrast Fix for Moon Icon in Theme Toggle (Light Mode)</h2>
      <p>Current Theme: <strong id="themeStatus">Light Mode</strong></p>
      <p> The Moon icon now has a solid border color in Light Mode, ensuring it is clearly visible against the dark header background.</p>
    </div>
  </main>

  <script>
    const themeBtn = document.getElementById("theme-toggle");
    const htmlEl = document.documentElement;
    const statusText = document.getElementById("themeStatus");

    function updateStatusText(theme) {
      statusText.textContent = theme === 'light' ? 'Light Mode' : 'Dark Mode';
    }

    themeBtn.addEventListener("click", () => {
      const currentTheme = htmlEl.getAttribute("data-theme") || "dark";
      const targetTheme = currentTheme === "light" ? "dark" : "light";
      htmlEl.setAttribute("data-theme", targetTheme);
      updateStatusText(targetTheme);
    });

    // Set initial status text
    updateStatusText(htmlEl.getAttribute("data-theme") || "light");
  </script>
</body>
</html>
