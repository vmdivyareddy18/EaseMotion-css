<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Quantity Input Number Stepper Component</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-stepper">
  <button class="step-btn" onclick="let inp=this.nextElementSibling; if(inp.value > 1) inp.value--">-</button>
  <input type="number" class="step-input" value="1" min="1">
  <button class="step-btn" onclick="this.previousElementSibling.value++">+</button>
</div>
</body>
</html>
