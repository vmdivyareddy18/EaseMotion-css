<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meter Fill Gauge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="mfg-demo">
    <h1>Fill Gauge Meter</h1>
    <p class="mfg-subtitle">Click a gauge to animate it to a random target value, or use the controls below</p>

    <div class="mfg-grid">
      <div class="mfg-card">
        <h2>Circular</h2>
        <div class="gauge circular" id="gaugeCircular">
          <svg viewBox="0 0 120 120">
            <circle class="track" cx="60" cy="60" r="50"/>
            <circle class="fill" cx="60" cy="60" r="50" style="stroke-dashoffset: 314.16;"/>
          </svg>
          <span class="value">0%</span>
        </div>
        <div class="mfg-ctrl">
          <label>Value: <input type="range" min="0" max="100" value="0" oninput="setGauge('gaugeCircular', +this.value)"></label>
          <span class="mfg-pct" id="pctCircular">0</span>
        </div>
      </div>

      <div class="mfg-card">
        <h2>Semi-Circular</h2>
        <div class="gauge semicircular" id="gaugeSemi">
          <svg viewBox="0 0 120 120">
            <path class="track" d="M 10 100 A 50 50 0 1 1 110 100" fill="none"/>
            <path class="fill" d="M 10 100 A 50 50 0 1 1 110 100" fill="none"/>
          </svg>
          <span class="value">0%</span>
        </div>
        <div class="mfg-ctrl">
          <label>Value: <input type="range" min="0" max="100" value="0" oninput="setGauge('gaugeSemi', +this.value)"></label>
          <span class="mfg-pct" id="pctSemi">0</span>
        </div>
      </div>
    </div>

    <div class="mfg-actions">
      <button class="mfg-btn" onclick="randomGauges()">Random Values</button>
      <button class="mfg-btn mfg-btn--outline" onclick="resetGauges()">Reset</button>
    </div>
  </main>

  <script>
    const CIRCUMFERENCE = 2 * Math.PI * 50;
    const SEMI_CIRCUMFERENCE = Math.PI * 50;

    function setGauge(id, value) {
      const gauge = document.getElementById(id);
      const fill = gauge.querySelector('.fill');
      const valEl = gauge.querySelector('.value');
      const pctEl = document.getElementById('pct' + id.replace('gauge', ''));
      const isCircle = gauge.classList.contains('circular');
      const maxOffset = isCircle ? CIRCUMFERENCE : SEMI_CIRCUMFERENCE;
      const offset = maxOffset - (value / 100) * maxOffset;

      fill.style.strokeDashoffset = offset;
      valEl.textContent = Math.round(value) + '%';
      if (pctEl) pctEl.textContent = Math.round(value);
    }

    function animateTo(id, target) {
      const gauge = document.getElementById(id);
      const isCircle = gauge.classList.contains('circular');
      const maxOffset = isCircle ? CIRCUMFERENCE : SEMI_CIRCUMFERENCE;
      const fill = gauge.querySelector('.fill');
      const valEl = gauge.querySelector('.value');
      const pctEl = document.getElementById('pct' + id.replace('gauge', ''));
      const duration = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--mfg-duration')) * 1000 || 1000;
      const start = performance.now();
      const from = parseFloat(valEl.textContent) || 0;

      function step(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        const current = from + (target - from) * ease;
        const offset = maxOffset - (current / 100) * maxOffset;
        fill.style.strokeDashoffset = offset;
        valEl.textContent = Math.round(current) + '%';
        if (pctEl) pctEl.textContent = Math.round(current);
        if (t < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function randomGauges() {
      animateTo('gaugeCircular', Math.round(Math.random() * 100));
      animateTo('gaugeSemi', Math.round(Math.random() * 100));
    }

    function resetGauges() {
      animateTo('gaugeCircular', 0);
      animateTo('gaugeSemi', 0);
    }

    document.querySelectorAll('.gauge').forEach(g => {
      g.addEventListener('click', () => {
        const target = Math.round(Math.random() * 100);
        animateTo(g.id, target);
      });
    });

    setGauge('gaugeCircular', 0);
    setGauge('gaugeSemi', 0);
  </script>
</body>
</html>
