<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cassette Tape</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cassette">
    <span class="screw tl"></span>
    <span class="screw tr"></span>
    <span class="screw bl"></span>
    <span class="screw br"></span>

    <div class="label">
      <span class="brand">MIXTAPE</span>
      <span class="line">Summer 2026</span>
      <span class="line thin">Side A</span>
    </div>

    <div class="window">
      <div class="reel left">
        <span class="tape"></span>
        <span class="hub">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </span>
      </div>
      <div class="reel right">
        <span class="tape big"></span>
        <span class="hub">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </span>
      </div>
    </div>

    <div class="holes">
      <span></span><span></span><span></span>
    </div>
  </div>
</body>
</html>
