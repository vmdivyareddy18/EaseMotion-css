<!DOCTYPE html>
<html>
<head>
  <title>Theme Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button onclick="toggleTheme()">Toggle Theme</button>

<h1>Theme Toggle Example</h1>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
