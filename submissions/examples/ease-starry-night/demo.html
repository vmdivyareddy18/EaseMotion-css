<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starry Night</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Starry Sky</h2>
    <div class="night-sky">
      <div class="star" style="--x:20%;--y:15%;--s:3px;--d:0s"></div>
      <div class="star" style="--x:60%;--y:25%;--s:2px;--d:1s"></div>
      <div class="star" style="--x:80%;--y:10%;--s:4px;--d:2s"></div>
      <div class="star" style="--x:40%;--y:50%;--s:2px;--d:0.5s"></div>
      <div class="star" style="--x:70%;--y:70%;--s:3px;--d:1.5s"></div>
      <div class="star" style="--x:15%;--y:60%;--s:2px;--d:2.5s"></div>
      <div class="star" style="--x:50%;--y:80%;--s:3px;--d:0.8s"></div>
      <div class="star" style="--x:90%;--y:45%;--s:2px;--d:1.8s"></div>
    </div>
  </div>
</body>
</html>
