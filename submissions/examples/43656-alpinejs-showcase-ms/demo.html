<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alpine.js Integration Demo</title>
  <!-- Global EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-alpine-container">
    <div class="ease-alpine-header">
      <h2 class="ease-alpine-title">Alpine.js Integration</h2>
      <p class="ease-alpine-desc">Using x-transition to trigger EaseMotion classes.</p>
    </div>

    <!-- Alpine component state -->
    <div class="ease-alpine-stage" x-data="{ open: false }">
      
      <button 
        class="ease-alpine-btn ease-hover-lift" 
        @click="open = !open">
        Toggle Card
      </button>

      <!-- The element that enters/leaves using EaseMotion animations -->
      <div 
        class="ease-alpine-card"
        x-show="open"
        x-transition:enter="ease-fade-in-up"
        x-transition:leave="ease-fade-out-down"
        style="display: none;"
      >
        <h3 style="margin-top: 0;">Hello from Alpine!</h3>
        <p style="color: #64748b; margin-bottom: 0;">This card uses x-transition to apply the .ease-fade-in-up and .ease-fade-out-down animations.</p>
      </div>
      
    </div>
  </div>

</body>
</html>
