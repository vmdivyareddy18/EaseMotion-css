<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble Rating Stars</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #fafafa; font-family: serif;">
  
  <div class="news-card ease-fade-in-up">
    <div class="news-header">
      <span class="category">Book Review</span>
      <span class="date">Oct 24</span>
    </div>
    <h2>The Architecture of Modern Web</h2>
    <p class="excerpt">A deep dive into how CSS animations are shaping user experiences in the modern era.</p>
    
    <div class="rating-section">
      <p class="rating-label">Rate this article:</p>
      
      <!-- CSS-only star rating system (Reverse direction for contiguous hover/select logic) -->
      <div class="star-rating">
        <input type="radio" id="star5" name="rating" value="5">
        <label for="star5" class="star ease-hover-pop">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
        
        <input type="radio" id="star4" name="rating" value="4">
        <label for="star4" class="star ease-hover-pop">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
        
        <input type="radio" id="star3" name="rating" value="3">
        <label for="star3" class="star ease-hover-pop">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
        
        <input type="radio" id="star2" name="rating" value="2">
        <label for="star2" class="star ease-hover-pop">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
        
        <input type="radio" id="star1" name="rating" value="1">
        <label for="star1" class="star ease-hover-pop">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        </label>
      </div>
    </div>
  </div>

</body>
</html>
