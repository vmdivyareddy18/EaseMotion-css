<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Builder - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="frm-header"><h1>CSS Form Builder</h1><p>Comprehensive form components with validation states</p></header>
<section class="frm-section"><h2>Input Types</h2>
<form class="frm-form" onsubmit="return false">
<div class="frm-row"><div class="frm-group"><label class="frm-label">Text Input</label><input type="text" class="frm-input" placeholder="Enter your name" value="John Doe"><span class="frm-hint">Full name as on ID</span></div><div class="frm-group"><label class="frm-label">Email</label><input type="email" class="frm-input" placeholder="email@example.com" value="john@example.com"><span class="frm-hint">We will never share your email</span></div></div>
<div class="frm-row"><div class="frm-group"><label class="frm-label">Password</label><input type="password" class="frm-input" placeholder="Min 8 characters" value="secret123"><button class="frm-toggle-pw">&#9740;</button></div><div class="frm-group"><label class="frm-label">Phone Number</label><input type="tel" class="frm-input" placeholder="+1 (555) 000-0000" value="+1 (555) 123-4567"></div></div>
<div class="frm-row"><div class="frm-group"><label class="frm-label">Number</label><input type="number" class="frm-input" placeholder="0" value="42" min="0" max="100"></div><div class="frm-group"><label class="frm-label">URL</label><input type="url" class="frm-input" placeholder="https://example.com" value="https://example.com"></div></div>
<div class="frm-row"><div class="frm-group"><label class="frm-label">Date</label><input type="date" class="frm-input" value="2026-06-15"></div><div class="frm-group"><label class="frm-label">Time</label><input type="time" class="frm-input" value="14:30"></div></div>
<div class="frm-row"><div class="frm-group"><label class="frm-label">Color Picker</label><input type="color" class="frm-color" value="#667eea"></div><div class="frm-group"><label class="frm-label">Range Slider</label><input type="range" class="frm-range" min="0" max="100" value="65"></div></div>
</form></section>
<section class="frm-section"><h2>Select Menus</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group"><label class="frm-label">Standard Select</label><select class="frm-select"><option>Option One</option><option>Option Two</option><option selected>Option Three</option><option>Option Four</option><option>Option Five</option></select></div><div class="frm-group"><label class="frm-label">Multiple Select</label><select class="frm-select" multiple size="3"><option>Red</option><option selected>Green</option><option>Blue</option><option>Yellow</option><option>Purple</option></select></div></div>
</form></section>
<section class="frm-section"><h2>Checkboxes & Radios</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group"><label class="frm-label">Checkboxes</label><label class="frm-checkbox"><input type="checkbox" checked><span class="frm-check-mark"></span>Option A</label><label class="frm-checkbox"><input type="checkbox"><span class="frm-check-mark"></span>Option B</label><label class="frm-checkbox"><input type="checkbox" checked><span class="frm-check-mark"></span>Option C</label><label class="frm-checkbox"><input type="checkbox" disabled><span class="frm-check-mark"></span>Disabled</label></div><div class="frm-group"><label class="frm-label">Radio Buttons</label><label class="frm-radio"><input type="radio" name="rg1" checked><span class="frm-radio-mark"></span>Free Plan</label><label class="frm-radio"><input type="radio" name="rg1"><span class="frm-radio-mark"></span>Pro Plan</label><label class="frm-radio"><input type="radio" name="rg1"><span class="frm-radio-mark"></span>Enterprise</label><label class="frm-radio"><input type="radio" name="rg1" disabled><span class="frm-radio-mark"></span>Disabled</label></div></div>
</form></section>
<section class="frm-section"><h2>Toggle Switches</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group"><label class="frm-label">Notifications</label><label class="frm-toggle"><input type="checkbox" checked><span class="frm-toggle-slider"></span>Email Alerts</label><label class="frm-toggle"><input type="checkbox"><span class="frm-toggle-slider"></span>SMS Notifications</label><label class="frm-toggle"><input type="checkbox" checked><span class="frm-toggle-slider"></span>Push Notifications</label><label class="frm-toggle"><input type="checkbox" disabled><span class="frm-toggle-slider"></span>Disabled Toggle</label></div><div class="frm-group"><label class="frm-label">Privacy Settings</label><label class="frm-toggle"><input type="checkbox" checked><span class="frm-toggle-slider"></span>Profile Visibility</label><label class="frm-toggle"><input type="checkbox"><span class="frm-toggle-slider"></span>Activity Status</label><label class="frm-toggle"><input type="checkbox" checked><span class="frm-toggle-slider"></span>Read Receipts</label></div></div>
</form></section>
<section class="frm-section"><h2>Textareas</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group frm-group-full"><label class="frm-label">Biography</label><textarea class="frm-textarea" rows="4" placeholder="Tell us about yourself...">Full-stack developer with 8 years of experience building scalable web applications using modern CSS, React, and Node.js.</textarea></div></div>
<div class="frm-row"><div class="frm-group frm-group-full"><label class="frm-label">Comments</label><textarea class="frm-textarea" rows="3" placeholder="Enter your comments here..."></textarea></div></div>
</form></section>
<section class="frm-section"><h2>Validation States</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group"><label class="frm-label">Success State</label><input type="text" class="frm-input frm-success" value="Valid input"><span class="frm-msg frm-msg-success">Looks good!</span></div><div class="frm-group"><label class="frm-label">Error State</label><input type="text" class="frm-input frm-error" value="Invalid"><span class="frm-msg frm-msg-error">This field is required</span></div></div>
<div class="frm-row"><div class="frm-group"><label class="frm-label">Warning State</label><input type="text" class="frm-input frm-warning" value="Review needed"><span class="frm-msg frm-msg-warning">Please double-check</span></div><div class="frm-group"><label class="frm-label">Disabled State</label><input type="text" class="frm-input" value="Read only" disabled></div></div>
</form></section>
<section class="frm-section"><h2>File Upload</h2>
<form class="frm-form">
<div class="frm-row"><div class="frm-group frm-group-full"><label class="frm-label">Upload Files</label><div class="frm-upload"><input type="file" id="frm-file" multiple><label for="frm-file" class="frm-upload-label"><span class="frm-upload-icon">&#128206;</span><strong>Click to upload</strong><span>or drag and drop</span><span class="frm-upload-hint">PNG, JPG, PDF up to 10MB</span></label></div></div></div>
</form></section>
<section class="frm-section"><h2>Form Actions</h2>
<div class="frm-actions"><button class="frm-btn frm-btn-primary">Submit Form</button><button class="frm-btn frm-btn-secondary">Save Draft</button><button class="frm-btn frm-btn-ghost">Cancel</button></div>
</section>
</body>
</html>
