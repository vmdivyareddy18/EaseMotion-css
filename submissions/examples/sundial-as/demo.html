<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sundial</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="sun"></span>
    <div class="dial">
      <div class="marks">
        <span class="mark mk1"></span>
        <span class="mark mk2"></span>
        <span class="mark mk3"></span>
        <span class="mark mk4"></span>
        <span class="mark mk5"></span>
        <span class="mark mk6"></span>
        <span class="mark mk7"></span>
        <span class="mark mk8"></span>
        <span class="mark mk9"></span>
        <span class="mark mk10"></span>
        <span class="mark mk11"></span>
        <span class="mark mk12"></span>
      </div>
      <span class="shade"></span>
      <span class="gnomon"></span>
      <span class="hub"></span>
    </div>
    <span class="plinth"></span>
  </div>
</body>
</html>
