<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Notification Chip UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Notification Chip UI Example</h1>
      <p>Notification chips with bounce animations and color transitions.</p>
    </header>

    <section class="chip-grid">
      <div class="chip-container">
        <h3>Success Chip</h3>
        <span class="notification-chip notification-chip--success" id="chipSuccess">✓ Updated</span>
        <button class="trigger-btn" data-chip="chipSuccess">Trigger</button>
      </div>

      <div class="chip-container">
        <h3>Warning Chip</h3>
        <span class="notification-chip notification-chip--warning" id="chipWarning">⚠ Attention</span>
        <button class="trigger-btn" data-chip="chipWarning">Trigger</button>
      </div>

      <div class="chip-container">
        <h3>Info Chip</h3>
        <span class="notification-chip notification-chip--info" id="chipInfo">ℹ Info</span>
        <button class="trigger-btn" data-chip="chipInfo">Trigger</button>
      </div>

      <div class="chip-container">
        <h3>Error Chip</h3>
        <span class="notification-chip notification-chip--error" id="chipError">✕ Error</span>
        <button class="trigger-btn" data-chip="chipError">Trigger</button>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll('.trigger-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const chipId = btn.dataset.chip;
        const chip = document.getElementById(chipId);
        chip.classList.remove('notification-chip--bounce');
        void chip.offsetWidth;
        chip.classList.add('notification-chip--bounce');
      });
    });
  </script>
</body>
</html>
