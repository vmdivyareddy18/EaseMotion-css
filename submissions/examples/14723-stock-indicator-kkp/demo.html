<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Indicator Pulse</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="stock-title">
        <p class="eyebrow">Inventory signal</p>
        <h1 id="stock-title">Low stock indicator</h1>
        <p class="demo-copy">
          A pulsing status marker calls attention to limited availability.
        </p>
        <span class="stock-indicator">
          <span class="stock-dot"></span>
          Only 3 left in stock
        </span>
      </section>
    </main>
  </body>
</html>
