<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Spring Physics Popover - Accessible Web</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Accessible Web</span>
      <h1>Spring Physics Popover</h1>
      <p class="subtitle">Accessible spring animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="access-btn" aria-label="Accessibility options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="4"/>
            <line x1="21.17" y1="8" x2="12" y2="8"/>
            <line x1="3.95" y1="6.06" x2="8.54" y2="14"/>
            <line x1="10.88" y1="21.94" x2="15.46" y2="14"/>
          </svg>
        </button>
        <div class="spring-popover" role="tooltip" id="access-menu">
          <div class="spring-header">
            <h4>Accessibility</h4>
          </div>
          <div class="spring-options">
            <label class="spring-option" style="--delay: 0s">
              <span class="option-toggle" aria-hidden="true"></span>
              <span class="option-text">
                <span class="option-title">High Contrast</span>
                <span class="option-desc">Increase color contrast</span>
              </span>
            </label>
            <label class="spring-option" style="--delay: 0.05s">
              <span class="option-toggle" aria-hidden="true"></span>
              <span class="option-text">
                <span class="option-title">Large Text</span>
                <span class="option-desc">Increase font size</span>
              </span>
            </label>
            <label class="spring-option" style="--delay: 0.1s">
              <span class="option-toggle" aria-hidden="true"></span>
              <span class="option-text">
                <span class="option-title">Reduced Motion</span>
                <span class="option-desc">Minimize animations</span>
              </span>
            </label>
            <label class="spring-option" style="--delay: 0.15s">
              <span class="option-toggle" aria-hidden="true"></span>
              <span class="option-text">
                <span class="option-title">Screen Reader</span>
                <span class="option-desc">Enhanced screen support</span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="spring-popover slide" role="tooltip"><p>Slide spring animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Fade</button>
          <div class="spring-popover fade" role="tooltip"><p>Fade spring animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Grow</button>
          <div class="spring-popover grow" role="tooltip"><p>Grow spring animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-blue">Blue</button>
          <div class="spring-popover theme-blue" role="tooltip"><p>Blue accessible theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-green">Green</button>
          <div class="spring-popover theme-green" role="tooltip"><p>Green accessible theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-orange">Orange</button>
          <div class="spring-popover theme-orange" role="tooltip"><p>Orange accessible theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
