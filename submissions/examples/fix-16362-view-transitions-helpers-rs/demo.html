<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Transitions API Helpers</title>
  <link rel="stylesheet" href="../../core/index.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; font-family: system-ui; }
    .box { width: 100px; height: 100px; background: blue; color: white; display: flex; align-items: center; justify-content: center; }
    .box.active { background: red; width: 200px; }
  </style>
</head>
<body>
  <h1>View Transitions Helper</h1>
  <div class="box ease-vt-fade" id="target">Box</div>
  <br>
  <button onclick="toggle()">Toggle with Transition</button>
  <script>
    function toggle() {
      if (!document.startViewTransition) {
        document.getElementById('target').classList.toggle('active');
        return;
      }
      document.startViewTransition(() => {
        document.getElementById('target').classList.toggle('active');
      });
    }
  </script>
</body>
</html>
