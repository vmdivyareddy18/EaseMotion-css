<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Stepper</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="title">Registration</h2>
    <div class="stepper">
      <div class="step active">
        <div class="step-indicator">1</div>
        <div class="step-label">Account</div>
      </div>
      <div class="step-line"></div>
      <div class="step completed">
        <div class="step-indicator">✓</div>
        <div class="step-label">Profile</div>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-indicator">3</div>
        <div class="step-label">Verify</div>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="step-indicator">4</div>
        <div class="step-label">Done</div>
      </div>
    </div>
    <div class="step-content">
      <p><strong>Step 1: Account</strong> — Enter your email and create a password to get started.</p>
    </div>
    <div class="step-nav">
      <button class="nav-btn" disabled>Previous</button>
      <button class="nav-btn primary">Next</button>
    </div>
  </div>
</body>
</html>
