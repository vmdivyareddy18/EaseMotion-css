<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Focus Ring Button Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #f8fafc;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px;
      background: rgba(30, 41, 59, 0.5);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    p {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Interactive Focus Ring</h2>
    <p>Click on the button below, then press the <strong>TAB</strong> key or focus using keyboard navigation to witness the dynamic pulsing focus-ring outline animation. Designed specifically for modern web accessibility standards (WCAG).</p>
    <button class="focus-ring-btn">Interact With Me</button>
  </div>
</body>
</html>
