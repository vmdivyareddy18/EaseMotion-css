<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Presence Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="presence-page">
    <h1>Presence Indicators</h1>
    <div class="avatar-group">
      <div class="avatar-item">
        <div class="avatar-ring online">
          <div class="avatar-circle" style="background:linear-gradient(135deg,#6366f1,#a855f7)">A</div>
        </div>
        <span class="avatar-name">Alice</span>
      </div>
      <div class="avatar-item">
        <div class="avatar-ring idle">
          <div class="avatar-circle" style="background:linear-gradient(135deg,#f59e0b,#ec4899)">B</div>
        </div>
        <span class="avatar-name">Bob</span>
      </div>
      <div class="avatar-item">
        <div class="avatar-ring offline">
          <div class="avatar-circle" style="background:linear-gradient(135deg,#64748b,#475569)">C</div>
        </div>
        <span class="avatar-name">Carol</span>
      </div>
    </div>
  </div>
</body>
</html>
