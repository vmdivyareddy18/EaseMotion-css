<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Window Selection Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Select Delivery Window</h1>

    <p class="subtitle">
        Choose your preferred delivery time.
    </p>

    <div class="delivery-options">

        <label class="card">

            <input type="radio" name="delivery" checked>

            <span class="indicator"></span>

            <div class="details">

                <h3>Morning</h3>

                <p>08:00 AM – 11:00 AM</p>

                <span class="tag available">
                    Available
                </span>

            </div>

        </label>

        <label class="card">

            <input type="radio" name="delivery">

            <span class="indicator"></span>

            <div class="details">

                <h3>Afternoon</h3>

                <p>12:00 PM – 03:00 PM</p>

                <span class="tag available">
                    Available
                </span>

            </div>

        </label>

        <label class="card">

            <input type="radio" name="delivery">

            <span class="indicator"></span>

            <div class="details">

                <h3>Evening</h3>

                <p>05:00 PM – 08:00 PM</p>

                <span class="tag limited">
                    Limited Slots
                </span>

            </div>

        </label>

    </div>

    <button class="continue-btn">
        Continue
    </button>

</div>

</body>
</html>
