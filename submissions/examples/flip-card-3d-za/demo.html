<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="flip-page">
    <h1>Hover to Flip</h1>
    <div class="flip-grid">
      <div class="flip-card">
        <div class="flip-inner">
          <div class="flip-front" style="background:linear-gradient(135deg,#6366f1,#a855f7)">
            <span class="flip-icon">&#128640;</span>
            <h3>Launch</h3>
          </div>
          <div class="flip-back">
            <h3>Ready to Launch</h3>
            <p>Deploy your project with confidence using our automated pipeline.</p>
            <span class="flip-btn">Learn More</span>
          </div>
        </div>
      </div>
      <div class="flip-card">
        <div class="flip-inner">
          <div class="flip-front" style="background:linear-gradient(135deg,#ec4899,#f59e0b)">
            <span class="flip-icon">&#128161;</span>
            <h3>Ideas</h3>
          </div>
          <div class="flip-back">
            <h3>Creative Ideas</h3>
            <p>Transform your concepts into reality with our design tools.</p>
            <span class="flip-btn">Explore</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
