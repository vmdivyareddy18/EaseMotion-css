<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Label Input With Error State</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="form-card">

        <h1>Account Settings</h1>

        <p>
            Floating label inputs with validation states.
        </p>

        <div class="input-group error">

            <input
                type="email"
                id="email"
                placeholder=" "
                value="invalid-email"
            >

            <label for="email">
                Email Address
            </label>

            <span class="error-message">
                Please enter a valid email address.
            </span>

        </div>

        <div class="input-group success">

            <input
                type="text"
                id="username"
                placeholder=" "
                value="ashwanth"
            >

            <label for="username">
                Username
            </label>

            <span class="success-message">
                Username is available.
            </span>

        </div>

        <button class="save-btn">
            Save Changes
        </button>

    </div>

</div>

</body>
</html>
