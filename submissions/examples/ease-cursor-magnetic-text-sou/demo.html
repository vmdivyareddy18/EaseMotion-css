<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Cursor Magnetic Text — Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="demo-stage">
        <p class="demo-hint">Move your cursor near the headings below — the letters will gently pull toward it.</p>

        <h1 class="magnetic-text" data-magnetic-text>Magnetic Text</h1>

        <h2 class="magnetic-text magnetic-text--soft" data-magnetic-text>Hover Me Closely</h2>

        <h3 class="magnetic-text magnetic-text--strong" data-magnetic-text>Stronger Pull Effect</h3>

        <p class="magnetic-text magnetic-text--small" data-magnetic-text>
            Even body text can become interactive and playful.
        </p>
    </main>

    <script>
        /**
         * ease-cursor-magnetic-text
         * Wraps each character of [data-magnetic-text] elements in a <span>,
         * then updates a per-character CSS variable (--ease-char-offset-x/y)
         * based on cursor proximity. All visual motion is handled by CSS.
         */
        (function () {
            const RADIUS = 140;          // Effect radius in px
            const MAX_SHIFT_DEFAULT = 12; // Max pixel shift per character

            // 1) Wrap every character of each target element in its own <span>.
            const targets = document.querySelectorAll('[data-magnetic-text]');
            const allChars = [];

            targets.forEach((el) => {
                const text = el.textContent;
                el.textContent = '';

                // Read optional per-element strength override
                const strength = parseFloat(el.dataset.magneticStrength) || MAX_SHIFT_DEFAULT;

                for (const ch of text) {
                    if (ch === ' ') {
                        // Preserve real spaces (non-magnetic)
                        el.appendChild(document.createTextNode(' '));
                        continue;
                    }
                    const span = document.createElement('span');
                    span.className = 'magnetic-char';
                    span.textContent = ch;
                    span.setAttribute('aria-hidden', 'false');
                    el.appendChild(span);
                    allChars.push({ el: span, strength });
                }

                // Ensure screen readers still read the original text naturally
                el.setAttribute('aria-label', text);
            });

            // 2) Track cursor and update CSS variables per character.
            let cursorX = -9999;
            let cursorY = -9999;
            let ticking = false;

            function update() {
                ticking = false;
                for (let i = 0; i < allChars.length; i++) {
                    const { el, strength } = allChars[i];
                    const rect = el.getBoundingClientRect();
                    const cx = rect.left + rect.width / 2;
                    const cy = rect.top + rect.height / 2;
                    const dx = cursorX - cx;
                    const dy = cursorY - cy;
                    const dist = Math.hypot(dx, dy);

                    if (dist < RADIUS) {
                        const force = (1 - dist / RADIUS); // 0..1
                        const shiftX = (dx / dist) * force * strength;
                        const shiftY = (dy / dist) * force * strength;
                        el.style.setProperty('--ease-char-offset-x', shiftX.toFixed(2) + 'px');
                        el.style.setProperty('--ease-char-offset-y', shiftY.toFixed(2) + 'px');
                        el.style.setProperty('--ease-char-offset', force.toFixed(3));
                    } else {
                        el.style.setProperty('--ease-char-offset-x', '0px');
                        el.style.setProperty('--ease-char-offset-y', '0px');
                        el.style.setProperty('--ease-char-offset', '0');
                    }
                }
            }

            function onPointerMove(e) {
                cursorX = e.clientX;
                cursorY = e.clientY;
                if (!ticking) {
                    requestAnimationFrame(update);
                    ticking = true;
                }
            }

            function onPointerLeave() {
                cursorX = -9999;
                cursorY = -9999;
                requestAnimationFrame(update);
            }

            window.addEventListener('pointermove', onPointerMove, { passive: true });
            window.addEventListener('pointerleave', onPointerLeave, { passive: true });

            // Respect reduced-motion users: disable effect completely.
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (prefersReduced.matches) {
                window.removeEventListener('pointermove', onPointerMove);
            }
        })();
    </script>
</body>
</html>
