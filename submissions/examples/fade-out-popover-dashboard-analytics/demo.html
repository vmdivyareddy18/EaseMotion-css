<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics Fade-Out Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <h1>Analytics Dashboard</h1>
    <p>CSS Fade-Out Popover Component</p>

    <button class="trigger">
        View Report
    </button>

    <div class="popover">

        <h2>Monthly Analytics</h2>

        <div class="stats">
            <span>Users: 12.5K</span>
            <span>Growth: +24%</span>
            <span>Revenue: $45K</span>
        </div>

        <button class="btn">
            Open Dashboard
        </button>

    </div>

</div>

</body>
</html>
