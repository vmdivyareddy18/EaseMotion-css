<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Animated Radial Progress Rings Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f8fafc;
      margin: 0;
      padding: 3rem 1.5rem;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .dashboard-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    .dashboard-header h1 {
      color: #0f172a;
      margin: 0 0 0.5rem 0;
    }
    .dashboard-header p {
      color: #64748b;
      margin: 0;
    }
    .metrics-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
      justify-content: center;
      max-width: 900px;
      background: #ffffff;
      padding: 3rem;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <header class="dashboard-header">
    <h1>EaseMotion Performance Stats</h1>
    <p>Pure CSS hardware-accelerated loading metrics and text counter nodes synced seamlessly.</p>
  </header>

  <!-- Metrics Testing Playground -->
  <main class="metrics-grid">
    
    <!-- Test Indicator 1 (45% Complete) -->
    <div class="em-radial-progress-container">
      <div class="em-radial-ring" style="--target: 45;" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
        <div class="em-progress-label"></div>
      </div>
      <p class="em-progress-caption">Memory Optimization</p>
    </div>

    <!-- Test Indicator 2 (82% Complete) -->
    <div class="em-radial-progress-container">
      <div class="em-radial-ring" style="--target: 82; --color-primary-start: #10b981; --color-primary-end: #059669;" role="progressbar" aria-valuenow="82" aria-valuemin="0" aria-valuemax="100">
        <div class="em-progress-label"></div>
      </div>
      <p class="em-progress-caption">Cache Hit Ratio</p>
    </div>

    <!-- Test Indicator 3 (100% Complete) -->
    <div class="em-radial-progress-container">
      <div class="em-radial-ring" style="--target: 100; --color-primary-start: #f59e0b; --color-primary-end: #d97706;" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
        <div class="em-progress-label"></div>
      </div>
      <p class="em-progress-caption">Assets Pack Completed</p>
    </div>

  </main>

</body>
</html>
