<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loader Demo – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: #f0f2f5;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem;
      margin: 0;
      min-height: 100vh;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <!-- Skeleton Card 1 -->
  <div class="ease-skeleton-card">
    <div class="ease-skeleton-avatar"></div>
    <div class="ease-skeleton-text ease-skeleton-text--lg"></div>
    <div class="ease-skeleton-text ease-skeleton-text--md"></div>
    <div class="ease-skeleton-text ease-skeleton-text--sm"></div>
  </div>

  <!-- Skeleton Card 2 – Image card variant -->
  <div class="ease-skeleton-card">
    <div class="ease-skeleton-image"></div>
    <div class="ease-skeleton-text ease-skeleton-text--lg"></div>
    <div class="ease-skeleton-text ease-skeleton-text--md"></div>
  </div>

  <!-- Skeleton Card 3 – List variant -->
  <div class="ease-skeleton-card ease-skeleton-card--list">
    <div class="ease-skeleton-avatar ease-skeleton-avatar--sm"></div>
    <div class="ease-skeleton-lines">
      <div class="ease-skeleton-text ease-skeleton-text--md"></div>
      <div class="ease-skeleton-text ease-skeleton-text--sm"></div>
    </div>
  </div>

</body>
</html>
