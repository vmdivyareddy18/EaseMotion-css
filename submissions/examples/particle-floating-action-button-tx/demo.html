<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Floating Action Button</title>
    <!-- Import global EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component specific styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-app-bg finance-dashboard-interface">
    <div class="demo-container ease-fade-in">
        <header class="demo-header">
            <h1 class="demo-title">Finance Dashboard</h1>
            <p class="demo-subtitle">Pure CSS Particle Floating Action Button</p>
        </header>

        <main class="demo-content">
            <!-- Simulated Dashboard View -->
            <div class="dashboard-panel">
                <div class="dashboard-header">
                    <h3>Portfolio Overview</h3>
                    <span class="trend positive">+4.2% Today</span>
                </div>
                <div class="dashboard-metrics">
                    <div class="metric">
                        <span class="metric-label">Total Balance</span>
                        <span class="metric-value">$124,592.00</span>
                    </div>
                </div>
                
                <div class="mock-chart">
                    <div class="mock-chart-line"></div>
                </div>

                <!-- Pure CSS Particle FAB -->
                <div class="fab-container">
                    <input type="checkbox" id="fab-trigger" class="fab-trigger-input" aria-hidden="true" />
                    
                    <label for="fab-trigger" class="fab-button ease-hover-lift" tabindex="0" role="button" aria-label="Add new transaction" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                        <!-- Plus Icon -->
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" class="fab-icon">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        
                        <!-- Particle Emitters -->
                        <div class="particle-emitter emitter-1"></div>
                        <div class="particle-emitter emitter-2"></div>
                        <div class="particle-emitter emitter-3"></div>
                        <div class="particle-emitter emitter-4"></div>
                        <div class="particle-emitter emitter-5"></div>
                        <div class="particle-emitter emitter-6"></div>
                    </label>

                    <!-- Expandable FAB Menu (triggered by the same checkbox) -->
                    <div class="fab-menu">
                        <button class="fab-menu-item ease-hover-lift" aria-label="Transfer Funds">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                        </button>
                        <button class="fab-menu-item ease-hover-lift" aria-label="Deposit">
                            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
