<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cupcake</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="cupcake">
      <span class="candle"></span>
      <span class="wick"></span>
      <span class="flamec"></span>
      <span class="haloc"></span>
      <span class="swirl s3"></span>
      <span class="swirl s2"></span>
      <span class="swirl s1"></span>
      <span class="cherry"></span>
      <span class="sprinkle sp1"></span>
      <span class="sprinkle sp2"></span>
      <span class="sprinkle sp3"></span>
      <span class="sprinkle sp4"></span>
      <span class="sprinkle sp5"></span>
      <div class="wrapper">
        <span class="pleats"></span>
      </div>
    </div>
    <span class="plate"></span>
  </div>
</body>
</html>
