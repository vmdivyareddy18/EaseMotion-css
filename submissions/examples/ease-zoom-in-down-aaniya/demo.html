<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-zoom-in-down Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin: 0; }
    h2 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; }
    .demo-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p  { margin: 0; font-size: 0.85rem; color: #94a3b8; }
    button {
      padding: 8px 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 10px;
    }

    /* Dropdown demo */
    .dropdown-wrap {
      position: relative;
      display: inline-block;
    }
    .dropdown-btn {
      padding: 10px 20px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 8px;
      min-width: 160px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }
    .dropdown-menu a {
      display: block;
      padding: 8px 12px;
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      border-radius: 6px;
    }
    .dropdown-menu a:hover { background: #334155; }
  </style>
</head>
<body>

  <h1>ease-zoom-in-down</h1>

  <!-- Click trigger -->
  <div class="demo-section">
    <h2>Click Trigger</h2>
    <div class="card" id="card1">
      <h3>Click to Animate</h3>
      <p>Zooms in while sliding down</p>
      <button onclick="zoomIn('card1')">Animate</button>
    </div>
  </div>

  <!-- Dropdown entrance demo -->
  <div class="demo-section">
    <h2>Dropdown Entrance (hover)</h2>
    <div class="dropdown-wrap ease-zoom-in-down-trigger">
      <button class="dropdown-btn">Hover Menu ▾</button>
      <div class="dropdown-menu ease-zoom-in-down-target">
        <a href="#">Profile</a>
        <a href="#">Settings</a>
        <a href="#">Logout</a>
      </div>
    </div>
  </div>

  <script>
    function zoomIn(id) {
      const card = document.getElementById(id);
      card.classList.remove('ease-zoom-in-down');
      void card.offsetWidth;
      card.classList.add('ease-zoom-in-down');
    }
  </script>

</body>
</html>
