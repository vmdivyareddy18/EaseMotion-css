<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Label Input — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      width: 100%;
      max-width: 360px;
      gap: 20px;
    }

    .full { width: 100%; }
  </style>
</head>
<body>

  <!-- Default -->
  <div class="demo-group">
    <h2>Default — click to focus</h2>
    <div class="float-field full">
      <input class="float-input" type="text" id="f1" placeholder="Name" />
      <label class="float-label" for="f1">Full Name</label>
    </div>
    <div class="float-field full">
      <input class="float-input" type="email" id="f2" placeholder="Email" />
      <label class="float-label" for="f2">Email Address</label>
    </div>
    <div class="float-field full">
      <input class="float-input" type="password" id="f3" placeholder="Password" />
      <label class="float-label" for="f3">Password</label>
    </div>
  </div>

  <!-- States -->
  <div class="demo-group">
    <h2>States</h2>
    <div class="float-field float-field-error full">
      <input class="float-input" type="text" id="f4" placeholder="Username" value="bad@input" />
      <label class="float-label" for="f4">Username</label>
      <p class="float-error-msg">Username already taken.</p>
    </div>
    <div class="float-field float-field-success full">
      <input class="float-input" type="text" id="f5" placeholder="Email" value="mill@example.com" />
      <label class="float-label" for="f5">Email</label>
    </div>
    <div class="float-field full">
      <input class="float-input" type="text" id="f6" placeholder="Disabled" disabled />
      <label class="float-label" for="f6">Disabled Field</label>
    </div>
  </div>

  <!-- Filled variant -->
  <div class="demo-group">
    <h2>Filled Variant</h2>
    <div class="float-field float-field-filled full">
      <input class="float-input" type="text" id="f7" placeholder="Name" />
      <label class="float-label" for="f7">Full Name</label>
    </div>
    <div class="float-field float-field-filled full">
      <input class="float-input" type="email" id="f8" placeholder="Email" />
      <label class="float-label" for="f8">Email Address</label>
    </div>
  </div>

</body>
</html>
