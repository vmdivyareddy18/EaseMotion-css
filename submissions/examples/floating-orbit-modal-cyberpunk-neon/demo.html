<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Modal - Cyberpunk Neon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <label for="modal-toggle" class="open-btn">
        Launch Cyber Modal
    </label>

    <input type="checkbox" id="modal-toggle">

    <div class="overlay">
        <div class="orbit-modal" tabindex="0">

            <label for="modal-toggle" class="close-btn">&times;</label>

            <div class="orbit-ring ring1"></div>
            <div class="orbit-ring ring2"></div>

            <h2>Cyberpunk Portal</h2>

            <p>
                Floating Orbit Modal built using only HTML & CSS.
                Designed for futuristic dashboards, landing pages,
                SaaS interfaces and cyberpunk themed websites.
            </p>

            <button>Continue</button>

        </div>
    </div>

</div>

</body>
</html>
