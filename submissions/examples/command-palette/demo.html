<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Glassmorphic Omnibox — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #030712;
      color: #f9fafb;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .interface-wrap {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .tech-badge {
      font-family: 'JetBrains Mono', monospace;
      color: #a855f7;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 1.5rem 0;
    }
    /* Launcher Button Aesthetics */
    .btn-launcher {
      display: inline-flex;
      align-items: center;
      gap: 1rem;
      background: #1e293b;
      border: 1px solid rgba(255, 255, 255, 0.05);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      color: #94a3b8;
      font-size: 0.95rem;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .btn-launcher:hover {
      border-color: rgba(168, 85, 247, 0.4);
      background: #24324a;
    }
    .btn-launcher kbd {
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="interface-wrap">
    <div class="tech-badge">// Pure CSS Structural Modal Trigger</div>
    <h1>Glassmorphic Omnibox Matrix</h1>
    
    <label for="command-palette-toggle" class="btn-launcher">
      <span>Search commands or configurations...</span>
      <kbd>⌘ K</kbd>
    </label>
  </div>

  <input type="checkbox" id="command-palette-toggle" class="ease-palette-trigger">

  <div class="ease-palette-overlay">
    <label for="command-palette-toggle" class="ease-palette-close-zone"></label>

    <div class="ease-palette-modal">
      <div class="ease-palette-search-box">
        <input type="text" class="ease-palette-input" placeholder="Search parameters, features, shortcuts..." autofocus>
      </div>
      
      <div class="ease-palette-results">
        <div class="ease-palette-item">
          <span>🔍 Search Component Core Documentation</span>
          <span class="ease-palette-kbd">ENTER</span>
        </div>
        <div class="ease-palette-item">
          <span>✨ Create New System Layout Matrix</span>
          <span class="ease-palette-kbd">⌘ N</span>
        </div>
        <div class="ease-palette-item">
          <span>⚡ Toggle Performance Paint Metrics</span>
          <span class="ease-palette-kbd">⌘ P</span>
        </div>
        <div class="ease-palette-item">
          <span>♿ Run Accessibility Compliance Audit</span>
          <span class="ease-palette-kbd">⌘ A</span>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
