<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS 3D Flip Modal</title>
    <!-- Import global EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component specific styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-app-bg">
    <div class="demo-container ease-fade-in">
        <header class="demo-header">
            <h1 class="demo-title">Pure CSS 3D Flip Modal</h1>
            <p class="demo-subtitle">Interactive Interface Aesthetic with zero JavaScript overhead.</p>
        </header>

        <main class="demo-content">
            <!-- Pure CSS Trigger Hack -->
            <input type="checkbox" id="modal-trigger" class="modal-trigger-input" aria-hidden="true" />
            
            <label for="modal-trigger" class="ease-btn ease-hover-lift modal-open-btn" tabindex="0" role="button" aria-haspopup="dialog" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                Open 3D Modal
            </label>

            <!-- Modal Overlay and Container -->
            <div class="modal-overlay">
                <label for="modal-trigger" class="modal-close-backdrop" aria-label="Close modal"></label>
                
                <!-- 3D Perspective Wrapper -->
                <div class="modal-perspective-wrapper">
                    <!-- Modal Card -->
                    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
                        <div class="modal-card-front">
                            <div class="modal-header">
                                <h2 id="modal-title">Interactive Interface</h2>
                                <label for="modal-trigger" class="modal-close-btn ease-hover-lift" tabindex="0" role="button" aria-label="Close modal" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                                    &times;
                                </label>
                            </div>
                            <div class="modal-body">
                                <p id="modal-desc">This beautiful modal uses CSS 3D transforms (`rotateX`) mapped to a hidden checkbox state.</p>
                                <div class="modal-stats">
                                    <div class="stat-box ease-hover-lift">
                                        <span class="stat-value">60</span>
                                        <span class="stat-label">FPS</span>
                                    </div>
                                    <div class="stat-box ease-hover-lift">
                                        <span class="stat-value">0</span>
                                        <span class="stat-label">kb JS</span>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <label for="modal-trigger" class="ease-btn secondary-btn ease-hover-lift" tabindex="0" role="button" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">Cancel</label>
                                <label for="modal-trigger" class="ease-btn primary-btn ease-hover-lift" tabindex="0" role="button" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">Confirm Action</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
