<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Status Cluster Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="avatar-page" aria-labelledby="avatar-title">
    <section class="avatar-card">
      <p class="eyebrow">Team presence</p>
      <h1 id="avatar-title">Avatar Status Cluster</h1>
      <div class="avatar-cluster" aria-label="Team presence examples">
        <span class="avatar avatar-one" title="Asha online">A</span>
        <span class="avatar avatar-two" title="Dev busy">D</span>
        <span class="avatar avatar-three" title="Mira online">M</span>
        <span class="avatar avatar-four" title="Rohit away">R</span>
        <span class="avatar-count">+8</span>
      </div>
      <p class="caption">Hover the cluster to spread members and reveal animated presence states.</p>
    </section>
  </main>
</body>
</html>
