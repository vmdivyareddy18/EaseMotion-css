<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-yellow-fade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Yellow Fade</h1>
    <div class="animation-wrapper">
      <div class="glow"></div>
    </div>
    <div class="controls">
      <label>
        Fade From
        <input type="color" class="js-color" value="#ffe082" data-var="--fade-from" />
      </label>
      <label>
        Fade To
        <input type="color" class="js-color" value="#ffd54f" data-var="--fade-to" />
      </label>
      <label>
        Fade Duration
        <input type="range" class="js-range" min="0.5" max="5" step="0.1" value="2" data-var="--fade-duration" />
        <span class="js-range-value">2s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
