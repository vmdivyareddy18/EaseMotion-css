<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics Dashboard Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="dashboard">
        <h1>Analytics Overview</h1>

        <div class="stats-grid">
            <article class="stat-card">
                <div class="stat-icon">📈</div>
                <h3>Revenue</h3>
                <p class="stat-value">$24,500</p>
                <span class="positive">+12%</span>
            </article>

            <article class="stat-card">
                <div class="stat-icon">👥</div>
                <h3>Users</h3>
                <p class="stat-value">18,240</p>
                <span class="positive">+8%</span>
            </article>

            <article class="stat-card">
                <div class="stat-icon">🛒</div>
                <h3>Orders</h3>
                <p class="stat-value">1,324</p>
                <span class="positive">+15%</span>
            </article>

            <article class="stat-card">
                <div class="stat-icon">📉</div>
                <h3>Bounce Rate</h3>
                <p class="stat-value">21%</p>
                <span class="negative">-4%</span>
            </article>
        </div>
    </section>
</body>
</html>
