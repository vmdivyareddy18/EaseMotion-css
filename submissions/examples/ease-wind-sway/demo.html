<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-wind-sway – EaseMotion Demo</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-8 ease-fade-in">
      Wind Sway Effect
    </h1>

    <!-- A "field" of elements that sway in a wave -->
    <div class="wind-field">
      <!-- Each item gets a staggered animation delay via custom property -->
      <div class="wind-item" style="--delay: 0s;">🌾</div>
      <div class="wind-item" style="--delay: 0.1s;">🌾</div>
      <div class="wind-item" style="--delay: 0.2s;">🌾</div>
      <div class="wind-item" style="--delay: 0.3s;">🌾</div>
      <div class="wind-item" style="--delay: 0.4s;">🌾</div>
      <div class="wind-item" style="--delay: 0.5s;">🌾</div>
      <div class="wind-item" style="--delay: 0.6s;">🌾</div>
      <div class="wind-item" style="--delay: 0.7s;">🌾</div>
      <div class="wind-item" style="--delay: 0.8s;">🌾</div>
      <div class="wind-item" style="--delay: 0.9s;">🌾</div>
      <div class="wind-item" style="--delay: 1.0s;">🌾</div>
      <div class="wind-item" style="--delay: 1.1s;">🌾</div>
    </div>

    <p class="ease-text-sm ease-text-gray-500 ease-mt-6 ease-fade-in ease-delay-500">
      A wave of wind passing through the grass 🌿
    </p>
  </div>

</body>
</html>
