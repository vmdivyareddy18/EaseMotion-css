<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="3D Tilt Cookie Banner — EaseMotion CSS component demo"
    />
    <title>3D Tilt Cookie Banner | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <!--
      3D Tilt Cookie Banner
      Pure HTML + CSS — no JavaScript.
      Hover the banner to see the 3D tilt effect.
    -->
    <aside
      class="cookie-banner"
      role="region"
      aria-label="Cookie consent"
      aria-describedby="cookie-desc"
    >
      <div class="cookie-banner__card">

        <!-- Header: icon + title + description -->
        <div class="cookie-banner__header">
          <span class="cookie-banner__icon" aria-hidden="true">🍪</span>
          <div class="cookie-banner__heading-group">
            <h2 class="cookie-banner__title">We value your privacy</h2>
            <p class="cookie-banner__desc" id="cookie-desc">
              We use cookies to personalise content, analyse site performance,
              and improve your experience. You can choose which cookies to allow.
            </p>
          </div>
        </div>

        <!-- Actions -->
        <div class="cookie-banner__actions">

          <!-- Primary: accept -->
          <button
            type="button"
            class="btn-accept"
            aria-label="Accept all cookies"
          >
            Accept All
          </button>

          <!-- Secondary: decline -->
          <button
            type="button"
            class="btn-decline"
            aria-label="Decline non-essential cookies"
          >
            Decline
          </button>

          <!-- Text link: manage preferences -->
          <a
            href="#"
            class="link-manage"
            aria-label="Manage cookie preferences"
          >
            Manage Preferences ›
          </a>

        </div>

      </div>
    </aside>

  </body>
</html>
