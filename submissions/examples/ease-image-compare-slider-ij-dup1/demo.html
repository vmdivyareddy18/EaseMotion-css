<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Compare Slider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Image Compare Slider</h1>
  <p class="subtitle">Drag the handle to compare before / after images</p>

  <div class="compare-container">
    <div class="compare-wrapper" id="compare">
      <div class="compare__original">
        <img src="https://picsum.photos/seed/mountain/800/500" alt="Original">
      </div>
      <div class="compare__modified" id="modified">
        <img src="https://picsum.photos/seed/mountain-edited/800/500?grayscale" alt="Modified">
      </div>
      <div class="compare__handle" id="handle">
        <div class="handle__line"></div>
        <div class="handle__circle">
          <i class="handle__arrow handle__arrow--left"></i>
          <i class="handle__arrow handle__arrow--right"></i>
        </div>
      </div>
    </div>
  </div>

  <script>
    const wrapper = document.getElementById('compare');
    const modified = document.getElementById('modified');
    const handle = document.getElementById('handle');
    let isDragging = false;

    function update(pos) {
      const rect = wrapper.getBoundingClientRect();
      let x = Math.max(0, Math.min(pos - rect.left, rect.width));
      const pct = (x / rect.width) * 100;
      modified.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
      handle.style.left = pct + '%';
    }

    wrapper.addEventListener('mousedown', (e) => { isDragging = true; update(e.clientX); });
    document.addEventListener('mousemove', (e) => { if (isDragging) update(e.clientX); });
    document.addEventListener('mouseup', () => { isDragging = false; });

    wrapper.addEventListener('touchstart', (e) => { isDragging = true; update(e.touches[0].clientX); });
    document.addEventListener('touchmove', (e) => { if (isDragging) update(e.touches[0].clientX); });
    document.addEventListener('touchend', () => { isDragging = false; });

    update(wrapper.getBoundingClientRect().left + wrapper.offsetWidth / 2);
  </script>
</body>
</html>
