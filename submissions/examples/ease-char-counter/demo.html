<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Character Counter</h1>
        <p class="subtitle">Counts down with color change near limit</p>

        <!-- CHARACTER COUNTER COMPONENT -->
        <div class="counter-container">
            <div class="counter-wrapper" id="counterWrapper">
                <div class="counter-header">
                    <label for="textInput" class="counter-label">Enter your message</label>
                    <span class="counter-display" id="counterDisplay">
                        <span class="counter-current" id="currentCount">0</span>
                        <span class="counter-separator">/</span>
                        <span class="counter-limit" id="limitDisplay">200</span>
                    </span>
                </div>
                <div class="counter-input-wrapper">
                    <textarea 
                        id="textInput" 
                        class="counter-input" 
                        maxlength="200" 
                        placeholder="Type your message here..."
                        rows="4"
                    ></textarea>
                    <div class="counter-progress" id="progressBar">
                        <div class="counter-progress-fill" id="progressFill"></div>
                    </div>
                </div>
                <div class="counter-footer">
                    <span class="counter-hint" id="counterHint">200 characters remaining</span>
                    <span class="counter-status" id="counterStatus">✅ Good</span>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="setLimitBtn">Set Limit</button>
            <button class="demo-btn" id="resetBtn">Reset</button>
            <button class="demo-btn" id="fillBtn">Fill Half</button>
            <button class="demo-btn" id="fillMaxBtn">Fill Max</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">Status:</span>
            <span class="status-value" id="statusValue">Ready</span>
            <span class="status-label">Words:</span>
            <span class="status-value" id="wordCount">0</span>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const textarea = document.getElementById('textInput');
            const currentCount = document.getElementById('currentCount');
            const limitDisplay = document.getElementById('limitDisplay');
            const progressFill = document.getElementById('progressFill');
            const counterHint = document.getElementById('counterHint');
            const counterStatus = document.getElementById('counterStatus');
            const statusValue = document.getElementById('statusValue');
            const wordCount = document.getElementById('wordCount');
            const setLimitBtn = document.getElementById('setLimitBtn');
            const resetBtn = document.getElementById('resetBtn');
            const fillBtn = document.getElementById('fillBtn');
            const fillMaxBtn = document.getElementById('fillMaxBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                limit: 200,
                warningThreshold: 0.8, // 80% of limit
                dangerThreshold: 0.95, // 95% of limit
                colors: {
                    good: '#34c759',
                    warning: '#f59e0b',
                    danger: '#ff3b30',
                    exceeded: '#ff3b30'
                },
                messages: {
                    good: '✅ Good',
                    warning: '⚠️ Getting close',
                    danger: '🔴 Almost there!',
                    exceeded: '❌ Limit exceeded!'
                },
                onUpdate: function(count, limit) {
                    console.log(`📝 ${count}/${limit} characters`);
                },
                onLimitReached: function() {
                    console.log('🚫 Character limit reached!');
                },
                onLimitExceeded: function() {
                    console.log('❌ Character limit exceeded!');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentLimit = CONFIG.limit;

            // ============================================
            // HELPERS
            // ============================================
            function getCharacterCount(text) {
                return text.length;
            }

            function getWordCount(text) {
                const trimmed = text.trim();
                if (trimmed === '') return 0;
                return trimmed.split(/\s+/).length;
            }

            function getRemaining(count, limit) {
                return Math.max(0, limit - count);
            }

            function getPercentage(count, limit) {
                return Math.min((count / limit) * 100, 100);
            }

            // ============================================
            // CORE UPDATE FUNCTION
            // ============================================
            function updateCounter() {
                const text = textarea.value;
                const count = getCharacterCount(text);
                const remaining = getRemaining(count, currentLimit);
                const percentage = getPercentage(count, currentLimit);
                const words = getWordCount(text);
                const isExceeded = count > currentLimit;

                // Update current count
                currentCount.textContent = count;
                limitDisplay.textContent = currentLimit;

                // Update progress bar
                const clampedPercentage = Math.min(percentage, 100);
                progressFill.style.width = clampedPercentage + '%';

                // Update color based on threshold
                let color, status, hint;

                if (isExceeded) {
                    color = CONFIG.colors.exceeded;
                    status = CONFIG.messages.exceeded;
                    hint = `⚠️ ${count - currentLimit} characters over limit`;
                    CONFIG.onLimitExceeded();
                } else if (percentage >= CONFIG.dangerThreshold * 100) {
                    color = CONFIG.colors.danger;
                    status = CONFIG.messages.danger;
                    hint = `⚠️ ${remaining} characters remaining`;
                    if (remaining === 0) {
                        CONFIG.onLimitReached();
                    }
                } else if (percentage >= CONFIG.warningThreshold * 100) {
                    color = CONFIG.colors.warning;
                    status = CONFIG.messages.warning;
                    hint = `⚠️ ${remaining} characters remaining`;
                } else {
                    color = CONFIG.colors.good;
                    status = CONFIG.messages.good;
                    hint = `${remaining} characters remaining`;
                }

                // Update UI
                currentCount.style.color = color;
                progressFill.style.background = color;
                counterStatus.textContent = status;
                counterStatus.style.color = color;
                counterHint.textContent = hint;

                // Update word count and status
                wordCount.textContent = words;
                statusValue.textContent = isExceeded ? '⚠️ Exceeded' : '✅ Good';

                // Update counter display class
                const display = document.querySelector('.counter-display');
                display.className = 'counter-display';
                if (isExceeded) {
                    display.classList.add('exceeded');
                } else if (percentage >= CONFIG.dangerThreshold * 100) {
                    display.classList.add('danger');
                } else if (percentage >= CONFIG.warningThreshold * 100) {
                    display.classList.add('warning');
                }

                // Update wrapper class
                const wrapper = document.getElementById('counterWrapper');
                wrapper.className = 'counter-wrapper';
                if (isExceeded) {
                    wrapper.classList.add('exceeded');
                } else if (percentage >= CONFIG.dangerThreshold * 100) {
                    wrapper.classList.add('danger');
                } else if (percentage >= CONFIG.warningThreshold * 100) {
                    wrapper.classList.add('warning');
                }

                // Trigger callback
                CONFIG.onUpdate(count, currentLimit);

                // Update textarea border color
                textarea.style.borderColor = isExceeded ? CONFIG.colors.exceeded : 
                                           percentage >= CONFIG.dangerThreshold * 100 ? CONFIG.colors.danger :
                                           percentage >= CONFIG.warningThreshold * 100 ? CONFIG.colors.warning :
                                           '#d1d5db';
            }

            // ============================================
            // SET LIMIT
            // ============================================
            function setLimit(newLimit) {
                if (newLimit < 1) {
                    alert('Limit must be at least 1 character');
                    return;
                }
                currentLimit = newLimit;
                textarea.maxLength = newLimit;
                limitDisplay.textContent = newLimit;
                updateCounter();
                showFeedback(`📏 Limit set to ${newLimit} characters`, 'info');
            }

            // ============================================
            // FEEDBACK
            // ============================================
            function showFeedback(message, type) {
                const feedback = document.getElementById('actionFeedback') || (() => {
                    const el = document.createElement('div');
                    el.id = 'actionFeedback';
                    el.className = 'action-feedback';
                    document.querySelector('.demo-wrapper').appendChild(el);
                    return el;
                })();
                feedback.textContent = message;
                feedback.className = 'action-feedback ' + type;
                feedback.style.display = 'block';
                clearTimeout(feedback._hideTimeout);
                feedback._hideTimeout = setTimeout(() => {
                    feedback.style.display = 'none';
                    feedback.className = 'action-feedback';
                }, 3000);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Real-time input
            textarea.addEventListener('input', updateCounter);

            // Focus highlight
            textarea.addEventListener('focus', function() {
                this.parentElement.classList.add('focused');
            });

            textarea.addEventListener('blur', function() {
                this.parentElement.classList.remove('focused');
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            setLimitBtn.addEventListener('click', function() {
                const newLimit = prompt('Enter new character limit:', currentLimit);
                if (newLimit !== null) {
                    const num = parseInt(newLimit);
                    if (!isNaN(num) && num > 0) {
                        setLimit(num);
                    } else {
                        alert('Please enter a valid number greater than 0');
                    }
                }
            });

            resetBtn.addEventListener('click', function() {
                textarea.value = '';
                updateCounter();
                showFeedback('🔄 Reset!', 'info');
            });

            fillBtn.addEventListener('click', function() {
                const half = Math.floor(currentLimit / 2);
                textarea.value = 'A'.repeat(half);
                updateCounter();
                showFeedback(`📝 Filled with ${half} characters`, 'info');
            });

            fillMaxBtn.addEventListener('click', function() {
                textarea.value = 'A'.repeat(currentLimit);
                updateCounter();
                showFeedback(`📝 Filled to maximum (${currentLimit} characters)`, 'info');
            });

            // ============================================
            // KEYBOARD ACCESSIBILITY
            // ============================================
            textarea.addEventListener('keydown', function(e) {
                // Ctrl+Enter to submit (for forms)
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    showFeedback('📨 Message submitted!', 'success');
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.CharacterCounter = {
                getCount: () => getCharacterCount(textarea.value),
                getLimit: () => currentLimit,
                getRemaining: () => getRemaining(getCharacterCount(textarea.value), currentLimit),
                getPercentage: () => getPercentage(getCharacterCount(textarea.value), currentLimit),
                getWordCount: () => getWordCount(textarea.value),
                setLimit: setLimit,
                setText: (text) => {
                    textarea.value = text;
                    updateCounter();
                },
                reset: () => {
                    textarea.value = '';
                    updateCounter();
                },
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    updateCounter();
                },
                getStatus: () => {
                    const count = getCharacterCount(textarea.value);
                    const percentage = getPercentage(count, currentLimit);
                    if (count > currentLimit) return 'exceeded';
                    if (percentage >= CONFIG.dangerThreshold * 100) return 'danger';
                    if (percentage >= CONFIG.warningThreshold * 100) return 'warning';
                    return 'good';
                },
                // Helper to enforce limit (truncate)
                truncate: () => {
                    if (textarea.value.length > currentLimit) {
                        textarea.value = textarea.value.substring(0, currentLimit);
                        updateCounter();
                        showFeedback(`✂️ Truncated to ${currentLimit} characters`, 'warning');
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateCounter();
            console.log('✅ Character Counter initialized!');
            console.log('📖 API: window.CharacterCounter');
            console.log('📖 Usage:');
            console.log('  - Type in the textarea to see the counter update');
            console.log('  - Counter changes color near the limit');
            console.log('  - Use demo controls to test different scenarios');

        })();
    </script>
</body>
</html>
