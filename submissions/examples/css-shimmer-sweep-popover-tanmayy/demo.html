<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Shimmer Sweep Popover - EaseMotion CSS</title>
  <!-- Import EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Component Specific Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="saas-bg">
  
  <div class="demo-container">
    <div class="popover-wrapper">
      
      <!-- Accessible Popover Trigger via hidden checkbox for cross-browser pure CSS support -->
      <input type="checkbox" id="popover-toggle" class="popover-toggle" hidden aria-hidden="true">
      
      <!-- Button to toggle popover -->
      <label for="popover-toggle" class="ease-squish-button trigger-btn ease-hover-lift-shadow" role="button" tabindex="0">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
        Preferences
      </label>

      <!-- Background overlay to close popover when clicking outside -->
      <label for="popover-toggle" class="popover-backdrop"></label>

      <!-- Popover Content -->
      <div class="popover-content ease-glass-card">
        <!-- The shimmer element that sweeps across during transition -->
        <div class="shimmer-sweep-overlay"></div>
        
        <div class="popover-header">
          <h3 class="ease-text-lg">Settings</h3>
          <span class="badge ease-bg-primary-alpha">Pro</span>
        </div>
        
        <ul class="popover-menu">
          <li class="menu-item ease-hover-shrink">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            Account Details
          </li>
          <li class="menu-item ease-hover-shrink">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Security
          </li>
          <li class="menu-item ease-hover-shrink">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            Notifications
          </li>
        </ul>
        
        <div class="popover-footer">
          <label for="popover-toggle" class="close-btn ease-squish-button" role="button" tabindex="0">Done</label>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
