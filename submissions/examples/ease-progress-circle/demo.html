<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Progress Circle Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Ease Progress Circle</h1>
    <p>
        A pure CSS circular progress indicator using SVG and CSS variables.
    </p>
</header>

<main class="container">

    <!-- 75% -->

    <div class="progress-card">

        <div
            class="ease-progress-circle"
            style="
                --ease-progress-value:75;
                --ease-progress-color:#3b82f6;
                --ease-progress-size:180px;
                --ease-progress-duration:2s;
            ">

            <svg viewBox="0 0 120 120">

                <circle
                    class="track"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

                <circle
                    class="progress"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

            </svg>

            <span class="label">75%</span>

        </div>

        <h3>Project Completion</h3>

    </div>

    <!-- 50% -->

    <div class="progress-card">

        <div
            class="ease-progress-circle"
            style="
                --ease-progress-value:50;
                --ease-progress-color:#10b981;
                --ease-progress-size:180px;
                --ease-progress-duration:2.5s;
            ">

            <svg viewBox="0 0 120 120">

                <circle
                    class="track"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

                <circle
                    class="progress"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

            </svg>

            <span class="label">50%</span>

        </div>

        <h3>CPU Usage</h3>

    </div>

    <!-- 92% -->

    <div class="progress-card">

        <div
            class="ease-progress-circle"
            style="
                --ease-progress-value:92;
                --ease-progress-color:#f97316;
                --ease-progress-size:180px;
                --ease-progress-duration:3s;
            ">

            <svg viewBox="0 0 120 120">

                <circle
                    class="track"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

                <circle
                    class="progress"
                    cx="60"
                    cy="60"
                    r="52">
                </circle>

            </svg>

            <span class="label">92%</span>

        </div>

        <h3>Storage</h3>

    </div>

</main>

</body>
</html>
