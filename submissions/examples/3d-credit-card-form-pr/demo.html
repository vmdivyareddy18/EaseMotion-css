<!-- submissions/examples/3d-credit-card-form-pr/demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only 3D Credit Card Form Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Combined Contextual Parent Wrapper -->
  <div class="checkout-container cvv-input-wrapper">
    
    <!-- 3D Perspective Graphic Deck -->
    <div class="card-perspective-stage">
      <div class="credit-card-mesh">
        
        <!-- Front View Panel Plane -->
        <div class="card-face card-front">
          <div class="chip-graphic"></div>
          <div class="card-number-display">•••• •••• •••• 4026</div>
          <div class="meta-row">
            <div>
              <div style="font-size:0.6rem; color: rgba(255,255,255,0.6);">Card Holder</div>
              <div style="font-weight:600;">ADITYA YADAV</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:0.6rem; color: rgba(255,255,255,0.6);">Expires</div>
              <div style="font-weight:600;">09/29</div>
            </div>
          </div>
        </div>

        <!-- Back View Panel Plane -->
        <div class="card-face card-back">
          <div class="magnetic-stripe"></div>
          <div class="signature-cvv-panel">
            <span class="cvv-display-tag">987</span>
          </div>
          <div style="padding: 0 1.5rem; font-size: 0.55rem; color: rgba(255,255,255,0.5); line-height:1.3;">
            This simulated pass layout functions via pure CSS selector parameters. Authorized signature required.
          </div>
        </div>

      </div>
    </div>

    <!-- Active Input Field System -->
    <form class="checkout-form" onsubmit="event.preventDefault();">
      <div class="input-block">
        <label for="card-number">Card Number</label>
        <input type="text" id="card-number" placeholder="4000 1234 5678 4026" autocomplete="off">
      </div>
      <div class="input-block">
        <label for="card-name">Cardholder Name</label>
        <input type="text" id="card-name" placeholder="Aditya Yadav" autocomplete="off">
      </div>
      <div class="split-row">
        <div class="input-block">
          <label for="card-expiry">Expiration</label>
          <input type="text" id="card-expiry" placeholder="MM/YY" autocomplete="off">
        </div>
        <!-- Focusing this element triggers the parent state change up to rotate the card matrix -->
        <div class="input-block">
          <label for="card-cvv">CVV Code</label>
          <input type="text" id="card-cvv" placeholder="987" autocomplete="off">
        </div>
      </div>
    </form>

  </div>

</body>
</html>
