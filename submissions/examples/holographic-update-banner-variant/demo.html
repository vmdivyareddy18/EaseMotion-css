<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Update Banner | EaseMotion CSS</title>
  
  <!-- Tailwind Play CDN for isolated presentation layout framing only -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Component custom style sheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans overflow-x-hidden">

  <div class="text-center space-y-2 mb-12">
    <span class="text-xs font-mono uppercase tracking-widest text-cyan-400 font-semibold px-2.5 py-1 bg-cyan-500/10 rounded-full">GSSoC-26 / Beginner Track</span>
    <h1 class="text-3xl font-extrabold tracking-tight">Holographic Update Banner</h1>
    <p class="text-sm text-slate-400">Pure CSS multi-tone luminous flare notification pipeline</p>
  </div>

  <!-- Component Interactive Frame -->
  <div class="ease-holo-banner" role="alert" aria-live="polite">
    <!-- Iridescent background effect layer -->
    <div class="ease-holo-shimmer"></div>
    
    <!-- Banner Content Matrix -->
    <div class="ease-holo-content">
      <div class="ease-holo-badge">
        <span class="ease-holo-pulse-dot"></span>
        v2.4.0 Deployed
      </div>
      
      <p class="ease-holo-text">
        <strong class="text-white font-semibold">Engine Update:</strong> Core acceleration subroutines have been upgraded to support ultra-low latency hardware threads.
      </p>
      
      <a href="#changelog" class="ease-holo-action-btn">
        View Changelog
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </a>
    </div>
  </div>

</body>
</html>
