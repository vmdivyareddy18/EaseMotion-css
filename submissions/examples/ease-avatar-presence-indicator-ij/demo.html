<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Presence Indicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Avatar Presence Indicator</h1>
  <div class="avatars">
    <div class="avatar-card">
      <div class="avatar">
        <div class="avatar-img" style="background-color: #6C63FF;"></div>
        <div class="status-dot online"></div>
      </div>
      <span class="status-label">Online</span>
    </div>
    <div class="avatar-card">
      <div class="avatar">
        <div class="avatar-img" style="background-color: #FF6584;"></div>
        <div class="status-dot away"></div>
      </div>
      <span class="status-label">Away</span>
    </div>
    <div class="avatar-card">
      <div class="avatar">
        <div class="avatar-img" style="background-color: #43E97B;"></div>
        <div class="status-dot busy"></div>
      </div>
      <span class="status-label">Busy</span>
    </div>
    <div class="avatar-card">
      <div class="avatar">
        <div class="avatar-img" style="background-color: #A0A0A0;"></div>
        <div class="status-dot offline"></div>
      </div>
      <span class="status-label">Offline</span>
    </div>
  </div>
</body>
</html>
