<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Basilisk Stare Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 3rem;
      min-height: 100vh;
      background-color: #111827;
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }
    
    .demo-card {
      width: 250px;
      padding: 2rem;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      cursor: pointer;
    }
    
    .demo-emoji {
      font-size: 4rem;
      margin-bottom: 1rem;
    }
    
    .instruction {
      color: #9ca3af;
      font-size: 1.125rem;
    }
  </style>
</head>
<body>
  
  <p class="instruction">Hover over the card to look the Basilisk in the eyes...</p>

  <!-- We use the hover variant here to make the demo interactive -->
  <div class="ease-basilisk-hover-ps demo-card">
    <div class="demo-emoji">🦁</div>
    <h3>Brave Knight</h3>
    <p>Hover me to turn to stone.</p>
  </div>

</body>
</html>
