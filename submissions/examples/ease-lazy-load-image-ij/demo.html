<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Lazy Load Image</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-lazy-container" id="lazy-wrapper">
        <!-- Using a high-res Unsplash image to ensure it takes a moment to load -->
        <img 
            src="https://images.unsplash.com/photo-1682687220742-aba13b6e50ba?q=80&w=2000&auto=format&fit=crop" 
            alt="Scenic view" 
            class="ease-lazy-image" 
            id="lazy-img"
            loading="lazy"
        >
    </div>

    <script>
        const img = document.getElementById('lazy-img');
        const wrapper = document.getElementById('lazy-wrapper');

        // Check if image is already cached/loaded
        if (img.complete) {
            wrapper.classList.add('loaded');
        } else {
            // Wait for image to load
            img.addEventListener('load', () => {
                wrapper.classList.add('loaded');
            });
            
            // Handle error state gracefully
            img.addEventListener('error', () => {
                wrapper.style.background = '#fef2f2'; // light red
            });
        }
    </script>
</body>
</html>
