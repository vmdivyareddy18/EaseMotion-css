<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worldwide Threat Prediction Network</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="pred-dashboard">
    <header class="header">
      <span class="badge">Prediction Network</span>
      <h1>Worldwide Threat Prediction Network</h1>
      <p class="subtitle">AI-driven security incident forecasting and threat probability telemetry.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-chart">
        <h3>📈 Threat Probability Forecast</h3>
        <div class="svg-container">
          <svg viewBox="0 0 500 150" class="svg-chart">
            <path d="M 0 130 Q 120 40 250 110 T 500 20" fill="none" stroke="var(--primary)" stroke-width="3"></path>
          </svg>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-panel">
          <h3>📊 Platform Indicators</h3>
          <ul class="stats-list">
            <li>Avg Forecast Horizon: <strong>9.4 Hours</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
