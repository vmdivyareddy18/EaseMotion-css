<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Video - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-aspect-video</h1>
    <p class="subtitle">16:9 aspect ratio utility for video embeds and image containers</p>

    <div class="video-demo">
      <div class="video-frame ease-aspect-video">
        <button class="play-btn">&#9654;</button>
        <div class="label">16:9 Video Player</div>
      </div>
    </div>

    <div class="demo-grid">
      <div class="thumb ease-aspect-video">Thumbnail 1</div>
      <div class="thumb ease-aspect-video">Thumbnail 2</div>
    </div>

    <div class="code-block">
      .ease-aspect-video {<br>
      &nbsp;&nbsp;aspect-ratio: 16 / 9;<br>
      }
    </div>
  </div>
</body>
</html>
