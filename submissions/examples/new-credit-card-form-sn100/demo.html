<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Interactive Glassmorphic 3D Flip Credit Card</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-flip-card">
  <div class="card-inner">
    <div class="card-front">
      <div class="chip"></div>
      <div class="number">•••• •••• •••• 1042</div>
      <div class="holder">SONU SHARMA</div>
    </div>
    <div class="card-back">
      <div class="strip"></div>
      <div class="cvv">CVV 822</div>
    </div>
  </div>
</div>
</body>
</html>
