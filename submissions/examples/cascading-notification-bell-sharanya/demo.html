<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Notification Bell</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="notification-demo">

    <div class="demo-header ease-fade-in">
        <h1>Cascading Notification Bell</h1>
        <p>
            A reusable notification bell with cascading notification effects
            built using pure HTML and CSS.
        </p>
    </div>

    <div class="bell-container ease-scale-in">

        <span class="pulse pulse1"></span>
        <span class="pulse pulse2"></span>
        <span class="pulse pulse3"></span>

        <div class="notification-bell">

            <div class="bell-top"></div>
            <div class="bell-body"></div>
            <div class="bell-clapper"></div>
            <div class="bell-base"></div>

        </div>

    </div>

</section>

</body>
</html>
