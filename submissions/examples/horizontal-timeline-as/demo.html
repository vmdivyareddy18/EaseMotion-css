<!DOCTYPE html>
<html lang="en">
<head>

  <title>Horizontal Timeline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <ol class="h-timeline">
    <li class="is-done">
      <time>2021</time>
      <h3>Founded</h3>
      <p>Started in a garage.</p>
    </li>
    <li class="is-done">
      <time>2022</time>
      <h3>Seed round</h3>
      <p>Raised first funding.</p>
    </li>
    <li class="is-done">
      <time>2023</time>
      <h3>Version 1</h3>
      <p>Public launch day.</p>
    </li>
    <li>
      <time>2024</time>
      <h3>Series A</h3>
      <p>Scaled the team.</p>
    </li>
    <li>
      <time>2025</time>
      <h3>Global</h3>
      <p>Opened new regions.</p>
    </li>
  </ol>
</body>
</html>
