<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> EaseMotion-css </title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <section class="demo-section">
  <h2 class="demo-section-title">ease-label-edit-inline</h2>

  <div class="ease-label-edit-inline">
    <input type="checkbox" id="edit-inline-1" class="ease-label-edit-toggle" />
    <label for="edit-inline-1" class="ease-label-edit">
      <span class="ease-label-text">Project name</span>
      <span class="ease-label-value">EaseMotion CSS</span>
      <input type="text" value="EaseMotion CSS" class="ease-label-input" />
      <span class="ease-label-hint">Click to edit</span>
    </label>
  </div>
</section>
</body>
</html>
