<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Draw Border Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Creative Portfolio

</span>

<h1>

Draw-Border Modal

</h1>

<p>

Elegant modal interaction
crafted for portfolio websites,
designer showcases and
creative presentations.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

View Project

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="icon">

🎨

</div>

<h2>

Creative Showcase

</h2>

<p>

A modern draw-border modal
built with pure CSS and
designed for personal
branding experiences.

</p>

<button>

Explore Work

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
