<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Box Plot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <figure class="boxplot">
    <figcaption class="bp-title">Response time by region</figcaption>
    <svg viewBox="0 0 270 180" role="img" aria-label="Box and whisker plot across four regions">
      <g class="bp-grid">
        <line x1="30" y1="18" x2="262" y2="18" />
        <line x1="30" y1="53" x2="262" y2="53" />
        <line x1="30" y1="88" x2="262" y2="88" />
        <line x1="30" y1="123" x2="262" y2="123" />
        <line x1="30" y1="158" x2="262" y2="158" />
      </g>
      <g class="bp-axis">
        <text x="24" y="21">100</text>
        <text x="24" y="91">50</text>
        <text x="24" y="161">0</text>
      </g>

      <g class="box" transform="translate(50 0)">
        <line class="whisk" x1="0" y1="46" x2="0" y2="130" />
        <line class="cap" x1="-9" y1="46" x2="9" y2="46" />
        <line class="cap" x1="-9" y1="130" x2="9" y2="130" />
        <rect class="iqr" x="-15" y="74" width="30" height="35" rx="3" />
        <line class="median" x1="-15" y1="95" x2="15" y2="95" />
        <text class="lbl" x="0" y="172">EU</text>
      </g>

      <g class="box" transform="translate(110 0)">
        <line class="whisk" x1="0" y1="39" x2="0" y2="116" />
        <line class="cap" x1="-9" y1="39" x2="9" y2="39" />
        <line class="cap" x1="-9" y1="116" x2="9" y2="116" />
        <rect class="iqr" x="-15" y="67" width="30" height="28" rx="3" />
        <line class="median" x1="-15" y1="81" x2="15" y2="81" />
        <text class="lbl" x="0" y="172">US</text>
      </g>

      <g class="box" transform="translate(170 0)">
        <line class="whisk" x1="0" y1="60" x2="0" y2="137" />
        <line class="cap" x1="-9" y1="60" x2="9" y2="60" />
        <line class="cap" x1="-9" y1="137" x2="9" y2="137" />
        <rect class="iqr" x="-15" y="81" width="30" height="35" rx="3" />
        <line class="median" x1="-15" y1="99.2" x2="15" y2="99.2" />
        <text class="lbl" x="0" y="172">APAC</text>
      </g>

      <g class="box" transform="translate(230 0)">
        <line class="whisk" x1="0" y1="32" x2="0" y2="99.2" />
        <line class="cap" x1="-9" y1="32" x2="9" y2="32" />
        <line class="cap" x1="-9" y1="99.2" x2="9" y2="99.2" />
        <rect class="iqr" x="-15" y="57.2" width="30" height="23.8" rx="3" />
        <line class="median" x1="-15" y1="71.2" x2="15" y2="71.2" />
        <text class="lbl" x="0" y="172">LATAM</text>
      </g>
    </svg>
  </figure>
</body>
</html>
