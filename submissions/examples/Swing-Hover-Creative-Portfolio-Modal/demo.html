<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Portfolio Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="portfolio-toggle">

<label for="portfolio-toggle" class="open-btn">
    View Portfolio
</label>

<div class="overlay">

    <div class="modal">

        <label for="portfolio-toggle" class="close-btn">&times;</label>

        <div class="hero-image"></div>

        <h2>Creative Portfolio</h2>

        <p>
            Explore featured projects with a modern swing-hover animation
            crafted entirely using HTML and CSS.
        </p>

        <div class="portfolio-grid">

            <div class="project-card">
                <h4>Brand Identity</h4>
            </div>

            <div class="project-card">
                <h4>UI Design</h4>
            </div>

            <div class="project-card">
                <h4>Illustration</h4>
            </div>

        </div>

        <button>Explore Projects</button>

    </div>

</div>

</body>
</html>
