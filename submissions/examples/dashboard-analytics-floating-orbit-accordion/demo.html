<!DOCTYPE html>

<title>Dashboard Analytics Floating Orbit Accordion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<details open>

<summary>Traffic Overview</summary>

<p>
Visitors: <strong>48,320</strong><br>
Growth: <strong>+18%</strong>
</p>

</details>

<details>

<summary>Revenue Analytics</summary>

<p>
Monthly Revenue: <strong>$82,450</strong><br>
Conversion Rate: <strong>7.9%</strong>
</p>

</details>

<details>

<summary>Customer Insights</summary>

<p>
New Users: <strong>1,248</strong><br>
Retention Rate: <strong>93%</strong>
</p>

</details>

</div>

</section>

</body>
</html>
