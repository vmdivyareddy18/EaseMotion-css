<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Text Align Last Demo</title>
</head>
<body>
  <h1>Text Align Last Utility</h1>
  
  <div class="justify-container">
    <p class="text-last-center">
      This is a paragraph where the last line will be centered despite the 
      rest of the text being fully justified. This is useful for balanced 
      typography in long-form content.
    </p>
  </div>
</body>
</html>
