<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zebra-stripe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zebra Stripe</h1>
    <div class="animation-wrapper">
      <div class="zebra-table">
        <div class="zebra-row"><span class="row-label">Row 1</span></div>
        <div class="zebra-row"><span class="row-label">Row 2</span></div>
        <div class="zebra-row"><span class="row-label">Row 3</span></div>
        <div class="zebra-row"><span class="row-label">Row 4</span></div>
        <div class="zebra-row"><span class="row-label">Row 5</span></div>
        <div class="zebra-row"><span class="row-label">Row 6</span></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Stripe Color
        <input type="color" class="js-color" value="#eee" data-var="--stripe-color" />
      </label>
      <label>
        Row BG
        <input type="color" class="js-color" value="#2d2d44" data-var="--row-bg" />
      </label>
      <label>
        Stripe Duration
        <input type="range" class="js-range" min="0.05" max="1" step="0.05" value="0.3" data-var="--stripe-duration" />
        <span class="js-range-value">0.3s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
