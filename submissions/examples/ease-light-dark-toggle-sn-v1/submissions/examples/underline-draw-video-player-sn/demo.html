<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Underline Draw Video Player</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <h1>Underline Draw Video Player</h1>
  <p class="subtitle">
    A responsive video player card with an animated underline interaction.
  </p>

  <article class="ease-video-card">

    <div class="ease-video-preview">

      <img
        src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200"
        alt="Video thumbnail"
      >

      <button
        class="ease-play-button"
        aria-label="Play video"
      >
        ▶
      </button>

    </div>

    <div class="ease-video-content">

      <h2 class="ease-video-title">
        Understanding EaseMotion CSS
      </h2>

      <span class="ease-underline"></span>

      <p>
        Build beautiful animated interfaces using lightweight,
        reusable CSS components with smooth interactions.
      </p>

    </div>

  </article>

</div>

</body>
</html>
