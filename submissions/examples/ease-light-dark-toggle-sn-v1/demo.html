<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Light Dark Toggle Demo</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">
    <h1>ease-light-dark-toggle</h1>
    <p>
      A modern animated light/dark theme toggle component for EaseMotion CSS.
    </p>

    <label class="ease-light-dark-toggle">
      <input id="themeToggle" type="checkbox">

      <span class="toggle-track">
        <span class="icon sun">☀️</span>

        <span class="toggle-thumb"></span>

        <span class="icon moon">🌙</span>
      </span>
    </label>

    <div class="status">
      Current Theme:
      <strong id="themeLabel">Light</strong>
    </div>

  </main>

<script>
const toggle = document.getElementById("themeToggle");
const label = document.getElementById("themeLabel");

toggle.addEventListener("change", () => {
    if(toggle.checked){
        document.body.classList.add("dark");
        label.textContent = "Dark";
    }else{
        document.body.classList.remove("dark");
        label.textContent = "Light";
    }
});
</script>

</body>
</html>
