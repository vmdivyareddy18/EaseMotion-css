<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Secure Payment Badge Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="badge-container">
        <!-- Secure Payment Badge Component -->
        <div class="ease-payment-badge">
            <div class="pulse-ring"></div>
            <div class="badge-core">
                <!-- Inline SVG Credit Card Shield Icon -->
                <svg class="credit-card-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect>
                    <line x1="1" y1="10" x2="23" y2="10"></line>
                    <path d="M7 15h.01M11 15h2"></path>
                </svg>
                <span class="badge-text">SSL Secure 256-Bit Payment</span>
            </div>
        </div>
    </div>

</body>
</html>
