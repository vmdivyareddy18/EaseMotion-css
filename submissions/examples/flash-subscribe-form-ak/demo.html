<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flash Subscribe Form — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page-shell">
    <p class="demo-label">EaseMotion CSS — Flash Subscribe Form (Real Estate)</p>

    <section class="subscribe-wrap">
      <article class="flash-card ease-card ease-padding-6 ease-rounded-lg ease-shadow-md ease-fade-in ease-slide-up" aria-labelledby="flash-headline">

        <div class="card-content">
          <h2 id="flash-headline" class="ease-text-xl ease-mb-2">Discover premium properties first</h2>
          <p class="ease-text-muted ease-mb-4">Quick market alerts, exclusive listing previews, and curated recommendations — straight to your inbox.</p>

          <form class="subscribe-form" method="post" action="#" novalidate>
            <label for="email" class="ease-sr-only">Email address</label>

            <div class="field-group">
              <input id="email" name="email" type="email" inputmode="email" placeholder="you@domain.com" required class="ease-input" aria-describedby="email-help" />
              <button type="submit" class="ease-btn ease-btn-primary ease-btn-pill ease-btn-block-md">Subscribe</button>
            </div>

            <p id="email-help" class="ease-text-sm ease-text-muted">No spam — unsubscribe anytime. By subscribing you agree to receive emails.</p>
          </form>
        </div>

      </article>
    </section>
  </main>

</body>
</html>
