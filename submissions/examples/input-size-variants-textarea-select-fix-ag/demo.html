<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Size Variants Fix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="input-size-demo-unique-wrapper">
    <h1>Input Size Variants Fix — Issue #14075</h1>
    <p>All form controls respond to size modifiers.</p>
    <div class="control-group">
      <input class="demo-input demo-input-sm" placeholder="Small input">
    </div>
    <div class="control-group">
      <textarea class="demo-textarea demo-input-sm" placeholder="Small textarea"></textarea>
    </div>
    <div class="control-group">
      <select class="demo-select demo-input-lg">
        <option>Large select</option>
      </select>
    </div>
  </div>
</body>
</html>
