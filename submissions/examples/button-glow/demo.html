<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission — Button Glow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Button Glow</h1>
  <p>Hover any button to see it emit a color-matched glow.</p>

  <div class="demo-row">
    <button class="glow-btn glow-btn-purple">Purple Glow</button>
    <button class="glow-btn glow-btn-green">Green Glow</button>
    <button class="glow-btn glow-btn-red">Red Glow</button>
    <button class="glow-btn glow-btn-orange">Orange Glow</button>
  </div>

  <p class="note">Each button glows in its own brand color. The glow fades out when the cursor leaves.</p>

</body>
</html>
