<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Component — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <!-- Image avatars with status -->
  <div class="demo-group">
    <h2>Image with Status</h2>
    <div class="row">
      <div class="ease-avatar ease-avatar-online">
        <img src="https://i.pravatar.cc/150?img=1" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-offline">
        <img src="https://i.pravatar.cc/150?img=2" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-busy">
        <img src="https://i.pravatar.cc/150?img=3" alt="User" />
      </div>
    </div>
  </div>

  <!-- Initials fallback -->
  <div class="demo-group">
    <h2>Initials Fallback</h2>
    <div class="row">
      <div class="ease-avatar">AB</div>
      <div class="ease-avatar ease-avatar-pink">CD</div>
      <div class="ease-avatar ease-avatar-amber">EF</div>
      <div class="ease-avatar ease-avatar-cyan">GH</div>
      <div class="ease-avatar ease-avatar-green ease-avatar-online">IJ</div>
      <div class="ease-avatar ease-avatar-slate ease-avatar-busy">KL</div>
    </div>
  </div>

  <!-- Sizes -->
  <div class="demo-group">
    <h2>Sizes</h2>
    <div class="row" style="align-items:flex-end">
      <div class="ease-avatar ease-avatar-sm ease-avatar-online">
        <img src="https://i.pravatar.cc/150?img=5" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-online">
        <img src="https://i.pravatar.cc/150?img=5" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-lg ease-avatar-online">
        <img src="https://i.pravatar.cc/150?img=5" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-xl ease-avatar-online">
        <img src="https://i.pravatar.cc/150?img=5" alt="User" />
      </div>
    </div>
  </div>

  <!-- Group stacking -->
  <div class="demo-group">
    <h2>Group Stacking (hover to lift)</h2>
    <div class="ease-avatar-group">
      <div class="ease-avatar ease-avatar-count">+3</div>
      <div class="ease-avatar ease-avatar-cyan">
        <img src="https://i.pravatar.cc/150?img=10" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-pink">
        <img src="https://i.pravatar.cc/150?img=9" alt="User" />
      </div>
      <div class="ease-avatar">
        <img src="https://i.pravatar.cc/150?img=8" alt="User" />
      </div>
      <div class="ease-avatar ease-avatar-amber">
        <img src="https://i.pravatar.cc/150?img=7" alt="User" />
      </div>
    </div>
  </div>

</body>
</html>
