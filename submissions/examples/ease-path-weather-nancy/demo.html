<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Clip Path Weather Widget</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Weather Widget Block -->
  <div class="em-weather-widget">
    
    <!-- Base Layer: Default Standard Morning View -->
    <div class="em-weather-default">
      <div class="em-meta">Outdoor Zone • 07:00 AM</div>
      <div>
        <div class="em-temp">16°C</div>
        <div class="em-condition">Crisp Air & Fog</div>
      </div>
    </div>

    <!-- Morphing Overlay Layer: Fitness Workout Dynamic View -->
    <div class="em-weather-overlay">
      <div class="em-meta">Peak Fitness Window ⚡</div>
      <div class="em-metrics">
        <div class="em-temp">28°C</div>
        <div class="em-condition">Perfect Cardio Sun</div>
      </div>
    </div>

  </div>

</body>
</html>
