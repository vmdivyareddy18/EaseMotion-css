<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-column-resize-handle / Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #11111b;
      font-family: system-ui, -apple-system, sans-serif;
      padding: 2rem;
    }
    .demo-wrapper {
      width: 100%;
      max-width: 700px;
    }
    .column-resize-handle .resizable-column {
      min-width: 60px;
    }
    .column-resize-handle .resizable-column p {
      margin-bottom: 0.5rem;
      color: #a6adc8;
    }
  </style>
</head>
<body>
  <div class="demo-wrapper">
    <div class="column-resize-handle" id="resizeContainer">
      <div class="resizable-column" style="flex:2">
        <p style="color:#89b4fa;font-weight:600;">Column A</p>
        Main content area. Drag the handle to resize.
      </div>
      <div class="resize-handle" id="handle"></div>
      <div class="resizable-column" style="flex:1">
        <p style="color:#fab387;font-weight:600;">Column B</p>
        Sidebar with secondary info.
      </div>
    </div>
  </div>

  <script>
    (function() {
      const container = document.getElementById('resizeContainer');
      const handle = document.getElementById('handle');
      const cols = container.querySelectorAll('.resizable-column');
      let isDragging = false;
      let startX, startWidths;

      function initDrag(e) {
        isDragging = true;
        handle.classList.add('active');
        startX = e.clientX;
        startWidths = Array.from(cols).map(c => c.getBoundingClientRect().width);
        document.body.style.cursor = 'col-resize';
      }

      function doDrag(e) {
        if (!isDragging) return;
        const dx = e.clientX - startX;
        const total = startWidths[0] + startWidths[1];
        const newA = Math.max(60, startWidths[0] + dx);
        const newB = Math.max(60, total - newA);
        cols[0].style.flex = 'none';
        cols[1].style.flex = 'none';
        cols[0].style.width = newA + 'px';
        cols[1].style.width = newB + 'px';
      }

      function stopDrag() {
        if (!isDragging) return;
        isDragging = false;
        handle.classList.remove('active');
        document.body.style.cursor = '';
      }

      handle.addEventListener('mousedown', initDrag);
      document.addEventListener('mousemove', doDrag);
      document.addEventListener('mouseup', stopDrag);
    })();
  </script>
</body>
</html>
