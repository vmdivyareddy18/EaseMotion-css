<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Number Counter — Startup Showcase</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-startup-fluid: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-aurora-glow: cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>

  <!-- Startup Dashboard Container -->
  <div class="startup-card">
    
    <!-- Animated Aurora Glow Blurs -->
    <div class="aurora-blur aurora-1"></div>
    <div class="aurora-blur aurora-2"></div>
    
    <div class="card-content">
      <div class="badge-row">
        <span class="live-pulse"></span>
        <span class="badge-text">Hyper-Growth Analytics</span>
      </div>
      
      <h2 class="metric-title">Annual Recurring Revenue</h2>

      <!-- Pure CSS Kinetic Counter Display Grid -->
      <div class="counter-display">
        <span class="currency">$</span>
        <div class="counter-value count-to-98"></div>
        <span class="multiplier">M+</span>
      </div>

      <!-- Live Pipeline Sub-Metrics -->
      <div class="analytics-breakdown">
        <div class="stat-node">
          <div class="sub-counter count-to-42"></div>
          <p>Active Enterprise Clients</p>
        </div>
        <div class="stat-node border-left">
          <div class="sub-counter count-to-85"></div>
          <p>Net Revenue Retention</p>
        </div>
      </div>

      <!-- Trigger Interaction Hint -->
      <div class="action-footer">
        <p>🎯 Values automatically animate on render using EaseMotion engine rules.</p>
      </div>
    </div>

  </div>

</body>
</html>
