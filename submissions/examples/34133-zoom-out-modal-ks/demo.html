<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Zoom-Out Modal — CSS-only accessible modal with zoom entrance animation for EaseMotion CSS"
    />
    <title>Zoom-Out Modal | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <main>

      <input
        type="checkbox"
        id="modal-toggle"
        aria-hidden="true"
        tabindex="-1"
      />

      <!-- Trigger button -->
      <label
        for="modal-toggle"
        class="btn-trigger"
        tabindex="0"
        aria-haspopup="dialog"
      >
        Open Settings
      </label>

      <!-- Overlay -->
      <div class="modal-overlay">

        <article
          class="modal"
          role="dialog"
          aria-modal="true"
          aria-labelledby="modal-title"
          aria-describedby="modal-desc"
        >

          <!-- Header -->
          <header class="modal__header">
            <div>
              <h2 class="modal__title" id="modal-title">
                Confirm Your Action
              </h2>
              <p class="modal__subtitle" id="modal-desc">
                Please review the details below before proceeding.
              </p>
            </div>

            <!-- Close button -->
            <label
              for="modal-toggle"
              class="modal__close"
              tabindex="0"
              aria-label="Close modal"
            >
              &#x2715;
            </label>
          </header>

          <!-- Body -->
          <div class="modal__body">
            <p>
              This action will update your preferences and apply the selected
              settings to your account. Changes take effect immediately and
              can be revised at any time from your account settings page.
            </p>
          </div>

          <!-- Footer -->
          <footer class="modal__footer">

            <!-- Secondary — cancel -->
            <label
              for="modal-toggle"
              class="btn-secondary"
              tabindex="0"
              aria-label="Cancel and close modal"
            >
              Cancel
            </label>

            <!-- Primary — confirm -->
            <label
              for="modal-toggle"
              class="btn-primary"
              tabindex="0"
              aria-label="Confirm action and close modal"
            >
              Confirm
            </label>

          </footer>

        </article>

      </div><!-- /.modal-overlay -->

    </main>

  </body>
</html>
