<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Loading Skeleton — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .demo-wrapper { max-width: 700px; margin: 2rem auto; font-family: var(--ease-font-sans, sans-serif); }
    .demo-header { margin-bottom: 2rem; }
    .demo-section { margin-bottom: 2rem; padding: 1.5rem; background: #fff; border-radius: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; }
    p { color: #64748b; font-size: 0.9rem; margin-bottom: 0.75rem; }
    .skeleton-demo { background: #f8fafc; padding: 1rem; border-radius: 0.5rem; }
  </style>
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>Shimmer Loading Skeletons</h1>
      <p>Skeleton screen patterns with animated shimmer for polished loading states.</p>
    </header>

    <main>
      <div class="demo-section">
        <h2>Text Line Skeletons</h2>
        <div class="skeleton-demo">
          <span class="skeleton skeleton-text skeleton-text--2xl" style="width:60%;margin-bottom:0.75rem;"></span>
          <span class="skeleton skeleton-text skeleton-text--md"></span>
          <span class="skeleton skeleton-text skeleton-text--md"></span>
          <span class="skeleton skeleton-text skeleton-text--md" style="width:75%;"></span>
        </div>
      </div>

      <div class="demo-section">
        <h2>Avatar Sizes</h2>
        <div class="skeleton-demo" style="display:flex;gap:1rem;align-items:center;">
          <span class="skeleton skeleton-avatar skeleton-avatar--xs"></span>
          <span class="skeleton skeleton-avatar skeleton-avatar--sm"></span>
          <span class="skeleton skeleton-avatar skeleton-avatar--md"></span>
          <span class="skeleton skeleton-avatar skeleton-avatar--lg"></span>
          <span class="skeleton skeleton-avatar skeleton-avatar--xl"></span>
        </div>
      </div>

      <div class="demo-section">
        <h2>Card Skeleton</h2>
        <div class="skeleton-card" style="max-width:300px;">
          <span class="skeleton skeleton-card__image"></span>
          <span class="skeleton skeleton-card__title"></span>
          <span class="skeleton skeleton-card__text"></span>
          <span class="skeleton skeleton-card__text skeleton-card__text--medium"></span>
          <span class="skeleton skeleton-card__text skeleton-card__text--short"></span>
        </div>
      </div>

      <div class="demo-section">
        <h2>Profile Skeleton</h2>
        <div class="skeleton-demo">
          <div class="skeleton-profile">
            <span class="skeleton skeleton-profile__avatar"></span>
            <div class="skeleton-profile__info">
              <span class="skeleton skeleton-profile__name"></span>
              <span class="skeleton skeleton-profile__role"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="demo-section">
        <h2>Article Skeleton</h2>
        <div class="skeleton-article" style="max-width:400px;">
          <div class="skeleton-article__header">
            <span class="skeleton skeleton-article__category"></span>
            <span class="skeleton skeleton-article__date"></span>
          </div>
          <span class="skeleton skeleton-text skeleton-text--xl" style="width:80%;margin-bottom:0.5rem;"></span>
          <span class="skeleton skeleton-text skeleton-text--sm"></span>
          <span class="skeleton skeleton-text skeleton-text--sm"></span>
          <span class="skeleton skeleton-text skeleton-text--sm" style="width:65%;"></span>
        </div>
      </div>

      <div class="demo-section">
        <h2>Badge and Button Skeletons</h2>
        <div class="skeleton-demo" style="display:flex;gap:1rem;align-items:center;flex-wrap:wrap;">
          <span class="skeleton skeleton-badge"></span>
          <span class="skeleton skeleton-badge" style="width:80px;"></span>
          <span class="skeleton skeleton-btn"></span>
          <span class="skeleton skeleton-btn" style="width:140px;"></span>
        </div>
      </div>

      <div class="demo-section">
        <h2>Pulse Variant (No Shimmer)</h2>
        <div class="skeleton-demo" style="display:flex;gap:1rem;">
          <span class="skeleton skeleton--pulse skeleton-avatar skeleton-avatar--lg"></span>
          <div style="flex:1;">
            <span class="skeleton skeleton--pulse skeleton-text skeleton-text--lg" style="width:50%;margin-bottom:0.5rem;"></span>
            <span class="skeleton skeleton--pulse skeleton-text skeleton-text--sm" style="width:80%;"></span>
          </div>
        </div>
      </div>
    </main>

    <footer style="text-align:center;margin-top:2rem;color:#94a3b8;font-size:0.875rem;">
      EaseMotion CSS — shimmer loading skeleton utilities
    </footer>
  </div>
</body>
</html>
