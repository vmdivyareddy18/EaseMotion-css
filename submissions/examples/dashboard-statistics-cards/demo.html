<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Statistics Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="card">
        <div class="icon">📈</div>
        <h2>$24.8K</h2>
        <p>Total Revenue</p>
        <span class="trend positive">▲ 12.4%</span>
    </div>

    <div class="card">
        <div class="icon">👥</div>
        <h2>8,542</h2>
        <p>Active Users</p>
        <span class="trend positive">▲ 8.1%</span>
    </div>

    <div class="card">
        <div class="icon">🛒</div>
        <h2>1,284</h2>
        <p>Orders</p>
        <span class="trend positive">▲ 5.7%</span>
    </div>

    <div class="card">
        <div class="icon">📉</div>
        <h2>2.1%</h2>
        <p>Bounce Rate</p>
        <span class="trend negative">▼ 1.3%</span>
    </div>

</div>

</body>
</html>
