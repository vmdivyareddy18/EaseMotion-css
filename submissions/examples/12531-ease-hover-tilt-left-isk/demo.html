<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-hover-tilt-left-isk</title>
  <meta name="description" content="A demonstration of the ease-hover-tilt-left-isk animation showing a card tilting to the left in 3D perspective on hover.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hover-tilt-left-isk</h1>
      <p class="subtitle" id="main-desc">Hover over the card below to experience the 3D perspective tilt effect</p>
    </header>

    <div class="display-area">
      <!-- Perspective Parent -->
      <div class="ease-perspective-container-isk">
        <!-- Tilt Card -->
        <div class="demo-card ease-hover-tilt-left-isk" id="card-target">
          <h3>3D Tilt Card</h3>
          <p>This card utilizes parent CSS perspective to rotate slightly on the Y-axis when hovered, simulating a physical 3D lean.</p>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
