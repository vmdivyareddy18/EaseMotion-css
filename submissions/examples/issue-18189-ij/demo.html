<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs Slide – Issue 18189</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Sliding Tabs</h1>
    <p class="subtitle">Active tab indicator slides with <code>:target</code></p>
    <div class="tabs">
      <a href="#tab1" class="tab-link" id="tab1-link">Tab 1</a>
      <a href="#tab2" class="tab-link" id="tab2-link">Tab 2</a>
      <a href="#tab3" class="tab-link" id="tab3-link">Tab 3</a>
      <div class="indicator" id="indicator"></div>
    </div>
    <div class="tab-panels">
      <div class="tab-panel" id="tab1">Content for Tab 1 — Explore the first section.</div>
      <div class="tab-panel" id="tab2">Content for Tab 2 — Discover the second section.</div>
      <div class="tab-panel" id="tab3">Content for Tab 3 — Learn about the third section.</div>
    </div>
  </div>
</body>
</html>
