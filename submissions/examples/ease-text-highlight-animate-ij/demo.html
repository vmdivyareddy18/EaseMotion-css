<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Highlight Animate - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Text Highlight Animate</h1>
    <p class="desc">Scroll to trigger word highlight sweep animation</p>
    <div class="tha-content" id="thaContent">
      <p class="tha-text">
        <span class="tha-word">EaseMotion</span>
        <span class="tha-word">brings</span>
        <span class="tha-word">smooth</span>
        <span class="tha-word">CSS</span>
        <span class="tha-word">animations</span>
        <span class="tha-word">to</span>
        <span class="tha-word">life</span>
        <span class="tha-word">with</span>
        <span class="tha-word">minimal</span>
        <span class="tha-word">JavaScript</span>
        <span class="tha-word">and</span>
        <span class="tha-word">custom</span>
        <span class="tha-word">properties</span>
        <span class="tha-word">for</span>
        <span class="tha-word">flexible</span>
        <span class="tha-word">theming</span>
      </p>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const words = document.querySelectorAll('.tha-word');
      function checkScroll() {
        words.forEach(function(word) {
          const rect = word.getBoundingClientRect();
          if (rect.top < window.innerHeight - 100 && rect.bottom > 0) {
            word.classList.add('tha-visible');
          } else {
            word.classList.remove('tha-visible');
          }
        });
      }
      window.addEventListener('scroll', checkScroll);
      checkScroll();
    });
  </script>
</body>
</html>
