<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Class Decoder Quiz Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #e2e8f0;">
  
  <div class="ease-quiz-container">
    <h2 class="ease-quiz-title">Decoder Quiz</h2>
    <p class="ease-quiz-subtitle">What does this EaseMotion class do?</p>

    <div id="targetClass" class="ease-quiz-target">.ease-in-out-sine</div>

    <div id="optionsContainer" class="ease-quiz-options">
      <!-- Options injected by JS -->
    </div>

    <div id="feedback" class="ease-quiz-feedback"></div>
    <button id="nextBtn" class="ease-quiz-next">Next Question</button>
  </div>

  <script>
    const questions = [
      {
        class: ".ease-bounce-in",
        options: ["Fades in slowly", "Bounces into view", "Slides out left", "Rotates infinitely"],
        correct: 1
      },
      {
        class: ".ease-pulse-fast",
        options: ["Throbs rapidly", "Fades in and out slowly", "Moves up and down", "Changes color"],
        correct: 0
      },
      {
        class: ".ease-slide-up-fade",
        options: ["Slides down and hides", "Slides left and appears", "Slides up while fading in", "Spins upwards"],
        correct: 2
      }
    ];

    let currentQ = 0;
    const targetEl = document.getElementById('targetClass');
    const optionsEl = document.getElementById('optionsContainer');
    const feedbackEl = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');

    function loadQuestion() {
      const q = questions[currentQ];
      targetEl.textContent = q.class;
      optionsEl.innerHTML = '';
      feedbackEl.className = 'ease-quiz-feedback';
      feedbackEl.textContent = '';
      nextBtn.classList.remove('show');

      q.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'ease-quiz-option';
        btn.textContent = opt;
        btn.onclick = () => checkAnswer(index, btn);
        optionsEl.appendChild(btn);
      });
    }

    function checkAnswer(selectedIndex, btnEl) {
      const q = questions[currentQ];
      const buttons = optionsEl.querySelectorAll('.ease-quiz-option');
      
      // Disable all buttons
      buttons.forEach(b => b.disabled = true);

      if (selectedIndex === q.correct) {
        btnEl.classList.add('correct');
        feedbackEl.textContent = "Correct! 🎉";
        feedbackEl.style.color = "#10b981";
      } else {
        btnEl.classList.add('incorrect');
        buttons[q.correct].classList.add('correct');
        feedbackEl.textContent = "Incorrect. Try the next one!";
        feedbackEl.style.color = "#ef4444";
      }
      
      feedbackEl.classList.add('show');
      nextBtn.classList.add('show');
    }

    nextBtn.onclick = () => {
      currentQ = (currentQ + 1) % questions.length;
      loadQuestion();
    };

    // Init
    loadQuestion();
  </script>

</body>
</html>
