<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-visually-hidden Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>ease-visually-hidden Demo</h1>
  <p>
    Hidden content remains available to screen readers
    while staying invisible on the page.
  </p>
  <button>
    🔍 Search
    <span class="ease-visually-hidden">
      Opens search dialog
    </span>
  </button>
  <hr>
  <nav>
    <a href="#">
      🏠
      <span class="ease-visually-hidden">
        Home Page
      </span>
    </a>
  </nav>
  <br><br>
  <label>
    Email Address
    <span class="ease-visually-hidden">
      Required field
    </span>
  </label>
  <input
    type="email"
    placeholder="Enter your email"
  >
</body>
</html>
