<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dropdown">
  <button onclick="toggleDropdown()">Select Option ⬇️</button>

  <div id="menu" class="menu">
    <div onclick="selectItem('Option 1')">Option 1</div>
    <div onclick="selectItem('Option 2')">Option 2</div>
    <div onclick="selectItem('Option 3')">Option 3</div>
  </div>
</div>

<p id="result"></p>

<script>
function toggleDropdown() {
  document.getElementById("menu").classList.toggle("show");
}

function selectItem(val) {
  document.getElementById("result").textContent = "Selected: " + val;
  document.getElementById("menu").classList.remove("show");
}

window.onclick = function(e) {
  if (!e.target.matches('button')) {
    document.getElementById("menu").classList.remove("show");
  }
}
</script>

</body>
</html>
