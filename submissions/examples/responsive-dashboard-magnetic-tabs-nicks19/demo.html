<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard Magnetic Pull Tabs Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #151521; /* Dark dashboard background */
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: #ffffff;
        }
        .demo-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
        }
        h2 {
            color: #a1a5b7;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="demo-wrapper">
        <h2>Dashboard Magnetic Tabs</h2>
        
        <div class="ease-dash-tabs-container">
            <input type="radio" id="tab1" name="dash-tabs" checked>
            <input type="radio" id="tab2" name="dash-tabs">
            <input type="radio" id="tab3" name="dash-tabs">

            <label for="tab1" class="ease-dash-tab">Overview</label>
            <label for="tab2" class="ease-dash-tab">Analytics</label>
            <label for="tab3" class="ease-dash-tab">Reports</label>

            <!-- The active background highlight -->
            <div class="ease-dash-active-indicator"></div>
        </div>
    </div>
</body>
</html>
