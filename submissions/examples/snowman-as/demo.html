<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snowman</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="flake f1"></span>
    <span class="flake f2"></span>
    <span class="flake f3"></span>
    <span class="flake f4"></span>
    <span class="flake f5"></span>
    <span class="flake f6"></span>
    <div class="snowman">
      <div class="head">
        <span class="hat"></span>
        <span class="eye le"></span>
        <span class="eye re"></span>
        <span class="nose"></span>
        <span class="smile"></span>
      </div>
      <div class="mid">
        <span class="btn b1"></span>
        <span class="btn b2"></span>
        <span class="arm la"></span>
        <span class="arm ra"></span>
      </div>
      <div class="base"></div>
    </div>
    <span class="ground"></span>
  </div>
</body>
</html>
