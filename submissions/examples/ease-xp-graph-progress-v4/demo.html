<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Graph Progress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Growth Graph</h1>

  <div class="xp-card ease-slide-up">

    <!-- GRAPH -->
    <svg width="260" height="160" class="graph">
      <polyline id="line"
        fill="none"
        stroke="#22c55e"
        stroke-width="3"
        points="0,150 50,130 100,120 150,90 200,70 250,50"
      />
      
      <!-- POINTS -->
      <circle class="point" cx="50" cy="130" r="4"/>
      <circle class="point" cx="100" cy="120" r="4"/>
      <circle class="point" cx="150" cy="90" r="4"/>
      <circle class="point" cx="200" cy="70" r="4"/>
      <circle class="point" cx="250" cy="50" r="4"/>
    </svg>

    <button onclick="animateGraph()" class="xp-btn">Show Progress</button>

  </div>
</section>

<script>
function animateGraph() {
  const line = document.getElementById("line");
  const length = line.getTotalLength();

  line.style.strokeDasharray = length;
  line.style.strokeDashoffset = length;

  setTimeout(() => {
    line.style.transition = "stroke-dashoffset 1.5s ease";
    line.style.strokeDashoffset = "0";
  }, 100);

  // POINT POP
  document.querySelectorAll(".point").forEach((p, i) => {
    setTimeout(() => {
      p.classList.add("show");
    }, i * 200);
  });
}
</script>

</body>
</html>
