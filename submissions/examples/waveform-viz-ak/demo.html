<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Waveform Visualizer - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="wv-wrapper">

    <h1>Waveform Visualizer</h1>

    <div class="wv-display" id="waveformDisplay">
      <div class="wv-bars" id="waveformBars"></div>
    </div>

    <div class="wv-controls">
      <button class="wv-btn" id="playBtn">&#9654; Play</button>
      <div class="wv-genres">
        <button class="genre-btn active" data-genre="pop">Pop</button>
        <button class="genre-btn" data-genre="rock">Rock</button>
        <button class="genre-btn" data-genre="classical">Classical</button>
        <button class="genre-btn" data-genre="electronic">Electronic</button>
      </div>
    </div>

  </div>

  <script>
    const barsContainer = document.getElementById('waveformBars');
    const playBtn = document.getElementById('playBtn');
    const genreBtns = document.querySelectorAll('.genre-btn');

    const BAR_COUNT = 60;
    let isPlaying = false;
    let animId = null;
    let currentGenre = 'pop';

    const genres = {
      pop: { speed: 1, heightRange: [5, 80], color: '#6366f1', variation: 0.5 },
      rock: { speed: 1.5, heightRange: [5, 95], color: '#ef4444', variation: 0.8 },
      classical: { speed: 0.5, heightRange: [10, 60], color: '#22c55e', variation: 0.3 },
      electronic: { speed: 2, heightRange: [3, 100], color: '#a855f7', variation: 0.9 }
    };

    const bars = [];
    for (let i = 0; i < BAR_COUNT; i++) {
      const bar = document.createElement('div');
      bar.className = 'wv-bar';
      barsContainer.appendChild(bar);
      bars.push({
        el: bar,
        height: 20,
        target: 20,
        speed: 0.05 + Math.random() * 0.1
      });
    }

    function animate() {
      if (!isPlaying) return;

      const g = genres[currentGenre];
      const now = Date.now();

      bars.forEach((b, i) => {
        const phase = (i / BAR_COUNT) * Math.PI * 2 + now * 0.002 * g.speed;
        const wave = Math.sin(phase) * 0.5 + 0.5;
        const noise = Math.random() * g.variation;
        const height = g.heightRange[0] + (wave * (1 - g.variation) + noise * g.variation) * (g.heightRange[1] - g.heightRange[0]);
        b.target = height;
        b.height += (b.target - b.height) * b.speed;
        b.el.style.height = b.height + 'px';
        b.el.style.background = g.color;
        b.el.style.opacity = 0.4 + (b.height / g.heightRange[1]) * 0.6;
      });

      animId = requestAnimationFrame(animate);
    }

    function startAnimation() {
      isPlaying = true;
      playBtn.textContent = '\u275A\u275A Pause';
      animate();
    }

    function stopAnimation() {
      isPlaying = false;
      playBtn.textContent = '\u25B6 Play';
      if (animId) cancelAnimationFrame(animId);
      bars.forEach(b => {
        b.height = 0;
        b.el.style.height = '0px';
      });
    }

    playBtn.addEventListener('click', () => {
      if (isPlaying) stopAnimation();
      else startAnimation();
    });

    genreBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        genreBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;

        barsContainer.className = 'wv-bars ' + currentGenre;
      });
    });
  </script>

</body>
</html>
