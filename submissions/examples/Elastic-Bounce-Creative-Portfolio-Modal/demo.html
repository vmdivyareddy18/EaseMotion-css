<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Creative Portfolio Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    View Portfolio
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="hero"></div>

        <h2>Creative Portfolio</h2>

        <p>
            Discover featured design projects showcased inside a modern
            Elastic Bounce modal built entirely with HTML and CSS.
        </p>

        <div class="gallery">

            <div class="card">
                <span>🎨</span>
                <h4>Brand Identity</h4>
            </div>

            <div class="card">
                <span>📱</span>
                <h4>UI Design</h4>
            </div>

            <div class="card">
                <span>✨</span>
                <h4>Illustrations</h4>
            </div>

        </div>

        <button>Explore Projects</button>

    </div>

</div>

</body>
</html>
