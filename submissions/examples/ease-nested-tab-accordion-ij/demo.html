<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nested Tab Accordion</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='tab-bg')r.style.setProperty('--tab-bg',t.value);if(t.name==='content-bg')r.style.setProperty('--content-bg',t.value);if(t.name==='active-color')r.style.setProperty('--active-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',function(){const p=this.closest('.tab-group');p.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));this.classList.add('active');p.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));const target=this.dataset.target;p.querySelector(target).classList.add('active')}))})</script>
<div class="container"><p class="title">Nested Tab Accordion</p>
<div class="tab-group"><div class="tab-bar"><button class="tab-btn active" data-target="#panel-1a">Info</button><button class="tab-btn" data-target="#panel-1b">Settings</button></div>
<div class="tab-panel active" id="panel-1a"><p>Basic configuration options.</p></div><div class="tab-panel" id="panel-1b"><p>Advanced settings panel.</p></div></div>
<div class="tab-group nested"><div class="tab-bar"><button class="tab-btn active" data-target="#panel-2a">Sub A</button><button class="tab-btn" data-target="#panel-2b">Sub B</button></div>
<div class="tab-panel active" id="panel-2a"><p>Nested tab content A.</p></div><div class="tab-panel" id="panel-2b"><p>Nested tab content B.</p></div></div>
<div class="controls"><label>Tab BG: <input type="color" name="tab-bg" value="#2d2d44"></label><label>Content: <input type="color" name="content-bg" value="#252540"></label><label>Active: <input type="color" name="active-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="slide-duration" min="0.1" max="0.6" step="0.05" value="0.25"></label></div></div></body></html>
