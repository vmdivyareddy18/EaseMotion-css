<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing FAB Overlay Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of morphing floating action buttons and full-screen menu overlay transitions.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Components</span>
      <h1>Morphing FAB</h1>
      <p class="description">
        Demonstrates geometric transition states. Click the floating button 
        in the bottom-right corner to trigger the overlay menu.
      </p>
    </header>

    <main class="showcase">
      <!-- Morphing FAB Container under Test -->
      <div class="fab-wrapper" id="fab-parent">
        <!-- Overlay Panel (revealed on morph) -->
        <div class="fab-menu">
          <h3>Quick Menu</h3>
          <ul class="menu-list">
            <li><a href="#">⚡ Settings</a></li>
            <li><a href="#">👤 Profile Workspace</a></li>
            <li><a href="#">🔒 Sign Out</a></li>
          </ul>
        </div>
        
        <!-- Toggle Button Knob -->
        <button class="fab-btn" onclick="toggleFAB()">+</button>
      </div>
    </main>
  </div>

  <script>
    function toggleFAB() {
      const parent = document.getElementById('fab-parent');
      parent.classList.toggle('active');
    }
  </script>

</body>
</html>
