<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radial Progress Badge Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-stage" aria-labelledby="progress-title">
    <section class="progress-card">
      <p class="label">Status widget</p>
      <h1 id="progress-title">Radial Progress Badge</h1>
      <p class="summary">A compact progress badge that fills its ring on load and keeps the metric readable at any size.</p>

      <div class="badge-row" aria-label="Progress examples">
        <article class="progress-badge badge-one">
          <span class="ring"></span>
          <strong>82</strong>
          <small>Quality</small>
        </article>
        <article class="progress-badge badge-two">
          <span class="ring"></span>
          <strong>64</strong>
          <small>Coverage</small>
        </article>
        <article class="progress-badge badge-three">
          <span class="ring"></span>
          <strong>91</strong>
          <small>Health</small>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
