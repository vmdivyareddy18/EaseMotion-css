<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Animated Image Reveal on Scroll</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="demo-container">
        <header class="demo-header">
            <h1>Scroll Reveal Wipe Animation</h1>
            <p>Scroll down to see the premium color overlay wipe effects triggered via the Intersection Observer API.</p>
        </header>

        <div class="scroll-prompt">
            <span>Scroll Down</span>
            <div class="arrow-down">↓</div>
        </div>

        <section class="reveal-grid">
            <div class="reveal-card">
                <h3>Wipe Left to Right</h3>
                <div class="ease-img-reveal ease-img-reveal--left">
                    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=800&auto=format&fit=crop" alt="Mountain landscape" />
                </div>
            </div>

            <div class="reveal-card">
                <h3>Wipe Right to Left</h3>
                <div class="ease-img-reveal ease-img-reveal--right">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=800&auto=format&fit=crop" alt="Ocean beach" />
                </div>
            </div>

            <div class="reveal-card">
                <h3>Wipe Top to Bottom</h3>
                <div class="ease-img-reveal ease-img-reveal--up">
                    <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=800&auto=format&fit=crop" alt="Forest pathway" />
                </div>
            </div>

            <div class="reveal-card">
                <h3>Wipe Bottom to Top</h3>
                <div class="ease-img-reveal ease-img-reveal--down">
                    <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=800&auto=format&fit=crop" alt="Foggy valley" />
                </div>
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const options = {
                root: null, // watch full viewport
                rootMargin: '0px',
                threshold: 0.15 // trigger when 15% of the image is visible
            };

            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        observer.unobserve(entry.target); // stop observing once animated
                    }
                });
            }, options);

            // Target all reveal elements
            const revealElements = document.querySelectorAll('.ease-img-reveal');
            revealElements.forEach(el => observer.observe(el));
        });
    </script>
</body>
</html>
