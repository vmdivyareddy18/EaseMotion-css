<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotlight Voice Recorder</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #0f172a; font-family: system-ui, sans-serif;">
  
  <div class="recorder-wrapper ease-fade-in-up">
    <!-- Spotlight Effect -->
    <div class="spotlight ease-pulse"></div>
    
    <!-- Voice Recorder UI -->
    <div class="recorder-card">
      <div class="recording-indicator">
        <div class="red-dot ease-flash"></div>
        <span>Recording...</span>
        <span class="timer">00:03</span>
      </div>
      
      <!-- Audio wave visualization simulation -->
      <div class="audio-waves">
        <div class="wave wave-1 ease-bounce"></div>
        <div class="wave wave-2 ease-bounce" style="animation-delay: 0.1s"></div>
        <div class="wave wave-3 ease-bounce" style="animation-delay: 0.2s"></div>
        <div class="wave wave-4 ease-bounce" style="animation-delay: 0.15s"></div>
        <div class="wave wave-5 ease-bounce" style="animation-delay: 0.05s"></div>
        <div class="wave wave-6 ease-bounce" style="animation-delay: 0.25s"></div>
        <div class="wave wave-7 ease-bounce" style="animation-delay: 0.1s"></div>
      </div>
      
      <div class="controls">
        <button class="btn-cancel ease-hover-pop">Cancel</button>
        <button class="btn-stop ease-hover-scale">Stop</button>
      </div>
    </div>
  </div>

</body>
</html>
