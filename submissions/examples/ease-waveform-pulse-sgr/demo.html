<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waveform Pulse - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1 class="demo-title">Audio Waveform Pulse</h1>
      <p class="demo-subtitle">
        Symmetrical equalizer frequency bars oscillate outwards from their
        center to represent active voice/audio track playback.
      </p>

      <!-- Voice Note Bubble Mockup -->
      <div class="voice-bubble">
        <!-- CSS-Only Playback Trigger -->
        <label class="play-trigger-label" for="playback-trigger-checkbox">
          <input
            type="checkbox"
            id="playback-trigger-checkbox"
            class="playback-checkbox"
          />
          <div class="play-btn-circle">
            <!-- Play Icon -->
            <svg class="play-icon" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"></path>
            </svg>
            <!-- Pause Icon -->
            <svg class="pause-icon" viewBox="0 0 24 24">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
            </svg>
          </div>
        </label>

        <!-- Symmetrical Waveform Profile Visualizer (15 Bars) -->
        <div class="waveform-container">
          <span class="waveform-bar w-1"></span>
          <span class="waveform-bar w-2"></span>
          <span class="waveform-bar w-3"></span>
          <span class="waveform-bar w-4"></span>
          <span class="waveform-bar w-5"></span>
          <span class="waveform-bar w-6"></span>
          <span class="waveform-bar w-7"></span>
          <span class="waveform-bar w-8"></span>
          <span class="waveform-bar w-9"></span>
          <span class="waveform-bar w-10"></span>
          <span class="waveform-bar w-11"></span>
          <span class="waveform-bar w-12"></span>
          <span class="waveform-bar w-13"></span>
          <span class="waveform-bar w-14"></span>
          <span class="waveform-bar w-15"></span>
        </div>

        <!-- Duration Stamp -->
        <span class="audio-duration">0:42</span>
      </div>
    </div>
  </body>
</html>
