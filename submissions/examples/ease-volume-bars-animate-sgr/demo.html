<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Volume Bars Animate - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1 class="demo-title">Volume Bars Visualizer</h1>
      <p class="demo-subtitle">
        Vertical equalizer frequency bars oscillate independently during
        playback and settle when paused.
      </p>

      <!-- Media Player Card -->
      <div class="player-card">
        <!-- Rotating Album Cover -->
        <div class="album-art">
          <span class="album-icon">💿</span>
        </div>

        <!-- Track Information -->
        <div class="track-info">
          <h2 class="track-name">Midnight Chillout</h2>
          <p class="artist-name">Acoustic Horizon</p>
        </div>

        <!-- Volume Frequency Visualizer Bars -->
        <div class="visualizer-container">
          <span class="visualizer-bar bar-1"></span>
          <span class="visualizer-bar bar-2"></span>
          <span class="visualizer-bar bar-3"></span>
          <span class="visualizer-bar bar-4"></span>
          <span class="visualizer-bar bar-5"></span>
          <span class="visualizer-bar bar-6"></span>
          <span class="visualizer-bar bar-7"></span>
        </div>

        <!-- Media Controls -->
        <div class="playback-controls">
          <!-- Backward Button -->
          <button class="playback-btn-secondary">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 6h2v12H6zm3.5 6L18 6v12z"></path>
            </svg>
          </button>

          <!-- Main Play/Pause (CSS-Only Toggle) -->
          <label class="play-trigger-label" for="play-state-checkbox">
            <input
              type="checkbox"
              id="play-state-checkbox"
              class="playback-checkbox"
            />
            <div class="play-btn-circle">
              <!-- Play SVG -->
              <svg class="play-icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"></path>
              </svg>
              <!-- Pause SVG -->
              <svg class="pause-icon" viewBox="0 0 24 24">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"></path>
              </svg>
            </div>
          </label>

          <!-- Forward Button -->
          <button class="playback-btn-secondary">
            <svg width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
              <path d="M6 18l8.5-6L6 6zm9-12v12h2V6z"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
