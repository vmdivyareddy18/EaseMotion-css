<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Rotate-Click Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="rot-modal-toggle" class="ease-rot-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="rot-modal-toggle" class="ease-rot-trigger-um" tabindex="0">
    Let's Play!
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-rot-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="rot-modal-toggle" class="ease-rot-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-rot-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Icon that rotates on hover -->
      <div class="ease-rot-icon-um">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
      </div>

      <!-- Content -->
      <h2 id="modal-title" class="ease-rot-title-um">You unlocked a new level!</h2>
      <p class="ease-rot-desc-um">
        This modal demonstrates the "Rotate-Click" interaction pattern. The modal window rotates in 3D perspective upon entry. When you click or hover over the buttons, they playfully rotate and depress, giving a fun, tactile, arcade-like experience.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-rot-actions-um">
        <label for="rot-modal-toggle" class="ease-rot-btn-um ease-rot-btn-primary-um">
          Claim Reward
        </label>
        
        <label for="rot-modal-toggle" class="ease-rot-btn-um">
          Maybe Later
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
