<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Swing-Hover Popover - Dashboard Analytics</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Swing-Hover interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-logo">AnalyticsPro</div>
            <nav class="sidebar-nav">
                <a href="#" class="active">Overview</a>
                <a href="#">Audiences</a>
                <a href="#">Campaigns</a>
                <a href="#">Settings</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-content">
            <header class="dashboard-header">
                <div class="header-search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Search analytics...">
                </div>
                
                <div class="header-actions">
                    <button class="icon-btn" aria-label="Notifications">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    </button>
                    
                    <!-- THE SWING-HOVER POPOVER COMPONENT -->
                    <div class="ease-popover-container" tabindex="0">
                        <!-- Trigger Button -->
                        <button class="ease-popover-trigger" aria-haspopup="true" aria-expanded="false">
                            <img src="https://i.pravatar.cc/100?img=11" alt="User Profile" class="avatar">
                            <span class="user-name">Alex M.</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </button>
                        
                        <!-- Popover Panel (Swing Animation) -->
                        <div class="ease-popover-panel ease-swing-hover" role="menu">
                            <div class="ease-popover-header">
                                <p class="user-email">alex.m@analyticspro.io</p>
                                <span class="badge">Pro Plan</span>
                            </div>
                            <div class="ease-popover-body">
                                <a href="#" class="ease-popover-item" role="menuitem">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                                    My Profile
                                </a>
                                <a href="#" class="ease-popover-item" role="menuitem">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                                    Billing & Security
                                </a>
                                <a href="#" class="ease-popover-item" role="menuitem">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                                    Dashboard Preferences
                                </a>
                            </div>
                            <div class="ease-popover-footer">
                                <a href="#" class="ease-popover-item text-danger" role="menuitem">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                                    Sign Out
                                </a>
                            </div>
                        </div>
                    </div>
                    <!-- END POPOVER COMPONENT -->
                    
                </div>
            </header>
            
            <section class="dashboard-widgets">
                <div class="widget-card">
                    <h3>Traffic Sources</h3>
                    <div class="metric">64.2K</div>
                    <div class="trend positive">+12.5%</div>
                </div>
                <div class="widget-card">
                    <h3>Conversion Rate</h3>
                    <div class="metric">3.8%</div>
                    <div class="trend positive">+1.2%</div>
                </div>
                <div class="widget-card">
                    <h3>Bounce Rate</h3>
                    <div class="metric">42.1%</div>
                    <div class="trend negative">-3.4%</div>
                </div>
            </section>
            
            <section class="dashboard-chart-placeholder">
                <div class="chart-header">
                    <h3>Revenue Overview</h3>
                </div>
                <div class="chart-mockup">
                    <div class="bar" style="height: 30%"></div>
                    <div class="bar" style="height: 50%"></div>
                    <div class="bar" style="height: 40%"></div>
                    <div class="bar" style="height: 70%"></div>
                    <div class="bar" style="height: 85%"></div>
                    <div class="bar" style="height: 60%"></div>
                    <div class="bar" style="height: 90%"></div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
