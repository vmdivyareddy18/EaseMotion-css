<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-fade-in-map-embed</title>
  <meta name="description" content="Map embed with smooth fade-in animation effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-fade-in-map-embed</h1>
      <p class="subtitle" id="main-desc">Map embed with fade-in animation</p>
    </header>

    <div class="display-area">
      
      <div class="map-showcase">
        
        <!-- Default -->
        <div class="map-item">
          <div class="ease-fade-map">
            <div class="map-frame">
              <div class="map-content">
                <svg class="map-svg" viewBox="0 0 400 300">
                  <defs>
                    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(59, 130, 246, 0.1)" stroke-width="1"/>
                    </pattern>
                  </defs>
                  <rect width="400" height="300" fill="url(#grid)"/>
                  <circle cx="200" cy="150" r="30" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                  <circle cx="200" cy="150" r="50" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                  <circle cx="200" cy="150" r="70" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1"/>
                  <circle cx="200" cy="150" r="8" fill="currentColor"/>
                  <path d="M50 150 Q125 100 200 150 T350 150" stroke="currentColor" stroke-width="2" fill="none" opacity="0.3"/>
                </svg>
                <div class="map-marker">
                  <div class="marker-pin"></div>
                  <div class="marker-pulse"></div>
                </div>
              </div>
              <div class="map-overlay"></div>
            </div>
          </div>
          <span class="map-label">Default Fade</span>
        </div>

        <!-- Primary -->
        <div class="map-item">
          <div class="ease-fade-map ease-fade-primary">
            <div class="map-frame">
              <div class="map-content">
                <svg class="map-svg" viewBox="0 0 400 300">
                  <rect width="400" height="300" fill="url(#grid)"/>
                  <circle cx="200" cy="150" r="30" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                  <circle cx="200" cy="150" r="50" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                  <circle cx="200" cy="150" r="8" fill="currentColor"/>
                </svg>
                <div class="map-marker">
                  <div class="marker-pin"></div>
                  <div class="marker-pulse"></div>
                </div>
              </div>
              <div class="map-overlay"></div>
            </div>
          </div>
          <span class="map-label">Primary</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Corporate Office Location</h3>
      <div class="office-map">
        <div class="ease-fade-map ease-fade-lg ease-fade-primary">
          <div class="map-frame">
            <div class="map-content">
              <svg class="map-svg" viewBox="0 0 600 400">
                <defs>
                  <pattern id="gridLg" width="50" height="50" patternUnits="userSpaceOnUse">
                    <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(59, 130, 246, 0.1)" stroke-width="1"/>
                  </pattern>
                </defs>
                <rect width="600" height="400" fill="url(#gridLg)"/>
                <!-- Grid lines -->
                <line x1="0" y1="100" x2="600" y2="100" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <line x1="0" y1="200" x2="600" y2="200" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <line x1="0" y1="300" x2="600" y2="300" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <line x1="150" y1="0" x2="150" y2="400" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <line x1="300" y1="0" x2="300" y2="400" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <line x1="450" y1="0" x2="450" y2="400" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <!-- Roads -->
                <path d="M0 200 L600 200" stroke="currentColor" stroke-width="4" opacity="0.2"/>
                <path d="M300 0 L300 400" stroke="currentColor" stroke-width="4" opacity="0.2"/>
                <!-- Buildings -->
                <rect x="180" y="140" width="40" height="30" fill="currentColor" opacity="0.3" rx="2"/>
                <rect x="340" y="160" width="50" height="40" fill="currentColor" opacity="0.3" rx="2"/>
                <rect x="220" y="220" width="60" height="35" fill="currentColor" opacity="0.2" rx="2"/>
              </svg>
              <div class="map-marker">
                <div class="marker-pin"></div>
                <div class="marker-pulse"></div>
              </div>
            </div>
            <div class="map-overlay"></div>
          </div>
        </div>
        <div class="office-info">
          <h4>TechCorp Headquarters</h4>
          <p>123 Innovation Drive, San Francisco, CA</p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
