<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard - Zoom Step Indicator Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-viewport">
        <!-- Interactive Micro-Frontend SaaS Pipeline Card Layout Box -->
        <div class="pipeline-container-card">
            <header class="pipeline-header">
                <span class="saas-badge">Workspace Setup</span>
                <h3 class="pipeline-title">Project Provisioning</h3>
                <p class="pipeline-subtitle">Hover over or interact with the step track capsules below to trigger pure-CSS center-origin scaling zoom effects.</p>
            </header>

            <!-- Advanced Pure-CSS Zoom Step Tracking Indicator Canvas Stage Area -->
            <div class="tracker-workspace">
                <div class="zoom-stepper-track">
                    
                    <!-- Step 1: Active Focus Node Circle Capsule -->
                    <div class="step-indicator-bubble active-focus ease-indicator-zoom-1">
                        <div class="bubble-inner-ring">
                            <span class="step-index-id">01</span>
                        </div>
                        <span class="step-meta-tag">Identity</span>
                    </div>

                    <!-- Pipeline Interlocking Connecting Path Line Vector 1 -->
                    <div class="pipeline-line line-active"></div>

                    <!-- Step 2: Idle Pending Node Circle Capsule -->
                    <div class="step-indicator-bubble idle-pending ease-indicator-zoom-2">
                        <div class="bubble-inner-ring">
                            <span class="step-index-id">02</span>
                        </div>
                        <span class="step-meta-tag">Clusters</span>
                    </div>

                    <!-- Pipeline Interlocking Connecting Path Line Vector 2 -->
                    <div class="pipeline-line line-idle"></div>

                    <!-- Step 3: Idle Pending Node Circle Capsule -->
                    <div class="step-indicator-bubble idle-pending ease-indicator-zoom-3">
                        <div class="bubble-inner-ring">
                            <span class="step-index-id">03</span>
                        </div>
                        <span class="step-meta-tag">Finishing</span>
                    </div>

                </div>
            </div>

            <footer class="pipeline-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">SaaS Cluster Provisioning Streams Active</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
