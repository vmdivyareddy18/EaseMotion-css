<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-loading-ellipsis – Animated Ellipsis</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Animated Ellipsis</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Pure CSS animated loading dots – cycles through '.', '..', '...'</p>

    <p class="loading-text ease-text-2xl ease-font-semibold">
      Loading<span class="ease-loading-ellipsis"></span>
    </p>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">No JavaScript – uses CSS @keyframes with content property.</p>
  </div>

</body>
</html>
