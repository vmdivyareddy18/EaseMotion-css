<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Pagination</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <input type="radio" name="page" id="page-1" class="page-trigger" checked />
    <input type="radio" name="page" id="page-2" class="page-trigger" />
    <input type="radio" name="page" id="page-3" class="page-trigger" />
    <input type="radio" name="page" id="page-4" class="page-trigger" />
    <input type="radio" name="page" id="page-5" class="page-trigger" />

    <main class="demo-wrapper">
      <div class="demo-card">
        <div class="demo-header">
          <h1>Flash Pagination</h1>
          <p>A pure CSS active pulse pagination component.</p>
        </div>

        <div class="active-page-banner">
          <span class="pulse-indicator"></span>
          <span class="banner-text">Active Page: </span>
          <span class="page-number num-1">Page 1 Overview</span>
          <span class="page-number num-2">Page 2 System</span>
          <span class="page-number num-3">Page 3 Network</span>
          <span class="page-number num-4">Page 4 Accounts</span>
          <span class="page-number num-5">Page 5 Security</span>
        </div>

        <nav class="flash-pagination" aria-label="Pagination">
          <span class="arrow-container">
            <span class="arrow-btn disabled prev-disabled" aria-disabled="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </span>
            <label
              for="page-1"
              class="arrow-btn prev-btn prev-to-1"
              tabindex="0"
              role="button"
              aria-label="Previous page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </label>
            <label
              for="page-2"
              class="arrow-btn prev-btn prev-to-2"
              tabindex="0"
              role="button"
              aria-label="Previous page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </label>
            <label
              for="page-3"
              class="arrow-btn prev-btn prev-to-3"
              tabindex="0"
              role="button"
              aria-label="Previous page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </label>
            <label
              for="page-4"
              class="arrow-btn prev-btn prev-to-4"
              tabindex="0"
              role="button"
              aria-label="Previous page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 18 9 12 15 6"></polyline>
              </svg>
            </label>
          </span>

          <ul class="page-items">
            <li>
              <label
                for="page-1"
                class="page-item-btn item-1"
                tabindex="0"
                role="button"
                aria-label="Page 1"
              >
                1
                <span class="flash-ring"></span>
              </label>
            </li>
            <li>
              <label
                for="page-2"
                class="page-item-btn item-2"
                tabindex="0"
                role="button"
                aria-label="Page 2"
              >
                2
                <span class="flash-ring"></span>
              </label>
            </li>
            <li>
              <label
                for="page-3"
                class="page-item-btn item-3"
                tabindex="0"
                role="button"
                aria-label="Page 3"
              >
                3
                <span class="flash-ring"></span>
              </label>
            </li>
            <li>
              <label
                for="page-4"
                class="page-item-btn item-4"
                tabindex="0"
                role="button"
                aria-label="Page 4"
              >
                4
                <span class="flash-ring"></span>
              </label>
            </li>
            <li>
              <label
                for="page-5"
                class="page-item-btn item-5"
                tabindex="0"
                role="button"
                aria-label="Page 5"
              >
                5
                <span class="flash-ring"></span>
              </label>
            </li>
          </ul>

          <span class="arrow-container">
            <span class="arrow-btn disabled next-disabled" aria-disabled="true">
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </span>
            <label
              for="page-2"
              class="arrow-btn next-btn next-to-2"
              tabindex="0"
              role="button"
              aria-label="Next page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </label>
            <label
              for="page-3"
              class="arrow-btn next-btn next-to-3"
              tabindex="0"
              role="button"
              aria-label="Next page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </label>
            <label
              for="page-4"
              class="arrow-btn next-btn next-to-4"
              tabindex="0"
              role="button"
              aria-label="Next page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </label>
            <label
              for="page-5"
              class="arrow-btn next-btn next-to-5"
              tabindex="0"
              role="button"
              aria-label="Next page"
            >
              <svg
                viewBox="0 0 24 24"
                width="18"
                height="18"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="9 18 15 12 9 6"></polyline>
              </svg>
            </label>
          </span>
        </nav>
      </div>
    </main>

    <script>
      document.querySelectorAll(".page-item-btn, .arrow-btn").forEach((btn) => {
        btn.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            const targetId = btn.getAttribute("for");
            if (targetId) {
              document.getElementById(targetId).click();
            }
          }
        });
      });

      const inputs = document.querySelectorAll(".page-trigger");
      const buttons = document.querySelectorAll(".page-item-btn");

      function updateAccessibilityStates(activeIndex) {
        buttons.forEach((btn, index) => {
          if (index === activeIndex) {
            btn.setAttribute("aria-current", "page");
          } else {
            btn.removeAttribute("aria-current");
          }
        });
      }

      inputs.forEach((input, index) => {
        input.addEventListener("change", () => {
          if (input.checked) {
            updateAccessibilityStates(index);
          }
        });
      });

      updateAccessibilityStates(0);
    </script>
  </body>
</html>
