<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Float Demo</title>
</head>
<body>
  <h1>Float Utilities</h1>
  
  <div class="clearfix">
    <div class="box float-start">Start (Left)</div>
    <p>This text flows around the floated box because of the float-start utility.</p>
  </div>
  
  <div class="clearfix">
    <div class="box float-end">End (Right)</div>
    <p>This text flows to the left of the box because of the float-end utility.</p>
  </div>
</body>
</html>
