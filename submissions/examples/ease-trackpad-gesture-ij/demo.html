<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trackpad Gesture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="trg-container">
    <h1>Trackpad Gesture</h1>
    <p class="trg-subtitle">Visual trackpad demonstrating swipe, pinch, zoom, and rotate gestures</p>

    <div class="trg-controls">
      <button class="trg-btn" data-gesture="swipe">Swipe</button>
      <button class="trg-btn" data-gesture="pinch">Pinch</button>
      <button class="trg-btn" data-gesture="zoom">Zoom</button>
      <button class="trg-btn" data-gesture="rotate">Rotate</button>
    </div>

    <div class="trg-trackpad" id="trg-trackpad">
      <div class="trg-grid-lines"></div>
      <div class="trg-hand" id="trg-hand">
        <svg class="trg-hand-svg" viewBox="0 0 48 64" fill="none">
          <path d="M24 6 C20 6, 16 10, 16 14 L16 28 L12 26 C8 24, 4 26, 4 30 C4 34, 8 36, 12 34 L22 42 C26 46, 32 46, 36 42 L42 36 C46 32, 46 26, 42 22 L36 18 L30 14 L28 8 C28 6, 26 6, 24 6Z" fill="currentColor"/>
        </svg>
      </div>
      <div class="trg-feedback" id="trg-feedback">
        <span id="trg-feedback-text">Swipe</span>
      </div>
    </div>

    <div class="trg-gesture-info" id="trg-gesture-info">
      <strong>Swipe</strong> — Move one finger across the trackpad to scroll or navigate.
    </div>
  </div>

  <script>
    const hand = document.getElementById('trg-hand');
    const feedback = document.getElementById('trg-feedback');
    const feedbackText = document.getElementById('trg-feedback-text');
    const info = document.getElementById('trg-gesture-info');
    const trackpad = document.getElementById('trg-trackpad');

    const gestures = {
      swipe: {
        keyframes: [
          { transform: 'translate(0, 0) rotate(0deg)', offset: 0 },
          { transform: 'translate(80px, 0) rotate(0deg)', offset: 0.5 },
          { transform: 'translate(0, 0) rotate(0deg)', offset: 1 }
        ],
        feedback: '→ Swipe',
        info: '<strong>Swipe</strong> — Move one finger across the trackpad to scroll or navigate.',
        colors: ['#3b82f6', '#8b5cf6']
      },
      pinch: {
        keyframes: [
          { transform: 'translate(0, 0) scale(1)', offset: 0 },
          { transform: 'translate(0, 0) scale(0.6)', offset: 0.5 },
          { transform: 'translate(0, 0) scale(1)', offset: 1 }
        ],
        feedback: 'Pinch',
        info: '<strong>Pinch</strong> — Bring two fingers together to zoom out.',
        colors: ['#f59e0b', '#ef4444']
      },
      zoom: {
        keyframes: [
          { transform: 'translate(0, 0) scale(1)', offset: 0 },
          { transform: 'translate(0, 0) scale(1.5)', offset: 0.5 },
          { transform: 'translate(0, 0) scale(1)', offset: 1 }
        ],
        feedback: 'Zoom',
        info: '<strong>Zoom</strong> — Spread two fingers apart to zoom in.',
        colors: ['#10b981', '#3b82f6']
      },
      rotate: {
        keyframes: [
          { transform: 'translate(0, 0) rotate(0deg)', offset: 0 },
          { transform: 'translate(0, 0) rotate(180deg)', offset: 0.5 },
          { transform: 'translate(0, 0) rotate(360deg)', offset: 1 }
        ],
        feedback: '↻ Rotate',
        info: '<strong>Rotate</strong> — Twist two fingers to rotate the content.',
        colors: ['#8b5cf6', '#ec4899']
      }
    };

    let currentAnim = null;

    function playGesture(type) {
      if (currentAnim) {
        currentAnim.cancel();
      }

      const data = gestures[type];
      if (!data) return;

      document.querySelectorAll('.trg-btn').forEach(b => b.classList.remove('trg-btn-active'));
      document.querySelector(`.trg-btn[data-gesture="${type}"]`).classList.add('trg-btn-active');

      info.innerHTML = data.info;
      feedbackText.textContent = data.feedback;
      feedback.style.background = `linear-gradient(135deg, ${data.colors[0]}, ${data.colors[1]})`;

      feedback.classList.remove('trg-feedback-active');
      void feedback.offsetWidth;
      feedback.classList.add('trg-feedback-active');

      currentAnim = hand.animate(data.keyframes, {
        duration: 1200,
        easing: 'ease-in-out',
        iterations: 2
      });

      currentAnim.onfinish = () => {
        hand.style.transform = 'translate(0, 0) scale(1) rotate(0deg)';
      };
    }

    document.querySelectorAll('.trg-btn').forEach(btn => {
      btn.addEventListener('click', () => playGesture(btn.dataset.gesture));
    });

    playGesture('swipe');
  </script>
</body>
</html>
