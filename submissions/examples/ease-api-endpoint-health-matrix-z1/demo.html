<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Endpoint Health Matrix</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="matrix-card">
<h2>API Endpoint Health</h2>

<div class="matrix">

<div class="endpoint healthy">
<span>/users</span>
<b>200 OK</b>
</div>

<div class="endpoint healthy">
<span>/orders</span>
<b>200 OK</b>
</div>

<div class="endpoint warning">
<span>/payments</span>
<b>429 Busy</b>
</div>

<div class="endpoint offline">
<span>/reports</span>
<b>503 Down</b>
</div>

<div class="endpoint healthy">
<span>/profile</span>
<b>200 OK</b>
</div>

<div class="endpoint warning">
<span>/search</span>
<b>Slow</b>
</div>

</div>

</section>

</body>
</html>
