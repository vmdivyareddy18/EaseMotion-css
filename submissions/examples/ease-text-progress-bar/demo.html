<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Progress Bar Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Text Progress Bar</h1>
        <p class="subtitle">Progress bar that spells out percentage</p>

        <!-- TEXT PROGRESS BAR COMPONENT -->
        <div class="progress-container">
            <div class="progress-wrapper">
                <!-- Progress Bar -->
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill">
                        <div class="progress-text" id="progressText">0%</div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="progress-controls">
                    <div class="control-group">
                        <label for="progressSlider">Progress:</label>
                        <input type="range" id="progressSlider" min="0" max="100" value="0" />
                        <span id="sliderValue">0%</span>
                    </div>
                    <div class="control-group">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="4" step="0.1" value="1" />
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="control-group">
                        <label for="colorPicker">Color:</label>
                        <input type="color" id="colorPicker" value="#4facfe" />
                    </div>
                </div>

                <div class="progress-actions">
                    <button class="progress-ctrl-btn" id="startBtn">▶ Start</button>
                    <button class="progress-ctrl-btn" id="pauseBtn">⏸ Pause</button>
                    <button class="progress-ctrl-btn" id="resetBtn">⟳ Reset</button>
                    <button class="progress-ctrl-btn" id="completeBtn">✅ Complete</button>
                    <button class="progress-ctrl-btn" id="randomBtn">🎲 Random</button>
                </div>

                <div class="progress-status">
                    <span class="status-label">Progress:</span>
                    <span class="status-value" id="progressDisplay">0%</span>
                    <span class="status-label">State:</span>
                    <span class="status-value" id="stateDisplay">Idle</span>
                    <span class="status-label">Duration:</span>
                    <span class="status-value" id="durationDisplay">0s</span>
                </div>

                <!-- Examples -->
                <div class="progress-examples">
                    <h4>Examples</h4>
                    <div class="examples-grid">
                        <div class="example-card" id="example1">
                            <div class="progress-bar small">
                                <div class="progress-fill" style="width: 45%;">
                                    <div class="progress-text">45%</div>
                                </div>
                            </div>
                            <span class="example-label">Small</span>
                        </div>
                        <div class="example-card" id="example2">
                            <div class="progress-bar large">
                                <div class="progress-fill" style="width: 78%;">
                                    <div class="progress-text">78%</div>
                                </div>
                            </div>
                            <span class="example-label">Large</span>
                        </div>
                        <div class="example-card" id="example3">
                            <div class="progress-bar rounded">
                                <div class="progress-fill" style="width: 32%;">
                                    <div class="progress-text">32%</div>
                                </div>
                            </div>
                            <span class="example-label">Rounded</span>
                        </div>
                        <div class="example-card" id="example4">
                            <div class="progress-bar gradient">
                                <div class="progress-fill" style="width: 91%;">
                                    <div class="progress-text">91%</div>
                                </div>
                            </div>
                            <span class="example-label">Gradient</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-bar">
                        <div class="progress-fill" style="width: 60%;">
                            <div class="progress-text">60%</div>
                        </div>
                    </div>
                    <span class="variant-label">Blue</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-bar success">
                        <div class="progress-fill" style="width: 75%;">
                            <div class="progress-text">75%</div>
                        </div>
                    </div>
                    <span class="variant-label">Success</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-bar danger">
                        <div class="progress-fill" style="width: 40%;">
                            <div class="progress-text">40%</div>
                        </div>
                    </div>
                    <span class="variant-label">Danger</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-bar warning">
                        <div class="progress-fill" style="width: 85%;">
                            <div class="progress-text">85%</div>
                        </div>
                    </div>
                    <span class="variant-label">Warning</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const progressDisplay = document.getElementById('progressDisplay');
            const stateDisplay = document.getElementById('stateDisplay');
            const durationDisplay = document.getElementById('durationDisplay');
            const progressSlider = document.getElementById('progressSlider');
            const speedSlider = document.getElementById('speedSlider');
            const colorPicker = document.getElementById('colorPicker');
            const sliderValue = document.getElementById('sliderValue');
            const speedValue = document.getElementById('speedValue');
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const completeBtn = document.getElementById('completeBtn');
            const randomBtn = document.getElementById('randomBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                duration: 3000, // ms for full progress
                speed: 1,
                color: '#4facfe',
                textColor: '#ffffff',
                onStart: function() {
                    console.log('▶️ Progress started');
                },
                onPause: function() {
                    console.log('⏸️ Progress paused');
                },
                onResume: function() {
                    console.log('▶️ Progress resumed');
                },
                onComplete: function() {
                    console.log('✅ Progress complete!');
                },
                onReset: function() {
                    console.log('⟳ Progress reset');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentProgress = 0;
            let targetProgress = 0;
            let isRunning = false;
            let isPaused = false;
            let isComplete = false;
            let animationId = null;
            let startTime = 0;
            let startValue = 0;
            let elapsedTime = 0;
            let totalDuration = CONFIG.duration;

            // ============================================
            // PROGRESS FUNCTIONS
            // ============================================
            function updateProgress(value, instant = false) {
                currentProgress = Math.min(Math.max(value, 0), 100);
                progressFill.style.width = currentProgress + '%';
                progressText.textContent = Math.round(currentProgress) + '%';
                progressDisplay.textContent = Math.round(currentProgress) + '%';
                progressSlider.value = currentProgress;
                sliderValue.textContent = Math.round(currentProgress) + '%';

                // Update color
                const color = colorPicker.value;
                progressFill.style.background = color;

                // Update state
                if (currentProgress >= 100) {
                    isComplete = true;
                    isRunning = false;
                    stateDisplay.textContent = 'Complete';
                    stateDisplay.style.color = '#34c759';
                    CONFIG.onComplete();
                }
            }

            function animateProgress(timestamp) {
                if (!startTime) startTime = timestamp;
                const delta = (timestamp - startTime) / (totalDuration / CONFIG.speed);
                const progress = Math.min(delta, 1);

                // Ease in-out cubic
                const eased = progress < 0.5 ?
                    4 * progress * progress * progress :
                    1 - Math.pow(-2 * progress + 2, 3) / 2;

                const value = startValue + (targetProgress - startValue) * eased;
                updateProgress(value);

                if (progress < 1 && !isPaused) {
                    animationId = requestAnimationFrame(animateProgress);
                } else if (progress >= 1) {
                    isRunning = false;
                    stateDisplay.textContent = 'Complete';
                    stateDisplay.style.color = '#34c759';
                    CONFIG.onComplete();
                } else {
                    // Paused
                    elapsedTime = timestamp - startTime;
                }
            }

            function startProgress() {
                if (isRunning && !isPaused) return;

                if (isComplete) {
                    resetProgress();
                    setTimeout(() => startProgress(), 100);
                    return;
                }

                if (isPaused) {
                    // Resume
                    isPaused = false;
                    isRunning = true;
                    startTime = performance.now() - elapsedTime;
                    startValue = currentProgress;
                    targetProgress = 100;
                    stateDisplay.textContent = 'Running';
                    stateDisplay.style.color = '#4facfe';
                    CONFIG.onResume();
                    animationId = requestAnimationFrame(animateProgress);
                    return;
                }

                // Fresh start
                isRunning = true;
                isPaused = false;
                isComplete = false;
                startValue = currentProgress;
                targetProgress = 100;
                startTime = 0;
                elapsedTime = 0;
                stateDisplay.textContent = 'Running';
                stateDisplay.style.color = '#4facfe';
                CONFIG.onStart();
                animationId = requestAnimationFrame(animateProgress);
            }

            function pauseProgress() {
                if (!isRunning || isPaused || isComplete) return;
                isPaused = true;
                stateDisplay.textContent = 'Paused';
                stateDisplay.style.color = '#f59e0b';
                CONFIG.onPause();
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }

            function resetProgress() {
                isRunning = false;
                isPaused = false;
                isComplete = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                startTime = 0;
                elapsedTime = 0;
                currentProgress = 0;
                targetProgress = 0;
                updateProgress(0);
                stateDisplay.textContent = 'Idle';
                stateDisplay.style.color = '#6b7280';
                durationDisplay.textContent = '0s';
                CONFIG.onReset();
            }

            function completeProgress() {
                if (isComplete) return;
                if (isRunning) {
                    isRunning = false;
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                }
                isPaused = false;
                targetProgress = 100;
                startValue = currentProgress;
                // Animate to complete
                const remaining = 100 - currentProgress;
                const duration = Math.max(300, (remaining / 100) * totalDuration * 0.5);
                const tempDuration = totalDuration;
                totalDuration = duration;
                startTime = 0;
                isRunning = true;
                CONFIG.onStart();
                animationId = requestAnimationFrame(function completeAnimate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const delta = (timestamp - startTime) / (totalDuration / CONFIG.speed);
                    const progress = Math.min(delta, 1);
                    const eased = progress < 0.5 ?
                        4 * progress * progress * progress :
                        1 - Math.pow(-2 * progress + 2, 3) / 2;
                    const value = startValue + (100 - startValue) * eased;
                    updateProgress(value);
                    if (progress < 1) {
                        animationId = requestAnimationFrame(completeAnimate);
                    } else {
                        isRunning = false;
                        isComplete = true;
                        stateDisplay.textContent = 'Complete';
                        stateDisplay.style.color = '#34c759';
                        CONFIG.onComplete();
                    }
                });
                totalDuration = tempDuration;
            }

            function randomProgress() {
                if (isRunning && !isPaused) {
                    pauseProgress();
                }
                const random = Math.floor(Math.random() * 100) + 1;
                targetProgress = random;
                startValue = currentProgress;
                startTime = 0;
                isRunning = true;
                isPaused = false;
                stateDisplay.textContent = 'Running';
                stateDisplay.style.color = '#4facfe';
                CONFIG.onStart();
                const tempDuration = totalDuration;
                totalDuration = Math.max(500, (Math.abs(random - currentProgress) / 100) * CONFIG.duration);
                animationId = requestAnimationFrame(function randomAnimate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const delta = (timestamp - startTime) / (totalDuration / CONFIG.speed);
                    const progress = Math.min(delta, 1);
                    const eased = progress < 0.5 ?
                        4 * progress * progress * progress :
                        1 - Math.pow(-2 * progress + 2, 3) / 2;
                    const value = startValue + (targetProgress - startValue) * eased;
                    updateProgress(value);
                    if (progress < 1) {
                        animationId = requestAnimationFrame(randomAnimate);
                    } else {
                        isRunning = false;
                        stateDisplay.textContent = 'Idle';
                        stateDisplay.style.color = '#6b7280';
                        CONFIG.onReset();
                    }
                });
                totalDuration = tempDuration;
            }

            function setProgress(value) {
                if (isRunning) {
                    pauseProgress();
                }
                updateProgress(value);
            }

            // ============================================
            // CONTROLS
            // ============================================
            function updateConfig() {
                CONFIG.color = colorPicker.value;
                CONFIG.speed = parseFloat(speedSlider.value);
                speedValue.textContent = CONFIG.speed.toFixed(1) + 'x';
                // Update current color
                progressFill.style.background = CONFIG.color;
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            progressSlider.addEventListener('input', function() {
                const value = parseFloat(this.value);
                sliderValue.textContent = Math.round(value) + '%';
                if (!isRunning || isPaused) {
                    setProgress(value);
                }
            });

            colorPicker.addEventListener('input', updateConfig);
            speedSlider.addEventListener('input', updateConfig);

            startBtn.addEventListener('click', startProgress);
            pauseBtn.addEventListener('click', pauseProgress);
            resetBtn.addEventListener('click', resetProgress);
            completeBtn.addEventListener('click', completeProgress);
            randomBtn.addEventListener('click', randomProgress);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (isRunning && !isPaused) {
                        pauseProgress();
                    } else if (isPaused || !isRunning) {
                        startProgress();
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetProgress();
                }
                if (e.key === 'c' || e.key === 'C') {
                    completeProgress();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const bar = card.querySelector('.variant-bar');
                const fill = bar.querySelector('.progress-fill');
                const label = card.querySelector('.variant-label');
                
                const colors = {
                    'Blue': '#4facfe',
                    'Success': '#34c759',
                    'Danger': '#ff3b30',
                    'Warning': '#f59e0b'
                };
                
                const color = colors[label.textContent] || '#4facfe';
                fill.style.background = color;
                
                card.addEventListener('click', function() {
                    colorPicker.value = color;
                    CONFIG.color = color;
                    progressFill.style.background = color;
                    stateDisplay.textContent = `🎨 ${label.textContent}`;
                    setTimeout(() => {
                        stateDisplay.textContent = isRunning ? (isPaused ? 'Paused' : 'Running') :
                                                    isComplete ? 'Complete' : 'Idle';
                    }, 1500);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.TextProgressBar = {
                start: startProgress,
                pause: pauseProgress,
                reset: resetProgress,
                complete: completeProgress,
                random: randomProgress,
                setProgress: setProgress,
                getProgress: () => currentProgress,
                isRunning: () => isRunning,
                isPaused: () => isPaused,
                isComplete: () => isComplete,
                getState: () => ({
                    progress: currentProgress,
                    running: isRunning,
                    paused: isPaused,
                    complete: isComplete
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        colorPicker.value = config.color;
                        progressFill.style.background = config.color;
                    }
                    if (config.speed) {
                        speedSlider.value = config.speed;
                        speedValue.textContent = config.speed.toFixed(1) + 'x';
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateConfig();
            resetProgress();

            console.log('✅ Text Progress Bar initialized!');
            console.log('📖 API: window.TextProgressBar');
            console.log('📖 Usage:');
            console.log('  - Click Start to begin progress');
            console.log('  - Keyboard shortcuts: Space (start/pause), R (reset), C (complete)');
            console.log('  - Drag slider to set progress manually');

        })();
    </script>
</body>
</html>
