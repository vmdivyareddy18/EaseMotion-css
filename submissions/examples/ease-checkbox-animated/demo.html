<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Checkbox - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Animated Checkbox</h1>
      <p>Custom checkbox featuring a smooth SVG stroke drawing animation.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>Task List</h2>
        
        <div class="checkbox-group">
          
          <!-- Checkbox 1 -->
          <label class="ease-checkbox">
            <input type="checkbox" class="ease-checkbox-input" checked />
            <div class="ease-checkbox-box">
              <svg class="ease-checkbox-svg" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span class="ease-checkbox-label">Design component UI</span>
          </label>

          <!-- Checkbox 2 -->
          <label class="ease-checkbox">
            <input type="checkbox" class="ease-checkbox-input" />
            <div class="ease-checkbox-box ease-checkbox-green">
              <svg class="ease-checkbox-svg" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span class="ease-checkbox-label">Write the CSS animation</span>
          </label>

          <!-- Checkbox 3 -->
          <label class="ease-checkbox">
            <input type="checkbox" class="ease-checkbox-input" />
            <div class="ease-checkbox-box ease-checkbox-purple">
              <svg class="ease-checkbox-svg" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <span class="ease-checkbox-label">Submit Pull Request</span>
          </label>

        </div>
        
      </section>
    </main>
  </div>
</body>
</html>
