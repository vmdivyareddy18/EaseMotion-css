<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="crab">
      <span class="leg lg1"></span>
      <span class="leg lg2"></span>
      <span class="leg lg3"></span>
      <span class="leg lg4"></span>
      <span class="leg lg5"></span>
      <span class="leg lg6"></span>
      <div class="claw lc">
        <span class="upper"></span>
        <span class="lower"></span>
      </div>
      <div class="claw rc">
        <span class="upper"></span>
        <span class="lower"></span>
      </div>
      <span class="shell"></span>
      <span class="stalk sk1"><span class="eyec"></span></span>
      <span class="stalk sk2"><span class="eyec"></span></span>
      <span class="mouthc"></span>
    </div>
    <span class="sand"></span>
  </div>
</body>
</html>
