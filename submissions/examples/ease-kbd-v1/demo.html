<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-kbd Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f8fafc;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .shortcut-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }
    .shortcut-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.9rem;
      color: #475569;
    }
    .keys {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .separator {
      color: #94a3b8;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h2>ease-kbd Component</h2>
  <p style="color:#64748b">Click keys to see the press animation</p>

  <div class="shortcut-list">

    <div class="shortcut-row">
      <span>Search</span>
      <div class="keys">
        <kbd class="ease-kbd">Ctrl</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">K</kbd>
      </div>
    </div>

    <div class="shortcut-row">
      <span>Save</span>
      <div class="keys">
        <kbd class="ease-kbd">Ctrl</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">S</kbd>
      </div>
    </div>

    <div class="shortcut-row">
      <span>Copy</span>
      <div class="keys">
        <kbd class="ease-kbd">Ctrl</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">C</kbd>
      </div>
    </div>

    <div class="shortcut-row">
      <span>Undo</span>
      <div class="keys">
        <kbd class="ease-kbd">Ctrl</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">Z</kbd>
      </div>
    </div>

    <div class="shortcut-row">
      <span>Command Palette</span>
      <div class="keys">
        <kbd class="ease-kbd">Ctrl</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">Shift</kbd>
        <span class="separator">+</span>
        <kbd class="ease-kbd">P</kbd>
      </div>
    </div>

  </div>

</body>
</html>
