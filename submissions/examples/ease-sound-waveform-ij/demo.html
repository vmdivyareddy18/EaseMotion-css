<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<title>Sound Waveform</title>
</head>
<body>
  <main>
    <h1>Sound Waveform</h1>
    <div class="controls">
      <button id="playBtn">&#9654; Play</button>
      <label>Bars: <input type="range" id="barCount" min="8" max="64" value="24"></label>
    </div>
    <div class="waveform" id="waveform"></div>
  </main>
  <script>
    const waveform = document.getElementById('waveform');
    const playBtn = document.getElementById('playBtn');
    const barCount = document.getElementById('barCount');
    let playing = false;
    let animId;

    function getBarColor(i, total) {
      const t = total > 1 ? i / (total - 1) : 0.5;
      const r = Math.round(99 + t * 37);
      const g = Math.round(102 + t * 80);
      const b = Math.round(241 - t * 107);
      return `rgb(${r},${g},${b})`;
    }

    function createBars(count) {
      waveform.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.background = getBarColor(i, count);
        bar.style.setProperty('--i', i);
        waveform.appendChild(bar);
      }
    }

    function animate() {
      if (!playing) return;
      document.querySelectorAll('.bar').forEach(bar => {
        bar.style.height = (10 + Math.random() * 80) + '%';
      });
      animId = requestAnimationFrame(animate);
    }

    playBtn.addEventListener('click', () => {
      playing = !playing;
      playBtn.textContent = playing ? '\u23F8 Pause' : '\u25B6 Play';
      if (playing) animate();
      else cancelAnimationFrame(animId);
    });

    barCount.addEventListener('input', () => {
      createBars(+barCount.value);
      if (playing) animate();
    });

    createBars(+barCount.value);
  </script>
</body>
</html>
