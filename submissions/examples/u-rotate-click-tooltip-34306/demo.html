<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Marketing Landing

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Interactive tooltip component
crafted for marketing landing
pages featuring a smooth
rotate-click transition.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Launch Campaign

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="tag">

New Release

</span>

<h3>

Increase Conversions

</h3>

<p>

A modern CSS-only tooltip
designed for campaigns,
hero sections and
marketing experiences.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
