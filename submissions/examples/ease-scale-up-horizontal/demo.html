<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Up Horizontal - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="bar ease-scale-h"></div>
        <button onclick="let b=document.querySelector('.bar'); b.classList.remove('ease-scale-h'); void b.offsetWidth; b.classList.add('ease-scale-h');">Load Bar</button>
    </div>
</body>
</html>
