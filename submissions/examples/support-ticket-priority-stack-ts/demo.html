<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Ticket Priority Stack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ticket-stack">
    <article class="ticket critical"><span>P1</span><h1>Payment outage</h1><p>SLA: 12 minutes remaining</p></article>
    <article class="ticket high"><span>P2</span><h2>Login failures</h2><p>SLA: 48 minutes remaining</p></article>
    <article class="ticket normal"><span>P3</span><h2>Export delay</h2><p>SLA: 6 hours remaining</p></article>
    <article class="ticket low"><span>P4</span><h2>Copy update</h2><p>SLA: 2 days remaining</p></article>
  </main>
</body>
</html>
