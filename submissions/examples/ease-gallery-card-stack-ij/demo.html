<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Card Stack — Cascade Deck</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card-stack-demo">
    <h1>Gallery Card Stack</h1>
    <p class="subtitle">Cascade-deck animation — hover to spread the stack</p>

    <div class="card-stack" style="--card-width: 220px; --card-height: 300px; --stack-gap: 8px; --fan-duration: 0.5s;">
      <div class="card" data-index="0">
        <img src="https://picsum.photos/id/1015/400/600" alt="Mountain view">
        <div class="card-label">Alpine Peak</div>
      </div>
      <div class="card" data-index="1">
        <img src="https://picsum.photos/id/1018/400/600" alt="City skyline">
        <div class="card-label">Urban Sunset</div>
      </div>
      <div class="card" data-index="2">
        <img src="https://picsum.photos/id/1035/400/600" alt="Coastal shore">
        <div class="card-label">Coastal Dawn</div>
      </div>
      <div class="card" data-index="3">
        <img src="https://picsum.photos/id/1043/400/600" alt="Forest trail">
        <div class="card-label">Forest Path</div>
      </div>
      <div class="card" data-index="4">
        <img src="https://picsum.photos/id/106/400/600" alt="Lake reflection">
        <div class="card-label">Mirror Lake</div>
      </div>
    </div>

    <div class="controls">
      <span>Hover the stack</span>
    </div>
  </div>
</body>
</html>
