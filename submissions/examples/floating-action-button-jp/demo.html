<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Button</title>

  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Floating Action Buttons</h1>
  <p>Animated FABs with ripple effects, hover scaling, and multiple sizes.</p>

  <div class="fab-group">

    <button class="fab small">
      +
    </button>

    <button class="fab">
      +
    </button>

    <button class="fab large">
      +
    </button>

    <button class="fab extended">
      ✨ Create
    </button>

  </div>

</div>

</body>
</html>
