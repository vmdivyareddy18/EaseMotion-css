<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Star Rating Input - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
      background: #f8fafc;
      color: #0f172a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f8fafc; }
    }
    .card {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 24px;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #1e293b; box-shadow: none; }
    }
    h1 { margin-top: 0; font-size: 1.75rem; }
    h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 12px; color: #64748b; }
    /* Re-usable Star SVG template structural styling */
    .star-icon-def { display: none; }
  </style>
</head>
<body>

  <h1>⭐ Animated Star Rating Inputs</h1>
  <p>Pure CSS hover micro-interactions & click-bounce feedback states.</p>

  <svg class="star-icon-def">
    <g id="star-shape">
      <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.21l8.2-1.192z"/>
    </g>
  </svg>

  <div class="card">
    <h2>1. Full-Star Precision (Basic Interactive)</h2>
    <div class="ease-star-rating" role="radiogroup" aria-label="Rate 1 to 5 stars">
      <input type="radio" id="star5" name="basic-rating" value="5" class="ease-star-input">
      <label Skinner for="star5" class="ease-star-label" title="5 Stars"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      
      <input type="radio" id="star4" name="basic-rating" value="4" class="ease-star-input">
      <label for="star4" class="ease-star-label" title="4 Stars"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      
      <input type="radio" id="star3" name="basic-rating" value="3" class="ease-star-input">
      <label for="star3" class="ease-star-label" title="3 Stars"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      
      <input type="radio" id="star2" name="basic-rating" value="2" class="ease-star-input">
      <label for="star2" class="ease-star-label" title="2 Stars"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      
      <input type="radio" id="star1" name="basic-rating" value="1" class="ease-star-input">
      <label for="star1" class="ease-star-label" title="1 Star"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
    </div>
  </div>

  <div class="card">
    <h2>2. Read-Only Static Display (4.0 Stars)</h2>
    <div class="ease-star-rating ease-star-rating-readonly" aria-label="Rating: 4 out of 5 stars">
      <div class="ease-star-label"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></div>
      <div class="ease-star-label ease-star-filled"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></div>
      <div class="ease-star-label ease-star-filled"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></div>
      <div class="ease-star-label ease-star-filled"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></div>
      <div class="ease-star-label ease-star-filled"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></div>
    </div>
  </div>

  <div class="card">
    <h2>3. Half-Star Precision (Clip-path)</h2>
    <div class="ease-star-rating ease-star-rating-half" aria-label="Half star precision input example">
      <div class="ease-star-half-container ease-star-half-left">
        <input type="radio" id="half05" name="half-rating" value="0.5" class="ease-star-input">
        <label for="half05" class="ease-star-label"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      </div>
      <div class="ease-star-half-container ease-star-half-right">
        <input type="radio" id="half10" name="half-rating" value="1.0" class="ease-star-input">
        <label for="half10" class="ease-star-label"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      </div>
      <div class="ease-star-half-container ease-star-half-left">
        <input type="radio" id="half15" name="half-rating" value="1.5" class="ease-star-input">
        <label for="half15" class="ease-star-label"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      </div>
      <div class="ease-star-half-container ease-star-half-right">
        <input type="radio" id="half20" name="half-rating" value="2.0" class="ease-star-input">
        <label for="half20" class="ease-star-label"><svg viewBox="0 0 24 24"><use href="#star-shape"/></svg></label>
      </div>
      <p style="font-size:0.85rem; margin-top:8px; color:#94a3b8;">*Hover left/right sides of individual star cells to target fractional items.</p>
    </div>
  </div>

</body>
</html>
