<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Deployment Stage Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="tracker">
<h2>Deployment Pipeline</h2>
<div class="step done">Build <span>✓</span></div>
<div class="step done">Test <span>✓</span></div>
<div class="step active">Deploy <span>⟳</span></div>
<div class="step">Monitor <span>○</span></div>
<div class="step">Completed <span>○</span></div>
</section>
</body>
</html>
