<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enlarge on Click Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="eci-demo">
    <h1>Image Enlarger</h1>
    <p class="eci-subtitle">Click an image to view enlarged with overlay</p>

    <div class="eci-grid">
      <div class="eci-card" onclick="enlargeImage(this)">
        <div class="eci-img" style="--image-size: 180px;">
          <div class="eci-placeholder" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">
            <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="#fff" stroke-width="2">
              <rect x="4" y="4" width="40" height="40" rx="4"/>
              <circle cx="18" cy="18" r="4"/>
              <path d="M4 34l10-10 8 8 6-6 12 12"/>
            </svg>
          </div>
        </div>
        <span class="eci-caption">Mountain Vista</span>
      </div>

      <div class="eci-card" onclick="enlargeImage(this)">
        <div class="eci-img" style="--image-size: 180px;">
          <div class="eci-placeholder" style="background: linear-gradient(135deg, #ec4899, #f43f5e);">
            <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="#fff" stroke-width="2">
              <circle cx="24" cy="18" r="10"/>
              <path d="M12 40c0-8 5.373-14 12-14s12 6 12 14"/>
            </svg>
          </div>
        </div>
        <span class="eci-caption">Profile Avatar</span>
      </div>

      <div class="eci-card" onclick="enlargeImage(this)">
        <div class="eci-img" style="--image-size: 180px;">
          <div class="eci-placeholder" style="background: linear-gradient(135deg, #10b981, #059669);">
            <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="#fff" stroke-width="2">
              <path d="M8 24h32M24 8v32"/>
            </svg>
          </div>
        </div>
        <span class="eci-caption">Grid Pattern</span>
      </div>

      <div class="eci-card" onclick="enlargeImage(this)">
        <div class="eci-img" style="--image-size: 180px;">
          <div class="eci-placeholder" style="background: linear-gradient(135deg, #f59e0b, #d97706);">
            <svg viewBox="0 0 48 48" width="48" height="48" fill="none" stroke="#fff" stroke-width="2">
              <path d="M24 4L29.09 14.36 40 15.82 32 23.64 34.18 34.36 24 29.09 13.82 34.36 16 23.64 8 15.82 18.91 14.36z"/>
            </svg>
          </div>
        </div>
        <span class="eci-caption">Star Shape</span>
      </div>
    </div>

    <div class="eci-overlay" id="eciOverlay" onclick="closeEnlarged()">
      <div class="eci-enlarged" id="eciEnlarged">
        <button class="eci-close" onclick="closeEnlarged()" aria-label="Close">&times;</button>
      </div>
    </div>
  </main>

  <script>
    function enlargeImage(card) {
      const img = card.querySelector('.eci-placeholder');
      const caption = card.querySelector('.eci-caption').textContent;
      const overlay = document.getElementById('eciOverlay');
      const enlarged = document.getElementById('eciEnlarged');

      const clone = img.cloneNode(true);
      clone.className = 'eci-placeholder eci-clone';
      const capEl = document.createElement('span');
      capEl.className = 'eci-enlarged-caption';
      capEl.textContent = caption;

      enlarged.innerHTML = '';
      enlarged.appendChild(clone);
      enlarged.appendChild(capEl);
      enlarged.querySelector('button')?.remove();

      const closeBtn = document.createElement('button');
      closeBtn.className = 'eci-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.setAttribute('aria-label', 'Close');
      closeBtn.onclick = closeEnlarged;
      enlarged.appendChild(closeBtn);

      overlay.classList.add('eci-overlay--active');
      requestAnimationFrame(() => enlarged.classList.add('eci-enlarged--active'));
      document.body.style.overflow = 'hidden';
    }

    function closeEnlarged() {
      const overlay = document.getElementById('eciOverlay');
      const enlarged = document.getElementById('eciEnlarged');
      enlarged.classList.remove('eci-enlarged--active');
      overlay.addEventListener('transitionend', () => {
        overlay.classList.remove('eci-overlay--active');
      }, { once: true });
      overlay.classList.remove('eci-overlay--active');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeEnlarged();
    });
  </script>
</body>
</html>
