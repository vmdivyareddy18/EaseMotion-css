<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Frosted Code Window</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="window">

  <header class="titlebar">
    <span class="dot red"></span>
    <span class="dot yellow"></span>
    <span class="dot green"></span>
  </header>

  <pre class="editor">
<span class="key">const</span> motion = {
  theme: <span class="str">"aurora"</span>,
  speed: <span class="num">0.8</span>,
  smooth: <span class="bool">true</span>
};
  </pre>

</main>

</body>
</html>
