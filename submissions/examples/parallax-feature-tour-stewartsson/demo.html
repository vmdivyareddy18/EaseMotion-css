<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Tour - Parallax Feature Onboarding Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nature-viewport">
        <!-- Interactive Multi-Layered Parallax Tour Card Display Container -->
        <div class="parallax-tour-card">
            <header class="tour-header">
                <span class="eco-badge">Eco-Onboarding v2</span>
                <h2 class="tour-title">Canopy Exploration</h2>
                <p class="tour-subtitle">Experience smooth multi-layered layout depth tracking using pure-CSS parallax transforms.</p>
            </header>

            <!-- 3D Perspective Depth Scene Container Window -->
            <div class="perspective-window">
                <div class="parallax-scene-mesh">
                    <!-- Layer 3: Deep Forest Background Pattern Backdrop -->
                    <div class="parallax-layer layer-background ease-parallax-depth-3"></div>
                    
                    <!-- Layer 2: Midground Canopy Foliage Structural Nodes -->
                    <div class="parallax-layer layer-midground ease-parallax-depth-2"></div>
                    
                    <!-- Layer 1: Foreground Tooltip Dialog Card Node Overlay -->
                    <div class="parallax-layer layer-foreground ease-parallax-depth-1">
                        <div class="onboarding-tooltip-box">
                            <span class="step-counter">Milestone 01 // Ecosystem</span>
                            <h4 class="tooltip-heading">Forest Canopy Matrix</h4>
                            <p class="tooltip-body-text">Tracks multi-tier biological data tokens across tree crown clusters automatically.</p>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="tour-footer">
                <div class="telemetry-sync-badge">
                    <span class="status-beacon-pulse"></span>
                    <span class="beacon-label">340 Core Nodes Synchronized</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
