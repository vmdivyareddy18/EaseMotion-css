<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Offline Banner</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #e0e5ec; font-family: system-ui, sans-serif; display: flex; flex-direction: column;">
  
  <!-- CSS-only state trigger -->
  <input type="checkbox" id="connection-toggle" class="connection-toggle" checked>
  
  <div class="nav-bar">
    <h3>My App</h3>
    <label for="connection-toggle" class="toggle-btn ease-hover-pop">Toggle Offline State</label>
  </div>

  <div class="main-content">
    <div class="offline-banner ease-slide-down">
      <div class="parallax-bg"></div>
      
      <div class="banner-content">
        <div class="icon-wrapper ease-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
          </svg>
        </div>
        <span>You are currently offline. Some features may be unavailable.</span>
      </div>
    </div>
    
    <div class="dummy-content">
      <div class="skeleton-box neumorphic"></div>
      <div class="skeleton-box neumorphic" style="width: 70%"></div>
      <div class="skeleton-box neumorphic" style="width: 85%"></div>
    </div>
  </div>

</body>
</html>
