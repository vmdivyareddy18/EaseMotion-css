<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Telemetry Showcase — Deep Space Constellation</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="telemetry-dashboard">
    <header class="dashboard-header">
      <div class="header-logo">
        <span class="status-dot pulsing"></span>
        <h2>Constellation Control Center</h2>
      </div>
      <span class="status-pill">Phase #817 Active</span>
    </header>

    <div class="dashboard-content">
      <div class="constellation-visualization">
        <div class="orbital-ring outer-ring">
          <div class="satellite sat-1">
            <span class="sat-icon">🛰️</span>
            <span class="sat-label">SAT-ALPHA</span>
          </div>
        </div>
        <div class="orbital-ring inner-ring">
          <div class="satellite sat-2">
            <span class="sat-icon">🛰️</span>
            <span class="sat-label">SAT-BETA</span>
          </div>
        </div>
        <div class="earth-node">🌍</div>
      </div>

      <div class="telemetry-details">
        <h3>Real-Time Metrics</h3>
        <div class="metrics-grid">
          <div class="metric-card">
            <span class="metric-label">Altitude</span>
            <span class="metric-value">35,786 km</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Inclination</span>
            <span class="metric-value">0.05°</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Downlink Ping</span>
            <span class="metric-value">12 ms</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Link Status</span>
            <span class="metric-value status-ok">CONNECTED</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
