<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>ease-divider Demo</title><style>
:root{--ease-speed-medium:300ms;--ease-ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--ease-color-primary:#6c63ff;--ease-color-neutral-200:#e2e8f0;--ease-color-neutral-900:#0f172a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:var(--ease-color-neutral-900);padding:2rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;color:var(--ease-color-primary)}
.demo-item{background:white;border:1px solid var(--ease-color-neutral-200);border-radius:.75rem;padding:1.5rem;text-align:center;margin-bottom:1rem}
.demo-box{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;background:var(--ease-color-primary);color:white;font-weight:600;font-size:.75rem;border-radius:.5rem;cursor:pointer}
</style></head><body>
<h1>ease-divider — Demo</h1>
<div class="demo-item"><div class="demo-box .ease-divider">.ease-divider</div><p>Hover to see the effect</p></div>
<style>
/* ease-divider utility */
.ease-divider{border:none;border-top:1px solid var(--ease-color-neutral-200,#e2e8f0);margin:1rem 0}
.ease-divider-vertical{display:inline-block;width:1px;height:1.5em;vertical-align:middle;background-color:var(--ease-color-neutral-200,#e2e8f0);margin:0 0.5rem}
.ease-divider-gradient{border:none;height:1px;background:linear-gradient(to right,transparent,var(--ease-color-neutral-300,#cbd5e1),transparent);margin:1rem 0}
.ease-divider-dotted{border:none;border-top:2px dotted var(--ease-color-neutral-300,#cbd5e1);margin:1rem 0}
</style>
</body></html>
