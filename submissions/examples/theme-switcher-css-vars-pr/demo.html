<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Color Theme Switcher Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .ease-theme-card {
      width: 280px;
      text-align: center;
    }

    .ease-theme-card h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
    }

    .ease-theme-card p {
      margin: 0 0 1rem;
      font-size: 0.85rem;
      opacity: 0.75;
    }

    .ease-theme-buttons {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
    }

    .ease-theme-pick {
      border: 1px solid var(--ease-theme-border);
      background: var(--ease-theme-surface);
      color: var(--ease-theme-text);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
  </style>
</head>
<body class="ease-theme-surface">

  <button class="ease-theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
    <span class="ease-theme-icon-light">☀️</span>
    <span class="ease-theme-icon-dark">🌙</span>
  </button>

  <div class="ease-theme-card">
    <h2>Theme Switcher</h2>
    <p>All colors transition smoothly using CSS custom properties.</p>

    <div class="ease-theme-buttons">
      <button class="ease-theme-pick" data-theme="light">Light</button>
      <button class="ease-theme-pick" data-theme="dark">Dark</button>
      <button class="ease-theme-pick" data-theme="ocean">Ocean</button>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const toggle = document.getElementById('themeToggle');

    function setTheme(theme) {
      if (theme === 'light') {
        root.removeAttribute('data-ease-theme');
      } else {
        root.setAttribute('data-ease-theme', theme);
      }
    }

    document.querySelectorAll('.ease-theme-pick').forEach(btn => {
      btn.addEventListener('click', () => setTheme(btn.dataset.theme));
    });

    toggle.addEventListener('click', () => {
      const isDark = root.getAttribute('data-ease-theme') === 'dark';
      setTheme(isDark ? 'light' : 'dark');
    });
  </script>

</body>
</html>
