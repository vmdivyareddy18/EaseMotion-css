<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-swipe-hint – Swipe Hint Animation</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Swipe Hint
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      The card below will shift left‑right briefly to hint it can be swiped.
    </p>

    <!-- Card that swipes left-right on load -->
    <div class="swipe-card ease-card ease-p-6 ease-mx-auto ease-max-w-sm ease-hover-shadow-xl ease-transition">
      <div class="ease-flex ease-items-center ease-justify-center ease-h-32">
        <span class="ease-text-2xl">👈 Swipe me 👉</span>
      </div>
    </div>

    <button id="replay-btn" class="ease-btn ease-btn-secondary ease-hover-scale-105 ease-transition ease-mt-8">
      Replay Hint
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      Plays once on load — a common mobile onboarding pattern.
    </p>
  </div>

  <script>
    const card = document.querySelector('.swipe-card');
    const replayBtn = document.getElementById('replay-btn');

    function playHint() {
      card.classList.remove('swipe-hint');
      void card.offsetWidth; // force reflow to restart animation
      card.classList.add('swipe-hint');
    }

    // Play once on page load
    window.addEventListener('load', () => {
      setTimeout(playHint, 500);
    });

    // Replay on button click
    replayBtn.addEventListener('click', playHint);
  </script>

</body>
</html>
