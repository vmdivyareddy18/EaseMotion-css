<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Glow Pulse Animation - Cyberpunk Neon Layouts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">
    <header class="demo-header">
      <h1>EaseMotion CSS</h1>
      <p>Cyberpunk Neon: Glow Pulse Animation</p>
    </header>

    <div class="ease-cyber-grid">
      
      <!-- Cyan Neon Button -->
      <div class="ease-cyber-component">
        <span class="ease-cyber-label">SYS.OVERRIDE</span>
        <button class="ease-cyber-btn ease-cyber-glow-cyan">
          INITIALIZE
        </button>
      </div>

      <!-- Magenta Neon Button -->
      <div class="ease-cyber-component">
        <span class="ease-cyber-label">NET.BREACH</span>
        <button class="ease-cyber-btn ease-cyber-glow-magenta">
          UPLINK
        </button>
      </div>
      
      <!-- Yellow Neon Status Indicator -->
      <div class="ease-cyber-component">
        <span class="ease-cyber-label">CORE.TEMP</span>
        <div class="ease-cyber-status ease-cyber-glow-yellow">
          CRITICAL
        </div>
      </div>

    </div>
  </main>

</body>
</html>
