<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Donation Progress Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="donation-card">

        <div class="badge">
            ❤️ Fundraising Campaign
        </div>

        <h2>Help Build a Community Library</h2>

        <p class="description">
            Support our initiative to provide books, learning resources,
            and study spaces for underprivileged children.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Campaign Progress</span>
                <span>82%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>₹8,20,000</h3>
                <p>Raised</p>
            </div>

            <div class="stat-box">
                <h3>₹10,00,000</h3>
                <p>Goal</p>
            </div>

        </div>

        <div class="donor-box">
            👥 1,248 Supporters Joined
        </div>

        <div class="milestone-box">
            🏆 Milestone Reached: 80% of Target Achieved
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Donate Now
            </button>

            <button class="secondary-btn">
                Share Campaign
            </button>

        </div>

    </div>

</div>

</body>
</html>
