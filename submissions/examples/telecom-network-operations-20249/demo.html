<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecom NOC Dashboard</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="noc-layout">
        
        <!-- Top Status Bar -->
        <header class="noc-header">
            <div class="brand">
                <span class="status-indicator status-online pulse"></span>
                <h1>GlobalNet NOC</h1>
            </div>
            <div class="global-metrics">
                <div class="metric">
                    <span class="label">Sys Uptime</span>
                    <span class="value text-cyan">99.998%</span>
                </div>
                <div class="metric">
                    <span class="label">Active Alarms</span>
                    <span class="value text-danger blink">3</span>
                </div>
                <div class="metric">
                    <span class="label">Global Traffic</span>
                    <span class="value">42.8 Tbps</span>
                </div>
            </div>
            <div class="time-display">
                14:22:09 UTC
            </div>
        </header>

        <!-- Main Dashboard Area -->
        <main class="noc-content">
            
            <!-- Left Column: Node Matrix -->
            <section class="panel panel-large">
                <header class="panel-header">
                    <h2>US-EAST Core Router Matrix</h2>
                </header>
                <div class="node-grid">
                    <!-- Healthy Nodes -->
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node warning"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node critical active"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node warning"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node offline"></div>
                    <!-- Add more nodes to fill the grid -->
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                    <div class="node healthy"></div><div class="node healthy"></div><div class="node healthy"></div>
                </div>
            </section>

            <!-- Right Column: Details & Alerts -->
            <div class="right-column">
                
                <!-- Latency Monitor (Mocked with CSS) -->
                <section class="panel">
                    <header class="panel-header">
                        <h2>Trans-Atlantic Link Latency</h2>
                    </header>
                    <div class="latency-chart">
                        <!-- Simulated bar chart using CSS heights -->
                        <div class="bar" style="height: 30%"></div>
                        <div class="bar" style="height: 35%"></div>
                        <div class="bar" style="height: 25%"></div>
                        <div class="bar" style="height: 40%"></div>
                        <div class="bar" style="height: 30%"></div>
                        <div class="bar" style="height: 45%"></div>
                        <div class="bar" style="height: 20%"></div>
                        <div class="bar bar-danger" style="height: 85%"></div>
                        <div class="bar bar-danger" style="height: 90%"></div>
                        <div class="bar" style="height: 40%"></div>
                        <div class="bar" style="height: 30%"></div>
                    </div>
                </section>

                <!-- Active Alarms -->
                <section class="panel">
                    <header class="panel-header">
                        <h2>Active Alarms</h2>
                    </header>
                    <div class="alarm-list">
                        <div class="alarm-item alarm-critical">
                            <div class="alarm-time">14:21:05</div>
                            <div class="alarm-desc">BGP Route Flap detected on NY-Edge-04</div>
                        </div>
                        <div class="alarm-item alarm-critical">
                            <div class="alarm-time">14:18:22</div>
                            <div class="alarm-desc">Optical Signal Degrade [Port 1/2/4]</div>
                        </div>
                        <div class="alarm-item alarm-warning">
                            <div class="alarm-time">14:05:11</div>
                            <div class="alarm-desc">High CPU Utilization on FW-London-01</div>
                        </div>
                    </div>
                </section>

            </div>

        </main>
    </div>

</body>
</html>
