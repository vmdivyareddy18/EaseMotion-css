<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shimmer Word Counter Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="ease-container">
        <h1 class="ease-slide-up">✨ Shimmer Word Counter</h1>
        <p class="ease-slide-up ease-delay-100">
            Type in the text area below and watch the word count shimmer!
        </p>

        <!-- Word Counter Component -->
        <div class="ease-word-counter">
            <div class="ease-counter-header">
                <span class="ease-counter-label">📝 Word Count</span>
                <span class="ease-counter-value" id="wordCount">0</span>
            </div>

            <!-- Shimmer Progress Bar -->
            <div class="ease-progress-track">
                <div class="ease-progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>

            <!-- Text Input -->
            <textarea
                class="ease-text-input"
                id="textInput"
                rows="6"
                placeholder="Start typing your blog post here..."
            ></textarea>

            <!-- Stats -->
            <div class="ease-counter-stats">
                <span>📖 <span id="charCount">0</span> characters</span>
                <span>📊 <span id="sentenceCount">0</span> sentences</span>
            </div>
        </div>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const wordCount = document.getElementById('wordCount');
        const charCount = document.getElementById('charCount');
        const sentenceCount = document.getElementById('sentenceCount');
        const progressFill = document.getElementById('progressFill');

        // Target word count for 100% progress
        const TARGET_WORDS = 100;

        textInput.addEventListener('input', () => {
            const text = textInput.value;
            
            // Count words (split by spaces, filter empty)
            const words = text.trim() ? text.trim().split(/\s+/).length : 0;
            
            // Count characters
            const chars = text.length;
            
            // Count sentences (split by . ! ?)
            const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim().length > 0).length : 0;
            
            // Update display
            wordCount.textContent = words;
            charCount.textContent = chars;
            sentenceCount.textContent = sentences;
            
            // Update progress bar (capped at 100%)
            const progress = Math.min((words / TARGET_WORDS) * 100, 100);
            progressFill.style.width = progress + '%';
            
            // Add shimmer effect when near target
            if (words >= TARGET_WORDS) {
                progressFill.classList.add('ease-shimmer-complete');
            } else {
                progressFill.classList.remove('ease-shimmer-complete');
            }
        });
    </script>
</body>
</html>
