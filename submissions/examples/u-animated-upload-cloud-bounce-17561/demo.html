<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Upload Cloud Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Upload Cloud Bounce</h1>

    <p class="intro">
      A reusable cloud upload animation for file managers,
      cloud storage platforms, dashboards, and productivity apps.
    </p>

    <div class="demo-grid">

      <div class="upload-card">
        <div class="upload-cloud">
          <span class="cloud">☁️</span>
          <span class="arrow">⬆️</span>
        </div>
        <h3>Uploading Files</h3>
      </div>

      <div class="upload-card">
        <div class="upload-cloud large">
          <span class="cloud">☁️</span>
          <span class="arrow">⬆️</span>
        </div>
        <p>Cloud Sync Active</p>
      </div>

      <div class="upload-card">
        <div class="upload-cloud">
          <span class="cloud">☁️</span>
          <span class="arrow">⬆️</span>
        </div>
        <button>Upload</button>
      </div>

    </div>

  </main>

</body>
</html>
