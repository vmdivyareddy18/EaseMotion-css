<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Soft Layout Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="neu-sandbox-root">
  <input type="checkbox" id="neu-toggle">
  <button class="neu-trigger-btn" onclick="document.getElementById('neu-toggle').checked = true">Open Soft Layout</button>
  <div class="neu-overlay-mask">
    <div class="neu-modal-card">
      <div class="neu-close-anchor" onclick="document.getElementById('neu-toggle').checked = false">×</div>
      <div class="neu-depth-wrap">
        <h3>Neumorphic Architecture</h3>
        <p>A soft-plastic interface visual model using balanced dual light-source shadows combined with 3D coordinate matrices.</p>
        <div class="neu-flex-row">
          <button class="neu-btn-inset" onclick="document.getElementById('neu-toggle').checked = false">Save Config</button>
          <button class="neu-btn-outset" onclick="document.getElementById('neu-toggle').checked = false">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
