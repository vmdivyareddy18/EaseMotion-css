<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Fade Slide - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-carousel-fade-slide">
    <h2>Fade Slide Carousel</h2>
    <p>Cross-fade transitions between slides</p>
    <div class="carousel-container">
      <div class="carousel-track" id="carouselTrack">
        <input type="radio" name="carousel" id="slide1" checked>
        <input type="radio" name="carousel" id="slide2">
        <input type="radio" name="carousel" id="slide3">
        <input type="radio" name="carousel" id="slide4">
        <div class="carousel-slide" data-index="0">
          <div class="slide-content slide-1">
            <h3>Mountain View</h3>
            <p>Explore the peaks</p>
          </div>
        </div>
        <div class="carousel-slide" data-index="1">
          <div class="slide-content slide-2">
            <h3>Ocean Sunset</h3>
            <p>Endless horizons</p>
          </div>
        </div>
        <div class="carousel-slide" data-index="2">
          <div class="slide-content slide-3">
            <h3>Forest Trail</h3>
            <p>Into the wild</p>
          </div>
        </div>
        <div class="carousel-slide" data-index="3">
          <div class="slide-content slide-4">
            <h3>City Lights</h3>
            <p>Urban nights</p>
          </div>
        </div>
        <div class="carousel-nav">
          <label for="slide1"></label>
          <label for="slide2"></label>
          <label for="slide3"></label>
          <label for="slide4"></label>
        </div>
      </div>
    </div>
    <div class="carousel-arrows">
      <button class="arrow-btn prev" onclick="prevSlide()">←</button>
      <button class="arrow-btn next" onclick="nextSlide()">→</button>
    </div>
  </div>
  <script>
    let current = 0;
    const total = 4;
    function goToSlide(n) {
      current = (n + total) % total;
      document.getElementById('slide' + (current + 1)).checked = true;
    }
    function nextSlide() { goToSlide(current + 1); }
    function prevSlide() { goToSlide(current - 1); }
  </script>
</body>
</html>
