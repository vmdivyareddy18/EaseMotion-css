<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Triggered Animations | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="reveal-showcase-wrapper">
    <header class="showcase-header">
      <h1>Scroll-Triggered Animations</h1>
      <p>A proposal for <code>core/reveal.js</code> using high-performance <code>IntersectionObserver</code>.</p>
      <p class="scroll-instruction">Scroll down to see elements reveal &darr;</p>
    </header>

    <div class="demo-area">
      <div class="spacer"></div>
      
      <div class="reveal-grid">
        <!-- Fade In -->
        <div class="reveal-box em-reveal-pending" data-em-reveal="em-fade-in">
          Fade In
        </div>
        
        <!-- Slide In Up -->
        <div class="reveal-box em-reveal-pending" data-em-reveal="em-slide-in-up" style="transition-delay: 0.1s;">
          Slide In Up
        </div>
        
        <!-- Zoom In -->
        <div class="reveal-box em-reveal-pending" data-em-reveal="em-zoom-in" style="transition-delay: 0.2s;">
          Zoom In
        </div>
      </div>
      
      <div class="spacer"></div>
    </div>
    
  </div>

  <!-- 
    PROPOSAL: IntersectionObserver logic 
    Intended for core/reveal.js
  -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Check for user's motion preference before enabling intersection observer
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      
      if (prefersReducedMotion) {
        // Fallback: Instantly show all elements without animations
        document.querySelectorAll('.em-reveal-pending').forEach(el => {
          el.classList.remove('em-reveal-pending');
          el.classList.add('em-reveal-active');
        });
        return;
      }

      // 2. Setup the IntersectionObserver
      const revealOptions = {
        root: null, // viewport
        rootMargin: '0px 0px -10% 0px', // Trigger slightly before it hits the bottom
        threshold: 0.1 // Trigger when 10% of the element is visible
      };

      const revealCallback = (entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const el = entry.target;
            
            // Remove the pending state
            el.classList.remove('em-reveal-pending');
            
            // Get the specific animation class from data attribute, default to basic active class
            const animationClass = el.getAttribute('data-em-reveal') || 'em-reveal-active';
            el.classList.add(animationClass);
            el.classList.add('em-reveal-active');
            
            // Stop observing once revealed to save resources
            observer.unobserve(el);
          }
        });
      };

      const revealObserver = new IntersectionObserver(revealCallback, revealOptions);

      // 3. Observe all pending elements
      document.querySelectorAll('.em-reveal-pending').forEach(el => {
        revealObserver.observe(el);
      });
    });
  </script>
</body>
</html>
