<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Balloon Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Chat – Balloon Popup</h1>

  <div class="chat-container" id="chatContainer">
    <div class="chat-message other">
      <div class="chat-bubble">Hey, how are you?</div>
    </div>
    <div class="chat-message user">
      <div class="chat-bubble">I'm good, thanks! How about you?</div>
    </div>
    <div class="chat-message other">
      <div class="chat-bubble">Doing great! Want to grab coffee later?</div>
    </div>
    <div class="chat-message user">
      <div class="chat-bubble">Sure, sounds like a plan!</div>
    </div>
  </div>

  <div class="chat-input-row">
    <input type="text" id="messageInput" placeholder="Type a message..." />
    <button id="sendBtn">Send</button>
  </div>

  <script>
    const container = document.getElementById('chatContainer');
    const input = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    let isUser = true;

    function addMessage(text, side) {
      const msg = document.createElement('div');
      msg.className = `chat-message ${side}`;
      msg.innerHTML = `<div class="chat-bubble">${text}</div>`;
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    sendBtn.addEventListener('click', () => {
      const text = input.value.trim();
      if (!text) return;
      const side = isUser ? 'user' : 'other';
      addMessage(text, side);
      isUser = !isUser;
      input.value = '';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });
  </script>
</body>
</html>
