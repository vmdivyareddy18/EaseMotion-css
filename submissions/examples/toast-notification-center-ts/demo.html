<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Center Drawer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Notifications</p>
      <h1 id="demo-title">Notification center drawer</h1>
      <p>A persistent drawer for reviewing recent notifications with unread and category states.</p>
    </section>
    <section class="demo-stage" aria-label="Toast Notification Center Drawer">
      <aside class="notification-center is-open" aria-label="Notifications"><article class="notification-item is-unread"><span>Deploy</span><strong>Export ready</strong><time>2 min ago</time></article><article class="notification-item"><span>Billing</span><strong>Invoice paid</strong><time>18 min ago</time></article><article class="notification-item is-unread"><span>Security</span><strong>New device approved</strong><time>1 hr ago</time></article></aside>
    </section>
  </main>
</body>
</html>
