<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Slide Out Up - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Exiting Up</div>
        <button onclick="document.querySelector('.box').classList.add('ease-slide-up-out');">Slide Up</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-slide-up-out');" style="border-color:#444;">Reset</button>
    </div>
</body>
</html>
