<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Pricing Cards Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-pricing">

    <div class="ease-pricing__toggle">
      <span class="label">Monthly</span>
      <button class="toggle-switch" id="billingToggle" aria-label="Toggle billing period">
        <span class="toggle-knob"></span>
      </button>
      <span class="label">Yearly <span class="save-badge">Save 20%</span></span>
    </div>

    <div class="ease-pricing__grid">

      <div class="ease-pricing__card" data-monthly="9" data-yearly="86">
        <h3>Basic</h3>
        <div class="price"><span class="currency">$</span><span class="amount">9</span><span class="period">/mo</span></div>
        <ul>
          <li>5 Projects</li>
          <li>10GB Storage</li>
          <li>Email Support</li>
        </ul>
        <button class="ease-pricing__cta">Choose Basic</button>
      </div>

      <div class="ease-pricing__card ease-pricing__card--featured" data-monthly="29" data-yearly="278">
        <span class="popular-badge">Most Popular</span>
        <h3>Pro</h3>
        <div class="price"><span class="currency">$</span><span class="amount">29</span><span class="period">/mo</span></div>
        <ul>
          <li>Unlimited Projects</li>
          <li>100GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button class="ease-pricing__cta">Choose Pro</button>
      </div>

      <div class="ease-pricing__card" data-monthly="59" data-yearly="566">
        <h3>Enterprise</h3>
        <div class="price"><span class="currency">$</span><span class="amount">59</span><span class="period">/mo</span></div>
        <ul>
          <li>Unlimited Everything</li>
          <li>1TB Storage</li>
          <li>24/7 Dedicated Support</li>
        </ul>
        <button class="ease-pricing__cta">Choose Enterprise</button>
      </div>

    </div>
  </div>

  <script>
    // 3D tilt tracking
    document.querySelectorAll('.ease-pricing__card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        const rotateX = ((y - centerY) / centerY) * -6;
        const rotateY = ((x - centerX) / centerX) * 6;
        card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-6px)`;
      });
      card.addEventListener('mouseleave', () => {
        card.style.transform = '';
      });
    });

    // Billing toggle with animated price morph
    const toggle = document.getElementById('billingToggle');
    let isYearly = false;

    function animateNumber(el, from, to, period) {
      const duration = 400;
      const start = performance.now();
      function step(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(from + (to - from) * eased);
        el.querySelector('.amount').textContent = value;
        el.querySelector('.period').textContent = period;
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    toggle.addEventListener('click', () => {
      isYearly = !isYearly;
      toggle.classList.toggle('active', isYearly);
      document.querySelectorAll('.ease-pricing__card').forEach(card => {
        const from = isYearly ? +card.dataset.monthly : +card.dataset.yearly;
        const to = isYearly ? +card.dataset.yearly : +card.dataset.monthly;
        animateNumber(card.querySelector('.price'), from, to, isYearly ? '/yr' : '/mo');
      });
    });
  </script>

</body>
</html>
