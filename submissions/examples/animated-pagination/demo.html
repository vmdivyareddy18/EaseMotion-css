<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Pagination - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Pagination Component</h1>
      <p>Smooth, accessible navigation with animated page transitions.</p>
    </header>

    <!-- Demo Content Area -->
    <div class="content-area ease-fade-in-up ease-delay-100">
      <div class="content-card">
        <h2>Product Listing</h2>
        <p>Showing items 1-10 of 100 results</p>
        <div class="placeholder-items">
          <div class="placeholder-item"></div>
          <div class="placeholder-item"></div>
          <div class="placeholder-item"></div>
          <div class="placeholder-item"></div>
          <div class="placeholder-item"></div>
        </div>
      </div>
    </div>

    <!-- Pagination Component -->
    <nav class="pagination-wrapper ease-fade-in-up ease-delay-200" aria-label="Pagination">
      <ul class="pagination">
        
        <!-- Previous Button -->
        <li class="page-item">
          <a href="#" class="page-link prev-btn ease-hover-grow" aria-label="Previous page">
            <span class="arrow">←</span>
            <span class="btn-text">Previous</span>
          </a>
        </li>

        <!-- Page Numbers -->
        <li class="page-item ease-fade-in-up ease-delay-300">
          <a href="#" class="page-link">1</a>
        </li>
        <li class="page-item ease-fade-in-up ease-delay-400">
          <a href="#" class="page-link">2</a>
        </li>
        <li class="page-item ease-fade-in-up ease-delay-500">
          <a href="#" class="page-link active">
            <span class="active-indicator"></span>
            3
          </a>
        </li>
        <li class="page-item ease-fade-in-up ease-delay-600">
          <a href="#" class="page-link">4</a>
        </li>
        <li class="page-item ease-fade-in-up ease-delay-700">
          <a href="#" class="page-link">5</a>
        </li>

        <!-- Ellipsis -->
        <li class="page-item ellipsis ease-fade-in-up ease-delay-800">
          <span class="page-link">...</span>
        </li>

        <!-- More Pages -->
        <li class="page-item ease-fade-in-up ease-delay-900">
          <a href="#" class="page-link">9</a>
        </li>
        <li class="page-item ease-fade-in-up ease-delay-1000">
          <a href="#" class="page-link">10</a>
        </li>

        <!-- Next Button -->
        <li class="page-item">
          <a href="#" class="page-link next-btn ease-hover-grow" aria-label="Next page">
            <span class="btn-text">Next</span>
            <span class="arrow">→</span>
          </a>
        </li>

      </ul>

      <!-- Page Info -->
      <div class="page-info ease-fade-in-up ease-delay-1100">
        <span>Page 3 of 10</span>
      </div>
    </nav>

  </div>
</body>
</html>
