<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard - Floating Orbit Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-viewport">
        <!-- Main Premium Dashboard Card Elevation Container Hub Shell -->
        <div class="dashboard-container-card">
            <header class="dashboard-header">
                <div class="neon-matrix-badge">ORBITAL CORE v5</div>
                <h2 class="dashboard-title">System Status Stream</h2>
                <p class="dashboard-subtitle">Hover over the action trigger node below to reveal the floating orbit popover menu box overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">🌌</span>
                        <span class="btn-text">Initialize Hub Node</span>
                    </button>

                    <!-- Floating Popover Floating Overlay Menu Shell Box -->
                    <div class="floating-orbit-popover ease-orbit-fly">
                        <!-- Floating Micro-Satelite Orbit Planetary Tracker Nodes -->
                        <div class="orbiting-satellite satellite-cyan ease-satellite-loop-1"></div>
                        <div class="orbiting-satellite satellite-pink ease-satellite-loop-2"></div>
                        
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Orbital Operations</h4>
                            <ul class="menu-actions-list">
                                <li class="menu-item"><a href="#telemetry" class="action-link-node">Map Core Telemetry</a></li>
                                <li class="menu-item"><a href="#vector" class="action-link-node">Re-align Trajectories</a></li>
                                <li class="menu-item"><a href="#shutdown" class="action-link-node action-danger">Terminate Stream</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="dashboard-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Custom CSS Orbital parameters Verified</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
