<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-wave-text Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-wave-text gradient-text" style="--ease-wave-height: -18px; --ease-wave-speed: 1s;">
    <span style="--ease-wave-index: 1;">E</span>
    <span style="--ease-wave-index: 2;">a</span>
    <span style="--ease-wave-index: 3;">s</span>
    <span style="--ease-wave-index: 4;">e</span>
    <span style="--ease-wave-index: 5;">M</span>
    <span style="--ease-wave-index: 6;">o</span>
    <span style="--ease-wave-index: 7;">t</span>
    <span style="--ease-wave-index: 8;">i</span>
    <span style="--ease-wave-index: 9;">o</span>
    <span style="--ease-wave-index: 10;">n</span>
  </div>

  <p style="color: #4b5563; margin-top: 1.5rem; font-size: 0.95rem;">
    Calculated delay offsets smoothly roll across letter inline indexes.
  </p>

</body>
</html>
