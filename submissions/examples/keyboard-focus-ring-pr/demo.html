<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keyboard Focus Ring Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 280px;
    }

    h2 {
      margin: 0;
      font-size: 1.05rem;
      color: #333;
    }

    p {
      margin: 0;
      font-size: 0.8rem;
      color: #888;
    }

    button, a, input {
      padding: 0.6rem 1rem;
      font-size: 0.9rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    a, input {
      background: white;
      color: #333;
    }

    /* Custom token override example */
    .ease-focusable.custom-ring {
      --ease-focus-ring-color: #10b981;
      --ease-focus-ring-offset: 4px;
      --ease-focus-ring-radius: 999px;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <h2>Keyboard Focus Demo</h2>
    <p>Click with mouse: no ring. Press Tab: ring appears.</p>

    <button class="ease-focusable">Primary Button</button>
    <a href="#" class="ease-focusable">A Link</a>
    <input class="ease-focusable" type="text" placeholder="Text input" />
    <button class="ease-focusable custom-ring">Custom Green Ring</button>
  </div>

</body>
</html>
