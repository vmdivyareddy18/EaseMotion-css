<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mix Blend Screen Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="blend-sandbox-canvas">
    <h4 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.25rem;">Layer Compositing Matrix</h4>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-top: 0; margin-bottom: 1.5rem;">
      The <code>screen</code> mode effectively brightens the underlying colors. When two overlapping elements use <code>mix-blend-mode: screen</code>, the result is a lighter combination, similar to projecting two light beams onto the same surface.
    </p>

    <div class="compositing-viewport">
      <div class="blend-target-layer ease-blend-screen"></div>
      <div class="blend-overlay-layer ease-blend-screen"></div>
    </div>
  </div>

</body>
</html>
