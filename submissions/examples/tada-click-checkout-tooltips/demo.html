<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="checkout-container">
    <div class="checkout-card">
      <header class="checkout-header">
        <h2>Order Summary</h2>
        <p>Review your total, apply promotional tokens, and confirm your transfer.</p>
      </header>

      <div class="summary-line">
        <span>Subtotal (2 items)</span>
        <span class="price">$210.00</span>
      </div>
      <div class="summary-line highlight">
        <span>Shipping</span>
        <span class="status-free">FREE</span>
      </div>

      <hr class="divider">

      <div class="coupon-wrapper">
        <button class="promo-badge tooltip-container" aria-describedby="tip-promo">
          % Apply Code: HOLIDAY26
          <span id="tip-promo" class="tooltip" role="tooltip">
            🎉 Extra 15% discount successfully injected!
          </span>
        </button>
      </div>

      <div class="summary-line total">
        <span>Total Amount</span>
        <span class="price">$210.00</span>
      </div>

      <button class="checkout-btn tooltip-container" aria-describedby="tip-secure">
        Complete Secure Checkout
        <span id="tip-secure" class="tooltip" role="tooltip">
          🔒 Encryption secure. Relaying transaction packets...
          </span>
      </button>
    </div>
  </main>

</body>
</html>
