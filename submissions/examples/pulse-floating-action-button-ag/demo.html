<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Floating Action Button — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #070a13;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #ffffff;
        gap: 2rem;
      }

      h1 {
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        margin: 0;
        background: linear-gradient(135deg, #00f2fe 0%, #bd55ec 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        text-align: center;
        padding: 0 1rem;
      }
    </style>
  </head>
  <body>
    <h1>Pulse Floating Action Button</h1>

    <div class="ease-pulse-fab-wrapper-ag">
      <button class="ease-pulse-fab-ag" aria-label="Action Button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
          ></path>
        </svg>
        <span class="ease-sr-only">Contact Support</span>
      </button>
      <div class="ease-pulse-ring-ag ease-pulse-ring-1-ag"></div>
      <div class="ease-pulse-ring-ag ease-pulse-ring-2-ag"></div>
    </div>
  </body>
</html>
