<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Carousel with CSS Scroll-Snap Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --ease-color-neutral-300: #cbd5e1;
    }

    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .demo-wrapper {
      max-width: 420px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 0.25rem;
    }

    .hint {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .slide-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .slide-2 { background: linear-gradient(135deg, #10b981, #14b8a6); }
    .slide-3 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <h2>Image Carousel</h2>
    <p class="hint">Swipe / scroll horizontally, or click a dot to jump</p>

    <div class="ease-carousel-wrapper">
      <div class="ease-carousel" id="carousel">
        <div class="ease-carousel-item slide-1" id="slide-1">Slide 1</div>
        <div class="ease-carousel-item slide-2" id="slide-2">Slide 2</div>
        <div class="ease-carousel-item slide-3" id="slide-3">Slide 3</div>
      </div>

      <div class="ease-carousel-nav">
        <a href="#slide-1" class="ease-carousel-dot" aria-label="Go to slide 1"></a>
        <a href="#slide-2" class="ease-carousel-dot" aria-label="Go to slide 2"></a>
        <a href="#slide-3" class="ease-carousel-dot" aria-label="Go to slide 3"></a>
      </div>
    </div>
  </div>

</body>
</html>
