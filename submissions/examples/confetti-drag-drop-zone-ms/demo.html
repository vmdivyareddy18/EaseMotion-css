<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Drag Drop Zone</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f8fafc; font-family: system-ui, sans-serif;">
  
  <div class="drop-container ease-fade-in-up">
    <!-- Checkbox hack to simulate state without JS -->
    <input type="checkbox" id="drop-trigger" class="drop-trigger">
    
    <label for="drop-trigger" class="dropzone ease-hover-scale">
      <div class="upload-icon ease-bounce">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>
      <h3>Drag & Drop files here</h3>
      <p>Or click to browse (simulated drop)</p>
      
      <!-- Confetti Particles -->
      <div class="confetti-container">
        <div class="confetti c1 ease-zoom-in"></div>
        <div class="confetti c2 ease-zoom-in"></div>
        <div class="confetti c3 ease-zoom-in"></div>
        <div class="confetti c4 ease-zoom-in"></div>
        <div class="confetti c5 ease-zoom-in"></div>
        <div class="confetti c6 ease-zoom-in"></div>
      </div>
    </label>
  </div>

</body>
</html>
