<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Music Streaming Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Music Streaming Dashboard</h1>

<p>Streams, listeners and artist insights.</p>

</div>

<button class="action-btn">

+ Upload Song

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">🎵</span>

<h3>Total Streams</h3>

<h2>12.8M</h2>

<div class="progress-bar">

<div class="progress streams"></div>

</div>

</div>

<div class="card">

<span class="icon">🎧</span>

<h3>Listeners</h3>

<h2>3.2M</h2>

<div class="progress-bar">

<div class="progress listeners"></div>

</div>

</div>

<div class="card">

<span class="icon">📀</span>

<h3>Playlists</h3>

<h2>28K</h2>

<div class="progress-bar">

<div class="progress playlists"></div>

</div>

</div>

<div class="card">

<span class="icon">⭐</span>

<h3>Followers</h3>

<h2>842K</h2>

<div class="progress-bar">

<div class="progress followers"></div>

</div>

</div>

</section>

<section class="card activity">

<h2>Recent Activity</h2>

<div class="activity-item">

<h4>Playlist Updated</h4>

<p>Top Hits playlist modified.</p>

</div>

<div class="activity-item">

<h4>Song Released</h4>

<p>New album published.</p>

</div>

<div class="activity-item">

<h4>New Listener</h4>

<p>5,000 users joined today.</p>

</div>

</section>

</div>

</body>

</html>
