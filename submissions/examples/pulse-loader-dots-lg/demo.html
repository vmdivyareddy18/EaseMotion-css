<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulse Loader Dots — Demo</title>
<link rel="stylesheet" href="style.css" />
<style>
  body {
    background: #f1f5f9;
    padding: 3rem 2rem;
    font-family: 'Inter', system-ui, sans-serif;
  }
  .demo-row {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 1rem 1.5rem;
  }
  .demo-label {
    font-size: 0.9rem;
    color: #475569;
    min-width: 140px;
  }
</style>
</head>
<body>

<h2 style="font-family:'Inter',sans-serif; color:#1e293b;">Pulse Loader Dots</h2>

<div class="demo-row">
  <span class="demo-label">Default</span>
  <div class="ease-pulse-loader-dots-lg">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

<div class="demo-row">
  <span class="demo-label">Small</span>
  <div class="ease-pulse-loader-dots-lg ease-pulse-loader-dots-lg--sm">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

<div class="demo-row">
  <span class="demo-label">Large</span>
  <div class="ease-pulse-loader-dots-lg ease-pulse-loader-dots-lg--lg">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

<div class="demo-row">
  <span class="demo-label">Success</span>
  <div class="ease-pulse-loader-dots-lg ease-pulse-loader-dots-lg--success">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

<div class="demo-row">
  <span class="demo-label">Danger</span>
  <div class="ease-pulse-loader-dots-lg ease-pulse-loader-dots-lg--danger">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

<div class="demo-row">
  <span class="demo-label">Neutral</span>
  <div class="ease-pulse-loader-dots-lg ease-pulse-loader-dots-lg--neutral">
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
    <span class="ease-pulse-loader-dots-lg__dot"></span>
  </div>
</div>

</body>
</html>
