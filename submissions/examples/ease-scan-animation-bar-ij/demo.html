<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scan Animation Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ease Scan Animation Bar</h1>

    <!-- Document scan preview -->
    <div class="scan-card">
        <div class="scan-frame">
            <div class="scan-content">
                <div class="line short"></div>
                <div class="line"></div>
                <div class="line long"></div>
                <div class="line"></div>
                <div class="line short"></div>
            </div>
            <div class="ease-scan-animation-bar"></div>
        </div>
        <p class="scan-label">Scanning document…</p>
    </div>

</div>

</body>
</html>
