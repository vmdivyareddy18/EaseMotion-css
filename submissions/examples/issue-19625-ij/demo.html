<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Chart – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chart-wrapper">
    <div class="bar-chart" role="img" aria-label="Animated bar chart with five bars">
      <div class="bar" style="--target-height: 65%"></div>
      <div class="bar" style="--target-height: 85%"></div>
      <div class="bar" style="--target-height: 45%"></div>
      <div class="bar" style="--target-height: 90%"></div>
      <div class="bar" style="--target-height: 55%"></div>
    </div>
    <span class="chart-title">Bar Chart</span>
  </div>
</body>
</html>
