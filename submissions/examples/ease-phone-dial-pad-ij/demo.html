<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Dial Pad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pdp-container">
    <h1>Phone Dial Pad</h1>
    <p class="pdp-subtitle">Press buttons to dial a number</p>

    <div class="pdp-phone">
      <div class="pdp-display">
        <input type="tel" class="pdp-number" id="pdp-number" value="" placeholder="Enter number" readonly>
        <div class="pdp-actions">
          <button class="pdp-backspace" aria-label="Delete last digit">
            <svg viewBox="0 0 24 24" width="22" height="22">
              <path fill="currentColor" d="M22 3H7c-.69 0-1.23.35-1.59.88L0 12l5.41 8.11c.36.53.9.89 1.59.89h15c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3 12.59L17.59 17 14 13.41 10.41 17 9 15.59 12.59 12 9 8.41 10.41 7 14 10.59 17.59 7 19 8.41 15.41 12 19 15.59z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="pdp-pad">
        <div class="pdp-row">
          <button class="pdp-btn" data-digit="1"><span class="pdp-digit">1</span><span class="pdp-letters"></span></button>
          <button class="pdp-btn" data-digit="2"><span class="pdp-digit">2</span><span class="pdp-letters">ABC</span></button>
          <button class="pdp-btn" data-digit="3"><span class="pdp-digit">3</span><span class="pdp-letters">DEF</span></button>
        </div>
        <div class="pdp-row">
          <button class="pdp-btn" data-digit="4"><span class="pdp-digit">4</span><span class="pdp-letters">GHI</span></button>
          <button class="pdp-btn" data-digit="5"><span class="pdp-digit">5</span><span class="pdp-letters">JKL</span></button>
          <button class="pdp-btn" data-digit="6"><span class="pdp-digit">6</span><span class="pdp-letters">MNO</span></button>
        </div>
        <div class="pdp-row">
          <button class="pdp-btn" data-digit="7"><span class="pdp-digit">7</span><span class="pdp-letters">PQRS</span></button>
          <button class="pdp-btn" data-digit="8"><span class="pdp-digit">8</span><span class="pdp-letters">TUV</span></button>
          <button class="pdp-btn" data-digit="9"><span class="pdp-digit">9</span><span class="pdp-letters">WXYZ</span></button>
        </div>
        <div class="pdp-row">
          <button class="pdp-btn" data-digit="*"><span class="pdp-digit">*</span></button>
          <button class="pdp-btn" data-digit="0"><span class="pdp-digit">0</span><span class="pdp-letters">+</span></button>
          <button class="pdp-btn" data-digit="#"><span class="pdp-digit">#</span></button>
        </div>
      </div>

      <button class="pdp-call" aria-label="Call">
        <svg viewBox="0 0 24 24" width="28" height="28">
          <path fill="currentColor" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    const numberInput = document.getElementById('pdp-number');
    const backspaceBtn = document.querySelector('.pdp-backspace');
    const callBtn = document.querySelector('.pdp-call');

    document.querySelectorAll('.pdp-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const digit = btn.dataset.digit;
        numberInput.value += digit;
        numberInput.classList.remove('pdp-empty');
        callBtn.classList.add('pdp-active');
      });
    });

    backspaceBtn.addEventListener('click', () => {
      numberInput.value = numberInput.value.slice(0, -1);
      if (!numberInput.value) {
        numberInput.classList.add('pdp-empty');
        callBtn.classList.remove('pdp-active');
      }
    });

    callBtn.addEventListener('click', () => {
      if (!numberInput.value) return;
      callBtn.classList.add('pdp-ringing');
      setTimeout(() => callBtn.classList.remove('pdp-ringing'), 1500);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') {
        const btn = document.querySelector(`.pdp-btn[data-digit="${e.key}"]`);
        if (btn) btn.click();
      } else if (e.key === 'Backspace') {
        backspaceBtn.click();
      } else if (e.key === 'Enter') {
        callBtn.click();
      }
    });
  </script>
</body>
</html>
