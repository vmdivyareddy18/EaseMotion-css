<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Range Slider Track</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Adjust Settings</h1>
    <div class="slider-group">
      <div class="slider-item">
        <label for="volume">Volume</label>
        <div class="slider-wrapper">
          <input type="range" id="volume" min="0" max="100" value="75">
          <output class="tooltip">75</output>
        </div>
        <span class="value-display">75%</span>
      </div>
      <div class="slider-item">
        <label for="brightness">Brightness</label>
        <div class="slider-wrapper">
          <input type="range" id="brightness" min="0" max="100" value="50">
          <output class="tooltip">50</output>
        </div>
        <span class="value-display">50%</span>
      </div>
      <div class="slider-item">
        <label for="contrast">Contrast</label>
        <div class="slider-wrapper">
          <input type="range" id="contrast" min="0" max="100" value="25">
          <output class="tooltip">25</output>
        </div>
        <span class="value-display">25%</span>
      </div>
    </div>
  </main>
  <script>
    function initSlider(input) {
      const wrapper = input.closest('.slider-wrapper');
      const tooltip = wrapper.querySelector('.tooltip');
      const display = wrapper.nextElementSibling;

      function update() {
        const val = input.value;
        const pct = (val - input.min) / (input.max - input.min) * 100;
        input.style.setProperty('--rst-fill-pct', pct + '%');
        tooltip.textContent = val;
        display.textContent = val + '%';
        tooltip.style.left = 'calc(' + pct + '% + ' + (pct > 90 ? '-50' : pct < 10 ? '-10' : '-25') + 'px)';
      }

      input.addEventListener('input', update);
      update();
    }

    document.querySelectorAll('input[type="range"]').forEach(initSlider);
  </script>
</body>
</html>
