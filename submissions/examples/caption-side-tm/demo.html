<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Caption Side Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Caption Side</h1>
      <p class="subtitle">Positions a table caption above or below the table.</p>
      <span class="badge">CSS Property: caption-side</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">caption-side: top</span>
          <span class="demo-value caption-side-sm">Caption Side variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">caption-side: bottom</span>
          <span class="demo-value caption-side-md">Caption Side variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="caption-side"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
