<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dialog Modal Animation — EaseMotion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="hero">
  <h1 class="hero__title">&lt;dialog&gt; Element</h1>
  <p class="hero__desc">
    Native dialog with <code>showModal()</code> and <code>show()</code>.
    Animated open/close with <code>@starting-style</code>.
  </p>
  <div class="hero__actions">
    <button class="btn btn--primary" id="openModal">Open Modal</button>
    <button class="btn" id="openSimple">Open Non‑Modal</button>
  </div>
</main>

<dialog class="dialog" id="modalDialog">
  <form class="dialog__form" method="dialog">
    <h2 class="dialog__form-title">Join the Newsletter</h2>
    <p class="dialog__form-desc">Get monthly CSS animations and techniques.</p>
    <input type="email" class="dialog__input" name="email" placeholder="you@example.com" required>
    <div class="dialog__actions">
      <button class="btn btn--ghost" value="cancel" formnovalidate>Cancel</button>
      <button class="btn btn--primary btn--sm" value="subscribed">Subscribe</button>
    </div>
  </form>
</dialog>

<dialog class="dialog dialog--simple" id="simpleDialog">
  <div class="dialog__body">
    <p class="dialog__text">This is a non‑modal dialog opened via <code>show()</code>. You can interact with the page behind it.</p>
    <button class="btn btn--ghost close-simple">Close</button>
  </div>
</dialog>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
