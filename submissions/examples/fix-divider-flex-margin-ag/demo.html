<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divider Flex Collapse Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-divider – Flex Collapse Fix</h2>
  <p class="section-label">Horizontal dividers in flex-column</p>
  <div class="flex-col">
    <p class="item">Profile settings</p>
    <div class="ease-divider"></div>
    <p class="item">Notifications</p>
    <div class="ease-divider">or</div>
    <p class="item">Sign in with Google</p>
    <div class="ease-divider ease-divider--dashed"></div>
    <p class="item">Privacy policy</p>
  </div>
  <p class="section-label" style="margin-top:1.5rem">Vertical divider in flex-row</p>
  <div class="flex-row">
    <p class="item">Left content</p>
    <div class="ease-divider ease-divider--vertical"></div>
    <p class="item">Right content</p>
  </div>
</body>
</html>
