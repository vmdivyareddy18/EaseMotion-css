<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Hover Underline - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lhu-main">
    <h1 class="lhu-title">Link Hover Underline</h1>
    <p class="lhu-desc">Animated underline effects on link hover</p>

    <section class="lhu-section">
      <h2 class="lhu-heading">From Center</h2>
      <nav class="lhu-group">
        <a href="#" class="lhu-link lhu-center">Home</a>
        <a href="#" class="lhu-link lhu-center">About</a>
        <a href="#" class="lhu-link lhu-center">Services</a>
        <a href="#" class="lhu-link lhu-center">Portfolio</a>
        <a href="#" class="lhu-link lhu-center">Contact</a>
      </nav>
    </section>

    <section class="lhu-section">
      <h2 class="lhu-heading">From Left</h2>
      <nav class="lhu-group">
        <a href="#" class="lhu-link lhu-left">Dashboard</a>
        <a href="#" class="lhu-link lhu-left">Analytics</a>
        <a href="#" class="lhu-link lhu-left">Settings</a>
        <a href="#" class="lhu-link lhu-left">Profile</a>
        <a href="#" class="lhu-link lhu-left">Logout</a>
      </nav>
    </section>

    <section class="lhu-section">
      <h2 class="lhu-heading">Colored Variants</h2>
      <nav class="lhu-group">
        <a href="#" class="lhu-link lhu-center lhu-accent">Blue</a>
        <a href="#" class="lhu-link lhu-center lhu-green">Green</a>
        <a href="#" class="lhu-link lhu-center lhu-pink">Pink</a>
        <a href="#" class="lhu-link lhu-center lhu-amber">Amber</a>
        <a href="#" class="lhu-link lhu-center lhu-purple">Purple</a>
      </nav>
    </section>
  </main>
  <script>
    document.querySelectorAll('.lhu-link').forEach(link => {
      link.addEventListener('click', e => e.preventDefault());
    });
  </script>
</body>
</html>
