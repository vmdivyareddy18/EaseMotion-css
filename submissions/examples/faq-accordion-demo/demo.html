<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>FAQ Accordion Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<section class="faq">

<h1 class="ease-fade-in">

Frequently Asked Questions

</h1>

<div class="accordion">

<div class="item ease-slide-up">

<button class="question">

What is EaseMotion CSS?

</button>

<div class="answer">

<p>

EaseMotion CSS is a lightweight CSS animation library.

</p>

</div>

</div>

<div class="item ease-slide-up">

<button class="question">

How do I install it?

</button>

<div class="answer">

<p>

Install using the official documentation or CDN.

</p>

</div>

</div>

<div class="item ease-slide-up">

<button class="question">

Is it responsive?

</button>

<div class="answer">

<p>

Yes, it works on desktop, tablet, and mobile devices.

</p>

</div>

</div>

<div class="item ease-slide-up">

<button class="question">

Can I use it with React?

</button>

<div class="answer">

<p>

Yes, it works with React, Vue, Angular and plain HTML.

</p>

</div>

</div>

<div class="item ease-slide-up">

<button class="question">

Is it free?

</button>

<div class="answer">

<p>

Yes, it is open source.

</p>

</div>

</div>

</div>

</section>

<script>

document.querySelectorAll(".question").forEach(button=>{

button.addEventListener("click",()=>{

const answer=button.nextElementSibling;

answer.classList.toggle("show");

});

});

</script>

</body>

</html>
