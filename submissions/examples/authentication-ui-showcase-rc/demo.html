<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authentication UI Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Animated Authentication UI Showcase</h1>

    <!-- Login -->
    <section class="auth-card fade-in">
        <h2>Login</h2>

        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button class="primary-btn">Sign In</button>
    </section>

    <!-- Signup -->
    <section class="auth-card slide-up">
        <h2>Create Account</h2>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email">
        <input type="password" placeholder="Password">

        <button class="primary-btn">Create Account</button>
    </section>

    <!-- Password Recovery -->
    <section class="auth-card zoom-in">
        <h2>Forgot Password</h2>

        <input type="email" placeholder="Enter Email">

        <button class="secondary-btn">Send Reset Link</button>

        <div class="message">
            Reset instructions will be sent to your email.
        </div>
    </section>

    <!-- Success State -->
    <section class="auth-card success-card">
        <div class="success-icon">✓</div>

        <h2>Authentication Successful</h2>

        <p>Your account has been verified successfully.</p>

        <button class="primary-btn">Continue</button>
    </section>

</div>

</body>
</html>
