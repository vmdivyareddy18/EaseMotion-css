<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skeleton Loading Card — EaseMotion</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      margin: 0; min-height: 100vh;
      background: #0f0f0f; font-family: sans-serif;
      display: flex; align-items: center;
      justify-content: center; gap: 24px;
      flex-wrap: wrap; padding: 48px 24px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="skeleton-card">
    <div class="skeleton-header">
      <div class="skeleton-block skeleton-avatar"></div>
      <div class="skeleton-header-text">
        <div class="skeleton-block skeleton-title"></div>
        <div class="skeleton-block skeleton-subtitle"></div>
      </div>
    </div>
    <div class="skeleton-block skeleton-image"></div>
    <div class="skeleton-block skeleton-line"></div>
    <div class="skeleton-block skeleton-line"></div>
    <div class="skeleton-block skeleton-line"></div>
    <div class="skeleton-block skeleton-line"></div>
    <div class="skeleton-footer">
      <div class="skeleton-block skeleton-btn"></div>
      <div class="skeleton-block skeleton-btn"></div>
    </div>
  </div>

</body>
</html>
