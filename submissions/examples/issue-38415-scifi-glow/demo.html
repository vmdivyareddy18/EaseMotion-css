<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Glow Pulse Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .demo-container {
      text-align: center;
    }

    .scifi-button {
      background-color: transparent;
      border: 1px solid #0ff;
      color: #0ff;
      padding: 15px 30px;
      font-size: 1.2rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 4px;
      outline: none;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h2>Sci-Fi Console Action</h2>
    <button class="scifi-button ease-glow-pulse-scifi">Activate Core</button>
  </div>
</body>
</html>
