<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Range Input Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Custom Range Input Component</h1>
    <p class="subtitle">Consistent cross-browser range slider styling using design tokens</p>

    <div class="demo-stack">
      <!-- Basic slider -->
      <div class="demo-item">
        <label class="range-label" for="range1">
          <span>Volume</span>
          <span class="range-value" id="val1">50</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range" id="range1" min="0" max="100" value="50" oninput="updateVal('val1', this.value)">
        </div>
      </div>

      <!-- Primary color slider -->
      <div class="demo-item">
        <label class="range-label" for="range2">
          <span>Brightness</span>
          <span class="range-value" id="val2">75</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range ease-range-primary" id="range2" min="0" max="100" value="75" oninput="updateVal('val2', this.value)">
        </div>
      </div>

      <!-- Success color slider -->
      <div class="demo-item">
        <label class="range-label" for="range3">
          <span>Opacity</span>
          <span class="range-value" id="val3">60</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range ease-range-success" id="range3" min="0" max="100" value="60" oninput="updateVal('val3', this.value)">
        </div>
      </div>

      <!-- Danger color slider -->
      <div class="demo-item">
        <label class="range-label" for="range4">
          <span>Intensity</span>
          <span class="range-value" id="val4">40</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range ease-range-danger" id="range4" min="0" max="100" value="40" oninput="updateVal('val4', this.value)">
        </div>
      </div>

      <!-- Small size -->
      <div class="demo-item">
        <label class="range-label" for="range5">
          <span>Zoom (small)</span>
          <span class="range-value" id="val5">25</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range ease-range-sm" id="range5" min="0" max="100" value="25" oninput="updateVal('val5', this.value)">
        </div>
      </div>

      <!-- Large size -->
      <div class="demo-item">
        <label class="range-label" for="range6">
          <span>Font Size (large)</span>
          <span class="range-value" id="val6">50</span>
        </label>
        <div class="range-wrapper">
          <input type="range" class="ease-range ease-range-lg" id="range6" min="0" max="100" value="50" oninput="updateVal('val6', this.value)">
        </div>
      </div>
    </div>
  </div>

  <script>
    function updateVal(id, val) {
      document.getElementById(id).textContent = val;
      const input = document.getElementById(id.replace('val', 'range'));
      const pct = ((input.value - input.min) / (input.max - input.min)) * 100;
      input.style.setProperty('--range-progress', pct + '%');
    }
  </script>
</body>
</html>
