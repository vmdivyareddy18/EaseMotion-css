<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notification Banner Slide</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='banner-bg')r.style.setProperty('--banner-bg',t.value);if(t.name==='text-color')r.style.setProperty('--text-color',t.value);if(t.name==='icon-color')r.style.setProperty('--icon-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelector('.banner').classList.add('show');document.querySelector('.dismiss').addEventListener('click',()=>{document.querySelector('.banner').classList.remove('show')})})</script>
<div class="container"><p class="title">Notification Banner Slide</p>
<div class="banner"><span class="banner-icon">&#9888;</span><span class="banner-text">Your session will expire in 5 minutes</span><button class="dismiss">&times;</button></div>
<button class="trigger">Show Banner</button>
<div class="controls"><label>BG: <input type="color" name="banner-bg" value="#2d2d44"></label><label>Text: <input type="color" name="text-color" value="#eee"></label><label>Icon: <input type="color" name="icon-color" value="#f72585"></label><label>Speed: <input type="range" name="slide-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div>
<script>document.querySelector('.trigger').addEventListener('click',()=>{document.querySelector('.banner').classList.add('show')})</script></body></html>
