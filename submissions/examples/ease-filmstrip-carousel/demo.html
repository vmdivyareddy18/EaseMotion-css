<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-Only Animated Filmstrip Carousel</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="demo-container">
        <header class="demo-header">
            <h1>Cinematic Filmstrip Carousel</h1>
            <p>A pure CSS infinite scrolling carousel with dynamic sprocket holes. Hover to pause the reel.</p>
        </header>

        <section class="ease-filmstrip-container">
            <div class="ease-filmstrip-reel">
                <div class="ease-filmstrip-track">
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500&auto=format&fit=crop" alt="Cinema projector"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=500&auto=format&fit=crop" alt="Movie theater seats"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&auto=format&fit=crop" alt="Vintage cinema sign"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=500&auto=format&fit=crop" alt="Movie camera lens"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1542204172-e7052809a53e?q=80&w=500&auto=format&fit=crop" alt="Director clapperboard"></div>
                </div>
                
                <div class="ease-filmstrip-track" aria-hidden="true">
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500&auto=format&fit=crop" alt="Cinema projector"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=500&auto=format&fit=crop" alt="Movie theater seats"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=500&auto=format&fit=crop" alt="Vintage cinema sign"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?q=80&w=500&auto=format&fit=crop" alt="Movie camera lens"></div>
                    <div class="film-frame"><img src="https://images.unsplash.com/photo-1542204172-e7052809a53e?q=80&w=500&auto=format&fit=crop" alt="Director clapperboard"></div>
                </div>
            </div>
        </section>
    </main>

</body>
</html>
