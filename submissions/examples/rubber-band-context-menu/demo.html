<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rubber Band Context Menu — Glassmorphism</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper ease-fade-in">

    <h1 class="demo-title">Rubber Band Context Menu</h1>

    <p class="demo-sub">
      A pure CSS glassmorphism context menu with a playful rubber band stretch animation.
    </p>

    <div class="menu-area">

      <button
        class="trigger-button ease-hover-grow"
        aria-label="Open context menu">
        Right Click Area
      </button>

      <nav
        class="context-menu"
        aria-label="Context menu">

        <button class="menu-item">
          <span>✏️</span>
          <span>Edit</span>
        </button>

        <button class="menu-item">
          <span>📋</span>
          <span>Copy</span>
        </button>

        <button class="menu-item">
          <span>📌</span>
          <span>Pin</span>
        </button>

        <button class="menu-item">
          <span>⭐</span>
          <span>Favorite</span>
        </button>

        <button class="menu-item danger">
          <span>🗑</span>
          <span>Delete</span>
        </button>

      </nav>

    </div>

  </div>

</body>
</html>
