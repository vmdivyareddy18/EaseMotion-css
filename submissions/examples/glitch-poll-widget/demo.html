<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch Poll Widget</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Glitch Poll Widget</h1>
  <p class="subtitle">Admin Panel — Glitch Variant</p>

  <div class="widgets-grid">

    <!-- Widget 1: Live Results -->
    <div class="poll-widget glitch-poll" data-total="247">
      <div class="poll-header">
        <h2 class="poll-question" data-text="Which framework do you prefer?">Which framework do you prefer?</h2>
        <span class="poll-meta">247 votes</span>
      </div>

      <div class="poll-options">
        <div class="poll-option" data-percent="42">
          <div class="option-label">
            <span class="option-text" data-text="React">React</span>
            <span class="option-pct">42%</span>
          </div>
          <div class="option-bar-track">
            <div class="option-bar-fill" style="--target-width: 42%">
              <div class="bar-glitch-layer layer-r"></div>
              <div class="bar-glitch-layer layer-g"></div>
              <div class="bar-glitch-layer layer-b"></div>
              <div class="bar-core"></div>
            </div>
          </div>
        </div>

        <div class="poll-option" data-percent="31">
          <div class="option-label">
            <span class="option-text" data-text="Vue.js">Vue.js</span>
            <span class="option-pct">31%</span>
          </div>
          <div class="option-bar-track">
            <div class="option-bar-fill" style="--target-width: 31%">
              <div class="bar-glitch-layer layer-r"></div>
              <div class="bar-glitch-layer layer-g"></div>
              <div class="bar-glitch-layer layer-b"></div>
              <div class="bar-core"></div>
            </div>
          </div>
        </div>

        <div class="poll-option" data-percent="18">
          <div class="option-label">
            <span class="option-text" data-text="Svelte">Svelte</span>
            <span class="option-pct">18%</span>
          </div>
          <div class="option-bar-track">
            <div class="option-bar-fill" style="--target-width: 18%">
              <div class="bar-glitch-layer layer-r"></div>
              <div class="bar-glitch-layer layer-g"></div>
              <div class="bar-glitch-layer layer-b"></div>
              <div class="bar-core"></div>
            </div>
          </div>
        </div>

        <div class="poll-option" data-percent="9">
          <div class="option-label">
            <span class="option-text" data-text="Solid.js">Solid.js</span>
            <span class="option-pct">9%</span>
          </div>
          <div class="option-bar-track">
            <div class="option-bar-fill" style="--target-width: 9%">
              <div class="bar-glitch-layer layer-r"></div>
              <div class="bar-glitch-layer layer-g"></div>
              <div class="bar-glitch-layer layer-b"></div>
              <div class="bar-core"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="poll-footer">
        <span class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="poll-id">#poll-4821</span>
      </div>
    </div>

    <!-- Widget 2: Compact Glitch Card -->
    <div class="poll-widget compact">
      <div class="poll-header">
        <h2 class="poll-question" data-text="Deploy target?">Deploy target?</h2>
        <span class="poll-meta">89 votes</span>
      </div>

      <div class="poll-options compact-list">
        <div class="poll-option compact-row" data-percent="55">
          <div class="option-label">
            <span class="option-text" data-text="Vercel">Vercel</span>
          </div>
          <div class="mini-bar-wrap">
            <div class="option-bar-fill" style="--target-width: 55%">
              <div class="bar-core"></div>
            </div>
          </div>
          <span class="option-pct">55%</span>
        </div>
        <div class="poll-option compact-row" data-percent="30">
          <div class="option-label">
            <span class="option-text" data-text="Cloudflare">Cloudflare</span>
          </div>
          <div class="mini-bar-wrap">
            <div class="option-bar-fill" style="--target-width: 30%">
              <div class="bar-core"></div>
            </div>
          </div>
          <span class="option-pct">30%</span>
        </div>
        <div class="poll-option compact-row" data-percent="15">
          <div class="option-label">
            <span class="option-text" data-text="Railway">Railway</span>
          </div>
          <div class="mini-bar-wrap">
            <div class="option-bar-fill" style="--target-width: 15%">
              <div class="bar-core"></div>
            </div>
          </div>
          <span class="option-pct">15%</span>
        </div>
      </div>

      <div class="poll-footer">
        <span class="live-badge">
          <span class="live-dot"></span>
          LIVE
        </span>
        <span class="poll-id">#poll-4822</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
