<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Weather Icons</title>
    <!-- Use Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Link the EaseMotion CSS core and the component's styles -->
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Basic reset and centering for the demo */
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background-color: #f3f4f6;
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .demo-container {
        background-color: #ffffff;
        padding: 3rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        text-align: center;
      }
      .demo-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 2rem;
      }
    </style>
  </head>
  <body>
    <div class="demo-container ease-fade-in ease-slide-up">
      <h1 class="demo-title">Animated CSS-Only Weather Icons</h1>

      <!-- Use ease utilities to layout the icons -->
      <div class="ease-flex ease-gap-8 ease-justify-center ease-items-center">
        
        <!-- Sun Icon -->
        <div class="weather-sun ease-hover-grow" title="Sunny">
          <div class="sun-core"></div>
        </div>

        <!-- Cloud Icon -->
        <div class="weather-cloud ease-hover-lift" title="Cloudy">
          <div class="cloud-puff cloud-puff-1"></div>
          <div class="cloud-puff cloud-puff-2"></div>
          <div class="cloud-base"></div>
        </div>

        <!-- Rain Icon -->
        <div class="weather-rain ease-hover-lift" title="Rainy">
          <div class="weather-cloud">
            <div class="cloud-puff cloud-puff-1"></div>
            <div class="cloud-puff cloud-puff-2"></div>
            <div class="cloud-base"></div>
          </div>
          <div class="rain-drops-container">
            <div class="rain-drop drop-1"></div>
            <div class="rain-drop drop-2"></div>
            <div class="rain-drop drop-3"></div>
          </div>
        </div>

      </div>
    </div>
  </body>
</html>
