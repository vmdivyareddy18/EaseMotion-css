<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Text — EaseMotion CSS</title>
  <meta name="description" content="Visual gradient text showcase demonstrating shifting color flow loops and custom background clips.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Animated Gradient Text</h1>
      <p class="description">
        Shifting linear color loops. Use the selector below to alter 
        the animation speed dynamically.
      </p>
    </header>

    <main class="showcase">
      <!-- Gradient Text Card under Test -->
      <section class="card">
        <div class="speed-controls">
          <label for="speed-select">Flow Speed:</label>
          <select id="speed-select">
            <option value="fast">Fast (3s)</option>
            <option value="normal" selected>Normal (6s)</option>
            <option value="slow">Slow (12s)</option>
          </select>
        </div>

        <div class="preview-area">
          <h2 class="gradient-text speed-normal" id="target-text">
            Infinite Shifting Color Gradient
          </h2>
          <p class="sub-message">
            This header elements maps a multi-color gradient background clipped directly to the text path.
          </p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const speedSelect = document.getElementById('speed-select');
    const targetText = document.getElementById('target-text');

    speedSelect.addEventListener('change', () => {
      // Clear previous speed classes
      targetText.className = 'gradient-text';
      
      // Add selected speed class
      targetText.classList.add(`speed-${speedSelect.value}`);
    });
  </script>

</body>
</html>
