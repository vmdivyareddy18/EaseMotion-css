<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Notification Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="notification-panel">

<div class="header">
<h2>Notifications</h2>
<span class="badge">3 New</span>
</div>

<div class="card unread">
<div class="icon">📩</div>
<div class="content">
<h3>New Message</h3>
<p>You received a message from Alex.</p>
<small>2 min ago</small>
</div>
</div>

<div class="card">
<div class="icon">🚀</div>
<div class="content">
<h3>Deployment Complete</h3>
<p>Your application was deployed successfully.</p>
<small>15 min ago</small>
</div>
</div>

<div class="card">
<div class="icon">🔔</div>
<div class="content">
<h3>Reminder</h3>
<p>Project review starts at 5 PM.</p>
<small>1 hour ago</small>
</div>
</div>

</div>

</body>
</html>
