<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Join Button Animated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-section">
    <h1>Animated Join Button</h1>
    <div class="join-card">
      <p class="join-description">Click the button to see the full animation cycle: hover, click, loading, and success.</p>
      <button class="join-btn" id="joinBtn" type="button">
        <span class="btn-text">Join</span>
        <span class="btn-loading">
          <span class="dot dot-1"></span>
          <span class="dot dot-2"></span>
          <span class="dot dot-3"></span>
        </span>
        <span class="btn-success">
          <svg class="checkmark" viewBox="0 0 52 52" aria-hidden="true">
            <path class="checkmark-path" d="M14 27l7 7 16-16"/>
          </svg>
        </span>
      </button>
    </div>
    <p class="hint">State: <span id="stateLabel">idle</span></p>
  </div>

  <script>
    const btn = document.getElementById("joinBtn");
    const stateLabel = document.getElementById("stateLabel");
    const btnText = btn.querySelector(".btn-text");
    const btnLoading = btn.querySelector(".btn-loading");
    const btnSuccess = btn.querySelector(".btn-success");

    let isAnimating = false;

    btn.addEventListener("click", async () => {
      if (isAnimating) return;
      isAnimating = true;

      btn.classList.remove("hover");
      btn.classList.add("loading");
      btnText.style.opacity = "0";
      btnLoading.style.opacity = "1";
      stateLabel.textContent = "loading";

      await new Promise((r) => setTimeout(r, 2000));

      btn.classList.remove("loading");
      btn.classList.add("success");
      btnLoading.style.opacity = "0";
      btnSuccess.style.opacity = "1";
      stateLabel.textContent = "success";

      await new Promise((r) => setTimeout(r, 2000));

      btn.classList.remove("success");
      btnText.style.opacity = "1";
      btnSuccess.style.opacity = "0";
      stateLabel.textContent = "idle";
      isAnimating = false;
    });

    btn.addEventListener("mouseenter", () => {
      if (!isAnimating && !btn.classList.contains("success")) {
        btn.classList.add("hover");
      }
    });

    btn.addEventListener("mouseleave", () => {
      btn.classList.remove("hover");
    });
  </script>
</body>
</html>
