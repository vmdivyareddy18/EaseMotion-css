<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Energy Orb</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Energy Orb ✨</h1>
  <p class="ease-slide-up">Move your cursor</p>
</section>

<div class="orb" id="orb"></div>

<script>
const orb = document.getElementById("orb");

let mouseX = 0;
let mouseY = 0;

let posX = 0;
let posY = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animate() {
  posX += (mouseX - posX) * 0.1;
  posY += (mouseY - posY) * 0.1;

  orb.style.left = posX + "px";
  orb.style.top = posY + "px";

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
