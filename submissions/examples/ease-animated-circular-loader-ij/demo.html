<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Circular Loader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Animated Circular Loader</h1>

  <div class="loader-grid">
    <div class="loader-card">
      <div class="loader" style="--loader-duration: 0.8s; --loader-size: 60px; --loader-color: #6366f1;"></div>
      <span class="loader-label">Default</span>
    </div>

    <div class="loader-card">
      <div class="loader" style="--loader-duration: 1.5s; --loader-size: 80px; --loader-border-width: 6px; --loader-color: #f59e0b;"></div>
      <span class="loader-label">Slow</span>
    </div>

    <div class="loader-card">
      <div class="loader" style="--loader-duration: 0.3s; --loader-size: 40px; --loader-color: #10b981;"></div>
      <span class="loader-label">Fast</span>
    </div>

    <div class="loader-card">
      <div class="loader" style="--loader-duration: 1s; --loader-size: 100px; --loader-border-width: 8px; --loader-color: #ef4444; --loader-track-color: #fecaca;"></div>
      <span class="loader-label">Large</span>
    </div>

    <div class="loader-card">
      <div class="loader" style="--loader-duration: 0.6s; --loader-size: 50px; --loader-border-width: 4px; --loader-color: #8b5cf6; --loader-track-color: #ddd6fe;"></div>
      <span class="loader-label">Purple</span>
    </div>

    <div class="loader-card">
      <div class="loader paused" style="--loader-duration: 1s; --loader-size: 60px; --loader-color: #6b7280;"></div>
      <span class="loader-label">Paused</span>
    </div>
  </div>

  <div class="loader-card loading-text-card">
    <div class="loader loading-text-loader" style="--loader-size: 24px; --loader-border-width: 3px; --loader-color: #6366f1;"></div>
    <span class="loading-text">Loading...</span>
  </div>

  <div class="controls">
    <button id="toggleBtn" class="btn">Pause All</button>
  </div>

  <script>
    const btn = document.getElementById('toggleBtn');
    const loaders = document.querySelectorAll('.loader:not(.paused)');

    btn.addEventListener('click', () => {
      const isPausing = btn.textContent === 'Pause All';
      btn.textContent = isPausing ? 'Resume All' : 'Pause All';
      loaders.forEach(el => el.classList.toggle('paused', isPausing));
    });
  </script>
</body>
</html>
