<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Toast Notification</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast-container">

<div class="toast success slide">
    <span class="icon">✔</span>
    <div>
        <h3>Success</h3>
        <p>Your changes have been saved.</p>
    </div>
</div>

<div class="toast info fade">
    <span class="icon">ℹ</span>
    <div>
        <h3>Information</h3>
        <p>New updates are available.</p>
    </div>
</div>

<div class="toast warning bounce">
    <span class="icon">⚠</span>
    <div>
        <h3>Warning</h3>
        <p>Please review your inputs.</p>
    </div>
</div>

<div class="toast error slide">
    <span class="icon">✖</span>
    <div>
        <h3>Error</h3>
        <p>Something went wrong.</p>
    </div>
</div>

</div>

</body>
</html>
