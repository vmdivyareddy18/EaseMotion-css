<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Step Indicator - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stepper-container-qn">
        <h2>Checkout Process</h2>
        
        <!-- Step Indicator -->
        <div class="step-indicator-qn">
            <!-- Step 1: Completed -->
            <div class="step-qn completed-qn">
                <div class="step-circle-qn">
                    <svg class="step-check-qn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span class="step-number-qn">1</span>
                </div>
                <div class="step-label-qn">
                    <span class="step-title-qn">Cart</span>
                    <span class="step-desc-qn">Review items</span>
                </div>
            </div>

            <!-- Connecting Line 1 -->
            <div class="step-line-qn completed-qn"></div>

            <!-- Step 2: Completed -->
            <div class="step-qn completed-qn">
                <div class="step-circle-qn">
                    <svg class="step-check-qn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                    <span class="step-number-qn">2</span>
                </div>
                <div class="step-label-qn">
                    <span class="step-title-qn">Shipping</span>
                    <span class="step-desc-qn">Delivery info</span>
                </div>
            </div>

            <!-- Connecting Line 2 -->
            <div class="step-line-qn completed-qn"></div>

            <!-- Step 3: Active -->
            <div class="step-qn active-qn">
                <div class="step-circle-qn">
                    <span class="step-number-qn">3</span>
                </div>
                <div class="step-label-qn">
                    <span class="step-title-qn">Payment</span>
                    <span class="step-desc-qn">Add payment</span>
                </div>
            </div>

            <!-- Connecting Line 3 -->
            <div class="step-line-qn"></div>

            <!-- Step 4: Upcoming -->
            <div class="step-qn">
                <div class="step-circle-qn">
                    <span class="step-number-qn">4</span>
                </div>
                <div class="step-label-qn">
                    <span class="step-title-qn">Review</span>
                    <span class="step-desc-qn">Confirm order</span>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="step-content-qn">
            <div class="content-card-qn">
                <h3>Payment Information</h3>
                <p>You are currently on step 3 of 4. Complete your payment details to proceed.</p>
                <button class="next-btn-qn">Continue to Review</button>
            </div>
        </div>
    </div>
</body>
</html>
