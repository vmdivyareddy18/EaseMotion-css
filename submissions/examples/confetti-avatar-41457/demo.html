<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Premium Confetti Avatar (SaaS Tier)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-viewport">
    <div class="glass-card em-fade-in">
      
      <!-- Premium Upgrade Alert Badge -->
      <div class="badge-row">
        <span class="premium-badge">Enterprise Tier</span>
      </div>

      <!-- Interactive Confetti Avatar Module -->
      <div class="avatar-canvas">
        <div class="avatar-ring-glow"></div>
        
        <!-- The Emitter is now independent and layered BEHIND the avatar image -->
        <div class="confetti-emitter">
          <!-- Left-bursting particles -->
          <span class="particle p1 gold square"></span>
          <span class="particle p2 silver circle"></span>
          <span class="particle p3 gold stripe"></span>
          <span class="particle p4 silver circle"></span>
          <span class="particle p5 champagne square"></span>

          <!-- Right-bursting particles -->
          <span class="particle p6 gold stripe"></span>
          <span class="particle p7 silver square"></span>
          <span class="particle p8 champagne circle"></span>
          <span class="particle p9 gold square"></span>
          <span class="particle p10 champagne stripe"></span>

          <!-- Top/Vertical-bursting particles -->
          <span class="particle p11 silver circle"></span>
          <span class="particle p12 gold stripe"></span>
          <span class="particle p13 champagne square"></span>
          <span class="particle p14 silver circle"></span>
        </div>

        <div class="avatar-frame-container">
          <!-- The Central Profile Avatar (Stays clean on top) -->
          <img class="avatar-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=150&auto=format&fit=crop&q=80" alt="Sarah Jenkins Premium Profile">
        </div>
      </div>

      <!-- User Information Details -->
      <div class="profile-details">
        <h3>Sarah Jenkins</h3>
        <p class="role-title">Chief Executive Officer</p>
        <p class="organization">Acme Global Holdings</p>
      </div>

      <!-- CTA Action Button -->
      <button class="upgrade-btn" id="trigger-btn">
        <span>Trigger Celebration Event</span>
      </button>
      
      <p class="help-text">Hover or click the profile to replay animation</p>
    </div>
  </div>

  <script>
    // Purely for demo triggers to make testing easy
    const btn = document.getElementById('trigger-btn');
    const emitter = document.querySelector('.confetti-emitter');
    
    btn.addEventListener('click', () => {
      emitter.classList.remove('active');
      void emitter.offsetWidth; // Trigger reflow
      emitter.classList.add('active');
    });
  </script>
</body>
</html>
