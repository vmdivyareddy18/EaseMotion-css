<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 406 - Digital Twin Operations Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>Digital Twin Operations Center</h1>
        <div class="hero-stats">
            <div class="stat-card">
                <span class="stat-value">98.7%</span>
                <span class="stat-label">Twin Health</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">2,456</span>
                <span class="stat-label">Connected Assets</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">99.2%</span>
                <span class="stat-label">Simulation Accuracy</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">Real-Time</span>
                <span class="stat-label">Synchronization</span>
            </div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Asset Overview</h2>
            <div class="grid-4">
                <div class="card"><h3>Active Sensors</h3><div class="value">8,234</div></div>
                <div class="card"><h3>Predictions</h3><div class="value">127</div></div>
                <div class="card"><h3>Efficiency</h3><div class="value">94.5%</div></div>
                <div class="card"><h3>Alerts</h3><div class="value">12</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Executive Dashboard</h2>
            <div class="grid-3">
                <div class="card exec"><h3>Overall Health</h3><div class="exec-value">98.7%</div></div>
                <div class="card exec"><h3>Cost Savings</h3><div class="exec-value">$4.2M</div></div>
                <div class="card exec"><h3>Uptime</h3><div class="exec-value">99.9%</div></div>
            </div>
        </section>
    </main>
</body>
</html>
