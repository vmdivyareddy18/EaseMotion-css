<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zen-garden</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zen Garden</h1>
    <div class="animation-wrapper">
      <div class="garden">
        <div class="sand"></div>
        <div class="stone stone-1"></div>
        <div class="stone stone-2"></div>
        <div class="stone stone-3"></div>
        <div class="ripple ripple-1"></div>
        <div class="ripple ripple-2"></div>
        <div class="ripple ripple-3"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Sand Color
        <input type="color" class="js-color" value="#d4a574" data-var="--sand-color" />
      </label>
      <label>
        Stone Color
        <input type="color" class="js-color" value="#888" data-var="--stone-color" />
      </label>
      <label>
        Ripple Duration
        <input type="range" class="js-range" min="1" max="8" step="0.5" value="3" data-var="--ripple-duration" />
        <span class="js-range-value">3s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
