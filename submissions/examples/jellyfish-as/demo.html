<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jellyfish</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sea">
    <div class="jelly">
      <div class="bell">
        <span class="spot s1"></span>
        <span class="spot s2"></span>
        <span class="spot s3"></span>
      </div>
      <div class="tentacles">
        <span class="tentacle t1"></span>
        <span class="tentacle t2"></span>
        <span class="tentacle t3"></span>
        <span class="tentacle t4"></span>
        <span class="tentacle t5"></span>
      </div>
    </div>
  </div>
</body>
</html>
