<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - CSS Component Registry</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 152 • Developer Platform</span>
        <h1>CSS Component Registry</h1>
        <p class="subtitle">Reusable component catalog.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card main-panel">
          <h3>🧩 Active Categories</h3>
          <div class="catalog-grid">
            <div class="catalog-item">
              <h4>Cards & Bento Tiles</h4>
              <p>12 custom styles</p>
            </div>
            <div class="catalog-item">
              <h4>Headers & Navigation</h4>
              <p>8 custom styles</p>
            </div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Core Hub</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
