<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verification Input</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h2 class="card-title">Email Verification</h2>
    <p class="card-subtitle">Type an email to see the animated validation</p>

    <div class="input-group">
      <div class="input-wrapper" data-testid="input-wrapper">
        <span class="input-icon">@</span>
        <input type="email" class="email-input" placeholder="you@example.com" autocomplete="email" />
        <span class="status-icon" data-testid="status-icon"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" data-testid="progress-fill"></div>
      </div>
    </div>

    <div class="status-message" data-testid="status-message">
      <span class="msg-text">Enter an email address</span>
    </div>

    <div class="rules">
      <div class="rule" data-rule="format">
        <span class="dot"></span> Valid format (user@domain.tld)
      </div>
      <div class="rule" data-rule="domain">
        <span class="dot"></span> Recognized domain
      </div>
      <div class="rule" data-rule="length">
        <span class="dot"></span> Reasonable length
      </div>
    </div>

    <div class="controls-row">
      <div class="ctrl">
        <label>Check Duration</label>
        <input type="range" class="check-duration" min="200" max="1500" value="600" step="50" />
        <span class="val cd-val">600ms</span>
      </div>
    </div>

    <button class="verify-btn" disabled data-testid="verify-btn">Verify</button>
  </div>

  <script>
    const input = document.querySelector('.email-input');
    const wrapper = document.querySelector('.input-wrapper');
    const statusIcon = document.querySelector('.status-icon');
    const statusMsg = document.querySelector('.status-message');
    const progressFill = document.querySelector('.progress-fill');
    const verifyBtn = document.querySelector('.verify-btn');
    const cdSlider = document.querySelector('.check-duration');
    const cdVal = document.querySelector('.cd-val');
    const rules = {
      format: document.querySelector('[data-rule="format"]'),
      domain: document.querySelector('[data-rule="domain"]'),
      length: document.querySelector('[data-rule="length"]'),
    };

    const validDomains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com', 'proton.me', 'icloud.com', 'example.com', 'hey.com', 'fastmail.com'];

    let checkTimeout;

    cdSlider.addEventListener('input', () => {
      const dur = parseInt(cdSlider.value);
      cdVal.textContent = dur + 'ms';
      document.documentElement.style.setProperty('--check-duration', dur + 'ms');
    });

    function validate(email) {
      const formatRule = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      const domain = email.split('@')[1] || '';
      const domainRule = validDomains.includes(domain.toLowerCase());
      const lengthRule = email.length >= 5 && email.length <= 320;

      return { format: formatRule, domain: domainRule, length: lengthRule };
    }

    input.addEventListener('input', () => {
      clearTimeout(checkTimeout);
      const val = input.value.trim();

      if (val.length === 0) {
        wrapper.classList.remove('valid', 'invalid', 'checking');
        statusIcon.className = 'status-icon';
        statusMsg.className = 'status-message';
        statusMsg.innerHTML = '<span class="msg-text">Enter an email address</span>';
        progressFill.style.width = '0%';
        verifyBtn.disabled = true;
        Object.values(rules).forEach(r => r.classList.remove('pass', 'fail'));
        return;
      }

      wrapper.classList.add('checking');
      statusIcon.className = 'status-icon checking';
      statusMsg.className = 'status-message checking';
      statusMsg.innerHTML = '<span class="msg-text">Checking...</span>';
      progressFill.style.transition = `width ${cdSlider.value}ms ease-in-out`;
      progressFill.style.width = '100%';

      checkTimeout = setTimeout(() => {
        const result = validate(val);
        const allPass = result.format && result.domain && result.length;

        Object.keys(rules).forEach(key => {
          rules[key].classList.remove('pass', 'fail');
          rules[key].classList.add(result[key] ? 'pass' : 'fail');
        });

        wrapper.classList.remove('checking');
        statusIcon.className = 'status-icon';

        if (allPass) {
          wrapper.classList.add('valid');
          wrapper.classList.remove('invalid');
          statusIcon.classList.add('valid');
          statusMsg.className = 'status-message valid';
          statusMsg.innerHTML = '<span class="msg-text">✓ Email looks good!</span>';
          verifyBtn.disabled = false;
        } else {
          wrapper.classList.add('invalid');
          wrapper.classList.remove('valid');
          statusIcon.classList.add('invalid');
          statusMsg.className = 'status-message invalid';
          statusMsg.innerHTML = '<span class="msg-text">✗ Please fix the issues below</span>';
          verifyBtn.disabled = true;
        }
      }, parseInt(cdSlider.value));
    });

    verifyBtn.addEventListener('click', () => {
      const dur = parseInt(cdSlider.value);
      verifyBtn.classList.add('sending');
      verifyBtn.textContent = 'Sending...';
      setTimeout(() => {
        verifyBtn.classList.remove('sending');
        verifyBtn.textContent = '✓ Verified!';
        verifyBtn.style.background = 'linear-gradient(135deg, #4ade80, #22d3ee)';
        setTimeout(() => {
          verifyBtn.textContent = 'Verify';
          verifyBtn.style.background = '';
        }, 2000);
      }, dur);
    });
  </script>
</body>
</html>
