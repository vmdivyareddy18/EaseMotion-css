<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Transition Fade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="ptf-content" id="ptfContent">
    <h1>Page Transition Fade</h1>
    <p>This content fades in with a smooth upward motion on page load.</p>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quisquam, voluptatum.</p>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      requestAnimationFrame(() => {
        document.getElementById('ptfContent').classList.add('ptf-visible');
      });
    });
  </script>
</body>
</html>
