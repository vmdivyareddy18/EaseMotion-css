<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter OTP Input</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper ease-fade-in">

    <h1 class="demo-title">Typewriter OTP Input</h1>

    <p class="demo-sub">
      A pure CSS OTP input concept with a typewriter-inspired cursor animation for creative interfaces.
    </p>

    <div class="otp-card">

      <h2 class="otp-heading">
        Enter Verification Code
      </h2>

      <div
        class="otp-container"
        aria-label="One-time password">

        <div class="otp-box">8</div>
        <div class="otp-box">2</div>
        <div class="otp-box">4</div>
        <div class="otp-box">1</div>
        <div class="otp-box">7</div>
        <div class="otp-box">9</div>

        <div class="typewriter-cursor" aria-hidden="true"></div>

      </div>

      <button
        class="ease-btn ease-btn-primary ease-hover-grow">
        Verify
      </button>

    </div>

  </div>

</body>
</html>
