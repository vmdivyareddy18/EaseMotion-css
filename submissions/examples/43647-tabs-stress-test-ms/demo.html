<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs Stress Test Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-stress-container">
    <div class="ease-stress-header">
      <h2 class="ease-stress-title">50-Tab Stress Test</h2>
      <p class="ease-stress-desc">Evaluating performance when rapidly switching between high volumes of animated tab panels.</p>
    </div>

    <div class="ease-stress-layout">
      
      <div id="tabsContainer" class="ease-stress-tabs-wrapper">
        <!-- 50 tabs injected by JS -->
      </div>

      <div id="panelContainer" class="ease-stress-panel ease-fade-in-up">
        Panel 1 Content
      </div>

    </div>
  </div>

  <script>
    const tabsContainer = document.getElementById('tabsContainer');
    const panelContainer = document.getElementById('panelContainer');
    const totalTabs = 50;

    let activeIndex = 1;

    function createTabs() {
      for (let i = 1; i <= totalTabs; i++) {
        const btn = document.createElement('button');
        btn.className = `ease-stress-tab ${i === activeIndex ? 'active' : ''} ease-hover-lift`;
        btn.textContent = `Tab ${i}`;
        
        btn.onclick = () => {
          // Update active button state
          const currentActive = tabsContainer.querySelector('.active');
          if (currentActive) currentActive.classList.remove('active');
          btn.classList.add('active');
          
          // Trigger panel animation
          panelContainer.classList.remove('ease-fade-in-up');
          void panelContainer.offsetWidth; // Force reflow
          panelContainer.classList.add('ease-fade-in-up');
          
          panelContainer.textContent = `Panel ${i} Content`;
        };
        
        tabsContainer.appendChild(btn);
      }
    }

    createTabs();
  </script>

</body>
</html>
