<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Coming Soon</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #fafafa; font-family: system-ui, sans-serif;">
  
  <div class="coming-soon-container ease-zoom-in">
    <!-- Image that scales continuously via ease-pulse overridden to scale -->
    <div class="product-preview">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="New Sneaker Drop" class="preview-img">
      <div class="overlay-text">
        <span class="badge">Exclusive Drop</span>
        <h2>Next-Gen Kicks</h2>
        <p>Dropping this Friday. Don't miss out.</p>
        
        <div class="countdown">
          <div class="time-box">
            <span class="num">02</span>
            <span class="label">Days</span>
          </div>
          <div class="time-box">
            <span class="num">14</span>
            <span class="label">Hours</span>
          </div>
          <div class="time-box">
            <span class="num">45</span>
            <span class="label">Mins</span>
          </div>
        </div>
        
        <button class="notify-btn ease-hover-scale">Remind Me</button>
      </div>
    </div>
  </div>

</body>
</html>
