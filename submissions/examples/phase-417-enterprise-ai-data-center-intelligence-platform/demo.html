<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 417 - AI Data Center Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>AI Data Center Intelligence</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">87%</span><span class="stat-label">GPU Utilization</span></div>
            <div class="stat-card"><span class="stat-value">234</span><span class="stat-label">Running Jobs</span></div>
            <div class="stat-card"><span class="stat-value">1.12</span><span class="stat-label">PUE Rating</span></div>
            <div class="stat-card"><span class="stat-value">Healthy</span><span class="stat-label">Cluster</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>GPU Cluster Status</h2>
            <div class="grid-4">
                <div class="card"><h3>A100 GPUs</h3><div class="value">156/192</div></div>
                <div class="card"><h3>H100 GPUs</h3><div class="value">89/128</div></div>
                <div class="card"><h3>Power Draw</h3><div class="value">45 MW</div></div>
                <div class="card"><h3>Temperature</h3><div class="value">42C</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Executive Infrastructure</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Training Jobs</h3><div class="exec-value">45 Active</div></div>
                <div class="exec-card"><h3>Inference</h3><div class="exec-value">1.2M req/s</div></div>
                <div class="exec-card"><h3>Uptime</h3><div class="exec-value success">99.99%</div></div>
            </div>
        </section>
    </main>
</body>
</html>
