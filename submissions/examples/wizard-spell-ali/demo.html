<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Wizard Spell Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="spell-nexus">
    <div class="arcane-altar">
      
      <!-- Ambient magical aura layers -->
      <div class="spell-aura halo-outer"></div>
      <div class="spell-aura halo-inner"></div>
      
      <!-- Geometric Spell Seals -->
      <div class="conjured-seal seal-alpha"></div>
      <div class="conjured-seal seal-beta"></div>
      
      <!-- The casting catalyst crystal -->
      <div class="mystic-catalyst">
        <div class="essence-glow"></div>
        <span class="rune-glyph">🔮</span>
      </div>

      <!-- Outward Spark Particles -->
      <div class="arcane-spark sp-1"></div>
      <div class="arcane-spark sp-2"></div>
      <div class="arcane-spark sp-3"></div>
      <div class="arcane-spark sp-4"></div>
      
    </div>
    <p class="nexus-hint">Hover to channel cosmic wizard energy</p>
  </div>

</body>
</html>
