<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-hover-sink-isk</title>
  <meta name="description" content="A demonstration of the ease-hover-sink-isk animation showing elements sinking downward and shadows reducing on hover.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hover-sink-isk</h1>
      <p class="subtitle" id="main-desc">Hover over the elements below to see them press down into the surface</p>
    </header>

    <div class="display-area">
      <!-- Demo Button -->
      <button class="demo-button ease-hover-sink-isk" id="button-target">
        Clicky Button
      </button>

      <!-- Demo Card -->
      <div class="demo-card ease-hover-sink-isk" id="card-target">
        <h3>Pressable Card</h3>
        <p>This card sinks downward and its shadow decreases on hover to simulate physical contact and compression.</p>
      </div>
    </div>
  </main>

</body>
</html>
