<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quote Fade In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main>
    <h1>Quote Fade In</h1>
    <blockquote class="qfi-quote" id="qfiQuote">
      <p class="qfi-text">"The only way to do great work is to love what you do."</p>
      <footer class="qfi-author">— Steve Jobs</footer>
    </blockquote>
  </main>

  <script>
    function revealQuote() {
      const quote = document.getElementById('qfiQuote');
      quote.classList.add('qfi-visible');
    }

    window.addEventListener('load', revealQuote);
  </script>
</body>
</html>
