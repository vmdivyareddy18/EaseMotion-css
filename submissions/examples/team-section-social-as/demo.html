<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Team Section</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="team-grid">
    <div class="team-card">
      <div class="team-avatar" aria-hidden="true">JD</div>
      <h3>Jane Doe</h3>
      <span class="team-role">Lead Designer</span>
      <p>Passionate about creating beautiful, accessible interfaces.</p>
      <div class="team-social">
        <a href="#" class="social-icon" aria-label="Website of Jane Doe">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" /></svg>
        </a>
        <a href="#" class="social-icon" aria-label="Email Jane Doe">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" /></svg>
        </a>
        <a href="#" class="social-icon" aria-label="Message Jane Doe">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" /></svg>
        </a>
      </div>
    </div>

    <div class="team-card">
      <div class="team-avatar" aria-hidden="true">AR</div>
      <h3>Arjun Rao</h3>
      <span class="team-role">Frontend Engineer</span>
      <p>Builds fast, animation-first experiences with clean CSS.</p>
      <div class="team-social">
        <a href="#" class="social-icon" aria-label="Website of Arjun Rao">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" /></svg>
        </a>
        <a href="#" class="social-icon" aria-label="Email Arjun Rao">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" /><path d="m3 7 9 6 9-6" /></svg>
        </a>
        <a href="#" class="social-icon" aria-label="Message Arjun Rao">

        </a>
      </div>
    </div>

    <div class="team-card">
      <div class="team-avatar" aria-hidden="true">ML</div>
      <h3>Mia Lopez</h3>
      <span class="team-role">Product Manager</span>
      <p>Turns user research into shippable, delightful features.</p>
      <div class="team-social">
        <a href="#" class="social-icon" aria-label="Website of Mia Lopez">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9" /><path d="M3 12h18M12 3c3 3 3 15 0 18M12 3c-3 3-3 15 0 18" /></svg>
        </a>

        </a>
        <a href="#" class="social-icon" aria-label="Message Mia Lopez">

        </a>
