<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Glow Pulse Task Button</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #1a1625 0%, #2d1b3d 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .task-container {
      width: 100%;
      max-width: 500px;
      background: rgba(30, 25, 45, 0.8);
      border: 1px solid rgba(168, 85, 247, 0.15);
      border-radius: 12px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #e9d5ff;
      font-size: 1.25rem;
      margin: 0 0 1.5rem 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .task-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(168, 85, 247, 0.1);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .task-title {
      color: #e9d5ff;
      font-size: 0.95rem;
      margin: 0;
    }

    .task-actions {
      display: flex;
      gap: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="task-container">
    <h1>Task Manager</h1>
    
    <div class="task-item">
      <p class="task-title">Implement dashboard</p>
      <div class="task-actions">
        <button class="task-btn glow-active">Complete</button>
        <button class="task-btn glow-pending">Archive</button>
      </div>
    </div>

    <div class="task-item">
      <p class="task-title">Review pull request</p>
      <div class="task-actions">
        <button class="task-btn glow-active">Complete</button>
        <button class="task-btn glow-pending">Archive</button>
      </div>
    </div>

    <div class="task-item">
      <p class="task-title">Update documentation</p>
      <div class="task-actions">
        <button class="task-btn glow-active">Complete</button>
        <button class="task-btn glow-pending">Archive</button>
      </div>
    </div>
  </div>

</body>
</html>
