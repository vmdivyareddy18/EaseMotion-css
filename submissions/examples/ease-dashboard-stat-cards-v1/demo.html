<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Dashboard Stat Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

<div class="card">
<div class="icon">📈</div>
<h3>Total Sales</h3>
<h2>$24.8K</h2>
<p class="up">▲ +18%</p>
</div>

<div class="card">
<div class="icon">👥</div>
<h3>Users</h3>
<h2>8,520</h2>
<p class="up">▲ +12%</p>
</div>

<div class="card">
<div class="icon">🛒</div>
<h3>Orders</h3>
<h2>1,284</h2>
<p class="down">▼ -3%</p>
</div>

<div class="card">
<div class="icon">💰</div>
<h3>Revenue</h3>
<h2>$56.3K</h2>
<p class="up">▲ +24%</p>
</div>

</div>

</body>
</html>
