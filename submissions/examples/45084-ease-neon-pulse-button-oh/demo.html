<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-neon-pulse-button</title>
  <meta name="description" content="A stylish button component with a glowing neon border that smoothly pulses when hovered.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-neon-pulse-button</h1>
      <p class="subtitle" id="main-desc">Glowing neon border that pulses smoothly on hover</p>
    </header>

    <div class="display-area">
      <button class="ease-neon-pulse-button">
        <span>Get Started</span>
      </button>
    </div>

    <div class="button-variants">
      <button class="ease-neon-pulse-button ease-neon-cyan">
        <span>Cyan Neon</span>
      </button>
      <button class="ease-neon-pulse-button ease-neon-magenta">
        <span>Magenta Neon</span>
      </button>
      <button class="ease-neon-pulse-button ease-neon-lime">
        <span>Lime Neon</span>
      </button>
    </div>
  </main>

</body>
</html>
