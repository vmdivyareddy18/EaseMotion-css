<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Horizontal Milestone Roadmap Timeline Layout</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-timeline-horiz">
  <div class="time-item active">
    <div class="marker">1</div>
    <div class="label">Phase 1</div>
  </div>
  <div class="time-item">
    <div class="marker">2</div>
    <div class="label">Phase 2</div>
  </div>
  <div class="time-item">
    <div class="marker">3</div>
    <div class="label">Phase 3</div>
  </div>
</div>
</body>
</html>
