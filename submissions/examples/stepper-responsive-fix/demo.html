<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Stepper Fix — Issue #1547</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      background: #0b0f19;
      color: #f1f5f9;
      font-family: system-ui, sans-serif;
      padding: 40px 20px;
    }
    h2 { margin-bottom: 24px; font-size: 1.1rem; color: #38bdf8; }
  </style>
</head>
<body>

  <h2>Responsive Stepper (resize window below 480px to see vertical layout)</h2>

  <ol class="ease-stepper-fix">
    <li class="ease-stepper-fix__item ease-stepper-fix__item--completed">
      <div class="ease-stepper-fix__node">&#10003;</div>
      <div class="ease-stepper-fix__track"></div>
    </li>
    <li class="ease-stepper-fix__item ease-stepper-fix__item--completed">
      <div class="ease-stepper-fix__node">&#10003;</div>
      <div class="ease-stepper-fix__track"></div>
    </li>
    <li class="ease-stepper-fix__item ease-stepper-fix__item--active">
      <div class="ease-stepper-fix__node">3</div>
      <div class="ease-stepper-fix__track"></div>
    </li>
    <li class="ease-stepper-fix__item">
      <div class="ease-stepper-fix__node">4</div>
    </li>
  </ol>

</body>
</html>
