<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-scramble | EaseMotion CSS</title>
  
  <!-- Main Framework -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Component specific style -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: #0a0a0c;
      color: #e2e8f0;
      padding: 4rem 2rem;
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .demo-header {
      margin-bottom: 4rem;
    }

    .demo-header h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--ease-color-primary, #6c63ff);
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 3rem;
    }

    .demo-card {
      background: #121214;
      border: 1px solid #27272a;
      border-radius: 1rem;
      padding: 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .demo-card code {
      background: #000;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-size: 0.875rem;
      color: #a1a1aa;
    }

    .scramble-text {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>

  <header class="demo-header">
    <h1>ease-scramble</h1>
    <p>Zero-JS text scramble and decode animations.</p>
  </header>

  <div class="demo-grid">

    <!-- One-shot Hover -->
    <div class="demo-card">
      <span class="ease-scramble scramble-text" data-scramble="*&^%$#!">HOVER ME</span>
      <code>.ease-scramble</code>
    </div>

    <!-- Fast One-shot -->
    <div class="demo-card">
      <span class="ease-scramble ease-scramble-fast scramble-text" data-scramble="8372641">DECODE FAST</span>
      <code>.ease-scramble.ease-scramble-fast</code>
    </div>

    <!-- Slow One-shot -->
    <div class="demo-card">
      <span class="ease-scramble ease-scramble-slow scramble-text" data-scramble="SYSTEM_ERR">INITIALIZING</span>
      <code>.ease-scramble.ease-scramble-slow</code>
    </div>

    <!-- Loop -->
    <div class="demo-card">
      <span class="ease-scramble-loop scramble-text" data-scramble="ACCESS_DENIED">SECURITY SCAN</span>
      <code>.ease-scramble-loop</code>
    </div>

  </div>

  <footer style="margin-top: 6rem; color: #52525b; font-size: 0.875rem;">
    Note: Requires a browser that supports CSS 'content' animation (Chrome, Edge, Safari).
  </footer>

</body>
</html>
