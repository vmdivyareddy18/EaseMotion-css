<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pie Chart Explode Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Pie Chart Explode</h1>
        <p class="subtitle">Segment pops out on hover</p>

        <!-- PIE CHART EXPLODE COMPONENT -->
        <div class="pie-container">
            <div class="pie-wrapper">
                <div class="pie-canvas-wrapper">
                    <canvas id="pieCanvas" width="400" height="400"></canvas>
                    <div class="pie-tooltip" id="pieTooltip">
                        <span class="tooltip-label" id="tooltipLabel">Label</span>
                        <span class="tooltip-value" id="tooltipValue">0%</span>
                    </div>
                </div>
                <div class="pie-legend" id="pieLegend">
                    <!-- Generated by JavaScript -->
                </div>
                <div class="pie-controls">
                    <button class="pie-btn" id="randomBtn">🎲 Random</button>
                    <button class="pie-btn" id="resetBtn">⟳ Reset</button>
                    <button class="pie-btn" id="animateBtn">▶ Animate</button>
                    <button class="pie-btn" id="toggleLabelsBtn">🏷️ Labels</button>
                </div>
                <div class="pie-footer">
                    <span class="footer-label">Segments:</span>
                    <span class="footer-value" id="segmentCount">0</span>
                    <span class="footer-label">Total:</span>
                    <span class="footer-value" id="totalValue">0</span>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="addSegmentBtn">+ Add Segment</button>
            <button class="demo-btn" id="removeSegmentBtn">− Remove Segment</button>
            <button class="demo-btn" id="explodeAllBtn">💥 Explode All</button>
            <button class="demo-btn" id="collapseAllBtn">🔘 Collapse All</button>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Color Palettes</h3>
            <div class="variants-grid">
                <div class="variant-card" id="palette1">
                    <div class="variant-preview" id="preview1"></div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="palette2">
                    <div class="variant-preview" id="preview2"></div>
                    <span class="variant-label">Pastel</span>
                </div>
                <div class="variant-card" id="palette3">
                    <div class="variant-preview" id="preview3"></div>
                    <span class="variant-label">Vibrant</span>
                </div>
                <div class="variant-card" id="palette4">
                    <div class="variant-preview" id="preview4"></div>
                    <span class="variant-label">Monochrome</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const canvas = document.getElementById('pieCanvas');
            const ctx = canvas.getContext('2d');
            const tooltip = document.getElementById('pieTooltip');
            const tooltipLabel = document.getElementById('tooltipLabel');
            const tooltipValue = document.getElementById('tooltipValue');
            const legend = document.getElementById('pieLegend');
            const segmentCount = document.getElementById('segmentCount');
            const totalValue = document.getElementById('totalValue');
            const randomBtn = document.getElementById('randomBtn');
            const resetBtn = document.getElementById('resetBtn');
            const animateBtn = document.getElementById('animateBtn');
            const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');
            const addSegmentBtn = document.getElementById('addSegmentBtn');
            const removeSegmentBtn = document.getElementById('removeSegmentBtn');
            const explodeAllBtn = document.getElementById('explodeAllBtn');
            const collapseAllBtn = document.getElementById('collapseAllBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const PALETTES = {
                default: ['#4facfe', '#43e97b', '#f093fb', '#f5576c', '#f9d976', '#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'],
                pastel: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff', '#e8b4f8', '#f8b4b4', '#b4f8c8', '#b4d4f8', '#f8d4b4'],
                vibrant: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#FF9FF3', '#54A0FF', '#5F27CD', '#FF9F43'],
                monochrome: ['#2c3e50', '#34495e', '#4a6274', '#5d7a8a', '#7f9ca5', '#a0bcc2', '#c0d4d8', '#dce8ec', '#eef4f6', '#f5f9fa']
            };

            const CONFIG = {
                segments: [
                    { label: 'Category A', value: 30, color: '#4facfe' },
                    { label: 'Category B', value: 25, color: '#43e97b' },
                    { label: 'Category C', value: 20, color: '#f093fb' },
                    { label: 'Category D', value: 15, color: '#f5576c' },
                    { label: 'Category E', value: 10, color: '#f9d976' }
                ],
                palette: 'default',
                explodeDistance: 20,
                innerRadius: 0,
                animationDuration: 600,
                showLabels: true,
                onSegmentClick: function(index, label, value) {
                    console.log(`📊 Clicked: ${label} (${value})`);
                },
                onUpdate: function(data) {
                    console.log('📈 Pie chart updated');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let segments = [];
            let currentPalette = CONFIG.palette;
            let showLabels = CONFIG.showLabels;
            let hoveredIndex = -1;
            let animatedIndex = -1;
            let isAnimating = false;
            let animationId = null;
            let startTime = 0;
            let startExplode = 0;
            let targetExplode = 0;

            // ============================================
            // DATA GENERATION
            // ============================================
            function generateSegments(count = 5) {
                const labels = ['Category A', 'Category B', 'Category C', 'Category D', 'Category E', 'Category F', 'Category G', 'Category H', 'Category I', 'Category J'];
                const colors = getPaletteColors(CONFIG.palette);
                const newSegments = [];
                let total = 0;
                
                for (let i = 0; i < count; i++) {
                    const value = Math.floor(Math.random() * 30) + 5;
                    total += value;
                    newSegments.push({
                        label: labels[i % labels.length] + (i >= labels.length ? ' ' + (Math.floor(i / labels.length) + 1) : ''),
                        value: value,
                        color: colors[i % colors.length]
                    });
                }
                
                return newSegments;
            }

            function getPaletteColors(paletteName) {
                return PALETTES[paletteName] || PALETTES.default;
            }

            // ============================================
            // DRAWING FUNCTIONS
            // ============================================
            function drawPie(segmentsData, explodeIndex = -1) {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const radius = Math.min(w, h) * 0.38;
                const total = segmentsData.reduce((sum, s) => sum + s.value, 0);
                let startAngle = -Math.PI / 2;

                ctx.clearRect(0, 0, w, h);

                if (total === 0) {
                    // Draw empty state
                    ctx.save();
                    ctx.fillStyle = '#e5e7eb';
                    ctx.font = '16px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('No data', cx, cy);
                    ctx.restore();
                    return;
                }

                segmentsData.forEach((segment, index) => {
                    const sliceAngle = (segment.value / total) * Math.PI * 2;
                    const endAngle = startAngle + sliceAngle;
                    const midAngle = startAngle + sliceAngle / 2;
                    const isHovered = index === explodeIndex || index === hoveredIndex;
                    const explode = isHovered ? CONFIG.explodeDistance : 0;
                    const isAnimatingSegment = index === animatedIndex;

                    let currentExplode = explode;
                    if (isAnimatingSegment && isAnimating) {
                        const progress = Math.min((performance.now() - startTime) / CONFIG.animationDuration, 1);
                        const eased = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                        currentExplode = startExplode + (targetExplode - startExplode) * eased;
                    }

                    const offsetX = Math.cos(midAngle) * currentExplode;
                    const offsetY = Math.sin(midAngle) * currentExplode;

                    ctx.save();

                    // Shadow
                    ctx.shadowColor = 'rgba(0, 0, 0, 0.1)';
                    ctx.shadowBlur = isHovered ? 20 : 5;
                    ctx.shadowOffsetX = isHovered ? 2 : 0;
                    ctx.shadowOffsetY = isHovered ? 4 : 0;

                    // Segment path
                    ctx.beginPath();
                    ctx.moveTo(cx + offsetX, cy + offsetY);
                    ctx.arc(cx + offsetX, cy + offsetY, radius, startAngle, endAngle);
                    ctx.closePath();

                    ctx.fillStyle = segment.color || '#cccccc';
                    ctx.fill();

                    // Stroke for separation
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.stroke();

                    // Label
                    if (showLabels) {
                        const labelRadius = radius * 0.7;
                        const labelX = cx + offsetX + Math.cos(midAngle) * labelRadius;
                        const labelY = cy + offsetY + Math.sin(midAngle) * labelRadius;
                        const percentage = ((segment.value / total) * 100);
                        
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 13px -apple-system, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        // Text shadow for readability
                        ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                        ctx.shadowBlur = 4;
                        ctx.fillText(percentage.toFixed(0) + '%', labelX, labelY);
                        ctx.shadowBlur = 0;
                    }

                    ctx.restore();

                    startAngle = endAngle;
                });

                // Update totals
                segmentCount.textContent = segmentsData.length;
                totalValue.textContent = total;

                // Update legend
                updateLegend(segmentsData, explodeIndex);
            }

            // ============================================
            // LEGEND
            // ============================================
            function updateLegend(segmentsData, explodeIndex) {
                legend.innerHTML = '';
                
                segmentsData.forEach((segment, index) => {
                    const item = document.createElement('div');
                    item.className = 'legend-item';
                    if (index === explodeIndex || index === hoveredIndex) {
                        item.classList.add('active');
                    }
                    
                    const colorBox = document.createElement('span');
                    colorBox.className = 'legend-color';
                    colorBox.style.backgroundColor = segment.color;
                    
                    const label = document.createElement('span');
                    label.className = 'legend-label';
                    label.textContent = segment.label;
                    
                    const value = document.createElement('span');
                    value.className = 'legend-value';
                    const total = segmentsData.reduce((sum, s) => sum + s.value, 0);
                    const percentage = total > 0 ? ((segment.value / total) * 100).toFixed(1) : 0;
                    value.textContent = `${segment.value} (${percentage}%)`;
                    
                    item.appendChild(colorBox);
                    item.appendChild(label);
                    item.appendChild(value);
                    
                    // Click to explode
                    item.addEventListener('click', function() {
                        toggleExplode(index);
                    });
                    
                    // Hover to preview
                    item.addEventListener('mouseenter', function() {
                        hoveredIndex = index;
                        drawPie(segmentsData, hoveredIndex);
                    });
                    
                    item.addEventListener('mouseleave', function() {
                        hoveredIndex = -1;
                        drawPie(segmentsData, animatedIndex);
                    });
                    
                    legend.appendChild(item);
                });
            }

            // ============================================
            // INTERACTIONS
            // ============================================
            function toggleExplode(index) {
                if (animatedIndex === index) {
                    animatedIndex = -1;
                    drawPie(segments);
                } else {
                    animatedIndex = index;
                    startExplode = 0;
                    targetExplode = CONFIG.explodeDistance;
                    startTime = performance.now();
                    isAnimating = true;
                    animateBtn.textContent = '⏸ Pause';
                    
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                    }
                    animateExplosion();
                }
            }

            function animateExplosion() {
                if (!isAnimating) return;
                
                const now = performance.now();
                const progress = (now - startTime) / CONFIG.animationDuration;
                
                if (progress >= 1) {
                    isAnimating = false;
                    animateBtn.textContent = '▶ Animate';
                    drawPie(segments, animatedIndex);
                    return;
                }
                
                drawPie(segments, animatedIndex);
                animationId = requestAnimationFrame(animateExplosion);
            }

            // ============================================
            // CANVAS INTERACTIONS (Hover & Click)
            // ============================================
            function getMousePosition(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const x = (e.clientX - rect.left) * scaleX;
                const y = (e.clientY - rect.top) * scaleY;
                return { x, y };
            }

            function getSegmentAt(mx, my) {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const radius = Math.min(w, h) * 0.38;
                const total = segments.reduce((sum, s) => sum + s.value, 0);
                
                if (total === 0) return -1;
                
                const dx = mx - cx;
                const dy = my - cy;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance > radius) return -1;
                
                let angle = Math.atan2(dy, dx);
                let startAngle = -Math.PI / 2;
                
                for (let i = 0; i < segments.length; i++) {
                    const sliceAngle = (segments[i].value / total) * Math.PI * 2;
                    const endAngle = startAngle + sliceAngle;
                    
                    // Normalize angle
                    let normalizedAngle = angle;
                    if (normalizedAngle < -Math.PI / 2) normalizedAngle += Math.PI * 2;
                    
                    if (normalizedAngle >= startAngle && normalizedAngle < endAngle) {
                        return i;
                    }
                    
                    startAngle = endAngle;
                }
                
                return -1;
            }

            canvas.addEventListener('mousemove', function(e) {
                const pos = getMousePosition(e);
                const index = getSegmentAt(pos.x, pos.y);
                
                if (index !== hoveredIndex) {
                    hoveredIndex = index;
                    drawPie(segments, animatedIndex);
                    
                    if (index >= 0) {
                        const segment = segments[index];
                        const total = segments.reduce((sum, s) => sum + s.value, 0);
                        const percentage = total > 0 ? ((segment.value / total) * 100).toFixed(1) : 0;
                        tooltipLabel.textContent = segment.label;
                        tooltipValue.textContent = `${segment.value} (${percentage}%)`;
                        tooltip.style.display = 'block';
                        tooltip.style.left = (e.clientX - tooltip.parentElement.getBoundingClientRect().left + 10) + 'px';
                        tooltip.style.top = (e.clientY - tooltip.parentElement.getBoundingClientRect().top - 10) + 'px';
                        tooltip.style.transform = 'translate(-50%, -100%)';
                    } else {
                        tooltip.style.display = 'none';
                    }
                }
            });

            canvas.addEventListener('mouseleave', function() {
                hoveredIndex = -1;
                tooltip.style.display = 'none';
                drawPie(segments, animatedIndex);
            });

            canvas.addEventListener('click', function(e) {
                const pos = getMousePosition(e);
                const index = getSegmentAt(pos.x, pos.y);
                if (index >= 0) {
                    const segment = segments[index];
                    CONFIG.onSegmentClick(index, segment.label, segment.value);
                    toggleExplode(index);
                }
            });

            // ============================================
            // CONTROLS
            // ============================================
            function setData(newSegments) {
                segments = newSegments;
                animatedIndex = -1;
                isAnimating = false;
                animateBtn.textContent = '▶ Animate';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                drawPie(segments);
                CONFIG.onUpdate(segments);
            }

            function randomize() {
                const count = Math.floor(Math.random() * 5) + 3;
                const newSegments = generateSegments(count);
                setData(newSegments);
            }

            function resetData() {
                setData(CONFIG.segments.map(s => ({ ...s })));
            }

            function toggleAnimation() {
                if (isAnimating) {
                    isAnimating = false;
                    animateBtn.textContent = '▶ Animate';
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                } else {
                    if (animatedIndex >= 0) {
                        animatedIndex = -1;
                        drawPie(segments);
                    }
                    // Randomize as animation
                    const newSegments = generateSegments(5 + Math.floor(Math.random() * 3));
                    segments = newSegments;
                    animatedIndex = -1;
                    drawPie(segments);
                    CONFIG.onUpdate(segments);
                }
            }

            function toggleLabels() {
                showLabels = !showLabels;
                toggleLabelsBtn.textContent = showLabels ? '🏷️ Labels' : '🏷️ Hide Labels';
                drawPie(segments, animatedIndex);
            }

            function addSegment() {
                const colors = getPaletteColors(CONFIG.palette);
                const newSegment = {
                    label: 'New Category',
                    value: Math.floor(Math.random() * 20) + 5,
                    color: colors[segments.length % colors.length]
                };
                segments.push(newSegment);
                setData(segments);
            }

            function removeSegment() {
                if (segments.length <= 2) {
                    alert('Minimum 2 segments required');
                    return;
                }
                segments.pop();
                setData(segments);
            }

            function explodeAll() {
                segments.forEach((_, index) => {
                    setTimeout(() => {
                        animatedIndex = index;
                        startExplode = 0;
                        targetExplode = CONFIG.explodeDistance;
                        startTime = performance.now();
                        isAnimating = true;
                        animateBtn.textContent = '⏸ Pause';
                        if (animationId) {
                            cancelAnimationFrame(animationId);
                        }
                        animateExplosion();
                    }, index * 150);
                });
            }

            function collapseAll() {
                isAnimating = false;
                animateBtn.textContent = '▶ Animate';
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                animatedIndex = -1;
                drawPie(segments);
            }

            // ============================================
            // PALETTES
            // ============================================
            function setPalette(paletteName) {
                if (PALETTES[paletteName]) {
                    currentPalette = paletteName;
                    CONFIG.palette = paletteName;
                    const colors = getPaletteColors(paletteName);
                    segments.forEach((segment, index) => {
                        segment.color = colors[index % colors.length];
                    });
                    drawPie(segments, animatedIndex);
                    updatePalettePreviews();
                }
            }

            function updatePalettePreviews() {
                const paletteNames = Object.keys(PALETTES);
                const previews = [
                    document.getElementById('preview1'),
                    document.getElementById('preview2'),
                    document.getElementById('preview3'),
                    document.getElementById('preview4')
                ];
                
                paletteNames.forEach((name, index) => {
                    if (index >= previews.length) return;
                    const colors = PALETTES[name];
                    const preview = previews[index];
                    preview.innerHTML = '';
                    
                    colors.slice(0, 7).forEach(color => {
                        const swatch = document.createElement('div');
                        swatch.className = 'swatch';
                        swatch.style.backgroundColor = color;
                        preview.appendChild(swatch);
                    });
                    
                    const card = preview.closest('.variant-card');
                    card.classList.toggle('active', name === currentPalette);
                });
            }

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    toggleAnimation();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetBtn.click();
                }
                if (e.key === 'l' || e.key === 'L') {
                    toggleLabels();
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.PieChart = {
                setData: setData,
                getData: () => segments,
                setPalette: setPalette,
                toggleExplode: toggleExplode,
                explodeAll: explodeAll,
                collapseAll: collapseAll,
                addSegment: addSegment,
                removeSegment: removeSegment,
                toggleLabels: toggleLabels,
                toggleAnimation: toggleAnimation,
                randomize: randomize,
                reset: resetData,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    drawPie(segments, animatedIndex);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            segments = CONFIG.segments.map(s => ({ ...s }));
            drawPie(segments);
            updatePalettePreviews();

            console.log('✅ Pie Chart Explode initialized!');
            console.log('📖 API: window.PieChart');
            console.log('📖 Usage:');
            console.log('  - Hover over segments to highlight');
            console.log('  - Click a segment to explode it');
            console.log('  - Keyboard shortcuts: Space (animate), R (reset), L (labels)');

        })();
    </script>
</body>
</html>
