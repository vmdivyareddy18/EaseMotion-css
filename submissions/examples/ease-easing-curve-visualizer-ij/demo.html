<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Easing Curve Visualizer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h2 class="card-title">Easing Curve Visualizer</h2>
    <p class="card-subtitle">Drag control points to preview cubic-bezier</p>

    <div class="visualizer">
      <div class="curve-container">
        <svg viewBox="0 0 200 200" class="curve-svg" data-testid="curve-svg">
          <rect x="0" y="0" width="200" height="200" class="curve-bg" />
          <line x1="0" y1="200" x2="200" y2="0" class="diagonal-line" />
          <path d="M0,200 C50,150 150,50 200,0" class="bezier-path" />
          <circle cx="50" cy="150" r="8" class="control-point cp1" data-point="p1" />
          <circle cx="150" cy="50" r="8" class="control-point cp2" data-point="p2" />
          <line x1="0" y1="200" x2="50" y2="150" class="control-line l1" />
          <line x1="200" y1="0" x2="150" y2="50" class="control-line l2" />
          <circle cx="50" cy="150" r="6" class="control-dot" />
          <circle cx="150" cy="50" r="6" class="control-dot" />
        </svg>
        <div class="preview-ball" data-testid="preview-ball"></div>
      </div>
    </div>

    <div class="controls">
      <div class="control-group">
        <label>P1 <span class="p1-label">(0.25, 0.75)</span></label>
        <input type="range" class="p1x" min="0" max="100" value="25" data-axis="x" data-point="p1" />
        <input type="range" class="p1y" min="0" max="100" value="75" data-axis="y" data-point="p1" />
      </div>
      <div class="control-group">
        <label>P2 <span class="p2-label">(0.75, 0.25)</span></label>
        <input type="range" class="p2x" min="0" max="100" value="75" data-axis="x" data-point="p2" />
        <input type="range" class="p2y" min="0" max="100" value="25" data-axis="y" data-point="p2" />
      </div>
      <div class="control-group">
        <label>Preview Duration</label>
        <input type="range" class="duration-slider" min="500" max="5000" value="2000" step="100" />
        <span class="duration-label">2.0s</span>
      </div>
    </div>

    <div class="preview-bar">
      <div class="preview-block" data-testid="preview-block"></div>
    </div>

    <div class="presets">
      <button class="preset-btn" data-p1x="25" data-p1y="75" data-p2x="75" data-p2y="25">ease</button>
      <button class="preset-btn" data-p1x="42" data-p1y="0" data-p2x="58" data-p2y="100">ease-in-out</button>
      <button class="preset-btn" data-p1x="0" data-p1y="0" data-p2x="58" data-p2y="100">ease-in</button>
      <button class="preset-btn" data-p1x="25" data-p1y="0" data-p2x="100" data-p2y="100">ease-out</button>
      <button class="preset-btn" data-p1x="68" data-p1y="-68" data-p2x="32" data-p2y="168">bounce</button>
    </div>

    <div class="code-output" data-testid="code-output">
      <code>cubic-bezier(0.25, 0.75, 0.75, 0.25)</code>
    </div>
  </div>

  <script>
    const svg = document.querySelector('.curve-svg');
    const path = svg.querySelector('.bezier-path');
    const p1Dot = svg.querySelector('.cp1');
    const p2Dot = svg.querySelector('.cp2');
    const l1 = svg.querySelector('.l1');
    const l2 = svg.querySelector('.l2');
    const p1xRange = document.querySelector('.p1x');
    const p1yRange = document.querySelector('.p1y');
    const p2xRange = document.querySelector('.p2x');
    const p2yRange = document.querySelector('.p2y');
    const p1Label = document.querySelector('.p1-label');
    const p2Label = document.querySelector('.p2-label');
    const codeOutput = document.querySelector('.code-output code');
    const previewBlock = document.querySelector('.preview-block');
    const previewBall = document.querySelector('.preview-ball');
    const durationSlider = document.querySelector('.duration-slider');
    const durationLabel = document.querySelector('.duration-label');
    const presetBtns = document.querySelectorAll('.preset-btn');

    function updateCurve() {
      const p1x = p1xRange.value / 100;
      const p1y = p1yRange.value / 100;
      const p2x = p2xRange.value / 100;
      const p2y = p2yRange.value / 100;

      const x1 = p1x * 200;
      const y1 = 200 - p1y * 200;
      const x2 = p2x * 200;
      const y2 = 200 - p2y * 200;

      path.setAttribute('d', `M0,200 C${x1},${y1} ${x2},${y2} 200,0`);
      p1Dot.setAttribute('cx', x1);
      p1Dot.setAttribute('cy', y1);
      p2Dot.setAttribute('cx', x2);
      p2Dot.setAttribute('cy', y2);
      l1.setAttribute('x2', x1);
      l1.setAttribute('y2', y1);
      l2.setAttribute('x1', x2);
      l2.setAttribute('y1', y2);

      p1Label.textContent = `(${p1xRange.value}/100, ${(100-p1yRange.value)}/100)`;
      p2Label.textContent = `(${p2xRange.value}/100, ${(100-p2yRange.value)}/100)`;

      const cx = `cubic-bezier(${(p1xRange.value/100).toFixed(2)}, ${((100-p1yRange.value)/100).toFixed(2)}, ${(p2xRange.value/100).toFixed(2)}, ${((100-p2yRange.value)/100).toFixed(2)})`;
      codeOutput.textContent = cx;

      const dur = parseInt(durationSlider.value);
      previewBlock.style.transition = `transform ${dur}ms ${cx}`;
      previewBall.style.transition = `left ${dur}ms ${cx}, top ${dur}ms ${cx}`;
    }

    p1xRange.addEventListener('input', updateCurve);
    p1yRange.addEventListener('input', updateCurve);
    p2xRange.addEventListener('input', updateCurve);
    p2yRange.addEventListener('input', updateCurve);

    durationSlider.addEventListener('input', () => {
      durationLabel.textContent = (durationSlider.value / 1000).toFixed(1) + 's';
      updateCurve();
    });

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        p1xRange.value = btn.dataset.p1x;
        p1yRange.value = 100 - parseInt(btn.dataset.p1y);
        p2xRange.value = btn.dataset.p2x;
        p2yRange.value = 100 - parseInt(btn.dataset.p2y);
        updateCurve();
        triggerPreview();
      });
    });

    function triggerPreview() {
      previewBlock.style.transform = 'translateX(280px)';
      previewBall.style.left = '200px';
      previewBall.style.top = '0px';
      setTimeout(() => {
        previewBlock.style.transform = 'translateX(0)';
        previewBall.style.left = '0px';
        previewBall.style.top = '180px';
      }, 50);
    }

    let previewInterval;
    document.querySelector('.visualizer').addEventListener('click', () => {
      clearInterval(previewInterval);
      triggerPreview();
      previewInterval = setInterval(triggerPreview, parseInt(durationSlider.value) + 500);
    });

    updateCurve();
    setTimeout(triggerPreview, 300);
  </script>
</body>
</html>
