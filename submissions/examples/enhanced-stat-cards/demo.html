<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced KPI Stat Cards Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kpi-container">
        <div class="ease-kpi-card">
            <div class="kpi-header">
                <span class="kpi-title">Utilities</span>
                <div class="kpi-icon-wrapper utilities">⚡</div>
            </div>
            <div class="kpi-body">
                <h3 class="kpi-value">142</h3>
                <span class="kpi-trend positive">+12% vs last week</span>
            </div>
        </div>

        <div class="ease-kpi-card">
            <div class="kpi-header">
                <span class="kpi-title">Animations</span>
                <div class="kpi-icon-wrapper animations">✨</div>
            </div>
            <div class="kpi-body">
                <h3 class="kpi-value">64</h3>
                <span class="kpi-trend positive">+4% vs last week</span>
            </div>
        </div>

        <div class="ease-kpi-card">
            <div class="kpi-header">
                <span class="kpi-title">Dependencies</span>
                <div class="kpi-icon-wrapper dependencies">📦</div>
            </div>
            <div class="kpi-body">
                <h3 class="kpi-value">18</h3>
                <span class="kpi-trend neutral">0 changes</span>
            </div>
        </div>
    </div>
</body>
</html>
