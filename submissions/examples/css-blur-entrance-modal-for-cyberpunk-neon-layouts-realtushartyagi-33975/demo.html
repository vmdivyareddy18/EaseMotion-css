<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Blur-Entrance Modal (Cyberpunk Neon)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #020202;
      background-image: radial-gradient(circle at 50% 50%, #111, #000);
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 12px 28px;
      background: transparent;
      color: #00ffff;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      border: 2px solid #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3), inset 0 0 5px rgba(0, 255, 255, 0.2);
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .demo-trigger-btn:hover {
      background: rgba(0, 255, 255, 0.1);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.6), inset 0 0 10px rgba(0, 255, 255, 0.4);
      text-shadow: 0 0 5px #00ffff;
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#cyber-modal" class="demo-trigger-btn">INIT_SYSTEM_OVERRIDE</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="cyber-modal" class="ease-cyber-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-cyber-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-cyber-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <a href="#" class="ease-cyber-modal-close" aria-label="Close modal dialog">[X]</a>
      
      <div class="ease-cyber-modal-header">
        <h2 id="modal-title" class="ease-cyber-modal-title">WARNING: OVERRIDE</h2>
      </div>
      
      <p class="ease-cyber-modal-text">
        Notice the aggressive <strong>Blur-Entrance</strong> interaction. It scales in while un-blurring, capturing the high-contrast, glowing aesthetics of Cyberpunk and Sci-Fi interfaces using pure CSS.
      </p>
      
      <div class="ease-cyber-data">
        SEQ: 0x8F2A<br>
        STATUS: UNSTABLE<br>
        TARGET: MAINFRAME_NEXUS
      </div>
      
      <div class="ease-cyber-modal-actions">
        <a href="#" class="ease-cyber-modal-btn ease-cyber-modal-btn-alt">ABORT</a>
        <a href="#" class="ease-cyber-modal-btn">EXECUTE</a>
      </div>
    </div>

  </div>

</body>
</html>
