<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Quantity Input Stepper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="stepper-card">

        <h1>Quantity Input Stepper</h1>

        <p class="subtitle">
            A modern CSS-only quantity input component with smooth hover animations.
        </p>

        <div class="quantity-stepper">

            <button class="step-btn" aria-label="Decrease quantity">
                −
            </button>

            <input
                type="number"
                value="1"
                min="1"
                max="99"
                aria-label="Quantity"
            >

            <button class="step-btn" aria-label="Increase quantity">
                +
            </button>

        </div>

        <p class="note">
            Pure HTML & CSS • No JavaScript Required
        </p>

    </div>

</div>

</body>
</html>
