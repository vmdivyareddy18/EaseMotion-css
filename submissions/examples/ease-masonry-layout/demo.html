<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry Layout Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Masonry Layout</h1>
        <p class="subtitle">Items load with stagger animation</p>

        <!-- MASONRY LAYOUT COMPONENT -->
        <div class="masonry-container">
            <div class="masonry-wrapper">
                <div class="masonry-grid" id="masonryGrid">
                    <!-- Items will be generated by JavaScript -->
                </div>

                <!-- Controls -->
                <div class="masonry-controls">
                    <button class="masonry-btn" id="loadMoreBtn">📥 Load More</button>
                    <button class="masonry-btn" id="resetBtn">⟳ Reset</button>
                    <button class="masonry-btn" id="shuffleBtn">🔀 Shuffle</button>
                    <button class="masonry-btn" id="toggleStaggerBtn">⏸ Toggle Stagger</button>
                </div>

                <div class="masonry-status">
                    <span class="status-label">Items:</span>
                    <span class="status-value" id="itemCount">0</span>
                    <span class="status-label">Columns:</span>
                    <span class="status-value" id="columnCount">0</span>
                    <span class="status-label">Stagger:</span>
                    <span class="status-value" id="staggerStatus">Active</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-grid" id="variantGrid1"></div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-grid" id="variantGrid2"></div>
                    <span class="variant-label">Compact</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-grid" id="variantGrid3"></div>
                    <span class="variant-label">Spaced</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-grid" id="variantGrid4"></div>
                    <span class="variant-label">Colorful</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const grid = document.getElementById('masonryGrid');
            const itemCount = document.getElementById('itemCount');
            const columnCount = document.getElementById('columnCount');
            const staggerStatus = document.getElementById('staggerStatus');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const resetBtn = document.getElementById('resetBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const toggleStaggerBtn = document.getElementById('toggleStaggerBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                columns: 3,
                gap: 16,
                staggerDelay: 80, // ms between each item
                staggerEnabled: true,
                animationDuration: 500,
                animationEasing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                colors: ['#4facfe', '#43e97b', '#f093fb', '#f5576c', '#f9d976', '#f39c12', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'],
                onLoad: function(count) {
                    console.log(`📦 Loaded ${count} items`);
                },
                onReset: function() {
                    console.log('⟳ Masonry reset');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let items = [];
            let itemIdCounter = 0;
            let isStaggerEnabled = CONFIG.staggerEnabled;
            let currentColumns = CONFIG.columns;

            // ============================================
            // DATA GENERATION
            // ============================================
            const sampleContent = [
                { title: 'Mountain Sunset', height: 180, color: '#4facfe' },
                { title: 'Ocean Waves', height: 220, color: '#43e97b' },
                { title: 'Forest Path', height: 150, color: '#f093fb' },
                { title: 'City Lights', height: 260, color: '#f5576c' },
                { title: 'Starry Night', height: 190, color: '#f9d976' },
                { title: 'Desert Dunes', height: 210, color: '#f39c12' },
                { title: 'Waterfall', height: 240, color: '#e74c3c' },
                { title: 'Meadow', height: 170, color: '#3498db' },
                { title: 'Volcano', height: 280, color: '#2ecc71' },
                { title: 'Northern Lights', height: 200, color: '#9b59b6' },
                { title: 'Crystal Lake', height: 230, color: '#4facfe' },
                { title: 'Rainforest', height: 160, color: '#43e97b' },
                { title: 'Glacier', height: 250, color: '#f093fb' },
                { title: 'Canyon', height: 190, color: '#f5576c' },
                { title: 'Sunflowers', height: 210, color: '#f9d976' }
            ];

            function generateItems(count) {
                const newItems = [];
                for (let i = 0; i < count; i++) {
                    const content = sampleContent[Math.floor(Math.random() * sampleContent.length)];
                    const colors = CONFIG.colors;
                    const randomColor = colors[Math.floor(Math.random() * colors.length)];
                    newItems.push({
                        id: ++itemIdCounter,
                        title: content.title || `Item ${itemIdCounter}`,
                        height: content.height || 150 + Math.random() * 130,
                        color: content.color || randomColor,
                        content: `Lorem ipsum dolor sit amet, consectetur adipiscing elit.`
                    });
                }
                return newItems;
            }

            // ============================================
            // MASONRY LAYOUT
            // ============================================
            function renderMasonry(itemsData, animate = true) {
                grid.innerHTML = '';
                
                // Calculate columns based on container width
                const containerWidth = grid.parentElement.offsetWidth - 40;
                const columnWidth = (containerWidth - (currentColumns - 1) * CONFIG.gap) / currentColumns;
                const columns = currentColumns;
                
                // Create column containers
                const columnElements = [];
                for (let i = 0; i < columns; i++) {
                    const col = document.createElement('div');
                    col.className = 'masonry-column';
                    col.style.width = columnWidth + 'px';
                    col.style.marginRight = i < columns - 1 ? CONFIG.gap + 'px' : '0';
                    grid.appendChild(col);
                    columnElements.push(col);
                }

                // Distribute items to columns (shortest column first)
                const columnHeights = new Array(columns).fill(0);
                
                itemsData.forEach((item, index) => {
                    // Find shortest column
                    let shortestCol = 0;
                    let shortestHeight = columnHeights[0];
                    for (let i = 1; i < columns; i++) {
                        if (columnHeights[i] < shortestHeight) {
                            shortestHeight = columnHeights[i];
                            shortestCol = i;
                        }
                    }
                    
                    // Create item element
                    const itemEl = document.createElement('div');
                    itemEl.className = 'masonry-item';
                    itemEl.style.height = item.height + 'px';
                    itemEl.style.backgroundColor = item.color;
                    itemEl.dataset.index = index;
                    itemEl.dataset.id = item.id;
                    
                    // Content
                    const content = document.createElement('div');
                    content.className = 'item-content';
                    content.innerHTML = `
                        <div class="item-icon">${getRandomEmoji()}</div>
                        <div class="item-title">${item.title}</div>
                        <div class="item-description">${item.content.substring(0, 60)}...</div>
                        <div class="item-tag">#${item.id}</div>
                    `;
                    itemEl.appendChild(content);
                    
                    // Stagger animation
                    if (animate && isStaggerEnabled) {
                        const delay = index * CONFIG.staggerDelay;
                        itemEl.style.opacity = '0';
                        itemEl.style.transform = 'translateY(20px) scale(0.95)';
                        itemEl.style.transition = `opacity ${CONFIG.animationDuration}ms ${CONFIG.animationEasing}, transform ${CONFIG.animationDuration}ms ${CONFIG.animationEasing}`;
                        setTimeout(() => {
                            itemEl.style.opacity = '1';
                            itemEl.style.transform = 'translateY(0) scale(1)';
                        }, delay);
                    } else {
                        itemEl.style.opacity = '1';
                        itemEl.style.transform = 'translateY(0) scale(1)';
                    }
                    
                    // Append to column
                    columnElements[shortestCol].appendChild(itemEl);
                    columnHeights[shortestCol] += item.height + CONFIG.gap;
                });
                
                // Update status
                itemCount.textContent = itemsData.length;
                columnCount.textContent = columns;
                staggerStatus.textContent = isStaggerEnabled ? 'Active' : 'Paused';
                CONFIG.onLoad(itemsData.length);
            }

            function getRandomEmoji() {
                const emojis = ['🎨', '🌈', '🌟', '🎯', '💎', '🚀', '🌸', '🌺', '🌻', '🌹', '🌷', '🌸', '🌺', '🌻', '🌹', '🌷'];
                return emojis[Math.floor(Math.random() * emojis.length)];
            }

            // ============================================
            // CONTROLS
            // ============================================
            function loadMore() {
                const newItems = generateItems(6);
                items = [...items, ...newItems];
                renderMasonry(items);
            }

            function resetMasonry() {
                items = generateItems(12);
                renderMasonry(items);
                CONFIG.onReset();
            }

            function shuffleItems() {
                // Shuffle array
                for (let i = items.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [items[i], items[j]] = [items[j], items[i]];
                }
                renderMasonry(items);
            }

            function toggleStagger() {
                isStaggerEnabled = !isStaggerEnabled;
                staggerStatus.textContent = isStaggerEnabled ? 'Active' : 'Paused';
                toggleStaggerBtn.textContent = isStaggerEnabled ? '⏸ Toggle Stagger' : '▶ Toggle Stagger';
                // Re-render with current stagger setting
                renderMasonry(items);
            }

            // ============================================
            // RESPONSIVE
            // ============================================
            function updateColumns() {
                const width = window.innerWidth;
                let newColumns = CONFIG.columns;
                
                if (width < 480) {
                    newColumns = 1;
                } else if (width < 768) {
                    newColumns = 2;
                } else if (width < 1024) {
                    newColumns = 3;
                } else {
                    newColumns = 4;
                }
                
                if (newColumns !== currentColumns) {
                    currentColumns = newColumns;
                    renderMasonry(items);
                }
            }

            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(updateColumns, 200);
            });

            // ============================================
            // EVENT LISTENERS
            // ============================================
            loadMoreBtn.addEventListener('click', loadMore);
            resetBtn.addEventListener('click', resetMasonry);
            shuffleBtn.addEventListener('click', shuffleItems);
            toggleStaggerBtn.addEventListener('click', toggleStagger);

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(cardId, gridId, count = 6, columns = 2) {
                const grid = document.getElementById(gridId);
                const items = generateItems(count);
                const colors = CONFIG.colors;
                
                grid.style.display = 'grid';
                grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;
                grid.style.gap = '8px';
                grid.style.padding = '4px';
                
                items.forEach((item, index) => {
                    const el = document.createElement('div');
                    el.style.backgroundColor = item.color;
                    el.style.borderRadius = '6px';
                    el.style.padding = '8px';
                    el.style.height = (80 + Math.random() * 60) + 'px';
                    el.style.display = 'flex';
                    el.style.alignItems = 'center';
                    el.style.justifyContent = 'center';
                    el.style.color = '#ffffff';
                    el.style.fontSize = '14px';
                    el.style.fontWeight = '500';
                    el.style.textAlign = 'center';
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(10px) scale(0.95)';
                    el.style.transition = `opacity 0.4s ease, transform 0.4s ease`;
                    el.textContent = `${getRandomEmoji()} ${item.title}`;
                    
                    // Stagger
                    const delay = index * 60;
                    setTimeout(() => {
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0) scale(1)';
                    }, 200 + delay);
                    
                    grid.appendChild(el);
                });
            }

            // Initialize variants
            setTimeout(() => {
                initVariant('variant1', 'variantGrid1', 6, 2);
                initVariant('variant2', 'variantGrid2', 8, 2);
                initVariant('variant3', 'variantGrid3', 4, 2);
                initVariant('variant4', 'variantGrid4', 6, 2);
            }, 300);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'l' || e.key === 'L') {
                    loadMore();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetMasonry();
                }
                if (e.key === 's' || e.key === 'S') {
                    shuffleItems();
                }
                if (e.key === 't' || e.key === 'T') {
                    toggleStagger();
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.MasonryLayout = {
                loadMore: loadMore,
                reset: resetMasonry,
                shuffle: shuffleItems,
                toggleStagger: toggleStagger,
                setColumns: (cols) => {
                    currentColumns = Math.max(1, Math.min(4, cols));
                    renderMasonry(items);
                },
                setStaggerDelay: (delay) => {
                    CONFIG.staggerDelay = delay;
                },
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.columns) {
                        currentColumns = config.columns;
                    }
                    renderMasonry(items);
                },
                getItems: () => items,
                getCount: () => items.length
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            items = generateItems(12);
            currentColumns = CONFIG.columns;
            renderMasonry(items);
            updateColumns();

            console.log('✅ Masonry Layout initialized!');
            console.log('📖 API: window.MasonryLayout');
            console.log('📖 Usage:');
            console.log('  - Click "Load More" to add items with stagger');
            console.log('  - Keyboard shortcuts: L (load), R (reset), S (shuffle), T (toggle stagger)');
            console.log('  - Items animate in with staggered delay');

        })();
    </script>
</body>
</html>
