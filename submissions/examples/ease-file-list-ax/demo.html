<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-file-list – Uploaded Files List</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-py-16 ease-max-w-md ease-mx-auto">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in ease-text-center">File List</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200 ease-text-center">
      Click "Add File" to insert a new entry; click ✕ to remove with a collapse animation.
    </p>

    <button id="add-file-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mb-6">
      + Add File
    </button>

    <ul id="file-list" class="file-list">
      <!-- File items will be injected by JS -->
    </ul>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-text-center ease-fade-in ease-delay-500">
      Remove: height collapse + opacity fade. Add: slide‑down entrance.
    </p>
  </div>

  <script>
    const fileList = document.getElementById('file-list');
    const addBtn = document.getElementById('add-file-btn');
    let fileCounter = 0;

    const fileNames = [
      'project-report.pdf', 'design-mockup.png', 'budget.xlsx', 'meeting-notes.docx', 'hero-image.jpg'
    ];
    const fileSizes = ['2.4 MB', '1.1 MB', '358 KB', '512 KB', '4.8 MB'];

    function createFileItem(name, size) {
      const li = document.createElement('li');
      li.className = 'file-item';
      li.innerHTML = 
        <span class="file-icon">📄</span>
        <div class="file-info">
          <span class="file-name"></span>
          <span class="file-size"></span>
        </div>
        <button class="remove-btn" aria-label="Remove file">✕</button>
      ;

      // Remove button handler
      li.querySelector('.remove-btn').addEventListener('click', () => {
        li.classList.add('removing');
        // Remove after animation ends
        li.addEventListener('transitionend', function handler() {
          li.remove();
          li.removeEventListener('transitionend', handler);
        });
      });

      return li;
    }

    addBtn.addEventListener('click', () => {
      const name = fileNames[fileCounter % fileNames.length] + (fileCounter > 0 ? ' (copy)' : '');
      const size = fileSizes[fileCounter % fileSizes.length];
      const newItem = createFileItem(name, size);
      fileList.appendChild(newItem);

      // Trigger entrance animation
      requestAnimationFrame(() => {
        newItem.classList.add('entering');
      });

      fileCounter++;
    });
  </script>

</body>
</html>
