<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Logout Slide</h1>
  <p class="subtitle">Slide-out confirmation panel with blur backdrop</p>

  <div class="app-shell">
    <div class="app-header">
      <span class="app-brand">MyApp</span>
      <button id="logoutBtn" class="logout-btn" aria-label="Logout">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>

    <div class="app-content">
      <div class="card">
        <h3>Dashboard</h3>
        <p>Welcome back! This is a demo of the logout slide component.</p>
      </div>
    </div>
  </div>

  <!-- Backdrop -->
  <div id="backdrop" class="backdrop"></div>

  <!-- Slide Panel -->
  <div id="panel" class="slide-panel" role="dialog" aria-modal="true" aria-label="Confirm logout">
    <div class="panel-inner">
      <div class="panel-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h2 class="panel-title">Leave so soon?</h2>
      <p class="panel-desc">You will be signed out of your account.</p>
      <div class="panel-actions">
        <button id="cancelBtn" class="btn btn-cancel">Cancel</button>
        <button id="confirmBtn" class="btn btn-confirm">Confirm Logout</button>
      </div>
    </div>
    <!-- Success state (hidden initially) -->
    <div id="successState" class="success-state">
      <svg class="checkmark" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <h2>Logged out</h2>
      <p>You have been signed out successfully.</p>
      <button id="resetBtn" class="btn btn-reset">Reset Demo</button>
    </div>
  </div>

  <script>
    const logoutBtn = document.getElementById('logoutBtn');
    const panel = document.getElementById('panel');
    const backdrop = document.getElementById('backdrop');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');
    const resetBtn = document.getElementById('resetBtn');
    const successState = document.getElementById('successState');
    const panelInner = document.querySelector('.panel-inner');
    const root = document.documentElement;

    function openPanel() {
      panel.classList.remove('panel-closed');
      panel.classList.add('panel-open');
      backdrop.classList.add('backdrop-visible');
      document.body.style.overflow = 'hidden';
    }

    function closePanel() {
      panel.classList.remove('panel-open');
      panel.classList.add('panel-closed');
      backdrop.classList.remove('backdrop-visible');
      document.body.style.overflow = '';
    }

    function showSuccess() {
      panelInner.style.display = 'none';
      successState.style.display = 'flex';
      successState.classList.add('success-visible');
    }

    function resetDemo() {
      panelInner.style.display = '';
      successState.style.display = 'none';
      successState.classList.remove('success-visible');
      panel.classList.remove('panel-closed');
      closePanel();
    }

    logoutBtn.addEventListener('click', openPanel);

    cancelBtn.addEventListener('click', closePanel);

    backdrop.addEventListener('click', closePanel);

    confirmBtn.addEventListener('click', () => {
      showSuccess();
    });

    resetBtn.addEventListener('click', resetDemo);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && panel.classList.contains('panel-open')) {
        closePanel();
      }
    });

    panel.addEventListener('transitionend', (e) => {
      if (e.propertyName === 'transform' && panel.classList.contains('panel-closed')) {
        resetDemo();
      }
    });
  </script>
</body>
</html>
