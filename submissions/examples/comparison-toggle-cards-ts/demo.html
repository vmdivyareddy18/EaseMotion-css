<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Comparison Toggle Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Compare options</p>
      <h1 id="demo-title">Comparison toggle cards</h1>
      <p>A responsive comparison layout with selected and unselected cards for product or pricing choices.</p>
    </section>
    <section class="demo-stage" aria-label="Responsive Comparison Toggle Cards">
      <div class="comparison-cards"><article class="comparison-card"><span>Basic</span><strong>$12</strong><p>For small teams getting started.</p></article><article class="comparison-card is-selected"><span>Pro</span><strong>$29</strong><p>Advanced automations and priority support.</p></article></div>
    </section>
  </main>
</body>
</html>
