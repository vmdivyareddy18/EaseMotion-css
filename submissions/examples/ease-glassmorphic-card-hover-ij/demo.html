<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Card Hover — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Glassmorphic Card</h2>
    <p>Hover over the card to see the glass blur and scale effect.</p>
    <div class="glass-card">
      <div class="glass-card__bg"></div>
      <div class="glass-card__content">
        <span class="glass-card__icon">&#10025;</span>
        <h3>Premium Plan</h3>
        <p>All features included with priority support and unlimited usage.</p>
        <a href="#" class="glass-card__btn">Upgrade Now</a>
      </div>
    </div>
    <div class="vars">
      <label>--card-bg <input type="color" value="#1a1a2e" class="var-color" data-var="--card-bg"></label>
      <label>--glass-blur <input type="range" min="2" max="30" step="1" value="12" class="var-range" data-var="--glass-blur"></label>
      <label>--border-color <input type="color" value="rgba(255,255,255,0.15)" class="var-color" data-var="--border-color"></label>
      <label>--hover-scale <input type="range" min="1" max="1.15" step="0.01" value="1.05" class="var-range" data-var="--hover-scale"></label>
    </div>
  </div>

  <script>
    document.querySelectorAll('.var-color').forEach(inp => {
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value);
      });
    });
    document.querySelectorAll('.var-range').forEach(inp => {
      const display = document.createElement('span');
      display.textContent = inp.value + (inp.dataset.var === '--glass-blur' ? 'px' : '');
      inp.after(display);
      inp.addEventListener('input', () => {
        const suffix = inp.dataset.var === '--glass-blur' ? 'px' : '';
        const val = inp.dataset.var === '--hover-scale' ? inp.value : inp.value + suffix;
        document.documentElement.style.setProperty(inp.dataset.var, val);
        display.textContent = inp.value + suffix;
      });
    });
  </script>
</body>
</html>
