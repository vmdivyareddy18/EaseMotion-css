<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push Slide | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="reveal-container">
    <div class="slide-track">
      <div class="slide slide-a">SLIDE A</div>
      <div class="slide slide-b">SLIDE B</div>
      <div class="slide slide-c">SLIDE C</div>
    </div>
    <div class="slide-indicators">
      <span class="indicator"></span>
      <span class="indicator"></span>
      <span class="indicator"></span>
    </div>
  </div>
</body>
</html>
