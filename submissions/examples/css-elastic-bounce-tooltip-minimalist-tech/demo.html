<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Tooltip // Pure CSS Elastic Bounce Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #020202; /* Cyber Void Pitch Black Baseline Canvas */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-tech-tooltip-wrapper">
    <button class="ease-tech-tooltip-target" aria-describedby="elastic-tech-log">
      RUN_DIAGNOSTIC
    </button>

    <div id="elastic-tech-log" class="ease-tech-tooltip-content" role="tooltip">
      [STATUS]: SPRING_PHYSICS_LOCKED_100%
    </div>
  </div>

</body>
</html>
