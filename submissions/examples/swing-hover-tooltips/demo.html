<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Swing-Hover Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="catalog-container">
    <header class="catalog-header">
      <h1>Product Catalog</h1>
      <p>Hover or focus on the feature badges to see the smooth CSS swing-hover tooltip in action.</p>
    </header>

    <div class="product-grid">
      <article class="product-card">
        <div class="product-image-placeholder">⚡ UltraBook Pro</div>
        <div class="product-info">
          <span class="product-tag tooltip-container" tabindex="0" aria-describedby="tip-eco">
            Eco-Certified
            <span id="tip-eco" class="tooltip" role="tooltip">
              100% Recycled Aluminum & EnergyStar 8.0 Compliant
            </span>
          </span>
          <p class="product-price">$1,299.00</p>
        </div>
      </article>

      <article class="product-card">
        <div class="product-image-placeholder">🎧 NoiseCancel X</div>
        <div class="product-info">
          <span class="product-tag tooltip-container" tabindex="0" aria-describedby="tip-shipping">
            Free Shipping
            <span id="tip-shipping" class="tooltip" role="tooltip">
              Eligible for next-day delivery nationwide
            </span>
          </span>
          <p class="product-price">$299.00</p>
        </div>
      </article>
    </div>
  </main>

</body>
</html>
