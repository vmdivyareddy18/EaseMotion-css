<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Ripple - Pure CSS Material Ripple Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-container">
      <header class="header">
        <h1>Ease Ripple</h1>
        <p>
          A high-performance, pure CSS Material Design-style ripple effect
          triggered on click.
        </p>
      </header>

      <main class="card">
        <!-- Section 1: Buttons -->
        <section>
          <h2 class="section-title">Buttons</h2>
          <div class="elements-row">
            <button class="btn btn-primary ease-ripple" id="btn-primary">
              Primary Button
            </button>
            <button class="btn btn-outline ease-ripple" id="btn-outline">
              Outline Button
            </button>
          </div>
        </section>

        <!-- Section 2: Customizations -->
        <section>
          <h2 class="section-title">Customizations</h2>
          <div class="elements-row">
            <button
              class="btn btn-custom ease-ripple"
              id="btn-amber"
              style="
                --ease-ripple-color: rgba(0, 0, 0, 0.2);
                --ease-ripple-duration: 0.8s;
              "
            >
              Amber Custom Ripple (Slow)
            </button>
            <button
              class="btn btn-primary ease-ripple"
              id="btn-cyan"
              style="
                --ease-ripple-color: rgba(6, 182, 212, 0.4);
                --ease-ripple-duration: 0.3s;
                background-color: #0891b2;
              "
            >
              Cyan Custom Ripple (Fast)
            </button>
          </div>
        </section>

        <!-- Section 3: Links & Anchors -->
        <section>
          <h2 class="section-title">Links & Navigation</h2>
          <div class="elements-row">
            <a href="#" class="nav-link ease-ripple" id="link-1">Home</a>
            <a
              href="#"
              class="nav-link ease-ripple"
              id="link-2"
              style="--ease-ripple-color: rgba(59, 130, 246, 0.2)"
              >Explore</a
            >
            <a href="#" class="nav-link ease-ripple" id="link-3">Profile</a>
          </div>
        </section>

        <!-- Section 4: Block & List Elements -->
        <section>
          <h2 class="section-title">List Items</h2>
          <div class="list-group">
            <div class="list-item ease-ripple" id="list-item-1">
              <span style="flex-grow: 1">List Item 1 (Default Ripple)</span>
              <span style="font-size: 0.85rem; color: var(--text-muted)"
                >Click to interact</span
              >
            </div>
            <div
              class="list-item ease-ripple"
              id="list-item-2"
              style="--ease-ripple-color: rgba(239, 68, 68, 0.15)"
            >
              <span style="flex-grow: 1; color: #ef4444"
                >Danger / Alert Item (Red Ripple)</span
              >
              <span style="font-size: 0.85rem; color: #ef4444">Delete</span>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
