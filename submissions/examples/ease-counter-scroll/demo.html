<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Counter Scroll Trigger</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <h1>Ease Counter Scroll Trigger</h1>
        <p>Scroll down to activate the counters.</p>
    </section>

    <section class="stats-section" id="statsSection">

        <div class="counter-card">
            <h2 class="counter" data-target="1500">0</h2>
            <p>Projects Completed</p>
        </div>

        <div class="counter-card">
            <h2 class="counter" data-target="25000">0</h2>
            <p>Active Users</p>
        </div>

        <div class="counter-card">
            <h2 class="counter" data-target="98">0</h2>
            <p>Customer Satisfaction (%)</p>
        </div>

        <div class="counter-card">
            <h2 class="counter" data-target="120">0</h2>
            <p>Team Members</p>
        </div>

    </section>

    <section class="footer">
        <h2>Animation Complete</h2>
    </section>

    <script>
        const counters =
            document.querySelectorAll(".counter");

        let started = false;

        function animateCounter(counter) {

            const target =
                Number(counter.dataset.target);

            const duration = 2000;

            let startTime = null;

            function update(currentTime) {

                if (!startTime) {
                    startTime = currentTime;
                }

                const progress =
                    Math.min(
                        (currentTime - startTime) / duration,
                        1
                    );

                const value =
                    Math.floor(progress * target);

                counter.textContent =
                    value.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    counter.textContent =
                        target.toLocaleString();
                }
            }

            requestAnimationFrame(update);
        }

        const observer = new IntersectionObserver(
            (entries) => {

                entries.forEach(entry => {

                    if (
                        entry.isIntersecting &&
                        !started
                    ) {

                        started = true;

                        counters.forEach(counter => {
                            animateCounter(counter);
                        });

                    }

                });

            },
            {
                threshold: 0.4
            }
        );

        observer.observe(
            document.getElementById("statsSection")
        );
    </script>

</body>

</html>
