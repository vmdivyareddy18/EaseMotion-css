<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Battery Charging Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Battery Charging Pulse</h1>

    <p>
      A battery charging animation designed for dashboards,
      monitoring systems, device interfaces, and productivity apps.
    </p>

    <div class="demo-grid">

      <button class="battery-button">
        <span class="battery-icon">🔋</span>
      </button>

      <button class="battery-button card-style">
        <span class="battery-icon">🔋</span>
        <span>Charging</span>
      </button>

      <div class="battery-card">
        <h3>Power Status</h3>

        <p>
          Device battery is currently charging.
        </p>

        <button class="battery-button small">
          <span class="battery-icon">🔋</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
