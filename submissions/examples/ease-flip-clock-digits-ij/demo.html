<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Clock Digits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Flip Clock Digits</h1>

  <div class="flip-clock" id="flipClock">
    <div class="flip-unit">
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
    </div>
    <span class="flip-divider">:</span>
    <div class="flip-unit">
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
    </div>
    <span class="flip-divider">:</span>
    <div class="flip-unit">
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
      <div class="flip-digit" data-digit="">
        <div class="flip-digit-top"><span></span></div>
        <div class="flip-digit-bottom"><span></span></div>
      </div>
    </div>
  </div>

  <script>
    const digits = document.querySelectorAll('.flip-digit');

    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const time = h + m + s;

      digits.forEach((digit, i) => {
        const newVal = time[i];
        const currentVal = digit.dataset.digit;

        if (newVal !== currentVal) {
          digit.dataset.digit = newVal;
          const top = digit.querySelector('.flip-digit-top span');
          const bottom = digit.querySelector('.flip-digit-bottom span');

          if (currentVal !== '') {
            top.textContent = currentVal;
            bottom.textContent = newVal;
            digit.classList.remove('flip');
            void digit.offsetWidth;
            digit.classList.add('flip');
          } else {
            top.textContent = newVal;
            bottom.textContent = newVal;
          }
        }
      });
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
