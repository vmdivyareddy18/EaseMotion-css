<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Tag - Nature Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nature-wrapper">
        <header class="nature-header">
            <span class="nature-meta">ECOSYSTEM // BIO-42027</span>
            <h2>TERRAIN TAXONOMY</h2>
        </header>

        <div class="tag-cloud">
            <span class="nature-tag" style="--tag-index: 1;">Rainforest</span>
            <span class="nature-tag" style="--tag-index: 2;">Mangrove</span>
            <span class="nature-tag" style="--tag-index: 3;">Canopy</span>
            <span class="nature-tag" style="--tag-index: 4;">Bio-Reserve</span>
            <span class="nature-tag" style="--tag-index: 5;">Understory</span>
            <span class="nature-tag" style="--tag-index: 6;">Wetlands</span>
        </div>
    </div>

</body>
</html>
