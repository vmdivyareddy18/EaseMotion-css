<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Active Creative Portfolio Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    View Portfolio
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="hero"></div>

        <h2>Creative Portfolio</h2>

        <p>
            Showcase featured projects through a modern Pulse-Active modal
            designed entirely with HTML and CSS.
        </p>

        <div class="projects">

            <div class="card">
                <h4>Brand Design</h4>
            </div>

            <div class="card">
                <h4>Illustrations</h4>
            </div>

            <div class="card">
                <h4>UI Concepts</h4>
            </div>

        </div>

        <button>Explore Portfolio</button>

    </div>

</div>

</body>
</html>
