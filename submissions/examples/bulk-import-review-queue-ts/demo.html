<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Import Review Queue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="import-title">
      <p class="eyebrow">Import review</p>
      <h1 id="import-title">Customer CSV queue</h1>
      <ul class="import-list">
        <li class="import-row is-ready"><span>customers.csv</span><strong>Ready</strong></li>
        <li class="import-row has-warning"><span>leads.csv</span><strong>Duplicate email</strong></li>
        <li class="import-row has-error"><span>archive.csv</span><strong>12 invalid rows</strong></li>
        <li class="import-row is-imported"><span>sample.csv</span><strong>Imported</strong></li>
      </ul>
    </section>
  </main>
</body>
</html>
