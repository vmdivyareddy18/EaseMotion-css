<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growing Search Input</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'input-bg') root.style.setProperty('--input-bg', t.value);
      if (t.name === 'input-color') root.style.setProperty('--input-color', t.value);
      if (t.name === 'input-focus-bg') root.style.setProperty('--input-focus-bg', t.value);
      if (t.name === 'expand-duration') root.style.setProperty('--expand-duration', t.value + 's');
    });
    document.addEventListener('DOMContentLoaded', () => {
      const w = document.querySelector('.search-wrapper'), i = w.querySelector('.search-input');
      w.addEventListener('click', () => { w.classList.add('expanded'); i.focus(); });
      i.addEventListener('blur', () => { if (!i.value) w.classList.remove('expanded'); });
    });
  </script>
  <div class="container">
    <p class="title">Growing Search Input</p>
    <div class="search-wrapper">
      <span class="search-icon">&#x1F50D;</span>
      <input class="search-input" type="text" placeholder="Search...">
    </div>
    <div class="controls">
      <label>BG: <input type="color" name="input-bg" value="#2d2d44"></label>
      <label>Text: <input type="color" name="input-color" value="#eee"></label>
      <label>Focus: <input type="color" name="input-focus-bg" value="#3d3d5a"></label>
      <label>Speed: <input type="range" name="expand-duration" min="0.1" max="1" step="0.05" value="0.3"></label>
    </div>
  </div>
</body>
</html>
