<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand-Drawn Underline | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>✏️ Hand-Drawn Underline</h1>
    <p class="subtitle">Hover over the text below to see the sketch effect</p>

    <div class="demo-area">
      <p class="underlined">This text has a <span class="draw-underline" style="--underline-color: #f97316; --line-thickness: 4px; --sketch-roughness: 3px;">hand-drawn</span> underline</p>
      <p class="underlined">Try the <span class="draw-underline" style="--underline-color: #a78bfa; --line-thickness: 3px; --draw-duration: 0.6s; --sketch-roughness: 2px;">sketchy</span> effect</p>
      <p class="underlined">Customise <span class="draw-underline" style="--underline-color: #34d399; --line-thickness: 5px; --draw-duration: 1.2s; --sketch-roughness: 4px;">roughness &amp; speed</span></p>
    </div>

    <div class="controls">
      <label>Underline Color <input type="color" id="colorPicker" value="#f97316"></label>
      <label>Thickness <input type="range" id="thicknessRange" min="1" max="8" value="4"></label>
      <label>Duration <input type="range" id="durationRange" min="0.2" max="2.0" step="0.1" value="0.8"></label>
      <label>Roughness <input type="range" id="roughnessRange" min="0" max="6" value="3"></label>
    </div>
  </div>

  <script>
    const target = document.querySelector('.draw-underline');
    const color = document.getElementById('colorPicker');
    const thickness = document.getElementById('thicknessRange');
    const duration = document.getElementById('durationRange');
    const roughness = document.getElementById('roughnessRange');

    function update() {
      target.style.setProperty('--underline-color', color.value);
      target.style.setProperty('--line-thickness', thickness.value + 'px');
      target.style.setProperty('--draw-duration', duration.value + 's');
      target.style.setProperty('--sketch-roughness', roughness.value + 'px');
    }
    color.addEventListener('input', update);
    thickness.addEventListener('input', update);
    duration.addEventListener('input', update);
    roughness.addEventListener('input', update);
  </script>
</body>
</html>
