<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch Focus-Visible Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-switch – Keyboard Focus Ring Fix</h2>
  <div class="demo-stack">
    <label class="ease-switch">
      <input class="ease-switch__input" type="checkbox" id="sw1">
      <span class="ease-switch__track"></span>
      <span class="ease-switch__label">Enable notifications</span>
    </label>
    <label class="ease-switch">
      <input class="ease-switch__input" type="checkbox" id="sw2" checked>
      <span class="ease-switch__track"></span>
      <span class="ease-switch__label">Dark mode</span>
    </label>
    <label class="ease-switch">
      <input class="ease-switch__input" type="checkbox" id="sw3" disabled>
      <span class="ease-switch__track" style="opacity:0.5;cursor:not-allowed;"></span>
      <span class="ease-switch__label" style="opacity:0.5;">Auto-save (disabled)</span>
    </label>
  </div>
  <p class="note">Tab to the switches — a blue focus ring appears on keyboard focus.</p>
</body>
</html>
