<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turtle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="bub bb1"></span>
    <span class="bub bb2"></span>
    <div class="turtle">
      <span class="flip fl"></span>
      <span class="flip bl"></span>
      <span class="flip fr"></span>
      <span class="flip br"></span>
      <span class="tail"></span>
      <div class="shell">
        <span class="plates"></span>
        <span class="rim"></span>
      </div>
      <span class="head">
        <span class="eye"></span>
        <span class="smile"></span>
      </span>
    </div>
    <span class="floor"></span>
  </div>
</body>
</html>
