<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Star Favorite Twinkle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Star Favorite Twinkle</h1>

    <p>
      A subtle twinkle animation for favorite, rating,
      achievement, and featured content interfaces.
    </p>

    <div class="demo-grid">

      <button class="favorite-button">
        <span class="star-icon">⭐</span>
      </button>

      <button class="favorite-button card-style">
        <span class="star-icon">⭐</span>
        <span>Favorite</span>
      </button>

      <div class="feature-card">
        <h3>Featured Item</h3>
        <p>
          Highlight important content with a twinkling star.
        </p>

        <button class="favorite-button small">
          <span class="star-icon">⭐</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
