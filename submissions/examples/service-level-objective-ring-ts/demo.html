<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Level Objective Ring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="slo-grid">
    <section class="slo healthy">
      <div class="ring" style="--score: 94%"><span>99.94%</span></div>
      <h1>API uptime</h1>
      <p>Healthy burn rate</p>
    </section>
    <section class="slo warning">
      <div class="ring" style="--score: 68%"><span>99.68%</span></div>
      <h2>Checkout latency</h2>
      <p>Warning budget use</p>
    </section>
    <section class="slo breached">
      <div class="ring" style="--score: 37%"><span>98.37%</span></div>
      <h2>Email delivery</h2>
      <p>SLO breached</p>
    </section>
  </main>
</body>
</html>
