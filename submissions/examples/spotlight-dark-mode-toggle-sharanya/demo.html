<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Dark Mode Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="toggle-demo">

    <!-- Heading -->
    <div class="demo-header ease-fade-in">
        <h1>Spotlight Dark Mode Toggle</h1>
        <p>
            A reusable spotlight-inspired dark mode toggle built with pure HTML and CSS.
        </p>
    </div>

    <!-- Main Component -->
    <div class="toggle-wrapper ease-scale-in">

        <!-- Light Mode Icon -->
        <div class="mode-icon sun">
            ☀
        </div>

        <!-- Toggle Track -->
        <div class="toggle-track">

            <!-- Spotlight -->
            <div class="spotlight"></div>

            <!-- Sliding Knob -->
            <div class="toggle-knob"></div>

        </div>

        <!-- Dark Mode Icon -->
        <div class="mode-icon moon">
            ☾
        </div>

    </div>

</section>

</body>
</html>
