<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Globe Rotation Orbit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Globe Rotation Orbit</h1>

    <p>
      A reusable globe animation for worldwide connectivity,
      internet services, networking platforms, and analytics dashboards.
    </p>

    <div class="demo-grid">

      <button class="globe-button">
        <span class="globe-icon">🌐</span>
      </button>

      <button class="globe-button card-style">
        <span class="globe-icon">🌐</span>
        <span>Global Network</span>
      </button>

      <div class="globe-card">
        <h3>Worldwide Access</h3>

        <p>
          Connect users across the globe with seamless communication.
        </p>

        <button class="globe-button small">
          <span class="globe-icon">🌐</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
