<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Hover Button - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Magnetic Hover</h1>
    <p class="desc">Move cursor over the button — it follows with a magnetic pull</p>
    <div class="magnet-container">
      <button class="magnet-btn" id="magnetBtn">
        <span class="btn-label">Hover Me</span>
      </button>
    </div>
  </div>
  <script>
    const btn = document.getElementById('magnetBtn');

    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      const maxDist = 14;
      const dist = Math.sqrt(x * x + y * y);
      const scale = Math.min(dist / 40, 1);
      const strength = maxDist * scale;
      const angle = Math.atan2(y, x);
      const pullX = Math.cos(angle) * strength;
      const pullY = Math.sin(angle) * strength;
      btn.style.setProperty('--mx', pullX);
      btn.style.setProperty('--my', pullY);
    });

    btn.addEventListener('mouseleave', () => {
      btn.style.setProperty('--mx', 0);
      btn.style.setProperty('--my', 0);
    });
  </script>
</body>
</html>
