<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Tracking Expand - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="ease-tracking-expand">ELEVATED TITLES</h1>
        <button onclick="let h=document.querySelector('h1'); h.classList.remove('ease-tracking-expand'); void h.offsetWidth; h.classList.add('ease-tracking-expand');">Expand</button>
    </div>
</body>
</html>
