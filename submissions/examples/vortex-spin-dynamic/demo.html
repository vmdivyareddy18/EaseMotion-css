<!DOCTYPE html>
<!-- submissions/examples/vortex-spin-sm/demo.html -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Vortex Spin - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Heading Node Field Element -->
  <h2 class="component-heading">3D Vortex Spin Entrance</h2>

  <!-- Polished structural display target container card -->
  <div class="anim-vortex-spin" id="vortexCardShell">
    click button to replay the vortex spin!
  </div>

  <!-- Action controller node wrapper -->
  <button class="replay-action-trigger" id="replayButtonControl">
    <span>🔁</span> Replay Motion
  </button>

  <!-- High-speed clean runtime layout re-trigger logic script -->
  <script>
    const card = document.getElementById('vortexCardShell');
    const button = document.getElementById('replayButtonControl');

    button.addEventListener('click', () => {
      // Forcefully strips rendering track paths to enforce DOM element reset loops
      card.style.animation = 'none';
      
      // Triggering DOM reflow matrix sync steps to flush existing layouts cleanly
      void card.offsetWidth;
      
      // Re-assigns clean native animation parameters back to pipeline track sheets
      card.style.animation = null;
    });
  </script>

</body>
</html>
