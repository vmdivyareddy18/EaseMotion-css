<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Combo Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Combo Counter</h1>
    <p class="subtitle">Each hit increases the combo. Watch the scale pulse and color intensify.</p>
    <div class="display-area">
      <div style="text-align:center">
        <div class="combo-counter" id="comboDisplay">0</div>
        <div class="combo-label">Combo</div>
      </div>
    </div>
    <button id="addBtn">+ Add</button>
    <button id="resetBtn">Reset</button>
  </div>
  <script>
    const display = document.getElementById('comboDisplay');
    const addBtn = document.getElementById('addBtn');
    const resetBtn = document.getElementById('resetBtn');
    let count = 0;
    function update() {
      display.textContent = count;
      display.classList.remove('pulse');
      void display.offsetWidth;
      display.classList.add('pulse');
      if (count < 5) display.style.color = '#10b981';
      else if (count < 10) display.style.color = '#f59e0b';
      else display.style.color = '#ef4444';
    }
    addBtn.addEventListener('click', () => { count++; update(); });
    resetBtn.addEventListener('click', () => { count = 0; update(); });
  </script>
</body>
</html>
