<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slot Reel — Slot Machine Spinning Reel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <div class="reel">
        <div class="reel-window">
          <div class="reel-strip" id="strip">
            <span class="reel-symbol">🍒</span>
            <span class="reel-symbol">🍋</span>
            <span class="reel-symbol">🍊</span>
            <span class="reel-symbol">🔔</span>
            <span class="reel-symbol">💎</span>
            <span class="reel-symbol">7️⃣</span>
          </div>
        </div>
        <button class="reel-btn" id="spinBtn">Spin</button>
      </div>
    </main>
    <script>
      document.getElementById('spinBtn').addEventListener('click', function() {
        const strip = document.getElementById('strip');
        strip.style.animation = 'none';
        void strip.offsetHeight;
        strip.style.animation = 'spin-reel 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
      });
    </script>
  </body>
</html>
