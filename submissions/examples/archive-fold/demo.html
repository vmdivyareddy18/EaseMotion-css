<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Fold Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Stage presentation defaults */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .container {
      perspective: 1000px; /* Establishes 3D space matrix */
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="ease-archive-folder" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" aria-label="Open Project Architecture Archive Vault">
      
      <div class="folder-back">
        <div class="folder-tab"></div>
      </div>

      <div class="folder-documents">
        <div class="doc-sheet doc-1" aria-hidden="true"></div>
        <div class="doc-sheet doc-2" aria-hidden="true"></div>
      </div>

      <div class="folder-front">
        <div class="folder-stamp">
          <span>SECURE</span>
          <span class="stamp-sub">PRJ_750</span>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
