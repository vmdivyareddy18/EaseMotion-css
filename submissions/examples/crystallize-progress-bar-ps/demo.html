<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphic Crystallize Progress Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-theme">
    <div class="crystallize-container">
        <div class="progress-details">
            <span class="progress-label">System Crystallization</span>
            <span class="progress-percentage">78%</span>
        </div>
        
        <div class="glass-track">
            <div class="crystal-fill">
                <div class="crystal-sheen"></div>
            </div>
        </div>
        
        <p class="progress-status">Optimizing visual shaders...</p>
    </div>
</body>
</html>
