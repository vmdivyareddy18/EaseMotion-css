<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-blur-out - Quick Exit</title>
  <meta name="description" content="A demonstration of the ease-blur-out animation showing an element exiting quickly via simultaneous blur and fade.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-blur-out</h1>
      <p class="subtitle" id="main-desc">Fast and clean exit using a quick blur and fade transition</p>
    </header>

    <div class="display-area">
      <!-- Target that blurs out -->
      <div class="blur-target" id="target-element">
        <span>⚠ Alert: Quick Exit Modal</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Blur-Out</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-blur-out');
      void target.offsetWidth;
      target.classList.add('ease-blur-out');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-blur-out');
    }
  </script>

</body>
</html>
