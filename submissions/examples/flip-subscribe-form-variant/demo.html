<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Subscribe Form | EaseMotion CSS</title>
  
  <!-- Tailwind Play CDN for layout framing only -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Component styling layer -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

  <div class="text-center space-y-2 mb-16">
    <span class="text-xs font-mono uppercase tracking-widest text-indigo-400 font-semibold px-2.5 py-1 bg-indigo-500/10 rounded-full">GSSoC-26 / ECSoC-26 Feature</span>
    <h1 class="text-3xl font-extrabold tracking-tight">Flip Subscribe Form</h1>
    <p class="text-sm text-slate-400">Pure CSS interactive 3D rotating subscription panel</p>
  </div>

  <!-- Component Interactive Wrapper -->
  <div class="ease-flip-form-container">
    
    <!-- State controller check to trigger the final success animation state without JS -->
    <input type="checkbox" id="ease-form-success-trigger" class="ease-form-toggle-state">
    
    <div class="ease-flip-card">
      
      <!-- FRONT SIDE: The Interactive Subscription Field -->
      <div class="ease-flip-face ease-flip-front">
        <form class="ease-subscribe-form" onsubmit="event.preventDefault(); document.getElementById('ease-form-success-trigger').checked = true;">
          <h3 class="ease-form-title">Join Our Newsletter</h3>
          <p class="ease-form-subtitle">Get the latest UI component releases directly in your inbox.</p>
          
          <div class="ease-input-group">
            <input 
              type="email" 
              class="ease-form-input" 
              placeholder="Enter your email address" 
              required
              aria-label="Email address"
            >
            <button type="submit" class="ease-form-submit-btn" aria-label="Subscribe">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </form>
      </div>

      <!-- BACK SIDE: The Success Confirmation State -->
      <div class="ease-flip-face ease-flip-back">
        <div class="ease-success-view">
          <div class="ease-success-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <h3 class="ease-form-title text-emerald-400">You're on the list!</h3>
          <p class="ease-form-subtitle">Thank you for subscribing. Prepare for premium telemetry updates.</p>
          
          <label for="ease-form-success-trigger" class="ease-form-reset-link" role="button">
            Go back
          </label>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
