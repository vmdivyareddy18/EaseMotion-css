<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Shimmer Sweep Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

E-Commerce Checkout

</span>

<h1>

Shimmer Sweep Modal

</h1>

<p>

Checkout confirmation modal
designed with a subtle
shimmer animation for
modern shopping experiences.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Complete Purchase

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="icon">

🛒

</div>

<h2>

Order Confirmed

</h2>

<p>

Thank you for your purchase.

Your order has been placed
successfully and is being
prepared for shipment.

</p>

<div class="price">

₹4,999

</div>

<button>

Track Order

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
