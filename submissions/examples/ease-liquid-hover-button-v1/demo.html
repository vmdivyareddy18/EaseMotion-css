<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Liquid Hover Button</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ease Liquid Hover Button</h1>
    <p>Hover over the buttons to see the liquid fill animation.</p>

    <div class="button-group">

        <button class="ease-liquid-btn">
            Default
        </button>

        <button class="ease-liquid-btn blue">
            Blue
        </button>

        <button class="ease-liquid-btn purple">
            Purple
        </button>

        <button class="ease-liquid-btn green">
            Green
        </button>

    </div>

</div>

</body>
</html>
