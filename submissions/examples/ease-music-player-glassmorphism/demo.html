<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Media Player</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="gradient-bg"></div>

  <main class="player-card" role="region" aria-label="Media Player">
    <div class="album-art-container">
      <div class="vinyl-record active">
        <div class="vinyl-center"></div>
      </div>
    </div>

    <div class="track-details">
      <h2>EaseMotion Symphony</h2>
      <p>Lofi Atmospheric Sounds</p>
    </div>

    <!-- Animated Waveform -->
    <div class="waveform-container" aria-hidden="true">
      <span class="bar bar-1"></span>
      <span class="bar bar-2"></span>
      <span class="bar bar-3"></span>
      <span class="bar bar-4"></span>
      <span class="bar bar-5"></span>
      <span class="bar bar-6"></span>
      <span class="bar bar-7"></span>
    </div>

    <div class="progress-controls">
      <input type="range" class="player-slider" min="0" max="100" value="45" aria-label="Track progress">
      <div class="time-labels">
        <span>1:54</span>
        <span>4:12</span>
      </div>
    </div>

    <div class="player-buttons">
      <button type="button" class="ctrl-btn" aria-label="Previous Track">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="19 20 9 12 19 4 19 20"/><line x1='5' y1='4' x2='5' y2='20'/></svg>
      </button>
      <button type="button" class="play-btn ctrl-btn" aria-label="Pause Track">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button type="button" class="ctrl-btn" aria-label="Next Track">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 4 15 12 5 20 5 4"/><line x1='19' y1='4' x2='19' y2='20'/></svg>
      </button>
    </div>
  </main>
</body>
</html>
