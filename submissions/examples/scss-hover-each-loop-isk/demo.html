<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS hover Refactoring via Loop - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to compiled utilities stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">SCSS @each Loop Hover Utilities</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
      Demonstrating utility classes generated automatically using a Sass map and <code>@each</code> loop. This reduces repetitive CSS boilerplate code while maintaining strict uniformity.
    </p>

    <!-- Hover Cards Grid -->
    <div class="demo-grid">
      <div class="hover-demo-card ease-hover-grow">
        Grow Effect
      </div>

      <div class="hover-demo-card ease-hover-shrink">
        Shrink Effect
      </div>

      <div class="hover-demo-card ease-hover-lift">
        Lift Effect
      </div>

      <div class="hover-demo-card ease-hover-glow">
        Glow Effect
      </div>

      <div class="hover-demo-card ease-hover-blur">
        Blur Effect
      </div>
    </div>
  </div>

</body>
</html>
