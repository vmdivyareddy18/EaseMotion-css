<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Status Indicator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Status Indicators</h1>

<div class="status online">
    <span class="dot"></span>
    <span>Online</span>
</div>

<div class="status offline">
    <span class="dot"></span>
    <span>Offline</span>
</div>

<div class="status busy">
    <span class="dot"></span>
    <span>Busy</span>
</div>

<div class="status away">
    <span class="dot"></span>
    <span>Away</span>
</div>

</div>

</body>
</html>
