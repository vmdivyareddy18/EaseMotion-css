<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copy Button Feedback | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Copy Button Feedback</h1>

    <div class="code-block">
      <div class="code-header">
        <span class="lang-label">HTML</span>
        <button class="copy-btn" data-code="&lt;!DOCTYPE html&gt;&#10;&lt;html&gt;&#10;  &lt;body&gt;&#10;    &lt;h1&gt;Hello World&lt;/h1&gt;&#10;  &lt;/body&gt;&#10;&lt;/html&gt;">
          <span class="btn-text">Copy</span>
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </button>
      </div>
      <pre><code>&lt;!DOCTYPE html&gt;
&lt;html&gt;
  &lt;body&gt;
    &lt;h1&gt;Hello World&lt;/h1&gt;
  &lt;/body&gt;
&lt;/html&gt;</code></pre>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span class="lang-label">CSS</span>
        <button class="copy-btn" data-code="body {&#10;  margin: 0;&#10;  display: flex;&#10;  place-items: center;&#10;  min-height: 100vh;&#10;}">
          <span class="btn-text">Copy</span>
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </button>
      </div>
      <pre><code>body {
  margin: 0;
  display: flex;
  place-items: center;
  min-height: 100vh;
}</code></pre>
    </div>

    <div class="code-block">
      <div class="code-header">
        <span class="lang-label">JavaScript</span>
        <button class="copy-btn" data-code="const greet = (name) => {&#10;  return `Hello, ${name}!`;&#10;};&#10;&#10;console.log(greet('World'));">
          <span class="btn-text">Copy</span>
          <span class="btn-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </span>
        </button>
      </div>
      <pre><code>const greet = (name) => {
  return `Hello, ${name}!`;
};

console.log(greet('World'));</code></pre>
    </div>
  </div>

  <script>
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(btn.dataset.code);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = btn.dataset.code;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        btn.classList.add('success');
        btn.querySelector('.btn-text').textContent = 'Copied!';
        setTimeout(() => {
          btn.classList.remove('success');
          btn.querySelector('.btn-text').textContent = 'Copy';
        }, parseInt(getComputedStyle(document.documentElement).getPropertyValue('--copy-fb-duration')) || 2000);
      });
    });
  </script>
</body>
</html>
