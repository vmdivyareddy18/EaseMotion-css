<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Bar Animated Expand Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1rem;
    }

    .navbar {
      background: white;
      width: 320px;
      padding: 1rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .navbar h3 {
      margin: 0;
      font-size: 1rem;
      color: #333;
    }

    p {
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <p>Click the search icon to expand →</p>

  <div class="navbar">
    <h3>MyApp</h3>

    <div class="ease-search-expand">
      <button class="ease-search-trigger" type="button">🔍</button>
      <input class="ease-search-input" type="text" placeholder="Search..." />
    </div>
  </div>

</body>
</html>
