<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Card Accent Dark Mode Fix Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Card Accent Variants (Light + Dark Mode)</h2>

  <div class="ease-card ease-card-accent">
    <h3>Primary Accent Card</h3>
    <p>This card uses the primary accent color.</p>
  </div>

  <div class="ease-card ease-card-accent-success">
    <h3>Success Accent Card</h3>
    <p>This card uses the success accent color.</p>
  </div>

  <div class="ease-card ease-card-accent-danger">
    <h3>Danger Accent Card</h3>
    <p>This card uses the danger accent color.</p>
  </div>

  <div class="ease-card ease-card-accent-warning">
    <h3>Warning Accent Card</h3>
    <p>This card uses the warning accent color.</p>
  </div>

</body>
</html>
