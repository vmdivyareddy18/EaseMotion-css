<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Skew Hashtag Input Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .panel-card {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      border: 1px solid #edf2f7;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }
    .panel-info {
      font-family: system-ui, sans-serif;
      margin-bottom: 2rem;
      text-align: center;
    }
    .panel-info h1 {
      margin: 0 0 0.5rem 0;
      color: #0f172a;
      font-size: 1.75rem;
    }
    .panel-info p {
      margin: 0;
      color: #64748b;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>

  <div class="panel-card">
    <div class="panel-info">
      <h1>EaseMotion Control Panel</h1>
      <p>Click field to test skew; click individual tags to dismiss them.</p>
    </div>

    <!-- Component Root -->
    <div class="em-input-wrapper">
      <label class="em-input-label" for="primary-tags-field">Meta Metadata Hashtags</label>
      
      <div class="em-skew-input-group">
        
        <!-- Interactive Pill 1 -->
        <input type="checkbox" id="tag-opt-1" class="em-tag-toggle">
        <label for="tag-opt-1" class="em-hashtag-pill" title="Click to remove tag">admin</label>

        <!-- Interactive Pill 2 -->
        <input type="checkbox" id="tag-opt-2" class="em-tag-toggle">
        <label for="tag-opt-2" class="em-hashtag-pill" title="Click to remove tag">dashboard</label>

        <!-- Interactive Pill 3 -->
        <input type="checkbox" id="tag-opt-3" class="em-tag-toggle">
        <label for="tag-opt-3" class="em-hashtag-pill" title="Click to remove tag">tailwind</label>
        
        <!-- Text Input Element -->
        <input 
          type="text" 
          id="primary-tags-field" 
          class="em-main-field" 
          placeholder="Add tag..." 
          autocomplete="off"
        >
      </div>
    </div>
  </div>

</body>
</html>
