<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown Timer — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #020617; padding: 4rem 1rem; margin: 0;">

  <div class="ease-timer-viewport" id="timerViewport">
    <div class="ease-circular-monitor">
      <svg class="ease-svg-ring" width="220" height="220">
        <circle class="bg" r="90" cx="110" cy="110" stroke="#1e293b"></circle>
        <circle class="progress" id="progressRing" r="90" cx="110" cy="110" stroke="#0ea5e9" stroke-dasharray="565.48" stroke-dashoffset="0"></circle>
      </svg>
      
      <div class="ease-flip-group">
        <div>
          <div class="ease-flip-card"><span class="ease-flip-num" id="minutesTens">0</span></div>
        </div>
        <div>
          <div class="ease-flip-card"><span class="ease-flip-num" id="minutesOnes">2</span></div>
          <div class="ease-label-sub">Min</div>
        </div>
        <div style="font-size:2rem; color:#64748b; font-weight:700; line-height:1.2;">:</div>
        <div>
          <div class="ease-flip-card"><span class="ease-flip-num" id="secondsTens">0</span></div>
        </div>
        <div>
          <div class="ease-flip-card"><span class="ease-flip-num" id="secondsOnes">0</span></div>
          <div class="ease-label-sub">Sec</div>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 1rem;">
      <button id="startBtn" style="background: #0ea5e9; color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 0.375rem; font-weight: 600; cursor: pointer;">Reset & Run</button>
    </div>
  </div>

  <script>
    const progressRing = document.getElementById('progressRing');
    const viewport = document.getElementById('timerViewport');
    const startBtn = document.getElementById('startBtn');
    
    const maxCircleValue = 565.48;
    let duration = 120; // 2 minutes layout mock
    let remaining = duration;
    let timerInterval = null;

    function updateDisplay() {
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;

      document.getElementById('minutesTens').textContent = Math.floor(mins / 10);
      document.getElementById('minutesOnes').textContent = mins % 10;
      document.getElementById('secondsTens').textContent = Math.floor(secs / 10);
      document.getElementById('secondsOnes').textContent = secs % 10;

      // Map progress track ratio smoothly
      const progressPercent = remaining / duration;
      progressRing.style.strokeDashoffset = maxCircleValue * (1 - progressPercent);

      if (remaining <= 0) {
        clearInterval(timerInterval);
        viewport.classList.add('is-expired');
      }
    }

    startBtn.addEventListener('click', () => {
      clearInterval(timerInterval);
      viewport.classList.remove('is-expired');
      remaining = duration;
      updateDisplay();

      timerInterval = setInterval(() => {
        remaining--;
        updateDisplay();
      }, 1000);
    });

    updateDisplay();
  </script>
</body>
</html>
