<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Bar - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sb-header"><h1>CSS Search Bar</h1><p>Animated expandable search bar with icon, input, and clear button</p></header>
<section class="sb-section"><h2>Search Bar Variations</h2><div class="sb-example"><label>Expand on Click</label><div class="sb-wrap sb-expand"><div class="sb-bar"><span class="sb-icon">🔍</span><input type="text" class="sb-input" placeholder="Search..."><button class="sb-clear">✕</button></div></div></div><div class="sb-example"><label>Full Width</label><div class="sb-wrap sb-full"><div class="sb-bar"><span class="sb-icon">🔍</span><input type="text" class="sb-input" placeholder="Type to search..."><button class="sb-clear">✕</button></div></div></div><div class="sb-example"><label>With Filter Button</label><div class="sb-wrap sb-filter"><div class="sb-bar"><span class="sb-icon">🔍</span><input type="text" class="sb-input" placeholder="Search..."><button class="sb-filter-btn">⚙</button></div></div></div></section>
<section class="sb-section"><h2>Usage</h2><pre>&lt;div class="sb-wrap sb-expand"&gt;
  &lt;div class="sb-bar"&gt;
    &lt;span class="sb-icon"&gt;&amp;#x1F50D;&lt;/span&gt;
    &lt;input class="sb-input" placeholder="Search..."&gt;
  &lt;/div&gt;
&lt;/div&gt;</pre></section>
</body>
</html>
