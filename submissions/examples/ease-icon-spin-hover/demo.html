<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-icon-spin-hover – Icon Spin on Hover</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Icon Spin on Hover
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Hover over the icons to see them spin 360°.
    </p>

    <div class="ease-flex ease-justify-center ease-gap-10 ease-flex-wrap">
      <div class="spin-icon-wrapper">
        <span class="ease-icon-spin-hover spin-icon">🔄</span>
        <p class="ease-text-sm ease-mt-2 ease-font-semibold">Refresh</p>
      </div>
      <div class="spin-icon-wrapper">
        <span class="ease-icon-spin-hover spin-icon">⚙️</span>
        <p class="ease-text-sm ease-mt-2 ease-font-semibold">Settings</p>
      </div>
      <div class="spin-icon-wrapper">
        <span class="ease-icon-spin-hover spin-icon">⏳</span>
        <p class="ease-text-sm ease-mt-2 ease-font-semibold">Loading</p>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Smooth one‑shot rotation on <code>:hover</code>.
    </p>
  </div>

</body>
</html>
