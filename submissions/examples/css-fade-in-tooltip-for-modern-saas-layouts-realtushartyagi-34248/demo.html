<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-In Tooltip (Modern SaaS)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .dashboard-panel {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      text-align: center;
      border: 1px solid #e5e7eb;
    }
    
    .panel-title {
      color: #111827;
      margin-top: 0;
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 24px;
    }
  </style>
</head>
<body>
  <div class="dashboard-panel">
    <h2 class="panel-title">Dashboard Settings</h2>
    
    <!-- Tooltip Wrapper -->
    <div class="ease-saas-tooltip-wrapper">
      <button class="ease-saas-btn" aria-describedby="saas-tooltip">
        Sync Data
      </button>
      
      <!-- Tooltip Content -->
      <div id="saas-tooltip" class="ease-saas-tooltip-content" role="tooltip">
        Last synced: 2 mins ago
      </div>
    </div>
    
  </div>
</body>
</html>
