<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fieldset & Legend Styling Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Fieldset &amp; Legend Styling</h1>
    <p>Custom <code>fieldset</code> and <code>legend</code> element decoration</p>
  </header>
  <main class="form-grid">
    <fieldset class="custom-fieldset">
      <legend><span class="legend-icon">&#128100;</span> Personal Information</legend>
      <div class="field-row">
        <label for="fname">Full Name</label>
        <input type="text" id="fname" placeholder="John Doe">
      </div>
      <div class="field-row">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com">
      </div>
    </fieldset>
    <fieldset class="custom-fieldset accent">
      <legend><span class="legend-badge">Billing</span> Address Details</legend>
      <div class="field-row">
        <label for="street">Street</label>
        <input type="text" id="street" placeholder="123 Main St">
      </div>
      <div class="field-row">
        <label for="zip">ZIP Code</label>
        <input type="text" id="zip" placeholder="12345">
      </div>
    </fieldset>
    <fieldset class="custom-fieldset disabled-fieldset" disabled>
      <legend><span class="legend-icon">&#128274;</span> Disabled Section</legend>
      <div class="field-row">
        <label for="locked">Locked Field</label>
        <input type="text" id="locked" value="Cannot edit">
      </div>
      <div class="field-row">
        <label for="locked2">Another Locked Field</label>
        <input type="text" id="locked2" value="Read-only">
      </div>
    </fieldset>
    <fieldset class="custom-fieldset inline-legend">
      <legend>Preferences <span class="legend-dot"></span></legend>
      <div class="field-row">
        <label><input type="checkbox"> Notifications</label>
      </div>
      <div class="field-row">
        <label><input type="checkbox"> Weekly Digest</label>
      </div>
    </fieldset>
  </main>
  <footer><p>Fieldset groups with decorated legends and form controls.</p></footer>
</body>
</html>
