<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion-container">

    <h1>EaseMotion Accordion</h1>

    <div class="accordion-item">
        <button class="accordion-header">
            What is EaseMotion CSS?
            <span>+</span>
        </button>

        <div class="accordion-content">
            <p>
                EaseMotion CSS is an animation-first CSS framework
                with reusable UI components and modern effects.
            </p>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header">
            Is it beginner friendly?
            <span>+</span>
        </button>

        <div class="accordion-content">
            <p>
                Yes. EaseMotion uses human-readable class names
                and requires minimal setup.
            </p>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header">
            Does it support animations?
            <span>+</span>
        </button>

        <div class="accordion-content">
            <p>
                Absolutely. Animations are first-class citizens
                in EaseMotion CSS.
            </p>
        </div>
    </div>

</div>

<script>
const accordionHeaders =
document.querySelectorAll(".accordion-header");

accordionHeaders.forEach(header => {

    header.addEventListener("click", () => {

        const content =
        header.nextElementSibling;

        const isActive =
        content.classList.contains("active");

        document
        .querySelectorAll(".accordion-content")
        .forEach(item => {
            item.classList.remove("active");
            item.style.maxHeight = null;
        });

        document
        .querySelectorAll(".accordion-header span")
        .forEach(icon => icon.textContent = "+");

        if (!isActive) {
            content.classList.add("active");
            content.style.maxHeight =
            content.scrollHeight + "px";

            header.querySelector("span")
            .textContent = "−";
        }
    });
});
</script>

</body>
</html>
