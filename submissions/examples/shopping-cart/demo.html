<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart Drawer — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0; font-family: sans-serif;">

  <div style="text-align: center;">
    <button id="openCartBtn" style="background: #0f172a; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; font-weight: 600; cursor: pointer; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
      View Cart Drawer (2 items)
    </button>
  </div>

  <div class="ease-cart-overlay" id="cartOverlay">
    <div class="ease-cart-drawer" id="cartDrawer">
      <div class="ease-cart-header">
        <h3 class="ease-cart-title">Your Cart</h3>
        <button class="ease-btn-close-cart" id="closeCartBtn">&times;</button>
      </div>

      <div class="ease-cart-items-feed">
        <div class="ease-cart-item-row" id="itemRow1">
          <img class="ease-cart-item-img" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=150&q=80" alt="Item Preview" />
          <div class="ease-cart-item-meta">
            <h4 class="ease-cart-item-name">Air Speed Overdrive</h4>
            <span class="ease-cart-item-price">$145.00</span>
          </div>
          <div class="ease-quantity-stepper">
            <button class="ease-btn-step" onclick="adjustValue('qty1', -1)">-</button>
            <span class="ease-step-value" id="qty1">1</span>
            <button class="ease-btn-step" onclick="adjustValue('qty1', 1)">+</button>
          </div>
          <button class="ease-btn-remove-item" onclick="removeItemRow('itemRow1')">✕</button>
        </div>

        <div class="ease-cart-item-row" id="itemRow2">
          <img class="ease-cart-item-img" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=150&q=80" alt="Item Preview" />
          <div class="ease-cart-item-meta">
            <h4 class="ease-cart-item-name">Wireless Headphones</h4>
            <span class="ease-cart-item-price">$89.00</span>
          </div>
          <div class="ease-quantity-stepper">
            <button class="ease-btn-step" onclick="adjustValue('qty2', -1)">-</button>
            <span class="ease-step-value" id="qty2">2</span>
            <button class="ease-btn-step" onclick="adjustValue('qty2', 1)">+</button>
          </div>
          <button class="ease-btn-remove-item" onclick="removeItemRow('itemRow2')">✕</button>
        </div>
      </div>

      <div style="padding: 1.25rem; border-top: 1px solid #f1f5f9; background: #ffffff;">
        <button style="width: 100%; background: #2563eb; color: white; border: none; padding: 0.85rem; border-radius: 0.375rem; font-weight: 700; font-size: 0.95rem; cursor: pointer;">
          Proceed to Checkout
        </button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('cartOverlay');
    const openBtn = document.getElementById('openCartBtn');
    const closeBtn = document.getElementById('closeCartBtn');

    openBtn.addEventListener('click', () => overlay.classList.add('is-visible'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('is-visible'));
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('is-visible');
    });

    function adjustValue(id, change) {
      const el = document.getElementById(id);
      let val = parseInt(el.textContent) + change;
      if (val >= 1 && val <= 99) {
        el.textContent = val;
        el.style.transform = 'scale(1.15)';
        setTimeout(() => el.style.transform = 'scale(1)', 100);
      }
    }

    function removeItemRow(rowId) {
      const row = document.getElementById(rowId);
      row.classList.add('is-removing');
      setTimeout(() => row.remove(), 250);
    }
  </script>
</body>
</html>
