<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Bounce Tooltip</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="tooltip-wrapper">

        <button
            class="tooltip-btn"
            aria-describedby="tooltip">

            Hover or Focus Me

        </button>

        <div
            id="tooltip"
            class="tooltip"
            role="tooltip">

            ✨ Pure CSS Elastic Bounce Tooltip

            <span class="arrow"></span>

        </div>

    </div>

</div>

</body>
</html>
