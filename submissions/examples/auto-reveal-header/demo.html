<link rel="stylesheet" href=""style.css">
<header class=""docs-header">
    <h1>My Navigation Bar</h1>
</header>
<main style="padding-top: 90px; height: 2000px;">
    <p>Scroll down to see the header hide, and scroll up to see it reveal itself!</p>
</main>
<script>
    // 1. Keep track of the last place the user scrolled to
    let lastScrollTop = 0;
    
    // 2. Grab the header element from the page
    const header = document.querySelector('.docs-header');

    // 3. Listen for whenever the user scrolls the page
    window.addEventListener('scroll', function() {
        // Get the current scroll position
        let currentScroll = window.scrollY || document.documentElement.scrollTop;

        if (currentScroll > lastScrollTop) {
            // IF the current position is greater than the last position, 
            // it means the user is scrolling DOWN.
            header.classList.add('hidden');
            header.classList.remove('visible');
        } else {
            // OTHERWISE, it means the user is scrolling UP.
            header.classList.add('visible');
            header.classList.remove('hidden');
        }

        // 4. Update the last scroll position to the current one
        lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; 
    });
</script>
