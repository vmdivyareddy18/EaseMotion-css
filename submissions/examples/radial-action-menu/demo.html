<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS-only Radial Action Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>CSS-only Radial Action Menu</h1>
    <p>Click the floating button to reveal the menu.</p>
    <div class="radial-menu">
      <input type="checkbox" id="menu-toggle">
      <label for="menu-toggle" class="menu-btn">
        +
      </label>
      <a href="#" class="item item1">🏠</a>
      <a href="#" class="item item2">🔍</a>
      <a href="#" class="item item3">❤️</a>
      <a href="#" class="item item4">📩</a>
      <a href="#" class="item item5">⭐</a>
      <a href="#" class="item item6">⚙️</a>
    </div>
  </div>
</body>
</html>
