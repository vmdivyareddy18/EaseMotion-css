<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Water Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="frameW"></span>
    <div class="upperVessel">
      <span class="bowlUp"></span>
      <span class="waterUp"></span>
      <span class="rimUp"></span>
      <span class="spoutW"></span>
    </div>
    <span class="streamW"></span>
    <span class="dropW dwA"></span>
    <span class="dropW dwB"></span>
    <div class="lowerVessel">
      <span class="bowlLow"></span>
      <span class="waterLow"></span>
      <span class="scaleW"></span>
      <span class="rimLow"></span>
    </div>
    <div class="floatW">
      <span class="bobW"></span>
      <span class="stemW"></span>
      <span class="pointerW"></span>
    </div>
    <span class="ringW"></span>
    <span class="baseW"></span>
    <span class="deskW"></span>
  </div>
</body>
</html>
