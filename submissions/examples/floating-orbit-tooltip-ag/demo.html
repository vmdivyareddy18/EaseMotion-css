<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Orbit Tooltip — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="demo-title-ag">Orbital Tooltips</h1>
  <main class="demo-grid-ag">
    <div class="orbit-tooltip-wrapper-ag">
      <button class="orbit-tooltip-trigger-ag" type="button" aria-describedby="tooltip-top">
        UP LINK
      </button>
      <div class="orbit-tooltip-ag orbit-tooltip-top-ag" id="tooltip-top" role="tooltip">
        <div class="orbit-tooltip-inner-ag">
          <div class="orbit-tooltip-header-ag">
            <span>UPPER NODE</span>
            <span>01</span>
          </div>
          Active telemetry feedback orbit path is stable and floating.
        </div>
      </div>
    </div>

    <div class="orbit-tooltip-wrapper-ag">
      <button class="orbit-tooltip-trigger-ag" type="button" aria-describedby="tooltip-right">
        RIGHT LINK
      </button>
      <div class="orbit-tooltip-ag orbit-tooltip-right-ag" id="tooltip-right" role="tooltip">
        <div class="orbit-tooltip-inner-ag">
          <div class="orbit-tooltip-header-ag">
            <span>EAST NODE</span>
            <span>02</span>
          </div>
          Right side satellite positioning calibration active.
        </div>
      </div>
    </div>

    <div class="orbit-tooltip-wrapper-ag">
      <button class="orbit-tooltip-trigger-ag" type="button" aria-describedby="tooltip-left">
        LEFT LINK
      </button>
      <div class="orbit-tooltip-ag orbit-tooltip-left-ag" id="tooltip-left" role="tooltip">
        <div class="orbit-tooltip-inner-ag">
          <div class="orbit-tooltip-header-ag">
            <span>WEST NODE</span>
            <span>03</span>
          </div>
          Left side magnetic containment field operational.
        </div>
      </div>
    </div>

    <div class="orbit-tooltip-wrapper-ag">
      <button class="orbit-tooltip-trigger-ag" type="button" aria-describedby="tooltip-bottom">
        DOWN LINK
      </button>
      <div class="orbit-tooltip-ag orbit-tooltip-bottom-ag" id="tooltip-bottom" role="tooltip">
        <div class="orbit-tooltip-inner-ag">
          <div class="orbit-tooltip-header-ag">
            <span>DOWN NODE</span>
            <span>04</span>
          </div>
          Gravitational displacement vectors stabilized.
        </div>
      </div>
    </div>
  </main>
</body>
</html>
