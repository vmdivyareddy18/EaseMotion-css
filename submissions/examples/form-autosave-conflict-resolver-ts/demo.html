<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Autosave Conflict Resolver</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="conflict-panel has-conflict" aria-labelledby="conflict-title">
      <p class="eyebrow">Autosave</p>
      <h1 id="conflict-title">Resolve edit conflict</h1>
      <div class="version-grid">
        <article class="version-card is-local"><strong>Local draft</strong><span>Edited 2 min ago</span></article>
        <article class="version-card is-remote"><strong>Remote version</strong><span>Saved by Priya</span></article>
        <article class="version-card is-resolved"><strong>Resolved</strong><span>Ready to publish</span></article>
      </div>
    </section>
  </main>
</body>
</html>
