<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Back to Top Progress Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Styling to simulate a long scrolling page */
    html {
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      color: #334155;
    }
    .header {
      padding: 4rem 2rem;
      text-align: center;
      background: #1e293b;
      color: white;
    }
    .content {
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
    }
    .dummy-paragraph {
      margin-bottom: 2rem;
      line-height: 1.8;
      font-size: 1.125rem;
    }
    .skeleton-box {
      width: 100%;
      height: 150px;
      background-color: #e2e8f0;
      border-radius: 8px;
      margin-bottom: 2rem;
    }
  </style>
</head>
<body id="top">

  <div class="header">
    <h1>Scroll Down!</h1>
    <p>Watch the button in the bottom right corner fill up as you scroll.</p>
  </div>

  <div class="content">
    <!-- Generate lots of content to make the page scrollable -->
    <script>
      for (let i = 0; i < 20; i++) {
        document.write(`
          <div class="skeleton-box"></div>
          <p class="dummy-paragraph">
            Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam non orci ac velit aliquam auctor. 
            Vivamus in diam eu arcu ultricies lobortis. Aenean et arcu dignissim, placerat dolor sed, sodales est. 
            Maecenas viverra vel dui id faucibus. Aliquam nec efficitur dolor. 
          </p>
        `);
      }
    </script>
  </div>

  <!-- The Component -->
  <!-- Note: href="#top" provides native anchor scrolling back to the top of the body element -->
  <a href="#top" class="back-to-top-ps" aria-label="Scroll back to top">
    <div class="back-to-top-ps-inner">
      <svg class="back-to-top-ps-icon" viewBox="0 0 24 24">
        <path d="M5 15l7-7 7 7"></path>
      </svg>
    </div>
  </a>

</body>
</html>
