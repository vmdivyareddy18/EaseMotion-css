<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPS / CSAT Feedback Widget — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="em-page-container">
    <h1>EaseMotion NPS / CSAT Feedback Widget</h1>
    <p>Try out this interactive feedback widget with smooth animations!</p>

    <!-- Feedback Widget -->
    <div class="em-feedback-widget" id="em-feedback-widget">
      <h2 class="em-widget-title">How likely are you to recommend us?</h2>
      <p class="em-widget-subtitle">0 = Not at all likely, 10 = Extremely likely</p>

      <!-- NPS Score Buttons -->
      <div class="em-nps-buttons" id="em-nps-buttons">
        <button class="em-nps-btn" data-score="0">0</button>
        <button class="em-nps-btn" data-score="1">1</button>
        <button class="em-nps-btn" data-score="2">2</button>
        <button class="em-nps-btn" data-score="3">3</button>
        <button class="em-nps-btn" data-score="4">4</button>
        <button class="em-nps-btn" data-score="5">5</button>
        <button class="em-nps-btn" data-score="6">6</button>
        <button class="em-nps-btn" data-score="7">7</button>
        <button class="em-nps-btn" data-score="8">8</button>
        <button class="em-nps-btn" data-score="9">9</button>
        <button class="em-nps-btn" data-score="10">10</button>
      </div>

      <!-- CSAT Label -->
      <div class="em-csat-label" id="em-csat-label" style="display: none;"></div>

      <!-- Submit Button -->
      <button class="em-submit-btn" id="em-submit-btn" disabled>Submit Feedback</button>

      <!-- Thank You State -->
      <div class="em-thank-you" id="em-thank-you" style="display: none;">
        <span class="em-thank-icon">🎉</span>
        <h3>Thank You!</h3>
        <p>Your feedback helps us improve!</p>
      </div>
    </div>
  </div>

  <script>
    const npsButtons = document.querySelectorAll('.em-nps-btn');
    const csatLabel = document.getElementById('em-csat-label');
    const submitBtn = document.getElementById('em-submit-btn');
    const feedbackWidget = document.getElementById('em-feedback-widget');
    const thankYou = document.getElementById('em-thank-you');
    let selectedScore = null;

    npsButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        // Remove selected from all
        npsButtons.forEach(b => b.classList.remove('selected'));
        // Add selected to this one
        btn.classList.add('selected');
        selectedScore = parseInt(btn.dataset.score);
        
        // Update CSAT label
        if (selectedScore <= 6) {
          csatLabel.textContent = "We're sorry to hear that! 😔";
          csatLabel.className = "em-csat-label em-csat-poor";
        } else if (selectedScore <= 8) {
          csatLabel.textContent = "Thanks for your honest feedback! 😊";
          csatLabel.className = "em-csat-label em-csat-neutral";
        } else {
          csatLabel.textContent = "Awesome! Thanks for the support! 🚀";
          csatLabel.className = "em-csat-label em-csat-good";
        }
        
        csatLabel.style.display = 'block';
        submitBtn.disabled = false;
      });
    });

    submitBtn.addEventListener('click', () => {
      // Hide everything else
      document.querySelector('.em-widget-title').style.display = 'none';
      document.querySelector('.em-widget-subtitle').style.display = 'none';
      document.getElementById('em-nps-buttons').style.display = 'none';
      csatLabel.style.display = 'none';
      submitBtn.style.display = 'none';

      // Show thank you
      thankYou.style.display = 'flex';
      thankYou.classList.add('em-animate-thankyou');
    });
  </script>
</body>
</html>
