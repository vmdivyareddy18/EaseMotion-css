<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heading Text Reveal – EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo">
    <h1 style="--reveal-font-size: 2.8rem;">
      <span class="reveal-word"><span class="reveal-char">R</span><span class="reveal-char">e</span><span class="reveal-char">v</span><span class="reveal-char">e</span><span class="reveal-char">a</span><span class="reveal-char">l</span></span>
      <span class="reveal-word"><span class="reveal-char">Y</span><span class="reveal-char">o</span><span class="reveal-char">u</span><span class="reveal-char">r</span></span>
      <span class="reveal-word"><span class="reveal-char">H</span><span class="reveal-char">e</span><span class="reveal-char">a</span><span class="reveal-char">d</span><span class="reveal-char">i</span><span class="reveal-char">n</span><span class="reveal-char">g</span></span>
    </h1>

    <h2 style="--reveal-font-size: 2rem;">
      <span class="reveal-word"><span class="reveal-char">S</span><span class="reveal-char">u</span><span class="reveal-char">b</span><span class="reveal-char">t</span><span class="reveal-char">l</span><span class="reveal-char">e</span></span>
      <span class="reveal-word"><span class="reveal-char">L</span><span class="reveal-char">e</span><span class="reveal-char">v</span><span class="reveal-char">e</span><span class="reveal-char">l</span></span>
    </h2>

    <h3 style="--reveal-font-size: 1.5rem;">
      <span class="reveal-word"><span class="reveal-char">A</span><span class="reveal-char">n</span><span class="reveal-char">o</span><span class="reveal-char">t</span><span class="reveal-char">h</span><span class="reveal-char">e</span><span class="reveal-char">r</span></span>
      <span class="reveal-word"><span class="reveal-char">S</span><span class="reveal-char">e</span><span class="reveal-char">c</span><span class="reveal-char">t</span><span class="reveal-char">i</span><span class="reveal-char">o</span><span class="reveal-char">n</span></span>
    </h3>
  </section>

  <button class="replay" id="replayBtn">Reveal</button>

  <script>
    function triggerReveal() {
      document.querySelectorAll('.reveal-char').forEach((el, i) => {
        el.style.animation = 'none';
        el.offsetHeight;
        el.style.animation = `charReveal var(--reveal-duration, 0.5s) ease ${i * 0.04}s forwards`;
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.reveal-char').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(1.2em)';
      });
      triggerReveal();
    });

    document.getElementById('replayBtn').addEventListener('click', () => {
      document.querySelectorAll('.reveal-char').forEach(el => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(1.2em)';
        el.style.animation = 'none';
      });
      document.getElementById('replayBtn').textContent = 'Replaying…';
      setTimeout(() => {
        triggerReveal();
        document.getElementById('replayBtn').textContent = 'Reveal';
      }, 50);
    });
  </script>
</body>
</html>
