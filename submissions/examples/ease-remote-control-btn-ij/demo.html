<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Control Btn – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rcb-container">
    <h1>Remote Control</h1>
    <div class="rcb-dpad">
      <button class="rcb-btn rcb-btn--up" data-dir="up" aria-label="Up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <div class="rcb-row">
        <button class="rcb-btn rcb-btn--left" data-dir="left" aria-label="Left">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="rcb-btn rcb-btn--ok" id="okBtn" aria-label="OK">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </button>
        <button class="rcb-btn rcb-btn--right" data-dir="right" aria-label="Right">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <button class="rcb-btn rcb-btn--down" data-dir="down" aria-label="Down">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
    </div>

    <div class="rcb-display" id="display">Press a button</div>

    <div class="rcb-controls">
      <label class="rcb-toggle">
        <input type="checkbox" id="pulseToggle" checked>
        <span>OK Pulse</span>
      </label>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const okBtn = document.getElementById('okBtn');
    const pulseToggle = document.getElementById('pulseToggle');
    const dirBtns = document.querySelectorAll('[data-dir]');

    dirBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const dir = btn.dataset.dir;
        display.textContent = `Pressed: ${dir.charAt(0).toUpperCase() + dir.slice(1)}`;
        btn.classList.add('rcb-btn--pressed');
        setTimeout(() => btn.classList.remove('rcb-btn--pressed'), 200);
      });
    });

    okBtn.addEventListener('click', () => {
      display.textContent = 'OK!';
      okBtn.classList.add('rcb-btn--pressed');
      setTimeout(() => okBtn.classList.remove('rcb-btn--pressed'), 200);
    });

    pulseToggle.addEventListener('change', () => {
      okBtn.classList.toggle('rcb-btn--pulse-active', pulseToggle.checked);
    });
  </script>
</body>
</html>
