<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermit Crab</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="sunH"></span>
    <div class="crabH">
      <span class="shellH"></span>
      <span class="shellRib"></span>
      <span class="shellLip"></span>
      <span class="legH lh1"></span>
      <span class="legH lh2"></span>
      <span class="legH lh3"></span>
      <span class="legH lh4"></span>
      <span class="bodyH"></span>
      <div class="clawH chBig">
        <span class="armH"></span>
        <span class="pincerH"></span>
        <span class="pincerH pinLow"></span>
      </div>
      <div class="clawH chSmall">
        <span class="armH"></span>
        <span class="pincerH"></span>
        <span class="pincerH pinLow"></span>
      </div>
      <span class="stalkH shl"><span class="eyeH"></span></span>
      <span class="stalkH shr"><span class="eyeH"></span></span>
    </div>
    <span class="emptyShell"></span>
    <span class="trackH"></span>
    <span class="waveH"></span>
    <span class="sandH"></span>
  </div>
</body>
</html>
