<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Gauge Fill</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="temperature-title">
        <div class="temperature-gauge" aria-hidden="true">
          <span class="temperature-fill"></span>
          <span class="temperature-glow"></span>
        </div>
        <div>
          <p class="eyebrow">Pure CSS meter</p>
          <h1 id="temperature-title">Rising temperature fill</h1>
          <p class="demo-copy">
            A vertical fill climbs into place and pulses to make changing
            temperature levels easy to scan.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
