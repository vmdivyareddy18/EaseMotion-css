<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion">

  <div class="item">
    <input type="radio" name="accordion" id="item1" checked>
    <label for="item1" class="title">
      What is EaseMotion CSS?
      <span class="icon">⌄</span>
    </label>
    <div class="content">
      <p>EaseMotion CSS is a collection of reusable animation utilities and UI effects.</p>
    </div>
  </div>

  <div class="item">
    <input type="radio" name="accordion" id="item2">
    <label for="item2" class="title">
      Is JavaScript required?
      <span class="icon">⌄</span>
    </label>
    <div class="content">
      <p>No. This accordion is built entirely with HTML and CSS.</p>
    </div>
  </div>

  <div class="item">
    <input type="radio" name="accordion" id="item3">
    <label for="item3" class="title">
      Is it responsive?
      <span class="icon">⌄</span>
    </label>
    <div class="content">
      <p>Yes, the component adapts smoothly to different screen sizes.</p>
    </div>
  </div>

  <div class="item">
    <input type="radio" name="accordion" id="item4">
    <label for="item4" class="title">
      Can I customize it?
      <span class="icon">⌄</span>
    </label>
    <div class="content">
      <p>You can easily customize colors, spacing, typography, and animation speed.</p>
    </div>
  </div>

</div>

</body>
</html>
