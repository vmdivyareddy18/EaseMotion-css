<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-light-rays demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; background: #0a0a14; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
    .hero {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 2rem; font-weight: 600;
      background: radial-gradient(ellipse at top, #1a1a3e 0%, #0a0a14 70%);
    }
  </style>
</head>
<body>
  <div class="hero ease-light-rays" id="rays">
    Into the light
  </div>
  <script>
    const container = document.getElementById('rays');
    for (let i = 0; i < 8; i++) {
      const r = document.createElement('div');
      r.className = 'ray';
      r.style.left = (8 + i * 11) + '%';
      r.style.animationDuration = (Math.random() * 3 + 4) + 's';
      r.style.animationDelay    = (i * 0.5) + 's';
      r.style.width = (40 + Math.random() * 40) + 'px';
      container.appendChild(r);
    }
  </script>
</body>
</html>
