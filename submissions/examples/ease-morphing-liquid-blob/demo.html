<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphing Liquid Blob</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Morphing Liquid Blob</h1>
        <p class="subtitle">Organic shape with continuous morphing and color transitions</p>

        <div class="blob-wrapper">
            <div class="blob-container">
                <svg class="blob-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <path class="blob-path" d="M200,100 Q250,80 280,120 Q310,160 320,200 Q330,240 300,280 Q270,320 230,330 Q190,340 150,320 Q110,300 90,260 Q70,220 80,180 Q90,140 120,110 Q150,80 200,100Z">
                        <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
                            M200,100 Q250,80 280,120 Q310,160 320,200 Q330,240 300,280 Q270,320 230,330 Q190,340 150,320 Q110,300 90,260 Q70,220 80,180 Q90,140 120,110 Q150,80 200,100Z;
                            M180,90 Q240,60 270,110 Q310,150 330,190 Q340,230 310,270 Q280,310 240,320 Q200,330 160,310 Q120,290 100,250 Q80,210 90,170 Q100,130 140,100 Q160,80 180,90Z;
                            M210,110 Q260,90 290,130 Q320,170 325,210 Q330,250 295,285 Q260,320 220,330 Q180,340 145,315 Q110,290 95,245 Q80,200 90,160 Q100,120 140,105 Q170,95 210,110Z;
                            M190,95 Q245,70 275,115 Q315,155 335,195 Q340,235 305,275 Q270,315 235,325 Q195,335 155,310 Q115,285 100,240 Q85,195 95,155 Q105,115 145,100 Q175,85 190,95Z;
                            M200,100 Q250,80 280,120 Q310,160 320,200 Q330,240 300,280 Q270,320 230,330 Q190,340 150,320 Q110,300 90,260 Q70,220 80,180 Q90,140 120,110 Q150,80 200,100Z
                        " />
                    </path>
                </svg>
            </div>

            <div class="controls">
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Change Colors</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">Morphing smoothly</span>
                <span id="morphCount">Morphs: 0</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const blobPath = document.querySelector('.blob-path');
        const blobContainer = document.querySelector('.blob-container');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const morphCount = document.getElementById('morphCount');

        // ===== STATE =====
        let speedLevel = 0; // 0: Normal, 1: Fast, 2: Slow
        let morphCounter = 0;
        let colorSet = 0;
        let isPaused = false;

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            // Palette 1: Ocean Blues
            { bg: 'linear-gradient(135deg, #0c0e1a, #1a1a3e)', blob: ['#4facfe', '#00f2fe', '#43e97b', '#38f9d7'] },
            // Palette 2: Sunset Warm
            { bg: 'linear-gradient(135deg, #1a0c0e, #3e1a1a)', blob: ['#f093fb', '#f5576c', '#ffecd2', '#fcb69f'] },
            // Palette 3: Forest Greens
            { bg: 'linear-gradient(135deg, #0c1a0e, #1a3e1a)', blob: ['#11998e', '#38ef7d', '#a8e063', '#56ab2f'] },
            // Palette 4: Galaxy Purple
            { bg: 'linear-gradient(135deg, #0e0c1a, #2d1a3e)', blob: ['#a18cd1', '#fbc2eb', '#f6d365', '#fda085'] },
            // Palette 5: Fire & Ice
            { bg: 'linear-gradient(135deg, #0c0e1a, #3e1a0c)', blob: ['#ff6b6b', '#ffa94d', '#4ecdc4', '#45b7d1'] },
            // Palette 6: Candy Pop
            { bg: 'linear-gradient(135deg, #1a0c1a, #3e1a2d)', blob: ['#ff9a9e', '#fad0c4', '#fbc2eb', '#a18cd1'] },
        ];

        // ===== MORPHING PATHS =====
        const morphShapes = [
            // Shape 1: Classic blob
            'M200,100 Q250,80 280,120 Q310,160 320,200 Q330,240 300,280 Q270,320 230,330 Q190,340 150,320 Q110,300 90,260 Q70,220 80,180 Q90,140 120,110 Q150,80 200,100Z',
            // Shape 2: Star-like
            'M200,80 Q230,120 260,90 Q280,130 320,120 Q300,160 340,190 Q290,200 320,240 Q270,230 290,270 Q240,250 230,290 Q200,260 170,290 Q160,250 110,270 Q130,230 80,240 Q110,200 60,190 Q100,160 80,120 Q120,130 140,90 Q170,120 200,80Z',
            // Shape 3: Heart-like
            'M200,140 Q170,90 140,110 Q100,130 90,170 Q80,210 100,250 Q120,290 160,310 Q180,320 200,330 Q220,320 240,310 Q280,290 300,250 Q320,210 310,170 Q300,130 260,110 Q230,90 200,140Z',
            // Shape 4: Diamond-like
            'M200,70 Q250,130 330,180 Q280,230 330,280 Q250,260 200,330 Q150,260 70,280 Q120,230 70,180 Q150,130 200,70Z',
            // Shape 5: Organic flower
            'M200,120 Q230,80 260,100 Q290,120 300,150 Q330,160 320,200 Q330,240 300,250 Q290,280 260,300 Q230,320 200,280 Q170,320 140,300 Q110,280 100,250 Q70,240 80,200 Q70,160 100,150 Q110,120 140,100 Q170,80 200,120Z',
            // Shape 6: Abstract wave
            'M200,130 Q250,100 280,140 Q310,180 330,200 Q340,230 310,260 Q280,290 250,300 Q200,310 150,300 Q120,290 90,260 Q70,230 80,200 Q70,180 90,140 Q110,100 150,130 Q180,110 200,130Z',
        ];

        // ===== FUNCTIONS =====

        // Update blob with new shape
        function updateBlob(shapeIndex) {
            const currentPath = morphShapes[shapeIndex % morphShapes.length];
            blobPath.setAttribute('d', currentPath);
            
            morphCounter++;
            morphCount.textContent = `Morphs: ${morphCounter}`;
            statusText.textContent = '🔄 Morphing...';
            statusText.style.color = '#818cf8';
            
            setTimeout(() => {
                statusText.textContent = '✨ Morphing smoothly';
                statusText.style.color = 'rgba(255, 255, 255, 0.6)';
            }, 300);
        }

        // Update colors
        function updateColors(paletteIndex) {
            const palette = colorPalettes[paletteIndex % colorPalettes.length];
            
            // Update background
            document.querySelector('.blob-wrapper').style.background = palette.bg;
            
            // Update blob gradient with multiple colors
            const colors = palette.blob;
            const gradient = `conic-gradient(from 0deg, ${colors[0]}, ${colors[1]}, ${colors[2]}, ${colors[3]}, ${colors[0]})`;
            blobPath.style.fill = gradient;
            blobPath.style.stroke = colors[0];
            
            // Update glow
            blobContainer.style.boxShadow = `0 0 60px ${colors[0]}40, 0 0 120px ${colors[1]}20`;
            
            colorSet = paletteIndex;
            statusText.textContent = '🎨 Colors updated!';
            statusText.style.color = '#f6d365';
            
            setTimeout(() => {
                statusText.textContent = '✨ Morphing smoothly';
                statusText.style.color = 'rgba(255, 255, 255, 0.6)';
            }, 1000);
        }

        // Toggle speed
        function toggleSpeed() {
            speedLevel = (speedLevel + 1) % 3;
            const speeds = ['Normal', 'Fast', 'Slow'];
            const durations = ['4s', '2s', '6s'];
            
            speedBtn.textContent = `Speed: ${speeds[speedLevel]}`;
            
            // Update all animate elements
            const animates = document.querySelectorAll('animate');
            animates.forEach(anim => {
                anim.setAttribute('dur', durations[speedLevel]);
            });
            
            statusText.textContent = `⏱️ Speed: ${speeds[speedLevel]}`;
            statusText.style.color = '#4ecdc4';
            
            setTimeout(() => {
                statusText.textContent = '✨ Morphing smoothly';
                statusText.style.color = 'rgba(255, 255, 255, 0.6)';
            }, 1000);
        }

        // Reset to default
        function resetBlob() {
            // Reset path
            blobPath.setAttribute('d', morphShapes[0]);
            
            // Reset color
            updateColors(0);
            
            // Reset speed
            speedLevel = 0;
            speedBtn.textContent = 'Speed: Normal';
            const animates = document.querySelectorAll('animate');
            animates.forEach(anim => {
                anim.setAttribute('dur', '4s');
            });
            
            // Reset counter
            morphCounter = 0;
            morphCount.textContent = 'Morphs: 0';
            
            statusText.textContent = '↩️ Reset to default';
            statusText.style.color = '#ff6b6b';
            
            setTimeout(() => {
                statusText.textContent = '✨ Morphing smoothly';
                statusText.style.color = 'rgba(255, 255, 255, 0.6)';
            }, 1000);
        }

        // ===== EVENT LISTENERS =====

        // Click blob to manually morph
        blobContainer.addEventListener('click', () => {
            const randomIndex = Math.floor(Math.random() * morphShapes.length);
            updateBlob(randomIndex);
        });

        // Speed button
        speedBtn.addEventListener('click', toggleSpeed);

        // Color button
        colorBtn.addEventListener('click', () => {
            const randomPalette = Math.floor(Math.random() * colorPalettes.length);
            updateColors(randomPalette);
        });

        // Reset button
        resetBtn.addEventListener('click', resetBlob);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                const randomIndex = Math.floor(Math.random() * morphShapes.length);
                updateBlob(randomIndex);
            }
            if (e.key === 'c' || e.key === 'C') {
                const randomPalette = Math.floor(Math.random() * colorPalettes.length);
                updateColors(randomPalette);
            }
            if (e.key === 's' || e.key === 'S') {
                toggleSpeed();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBlob();
            }
        });

        // ===== INIT =====
        // Set initial colors
        updateColors(0);
        
        // Add CSS for gradient fill
        const style = document.createElement('style');
        style.textContent = `
            .blob-path {
                transition: fill 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            }
        `;
        document.head.appendChild(style);

        console.log('🟣 Morphing Liquid Blob loaded!');
        console.log('💡 Click blob to manually morph');
        console.log('💡 SPACE - Manual morph');
        console.log('💡 C - Change colors');
        console.log('💡 S - Toggle speed');
        console.log('💡 R - Reset');
    </script>
</body>
</html>
