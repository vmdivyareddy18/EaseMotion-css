<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter Chip Group</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Filter Chips</h1>
  <div class="chip-group" id="chipGroup">
    <button class="chip" data-value="all">All</button>
    <button class="chip" data-value="design">Design</button>
    <button class="chip" data-value="dev">Dev</button>
    <button class="chip" data-value="marketing">Marketing</button>
    <button class="chip" data-value="product">Product</button>
    <button class="chip" data-value="support">Support</button>
  </div>
  <button class="clear-btn" id="clearBtn">Clear all</button>
  <script src="demo.js"></script>
</body>
</html>
