<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Widget Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dash-container">
    <header class="dash-header">
      <h1>Dashboard Widget Cards</h1>
      <button class="dash-replay" id="replayBtn">Replay Entrance</button>
    </header>
    <div class="dash-grid" id="dashGrid">
      <div class="dash-card" data-delay="0">
        <div class="dash-card-icon">📊</div>
        <div class="dash-card-label">Total Revenue</div>
        <div class="dash-card-value">$48,250</div>
        <div class="dash-card-change up">+12.5%</div>
      </div>
      <div class="dash-card" data-delay="1">
        <div class="dash-card-icon">👥</div>
        <div class="dash-card-label">Active Users</div>
        <div class="dash-card-value">2,847</div>
        <div class="dash-card-change up">+8.3%</div>
      </div>
      <div class="dash-card" data-delay="2">
        <div class="dash-card-icon">📈</div>
        <div class="dash-card-label">Conversion Rate</div>
        <div class="dash-card-value">3.24%</div>
        <div class="dash-card-change down">-0.7%</div>
      </div>
      <div class="dash-card dash-card-wide" data-delay="3">
        <div class="dash-card-chart">
          <svg viewBox="0 0 300 100" class="dash-chart-svg">
            <polyline points="0,80 30,60 60,70 90,40 120,50 150,20 180,30 210,10 240,25 270,15 300,5"
              fill="none" stroke="var(--dash-primary, #6366f1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <polygon points="0,80 30,60 60,70 90,40 120,50 150,20 180,30 210,10 240,25 270,15 300,5 300,100 0,100"
              fill="url(#chartGrad)" opacity="0.2"/>
            <defs>
              <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="var(--dash-primary, #6366f1)"/>
                <stop offset="100%" stop-color="var(--dash-primary, #6366f1)" stop-opacity="0"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <div class="dash-card-label">Chart Preview</div>
      </div>
      <div class="dash-card dash-card-wide" data-delay="4">
        <div class="dash-card-label">Recent Activity</div>
        <ul class="dash-activity">
          <li><span class="dash-dot" style="background:#22c55e"></span> User signed up</li>
          <li><span class="dash-dot" style="background:#6366f1"></span> Payment received</li>
          <li><span class="dash-dot" style="background:#f59e0b"></span> Ticket created</li>
          <li><span class="dash-dot" style="background:#ef4444"></span> Server alert</li>
        </ul>
      </div>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
