<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Float Y Variants Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      gap: 3rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      flex-wrap: wrap;
      padding: 2rem;
    }

    .demo-item {
      width: 100px;
      height: 100px;
      border-radius: 16px;
      background: #007bff;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 600;
      text-align: center;
      padding: 0.5rem;
    }
  </style>
</head>
<body>

  <div class="demo-item float-y">Default</div>
  <div class="demo-item float-y float-y-slow">Slow</div>
  <div class="demo-item float-y float-y-fast">Fast</div>
  <div class="demo-item float-y float-y-reverse">Reverse</div>

</body>
</html>
