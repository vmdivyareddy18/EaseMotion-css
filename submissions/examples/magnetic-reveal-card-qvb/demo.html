<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Reveal Card Demo</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="demo-container-qvb">
    <div class="reveal-card-qvb">
        <div class="card-image-qvb"></div>
        <div class="card-overlay-qvb"></div>
        <div class="card-content-qvb">
            <span class="card-tag-qvb">Interactive</span>
            <h3 class="card-title-qvb">Bento Kineticism</h3>
            <p class="card-body-qvb">A pure-CSS micro-interaction utilizing pseudo-element clipping masks and variable transitions.</p>
            <a href="#" class="card-btn-qvb">
                <span>Explore Effect</span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                    <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
            </a>
        </div>
    </div>
</div>

</body>
</html>
