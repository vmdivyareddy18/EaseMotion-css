<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Member Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Team Member Cards</h1>

    <p class="subtitle">
        Meet the people building amazing products.
    </p>

    <div class="team-grid">

        <div class="member-card">

            <div class="avatar">A</div>

            <h3>Aryan Kumar</h3>

            <span class="role">
                Frontend Developer
            </span>

            <div class="socials">

                <a href="#">GitHub</a>
                <a href="#">LinkedIn</a>

            </div>

        </div>

        <div class="member-card">

            <div class="avatar">S</div>

            <h3>Sarah Lee</h3>

            <span class="role">
                UI Designer
            </span>

            <div class="socials">

                <a href="#">Dribbble</a>
                <a href="#">Behance</a>

            </div>

        </div>

        <div class="member-card">

            <div class="avatar">M</div>

            <h3>Mike Ross</h3>

            <span class="role">
                Product Manager
            </span>

            <div class="socials">

                <a href="#">LinkedIn</a>
                <a href="#">Website</a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
