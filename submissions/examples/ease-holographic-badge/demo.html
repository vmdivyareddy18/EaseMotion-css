<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Holographic ID Badge | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="holographic-showcase-wrapper">
    <header class="showcase-header">
      <h1>Holographic ID Badge</h1>
      <p>A pure CSS shiny foil reflection effect triggered on hover.</p>
    </header>

    <div class="demo-area">
      <!-- Holographic Badge Component -->
      <div class="ease-holographic-id-badge">
        <div class="badge-content">
          <div class="badge-header">
            <span class="badge-company">CORP. SYSTEM</span>
            <span class="badge-level">Lvl 9</span>
          </div>
          <div class="badge-avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          </div>
          <div class="badge-info">
            <h2 class="badge-name">Jane Doe</h2>
            <p class="badge-role">Lead Engineer</p>
            <div class="badge-barcode">|| | ||| || || |</div>
          </div>
        </div>
        
        <!-- The Holographic Overlay -->
        <div class="hologram-overlay"></div>
      </div>
    </div>
    
  </div>

</body>
</html>
