<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-sling-out-left</title>
  <meta name="description" content="A demonstration of the ease-sling-out-left animation showing an element exiting by slinging out to the left.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-sling-out-left</h1>
      <p class="subtitle" id="main-desc">Slings the element out to the left with anticipation and acceleration</p>
    </header>

    <div class="display-area">
      <!-- Target that slings out -->
      <div class="sling-target" id="target-element">
        <span>Sling Left</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Sling-Out</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-sling-out-left');
      void target.offsetWidth;
      target.classList.add('ease-sling-out-left');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-sling-out-left');
    }
  </script>

</body>
</html>
