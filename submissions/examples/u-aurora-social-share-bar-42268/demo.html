<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Social Share Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="share-bar">

    <button class="share facebook" aria-label="Share on Facebook">f</button>
    <button class="share twitter" aria-label="Share on X">𝕏</button>
    <button class="share linkedin" aria-label="Share on LinkedIn">in</button>
    <button class="share email" aria-label="Share by Email">✉</button>

</div>

</body>
</html>
