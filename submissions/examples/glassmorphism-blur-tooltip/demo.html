<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Blur-Entrance Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="glass-card">
        <div class="glass-header">
            <span class="glass-eyebrow">Cloud Network</span>
            <h3 class="glass-title">Encryption Key</h3>
        </div>

        <p class="glass-description">
            Your data streams are securely masked using end-to-end cryptographic handshakes.
        </p>

        <div class="tooltip-wrapper">
            <button class="glass-action-btn" aria-describedby="glass-blur-tooltip">
                View Key Metadata
            </button>

            <div id="glass-blur-tooltip" class="glass-tooltip" role="tooltip">
                <span class="tooltip-glass-pill">AES-256 Validated</span>
                <p class="tooltip-body">Rotated automatically every 30 days to prevent systemic decryption vectors.</p>
            </div>
        </div>
    </main>
</body>

</html>
