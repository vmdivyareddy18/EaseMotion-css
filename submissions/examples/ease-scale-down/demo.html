<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Down - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-scale-down-element">Sinking Proportion</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-scale-down-element'); void b.offsetWidth; b.classList.add('ease-scale-down-element');">Scale Down</button>
    </div>
</body>
</html>
