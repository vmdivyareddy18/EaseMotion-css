<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Configurable Easing Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controls">
    <label for="easing-select">Choose Easing:</label>
    <select id="easing-select">
      <option value="linear">Linear</option>
      <option value="easeIn">Ease-In (Cubic)</option>
      <option value="easeOut">Ease-Out (Cubic)</option>
      <option value="easeInOut">Ease-In-Out</option>
      <option value="elastic">Elastic Out</option>
    </select>
    <button id="animate-btn">Animate Box</button>
  </div>

  <div class="canvas">
    <div id="box" class="animated-box"></div>
  </div>

  <script>
    const easingFunctions = {
      linear: (t) => t,
      easeIn: (t) => t * t * t,
      easeOut: (t) => 1 - Math.pow(1 - t, 3),
      easeInOut: (t) => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2,
      elastic: (t) => t === 0 ? 0 : t === 1 ? 1 : Math.pow(2, -10 * t) * Math.sin((t * 10 - 0.75) * ((2 * Math.PI) / 3)) + 1
    };

    const box = document.getElementById('box');
    const button = document.getElementById('animate-btn');
    const select = document.getElementById('easing-select');

    button.addEventListener('click', () => {
      const easingType = select.value;
      const startX = 0;
      const endX = 400;
      const duration = 1000;
      const startTime = performance.now();

      function step(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        const easeMap = easingFunctions[easingType] || easingFunctions.linear;
        const easedProgress = easeMap(progress);
        
        const currentX = startX + (endX - startX) * easedProgress;
        box.style.transform = `translateX(${currentX}px)`;

        if (progress < 1) {
          requestAnimationFrame(step);
        }
      }
      requestAnimationFrame(step);
    });
  </script>
</body>
</html>
