<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Pulse Dot - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rpd-wrapper">
    <h1>Recording Pulse Dot</h1>
    <div class="rpd-container">
      <div class="rpd-indicator" id="indicator">
        <div class="rpd-dot" id="dot"></div>
        <div class="rpd-ring" id="ring"></div>
        <div class="rpd-ring rpd-ring-2" id="ring2"></div>
      </div>
      <div class="rpd-timer" id="timer">00:00</div>
      <button class="rpd-btn" id="toggleBtn">Stop Recording</button>
    </div>
  </div>
  <script>
    (function() {
      var btn = document.getElementById('toggleBtn');
      var indicator = document.getElementById('indicator');
      var dot = document.getElementById('dot');
      var ring = document.getElementById('ring');
      var ring2 = document.getElementById('ring2');
      var timerEl = document.getElementById('timer');
      var recording = true;
      var seconds = 0;
      var interval;

      function formatTime(s) {
        var m = Math.floor(s / 60);
        var sec = s % 60;
        return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
      }

      function startTimer() {
        interval = setInterval(function() {
          seconds++;
          timerEl.textContent = formatTime(seconds);
        }, 1000);
      }

      function stopTimer() {
        clearInterval(interval);
      }

      function startRecording() {
        indicator.classList.add('rpd-active');
        dot.classList.add('rpd-dot-active');
        ring.classList.add('rpd-ring-active');
        ring2.classList.add('rpd-ring-2-active');
        startTimer();
        btn.textContent = 'Stop Recording';
        recording = true;
      }

      function stopRecording() {
        indicator.classList.remove('rpd-active');
        dot.classList.remove('rpd-dot-active');
        ring.classList.remove('rpd-ring-active');
        ring2.classList.remove('rpd-ring-2-active');
        stopTimer();
        btn.textContent = 'Start Recording';
        recording = false;
      }

      btn.addEventListener('click', function() {
        if (recording) {
          stopRecording();
        } else {
          seconds = 0;
          timerEl.textContent = '00:00';
          startRecording();
        }
      });

      startRecording();
    })();
  </script>
</body>
</html>
