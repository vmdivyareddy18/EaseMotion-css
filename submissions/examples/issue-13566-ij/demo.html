<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-loading-bar-top - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-loading-bar-top" id="loadingBar">
    <div class="bar"></div>
  </div>

  <div class="container">
    <h1>ease-loading-bar-top</h1>
    <p class="description">Top-of-page loading bar (YouTube-style) with gradient animation.</p>

    <div class="loading-bar-wrapper">
      <button class="dummy-btn" id="simulateBtn">Simulate Page Load</button>
    </div>

    <p style="color:var(--text-secondary);line-height:1.7;">The thin progress bar at the very top of the page animates from 0 to ~95%, then completes and fades out — just like YouTube and GitHub. Click the button above to trigger the animation.</p>
  </div>

  <script>
    const bar = document.getElementById('loadingBar');
    const btn = document.getElementById('simulateBtn');

    btn.addEventListener('click', () => {
      bar.classList.remove('active', 'complete');

      void bar.offsetWidth;

      bar.classList.add('active');

      setTimeout(() => {
        bar.classList.remove('active');
        bar.classList.add('complete');

        setTimeout(() => {
          bar.classList.remove('complete');
        }, 600);
      }, 2800);
    });
  </script>
</body>
</html>
