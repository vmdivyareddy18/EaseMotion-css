<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaseMotion Drag Reorder Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Drag to Reorder List</h2>
  <ul id="ease-list">
    <li draggable="true" class="ease-drag-item">Task A</li>
    <li draggable="true" class="ease-drag-item">Task B</li>
    <li draggable="true" class="ease-drag-item">Task C</li>
    <li draggable="true" class="ease-drag-item">Task D</li>
  </ul>

  <script>
    const list = document.getElementById("ease-list");
    let draggedItem = null;

    list.addEventListener("dragstart", e => {
      draggedItem = e.target;
      e.target.classList.add("dragging");
    });

    list.addEventListener("dragend", e => {
      e.target.classList.remove("dragging");
      draggedItem = null;
    });

    list.addEventListener("dragover", e => {
      e.preventDefault();
      const afterElement = getDragAfterElement(list, e.clientY);
      if (afterElement == null) {
        list.appendChild(draggedItem);
      } else {
        list.insertBefore(draggedItem, afterElement);
      }
    });

    function getDragAfterElement(container, y) {
      const draggableElements = [...container.querySelectorAll(".ease-drag-item:not(.dragging)")];
      return draggableElements.reduce((closest, child) => {
        const box = child.getBoundingClientRect();
        const offset = y - box.top - box.height / 2;
        if (offset < 0 && offset > closest.offset) {
          return { offset: offset, element: child };
        } else {
          return closest;
        }
      }, { offset: Number.NEGATIVE_INFINITY }).element;
    }
  </script>
</body>
</html>
