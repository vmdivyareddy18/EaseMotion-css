<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows Startup Animation · Pure CSS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="windows-boot">
    <!-- Background -->
    <div class="boot-background">
      <!-- Windows Logo -->
      <div class="windows-logo">
        <div class="logo-window">
          <span></span><span></span>
          <span></span><span></span>
        </div>
      </div>

      <!-- Loading Text -->
      <h1 class="boot-title">Windows</h1>
      <p class="boot-subtitle">Starting up...</p>

      <!-- Loading Dots (Spinning Animation) -->
      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar"></div>
      </div>

      <!-- Status Messages (Cycling) -->
      <div class="status-messages">
        <p class="status-text" id="statusText">Loading system files...</p>
      </div>

      <!-- Version Info -->
      <div class="version-info">
        <p>Windows 11 Pro</p>
        <p>Version 23H2 · Build 22631</p>
      </div>
    </div>

    <!-- Bottom Bar -->
    <div class="boot-footer">
      <div class="footer-dots">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <p>Press any key to continue</p>
    </div>
  </div>
</body>
</html>
