<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Drip Feed Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tooltip-demo">
    <h1 class="tooltip-demo__title">Drip Feed Tooltip</h1>
    <p class="tooltip-demo__subtitle">Hover any trigger to see the character-by-character reveal</p>

    <div class="tooltip-demo__row">
      <button class="tooltip-trigger tooltip-trigger--primary" data-tooltip="Click to save your progress">Save</button>
      <button class="tooltip-trigger tooltip-trigger--secondary" data-tooltip="This action cannot be undone">Delete</button>
      <button class="tooltip-trigger tooltip-trigger--outline" data-tooltip="Download file as PDF format">Export</button>
    </div>

    <div class="tooltip-demo__row">
      <span class="tooltip-trigger tooltip-trigger--icon" data-tooltip="Dark mode is now active">🌙</span>
      <span class="tooltip-trigger tooltip-trigger--icon" data-tooltip="You have 3 unread messages">✉️</span>
      <span class="tooltip-trigger tooltip-trigger--icon" data-tooltip="Your profile is 80% complete">👤</span>
      <span class="tooltip-trigger tooltip-trigger--icon" data-tooltip="New version v2.5 available">⚡</span>
    </div>

    <div class="tooltip-demo__row">
      <a href="#" class="tooltip-trigger tooltip-trigger--link" data-tooltip="View our documentation portal">Documentation</a>
      <a href="#" class="tooltip-trigger tooltip-trigger--link" data-tooltip="Check out API reference guide">API Reference</a>
      <a href="#" class="tooltip-trigger tooltip-trigger--link" data-tooltip="Join our community on GitHub">GitHub</a>
    </div>

    <div class="tooltip-demo__info">
      <p>Tooltips appear above triggers by default, below when space is limited.</p>
      <p>Text animates in one character at a time using <code>steps()</code>.</p>
    </div>
  </div>
</body>
</html>
