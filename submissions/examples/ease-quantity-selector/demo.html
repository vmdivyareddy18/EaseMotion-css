<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quantity Selector — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Quantity Selector</h1>
  <p class="subtitle">A product quantity +/- selector with button animations — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the buttons to see the animation</p>
    <div class="qty-selector"><button class="qty-btn">−</button><span class="qty-value">1</span><button class="qty-btn">+</button></div>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>Minus/plus buttons have hover <code>scale</code> and <code>background</code> transitions. The value sits between them with a clean bordered layout.</p>
  </section>
</body>
</html>
