<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Toggle Switch Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Ease Toggle Switch</h1>

    <label class="ease-toggle">
      <input type="checkbox" class="ease-toggle-input">
      <span class="ease-toggle-slider"></span>
      Enable Notifications
    </label>

    <label class="ease-toggle">
      <input type="checkbox" class="ease-toggle-input" checked>
      <span class="ease-toggle-slider"></span>
      Dark Mode
    </label>

    <label class="ease-toggle">
      <input type="checkbox" class="ease-toggle-input">
      <span class="ease-toggle-slider"></span>
      Email Updates
    </label>
  </div>

</body>
</html>
