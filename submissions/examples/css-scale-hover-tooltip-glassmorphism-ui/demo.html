<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Scale Hover Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="glass-card">

        <span class="badge">Glassmorphism UI</span>

        <h1>Hover the Action Buttons</h1>

        <p>
            Beautiful frosted-glass tooltips with smooth scale animations,
            keyboard accessibility, and pure CSS interactions.
        </p>

        <div class="actions">

            <button class="tooltip-wrapper">

                Download

                <span class="tooltip">
                    Download your project files
                </span>

            </button>

            <button class="tooltip-wrapper">

                Share

                <span class="tooltip">
                    Share this project with your team
                </span>

            </button>

            <button class="tooltip-wrapper">

                Settings

                <span class="tooltip">
                    Configure preferences
                </span>

            </button>

        </div>

    </div>

</div>

</body>
</html>
