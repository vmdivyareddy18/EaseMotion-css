<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tip-wrapper">

    <h1>Tip Calculator</h1>

    <div class="tip-field">
      <label>Bill Amount</label>
      <div class="input-wrap">
        <span class="prefix">$</span>
        <input type="number" id="billAmount" class="tip-input" value="50" min="0" step="0.01">
      </div>
    </div>

    <div class="tip-field">
      <label>Tip Percentage</label>
      <div class="tip-presets" id="presets">
        <button class="preset-btn" data-pct="10">10%</button>
        <button class="preset-btn active" data-pct="15">15%</button>
        <button class="preset-btn" data-pct="18">18%</button>
        <button class="preset-btn" data-pct="20">20%</button>
        <button class="preset-btn" data-pct="25">25%</button>
      </div>
      <div class="input-wrap">
        <input type="number" id="customPct" class="tip-input custom" value="" placeholder="Custom %" min="0" step="0.5">
      </div>
    </div>

    <div class="tip-field">
      <label>Split</label>
      <div class="split-control">
        <button id="splitDec">&minus;</button>
        <span id="splitCount">1</span>
        <button id="splitInc">+</button>
      </div>
    </div>

    <div class="tip-results">
      <div class="result-row">
        <span class="result-label">Tip Amount</span>
        <span class="result-value" id="tipAmount">$7.50</span>
      </div>
      <div class="result-row">
        <span class="result-label">Total</span>
        <span class="result-value" id="totalAmount">$57.50</span>
      </div>
      <div class="result-row total">
        <span class="result-label">Each person</span>
        <span class="result-value" id="eachAmount">$57.50</span>
      </div>
    </div>

  </div>

  <script>
    const bill = document.getElementById('billAmount');
    const customPct = document.getElementById('customPct');
    const presets = document.querySelectorAll('.preset-btn');
    const splitCount = document.getElementById('splitCount');
    const tipEl = document.getElementById('tipAmount');
    const totalEl = document.getElementById('totalAmount');
    const eachEl = document.getElementById('eachAmount');

    let tipPct = 15;
    let split = 1;

    function calculate() {
      const b = parseFloat(bill.value) || 0;
      const tip = b * (tipPct / 100);
      const total = b + tip;
      const each = total / split;

      tipEl.textContent = '$' + tip.toFixed(2);
      totalEl.textContent = '$' + total.toFixed(2);
      eachEl.textContent = '$' + each.toFixed(2);
    }

    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        presets.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tipPct = parseInt(btn.dataset.pct);
        customPct.value = '';
        calculate();
      });
    });

    customPct.addEventListener('input', () => {
      const v = parseFloat(customPct.value);
      if (!isNaN(v) && v >= 0) {
        presets.forEach(b => b.classList.remove('active'));
        tipPct = v;
        calculate();
      }
    });

    document.getElementById('splitInc').addEventListener('click', () => {
      split = Math.min(20, split + 1);
      splitCount.textContent = split;
      calculate();
    });

    document.getElementById('splitDec').addEventListener('click', () => {
      split = Math.max(1, split - 1);
      splitCount.textContent = split;
      calculate();
    });

    bill.addEventListener('input', calculate);
    calculate();
  </script>

</body>
</html>
