<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Table Row Hover Focus Pattern</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="demo-header" aria-labelledby="demo-title">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1 id="demo-title">Responsive Table Row Hover Focus Pattern</h1>
      <p>Adds a data table example with stable hover and keyboard focus treatment.</p>
    </section>
    <div class="table-wrap" role="region" aria-label="Invoice statuses" tabindex="0">
      <table class="motion-table">
        <caption>Recent invoices</caption>
        <thead><tr><th scope="col">Invoice</th><th scope="col">Status</th><th scope="col">Amount</th></tr></thead>
        <tbody>
          <tr tabindex="0"><td data-label="Invoice">#1042</td><td data-label="Status"><span class="badge paid">Paid</span></td><td data-label="Amount">$240</td></tr>
          <tr tabindex="0"><td data-label="Invoice">#1043</td><td data-label="Status"><span class="badge pending">Pending</span></td><td data-label="Amount">$180</td></tr>
          <tr tabindex="0"><td data-label="Invoice">#1044</td><td data-label="Status"><span class="badge paid">Paid</span></td><td data-label="Amount">$320</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
