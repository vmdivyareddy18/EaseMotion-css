<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Filter Playground - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="fl-wrapper">

    <h1>CSS Filter Playground</h1>

    <div class="fl-images">
      <div class="fl-panel">
        <span class="fl-label">Original</span>
        <div class="fl-img-wrap"><div class="fl-img" id="originalImg"></div></div>
      </div>
      <div class="fl-panel">
        <span class="fl-label">Filtered</span>
        <div class="fl-img-wrap"><div class="fl-img" id="filteredImg"></div></div>
      </div>
    </div>

    <div class="fl-controls" id="filterControls">
      <div class="fl-field"><label>Blur</label><input type="range" min="0" max="10" step="0.5" value="0" data-filter="blur"><span class="fl-val">0</span></div>
      <div class="fl-field"><label>Brightness</label><input type="range" min="0" max="200" step="1" value="100" data-filter="brightness"><span class="fl-val">100</span></div>
      <div class="fl-field"><label>Contrast</label><input type="range" min="0" max="200" step="1" value="100" data-filter="contrast"><span class="fl-val">100</span></div>
      <div class="fl-field"><label>Grayscale</label><input type="range" min="0" max="100" step="1" value="0" data-filter="grayscale"><span class="fl-val">0</span></div>
      <div class="fl-field"><label>Hue Rotate</label><input type="range" min="0" max="360" step="1" value="0" data-filter="hue-rotate"><span class="fl-val">0</span></div>
      <div class="fl-field"><label>Saturate</label><input type="range" min="0" max="300" step="1" value="100" data-filter="saturate"><span class="fl-val">100</span></div>
      <div class="fl-field"><label>Sepia</label><input type="range" min="0" max="100" step="1" value="0" data-filter="sepia"><span class="fl-val">0</span></div>
      <div class="fl-field"><label>Invert</label><input type="range" min="0" max="100" step="1" value="0" data-filter="invert"><span class="fl-val">0</span></div>
    </div>

    <button class="fl-btn" id="resetFiltersBtn">Reset All</button>
    <textarea class="fl-output" id="filterOutput" readonly></textarea>

  </div>

  <script>
    const filtered = document.getElementById('filteredImg');
    const output = document.getElementById('filterOutput');
    const sliders = document.querySelectorAll('#filterControls input[type="range"]');
    const resetBtn = document.getElementById('resetFiltersBtn');

    const defaults = { blur: 0, brightness: 100, contrast: 100, grayscale: 0, 'hue-rotate': 0, saturate: 100, sepia: 0, invert: 0 };

    function applyFilters() {
      const parts = [];
      sliders.forEach(s => {
        const filter = s.dataset.filter;
        let val = parseFloat(s.value);
        const unit = filter === 'blur' ? 'px' : filter === 'hue-rotate' ? 'deg' : '%';
        parts.push(filter + '(' + val + unit + ')');
        s.nextElementSibling.textContent = val;
      });
      const css = parts.join(' ');
      filtered.style.filter = css;
      output.value = 'filter: ' + css + ';';
    }

    resetBtn.addEventListener('click', () => {
      sliders.forEach(s => {
        const key = s.dataset.filter;
        s.value = defaults[key];
        applyFilters();
      });
    });

    sliders.forEach(s => s.addEventListener('input', applyFilters));
    applyFilters();
  </script>

</body>
</html>
