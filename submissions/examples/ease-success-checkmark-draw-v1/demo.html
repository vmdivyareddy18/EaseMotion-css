<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Success Checkmark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Success Animation ✅</h1>

  <div class="checkmark-wrapper">
    <svg class="checkmark" viewBox="0 0 52 52">
      <circle class="circle" cx="26" cy="26" r="25"/>
      <path class="tick" d="M14 27 L22 35 L38 18"/>
    </svg>
  </div>

  <button onclick="animateCheck()" class="btn">Complete</button>

</section>

<script>
function animateCheck() {
  const svg = document.querySelector(".checkmark");
  svg.classList.remove("active");

  void svg.offsetWidth; // restart animation

  svg.classList.add("active");
}
</script>

</body>
</html>
