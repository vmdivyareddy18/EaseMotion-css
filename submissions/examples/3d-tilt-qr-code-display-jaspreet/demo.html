<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro 3D Tilt QR Code Display Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="display-container">
        <!-- Interactive 3D Perspective Parent Frame -->
        <article class="qr-perspective-wrapper ease-3d-tilt" role="region" aria-labelledby="qr-card-title">
            
            <!-- Isometric Depth Shadow Block -->
            <div class="card-depth-shadow" aria-hidden="true"></div>
            
            <!-- Primary Animated Core Container -->
            <div class="qr-card-body">
                <!-- Retro Pixel Matrix Grid Overlay -->
                <div class="pixel-grid-bg" aria-hidden="true"></div>

                <header class="card-header">
                    <span class="system-status">SYS_ONLINE</span>
                    <h2 id="qr-card-title">ARCADE PASS</h2>
                </header>

                <!-- Layered QR Target Window -->
                <div class="qr-matrix-zone">
                    <div class="neon-frame-glow" aria-hidden="true"></div>
                    
                    <!-- Dynamic Vertical Laser Scanning Beam -->
                    <div class="laser-scan-line" aria-hidden="true"></div>

                    <!-- Stable High-Fidelity Inline SVG QR Vector -->
                    <div class="qr-vector-container">
                        <svg viewBox="0 0 29 29" fill="none" class="qr-svg" aria-label="QR Code link to digital rewards matrix">
                            <!-- Positioning Anchors -->
                            <path d="M0 0h7v7H0zm22 0h7v7h-7zM0 22h7v7H0z" fill="currentColor"/>
                            <path d="M2 2h3v3H2zm22 0h3v3h-3zM2 24h3v3H2z" fill="var(--retro-card)"/>
                            <!-- Alignment Clusters & Matrix Noise Patterns -->
                            <path d="M9 0h2v1H9zm4 0h1v4h-1zm3 0h2v3h-2zm4 0h1v1h-1zm-11 2h2v1H9zm4 1h1v2h-1zm4 0h1v2h-1zM9 4h3v2H9zm5 0h1v1h-1zm2 0h2v2h-2zm-7 2h1v1H7zm2 0h2v1H9zm4 0h1v1h-1zm6 0h1v3h-1zm-9 2h1v2H7zm4 0h4v1h-4zm5 0h2v1h-2zm3 0h2v3h-2zm-12 2h3v1h-3zm5 0h1v3h-1zm2 0h1v1h-1zm-7 2h2v2H7zm5 0h1v2h-1zm5 0h1v2h-1zm2 0h3v1h-3zm-10 2h2v1H9zm5 0h1v3h-1zm3 0h1v1h-1zm2 0h1v1h-1zm-10 2h3v1h-3zm6 0h2v1h-2zm4 0h1v2h-1zm-10 2h1v3H7zm4 0h1v1h-1zm2 0h3v1h-2zm4 0h2v1h-2zm2 0h3v2h-3zm-9 2h2v1H9zm4 0h2v1h-2zm-6 2h1v1H7zm2 0h2v1H9zm7 0h3v1h-3z" fill="currentColor"/>
                        </svg>
                    </div>
                </div>

                <!-- Info Stack & Call to Action Section -->
                <section class="card-footer-details">
                    <p class="scan-instructions">Scan matrix to instantly unlock legacy arcade tokens.</p>
                    
                    <a href="javascript:void(0)" class="btn-scan-trigger" aria-label="Activate system rewards payload link">
                        <span>CONNECT</span>
                        <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <polyline points="13 5 20 12 13 19"></polyline>
                            <line x1="19" y1="12" x2="4" y2="12"></line>
                        </svg>
                    </a>
                </section>
            </div>
        </article>
    </main>

</body>
</html>
