<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake – Issue 18194</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Shake</h1>
    <p class="subtitle">Click the button to shake the element</p>
    <div class="shake-card" id="shakeCard">
      <span class="shake-icon">&#9888;</span>
      <span class="shake-label">Shake me</span>
    </div>
    <button class="shake-btn" id="shakeBtn">Trigger Shake</button>
  </div>
  <script>
    (function() {
      var card = document.getElementById('shakeCard');
      var btn = document.getElementById('shakeBtn');
      btn.addEventListener('click', function() {
        card.classList.remove('shake-active');
        void card.offsetWidth;
        card.classList.add('shake-active');
      });
    })();
  </script>
</body>
</html>
