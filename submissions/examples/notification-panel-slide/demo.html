<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Panel Slide</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion notifications</p>
    <h1 id="demo-title">Notification panel slide</h1>
    <p class="intro">A notification panel where messages slide in from the side with a staggered delay.</p>

    <section class="notification-panel" aria-label="Recent notifications">
      <article>Build completed successfully</article>
      <article>Reviewer added a comment</article>
      <article>Preview deployment is ready</article>
    </section>
  </main>
</body>
</html>
