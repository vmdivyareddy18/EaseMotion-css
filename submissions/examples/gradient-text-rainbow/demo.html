<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Text Rainbow Animation</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #0f172a; flex-direction: column; gap: 1.5rem;">

    <p class="rainbow-text rainbow-fast">Fast animated gradient</p>
  </div>
</body>
</html>
