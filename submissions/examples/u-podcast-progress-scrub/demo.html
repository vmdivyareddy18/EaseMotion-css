<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-podcast-progress-scrub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <h2>Podcast Progress Scrub</h2>

    <div class="progress-container">

        <div class="progress-bar">

            <div class="progress-fill"></div>

            <div class="thumb"></div>

            <div class="preview-tooltip">
                12:45
            </div>

        </div>

    </div>

    <div class="time-info">
        <span>12:45</span>
        <span>45:00</span>
    </div>

</div>

</body>
</html>
