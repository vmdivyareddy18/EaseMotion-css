<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Image Gallery Filter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="gallery-container">
  <h1>Portfolio Gallery</h1>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="nature">Nature</button>
    <button class="filter-btn" data-filter="city">City</button>
    <button class="filter-btn" data-filter="people">People</button>
  </div>

  <div class="gallery-grid" id="galleryGrid">
    <div class="gallery-item" data-category="nature">
      <img src="https://placehold.co/300x220/238636/ffffff?text=Nature+1" alt="Nature 1">
    </div>
    <div class="gallery-item" data-category="city">
      <img src="https://placehold.co/300x220/1f6feb/ffffff?text=City+1" alt="City 1">
    </div>
    <div class="gallery-item" data-category="people">
      <img src="https://placehold.co/300x220/8957e5/ffffff?text=People+1" alt="People 1">
    </div>
    <div class="gallery-item" data-category="nature">
      <img src="https://placehold.co/300x220/2ea043/ffffff?text=Nature+2" alt="Nature 2">
    </div>
    <div class="gallery-item" data-category="city">
      <img src="https://placehold.co/300x220/388bfd/ffffff?text=City+2" alt="City 2">
    </div>
    <div class="gallery-item" data-category="people">
      <img src="https://placehold.co/300x220/a371f7/ffffff?text=People+2" alt="People 2">
    </div>
    <div class="gallery-item" data-category="nature">
      <img src="https://placehold.co/300x220/3fb950/ffffff?text=Nature+3" alt="Nature 3">
    </div>
    <div class="gallery-item" data-category="city">
      <img src="https://placehold.co/300x220/58a6ff/ffffff?text=City+3" alt="City 3">
    </div>
  </div>
</div>

<script>
  const filterBtns = document.querySelectorAll('.filter-btn');
  const galleryItems = document.querySelectorAll('.gallery-item');

  filterBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      filterBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;

      galleryItems.forEach(item => {
        const matches = filter === 'all' || item.dataset.category === filter;

        if (matches) {
          item.classList.remove('hide');
          item.classList.add('show');
        } else {
          item.classList.remove('show');
          item.classList.add('hide');
        }
      });
    });
  });
</script>

</body>
</html>
