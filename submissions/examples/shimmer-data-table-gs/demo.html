
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Glass Shimmer Table Demo</title>
    
    <!-- Links to the style.css file in the same folder -->
    <link rel="stylesheet" href="style.css">
    
    <style>
     
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #e94560);
            background-size: 400% 400%;
            font-family: sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Glassmorphism Shimmer Data Table Component -->
    <div class="em-glass-table-wrapper">
        <table class="em-shimmer-table">
            <thead>
                <tr class="em-shimmer-row">
                    <th class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></th>
                    <th class="em-shimmer-cell"><div class="em-shimmer-block em-w-70"></div></th>
                    <th class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></th>
                    <th class="em-shimmer-cell"><div class="em-shimmer-block em-w-30"></div></th>
                </tr>
            </thead>
            <tbody>
                <tr class="em-shimmer-row">
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-70"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-100"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></td>
                </tr>
                <tr class="em-shimmer-row">
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-100"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-70"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-30"></div></td>
                </tr>
                <tr class="em-shimmer-row">
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-50"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-30"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-100"></div></td>
                    <td class="em-shimmer-cell"><div class="em-shimmer-block em-w-70"></div></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
