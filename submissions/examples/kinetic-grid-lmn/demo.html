<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Grid Matrix Demo</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="demo-container">
  <div class="kinetic-matrix">
    <div class="matrix-dot" style="--col: 1; --row: 1;"></div>
    <div class="matrix-dot" style="--col: 2; --row: 1;"></div>
    <div class="matrix-dot" style="--col: 3; --row: 1;"></div>
    <div class="matrix-dot" style="--col: 4; --row: 1;"></div>
    <div class="matrix-dot" style="--col: 5; --row: 1;"></div>
    <div class="matrix-dot" style="--col: 1; --row: 2;"></div>
    <div class="matrix-dot" style="--col: 2; --row: 2;"></div>
    <div class="matrix-dot" style="--col: 3; --row: 2;"></div>
    <div class="matrix-dot" style="--col: 4; --row: 2;"></div>
    <div class="matrix-dot" style="--col: 5; --row: 2;"></div>
    <div class="matrix-dot" style="--col: 1; --row: 3;"></div>
    <div class="matrix-dot" style="--col: 2; --row: 3;"></div>
    <div class="matrix-dot" style="--col: 3; --row: 3;"></div>
    <div class="matrix-dot" style="--col: 4; --row: 3;"></div>
    <div class="matrix-dot" style="--col: 5; --row: 3;"></div>
    <div class="matrix-dot" style="--col: 1; --row: 4;"></div>
    <div class="matrix-dot" style="--col: 2; --row: 4;"></div>
    <div class="matrix-dot" style="--col: 3; --row: 4;"></div>
    <div class="matrix-dot" style="--col: 4; --row: 4;"></div>
    <div class="matrix-dot" style="--col: 5; --row: 4;"></div>
    <div class="matrix-dot" style="--col: 1; --row: 5;"></div>
    <div class="matrix-dot" style="--col: 2; --row: 5;"></div>
    <div class="matrix-dot" style="--col: 3; --row: 5;"></div>
    <div class="matrix-dot" style="--col: 4; --row: 5;"></div>
    <div class="matrix-dot" style="--col: 5; --row: 5;"></div>
  </div>
</div>
</body>
</html>
