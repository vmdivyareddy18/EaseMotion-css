<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Bounce Hover Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-row">
    <button class="ease-bounce-hover">Hover Me</button>

    <div class="ease-bounce-hover ease-bounce-hover--card">
      <h3>Feature Card</h3>
      <p>Bounces on hover</p>
    </div>

    <i class="ease-bounce-hover">🔔</i>

    <img
      class="ease-bounce-hover ease-bounce-hover--horizontal"
      src="https://placehold.co/80x80"
      alt="Product"
    />
  </div>

</body>
</html>
