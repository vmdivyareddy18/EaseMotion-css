<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Notification Chips — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="em-notification-container">
    <h1>Animated Notification Chips</h1>
    <p>Click the buttons below to see new notification chips appear with bounce and color transitions!</p>

    <div class="em-button-row">
      <button class="em-btn-success" onclick="addNotification('success')">Add Success Notification</button>
      <button class="em-btn-info" onclick="addNotification('info')">Add Info Notification</button>
      <button class="em-btn-warning" onclick="addNotification('warning')">Add Warning Notification</button>
    </div>

    <div class="em-notification-list" id="em-notification-list">
      <!-- Notification chips will be added here by JS! -->
    </div>
  </div>

  <script>
    let notificationCount = 0;
    const container = document.getElementById('em-notification-list');

    function addNotification(type) {
      notificationCount++;
      const chip = document.createElement('div');
      chip.className = `em-notification-chip em-chip-${type} em-animate-chip`;
      
      const icon = type === 'success' ? '✅' : type === 'warning' ? '⚠️' : 'ℹ️';
      const text = type === 'success' 
        ? `Success! Task ${notificationCount} completed!` 
        : type === 'warning' 
          ? `Warning: Check task ${notificationCount}!` 
          : `Info: New update for task ${notificationCount}!`;
      
      chip.innerHTML = `
        <span class="em-chip-icon">${icon}</span>
        <span class="em-chip-text">${text}</span>
        <button class="em-chip-close" onclick="removeNotification(this)">×</button>
      `;
      
      container.appendChild(chip);
      
      // Auto-remove after 5 seconds
      setTimeout(() => {
        removeNotification(chip.querySelector('.em-chip-close'));
      }, 5000);
    }

    function removeNotification(btn) {
      const chip = btn.closest('.em-notification-chip');
      chip.style.opacity = '0';
      chip.style.transform = 'translateX(100px) scale(0.9)';
      chip.style.transition = 'all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1)';
      setTimeout(() => chip.remove(), 300);
    }
  </script>
</body>
</html>
