<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Parallax Tilt Card Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    p.hint {
      color: #888;
      font-size: 0.85rem;
      margin: 0;
    }
  </style>
</head>
<body>

  <p class="hint">Move your mouse over the card to tilt it</p>

  <div class="ease-tilt-wrapper">
    <div class="ease-tilt-card" id="tiltCard">
      <h3>Tilt Card</h3>
      <p>The card tilts toward your cursor and snaps back smoothly when you leave.</p>
    </div>
  </div>

  <script>
    const card = document.getElementById('tiltCard');
    const maxTilt = 12; // degrees

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const centerX = rect.width / 2;
      const centerY = rect.height / 2;

      const rotateY = ((x - centerX) / centerX) * maxTilt;
      const rotateX = -((y - centerY) / centerY) * maxTilt;

      card.style.setProperty('--ease-tilt-x', `${rotateX}deg`);
      card.style.setProperty('--ease-tilt-y', `${rotateY}deg`);
    });

    card.addEventListener('mouseleave', () => {
      card.style.setProperty('--ease-tilt-x', '0deg');
      card.style.setProperty('--ease-tilt-y', '0deg');
    });
  </script>

</body>
</html>
