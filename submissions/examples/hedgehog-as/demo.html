<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hedgehog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="hog" tabindex="0">
      <span class="spines"></span>
      <span class="quills"></span>
      <span class="body"></span>
      <div class="head">
        <span class="ear"></span>
        <span class="eye"></span>
        <span class="snout"></span>
        <span class="nose"></span>
        <span class="cheek"></span>
      </div>
      <span class="foot ff"></span>
      <span class="foot bf"></span>
    </div>
    <span class="leafh"></span>
    <span class="ground"></span>
    <p class="hint">hover to bristle</p>
  </div>
</body>
</html>
