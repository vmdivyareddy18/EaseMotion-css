<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corporate Glow Pulse Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <article class="em-card" tabindex="0" aria-label="Corporate growth overview card">
        <p class="em-card__eyebrow">Strategy pulse</p>
        <h1 class="em-card__title">Scale your next quarter with calm confidence.</h1>
        <p class="em-card__copy">
          Coordinate launches, revenue signals, and customer momentum from one polished command center.
        </p>
        <ul class="em-card__stats" aria-label="Key performance highlights">
          <li>
            <strong>+24%</strong>
            <span>Q2 growth</span>
          </li>
          <li>
            <strong>9.8/10</strong>
            <span>Client health</span>
          </li>
          <li>
            <strong>12</strong>
            <span>New markets</span>
          </li>
        </ul>
        <p class="em-card__meta">Remote-first • Live sync • Secure by design</p>
      </article>
    </main>
  </body>
</html>
