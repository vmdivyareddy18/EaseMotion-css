<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Optical Sizing Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Font Optical Sizing</h1>
    <p class="note">
      Adjusts glyph shapes for optimal readability at different sizes. Best seen
      with variable fonts.
    </p>

    <div class="label">font-optical-sizing: auto (default)</div>
    <div
      class="demo-text optical-auto"
      style="font-family: &quot;Inter&quot;, system-ui"
    >
      The quick brown fox jumps over the lazy dog
    </div>

    <div class="label">font-optical-sizing: none</div>
    <div
      class="demo-text optical-none"
      style="font-family: &quot;Inter&quot;, system-ui"
    >
      The quick brown fox jumps over the lazy dog
    </div>
  </body>
</html>
