<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Staggered Entrance Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Dashboard Analytics

</span>

<h1>

Staggered Entrance Modal

</h1>

<p>

Analytics-inspired modal
featuring staggered content
animations for KPI dashboards
and reporting interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

View Report

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="modal-content">

<div class="metric">

92%

</div>

<h2>

Business Insights

</h2>

<p>

Track analytics, monitor KPIs
and explore reporting data
through a smooth staggered
entrance animation.

</p>

<button>

Open Dashboard

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
