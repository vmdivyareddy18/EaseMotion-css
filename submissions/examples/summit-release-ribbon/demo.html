<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>summit release ribbon demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="summit release ribbon demo">
    <section class="motion-card" data-pattern="ribbon">
      <div class="status-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="card-copy">
        <p class="eyebrow">Release</p>
        <h1>summit release ribbon</h1>
        <p>Canary complete with a focused motion cue that keeps status changes easy to scan.</p>
      </div>
      <div class="metric-panel" aria-label="Release value">
        <strong>v2.9</strong>
        <span>Release</span>
      </div>
      <div class="progress-row" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
