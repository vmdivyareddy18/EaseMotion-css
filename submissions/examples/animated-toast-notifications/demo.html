<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toast Notifications - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background Context (Optional, just to make it look like an app) -->
  <div class="app-context">
    <h1>Dashboard</h1>
    <p>Check the top right corner for notifications...</p>
  </div>

  <!-- Toast Container -->
  <div class="toast-container">
    
    <!-- Success Toast -->
    <div class="toast toast-success ease-slide-in-right ease-delay-100">
      <div class="toast-icon ease-pulse">✅</div>
      <div class="toast-content">
        <h4>Success!</h4>
        <p>Your profile has been updated successfully.</p>
      </div>
      <button class="toast-close ease-hover-grow" aria-label="Close">&times;</button>
      <div class="toast-progress"></div>
    </div>

    <!-- Error Toast -->
    <div class="toast toast-error ease-bounce-in ease-delay-400">
      <div class="toast-icon ease-pulse">❌</div>
      <div class="toast-content">
        <h4>Error!</h4>
        <p>Failed to upload the document. Please try again.</p>
      </div>
      <button class="toast-close ease-hover-grow" aria-label="Close">&times;</button>
      <div class="toast-progress"></div>
    </div>

    <!-- Warning Toast -->
    <div class="toast toast-warning ease-fade-in-down ease-delay-700">
      <div class="toast-icon ease-pulse">⚠️</div>
      <div class="toast-content">
        <h4>Warning</h4>
        <p>Your session will expire in 5 minutes.</p>
      </div>
      <button class="toast-close ease-hover-grow" aria-label="Close">&times;</button>
      <div class="toast-progress"></div>
    </div>

    <!-- Info Toast -->
    <div class="toast toast-info ease-slide-in-left ease-delay-1000">
      <div class="toast-icon ease-pulse">ℹ️</div>
      <div class="toast-content">
        <h4>Info</h4>
        <p>A new software update is available for download.</p>
      </div>
      <button class="toast-close ease-hover-grow" aria-label="Close">&times;</button>
      <div class="toast-progress"></div>
    </div>

  </div>
</body>
</html>
