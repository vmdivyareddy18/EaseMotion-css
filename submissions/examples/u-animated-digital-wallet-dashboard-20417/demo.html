<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Digital Wallet Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="wallet-card">

        <div class="badge">
            💳 Digital Wallet
        </div>

        <h2>Available Balance</h2>

        <div class="balance">
            ₹84,520
        </div>

        <p class="description">
            Manage your finances, track spending, and monitor savings with a modern wallet dashboard.
        </p>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>₹12,450</h3>
                <p>Monthly Spending</p>
            </div>

            <div class="stat-box">
                <h3>₹8,200</h3>
                <p>Monthly Savings</p>
            </div>

            <div class="stat-box">
                <h3>18</h3>
                <p>Transactions</p>
            </div>

            <div class="stat-box">
                <h3>3</h3>
                <p>Linked Cards</p>
            </div>

        </div>

        <div class="progress-section">

            <div class="progress-header">
                <span>Savings Goal</span>
                <span>72%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="status-card">
            ✅ Last transaction completed successfully.
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Send Money
            </button>

            <button class="secondary-btn">
                View Transactions
            </button>

        </div>

    </div>

</div>

</body>
</html>
