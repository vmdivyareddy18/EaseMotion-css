<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Item Pop - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Grid Item Pop</h1>
    <p class="desc">Items pop in with scale animation on load</p>
    <div class="gip-grid" id="gipGrid">
      <div class="gip-item">1</div>
      <div class="gip-item">2</div>
      <div class="gip-item">3</div>
      <div class="gip-item">4</div>
      <div class="gip-item">5</div>
      <div class="gip-item">6</div>
      <div class="gip-item">7</div>
      <div class="gip-item">8</div>
      <div class="gip-item">9</div>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var grid = document.getElementById('gipGrid');
      grid.classList.add('gip-visible');
    });
  </script>
</body>
</html>
