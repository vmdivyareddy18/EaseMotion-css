<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion - Shake Avatar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Shake Avatar</h1>
      <p>Hover or focus an avatar to see the shake animation.</p>
      <div class="avatar-grid">
        <button class="shake-avatar ease-duration-normal ease-ease-standard">
          <img src="https://i.pravatar.cc/150?img=15" alt="Avatar 1" />
        </button>
        <button class="shake-avatar ease-duration-normal ease-ease-standard">
          <img src="https://i.pravatar.cc/150?img=22" alt="Avatar 2" />
        </button>
        <button class="shake-avatar ease-duration-normal ease-ease-standard">
          <img src="https://i.pravatar.cc/150?img=33" alt="Avatar 3" />
        </button>
        <button class="shake-avatar ease-duration-normal ease-ease-standard">
          <img src="https://i.pravatar.cc/150?img=48" alt="Avatar 4" />
        </button>
      </div>
    </div>
  </body>
</html>
