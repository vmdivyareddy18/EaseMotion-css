<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual List Skeleton - Pure CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="app-layout">
        <header class="app-header">
            <h1>User Directory</h1>
            <p>Loading virtualized data...</p>
        </header>

        <!-- 
          The Virtual List Container 
          aria-busy indicates to screen readers that this region is loading.
        -->
        <div class="virtual-list" aria-busy="true" aria-live="polite">
            
            <!-- Skeleton Item 1 -->
            <div class="list-item-skeleton">
                <div class="ease-skeleton skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="ease-skeleton skeleton-title"></div>
                    <div class="ease-skeleton skeleton-text"></div>
                    <div class="ease-skeleton skeleton-text short"></div>
                </div>
            </div>

            <!-- Skeleton Item 2 -->
            <div class="list-item-skeleton">
                <div class="ease-skeleton skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="ease-skeleton skeleton-title"></div>
                    <div class="ease-skeleton skeleton-text"></div>
                    <div class="ease-skeleton skeleton-text short"></div>
                </div>
            </div>

            <!-- Skeleton Item 3 -->
            <div class="list-item-skeleton">
                <div class="ease-skeleton skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="ease-skeleton skeleton-title"></div>
                    <div class="ease-skeleton skeleton-text"></div>
                    <div class="ease-skeleton skeleton-text short"></div>
                </div>
            </div>

            <!-- Skeleton Item 4 -->
            <div class="list-item-skeleton">
                <div class="ease-skeleton skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="ease-skeleton skeleton-title"></div>
                    <div class="ease-skeleton skeleton-text"></div>
                    <div class="ease-skeleton skeleton-text short"></div>
                </div>
            </div>

            <!-- Skeleton Item 5 -->
            <div class="list-item-skeleton">
                <div class="ease-skeleton skeleton-avatar"></div>
                <div class="skeleton-content">
                    <div class="ease-skeleton skeleton-title"></div>
                    <div class="ease-skeleton skeleton-text"></div>
                    <div class="ease-skeleton skeleton-text short"></div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
