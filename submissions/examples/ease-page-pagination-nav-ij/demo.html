<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Page Pagination Nav</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='nav-bg')r.style.setProperty('--nav-bg',t.value);if(t.name==='page-color')r.style.setProperty('--page-color',t.value);if(t.name==='active-color')r.style.setProperty('--active-color',t.value);if(t.name==='turn-duration')r.style.setProperty('--turn-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const pages=document.querySelectorAll('.pager-page');const prev=document.querySelector('.pager-prev');const next=document.querySelector('.pager-next');const label=document.querySelector('.pager-current');let c=0;function go(n){if(n<0||n>=pages.length)return;pages[c].classList.remove('active');c=n;pages[c].classList.add('active');pages[c].style.animation='none';void pages[c].offsetHeight;pages[c].style.animation='pageTurn var(--turn-duration,0.4s) ease-out';label.textContent='Page '+(c+1)+' of '+pages.length}prev.addEventListener('click',()=>go(c-1));next.addEventListener('click',()=>go(c+1));go(0)})
</script>
<div class="container"><p class="title">Page Pagination Nav</p>
<div class="pager-view"><div class="pager-page"><h2>Welcome</h2><p>Introduction to the guide</p></div><div class="pager-page"><h2>Getting Started</h2><p>Setup and configuration steps</p></div><div class="pager-page"><h2>Features</h2><p>Explore available features</p></div><div class="pager-page"><h2>Next Steps</h2><p>Continue your journey</p></div></div>
<div class="pager-bar"><button class="pager-prev">&larr; Prev</button><span class="pager-current">Page 1 of 4</span><button class="pager-next">Next &rarr;</button></div>
<div class="controls"><label>Bar BG: <input type="color" name="nav-bg" value="#2d2d44"></label><label>Inactive: <input type="color" name="page-color" value="#888"></label><label>Active: <input type="color" name="active-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="turn-duration" min="0.15" max="0.8" step="0.05" value="0.4"></label></div></div></body></html>
