<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Heart Button - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The Toggle Container -->
    <label class="heart-label-qn">
        <!-- Hidden checkbox to handle the liked/unliked state -->
        <input type="checkbox" class="heart-input-qn">
        
        <!-- The Visual Heart and Particles -->
        <div class="heart-icon-qn">
            <!-- SVG Heart Icon -->
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
            
            <!-- Burst Particles -->
            <span class="particle-qn p1-qn"></span>
            <span class="particle-qn p2-qn"></span>
            <span class="particle-qn p3-qn"></span>
            <span class="particle-qn p4-qn"></span>
            <span class="particle-qn p5-qn"></span>
            <span class="particle-qn p6-qn"></span>
        </div>
    </label>
</body>
</html>
