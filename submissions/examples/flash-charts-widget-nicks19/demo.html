<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Charts Widget - Medical Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f1f5f9; /* Clean clinical background */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }
    .demo-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 10px 0;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="demo-header">
    <h1>Patient Vitals Overview</h1>
    <p>Pure CSS animated "Flash" charts widget for medical dashboards.</p>
  </div>

  <div class="ease-flash-widget">
    
    <!-- Header Section -->
    <div class="ease-widget-header">
      <div class="ease-widget-title">
        <div class="ease-pulse-dot"></div>
        Live Heart Rate
      </div>
      <div class="ease-widget-value">
        <span class="ease-metric">72</span>
        <span class="ease-unit">BPM</span>
      </div>
    </div>

    <!-- Heartbeat Line Chart (ECG style) -->
    <div class="ease-ecg-container">
      <svg class="ease-ecg-svg" viewBox="0 0 500 100" preserveAspectRatio="none">
        <!-- Background Grid for Medical look -->
        <g class="ease-grid">
          <line x1="0" y1="20" x2="500" y2="20" />
          <line x1="0" y1="40" x2="500" y2="40" />
          <line x1="0" y1="60" x2="500" y2="60" />
          <line x1="0" y1="80" x2="500" y2="80" />
        </g>
        <!-- The ECG Line -->
        <polyline class="ease-ecg-line" points="
          0,50 50,50 
          60,30 70,70 80,50 
          150,50 160,30 170,70 180,50 
          250,50 260,30 270,70 280,50 
          350,50 360,30 370,70 380,50 
          450,50 460,30 470,70 480,50 
          500,50
        "></polyline>
      </svg>
    </div>

    <!-- Secondary Stats: Flash Bar Charts -->
    <div class="ease-stats-container">
      
      <div class="ease-stat-item">
        <div class="ease-stat-label">Oxygen (SpO2)</div>
        <div class="ease-bar-wrapper">
          <div class="ease-bar-fill ease-flash-bar-1" style="--target-width: 98%;"></div>
        </div>
        <div class="ease-stat-val">98%</div>
      </div>

      <div class="ease-stat-item">
        <div class="ease-stat-label">Blood Pressure</div>
        <div class="ease-bar-wrapper">
          <div class="ease-bar-fill ease-flash-bar-2" style="--target-width: 75%;"></div>
        </div>
        <div class="ease-stat-val">120/80</div>
      </div>

      <div class="ease-stat-item">
        <div class="ease-stat-label">Respiration</div>
        <div class="ease-bar-wrapper">
          <div class="ease-bar-fill ease-flash-bar-3" style="--target-width: 40%;"></div>
        </div>
        <div class="ease-stat-val">16 rpm</div>
      </div>

    </div>

  </div>

</body>
</html>
