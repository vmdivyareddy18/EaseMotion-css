<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vintage Vinyl Record Player - EaseMotion CSS</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox for play/pause state management -->
  <input type="checkbox" id="turntable-state" class="turntable-checkbox">

  <div class="container">
    
    <!-- Main turntable deck -->
    <div class="turntable-deck">
      
      <!-- Vinyl record with grooves -->
      <div class="vinyl-wrapper">
        <div class="vinyl-record">
          <!-- Record grooves effect -->
          <div class="record-grooves"></div>
          
          <!-- Center label -->
          <div class="record-label">
            <div class="label-text">
              <span class="label-title">SIDE A</span>
              <span class="label-artist">Classic Vibes</span>
            </div>
            <div class="spindle-hole"></div>
          </div>
        </div>
        
        <!-- Spindle in center -->
        <div class="spindle"></div>
      </div>

      <!-- Tone arm assembly -->
      <div class="tonearm-base">
        <div class="tonearm">
          <div class="tonearm-head"></div>
          <div class="tonearm-arm"></div>
          <div class="tonearm-pivot"></div>
        </div>
      </div>

      <!-- Play/Pause control button -->
      <div class="controls-section">
        <label for="turntable-state" 
               class="play-control" 
               tabindex="0" 
               role="button" 
               aria-label="Play or Pause">
          
          <!-- Play icon -->
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          
          <!-- Pause icon -->
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 4h4v16H6V4zm8 0h4v16h-4V4z"/>
          </svg>
        </label>

        <!-- Speed selector (decorative) -->
        <div class="speed-selector">
          <span class="speed-option active">33⅓</span>
          <span class="speed-option">45</span>
        </div>
      </div>

      <!-- Now playing info -->
      <div class="now-playing">
        <div class="track-info">
          <h2 class="track-name">Midnight Groove</h2>
          <p class="artist-name">The Vinyl Collection</p>
        </div>
        
        <!-- Decorative LED indicator -->
        <div class="led-indicator"></div>
      </div>

    </div>

  </div>

  <script>
    // Keyboard accessibility helper
    const playBtn = document.querySelector('.play-control');
    const checkbox = document.getElementById('turntable-state');
    
    playBtn.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        checkbox.click();
      }
    });
    
    // Update ARIA for screen readers
    checkbox.addEventListener('change', () => {
      playBtn.setAttribute('aria-pressed', checkbox.checked);
    });
  </script>

</body>
</html>
