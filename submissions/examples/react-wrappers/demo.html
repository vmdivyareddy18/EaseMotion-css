<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion React Wrappers Demo</title>
    <!-- EaseMotion Core -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Demo Custom Styles -->
    <link rel="stylesheet" href="style.css">
    
    <!-- React & Babel for in-browser rendering -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- React Wrapper Components ---
        const { useState, useEffect, useRef } = React;

        const Animate = ({ as: Component = 'div', type = 'fade-in', duration, delay, iteration, className = '', style = {}, children, ...rest }) => {
            const classes = ['ease-' + type, className].filter(Boolean).join(' ');
            const customStyles = { ...style };
            
            if (duration) {
                if (typeof duration === 'number' || !isNaN(Number(duration))) {
                    customStyles.animationDuration = `${duration}ms`;
                } else {
                    customStyles.animationDuration = `var(--ease-speed-${duration})`;
                }
            }
            if (delay) customStyles.animationDelay = `${delay}ms`;
            if (iteration) customStyles.animationIterationCount = iteration;

            return <Component className={classes} style={customStyles} {...rest}>{children}</Component>;
        };

        const Hover = ({ as: Component = 'div', type = 'lift', className = '', children, onMouseEnter, onMouseLeave, ...rest }) => {
            const [isHovering, setIsHovering] = useState(false);
            const hoverMap = { lift: 'ease-hover-lift', scale: 'ease-hover-grow', glow: 'ease-hover-glow' };
            const cssClass = hoverMap[type] || `ease-hover-${type}`;
            
            const classes = [
                type !== 'shake' ? cssClass : '',
                type === 'shake' && isHovering ? 'ease-shake' : '',
                className
            ].filter(Boolean).join(' ');

            return (
                <Component 
                    className={classes} 
                    onMouseEnter={(e) => { setIsHovering(true); if (onMouseEnter) onMouseEnter(e); }}
                    onMouseLeave={(e) => { setIsHovering(false); if (onMouseLeave) onMouseLeave(e); }}
                    {...rest}
                >
                    {children}
                </Component>
            );
        };

        const ScrollReveal = ({ as: Component = 'div', animation = 'fade-in', threshold = 0.1, triggerOnce = true, duration, delay, className = '', style = {}, children, ...rest }) => {
            const [isVisible, setIsVisible] = useState(false);
            const [hasRevealed, setHasRevealed] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsVisible(true);
                        setHasRevealed(true);
                    } else if (!triggerOnce) setIsVisible(false);
                }, { threshold });

                if (ref.current) observer.observe(ref.current);
                return () => { if (ref.current) observer.unobserve(ref.current); };
            }, [threshold, triggerOnce]);

            const active = triggerOnce ? hasRevealed : isVisible;
            const classes = [active ? `ease-${animation}` : '', className].filter(Boolean).join(' ');
            const customStyles = { ...style };
            if (!active) customStyles.opacity = 0;
            
            return <Component ref={ref} className={classes} style={customStyles} {...rest}>{children}</Component>;
        };

        // --- Demo Application ---
        function App() {
            return (
                <div className="demo-container">
                    <header className="demo-header">
                        <Animate as="h1" type="slide-down" duration="slow">
                            React Wrappers <br/> for EaseMotion
                        </Animate>
                        <Animate as="p" type="fade-in" delay={400} duration="slow">
                            Declarative components. Infinite possibilities.
                        </Animate>
                    </header>

                    <section className="demo-section">
                        <h2>Hover Effects</h2>
                        <div className="grid">
                            <Hover type="lift" className="demo-card">
                                <h3>Lift</h3>
                                <p>Elevates smoothly on hover</p>
                            </Hover>
                            <Hover type="scale" className="demo-card">
                                <h3>Scale</h3>
                                <p>Grows subtly to draw focus</p>
                            </Hover>
                            <Hover type="glow" className="demo-card glow-card">
                                <h3>Glow</h3>
                                <p>Casts a primary neon aura</p>
                            </Hover>
                            <Hover type="shake" className="demo-card">
                                <h3>Shake</h3>
                                <p>Bounces for interactive feedback</p>
                            </Hover>
                        </div>
                    </section>

                    <section className="demo-section scroll-area">
                        <h2>Scroll Reveal Observer</h2>
                        <p className="scroll-instructions">Scroll down to see elements reveal dynamically.</p>
                        
                        <div className="reveal-track">
                            <ScrollReveal animation="slide-up" delay={100} className="demo-card reveal-card">
                                <h3>Item 1</h3>
                            </ScrollReveal>
                            <ScrollReveal animation="slide-up" delay={300} className="demo-card reveal-card">
                                <h3>Item 2</h3>
                            </ScrollReveal>
                            <ScrollReveal animation="slide-up" delay={500} className="demo-card reveal-card">
                                <h3>Item 3</h3>
                            </ScrollReveal>
                        </div>
                    </section>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
