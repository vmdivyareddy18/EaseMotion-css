<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Glow Navbar Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="nav-page" aria-labelledby="nav-title">
    <section class="nav-card">
      <p class="eyebrow">Navigation motion</p>
      <h1 id="nav-title">Hover Glow Navbar</h1>
      <nav class="glow-navbar" aria-label="Demo navigation">
        <a class="active" href="#">Home</a>
        <a href="#">Work</a>
        <a href="#">Docs</a>
        <a href="#">Contact</a>
      </nav>
      <p class="caption">Each link has a soft glow, lift, and animated underline for a polished navigation state.</p>
    </section>
  </main>
</body>
</html>
