<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Typewriter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="typewriter-wrapper">
    <div class="typewriter-line" id="typewriterLine">
      <span id="typewriterText"></span><span class="typewriter-cursor"></span>
    </div>
    <p class="typewriter-sub">Typing out message character by character</p>
  </div>
</div>
<script>
const phrases = ['Hello, World!', 'Welcome to EaseMotion', 'Built with CSS & JS'];
const el = document.getElementById('typewriterText');
let phraseIdx = 0;
let charIdx = 0;
let isDeleting = false;
function typeStep() {
  const current = phrases[phraseIdx];
  if (!isDeleting) {
    el.textContent = current.slice(0, charIdx + 1);
    charIdx++;
    if (charIdx === current.length) { setTimeout(() => { isDeleting = true; typeStep(); }, 1500); return; }
  } else {
    el.textContent = current.slice(0, charIdx - 1);
    charIdx--;
    if (charIdx === 0) { isDeleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; }
  }
  setTimeout(typeStep, isDeleting ? 40 : 80);
}
typeStep();
</script>
</body>
</html>
