<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagger Progress Bar - Admin Panel</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="admin-viewport">
        <div class="stagger-card">
            <div class="metrics-header">
                <span class="metric-title">SYSTEM DEPLOYMENT STATUS</span>
                <span class="metric-value">60% Complete</span>
            </div>
            
            <div class="stagger-track">
                <div class="stagger-segment" style="--seg-index: 0; --seg-fill: 100%;">
                    <div class="segment-fill"></div>
                </div>
                <div class="stagger-segment" style="--seg-index: 1; --seg-fill: 100%;">
                    <div class="segment-fill"></div>
                </div>
                <div class="stagger-segment" style="--seg-index: 2; --seg-fill: 100%;">
                    <div class="segment-fill"></div>
                </div>
                <div class="stagger-segment" style="--seg-index: 3; --seg-fill: 0%;">
                    <div class="segment-fill"></div>
                </div>
                <div class="stagger-segment" style="--seg-index: 4; --seg-fill: 0%;">
                    <div class="segment-fill"></div>
                </div>
            </div>
            
            <div class="stagger-footer">
                <span class="status-node active">Clusters 1-3 Active</span>
                <span class="status-node cooling">Clusters 4-5 Pending</span>
            </div>
        </div>
    </div>

</body>
</html>
