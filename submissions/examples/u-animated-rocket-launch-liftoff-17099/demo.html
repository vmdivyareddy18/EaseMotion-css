<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Rocket Launch Lift-Off</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Rocket Launch Lift-Off</h1>

    <p>
      A smooth rocket lift-off animation designed for startup websites,
      deployment dashboards, growth metrics, and achievement pages.
    </p>

    <div class="demo-grid">

      <button class="rocket-button">
        <span class="rocket-icon">🚀</span>
      </button>

      <button class="rocket-button card-style">
        <span class="rocket-icon">🚀</span>
        <span>Launch Project</span>
      </button>

      <div class="launch-card">
        <h3>Deployment Ready</h3>

        <p>
          Your application is prepared for launch.
        </p>

        <button class="rocket-button small">
          <span class="rocket-icon">🚀</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
