<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics Widgets • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <div class="header">

        <span class="badge">ANALYTICS DASHBOARD</span>

        <h1>Performance Overview</h1>

        <p>
            Beautiful colorful analytics widgets showcasing KPI cards,
            charts, statistics and growth indicators.
        </p>

    </div>

    <div class="grid">

        <div class="card revenue">

            <div class="icon">💰</div>

            <span>Total Revenue</span>

            <h2>$86,420</h2>

            <small>▲ 14.8% this month</small>

        </div>

        <div class="card users">

            <div class="icon">👥</div>

            <span>New Users</span>

            <h2>18,540</h2>

            <small>▲ 8.4% growth</small>

        </div>

        <div class="card sales">

            <div class="icon">🛒</div>

            <span>Sales</span>

            <h2>2,148</h2>

            <small>▲ 11.2% today</small>

        </div>

        <div class="card visitors">

            <div class="icon">📈</div>

            <span>Visitors</span>

            <h2>97,204</h2>

            <small>▲ Live Traffic</small>

        </div>

    </div>

</div>

</body>
</html>
