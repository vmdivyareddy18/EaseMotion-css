<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Quick Tooltip</h1>
    <p class="subtitle">Hover the button to see the tooltip pop in from above</p>
    <div class="trigger-area" tabindex="0">
      Hover me
      <span class="tooltip">Hello! I'm a tooltip</span>
    </div>
  </section>

  <div class="controls">
    <div class="control-group">
      <label for="tooltipBg">Background</label>
      <input type="color" id="tooltipBg" value="#333333">
    </div>
    <div class="control-group">
      <label for="tooltipColor">Text Color</label>
      <input type="color" id="tooltipColor" value="#ffffff">
    </div>
    <div class="control-group">
      <label for="popDuration">Duration: <span id="popDurationVal">0.2</span>s</label>
      <input type="range" id="popDuration" min="0.05" max="0.8" step="0.05" value="0.2">
    </div>
  </div>

  <script>
    document.getElementById('tooltipBg').addEventListener('input', function() {
      document.documentElement.style.setProperty('--tooltip-bg', this.value);
    });
    document.getElementById('tooltipColor').addEventListener('input', function() {
      document.documentElement.style.setProperty('--tooltip-color', this.value);
    });
    document.getElementById('popDuration').addEventListener('input', function() {
      document.documentElement.style.setProperty('--pop-duration', this.value + 's');
      document.getElementById('popDurationVal').textContent = this.value;
    });
  </script>
</body>
</html>
