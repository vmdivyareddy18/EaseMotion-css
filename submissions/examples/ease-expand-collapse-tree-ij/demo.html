<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expand Collapse Tree — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Project Files</h2>
    <ul class="tree">
      <li class="tree-node expanded">
        <div class="node-label">
          <span class="toggle"></span>
          <span class="node-icon">&#128193;</span>
          <span>src</span>
        </div>
        <ul class="branch">
          <li class="tree-node">
            <div class="node-label">
              <span class="toggle"></span>
              <span class="node-icon">&#128193;</span>
              <span>components</span>
            </div>
            <ul class="branch">
              <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>Header.tsx</span></div></li>
              <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>Footer.tsx</span></div></li>
            </ul>
          </li>
          <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>App.tsx</span></div></li>
          <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>main.ts</span></div></li>
        </ul>
      </li>
      <li class="tree-node">
        <div class="node-label">
          <span class="toggle"></span>
          <span class="node-icon">&#128193;</span>
          <span>public</span>
        </div>
        <ul class="branch">
          <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>index.html</span></div></li>
          <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>favicon.ico</span></div></li>
        </ul>
      </li>
      <li class="tree-node leaf"><div class="node-label"><span class="node-icon">&#128196;</span><span>package.json</span></div></li>
    </ul>
  </div>
  <script>
    document.querySelectorAll('.tree-node:not(.leaf) > .node-label').forEach(label => {
      label.addEventListener('click', (e) => {
        const node = label.closest('.tree-node');
        node.classList.toggle('expanded');
      });
    });
  </script>
</body>
</html>
