<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animated Bar Chart</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <h1>CSS Animated Bar Chart</h1>

  <!-- Vertical column chart -->
  <figure class="bar-chart" role="img" aria-label="Monthly signups Q2: Apr 60%, May 82%, Jun 45%, Jul 91%, Aug 73%, Sep 58%">
    <p class="bar-chart__title">Monthly Signups — Q2</p>

    <ul class="bars" aria-hidden="true">
      <li class="bar" style="--h:60%;--i:0;--color:#6366f1"><span class="bar__tip">60%</span></li>
      <li class="bar" style="--h:82%;--i:1;--color:#818cf8"><span class="bar__tip">82%</span></li>
      <li class="bar" style="--h:45%;--i:2;--color:#6366f1"><span class="bar__tip">45%</span></li>
      <li class="bar" style="--h:91%;--i:3;--color:#818cf8"><span class="bar__tip">91%</span></li>
      <li class="bar" style="--h:73%;--i:4;--color:#6366f1"><span class="bar__tip">73%</span></li>
      <li class="bar" style="--h:58%;--i:5;--color:#818cf8"><span class="bar__tip">58%</span></li>
    </ul>

    <ul class="bar-labels" aria-hidden="true">
      <li class="bar-label">Apr</li>
      <li class="bar-label">May</li>
      <li class="bar-label">Jun</li>
      <li class="bar-label">Jul</li>
      <li class="bar-label">Aug</li>
      <li class="bar-label">Sep</li>
    </ul>
  </figure>

  <!-- Horizontal bar chart -->
  <figure class="bar-chart" role="img" aria-label="Team breakdown: Design 78%, Engineering 55%, Marketing 38%">
    <p class="bar-chart__title">Team Breakdown</p>

    <ul class="h-bars" aria-hidden="true">
      <li class="h-bar">
        <span class="h-bar__label">Design</span>
        <div class="h-bar__track">
          <div class="h-bar__fill" style="--h:78%;--i:0;--color:#ec4899">
            <span>78%</span>
          </div>
        </div>
      </li>
      <li class="h-bar">
        <span class="h-bar__label">Engineering</span>
        <div class="h-bar__track">
          <div class="h-bar__fill" style="--h:55%;--i:1;--color:#f43f5e">
            <span>55%</span>
          </div>
        </div>
      </li>
      <li class="h-bar">
        <span class="h-bar__label">Marketing</span>
        <div class="h-bar__track">
          <div class="h-bar__fill" style="--h:38%;--i:2;--color:#ec4899">
            <span>38%</span>
          </div>
        </div>
      </li>
    </ul>
  </figure>
</body>
</html>
