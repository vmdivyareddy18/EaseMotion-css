<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Filling Circular Button</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="liquid-title">
        <p class="eyebrow">Hover action</p>
        <h1 id="liquid-title">Liquid filling button</h1>
        <p class="intro">
          A circular action button with an organic liquid wave that rises on
          hover and focus.
        </p>

        <div class="button-row">
          <button class="ease-liquid-button" type="button">
            <span class="liquid-wave" aria-hidden="true"></span>
            <span class="liquid-label">Start</span>
          </button>

          <button class="ease-liquid-button ease-liquid-alt" type="button">
            <span class="liquid-wave" aria-hidden="true"></span>
            <span class="liquid-label">Sync</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
