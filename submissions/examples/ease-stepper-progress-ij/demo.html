<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stepper Progress | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sp-container">
    <h1>Stepper Progress</h1>
    <p class="sp-subtitle">Navigate through steps with animated transitions</p>
    <div class="sp-stepper" id="stepper">
      <div class="sp-step sp-active" data-step="1">
        <div class="sp-circle">1</div>
        <span class="sp-step-label">Cart</span>
      </div>
      <div class="sp-connector" data-connector="1"></div>
      <div class="sp-step" data-step="2">
        <div class="sp-circle">2</div>
        <span class="sp-step-label">Shipping</span>
      </div>
      <div class="sp-connector" data-connector="2"></div>
      <div class="sp-step" data-step="3">
        <div class="sp-circle">3</div>
        <span class="sp-step-label">Payment</span>
      </div>
      <div class="sp-connector" data-connector="3"></div>
      <div class="sp-step" data-step="4">
        <div class="sp-circle">4</div>
        <span class="sp-step-label">Confirm</span>
      </div>
    </div>
    <div class="sp-controls">
      <button id="prevBtn" class="sp-btn" disabled>Back</button>
      <span class="sp-status" id="statusText">Step 1 of 4</span>
      <button id="nextBtn" class="sp-btn sp-btn-primary">Next</button>
    </div>
  </div>
  <script>
    const steps = document.querySelectorAll('.sp-step');
    const connectors = document.querySelectorAll('.sp-connector');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const statusText = document.getElementById('statusText');
    let current = 1;
    const total = steps.length;

    function updateStepper() {
      steps.forEach((step, i) => {
        const num = i + 1;
        step.classList.toggle('sp-active', num === current);
        step.classList.toggle('sp-complete', num < current);
      });
      connectors.forEach((conn, i) => {
        const num = i + 1;
        conn.classList.toggle('sp-fill', num < current);
      });
      statusText.textContent = `Step ${current} of ${total}`;
      prevBtn.disabled = current === 1;
      nextBtn.disabled = current === total;
    }

    prevBtn.addEventListener('click', () => {
      if (current > 1) { current--; updateStepper(); }
    });

    nextBtn.addEventListener('click', () => {
      if (current < total) { current++; updateStepper(); }
    });
  </script>
</body>
</html>
