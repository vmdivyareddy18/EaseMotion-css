<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kanban WIP Limit Column Indicator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kanban-board">

    <div class="column">

        <div class="column-header">

            <h2>To Do</h2>

            <span class="wip normal">
                3 / 8
            </span>

        </div>

        <div class="task-card">
            Design landing page
        </div>

        <div class="task-card">
            Create onboarding flow
        </div>

        <div class="task-card">
            Review documentation
        </div>

    </div>

    <div class="column">

        <div class="column-header">

            <h2>In Progress</h2>

            <span class="wip warning">
                5 / 5
            </span>

        </div>

        <div class="task-card">
            API integration
        </div>

        <div class="task-card">
            Dashboard redesign
        </div>

        <div class="task-card">
            Mobile testing
        </div>

        <div class="task-card">
            Analytics setup
        </div>

        <div class="task-card">
            User feedback review
        </div>

    </div>

    <div class="column">

        <div class="column-header">

            <h2>Done</h2>

            <span class="wip success">
                12
            </span>

        </div>

        <div class="task-card">
            Authentication setup
        </div>

        <div class="task-card">
            Database migration
        </div>

    </div>

</div>

</body>
</html>
