<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chronicle News Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Premium Editorial Header Setup -->
  <header class="news-header-container">
    <div class="brand-masthead">
      <h1>THE CHRONICLE</h1>
      <span class="edition-tag">DIGITAL FEED // LIVE</span>
    </div>

    <!-- Pure CSS Interactive Skew Navigation Menu Bar -->
    <nav class="skew-nav-bar">
      <div class="skew-links-wrapper">
        <a href="#politics" class="skew-nav-item">
          <span class="unskew-text-node">POLITICS</span>
        </a>
        <a href="#tech" class="skew-nav-item active">
          <span class="unskew-text-node">TECHNOLOGY</span>
        </a>
        <a href="#business" class="skew-nav-item">
          <span class="unskew-text-node">BUSINESS</span>
        </a>
        <a href="#culture" class="skew-nav-item">
          <span class="unskew-text-node">CULTURE</span>
        </a>
        <a href="#science" class="skew-nav-item">
          <span class="unskew-text-node">SCIENCE</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="portal-main-view">
    <div class="headline-hero-placeholder"></div>
  </main>

</body>
</html>
