<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Wave Range Slider - Gaming Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gaming-viewport">
        <div class="slider-control-card">
            <div class="slider-header">
                <span class="control-label">AUDIO AUDIO BOOST</span>
                <span class="control-value">85%</span>
            </div>
            
            <div class="slider-field-wrapper">
                <input type="range" class="ripple-range-input" min="0" max="100" value="85" aria-label="Audio boost level">
                <div class="slider-ripple-deco">
                    <div class="ripple-ring wave-1"></div>
                    <div class="ripple-ring wave-2"></div>
                    <div class="ripple-ring wave-3"></div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
