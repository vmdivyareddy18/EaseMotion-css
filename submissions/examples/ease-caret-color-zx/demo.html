<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Caret Color Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Caret Color</h1>
    <p class="note">
      Sets the color of the text input cursor (caret) in editable elements.
    </p>

    <div class="label">caret-blue</div>
    <input class="demo-input caret-blue" placeholder="Type here..." />

    <div class="label">caret-green</div>
    <input class="demo-input caret-green" placeholder="Type here..." />

    <div class="label">caret-red</div>
    <input class="demo-input caret-red" placeholder="Type here..." />

    <div class="label">caret-auto (default)</div>
    <input class="demo-input caret-auto" placeholder="Type here..." />
  </body>
</html>
