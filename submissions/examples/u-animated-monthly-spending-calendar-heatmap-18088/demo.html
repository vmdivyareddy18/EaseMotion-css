      <div class="day-cell"></div>

      <div class="day-cell high"></div>
      <div class="day-cell"></div>

      <div class="day-cell medium"></div>
      <div class="day-cell active"></div>
      <div class="day-cell"></div>
      <div class="day-cell high"></div>
      <div class="day-cell"></div>

  </div>

</div>

</html>
