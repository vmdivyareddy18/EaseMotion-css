<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Slit Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="box">Closing Slit</div>
        <button onclick="document.querySelector('.box').classList.add('ease-slit-out');">Slit Out</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-slit-out');" style="border-color:#444;">Reset</button>
    </div>
</body>
</html>
