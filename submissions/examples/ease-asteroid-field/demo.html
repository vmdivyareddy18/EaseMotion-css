<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroid Field</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>☄️ Asteroid Field</h1>
        <p class="subtitle">Rotating asteroid belt with random rocks</p>

        <div class="asteroid-wrapper">
            <canvas id="asteroidCanvas"></canvas>

            <div class="controls">
                <button id="speedBtn">Speed: Normal</button>
                <button id="countBtn">Count: 40</button>
                <button id="colorBtn">Color: Gray</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">☄️ Asteroid field</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('asteroidCanvas');
        const ctx = canvas.getContext('2d');
        const speedBtn = document.getElementById('speedBtn');
        const countBtn = document.getElementById('countBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let asteroids = [];
        let stars = [];
        let numAsteroids = 40;
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let rotation = 0;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== COLOR OPTIONS =====
        const colorModes = [
            {
                name: 'Gray',
                colors: ['#888888', '#999999', '#aaaaaa', '#777777', '#666666']
            },
            {
                name: 'Brown',
                colors: ['#8B7355', '#9a8365', '#aa9375', '#baa385', '#6B5335']
            },
            {
                name: 'Red',
                colors: ['#cc3333', '#dd4444', '#cc5555', '#bb3333', '#aa2222']
            },
            {
                name: 'Blue',
                colors: ['#3355aa', '#4466bb', '#5577cc', '#3344aa', '#223399']
            },
            {
                name: 'Green',
                colors: ['#337755', '#448866', '#559977', '#336644', '#225533']
            },
            {
                name: 'Gold',
                colors: ['#d4a02a', '#c4901a', '#b4800a', '#a4700a', '#94600a']
            },
            {
                name: 'Rainbow',
                colors: ['#ff6b6b', '#ffd93d', '#6bcb77', '#4d96ff', '#9b59b6']
            },
            {
                name: 'Monochrome',
                colors: ['#555555', '#666666', '#777777', '#888888', '#999999']
            },
        ];

        // ===== STAR CLASS =====
        class Star {
            constructor() {
                const w = canvas.width;
                const h = canvas.height;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = 0.5 + Math.random() * 1.5;
                this.brightness = 0.3 + Math.random() * 0.7;
                this.twinkleSpeed = 0.01 + Math.random() * 0.03;
                this.phase = Math.random() * Math.PI * 2;
            }

            update() {
                this.phase += this.twinkleSpeed;
                this.brightness = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(this.phase));
            }

            draw(ctx) {
                ctx.globalAlpha = this.brightness;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 3;
                ctx.shadowColor = 'rgba(255,255,255,0.1)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        // ===== ASTEROID CLASS =====
        class Asteroid {
            constructor() {
                this.reset();
            }

            reset() {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const maxDim = Math.max(w, h);

                this.x = cx + (Math.random() - 0.5) * w * 1.2;
                this.y = cy + (Math.random() - 0.5) * h * 1.2;
                this.radius = 5 + Math.random() * 20;
                this.angle = Math.atan2(this.y - cy, this.x - cx);
                this.distance = Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
                this.speed = 0.001 + Math.random() * 0.004;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.phase = Math.random() * Math.PI * 2;
                this.wobble = 0.1 + Math.random() * 0.3;
                this.colorOffset = Math.floor(Math.random() * 5);
                this.points = [];
                this.generateShape();
                this.driftX = (Math.random() - 0.5) * 0.01;
                this.driftY = (Math.random() - 0.5) * 0.01;
                this.opacity = 0.6 + Math.random() * 0.4;
                this.glowIntensity = 0.1 + Math.random() * 0.3;
                this.shadowOffset = (Math.random() - 0.5) * 3;
            }

            generateShape() {
                this.points = [];
                const numPoints = 6 + Math.floor(Math.random() * 6);
                for (let i = 0; i < numPoints; i++) {
                    const angle = (i / numPoints) * Math.PI * 2;
                    const r = this.radius * (0.6 + 0.4 * Math.sin(angle * 2 + this.phase + Math.random() * 0.3));
                    this.points.push({
                        x: Math.cos(angle) * r,
                        y: Math.sin(angle) * r
                    });
                }
            }

            update(speed) {
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;

                this.angle += this.speed * speed * 20;
                this.rotation += this.rotSpeed * speed * 10;
                this.phase += 0.01 * speed * 10;

                // Orbit
                const dist = this.distance + Math.sin(this.phase * 0.5) * 5;
                this.x = cx + Math.cos(this.angle + rotation) * dist;
                this.y = cy + Math.sin(this.angle + rotation) * dist * 0.6;

                // Drift
                this.x += this.driftX * speed * 10;
                this.y += this.driftY * speed * 10;

                // Boundary wrap
                const margin = 50;
                if (this.x < -margin) this.x = w + margin;
                if (this.x > w + margin) this.x = -margin;
                if (this.y < -margin) this.y = h + margin;
                if (this.y > h + margin) this.y = -margin;

                // Recalculate distance for orbit
                this.distance = Math.sqrt((this.x - cx) ** 2 + (this.y - cy) ** 2);
            }

            draw(ctx) {
                const palette = colorModes[colorMode];
                const colors = palette.colors;
                const color = colors[this.colorOffset % colors.length];

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Shadow
                ctx.shadowBlur = 15 + this.glowIntensity * 20;
                ctx.shadowColor = color + '40';
                ctx.shadowOffsetX = this.shadowOffset;
                ctx.shadowOffsetY = this.shadowOffset * 0.5;

                // Main shape
                ctx.beginPath();
                for (let i = 0; i < this.points.length; i++) {
                    const p = this.points[i];
                    const wobble = 1 + 0.05 * Math.sin(this.phase + i);
                    const x = p.x * wobble;
                    const y = p.y * wobble;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();

                // Fill with gradient
                const grad = ctx.createRadialGradient(
                    -this.radius * 0.2,
                    -this.radius * 0.2,
                    0,
                    0,
                    0,
                    this.radius
                );
                grad.addColorStop(0, color);
                grad.addColorStop(0.5, color);
                grad.addColorStop(1, color + '80');

                ctx.fillStyle = grad;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Outline
                ctx.strokeStyle = color + '60';
                ctx.lineWidth = 0.5;
                ctx.globalAlpha = this.opacity * 0.3;
                ctx.stroke();

                // Highlight
                ctx.beginPath();
                ctx.ellipse(-this.radius * 0.1, -this.radius * 0.2, this.radius * 0.2, this.radius * 0.1, -0.5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.globalAlpha = this.opacity * 0.3;
                ctx.fill();

                // Crater details
                const numCraters = 1 + Math.floor(Math.random() * 3);
                for (let i = 0; i < numCraters; i++) {
                    const a = Math.random() * Math.PI * 2;
                    const d = this.radius * (0.2 + Math.random() * 0.3);
                    const cx2 = Math.cos(a) * d;
                    const cy2 = Math.sin(a) * d;
                    const cr = 1 + Math.random() * 3;
                    ctx.beginPath();
                    ctx.arc(cx2, cy2, cr, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.globalAlpha = this.opacity * 0.3;
                    ctx.fill();
                    ctx.globalAlpha = this.opacity;
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a0a1e');
            grad.addColorStop(0.3, '#060612');
            grad.addColorStop(0.6, '#030308');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (const star of stars) {
                star.draw(ctx);
            }

            // Nebula glow
            const nebulaColors = [
                'rgba(100, 50, 150, 0.02)',
                'rgba(50, 100, 200, 0.02)',
                'rgba(200, 100, 50, 0.01)'
            ];
            for (let i = 0; i < 3; i++) {
                const x = (i / 3) * w + Math.sin(i * 0.5 + time * 0.002) * 50;
                const y = (i * 0.7 + 0.2) * h + Math.cos(i * 0.3 + time * 0.003) * 30;
                const r = 100 + Math.sin(i + time * 0.001) * 30;
                const grad2 = ctx.createRadialGradient(x, y, 0, x, y, r);
                grad2.addColorStop(0, nebulaColors[i]);
                grad2.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = grad2;
                ctx.fillRect(0, 0, w, h);
            }

            // Asteroid belt glow (subtle ring)
            const cx = w / 2;
            const cy = h / 2;
            const ringRadius = Math.min(w, h) * 0.35;
            ctx.beginPath();
            ctx.ellipse(cx, cy, ringRadius, ringRadius * 0.5, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(100,100,150,0.02)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(100,100,150,0.03)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 10]);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        // ===== INIT ASTEROIDS =====
        function initAsteroids(count) {
            numAsteroids = count;
            asteroids = [];
            for (let i = 0; i < count; i++) {
                const a = new Asteroid();
                // Distribute in belt
                const w = canvas.width;
                const h = canvas.height;
                const cx = w / 2;
                const cy = h / 2;
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.min(w, h) * (0.2 + Math.random() * 0.3);
                a.x = cx + Math.cos(angle) * dist;
                a.y = cy + Math.sin(angle) * dist * 0.6;
                a.angle = angle;
                a.distance = dist;
                a.radius = 4 + Math.random() * 22;
                a.generateShape();
                asteroids.push(a);
            }
        }

        // ===== INIT STARS =====
        function initStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }
        initStars();

        // ===== RESET =====
        function resetAsteroids() {
            initAsteroids(numAsteroids);
            rotation = 0;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = '☄️ Asteroid field';
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            time += 0.01;
            rotation += speed * 0.002;

            // Update stars
            for (const star of stars) {
                star.update();
            }

            // Update asteroids
            for (const a of asteroids) {
                a.update(speed);
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw asteroids (sorted by distance for depth)
            asteroids.sort((a, b) => a.distance - b.distance);
            for (const a of asteroids) {
                a.draw(ctx);
            }

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `☄️ ${asteroids.length} asteroids • ${colorModes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = '☄️ Asteroid field';
            }, 1000);
        });

        // Count
        countBtn.addEventListener('click', () => {
            const counts = [20, 30, 40, 60, 80, 100];
            const currentIndex = counts.indexOf(numAsteroids);
            const nextIndex = (currentIndex + 1) % counts.length;
            const newCount = counts[nextIndex];
            countBtn.textContent = `Count: ${newCount}`;
            initAsteroids(newCount);
            statusText.textContent = `📐 ${newCount} asteroids`;
            setTimeout(() => {
                statusText.textContent = '☄️ Asteroid field';
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorModes.length;
            colorBtn.textContent = `Color: ${colorModes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorModes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = '☄️ Asteroid field';
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetAsteroids);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                countBtn.click();
            }
            if (e.key === 'p' || e.key === 'P') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                // Toggle pause not implemented
            }
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initStars();
            initAsteroids(numAsteroids);
        });

        // ===== INIT =====
        countBtn.textContent = `Count: ${numAsteroids}`;
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorModes[0].name}`;
        statusText.textContent = '☄️ Asteroid field';
        lastFpsUpdate = performance.now();

        initAsteroids(numAsteroids);

        // Start animation
        render(lastFpsUpdate);

        console.log('☄️ Asteroid Field loaded!');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change count');
        console.log('💡 P - Change color');
        console.log('💡 R - Reset');
    </script>
</body>
</html>
