        <span class="kqr-scanline" aria-hidden="true"></span>

      <p class="kqr-status ease-slide-up ease-delay-200">
        <span class="kqr-dot" aria-hidden="true"></span>

      <footer class="kqr-footer ease-slide-up ease-delay-300">
