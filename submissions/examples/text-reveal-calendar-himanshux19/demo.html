<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Reveal Calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calendar-card">
      <h2>🏃 Fitness Calendar</h2>
      <p>Your weekly workout schedule</p>
      <div class="calendar">
        <div class="day-name">Mon</div>
        <div class="day-name">Tue</div>
        <div class="day-name">Wed</div>
        <div class="day-name">Thu</div>
        <div class="day-name">Fri</div>
        <div class="day-name">Sat</div>
        <div class="day-name">Sun</div>
        <div class="day">
          <span>1</span>
          <small>Cardio</small>
        </div>
        <div class="day">
          <span>2</span>
          <small>Leg Day</small>
        </div>
        <div class="day">
          <span>3</span>
          <small>Yoga</small>
        </div>
        <div class="day">
          <span>4</span>
          <small>Run 5km</small>
        </div>
        <div class="day">
          <span>5</span>
          <small>HIIT</small>
        </div>
        <div class="day">
          <span>6</span>
          <small>Stretch</small>
        </div>
        <div class="day">
          <span>7</span>
          <small>Rest</small>
        </div>
      </div>
    </div>
  </body>
</html>
