<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Glitch Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #0f172a; /* Dark background is best for glitch effects */
      color: #f8fafc;
      gap: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .glitch-wrapper {
      font-size: 4rem;
      letter-spacing: 0.1em;
      margin: 2rem 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Text Glitch Animation</h1>
    <p>A cyberpunk-style animation where text momentarily distorts, splits colors, and stutters.</p>
    
    <div class="glitch-wrapper">
      <span class="ease-text-glitch" data-text="SYSTEM FAILURE">SYSTEM FAILURE</span>
    </div>
  </div>
</body>
</html>
