<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Order Confirmation Card</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="card">

    <div class="success-icon">
        <i class="fa-solid fa-circle-check"></i>
    </div>

    <h2>Order Confirmed!</h2>

    <p class="message">
        Thank you for your purchase. Your order has been placed successfully.
    </p>

    <div class="details">
        <div>
            <span>Order ID</span>
            <strong>#EM24561</strong>
        </div>

        <div>
            <span>Delivery</span>
            <strong>20 Jul 2026</strong>
        </div>

        <div>
            <span>Customer</span>
            <strong>Divya Reddy</strong>
        </div>

        <div>
            <span>Total</span>
            <strong>₹2,499</strong>
        </div>
    </div>

    <div class="buttons">
        <button class="track">Track Order</button>
        <button class="shop">Continue Shopping</button>
    </div>

</div>

</body>
</html>
