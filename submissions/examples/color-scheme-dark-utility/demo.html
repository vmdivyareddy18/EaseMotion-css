<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color-Scheme Dark Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #0f172a; padding: 60px 20px; margin: 0;">

  <div class="theme-preview-card ease-scheme-dark">
    <h5>Native Dark Element Rendering</h5>
    
    <p style="font-size: 0.95rem; line-height: 1.6; color: #cbd5e1; margin-top: 0;">By opting into <code>color-scheme: dark</code>, the browser is instructed to render all native user-agent controls—like scrollbars, select dropdowns, color pickers, and text inputs—using matching dark backgrounds natively.</p>
    
    <label style="font-size: 0.85rem; display:block; margin-bottom: 4px; color: #94a3b8;">Native Select Menu:</label>
    <select style="padding: 6px 10px; border-radius: 4px;">
      <option>System Controlled Option A</option>
      <option>System Controlled Option B</option>
    </select>

    <label style="font-size: 0.85rem; display:block; margin-bottom: 4px; color: #94a3b8;">Native Date Picker Input:</label>
    <input type="date" style="padding: 6px 10px; border-radius: 4px; border: 1px solid #475569;">
  </div>

</body>
</html>
