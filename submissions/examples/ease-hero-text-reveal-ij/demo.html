<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Text Reveal - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Hero Text Reveal</h1>
    <p class="desc">Large heading reveals with clip-path animation on load</p>
    <div class="htr-hero" id="htrHero">
      <h2 class="htr-heading" id="htrHeading">Reveal Yourself</h2>
      <p class="htr-sub">A smooth clip-path reveal for impactful hero sections</p>
    </div>
  </div>
  <script>
    window.addEventListener('load', function() {
      var heading = document.getElementById('htrHeading');
      heading.classList.add('htr-revealed');
    });
  </script>
</body>
</html>
