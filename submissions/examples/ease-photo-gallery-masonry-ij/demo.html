<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery Masonry - Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pgm-wrapper">
        <h1 class="pgm-title">Photo Gallery Masonry</h1>
        <p class="pgm-subtitle">Filter by category — click any image to expand</p>

        <div class="pgm-filters">
            <button class="pgm-filter-btn active" data-filter="all">All</button>
            <button class="pgm-filter-btn" data-filter="nature">Nature</button>
            <button class="pgm-filter-btn" data-filter="city">City</button>
            <button class="pgm-filter-btn" data-filter="abstract">Abstract</button>
        </div>

        <div class="pgm-grid" id="pgmGrid">
            <div class="pgm-item" data-category="nature" style="--pgm-row: 1;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #2d5016, #5b8c2a);">
                    <span class="pgm-label">Forest Canopy</span>
                </div>
            </div>
            <div class="pgm-item" data-category="city" style="--pgm-row: 2;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #1e3a5f, #4a7db5);">
                    <span class="pgm-label">Downtown Skyline</span>
                </div>
            </div>
            <div class="pgm-item" data-category="abstract" style="--pgm-row: 1;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #6d28d9, #a78bfa);">
                    <span class="pgm-label">Neon Waves</span>
                </div>
            </div>
            <div class="pgm-item" data-category="nature" style="--pgm-row: 2;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #065f46, #34d399);">
                    <span class="pgm-label">Mountain Lake</span>
                </div>
            </div>
            <div class="pgm-item" data-category="city" style="--pgm-row: 1;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #7c2d12, #c2410c);">
                    <span class="pgm-label">Sunset Bridge</span>
                </div>
            </div>
            <div class="pgm-item" data-category="abstract" style="--pgm-row: 2;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #831843, #f472b6);">
                    <span class="pgm-label">Geometric Flow</span>
                </div>
            </div>
            <div class="pgm-item" data-category="nature" style="--pgm-row: 1;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #164e63, #22d3ee);">
                    <span class="pgm-label">Coastal Tide</span>
                </div>
            </div>
            <div class="pgm-item" data-category="city" style="--pgm-row: 2;">
                <div class="pgm-card" style="background: linear-gradient(135deg, #451a03, #f59e0b);">
                    <span class="pgm-label">Night Lights</span>
                </div>
            </div>
        </div>
    </div>

    <div class="pgm-lightbox" id="pgmLightbox">
        <div class="pgm-lightbox-content">
            <span class="pgm-lightbox-close" id="pgmLightboxClose">&times;</span>
            <div class="pgm-lightbox-card" id="pgmLightboxCard"></div>
        </div>
    </div>

    <script>
        (function() {
            const grid = document.getElementById('pgmGrid');
            const items = grid.querySelectorAll('.pgm-item');
            const filterBtns = document.querySelectorAll('.pgm-filter-btn');
            const lightbox = document.getElementById('pgmLightbox');
            const lightboxCard = document.getElementById('pgmLightboxCard');
            const lightboxClose = document.getElementById('pgmLightboxClose');

            filterBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    const filter = this.dataset.filter;
                    items.forEach(item => {
                        const match = filter === 'all' || item.dataset.category === filter;
                        item.classList.toggle('pgm-hidden', !match);
                    });
                });
            });

            items.forEach(item => {
                item.addEventListener('click', function() {
                    const card = this.querySelector('.pgm-card');
                    const label = this.querySelector('.pgm-label');
                    lightboxCard.innerHTML = '';
                    const clone = card.cloneNode(true);
                    const labelClone = label.cloneNode(true);
                    lightboxCard.appendChild(clone);
                    lightboxCard.appendChild(labelClone);
                    lightbox.classList.add('pgm-lightbox--open');
                });
            });

            function closeLightbox() {
                lightbox.classList.remove('pgm-lightbox--open');
            }

            lightboxClose.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', function(e) {
                if (e.target === this) closeLightbox();
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') closeLightbox();
            });
        })();
    </script>
</body>
</html>
