<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Float Input - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Label Float Input</h1>
    <p class="desc">Label floats above on focus or when input has content</p>
    <div class="lfi-form">
      <div class="lfi-field">
        <input type="text" class="lfi-input" id="lfiName" placeholder=" " required>
        <label class="lfi-label" for="lfiName">Full Name</label>
      </div>
      <div class="lfi-field">
        <input type="email" class="lfi-input" id="lfiEmail" placeholder=" " required>
        <label class="lfi-label" for="lfiEmail">Email Address</label>
      </div>
      <div class="lfi-field">
        <input type="password" class="lfi-input" id="lfiPass" placeholder=" " required>
        <label class="lfi-label" for="lfiPass">Password</label>
      </div>
    </div>
  </div>
</body>
</html>
