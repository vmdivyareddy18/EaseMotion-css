<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Bar Clear Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <header class="demo-header">
      <h1>Search Bar with Clear Button</h1>
      <p class="demo-subtitle">
        A clean, accessible search input with a clear (×) button that appears
        only when text is entered.
      </p>
    </header>

    <!-- Light variant -->
    <section class="demo-section">
      <h2 class="demo-label">Default</h2>
      <div class="search-container-sou">
        <span class="search-icon-sou" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          type="text"
          class="search-input-sou"
          placeholder="Search docs..."
          aria-label="Search documentation"
        />
        <button
          type="button"
          class="clear-btn-sou"
          aria-label="Clear search input"
          onclick="clearSearchSou(this)"
        >
          &times;
        </button>
      </div>
    </section>

    <!-- Dark variant -->
    <section class="demo-section dark-section-sou">
      <h2 class="demo-label demo-label-light">Dark Theme</h2>
      <div class="search-container-sou search-dark-sou">
        <span class="search-icon-sou" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          type="text"
          class="search-input-sou"
          placeholder="Search anything..."
          aria-label="Search"
        />
        <button
          type="button"
          class="clear-btn-sou"
          aria-label="Clear search input"
          onclick="clearSearchSou(this)"
        >
          &times;
        </button>
      </div>
    </section>

    <!-- Rounded pill variant -->
    <section class="demo-section">
      <h2 class="demo-label">Rounded Pill</h2>
      <div class="search-container-sou search-pill-sou">
        <span class="search-icon-sou" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input
          type="text"
          class="search-input-sou"
          placeholder="Type to search..."
          aria-label="Search"
        />
        <button
          type="button"
          class="clear-btn-sou"
          aria-label="Clear search input"
          onclick="clearSearchSou(this)"
        >
          &times;
        </button>
      </div>
    </section>

    <footer class="demo-footer">
      <p>Type in any field above to see the clear (×) button appear.</p>
    </footer>
  </main>

  <script>
    // Minimal JS: clears the input and refocuses for smooth UX.
    function clearSearchSou(btn) {
      const input = btn.parentElement.querySelector(".search-input-sou");
      if (input) {
        input.value = "";
        input.focus();
      }
    }
  </script>
</body>
</html>
