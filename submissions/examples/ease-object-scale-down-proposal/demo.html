<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Object Scale Down Utility | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="scale-demo-page">
  <main class="scale-wrapper">
    <header class="scale-header">
      <h1 class="scale-title">Object Scale Down</h1>
      <p class="scale-subtitle">Utility class <code>.ease-object-scale-down</code> proposed for image alignment.</p>
    </header>

    <section class="scale-showcase">
      <!-- Image with standard object-contain -->
      <article class="scale-card">
        <h3>Standard <code>object-contain</code></h3>
        <p>If the container is larger than the image, it stretches to fit.</p>
        <div class="scale-container">
          <!-- A small image (e.g. 100x100 SVG) scaled up to 300x300 container -->
          <svg class="demo-img demo-object-contain" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#3b82f6"/>
            <text x="50" y="55" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">100px</text>
          </svg>
        </div>
      </article>

      <!-- Image with object-scale-down -->
      <article class="scale-card">
        <h3>Using <code>.ease-object-scale-down</code></h3>
        <p>It behaves like contain, but never scales <strong>up</strong> beyond its natural size.</p>
        <div class="scale-container">
          <svg class="demo-img ease-object-scale-down" width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="50" fill="#10b981"/>
            <text x="50" y="55" font-family="sans-serif" font-size="20" fill="white" text-anchor="middle">100px</text>
          </svg>
        </div>
      </article>
    </section>
    
  </main>
</body>
</html>
