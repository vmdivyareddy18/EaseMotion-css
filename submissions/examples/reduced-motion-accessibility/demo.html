<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduced Motion Accessibility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="motion-demo">

    <div class="motion-card">

      <h2>Animated Card</h2>

      <p>
        This card contains hover transitions and floating
        animation effects.
      </p>

      <a href="#" class="motion-btn">
        Hover Me
      </a>

    </div>

    <div class="motion-card motion-reduce">

      <h2>Reduced Motion</h2>

      <p>
        This example demonstrates reduced-motion accessibility
        behavior using prefers-reduced-motion support.
      </p>

      <a href="#" class="motion-btn motion-safe-hover">
        Accessible Interaction
      </a>

    </div>

  </div>

</body>
</html>
