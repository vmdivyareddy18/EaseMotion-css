<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wheel Prize — Spinning Prize Wheel</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <p class="title">Prize Wheel</p>
      <div class="wheel">
        <div class="wheel-marker"></div>
        <div class="wheel-inner">SPIN</div>
      </div>
      <button class="wheel-btn" id="spinWheel">Spin Again</button>
    </main>
    <script>
      document.getElementById('spinWheel').addEventListener('click', function() {
        const wheel = document.querySelector('.wheel');
        wheel.style.animation = 'none';
        void wheel.offsetHeight;
        wheel.style.animation = 'spin-wheel 4s cubic-bezier(0.22, 1, 0.36, 1)';
      });
    </script>
  </body>
</html>
