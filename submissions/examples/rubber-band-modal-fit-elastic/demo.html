<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Fitness Studio Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="fitness-stage">
    <!-- Pure CSS trigger mechanism via hidden checkbox controls -->
    <div class="modal-control-system">
      <input type="checkbox" id="modal-display-toggle" class="hidden-modal-checkbox">
      
      <label for="modal-display-toggle" class="open-workout-action" tabindex="0">
        Launch Daily Tracker
      </label>

      <!-- Overlay Backdrop Background Layer -->
      <div class="modal-overlay-blur">
        
        <!-- Modal Panel Container featuring rubber-band properties -->
        <div class="elastic-modal-card">
          <div class="fitness-icon-header">💪</div>
          
          <div class="modal-body-content">
            <h2>Workout Logged</h2>
            <p>Your high-intensity interval training block has been synchronized with the fitness dashboard.</p>
          </div>

          <label for="modal-display-toggle" class="close-modal-dismiss" tabindex="0">
            Continue Journey
          </label>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Keyboard listener implementing access mappings for label nodes
    document.querySelectorAll('.open-workout-action, .close-modal-dismiss').forEach(btn => {
      btn.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          document.getElementById(btn.getAttribute('for')).click();
        }
      });
    });
  </script>
</body>
</html>
