<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Neon Elastic Bounce Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="cyber-container">
        <div class="cyber-card">
            <div class="cyber-header">
                <div class="glitch-title" data-text="SYSTEM: ENG-01">SYSTEM: ENG-01</div>
                <div class="cyber-status-light"></div>
            </div>

            <p class="cyber-text">Hyper-drive core injection arrays running critical temperatures.</p>

            <div class="tooltip-wrapper">
                <button class="cyber-trigger-btn" aria-describedby="cyber-neon-tooltip">
                    <span>OVERRIDE CORE</span>
                </button>

                <div id="cyber-neon-tooltip" class="cyber-tooltip" role="tooltip">
                    <div class="tooltip-neon-border"></div>
                    <span class="tooltip-warning-tag">⚠️ CRITICAL AUTH</span>
                    <p class="tooltip-body">Bypasses standard reactor safe loops. Requires level 4 cryptographic key
                        clearance cards.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
