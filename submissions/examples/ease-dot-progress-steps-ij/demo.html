<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Progress Steps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Step Progress</h1>

  <div class="progress-container">
    <div class="progress-steps" id="progressSteps">
      <div class="step" data-step="1">
        <div class="dot">1</div>
        <span class="label">Start</span>
      </div>
      <div class="step" data-step="2">
        <div class="dot">2</div>
        <span class="label">Details</span>
      </div>
      <div class="step" data-step="3">
        <div class="dot">3</div>
        <span class="label">Review</span>
      </div>
      <div class="step" data-step="4">
        <div class="dot">4</div>
        <span class="label">Confirm</span>
      </div>
      <div class="step" data-step="5">
        <div class="dot">5</div>
        <span class="label">Done</span>
      </div>
    </div>
    <div class="progress-line" id="progressLine"></div>
  </div>

  <div class="controls">
    <button id="prevBtn" disabled>Previous</button>
    <span id="stepIndicator">Step 1 of 5</span>
    <button id="nextBtn">Next</button>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 5;
    const steps = document.querySelectorAll('.step');
    const progressLine = document.getElementById('progressLine');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const indicator = document.getElementById('stepIndicator');

    function updateSteps() {
      steps.forEach((step, i) => {
        const num = i + 1;
        step.classList.remove('active', 'completed');
        if (num < currentStep) step.classList.add('completed');
        if (num === currentStep) step.classList.add('active');
      });

      const pct = ((currentStep - 1) / (totalSteps - 1)) * 100;
      progressLine.style.setProperty('--fill', pct + '%');

      indicator.textContent = `Step ${currentStep} of ${totalSteps}`;
      prevBtn.disabled = currentStep === 1;
      nextBtn.disabled = currentStep === totalSteps;
    }

    prevBtn.addEventListener('click', () => {
      if (currentStep > 1) { currentStep--; updateSteps(); }
    });

    nextBtn.addEventListener('click', () => {
      if (currentStep < totalSteps) { currentStep++; updateSteps(); }
    });

    updateSteps();
  </script>
</body>
</html>
