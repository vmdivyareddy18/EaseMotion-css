<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Pulse Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
        }
        /* Demo Card Styling */
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .header-text {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .content-lines {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            color: #334155;
            font-size: 1.25rem;
        }
        
        /* Utility classes for sizing & shaping skeletons in the demo */
        .avatar-skeleton {
            width: 48px;
            height: 48px;
            border-radius: 50%;
        }
        .title-skeleton {
            width: 60%;
            height: 16px;
            border-radius: 4px;
        }
        .subtitle-skeleton {
            width: 40%;
            height: 14px;
            border-radius: 4px;
        }
        .line-skeleton {
            width: 100%;
            height: 14px;
            border-radius: 4px;
        }
        .line-skeleton.short {
            width: 80%;
        }
    </style>
</head>
<body>
    <!-- Card Skeleton Example -->
    <div class="card">
        <h2>Loading Profile...</h2>
        
        <!-- Avatar and Text Example -->
        <div class="header">
            <!-- Avatar skeleton -->
            <div class="ease-skeleton-pulse-dj avatar-skeleton"></div>
            
            <div class="header-text">
                <!-- Short text line skeleton -->
                <div class="ease-skeleton-pulse-dj title-skeleton"></div>
                <div class="ease-skeleton-pulse-dj subtitle-skeleton"></div>
            </div>
        </div>

        <!-- Multiple text lines Example -->
        <div class="content-lines">
            <div class="ease-skeleton-pulse-dj line-skeleton"></div>
            <div class="ease-skeleton-pulse-dj line-skeleton"></div>
            <div class="ease-skeleton-pulse-dj line-skeleton short"></div>
        </div>
    </div>
</body>
</html>
