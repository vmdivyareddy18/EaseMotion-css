<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-spotlight Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0a;
            font-family: system-ui, sans-serif;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            padding: 2rem;
        }

        h1 {
            font-size: 1.5rem;
            color: #f1f1f1;
        }

        p.hint {
            font-size: 0.85rem;
            color: #6c7086;
        }

        /* Hero spotlight section */
        .hero {
            width: 100%;
            max-width: 760px;
            background: #111122;
            border: 1px solid #1e1e2e;
            border-radius: 1.25rem;
            padding: 5rem 3rem;
            text-align: center;
            cursor: crosshair;
        }

        .hero h2 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 1rem;
        }

        .hero p {
            font-size: 1rem;
            color: #94a3b8;
            max-width: 480px;
            margin: 0 auto 1.5rem;
            line-height: 1.6;
        }

        .btn {
            background: #6c63ff;
            color: #fff;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }

        /* Card row demo */
        .row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 760px;
        }

        .card {
            flex: 1;
            min-width: 180px;
            background: #0f0f1a;
            border: 1px solid #1e1e2e;
            border-radius: 1rem;
            padding: 2rem 1.5rem;
            text-align: center;
            cursor: crosshair;
        }

        .card span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.75rem;
        }

        .card p {
            font-size: 0.85rem;
            color: #a6adc8;
        }

        /* Custom spotlight variants */
        .blue-light {
            --ease-spotlight-color: rgba(99, 179, 255, 0.1);
        }

        .purple-light {
            --ease-spotlight-color: rgba(167, 139, 250, 0.12);
        }

        .green-light {
            --ease-spotlight-color: rgba(34, 197, 94, 0.1);
        }
    </style>
</head>

<body>
    <h1>ease-spotlight Demo</h1>
    <p class="hint">Move your cursor over any dark section</p>

    <!-- Hero section -->
    <section class="hero ease-spotlight">
        <h2>Build something great.</h2>
        <p>A cursor spotlight that illuminates dark sections — pure CSS radial gradient, updated via JS CSS variables.
        </p>
        <button class="btn">Get Started</button>
    </section>

    <!-- Cards row -->
    <div class="row">
        <div class="card ease-spotlight blue-light">
            <span>🔵</span>
            <p>Blue spotlight</p>
        </div>
        <div class="card ease-spotlight purple-light">
            <span>💜</span>
            <p>Purple spotlight</p>
        </div>
        <div class="card ease-spotlight green-light">
            <span>🟢</span>
            <p>Green spotlight</p>
        </div>
    </div>

    <script>
        (function () {
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            if (prefersReduced) return;

            document.querySelectorAll('.ease-spotlight').forEach(function (el) {
                var curX = el.offsetWidth / 2;
                var curY = el.offsetHeight / 2;
                var tgtX = curX;
                var tgtY = curY;
                var active = false;

                el.addEventListener('mouseenter', function () {
                    active = true;
                });

                el.addEventListener('mousemove', function (e) {
                    var rect = el.getBoundingClientRect();
                    tgtX = e.clientX - rect.left;
                    tgtY = e.clientY - rect.top;
                });

                el.addEventListener('mouseleave', function () {
                    active = false;
                    tgtX = el.offsetWidth / 2;
                    tgtY = el.offsetHeight / 2;
                });

                function animate() {
                    /* lerp for smooth follow */
                    curX += (tgtX - curX) * 0.12;
                    curY += (tgtY - curY) * 0.12;
                    el.style.setProperty('--ease-cursor-x', curX + 'px');
                    el.style.setProperty('--ease-cursor-y', curY + 'px');
                    requestAnimationFrame(animate);
                }

                animate();
            });
        })();
    </script>
</body>

</html>
