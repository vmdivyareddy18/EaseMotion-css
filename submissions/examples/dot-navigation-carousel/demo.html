<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dot Navigation for Carousels</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; flex-direction: column; gap: 3rem; background: #f8fafc;">
    <div class="demo-section">
      <h3 class="demo-heading">Left Aligned</h3>
      <div class="dot-nav dot-nav-left">
        <button class="dot active" aria-label="Slide 1"></button>
        <button class="dot" aria-label="Slide 2"></button>
        <button class="dot" aria-label="Slide 3"></button>
        <button class="dot" aria-label="Slide 4"></button>
        <button class="dot" aria-label="Slide 5"></button>
      </div>
    </div>
    <div class="demo-section">
      <h3 class="demo-heading">Center Aligned</h3>
      <div class="dot-nav dot-nav-center">
        <button class="dot" aria-label="Slide 1"></button>
        <button class="dot active" aria-label="Slide 2"></button>
        <button class="dot" aria-label="Slide 3"></button>
        <button class="dot" aria-label="Slide 4"></button>
      </div>
    </div>
    <div class="demo-section">
      <h3 class="demo-heading">Right Aligned</h3>
      <div class="dot-nav dot-nav-right">
        <button class="dot" aria-label="Slide 1"></button>
        <button class="dot" aria-label="Slide 2"></button>
        <button class="dot active" aria-label="Slide 3"></button>
        <button class="dot" aria-label="Slide 4"></button>
        <button class="dot" aria-label="Slide 5"></button>
        <button class="dot" aria-label="Slide 6"></button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
