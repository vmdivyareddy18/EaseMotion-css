<!-- demo.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Molten Lava Flow – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h1>🌋 Molten Lava Flow</h1>
    <p class="subtitle">Glowing lava flowing down a surface</p>

    <div class="lava-container">
      <div class="lava-surface">
        <!-- Lava streams generated by JS -->
      </div>
      <div class="lava-glow"></div>
    </div>

    <div class="controls">
      <label>
        Flow Speed
        <input type="range" id="speedControl" min="0.5" max="3" step="0.1" value="1" />
      </label>
      <label>
        Intensity
        <input type="range" id="intensityControl" min="0.3" max="1.5" step="0.05" value="1" />
      </label>
      <button id="resetBtn">⟳ Reset Flow</button>
    </div>
  </div>

  <script>
    (function() {
      const container = document.querySelector('.lava-surface');
      const glow = document.querySelector('.lava-glow');
      const speedInput = document.getElementById('speedControl');
      const intensityInput = document.getElementById('intensityControl');
      const resetBtn = document.getElementById('resetBtn');

      const STREAM_COUNT = 12;
      const DROP_COUNT_PER_STREAM = 18;

      let streams = [];
      let animationFrame = null;
      let lastTimestamp = 0;
      let speedMultiplier = 1;
      let intensityMultiplier = 1;

      // ----- helpers -----
      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function randomInt(min, max) {
        return Math.floor(random(min, max + 1));
      }

      // ----- create a single drop -----
      function createDrop(streamIndex, offsetY) {
        const el = document.createElement('div');
        el.className = 'lava-drop';

        const size = random(6, 18);
        const hueShift = random(-8, 12);
        const brightness = random(70, 100);

        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.setProperty('--hue-shift', hueShift);
        el.style.setProperty('--drop-brightness', brightness + '%');
        el.style.setProperty('--drop-x', random(-6, 6) + 'px');

        // each drop gets a random delay so they don't all move in lockstep
        el.style.setProperty('--drop-delay', random(0, 0.8) + 's');
        // store base duration (will be multiplied by speed)
        el.dataset.baseDuration = random(1.8, 3.6);

        // vertical position: start above the container (negative offset)
        const startY = -20 - random(0, 40);
        el.style.top = startY + '%';

        // slight horizontal offset per stream
        const xOffset = (streamIndex / (STREAM_COUNT - 1)) * 100;
        el.style.left = xOffset + random(-2, 2) + '%';

        // random opacity variation
        el.style.opacity = random(0.65, 1);

        // store stream index so we can group them
        el.dataset.stream = streamIndex;

        return el;
      }

      // ----- build all streams -----
      function buildLava() {
        // clear existing drops
        container.innerHTML = '';

        streams = [];
        for (let i = 0; i < STREAM_COUNT; i++) {
          const streamDrops = [];
          for (let j = 0; j < DROP_COUNT_PER_STREAM; j++) {
            const drop = createDrop(i, j);
            container.appendChild(drop);
            streamDrops.push(drop);
          }
          streams.push(streamDrops);
        }

        // update glow intensity
        updateGlow();
        // apply current speed
        applySpeed();
      }

      // ----- update glow based on intensity -----
      function updateGlow() {
        const baseIntensity = 0.6;
        const intensity = baseIntensity * intensityMultiplier;
        glow.style.opacity = Math.min(intensity, 1.2);
        glow.style.transform = `scale(${0.9 + intensity * 0.1})`;

        // also adjust the container's background glow via a custom property
        const r = Math.round(180 + 60 * intensity);
        const g = Math.round(40 + 30 * intensity);
        const b = Math.round(10 + 15 * intensity);
        container.style.setProperty('--lava-bg', `radial-gradient(ellipse at center, rgba(${r},${g},${b},0.25) 0%, transparent 70%)`);
      }

      // ----- apply speed to all drops -----
      function applySpeed() {
        const allDrops = container.querySelectorAll('.lava-drop');
        allDrops.forEach(drop => {
          const base = parseFloat(drop.dataset.baseDuration) || 2.8;
          const newDuration = base / speedMultiplier;
          drop.style.setProperty('--drop-duration', newDuration + 's');
        });
      }

      // ----- reset animation with a slight stagger -----
      function resetFlow() {
        const allDrops = container.querySelectorAll('.lava-drop');
        allDrops.forEach((drop, idx) => {
          // force reflow by removing and re-adding the animation class
          drop.classList.remove('flowing');
          // small stagger based on index
          const delay = (idx % 10) * 0.03;
          drop.style.animationDelay = delay + 's';
          // trigger reflow
          void drop.offsetWidth;
          drop.classList.add('flowing');
        });
      }

      // ----- update speed from slider -----
      function updateSpeed(value) {
        speedMultiplier = parseFloat(value);
        applySpeed();
      }

      // ----- update intensity from slider -----
      function updateIntensity(value) {
        intensityMultiplier = parseFloat(value);
        updateGlow();
        // also adjust drop brightness slightly
        const allDrops = container.querySelectorAll('.lava-drop');
        allDrops.forEach(drop => {
          const baseBright = 75;
          const bright = Math.min(baseBright * intensityMultiplier, 120);
          drop.style.setProperty('--drop-brightness', bright + '%');
        });
      }

      // ----- animate extra flicker (optional continuous glow pulse) -----
      function animateGlowPulse(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const delta = (timestamp - lastTimestamp) / 1000;
        lastTimestamp = timestamp;

        // subtle pulse: sin wave modulates glow slightly
        const pulse = Math.sin(timestamp / 1800) * 0.04 + 0.96;
        const currentOpacity = parseFloat(glow.style.opacity) || 0.8;
        const targetOpacity = Math.min(0.6 * intensityMultiplier * pulse, 1.2);
        // smoothly interpolate to avoid jitter
        glow.style.opacity = currentOpacity * 0.9 + targetOpacity * 0.1;

        animationFrame = requestAnimationFrame(animateGlowPulse);
      }

      // ----- init -----
      function init() {
        buildLava();

        // start the pulse loop
        if (animationFrame) cancelAnimationFrame(animationFrame);
        lastTimestamp = 0;
        animationFrame = requestAnimationFrame(animateGlowPulse);

        // set initial speed and intensity
        updateSpeed(speedInput.value);
        updateIntensity(intensityInput.value);

        // add flowing class after a tiny delay to start animation
        setTimeout(() => {
          document.querySelectorAll('.lava-drop').forEach(el => el.classList.add('flowing'));
        }, 50);
      }

      // ----- event listeners -----
      speedInput.addEventListener('input', function() {
        updateSpeed(this.value);
      });

      intensityInput.addEventListener('input', function() {
        updateIntensity(this.value);
      });

      resetBtn.addEventListener('click', resetFlow);

      // handle resize: rebuild to keep proportions nice
      let resizeTimeout;
      window.addEventListener('resize', function() {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          // rebuild drops to fit new container size
          buildLava();
          setTimeout(() => {
            document.querySelectorAll('.lava-drop').forEach(el => el.classList.add('flowing'));
          }, 50);
          updateSpeed(speedInput.value);
          updateIntensity(intensityInput.value);
        }, 300);
      });

      // start
      init();

      // cleanup on page unload
      window.addEventListener('beforeunload', function() {
        if (animationFrame) cancelAnimationFrame(animationFrame);
      });
    })();
  </script>

</body>
</html>
