<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Music Player - EaseMotion CSS</title>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background gradient blobs for ambient effect -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <!-- Hidden checkbox to manage play/pause state -->
  <input type="checkbox" id="play-state" class="state-checkbox">


  <div class="container">
    <div class="player-card">
      
      <!-- Album art section with vinyl disc -->
      <div class="album-section">
        
        <!-- The vinyl record that spins when playing -->
        <div class="vinyl-disc">
          <div class="vinyl-grooves"></div>
          <div class="vinyl-sticker">
            <div class="vinyl-center-hole"></div>
          </div>
        </div>
        
        <!-- Album cover art with CSS gradient design -->
        <div class="cover-art">
          <div class="cover-design">
            <div class="gradient-circle circle-1"></div>
            <div class="gradient-circle circle-2"></div>
            <div class="gradient-circle circle-3"></div>
          </div>
          <div class="cover-overlay"></div>
        </div>
      </div>

      <!-- Animated equalizer bars -->
      <div class="equalizer" aria-hidden="true">
        <span class="eq-bar bar-1"></span>
        <span class="eq-bar bar-2"></span>
        <span class="eq-bar bar-3"></span>
        <span class="eq-bar bar-4"></span>
        <span class="eq-bar bar-5"></span>
        <span class="eq-bar bar-6"></span>
        <span class="eq-bar bar-7"></span>
      </div>


      <!-- Track information -->
      <div class="metadata">
        <h1 class="song-title">Hyperdrive Sunset</h1>
        <p class="artist-name">Aether Wave</p>
        <p class="album-title">Neon Horizon (2026)</p>
      </div>

      <!-- Progress bar section -->
      <div class="timeline-container">
        <div class="time-display">
          <span class="time-current">01:47</span>
          <span class="time-total">03:54</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" 
                 class="progress-bar" 
                 min="0" 
                 max="100" 
                 value="45" 
                 aria-label="Music track timeline position">
        </div>
      </div>

      <!-- Player controls -->
      <div class="controls">
        
        <!-- Previous button -->
        <button class="control-btn btn-secondary" 
                aria-label="Previous Track" 
                type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>

        <!-- Play/Pause button (uses label to trigger checkbox) -->
        <label for="play-state" 
               class="play-pause-trigger" 
               tabindex="0" 
               role="button" 
               aria-pressed="false" 
               aria-label="Play / Pause">
          
          <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          
          <svg class="icon-pause" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </label>

        <!-- Next button -->
        <button class="control-btn btn-secondary" 
                aria-label="Next Track" 
                type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6z"/>
          </svg>
        </button>
      </div>

      <!-- Footer badges -->
      <div class="player-footer">
        <span class="badge">Pure CSS</span>
        <span class="badge">96.8 kbps</span>
      </div>

    </div>
  </div>


  <script>
    // Keyboard accessibility - allow space/enter to trigger play/pause
    const playPauseLabel = document.querySelector('.play-pause-trigger');
    const playStateCheckbox = document.getElementById('play-state');
    
    playPauseLabel.addEventListener('keydown', function(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        playStateCheckbox.click();
      }
    });
    
    // Update ARIA attribute for screen readers
    playStateCheckbox.addEventListener('change', function() {
      playPauseLabel.setAttribute('aria-pressed', this.checked);
    });
  </script>

</body>
</html>
