<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide-In Bottom - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-slide-in-bottom" id="toastNotificationCard">
    <span style="font-size: 2rem; display: block; margin-bottom: 0.5rem;">📥</span>
    <h3 style="margin: 0; font-size: 1.2rem; font-weight: 700;">Directional Entrance</h3>
    <p style="margin: 8px 0 0 0; font-size: 0.88rem; color: #94a3b8; line-height: 1.5;">
      Slides up from exactly 30px below while smoothly executing an opacity fade ramp.
    </p>
  </div>

  <button class="replay-action-btn" id="btnRerunAction">Trigger Replay Entry</button>

  <script>
    const card = document.getElementById('toastNotificationCard');
    const button = document.getElementById('btnRerunAction');

    button.addEventListener('click', () => {
      // Discharges running properties to reset the compositor framework cleanly
      card.style.animation = 'none';
      card.offsetHeight; /* Force element reflow check to capture structural updates */
      card.style.animation = 'slide-in-bottom-keyframes 0.4s cubic-bezier(0.16, 1, 0.3, 1) both';
    });
  </script>

</body>
</html>
