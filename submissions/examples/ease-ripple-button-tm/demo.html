<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Button Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="page-header">
      <h1 class="page-title">Ripple Button</h1>
      <p class="page-subtitle">
        A button component that emits a radial ripple wave on click,
        built entirely in CSS using the <code>::after</code> pseudo-element
        and EaseMotion design tokens for timing and color.
      </p>
    </header>

    <!-- Color Variants -->
    <section>
      <p class="section-label">Color Variants</p>
      <div class="button-group">
        <button class="ripple-btn ripple-btn-primary" type="button">Primary</button>
        <button class="ripple-btn ripple-btn-secondary" type="button">Secondary</button>
        <button class="ripple-btn ripple-btn-success" type="button">Success</button>
        <button class="ripple-btn ripple-btn-danger" type="button">Danger</button>
        <button class="ripple-btn ripple-btn-warning" type="button">Warning</button>
        <button class="ripple-btn ripple-btn-info" type="button">Info</button>
      </div>
    </section>

    <hr class="divider">

    <!-- Outline & Ghost -->
    <section>
      <p class="section-label">Outline &amp; Ghost Variants</p>
      <div class="button-group">
        <button class="ripple-btn ripple-btn-outline" type="button">Outline</button>
        <button class="ripple-btn ripple-btn-ghost" type="button">Ghost</button>
        <button class="ripple-btn ripple-btn-outline ripple-btn-sm" type="button">Outline Small</button>
        <button class="ripple-btn ripple-btn-ghost ripple-btn-lg" type="button">Ghost Large</button>
      </div>
    </section>

    <hr class="divider">

    <!-- Sizes -->
    <section>
      <p class="section-label">Sizes</p>
      <div class="button-group">
        <button class="ripple-btn ripple-btn-sm" type="button">Small</button>
        <button class="ripple-btn" type="button">Medium (Default)</button>
        <button class="ripple-btn ripple-btn-lg" type="button">Large</button>
      </div>
    </section>

    <hr class="divider">

    <!-- States -->
    <section>
      <p class="section-label">States</p>
      <div class="button-group">
        <button class="ripple-btn" type="button">Enabled</button>
        <button class="ripple-btn" type="button" disabled>Disabled</button>
        <button class="ripple-btn ripple-btn-primary ripple-btn-full" type="button">Full Width</button>
      </div>
    </section>

  </div>

  <script>
    // Attach ripple effect to every button with class "ripple-btn"
    document.querySelectorAll('.ripple-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        // Remove any existing ripple state
        btn.classList.remove('is-rippling');
        // Force reflow so the re-add triggers the transition
        void btn.offsetWidth;
        // Add ripple class to trigger CSS animation
        btn.classList.add('is-rippling');
        // Remove after animation completes
        setTimeout(function() {
          btn.classList.remove('is-rippling');
        }, 700);
      });
    });
  </script>

</body>
</html>
