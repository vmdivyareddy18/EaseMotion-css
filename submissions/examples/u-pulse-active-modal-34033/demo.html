<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pulse Active Modal</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Responsive Dashboard

</span>

<h1>

Pulse Active Modal

</h1>

<p>

An elegant dashboard modal
with pulse animation effects
crafted for modern analytics,
reporting and monitoring systems.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Dashboard

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

📈

</div>

<h2>

Dashboard Insights

</h2>

<p>

Track KPIs, analytics and
performance metrics through
a smooth pulse interaction
designed for responsive UIs.

</p>

<button>

Explore Metrics

</button>

</div>

</div>

</div>

</section>

</body>

</html>
