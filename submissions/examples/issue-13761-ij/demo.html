<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-wifi-pulse – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>WiFi Pulse</h1>
    <p class="subtitle">A WiFi icon with concentric arcs that pulse outward.</p>
    <div class="wifi-wrapper">
      <span class="wifi-icon" id="wifiIcon">📶</span>
      <div class="wifi-arcs">
        <span class="wifi-arc"></span>
        <span class="wifi-arc"></span>
        <span class="wifi-arc"></span>
      </div>
    </div>
    <p class="wifi-status" id="wifiStatus">Signal inactive</p>
    <button id="toggleBtn">Activate Signal</button>
  </div>

  <script>
    const icon = document.getElementById('wifiIcon');
    const status = document.getElementById('wifiStatus');
    const toggleBtn = document.getElementById('toggleBtn');
    let active = false;

    toggleBtn.addEventListener('click', () => {
      active = !active;
      icon.classList.toggle('active', active);
      status.textContent = active ? 'Signal active' : 'Signal inactive';
      toggleBtn.textContent = active ? 'Deactivate' : 'Activate Signal';
    });
  </script>
</body>
</html>
