<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-border-color Utilities Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        min-height: 100vh;
        background: #f8fafc;
        padding: 2rem;
      }
      h2 {
        color: #7c3aed;
      }
      .grid {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .box {
        padding: 1.5rem 2rem;
        border: 2px solid;
        border-radius: 8px;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 600;
        background: #fff;
        min-width: 160px;
      }
    </style>
  </head>
  <body>
    <h2>ease-border-color Utilities</h2>
    <p>Each box combines <code>ease-border</code> with a color variant</p>

    <div class="grid">
      <div class="box ease-border ease-border-primary">Primary</div>
      <div class="box ease-border ease-border-success">Success</div>
      <div class="box ease-border ease-border-danger">Danger</div>
      <div class="box ease-border ease-border-warning">Warning</div>
      <div class="box ease-border ease-border-info">Info</div>
      <div class="box ease-border ease-border-secondary">Secondary</div>
    </div>
  </body>
</html>
