<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Typing Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="chat-message received">
      <div class="message-content">Hey, how are you?</div>
    </div>
    <div class="chat-message sent">
      <div class="message-content">I'm good! How about you?</div>
    </div>
    <div class="chat-message received">
      <div class="message-content">Doing great! Did you finish the project?</div>
    </div>
    <div class="typing-indicator">
      <div class="typing-dot" style="animation-delay: 0s"></div>
      <div class="typing-dot" style="animation-delay: 0.15s"></div>
      <div class="typing-dot" style="animation-delay: 0.3s"></div>
    </div>
  </div>
</body>
</html>
