<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Loading State</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Button Loading State</h1>
    <p class="subtitle">Click a button to simulate an async action — text changes to a spinner, then resolves to "Done".</p>

    <div class="demo-grid">
      <button class="btn-loading" data-duration="1500">Submit</button>
      <button class="btn-loading" data-duration="2500">Save Changes</button>
      <button class="btn-loading" data-duration="2000">Process Payment</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.btn-loading').forEach(btn => {
      btn.addEventListener('click', function() {
        if (this.classList.contains('is-loading') || this.classList.contains('is-done')) return;

        const original = this.textContent;
        const duration = parseInt(this.dataset.duration) || 1500;

        this.classList.add('is-loading');
        this.textContent = '';

        setTimeout(() => {
          this.classList.remove('is-loading');
          this.classList.add('is-done');
          this.textContent = 'Done ✓';

          setTimeout(() => {
            this.classList.remove('is-done');
            this.textContent = original;
          }, 1200);
        }, duration);
      });
    });
  </script>
</body>
</html>
