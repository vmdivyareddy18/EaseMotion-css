<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Accordion</h2>
    <div class="accordion">
      <details class="accordion-item" open>
        <summary>HTML</summary>
        <p class="accordion-content">HyperText Markup Language is the standard markup language for web pages.</p>
      </details>
      <details class="accordion-item">
        <summary>CSS</summary>
        <p class="accordion-content">Cascading Style Sheets describe the presentation of a document written in HTML.</p>
      </details>
      <details class="accordion-item">
        <summary>JS</summary>
        <p class="accordion-content">JavaScript is a programming language that enables interactive web pages.</p>
      </details>
    </div>
  </div>
</body>
</html>
