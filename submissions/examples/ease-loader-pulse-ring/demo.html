<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-loader-pulse-ring Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 3rem;
      background: #f8fafc;
      font-family: sans-serif;
    }
    h2 { color: #1e293b; }
    .variant-sm { --ease-loader-size: 24px; }
    .variant-lg { --ease-loader-size: 72px; }
    .variant-red { --ease-loader-color: #ef4444; }
    .variant-green { --ease-loader-color: #22c55e; }
  </style>
</head>
<body>
  <h2>ease-loader-pulse-ring</h2>
  <div class="ease-loader-pulse-ring"></div>
  <div class="ease-loader-pulse-ring variant-sm"></div>
  <div class="ease-loader-pulse-ring variant-lg"></div>
  <div class="ease-loader-pulse-ring variant-red"></div>
  <div class="ease-loader-pulse-ring variant-green"></div>
</body>
</html>
