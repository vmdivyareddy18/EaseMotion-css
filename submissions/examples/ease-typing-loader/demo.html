<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Loader Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Typing Loader</h1>
        <p class="subtitle">Text appears letter by letter with cursor</p>

        <!-- TYPING LOADER COMPONENT -->
        <div class="typing-container">
            <div class="typing-wrapper">
                <div class="typing-display">
                    <div class="typing-loader" id="typingLoader">
                        <span class="typing-text" id="typingText"></span>
                        <span class="typing-cursor" id="typingCursor">|</span>
                    </div>
                    <div class="typing-sub" id="typingSub"></div>
                </div>

                <!-- Controls -->
                <div class="typing-controls">
                    <div class="control-group">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="4" step="0.1" value="1" />
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="control-group">
                        <label for="textSelect">Phrase:</label>
                        <select id="textSelect">
                            <option value="0">Loading...</option>
                            <option value="1">Initializing system...</option>
                            <option value="2">Fetching data...</option>
                            <option value="3">Processing request...</option>
                            <option value="4">Almost there...</option>
                            <option value="5">Custom text</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label for="colorPicker">Color:</label>
                        <input type="color" id="colorPicker" value="#4facfe" />
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="loopToggle" checked />
                            Loop
                        </label>
                    </div>
                </div>

                <div class="typing-actions">
                    <button class="typing-ctrl-btn" id="playBtn">⏸ Pause</button>
                    <button class="typing-ctrl-btn" id="resetBtn">⟳ Reset</button>
                    <button class="typing-ctrl-btn" id="skipBtn">⏭ Skip</button>
                    <button class="typing-ctrl-btn" id="randomBtn">🎲 Random</button>
                </div>

                <div class="typing-status">
                    <span class="status-label">Status:</span>
                    <span class="status-value" id="statusDisplay">Typing</span>
                    <span class="status-label">Progress:</span>
                    <span class="status-value" id="progressDisplay">0%</span>
                    <span class="status-label">Chars:</span>
                    <span class="status-value" id="charDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-typing">
                        <span class="typing-text">Loading...</span>
                        <span class="typing-cursor">|</span>
                    </div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-typing">
                        <span class="typing-text" style="color: #34c759;">Hello World</span>
                        <span class="typing-cursor" style="color: #34c759;">|</span>
                    </div>
                    <span class="variant-label">Green</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-typing">
                        <span class="typing-text" style="color: #ff3b30;">Error...</span>
                        <span class="typing-cursor" style="color: #ff3b30;">|</span>
                    </div>
                    <span class="variant-label">Danger</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-typing">
                        <span class="typing-text" style="color: #f59e0b;">Warning...</span>
                        <span class="typing-cursor" style="color: #f59e0b;">|</span>
                    </div>
                    <span class="variant-label">Warning</span>
                </div>
                <div class="variant-card" id="variant5">
                    <div class="variant-typing">
                        <span class="typing-text" style="color: #6c5ce7;">Processing...</span>
                        <span class="typing-cursor" style="color: #6c5ce7;">|</span>
                    </div>
                    <span class="variant-label">Purple</span>
                </div>
                <div class="variant-card" id="variant6">
                    <div class="variant-typing">
                        <span class="typing-text" style="color: #fd79a8;">Hello...</span>
                        <span class="typing-cursor" style="color: #fd79a8;">|</span>
                    </div>
                    <span class="variant-label">Pink</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const typingText = document.getElementById('typingText');
            const typingCursor = document.getElementById('typingCursor');
            const typingSub = document.getElementById('typingSub');
            const statusDisplay = document.getElementById('statusDisplay');
            const progressDisplay = document.getElementById('progressDisplay');
            const charDisplay = document.getElementById('charDisplay');
            const speedSlider = document.getElementById('speedSlider');
            const textSelect = document.getElementById('textSelect');
            const colorPicker = document.getElementById('colorPicker');
            const speedValue = document.getElementById('speedValue');
            const loopToggle = document.getElementById('loopToggle');
            const playBtn = document.getElementById('playBtn');
            const resetBtn = document.getElementById('resetBtn');
            const skipBtn = document.getElementById('skipBtn');
            const randomBtn = document.getElementById('randomBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                phrases: [
                    'Loading...',
                    'Initializing system...',
                    'Fetching data...',
                    'Processing request...',
                    'Almost there...',
                    'Welcome back!',
                    'Preparing your experience...',
                    'Connecting to server...',
                    'Loading assets...',
                    'Almost ready...'
                ],
                typingSpeed: 80, // ms per character
                pauseBetween: 1500, // ms pause between phrases
                color: '#4facfe',
                loop: true,
                onComplete: function(phrase) {
                    console.log(`✅ Typing complete: "${phrase}"`);
                },
                onChar: function(char, index) {
                    console.log(`⌨️ Typed: "${char}" (${index})`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentPhrase = '';
            let currentIndex = 0;
            let isTyping = false;
            let isPaused = false;
            let isComplete = false;
            let timerId = null;
            let timeoutId = null;

            // ============================================
            // TYPING ENGINE
            // ============================================
            function typeChar() {
                if (isPaused) return;

                if (currentIndex < currentPhrase.length) {
                    const char = currentPhrase[currentIndex];
                    typingText.textContent += char;
                    currentIndex++;
                    
                    // Update progress
                    const progress = (currentIndex / currentPhrase.length) * 100;
                    progressDisplay.textContent = Math.round(progress) + '%';
                    charDisplay.textContent = currentIndex;
                    
                    CONFIG.onChar(char, currentIndex);
                    
                    // Schedule next character
                    const speed = parseFloat(speedSlider.value);
                    const delay = CONFIG.typingSpeed / speed;
                    timerId = setTimeout(typeChar, delay);
                } else {
                    // Complete
                    isTyping = false;
                    isComplete = true;
                    statusDisplay.textContent = 'Complete';
                    statusDisplay.style.color = '#34c759';
                    progressDisplay.textContent = '100%';
                    CONFIG.onComplete(currentPhrase);
                    
                    // Show sub text
                    typingSub.textContent = '✓ ' + currentPhrase;
                    typingSub.style.color = '#34c759';
                    
                    // Pause before restarting
                    if (CONFIG.loop) {
                        timeoutId = setTimeout(() => {
                            resetTyping();
                            setTimeout(startTyping, 300);
                        }, CONFIG.pauseBetween);
                    }
                }
            }

            function startTyping() {
                if (isTyping) return;
                
                isTyping = true;
                isPaused = false;
                isComplete = false;
                statusDisplay.textContent = 'Typing';
                statusDisplay.style.color = '#4facfe';
                playBtn.textContent = '⏸ Pause';
                typingSub.textContent = '';
                
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
                
                typeChar();
            }

            function pauseTyping() {
                if (!isTyping || isPaused) return;
                isPaused = true;
                statusDisplay.textContent = 'Paused';
                statusDisplay.style.color = '#f59e0b';
                playBtn.textContent = '▶ Play';
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }
            }

            function resumeTyping() {
                if (!isPaused) return;
                isPaused = false;
                statusDisplay.textContent = 'Typing';
                statusDisplay.style.color = '#4facfe';
                playBtn.textContent = '⏸ Pause';
                typeChar();
            }

            function togglePlay() {
                if (isPaused) {
                    resumeTyping();
                } else if (isTyping) {
                    pauseTyping();
                } else {
                    resetTyping();
                    setTimeout(startTyping, 200);
                }
            }

            function resetTyping() {
                isTyping = false;
                isPaused = false;
                isComplete = false;
                currentIndex = 0;
                typingText.textContent = '';
                typingSub.textContent = '';
                statusDisplay.textContent = 'Ready';
                statusDisplay.style.color = '#6b7280';
                progressDisplay.textContent = '0%';
                charDisplay.textContent = '0';
                playBtn.textContent = '▶ Play';
                
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
            }

            function skipTyping() {
                if (!isTyping || isComplete) return;
                
                // Complete instantly
                if (timerId) {
                    clearTimeout(timerId);
                    timerId = null;
                }
                isPaused = false;
                typingText.textContent = currentPhrase;
                currentIndex = currentPhrase.length;
                isTyping = false;
                isComplete = true;
                statusDisplay.textContent = 'Complete';
                statusDisplay.style.color = '#34c759';
                progressDisplay.textContent = '100%';
                charDisplay.textContent = currentPhrase.length;
                typingSub.textContent = '✓ ' + currentPhrase;
                typingSub.style.color = '#34c759';
                CONFIG.onComplete(currentPhrase);
                playBtn.textContent = '▶ Play';
            }

            function setPhrase(phrase) {
                currentPhrase = phrase;
                resetTyping();
                if (CONFIG.loop) {
                    setTimeout(startTyping, 300);
                }
            }

            function getRandomPhrase() {
                const phrases = CONFIG.phrases;
                return phrases[Math.floor(Math.random() * phrases.length)];
            }

            function setRandomPhrase() {
                const phrase = getRandomPhrase();
                // Update select if custom
                const select = textSelect;
                const customOption = select.options[select.options.length - 1];
                if (customOption.value === '5') {
                    // If custom text is selected, update the value
                    customOption.text = phrase;
                }
                setPhrase(phrase);
            }

            function updateColor() {
                const color = colorPicker.value;
                CONFIG.color = color;
                typingCursor.style.color = color;
                typingText.style.color = color;
            }

            function updateSpeed() {
                const speed = parseFloat(speedSlider.value);
                speedValue.textContent = speed.toFixed(1) + 'x';
                CONFIG.typingSpeed = 80 / speed;
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            speedSlider.addEventListener('input', updateSpeed);

            textSelect.addEventListener('change', function() {
                const value = this.value;
                if (value === '5') {
                    // Custom text
                    const custom = prompt('Enter custom text:', 'Custom loading message...');
                    if (custom && custom.trim()) {
                        const option = this.options[this.options.length - 1];
                        option.text = custom;
                        setPhrase(custom);
                    } else {
                        this.value = '0';
                        setPhrase(CONFIG.phrases[0]);
                    }
                } else {
                    const phrase = CONFIG.phrases[parseInt(value)];
                    setPhrase(phrase);
                }
            });

            colorPicker.addEventListener('input', updateColor);

            loopToggle.addEventListener('change', function() {
                CONFIG.loop = this.checked;
                if (!this.checked && isComplete) {
                    // Stop looping
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                        timeoutId = null;
                    }
                }
            });

            playBtn.addEventListener('click', togglePlay);
            resetBtn.addEventListener('click', resetTyping);
            skipBtn.addEventListener('click', skipTyping);
            randomBtn.addEventListener('click', setRandomPhrase);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetTyping();
                }
                if (e.key === 's' || e.key === 'S') {
                    skipTyping();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const typing = card.querySelector('.variant-typing');
                const text = typing.querySelector('.typing-text');
                const cursor = typing.querySelector('.typing-cursor');
                const color = text.style.color || '#4facfe';
                
                // Animate variant typing
                const fullText = text.textContent;
                let index = 0;
                let isPlaying = false;
                
                function typeVariant() {
                    if (index <= fullText.length) {
                        text.textContent = fullText.substring(0, index);
                        index++;
                        setTimeout(typeVariant, 60 + Math.random() * 40);
                    } else {
                        // Reset after pause
                        setTimeout(() => {
                            index = 0;
                            typeVariant();
                        }, 2000);
                    }
                }
                
                card.addEventListener('click', function() {
                    colorPicker.value = color;
                    CONFIG.color = color;
                    typingText.style.color = color;
                    typingCursor.style.color = color;
                    statusDisplay.textContent = '🎨 ' + card.querySelector('.variant-label').textContent;
                    setTimeout(() => {
                        statusDisplay.textContent = isTyping ? (isPaused ? 'Paused' : 'Typing') : 'Ready';
                    }, 1500);
                });
                
                // Start typing animation
                setTimeout(typeVariant, 300);
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.TypingLoader = {
                start: startTyping,
                pause: pauseTyping,
                resume: resumeTyping,
                toggle: togglePlay,
                reset: resetTyping,
                skip: skipTyping,
                setPhrase: setPhrase,
                setRandom: setRandomPhrase,
                setSpeed: (speed) => {
                    speedSlider.value = speed;
                    updateSpeed();
                },
                setColor: (color) => {
                    colorPicker.value = color;
                    updateColor();
                },
                setLoop: (loop) => {
                    loopToggle.checked = loop;
                    CONFIG.loop = loop;
                },
                isTyping: () => isTyping,
                isPaused: () => isPaused,
                isComplete: () => isComplete,
                getState: () => ({
                    phrase: currentPhrase,
                    progress: currentIndex / currentPhrase.length * 100,
                    chars: currentIndex,
                    isTyping,
                    isPaused,
                    isComplete,
                    speed: CONFIG.typingSpeed,
                    color: CONFIG.color,
                    loop: CONFIG.loop
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        colorPicker.value = config.color;
                        updateColor();
                    }
                    if (config.phrases) {
                        // Update select options
                        // ...
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            currentPhrase = CONFIG.phrases[0];
            typingText.textContent = '';
            updateSpeed();
            updateColor();
            statusDisplay.textContent = 'Ready';
            progressDisplay.textContent = '0%';
            charDisplay.textContent = '0';
            playBtn.textContent = '▶ Play';

            // Auto-start
            setTimeout(startTyping, 500);

            console.log('⌨️ Typing Loader initialized!');
            console.log('📖 API: window.TypingLoader');
            console.log('📖 Usage:');
            console.log('  - Watch text appear letter by letter');
            console.log('  - Keyboard shortcuts: Space (toggle), R (reset), S (skip)');
            console.log('  - Adjust speed, color, and phrase');

        })();
    </script>
</body>
</html>
