<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Orbit - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="orbit-container entrance-anim">
        <div class="center-hub glow-pulse">
            <h2>Choose Your<br>Motion</h2>
        </div>
        
        <div class="orbit-ring">
            <!-- Explorer Node -->
            <div class="orbit-wrapper orbit-1">
                <div class="pricing-node">
                    <div class="float-wrapper float-anim">
                        <div class="rotating-border"></div>
                        <div class="node-content">
                            <div class="node-front">
                                <h3>Explorer</h3>
                                <div class="price">$19<span class="mo">/mo</span></div>
                            </div>
                            <div class="node-expanded">
                                <h3>Explorer</h3>
                                <div class="price">$19<span class="mo">/mo</span></div>
                                <ul class="features">
                                    <li>Personal projects</li>
                                    <li>Community support</li>
                                </ul>
                                <button class="cta-btn">Select</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Creator Node -->
            <div class="orbit-wrapper orbit-2">
                <div class="pricing-node">
                    <div class="float-wrapper float-anim" style="animation-delay: -1s;">
                        <div class="rotating-border"></div>
                        <div class="node-content">
                            <div class="node-front">
                                <h3>Creator</h3>
                                <div class="price">$59<span class="mo">/mo</span></div>
                            </div>
                            <div class="node-expanded">
                                <h3>Creator</h3>
                                <div class="price">$59<span class="mo">/mo</span></div>
                                <ul class="features">
                                    <li>Unlimited projects</li>
                                    <li>Priority support</li>
                                </ul>
                                <button class="cta-btn active">Select</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Infinity Node -->
            <div class="orbit-wrapper orbit-3">
                <div class="pricing-node">
                    <div class="float-wrapper float-anim" style="animation-delay: -2s;">
                        <div class="rotating-border"></div>
                        <div class="node-content">
                            <div class="node-front">
                                <h3>Infinity</h3>
                                <div class="price">$129<span class="mo">/mo</span></div>
                            </div>
                            <div class="node-expanded">
                                <h3>Infinity</h3>
                                <div class="price">$129<span class="mo">/mo</span></div>
                                <ul class="features">
                                    <li>Team collaboration</li>
                                    <li>Enterprise features</li>
                                </ul>
                                <button class="cta-btn">Select</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Generate floating particles for background
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 60; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.animationDuration = (Math.random() * 5 + 3) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
