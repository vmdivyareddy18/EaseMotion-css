<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Loading Animation Showcase</h1>

    <p class="intro">
        Compare different loading animations commonly used in modern interfaces.
    </p>

    <div class="grid">

        <div class="card">
            <h3>Spinner</h3>
            <div class="spinner"></div>
        </div>

        <div class="card">
            <h3>Pulse</h3>
            <div class="pulse"></div>
        </div>

        <div class="card">
            <h3>Dots</h3>
            <div class="dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="card">
            <h3>Wave</h3>
            <div class="wave">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="card">
            <h3>Ripple</h3>
            <div class="ripple"></div>
        </div>

        <div class="card">
            <h3>Skeleton</h3>
            <div class="skeleton"></div>
        </div>

    </div>

</div>

</body>
</html>
