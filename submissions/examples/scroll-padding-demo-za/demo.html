<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Padding Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Scroll Padding</h1>
  <div class="demo-pair">
    <div class="scroll-panel no-pad">
      <h2>scroll-padding: 0</h2>
      <div class="scroll-container snap-none">
        <div class="s-item">1</div>
        <div class="s-item">2</div>
        <div class="s-item">3</div>
        <div class="s-item">4</div>
        <div class="s-item">5</div>
      </div>
    </div>
    <div class="scroll-panel with-pad">
      <h2>scroll-padding: 40px</h2>
      <div class="scroll-container snap-pad">
        <div class="s-item">1</div>
        <div class="s-item">2</div>
        <div class="s-item">3</div>
        <div class="s-item">4</div>
        <div class="s-item">5</div>
      </div>
    </div>
  </div>
</body>
</html>
