<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-paper-flutter – Paper Flutter Falling</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-900 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-4 ease-fade-in">
      Paper Flutter Fall
    </h1>
    <p class="ease-text-gray-400 ease-mb-8 ease-fade-in ease-delay-200">
      Click to drop a sheet of paper — watch it flutter down.
    </p>

    <button id="drop-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mb-10">
      📄 Drop Paper
    </button>

    <!-- Fall zone -->
    <div id="fall-zone" class="fall-zone">
      <!-- Paper sheets are injected here by JS -->
    </div>

    <p class="ease-text-sm ease-text-gray-500 ease-mt-8 ease-fade-in ease-delay-500">
      rotateX · rotateY · translateY — varied timing for realism
    </p>
  </div>

  <script>
    const fallZone = document.getElementById('fall-zone');
    const dropBtn = document.getElementById('drop-btn');

    const colors = ['#fef3c7', '#fde68a', '#fcd34d', '#fbbf24', '#f59e0b', '#e5e7eb', '#d1d5db', '#9ca3af'];

    dropBtn.addEventListener('click', () => {
      const paper = document.createElement('div');
      paper.className = 'paper-sheet';
      paper.style.background = colors[Math.floor(Math.random() * colors.length)];
      paper.style.left = Math.random() * 80 + 10 + '%';  // random horizontal position
      paper.style.animationDuration = (Math.random() * 2 + 3) + 's';  // 3–5s fall
      paper.style.animationDelay = '0s';
      paper.style.width = (Math.random() * 40 + 30) + 'px';
      paper.style.height = (Math.random() * 20 + 40) + 'px';
      paper.style.animationName = 'paper-fall';
      paper.style.animationTimingFunction = 'ease-in-out';
      paper.style.animationIterationCount = '1';
      paper.style.animationFillMode = 'forwards';

      fallZone.appendChild(paper);

      // Remove after animation ends
      paper.addEventListener('animationend', () => {
        paper.remove();
      });
    });
  </script>

</body>
</html>
