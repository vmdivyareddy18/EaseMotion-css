<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In Feature Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <article class="ease-feature-card">

            <h2>Technology Is Reshaping Modern Journalism</h2>

            <p>
                AI-powered reporting, interactive media, and real-time analytics
                are transforming how readers consume news across digital platforms.

            <a href="#">Read More →</a>

        </div>

    </article>

</div>

</html>
