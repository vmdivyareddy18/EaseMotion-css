<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiral Countdown Timer — EaseMotion CSS Example</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: var(--ease-space-8, 2rem);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e1b4b, #0f172a);
      color: #f8fafc;
      font-family: var(--ease-font-sans, 'Inter', system-ui, -apple-system, sans-serif);
      transition: background-color var(--ease-speed-medium, 300ms);
      overflow-x: hidden;
    }

    .demo-container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--ease-space-6, 1.5rem);
    }

    .demo-header {
      text-align: center;
      margin-bottom: var(--ease-space-2, 0.5rem);
    }

    .demo-title {
      font-size: var(--ease-text-2xl, 1.5rem);
      font-weight: 800;
      margin: 0;
      background: linear-gradient(90deg, #c084fc, #6366f1, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .demo-description {
      font-size: var(--ease-text-sm, 0.875rem);
      color: var(--timer-label-color);
      margin: var(--ease-space-2, 0.5rem) 0 0 0;
      line-height: 1.5;
    }

    @keyframes digit-pop {
      0% {
        transform: translateY(-25%);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .digit-pop {
      animation: digit-pop 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
  </style>
</head>

<body>

  <div class="demo-container">

    <header class="demo-header">
      <h1 class="demo-title">Spiral Countdown Timer</h1>
      <p class="demo-description">An elegant glassmorphic circular countdown utilizing SVG paths, CSS stroke animation,
        and hardware-accelerated motion paths.</p>
    </header>

    <main class="timer-card-wrapper">

      <div class="ease-spiral-timer" id="spiral-timer">
        <div class="timer-svg-container">
          <svg class="timer-svg" viewBox="0 0 300 340" aria-hidden="true">
            <defs>
              <linearGradient id="spiralGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="var(--timer-color-primary)" />
                <stop offset="100%" stop-color="var(--timer-color-secondary)" />
              </linearGradient>
            </defs>

            <path class="timer-spiral-bg"
              d="M 150, 50 A 120,120 0 0,1 150, 290 A 112.5,112.5 0 0,1 150, 65 A 105,105 0 0,1 150, 275 A 97.5,97.5 0 0,1 150, 80 A 90,90 0 0,1 150, 260 A 82.5,82.5 0 0,1 150, 95 A 75,75 0 0,1 150, 245 A 67.5,67.5 0 0,1 150, 110" />

            <path class="timer-spiral-fg" id="timer-path"
              d="M 150, 50 A 120,120 0 0,1 150, 290 A 112.5,112.5 0 0,1 150, 65 A 105,105 0 0,1 150, 275 A 97.5,97.5 0 0,1 150, 80 A 90,90 0 0,1 150, 260 A 82.5,82.5 0 0,1 150, 95 A 75,75 0 0,1 150, 245 A 67.5,67.5 0 0,1 150, 110" />

            <circle cx="150" cy="170" r="52" class="timer-center-glass" />
          </svg>
        </div>

        <div class="timer-dot" id="timer-dot"></div>

        <div class="timer-content" aria-live="polite">
          <div class="timer-digits" id="timer-digits" aria-label="Remaining time">
            <div class="timer-digit-group">
              <span class="timer-digit" id="min-tens">0</span>
              <span class="timer-digit" id="min-ones">1</span>
            </div>
            <span class="timer-separator">:</span>
            <div class="timer-digit-group">
              <span class="timer-digit" id="sec-tens">3</span>
              <span class="timer-digit" id="sec-ones">0</span>
            </div>
          </div>
          <span class="timer-label">Remaining</span>
        </div>
      </div>

      <div class="timer-controls">
        <button class="timer-btn timer-btn-primary" id="play-pause-btn" aria-label="Start timer">
          <span id="play-pause-icon">▶</span>
          <span id="play-pause-text">Start</span>
        </button>
        <button class="timer-btn timer-btn-danger" id="reset-btn" aria-label="Reset timer">
          <span>🔄</span>
          <span>Reset</span>
        </button>
      </div>


    </main>

  </div>

  <script>
    (function () {
      let isRunning = false;
      let duration = 90;
      let remainingTime = duration * 1000;
      let lastTimestamp = null;
      let animationFrameId = null;

      const timerEl = document.getElementById('spiral-timer');
      const pathEl = document.getElementById('timer-path');
      const dotEl = document.getElementById('timer-dot');

      const minTensEl = document.getElementById('min-tens');
      const minOnesEl = document.getElementById('min-ones');
      const secTensEl = document.getElementById('sec-tens');
      const secOnesEl = document.getElementById('sec-ones');

      const playPauseBtn = document.getElementById('play-pause-btn');
      const playPauseIcon = document.getElementById('play-pause-icon');
      const playPauseText = document.getElementById('play-pause-text');
      const resetBtn = document.getElementById('reset-btn');

      function tick(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const elapsed = timestamp - lastTimestamp;
        lastTimestamp = timestamp;

        if (isRunning) {
          remainingTime = Math.max(0, remainingTime - elapsed);
        }

        const totalMs = duration * 1000;
        const progress = totalMs > 0 ? (remainingTime / totalMs) : 0;
        const percentUsed = 1 - progress;

        const strokeOffset = percentUsed * 2356;
        pathEl.style.strokeDashoffset = strokeOffset;

        const dotDistance = (percentUsed * 100) + '%';
        dotEl.style.offsetDistance = dotDistance;

        const totalRemainingSeconds = Math.ceil(remainingTime / 1000);
        const minutes = Math.floor(totalRemainingSeconds / 60);
        const seconds = totalRemainingSeconds % 60;

        const mTens = String(Math.floor(minutes / 10));
        const mOnes = String(minutes % 10);
        const sTens = String(Math.floor(seconds / 10));
        const sOnes = String(seconds % 10);

        updateDigit(minTensEl, mTens);
        updateDigit(minOnesEl, mOnes);
        updateDigit(secTensEl, sTens);
        updateDigit(secOnesEl, sOnes);

        if (remainingTime <= 0) {
          completeTimer();
          return;
        }

        if (isRunning) {
          animationFrameId = requestAnimationFrame(tick);
        }
      }

      function updateDigit(el, value) {
        if (el.textContent !== value) {
          el.textContent = value;
          el.classList.remove('digit-pop');
          void el.offsetWidth;
          if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            el.classList.add('digit-pop');
          }
        }
      }

      function startTimer() {
        if (remainingTime <= 0) return;
        isRunning = true;
        timerEl.classList.remove('is-paused', 'is-complete');
        playPauseIcon.textContent = '⏸';
        playPauseText.textContent = 'Pause';
        playPauseBtn.setAttribute('aria-label', 'Pause timer');
        lastTimestamp = null;
        animationFrameId = requestAnimationFrame(tick);
      }

      function pauseTimer() {
        isRunning = false;
        timerEl.classList.add('is-paused');
        playPauseIcon.textContent = '▶';
        playPauseText.textContent = 'Resume';
        playPauseBtn.setAttribute('aria-label', 'Resume timer');
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      }

      function resetTimer() {
        pauseTimer();
        remainingTime = duration * 1000;
        timerEl.classList.remove('is-complete', 'is-paused');
        playPauseIcon.textContent = '▶';
        playPauseText.textContent = 'Start';
        playPauseBtn.setAttribute('aria-label', 'Start timer');

        lastTimestamp = null;
        requestAnimationFrame(tick);
      }

      function completeTimer() {
        isRunning = false;
        remainingTime = 0;
        timerEl.classList.remove('is-paused');
        timerEl.classList.add('is-complete');
        playPauseIcon.textContent = '▶';
        playPauseText.textContent = 'Start';
        playPauseBtn.setAttribute('aria-label', 'Start timer');
        if (animationFrameId) {
          cancelAnimationFrame(animationFrameId);
          animationFrameId = null;
        }
      }

      playPauseBtn.addEventListener('click', function () {
        if (isRunning) {
          pauseTimer();
        } else {
          startTimer();
        }
      });

      resetBtn.addEventListener('click', resetTimer);



      window.addEventListener('keydown', function (e) {
        if (e.code === 'Space' && (document.activeElement === document.body || document.activeElement === playPauseBtn)) {
          e.preventDefault();
          playPauseBtn.click();
        }
        if (e.code === 'Escape') {
          resetBtn.click();
        }
      });

      requestAnimationFrame(tick);
    })();
  </script>
</body>

</html>
