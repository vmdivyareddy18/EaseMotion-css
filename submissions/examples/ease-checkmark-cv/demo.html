<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EaseMotion - Animated Checkmark</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: white;
            padding: 2rem;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            gap: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6c63ff, #ec4899);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #94a3b8; margin-bottom: 1.5rem; }
        h2 {
            color: #a78bfa;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
        }
        .demo-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            min-height: 180px;
            justify-content: center;
        }
        .demo-card .label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 500;
        }
        .replay-btn {
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #6c63ff, #ec4899);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div>
            <h1>✨ Animated Checkmark</h1>
            <p class="subtitle">Success indicators for completed actions (click to replay)</p>
        </div>

        <!-- Style Variants -->
        <div>
            <h2>🎨 Style Variants</h2>
            <div class="demo-grid">
                <div class="demo-card" onclick="this.querySelector('.ease-checkmark-cv').style.animation='none'; setTimeout(() => this.querySelector('.ease-checkmark-cv').style.animation='', 10)">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Classic</span>
                </div>
                <div class="demo-card" onclick="this.querySelector('.ease-checkmark-cv').style.animation='none'; setTimeout(() => this.querySelector('.ease-checkmark-cv').style.animation='', 10)">
                    <div class="ease-checkmark-cv ease-checkmark-cv-bounce">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Bounce</span>
                </div>
                <div class="demo-card" onclick="this.querySelectorAll('.ease-checkmark-cv-wave').forEach(el => { el.style.animation = 'none'; setTimeout(() => el.style.animation = '', 10); })">
                    <div class="ease-checkmark-cv ease-checkmark-cv-wave">
                        <div class="ease-checkmark-cv-wave-ring"></div>
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Wave</span>
                </div>
            </div>
        </div>

        <!-- Size Variants -->
        <div>
            <h2>📏 Size Variants</h2>
            <div class="demo-grid">
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic ease-checkmark-cv-sm">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Small (32px)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Medium (64px)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic ease-checkmark-cv-lg">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Large (96px)</span>
                </div>
            </div>
        </div>

        <!-- Color Variants -->
        <div>
            <h2>🌈 Color Variants</h2>
            <div class="demo-grid">
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic ease-checkmark-cv-success">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Success (Green)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic ease-checkmark-cv-info">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Info (Blue)</span>
                </div>
                <div class="demo-card">
                    <div class="ease-checkmark-cv ease-checkmark-cv-classic ease-checkmark-cv-primary">
                        <svg viewBox="0 0 52 52">
                            <circle cx="26" cy="26" r="25" fill="none"/>
                            <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
                        </svg>
                    </div>
                    <span class="label">Primary (Purple)</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
