<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inbox Notification Badge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Inbox Notification Badge</h1>
    <p>Animated badge count with bounce and bell ring effects.</p>
  </header>

  <main>
    <div class="inbox-icon">
      <div class="bell-wrapper">
        <svg class="bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="badge" id="badge">0</span>
      </div>
      <span class="label">Inbox</span>
    </div>

    <div class="controls">
      <button id="newMsgBtn" class="btn btn-primary">New Message</button>
      <button id="resetBtn" class="btn btn-secondary">Reset</button>
    </div>

    <div class="log" id="log">
      <p class="log-empty">No new messages yet.</p>
    </div>
  </main>

  <footer>
    <p>EaseMotion CSS — Inbox Notification Badge</p>
  </footer>

  <script>
    const badge = document.getElementById('badge');
    const log = document.getElementById('log');
    const newMsgBtn = document.getElementById('newMsgBtn');
    const resetBtn = document.getElementById('resetBtn');
    let count = 0;

    function updateBadge() {
      badge.textContent = count;
      badge.classList.remove('bounce');
      void badge.offsetWidth;
      badge.classList.add('bounce');

      document.querySelector('.bell').classList.remove('ring');
      void badge.offsetWidth;
      document.querySelector('.bell').classList.add('ring');
    }

    newMsgBtn.addEventListener('click', () => {
      count++;
      updateBadge();
      const entry = document.createElement('p');
      entry.textContent = `New message #${count}`;
      entry.classList.add('log-entry');
      log.appendChild(entry);
      log.querySelector('.log-empty')?.remove();
      log.scrollTop = log.scrollHeight;
    });

    resetBtn.addEventListener('click', () => {
      count = 0;
      badge.textContent = '0';
      badge.classList.remove('bounce');
      document.querySelector('.bell').classList.remove('ring');
      log.innerHTML = '<p class="log-empty">No new messages yet.</p>';
    });
  </script>
</body>
</html>
