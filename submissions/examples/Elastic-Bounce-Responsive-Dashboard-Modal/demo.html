<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Responsive Dashboard Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Dashboard
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <h2>Analytics Dashboard</h2>

        <p>
            Monitor your business performance through a responsive dashboard
            powered entirely with HTML and CSS.
        </p>

        <div class="stats">

            <div class="card">
                <span>Revenue</span>
                <strong>$42.5K</strong>
            </div>

            <div class="card">
                <span>Users</span>
                <strong>18.2K</strong>
            </div>

            <div class="card">
                <span>Conversion</span>
                <strong>7.4%</strong>
            </div>

        </div>

        <div class="chart">

            <div class="bar b1"></div>
            <div class="bar b2"></div>
            <div class="bar b3"></div>
            <div class="bar b4"></div>
            <div class="bar b5"></div>

        </div>

        <button>View Full Report</button>

    </div>

</div>

</body>
</html>
