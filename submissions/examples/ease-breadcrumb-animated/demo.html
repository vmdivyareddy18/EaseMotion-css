<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Breadcrumb - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Breadcrumb</h1>
      <p>Dynamic navigation paths with slide-in animations and overflow handling.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        
        <nav aria-label="Breadcrumb" class="ease-breadcrumb-wrapper">
          <ol class="ease-breadcrumb" id="breadcrumb-list">
            <!-- Initial Crumb -->
            <li class="ease-crumb-item">
              <a href="#" class="ease-crumb-link">Home</a>
            </li>
            
            <!-- Existing Crumb -->
            <li class="ease-crumb-item">
              <span class="ease-separator" aria-hidden="true">›</span>
              <a href="#" class="ease-crumb-link" aria-current="page">Dashboard</a>
            </li>
          </ol>
        </nav>

        <div class="demo-actions">
          <button id="add-btn" class="demo-btn">Navigate Deeper</button>
          <button id="reset-btn" class="demo-btn demo-btn-secondary">Reset</button>
        </div>

      </section>
    </main>
  </div>

  <script>
    const list = document.getElementById('breadcrumb-list');
    const addBtn = document.getElementById('add-btn');
    const resetBtn = document.getElementById('reset-btn');
    
    // Fake folder paths to append
    const paths = ["Settings", "Security", "Two-Factor Auth", "Recovery Codes", "Generate New"];
    let currentIndex = 0;

    addBtn.addEventListener('click', () => {
      if (currentIndex >= paths.length) return;

      // 1. Remove aria-current from the old "active" link
      const currentLink = list.querySelector('[aria-current="page"]');
      if (currentLink) {
        currentLink.removeAttribute('aria-current');
      }

      // 2. Create the new list item and assign the entry animation class!
      const li = document.createElement('li');
      li.className = 'ease-crumb-item ease-crumb-enter';

      // 3. Create the separator
      const span = document.createElement('span');
      span.className = 'ease-separator';
      span.setAttribute('aria-hidden', 'true');
      span.textContent = '›';

      // 4. Create the link
      const a = document.createElement('a');
      a.href = '#';
      a.className = 'ease-crumb-link';
      a.setAttribute('aria-current', 'page');
      a.textContent = paths[currentIndex];

      // 5. Append to DOM
      li.appendChild(span);
      li.appendChild(a);
      list.appendChild(li);

      // 6. Smooth scroll the flex container to the right if overflowing
      list.scrollTo({
        left: list.scrollWidth,
        behavior: 'smooth'
      });

      currentIndex++;
      if (currentIndex >= paths.length) addBtn.disabled = true;
    });

    resetBtn.addEventListener('click', () => window.location.reload());
  </script>
</body>
</html>
