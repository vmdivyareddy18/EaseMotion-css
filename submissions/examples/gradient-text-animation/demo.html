<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradient Text Animation Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:2rem;font-family:Inter,sans-serif;background:#0f0f0f;color:#fff;">
    <h1 class="gradient-text-animated">Animated Gradient Heading</h1>
    <p style="max-width:520px;text-align:center;opacity:0.7;">
      The heading above uses a rotating gradient animation applied via
      <code>background-clip: text</code>. The animation respects the
      <code>prefers-reduced-motion</code> media query and falls back to a
      static gradient when motion is disabled.
    </p>

    <h2 class="gradient-text-animated" style="font-size:1.4rem;">
      Works on any text element
    </h2>
  </div>
</body>
</html>
