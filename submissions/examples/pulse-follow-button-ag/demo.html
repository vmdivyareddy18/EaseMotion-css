<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulse Follow Button — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="demo-wrapper">
      <div class="demo-card">
        <div class="demo-header">
          <h1>Pulse Follow Button</h1>
          <p>
            A glassmorphic, interactive component featuring an active soft pulse
            animation.
          </p>
        </div>

        <div class="pulse-follow-container">
          <input
            type="checkbox"
            id="pulse-follow-checkbox"
            class="pulse-follow-input"
            tabindex="-1"
            aria-hidden="true"
          />
          <label
            for="pulse-follow-checkbox"
            class="pulse-follow-btn"
            tabindex="0"
            role="button"
            aria-pressed="false"
            aria-label="Follow user"
          >
            <!-- Follow State -->
            <span class="btn-text text-follow">
              <svg
                viewBox="0 0 24 24"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <line x1="19" y1="8" x2="19" y2="14"></line>
                <line x1="22" y1="11" x2="16" y2="11"></line>
              </svg>
              Follow
            </span>

            <!-- Following State -->
            <span class="btn-text text-following">
              <svg
                viewBox="0 0 24 24"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
              Following
            </span>

            <!-- Concentric Pulse Rings -->
            <span class="pulse-rings">
              <span class="pulse-ring ring-1"></span>
              <span class="pulse-ring ring-2"></span>
            </span>
          </label>
        </div>
      </div>
    </main>

    <script>
      const btn = document.querySelector(".pulse-follow-btn");
      const checkbox = document.getElementById("pulse-follow-checkbox");

      // Keyboard accessibility (Space and Enter key trigger)
      btn.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter") {
          e.preventDefault();
          checkbox.click();
        }
      });

      // Synchronize aria-pressed state on status change
      checkbox.addEventListener("change", () => {
        const isChecked = checkbox.checked;
        btn.setAttribute("aria-pressed", isChecked ? "true" : "false");
        btn.setAttribute(
          "aria-label",
          isChecked ? "Unfollow user" : "Follow user"
        );
      });
    </script>
  </body>
</html>
