<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Burst Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 30px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .trigger-btn {
      padding: 14px 32px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      color: white;
      transition: transform 0.2s;
      position: relative;
      overflow: visible;
    }
    .trigger-btn:hover {
      transform: scale(1.05);
    }
    .trigger-btn:active {
      transform: scale(0.95);
    }
    .btn-primary { background: #6366f1; }
    .btn-success { background: #10b981; }
    .btn-party { background: linear-gradient(135deg, #f59e0b, #ef4444, #8b5cf6); }
  </style>
</head>
<body>
  <div class="container">
    <h2>Confetti Celebration Burst</h2>
    
    <div class="demo-row">
      <!-- Default Confetti -->
      <div class="demo-item">
        <button class="trigger-btn btn-primary confetti-trigger" onclick="triggerConfetti(this)">
          Celebrate!
        </button>
        <span class="demo-label">Default</span>
      </div>
      
      <!-- Success Confetti -->
      <div class="demo-item">
        <button class="trigger-btn btn-success confetti-trigger confetti-success" onclick="triggerConfetti(this)">
          Success!
        </button>
        <span class="demo-label">Success Colors</span>
      </div>
      
      <!-- Party Mode -->
      <div class="demo-item">
        <button class="trigger-btn btn-party confetti-trigger confetti-party" onclick="triggerConfetti(this)">
          Party!
        </button>
        <span class="demo-label">Party Mode</span>
      </div>
      
      <!-- Mini Burst -->
      <div class="demo-item">
        <button class="trigger-btn btn-primary confetti-trigger confetti-mini" onclick="triggerConfetti(this)">
          Mini
        </button>
        <span class="demo-label">Mini Burst</span>
      </div>
    </div>
  </div>

  <script>
    function triggerConfetti(button) {
      const rect = button.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const isMini = button.classList.contains('confetti-mini');
      const particleCount = isMini ? 20 : 50;
      
      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.classList.add('confetti-particle');
        
        // Random shape
        const shapes = ['square', 'rect', 'circle'];
        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        particle.classList.add(`confetti-${shape}`);
        
        // Random color
        const colors = ['#ef4444', '#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#ec4899', '#06b6d4'];
        const color = colors[Math.floor(Math.random() * colors.length)];
        particle.style.background = color;
        
        // Random direction
        const angle = (Math.PI * 2 * i) / particleCount + (Math.random() - 0.5) * 0.5;
        const velocity = 100 + Math.random() * 150;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity - 100;
        
        particle.style.left = centerX + 'px';
        particle.style.top = centerY + 'px';
        particle.style.setProperty('--tx', tx + 'px');
        particle.style.setProperty('--ty', ty + 'px');
        particle.style.setProperty('--rotate', (Math.random() * 720 - 360) + 'deg');
        
        document.body.appendChild(particle);
        
        setTimeout(() => particle.remove(), 2000);
      }
    }
  </script>
</body>
</html>
