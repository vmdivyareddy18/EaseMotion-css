<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-stock-ticker-flash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Stock Ticker Flash</h1>
    <p class="subtitle">
        Stock prices flash green or red when values change
    </p>

    <div class="ticker-grid">

        <div class="stock-card up">
            <h3>AAPL</h3>
            <div class="price">$214.52</div>
            <div class="change positive">+2.31%</div>
        </div>

        <div class="stock-card down">
            <h3>TSLA</h3>
            <div class="price">$301.18</div>
            <div class="change negative">-1.42%</div>
        </div>

        <div class="stock-card up">
            <h3>NVDA</h3>
            <div class="price">$189.76</div>
            <div class="change positive">+4.12%</div>
        </div>

        <div class="stock-card down">
            <h3>META</h3>
            <div class="price">$642.11</div>
            <div class="change negative">-0.85%</div>
        </div>

    </div>

    <div class="market-panel">

        <h2>Live Market Updates</h2>

        <div class="market-row flash-green">
            <span>GOOGL</span>
            <span>$198.44</span>
        </div>

        <div class="market-row flash-red">
            <span>AMZN</span>
            <span>$223.17</span>
        </div>

        <div class="market-row flash-green">
            <span>MSFT</span>
            <span>$518.29</span>
        </div>

    </div>

</div>

</body>
</html>
