<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Import Review Queue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="header">

        <div>
            <h1>Bulk Import Review Queue</h1>
            <p>Review and validate imported records before approval</p>
        </div>

        <button class="approve-all-btn">
            Approve All
        </button>

    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <h3>Total Records</h3>
            <span>2,548</span>
        </div>

        <div class="stat-card">
            <h3>Passed Validation</h3>
            <span>2,421</span>
        </div>

        <div class="stat-card">
            <h3>Needs Review</h3>
            <span>127</span>
        </div>

    </div>

    <div class="progress-card">

        <div class="progress-header">
            <span>Import Progress</span>
            <span>95%</span>
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

    </div>

    <div class="queue-table">

        <div class="table-row table-head">

            <span>Record ID</span>
            <span>Name</span>
            <span>Status</span>
            <span>Action</span>

        </div>

        <div class="table-row">

            <span>#1001</span>
            <span>Sarah Johnson</span>
            <span class="status success">
                Valid
            </span>

            <button class="review-btn">
                Review
            </button>

        </div>

        <div class="table-row">

            <span>#1002</span>
            <span>Michael Lee</span>
            <span class="status warning">
                Warning
            </span>

            <button class="review-btn">
                Review
            </button>

        </div>

        <div class="table-row">

            <span>#1003</span>
            <span>Emma Wilson</span>
            <span class="status error">
                Error
            </span>

            <button class="review-btn">
                Review
            </button>

        </div>

    </div>

</div>

</body>
</html>
