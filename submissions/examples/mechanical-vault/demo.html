<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Mechanical Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-mechanical-vault">
    
    <!-- Cryptographic State Matrix -->
    <div class="state-matrix">
      <input type="radio" name="dial1" id="d1-0" checked>
      <input type="radio" name="dial1" id="d1-1" >
      <input type="radio" name="dial1" id="d1-2" >
      <input type="radio" name="dial1" id="d1-3" >
      <input type="radio" name="dial1" id="d1-4" >
      <input type="radio" name="dial1" id="d1-5" >
      <input type="radio" name="dial1" id="d1-6" >
      <input type="radio" name="dial1" id="d1-7" >
      <input type="radio" name="dial1" id="d1-8" >
      <input type="radio" name="dial1" id="d1-9" >
      <input type="radio" name="dial2" id="d2-0" checked>
      <input type="radio" name="dial2" id="d2-1" >
      <input type="radio" name="dial2" id="d2-2" >
      <input type="radio" name="dial2" id="d2-3" >
      <input type="radio" name="dial2" id="d2-4" >
      <input type="radio" name="dial2" id="d2-5" >
      <input type="radio" name="dial2" id="d2-6" >
      <input type="radio" name="dial2" id="d2-7" >
      <input type="radio" name="dial2" id="d2-8" >
      <input type="radio" name="dial2" id="d2-9" >
      <input type="radio" name="dial3" id="d3-0" checked>
      <input type="radio" name="dial3" id="d3-1" >
      <input type="radio" name="dial3" id="d3-2" >
      <input type="radio" name="dial3" id="d3-3" >
      <input type="radio" name="dial3" id="d3-4" >
      <input type="radio" name="dial3" id="d3-5" >
      <input type="radio" name="dial3" id="d3-6" >
      <input type="radio" name="dial3" id="d3-7" >
      <input type="radio" name="dial3" id="d3-8" >
      <input type="radio" name="dial3" id="d3-9" >
    </div>

    <div class="ui-panel">
      <h1>Vault Access</h1>
      <p>Enter the combination to unlock.</p>
    </div>

    <!-- Interior Gold Glow & Sparks -->
    <div class="vault-interior">
      <div class="gold-glow"></div>
      <div class="spark-system">
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
        <div class="spark"></div>
      </div>
    </div>

    <div class="vault-environment">
      <!-- The Heavy Steel Door Hinge -->
      <div class="vault-door-hinge">
        <div class="vault-door-face">
          
          <div class="lock-mechanism">

            <div class="dial-container">
              <div class="dial-window"></div>
              <div class="dial-cylinder" id="cylinder-1">
                <div class="face" id="f1-0">0</div>
                <div class="face" id="f1-1">1</div>
                <div class="face" id="f1-2">2</div>
                <div class="face" id="f1-3">3</div>
                <div class="face" id="f1-4">4</div>
                <div class="face" id="f1-5">5</div>
                <div class="face" id="f1-6">6</div>
                <div class="face" id="f1-7">7</div>
                <div class="face" id="f1-8">8</div>
                <div class="face" id="f1-9">9</div>
              </div>
              
              <!-- Navigation Controls -->
              <div class="controls-up">
                <label class="btn-up target-from-0" for="d1-9">▲</label>
                <label class="btn-up target-from-1" for="d1-0">▲</label>
                <label class="btn-up target-from-2" for="d1-1">▲</label>
                <label class="btn-up target-from-3" for="d1-2">▲</label>
                <label class="btn-up target-from-4" for="d1-3">▲</label>
                <label class="btn-up target-from-5" for="d1-4">▲</label>
                <label class="btn-up target-from-6" for="d1-5">▲</label>
                <label class="btn-up target-from-7" for="d1-6">▲</label>
                <label class="btn-up target-from-8" for="d1-7">▲</label>
                <label class="btn-up target-from-9" for="d1-8">▲</label>
              </div>
              <div class="controls-down">
                <label class="btn-down target-from-0" for="d1-1">▼</label>
                <label class="btn-down target-from-1" for="d1-2">▼</label>
                <label class="btn-down target-from-2" for="d1-3">▼</label>
                <label class="btn-down target-from-3" for="d1-4">▼</label>
                <label class="btn-down target-from-4" for="d1-5">▼</label>
                <label class="btn-down target-from-5" for="d1-6">▼</label>
                <label class="btn-down target-from-6" for="d1-7">▼</label>
                <label class="btn-down target-from-7" for="d1-8">▼</label>
                <label class="btn-down target-from-8" for="d1-9">▼</label>
                <label class="btn-down target-from-9" for="d1-0">▼</label>
              </div>
            </div>

            <div class="dial-container">
              <div class="dial-window"></div>
              <div class="dial-cylinder" id="cylinder-2">
                <div class="face" id="f2-0">0</div>
                <div class="face" id="f2-1">1</div>
                <div class="face" id="f2-2">2</div>
                <div class="face" id="f2-3">3</div>
                <div class="face" id="f2-4">4</div>
                <div class="face" id="f2-5">5</div>
                <div class="face" id="f2-6">6</div>
                <div class="face" id="f2-7">7</div>
                <div class="face" id="f2-8">8</div>
                <div class="face" id="f2-9">9</div>
              </div>
              
              <!-- Navigation Controls -->
              <div class="controls-up">
                <label class="btn-up target-from-0" for="d2-9">▲</label>
                <label class="btn-up target-from-1" for="d2-0">▲</label>
                <label class="btn-up target-from-2" for="d2-1">▲</label>
                <label class="btn-up target-from-3" for="d2-2">▲</label>
                <label class="btn-up target-from-4" for="d2-3">▲</label>
                <label class="btn-up target-from-5" for="d2-4">▲</label>
                <label class="btn-up target-from-6" for="d2-5">▲</label>
                <label class="btn-up target-from-7" for="d2-6">▲</label>
                <label class="btn-up target-from-8" for="d2-7">▲</label>
                <label class="btn-up target-from-9" for="d2-8">▲</label>
              </div>
              <div class="controls-down">
                <label class="btn-down target-from-0" for="d2-1">▼</label>
                <label class="btn-down target-from-1" for="d2-2">▼</label>
                <label class="btn-down target-from-2" for="d2-3">▼</label>
                <label class="btn-down target-from-3" for="d2-4">▼</label>
                <label class="btn-down target-from-4" for="d2-5">▼</label>
                <label class="btn-down target-from-5" for="d2-6">▼</label>
                <label class="btn-down target-from-6" for="d2-7">▼</label>
                <label class="btn-down target-from-7" for="d2-8">▼</label>
                <label class="btn-down target-from-8" for="d2-9">▼</label>
                <label class="btn-down target-from-9" for="d2-0">▼</label>
              </div>
            </div>

            <div class="dial-container">
              <div class="dial-window"></div>
              <div class="dial-cylinder" id="cylinder-3">
                <div class="face" id="f3-0">0</div>
                <div class="face" id="f3-1">1</div>
                <div class="face" id="f3-2">2</div>
                <div class="face" id="f3-3">3</div>
                <div class="face" id="f3-4">4</div>
                <div class="face" id="f3-5">5</div>
                <div class="face" id="f3-6">6</div>
                <div class="face" id="f3-7">7</div>
                <div class="face" id="f3-8">8</div>
                <div class="face" id="f3-9">9</div>
              </div>
              
              <!-- Navigation Controls -->
              <div class="controls-up">
                <label class="btn-up target-from-0" for="d3-9">▲</label>
                <label class="btn-up target-from-1" for="d3-0">▲</label>
                <label class="btn-up target-from-2" for="d3-1">▲</label>
                <label class="btn-up target-from-3" for="d3-2">▲</label>
                <label class="btn-up target-from-4" for="d3-3">▲</label>
                <label class="btn-up target-from-5" for="d3-4">▲</label>
                <label class="btn-up target-from-6" for="d3-5">▲</label>
                <label class="btn-up target-from-7" for="d3-6">▲</label>
                <label class="btn-up target-from-8" for="d3-7">▲</label>
                <label class="btn-up target-from-9" for="d3-8">▲</label>
              </div>
              <div class="controls-down">
                <label class="btn-down target-from-0" for="d3-1">▼</label>
                <label class="btn-down target-from-1" for="d3-2">▼</label>
                <label class="btn-down target-from-2" for="d3-3">▼</label>
                <label class="btn-down target-from-3" for="d3-4">▼</label>
                <label class="btn-down target-from-4" for="d3-5">▼</label>
                <label class="btn-down target-from-5" for="d3-6">▼</label>
                <label class="btn-down target-from-6" for="d3-7">▼</label>
                <label class="btn-down target-from-7" for="d3-8">▼</label>
                <label class="btn-down target-from-8" for="d3-9">▼</label>
                <label class="btn-down target-from-9" for="d3-0">▼</label>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
