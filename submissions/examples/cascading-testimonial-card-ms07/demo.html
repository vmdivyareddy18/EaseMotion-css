<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascading Testimonial Card | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="ease-page">

    <header class="ease-page__header">
      <h1 class="ease-page__title">Cascading Testimonial Card</h1>
      <p class="ease-page__subtitle">
        Testimonial cards styled like social media posts, entering in a
        staggered cascade — each one fades and slides in slightly after
        the last. Pure CSS, single animation, zero JavaScript.
      </p>
    </header>

    <section class="ease-testimonial-grid">

      <figure class="ease-testimonial" style="--ease-i: 0;">
        <div class="ease-testimonial__header">
          <div class="ease-testimonial__avatar" style="--ease-avatar-color: #4285f4;" aria-hidden="true">AR</div>
          <div class="ease-testimonial__identity">
            <figcaption class="ease-testimonial__name">
              Aarav Rao
              <span class="ease-testimonial__badge" title="Verified">✓</span>
            </figcaption>
            <p class="ease-testimonial__handle">@aarav.builds</p>
          </div>
        </div>
        <blockquote class="ease-testimonial__quote">
          EaseMotion CSS made adding polish to our landing page so much
          easier. No build step, just classes that work.
        </blockquote>
        <div class="ease-testimonial__footer">
          <span>❤ 128</span>
          <span>🔁 24</span>
          <span>💬 9</span>
        </div>
      </figure>

      <figure class="ease-testimonial" style="--ease-i: 1;">
        <div class="ease-testimonial__header">
          <div class="ease-testimonial__avatar" style="--ease-avatar-color: #ea4335;" aria-hidden="true">SN</div>
          <div class="ease-testimonial__identity">
            <figcaption class="ease-testimonial__name">
              Sara Nair
            </figcaption>
            <p class="ease-testimonial__handle">@saranair</p>
          </div>
        </div>
        <blockquote class="ease-testimonial__quote">
          The cascading entrance on this testimonial section alone made
          our portfolio feel twice as premium.
        </blockquote>
        <div class="ease-testimonial__footer">
          <span>❤ 76</span>
          <span>🔁 11</span>
          <span>💬 4</span>
        </div>
      </figure>

      <figure class="ease-testimonial" style="--ease-i: 2;">
        <div class="ease-testimonial__header">
          <div class="ease-testimonial__avatar" style="--ease-avatar-color: #34a853;" aria-hidden="true">DM</div>
          <div class="ease-testimonial__identity">
            <figcaption class="ease-testimonial__name">
              Devan Mehta
              <span class="ease-testimonial__badge" title="Verified">✓</span>
            </figcaption>
            <p class="ease-testimonial__handle">@devmehta</p>
          </div>
        </div>
        <blockquote class="ease-testimonial__quote">
          Copy-paste, no dependencies, and it just looks good out of the
          box. Exactly what a component library should be.
        </blockquote>
        <div class="ease-testimonial__footer">
          <span>❤ 203</span>
          <span>🔁 38</span>
          <span>💬 15</span>
        </div>
      </figure>

      <figure class="ease-testimonial" style="--ease-i: 3;">
        <div class="ease-testimonial__header">
          <div class="ease-testimonial__avatar" style="--ease-avatar-color: #fbbc05;" aria-hidden="true">PK</div>
          <div class="ease-testimonial__identity">
            <figcaption class="ease-testimonial__name">
              Priya Kulkarni
            </figcaption>
            <p class="ease-testimonial__handle">@priyak</p>
          </div>
        </div>
        <blockquote class="ease-testimonial__quote">
          Loved how easy it was to tune the timing with CSS variables —
          fit right into our existing design tokens.
        </blockquote>
        <div class="ease-testimonial__footer">
          <span>❤ 54</span>
          <span>🔁 7</span>
          <span>💬 2</span>
        </div>
      </figure>

    </section>

    <p class="ease-page__hint">
      Reload the page to watch the cascade play again.
    </p>

  </main>

</body>
</html>
