<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Countdown Timer - EaseMotion CSS</title>

    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Roboto+Mono:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- EaseMotion CSS via CDN -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />

    <!-- Custom Flip Timer Styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Ambient background animation orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <main class="page-container">
      <!-- Launch Header -->
      <header class="launch-header ease-fade-in-down">
        <span class="launch-badge">🚀 Platform Launch</span>
        <h1 class="launch-title">The Future of AI is Coming</h1>
        <p class="launch-description">
          We are launching our next-generation autonomous AI workbench. Be the
          first to build, test, and deploy production-ready agents in seconds.
        </p>
      </header>

      <!-- Flip Countdown Timer -->
      <section class="countdown-wrapper ease-fade-in ease-delay-300">
        <!-- Days Block -->
        <div class="countdown-block">
          <div class="countdown-card">
            <span class="digit" id="days-digit">00</span>
          </div>
          <span class="label">Days</span>
        </div>

        <!-- Hours Block -->
        <div class="countdown-block">
          <div class="countdown-card">
            <span class="digit" id="hours-digit">00</span>
          </div>
          <span class="label">Hours</span>
        </div>

        <!-- Minutes Block -->
        <div class="countdown-block">
          <div class="countdown-card">
            <span class="digit" id="minutes-digit">00</span>
          </div>
          <span class="label">Minutes</span>
        </div>

        <!-- Seconds Block -->
        <div class="countdown-block">
          <div class="countdown-card">
            <span class="digit" id="seconds-digit">00</span>
          </div>
          <span class="label">Seconds</span>
        </div>
      </section>

      <!-- Accessible screen-reader only live region -->
      <div
        class="sr-only"
        id="sr-countdown"
        aria-live="polite"
        aria-atomic="true"
      ></div>

      <!-- Sign-up Call to Action -->
      <section class="cta-form ease-fade-in-up ease-delay-500">
        <form
          class="input-group"
          onsubmit="
            event.preventDefault();
            alert('Thank you! You have been added to the waitlist.');
          "
        >
          <input
            type="email"
            placeholder="Enter your email address"
            class="cta-input"
            required
            aria-label="Email address for waitlist"
          />
          <button type="submit" class="cta-button">Get Early Access</button>
        </form>
        <p class="cta-text">
          Join 10,000+ developers. Zero spam. Unsubscribe anytime.
        </p>
      </section>
    </main>

    <script>
      // Set countdown target to exactly 10 days, 4 hours, and 25 minutes from the initial load
      const countdownDuration =
        10 * 24 * 60 * 60 * 1000 + 4 * 60 * 60 * 1000 + 25 * 60 * 1000;
      const targetTime = Date.now() + countdownDuration;
      let tickCount = 0;

      function updateDigit(id, newValue, isInitial) {
        const el = document.getElementById(id + "-digit");
        if (!el) return;

        // If same value, skip animation
        if (el.textContent === newValue) return;

        // On initial load, update content instantly without transition
        if (isInitial) {
          el.textContent = newValue;
          return;
        }

        // Trigger 3D flip card animation sequence
        el.classList.add("flip");

        // At the midpoint of rotation (250ms), swap out the text when it is invisible/edge-on
        setTimeout(() => {
          el.textContent = newValue;
        }, 250);

        // Clean up the transition class when animation finishes (500ms)
        setTimeout(() => {
          el.classList.remove("flip");
        }, 500);
      }

      function updateCountdown(isInitial = false) {
        const now = Date.now();
        const difference = targetTime - now;

        if (difference <= 0) {
          updateDigit("days", "00", isInitial);
          updateDigit("hours", "00", isInitial);
          updateDigit("minutes", "00", isInitial);
          updateDigit("seconds", "00", isInitial);

          const srEl = document.getElementById("sr-countdown");
          if (srEl) srEl.textContent = "The platform has launched!";
          return;
        }

        // Calculate time components
        const days = Math.floor(difference / (24 * 60 * 60 * 1000));
        const hours = Math.floor(
          (difference % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000)
        );
        const minutes = Math.floor(
          (difference % (60 * 60 * 1000)) / (60 * 1000)
        );
        const seconds = Math.floor((difference % (60 * 1000)) / 1000);

        // Pad numbers with leading zeros
        const pad = (num) => String(num).padStart(2, "0");

        const formattedDays = pad(days);
        const formattedHours = pad(hours);
        const formattedMinutes = pad(minutes);
        const formattedSeconds = pad(seconds);

        // Apply changes to elements
        updateDigit("days", formattedDays, isInitial);
        updateDigit("hours", formattedHours, isInitial);
        updateDigit("minutes", formattedMinutes, isInitial);
        updateDigit("seconds", formattedSeconds, isInitial);

        // Update screen reader live region periodically (every 15 seconds) to avoid speaking clutter
        if (isInitial || tickCount % 15 === 0) {
          const srEl = document.getElementById("sr-countdown");
          if (srEl) {
            srEl.textContent = `Launch countdown: ${days} days, ${hours} hours, ${minutes} minutes, and ${seconds} seconds remaining.`;
          }
        }
        tickCount++;
      }

      // Initialize display instantly on load
      updateCountdown(true);

      // Update countdown every second
      setInterval(() => updateCountdown(false), 1000);
    </script>
  </body>
</html>
