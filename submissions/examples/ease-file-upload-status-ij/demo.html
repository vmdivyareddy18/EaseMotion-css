<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Upload Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Upload a File</h1>
  <div class="upload-wrapper">
    <div class="upload-zone" id="uploadZone">
      <svg class="upload-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M24 34V14" />
        <path d="M14 24L24 14L34 24" />
        <rect x="8" y="32" width="32" height="8" rx="2" />
      </svg>
      <p class="upload-text">Drag &amp; drop your file here</p>
      <p class="upload-hint">or click to browse</p>
      <input type="file" id="fileInput" hidden />
    </div>

    <div class="file-info" id="fileInfo" hidden>
      <div class="file-meta">
        <span class="file-name" id="fileName"></span>
        <span class="file-size" id="fileSize"></span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="file-status" id="fileStatus"></div>
    </div>

    <div class="upload-actions">
      <button class="btn btn-upload" id="uploadBtn" disabled>Upload</button>
      <button class="btn btn-reset" id="resetBtn">Reset</button>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
