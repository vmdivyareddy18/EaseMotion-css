<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Off-Canvas Cart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Off-Canvas Cart</h1>
  <p class="subtitle">Shopping cart panel slides in from the right with staggered item animations.</p>

  <button class="open-btn" id="openCart" aria-label="Open cart">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1" />
      <circle cx="20" cy="21" r="1" />
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
    </svg>
    Open Cart
  </button>

  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>Shopping Cart</h2>
      <button class="close-btn" id="closeCart" aria-label="Close cart">&times;</button>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-item" data-price="29.99" data-quantity="1">
        <div class="item-info">
          <span class="item-name">Wireless Mouse</span>
          <span class="item-price">$29.99</span>
        </div>
        <div class="item-controls">
          <button class="qty-btn minus">-</button>
          <span class="qty">1</span>
          <button class="qty-btn plus">+</button>
        </div>
      </div>
      <div class="cart-item" data-price="49.99" data-quantity="2">
        <div class="item-info">
          <span class="item-name">Mechanical Keyboard</span>
          <span class="item-price">$49.99</span>
        </div>
        <div class="item-controls">
          <button class="qty-btn minus">-</button>
          <span class="qty">2</span>
          <button class="qty-btn plus">+</button>
        </div>
      </div>
      <div class="cart-item" data-price="19.99" data-quantity="1">
        <div class="item-info">
          <span class="item-name">USB-C Hub</span>
          <span class="item-price">$19.99</span>
        </div>
        <div class="item-controls">
          <button class="qty-btn minus">-</button>
          <span class="qty">1</span>
          <button class="qty-btn plus">+</button>
        </div>
      </div>
    </div>
    <div class="cart-summary">
      <div class="cart-total">
        <span>Total</span>
        <span class="total-amount" id="totalAmount">$139.96</span>
      </div>
      <button class="checkout-btn">Checkout</button>
    </div>
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1" />
        <circle cx="20" cy="21" r="1" />
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
      </svg>
      <p>Your cart is empty</p>
    </div>
  </div>

  <script>
    const openBtn = document.getElementById('openCart');
    const closeBtn = document.getElementById('closeCart');
    const panel = document.getElementById('cartPanel');
    const overlay = document.getElementById('cartOverlay');
    const items = document.querySelectorAll('.cart-item');
    const totalEl = document.getElementById('totalAmount');
    const emptyState = document.getElementById('emptyState');
    const cartItems = document.getElementById('cartItems');

    function updateTotal() {
      let total = 0;
      let itemCount = 0;
      document.querySelectorAll('.cart-item').forEach(item => {
        const price = parseFloat(item.getAttribute('data-price'));
        const qty = parseInt(item.getAttribute('data-quantity'), 10);
        total += price * qty;
        itemCount += qty;
      });
      totalEl.textContent = '$' + total.toFixed(2);
      return { total, itemCount };
    }

    function toggleEmptyState() {
      const visibleItems = [...document.querySelectorAll('.cart-item')].filter(
        item => item.style.display !== 'none'
      );
      if (visibleItems.length === 0) {
        cartItems.style.display = 'none';
        emptyState.style.display = 'flex';
      } else {
        cartItems.style.display = 'block';
        emptyState.style.display = 'none';
      }
    }

    function staggerItems() {
      document.querySelectorAll('.cart-item').forEach((item, i) => {
        if (item.style.display !== 'none') {
          item.style.setProperty('--stagger-delay', i * 0.08 + 's');
          item.style.animation = 'none';
          void item.offsetWidth;
          item.style.animation = 'itemIn 0.4s ease forwards';
          item.style.animationDelay = item.style.getPropertyValue('--stagger-delay');
        }
      });
    }

    openBtn.addEventListener('click', () => {
      panel.classList.add('open');
      overlay.classList.add('open');
      staggerItems();
    });

    function closeCart() {
      panel.classList.remove('open');
      overlay.classList.remove('open');
    }

    closeBtn.addEventListener('click', closeCart);
    overlay.addEventListener('click', closeCart);

    document.addEventListener('click', e => {
      const target = e.target.closest('.qty-btn');
      if (!target) return;
      const item = target.closest('.cart-item');
      const qtyEl = item.querySelector('.qty');
      let qty = parseInt(qtyEl.textContent, 10);
      if (target.classList.contains('plus')) {
        qty++;
      } else if (target.classList.contains('minus') && qty > 0) {
        qty--;
      }
      if (qty === 0) {
        item.style.display = 'none';
        item.setAttribute('data-quantity', '0');
      } else {
        item.setAttribute('data-quantity', qty);
        qtyEl.textContent = qty;
        qtyEl.classList.remove('qty-bounce');
        void qtyEl.offsetWidth;
        qtyEl.classList.add('qty-bounce');
      }
      updateTotal();
      toggleEmptyState();
    });
  </script>
</body>
</html>
