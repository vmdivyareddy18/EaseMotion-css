<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Stock Market Bear Drop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Stock Market Bear Drop</h1>

  <p class="intro">
    A reusable bearish market animation for trading platforms,
    investment dashboards, fintech applications, and analytics tools.
  </p>

  <div class="demo-grid">

    <div class="bear-card">
      <div class="bear-drop">
        <span class="bear">🐻</span>
        <span class="trend-arrow">📉</span>
      </div>
      <h3>Bear Market</h3>
    </div>

    <div class="bear-card">
      <div class="bear-drop large">
        <span class="bear">🐻</span>
        <span class="trend-arrow">📉</span>
      </div>
      <p>Market Correction</p>
    </div>

    <div class="bear-card">
      <div class="bear-drop">
        <span class="bear">🐻</span>
        <span class="trend-arrow">📉</span>
      </div>
      <button>View Analysis</button>
    </div>

  </div>

</main>

</body>
</html>
