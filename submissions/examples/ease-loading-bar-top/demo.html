<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Loading Bar - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fixed, full-width bar pinned to the very top of the page -->
  <div class="ease-loading-bar" id="loadingBar"></div>

  <div class="demo-wrapper">

    <h1 class="demo-title">Top-of-Page Loading Bar</h1>
    <p class="demo-caption">
      A thin progress bar pinned to the top of the page, animating its
      width from 0% to 100% during a loading state, then fading out on
      completion — the classic YouTube / GitHub "page is loading" pattern.
    </p>

    <div class="color-options">
      <button class="color-btn color-btn--solid is-active" data-color="solid" type="button">Solid</button>
      <button class="color-btn color-btn--gradient" data-color="gradient" type="button">Gradient</button>
    </div>

    <button class="trigger-btn" id="triggerBtn" type="button">Simulate Page Load</button>

  </div>

<script>
  const bar = document.getElementById("loadingBar");
  const triggerBtn = document.getElementById("triggerBtn");
  const colorBtns = document.querySelectorAll(".color-btn");

  colorBtns.forEach((btn) => {
    btn.addEventListener("click", () => {
      colorBtns.forEach((b) => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      bar.classList.toggle("ease-loading-bar--gradient", btn.dataset.color === "gradient");
    });
  });

  triggerBtn.addEventListener("click", () => {
    triggerBtn.disabled = true;

    // Reset to 0 width with no transition, then trigger the loading animation
    bar.classList.remove("is-complete");
    bar.classList.remove("is-loading");
    bar.style.transition = "none";
    bar.style.width = "0%";

    // Force reflow so the reset actually applies before re-animating
    void bar.offsetWidth;
    bar.style.transition = "";

    requestAnimationFrame(() => {
      bar.classList.add("is-loading");
    });

    // Simulate the page finishing loading after ~1.6s
    setTimeout(() => {
      bar.classList.add("is-complete");
      triggerBtn.disabled = false;
    }, 1600);
  });
</script>

</body>
</html>
