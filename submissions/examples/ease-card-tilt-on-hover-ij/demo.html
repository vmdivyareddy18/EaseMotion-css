<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Tilt on Hover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Card Tilt on Hover</h1>
  <div class="tilt-wrapper">
    <div class="tilt-card" data-tilt>
      <h2>Innovation</h2>
      <p>Pushing boundaries with cutting-edge solutions for tomorrow's challenges.</p>
    </div>
    <div class="tilt-card" data-tilt>
      <h2>Precision</h2>
      <p>Meticulous attention to detail ensures every pixel and interaction matters.</p>
    </div>
    <div class="tilt-card" data-tilt>
      <h2>Harmony</h2>
      <p>Where design meets function to create balanced, intuitive experiences.</p>
    </div>
  </div>
  <script>
    document.querySelectorAll('[data-tilt]').forEach((card) => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const midX = rect.width / 2;
        const midY = rect.height / 2;
        const rotateY = ((x - midX) / midX) * varTiltMaxDegree;
        const rotateX = ((midY - y) / midY) * varTiltMaxDegree;
        card.style.setProperty('--tilt-rotateX', rotateX + 'deg');
        card.style.setProperty('--tilt-rotateY', rotateY + 'deg');
      });
      card.addEventListener('mouseleave', () => {
        card.style.setProperty('--tilt-rotateX', '0deg');
        card.style.setProperty('--tilt-rotateY', '0deg');
      });
    });

    const style = getComputedStyle(document.documentElement);
    const varTiltMaxDegree = parseFloat(style.getPropertyValue('--tilt-max-degree')) || 15;
  </script>
</body>
</html>
