<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Shift Breadcrumb</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #ffffff; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="header-container ease-fade-in-up">
    <h2>Project Settings</h2>
    
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <ol>
        <li class="breadcrumb-item">
          <a href="#" class="shift-link ease-hover-pop">Dashboard</a>
          <span class="separator">/</span>
        </li>
        <li class="breadcrumb-item">
          <a href="#" class="shift-link ease-hover-pop">Projects</a>
          <span class="separator">/</span>
        </li>
        <li class="breadcrumb-item">
          <a href="#" class="shift-link ease-hover-pop">Apollo Redesign</a>
          <span class="separator">/</span>
        </li>
        <li class="breadcrumb-item active" aria-current="page">
          <span>Settings</span>
        </li>
      </ol>
    </nav>
  </div>

</body>
</html>
