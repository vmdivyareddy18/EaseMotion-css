<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Step Checkbox - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <!-- Premium Recipe Card Component -->
      <div class="recipe-card">
        <!-- Card Header -->
        <div class="recipe-header">
          <span class="recipe-badge">Gourmet Recipe</span>
          <h1 class="recipe-title">Creamy Tuscan Chicken</h1>
          <div class="recipe-meta">
            <div class="meta-item">
              <span>⏱️</span>
              <span>30 mins</span>
            </div>
            <div class="meta-item">
              <span>🔥</span>
              <span>380 kcal</span>
            </div>
            <div class="meta-item">
              <span>⭐️</span>
              <span>4.9 (1.2k reviews)</span>
            </div>
          </div>
        </div>

        <!-- CSS-Only Counter and Progress Tracker -->
        <div class="progress-container">
          <div class="progress-header">
            <span class="progress-label">Cooking Progress</span>
            <span class="progress-count"></span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar-fill"></div>
          </div>
        </div>

        <!-- Preparation Steps List -->
        <div class="steps-list">
          <!-- Step 1 -->
          <label class="recipe-step">
            <input type="checkbox" id="step-1" class="step-checkbox" />
            <div class="checkbox-box">
              <svg class="checkmark-icon" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div class="step-content">
              <span class="step-number">Step 1</span>
              <span class="step-text"
                >Pat chicken breasts dry and season with salt, pepper, and
                Italian seasoning.</span
              >
            </div>
          </label>

          <!-- Step 2 -->
          <label class="recipe-step">
            <input type="checkbox" id="step-2" class="step-checkbox" />
            <div class="checkbox-box">
              <svg class="checkmark-icon" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div class="step-content">
              <span class="step-number">Step 2</span>
              <span class="step-text"
                >Heat olive oil in a large skillet and sear chicken for 5
                minutes on each side until golden.</span
              >
            </div>
          </label>

          <!-- Step 3 -->
          <label class="recipe-step">
            <input type="checkbox" id="step-3" class="step-checkbox" />
            <div class="checkbox-box">
              <svg class="checkmark-icon" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div class="step-content">
              <span class="step-number">Step 3</span>
              <span class="step-text"
                >Add minced garlic, sun-dried tomatoes, and fresh baby spinach
                to the skillet.</span
              >
            </div>
          </label>

          <!-- Step 4 -->
          <label class="recipe-step">
            <input type="checkbox" id="step-4" class="step-checkbox" />
            <div class="checkbox-box">
              <svg class="checkmark-icon" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div class="step-content">
              <span class="step-number">Step 4</span>
              <span class="step-text"
                >Pour in heavy cream and simmer on low-medium heat for 10
                minutes until sauce is thickened.</span
              >
            </div>
          </label>

          <!-- Step 5 -->
          <label class="recipe-step">
            <input type="checkbox" id="step-5" class="step-checkbox" />
            <div class="checkbox-box">
              <svg class="checkmark-icon" viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            <div class="step-content">
              <span class="step-number">Step 5</span>
              <span class="step-text"
                >Garnish with freshly grated Parmesan cheese and chopped basil
                before serving.</span
              >
            </div>
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
