<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Search Suggestion Dropdown — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 120px;
      background: #0f172a;
    }
  </style>
</head>
<body>

  <div class="ease-search">
    <input
      type="text"
      class="search-input"
      placeholder="Search components, docs, examples..."
      aria-label="Search"
      aria-expanded="false"
      role="combobox"
      aria-controls="search-suggestions"
    />
    <ul class="search-dropdown" id="search-suggestions" role="listbox">
      <li class="suggestion-item" role="option" tabindex="0">
        <span class="suggestion-icon">🔍</span> Tooltip components
      </li>
      <li class="suggestion-item" role="option" tabindex="0">
        <span class="suggestion-icon">🔍</span> Modal animations
      </li>
      <li class="suggestion-item" role="option" tabindex="0">
        <span class="suggestion-icon">🔍</span> Scroll-to-top button
      </li>
      <li class="suggestion-item" role="option" tabindex="0">
        <span class="suggestion-icon">🔍</span> Dark mode toggle
      </li>
      <li class="suggestion-item" role="option" tabindex="0">
        <span class="suggestion-icon">🔍</span> Progress ring
      </li>
    </ul>
  </div>

</body>
</html>
