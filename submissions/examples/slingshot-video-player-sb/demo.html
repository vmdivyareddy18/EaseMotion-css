<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slingshot Video Player Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="ease-container">
        <h1 class="ease-slide-up">🎯 Slingshot Video Player</h1>
        <p class="ease-slide-up ease-delay-100">
            Click the play button to see the slingshot animation
        </p>

        <!-- Video Player -->
        <div class="ease-video-player">
            <!-- Video Thumbnail / Placeholder -->
            <div class="ease-video-thumbnail">
                <img
                    src="https://picsum.photos/seed/travel/800/450"
                    alt="Video thumbnail"
                    class="ease-thumbnail-image"
                />
                
                <!-- Slingshot Play Button -->
                <div class="ease-play-button" id="playButton">
                    <div class="ease-slingshot">
                        <div class="ease-slingshot-band"></div>
                        <div class="ease-slingshot-projectile">
                            <svg viewBox="0 0 24 24" width="48" height="48">
                                <polygon points="5,3 19,12 5,21" fill="white" />
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Video Duration Badge -->
                <span class="ease-duration-badge">3:42</span>
            </div>

            <!-- Video Controls -->
            <div class="ease-video-controls">
                <div class="ease-progress-bar">
                    <div class="ease-progress-fill" style="width: 30%;"></div>
                </div>
                <div class="ease-controls-bottom">
                    <span class="ease-time-display">1:12 / 3:42</span>
                    <div class="ease-control-buttons">
                        <button class="ease-control-btn ease-volume-btn">🔊</button>
                        <button class="ease-control-btn ease-fullscreen-btn">⛶</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Demo Info -->
        <div class="ease-demo-info">
            <p>💡 The play button uses a slingshot animation:</p>
            <ul>
                <li><strong>Pull-back:</strong> The play icon moves back and rotates</li>
                <li><strong>Release:</strong> It snaps forward with a bounce</li>
                <li><strong>State change:</strong> Play → Pause (▌▌)</li>
            </ul>
        </div>
    </div>

    <script>
        const playButton = document.getElementById('playButton');
        let isPlaying = false;

        playButton.addEventListener('click', () => {
            isPlaying = !isPlaying;
            
            // Toggle play/pause state
            if (isPlaying) {
                playButton.classList.add('ease-playing');
                // Change icon to pause
                const svg = playButton.querySelector('svg polygon');
                if (svg) {
                    svg.setAttribute('points', '6,3 10,3 10,21 6,21 14,3 18,3 18,21 14,21');
                }
            } else {
                playButton.classList.remove('ease-playing');
                // Change back to play
                const svg = playButton.querySelector('svg polygon');
                if (svg) {
                    svg.setAttribute('points', '5,3 19,12 5,21');
                }
            }
        });
    </script>
</body>
</html>
