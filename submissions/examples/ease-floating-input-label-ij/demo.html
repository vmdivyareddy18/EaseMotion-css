<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Input Label – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Floating Input Label</h1>
  <p>Labels float up and scale down when the input is focused or has a value.</p>

  <div class="form">
    <div class="fl-group">
      <input type="text" class="fl-input" id="name" autocomplete="name" required>
      <label class="fl-label" for="name">Full Name</label>
    </div>

    <div class="fl-group">
      <input type="email" class="fl-input" id="email" autocomplete="email" required>
      <label class="fl-label" for="email">Email Address</label>
    </div>

    <div class="fl-group">
      <input type="password" class="fl-input" id="password" required>
      <label class="fl-label" for="password">Password</label>
    </div>

    <div class="fl-group fl-group--filled">
      <input type="text" class="fl-input" id="prefilled" value="Jane Doe" readonly>
      <label class="fl-label" for="prefilled">Prefilled</label>
    </div>
  </div>

  <div class="controls">
    <button id="toggleFill">Toggle Fill (first field)</button>
    <button id="resetForm">Reset Form</button>
  </div>

  <script>
    document.querySelectorAll('.fl-input').forEach(input => {
      input.addEventListener('blur', () => {
        if (input.value) {
          input.classList.add('fl-input--has-value');
        } else {
          input.classList.remove('fl-input--has-value');
        }
      });
      input.addEventListener('input', () => {
        if (input.value) {
          input.classList.add('fl-input--has-value');
        } else {
          input.classList.remove('fl-input--has-value');
        }
      });
      if (input.value) {
        input.classList.add('fl-input--has-value');
      }
    });

    document.getElementById('toggleFill').addEventListener('click', () => {
      const name = document.getElementById('name');
      if (name.value) {
        name.value = '';
        name.classList.remove('fl-input--has-value');
      } else {
        name.value = 'Sample User';
        name.classList.add('fl-input--has-value');
      }
    });

    document.getElementById('resetForm').addEventListener('click', () => {
      document.querySelectorAll('.fl-input').forEach(input => {
        if (!input.readOnly) {
          input.value = '';
          input.classList.remove('fl-input--has-value');
        }
      });
    });
  </script>
</body>
</html>
