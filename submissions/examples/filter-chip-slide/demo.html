<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter Chip Slide</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion filters</p>
    <h1 id="demo-title">Filter chip slide</h1>
    <p class="intro">A row of filter chips with an active state that slides into place.</p>

    <div class="chips" aria-label="Demo filters">
      <button type="button">All</button>
      <button class="active" type="button">Open</button>
      <button type="button">Done</button>
    </div>
  </main>
</body>
</html>
