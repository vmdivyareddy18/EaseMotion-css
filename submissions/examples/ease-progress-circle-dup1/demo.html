<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Animated Progress Circle | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="progress-demo-page">
  <main class="progress-wrapper">
    <header class="progress-header">
      <h1 class="progress-title">Circular Progress</h1>
      <p class="progress-subtitle">Animated CSS-only SVG progress ring proposed for <code>components/</code>.</p>
    </header>

    <!-- Playground -->
    <section class="progress-showcase">
      
      <article class="progress-card">
        <h3 class="progress-label">Dashboard Example</h3>
        
        <div class="progress-grid">
          <!-- 25% -->
          <div class="progress-item">
            <svg class="ease-progress-circle" style="--ease-progress-value: 25; --ease-progress-color: #ef4444;" viewBox="0 0 100 100">
              <circle class="ease-progress-circle__track" cx="50" cy="50" r="40" />
              <circle class="ease-progress-circle__fill" cx="50" cy="50" r="40" />
              <text class="ease-progress-circle__text" x="50" y="50" alignment-baseline="middle" text-anchor="middle">25%</text>
            </svg>
            <p>Storage</p>
          </div>

          <!-- 75% -->
          <div class="progress-item">
            <svg class="ease-progress-circle" style="--ease-progress-value: 75; --ease-progress-color: #3b82f6;" viewBox="0 0 100 100">
              <circle class="ease-progress-circle__track" cx="50" cy="50" r="40" />
              <circle class="ease-progress-circle__fill" cx="50" cy="50" r="40" />
              <text class="ease-progress-circle__text" x="50" y="50" alignment-baseline="middle" text-anchor="middle">75%</text>
            </svg>
            <p>Bandwidth</p>
          </div>

          <!-- 100% -->
          <div class="progress-item">
            <svg class="ease-progress-circle" style="--ease-progress-value: 100; --ease-progress-color: #10b981; --ease-progress-size: 140px;" viewBox="0 0 100 100">
              <circle class="ease-progress-circle__track" cx="50" cy="50" r="40" />
              <circle class="ease-progress-circle__fill" cx="50" cy="50" r="40" />
              <text class="ease-progress-circle__text" x="50" y="50" alignment-baseline="middle" text-anchor="middle">100%</text>
            </svg>
            <p>Performance</p>
          </div>
        </div>
      </article>

    </section>
  </main>
</body>
</html>
