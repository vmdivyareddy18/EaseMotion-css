<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duotone Filter Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Duotone Effects</h1>
  <div class="duo-grid">
    <div class="duo-card">
      <div class="duo-img-wrap">
        <div class="duo-img" style="background:linear-gradient(135deg,#2563eb,#7c3aed)"></div>
        <div class="duo-overlay" style="background:linear-gradient(135deg,#fcd34d, #ef4444)"></div>
      </div>
      <span class="duo-label">Warm Duotone</span>
    </div>
    <div class="duo-card">
      <div class="duo-img-wrap">
        <div class="duo-img" style="background:linear-gradient(135deg,#059669,#0d9488)"></div>
        <div class="duo-overlay" style="background:linear-gradient(135deg,#6366f1, #a855f7)"></div>
      </div>
      <span class="duo-label">Cool Duotone</span>
    </div>
    <div class="duo-card">
      <div class="duo-img-wrap">
        <div class="duo-img" style="background:linear-gradient(135deg,#e11d48,#be185d)"></div>
        <div class="duo-overlay" style="background:linear-gradient(135deg,#38bdf8, #818cf8)"></div>
      </div>
      <span class="duo-label">Vivid Duotone</span>
    </div>
  </div>
</body>
</html>
