<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-carousel-dots - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-carousel-dots</h1>
    <div class="carousel-dots">
      <input type="radio" name="carousel" id="s1" checked>
      <input type="radio" name="carousel" id="s2">
      <input type="radio" name="carousel" id="s3">
      <input type="radio" name="carousel" id="s4">
      <input type="radio" name="carousel" id="s5">
      <div class="carousel-track">
        <div class="slide slide-1">Slide 1</div>
        <div class="slide slide-2">Slide 2</div>
        <div class="slide slide-3">Slide 3</div>
        <div class="slide slide-4">Slide 4</div>
        <div class="slide slide-5">Slide 5</div>
      </div>
      <div class="dots-nav">
        <label for="s1"></label>
        <label for="s2"></label>
        <label for="s3"></label>
        <label for="s4"></label>
        <label for="s5"></label>
      </div>
    </div>
  </div>
  <script>
    let dotIndex = 1;
    const dotTotal = 5;
    setInterval(() => {
      document.getElementById('s' + (dotIndex + 1)).checked = true;
      dotIndex = (dotIndex + 1) % dotTotal;
    }, 4000);
  </script>
</body>
</html>
