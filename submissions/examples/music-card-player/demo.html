<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Music Player Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-player">
    <div class="ease-player__art-wrap">
      <div class="ease-player__art" id="albumArt">
        <img src="https://placehold.co/200x200/2a2a3a/fff?text=Album" alt="Album cover" />
      </div>
    </div>

    <div class="ease-player__info">
      <div class="ease-player__text">
        <h3 class="ease-player__title">Midnight Waves</h3>
        <p class="ease-player__artist">Nova Sound</p>
      </div>
      <div class="ease-player__eq" id="equalizer">
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="ease-player__progress">
      <div class="ease-player__progress-bar" id="progressBar">
        <div class="ease-player__progress-fill" id="progressFill"></div>
        <div class="ease-player__progress-handle" id="progressHandle"></div>
      </div>
      <div class="ease-player__time">
        <span id="currentTime">0:00</span>
        <span id="totalTime">3:24</span>
      </div>
    </div>

    <div class="ease-player__controls">
      <button class="ease-player__btn" id="prevBtn">⏮</button>
      <button class="ease-player__btn ease-player__btn--play" id="playBtn">▶</button>
      <button class="ease-player__btn" id="nextBtn">⏭</button>
    </div>
  </div>

  <script>
    const art = document.getElementById('albumArt');
    const playBtn = document.getElementById('playBtn');
    const equalizer = document.getElementById('equalizer');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const progressHandle = document.getElementById('progressHandle');

    let playing = false;
    let progress = 0;
    let interval;

    function updateProgress() {
      progressFill.style.width = progress + '%';
      progressHandle.style.left = progress + '%';
      const totalSeconds = 204; // 3:24
      const current = Math.floor((progress / 100) * totalSeconds);
      document.getElementById('currentTime').textContent =
        Math.floor(current / 60) + ':' + String(current % 60).padStart(2, '0');
    }

    playBtn.addEventListener('click', () => {
      playing = !playing;
      playBtn.textContent = playing ? '⏸' : '▶';
      art.classList.toggle('is-spinning', playing);
      equalizer.classList.toggle('is-active', playing);

      if (playing) {
        interval = setInterval(() => {
          progress = Math.min(progress + 0.3, 100);
          updateProgress();
          if (progress >= 100) clearInterval(interval);
        }, 100);
      } else {
        clearInterval(interval);
      }
    });

    progressBar.addEventListener('click', (e) => {
      const rect = progressBar.getBoundingClientRect();
      progress = ((e.clientX - rect.left) / rect.width) * 100;
      updateProgress();
    });
  </script>

</body>
</html>
