<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Timeline Scope Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="timeline-sandbox-canvas ease-timeline-scope">
    <div style="border-bottom: 1px solid #e2e8f0; padding-bottom: 1.25rem; margin-bottom: 1.5rem;">
      <h4 style="margin: 0 0 6px 0; color: #0f172a; font-size: 1.4rem;">Scroll-Driven Animation Matrix</h4>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem; line-height: 1.5;">
        Demonstrates decoupled scroll animations. The <code>timeline-scope</code> allows animations to react to a scroller higher up in the DOM tree, enabling complex reveal effects.
      </p>
    </div>

    <div class="scroll-viewport-box" style="view-timeline: --item-scroll block;">
      <div class="animated-node ease-timeline-element"></div>
      <div class="animated-node ease-timeline-element"></div>
      <div class="animated-node ease-timeline-element"></div>
    </div>
  </div>

</body>
</html>
