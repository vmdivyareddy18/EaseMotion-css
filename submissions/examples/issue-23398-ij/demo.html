<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion Squeeze Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="accordion">
    <div class="left-side">
      <div class="button" style="--i:0"></div>
      <div class="button" style="--i:1"></div>
      <div class="button" style="--i:2"></div>
      <div class="button" style="--i:3"></div>
    </div>
    <div class="bellows">
      <div class="fold" style="--i:0"></div>
      <div class="fold" style="--i:1"></div>
      <div class="fold" style="--i:2"></div>
      <div class="fold" style="--i:3"></div>
      <div class="fold" style="--i:4"></div>
    </div>
    <div class="right-side">
      <div class="piano-key-mini" style="--i:0"></div>
      <div class="piano-key-mini" style="--i:1"></div>
      <div class="piano-key-mini" style="--i:2"></div>
      <div class="piano-key-mini" style="--i:3"></div>
    </div>
  </div>
</body>
</html>
