<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Hamburger Motion - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>☰ CSS Hamburger Motion</h1>
            <p>Beautiful animated hamburger menu icons - Pure CSS!</p>
        </header>

        <div class="hamburger-grid">
            <!-- 1: Classic X -->
            <div class="hamburger-card">
                <h3>Classic X</h3>
                <input type="checkbox" id="ham1" class="ham-toggle">
                <label for="ham1" class="hamburger classic">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 2: Arrow -->
            <div class="hamburger-card">
                <h3>Arrow</h3>
                <input type="checkbox" id="ham2" class="ham-toggle">
                <label for="ham2" class="hamburger arrow">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 3: Squeeze -->
            <div class="hamburger-card">
                <h3>Squeeze</h3>
                <input type="checkbox" id="ham3" class="ham-toggle">
                <label for="ham3" class="hamburger squeeze">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 4: Spin -->
            <div class="hamburger-card">
                <h3>Spin</h3>
                <input type="checkbox" id="ham4" class="ham-toggle">
                <label for="ham4" class="hamburger spin">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 5: Elastic -->
            <div class="hamburger-card">
                <h3>Elastic</h3>
                <input type="checkbox" id="ham5" class="ham-toggle">
                <label for="ham5" class="hamburger elastic">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 6: Collapse -->
            <div class="hamburger-card">
                <h3>Collapse</h3>
                <input type="checkbox" id="ham6" class="ham-toggle">
                <label for="ham6" class="hamburger collapse">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 7: Rotate Arrow -->
            <div class="hamburger-card">
                <h3>Rotate Arrow</h3>
                <input type="checkbox" id="ham7" class="ham-toggle">
                <label for="ham7" class="hamburger rotate-arrow">

            <!-- 8: Slider -->

            <!-- 9: Cross Fade -->
            <div class="hamburger-card">
                <h3>Cross Fade</h3>
                <input type="checkbox" id="ham9" class="ham-toggle">
                <label for="ham9" class="hamburger crossfade">
                    <span></span>
                    <span></span>
                    <span></span>
                </label>
            </div>

            <!-- 10: Neon -->
            <div class="hamburger-card">
                <h3>Neon</h3>
                <input type="checkbox" id="ham10" class="ham-toggle">
                <label for="ham10" class="hamburger neon">
                    <span></span>
                    <span></span>
                    <span></span>

        </div>

        <!-- Features -->
        <section class="section">
            <h2>✨ Features</h2>
            <div class="feature-grid">
                <div class="feature-item">☰ 10 icon styles</div>
