<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Product Card with Quick View</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="product-card">

    <div class="product-image">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=700" alt="Sneakers">

        <div class="quick-view">
            <h3>Nike Air Max</h3>
            <p>
                Lightweight running shoes with breathable mesh,
                premium cushioning and all-day comfort.
            </p>

            <div class="colors">
                <span class="color red"></span>
                <span class="color blue"></span>
                <span class="color black"></span>
            </div>

            <div class="sizes">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>10</button>
            </div>

            <button class="cart-btn">
                Add to Cart
            </button>
        </div>
    </div>

    <div class="product-info">
        <h2>Nike Air Max</h2>
        <p class="price">$129.99</p>
    </div>

</div>

</body>
</html>
