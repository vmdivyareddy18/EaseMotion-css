<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Button Hover Animations Showcase</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background-color: #0b0f19; /* dark background */
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 600px;
      width: 100%;
      background: #141e33; /* deep blue card */
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      text-align: center;
    }
    h1 {
      font-size: 24px;
      margin-top: 0;
      margin-bottom: 8px;
    }
    p {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 480px) {
      .demo-grid {
        grid-template-columns: 1fr;
      }
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #334155;
    }
    .label {
      font-size: 11px;
      font-family: monospace;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Button Hover Animations</h1>
    <p>Interactive, lightweight, and focused hover effects to enhance visual design.</p>
    
    <div class="demo-grid">
      <!-- 1. Icon Glide -->
      <div class="demo-item">
        <div class="label">// Icon Glide</div>
        <button class="btn-hover-demo icon-glide">
          Download <span class="icon">→</span>
        </button>
      </div>

      <!-- 2. Border Draw -->
      <div class="demo-item">
        <div class="label">// Border Draw</div>
        <button class="btn-hover-demo border-draw">
          Border Draw
        </button>
      </div>

      <!-- 3. Animated Gradient -->
      <div class="demo-item">
        <div class="label">// Gradient Shimmer</div>
        <button class="btn-hover-demo animated-gradient">
          Gradient Button
        </button>
      </div>

      <!-- 4. Neon Glow -->
      <div class="demo-item">
        <div class="label">// Neon Glow</div>
        <button class="btn-hover-demo neon-glow">
          Neon Glow
        </button>
      </div>
    </div>
  </div>
</body>
</html>
