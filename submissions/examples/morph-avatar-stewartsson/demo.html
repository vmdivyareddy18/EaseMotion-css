<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Dashboard - Morph Avatar Component Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-container">
        <div class="profile-card-node">
            <div class="avatar-workspace">
                <!-- Hardened Morphing Avatar Frame Infrastructure Element -->
                <div class="morph-avatar-shell">
                    <img src="https://unsplash.com" alt="Active User Profile" class="avatar-image">
                    <div class="status-indicator online"></div>
                </div>
            </div>

            <div class="profile-meta-layer">
                <h2 class="user-fullname">Sarah Jenkins</h2>
                <p class="user-role-tier">Lead Cloud Architect</p>
            </div>

            <!-- Interactivity System Showcase Grid Controls Matrix -->
            <div class="system-status-row">
                <div class="status-node">
                    <span class="node-label">Staking Platform</span>
                    <span class="node-value passing">Active Core</span>
                </div>
                <div class="status-node">
                    <span class="node-label">Security Tier</span>
                    <span class="node-value priority">Level 3</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
