<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS-only Skeleton Loading States Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    :root {
      --ease-color-neutral-100: #f1f5f9;
      --ease-color-neutral-200: #e2e8f0;
      --ease-color-neutral-600: #475569;
      --ease-color-neutral-700: #334155;
      --ease-radius-md: 8px;
      --ease-radius-full: 999px;
    }

    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .demo-card {
      background: white;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      width: 260px;
    }

    .demo-card h3 {
      margin: 0 0 0.85rem;
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .demo-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .avatar-size {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <!-- Pulse variant -->
  <div class="demo-card">
    <h3>Pulse (Profile Card)</h3>
    <div class="demo-row">
      <div class="ease-skeleton ease-skeleton-circle avatar-size"></div>
      <div class="demo-col">
        <div class="ease-skeleton ease-skeleton-text" style="width: 80%;"></div>
        <div class="ease-skeleton ease-skeleton-text" style="width: 55%;"></div>
      </div>
    </div>
    <div class="ease-skeleton ease-skeleton-text" style="margin-bottom: 0.5rem;"></div>
    <div class="ease-skeleton ease-skeleton-text" style="width: 90%; margin-bottom: 0.85rem;"></div>
    <div class="ease-skeleton ease-skeleton-btn"></div>
  </div>

  <!-- Shimmer variant -->
  <div class="demo-card ease-skeleton-shimmer">
    <h3>Shimmer (Profile Card)</h3>
    <div class="demo-row">
      <div class="ease-skeleton ease-skeleton-circle avatar-size"></div>
      <div class="demo-col">
        <div class="ease-skeleton ease-skeleton-text" style="width: 80%;"></div>
        <div class="ease-skeleton ease-skeleton-text" style="width: 55%;"></div>
      </div>
    </div>
    <div class="ease-skeleton ease-skeleton-text" style="margin-bottom: 0.5rem;"></div>
    <div class="ease-skeleton ease-skeleton-text" style="width: 90%; margin-bottom: 0.85rem;"></div>
    <div class="ease-skeleton ease-skeleton-btn"></div>
  </div>

</body>
</html>
