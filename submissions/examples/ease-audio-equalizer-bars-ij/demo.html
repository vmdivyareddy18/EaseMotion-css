<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Equalizer Bars - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Audio Equalizer</h1>
    <div class="eq-card">
      <div class="eq-visual" id="eqVisual">
        <div class="eq-bar" style="--eq-h: 0.6; --eq-d: 0s;"></div>
        <div class="eq-bar" style="--eq-h: 0.8; --eq-d: 0.1s;"></div>
        <div class="eq-bar" style="--eq-h: 0.4; --eq-d: 0.2s;"></div>
        <div class="eq-bar" style="--eq-h: 0.9; --eq-d: 0.3s;"></div>
        <div class="eq-bar" style="--eq-h: 0.5; --eq-d: 0.4s;"></div>
        <div class="eq-bar" style="--eq-h: 0.7; --eq-d: 0.5s;"></div>
        <div class="eq-bar" style="--eq-h: 0.3; --eq-d: 0.6s;"></div>
        <div class="eq-bar" style="--eq-h: 0.85; --eq-d: 0.7s;"></div>
        <div class="eq-bar" style="--eq-h: 0.55; --eq-d: 0.8s;"></div>
        <div class="eq-bar" style="--eq-h: 0.75; --eq-d: 0.9s;"></div>
      </div>
      <button class="eq-toggle" id="eqToggle">Pause</button>
    </div>
    <p class="description">Bars animate to random heights. CSS controls height and color via <code>--eq-h</code> (height) and <code>--eq-d</code> (delay).</p>
  </div>
  <script>
    const bars = document.querySelectorAll('.eq-bar');
    const toggle = document.getElementById('eqToggle');
    let running = true;
    let interval;

    function randomize() {
      bars.forEach(bar => {
        const h = 0.2 + Math.random() * 0.8;
        bar.style.setProperty('--eq-h', h);
      });
    }

    interval = setInterval(randomize, 400);

    toggle.addEventListener('click', () => {
      running = !running;
      toggle.textContent = running ? 'Pause' : 'Play';
      if (running) {
        interval = setInterval(randomize, 400);
      } else {
        clearInterval(interval);
      }
    });
  </script>
</body>
</html>
