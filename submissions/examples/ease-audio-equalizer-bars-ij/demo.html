<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Equalizer Bars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="eq-container">
    <h1>Audio Equalizer Bars</h1>
    <div class="eq-visualizer">
      <div class="eq-bar" style="--i:0; --c:#ff6b6b;"></div>
      <div class="eq-bar" style="--i:1; --c:#ffa94d;"></div>
      <div class="eq-bar" style="--i:2; --c:#ffd43b;"></div>
      <div class="eq-bar" style="--i:3; --c:#69db7c;"></div>
      <div class="eq-bar" style="--i:4; --c:#38d9a9;"></div>
      <div class="eq-bar" style="--i:5; --c:#4dabf7;"></div>
      <div class="eq-bar" style="--i:6; --c:#748ffc;"></div>
      <div class="eq-bar" style="--i:7; --c:#9775fa;"></div>
      <div class="eq-bar" style="--i:8; --c:#da77f2;"></div>
      <div class="eq-bar" style="--i:9; --c:#f783ac;"></div>
    </div>
    <button class="eq-toggle" id="eqToggle">Stop</button>
  </div>
  <script>
    const toggle = document.getElementById('eqToggle');
    const bars = document.querySelectorAll('.eq-bar');
    let running = true;
    toggle.addEventListener('click', () => {
      running = !running;
      toggle.textContent = running ? 'Stop' : 'Start';
      bars.forEach(b => b.classList.toggle('paused', !running));
    });
  </script>
</body>
</html>
