<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Archive Box Seal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Archive Box Seal</h1>

    <p class="intro">
      A reusable archive animation for document management systems,
      cloud storage platforms, backup tools, and productivity apps.
    </p>

    <div class="demo-grid">

      <div class="archive-card">
        <div class="archive-box">
          <span class="document">📄</span>
          <span class="box">📦</span>
        </div>
        <h3>Archive Complete</h3>
      </div>

      <div class="archive-card">
        <div class="archive-box large">
          <span class="document">📄</span>
          <span class="box">📦</span>
        </div>
        <p>File Stored</p>
      </div>

      <div class="archive-card">
        <div class="archive-box">
          <span class="document">📄</span>
          <span class="box">📦</span>
        </div>
        <button>Archive</button>
      </div>

    </div>

  </main>

</body>
</html>
