<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Git Graph</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <figure class="gg">
    <figcaption class="gg-title">
      <span class="gg-dot dot-main"></span> main
      <span class="gg-dot dot-feat"></span> feature
    </figcaption>

    <div class="gg-body">
      <svg class="gg-lines" viewBox="0 0 70 250" aria-hidden="true">
        <path class="ln main" d="M20 22 V222" />
        <path class="ln feat" d="M20 62 C20 92 50 82 50 108 V150 C50 178 20 198 20 222" />
        <circle class="node main" cx="20" cy="22" r="7" />
        <circle class="node main" cx="20" cy="62" r="7" />
        <circle class="node feat" cx="50" cy="108" r="7" />
        <circle class="node feat" cx="50" cy="150" r="7" />
        <circle class="node main" cx="20" cy="192" r="7" />
        <circle class="node merge" cx="20" cy="222" r="7" />
      </svg>

      <ul class="gg-log">
        <li style="--y: 22px;"><b>a1c9f2</b> Initial commit</li>
        <li style="--y: 62px;"><b>7d3e10</b> Add README and license</li>
        <li style="--y: 108px;"><b>b52a8c</b> Start search feature</li>
        <li style="--y: 150px;"><b>c9f047</b> Wire up results list</li>
        <li style="--y: 192px;"><b>2e6b1d</b> Fix header spacing</li>
        <li style="--y: 222px;"><b>f10ab7</b> Merge feature into main</li>
      </ul>
    </div>
  </figure>
</body>
</html>
