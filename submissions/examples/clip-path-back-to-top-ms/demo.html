<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Path Back to Top</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 200vh; background: #fffbeb; font-family: system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50vh;">
  
  <h1 style="color: #ea580c; text-align: center;">Scroll Down to See the Button</h1>
  <p style="color: #d97706; text-align: center;">Keep going...</p>
  
  <!-- Back to Top Button -->
  <a href="#" class="back-to-top" aria-label="Back to top">
    <div class="clip-bg ease-slide-up"></div>
    <div class="icon-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 19V5"></path>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </div>
  </a>

</body>
</html>
