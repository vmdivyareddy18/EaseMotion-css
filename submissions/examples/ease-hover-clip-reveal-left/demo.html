<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Reveal Left — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Clip Reveal Left</h1>
  <p class="subtitle">Content reveals from left to right on hover — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the card to reveal content from the left</p>
    <div class="clip-card"><div class="clip-content"><h3>Welcome</h3><p>Hover to reveal</p></div></div>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>A <code>clip-path: inset()</code> animates from <code>0 100% 0 0</code> to <code>0 0 0 0</code> on hover, revealing content from left to right.</p>
  </section>
</body>
</html>
