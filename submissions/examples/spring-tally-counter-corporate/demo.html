<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Tally Counter - Corporate Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="corporate-viewport">
        <div class="counter-display-card">
            <span class="corporate-badge">ENTERPRISE ANALYTICS</span>
            
            <div class="tally-box">
                <div class="digit-strip-wrapper">
                    <div class="digit-column" style="--digit-target: -500px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <div class="digit-column" style="--digit-target: -200px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <div class="digit-column" style="--digit-target: -800px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                    <div class="digit-column" style="--digit-target: -400px;">
                        <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
                    </div>
                </div>
            </div>
            
            <div class="counter-meta">
                <p class="status-indicator">TOTAL TRANSACTIONS PROCESSED</p>
            </div>
        </div>
    </div>

</body>
</html>
