<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-ripple Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            background: #0f0f0f;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }

        h1 {
            color: #f1f1f1;
            font-size: 1.5rem;
            margin: 0;
        }

        p.hint {
            color: #6c7086;
            font-size: 0.85rem;
            margin: 0;
        }

        .row {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-primary {
            background: #6c63ff;
            color: #fff;
        }

        .btn-success {
            background: #22c55e;
            color: #fff;
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
        }

        .card {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #313244;
            border-radius: 1rem;
            padding: 2rem 2.5rem;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .card span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .card p {
            margin: 0;
            font-size: 0.85rem;
            color: #a6adc8;
        }

        /* Dark ripple color for light backgrounds */
        .dark-ripple {
            --ease-ripple-color: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <h1>ease-ripple Demo</h1>
    <p class="hint">Click or tap any element</p>

    <div class="row">
        <button class="btn btn-primary ease-ripple">Primary Button</button>
        <button class="btn btn-success ease-ripple">Success Button</button>
        <button class="btn btn-danger ease-ripple" style="--ease-ripple-duration: 0.8s;">Slow Ripple</button>
    </div>

    <div class="row">
        <div class="card ease-ripple">
            <span>🃏</span>
            <p>Ripple Card</p>
        </div>
        <div class="card ease-ripple" style="--ease-ripple-color: rgba(108, 99, 255, 0.5);">
            <span>💜</span>
            <p>Purple Ripple</p>
        </div>
    </div>
</body>

</html>
