<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <button onclick="showToast('success')">Success Toast</button>
    <button onclick="showToast('error')">Error Toast</button>
    <button onclick="showToast('warning')">Warning Toast</button>
  </div>

  <div id="toast-container"></div>

  <script>
    function showToast(type) {
      const container = document.getElementById("toast-container");

      const toast = document.createElement("div");
      toast.classList.add("toast-pr");

      if (type === "success") {
        toast.classList.add("toast-success-pr");
        toast.innerText = "Profile updated successfully!";
      }

      if (type === "error") {
        toast.classList.add("toast-error-pr");
        toast.innerText = "Something went wrong!";
      }

      if (type === "warning") {
        toast.classList.add("toast-warning-pr");
        toast.innerText = "Password will expire soon!";
      }

      container.appendChild(toast);

      setTimeout(() => {
        toast.classList.add("hide");
      }, 3000);

      setTimeout(() => {
        toast.remove();
      }, 3500);
    }
  </script>

</body>
</html>
