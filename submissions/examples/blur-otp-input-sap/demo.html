<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur OTP Input Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="music-player-bg">

  <div class="otp-container-sap">
    <h2 class="otp-title-sap">TRACK VERIFICATION</h2>
    <p class="otp-subtitle-sap">Enter the 4-digit security key sent to your device</p>
    
    <div class="otp-fields-sap">
      <input type="text" maxlength="1" pattern="\d*" placeholder=" " class="otp-field-sap" aria-label="Digit 1" autocomplete="one-time-code" required />
      <input type="text" maxlength="1" pattern="\d*" placeholder=" " class="otp-field-sap" aria-label="Digit 2" required />
      <input type="text" maxlength="1" pattern="\d*" placeholder=" " class="otp-field-sap" aria-label="Digit 3" required />
      <input type="text" maxlength="1" pattern="\d*" placeholder=" " class="otp-field-sap" aria-label="Digit 4" required />
    </div>

    <button type="button" class="otp-submit-sap">VERIFY AUDIOSTREAM</button>
  </div>

</body>
</html>
