<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Switcher Grid</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <article class="card" style="--grid-bg: #24242a; --item-bg: #2e2e38; --switch-duration: 0.4s; --gap-size: 12px">
    <div class="card-header">
      <h2>Layout Switcher</h2>
      <div class="switcher">
        <button data-cols="2" class="sw-btn active">2×2</button>
        <button data-cols="3" class="sw-btn">3×3</button>
        <button data-cols="4" class="sw-btn">4×4</button>
      </div>
    </div>
    <div class="grid-container" id="grid">
      <div class="grid-item" style="--item-order: 1">A</div>
      <div class="grid-item" style="--item-order: 2">B</div>
      <div class="grid-item" style="--item-order: 3">C</div>
      <div class="grid-item" style="--item-order: 4">D</div>
      <div class="grid-item" style="--item-order: 5">E</div>
      <div class="grid-item" style="--item-order: 6">F</div>
      <div class="grid-item" style="--item-order: 7">G</div>
      <div class="grid-item" style="--item-order: 8">H</div>
      <div class="grid-item" style="--item-order: 9">I</div>
      <div class="grid-item" style="--item-order: 10">J</div>
      <div class="grid-item" style="--item-order: 11">K</div>
      <div class="grid-item" style="--item-order: 12">L</div>
    </div>
  </article>
  <script>
    const grid = document.getElementById('grid');
    const btns = document.querySelectorAll('.sw-btn');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        grid.style.setProperty('--cols', btn.dataset.cols);
      });
    });

    grid.style.setProperty('--cols', '2');
  </script>
</body>
</html>
