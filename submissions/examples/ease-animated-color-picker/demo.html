<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <div class="card">

<h2>Color Picker</h2>

<p>Choose a color and copy its HEX value.</p>

<div class="preview" id="preview"></div>

<input type="color" id="picker" value="#6366F1">

<div class="hex" id="hex">#6366F1</div>

<button onclick="copyColor()">Copy HEX</button>

</div>
<script>

const picker=document.getElementById("picker");

const preview=document.getElementById("preview");

const hex=document.getElementById("hex");

picker.addEventListener("input",()=>{

preview.style.background=picker.value;

preview.style.boxShadow=`0 0 35px ${picker.value}88`;

preview.animate([

{transform:"scale(.92)"},

{transform:"scale(1.08)"},

{transform:"scale(1)"}

],{

duration:350,

easing:"ease-out"

});

hex.textContent=picker.value.toUpperCase();

});

function copyColor(){

navigator.clipboard.writeText(picker.value);

const btn=document.querySelector("button");

btn.textContent="Copied ✓";

setTimeout(()=>{

btn.textContent="Copy HEX";

},1200);

}

</script>
</body>
</html>
