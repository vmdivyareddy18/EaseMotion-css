<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Number Flip Counter</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='flip-bg')r.style.setProperty('--flip-bg',t.value);if(t.name==='flip-color')r.style.setProperty('--flip-color',t.value);if(t.name==='flip-duration')r.style.setProperty('--flip-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const ds=document.querySelectorAll('.digit');const btn=document.querySelector('.flip-btn');let val=0;btn.addEventListener('click',()=>{val++;const s=String(val).padStart(3,'0');ds.forEach((d,i)=>{d.textContent=s[i];d.style.animation='none';void d.offsetHeight;d.style.animation='digitFlip var(--flip-duration,0.6s) ease-out'})})})
</script>
<div class="container"><p class="title">Number Flip Counter</p><div class="flip-display"><div class="digit">0</div><div class="digit">0</div><div class="digit">0</div></div><button class="flip-btn">Count +1</button>
<div class="controls"><label>BG: <input type="color" name="flip-bg" value="#2d2d44"></label><label>Digit: <input type="color" name="flip-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="flip-duration" min="0.2" max="1.2" step="0.05" value="0.6"></label></div></div></body></html>
