<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hover Ripple Effect Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            gap: 20px;
        }
        h1 { color: #333; }
        .demo-button {
            padding: 15px 40px;
            font-size: 1.2rem;
            color: #fff;
            background-color: #6200ea;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>Hover Ripple Animation</h1>
    <!-- Replace [your-github-username] with your actual username -->
    <button class="demo-button ease-hover-ripple-[your-github-username]">
        Hover Me!
    </button>
</body>
</html>
