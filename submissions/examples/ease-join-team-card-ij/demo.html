<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join Team Card | EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="component-wrapper">
    <div class="join-card">
      <div class="join-card__header">
        <h2 class="join-card__title">Join the Team</h2>
        <p class="join-card__subtitle">Meet your future colleagues</p>
      </div>
      <div class="join-card__avatars">
        <div class="join-card__avatar" style="--i: 0">
          <img src="https://i.pravatar.cc/80?img=1" alt="Alex" />
          <span class="join-card__tooltip">Alex Rivera</span>
        </div>
        <div class="join-card__avatar" style="--i: 1">
          <img src="https://i.pravatar.cc/80?img=5" alt="Jordan" />
          <span class="join-card__tooltip">Jordan Chen</span>
        </div>
        <div class="join-card__avatar" style="--i: 2">
          <img src="https://i.pravatar.cc/80?img=9" alt="Sam" />
          <span class="join-card__tooltip">Sam Patel</span>
        </div>
        <div class="join-card__avatar" style="--i: 3">
          <img src="https://i.pravatar.cc/80?img=12" alt="Morgan" />
          <span class="join-card__tooltip">Morgan Kim</span>
        </div>
        <div class="join-card__avatar" style="--i: 4">
          <img src="https://i.pravatar.cc/80?img=20" alt="Taylor" />
          <span class="join-card__tooltip">Taylor Ng</span>
        </div>
      </div>
      <div class="join-card__actions">
        <button class="join-card__btn">Join Now</button>
      </div>
    </div>
  </div>
</body>
</html>
