<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Ticket Booking Progress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-ticket-wrapper">
    <div class="ease-ticket-card">
      <h2 class="ease-ticket-title">🎫 Book Your Ticket</h2>
      <div class="ease-ticket-progress">
        <div class="ease-ticket-step ease-ticket-step-active" data-step="1">
          <div class="ease-ticket-step-circle">1</div>
          <span class="ease-ticket-step-label">Seat</span>
        </div>
        <div class="ease-ticket-line" id="line1"></div>
        <div class="ease-ticket-step" data-step="2">
          <div class="ease-ticket-step-circle">2</div>
          <span class="ease-ticket-step-label">Payment</span>
        </div>
        <div class="ease-ticket-line" id="line2"></div>
        <div class="ease-ticket-step" data-step="3">
          <div class="ease-ticket-step-circle">3</div>
          <span class="ease-ticket-step-label">Confirm</span>
        </div>
      </div>
      <button class="ease-ticket-next-btn" id="nextBtn">Next Step</button>
    </div>
  </div>
  <script>
    let currentStep = 1;
    const steps = document.querySelectorAll('.ease-ticket-step');
    const lines = document.querySelectorAll('.ease-ticket-line');
    const btn = document.getElementById('nextBtn');

    btn.addEventListener('click', () => {
      if (currentStep >= 3) {
        currentStep = 1;
        steps.forEach(s => { s.classList.remove('ease-ticket-step-active', 'ease-ticket-step-done'); });
        lines.forEach(l => l.classList.remove('ease-ticket-line-filled'));
        steps[0].classList.add('ease-ticket-step-active');
        btn.textContent = 'Next Step';
        return;
      }
      steps[currentStep - 1].classList.remove('ease-ticket-step-active');
      steps[currentStep - 1].classList.add('ease-ticket-step-done');
      lines[currentStep - 1].classList.add('ease-ticket-line-filled');
      currentStep++;
      steps[currentStep - 1].classList.add('ease-ticket-step-active');
      if (currentStep === 3) btn.textContent = 'Confirm Booking';
    });
  </script>
</body>
</html>
