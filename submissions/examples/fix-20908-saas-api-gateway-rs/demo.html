<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS API Gateway & Rate Limiting</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="api-container">
        <div class="api-header">
            <h1>Ultimate <span class="gradient-blue">API Control</span></h1>
            <p>Protect your backend infrastructure with intelligent rate limiting, dynamic routing, and real-time analytics. Built for high-throughput microservices.</p>
        </div>

        <div class="data-flow-visual">
            <div class="client-nodes">
                <div class="node pulse" style="--d: 0s">📱</div>
                <div class="node pulse" style="--d: 0.5s">💻</div>
                <div class="node pulse" style="--d: 1s">🌐</div>
            </div>

            <div class="requests-flow">
                <div class="packet p-1"></div>
                <div class="packet p-2"></div>
                <div class="packet p-3"></div>
                <div class="packet p-4 blocked"></div>
                <div class="packet p-5"></div>
            </div>

            <div class="gateway-node">
                <div class="shield-icon">🛡️</div>
                <div class="gateway-text">API Gateway</div>
                <div class="rate-limit-alert">Rate Limit Reached</div>
            </div>

            <div class="requests-flow secure-flow">
                <div class="packet p-secure-1"></div>
                <div class="packet p-secure-2"></div>
            </div>

            <div class="server-nodes">
                <div class="server">
                    <div class="led blink"></div>
                    DB Cluster
                </div>
            </div>
        </div>
    </div>
</body>
</html>
