<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotate on Hover Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Rotate on Hover</h1>
        <p class="subtitle">Icon spins on interaction</p>

        <!-- ROTATE ON HOVER COMPONENT -->
        <div class="rotate-container">
            <div class="rotate-wrapper">
                <!-- Basic Examples -->
                <div class="rotate-section">
                    <h3>Basic Rotation</h3>
                    <div class="rotate-grid">
                        <div class="rotate-item rotate-90">
                            <span class="rotate-icon">↻</span>
                            <span class="rotate-label">90°</span>
                        </div>
                        <div class="rotate-item rotate-180">
                            <span class="rotate-icon">↻</span>
                            <span class="rotate-label">180°</span>
                        </div>
                        <div class="rotate-item rotate-360">
                            <span class="rotate-icon">↻</span>
                            <span class="rotate-label">360°</span>
                        </div>
                        <div class="rotate-item rotate-custom">
                            <span class="rotate-icon">↻</span>
                            <span class="rotate-label">Custom</span>
                        </div>
                    </div>
                </div>

                <!-- Icons Examples -->
                <div class="rotate-section">
                    <h3>Icon Examples</h3>
                    <div class="rotate-grid">
                        <div class="rotate-item icon-rotate">
                            <span class="rotate-icon">⚙️</span>
                            <span class="rotate-label">Settings</span>
                        </div>
                        <div class="rotate-item icon-rotate">
                            <span class="rotate-icon">🔄</span>
                            <span class="rotate-label">Sync</span>
                        </div>
                        <div class="rotate-item icon-rotate">
                            <span class="rotate-icon">↺</span>
                            <span class="rotate-label">Refresh</span>
                        </div>
                        <div class="rotate-item icon-rotate">
                            <span class="rotate-icon">⬆</span>
                            <span class="rotate-label">Upload</span>
                        </div>
                    </div>
                </div>

                <!-- Advanced Examples -->
                <div class="rotate-section">
                    <h3>Advanced Variations</h3>
                    <div class="rotate-grid advanced">
                        <div class="rotate-item rotate-bounce">
                            <span class="rotate-icon">🎯</span>
                            <span class="rotate-label">Bounce</span>
                        </div>
                        <div class="rotate-item rotate-elastic">
                            <span class="rotate-icon">💫</span>
                            <span class="rotate-label">Elastic</span>
                        </div>
                        <div class="rotate-item rotate-slow">
                            <span class="rotate-icon">🐢</span>
                            <span class="rotate-label">Slow</span>
                        </div>
                        <div class="rotate-item rotate-fast">
                            <span class="rotate-icon">🚀</span>
                            <span class="rotate-label">Fast</span>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="rotate-controls">
                    <button class="rotate-btn" id="toggleRotationBtn">⏸ Toggle Rotation</button>
                    <button class="rotate-btn" id="resetAllBtn">⟳ Reset All</button>
                    <button class="rotate-btn" id="toggleDirectionBtn">🔄 Toggle Direction</button>
                </div>

                <div class="rotate-status">
                    <span class="status-label">Rotation:</span>
                    <span class="status-value" id="rotationStatus">Active</span>
                    <span class="status-label">Direction:</span>
                    <span class="status-value" id="directionStatus">Clockwise</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-icon rotate-90">➡️</div>
                    <span class="variant-label">90°</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-icon rotate-180">➡️</div>
                    <span class="variant-label">180°</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-icon rotate-360">➡️</div>
                    <span class="variant-label">360°</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-icon rotate-bounce">➡️</div>
                    <span class="variant-label">Bounce</span>
                </div>
                <div class="variant-card" id="variant5">
                    <div class="variant-icon rotate-elastic">➡️</div>
                    <span class="variant-label">Elastic</span>
                </div>
                <div class="variant-card" id="variant6">
                    <div class="variant-icon rotate-slow">➡️</div>
                    <span class="variant-label">Slow</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const rotationStatus = document.getElementById('rotationStatus');
            const directionStatus = document.getElementById('directionStatus');
            const toggleRotationBtn = document.getElementById('toggleRotationBtn');
            const resetAllBtn = document.getElementById('resetAllBtn');
            const toggleDirectionBtn = document.getElementById('toggleDirectionBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                enabled: true,
                direction: 'clockwise', // 'clockwise' or 'counter-clockwise'
                duration: 0.6, // seconds
                easing: 'cubic-bezier(0.34, 1.56, 0.64, 1)',
                onToggle: function(enabled) {
                    console.log(`🔄 Rotation ${enabled ? 'enabled' : 'disabled'}`);
                },
                onDirectionChange: function(direction) {
                    console.log(`🔄 Direction: ${direction}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isEnabled = CONFIG.enabled;
            let currentDirection = CONFIG.direction;

            // ============================================
            // ROTATION FUNCTIONS
            // ============================================
            function updateRotation() {
                const rotateItems = document.querySelectorAll('.rotate-item');
                const variantIcons = document.querySelectorAll('.variant-icon');
                
                // Update rotate items
                rotateItems.forEach(item => {
                    if (isEnabled) {
                        item.classList.remove('rotation-disabled');
                    } else {
                        item.classList.add('rotation-disabled');
                    }
                });
                
                // Update variant icons
                variantIcons.forEach(icon => {
                    if (isEnabled) {
                        icon.classList.remove('rotation-disabled');
                    } else {
                        icon.classList.add('rotation-disabled');
                    }
                });
                
                // Update status
                rotationStatus.textContent = isEnabled ? 'Active' : 'Paused';
                rotationStatus.style.color = isEnabled ? '#34c759' : '#ff3b30';
                directionStatus.textContent = currentDirection === 'clockwise' ? 'Clockwise' : 'Counter-Clockwise';
                
                // Update toggle button
                toggleRotationBtn.textContent = isEnabled ? '⏸ Toggle Rotation' : '▶ Toggle Rotation';
                
                CONFIG.onToggle(isEnabled);
            }

            function toggleRotation() {
                isEnabled = !isEnabled;
                updateRotation();
            }

            function toggleDirection() {
                currentDirection = currentDirection === 'clockwise' ? 'counter-clockwise' : 'clockwise';
                
                // Update all rotate items
                document.querySelectorAll('.rotate-item, .variant-icon').forEach(el => {
                    el.style.setProperty('--rotate-direction', currentDirection === 'clockwise' ? '1' : '-1');
                });
                
                directionStatus.textContent = currentDirection === 'clockwise' ? 'Clockwise' : 'Counter-Clockwise';
                CONFIG.onDirectionChange(currentDirection);
            }

            function resetAll() {
                // Reset all rotate items to default state
                document.querySelectorAll('.rotate-item').forEach(item => {
                    const icon = item.querySelector('.rotate-icon');
                    if (icon) {
                        icon.style.transition = 'none';
                        icon.style.transform = 'rotate(0deg)';
                        // Force reflow
                        void icon.offsetWidth;
                        icon.style.transition = '';
                    }
                });
                
                document.querySelectorAll('.variant-icon').forEach(icon => {
                    icon.style.transition = 'none';
                    icon.style.transform = 'rotate(0deg)';
                    void icon.offsetWidth;
                    icon.style.transition = '';
                });
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            toggleRotationBtn.addEventListener('click', toggleRotation);
            resetAllBtn.addEventListener('click', resetAll);
            toggleDirectionBtn.addEventListener('click', toggleDirection);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'r' && e.ctrlKey) {
                    e.preventDefault();
                    toggleRotation();
                }
                if (e.key === 'd' && e.ctrlKey) {
                    e.preventDefault();
                    toggleDirection();
                }
                if (e.key === 'Escape') {
                    resetAll();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const icon = card.querySelector('.variant-icon');
                
                // Click to reset just this variant
                card.addEventListener('click', function(e) {
                    if (e.target === icon || e.target === card) {
                        icon.style.transition = 'none';
                        icon.style.transform = 'rotate(0deg)';
                        void icon.offsetWidth;
                        icon.style.transition = '';
                    }
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.RotateHover = {
                toggle: toggleRotation,
                toggleDirection: toggleDirection,
                reset: resetAll,
                isEnabled: () => isEnabled,
                getDirection: () => currentDirection,
                getState: () => ({
                    enabled: isEnabled,
                    direction: currentDirection
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.direction) {
                        currentDirection = config.direction;
                    }
                    if (config.enabled !== undefined) {
                        isEnabled = config.enabled;
                    }
                    updateRotation();
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial direction for all elements
            document.querySelectorAll('.rotate-item, .variant-icon').forEach(el => {
                el.style.setProperty('--rotate-direction', currentDirection === 'clockwise' ? '1' : '-1');
            });
            
            updateRotation();

            console.log('✅ Rotate on Hover initialized!');
            console.log('📖 API: window.RotateHover');
            console.log('📖 Usage:');
            console.log('  - Hover over icons to see rotation');
            console.log('  - Keyboard shortcuts: Ctrl+R (toggle), Ctrl+D (direction), Escape (reset)');
            console.log('  - Click variant cards to reset individual icons');

        })();
    </script>
</body>
</html>
