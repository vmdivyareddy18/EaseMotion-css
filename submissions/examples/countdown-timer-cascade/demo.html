<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Countdown Timer Display - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 900px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .launch-message {
      color: #667eea;
      font-size: 1.25rem;
      margin-top: 2rem;
      font-weight: 500;
    }

    .target-date {
      color: #764ba2;
      font-size: 1rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Launch Countdown</h1>
    <p class="subtitle">Something amazing is coming soon</p>
    
    <div class="countdown-wrapper">
      <div class="countdown-block">
        <span class="digit" id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="countdown-block">
        <span class="digit" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="countdown-block">
        <span class="digit" id="minutes">00</span>
        <span class="label">Minutes</span>
      </div>
      <div class="countdown-block">
        <span class="digit" id="seconds">00</span>
        <span class="label">Seconds</span>
      </div>
    </div>

    <p class="launch-message">Launching in...</p>
    <p class="target-date" id="target-date"></p>
  </div>

  <script>
    // Set target date to 7 days from now
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 7);
    
    // Display target date
    document.getElementById('target-date').textContent = targetDate.toLocaleDateString('en-US', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    // Previous values to detect changes
    const previousValues = {
      days: '',
      hours: '',
      minutes: '',
      seconds: ''
    };

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate.getTime() - now;

      if (distance < 0) {
        document.getElementById('days').textContent = '00';
        document.getElementById('hours').textContent = '00';
        document.getElementById('minutes').textContent = '00';
        document.getElementById('seconds').textContent = '00';
        document.querySelector('.launch-message').textContent = '🎉 Launch Day!';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Update digits with flip animation if value changed
      updateDigitWithFlip('days', days, previousValues.days);
      updateDigitWithFlip('hours', hours, previousValues.hours);
      updateDigitWithFlip('minutes', minutes, previousValues.minutes);
      updateDigitWithFlip('seconds', seconds, previousValues.seconds);

      // Store current values
      previousValues.days = days;
      previousValues.hours = hours;
      previousValues.minutes = minutes;
      previousValues.seconds = seconds;
    }

    function updateDigitWithFlip(elementId, newValue, previousValue) {
      const element = document.getElementById(elementId);
      const formattedValue = String(newValue).padStart(2, '0');
      
      if (String(newValue) !== String(previousValue)) {
        element.classList.remove('flip');
        // Trigger reflow to restart animation
        void element.offsetWidth;
        element.classList.add('flip');
      }
      
      element.textContent = formattedValue;
    }

    // Initial update
    updateCountdown();
    
    // Update every second
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
