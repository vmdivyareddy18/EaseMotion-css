<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Before/After Slider - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Before & After Comparison</h1>
      <p>Drag the slider to see the transformation.</p>
    </header>

    <!-- Comparison Slider -->
    <div class="comparison-container ease-fade-in-up ease-delay-100">
      
      <!-- Before Image -->
      <div class="comparison-image before-image">
        <div class="image-placeholder before-placeholder">
          <span class="placeholder-icon">🌫️</span>
          <span class="placeholder-text">Before</span>
        </div>
      </div>

      <!-- After Image -->
      <div class="comparison-image after-image">
        <div class="image-placeholder after-placeholder">
          <span class="placeholder-icon">✨</span>
          <span class="placeholder-text">After</span>
        </div>
      </div>

      <!-- Slider Handle -->
      <div class="slider-handle ease-bounce-in ease-delay-300" id="slider-handle">
        <div class="handle-line"></div>
        <div class="handle-circle">
          <span class="handle-arrows">⇆</span>
        </div>
      </div>

      <!-- Labels -->
      <div class="comparison-labels">
        <span class="label label-before ease-fade-in-left ease-delay-400">Before</span>
        <span class="label label-after ease-fade-in-right ease-delay-400">After</span>
      </div>

    </div>

    <!-- Instructions -->
    <div class="instructions ease-fade-in-up ease-delay-500">
      <p>💡 Click and drag the handle, or hover over the images</p>
    </div>

    <!-- Example Gallery -->
    <div class="example-gallery">
      <h3 class="gallery-title ease-fade-in-up ease-delay-600">More Examples</h3>
      <div class="gallery-grid">
        
        <!-- Mini Comparison 1 -->
        <div class="mini-comparison ease-fade-in-up ease-delay-700">
          <div class="mini-before"></div>
          <div class="mini-after"></div>
          <div class="mini-handle"></div>
          <span class="mini-label">Design Update</span>
        </div>

        <!-- Mini Comparison 2 -->
        <div class="mini-comparison ease-fade-in-up ease-delay-800">
          <div class="mini-before"></div>
          <div class="mini-after"></div>
          <div class="mini-handle"></div>
          <span class="mini-label">Color Correction</span>
        </div>

        <!-- Mini Comparison 3 -->
        <div class="mini-comparison ease-fade-in-up ease-delay-900">
          <div class="mini-before"></div>
          <div class="mini-after"></div>
          <div class="mini-handle"></div>
          <span class="mini-label">Feature Addition</span>
        </div>

      </div>
    </div>

  </div>

  <!-- JavaScript for Slider Functionality -->
  <script>
    const handle = document.getElementById('slider-handle');
    const container = document.querySelector('.comparison-container');
    let isDragging = false;

    // Mouse events
    handle.addEventListener('mousedown', () => {
      isDragging = true;
      document.body.style.cursor = 'ew-resize';
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
      document.body.style.cursor = 'default';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      
      const rect = container.getBoundingClientRect();
      let position = e.clientX - rect.left;
      position = Math.max(0, Math.min(position, rect.width));
      
      const percentage = (position / rect.width) * 100;
      handle.style.left = `${percentage}%`;
      document.querySelector('.after-image').style.clipPath = `inset(0 0 0 ${percentage}%)`;
    });

    // Touch events for mobile
    handle.addEventListener('touchstart', () => {
      isDragging = true;
    });

    document.addEventListener('touchend', () => {
      isDragging = false;
    });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      
      const rect = container.getBoundingClientRect();
      let position = e.touches[0].clientX - rect.left;
      position = Math.max(0, Math.min(position, rect.width));
      
      const percentage = (position / rect.width) * 100;
      handle.style.left = `${percentage}%`;
      document.querySelector('.after-image').style.clipPath = `inset(0 0 0 ${percentage}%)`;
    });

    // Click to move
    container.addEventListener('click', (e) => {
      if (e.target === handle || handle.contains(e.target)) return;
      
      const rect = container.getBoundingClientRect();
      let position = e.clientX - rect.left;
      const percentage = (position / rect.width) * 100;
      
      handle.style.left = `${percentage}%`;
      document.querySelector('.after-image').style.clipPath = `inset(0 0 0 ${percentage}%)`;
    });
  </script>
</body>
</html>
