<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flag Wave Distortion - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-card">
    <h2 style="margin: 0 0 var(--ease-space-2) 0; font-weight: 800;">Flag Wave Distortion</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
      A continuous skew and scale transform combination creating a realistic fabric-waving motion.
    </p>

    <!-- Waving Flag Target -->
    <div class="ease-flag-wave flag-visual">
      <span>EaseMotion</span>
    </div>

    <div style="font-size: var(--ease-text-xs); color: var(--ease-color-muted); font-style: italic;">
      Uses transform-origin: left center to anchor flag pole attachment points
    </div>
  </div>

</body>
</html>
