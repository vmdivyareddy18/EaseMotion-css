<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Zoom-Out Tooltip - Marketing Landing Page</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="marketing-viewport">
        <div class="conversion-hero-card">
            <div class="hero-content">
                <span class="hero-badge">ENTERPRISE PACKAGE</span>
                <h1 class="hero-heading">Maximize Operational Scale</h1>
                <p class="hero-subtext">Unlock automated delivery frameworks and interface pipelines designed for seamless retention.</p>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">Review Guaranteed Perks</span>
                        <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </button>
                    
                    <div class="zoom-out-tooltip-card" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-secure">PREMIUM PROTECTION</span>
                                <p class="perk-title">99.99% Uptime SLA</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="perk-desc">Full programmatic cluster redundancy backed by active multi-region load balancers monitoring framework state loops.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
