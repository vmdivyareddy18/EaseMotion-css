<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Portfolio Hero Section</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="aurora-glow"></div>
  <main class="hero-section">
    <header class="navbar">
      <div class="logo">R.</div>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#work">Work</a>
        <a href="#contact">Contact</a>
      </div>
    </header>

    <div class="hero-container">
      <span class="badge">Open for Full-Time Roles</span>
      <h1 class="gradient-text">Engineering interfaces with high fidelity.</h1>
      <p class="description">I am a Frontend Architect specializing in performance-focused animations, design systems, and robust layout engineering.</p>
      
      <div class="cta-group">
        <a href="#work" class="btn btn-primary">Explore Work</a>
        <a href="#contact" class="btn btn-secondary">Get in Touch</a>
      </div>

      <div class="skill-cloud">
        <span class="skill-tag">Next.js</span>
        <span class="skill-tag">CSS Architecture</span>
        <span class="skill-tag">WebGL</span>
        <span class="skill-tag">UI Engineering</span>
        <span class="skill-tag">UX Design</span>
      </div>
    </div>
  </main>
</body>
</html>
