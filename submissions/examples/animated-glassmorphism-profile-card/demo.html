<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Glassmorphism Profile Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Profile Card -->
    <div class="profile-card ease-zoom-in">
      
      <!-- Cover Photo -->
      <div class="cover-photo"></div>

      <!-- Avatar -->
      <div class="avatar-wrapper">
        <div class="avatar ease-bounce-in ease-delay-200">👩‍💻</div>
      </div>

      <!-- Profile Info -->
      <div class="profile-info">
        <h2 class="name ease-fade-in-up ease-delay-300">Sarah Chen</h2>
        <p class="handle ease-fade-in-up ease-delay-400">@sarahcodes</p>
        <p class="bio ease-fade-in-up ease-delay-500">Frontend Developer & UI/UX Enthusiast. Building beautiful, accessible things for the web.</p>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat ease-fade-in-up ease-delay-600">
          <span class="stat-value">142</span>
          <span class="stat-label">Posts</span>
        </div>
        <div class="stat ease-fade-in-up ease-delay-700">
          <span class="stat-value">12.5k</span>
          <span class="stat-label">Followers</span>
        </div>
        <div class="stat ease-fade-in-up ease-delay-800">
          <span class="stat-value">890</span>
          <span class="stat-label">Following</span>
        </div>
      </div>

      <!-- Follow Button -->
      <button class="follow-btn ease-fade-in-up ease-delay-900 ease-hover-grow" id="follow-btn">
        Follow
      </button>

      <!-- Social Links -->
      <div class="social-links">
        <a href="#" class="social-icon ease-fade-in-up ease-delay-1000 ease-hover-grow" aria-label="Twitter">🐦</a>
        <a href="#" class="social-icon ease-fade-in-up ease-delay-1100 ease-hover-grow" aria-label="GitHub">💻</a>
        <a href="#" class="social-icon ease-fade-in-up ease-delay-1200 ease-hover-grow" aria-label="LinkedIn">💼</a>
        <a href="#" class="social-icon ease-fade-in-up ease-delay-1300 ease-hover-grow" aria-label="Dribbble">🏀</a>
      </div>

    </div>
  </div>

  <!-- JavaScript for Follow Button Toggle -->
  <script>
    const followBtn = document.getElementById('follow-btn');
    
    followBtn.addEventListener('click', () => {
      followBtn.classList.toggle('following');
      if (followBtn.classList.contains('following')) {
        followBtn.textContent = 'Following ✓';
      } else {
        followBtn.textContent = 'Follow';
      }
    });
  </script>
</body>
</html>
