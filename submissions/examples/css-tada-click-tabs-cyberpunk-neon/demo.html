<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tabs - Cyberpunk Neon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <input type="radio" id="tab1" name="tabs" checked>
  <label for="tab1">Home</label>

  <input type="radio" id="tab2" name="tabs">
  <label for="tab2">Projects</label>

  <input type="radio" id="tab3" name="tabs">
  <label for="tab3">Contact</label>

  <div class="content">
    <div class="panel panel1">Cyberpunk Home</div>
    <div class="panel panel2">Neon Projects</div>
    <div class="panel panel3">Get in Touch</div>
  </div>
</div>

</body>
</html>
