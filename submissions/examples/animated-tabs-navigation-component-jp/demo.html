<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Tabs Navigation Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Animated Tabs</h1>

    <div class="tabs">
        <button class="tab active">Overview</button>
        <button class="tab">Features</button>
        <button class="tab">Pricing</button>
        <button class="tab">Contact</button>
    </div>

    <div class="content-card">
        <h2>Overview</h2>
        <p>
            A modern animated tab navigation component with smooth transitions,
            active indicators, and responsive styling.
        </p>
    </div>
</div>

</body>
</html>
