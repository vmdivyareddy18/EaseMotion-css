<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Ring And Outline Utilities — EaseMotion-css</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      margin: 0;
      padding: var(--ease-space-8);
      min-height: 100vh;
    }
    .demo-section {
      max-width: 800px;
      margin: var(--ease-space-8) auto;
    }
    .demo-card {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      border-radius: var(--ease-radius-lg);
      padding: var(--ease-space-6);
      margin-bottom: var(--ease-space-6);
      box-shadow: var(--ease-shadow-md);
    }
    h1 {
      text-align: center;
      margin-bottom: var(--ease-space-8);
      color: var(--ease-color-primary);
    }
    h2 {
      color: var(--ease-color-neutral-700);
      border-bottom: 2px solid var(--ease-color-neutral-200);
      padding-bottom: var(--ease-space-2);
      margin-bottom: var(--ease-space-4);
    }
    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: var(--ease-space-4);
      align-items: center;
      margin: var(--ease-space-4) 0;
    }
    code {
      background: var(--ease-color-neutral-100);
      padding: var(--ease-space-1) var(--ease-space-2);
      border-radius: var(--ease-radius-sm);
      font-family: var(--ease-font-mono);
      font-size: var(--ease-text-sm);
    }
    table { width: 100%; }
  </style>
</head>
<body>
  <div class="demo-section">
    <h1>Focus Ring And Outline Utilities</h1>

    <div class="demo-card">
      <h2>Interactive Focus Ring Demo</h2>
      <p>Click into each input and press Tab to see the focus ring styles.</p>
      <div class="demo-row">
        <div style="flex: 1; min-width: 200px;">
          <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Standard focus ring:</label>
          <input type="text" placeholder="Tab to focus" class="focus-ring focus-ring-md" style="width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
        </div>
      </div>
      <div class="demo-row">
        <div style="flex: 1; min-width: 200px;">
          <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Primary color variant:</label>
          <input type="text" placeholder="Tab to focus" class="focus-ring focus-ring-primary focus-ring-lg" style="width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
        </div>
      </div>
      <div class="demo-row">
        <div style="flex: 1; min-width: 200px;">
          <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Success color variant:</label>
          <input type="text" placeholder="Tab to focus" class="focus-ring focus-ring-success focus-ring-md" style="width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
        </div>
      </div>
      <div class="demo-row">
        <div style="flex: 1; min-width: 200px;">
          <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Inset focus:</label>
          <input type="text" placeholder="Tab to focus" class="focus-ring focus-ring-inset focus-ring-md" style="width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem;">
        </div>
      </div>
      <div class="demo-row">
        <div style="flex: 1; min-width: 200px;">
          <label style="display:block; margin-bottom: 0.5rem; font-weight: 600;">Size variants:</label>
          <input type="text" placeholder="SM" class="focus-ring focus-ring-sm" style="width: 100%; padding: 0.3rem; border: 1px solid #e2e8f0; border-radius: 0.25rem; margin-bottom: 0.5rem; display: block;">
          <input type="text" placeholder="MD" class="focus-ring focus-ring-md" style="width: 100%; padding: 0.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; margin-bottom: 0.5rem; display: block;">
          <input type="text" placeholder="LG" class="focus-ring focus-ring-lg" style="width: 100%; padding: 0.7rem; border: 1px solid #e2e8f0; border-radius: 0.75rem; display: block;">
        </div>
      </div>
    </div>

    <div class="demo-card" style="text-align: center; color: var(--ease-color-muted);">
      <p>Generated with EaseMotion-css design tokens.</p>
    </div>
  </div>
</body>
</html>
