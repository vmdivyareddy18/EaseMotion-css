<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compass Needle Spin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="compass-stage">
    <section class="compass-card" aria-label="Compass needle spin demo">
      <div class="compass-face" aria-hidden="true">
        <span class="mark north">N</span>
        <span class="mark east">E</span>
        <span class="mark south">S</span>
        <span class="mark west">W</span>
        <span class="needle"></span>
        <span class="hub"></span>
      </div>
      <p class="compass-label">Heading</p>
      <strong class="compass-value">North-East</strong>
    </section>
  </main>
</body>
</html>
