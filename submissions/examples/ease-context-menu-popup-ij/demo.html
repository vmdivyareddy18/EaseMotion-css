<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context Menu Popup - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Context Menu Popup</h1>
    <p class="desc">Right-click anywhere in the demo area to open the context menu</p>
    <div class="cmp-area" id="area" style="--menu-bg: #1e293b; --menu-item-hover: #334155; --fade-duration: 0.2s; --scale-start: 0.85;">
      <p class="cmp-hint">Right-click here</p>
      <div class="cmp-menu" id="menu">
        <div class="cmp-item" data-action="edit">Edit</div>
        <div class="cmp-item" data-action="copy">Copy</div>
        <div class="cmp-item" data-action="paste">Paste</div>
        <div class="cmp-divider"></div>
        <div class="cmp-item" data-action="delete">Delete</div>
      </div>
    </div>
    <p class="cmp-action-log" id="log">No action yet</p>
  </div>
  <script>
    const area = document.getElementById('area');
    const menu = document.getElementById('menu');
    const log = document.getElementById('log');

    area.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      const rect = area.getBoundingClientRect();
      const x = Math.min(e.clientX - rect.left, rect.width - 180);
      const y = Math.min(e.clientY - rect.top, rect.height - 200);
      menu.style.left = x + 'px';
      menu.style.top = y + 'px';
      menu.classList.add('open');
    });

    document.addEventListener('click', () => {
      menu.classList.remove('open');
    });

    menu.querySelectorAll('.cmp-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.stopPropagation();
        log.textContent = 'Selected: ' + item.dataset.action;
        menu.classList.remove('open');
      });
    });
  </script>
</body>
</html>
