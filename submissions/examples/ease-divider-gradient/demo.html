<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-divider-gradient Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ease-divider-gradient Utility</h1>

<div class="section">
    <h2>Default Divider</h2>
    <p>Content above divider.</p>

    <hr class="ease-divider-gradient">

    <p>Content below divider.</p>
</div>

<div class="section">
    <h2>Custom Divider Color</h2>

    <hr class="ease-divider-gradient custom-divider">

    <p>Using a custom divider color.</p>
</div>

</body>
</html>
