<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Password Strength Meter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LIVE DEMO -->
  <div class="card">
    <h2>Live Password Strength</h2>
    <div class="input-wrap">
      <input
        class="pwd-input"
        type="password"
        id="pwdInput"
        placeholder="Type a password..."
      />
    </div>
    <div class="ease-pwd-meter" id="meter" data-strength="0">
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
      <div class="segment"></div>
    </div>
    <div class="strength-label" id="label" data-strength="0">
      Enter a password
    </div>
  </div>

  <!-- STATIC VARIANTS -->
  <div class="card">
    <h2>All Strength Levels</h2>
    <div class="demo-row">

      <div class="demo-item">
        <label class="label-weak">Weak — data-strength="1"</label>
        <div class="ease-pwd-meter" data-strength="1">
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
        </div>
      </div>

      <div class="demo-item">
        <label class="label-fair">Fair — data-strength="2"</label>
        <div class="ease-pwd-meter" data-strength="2">
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
        </div>
      </div>

      <div class="demo-item">
        <label class="label-strong">Strong — data-strength="3"</label>
        <div class="ease-pwd-meter" data-strength="3">
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
        </div>
      </div>

      <div class="demo-item">
        <label class="label-vstrong">Very Strong — data-strength="4"</label>
        <div class="ease-pwd-meter" data-strength="4">
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const input = document.getElementById('pwdInput');
    const meter = document.getElementById('meter');
    const label = document.getElementById('label');

    const labels = ['Enter a password', 'Weak', 'Fair', 'Strong', 'Very Strong'];

    function getStrength(pwd) {
      if (!pwd) return 0;
      let score = 0;
      if (pwd.length >= 6)  score++;
      if (pwd.length >= 10) score++;
      if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd)) score++;
      if (/[^A-Za-z0-9]/.test(pwd)) score++;
      return Math.min(score + 1, 4);
    }

    input.addEventListener('input', () => {
      const strength = input.value ? getStrength(input.value) : 0;
      meter.setAttribute('data-strength', strength);
      label.setAttribute('data-strength', strength);
      label.textContent = labels[strength];
    });
  </script>

</body>
</html>
