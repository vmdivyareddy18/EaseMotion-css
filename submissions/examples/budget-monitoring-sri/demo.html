<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Monitoring Animation — EaseMotion CSS</title>
    <!-- Load EaseMotion Framework stylesheet -->
    <link rel="stylesheet" href="../../../easemotion.css" />
    <!-- Load custom component stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bm-demo-viewport">
    <!-- Interactive Budget Indicator Card -->
    <div id="budget-card" class="bm-card bm-state-warning">
      <!-- Header with warning icon and text title -->
      <div class="bm-header">
        <div class="bm-alert-icon-container">
          <!-- SVG Warning / Alert Icon -->
          <svg
            id="warning-svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"
            />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
        </div>
        <div class="bm-title-area">
          <h2 id="card-title" class="bm-title">Cloud Infrastructure Budget</h2>
          <span class="bm-subtitle">Monthly Spending Limit</span>
        </div>
      </div>

      <!-- Progress Track & Bar wrapper -->
      <div class="bm-progress-wrapper">
        <div class="bm-progress-track">
          <div id="progress-bar" class="bm-progress-bar animate-fill"></div>
        </div>
        <!-- Usage info metrics -->
        <div class="bm-metrics">
          <span class="bm-usage"><span id="usage-text">$7,800</span> used</span>
          <span class="bm-limit">of $10,000 limit</span>
        </div>
      </div>
    </div>

    <!-- Interactive Controls panel for showcase/testing -->
    <div class="bm-controls">
      <h3 class="bm-controls-title">Simulate Budget States</h3>
      <div class="bm-btn-group">
        <button
          class="bm-control-btn"
          onclick="updateBudgetState('safe', 45, '$4,500')"
        >
          Safe (45%)
        </button>
        <button
          class="bm-control-btn active"
          onclick="updateBudgetState('warning', 78, '$7,800')"
        >
          Warning (78%)
        </button>
        <button
          class="bm-control-btn"
          onclick="updateBudgetState('critical', 94, '$9,400')"
        >
          Critical (94%)
        </button>
      </div>
      <div class="bm-btn-group" style="margin-top: 4px">
        <button
          class="bm-control-btn"
          onclick="replayAnimation()"
          style="
            background: rgba(108, 99, 255, 0.1);
            border-color: rgba(108, 99, 255, 0.3);
            color: #a78bfa;
          "
        >
          🔄 Replay Animation
        </button>
      </div>
    </div>

    <script>
      // State tracker variables
      let currentLimitPercent = 78;
      let currentUsageText = "$7,800";
      let currentState = "warning";

      // Set initial percentage target variable
      document.documentElement.style.setProperty("--bm-target-fill", "78%");

      // Function to change the budget warning state
      function updateBudgetState(state, percent, usageText) {
        currentState = state;
        currentLimitPercent = percent;
        currentUsageText = usageText;

        // Update button active states
        const buttons = document.querySelectorAll(".bm-control-btn");
        buttons.forEach((btn) => btn.classList.remove("active"));
        event.target.classList.add("active");

        // Set target custom variable
        document.documentElement.style.setProperty(
          "--bm-target-fill",
          percent + "%"
        );

        // Update texts
        document.getElementById("usage-text").innerText = usageText;

        // Update card state classes
        const card = document.getElementById("budget-card");
        card.className = "bm-card bm-state-" + state;

        // Change SVG icon depending on state
        const warningSvg = document.getElementById("warning-svg");
        if (state === "safe") {
          // Safe checkmark SVG
          warningSvg.innerHTML = `
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        `;
        } else {
          // Warning triangle SVG
          warningSvg.innerHTML = `
          <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        `;
        }

        // Re-trigger progress bar animation
        replayAnimation();
      }

      // Function to replay fill animations
      function replayAnimation() {
        const bar = document.getElementById("progress-bar");
        bar.classList.remove("animate-fill");
        void bar.offsetWidth; // trigger reflow
        bar.classList.add("animate-fill");
      }
    </script>
  </body>
</html>
