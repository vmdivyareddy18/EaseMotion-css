<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation: add-ease-bubbles-rise</title>
  <meta name="description" content="Playful underwater bubbles rising upward with slight wobble, scale variation, and fade-out near the top." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>add-ease-bubbles-rise</h1>
      <p class="subtitle">Bubbles rise from the bottom with slight horizontal wobble, scale variation, and fade near the top.</p>
    </header>

    <section class="display-area" aria-label="Bubbles animation demo">
      <div class="bubble-stage" id="bubbleStage">
        <!--
          Bubble particles.
          Each bubble uses CSS variables for position, size, wobble, duration and delay.
        -->
        <div class="bubble" style="--x: 18%; --size: 14px; --wobble: 9px;  --dur: 2.6s; --delay: 0.0s;"></div>
        <div class="bubble" style="--x: 30%; --size: 22px; --wobble: 12px; --dur: 3.1s; --delay: -1.0s;"></div>
        <div class="bubble" style="--x: 42%; --size: 16px; --wobble: 10px; --dur: 2.9s; --delay: -1.6s;"></div>
        <div class="bubble" style="--x: 56%; --size: 26px; --wobble: 14px; --dur: 3.4s; --delay: -2.2s;"></div>
        <div class="bubble" style="--x: 68%; --size: 18px; --wobble: 11px; --dur: 2.7s; --delay: -0.8s;"></div>
        <div class="bubble" style="--x: 80%; --size: 20px; --wobble: 13px; --dur: 3.2s; --delay: -1.3s;"></div>
      </div>
    </section>

    <div class="controls">
      <button type="button" id="btnReplay" onclick="replay()">Replay</button>
    </div>
  </main>

  <script>
    function replay() {
      const stage = document.getElementById('bubbleStage');
      // Remove and re-add bubbles to restart animations cleanly.
      const bubbles = Array.from(stage.querySelectorAll('.bubble'));
      bubbles.forEach(b => {
        const clone = b.cloneNode(true);
        b.replaceWith(clone);
      });
    }
  </script>
</body>
</html>
