<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Magnetic Pull Modal - Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="dashboard-header">
        <h1>Responsive Dashboard</h1>
        <p>Pure CSS Magnetic Pull Modal</p>

        <label for="modal-toggle" class="open-btn">
            Open Dashboard Modal
        </label>
    </header>

</div>

<input type="checkbox" id="modal-toggle" hidden>

<div class="overlay">

    <label for="modal-toggle" class="backdrop"></label>

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <label
            for="modal-toggle"
            class="close-btn"
            aria-label="Close Modal">
            &times;
        </label>

        <div class="modal-header">
            <span class="status-dot"></span>
            Dashboard Overview
        </div>

        <div class="modal-content">

            <h2 id="modal-title">
                Welcome Back 👋
            </h2>

            <p>
                This modal demonstrates a smooth CSS-only
                <strong>Magnetic Pull</strong> entrance animation
                designed for responsive dashboard layouts.
                No JavaScript is required.
            </p>

            <div class="stats">

                <div class="card">
                    <h3>Users</h3>
                    <span>12,540</span>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <span>$82K</span>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <span>2,184</span>
                </div>

            </div>

            <div class="actions">
                <button class="primary">View Report</button>
                <button class="secondary">Dismiss</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
