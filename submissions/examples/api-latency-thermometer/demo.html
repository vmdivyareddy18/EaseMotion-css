<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Latency Thermometer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="thermo">
    <section class="summary">
      <p>API Health</p>
      <h1>API Latency Thermometer</h1>
      <span>P95 latency: 286 ms</span>
    </section>

    <section class="readings" aria-label="API latency readings">
      <article class="cool">
        <strong>Auth</strong>
        <span>118 ms</span>
        <p>Token checks are inside the target range.</p>
      </article>
      <article class="warm">
        <strong>Checkout</strong>
        <span>286 ms</span>
        <p>Payment validation is nearing warning level.</p>
      </article>
      <article class="hot">
        <strong>Search</strong>
        <span>512 ms</span>
        <p>Index fanout needs immediate owner review.</p>
      </article>
    </section>
  </main>
</body>
</html>
