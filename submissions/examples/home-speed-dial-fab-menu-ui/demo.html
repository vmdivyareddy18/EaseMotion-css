<!DOCTYPE html>
<html>
<head>
  <title>Speed Dial FAB UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fab-container">
  
  <button class="fab main" onclick="toggleMenu()">+</button>

  <div class="fab-options" id="menu">
    <button>🏠</button>
    <button>📧</button>
    <button>⚙️</button>
  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
