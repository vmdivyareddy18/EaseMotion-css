<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Neon Glow Modal (Neumorphic Soft)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #2a2b2f;
      color: #e0e5ec;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 16px 40px;
      background: #2a2b2f;
      color: #e0e5ec;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.1rem;
      border-radius: 9999px;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 6px 6px 12px #1f2023, 
                  -6px -6px 12px #35363b;
    }
    
    .demo-trigger-btn:hover {
      box-shadow: inset 4px 4px 8px #1f2023, 
                  inset -4px -4px 8px #35363b;
      color: #00ffcc;
      text-shadow: 0 0 5px rgba(0, 255, 204, 0.5);
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#neu-modal" class="demo-trigger-btn">Open Settings</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="neu-modal" class="ease-neu-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-neu-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-neu-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <a href="#" class="ease-neu-modal-close" aria-label="Close modal dialog">&times;</a>
      
      <div class="ease-neu-modal-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </div>
      
      <h2 id="modal-title" class="ease-neu-modal-title">System Settings</h2>
      
      <p class="ease-neu-modal-text">
        Notice the smooth transition from a soft, dark neumorphic shadow to an intense <strong>Neon Glow</strong>. 
        This adds a striking, futuristic focus pull that perfectly complements dark-mode Neumorphic Soft layouts, without writing a single line of JavaScript.
      </p>
      
      <div class="ease-neu-modal-actions">
        <a href="#" class="ease-neu-modal-btn">Dismiss</a>
        <a href="#" class="ease-neu-modal-btn ease-neu-modal-btn-primary">Save Changes</a>
      </div>
      
    </div>

  </div>

</body>
</html>
