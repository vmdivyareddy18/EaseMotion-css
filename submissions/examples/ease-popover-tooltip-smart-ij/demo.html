<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Popover Tooltip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Smart Popover Tooltip</h1>

  <div class="controls">
    <div class="control-group">
      <label for="position-select">Preferred Position</label>
      <select id="position-select">
        <option value="top">Top</option>
        <option value="bottom" selected>Bottom</option>
        <option value="left">Left</option>
        <option value="right">Right</option>
      </select>
    </div>
  </div>

  <div class="demo-area">
    <button class="trigger" id="trigger1" data-tooltip="This tooltip appears based on available space. Try resizing the viewport!">
      Hover me (top)
    </button>
    <button class="trigger" id="trigger2" data-tooltip="Another smart tooltip that will flip if it doesn't fit.">
      Hover me (bottom)
    </button>
    <button class="trigger" id="trigger3" data-tooltip="Tooltips auto-flip to stay visible. Even if this text is very long, it will reposition!">
      Hover me (left)
    </button>
    <button class="trigger" id="trigger4" data-tooltip="Short tip">
      Hover me (right)
    </button>
  </div>

  <div class="tooltip" id="tooltip" role="tooltip">
    <span class="tooltip__text"></span>
  </div>

  <script>
    const tooltip = document.getElementById('tooltip');
    const tooltipText = tooltip.querySelector('.tooltip__text');
    const triggers = document.querySelectorAll('.trigger');
    const positionSelect = document.getElementById('position-select');

    let activeTrigger = null;
    let hideTimeout = null;

    function getPosition(trigger, preferred) {
      const tr = trigger.getBoundingClientRect();
      const tp = tooltip.getBoundingClientRect();
      const gap = 10;
      const positions = [preferred, 'top', 'bottom', 'left', 'right'];
      const deduped = [...new Set(positions)];

      for (const pos of deduped) {
        let left, top;
        switch (pos) {
          case 'top':
            left = tr.left + tr.width / 2 - tp.width / 2;
            top = tr.top - tp.height - gap;
            break;
          case 'bottom':
            left = tr.left + tr.width / 2 - tp.width / 2;
            top = tr.bottom + gap;
            break;
          case 'left':
            left = tr.left - tp.width - gap;
            top = tr.top + tr.height / 2 - tp.height / 2;
            break;
          case 'right':
            left = tr.right + gap;
            top = tr.top + tr.height / 2 - tp.height / 2;
            break;
        }
        if (
          left >= 0 &&
          top >= 0 &&
          left + tp.width <= window.innerWidth &&
          top + tp.height <= window.innerHeight
        ) {
          return { left, top, position: pos };
        }
      }

      {
        const left = Math.max(4, Math.min(tr.left + tr.width / 2 - tp.width / 2, window.innerWidth - tp.width - 4));
        const top = tr.bottom + gap;
        return { left, top: Math.min(top, window.innerHeight - tp.height - 4), position: preferred };
      }
    }

    function showTooltip(trigger) {
      clearTimeout(hideTimeout);
      const text = trigger.dataset.tooltip || '';
      tooltipText.textContent = text;
      const preferred = positionSelect.value;
      tooltip.className = 'tooltip';
      tooltip.style.left = '0';
      tooltip.style.top = '0';
      tooltip.classList.add('tooltip--visible');
      tooltip.style.left = '-999px';
      tooltip.style.top = '-999px';

      requestAnimationFrame(() => {
        const pos = getPosition(trigger, preferred);
        tooltip.className = 'tooltip';
        tooltip.classList.add('tooltip--visible');
        tooltip.classList.add(`tooltip--${pos.position}`);
        tooltip.style.left = `${pos.left}px`;
        tooltip.style.top = `${pos.top}px`;
      });

      activeTrigger = trigger;
    }

    function hideTooltip() {
      hideTimeout = setTimeout(() => {
        tooltip.classList.remove('tooltip--visible');
        tooltip.className = 'tooltip';
        activeTrigger = null;
      }, 100);
    }

    triggers.forEach(tr => {
      tr.addEventListener('mouseenter', () => showTooltip(tr));
      tr.addEventListener('mouseleave', hideTooltip);
      tr.addEventListener('focus', () => showTooltip(tr));
      tr.addEventListener('blur', hideTooltip);
    });

    tooltip.addEventListener('mouseenter', () => clearTimeout(hideTimeout));
    tooltip.addEventListener('mouseleave', hideTooltip);
  </script>
</body>
</html>
