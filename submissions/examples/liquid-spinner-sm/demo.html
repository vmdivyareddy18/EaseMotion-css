<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liquid Spinner - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="ease-liquid-demo" aria-labelledby="ease-liquid-title">
      <section class="ease-liquid-card">
        <p class="ease-liquid-eyebrow">EaseMotion component</p>
        <h1 id="ease-liquid-title">Liquid Spinner</h1>
        <p class="ease-liquid-copy">
          A reusable zero-JavaScript loading indicator with neon liquid motion,
          soft glass depth, and motion-safe accessibility defaults.
        </p>

        <div class="ease-liquid-stage" aria-label="Preview area">
          <div
            class="ease-liquid-spinner"
            role="status"
            aria-live="polite"
            aria-label="Loading content"
          >
            <span
              class="ease-liquid-orb ease-liquid-orb-one"
              aria-hidden="true"
            ></span>
            <span
              class="ease-liquid-orb ease-liquid-orb-two"
              aria-hidden="true"
            ></span>
            <span class="ease-liquid-rim" aria-hidden="true"></span>
            <span class="ease-liquid-sr-only">Loading content</span>
          </div>
        </div>

        <div class="ease-liquid-meta" aria-label="Component qualities">
          <span>Pure CSS</span>
          <span>Responsive</span>
          <span>Reduced-motion safe</span>
        </div>
      </section>
    </main>
  </body>
</html>
