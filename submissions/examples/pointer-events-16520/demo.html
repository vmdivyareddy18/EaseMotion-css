<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Pointer-Events Demo</title>
</head>
<body>
  <h1>Pointer-Events Utilities</h1>
  
  <div class="demo-box pointer-events-none" onclick="alert('Clicked!')">
    This element has pointer-events: none; and won't trigger the alert.
  </div>
  
  <div class="demo-box pointer-events-auto" onclick="alert('Clicked!')">
    This element has pointer-events: auto; and will trigger the alert.
  </div>
</body>
</html>
