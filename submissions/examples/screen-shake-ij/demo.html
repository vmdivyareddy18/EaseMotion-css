<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Shake - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Screen Shake</h1>

    <div class="shake-card" id="shakeCard">
      <div class="shake-content">
        <div class="shake-icon">
          <div class="impact-star"></div>
        </div>
        <span class="shake-title">Impact!</span>
        <p class="shake-desc">The container shakes rapidly to simulate an explosion or impact.</p>
      </div>
      <button class="shake-btn" id="shakeBtn">&#9889; Shake</button>
    </div>

    <p class="description">The entire card shakes rapidly with random translateX/Y offsets for 0.4 seconds when triggered, simulating an impact or explosion.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
