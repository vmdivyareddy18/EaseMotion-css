<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jiggle on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Jiggle on Hover</h1>
  <p class="subtitle">Element jiggles with combined rotation and translation on hover — pure CSS.</p>

  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the button to see the jiggle effect</p>
    <button class="jiggle-btn">Hover Me</button>
  </section>

  <section>
    <h2>How It Works</h2>
    <p>A <code>@keyframes</code> animation applies alternating <code>rotate</code> and <code>translate</code> values on hover via <code>animation-play-state: running</code>.</p>
  </section>
</body>
</html>
