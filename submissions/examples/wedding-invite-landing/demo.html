<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sarah &amp; Michael</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="ease-container ease-flex ease-items-center ease-justify-between ease-py-4 ease-px-8">
      <div class="ease-text-2xl ease-font-bold ease-fade-in">Sarah &amp; Michael</div>
      <div class="ease-flex ease-gap-6 ease-text-sm ease-fade-in">
        <a href="#Story" class="ease-text-hover-glow">Story</a>
        <a href="#Gallery" class="ease-text-hover-glow">Gallery</a>
        <a href="#RSVP" class="ease-text-hover-glow">RSVP</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="hero">
    <div class="ease-text-center ease-px-4">
      <h1 class="ease-fade-in ease-text-5xl ease-font-bold ease-mb-4" style="font-family:Georgia,serif;font-weight:400;">Sarah &amp; Michael</h1>
<p class="ease-fade-in ease-delay-100 ease-text-lg ease-mb-4 ease-tracking-widest ease-uppercase">June 15, 2026</p>
<p class="ease-fade-in ease-delay-200 ease-text-xl ease-mb-8">We're getting married!</p>
<a href="#rsvp" class="ease-btn ease-btn-primary ease-btn-lg ease-btn-hover ease-hover-lift">RSVP</a>
    </div>
  </section>

  <section class="ease-container ease-py-16">
  <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Our Story</h2>
  <div class="story-timeline">
    <div class="timeline-item ease-fade-in"><div class="content"><h3 class="ease-text-xl ease-font-semibold">How We Met</h3><p class="ease-text-muted ease-mt-2">A sunny afternoon at a bookstore café.</p></div><div class="dot"></div></div>
    <div class="timeline-item ease-fade-in ease-delay-100"><div class="content"><h3 class="ease-text-xl ease-font-semibold">The Proposal</h3><p class="ease-text-muted ease-mt-2">Under the stars at our favorite spot.</p></div><div class="dot"></div></div>
    <div class="timeline-item ease-fade-in ease-delay-200"><div class="content"><h3 class="ease-text-xl ease-font-semibold">The Big Day</h3><p class="ease-text-muted ease-mt-2">June 15, 2026 — join us!</p></div><div class="dot"></div></div>
  </div>
</section>
<section class="ease-bg-surface ease-py-16">
  <div class="ease-container">
    <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Gallery</h2>
    <div class="gallery-grid">
      <div class="gallery-item ease-fade-in" style="background:var(--accent);"></div>
      <div class="gallery-item ease-fade-in ease-delay-100" style="background:var(--muted);"></div>
      <div class="gallery-item ease-fade-in ease-delay-200" style="background:var(--accent);"></div>
    </div>
  </div>
</section>
<section id="rsvp" class="ease-container ease-py-16">
  <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">RSVP</h2>
  <div class="rsvp-form"><input type="text" placeholder="Your name" class="ease-fade-in"><select class="ease-fade-in ease-delay-100"><option>Accept with pleasure</option><option>Regretfully decline</option></select><button class="ease-btn ease-btn-primary ease-btn-block ease-btn-lg ease-mt-4 ease-hover-lift">Confirm</button></div>
</section>

  <footer class="footer">
    <div class="ease-container">
      <p class="ease-text-sm ease-opacity-70">Made with love.</p>
    </div>
  </footer>
</body>
</html>
