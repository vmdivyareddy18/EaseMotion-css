<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glowing Status Badge Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Glowing Status Badges</h2>
      <p class="subtitle">Clean, pulsing badge indicators representing status signals.</p>
      
      <div class="demo-wrapper">
        <div class="badge-item">
          <span class="pulse-badge green"></span>
          <span>Systems Online</span>
        </div>
        <div class="badge-item">
          <span class="pulse-badge amber"></span>
          <span>Degraded State</span>
        </div>
        <div class="badge-item">
          <span class="pulse-badge red"></span>
          <span>Failure Alert</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
