<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Chip Filter Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="chip-page" aria-labelledby="chip-title">
    <section class="chip-card">
      <p class="eyebrow">Timeline filters</p>
      <h1 id="chip-title">Timeline Chip Filter</h1>
      <div class="chip-filter" aria-label="Timeline filters">
        <button class="active">Today</button>
        <button>Week</button>
        <button>Month</button>
        <button>Archived</button>
      </div>
    </section>
  </main>
</body>
</html>
