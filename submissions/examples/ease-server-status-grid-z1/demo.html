<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server Status Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="dashboard">
<h2>Server Monitor</h2>
<div class="grid">
<div class="card online"><span></span><h3>API Server</h3><p>Running Smoothly</p></div>
<div class="card warning"><span></span><h3>Database</h3><p>High CPU Usage</p></div>
<div class="card offline"><span></span><h3>Cache</h3><p>Disconnected</p></div>
<div class="card online"><span></span><h3>Storage</h3><p>Healthy</p></div>
</div>
</section>
</body>
</html>
