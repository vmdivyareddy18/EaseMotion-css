<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Card Carousel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">
  <div class="card active">
    <h3>Card 1</h3>
    <p>Featured content</p>
  </div>

  <div class="card">
    <h3>Card 2</h3>
    <p>Portfolio project</p>
  </div>

  <div class="card">
    <h3>Card 3</h3>
    <p>Product showcase</p>
  </div>
</div>

</body>
</html>
