<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adaptive Image Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="iga-container">
    <h1>Gallery</h1>
    <div class="iga-filters">
      <button class="iga-filter active" data-filter="all">All</button>
      <button class="iga-filter" data-filter="photo">Photos</button>
      <button class="iga-filter" data-filter="art">Art</button>
    </div>
    <div class="iga-grid" id="grid">
      <div class="iga-item" data-category="photo" style="--i:0"><img src="https://picsum.photos/seed/1/400/300" alt="Photo 1"><div class="iga-overlay"><span>Mountain View</span></div></div>
      <div class="iga-item" data-category="art" style="--i:1"><img src="https://picsum.photos/seed/2/400/300" alt="Art 1"><div class="iga-overlay"><span>Abstract Flow</span></div></div>
      <div class="iga-item" data-category="photo" style="--i:2"><img src="https://picsum.photos/seed/3/400/300" alt="Photo 2"><div class="iga-overlay"><span>Ocean Sunset</span></div></div>
      <div class="iga-item" data-category="art" style="--i:3"><img src="https://picsum.photos/seed/4/400/300" alt="Art 2"><div class="iga-overlay"><span>Geometric Dream</span></div></div>
      <div class="iga-item" data-category="photo" style="--i:4"><img src="https://picsum.photos/seed/5/400/300" alt="Photo 3"><div class="iga-overlay"><span>Forest Path</span></div></div>
      <div class="iga-item" data-category="art" style="--i:5"><img src="https://picsum.photos/seed/6/400/300" alt="Art 3"><div class="iga-overlay"><span>Neon Pulse</span></div></div>
      <div class="iga-item" data-category="photo" style="--i:6"><img src="https://picsum.photos/seed/7/400/300" alt="Photo 4"><div class="iga-overlay"><span>City Lights</span></div></div>
      <div class="iga-item" data-category="art" style="--i:7"><img src="https://picsum.photos/seed/8/400/300" alt="Art 4"><div class="iga-overlay"><span>Fluid Motion</span></div></div>
    </div>
  </main>
  <div class="iga-lightbox" id="lightbox">
    <span class="iga-close">&times;</span>
    <img class="iga-lightbox-img" id="lightboxImg" src="" alt="">
  </div>
  <script>
    const gridEl = document.getElementById('grid');
    const filters = document.querySelectorAll('.iga-filter');
    const items = document.querySelectorAll('.iga-item');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const closeBtn = document.querySelector('.iga-close');

    filters.forEach(btn => {
      btn.addEventListener('click', () => {
        filters.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        items.forEach(item => {
          const match = filter === 'all' || item.dataset.category === filter;
          item.classList.toggle('hidden', !match);
        });
      });
    });

    items.forEach(item => {
      item.addEventListener('click', () => {
        const img = item.querySelector('img');
        lightboxImg.src = img.src;
        lightbox.classList.add('open');
      });
    });

    closeBtn.addEventListener('click', () => lightbox.classList.remove('open'));
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.remove('open');
    });

    window.addEventListener('resize', () => {
      items.forEach((item, i) => {
        item.style.setProperty('--i', i);
        item.classList.remove('reposition');
        void item.offsetWidth;
        item.classList.add('reposition');
      });
    });
  </script>
</body>
</html>
