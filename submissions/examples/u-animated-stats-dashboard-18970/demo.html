<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Statistics Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="dashboard-header">
        <h1>Analytics Dashboard</h1>
        <p>Track performance metrics in real time</p>
    </div>

    <div class="stats-grid">

        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <h3>Total Users</h3>
            <h2>12,450</h2>
            <span class="trend positive">▲ 12.5%</span>

            <div class="progress">
                <div class="progress-fill users"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <h3>Revenue</h3>
            <h2>$48,200</h2>
            <span class="trend positive">▲ 8.7%</span>

            <div class="progress">
                <div class="progress-fill revenue"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <h3>Growth Rate</h3>
            <h2>24.8%</h2>
            <span class="trend positive">▲ 4.2%</span>

            <div class="progress">
                <div class="progress-fill growth"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">🛒</div>
            <h3>Orders</h3>
            <h2>3,872</h2>
            <span class="trend negative">▼ 1.1%</span>

            <div class="progress">
                <div class="progress-fill orders"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <h3>Reviews</h3>
            <h2>1,284</h2>
            <span class="trend positive">▲ 9.3%</span>

            <div class="progress">
                <div class="progress-fill reviews"></div>
            </div>
        </div>

        <div class="stat-card">
            <div class="stat-icon">🚀</div>
            <h3>Projects</h3>
            <h2>218</h2>
            <span class="trend positive">▲ 15.6%</span>

            <div class="progress">
                <div class="progress-fill projects"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
