<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="product-card">
    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500" alt="Product">

    <div class="content">
        <h2>Running Shoes</h2>
        <p>Comfortable everyday sneakers.</p>

        <button class="btn">
            View Details

            <span class="popover">
                <strong>Special Offer</strong>
                <span>20% OFF + Free Shipping</span>
            </span>
        </button>
    </div>
</div>

</body>
</html>
