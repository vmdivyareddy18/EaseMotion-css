<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Staggered Entrance Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSS Staggered Entrance Modal</h1>
    <button id="openBtn">Open Modal</button>

    <div class="modal" id="modal" role="dialog" aria-hidden="true">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <h2 class="stagger-item">Welcome to EaseMotion</h2>
            <p class="stagger-item">This modal uses pure CSS for staggered entrance.</p>
            <p class="stagger-item">Each element appears one after another with delay.</p>
            <button class="stagger-item" id="closeBtn">Close</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modal');
        const openBtn = document.getElementById('openBtn');
        const closeBtn = document.getElementById('closeBtn');
        
        openBtn.onclick = () => {
            modal.classList.add('is-open');
            modal.setAttribute('aria-hidden', 'false');
        };
        
        closeBtn.onclick = () => {
            modal.classList.remove('is-open');
            modal.setAttribute('aria-hidden', 'true');
        };
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeBtn.click();
        });
    </script>
</body>
</html>
