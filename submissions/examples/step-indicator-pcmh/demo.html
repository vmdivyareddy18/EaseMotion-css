<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Indicator — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Step Indicator</h1>
    <p class="subtitle">Completed (green), active (pulsing), upcoming (grey) — with animated transitions</p>

    <div class="section">
      <div class="ease-steps" id="steps">
        <div class="ease-step completed">
          <div class="ease-step-circle">✓</div>
          <div class="ease-step-label">Cart</div>
        </div>
        <div class="ease-step completed">
          <div class="ease-step-circle">✓</div>
          <div class="ease-step-label">Shipping</div>
        </div>
        <div class="ease-step active">
          <div class="ease-step-circle">3</div>
          <div class="ease-step-label">Payment</div>
        </div>
        <div class="ease-step">
          <div class="ease-step-circle">4</div>
          <div class="ease-step-label">Review</div>
        </div>
        <div class="ease-step">
          <div class="ease-step-circle">5</div>
          <div class="ease-step-label">Confirm</div>
        </div>
      </div>

      <div class="controls">
        <button id="prevBtn" disabled>Previous</button>
        <button id="nextBtn" class="primary">Next Step</button>
        <button id="resetBtn">Reset</button>
      </div>
    </div>

    <div class="section" style="text-align: center;">
      <h2 style="font-size: 1rem; margin-bottom: 0.75rem; color: #1e293b;">Current Step: <span id="stepLabel">Payment</span></h2>
      <p style="font-size: 0.85rem; color: #64748b;">Click Next / Previous to advance through the steps with smooth transitions.</p>
    </div>
  </div>

  <script>
    const steps = document.querySelectorAll('#steps .ease-step');
    const stepLabels = ['Cart', 'Shipping', 'Payment', 'Review', 'Confirm'];
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const stepLabel = document.getElementById('stepLabel');
    let current = 2;

    function render() {
      steps.forEach((step, i) => {
        step.className = 'ease-step';
        const circle = step.querySelector('.ease-step-circle');
        if (i < current) {
          step.classList.add('completed');
          circle.textContent = '✓';
        } else if (i === current) {
          step.classList.add('active');
          circle.textContent = i + 1;
        } else {
          circle.textContent = i + 1;
        }
      });
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === steps.length - 1;
      stepLabel.textContent = stepLabels[current];
    }

    prevBtn.addEventListener('click', () => { if (current > 0) { current--; render(); } });
    nextBtn.addEventListener('click', () => { if (current < steps.length - 1) { current++; render(); } });
    resetBtn.addEventListener('click', () => { current = 0; render(); });

    render();
  </script>
</body>
</html>
