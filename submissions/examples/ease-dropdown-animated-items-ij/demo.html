<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Items Dropdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Animated Items Dropdown</h1>

    <div class="dropdown">
      <button class="dropdown__toggle" type="button">
        <span class="dropdown__label">Select framework</span>
        <span class="dropdown__arrow">&darr;</span>
      </button>

      <ul class="dropdown__menu">
        <li class="dropdown__item" data-value="react">React</li>
        <li class="dropdown__item" data-value="vue">Vue</li>
        <li class="dropdown__item" data-value="angular">Angular</li>
        <li class="dropdown__item" data-value="svelte">Svelte</li>
        <li class="dropdown__item" data-value="solid">Solid</li>
      </ul>
    </div>

    <p class="result">Selected: <span id="selected">—</span></p>
  </main>

  <script>
    const toggle = document.querySelector('.dropdown__toggle');
    const menu = document.querySelector('.dropdown__menu');
    const items = document.querySelectorAll('.dropdown__item');
    const label = document.querySelector('.dropdown__label');
    const selected = document.getElementById('selected');

    toggle.addEventListener('click', () => {
      const isOpen = toggle.parentElement.classList.toggle('open');
      menu.classList.toggle('visible', isOpen);

      if (isOpen) {
        items.forEach((item, i) => {
          item.style.setProperty('--i', i);
        });
      }
    });

    items.forEach(item => {
      item.addEventListener('click', () => {
        const value = item.dataset.value;
        label.textContent = item.textContent;
        selected.textContent = value;
        toggle.parentElement.classList.remove('open');
        menu.classList.remove('visible');
      });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown')) {
        toggle.parentElement.classList.remove('open');
        menu.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
