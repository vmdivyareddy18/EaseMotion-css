<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Flag Rollout Slider States</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="rollout-title">
      <p class="eyebrow">Release control</p>
      <h1 id="rollout-title">Rollout states</h1>
      <div class="rollout-list">
        <div class="rollout-row is-paused"><span>Paused</span><b class="track"><i></i></b><em>0%</em></div>
        <div class="rollout-row is-ten"><span>Canary</span><b class="track"><i></i></b><em>10%</em></div>
        <div class="rollout-row is-half"><span>Gradual</span><b class="track"><i></i></b><em>50%</em></div>
        <div class="rollout-row is-full"><span>Complete</span><b class="track"><i></i></b><em>100%</em></div>
        <div class="rollout-row is-rollback"><span>Rollback</span><b class="track"><i></i></b><em>20%</em></div>
      </div>
    </section>
  </main>
</body>
</html>
