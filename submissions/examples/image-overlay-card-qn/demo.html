<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Overlay Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- The Card Container -->
    <div class="card-container-qn">
        <!-- The Background Image -->
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Mountain Landscape" class="card-image-qn">
        
        <!-- The Hover Overlay -->
        <div class="card-overlay-qn">
            <h3 class="card-title-qn">Mountain View</h3>
            <p class="card-text-qn">Explore the breathtaking beauty of nature and discover hidden trails.</p>
            <button class="card-btn-qn">Explore Now</button>
        </div>
    </div>
</body>
</html>
