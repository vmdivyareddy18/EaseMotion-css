<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modal Confirm Dialog — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="trigger-btn" id="openModal">Open Confirm Dialog</button>

  <div class="modal-overlay" id="modalOverlay" style="--modal-bg: #1a1a24; --overlay-bg: rgba(0,0,0,0.7); --confirm-color: #6c5ce7; --shake-duration: 0.4s;">
    <div class="modal-dialog">
      <div class="modal-header">
        <h2>Delete Item?</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <p>This action cannot be undone. Are you sure you want to delete this item?</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn btn-confirm" id="confirmBtn">Delete</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const openBtn = document.getElementById('openModal');
    const closeBtn = document.getElementById('closeModal');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    function openModal() {
      overlay.classList.add('visible');
    }

    function closeModal() {
      overlay.classList.remove('visible');
    }

    function shakeReject() {
      const dialog = overlay.querySelector('.modal-dialog');
      dialog.classList.remove('shake');
      void dialog.offsetWidth;
      dialog.classList.add('shake');
      setTimeout(() => dialog.classList.remove('shake'), 500);
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', () => { shakeReject(); });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  </script>
</body>
</html>
