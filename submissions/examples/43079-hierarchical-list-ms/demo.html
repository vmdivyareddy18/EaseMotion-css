<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hierarchical List Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #020617; font-family: 'Inter', sans-serif; color: #fff; padding: 2rem;">

  <div class="ease-hierarchy-card">
    <h3 style="margin: 0 0 1.5rem 0; font-size: 1.125rem; font-weight: 500; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">Project Structure</h3>
    
    <ul class="ease-hierarchy-list">
      <li class="ease-hierarchy-item ease-hierarchy-folder">
        <span class="ease-hierarchy-label">src</span>
        <ul class="ease-hierarchy-list">
          <li class="ease-hierarchy-item ease-hierarchy-folder">
            <span class="ease-hierarchy-label">components</span>
            <ul class="ease-hierarchy-list">
              <li class="ease-hierarchy-item ease-hierarchy-file">
                <span class="ease-hierarchy-label">Button.css</span>
              </li>
              <li class="ease-hierarchy-item ease-hierarchy-file">
                <span class="ease-hierarchy-label">Card.css</span>
              </li>
            </ul>
          </li>
          <li class="ease-hierarchy-item ease-hierarchy-folder">
            <span class="ease-hierarchy-label">utils</span>
            <ul class="ease-hierarchy-list">
              <li class="ease-hierarchy-item ease-hierarchy-file">
                <span class="ease-hierarchy-label">animations.css</span>
              </li>
            </ul>
          </li>
          <li class="ease-hierarchy-item ease-hierarchy-file">
            <span class="ease-hierarchy-label">index.html</span>
          </li>
        </ul>
      </li>
      <li class="ease-hierarchy-item ease-hierarchy-file">
        <span class="ease-hierarchy-label">package.json</span>
      </li>
      <li class="ease-hierarchy-item ease-hierarchy-file">
        <span class="ease-hierarchy-label">README.md</span>
      </li>
    </ul>
  </div>

</body>
</html>
