<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Slide In Left - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-slide-left">Slide Entry</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-slide-left'); void b.offsetWidth; b.classList.add('ease-slide-left');">Slide</button>
    </div>
</body>
</html>
