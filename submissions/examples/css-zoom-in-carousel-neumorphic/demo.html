<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Zoom-In Carousel - Neumorphic Soft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Neumorphic Zoom-In Carousel</h1>

  <div class="carousel">
    <div class="card active" tabindex="0">
      <h2>Profile</h2>
      <p>User Dashboard</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Projects</h2>
      <p>Active Tasks</p>
    </div>

    <div class="card" tabindex="0">
      <h2>Settings</h2>
      <p>Preferences</p>
    </div>
  </div>

</div>

</body>
</html>
