<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Contain Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="media-sandbox-canvas">
    <h4 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.25rem;">Media Aspect Ratio Fitting Matrix</h4>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-top: 0; margin-bottom: 1.5rem;">
      Compare standard unconstrained stretching against the <code>object-fit: contain</code> utility class using an asymmetrical placeholder asset.
    </p>

    <div class="comparison-grid">
      <div class="media-container-frame">
        <div class="frame-label">Default (Stretched/Distorted)</div>
        <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=300&h=400&fit=crop" class="preview-asset" alt="Distorted Specimen">
      </div>

      <div class="media-container-frame">
        <div class="frame-label">ease-object-contain (Letterboxed)</div>
        <img src="https://images.unsplash.com/photo-1542831371-29b0f74f9713?w=300&h=400&fit=crop" class="preview-asset ease-object-contain" alt="Preserved Specimen">
      </div>
    </div>
  </div>

</body>
</html>
