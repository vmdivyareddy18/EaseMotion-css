<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Offline - Glow Maintenance Page Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="neumorphic-viewport">
        <!-- Interactive Multi-Layered Neumorphic Server Control Dashboard Node -->
        <div class="maintenance-box-card">
            <header class="maintenance-header">
                <span class="status-badge-node">System Offline</span>
                <h1 class="maintenance-title">Core Maintenance</h1>
                <p class="maintenance-subtitle">Re-calibrating architectural network server arrays. Normal interface connectivity loops will resume shortly.</p>
            </header>

            <!-- Advanced Pure-CSS Breathing Neumorphic Soft Glow Stage Canvas -->
            <div class="glow-stage-workspace">
                <div class="neumorphic-indicator-ring">
                    <!-- Coordinated Soft Ambient Breathing Glow Target Node Element -->
                    <div class="central-core-beacon ease-glow-breathe">
                        <div class="beacon-inner-symbol">⚡</div>
                    </div>
                </div>
            </div>

            <!-- Interactivity System Showcase Grid Control Links Matrix -->
            <div class="analytics-summary-row">
                <div class="metric-node">
                    <span class="node-label">Cluster Sync</span>
                    <span class="node-value text-indigo">92% Done</span>
                </div>
                <div class="metric-node">
                    <span class="node-label">Est. Restoral</span>
                    <span class="node-value text-teal">14 Mins</span>
                </div>
            </div>

            <footer class="maintenance-footer">
                <div class="grid-sync-status">
                    <span class="pulse-beacon-dot"></span>
                    <span class="status-label">SHA-256 Ledger Diagnostics Running</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
