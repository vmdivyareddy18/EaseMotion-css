<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Number Counter Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Animated Number Counter</h1>
        <p class="subtitle">Counts up from 0 to target</p>

        <!-- ANIMATED NUMBER COUNTER COMPONENT -->
        <div class="counter-grid">
            <div class="counter-card" id="counter1">
                <div class="counter-icon">👥</div>
                <div class="counter-number" id="number1">0</div>
                <div class="counter-label">Total Users</div>
                <div class="counter-progress-bar" id="progress1">
                    <div class="counter-progress-fill" id="progressFill1"></div>
                </div>
                <div class="counter-status" id="status1">Ready</div>
            </div>

            <div class="counter-card" id="counter2">
                <div class="counter-icon">💰</div>
                <div class="counter-number" id="number2">0</div>
                <div class="counter-label">Revenue</div>
                <div class="counter-progress-bar" id="progress2">
                    <div class="counter-progress-fill" id="progressFill2"></div>
                </div>
                <div class="counter-status" id="status2">Ready</div>
            </div>

            <div class="counter-card" id="counter3">
                <div class="counter-icon">⭐</div>
                <div class="counter-number" id="number3">0</div>
                <div class="counter-label">Reviews</div>
                <div class="counter-progress-bar" id="progress3">
                    <div class="counter-progress-fill" id="progressFill3"></div>
                </div>
                <div class="counter-status" id="status3">Ready</div>
            </div>

            <div class="counter-card" id="counter4">
                <div class="counter-icon">📊</div>
                <div class="counter-number" id="number4">0</div>
                <div class="counter-label">Downloads</div>
                <div class="counter-progress-bar" id="progress4">
                    <div class="counter-progress-fill" id="progressFill4"></div>
                </div>
                <div class="counter-status" id="status4">Ready</div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="startAllBtn">▶ Start All</button>
            <button class="demo-btn" id="pauseAllBtn">⏸ Pause All</button>
            <button class="demo-btn" id="resetAllBtn">⟳ Reset All</button>
            <button class="demo-btn" id="customCounterBtn">🎯 Custom</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">Active:</span>
            <span class="status-value" id="activeCount">0</span>
            <span class="status-label">Completed:</span>
            <span class="status-value" id="completedCount">0</span>
        </div>

        <!-- Individual Controls -->
        <div class="individual-controls">
            <div class="control-group">
                <span class="control-label">Counter 1:</span>
                <button class="mini-btn" data-counter="1" data-action="start">▶</button>
                <button class="mini-btn" data-counter="1" data-action="pause">⏸</button>
                <button class="mini-btn" data-counter="1" data-action="reset">⟳</button>
            </div>
            <div class="control-group">
                <span class="control-label">Counter 2:</span>
                <button class="mini-btn" data-counter="2" data-action="start">▶</button>
                <button class="mini-btn" data-counter="2" data-action="pause">⏸</button>
                <button class="mini-btn" data-counter="2" data-action="reset">⟳</button>
            </div>
            <div class="control-group">
                <span class="control-label">Counter 3:</span>
                <button class="mini-btn" data-counter="3" data-action="start">▶</button>
                <button class="mini-btn" data-counter="3" data-action="pause">⏸</button>
                <button class="mini-btn" data-counter="3" data-action="reset">⟳</button>
            </div>
            <div class="control-group">
                <span class="control-label">Counter 4:</span>
                <button class="mini-btn" data-counter="4" data-action="start">▶</button>
                <button class="mini-btn" data-counter="4" data-action="pause">⏸</button>
                <button class="mini-btn" data-counter="4" data-action="reset">⟳</button>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                defaultDuration: 2000, // ms
                easing: 'easeOut', // 'linear', 'easeOut', 'easeInOut'
                onStart: function(id) {
                    console.log(`▶️ Counter ${id} started`);
                },
                onUpdate: function(id, value) {
                    console.log(`📊 Counter ${id}: ${value}`);
                },
                onComplete: function(id) {
                    console.log(`✅ Counter ${id} completed`);
                },
                onPause: function(id) {
                    console.log(`⏸️ Counter ${id} paused`);
                },
                onResume: function(id) {
                    console.log(`▶️ Counter ${id} resumed`);
                },
                onReset: function(id) {
                    console.log(`⟳ Counter ${id} reset`);
                }
            };

            // ============================================
            // COUNTER STATE
            // ============================================
            class Counter {
                constructor(id, target, options = {}) {
                    this.id = id;
                    this.target = target;
                    this.current = 0;
                    this.duration = options.duration || CONFIG.defaultDuration;
                    this.easing = options.easing || CONFIG.easing;
                    this.isRunning = false;
                    this.isPaused = false;
                    this.isComplete = false;
                    this.startTime = 0;
                    this.pausedTime = 0;
                    this.animationId = null;
                    this.onUpdate = options.onUpdate || null;
                    this.onComplete = options.onComplete || null;
                    this.onStart = options.onStart || null;
                    this.onPause = options.onPause || null;
                    this.onResume = options.onResume || null;
                    this.onReset = options.onReset || null;
                    this.element = document.getElementById(`number${id}`);
                    this.progressFill = document.getElementById(`progressFill${id}`);
                    this.status = document.getElementById(`status${id}`);
                    this.card = document.getElementById(`counter${id}`);
                }

                // Easing functions
                easeOut(t) {
                    return 1 - Math.pow(1 - t, 3);
                }

                easeInOut(t) {
                    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                }

                getEasedValue(t) {
                    switch (this.easing) {
                        case 'easeOut':
                            return this.easeOut(t);
                        case 'easeInOut':
                            return this.easeInOut(t);
                        default:
                            return t;
                    }
                }

                start() {
                    if (this.isRunning && !this.isPaused) return;
                    if (this.isComplete) {
                        this.reset();
                    }

                    this.isRunning = true;
                    this.isPaused = false;
                    this.isComplete = false;
                    
                    if (this.pausedTime > 0) {
                        // Resume from pause
                        this.startTime = performance.now() - this.pausedTime;
                        this.pausedTime = 0;
                        if (this.onResume) this.onResume(this.id);
                        CONFIG.onResume(this.id);
                    } else {
                        // Fresh start
                        this.startTime = performance.now();
                        if (this.current === 0) {
                            if (this.onStart) this.onStart(this.id);
                            CONFIG.onStart(this.id);
                        }
                    }

                    this.card.classList.remove('paused', 'complete');
                    this.card.classList.add('running');
                    this.updateStatus('Running');
                    this.updateProgress();

                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                    }
                    this.animate();
                }

                pause() {
                    if (!this.isRunning || this.isPaused || this.isComplete) return;
                    
                    this.isPaused = true;
                    this.pausedTime = performance.now() - this.startTime;
                    
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                        this.animationId = null;
                    }
                    
                    this.card.classList.remove('running');
                    this.card.classList.add('paused');
                    this.updateStatus('Paused');
                    
                    if (this.onPause) this.onPause(this.id);
                    CONFIG.onPause(this.id);
                }

                resume() {
                    if (!this.isPaused) return;
                    this.start();
                }

                reset() {
                    this.isRunning = false;
                    this.isPaused = false;
                    this.isComplete = false;
                    this.current = 0;
                    this.pausedTime = 0;
                    
                    if (this.animationId) {
                        cancelAnimationFrame(this.animationId);
                        this.animationId = null;
                    }
                    
                    this.element.textContent = '0';
                    this.card.classList.remove('running', 'paused', 'complete');
                    this.updateStatus('Ready');
                    this.updateProgress(0);
                    
                    if (this.onReset) this.onReset(this.id);
                    CONFIG.onReset(this.id);
                }

                animate() {
                    const now = performance.now();
                    const elapsed = now - this.startTime;
                    const progress = Math.min(elapsed / this.duration, 1);
                    const easedProgress = this.getEasedValue(progress);
                    const value = Math.round(easedProgress * this.target);

                    // Update display
                    this.current = value;
                    this.element.textContent = value.toLocaleString();
                    
                    // Update progress
                    this.updateProgress(progress);

                    // Update status
                    if (progress < 1) {
                        this.updateStatus('Running');
                    }

                    // Check if complete
                    if (progress >= 1) {
                        this.current = this.target;
                        this.element.textContent = this.target.toLocaleString();
                        this.isRunning = false;
                        this.isComplete = true;
                        this.card.classList.remove('running');
                        this.card.classList.add('complete');
                        this.updateStatus('Complete');
                        this.updateProgress(1);
                        
                        if (this.onComplete) this.onComplete(this.id);
                        CONFIG.onComplete(this.id);
                        return;
                    }

                    // Continue animation
                    this.animationId = requestAnimationFrame(() => this.animate());
                }

                updateStatus(text) {
                    if (this.status) {
                        this.status.textContent = text;
                        this.status.className = 'counter-status';
                        if (text === 'Running') this.status.classList.add('running');
                        else if (text === 'Paused') this.status.classList.add('paused');
                        else if (text === 'Complete') this.status.classList.add('complete');
                    }
                }

                updateProgress(progress) {
                    if (this.progressFill) {
                        const pct = progress !== undefined ? progress * 100 : 
                                   this.target > 0 ? (this.current / this.target) * 100 : 0;
                        this.progressFill.style.width = Math.min(pct, 100) + '%';
                    }
                }

                toggle() {
                    if (this.isRunning && !this.isPaused) {
                        this.pause();
                    } else if (this.isPaused) {
                        this.resume();
                    } else {
                        this.start();
                    }
                }

                getState() {
                    return {
                        id: this.id,
                        current: this.current,
                        target: this.target,
                        isRunning: this.isRunning,
                        isPaused: this.isPaused,
                        isComplete: this.isComplete,
                        progress: this.target > 0 ? this.current / this.target : 0
                    };
                }

                setTarget(newTarget) {
                    this.target = newTarget;
                    if (!this.isRunning && !this.isComplete) {
                        this.element.textContent = '0';
                        this.updateProgress(0);
                        this.updateStatus('Ready');
                    }
                }
            }

            // ============================================
            // INITIALIZE COUNTERS
            // ============================================
            const counters = [];

            function createCounter(id, target, options = {}) {
                const counter = new Counter(id, target, options);
                counters.push(counter);
                return counter;
            }

            // Create 4 counters with different targets
            const counter1 = createCounter(1, 15427, {
                duration: 2500,
                easing: 'easeOut',
                onComplete: function(id) {
                    updateStats();
                },
                onStart: function(id) {
                    updateStats();
                }
            });

            const counter2 = createCounter(2, 89341, {
                duration: 3000,
                easing: 'easeOut',
                onComplete: function(id) {
                    updateStats();
                },
                onStart: function(id) {
                    updateStats();
                }
            });

            const counter3 = createCounter(3, 2319, {
                duration: 1800,
                easing: 'easeOut',
                onComplete: function(id) {
                    updateStats();
                },
                onStart: function(id) {
                    updateStats();
                }
            });

            const counter4 = createCounter(4, 50218, {
                duration: 2800,
                easing: 'easeOut',
                onComplete: function(id) {
                    updateStats();
                },
                onStart: function(id) {
                    updateStats();
                }
            });

            // ============================================
            // STATS UPDATE
            // ============================================
            function updateStats() {
                let active = 0;
                let completed = 0;
                
                counters.forEach(c => {
                    if (c.isRunning || c.isPaused) active++;
                    if (c.isComplete) completed++;
                });
                
                document.getElementById('activeCount').textContent = active;
                document.getElementById('completedCount').textContent = completed;
            }

            // ============================================
            // BULK OPERATIONS
            // ============================================
            function startAll() {
                counters.forEach(c => c.start());
            }

            function pauseAll() {
                counters.forEach(c => c.pause());
            }

            function resetAll() {
                counters.forEach(c => c.reset());
                updateStats();
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            document.getElementById('startAllBtn').addEventListener('click', startAll);
            document.getElementById('pauseAllBtn').addEventListener('click', pauseAll);
            document.getElementById('resetAllBtn').addEventListener('click', resetAll);

            // Individual controls
            document.querySelectorAll('.mini-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.counter);
                    const action = this.dataset.action;
                    const counter = counters.find(c => c.id === id);
                    if (!counter) return;
                    
                    switch (action) {
                        case 'start':
                            counter.start();
                            break;
                        case 'pause':
                            counter.pause();
                            break;
                        case 'reset':
                            counter.reset();
                            updateStats();
                            break;
                    }
                });
            });

            // Custom counter
            document.getElementById('customCounterBtn').addEventListener('click', function() {
                const target = prompt('Enter target number:', '10000');
                if (target === null) return;
                const num = parseInt(target);
                if (isNaN(num) || num < 0) {
                    alert('Please enter a valid positive number');
                    return;
                }
                
                // Create a new counter or use counter 1
                const counter = counters[0];
                counter.setTarget(num);
                counter.reset();
                counter.start();
                
                // Update the label
                const label = counter.card.querySelector('.counter-label');
                if (label) label.textContent = 'Custom Count';
            });

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    startAll();
                }
                if (e.key === 'Escape' && e.ctrlKey) {
                    e.preventDefault();
                    resetAll();
                }
            });

            // ============================================
            // INTERSECTION OBSERVER (auto-start on scroll)
            // ============================================
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = parseInt(entry.target.id.replace('counter', ''));
                        const counter = counters.find(c => c.id === id);
                        if (counter && !counter.isRunning && !counter.isComplete) {
                            counter.start();
                        }
                    }
                });
            }, { threshold: 0.3 });

            document.querySelectorAll('.counter-card').forEach(card => {
                observer.observe(card);
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.NumberCounter = {
                getCounter: (id) => counters.find(c => c.id === id),
                getAllCounters: () => counters,
                startAll: startAll,
                pauseAll: pauseAll,
                resetAll: resetAll,
                createCounter: (id, target, options) => createCounter(id, target, options),
                getStats: updateStats,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateStats();
            
            // Auto-start counters when visible
            setTimeout(() => {
                const visibleCards = document.querySelectorAll('.counter-card');
                visibleCards.forEach(card => {
                    const rect = card.getBoundingClientRect();
                    if (rect.top < window.innerHeight * 0.8) {
                        const id = parseInt(card.id.replace('counter', ''));
                        const counter = counters.find(c => c.id === id);
                        if (counter && !counter.isRunning && !counter.isComplete) {
                            counter.start();
                        }
                    }
                });
            }, 500);

            console.log('✅ Animated Number Counter initialized!');
            console.log('📖 API: window.NumberCounter');
            console.log('📖 Usage:');
            console.log('  - Click "Start All" to start all counters');
            console.log('  - Click individual buttons to control each counter');
            console.log('  - Keyboard shortcuts: Ctrl+Enter (start all), Ctrl+Escape (reset all)');
            console.log('  - Counters auto-start when scrolled into view');

        })();
    </script>
</body>
</html>
