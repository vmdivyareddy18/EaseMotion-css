<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Organization Tree</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='tree-bg')r.style.setProperty('--tree-bg',t.value);if(t.name==='node-color')r.style.setProperty('--node-color',t.value);if(t.name==='line-color')r.style.setProperty('--line-color',t.value);if(t.name==='reveal-duration')r.style.setProperty('--reveal-duration',t.value+'s')})</script>
<div class="container"><p class="title">Organization Tree</p>
<div class="org-tree"><div class="org-node ceo"><div class="org-card">Jane Smith<br><span class="role">CEO</span></div></div>
<div class="org-branch"><div class="org-node dir"><div class="org-card">John Doe<br><span class="role">Engineering</span></div></div>
<div class="org-branch-children"><div class="org-node"><div class="org-card">Alice<br><span class="role">Frontend</span></div></div><div class="org-node"><div class="org-card">Bob<br><span class="role">Backend</span></div></div></div></div>
<div class="org-branch"><div class="org-node dir"><div class="org-card">Carol White<br><span class="role">Design</span></div></div></div></div>
<div class="controls"><label>BG: <input type="color" name="tree-bg" value="#1a1a2e"></label><label>Node: <input type="color" name="node-color" value="#2d2d44"></label><label>Line: <input type="color" name="line-color" value="#4a4a6a"></label><label>Speed: <input type="range" name="reveal-duration" min="0.2" max="1.2" step="0.05" value="0.4"></label></div></div></body></html>
