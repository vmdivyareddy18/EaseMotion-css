<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Storage Volume Capacity Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Storage Capacity Planner</h2>

<div class="volume healthy">
<div>
<h3>Production Volume</h3>
<p>Usage: 62% • 380 GB / 600 GB</p>
</div>
<span>Healthy</span>
</div>

<div class="volume active">
<div>
<h3>Growth Trend</h3>
<p>+18 GB Added This Week</p>
</div>
<span>Stable</span>
</div>

<div class="volume warning">
<div>
<h3>Analytics Volume</h3>
<p>Usage: 88% • Expansion Recommended</p>
</div>
<span>Warning</span>
</div>

<div class="volume critical">
<div>
<h3>Backup Storage</h3>
<p>Only 12 GB Free Remaining</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
