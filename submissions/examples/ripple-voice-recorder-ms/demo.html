<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Voice Recorder</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #f8fafc; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="recorder-card ease-fade-in-up">
    <h3>Voice Note</h3>
    <p class="status-text">Ready to record</p>
    
    <label class="recorder-btn">
      <input type="checkbox" class="record-toggle">
      
      <!-- Ripple effect container -->
      <div class="ripple-ring ring-1"></div>
      <div class="ripple-ring ring-2"></div>
      
      <!-- Mic Icon Button -->
      <div class="mic-icon ease-hover-pop">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="22"></line>
        </svg>
      </div>
    </label>
    
    <div class="timer">00:00</div>
  </div>

</body>
</html>
