<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Wiggle Hover - EaseMotion CSS</title>

    <!-- Modern Font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to the CSS files -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-container">
      <header class="header">
        <h1>Icon Wiggle Hover</h1>
        <p>A playful, quick micro-interaction that wiggles icons on hover.</p>
      </header>

      <!-- Card 1: Dashboard Toolbar -->
      <section class="card">
        <h2 class="card-title">
          <svg class="icon" viewBox="0 0 24 24">
            <rect x="3" y="3" width="7" height="9" rx="1"></rect>
            <rect x="14" y="3" width="7" height="5" rx="1"></rect>
            <rect x="14" y="12" width="7" height="9" rx="1"></rect>
            <rect x="3" y="16" width="7" height="5" rx="1"></rect>
          </svg>
          Dashboard Toolbar Buttons
        </h2>
        <div class="toolbar">
          <!-- Notification Button -->
          <button
            class="icon-btn-round ease-icon-wiggle-hover-ag"
            title="Notifications"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
          </button>

          <!-- Settings Button -->
          <button
            class="icon-btn-round ease-icon-wiggle-hover-ag"
            title="Settings"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
          </button>

          <!-- Help Button -->
          <button class="icon-btn-round ease-icon-wiggle-hover-ag" title="Help">
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </button>

          <!-- Mail Button (Success Theme) -->
          <button
            class="icon-btn-round success ease-icon-wiggle-hover-ag"
            title="Inbox"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path
                d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"
              ></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </button>

          <!-- Delete Button (Danger Theme) -->
          <button
            class="icon-btn-round danger ease-icon-wiggle-hover-ag"
            title="Delete"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path
                d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              ></path>
              <line x1="10" y1="11" x2="10" y2="17"></line>
              <line x1="14" y1="11" x2="14" y2="17"></line>
            </svg>
          </button>

          <!-- Star Button (Warning Theme) -->
          <button
            class="icon-btn-round warning ease-icon-wiggle-hover-ag"
            title="Star / Bookmark"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <polygon
                points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
              ></polygon>
            </svg>
          </button>
        </div>
      </section>

      <!-- Card 2: Interactive CTA Action Buttons -->
      <section class="card">
        <h2 class="card-title">
          <svg class="icon" viewBox="0 0 24 24">
            <path
              d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"
            ></path>
          </svg>
          Interactive Action Buttons
        </h2>
        <div class="actions-grid">
          <!-- Send Mail -->
          <button class="btn-action btn-primary ease-icon-wiggle-hover-ag">
            <svg class="icon" viewBox="0 0 24 24">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
            Send Message
          </button>

          <!-- Edit Profile -->
          <button
            class="btn-action btn-outline-custom ease-icon-wiggle-hover-ag"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M12 20h9"></path>
              <path
                d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              ></path>
            </svg>
            Edit Profile
          </button>

          <!-- Share Post -->
          <button
            class="btn-action btn-outline-custom ease-icon-wiggle-hover-ag"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <circle cx="18" cy="5" r="3"></circle>
              <circle cx="6" cy="12" r="3"></circle>
              <circle cx="18" cy="19" r="3"></circle>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
            </svg>
            Share Content
          </button>
        </div>
      </section>

      <!-- Card 3: Floating Action Buttons & Application Dock -->
      <section class="card">
        <h2 class="card-title">
          <svg class="icon" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 8v8"></path>
            <path d="M8 12h8"></path>
          </svg>
          Floating Action Buttons & App Dock
        </h2>
        <div class="showcase-row">
          <!-- Floating Action Button -->
          <button
            class="floating-action-button ease-icon-wiggle-hover-ag"
            title="Create New Document"
          >
            <svg class="icon" viewBox="0 0 24 24">
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>

          <!-- macOS style Dock -->
          <div class="dock">
            <!-- Calendar -->
            <button
              class="dock-item ease-icon-wiggle-hover-ag"
              title="Calendar"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
            </button>

            <!-- Music -->
            <button
              class="dock-item ease-icon-wiggle-hover-ag"
              title="Music Player"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
              </svg>
            </button>

            <!-- Chat -->
            <button
              class="dock-item ease-icon-wiggle-hover-ag"
              title="Chat Messages"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </button>

            <!-- Files -->
            <button
              class="dock-item ease-icon-wiggle-hover-ag"
              title="File Explorer"
            >
              <svg class="icon" viewBox="0 0 24 24">
                <path
                  d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"
                ></path>
              </svg>
            </button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
