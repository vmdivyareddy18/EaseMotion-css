<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Reveal Top — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Clip Reveal Top</h1>
  <p class="subtitle">Content reveals from top to bottom on hover — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the card to reveal content from the top</p>
    <div class="clip-card"><div class="clip-content"><h3>Peekaboo!</h3><p>Revealed from top</p></div></div>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>A <code>clip-path: inset()</code> animates from <code>0 0 100% 0</code> to <code>0 0 0 0</code> on hover, revealing content from top to bottom.</p>
  </section>
</body>
</html>
