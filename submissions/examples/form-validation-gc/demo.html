<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Validation UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Form Validation UI Example</h1>
      <p>Animated validation states for form fields with success and error feedback.</p>
    </header>

    <section class="validation-grid">
      <div class="validation-field validation-field--success">
        <label for="username">Username</label>
        <div class="validation-field__control">
          <input id="username" type="text" value="saved_user" readonly />
          <span class="validation-field__icon">✓</span>
        </div>
        <p class="validation-field__message">Looks good! Your username is available.</p>
      </div>

      <div class="validation-field validation-field--error">
        <label for="email">Email Address</label>
        <div class="validation-field__control">
          <input id="email" type="email" value="user@" readonly />
          <span class="validation-field__icon">!</span>
        </div>
        <p class="validation-field__message">Please enter a valid email address.</p>
      </div>

      <div class="validation-field validation-field--warning">
        <label for="password">Password</label>
        <div class="validation-field__control">
          <input id="password" type="password" value="password" readonly />
          <span class="validation-field__icon">!</span>
        </div>
        <p class="validation-field__message">Consider using a stronger password.</p>
      </div>

      <div class="validation-field validation-field--info">
        <label for="phone">Phone Number</label>
        <div class="validation-field__control">
          <input id="phone" type="tel" value="" placeholder="Enter phone" />
          <span class="validation-field__icon">i</span>
        </div>
        <p class="validation-field__message">Optional: Add a phone number for account recovery.</p>
      </div>
    </section>
  </main>
</body>
</html>
