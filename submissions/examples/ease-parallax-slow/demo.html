<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Parallax Slow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>Ease Parallax Slow</h1>
  </header>

  <section class="content">
    <p>Scroll down to see the parallax effect in action.</p>
    <div class="spacer"></div>
  </section>

  <div class="parallax-bg"></div>

  <script>
    // Default parallax speed
    const speed = parseFloat(getComputedStyle(document.documentElement)
      .getPropertyValue('--ease-parallax-speed')) || 0.5;

    const parallax = document.querySelector('.parallax-bg');

    window.addEventListener('scroll', () => {
      const offset = window.scrollY * speed;
      parallax.style.transform = `translateY(${offset}px)`;
    });
  </script>
</body>
</html>
