<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Picker Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Date Picker Calendar</h1>
    <div class="dpc-container">
      <div class="dpc-header">
        <button class="dpc-nav" id="dpcPrev">&#8249;</button>
        <span class="dpc-label" id="dpcLabel">July 2026</span>
        <button class="dpc-nav" id="dpcNext">&#8250;</button>
      </div>
      <div class="dpc-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>
      <div class="dpc-grid-wrap">
        <div class="dpc-grid" id="dpcGrid"></div>
      </div>
    </div>
  </main>
  <script>
    const grid = document.getElementById('dpcGrid');
    const label = document.getElementById('dpcLabel');
    let month = new Date().getMonth();
    let year = new Date().getFullYear();
    let animating = false;

    function render(dir) {
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      grid.innerHTML = '';
      for (let i = 0; i < firstDay; i++) {
        const e = document.createElement('span');
        e.className = 'dpc-empty';
        grid.appendChild(e);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const e = document.createElement('span');
        e.className = 'dpc-day';
        e.textContent = d;
        grid.appendChild(e);
      }
      label.textContent = new Date(year, month).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function slide(dir) {
      if (animating) return;
      animating = true;
      grid.style.setProperty('--dpc-month-offset', dir === 1 ? '100%' : '-100%');
      grid.style.transition = 'none';
      grid.offsetHeight;
      grid.style.transition = `transform var(--dpc-transition-duration, 0.3s) ease`;
      grid.style.transform = `translateX(${dir === 1 ? '-' : ''}100%)`;
      setTimeout(() => {
        grid.style.transition = 'none';
        grid.style.transform = '';
        animating = false;
      }, 300);
    }

    document.getElementById('dpcPrev').addEventListener('click', () => {
      month--;
      if (month < 0) { month = 11; year--; }
      render(-1);
      slide(-1);
    });
    document.getElementById('dpcNext').addEventListener('click', () => {
      month++;
      if (month > 11) { month = 0; year++; }
      render(1);
      slide(1);
    });
    render(0);
  </script>
</body>
</html>
