<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Clip Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <h1>Ease Clip Scroll</h1>
        <p>Scroll down to reveal the element using clip-path.</p>
    </section>

    <section class="clip-section">
        <div class="clip-reveal" id="clipReveal">
            <div class="content">
                <h2>Clip Path Reveal</h2>
                <p>
                    This element is progressively revealed using a clip-path
                    animation as it enters the viewport.
                </p>
            </div>
        </div>
    </section>

    <section class="footer">
        <h2>Animation Complete</h2>
        <p>Continue exploring more animations.</p>
    </section>

    <script>
        const revealElement = document.getElementById("clipReveal");

        function updateReveal() {
            const rect = revealElement.getBoundingClientRect();
            const windowHeight = window.innerHeight;

            let progress = 1 - (rect.top / windowHeight);

            progress = Math.max(0, Math.min(progress, 1));

            const revealPercent = progress * 100;

            revealElement.style.clipPath =
                `inset(0 ${100 - revealPercent}% 0 0)`;
        }

        window.addEventListener("scroll", updateReveal);
        window.addEventListener("resize", updateReveal);

        updateReveal();
    </script>

</body>

</html>
