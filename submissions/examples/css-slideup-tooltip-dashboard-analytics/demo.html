<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics Slide-Up Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="dashboard">

        <span class="badge">Dashboard Analytics</span>

        <h1>Performance Overview</h1>

        <p>
            Monitor your key metrics and hover over each analytics card to
            reveal additional insights with a smooth slide-up tooltip.
        </p>

        <div class="analytics-grid">

            <div class="card">

                <h3>Total Revenue</h3>

                <div class="value">$84,250</div>

                <button class="info-btn">

                    Details

                    <span class="tooltip">
                        Revenue increased by 18% compared to the previous month.
                    </span>

                </button>

            </div>

            <div class="card">

                <h3>New Users</h3>

                <div class="value">2,184</div>

                <button class="info-btn">

                    Details

                    <span class="tooltip">
                        User registrations continue to grow through organic traffic.
                    </span>

                </button>

            </div>

            <div class="card">

                <h3>Conversion Rate</h3>

                <div class="value">6.8%</div>

                <button class="info-btn">

                    Details

                    <span class="tooltip">
                        Conversion rate improved after the latest landing page update.
                    </span>

                </button>

            </div>

        </div>

    </section>

</div>

</body>
</html>
