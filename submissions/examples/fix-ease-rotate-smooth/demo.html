<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smooth Rotate Animation Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Smooth Rotate Animation</h1>

    <p>
        Continuous rotation without visible jumps between animation loops.
    </p>

    <div class="demo-grid">

        <div class="demo-card">
            <div class="ease-rotate-smooth gear">⚙️</div>
            <span>Settings</span>
        </div>

        <div class="demo-card">
            <div class="ease-rotate-smooth loader"></div>
            <span>Loading</span>
        </div>

        <div class="demo-card">
            <div class="ease-rotate-smooth refresh">⟳</div>
            <span>Refresh</span>
        </div>

    </div>

</div>

</body>
</html>
