<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Hub - Tada Color Picker Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="corporate-viewport">
        <!-- Main Premium Corporate Elevation Control Grid Card Container Shell -->
        <div class="picker-container-card">
            <header class="picker-header">
                <span class="corp-badge">Theme Console</span>
                <h2 class="picker-title">Corporate Palette</h2>
                <p class="picker-subtitle">Select a color swatch circle below to trigger the pure-CSS bouncy tada wiggle accent expansions.</p>
            </header>

            <!-- Advanced Pure-CSS Tada Color Swatches Selection Stage Canvas Area -->
            <div class="swatches-workspace">
                <div class="swatches-grid-row">
                    
                    <!-- Color Swatch Option 1 Trigger Label Group Node -->
                    <input type="radio" name="corp-color-selection" id="color-opt-blue" class="swatch-radio-gate" checked>
                    <label for="color-opt-blue" class="swatch-node color-blue ease-tada-wiggle">
                        <span class="swatch-indicator"></span>
                    </label>

                    <!-- Color Swatch Option 2 Trigger Label Group Node -->
                    <input type="radio" name="corp-color-selection" id="color-opt-purple" class="swatch-radio-gate">
                    <label for="color-opt-purple" class="swatch-node color-purple ease-tada-wiggle">
                        <span class="swatch-indicator"></span>
                    </label>

                    <!-- Color Swatch Option 3 Trigger Label Group Node -->
                    <input type="radio" name="corp-color-selection" id="color-opt-teal" class="swatch-radio-gate">
                    <label for="color-opt-teal" class="swatch-node color-teal ease-tada-wiggle">
                        <span class="swatch-indicator"></span>
                    </label>

                </div>
            </div>

            <footer class="picker-footer">
                <div class="telemetry-sync-status">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Interface Color Trajectories Verified</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
