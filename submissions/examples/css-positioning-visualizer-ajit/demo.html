<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="position-preview">

    <div class="position-card position-static">
        <h3>Static</h3>
        <div class="position-demo">
            <div class="position-box"></div>
        </div>
    </div>

    <div class="position-card position-relative">
        <h3>Relative</h3>
        <div class="position-demo">
            <div class="position-box"></div>
        </div>
    </div>

    <div class="position-card position-absolute">
        <h3>Absolute</h3>
        <div class="position-demo">
            <div class="position-box"></div>
        </div>
    </div>

    <div class="position-card position-fixed">
        <h3>Fixed</h3>
        <div class="position-demo">
            <div class="position-box"></div>
        </div>
    </div>

    <div class="position-card position-sticky">
        <h3>Sticky</h3>
        <div class="position-demo sticky-demo">
            <div class="position-box"></div>
            <div class="sticky-space"></div>
        </div>
    </div>

</div>

</body>
</html>
