<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Level Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Level System</h1>

  <div class="xp-card ease-slide-up">
    
    <h2 id="levelText" class="level">Level 1</h2>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>
</section>

<script>
let xp = 0;
let level = 1;

function gainXP() {
  xp += 25;

  if (xp >= 100) {
    xp = 0;
    level++;

    const levelText = document.getElementById("levelText");
    levelText.textContent = "Level " + level;

    // LEVEL ANIMATION
    levelText.classList.add("level-up");
    setTimeout(() => {
      levelText.classList.remove("level-up");
    }, 500);
  }

  document.getElementById("xp").textContent = xp;
  document.getElementById("progress").style.width = xp + "%";
}
</script>

</body>
</html>
