<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Video Play Overlay Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <h2>Ease Video Play Overlay Component</h2>
        <p>Hover or focus on the video card to see the smooth pulse animation.</p>

        <div class="video-card" tabindex="0">
            <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?q=80&w=800&auto=format&fit=crop" alt="Video Thumbnail" class="video-thumbnail">
            
            <div class="video-play-overlay">
                <button class="play-button" aria-label="Play Video">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

</body>
</html>
