<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>Course Progress Tracker</h1>
            <p>Track your learning journey</p>
        </div>

        <div class="progress-card">
            <h2>Web Development Bootcamp</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <span>75% Completed</span>
        </div>

        <div class="modules">
            <div class="module completed">
                <h3>HTML Basics</h3>
                <p>Completed</p>
            </div>

            <div class="module completed">
                <h3>CSS Fundamentals</h3>
                <p>Completed</p>
            </div>

            <div class="module active">
                <h3>JavaScript Essentials</h3>
                <p>In Progress</p>
            </div>

            <div class="module pending">
                <h3>React Development</h3>
                <p>Upcoming</p>
            </div>
        </div>

        <div class="achievements">
            <h2>Achievements</h2>
            <div class="badges">
                <div class="badge">🏆 Fast Learner</div>
                <div class="badge">🔥 7 Day Streak</div>
                <div class="badge">⭐ Top Performer</div>
            </div>
        </div>
    </div>
</body>
</html>
