<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk Import Review Queue</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Bulk Import Review Queue</h1>

        <p class="subtitle">
            Review imported records before confirming the batch.
        </p>

        <div class="queue">

            <div class="item">

                <div class="file">

                    <h3>customers.csv</h3>

                    <p>1,248 Records Imported</p>

                </div>

                <span class="badge success">
                    Valid
                </span>

            </div>

            <div class="item">

                <div class="file">

                    <h3>employees.xlsx</h3>

                    <p>14 Validation Warnings</p>

                </div>

                <span class="badge warning">
                    Review
                </span>

            </div>

            <div class="item">

                <div class="file">

                    <h3>inventory.csv</h3>

                    <p>8 Failed Records</p>

                </div>

                <span class="badge error">
                    Errors
                </span>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Total Records</span>

                <strong>2,846</strong>

            </div>

            <div class="stat">

                <span>Ready to Import</span>

                <strong>2,824</strong>

            </div>

        </div>

        <div class="actions">

            <button class="secondary">
                Download Report
            </button>

            <button class="primary">
                Confirm Import
            </button>

        </div>

    </div>

</div>

</body>
</html>
