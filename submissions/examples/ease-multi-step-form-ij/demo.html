<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Step Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="msf-container">
    <h1>Multi-Step Form</h1>

    <div class="msf-progress">
      <div class="msf-steps">
        <span class="msf-step active" data-step="1">1</span>
        <span class="msf-step" data-step="2">2</span>
        <span class="msf-step" data-step="3">3</span>
        <span class="msf-step" data-step="4">4</span>
      </div>
      <div class="msf-progress-bar">
        <div class="msf-progress-fill"></div>
      </div>
    </div>

    <div class="msf-form">
      <div class="msf-slide active" data-step="1">
        <h2>Personal Info</h2>
        <label>Full Name <input type="text" id="name" required></label>
        <label>Email <input type="email" id="email" required></label>
      </div>
      <div class="msf-slide" data-step="2">
        <h2>Address</h2>
        <label>Street <input type="text" id="street" required></label>
        <label>City <input type="text" id="city" required></label>
      </div>
      <div class="msf-slide" data-step="3">
        <h2>Preferences</h2>
        <label>Newsletter <input type="checkbox" id="newsletter"></label>
        <label>Theme
          <select id="theme">
            <option>Light</option>
            <option>Dark</option>
            <option>Auto</option>
          </select>
        </label>
      </div>
      <div class="msf-slide" data-step="4">
        <h2>Review & Submit</h2>
        <div class="msf-review">
          <p><strong>Name:</strong> <span id="r-name"></span></p>
          <p><strong>Email:</strong> <span id="r-email"></span></p>
          <p><strong>Street:</strong> <span id="r-street"></span></p>
          <p><strong>City:</strong> <span id="r-city"></span></p>
          <p><strong>Newsletter:</strong> <span id="r-newsletter"></span></p>
          <p><strong>Theme:</strong> <span id="r-theme"></span></p>
        </div>
      </div>
    </div>

    <div class="msf-actions" id="msf-actions">
      <button class="msf-btn msf-btn-back" id="msf-back">Back</button>
      <button class="msf-btn msf-btn-next" id="msf-next">Next</button>
    </div>

    <div class="msf-celebration" id="msf-celebration">
      <div class="msf-celebration-icon">&#10003;</div>
      <h2>Submitted!</h2>
      <p>Your form has been submitted successfully.</p>
      <button class="msf-btn msf-btn-reset" id="msf-reset">Start Over</button>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
