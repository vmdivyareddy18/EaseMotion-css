<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottom Nav Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="phone-frame">
    <div class="app-content">
      <div class="page-indicator">Home</div>
    </div>
    <nav class="bottom-nav">
      <a href="#" class="nav-item active" data-label="Home">
        <span class="nav-icon">&#127968;</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="#" class="nav-item" data-label="Search">
        <span class="nav-icon">&#128269;</span>
        <span class="nav-label">Search</span>
      </a>
      <a href="#" class="nav-item" data-label="Favorites">
        <span class="nav-icon">&#10084;</span>
        <span class="nav-label">Favorites</span>
      </a>
      <a href="#" class="nav-item" data-label="Profile">
        <span class="nav-icon">&#128100;</span>
        <span class="nav-label">Profile</span>
      </a>
      <div class="nav-indicator"></div>
    </nav>
  </div>
  <script>
    document.querySelectorAll(".nav-item").forEach(item => {
      item.addEventListener("click", (e) => {
        e.preventDefault();
        document.querySelectorAll(".nav-item").forEach(i => i.classList.remove("active"));
        item.classList.add("active");
        document.querySelector(".page-indicator").textContent = item.dataset.label;
      });
    });
  </script>
</body>
</html>
