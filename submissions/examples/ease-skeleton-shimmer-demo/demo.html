<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skeleton Loader | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h2>CSS Skeleton Loader</h2>
      <p>A beautiful, pure CSS shimmer effect to indicate content is loading, enhancing perceived performance.</p>
    </div>

    <!-- Toggle Dark Mode -->
    <div class="theme-toggle">
      <label style="cursor: pointer;">
        <input type="checkbox" id="darkModeToggle"> Simulate Dark Mode
      </label>
    </div>

    <div class="demo-section" id="skeletonSandbox">
      
      <!-- Profile Card Skeleton -->
      <div class="skeleton-card">
        <!-- Avatar -->
        <div class="ease-skeleton ease-skeleton--avatar"></div>
        
        <div class="skeleton-card-body">
          <!-- Text Blocks -->
          <div class="ease-skeleton ease-skeleton--text title"></div>
          <div class="ease-skeleton ease-skeleton--text subtitle"></div>
          <div class="ease-skeleton ease-skeleton--text"></div>
        </div>
      </div>

      <!-- Article Skeleton -->
      <div class="skeleton-article">
        <div class="ease-skeleton ease-skeleton--card image-placeholder"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 100%;"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 90%;"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 80%;"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 60%;"></div>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('darkModeToggle').addEventListener('change', function(e) {
      if(e.target.checked) {
        document.body.classList.add('dark-mode-override');
      } else {
        document.body.classList.remove('dark-mode-override');
      }
    });
  </script>
</body>
</html>
