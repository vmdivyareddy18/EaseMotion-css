<!DOCTYPE html>
<html>
<head>
  <title>Accordion UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="accordion-section">
  <h2>Accordion UI</h2>

  <div class="accordion">

    <div class="item">
      <input type="checkbox" id="item1">
      <label for="item1">What is frontend development?</label>
      <div class="content">
        <p>Frontend development focuses on UI using HTML, CSS, and JavaScript.</p>
      </div>
    </div>

    <div class="item">
      <input type="checkbox" id="item2">
      <label for="item2">What technologies do you use?</label>
      <div class="content">
        <p>I use HTML, CSS, JavaScript, and modern UI techniques.</p>
      </div>
    </div>

    <div class="item">
      <input type="checkbox" id="item3">
      <label for="item3">Is this responsive?</label>
      <div class="content">
        <p>Yes, this layout can be adapted for responsive design.</p>
      </div>
    </div>

  </div>
</section>

</body>
</html>
