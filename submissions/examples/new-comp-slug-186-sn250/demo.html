<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Showcase 186</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="ease-bg-purple-600 ease-text-white ease-py-8 ease-text-center">
        <h1 class="ease-text-4xl ease-font-bold ease-animate-fadeIn">✨ Component Showcase 186</h1>
        <p class="ease-text-lg ease-opacity-90 ease-animate-slideUp">Premium CSS-only UI Components</p>
    </header>

    <section class="ease-container ease-py-12">
        <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-animate-fadeIn">
            Premium <span class="ease-text-purple-600">Components</span>
        </h2>

        <div class="ease-grid ease-grid-cols-1 md:ease-grid-cols-2 lg:ease-grid-cols-3 ease-gap-8">

            <div class="component-card ease-bg-white ease-rounded-2xl ease-shadow-lg ease-p-6 ease-hover-lift">
                <div class="gradient-card ease-text-white ease-p-6 ease-rounded-xl ease-mb-4">
                    <i class="fas fa-rocket ease-text-4xl ease-mb-2"></i>
                    <h3 class="ease-text-xl ease-font-bold">Gradient Card</h3>
                    <p class="ease-text-sm ease-opacity-90">Beautiful gradient background with hover effects</p>
                </div>
                <button class="ease-bg-purple-600 ease-text-white ease-px-4 ease-py-2 ease-rounded-lg ease-w-full ease-hover-bg-purple-700 ease-transition">
                    Learn More
                </button>
            </div>

            <div class="component-card ease-bg-white ease-rounded-2xl ease-shadow-lg ease-p-6 ease-hover-lift ease-text-center">
                <div class="ease-w-24 ease-h-24 ease-rounded-full ease-bg-purple-100 ease-mx-auto ease-mb-4 ease-flex ease-items-center ease-justify-center ease-text-5xl">
                    👤
                </div>
                <h3 class="ease-text-xl ease-font-bold">Profile Card</h3>
                <p class="ease-text-gray-500 ease-text-sm">User profile with avatar and stats</p>
                <div class="ease-flex ease-justify-around ease-mt-4 ease-border-t ease-border-gray-200 ease-pt-4">
                    <div><span class="ease-font-bold">128</span><span class="ease-text-xs ease-block ease-text-gray-500">Posts</span></div>
                    <div><span class="ease-font-bold">5.2k</span><span class="ease-text-xs ease-block ease-text-gray-500">Followers</span></div>
                    <div><span class="ease-font-bold">312</span><span class="ease-text-xs ease-block ease-text-gray-500">Following</span></div>
                </div>
            </div>

            <div class="component-card ease-bg-white ease-rounded-2xl ease-shadow-lg ease-p-6 ease-hover-lift ease-text-center">
                <h3 class="ease-text-xl ease-font-bold ease-mb-4">Animated Buttons</h3>
                <div class="ease-flex ease-flex-wrap ease-justify-center ease-gap-3">
                    <button class="animated-btn ease-bg-purple-600 ease-text-white ease-px-6 ease-py-3 ease-rounded-lg">
                        Hover Me
                    </button>
                    <button class="animated-btn animated-btn-2 ease-bg-pink-500 ease-text-white ease-px-6 ease-py-3 ease-rounded-lg">
                        Pulse
                    </button>
                    <button class="animated-btn animated-btn-3 ease-bg-blue-500 ease-text-white ease-px-6 ease-py-3 ease-rounded-full">
                        Glow
                    </button>
                </div>
            </div>

        </div>
    </section>

    <footer class="ease-bg-gray-900 ease-text-white ease-text-center ease-py-4 ease-mt-8">
        <p class="ease-text-sm ease-opacity-75">Built with ❤️ using EaseMotion CSS · GSSoC'26</p>
    </footer>

</body>
</html>
