<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Before vs After Media Slider</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Media Split Overlay Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click and drag your cursor horizontally across the image container block below. Inline native variable updates pass slider coordinates straight to <code>clip-path</code> vectors with 0 scripts.</p>
  </header>

  <div class="alm-slider-showcase-stage">
    
    <input type="range" 
           min="0" 
           max="100" 
           value="50" 
           class="alm-slider-native-controller"
           oninput="this.parentNode.style.setProperty('--slider-val', this.value + '%')">

    <div class="alm-slider-media-pane alm-pane-overlay-before">
      <span class="alm-slider-badge-string alm-is-before-label">Original // Before</span>
      <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=800&q=80" alt="Telemetry Wireframe Matrix Texture">
    </div>

    <div class="alm-slider-media-pane alm-pane-underlying-after">
      <span class="alm-slider-badge-string alm-is-after-label">Processed // After</span>
      <img src="https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=800&q=80" alt="Telemetry Wireframe Matrix Texture Edited" style="filter: hue-rotate(140deg) saturate(2.5);">
    </div>

  </div>

</body>
</html>
