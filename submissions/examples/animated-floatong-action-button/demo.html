<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Action Button - Expand Animation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="fab-container">
  <!-- Hidden checkbox drives the expand/collapse state -->
  <input type="checkbox" id="fab-toggle" class="fab-toggle-input">

  <div class="fab-actions">
    <label class="fab-action" style="--i: 1;" title="Edit">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
    </label>
    <label class="fab-action" style="--i: 2;" title="Share">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81a3 3 0 1 0-3-3c0 .24.04.47.09.7L8.04 9.81A2.99 2.99 0 0 0 3 12a3 3 0 0 0 5.04 2.19l7.12 4.16c-.05.21-.08.43-.08.65a2.92 2.92 0 1 0 2.92-2.92z"/></svg>
    </label>
    <label class="fab-action" style="--i: 3;" title="Delete">
      <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
    </label>
  </div>

  <label for="fab-toggle" class="fab-main">
    <span class="fab-icon">+</span>
  </label>
</div>

</body>
</html>
