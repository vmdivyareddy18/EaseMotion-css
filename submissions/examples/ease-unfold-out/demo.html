<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Unfold Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div class="box">Collapsing...</div>
        <button onclick="document.querySelector('.box').classList.add('ease-unfold-out');">Fold Out</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-unfold-out');" style="border-color:#555; color:#aaa;">Reset</button>
    </div>
</body>
</html>
