<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mention Chip Input — EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" style="--input-bg: #1a1a2e; --chip-bg: #3b3b6b; --chip-color: #c6b8ff; --pop-duration: 0.3s;">
    <div class="mention-input">
      <label class="label">Tag teammates</label>
      <div class="input-area" id="inputArea">
        <div class="chips" id="chipsContainer"></div>
        <input type="text" id="mentionInput" placeholder="Type name and press Enter…" />
      </div>
      <div class="suggestions" id="suggestions">
        <button data-name="Alice">@alice</button>
        <button data-name="Bob">@bob</button>
        <button data-name="Charlie">@charlie</button>
        <button data-name="Diana">@diana</button>
      </div>
    </div>
  </div>
  <script>
    const input = document.getElementById('mentionInput');
    const chips = document.getElementById('chipsContainer');
    const suggestions = document.getElementById('suggestions').querySelectorAll('button');

    function addChip(name) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.innerHTML = '@' + name + '<button class="chip-remove" aria-label="Remove">&times;</button>';
      chip.querySelector('.chip-remove').addEventListener('click', () => {
        chip.style.transform = 'scale(0)';
        chip.style.opacity = '0';
        setTimeout(() => chip.remove(), parseInt(getComputedStyle(document.documentElement)
          .getPropertyValue('--pop-duration').trim().replace('s','')) * 1000 || 300);
      });
      chips.appendChild(chip);
      requestAnimationFrame(() => chip.classList.add('visible'));
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) {
        addChip(input.value.trim());
        input.value = '';
      }
    });
    suggestions.forEach(btn => btn.addEventListener('click', () => {
      addChip(btn.dataset.name);
      input.value = '';
      input.focus();
    }));
  </script>
</body>
</html>
