<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Circular Progress Ring — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #14141c;
      font-family: system-ui, sans-serif;
    }
    button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      background: #38bdf8;
      color: #0b0f19;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="ease-progress-ring" id="ring" style="--progress: 0;">
    <svg viewBox="0 0 140 140">
      <circle class="ring-track" cx="70" cy="70" r="60"></circle>
      <circle class="ring-fill" cx="70" cy="70" r="60" style="--circumference: 377"></circle>
    </svg>
    <span class="ring-label" id="ringLabel">0%</span>
  </div>

  <button id="animateBtn">Animate to random %</button>

  <script>
    const ring = document.getElementById('ring');
    const label = document.getElementById('ringLabel');
    const btn = document.getElementById('animateBtn');

    function setProgress(value) {
      const clamped = Math.max(0, Math.min(100, value));
      ring.style.setProperty('--progress', clamped);
      label.textContent = `${clamped}%`;
    }

    btn.addEventListener('click', () => {
      const random = Math.floor(Math.random() * 101);
      setProgress(random);
    });

    // demo initial animation
    setTimeout(() => setProgress(72), 300);
  </script>
</body>
</html>
