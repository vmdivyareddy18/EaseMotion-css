<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hyphens None Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 50px 20px; margin: 0;">

  <div class="clamped-text-card">
    <h5>Suppressed Hyphenation</h5>
    
    <div class="ease-hyphens-none" style="color: #334155; font-size: 0.95rem; line-height: 1.6; text-align: justify;">
      <p style="margin: 0;">This narrow container block completely suppresses word fragmentation thresholds. Even if explicit soft-hyphen markers like &amp;shy; or automated syllables exist, the string sequence stays completely unified without breaking across lines lines with dashes.</p>
    </div>
  </div>

</body>
</html>
