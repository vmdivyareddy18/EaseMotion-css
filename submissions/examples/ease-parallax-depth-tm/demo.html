<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parallax Depth</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="parallax-wrapper" id="parallaxWrapper">
  <div class="parallax-layer bg" id="bgLayer"></div>
  <div class="parallax-layer mid" id="midLayer"><div class="floating-card" style="top:30%;left:15%">Card A</div><div class="floating-card" style="top:50%;right:20%">Card B</div></div>
  <div class="parallax-layer foreground" id="fgLayer"><div class="float-element" style="top:20%;left:60%">&#9889;</div><div class="float-element" style="top:60%;left:30%">&#9733;</div></div>
  <div class="parallax-content"><h1>Parallax Depth</h1><p>Scroll to see layers move at different speeds.</p><div class="scroll-indicator">Scroll Down</div></div>
</div>
<div class="below-fold"><h2>More Content Below</h2><p>The parallax effect only applies within the container.</p></div>
<script>
const wrapper = document.getElementById('parallaxWrapper');
const bg = document.getElementById('bgLayer');
const mid = document.getElementById('midLayer');
const fg = document.getElementById('fgLayer');
window.addEventListener('scroll', () => {
  const rect = wrapper.getBoundingClientRect();
  if (rect.bottom < 0 || rect.top > window.innerHeight) return;
  const scrollProgress = -rect.top;
  bg.style.transform = 'translateY(' + (scrollProgress * 0.15) + 'px)';
  mid.style.transform = 'translateY(' + (scrollProgress * 0.35) + 'px)';
  fg.style.transform = 'translateY(' + (scrollProgress * 0.55) + 'px)';
});
</script>
</body></html>
