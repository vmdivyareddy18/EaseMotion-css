<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-meteor-shower demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #020817; }
    .hero {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 2rem; font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="hero ease-meteors" id="sky">
    Shooting Stars
  </div>
  <script>
    const sky = document.getElementById('sky');
    for (let i = 0; i < 18; i++) {
      const m = document.createElement('div');
      m.className = 'meteor';
      m.style.top    = Math.random() * 60 + '%';
      m.style.left   = Math.random() * 100 + '%';
      m.style.animationDuration  = (Math.random() * 4 + 3) + 's';
      m.style.animationDelay     = (Math.random() * 6) + 's';
      m.style.height = (Math.random() * 60 + 40) + 'px';
      sky.appendChild(m);
    }
  </script>
</body>
</html>
