<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-Commerce Checkout 3D Flip Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="checkout-card">

        <h2>Shopping Cart</h2>

        <p>
            Complete your purchase using our secure checkout experience.
        </p>

        <div class="price">$149.99</div>

        <a href="#checkout" class="btn">
            Proceed to Checkout
        </a>

    </div>

</div>

<div id="checkout" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="checkout-title">

        <a href="#" class="close">&times;</a>

        <h2 id="checkout-title">
            Checkout Summary
        </h2>

        <div class="summary">

            <div class="row">
                <span>Wireless Headphones</span>
                <strong>$129.99</strong>
            </div>

            <div class="row">
                <span>Shipping</span>
                <strong>$10.00</strong>
            </div>

            <div class="row">
                <span>Tax</span>
                <strong>$10.00</strong>
            </div>

            <div class="row total">
                <span>Total</span>
                <strong>$149.99</strong>
            </div>

        </div>

        <button class="pay-btn">
            Complete Payment
        </button>

    </div>

</div>

</body>
</html>
