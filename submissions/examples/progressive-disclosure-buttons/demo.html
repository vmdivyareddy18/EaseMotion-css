Set-Content -Path "submissions/examples/progressive-disclosure-buttons/demo.html" -Value @'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progressive Disclosure Buttons</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section id="buttons" class="demo-section">
        <div class="ease-container">
            <h2>Progressive Disclosure Button Section</h2>
            <div id="buttons-grid" class="ease-grid ease-gap-6">
                <!-- Initial 3 Buttons Visible -->
                <button class="ease-btn">Button 1</button>
                <button class="ease-btn">Button 2</button>
                <button class="ease-btn">Button 3</button>
                <!-- Hidden Buttons -->
                <button class="ease-btn hidden">Button 4</button>
                <button class="ease-btn hidden">Button 5</button>
                <button class="ease-btn hidden">Button 6</button>
            </div>
            <!-- Toggle Button -->
            <button id="toggle-btn" class="ease-btn ease-btn-primary">Load More</button>
        </div>
    </section>

    <script>
        const toggleBtn = document.getElementById('toggle-btn');
        const buttons = document.querySelectorAll('#buttons-grid .ease-btn');
        let isExpanded = false;

        toggleBtn.addEventListener('click', () => {
            isExpanded = !isExpanded;
            buttons.forEach((btn, index) => {
                if (index >= 3) {
                    if (isExpanded) {
                        btn.classList.remove('hidden');
                    } else {
                        btn.classList.add('hidden');
                    }
                }
            });
            toggleBtn.textContent = isExpanded ? 'View Less' : 'Load More';
        });
    </script>
</body>
</html>
'@
