<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peacock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="peacock" tabindex="0">
      <div class="fan">
        <span class="feather fe1"></span>
        <span class="feather fe2"></span>
        <span class="feather fe3"></span>
        <span class="feather fe4"></span>
        <span class="feather fe5"></span>
        <span class="feather fe6"></span>
        <span class="feather fe7"></span>
        <span class="feather fe8"></span>
        <span class="feather fe9"></span>
        <span class="feather fe10"></span>
        <span class="feather fe11"></span>
      </div>
      <span class="body"></span>
      <span class="neck"></span>
      <div class="head">
        <span class="crest"></span>
        <span class="eye"></span>
        <span class="beak"></span>
      </div>
      <span class="leg lgp"></span>
      <span class="leg rgp"></span>
    </div>
    <span class="ground"></span>
    <p class="hint">hover to display</p>
  </div>
</body>
</html>
