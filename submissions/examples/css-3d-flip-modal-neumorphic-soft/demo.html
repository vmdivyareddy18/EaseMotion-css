<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Soft 3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h2>Workspace Settings</h2>

        <p>
            Experience a smooth 3D flip modal with a modern neumorphic interface built using pure HTML and CSS.
        </p>

        <a href="#modal" class="btn">
            Open Settings
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">Preferences</h2>

        <div class="settings">

            <div class="setting">
                <span>🌙 Dark Mode</span>
                <strong>Enabled</strong>
            </div>

            <div class="setting">
                <span>🔔 Notifications</span>
                <strong>On</strong>
            </div>

            <div class="setting">
                <span>🌐 Language</span>
                <strong>English</strong>
            </div>

            <div class="setting">
                <span>🔒 Privacy</span>
                <strong>Standard</strong>
            </div>

        </div>

        <button class="action-btn">
            Save Changes
        </button>

    </div>

</div>

</body>
</html>
