<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Simulation Universe</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="sim-dashboard">
    <header class="header">
      <span class="badge">Simulator Universe</span>
      <h1>Security Simulation Universe</h1>
      <p class="subtitle">Model hypothetical global threats, run red team scenarios, and track blast metrics.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-simulation">
        <h3>🔮 Active Sim Scenario Configurations</h3>
        <div class="scenarios-grid">
          <div class="scen-card active">
            <h5>Solar Flare DDoS</h5>
            <p>Simulates concurrent 10Tbps requests mapping DNS gateways.</p>
            <button class="run-btn">Run</button>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card blast-card">
          <h3>📊 Affected Entities Forecast</h3>
          <div class="radius-meter">
            <span class="val">84.2M</span>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
