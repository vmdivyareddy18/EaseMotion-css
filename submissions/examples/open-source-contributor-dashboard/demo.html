<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Source Contributor Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="radial-sky"></div>
  <main class="dashboard-wrap">
    <header class="dashboard-header">
      <div>
        <span class="org-label">GitHub Contribution Suite</span>
        <h1>Developer Profile</h1>
      </div>
      <div class="streak-counter">
        <span class="fire-icon">🔥</span>
        <span>18 Day Streak</span>
      </div>
    </header>

    <div class="content-layout">
      <!-- Contribution Grid Mock -->
      <section class="card contributions-section">
        <h3>Commit Activity Matrix</h3>
        <div class="contrib-grid">
          <!-- Row 1 -->
          <div class="cell lvl-0"></div><div class="cell lvl-1"></div><div class="cell lvl-2"></div><div class="cell lvl-0"></div><div class="cell lvl-3"></div><div class="cell lvl-4"></div>
          <!-- Row 2 -->
          <div class="cell lvl-1"></div><div class="cell lvl-0"></div><div class="cell lvl-3"></div><div class="cell lvl-2"></div><div class="cell lvl-1"></div><div class="cell lvl-0"></div>
          <!-- Row 3 -->
          <div class="cell lvl-2"></div><div class="cell lvl-1"></div><div class="cell lvl-4"></div><div class="cell lvl-0"></div><div class="cell lvl-2"></div><div class="cell lvl-3"></div>
        </div>
      </section>

      <!-- Badge Showcase -->
      <section class="card badges-section">
        <h3>Earned Achievements</h3>
        <div class="badges-row">
          <div class="badge-item">
            <span class="badge-icon">🚀</span>
            <h4>PR Opener</h4>
          </div>
          <div class="badge-item">
            <span class="badge-icon">🐛</span>
            <h4>Bug Hunter</h4>
          </div>
          <div class="badge-item">
            <span class="badge-icon">👑</span>
            <h4>Maintainer</h4>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
