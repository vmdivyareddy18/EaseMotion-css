<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduced Motion Accessibility Support</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="motion-demo">

    <div class="motion-card">

      <h2 class="motion-title">
        Standard Animation
      </h2>

      <p class="motion-text">
        This card demonstrates floating animations,
        hover motion effects, and animated interactions.
      </p>

      <a href="#" class="motion-btn">
        Hover Me
      </a>

    </div>

    <div class="motion-card motion-reduce">

      <h2 class="motion-title">
        Reduced Motion
      </h2>

      <p class="motion-text">
        This example demonstrates accessibility-focused
        reduced motion behavior using
        prefers-reduced-motion support.
      </p>

      <a href="#" class="motion-btn motion-safe-hover">
        Accessible Interaction
      </a>

    </div>

  </div>

</body>
</html>
