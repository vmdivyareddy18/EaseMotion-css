<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Modal Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #09090b; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

  <div class="modal-overlay">
    <div class="modal-box">
      <h3 class="modal-title">Submission Showcase</h3>
      <p class="modal-text">
        This is a standalone, animation-first overlay component designed for EaseMotion CSS. 
        It pops into focus utilizing custom cubic-bezier properties.
      </p>
      <div style="text-align: right;">
        <button style="background: #ffffff; color: #000000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: pointer;">
          Dismiss
        </button>
      </div>
    </div>
  </div>

</body>
</html>
