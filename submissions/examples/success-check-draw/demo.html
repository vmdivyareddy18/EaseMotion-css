<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Success Check Draw</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion confirmation</p>
    <h1 id="demo-title">Success check draw</h1>
    <p class="intro">A confirmation state where the circle scales in and the check mark draws across.</p>

    <section class="success-card" role="status">
      <span class="check" aria-hidden="true"></span>
      <strong>Payment verified</strong>
      <span>Your receipt is ready to download.</span>
    </section>
  </main>
</body>
</html>
