<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Text Gradient</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Text Gradient</h1>
    <p class="subtitle">Gradient text using <code>background-clip: text</code> — customize via <code>--ease-gradient-from</code> and <code>--ease-gradient-to</code>.</p>
    <div class="display-area" style="flex-direction:column; gap:0.5rem; padding:1.5rem;">
      <div class="gradient-demo">
        <h2 class="ease-text-gradient" id="demoHeading">Gradient Heading</h2>
        <h3 class="ease-text-gradient" style="--ease-gradient-from: #f59e0b; --ease-gradient-to: #ef4444;">Warm Sunset</h3>
        <h3 class="ease-text-gradient" style="--ease-gradient-from: #10b981; --ease-gradient-to: #3b82f6;">Ocean Mist</h3>
        <h3 class="ease-text-gradient" style="--ease-gradient-from: #ec4899; --ease-gradient-to: #8b5cf6;">Neon Purple</h3>
      </div>
    </div>
    <p style="color:var(--color-text-muted);font-size:0.85rem;margin-bottom:0.5rem;">Click to change the top heading gradient:</p>
    <div class="gradient-palette">
      <button class="color-chip active" data-from="#3b82f6" data-to="#8b5cf6">Default</button>
      <button class="color-chip" data-from="#f59e0b" data-to="#ef4444">Warm</button>
      <button class="color-chip" data-from="#10b981" data-to="#3b82f6">Ocean</button>
      <button class="color-chip" data-from="#ec4899" data-to="#8b5cf6">Neon</button>
      <button class="color-chip" data-from="#3b82f6" data-to="#10b981">Forest</button>
    </div>
  </div>
  <script>
    const heading = document.getElementById('demoHeading');
    document.querySelectorAll('.color-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.color-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        heading.style.setProperty('--ease-gradient-from', chip.dataset.from);
        heading.style.setProperty('--ease-gradient-to', chip.dataset.to);
      });
    });
  </script>
</body>
</html>
