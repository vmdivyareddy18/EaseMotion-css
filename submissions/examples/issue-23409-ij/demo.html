<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Box Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="music-box">
    <div class="box-body"></div>
    <div class="cylinder">
      <div class="pin" style="--i:0"></div>
      <div class="pin" style="--i:1"></div>
      <div class="pin" style="--i:2"></div>
      <div class="pin" style="--i:3"></div>
      <div class="pin" style="--i:4"></div>
      <div class="pin" style="--i:5"></div>
    </div>
    <div class="comb">
      <div class="comb-tooth" style="--i:0"></div>
      <div class="comb-tooth" style="--i:1"></div>
      <div class="comb-tooth" style="--i:2"></div>
      <div class="comb-tooth" style="--i:3"></div>
      <div class="comb-tooth" style="--i:4"></div>
    </div>
    <div class="mb-note" style="--i:0">♪</div>
    <div class="mb-note" style="--i:1">♫</div>
    <div class="mb-note" style="--i:2">♩</div>
    <div class="mb-handle"></div>
  </div>
</body>
</html>
