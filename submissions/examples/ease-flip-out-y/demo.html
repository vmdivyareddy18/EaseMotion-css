<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-flip-out-y – 3D Flip Exit on Y Axis</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Flip Out Y
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the card to flip it away around its vertical axis.
    </p>

    <!-- The card that flips out -->
    <div id="flip-card" class="flip-card ease-card ease-p-8 ease-cursor-pointer ease-select-none ease-hover-shadow-xl ease-transition">
      <div class="flip-card-inner">
        <span class="ease-text-2xl">🃏</span>
        <p class="ease-font-semibold ease-mt-2">Click me</p>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      <code>rotateY(0) → rotateY(90deg)</code> + opacity 0.
    </p>
  </div>

  <script>
    const card = document.getElementById('flip-card');

    card.addEventListener('click', () => {
      // Prevent double-trigger
      if (card.classList.contains('flip-out')) return;
      card.classList.add('flip-out');
      // Reset after animation so it can be clicked again
      card.addEventListener('animationend', function handler() {
        card.classList.remove('flip-out');
        card.removeEventListener('animationend', handler);
      });
    });
  </script>

</body>
</html>
