<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input Focus Underline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Input Focus Underline</h1>

    <div class="form-group">
      <div class="variant-label">
        <label for="name">Name</label>
        <span class="variant-badge">center</span>
      </div>
      <div class="input-wrapper">
        <input type="text" id="name" placeholder="John Doe" />
      </div>
    </div>

    <div class="form-group">
      <div class="variant-label">
        <label for="email">Email</label>
        <span class="variant-badge">center</span>
      </div>
      <div class="input-wrapper">
        <input type="email" id="email" placeholder="john@example.com" />
      </div>
    </div>

    <div class="form-group">
      <div class="variant-label">
        <label for="password">Password</label>
        <span class="variant-badge">center</span>
      </div>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" />
      </div>
    </div>

    <div class="form-group">
      <div class="variant-label">
        <label for="search">Search</label>
        <span class="variant-badge">left</span>
      </div>
      <div class="input-wrapper underline-left">
        <input type="search" id="search" placeholder="Search..." />
      </div>
    </div>

    <div class="form-group">
      <div class="variant-label">
        <label for="message">Message</label>
        <span class="variant-badge">center</span>
      </div>
      <div class="input-wrapper">
        <textarea id="message" placeholder="Write your message..."></textarea>
      </div>
    </div>

    <div class="form-group">
      <div class="variant-label">
        <label for="error-field">Password</label>
        <span class="variant-badge" style="background:#fef2f2;color:#dc2625;">error</span>
      </div>
      <div class="input-wrapper has-error">
        <input type="password" id="error-field" placeholder="Min 8 characters" value="123" />
      </div>
    </div>
  </div>
</body>
</html>
