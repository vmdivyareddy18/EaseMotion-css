<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scan Reveal Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Scan Reveal Effect 🔍</h1>

  <!-- NORMAL -->
  <div class="scan-box ease-scan">
    Scan Reveal
  </div>

  <!-- SLOW -->
  <div class="scan-box ease-scan slow">
    Slow Scan
  </div>

  <!-- FAST -->
  <div class="scan-box ease-scan fast">
    Fast Scan
  </div>

  <!-- HOVER -->
  <div class="scan-box ease-scan-hover">
    Hover Scan
  </div>

</section>

</body>
</html>
