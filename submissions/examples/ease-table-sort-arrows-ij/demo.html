<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Sort Arrows</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Table Sort Arrows</h1>

    <div class="table-wrapper">
      <table id="sortable-table">
        <thead>
          <tr>
            <th data-col="name" class="sortable" aria-sort="ascending">
              Name <span class="arrow" data-col="name">▲</span>
            </th>
            <th data-col="role" class="sortable">
              Role <span class="arrow" data-col="role">▼</span>
            </th>
            <th data-col="age" class="sortable">
              Age <span class="arrow" data-col="age">▼</span>
            </th>
            <th data-col="city" class="sortable">
              City <span class="arrow" data-col="city">▼</span>
            </th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td>Alice Chen</td><td>Designer</td><td>29</td><td>Portland</td></tr>
          <tr><td>Bob Singh</td><td>Developer</td><td>34</td><td>Toronto</td></tr>
          <tr><td>Carol Davis</td><td>Manager</td><td>42</td><td>Austin</td></tr>
          <tr><td>Danilo Vega</td><td>Engineer</td><td>27</td><td>Madrid</td></tr>
          <tr><td>Elena Kim</td><td>Designer</td><td>31</td><td>Seoul</td></tr>
          <tr><td>Felix Brown</td><td>Developer</td><td>25</td><td>London</td></tr>
          <tr><td>Grace Wu</td><td>Analyst</td><td>38</td><td>Chicago</td></tr>
          <tr><td>Hugo Silva</td><td>Engineer</td><td>33</td><td>São Paulo</td></tr>
        </tbody>
      </table>
    </div>

    <p class="hint">Click any column header to sort</p>
  </div>

  <script>
    const table = document.getElementById('sortable-table');
    const tbody = document.getElementById('table-body');
    const headers = table.querySelectorAll('.sortable');

    function getRows() {
      return Array.from(tbody.querySelectorAll('tr'));
    }

    function sort(colIndex, asc) {
      const rows = getRows();
      const sorted = rows.sort((a, b) => {
        const aVal = a.children[colIndex].textContent.trim();
        const bVal = b.children[colIndex].textContent.trim();
        const aNum = parseFloat(aVal);
        const bNum = parseFloat(bVal);
        if (!isNaN(aNum) && !isNaN(bNum)) {
          return asc ? aNum - bNum : bNum - aNum;
        }
        return asc ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
      });

      rows.forEach(row => row.style.opacity = '0.4');
      sorted.forEach((row, i) => {
        tbody.appendChild(row);
        setTimeout(() => { row.style.opacity = '1'; }, i * 50);
      });
    }

    headers.forEach((th, idx) => {
      th.addEventListener('click', () => {
        const isAsc = th.getAttribute('aria-sort') === 'ascending';
        const newDir = !isAsc;

        headers.forEach(h => {
          h.classList.remove('active');
          h.setAttribute('aria-sort', 'none');
          const arrow = h.querySelector('.arrow');
          if (arrow) arrow.textContent = '▼';
        });

        th.classList.add('active');
        th.setAttribute('aria-sort', newDir ? 'ascending' : 'descending');
        const arrow = th.querySelector('.arrow');
        arrow.textContent = newDir ? '▲' : '▼';
        arrow.style.transform = newDir ? 'rotate(0deg)' : 'rotate(180deg)';

        sort(idx, newDir);
      });
    });
  </script>
</body>
</html>
