<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Error Boundary Fallback - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <div class="error-fallback-card">
            
            <div class="illustration-wrapper">
                <svg class="error-illustration" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
                    <circle cx="100" cy="110" r="50" fill="var(--error-glow)" class="anim-glow"/>
                    
                    <rect x="65" y="50" width="70" height="100" rx="8" fill="var(--cabinet-bg)" stroke="var(--primary-dark)" stroke-width="3"/>
                    
                    <rect x="73" y="62" width="54" height="14" rx="3" fill="#1e293b"/>
                    <circle cx="81" cy="69" r="2.5" fill="#10b981" />
                    <line x1="92" y1="69" x2="118" y2="69" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
                    
                    <rect x="73" y="84" width="54" height="14" rx="3" fill="#1e293b" class="anim-glitch-slot"/>
                    <circle cx="81" cy="91" r="2.5" fill="#ef4444" class="anim-pulse-red"/>
                    <line x1="92" y1="91" x2="118" y2="91" stroke="var(--error-accent)" stroke-width="2" stroke-linecap="round" class="anim-glitch-line"/>
                    
                    <rect x="73" y="106" width="54" height="14" rx="3" fill="#1e293b"/>
                    <circle cx="81" cy="113" r="2.5" fill="#64748b" />
                    <line x1="92" y1="113" x2="118" y2="113" stroke="#334155" stroke-width="2" stroke-linecap="round"/>

                    <path d="M45 80 L55 70 L50 90 Z" fill="var(--error-accent)" class="anim-spark-1"/>
                    <path d="M155 100 L145 110 L150 90 Z" fill="var(--error-accent)" class="anim-spark-2"/>
                </svg>
            </div>

            <div class="error-content">
                <h2>Something went wrong</h2>
                <p>An unexpected application error occurred, causing the server console to freeze up. No data was lost!</p>
                <div class="error-code-badge">
                    <code>Error: RENDER_BOUNDARY_BREAK_42850</code>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="location.reload();">
                    <svg class="reload-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                    <span>Try Again</span>
                </button>
                <a href="#" class="btn btn-secondary">Go to Dashboard</a>
            </div>
        </div>
    </main>
</body>
</html>
