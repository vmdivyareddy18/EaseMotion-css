<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ease-floating-label-input Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<form class="ease-float-demo" data-theme="light" novalidate>

  <!-- Default state -->
  <div class="ease-float-label">
    <input type="text" id="ease-name" placeholder=" " required />
    <label for="ease-name">Full Name</label>
  </div>

  <!-- Success state -->
  <div class="ease-float-label ease-float-label--success">
    <input type="email" id="ease-email" placeholder=" " value="user@example.com" aria-describedby="ease-email-hint" />
    <label for="ease-email">Email Address</label>
    <svg class="ease-float-label__icon ease-float-label__icon--success" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M20 6 9 17l-5-5" />
    </svg>
  </div>

  <!-- Error state -->
  <div class="ease-float-label ease-float-label--error">
    <input type="password" id="ease-password" placeholder=" " aria-describedby="ease-password-hint" aria-invalid="true" />
    <label for="ease-password">Password</label>
    <svg class="ease-float-label__icon ease-float-label__icon--error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <circle cx="12" cy="12" r="10" />
      <line x1="12" y1="8" x2="12" y2="12" />
      <line x1="12" y1="16" x2="12.01" y2="16" />
    </svg>
    <span class="ease-float-label__hint" id="ease-password-hint" role="alert">Password is required</span>
  </div>

</form>

</body>
</html>
