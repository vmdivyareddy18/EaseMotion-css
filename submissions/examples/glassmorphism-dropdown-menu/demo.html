<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Dropdown Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background element to show the glass effect -->
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>

    <nav class="navbar">
        <div class="logo">EaseMotion</div>
        
        <div class="dropdown-wrapper">
            <button class="dropdown-toggle" aria-haspopup="true" aria-expanded="false">
                Products
                <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>
            
            <div class="dropdown-menu">
                <a href="#" class="dropdown-item">
                    <div class="icon-box">🚀</div>
                    <div class="item-text">
                        <span class="item-title">Analytics</span>
                        <span class="item-desc">Real-time tracking and metrics</span>
                    </div>
                </a>
                <a href="#" class="dropdown-item">
                    <div class="icon-box">🛡️</div>
                    <div class="item-text">
                        <span class="item-title">Security</span>
                        <span class="item-desc">Advanced threat protection</span>
                    </div>
                </a>
                <a href="#" class="dropdown-item">
                    <div class="icon-box">⚡</div>
                    <div class="item-text">
                        <span class="item-title">Performance</span>
                        <span class="item-desc">Optimized for speed at scale</span>
                    </div>
                </a>
            </div>
        </div>
        
        <div class="nav-actions">
            <a href="#" class="login-link">Login</a>
        </div>
    </nav>
</body>
</html>
