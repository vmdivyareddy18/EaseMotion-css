<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading Utilities | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="skeleton-showcase-wrapper">
    <header class="showcase-header">
      <h1>Skeleton Loading Utilities</h1>
      <p>A proposal for <code>core/animations.css</code> to add standard shimmering skeleton utilities.</p>
    </header>

    <div class="demo-area">
      <!-- Skeleton UI Card -->
      <div class="skeleton-card">
        <!-- Avatar -->
        <div class="em-skeleton avatar"></div>
        
        <div class="skeleton-content">
          <!-- Title -->
          <div class="em-skeleton title"></div>
          <!-- Lines -->
          <div class="em-skeleton line"></div>
          <div class="em-skeleton line short"></div>
          
          <!-- Pulsing Button Alternative -->
          <div class="em-skeleton-pulse button"></div>
        </div>
      </div>
    </div>
    
  </div>

</body>
</html>
