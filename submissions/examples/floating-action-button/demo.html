<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Action Button</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div style="min-height: 200vh; background: #f8fafc; padding: 2rem;">
    <h1 style="color: #1e293b;">Scroll down to see the FAB</h1>
    <p style="color: #64748b; margin-top: 0.5rem;">A floating action button sits fixed at the bottom-right corner.</p>
  </div>

  <button class="fab" id="fab" aria-label="Add new item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="24" height="24">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <script src="script.js"></script>
</body>
</html>
