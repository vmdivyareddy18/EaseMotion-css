<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Empty State UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-empty-state">
        <div class="ease-empty-icon-wrap">
            <div class="ease-empty-pulse"></div>
            <div class="ease-empty-icon">📁</div>
        </div>
        <h3>No projects found</h3>

        <button class="ease-empty-btn">Create Project</button>
    </div>
</body>
</html>
