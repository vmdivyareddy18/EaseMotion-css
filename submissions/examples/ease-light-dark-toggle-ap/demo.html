<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Light Dark Toggle</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Ease Light Dark Toggle</h1>

    <div class="wrapper">

      <input
        type="checkbox"
        id="toggle"
        aria-label="Toggle Light and Dark Mode"
      >

      <label for="toggle" class="toggle">

        <span class="text light">
          LIGHT<br>MODE
        </span>

        <span class="text dark">
          DARK<br>MODE
        </span>

        <span class="thumb"></span>

      </label>

    </div>

    <p class="status">
      Current Mode:
      <span id="mode-text">Light Mode</span>
    </p>

  </div>

  <script>
    const toggle = document.getElementById("toggle");
    const modeText = document.getElementById("mode-text");

    // Load saved theme
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      toggle.checked = true;
      document.body.classList.add("dark-mode");
      modeText.textContent = "Dark Mode";
      modeText.style.color = "#a855f7";
    } else {
      modeText.textContent = "Light Mode";
      modeText.style.color = "#ef4444";
    }

    toggle.addEventListener("change", () => {

      const isDark = toggle.checked;

      document.body.classList.toggle("dark-mode", isDark);

      modeText.textContent = isDark
        ? "Dark Mode"
        : "Light Mode";

      modeText.style.color = isDark
        ? "#a855f7"
        : "#ef4444";

      localStorage.setItem(
        "theme",
        isDark ? "dark" : "light"
      );

    });
  </script>

</body>
</html>
