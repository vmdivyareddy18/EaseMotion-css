<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Flex-Gap Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-badge – Flex Gap Collapse Fix</h2>
  <div class="flex-row">
    <div>
      <div class="ease-badge-host">
        <button class="icon-btn" aria-label="Notifications">🔔</button>
        <span class="ease-badge" aria-label="3 notifications">3</span>
      </div>
      <p class="label">Count badge</p>
    </div>
    <div>
      <div class="ease-badge-host">
        <button class="icon-btn" aria-label="Messages">✉️</button>
        <span class="ease-badge ease-badge--dot ease-badge--success" aria-label="Online"></span>
      </div>
      <p class="label">Dot badge</p>
    </div>
    <div>
      <div class="ease-badge-host">
        <button class="icon-btn" aria-label="Cart">🛒</button>
        <span class="ease-badge ease-badge--warning" aria-label="99+ items">99+</span>
      </div>
      <p class="label">Warning badge</p>
    </div>
  </div>
</body>
</html>
