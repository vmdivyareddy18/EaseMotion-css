<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Morphing Loading State - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="ease-btn-morph" id="asyncTriggerBtn">
    <span class="ease-btn-text">Submit Request</span>
    <div class="ease-btn-spinner"></div>
  </button>

  <script>
    const button = document.getElementById('asyncTriggerBtn');

    // Simulates an async form submission lifecycle tracking timeline on click focus
    button.addEventListener('click', () => {
      // Prevents multiple clicking loops during processing
      if (button.classList.contains('ease-loading')) return;

      // Activates the core utility class state morph
      button.classList.add('ease-loading');

      // Automatically reverts back to default after 3 seconds to enable continuous local testing
      setTimeout(() => {
        button.classList.remove('ease-loading');
      }, 3000);
    });
  </script>

</body>
</html>
