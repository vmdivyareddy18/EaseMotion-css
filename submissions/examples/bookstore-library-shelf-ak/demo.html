<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore Library Shelf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Library Shelf</h1>
    <div class="search-bar">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search by title or author...">
      <select class="genre-select" id="genreSelect">
        <option value="all">All Genres</option>
        <option value="fiction">Fiction</option>
        <option value="scifi">Sci-Fi</option>
        <option value="nonfiction">Non-Fiction</option>
        <option value="fantasy">Fantasy</option>
        <option value="mystery">Mystery</option>
      </select>
    </div>
    <div class="book-grid" id="bookGrid"></div>
    <div class="empty-state" id="emptyState">No books found matching your search.</div>
  </div>
  <script>
    const books = [
      { title: 'The Great Gatsby', author: 'F. Scott Fitzgerald', genre: 'fiction', year: 1925, color: '#6366f1' },
      { title: 'Dune', author: 'Frank Herbert', genre: 'scifi', year: 1965, color: '#f59e0b' },
      { title: 'Sapiens', author: 'Yuval Noah Harari', genre: 'nonfiction', year: 2011, color: '#22c55e' },
      { title: 'The Hobbit', author: 'J.R.R. Tolkien', genre: 'fantasy', year: 1937, color: '#ec4899' },
      { title: '1984', author: 'George Orwell', genre: 'fiction', year: 1949, color: '#6366f1' },
      { title: 'Foundation', author: 'Isaac Asimov', genre: 'scifi', year: 1951, color: '#f59e0b' },
      { title: 'Atomic Habits', author: 'James Clear', genre: 'nonfiction', year: 2018, color: '#22c55e' },
      { title: 'The Name of the Wind', author: 'Patrick Rothfuss', genre: 'fantasy', year: 2007, color: '#ec4899' },
      { title: 'The Girl with the Dragon Tattoo', author: 'Stieg Larsson', genre: 'mystery', year: 2005, color: '#14b8a6' },
      { title: 'To Kill a Mockingbird', author: 'Harper Lee', genre: 'fiction', year: 1960, color: '#6366f1' },
      { title: 'Neuromancer', author: 'William Gibson', genre: 'scifi', year: 1984, color: '#f59e0b' },
      { title: 'Educated', author: 'Tara Westover', genre: 'nonfiction', year: 2018, color: '#22c55e' },
      { title: 'Harry Potter and the Sorcerer\'s Stone', author: 'J.K. Rowling', genre: 'fantasy', year: 1997, color: '#ec4899' },
      { title: 'Gone Girl', author: 'Gillian Flynn', genre: 'mystery', year: 2012, color: '#14b8a6' },
      { title: 'Brave New World', author: 'Aldous Huxley', genre: 'fiction', year: 1932, color: '#6366f1' },
    ];

    const bookGrid = document.getElementById('bookGrid');
    const searchInput = document.getElementById('searchInput');
    const genreSelect = document.getElementById('genreSelect');
    const emptyState = document.getElementById('emptyState');

    function renderBooks() {
      const query = searchInput.value.toLowerCase();
      const genre = genreSelect.value;
      const filtered = books.filter(b => {
        const matchSearch = b.title.toLowerCase().includes(query) || b.author.toLowerCase().includes(query);
        const matchGenre = genre === 'all' || b.genre === genre;
        return matchSearch && matchGenre;
      });

      if (filtered.length === 0) {
        bookGrid.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }
      emptyState.style.display = 'none';

      bookGrid.innerHTML = filtered.map(b => `
        <div class="book-card" style="--accent: ${b.color}">
          <div class="book-spine" style="background: ${b.color}">
            <span class="book-spine-text">${b.title[0]}</span>
          </div>
          <div class="book-info">
            <h3 class="book-title">${b.title}</h3>
            <p class="book-author">${b.author}</p>
            <span class="book-year">${b.year}</span>
            <span class="book-genre">${b.genre}</span>
          </div>
        </div>
      `).join('');
    }

    searchInput.addEventListener('input', renderBooks);
    genreSelect.addEventListener('change', renderBooks);
    renderBooks();
  </script>
</body>
</html>
