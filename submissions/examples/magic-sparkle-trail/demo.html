<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magic Sparkle Trail - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Magic Sparkle Trail</h1>
    <p class="description">A sparkling magical trail that fades behind moving elements.</p>
    <div class="trail-container" tabindex="0" role="img" aria-label="Magic sparkle trail">
      <div class="orb">
        <span class="spark sp1">+</span>
        <span class="spark sp2">+</span>
        <span class="spark sp3">+</span>
        <span class="spark sp4">+</span>
        <span class="spark sp5">+</span>
        <span class="spark sp6">+</span>
      </div>
    </div>
  </div>
</body>
</html>
