<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquee Logo Cloud</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="logo-cloud">

    <div class="section-header">
        <span class="badge">Trusted Worldwide</span>
        <h1>Teams Building With EaseMotion CSS</h1>
        <p>
            Animated marquee logo cloud showcasing brands,
            partners, and customer organizations.
        </p>
    </div>

    <div class="marquee-wrapper">

        <div class="fade-left"></div>
        <div class="fade-right"></div>

        <div class="marquee-track">

            <div class="logo">OpenAI</div>
            <div class="logo">Stripe</div>
            <div class="logo">Spotify</div>
            <div class="logo">Notion</div>
            <div class="logo">Slack</div>
            <div class="logo">Vercel</div>
            <div class="logo">Figma</div>
            <div class="logo">GitHub</div>

            <div class="logo">OpenAI</div>
            <div class="logo">Stripe</div>
            <div class="logo">Spotify</div>
            <div class="logo">Notion</div>

            <div class="logo">Vercel</div>
            <div class="logo">Figma</div>
            <div class="logo">GitHub</div>

        </div>

    </div>

</section>

</body>
</html>
