<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Grid Layout</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="masonry">
      <div class="masonry-item" style="height: 160px; background: #a5b4fc;">1</div>
      <div class="masonry-item" style="height: 220px; background: #f9a8d4;">2</div>
      <div class="masonry-item" style="height: 140px; background: #86efac;">3</div>
      <div class="masonry-item" style="height: 260px; background: #fde68a;">4</div>
      <div class="masonry-item" style="height: 180px; background: #fdba74;">5</div>
      <div class="masonry-item" style="height: 200px; background: #c4b5fd;">6</div>
      <div class="masonry-item" style="height: 150px; background: #7dd3fc;">7</div>
      <div class="masonry-item" style="height: 240px; background: #fca5a5;">8</div>
      <div class="masonry-item" style="height: 170px; background: #d8b4fe;">9</div>
    </div>
  </div>
</body>
</html>
