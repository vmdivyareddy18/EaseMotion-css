<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Fade-In Modal</title>
    <!-- Import global EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component specific styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-app-bg dashboard-layout">
    <!-- Simulated Dashboard Sidebar -->
    <aside class="dashboard-sidebar ease-slide-right">
        <div class="sidebar-logo">Logo</div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">Overview</a>
            <a href="#" class="nav-item">Analytics</a>
            <a href="#" class="nav-item">Reports</a>
            <a href="#" class="nav-item">Settings</a>
        </nav>
    </aside>

    <div class="dashboard-main ease-fade-in">
        <header class="dashboard-header">
            <h1 class="dashboard-title">Dashboard Overview</h1>
            <!-- Pure CSS Trigger Hack -->
            <input type="checkbox" id="modal-trigger" class="modal-trigger-input" aria-hidden="true" />
            
            <label for="modal-trigger" class="ease-btn primary-btn ease-hover-lift modal-open-btn" tabindex="0" role="button" aria-haspopup="dialog" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                Create New Report
            </label>

            <!-- Modal Overlay and Container -->
            <div class="modal-overlay">
                <label for="modal-trigger" class="modal-close-backdrop" aria-label="Close modal"></label>
                
                <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
                    <div class="modal-header">
                        <h2 id="modal-title">Create New Report</h2>
                        <label for="modal-trigger" class="modal-close-btn ease-hover-lift" tabindex="0" role="button" aria-label="Close modal" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                            &times;
                        </label>
                    </div>
                    <div class="modal-body">
                        <p id="modal-desc">Configure the parameters for your new analytics report. This modal features a smooth, pure CSS fade-in and scale animation optimized for dashboard environments.</p>
                        
                        <div class="form-group">
                            <label class="form-label">Report Name</label>
                            <input type="text" class="form-input" placeholder="e.g. Q3 Performance Summary">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Data Range</label>
                            <select class="form-input">
                                <option>Last 7 Days</option>
                                <option>Last 30 Days</option>
                                <option>Year to Date</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <label for="modal-trigger" class="ease-btn secondary-btn ease-hover-lift" tabindex="0" role="button" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">Cancel</label>
                        <label for="modal-trigger" class="ease-btn primary-btn ease-hover-lift" tabindex="0" role="button" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">Generate Report</label>
                    </div>
                </div>
            </div>
        </header>

        <section class="dashboard-content">
            <div class="card placeholder-card"></div>
            <div class="card placeholder-card"></div>
            <div class="card placeholder-card wide"></div>
        </section>
    </div>
</body>
</html>
