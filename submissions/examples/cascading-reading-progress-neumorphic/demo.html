<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Reading Progress - Neumorphic Design</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="neumorphic-viewport">
        <div class="progress-container-card">
            <span class="section-badge">DOCUMENT PROGRESS</span>
            
            <div class="cascading-deck">
                <div class="progress-tier tier-1" style="--tier-index: 0; --fill-width: 100%;">
                    <div class="tier-track">
                        <div class="tier-fill"></div>
                    </div>
                    <span class="tier-label">Chapter 1: Foundations</span>
                </div>
                
                <div class="progress-tier tier-2" style="--tier-index: 1; --fill-width: 75%;">
                    <div class="tier-track">
                        <div class="tier-fill"></div>
                    </div>
                    <span class="tier-label">Chapter 2: Architecture</span>
                </div>
                
                <div class="progress-tier tier-3" style="--tier-index: 2; --fill-width: 40%;">
                    <div class="tier-track">
                        <div class="tier-fill"></div>
                    </div>
                    <span class="tier-label">Chapter 3: Optimization</span>
                </div>
                
                <div class="progress-tier tier-4" style="--tier-index: 3; --fill-width: 0%;">
                    <div class="tier-track">
                        <div class="tier-fill"></div>
                    </div>
                    <span class="tier-label">Chapter 4: Deployment</span>
                </div>
            </div>
            
            <div class="progress-footer">
                <p class="status-indicator">Overall Reading Completion: 53%</p>
            </div>
        </div>
    </div>

</body>
</html>
