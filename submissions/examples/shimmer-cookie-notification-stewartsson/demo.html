<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Dashboard - Shimmer Cookie Notification Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-viewport">
        <!-- Mock Dark Mode Admin Control Panel Background Workspace Surface -->
        <main class="mock-workspace-panel">
            <header class="panel-header">
                <h1>Infrastructure Command Node</h1>
                <p>System metrics and live server sync logs operational.</p>
            </header>
            <div class="metrics-grid-layout">
                <div class="metric-card"><h4>System Health</h4><p class="metric-value">98.4%</p></div>
                <div class="metric-card"><h4>Network Load</h4><p class="metric-value">2.4 Gbps</p></div>
            </div>
        </main>

        <!-- Pure-CSS Functional Cookie Notification Dismissal Trigger Gate -->
        <input type="checkbox" id="cookie-dismiss-gate" class="cookie-input-gate">

        <!-- Advanced Pure-CSS Shimmering Cookie Notification Banner Container -->
        <div class="shimmer-cookie-banner">
            <!-- Continuous Moving Gradient Light Accent Layer -->
            <div class="shimmer-overlay-light ease-shimmer-sweep"></div>
            
            <div class="banner-inner-content">
                <div class="cookie-text-block">
                    <h3 class="banner-title">🍪 Cookie Integrity Verification</h3>
                    <p class="banner-desc">We utilize encrypted node data tokens to optimize interface synchronization and ensure compliance metrics remain green.</p>
                </div>
                
                <div class="banner-actions-row">
                    <label for="cookie-dismiss-gate" class="action-btn accept-trigger">Accept Tokens</label>
                    <label for="cookie-dismiss-gate" class="action-btn decline-trigger">Decline</label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
