<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Select UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Floating Select UI Example</h1>
      <p>Animated floating labels and focus states for custom select field UI patterns.</p>
    </header>

    <section class="select-grid">
      <label class="floating-select">
        <select>
          <option value="" disabled selected></option>
          <option value="design">Design</option>
          <option value="development">Development</option>
          <option value="marketing">Marketing</option>
        </select>
        <span>Category</span>
      </label>

      <label class="floating-select floating-select--accent">
        <select>
          <option value="" disabled selected></option>
          <option value="small">Small</option>
          <option value="medium">Medium</option>
          <option value="large">Large</option>
        </select>
        <span>Size</span>
      </label>

      <label class="floating-select floating-select--soft">
        <select>
          <option value="" disabled selected></option>
          <option value="us">United States</option>
          <option value="ca">Canada</option>
          <option value="uk">United Kingdom</option>
        </select>
        <span>Country</span>
      </label>

      <label class="floating-select floating-select--success">
        <select>
          <option value="" disabled selected></option>
          <option value="complete">Complete</option>
          <option value="pending">Pending</option>
          <option value="scheduled">Scheduled</option>
        </select>
        <span>Status</span>
      </label>
    </section>
  </main>
</body>
</html>
