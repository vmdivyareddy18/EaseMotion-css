<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Shimmer Pulse Modal (Neumorphic Soft)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#neumorphic-modal" class="demo-trigger-btn">Open Modal</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="neumorphic-modal" class="neumorphic-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="neumorphic-modal-backdrop-close" tabindex="-1" aria-hidden="true"></a>

    <div class="neumorphic-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      
      <div class="neumorphic-modal-header">
        <h2 id="modal-title" class="neumorphic-modal-title">Neumorphic Pulse</h2>
        <a href="#" class="neumorphic-modal-close" aria-label="Close modal dialog">&times;</a>
      </div>
      
      <div class="neumorphic-modal-body">
        <p class="neumorphic-modal-text">
          Notice the smooth <strong>Shimmer Pulse</strong> interaction. 
          The modal features soft shadows typical of neumorphic design, and a subtle glowing shimmer pulse effect on elements.
        </p>
      </div>
      
      <div class="neumorphic-modal-footer">
        <a href="#" class="neumorphic-modal-btn">Cancel</a>
        <a href="#" class="neumorphic-modal-btn neumorphic-modal-btn-primary">Confirm</a>
      </div>
      
    </div>
  </div>

</body>
</html>
