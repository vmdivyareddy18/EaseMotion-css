<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Break Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="typography-sandbox-canvas">
    <h4 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.25rem;">Overflow Mitigation Matrix</h4>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-bottom: 1.5rem;">
      The <code>.ease-word-break</code> utility forces browsers to break long, continuous strings (like URLs or serial codes) that would otherwise push outside their container boundaries.
    </p>

    <div class="overflow-demo-box">
      <div class="typography-specimen ease-word-break">
        https://extraordinarilylongurlthatbreaksgrids.com/asset/v1/user-profile-data-stream-optimized
      </div>
    </div>
  </div>

</body>
</html>
