<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease API Request Flow</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Ease API Request Flow</h1>

<div class="flow">

<div class="box">👤<span>Client</span></div>

<div class="line">
<div class="packet"></div>
</div>

<div class="box">🌐<span>API</span></div>

<div class="line">
<div class="packet delay1"></div>
</div>

<div class="box">⚙️<span>Server</span></div>

<div class="line">
<div class="packet delay2"></div>
</div>

<div class="box">🗄️<span>Database</span></div>

</div>

<p>Animated request packets moving across the API pipeline.</p>

</body>
</html>
