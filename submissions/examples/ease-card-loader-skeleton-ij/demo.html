<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Loader Skeleton — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Card Loader Skeleton</h1>
  <p class="subtitle">Card-shaped placeholders with shimmer sweep effect</p>

  <div class="demo-wrapper">
    <div class="sk-card" id="skeletonCard">
      <div class="sk-avatar"></div>
      <div class="sk-line sk-line--title"></div>
      <div class="sk-line"></div>
      <div class="sk-line"></div>
      <div class="sk-line sk-line--short"></div>
    </div>
    <button class="sk-btn" id="toggleBtn">Toggle Loaded</button>
  </div>

  <section class="usage">
    <h2>Usage</h2>
    <pre><code>&lt;div class="sk-card"&gt;
  &lt;div class="sk-avatar"&gt;&lt;/div&gt;
  &lt;div class="sk-line sk-line--title"&gt;&lt;/div&gt;
  &lt;div class="sk-line"&gt;&lt;/div&gt;
  &lt;div class="sk-line sk-line--short"&gt;&lt;/div&gt;
&lt;/div&gt;</code></pre>
  </section>

  <script>
    (function() {
      var card = document.getElementById('skeletonCard');
      var btn = document.getElementById('toggleBtn');
      var loaded = false;
      btn.addEventListener('click', function() {
        loaded = !loaded;
        btn.textContent = loaded ? 'Toggle Loading' : 'Toggle Loaded';
        if (loaded) {
          card.classList.add('sk-loaded');
        } else {
          card.classList.remove('sk-loaded');
        }
      });
    })();
  </script>
</body>
</html>
