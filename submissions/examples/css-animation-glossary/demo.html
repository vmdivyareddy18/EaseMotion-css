<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Glossary Demo</title>
  <link rel="stylesheet" href="../../../src/ease-motion.css"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>EaseMotion CSS Terminology Visualizer</h1>
  <p>Hover over the cards below to see how different core animation properties behave in real time.</p>

  <div class="demo-grid">
    <div class="card">
      <h3>Duration (Speed)</h3>
      <p><code>0.3s</code> vs <code>1.5s</code> cycle speeds.</p>
      <button class="ease-bounce" style="--ease-animation-duration: 0.3s;">Fast (0.3s)</button>
      <button class="ease-bounce" style="--ease-animation-duration: 1.5s;">Slow (1.5s)</button>
    </div>

    <div class="card">
      <h3>Delay (Wait Time)</h3>
      <p>Starts instantly vs waiting 1 full second.</p>
      <button class="ease-pulse">Instant</button>
      <button class="ease-pulse" style="--ease-animation-delay: 1s;">Delayed (1s)</button>
    </div>

    <div class="card">
      <h3>Iteration Count</h3>
      <p>Plays exactly twice vs loops forever.</p>
      <button class="ease-spin" style="--ease-animation-iterations: 2;">2 Spins Only</button>
      <button class="ease-spin" style="--ease-animation-iterations: infinite;">Infinite Spins</button>
    </div>
  </div>

</body>
</html>
