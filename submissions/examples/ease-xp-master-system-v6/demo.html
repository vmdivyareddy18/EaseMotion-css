<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Master System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Level Progress System</h1>

  <div class="xp-card ease-slide-up">

    <!-- LEVEL -->
    <h2 id="levelText" class="level">Level 1</h2>

    <!-- XP BAR -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <!-- FLOAT XP -->
    <div id="xp-float" class="xp-float">+50 XP</div>

    <!-- GRAPH -->
    <svg width="260" height="140" class="graph">
      <polyline id="line" fill="none" stroke="#22c55e" stroke-width="3"
        points="0,130 50,110 100,100 150,80 200,60 250,40"/>
      
      <circle class="point" cx="50" cy="110" r="4"/>
      <circle class="point" cx="100" cy="100" r="4"/>
      <circle class="point" cx="150" cy="80" r="4"/>
      <circle class="point" cx="200" cy="60" r="4"/>
      <circle class="point" cx="250" cy="40" r="4"/>
    </svg>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>

  <!-- REWARD -->
  <div id="reward" class="reward-text">LEVEL UP 🎉</div>

</section>

<script>
let xp = 0;
let level = 1;

function gainXP() {
  const gain = Math.random() > 0.5 ? 50 : 100;
  xp += gain;

  // FLOAT TEXT
  const float = document.getElementById("xp-float");
  float.textContent = "+" + gain + " XP";
  float.classList.add("show");
  setTimeout(() => float.classList.remove("show"), 600);

  // LEVEL UP
  if (xp >= 100) {
    xp = 0;
    level++;

    const levelText = document.getElementById("levelText");
    levelText.textContent = "Level " + level;

    levelText.classList.add("level-up");
    setTimeout(() => levelText.classList.remove("level-up"), 500);

    // REWARD
    const reward = document.getElementById("reward");
    reward.classList.add("show");
    setTimeout(() => reward.classList.remove("show"), 1200);

    animateGraph();
  }

  // UPDATE BAR
  document.getElementById("xp").textContent = xp;
  document.getElementById("progress").style.width = xp + "%";
}

function animateGraph() {
  const line = document.getElementById("line");
  const length = line.getTotalLength();

  line.style.strokeDasharray = length;
  line.style.strokeDashoffset = length;

  setTimeout(() => {
    line.style.transition = "stroke-dashoffset 1.5s ease";
    line.style.strokeDashoffset = "0";
  }, 100);

  document.querySelectorAll(".point").forEach((p, i) => {
    setTimeout(() => p.classList.add("show"), i * 200);
  });
}
</script>

</body>
</html>
