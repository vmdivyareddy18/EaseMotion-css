<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Stagger Utilities — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f9fafb; }
    .card { background: #6c63ff; color: white; padding: 1rem 1.5rem; border-radius: 10px; margin: 0.5rem; font-weight: bold; animation: slideUp 0.5s ease both; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .grid { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
    h3 { margin-top: 2rem; }
  </style>
</head>
<body>
  <h2>Stagger Utilities Demo</h2>

  <h3>.stagger-sm (50ms steps)</h3>
  <div class="grid stagger-sm">
    <div class="card">Item 1</div>
    <div class="card">Item 2</div>
    <div class="card">Item 3</div>
    <div class="card">Item 4</div>
  </div>

  <h3>.stagger (100ms steps)</h3>
  <div class="grid stagger">
    <div class="card">Item 1</div>
    <div class="card">Item 2</div>
    <div class="card">Item 3</div>
    <div class="card">Item 4</div>
  </div>

  <h3>.stagger-md (150ms steps)</h3>
  <div class="grid stagger-md">
    <div class="card">Item 1</div>
    <div class="card">Item 2</div>
    <div class="card">Item 3</div>
    <div class="card">Item 4</div>
  </div>
</body>
</html>
