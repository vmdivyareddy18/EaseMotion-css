<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Freeze Frost - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Freeze Frost</h1>

    <div class="frost-card" id="frostCard">
      <div class="frost-content">
        <div class="frost-icon">
          <div class="icicle i1"></div>
          <div class="icicle i2"></div>
          <div class="icicle i3"></div>
        </div>
        <span class="frost-title">Frozen</span>
      </div>
      <div class="frost-overlay"></div>
      <button class="frost-btn" id="frostBtn">&#10052; Freeze</button>
    </div>

    <p class="description">A frosty blue/white crystalline overlay spreads across the element via clip-path animation, simulating freezing. Icicles hang from the top as decoration.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
