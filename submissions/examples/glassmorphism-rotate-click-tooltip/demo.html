<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Rotate-Click Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-blur-circle circle-1"></div>
  <div class="bg-blur-circle circle-2"></div>

  <main class="glass-wrapper">
    <div class="glass-card">
      <h2 class="glass-title">Premium Access</h2>
      
      <div class="glass-row">
        <span class="glass-label">Cloud Encryption Storage</span>
        
        <div class="ease-glass-tooltip-container">
          <input type="checkbox" id="storage-tip-toggle" class="ease-glass-toggle" aria-label="Toggle storage tooltip">
          <label for="storage-tip-toggle" class="ease-glass-trigger" tabindex="0" role="button" aria-describedby="storage-tip">
            <svg class="info-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </label>
          
          <div id="storage-tip" class="ease-glass-content" role="tooltip">
            All data blocks are fragmented and distributed via 256-bit AES cryptographic protocols.
          </div>
        </div>
      </div>

      <div class="glass-row">
        <span class="glass-label">Priority API Node Access</span>
        <div class="ease-glass-tooltip-container">
          <input type="checkbox" id="api-tip-toggle" class="ease-glass-toggle" aria-label="Toggle API node tooltip">
          <label for="api-tip-toggle" class="ease-glass-trigger" tabindex="0" role="button" aria-describedby="api-tip">
            <svg class="info-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </label>
          
          <div id="api-tip" class="ease-glass-content" role="tooltip">
            Bypasses global queues to routing nodes, delivering sub-15ms webhook execution response loops.
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Essential Keyboard a11y: Allow Enter/Space on label to trigger the underlying hidden checkbox
    document.querySelectorAll('.ease-glass-trigger').forEach(trigger => {
      trigger.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const checkbox = document.getElementById(trigger.getAttribute('for'));
          checkbox.click();
        }
      });
    });
  </script>
</body>
</html>
