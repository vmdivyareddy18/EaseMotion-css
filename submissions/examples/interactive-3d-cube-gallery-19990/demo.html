<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Cube Gallery - Pure CSS</title>
    <!-- Base Typography -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="gallery-container">
        <header class="gallery-header">
            <h1>Pure CSS 3D Cube Gallery</h1>
            <p>Select a face to rotate the cube. 100% JavaScript-free state management.</p>
        </header>

        <!-- PURE CSS STATE MANAGEMENT (Radio Buttons) -->
        <input type="radio" name="cube-state" id="show-front" checked>
        <input type="radio" name="cube-state" id="show-right">
        <input type="radio" name="cube-state" id="show-back">
        <input type="radio" name="cube-state" id="show-left">
        <input type="radio" name="cube-state" id="show-top">
        <input type="radio" name="cube-state" id="show-bottom">

        <!-- Navigation Buttons -->
        <nav class="cube-nav">
            <label for="show-front" class="nav-btn">Front</label>
            <label for="show-right" class="nav-btn">Right</label>
            <label for="show-back" class="nav-btn">Back</label>
            <label for="show-left" class="nav-btn">Left</label>
            <label for="show-top" class="nav-btn">Top</label>
            <label for="show-bottom" class="nav-btn">Bottom</label>
        </nav>

        <!-- The 3D Scene and Cube -->
        <div class="scene">
            <div class="cube">
                <div class="cube-face cube-face-front">
                    <h2>FRONT</h2>
                    <p>Image Gallery 1</p>
                </div>
                <div class="cube-face cube-face-right">
                    <h2>RIGHT</h2>
                    <p>Image Gallery 2</p>
                </div>
                <div class="cube-face cube-face-back">
                    <h2>BACK</h2>
                    <p>Image Gallery 3</p>
                </div>
                <div class="cube-face cube-face-left">
                    <h2>LEFT</h2>
                    <p>Image Gallery 4</p>
                </div>
                <div class="cube-face cube-face-top">
                    <h2>TOP</h2>
                    <p>Image Gallery 5</p>
                </div>
                <div class="cube-face cube-face-bottom">
                    <h2>BOTTOM</h2>
                    <p>Image Gallery 6</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
