<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Badge Counter UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Badge Counter UI Example</h1>
      <p>Badge counters with animated count updates, scale, and shake effects.</p>
    </header>

    <section class="badge-grid">
      <div class="badge-card">
        <div class="badge-card__label">Notifications</div>
        <div class="badge-counter">
          <span class="badge-counter__icon">🔔</span>
          <span class="badge-counter__count" id="countA">0</span>
        </div>
        <div class="badge-card__actions">
          <button class="badge-card__btn" data-target="countA" data-action="increment">Add</button>
          <button class="badge-card__btn" data-target="countA" data-action="reset">Reset</button>
        </div>
      </div>

      <div class="badge-card badge-card--accent">
        <div class="badge-card__label">Messages</div>
        <div class="badge-counter badge-counter--accent">
          <span class="badge-counter__icon">💬</span>
          <span class="badge-counter__count" id="countB">0</span>
        </div>
        <div class="badge-card__actions">
          <button class="badge-card__btn" data-target="countB" data-action="increment">Add</button>
          <button class="badge-card__btn" data-target="countB" data-action="reset">Reset</button>
        </div>
      </div>

      <div class="badge-card badge-card--soft">
        <div class="badge-card__label">Alerts</div>
        <div class="badge-counter badge-counter--soft">
          <span class="badge-counter__icon">⚠️</span>
          <span class="badge-counter__count" id="countC">0</span>
        </div>
        <div class="badge-card__actions">
          <button class="badge-card__btn" data-target="countC" data-action="increment">Add</button>
          <button class="badge-card__btn" data-target="countC" data-action="reset">Reset</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll('.badge-card__btn').forEach((button) => {
      button.addEventListener('click', () => {
        const targetId = button.dataset.target;
        const action = button.dataset.action;
        const countEl = document.getElementById(targetId);
        let count = Number(countEl.textContent);

        if (action === 'increment') {
          count += 1;
          countEl.textContent = count;
          countEl.classList.remove('badge-counter__count--pulse');
          void countEl.offsetWidth;
          countEl.classList.add('badge-counter__count--pulse');
        } else if (action === 'reset') {
          count = 0;
          countEl.textContent = count;
          countEl.classList.remove('badge-counter__count--shake');
          void countEl.offsetWidth;
          countEl.classList.add('badge-counter__count--shake');
        }
      });
    });
  </script>
</body>
</html>
