<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Drag Scroll Carousel</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #16162a;
      border-radius: 1.25rem;
      padding: 2rem;
      max-width: 820px;
      width: 100%;
      margin: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .card__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .card__subtitle {
      font-size: 0.875rem;
      opacity: 0.6;
      margin-bottom: 1.5rem;
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .controls input[type="color"],
    .controls input[type="range"] {
      cursor: pointer;
      background: #2d2d3d;
      border: 1px solid #3d3d5c;
      border-radius: 0.375rem;
      padding: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="card__title">🎠 Drag Scroll Carousel</h1>
    <p class="card__subtitle">Issue #36607 — mouse-drag / touch-scroll carousel with snap</p>

    <div class="controls">
      <label>Card Width
        <input type="range" id="cardWidth" min="120" max="320" step="10" value="200">
        <span id="widthVal">200px</span>
      </label>
      <label>Card Gap
        <input type="range" id="cardGap" min="0" max="40" step="4" value="16">
        <span id="gapVal">16px</span>
      </label>
      <label>Snap Duration
        <input type="range" id="snapDuration" min="0.1" max="0.8" step="0.05" value="0.3">
        <span id="snapVal">0.3s</span>
      </label>
    </div>

    <div class="ease-drag-carousel" id="carousel">
      <div class="ease-drag-carousel__track" id="track">
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">🌍</div>
          <div class="ease-drag-carousel__card-label">Explore</div>
        </div>
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">🎨</div>
          <div class="ease-drag-carousel__card-label">Design</div>
        </div>
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">⚡</div>
          <div class="ease-drag-carousel__card-label">Perform</div>
        </div>
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">🔧</div>
          <div class="ease-drag-carousel__card-label">Build</div>
        </div>
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">🚀</div>
          <div class="ease-drag-carousel__card-label">Launch</div>
        </div>
        <div class="ease-drag-carousel__card">
          <div class="ease-drag-carousel__card-icon">✨</div>
          <div class="ease-drag-carousel__card-label">Polish</div>
        </div>
      </div>
    </div>

    <p style="margin-top: 1rem; font-size: 0.8rem; opacity: 0.5; text-align: center;">
      Drag or swipe to scroll · Cards snap into place
    </p>
  </div>

  <script>
    const carousel = document.getElementById('carousel');
    const track = document.getElementById('track');

    let isDown = false;
    let startX = 0;
    let scrollLeft = 0;

    track.addEventListener('mousedown', e => {
      isDown = true;
      startX = e.pageX - track.offsetLeft;
      scrollLeft = track.scrollLeft;
    });

    track.addEventListener('mouseleave', () => { isDown = false; });
    track.addEventListener('mouseup', () => { isDown = false; });

    track.addEventListener('mousemove', e => {
      if (!isDown) return;
      e.preventDefault();
      const x = e.pageX - track.offsetLeft;
      const walk = (x - startX) * 1.5;
      track.scrollLeft = scrollLeft - walk;
    });

    document.getElementById('cardWidth').addEventListener('input', e => {
      const v = e.target.value + 'px';
      carousel.style.setProperty('--card-width', v);
      document.getElementById('widthVal').textContent = v;
    });
    document.getElementById('cardGap').addEventListener('input', e => {
      const v = e.target.value + 'px';
      carousel.style.setProperty('--card-gap', v);
      document.getElementById('gapVal').textContent = v;
    });
    document.getElementById('snapDuration').addEventListener('input', e => {
      const v = e.target.value + 's';
      carousel.style.setProperty('--snap-duration', v);
      document.getElementById('snapVal').textContent = v;
    });
  </script>
</body>
</html>
