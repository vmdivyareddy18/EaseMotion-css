<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Gradient Mesh Background</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="mesh-bg"></div>
    <div class="overlay">
      <div class="card">
        <h1>Gradient Mesh</h1>
        <p>
          An animated background made of three layered radial gradients, each
          orbiting at different speeds. Pure CSS, no canvas or WebGL needed.
        </p>
        <div class="tags">
          <span>radial-gradient</span>
          <span>animation</span>
          <span>filter: blur</span>
          <span>no JS</span>
        </div>
      </div>
    </div>
  </body>
</html>
