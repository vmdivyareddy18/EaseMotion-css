<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Slide-Up Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Staging environment for presentation only */
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .catalog-grid {
      display: flex;
      gap: 32px;
    }
  </style>
</head>
<body>

  <div class="catalog-grid">
    <div class="ease-product-card" tabindex="0">
      <div class="product-image">👟</div>
      <div class="product-info">
        <span class="product-tag">New</span>
        <h3>AeroStride Pro</h3>
        <p class="product-price">$129.99</p>
      </div>

      <div class="ease-tooltip-wrapper" role="tooltip" aria-hidden="true">
        <div class="ease-tooltip-content">
          <h4>Product Specs</h4>
          <ul>
            <li>Nitrogen-infused foam midsole</li>
            <li>Recycled mesh upper (85%)</li>
            <li>Carbon-fiber shank plate</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
