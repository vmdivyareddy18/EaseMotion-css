<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated OTP Input - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Verification Card -->
    <div class="verify-card ease-zoom-in">
      
      <!-- Icon -->
      <div class="verify-icon-wrapper">
        <span class="verify-icon">🔐</span>
      </div>

      <!-- Text -->
      <h2 class="verify-title ease-fade-in-up ease-delay-100">Enter Verification Code</h2>
      <p class="verify-text ease-fade-in-up ease-delay-200">
        We've sent a 6-digit code to <strong>+1 (•••) •••-4567</strong>
      </p>

      <!-- OTP Inputs -->
      <div class="otp-inputs">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-300" inputmode="numeric" pattern="[0-9]*">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-400" inputmode="numeric" pattern="[0-9]*">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-500" inputmode="numeric" pattern="[0-9]*">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-600" inputmode="numeric" pattern="[0-9]*">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-700" inputmode="numeric" pattern="[0-9]*">
        <input type="text" maxlength="1" class="otp-input ease-fade-in-up ease-delay-800" inputmode="numeric" pattern="[0-9]*">
      </div>

      <!-- Timer -->
      <div class="otp-timer ease-fade-in-up ease-delay-900">
        <span>Resend code in </span>
        <span class="timer-value" id="timer">00:30</span>
      </div>

      <!-- Verify Button -->
      <button class="verify-btn ease-fade-in-up ease-delay-1000 ease-hover-grow" id="verify-btn">
        Verify Code
      </button>

      <!-- Change Number Link -->
      <a href="#" class="change-link ease-fade-in-up ease-delay-1100">Change phone number</a>

    </div>

    <!-- Success Overlay -->
    <div class="success-overlay" id="success-overlay">
      <div class="success-content ease-zoom-in">
        <div class="success-icon-wrapper">
          <span class="success-icon ease-bounce-in">✓</span>
        </div>
        <h3>Verified Successfully!</h3>
        <p>Your phone number has been verified.</p>
      </div>
    </div>

  </div>

  <!-- JavaScript for OTP Functionality -->
  <script>
    const inputs = document.querySelectorAll('.otp-input');
    const verifyBtn = document.getElementById('verify-btn');
    const successOverlay = document.getElementById('success-overlay');
    const timerEl = document.getElementById('timer');

    // Auto-advance focus
    inputs.forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value && index < inputs.length - 1) {
          inputs[index + 1].focus();
        }
      });

      // Handle backspace
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && index > 0) {
          inputs[index - 1].focus();
        }
      });

      // Handle paste
      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text').slice(0, 6);
        pasteData.split('').forEach((char, i) => {
          if (inputs[i] && /\d/.test(char)) {
            inputs[i].value = char;
          }
        });
        inputs[Math.min(pasteData.length, inputs.length) - 1].focus();
      });
    });

    // Simulate verification
    verifyBtn.addEventListener('click', () => {
      const code = Array.from(inputs).map(i => i.value).join('');
      if (code.length === 6) {
        successOverlay.classList.add('active');
      } else {
        inputs.forEach(input => {
          input.classList.add('shake');
          setTimeout(() => input.classList.remove('shake'), 500);
        });
      }
    });

    // Countdown timer
    let timeLeft = 30;
    const timerInterval = setInterval(() => {
      timeLeft--;
      const minutes = Math.floor(timeLeft / 60).toString().padStart(2, '0');
      const seconds = (timeLeft % 60).toString().padStart(2, '0');
      timerEl.textContent = `${minutes}:${seconds}`;
      
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        timerEl.parentElement.innerHTML = '<a href="#" class="resend-link ease-pulse">Resend Code</a>';
      }
    }, 1000);

    // Focus first input on load
    setTimeout(() => inputs[0].focus(), 1000);
  </script>
</body>
</html>
