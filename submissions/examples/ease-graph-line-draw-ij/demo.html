<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Graph Line Draw</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <h2>Graph Line Draw</h2>
      <p>Animated stroke line graph</p>
    </div>

    <div class="demo-area">
      <div class="graph-wrapper" id="graphWrapper">
        <svg class="graph-svg" viewBox="0 0 300 160" preserveAspectRatio="none">
          <polyline class="graph-line" points="0,140 40,120 80,80 120,100 160,40 200,60 240,20 300,50" />
        </svg>
      </div>
    </div>

    <div class="controls">
      <label>Graph BG <input type="color" id="graphBg" value="#0f0f1f" data-var="--graph-bg"></label>
      <label>Line Color <input type="color" id="lineColor" value="#4ecdc4" data-var="--line-color"></label>
      <label>Line Width <input type="range" id="lineWidth" min="1" max="8" step="0.5" value="3" data-var="--line-width" data-unit="px"></label>
      <label>Draw Duration <input type="range" id="drawDuration" min="0.5" max="6" step="0.25" value="2" data-var="--draw-duration" data-unit="s"></label>
      <button id="replayBtn">↻ Replay</button>
    </div>
  </main>
  <script>
    const wrapper = document.getElementById('graphWrapper');
    const line = document.querySelector('.graph-line');

    document.querySelectorAll('[data-var]').forEach(input => {
      const set = () => wrapper.style.setProperty(input.dataset.var, input.dataset.unit ? input.value + input.dataset.unit : input.value);
      input.addEventListener('input', set);
      set();
    });

    function replay() {
      line.style.animation = 'none';
      void line.offsetHeight;
      line.style.animation = '';
    }

    document.getElementById('replayBtn').addEventListener('click', replay);
  </script>
</body>
</html>
