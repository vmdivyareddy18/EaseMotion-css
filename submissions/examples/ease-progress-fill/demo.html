<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Fill Animation - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; max-width: 500px; width: 100%;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600;">
      <span style="color: #94a3b8;">Frontend Engineering Skill</span>
      <span style="color: #38bdf8;">75%</span>
    </div>

    <div class="ease-progress-container">
      <div class="ease-progress-fill" id="progressBarIndicator"></div>
    </div>
  </div>

  <button class="control-action-btn" id="btnRerunTrigger">Replay Animation</button>

  <script>
    const bar = document.getElementById('progressBarIndicator');
    const btn = document.getElementById('btnRerunTrigger');

    btn.addEventListener('click', () => {
      // Flushes current tracking states to let the animation trigger clean again
      bar.style.animation = 'none';
      bar.offsetHeight; /* Force internal layout pipeline tracking reflow */
      bar.style.animation = 'progress-fill-trajectory 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards';
    });
  </script>

</body>
</html>
