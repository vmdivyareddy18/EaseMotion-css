<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion: hover-border-gradient</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <div class="content">
      <h2>Border Gradient</h2>
      <p>Hover me — the border sweeps with an animated gradient. Adjust the controls below to customize.</p>
    </div>
    <div class="controls">
      <label>Border <input type="range" id="borderWidth" min="1" max="10" value="3"></label>
      <label>Speed <input type="range" id="sweepDuration" min="0.5" max="6" step="0.1" value="2"></label>
      <label>Start <input type="color" id="gradStart" value="#ff6b6b"></label>
      <label>End <input type="color" id="gradEnd" value="#48dbfb"></label>
    </div>
  </div>
  <script>
    const card = document.getElementById('card');

    document.getElementById('borderWidth').addEventListener('input', e => {
      card.style.setProperty('--border-width', e.target.value + 'px');
    });

    document.getElementById('sweepDuration').addEventListener('input', e => {
      card.style.setProperty('--sweep-duration', e.target.value + 's');
    });

    document.getElementById('gradStart').addEventListener('input', e => {
      card.style.setProperty('--gradient-start', e.target.value);
    });

    document.getElementById('gradEnd').addEventListener('input', e => {
      card.style.setProperty('--gradient-end', e.target.value);
    });
  </script>
</body>
</html>
