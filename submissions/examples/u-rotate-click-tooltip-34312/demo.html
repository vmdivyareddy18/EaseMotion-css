<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Cyberpunk Rotate Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<span class="badge">

CYBERPUNK UI

</span>

<h1>

Rotate Click Tooltip

</h1>

<p>

Futuristic tooltip interaction
inspired by cyberpunk interfaces,
neon aesthetics and immersive
digital experiences.

</p>

<div class="tooltip-wrapper">

<input
type="checkbox"
id="toggle">

<label

for="toggle"

class="trigger"

>

Open Module

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="status">

ONLINE

</span>

<h3>

Neon Control Center

</h3>

<p>

CSS-only rotate animation
built for futuristic interfaces,
gaming dashboards and neon
experiences.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
