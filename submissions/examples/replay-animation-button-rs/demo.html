<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Replayable Animation Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="animationBox" class="box animate">
    EaseMotion
  </div>

  <button id="replayBtn">
    Replay Animation
  </button>

  <p
    id="status"
    class="visually-hidden"
    role="status"
    aria-live="polite">
  </p>

  <script>
    const box = document.getElementById("animationBox");
    const button = document.getElementById("replayBtn");
    const status = document.getElementById("status");

    const reducedMotion = window.matchMedia(
      "(prefers-reduced-motion: reduce)"
    );

    button.addEventListener("click", () => {
      if (reducedMotion.matches) {
        status.textContent =
          "Animation replay skipped because reduced motion is enabled.";
        return;
      }

      button.disabled = true;

      box.classList.remove("animate");

      void box.offsetWidth;

      box.classList.add("animate");

      status.textContent = "Animation replayed.";
    });

    box.addEventListener("animationend", () => {
      button.disabled = false;
    });
  </script>

</body>
</html>
