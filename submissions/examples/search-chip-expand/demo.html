<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Chip Expand</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="surface" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion form control</p>
    <h1 id="demo-title">Search chip expand</h1>
    <p class="intro">A compact search control that widens smoothly when users hover or focus the input.</p>

    <label class="search-chip">
      <span class="icon" aria-hidden="true">?</span>
      <span class="sr-only">Search project tags</span>
      <input type="search" placeholder="Search tags" />
    </label>
  </main>
</body>
</html>
