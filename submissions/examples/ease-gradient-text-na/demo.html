<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Animated Gradient Text Engine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header class="hero">
      <div class="badge">🎨 GSSoC '26 Typography Core</div>
      <h1>Fluid Typography Presets</h1>
      <p>High-fidelity background interpolation masks. These text elements clip dynamically scaling gradients across a looped geometric timeline block.</p>
    </header>

    <!-- Preset Showcase Section -->
    <section class="showcase-card">
      <div class="preset-block">
        <span class="preset-label">preset: aurora</span>
        <h1 class="ease-gradient-text ease-gradient-text--aurora">EaseMotion CSS</h1>
      </div>

      <div class="preset-block">
        <span class="preset-label">preset: fire</span>
        <h2 class="ease-gradient-text ease-gradient-text--fire">Amazing Animations</h2>
      </div>

      <div class="preset-block">
        <span class="preset-label">preset: ocean</span>
        <h3 class="ease-gradient-text ease-gradient-text--ocean">Open Source Library</h3>
      </div>
    </section>
  </div>

</body>
</html>
