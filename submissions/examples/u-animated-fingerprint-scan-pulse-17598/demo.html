<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Fingerprint Scan Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Fingerprint Scan Pulse</h1>

  <p class="intro">
    A reusable biometric authentication animation for login systems,
    banking apps, identity verification, and security dashboards.
  </p>

  <div class="demo-grid">

    <div class="scan-card">
      <div class="fingerprint-scan">
        <span class="fingerprint">👆</span>
        <span class="scan-line"></span>
      </div>
      <h3>Identity Check</h3>
    </div>

    <div class="scan-card">
      <div class="fingerprint-scan large">
        <span class="fingerprint">👆</span>
        <span class="scan-line"></span>
      </div>
      <p>Biometric Access</p>
    </div>

    <div class="scan-card">
      <div class="fingerprint-scan">
        <span class="fingerprint">👆</span>
        <span class="scan-line"></span>
      </div>
      <button>Authenticate</button>
    </div>

  </div>

</main>

</body>
</html>
