<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sidebar Drawer Panel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Sidebar Drawer Panel</h1>
  <button class="sdp-toggle" id="toggleBtn">Toggle Sidebar</button>
  <div class="sdp-overlay" id="overlay"></div>
  <div class="sdp-drawer" id="drawer">
    <h2>Sidebar</h2>
    <nav>
      <ul>
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Profile</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Help</a></li>
      </ul>
    </nav>
  </div>
  <script>
    (function() {
      const drawer = document.getElementById('drawer');
      const overlay = document.getElementById('overlay');
      const btn = document.getElementById('toggleBtn');

      function open() {
        document.body.classList.add('sdp-open');
      }

      function close() {
        document.body.classList.remove('sdp-open');
      }

      btn.addEventListener('click', function() {
        if (document.body.classList.contains('sdp-open')) {
          close();
        } else {
          open();
        }
      });

      overlay.addEventListener('click', close);
    })();
  </script>
</body>
</html>
