<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease List Bullet Animate — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      color: #e2e8f0;
      margin-bottom: 1.25rem;
      font-weight: 500;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .controls input {
      width: 90px;
      padding: 0.3rem 0.5rem;
      border-radius: 0.35rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.8rem;
    }
    .controls input:focus { outline: none; border-color: var(--bullet-color, #f59e0b); }
  </style>
</head>
<body>
  <div class="card">
    <h2>✦ Dancing Bullets</h2>
    <list-bullet-animate id="demo">
      <ul>
        <li>Gather inspiration</li>
        <li>Sketch wireframes</li>
        <li>Build prototypes</li>
        <li>Test interactions</li>
        <li>Ship to production</li>
      </ul>
    </list-bullet-animate>
    <div class="controls">
      <label>Bullet
        <input type="color" id="bulletColor" value="#f59e0b">
      </label>
      <label>Speed
        <input type="range" id="bounceSpeed" min="0.2" max="1" step="0.05" value="0.4">
      </label>
      <label>Size
        <input type="range" id="bulletSize" min="6" max="24" step="1" value="12">
      </label>
    </div>
  </div>
  <script>
    const el = document.getElementById('demo');
    document.getElementById('bulletColor').addEventListener('input', e => {
      el.style.setProperty('--bullet-color', e.target.value);
    });
    document.getElementById('bounceSpeed').addEventListener('input', e => {
      el.style.setProperty('--bounce-duration', e.target.value + 's');
    });
    document.getElementById('bulletSize').addEventListener('input', e => {
      el.style.setProperty('--bullet-size', e.target.value + 'px');
    });
  </script>
</body>
</html>
