<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-parallax-speed-dial</title>
  <meta name="description" content="Parallax speed dial for banking design with layered motion effects.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-parallax-speed-dial</h1>
      <p class="subtitle" id="main-desc">Parallax speed dial for banking design</p>
    </header>

    <div class="display-area">
      
      <div class="dial-showcase">
        <!-- Default Speed Dial -->
        <div class="dial-item">
          <div class="ease-parallax-speed-dial">
            <button class="speed-dial-trigger" aria-label="Open menu">
              <span class="dial-icon">+</span>
            </button>
            <ul class="speed-dial-actions">
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Transfer">
                  <span class="action-icon">↑</span>
                </button>
                <span class="action-label">Transfer</span>
              </li>
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Pay Bill">
                  <span class="action-icon">$</span>
                </button>
                <span class="action-label">Pay Bill</span>
              </li>
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="History">
                  <span class="action-icon">☰</span>
                </button>
                <span class="action-label">History</span>
              </li>
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Support">
                  <span class="action-icon">?</span>
                </button>
                <span class="action-label">Support</span>
              </li>
            </ul>
          </div>
          <span class="dial-label">Default</span>
        </div>

        <!-- Primary Variant -->
        <div class="dial-item">
          <div class="ease-parallax-speed-dial ease-parallax-primary">
            <button class="speed-dial-trigger" aria-label="Open menu">
              <span class="dial-icon">+</span>
            </button>
            <ul class="speed-dial-actions">
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Deposit">
                  <span class="action-icon">↓</span>
                </button>
                <span class="action-label">Deposit</span>
              </li>
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Withdraw">
                  <span class="action-icon">↑</span>
                </button>
                <span class="action-label">Withdraw</span>
              </li>
              <li class="speed-dial-action">
                <button class="action-btn" aria-label="Cards">
                  <span class="action-icon">◈</span>
                </button>
                <span class="action-label">Cards</span>
              </li>
            </ul>
          </div>
          <span class="dial-label">Primary</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Banking Dashboard Example</h3>
      <div class="banking-preview">
        <div class="ease-parallax-speed-dial ease-parallax-primary ease-parallax-lg">
          <button class="speed-dial-trigger" aria-label="Open menu">
            <span class="dial-icon">+</span>
          </button>
          <ul class="speed-dial-actions">
            <li class="speed-dial-action">
              <button class="action-btn" aria-label="Send Money">
                <span class="action-icon">↑</span>
              </button>
              <span class="action-label">Send</span>
            </li>
            <li class="speed-dial-action">
              <button class="action-btn" aria-label="Receive">
                <span class="action-icon">↓</span>
              </button>
              <span class="action-label">Receive</span>
            </li>
            <li class="speed-dial-action">
              <button class="action-btn" aria-label="Pay">
                <span class="action-icon">$</span>
              </button>
              <span class="action-label">Pay</span>
            </li>
            <li class="speed-dial-action">
              <button class="action-btn" aria-label="Statements">
                <span class="action-icon">☰</span>
              </button>
              <span class="action-label">Statements</span>
            </li>
          </ul>
        </div>
        <p class="preview-hint">Click the + button to expand</p>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.ease-parallax-speed-dial').forEach(dial => {
      const trigger = dial.querySelector('.speed-dial-trigger');
      
      trigger.addEventListener('click', () => {
        dial.classList.toggle('is-open');
      });
      
      dial.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          dial.classList.remove('is-open');
        });
      });
    });
  </script>

</body>
</html>
