<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Theme Toggle Switch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<label class="theme-toggle">
  <!-- Hidden checkbox drives the animation state via :checked -->
  <input type="checkbox" class="theme-toggle-input">

  <span class="theme-toggle-track">
    <!-- Sun icon (visible when unchecked) -->
    <span class="theme-icon sun-icon">
      <span class="sun-core"></span>
      <span class="sun-ray"></span>
      <span class="sun-ray"></span>
      <span class="sun-ray"></span>
      <span class="sun-ray"></span>
    </span>

    <!-- Moon icon (visible when checked) -->
    <span class="theme-icon moon-icon"></span>

    <!-- The sliding knob -->
    <span class="theme-toggle-thumb"></span>
  </span>
</label>

</body>
</html>
