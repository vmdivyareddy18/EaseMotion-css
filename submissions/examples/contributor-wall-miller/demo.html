<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contributor Wall — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wall-header">
    <h1>✦ Contributor Wall</h1>
    <p>Every PR merged, every bug squashed — thank you all.</p>
    <div class="wall-stats">
      <div class="wall-stat">
        <div class="wall-stat-number">128</div>
        <div class="wall-stat-label">Contributors</div>
      </div>
      <div class="wall-stat">
        <div class="wall-stat-number">642</div>
        <div class="wall-stat-label">PRs Merged</div>
      </div>
      <div class="wall-stat">
        <div class="wall-stat-number">89</div>
        <div class="wall-stat-label">Issues Closed</div>
      </div>
    </div>
  </div>

  <!-- Top 3 Podium -->
  <div class="wall-podium">
    <div class="podium-card rank-2">
      <span class="podium-rank">🥈</span>
      <img class="podium-avatar" src="https://i.pravatar.cc/150?img=12" alt="Contributor" />
      <div class="podium-name">priya_dev</div>
      <div class="podium-prs">38 PRs merged</div>
      <span class="podium-badge">Silver</span>
    </div>
    <div class="podium-card rank-1">
      <span class="podium-rank">🥇</span>
      <img class="podium-avatar" src="https://i.pravatar.cc/150?img=5" alt="Contributor" />
      <div class="podium-name">saptarshi_c</div>
      <div class="podium-prs">61 PRs merged</div>
      <span class="podium-badge">Gold</span>
    </div>
    <div class="podium-card rank-3">
      <span class="podium-rank">🥉</span>
      <img class="podium-avatar" src="https://i.pravatar.cc/150?img=8" alt="Contributor" />
      <div class="podium-name">rahul_oss</div>
      <div class="podium-prs">29 PRs merged</div>
      <span class="podium-badge">Bronze</span>
    </div>
  </div>

  <!-- All contributors grid -->
  <p class="wall-section-title">All Contributors</p>
  <div class="wall-grid" id="contributors-grid">
    <!-- JS populated below -->
  </div>

  <div class="wall-footer">
    Auto-synced via GitHub Actions · 
    <a href="https://github.com/SAPTARSHI-coder/EaseMotion-css" target="_blank">View Repo</a>
  </div>

  <script>
    const contributors = [
      { name: "iammissmiller", prs: 22, img: 1 },
      { name: "ananya_css", prs: 18, img: 2 },
      { name: "dev_kartik", prs: 15, img: 3 },
      { name: "zoya_frontend", prs: 14, img: 4 },
      { name: "harsh_ui", prs: 12, img: 6 },
      { name: "meera_codes", prs: 11, img: 7 },
      { name: "arjun_oss", prs: 10, img: 9 },
      { name: "nisha_web", prs: 9, img: 10 },
      { name: "vikram_dev", prs: 8, img: 11 },
      { name: "pooja_css", prs: 7, img: 13 },
      { name: "sahil_js", prs: 6, img: 14 },
      { name: "tanvi_ux", prs: 5, img: 15 },
    ];

    const grid = document.getElementById('contributors-grid');
    contributors.forEach(c => {
      grid.innerHTML += `
        <a class="contributor-card" href="https://github.com/${c.name}" target="_blank">
          <img class="contributor-avatar" src="https://i.pravatar.cc/150?img=${c.img}" alt="${c.name}" />
          <div class="contributor-info">
            <div class="contributor-name">@${c.name}</div>
            <div class="contributor-prs">${c.prs} PRs merged</div>
          </div>
        </a>
      `;
    });
  </script>

</body>
</html>
