<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Cyberpunk Draw-Border Popover</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #fff;
            padding: 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .demo-container {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        
        h1 {
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
            margin-bottom: 3rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .demo-section {
            background: rgba(20, 20, 25, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 4px;
            padding: 4rem 2rem;
            margin-bottom: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            position: relative;
        }
        
        /* Cyberpunk Button Style */
        .cyber-btn {
            background: transparent;
            color: #0ff;
            border: 1px solid #0ff;
            padding: 0.75rem 2rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .cyber-btn:hover, .cyber-btn:focus {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
            outline: none;
        }
        
        .popover-content-title {
            color: var(--cy-neon-primary);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .popover-content-text {
            color: #aaa;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        
        .popover-badge {
            display: inline-block;
            background: rgba(255, 0, 255, 0.2);
            color: var(--cy-neon-secondary);
            padding: 0.2rem 0.5rem;
            font-size: 0.75rem;
            margin-top: 1rem;
            border: 1px solid var(--cy-neon-secondary);
        }

        .custom-colors {
            --cy-neon-primary: #f90;
            --cy-neon-secondary: #f00;
        }
        
        .custom-colors-btn {
            color: #f90;
            border-color: #f90;
        }
        
        .custom-colors-btn:hover, .custom-colors-btn:focus {
            background: rgba(255, 153, 0, 0.1);
            box-shadow: 0 0 15px rgba(255, 153, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h1>Neon Cyberpunk Popovers</h1>
        
        <!-- Demo 1: Default Neon -->
        <div class="demo-section">
            <div class="cyberpunk-trigger">
                <button class="cyber-btn" aria-haspopup="true">Hover Me</button>
                <div class="cyberpunk-popover">
                    <div class="cyberpunk-popover-border"></div>
                    <div class="popover-content-title">System Alert</div>
                    <div class="popover-content-text">Neural interface established. Draw-border animation successfully initiated via pure CSS.</div>
                    <span class="popover-badge">STATUS: OPTIMAL</span>
                </div>
            </div>
        </div>
        
        <!-- Demo 2: Custom Properties -->
        <div class="demo-section">
            <div class="cyberpunk-trigger custom-colors">
                <button class="cyber-btn custom-colors-btn" aria-haspopup="true">Custom Variables</button>
                <div class="cyberpunk-popover">
                    <div class="cyberpunk-popover-border"></div>
                    <div class="popover-content-title" style="color: var(--cy-neon-primary)">Override Active</div>
                    <div class="popover-content-text">CSS variables updated: colors changed, timings adjusted seamlessly. Fully responsive.</div>
                    <span class="popover-badge" style="color: var(--cy-neon-secondary); border-color: var(--cy-neon-secondary); background: rgba(255, 0, 0, 0.2);">OVERRIDE</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
