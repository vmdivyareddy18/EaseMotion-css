<!DOCTYPE html>
<html>
<head>
  <title>Home Alert Banner UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="alert">
  <span>This is an important alert message!</span>
  <button onclick="closeAlert()">X</button>
</div>

<script>
function closeAlert() {
  document.querySelector(".alert").style.display = "none";
}
</script>

</body>
</html>
