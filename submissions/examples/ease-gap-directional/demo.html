<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion — Directional Gap Utilities</title>
    <link rel="stylesheet" href="../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="demo-container">
        <section class="demo-hero">
            <h1>Directional Gaps (ease-gap-x / ease-gap-y)</h1>
            <p class="description">
                Control horizontal (column-gap) and vertical (row-gap) spacing separately in your flex/grid layouts
                without custom CSS.
            </p>
        </section>

        <section class="demo-section">
            <h2>Horizontal Gap Only (.ease-gap-x-4)</h2>
            <div class="demo-box ease-flex ease-gap-x-4">
                <div class="item">Item 1</div>
                <div class="item">Item 2</div>
                <div class="item">Item 3</div>
            </div>
        </section>

        <section class="demo-section">
            <h2>Vertical Gap Only (.ease-gap-y-4)</h2>
            <div class="demo-box ease-flex flex-col ease-gap-y-4">
                <div class="item">Row 1</div>
                <div class="item">Row 2</div>
                <div class="item">Row 3</div>
            </div>
        </section>
    </main>
</body>

</html>
