<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Dashboard Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="medical-dashboard">

    <h1>Medical Dashboard</h1>
    <p>Healthcare monitoring system</p>

    <div class="dashboard-items">

        <div class="medical-card">

            <button class="medical-btn" aria-describedby="patient-tooltip">
                Patient
            </button>

            <div class="tooltip" id="patient-tooltip" role="tooltip">
                View patient information
            </div>

        </div>


        <div class="medical-card">

            <button class="medical-btn" aria-describedby="report-tooltip">
                Reports
            </button>

            <div class="tooltip" id="report-tooltip" role="tooltip">
                Check medical reports
            </div>

        </div>


        <div class="medical-card">

            <button class="medical-btn" aria-describedby="alert-tooltip">
                Alerts
            </button>

            <div class="tooltip" id="alert-tooltip" role="tooltip">
                Emergency notifications
            </div>

        </div>

    </div>

</section>

</body>
</html>
