<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion - Animated Button Variants</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="nav-demo">
    <div class="nav-brand">
      <span class="logo-text">EaseMotion</span>
    </div>
    <div class="theme-switch-wrapper">
      <span class="mode-text">MODE:</span>
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider round"></div>
      </label>
    </div>
  </header>

  <main class="container">
    <div class="hero-header">
      <p class="subtitle">COMPONENT LIBRARY</p>
      <h1 class="title">Interactive Button Variants</h1>
      <p class="description">Advanced, motion-first interactive button states powered by EaseMotion CSS utilities.</p>
    </div>

    <div class="showcase-grid">
      <div class="card">
        <span class="card-label">Ripple Effect</span>
        <button class="btn btn-ripple" id="rippleBtn">Click Me</button>
      </div>

      <div class="card">
        <span class="card-label">Shimmer Hover</span>
        <button class="btn btn-shimmer">Hover Me</button>
      </div>

      <div class="card">
        <span class="card-label">Magnetic Target</span>
        <div class="magnetic-wrapper" id="magneticWrapper">
          <button class="btn btn-magnetic" id="magneticBtn">Hover Me</button>
        </div>
      </div>

      <div class="card">
        <span class="card-label">Neon Glow</span>
        <button class="btn btn-neon">Hover Me</button>
      </div>

      <div class="card">
        <span class="card-label">Liquid Fill</span>
        <button class="btn btn-liquid">
          <span>Hover Me</span>
          <div class="liquid"></div>
        </button>
      </div>
    </div>
  </main>

  <script>
    const toggleSwitch = document.getElementById('checkbox');
    const htmlElement = document.documentElement;

    toggleSwitch.addEventListener('change', function(e) {
      if (e.target.checked) {
        htmlElement.setAttribute('data-theme', 'dark');
      } else {
        htmlElement.setAttribute('data-theme', 'light');
      }
    });

    const rippleBtn = document.getElementById('rippleBtn');
    rippleBtn.addEventListener('click', function(e) {
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const ripple = document.createElement('span');
      ripple.className = 'ripple-span';
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      
      this.appendChild(ripple);
      
      setTimeout(() => {
        ripple.remove();
      }, 600);
    });

    const magneticWrapper = document.getElementById('magneticWrapper');
    const magneticBtn = document.getElementById('magneticBtn');

    magneticWrapper.addEventListener('mousemove', function(e) {
      const rect = this.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      
      magneticBtn.style.transform = `translate(${x * 0.35}px, ${y * 0.35}px)`;
    });

    magneticWrapper.addEventListener('mouseleave', function() {
      magneticBtn.style.transform = 'translate(0px, 0px)';
    });
  </script>
</body>
</html>
