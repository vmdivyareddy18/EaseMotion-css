<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze Dot Loader</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="loader-page">
      <section class="loader-card ease-fade-in">
        <div class="maze-loader">
          <div class="maze-dot"></div>
          <div class="maze-grid">
            <div class="maze-cell"></div>
            <div class="maze-cell"></div>
            <div class="maze-cell"></div>
            <div class="maze-cell"></div>
          </div>
        </div>

        <div class="loader-copy">
          <p class="eyebrow">Loading</p>
          <h1>Maze Dot Loader</h1>
          <p>
            A CSS-only loading animation where a glowing dot navigates a square maze path with smooth looping motion.
          </p>
        </div>
      </section>
    </main>
  </body>
</html>
