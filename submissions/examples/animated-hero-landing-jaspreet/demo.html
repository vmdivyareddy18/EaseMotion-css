<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Interactive Button Showcase Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-container">
      <div class="site-logo">
        <span class="logo-glyph"></span>
        <span class="logo-text">EASE<span>MOTION</span></span>
      </div>
      <nav class="main-nav">
        <a href="#" class="nav-item active">Buttons</a>
        <a href="#" class="nav-item">Cards</a>
        <a href="#" class="nav-item">Animations</a>
        <a href="#" class="nav-item">Layout</a>
        <a href="#" class="nav-item">Docs</a>
      </nav>
      <button class="theme-toggle" aria-label="Toggle visual layout mode">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>
  </header>

  <main class="hero-showcase">
    <div class="background-glow left-glow"></div>
    <div class="background-glow right-glow"></div>
    <div class="background-glow center-glow"></div>
    
    <div class="particle particle-1"></div>
    <div class="particle particle-2"></div>
    <div class="particle particle-3"></div>
    <div class="particle particle-4"></div>
    
    <div class="hero-container">
      <div class="badge-container entrance-fade-in" style="--entrance-index: 1;">
        <span class="interactive-badge">INTERACTIVE DEMO</span>
      </div>
      
      <div class="headline-wrap entrance-fade-in" style="--entrance-index: 2;">
        <div class="orbit-ring"></div>
        <div class="star-decor star-top-left">✦</div>
        <div class="star-decor star-bottom-right">✦</div>
        <h1 class="hero-headline">
          Build with <br>
          <span class="gradient-text">EaseMotion</span>
        </h1>
      </div>
      
      <p class="hero-subtext entrance-fade-in" style="--entrance-index: 3;">
        Human-readable class names. <a href="#" class="subtext-link">Animation-first</a>. <br>
        No memorization required.
      </p>
      
      <div class="cta-row entrance-fade-in" style="--entrance-index: 4;">
        <a href="#" class="hero-btn primary-solid-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Read Docs</span>
        </a>
        <a href="#" class="hero-btn outline-dark-btn">
          <span>GitHub</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
        </a>
      </div>
    </div>
  </main>

  <div class="section-divider-gradient"></div>

  <section class="components-section">
    <div class="components-container">
      <div class="section-meta-side">
        <span class="section-tag">COMPONENTS</span>
        <h2 class="section-title">Buttons</h2>
        <p class="section-desc">Compose buttons by stacking modifier classes. Every style is human-readable.</p>
      </div>
      
      <div class="showcase-card-track">
        <div class="variants-row">
          <button class="ease-btn variant-primary">
            <span>Primary</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </button>
          
          <button class="ease-btn variant-outline">Outline</button>
          
          <button class="ease-btn variant-success">
            <span>Success</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
          
          <button class="ease-btn variant-ghost">Ghost</button>
          
          <button class="ease-btn variant-glow">
            <span>Glow</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
