<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contribution Checklist Generator</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-check-container">
    <div class="ease-check-header">
      <h2 class="ease-check-title">PR Description Generator</h2>
      <p class="ease-check-desc">Ensure your submission meets all EaseMotion requirements before opening a PR.</p>
    </div>

    <div>
      <div class="ease-check-progress-wrapper">
        <div id="progressBar" class="ease-check-progress-bar"></div>
      </div>
      
      <div class="ease-check-list" id="checkList">
        
        <label class="ease-check-item">
          <input type="checkbox" class="ease-check-box" data-md="- [x] Uses EaseMotion CSS variables/keyframes">
          <div class="ease-check-text">
            <strong>Uses Native Classes</strong>
            Component relies strictly on `ease-*` classes and variables.
          </div>
        </label>

        <label class="ease-check-item">
          <input type="checkbox" class="ease-check-box" data-md="- [x] Works without JavaScript (pure CSS preferred)">
          <div class="ease-check-text">
            <strong>Pure CSS</strong>
            No JavaScript is used for core animation logic.
          </div>
        </label>

        <label class="ease-check-item">
          <input type="checkbox" class="ease-check-box" data-md="- [x] Includes a live demo in demo.html">
          <div class="ease-check-text">
            <strong>Demo Provided</strong>
            A fully functional `demo.html` file is included in the directory.
          </div>
        </label>

      </div>
    </div>

    <div id="resultArea" class="ease-check-result ease-fade-in-up">
      <span class="ease-check-result-label">Copy to GitHub PR Description</span>
      <pre id="markdownOutput" class="ease-check-markdown"></pre>
    </div>

  </div>

  <script>
    const checkboxes = document.querySelectorAll('.ease-check-box');
    const progressBar = document.getElementById('progressBar');
    const resultArea = document.getElementById('resultArea');
    const markdownOutput = document.getElementById('markdownOutput');

    function updateProgress() {
      let checkedCount = 0;
      let markdownLines = ["### Requirements Checklist\n"];

      checkboxes.forEach(cb => {
        const item = cb.closest('.ease-check-item');
        if (cb.checked) {
          checkedCount++;
          item.classList.add('completed');
          markdownLines.push(cb.getAttribute('data-md'));
        } else {
          item.classList.remove('completed');
          markdownLines.push(cb.getAttribute('data-md').replace('[x]', '[ ]'));
        }
      });

      const percentage = (checkedCount / checkboxes.length) * 100;
      progressBar.style.width = `${percentage}%`;

      if (percentage === 100) {
        markdownOutput.textContent = markdownLines.join('\n');
        resultArea.classList.add('active');
        // retrigger animation
        resultArea.classList.remove('ease-fade-in-up');
        void resultArea.offsetWidth;
        resultArea.classList.add('ease-fade-in-up');
      } else {
        resultArea.classList.remove('active');
      }
    }

    checkboxes.forEach(cb => {
      cb.addEventListener('change', updateProgress);
    });
  </script>

</body>
</html>
