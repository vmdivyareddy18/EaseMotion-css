<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-dust-particles demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; background: #1c1917; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
    .scene {
      width: 420px; height: 280px;
      background: #292524;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #a8a29e; font-size: 1rem;
    }
  </style>
</head>
<body>
  <div class="scene ease-dust" id="scene">Dust in the air</div>
  <script>
    const scene = document.getElementById('scene');
    for (let i = 0; i < 25; i++) {
      const d = document.createElement('div');
      d.className = 'dp';
      d.style.left = Math.random() * 100 + '%';
      d.style.top  = (50 + Math.random() * 50) + '%';
      d.style.animationDuration = (Math.random() * 8 + 6) + 's';
      d.style.animationDelay    = (Math.random() * 8) + 's';
      d.style.opacity = 0;
      scene.appendChild(d);
    }
  </script>
</body>
</html>
