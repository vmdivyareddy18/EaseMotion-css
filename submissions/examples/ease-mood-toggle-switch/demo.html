<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Toggle Switch</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>😊 Mood Toggle Switch</h1>
        <p class="subtitle">Switch that changes emotion emojis with animation</p>

        <div class="toggle-wrapper">
            <div class="mood-display">
                <div class="mood-emoji" id="moodEmoji">😊</div>
                <div class="mood-label" id="moodLabel">Happy</div>
            </div>

            <div class="toggle-container">
                <div class="toggle-track" id="toggleTrack">
                    <div class="toggle-thumb" id="toggleThumb">
                        <span class="toggle-icon" id="toggleIcon">😊</span>
                    </div>
                </div>
            </div>

            <div class="mood-stats">
                <span id="moodCount">Toggles: 0</span>
                <span id="currentMood">Current: Happy</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const toggleTrack = document.getElementById('toggleTrack');
        const toggleThumb = document.getElementById('toggleThumb');
        const toggleIcon = document.getElementById('toggleIcon');
        const moodEmoji = document.getElementById('moodEmoji');
        const moodLabel = document.getElementById('moodLabel');
        const moodCount = document.getElementById('moodCount');
        const currentMood = document.getElementById('currentMood');

        // ===== MOOD DATA =====
        const moods = [
            { emoji: '😊', label: 'Happy', color: '#ffd93d' },
            { emoji: '😍', label: 'Love', color: '#ff6b6b' },
            { emoji: '😂', label: 'Funny', color: '#ffa94d' },
            { emoji: '😎', label: 'Cool', color: '#4d96ff' },
            { emoji: '🤔', label: 'Thinking', color: '#a29bfe' },
            { emoji: '😌', label: 'Relaxed', color: '#6bcb77' },
            { emoji: '🥳', label: 'Celebrate', color: '#ffd93d' },
            { emoji: '😴', label: 'Sleepy', color: '#9b59b6' },
            { emoji: '🔥', label: 'Fired Up', color: '#ff6b35' },
            { emoji: '💪', label: 'Strong', color: '#ff6b6b' },
            { emoji: '🙌', label: 'Yay!', color: '#ffd93d' },
            { emoji: '✨', label: 'Magical', color: '#e0a0ff' },
            { emoji: '🌈', label: 'Colorful', color: '#ff6b6b' },
            { emoji: '🎉', label: 'Party', color: '#ffa94d' },
            { emoji: '💖', label: 'Heart', color: '#ff6b6b' },
            { emoji: '🌟', label: 'Star', color: '#ffd93d' },
        ];

        // ===== STATE =====
        let currentIndex = 0;
        let toggleCount = 0;
        let isAnimating = false;
        let isOn = true;
        let targetIndex = 0;
        let animationProgress = 0;

        // ===== UPDATE MOOD =====
        function updateMood(index, animate = true) {
            const mood = moods[index % moods.length];
            currentIndex = index;
            
            // Update emoji with animation
            if (animate) {
                moodEmoji.style.transform = 'scale(1.5)';
                moodEmoji.style.opacity = '0';
                
                setTimeout(() => {
                    moodEmoji.textContent = mood.emoji;
                    moodEmoji.style.transform = 'scale(0.5)';
                    moodEmoji.style.opacity = '0.5';
                    
                    setTimeout(() => {
                        moodEmoji.style.transform = 'scale(1)';
                        moodEmoji.style.opacity = '1';
                    }, 50);
                }, 150);
            } else {
                moodEmoji.textContent = mood.emoji;
            }
            
            // Update label
            moodLabel.textContent = mood.label;
            moodLabel.style.color = mood.color;
            
            // Update toggle icon
            toggleIcon.textContent = mood.emoji;
            
            // Update toggle track color
            toggleTrack.style.background = `linear-gradient(135deg, ${mood.color}, ${mood.color}cc)`;
            
            // Update status
            currentMood.textContent = `Current: ${mood.label}`;
            currentMood.style.color = mood.color;
            
            // Update toggle count
            toggleCount++;
            moodCount.textContent = `Toggles: ${toggleCount}`;
            
            // Trigger pulse animation on track
            toggleTrack.style.transform = 'scale(0.98)';
            setTimeout(() => {
                toggleTrack.style.transform = 'scale(1)';
            }, 100);
        }

        // ===== TOGGLE SWITCH =====
        function toggleSwitch() {
            if (isAnimating) return;
            isAnimating = true;
            
            isOn = !isOn;
            
            // Move thumb
            if (isOn) {
                toggleThumb.style.transform = 'translateX(0)';
                // Move to next mood
                targetIndex = currentIndex + 1;
            } else {
                toggleThumb.style.transform = 'translateX(28px)';
                // Move to previous mood
                targetIndex = currentIndex - 1;
                if (targetIndex < 0) targetIndex = moods.length - 1;
            }
            
            // Animate mood change
            setTimeout(() => {
                updateMood(targetIndex, true);
                isAnimating = false;
            }, 200);
        }

        // ===== RANDOM MOOD =====
        function randomMood() {
            if (isAnimating) return;
            isAnimating = true;
            
            const randomIndex = Math.floor(Math.random() * moods.length);
            targetIndex = randomIndex;
            
            // Random toggle position
            isOn = Math.random() > 0.5;
            if (isOn) {
                toggleThumb.style.transform = 'translateX(0)';
            } else {
                toggleThumb.style.transform = 'translateX(28px)';
            }
            
            setTimeout(() => {
                updateMood(targetIndex, true);
                isAnimating = false;
            }, 200);
        }

        // ===== KEYBOARD SHORTCUT =====
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                toggleSwitch();
            }
            if (e.key === 'r' || e.key === 'R') {
                randomMood();
            }
        });

        // ===== EVENT LISTENERS =====
        toggleTrack.addEventListener('click', toggleSwitch);

        // Touch support
        toggleTrack.addEventListener('touchstart', (e) => {
            e.preventDefault();
            toggleSwitch();
        }, { passive: false });

        // Click on emoji to randomize
        moodEmoji.addEventListener('click', randomMood);
        moodEmoji.style.cursor = 'pointer';

        // ===== INIT =====
        updateMood(0, false);
        moodCount.textContent = 'Toggles: 0';

        console.log('😊 Mood Toggle Switch loaded!');
        console.log('💡 Click toggle to change mood');
        console.log('💡 Click emoji for random mood');
        console.log('💡 SPACE to toggle');
        console.log('💡 R for random mood');
    </script>
</body>
</html>
