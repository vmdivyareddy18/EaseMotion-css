<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Light Bulb Idea Glow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Light Bulb Idea Glow</h1>

    <p>
      A glowing light bulb animation designed for tips, ideas,
      learning platforms, AI tools, and productivity interfaces.
    </p>

    <div class="demo-grid">

      <button class="idea-button">
        <span class="idea-icon">💡</span>
      </button>

      <button class="idea-button card-style">
        <span class="idea-icon">💡</span>
        <span>New Idea</span>
      </button>

      <div class="idea-card">
        <h3>Helpful Tip</h3>

        <p>
          Discover useful suggestions and productivity insights.
        </p>

        <button class="idea-button small">
          <span class="idea-icon">💡</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
