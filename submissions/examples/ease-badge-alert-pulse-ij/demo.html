<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Alert Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Badge Alert Pulse</h1>

    <div class="icon-row">
      <div class="icon-wrapper" data-count="3">
        <i class="fas fa-bell"></i>
        <span class="badge warning">3</span>
      </div>
      <div class="icon-wrapper" data-count="12">
        <i class="fas fa-envelope"></i>
        <span class="badge">12</span>
      </div>
      <div class="icon-wrapper" data-count="5">
        <i class="fas fa-comment-dots"></i>
        <span class="badge success">5</span>
      </div>
    </div>

    <button id="triggerBtn">New Alert</button>
  </div>

  <script>
    const wrappers = document.querySelectorAll(".icon-wrapper");
    const btn = document.getElementById("triggerBtn");

    btn.addEventListener("click", () => {
      const idx = Math.floor(Math.random() * wrappers.length);
      const wrapper = wrappers[idx];
      const badge = wrapper.querySelector(".badge");
      const count = parseInt(wrapper.dataset.count, 10) + 1;
      wrapper.dataset.count = count;
      badge.textContent = count > 99 ? "99+" : count;
      badge.classList.remove("alert");
      void badge.offsetWidth;
      badge.classList.add("alert");
    });
  </script>
</body>
</html>
