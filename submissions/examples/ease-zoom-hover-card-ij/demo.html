<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Hover Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card-grid">
      <div class="zoom-card">
        <div class="zoom-img" style="background: linear-gradient(135deg, #e94560, #c23152)">
          <span class="zoom-icon">🚀</span>
        </div>
        <div class="zoom-body">
          <h3>Launchpad</h3>
          <p>Deploy your projects with one click</p>
        </div>
      </div>
      <div class="zoom-card">
        <div class="zoom-img" style="background: linear-gradient(135deg, #533483, #3d2366)">
          <span class="zoom-icon">⚙️</span>
        </div>
        <div class="zoom-body">
          <h3>Settings</h3>
          <p>Configure your workspace preferences</p>
        </div>
      </div>
      <div class="zoom-card">
        <div class="zoom-img" style="background: linear-gradient(135deg, #0f3460, #0a2540)">
          <span class="zoom-icon">📊</span>
        </div>
        <div class="zoom-body">
          <h3>Analytics</h3>
          <p>Track performance and metrics</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
