<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Loading Demo — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== PULSE VARIANT ===== -->
  <section class="demo-section">
    <h2 class="demo-title">Pulse Skeleton (Default)</h2>
    <div class="demo-grid">

      <!-- Card Skeleton -->
      <div class="skeleton-card">
        <div class="skeleton skeleton-image skeleton-pulse"></div>
        <div class="skeleton-card-body">
          <div class="skeleton skeleton-text skeleton-pulse"></div>
          <div class="skeleton skeleton-text skeleton-text-medium skeleton-pulse"></div>
          <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
        </div>
      </div>

      <!-- List Skeleton -->
      <div class="skeleton-card">
        <div class="skeleton-list-item">
          <div class="skeleton skeleton-circle skeleton-pulse"></div>
          <div class="skeleton-list-text">
            <div class="skeleton skeleton-text skeleton-pulse"></div>
            <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
          </div>
        </div>
        <div class="skeleton-list-item">
          <div class="skeleton skeleton-circle skeleton-pulse"></div>
          <div class="skeleton-list-text">
            <div class="skeleton skeleton-text skeleton-pulse"></div>
            <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
          </div>
        </div>
        <div class="skeleton-list-item">
          <div class="skeleton skeleton-circle skeleton-pulse"></div>
          <div class="skeleton-list-text">
            <div class="skeleton skeleton-text skeleton-pulse"></div>
            <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- ===== SHIMMER VARIANT ===== -->
  <section class="demo-section">
    <h2 class="demo-title">Shimmer Sweep Skeleton</h2>
    <div class="demo-grid">

      <!-- Card with Shimmer -->
      <div class="skeleton-card">
        <div class="skeleton skeleton-image skeleton-shimmer"></div>
        <div class="skeleton-card-header">
          <div class="skeleton skeleton-circle skeleton-shimmer"></div>
          <div class="skeleton-list-text" style="flex: 1;">
            <div class="skeleton skeleton-text skeleton-shimmer"></div>
            <div class="skeleton skeleton-text skeleton-text-short skeleton-shimmer"></div>
          </div>
        </div>
        <div class="skeleton-card-body">
          <div class="skeleton skeleton-text skeleton-shimmer"></div>
          <div class="skeleton skeleton-text skeleton-text-medium skeleton-shimmer"></div>
        </div>
        <div class="skeleton-card-footer">
          <div class="skeleton skeleton-button skeleton-shimmer"></div>
          <div class="skeleton skeleton-button skeleton-shimmer"></div>
        </div>
      </div>

      <!-- Profile Card Shimmer -->
      <div class="skeleton-card" style="text-align: center;">
        <div class="skeleton skeleton-circle skeleton-circle-lg skeleton-shimmer" style="margin: 0 auto 1rem;"></div>
        <div class="skeleton skeleton-text skeleton-shimmer"></div>
        <div class="skeleton skeleton-text skeleton-text-short skeleton-shimmer" style="margin: 0 auto;"></div>
        <div style="margin-top: 1rem;">
          <div class="skeleton skeleton-button skeleton-shimmer" style="margin: 0 auto;"></div>
        </div>
      </div>

    </div>
  </section>

  <!-- ===== DARK MODE VARIANT ===== -->
  <div class="demo-dark-bg">
    <section class="demo-section">
      <h2 class="demo-title">Dark Mode Skeleton</h2>
      <div class="demo-grid skeleton-dark">

        <div class="skeleton-card">
          <div class="skeleton skeleton-image skeleton-pulse"></div>
          <div class="skeleton-card-body">
            <div class="skeleton skeleton-text skeleton-shimmer"></div>
            <div class="skeleton skeleton-text skeleton-text-medium skeleton-shimmer"></div>
            <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
          </div>
        </div>

        <div class="skeleton-card">
          <div class="skeleton-list-item">
            <div class="skeleton skeleton-circle skeleton-circle-sm skeleton-pulse"></div>
            <div class="skeleton-list-text">
              <div class="skeleton skeleton-text skeleton-pulse"></div>
              <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
            </div>
          </div>
          <div class="skeleton-list-item">
            <div class="skeleton skeleton-circle skeleton-circle-sm skeleton-pulse"></div>
            <div class="skeleton-list-text">
              <div class="skeleton skeleton-text skeleton-pulse"></div>
              <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
            </div>
          </div>
          <div class="skeleton-list-item">
            <div class="skeleton skeleton-circle skeleton-circle-sm skeleton-pulse"></div>
            <div class="skeleton-list-text">
              <div class="skeleton skeleton-text skeleton-pulse"></div>
              <div class="skeleton skeleton-text skeleton-text-short skeleton-pulse"></div>
            </div>
          </div>
        </div>

      </div>
    </section>
  </div>

</body>
</html>
