<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infinite Scroll Loader Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Infinite Scroll Loader</h1>
        <p class="subtitle">Shows spinner while loading next page</p>

        <!-- INFINITE SCROLL LOADER COMPONENT -->
        <div class="scroll-container">
            <div class="scroll-wrapper">
                <div class="scroll-content" id="scrollContent">
                    <!-- Items will be generated by JavaScript -->
                </div>

                <!-- Loader -->
                <div class="scroll-loader" id="scrollLoader">
                    <div class="loader-spinner">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <span class="loader-text" id="loaderText">Loading more items...</span>
                </div>

                <!-- End message -->
                <div class="scroll-end" id="scrollEnd">
                    <span class="end-icon">🏁</span>
                    <span class="end-text">You've reached the end!</span>
                </div>

                <!-- Controls -->
                <div class="scroll-controls">
                    <button class="scroll-btn" id="resetBtn">⟳ Reset</button>
                    <button class="scroll-btn" id="toggleBtn">⏸ Toggle Loader</button>
                    <button class="scroll-btn" id="simulateErrorBtn">❌ Simulate Error</button>
                </div>

                <div class="scroll-status">
                    <span class="status-label">Items:</span>
                    <span class="status-value" id="itemCount">0</span>
                    <span class="status-label">Page:</span>
                    <span class="status-value" id="pageDisplay">0</span>
                    <span class="status-label">Status:</span>
                    <span class="status-value" id="statusDisplay">Ready</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Loader Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-loader">
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                        <div class="spinner-ring"></div>
                    </div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-loader dot-loader">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                    <span class="variant-label">Dots</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-loader pulse-loader">
                        <span class="pulse-ring"></span>
                    </div>
                    <span class="variant-label">Pulse</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-loader bar-loader">
                        <div class="bar"></div>
                    </div>
                    <span class="variant-label">Bar</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const content = document.getElementById('scrollContent');
            const loader = document.getElementById('scrollLoader');
            const loaderText = document.getElementById('loaderText');
            const endMessage = document.getElementById('scrollEnd');
            const itemCount = document.getElementById('itemCount');
            const pageDisplay = document.getElementById('pageDisplay');
            const statusDisplay = document.getElementById('statusDisplay');
            const resetBtn = document.getElementById('resetBtn');
            const toggleBtn = document.getElementById('toggleBtn');
            const simulateErrorBtn = document.getElementById('simulateErrorBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                itemsPerPage: 10,
                totalPages: 10,
                loadDelay: 800, // ms
                threshold: 200, // px before bottom
                maxItems: 100,
                loaderEnabled: true,
                onLoad: function(page, items) {
                    console.log(`📄 Loaded page ${page} with ${items.length} items`);
                },
                onComplete: function(totalItems) {
                    console.log(`🏁 All ${totalItems} items loaded`);
                },
                onError: function(error) {
                    console.log(`❌ Error loading: ${error}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentPage = 0;
            let items = [];
            let isLoading = false;
            let hasMore = true;
            let isError = false;
            let isLoaderEnabled = CONFIG.loaderEnabled;

            // ============================================
            // DATA GENERATION
            // ============================================
            const sampleContent = [
                { title: 'Mountain Sunset', color: '#4facfe' },
                { title: 'Ocean Waves', color: '#43e97b' },
                { title: 'Forest Path', color: '#f093fb' },
                { title: 'City Lights', color: '#f5576c' },
                { title: 'Starry Night', color: '#f9d976' },
                { title: 'Desert Dunes', color: '#f39c12' },
                { title: 'Waterfall', color: '#e74c3c' },
                { title: 'Meadow', color: '#3498db' },
                { title: 'Volcano', color: '#2ecc71' },
                { title: 'Northern Lights', color: '#9b59b6' },
                { title: 'Crystal Lake', color: '#4facfe' },
                { title: 'Rainforest', color: '#43e97b' },
                { title: 'Glacier', color: '#f093fb' },
                { title: 'Canyon', color: '#f5576c' },
                { title: 'Sunflowers', color: '#f9d976' },
                { title: 'Aurora Borealis', color: '#4facfe' },
                { title: 'Tropical Beach', color: '#43e97b' },
                { title: 'Snowy Mountains', color: '#f093fb' },
                { title: 'Autumn Leaves', color: '#f5576c' },
                { title: 'Cherry Blossom', color: '#f9d976' }
            ];

            function generateItems(page, count) {
                const startIndex = (page - 1) * count;
                const newItems = [];
                const total = sampleContent.length;
                for (let i = 0; i < count; i++) {
                    const idx = (startIndex + i) % total;
                    const content = sampleContent[idx];
                    newItems.push({
                        id: items.length + i + 1,
                        title: content.title,
                        color: content.color,
                        content: `Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.`
                    });
                }
                return newItems;
            }

            // ============================================
            // RENDER FUNCTIONS
            // ============================================
            function renderItems(newItems) {
                newItems.forEach((item, index) => {
                    const el = document.createElement('div');
                    el.className = 'scroll-item';
                    el.style.animationDelay = (index * 50) + 'ms';
                    el.style.backgroundColor = item.color;
                    el.innerHTML = `
                        <div class="item-content">
                            <div class="item-number">#${item.id}</div>
                            <div class="item-title">${item.title}</div>
                            <div class="item-description">${item.content.substring(0, 60)}...</div>
                        </div>
                    `;
                    // Stagger animation
                    el.style.opacity = '0';
                    el.style.transform = 'translateY(20px)';
                    content.appendChild(el);
                    
                    // Trigger animation
                    requestAnimationFrame(() => {
                        el.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                        el.style.opacity = '1';
                        el.style.transform = 'translateY(0)';
                    });
                });
                
                items = [...items, ...newItems];
                itemCount.textContent = items.length;
                updateStatus();
            }

            function updateStatus() {
                pageDisplay.textContent = currentPage;
                statusDisplay.textContent = isLoading ? 'Loading...' : 
                                            isError ? 'Error' : 
                                            hasMore ? 'Ready' : 'Complete';
                statusDisplay.style.color = isError ? '#ff3b30' : 
                                            isLoading ? '#f59e0b' : 
                                            hasMore ? '#34c759' : '#6b7280';
            }

            // ============================================
            // LOAD FUNCTIONS
            // ============================================
            function loadMore() {
                if (isLoading || !hasMore || !isLoaderEnabled) return;
                
                isLoading = true;
                isError = false;
                loader.classList.add('active');
                loaderText.textContent = 'Loading more items...';
                updateStatus();
                
                // Simulate network request
                setTimeout(() => {
                    try {
                        currentPage++;
                        
                        // Check if we've reached the end
                        if (currentPage > CONFIG.totalPages) {
                            hasMore = false;
                            loader.classList.remove('active');
                            endMessage.classList.add('active');
                            statusDisplay.textContent = 'Complete';
                            CONFIG.onComplete(items.length);
                            updateStatus();
                            isLoading = false;
                            return;
                        }
                        
                        // Generate items
                        const newItems = generateItems(currentPage, CONFIG.itemsPerPage);
                        renderItems(newItems);
                        
                        // Check if we've reached max items
                        if (items.length >= CONFIG.maxItems) {
                            hasMore = false;
                            loader.classList.remove('active');
                            endMessage.classList.add('active');
                            CONFIG.onComplete(items.length);
                        } else {
                            loader.classList.remove('active');
                        }
                        
                        CONFIG.onLoad(currentPage, newItems);
                        isLoading = false;
                        updateStatus();
                        
                    } catch (error) {
                        isError = true;
                        loader.classList.remove('active');
                        loaderText.textContent = '❌ Error loading items. Click to retry.';
                        CONFIG.onError(error);
                        updateStatus();
                        isLoading = false;
                    }
                }, CONFIG.loadDelay);
            }

            function resetScroll() {
                // Reset state
                currentPage = 0;
                items = [];
                hasMore = true;
                isLoading = false;
                isError = false;
                
                // Clear content
                content.innerHTML = '';
                loader.classList.remove('active');
                endMessage.classList.remove('active');
                loaderText.textContent = 'Loading more items...';
                
                // Reset stats
                itemCount.textContent = '0';
                updateStatus();
                
                // Load first page
                loadMore();
            }

            function toggleLoader() {
                isLoaderEnabled = !isLoaderEnabled;
                toggleBtn.textContent = isLoaderEnabled ? '⏸ Toggle Loader' : '▶ Toggle Loader';
                if (!isLoaderEnabled) {
                    loader.classList.remove('active');
                    statusDisplay.textContent = 'Paused';
                    statusDisplay.style.color = '#f59e0b';
                } else {
                    updateStatus();
                    // Check if we should load more
                    if (hasMore && !isLoading) {
                        checkScroll();
                    }
                }
            }

            function simulateError() {
                if (isLoading) return;
                isError = true;
                loader.classList.add('active');
                loaderText.textContent = '❌ Simulated error. Click to retry.';
                statusDisplay.textContent = 'Error';
                statusDisplay.style.color = '#ff3b30';
                CONFIG.onError('Simulated error');
            }

            // ============================================
            // SCROLL DETECTION
            // ============================================
            function checkScroll() {
                if (!isLoaderEnabled || isLoading || !hasMore) return;
                
                const scrollContainer = document.querySelector('.scroll-wrapper');
                const scrollTop = scrollContainer.scrollTop;
                const scrollHeight = scrollContainer.scrollHeight;
                const clientHeight = scrollContainer.clientHeight;
                
                if (scrollTop + clientHeight >= scrollHeight - CONFIG.threshold) {
                    loadMore();
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            const scrollContainer = document.querySelector('.scroll-wrapper');
            scrollContainer.addEventListener('scroll', checkScroll);

            // Click on loader to retry on error
            loader.addEventListener('click', function() {
                if (isError) {
                    isError = false;
                    loader.classList.remove('active');
                    loadMore();
                }
            });

            // Controls
            resetBtn.addEventListener('click', resetScroll);
            toggleBtn.addEventListener('click', toggleLoader);
            simulateErrorBtn.addEventListener('click', simulateError);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'r' || e.key === 'R') {
                    resetScroll();
                }
                if (e.key === 't' || e.key === 'T') {
                    toggleLoader();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                card.addEventListener('click', function() {
                    // Visual feedback
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.InfiniteScroll = {
                loadMore: loadMore,
                reset: resetScroll,
                toggle: toggleLoader,
                getState: () => ({
                    currentPage,
                    totalItems: items.length,
                    hasMore,
                    isLoading,
                    isError,
                    isEnabled: isLoaderEnabled
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Load first page
            resetScroll();

            console.log('✅ Infinite Scroll Loader initialized!');
            console.log('📖 API: window.InfiniteScroll');
            console.log('📖 Usage:');
            console.log('  - Scroll to bottom to load more items');
            console.log('  - Keyboard shortcuts: R (reset), T (toggle loader)');
            console.log('  - Click loader to retry on error');

        })();
    </script>
</body>
</html>
