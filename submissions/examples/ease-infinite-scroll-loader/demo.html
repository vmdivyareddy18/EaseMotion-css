<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-infinite-scroll-loader – Infinite Scroll Loader</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-max-w-md ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Infinite Scroll Feed
    </h1>
    <p class="ease-text-gray-500 ease-mb-6 ease-fade-in ease-delay-200">
      Scroll down or click "Load More" — the loader appears at the bottom.
    </p>

    <!-- List container -->
    <ul id="item-list" class="item-list ease-mb-4">
      <li class="ease-card ease-p-4 ease-mb-3 ease-fade-in">Article 1 – Getting Started</li>
      <li class="ease-card ease-p-4 ease-mb-3 ease-fade-in">Article 2 – Advanced Tips</li>
      <li class="ease-card ease-p-4 ease-mb-3 ease-fade-in">Article 3 – Case Studies</li>
    </ul>

    <!-- Loader (hidden by default) -->
    <div id="loader" class="infinite-loader ease-transition">
      <div class="loader-spinner"></div>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Loading more...</p>
    </div>

    <!-- Load More button (for demo) -->
    <button id="load-more-btn" class="ease-btn ease-btn-secondary ease-hover-scale-105 ease-transition ease-mt-4">
      Load More
    </button>

    <p id="end-message" class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500" style="display:none;">
      You've reached the end.
    </p>
  </div>

  <script>
    const list = document.getElementById('item-list');
    const loader = document.getElementById('loader');
    const loadBtn = document.getElementById('load-more-btn');
    const endMsg = document.getElementById('end-message');
    let page = 3;
    const maxPage = 6;

    function showLoader() {
      loader.classList.add('show');
      loadBtn.disabled = true;
    }

    function hideLoader() {
      loader.classList.remove('show');
      loadBtn.disabled = false;
    }

    function loadMore() {
      if (page > maxPage) {
        hideLoader();
        loadBtn.style.display = 'none';
        endMsg.style.display = 'block';
        return;
      }

      showLoader();

      // Simulate network delay
      setTimeout(() => {
        for (let i = 0; i < 3; i++) {
          const li = document.createElement('li');
          li.className = 'ease-card ease-p-4 ease-mb-3 ease-fade-in';
          li.textContent = Article  – Loaded on scroll;
          list.appendChild(li);
          page++;
        }
        hideLoader();

        if (page > maxPage) {
          loadBtn.style.display = 'none';
          endMsg.style.display = 'block';
        }
      }, 1500);
    }

    loadBtn.addEventListener('click', loadMore);

    // Also trigger on scroll near bottom
    window.addEventListener('scroll', () => {
      if (loader.classList.contains('show')) return;
      const rect = loadBtn.getBoundingClientRect();
      if (rect.top < window.innerHeight + 100) {
        loadMore();
      }
    });
  </script>

</body>
</html>
