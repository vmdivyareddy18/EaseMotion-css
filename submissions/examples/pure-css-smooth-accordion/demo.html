<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accordion">
        <div class="accordion-item">
            <input type="checkbox" id="acc1" class="acc-toggle" hidden>
            <label for="acc1" class="acc-header">Section 1: Introduction</label>
            <div class="acc-content">
                <div class="acc-inner">
                    <p>This is the first section of our pure CSS accordion.</p>
                </div>
            </div>
        </div>
        <div class="accordion-item">
            <input type="checkbox" id="acc2" class="acc-toggle" hidden>
            <label for="acc2" class="acc-header">Section 2: Architecture</label>
            <div class="acc-content">
                <div class="acc-inner">
                    <p>It utilizes CSS grid transitions to smoothly animate height from 0 to auto without JavaScript hacks.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
