<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Barcode - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 14px;
        }

        /* Demo sections */
        .demo-section {
            margin-bottom: 50px;
        }

        .demo-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        /* Barcode wrapper */
        .barcode-wrapper {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 6px;
            padding: 30px;
            background: #f9f9f9;
            border-radius: 8px;
            min-height: 150px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 22px;
            }

            .barcode-wrapper {
                padding: 20px;
                min-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Cascading Barcode</h1>
        <p class="subtitle">A smooth cascade animation for barcode visualization</p>

        <!-- Demo 1: Default Cascading -->
        <div class="demo-section">
            <div class="demo-title">Default Cascade</div>
            <div class="barcode-wrapper">
                <div class="cascading-bar" style="--bar-index: 0;"></div>
                <div class="cascading-bar" style="--bar-index: 1;"></div>
                <div class="cascading-bar" style="--bar-index: 2;"></div>
                <div class="cascading-bar" style="--bar-index: 3;"></div>
                <div class="cascading-bar" style="--bar-index: 4;"></div>
                <div class="cascading-bar" style="--bar-index: 5;"></div>
                <div class="cascading-bar" style="--bar-index: 6;"></div>
                <div class="cascading-bar" style="--bar-index: 7;"></div>
            </div>
        </div>

        <!-- Demo 2: Wider Bars -->
        <div class="demo-section">
            <div class="demo-title">Wider Bars Variant</div>
            <div class="barcode-wrapper">
                <div class="cascading-bar cascading-bar--wide" style="--bar-index: 0;"></div>
                <div class="cascading-bar cascading-bar--wide" style="--bar-index: 1;"></div>
                <div class="cascading-bar cascading-bar--wide" style="--bar-index: 2;"></div>
                <div class="cascading-bar cascading-bar--wide" style="--bar-index: 3;"></div>
                <div class="cascading-bar cascading-bar--wide" style="--bar-index: 4;"></div>
            </div>
        </div>

        <!-- Demo 3: Slow Cascade -->
        <div class="demo-section">
            <div class="demo-title">Slow Cascade</div>
            <div class="barcode-wrapper">
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 0;"></div>
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 1;"></div>
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 2;"></div>
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 3;"></div>
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 4;"></div>
                <div class="cascading-bar cascading-bar--slow" style="--bar-index: 5;"></div>
            </div>
        </div>
    </div>
</body>
</html>
