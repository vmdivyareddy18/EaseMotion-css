<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Slide Out Right - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Exiting Right</div>
        <button onclick="document.querySelector('.box').classList.add('ease-slide-out-right-el');">Slide Right</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-slide-out-right-el');" style="border-color:#444;">Reset</button>
    </div>
</body>
</html>
