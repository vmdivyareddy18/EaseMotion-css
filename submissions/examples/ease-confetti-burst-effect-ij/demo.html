<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Burst Effect - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Confetti Burst Effect</h1>
    <p class="desc">Click the button to trigger a colorful confetti burst</p>
    <div class="cbe-scene" style="--confetti-color1: #ef4444; --confetti-color2: #fbbf24; --confetti-color3: #3b82f6; --burst-duration: 1.2s;">
      <button class="cbe-btn" id="burstBtn">Celebrate!</button>
      <div class="cbe-particles" id="particles"></div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('burstBtn');
    const container = document.getElementById('particles');
    const colors = [
      'var(--confetti-color1, #ef4444)',
      'var(--confetti-color2, #fbbf24)',
      'var(--confetti-color3, #3b82f6)'
    ];

    btn.addEventListener('click', () => {
      container.innerHTML = '';
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'cbe-particle';
        const angle = Math.random() * 360;
        const dist = 80 + Math.random() * 120;
        const x = Math.cos(angle * Math.PI / 180) * dist;
        const y = Math.sin(angle * Math.PI / 180) * dist;
        p.style.setProperty('--x', x + 'px');
        p.style.setProperty('--y', y + 'px');
        p.style.background = colors[i % 3];
        p.style.animationDelay = Math.random() * 0.15 + 's';
        container.appendChild(p);
      }
    });
  </script>
</body>
</html>
