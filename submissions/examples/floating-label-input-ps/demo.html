<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Floating Label Input Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: white;
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }
    
    .demo-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="floating-input-group">
      <!-- Important: placeholder=" " is required for :placeholder-shown to work -->
      <input type="text" id="username" class="floating-input" placeholder=" ">
      <label for="username" class="floating-label">Email Address</label>
    </div>

    <div class="floating-input-group">
      <input type="password" id="password" class="floating-input" placeholder=" ">
      <label for="password" class="floating-label">Password</label>
    </div>
  </div>
</body>
</html>
