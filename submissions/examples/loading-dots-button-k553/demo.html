<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Loading Dots Button Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      flex-direction: column;
    }

    p {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <button class="loading-dots-btn" id="demoBtn" onclick="toggleLoading()">
    <span class="btn-label">Submit</span>
    <span class="btn-dots">
      <span></span><span></span><span></span>
    </span>
  </button>

  <p>Click the button — width stays fixed while the label swaps to loading dots.</p>

  <script>
    function toggleLoading() {
      const btn = document.getElementById('demoBtn');
      btn.classList.add('is-loading');
      btn.disabled = true;

      // Simulate an async action (e.g. API request)
      setTimeout(() => {
        btn.classList.remove('is-loading');
        btn.disabled = false;
      }, 2000);
    }
  </script>

</body>
</html>
