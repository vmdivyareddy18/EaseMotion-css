<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Savings Goal Tracker — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; background: var(--ease-color-bg); font-family: var(--ease-font-sans); }
    h2 { text-align: center; margin-bottom: 0.25rem; }
    p.sub { text-align: center; color: var(--ease-color-muted); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h2>Savings Goal Tracker</h2>
  <p class="sub">Track your progress toward multiple savings goals</p>

  <div class="ease-savings">

    <!-- Add goal form -->
    <div class="ease-savings__form">
      <h3 class="ease-savings__form-title">Add New Goal</h3>
      <div class="ease-savings__form-grid">
        <div class="ease-savings__field">
          <label class="ease-savings__label" for="goal-name">Goal Name</label>
          <input class="ease-savings__input" id="goal-name" type="text" placeholder="e.g. Emergency Fund" />
        </div>
        <div class="ease-savings__field">
          <label class="ease-savings__label" for="goal-target">Target ($)</label>
          <input class="ease-savings__input" id="goal-target" type="number" min="1" placeholder="10000" />
        </div>
        <div class="ease-savings__field">
          <label class="ease-savings__label" for="goal-saved">Saved So Far ($)</label>
          <input class="ease-savings__input" id="goal-saved" type="number" min="0" placeholder="0" />
        </div>
      </div>
      <div style="display:flex;gap:0.75rem;flex-wrap:wrap;align-items:flex-end;">
        <div class="ease-savings__field" style="flex:1;min-width:140px;">
          <label class="ease-savings__label" for="goal-monthly">Monthly Contribution ($)</label>
          <input class="ease-savings__input" id="goal-monthly" type="number" min="1" placeholder="500" />
        </div>
        <div class="ease-savings__field" style="flex:1;min-width:120px;">
          <label class="ease-savings__label" for="goal-color">Colour</label>
          <input class="ease-savings__input" id="goal-color" type="color" value="#6c63ff" style="height:42px;padding:4px 8px;cursor:pointer;" />
        </div>
        <button class="ease-savings__add-btn" id="add-goal-btn">+ Add Goal</button>
      </div>
    </div>

    <!-- Summary -->
    <div class="ease-savings__summary" id="summary"></div>

    <!-- Goals list -->
    <div class="ease-savings__goals" id="goals-list"></div>

  </div>

  <script>
    const COLORS = ['#6c63ff','#22c55e','#f59e0b','#ef4444','#ec4899','#06b6d4','#8b5cf6'];
    let goals = JSON.parse(localStorage.getItem('ease-savings-goals') || '[]');
    if (!goals.length) {
      goals = [
        { id:1, name:'Emergency Fund',    target:10000, saved:4200,  monthly:500,  color:'#6c63ff' },
        { id:2, name:'New Laptop',        target:2000,  saved:1650,  monthly:200,  color:'#22c55e' },
        { id:3, name:'Vacation to Japan', target:5000,  saved:800,   monthly:300,  color:'#f59e0b' },
      ];
    }
    let nextId = Math.max(0, ...goals.map(g => g.id)) + 1;

    function save() { localStorage.setItem('ease-savings-goals', JSON.stringify(goals)); }

    function fmt(n) {
      return '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 0 });
    }

    function monthsLeft(g) {
      const rem = Math.max(0, g.target - g.saved);
      if (!g.monthly || rem === 0) return 0;
      return Math.ceil(rem / g.monthly);
    }

    function completionDate(g) {
      const m = monthsLeft(g);
      if (m === 0) return 'Completed!';
      const d = new Date();
      d.setMonth(d.getMonth() + m);
      return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function render() {
      // Summary
      const totalTarget = goals.reduce((s,g) => s + g.target, 0);
      const totalSaved  = goals.reduce((s,g) => s + g.saved, 0);
      const totalMonthly = goals.reduce((s,g) => s + g.monthly, 0);
      document.getElementById('summary').innerHTML = [
        { label: 'Total Saved',       value: fmt(totalSaved)   },
        { label: 'Total Target',      value: fmt(totalTarget)  },
        { label: 'Monthly Budget',    value: fmt(totalMonthly) },
      ].map(s => `
        <div class="ease-savings__summary-card">
          <div class="ease-savings__summary-value">${s.value}</div>
          <div class="ease-savings__summary-label">${s.label}</div>
        </div>
      `).join('');

      // Goals
      const list = document.getElementById('goals-list');
      if (!goals.length) {
        list.innerHTML = `
          <div class="ease-savings__empty">
            <div class="ease-savings__empty-icon">🐷</div>
            <div>No goals yet — add your first savings goal above!</div>
          </div>`;
        return;
      }
      list.innerHTML = goals.map(g => {
        const pct     = Math.min(100, Math.round((g.saved / g.target) * 100));
        const done    = g.saved >= g.target;
        const rem     = Math.max(0, g.target - g.saved);
        const months  = monthsLeft(g);
        const compDate = completionDate(g);
        return `
          <div class="ease-savings__goal-card${done ? ' ease-savings__goal-card--complete' : ''}"
               style="--ease-goal-color: ${g.color}">
            <div class="ease-savings__goal-header">
              <div>
                <div class="ease-savings__goal-name">
                  ${g.name}
                  ${done ? '<span class="ease-savings__badge">✓ Done</span>' : ''}
                </div>
                <div style="font-size:0.75rem;color:var(--ease-color-muted);margin-top:2px;">
                  ${fmt(g.saved)} of ${fmt(g.target)} &nbsp;·&nbsp; ${pct}%
                </div>
              </div>
              <div class="ease-savings__goal-actions">
                <button class="ease-savings__icon-btn" onclick="deleteGoal(${g.id})" aria-label="Delete goal">🗑</button>
              </div>
            </div>

            <div class="ease-savings__progress-track">
              <div class="ease-savings__progress-fill${done ? ' ease-savings__progress-fill--complete' : ''}"
                   style="width:${pct}%"></div>
            </div>

            <div class="ease-savings__goal-stats">
              <div class="ease-savings__stat">
                <span class="ease-savings__stat-label">Remaining</span>
                <span class="ease-savings__stat-value">${fmt(rem)}</span>
              </div>
              <div class="ease-savings__stat">
                <span class="ease-savings__stat-label">Monthly</span>
                <span class="ease-savings__stat-value ease-savings__stat-value--primary">${fmt(g.monthly)}/mo</span>
              </div>
              <div class="ease-savings__stat">
                <span class="ease-savings__stat-label">Completion</span>
                <span class="ease-savings__stat-value${done ? ' ease-savings__stat-value--success' : ''}">${compDate}</span>
              </div>
            </div>

            ${done ? '' : `
            <div class="ease-savings__contribute">
              <span style="font-size:0.75rem;color:var(--ease-color-muted);white-space:nowrap;">Add funds:</span>
              <input class="ease-savings__contribute-input"
                     type="number" min="1" placeholder="Amount"
                     id="contrib-${g.id}" aria-label="Contribution amount for ${g.name}" />
              <button class="ease-savings__contribute-btn" onclick="contribute(${g.id})">+ Add</button>
            </div>`}
          </div>
        `;
      }).join('');
    }

    window.deleteGoal = function(id) {
      goals = goals.filter(g => g.id !== id);
      save(); render();
    };

    window.contribute = function(id) {
      const input = document.getElementById('contrib-' + id);
      const amount = parseFloat(input.value);
      if (!amount || amount <= 0) return;
      const g = goals.find(g => g.id === id);
      if (g) { g.saved = Math.min(g.target, g.saved + amount); save(); render(); }
    };

    document.getElementById('add-goal-btn').addEventListener('click', () => {
      const name    = document.getElementById('goal-name').value.trim();
      const target  = parseFloat(document.getElementById('goal-target').value);
      const saved   = parseFloat(document.getElementById('goal-saved').value) || 0;
      const monthly = parseFloat(document.getElementById('goal-monthly').value) || 100;
      const color   = document.getElementById('goal-color').value;
      if (!name || !target) return;
      goals.push({ id: nextId++, name, target, saved, monthly, color });
      save(); render();
      ['goal-name','goal-target','goal-saved','goal-monthly'].forEach(id => {
        document.getElementById(id).value = '';
      });
    });

    render();
  </script>
</body>
</html>
