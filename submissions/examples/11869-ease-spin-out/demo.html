<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-spin-out - Exit Effect</title>
  <meta name="description" content="A demonstration of the ease-spin-out utility animation showing an element rotating 360 degrees while scaling down and fading out.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-spin-out</h1>
      <p class="subtitle" id="main-desc">Spins 360° while shrinking and fading out</p>
    </header>

    <div class="display-area">
      <!-- Target that spins out -->
      <div class="spin-target" id="target-element" aria-label="Animated exit box">
        <span>✕</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Spin-Out</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-spin-out');
      void target.offsetWidth;
      target.classList.add('ease-spin-out');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-spin-out');
    }
  </script>

</body>
</html>
