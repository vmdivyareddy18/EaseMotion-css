<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magic Wand Sparkle</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>✨ Magic Wand Sparkle</h1>
        <p class="subtitle">Wand with trailing sparkles and glow</p>

        <div class="wand-wrapper">
            <canvas id="wandCanvas"></canvas>

            <div class="controls">
                <button id="waveBtn">🪄 Wave</button>
                <button id="colorBtn">Color: Rainbow</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">✨ Ready to wave</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('wandCanvas');
        const ctx = canvas.getContext('2d');
        const waveBtn = document.getElementById('waveBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let wand = {
            x: 0,
            y: 0,
            angle: 0,
            targetAngle: 0,
            length: 80,
            tipX: 0,
            tipY: 0,
            glow: 0,
            trail: [],
            maxTrail: 30,
            isWaving: false,
            wavePhase: 0,
            sparkleIntensity: 0,
        };
        let sparkles = [];
        let particles = [];
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let glowParticles = [];
        let mouseX = 0;
        let mouseY = 0;
        let isHovering = false;

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Rainbow',
                sparkle: (t) => {
                    const hue = (t * 360 + time * 30) % 360;
                    return `hsl(${hue}, 100%, 70%)`;
                },
                glow: '#ffd93d',
                trail: '#ff6b6b'
            },
            {
                name: 'Gold',
                sparkle: (t) => `hsl(45, 100%, ${60 + t * 30}%)`,
                glow: '#ffd700',
                trail: '#ffb300'
            },
            {
                name: 'Blue',
                sparkle: (t) => `hsl(210, 100%, ${60 + t * 30}%)`,
                glow: '#4d96ff',
                trail: '#0066ff'
            },
            {
                name: 'Pink',
                sparkle: (t) => `hsl(330, 100%, ${60 + t * 30}%)`,
                glow: '#ff6b9d',
                trail: '#ff1493'
            },
            {
                name: 'Green',
                sparkle: (t) => `hsl(140, 100%, ${60 + t * 30}%)`,
                glow: '#6bcb77',
                trail: '#00cc44'
            },
            {
                name: 'Purple',
                sparkle: (t) => `hsl(280, 100%, ${60 + t * 30}%)`,
                glow: '#a78bfa',
                trail: '#7c3aed'
            },
        ];

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor(x, y, color, size) {
                this.x = x;
                this.y = y;
                this.color = color || '#ffd93d';
                this.size = size || 2 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 2;
                this.life = 1;
                this.maxLife = 20 + Math.random() * 30;
                this.age = 0;
                this.gravity = 0.02 + Math.random() * 0.03;
                this.phase = Math.random() * Math.PI * 2;
                this.glow = 0.3 + Math.random() * 0.4;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
                this.shape = Math.random() > 0.5 ? 'star' : 'circle';
                this.trail = [];
                this.maxTrail = 3 + Math.floor(Math.random() * 3);
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98;
                this.life = 1 - this.age / this.maxLife;
                this.size *= 0.995;
                this.rotation += this.rotSpeed;

                // Trail
                this.trail.push({ x: this.x, y: this.y, alpha: 0.5 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                for (const t of this.trail) {
                    t.alpha *= 0.92;
                }
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * 0.15 * this.life;
                    const trailSize = this.size * (0.2 + (i / this.trail.length) * 0.3);
                    ctx.beginPath();
                    ctx.arc(t.x - this.x, t.y - this.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = trailAlpha;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color + '40';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                // Glow
                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 4);
                grad.addColorStop(0, this.color + '80');
                grad.addColorStop(0.5, this.color + '30');
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.5;
                ctx.fill();

                // Main particle
                if (this.shape === 'star') {
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
                        const r = i % 2 === 0 ? this.size * this.life : this.size * this.life * 0.4;
                        const px = Math.cos(angle + this.phase) * r;
                        const py = Math.sin(angle + this.phase) * r;
                        if (i === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.life * 0.9;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color + '80';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size * this.life, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = this.life * 0.9;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color + '80';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.globalAlpha = 1;
                ctx.restore();
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== GLOW PARTICLE CLASS =====
        class GlowParticle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color || '#ffd93d';
                this.size = 1 + Math.random() * 3;
                this.life = 1;
                this.maxLife = 15 + Math.random() * 25;
                this.age = 0;
                this.phase = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 0.5;
                this.distance = 0;
                this.maxDistance = 15 + Math.random() * 25;
                this.angle = Math.random() * Math.PI * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.05;
            }

            update() {
                this.age++;
                this.life = 1 - this.age / this.maxLife;
                this.distance += this.speed * 0.5;
                this.angle += 0.03;
                if (this.distance > this.maxDistance) {
                    this.distance = this.maxDistance;
                }
                this.x += Math.cos(this.angle) * 0.05;
                this.y += Math.sin(this.angle) * 0.05;
                this.rotation += this.rotSpeed;
            }

            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);

                const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size * 5);
                grad.addColorStop(0, this.color + '60');
                grad.addColorStop(0.5, this.color + '20');
                grad.addColorStop(1, this.color + '00');
                ctx.beginPath();
                ctx.arc(0, 0, this.size * 5, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.4;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(0, 0, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.6;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color + '80';
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
                ctx.restore();
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== DRAW WAND =====
        function drawWand(ctx, x, y, angle, length) {
            const palette = colorPalettes[colorMode];
            const glowColor = palette.glow;
            const trailColor = palette.trail;

            const endX = x + Math.cos(angle) * length;
            const endY = y + Math.sin(angle) * length;

            // Wand glow
            const wandGlow = ctx.createRadialGradient(endX, endY, 0, endX, endY, 30 + wand.glow * 20);
            wandGlow.addColorStop(0, glowColor + '60');
            wandGlow.addColorStop(0.3, glowColor + '30');
            wandGlow.addColorStop(1, glowColor + '00');
            ctx.beginPath();
            ctx.arc(endX, endY, 30 + wand.glow * 20, 0, Math.PI * 2);
            ctx.fillStyle = wandGlow;
            ctx.fill();

            // Wand body
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // Wood grain
            const grad = ctx.createLinearGradient(-2, 0, 2, 0);
            grad.addColorStop(0, '#5a3a1a');
            grad.addColorStop(0.3, '#7a4a2a');
            grad.addColorStop(0.5, '#8a5a3a');
            grad.addColorStop(0.7, '#7a4a2a');
            grad.addColorStop(1, '#5a3a1a');

            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(0,0,0,0.2)';
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.moveTo(-4, 0);
            ctx.lineTo(-3, -length);
            ctx.lineTo(3, -length);
            ctx.lineTo(4, 0);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;

            // Handle
            ctx.fillStyle = '#4a2a0a';
            ctx.fillRect(-5, 0, 10, 8);
            ctx.fillRect(-4, 8, 8, 4);
            ctx.fillRect(-3, 12, 6, 3);

            // Handle wrap
            ctx.fillStyle = '#6a4a2a';
            ctx.fillRect(-4, 2, 8, 2);

            // Tip glow
            const tipGlow = ctx.createRadialGradient(0, -length, 0, 0, -length, 8);
            tipGlow.addColorStop(0, glowColor + '80');
            tipGlow.addColorStop(0.5, glowColor + '40');
            tipGlow.addColorStop(1, glowColor + '00');
            ctx.beginPath();
            ctx.arc(0, -length, 8, 0, Math.PI * 2);
            ctx.fillStyle = tipGlow;
            ctx.fill();

            // Tip sparkle
            ctx.beginPath();
            ctx.arc(0, -length, 2 + wand.glow * 3, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 20;
            ctx.shadowColor = glowColor + '80';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();

            wand.tipX = endX;
            wand.tipY = endY;

            // Sparkle trail
            if (wand.isWaving && Math.random() < 0.3) {
                const sparkleColor = colorPalettes[colorMode].sparkle(Math.random());
                const p = new Particle(endX + (Math.random() - 0.5) * 10, endY + (Math.random() - 0.5) * 10, sparkleColor);
                p.vx = (Math.random() - 0.5) * 2;
                p.vy = (Math.random() - 0.5) * 2 - 1;
                p.size = 1 + Math.random() * 3;
                particles.push(p);
            }

            // Glow particles
            if (wand.isWaving && Math.random() < 0.1) {
                const g = new GlowParticle(endX + (Math.random() - 0.5) * 10, endY + (Math.random() - 0.5) * 10, glowColor);
                glowParticles.push(g);
            }

            // Star sparkles
            if (wand.isWaving && Math.random() < 0.05) {
                const starColor = colorPalettes[colorMode].sparkle(Math.random());
                const s = new Particle(endX + (Math.random() - 0.5) * 20, endY + (Math.random() - 0.5) * 20, starColor);
                s.vx = (Math.random() - 0.5) * 3;
                s.vy = (Math.random() - 0.5) * 3 - 1;
                s.size = 2 + Math.random() * 4;
                s.shape = 'star';
                particles.push(s);
            }
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a0a1e');
            grad.addColorStop(0.3, '#060612');
            grad.addColorStop(0.6, '#030308');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Ambient glow
            const palette = colorPalettes[colorMode];
            const glowColor = palette.glow;
            const ambientGlow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.2);
            ambientGlow.addColorStop(0, glowColor + '08');
            ambientGlow.addColorStop(1, glowColor + '00');
            ctx.fillStyle = ambientGlow;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (let i = 0; i < 60; i++) {
                const x = (i * 37 + Math.sin(i * 0.3) * 20) % w;
                const y = (i * 23 + Math.cos(i * 0.5) * 15) % h;
                const size = 0.5 + Math.sin(i + time * 0.005) * 0.3;
                const brightness = 0.05 + Math.sin(i + time * 0.01) * 0.03;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${brightness})`;
                ctx.fill();
            }
        }

        // ===== WAVE =====
        function wave() {
            if (wand.isWaving) return;
            wand.isWaving = true;
            wand.wavePhase = 0;
            wand.sparkleIntensity = 1;
            statusText.textContent = '🪄 Waving!';
            waveBtn.textContent = '🪄 Waving...';

            // Spawn initial sparkles
            const palette = colorPalettes[colorMode];
            for (let i = 0; i < 20; i++) {
                const p = new Particle(
                    wand.tipX + (Math.random() - 0.5) * 30,
                    wand.tipY + (Math.random() - 0.5) * 30,
                    palette.sparkle(Math.random())
                );
                p.vx = (Math.random() - 0.5) * 4;
                p.vy = (Math.random() - 0.5) * 4 - 2;
                p.size = 1 + Math.random() * 4;
                particles.push(p);
            }

            setTimeout(() => {
                wand.isWaving = false;
                waveBtn.textContent = '🪄 Wave';
                statusText.textContent = '✨ Ready to wave';
                wand.sparkleIntensity = 0;
            }, 2000);
        }

        // ===== RESET =====
        function resetWand() {
            wand.isWaving = false;
            wand.wavePhase = 0;
            wand.sparkleIntensity = 0;
            wand.glow = 0;
            wand.trail = [];
            particles = [];
            glowParticles = [];
            waveBtn.textContent = '🪄 Wave';
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = '✨ Ready to wave';
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2 + 20;
            time += 0.01;

            // Wand movement
            if (wand.isWaving) {
                wand.wavePhase += 0.05;
                wand.targetAngle = Math.sin(wand.wavePhase * 2) * 0.8 + 0.5;
                wand.glow = 0.5 + 0.5 * Math.sin(wand.wavePhase * 1.5);
            } else {
                wand.targetAngle = 0.2 + Math.sin(time * 0.3) * 0.05;
                wand.glow *= 0.98;
            }

            // Smooth angle
            wand.angle += (wand.targetAngle - wand.angle) * 0.1;

            // Update wand position
            wand.x = cx - 20;
            wand.y = cy + 20;

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Update glow particles
            for (let i = glowParticles.length - 1; i >= 0; i--) {
                const g = glowParticles[i];
                g.update();
                if (g.isDead()) {
                    glowParticles.splice(i, 1);
                }
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw glow particles
            for (const g of glowParticles) {
                g.draw(ctx);
            }

            // Draw wand
            drawWand(ctx, wand.x, wand.y, wand.angle, wand.length);

            // Draw particles
            for (const p of particles) {
                p.draw(ctx);
            }

            // Update status
            if (frameCount % 30 === 0) {
                const state = wand.isWaving ? '🪄 Waving!' : '✨ Ready';
                statusText.textContent = `${state} • ${colorPalettes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Wave
        waveBtn.addEventListener('click', wave);

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = '✨ Ready to wave';
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetWand);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w' || e.key === 'W') {
                waveBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                waveBtn.click();
            }
        });

        // ===== CANVAS CLICK =====
        canvas.addEventListener('click', wave);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            wave();
        }, { passive: false });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ===== INIT =====
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = '✨ Ready to wave';
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('✨ Magic Wand Sparkle loaded!');
        console.log('💡 W - Wave');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Wave');
        console.log('💡 Click canvas - Wave');
    </script>
</body>
</html>
