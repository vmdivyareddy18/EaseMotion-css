<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform Style 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Transform Style 3D</h1>
  <div class="card-row">
    <div class="flip-card">
      <div class="flip-inner">
        <div class="flip-front">
          <span class="flip-icon">F</span>
          <p>Front</p>
        </div>
        <div class="flip-back">
          <span class="flip-icon">B</span>
          <p>Back</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
