<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-ingredient-checklist-fill</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ingredient Checklist</h1>
    <p class="subtitle">
        Animated ingredient checklist with check fill effect
    </p>

    <div class="recipe-card">

        <h2>Pasta Recipe</h2>

        <div class="ingredient checked">
            <div class="checkbox">
                <span>✓</span>
            </div>
            <p>Pasta</p>
        </div>

        <div class="ingredient checked">
            <div class="checkbox">
                <span>✓</span>
            </div>
            <p>Tomato Sauce</p>
        </div>

        <div class="ingredient">
            <div class="checkbox"></div>
            <p>Cheese</p>
        </div>

        <div class="ingredient">
            <div class="checkbox"></div>
            <p>Olive Oil</p>
        </div>

        <div class="ingredient">
            <div class="checkbox"></div>
            <p>Garlic</p>
        </div>

    </div>

    <div class="shopping-grid">

        <div class="shopping-card">
            <h3>Breakfast</h3>
            <div class="mini-check checked-mini">✓ Eggs</div>
            <div class="mini-check checked-mini">✓ Milk</div>
            <div class="mini-check">Bread</div>
        </div>

        <div class="shopping-card">
            <h3>Dinner</h3>
            <div class="mini-check checked-mini">✓ Rice</div>
            <div class="mini-check">Vegetables</div>
            <div class="mini-check">Beans</div>
        </div>

    </div>

</div>

</body>
</html>
