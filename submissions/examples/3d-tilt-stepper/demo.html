<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS - 3D Tilt Stepper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <h1>3D Tilt Stepper</h1>
    <p class="subtitle">
      A responsive stepper component with a smooth 3D tilt hover effect.
    </p>

    <div class="stepper" aria-label="Checkout Progress">

      <div class="step completed" tabindex="0">
        <div class="step-circle">✓</div>
        <div class="step-content">
          <h3>Login</h3>
          <p>Account verified successfully.</p>
        </div>
      </div>

      <div class="connector"></div>

      <div class="step active" tabindex="0" aria-current="step">
        <div class="step-circle">2</div>
        <div class="step-content">
          <h3>Select Music</h3>
          <p>Choose your favorite playlist.</p>
        </div>
      </div>

      <div class="connector"></div>

      <div class="step" tabindex="0">
        <div class="step-circle">3</div>
        <div class="step-content">
          <h3>Confirmation</h3>
          <p>Review and finish setup.</p>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
