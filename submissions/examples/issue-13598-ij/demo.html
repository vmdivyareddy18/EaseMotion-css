<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Context Menu - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-context-menu</h1>
    <p class="subtitle">Animated right-click context menu with stagger-in items</p>

    <div class="context-trigger" id="trigger">
      <div class="icon">🖱️</div>
      <div class="hint">Right-click or press <kbd>Ctrl</kbd> + <kbd>Space</kbd> to open menu</div>
    </div>

    <div class="context-menu" id="contextMenu">
      <div class="menu-item">
        <span class="item-icon">📋</span>
        <span class="item-label">Copy</span>
        <span class="shortcut">Ctrl+C</span>
      </div>
      <div class="menu-item">
        <span class="item-icon">📄</span>
        <span class="item-label">Paste</span>
        <span class="shortcut">Ctrl+V</span>
      </div>
      <div class="menu-item">
        <span class="item-icon">✂️</span>
        <span class="item-label">Cut</span>
        <span class="shortcut">Ctrl+X</span>
      </div>
      <div class="menu-divider"></div>
      <div class="menu-item">
        <span class="item-icon">🔍</span>
        <span class="item-label">Inspect</span>
        <span class="shortcut">Ctrl+Shift+I</span>
      </div>
      <div class="menu-item">
        <span class="item-icon">❓</span>
        <span class="item-label">Help</span>
        <span class="shortcut">F1</span>
      </div>
    </div>
  </div>

  <script>
    const trigger = document.getElementById('trigger');
    const menu = document.getElementById('contextMenu');

    function openMenu(x, y) {
      const rect = menu.getBoundingClientRect();
      let posX = x;
      let posY = y;
      if (posX + rect.width > window.innerWidth) {
        posX = window.innerWidth - rect.width - 10;
      }
      if (posY + rect.height > window.innerHeight) {
        posY = window.innerHeight - rect.height - 10;
      }
      menu.style.left = posX + 'px';
      menu.style.top = posY + 'px';
      menu.classList.add('active');
    }

    function closeMenu() {
      menu.classList.remove('active');
    }

    trigger.addEventListener('contextmenu', function(e) {
      e.preventDefault();
      openMenu(e.clientX, e.clientY);
    });

    document.addEventListener('click', function(e) {
      if (!menu.contains(e.target) && e.target !== trigger) {
        closeMenu();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeMenu();
      }
      if (e.ctrlKey && e.code === 'Space') {
        e.preventDefault();
        if (!menu.classList.contains('active')) {
          const rect = trigger.getBoundingClientRect();
          openMenu(rect.left + rect.width / 2, rect.top + rect.height / 2);
        }
      }
    });

    menu.querySelectorAll('.menu-item').forEach(function(item) {
      item.addEventListener('click', closeMenu);
    });
  </script>
</body>
</html>
