<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Progress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Download Progress Animation</h2>

    <div class="download-wrapper">

        <div class="download-icon" style="--ease-download-progress:75%;">

            <div class="fill"></div>

            <span class="arrow">⬇</span>

        </div>

        <p>75% Downloaded</p>

    </div>

</div>

</body>
</html>
