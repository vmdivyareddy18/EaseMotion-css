<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Perspective Tilt Accordion - Dashboard Analytics</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="dashboard-header">
            <span class="panel-status">ANALYTICS_ENGINE // NODE_33152</span>
            <h1>REAL-TIME SYSTEM PERFORMANCE</h1>
        </header>

        <div class="accordion-group">
            <!-- Analytics Node 1 -->
            <div class="accordion-item">
                <input type="radio" name="dash-menu" id="metric-1" checked>
                <label for="metric-1" class="accordion-label">
                    <span class="label-accent"></span>
                    <span class="metric-name">CPU_CORE_TRAFFIC</span>
                    <span class="metric-value">92.4%</span>
                </label>
                <div class="accordion-panel">
                    <div class="panel-container-3d">
                        <div class="grid-content">
                            <div class="data-block">
                                <strong>LOAD PROFILE:</strong> Critical distribution spike across core clusters 0 through 4.
                            </div>
                            <div class="data-block">
                                <strong>THREAD LATENCY:</strong> 1.2ms optimized.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Analytics Node 2 -->
            <div class="accordion-item">
                <input type="radio" name="dash-menu" id="metric-2">
                <label for="metric-2" class="accordion-label">
                    <span class="label-accent"></span>
                    <span class="metric-name">MEMORY_BANDWIDTH</span>
                    <span class="metric-value">61.8 GB/s</span>
                </label>
                <div class="accordion-panel">
                    <div class="panel-container-3d">
                        <div class="grid-content">
                            <div class="data-block">
                                <strong>CACHE RECOVERY:</strong> Cache hit allocation holding steady without latency faults.
                            </div>
                            <div class="data-block">
                                <strong>SWAP RATE:</strong> 0.00% active allocation.
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
