<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Modal Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="minimal-bg">

  <input type="checkbox" id="modal-toggle-sap" class="modal-checkbox-sap">

  <label for="modal-toggle-sap" class="trigger-btn-sap">Trigger Modal</label>

  <div class="modal-overlay-sap">
    <label for="modal-toggle-sap" class="modal-backdrop-close-sap"></label>
    
    <div class="modal-card-sap">
      
      <div class="glow-grid-sap">
        <div class="sector-sap s-1"></div>
        <div class="sector-sap s-2"></div>
        <div class="sector-sap s-3"></div>
        <div class="sector-sap s-4"></div>
        <div class="sector-sap s-5"></div>
        <div class="sector-sap s-6"></div>
        <div class="sector-sap s-7"></div>
        <div class="sector-sap s-8"></div>
        <div class="sector-sap s-9"></div>
        
        <div class="glow-effect-sap"></div>
      </div>

      <div class="modal-content-sap">
        <div class="header-row-sap">
          <div class="security-icon-sap">
            <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
          </div>
          <label for="modal-toggle-sap" class="close-x-sap">×</label>
        </div>

        <h2 class="modal-title-sap">Security Action Required</h2>
        <p class="modal-text-sap">This system contains sensitive records. Please review the security policy changes and confirm authorization to proceed with this deployment.</p>

        <div class="action-buttons-sap">
          <label for="modal-toggle-sap" class="btn-cancel-sap">Cancel</label>
          <button type="button" class="btn-authorize-sap">Authorize</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
