<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-typewriter Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 2rem;
      padding: 2rem;
    }

    .demo-section {
      text-align: center;
    }

    .demo-label {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    h1 { font-size: 2rem; margin: 0; }
    h2 { font-size: 1.5rem; margin: 0; }

    /* Custom speed example */
    .fast { --ease-typewriter-speed: 1.2s; }
    .slow { --ease-typewriter-speed: 5s; }
  </style>
</head>
<body>

  <!-- 1. Basic typewriter (no cursor) -->
  <div class="demo-section">
    <p class="demo-label">Basic — .typewriter</p>
    <h1 class="typewriter">Building backends has never been easier.</h1>
  </div>

  <!-- 2. With blinking cursor -->
  <div class="demo-section">
    <p class="demo-label">With cursor — .typewriter-cursor</p>
    <h1 class="typewriter-cursor">Hello, World!</h1>
  </div>

  <!-- 3. Fast speed via CSS variable -->
  <div class="demo-section">
    <p class="demo-label">Fast speed — --ease-typewriter-speed: 1.2s</p>
    <h2 class="typewriter-cursor fast">Fast typing feels snappy.</h2>
  </div>

  <!-- 4. Slow speed via CSS variable -->
  <div class="demo-section">
    <p class="demo-label">Slow speed — --ease-typewriter-speed: 5s</p>
    <h2 class="typewriter-cursor slow">Slow typing feels dramatic...</h2>
  </div>

</body>
</html>
