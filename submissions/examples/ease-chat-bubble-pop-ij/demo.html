<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Chat Bubble Pop Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🤖</div>
      <div class="chat-status">
        <h3>GSSoC Assistant</h3>
        <p>Online</p>
      </div>
    </div>

    <div class="chat-messages" id="chatWindow">
      <div class="chat-bubble received">
        Hey there! Welcome to GSSoC '26. 👋
      </div>
      <div class="chat-bubble sent">
        Hi! I'm excited to contribute to this project.
      </div>
      <div class="chat-bubble received" style="animation-delay: 0.6s;">
        Awesome! Check out this smooth scale-pop animation. Try sending a message below!
      </div>
    </div>

    <form class="chat-input-area" id="chatForm">
      <input type="text" id="messageInput" placeholder="Type a message..." required autocomplete="off">
      <button type="submit" aria-label="Send Message">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
        </svg>
      </button>
    </form>
  </div>

  <script>
    // Interactive trigger to dynamically inject chat bubbles and fire the animation
    const chatForm = document.getElementById('chatForm');
    const chatInput = document.getElementById('messageInput');
    const chatWindow = document.getElementById('chatWindow');

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = chatInput.value.trim();
      if (!text) return;

      // Create new sent bubble
      const bubble = document.createElement('div');
      bubble.classList.add('chat-bubble', 'sent', 'pop-trigger');
      bubble.textContent = text;

      chatWindow.appendChild(bubble);
      chatInput.value = '';

      // Auto-scroll to the latest bubbling message
      chatWindow.scrollTop = chatWindow.scrollHeight;
    });
  </script>
</body>
</html>
