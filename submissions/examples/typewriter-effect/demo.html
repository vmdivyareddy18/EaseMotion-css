<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typewriter Effect Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      max-width: 800px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Typewriter Effect</h2>
    
    <div class="demo-row">
      <!-- Default Typewriter -->
      <div class="demo-item">
        <p class="typewriter" data-text="Hello, EaseMotion CSS!">Hello, EaseMotion CSS!</p>
        <span class="demo-label">Default Speed</span>
      </div>
      
      <!-- Fast Typewriter -->
      <div class="demo-item">
        <p class="typewriter typewriter-fast" data-text="Building faster with animations.">Building faster with animations.</p>
        <span class="demo-label">Fast Speed</span>
      </div>
      
      <!-- Slow Typewriter -->
      <div class="demo-item">
        <p class="typewriter typewriter-slow" data-text="Crafting beautiful user experiences...">Crafting beautiful user experiences...</p>
        <span class="demo-label">Slow Speed</span>
      </div>
      
      <!-- No Cursor -->
      <div class="demo-item">
        <p class="typewriter typewriter-no-cursor" data-text="Clean and minimal.">Clean and minimal.</p>
        <span class="demo-label">No Cursor</span>
      </div>
      
      <!-- Looping Typewriter -->
      <div class="demo-item">
        <p class="typewriter typewriter-loop" data-text="Animation-first CSS for humans.">Animation-first CSS for humans.</p>
        <span class="demo-label">Looping</span>
      </div>
    </div>
  </div>
</body>
</html>
