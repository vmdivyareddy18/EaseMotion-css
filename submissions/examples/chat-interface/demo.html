<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Interface Component — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 2rem 1rem; margin: 0;">

  <div class="ease-chat-container">
    <div class="ease-chat-header">
      <div class="ease-chat-status"></div>
      <div>
        <div style="font-weight: 600; color: #1e293b; font-size: 0.95rem;">Dev Team Sync</div>
        <div style="font-size: 0.75rem; color: #64748b;">3 agents active</div>
      </div>
    </div>

    <div class="ease-chat-messages">
      <div class="ease-message-row incoming">
        <div class="ease-chat-bubble">
          Hey everyone! Did the patch notes for the alignment animation sequence drop yet?
        </div>
        <div class="ease-reaction-bar">
          <button class="ease-reaction-pill">👍 2</button>
        </div>
      </div>

      <div class="ease-message-row outgoing">
        <div class="ease-chat-bubble">
          Yes! Pushed them directly into main about ten minutes ago. Everything loaded properly.
        </div>
      </div>

      <div class="ease-typing-indicator">
        <div class="ease-typing-dot"></div>
        <div class="ease-typing-dot"></div>
        <div class="ease-typing-dot"></div>
      </div>
    </div>

    <div class="ease-chat-input-bar">
      <input type="text" class="ease-input-field" placeholder="Type a secure message..." />
      <button style="background: #3b82f6; color: white; border: none; padding: 0.5rem 1.25rem; border-radius: 9999px; font-weight: 600; cursor: pointer;">Send</button>
    </div>
  </div>

</body>
</html>
