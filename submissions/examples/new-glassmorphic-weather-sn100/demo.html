<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Glassmorphic Weather Forecast Card Widget</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-weather-card">
  <div class="temp">28°C</div>
  <div class="condition">Sunny Intervals</div>
  <div class="location">New Delhi, IN</div>
</div>
</body>
</html>
