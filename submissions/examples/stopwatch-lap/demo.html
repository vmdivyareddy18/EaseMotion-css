<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch with Lap Recording</title>

  <!-- EaseMotion CSS CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/dist/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="stopwatch-container ease-flex">
    <div class="ease-card stopwatch-card">
      <h1 class="stopwatch-title">Stopwatch</h1>
      
      <div id="display" class="display">
        00:00:00.000
      </div>

      <div class="ease-flex ease-gap controls">
        <button id="startBtn" class="ease-btn btn-start">Start</button>
        <button id="stopBtn" class="ease-btn btn-stop" disabled>Stop</button>
        <button id="lapBtn" class="ease-btn btn-lap" disabled>Lap</button>
        <button id="resetBtn" class="ease-btn btn-reset">Reset</button>
      </div>
    </div>

    <div class="ease-card lap-card">
      <div class="lap-header">
        <h2>Lap Times</h2>
        <span id="lapCount" class="badge">0 Laps</span>
      </div>
      <ul id="lapList"></ul>
    </div>
  </main>

  <script>
    const display = document.getElementById("display");
    const lapList = document.getElementById("lapList");
    const lapCountDisplay = document.getElementById("lapCount");

    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const resetBtn = document.getElementById("resetBtn");
    const lapBtn = document.getElementById("lapBtn");

    let startTime = 0;
    let elapsed = 0;
    let animationFrameId = null;
    let isRunning = false;

    let laps = [];
    let lastLapTime = 0;

    function formatTime(ms) {
      const hours = Math.floor(ms / 3600000);
      const minutes = Math.floor((ms % 3600000) / 60000);
      const seconds = Math.floor((ms % 60000) / 1000);
      const milliseconds = ms % 1000;

      return (
        String(hours).padStart(2, "0") + ":" +
        String(minutes).padStart(2, "0") + ":" +
        String(seconds).padStart(2, "0") + "." +
        String(milliseconds).padStart(3, "0")
      );
    }

    function updateDisplay() {
      const current = Date.now() - startTime + elapsed;
      display.textContent = formatTime(current);
      animationFrameId = requestAnimationFrame(updateDisplay);
    }

    function updateButtonStates() {
      startBtn.disabled = isRunning;
      stopBtn.disabled = !isRunning;
      lapBtn.disabled = !isRunning;
    }

    startBtn.addEventListener("click", () => {
      if (isRunning) return;
      
      isRunning = true;
      startTime = Date.now();
      animationFrameId = requestAnimationFrame(updateDisplay);
      updateButtonStates();
    });

    stopBtn.addEventListener("click", () => {
      if (!isRunning) return;
      
      isRunning = false;
      cancelAnimationFrame(animationFrameId);
      elapsed += Date.now() - startTime;
      updateButtonStates();
    });

    resetBtn.addEventListener("click", () => {
      isRunning = false;
      cancelAnimationFrame(animationFrameId);
      
      startTime = 0;
      elapsed = 0;
      laps = [];
      lastLapTime = 0;
      
      display.textContent = "00:00:00.000";
      lapList.innerHTML = "";
      lapCountDisplay.textContent = "0 Laps";
      updateButtonStates();
    });

    lapBtn.addEventListener("click", () => {
      if (!isRunning) return;

      const current = Date.now() - startTime + elapsed;
      const lapDelta = current - lastLapTime;
      
      lastLapTime = current;
      laps.push(current);

      const li = document.createElement("li");
      li.innerHTML = `
        <span class="lap-number">Lap ${laps.length}</span>
        <span class="lap-time">${formatTime(current)}</span>
        <span class="lap-delta">+${formatTime(lapDelta)}</span>
      `;

      lapList.prepend(li);
      lapCountDisplay.textContent = `${laps.length} Laps`;
    });
  </script>
</body>
</html>
