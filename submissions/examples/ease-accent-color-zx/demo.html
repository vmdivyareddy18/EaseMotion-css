<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accent Color Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Accent Color</h1>
    <p class="note">
      Sets the accent color for form controls like checkboxes, radios, and
      progress bars.
    </p>

    <div class="label">accent-blue</div>
    <div class="demo-form accent-blue">
      <label><input type="checkbox" checked /> Blue checkbox</label>
      <label><input type="radio" name="a" checked /> Blue radio</label>
      <input type="range" value="60" />
    </div>

    <div class="label">accent-green</div>
    <div class="demo-form accent-green">
      <label><input type="checkbox" checked /> Green checkbox</label>
      <label><input type="radio" name="b" checked /> Green radio</label>
      <input type="range" value="40" />
    </div>

    <div class="label">accent-red</div>
    <div class="demo-form accent-red">
      <label><input type="checkbox" checked /> Red checkbox</label>
      <label><input type="radio" name="c" checked /> Red radio</label>
      <input type="range" value="80" />
    </div>

    <div class="label">accent-purple</div>
    <div class="demo-form accent-purple">
      <label><input type="checkbox" checked /> Purple checkbox</label>
      <label><input type="radio" name="d" checked /> Purple radio</label>
      <input type="range" value="50" />
    </div>
  </body>
</html>
