<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Stepper Horizontal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-stepper-horizontal">

    <input type="radio" name="step" id="step1" checked>
    <input type="radio" name="step" id="step2">
    <input type="radio" name="step" id="step3">
    <input type="radio" name="step" id="step4">

    <div class="stepper">

        <div class="step">
            <label for="step1">
                <span class="circle">✓</span>
                <span class="text">Account</span>
            </label>
        </div>

        <div class="line"></div>

        <div class="step">
            <label for="step2">
                <span class="circle">✓</span>
                <span class="text">Profile</span>
            </label>
        </div>

        <div class="line"></div>

        <div class="step">
            <label for="step3">
                <span class="circle">✓</span>
                <span class="text">Payment</span>
            </label>
        </div>

        <div class="line"></div>

        <div class="step">
            <label for="step4">
                <span class="circle">✓</span>
                <span class="text">Finish</span>
            </label>
        </div>

    </div>

</div>

</body>
</html>
