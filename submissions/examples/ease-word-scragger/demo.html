<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Word Stagger Scroll</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <section class="hero">
        <h1>Scroll Down</h1>
        <p>Words will animate in one after another.</p>
    </section>

    <section class="stagger-section">
        <div class="text-container">
            <p class="stagger-text" id="staggerText">
                Great user experiences are built through thoughtful design,
                smooth interactions, meaningful animations, and engaging visual
                storytelling that guides users naturally through content.
            </p>
        </div>
    </section>

    <section class="footer">
        <h2>Animation Complete</h2>
    </section>

    <script>
        const paragraph = document.getElementById("staggerText");
        const text = paragraph.textContent.trim();

        const words = text.split(" ");

        paragraph.innerHTML = words
            .map((word, index) =>
                `<span class="word" style="transition-delay:${index * 60}ms">${word}</span>`
            )
            .join(" ");

        const observer = new IntersectionObserver(
            (entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        paragraph.classList.add("active");
                    }
                });
            },
            {
                threshold: 0.3
            }
        );

        observer.observe(paragraph);
    </script>

</body>

</html>
