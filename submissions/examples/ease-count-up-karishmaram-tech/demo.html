<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — CSS Pure Count-Up Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="metrics-container">
    <header class="metrics-header">
      <h1>Framework Impact Stats</h1>
      <p>Performance metrics driven entirely by native CSS counter property interpolation engines.</p>
    </header>

    <div class="stats-grid">
      
      <div class="stat-card">
        <div class="stat-number-wrapper">
          <span class="ease-count-up count-to-42"></span><span class="stat-suffix">+</span>
        </div>
        <p class="stat-label">Core Utilities Built</p>
      </div>

      <div class="stat-card">
        <div class="stat-number-wrapper">
          <span class="ease-count-up count-to-99"></span><span class="stat-suffix">k</span>
        </div>
        <p class="stat-label">Active Members</p>
      </div>

      <div class="stat-card">
        <div class="stat-number-wrapper">
          <span class="ease-count-up count-to-15"></span><span class="stat-suffix">ms</span>
        </div>
        <p class="stat-label">Average Server Response</p>
      </div>

    </div>
  </div>

</body>
</html>
