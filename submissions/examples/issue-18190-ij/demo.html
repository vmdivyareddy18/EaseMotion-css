<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Carousel – Issue 18190</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">3D Carousel</h1>
    <p class="subtitle">Rotating carousel with perspective and 3D transforms</p>
    <div class="carousel-wrapper">
      <div class="carousel" id="carousel">
        <div class="carousel-card" style="--i:0;">1</div>
        <div class="carousel-card" style="--i:1;">2</div>
        <div class="carousel-card" style="--i:2;">3</div>
        <div class="carousel-card" style="--i:3;">4</div>
        <div class="carousel-card" style="--i:4;">5</div>
        <div class="carousel-card" style="--i:5;">6</div>
      </div>
    </div>
    <div class="carousel-nav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous">&larr; Prev</button>
      <button class="nav-btn" id="nextBtn" aria-label="Next">Next &rarr;</button>
    </div>
  </div>
  <script>
    (function() {
      const carousel = document.getElementById('carousel');
      const prev = document.getElementById('prevBtn');
      const next = document.getElementById('nextBtn');
      let angle = 0;
      const step = 360 / 6;
      prev.addEventListener('click', function() { angle -= step; carousel.style.transform = 'rotateY(' + angle + 'deg)'; });
      next.addEventListener('click', function() { angle += step; carousel.style.transform = 'rotateY(' + angle + 'deg)'; });
    })();
  </script>
</body>
</html>
