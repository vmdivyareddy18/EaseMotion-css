<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Read Receipt — Double Check</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <div class="receipt-card">
    <h2 class="receipt-title">Read Receipt</h2>
    <div class="receipt-visual">
      <svg class="check-animation" viewBox="0 0 60 30" width="120" height="60">
        <polyline class="check check-1" points="6,16 14,24 26,8"
          fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        <polyline class="check check-2" points="30,16 38,24 50,8"
          fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <p class="receipt-status">Message read</p>
    <p class="receipt-time">Today at 2:34 PM</p>
    <button class="receipt-toggle" id="toggleBtn" aria-label="Toggle read status">
      Mark as Unread
    </button>
  </div>
</body>
</html>
