<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Edge Detection Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <h2>Hover the buttons to see tooltips adjust near edges</h2>
    <div class="row top">
      <button class="tooltip-trigger" data-align="start">Left Edge</button>
      <button class="tooltip-trigger" data-align="end">Right Edge</button>
    </div>
  </div>
</body>
</html>
