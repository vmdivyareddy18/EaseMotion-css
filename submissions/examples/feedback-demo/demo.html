<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feedback UI</title>

  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">

    <div class="header">
      <span class="tag">COMPONENT</span>
      <h1>Feedback</h1>
      <p>Share your thoughts, ideas, or issues. We improve based on your voice.</p>
    </div>

    <!-- TYPE SELECT -->
    <div class="type-row">
      <button class="type active">💬 General</button>
      <button class="type">💡 Suggestion</button>
      <button class="type">🐞 Bug Report</button>
    </div>

    <!-- CARD -->
    <div class="card">

      <h2>Send Feedback</h2>
      <p class="sub">Tell us what you think about the experience.</p>

      <!-- STARS -->
      <div class="rating">
        <p>Rate experience</p>
        <div class="stars">
          ★ ★ ★ ★ ★
        </div>
      </div>

      <!-- TEXTAREA -->
      <div class="field">
        <label>Your feedback</label>
        <textarea placeholder="Write your feedback here..."></textarea>
      </div>

      <!-- EMAIL -->
      <div class="field">
        <label>Email (optional)</label>
        <input type="email" placeholder="you@example.com"/>
      </div>

      <!-- BUTTON -->
      <button class="btn">Send Feedback ➜</button>

    </div>

  </div>

</body>
</html>
