<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savings Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Savings Tracker</h1>
            <p>Track your financial goals and milestones.</p>
        </header>

        <div class="goal-card">
            <h2>Vacation Fund</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p>₹75,000 of ₹1,00,000 saved</p>
        </div>

        <div class="stats">
            <div class="card">
                <h3>Monthly Savings</h3>
                <p>₹12,500</p>
            </div>

            <div class="card">
                <h3>Total Saved</h3>
                <p>₹75,000</p>
            </div>

            <div class="card">
                <h3>Goal Completion</h3>
                <p>75%</p>
            </div>
        </div>

        <section class="milestones">
            <h2>Milestones</h2>

            <div class="milestone achieved">
                ✅ First ₹25,000 Saved
            </div>

            <div class="milestone achieved">
                ✅ Halfway to Goal
            </div>

            <div class="milestone pending">
                🎯 Reach ₹1,00,000
            </div>
        </section>
    </div>
</body>
</html>
