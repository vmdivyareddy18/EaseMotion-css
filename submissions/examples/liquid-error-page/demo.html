<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Liquid Error Page — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #05050a;
      padding: 30px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div class="ease-error-page" role="alert">
    <div class="liquid-ripple liquid-ripple--1"></div>
    <div class="liquid-ripple liquid-ripple--2"></div>
    <div class="liquid-ripple liquid-ripple--3"></div>

    <div class="liquid-droplet droplet--1"></div>
    <div class="liquid-droplet droplet--2"></div>
    <div class="liquid-droplet droplet--3"></div>
    <div class="liquid-droplet droplet--4"></div>

    <div class="liquid-fill">
      <div class="liquid-body"></div>
      <svg class="wave-svg wave-back" viewBox="0 0 1200 40" preserveAspectRatio="none">
        <path d="M0,20 C150,50 350,-10 600,20 C850,50 1050,-10 1200,20
                 C1350,50 1550,-10 1800,20 C1950,50 2150,-10 2400,20
                 L2400,40 L0,40 Z" />
      </svg>
      <svg class="wave-svg wave-front" viewBox="0 0 1200 40" preserveAspectRatio="none">
        <path d="M0,25 C200,-5 400,55 600,25 C800,-5 1000,55 1200,25
                 C1400,-5 1600,55 1800,25 C2000,-5 2200,55 2400,25
                 L2400,40 L0,40 Z" />
      </svg>
    </div>

    <div class="error-content">
      <p class="error-code">404</p>
      <h1 class="error-title">Page not found</h1>
      <p class="error-description">
        The page you're looking for drifted off somewhere. Let's get you back on solid ground.
      </p>
      <a href="#" class="error-cta">← Back to Home</a>
    </div>
  </div>

</body>
</html>
