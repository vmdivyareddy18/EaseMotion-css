<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<div class="container">

<div class="badge">

Analytics Dashboard

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Interactive tooltip component
designed for dashboard
analytics interfaces featuring
smooth rotate-click transitions.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

View Insights

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="metric">

+42%

</div>

<h3>

Revenue Growth

</h3>

<p>

Track key performance
indicators through a
modern CSS-only tooltip
experience.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
