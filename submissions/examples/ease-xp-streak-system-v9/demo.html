<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Streak System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Daily Streak 🔥</h1>

  <div class="xp-card ease-slide-up">

    <h2>Day <span id="streak">1</span></h2>

    <!-- FIRE ICON -->
    <div id="fire" class="fire">🔥</div>

    <p>Keep gaining XP to increase your streak!</p>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>
</section>

<script>
let streak = 1;

function gainXP() {
  streak++;
  document.getElementById("streak").textContent = streak;

  const fire = document.getElementById("fire");

  // FIRE ANIMATION
  fire.classList.add("active");
  setTimeout(() => fire.classList.remove("active"), 800);

  // BIG COMBO EFFECT
  if (streak % 3 === 0) {
    fire.classList.add("combo");
    setTimeout(() => fire.classList.remove("combo"), 800);
  }
}
</script>

</body>
</html>
