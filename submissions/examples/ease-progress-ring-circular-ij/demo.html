<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Progress Ring</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Progress Ring</h1>
  <div class="prc-controls">
    <div class="prc-control-group">
      <label for="prcValue">Value: <span id="prcValueDisplay">75</span>%</label>
      <input type="range" id="prcValue" min="0" max="100" value="75" class="prc-slider">
    </div>
    <div class="prc-control-group">
      <label for="prcSpeed">Speed</label>
      <select id="prcSpeed" class="prc-select">
        <option value="0.3">Fast</option>
        <option value="0.8" selected>Normal</option>
        <option value="1.5">Slow</option>
      </select>
    </div>
    <div class="prc-control-group">
      <label for="prcSize">Size</label>
      <select id="prcSize" class="prc-select">
        <option value="120">Small</option>
        <option value="180" selected>Medium</option>
        <option value="240">Large</option>
      </select>
    </div>
  </div>
  <div class="prc-rings" id="prcRings">
    <div class="prc-ring-wrapper" id="prcRingWrapper">
      <svg class="prc-ring" viewBox="0 0 100 100">
        <circle class="prc-track" cx="50" cy="50" r="42" />
        <circle class="prc-fill" id="prcFill" cx="50" cy="50" r="42"
          stroke-dasharray="263.89" stroke-dashoffset="263.89" />
      </svg>
      <div class="prc-center">
        <span class="prc-percent" id="prcPercent">75%</span>
        <span class="prc-label">Complete</span>
      </div>
    </div>
  </div>
  <script>
    const valueInput = document.getElementById('prcValue');
    const valueDisplay = document.getElementById('prcValueDisplay');
    const percentDisplay = document.getElementById('prcPercent');
    const fill = document.getElementById('prcFill');
    const speedSelect = document.getElementById('prcSpeed');
    const sizeSelect = document.getElementById('prcSize');
    const wrapper = document.getElementById('prcRingWrapper');

    const circumference = 2 * Math.PI * 42;
    let targetValue = 75;
    let currentValue = 75;
    let animationId = null;

    function getColor(val) {
      if (val < 25) return '#ef4444';
      if (val < 50) return '#f59e0b';
      if (val < 75) return '#3b82f6';
      return '#10b981';
    }

    function setProgress(val) {
      const offset = circumference - (val / 100) * circumference;
      fill.style.strokeDashoffset = offset;
      fill.style.stroke = getColor(val);
    }

    function animateProgress(from, to, duration) {
      if (animationId) cancelAnimationFrame(animationId);
      const start = performance.now();

      function tick(now) {
        const t = Math.min((now - start) / (duration * 1000), 1);
        const eased = 1 - Math.pow(1 - t, 3);
        const val = from + (to - from) * eased;
        currentValue = val;
        const display = Math.round(val);
        valueDisplay.textContent = display;
        percentDisplay.textContent = display + '%';
        setProgress(val);
        if (t < 1) animationId = requestAnimationFrame(tick);
        else animationId = null;
      }
      animationId = requestAnimationFrame(tick);
    }

    valueInput.addEventListener('input', () => {
      targetValue = parseFloat(valueInput.value);
      const speed = parseFloat(speedSelect.value);
      animateProgress(currentValue, targetValue, speed);
    });

    speedSelect.addEventListener('change', () => {
      if (animationId) cancelAnimationFrame(animationId);
      animationId = null;
      currentValue = targetValue;
      setProgress(targetValue);
      const display = Math.round(targetValue);
      valueDisplay.textContent = display;
      percentDisplay.textContent = display + '%';
    });

    sizeSelect.addEventListener('change', () => {
      const size = parseInt(sizeSelect.value);
      wrapper.style.setProperty('--prc-size', size + 'px');
    });

    setProgress(targetValue);
  </script>
</body>
</html>
