<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Scale Performance Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="perf-shell">
    <section class="control-panel">
      <p class="eyebrow">Performance Guard</p>
      <h1>Graceful animation scaling</h1>
      <p class="intro">
        Render large element counts without animating every node at once. Above the safe budget,
        only a capped subset keeps motion while the rest degrade to static visual texture.
      </p>

      <div class="controls" aria-label="Element count controls">
        <button type="button" data-count="120">120 elements</button>
        <button type="button" data-count="600">600 elements</button>
        <button type="button" data-count="1200">1200 elements</button>
      </div>

      <div class="stats" aria-live="polite">
        <span><strong id="totalCount">1200</strong> total</span>
        <span><strong id="animatedCount">240</strong> animated</span>
        <span><strong id="fpsMeter">--</strong> fps</span>
        <span class="mode" id="modeLabel">degraded</span>
      </div>
    </section>

    <section class="motion-stage" aria-label="Animation performance preview">
      <div class="motion-grid is-degraded" id="motionGrid"></div>
    </section>
  </main>

  <script>
    const grid = document.getElementById('motionGrid');
    const totalCount = document.getElementById('totalCount');
    const animatedCount = document.getElementById('animatedCount');
    const modeLabel = document.getElementById('modeLabel');
    const fpsMeter = document.getElementById('fpsMeter');
    const controls = document.querySelectorAll('[data-count]');

    const animationBudget = 240;
    let frameCount = 0;
    let lastFpsTime = performance.now();

    function createTile(index, shouldAnimate) {
      const tile = document.createElement('span');
      tile.className = shouldAnimate ? 'tile is-animated' : 'tile is-static';
      tile.style.setProperty('--delay', `${index % 60 * -45}ms`);
      tile.style.setProperty('--distance', `${6 + index % 7}px`);
      tile.style.setProperty('--hue', `${210 + index % 80}`);
      return tile;
    }

    function renderGrid(count) {
      const fragment = document.createDocumentFragment();
      const activeAnimations = Math.min(count, animationBudget);

      grid.textContent = '';
      grid.classList.toggle('is-degraded', count > animationBudget);

      for (let i = 0; i < count; i++) {
        fragment.appendChild(createTile(i, i < activeAnimations));
      }

      grid.appendChild(fragment);
      totalCount.textContent = String(count);
      animatedCount.textContent = String(activeAnimations);
      modeLabel.textContent = count > animationBudget ? 'degraded' : 'full motion';
    }

    function measureFps(now) {
      frameCount++;

      if (now - lastFpsTime >= 1000) {
        fpsMeter.textContent = String(frameCount);
        frameCount = 0;
        lastFpsTime = now;
      }

      requestAnimationFrame(measureFps);
    }

    controls.forEach(button => {
      button.addEventListener('click', () => {
        renderGrid(Number(button.dataset.count));
      });
    });

    renderGrid(1200);
    requestAnimationFrame(measureFps);
  </script>
</body>
</html>
