<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Disaster Recovery Drill Status Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Disaster Recovery Drill</h2>

<div class="card success">
<div>
<h3>Recovery Drill</h3>
<p>Quarterly drill completed successfully</p>
</div>
<span>Passed</span>
</div>

<div class="card info">
<div>
<h3>Recovery Time</h3>
<p>RTO Achieved: 24 Minutes</p>
</div>
<span>Target Met</span>
</div>

<div class="card warning">
<div>
<h3>Recovery Point</h3>
<p>RPO Validation Pending</p>
</div>
<span>Review</span>
</div>

<div class="card danger">
<div>
<h3>Failback Status</h3>
<p>Primary environment awaiting verification</p>
</div>
<span>Action</span>
</div>

</section>

</body>
</html>
