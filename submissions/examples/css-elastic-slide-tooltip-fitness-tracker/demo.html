<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="fitness">

    <h1>Fitness Tracker</h1>
    <p>Track your daily health goals</p>

    <div class="tracker-items">

        <div class="tracker-card">

            <button class="fitness-btn" aria-describedby="tooltip-1">
                Steps
            </button>

            <div class="tooltip" id="tooltip-1" role="tooltip">
                View today's step count
            </div>

        </div>


        <div class="tracker-card">

            <button class="fitness-btn" aria-describedby="tooltip-2">
                Calories
            </button>

            <div class="tooltip" id="tooltip-2" role="tooltip">
                Check burned calories
            </div>

        </div>


        <div class="tracker-card">

            <button class="fitness-btn" aria-describedby="tooltip-3">
                Workout
            </button>

            <div class="tooltip" id="tooltip-3" role="tooltip">
                Manage workout sessions
            </div>

        </div>

    </div>

</section>

</body>
</html>
