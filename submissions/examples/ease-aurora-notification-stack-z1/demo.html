<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Aurora Notification Stack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="stack">

  <article class="toast primary">
    <span class="dot"></span>
    <div>
      <h3>Deployment Complete</h3>
      <small>Cloud cluster synchronized</small>
    </div>
  </article>

  <article class="toast">
    <span class="dot"></span>
    <div>
      <h3>New AI Model</h3>
      <small>Inference engine updated</small>
    </div>
  </article>

  <article class="toast">
    <span class="dot"></span>
    <div>
      <h3>Backup Finished</h3>
      <small>All services are healthy</small>
    </div>
  </article>

</main>

</body>
</html>
