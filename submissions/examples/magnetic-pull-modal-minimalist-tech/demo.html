<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Magnetic Pull Modal Demo — Minimalist Tech</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #fafafa; }
    .wrap { text-align: center; }
    h2 { color: #111; font-weight: 600; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>CSS Magnetic Pull Modal — Minimalist Tech</h2>
    <button class="ease-modal-trigger" id="openModalBtn">Open Modal</button>
  </div>

  <div class="ease-modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="ease-modal" tabindex="-1">
      <div class="ease-modal__header">
        <span class="ease-modal__title" id="modalTitle">Confirm Action</span>
        <button class="ease-modal__close" id="closeModalBtn" aria-label="Close modal">✕</button>
      </div>
      <div class="ease-modal__body">
        This modal enters with a subtle magnetic-pull motion — settling in with a light
        elastic snap, kept restrained to match a clean, minimal tech aesthetic.
        Fully keyboard accessible with focus trapping and Escape-to-close.
      </div>
      <div class="ease-modal__footer">
        <button class="ease-modal__btn ease-modal__btn--ghost" id="cancelBtn">Cancel</button>
        <button class="ease-modal__btn ease-modal__btn--primary" id="confirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const modal = overlay.querySelector('.ease-modal');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    function getFocusable() {
      return modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    }

    function openModal() {
      overlay.classList.add('ease-modal-overlay--open');
      closeBtn.focus();
      document.addEventListener('keydown', handleKeydown);
    }

    function closeModal() {
      overlay.classList.remove('ease-modal-overlay--open');
      openBtn.focus();
      document.removeEventListener('keydown', handleKeydown);
    }

    function handleKeydown(e) {
      if (e.key === 'Escape') {
        closeModal();
        return;
      }
      if (e.key === 'Tab') {
        const focusable = getFocusable();
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  </script>
</body>
</html>
