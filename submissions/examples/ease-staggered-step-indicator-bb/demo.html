<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Step Indicator Navigation</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="wizard-title">
    <h1>Checkout Progress</h1>
    <p>Smooth staggered step animations indicating current transaction states</p>
  </div>

  <div class="steps-container">
    <div class="progress-bar-fill"></div>
    
    <div class="step completed step-1">
      <div class="step-node">✓</div>
      <div class="step-label">Cart Details</div>
    </div>
    
    <div class="step completed step-2">
      <div class="step-node">✓</div>
      <div class="step-label">Shipping</div>
    </div>
    
    <div class="step active step-3">
      <div class="step-node">3</div>
      <div class="step-label">Payment</div>
    </div>
    
    <div class="step upcoming step-4">
      <div class="step-node">4</div>
      <div class="step-label">Confirmation</div>
    </div>
  </div>

</body>
</html>
