<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Magnetic Text Demo</title>
  <!-- Import Inter font for premium styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Link component styles -->
  <link rel="stylesheet" href="./style.css">

  <style>
    /* Demo Page Layout & Aesthetics */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top right, #1e1b4b, #0f0c1b, #03001e);
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
      overflow: hidden;
    }

    .demo-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 4rem 2rem;
      width: 90%;
      max-width: 600px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
      position: relative;
    }

    .demo-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      background: rgba(236, 72, 153, 0.15);
      border: 1px solid rgba(236, 72, 153, 0.3);
      color: #f472b6;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    /* Target Heading */
    .magnetic-text {
      font-size: 2.75rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 2rem 0;
      color: #f8fafc;
      line-height: 1.2;
    }

    .demo-description {
      font-size: 0.95rem;
      color: #94a3b8;
      max-width: 460px;
      margin: 0 auto 2.5rem auto;
      line-height: 1.6;
    }

    .instructions {
      font-size: 0.75rem;
      color: #64748b;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="demo-badge">Text Interaction</div>
    
    <!-- Magnetic Text target heading -->
    <h1 class="magnetic-text">Magnetic Letters</h1>
    
    <p class="demo-description">
      Move your cursor near the heading characters. Watch individual letters respond to the magnetic pull of your mouse.
    </p>
    
    <div class="instructions">
      Move your mouse close to the text above
    </div>
  </div>

  <!-- JavaScript logic to handle splitting and proximity tracking -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const magneticTexts = document.querySelectorAll('.magnetic-text');
      
      // 1. Wrap each character in a span
      magneticTexts.forEach((el) => {
        const text = el.textContent;
        el.innerHTML = '';
        
        [...text].forEach((char) => {
          const span = document.createElement('span');
          if (char === ' ') {
            span.innerHTML = '&nbsp;';
          } else {
            span.textContent = char;
          }
          span.classList.add('magnetic-char');
          el.appendChild(span);
        });
      });

      // 2. Track cursor proximity and calculate displacement vector
      const maxDistance = 120; // Proximity threshold in pixels
      const maxPull = 16;      // Maximum displacement pull in pixels

      document.addEventListener('mousemove', (e) => {
        const mouseX = e.clientX;
        const mouseY = e.clientY;

        const chars = document.querySelectorAll('.magnetic-char');
        chars.forEach((char) => {
          const rect = char.getBoundingClientRect();
          const charX = rect.left + rect.width / 2;
          const charY = rect.top + rect.height / 2;

          const dx = mouseX - charX;
          const dy = mouseY - charY;
          const distance = Math.hypot(dx, dy);

          // If within magnetic radius, calculate pull vectors
          if (distance < maxDistance && distance > 0) {
            const force = (maxDistance - distance) / maxDistance; // 0 (far) to 1 (near)
            const pullAmount = maxPull * force;
            const pullX = (dx / distance) * pullAmount;
            const pullY = (dy / distance) * pullAmount;

            char.style.setProperty('--ease-char-offset', `${pullX.toFixed(1)}px, ${pullY.toFixed(1)}px`);
          } else {
            // Reset position when cursor is out of range
            char.style.setProperty('--ease-char-offset', '0px, 0px');
          }
        });
      });
    });
  </script>
</body>
</html>
