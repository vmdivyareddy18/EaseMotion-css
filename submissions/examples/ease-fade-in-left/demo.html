<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Fade In Left - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-fade-left-el">Smooth Fade Left</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-fade-left-el'); void b.offsetWidth; b.classList.add('ease-fade-left-el');">Slide In</button>
    </div>
</body>
</html>
