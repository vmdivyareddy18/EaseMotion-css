<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Toggle Switch Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; display: flex; flex-direction: column; gap: 2rem; align-items: center; justify-content: center; height: 100vh; background: #0f172a; font-family: 'Inter', sans-serif; color: #fff;">
  
  <div style="text-align: center; margin-bottom: 1rem;">
    <h2 style="margin: 0; font-weight: 600; font-size: 1.5rem; letter-spacing: -0.02em;">Kinetic Toggle Switch</h2>
    <p style="margin: 0.5rem 0 0 0; color: #94a3b8; font-size: 0.875rem;">Experience physical, bouncy interactions</p>
  </div>

  <div style="background: rgba(255,255,255,0.03); padding: 3rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 2.5rem; width: 320px;">
    
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 3rem;">
      <span style="font-weight: 500; color: #e2e8f0; font-size: 0.95rem;">Notifications</span>
      <label class="ease-kinetic-toggle">
        <input type="checkbox" class="ease-kinetic-toggle-input">
        <div class="ease-kinetic-toggle-track">
          <div class="ease-kinetic-toggle-thumb">
            <svg class="ease-kinetic-icon ease-kinetic-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
            <svg class="ease-kinetic-icon ease-kinetic-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </div>
        </div>
      </label>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; gap: 3rem;">
      <span style="font-weight: 500; color: #e2e8f0; font-size: 0.95rem;">Dark Mode</span>
      <label class="ease-kinetic-toggle">
        <input type="checkbox" class="ease-kinetic-toggle-input" checked>
        <div class="ease-kinetic-toggle-track ease-kinetic-track-purple">
          <div class="ease-kinetic-toggle-thumb">
             <svg class="ease-kinetic-icon ease-kinetic-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
             <svg class="ease-kinetic-icon ease-kinetic-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          </div>
        </div>
      </label>
    </div>

    <div style="display: flex; align-items: center; justify-content: space-between; gap: 3rem;">
      <span style="font-weight: 500; color: #e2e8f0; font-size: 0.95rem;">Auto-Update</span>
      <label class="ease-kinetic-toggle">
        <input type="checkbox" class="ease-kinetic-toggle-input">
        <div class="ease-kinetic-toggle-track ease-kinetic-track-rose">
          <div class="ease-kinetic-toggle-thumb">
            <svg class="ease-kinetic-icon ease-kinetic-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12l5.25 5 2.625-3M8 12l5.25 5L22 7"/></svg>
            <svg class="ease-kinetic-icon ease-kinetic-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </div>
        </div>
      </label>
    </div>

  </div>

</body>
</html>
