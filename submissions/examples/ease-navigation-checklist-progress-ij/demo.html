<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Navigation Checklist Progress</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='checklist-bg')r.style.setProperty('--checklist-bg',t.value);if(t.name==='item-color')r.style.setProperty('--item-color',t.value);if(t.name==='active-color')r.style.setProperty('--active-color',t.value);if(t.name==='progress-duration')r.style.setProperty('--progress-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const items=document.querySelectorAll('.check-item');items.forEach((item,i)=>item.addEventListener('click',()=>{items.forEach(x=>x.classList.remove('active','completed'));for(let j=0;j<=i;j++){items[j].classList.add(j<i?'completed':'active')}}));items[0].classList.add('active')})</script>
<div class="container"><p class="title">Navigation Checklist Progress</p>
<div class="checklist"><div class="check-item"><span class="check-num">1</span><span class="check-label">Plan</span></div><div class="check-item"><span class="check-num">2</span><span class="check-label">Design</span></div><div class="check-item"><span class="check-num">3</span><span class="check-label">Build</span></div><div class="check-item"><span class="check-num">4</span><span class="check-label">Test</span></div><div class="check-item"><span class="check-num">5</span><span class="check-label">Ship</span></div></div>
<div class="controls"><label>BG: <input type="color" name="checklist-bg" value="#2d2d44"></label><label>Item: <input type="color" name="item-color" value="#888"></label><label>Active: <input type="color" name="active-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="progress-duration" min="0.1" max="0.6" step="0.05" value="0.25"></label></div></div></body></html>
