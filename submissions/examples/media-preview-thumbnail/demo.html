<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Preview Thumbnail</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="demo-header">
    <h1>EaseMotion CSS</h1>
    <p>Created by Shray Gupta</p>
</header>

<main class="media-gallery">

    <article class="media-card">
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=900&q=80" alt="Mountain documentary">
            <button class="play-button" aria-label="Play video">
                ▶
            </button>
            <span class="duration">08:24</span>
        </div>
        <h2>Mountain Documentary</h2>
    </article>

    <article class="media-card">
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1516321497487-e288fb19713f?auto=format&fit=crop&w=900&q=80" alt="Tech conference">
            <button class="play-button" aria-label="Play video">
                ▶
            </button>
            <span class="duration">12:10</span>
        </div>
        <h2>Future of Technology</h2>
    </article>

    <article class="media-card">
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80" alt="Ocean adventure">
            <button class="play-button" aria-label="Play video">
                ▶
            </button>
            <span class="duration">05:48</span>
        </div>
        <h2>Ocean Adventure</h2>
    </article>

    <article class="media-card">
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?auto=format&fit=crop&w=900&q=80" alt="City timelapse">
            <button class="play-button" aria-label="Play video">
                ▶
            </button>
            <span class="duration">15:33</span>
        </div>
        <h2>City Timelapse</h2>
    </article>

    <article class="media-card">
        <div class="thumbnail">
            <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=900&q=80" alt="Forest journey">
            <button class="play-button" aria-label="Play video">
                ▶
            </button>
            <span class="duration">03:56</span>
        </div>
        <h2>Forest Journey</h2>
    </article>

</main>

</body>
</html>
