<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <input type="checkbox" id="modal-toggle">

    <label for="modal-toggle" class="open-btn">
        Launch Modal
    </label>

    <div class="overlay">

        <div class="modal" tabindex="0">

            <h2>Tada-Click Modal</h2>

            <p>
                A modern SaaS-inspired modal featuring a smooth CSS-only
                Tada-Click animation. No JavaScript required.
            </p>

            <div class="actions">
                <label for="modal-toggle" class="secondary-btn">
                    Close
                </label>

                <button class="primary-btn">
                    Get Started
                </button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
