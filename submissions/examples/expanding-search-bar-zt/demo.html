<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expanding Search Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="search-panel">
    <header class="search-header">
      <p class="eyebrow">Search</p>
      <h1>Animated expanding search bar</h1>
      <p class="search-copy">A responsive search input that expands smoothly on hover and focus, with light, dark, and neon theme variants.</p>
    </header>

    <section class="search-grid">
      <div class="search-card search-light">
        <label class="search-control" for="search-light">
          <span class="search-icon">🔍</span>
          <input id="search-light" type="search" placeholder="Search files, reports, users..." aria-label="Search in light theme">
        </label>
        <p class="hint">Light theme with soft glass background.</p>
      </div>

      <div class="search-card search-dark">
        <label class="search-control" for="search-dark">
          <span class="search-icon">🔎</span>
          <input id="search-dark" type="search" placeholder="Search analytics, widgets, data..." aria-label="Search in dark theme">
        </label>
        <p class="hint">Dark theme with rich dashboard contrast.</p>
      </div>

      <div class="search-card search-neon">
        <label class="search-control" for="search-neon">
          <span class="search-icon">🧭</span>
          <input id="search-neon" type="search" placeholder="Search trends, alerts, activity..." aria-label="Search in neon theme">
        </label>
        <p class="hint">Neon theme with vivid glow accent.</p>
      </div>
    </section>
  </main>
</body>
</html>
