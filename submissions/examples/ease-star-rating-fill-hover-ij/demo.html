<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Star Rating Fill Hover - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Star Rating Fill Hover</h1>
    <div class="srfh-container" data-rating="0">
      <span class="srfh-star" data-value="5">&#9733;</span>
      <span class="srfh-star" data-value="4">&#9733;</span>
      <span class="srfh-star" data-value="3">&#9733;</span>
      <span class="srfh-star" data-value="2">&#9733;</span>
      <span class="srfh-star" data-value="1">&#9733;</span>
    </div>
    <p class="srfh-label" id="srfhLabel">Click a star to rate</p>
  </div>
  <script>
    var container = document.querySelector('.srfh-container');
    var stars = container.querySelectorAll('.srfh-star');
    var label = document.getElementById('srfhLabel');

    stars.forEach(function(star) {
      star.addEventListener('click', function() {
        var value = parseInt(this.getAttribute('data-value'));
        container.setAttribute('data-rating', value);
        label.textContent = 'Rating: ' + value + ' / 5';
      });
      star.addEventListener('mouseenter', function() {
        var value = parseInt(this.getAttribute('data-value'));
        label.textContent = 'Rating: ' + value + ' / 5';
      });
    });
    container.addEventListener('mouseleave', function() {
      var rating = parseInt(container.getAttribute('data-rating'));
      label.textContent = rating > 0 ? 'Rating: ' + rating + ' / 5' : 'Click a star to rate';
    });
  </script>
</body>
</html>
