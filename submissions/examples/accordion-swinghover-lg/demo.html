<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swing-Hover Accordion — Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body style="background:#f1f5f9; padding: 2rem;">

<div class="ease-accordion-swinghover-lg">

  <div class="ease-accordion-swinghover-lg__item">
    <button class="ease-accordion-swinghover-lg__header" aria-expanded="true" aria-controls="panel-1">
      Order Summary <span class="ease-accordion-swinghover-lg__price">$84.99</span>
      <svg class="ease-accordion-swinghover-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-swinghover-lg__panel" id="panel-1" data-open="true">
      <div class="ease-accordion-swinghover-lg__panel-inner">
        <div class="ease-accordion-swinghover-lg__content">
          2x Wireless Mouse — $29.99 each<br />
          1x USB-C Hub — $24.99<br />
          Shipping — Free
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-swinghover-lg__item">
    <button class="ease-accordion-swinghover-lg__header" aria-expanded="false" aria-controls="panel-2">
      Shipping Address
      <svg class="ease-accordion-swinghover-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-swinghover-lg__panel" id="panel-2" data-open="false">
      <div class="ease-accordion-swinghover-lg__panel-inner">
        <div class="ease-accordion-swinghover-lg__content">
          221B Baker Street, London, NW1 6XE, United Kingdom
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-swinghover-lg__item">
    <button class="ease-accordion-swinghover-lg__header" aria-expanded="false" aria-controls="panel-3">
      Payment Method
      <svg class="ease-accordion-swinghover-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-swinghover-lg__panel" id="panel-3" data-open="false">
      <div class="ease-accordion-swinghover-lg__panel-inner">
        <div class="ease-accordion-swinghover-lg__content">
          Visa ending in 4242, expires 08/28
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.ease-accordion-swinghover-lg__header').forEach(header => {
    header.addEventListener('click', () => {
      const expanded = header.getAttribute('aria-expanded') === 'true';
      const panel = document.getElementById(header.getAttribute('aria-controls'));
      header.setAttribute('aria-expanded', String(!expanded));
      panel.setAttribute('data-open', String(!expanded));
    });

    header.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        header.click();
      }
    });
  });
</script>

</body>
</html>
