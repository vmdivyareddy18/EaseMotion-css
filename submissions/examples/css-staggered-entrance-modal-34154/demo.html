<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Staggered Entrance Checkout Modal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay">

        <div class="checkout-modal"
             role="dialog"
             aria-modal="true"
             aria-labelledby="checkout-title"
             tabindex="0">

            <h2 id="checkout-title">Checkout</h2>

            <p class="subtitle">
                Complete your purchase securely.
            </p>

            <div class="divider"></div>

            <section class="checkout-section">
                <h3>Shipping Address</h3>

                <p>
                    Palak Sharma<br>
                    21 MG Road<br>
                    Bengaluru, Karnataka
                </p>
            </section>

            <section class="checkout-section">
                <h3>Payment Method</h3>

                <p>
                    💳 Visa ending in 4821
                </p>
            </section>

            <section class="checkout-section">
                <h3>Order Summary</h3>

                <div class="summary-row">
                    <span>Items</span>
                    <span>₹1,399</span>
                </div>

                <div class="summary-row">
                    <span>Shipping</span>
                    <span>₹99</span>
                </div>

                <div class="summary-row total">
                    <span>Total</span>
                    <span>₹1,498</span>
                </div>
            </section>

            <button class="checkout-btn">
                Place Order
            </button>

        </div>

    </div>

</body>
</html>
