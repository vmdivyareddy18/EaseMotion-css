<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Intake Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Water Intake Tracker</h1>
            <p>Stay hydrated and achieve your daily goal.</p>
        </header>

        <section class="stats">
            <div class="card">
                <h3>Today's Intake</h3>
                <p>2.4L 💧</p>
            </div>

            <div class="card">
                <h3>Goal</h3>
                <p>3L 🎯</p>
            </div>

            <div class="card">
                <h3>Hydration Streak</h3>
                <p>12 Days 🔥</p>
            </div>
        </section>

        <section class="tracker">
            <h2>Daily Progress</h2>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

            <p>80% of daily goal completed</p>
        </section>

        <section class="achievements">
            <h2>Achievements</h2>

            <div class="badge">💧 Hydration Hero</div>
            <div class="badge">🔥 7 Day Streak</div>
            <div class="badge">🏆 Wellness Champion</div>
        </section>
    </div>
</body>
</html>
