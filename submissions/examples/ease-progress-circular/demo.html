<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Circular Progress Indicator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Circular Progress</h1>
      <p>A lightweight, SVG-based circular progress indicator with smooth animations.</p>
    </header>

    <main class="demo-grid">
      <!-- Standard Sizes -->
      <section class="demo-card">
        <h2>Sizes</h2>
        <div class="flex-row">
          <div class="ease-progress-circular ease-progress-sm" style="--ease-progress-value: 45;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">45%</span>
          </div>
          
          <div class="ease-progress-circular" style="--ease-progress-value: 75;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">75%</span>
          </div>

          <div class="ease-progress-circular ease-progress-lg" style="--ease-progress-value: 90;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">90%</span>
          </div>
        </div>
      </section>

      <!-- Theme Variants -->
      <section class="demo-card">
        <h2>Theme Variants</h2>
        <div class="flex-row">
          <div class="ease-progress-circular ease-progress-success" style="--ease-progress-value: 100;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">100%</span>
          </div>

          <div class="ease-progress-circular ease-progress-warning" style="--ease-progress-value: 65;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">65%</span>
          </div>

          <div class="ease-progress-circular ease-progress-danger" style="--ease-progress-value: 20;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text">20%</span>
          </div>
        </div>
      </section>

      <!-- Interactive Demo -->
      <section class="demo-card interactive-section">
        <h2>Interactive Demo</h2>
        <div class="interactive-container">
          <div class="ease-progress-circular ease-progress-lg" id="interactive-progress" style="--ease-progress-value: 50;">
            <svg viewBox="0 0 100 100">
              <circle class="ease-progress-bg" cx="50" cy="50" r="45"></circle>
              <circle class="ease-progress-value" cx="50" cy="50" r="45"></circle>
            </svg>
            <span class="ease-progress-text" id="interactive-text">50%</span>
          </div>
          
          <div class="controls">
            <label for="progress-slider">Adjust Progress:</label>
            <input type="range" id="progress-slider" min="0" max="100" value="50" />
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Interactive logic to update CSS variable and text dynamically
    const slider = document.getElementById('progress-slider');
    const progressComponent = document.getElementById('interactive-progress');
    const progressText = document.getElementById('interactive-text');

    slider.addEventListener('input', (e) => {
      const value = e.target.value;
      // Update CSS Variable
      progressComponent.style.setProperty('--ease-progress-value', value);
      // Update text inside the circle
      progressText.textContent = `${value}%`;
      
      // Optional: Change color dynamically based on threshold
      if (value < 30) {
        progressComponent.className = 'ease-progress-circular ease-progress-lg ease-progress-danger';
      } else if (value < 70) {
        progressComponent.className = 'ease-progress-circular ease-progress-lg ease-progress-warning';
      } else {
        progressComponent.className = 'ease-progress-circular ease-progress-lg ease-progress-success';
      }
    });
  </script>
</body>
</html>
