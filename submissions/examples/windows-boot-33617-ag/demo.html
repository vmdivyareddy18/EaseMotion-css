<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Windows Startup Animation — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of a pure CSS Windows boot screen, circular loading dots, and password lock screen.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="monitor-frame">
    <!-- Boot Screen Layer -->
    <div class="boot-screen">
      <div class="windows-logo-grid">
        <div class="tile tile-tl"></div>
        <div class="tile tile-tr"></div>
        <div class="tile tile-bl"></div>
        <div class="tile tile-br"></div>
      </div>

      <!-- Classic spinning dots loader -->
      <div class="dot-spinner">
        <div class="spinner-dot d-1"></div>
        <div class="spinner-dot d-2"></div>
        <div class="spinner-dot d-3"></div>
        <div class="spinner-dot d-4"></div>
        <div class="spinner-dot d-5"></div>
      </div>
    </div>

    <!-- Windows Login Lock Screen Layer (Fades In) -->
    <div class="login-screen">
      <div class="user-block">
        <div class="avatar">👤</div>
        <h2 class="username">Windows User</h2>
      </div>

      <div class="password-box">
        <input type="password" placeholder="PIN" disabled>
        <button class="arrow-btn">➔</button>
      </div>

      <div class="bottom-controls">
        <span>📶 Internet Connected</span>
        <span>♿ Accessibility</span>
      </div>
    </div>
  </div>

</body>
</html>
