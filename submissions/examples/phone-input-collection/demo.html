<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Phone Number Input — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-label">EaseMotion CSS — Phone Number Input with Country Flag</p>
  <p class="demo-hint">Click the flag to pick a country. Type a number to see the format flash.</p>

  <div class="ease-phone-wrapper" id="phoneWrapper">

    <!-- Flag / dial-code trigger -->
    <button
      class="ease-phone-flag-btn"
      id="flagBtn"
      aria-haspopup="listbox"
      aria-expanded="false"
      aria-controls="countryDropdown"
      aria-label="Select country code"
    >
      <span class="ease-phone-flag" id="selectedFlag">🇮🇳</span>
      <span class="ease-phone-code" id="selectedCode">+91</span>
      <span class="ease-phone-chevron" aria-hidden="true">▾</span>
    </button>

    <!-- Phone number input -->
    <input
      class="ease-phone-input"
      id="phoneInput"
      type="tel"
      placeholder="98765 43210"
      aria-label="Phone number"
      maxlength="20"
    />

    <!-- Country dropdown -->
    <ul
      class="ease-phone-country-dropdown"
      id="countryDropdown"
      role="listbox"
      aria-label="Countries"
      hidden
    ></ul>

  </div>

  <script>
    /* ── Country data ─────────────────────────────────────── */
    const COUNTRIES = [
      { flag:"🇮🇳", name:"India",          code:"+91",  fmt:"##### #####" },
      { flag:"🇺🇸", name:"United States",  code:"+1",   fmt:"(###) ###-####" },
      { flag:"🇬🇧", name:"United Kingdom", code:"+44",  fmt:"#### ### ####" },
      { flag:"🇦🇺", name:"Australia",      code:"+61",  fmt:"#### ### ###" },
      { flag:"🇨🇦", name:"Canada",         code:"+1",   fmt:"(###) ###-####" },
      { flag:"🇩🇪", name:"Germany",        code:"+49",  fmt:"#### ########" },
      { flag:"🇫🇷", name:"France",         code:"+33",  fmt:"## ## ## ## ##" },
      { flag:"🇯🇵", name:"Japan",          code:"+81",  fmt:"##-####-####" },
      { flag:"🇧🇷", name:"Brazil",         code:"+55",  fmt:"(##) #####-####" },
      { flag:"🇸🇬", name:"Singapore",      code:"+65",  fmt:"#### ####" },
      { flag:"🇦🇪", name:"UAE",            code:"+971", fmt:"## ### ####" },
      { flag:"🇿🇦", name:"South Africa",   code:"+27",  fmt:"## ### ####" },
      { flag:"🇳🇬", name:"Nigeria",        code:"+234", fmt:"### ### ####" },
      { flag:"🇰🇷", name:"South Korea",    code:"+82",  fmt:"##-####-####" },
      { flag:"🇮🇹", name:"Italy",          code:"+39",  fmt:"### ### ####" },
      { flag:"🇲🇽", name:"Mexico",         code:"+52",  fmt:"## #### ####" },
      { flag:"🇳🇿", name:"New Zealand",    code:"+64",  fmt:"## ### ####" },
      { flag:"🇵🇰", name:"Pakistan",       code:"+92",  fmt:"### #######" },
      { flag:"🇧🇩", name:"Bangladesh",     code:"+880", fmt:"####-######" },
      { flag:"🇳🇱", name:"Netherlands",    code:"+31",  fmt:"## ### ####" },
    ];

    const flagBtn     = document.getElementById('flagBtn');
    const phoneInput  = document.getElementById('phoneInput');
    const dropdown    = document.getElementById('countryDropdown');
    const selectedFlag= document.getElementById('selectedFlag');
    const selectedCode= document.getElementById('selectedCode');

    let activeCountry = COUNTRIES[0];
    let activeIdx     = -1;
    let filteredList  = [...COUNTRIES];
    let closeTimer    = null;

    /* ── Build dropdown items ─────────────────────────────── */
    function renderCountries(list) {
      dropdown.innerHTML = '';

      // Search box
      const search = document.createElement('input');
      search.className = 'ease-phone-search';
      search.placeholder = '🔍 Search country…';
      search.setAttribute('aria-label', 'Search countries');
      search.addEventListener('input', () => {
        const q = search.value.toLowerCase();
        filteredList = COUNTRIES.filter(c =>
          c.name.toLowerCase().includes(q) || c.code.includes(q)
        );
        renderItems(filteredList);
      });
      search.addEventListener('keydown', handleKeydown);
      dropdown.appendChild(search);

      renderItems(list);
      // Focus search after open
      setTimeout(() => search.focus(), 50);
    }

    function renderItems(list) {
      // Remove old items (keep search input)
      [...dropdown.querySelectorAll('.ease-phone-country-item')].forEach(el => el.remove());

      list.forEach((country, i) => {
        const li = document.createElement('li');
        li.className = 'ease-phone-country-item';
        if (country === activeCountry) li.classList.add('is-selected');
        li.setAttribute('role', 'option');
        li.setAttribute('aria-selected', country === activeCountry ? 'true' : 'false');
        li.innerHTML = `
          <span class="ease-phone-country-flag">${country.flag}</span>
          <span class="ease-phone-country-name">${country.name}</span>
          <span class="ease-phone-country-code">${country.code}</span>
        `;
        li.addEventListener('mousedown', e => {
          e.preventDefault();
          selectCountry(country);
        });
        li.addEventListener('mousemove', () => {
          activeIdx = i;
          highlightItem();
        });
        dropdown.appendChild(li);
      });
    }

    /* ── Highlight keyboard row ───────────────────────────── */
    function highlightItem() {
      const items = dropdown.querySelectorAll('.ease-phone-country-item');
      items.forEach((el, i) => el.classList.toggle('is-active', i === activeIdx));
    }

    /* ── Select country ───────────────────────────────────── */
    function selectCountry(country) {
      activeCountry = country;
      selectedFlag.textContent = country.flag;
      selectedCode.textContent = country.code;
      phoneInput.placeholder = country.fmt.replace(/#/g, '0');
      phoneInput.value = '';
      closeDropdown();
      phoneInput.focus();
    }

    /* ── Open / close ─────────────────────────────────────── */
    function openDropdown() {
      clearTimeout(closeTimer);
      filteredList = [...COUNTRIES];
      dropdown.classList.remove('is-closing');
      dropdown.removeAttribute('hidden');
      flagBtn.setAttribute('aria-expanded', 'true');
      activeIdx = -1;
      renderCountries(filteredList);
    }

    function closeDropdown() {
      if (dropdown.hasAttribute('hidden')) return;
      dropdown.classList.add('is-closing');
      flagBtn.setAttribute('aria-expanded', 'false');
      closeTimer = setTimeout(() => {
        dropdown.setAttribute('hidden', '');
        dropdown.classList.remove('is-closing');
      }, 200);
    }

    /* ── Keyboard nav ─────────────────────────────────────── */
    function handleKeydown(e) {
      const items = dropdown.querySelectorAll('.ease-phone-country-item');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeIdx = Math.min(activeIdx + 1, items.length - 1);
        highlightItem();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeIdx = Math.max(activeIdx - 1, 0);
        highlightItem();
      } else if (e.key === 'Enter' && activeIdx >= 0) {
        e.preventDefault();
        selectCountry(filteredList[activeIdx]);
      } else if (e.key === 'Escape') {
        closeDropdown();
        flagBtn.focus();
      }
    }

    flagBtn.addEventListener('click', () => {
      dropdown.hasAttribute('hidden') ? openDropdown() : closeDropdown();
    });

    flagBtn.addEventListener('keydown', handleKeydown);

    /* ── Close on outside click ───────────────────────────── */
    document.addEventListener('mousedown', e => {
      if (!e.target.closest('#phoneWrapper')) closeDropdown();
    });

    /* ── Format flash on input ────────────────────────────── */
    phoneInput.addEventListener('input', () => {
      // Basic digit-only enforcement
      phoneInput.value = phoneInput.value.replace(/[^\d\s\-\(\)\+]/g, '');

      // Trigger format flash
      phoneInput.classList.remove('ease-phone-format-flash');
      void phoneInput.offsetWidth; // reflow
      phoneInput.classList.add('ease-phone-format-flash');
      phoneInput.addEventListener('animationend', () => {
        phoneInput.classList.remove('ease-phone-format-flash');
      }, { once: true });
    });
  </script>

</body>
</html>
