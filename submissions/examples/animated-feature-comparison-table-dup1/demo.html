<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Feature Comparison Table</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Choose Your Plan</h1>

    <div class="compare-table">
        <table>
            <thead>
                <tr>
                    <th>Features</th>
                    <th>Free</th>
                    <th class="highlight">Pro</th>
                    <th>Enterprise</th>
                </tr>
            </thead>

            <tbody>

                <tr class="row">
                    <td>AI Story Generation</td>
                    <td><span class="check">✔</span></td>
                    <td class="highlight"><span class="check">✔</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

                <tr class="row">
                    <td>Unlimited Projects</td>
                    <td><span class="cross">✖</span></td>
                    <td class="highlight"><span class="check">✔</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

                <tr class="row">
                    <td>Priority Support</td>
                    <td><span class="cross">✖</span></td>
                    <td class="highlight"><span class="check">✔</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

                <tr class="row">
                    <td>Cloud Backup</td>
                    <td><span class="check">✔</span></td>
                    <td class="highlight"><span class="check">✔</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

                <tr class="row">
                    <td>Analytics Dashboard</td>
                    <td><span class="cross">✖</span></td>
                    <td class="highlight"><span class="check">✔</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

                <tr class="row">
                    <td>Custom Branding</td>
                    <td><span class="cross">✖</span></td>
                    <td class="highlight"><span class="cross">✖</span></td>
                    <td><span class="check">✔</span></td>
                </tr>

            </tbody>
        </table>
    </div>
</div>

<script>
const rows = document.querySelectorAll(".row");

const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add("show");
        }
    });
},{
    threshold:0.2
});

rows.forEach((row,index)=>{
    row.style.transitionDelay=`${index*0.12}s`;
    observer.observe(row);
});
</script>
</body>
</html>
