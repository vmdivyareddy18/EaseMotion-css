<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steps Timing Function</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>steps() Timing Function</h1>
    <p class="subtitle">Step-based animation for sprite sheets, typewriters, and countdowns.</p>

    <section class="demo-section">
      <h2>Typewriter Effect</h2>
      <p class="typewriter" data-text="Hello, CSS Steps!">Hello, CSS Steps!</p>
    </section>

    <section class="demo-section">
      <h2>Step Count Comparison</h2>
      <div class="steps-demo">
        <div class="step-row">
          <span class="step-label">4 steps</span>
          <div class="step-track"><div class="step-fill" style="--steps: 4;"></div></div>
        </div>
        <div class="step-row">
          <span class="step-label">8 steps</span>
          <div class="step-track"><div class="step-fill" style="--steps: 8;"></div></div>
        </div>
        <div class="step-row">
          <span class="step-label">12 steps</span>
          <div class="step-track"><div class="step-fill" style="--steps: 12;"></div></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Jump: start vs end vs both</h2>
      <div class="jump-demo">
        <div class="jump-row">
          <span class="jump-label">jump-start</span>
          <div class="jump-track"><div class="jump-fill" style="--jump: jump-start;"></div></div>
        </div>
        <div class="jump-row">
          <span class="jump-label">jump-end</span>
          <div class="jump-track"><div class="jump-fill" style="--jump: jump-end;"></div></div>
        </div>
        <div class="jump-row">
          <span class="jump-label">jump-both</span>
          <div class="jump-track"><div class="jump-fill" style="--jump: jump-both;"></div></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
