<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Toggle Switch</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #09090b; font-family: 'Courier New', Courier, monospace; display: flex; align-items: center; justify-content: center; color: white;">
  
  <div class="toggle-container ease-fade-in-up">
    <h2>SYSTEM OVERRIDE</h2>
    <label class="kinetic-toggle">
      <input type="checkbox" class="toggle-input">
      <div class="toggle-track">
        <div class="toggle-thumb ease-hover-pop"></div>
        <div class="glitch-effect"></div>
      </div>
      <span class="toggle-label" data-off="OFFLINE" data-on="ONLINE">OFFLINE</span>
    </label>
  </div>

</body>
</html>
