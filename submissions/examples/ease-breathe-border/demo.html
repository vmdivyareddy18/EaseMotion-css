<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Breath Border Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1 class="demo-title">Ease Breath Border</h1>

        <p class="demo-subtitle">
            A smooth border animation that gently expands and contracts,
            creating a breathing effect.
        </p>

        <div class="ease-breath-border">
            <h2>Default Speed</h2>
            <p>
                The border continuously breathes with a smooth animation.
            </p>
        </div>

        <div class="ease-breath-border ease-breath-border-slow">
            <h2>Slow Variant</h2>
            <p>
                Same effect with a slower breathing cycle.
            </p>
        </div>

    </div>

</body>
</html>
