<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="popover-wrapper">

    <button class="orbit-btn" aria-describedby="popover">
        Hover Me
    </button>

    <div class="popover" id="popover" role="tooltip">
        <h3>Cyberpunk Neon</h3>
        <p>Floating orbit animation powered entirely by CSS.</p>
    </div>

</div>

</body>
</html>
