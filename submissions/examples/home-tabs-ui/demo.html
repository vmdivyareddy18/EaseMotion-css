<!DOCTYPE html>
<html>
<head>
  <title>Home Tabs UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <button onclick="showTab('home')">Home</button>
  <button onclick="showTab('projects')">Projects</button>
  <button onclick="showTab('contact')">Contact</button>
</div>

<div id="home" class="content">Home Content</div>
<div id="projects" class="content" style="display:none;">Projects Content</div>
<div id="contact" class="content" style="display:none;">Contact Content</div>

<script>
function showTab(id) {
  let c = document.querySelectorAll(".content");
  c.forEach(x => x.style.display = "none");
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
