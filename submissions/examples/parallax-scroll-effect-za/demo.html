<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Scroll Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="parallax-wrapper">
    <div class="parallax-layer layer-back">
      <div class="orb"></div>
    </div>
    <div class="parallax-layer layer-mid">
      <div class="orb"></div>
    </div>
    <div class="parallax-layer layer-front">
      <section class="content-card">
        <h1>Parallax Depth</h1>
        <p>Scroll to see layers move at different speeds, creating a sense of 3D depth.</p>
        <div class="scroll-hint">&darr; SCROLL &darr;</div>
      </section>
    </div>
  </div>
  <div class="spacer"></div>
</body>
</html>
