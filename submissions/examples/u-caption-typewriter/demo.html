<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-caption-typewriter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="video-player">

    <div class="video-placeholder">
        <span>🎬 Video Preview</span>
    </div>

    <div class="caption-container">
        <p class="caption">
            Welcome to EaseMotion CSS animation examples.
        </p>
    </div>

</div>

<div class="caption-showcase">

    <div class="caption-card">
        <p class="caption short">
            Loading subtitles...
        </p>
    </div>

    <div class="caption-card">
        <p class="caption medium">
            This caption appears using a typewriter effect.
        </p>
    </div>

</div>

</body>
</html>
