<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Zoom Out Down - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Zooming Out...</div>
        <button onclick="document.querySelector('.box').classList.add('ease-zoom-out-down');">Exit Down</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-zoom-out-down');" style="border-color:#555;">Reset</button>
    </div>
</body>
</html>
