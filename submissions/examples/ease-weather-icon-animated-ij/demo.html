<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Weather Icons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wia-container">
    <h1>Animated Weather Icons</h1>
    <div class="wia-icon-wrap sun" id="weatherDisplay">
      <div class="wia-scene wia-sun">
        <div class="wia-sun-body"></div>
        <div class="wia-ray" style="transform: rotate(0deg)"></div>
        <div class="wia-ray" style="transform: rotate(45deg)"></div>
        <div class="wia-ray" style="transform: rotate(90deg)"></div>
        <div class="wia-ray" style="transform: rotate(135deg)"></div>
        <div class="wia-ray" style="transform: rotate(180deg)"></div>
        <div class="wia-ray" style="transform: rotate(225deg)"></div>
        <div class="wia-ray" style="transform: rotate(270deg)"></div>
        <div class="wia-ray" style="transform: rotate(315deg)"></div>
      </div>
      <div class="wia-scene wia-clouds-scene">
        <div class="wia-cloud"></div>
        <div class="wia-cloud wia-cloud-sm" style="top: 60px; left: 80px;"></div>
        <div class="wia-cloud wia-cloud-lg" style="top: 25px; left: -30px;"></div>
      </div>
      <div class="wia-scene wia-rain-scene">
        <div class="wia-cloud"></div>
        <div class="wia-rain-drop" style="left: 30px; animation-delay: 0s;"></div>
        <div class="wia-rain-drop" style="left: 75px; animation-delay: 0.2s;"></div>
        <div class="wia-rain-drop" style="left: 120px; animation-delay: 0.4s;"></div>
        <div class="wia-rain-drop" style="left: 165px; animation-delay: 0.1s;"></div>
        <div class="wia-rain-drop" style="left: 200px; animation-delay: 0.3s;"></div>
      </div>
      <div class="wia-scene wia-snow-scene">
        <div class="wia-cloud" style="top: 10px;"></div>
        <div class="wia-snowflake" style="left: 40px; animation-delay: 0s;"></div>
        <div class="wia-snowflake" style="left: 85px; animation-delay: 1s;"></div>
        <div class="wia-snowflake" style="left: 130px; animation-delay: 0.5s;"></div>
        <div class="wia-snowflake" style="left: 170px; animation-delay: 1.5s;"></div>
        <div class="wia-snowflake" style="left: 205px; animation-delay: 0.8s;"></div>
      </div>
      <div class="wia-scene wia-thunder-scene">
        <div class="wia-cloud wia-cloud-dark" style="top: 10px;"></div>
        <div class="wia-rain-drop wia-rain-drop-heavy" style="left: 50px; animation-delay: 0s;"></div>
        <div class="wia-rain-drop wia-rain-drop-heavy" style="left: 100px; animation-delay: 0.15s;"></div>
        <div class="wia-rain-drop wia-rain-drop-heavy" style="left: 150px; animation-delay: 0.3s;"></div>
        <div class="wia-rain-drop wia-rain-drop-heavy" style="left: 195px; animation-delay: 0.45s;"></div>
        <div class="wia-lightning"></div>
      </div>
      <div class="wia-scene wia-wind-scene">
        <div class="wia-wind-line" style="top: 40px; animation-delay: 0s;"></div>
        <div class="wia-wind-line" style="top: 70px; animation-delay: 0.3s; width: 120px;"></div>
        <div class="wia-wind-line" style="top: 100px; animation-delay: 0.6s; width: 160px;"></div>
        <div class="wia-wind-line" style="top: 55px; animation-delay: 0.15s; width: 80px;"></div>
      </div>
    </div>
    <div class="wia-temperature" id="tempDisplay">24&deg;C</div>
    <div class="wia-controls">
      <button class="wia-btn active" data-weather="sun">Sun</button>
      <button class="wia-btn" data-weather="clouds">Clouds</button>
      <button class="wia-btn" data-weather="rain">Rain</button>
      <button class="wia-btn" data-weather="snow">Snow</button>
      <button class="wia-btn" data-weather="thunder">Thunder</button>
      <button class="wia-btn" data-weather="wind">Wind</button>
    </div>
  </div>
  <script>
    var temps = { sun: 32, clouds: 18, rain: 12, snow: -2, thunder: 8, wind: 15 };
    var tempDisplay = document.getElementById('tempDisplay');
    var scene = document.getElementById('weatherDisplay');
    var btns = document.querySelectorAll('.wia-btn');
    var displayTemp = 24;
    var targetTemp = 24;

    function animateTemp(target) {
      var start = displayTemp;
      var diff = target - start;
      var dur = 600;
      var t0 = performance.now();

      function tick(now) {
        var p = Math.min((now - t0) / dur, 1);
        var e = 1 - Math.pow(1 - p, 3);
        displayTemp = start + diff * e;
        tempDisplay.textContent = Math.round(displayTemp) + '\u00B0C';
        if (p < 1) requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }

    for (var i = 0; i < btns.length; i++) {
      btns[i].addEventListener('click', function() {
        for (var j = 0; j < btns.length; j++) btns[j].classList.remove('active');
        this.classList.add('active');
        var weather = this.getAttribute('data-weather');
        scene.className = 'wia-icon-wrap ' + weather;
        targetTemp = temps[weather];
        animateTemp(targetTemp);
      });
    }
  </script>
</body>
</html>
