<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Announcement Bar · Ease Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ab-bar" id="announcementBar">
    <div class="ab-slider" id="announcementSlider">
      <div class="ab-slide active" data-cta="Shop Now →" data-cta-url="#">
        <span class="ab-text">🎉 Summer Sale — up to 50% off sitewide!</span>
      </div>
      <div class="ab-slide" data-cta="Learn More →" data-cta-url="#">
        <span class="ab-text">🚀 New feature: dark mode is here.</span>
      </div>
      <div class="ab-slide" data-cta="Get Started →" data-cta-url="#">
        <span class="ab-text">📣 Free shipping on orders over $50.</span>
      </div>
    </div>

    <div class="ab-controls">
      <button class="ab-cta" id="ctaBtn">Shop Now →</button>
      <button class="ab-dismiss" id="dismissBtn" aria-label="Dismiss announcement">✕</button>
    </div>

    <div class="ab-progress" id="progressBar">
      <div class="ab-progress-fill" id="progressFill"></div>
    </div>
  </div>

  <main class="ab-main">
    <h1>Announcement Bar</h1>
    <p>A slide-in announcement bar with cycling messages, CTA, and auto-dismiss progress.</p>
    <button class="ab-reset" id="resetBtn">Show Bar Again</button>
  </main>

  <script>
    const bar = document.getElementById('announcementBar');
    const slider = document.getElementById('announcementSlider');
    const slides = document.querySelectorAll('.ab-slide');
    const dismissBtn = document.getElementById('dismissBtn');
    const ctaBtn = document.getElementById('ctaBtn');
    const progressFill = document.getElementById('progressFill');
    const resetBtn = document.getElementById('resetBtn');

    let current = 0;
    let progress = 0;
    let paused = false;
    const CYCLE_MS = 5000;
    let interval;

    function showSlide(index) {
      slides.forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });
      const slide = slides[index];
      ctaBtn.textContent = slide.dataset.cta || 'Learn More';
    }

    function resetProgress() {
      progress = 0;
      progressFill.style.width = '0%';
    }

    function startCycle() {
      if (interval) clearInterval(interval);
      resetProgress();
      const start = Date.now();
      interval = setInterval(() => {
        if (paused) return;
        const elapsed = Date.now() - start;
        progress = Math.min(100, (elapsed % (CYCLE_MS * slides.length)) / CYCLE_MS * 100);
        progressFill.style.width = progress + '%';
        const slideIndex = Math.floor(elapsed / CYCLE_MS) % slides.length;
        if (slideIndex !== current) {
          current = slideIndex;
          showSlide(current);
          resetProgress();
        }
      }, 50);
    }

    dismissBtn.addEventListener('click', () => {
      bar.classList.add('ab-dismissed');
      paused = true;
    });

    resetBtn.addEventListener('click', () => {
      bar.classList.remove('ab-dismissed');
      paused = false;
      current = 0;
      showSlide(0);
      startCycle();
    });

    showSlide(0);
    startCycle();
  </script>
</body>
</html>
