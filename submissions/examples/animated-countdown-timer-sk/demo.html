<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer – Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #020617;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }
    .btn {
      margin-top: 32px;
      padding: 10px 24px;
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #334155;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #334155; }
    .btn:active { background: #475569; }
  </style>
</head>
<body>
  <h1>Countdown Timer</h1>
  <p class="sub">Flip animation &amp; glowing active unit</p>

  <div class="countdown">

    <!-- Days -->
    <div class="countdown__unit countdown__unit--active">
      <div class="countdown__card countdown__card--flip">
        <span class="countdown__value">14</span>
      </div>
      <span class="countdown__label">Days</span>
    </div>

    <span class="countdown__separator">:</span>

    <!-- Hours -->
    <div class="countdown__unit">
      <div class="countdown__card">
        <span class="countdown__value">08</span>
      </div>
      <span class="countdown__label">Hours</span>
    </div>

    <span class="countdown__separator">:</span>

    <!-- Minutes -->
    <div class="countdown__unit">
      <div class="countdown__card">
        <span class="countdown__value">32</span>
      </div>
      <span class="countdown__label">Minutes</span>
    </div>

    <span class="countdown__separator">:</span>

    <!-- Seconds -->
    <div class="countdown__unit">
      <div class="countdown__card">
        <span class="countdown__value">59</span>
      </div>
      <span class="countdown__label">Seconds</span>
    </div>

  </div>

  <button class="btn" onclick="triggerFlip()">Trigger Flip Animation</button>

  <script>
    function triggerFlip() {
      const cards = document.querySelectorAll('.countdown__card');
      const values = document.querySelectorAll('.countdown__value');
      cards.forEach((card, i) => {
        card.classList.remove('countdown__card--flip');
        void card.offsetWidth; // reflow
        card.classList.add('countdown__card--flip');
        const current = parseInt(values[i].textContent, 10);
        values[i].textContent = String(current + 1).padStart(2, '0');
      });
    }
  </script>
</body>
</html>
