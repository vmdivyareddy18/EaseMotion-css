<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper Connector Fill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="stepper-card" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion workflow example</p>
    <h1 id="demo-title">Stepper connector fill</h1>

    <ol class="stepper" aria-label="Checkout progress">
      <li class="step done">
        <span>1</span>
        <strong>Cart</strong>
      </li>
      <li class="step active">
        <span>2</span>
        <strong>Shipping</strong>
      </li>
      <li class="step">
        <span>3</span>
        <strong>Payment</strong>
      </li>
    </ol>
  </main>
</body>
</html>
