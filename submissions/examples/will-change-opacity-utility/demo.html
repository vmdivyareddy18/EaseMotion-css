<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Will-Change Opacity Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 60px 20px; margin: 0;">

  <div class="acceleration-fade-canvas">
    <h4 style="margin-top: 0; color: #0f172a; margin-bottom: 0.5rem;">GPU Alpha Layer Isolation</h4>
    <p style="color: #64748b; font-size: 0.9rem; line-height: 1.5; margin-bottom: 1.5rem;">
      Hover over the element below. By declaring <code>will-change: opacity</code>, the browser pre-allocates an isolated graphics layer for handling transparency mutations smoothly.
    </p>

    <div class="hardware-fade-card ease-will-change-opacity">
      Hover To Fade Layer
    </div>
  </div>

</body>
</html>
