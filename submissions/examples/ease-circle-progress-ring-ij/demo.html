<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Progress Ring - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Progress Ring</h1>
    <p class="desc">Circular progress with animated ring fill</p>
    <div class="pr-card">
      <div class="pr-ring" id="prRing" style="--pr-start: 339.292;">
        <svg viewBox="0 0 120 120" class="pr-svg">
          <circle cx="60" cy="60" r="54" class="pr-bg" />
          <circle cx="60" cy="60" r="54" class="pr-fill" id="prFill" style="stroke-dashoffset: calc(339.292 * (1 - 0.65));" />
        </svg>
        <span class="pr-label" id="prLabel">65%</span>
      </div>
      <input type="range" class="pr-slider" id="prSlider" min="0" max="100" value="65" />
      <p class="pr-hint">Drag to change progress</p>
    </div>
  </div>
  <script>
    const fill = document.getElementById('prFill');
    const slider = document.getElementById('prSlider');
    const label = document.getElementById('prLabel');
    const circumference = 339.292;

    slider.addEventListener('input', () => {
      const val = slider.value / 100;
      fill.style.strokeDashoffset = circumference * (1 - val);
      fill.style.animation = 'none';
      void fill.offsetHeight;
      fill.style.animation = '';
      label.textContent = Math.round(val * 100) + '%';
    });
  </script>
</body>
</html>
