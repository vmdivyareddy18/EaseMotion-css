<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oil Spill Rainbow</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🛢️ Oil Spill Rainbow</h1>
        <p class="subtitle">Iridescent oil spreading with rainbow colors</p>

        <div class="oil-wrapper">
            <canvas id="oilCanvas"></canvas>

            <div class="controls">
                <button id="spillBtn">🛢️ Spill</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🛢️ Ready to spill</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('oilCanvas');
        const ctx = canvas.getContext('2d');
        const spillBtn = document.getElementById('spillBtn');
        const speedBtn = document.getElementById('speedBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let oilParticles = [];
        let ripples = [];
        let rainbowColors = [];
        let speed = 0.02;
        let speedLevel = 1;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let isSpilling = false;
        let spillProgress = 0;
        let mouseX = -1000;
        let mouseY = -1000;
        let isHovering = false;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== OIL PARTICLE CLASS =====
        class OilParticle {
            constructor(x, y) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.radius = 2 + Math.random() * 5;
                this.targetRadius = this.radius * (1 + Math.random() * 2);
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.phase = Math.random() * Math.PI * 2;
                this.wobble = 0.1 + Math.random() * 0.3;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
                this.alpha = 0.3 + Math.random() * 0.5;
                this.colorOffset = Math.random();
                this.life = 0.5 + Math.random() * 0.5;
                this.maxLife = 200 + Math.random() * 300;
                this.age = 0;
                this.spreading = false;
                this.distFromCenter = 0;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.2 + Math.random() * 0.3;
                this.thickness = 0.5 + Math.random() * 0.5;
                this.rainbowShift = Math.random() * 0.5;
                this.pulse = 0.5 + Math.random() * 0.5;
                this.pulseSpeed = 0.01 + Math.random() * 0.02;
                this.glow = 0.3 + Math.random() * 0.4;
                this.trail = [];
                this.maxTrail = 5 + Math.floor(Math.random() * 5);
            }

            update(time, speed, centerX, centerY) {
                this.age += speed * 2;
                this.life = 1 - this.age / this.maxLife;
                this.phase += this.wobbleSpeed * speed * 5;
                this.pulse = 0.5 + 0.5 * Math.sin(this.phase + time * 0.01);

                // Spreading motion
                if (this.spreading) {
                    this.radius += (this.targetRadius - this.radius) * 0.01;
                    this.distFromCenter += this.speed * speed * 10;
                    const angle = Math.atan2(this.y - centerY, this.x - centerX);
                    this.x += Math.cos(angle) * this.speed * speed * 10 * (0.5 + 0.5 * this.pulse);
                    this.y += Math.sin(angle) * this.speed * speed * 10 * (0.5 + 0.5 * this.pulse);
                    this.x += Math.sin(this.phase) * 0.2;
                    this.y += Math.cos(this.phase * 0.7) * 0.2;
                } else {
                    // Wobble
                    this.x += Math.sin(this.phase + time * 0.01) * this.wobble * 0.02 * speed * 10;
                    this.y += Math.cos(this.phase * 0.7 + time * 0.01) * this.wobble * 0.02 * speed * 10;
                }

                // Trail
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                // Boundary
                const w = canvas.width;
                const h = canvas.height;
                const margin = 10;
                if (this.x < margin) this.x = margin;
                if (this.x > w - margin) this.x = w - margin;
                if (this.y < margin) this.y = margin;
                if (this.y > h - margin) this.y = h - margin;

                if (this.age > this.maxLife) {
                    this.reset();
                }
            }

            reset() {
                const w = canvas.width;
                const h = canvas.height;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.radius = 2 + Math.random() * 5;
                this.targetRadius = this.radius * (1 + Math.random() * 2);
                this.colorOffset = Math.random();
                this.life = 0.5 + Math.random() * 0.5;
                this.maxLife = 200 + Math.random() * 300;
                this.age = 0;
                this.spreading = false;
                this.distFromCenter = 0;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.2 + Math.random() * 0.3;
                this.trail = [];
                this.pulse = 0.5 + Math.random() * 0.5;
            }

            draw(ctx, time) {
                if (this.life <= 0) return;

                // Get rainbow color
                const hue = (this.colorOffset * 360 + time * 20 + this.distFromCenter * 0.5) % 360;
                const sat = 70 + 20 * Math.sin(this.phase);
                const light = 50 + 30 * this.pulse;
                const color = `hsla(${hue}, ${sat}%, ${light}%, ${this.alpha * this.life})`;
                const colorGlow = `hsla(${hue}, 100%, 70%, ${this.alpha * this.life * 0.3})`;

                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * 0.1 * this.life;
                    const trailSize = this.radius * (0.2 + (i / this.trail.length) * 0.3);
                    const trailHue = (this.colorOffset * 360 + time * 20 + i * 5) % 360;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${trailHue}, 80%, 60%, ${trailAlpha})`;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = `hsla(${trailHue}, 100%, 70%, ${trailAlpha * 0.3})`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Glow
                const glowSize = this.radius * 4 * this.glow;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
                grad.addColorStop(0, colorGlow);
                grad.addColorStop(0.5, colorGlow);
                grad.addColorStop(1, `hsla(${hue}, 100%, 70%, 0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.life * 0.3;
                ctx.fill();

                // Main oil drop
                const size = this.radius * (0.7 + 0.3 * this.pulse);
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = this.life * 0.8;
                ctx.shadowBlur = 15;
                ctx.shadowColor = colorGlow;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Iridescent inner ring
                const ringHue = (this.colorOffset * 360 + time * 30 + 60) % 360;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size * 0.6, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${ringHue}, 100%, 70%, ${this.life * 0.4})`;
                ctx.lineWidth = 1 + this.thickness;
                ctx.globalAlpha = this.life * 0.5;
                ctx.stroke();

                // Bright center
                ctx.beginPath();
                ctx.arc(this.x - size * 0.1, this.y - size * 0.1, size * 0.15, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue + 60}, 100%, 90%, ${this.life * 0.3})`;
                ctx.globalAlpha = this.life * 0.4;
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }

            startSpreading(cx, cy) {
                this.spreading = true;
                const angle = Math.atan2(this.y - cy, this.x - cx);
                this.x = cx + Math.cos(angle) * 10;
                this.y = cy + Math.sin(angle) * 10;
                this.distFromCenter = 10;
                this.speed = 0.3 + Math.random() * 0.5;
                this.targetRadius = this.radius * (2 + Math.random() * 3);
            }
        }

        // ===== DRAW RAINBOW RIPPLE =====
        function drawRainbowRipple(ctx, cx, cy, radius, progress) {
            const numRings = 8;
            const maxRadius = radius * (0.5 + 0.5 * progress);

            for (let i = 0; i < numRings; i++) {
                const t = i / numRings;
                const ringRadius = maxRadius * t;
                const alpha = 0.1 + 0.3 * (1 - t) * progress;
                const hue = (t * 360 + time * 20) % 360;

                // Wave distortion
                ctx.beginPath();
                for (let a = 0; a < Math.PI * 2; a += 0.03) {
                    const wave = Math.sin(a * 3 + time * 0.02 + i) * 3 * progress;
                    const r = ringRadius + wave;
                    const px = cx + Math.cos(a) * r;
                    const py = cy + Math.sin(a) * r;
                    if (a === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.strokeStyle = `hsla(${hue}, 100%, 70%, ${alpha})`;
                ctx.lineWidth = 1 + t * 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsla(${hue}, 100%, 70%, ${alpha * 0.3})`;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Center glow
            const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxRadius * 0.3);
            centerGrad.addColorStop(0, `hsla(0, 100%, 90%, ${0.2 * progress})`);
            centerGrad.addColorStop(1, `hsla(0, 100%, 90%, 0)`);
            ctx.beginPath();
            ctx.arc(cx, cy, maxRadius * 0.3, 0, Math.PI * 2);
            ctx.fillStyle = centerGrad;
            ctx.fill();
        }

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            // Water gradient
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a1a2e');
            grad.addColorStop(0.3, '#061020');
            grad.addColorStop(0.6, '#030a15');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Water surface reflection
            for (let i = 0; i < 20; i++) {
                const x = (i / 20) * w + Math.sin(time * 0.005 + i) * 20;
                const y = 20 + Math.sin(time * 0.01 + i * 0.5) * 10;
                const size = 0.5 + Math.sin(time * 0.01 + i) * 0.3;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(100, 200, 255, ${0.02 + Math.sin(time * 0.01 + i) * 0.02})`;
                ctx.fill();
            }

            // Subtle water ripples
            for (let i = 0; i < 3; i++) {
                const cx = (i / 3) * w + Math.sin(time * 0.002 + i) * 30;
                const cy = (i * 0.3 + 0.2) * h + Math.cos(time * 0.003 + i) * 20;
                const r = 30 + Math.sin(time * 0.001 + i) * 10;
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(100, 200, 255, ${0.02 + Math.sin(time * 0.002 + i) * 0.02})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        // ===== SPILL OIL =====
        function spillOil() {
            if (isSpilling) return;

            isSpilling = true;
            spillProgress = 0;
            statusText.textContent = '🛢️ Spilling...';
            spillBtn.textContent = '🛢️ Spilling...';

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;

            // Create oil particles
            const numParticles = 50 + Math.floor(Math.random() * 50);
            for (let i = 0; i < numParticles; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 30;
                const p = new OilParticle(
                    cx + Math.cos(angle) * dist,
                    cy + Math.sin(angle) * dist
                );
                p.colorOffset = Math.random();
                p.radius = 2 + Math.random() * 4;
                p.targetRadius = p.radius * (1 + Math.random() * 3);
                p.alpha = 0.4 + Math.random() * 0.5;
                p.life = 0.5 + Math.random() * 0.5;
                p.startSpreading(cx, cy);
                oilParticles.push(p);
            }

            // Add rainbow ripples
            for (let i = 0; i < 5; i++) {
                const radius = 20 + Math.random() * 40;
                ripples.push({
                    cx: cx + (Math.random() - 0.5) * 30,
                    cy: cy + (Math.random() - 0.5) * 30,
                    radius: radius,
                    maxRadius: radius * (3 + Math.random() * 3),
                    progress: 0,
                    speed: 0.01 + Math.random() * 0.02,
                    phase: Math.random() * Math.PI * 2,
                    life: 1,
                    maxLife: 100 + Math.random() * 100,
                    age: 0
                });
            }

            setTimeout(() => {
                isSpilling = false;
                spillBtn.textContent = '🛢️ Spill';
                statusText.textContent = '🛢️ Rainbow oil!';
                setTimeout(() => {
                    statusText.textContent = '🛢️ Ready to spill';
                }, 1500);
            }, 3000);
        }

        // ===== RESET =====
        function resetOil() {
            oilParticles = [];
            ripples = [];
            isSpilling = false;
            spillProgress = 0;
            spillBtn.textContent = '🛢️ Spill';
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = '🛢️ Ready to spill';
            }, 1000);
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            time += 0.01;

            // Update ripples
            for (let i = ripples.length - 1; i >= 0; i--) {
                const r = ripples[i];
                r.age += speed * 2;
                r.progress += r.speed * speed * 10;
                r.life = 1 - r.age / r.maxLife;
                r.radius += 0.1 * speed * 10;
                if (r.radius > r.maxRadius || r.life <= 0) {
                    ripples.splice(i, 1);
                }
            }

            // Update oil particles
            for (const p of oilParticles) {
                p.update(time, speed, cx, cy);
            }

            // Remove dead particles
            oilParticles = oilParticles.filter(p => !p.isDead());

            // Add new particles if spilling
            if (isSpilling && Math.random() < 0.1) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 20;
                const p = new OilParticle(
                    cx + Math.cos(angle) * dist,
                    cy + Math.sin(angle) * dist
                );
                p.colorOffset = Math.random();
                p.radius = 2 + Math.random() * 4;
                p.targetRadius = p.radius * (1 + Math.random() * 3);
                p.alpha = 0.4 + Math.random() * 0.5;
                p.startSpreading(cx, cy);
                oilParticles.push(p);
            }

            // Draw
            drawBackground(ctx, w, h);

            // Draw ripples
            for (const r of ripples) {
                drawRainbowRipple(ctx, r.cx, r.cy, r.radius, r.progress);
            }

            // Draw oil particles (sorted by size for depth)
            oilParticles.sort((a, b) => a.radius - b.radius);
            for (const p of oilParticles) {
                p.draw(ctx, time);
            }

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `🛢️ ${oilParticles.length} droplets • ${ripples.length} ripples`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Spill
        spillBtn.addEventListener('click', spillOil);

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = '🛢️ Ready to spill';
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', resetOil);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                if (e.shiftKey) spillBtn.click();
                else speedBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') resetBtn.click();
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                spillBtn.click();
            }
        });

        // ===== CANVAS CLICK =====
        canvas.addEventListener('click', spillOil);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            spillOil();
        }, { passive: false });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        statusText.textContent = '🛢️ Ready to spill';
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🛢️ Oil Spill Rainbow loaded!');
        console.log('💡 S - Spill oil');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Spill oil');
        console.log('💡 Click canvas - Spill oil');
    </script>
</body>
</html>
