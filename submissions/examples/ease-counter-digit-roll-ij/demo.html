<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Digit Roll - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Counter Digit Roll</h1>
    <p class="desc">Digits roll up like an odometer</p>
    <div class="cdr-display" id="cdrDisplay">
      <div class="cdr-digit">
        <div class="cdr-strip" style="--cdr-value: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <div class="cdr-digit">
        <div class="cdr-strip" style="--cdr-value: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <div class="cdr-digit">
        <div class="cdr-strip" style="--cdr-value: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <div class="cdr-digit">
        <div class="cdr-strip" style="--cdr-value: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <div class="cdr-digit">
        <div class="cdr-strip" style="--cdr-value: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span>
          <span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
    </div>
    <div class="cdr-controls">
      <button class="cdr-btn" data-action="down">-</button>
      <span class="cdr-value" id="cdrNumber">0</span>
      <button class="cdr-btn" data-action="up">+</button>
    </div>
    <button class="cdr-reset" id="cdrReset">Reset</button>
  </section>
  <script>
    const strips = document.querySelectorAll('.cdr-strip');
    const numEl = document.getElementById('cdrNumber');
    const resetBtn = document.getElementById('cdrReset');
    let value = 0;

    function updateDisplay() {
      const str = String(Math.abs(value)).padStart(5, '0');
      strips.forEach((el, i) => {
        const digit = parseInt(str[i] || '0', 10);
        el.style.setProperty('--cdr-value', digit);
      });
      numEl.textContent = value;
    }

    document.querySelectorAll('.cdr-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        value += btn.dataset.action === 'up' ? 1 : -1;
        updateDisplay();
      });
    });

    resetBtn.addEventListener('click', () => {
      value = 0;
      updateDisplay();
    });

    updateDisplay();
  </script>
</body>
</html>
