<!DOCTYPE html>
<html lang="en">
<head>

<title>EaseMotion • Holographic Command Palette</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-grid"></div>
<div class="aurora aurora-one"></div>

<main class="container">

<header class="hero">

<span class="badge">
EaseMotion CSS Demo
</span>

<h1>
Holographic
<span>Command Palette</span>
</h1>

<p>
A futuristic CSS-only command palette featuring animated holographic borders,

<section class="palette">

Ctrl + K
</span>

</div>

<div class="command-group">

<div class="command">

<div>

<h4>Dashboard</h4>

<small>Open workspace</small>

</div>

<kbd>↵</kbd>

</div>

<div class="command">

<div>

<h4>Projects</h4>

<small>Browse repositories</small>

</div>

<kbd>P</kbd>

</div>

<div class="command">

<div>


</ul>

</article>

</section>

</main>
