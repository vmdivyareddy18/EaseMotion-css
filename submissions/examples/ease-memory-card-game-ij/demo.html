<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="mcg-container">
    <h1>Memory Card Game</h1>
    <div class="mcg-controls">
      <span class="mcg-moves">Moves: <strong id="mcg-move-count">0</strong></span>
      <span class="mcg-status" id="mcg-status"></span>
      <button class="mcg-reset" id="mcg-reset">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Reset
      </button>
    </div>
    <div class="mcg-grid" id="mcg-grid"></div>
  </div>

  <div class="mcg-win-overlay" id="mcg-win">
    <div class="mcg-win-card">
      <div class="mcg-win-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      </div>
      <h2>You Win!</h2>
      <p>Completed in <strong id="mcg-final-moves">0</strong> moves</p>
      <button class="mcg-win-btn" id="mcg-play-again">Play Again</button>
    </div>
  </div>

  <script>
    const emojis = ["🍎", "🍊", "🍋", "🍇", "🍓", "🍒", "🍑", "🍉"];
    let cards = [];
    let flippedCards = [];
    let matchedPairs = 0;
    let moves = 0;
    let lockBoard = false;

    const grid = document.getElementById("mcg-grid");
    const moveCount = document.getElementById("mcg-move-count");
    const status = document.getElementById("mcg-status");
    const winOverlay = document.getElementById("mcg-win");
    const finalMoves = document.getElementById("mcg-final-moves");

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function initGame() {
      const doubled = [...emojis, ...emojis];
      cards = shuffle(doubled);
      flippedCards = [];
      matchedPairs = 0;
      moves = 0;
      lockBoard = false;
      moveCount.textContent = "0";
      status.textContent = "";
      winOverlay.classList.remove("mcg-show");
      renderGrid();
    }

    function renderGrid() {
      grid.innerHTML = "";
      cards.forEach((emoji, index) => {
        const card = document.createElement("div");
        card.className = "mcg-card";
        card.dataset.index = index;
        card.dataset.emoji = emoji;
        card.innerHTML = `<div class="mcg-card-inner"><div class="mcg-card-front">?</div><div class="mcg-card-back">${emoji}</div></div>`;
        card.addEventListener("click", () => flipCard(card, index));
        grid.appendChild(card);
      });
    }

    function flipCard(card, index) {
      if (lockBoard) return;
      if (card.classList.contains("mcg-matched") || card.classList.contains("mcg-flipped")) return;
      if (flippedCards.length >= 2) return;

      card.classList.add("mcg-flipped");
      flippedCards.push({ card, index, emoji: cards[index] });

      if (flippedCards.length === 2) {
        moves++;
        moveCount.textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flippedCards;
      if (a.emoji === b.emoji) {
        setTimeout(() => {
          a.card.classList.add("mcg-matched");
          b.card.classList.add("mcg-matched");
          matchedPairs++;
          flippedCards = [];
          if (matchedPairs === emojis.length) {
            setTimeout(showWin, 500);
          }
        }, 400);
      } else {
        lockBoard = true;
        a.card.classList.add("mcg-mismatch");
        b.card.classList.add("mcg-mismatch");
        setTimeout(() => {
          a.card.classList.remove("mcg-flipped", "mcg-mismatch");
          b.card.classList.remove("mcg-flipped", "mcg-mismatch");
          flippedCards = [];
          lockBoard = false;
        }, 900);
      }
    }

    function showWin() {
      finalMoves.textContent = moves;
      winOverlay.classList.add("mcg-show");
    }

    document.getElementById("mcg-reset").addEventListener("click", initGame);
    document.getElementById("mcg-play-again").addEventListener("click", initGame);

    initGame();
  </script>
</body>
</html>
