<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Speed Dial Menu • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <span class="badge">
        SPEED DIAL MENU
    </span>

    <h1>Quick Actions</h1>

    <p>
        Hover over the floating action button to reveal a colorful
        radial menu of quick shortcuts.
    </p>

    <div class="speed-dial">

        <button class="action email">✉️</button>

        <button class="action chat">💬</button>

        <button class="action phone">📞</button>

        <button class="action camera">📷</button>

        <button class="fab">+</button>

    </div>

</div>

</body>
</html>
