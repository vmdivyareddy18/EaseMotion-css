<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radial Pulse Aura Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #f8fafc;
      --ease-color-surface:        #ffffff;
      --ease-color-text:           #1e293b;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #e2e8f0;
      --ease-radius-md:            0.5rem;
      --ease-radius-lg:            1rem;
      --ease-font-sans:            system-ui, -apple-system, 'Segoe UI', sans-serif;
      --ease-shadow-md:            0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -1px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ease-color-bg:       #0b1121;
        --ease-color-surface:  #141e33;
        --ease-color-text:     #e2e8f0;
        --ease-color-muted:    #94a3b8;
        --ease-color-neutral-200: #334155;
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ease-color-text);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Status Board Card ── */
    .status-board {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-md);
      border-radius: var(--ease-radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 450px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--ease-color-neutral-200);
    }

    .status-row:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .avatar-placeholder {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #a5b4fc 0%, #818cf8 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #ffffff;
      font-size: 0.95rem;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
    }

    .profile-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .profile-role {
      font-size: 0.78rem;
      color: var(--ease-color-muted);
    }

    /* ── Customized Status Pulses ── */
    .pulse-online {
      --pulse-color: #10b981; /* Emerald green */
    }

    .pulse-busy {
      --pulse-color: #ef4444; /* Rose red */
    }

    .pulse-incoming {
      --pulse-color: #3b82f6; /* Ocean blue */
    }

    .pulse-warning {
      --pulse-color: #f59e0b; /* Amber orange */
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Radial Pulse Aura</h1>
    <p>
      Pulsating radiating status indicators. Ideal for signifies presence, live status, or urgent action points.
    </p>
  </header>

  <main class="status-board">
    <!-- User Online -->
    <div class="status-row">
      <div class="user-profile">
        <div class="avatar-placeholder">US</div>
        <div class="profile-info">
          <span class="profile-name">Ujwal Sadhu</span>
          <span class="profile-role">Active Now</span>
        </div>
      </div>
      <span class="radial-pulse-aura-uj pulse-online" aria-label="Online status marker"></span>
    </div>

    <!-- User Busy -->
    <div class="status-row">
      <div class="user-profile">
        <div class="avatar-placeholder" style="background: linear-gradient(135deg, #fbcfe8 0%, #f472b6 100%);">JD</div>
        <div class="profile-info">
          <span class="profile-name">Jane Doe</span>
          <span class="profile-role">Do Not Disturb</span>
        </div>
      </div>
      <span class="radial-pulse-aura-uj pulse-busy" aria-label="Busy status marker"></span>
    </div>

    <!-- Incoming Call / Sync -->
    <div class="status-row">
      <div class="user-profile">
        <div class="avatar-placeholder" style="background: linear-gradient(135deg, #bfdbfe 0%, #60a5fa 100%);">MB</div>
        <div class="profile-info">
          <span class="profile-name">System Agent</span>
          <span class="profile-role">Synchronizing Data</span>
        </div>
      </div>
      <span class="radial-pulse-aura-uj pulse-incoming" aria-label="Incoming connection status marker"></span>
    </div>

    <!-- Alert / System Action -->
    <div class="status-row">
      <div class="user-profile">
        <div class="avatar-placeholder" style="background: linear-gradient(135deg, #fde68a 0%, #fbbf24 100%);">⚠️</div>
        <div class="profile-info">
          <span class="profile-name">Server Node</span>
          <span class="profile-role">High Load Warning</span>
        </div>
      </div>
      <span class="radial-pulse-aura-uj pulse-warning" aria-label="System warning status marker"></span>
    </div>
  </main>

</body>
</html>
