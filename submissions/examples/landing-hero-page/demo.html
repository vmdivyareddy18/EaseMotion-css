<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="hero-container">
    <div class="ambient-glow"></div> 
    
    <div class="floating-side left-side">
      <div class="stack-wrapper">
        <div class="preview-card glass-card layer-back">
          <div class="card-header">
            <span class="dot"></span><span class="dot"></span><span class="dot"></span>
          </div>
          <div class="skeleton-title" style="width: 40%;"></div>
          <div class="skeleton-text" style="margin-bottom: 0;"></div>
        </div>
        
        <div class="preview-card glass-card layer-front">
          <div class="card-header">
            <span class="dot-active"></span>
            <span class="status-text">ease-core.css</span>
          </div>
          <div class="card-body">
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text" style="width: 85%;"></div>
            <div class="card-action-row">
              <div class="mini-avatar-group">
                <span class="avatar"></span>
                <span class="avatar"></span>
              </div>
              <button class="preview-btn">Trigger State</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="hero-content">
      <span class="badge">Interactive Demo</span>
      <h1 class="animate-title">Build with EaseMotion</h1>
      <p class="animate-subtitle">Human-readable class names. Animation-first. No memorization required.</p>
      
      <div class="cta-group">
        <button class="btn-primary">Read Docs</button>
        <button class="btn-secondary">GitHub ↗</button>
      </div>

      <div class="pill-group">
        <span class="pill">.ease-spring-back</span>
        <span class="pill">.ease-reveal-left</span>
        <span class="pill">.ease-morph-shape</span>
      </div>
    </div>

    <div class="floating-side right-side">
      <div class="timeline-panel glass-card">
        <div class="panel-top">
          <span class="panel-title">Motion Inspector</span>
          <span class="panel-metric">60fps</span>
        </div>
        <div class="timeline-tracks">
          <div class="track">
            <div class="track-label">Scale</div>
            <div class="track-bar"><div class="fill fill-spring"></div></div>
          </div>
          <div class="track">
            <div class="track-label">Opacity</div>
            <div class="track-bar"><div class="fill fill-fade"></div></div>
          </div>
          <div class="track">
            <div class="track-label">Rotate</div>
            <div class="track-bar"><div class="fill fill-spin"></div></div>
          </div>
        </div>
        <div class="grid-display">
          <div class="grid-item pop-in"><span class="inner-dot"></span></div>
          <div class="grid-item float-item"></div>
          <div class="grid-item pulse-item"></div>
          <div class="grid-item shift-item"></div>
        </div>
      </div>
    </div>
  </section>

</body>
</html>
