<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease API Gateway Route Inspector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="gateway-panel">

<h2>API Gateway Routes</h2>

<div class="route success">
<div>
<h3>GET /users</h3>
<p>OAuth 2.0 • 2.8K Requests/min</p>
</div>
<span>Healthy</span>
</div>

<div class="route active">
<div>
<h3>POST /payments</h3>
<p>JWT Auth • 980 Requests/min</p>
</div>
<span>Active</span>
</div>

<div class="route warning">
<div>
<h3>PUT /inventory</h3>
<p>Latency: 410 ms</p>
</div>
<span>Slow</span>
</div>

<div class="route error">
<div>
<h3>DELETE /orders</h3>
<p>Error Rate: 4.1%</p>
</div>
<span>Critical</span>
</div>

</section>

</body>
</html>
