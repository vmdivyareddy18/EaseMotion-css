<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position Relative &amp; Absolute</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Position: Relative &amp; Absolute</h1>

    <section class="example">
      <h2>Relative container, absolute children</h2>
      <div class="stage">
        <div class="box box-tl">TL</div>
        <div class="box box-tr">TR</div>
        <div class="box box-bl">BL</div>
        <div class="box box-br">BR</div>
        <div class="box box-center">Center</div>
      </div>
    </section>

    <section class="example">
      <h2>Offset values with z-index</h2>
      <div class="layers">
        <div class="layer layer-1">Layer 1 (bottom)</div>
        <div class="layer layer-2">Layer 2 (middle)</div>
        <div class="layer layer-3">Layer 3 (top)</div>
      </div>
    </section>

    <section class="example">
      <h2>Label overlay on image</h2>
      <div class="card">
        <div class="card-img"></div>
        <span class="card-badge">New</span>
        <span class="card-label">Image Caption</span>
      </div>
    </section>
  </main>
</body>
</html>
