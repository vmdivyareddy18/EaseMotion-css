<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Overflow Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item truncate">.truncate</div>
  <div class="demo-item text-ellipsis">.text-ellipsis</div>
  <div class="demo-item text-clip">.text-clip</div>
  <div class="demo-item text-clip-2">.text-clip-2</div>
  <div class="demo-item text-clip-3">.text-clip-3</div>
  <div class="demo-item text-clip-4">.text-clip-4</div>
</body>
</html>
