<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-zoom-container">
    <header class="ease-zoom-header">
      <h1>Zoom Interactions</h1>
      <p>Demonstrating responsive zoom-style animations for modern UIs.</p>
    </header>

    <div class="ease-zoom-grid">
      <!-- Card 1: Zoom In -->
      <div class="ease-zoom-card ease-zoom-in">
        <div class="ease-zoom-image" style="background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);"></div>
        <div class="ease-zoom-content">
          <h3>Zoom In</h3>
          <p>Hover to scale up the card gently.</p>
        </div>
      </div>

      <!-- Card 2: Zoom Image Only -->
      <div class="ease-zoom-card ease-zoom-image-only">
        <div class="ease-zoom-image-wrapper">
          <div class="ease-zoom-image" style="background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);"></div>
        </div>
        <div class="ease-zoom-content">
          <h3>Inner Zoom</h3>
          <p>Hover to zoom only the image inside the container.</p>
        </div>
      </div>

      <!-- Card 3: Zoom Out -->
      <div class="ease-zoom-card ease-zoom-out">
        <div class="ease-zoom-image" style="background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);"></div>
        <div class="ease-zoom-content">
          <h3>Zoom Out</h3>
          <p>Hover to scale down the card slightly.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
