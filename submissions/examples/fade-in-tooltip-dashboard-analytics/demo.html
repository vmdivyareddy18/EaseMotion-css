<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics Fade-In Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="card">
        <h2>Revenue</h2>
        <h1>$42,680</h1>

        <div class="tooltip-wrapper">
            <button class="info-btn" tabindex="0">
                ⓘ
            </button>

            <div class="tooltip">
                Revenue increased by <strong>18%</strong> compared to last month.
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Users</h2>
        <h1>9,842</h1>

        <div class="tooltip-wrapper">
            <button class="info-btn" tabindex="0">
                ⓘ
            </button>

            <div class="tooltip">
                Active users grew steadily during the last 30 days.
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Conversion</h2>
        <h1>6.4%</h1>

        <div class="tooltip-wrapper">
            <button class="info-btn" tabindex="0">
                ⓘ
            </button>

            <div class="tooltip">
                Conversion rate is above the quarterly average.
            </div>
        </div>
    </div>

</div>

</body>
</html>
