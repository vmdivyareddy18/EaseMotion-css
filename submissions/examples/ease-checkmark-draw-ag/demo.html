<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkmark Draw Animation - EaseMotion CSS</title>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link to EaseMotion CSS core if present -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to checkmark draw css styles -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <!-- Success Card Container -->
      <div class="success-card" id="successCard">
        <div class="card-content">
          <!-- SVG Checkmark drawing component -->
          <div class="checkmark-container">
            <svg
              class="checkmark-svg"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 52 52"
            >
              <circle
                class="checkmark-circle"
                cx="26"
                cy="26"
                r="25"
                fill="none"
              />
              <path
                class="checkmark-check"
                fill="none"
                d="M14.1 27.2l7.1 7.2 16.7-16.8"
              />
            </svg>
            <div class="checkmark-ring"></div>
          </div>

          <h1>Payment Successful</h1>
          <p class="description">
            Your payment has been processed successfully. A confirmation email
            has been sent to your inbox.
          </p>

          <!-- Interactive Trigger Buttons -->
          <button class="action-button" id="triggerBtn">
            Complete Payment
          </button>
          <button class="reset-btn" id="resetBtn" style="display: none">
            Reset Animation
          </button>
        </div>
      </div>

      <!-- Live Customization Control Panel -->
      <div class="customizer">
        <div class="customizer-title">Live Customizer</div>

        <!-- Color Picker -->
        <div class="control-group">
          <span class="control-label">Check Color (--ease-check-color)</span>
          <input
            type="color"
            class="color-input"
            id="colorPicker"
            value="#10b981"
          />
        </div>

        <!-- Circle Draw Speed -->
        <div class="control-group">
          <span class="control-label"
            >Circle Speed (--ease-check-speed-circle)</span
          >
          <div>
            <input
              type="range"
              class="range-input"
              id="circleSpeed"
              min="0.2"
              max="2.0"
              step="0.1"
              value="0.6"
            />
            <span
              style="
                font-size: 0.85rem;
                min-width: 30px;
                display: inline-block;
                text-align: right;
              "
              id="circleSpeedVal"
              >0.6s</span
            >
          </div>
        </div>

        <!-- Checkmark Draw Speed -->
        <div class="control-group">
          <span class="control-label"
            >Check Speed (--ease-check-speed-check)</span
          >
          <div>
            <input
              type="range"
              class="range-input"
              id="checkSpeed"
              min="0.1"
              max="1.5"
              step="0.1"
              value="0.3"
            />
            <span
              style="
                font-size: 0.85rem;
                min-width: 30px;
                display: inline-block;
                text-align: right;
              "
              id="checkSpeedVal"
              >0.3s</span
            >
          </div>
        </div>
      </div>
    </div>

    <!-- Interactive JavaScript Logic -->
    <script>
      const successCard = document.getElementById("successCard");
      const triggerBtn = document.getElementById("triggerBtn");
      const resetBtn = document.getElementById("resetBtn");

      // Live Controls
      const colorPicker = document.getElementById("colorPicker");
      const circleSpeed = document.getElementById("circleSpeed");
      const circleSpeedVal = document.getElementById("circleSpeedVal");
      const checkSpeed = document.getElementById("checkSpeed");
      const checkSpeedVal = document.getElementById("checkSpeedVal");

      // Trigger button handler (Complete Payment)
      triggerBtn.addEventListener("click", () => {
        // Simulate brief processing state
        triggerBtn.disabled = true;
        triggerBtn.textContent = "Processing...";

        setTimeout(() => {
          // Apply success class to run animations
          successCard.classList.add("success");
          triggerBtn.style.display = "none";
          resetBtn.style.display = "inline-block";
        }, 800);
      });

      // Reset button handler
      resetBtn.addEventListener("click", () => {
        // Remove success class to reset SVG
        successCard.classList.remove("success");
        resetBtn.style.display = "none";
        triggerBtn.style.display = "block";
        triggerBtn.disabled = false;
        triggerBtn.textContent = "Complete Payment";
      });

      // Color Picker Listener
      colorPicker.addEventListener("input", (e) => {
        const color = e.target.value;
        document.documentElement.style.setProperty("--ease-check-color", color);
      });

      // Circle Speed Listener
      circleSpeed.addEventListener("input", (e) => {
        const speed = e.target.value + "s";
        circleSpeedVal.textContent = speed;
        document.documentElement.style.setProperty(
          "--ease-check-speed-circle",
          speed
        );

        // Keep other delays relative
        const checkDelay = parseFloat(e.target.value) - 0.1 + "s";
        const fillDelay = parseFloat(e.target.value) + 0.2 + "s";
        document.documentElement.style.setProperty(
          "--ease-check-delay-check",
          checkDelay
        );
        document.documentElement.style.setProperty(
          "--ease-check-delay-fill",
          fillDelay
        );
      });

      // Check Speed Listener
      checkSpeed.addEventListener("input", (e) => {
        const speed = e.target.value + "s";
        checkSpeedVal.textContent = speed;
        document.documentElement.style.setProperty(
          "--ease-check-speed-check",
          speed
        );
      });
    </script>
  </body>
</html>
