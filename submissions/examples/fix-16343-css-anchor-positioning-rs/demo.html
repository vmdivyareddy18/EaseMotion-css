<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Anchor Positioning Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        prefix: 'ease-',
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-slate-900 ease-text-white ease-flex ease-items-center ease-justify-center ease-min-h-screen ease-font-sans">

    <div class="ease-text-center ease-max-w-2xl ease-p-8">
        <h1 class="ease-text-4xl ease-font-bold ease-mb-4">CSS Anchor Positioning</h1>
        <p class="ease-text-slate-400 ease-mb-16">
            Tooltips bound directly to elements using the native CSS Anchor Positioning API. 
            No JavaScript calculations required for positioning!
        </p>

        <!-- Container must not have overflow hidden or position relative if it traps the absolute anchored element, but anchor positioning generally handles this elegantly depending on layout -->
        <div class="ease-flex ease-justify-center ease-gap-8 ease-flex-wrap">
            
            <!-- Top Tooltip -->
            <div>
                <button class="ease-anchor-btn ease-px-6 ease-py-3 ease-bg-blue-600 hover:ease-bg-blue-500 ease-rounded-lg ease-font-medium ease-transition-colors" style="anchor-name: --anchor-top;">
                    Hover Me (Top)
                </button>
                <div class="ease-anchored-tooltip ease-bg-slate-800 ease-px-4 ease-py-2 ease-rounded-md ease-text-sm ease-border ease-border-slate-700 ease-shadow-xl" style="position-anchor: --anchor-top;">
                    I am anchored to the top!
                </div>
            </div>

            <!-- Bottom Tooltip -->
            <div>
                <button class="ease-anchor-btn ease-px-6 ease-py-3 ease-bg-purple-600 hover:ease-bg-purple-500 ease-rounded-lg ease-font-medium ease-transition-colors" style="anchor-name: --anchor-bottom;">
                    Hover Me (Bottom)
                </button>
                <div class="ease-anchored-tooltip ease-anchor-bottom ease-bg-slate-800 ease-px-4 ease-py-2 ease-rounded-md ease-text-sm ease-border ease-border-slate-700 ease-shadow-xl" style="position-anchor: --anchor-bottom;">
                    I am anchored to the bottom!
                </div>
            </div>

            <!-- Right Tooltip -->
            <div>
                <button class="ease-anchor-btn ease-px-6 ease-py-3 ease-bg-emerald-600 hover:ease-bg-emerald-500 ease-rounded-lg ease-font-medium ease-transition-colors" style="anchor-name: --anchor-right;">
                    Hover Me (Right)
                </button>
                <div class="ease-anchored-tooltip ease-anchor-right ease-bg-slate-800 ease-px-4 ease-py-2 ease-rounded-md ease-text-sm ease-border ease-border-slate-700 ease-shadow-xl" style="position-anchor: --anchor-right;">
                    I am anchored right!
                </div>
            </div>

        </div>
    </div>

</body>
</html>
