<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — User Menu Dropdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>User Menu Dropdown</h1>
    <p>Click the avatar to open the profile menu</p>
  </header>

  <div class="umd-wrapper">
    <button class="umd-trigger" id="menuTrigger">
      <span class="umd-avatar">SJ</span>
      <span class="umd-chevron">&#9662;</span>
    </button>

    <div class="umd-menu" id="userMenu">
      <div class="umd-header">
        <div class="umd-user-avatar">SJ</div>
        <div class="umd-user-info">
          <span class="umd-user-name">Sarah Kim</span>
          <span class="umd-user-email">sarah.kim@example.com</span>
        </div>
      </div>
      <div class="umd-divider"></div>
      <ul class="umd-items">
        <li class="umd-item" data-action="profile">
          <span class="umd-item-icon">&#128100;</span>
          <span>View Profile</span>
        </li>
        <li class="umd-item" data-action="settings">
          <span class="umd-item-icon">&#9881;</span>
          <span>Settings</span>
        </li>
        <li class="umd-item" data-action="billing">
          <span class="umd-item-icon">&#128179;</span>
          <span>Billing</span>
        </li>
        <li class="umd-item" data-action="help">
          <span class="umd-item-icon">&#128161;</span>
          <span>Help Center</span>
        </li>
      </ul>
      <div class="umd-divider"></div>
      <button class="umd-logout" id="logoutBtn">Log Out</button>
    </div>
  </div>

  <div class="umd-overlay" id="menuOverlay"></div>

  <script>
    var trigger = document.getElementById('menuTrigger');
    var menu = document.getElementById('userMenu');
    var overlay = document.getElementById('menuOverlay');
    var logoutBtn = document.getElementById('logoutBtn');
    var isOpen = false;

    function toggleMenu() {
      isOpen = !isOpen;
      menu.classList.toggle('umd-open', isOpen);
      overlay.classList.toggle('umd-overlay-visible', isOpen);
    }

    function closeMenu() {
      isOpen = false;
      menu.classList.remove('umd-open');
      overlay.classList.remove('umd-overlay-visible');
    }

    trigger.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleMenu();
    });

    overlay.addEventListener('click', closeMenu);

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') closeMenu();
    });

    document.querySelectorAll('.umd-item').forEach(function (item) {
      item.addEventListener('click', function () {
        closeMenu();
      });
    });

    logoutBtn.addEventListener('click', function () {
      closeMenu();
      var confirmed = confirm('Are you sure you want to log out?');
      if (confirmed) {
        alert('You have been logged out.');
      }
    });
  </script>
</body>
</html>
