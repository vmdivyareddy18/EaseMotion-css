<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Pulse Notify - EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    h1 {
      color: #f1f5f9;
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 60px;
      letter-spacing: -0.5px;
    }
    .icons-row {
      display: flex;
      gap: 64px;
      margin-bottom: 60px;
    }
    .icon-wrapper {
      position: relative;
      font-size: 40px;
      color: #94a3b8;
      cursor: pointer;
      transition: color 0.2s;
    }
    .icon-wrapper:hover {
      color: #f1f5f9;
    }
    .controls {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls button {
      font-family: 'Inter', sans-serif;
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .controls button:hover {
      transform: translateY(-2px);
    }
    .btn-bell {
      background: #3b82f6;
      color: white;
      box-shadow: 0 4px 14px rgba(59, 130, 246, 0.4);
    }
    .btn-envelope {
      background: #10b981;
      color: white;
      box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
    }
    .btn-chat {
      background: #f59e0b;
      color: white;
      box-shadow: 0 4px 14px rgba(245, 158, 11, 0.4);
    }
    .btn-reset {
      background: #475569;
      color: #e2e8f0;
      box-shadow: 0 4px 14px rgba(71, 85, 105, 0.4);
    }
  </style>
</head>
<body>
  <h1>Badge Pulse Notify</h1>

  <div class="icons-row">
    <div class="icon-wrapper" data-icon="bell">
      &#128276;
      <span class="badge" data-count="3">3</span>
    </div>
    <div class="icon-wrapper" data-icon="envelope">
      &#9993;
      <span class="badge" data-count="7">7</span>
    </div>
    <div class="icon-wrapper" data-icon="chat">
      &#128172;
      <span class="badge" data-count="12">12</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-bell" data-target="bell">+ Bell</button>
    <button class="btn-envelope" data-target="envelope">+ Envelope</button>
    <button class="btn-chat" data-target="chat">+ Chat</button>
    <button class="btn-reset" data-target="all">Reset All</button>
  </div>

  <script>
    const wrappers = document.querySelectorAll('.icon-wrapper');
    const badges = document.querySelectorAll('.badge');

    function triggerPulse(el) {
      el.classList.remove('badge-pulse');
      void el.offsetWidth;
      el.classList.add('badge-pulse');
    }

    function increment(target) {
      wrappers.forEach((w, i) => {
        const icon = w.dataset.icon;
        if (icon === target || target === 'all') {
          const badge = w.querySelector('.badge');
          if (target !== 'all') {
            let count = parseInt(badge.dataset.count, 10) + 1;
            badge.dataset.count = count;
            badge.textContent = count > 99 ? '99+' : count;
          }
          triggerPulse(badge);
        }
      });
    }

    function resetAll() {
      wrappers.forEach((w) => {
        const badge = w.querySelector('.badge');
        badge.dataset.count = '0';
        badge.textContent = '0';
        badge.classList.remove('badge-pulse');
      });
    }

    document.querySelectorAll('.controls button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.target;
        if (target === 'all') {
          resetAll();
        } else {
          increment(target);
        }
      });
    });
  </script>
</body>
</html>
