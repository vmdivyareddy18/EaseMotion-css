<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harp Glissando Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="harp-gliss">
    <div class="hpillar"></div>
    <div class="hpneck"></div>
    <div class="hpbody"></div>
    <div class="hpbase"></div>
    <div class="hpstrings">
      <div class="gstring" style="--i:0"></div>
      <div class="gstring" style="--i:1"></div>
      <div class="gstring" style="--i:2"></div>
      <div class="gstring" style="--i:3"></div>
      <div class="gstring" style="--i:4"></div>
      <div class="gstring" style="--i:5"></div>
      <div class="gstring" style="--i:6"></div>
      <div class="gstring" style="--i:7"></div>
      <div class="gstring" style="--i:8"></div>
    </div>
    <div class="sweep-hand"></div>
  </div>
</body>
</html>
