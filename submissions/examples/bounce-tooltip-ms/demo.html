<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce Tooltip</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #fffbeb; font-family: system-ui, sans-serif;">
  
  <div class="menu-card ease-fade-in-up">
    <div class="food-img-wrapper tooltip-trigger">
      <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?ixlib=rb-1.2.1&auto=format&fit=crop&w=500&q=60" alt="Delicious Burger" class="food-img ease-hover-scale">
      
      <!-- CSS-only tooltip -->
      <div class="tooltip-content ease-bounce">
        <span class="badge">Spicy</span>
        <p>Extra jalapeños and secret sauce 🌶️</p>
        <div class="tooltip-arrow"></div>
      </div>
    </div>
    
    <div class="food-info">
      <h3>Volcano Burger</h3>
      <span class="price">$12.99</span>
    </div>
  </div>

</body>
</html>
