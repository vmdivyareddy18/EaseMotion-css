<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Shift Countdown Timer - GSSoC '26</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <div class="page-wrapper">
    <div class="launch-container">
      <header class="launch-header">
        <span class="project-tag">PROJECT // AETHER</span>
        <h1 class="launch-title">Decentralized Intelligence is Coming.</h1>
        <p class="launch-subtitle">The first zero-config, low-latency neural compilation protocol. Nodes deploy globally in seconds.</p>
      </header>

      <!-- Color Shift Countdown Timer -->
      <div class="countdown-wrapper">
        <div class="timer-grid">
          
          <!-- Days -->
          <div class="timer-card card-days">
            <div class="timer-glow"></div>
            <div class="timer-box">
              <span class="timer-num">08</span>
              <span class="timer-lbl">Days</span>
            </div>
          </div>

          <!-- Hours -->
          <div class="timer-card card-hours">
            <div class="timer-glow"></div>
            <div class="timer-box">
              <span class="timer-num">14</span>
              <span class="timer-lbl">Hours</span>
            </div>
          </div>

          <!-- Minutes -->
          <div class="timer-card card-minutes">
            <div class="timer-glow"></div>
            <div class="timer-box">
              <span class="timer-num">27</span>
              <span class="timer-lbl">Minutes</span>
            </div>
          </div>

          <!-- Seconds -->
          <div class="timer-card card-seconds">
            <div class="timer-glow"></div>
            <div class="timer-box">
              <span class="timer-num">45</span>
              <span class="timer-lbl">Seconds</span>
            </div>
          </div>

        </div>
      </div>

      <!-- Registration Form -->
      <form class="notify-form" onsubmit="event.preventDefault(); alert('Notification registered!');">
        <div class="form-wrapper">
          <input type="email" class="email-input" placeholder="Enter your terminal address..." required />
          <button type="submit" class="notify-btn">Notify On Launch</button>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <footer class="footer-container">
      <p>Developed for <a href="https://github.com/SAPTARSHI-coder/EaseMotion-css" target="_blank">EaseMotion CSS</a> under GSSoC 2026.</p>
    </footer>
  </div>

</body>
</html>
