<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loader Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Skeleton Loader Components</h1>
    <p class="subtitle">Shimmer loading states for better perceived performance</p>

    <div class="demo-grid">
      <!-- Text skeleton -->
      <div class="skeleton-card">
        <div class="skeleton skeleton-text"></div>
        <div class="skeleton skeleton-text skeleton-text-short"></div>
        <div class="skeleton skeleton-text skeleton-text-xs"></div>
      </div>

      <!-- Avatar + text skeleton -->
      <div class="skeleton-card skeleton-card-avatar">
        <div class="skeleton skeleton-avatar"></div>
        <div class="skeleton-text-block">
          <div class="skeleton skeleton-text skeleton-text-medium"></div>
          <div class="skeleton skeleton-text skeleton-text-xs"></div>
        </div>
      </div>

      <!-- Image skeleton -->
      <div class="skeleton-card skeleton-card-image">
        <div class="skeleton skeleton-image"></div>
        <div class="skeleton-text-block">
          <div class="skeleton skeleton-text skeleton-text-medium"></div>
          <div class="skeleton skeleton-text skeleton-text-short"></div>
        </div>
      </div>

      <!-- Card skeleton -->
      <div class="skeleton-card-full">
        <div class="skeleton skeleton-card-image-full"></div>
        <div class="skeleton-card-body">
          <div class="skeleton skeleton-text skeleton-text-medium"></div>
          <div class="skeleton skeleton-text skeleton-text-short"></div>
          <div class="skeleton skeleton-text skeleton-text-xs"></div>
          <div class="skeleton skeleton-btn"></div>
        </div>
      </div>

      <!-- Toggle between content and skeleton -->
      <div class="toggle-section">
        <button class="toggle-btn" id="toggleBtn" onclick="toggleContent()">Show Real Content</button>
      </div>
    </div>
  </div>

  <script>
    function toggleContent() {
      const container = document.querySelector('.demo-grid');
      container.classList.toggle('show-content');
      const btn = document.getElementById('toggleBtn');
      btn.textContent = container.classList.contains('show-content') ? 'Show Skeletons' : 'Show Real Content';
    }
  </script>
</body>
</html>
