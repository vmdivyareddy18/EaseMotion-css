<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Creep Animation Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scene">
    <!-- Monolith/Floating Card -->
    <div class="monolith">
      <h2 class="card-title">The Monolith</h2>
      <div class="sigil">ψ ⛥ Ω</div>
      <p class="card-description">
        Hover to disturb the entity. Watch the shadow creep and spread beneath it.
      </p>
    </div>

    <!-- Creeping Shadow beneath the monolith -->
    <div class="creeping-shadow"></div>
  </div>

</body>
</html>
