<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Savings Goal Tracker Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="savings-card">

        <div class="badge">
            💰 Smart Saver
        </div>

        <h2>Vacation Savings Goal</h2>

        <p class="description">
            Track your savings journey and stay motivated to reach your target.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Goal Progress</span>
                <span>74%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>₹74,000</h3>
                <p>Current Savings</p>
            </div>

            <div class="stat-box">
                <h3>₹1,00,000</h3>
                <p>Target Goal</p>
            </div>

        </div>

        <div class="contribution-box">
            📈 Monthly Contribution: ₹8,500
        </div>

        <div class="achievement-box">
            🏆 Milestone Reached: 75% Goal Completed
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Add Savings
            </button>

            <button class="secondary-btn">
                View Report
            </button>

        </div>

    </div>

</div>

</body>
</html>
