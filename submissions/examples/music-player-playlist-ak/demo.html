<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player Playlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="player">
      <div class="player-header">
        <div class="player-now-playing" id="nowPlaying">
          <div class="track-art" id="trackArt">♪</div>
          <div class="track-info">
            <h3 class="track-name" id="trackName">Midnight Dream</h3>
            <p class="track-artist" id="trackArtist">Luna Wave</p>
          </div>
        </div>
      </div>
      <div class="player-controls">
        <div class="progress-container">
          <input type="range" class="progress-bar" id="progressBar" value="0" max="100">
          <div class="time-display">
            <span id="currentTime">0:00</span>
            <span id="totalTime">3:45</span>
          </div>
        </div>
        <div class="controls-row">
          <button class="ctrl-btn" id="prevBtn" title="Previous">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          <button class="ctrl-btn play-btn" id="playBtn" title="Play">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor" id="playIcon"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="ctrl-btn" id="nextBtn" title="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
          <div class="volume-wrap">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
          </div>
        </div>
      </div>
      <div class="playlist" id="playlist">
        <div class="playlist-title">Playlist</div>
      </div>
    </div>
  </div>
  <script>
    const tracks = [
      { name: 'Midnight Dream', artist: 'Luna Wave', duration: 225 },
      { name: 'Electric Pulse', artist: 'Neon Circuit', duration: 198 },
      { name: 'Ocean Breeze', artist: 'Coral Keys', duration: 267 },
      { name: 'Starlight Walk', artist: 'Cosmo Drift', duration: 204 },
      { name: 'Urban Flow', artist: 'Street Rhythm', duration: 183 },
      { name: 'Golden Horizon', artist: 'Sunset Waves', duration: 241 },
    ];

    let currentTrack = 0;
    let playing = false;
    let progress = 0;
    let interval = null;

    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const trackArt = document.getElementById('trackArt');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const volumeSlider = document.getElementById('volumeSlider');
    const playlistEl = document.getElementById('playlist');

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function renderPlaylist() {
      playlistEl.innerHTML = '<div class="playlist-title">Playlist</div>';
      tracks.forEach((t, i) => {
        const item = document.createElement('div');
        item.className = `playlist-item${i === currentTrack ? ' active' : ''}`;
        item.innerHTML = `<span class="pl-name">${t.name}</span><span class="pl-artist">${t.artist}</span><span class="pl-duration">${formatTime(t.duration)}</span>`;
        item.addEventListener('click', () => selectTrack(i));
        playlistEl.appendChild(item);
      });
    }

    function loadTrack(index) {
      currentTrack = index;
      const t = tracks[index];
      trackName.textContent = t.name;
      trackArtist.textContent = t.artist;
      totalTimeEl.textContent = formatTime(t.duration);
      progressBar.max = t.duration;
      progressBar.value = 0;
      progress = 0;
      currentTimeEl.textContent = '0:00';
      trackArt.textContent = ['♪', '♫', '♬', '♩', '♪', '♫'][index];
      renderPlaylist();
    }

    function selectTrack(index) {
      loadTrack(index);
      if (!playing) togglePlay();
    }

    function togglePlay() {
      playing = !playing;
      if (playing) {
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        playBtn.title = 'Pause';
        interval = setInterval(tick, 1000);
      } else {
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        playBtn.title = 'Play';
        clearInterval(interval);
      }
    }

    function tick() {
      progress++;
      if (progress >= tracks[currentTrack].duration) {
        nextTrack();
        return;
      }
      progressBar.value = progress;
      currentTimeEl.textContent = formatTime(progress);
    }

    function prevTrack() {
      const idx = currentTrack === 0 ? tracks.length - 1 : currentTrack - 1;
      loadTrack(idx);
      if (playing) { clearInterval(interval); interval = setInterval(tick, 1000); }
    }

    function nextTrack() {
      const idx = (currentTrack + 1) % tracks.length;
      loadTrack(idx);
      if (playing) { clearInterval(interval); interval = setInterval(tick, 1000); }
    }

    progressBar.addEventListener('input', () => {
      progress = parseInt(progressBar.value);
      currentTimeEl.textContent = formatTime(progress);
    });

    progressBar.addEventListener('change', () => {
      if (playing) { clearInterval(interval); interval = setInterval(tick, 1000); }
    });

    volumeSlider.addEventListener('input', () => {
      const vol = volumeSlider.value;
      volumeSlider.style.setProperty('--vol', vol + '%');
    });
    volumeSlider.style.setProperty('--vol', '70%');

    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);

    loadTrack(0);
  </script>
</body>
</html>
