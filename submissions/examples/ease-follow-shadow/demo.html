<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-follow-shadow demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f0f0f5; gap: 2rem; }
    .card {
      width: 160px; height: 140px;
      background: #fff;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; color: #444;
    }
  </style>
</head>
<body>
  <div class="card ease-follow-shadow">Move cursor →</div>
  <div class="card ease-follow-shadow">Shadow follows</div>
  <script>
    document.querySelectorAll('.ease-follow-shadow').forEach(el => {
      el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const x = ((e.clientX - r.left) / r.width  - 0.5) * 20;
        const y = ((e.clientY - r.top)  / r.height - 0.5) * 20;
        el.style.setProperty('--follow-shadow-x', `${x}px`);
        el.style.setProperty('--follow-shadow-y', `${y}px`);
        el.setAttribute('data-shadow', '1');
      });
      el.addEventListener('mouseleave', () => {
        el.style.removeProperty('--follow-shadow-x');
        el.style.removeProperty('--follow-shadow-y');
        el.removeAttribute('data-shadow');
      });
    });
  </script>
</body>
</html>
