<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-gradient-progress-bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gp-container">
    <h1>Gradient Progress Bar</h1>
    <div class="gp-track">
      <div class="gp-bar" id="gpBar" style="width: 0%"></div>
    </div>
    <div class="gp-label" id="gpLabel">0%</div>
    <div class="gp-controls">
      <button class="gp-btn" data-value="25">25%</button>
      <button class="gp-btn" data-value="50">50%</button>
      <button class="gp-btn" data-value="75">75%</button>
      <button class="gp-btn" data-value="100">100%</button>
      <button class="gp-btn gp-btn--reset" id="gpReset">Reset</button>
    </div>
  </div>
  <script>
    const bar = document.getElementById('gpBar');
    const label = document.getElementById('gpLabel');
    let current = 0, target = 0, frame = null;

    function animate() {
      current += (target - current) * 0.05;
      if (Math.abs(current - target) < 0.5) current = target;
      bar.style.width = current + '%';
      label.textContent = Math.round(current) + '%';
      if (current !== target) frame = requestAnimationFrame(animate);
    }

    document.querySelectorAll('.gp-btn[data-value]').forEach(btn => {
      btn.addEventListener('click', () => {
        target = parseFloat(btn.dataset.value);
        if (!frame) animate();
      });
    });

    document.getElementById('gpReset').addEventListener('click', () => {
      cancelAnimationFrame(frame); frame = null;
      current = 0; target = 0;
      bar.style.width = '0%';
      label.textContent = '0%';
    });
  </script>
</body>
</html>
