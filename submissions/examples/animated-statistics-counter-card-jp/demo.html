<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Statistics Counter Cards</title>

  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="stats-section">

  <h1>Our Achievements</h1>
  <p>Powerful numbers that represent our growth and success.</p>

  <div class="stats-container">

    <div class="stat-card">
      <div class="icon">🚀</div>
      <h2>10K+</h2>
      <span>Happy Users</span>
    </div>

    <div class="stat-card">
      <div class="icon">🌎</div>
      <h2>50+</h2>
      <span>Countries Reached</span>
    </div>

    <div class="stat-card">
      <div class="icon">⭐</div>
      <h2>4.9</h2>
      <span>Average Rating</span>
    </div>

    <div class="stat-card">
      <div class="icon">🏆</div>
      <h2>120+</h2>
      <span>Awards Won</span>
    </div>

  </div>

</section>

</body>
</html>
