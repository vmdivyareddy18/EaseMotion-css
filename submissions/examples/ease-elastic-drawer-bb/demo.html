<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Side Drawer Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0f19;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }
    .open-btn {
      background: #6366f1;
      color: #ffffff;
      border: none;
      padding: 15px 30px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
      transition: background 0.2s, transform 0.2s;
    }
    .open-btn:hover {
      background: #4f46e5;
      transform: translateY(-2px);
    }
  </style>
</head>
<body>
  <button class="open-btn" id="openBtn">Open Drawer</button>

  <div class="drawer-overlay" id="overlay"></div>
  <div class="elastic-drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
    <div class="drawer-header">
      <h3 id="drawerTitle">Navigation</h3>
      <button class="close-drawer-btn" id="closeBtn">Close</button>
    </div>
    
    <div class="drawer-content">
      <ul class="drawer-menu">
        <li><a href="#">Dashboard</a></li>
        <li><a href="#">Analytics</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Security Logs</a></li>
      </ul>
    </div>
    
    <div class="drawer-footer">
      <p>© 2026 GSSoC Contributions</p>
    </div>
  </div>

  <script>
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('overlay');
    const drawer = document.getElementById('drawer');

    function toggleDrawer(active) {
      if (active) {
        overlay.classList.add('active');
        drawer.classList.add('active');
        closeBtn.focus();
      } else {
        overlay.classList.remove('active');
        drawer.classList.remove('active');
        openBtn.focus();
      }
    }

    openBtn.addEventListener('click', () => toggleDrawer(true));
    closeBtn.addEventListener('click', () => toggleDrawer(false));
    overlay.addEventListener('click', () => toggleDrawer(false));

    // Handle escape key to close drawer
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && drawer.classList.contains('active')) {
        toggleDrawer(false);
      }
    });
  </script>
</body>
</html>
