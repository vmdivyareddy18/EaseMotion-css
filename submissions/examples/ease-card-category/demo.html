<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Card Category</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" style="--ease-category-color: #58a6ff;">
    <div class="category">Technology</div>
    <div class="content">
      <h2>Building Smarter Interfaces</h2>
      <p>Explore how modern UI frameworks simplify development and enhance user experience.</p>
    </div>
  </div>

  <div class="card" style="--ease-category-color: #238636;">
    <div class="category">Design</div>
    <div class="content">
      <h2>Color Theory in UI</h2>
      <p>Learn how color psychology influences user perception and engagement.</p>
    </div>
  </div>

  <script>
    // Smooth entrance animation
    document.querySelectorAll('.card').forEach((card, i) => {
      card.style.animationDelay = `${i * 0.2}s`;
      card.classList.add('enter');
    });
  </script>
</body>
</html>
