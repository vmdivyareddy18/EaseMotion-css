<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSS Logical Properties Utilities</title>
  <link rel="stylesheet" href="../../core/index.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; font-family: system-ui; }
    .box { background: #e5e7eb; border: 1px solid #9ca3af; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <h1>Logical Properties</h1>
  
  <div dir="ltr">
    <h2>LTR (Left to Right)</h2>
    <div class="box ease-p-inline-4 ease-m-inline-auto ease-size-full" style="width: 50%;">
      Centered block with padding
    </div>
    <div class="box ease-ms-4">
      Margin start (Left)
    </div>
  </div>

  <div dir="rtl" style="margin-top: 3rem;">
    <h2>RTL (Right to Left)</h2>
    <div class="box ease-p-inline-4 ease-m-inline-auto ease-size-full" style="width: 50%;">
      Centered block with padding
    </div>
    <div class="box ease-ms-4">
      Margin start (Right)
    </div>
  </div>
</body>
</html>
