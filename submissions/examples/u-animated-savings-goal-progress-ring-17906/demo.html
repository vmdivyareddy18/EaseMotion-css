<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Savings Goal Progress Ring</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Savings Goal Progress Ring</h1>

  <p class="intro">
    A reusable savings goal animation for banking apps,
    budgeting tools, and personal finance dashboards.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="savings-progress-ring">
        <div class="ring">
          <span class="target">🎯</span>
        </div>
      </div>
      <h3>75% Goal Complete</h3>
    </div>

    <div class="card">
      <div class="savings-progress-ring">
        <div class="ring large">
          <span class="target">🎯</span>
        </div>
      </div>
      <p>Emergency Fund</p>
    </div>

    <div class="card">
      <div class="savings-progress-ring">
        <div class="ring">
          <span class="target">🎯</span>
        </div>
      </div>
      <button>View Goal</button>
    </div>

  </div>

</div>

</body>
</html>
