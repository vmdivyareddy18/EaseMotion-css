<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Modal Popup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="modal-overlay">

    <div class="modal-box">

      <div class="close-btn">
        ✕
      </div>

      <h2 class="modal-title">
        Confirm Action
      </h2>

      <p class="modal-text">
        This animated modal popup demonstrates smooth scale transitions,
        overlay blur effects, and reusable UI interactions using pure CSS.
      </p>

      <a href="#" class="modal-btn">
        Continue
      </a>

    </div>

  </div>

</body>
</html>
