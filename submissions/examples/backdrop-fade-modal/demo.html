<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backdrop Fade Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="openBtn">Open Modal</button>
  <dialog id="modal" class="modal">
    <p>This is a modal dialog.</p>
    <button id="closeBtn">Close</button>
  </dialog>
  <script>
    document.getElementById('openBtn').addEventListener('click', () => document.getElementById('modal').showModal());
    document.getElementById('closeBtn').addEventListener('click', () => document.getElementById('modal').close());
  </script>
</body>
</html>
