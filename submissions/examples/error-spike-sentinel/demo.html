<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Spike Sentinel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="sentinel">
    <section class="hero">
      <p>Reliability Watch</p>
      <h1>Error Spike Sentinel</h1>
      <span>Spike confidence: 82%</span>
    </section>

    <section class="signals" aria-label="Error spike signals">
      <article>
        <strong>5xx rate</strong>
        <span class="danger">2.8%</span>
        <p>Above baseline for six consecutive windows.</p>
      </article>
      <article>
        <strong>Region drift</strong>
        <span class="warning">East</span>
        <p>One region accounts for 61% of new failures.</p>
      </article>
      <article>
        <strong>Recovery trend</strong>
        <span class="stable">Improving</span>
        <p>Retries are falling after cache warmup.</p>
      </article>
    </section>
  </main>
</body>
</html>
