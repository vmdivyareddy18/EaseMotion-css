<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hamburger Menu Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 3rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .demo-box {
      margin-top: 3rem;
      padding: 3rem;
      background-color: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animated Hamburger Icon</h1>
    <p>A pure CSS icon animation that elegantly morphs three menu bars into a close (X) icon when toggled.</p>
    
    <div class="demo-box">
      <!-- Hamburger Icon Button -->
      <button class="hamburger-btn" aria-label="Toggle menu" onclick="this.classList.toggle('is-active')">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
    
    <p style="margin-top: 2rem; font-size: 0.875rem; color: #64748b;">
      Click the icon to toggle the <code>.is-active</code> class and see the animation.
    </p>
  </div>
</body>
</html>
