<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-gps-locating – GPS Location Pulse</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-900 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-text-center">
    <!-- GPS pin with pulse rings -->
    <div class="gps-container">
      <!-- Expanding rings -->
      <div class="gps-ring gps-ring--1"></div>
      <div class="gps-ring gps-ring--2"></div>
      <div class="gps-ring gps-ring--3"></div>
      <!-- Pin icon -->
      <div class="gps-pin ease-bg-blue-500">
        <div class="gps-pin-inner"></div>
      </div>
    </div>
    <p class="ease-text-white ease-mt-6 ease-text-lg ease-fade-in ease-delay-500">
      Searching for GPS signal...
    </p>
  </div>

</body>
</html>
