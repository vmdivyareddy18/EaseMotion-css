<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Number Counter - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stats-container-qn">
        <h2 class="stats-title-qn">Our Impact</h2>
        <p class="stats-subtitle-qn">Numbers that speak for themselves</p>
        
        <div class="stats-grid-qn">
            <!-- Stat 1 -->
            <div class="stat-card-qn">
                <div class="stat-number-qn" data-target="1500">0</div>
                <div class="stat-label-qn">Happy Clients</div>
            </div>
            
            <!-- Stat 2 -->
            <div class="stat-card-qn">
                <div class="stat-number-qn" data-target="250">0</div>
                <div class="stat-label-qn">Projects Completed</div>
            </div>
            
            <!-- Stat 3 -->
            <div class="stat-card-qn">
                <div class="stat-number-qn" data-target="98">0</div>
                <div class="stat-label-qn">Success Rate %</div>
            </div>
            
            <!-- Stat 4 -->
            <div class="stat-card-qn">
                <div class="stat-number-qn" data-target="24">0</div>
                <div class="stat-label-qn">Support Hours</div>
            </div>
        </div>
    </div>
</body>
</html>
