<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shake X Validation (Accessible) Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    form {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 280px;
    }

    input {
      padding: 0.8rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      padding: 0.8rem;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <form novalidate onsubmit="return checkValidity(event)">
    <div>
      <input
        class="shake-x-validate"
        type="email"
        required
        placeholder="Enter Email"
        aria-describedby="email-error"
      />
      <span class="shake-x-error-message" id="email-error" aria-live="polite">
        Please enter a valid email address.
      </span>
    </div>

    <button type="submit">Submit</button>
  </form>

  <script>
    // Demo only: forces validation UI to show on submit attempt.
    // The shake/error-message CSS itself requires no JS.
    function checkValidity(e) {
      const input = document.querySelector('.shake-x-validate');
      if (!input.checkValidity()) {
        e.preventDefault();
        input.reportValidity();
      }
    }
  </script>

</body>
</html>
