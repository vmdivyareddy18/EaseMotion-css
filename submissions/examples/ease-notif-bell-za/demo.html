<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Bell - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="nb-hd"><h1>Notification Bell</h1><p>CSS notification indicators</p></header>
<section class="nb-sc"><h2>Bell Variants</h2>
<div class="nb-row"><div class="nb-bell-wrap"><button class="nb-bell">&#128276;</button><span class="nb-badge nb-bdg-danger">3</span></div><div class="nb-bell-wrap"><button class="nb-bell">&#128276;</button><span class="nb-badge nb-bdg-warn">8</span></div><div class="nb-bell-wrap"><button class="nb-bell">&#128276;</button><span class="nb-badge nb-bdg-info">1</span></div><div class="nb-bell-wrap"><button class="nb-bell">&#128276;</button><span class="nb-badge nb-bdg-dot"></span></div></div>
</section>
<section class="nb-sc"><h2>Notification Dropdown</h2>
<div class="nb-drop"><div class="nb-drop-hdr"><span class="nb-bell">&#128276;</span> Notifications <span class="nb-badge nb-bdg-danger">3</span></div>
<div class="nb-drop-body">
<div class="nb-item nb-unread"><div class="nb-av">U</div><div class="nb-txt"><strong>New user signed up</strong><span class="nb-time">2m ago</span></div></div>
<div class="nb-item nb-unread"><div class="nb-av">P</div><div class="nb-txt"><strong>Payment received</strong><span class="nb-time">15m ago</span></div></div>
<div class="nb-item"><div class="nb-av">C</div><div class="nb-txt"><strong>Comment on post</strong><span class="nb-time">1h ago</span></div></div>
<div class="nb-item"><div class="nb-av">S</div><div class="nb-txt"><strong>System update</strong><span class="nb-time">3h ago</span></div></div>
</div>
<div class="nb-drop-ftr"><a href="#">View all</a></div>
</div>
</section>
<section class="nb-sc"><h2>Count Badges</h2>
<div class="nb-row"><div class="nb-badge-wrap"><button>Inbox</button><span class="nb-badge nb-bdg-danger">12</span></div><div class="nb-badge-wrap"><button>Messages</button><span class="nb-badge nb-bdg-warn">4</span></div><div class="nb-badge-wrap"><button>Updates</button><span class="nb-badge nb-bdg-primary">99+</span></div></div>
</section>
<footer class="ftr"><p>EaseMotion - Notification Bell | GSSoC 2026</p></footer>
</body>
</html>
