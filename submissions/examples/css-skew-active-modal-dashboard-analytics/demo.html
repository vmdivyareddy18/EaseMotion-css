<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skew Active Dashboard Modal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="dashboard-card">

        <h2>Analytics Dashboard</h2>

        <p>
            Monitor revenue, user growth and performance insights
            with an interactive analytics modal.
        </p>

        <a href="#modal" class="btn">
            View Dashboard
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dashboard-title">

        <a href="#" class="close">&times;</a>

        <h2 id="dashboard-title">
            Dashboard Overview
        </h2>

        <div class="stats">

            <div class="stat-card">
                <h3>Revenue</h3>
                <span>$42.8K</span>
            </div>

            <div class="stat-card">
                <h3>Users</h3>
                <span>12.4K</span>
            </div>

            <div class="stat-card">
                <h3>Conversion</h3>
                <span>8.6%</span>
            </div>

        </div>

        <button class="action-btn">
            View Full Report
        </button>

    </div>

</div>

</body>
</html>
