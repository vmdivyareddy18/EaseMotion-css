<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotlight Follow</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Spotlight Follow Cursor</h1>
  <p>Move your cursor over the cards to see the spotlight effect.</p>
  <div class="spotlight-card" id="spotlight1">
    <div class="spotlight-overlay"></div>
    <h3>Premium Card</h3>
    <p>Move your cursor here to see the effect.</p>
    <button>Get Started</button>
  </div>
  <div class="spotlight-card dark" id="spotlight2">
    <div class="spotlight-overlay"></div>
    <h3>Dark Variant</h3>
    <p>Inverted colors work great on dark backgrounds too.</p>
  </div>
</div>
<script>
function initSpotlight(id) {
  const card = document.getElementById(id);
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty('--sx', (e.clientX - rect.left) + 'px');
    card.style.setProperty('--sy', (e.clientY - rect.top) + 'px');
  });
  card.addEventListener('mouseleave', () => { card.style.setProperty('--sx', '50%'); card.style.setProperty('--sy', '50%'); });
}
initSpotlight('spotlight1'); initSpotlight('spotlight2');
</script>
</body></html>
