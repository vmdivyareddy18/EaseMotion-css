<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>countdown timer display component</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; max-width: 900px; margin: 0 auto; }
    h1   { color: #a09af8; font-size: 1.3rem; margin-bottom: 0.4rem; }
    .note { color: #64748b; font-size: 0.875rem; margin-bottom: 2rem; }
    .box  { background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; padding: 2rem; }
  </style>
</head>
<body>
  <h1>countdown timer display component</h1>
  <p class="note">Open in browser to see component with linked style.css applied.</p>
  <div class="box">
  <div class="ease-countdown">
    
    <div class="ease-countdown-unit">
      <div class="ease-countdown-value">10</div>
      <div class="ease-countdown-label">Days</div>
    </div>

    <div class="ease-countdown-sep">:</div>

    <div class="ease-countdown-unit">
      <div class="ease-countdown-value">05</div>
      <div class="ease-countdown-label">Hours</div>
    </div>

    <div class="ease-countdown-sep">:</div>

    <div class="ease-countdown-unit">
      <div class="ease-countdown-value">32</div>
      <div class="ease-countdown-label">Min</div>
    </div>

  </div>
</div>
</body>
</html>
