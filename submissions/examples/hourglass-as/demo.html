<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hourglass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="hourglass">
    <span class="cap top"></span>
    <div class="bulbs">
      <div class="bulb up">
        <span class="sand top-sand"></span>
      </div>
      <span class="stream"></span>
      <div class="bulb down">
        <span class="sand bottom-sand"></span>
      </div>
    </div>
    <span class="cap bottom"></span>
  </div>
</body>
</html>
