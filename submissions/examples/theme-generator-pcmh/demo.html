<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Theme Generator — EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>🎨 Theme Generator</h1>
  <p class="subtitle">Tweak colors, radius, speed, and shadow — preview live, then copy the CSS</p>

  <div class="generator-grid">
    <!-- Controls -->
    <div class="controls-panel">
      <h2>Controls</h2>

      <div class="section-title">Colors</div>
      <div class="control-group">
        <label>Primary <span id="primary-val">#6c63ff</span></label>
        <input type="color" id="primary" value="#6c63ff">
      </div>
      <div class="control-group">
        <label>Success <span id="success-val">#22c55e</span></label>
        <input type="color" id="success" value="#22c55e">
      </div>
      <div class="control-group">
        <label>Danger <span id="danger-val">#ef4444</span></label>
        <input type="color" id="danger" value="#ef4444">
      </div>
      <div class="control-group">
        <label>Warning <span id="warning-val">#f59e0b</span></label>
        <input type="color" id="warning" value="#f59e0b">
      </div>
      <div class="control-group">
        <label>Surface <span id="surface-val">#ffffff</span></label>
        <input type="color" id="surface" value="#ffffff">
      </div>

      <div class="section-title">Borders & Speed</div>
      <div class="control-group">
        <label>Border Radius (px) <span id="radius-val">8</span></label>
        <input type="range" id="radius" min="0" max="24" value="8">
      </div>
      <div class="control-group">
        <label>Animation Speed (ms) <span id="speed-val">400</span></label>
        <input type="range" id="speed" min="100" max="1000" value="400" step="50">
      </div>

      <div class="section-title">Shadows</div>
      <div class="control-group">
        <label>Shadow Opacity (%) <span id="shadow-val">15</span></label>
        <input type="range" id="shadow" min="0" max="40" value="15">
      </div>

      <button class="copy-btn" id="copyBtn">📋 Copy CSS</button>
      <div class="css-output" id="cssOutput"></div>
    </div>

    <!-- Preview -->
    <div class="preview-panel">
      <h2>Live Preview</h2>

      <div class="preview-section">
        <h3>Buttons</h3>
        <div class="flex-row">
          <button class="ease-btn ease-btn-primary">Primary</button>
          <button class="ease-btn ease-btn-success">Success</button>
          <button class="ease-btn ease-btn-danger">Danger</button>
          <button class="ease-btn ease-btn-warning">Warning</button>
          <button class="ease-btn ease-btn-outline">Outline</button>
        </div>
      </div>

      <div class="preview-section">
        <h3>Cards</h3>
        <div class="flex-row">
          <div class="ease-card" style="padding: 1rem; max-width: 200px;">
            <strong>Default Card</strong>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 0.25rem;">With some content</p>
          </div>
          <div class="ease-card ease-card-hover" style="padding: 1rem; max-width: 200px;">
            <strong>Hover Card</strong>
            <p style="font-size: 0.8rem; color: #64748b; margin-top: 0.25rem;">Hover over me</p>
          </div>
        </div>
      </div>

      <div class="preview-section">
        <h3>Form Elements</h3>
        <div class="flex-col">
          <input class="ease-input" type="text" placeholder="Text input" style="max-width: 300px;">
          <select class="ease-select" style="max-width: 300px;">
            <option>Option 1</option>
            <option>Option 2</option>
          </select>
        </div>
      </div>

      <div class="preview-section">
        <h3>Animations</h3>
        <div class="flex-row">
          <span class="ease-fade-in" style="display: inline-block;">Fade In</span>
          <span class="ease-slide-up" style="display: inline-block;">Slide Up</span>
          <span class="ease-hover-grow" style="display: inline-block; cursor: default;">Hover Grow</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const vars = [
      { id: 'primary',   prop: '--ease-color-primary',   el: null },
      { id: 'success',   prop: '--ease-color-success',   el: null },
      { id: 'danger',    prop: '--ease-color-danger',    el: null },
      { id: 'warning',   prop: '--ease-color-warning',   el: null },
      { id: 'surface',   prop: '--ease-color-surface',   el: null },
      { id: 'radius',    prop: '--ease-radius-md',       el: null, unit: 'px' },
      { id: 'speed',     prop: '--ease-speed-medium',    el: null, unit: 'ms' },
    ];

    const root = document.documentElement;
    const copyBtn = document.getElementById('copyBtn');
    const cssOutput = document.getElementById('cssOutput');

    vars.forEach(v => {
      v.el = document.getElementById(v.id);
      const valEl = document.getElementById(v.id + '-val');
      v.el.addEventListener('input', () => {
        let val = v.el.value;
        if (v.unit) val += v.unit;
        if (v.id === 'shadow') {
          const pct = v.el.value;
          root.style.setProperty('--ease-shadow-opacity', (pct / 100).toString());
          valEl.textContent = pct + '%';
        } else if (v.unit) {
          valEl.textContent = v.el.value + v.unit;
          root.style.setProperty(v.prop, val);
        } else {
          valEl.textContent = v.el.value;
          root.style.setProperty(v.prop, val);
        }
      });
    });

    copyBtn.addEventListener('click', () => {
      let css = ':root {\n';
      vars.forEach(v => {
        let val = v.unit ? v.el.value + v.unit : v.el.value;
        css += `  ${v.prop}: ${val};\n`;
      });
      const shadowPct = document.getElementById('shadow').value;
      css += `  --ease-shadow-opacity: ${(shadowPct / 100)};\n`;
      css += '}';
      navigator.clipboard.writeText(css).then(() => {
        copyBtn.textContent = '✅ Copied!';
        copyBtn.classList.add('copied');
        cssOutput.textContent = css;
        cssOutput.classList.add('visible');
        setTimeout(() => {
          copyBtn.textContent = '📋 Copy CSS';
          copyBtn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
