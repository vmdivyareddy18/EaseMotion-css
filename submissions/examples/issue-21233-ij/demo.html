<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crosshair | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="reveal-container">
    <div class="crosshair">
      <div class="cross-line-h"></div>
      <div class="cross-line-v"></div>
      <div class="cross-ring"></div>
      <div class="cross-center"></div>
      <span class="cross-tick cross-tick-t"></span>
      <span class="cross-tick cross-tick-b"></span>
      <span class="cross-tick cross-tick-l"></span>
      <span class="cross-tick cross-tick-r"></span>
    </div>
    <p class="cross-label">Crosshair</p>
  </div>
</body>
</html>
