<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ancl-wrapper">
    <h1>Analog Clock</h1>
    <div class="ancl-clock" id="anclClock">
      <div class="ancl-center-dot"></div>
      <div class="ancl-hand ancl-hour" id="anclHour"></div>
      <div class="ancl-hand ancl-minute" id="anclMinute"></div>
      <div class="ancl-hand ancl-second" id="anclSecond"></div>
      <div class="ancl-tick ancl-tick-12">XII</div>
      <div class="ancl-tick ancl-tick-1">I</div>
      <div class="ancl-tick ancl-tick-2">II</div>
      <div class="ancl-tick ancl-tick-3">III</div>
      <div class="ancl-tick ancl-tick-4">IV</div>
      <div class="ancl-tick ancl-tick-5">V</div>
      <div class="ancl-tick ancl-tick-6">VI</div>
      <div class="ancl-tick ancl-tick-7">VII</div>
      <div class="ancl-tick ancl-tick-8">VIII</div>
      <div class="ancl-tick ancl-tick-9">IX</div>
      <div class="ancl-tick ancl-tick-10">X</div>
      <div class="ancl-tick ancl-tick-11">XI</div>
    </div>
    <div class="ancl-digital" id="anclDigital">00:00:00</div>
  </div>
  <script>
    (function() {
      var hourEl = document.getElementById('anclHour');
      var minuteEl = document.getElementById('anclMinute');
      var secondEl = document.getElementById('anclSecond');
      var digitalEl = document.getElementById('anclDigital');

      function updateClock() {
        var now = new Date();
        var h = now.getHours();
        var m = now.getMinutes();
        var s = now.getSeconds();
        var ms = now.getMilliseconds();

        var hDeg = (h % 12) * 30 + m * 0.5;
        var mDeg = m * 6 + s * 0.1;
        var sDeg = s * 6 + ms * 0.006;

        hourEl.style.transform = 'rotate(' + hDeg + 'deg)';
        minuteEl.style.transform = 'rotate(' + mDeg + 'deg)';
        secondEl.style.transform = 'rotate(' + sDeg + 'deg)';

        digitalEl.textContent =
          String(h).padStart(2, '0') + ':' +
          String(m).padStart(2, '0') + ':' +
          String(s).padStart(2, '0');
      }

      updateClock();
      setInterval(updateClock, 50);
    })();
  </script>
</body>
</html>
