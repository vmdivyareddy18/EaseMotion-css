<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inline Search Field UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Inline Search Field UI Example</h1>
      <p>Modern search input patterns with icon styling and animated focus borders.</p>
    </header>

    <section class="search-grid">
      <label class="search-field">
        <span class="search-field__icon">🔍</span>
        <input type="search" placeholder="Search articles" />
      </label>

      <label class="search-field search-field--accent">
        <span class="search-field__icon">🔍</span>
        <input type="search" placeholder="Find products" />
      </label>

      <label class="search-field search-field--filled">
        <span class="search-field__icon">🔎</span>
        <input type="search" placeholder="Search everything" />
      </label>
    </section>
  </main>
</body>
</html>
