<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-transaction-list-stagger</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Transaction List Stagger</h1>
    <p class="subtitle">
        Finance transactions with staggered entrance animation
    </p>

    <div class="transaction-card">

        <div class="transaction income delay1">
            <div>
                <h3>Salary Deposit</h3>
                <p>June Payroll</p>
            </div>
            <span class="amount positive">+$2,500</span>
        </div>

        <div class="transaction expense delay2">
            <div>
                <h3>Grocery Store</h3>
                <p>Food & Essentials</p>
            </div>
            <span class="amount negative">-$85</span>
        </div>

        <div class="transaction income delay3">
            <div>
                <h3>Freelance Payment</h3>
                <p>Project Income</p>
            </div>
            <span class="amount positive">+$750</span>
        </div>

        <div class="transaction expense delay4">
            <div>
                <h3>Electric Bill</h3>
                <p>Utilities</p>
            </div>
            <span class="amount negative">-$120</span>
        </div>

        <div class="transaction income delay5">
            <div>
                <h3>Cashback Reward</h3>
                <p>Credit Card Bonus</p>
            </div>
            <span class="amount positive">+$35</span>
        </div>

    </div>

</div>

</body>
</html>
