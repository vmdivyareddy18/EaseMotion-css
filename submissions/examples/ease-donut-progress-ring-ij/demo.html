<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donut Progress Ring - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>Donut Progress Ring</h1>
    <p class="subtitle">SVG circle that fills with a smooth stroke-dashoffset animation.</p>

    <div class="ring-wrapper">
      <div class="dpr-ring" id="dprRing">
        <svg viewBox="0 0 140 140" class="dpr-svg">
          <circle cx="70" cy="70" r="58" class="dpr-track" />
          <circle cx="70" cy="70" r="58" class="dpr-fill" id="dprFill" />
        </svg>
        <span class="dpr-text" id="dprText">0%</span>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnReplay">Replay</button>
      <button class="btn" id="btn25">25%</button>
      <button class="btn" id="btn50">50%</button>
      <button class="btn" id="btn75">75%</button>
      <button class="btn" id="btn100">100%</button>
    </div>

    <div class="slider-row">
      <label for="dprSlider">Drag to change:</label>
      <input type="range" id="dprSlider" min="0" max="100" value="0" class="dpr-slider">
    </div>
  </div>

  <script>
    const fill = document.getElementById('dprFill');
    const text = document.getElementById('dprText');
    const slider = document.getElementById('dprSlider');
    const radius = 58;
    const circumference = 2 * Math.PI * radius;

    fill.style.strokeDasharray = circumference;
    fill.style.strokeDashoffset = circumference;

    let currentValue = 0;

    function setProgress(val) {
      const clamped = Math.min(100, Math.max(0, val));
      const offset = circumference - (clamped / 100) * circumference;
      fill.style.strokeDashoffset = offset;
      text.textContent = Math.round(clamped) + '%';
      currentValue = clamped;
      slider.value = clamped;
    }

    function animateTo(target) {
      const start = currentValue;
      const diff = target - start;
      const duration = 600;
      const startTime = performance.now();

      function step(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        setProgress(start + diff * eased);
        if (t < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    document.getElementById('btnReplay').addEventListener('click', () => {
      setProgress(0);
      setTimeout(() => animateTo(currentValue || 75), 200);
    });

    document.getElementById('btn25').addEventListener('click', () => animateTo(25));
    document.getElementById('btn50').addEventListener('click', () => animateTo(50));
    document.getElementById('btn75').addEventListener('click', () => animateTo(75));
    document.getElementById('btn100').addEventListener('click', () => animateTo(100));

    slider.addEventListener('input', () => {
      setProgress(parseFloat(slider.value));
    });

    animateTo(75);
  </script>
</body>
</html>
