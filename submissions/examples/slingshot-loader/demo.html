<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slingshot Loader</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Slingshot Loader</h1>
  <p class="subtitle">Glassmorphism-inspired loading animation</p>

  <div class="loader-wrapper" aria-label="Loading" role="status">
    <!-- Slingshot frame -->
    <div class="slingshot-frame">
      <!-- Left arm -->
      <div class="slingshot-arm left-arm"></div>
      <!-- Right arm -->
      <div class="slingshot-arm right-arm"></div>
      <!-- Rubber band -->
      <div class="rubber-band"></div>
      <!-- Pouch with projectile -->
      <div class="pouch">
        <div class="projectile"></div>
      </div>
    </div>

    <!-- Three dots that fire sequentially -->
    <div class="dot-row">
      <div class="dot dot-1"></div>
      <div class="dot dot-2"></div>
      <div class="dot dot-3"></div>
    </div>
  </div>

  <div class="variants">
    <h2>Variants</h2>

    <section>
      <h3>Small</h3>
      <div class="loader-wrapper small" aria-label="Loading" role="status">
        <div class="slingshot-frame">
          <div class="slingshot-arm left-arm"></div>
          <div class="slingshot-arm right-arm"></div>
          <div class="rubber-band"></div>
          <div class="pouch"><div class="projectile"></div></div>
        </div>
        <div class="dot-row">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
      </div>
    </section>

    <section>
      <h3>Large</h3>
      <div class="loader-wrapper large" aria-label="Loading" role="status">
        <div class="slingshot-frame">
          <div class="slingshot-arm left-arm"></div>
          <div class="slingshot-arm right-arm"></div>
          <div class="rubber-band"></div>
          <div class="pouch"><div class="projectile"></div></div>
        </div>
        <div class="dot-row">
          <div class="dot dot-1"></div>
          <div class="dot dot-2"></div>
          <div class="dot dot-3"></div>
        </div>
      </div>
    </section>

    <section>
      <h3>Color Variants</h3>
      <div class="color-row">
        <div class="loader-wrapper color-primary" aria-label="Loading" role="status">
          <div class="slingshot-frame">
            <div class="slingshot-arm left-arm"></div>
            <div class="slingshot-arm right-arm"></div>
            <div class="rubber-band"></div>
            <div class="pouch"><div class="projectile"></div></div>
          </div>
        </div>
        <div class="loader-wrapper color-neon" aria-label="Loading" role="status">
          <div class="slingshot-frame">
            <div class="slingshot-arm left-arm"></div>
            <div class="slingshot-arm right-arm"></div>
            <div class="rubber-band"></div>
            <div class="pouch"><div class="projectile"></div></div>
          </div>
        </div>
        <div class="loader-wrapper color-rose" aria-label="Loading" role="status">
          <div class="slingshot-frame">
            <div class="slingshot-arm left-arm"></div>
            <div class="slingshot-arm right-arm"></div>
            <div class="rubber-band"></div>
            <div class="pouch"><div class="projectile"></div></div>
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

</body>
</html>
