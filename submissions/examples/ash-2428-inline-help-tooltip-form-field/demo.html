<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inline Help Tooltip Form Field</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="form-card">

        <h1>Create Account</h1>

        <p>
            Fill in your details below.
        </p>

        <div class="field">

            <div class="label-row">

                <label for="username">
                    Username
                </label>

                <div class="tooltip-wrapper">

                    <span class="help-icon">
                        ?
                    </span>

                    <div class="tooltip">

                        Usernames must be
                        4–20 characters and
                        contain only letters,
                        numbers, or underscores.

                    </div>

                </div>

            </div>

            <input
                type="text"
                id="username"
                placeholder="Enter username"
            >

        </div>

        <div class="field">

            <div class="label-row">

                <label for="password">
                    Password
                </label>

                <div class="tooltip-wrapper">

                    <span class="help-icon">
                        ?
                    </span>

                    <div class="tooltip">

                        Use at least 8 characters
                        including uppercase,
                        lowercase, and numbers.

                    </div>

                </div>

            </div>

            <input
                type="password"
                id="password"
                placeholder="Enter password"
            >

        </div>

        <button class="submit-btn">
            Continue
        </button>

    </div>

</div>

</body>
</html>
