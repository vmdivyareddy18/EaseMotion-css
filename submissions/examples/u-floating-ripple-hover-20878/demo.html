<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Ripple Hover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="hero">
    <h1>Floating Ripple Hover</h1>
    <p>
        Hover over the elements below to see a smooth floating motion
        combined with a soft expanding ripple animation.
    </p>
</header>

<main class="container">

    <button class="floating-ripple-hover purple">
        Get Started
    </button>

    <button class="floating-ripple-hover blue">
        Download
    </button>

    <button class="floating-ripple-hover green">
        Continue
    </button>

    <button class="floating-ripple-hover orange">
        Subscribe
    </button>

    <div class="card floating-ripple-hover">
        <h2>Premium Card</h2>
        <p>
            Hover to experience the floating ripple interaction.
        </p>
    </div>

    <div class="card floating-ripple-hover">
        <h2>Feature Box</h2>
        <p>
            The ripple originates from the center and expands outward.
        </p>
    </div>

    <div class="icon-row">
        <div class="icon floating-ripple-hover">⭐</div>
        <div class="icon floating-ripple-hover">🚀</div>
        <div class="icon floating-ripple-hover">💎</div>
        <div class="icon floating-ripple-hover">🎯</div>
    </div>

</main>

</body>
</html>
