<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="modal-toggle" class="ease-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button (Label linked to the checkbox) -->
  <label for="modal-toggle" class="ease-modal-trigger-um" tabindex="0">
    Open Animated Modal
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-modal-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="modal-toggle" class="ease-modal-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-modal-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="modal-toggle" class="ease-modal-close-icon-um" aria-label="Close Modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Content -->
      <h2 id="modal-title" class="ease-modal-title-um">Accessibility First</h2>
      <p class="ease-modal-desc-um">
        This modal is powered entirely by CSS. It features a spring-eased scale-up transition when opened, and subtle scale-hover micro-interactions on the buttons and the modal window itself to provide tactile feedback.
      </p>
      
      <!-- Action Button -->
      <label for="modal-toggle" class="ease-modal-close-btn-um">
        Acknowledge & Close
      </label>
      
    </div>
  </div>

</body>
</html>
