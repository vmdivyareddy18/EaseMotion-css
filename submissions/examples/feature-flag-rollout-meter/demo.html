<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Flag Rollout Meter Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 60px 20px; margin: 0;">

  <div class="devops-meter-card">
    <div style="margin-bottom: 1.75rem;">
      <h4 style="margin: 0 0 4px 0; color: #0f172a; font-size: 1.25rem;">Production Traffic Gates</h4>
      <p style="margin: 0; color: #64748b; font-size: 0.85rem;">Monitors progressive target distribution weights across isolated canary micro-clusters.</p>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
      
      <div class="ease-meter-shell">
        <div class="ease-meter-meta">
          <div class="ease-flag-identity">
            <h5 class="ease-flag-name">Next-Gen GraphQL Engine</h5>
            <span class="ease-flag-key">v4-graphql-resolver-router</span>
          </div>
          <span class="ease-percentage-callout">65%</span>
        </div>
        <div class="ease-meter-track-wrapper">
          <div class="ease-meter-track">
            <div class="ease-meter-fill-active" style="width: 65%;"></div>
            <div class="ease-meter-fill-remainder" style="width: 35%;"></div>
          </div>
          <div class="traffic-allocation-legend">
            <span>Canary: 65%</span>
            <span>Baseline: 35%</span>
          </div>
        </div>
      </div>

      <div class="ease-meter-shell">
        <div class="ease-meter-meta">
          <div class="ease-flag-identity">
            <h5 class="ease-flag-name">Real-Time Fraud Filter AI</h5>
            <span class="ease-flag-key">security-edge-ml-triage</span>
          </div>
          <span class="ease-percentage-callout" style="color: #4f46e5;">10%</span>
        </div>
        <div class="ease-meter-track-wrapper">
          <div class="ease-meter-track">
            <div class="ease-meter-fill-active" style="width: 10%; background-color: #4f46e5;"></div>
            <div class="ease-meter-fill-remainder" style="width: 90%;"></div>
          </div>
          <div class="traffic-allocation-legend">
            <span>Canary: 10%</span>
            <span>Baseline: 90%</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
