<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outline Badge Variants — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 5rem 1rem; margin: 0;">

  <div class="ease-badge-showcase-panel">
    
    <div style="margin-bottom: 1.75rem;">
      <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.25rem;">Meta Information Tags</h3>
      <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Preview the structural layout footprint of the new outline badge token variants.</p>
    </div>

    <div style="margin-bottom: 1.5rem;">
      <span style="display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem;">Default Balance</span>
      <div class="ease-badge-row">
        <span class="ease-badge ease-badge-outline">Standard Tag</span>
        <span class="ease-badge ease-badge-outline">v2.4.0</span>
      </div>
    </div>

    <div>
      <span style="display: block; font-size: 0.75rem; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 0.5rem;">Contextual States</span>
      <div class="ease-badge-row">
        <span class="ease-badge ease-badge-outline-primary">Feature</span>
        <span class="ease-badge ease-badge-outline-success">Active</span>
        <span class="ease-badge ease-badge-outline-warning">Pending</span>
        <span class="ease-badge ease-badge-outline-danger">Closed</span>
      </div>
    </div>

  </div>

</body>
</html>
