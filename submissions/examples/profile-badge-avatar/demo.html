<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Badge Avatar Demo</title>
  <link rel="stylesheet" href="../../../src/ease-motion.css"> 
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Profile Badge Avatar Layouts</h1>
  <p>Hover over the avatars to preview the smooth utility-scaled micro-interactions.</p>

  <div class="avatar-container">
    <div class="avatar-wrapper">
      <div class="ease-avatar-hover">
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="User Profile">
      </div>
      <span class="status-badge online"></span>
    </div>

    <div class="avatar-wrapper">
      <div class="ease-avatar-hover" style="--ease-avatar-scale: 1.15; --ease-avatar-duration: 0.25s;">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=150&h=150&q=80" alt="User Profile">
      </div>
      <span class="status-badge verified">✓</span>
    </div>

    <div class="avatar-wrapper">
      <div class="ease-avatar-hover" style="--ease-avatar-scale: 1.08;">
        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=150&h=150&q=80" alt="User Profile">
      </div>
      <span class="status-badge notification">3</span>
    </div>
  </div>

</body>
</html>
