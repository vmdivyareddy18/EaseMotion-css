<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spotlight Hover Effect Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #0f172a;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
      padding: 2rem;
    }

    .ease-spotlight-card {
      width: 240px;
    }
  </style>
</head>
<body>

  <div class="ease-spotlight-card" onmousemove="spotlight(event, this)">
    <h3>Spotlight Card</h3>
    <p>Move your mouse to see the glow follow your cursor.</p>
  </div>

  <div class="ease-spotlight-card" onmousemove="spotlight(event, this)">
    <h3>Another Card</h3>
    <p>Each card has its own independent spotlight.</p>
  </div>

  <script>
    function spotlight(e, card) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--ease-spotlight-x', x + 'px');
      card.style.setProperty('--ease-spotlight-y', y + 'px');
    }
  </script>

</body>
</html>
