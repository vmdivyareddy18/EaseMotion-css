<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Slide-Up Modal</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <label for="modal-toggle" class="open-btn">
        Open Dashboard Modal
    </label>

    <input type="checkbox" id="modal-toggle">

    <div class="overlay">

        <div class="modal">

            <label for="modal-toggle" class="close-btn">&times;</label>

            <h2>Dashboard Panel</h2>

            <p>
                This responsive slide-up modal is built using only HTML and CSS.
                It supports smooth animations using CSS custom properties.
            </p>

            <div class="stats">

                <div class="card">
                    <h3>Users</h3>
                    <span>1,245</span>
                </div>

                <div class="card">
                    <h3>Revenue</h3>
                    <span>$12.8K</span>
                </div>

                <div class="card">
                    <h3>Orders</h3>
                    <span>352</span>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
