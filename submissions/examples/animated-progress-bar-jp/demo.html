<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Bar</title>

  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
  <h1>Animated Progress Bars</h1>
  <p>Modern progress indicators with smooth animations and style variants.</p>

  <!-- Basic -->
  <div class="progress-box">
    <div class="label">
      <span>HTML</span>
      <span>85%</span>
    </div>
    <div class="ease-progress">
      <div class="fill basic" style="--width:85%"></div>
    </div>
  </div>


  <!-- Gradient -->
  <div class="progress-box">
    <div class="label">
      <span>CSS</span>
      <span>70%</span>
    </div>
    <div class="ease-progress">
      <div class="fill gradient" style="--width:70%"></div>
    </div>
  </div>


  <!-- Rounded -->
  <div class="progress-box">
    <div class="label">
      <span>JavaScript</span>
      <span>60%</span>
    </div>
    <div class="ease-progress rounded">
      <div class="fill basic" style="--width:60%"></div>
    </div>
  </div>


  <!-- Striped -->
  <div class="progress-box">
    <div class="label">
      <span>React</span>
      <span>90%</span>
    </div>
    <div class="ease-progress">
      <div class="fill striped" style="--width:90%"></div>
    </div>
  </div>


  <!-- Compact -->
  <div class="progress-box">
    <div class="label">
      <span>Node.js</span>
      <span>45%</span>
    </div>
    <div class="ease-progress compact">
      <div class="fill basic" style="--width:45%"></div>
    </div>
  </div>

</div>

</body>
</html>
