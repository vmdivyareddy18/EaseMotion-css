<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Notification · EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Smart Notifications</h1>
    <div class="controls">
      <button class="btn btn--info" data-type="info">&#8505; Info</button>
      <button class="btn btn--success" data-type="success">&#10003; Success</button>
      <button class="btn btn--warning" data-type="warning">&#9888; Warning</button>
      <button class="btn btn--error" data-type="error">&#10005; Error</button>
    </div>
  </div>

  <div class="notifications" id="notifications"></div>

  <script>
    (function () {
      var types = {
        info:    { icon: '&#8505;',  msg: 'Your update has been processed.',        action: 'View' },
        success: { icon: '&#10003;', msg: 'Operation completed successfully.',      action: 'OK' },
        warning: { icon: '&#9888;',  msg: 'Please review your settings.',           action: 'Review' },
        error:   { icon: '&#10005;', msg: 'Something went wrong. Please try again.', action: 'Retry' }
      };

      function show(type) {
        var data = types[type];
        var container = document.getElementById('notifications');
        var el = document.createElement('div');
        el.className = 'notification notification--' + type;
        el.innerHTML =
          '<span class="notification__icon">' + data.icon + '</span>' +
          '<div class="notification__body">' +
            '<p class="notification__message">' + data.msg + '</p>' +
          '</div>' +
          '<button class="notification__action">' + data.action + '</button>' +
          '<button class="notification__close">&#10005;</button>' +
          '<div class="notification__progress"><span></span></div>';

        container.appendChild(el);

        requestAnimationFrame(function () {
          el.classList.add('notification--visible');
        });

        var progress = el.querySelector('.notification__progress span');
        requestAnimationFrame(function () {
          progress.style.transition = 'width 4s linear';
          progress.style.width = '0%';
        });

        var timer = setTimeout(function () { dismiss(el); }, 4000);
        el._timer = timer;

        el.querySelector('.notification__action').addEventListener('click', function () {
          clearTimeout(timer);
          dismiss(el);
        });
        el.querySelector('.notification__close').addEventListener('click', function () {
          clearTimeout(timer);
          dismiss(el);
        });
      }

      function dismiss(el) {
        if (el.classList.contains('notification--dismissing')) return;
        el.classList.remove('notification--visible');
        el.classList.add('notification--dismissing');
        el.addEventListener('transitionend', function () { el.remove(); }, { once: true });
      }

      document.querySelectorAll('.controls .btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          show(this.dataset.type);
        });
      });
    })();
  </script>
</body>
</html>
