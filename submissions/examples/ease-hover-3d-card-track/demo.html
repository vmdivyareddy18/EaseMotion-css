<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Card Hover – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="demo">
    <h1>3D Card – Cursor Tracking</h1>
    <div class="card-wrapper">
      <div class="card">
        <div class="card-content">
          <h2>EaseMotion</h2>
          <p>Hover and feel the depth.</p>
        </div>
      </div>
    </div>
  </section>
  <script>
    // Track mouse movement relative to the card wrapper
    const wrapper = document.querySelector('.card-wrapper');
    const card = wrapper.querySelector('.card');
    const maxTilt = 15; // degrees
    wrapper.addEventListener('mousemove', (e) => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left; // x position within wrapper
      const y = e.clientY - rect.top; // y position within wrapper
      const halfWidth = rect.width / 2;
      const halfHeight = rect.height / 2;
      const rotY = ((x - halfWidth) / halfWidth) * maxTilt; // left/right
      const rotX = ((halfHeight - y) / halfHeight) * maxTilt; // up/down
      card.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg) translateZ(0)`;
    });
    wrapper.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg) translateZ(0)';
    });
  </script>
</body>
</html>
