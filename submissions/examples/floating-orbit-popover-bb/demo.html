<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Floating Orbit Popover</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f0f13;
            color: #fff;
            padding: 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 0%, rgba(200, 180, 255, 0.15), transparent 60%);
        }
        
        h1 {
            color: #fff;
            margin-bottom: 5rem;
            font-weight: 300;
            letter-spacing: 1px;
            font-size: 1.5rem;
            text-align: center;
            opacity: 0.8;
        }
        
        .demo-container {
            display: flex;
            gap: 4rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        /* Portfolio aesthetic buttons */
        .portfolio-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2.5rem;
            font-size: 1rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        
        .portfolio-btn:hover, .portfolio-btn:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(200, 180, 255, 0.5);
            outline: none;
        }
        
        /* Popover content styling */
        .popover-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c8b4ff, #8ab4f8);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .popover-title {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .popover-subtitle {
            color: #a0a0a5;
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 1rem;
        }
        
        .popover-link {
            display: inline-block;
            color: var(--orbit-accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .popover-link:hover {
            opacity: 0.8;
        }

        /* Light theme overrides */
        .light-theme {
            --orbit-ring-color: rgba(0, 0, 0, 0.1);
            --orbit-ring-active: rgba(0, 100, 255, 0.4);
            --orbit-popover-bg: rgba(255, 255, 255, 0.8);
            --orbit-text: #333;
            --orbit-accent: #0064ff;
        }
        
        .light-theme-btn {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-color: #ddd;
        }
        
        .light-theme-btn:hover {
            background: #fff;
            border-color: #0064ff;
        }
        
        .light-theme .popover-subtitle {
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Creative Portfolio - Floating Orbit Popovers</h1>
    
    <div class="demo-container">
        <!-- Demo 1: Dark / Default -->
        <div class="orbit-trigger">
            <button class="portfolio-btn" aria-haspopup="true">Designer Profile</button>
            <div class="orbit-popover">
                <div class="orbit-connector"></div>
                <div class="popover-avatar">UI</div>
                <div class="popover-title">Alex Creative</div>
                <div class="popover-subtitle">Senior UX Designer & Interactive Developer specializing in WebGL.</div>
                <a href="#" class="popover-link">View Portfolio →</a>
            </div>
        </div>
        
        <!-- Demo 2: Light Theme / Custom Properties -->
        <div class="orbit-trigger light-theme">
            <button class="portfolio-btn light-theme-btn" aria-haspopup="true">Studio Contact</button>
            <div class="orbit-popover">
                <div class="orbit-connector"></div>
                <div class="popover-avatar" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);">ST</div>
                <div class="popover-title">Studio Element</div>
                <div class="popover-subtitle">Available for new design projects and brand identity work.</div>
                <a href="#" class="popover-link">Get in Touch →</a>
            </div>
        </div>
    </div>
</body>
</html>
