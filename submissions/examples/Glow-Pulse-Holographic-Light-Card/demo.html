<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse Holographic Light Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <span class="badge">HOLOGRAPHIC</span>

    <div class="avatar"></div>

    <h2>Light Interface</h2>

    <p>
        A futuristic holographic card with a smooth Glow Pulse animation,
        glassmorphism styling, and soft iridescent gradients powered entirely
        by HTML and CSS.
    </p>

    <div class="stats">

        <div>
            <strong>128</strong>
            <span>Projects</span>
        </div>

        <div>
            <strong>4.9★</strong>
            <span>Rating</span>
        </div>

        <div>
            <strong>24/7</strong>
            <span>Online</span>
        </div>

    </div>

    <button>View Profile</button>

</div>

</body>
</html>
