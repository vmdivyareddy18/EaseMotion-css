<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Reading Challenge Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="reading-card">

        <div class="badge">
            📚 Reading Champion
        </div>

        <h2>2026 Reading Challenge</h2>

        <p class="description">
            Track your reading journey and stay motivated to reach your annual goal.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Challenge Progress</span>
                <span>68%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>34</h3>
                <p>Books Completed</p>
            </div>

            <div class="stat-box">
                <h3>50</h3>
                <p>Annual Goal</p>
            </div>

        </div>

        <div class="pages-box">
            📖 Pages Read: 12,480
        </div>

        <div class="streak-box">
            🔥 Reading Streak: 22 Days
        </div>

        <div class="achievement-box">
            🏆 Achievement Unlocked: Book Explorer
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Continue Reading
            </button>

            <button class="secondary-btn">
                View Library
            </button>

        </div>

    </div>

</div>

</body>
</html>
