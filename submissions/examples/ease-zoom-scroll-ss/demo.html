<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-zoom-scroll-ss Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="spacer">
        <div>
          <h1>Scroll Down</h1>
          <p>The card scales based on scroll visibility progress.</p>
        </div>
      </section>

      <section
        class="ease-zoom-scroll-ss"
        data-zoom-scroll
        aria-label="Zoom scroll demo card"
      >
        <h2>ease-zoom-scroll</h2>
        <p>
          This element starts small and grows toward full scale as it enters the
          viewport and approaches the center observation region.
        </p>
        <p class="progress-row">
          zoom progress:
          <span class="progress-tag" data-progress-label>0.00</span>
        </p>
      </section>

      <section class="spacer">
        <div>
          <p>Keep scrolling up and down to see progress-linked zoom updates.</p>
        </div>
      </section>
    </main>

    <script>
      const zoomTarget = document.querySelector('[data-zoom-scroll]');
      const progressLabel = document.querySelector('[data-progress-label]');

      if (zoomTarget) {
        const updateProgress = (ratio) => {
          const safeRatio = Math.max(0, Math.min(1, ratio));
          zoomTarget.style.setProperty('--ease-zoom-progress', safeRatio.toFixed(4));
          if (progressLabel) {
            progressLabel.textContent = safeRatio.toFixed(2);
          }
        };

        const thresholds = [0, 0.25, 0.5, 0.75, 1];

        if ('IntersectionObserver' in window) {
          const observer = new IntersectionObserver(
            (entries) => {
              entries.forEach((entry) => {
                updateProgress(entry.intersectionRatio);
              });
            },
            {
              threshold: thresholds,
              root: null,
              rootMargin: '-20% 0px -20% 0px',
            }
          );

          observer.observe(zoomTarget);
        } else {
          // Fallback for older browsers: keep it fully visible instead of hidden/scaled down.
          updateProgress(1);
        }
      }
    </script>
  </body>
</html>
