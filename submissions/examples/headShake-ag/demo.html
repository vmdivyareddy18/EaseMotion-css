<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - HeadShake Animation</title>
    <!-- Include EaseMotion core if needed, though this demo works standalone with style.css -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>HeadShake Animation Demo</h1>
        <p>A demonstration of the <strong>headShake</strong> entry animation for EaseMotion CSS.</p>
        
        <div id="animatedElement" class="demo-box ease-headShake">
            Shake Me!
        </div>

        <div style="margin-top: 2rem;">
            <button class="btn" onclick="triggerAnimation()">Replay Animation</button>
        </div>
    </div>

    <script>
        function triggerAnimation() {
            const el = document.getElementById('animatedElement');
            // Remove the class
            el.classList.remove('ease-headShake');
            
            // Trigger reflow to restart animation
            void el.offsetWidth;
            
            // Add the class back
            el.classList.add('ease-headShake');
        }
    </script>
</body>
</html>
