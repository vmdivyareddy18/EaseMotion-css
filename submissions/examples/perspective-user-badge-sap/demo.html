<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective User Badge Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-bg-sap">

  <div class="perspective-container-sap">
    
    <div class="quadrant-grid-sap">
      <div class="quadrant-sap q-top-left"></div>
      <div class="quadrant-sap q-top-right"></div>
      <div class="quadrant-sap q-bottom-left"></div>
      <div class="quadrant-sap q-bottom-right"></div>
      
      <div class="badge-card-sap">
        <div class="shine-overlay-sap"></div>
        
        <div class="badge-content-sap">
          <div class="avatar-frame-sap">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" alt="User Profile Picture" class="avatar-sap">
            <div class="status-indicator-sap"></div>
          </div>
          
          <h3 class="user-name-sap">Alex Morgan</h3>
          <p class="user-role-sap">Creative Director</p>
          
          <div class="tag-row-sap">
            <span class="badge-tag-sap">PRO</span>
            <span class="badge-tag-sap">DESIGN</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
