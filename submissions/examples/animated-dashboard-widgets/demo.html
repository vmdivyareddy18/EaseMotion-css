<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Dashboard Widgets - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dashboard-container">
    <!-- Header -->
    <header class="dashboard-header ease-fade-in-down">
      <h1>Analytics Dashboard</h1>
      <p>Real-time metrics and performance indicators.</p>
    </header>

    <!-- Widgets Grid -->
    <div class="widgets-grid">
      
      <!-- Widget 1: Revenue -->
      <div class="widget ease-fade-in-up ease-delay-100 ease-hover-grow">
        <div class="widget-header">
          <span class="widget-icon revenue-icon">💰</span>
          <span class="widget-trend positive ease-pulse">
            <span class="trend-arrow">↑</span> 12.5%
          </span>
        </div>
        <div class="widget-content">
          <h3 class="widget-value">$48,295</h3>
          <p class="widget-label">Total Revenue</p>
        </div>
        <div class="sparkline">
          <div class="sparkline-bar" style="height: 40%;"></div>
          <div class="sparkline-bar" style="height: 60%;"></div>
          <div class="sparkline-bar" style="height: 45%;"></div>
          <div class="sparkline-bar" style="height: 80%;"></div>
          <div class="sparkline-bar" style="height: 65%;"></div>
          <div class="sparkline-bar" style="height: 90%;"></div>
          <div class="sparkline-bar" style="height: 100%;"></div>
        </div>
      </div>

      <!-- Widget 2: Users -->
      <div class="widget ease-fade-in-up ease-delay-200 ease-hover-grow">
        <div class="widget-header">
          <span class="widget-icon users-icon">👥</span>
          <span class="widget-trend positive ease-pulse ease-delay-100">
            <span class="trend-arrow">↑</span> 8.2%
          </span>
        </div>
        <div class="widget-content">
          <h3 class="widget-value">12,847</h3>
          <p class="widget-label">Active Users</p>
        </div>
        <div class="sparkline">
          <div class="sparkline-bar" style="height: 50%;"></div>
          <div class="sparkline-bar" style="height: 55%;"></div>
          <div class="sparkline-bar" style="height: 70%;"></div>
          <div class="sparkline-bar" style="height: 65%;"></div>
          <div class="sparkline-bar" style="height: 85%;"></div>
          <div class="sparkline-bar" style="height: 75%;"></div>
          <div class="sparkline-bar" style="height: 95%;"></div>
        </div>
      </div>

      <!-- Widget 3: Orders -->
      <div class="widget ease-fade-in-up ease-delay-300 ease-hover-grow">
        <div class="widget-header">
          <span class="widget-icon orders-icon">📦</span>
          <span class="widget-trend negative ease-pulse ease-delay-200">
            <span class="trend-arrow">↓</span> 3.1%
          </span>
        </div>
        <div class="widget-content">
          <h3 class="widget-value">1,429</h3>
          <p class="widget-label">New Orders</p>
        </div>
        <div class="sparkline">
          <div class="sparkline-bar" style="height: 80%;"></div>
          <div class="sparkline-bar" style="height: 75%;"></div>
          <div class="sparkline-bar" style="height: 60%;"></div>
          <div class="sparkline-bar" style="height: 70%;"></div>
          <div class="sparkline-bar" style="height: 55%;"></div>
          <div class="sparkline-bar" style="height: 65%;"></div>
          <div class="sparkline-bar" style="height: 50%;"></div>
        </div>
      </div>

      <!-- Widget 4: Conversion -->
      <div class="widget ease-fade-in-up ease-delay-400 ease-hover-grow">
        <div class="widget-header">
          <span class="widget-icon conversion-icon">🎯</span>
          <span class="widget-trend positive ease-pulse ease-delay-300">
            <span class="trend-arrow">↑</span> 5.7%
          </span>
        </div>
        <div class="widget-content">
          <h3 class="widget-value">3.24%</h3>
          <p class="widget-label">Conversion Rate</p>
        </div>
        <div class="sparkline">
          <div class="sparkline-bar" style="height: 30%;"></div>
          <div class="sparkline-bar" style="height: 45%;"></div>
          <div class="sparkline-bar" style="height: 40%;"></div>
          <div class="sparkline-bar" style="height: 60%;"></div>
          <div class="sparkline-bar" style="height: 55%;"></div>
          <div class="sparkline-bar" style="height: 75%;"></div>
          <div class="sparkline-bar" style="height: 85%;"></div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
