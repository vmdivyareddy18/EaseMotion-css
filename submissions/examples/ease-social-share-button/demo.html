<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Share Button Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Social Share Button</h1>
        <p class="subtitle">Hover or click to expand into share options</p>

        <!-- SOCIAL SHARE BUTTON COMPONENT -->
        <div class="share-container" id="shareContainer">
            <button class="share-trigger" id="shareTrigger" aria-expanded="false">
                <svg class="share-icon" viewBox="0 0 24 24" width="24" height="24">

                </svg>
                <span class="share-label">Share</span>
            </button>

            <div class="share-options" id="shareOptions" role="menu">
                <button class="share-option" data-platform="facebook" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="currentColor"/>
                    </svg>
                    <span>Facebook</span>
                </button>
                <button class="share-option" data-platform="twitter" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" fill="currentColor"/>
                    </svg>
                    <span>Twitter</span>
                </button>
                <button class="share-option" data-platform="linkedin" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z" fill="currentColor"/>
                    </svg>
                    <span>LinkedIn</span>
                </button>
                <button class="share-option" data-platform="whatsapp" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" fill="currentColor"/>
                    </svg>
                    <span>WhatsApp</span>
                </button>
                <button class="share-option" data-platform="email" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="currentColor"/>
                    </svg>
                    <span>Email</span>
                </button>
                <button class="share-option" data-platform="copy" role="menuitem">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                    </svg>
                    <span>Copy Link</span>
                </button>
            </div>
        </div>

        <!-- Share Preview -->
        <div class="share-preview" id="sharePreview">
            <span class="preview-label">Shared to:</span>
            <span class="preview-value" id="previewValue">—</span>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="toggleInteraction">Toggle Click/Hover</button>
            <span class="demo-hint" id="interactionHint">Mode: Hover</span>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const container = document.getElementById('shareContainer');
            const trigger = document.getElementById('shareTrigger');
            const options = document.getElementById('shareOptions');
            const previewValue = document.getElementById('previewValue');
            const toggleBtn = document.getElementById('toggleInteraction');
            const interactionHint = document.getElementById('interactionHint');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                // Share URLs for each platform
                urls: {
                    facebook: 'https://www.facebook.com/sharer/sharer.php?u=',
                    twitter: 'https://twitter.com/intent/tweet?url=',
                    linkedin: 'https://www.linkedin.com/sharing/share-offscreen/?url=',
                    whatsapp: 'https://api.whatsapp.com/send?text=',
                    email: 'mailto:?subject=Check%20this%20out&body='
                },
                // Custom share messages
                message: 'Check out this amazing page!',
                url: window.location.href,
                // Interaction mode: 'hover' or 'click'
                mode: 'hover',
                // Callback when share is triggered
                onShare: function(platform) {
                    console.log(`📤 Shared to ${platform}`);
                },
                onCopy: function() {
                    console.log('📋 Link copied to clipboard!');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isOpen = false;
            let timeoutId = null;

            // ============================================
            // HELPERS
            // ============================================
            function getShareUrl(platform) {
                const baseUrl = CONFIG.urls[platform];
                if (!baseUrl) return null;

                let shareUrl = baseUrl + encodeURIComponent(CONFIG.url);

                // Add message for WhatsApp
                if (platform === 'whatsapp') {
                    shareUrl += encodeURIComponent(CONFIG.message + ' ' + CONFIG.url);
                }

                return shareUrl;
            }

            function openShare(platform) {
                const url = getShareUrl(platform);
                if (!url) return;

                // Open share dialog
                if (platform === 'email') {
                    window.location.href = url;
                } else {
                    window.open(url, '_blank', 'width=600,height=500');
                }

                // Trigger callback
                CONFIG.onShare(platform);

                // Update preview
                previewValue.textContent = platform.charAt(0).toUpperCase() + platform.slice(1);
                previewValue.style.color = getPlatformColor(platform);

                // Close options after share
                closeOptions();

                // Show feedback
                showFeedback(`✅ Shared to ${platform}!`);
            }

            function copyLink() {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(CONFIG.url).then(() => {
                        CONFIG.onCopy();
                        previewValue.textContent = '📋 Copied!';
                        previewValue.style.color = '#34c759';
                        showFeedback('✅ Link copied to clipboard!');
                        closeOptions();
                    }).catch(() => {
                        fallbackCopy();
                    });
                } else {
                    fallbackCopy();
                }
            }

            function fallbackCopy() {
                // Fallback for older browsers
                const textarea = document.createElement('textarea');
                textarea.value = CONFIG.url;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    CONFIG.onCopy();
                    previewValue.textContent = '📋 Copied!';
                    previewValue.style.color = '#34c759';
                    showFeedback('✅ Link copied to clipboard!');
                    closeOptions();
                } catch (err) {
                    showFeedback('❌ Failed to copy link', 'error');
                }
                document.body.removeChild(textarea);
            }

            function getPlatformColor(platform) {
                const colors = {
                    facebook: '#1877f2',
                    twitter: '#000000',
                    linkedin: '#0a66c2',
                    whatsapp: '#25d366',
                    email: '#ea4335',
                    copy: '#34c759'
                };
                return colors[platform] || '#4facfe';
            }

            function showFeedback(message, type) {
                // Simple feedback using preview
                const oldValue = previewValue.textContent;
                const oldColor = previewValue.style.color;
                previewValue.textContent = message;
                previewValue.style.color = type === 'error' ? '#ff3b30' : '#34c759';
                setTimeout(() => {
                    if (previewValue.textContent === message) {
                        previewValue.textContent = oldValue || '—';
                        previewValue.style.color = oldColor || '#6b7280';
                    }
                }, 3000);
            }

            // ============================================
            // OPEN/CLOSE OPTIONS
            // ============================================
            function openOptions() {
                if (isOpen) return;
                isOpen = true;
                options.classList.add('open');
                trigger.classList.add('active');
                trigger.setAttribute('aria-expanded', 'true');
                // Reset any pending close timeout
                if (timeoutId) {
                    clearTimeout(timeoutId);
                    timeoutId = null;
                }
            }

            function closeOptions() {
                if (!isOpen) return;
                isOpen = false;
                options.classList.remove('open');
                trigger.classList.remove('active');
                trigger.setAttribute('aria-expanded', 'false');
            }

            function toggleOptions() {
                if (isOpen) {
                    closeOptions();
                } else {
                    openOptions();
                }
            }

            // ============================================
            // EVENT HANDLERS
            // ============================================
            // Trigger click
            trigger.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (CONFIG.mode === 'click') {
                    toggleOptions();
                } else {
                    // In hover mode, click toggles as well (for mobile)
                    toggleOptions();
                }
            });

            // Hover events (only in hover mode)
            if (CONFIG.mode === 'hover') {
                container.addEventListener('mouseenter', () => {
                    openOptions();
                });

                container.addEventListener('mouseleave', (e) => {
                    // Check if mouse is going to options
                    const relatedTarget = e.relatedTarget;
                    if (relatedTarget && (options.contains(relatedTarget) || container.contains(relatedTarget))) {
                        return;
                    }
                    // Delay closing to allow moving to options
                    timeoutId = setTimeout(() => {
                        if (!options.matches(':hover') && !container.matches(':hover')) {
                            closeOptions();
                        }
                    }, 150);
                });

                // Keep options open when hovering them
                options.addEventListener('mouseenter', () => {
                    if (timeoutId) {
                        clearTimeout(timeoutId);
                        timeoutId = null;
                    }
                });

                options.addEventListener('mouseleave', () => {
                    // Close after short delay
                    timeoutId = setTimeout(() => {
                        if (!container.matches(':hover')) {
                            closeOptions();
                        }
                    }, 200);
                });
            }

            // Share option clicks
            document.querySelectorAll('.share-option').forEach(option => {
                option.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const platform = option.dataset.platform;

                    if (platform === 'copy') {
                        copyLink();
                    } else {
                        openShare(platform);
                    }
                });
            });

            // Click outside to close
            document.addEventListener('click', (e) => {
                if (isOpen && !container.contains(e.target)) {
                    closeOptions();
                }
            });

            // Keyboard accessibility
            trigger.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleOptions();
                }
                if (e.key === 'Escape' && isOpen) {
                    closeOptions();
                    trigger.focus();
                }
            });

            // Arrow keys for options navigation
            const optionButtons = document.querySelectorAll('.share-option');
            let currentOptionIndex = -1;

            document.addEventListener('keydown', (e) => {
                if (!isOpen) return;

                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    currentOptionIndex = (currentOptionIndex + 1) % optionButtons.length;
                    optionButtons[currentOptionIndex].focus();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    currentOptionIndex = currentOptionIndex <= 0 ? optionButtons.length - 1 : currentOptionIndex - 1;
                    optionButtons[currentOptionIndex].focus();
                }
            });

            // Reset index when options open
            const observer = new MutationObserver(() => {
                if (isOpen) {
                    currentOptionIndex = -1;
                }
            });
            observer.observe(options, { attributes: true, attributeFilter: ['class'] });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            toggleBtn.addEventListener('click', () => {
                if (CONFIG.mode === 'hover') {
                    CONFIG.mode = 'click';
                    interactionHint.textContent = 'Mode: Click';
                    toggleBtn.textContent = 'Toggle Hover/Click';
                    // Remove hover behavior
                    container.removeEventListener('mouseenter', openOptions);
                    container.removeEventListener('mouseleave', () => {});
                    options.removeEventListener('mouseenter', () => {});
                    options.removeEventListener('mouseleave', () => {});
                    showFeedback('🔄 Switched to Click mode', 'info');
                } else {
                    CONFIG.mode = 'hover';
                    interactionHint.textContent = 'Mode: Hover';
                    toggleBtn.textContent = 'Toggle Click/Hover';
                    // Add hover behavior back
                    container.addEventListener('mouseenter', openOptions);
                    container.addEventListener('mouseleave', (e) => {
                        const relatedTarget = e.relatedTarget;
                        if (relatedTarget && (options.contains(relatedTarget) || container.contains(relatedTarget))) {
                            return;
                        }
                        timeoutId = setTimeout(() => {
                            if (!options.matches(':hover') && !container.matches(':hover')) {
                                closeOptions();
                            }
                        }, 150);
                    });
                    options.addEventListener('mouseenter', () => {
                        if (timeoutId) {
                            clearTimeout(timeoutId);
                            timeoutId = null;
                        }
                    });
                    options.addEventListener('mouseleave', () => {
                        timeoutId = setTimeout(() => {
                            if (!container.matches(':hover')) {
                                closeOptions();
                            }
                        }, 200);
                    });
                    showFeedback('🔄 Switched to Hover mode', 'info');
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.SocialShare = {
                open: openOptions,
                close: closeOptions,
                toggle: toggleOptions,
                share: openShare,
                copy: copyLink,
                setMode: (mode) => {
                    if (mode === 'hover' || mode === 'click') {
                        CONFIG.mode = mode;
                        if (mode === 'click') {
                            toggleBtn.textContent = 'Toggle Hover/Click';
                            interactionHint.textContent = 'Mode: Click';
                        } else {
                            toggleBtn.textContent = 'Toggle Click/Hover';
                            interactionHint.textContent = 'Mode: Hover';
                        }
                    }
                },
                configure: (config) => {
                    Object.assign(CONFIG, config);
                },
                getState: () => ({
                    isOpen,
                    mode: CONFIG.mode
                })
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            console.log('✅ Social Share Button initialized!');
            console.log('📖 API: window.SocialShare');
            console.log('📖 Modes: Hover (default) / Click (toggleable)');
            console.log('📖 Share platforms: Facebook, Twitter, LinkedIn, WhatsApp, Email, Copy Link');

        })();
    </script>
</body>
</html>
