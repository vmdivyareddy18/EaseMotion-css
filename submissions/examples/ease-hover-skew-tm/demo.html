<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>ease-hover-skew Demo</title><style>
:root{--ease-speed-medium:300ms;--ease-ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--ease-color-primary:#6c63ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;padding:2rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;color:var(--ease-color-primary)}
.demo-item{background:white;border:1px solid #e2e8f0;border-radius:.75rem;padding:1.5rem;text-align:center;margin-bottom:1rem}
.demo-box{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;background:var(--ease-color-primary);color:white;font-weight:600;font-size:.75rem;border-radius:.5rem;cursor:pointer}
</style></head><body>
<h1>ease-hover-skew — Demo</h1>
<div class="demo-item"><div class="demo-box ease-hover-skew">ease-hover-skew</div><p>Hover to see the skew effect</p></div>
<style>
.ease-hover-skew{display:inline-block;transition:transform var(--ease-speed-medium,300ms) var(--ease-ease-bounce);will-change:transform}
.ease-hover-skew:hover,.ease-hover-skew:focus-visible{transform:skewX(-12deg)}
.ease-hover-skew-skew-y{transition:transform var(--ease-speed-medium,300ms) var(--ease-ease-bounce);will-change:transform}
.ease-hover-skew-skew-y:hover,.ease-hover-skew-skew-y:focus-visible{transform:skewY(-8deg)}
@media(prefers-reduced-motion:reduce){.ease-hover-skew:hover,.ease-hover-skew:focus-visible{transform:none}.ease-hover-skew-skew-y:hover,.ease-hover-skew-skew-y:focus-visible{transform:none}}
</style>
</body></html>
