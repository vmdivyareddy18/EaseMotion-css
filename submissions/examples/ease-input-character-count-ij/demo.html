<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Character Count</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="icc-container">
    <h1>Character Count</h1>
    <div class="icc-field">
      <label for="icc-input">Your message</label>
      <input type="text" id="icc-input" class="icc-input" maxlength="100" placeholder="Type something..." autocomplete="off">
      <div class="icc-footer">
        <span class="icc-hint">Max 100 characters</span>
        <span class="icc-counter" id="icc-counter">0</span>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('icc-input');
    const counter = document.getElementById('icc-counter');
    const max = parseInt(input.getAttribute('maxlength'), 10);

    function updateCount() {
      const len = input.value.length;
      const prev = parseInt(counter.textContent, 10);
      counter.textContent = len;

      counter.classList.remove('icc-pop');
      void counter.offsetWidth;
      counter.classList.add('icc-pop');

      counter.classList.toggle('icc-warning', len >= Math.floor(max * 0.8) && len < max);
      counter.classList.toggle('icc-over', len >= max);
    }

    input.addEventListener('input', updateCount);
    updateCount();
  </script>
</body>
</html>
