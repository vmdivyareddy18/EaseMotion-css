<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Progress Steps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Animated Multi-Step Progress Tracker</h1>

    <div class="progress-container">

        <div class="progress-line">
            <div class="progress-fill"></div>
        </div>

        <div class="step completed">
            <div class="circle">✓</div>
            <p>Start</p>
        </div>

        <div class="step completed">
            <div class="circle">✓</div>
            <p>Profile</p>
        </div>

        <div class="step active">
            <div class="circle">3</div>
            <p>Verification</p>
        </div>

        <div class="step">
            <div class="circle">4</div>
            <p>Payment</p>
        </div>

        <div class="step">
            <div class="circle">5</div>
            <p>Complete</p>
        </div>

    </div>

    <div class="progress-info">

        <h2 id="progressText">
            Step 3 of 5
        </h2>

        <p id="percentage">
            60% Completed
        </p>

    </div>

    <div class="controls">

        <button id="prevBtn">
            Previous
        </button>

        <button id="nextBtn">
            Next
        </button>

    </div>

</div>

<script>

const steps=document.querySelectorAll(".step");
const fill=document.querySelector(".progress-fill");
const progressText=document.getElementById("progressText");
const percentage=document.getElementById("percentage");

const prev=document.getElementById("prevBtn");
const next=document.getElementById("nextBtn");

let current=3;

function update(){

    steps.forEach((step,index)=>{

        step.classList.remove("completed","active");

        const circle=step.querySelector(".circle");

        if(index+1<current){

            step.classList.add("completed");
            circle.textContent="✓";

        }

        else if(index+1===current){

            step.classList.add("active");
            circle.textContent=index+1;

        }

        else{

            circle.textContent=index+1;

        }

    });

    fill.style.width=((current-1)/(steps.length-1))*100+"%";

    progressText.textContent=
    `Step ${current} of ${steps.length}`;

    percentage.textContent=
    Math.round((current/steps.length)*100)+"% Completed";

    prev.disabled=current===1;

    next.disabled=current===steps.length;

}

next.addEventListener("click",()=>{

    if(current<steps.length){

        current++;

        update();

    }

});

prev.addEventListener("click",()=>{

    if(current>1){

        current--;

        update();

    }

});

update();

</script>

</body>
</html>
