<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hero Section - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="hero">
    <!-- Floating Background Shapes -->
    <div class="shapes-container">
      <div class="shape shape-1 ease-float ease-delay-100"></div>
      <div class="shape shape-2 ease-spin-slow ease-delay-200"></div>
      <div class="shape shape-3 ease-pulse ease-delay-300"></div>
      <div class="shape shape-4 ease-float ease-delay-400"></div>
    </div>

    <!-- Hero Content -->
    <div class="hero-content">
      <span class="badge ease-fade-in-down">✨ Introducing EaseMotion 2.0</span>
      <h1 class="ease-fade-in-up ease-delay-100">Build Beautiful UIs <br/> Without the Hassle.</h1>
      <p class="ease-fade-in-up ease-delay-200">A lightweight, utility-first CSS animation library designed to bring your web projects to life with smooth, performant, and accessible transitions.</p>
      
      <div class="cta-buttons ease-fade-in-up ease-delay-300">
        <a href="#" class="btn btn-primary ease-hover-grow">Get Started</a>
        <a href="#" class="btn btn-secondary ease-hover-grow">View Docs</a>
      </div>
    </div>
  </section>
</body>
</html>
