<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Outline Width Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item outline-0">.outline-0</div>
  <div class="demo-item outline-1">.outline-1</div>
  <div class="demo-item outline-2">.outline-2</div>
  <div class="demo-item outline-4">.outline-4</div>
  <div class="demo-item outline-8">.outline-8</div>
  <div class="demo-item outline-auto">.outline-auto</div>
</body>
</html>
