<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Loading Spinner Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Loading Spinner Collection</h1>

    <!-- Rotating Circle -->
    <div class="loader-box">
        <div class="spinner"></div>
        <p>Rotating Circle</p>
    </div>

    <!-- Bouncing Dots -->
    <div class="loader-box">
        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <p>Bouncing Dots</p>
    </div>

    <!-- Pulse Ring -->
    <div class="loader-box">
        <div class="pulse"></div>
        <p>Pulse Ring</p>
    </div>

    <!-- Gradient Loader -->
    <div class="loader-box">
        <div class="gradient-loader"></div>
        <p>Gradient Spinner</p>
    </div>
</div>

</body>
</html>
