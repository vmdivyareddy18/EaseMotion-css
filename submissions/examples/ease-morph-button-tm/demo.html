<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing Button</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Morphing Button States</h1>
  <p>Click the buttons to see them morph between states.</p>
  <div class="demo-buttons">
    <button class="morph-btn" id="btn1" data-state="default"><span class="morph-text">Submit</span><span class="morph-loader"></span><span class="morph-check">&#10003;</span><span class="morph-x">&#10007;</span></button>
    <button class="morph-btn" id="btn2" data-state="default"><span class="morph-text">Send</span><span class="morph-loader"></span><span class="morph-check">&#10003;</span><span class="morph-x">&#10007;</span></button>
    <button class="morph-btn" id="btn3" data-state="default"><span class="morph-text">Delete</span><span class="morph-loader"></span><span class="morph-check">&#10003;</span><span class="morph-x">&#10007;</span></button>
  </div>
</div>
<script>
const states = ['default','loading','success','error'];
document.querySelectorAll('.morph-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const current = states.indexOf(btn.dataset.state);
    btn.dataset.state = states[(current + 1) % states.length];
  });
});
</script>
</body></html>
