<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Didgeridoo Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="didgeridoo">
    <div class="didge-body"></div>
    <div class="didge-mouthpiece"></div>
    <div class="didge-bell"></div>
    <div class="vibration-line" style="--i:0"></div>
    <div class="vibration-line" style="--i:1"></div>
    <div class="vibration-line" style="--i:2"></div>
    <div class="vibration-line" style="--i:3"></div>
    <div class="vibration-line" style="--i:4"></div>
    <div class="drone-ring" style="--i:0"></div>
    <div class="drone-ring" style="--i:1"></div>
  </div>
</body>
</html>
