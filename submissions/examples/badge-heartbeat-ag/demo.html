<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badge Heartbeat Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Badge Heartbeat Animation</h1>
    <p class="description">A subtle pulsing "heartbeat" effect for notification badges, status indicators, and priority labels. Powered by GPU-accelerated <code>transform: scale()</code>.</p>

    <div class="badge-container">
        
        <!-- Case 1: Notification Pill -->
        <div class="demo-card">
            <span class="demo-card-title">Notification Pill</span>
            <span class="badge red ease-heartbeat">99+</span>
        </div>

        <!-- Case 2: Status Dot (Online) -->
        <div class="demo-card">
            <span class="demo-card-title">Online Indicator</span>
            <span class="badge badge-dot green ease-heartbeat delay-1"></span>
        </div>

        <!-- Case 3: "New" Feature Label -->
        <div class="demo-card">
            <span class="demo-card-title">New Feature</span>
            <span class="badge blue ease-heartbeat delay-2">NEW</span>
        </div>

        <!-- Case 4: Alert Icon -->
        <div class="demo-card">
            <span class="demo-card-title">Warning Alert</span>
            <span class="badge badge-icon yellow ease-heartbeat delay-3">!</span>
        </div>

        <!-- Case 5: Promo/Sale -->
        <div class="demo-card">
            <span class="demo-card-title">Sale Tag</span>
            <span class="badge purple ease-heartbeat">SALE</span>
        </div>

    </div>

</body>
</html>
