<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Slide Fade Right Demo</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
    }

    .demo-card {
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 1rem;
    }

    p {
      color: #555;
    }
  </style>
</head>
<body>
  <div class="demo-card">
    <h1 class="ease-slide-fade-right">
      Welcome to EaseMotion CSS
    </h1>

    <p class="ease-slide-fade-right">
      A smooth animation that fades in while sliding from left to right.
    </p>
  </div>
</body>
</html>
