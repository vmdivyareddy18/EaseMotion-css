<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Word Counter - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <div class="hero-section">
      <h1 class="sr-only">Ship your next project faster, safer, and better.</h1>
      
      <h1 class="hero-title" aria-hidden="true">
        Ship your next project <br/>
        
        <span class="ease-flip-container">
          <span class="ease-flip-track">
            <span class="ease-flip-item text-cyan">faster.</span>
            <span class="ease-flip-item text-purple">safer.</span>
            <span class="ease-flip-item text-rose">better.</span>
            <span class="ease-flip-item text-cyan">faster.</span>
          </span>
        </span>
      </h1>
      
      <p class="hero-subtitle">Integrate premium pure CSS animations into your workflow with zero JavaScript overhead.</p>
    </div>
  </main>

</html>
