<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Data Table</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #f3f4f6; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="table-container ease-fade-in-up">
    <div class="table-header">
      <h2>Live Election Results</h2>
      <span class="live-badge ease-pulse">Live</span>
    </div>
    
    <table class="liquid-table">
      <thead>
        <tr>
          <th>Candidate</th>
          <th>Party</th>
          <th>Votes</th>
          <th>%</th>
        </tr>
      </thead>
      <tbody>
        <!-- Hover on row triggers liquid effect -->
        <tr class="table-row">
          <td class="candidate-cell">
            <div class="liquid-bg ease-blob"></div>
            <span class="cell-content">Sarah Jenkins</span>
          </td>
          <td>Independent</td>
          <td>1,245,670</td>
          <td class="percentage">45.2%</td>
        </tr>
        
        <tr class="table-row">
          <td class="candidate-cell">
            <div class="liquid-bg ease-blob" style="animation-delay: -1s;"></div>
            <span class="cell-content">Michael Chen</span>
          </td>
          <td>Progressive</td>
          <td>1,102,400</td>
          <td class="percentage">40.1%</td>
        </tr>
        
        <tr class="table-row">
          <td class="candidate-cell">
            <div class="liquid-bg ease-blob" style="animation-delay: -2s;"></div>
            <span class="cell-content">Elena Rodriguez</span>
          </td>
          <td>Centrist</td>
          <td>405,120</td>
          <td class="percentage">14.7%</td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
