<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Real Estate Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Real Estate Dashboard</h1>

<p>Properties, sales and analytics.</p>

</div>

<button class="action-btn">

+ Add Property

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">🏠</span>

<h3>Listings</h3>

<h2>624</h2>

<div class="progress-bar">

<div class="progress listings"></div>

</div>

</div>

<div class="card">

<span class="icon">💰</span>

<h3>Revenue</h3>

<h2>$2.4M</h2>

<div class="progress-bar">

<div class="progress revenue"></div>

</div>

</div>

<div class="card">

<span class="icon">📈</span>

<h3>Sold</h3>

<h2>148</h2>

<div class="progress-bar">

<div class="progress sold"></div>

</div>

</div>

<div class="card">

<span class="icon">👥</span>

<h3>Clients</h3>

<h2>912</h2>

<div class="progress-bar">

<div class="progress clients"></div>

</div>

</div>

</section>

<section class="card activity">

<h2>Recent Activity</h2>

<div class="activity-item">

<h4>New Property Added</h4>

<p>Luxury apartment listed.</p>

</div>

<div class="activity-item">

<h4>Contract Signed</h4>

<p>Villa sold successfully.</p>

</div>

<div class="activity-item">

<h4>Client Inquiry</h4>

<p>Property viewing requested.</p>



</div>

</section>



</div>




</body>



</html>
