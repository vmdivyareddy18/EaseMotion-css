<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slot Machine Spin Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="slot-wrapper">
      <h1>Slot Spin</h1>
      <p class="description">
        A pure CSS slot machine reel animation. Hover to spin the reels.
      </p>

        class="machine"
        tabindex="0"
        role="button"
        aria-label="Spin the slot machine"
      >
        <div class="reel">
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
        </div>
        <div class="reel reel2">
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
        </div>
        <div class="reel reel3">
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
          <div class="symbol">🍒</div>
          <div class="symbol">🍋</div>
          <div class="symbol">🍊</div>
          <div class="symbol">🍇</div>
          <div class="symbol">💎</div>
          <div class="symbol">7️⃣</div>
        </div>
      </div>
      <p class="hint">Hover or focus the reels to spin</p>
    </div>
  </body>
</html>
