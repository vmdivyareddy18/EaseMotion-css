<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sci-Fi Console Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #030712;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-scifi-card" tabindex="0" role="region" aria-label="Tactical Cybernetic Node Matrix">
    <span class="ease-scifi-meta">Sector // 097-B</span>
    <h2 class="ease-scifi-title">Core Telemetry</h2>
    <p class="ease-scifi-desc">Quantum hyper-drive sub-grid parameters operating at operational velocity vectors. System diagnostics confirm optimal link bounds.</p>
    <div class="ease-scifi-status-bar">
      <div>
        <span class="ease-scifi-indicator"></span>
        <span style="color: #ffffff;">SYS_ONLINE</span>
      </div>
      <span class="ease-scifi-data-node">BUFF_LOC [94.2%]</span>
    </div>
  </div>

</body>
</html>
