<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Interactive Animation Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Animation Playground</h1>
      <p class="subtitle">Click buttons to see different animations</p>
    </header>

    <div class="display-area">
      <div class="playground-stage">
        <div class="animation-box" id="animBox">
          <span>A</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="playAnim('bounce')">Bounce</button>
        <button class="ctrl-btn" onclick="playAnim('pulse')">Pulse</button>
        <button class="ctrl-btn" onclick="playAnim('shake')">Shake</button>
        <button class="ctrl-btn" onclick="playAnim('spin')">Spin</button>
        <button class="ctrl-btn" onclick="playAnim('flip')">Flip</button>
        <button class="ctrl-btn" onclick="playAnim('swing')">Swing</button>
      </div>
    </div>

    <section class="demo-section">
      <h3>Preset Animations</h3>
      <div class="presets-grid">
        <div class="preset-card">
          <div class="preset-demo bounce-demo">A</div>
          <span>Bounce</span>
        </div>
        <div class="preset-card">
          <div class="preset-demo pulse-demo">A</div>
          <span>Pulse</span>
        </div>
        <div class="preset-card">
          <div class="preset-demo shake-demo">A</div>
          <span>Shake</span>
        </div>
        <div class="preset-card">
          <div class="preset-demo spin-demo">A</div>
          <span>Spin</span>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Copy Code</h3>
      <div class="code-block">
        <div class="code-header"><span>HTML</span></div>
        <pre>&lt;div class="animation-box"&gt;
  &lt;span&gt;A&lt;/span&gt;
&lt;/div&gt;</pre>
      </div>
    </section>

  </main>

  <script>
    const animBox = document.getElementById('animBox');
    
    function playAnim(type) {
      animBox.className = 'animation-box ' + type;
      setTimeout(() => {
        animBox.className = 'animation-box';
      }, 1000);
    }
  </script>

</body>
</html>
