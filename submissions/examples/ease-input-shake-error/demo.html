<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input Shake Error - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Input Shake Error</h1>
      <p>A horizontal head-shake animation and red border flash for invalid inputs.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>Login Validation</h2>
        <p class="instruction">Try submitting without typing a password, or type less than 6 characters.</p>
        
        <div class="form-container">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="ease-input" value="user_123" />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="ease-input" placeholder="Enter your password" />
            <span class="error-text" id="password-error">Password must be at least 6 characters.</span>
          </div>

          <button id="submit-btn" class="submit-button">Submit</button>
        </div>
        
      </section>
    </main>
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-btn');
    const errorText = document.getElementById('password-error');

    submitBtn.addEventListener('click', () => {
      const value = passwordInput.value.trim();
      
      // Remove class briefly to allow re-triggering the animation
      passwordInput.classList.remove('ease-error');
      
      // Force a reflow so the browser registers the class removal before re-adding it
      void passwordInput.offsetWidth; 

      if (value.length < 6) {
        // Validation Failed: Trigger the shake!
        passwordInput.classList.add('ease-error');
        errorText.style.display = 'block';
      } else {
        // Validation Passed
        errorText.style.display = 'none';
        alert("Success!");
      }
    });

    // Remove error state when user starts typing again
    passwordInput.addEventListener('input', () => {
      passwordInput.classList.remove('ease-error');
      errorText.style.display = 'none';
    });
  </script>
</body>
</html>
