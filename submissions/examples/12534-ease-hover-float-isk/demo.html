<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-hover-float-isk</title>
  <meta name="description" content="A demonstration of the ease-hover-float-isk animation showing elements floating upward and shadows spreading on hover.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hover-float-isk</h1>
      <p class="subtitle" id="main-desc">Hover over the elements below to see them lift and float with an expanded shadow</p>
    </header>

    <div class="display-area">
      <!-- Demo Button -->
      <button class="demo-button ease-hover-float-isk" id="button-target">
        Floating Button
      </button>

      <!-- Demo Card -->
      <div class="demo-card ease-hover-float-isk" id="card-target">
        <h3>Floating Card</h3>
        <p>This card floats upward on hover while the shadow expands and blurs to simulate physical lift off the surface.</p>
      </div>
    </div>
  </main>

</body>
</html>
