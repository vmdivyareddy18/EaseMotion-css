<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variable Font Axis Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="text-container">
    <div>
      <p style="color: #4b5563; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;">Effect 1: Hover Morph</p>
      <h1 class="variable-text hover-morph">INTERACTIVE</h1>
    </div>

    <div>
      <p style="color: #4b5563; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.5rem;">Effect 2: Keyframe Loop Track</p>
      <h1 class="variable-text loop-pulse">FLUIDITY</h1>
    </div>
  </div>

</body>
</html>
