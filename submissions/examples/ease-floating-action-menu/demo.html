<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Floating Action Menu Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <h1>Ease Floating Action Menu</h1>
    <p>Hover over the blue Floating Action Button (FAB) in the bottom-right corner to see the menu expand smoothly.</p>
  </div>

  <!-- Floating Action Menu Component -->
  <div class="ease-floating-action-menu">
    <!-- Main trigger button -->
    <button class="fab-main" aria-label="Toggle Menu">
      <span class="fab-icon">+</span>
    </button>
    
    <!-- Vertical stack of secondary actions -->
    <div class="secondary-actions">
      <button class="fab-secondary" aria-label="Action 1" title="Share">
        <span class="fab-icon">🔗</span>
      </button>
      <button class="fab-secondary" aria-label="Action 2" title="Edit">
        <span class="fab-icon">✏️</span>
      </button>
      <button class="fab-secondary" aria-label="Action 3" title="Delete">
        <span class="fab-icon">🗑️</span>
      </button>
    </div>
  </div>

</body>
</html>
