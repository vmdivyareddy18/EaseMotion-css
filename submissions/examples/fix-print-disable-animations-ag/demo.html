<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Print Animation Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>@media print – Animation Disable Fix</h2>
  <div class="demo-grid">
    <div class="demo-card">
      <h3>Skeleton</h3>
      <div class="ease-skeleton ease-skeleton--text" style="max-width:100%;height:14px"></div>
      <div class="ease-skeleton ease-skeleton--text" style="max-width:80%;height:14px"></div>
      <div class="ease-skeleton ease-skeleton--text" style="max-width:60%;height:14px"></div>
    </div>
    <div class="demo-card">
      <h3>Spinner</h3>
      <div class="ease-spinner" aria-label="Loading" role="status"></div>
    </div>
  </div>
  <p class="note">Print this page (Ctrl+P) — skeleton shows as solid blocks, spinner is hidden. No blank pages.</p>
</body>
</html>
