<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Star Rating with Explosion</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>⭐ Star Rating with Explosion</h1>
        <p class="subtitle">Stars animate when selected with sparkle bursts</p>

        <div class="rating-wrapper">
            <div class="stars-container" id="starsContainer">
                <!-- Stars will be generated by JS -->
            </div>

            <div class="rating-display">
                <span class="rating-text" id="ratingText">Click a star to rate</span>
                <span class="rating-value" id="ratingValue">0 / 5</span>
            </div>

            <div class="controls">
                <button id="resetBtn">↺ Reset</button>
                <button id="randomBtn">🎲 Random</button>
            </div>

            <div class="status">
                <span id="ratingCount">Total ratings: 0</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const starsContainer = document.getElementById('starsContainer');
        const ratingText = document.getElementById('ratingText');
        const ratingValue = document.getElementById('ratingValue');
        const ratingCount = document.getElementById('ratingCount');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const randomBtn = document.getElementById('randomBtn');

        // ===== STATE =====
        let rating = 0;
        let hoverRating = 0;
        let totalRatings = 0;
        let stars = [];
        let particles = [];
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let isAnimating = false;

        // ===== CONSTANTS =====
        const NUM_STARS = 5;
        const STAR_SIZE = 50;
        const GAP = 12;

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor(x, y, color, type) {
                this.x = x;
                this.y = y;
                this.color = color || '#ffd93d';
                this.type = type || 'sparkle';
                this.size = 2 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.life = 1;
                this.maxLife = 30 + Math.random() * 40;
                this.age = 0;
                this.gravity = 0.05 + Math.random() * 0.08;
                this.phase = Math.random() * Math.PI * 2;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.1;
                this.trail = [];
                this.maxTrail = 3 + Math.floor(Math.random() * 3);
                this.shape = Math.random() > 0.5 ? 'circle' : 'star';
            }

            update() {
                this.age++;
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.life = 1 - this.age / this.maxLife;
                this.size *= 0.998;
                this.rotation += this.rotSpeed;
                this.phase += 0.05;

                // Trail
                this.trail.push({ x: this.x, y: this.y, alpha: 0.5 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                for (const t of this.trail) {
                    t.alpha *= 0.92;
                }
            }

            draw(ctx) {
                if (this.life <= 0) return;

                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = (i / this.trail.length) * 0.15 * this.life;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * 0.3 * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color + '40';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.scale(this.life, this.life);

                const size = this.size;
                const alpha = this.life * 0.9;

                if (this.shape === 'star') {
                    // Star particle
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
                        const r = i % 2 === 0 ? size : size * 0.4;
                        const x = Math.cos(angle + this.phase) * r;
                        const y = Math.sin(angle + this.phase) * r;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fillStyle = this.color;
                    ctx.globalAlpha = alpha;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.color + '80';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                } else {
                    // Circle particle
                    const grad = ctx.createRadialGradient(
                        -size * 0.2, -size * 0.2, 0,
                        0, 0, size
                    );
                    grad.addColorStop(0, '#ffffff');
                    grad.addColorStop(0.3, this.color);
                    grad.addColorStop(1, this.color + '80');
                    ctx.beginPath();
                    ctx.arc(0, 0, size, 0, Math.PI * 2);
                    ctx.fillStyle = grad;
                    ctx.globalAlpha = alpha;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.color + '60';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
                ctx.globalAlpha = 1;
            }

            isDead() {
                return this.life <= 0 || this.age > this.maxLife;
            }
        }

        // ===== STAR CLASS =====
        class Star {
            constructor(index) {
                this.index = index;
                this.x = 0;
                this.y = 0;
                this.size = STAR_SIZE;
                this.isHovered = false;
                this.isActive = false;
                this.scale = 1;
                this.targetScale = 1;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.glowIntensity = 0;
                this.targetGlow = 0;
                this.rotation = 0;
                this.rotSpeed = (Math.random() - 0.5) * 0.01;
                this.color = this.getColor(index);

                // DOM element
                this.element = this.createElement();
                this.updatePosition();
            }

            getColor(index) {
                const colors = [
                    '#ffd93d', // Gold
                    '#ffc107', // Amber
                    '#ffb300', // Darker gold
                    '#ffa000', // Orange gold
                    '#ff8f00', // Dark orange
                ];
                return colors[index % colors.length];
            }

            createElement() {
                const div = document.createElement('div');
                div.className = 'star';
                div.dataset.index = this.index;
                
                // SVG star
                div.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2" />
                    </svg>
                `;
                
                div.addEventListener('click', () => this.onClick());
                div.addEventListener('mouseenter', () => this.onHover(true));
                div.addEventListener('mouseleave', () => this.onHover(false));
                
                return div;
            }

            updatePosition() {
                const totalWidth = NUM_STARS * STAR_SIZE + (NUM_STARS - 1) * GAP;
                const startX = (starsContainer.clientWidth - totalWidth) / 2;
                this.x = startX + this.index * (STAR_SIZE + GAP);
                this.y = 0;
                this.element.style.left = `${this.x}px`;
                this.element.style.top = `${this.y}px`;
            }

            update(time) {
                this.phase += this.pulseSpeed;
                
                // Smooth scale
                this.scale += (this.targetScale - this.scale) * 0.1;
                this.element.style.transform = `scale(${this.scale})`;
                
                // Glow
                this.glowIntensity += (this.targetGlow - this.glowIntensity) * 0.05;
                
                // Rotation
                this.rotation += this.rotSpeed;
                this.element.style.rotate = `${this.rotation}deg`;
                
                // Update SVG color
                const svg = this.element.querySelector('svg');
                if (svg) {
                    const isActive = this.isActive || (this.isHovered && this.index <= hoverRating - 1);
                    if (isActive) {
                        svg.setAttribute('fill', this.color);
                        svg.style.color = this.color;
                        svg.style.filter = `drop-shadow(0 0 ${10 + this.glowIntensity * 20}px ${this.color})`;
                    } else {
                        svg.setAttribute('fill', 'none');
                        svg.style.color = 'rgba(255,255,255,0.15)';
                        svg.style.filter = 'none';
                    }
                }
            }

            onHover(hovered) {
                this.isHovered = hovered;
                if (hovered) {
                    this.targetScale = 1.15;
                    this.rotSpeed = 0.02 + Math.random() * 0.02;
                } else {
                    this.targetScale = this.isActive ? 1.1 : 1;
                    this.rotSpeed = (Math.random() - 0.5) * 0.01;
                }
                updateHover(this.index);
            }

            onClick() {
                if (isAnimating) return;
                const newRating = this.index + 1;
                if (newRating === rating) return;
                
                setRating(newRating);
                
                // Create explosion
                createExplosion(this.x + STAR_SIZE / 2, this.y + STAR_SIZE / 2, this.color);
                
                // Animate all stars
                animateStars(newRating);
            }

            setActive(active) {
                this.isActive = active;
                this.targetScale = active ? 1.1 : 1;
                this.targetGlow = active ? 1 : 0;
                this.rotSpeed = active ? (Math.random() - 0.5) * 0.02 : (Math.random() - 0.5) * 0.01;
            }

            setHover(hover) {
                this.isHovered = hover;
                this.targetScale = hover ? 1.15 : (this.isActive ? 1.1 : 1);
            }
        }

        // ===== UPDATE HOVER =====
        function updateHover(index) {
            hoverRating = index + 1;
            for (let i = 0; i < stars.length; i++) {
                const star = stars[i];
                if (i <= index) {
                    star.setHover(true);
                } else {
                    star.setHover(false);
                }
            }
            updateRatingText();
        }

        // ===== SET RATING =====
        function setRating(value) {
            rating = value;
            totalRatings++;
            
            for (let i = 0; i < stars.length; i++) {
                stars[i].setActive(i < value);
            }
            
            updateRatingText();
            ratingCount.textContent = `Total ratings: ${totalRatings}`;
        }

        // ===== UPDATE RATING TEXT =====
        function updateRatingText() {
            const displayRating = hoverRating > 0 ? hoverRating : rating;
            if (displayRating === 0) {
                ratingText.textContent = 'Click a star to rate';
                ratingValue.textContent = '0 / 5';
            } else {
                const labels = ['', 'Terrible', 'Poor', 'Average', 'Good', 'Excellent'];
                ratingText.textContent = labels[displayRating] || 'Excellent';
                ratingValue.textContent = `${displayRating} / 5`;
            }
        }

        // ===== CREATE EXPLOSION =====
        function createExplosion(x, y, color) {
            const numParticles = 40 + Math.floor(Math.random() * 30);
            const colors = [
                color,
                '#ffd93d',
                '#ff6b6b',
                '#6bcb77',
                '#4d96ff',
                '#ff8a5c',
                '#a29bfe',
                '#fd79a8',
                '#00b894',
                '#fdcb6e',
                '#e17055',
                '#74b9ff',
            ];
            
            for (let i = 0; i < numParticles; i++) {
                const c = colors[Math.floor(Math.random() * colors.length)];
                const p = new Particle(x, y, c, Math.random() > 0.5 ? 'star' : 'circle');
                p.vx = (Math.random() - 0.5) * 12;
                p.vy = (Math.random() - 0.5) * 12 - 4;
                p.size = 1 + Math.random() * 5;
                p.maxLife = 20 + Math.random() * 50;
                p.gravity = 0.02 + Math.random() * 0.08;
                particles.push(p);
            }
            
            // Secondary burst
            setTimeout(() => {
                for (let i = 0; i < 20; i++) {
                    const c = colors[Math.floor(Math.random() * colors.length)];
                    const p = new Particle(x, y, c, 'star');
                    p.vx = (Math.random() - 0.5) * 6;
                    p.vy = (Math.random() - 0.5) * 6 - 3;
                    p.size = 1 + Math.random() * 3;
                    p.maxLife = 15 + Math.random() * 30;
                    p.gravity = 0.01 + Math.random() * 0.05;
                    particles.push(p);
                }
            }, 200);
        }

        // ===== ANIMATE STARS =====
        function animateStars(newRating) {
            isAnimating = true;
            
            for (let i = 0; i < stars.length; i++) {
                const star = stars[i];
                if (i < newRating) {
                    star.targetScale = 1.4;
                    star.rotSpeed = 0.05;
                    setTimeout(() => {
                        star.targetScale = 1.1;
                        star.rotSpeed = 0.01;
                    }, 400);
                } else {
                    star.targetScale = 0.8;
                    setTimeout(() => {
                        star.targetScale = 1;
                    }, 400);
                }
            }
            
            setTimeout(() => {
                isAnimating = false;
            }, 500);
        }

        // ===== RESET =====
        function resetRating() {
            rating = 0;
            hoverRating = 0;
            for (const star of stars) {
                star.setActive(false);
                star.setHover(false);
                star.targetScale = 1;
                star.rotSpeed = (Math.random() - 0.5) * 0.01;
                star.glowIntensity = 0;
            }
            updateRatingText();
            ratingCount.textContent = `Total ratings: ${totalRatings}`;
            
            // Clear particles
            particles = [];
        }

        // ===== RANDOM RATING =====
        function randomRating() {
            const newRating = Math.floor(Math.random() * 5) + 1;
            setRating(newRating);
            
            // Find center star for explosion
            const starIndex = newRating - 1;
            const star = stars[starIndex];
            createExplosion(
                star.x + STAR_SIZE / 2,
                star.y + STAR_SIZE / 2,
                star.color
            );
            animateStars(newRating);
        }

        // ===== INIT STARS =====
        function initStars() {
            starsContainer.innerHTML = '';
            stars = [];
            for (let i = 0; i < NUM_STARS; i++) {
                const star = new Star(i);
                starsContainer.appendChild(star.element);
                stars.push(star);
            }
            updateRatingText();
            
            // Update positions on resize
            setTimeout(() => {
                for (const star of stars) {
                    star.updatePosition();
                }
            }, 100);
        }
        initStars();

        // ===== RENDER LOOP =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            time += 0.01;

            // Update stars
            for (const star of stars) {
                star.update(time);
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.update();
                if (p.isDead()) {
                    particles.splice(i, 1);
                }
            }

            // Draw particles on canvas overlay
            const canvas = document.getElementById('particleCanvas');
            if (!canvas) {
                // Create canvas overlay if not exists
                const overlay = document.createElement('canvas');
                overlay.id = 'particleCanvas';
                overlay.style.cssText = `
                    position: absolute;
                    top: 0;
                    left: 0;
                    width: 100%;
                    height: 100%;
                    pointer-events: none;
                    z-index: 10;
                `;
                starsContainer.style.position = 'relative';
                starsContainer.appendChild(overlay);
                drawParticles();
            } else {
                drawParticles();
            }

            requestAnimationFrame(render);
        }

        function drawParticles() {
            const canvas = document.getElementById('particleCanvas');
            const ctx = canvas.getContext('2d');
            const rect = starsContainer.getBoundingClientRect();
            
            canvas.width = rect.width;
            canvas.height = rect.height;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (const p of particles) {
                p.draw(ctx);
            }
        }

        // ===== EVENT LISTENERS =====
        resetBtn.addEventListener('click', resetRating);
        randomBtn.addEventListener('click', randomRating);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '5') {
                const num = parseInt(e.key);
                setRating(num);
                const starIndex = num - 1;
                const star = stars[starIndex];
                createExplosion(
                    star.x + STAR_SIZE / 2,
                    star.y + STAR_SIZE / 2,
                    star.color
                );
                animateStars(num);
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                randomBtn.click();
            }
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            for (const star of stars) {
                star.updatePosition();
            }
        });

        // ===== INIT =====
        updateRatingText();
        ratingCount.textContent = `Total ratings: 0`;
        lastFpsUpdate = performance.now();
        render(lastFpsUpdate);

        console.log('⭐ Star Rating with Explosion loaded!');
        console.log('💡 Click stars to rate');
        console.log('💡 1-5 - Quick rate');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Random rating');
    </script>
</body>
</html>
