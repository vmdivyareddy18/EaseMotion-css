<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Creative Portfolio

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

An interactive tooltip designed
for portfolio websites featuring
a smooth rotate-click transition
with modern creative aesthetics.

</p>

<div class="tooltip-wrapper">

<input
type="checkbox"
id="tooltip-toggle">

<label

for="tooltip-toggle"

class="trigger"

>

View Project

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="tag">

Featured

</span>

<h3>

Brand Identity

</h3>

<p>

A CSS-only rotate animation
crafted for creative portfolio
showcases and agency websites.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
