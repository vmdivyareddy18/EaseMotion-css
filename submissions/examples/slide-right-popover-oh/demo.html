<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Slides in from left</p>
    </header>
    <div class="display-area">
      <div class="popover-container">
        <button class="trigger-btn">Hover Me</button>
        <div class="slide-popover">
          <h4>Slide Right</h4>
          <p>Slides in from left!</p>
        </div>
      </div>
    </div>
    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Down</button>
          <div class="slide-popover down"><p>Slides down</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Up</button>
          <div class="slide-popover up"><p>Slides up</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Scale</button>
          <div class="slide-popover scale"><p>Scale slide</p></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
