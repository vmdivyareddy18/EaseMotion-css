<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tada-Click Product Catalog Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div
        class="product-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="product-title"
        tabindex="0"
    >

        <div class="product-image">
            📦
        </div>

        <h2 id="product-title">
            Wireless Headphones
        </h2>

        <p class="subtitle">
            Premium over-ear headphones with active noise cancellation and crystal-clear sound.
        </p>

        <div class="rating">
            ⭐⭐⭐⭐⭐
            <span>4.8 (1,245 Reviews)</span>
        </div>

        <div class="divider"></div>

        <section class="details">

            <div class="detail-row">
                <span>Bluetooth</span>
                <span>5.3</span>
            </div>

            <div class="detail-row">
                <span>Battery</span>
                <span>40 Hours</span>
            </div>

            <div class="detail-row">
                <span>Charging</span>
                <span>USB-C Fast Charge</span>
            </div>

            <div class="detail-row">
                <span>Warranty</span>
                <span>2 Years</span>
            </div>

        </section>

        <div class="divider"></div>

        <div class="price-section">

            <div>
                <small>Price</small>
                <h3>$149.00</h3>
            </div>

            <button class="cart-btn">
                Add to Cart
            </button>

        </div>

    </div>

</div>

</body>
</html>
