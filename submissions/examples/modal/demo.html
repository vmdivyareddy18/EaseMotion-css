<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaseMotion Modal Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Modal Example</h2>
  <button id="openModal" class="ease-btn">Open Modal</button>

  <!-- Modal structure -->
  <div class="ease-modal-backdrop" id="modalBackdrop">
    <div class="ease-modal" id="modalBox">
      <h3>EaseMotion Modal</h3>
      <p>This is a modal dialog with fade + scale animation.</p>
      <button id="closeModal" class="ease-btn">Close</button>
    </div>
  </div>

  <script>
    const openBtn = document.getElementById("openModal");
    const closeBtn = document.getElementById("closeModal");
    const backdrop = document.getElementById("modalBackdrop");

    openBtn.addEventListener("click", () => {
      backdrop.classList.add("show");
    });

    closeBtn.addEventListener("click", () => {
      backdrop.classList.remove("show");
    });

    backdrop.addEventListener("click", e => {
      if (e.target === backdrop) {
        backdrop.classList.remove("show");
      }
    });
  </script>
</body>
</html>
