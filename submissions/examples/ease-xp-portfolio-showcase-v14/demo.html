<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP System Showcase 🚀</h1>

  <div class="grid">

    <div class="card ease-slide-up">⚡ XP Bar</div>
    <div class="card ease-slide-up delay">🎯 Level System</div>
    <div class="card ease-slide-up delay-2">🔥 Streak</div>
    <div class="card ease-slide-up">🏆 Rewards</div>
    <div class="card ease-slide-up delay">📊 Graph</div>
    <div class="card ease-slide-up delay-2">👑 Leaderboard</div>
    <div class="card ease-slide-up">🎖 Achievements</div>
    <div class="card ease-slide-up delay">🌗 Theme</div>

  </div>

</section>

<script>
const cards = document.querySelectorAll(".card");

cards.forEach(card => {
  card.addEventListener("click", () => {
    card.classList.add("active");
    setTimeout(() => card.classList.remove("active"), 300);
  });
});
</script>

</body>
</html>
