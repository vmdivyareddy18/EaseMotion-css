<!DOCTYPE html>
<html>
<head>
  <title>Tabs Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs">
  <button onclick="showTab(0)">Tab 1</button>
  <button onclick="showTab(1)">Tab 2</button>
  <button onclick="showTab(2)">Tab 3</button>
</div>

<div class="content" id="tab0">Content 1</div>
<div class="content" id="tab1">Content 2</div>
<div class="content" id="tab2">Content 3</div>

<script>
function showTab(index) {
  const tabs = document.querySelectorAll(".content");
  tabs.forEach(tab => tab.style.display = "none");
  tabs[index].style.display = "block";
}
</script>

</body>
</html>
