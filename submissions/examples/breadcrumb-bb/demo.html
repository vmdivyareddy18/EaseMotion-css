<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Breadcrumb</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="demo">

    <!-- Slash -->
    <nav class="ease-breadcrumb">
        <a href="#" class="ease-breadcrumb-item">Home</a>
        <span class="ease-breadcrumb-slash">/</span>

        <a href="#" class="ease-breadcrumb-item">Components</a>
        <span class="ease-breadcrumb-slash">/</span>

        <span class="ease-breadcrumb-item ease-breadcrumb-active">
            Breadcrumb
        </span>
    </nav>

    <!-- Chevron -->
    <nav class="ease-breadcrumb">
        <a href="#" class="ease-breadcrumb-item">Home</a>
        <span class="ease-breadcrumb-chevron">›</span>

        <a href="#" class="ease-breadcrumb-item">Library</a>
        <span class="ease-breadcrumb-chevron">›</span>

        <span class="ease-breadcrumb-item ease-breadcrumb-active">
            Navigation
        </span>
    </nav>

    <!-- Arrow -->
    <nav class="ease-breadcrumb">
        <a href="#" class="ease-breadcrumb-item">Dashboard</a>
        <span class="ease-breadcrumb-arrow">→</span>

        <a href="#" class="ease-breadcrumb-item">Projects</a>
        <span class="ease-breadcrumb-arrow">→</span>

        <span class="ease-breadcrumb-item ease-breadcrumb-active">
            EaseMotion
        </span>
    </nav>

</div>

</body>
</html>
