<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS floating-label-input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Floating Label Input</h1>
    <div class="fl-form">
      <div class="fl-group">
        <input type="text" class="fl-input" placeholder=" " value="John Doe">
        <label class="fl-label">Full Name</label>
        <span class="fl-bar"></span>
      </div>
      <div class="fl-group">
        <input type="email" class="fl-input" placeholder=" ">
        <label class="fl-label">Email Address</label>
        <span class="fl-bar"></span>
      </div>
      <div class="fl-group">
        <input type="password" class="fl-input" placeholder=" ">
        <label class="fl-label">Password</label>
        <span class="fl-bar"></span>
      </div>
    </div>
  </div>
</body>
</html>
