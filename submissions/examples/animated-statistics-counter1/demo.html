<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Statistics Counter - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Our Impact in Numbers</h1>
      <p>Trusted by thousands of developers worldwide</p>
    </header>

    <!-- Statistics Grid -->
    <div class="stats-grid">
      
      <!-- Stat 1: Users -->
      <div class="stat-card ease-fade-in-up ease-delay-100" data-target="50000" data-suffix="+">
        <div class="stat-icon-wrapper">
          <span class="stat-icon ease-pulse">👥</span>
        </div>
        <div class="stat-content">
          <div class="stat-number">
            <span class="number-value" data-target="50000">0</span>
            <span class="number-suffix">+</span>
          </div>
          <div class="stat-label">Active Users</div>
        </div>
      </div>

      <!-- Stat 2: Projects -->
      <div class="stat-card ease-fade-in-up ease-delay-200" data-target="1200" data-suffix="">
        <div class="stat-icon-wrapper">
          <span class="stat-icon ease-pulse ease-delay-100">🚀</span>
        </div>
        <div class="stat-content">
          <div class="stat-number">
            <span class="number-value" data-target="1200">0</span>
            <span class="number-suffix"></span>
          </div>
          <div class="stat-label">Projects Completed</div>
        </div>
      </div>

      <!-- Stat 3: Countries -->
      <div class="stat-card ease-fade-in-up ease-delay-300" data-target="85" data-suffix="">
        <div class="stat-icon-wrapper">
          <span class="stat-icon ease-pulse ease-delay-200">🌍</span>
        </div>
        <div class="stat-content">
          <div class="stat-number">
            <span class="number-value" data-target="85">0</span>
            <span class="number-suffix"></span>
          </div>
          <div class="stat-label">Countries Served</div>
        </div>
      </div>

      <!-- Stat 4: Uptime -->
      <div class="stat-card ease-fade-in-up ease-delay-400" data-target="99.9" data-suffix="%" data-decimals="1">
        <div class="stat-icon-wrapper">
          <span class="stat-icon ease-pulse ease-delay-300">⚡</span>
        </div>
        <div class="stat-content">
          <div class="stat-number">
            <span class="number-value" data-target="99.9" data-decimals="1">0</span>
            <span class="number-suffix">%</span>
          </div>
          <div class="stat-label">Uptime Guarantee</div>
        </div>
      </div>

    </div>

    <!-- Call to Action -->
    <div class="cta-section ease-fade-in-up ease-delay-500">
      <p>Join thousands of satisfied customers</p>
      <button class="cta-btn ease-hover-grow">Get Started Free</button>
    </div>
  </div>

  <!-- JavaScript for Counter Animation -->
  <script>
    // Intersection Observer to trigger animation when cards come into view
    const observerOptions = {
      threshold: 0.5,
      rootMargin: '0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          const numberEl = card.querySelector('.number-value');
          const target = parseFloat(numberEl.dataset.target);
          const decimals = parseInt(numberEl.dataset.decimals) || 0;
          
          animateNumber(numberEl, target, decimals);
          observer.unobserve(card); // Only animate once
        }
      });
    }, observerOptions);

    // Observe all stat cards
    document.querySelectorAll('.stat-card').forEach(card => {
      observer.observe(card);
    });

    // Animate number from 0 to target
    function animateNumber(element, target, decimals = 0) {
      const duration = 2000; // 2 seconds
      const startTime = performance.now();
      
      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        
        // Easing function (ease-out)
        const easeOut = 1 - Math.pow(1 - progress, 3);
        const current = target * easeOut;
        
        element.textContent = current.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        
        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          element.textContent = target.toFixed(decimals).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }
      }
      
      requestAnimationFrame(update);
    }
  </script>
</body>
</html>
