<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-radio-station-card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Radio Station Selector</h1>
    <p class="subtitle">Animated station cards with now-playing state</p>

    <div class="stations">

        <div class="station-card active">
            <div class="playing-indicator"></div>

            <h2>FM Beats</h2>
            <p>Top Hits • Live</p>

            <div class="equalizer">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>

        <div class="station-card">
            <h2>Classic FM</h2>
            <p>Classical Music</p>
        </div>

        <div class="station-card">
            <h2>Rock Nation</h2>
            <p>Rock & Metal</p>
        </div>

        <div class="station-card">
            <h2>Jazz Lounge</h2>
            <p>Smooth Jazz</p>
        </div>

    </div>

</div>

</body>
</html>
