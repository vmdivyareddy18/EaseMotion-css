<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Empty State Illustration - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <div class="empty-state-card">
            
            <div class="illustration-wrapper">
                <svg class="empty-illustration" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
                    <circle cx="100" cy="100" r="70" stroke="var(--primary-glow)" stroke-width="2" stroke-dasharray="6 6" class="anim-ring"/>
                    <circle cx="100" cy="100" r="55" fill="var(--plate-bg)" class="anim-plate"/>
                    <path d="M60 75C60 71.6863 62.6863 69 66 69H90L102 81H134C137.314 81 140 83.6863 140 87V125C140 128.314 137.314 131 134 131H66C62.6863 131 60 128.314 60 125V75Z" fill="var(--folder-bg)" stroke="var(--primary-accent)" stroke-width="3" class="anim-folder"/>
                    <rect x="80" y="50" width="40" height="40" rx="4" fill="var(--doc-bg)" stroke="var(--primary-accent)" stroke-width="2" class="anim-doc-1" />
                    <rect x="90" y="58" width="40" height="40" rx="4" fill="var(--doc-bg)" stroke="var(--primary-accent)" stroke-width="2" class="anim-doc-2" />
                    <circle cx="100" cy="105" r="14" stroke="var(--search-accent)" stroke-width="3.5" fill="var(--doc-bg)" class="anim-lens"/>
                    <line x1="110" y1="115" x2="124" y2="129" stroke="var(--search-accent)" stroke-width="3.5" stroke-linecap="round" class="anim-handle"/>
                </svg>
            </div>

            <div class="empty-content">
                <h2>No files found</h2>
                <p>We couldn't find any documents matching your search queries. Try adjusting your filters or upload a fresh file.</p>
            </div>

            <button class="action-btn">
                <span>Upload Document</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </div>
    </main>
</body>
</html>
