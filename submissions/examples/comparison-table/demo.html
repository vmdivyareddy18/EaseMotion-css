<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature Matrix Comparison — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #ffffff; margin: 0; padding: 4rem 0;">

  <div class="ease-comparison-viewport">
    
    <table class="ease-compare-table">
      <thead>
        <tr>
          <th style="width: 34%;">Core Layout Features</th>
          <th style="width: 22%;">Standard</th>
          <th class="ease-highlight-col" style="width: 22%;">
            <span class="ease-badge-popular">Popular</span>
            Pro Elite
          </th>
          <th style="width: 22%;">Enterprise</th>
        </tr>
      </thead>
      <tbody>
        <tr class="ease-table-row-animated">
          <td style="font-weight: 600;">Custom Animation Curves</td>
          <td><span class="ease-marker-icon ease-check-true">✓</span></td>
          <td class="ease-highlight-col"><span class="ease-marker-icon ease-check-true">✓</span></td>
          <td><span class="ease-marker-icon ease-check-true">✓</span></td>
        </tr>
        <tr class="ease-table-row-animated">
          <td style="font-weight: 600;">Hardware Accelerated Layers</td>
          <td><span class="ease-marker-icon ease-check-false">✕</span></td>
          <td class="ease-highlight-col"><span class="ease-marker-icon ease-check-true">✓</span></td>
          <td><span class="ease-marker-icon ease-check-true">✓</span></td>
        </tr>
        <tr class="ease-table-row-animated">
          <td style="font-weight: 600;">Isolated Context Scopes</td>
          <td><span class="ease-marker-icon ease-check-false">✕</span></td>
          <td class="ease-highlight-col"><span class="ease-marker-icon ease-check-false">✕</span></td>
          <td><span class="ease-marker-icon ease-check-true">✓</span></td>
        </tr>
        <tr class="ease-table-row-animated">
          <td style="font-weight: 600;">24/7 Pipeline Diagnostics</td>
          <td><span class="ease-marker-icon ease-check-false">✕</span></td>
          <td class="ease-highlight-col"><span class="ease-marker-icon ease-check-false">✕</span></td>
          <td><span class="ease-marker-icon ease-check-true">✓</span></td>
        </tr>
      </tbody>
    </table>

  </div>

</body>
</html>
