<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Search Widget — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Hidden Search Widget</h2>
    <p>Click the search icon to reveal the input.</p>
    <div class="search-widget">
      <input type="text" class="search-input" placeholder="Type to search…">
      <button class="search-btn" aria-label="Toggle search">&#x1F50D;</button>
    </div>
  </div>
  <script>
    const btn = document.querySelector('.search-btn');
    const widget = document.querySelector('.search-widget');
    btn.addEventListener('click', () => widget.classList.toggle('active'));
  </script>
</body>
</html>
