<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fix Demo - badge/chip overflow #4257</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f0f0f; color: #fff; }
    .container { max-width: 320px; border: 1px dashed #555; padding: 1rem; margin-bottom: 1.5rem; }
    h3 { margin-bottom: 0.5rem; }
    .ease-badge {
      background: #4f46e5; color: #fff; padding: 4px 10px; border-radius: 999px; font-size: 0.85rem;
    }
    .ease-chip {
      background: #2d2d3a; color: #fff; padding: 6px 12px; border-radius: 6px; font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <h3>320px viewport - truncated (default)</h3>
  <div class="container">
    <span class="ease-badge">This is a very long automatically generated status label</span>
  </div>

  <h3>320px viewport - chip truncated</h3>
  <div class="container">
    <span class="ease-chip">Another extremely long dynamically generated chip text content</span>
  </div>

  <h3>320px viewport - wrap modifier</h3>
  <div class="container">
    <span class="ease-badge ease-badge-wrap">This is a very long automatically generated status label that wraps</span>
  </div>

</body>
</html>
