<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Neon Rotate Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="cyber-card">

        <h2>CYBERPUNK OS</h2>

        <p>
            Experience a futuristic neon dashboard with a pure CSS rotate-click modal.
        </p>

        <a href="#modal" class="btn">
            Launch Console
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">Neon Control Center</h2>

        <div class="grid">

            <div class="panel">
                <h3>CPU</h3>
                <span>98%</span>
            </div>

            <div class="panel">
                <h3>Network</h3>
                <span>1.8Gb/s</span>
            </div>

            <div class="panel">
                <h3>Security</h3>
                <span>ONLINE</span>
            </div>

            <div class="panel">
                <h3>Energy</h3>
                <span>86%</span>
            </div>

        </div>

        <button class="action-btn">
            Initialize System
        </button>

    </div>

</div>

</body>
</html>
