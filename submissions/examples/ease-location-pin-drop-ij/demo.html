<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Location Pin Drop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lpd-container">
    <h1>Locations</h1>
    <p class="lpd-sub">Click a pin to re-drop it</p>
    <div class="lpd-map" id="map">
      <div class="lpd-pin" data-label="Central Park" style="top:20%;left:30%">
        <div class="lpd-pin-icon">&#9873;</div>
        <span class="lpd-label">Central Park</span>
        <div class="lpd-ripple"></div>
      </div>
      <div class="lpd-pin" data-label="Harbor View" style="top:45%;left:65%">
        <div class="lpd-pin-icon">&#9873;</div>
        <span class="lpd-label">Harbor View</span>
        <div class="lpd-ripple"></div>
      </div>
      <div class="lpd-pin" data-label="Sunset Hill" style="top:65%;left:20%">
        <div class="lpd-pin-icon">&#9873;</div>
        <span class="lpd-label">Sunset Hill</span>
        <div class="lpd-ripple"></div>
      </div>
      <div class="lpd-pin" data-label="River Walk" style="top:35%;left:50%">
        <div class="lpd-pin-icon">&#9873;</div>
        <span class="lpd-label">River Walk</span>
        <div class="lpd-ripple"></div>
      </div>
      <div class="lpd-pin" data-label="Old Town" style="top:75%;left:75%">
        <div class="lpd-pin-icon">&#9873;</div>
        <span class="lpd-label">Old Town</span>
        <div class="lpd-ripple"></div>
      </div>
    </div>
  </main>
  <script>
    document.querySelectorAll('.lpd-pin').forEach(pin => {
      pin.addEventListener('click', function(e) {
        e.stopPropagation();
        this.classList.remove('lpd-landed');
        void this.offsetWidth;
        this.classList.add('lpd-dropping');
        setTimeout(() => {
          this.classList.remove('lpd-dropping');
          this.classList.add('lpd-landed');
        }, 800);
      });
      setTimeout(() => pin.classList.add('lpd-landed'), 100);
    });
  </script>
</body>
</html>
