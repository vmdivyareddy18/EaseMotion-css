<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS 3D Data Visualization Engine</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <div class="ease-data-viz-engine">
      
      <!-- Interactive State Filters (The Logic Engine) -->
      <input type="radio" id="view-q1" name="data-filter" class="state-toggle" checked />
      <input type="radio" id="view-q2" name="data-filter" class="state-toggle" />
      <input type="radio" id="view-compare" name="data-filter" class="state-toggle" />

      <div class="header">
        <h2 class="title">Corporate Revenue</h2>
        <div class="chart-controls">
          <label for="view-q1" class="filter-btn">Q1 Data</label>
          <label for="view-q2" class="filter-btn">Q2 Data</label>
          <label for="view-compare" class="filter-btn">Compare</label>
        </div>
      </div>

      <!-- 3D Rendering Stage -->
      <div class="scene-3d">
        <div class="chart-stage">
          
          <!-- 3D Data Bar A (Product A) -->
          <div class="bar-3d product-a">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face right"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
            <div class="label-3d">Product A</div>
          </div>

          <!-- 3D Data Bar B (Product B) -->
          <div class="bar-3d product-b">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="face left"></div>
            <div class="face right"></div>
            <div class="face top"></div>
            <div class="face bottom"></div>
            <div class="label-3d">Product B</div>
          </div>

        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
