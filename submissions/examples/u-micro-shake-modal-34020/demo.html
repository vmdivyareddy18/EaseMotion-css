<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Micro Shake Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Accessible Web

</span>

<h1>

Micro Shake Modal

</h1>

<p>

An accessible modal component
using subtle micro-shake
motion to enhance user
feedback without distraction.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

♿

</div>

<h2>

Accessible Experience

</h2>

<p>

Designed with keyboard
navigation, semantic markup
and responsive behavior
for inclusive interfaces.

</p>

<button>

Continue

</button>

</div>

</div>

</div>

</section>

</body>

</html>
