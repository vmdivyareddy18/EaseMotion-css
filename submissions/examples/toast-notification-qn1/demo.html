<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Toast Notification - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Hidden Checkbox to trigger the toast -->
    <input type="checkbox" id="toast-trigger-qn" class="toast-checkbox-qn">

    <!-- Trigger Button -->
    <label for="toast-trigger-qn" class="trigger-btn-qn">Show Notification</label>

    <!-- Toast Container -->
    <div class="toast-container-qn">
        <div class="toast-icon-qn">
            <!-- Checkmark SVG -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="toast-content-qn">
            <h4 class="toast-title-qn">Success!</h4>
            <p class="toast-message-qn">Your changes have been saved successfully.</p>
        </div>
        <!-- Progress Bar -->
        <div class="toast-progress-qn"></div>
    </div>
</body>
</html>
