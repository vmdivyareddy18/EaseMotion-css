<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metric ribbon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell" aria-label="Metric ribbon example">
    <section class="demo-card">
      <p class="eyebrow">Operations</p>
      <h1>Metric ribbon</h1>
      <ul class="demo-list">
      <li><span>Today 128</span><b></b></li>
      <li><span>Week 846</span><b></b></li>
      <li><span>Month 3910</span><b></b></li>
      </ul>
      <button type="button">View details</button>
    </section>
  </main>
</body>
</html>
