<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catapult Hashtag Input | EaseMotion CSS</title>
  
  <!-- Tailwind Play CDN for layout presentation wrapper only -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Local module style registration -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

  <div class="text-center space-y-2 mb-12">
    <span class="text-xs font-mono uppercase tracking-widest text-blue-400 font-semibold px-2.5 py-1 bg-blue-500/10 rounded-full">GSSoC-26 Intermediate Track</span>
    <h1 class="text-3xl font-extrabold tracking-tight">Catapult Hashtag Input</h1>
    <p class="text-sm text-slate-400">Pure CSS elastic launch workflow for corporate tag tracking</p>
  </div>

  <!-- Interactive Component Box Frame -->
  <div class="ease-catapult-wrapper">
    
    <!-- State Management Checkboxes (Pure CSS Triggering Mechanism) -->
    <input type="checkbox" id="tag-trigger-1" class="ease-tag-state-checkbox" checked>
    <input type="checkbox" id="tag-trigger-2" class="ease-tag-state-checkbox">
    <input type="checkbox" id="tag-trigger-3" class="ease-tag-state-checkbox">

    <!-- Primary Input Interface Field Header -->
    <form class="ease-catapult-input-bar" onsubmit="event.preventDefault();">
      <div class="ease-hash-prefix">#</div>
      <input 
        type="text" 
        class="ease-main-text-input" 
        placeholder="Type tag and press button to catapult..." 
        aria-label="Hashtag Input Field"
      >
      
      <!-- Interactive Launch Controller Nodes -->
      <div class="ease-catapult-controls">
        <label for="tag-trigger-2" class="ease-launch-btn btn-trigger-2" role="button" aria-label="Launch Marketing Tag">
          <span>Add Tag</span>
        </label>
        <label for="tag-trigger-3" class="ease-launch-btn btn-trigger-3" role="button" aria-label="Launch FinTech Tag">
          <span>Add Tag</span>
        </label>
      </div>
    </form>

    <!-- Target Delivery Basin (Where Badges Spin & Deploy Into) -->
    <div class="ease-tag-reservoir" aria-label="Active Hashtags Container">
      
      <!-- Hashtag Pill Unit 1 -->
      <div class="ease-catapult-pill tag-node-1">
        <span class="ease-pill-hash">#</span>corporate
        <label for="tag-trigger-1" class="ease-pill-remove-btn" role="button" aria-label="Remove corporate tag">×</label>
      </div>

      <!-- Hashtag Pill Unit 2 -->
      <div class="ease-catapult-pill tag-node-2">
        <span class="ease-pill-hash">#</span>marketing
        <label for="tag-trigger-2" class="ease-pill-remove-btn" role="button" aria-label="Remove marketing tag">×</label>
      </div>

      <!-- Hashtag Pill Unit 3 -->
      <div class="ease-catapult-pill tag-node-3">
        <span class="ease-pill-hash">#</span>fintech
        <label for="tag-trigger-3" class="ease-pill-remove-btn" role="button" aria-label="Remove fintech tag">×</label>
      </div>

    </div>
  </div>

</body>
</html>
