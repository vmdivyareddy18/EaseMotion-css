<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Griffin Soar Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="sky-container">
        <div class="header-info">
            <h2>Animation: <span class="accent">ease-griffin-soar</span></h2>
            <p>A majestic, multi-axis flight and wing-beat simulation utility for mythical avatars or epic UI elements.</p>
        </div>

        <div class="flight-theater">
            
            <div class="creature-card">
                <div class="flight-zone">
                    <div class="griffin-avatar ease-griffin-soar">🦅🦁</div>
                </div>
                <span class="badge">Default Soar (Gliding)</span>
            </div>

            <div class="creature-card">
                <div class="flight-zone">
                    <div class="griffin-avatar ease-griffin-soar-climb">🦅🦁</div>
                </div>
                <span class="badge">Power Climb (Fast)</span>
            </div>

            <div class="creature-card">
                <div class="flight-zone">
                    <div class="griffin-avatar ease-griffin-soar-heavy">🦅🦁</div>
                </div>
                <span class="badge">High Altitude (Slow)</span>
            </div>

        </div>
    </div>

</body>
</html>
