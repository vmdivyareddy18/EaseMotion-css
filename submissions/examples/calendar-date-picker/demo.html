<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Date Picker — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 4rem 1rem; margin: 0;">

  <div class="ease-calendar-container">
    
    <div class="ease-calendar-header">
      <button class="ease-btn-nav-cal" onclick="changeMonth(-1)">◀</button>
      <h3 class="ease-calendar-month-year" id="monthYearDisplay">October 2026</h3>
      <button class="ease-btn-nav-cal" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="ease-calendar-grid">
      <div class="ease-weekday-label">Su</div>
      <div class="ease-weekday-label">Mo</div>
      <div class="ease-weekday-label">Tu</div>
      <div class="ease-weekday-label">We</div>
      <div class="ease-weekday-label">Th</div>
      <div class="ease-weekday-label">Fr</div>
      <div class="ease-weekday-label">Sa</div>
    </div>

    <div class="ease-calendar-grid ease-calendar-days-body" id="daysGrid">
      </div>

  </div>

  <script>
    const months = [
      "January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"
    ];

    let currentMonthIdx = 9; // October
    let currentYear = 2026;
    let selectedDayNum = 15; // Prefill default active selection

    const monthYearDisplay = document.getElementById('monthYearDisplay');
    const daysGrid = document.getElementById('daysGrid');

    function renderCalendar() {
      daysGrid.innerHTML = '';
      monthYearDisplay.textContent = `${months[currentMonthIdx]} ${currentYear}`;

      // Configured alignment offsets for sample sandbox matrices
      const firstDayOffset = new Date(currentYear, currentMonthIdx, 1).getDay();
      const totalDays = new Date(currentYear, currentMonthIdx + 1, 0).getDate();

      // Output padding nodes for blank grid columns
      for (let i = 0; i < firstDayOffset; i++) {
        const emptyCell = document.createElement('div');
        emptyCell.className = 'ease-date-cell is-empty';
        daysGrid.appendChild(emptyCell);
      }

      // Output active numbered days
      for (let day = 1; day <= totalDays; day++) {
        const dayBtn = document.createElement('button');
        dayBtn.className = 'ease-date-cell';
        dayBtn.textContent = day;

        if (day === selectedDayNum) {
          dayBtn.classList.add('is-selected');
        }

        dayBtn.addEventListener('click', () => {
          document.querySelectorAll('.ease-date-cell').forEach(c => c.classList.remove('is-selected'));
          dayBtn.classList.add('is-selected');
          selectedDayNum = day;
        });

        daysGrid.appendChild(dayBtn);
      }
    }

    function changeMonth(direction) {
      // Apply clean crossfade container state switches
      monthYearDisplay.classList.add('is-changing');
      daysGrid.classList.add('is-changing');

      setTimeout(() => {
        currentMonthIdx += direction;
        if (currentMonthIdx < 0) {
          currentMonthIdx = 11;
          currentYear--;
        } else if (currentMonthIdx > 11) {
          currentMonthIdx = 0;
          currentYear++;
        }
        
        // Reset choice boundary across tracking pages
        selectedDayNum = null; 
        
        renderCalendar();

        monthYearDisplay.classList.remove('is-changing');
        daysGrid.classList.remove('is-changing');
      }, 200);
    }

    // Initial deployment load
    renderCalendar();
  </script>
</body>
</html>
