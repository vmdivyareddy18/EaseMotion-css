<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Interface - Nature Morph Context Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nature-viewport">
        <!-- Interactive Ecosystem Workspace Node Canvas Sheet -->
        <div class="organic-workspace-sheet">
            <header class="sheet-header">
                <span class="eco-badge">Biomimetic UI</span>
                <h1 class="sheet-title">Ecosystem Node Controller</h1>
                <p class="sheet-subtitle">Check the box below to trigger the morphing context interface block layers.</p>
            </header>

            <!-- Custom Core Playback Control Matrix Interface Shell Area -->
            <div class="interactive-surface-area">
                <!-- Pure-CSS Functional Interactive Trigger Gate Checkbox -->
                <input type="checkbox" id="morph-menu-gate" class="menu-input-gate">
                
                <!-- Custom Stylized Interactive Trigger Toggle Selector Button Box Label -->
                <label for="morph-menu-gate" class="organic-trigger-node">
                    <span class="leaf-icon"></span>
                    <span class="trigger-label-text">Initialize Interface</span>
                </label>

                <!-- Hardened Advanced Fluid Nature Morph Context Menu Canvas Shell -->
                <div class="morph-context-menu">
                    <div class="menu-inner-content">
                        <div class="menu-header-node">Ecosystem Menu</div>
                        <ul class="menu-list-links">
                            <li class="menu-item-row"><a href="#growth" class="menu-link-item">Growth Analytics</a></li>
                            <li class="menu-item-row"><a href="#photosynthesis" class="menu-link-item">Energy Efficiency</a></li>
                            <li class="menu-item-row"><a href="#hydration" class="menu-link-item">Hydration Sync</a></li>
                            <li class="menu-item-row"><a href="#canopy" class="menu-link-item">Canopy Settings</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <footer class="sheet-footer">
                <div class="eco-telemetry-badge">
                    <span class="status-beacon-pulse"></span>
                    <span class="beacon-label">Biometric Telemetry Live</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
