<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Poll Widget</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="poll-container">

    <section class="poll-widget" aria-label="Poll Widget">

      <h1>Choose Your Favorite Theme</h1>
      <p class="subtitle">Vote for the next design update</p>

      <div class="poll-option">
        <span>🌌 Space Theme</span>
        <div class="bar">
          <div class="fill space"></div>
        </div>
        <strong>65%</strong>
      </div>


      <div class="poll-option">
        <span>🌿 Nature Theme</span>
        <div class="bar">
          <div class="fill nature"></div>
        </div>
        <strong>35%</strong>
      </div>


    </section>

  </main>

</body>
</html>
