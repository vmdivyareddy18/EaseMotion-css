<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elastic Toggle Switch - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-container">
      <header class="ease-slide-in-from-top">
        <span class="badge">Example</span>
        <h1>Elastic Toggle Switch</h1>
        <p class="intro">
          Pure CSS elastic toggle switch with neon presets and responsive
          sizing.
        </p>
      </header>

      <section class="glow-card ease-slide-up" style="animation-delay: 100ms">
        <h2>Color Presets</h2>
        <div class="grid-presets">
          <div class="toggle-item">
            <span class="toggle-title">Cyan</span>
            <label class="neon-toggle-wrapper-ag theme-cyan-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                checked
                aria-label="Cyan Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
            </label>
          </div>

          <div class="toggle-item">
            <span class="toggle-title">Green</span>
            <label class="neon-toggle-wrapper-ag theme-green-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                aria-label="Green Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
            </label>
          </div>

          <div class="toggle-item">
            <span class="toggle-title">Pink</span>
            <label class="neon-toggle-wrapper-ag theme-pink-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                checked
                aria-label="Pink Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
            </label>
          </div>

          <div class="toggle-item">
            <span class="toggle-title">Amber</span>
            <label class="neon-toggle-wrapper-ag theme-amber-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                aria-label="Amber Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
            </label>
          </div>

          <div class="toggle-item">
            <span class="toggle-title">Purple</span>
            <label class="neon-toggle-wrapper-ag theme-purple-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                checked
                aria-label="Purple Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
            </label>
          </div>
        </div>
      </section>

      <section class="glow-card ease-slide-up" style="animation-delay: 200ms">
        <h2>Sizes</h2>
        <div class="size-showcase">
          <div class="toggle-item" style="flex: 1; min-width: 150px">
            <span class="toggle-title" style="margin-bottom: 8px">Small</span>
            <label class="neon-toggle-wrapper-ag theme-cyan-ag size-sm-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                aria-label="Small Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
              <span class="neon-toggle-label-ag">Compact</span>
            </label>
          </div>

          <div class="toggle-item" style="flex: 1; min-width: 150px">
            <span class="toggle-title" style="margin-bottom: 8px">Medium</span>
            <label class="neon-toggle-wrapper-ag theme-cyan-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                checked
                aria-label="Default Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
              <span class="neon-toggle-label-ag">Standard</span>
            </label>
          </div>

          <div class="toggle-item" style="flex: 1; min-width: 150px">
            <span class="toggle-title" style="margin-bottom: 8px">Large</span>
            <label class="neon-toggle-wrapper-ag theme-cyan-ag size-lg-ag">
              <input
                type="checkbox"
                class="neon-toggle-input-ag"
                aria-label="Large Switch"
              />
              <span class="neon-toggle-track-ag">
                <span class="neon-toggle-status-ag status-on-ag">ON</span>
                <span class="neon-toggle-status-ag status-off-ag">OFF</span>
                <span class="neon-toggle-thumb-ag"></span>
              </span>
              <span class="neon-toggle-label-ag">Large</span>
            </label>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
