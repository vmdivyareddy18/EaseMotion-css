<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Text</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Typing Text Animation</h1>
  <p>CSS-only typewriter with blinking cursor.</p>
  <div class="typing-demo"><span class="typing-text">Hello, world!</span></div>
  <div class="typing-demo"><span class="typing-text delay-1">Building the future...</span></div>
  <div class="typing-demo"><span class="typing-text delay-2">CSS animations only.</span></div>
  <div class="hero-section">
    <div class="hero-typing"><span class="hero-text">Welcome to </span><span class="typewriter">EaseMotion</span><span class="cursor">|</span></div>
  </div>
</div>
<script>
const typewriterEl = document.querySelector('.typewriter');
const words = ['EaseMotion', 'CSS', 'Animations', 'Magic'];
let wordIndex = 0, charIndex = 0, isDeleting = false;
function type() {
  const current = words[wordIndex];
  typewriterEl.textContent = isDeleting ? current.substring(0, --charIndex) : current.substring(0, ++charIndex);
  if (!isDeleting && charIndex === current.length) { setTimeout(() => isDeleting = true, 2000); }
  else if (isDeleting && charIndex === 0) { isDeleting = false; wordIndex = (wordIndex + 1) % words.length; }
  setTimeout(type, isDeleting ? 80 : 120);
}
type();
</script>
</body></html>
