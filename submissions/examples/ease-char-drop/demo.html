<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-char-drop – Character Drop Entrance</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">
  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Character Drop</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Each character drops in from above with a staggered delay.</p>
    <div id="drop-target" class="char-drop-text ease-text-3xl ease-font-bold">Hello World</div>
    <button id="replay-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">Replay</button>
    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">Wraps each character in a span and uses <code>--ease-char-delay</code>.</p>
  </div>
  <script>
    const target = document.getElementById('drop-target');
    const replayBtn = document.getElementById('replay-btn');
    const originalText = target.textContent;

    function wrapChars() {
      target.innerHTML = '';
      for (let i = 0; i < originalText.length; i++) {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = originalText[i];
        span.style.setProperty('--ease-char-delay', (i * 0.05).toFixed(2) + 's');
        target.appendChild(span);
      }
    }

    function play() {
      target.classList.remove('drop-active');
      void target.offsetWidth; // reflow
      wrapChars();
      target.classList.add('drop-active');
    }

    window.addEventListener('load', () => setTimeout(play, 300));
    replayBtn.addEventListener('click', play);
  </script>
</body>
</html>
