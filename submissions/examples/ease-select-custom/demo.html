<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseSelectCustom // Accessible Component Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ease-showcase-container">
        <header class="ease-showcase-header">
            <span class="ease-badge">UTILITY COMPONENT</span>
            <h1>Custom Select Dropdown</h1>
            <p>A fully accessible, keyboard-navigable dropdown element with hardware-accelerated orchestration transitions.</p>
        </header>

        <!-- Custom Select Component Scope -->
        <div class="ease-select-wrapper">
            <label id="ease-select-label" class="ease-select-label">Deployment Cluster Region</label>
            
            <!-- Trigger Button -->
            <button 
                id="ease-select-trigger" 
                class="ease-select-trigger"
                aria-haspopup="listbox" 
                aria-expanded="false" 
                aria-labelledby="ease-select-label ease-select-trigger"
            >
                <span id="ease-select-value">Select cluster instance...</span>
                <span class="ease-select-arrow" aria-hidden="true">▼</span>
            </button>

            <!-- Animated Dropdown Options List -->
            <ul 
                id="ease-select-options" 
                class="ease-select-options" 
                role="listbox" 
                aria-labelledby="ease-select-label"
                tabindex="-1"
            >
                <li class="ease-select-option" role="option" aria-selected="false" data-value="us-east">
                    <span>us-east-1 (N. Virginia)</span>
                    <span class="ease-check-icon" aria-hidden="true">✓</span>
                </li>
                <li class="ease-select-option" role="option" aria-selected="false" data-value="us-west">
                    <span>us-west-2 (Oregon)</span>
                    <span class="ease-check-icon" aria-hidden="true">✓</span>
                </li>
                <li class="ease-select-option" role="option" aria-selected="false" data-value="eu-central">
                    <span>eu-central-1 (Frankfurt)</span>
                    <span class="ease-check-icon" aria-hidden="true">✓</span>
                </li>
                <li class="ease-select-option" role="option" aria-selected="false" data-value="ap-south">
                    <span>ap-south-1 (Mumbai)</span>
                    <span class="ease-check-icon" aria-hidden="true">✓</span>
                </li>
            </ul>
        </div>
    </div>

    <!-- Mini Framework Controller Implementation -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trigger = document.getElementById('ease-select-trigger');
            const optionsList = document.getElementById('ease-select-options');
            const options = Array.from(optionsList.querySelectorAll('.ease-select-option'));
            const valueSpan = document.getElementById('ease-select-value');
            let activeIndex = -1;

            function toggleDropdown(show) {
                const expanded = show !== undefined ? show : trigger.getAttribute('aria-expanded') === 'false';
                trigger.setAttribute('aria-expanded', expanded);
                if (expanded) {
                    optionsList.classList.add('ease-open');
                    if (activeIndex >= 0) options[activeIndex].focus();
                } else {
                    optionsList.classList.remove('ease-open');
                    trigger.focus();
                }
            }

            function updateSelection(index) {
                options.forEach((opt, idx) => {
                    const isSelected = idx === index;
                    opt.setAttribute('aria-selected', isSelected ? 'true' : 'false');
                    if (isSelected) {
                        opt.classList.add('ease-selected');
                        valueSpan.textContent = opt.querySelector('span').textContent;
                    } else {
                        opt.classList.remove('ease-selected');
                    }
                });
            }

            trigger.addEventListener('click', () => toggleDropdown());

            options.forEach((option, index) => {
                option.addEventListener('click', (e) => {
                    e.stopPropagation();
                    activeIndex = index;
                    updateSelection(index);
                    toggleDropdown(false);
                });

                option.addEventListener('mouseenter', () => {
                    options.forEach(opt => opt.classList.remove('ease-focused'));
                    option.classList.add('ease-focused');
                    activeIndex = index;
                });
            });

            // Keyboard Accessibility Map Vector
            document.addEventListener('keydown', (e) => {
                const isOpen = trigger.getAttribute('aria-expanded') === 'true';

                if (!isOpen && (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ')) {
                    if (document.activeElement === trigger) {
                        e.preventDefault();
                        toggleDropdown(true);
                        activeIndex = activeIndex === -1 ? 0 : activeIndex;
                        options[activeIndex].classList.add('ease-focused');
                        options[activeIndex].focus();
                    }
                    return;
                }

                if (isOpen) {
                    if (e.key === 'Escape') {
                        e.preventDefault();
                        toggleDropdown(false);
                    } else if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        options[activeIndex]?.classList.remove('ease-focused');
                        activeIndex = (activeIndex + 1) % options.length;
                        options[activeIndex].classList.add('ease-focused');
                        options[activeIndex].focus();
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        options[activeIndex]?.classList.remove('ease-focused');
                        activeIndex = (activeIndex - 1 + options.length) % options.length;
                        options[activeIndex].classList.add('ease-focused');
                        options[activeIndex].focus();
                    } else if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        updateSelection(activeIndex);
                        toggleDropdown(false);
                    }
                }
            });

            // Click outside mechanics closure
            document.addEventListener('click', (e) => {
                if (!trigger.contains(e.target) && !optionsList.contains(e.target)) {
                    toggleDropdown(false);
                }
            });
        });
    </script>
</body>
</html>
