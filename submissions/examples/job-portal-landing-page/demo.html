<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Portal Landing Page</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="sky-glow"></div>
  <main class="job-portal">
    <header class="app-header">
      <div class="logo">CareerLink</div>
      <nav class="nav">
        <a href="#jobs">Find Jobs</a>
        <a href="#salary">Salaries</a>
      </nav>
      <button class="btn-post">Post a Job</button>
    </header>

    <section class="hero-search">
      <h1>Find your next engineering role</h1>
      <p>Discover thousands of job openings with high fidelity teams.</p>
      <div class="search-bar">
        <input type="text" placeholder="Title, keywords, or company...">
        <button class="btn-search">Search</button>
      </div>
    </section>

    <section class="featured-jobs" id="jobs">
      <h2>Featured Openings</h2>
      <div class="jobs-grid">
        <div class="job-card">
          <div class="company-logo"></div>
          <div class="job-desc">
            <h3>Frontend Engineer</h3>
            <p>Linear • Remote</p>
          </div>
          <span class="salary-tag">$140k - $160k</span>
        </div>
        <div class="job-card">
          <div class="company-logo"></div>
          <div class="job-desc">
            <h3>Infrastructure Architect</h3>
            <p>Vercel • New York</p>
          </div>
          <span class="salary-tag">$180k - $210k</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
