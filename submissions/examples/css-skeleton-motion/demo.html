<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Skeleton Motion - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💀 CSS Skeleton Motion</h1>
            <p>Beautiful skeleton loading animations - Pure CSS!</p>
        </header>

        <!-- Skeleton 1: Card -->
        <section class="section">
            <h2>Card Skeleton</h2>
            <div class="skeleton-card">
                <div class="skeleton skeleton-image"></div>
                <div class="skeleton skeleton-title"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text short"></div>
            </div>
        </section>

        <!-- Skeleton 2: Profile -->
        <section class="section">
            <h2>Profile Skeleton</h2>
            <div class="skeleton-profile">
                <div class="skeleton skeleton-avatar"></div>
                <div class="profile-info">
                    <div class="skeleton skeleton-title"></div>
                    <div class="skeleton skeleton-text"></div>
                    <div class="skeleton skeleton-text short"></div>
                </div>
            </div>
        </section>

        <!-- Skeleton 3: List -->
        <section class="section">
            <h2>List Skeleton</h2>
            <div class="skeleton-list">
                <div class="list-item">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="list-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                </div>
                <div class="list-item">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="list-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                </div>
                <div class="list-item">
                    <div class="skeleton skeleton-circle"></div>
                    <div class="list-content">
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-text"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Skeleton 4: Grid -->
        <section class="section">
            <h2>Grid Skeleton</h2>
            <div class="skeleton-grid">
                <div class="grid-item">
                    <div class="skeleton skeleton-square"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
                <div class="grid-item">
                    <div class="skeleton skeleton-square"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
                <div class="grid-item">
                    <div class="skeleton skeleton-square"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
                <div class="grid-item">
                    <div class="skeleton skeleton-square"></div>
                    <div class="skeleton skeleton-text"></div>
                </div>
            </div>
        </section>

        <!-- Skeleton 5: Article -->
        <section class="section">
            <h2>Article Skeleton</h2>
            <div class="skeleton-article">
                <div class="skeleton skeleton-banner"></div>
                <div class="skeleton skeleton-title large"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text"></div>
                <div class="skeleton skeleton-text short"></div>
            </div>
        </section>

        <!-- Skeleton 6: Chat -->
        <section class="section">
            <h2>Chat Skeleton</h2>
            <div class="skeleton-chat">
                <div class="chat-message left">
                    <div class="skeleton skeleton-circle small"></div>
                    <div class="skeleton skeleton-bubble"></div>
                </div>
                <div class="chat-message right">
                    <div class="skeleton skeleton-bubble"></div>
                    <div class="skeleton skeleton-circle small"></div>
                </div>
                <div class="chat-message left">
                    <div class="skeleton skeleton-circle small"></div>
                    <div class="skeleton skeleton-bubble long"></div>
                </div>
            </div>
        </section>

        <!-- Features -->
        <section class="section">
            <h2>✨ Features</h2>
            <div class="feature-grid">
                <div class="feature-item">💀 6 skeleton types</div>
                <div class="feature-item">🌊 Shimmer animation</div>
                <div class="feature-item">📱 Fully responsive</div>
                <div class="feature-item">⚡ Pure CSS</div>
                <div class="feature-item">🎨 Customizable</div>
                <div class="feature-item">🚀 Production ready</div>
            </div>
        </section>
    </div>
</body>
</html>
