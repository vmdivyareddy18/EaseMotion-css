<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Password Generator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🔐 Password Security Toolkit</h1>

    <!-- Mode Switch -->
    <div class="mode-switch">

        <button
            class="mode-btn active"
            id="generatorMode">

            Generator

        </button>

        <button
            class="mode-btn"
            id="checkerMode">

            Strength Checker

        </button>

    </div>

    <!-- Password Output -->

    <div class="password-box">

        <input
            type="text"
            id="password"
            placeholder="Generate Password"
            readonly
        >

        <button
            id="copyBtn"
            title="Copy Password">

            📋

        </button>

    </div>

    <!-- Checker Input -->

    <div
        id="checkerSection"
        style="display:none;">

        <label for="customPassword">
            Enter Your Password
        </label>

        <input
            type="text"
            id="customPassword"
            class="custom-input"
            placeholder="Type your password..."
        >

    </div>

    <!-- Length -->

    <div
        class="setting"
        id="lengthSection">

        <label>
            Password Length
        </label>

        <div class="slider-box">

            <input
                type="range"
                id="length"
                min="8"
                max="32"
                value="16"
            >

            <span id="lengthValue">
                16
            </span>

        </div>

    </div>

    <!-- Options -->

    <div
        class="options"
        id="optionsSection">

        <label>

            <input
                type="checkbox"
                id="uppercase"
                checked
            >

            Uppercase Letters

        </label>

        <label>

            <input
                type="checkbox"
                id="lowercase"
                checked
            >

            Lowercase Letters

        </label>

        <label>

            <input
                type="checkbox"
                id="numbers"
                checked
            >

            Numbers

        </label>

        <label>

            <input
                type="checkbox"
                id="symbols"
                checked
            >

            Symbols

        </label>

    </div>

    <!-- Strength -->

    <div class="strength">

        <p>Password Strength</p>

        <div class="strength-bar">

            <div id="strengthFill"></div>

        </div>

        <span id="strengthText">
            Strong
        </span>

    </div>

    <!-- Generate Button -->

    <button id="generateBtn">

        Generate Password

    </button>

</div>

<div id="toast">
    Copied to Clipboard!
</div>

<script>

const password =
document.getElementById("password");

const customPassword =
document.getElementById("customPassword");

const checkerSection =
document.getElementById("checkerSection");

const generatorMode =
document.getElementById("generatorMode");

const checkerMode =
document.getElementById("checkerMode");

const generateBtn =
document.getElementById("generateBtn");

const copyBtn =
document.getElementById("copyBtn");

const length =
document.getElementById("length");

const lengthValue =
document.getElementById("lengthValue");

const uppercase =
document.getElementById("uppercase");

const lowercase =
document.getElementById("lowercase");

const numbers =
document.getElementById("numbers");

const symbols =
document.getElementById("symbols");

const strengthFill =
document.getElementById("strengthFill");

const strengthText =
document.getElementById("strengthText");

const toast =
document.getElementById("toast");

const upperChars =
"ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const lowerChars =
"abcdefghijklmnopqrstuvwxyz";

const numberChars =
"0123456789";

const symbolChars =
"!@#$%^&*()_+-=[]{}<>?/";

length.addEventListener(
"input",
() => {

lengthValue.textContent =
length.value;

generatePassword();

});
function randomChar(chars){

    return chars[
        Math.floor(
            Math.random()*chars.length
        )
    ];

}

function shuffle(array){

    for(
        let i=array.length-1;
        i>0;
        i--
    ){

        let j=Math.floor(
            Math.random()*(i+1)
        );

        [array[i],array[j]]=
        [array[j],array[i]];

    }

    return array.join("");

}

function generatePassword(){

    let chars="";

    let pass=[];

    if(uppercase.checked){

        chars+=upperChars;

        pass.push(
            randomChar(upperChars)
        );

    }

    if(lowercase.checked){

        chars+=lowerChars;

        pass.push(
            randomChar(lowerChars)
        );

    }

    if(numbers.checked){

        chars+=numberChars;

        pass.push(
            randomChar(numberChars)
        );

    }

    if(symbols.checked){

        chars+=symbolChars;

        pass.push(
            randomChar(symbolChars)
        );

    }

    if(chars===""){

        password.value=
        "Select at least one option";

        updateStrength();

        return;

    }

    while(pass.length < length.value){

        pass.push(
            randomChar(chars)
        );

    }

    password.value=
    shuffle(pass);

    updateStrength();

}

function updateStrength(){

    let score=0;

    let value;

    if(
        checkerSection.style.display==="block"
    ){

        value=
        customPassword.value;

        score=0;

        if(value.length>=8)
            score++;

        if(/[A-Z]/.test(value))
            score++;

        if(/[a-z]/.test(value))
            score++;

        if(/[0-9]/.test(value))
            score++;

        if(/[^A-Za-z0-9]/.test(value))
            score++;

    }

    else{

        if(uppercase.checked)
            score++;

        if(lowercase.checked)
            score++;

        if(numbers.checked)
            score++;

        if(symbols.checked)
            score++;

        if(length.value>=16)
            score++;

    }

    if(score<=2){

        strengthFill.style.width="35%";

        strengthFill.style.background="#ff4d4d";

        strengthText.textContent="Weak";

    }

    else if(score<=4){

        strengthFill.style.width="70%";

        strengthFill.style.background="#ffb703";

        strengthText.textContent="Medium";

    }

    else{

        strengthFill.style.width="100%";

        strengthFill.style.background="#00d26a";

        strengthText.textContent="Strong";

    }

}

generatorMode.onclick=()=>{

    generatorMode.classList.add("active");

    checkerMode.classList.remove("active");

    checkerSection.style.display="none";

    document.getElementById("lengthSection").style.display="block";

    document.getElementById("optionsSection").style.display="flex";

    generateBtn.style.display="block";

    password.readOnly=true;

    generatePassword();

};

checkerMode.onclick=()=>{

    checkerMode.classList.add("active");

    generatorMode.classList.remove("active");

    checkerSection.style.display="block";

    document.getElementById("lengthSection").style.display="none";

    document.getElementById("optionsSection").style.display="none";

    generateBtn.style.display="none";

    updateStrength();

};
customPassword.addEventListener("input",()=>{

    updateStrength();

});

generateBtn.onclick=()=>{

    generatePassword();

};

copyBtn.onclick=()=>{

    let value="";

    if(checkerSection.style.display==="block"){

        value=customPassword.value;

    }
    else{

        value=password.value;

    }

    if(value==="") return;

    navigator.clipboard.writeText(value);

    toast.classList.add("show");

    setTimeout(()=>{

        toast.classList.remove("show");

    },1800);

};

uppercase.addEventListener("change",generatePassword);
lowercase.addEventListener("change",generatePassword);
numbers.addEventListener("change",generatePassword);
symbols.addEventListener("change",generatePassword);

generatePassword();

</script>

</body>
</html>
