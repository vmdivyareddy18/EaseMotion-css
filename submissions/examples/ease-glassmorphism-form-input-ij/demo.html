<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Form Input — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Glass Form Input</h2>
    <p>Glassmorphism input with a glowing focus ring. Click into the field.</p>
    <form class="glass-form" onsubmit="return false">
      <div class="glass-form__group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="glass-input" placeholder="e.g. Jane Doe">
      </div>
      <div class="glass-form__group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="glass-input" placeholder="e.g. jane@example.com">
      </div>
      <div class="glass-form__group">
        <label for="msg">Message</label>
        <textarea id="msg" class="glass-input glass-input--area" rows="3" placeholder="Your message…"></textarea>
      </div>
      <button type="submit" class="glass-form__btn">Send Message</button>
    </form>
    <div class="vars">
      <label>--input-bg <input type="color" value="rgba(255,255,255,0.06)" class="var-color" data-var="--input-bg"></label>
      <label>--glass-blur <input type="range" min="2" max="20" step="1" value="8" class="var-range" data-var="--glass-blur"></label>
      <label>--focus-glow <input type="color" value="#667eea" class="var-color" data-var="--focus-glow"></label>
      <label>--transition-speed <input type="range" min="0.1" max="1" step="0.05" value="0.3" class="var-range" data-var="--transition-speed"></label>
    </div>
  </div>

  <script>
    document.querySelectorAll('.var-color').forEach(inp => {
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value);
      });
    });
    document.querySelectorAll('.var-range').forEach(inp => {
      const display = document.createElement('span');
      const suffix = inp.dataset.var === '--glass-blur' ? 'px' : 's';
      display.textContent = inp.value + suffix;
      inp.after(display);
      inp.addEventListener('input', () => {
        const suffix = inp.dataset.var === '--glass-blur' ? 'px' : 's';
        document.documentElement.style.setProperty(inp.dataset.var, inp.value + suffix);
        display.textContent = inp.value + suffix;
      });
    });
  </script>
</body>
</html>
