<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Skew-Active Popover - Marketing Landing Page</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="marketing-viewport">
        <div class="brand-showcase-card">
            <div class="showcase-content">
                <span class="showcase-badge">NEW REVENUE ENGINE</span>
                <h1 class="showcase-heading">Dynamic Sales Pipelines</h1>
                <p class="showcase-subtext">Optimized interactive panels built specifically to capture attention and conversion rates instantly.</p>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">Check Live Rewards</span>
                        <svg class="bolt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                        </svg>
                    </button>
                    
                    <div class="skew-popover-card" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-accent">CONVERSION BOOST</span>
                                <p class="offer-title">Triple Sign-Up Bonus</p>
                            </div>
                            <div class="popover-body">
                                <p class="offer-desc">Unlock higher referral commissions and premium dashboard styling packages automatically upon launch.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
