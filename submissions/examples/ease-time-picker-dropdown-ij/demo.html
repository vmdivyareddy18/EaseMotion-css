<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Time Picker Dropdown Feature</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="showcase-container">
        <header class="showcase-header">
            <span class="badge">New Component</span>
            <h1>Time Picker Dropdown</h1>
            <p>A smooth, hardware-accelerated dropdown overlay with interactive selection layouts.</p>
        </header>

        <section class="demo-area">
            <div class="time-picker-wrapper">
                <div class="picker-trigger" id="picker-btn" onclick="toggleDropdown()">
                    <span class="selected-time" id="time-display">09:45 AM</span>
                    <svg class="clock-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                </div>

                <div class="ease-time-picker-dropdown hidden" id="time-dropdown">
                    <div class="picker-header">Select Time</div>
                    
                    <div class="picker-columns">
                        <div class="picker-column scroll-bar-hide">
                            <div class="picker-item">07</div>
                            <div class="picker-item">08</div>
                            <div class="picker-item active">09</div>
                            <div class="picker-item">10</div>
                            <div class="picker-item">11</div>
                        </div>

                        <div class="picker-column scroll-bar-hide">
                            <div class="picker-item">30</div>
                            <div class="picker-item">35</div>
                            <div class="picker-item">40</div>
                            <div class="picker-item active">45</div>
                            <div class="picker-item">50</div>
                        </div>

                        <div class="picker-column scroll-bar-hide">
                            <div class="picker-item active">AM</div>
                            <div class="picker-item">PM</div>
                        </div>
                    </div>

                    <div class="picker-footer">
                        <button class="btn btn-text" onclick="toggleDropdown()">Cancel</button>
                        <button class="btn btn-action" onclick="toggleDropdown()">Apply</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function toggleDropdown() {
            const dropdown = document.getElementById('time-dropdown');
            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                dropdown.classList.add('open');
            } else {
                dropdown.classList.remove('open');
                // Give animation time to complete before hard hiding
                setTimeout(() => {
                    if(!dropdown.classList.contains('open')) {
                        dropdown.classList.add('hidden');
                    }
                }, 200);
            }
        }

        // Close when clicking outside framework boundaries
        document.addEventListener('click', function(event) {
            const wrapper = document.querySelector('.time-picker-wrapper');
            const dropdown = document.getElementById('time-dropdown');
            if (!wrapper.contains(event.target)) {
                dropdown.classList.remove('open');
                dropdown.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
