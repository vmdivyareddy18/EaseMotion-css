<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Tilt Card Animation Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 80px 20px; margin: 0;">

  <div class="ease-tilt-perspective tilt-sandbox-grid">
    
    <div class="ease-tilt-card">
      <div class="ease-tilt-depth">
        <span class="tilt-badge">3D Transform</span>
        <h4 style="margin: 0 0 8px 0; color: #0f172a; font-size: 1.2rem;">Generative Space</h4>
        <p style="margin: 0; color: #475569; font-size: 0.85rem; line-height: 1.5;">
          Hover over this canvas frame to initiate sub-pixel matrix rotation. Internal layers elevate along the Z-axis natively.
        </p>
      </div>
    </div>

    <div class="ease-tilt-card" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: none;">
      <div class="ease-tilt-depth">
        <span class="tilt-badge" style="background-color: #312e81; color: #818cf8;">Hardware Accel</span>
        <h4 style="margin: 0 0 8px 0; color: #ffffff; font-size: 1.2rem;">Dark Variant</h4>
        <p style="margin: 0; color: #94a3b8; font-size: 0.85rem; line-height: 1.5;">
          Leverages high-performance CSS transition timing curves to guarantee high frames-per-second depth rendering.
        </p>
      </div>
    </div>

  </div>

</body>
</html>
