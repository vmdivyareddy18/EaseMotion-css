<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

3D Flip Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="portfolio">

<div class="container">

<div class="badge">

Creative Portfolio

</div>

<h1>

3D Flip Tooltip

</h1>

<p>

A modern tooltip component
crafted for portfolios,
designer showcases and
creative experiences.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

View Project

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="icon">

🎨

</div>

<h3>

Brand Identity

</h3>

<p>

A CSS-only 3D flip tooltip
designed for portfolios,
agency websites and
creative presentations.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
