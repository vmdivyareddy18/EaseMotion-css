<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-shimmer-like-button</title>
  <meta name="description" content="Animated like button with shimmer effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-shimmer-like-button</h1>
      <p class="subtitle" id="main-desc">Like button with shimmer animation</p>
    </header>

    <div class="display-area">
      
      <div class="btn-showcase">
        
        <!-- Default -->
        <div class="btn-item">
          <button class="ease-shimmer-like-btn" aria-label="Like">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count">1.2k</span>
          </button>
          <span class="btn-label">Default</span>
        </div>

        <!-- Primary -->
        <div class="btn-item">
          <button class="ease-shimmer-like-btn ease-shimmer-primary" aria-label="Like">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count">892</span>
          </button>
          <span class="btn-label">Primary</span>
        </div>

        <!-- Danger -->
        <div class="btn-item">
          <button class="ease-shimmer-like-btn ease-shimmer-danger" aria-label="Like">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count">3.4k</span>
          </button>
          <span class="btn-label">Danger</span>
        </div>

        <!-- Success -->
        <div class="btn-item">
          <button class="ease-shimmer-like-btn ease-shimmer-success" aria-label="Like">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count">567</span>
          </button>
          <span class="btn-label">Success</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Social Feed Example</h3>
      <div class="post-card">
        <div class="post-header">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Nala" alt="Avatar" class="post-avatar">
          <div class="post-info">
            <span class="post-author">Emily Rogers</span>
            <span class="post-time">2 hours ago</span>
          </div>
        </div>
        <p class="post-content">Just launched my new portfolio website! Check it out and let me know what you think. 🚀</p>
        <div class="post-actions">
          <button class="ease-shimmer-like-btn ease-shimmer-lg ease-shimmer-danger" aria-label="Like">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
            </svg>
            <span class="like-count">2.1k</span>
          </button>
          <button class="ease-shimmer-like-btn ease-shimmer-lg ease-shimmer-primary" aria-label="Comment">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
            <span class="like-count">156</span>
          </button>
          <button class="ease-shimmer-like-btn ease-shimmer-lg ease-shimmer-success" aria-label="Share">
            <svg class="like-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            <span class="like-count">Share</span>
          </button>
        </div>
      </div>
    </section>

  </main>

  <script>
    document.querySelectorAll('.ease-shimmer-like-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        btn.classList.toggle('is-liked');
      });
    });
  </script>

</body>
</html>
