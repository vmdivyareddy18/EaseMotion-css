<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Streaming App UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <h2>MusicFlow</h2>

        <nav>

            <a href="#">🏠 Home</a>
            <a href="#">🔍 Search</a>
            <a href="#">❤️ Favorites</a>
            <a href="#">📚 Library</a>

        </nav>

    </aside>

    <main class="content">

        <h1>Trending Albums</h1>

        <div class="albums">

            <div class="album-card">

                <div class="album-cover">🎵</div>

                <h3>Neon Nights</h3>

                <p>Synthwave Collection</p>

                <button>▶</button>

            </div>

            <div class="album-card">

                <div class="album-cover">🎧</div>

                <h3>Focus Mode</h3>

                <p>Deep Work Playlist</p>

                <button>▶</button>

            </div>

            <div class="album-card">

                <div class="album-cover">🔥</div>

                <h3>Top Hits</h3>

                <p>Weekly Trending</p>

                <button>▶</button>

            </div>

        </div>

    </main>

</div>

<div class="player">

    <div class="track">

        <strong>Neon Nights</strong>
        <span>by MusicFlow</span>

    </div>

    <div class="controls">

        <button>⏮</button>
        <button>▶</button>
        <button>⏭</button>

    </div>

</div>

</body>
</html>
