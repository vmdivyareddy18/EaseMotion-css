<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notification Email Subscribe</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='prompt-bg')r.style.setProperty('--prompt-bg',t.value);if(t.name==='bell-color')r.style.setProperty('--bell-color',t.value);if(t.name==='btn-color')r.style.setProperty('--btn-color',t.value);if(t.name==='ring-duration')r.style.setProperty('--ring-duration',t.value+'s')})</script>
<div class="container"><p class="title">Notification Email Subscribe</p>
<div class="prompt-card"><div class="bell-icon">&#128276;</div><h3>Get Notified</h3><p>Subscribe for email updates.</p><input type="email" placeholder="your@email.com"><button class="prompt-btn">Subscribe</button><button class="skip-btn">Skip</button></div>
<div class="controls"><label>BG: <input type="color" name="prompt-bg" value="#2d2d44"></label><label>Bell: <input type="color" name="bell-color" value="#4ecdc4"></label><label>Btn: <input type="color" name="btn-color" value="#4ecdc4"></label><label>Ring: <input type="range" name="ring-duration" min="0.5" max="4" step="0.1" value="2"></label></div></div></body></html>
