<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Landing Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hero">

    <h1>Grow Your Business Faster</h1>
    <p>Launch smarter campaigns with powerful analytics.</p>

    <div class="popover-wrapper">

        <button class="cta-btn">
            Learn More
        </button>

        <div class="popover" role="dialog" aria-label="Marketing Offer">

            <h3>🚀 Free Marketing Toolkit</h3>

            <p>
                Download premium landing page templates,
                SEO checklists, and campaign resources.
            </p>

            <a href="#">Get Started</a>

        </div>

    </div>

</section>

</body>
</html>
