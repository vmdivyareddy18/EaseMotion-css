<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Countdown Timer - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="countdown-container">
    <h1 class="countdown-title">Launch Countdown</h1>
    
    <div class="timer-grid">
      <!-- Days Card -->
      <div class="time-block">
        <div class="flip-card">
          <div class="card-face card-top">14</div>
          <div class="card-face card-bottom">14</div>
          <div class="card-face card-flip">14</div>
        </div>
        <span class="time-label">Days</span>
      </div>

      <!-- Hours Card -->
      <div class="time-block">
        <div class="flip-card">
          <div class="card-face card-top">08</div>
          <div class="card-face card-bottom">08</div>
          <div class="card-face card-flip animate-flip">08</div>
        </div>
        <span class="time-label">Hours</span>
      </div>

      <!-- Minutes Card -->
      <div class="time-block">
        <div class="flip-card">
          <div class="card-face card-top">32</div>
          <div class="card-face card-bottom">32</div>
          <div class="card-face card-flip animate-flip">32</div>
        </div>
        <span class="time-label">Minutes</span>
      </div>

      <!-- Seconds Card -->
      <div class="time-block">
        <div class="flip-card">
          <div class="card-face card-top">15</div>
          <div class="card-face card-bottom">15</div>
          <div class="card-face card-flip infinite-flip">15</div>
        </div>
        <span class="time-label">Seconds</span>
      </div>
    </div>
  </div>
</body>
</html>
