<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Countdown Timer - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="countdown-container">
    <!-- Event Info -->
    <div class="event-info ease-fade-in-down">
      <span class="event-badge">🚀 Product Launch</span>
      <h1>Something Amazing is Coming</h1>
      <p>Join us for the big reveal. Be the first to experience the future.</p>
    </div>

    <!-- Countdown Timer -->
    <div class="countdown-wrapper ease-zoom-in ease-delay-200">
      <div class="countdown-grid">
        
        <!-- Days -->
        <div class="time-unit ease-fade-in-up ease-delay-300">
          <div class="time-box">
            <span class="time-value ease-pulse">15</span>
          </div>
          <span class="time-label">Days</span>
        </div>

        <!-- Separator -->
        <div class="separator ease-fade-in ease-delay-400">:</div>

        <!-- Hours -->
        <div class="time-unit ease-fade-in-up ease-delay-500">
          <div class="time-box">
            <span class="time-value ease-pulse ease-delay-100">08</span>
          </div>
          <span class="time-label">Hours</span>
        </div>

        <!-- Separator -->
        <div class="separator ease-fade-in ease-delay-600">:</div>

        <!-- Minutes -->
        <div class="time-unit ease-fade-in-up ease-delay-700">
          <div class="time-box">
            <span class="time-value ease-pulse ease-delay-200">42</span>
          </div>
          <span class="time-label">Minutes</span>
        </div>

        <!-- Separator -->
        <div class="separator ease-fade-in ease-delay-800">:</div>

        <!-- Seconds -->
        <div class="time-unit ease-fade-in-up ease-delay-900">
          <div class="time-box">
            <span class="time-value ease-pulse ease-delay-300">27</span>
          </div>
          <span class="time-label">Seconds</span>
        </div>

      </div>
    </div>

    <!-- Call to Action -->
    <div class="cta-section ease-fade-in-up ease-delay-1000">
      <button class="notify-btn ease-hover-grow">
        <span class="btn-icon">🔔</span>
        Notify Me
      </button>
      <p class="cta-text">Get notified when we launch. No spam, we promise.</p>
    </div>

    <!-- Decorative Elements -->
    <div class="decoration dec-1 ease-float"></div>
    <div class="decoration dec-2 ease-float ease-delay-200"></div>
    <div class="decoration dec-3 ease-spin-slow"></div>
  </div>
</body>
</html>
