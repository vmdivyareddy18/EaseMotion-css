<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Firefly Font Switcher | EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


<main class="blog-page">


    <header class="blog-header">

        <h1>
            Creative Blog Studio
        </h1>

        <p>
            Switch typography styles with a smooth firefly inspired motion effect.
        </p>

    </header>



    <section class="font-switcher"
        aria-label="Font style switcher">


        <h2>
            Choose Reading Style
        </h2>


        <div class="font-options">


            <input 
            type="radio"
            id="modern"
            name="font"
            checked>


            <label 
            for="modern"
            class="option-card ease-hover-lift">

                Modern

            </label>




            <input 
            type="radio"
            id="classic"
            name="font">


            <label 
            for="classic"
            class="option-card ease-hover-lift">

                Classic

            </label>




            <input 
            type="radio"
            id="mono"
            name="font">


            <label 
            for="mono"
            class="option-card ease-hover-lift">

                Mono

            </label>


        </div>


    </section>




    <article class="blog-card ease-firefly">


        <span class="firefly"></span>


        <h2>
            Designing Better Digital Experiences
        </h2>


        <p>

            Good typography improves readability and creates
            a better connection between content and readers.

        </p>


        <button class="read-btn">
            Continue Reading
        </button>


    </article>


</main>


</body>

</html>
