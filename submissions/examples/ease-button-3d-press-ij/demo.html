<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Press Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>3D Press Buttons</h1>

  <section class="demo-group">
    <button class="btn-3d btn-3d--primary">Click me</button>
    <button class="btn-3d btn-3d--secondary">Click me</button>
    <button class="btn-3d btn-3d--success">Click me</button>
    <button class="btn-3d btn-3d--danger">Click me</button>
  </section>

  <section class="demo-group">
    <button class="btn-3d btn-3d--primary btn-3d--sm">Click me</button>
    <button class="btn-3d btn-3d--primary btn-3d--lg">Click me</button>
    <button class="btn-3d btn-3d--primary btn-3d--block">Click me</button>
  </section>
</body>
</html>
