<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Reaction Picker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="demo">
    <h1>Glow Reaction Picker</h1>

    <div class="ease-glow-reaction-picker" aria-label="Reaction picker">

      <button class="reaction" aria-label="Love">❤️</button>
      <button class="reaction" aria-label="Like">👍</button>
      <button class="reaction" aria-label="Wow">😮</button>
      <button class="reaction" aria-label="Celebrate">🎉</button>
      <button class="reaction" aria-label="Laugh">😂</button>

    </div>

  </main>

</body>
</html>
