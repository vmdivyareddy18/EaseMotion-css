<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Checkout Modal // Pure CSS Floating Orbit Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); /* Elegant ambient catalog dashboard backdrop */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <a href="#premium-checkout-overlay" class="ease-checkout-action-btn" style="max-width: 240px;">
    PROCEED_TO_CHECKOUT
  </a>

  <div id="premium-checkout-overlay" class="ease-checkout-modal-overlay" role="dialog" aria-labelledby="billing-modal-title" aria-modal="true">
    <div class="ease-checkout-modal-box">

      <div class="ease-checkout-orbit-container" aria-hidden="true">
        <div class="ease-checkout-orbit-satellite"></div>
      </div>

      <a href="#" class="ease-checkout-close-cross" aria-label="Dismiss Order Window">&times;</a>

      <h2 id="billing-modal-title" class="ease-checkout-title">Order Verification</h2>
      <p class="ease-checkout-meta">Please inspect your checkout cart parameters before final lock.</p>

      <div class="ease-checkout-summary-box">
        <div class="ease-checkout-row">
          <span>Merino Wool Performance Knit (x1)</span>
          <span>$120.00</span>
        </div>
        <div class="ease-checkout-row">
          <span>Priority Premium Logistics Shipping</span>
          <span>$15.00</span>
        </div>
        <div class="ease-checkout-row">
          <span>Estimated Total Aggregate</span>
          <span>$135.00</span>
        </div>
      </div>
      <a href="#" class="ease-checkout-action-btn">CONFIRM_AND_PAY_NOW</a>
    </div>
  </div>

</body>
</html>
