<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading Components - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to skeleton specific styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <div class="demo-section">
      <h1 class="demo-title">Skeleton Loading Components</h1>
      <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
        A set of composite skeleton placeholders for avatars, text lines, buttons, and full cards. Built on top of the framework's existing shimmer and pulse keyframes.
      </p>
    </div>

    <!-- 1. Basic Utility Skeletons -->
    <div class="demo-section">
      <h2 class="demo-subtitle">Basic Placeholder Elements</h2>
      
      <div class="demo-flex">
        <!-- Circular Avatar Shimmer -->
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-shimmer"></div>
        <!-- Circular Avatar Pulse -->
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-pulse" style="background-color: var(--ease-color-neutral-300);"></div>
        <!-- Button Shimmer -->
        <div class="ease-skeleton ease-skeleton-button ease-skeleton-shimmer"></div>
        <!-- Button Pulse -->
        <div class="ease-skeleton ease-skeleton-button ease-skeleton-pulse" style="background-color: var(--ease-color-neutral-300);"></div>
      </div>

      <div style="max-width: 400px; margin-top: 2rem;">
        <!-- Heading Skeletons -->
        <div class="ease-skeleton ease-skeleton-heading ease-skeleton-shimmer"></div>
        <div class="ease-skeleton ease-skeleton-heading ease-skeleton-pulse" style="width: 45%; background-color: var(--ease-color-neutral-300);"></div>
        
        <!-- Multi-line Text Skeletons -->
        <div style="margin-top: 1.5rem;">
          <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
          <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
          <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
          <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
        </div>
      </div>
    </div>

    <!-- 2. Composite Skeleton Cards -->
    <div class="demo-section">
      <h2 class="demo-subtitle">Composite Skeleton Cards</h2>
      
      <div class="demo-grid">
        <!-- Card 1: Shimmer Animation -->
        <div class="ease-skeleton-card">
          <div class="ease-skeleton-card-media ease-skeleton ease-skeleton-shimmer"></div>
          <div class="ease-skeleton-card-header">
            <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-shimmer"></div>
            <div style="flex: 1;">
              <div class="ease-skeleton ease-skeleton-text ease-skeleton-shimmer" style="width: 70%; height: 0.75rem;"></div>
              <div class="ease-skeleton ease-skeleton-text ease-skeleton-shimmer" style="width: 40%; height: 0.5rem; margin-bottom: 0;"></div>
            </div>
          </div>
          <div class="ease-skeleton-card-body">
            <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
            <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
            <div class="ease-skeleton-text-line ease-skeleton-shimmer"></div>
          </div>
        </div>

        <!-- Card 2: Pulse Animation -->
        <div class="ease-skeleton-card">
          <div class="ease-skeleton-card-media ease-skeleton ease-skeleton-pulse"></div>
          <div class="ease-skeleton-card-header">
            <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-pulse"></div>
            <div style="flex: 1;">
              <div class="ease-skeleton ease-skeleton-text ease-skeleton-pulse" style="width: 60%; height: 0.75rem;"></div>
              <div class="ease-skeleton ease-skeleton-text ease-skeleton-pulse" style="width: 30%; height: 0.5rem; margin-bottom: 0;"></div>
            </div>
          </div>
          <div class="ease-skeleton-card-body">
            <div class="ease-skeleton-text-line ease-skeleton-pulse"></div>
            <div class="ease-skeleton-text-line ease-skeleton-pulse"></div>
            <div class="ease-skeleton-text-line ease-skeleton-pulse"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
