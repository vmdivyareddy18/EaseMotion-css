<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Blur Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Vanish</div>
        <button onclick="document.querySelector('.box').classList.add('ease-blur-out');">Blur Out</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-blur-out');" style="border-color:#555;">Bring Back</button>
    </div>
</body>
</html>
