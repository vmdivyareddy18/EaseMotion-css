<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Multi-Select Chips</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f9fafb;
    padding: 60px 40px;
  }
  h2 { color: #111827; margin-bottom: 16px; }
  .demo-block { margin-bottom: 48px; }
</style>
</head>
<body>

  <div class="demo-block">
    <h2>Default</h2>
    <div class="ease-chips" data-chip-group>
      <button class="ease-chip" style="--chip-color:#6366f1" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Design</span>
      </button>
      <button class="ease-chip" style="--chip-color:#22c55e" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Development</span>
      </button>
      <button class="ease-chip" style="--chip-color:#f59e0b" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Marketing</span>
      </button>
      <button class="ease-chip" style="--chip-color:#ef4444" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Sales</span>
      </button>
    </div>
  </div>

  <div class="demo-block">
    <h2>Small size</h2>
    <div class="ease-chips" data-chip-group>
      <button class="ease-chip ease-chip--sm" style="--chip-color:#8b5cf6" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>React</span>
      </button>
      <button class="ease-chip ease-chip--sm" style="--chip-color:#06b6d4" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Vue</span>
      </button>
      <button class="ease-chip ease-chip--sm" style="--chip-color:#f97316" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Svelte</span>
      </button>
    </div>
  </div>

  <div class="demo-block">
    <h2>Large size</h2>
    <div class="ease-chips" data-chip-group>
      <button class="ease-chip ease-chip--lg" style="--chip-color:#0ea5e9" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Beginner</span>
      </button>
      <button class="ease-chip ease-chip--lg" style="--chip-color:#a855f7" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Intermediate</span>
      </button>
      <button class="ease-chip ease-chip--lg" style="--chip-color:#e11d48" data-chip>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Advanced</span>
      </button>
    </div>
  </div>

<script>
  document.querySelectorAll('[data-chip]').forEach(chip => {
    chip.addEventListener('click', () => {
      chip.classList.toggle('is-selected');
    });
  });
</script>

</body>
</html>
