<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catapult QR Code Display</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="catapult-qr-wrapper">
    <div class="catapult-qr-card">
      <img
        class="catapult-qr-image"
        src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://github.com/SAPTARSHI-coder/EaseMotion-css"
        alt="QR code linking to the EaseMotion CSS GitHub repository"
        width="200"
        height="200"
      >
      <p class="catapult-qr-caption">Scan to visit EaseMotion CSS</p>
    </div>
  </main>
</body>
</html>
