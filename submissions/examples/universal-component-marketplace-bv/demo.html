<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Universal Component Marketplace</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 203 • Global Intelligence</span>
        <h1>Universal Component Marketplace</h1>
        <p class="subtitle">Global reusable UI component marketplace.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card main-panel">
          <h3>🛍️ Reusable Marketplace</h3>
          <div class="marketplace-grid">
            <div class="market-card">
              <h4>Glassmorphic Navigation Bar</h4>
              <span class="complexity-badge">Intermediate</span>
              <button class="btn btn-secondary">Download Component</button>
            </div>
            <div class="market-card">
              <h4>Bento Stats Tile Grid</h4>
              <span class="complexity-badge">Advanced</span>
              <button class="btn btn-secondary">Download Component</button>
            </div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Control Deck</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
