<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout Progress Tracker — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 4rem 1rem; margin: 0;">

  <div class="ease-checkout-viewport">
    <div class="ease-progress-tracker">
      <div class="ease-progress-line-bg"></div>
      <div class="ease-progress-line-fill" id="stepProgressLine"></div>

      <div class="ease-step-node is-active" id="node1">
        <div class="ease-step-circle">1</div>
        <span class="ease-step-label">Shipping</span>
      </div>
      <div class="ease-step-node" id="node2">
        <div class="ease-step-circle">2</div>
        <span class="ease-step-label">Payment</span>
      </div>
      <div class="ease-step-node" id="node3">
        <div class="ease-step-circle">3</div>
        <span class="ease-step-label">Review</span>
      </div>
    </div>

    <div class="ease-form-panels-container">
      <div class="ease-form-panel is-visible" id="panel1">
        <div class="ease-input-group">
          <label class="ease-field-label">Full Name</label>
          <input type="text" class="ease-form-input" value="Kaparthy Reddy" />
        </div>
        <div class="ease-input-group">
          <label class="ease-field-label">Street Address</label>
          <input type="text" class="ease-form-input" placeholder="123 System Core Way" />
        </div>
      </div>

      <div class="ease-form-panel" id="panel2">
        <div class="ease-input-group">
          <label class="ease-field-label">Card Number</label>
          <input type="text" class="ease-form-input" placeholder="0000 0000 0000 0000" />
        </div>
        <div class="ease-input-grid">
          <div class="ease-input-group">
            <label class="ease-field-label">Expiry Date</label>
            <input type="text" class="ease-form-input" placeholder="MM/YY" />
          </div>
          <div class="ease-input-group">
            <label class="ease-field-label">CVC Code</label>
            <input type="password" class="ease-form-input" placeholder="•••" />
          </div>
        </div>
      </div>

      <div class="ease-form-panel" id="panel3">
        <div style="background: #f8fafc; border: 1px dashed #cbd5e1; padding: 1.5rem; border-radius: 0.5rem; text-align: center;">
          <h4 style="margin: 0 0 0.5rem 0; color: #1e293b;">Ready to process dispatch order?</h4>
          <p style="margin: 0; font-size: 0.9rem; color: #64748b;">Review item parameters before final verification pipeline operations.</p>
        </div>
      </div>
    </div>

    <div class="ease-checkout-footer">
      <button class="ease-btn-nav prev" id="prevBtn" style="visibility: hidden;">Back</button>
      <button class="ease-btn-nav next" id="nextBtn">Continue</button>
    </div>
  </div>

  <script>
    let currentStep = 1;
    const totalSteps = 3;

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressLine = document.getElementById('stepProgressLine');

    function navigateSteps(direction) {
      // Manage numerical bounds checks safely
      if (direction === 'next' && currentStep < totalSteps) {
        document.getElementById(`node${currentStep}`).classList.remove('is-active');
        document.getElementById(`node${currentStep}`).classList.add('is-completed');
        currentStep++;
      } else if (direction === 'prev' && currentStep > 1) {
        currentStep--;
        document.getElementById(`node${currentStep}`).classList.remove('is-completed');
      }

      // Sync active state indicators onto step nodes
      for (let i = 1; i <= totalSteps; i++) {
        const panel = document.getElementById(`panel${i}`);
        const node = document.getElementById(`node${i}`);
        
        if (i === currentStep) {
          panel.classList.add('is-visible');
          node.classList.add('is-active');
        } else {
          panel.classList.remove('is-visible');
          if (i > currentStep) {
            node.classList.remove('is-active', 'is-completed');
          }
        }
      }

      // Scale horizontal filler line widths smoothly
      const fillerPercentages = { 1: 0, 2: 50, 3: 100 };
      progressLine.style.width = fillerPercentages[currentStep] + '%';

      // Visibility state tracking logic updates
      prevBtn.style.visibility = currentStep === 1 ? 'hidden' : 'visible';
      nextBtn.textContent = currentStep === totalSteps ? 'Place Order' : 'Continue';
    }

    nextBtn.addEventListener('click', () => {
      if(currentStep === totalSteps) {
        alert('Verification sequence complete! Dispatch initiated.');
      } else {
        navigateSteps('next');
      }
    });
    
    prevBtn.addEventListener('click', () => navigateSteps('prev'));
  </script>
</body>
</html>
