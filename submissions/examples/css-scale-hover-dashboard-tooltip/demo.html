<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Scale-Hover Dashboard Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-grid">
    <div class="metric-card">
      <div class="card-header">
        <span class="meta-title">Server Workload</span>
        
        <div class="tooltip-container">
          <span class="tooltip-trigger" tabindex="0" aria-describedby="workload-desc">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </span>
          
          <div id="workload-desc" class="tooltip-bubble" role="tooltip">
            Real-time computation metrics processing thread distribution efficiency. Updated 3s ago.
            <div class="tooltip-arrow"></div>
          </div>
        </div>
      </div>
      
      <div class="card-body">
        <span class="metric-value">94.2%</span>
        <span class="status-badge status-critical">High Load</span>
      </div>
    </div>
  </div>

</body>
</html>
