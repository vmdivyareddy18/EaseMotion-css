<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Animated Radio Buttons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Choose Your Plan</h1>
    <div class="radio-group" role="radiogroup" aria-label="Subscription plan">
      <label class="radio-option" data-value="basic">
        <input type="radio" name="plan" value="basic" checked>
        <span class="radio-circle">
          <span class="radio-ripple"></span>
          <span class="radio-check"></span>
        </span>
        <span class="radio-label">Basic</span>
      </label>
      <label class="radio-option" data-value="pro">
        <input type="radio" name="plan" value="pro">
        <span class="radio-circle">
          <span class="radio-ripple"></span>
          <span class="radio-check"></span>
        </span>
        <span class="radio-label">Pro</span>
      </label>
      <label class="radio-option" data-value="enterprise">
        <input type="radio" name="plan" value="enterprise">
        <span class="radio-circle">
          <span class="radio-ripple"></span>
          <span class="radio-check"></span>
        </span>
        <span class="radio-label">Enterprise</span>
      </label>
    </div>
    <p class="selected-display">Selected: <span id="selectedValue">Basic</span></p>
  </main>
  <script>
    const radios = document.querySelectorAll('input[name="plan"]');
    const display = document.getElementById('selectedValue');
    radios.forEach(r => r.addEventListener('change', () => {
      const selected = document.querySelector('input[name="plan"]:checked');
      display.textContent = selected.parentElement.querySelector('.radio-label').textContent;
    }));
  </script>
</body>
</html>
