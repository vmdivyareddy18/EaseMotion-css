<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Checkout Modal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="checkout-card">

        <h1>Checkout</h1>

        <div class="price">
            Total: <strong>$249.00</strong>
        </div>

        <a href="#checkout-modal" class="btn">
            Complete Order
        </a>

    </div>

    <div id="checkout-modal" class="overlay">

        <div class="modal">

            <div class="success-icon">✓</div>

            <h2>Order Confirmed</h2>

            <p>
                Thank you for your purchase! Your order has been placed successfully.
            </p>

            <div class="summary">

                <div>
                    <span>Items</span>
                    <strong>3</strong>
                </div>

                <div>
                    <span>Total</span>
                    <strong>$249</strong>
                </div>

            </div>

            <a href="#" class="close-btn">
                Continue Shopping
            </a>

        </div>

    </div>

</body>

</html>
