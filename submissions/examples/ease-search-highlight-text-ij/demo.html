<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Search Highlight Text — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
    }
    .demo-panel {
      max-width: 480px;
      padding: 40px;
      background: #14141c;
      border-radius: 16px;
      border: 1px solid #23273a;
      line-height: 1.8;
    }
    h2 { margin-top: 0; }
  </style>
</head>
<body>

  <div class="demo-panel">
    <h2>Search Results</h2>
    <p>
      The <span class="ease-highlight">EaseMotion CSS</span> framework provides
      an <span class="ease-highlight">animation-first</span> approach to building
      interfaces, with zero external dependencies.
    </p>
    <p>
      Try our <span class="ease-highlight highlight-pulse">live search</span>
      feature, which highlights matching text with a
      <span class="ease-highlight highlight-fade">smooth fade-in</span> effect.
    </p>
  </div>

</body>
</html>
