<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Magnetic Button (Zero-JS) Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    p.hint {
      color: #888;
      font-size: 0.85rem;
      max-width: 320px;
      text-align: center;
    }
  </style>
</head>
<body>

  <button class="magnetic-btn">
    Explore
    <span class="magnetic-zone"></span>
  </button>

  <p class="hint">
    Hover near the edge vs. the center of the button — the pull effect
    intensifies as you approach the middle, without any JavaScript.
  </p>

</body>
</html>
