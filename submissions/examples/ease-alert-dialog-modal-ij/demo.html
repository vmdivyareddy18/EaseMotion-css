<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Dialog Modal - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="adm-wrapper">
    <h1>Alert Dialog Modal</h1>
    <div class="adm-actions">
      <button class="adm-btn" data-type="info">Info</button>
      <button class="adm-btn" data-type="warning">Warning</button>
      <button class="adm-btn" data-type="error">Error</button>
      <button class="adm-btn" data-type="success">Success</button>
      <button class="adm-btn adm-stack-btn">Stack Dialog</button>
    </div>
    <div class="adm-overlay" id="admOverlay"></div>
    <div class="adm-dialog" id="admDialog">
      <div class="adm-dialog-content">
        <h2 id="admTitle">Dialog Title</h2>
        <p id="admMessage">This is a dialog message.</p>
        <div class="adm-dialog-actions">
          <button class="adm-btn adm-cancel" id="admCancel">Cancel</button>
          <button class="adm-btn adm-confirm" id="admConfirm">Confirm</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var overlay = document.getElementById('admOverlay');
      var dialog = document.getElementById('admDialog');
      var title = document.getElementById('admTitle');
      var message = document.getElementById('admMessage');
      var cancelBtn = document.getElementById('admCancel');
      var confirmBtn = document.getElementById('admConfirm');
      var stackCount = 0;

      var dialogData = {
        info: { title: 'Information', msg: 'This is an informational message.', icon: 'ℹ️' },
        warning: { title: 'Warning', msg: 'Please check your input before continuing.', icon: '⚠️' },
        error: { title: 'Error', msg: 'Something went wrong. Please try again.', icon: '❌' },
        success: { title: 'Success', msg: 'Operation completed successfully!', icon: '✅' }
      };

      function showDialog(type) {
        var data = dialogData[type] || dialogData.info;
        dialog.className = 'adm-dialog adm-dialog--' + type;
        title.textContent = data.icon + ' ' + data.title;
        message.textContent = data.msg;
        overlay.classList.add('adm-overlay-visible');
        dialog.classList.add('adm-dialog-visible');
      }

      function hideDialog() {
        overlay.classList.remove('adm-overlay-visible');
        dialog.classList.remove('adm-dialog-visible');
      }

      document.querySelectorAll('.adm-actions .adm-btn[data-type]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          showDialog(btn.getAttribute('data-type'));
        });
      });

      document.querySelector('.adm-stack-btn').addEventListener('click', function() {
        stackCount++;
        showDialog('info');
        title.textContent = '📌 Stacked Dialog #' + stackCount;
        message.textContent = 'This dialog was stacked on top of previous dialogs.';
      });

      cancelBtn.addEventListener('click', hideDialog);
      confirmBtn.addEventListener('click', function() {
        hideDialog();
      });
      overlay.addEventListener('click', hideDialog);
    })();
  </script>
</body>
</html>
