<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neumorphic Like Button Demo</title>

  <!-- Font setup -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- Local Component Stylesheet -->
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1>Neumorphic Like Button</h1>
      <p>A soft-UI toggle microinteraction using pure CSS</p>
    </div>

    <!-- Neumorphic Like Button Component -->
    <div class="neumorphic-like-wrapper">
      <!-- Hidden checkbox input -->
      <input type="checkbox" id="like-toggle-ag" class="like-checkbox" />

      <!-- Neumorphic Label Button -->
      <label for="like-toggle-ag" class="like-btn" aria-label="Like post">
        <div class="heart-icon-wrapper">
          <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
            stroke-linejoin="round">
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
            </path>
          </svg>
        </div>

        <!-- Sparkle particles (burst on check) -->
        <span class="sparkle sp-1" style="--dx: -35px; --dy: -35px"></span>
        <span class="sparkle sp-2" style="--dx: 35px; --dy: -35px"></span>
        <span class="sparkle sp-3" style="--dx: -45px; --dy: 10px"></span>
        <span class="sparkle sp-4" style="--dx: 45px; --dy: 10px"></span>
        <span class="sparkle sp-5" style="--dx: -20px; --dy: 45px"></span>
        <span class="sparkle sp-6" style="--dx: 20px; --dy: 45px"></span>
      </label>

      <!-- Interactive Counter -->
      <span class="like-count" id="like-counter">0</span>
    </div>

    <!-- Theme Switcher Control (Demo Only) -->
    <div class="demo-controls">
      <button class="theme-switch-btn" type="button" aria-label="Toggle dark mode">
        🌙 Toggle Theme
      </button>
    </div>
  </div>

  <script>
    // Tiny inline helper to make the demo interactive and easy to preview in both modes
    document.addEventListener("DOMContentLoaded", function () {
      const themeBtn = document.querySelector(".theme-switch-btn");
      const likeCheckbox = document.getElementById("like-toggle-ag");
      const likeCounter = document.getElementById("like-counter");
      let baseLikes = 0;

      // Handle dynamic count increments
      likeCheckbox.addEventListener("change", function () {
        const isLiked = likeCheckbox.checked;
        likeCounter.textContent = baseLikes + (isLiked ? 1 : 0);
      });

      // Synchronize keypress accessibility (Enter/Space on active checkbox)
      likeCheckbox.addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          likeCheckbox.checked = !likeCheckbox.checked;
          likeCheckbox.dispatchEvent(new Event("change"));
        }
      });

      // Set initial button text based on current theme/system settings
      const isSystemDark = window.matchMedia(
        "(prefers-color-scheme: dark)"
      ).matches;
      themeBtn.textContent = isSystemDark
        ? "☀️ Light Theme"
        : "🌙 Dark Theme";

      // Toggle Theme Switch Handler
      themeBtn.addEventListener("click", function () {
        const root = document.documentElement;
        const currentTheme =
          root.getAttribute("data-theme") ||
          (isSystemDark ? "dark" : "light");
        const nextTheme = currentTheme === "dark" ? "light" : "dark";

        root.setAttribute("data-theme", nextTheme);
        themeBtn.textContent =
          nextTheme === "dark" ? "☀️ Light Theme" : "🌙 Dark Theme";
      });
    });
  </script>
</body>

</html>
