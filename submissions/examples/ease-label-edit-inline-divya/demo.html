<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Label Edit Inline</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Inline Label Edit</h1>

        <p class="description">
            Click the field below to simulate an inline edit experience using only HTML and CSS.
        </p>

        <div class="label-group">

            <label for="name">Project Name</label>

            <input
                id="name"
                type="text"
                value="EaseMotion CSS"
                placeholder="Enter project name"
            >

        </div>

        <div class="label-group">

            <label for="version">Version</label>

            <input
                id="version"
                type="text"
                value="v1.0.0"
                placeholder="Enter version"
            >

        </div>

        <div class="label-group">

            <label for="author">Author</label>

            <input
                id="author"
                type="text"
                value="Open Source Contributor"
                placeholder="Enter author name"
            >

        </div>

    </div>

</div>

</body>
</html>
