<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Premium Tooltips Component | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  
  <!-- Component Specific CSS -->
  <link rel="stylesheet" href="../../../components/buttons.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    :root {
      --primary-glow: conic-gradient(from 180deg at 50% 50%, #2a8af6 0deg, #a853ba 180deg, #e92a67 360deg);
    }
    body {
      background-color: #0d0e15;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: var(--ease-space-4);
      font-family: 'Outfit', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
    }
    
    .demo-wrapper {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .demo-container {
      text-align: center;
      max-width: 800px;
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 4rem 3rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    
    .demo-container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 1rem;
      background: linear-gradient(to right, #ffffff, #a5a5b0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }

    .subtitle {
      color: #94a3b8;
      font-size: 1.1rem;
      font-weight: 300;
      max-width: 500px;
      margin: 0 auto 4rem auto;
      line-height: 1.6;
    }
    
    .tooltip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 2.5rem;
      place-items: center;
    }

    /* Premium Button Overrides */
    .ease-btn {
      font-family: 'Outfit', sans-serif;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-weight: 500;
      letter-spacing: 0.5px;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
      overflow: hidden;
      border: none;
      z-index: 1;
    }
    
    .ease-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: inherit;
      z-index: -1;
      transition: opacity 0.3s ease;
      opacity: 0;
    }
    
    .ease-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    .btn-top {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }
    .btn-top:hover { box-shadow: 0 8px 25px rgba(37, 99, 235, 0.5); }
    
    .btn-bottom {
      background: linear-gradient(135deg, #8b5cf6, #6d28d9);
      color: white;
      box-shadow: 0 4px 15px rgba(109, 40, 217, 0.3);
    }
    .btn-bottom:hover { box-shadow: 0 8px 25px rgba(109, 40, 217, 0.5); }

    .btn-left {
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      box-shadow: 0 4px 15px rgba(5, 150, 105, 0.3);
    }
    .btn-left:hover { box-shadow: 0 8px 25px rgba(5, 150, 105, 0.5); }

    .btn-right {
      background: linear-gradient(135deg, #f43f5e, #e11d48);
      color: white;
      box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);
    }
    .btn-right:hover { box-shadow: 0 8px 25px rgba(225, 29, 72, 0.5); }

    /* Ambient background glows */
    .ambient-glow-1, .ambient-glow-2 {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
      animation: float 10s ease-in-out infinite alternate;
    }
    .ambient-glow-1 {
      top: 10%; left: 10%;
      width: 300px; height: 300px;
      background: rgba(59, 130, 246, 0.3);
    }
    .ambient-glow-2 {
      bottom: 10%; right: 10%;
      width: 400px; height: 400px;
      background: rgba(139, 92, 246, 0.2);
      animation-delay: -5s;
    }

    @keyframes float {
      0% { transform: translate(0, 0); }
      100% { transform: translate(30px, -30px); }
    }
  </style>
</head>
<body>

  <div class="ambient-glow-1"></div>
  <div class="ambient-glow-2"></div>

  <div class="demo-wrapper">
    <div class="demo-container">
      <h1>Premium Tooltips</h1>
      <p class="subtitle">Experience smooth, spring-animated, glassmorphic tooltips built entirely with CSS pseudo-elements. Zero JavaScript dependencies.</p>
      
      <div class="tooltip-grid">
        <div>
          <button class="ease-btn btn-top ease-tooltip" data-tooltip="Default Top Tooltip ✨">
            Top Position
          </button>
        </div>
        <div>
          <button class="ease-btn btn-bottom ease-tooltip ease-tooltip-bottom" data-tooltip="Bottom Tooltip 🚀">
            Bottom Position
          </button>
        </div>
        <div>
          <button class="ease-btn btn-left ease-tooltip ease-tooltip-left" data-tooltip="👈 Appears on Left">
            Left Position
          </button>
        </div>
        <div>
          <button class="ease-btn btn-right ease-tooltip ease-tooltip-right" data-tooltip="Appears on Right 👉">
            Right Position
          </button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
