<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tactile Neumorphic Interface Studio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="neumorphic-canvas">
    <div class="soft-dashboard-card">
      
      <div class="card-meta-header">
        <span class="system-tag">TACTILE MODULE</span>
        <h3>Aura Lens Engine</h3>
      </div>

      <!-- Pure CSS Popover System using checkbox hack for state preservation -->
      <div class="spring-popover-system">
        <input type="checkbox" id="neumorphic-popover-toggle" class="hidden-popover-checkbox">
        
        <label for="neumorphic-popover-toggle" class="popover-trigger-action" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          View Settings
        </label>

        <!-- Soft Neumorphic Spring Popover Overlay Dialogue Box -->
        <div class="spring-popover-card" role="dialog" aria-label="Engine Parameters">
          <div class="popover-arrow-node"></div>
          
          <div class="popover-body-content">
            <h4>Configuration Matrix</h4>
            <p>Adjusts structural image recognition parameters and focal filters over localized edge layers natively.</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers to focusable nodes
    const triggerLabel = document.querySelector('.popover-trigger-action');
    const checkboxNode = document.getElementById('neumorphic-popover-toggle');

    triggerLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        checkboxNode.click();
      }
    });

    checkboxNode.addEventListener('change', () => {
      triggerLabel.setAttribute('aria-expanded', checkboxNode.checked ? 'true' : 'false');
    });
  </script>
</body>
</html>
