<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digit Flip</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Flip Clock Digit</h1>
    <div class="flip-clock" id="flipClock">
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-front">0</div>
          <div class="flip-back">1</div>
        </div>
      </div>
      <div class="flip-card">
        <div class="flip-card-inner">
          <div class="flip-front">0</div>
          <div class="flip-back">0</div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="flipDigit()">Flip</button>
    </div>
  </div>
  <script>
    let current = 0;
    function flipDigit() {
      const cards = document.querySelectorAll('.flip-card-inner');
      const digit = current;
      current = (current + 1) % 10;
      cards.forEach((card, i) => {
        const front = card.querySelector('.flip-front');
        const back = card.querySelector('.flip-back');
        if (i === 0) {
          front.textContent = digit;
          back.textContent = current;
        }
        card.classList.remove('flip');
        void card.offsetWidth;
        card.classList.add('flip');
      });
    }
  </script>
</body>
</html>
