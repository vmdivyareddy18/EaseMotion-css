<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Cognitive Operations System</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="brain-dashboard">
    <header class="header">
      <span class="badge">Cognitive OS</span>
      <h1>Enterprise Cognitive Operations System</h1>
      <p class="subtitle">Logic pathways, learning telemetry, and cognitive memory usage monitors.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-reasoning">
        <h3>🧠 Logical pathway states</h3>
        <div class="nodes-mesh">
          <div class="node active"><span>Ingestion</span></div>
          <div class="node active"><span>Correlate</span></div>
          <div class="node pulse"><span>Decide</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card memory-card">
          <h3>⚡ Cognitive memory status</h3>
          <div class="meter-container">
            <div class="meter-bar"><div class="fill" style="width: 82%"></div></div>
            <span class="desc">Memory utilization: 82%</span>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
