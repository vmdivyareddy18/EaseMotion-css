<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Node Tree Diagram</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='node-color')r.style.setProperty('--node-color',t.value);if(t.name==='line-color')r.style.setProperty('--line-color',t.value);if(t.name==='branch-color')r.style.setProperty('--branch-color',t.value);if(t.name==='connect-duration')r.style.setProperty('--connect-duration',t.value+'s')})</script>
<div class="container"><p class="title">Node Tree Diagram</p>
<div class="tree"><div class="tree-node root"><div class="node-circle">/</div><div class="node-label">Root</div></div>
<div class="tree-branch"><div class="tree-node child"><div class="node-circle">src</div><div class="node-label">Source</div></div>
<div class="branch-children"><div class="tree-node leaf"><div class="node-circle">c</div><div class="node-label">Components</div></div><div class="tree-node leaf"><div class="node-circle">u</div><div class="node-label">Utils</div></div></div></div>
<div class="tree-branch"><div class="tree-node child"><div class="node-circle">dist</div><div class="node-label">Build</div></div></div></div>
<div class="controls"><label>Node: <input type="color" name="node-color" value="#4ecdc4"></label><label>Line: <input type="color" name="line-color" value="#4a4a6a"></label><label>Branch: <input type="color" name="branch-color" value="#f72585"></label><label>Speed: <input type="range" name="connect-duration" min="0.2" max="1.5" step="0.05" value="0.4"></label></div></div></body></html>
