<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Badge - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      padding: 4rem;
      font-family: var(--ease-font-sans, sans-serif);
      background-color: #f8fafc;
      color: #1e293b;
    }
    .section {
      margin-bottom: 4rem;
    }
    h2 {
      margin-bottom: 2rem;
      font-weight: 800;
      color: var(--ease-color-primary, #6366f1);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 2rem;
      align-items: center;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
    .icon-placeholder {
      width: 48px;
      height: 48px;
      background: #e2e8f0;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    .avatar-placeholder {
      width: 56px;
      height: 56px;
      background: #cbd5e1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="section">
    <h2>Ping Indicators (Dot)</h2>
    <p>Subtle pulsing dots for status and live activity.</p>
    <div class="grid">
      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <div class="icon-placeholder">🔔</div>
          <span class="ease-badge ease-badge--dot ease-badge--ping ease-badge--top-right"></span>
        </div>
        <span>Notification Ping</span>
      </div>
      
      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <div class="avatar-placeholder">JD</div>
          <span class="ease-badge ease-badge--dot ease-badge--ping ease-badge--success ease-badge--top-right" style="transform: translate(0, 0); top: 40px; right: 2px;"></span>
        </div>
        <span>Online Status</span>
      </div>

      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <div class="icon-placeholder">📡</div>
          <span class="ease-badge ease-badge--dot ease-badge--ping ease-badge--info"></span>
        </div>
        <span>Live Signal</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Notification Counts</h2>
    <p>Badges with numeric counts and a ring offset.</p>
    <div class="grid">
      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <div class="icon-placeholder">✉️</div>
          <span class="ease-badge ease-badge--count ease-badge--top-right">3</span>
        </div>
        <span>Unread Messages</span>
      </div>

      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <button class="ease-btn ease-btn-primary">Cart</button>
          <span class="ease-badge ease-badge--count ease-badge--warning ease-badge--top-right">12</span>
        </div>
        <span>Cart Count</span>
      </div>

      <div class="demo-item">
        <div class="ease-badge-wrapper">
          <div class="icon-placeholder">💬</div>
          <span class="ease-badge ease-badge--count ease-badge--ping ease-badge--top-right">99+</span>
        </div>
        <span>Ping with Count</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Color Variants</h2>
    <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
      <span class="ease-badge ease-badge--count ease-badge--primary">Primary</span>
      <span class="ease-badge ease-badge--count ease-badge--success">Success</span>
      <span class="ease-badge ease-badge--count ease-badge--warning">Warning</span>
      <span class="ease-badge ease-badge--count ease-badge--info">Info</span>
    </div>
  </div>
</body>
</html>
