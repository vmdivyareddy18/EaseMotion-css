<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-invert Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>ease-hover-invert</h1>
    <p>Hover over any element to invert its colors — creating a striking visual contrast effect.</p>

    <div class="icon-grid">
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-1"></div>
        <span>Profile</span>
      </div>
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-2"></div>
        <span>Settings</span>
      </div>
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-3"></div>
        <span>Search</span>
      </div>
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-4"></div>
        <span>Cart</span>
      </div>
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-5"></div>
        <span>Mail</span>
      </div>
      <div class="icon-box invert-icon">
        <div class="icon-circle icon-6"></div>
        <span>Bell</span>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-card invert-stat">
        <div class="stat-value">4.8</div>
        <div class="stat-label">Rating</div>
      </div>
      <div class="stat-card invert-stat">
        <div class="stat-value">12k+</div>
        <div class="stat-label">Users</div>
      </div>
      <div class="stat-card invert-stat">
        <div class="stat-value">99.9%</div>
        <div class="stat-label">Uptime</div>
      </div>
    </div>
  </div>
</body>
</html>
