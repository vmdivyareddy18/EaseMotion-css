<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Color Fade — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Text Color Fade</h1>
  <p class="subtitle">Text color fades to a new color on hover — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the text to see the color transition</p>
    <p class="fade-text">Hover to change my color</p>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>The <code>color</code> property transitions between two values on hover using a <code>transition</code> with <code>ease</code> timing.</p>
  </section>
</body>
</html>
