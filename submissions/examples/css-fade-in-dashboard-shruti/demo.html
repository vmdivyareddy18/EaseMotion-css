<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade-In Popover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <button class="ease-popover-btn">
    Dashboard Stats

    <div class="ease-popover" role="dialog">
      <h3>Today's Summary</h3>
      <p>Revenue increased by 18% compared to yesterday.</p>
    </div>

  </button>

</div>

</body>
</html>
