<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble-Focus Marketing Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="marketing-sandbox-container">

  <!-- Pure CSS Checkbox State Trigger -->
  <input type="checkbox" id="wobble-modal-toggle" class="modal-state-checkbox">

  <!-- Marketing Landing Page CTA Section -->
  <div class="landing-cta-box">
    <span class="promo-tag">Limited Access</span>
    <h1>Unlock the Next Generation Platform</h1>
    <p>Join the closed beta loop and experience decentralized neural automation firsthand.</p>
    <label for="wobble-modal-toggle" class="trigger-cta-btn">Claim Invitation Pass</label>
  </div>

  <!-- Modal Overlay Backdrop Layout -->
  <div class="modal-overlay-mask">
    <label for="wobble-modal-toggle" class="mask-dismiss-overlay"></label>
    
    <!-- Outer wrapper handles the targeted wobble animation mechanics -->
    <div class="wobble-animation-container">
      <div class="premium-focus-card">
        <label for="wobble-modal-toggle" class="modal-exit-x">&times;</label>
        
        <div class="modal-header-accent">
          <div class="spark-icon">✨</div>
        </div>
        
        <h2>Exclusive Access Granted</h2>
        <p>Enter your configuration parameters below to initialize your secure environment node.</p>
        
        <div class="interactive-form-mock">
          <input type="email" placeholder="name@domain.com" class="mock-input-field" disabled>
          <button class="mock-submit-btn">Initialize Node</button>
        </div>
        
        <span class="secure-badge">🛡️ End-to-End Encrypted Handshake</span>
      </div>
    </div>
  </div>

</body>
</html>
