<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tada Click Neumorphic Modal</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Modal
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close">&times;</label>

        <h2>Neumorphic Modal</h2>

        <p>
            This modal uses a pure CSS Tada animation and soft
            neumorphic styling without JavaScript.
        </p>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
