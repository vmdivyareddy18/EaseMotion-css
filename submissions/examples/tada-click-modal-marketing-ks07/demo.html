<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tada Click Modal - Marketing Landing Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <input type="checkbox" id="modal-toggle" hidden>

    <div class="container">
        <h1>Grow Your Business</h1>
        <p>Discover our latest marketing solutions to boost your brand.</p>

        <label for="modal-toggle" class="open-btn">
            Get Started
        </label>
    </div>

    <div class="overlay">
        <div class="modal">
            <h2>Welcome!</h2>
            <p>
                Thank you for choosing our marketing platform.
                Start growing your business today.
            </p>

            <label for="modal-toggle" class="close-btn">
                Close
            </label>
        </div>
    </div>

</body>
</html>
