<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Online User Ripple</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Online User Ripple</h1>

    <p>
      A subtle online presence indicator with a continuous ripple animation.
    </p>

    <div class="users">

      <div class="user-card">
        <div class="avatar">
          JD
          <span class="online-ripple"></span>
        </div>
        <h3>John Doe</h3>
        <span class="status-text">Online</span>
      </div>

      <div class="user-card">
        <div class="avatar">
          AS
          <span class="online-ripple"></span>
        </div>
        <h3>Alice Smith</h3>
        <span class="status-text">Available</span>
      </div>

      <div class="user-card">
        <div class="avatar">
          MK
          <span class="online-ripple"></span>
        </div>
        <h3>Mike Kent</h3>
        <span class="status-text">Active Now</span>
      </div>

    </div>

  </main>

</body>
</html>
