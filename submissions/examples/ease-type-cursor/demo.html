<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation: ease-type-cursor</title>
    <meta
      name="description"
      content="A demonstration of the ease-type-cursor blinking text cursor animation featuring multiple cursor formats."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1 id="main-title">ease-type-cursor</h1>
        <p class="subtitle" id="main-desc">
          Pure CSS blinking terminal cursor utility for typewriter effects.
        </p>
      </header>

      <div class="display-area">
        <!-- Example 1: Default Pipe Cursor -->
        <div class="example-box">
          <span class="example-title">Example 1: Default Pipe (|)</span>
          <div class="demo-text ease-type-cursor">
            const developer = "Antigravity";
          </div>
        </div>

        <!-- Example 2: Custom Underscore Cursor -->
        <div class="example-box">
          <span class="example-title">Example 2: Custom Underscore (_)</span>
          <div class="demo-text ease-type-cursor custom-underscore">
            git commit -m "feat: cursor"
          </div>
        </div>

        <!-- Example 3: Custom Block Cursor -->
        <div class="example-box">
          <span class="example-title">Example 3: Custom Block (█)</span>
          <div class="demo-text ease-type-cursor custom-block">
            system.initialize()
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
