<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>ease-bg-blend-mode Demo</title><style>
:root{--ease-speed-medium:300ms;--ease-ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--ease-color-primary:#6c63ff;--ease-color-neutral-200:#e2e8f0;--ease-color-neutral-900:#0f172a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:var(--ease-color-neutral-900);padding:2rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;color:var(--ease-color-primary)}
.demo-item{background:white;border:1px solid var(--ease-color-neutral-200);border-radius:.75rem;padding:1.5rem;text-align:center;margin-bottom:1rem}
.demo-box{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;background:var(--ease-color-primary);color:white;font-weight:600;font-size:.75rem;border-radius:.5rem;cursor:pointer}
</style></head><body>
<h1>ease-bg-blend-mode — Demo</h1>
<div class="demo-item"><div class="demo-box .ease-blend-multiply">.ease-blend-multiply</div><p>Hover to see the effect</p></div>
<style>
/* ease-bg-blend-mode utilities */
.ease-blend-multiply{background-blend-mode:multiply}
.ease-blend-screen{background-blend-mode:screen}
.ease-blend-overlay{background-blend-mode:overlay}
.ease-blend-darken{background-blend-mode:darken}
.ease-blend-lighten{background-blend-mode:lighten}
.ease-blend-color{background-blend-mode:color}
.ease-blend-luminosity{background-blend-mode:luminosity}
.ease-blend-plus-lighter{background-blend-mode:plus-lighter}
.ease-blend-normal{background-blend-mode:normal}
</style>
</body></html>
