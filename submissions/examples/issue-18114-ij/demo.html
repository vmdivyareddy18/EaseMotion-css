<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Parallax Scroll</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="scroll-content">
    <h1 class="scroll-title">Parallax Scroll</h1>
    <p class="scroll-sub">Move mouse over the panel below</p>
    <div class="parallax-layers" id="parallaxContainer">
      <div class="parallax-layer parallax-layer-0" data-speed="0.03">Background</div>
      <div class="parallax-layer parallax-layer-1" data-speed="0.06">Midground</div>
      <div class="parallax-layer parallax-layer-2" data-speed="0.10">Foreground</div>
    </div>
  </div>
</div>
<script>
const container = document.getElementById('parallaxContainer');
const layers = container.querySelectorAll('.parallax-layer');
container.addEventListener('mousemove', (e) => {
  const rect = container.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  layers.forEach(layer => {
    const speed = parseFloat(layer.dataset.speed);
    layer.style.transform = `translate(${x * speed * 100}px, ${y * speed * 100}px)`;
  });
});
container.addEventListener('mouseleave', () => {
  layers.forEach(layer => { layer.style.transform = 'translate(0, 0)'; });
});
</script>
</body>
</html>
