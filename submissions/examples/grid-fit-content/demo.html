<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid fit-content Sizing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Grid fit-content()</h1>
    <p class="subtitle">Content-based sizing with maximum limit</p>
    <div class="grid fit-content-grid">
      <div class="card">Short</div>
      <div class="card">Medium length text</div>
      <div class="card">This is a longer card with more content</div>
      <div class="card">Tiny</div>
    </div>
    <h2>Compared with minmax()</h2>
    <div class="grid minmax-grid">
      <div class="card">Short</div>
      <div class="card">Medium length text</div>
      <div class="card">This is a longer card with more content</div>
      <div class="card">Tiny</div>
    </div>
  </div>
</body>
</html>
