<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Social Share Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">
    <section class="ease-aurora-share-bar" aria-label="Social share options">
      <h2>Share Banking Updates</h2>
      <p>Connect and share secure financial insights.</p>

      <div class="share-actions">
        <a href="#" aria-label="Share on Facebook">F</a>
        <a href="#" aria-label="Share on Twitter">T</a>
        <a href="#" aria-label="Share on LinkedIn">in</a>
        <a href="#" aria-label="Share via Email">@</a>
      </div>
    </section>
  </main>

</body>
</html>
