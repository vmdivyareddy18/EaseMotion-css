<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-shadow-creep – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Shadow Creep</h1>
    <p class="subtitle">A shadow that creeps across the element from left to right.</p>
    <div class="target-box" id="targetBox">
      <span class="label">Target</span>
    </div>
    <button id="triggerBtn">Creep Shadow</button>
  </div>

  <script>
    const box = document.getElementById('targetBox');
    const btn = document.getElementById('triggerBtn');

    btn.addEventListener('click', () => {
      box.classList.remove('creeping');
      void box.offsetWidth;
      box.classList.add('creeping');
    });
  </script>
</body>
</html>
