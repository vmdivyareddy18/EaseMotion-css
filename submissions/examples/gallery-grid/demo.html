<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Grid Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
      padding: 40px;
    }
    .container {
      width: 100%;
      max-width: 1000px;
    }
    h2 {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 40px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Responsive Image Gallery Grid</h2>
    
    <!-- Masonry Grid -->
    <div class="demo-label">Masonry Layout</div>
    <div class="gallery-grid gallery-masonry">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Mountain">
        <div class="gallery-overlay">
          <h3>Mountain Peak</h3>
          <p>Alps, Switzerland</p>
        </div>
      </div>
      <div class="gallery-item gallery-item-tall">
        <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=500&fit=crop" alt="Portrait">
        <div class="gallery-overlay">
          <h3>Portrait</h3>
          <p>Studio Shot</p>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop" alt="Forest">
        <div class="gallery-overlay">
          <h3>Forest</h3>
          <p>Oregon, USA</p>
        </div>
      </div>
      <div class="gallery-item gallery-item-wide">
        <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=600&h=300&fit=crop" alt="Nature">
        <div class="gallery-overlay">
          <h3>Woodland</h3>
          <p>Autumn Colors</p>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=300&fit=crop" alt="Waterfall">
        <div class="gallery-overlay">
          <h3>Waterfall</h3>
          <p>Iceland</p>
        </div>
      </div>
      <div class="gallery-item gallery-item-tall">
        <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=500&fit=crop" alt="Stars">
        <div class="gallery-overlay">
          <h3>Starry Night</h3>
          <p>Long Exposure</p>
        </div>
      </div>
    </div>
    
    <!-- Uniform Grid -->
    <div class="demo-label" style="margin-top: 50px;">Uniform Grid</div>
    <div class="gallery-grid gallery-uniform">
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=400&fit=crop" alt="Nature">
        <div class="gallery-overlay">
          <h3>Sunrise</h3>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=400&fit=crop" alt="Forest">
        <div class="gallery-overlay">
          <h3>Path</h3>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=400&fit=crop" alt="Waterfall">
        <div class="gallery-overlay">
          <h3>Cascade</h3>
        </div>
      </div>
      <div class="gallery-item">
        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=400&h=400&fit=crop" alt="Aerial">
        <div class="gallery-overlay">
          <h3>Aerial</h3>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
