<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Parallax Speed Dial</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../dist/easemotion.css">

    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="background-layer layer-one"></div>
<div class="background-layer layer-two"></div>
<div class="background-layer layer-three"></div>

<main class="hero ease-fade-in">

    <section class="hero-card ease-scale-in">

        <div class="bank-logo">
            💳
        </div>

        <h1>
            Smart Banking
        </h1>

        <p>
            Experience fast and secure digital banking with a modern
            parallax Speed Dial built using only HTML and CSS.
            Designed for EaseMotion CSS.
        </p>

        <div class="card-details">

            <div class="detail-box">
                <h3>Balance</h3>
                <span>$14,580</span>
            </div>

            <div class="detail-box">
                <h3>Rewards</h3>
                <span>4,250 pts</span>
            </div>

            <div class="detail-box">
                <h3>Security</h3>
                <span>Protected</span>
            </div>

        </div>

    </section>

</main>

<!-- Hidden Toggle -->
<input
    type="checkbox"
    id="speed-toggle"
    class="speed-toggle"
>

<!-- Speed Dial -->
<nav
    class="speed-dial"
    aria-label="Banking Quick Actions"
>

    <label
        for="speed-toggle"
        class="speed-main ease-bounce"
        aria-label="Open Speed Dial"
        tabindex="0"
    >
        +
    </label>

    <a
        href="#"
        class="action action-transfer ease-slide-up"
        aria-label="Transfer Money"
    >
        💸
        <span>Transfer</span>
    </a>

    <a
        href="#"
        class="action action-pay ease-slide-up"
        aria-label="Make Payment"
    >
        💳
        <span>Payments</span>
    </a>

    <a
        href="#"
        class="action action-wallet ease-slide-up"
        aria-label="Wallet"
    >
        👛
        <span>Wallet</span>
    </a>

    <a
        href="#"
        class="action action-loan ease-slide-up"
        aria-label="Loan"
    >
        🏦
        <span>Loans</span>
    </a>

    <a
        href="#"
        class="action action-support ease-slide-up"
        aria-label="Customer Support"
    >
        📞
        <span>Support</span>
    </a>

</nav>

<footer class="footer">
    Built with ❤️ using EaseMotion CSS
</footer>

</body>
</html>
