<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Tooltip // Pure CSS Micro-Shake Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #020202; /* Deep Void Cyber Background */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-tech-tooltip-wrapper">
    <button class="ease-tech-tooltip-target" aria-describedby="terminal-log-tooltip">
      SYS_STATUS_CHECK
    </button>

    <div id="terminal-log-tooltip" class="ease-tech-tooltip-content" role="tooltip">
      [LOG]: INITIALIZATION_OK_VAL_98.4%
    </div>
  </div>

</body>
</html>
