<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exploding Menu Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Exploding Menu</h1>
        <p class="subtitle">Menu items explode outward</p>

        <!-- EXPLODING MENU COMPONENT -->
        <div class="menu-container">
            <div class="menu-wrapper">
                <div class="menu-display">
                    <!-- Menu Trigger -->
                    <button class="menu-trigger" id="menuTrigger" aria-label="Toggle menu">
                        <span class="trigger-icon" id="triggerIcon">🍔</span>
                        <span class="trigger-label">Menu</span>
                    </button>

                    <!-- Exploding Menu Items -->
                    <div class="menu-items" id="menuItems">
                        <button class="menu-item" data-index="0" style="--angle: 0deg; --delay: 0ms;">
                            <span class="item-icon">🏠</span>
                            <span class="item-label">Home</span>
                        </button>
                        <button class="menu-item" data-index="1" style="--angle: 45deg; --delay: 50ms;">
                            <span class="item-icon">📊</span>
                            <span class="item-label">Analytics</span>
                        </button>
                        <button class="menu-item" data-index="2" style="--angle: 90deg; --delay: 100ms;">
                            <span class="item-icon">⚙️</span>
                            <span class="item-label">Settings</span>
                        </button>
                        <button class="menu-item" data-index="3" style="--angle: 135deg; --delay: 150ms;">
                            <span class="item-icon">👤</span>
                            <span class="item-label">Profile</span>
                        </button>
                        <button class="menu-item" data-index="4" style="--angle: 180deg; --delay: 200ms;">
                            <span class="item-icon">📬</span>
                            <span class="item-label">Messages</span>
                        </button>
                        <button class="menu-item" data-index="5" style="--angle: 225deg; --delay: 250ms;">
                            <span class="item-icon">🔔</span>
                            <span class="item-label">Notifications</span>
                        </button>
                        <button class="menu-item" data-index="6" style="--angle: 270deg; --delay: 300ms;">
                            <span class="item-icon">❤️</span>
                            <span class="item-label">Favorites</span>
                        </button>
                        <button class="menu-item" data-index="7" style="--angle: 315deg; --delay: 350ms;">
                            <span class="item-icon">🚪</span>
                            <span class="item-label">Logout</span>
                        </button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="menu-controls">
                    <div class="control-group">
                        <label for="distanceSlider">Distance:</label>
                        <input type="range" id="distanceSlider" min="80" max="250" step="10" value="160" />
                        <span id="distanceValue">160px</span>
                    </div>
                    <div class="control-group">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1" />
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="control-group">
                        <label for="colorPicker">Color:</label>
                        <input type="color" id="colorPicker" value="#4facfe" />
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="autoClose" checked />
                            Auto Close
                        </label>
                    </div>
                </div>

                <div class="menu-actions">
                    <button class="menu-ctrl-btn" id="toggleBtn">⏸ Toggle</button>
                    <button class="menu-ctrl-btn" id="resetBtn">⟳ Reset</button>
                    <button class="menu-ctrl-btn" id="randomColorBtn">🎲 Random</button>
                    <button class="menu-ctrl-btn" id="layoutBtn">📐 Layout</button>
                </div>

                <div class="menu-status">
                    <span class="status-label">State:</span>
                    <span class="status-value" id="stateDisplay">Closed</span>
                    <span class="status-label">Items:</span>
                    <span class="status-value" id="itemsDisplay">8</span>
                    <span class="status-label">Layout:</span>
                    <span class="status-value" id="layoutDisplay">Circle</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #4facfe, #00d2d3);">
                        <span>🍔</span>
                    </div>
                    <span class="variant-label">Ocean</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                        <span>🍔</span>
                    </div>
                    <span class="variant-label">Sunset</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f9d976, #f39c12);">
                        <span>🍔</span>
                    </div>
                    <span class="variant-label">Gold</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);">
                        <span>🍔</span>
                    </div>
                    <span class="variant-label">Dream</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const trigger = document.getElementById('menuTrigger');
            const triggerIcon = document.getElementById('triggerIcon');
            const menuItems = document.getElementById('menuItems');
            const stateDisplay = document.getElementById('stateDisplay');
            const itemsDisplay = document.getElementById('itemsDisplay');
            const layoutDisplay = document.getElementById('layoutDisplay');
            const distanceSlider = document.getElementById('distanceSlider');
            const speedSlider = document.getElementById('speedSlider');
            const colorPicker = document.getElementById('colorPicker');
            const distanceValue = document.getElementById('distanceValue');
            const speedValue = document.getElementById('speedValue');
            const autoClose = document.getElementById('autoClose');
            const toggleBtn = document.getElementById('toggleBtn');
            const resetBtn = document.getElementById('resetBtn');
            const randomColorBtn = document.getElementById('randomColorBtn');
            const layoutBtn = document.getElementById('layoutBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                distance: 160,
                speed: 1,
                color: '#4facfe',
                autoClose: true,
                layout: 'circle', // 'circle', 'grid', 'spiral'
                onToggle: function(state) {
                    console.log(`🍔 Menu ${state ? 'opened' : 'closed'}`);
                },
                onItemClick: function(index, label) {
                    console.log(`📌 Clicked: ${label} (${index})`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isOpen = false;
            let isAnimating = false;
            let currentLayout = CONFIG.layout;
            let itemCount = 8;

            // ============================================
            // MENU FUNCTIONS
            // ============================================
            function getLayoutPositions(count, layout, distance) {
                const positions = [];
                const angleStep = (Math.PI * 2) / count;
                const radius = distance;

                switch(layout) {
                    case 'grid':
                        const cols = Math.ceil(Math.sqrt(count));
                        const rows = Math.ceil(count / cols);
                        const cellSize = distance * 0.7;
                        const offsetX = (cols - 1) * cellSize / 2;
                        const offsetY = (rows - 1) * cellSize / 2;
                        for (let i = 0; i < count; i++) {
                            const col = i % cols;
                            const row = Math.floor(i / cols);
                            positions.push({
                                x: col * cellSize - offsetX,
                                y: row * cellSize - offsetY
                            });
                        }
                        break;

                    case 'spiral':
                        for (let i = 0; i < count; i++) {
                            const angle = i * 1.2;
                            const r = (i / count) * distance * 1.2;
                            positions.push({
                                x: Math.cos(angle) * r,
                                y: Math.sin(angle) * r
                            });
                        }
                        break;

                    default: // circle
                        for (let i = 0; i < count; i++) {
                            const angle = angleStep * i - Math.PI / 2;
                            positions.push({
                                x: Math.cos(angle) * radius,
                                y: Math.sin(angle) * radius
                            });
                        }
                        break;
                }

                return positions;
            }

            function toggleMenu(open) {
                if (isAnimating) return;
                
                const shouldOpen = open !== undefined ? open : !isOpen;
                if (shouldOpen === isOpen) return;

                isAnimating = true;
                isOpen = shouldOpen;

                const items = menuItems.querySelectorAll('.menu-item');
                const count = items.length;
                const distance = parseInt(distanceSlider.value);
                const speed = parseFloat(speedSlider.value);
                const positions = getLayoutPositions(count, currentLayout, distance);

                items.forEach((item, index) => {
                    const pos = positions[index] || { x: 0, y: 0 };
                    const delay = index * 40 / speed;
                    
                    if (shouldOpen) {
                        // Open: explode outward
                        item.style.transition = `all ${0.4 / speed}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                        item.style.transitionDelay = delay + 'ms';
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                        item.style.opacity = '1';
                        item.style.pointerEvents = 'auto';
                    } else {
                        // Close: collapse to center
                        item.style.transition = `all ${0.3 / speed}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                        item.style.transitionDelay = '0ms';
                        item.style.transform = 'translate(0, 0) scale(0)';
                        item.style.opacity = '0';
                        item.style.pointerEvents = 'none';
                    }
                });

                // Update trigger
                triggerIcon.textContent = shouldOpen ? '✕' : '🍔';
                trigger.classList.toggle('active', shouldOpen);
                stateDisplay.textContent = shouldOpen ? 'Open' : 'Closed';
                stateDisplay.style.color = shouldOpen ? '#34c759' : '#6b7280';

                CONFIG.onToggle(shouldOpen);

                setTimeout(() => {
                    isAnimating = false;
                }, 400 / speed + 50);
            }

            function openMenu() {
                toggleMenu(true);
            }

            function closeMenu() {
                toggleMenu(false);
            }

            function toggle() {
                toggleMenu();
            }

            function resetMenu() {
                if (isOpen) {
                    closeMenu();
                }
                // Reset positions
                const items = menuItems.querySelectorAll('.menu-item');
                items.forEach(item => {
                    item.style.transition = 'all 0.3s ease';
                    item.style.transform = 'translate(0, 0) scale(0)';
                    item.style.opacity = '0';
                    item.style.pointerEvents = 'none';
                });
                triggerIcon.textContent = '🍔';
                trigger.classList.remove('active');
                stateDisplay.textContent = 'Closed';
                stateDisplay.style.color = '#6b7280';
                isOpen = false;
                CONFIG.onToggle(false);
            }

            function updateLayout() {
                const layouts = ['circle', 'grid', 'spiral'];
                const currentIndex = layouts.indexOf(currentLayout);
                const nextIndex = (currentIndex + 1) % layouts.length;
                currentLayout = layouts[nextIndex];
                layoutDisplay.textContent = currentLayout.charAt(0).toUpperCase() + currentLayout.slice(1);
                layoutBtn.textContent = `📐 ${layoutDisplay.textContent}`;
                
                if (isOpen) {
                    // Recalculate positions for open menu
                    const items = menuItems.querySelectorAll('.menu-item');
                    const count = items.length;
                    const distance = parseInt(distanceSlider.value);
                    const speed = parseFloat(speedSlider.value);
                    const positions = getLayoutPositions(count, currentLayout, distance);
                    
                    items.forEach((item, index) => {
                        const pos = positions[index] || { x: 0, y: 0 };
                        item.style.transition = `all ${0.4 / speed}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                    });
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            trigger.addEventListener('click', toggle);

            // Menu item clicks
            menuItems.addEventListener('click', function(e) {
                const item = e.target.closest('.menu-item');
                if (!item) return;
                
                const index = parseInt(item.dataset.index);
                const label = item.querySelector('.item-label')?.textContent || `Item ${index}`;
                
                CONFIG.onItemClick(index, label);
                
                // Close menu if auto-close is enabled
                if (autoClose.checked && isOpen) {
                    closeMenu();
                }
            });

            // Keyboard navigation
            trigger.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggle();
                }
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                }
            });

            // Menu item keyboard navigation
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isOpen) {
                    closeMenu();
                }
                if (e.key === 'Tab' && !isOpen) {
                    // Allow tab to trigger
                }
            });

            // Controls
            distanceSlider.addEventListener('input', function() {
                const val = parseInt(this.value);
                distanceValue.textContent = val + 'px';
                CONFIG.distance = val;
                if (isOpen) {
                    // Recalculate positions
                    const items = menuItems.querySelectorAll('.menu-item');
                    const count = items.length;
                    const speed = parseFloat(speedSlider.value);
                    const positions = getLayoutPositions(count, currentLayout, val);
                    
                    items.forEach((item, index) => {
                        const pos = positions[index] || { x: 0, y: 0 };
                        item.style.transition = `all ${0.3 / speed}s ease`;
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                    });
                }
            });

            speedSlider.addEventListener('input', function() {
                const val = parseFloat(this.value);
                speedValue.textContent = val.toFixed(1) + 'x';
                CONFIG.speed = val;
            });

            colorPicker.addEventListener('input', function() {
                const color = this.value;
                CONFIG.color = color;
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.style.setProperty('--item-color', color);
                });
                trigger.style.setProperty('--trigger-color', color);
            });

            autoClose.addEventListener('change', function() {
                CONFIG.autoClose = this.checked;
            });

            toggleBtn.addEventListener('click', toggle);
            resetBtn.addEventListener('click', resetMenu);
            randomColorBtn.addEventListener('click', function() {
                const colors = ['#4facfe', '#34c759', '#ff3b30', '#f59e0b', '#6c5ce7', '#fd79a8', '#00d2d3', '#ff9f43'];
                const random = colors[Math.floor(Math.random() * colors.length)];
                colorPicker.value = random;
                CONFIG.color = random;
                document.querySelectorAll('.menu-item').forEach(item => {
                    item.style.setProperty('--item-color', random);
                });
                trigger.style.setProperty('--trigger-color', random);
            });
            layoutBtn.addEventListener('click', updateLayout);

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const colorMap = {
                    'Ocean': ['#4facfe', '#00d2d3'],
                    'Sunset': ['#f093fb', '#f5576c'],
                    'Gold': ['#f9d976', '#f39c12'],
                    'Dream': ['#a18cd1', '#fbc2eb']
                };
                
                const label = card.querySelector('.variant-label').textContent;
                const colors = colorMap[label] || ['#4facfe', '#00d2d3'];
                
                card.addEventListener('click', function() {
                    const primary = colors[0];
                    colorPicker.value = primary;
                    CONFIG.color = primary;
                    document.querySelectorAll('.menu-item').forEach(item => {
                        item.style.setProperty('--item-color', primary);
                    });
                    trigger.style.setProperty('--trigger-color', primary);
                    stateDisplay.textContent = `🎨 ${label}`;
                    setTimeout(() => {
                        stateDisplay.textContent = isOpen ? 'Open' : 'Closed';
                    }, 1500);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.ExplodingMenu = {
                open: openMenu,
                close: closeMenu,
                toggle: toggle,
                reset: resetMenu,
                setLayout: (layout) => {
                    if (['circle', 'grid', 'spiral'].includes(layout)) {
                        currentLayout = layout;
                        layoutDisplay.textContent = layout.charAt(0).toUpperCase() + layout.slice(1);
                        layoutBtn.textContent = `📐 ${layoutDisplay.textContent}`;
                        if (isOpen) {
                            updateLayout();
                        }
                    }
                },
                setDistance: (distance) => {
                    distanceSlider.value = distance;
                    distanceValue.textContent = distance + 'px';
                    CONFIG.distance = distance;
                    if (isOpen) {
                        const items = menuItems.querySelectorAll('.menu-item');
                        const count = items.length;
                        const positions = getLayoutPositions(count, currentLayout, distance);
                        items.forEach((item, index) => {
                            const pos = positions[index] || { x: 0, y: 0 };
                            item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                        });
                    }
                },
                setColor: (color) => {
                    colorPicker.value = color;
                    CONFIG.color = color;
                    document.querySelectorAll('.menu-item').forEach(item => {
                        item.style.setProperty('--item-color', color);
                    });
                    trigger.style.setProperty('--trigger-color', color);
                },
                isOpen: () => isOpen,
                getState: () => ({
                    open: isOpen,
                    layout: currentLayout,
                    distance: CONFIG.distance,
                    speed: CONFIG.speed,
                    color: CONFIG.color,
                    autoClose: autoClose.checked
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        colorPicker.value = config.color;
                        document.querySelectorAll('.menu-item').forEach(item => {
                            item.style.setProperty('--item-color', config.color);
                        });
                        trigger.style.setProperty('--trigger-color', config.color);
                    }
                    if (config.distance) {
                        distanceSlider.value = config.distance;
                        distanceValue.textContent = config.distance + 'px';
                    }
                    if (config.speed) {
                        speedSlider.value = config.speed;
                        speedValue.textContent = config.speed.toFixed(1) + 'x';
                    }
                    if (config.layout) {
                        currentLayout = config.layout;
                        layoutDisplay.textContent = config.layout.charAt(0).toUpperCase() + config.layout.slice(1);
                        layoutBtn.textContent = `📐 ${layoutDisplay.textContent}`;
                    }
                    if (config.autoClose !== undefined) {
                        autoClose.checked = config.autoClose;
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Hide items initially
            const items = menuItems.querySelectorAll('.menu-item');
            items.forEach(item => {
                item.style.transform = 'translate(0, 0) scale(0)';
                item.style.opacity = '0';
                item.style.pointerEvents = 'none';
            });
            
            stateDisplay.textContent = 'Closed';
            layoutDisplay.textContent = 'Circle';
            itemsDisplay.textContent = items.length;

            console.log('🍔 Exploding Menu initialized!');
            console.log('📖 API: window.ExplodingMenu');
            console.log('📖 Usage:');
            console.log('  - Click the menu button to explode items');
            console.log('  - Keyboard shortcuts: Enter/Space (toggle), Escape (close)');
            console.log('  - Click items to trigger actions');

        })();
    </script>
</body>
</html>
