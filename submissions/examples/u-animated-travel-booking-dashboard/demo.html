<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Travel Booking Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Travel Booking Dashboard</h1>

<p>Track trips, bookings and destinations.</p>

</div>

<button class="action-btn">

+ New Booking

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">✈️</span>

<h3>Total Trips</h3>

<h2>1,245</h2>

<div class="progress-bar">

<div class="progress trips"></div>

</div>

</div>

<div class="card">

<span class="icon">🎫</span>

<h3>Bookings</h3>

<h2>385</h2>

<div class="progress-bar">

<div class="progress bookings"></div>

</div>

</div>

<div class="card">

<span class="icon">🌎</span>

<h3>Destinations</h3>

<h2>84</h2>

<div class="progress-bar">

<div class="progress destinations"></div>

</div>

</div>

<div class="card">

<span class="icon">💳</span>

<h3>Revenue</h3>

<h2>$96K</h2>

<div class="progress-bar">

<div class="progress revenue"></div>

</div>

</div>

</section>

<section class="card status">

<h2>Booking Status</h2>

<div class="status-item">

<span>Confirmed</span>

<div class="badge green">245</div>

</div>

<div class="status-item">

<span>Pending</span>

<div class="badge orange">84</div>

</div>

<div class="status-item">

<span>Cancelled</span>

<div class="badge red">19</div>

</div>

<div class="status-item">

<span>Completed</span>

<div class="badge blue">155</div>

</div>

</section>

</div>

</body>

</html>
