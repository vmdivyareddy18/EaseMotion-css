<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zigzag-border</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zigzag Border</h1>
    <div class="animation-wrapper">
      <div class="zigzag-box">
        <div class="zigzag-content">ZIGZAG</div>
        <div class="zigzag-edge top"></div>
        <div class="zigzag-edge right"></div>
        <div class="zigzag-edge bottom"></div>
        <div class="zigzag-edge left"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Border Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--border-color" />
      </label>
      <label>
        Zig Duration
        <input type="range" class="js-range" min="0.5" max="5" step="0.25" value="2" data-var="--zig-duration" />
        <span class="js-range-value">2s</span>
      </label>
      <label>
        Border Size
        <input type="range" class="js-range" min="2" max="10" step="1" value="4" data-var="--border-size" />
        <span class="js-range-value">4px</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        const val = el.dataset.var === '--border-size' ? el.value + 'px' : el.value + 's';
        document.documentElement.style.setProperty(el.dataset.var, val);
        if (display) display.textContent = val;
      });
    });
  </script>
</body>
</html>
