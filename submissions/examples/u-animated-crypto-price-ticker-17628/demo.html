<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Crypto Price Ticker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Crypto Price Ticker</h1>

  <p class="intro">
    A reusable crypto market animation for exchanges,
    portfolio trackers, trading dashboards, and fintech platforms.
  </p>

  <div class="demo-grid">

    <div class="ticker-card">
      <div class="crypto-ticker">
        <span class="coin">₿</span>
        <span class="price">$105,000</span>
        <span class="trend">▲</span>
      </div>
      <h3>Bitcoin</h3>
    </div>

    <div class="ticker-card">
      <div class="crypto-ticker">
        <span class="coin">Ξ</span>
        <span class="price">$6,850</span>
        <span class="trend">▲</span>
      </div>
      <p>Ethereum</p>
    </div>

    <div class="ticker-card">
      <div class="crypto-ticker">
        <span class="coin">₿</span>
        <span class="price">$105,000</span>
        <span class="trend">▲</span>
      </div>
      <button>View Market</button>
    </div>

  </div>

</main>

</body>
</html>
