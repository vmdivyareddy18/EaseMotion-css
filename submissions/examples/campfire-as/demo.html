<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campfire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="campfire">
    <div class="flames">
      <span class="ember e1"></span>
      <span class="ember e2"></span>
      <span class="ember e3"></span>
      <span class="flame outer"></span>
      <span class="flame mid"></span>
      <span class="flame inner"></span>
    </div>
    <div class="logs">
      <span class="log l1"></span>
      <span class="log l2"></span>
    </div>
    <span class="glow"></span>
  </div>
</body>
</html>
