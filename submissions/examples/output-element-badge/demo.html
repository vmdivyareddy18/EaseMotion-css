<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Output Element Badge Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Output Element as Badge</h1>
    <p>Live calculations with <code>output</code> element styled as badges</p>
  </header>
  <main class="output-grid">
    <div class="calc-card">
      <h2>Simple Sum</h2>
      <form oninput="sumResult.value = parseInt(a.value) + parseInt(b.value)">
        <div class="row"><input type="number" id="a" value="10" min="0"> <span class="op">+</span> <input type="number" id="b" value="20" min="0"></div>
        <div class="result-row">= <output name="sumResult" class="badge-result">30</output></div>
      </form>
    </div>
    <div class="calc-card">
      <h2>Product &amp; Discount</h2>
      <form oninput="finalResult.value = (parseInt(price.value) || 0) * (parseInt(qty.value) || 0) * ((100 - (parseInt(disc.value) || 0)) / 100)">
        <div class="row">
          <input type="number" id="price" value="25" min="0" placeholder="Price">
          <span class="op">&times;</span>
          <input type="number" id="qty" value="3" min="1" placeholder="Qty">
          <span class="op">disc</span>
          <input type="number" id="disc" value="10" min="0" max="100" placeholder="%">
        </div>
        <div class="result-row">Total: <output name="finalResult" class="pill-result">67.5</output></div>
      </form>
    </div>
    <div class="calc-card">
      <h2>Score Tracker</h2>
      <form oninput="avgResult.value = ((parseInt(s1.value)||0) + (parseInt(s2.value)||0) + (parseInt(s3.value)||0)) / 3">
        <div class="row">
          <input type="number" id="s1" value="85" min="0" max="100" step="0.5">
          <input type="number" id="s2" value="92" min="0" max="100" step="0.5">
          <input type="number" id="s3" value="78" min="0" max="100" step="0.5">
        </div>
        <div class="result-row">Average: <output name="avgResult" class="tag-result">85</output></div>
      </form>
    </div>
    <div class="calc-card">
      <h2>Character Counter</h2>
      <form oninput="charCount.value = textInput.value.length; charRemain.value = 100 - textInput.value.length">
        <textarea id="textInput" rows="3" maxlength="100" placeholder="Type something..."></textarea>
        <div class="result-row">
          <output name="charCount" class="badge-result">0</output> / 100
          <output name="charRemain" class="pill-result remaining">100</output> left
        </div>
      </form>
    </div>
  </main>
  <footer><p>All outputs update live — styled as badges, pills, and tags.</p></footer>
</body>
</html>
