<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Before/After Image Comparison</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--ease-color-neutral-50);
            padding: 40px 20px;
        }
        
        /* Set a fixed aspect ratio or height for the demo */
        .demo-wrapper {
            height: 450px; 
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body class="ease-text-primary">

    <div class="ease-container ease-stack-lg" style="max-width: 1000px;">
        <div class="ease-text-center ease-fade-in ease-slide-down">
            <h1 class="ease-text-3xl ease-font-bold ease-mb-2">Image Comparison Slider</h1>
            <p class="ease-text-muted">Drag the handle in the center to reveal the image underneath. 100% CSS.</p>
            <p class="ease-text-xs ease-text-primary ease-mt-2">Note: To drag, grab the bottom right corner of the left image (native resize handle), or if on Webkit, just grab the vertical line!</p>
        </div>

        <div class="demo-wrapper ease-fade-in ease-delay-200">
            <div class="ease-compare-container" style="height: 100%;">
                
                <!-- The Bottom Image (After) -->
                <!-- Using a bright, edited photo -->
                <img class="ease-compare-after" src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=80" alt="Mansion After Edit" />
                <div class="ease-compare-label right">After</div>

                <!-- The Draggable Top Image Overlay (Before) -->
                <div class="ease-compare-overlay">
                    <!-- Using a dark, unedited photo -->
                    <img class="ease-compare-before" src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?auto=format&fit=crop&w=800&q=10&blur=10" alt="Mansion Before Edit" />
                    <div class="ease-compare-label left">Before</div>
                </div>

            </div>
        </div>
        
    </div>

</body>
</html>
