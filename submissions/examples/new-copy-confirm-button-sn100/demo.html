<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Copy to Clipboard Animated Button</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<button class="ease-copy-btn" onclick="this.classList.add('copied'); setTimeout(() => this.classList.remove('copied'), 2000)">
  <span class="txt-copy">Copy Link</span>
  <span class="txt-confirm">✓ Copied!</span>
</button>
</body>
</html>
