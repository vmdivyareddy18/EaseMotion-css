<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Map Embed - Minimalist Design</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-minimal-3d: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-elastic-snap: cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
  </style>
</head>
<body>

  <!-- Minimalist Dashboard Wrapper -->
  <div class="app-container">
    <div class="app-header">
      <div class="meta-section">
        <span class="location-dot"></span>
        <h1>Global Operations Hub</h1>
      </div>
      <p class="timestamp">Live Coordinates Update</p>
    </div>

    <!-- 3D Perspective Control Space -->
    <div class="perspective-stage">
      <div class="map-card-3d">
        
        <!-- Minimal Graphic Grid (Simulating a crisp minimalist digital vector map layout) -->
        <div class="map-canvas">
          <div class="map-grid-lines"></div>
          
          <!-- Mock Continent Blocks -->
          <div class="landmass area-1"></div>
          <div class="landmass area-2"></div>
          <div class="landmass area-3"></div>
          
          <!-- Kinetic Map Indicators -->
          <div class="map-pin pin-primary">
            <span class="pulse-ring"></span>
            <div class="tooltip">HQ - Sector 7</div>
          </div>
          <div class="map-pin pin-secondary">
            <span class="pulse-ring"></span>
          </div>
          
          <!-- UI Overlay Controls inside the map -->
          <div class="map-controls">
            <span class="control-btn">+</span>
            <span class="control-btn">−</span>
          </div>
        </div>

        <!-- Sleek Floating Data Card attached to the 3D plane -->
        <div class="floating-meta-panel">
          <h3>N 40° 42' 51" / W 74° 0' 21"</h3>
          <p>Signal Strength: Optimal (99.2%)</p>
        </div>

      </div>
    </div>

    <div class="app-footer">
      <p>Hover over the coordinate canvas to engage the EaseMotion 3D tilt perspective alignment matrix.</p>
    </div>
  </div>

</body>
</html>
