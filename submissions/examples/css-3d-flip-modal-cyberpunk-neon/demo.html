<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Neon 3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="cyber-card">

        <h2>NEON TERMINAL</h2>

        <p>
            Launch the cyberpunk control panel with a pure CSS 3D flip animation.
        </p>

        <a href="#modal" class="btn">
            Launch Console
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">Neon Control Panel</h2>

        <div class="stats">

            <div class="stat">
                <h3>CPU</h3>
                <span>98%</span>
            </div>

            <div class="stat">
                <h3>Memory</h3>
                <span>32 GB</span>
            </div>

            <div class="stat">
                <h3>Network</h3>
                <span>1.8 Gb/s</span>
            </div>

            <div class="stat">
                <h3>Firewall</h3>
                <span>ACTIVE</span>
            </div>

        </div>

        <button class="action-btn">
            Initialize System
        </button>

    </div>

</div>

</body>
</html>
