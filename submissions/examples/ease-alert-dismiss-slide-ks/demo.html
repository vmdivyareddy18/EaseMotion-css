<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ease Alert Dismiss Slide KS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="eads-alert eads-info">
        <div class="eads-icon">ℹ</div>
        <div class="eads-msg">Information alert.</div>
        <button class="eads-close">&times;</button>
    </div>

    <div class="eads-alert eads-success">
        <div class="eads-icon">✓</div>
        <div class="eads-msg">Success alert.</div>
        <button class="eads-close">&times;</button>
    </div>

    <div class="eads-alert eads-warning">
        <div class="eads-icon">⚠</div>
        <div class="eads-msg">Warning alert.</div>
        <button class="eads-close">&times;</button>
    </div>

    <div class="eads-alert eads-error">
        <div class="eads-icon">✕</div>
        <div class="eads-msg">Error alert.</div>
        <button class="eads-close">&times;</button>
    </div>

</div>

<script>
document.querySelectorAll(".eads-close").forEach(btn=>{
    btn.addEventListener("click",()=>{
        btn.parentElement.classList.add("eads-dismiss");
    });
});
</script>

</body>
</html>
