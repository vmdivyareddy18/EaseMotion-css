<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Note Taking Card</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='card-bg')r.style.setProperty('--card-bg',t.value);if(t.name==='card-color')r.style.setProperty('--card-color',t.value);if(t.name==='pin-color')r.style.setProperty('--pin-color',t.value);if(t.name==='appear-duration')r.style.setProperty('--appear-duration',t.value+'s')})</script>
<div class="container"><p class="title">Note Taking Card</p>
<div class="notes"><div class="note"><div class="pin"></div><div class="note-content"><div class="note-title">Ideas</div><div class="note-text">New project concept with interactive animations</div></div></div>
<div class="note"><div class="pin"></div><div class="note-content"><div class="note-title">Tasks</div><div class="note-text">Review pull requests and update dependencies</div></div></div>
<div class="note"><div class="pin"></div><div class="note-content"><div class="note-title">Notes</div><div class="note-text">CSS variables make theming much cleaner</div></div></div></div>
<div class="controls"><label>Card: <input type="color" name="card-bg" value="#2d2d44"></label><label>Text: <input type="color" name="card-color" value="#ccc"></label><label>Pin: <input type="color" name="pin-color" value="#f72585"></label><label>Speed: <input type="range" name="appear-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div></body></html>
