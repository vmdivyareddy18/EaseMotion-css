<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Car Sharing App</title>
</head>
<body>
  <header class="hero-car">
    <h1>Your City, Your Wheels.</h1>
    <p>On-demand car sharing, available at the tap of a button.</p>
  </header>
  <section class="process-grid">
    <div class="step-card">
        <div class="step-number">1</div>
        <h3>Locate</h3>
        <p>Find the nearest available car on the live map.</p>
    </div>
    <div class="step-card">
        <div class="step-number">2</div>
        <h3>Unlock</h3>
        <p>Unlock your vehicle instantly via the app.</p>
    </div>
    <div class="step-card">
        <div class="step-number">3</div>
        <h3>Drive</h3>
        <p>Go anywhere in the city and park in designated zones.</p>
    </div>
  </section>
</body>
</html>
