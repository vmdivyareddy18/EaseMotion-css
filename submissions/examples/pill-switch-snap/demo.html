<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pill Switch Snap</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion toggle</p>
    <h1 id="demo-title">Pill switch snap</h1>
    <p class="intro">A CSS-only switch control with a crisp thumb slide and soft active-state glow.</p>

    <label class="switch">
      <input type="checkbox" checked />
      <span class="track">
        <span class="thumb"></span>
      </span>
      <span class="label-text">Auto sync enabled</span>
    </label>
  </main>
</body>
</html>
