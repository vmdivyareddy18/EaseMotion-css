<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmation Dialog Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; height: 100vh; overflow: hidden;">
  
  <div class="ease-modal-overlay">
    <div class="ease-dialog-card">
      <div class="ease-dialog-icon">⚠️</div>
      <h2 class="ease-dialog-title">Delete Account</h2>
      <p class="ease-dialog-text">Are you sure you want to delete your account? This action cannot be undone and you will lose all your data.</p>
      
      <div class="ease-dialog-actions">
        <button class="ease-dialog-btn ease-dialog-btn-cancel">Cancel</button>
        <button class="ease-dialog-btn ease-dialog-btn-confirm">Delete</button>
      </div>
    </div>
  </div>

</body>
</html>
