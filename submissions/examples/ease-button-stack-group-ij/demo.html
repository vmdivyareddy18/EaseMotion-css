<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Stack Group</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
      color: #333;
    }
    .demo-container {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
      margin: 24px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 40px; font-size: 0.9rem; }
    .demo-box {
      background: #f8f9fc;
      border-radius: 12px;
      padding: 48px 32px;
      border: 1px solid #eef0f4;
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Button Stack Group</h1>
    <p class="desc">Stacked button group with animated selection indicator sliding between buttons</p>

    <div class="demo-box">
      <div class="ease-button-stack-group" id="btnGroup">
        <div class="btn-stack-indicator"></div>
        <button class="btn-stack active" data-index="0">Day</button>
        <button class="btn-stack" data-index="1">Week</button>
        <button class="btn-stack" data-index="2">Month</button>
        <button class="btn-stack" data-index="3">Year</button>
      </div>
    </div>
  </div>

  <script>
    const group = document.getElementById('btnGroup');
    group.querySelectorAll('.btn-stack').forEach(btn => {
      btn.addEventListener('click', () => {
        group.querySelectorAll('.btn-stack').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        group.style.setProperty('--active-index', btn.dataset.index);
      });
    });
  </script>
</body>
</html>
