<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geometric Pattern BG — Morphing Shapes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pattern-demo" style="--pattern-color1: #7c5cbf; --pattern-color2: #4fc3a1; --bg-color: #0f0f13; --morph-duration: 12s;">
    <div class="pattern-overlay">
      <div class="content-card">
        <h1>Geometric Pattern BG</h1>
        <p class="subtitle">Morphing shapes in an endlessly evolving background</p>

        <div class="info-grid">
          <div class="info-item">
            <span class="label">Theme</span>
            <span class="value">Dark / Cyberpunk</span>
          </div>
          <div class="info-item">
            <span class="label">Shapes</span>
            <span class="value">Circles &times; Polygons</span>
          </div>
          <div class="info-item">
            <span class="label">Speed</span>
            <span class="value">12s cycle</span>
          </div>
          <div class="info-item">
            <span class="label">Colors</span>
            <span class="value">Purple &harr; Teal</span>
          </div>
        </div>

        <div class="color-controls">
          <button class="palette-btn" data-c1="#7c5cbf" data-c2="#4fc3a1">Purple &amp; Teal</button>
          <button class="palette-btn" data-c1="#e74c5f" data-c2="#f1c40f">Red &amp; Gold</button>
          <button class="palette-btn" data-c1="#5dade2" data-c2="#a569bd">Blue &amp; Violet</button>
        </div>
      </div>
    </div>

    <!-- Morphing shapes -->
    <div class="morph-shapes">
      <div class="shape shape--1"></div>
      <div class="shape shape--2"></div>
      <div class="shape shape--3"></div>
      <div class="shape shape--4"></div>
      <div class="shape shape--5"></div>
      <div class="shape shape--6"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.palette-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const demo = document.querySelector('.pattern-demo');
        demo.style.setProperty('--pattern-color1', btn.dataset.c1);
        demo.style.setProperty('--pattern-color2', btn.dataset.c2);
      });
    });
  </script>
</body>
</html>
