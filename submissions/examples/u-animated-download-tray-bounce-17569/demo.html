<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Download Tray Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Download Tray Bounce</h1>

    <p class="intro">
      A reusable download animation for file managers,
      cloud platforms, dashboards, and productivity tools.
    </p>

    <div class="demo-grid">

      <div class="download-card">
        <div class="download-tray">
          <span class="download-arrow">⬇️</span>
          <span class="tray">📥</span>
        </div>
        <h3>Download Complete</h3>
      </div>

      <div class="download-card">
        <div class="download-tray large">
          <span class="download-arrow">⬇️</span>
          <span class="tray">📥</span>
        </div>
        <p>File Ready</p>
      </div>

      <div class="download-card">
        <div class="download-tray">
          <span class="download-arrow">⬇️</span>
          <span class="tray">📥</span>
        </div>
        <button>Download</button>
      </div>

    </div>

  </main>

</body>
</html>
