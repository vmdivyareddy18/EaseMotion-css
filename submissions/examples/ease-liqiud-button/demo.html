<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Liquid Button Components</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Liquid Fill Button Interactions</h1>
        
        <div class="grid">
            <!-- Variant 1: Classic liquid fill from bottom -->
            <div class="card">
                <h3>1. Liquid Fill From Bottom</h3>
                <button class="ease-btn-liquid ease-btn-liquid-up">
                    <span>Hover Me</span>
                </button>
            </div>

            <!-- Variant 2: Liquid fill from center -->
            <div class="card">
                <h3>2. Liquid Fill From Center</h3>
                <button class="ease-btn-liquid ease-btn-liquid-center">
                    <span>Hover Me</span>
                </button>
            </div>

            <!-- Variant 3: Dual-color liquid mix -->
            <div class="card">
                <h3>3. Dual-Color Liquid Mix</h3>
                <button class="ease-btn-liquid ease-btn-liquid-mix">
                    <span>Hover Me</span>
                </button>
            </div>

            <!-- Variant 4: Liquid border animation -->
            <div class="card">
                <h3>4. Liquid Border Fluid Motion</h3>
                <button class="ease-btn-liquid-border">
                    <span>Hover Me</span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
