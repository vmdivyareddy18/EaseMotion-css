<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS alert-icon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Icon Alerts</h1>
    <div class="alert-list">
      <div class="alert success"><span class="alert-icon ai-success">&#10003;</span> Changes saved successfully</div>
      <div class="alert error"><span class="alert-icon ai-error">&#10007;</span> Connection lost. Retrying...</div>
      <div class="alert warning"><span class="alert-icon ai-warning">&#9888;</span> Disk space running low</div>
      <div class="alert info"><span class="alert-icon ai-info">&#8505;</span> New update available</div>
    </div>
  </div>
</body>
</html>
