<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="generator">
      <h1 class="gen-title">Password Generator</h1>
      <div class="password-display">
        <input type="text" class="password-field" id="passwordField" readonly value="P@ssw0rd!">
        <button class="copy-btn" id="copyBtn" title="Copy to clipboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        </button>
      </div>
      <div class="settings">
        <div class="setting-row">
          <label for="lengthSlider">Length: <span id="lengthValue">12</span></label>
          <input type="range" id="lengthSlider" min="4" max="32" value="12">
        </div>
        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="includeUpper" checked>
            <span class="checkmark"></span>
            Uppercase (A-Z)
          </label>
        </div>
        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="includeLower" checked>
            <span class="checkmark"></span>
            Lowercase (a-z)
          </label>
        </div>
        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="includeNumbers" checked>
            <span class="checkmark"></span>
            Numbers (0-9)
          </label>
        </div>
        <div class="setting-row">
          <label class="checkbox-label">
            <input type="checkbox" id="includeSymbols" checked>
            <span class="checkmark"></span>
            Symbols (!@#$%^&*)
          </label>
        </div>
        <div class="strength-bar">
          <div class="strength-label">Strength: <span id="strengthLabel">Strong</span></div>
          <div class="strength-track">
            <div class="strength-fill" id="strengthFill" style="width: 75%"></div>
          </div>
        </div>
        <button class="generate-btn" id="generateBtn">Generate Password</button>
      </div>
    </div>
  </div>
  <script>
    const passwordField = document.getElementById('passwordField');
    const lengthSlider = document.getElementById('lengthSlider');
    const lengthValue = document.getElementById('lengthValue');
    const includeUpper = document.getElementById('includeUpper');
    const includeLower = document.getElementById('includeLower');
    const includeNumbers = document.getElementById('includeNumbers');
    const includeSymbols = document.getElementById('includeSymbols');
    const strengthFill = document.getElementById('strengthFill');
    const strengthLabel = document.getElementById('strengthLabel');
    const generateBtn = document.getElementById('generateBtn');
    const copyBtn = document.getElementById('copyBtn');

    const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    const lower = 'abcdefghijklmnopqrstuvwxyz';
    const numbers = '0123456789';
    const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';

    function getCharset() {
      let chars = '';
      if (includeUpper.checked) chars += upper;
      if (includeLower.checked) chars += lower;
      if (includeNumbers.checked) chars += numbers;
      if (includeSymbols.checked) chars += symbols;
      return chars;
    }

    function generatePassword() {
      const len = parseInt(lengthSlider.value);
      const chars = getCharset();
      if (!chars) return;
      let password = '';
      for (let i = 0; i < len; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }
      passwordField.value = password;
      updateStrength(chars.length, len);
    }

    function updateStrength(charsetSize, len) {
      let score = 0;
      if (len >= 8) score += 25;
      if (len >= 12) score += 15;
      if (len >= 16) score += 10;
      if (includeUpper.checked) score += 15;
      if (includeLower.checked) score += 10;
      if (includeNumbers.checked) score += 15;
      if (includeSymbols.checked) score += 20;
      score = Math.min(100, score);
      strengthFill.style.width = score + '%';
      if (score < 30) {
        strengthFill.style.background = '#ef4444';
        strengthLabel.textContent = 'Weak';
      } else if (score < 60) {
        strengthFill.style.background = '#f59e0b';
        strengthLabel.textContent = 'Medium';
      } else {
        strengthFill.style.background = '#22c55e';
        strengthLabel.textContent = 'Strong';
      }
    }

    lengthSlider.addEventListener('input', () => {
      lengthValue.textContent = lengthSlider.value;
      generatePassword();
    });

    [includeUpper, includeLower, includeNumbers, includeSymbols].forEach(cb => {
      cb.addEventListener('change', generatePassword);
    });

    generateBtn.addEventListener('click', generatePassword);

    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(passwordField.value);
      const orig = copyBtn.innerHTML;
      copyBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
      setTimeout(() => copyBtn.innerHTML = orig, 2000);
    });

    generatePassword();
  </script>
</body>
</html>
