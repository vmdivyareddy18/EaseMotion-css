<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Level Progress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Level System</h1>
  <p class="ease-fade-in delay">
    Gain experience points and watch your progress bar fill smoothly with animation.
    Designed to simulate gamification UI patterns.
  </p>

  <div class="xp-card ease-slide-up">
    <h2>Level <span id="level">1</span></h2>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <p><span id="xp">0</span> / 100 XP</p>

    <button class="xp-btn ease-hover-grow" onclick="gainXP()">Gain XP</button>
  </div>
</section>

<script>
  let xp = 0;
  let level = 1;

  function gainXP() {
    xp += 20;

    if (xp >= 100) {
      xp = 0;
      level++;
      document.getElementById("level").textContent = level;
    }

    document.getElementById("xp").textContent = xp;

    const progress = document.getElementById("progress");
    progress.style.width = xp + "%";
  }
</script>

</body>
</html>
