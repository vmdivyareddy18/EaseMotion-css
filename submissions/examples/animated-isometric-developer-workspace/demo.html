<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Isometric Developer Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="workspace-hero">
    <div class="workspace">
      <div class="workspace__glow"></div>
      <div class="workspace__desk"></div>

      <div class="workspace__panel workspace__panel--browser">
        <div class="panel__top">
          <span></span><span></span><span></span>
        </div>
        <div class="browser__window">
          <div class="browser__tab"></div>
          <div class="browser__line browser__line--wide"></div>
          <div class="browser__line browser__line--medium"></div>
          <div class="browser__grid">
            <span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <div class="workspace__panel workspace__panel--terminal">
        <div class="panel__top panel__top--dark">
          <span></span><span></span><span></span>
          <span class="panel__label">TERMINAL</span>
        </div>
        <div class="terminal__lines">
          <div><span>$</span> git status</div>
          <div><span>✔</span> all files synced</div>
          <div><span>$</span> npm run build</div>
          <div><span>⚡</span> compiled successfully</div>
        </div>
      </div>

      <div class="workspace__panel workspace__panel--code">
        <div class="panel__top"></div>
        <div class="code__lines">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="workspace__panel workspace__panel--laptop">
        <div class="laptop__screen">
          <div class="laptop__tabs">
            <span></span><span></span><span></span>
          </div>
          <div class="laptop__content"></div>
        </div>
        <div class="laptop__base"></div>
      </div>

      <div class="workspace__tech-bar">
        <span>HTML</span>
        <span>CSS</span>
        <span>JS</span>
        <span>AI</span>
      </div>
    </div>
  </section>
</body>
</html>
