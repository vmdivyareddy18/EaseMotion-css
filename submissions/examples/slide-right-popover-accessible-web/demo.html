<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Slide Right Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="popover-wrapper">

  <button class="popover-trigger" aria-label="Open information popover">
    Open Info
  </button>

  <div class="popover-content" role="dialog">
    <h2>Accessible Web</h2>
    <p>
      A CSS-only slide-right popover with keyboard focus support.
    </p>
  </div>

</div>

</body>
</html>
