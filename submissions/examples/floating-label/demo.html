<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Label Input</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h2>Floating Label Input</h2>

    <div class="input-floating">
        <input type="text" id="name" placeholder=" " required>
        <label class="label-floating" for="name">Full Name</label>
    </div>

    <div class="input-floating">
        <input type="email" id="email" placeholder=" " required>
        <label class="label-floating" for="email">Email Address</label>
    </div>

    <div class="input-floating">
        <input type="password" id="password" placeholder=" " required>
        <label class="label-floating" for="password">Password</label>
    </div>

    <button class="submit-btn">Sign Up</button>

</div>

</body>
</html>
