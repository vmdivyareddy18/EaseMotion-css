<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Toggle Switch UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Toggle Switch UI Example</h1>
      <p>Responsive toggle switches with animated thumb movement, track glow, and variant states.</p>
    </header>

    <section class="switch-grid">
      <label class="toggle-switch">
        <input type="checkbox" checked />
        <span class="toggle-switch__track"></span>
        <span class="toggle-switch__thumb"></span>
        <span class="toggle-switch__label">Primary</span>
      </label>

      <label class="toggle-switch toggle-switch--accent">
        <input type="checkbox" />
        <span class="toggle-switch__track"></span>
        <span class="toggle-switch__thumb"></span>
        <span class="toggle-switch__label">Accent</span>
      </label>

      <label class="toggle-switch toggle-switch--small">
        <input type="checkbox" checked />
        <span class="toggle-switch__track"></span>
        <span class="toggle-switch__thumb"></span>
        <span class="toggle-switch__label">Compact</span>
      </label>

      <label class="toggle-switch toggle-switch--soft">
        <input type="checkbox" />
        <span class="toggle-switch__track"></span>
        <span class="toggle-switch__thumb"></span>
        <span class="toggle-switch__label">Soft</span>
      </label>
    </section>
  </main>
</body>
</html>
