<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-sling-in-right</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-sling-in-right</h1>

    <p>
        A dynamic entrance animation that slings elements into view
        from the far right with a smooth elastic overshoot.
    </p>

    <div class="cards">

        <div class="card ease-sling-in-right">
            <h2>Analytics</h2>
            <p>Track business performance in real time.</p>
        </div>

        <div class="card ease-sling-in-right delay-1">
            <h2>Customers</h2>
            <p>Monitor user engagement and retention.</p>
        </div>

        <div class="card ease-sling-in-right delay-2">
            <h2>Revenue</h2>
            <p>Visualize growth through interactive metrics.</p>
        </div>

    </div>

</div>

</body>
</html>
