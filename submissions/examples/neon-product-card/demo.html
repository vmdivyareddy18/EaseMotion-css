<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Neon Product Card — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 50% 20%, #10101f 0%, #05050a 70%);
      padding: 40px;
    }
    .demo-hint {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #94a3b8;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <p class="demo-hint">Hover or Tab-focus the card to flip it and see full specs</p>

  <div class="ease-neon-card" tabindex="0">
    <div class="glow-orb glow-orb--1"></div>
    <div class="glow-orb glow-orb--2"></div>

    <div class="card-flip-inner">
      <!-- FRONT -->
      <div class="card-face card-front">
        <div class="card-image-wrap">
          <span class="card-badge">NEW</span>
          <span class="card-product-icon">🎧</span>
        </div>
        <div class="card-body">
          <h3 class="card-title">Aether Wireless Headphones</h3>
          <p class="card-subtitle">Spatial audio · Active noise cancelling</p>
          <div class="card-price-row">
            <span class="card-price">$249</span>
            <span class="card-price-old">$329</span>
          </div>
          <button type="button" class="card-cta">Add to Cart</button>
        </div>
      </div>

      <!-- BACK -->
      <div class="card-face card-back">
        <h3 class="card-back-title">Full Specifications</h3>
        <ul class="card-spec-list">
          <li><span>Battery Life</span><span>38 hours</span></li>
          <li><span>Driver Size</span><span>40mm</span></li>
          <li><span>Bluetooth</span><span>5.3</span></li>
          <li><span>Weight</span><span>250g</span></li>
          <li><span>Charging</span><span>USB-C Fast</span></li>
        </ul>
        <p class="card-flip-hint">Move away to flip back</p>
      </div>
    </div>
  </div>

</body>
</html>
