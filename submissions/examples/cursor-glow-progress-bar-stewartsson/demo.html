<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Hub - Cursor Glow Progress Bar Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="portfolio-viewport">
        <!-- Main Premium Portfolio Card Elevation Container Hub Shell -->
        <div class="showcase-card-node">
            <header class="showcase-header">
                <span class="portfolio-badge">Project Loading Core</span>
                <h2 class="showcase-title">Asset Compilation</h2>
                <p class="showcase-subtitle">Hover over the layout track panel below to trigger the interactive pure-CSS ambient radial cursor glow indicators.</p>
            </header>

            <!-- Advanced Pure-CSS Progress Bar Track Stage Canvas Area -->
            <div class="progress-workspace">
                <div class="cursor-glow-progress-track">
                    
                    <!-- Interactive Ambient Radial Glow Ambient Aura Mask Sheet Layer -->
                    <div class="bar-glow-tracker"></div>
                    
                    <!-- Advanced Linear Loading Fill Track Component Layer -->
                    <div class="progress-fill-fill ease-progress-load"></div>

                </div>
                <div class="percentage-meta-row">
                    <span class="status-label-text">Compiling Mesh Shaders</span>
                    <span class="percentage-value">85%</span>
                </div>
            </div>

            <footer class="showcase-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Interactive 2D Matrix Render Synced</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
