<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Animation Replay Cards - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="deck-wrapper-sb">
    <div class="deck-header-sb">
      <h2>Motion Library Interactive Deck</h2>
      <p>Click any card below to instantly trigger and replay its CSS animation effect.</p>
    </div>

    <main class="grid-layout-sb">
      <div class="animation-card-sb" onclick="replayAnimation(this, 'ease-bounce-sb')">
        <div class="animated-box-sb ease-bounce-sb">Bounce</div>
        <span class="card-hint-sb">Click to replay</span>
      </div>

      <div class="animation-card-sb" onclick="replayAnimation(this, 'ease-flip-sb')">
        <div class="animated-box-sb ease-flip-sb">Flip Effect</div>
        <span class="card-hint-sb">Click to replay</span>
      </div>
    </main>
  </div>

  <script>
    function replayAnimation(cardElement, animationClassName) {
      const box = cardElement.querySelector('.animated-box-sb');
      
      // 1. Remove the animation selector class token completely
      box.classList.remove(animationClassName);
      
      // 2. Trigger a microscopic DOM reflow layout flush to wipe memory cache
      void box.offsetWidth;
      
      // 3. Re-append the class name token to force the browser to repaint the frames
      box.classList.add(animationClassName);
    }
  </script>

</body>
</html>
