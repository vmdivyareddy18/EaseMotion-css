<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Ripple Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Click Ripple Buttons</h1>
  <div class="demo-grid">
    <button class="cr-btn" type="button">Default</button>
    <button class="cr-btn cr-btn--primary" type="button">Primary</button>
    <button class="cr-btn cr-btn--outline" type="button">Outline</button>
    <button class="cr-btn cr-btn--small" type="button">Small</button>
    <button class="cr-btn cr-btn--large" type="button">Large</button>
    <button class="cr-btn cr-btn--pill" type="button">Pill</button>
  </div>
  <script>
    document.querySelectorAll('.cr-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const existing = this.querySelector('.cr-ripple');
        if (existing) existing.remove();

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 2;
        const x = e.clientX - rect.left - size / 2;
        const y = e.clientY - rect.top - size / 2;

        const ripple = document.createElement('span');
        ripple.className = 'cr-ripple';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        this.appendChild(ripple);
      });
    });
  </script>
</body>
</html>
