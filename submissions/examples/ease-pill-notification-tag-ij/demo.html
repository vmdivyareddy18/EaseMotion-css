<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pill Notification Tags</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Pill Notification Tags</h1>

  <div class="controls">
    <div class="control-group">
      <label for="tag-type">Type</label>
      <select id="tag-type">
        <option value="default">Default</option>
        <option value="success">Success</option>
        <option value="warning">Warning</option>
        <option value="danger">Danger</option>
        <option value="info">Info</option>
      </select>
    </div>
    <div class="control-group">
      <label for="tag-label">Label</label>
      <input id="tag-label" type="text" value="New Tag" />
    </div>
    <div class="control-group">
      <label for="tag-count">Count</label>
      <input id="tag-count" type="number" value="3" min="0" max="99" />
    </div>
    <button id="add-tag-btn" class="btn">Add Tag</button>
    <button id="clear-tags-btn" class="btn btn-outline">Clear All</button>
  </div>

  <div class="tag-container" id="tag-container">
    <div class="pill-tag pill-tag--default" data-type="default">
      <span class="pill-tag__label">Inbox</span>
      <span class="pill-tag__count">12</span>
      <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
    </div>
    <div class="pill-tag pill-tag--success" data-type="success">
      <span class="pill-tag__label">Completed</span>
      <span class="pill-tag__count">8</span>
      <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
    </div>
    <div class="pill-tag pill-tag--warning" data-type="warning">
      <span class="pill-tag__label">Pending</span>
      <span class="pill-tag__count">5</span>
      <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
    </div>
    <div class="pill-tag pill-tag--danger" data-type="danger">
      <span class="pill-tag__label">Errors</span>
      <span class="pill-tag__count">3</span>
      <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
    </div>
    <div class="pill-tag pill-tag--info" data-type="info">
      <span class="pill-tag__label">Updates</span>
      <span class="pill-tag__count">7</span>
      <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('tag-container');
    const typeSelect = document.getElementById('tag-type');
    const labelInput = document.getElementById('tag-label');
    const countInput = document.getElementById('tag-count');
    const addBtn = document.getElementById('add-tag-btn');
    const clearBtn = document.getElementById('clear-tags-btn');

    function dismissTag(tag) {
      tag.classList.add('pill-tag--dismiss');
      tag.addEventListener('animationend', () => tag.remove(), { once: true });
    }

    container.addEventListener('click', (e) => {
      const btn = e.target.closest('.pill-tag__close');
      if (btn) dismissTag(btn.closest('.pill-tag'));
    });

    addBtn.addEventListener('click', () => {
      const type = typeSelect.value;
      const label = labelInput.value.trim() || 'Tag';
      const count = Math.min(Math.max(parseInt(countInput.value, 10) || 0, 0), 99);
      const tag = document.createElement('div');
      tag.className = `pill-tag pill-tag--${type}`;
      tag.dataset.type = type;
      tag.innerHTML = `
        <span class="pill-tag__label">${label}</span>
        <span class="pill-tag__count">${count}</span>
        <button class="pill-tag__close" aria-label="Dismiss">&times;</button>
      `;
      container.appendChild(tag);
      requestAnimationFrame(() => tag.classList.add('pill-tag--enter'));
    });

    clearBtn.addEventListener('click', () => {
      const tags = [...container.querySelectorAll('.pill-tag')];
      tags.forEach(t => dismissTag(t));
    });

    document.querySelectorAll('.pill-tag').forEach(t =>
      requestAnimationFrame(() => t.classList.add('pill-tag--enter'))
    );
  </script>
</body>
</html>
