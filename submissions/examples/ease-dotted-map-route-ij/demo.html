<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Dotted Map Route</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #16162a;
      border-radius: 1.25rem;
      padding: 2rem;
      max-width: 700px;
      width: 100%;
      margin: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    .card__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .card__subtitle {
      font-size: 0.875rem;
      opacity: 0.6;
      margin-bottom: 1.5rem;
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .controls input[type="color"],
    .controls input[type="range"] {
      cursor: pointer;
      background: #2d2d3d;
      border: 1px solid #3d3d5c;
      border-radius: 0.375rem;
      padding: 0.25rem;
    }
    .btn {
      background: #2d2d3d;
      border: none;
      color: #e0e0e0;
      padding: 0.5rem 1.25rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #3d3d5c; }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="card__title">🗺️ Dotted Map Route</h1>
    <p class="card__subtitle">Issue #36605 — animated path-drawing route with pulsing dots</p>

    <div class="controls">
      <label>Route Color
        <input type="color" id="routeColor" value="#ff6b6b">
      </label>
      <label>Dot Color
        <input type="color" id="dotColor" value="#feca57">
      </label>
      <label>Map BG
        <input type="color" id="mapBg" value="#1a1a2e">
      </label>
      <label>Duration
        <input type="range" id="drawDuration" min="1" max="8" step="0.5" value="3">
        <span id="durVal">3s</span>
      </label>
    </div>

    <div class="ease-dotted-map" id="map">
      <svg class="ease-dotted-map__svg" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
        <path class="ease-dotted-map__route" d="M40 240 Q80 40 160 120 T280 60 T360 180" id="route"/>
        <circle class="ease-dotted-map__dot" cx="40" cy="240" style="animation-delay: 2.8s"/>
        <circle class="ease-dotted-map__dot" cx="160" cy="120" style="animation-delay: 1.2s"/>
        <circle class="ease-dotted-map__dot" cx="280" cy="60" style="animation-delay: 2s"/>
        <circle class="ease-dotted-map__dot" cx="360" cy="180" style="animation-delay: 2.9s"/>
      </svg>
    </div>

    <div style="margin-top: 1rem; text-align: center;">
      <button class="btn" id="replayBtn">↻ Replay Animation</button>
    </div>
  </div>

  <script>
    const map = document.getElementById('map');
    const route = document.getElementById('route');

    function replay() {
      route.style.animation = 'none';
      void route.offsetWidth;
      route.style.animation = '';
    }

    document.getElementById('replayBtn').addEventListener('click', replay);

    document.getElementById('routeColor').addEventListener('input', e => {
      map.style.setProperty('--route-color', e.target.value);
    });
    document.getElementById('dotColor').addEventListener('input', e => {
      map.style.setProperty('--dot-color', e.target.value);
    });
    document.getElementById('mapBg').addEventListener('input', e => {
      map.style.setProperty('--map-bg', e.target.value);
    });
    document.getElementById('drawDuration').addEventListener('input', e => {
      const v = e.target.value + 's';
      map.style.setProperty('--draw-duration', v);
      document.getElementById('durVal').textContent = v;
      replay();
    });
  </script>
</body>
</html>
