<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Bounce - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Upload Indicator</h1>

    <div class="upload-card">
      <div class="upload-icon">
        <div class="arrow-up"></div>
        <div class="upload-tray"></div>
      </div>
      <span class="upload-label">Uploading...</span>
      <div class="upload-bar">
        <div class="upload-fill"></div>
      </div>
    </div>

    <div class="variant-row">
      <div class="upload-card sm">
        <div class="upload-icon">
          <div class="arrow-up"></div>
          <div class="upload-tray"></div>
        </div>
        <span class="upload-label">Upload complete</span>
        <div class="upload-bar"><div class="upload-fill done"></div></div>
      </div>
    </div>

    <p class="description">The upward arrow bounces continuously, indicating active upload in progress with a progress bar below.</p>
  </div>
</body>
</html>
