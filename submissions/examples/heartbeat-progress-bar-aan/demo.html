<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ease Heartbeat Progress Bar — Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="demo-wrap">
    <h1>Ease Heartbeat Progress Bar</h1>
    <p>A pulsing progress indicator with a neon heartbeat-style glow. Pure CSS, no JavaScript required.</p>

    <section class="demo-block">
      <h2>60% complete</h2>
      <div class="ease-heartbeat-bar" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100" aria-label="Upload progress">
        <div class="ease-heartbeat-bar-fill" style="width: 60%;"></div>
      </div>
    </section>

    <section class="demo-block">
      <h2>30% complete</h2>
      <div class="ease-heartbeat-bar" role="progressbar" aria-valuenow="30" aria-valuemin="0" aria-valuemax="100" aria-label="Download progress">
        <div class="ease-heartbeat-bar-fill" style="width: 30%;"></div>
      </div>
    </section>

    <section class="demo-block">
      <h2>90% complete</h2>
      <div class="ease-heartbeat-bar" role="progressbar" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100" aria-label="Sync progress">
        <div class="ease-heartbeat-bar-fill" style="width: 90%;"></div>
      </div>
    </section>
  </main>

</body>
</html>
