<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weathervane</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="cloudW cw1"></span>
    <span class="cloudW cw2"></span>
    <span class="gustW gw1"></span>
    <span class="gustW gw2"></span>
    <div class="vaneW">
      <span class="dirW dn"></span>
      <span class="dirW ds"></span>
      <span class="dirW de"></span>
      <span class="dirW dw"></span>
      <span class="letterW ltn"></span>
      <span class="letterW lts"></span>
      <span class="letterW lte"></span>
      <span class="letterW ltw"></span>
      <div class="roosterSpin">
        <span class="tailW"></span>
        <span class="bodyW"></span>
        <span class="breastW"></span>
        <span class="headW"></span>
        <span class="combW"></span>
        <span class="beakW"></span>
        <span class="wattleW"></span>
        <span class="eyeW"></span>
      </div>
      <span class="hubW"></span>
    </div>
    <span class="poleW"></span>
    <span class="roofW"></span>
  </div>
</body>
</html>
