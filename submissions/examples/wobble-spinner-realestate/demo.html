<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wobble Spinner - Real Estate Design Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="estate-viewport">
        <div class="spinner-display-box">
            <div class="wobble-spinner-container">
                <div class="wobble-ring ring-outer" style="--ring-delay: 0s;"></div>
                <div class="wobble-ring ring-mid" style="--ring-delay: -0.4s;"></div>
                <div class="wobble-ring ring-inner" style="--ring-delay: -0.8s;"></div>
                <div class="spinner-core-dot"></div>
            </div>
            
            <div class="loading-metadata">
                <span class="status-indicator">GENERATING PROPERTY ARCHITECTURE</span>
                <p class="status-sub">Compiling spatial layout plots and interior mapping vectors...</p>
            </div>
        </div>
    </div>

</body>
</html>
