<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Subscription Success Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="success-card">

        <div class="checkmark">
            ✓
        </div>

        <h2>Subscription Successful!</h2>

        <p class="message">
            Thank you for subscribing to our newsletter.
            You'll receive updates, articles, and exclusive content.
        </p>

        <div class="stats">

            <div class="stat-box">
                <h3>25K+</h3>
                <p>Subscribers</p>
            </div>

            <div class="stat-box">
                <h3>Weekly</h3>
                <p>Newsletter</p>
            </div>

        </div>

        <div class="benefits">

            <div class="benefit">
                ✓ Product Updates
            </div>

            <div class="benefit">
                ✓ Exclusive Articles
            </div>

            <div class="benefit">
                ✓ Community News
            </div>

        </div>

        <button class="primary-btn">
            Continue Reading
        </button>

        <button class="secondary-btn">
            Manage Preferences
        </button>

    </div>

</div>

</body>
</html>
