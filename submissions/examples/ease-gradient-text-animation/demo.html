<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Gradient Text Animation | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <h2>CSS Gradient Text</h2>
    <p>Smooth, continuous pure CSS text gradient animations using <code>background-clip: text</code> and <code>background-position</code>.</p>
    
    <div class="text-grid">
      <!-- Style 1: Flowing Rainbow -->
      <div class="demo-box">
        <h3 class="ease-text-gradient ease-text-gradient--rainbow">
          Rainbow Flow
        </h3>
      </div>
      
      <!-- Style 2: Sunset Glow -->
      <div class="demo-box">
        <h3 class="ease-text-gradient ease-text-gradient--sunset">
          Sunset Glow
        </h3>
      </div>
      
      <!-- Style 3: Cyberpunk Neon -->
      <div class="demo-box">
        <h3 class="ease-text-gradient ease-text-gradient--cyber">
          Cyberpunk Neon
        </h3>
      </div>
      
      <!-- Style 4: Ocean Breeze -->
      <div class="demo-box">
        <h3 class="ease-text-gradient ease-text-gradient--ocean">
          Ocean Breeze
        </h3>
      </div>
    </div>
  </div>

</body>
</html>
