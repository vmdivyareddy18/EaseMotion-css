<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast Progress Countdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion toast</p>
    <h1 id="demo-title">Toast progress countdown</h1>
    <p class="intro">A toast message with a slim progress bar that counts down before dismissal.</p>

    <aside class="toast" role="status">
      <strong>Changes saved</strong>
      <span>Workspace settings updated.</span>
      <span class="progress" aria-hidden="true"></span>
    </aside>
  </main>
</body>
</html>
