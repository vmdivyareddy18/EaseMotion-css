<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Swing-Hover Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Analytics Dashboard</h1>
            <p>Hover or focus the metrics below to experience hardware-accelerated swing physics.</p>
        </header>

        <section class="dashboard-grid">
            <div class="card">
                <div class="card-header">
                    <h3>Monthly Revenue</h3>
                    
                    <div class="tooltip-container">
                        <button class="tooltip-trigger" aria-describedby="revenue-tip" aria-label="More information about revenue">
                            ?
                        </button>
                        <div id="revenue-tip" class="tooltip-bubble" role="tooltip">
                            <div class="tooltip-arrow"></div>
                            <p>Reflects gross revenue minus processing fees. Updated every 15 minutes.</p>
                        </div>
                    </div>

                </div>
                <p class="metric">$48,259.00</p>
                <span class="trend positive">+12.4% from last month</span>
            </div>
        </section>
    </main>

</body>
</html>
