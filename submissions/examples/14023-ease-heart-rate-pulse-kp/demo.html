<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart Rate Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="pulse-stage">
    <section class="heart-card" aria-label="Heart rate pulse demo">
      <div class="heart-meter" aria-hidden="true">
        <span class="heart-shape"></span>
        <span class="pulse-ring"></span>
        <span class="pulse-ring delay"></span>
      </div>
      <p class="metric-label">Heart rate</p>
      <strong class="metric-value">74 bpm</strong>
      <div class="wave-line" aria-hidden="true"></div>
    </section>
  </main>
</body>
</html>
