<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Interactive Component Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    <header class="app-header">
      <h2>Interactive Component Generator</h2>
      <p>Configure EaseMotion CSS classes visually and extract production-ready code blocks instantly.</p>
    </header>

    <div class="workspace-layout">
      <aside class="control-panel">
        <div class="control-group">
          <label for="comp-type">Base Component Type</label>
          <select id="comp-type">
            <option value="btn">Action Button</option>
            <option value="card">Content Card</option>
          </select>
        </div>

        <div class="control-group">
          <label id="variant-label" for="comp-variant">Variant Style</label>
          <select id="comp-variant">
            </select>
        </div>

        <div class="control-group">
          <label for="comp-size">Component Scale Size</label>
          <select id="comp-size">
            <option value="ease-size-sm">Small (Compact)</option>
            <option value="ease-size-md" selected>Medium (Standard)</option>
            <option value="ease-size-lg">Large (Prominent)</option>
          </select>
        </div>

        <div class="control-group">
          <label for="hover-motion">Hover Micro-Interaction</label>
          <select id="hover-motion">
            <option value="">None</option>
            <option value="ease-hover-lift" selected>Hover Lift Up</option>
            <option value="ease-hover-scale">Hover Scale Expand</option>
            <option value="ease-hover-glow">Hover Radial Glow</option>
          </select>
        </div>

        <div class="control-group">
          <label for="entry-motion">Entrance Animation</label>
          <select id="entry-motion">
            <option value="ease-fade-in" selected>Fade In Smooth</option>
            <option value="ease-slide-up">Slide Up Float</option>
            <option value="ease-zoom-in">Zoom In Pop</option>
          </select>
        </div>

        <div class="control-group">
          <label for="delay-class">Animation Timing Delay</label>
          <select id="delay-class">
            <option value="" selected>Immediate (0ms)</option>
            <option value="ease-delay-100">100ms Delay</option>
            <option value="ease-delay-200">200ms Delay</option>
            <option value="ease-delay-400">400ms Delay</option>
          </select>
        </div>

        <div class="control-group checkbox-row">
          <input type="checkbox" id="state-modifier">
          <label for="state-modifier" id="state-modifier-label">Apply Disabled State</label>
        </div>
      </aside>

      <main class="output-arena">
        <section class="preview-canvas">
          <div class="canvas-label">Live Workspace Canvas</div>
          <div id="canvas-stage" class="stage-center">
            </div>
        </section>

        <section class="code-export-box">
          <div class="export-header">
            <span>Generated HTML Markup</span>
            <button id="copy-btn" class="copy-action-trigger">Copy Code</button>
          </div>
          <div class="code-display-window">
            <pre><code id="code-output">Loading config templates...</code></pre>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const configData = {
      btn: {
        variants: [
          { value: 'ease-btn-primary', name: 'Primary Core Accent' },
          { value: 'ease-btn-secondary', name: 'Secondary Slate Outline' },
          { value: 'ease-btn-danger', name: 'System Danger/Alert' }
        ],
        text: 'Action Trigger',
        stateLabel: 'Apply Loading State'
      },
      card: {
        variants: [
          { value: 'ease-card-flat', name: 'Minimal Flat Border' },
          { value: 'ease-card-shadow', name: 'Elevated Ambient Shadow' },
          { value: 'ease-card-glass', name: 'Translucent Glassmorphism' }
        ],
        text: '<h3>Card Headline</h3><p>Generated snippet tracking real-time composable classes.</p>',
        stateLabel: 'Set Card As Active Highlighted'
      }
    };

    // Access node coordinates
    const typeSelect = document.getElementById('comp-type');
    const variantSelect = document.getElementById('comp-variant');
    const variantLabel = document.getElementById('variant-label');
    const sizeSelect = document.getElementById('comp-size');
    const hoverSelect = document.getElementById('hover-motion');
    const entrySelect = document.getElementById('entry-motion');
    const delaySelect = document.getElementById('delay-class');
    const stateCheck = document.getElementById('state-modifier');
    const stateLabel = document.getElementById('state-modifier-label');
    const canvasStage = document.getElementById('canvas-stage');
    const codeOutput = document.getElementById('code-output');
    const copyBtn = document.getElementById('copy-btn');

    function populateVariants() {
      const activeType = typeSelect.value;
      variantSelect.innerHTML = '';
      configData[activeType].variants.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.value;
        opt.textContent = v.name;
        variantSelect.appendChild(opt);
      });
      stateLabel.textContent = configData[activeType].stateLabel;
    }

    function renderComponentMarkup() {
      const type = typeSelect.value;
      const variant = variantSelect.value;
      const size = sizeSelect.value;
      const hover = hoverSelect.value;
      const entry = entrySelect.value;
      const delay = delaySelect.value;
      const isStateActive = stateCheck.checked;

      // Extract raw styling string classes list
      let classList = [variant, size];
      if (hover) classList.push(hover);
      if (entry) classList.push(entry);
      if (delay) classList.push(delay);

      let htmlMarkup = '';
      if (type === 'btn') {
        const stateAttr = isStateActive ? ' disabled class="' + ['ease-btn-loading', ...classList].join(' ') + '"' : ' class="ease-btn ' + classList.join(' ') + '"';
        htmlMarkup = `<button${stateAttr}>${configData.btn.text}</button>`;
      } else {
        const extraCardClass = isStateActive ? ' ease-card-active' : '';
        htmlMarkup = `<div class="ease-card ${classList.join(' ')}${extraCardClass}">\n  ${configData.card.text}\n</div>`;
      }

      // Sync inner nodes safely to match preview values
      canvasStage.innerHTML = htmlMarkup;
      
      // Escape HTML entities strings to cleanly output readable markup inside code tags
      codeOutput.textContent = htmlMarkup;
    }

    // Dynamic Context Listeners
    typeSelect.addEventListener('change', () => {
      stateCheck.checked = false;
      populateVariants();
      renderComponentMarkup();
    });

    [variantSelect, sizeSelect, hoverSelect, entrySelect, delaySelect, stateCheck].forEach(elem => {
      elem.addEventListener('change', renderComponentMarkup);
    });

    // Copy To Clipboard Execution Flow
    copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(codeOutput.textContent).then(() => {
        const initialText = copyBtn.textContent;
        copyBtn.textContent = 'Copied! ✓';
        copyBtn.style.background = '#10b981';
        setTimeout(() => {
          copyBtn.textContent = initialText;
          copyBtn.style.background = '';
        }, 1800);
      }).catch(err => console.error('Failed code export string capture', err));
    });

    // Initialization entry point trigger
    populateVariants();
    renderComponentMarkup();
  </script>
</body>
</html>
