<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Seat Selector Map Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="map-container">
        <header class="map-header">
            <h2>Select Your Seats</h2>
            <div class="legend">
                <div class="legend-item"><div class="seat seat-demo"></div> Available</div>
                <div class="legend-item"><div class="seat seat-demo occupied"></div> Occupied</div>
                <div class="legend-item"><div class="seat seat-demo selected"></div> Selected</div>
            </div>
        </header>

        <!-- Screen / Stage Indicator -->
        <div class="screen-indicator">SCREEN / STAGE</div>

        <!-- Interactive Grid Layout -->
        <div class="seat-grid">
            <!-- Row A -->
            <div class="seat occupied"></div>
            <div class="seat occupied"></div>
            <div class="seat-space"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat-space"></div>
            <div class="seat"></div>
            <div class="seat"></div>

            <!-- Row B -->
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat-space"></div>
            <div class="seat"></div>
            <div class="seat selected"></div>
            <div class="seat selected"></div>
            <div class="seat"></div>
            <div class="seat-space"></div>
            <div class="seat occupied"></div>
            <div class="seat"></div>

            <!-- Row C -->
            <div class="seat"></div>
            <div class="seat occupied"></div>
            <div class="seat-space"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat"></div>
            <div class="seat-space"></div>
            <div class="seat"></div>
            <div class="seat"></div>
        </div>
    </div>

    <!-- Script to toggle selection on click for the demo interactive experience -->
    <script>
        document.querySelectorAll('.seat:not(.occupied)').forEach(seat => {
            seat.addEventListener('click', () => {
                seat.classList.toggle('selected');
            });
        });
    </script>
</body>
</html>
