<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clinical Telemetry Systems</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="medical-layout">
    <div class="monitor-card-panel">
      
      <div class="panel-meta-info">
        <h4>ECG SCANNER SYNC</h4>
        <span class="signal-tag-node">CHANNEL A</span>
      </div>

      <!-- Pure CSS animation trigger utilizing a persistent status container -->
      <div class="telemetry-loading-stage">
        <div class="pulse-indicator-circle"></div>
        
        <div class="flash-loader-container">
          <div class="pulse-beam-line"></div>
        </div>

        <p class="diagnostic-log-text">Syncing clinical telemetry streams...</p>
      </div>

    </div>
  </main>

</body>
</html>
