<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navbar Logo Visibility Fix Demo</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 2rem;
      font-family: Arial, sans-serif;
      background: #0f0e17;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
    }

    .demo-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 2rem;
    }

    .demo-card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
      background: #15141f;
    }

    .demo-title {
      padding: 1rem;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .navbar {
      display: flex;
      align-items: center;
      padding: 1rem 2rem;
      background: #1b1a27;
      min-height: 80px;
    }

    /* BEFORE */
    .logo-before {
      height: 36px;
      width: auto;
      display: block;
    }

    /* AFTER */
    .logo-after {
      height: 100px;
      width: auto;
      display: block;
    }

    .description {
      padding: 1rem;
      color: #b3b3b3;
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <h1>Navbar Logo Visibility Fix</h1>

  <div class="demo-container">

    <div class="demo-card">
      <div class="demo-title">Before</div>

      <nav class="navbar">
        <img
          src="../../../docs/assets/logo.svg"
          alt="EaseMotion CSS"
          class="logo-before"
        />
      </nav>

      <div class="description">
        Original logo size (36px height). The logo appears relatively small
        compared to the navbar area.
      </div>
    </div>

    <div class="demo-card">
      <div class="demo-title">After</div>

      <nav class="navbar">
        <img
          src="../../../docs/assets/logo.svg"
          alt="EaseMotion CSS"
          class="logo-after"
        />
      </nav>

      <div class="description">
        Increased logo size (100px height) improves visibility and brand
        recognition while maintaining responsiveness.
      </div>
    </div>

  </div>

</body>
</html>
