<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Size Selector Lift</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="size-title">
        <p class="eyebrow">Product control</p>
        <h1 id="size-title">Size selector lift</h1>
        <p class="demo-copy">
          Hover or focus a size chip to preview the animated selected state.
        </p>
        <div class="size-selector" aria-label="Choose size">
          <button class="size-chip" type="button">S</button>
          <button class="size-chip" type="button">M</button>
          <button class="size-chip" type="button">L</button>
          <button class="size-chip" type="button">XL</button>
        </div>
      </section>
    </main>
  </body>
</html>
