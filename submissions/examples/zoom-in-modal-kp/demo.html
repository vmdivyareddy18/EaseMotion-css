<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoom In Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn" tabindex="0">Open Modal</label>

<div class="modal-overlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <label for="modal-toggle" class="close-btn" tabindex="0">&times;</label>
    <h2 id="modal-title">Creative Portfolio Modal</h2>
    <p>Pure CSS animated zoom-in modal with responsive design.</p>
  </div>
</div>

</body>
</html>
