<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Draw Badge</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #18181b; font-family: system-ui, sans-serif;">
  
  <div class="skills-container ease-fade-in-up">
    <h2>Tech Stack</h2>
    
    <div class="badges-wrapper">
      <div class="draw-badge ease-hover-pop">
        <svg class="border-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
          <rect class="border-rect" x="2" y="2" width="96" height="36" rx="6" />
        </svg>
        <span class="badge-content">Frontend Dev</span>
      </div>
      
      <div class="draw-badge ease-hover-pop">
        <svg class="border-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
          <rect class="border-rect" x="2" y="2" width="96" height="36" rx="6" />
        </svg>
        <span class="badge-content">UI / UX</span>
      </div>
      
      <div class="draw-badge ease-hover-pop">
        <svg class="border-svg" viewBox="0 0 100 40" preserveAspectRatio="none">
          <rect class="border-rect" x="2" y="2" width="96" height="36" rx="6" />
        </svg>
        <span class="badge-content">Animations</span>
      </div>
    </div>
  </div>

</body>
</html>
