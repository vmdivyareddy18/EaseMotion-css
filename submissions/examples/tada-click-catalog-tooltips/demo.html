<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - Product Catalog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="catalog-container">
    <header class="catalog-header">
      <h1>Premium Footwear</h1>
      <p>Hover over the features to learn more, then click to trigger the responsive CSS Tada animation.</p>
    </header>

    <div class="product-grid">
      <article class="product-card">
        <div class="product-image-box">👟 AeroStride X</div>
        <div class="product-details">
          <div class="product-row">
            <span class="catalog-badge tooltip-container" tabindex="0" aria-describedby="tip-sole">
              FoamSole™ Tech
              <span id="tip-sole" class="tooltip" role="tooltip">
                🎉 Engineered with 100% recycled structural foam bounce!
              </span>
            </span>
            <span class="product-price">$140</span>
          </div>
        </div>
      </article>

      <article class="product-card">
        <div class="product-image-box">🥾 TrailMax Pro</div>
        <div class="product-details">
          <div class="product-row">
            <span class="catalog-badge tooltip-container" tabindex="0" aria-describedby="tip-waterproof">
              HydroShield™
              <span id="tip-waterproof" class="tooltip" role="tooltip">
                🌧️ Zero-permeability nano membrane protection.
              </span>
            </span>
            <span class="product-price">$185</span>
          </div>
        </div>
      </article>
    </div>
  </main>

</body>
</html>
