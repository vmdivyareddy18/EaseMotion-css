<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-focus-out - Exit Effect</title>
  <meta name="description" content="A demonstration of the ease-focus-out utility animation showing an element exiting by blurring and fading out.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-focus-out</h1>
      <p class="subtitle" id="main-desc">Soft blur transition to filter: blur(20px) and opacity(0)</p>
    </header>

    <div class="display-area">
      <!-- Target that blurs out -->
      <div class="blur-target" id="target-element" aria-label="Animated focus target">
        <span>👁</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Focus-Out</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-focus-out');
      void target.offsetWidth;
      target.classList.add('ease-focus-out');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-focus-out');
    }
  </script>

</body>
</html>
