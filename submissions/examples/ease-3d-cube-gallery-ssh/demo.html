<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Cube Gallery — Pure CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="page-header">
    <h1>Interactive 3D Cube Gallery</h1>
    <p>Click a face button below to rotate the cube. 100% pure HTML + CSS — no JavaScript.</p>
  </header>

  <main class="stage-wrapper">
    <div class="cube-gallery">
      <!-- Hidden radio buttons manage the "state" of the cube -->
      <input type="radio" name="cube-face" id="face-front" checked />
      <input type="radio" name="cube-face" id="face-back" />
      <input type="radio" name="cube-face" id="face-right" />
      <input type="radio" name="cube-face" id="face-left" />
      <input type="radio" name="cube-face" id="face-top" />
      <input type="radio" name="cube-face" id="face-bottom" />

      <div class="cube-scene">
        <div class="cube">
          <div class="cube-face cube-face--front">
            <span class="face-number">1</span>
            <span class="face-label">Front</span>
          </div>
          <div class="cube-face cube-face--back">
            <span class="face-number">2</span>
            <span class="face-label">Back</span>
          </div>
          <div class="cube-face cube-face--right">
            <span class="face-number">3</span>
            <span class="face-label">Right</span>
          </div>
          <div class="cube-face cube-face--left">
            <span class="face-number">4</span>
            <span class="face-label">Left</span>
          </div>
          <div class="cube-face cube-face--top">
            <span class="face-number">5</span>
            <span class="face-label">Top</span>
          </div>
          <div class="cube-face cube-face--bottom">
            <span class="face-number">6</span>
            <span class="face-label">Bottom</span>
          </div>
        </div>
      </div>

      <nav class="cube-nav" aria-label="Cube face navigation">
        <label for="face-front" class="cube-nav__btn">Front</label>
        <label for="face-back" class="cube-nav__btn">Back</label>
        <label for="face-right" class="cube-nav__btn">Right</label>
        <label for="face-left" class="cube-nav__btn">Left</label>
        <label for="face-top" class="cube-nav__btn">Top</label>
        <label for="face-bottom" class="cube-nav__btn">Bottom</label>
      </nav>
    </div>
  </main>

  <footer class="page-footer">
    <p>Built with pure CSS state management using the radio-button + sibling-selector pattern.</p>
  </footer>
</body>
</html>
