<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Trophy Victory Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Trophy Victory Bounce</h1>

    <p>
      A celebratory trophy animation for achievements, milestones,
      rankings, rewards, and successful task completion.
    </p>

    <div class="demo-grid">

      <button class="trophy-button">
        <span class="trophy-icon">🏆</span>
      </button>

      <button class="trophy-button card-style">
        <span class="trophy-icon">🏆</span>
        <span>Achievement Unlocked</span>
      </button>

      <div class="achievement-card">
        <h3>Top Performer</h3>

        <p>
          Congratulations! You reached the top of the leaderboard.
        </p>

        <button class="trophy-button small">
          <span class="trophy-icon">🏆</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
