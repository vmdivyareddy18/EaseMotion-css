<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade Scroll Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="gallery-title">Gallery</h2>
    <div class="gallery">
      <div class="gallery-item" style="--i: 1">
        <div class="gallery-img" style="background: linear-gradient(135deg, #e94560, #c23152)">🌅</div>
        <div class="gallery-caption">Sunset Vista</div>
      </div>
      <div class="gallery-item" style="--i: 2">
        <div class="gallery-img" style="background: linear-gradient(135deg, #533483, #3d2366)">🏔️</div>
        <div class="gallery-caption">Mountain Peak</div>
      </div>
      <div class="gallery-item" style="--i: 3">
        <div class="gallery-img" style="background: linear-gradient(135deg, #0f3460, #0a2540)">🌊</div>
        <div class="gallery-caption">Ocean Waves</div>
      </div>
      <div class="gallery-item" style="--i: 4">
        <div class="gallery-img" style="background: linear-gradient(135deg, #1a1a2e, #302b63)">🌲</div>
        <div class="gallery-caption">Forest Trail</div>
      </div>
      <div class="gallery-item" style="--i: 5">
        <div class="gallery-img" style="background: linear-gradient(135deg, #e94560, #533483)">🌃</div>
        <div class="gallery-caption">City Nights</div>
      </div>
      <div class="gallery-item" style="--i: 6">
        <div class="gallery-img" style="background: linear-gradient(135deg, #0f3460, #e94560)">🏜️</div>
        <div class="gallery-caption">Desert Dunes</div>
      </div>
    </div>
  </div>
</body>
</html>
