<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Swipe Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Swipe Card Dismiss 👉</h1>

  <div class="card" id="card">
    <h2>Swipe Me</h2>
    <p>Drag left or right to dismiss this card.</p>
  </div>

</section>

<script>
const card = document.getElementById("card");

let startX = 0;
let currentX = 0;
let dragging = false;

card.addEventListener("mousedown", (e) => {
  dragging = true;
  startX = e.clientX;
});

document.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  currentX = e.clientX - startX;

  card.style.transform = `
    translateX(${currentX}px)
    rotate(${currentX * 0.1}deg)
  `;

  card.style.opacity = 1 - Math.abs(currentX) / 300;
});

document.addEventListener("mouseup", () => {
  if (!dragging) return;

  dragging = false;

  if (Math.abs(currentX) > 150) {
    card.style.transform = `translateX(${currentX > 0 ? 500 : -500}px) rotate(20deg)`;
    card.style.opacity = 0;
  } else {
    card.style.transform = "translateX(0) rotate(0)";
    card.style.opacity = 1;
  }

  currentX = 0;
});
</script>

</body>
</html>
