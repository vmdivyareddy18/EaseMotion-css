<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Drop Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Gravity Exit</div>
        <button onclick="document.querySelector('.box').classList.add('ease-drop-out');">Drop Out</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-drop-out');" style="border-color:#555;">Reset</button>
    </div>
</body>
</html>
