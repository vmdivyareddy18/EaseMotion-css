<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gumball Machine</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="machine" tabindex="0">
    <div class="globe">
      <span class="gum g1"></span>
      <span class="gum g2"></span>
      <span class="gum g3"></span>
      <span class="gum g4"></span>
      <span class="gum g5"></span>
      <span class="gum g6"></span>
      <span class="gum g7"></span>
      <span class="gum g8"></span>
      <span class="gum g9"></span>
      <span class="gum g10"></span>
      <span class="gum g11"></span>
      <span class="gum g12"></span>
      <span class="gum g13"></span>
      <span class="gum g14"></span>
      <span class="gum g15"></span>
      <span class="gum g16"></span>
      <span class="gum g17"></span>
      <span class="gum g18"></span>
      <span class="gum g19"></span>
      <span class="gum g20"></span>
      <span class="glass"></span>
    </div>
    <div class="neck">
      <span class="knob"></span>
    </div>
    <div class="base">
      <span class="slot"></span>
      <span class="ball"></span>
    </div>
    <p class="hint">hover to dispense</p>
  </div>
</body>
</html>
