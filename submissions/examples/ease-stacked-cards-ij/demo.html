<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacked Cards | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sc-container">
    <h1>Stacked Cards</h1>
    <p class="sc-subtitle">Click or hover a card to fan the stack</p>
    <div class="sc-stack" id="stack">
      <div class="sc-card" data-index="1"><span>1</span><p>Explore</p></div>
      <div class="sc-card" data-index="2"><span>2</span><p>Design</p></div>
      <div class="sc-card" data-index="3"><span>3</span><p>Build</p></div>
      <div class="sc-card" data-index="4"><span>4</span><p>Test</p></div>
      <div class="sc-card" data-index="5"><span>5</span><p>Deploy</p></div>
    </div>
    <div class="sc-controls">
      <button id="dealBtn" class="sc-btn">Deal</button>
      <span class="sc-count" id="cardCount">5 cards</span>
    </div>
  </div>
  <script>
    const stack = document.getElementById('stack');
    const countEl = document.getElementById('cardCount');
    const dealBtn = document.getElementById('dealBtn');
    let fanned = false;

    stack.addEventListener('click', (e) => {
      const card = e.target.closest('.sc-card');
      if (!card) return;
      if (fanned) {
        card.style.zIndex = parseInt(card.style.zIndex || 0) + 1;
        card.style.transform = 'translateY(-20px) scale(1.05)';
        setTimeout(() => {
          card.style.transform = '';
        }, 400);
      } else {
        stack.classList.toggle('sc-fanned');
        fanned = true;
      }
    });

    stack.addEventListener('mouseleave', () => {
      if (fanned) {
        stack.classList.remove('sc-fanned');
        fanned = false;
      }
    });

    dealBtn.addEventListener('click', () => {
      stack.classList.remove('sc-fanned');
      fanned = false;
      const cards = [...stack.querySelectorAll('.sc-card')];
      cards.forEach((c, i) => {
        c.style.transition = 'none';
        c.style.transform = 'translateY(60px) rotateZ(15deg) scale(0.6)';
        c.style.opacity = '0';
      });
      cards.forEach((c, i) => {
        setTimeout(() => {
          c.style.transition = '';
          c.style.transform = '';
          c.style.opacity = '';
        }, i * 80 + 50);
      });
    });
  </script>
</body>
</html>
