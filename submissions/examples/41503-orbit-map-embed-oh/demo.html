<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-orbit-map-embed</title>
  <meta name="description" content="Map embed with orbital animation effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-orbit-map-embed</h1>
      <p class="subtitle" id="main-desc">Map embed with orbital animation</p>
    </header>

    <div class="display-area">
      
      <div class="map-showcase">
        
        <!-- Default -->
        <div class="map-item">
          <div class="ease-orbit-map">
            <div class="map-container">
              <div class="map-placeholder">
                <svg viewBox="0 0 100 100" class="map-icon">
                  <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                  <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                  <circle cx="50" cy="50" r="10" fill="currentColor" opacity="0.5"/>
                  <path d="M50 10 L50 90 M10 50 L90 50" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
                </svg>
                <span class="map-text">Interactive Map</span>
              </div>
              <div class="orbit-ring orbit-ring-1"></div>
              <div class="orbit-ring orbit-ring-2"></div>
              <div class="orbit-ring orbit-ring-3"></div>
              <div class="orbit-dot orbit-dot-1"></div>
              <div class="orbit-dot orbit-dot-2"></div>
              <div class="orbit-dot orbit-dot-3"></div>
            </div>
          </div>
          <span class="map-label">Default</span>
        </div>

        <!-- Primary -->
        <div class="map-item">
          <div class="ease-orbit-map ease-orbit-primary">
            <div class="map-container">
              <div class="map-placeholder">
                <svg viewBox="0 0 100 100" class="map-icon">
                  <circle cx="50" cy="50" r="40" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3"/>
                  <circle cx="50" cy="50" r="25" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                  <circle cx="50" cy="50" r="10" fill="currentColor" opacity="0.5"/>
                  <path d="M50 10 L50 90 M10 50 L90 50" stroke="currentColor" stroke-width="0.5" opacity="0.2"/>
                </svg>
                <span class="map-text">Primary Theme</span>
              </div>
              <div class="orbit-ring orbit-ring-1"></div>
              <div class="orbit-ring orbit-ring-2"></div>
              <div class="orbit-ring orbit-ring-3"></div>
              <div class="orbit-dot orbit-dot-1"></div>
              <div class="orbit-dot orbit-dot-2"></div>
            </div>
          </div>
          <span class="map-label">Primary</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Location Finder Example</h3>
      <div class="location-finder">
        <div class="ease-orbit-map ease-orbit-lg ease-orbit-success">
          <div class="map-container">
            <div class="map-placeholder">
              <svg viewBox="0 0 100 100" class="map-icon">
                <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
                <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="1" opacity="0.15"/>
                <circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1"/>
                <path d="M50 5 L50 95 M5 50 L95 50" stroke="currentColor" stroke-width="0.5" opacity="0.1"/>
                <circle cx="50" cy="50" r="5" fill="currentColor"/>
              </svg>
              <span class="map-text">Find Us</span>
            </div>
            <div class="orbit-ring orbit-ring-1"></div>
            <div class="orbit-ring orbit-ring-2"></div>
            <div class="orbit-ring orbit-ring-3"></div>
            <div class="orbit-dot orbit-dot-1"></div>
            <div class="orbit-dot orbit-dot-2"></div>
            <div class="orbit-dot orbit-dot-3"></div>
          </div>
        </div>
        <div class="location-info">
          <h4>Headquarters</h4>
          <p>123 Innovation Drive, Tech Valley</p>
          <p>San Francisco, CA 94105</p>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
