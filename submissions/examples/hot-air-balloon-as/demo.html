<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Air Balloon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky">
    <span class="cloud c1"></span>
    <span class="cloud c2"></span>
    <span class="sun"></span>

    <div class="balloon">
      <div class="envelope">
        <span class="gore g1"></span>
        <span class="gore g2"></span>
        <span class="gore g3"></span>
        <span class="gore g4"></span>
        <span class="gore g5"></span>
      </div>
      <span class="mouth"></span>
      <span class="rope left"></span>
      <span class="rope right"></span>
      <span class="basket"></span>
    </div>
  </div>
</body>
</html>
