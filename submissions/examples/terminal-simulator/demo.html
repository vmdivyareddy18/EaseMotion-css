<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminal Simulator — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #0f172a; padding: 4rem 1rem; margin: 0;">

  <div class="ease-terminal-window">
    <div class="ease-terminal-header">
      <div class="ease-terminal-buttons">
        <div class="ease-terminal-dot close"></div>
        <div class="ease-terminal-dot minimize"></div>
        <div class="ease-terminal-dot maximize"></div>
      </div>
      <span class="ease-terminal-title">bash — easemotion-shell</span>
    </div>

    <div class="ease-terminal-body" id="terminalBody">
      <p class="ease-terminal-log">Welcome to EaseMotion Core Shell v1.0.4 (macosh-x86)</p>
      <p class="ease-terminal-log" style="color: #74715e;">Type 'help' or 'features' to echo standard platform responses.</p>
    </div>

    <div class="ease-terminal-body" style="height: auto; padding-top: 0; background: transparent;">
      <div class="ease-terminal-prompt-line">
        <span class="ease-terminal-prompt-indicator">easemotion-user:~ $</span>
        <div class="ease-terminal-input-wrapper">
          <input type="text" class="ease-terminal-input" id="cliInput" autofocus autocomplete="off" spellcheck="false" />
          <span class="ease-terminal-display-text" id="cliDisplay"></span>
          <div class="ease-terminal-cursor"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const cliInput = document.getElementById('cliInput');
    const cliDisplay = document.getElementById('cliDisplay');
    const terminalBody = document.getElementById('terminalBody');

    // Handle visible mirroring of hidden input values
    cliInput.addEventListener('input', () => {
      cliDisplay.textContent = cliInput.value;
    });

    // Enter Command Parser Logic Sequence
    cliInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const cmd = cliInput.value.trim();
        if (!cmd) return;

        // Echo command to prompt stream
        appendLog(`easemotion-user:~ $ ${cmd}`, 'command-echo');
        
        // Execute mocked system route configurations
        setTimeout(() => {
          processCommand(cmd.toLowerCase());
        }, 100);

        cliInput.value = '';
        cliDisplay.textContent = '';
      }
    });

    function appendLog(text, className) {
      const p = document.createElement('p');
      p.className = `ease-terminal-log ${className || ''}`;
      p.textContent = text;
      terminalBody.appendChild(p);
      terminalBody.scrollTop = terminalBody.scrollHeight;
    }

    function processCommand(cmd) {
      if (cmd === 'help') {
        appendLog('Available environment flags: [help, features, clear, author]', 'system-response');
      } else if (cmd === 'features') {
        appendLog('>> Found 4 system micro-interaction animation models compiled inside submissions/examples/.', 'system-response');
      } else if (cmd === 'clear') {
        terminalBody.innerHTML = '';
      } else if (cmd === 'author') {
        appendLog('System Committer: Kaparthy Reddy <kaparthyreddy@Kaparthys-MacBook-Air.local>', 'system-response');
      } else {
        appendLog(`bash: command not found: ${cmd}`, 'ease-terminal-log');
      }
    }
  </script>
</body>
</html>
