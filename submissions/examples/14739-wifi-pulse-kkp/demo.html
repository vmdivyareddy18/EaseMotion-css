<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wifi Signal Pulse</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="wifi-title">
        <div class="wifi-pulse" role="img" aria-label="Pulsing wifi signal">
          <span class="wifi-arc arc-small"></span>
          <span class="wifi-arc arc-medium"></span>
          <span class="wifi-arc arc-large"></span>
          <span class="wifi-dot"></span>
        </div>
        <p class="eyebrow">Connectivity cue</p>
        <h1 id="wifi-title">Wifi signal pulse</h1>
        <p class="demo-copy">
          Three signal arcs brighten in sequence to suggest scanning, connection
          strength, or live broadcast.
        </p>
      </section>
    </main>
  </body>
</html>
