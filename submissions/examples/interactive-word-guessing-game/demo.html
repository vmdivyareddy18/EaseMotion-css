<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Word Guessing Game - EaseMotion CSS</title>
  <!-- Link EaseMotion core animations -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link local style sheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="game-wrapper">
    <!-- Header -->
    <header class="game-header">
      <div class="brand">
        <span class="logo-badge">MOTION GUESS</span>
        <h1>WORDLE MATCH</h1>
      </div>
      <div class="streak-counter">
        <span class="label">Streak</span>
        <span id="streak-val" class="value">0</span>
      </div>
    </header>

    <!-- 6x5 Letter Grid Board -->
    <main class="grid-container">
      <div class="grid" id="letter-grid">
        <!-- Row 1 -->
        <div class="grid-row" data-row="0">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
        <!-- Row 2 -->
        <div class="grid-row" data-row="1">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
        <!-- Row 3 -->
        <div class="grid-row" data-row="2">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
        <!-- Row 4 -->
        <div class="grid-row" data-row="3">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
        <!-- Row 5 -->
        <div class="grid-row" data-row="4">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
        <!-- Row 6 -->
        <div class="grid-row" data-row="5">
          <div class="tile" data-col="0" style="--col-index: 0;"></div>
          <div class="tile" data-col="1" style="--col-index: 1;"></div>
          <div class="tile" data-col="2" style="--col-index: 2;"></div>
          <div class="tile" data-col="3" style="--col-index: 3;"></div>
          <div class="tile" data-col="4" style="--col-index: 4;"></div>
        </div>
      </div>
    </main>

    <!-- On-screen Keyboard -->
    <section class="keyboard-container" id="keyboard">
      <!-- Row 1 -->
      <div class="keyboard-row">
        <button class="key-btn" data-key="q">Q</button>
        <button class="key-btn" data-key="w">W</button>
        <button class="key-btn" data-key="e">E</button>
        <button class="key-btn" data-key="r">R</button>
        <button class="key-btn" data-key="t">T</button>
        <button class="key-btn" data-key="y">Y</button>
        <button class="key-btn" data-key="u">U</button>
        <button class="key-btn" data-key="i">I</button>
        <button class="key-btn" data-key="o">O</button>
        <button class="key-btn" data-key="p">P</button>
      </div>
      <!-- Row 2 -->
      <div class="keyboard-row">
        <button class="key-btn" data-key="a">A</button>
        <button class="key-btn" data-key="s">S</button>
        <button class="key-btn" data-key="d">D</button>
        <button class="key-btn" data-key="f">F</button>
        <button class="key-btn" data-key="g">G</button>
        <button class="key-btn" data-key="h">H</button>
        <button class="key-btn" data-key="j">J</button>
        <button class="key-btn" data-key="k">K</button>
        <button class="key-btn" data-key="l">L</button>
      </div>
      <!-- Row 3 -->
      <div class="keyboard-row">
        <button class="key-btn wide" data-key="enter">ENTER</button>
        <button class="key-btn" data-key="z">Z</button>
        <button class="key-btn" data-key="x">X</button>
        <button class="key-btn" data-key="c">C</button>
        <button class="key-btn" data-key="v">V</button>
        <button class="key-btn" data-key="b">B</button>
        <button class="key-btn" data-key="n">N</button>
        <button class="key-btn" data-key="m">M</button>
        <button class="key-btn wide" data-key="backspace">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="backspace-icon"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path><line x1="18" y1="9" x2="12" y2="15"></line><line x1="12" y1="9" x2="18" y2="15"></line></svg>
        </button>
      </div>
    </section>

    <!-- Message Alert Toast -->
    <div class="alert-toast" id="alert-toast">Not enough letters</div>
  </div>

  <!-- End Game Statistics Modal -->
  <div class="modal-overlay" id="stats-modal">
    <div class="modal-card">
      <div class="modal-glow"></div>
      <h2 id="modal-title">VICTORY!</h2>
      <p id="modal-msg">You guessed the word correctly!</p>
      
      <div class="modal-stats">
        <div class="stat-box">
          <span id="stat-played" class="stat-val">0</span>
          <span class="stat-lbl">Played</span>
        </div>
        <div class="stat-box">
          <span id="stat-win-pct" class="stat-val">0%</span>
          <span class="stat-lbl">Win %</span>
        </div>
        <div class="stat-box">
          <span id="stat-streak" class="stat-val">0</span>
          <span class="stat-lbl">Streak</span>
        </div>
      </div>

      <div class="reveal-section" id="reveal-section">
        <span>Secret Word:</span>
        <strong id="revealed-word">GLIDE</strong>
      </div>

      <button class="restart-btn" id="btn-restart">Play Again</button>
    </div>
  </div>

  <!-- Game Logic Script -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 5-letter motion-themed word list
      const wordList = [
        'glide', 'orbit', 'pulse', 'swing', 'scale', 'hover', 'drift', 'slide', 
        'twist', 'curve', 'bounce', 'blend', 'shake', 'sweep', 'shake', 'shift',
        'speed', 'depth', 'focus', 'light', 'flash', 'match', 'sound', 'wires'
      ];

      // selectors
      const grid = document.getElementById('letter-grid');
      const keyboard = document.getElementById('keyboard');
      const alertToast = document.getElementById('alert-toast');
      const statsModal = document.getElementById('stats-modal');
      const modalTitle = document.getElementById('modal-title');
      const modalMsg = document.getElementById('modal-msg');
      const revealedWord = document.getElementById('revealed-word');
      const revealSection = document.getElementById('reveal-section');
      const btnRestart = document.getElementById('btn-restart');
      
      const statPlayed = document.getElementById('stat-played');
      const statWinPct = document.getElementById('stat-win-pct');
      const statStreak = document.getElementById('stat-streak');
      const streakVal = document.getElementById('streak-val');

      // State variables
      let secretWord = '';
      let currentRow = 0;
      let currentCol = 0;
      let boardState = Array(6).fill().map(() => Array(5).fill(''));
      let isGameOver = false;

      // Local storage game statistics
      let stats = JSON.parse(localStorage.getItem('wordle_stats')) || {
        played: 0,
        wins: 0,
        streak: 0
      };

      // Web Audio API lazy loader
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      // Play synthesized sounds
      function playSound(type) {
        initAudio();
        if (!audioCtx) return;
        const now = audioCtx.currentTime;

        switch (type) {
          case 'tick':
            // Key press tick
            const tickOsc = audioCtx.createOscillator();
            const tickGain = audioCtx.createGain();
            tickOsc.connect(tickGain);
            tickGain.connect(audioCtx.destination);
            tickOsc.frequency.setValueAtTime(900, now);
            tickGain.gain.setValueAtTime(0.1, now);
            tickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
            tickOsc.start(now);
            tickOsc.stop(now + 0.03);
            break;

          case 'buzz':
            // Invalid row buzz (pitch downward sweep)
            const buzzOsc = audioCtx.createOscillator();
            const buzzGain = audioCtx.createGain();
            buzzOsc.type = 'sawtooth';
            buzzOsc.connect(buzzGain);
            buzzGain.connect(audioCtx.destination);
            buzzOsc.frequency.setValueAtTime(140, now);
            buzzOsc.frequency.linearRampToValueAtTime(60, now + 0.15);
            buzzGain.gain.setValueAtTime(0.2, now);
            buzzGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
            buzzOsc.start(now);
            buzzOsc.stop(now + 0.15);
            break;

          case 'flip':
            // Card flip click sound
            const flipOsc = audioCtx.createOscillator();
            const flipGain = audioCtx.createGain();
            flipOsc.connect(flipGain);
            flipGain.connect(audioCtx.destination);
            flipOsc.frequency.setValueAtTime(450, now);
            flipGain.gain.setValueAtTime(0.15, now);
            flipGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
            flipOsc.start(now);
            flipOsc.stop(now + 0.08);
            break;

          case 'win':
            // Success chord cascade (G4 -> C5 -> E5 -> G5)
            const chordFreqs = [392.00, 523.25, 659.25, 783.99];
            chordFreqs.forEach((freq, idx) => {
              const chordOsc = audioCtx.createOscillator();
              const chordGain = audioCtx.createGain();
              chordOsc.connect(chordGain);
              chordGain.connect(audioCtx.destination);
              chordOsc.frequency.setValueAtTime(freq, now + idx * 0.12);
              chordGain.gain.setValueAtTime(0.15, now + idx * 0.12);
              chordGain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.12 + 0.6);
              chordOsc.start(now + idx * 0.12);
              chordOsc.stop(now + idx * 0.12 + 0.6);
            });
            break;

          case 'lose':
            // Defeat minor sweep
            const loseFreqs = [311.13, 293.66, 261.63, 196.00];
            loseFreqs.forEach((freq, idx) => {
              const loseOsc = audioCtx.createOscillator();
              const loseGain = audioCtx.createGain();
              loseOsc.connect(loseGain);
              loseGain.connect(audioCtx.destination);
              loseOsc.frequency.setValueAtTime(freq, now + idx * 0.15);
              loseGain.gain.setValueAtTime(0.15, now + idx * 0.15);
              loseGain.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.15 + 0.7);
              loseOsc.start(now + idx * 0.15);
              loseOsc.stop(now + idx * 0.15 + 0.7);
            });
            break;
        }
      }

      // Initialize game
      function initGame() {
        secretWord = wordList[Math.floor(Math.random() * wordList.length)];
        currentRow = 0;
        currentCol = 0;
        boardState = Array(6).fill().map(() => Array(5).fill(''));
        isGameOver = false;

        // Clear tiles
        const tiles = document.querySelectorAll('.tile');
        tiles.forEach(tile => {
          tile.textContent = '';
          tile.className = 'tile';
        });

        // Reset key status colors
        const keys = document.querySelectorAll('.key-btn');
        keys.forEach(key => {
          key.classList.remove('correct', 'present', 'absent');
        });

        // Sync streak metrics
        streakVal.textContent = stats.streak;
      }

      // Show alert toast banner
      function showAlert(msg) {
        alertToast.textContent = msg;
        alertToast.classList.add('active');
        setTimeout(() => {
          alertToast.classList.remove('active');
        }, 1800);
      }

      // Make a letter entry
      function addLetter(letter) {
        if (currentCol >= 5 || isGameOver) return;
        
        boardState[currentRow][currentCol] = letter;
        const rowEl = document.querySelector(`[data-row="${currentRow}"]`);
        const tileEl = rowEl.querySelector(`[data-col="${currentCol}"]`);
        
        tileEl.textContent = letter.toUpperCase();
        tileEl.classList.add('pop-in');
        currentCol++;
        playSound('tick');
      }

      // Backspace delete letter
      function deleteLetter() {
        if (currentCol <= 0 || isGameOver) return;
        currentCol--;
        boardState[currentRow][currentCol] = '';
        const rowEl = document.querySelector(`[data-row="${currentRow}"]`);
        const tileEl = rowEl.querySelector(`[data-col="${currentCol}"]`);
        
        tileEl.textContent = '';
        tileEl.classList.remove('pop-in');
        playSound('tick');
      }

      // Submit guess
      function submitGuess() {
        if (isGameOver) return;

        const guess = boardState[currentRow].join('');

        // 1. Incomplete guess validation
        if (guess.length < 5) {
          showAlert('Not enough letters');
          triggerRowShake();
          playSound('buzz');
          return;
        }

        // 2. Validate guess word and apply 3D flip card colors
        isGameOver = true; // temporarily block keys during flip animations
        
        const rowEl = document.querySelector(`[data-row="${currentRow}"]`);
        const tiles = rowEl.querySelectorAll('.tile');

        const secretArr = secretWord.split('');
        const guessArr = guess.split('');
        const results = Array(5).fill('absent');

        // First pass: mark correct positions
        for (let i = 0; i < 5; i++) {
          if (guessArr[i] === secretArr[i]) {
            results[i] = 'correct';
            secretArr[i] = null;
            guessArr[i] = null;
          }
        }

        // Second pass: mark present letters
        for (let i = 0; i < 5; i++) {
          if (guessArr[i] === null) continue;
          const idx = secretArr.indexOf(guessArr[i]);
          if (idx !== -1) {
            results[i] = 'present';
            secretArr[idx] = null;
          }
        }

        // Apply flip class triggers with staggered intervals
        tiles.forEach((tile, index) => {
          setTimeout(() => {
            tile.classList.add('flip-card', results[index]);
            playSound('flip');
          }, index * 150);
        });

        // Trigger Keyboard locks and end game status evaluations after flips conclude
        setTimeout(() => {
          // Color virtual keyboard keys
          for (let i = 0; i < 5; i++) {
            const letter = boardState[currentRow][i];
            const keyEl = document.querySelector(`[data-key="${letter}"]`);
            if (keyEl) {
              if (results[i] === 'correct') {
                keyEl.className = 'key-btn correct';
              } else if (results[i] === 'present' && !keyEl.classList.contains('correct')) {
                keyEl.className = 'key-btn present';
              } else if (results[i] === 'absent' && !keyEl.classList.contains('correct') && !keyEl.classList.contains('present')) {
                keyEl.className = 'key-btn absent';
              }
            }
          }

          // Evaluate win/lose
          if (guess === secretWord) {
            handleWin();
          } else if (currentRow >= 5) {
            handleLose();
          } else {
            isGameOver = false; // resume typing
            currentRow++;
            currentCol = 0;
          }
        }, 5 * 150 + 250);
      }

      function triggerRowShake() {
        const rowEl = document.querySelector(`[data-row="${currentRow}"]`);
        rowEl.classList.remove('shake');
        void rowEl.offsetWidth; // force layout reflow
        rowEl.classList.add('shake');
      }

      function handleWin() {
        // Apply success wave bounce to rows
        const rowEl = document.querySelector(`[data-row="${currentRow}"]`);
        const tiles = rowEl.querySelectorAll('.tile');
        
        tiles.forEach((tile, index) => {
          setTimeout(() => {
            tile.classList.add('victory-bounce');
          }, index * 80);
        });

        stats.played++;
        stats.wins++;
        stats.streak++;
        localStorage.setItem('wordle_stats', JSON.stringify(stats));

        setTimeout(() => {
          playSound('win');
          showStatsModal(true);
        }, 800);
      }

      function handleLose() {
        stats.played++;
        stats.streak = 0;
        localStorage.setItem('wordle_stats', JSON.stringify(stats));

        setTimeout(() => {
          playSound('lose');
          showStatsModal(false);
        }, 800);
      }

      function showStatsModal(won) {
        modalTitle.textContent = won ? 'VICTORY!' : 'GAME OVER';
        modalTitle.className = won ? 'victory-title' : 'defeat-title';
        modalMsg.textContent = won ? 'You guessed the secret word correctly!' : 'Better luck next time!';
        revealedWord.textContent = secretWord.toUpperCase();
        
        // Populate stats dashboard details
        statPlayed.textContent = stats.played;
        const pct = stats.played > 0 ? Math.round((stats.wins / stats.played) * 100) : 0;
        statWinPct.textContent = `${pct}%`;
        statStreak.textContent = stats.streak;

        // Reveal section toggle
        revealSection.style.display = won ? 'none' : 'block';

        statsModal.classList.add('active');
      }

      // Input Event Handlers (Physical Keyboard)
      window.addEventListener('keydown', (e) => {
        if (statsModal.classList.contains('active')) return;

        const key = e.key.toLowerCase();
        if (key === 'enter') {
          submitGuess();
        } else if (key === 'backspace') {
          deleteLetter();
        } else if (/^[a-z]$/.test(key)) {
          addLetter(key);
        }
      });

      // Input Event Handlers (Virtual Screen Keyboard)
      keyboard.addEventListener('click', (e) => {
        const btn = e.target.closest('.key-btn');
        if (!btn || statsModal.classList.contains('active')) return;

        const key = btn.getAttribute('data-key');
        if (key === 'enter') {
          submitGuess();
        } else if (key === 'backspace') {
          deleteLetter();
        } else {
          addLetter(key);
        }
      });

      // Restart Game trigger
      btnRestart.addEventListener('click', () => {
        statsModal.classList.remove('active');
        initGame();
      });

      // Initialize
      initGame();
    });
  </script>
</body>
</html>
