<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Rotation Variants — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem;
      padding: 3rem 2rem;
      background: #f9fafb;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }
    .box {
      width: 90px;
      height: 90px;
      background: #6c63ff;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.5rem;
      cursor: pointer;
    }
    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="demo-item">
    <div class="box ease-rotate" onclick="this.classList.remove('ease-rotate'); void this.offsetWidth; this.classList.add('ease-rotate')">↻</div>
    <label>Clockwise (existing)</label>
  </div>

  <div class="demo-item">
    <div class="box rotate-counter-clockwise" onclick="this.classList.remove('rotate-counter-clockwise'); void this.offsetWidth; this.classList.add('rotate-counter-clockwise')">↺</div>
    <label>Anti-Clockwise (new)</label>
  </div>

  <div class="demo-item">
    <div class="box rotate-half-right" onclick="this.classList.remove('rotate-half-right'); void this.offsetWidth; this.classList.add('rotate-half-right')">⟳</div>
    <label>Half Right (new)</label>
  </div>

  <div class="demo-item">
    <div class="box rotate-half-left" onclick="this.classList.remove('rotate-half-left'); void this.offsetWidth; this.classList.add('rotate-half-left')">⟲</div>
    <label>Half Left (new)</label>
  </div>

  <p style="width:100%; text-align:center; color:#777; font-size:0.85rem;">Click any box to replay its animation</p>
</body>
</html>
