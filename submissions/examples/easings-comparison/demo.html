<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easings Comparison</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>CSS Easing Functions Comparison</h1>
    <p class="subtitle">Observe how each easing function affects the ball's motion across the track.</p>
    <div class="track-grid">
      <div class="track">
        <span class="track-label">ease</span>
        <div class="track-bar"><div class="ball" style="--easing: ease;"></div></div>
      </div>
      <div class="track">
        <span class="track-label">ease-in</span>
        <div class="track-bar"><div class="ball" style="--easing: ease-in;"></div></div>
      </div>
      <div class="track">
        <span class="track-label">ease-out</span>
        <div class="track-bar"><div class="ball" style="--easing: ease-out;"></div></div>
      </div>
      <div class="track">
        <span class="track-label">ease-in-out</span>
        <div class="track-bar"><div class="ball" style="--easing: ease-in-out;"></div></div>
      </div>
      <div class="track">
        <span class="track-label">linear</span>
        <div class="track-bar"><div class="ball" style="--easing: linear;"></div></div>
      </div>
      <div class="track">
        <span class="track-label">spring</span>
        <div class="track-bar"><div class="ball spring"></div></div>
      </div>
    </div>
    <button id="resetBtn" class="btn">Reset</button>
  </main>
  <script>
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.querySelectorAll('.ball').forEach(b => {
        b.style.animation = 'none';
        void b.offsetHeight;
        b.style.animation = '';
      });
    });
  </script>
</body>
</html>
