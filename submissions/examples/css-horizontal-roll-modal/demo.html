<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Horizontal Roll Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<div class="container">
    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>
</div>

<div class="overlay">

    <div class="ease-horizontal-roll-modal">

        <label for="modal-toggle" class="close-btn">
            ×
        </label>

        <h2>Dashboard Modal</h2>

        <p>
            This responsive modal slides and rolls smoothly using
            only HTML and CSS.
        </p>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
