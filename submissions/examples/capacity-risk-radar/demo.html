<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capacity Risk Radar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="radar-shell" aria-labelledby="radar-title">
    <section class="radar-panel">
      <div class="copy">
        <p class="eyebrow">infra watch</p>
        <h1 id="radar-title">Capacity risk radar</h1>
        <p>A rotating radar sweep highlights regions that need capacity attention before traffic spikes arrive.</p>
      </div>

      <div class="radar-card" aria-label="Capacity risk radar">
        <div class="radar">
          <span class="ping ping-one"></span>
          <span class="ping ping-two"></span>
          <span class="ping ping-three"></span>
        </div>
        <ul class="legend">
          <li><span></span>US-East high</li>
          <li><span></span>EU-West watch</li>
          <li><span></span>AP-South stable</li>
        </ul>
      </div>
    </section>
  </main>
</body>
</html>
