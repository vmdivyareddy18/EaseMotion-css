<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Staggered Entrance Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-preview">
    <header class="db-header">
      <h2>Analytics Dashboard</h2>
      <a href="#modal-target" class="btn btn-primary">Open Report Settings</a>
    </header>
    <div class="db-grid">
      <div class="db-card"></div>
      <div class="db-card"></div>
      <div class="db-card"></div>
    </div>
  </div>

  <div id="modal-target" class="modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <a href="#" class="modal-close-overlay" aria-label="Close modal"></a>
    
    <div class="modal-container">
      <header class="modal-header" style="--stagger-index: 1;">
        <h3 id="modal-title">Export Settings</h3>
        <a href="#" class="modal-close-btn" aria-label="Close modal">&times;</a>
      </header>

      <div class="modal-body">
        <div class="modal-item" style="--stagger-index: 2;">
          <label class="form-label">Date Range</label>
          <select class="form-input">
            <option>Last 7 Days</option>
            <option>Last 30 Days</option>
            <option>Custom Range</option>
          </select>
        </div>

        <div class="modal-item" style="--stagger-index: 3;">
          <label class="form-label">File Format</label>
          <div class="radio-group">
            <label><input type="radio" name="format" checked> PDF Report</label>
            <label><input type="radio" name="format"> CSV Data</label>
          </div>
        </div>

        <div class="modal-item" style="--stagger-index: 4;">
          <label class="form-label">Include Charts</label>
          <input type="checkbox" checked>
        </div>
      </div>

      <footer class="modal-footer" style="--stagger-index: 5;">
        <a href="#" class="btn btn-secondary">Cancel</a>
        <a href="#" class="btn btn-primary">Generate Report</a>
      </footer>
    </div>
  </div>

</body>
</html>
