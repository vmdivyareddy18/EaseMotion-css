<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm Modal - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Confirm Modal</h1>
      <p>A centered confirmation dialog featuring a bouncy scale-in animation and a pulsing action button.</p>
    </header>

    <main class="demo-content">
      <button class="open-demo-btn" id="open-modal-btn">Trigger Confirmation</button>
    </main>

    <!-- The Modal Component -->
    <div class="ease-modal-backdrop" id="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- The Modal Box -->
      <div class="ease-modal-confirm">
        
        <div class="ease-modal-header">
          <div class="ease-modal-icon">
            <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
              <line x1="12" y1="9" x2="12" y2="13"></line>
              <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
          </div>
          <h3 class="ease-modal-title" id="modal-title">Delete Account?</h3>
        </div>
        
        <div class="ease-modal-body">
          <p class="ease-modal-desc">Are you completely sure you want to delete your account? All of your data will be permanently removed. This action cannot be undone.</p>
        </div>
        
        <div class="ease-modal-actions">
          <button class="ease-btn-cancel" id="btn-cancel">Cancel</button>
          <button class="ease-btn-confirm" id="btn-confirm">Delete Account</button>
        </div>
        
      </div>
      
    </div>

  </div>

  <script>
    const modal = document.getElementById('confirm-modal');
    const openBtn = document.getElementById('open-modal-btn');
    const cancelBtn = document.getElementById('btn-cancel');
    const confirmBtn = document.getElementById('btn-confirm');

    // Open logic
    openBtn.addEventListener('click', () => {
      modal.classList.add('open');
    });

    // Close logic
    function closeModal() {
      modal.classList.remove('open');
    }

    cancelBtn.addEventListener('click', closeModal);

    // Close when clicking the backdrop
    modal.addEventListener('click', (e) => {
      if (e.target === modal) {
        closeModal();
      }
    });

    // Simulated Action
    confirmBtn.addEventListener('click', () => {
      const originalText = confirmBtn.textContent;
      confirmBtn.textContent = 'Processing...';
      confirmBtn.style.opacity = '0.7';
      confirmBtn.style.pointerEvents = 'none';
      confirmBtn.style.animation = 'none'; // Stop pulse
      
      // Simulate network request
      setTimeout(() => {
        closeModal();
        
        // Reset state after animation finishes for the demo
        setTimeout(() => {
          confirmBtn.textContent = originalText;
          confirmBtn.style.opacity = '1';
          confirmBtn.style.pointerEvents = 'auto';
          confirmBtn.style.animation = ''; // Restore pulse
        }, 400);
        
      }, 1200);
    });
  </script>
</body>
</html>
