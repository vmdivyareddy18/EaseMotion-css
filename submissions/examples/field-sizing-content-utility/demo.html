<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Field-Sizing Content Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 60px 20px; margin: 0;">

  <div class="fluid-form-sandbox">
    <h5>Intrinsic Element Sizing Lab</h5>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-bottom: 1.5rem;">
      Type into the controls below. Using the modern <code>field-sizing: content</code> rule, elements dynamically resize to fit their value text automatically without JavaScript or complex layout observers.
    </p>

    <div class="fluid-input-group" style="align-items: flex-start;">
      <label for="txt-fluid">Dynamic Width Input Field</label>
      <input type="text" id="txt-fluid" class="ease-field-sizing-content" value="Type more text here...">
    </div>

    <div class="fluid-input-group">
      <label for="area-fluid">Dynamic Height Textarea Component</label>
      <textarea id="area-fluid" class="ease-field-sizing-content" placeholder="Press enter multiple times or write a long paragraph to watch this block seamlessly expand its vertical heights instantly..."></textarea>
    </div>
  </div>

</body>
</html>
