<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Cursor Spotlight — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 50px;
      background: radial-gradient(circle at 50% 0%, #1a1a2e 0%, #05050a 70%);
      font-family: system-ui, sans-serif;
      color: #f5f7fa;
    }
    .card {
      width: 260px;
      padding: 28px;
      border-radius: 16px;
      background: #14141c;
      border: 1px solid #2a2a3f;
    }
    .hero {
      width: 100%;
      max-width: 680px;
      padding: 70px 40px;
      border-radius: 20px;
      background: #0f0f18;
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .cta-btn {
      padding: 16px 36px;
      border-radius: 10px;
      border: none;
      background: #14141c;
      color: #facc15;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
    }
    p.sub { font-size: 1rem; font-weight: 400; color: #94a3b8; margin-top: 8px; }
  </style>
</head>
<body>

  <div class="hero spotlight spotlight-hero">
    Build with EaseMotion
    <p class="sub">Move your cursor here — multi-layer glow follows in real time.</p>
  </div>

  <div class="card spotlight spotlight-card">
    <h3>Spotlight Card</h3>
    <p style="color:#94a3b8;">Layered violet/pink/cyan glow with a spinning hue-ring underneath.</p>
  </div>

  <div class="card spotlight spotlight-card spotlight-rainbow">
    <h3>Rainbow Variant</h3>
    <p style="color:#94a3b8;">Same tracking glow, but the color itself continuously cycles through the spectrum.</p>
  </div>

  <button class="cta-btn spotlight spotlight-button">Get Started</button>

  <script src="spotlight.js"></script>
</body>
</html>
