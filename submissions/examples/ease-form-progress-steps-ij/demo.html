<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Progress Steps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Form Progress Steps</h1>
    <div class="progress-wrapper">
      <div class="progress-steps">
        <div class="step" data-step="1">
          <div class="step-circle">1</div>
          <span class="step-label">Personal</span>
        </div>
        <div class="step" data-step="2">
          <div class="step-circle">2</div>
          <span class="step-label">Contact</span>
        </div>
        <div class="step" data-step="3">
          <div class="step-circle">3</div>
          <span class="step-label">Address</span>
        </div>
        <div class="step" data-step="4">
          <div class="step-circle">4</div>
          <span class="step-label">Confirm</span>
        </div>
      </div>
      <div class="progress-line">
        <div class="progress-fill"></div>
      </div>
    </div>
    <div class="step-content">
      <div class="step-panel active" data-panel="1">
        <h2>Personal Information</h2>
        <p>Enter your name and date of birth.</p>
      </div>
      <div class="step-panel" data-panel="2">
        <h2>Contact Details</h2>
        <p>Enter your email and phone number.</p>
      </div>
      <div class="step-panel" data-panel="3">
        <h2>Address</h2>
        <p>Enter your street, city, and postal code.</p>
      </div>
      <div class="step-panel" data-panel="4">
        <h2>Confirmation</h2>
        <p>Review and confirm your information.</p>
      </div>
    </div>
    <div class="nav-buttons">
      <button id="prevBtn" class="nav-btn" disabled>Previous</button>
      <button id="nextBtn" class="nav-btn">Next</button>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
