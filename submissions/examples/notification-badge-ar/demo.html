<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Badge Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 3rem;
      padding: 2rem;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      max-width: 560px;
      width: 100%;
    }

    h1 { margin-bottom: 0.25rem; }
    p  { color: #64748b; margin-bottom: 0; }

    /* Demo grid */
    .demo-grid {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .demo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.875rem;
    }

    .demo-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animated Notification Badge</h1>
    <p>Three badge variants — static, pop-in entrance, and pulsing sonar ring.</p>

    <div class="demo-grid">

      <!-- 1. Plain badge (no animation) -->
      <div class="demo-col">
        <div class="badge-wrapper">
          <button class="icon-btn" aria-label="Messages, 3 unread">💬</button>
          <span class="badge" aria-label="3 unread messages">3</span>
        </div>
        <span class="demo-label">Static</span>
      </div>

      <!-- 2. Pop-in entrance badge -->
      <div class="demo-col">
        <div class="badge-wrapper">
          <button class="icon-btn" aria-label="Notifications, 9 unread">🔔</button>
          <span class="badge pop" aria-label="9 unread notifications">9</span>
        </div>
        <span class="demo-label">Pop-in</span>
      </div>

      <!-- 3. Pulsing sonar ring badge -->
      <div class="demo-col">
        <div class="badge-wrapper">
          <button class="icon-btn" aria-label="Alerts, 1 active">⚠️</button>
          <span class="badge pulse" aria-label="1 active alert">!</span>
        </div>
        <span class="demo-label">Pulse Ring</span>
      </div>

      <!-- 4. Badge on avatar -->
      <div class="demo-col">
        <div class="badge-wrapper">
          <div style="
            width: 52px; height: 52px; border-radius: 50%;
            background: linear-gradient(135deg, #6c63ff, #a09af8);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; font-weight: 700;
          ">A</div>
          <span class="badge pulse" aria-label="online">●</span>
        </div>
        <span class="demo-label">Avatar</span>
      </div>

    </div>
  </div>
</body>
</html>
