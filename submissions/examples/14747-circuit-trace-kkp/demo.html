<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Circuit Trace Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="circuit-title">
        <div class="circuit-board" aria-hidden="true">
          <span class="circuit-node node-one"></span>
          <span class="circuit-node node-two"></span>
          <span class="circuit-node node-three"></span>
          <span class="circuit-trace trace-horizontal top"></span>
          <span class="circuit-trace trace-horizontal bottom"></span>
          <span class="circuit-trace trace-vertical left"></span>
          <span class="circuit-trace trace-vertical right"></span>
        </div>
        <p class="eyebrow">Technical motion</p>
        <h1 id="circuit-title">Circuit trace pulse</h1>
        <p class="demo-copy">
          Glowing paths sweep across the board to suggest signal flow without
          JavaScript or external assets.
        </p>
      </section>
    </main>
  </body>
</html>
