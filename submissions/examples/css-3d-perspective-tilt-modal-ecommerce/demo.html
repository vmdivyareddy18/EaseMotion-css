<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>E-Commerce Checkout Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1>Checkout Modal UI</h1>
    <p>3D Perspective Tilt + E-Commerce Flow</p>
    <button class="open-btn" onclick="openModal()">Open Checkout</button>
  </div>

  <div class="overlay" id="overlay" onclick="closeModal()"></div>

  <div class="modal" id="modal" tabindex="0">
    <div class="modal-content">
      <h2>Order Summary</h2>
      <p>Product: Premium UI Kit</p>
      <p>Total: $49</p>
      <button class="close-btn" onclick="closeModal()">Confirm & Close</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById("modal");
    const overlay = document.getElementById("overlay");

    function openModal() {
      modal.classList.add("active");
      overlay.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
      overlay.classList.remove("active");
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  </script>

</body>
</html>
