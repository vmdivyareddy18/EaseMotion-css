<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expand Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <input type="checkbox" id="expand1" class="card-toggle" hidden>
      <div class="card-preview">
        <div class="card-icon">🚀</div>
        <div class="card-title">Project Alpha</div>
        <div class="card-subtitle">Click to expand details</div>
        <label for="expand1" class="expand-btn">▼</label>
      </div>
      <div class="card-details">
        <div class="details-content">
          <p>Project Alpha is a cutting-edge web application built with modern technologies. It features real-time collaboration, AI-powered suggestions, and an intuitive drag-and-drop interface.</p>
          <div class="detail-row"><span>Status:</span><span class="status active">Active</span></div>
          <div class="detail-row"><span>Team:</span><span>12 members</span></div>
          <div class="detail-row"><span>Deadline:</span><span>Q3 2026</span></div>
          <label for="expand1" class="collapse-btn">Show less ▲</label>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
