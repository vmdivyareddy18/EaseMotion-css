<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic 3D Holographic Ticket | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ticket-wrapper">
    <div class="glass-3d-ticket">
      
      <!-- Main Body of Ticket -->
      <div class="ticket-body">
        <div class="hologram-glare"></div>
        
        <div class="ticket-label">VIP Admission</div>
        <h1 class="ticket-title">EaseMotion Summit '26</h1>
        <p class="ticket-subtitle">Advanced CSS Framework Conference</p>
        
        <div class="ticket-details">
          <div class="detail-item">
            <span class="ticket-label">Date</span>
            <strong>Oct 24, 2026</strong>
          </div>
          <div class="detail-item">
            <span class="ticket-label">Time</span>
            <strong>10:00 AM PST</strong>
          </div>
          <div class="detail-item">
            <span class="ticket-label">Seat</span>
            <strong>Row A, 01</strong>
          </div>
        </div>
      </div>
      
      <!-- Perforated Tear-off Stub -->
      <div class="ticket-stub">
        <div class="hologram-glare"></div>
        
        <div class="ticket-label" style="margin-bottom: auto;">Admit One</div>
        
        <div style="width: 100%;">
          <div class="barcode"></div>
          <div class="stub-number">#99283741</div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
