<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Harp Pluck Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="harp">
    <div class="harp-column"></div>
    <div class="harp-arm"></div>
    <div class="harp-body"></div>
    <div class="harp-strings">
      <div class="hstring" style="--i:0"></div>
      <div class="hstring" style="--i:1"></div>
      <div class="hstring" style="--i:2"></div>
      <div class="hstring" style="--i:3"></div>
      <div class="hstring" style="--i:4"></div>
      <div class="hstring" style="--i:5"></div>
      <div class="hstring" style="--i:6"></div>
    </div>
  </div>
</body>
</html>
