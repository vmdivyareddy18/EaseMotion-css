<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Statistics Counter - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="stats-section">
    <!-- Header -->
    <div class="stats-header ease-fade-in-down">
      <h1>Trusted by Developers Worldwide</h1>
      <p>Join thousands of teams building better products with our platform.</p>
    </div>

    <!-- Statistics Grid -->
    <div class="stats-grid">
      
      <!-- Stat 1 -->
      <div class="stat-card ease-zoom-in ease-delay-100">
        <div class="stat-icon ease-pulse">👥</div>
        <div class="stat-number counter-50k">50,000+</div>
        <div class="stat-label">Active Users</div>
      </div>

      <!-- Stat 2 -->
      <div class="stat-card ease-zoom-in ease-delay-200">
        <div class="stat-icon ease-pulse ease-delay-100">📦</div>
        <div class="stat-number counter-1m">1,000,000+</div>
        <div class="stat-label">Downloads</div>
      </div>

      <!-- Stat 3 -->
      <div class="stat-card ease-zoom-in ease-delay-300">
        <div class="stat-icon ease-pulse ease-delay-200">⭐</div>
        <div class="stat-number counter-4.9">4.9/5</div>
        <div class="stat-label">Average Rating</div>
      </div>

      <!-- Stat 4 -->
      <div class="stat-card ease-zoom-in ease-delay-400">
        <div class="stat-icon ease-pulse ease-delay-300">🌍</div>
        <div class="stat-number counter-120">120+</div>
        <div class="stat-label">Countries</div>
      </div>

    </div>
  </section>
</body>
</html>
