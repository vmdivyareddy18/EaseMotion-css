<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-burn-ember – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Burn Ember</h1>
    <p class="subtitle">An ember glow effect with flickering box-shadow and rising particles.</p>
    <div class="ember-container" id="emberContainer">
      <span class="content">🔥</span>
    </div>
    <p class="ember-status" id="emberStatus">Dormant</p>
    <button id="toggleBtn">Ignite</button>
  </div>

  <script>
    const container = document.getElementById('emberContainer');
    const status = document.getElementById('emberStatus');
    const toggleBtn = document.getElementById('toggleBtn');
    let active = false;

    toggleBtn.addEventListener('click', () => {
      active = !active;
      container.classList.toggle('active', active);
      status.textContent = active ? 'Burning…' : 'Dormant';
      toggleBtn.textContent = active ? 'Extinguish' : 'Ignite';
    });
  </script>
</body>
</html>
