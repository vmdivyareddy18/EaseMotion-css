<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Tabs</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="tabs">

<input type="radio" id="home" name="tab" checked>
<input type="radio" id="about" name="tab">
<input type="radio" id="contact" name="tab">

<div class="tab-header">
<label for="home">Home</label>
<label for="about">About</label>
<label for="contact">Contact</label>

<div class="indicator"></div>
</div>

<div class="tab-content">

<div class="panel home">
<h2>Home</h2>
<p>Welcome to EaseMotion CSS.</p>
</div>

<div class="panel about">
<h2>About</h2>
<p>Pure CSS animated tabs component.</p>
</div>

<div class="panel contact">
<h2>Contact</h2>
<p>Contact us for more components.</p>
</div>

</div>

</div>

</body>
</html>
