<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation: ease-border-color-flash</title>
    <meta
      name="description"
      content="A demonstration of the ease-border-color-flash border animation featuring error validation triggers."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1 id="main-title">ease-border-color-flash</h1>
        <p class="subtitle" id="main-desc">
          Rapid border-color flash for validation alerts and interactive
          highlights.
        </p>
      </header>

      <div class="display-area">
        <!-- Example 1: Error Validation Flash -->
        <div class="example-box">
          <label for="input-error" class="example-title"
            >Validation Error (Flashes Red on Focus)</label
          >
          <input
            type="text"
            id="input-error"
            class="demo-input flash-on-focus"
            placeholder="Click to focus / trigger flash..."
            value="Invalid username entry"
          />
        </div>

        <!-- Example 2: Success Validation Flash -->
        <div class="example-box">
          <label for="input-success" class="example-title"
            >Validation Success (Flashes Green on Focus)</label
          >
          <input
            type="text"
            id="input-success"
            class="demo-input flash-on-focus flash-success"
            placeholder="Click to focus / trigger flash..."
            value="Correct password entry"
          />
        </div>

        <!-- Example 3: Click to Flash Button -->
        <div class="example-box">
          <span class="example-title"
            >Interactive Element (Flashes Blue on Click)</span
          >
          <button class="demo-btn flash-on-click flash-info">
            Click And Hold Me
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
