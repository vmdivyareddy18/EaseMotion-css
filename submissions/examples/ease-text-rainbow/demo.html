<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rainbow Gradient Text Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <h1 class="title">Rainbow Text Cycle</h1>
    <p class="subtitle">Text fill continuously cycles through a full-spectrum gradient using <code>background-clip: text</code> + an animated gradient position.</p>

    <div class="examples">
      <div class="ease-card">
        <h2 class="rainbow-text">Default Speed</h2>
        <p class="ease-card__meta">--ease-rainbow-speed: 4s</p>
      </div>
 
      <div class="ease-card">
        <h2 class="rainbow-text rainbow-text--fast">Fast Cycle</h2>
        <p class="ease-card__meta">--ease-rainbow-speed: 1.5s</p>
      </div>
 
      <div class="ease-card">
        <h2 class="rainbow-text rainbow-text--slow">Slow Cycle</h2>
        <p class="ease-card__meta">--ease-rainbow-speed: 9s</p>
      </div>
    </div>
  </main>

</body>
</html>
