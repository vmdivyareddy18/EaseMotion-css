<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Double-Click Heart</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #16162a;
      border-radius: 1.25rem;
      padding: 2.5rem;
      max-width: 500px;
      width: 100%;
      margin: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    .card__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: #fff;
    }
    .card__subtitle {
      font-size: 0.875rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .controls input[type="color"],
    .controls input[type="range"] {
      cursor: pointer;
      background: #2d2d3d;
      border: 1px solid #3d3d5c;
      border-radius: 0.375rem;
      padding: 0.25rem;
    }
    .demo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .hint {
      font-size: 0.8rem;
      opacity: 0.5;
    }
    .status {
      font-size: 0.875rem;
      opacity: 0.7;
      min-height: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="card__title">❤️ Double-Click Heart</h1>
    <p class="card__subtitle">Issue #36606 — double-click to like with burst particles</p>

    <div class="controls">
      <label>Heart Color
        <input type="color" id="heartColor" value="#ff4757">
      </label>
      <label>Burst Color
        <input type="color" id="burstColor" value="#ff6b81">
      </label>
      <label>Size
        <input type="range" id="heartSize" min="2" max="7" step="0.25" value="4">
        <span id="sizeVal">4rem</span>
      </label>
      <label>Burst Duration
        <input type="range" id="burstDuration" min="0.2" max="1.5" step="0.1" value="0.6">
        <span id="durVal">0.6s</span>
      </label>
    </div>

    <div class="demo-area">
      <div class="ease-double-heart" id="heart" style="width:120px;height:120px;">
        <span class="ease-double-heart__icon" id="heartIcon">♡</span>
        <div class="ease-double-heart__burst" id="burst"></div>
      </div>
      <div class="status" id="status">Double-click the heart</div>
      <span class="hint">Likes: <span id="likeCount">0</span></span>
    </div>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const icon = document.getElementById('heartIcon');
    const burst = document.getElementById('burst');
    const status = document.getElementById('status');
    const countEl = document.getElementById('likeCount');

    let liked = false;
    let likeCount = 0;
    let clickTimer = null;

    function createParticles() {
      burst.innerHTML = '';
      const count = 12;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'ease-double-heart__particle';
        const angle = (i / count) * 360;
        const dist = 40 + Math.random() * 30;
        const rad = (angle * Math.PI) / 180;
        p.style.setProperty('--tx', Math.cos(rad) * dist + 'px');
        p.style.setProperty('--ty', Math.sin(rad) * dist + 'px');
        p.style.animationDelay = Math.random() * 0.1 + 's';
        const hue = Math.floor(Math.random() * 30) + 340;
        p.style.background = `hsl(${hue}, 90%, 65%)`;
        burst.appendChild(p);
      }
    }

    heart.addEventListener('click', () => {
      if (clickTimer) {
        clearTimeout(clickTimer);
        clickTimer = null;
        liked = !liked;
        icon.textContent = liked ? '♥' : '♡';
        icon.classList.remove('liked');
        void icon.offsetWidth;
        icon.classList.add('liked');
        if (liked) {
          createParticles();
          likeCount++;
          countEl.textContent = likeCount;
          status.textContent = '❤️ Liked!';
        } else {
          burst.innerHTML = '';
          status.textContent = 'Unliked';
        }
      } else {
        clickTimer = setTimeout(() => {
          clickTimer = null;
        }, 300);
      }
    });

    document.getElementById('heartColor').addEventListener('input', e => {
      heart.style.setProperty('--heart-color', e.target.value);
    });
    document.getElementById('burstColor').addEventListener('input', e => {
      heart.style.setProperty('--burst-color', e.target.value);
    });
    document.getElementById('heartSize').addEventListener('input', e => {
      const v = e.target.value + 'rem';
      heart.style.setProperty('--heart-size', v);
      document.getElementById('sizeVal').textContent = v;
    });
    document.getElementById('burstDuration').addEventListener('input', e => {
      const v = e.target.value + 's';
      heart.style.setProperty('--burst-duration', v);
      document.getElementById('durVal').textContent = v;
    });
  </script>
</body>
</html>
