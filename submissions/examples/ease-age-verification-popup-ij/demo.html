<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease: Age Verification Popup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Welcome</h1>
    <p>This content is behind an age verification gate. Confirm your age to proceed.</p>
    <div style="height:200px; background:#e8e8f0; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#888; font-style:italic;">Premium content preview</div>
  </main>

  <div class="avp-overlay" id="avpOverlay">
    <div class="avp-popup" id="avpPopup">
      <div class="avp-icon">🔞</div>
      <h2>Age Verification</h2>
      <p>You must be 18 or older to access this content.</p>
      <div class="avp-buttons">
        <button class="avp-btn avp-btn-confirm" id="avpConfirm">I am 18+</button>
        <button class="avp-btn avp-btn-reject" id="avpReject">I am under 18</button>
      </div>
      <label class="avp-remember">
        <input type="checkbox" id="avpRemember"> Remember my choice
      </label>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('avpOverlay');
    const popup = document.getElementById('avpPopup');
    const confirmBtn = document.getElementById('avpConfirm');
    const rejectBtn = document.getElementById('avpReject');
    const rememberCheck = document.getElementById('avpRemember');

    const remembered = localStorage.getItem('avpChoice');
    if (remembered === 'confirmed') overlay.style.display = 'none';

    confirmBtn.addEventListener('click', () => {
      if (rememberCheck.checked) localStorage.setItem('avpChoice', 'confirmed');
      popup.classList.add('avp-exit');
      setTimeout(() => { overlay.style.display = 'none'; }, 400);
    });

    rejectBtn.addEventListener('click', () => {
      if (rememberCheck.checked) localStorage.setItem('avpChoice', 'rejected');
      popup.classList.add('avp-rejected');
      document.querySelector('.avp-icon').textContent = '😢';
      document.querySelector('.avp-popup h2').textContent = 'Access Denied';
      document.querySelector('.avp-popup p').textContent = 'Sorry, you must be 18 or older to view this content.';
      confirmBtn.style.display = 'none';
      rejectBtn.textContent = 'Go Back';
      rejectBtn.onclick = () => {
        popup.classList.add('avp-exit');
        setTimeout(() => { overlay.style.display = 'none'; }, 400);
      };
    });
  </script>
</body>
</html>
