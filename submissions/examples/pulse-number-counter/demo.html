<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Number Counter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="counter-container">

    <section class="counter-card">
      <div class="pulse-circle"></div>

      <h1 class="counter-number">10K+</h1>
      <p class="counter-label">Active Users</p>

    </section>

    <section class="counter-card">
      <div class="pulse-circle"></div>

      <h1 class="counter-number">500+</h1>
      <p class="counter-label">Projects Completed</p>

    </section>

    <section class="counter-card">
      <div class="pulse-circle"></div>

      <h1 class="counter-number">99%</h1>
      <p class="counter-label">Customer Satisfaction</p>

    </section>

  </main>

</body>
</html>
