<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Wave Chip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main style="text-align: center;">
    <h1 style="text-transform: uppercase; letter-spacing: 2px; font-size: 1.8rem; margin-bottom: 8px;">Wave Chip Components</h1>
    <p style="color: var(--ease-text-muted); font-size: 0.95rem; margin-bottom: 40px;">Hover or focus tags to test pure CSS organic liquid wave rise properties.</p>

    <!-- Flex Chip Wrapper Workspace -->
    <div style="display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; max-width: 600px; margin: 0 auto;">
      
      <div class="ease-wave-chip" tabindex="0">
        <div class="ease-wave-container"></div>
        <span>Creative_Agency</span>
      </div>

      <div class="ease-wave-chip" tabindex="0">
        <div class="ease-wave-container"></div>
        <span>EaseMotion_CSS</span>
      </div>

      <div class="ease-wave-chip" tabindex="0">
        <div class="ease-wave-container"></div>
        <span>UI_Interaction</span>
      </div>

    </div>
  </main>

</body>
</html>
