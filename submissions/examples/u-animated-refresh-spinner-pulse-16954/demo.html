<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Refresh Spinner Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Refresh Spinner Pulse</h1>

    <p>
      A refresh icon with combined spin and pulse animation for
      dashboards, sync actions, and loading interfaces.
    </p>

    <div class="demo-area">

      <button class="refresh-button">
        <span class="refresh-icon">⟳</span>
        Refresh Data
      </button>

      <button class="refresh-button secondary">
        <span class="refresh-icon">⟳</span>
        Sync Now
      </button>

      <button class="refresh-button secondary">
        <span class="refresh-icon">⟳</span>
        Reload
      </button>

    </div>

  </main>

</body>
</html>
