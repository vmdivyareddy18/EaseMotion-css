<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-chip-removable - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-chip-removable</h1>
    <p class="description">Animated removable filter chip with collapse-to-width-zero effect.</p>

    <div class="chip-list" id="chipList">
      <span class="ease-chip-removable">Design
        <button class="remove-btn" onclick="removeChip(this)">×</button>
      </span>
      <span class="ease-chip-removable">Development
        <button class="remove-btn" onclick="removeChip(this)">×</button>
      </span>
      <span class="ease-chip-removable">Marketing
        <button class="remove-btn" onclick="removeChip(this)">×</button>
      </span>
      <span class="ease-chip-removable">Support
        <button class="remove-btn" onclick="removeChip(this)">×</button>
      </span>
    </div>

    <div class="chip-list">
      <button class="reset-btn" onclick="resetChips()">Reset All</button>
    </div>
  </div>

  <script>
    function removeChip(btn) {
      const chip = btn.parentElement;
      chip.classList.add('removing');
      setTimeout(() => chip.remove(), 450);
    }

    function resetChips() {
      const list = document.getElementById('chipList');
      list.innerHTML = '';
      const chips = ['Design', 'Development', 'Marketing', 'Support'];
      chips.forEach(name => {
        const span = document.createElement('span');
        span.className = 'ease-chip-removable';
        span.innerHTML = name + '<button class="remove-btn" onclick="removeChip(this)">×</button>';
        list.appendChild(span);
      });
    }
  </script>
</body>
</html>
