<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Back Button DO Demo</title>

    <!-- EaseMotion CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />

    <link rel="stylesheet" href="style.css" />
</head>
<body>

    <div class="demo-container ease-fade-in">

        <button
            class="back-button-do ease-hover-grow"
            onclick="window.history.back()"
            aria-label="Go Back"
        >
            <span class="arrow">←</span>
            <span>Back</span>
        </button>

        <div class="demo-content ease-slide-up">
            <h1>Back Button Component</h1>

            <p>
                A reusable glassmorphism back button component built for
                EaseMotion CSS.
            </p>

            <p>
                Click the button above to navigate to the previous page.
            </p>

            <button class="ease-btn ease-btn-primary">
                Sample Button
            </button>
        </div>

    </div>

</body>
</html>
