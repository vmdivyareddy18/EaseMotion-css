<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech 3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="hero-card">

        <h2>Minimal Tech Dashboard</h2>

        <p>
            Clean interface with a smooth 3D flip modal built using only HTML and CSS.
        </p>

        <a href="#modal" class="btn">
            Open Dashboard
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">
            Dashboard Summary
        </h2>

        <div class="grid">

            <div class="card">
                <span>Projects</span>
                <strong>18</strong>
            </div>

            <div class="card">
                <span>Tasks</span>
                <strong>146</strong>
            </div>

            <div class="card">
                <span>Completed</span>
                <strong>92%</strong>
            </div>

            <div class="card">
                <span>Team</span>
                <strong>12</strong>
            </div>

        </div>

        <button class="action-btn">
            View Analytics
        </button>

    </div>

</div>

</body>
</html>
