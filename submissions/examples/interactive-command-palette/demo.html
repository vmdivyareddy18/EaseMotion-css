<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="palette">

        <div class="palette-header">
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input
                    type="text"
                    placeholder="Search commands, files, settings..."
                >
                <span class="kbd">Ctrl + K</span>
            </div>
        </div>

        <div class="palette-body">

            <div class="section">
                <h4>Quick Actions</h4>

                <div class="item active">
                    <div class="left">
                        <span class="icon">➕</span>
                        Create New Project
                    </div>

                    <span class="shortcut">N</span>
                </div>

                <div class="item">
                    <div class="left">
                        <span class="icon">📂</span>
                        Open Workspace
                    </div>

                    <span class="shortcut">O</span>
                </div>

                <div class="item">
                    <div class="left">
                        <span class="icon">📤</span>
                        Export Report
                    </div>

                    <span class="shortcut">E</span>
                </div>
            </div>

            <div class="section">
                <h4>Navigation</h4>

                <div class="item">
                    <div class="left">
                        <span class="icon">🏠</span>
                        Dashboard
                    </div>

                    <span class="shortcut">D</span>
                </div>

                <div class="item">
                    <div class="left">
                        <span class="icon">📈</span>
                        Analytics
                    </div>

                    <span class="shortcut">A</span>
                </div>

                <div class="item">
                    <div class="left">
                        <span class="icon">⚙</span>
                        Settings
                    </div>

                    <span class="shortcut">S</span>
                </div>
            </div>

            <div class="section">
                <h4>Recent Searches</h4>

                <div class="recent-tag">User Analytics</div>
                <div class="recent-tag">Revenue Dashboard</div>
                <div class="recent-tag">Project Settings</div>
                <div class="recent-tag">Notifications</div>
            </div>

        </div>

        <div class="palette-footer">

            <div>↑ ↓ Navigate</div>
            <div>Enter Select</div>
            <div>Esc Close</div>

        </div>

    </div>

</div>

</body>
</html>
