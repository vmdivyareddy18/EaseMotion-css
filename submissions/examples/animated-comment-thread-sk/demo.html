<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Comment Thread</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="thread">
    <div class="comment">
      <div class="comment-avatar" aria-hidden="true">SK</div>
      <div class="comment-body">
        <div class="comment-header">
          <span class="comment-username">Sarah Kim</span>
          <span class="comment-time">12m ago</span>
        </div>
        <p class="comment-text">Really impressed with the new design system! The consistency across components is fantastic.</p>
        <div class="comment-actions">
          <button class="action-btn">&#x2764; Like</button>
          <button class="action-btn">&#x21A9; Reply</button>
        </div>
      </div>
      <div class="comment depth-1">
        <div class="comment-avatar" aria-hidden="true">MR</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-username">Marcus Reed</span>
            <span class="comment-time">8m ago</span>
          </div>
          <p class="comment-text">Agreed! The spacing tokens really help keep everything aligned.</p>
          <div class="comment-actions">
            <button class="action-btn">&#x2764; Like</button>
            <button class="action-btn">&#x21A9; Reply</button>
          </div>
        </div>
        <div class="comment depth-2">
          <div class="comment-avatar" aria-hidden="true">AL</div>
          <div class="comment-body">
            <div class="comment-header">
              <span class="comment-username">Aisha Lin</span>
              <span class="comment-time">3m ago</span>
            </div>
            <p class="comment-text">Do you think we should also update the typography scale?</p>
            <div class="comment-actions">
              <button class="action-btn">&#x2764; Like</button>
              <button class="action-btn">&#x21A9; Reply</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
