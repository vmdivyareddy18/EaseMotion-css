<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circular Progress Ring - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Progress Ring Container -->
    <div class="progress-container-qn">
        <!-- SVG for the ring -->
        <svg class="progress-ring-qn" width="140" height="140">
            <!-- Background track -->
            <circle class="progress-ring-bg-qn" cx="70" cy="70" r="60" />
            <!-- Animated fill -->
            <circle class="progress-ring-fill-qn" cx="70" cy="70" r="60" />
        </svg>
        
        <!-- Percentage Text -->
        <span class="progress-text-qn">75%</span>
    </div>
</body>
</html>
