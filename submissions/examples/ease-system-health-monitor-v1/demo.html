<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease System Health Monitor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

<h1>System Health Monitor</h1>

<div class="grid">

<div class="card">
<div class="status online"></div>
<h2>CPU</h2>
<div class="bar"><span style="width:72%"></span></div>
<p>72% Usage</p>
</div>

<div class="card">
<div class="status online"></div>
<h2>Memory</h2>
<div class="bar"><span style="width:58%"></span></div>
<p>58% Used</p>
</div>

<div class="card">
<div class="status warning"></div>
<h2>Network</h2>
<div class="bar"><span style="width:84%"></span></div>
<p>84 Mbps</p>
</div>

<div class="card">
<div class="status online"></div>
<h2>Disk</h2>
<div class="bar"><span style="width:46%"></span></div>
<p>46% Occupied</p>
</div>

</div>

</div>

</body>
</html>
