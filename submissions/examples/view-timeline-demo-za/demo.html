<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Timeline Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>View Timeline Reveal</h1>
  <p class="lede">Elements animate as they enter the viewport using view-timeline.</p>
  <div class="gallery">
    <div class="reveal-card">
      <div class="card-media" style="background:#6366f1;"></div>
      <div class="card-body"><h3>Card One</h3><p>Fades in as it scrolls into view.</p></div>
    </div>
    <div class="reveal-card">
      <div class="card-media" style="background:#ec4899;"></div>
      <div class="card-body"><h3>Card Two</h3><p>Slides up on scroll entrance.</p></div>
    </div>
    <div class="reveal-card">
      <div class="card-media" style="background:#f59e0b;"></div>
      <div class="card-body"><h3>Card Three</h3><p>Pure CSS, no IntersectionObserver needed.</p></div>
    </div>
    <div class="reveal-card">
      <div class="card-media" style="background:#10b981;"></div>
      <div class="card-body"><h3>Card Four</h3><p>Uses view-timeline for scroll-driven reveal.</p></div>
    </div>
  </div>
</body>
</html>
