<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animation Playground — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Animation Playground</h1>
    <p>Experiment with EaseMotion CSS classes in real time</p>
  </header>

  <main class="playground-wrapper">

    <!-- Controls Panel -->
    <section class="controls-panel">

      <div class="control-group">
        <label class="control-label">Animation</label>
        <select class="control-select" id="animSelect">
          <optgroup label="Fade">
            <option value="ease-fade-in">ease-fade-in</option>
            <option value="ease-fade-out">ease-fade-out</option>
          </optgroup>
          <optgroup label="Slide">
            <option value="ease-slide-up">ease-slide-up</option>
            <option value="ease-slide-down">ease-slide-down</option>
            <option value="ease-slide-left">ease-slide-left</option>
            <option value="ease-slide-right">ease-slide-right</option>
          </optgroup>
          <optgroup label="Zoom">
            <option value="ease-zoom-in">ease-zoom-in</option>
            <option value="ease-zoom-out">ease-zoom-out</option>
          </optgroup>
          <optgroup label="Bounce">
            <option value="ease-bounce">ease-bounce</option>
            <option value="ease-bounce-in">ease-bounce-in</option>
          </optgroup>
          <optgroup label="Rotate">
            <option value="ease-spin">ease-spin</option>
            <option value="ease-rotate-in">ease-rotate-in</option>
          </optgroup>
          <optgroup label="Hover Effects">
            <option value="ease-pulse">ease-pulse</option>
            <option value="ease-shake">ease-shake</option>
            <option value="ease-flip">ease-flip</option>
          </optgroup>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Duration</label>
        <select class="control-select" id="durationSelect">
          <option value="ease-duration-300">300ms</option>
          <option value="ease-duration-500" selected>500ms</option>
          <option value="ease-duration-700">700ms</option>
          <option value="ease-duration-1000">1000ms</option>
          <option value="ease-duration-1500">1500ms</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Delay</label>
        <select class="control-select" id="delaySelect">
          <option value="" selected>None</option>
          <option value="ease-delay-100">100ms</option>
          <option value="ease-delay-200">200ms</option>
          <option value="ease-delay-300">300ms</option>
          <option value="ease-delay-500">500ms</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Timing</label>
        <select class="control-select" id="timingSelect">
          <option value="ease-timing-ease" selected>ease</option>
          <option value="ease-timing-linear">linear</option>
          <option value="ease-timing-ease-in">ease-in</option>
          <option value="ease-timing-ease-out">ease-out</option>
          <option value="ease-timing-ease-in-out">ease-in-out</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Iteration</label>
        <select class="control-select" id="iterationSelect">
          <option value="ease-once" selected>Once</option>
          <option value="ease-twice">Twice</option>
          <option value="ease-infinite">Infinite</option>
        </select>
      </div>

      <div class="control-group">
        <label class="control-label">Direction</label>
        <select class="control-select" id="directionSelect">
          <option value="ease-normal" selected>Normal</option>
          <option value="ease-reverse">Reverse</option>
          <option value="ease-alternate">Alternate</option>
        </select>
      </div>

    </section>

    <!-- Preview Panel -->
    <section class="preview-panel">
      <div class="preview-area">
        <div class="preview-box" id="previewBox">
          <span class="preview-text">Preview</span>
        </div>
      </div>

      <div class="replay-row">
        <button class="btn-replay" id="replayBtn">&#8635; Replay</button>
        <button class="btn-reset" id="resetBtn">&#10006; Reset</button>
      </div>
    </section>

    <!-- Class Generator -->
    <section class="class-generator">
      <label class="control-label">Generated Class</label>
      <div class="class-output-row">
        <code class="class-output" id="classOutput">&lt;div class="ease-fade-in ease-duration-500 ease-timing-ease ease-once ease-normal"&gt;</code>
        <button class="btn-copy" id="copyBtn">&#128203; Copy</button>
      </div>
      <span class="copy-feedback" id="copyFeedback">Copied!</span>
    </section>

  </main>

  <script src="script.js"></script>

</body>
</html>
