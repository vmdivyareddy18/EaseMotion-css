<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Developer Workspace UI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="workspace">

    <aside class="activity-bar">

        <div class="icon active">📁</div>
        <div class="icon">🔍</div>
        <div class="icon">🌿</div>
        <div class="icon">⚙️</div>

    </aside>

    <aside class="explorer">

        <h3>EXPLORER</h3>

        <div class="file">📄 app.js</div>
        <div class="file">📄 styles.css</div>
        <div class="file">📄 index.html</div>
        <div class="file">📄 README.md</div>

    </aside>

    <main class="editor">

        <div class="tabs">

            <div class="tab active">
                app.js
            </div>

            <div class="tab">
                styles.css
            </div>

        </div>

        <pre class="code">
<span class="keyword">const</span> app =
<span class="string">"EaseMotion CSS"</span>;

<span class="keyword">function</span> launch() {
    console.log(app);
}
        </pre>

        <div class="terminal">

$ npm install easemotion-css

✔ Installed successfully

✔ Ready to build
        </div>

    </main>

</div>

<div class="status-bar">

    <span>main</span>

    <span>JavaScript</span>

    <span>UTF-8</span>

</div>

</body>
</html>
