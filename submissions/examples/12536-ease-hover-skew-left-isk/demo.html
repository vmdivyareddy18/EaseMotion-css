<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-hover-skew-left-isk</title>
  <meta name="description" content="A demonstration of the ease-hover-skew-left-isk animation showing elements leaning/skewing to the left on hover.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-hover-skew-left-isk</h1>
      <p class="subtitle" id="main-desc">Hover over the elements below to see them skew to the left</p>
    </header>

    <div class="display-area">
      <!-- Demo Button -->
      <button class="demo-button ease-hover-skew-left-isk" id="button-target">
        Interactive Button
      </button>

      <!-- Demo Card -->
      <div class="demo-card ease-hover-skew-left-isk" id="card-target">
        <h3>Feature Card</h3>
        <p>This card leans left on hover for a modern physical interface feel. Great for dashboard widgets and layout grids.</p>
      </div>
    </div>
  </main>

</body>
</html>
