<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Command Center</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="command-shell" aria-labelledby="command-title">
    <section class="command-panel">
      <div class="copy">
        <p class="eyebrow">live response</p>
        <h1 id="command-title">Incident command center</h1>
        <p>Critical signals sweep into a focused response surface for teams watching severity, ownership, and next action.</p>
      </div>

      <div class="command-grid" aria-label="Incident response overview">
        <article class="status-card severe">
          <span class="label">severity</span>
          <strong>SEV-2</strong>
        </article>
        <article class="status-card owner">
          <span class="label">owner</span>
          <strong>Platform</strong>
        </article>
        <article class="status-card action">
          <span class="label">next step</span>
          <strong>Mitigate</strong>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
