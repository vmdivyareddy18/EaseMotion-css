<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Glow Text Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      margin: 0;
      color: #e0e0e0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #555;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .demo-label {
      font-size: 12px;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Neon Glow Text Effect</h2>
    
    <div class="demo-row">
      <!-- Default Neon -->
      <div class="demo-item">
        <h1 class="neon-text" data-text="NEON">NEON</h1>
        <span class="demo-label">Default Pink</span>
      </div>
      
      <!-- Cyan Neon -->
      <div class="demo-item">
        <h1 class="neon-text neon-cyan" data-text="CYBER">CYBER</h1>
        <span class="demo-label">Cyan</span>
      </div>
      
      <!-- Green Neon -->
      <div class="demo-item">
        <h1 class="neon-text neon-green" data-text="MATRIX">MATRIX</h1>
        <span class="demo-label">Green</span>
      </div>
      
      <!-- Purple Neon -->
      <div class="demo-item">
        <h1 class="neon-text neon-purple" data-text="FUTURE">FUTURE</h1>
        <span class="demo-label">Purple</span>
      </div>
      
      <!-- Flickering -->
      <div class="demo-item">
        <h1 class="neon-text neon-flicker" data-text="OPEN">OPEN</h1>
        <span class="demo-label">Flickering</span>
      </div>
      
      <!-- Subtle Glow -->
      <div class="demo-item">
        <p class="neon-text neon-subtle" data-text="nightlife">nightlife</p>
        <span class="demo-label">Subtle</span>
      </div>
    </div>
  </div>
</body>
</html>
