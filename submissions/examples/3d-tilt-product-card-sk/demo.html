<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Product Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>3D Tilt Product Card</h1>
    <p>A premium cursor-tracking 3D card effect for modern e-commerce showcases and portfolios.</p>

    <!-- Wrapper establishes perspective -->
    <div class="tilt-wrapper" data-tilt>
      <div class="ease-card product-card">
        
        <!-- Floating Element Effect (Parallax) -->
        <div class="card-image-wrapper">
          <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?q=80&w=400&auto=format&fit=crop" alt="Premium Wireless Headphones" class="product-img">
        </div>

        <div class="card-content">
          <div class="product-category">Audio</div>
          <h3 class="product-title">Wireless Headphones</h3>
          <p class="product-desc">Premium high-fidelity audio experience with active noise cancellation.</p>
          
          <div class="product-footer">
            <span class="product-price">$299</span>
            <button class="ease-btn ease-btn-primary pulse-hover">Buy Now</button>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
