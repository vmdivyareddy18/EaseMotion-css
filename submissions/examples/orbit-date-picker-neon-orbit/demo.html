<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Space Logistics Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="neon-void-stage">
    <div class="date-picker-orbit-card">
      
      <div class="panel-header-meta">
        <h4>ORBITAL DATE DECK</h4>
        <span class="system-status">SYNC STAGED</span>
      </div>

      <!-- Pure CSS focus interactive area managing continuous ring animation loops -->
      <div class="interactive-picker-wrapper">
        <input type="date" id="cosmic-date-node" class="hidden-date-input">
        
        <label for="cosmic-date-node" class="orbit-target-surface" tabindex="0">
          <div class="glowing-orbit-ring"></div>
          <div class="glowing-orbit-ring inner-ring"></div>
          
          <div class="center-content-node">
            <span class="calendar-icon-sphere">📅</span>
            <span class="action-caption">Select Mission Date</span>
          </div>
        </label>
      </div>

      <p class="panel-footer-log">System tracking defaults automatically to planetary node re-entry coordinates.</p>
    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers to the checkbox/input label hook
    const targetLabel = document.querySelector('.orbit-target-surface');
    targetLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(targetLabel.getAttribute('for')).showPicker();
      }
    });
  </script>
</body>
</html>
