<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clipboard Copy Feedback</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Clipboard Copy Feedback</h1>
  <div class="demo-list">
    <div class="copy-card">
      <code>&lt;button class="btn"&gt;Click&lt;/button&gt;</code>
      <button class="copy-btn" data-copy="<button class=\"btn\">Click</button>" type="button">
        <span class="copy-label">Copy</span>
        <span class="copy-success">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Copied!
        </span>
      </button>
    </div>
    <div class="copy-card">
      <code>npm install ease-motion</code>
      <button class="copy-btn" data-copy="npm install ease-motion" type="button">
        <span class="copy-label">Copy</span>
        <span class="copy-success">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Copied!
        </span>
      </button>
    </div>
    <div class="copy-card">
      <code>git clone https://github.com/user/repo.git</code>
      <button class="copy-btn" data-copy="git clone https://github.com/user/repo.git" type="button">
        <span class="copy-label">Copy</span>
        <span class="copy-success">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Copied!
        </span>
      </button>
    </div>
  </div>
  <script>
    document.querySelectorAll('.copy-btn').forEach(btn => {
      btn.addEventListener('click', async function () {
        const text = this.dataset.copy;
        try {
          await navigator.clipboard.writeText(text);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed';
          ta.style.opacity = '0';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        this.classList.add('copy-btn--success');
        setTimeout(() => this.classList.remove('copy-btn--success'), 2000);
      });
    });
  </script>
</body>
</html>
