<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flash Countdown Timer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="hero">
      <div class="content">
        <span class="badge">🔥 Limited Time Offer</span>
        <h1>Flash Sale Ends Soon</h1>
        <p>Grab your favorite products before the timer reaches zero.</p>
        <div class="countdown">
          <div class="card ease-flash">
            <h2>07</h2>
            <span>Days</span>
          </div>
          <div class="separator">:</div>
          <div class="card ease-flash delay-1">
            <h2>12</h2>
            <span>Hours</span>
          </div>
          <div class="separator">:</div>
          <div class="card ease-flash delay-2">
            <h2>45</h2>
            <span>Minutes</span>
          </div>
          <div class="separator">:</div>
          <div class="card ease-flash delay-3">
            <h2>18</h2>
            <span>Seconds</span>
          </div>
        </div>
        <button>Shop Now</button>
      </div>
    </section>
  </body>
</html>
