<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Battery Charge Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="battery-title">
        <p class="eyebrow">Status animation</p>
        <h1 id="battery-title">Battery charge fill</h1>
        <p class="demo-copy">
          A CSS-only battery meter fills from left to right and pulses when it
          reaches full charge.
        </p>

        <div
          class="battery-charge"
          role="img"
          aria-label="Battery charging animation"
        >
          <span class="battery-level"></span>
        </div>
      </section>
    </main>
  </body>
</html>
