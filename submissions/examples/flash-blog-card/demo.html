<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flash Blog Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="blog-wrapper">

  <article class="flash-blog-card">
    <div class="card-image">
      <img src="https://images.unsplash.com/photo-1576091160399-112ba8d25d1d"
           alt="Medical dashboard">
    </div>

    <div class="card-content">
      <span class="category">Medical</span>
      <h2>Healthcare Dashboard Updates</h2>
      <p>
        Explore modern healthcare solutions and digital medical
        dashboard experiences.
      </p>

      <button class="read-btn">
        Read More
      </button>
    </div>

    <span class="flash"></span>
  </article>

</section>

</body>
</html>
