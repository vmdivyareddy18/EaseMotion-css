<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Physics Tooltip</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="card">
        <h2>$12.8K</h2>
        <p>Revenue</p>

        <div class="tooltip-wrapper">
            <button class="info-btn">i</button>

            <div class="tooltip">
                Revenue generated this month.
            </div>
        </div>
    </div>

    <div class="card">
        <h2>4,825</h2>
        <p>Users</p>

        <div class="tooltip-wrapper">
            <button class="info-btn">i</button>

            <div class="tooltip">
                Active users in the last 30 days.
            </div>
        </div>
    </div>

    <div class="card">
        <h2>84%</h2>
        <p>Conversion</p>

        <div class="tooltip-wrapper">
            <button class="info-btn">i</button>

            <div class="tooltip">
                Visitor to customer conversion rate.
            </div>
        </div>
    </div>

    <div class="card">
        <h2>19.2K</h2>
        <p>Sessions</p>

        <div class="tooltip-wrapper">
            <button class="info-btn">i</button>

            <div class="tooltip">
                Total dashboard visits this week.
            </div>
        </div>
    </div>

</div>

</body>
</html>
