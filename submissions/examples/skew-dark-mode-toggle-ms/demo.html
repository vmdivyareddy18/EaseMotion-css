<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skew Dark Mode Toggle</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f8fafc; font-family: system-ui, sans-serif; transition: background 0.4s ease;">
  
  <div class="toggle-container ease-fade-in-up">
    <!-- CSS-only theme toggle logic using checkbox hack on the body -->
    <input type="checkbox" id="theme-toggle" class="theme-toggle">
    
    <label for="theme-toggle" class="skew-toggle ease-hover-scale">
      <div class="toggle-track">
        <div class="toggle-indicator ease-skew-x">
          <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </div>
      </div>
      <span class="toggle-label">Toggle Theme</span>
    </label>
  </div>
  
  <!-- Global theme styling using CSS :has() selector (modern way without JS) -->
  <style>
    body:has(#theme-toggle:checked) {
      background: #0f172a;
    }
    body:has(#theme-toggle:checked) .toggle-label {
      color: #cbd5e1;
    }
  </style>

</body>
</html>
