<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Analytics Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <header class="dashboard-header">

        <h1>Analytics Dashboard</h1>

        <div class="status">
            ● Live Data
        </div>

    </header>

    <section class="stats">

        <div class="stat-card">
            <span class="label">Visitors</span>
            <h2>128.4K</h2>
            <span class="growth">+18%</span>
        </div>

        <div class="stat-card">
            <span class="label">Revenue</span>
            <h2>$42.8K</h2>
            <span class="growth">+11%</span>
        </div>

        <div class="stat-card">
            <span class="label">Conversions</span>
            <h2>8.4%</h2>
            <span class="growth">+6%</span>
        </div>

        <div class="stat-card">
            <span class="label">Retention</span>
            <h2>92%</h2>
            <span class="growth">+4%</span>
        </div>

    </section>

    <section class="content">

        <div class="chart-card">

            <h3>Traffic Overview</h3>

            <div class="chart">

                <div class="bar" style="--height:65%"></div>
                <div class="bar" style="--height:45%"></div>
                <div class="bar" style="--height:90%"></div>
                <div class="bar" style="--height:75%"></div>
                <div class="bar" style="--height:100%"></div>
                <div class="bar" style="--height:60%"></div>

            </div>

        </div>

        <div class="activity-card">

            <h3>Recent Activity</h3>

            <div class="activity-item">
                🚀 New deployment completed
            </div>

            <div class="activity-item">
                📈 Traffic increased by 18%
            </div>

            <div class="activity-item">
                ⭐ Premium subscription activated
            </div>

            <div class="activity-item">
                🔥 New milestone reached
            </div>

        </div>

    </section>

</div>

</body>
</html>
