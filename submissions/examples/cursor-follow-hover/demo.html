<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Cursor Follow Hover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
  <div class="follow-card">
    <h2>Hover Me</h2>
    <p>The card subtly follows your cursor.</p>
  </div>
</div>

<script>
const card = document.querySelector('.follow-card');

card.addEventListener('mousemove', (e) => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left - rect.width / 2;
  const y = e.clientY - rect.top - rect.height / 2;

  card.style.setProperty('--ease-mx', `${x * 0.08}px`);
  card.style.setProperty('--ease-my', `${y * 0.08}px`);
});

card.addEventListener('mouseleave', () => {
  card.style.setProperty('--ease-mx', '0px');
  card.style.setProperty('--ease-my', '0px');
});
</script>

</body>
</html>
