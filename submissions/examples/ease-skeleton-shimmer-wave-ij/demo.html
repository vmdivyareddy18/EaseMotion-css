<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Shimmer Wave Demo (ij)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #0f172a;
        color: #f8fafc;
      }
      :root {
        --skeleton-base-color: #1e293b;
        --skeleton-shimmer-color: rgba(255, 255, 255, 0.08);
      }
    }
    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .controls {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .toggle-btn {
      font-family: "Inter", sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.65rem 1.75rem;
      border: none;
      border-radius: 8px;
      background: #6366f1;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-btn:hover { background: #4f46e5; }
    .toggle-btn:active { transform: scale(0.97); }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Skeleton Shimmer Wave</h1>
  <div class="controls">
    <button class="toggle-btn" id="toggleBtn">Toggle Loading</button>
  </div>
  <div class="container" id="skeletonContainer">
    <div class="skeleton-card-ij" id="card1">
      <div class="skeleton-ij skeleton-avatar-ij"></div>
      <div style="flex: 1;">
        <div class="skeleton-ij skeleton-title-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
      </div>
    </div>
    <div class="skeleton-card-ij" id="card2">
      <div class="skeleton-ij skeleton-avatar-ij"></div>
      <div style="flex: 1;">
        <div class="skeleton-ij skeleton-title-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
      </div>
    </div>
    <div class="skeleton-card-ij" id="card3">
      <div class="skeleton-ij skeleton-avatar-ij"></div>
      <div style="flex: 1;">
        <div class="skeleton-ij skeleton-title-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
        <div class="skeleton-ij skeleton-text-ij"></div>
      </div>
    </div>
  </div>
  <script>
    const toggleBtn = document.getElementById("toggleBtn");
    const skeletons = document.querySelectorAll(".skeleton-ij");
    let loading = true;
    toggleBtn.addEventListener("click", () => {
      loading = !loading;
      toggleBtn.textContent = loading ? "Toggle Loading" : "Toggle Loading";
      skeletons.forEach(el => el.classList.toggle("loaded-ij", !loading));
    });
  </script>
</body>
</html>
