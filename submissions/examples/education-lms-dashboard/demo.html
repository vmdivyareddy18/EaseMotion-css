<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Education LMS Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="lms-dashboard">
    <header class="lms-header">
      <div>
        <span class="badge">Student Space</span>
        <h1>Learning Dashboard</h1>
      </div>
      <div class="progress-indicator">
        <span>Overall Semester Progress</span>
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" style="width: 68%"></div>
        </div>
      </div>
    </header>

    <div class="lms-grid">
      <!-- Course Deck -->
      <section class="card course-card">
        <h3>Active Courses</h3>
        <div class="course-list">
          <div class="course-item">
            <div class="course-info">
              <h4>Algorithms & Data Structures</h4>
              <p>Next Assignment: Red-Black Tree evaluation</p>
            </div>
            <span class="prog">72%</span>
          </div>
          <div class="course-item">
            <div class="course-info">
              <h4>Compiler Design Principles</h4>
              <p>Next Assignment: LL(1) Parser code</p>
            </div>
            <span class="prog">48%</span>
          </div>
        </div>
      </section>

      <!-- Stats -->
      <section class="card stats-card">
        <h3>Class Statistics</h3>
        <div class="stat-row">
          <div class="stat-item">
            <span>Completed Credits</span>
            <h4>18 / 24</h4>
          </div>
          <div class="stat-item">
            <span>Current GPA</span>
            <h4>3.85</h4>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
