<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple Effect Button (ij)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 3rem 1.5rem;
    }

    @media (prefers-color-scheme: light) {
      body {
        background: #f8fafc;
        color: #0f172a;
      }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      text-align: center;
    }

    .demo-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
    }

    .demo-section label {
      width: 100%;
      font-size: 0.85rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>Ripple Effect Button</h1>

  <div class="demo-section">
    <label>Variants</label>
    <button class="reb-btn primary">Primary</button>
    <button class="reb-btn secondary">Secondary</button>
    <button class="reb-btn outline">Outline</button>
    <button class="reb-btn danger">Danger</button>
  </div>

  <div class="demo-section">
    <label>Sizes</label>
    <button class="reb-btn primary small">Small</button>
    <button class="reb-btn primary">Default</button>
    <button class="reb-btn primary large">Large</button>
  </div>

  <script>
    document.querySelectorAll('.reb-btn').forEach(function(btn) {
      btn.addEventListener('click', function(e) {
        var rect = btn.getBoundingClientRect();
        var size = Math.max(rect.width, rect.height);
        var x = e.clientX - rect.left - size / 2;
        var y = e.clientY - rect.top - size / 2;

        var ripple = document.createElement('span');
        ripple.className = 'reb-ripple';
        ripple.style.width = size + 'px';
        ripple.style.height = size + 'px';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        btn.appendChild(ripple);

        ripple.addEventListener('animationend', function() {
          ripple.remove();
        });
      });
    });
  </script>

</body>
</html>
