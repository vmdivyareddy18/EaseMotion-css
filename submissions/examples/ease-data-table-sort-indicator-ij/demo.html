<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Table Sort Indicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="table-container">
    <h1>Sortable Data Table</h1>
    <div class="table-wrapper">
      <table class="sort-table" id="sortTable">
        <thead>
          <tr>
            <th data-col="name" data-sort="none">Name <span class="sort-arrow"></span></th>
            <th data-col="role" data-sort="none">Role <span class="sort-arrow"></span></th>
            <th data-col="department" data-sort="none">Department <span class="sort-arrow"></span></th>
            <th data-col="salary" data-sort="none">Salary <span class="sort-arrow"></span></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td>Alice Chen</td><td>Designer</td><td>Product</td><td>$85,000</td></tr>
          <tr><td>Bob Martinez</td><td>Developer</td><td>Engineering</td><td>$110,000</td></tr>
          <tr><td>Carol Singh</td><td>Manager</td><td>Product</td><td>$130,000</td></tr>
          <tr><td>David Kim</td><td>Developer</td><td>Engineering</td><td>$105,000</td></tr>
          <tr><td>Eve Johnson</td><td>Designer</td><td>Marketing</td><td>$78,000</td></tr>
          <tr><td>Frank Lee</td><td>Analyst</td><td>Finance</td><td>$92,000</td></tr>
        </tbody>
      </table>
    </div>
    <p class="table-hint">Click any column header to sort</p>
  </div>
  <script src="demo.js"></script>
</body>
</html>
