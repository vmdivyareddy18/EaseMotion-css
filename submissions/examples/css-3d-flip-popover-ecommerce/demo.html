<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 3D Flip Popover - E-Commerce Checkout</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-viewport">
        <div class="checkout-container-card">
            <div class="summary-header">
                <span class="summary-title">ORDER SUMMARY</span>
                <span class="summary-amount">$249.00</span>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">View Promo Details</span>
                        <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 16v-4"/>
                            <path d="M12 8h.01"/>
                        </svg>
                    </button>
                    
                    <div class="flip-popover-card" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-promo">PROMO APPLIED</span>
                                <p class="promo-code-title">WELCOME_10</p>
                            </div>
                            <div class="popover-body">
                                <p class="promo-desc">Extra 10% off has been successfully loaded into your active checkout basket profile.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <button class="checkout-proceed-btn">Proceed to Payment</button>
        </div>
    </div>

</body>
</html>
