<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Loading Button Component Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo Page Layout Styles (Kept separate from component code) */
    body {
      background-color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .demo-container {
      background: #ffffff;
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .demo-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2 style="margin-top: 0; font-family: sans-serif; color: #0f172a;">EaseMotion Button States</h2>
    <p style="color: #64748b; font-family: sans-serif; font-size: 0.9rem;">
      Demonstrating the composable primary, hover, and operational loading states.
    </p>

    <div class="demo-actions">
      <!-- 1. Normal State -->
      <button class="ease-btn ease-btn-primary">
        Regular Button
      </button>

      <!-- 2. Extra Hover/Glow Effect State -->
      <button class="ease-btn ease-btn-primary ease-btn-hover">
        Button with Extra Lift Effect
      </button>

      <!-- 3. Active Loading State (Fixed Alignment Bug) -->
      <button class="ease-btn ease-btn-primary ease-btn-loading">
        Processing Action...
      </button>
    </div>
  </div>

</body>
</html>
