<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <article class="review">
    <div class="rv-head">
      <span class="rv-avatar">GH</span>
      <div class="rv-who">
        <span class="rv-name">
          Grace H.
          <span class="rv-verified"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m5 13 4 4 10-11" stroke-linecap="round" stroke-linejoin="round" /></svg>Verified</span>
        </span>
        <span class="rv-date">Reviewed 8 Jul 2026</span>
      </div>
    </div>
    <div class="rv-rate">
      <span class="rv-stars" style="--pct: 80%" role="img" aria-label="Rated 4 of 5"></span>
      <span class="rv-title">Sturdy and well made</span>
    </div>
    <p class="rv-text">Exactly as described and the build quality is excellent. Setup took two minutes and it has held up well after a month of daily use.</p>
    <div class="rv-foot">
      <button class="rv-helpful" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 10v11H4a1 1 0 0 1-1-1v-9a1 1 0 0 1 1-1zm0 0 4-7a2 2 0 0 1 2 2v3h5a2 2 0 0 1 2 2.4l-1.4 7A2 2 0 0 1 16.6 21H7" stroke-linejoin="round" /></svg>
        Helpful (12)
      </button>
      <a class="rv-report" href="#">Report</a>
    </div>
  </article>
</body>
</html>
