<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaseMotion Showcase Search Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Components Showcase</h2>

  <!-- Search bar -->
  <input type="text" id="searchInput" placeholder="Search components..." />

  <!-- Showcase list -->
  <div id="showcase">
    <div class="component-card">ease-fade-in</div>
    <div class="component-card">ease-hover-grow</div>
    <div class="component-card">ease-slide-up</div>
    <div class="component-card">ease-btn-loading</div>
    <div class="component-card">ease-scroll-top</div>
  </div>

  <script>
    const input = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".component-card");

    input.addEventListener("input", () => {
      const query = input.value.toLowerCase();
      cards.forEach(card => {
        card.style.display = card.textContent.toLowerCase().includes(query)
          ? "block"
          : "none";
      });
    });
  </script>
</body>
</html>
