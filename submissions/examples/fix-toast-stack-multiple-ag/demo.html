<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Stacking Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-toast – Multiple Toast Stacking Fix</h2>
  <button class="btn btn-blue" onclick="addToast('info','Saved!','Your changes were saved successfully.')">Info toast</button>
  <button class="btn btn-green" onclick="addToast('success','Done!','File uploaded in 2.3s.')">Success toast</button>
  <button class="btn btn-red" onclick="addToast('error','Error!','Connection lost. Retrying…')">Error toast</button>

  <!-- KEY FIX: container stacks all toasts -->
  <div class="ease-toast-container" id="toastContainer" aria-live="polite" aria-atomic="false"></div>
  <script>
    function addToast(type, title, msg) {
      const icons = {info:'ℹ️',success:'✅',error:'🛑',warning:'⚠️'};
      const t = document.createElement('div');
      t.className = `ease-toast ease-toast--${type}`;
      t.setAttribute('role','status');
      t.innerHTML = `
        <span class="ease-toast__icon" aria-hidden="true">${icons[type]}</span>
        <div class="ease-toast__body"><div class="ease-toast__title">${title}</div>${msg}</div>
        <button class="ease-toast__close" aria-label="Dismiss" onclick="this.closest('.ease-toast').remove()">✕</button>`;
      document.getElementById('toastContainer').appendChild(t);
      setTimeout(() => t.remove(), 4000);
    }
  </script>
</body>
</html>
