<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-counter Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            background: #0f0f0f;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }

        h1 {
            color: #f1f1f1;
            font-size: 1.5rem;
            margin: 0;
        }

        p.hint {
            color: #6c7086;
            font-size: 0.85rem;
            margin: 0;
        }

        .stats {
            display: flex;
            gap: 3rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat {
            text-align: center;
            background: #1e1e2e;
            border: 1px solid #313244;
            border-radius: 1rem;
            padding: 2rem 2.5rem;
        }

        .stat .value {
            font-size: 3rem;
            font-weight: 700;
            color: #cba6f7;
        }

        .stat .label {
            font-size: 0.9rem;
            color: #a6adc8;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <h1>ease-counter Demo</h1>
    <p class="hint">Scroll down to trigger (or refresh to replay)</p>

    <div class="stats">
        <div class="stat">
            <div class="value ease-counter" data-target="1000">0</div>
            <div class="label">Stars</div>
        </div>
        <div class="stat">
            <div class="value ease-counter" data-target="376">0</div>
            <div class="label">Contributors</div>
        </div>
        <div class="stat">
            <div class="value ease-counter" data-target="99.9" style="--ease-counter-duration: 3s;">0</div>
            <div class="label">Uptime %</div>
        </div>
        <div class="stat">
            <div class="value ease-counter" data-target="5158" style="--ease-counter-duration: 2.5s;">0</div>
            <div class="label">Merged PRs</div>
        </div>
    </div>

    <script>
        (function () {
            const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function parseDuration(val) {
                if (!val) return 2000;
                val = val.trim();
                if (val.endsWith('ms')) return parseFloat(val);
                return parseFloat(val) * 1000; /* handles "2s" and bare numbers */
            }

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function animateCounter(el) {
                const rawTarget = el.getAttribute('data-target');
                if (!rawTarget) return;

                const target = parseFloat(rawTarget);
                const isDecimal = rawTarget.includes('.');
                const decimals = isDecimal ? (rawTarget.split('.')[1] || '').length : 0;

                if (prefersReduced) {
                    el.textContent = target.toFixed(decimals);
                    return;
                }

                const durationStr = getComputedStyle(el).getPropertyValue('--ease-counter-duration');
                const duration = parseDuration(durationStr);
                const start = performance.now();

                function tick(now) {
                    const elapsed = now - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const current = easeOutCubic(progress) * target;
                    el.textContent = isDecimal ? current.toFixed(decimals) : Math.floor(current);
                    if (progress < 1) {
                        requestAnimationFrame(tick);
                    } else {
                        el.textContent = target.toFixed(decimals);
                    }
                }

                requestAnimationFrame(tick);
            }

            const observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            animateCounter(entry.target);
                            observer.unobserve(entry.target);
                        }
                    });
                },
                { threshold: 0.2 }
            );

            document.querySelectorAll('.ease-counter').forEach((el) => observer.observe(el));
        })();
    </script>
</body>

</html>
