<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Button - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="lb-header"><h1>CSS Loading Button</h1><p>Buttons with spinner, progress, and state indicators during async operations</p></header>
<section class="lb-section"><h2>Spinner Buttons</h2><div class="lb-row"><button class="lb-btn lb-loading lb-spinner">Save</button><button class="lb-btn lb-loading lb-spinner-primary">Primary</button><button class="lb-btn lb-loading lb-dots">Loading</button><button class="lb-btn lb-loading lb-ring">Submit</button></div></section>
<section class="lb-section"><h2>Progress Buttons</h2><div class="lb-row"><button class="lb-btn lb-loading lb-progress">Upload</button><button class="lb-btn lb-loading lb-progress-right">Download</button></div></section>
<section class="lb-section"><h2>Button States</h2><div class="lb-row"><div class="lb-state-group"><button class="lb-btn lb-idle">Idle</button><button class="lb-btn lb-loading lb-spinner">Loading</button><button class="lb-btn lb-success">&#10003; Done</button><button class="lb-btn lb-error">&#9888; Failed</button></div></div></section>
<section class="lb-section"><h2>Size Variants</h2><div class="lb-row"><button class="lb-btn lb-sm lb-loading lb-spinner">Small</button><button class="lb-btn lb-loading lb-spinner">Default</button><button class="lb-btn lb-lg lb-loading lb-spinner">Large</button><button class="lb-btn lb-xl lb-loading lb-spinner">X-Large</button></div></section>
<section class="lb-section"><h2>Animated Text</h2><div class="lb-row"><button class="lb-btn lb-loading lb-text-pulse">Processing</button><button class="lb-btn lb-loading lb-text-dots">Please wait</button></div></section>
<footer class="ftr"><p>EaseMotion CSS - Loading Button | GSSoC 2026</p></footer>
</body>
</html>
