<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crystallize Weather Widget</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #0f172a; font-family: system-ui, sans-serif;">

  <div class="weather-widget ease-scale-up-vertical">
    <div class="widget-header">
      <span class="location">Zermatt, Switzerland</span>
      <span class="date">Today</span>
    </div>

    <div class="weather-main">
      <div class="crystal-icon ease-focus-in">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2v20M2 12h20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/>
          <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="temp-display">
        <span class="temp-value">-4</span>
        <span class="temp-unit">½C</span>
      </div>
    </div>

    <p class="condition">Crisp &amp; Frosty</p>

    <div class="widget-footer">
      <div class="stat">
        <span class="stat-label">Humidity</span>
        <span class="stat-value">62%</span>
      </div>
      <div class="stat">
        <span class="stat-label">Wind</span>
        <span class="stat-value">8 km/h</span>
      </div>
    </div>
  </div>

</body>
</html>
