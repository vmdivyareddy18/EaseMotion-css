<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Input Highlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="fi-container">
    <h1>Focus Input Highlight</h1>
    <p class="fi-desc">Focus any input to see the animated underline highlight.</p>

    <form class="fi-form" autocomplete="off">
      <div class="fi-field">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="e.g. Jane Doe">
      </div>
      <div class="fi-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="e.g. jane@example.com">
      </div>
      <div class="fi-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <div class="fi-field">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="e.g. +1 555 123 4567">
      </div>
      <div class="fi-field">
        <label for="message">Message</label>
        <textarea id="message" rows="3" placeholder="Write something..."></textarea>
      </div>
    </form>
  </main>
</body>
</html>
