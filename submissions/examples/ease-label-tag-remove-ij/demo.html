<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Tag Remove - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ltr-wrapper">
    <h1>Tags / Labels</h1>
    <p class="ltr-desc">Hover a tag to reveal remove button. Click X to remove with animation.</p>
    <div class="ltr-tag-container" id="ltrTags">
      <div class="ltr-tag" style="--ltr-removing: 0; --ltr-color: #e94560;">
        <span class="ltr-label">JavaScript</span>
        <button class="ltr-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="ltr-tag" style="--ltr-removing: 0; --ltr-color: #0f3460;">
        <span class="ltr-label">TypeScript</span>
        <button class="ltr-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="ltr-tag" style="--ltr-removing: 0; --ltr-color: #533483;">
        <span class="ltr-label">React</span>
        <button class="ltr-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="ltr-tag" style="--ltr-removing: 0; --ltr-color: #1a8a5c;">
        <span class="ltr-label">CSS</span>
        <button class="ltr-remove" aria-label="Remove">&times;</button>
      </div>
      <div class="ltr-tag" style="--ltr-removing: 0; --ltr-color: #e9c46a;">
        <span class="ltr-label">HTML</span>
        <button class="ltr-remove" aria-label="Remove">&times;</button>
      </div>
    </div>
    <div class="ltr-add-row">
      <input class="ltr-add-input" id="ltrAddInput" type="text" placeholder="Add a tag..." maxlength="30">
      <button class="ltr-add-btn" id="ltrAddBtn">Add</button>
    </div>
  </div>
  <script>
    (function() {
      var container = document.getElementById('ltrTags');
      var addInput = document.getElementById('ltrAddInput');
      var addBtn = document.getElementById('ltrAddBtn');
      var colors = ['#e94560','#0f3460','#533483','#1a8a5c','#e9c46a','#2a9d8f','#f4a261','#264653'];

      container.addEventListener('click', function(e) {
        var btn = e.target.closest('.ltr-remove');
        if (!btn) return;
        var tag = btn.closest('.ltr-tag');
        tag.style.setProperty('--ltr-removing', 1);
        setTimeout(function() { if (tag.parentNode) tag.parentNode.removeChild(tag); }, 400);
      });

      function addTag() {
        var val = addInput.value.trim();
        if (!val) return;
        var tag = document.createElement('div');
        tag.className = 'ltr-tag';
        var c = colors[Math.floor(Math.random() * colors.length)];
        tag.style.cssText = '--ltr-removing: 0; --ltr-color: ' + c + ';';
        tag.innerHTML = '<span class="ltr-label">' + val.replace(/</g,'&lt;') + '</span><button class="ltr-remove" aria-label="Remove">&times;</button>';
        container.appendChild(tag);
        addInput.value = '';
        addInput.focus();
      }

      addBtn.addEventListener('click', addTag);
      addInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') addTag(); });
    })();
  </script>
</body>
</html>
