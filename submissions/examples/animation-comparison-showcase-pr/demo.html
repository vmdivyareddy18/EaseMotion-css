<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Interactive Animation Comparison Showcase</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .showcase-wrapper {
      max-width: 900px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 0.25rem;
    }

    .hint {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="showcase-wrapper">
    <h2>Animation Comparison Showcase</h2>
    <p class="hint">Hover each card to preview the animation →</p>

    <div class="ease-showcase-grid">

      <div class="ease-showcase-card">
        <h4>Fade In</h4>
        <p>Opacity transition</p>
        <div class="ease-showcase-box ease-fade-in"></div>
      </div>

      <div class="ease-showcase-card">
        <h4>Slide In</h4>
        <p>Translate + fade</p>
        <div class="ease-showcase-box ease-slide-in" style="background:#10b981;"></div>
      </div>

      <div class="ease-showcase-card">
        <h4>Bounce</h4>
        <p>Vertical bounce</p>
        <div class="ease-showcase-box ease-bounce" style="background:#f59e0b;"></div>
      </div>

      <div class="ease-showcase-card">
        <h4>Zoom</h4>
        <p>Scale with overshoot</p>
        <div class="ease-showcase-box ease-zoom" style="background:#ef4444;"></div>
      </div>

      <div class="ease-showcase-card">
        <h4>Rotate</h4>
        <p>360° rotation</p>
        <div class="ease-showcase-box ease-rotate" style="background:#3b82f6;"></div>
      </div>

    </div>
  </div>

</body>
</html>
