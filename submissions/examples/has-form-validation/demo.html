<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>:has() Form Validation — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      align-items: center;
    }
    h1 { font-size: 1.5rem; font-weight: 800; color: #0f172a; }
    h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #94a3b8; margin-bottom: 0.75rem; }
    .demo-grid { display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center; }
  </style>
</head>
<body>

  <h1>:has() Form Validation Demo</h1>
  <p style="color:#64748b;font-size:0.875rem;text-align:center;">Forms that validate themselves using the CSS <code>:has()</code> pseudo-class — no JavaScript required.</p>

  <div class="demo-grid">
    <!-- Login Form -->
    <form class="has-form">
      <h3>Login</h3>
      <label>
        Email
        <input type="email" class="has-input" placeholder="you@example.com" required />
        <span class="has-feedback">Please enter a valid email address.</span>
      </label>
      <label>
        Password
        <input type="password" class="has-input" placeholder="Min. 8 characters" required minlength="8" />
        <span class="has-feedback">Password must be at least 8 characters.</span>
      </label>
      <button type="submit" disabled class="has-submit">Submit</button>
      <p class="has-form-status">Form has invalid fields.</p>
    </form>

    <!-- Newsletter Signup -->
    <form class="has-form">
      <h3>Newsletter</h3>
      <label>
        Full Name
        <input type="text" class="has-input" placeholder="John Doe" required minlength="2" />
        <span class="has-feedback">Name must be at least 2 characters.</span>
      </label>
      <label>
        Email
        <input type="email" class="has-input" placeholder="you@example.com" required />
        <span class="has-feedback">Please enter a valid email.</span>
      </label>
      <label class="has-checkbox-label">
        <input type="checkbox" class="has-checkbox" required />
        I agree to the terms
        <span class="has-feedback">You must agree to continue.</span>
      </label>
      <button type="submit" disabled class="has-submit">Subscribe</button>
      <p class="has-form-status">Form has invalid fields.</p>
    </form>

    <!-- Password Reset -->
    <form class="has-form">
      <h3>Password Reset</h3>
      <label>
        New Password
        <input type="password" class="has-input" placeholder="Min. 8 characters" required minlength="8" />
        <span class="has-feedback">Password must be at least 8 characters.</span>
      </label>
      <label>
        Confirm Password
        <input type="password" class="has-input" placeholder="Repeat password" required />
        <span class="has-feedback">Passwords must match.</span>
      </label>
      <button type="submit" disabled class="has-submit">Reset</button>
      <p class="has-form-status">Form has invalid fields.</p>
    </form>
  </div>

  <script>
    document.querySelectorAll('.has-form').forEach(form => {
      form.addEventListener('input', () => {
        const inputs = form.querySelectorAll('.has-input, .has-checkbox');
        const allValid = Array.from(inputs).every(inp => inp.validity.valid);
        form.querySelector('.has-submit').disabled = !allValid;
      });
    });
  </script>

</body>
</html>
