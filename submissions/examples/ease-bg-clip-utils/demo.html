<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>ease-bg-clip Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        padding: 2rem;
        background: #f8fafc;
      }
      h2 {
        color: #6366f1;
      }
      .demo-grid {
        display: flex;
        gap: 1.5rem;
        flex-wrap: wrap;
      }
      .box {
        background: #fff;
        border: 2px dashed #94a3b8;
        border-radius: 8px;
        padding: 1rem;
        text-align: center;
        width: 200px;
      }
      .box.bg-clip-demo {
        background: linear-gradient(135deg, #6366f1, #ec4899);
        padding: 1.5rem;
        border-width: 4px;
        border-style: solid;
        border-color: rgba(0, 0, 0, 0.2);
      }
      code {
        background: #f1f5f9;
        padding: 0.15rem 0.4rem;
        border-radius: 4px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h2>background-clip Utilities</h2>
    <p>
      Each box has a gradient background with dashed border to show the clipping
      boundary:
    </p>

    <div class="demo-grid">
      <div class="box">
        <div><code>ease-bg-clip-border</code></div>
        <div class="bg-clip-demo ease-bg-clip-border">Bg under border</div>
      </div>
      <div class="box">
        <div><code>ease-bg-clip-padding</code></div>
        <div class="bg-clip-demo ease-bg-clip-padding">Stops at padding</div>
      </div>
      <div class="box">
        <div><code>ease-bg-clip-content</code></div>
        <div class="bg-clip-demo ease-bg-clip-content">Only content area</div>
      </div>
      <div class="box">
        <div><code>ease-bg-clip-text</code></div>
        <div
          class="ease-bg-clip-text"
          style="
            background: linear-gradient(135deg, #6366f1, #ec4899);
            font-size: 1.5rem;
            font-weight: 700;
          "
        >
          Clipped Text
        </div>
      </div>
    </div>
  </body>
</html>
