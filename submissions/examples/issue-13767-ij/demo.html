<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-wishlist-heart – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Wishlist Heart</h1>
    <p class="subtitle">Click the heart to toggle the liked state with a pop animation.</p>
    <div class="heart-wrapper">
      <div class="heart-icon" id="heart">❤️</div>
    </div>
    <p class="like-count" id="likeCount">0 likes</p>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const countEl = document.getElementById('likeCount');
    let liked = false;
    let count = 0;

    heart.addEventListener('click', () => {
      liked = !liked;
      heart.classList.toggle('liked', liked);
      count = liked ? count + 1 : count - 1;
      countEl.textContent = `${count} like${count !== 1 ? 's' : ''}`;
    });
  </script>
</body>
</html>
