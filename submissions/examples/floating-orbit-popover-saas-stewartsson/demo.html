<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Control Hub - Floating Orbit Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-viewport">
        <!-- Interactive Micro-Frontend SaaS Control Hub Card Layout -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="neon-matrix-badge">SAAS COMPLIANCE TRUNK</div>
                <h2 class="control-title">Micro-Ingress Console</h2>
                <p class="control-subtitle">Hover over the action module selector below to trigger the pure-CSS floating orbit popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">🌌</span>
                        <span class="btn-text">Open Telemetry Deck</span>
                    </button>

                    <!-- Floating Popover Floating Overlay Menu Shell Box -->
                    <div class="floating-orbit-popover ease-orbit-fly">
                        <!-- Floating Micro-Satelite Orbit Planetary Tracker Nodes -->
                        <div class="orbiting-satellite satellite-cyan ease-satellite-loop-1"></div>
                        <div class="orbiting-satellite satellite-pink ease-satellite-loop-2"></div>
                        
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">SaaS Cloud Actions</h4>
                            <ul class="menu-actions-list">
                                <li class="menu-item"><a href="#cluster" class="action-link-node">Re-scale Cluster Pods</a></li>
                                <li class="menu-item"><a href="#ledger" class="action-link-node">Sync Ledger Channels</a></li>
                                <li class="menu-item"><a href="#purge" class="action-link-node action-danger">Force Cache Purge</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
