<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synthwave Grid Floor - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="retro-scene">

    <p class="scene-title">EaseMotion CSS &mdash; Synthwave Grid Floor</p>

    <!-- Sky with striped sun -->
    <div class="retro-sky">
      <div class="retro-sun"></div>
    </div>

    <!-- Horizon glow line -->
    <div class="retro-horizon"></div>

    <!-- Animated perspective grid floor -->
    <div class="retro-floor">
      <div class="retro-grid-plane"></div>
    </div>

    <!-- Speed controls (JS toggles CSS custom property) -->
    <div class="controls">
      <button onclick="document.documentElement.style.setProperty('--grid-speed', '0.8s')">Fast</button>
      <button onclick="document.documentElement.style.setProperty('--grid-speed', '1.6s')">Normal</button>
      <button onclick="document.documentElement.style.setProperty('--grid-speed', '3.5s')">Slow</button>
    </div>

  </div>

</body>
</html>
