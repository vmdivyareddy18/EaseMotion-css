<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Snap Stop Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Scroll Snap Stop</h1>
      <p class="subtitle">Controls whether a scroll container can skip past mandatory snap points.</p>
      <span class="badge">CSS Property: scroll-snap-stop</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">scroll-snap-stop: normal</span>
          <span class="demo-value scroll-snap-stop-sm">Scroll Snap Stop variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">scroll-snap-stop: always</span>
          <span class="demo-value scroll-snap-stop-md">Scroll Snap Stop variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="scroll-snap-stop"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
