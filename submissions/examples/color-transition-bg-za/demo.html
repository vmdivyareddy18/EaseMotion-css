<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Color Transition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="color-transition-bg">
    <div class="center-card">
      <h1>Smooth Color Transition</h1>
      <p>The background cycles through a curated palette using CSS keyframes with smooth easing.</p>
      <div class="palette-row">
        <span class="swatch" style="background:#6366f1"></span>
        <span class="swatch" style="background:#a855f7"></span>
        <span class="swatch" style="background:#ec4899"></span>
        <span class="swatch" style="background:#f59e0b"></span>
        <span class="swatch" style="background:#10b981"></span>
      </div>
    </div>
  </div>
</body>
</html>
