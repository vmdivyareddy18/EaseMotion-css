<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flex Center Utility - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="demo-container">
        <h1>Smart Flex-Center Utility</h1>

        <div class="demo-section">
            <h2>Default (Row, Medium Gap)</h2>
            <div class="flex-center gap-md">
                <div class="item">Item 1</div>
                <div class="item">Item 2</div>
                <div class="item">Item 3</div>
            </div>
        </div>

        <div class="demo-section">
            <h2>Column Direction with Large Gap</h2>
            <div class="flex-center flex-col gap-lg">
                <div class="item">Header</div>
                <div class="item">Content</div>
                <div class="item">Footer</div>
            </div>
        </div>

        <div class="demo-section">
            <h2>Small Gap (Compact Layout)</h2>
            <div class="flex-center gap-sm">
                <button class="btn">Save</button>
                <button class="btn">Cancel</button>
                <button class="btn">Delete</button>
            </div>
        </div>
    </div>
</body>

</html>
