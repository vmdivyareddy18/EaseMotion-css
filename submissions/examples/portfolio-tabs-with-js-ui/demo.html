<!DOCTYPE html>
<html>
<head>
  <title>Tabs UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="tabs-section">
  <h2>My Work</h2>

  <div class="tabs">
    <button onclick="showTab('projects')">Projects</button>
    <button onclick="showTab('skills')">Skills</button>
    <button onclick="showTab('experience')">Experience</button>
  </div>

  <div id="projects" class="content">Project Content</div>
  <div id="skills" class="content" style="display:none;">Skills Content</div>
  <div id="experience" class="content" style="display:none;">Experience Content</div>

</section>

<script>
function showTab(id) {
  let contents = document.querySelectorAll(".content");
  contents.forEach(c => c.style.display = "none");
  document.getElementById(id).style.display = "block";
}
</script>

</body>
</html>
