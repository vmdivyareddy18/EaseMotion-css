<!DOCTYPE html>
<html>
<head>
  <title>Password Strength UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>Create Password</h2>
  <input type="password" id="pass" onkeyup="checkStrength()" placeholder="Enter password">
  
  <div class="strength">
    <div id="bar"></div>
  </div>

  <p id="text">Strength: </p>
</div>

<script>
function checkStrength() {
  let val = document.getElementById("pass").value;
  let bar = document.getElementById("bar");
  let text = document.getElementById("text");

  if (val.length < 4) {
    bar.style.width = "30%";
    bar.style.background = "red";
    text.innerText = "Strength: Weak";
  } else if (val.length < 8) {
    bar.style.width = "60%";
    bar.style.background = "orange";
    text.innerText = "Strength: Medium";
  } else {
    bar.style.width = "100%";
    bar.style.background = "#00c853";
    text.innerText = "Strength: Strong";
  }
}
</script>

</body>
</html>
