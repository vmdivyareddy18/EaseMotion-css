<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Password Strength</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f1f5f9; font-family: system-ui, sans-serif;">
  
  <div class="auth-card ease-fade-in-up">
    <h2>Create Account</h2>
    <p>Choose a secure password</p>
    
    <div class="input-group">
      <input type="password" class="pwd-input" id="pwd" placeholder="Enter password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}">
      
      <!-- Magnetic indicator block -->
      <div class="magnetic-indicator">
        <div class="magnet-node node-weak ease-bounce"></div>
        <div class="magnet-node node-fair ease-bounce" style="animation-delay: 0.1s"></div>
        <div class="magnet-node node-good ease-bounce" style="animation-delay: 0.2s"></div>
        <div class="magnet-node node-strong ease-bounce" style="animation-delay: 0.3s"></div>
      </div>
      
      <div class="feedback-text ease-fade-in">
        <span class="default-msg">Start typing...</span>
        <span class="strong-msg ease-zoom-in">Looks great! 🚀</span>
      </div>
    </div>
  </div>

</body>
</html>
