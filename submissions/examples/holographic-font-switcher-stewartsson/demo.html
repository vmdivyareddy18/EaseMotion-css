<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoGlitch Holo-Terminal - Font Switcher Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="holo-viewport">
        <!-- Interactive Micro-Frontend Cyber-Terminal Hub Card -->
        <div class="terminal-container">
            <header class="terminal-header">
                <span class="neon-badge">Holo-Matrix v4.2</span>
                <h2 class="terminal-title">Typography Synthesizer</h2>
                <p class="terminal-subtitle">Select a matrix channel check block below to trigger the holographic neon font switcher transforms.</p>
            </header>

            <!-- Holographic Typography Display Stage Area -->
            <div class="hologram-stage-area">
                <!-- Pure-CSS Functional Font Switcher Trigger Matrix Gate Checkboxes -->
                <input type="radio" name="font-selector-gate" id="font-gate-mono" class="font-input-gate font-gate-1" checked>
                <input type="radio" name="font-selector-gate" id="font-gate-sans" class="font-input-gate font-gate-2">
                <input type="radio" name="font-selector-gate" id="font-gate-serif" class="font-input-gate font-gate-3">

                <!-- Neon Laser Projector Controls Selector Row Grid -->
                <div class="projector-controls">
                    <label for="font-gate-mono" class="ctrl-btn label-mono">Ch.01 // MONO</label>
                    <label for="font-gate-sans" class="ctrl-btn label-sans">Ch.02 // SANS</label>
                    <label for="font-gate-serif" class="ctrl-btn label-serif">Ch.03 // SERIF</label>
                </div>

                <!-- Dynamic Futuristic Projection Text Canvas Node Container Shell -->
                <div class="projection-text-display">
                    <div class="holo-text-layer font-target-mono" data-text="TRANSMISSION SECURED">TRANSMISSION SECURED</div>
                    <div class="holo-text-layer font-target-sans" data-text="TRANSMISSION SECURED">TRANSMISSION SECURED</div>
                    <div class="holo-text-layer font-target-serif" data-text="TRANSMISSION SECURED">TRANSMISSION SECURED</div>
                </div>
            </div>

            <footer class="terminal-footer">
                <div class="stream-encryption-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Holographic Projectors Fully Calibrated</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
