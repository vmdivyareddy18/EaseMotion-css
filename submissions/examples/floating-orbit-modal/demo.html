<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Modal - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="hero-container">
        <div class="hero-content">
            <h1>Launch Your Next Big Idea</h1>
            <p>Experience ultra-smooth, zero-JS motion components built exclusively with modern CSS architecture.</p>
            
            <label for="modal-toggle" class="btn-trigger" role="button" tabindex="0">
                Unlock Exclusive Access
            </label>
        </div>
    </main>

    <input type="checkbox" id="modal-toggle" class="modal-state-checkbox" aria-hidden="true">

    <div class="modal-overlay">
        <label for="modal-toggle" class="modal-backdrop-closer"></label>
        
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <label for="modal-toggle" class="modal-btn-close" aria-label="Close modal" role="button" tabindex="0">&times;</label>
            
            <div class="orbit-particle orbit-particle-1"></div>
            <div class="orbit-particle orbit-particle-2"></div>
            <div class="orbit-particle orbit-particle-3"></div>

            <div class="modal-body">
                <span class="badge">Limited Offer</span>
                <h2 id="modal-title">Join the Orbit Beta</h2>
                <p>Get early access to our next-generation animation utility engine before the public release.</p>
                
                <form onsubmit="event.preventDefault();" class="modal-form">
                    <input type="email" placeholder="Enter your email address" required autocomplete="off">
                    <button type="submit" class="btn-submit">Secure My Spot</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Simple helper to allow Space/Enter keys to activate the label triggers for full keyboard accessibility
        document.querySelectorAll('label[role="button"]').forEach(label => {
            label.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault();
                    document.getElementById(label.getAttribute('for')).click();
                }
            });
        });
    </script>
</body>
</html>
