<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Count-Up Number — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 3rem 2rem;
    }
    h1 { text-align: center; font-size: 1.75rem; margin-bottom: 0.5rem; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.9rem; margin-bottom: 3rem; }
    .spacer { height: 40vh; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 0.85rem; }
    .replay-btn {
      display: block;
      margin: 2rem auto 0;
      padding: 10px 28px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    .replay-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <h1>Count-Up Numbers</h1>
  <p class="subtitle">Numbers animate from 0 to target when they enter the viewport</p>

  <div class="spacer">↓ Scroll down to trigger the animation ↓</div>

  <!-- Count-up cards -->
  <div class="count-up-wrapper" id="stats">

    <div class="count-up-card"
         data-target="10000"
         data-prefix=""
         data-suffix="+"
         data-duration="2000">
      <span class="count-up-number">0</span>
      <div class="count-up-bar"><div class="count-up-bar-fill"></div></div>
      <span class="count-up-label">Users</span>
    </div>

    <div class="count-up-card"
         data-target="98.6"
         data-prefix=""
         data-suffix="%"
         data-duration="2500"
         data-decimals="1">
      <span class="count-up-number">0</span>
      <div class="count-up-bar"><div class="count-up-bar-fill"></div></div>
      <span class="count-up-label">Uptime</span>
    </div>

    <div class="count-up-card"
         data-target="500"
         data-prefix="$"
         data-suffix="M"
         data-duration="1800">
      <span class="count-up-number">0</span>
      <div class="count-up-bar"><div class="count-up-bar-fill"></div></div>
      <span class="count-up-label">Revenue</span>
    </div>

    <div class="count-up-card"
         data-target="4.9"
         data-prefix="★ "
         data-suffix="/5"
         data-duration="1500"
         data-decimals="1">
      <span class="count-up-number">0</span>
      <div class="count-up-bar"><div class="count-up-bar-fill"></div></div>
      <span class="count-up-label">Rating</span>
    </div>

  </div>

  <button class="replay-btn" onclick="replayAll()">↺ Replay</button>

  <script>
    const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    function easeOutQuart(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    function countUp(card) {
      const target   = parseFloat(card.dataset.target);
      const duration = parseInt(card.dataset.duration) || 2000;
      const decimals = parseInt(card.dataset.decimals) || 0;
      const prefix   = card.dataset.prefix || '';
      const suffix   = card.dataset.suffix || '';
      const numEl    = card.querySelector('.count-up-number');
      const barFill  = card.querySelector('.count-up-bar-fill');

      card.classList.add('is-counting');

      if (prefersReduced) {
        numEl.textContent = prefix + target.toFixed(decimals) + suffix;
        barFill.style.width = '100%';
        card.classList.remove('is-counting');
        card.classList.add('is-done');
        return;
      }

      const start = performance.now();

      function update(now) {
        const elapsed  = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased    = easeOutQuart(progress);
        const current  = target * eased;

        numEl.textContent = prefix + current.toFixed(decimals) + suffix;
        barFill.style.width = (progress * 100) + '%';

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          numEl.textContent = prefix + target.toFixed(decimals) + suffix;
          barFill.style.width = '100%';
          card.classList.remove('is-counting');
          card.classList.add('is-done');
        }
      }

      requestAnimationFrame(update);
    }

    // IntersectionObserver — trigger when visible
    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const card = entry.target;
          card.classList.add('is-visible');
          setTimeout(() => countUp(card), 300);
          observer.unobserve(card);
        }
      });
    }, { threshold: 0.3 });

    function observeAll() {
      document.querySelectorAll('.count-up-card').forEach(card => {
        observer.observe(card);
      });
    }

    function replayAll() {
      document.querySelectorAll('.count-up-card').forEach(card => {
        card.classList.remove('is-visible', 'is-counting', 'is-done');
        card.querySelector('.count-up-number').textContent = '0';
        card.querySelector('.count-up-bar-fill').style.width = '0%';
        setTimeout(() => {
          card.classList.add('is-visible');
          setTimeout(() => countUp(card), 300);
        }, 100);
      });
    }

    observeAll();
  </script>

</body>
</html>
