<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wobble &amp; Pulse Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase demonstrating custom keyframe wobble and pulse animations on interactive buttons.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Wobble &amp; Pulse</h1>
      <p class="description">
        Demonstrates modern micro-interactions. Hover over the buttons below 
        to trigger wobble and pulse animation transitions.
      </p>
    </header>

    <main class="showcase">
      <div class="showcase-card">
        <h2>Micro-Animations</h2>
        
        <div class="btn-group">
          <!-- Wobble Trigger Button -->
          <button class="btn btn-wobble">Wobble Button</button>

          <!-- Pulse Trigger Button -->
          <button class="btn btn-pulse">Pulse Button</button>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
