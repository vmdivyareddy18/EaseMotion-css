<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag Vertical Slider - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Drag Vertical Slider</h1>
    <div class="slider-card">
      <h2 class="slider-title">Volume</h2>
      <div class="slider-track" id="sliderTrack">
        <div class="slider-fill" id="sliderFill" style="--slider-val: 0.6;"></div>
        <div class="slider-thumb" id="sliderThumb" style="--slider-val: 0.6;">●</div>
      </div>
      <span class="slider-value" id="sliderValue">60%</span>
    </div>
    <p class="description">Click and drag the thumb vertically. CSS handles the fill and thumb position via <code>--slider-val</code> variable.</p>
  </div>
  <script>
    const track = document.getElementById('sliderTrack');
    const fill = document.getElementById('sliderFill');
    const thumb = document.getElementById('sliderThumb');
    const value = document.getElementById('sliderValue');
    let isDragging = false;

    function updateSlider(clientY) {
      const rect = track.getBoundingClientRect();
      let val = 1 - (clientY - rect.top) / rect.height;
      val = Math.max(0, Math.min(1, val));
      fill.style.setProperty('--slider-val', val);
      thumb.style.setProperty('--slider-val', val);
      value.textContent = Math.round(val * 100) + '%';
    }

    track.addEventListener('mousedown', (e) => {
      isDragging = true;
      updateSlider(e.clientY);
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      updateSlider(e.clientY);
    });

    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
  </script>
</body>
</html>
