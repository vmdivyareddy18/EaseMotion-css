<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Drop Zone</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="dropzone" id="dropzone">
      <div class="dropzone-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="40" height="40">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="dropzone-text">Drag & drop files here or <span class="dropzone-link" id="fileTrigger">browse files</span></p>
      <p class="dropzone-hint">Supports images, PDFs, and documents up to 5 MB</p>
      <input type="file" id="fileInput" class="dropzone-input" multiple />
      <div class="dropzone-preview" id="previewArea"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
