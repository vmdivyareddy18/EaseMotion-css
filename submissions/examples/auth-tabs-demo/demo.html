<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Authentication Tabs Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container ease-fade-in">

<h1>Authentication</h1>

<div class="tabs">

<button id="loginBtn" class="active">
Login
</button>

<button id="signupBtn">
Sign Up
</button>

</div>

<div id="loginForm" class="form ease-slide-up">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button class="submit ease-hover-grow">
Login
</button>

</div>

<div id="signupForm" class="form hidden ease-slide-up">

<input type="text" placeholder="Full Name">

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<input type="password" placeholder="Confirm Password">

<button class="submit ease-hover-grow">
Create Account
</button>

</div>

</div>

<script>

const loginBtn=document.getElementById("loginBtn");
const signupBtn=document.getElementById("signupBtn");

const login=document.getElementById("loginForm");
const signup=document.getElementById("signupForm");

loginBtn.onclick=()=>{

login.classList.remove("hidden");
signup.classList.add("hidden");

loginBtn.classList.add("active");
signupBtn.classList.remove("active");

}

signupBtn.onclick=()=>{

signup.classList.remove("hidden");
login.classList.add("hidden");

signupBtn.classList.add("active");
loginBtn.classList.remove("active");

}

</script>

</body>
</html>
