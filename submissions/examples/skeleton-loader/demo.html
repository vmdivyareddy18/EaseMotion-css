<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Skeleton Loader Collection — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-label">EaseMotion CSS — Skeleton Loader Collection</p>

  <!-- ══════════════════════════════════════════════════════
       SHIMMER VARIANT
  ══════════════════════════════════════════════════════════ -->

  <div style="width:100%;max-width:900px">
    <p class="section-title">✦ Shimmer variant — gradient sweep</p>
  </div>

  <div class="demo-grid">

    <!-- Text lines -->
    <div class="demo-card">
      <p class="section-title" style="margin-bottom:0.75rem">Text lines</p>
      <div class="ease-skeleton ease-skeleton-text w-full"></div>
      <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
      <div class="ease-skeleton ease-skeleton-text w-full"></div>
      <div class="ease-skeleton ease-skeleton-text"></div><!-- last-child → 70% -->
    </div>

    <!-- Avatar sizes -->
    <div class="demo-card" style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
      <p class="section-title" style="width:100%;margin-bottom:0">Avatar circles</p>
      <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-sm"></div>
      <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-md"></div>
      <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-lg"></div>
    </div>

    <!-- Image block -->
    <div class="demo-card">
      <p class="section-title">Image block</p>
      <div class="ease-skeleton ease-skeleton-image ease-skeleton-image-md"></div>
    </div>

    <!-- Card skeleton (image + title + text + button) -->
    <div class="demo-card">
      <p class="section-title">Card skeleton</p>
      <div class="ease-skeleton-card">
        <div class="ease-skeleton ease-skeleton-image ease-skeleton-image-sm"></div>
        <div class="ease-skeleton ease-skeleton-text w-1\/2" style="height:18px"></div>
        <div class="ease-skeleton ease-skeleton-text w-full"></div>
        <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
        <div class="ease-skeleton ease-skeleton-text"></div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <div class="ease-skeleton ease-skeleton-btn w-1\/2"></div>
          <div class="ease-skeleton ease-skeleton-badge"></div>
        </div>
      </div>
    </div>

    <!-- List items (avatar + lines) -->
    <div class="demo-card" style="display:flex;flex-direction:column;gap:1rem">
      <p class="section-title">List items</p>
      <div class="ease-skeleton-list-item">
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-md"></div>
        <div class="ease-skeleton-list-item-body">
          <div class="ease-skeleton ease-skeleton-text w-1\/2"></div>
          <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
        </div>
      </div>
      <div class="ease-skeleton-list-item">
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-md"></div>
        <div class="ease-skeleton-list-item-body">
          <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
          <div class="ease-skeleton ease-skeleton-text w-1\/2"></div>
        </div>
      </div>
      <div class="ease-skeleton-list-item">
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-md"></div>
        <div class="ease-skeleton-list-item-body">
          <div class="ease-skeleton ease-skeleton-text w-1\/2"></div>
          <div class="ease-skeleton ease-skeleton-text w-full"></div>
        </div>
      </div>
    </div>

    <!-- Profile header -->
    <div class="demo-card">
      <p class="section-title">Profile header</p>
      <div class="ease-skeleton-profile">
        <div class="ease-skeleton ease-skeleton-avatar ease-skeleton-avatar-lg"></div>
        <div class="ease-skeleton-profile-body">
          <div class="ease-skeleton ease-skeleton-text w-1\/2" style="height:18px"></div>
          <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
          <div class="ease-skeleton ease-skeleton-badge"></div>
        </div>
      </div>
    </div>

    <!-- Media row (thumbnail + text) -->
    <div class="demo-card" style="display:flex;flex-direction:column;gap:0.75rem">
      <p class="section-title">Media rows</p>
      <div class="ease-skeleton-media">
        <div class="ease-skeleton ease-skeleton-media-thumb"></div>
        <div class="ease-skeleton-media-body">
          <div class="ease-skeleton ease-skeleton-text w-full"></div>
          <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
          <div class="ease-skeleton ease-skeleton-badge"></div>
        </div>
      </div>
      <div class="ease-skeleton-media">
        <div class="ease-skeleton ease-skeleton-media-thumb"></div>
        <div class="ease-skeleton-media-body">
          <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
          <div class="ease-skeleton ease-skeleton-text w-1\/2"></div>
          <div class="ease-skeleton ease-skeleton-badge"></div>
        </div>
      </div>
    </div>

    <!-- Large image -->
    <div class="demo-card">
      <p class="section-title">Hero image block</p>
      <div class="ease-skeleton ease-skeleton-image ease-skeleton-image-lg"></div>
      <div style="margin-top:10px;display:flex;flex-direction:column;gap:8px">
        <div class="ease-skeleton ease-skeleton-text w-1\/2" style="height:18px"></div>
        <div class="ease-skeleton ease-skeleton-text w-full"></div>
        <div class="ease-skeleton ease-skeleton-text w-3\/4"></div>
      </div>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════
       PULSE VARIANT
  ══════════════════════════════════════════════════════════ -->

  <div style="width:100%;max-width:900px;margin-top:1rem">
    <p class="section-title">✦ Pulse variant — opacity fade</p>
  </div>

  <div class="demo-grid">

    <!-- Pulse text lines -->
    <div class="demo-card">
      <p class="section-title">Text lines (pulse)</p>
      <div class="ease-skeleton-pulse ease-skeleton-text w-full" style="height:14px;margin-bottom:10px"></div>
      <div class="ease-skeleton-pulse ease-skeleton-text w-3\/4" style="height:14px;margin-bottom:10px"></div>
      <div class="ease-skeleton-pulse ease-skeleton-text w-full" style="height:14px;margin-bottom:10px"></div>
      <div class="ease-skeleton-pulse ease-skeleton-text" style="height:14px;width:70%"></div>
    </div>

    <!-- Pulse card -->
    <div class="demo-card">
      <p class="section-title">Card (pulse)</p>
      <div class="ease-skeleton-card">
        <div class="ease-skeleton-pulse ease-skeleton-image ease-skeleton-image-sm"></div>
        <div class="ease-skeleton-pulse ease-skeleton-text w-1\/2" style="height:18px"></div>
        <div class="ease-skeleton-pulse ease-skeleton-text w-full" style="height:14px"></div>
        <div class="ease-skeleton-pulse ease-skeleton-text w-3\/4" style="height:14px"></div>
        <div class="ease-skeleton-pulse ease-skeleton-btn w-1\/2"></div>
      </div>
    </div>

    <!-- Pulse list items -->
    <div class="demo-card" style="display:flex;flex-direction:column;gap:1rem">
      <p class="section-title">List items (pulse)</p>
      <div class="ease-skeleton-list-item">
        <div class="ease-skeleton-pulse ease-skeleton-avatar ease-skeleton-avatar-md"></div>
        <div class="ease-skeleton-list-item-body">
          <div class="ease-skeleton-pulse ease-skeleton-text w-1\/2" style="height:14px"></div>
          <div class="ease-skeleton-pulse ease-skeleton-text w-3\/4" style="height:14px"></div>
        </div>
      </div>
      <div class="ease-skeleton-list-item">
        <div class="ease-skeleton-pulse ease-skeleton-avatar ease-skeleton-avatar-md"></div>
        <div class="ease-skeleton-list-item-body">
          <div class="ease-skeleton-pulse ease-skeleton-text w-3\/4" style="height:14px"></div>
          <div class="ease-skeleton-pulse ease-skeleton-text w-1\/2" style="height:14px"></div>
        </div>
      </div>
    </div>

    <!-- Pulse profile -->
    <div class="demo-card">
      <p class="section-title">Profile (pulse)</p>
      <div class="ease-skeleton-profile">
        <div class="ease-skeleton-pulse ease-skeleton-avatar ease-skeleton-avatar-lg"></div>
        <div class="ease-skeleton-profile-body">
          <div class="ease-skeleton-pulse ease-skeleton-text w-1\/2" style="height:18px"></div>
          <div class="ease-skeleton-pulse ease-skeleton-text w-3\/4" style="height:14px"></div>
          <div class="ease-skeleton-pulse ease-skeleton-badge"></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
