<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Portfolio Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="portfolio-canvas">
    <div class="project-showcase-card">
      
      <div class="project-header">
        <span class="category-tag">AI INTERACTION DECK</span>
        <h3>WhisperNet platform</h3>
      </div>

      <!-- Pure CSS Popover System using checkbox hack for state preservation -->
      <div class="spring-popover-system">
        <input type="checkbox" id="popover-state-toggle" class="hidden-popover-checkbox">
        
        <label for="popover-state-toggle" class="popover-trigger-action" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          Inspect Metadata
        </label>

        <!-- Spring Popover Overlay Dialogue Card Box -->
        <div class="spring-popover-card" role="dialog" aria-label="Project Metadata">
          <div class="popover-arrow-node"></div>
          
          <div class="popover-body-content">
            <h4>Platform Details</h4>
            <p>Utilizes advanced Generative Adversarial Networks (GANs) and edge computing models to execute real-time decentralized tactical feedback loops.</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers to focusable nodes
    const triggerLabel = document.querySelector('.popover-trigger-action');
    const checkboxNode = document.getElementById('popover-state-toggle');

    triggerLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        checkboxNode.click();
      }
    });

    checkboxNode.addEventListener('change', () => {
      triggerLabel.setAttribute('aria-expanded', checkboxNode.checked ? 'true' : 'false');
    });
  </script>
</body>
</html>
