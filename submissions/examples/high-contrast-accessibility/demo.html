<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>High‑Contrast Accessibility Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>EaseMotion – High‑Contrast Mode</h1>
    <button id="toggle-contrast" class="toggle-btn" aria-label="Toggle high‑contrast mode">
      Switch to High‑Contrast
    </button>
  </header>
  <main class="content">
    <section class="card">
      <h2>Animated Card</h2>
      <p>
        This card demonstrates the default easing utilities. Click the button above to see the
        colour transition into a high‑contrast palette while preserving the motion effects.
      </p>
      <button class="action-btn">Primary Action</button>
    </section>
  </main>
  <script>
    const toggle = document.getElementById('toggle-contrast');
    toggle.addEventListener('click', () => {
      document.documentElement.classList.toggle('high-contrast');
      const isHigh = document.documentElement.classList.contains('high-contrast');
      toggle.textContent = isHigh ? 'Switch to Default' : 'Switch to High‑Contrast';
    });
  </script>
</body>
</html>
