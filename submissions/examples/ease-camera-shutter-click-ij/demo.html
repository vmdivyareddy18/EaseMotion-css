<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Shutter Click - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-camera-shutter-click">
    <h2>Camera Shutter Click</h2>
    <p>Click the button to trigger the aperture blade animation</p>
    <div class="shutter-viewfinder">
      <div class="shutter-aperture" id="aperture">
        <div class="blade" style="--i:0"></div>
        <div class="blade" style="--i:1"></div>
        <div class="blade" style="--i:2"></div>
        <div class="blade" style="--i:3"></div>
        <div class="blade" style="--i:4"></div>
        <div class="blade" style="--i:5"></div>
        <div class="lens-ring"></div>
      </div>
    </div>
    <button class="shutter-btn" onclick="document.getElementById('aperture').classList.toggle('click')">Click!</button>
    <p class="hint">Toggle the animation by pressing the shutter button</p>
  </div>
</body>
</html>
