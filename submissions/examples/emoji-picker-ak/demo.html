<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emoji Picker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="emoji-wrapper">

    <h1>Emoji Picker</h1>

    <div class="search-group">
      <input type="text" id="emojiSearch" class="search-input" placeholder="Search emoji...">
    </div>

    <div class="category-tabs" id="categoryTabs">
      <button class="cat-btn active" data-cat="smileys">Smileys</button>
      <button class="cat-btn" data-cat="gestures">Gestures</button>
      <button class="cat-btn" data-cat="food">Food</button>
      <button class="cat-btn" data-cat="travel">Travel</button>
      <button class="cat-btn" data-cat="symbols">Symbols</button>
    </div>

    <div class="emoji-grid" id="emojiGrid"></div>

    <div class="preview-bar" id="previewBar">
      <span class="preview-emoji" id="previewEmoji">ЁЯША</span>
      <span class="preview-label" id="previewLabel">Click an emoji to copy</span>
    </div>

  </div>

  <script>
    const emojis = {
      smileys: ['ЁЯША','ЁЯШГ','ЁЯШД','ЁЯШБ','ЁЯШЖ','ЁЯШЕ','ЁЯШВ','ЁЯдг','ЁЯе▓','ЁЯШК','ЁЯШЗ','ЁЯЩВ','ЁЯШЙ','ЁЯШМ','ЁЯШН','ЁЯе░','ЁЯШШ','ЁЯШЧ','ЁЯШЛ','ЁЯШЫ','ЁЯШЬ','ЁЯдк','ЁЯШЭ','ЁЯдС','ЁЯдЧ','ЁЯдн','ЁЯлв','ЁЯлг','ЁЯдл','ЁЯдФ','ЁЯлб','ЁЯдР','ЁЯШР','ЁЯШС','ЁЯШ╢','ЁЯле','ЁЯШП','ЁЯШТ','ЁЯЩД','ЁЯШм','ЁЯде','ЁЯШк','ЁЯШотАНЁЯТи','ЁЯШ┤','ЁЯШ╖','ЁЯдТ','ЁЯдХ','ЁЯдв','ЁЯдо','ЁЯе┤','ЁЯШ╡','ЁЯдп','ЁЯе│','ЁЯе║','ЁЯШв','ЁЯШн','ЁЯШд','ЁЯШа','ЁЯШб','ЁЯдм','ЁЯТА','тШая╕П'],
      gestures: ['ЁЯСЛ','ЁЯдЪ','тЬЛ','ЁЯЦР','тЬМя╕П','ЁЯдЮ','ЁЯл░','ЁЯдЯ','ЁЯдШ','ЁЯдЩ','ЁЯСИ','ЁЯСЙ','ЁЯСЖ','ЁЯЦХ','ЁЯСЗ','тШЭя╕П','ЁЯСН','ЁЯСО','тЬК','ЁЯСК','ЁЯдЫ','ЁЯдЬ','ЁЯСП','ЁЯЩМ','ЁЯл╢','ЁЯСР','ЁЯд▓','ЁЯдЭ','ЁЯЩП','тЬНя╕П','ЁЯТЕ','ЁЯд│','ЁЯТк','ЁЯж╡','ЁЯж╢','ЁЯСВ','ЁЯж╗','ЁЯСГ','ЁЯза','ЁЯлА','ЁЯлБ','ЁЯСА','ЁЯСЕ','ЁЯСД'],
      food: ['ЁЯНП','ЁЯНО','ЁЯНР','ЁЯНК','ЁЯНЛ','ЁЯНМ','ЁЯНЙ','ЁЯНЗ','ЁЯНУ','ЁЯлР','ЁЯНИ','ЁЯНТ','ЁЯНС','ЁЯен','ЁЯНН','ЁЯее','ЁЯеЭ','ЁЯНЕ','ЁЯНЖ','ЁЯеС','ЁЯеж','ЁЯем','ЁЯеТ','ЁЯМ╜','ЁЯеХ','ЁЯзД','ЁЯзЕ','ЁЯеФ','ЁЯНа','ЁЯлШ','ЁЯеР','ЁЯНЮ','ЁЯеЦ','ЁЯеи','ЁЯзА','ЁЯеЪ','ЁЯН│','ЁЯеЮ','ЁЯзЗ','ЁЯеУ','ЁЯей','ЁЯНЧ','ЁЯНЦ','ЁЯМн','ЁЯНФ','ЁЯНЯ','ЁЯНХ','ЁЯлУ','ЁЯек','ЁЯеЩ','ЁЯзЖ','ЁЯМо','ЁЯМп','ЁЯлФ','ЁЯеЧ','ЁЯеШ','ЁЯлХ','ЁЯел','ЁЯНЭ'],
      travel: ['ЁЯЪЧ','ЁЯЪХ','ЁЯЪЩ','ЁЯЪМ','ЁЯЪО','ЁЯПО','ЁЯЪУ','ЁЯЪС','ЁЯЪТ','ЁЯЪР','ЁЯЫ╗','ЁЯЪЪ','ЁЯЪЫ','ЁЯЪЬ','ЁЯПН','ЁЯЫ╡','ЁЯЫ║','ЁЯЪ▓','ЁЯЫ┤','ЁЯЫ╣','ЁЯЪА','ЁЯЫ╕','ЁЯЪБ','тЬИя╕П','ЁЯЫй','ЁЯЫл','ЁЯЫм','ЁЯЪВ','ЁЯЪЖ','ЁЯЪЗ','ЁЯЪЭ','ЁЯЪв','ЁЯЫ│','тЫ╡я╕П','ЁЯЫ╢','ЁЯЪд','ЁЯЫЯ','ЁЯкВ','ЁЯПа','ЁЯПб','ЁЯПв','ЁЯПг','ЁЯПд','ЁЯПе','ЁЯПж','ЁЯПи','ЁЯПй','ЁЯПк','ЁЯПл','ЁЯПм','ЁЯПн','ЁЯПп','ЁЯП░','ЁЯТТ','ЁЯЧ╝'],
      symbols: ['тЭдя╕П','ЁЯзб','ЁЯТЫ','ЁЯТЪ','ЁЯТЩ','ЁЯТЬ','ЁЯЦд','ЁЯдН','ЁЯдО','ЁЯТФ','тЭгя╕П','ЁЯТХ','ЁЯТЮ','ЁЯТУ','ЁЯТЧ','ЁЯТЦ','ЁЯТШ','ЁЯТЭ','ЁЯТЯ','тШоя╕П','тЬЭя╕П','тШкя╕П','ЁЯХЙ','тШ╕я╕П','тЬбя╕П','ЁЯФп','ЁЯХО','тШпя╕П','тШжя╕П','ЁЯЫР','тЫО','тЩИя╕П','тЩЙя╕П','тЩКя╕П','тЩЛя╕П','тЩМя╕П','тЩНя╕П','тЩОя╕П','тЩПя╕П','тЩРя╕П','тЩСя╕П','тЩТя╕П','тЩУя╕П','ЁЯЖФ','тЪЫя╕П','ЁЯЙС','тШвя╕П','тШгя╕П','ЁЯУ┤','ЁЯУ│','ЁЯИ╢','ЁЯИЪя╕П','ЁЯИ╕','ЁЯИ║','ЁЯИ╖я╕П','тЬ┤я╕П','ЁЯЖЪ']
    };

    const grid = document.getElementById('emojiGrid');
    const search = document.getElementById('emojiSearch');
    const previewEmoji = document.getElementById('previewEmoji');
    const previewLabel = document.getElementById('previewLabel');
    const tabs = document.querySelectorAll('.cat-btn');

    let activeCat = 'smileys';

    function render(category, query) {
      let list = category ? emojis[category] : Object.values(emojis).flat();
      if (query) {
        const q = query.toLowerCase();
        list = list.filter(e => e.includes(q) || e.toLowerCase().includes(q));
      }
      grid.innerHTML = list.map(e => '<button class="emoji-btn" data-emoji="' + e + '">' + e + '</button>').join('');

      document.querySelectorAll('.emoji-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const emoji = btn.dataset.emoji;
          previewEmoji.textContent = emoji;
          previewLabel.textContent = 'Copied: ' + emoji;
          navigator.clipboard.writeText(emoji).catch(() => {});
        });
      });
    }

    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        activeCat = tab.dataset.cat;
        search.value = '';
        render(activeCat, '');
      });
    });

    search.addEventListener('input', () => {
      render(null, search.value);
    });

    render('smileys', '');
  </script>

</body>
</html>
