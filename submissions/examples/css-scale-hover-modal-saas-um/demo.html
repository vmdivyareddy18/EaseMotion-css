<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern SaaS Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="saas-modal-toggle" class="ease-saas-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="saas-modal-toggle" class="ease-saas-trigger-um" tabindex="0">
    Invite Team Member
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-saas-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="saas-modal-toggle" class="ease-saas-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-saas-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="saas-modal-toggle" class="ease-saas-close-icon-um" aria-label="Close Modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Center Icon -->
      <div class="ease-saas-icon-wrapper-um">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
          <circle cx="8.5" cy="7" r="4"></circle>
          <line x1="20" y1="8" x2="20" y2="14"></line>
          <line x1="23" y1="11" x2="17" y2="11"></line>
        </svg>
      </div>

      <!-- Content -->
      <h2 id="modal-title" class="ease-saas-title-um">Invite Team Member</h2>
      <p class="ease-saas-desc-um">
        Invite new members to your workspace. They will receive an email invitation with a link to join your team.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-saas-actions-um">
        <label for="saas-modal-toggle" class="ease-saas-btn-um">
          Cancel
        </label>
        <label for="saas-modal-toggle" class="ease-saas-btn-um ease-saas-btn-primary-um">
          Send Invite
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
