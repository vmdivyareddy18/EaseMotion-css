<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>IDP Landing Page</title>
</head>
<body>
  <header class="hero-idp">
    <h1>Developer Self-Service, Simplified</h1>
    <p>Reduce cognitive load and ship faster with our internal portal.</p>
  </header>
  <section class="workflow-section">
    <div class="step-card">
        <h3>1. Scaffold</h3>
        <div class="code-snippet">idp create --service</div>
    </div>
    <div class="step-card">
        <h3>2. Deploy</h3>
        <div class="code-snippet">idp deploy --prod</div>
    </div>
    <div class="step-card">
        <h3>3. Observe</h3>
        <div class="code-snippet">idp logs --follow</div>
    </div>
  </section>
</body>
</html>
