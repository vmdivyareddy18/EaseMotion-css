<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swing Hover Dashboard Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<div class="dashboard">

    <label for="modal-toggle" class="open-btn">
        Open Dashboard Modal
    </label>

</div>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="icon">📊</div>

        <h2>Dashboard Overview</h2>

        <p>
            View your latest analytics and activity with this responsive
            Swing-Hover modal built entirely using CSS.
        </p>

        <button>View Reports</button>

    </div>

</div>

</body>
</html>
