<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Level Objective Ring</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Service Level Objective</h1>

        <p class="subtitle">
            Current reliability performance against the monthly SLO target.
        </p>

        <div class="ring">

            <div class="circle">

                <div class="inner">

                    <strong>99.87%</strong>

                    <span>Availability</span>

                </div>

            </div>

        </div>

        <div class="metrics">

            <div class="metric">

                <span>Target</span>

                <strong>99.90%</strong>

            </div>

            <div class="metric">

                <span>Error Budget</span>

                <strong>13%</strong>

            </div>

            <div class="metric">

                <span>Status</span>

                <strong class="healthy">Healthy</strong>

            </div>

        </div>

        <div class="legend">

            <div class="item">

                <span class="dot success"></span>

                <p>Within SLO Target</p>

            </div>

            <div class="item">

                <span class="dot warning"></span>

                <p>Error Budget Consumption</p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
