<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Horizontal Roll Popover - Neumorphic Soft</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Neumorphic Soft</span>
      <h1>Horizontal Roll Popover</h1>
      <p class="subtitle">Soft shadows with roll animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="soft-btn" aria-label="Menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="roll-popover" role="tooltip">
          <div class="roll-items">
            <div class="roll-item" style="--delay: 0s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                </svg>
              </span>
              <span>Home</span>
            </div>
            <div class="roll-item" style="--delay: 0.06s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <path d="M3 9h18"/>
                </svg>
              </span>
              <span>Projects</span>
            </div>
            <div class="roll-item" style="--delay: 0.12s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06"/>
                </svg>
              </span>
              <span>Settings</span>
            </div>
            <div class="roll-item" style="--delay: 0.18s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16,17 21,12 16,7"/>
                </svg>
              </span>
              <span>Logout</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Curl</button>
          <div class="roll-popover curl" role="tooltip"><p>Curl roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Peel</button>
          <div class="roll-popover peel" role="tooltip"><p>Peel roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Flip</button>
          <div class="roll-popover flip" role="tooltip"><p>Flip roll animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-lavender">Lavender</button>
          <div class="roll-popover theme-lavender" role="tooltip"><p>Lavender theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-peach">Peach</button>
          <div class="roll-popover theme-peach" role="tooltip"><p>Peach theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-mint">Mint</button>
          <div class="roll-popover theme-mint" role="tooltip"><p>Mint theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
