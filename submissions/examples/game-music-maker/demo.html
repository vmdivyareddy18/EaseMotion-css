<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Maker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎵 Music Maker</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🎵 BPM</span>
        <span class="stat-value" id="bpmDisplay">120</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📊 Beats</span>
        <span class="stat-value" id="beatsDisplay">16</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎯 Notes</span>
        <span class="stat-value" id="notesDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎹 Instrument</span>
        <span class="stat-value" id="instrumentDisplay">Piano</span>
      </div>
    </div>

    <div class="sequencer-wrapper">
      <div class="instrument-labels" id="instrumentLabels">
        <div class="instrument-label">C4</div>
        <div class="instrument-label">D4</div>
        <div class="instrument-label">E4</div>
        <div class="instrument-label">F4</div>
        <div class="instrument-label">G4</div>
        <div class="instrument-label">A4</div>
        <div class="instrument-label">B4</div>
        <div class="instrument-label">C5</div>
      </div>
      <div class="grid-container" id="gridContainer">
        <!-- Grid cells generated by JavaScript -->
      </div>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="playBtn">▶ Play</button>
      <button class="control-btn" id="stopBtn">⏹ Stop</button>
      <button class="control-btn" id="clearBtn">🗑️ Clear</button>
      <button class="control-btn" id="instrumentBtn">🎹 Switch</button>
      <button class="control-btn" id="exportBtn">💾 Export</button>
    </div>

    <div class="controls-hint">
      <span>🖱️ Click cells to add notes</span>
      <span>·</span>
      <span>🎵 Click Play to hear your composition</span>
    </div>

    <div class="game-status" id="gameStatus">🎵 Click cells to create your melody!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const gridContainer = document.getElementById('gridContainer');
      const instrumentLabels = document.getElementById('instrumentLabels');
      const bpmDisplay = document.getElementById('bpmDisplay');
      const beatsDisplay = document.getElementById('beatsDisplay');
      const notesDisplay = document.getElementById('notesDisplay');
      const instrumentDisplay = document.getElementById('instrumentDisplay');
      const playBtn = document.getElementById('playBtn');
      const stopBtn = document.getElementById('stopBtn');
      const clearBtn = document.getElementById('clearBtn');
      const instrumentBtn = document.getElementById('instrumentBtn');
      const exportBtn = document.getElementById('exportBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Constants ----------
      const NOTES = ['C4', 'D4', 'E4', 'F4', 'G4', 'A4', 'B4', 'C5'];
      const FREQUENCIES = {
        'C4': 261.63,
        'D4': 293.66,
        'E4': 329.63,
        'F4': 349.23,
        'G4': 392.00,
        'A4': 440.00,
        'B4': 493.88,
        'C5': 523.25
      };

      const INSTRUMENTS = {
        'Piano': { type: 'sine', label: '🎹 Piano' },
        'Synth': { type: 'square', label: '🎹 Synth' },
        'Sawtooth': { type: 'sawtooth', label: '🎹 Sawtooth' },
        'Triangle': { type: 'triangle', label: '🎹 Triangle' }
      };

      // ---------- Game State ----------
      let grid = [];
      let rows = 8;
      let cols = 16;
      let currentInstrument = 'Piano';
      let isPlaying = false;
      let playInterval = null;
      let currentBeat = 0;
      let bpm = 120;
      let audioCtx = null;
      let noteCount = 0;

      // ---------- Audio ----------
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playNote(note, duration = 0.1) {
        try {
          initAudio();
          const freq = FREQUENCIES[note];
          if (!freq) return;
          
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          const instrument = INSTRUMENTS[currentInstrument];
          osc.type = instrument.type;
          osc.frequency.value = freq;
          
          gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
          
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + duration);
        } catch (e) {}
      }

      // ---------- Grid Functions ----------
      function createGrid() {
        grid = [];
        noteCount = 0;
        for (let row = 0; row < rows; row++) {
          grid[row] = [];
          for (let col = 0; col < cols; col++) {
            grid[row][col] = false;
          }
        }
        renderGrid();
        updateUI();
      }

      function renderGrid() {
        gridContainer.innerHTML = '';
        const cellSize = 30;
        gridContainer.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
        gridContainer.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;

        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell' + (grid[row][col] ? ' active' : '');
            cell.dataset.row = row;
            cell.dataset.col = col;
            cell.addEventListener('click', () => toggleCell(row, col));
            cell.addEventListener('touchstart', (e) => {
              e.preventDefault();
              toggleCell(row, col);
            }, { passive: false });
            
            // Highlight current beat
            if (isPlaying && col === currentBeat) {
              cell.classList.add('playing');
            }
            
            gridContainer.appendChild(cell);
          }
        }
        updateNoteCount();
      }

      function toggleCell(row, col) {
        if (isPlaying) return;
        grid[row][col] = !grid[row][col];
        if (grid[row][col]) {
          playNote(NOTES[row], 0.1);
        }
        renderGrid();
        updateUI();
      }

      function clearGrid() {
        if (isPlaying) return;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            grid[row][col] = false;
          }
        }
        renderGrid();
        updateUI();
        setGameStatus('🗑️ Cleared all notes!', true);
      }

      // ---------- Playback ----------
      function startPlayback() {
        if (isPlaying) return;
        initAudio();
        isPlaying = true;
        currentBeat = 0;
        playBtn.textContent = '⏸ Pause';
        setGameStatus('🎵 Playing...', true);
        
        // Reset grid highlight
        renderGrid();
        
        playInterval = setInterval(() => {
          // Play notes for current beat
          for (let row = 0; row < rows; row++) {
            if (grid[row][currentBeat]) {
              playNote(NOTES[row], 0.08);
            }
          }
          
          // Update grid highlight
          const cells = gridContainer.querySelectorAll('.grid-cell');
          cells.forEach((cell, index) => {
            cell.classList.remove('playing');
            const col = index % cols;
            if (col === currentBeat) {
              cell.classList.add('playing');
            }
          });
          
          currentBeat = (currentBeat + 1) % cols;
          if (currentBeat === 0) {
            // Restart beat indicator
          }
        }, 60000 / bpm);
      }

      function stopPlayback() {
        isPlaying = false;
        if (playInterval) {
          clearInterval(playInterval);
          playInterval = null;
        }
        playBtn.textContent = '▶ Play';
        currentBeat = 0;
        renderGrid();
        setGameStatus('⏹ Stopped', true);
      }

      function togglePlayback() {
        if (isPlaying) {
          stopPlayback();
        } else {
          startPlayback();
        }
      }

      // ---------- Export ----------
      function exportComposition() {
        let composition = '';
        for (let row = 0; row < rows; row++) {
          const rowNotes = [];
          for (let col = 0; col < cols; col++) {
            rowNotes.push(grid[row][col] ? '1' : '0');
          }
          composition += `${NOTES[row]}: ${rowNotes.join(' ')}\n`;
        }
        
        // Create download
        const blob = new Blob([composition], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `composition_${Date.now()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        setGameStatus('💾 Composition exported!', true);
      }

      // ---------- Instrument Switching ----------
      function switchInstrument() {
        const keys = Object.keys(INSTRUMENTS);
        const idx = keys.indexOf(currentInstrument);
        const nextIdx = (idx + 1) % keys.length;
        currentInstrument = keys[nextIdx];
        instrumentDisplay.textContent = INSTRUMENTS[currentInstrument].label;
        setGameStatus(`🎹 Switched to ${currentInstrument}`, true);
      }

      // ---------- UI Updates ----------
      function updateUI() {
        bpmDisplay.textContent = bpm;
        beatsDisplay.textContent = cols;
        updateNoteCount();
      }

      function updateNoteCount() {
        let count = 0;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            if (grid[row][col]) count++;
          }
        }
        noteCount = count;
        notesDisplay.textContent = noteCount;
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Keyboard Controls ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          togglePlayback();
        }
        if (e.key === 'c' || e.key === 'C') clearGrid();
        if (e.key === 'i' || e.key === 'I') switchInstrument();
        if (e.key === 'e' || e.key === 'E') exportComposition();
        if (e.key === 's' || e.key === 'S') stopPlayback();
      });

      // ---------- Button Listeners ----------
      playBtn.addEventListener('click', togglePlayback);
      stopBtn.addEventListener('click', stopPlayback);
      clearBtn.addEventListener('click', clearGrid);
      instrumentBtn.addEventListener('click', switchInstrument);
      exportBtn.addEventListener('click', exportComposition);

      // ---------- BPM Control ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowUp' || e.key === '+') {
          bpm = Math.min(240, bpm + 5);
          bpmDisplay.textContent = bpm;
          if (isPlaying) {
            stopPlayback();
            startPlayback();
          }
        }
        if (e.key === 'ArrowDown' || e.key === '-') {
          bpm = Math.max(40, bpm - 5);
          bpmDisplay.textContent = bpm;
          if (isPlaying) {
            stopPlayback();
            startPlayback();
          }
        }
        if (e.key === 'ArrowRight') {
          cols = Math.min(32, cols + 4);
          beatsDisplay.textContent = cols;
          createGrid();
          if (isPlaying) {
            stopPlayback();
            startPlayback();
          }
        }
        if (e.key === 'ArrowLeft') {
          cols = Math.max(8, cols - 4);
          beatsDisplay.textContent = cols;
          createGrid();
          if (isPlaying) {
            stopPlayback();
            startPlayback();
          }
        }
      });

      // ---------- Touch Support ----------
      gridContainer.addEventListener('touchstart', (e) => {
        e.preventDefault();
      }, { passive: false });

      // ---------- Init ----------
      function init() {
        instrumentDisplay.textContent = INSTRUMENTS[currentInstrument].label;
        createGrid();
        setGameStatus('🎵 Click cells to create your melody!', true);
      }

      init();
    })();
  </script>
</body>
</html>
