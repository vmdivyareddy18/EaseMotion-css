<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Ripple Wave Spinner</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <main class="page">

        <h1>
            Ripple Wave Spinner
        </h1>

        <p class="subtitle">
            A premium loading animation inspired by modern
            Real Estate dashboards using only HTML and CSS.
        </p>

        <section class="spinner-demo">

            <div
                class="spinner"
                role="status"
                aria-label="Loading">

                <span class="ripple ripple-1"></span>

                <span class="ripple ripple-2"></span>

                <span class="ripple ripple-3"></span>

                <span class="center-dot"></span>

            </div>

        </section>

    </main>

</body>

</html>
