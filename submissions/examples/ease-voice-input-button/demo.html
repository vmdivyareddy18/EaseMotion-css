<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Input Button Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Voice Input Button</h1>
        <p class="subtitle">Pulsing mic button</p>

        <!-- VOICE INPUT BUTTON COMPONENT -->
        <div class="voice-container">
            <div class="voice-wrapper">
                <div class="voice-display">
                    <!-- Mic Button -->
                    <button class="mic-button" id="micButton" aria-label="Start voice input">
                        <div class="mic-pulse" id="micPulse"></div>
                        <div class="mic-pulse-ring" id="micPulseRing"></div>
                        <div class="mic-icon" id="micIcon">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path d="M12 16c-2.21 0-4-1.79-4-4V6c0-2.21 1.79-4 4-4s4 1.79 4 4v6c0 2.21-1.79 4-4 4zm-6-4c0 3.31 2.69 6 6 6s6-2.69 6-6h-2c0 2.21-1.79 4-4 4s-4-1.79-4-4H6zm4 8v-2h4v2h-4z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="mic-loading" id="micLoading" style="display: none;">
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                            <span class="loading-dot"></span>
                        </div>
                        <div class="mic-success" id="micSuccess" style="display: none;">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </div>
                        <div class="mic-error" id="micError" style="display: none;">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" fill="currentColor"/>
                            </svg>
                        </div>
                    </button>

                    <!-- Status & Transcript -->
                    <div class="voice-status" id="voiceStatus">
                        <span class="status-text" id="statusText">Press the mic to start</span>
                    </div>
                    <div class="voice-transcript" id="voiceTranscript">
                        <span class="transcript-text" id="transcriptText">Your voice input will appear here</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="voice-controls">
                    <div class="control-group">
                        <label for="sensitivitySlider">Sensitivity:</label>
                        <input type="range" id="sensitivitySlider" min="0.1" max="1" step="0.05" value="0.5" />
                        <span id="sensitivityValue">0.5</span>
                    </div>
                    <div class="control-group">
                        <label for="timeoutSlider">Auto-stop:</label>
                        <input type="range" id="timeoutSlider" min="2" max="10" step="0.5" value="5" />
                        <span id="timeoutValue">5s</span>
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="autoStopCheck" checked />
                            Auto-stop on silence
                        </label>
                    </div>
                </div>

                <div class="voice-actions">
                    <button class="voice-ctrl-btn" id="startBtn">▶ Start</button>
                    <button class="voice-ctrl-btn" id="stopBtn">⏹ Stop</button>
                    <button class="voice-ctrl-btn" id="clearBtn">🗑️ Clear</button>
                    <button class="voice-ctrl-btn" id="toggleDemoBtn">🎤 Demo</button>
                </div>

                <div class="voice-status-bar">
                    <span class="status-label">State:</span>
                    <span class="status-value" id="stateDisplay">Idle</span>
                    <span class="status-label">Confidence:</span>
                    <span class="status-value" id="confidenceDisplay">0%</span>
                    <span class="status-label">Duration:</span>
                    <span class="status-value" id="durationDisplay">0s</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #4facfe, #00d2d3);">
                        <span>🎤</span>
                    </div>
                    <span class="variant-label">Ocean</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                        <span>🎤</span>
                    </div>
                    <span class="variant-label">Sunset</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f9d976, #f39c12);">
                        <span>🎤</span>
                    </div>
                    <span class="variant-label">Gold</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);">
                        <span>🎤</span>
                    </div>
                    <span class="variant-label">Dream</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const micButton = document.getElementById('micButton');
            const micPulse = document.getElementById('micPulse');
            const micPulseRing = document.getElementById('micPulseRing');
            const micIcon = document.getElementById('micIcon');
            const micLoading = document.getElementById('micLoading');
            const micSuccess = document.getElementById('micSuccess');
            const micError = document.getElementById('micError');
            const statusText = document.getElementById('statusText');
            const transcriptText = document.getElementById('transcriptText');
            const stateDisplay = document.getElementById('stateDisplay');
            const confidenceDisplay = document.getElementById('confidenceDisplay');
            const durationDisplay = document.getElementById('durationDisplay');
            const sensitivitySlider = document.getElementById('sensitivitySlider');
            const timeoutSlider = document.getElementById('timeoutSlider');
            const autoStopCheck = document.getElementById('autoStopCheck');
            const sensitivityValue = document.getElementById('sensitivityValue');
            const timeoutValue = document.getElementById('timeoutValue');
            const startBtn = document.getElementById('startBtn');
            const stopBtn = document.getElementById('stopBtn');
            const clearBtn = document.getElementById('clearBtn');
            const toggleDemoBtn = document.getElementById('toggleDemoBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                sensitivity: 0.5,
                autoStopTimeout: 5, // seconds
                autoStop: true,
                color: '#4facfe',
                onStart: function() {
                    console.log('🎤 Voice input started');
                },
                onStop: function(text) {
                    console.log(`🎤 Voice input stopped: "${text}"`);
                },
                onResult: function(text, confidence) {
                    console.log(`📝 Transcript: "${text}" (${Math.round(confidence * 100)}%)`);
                },
                onError: function(error) {
                    console.log(`❌ Error: ${error}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isListening = false;
            let isProcessing = false;
            let isDemoMode = false;
            let transcript = '';
            let confidence = 0;
            let startTime = 0;
            let duration = 0;
            let timerInterval = null;
            let silenceTimer = null;
            let recognition = null;
            let demoInterval = null;

            // ============================================
            // WEB SPEECH API (if available)
            // ============================================
            function initSpeechRecognition() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    statusText.textContent = '⚠️ Speech recognition not supported in this browser';
                    return null;
                }

                const recognition = new SpeechRecognition();
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'en-US';
                recognition.maxAlternatives = 1;

                recognition.onstart = function() {
                    isListening = true;
                    updateUI('listening');
                    CONFIG.onStart();
                    startTimer();
                    statusText.textContent = '🎤 Listening... Speak now';
                };

                recognition.onresult = function(event) {
                    let finalTranscript = '';
                    let interimTranscript = '';
                    let confidence = 0;

                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const result = event.results[i];
                        if (result.isFinal) {
                            finalTranscript += result[0].transcript;
                            confidence = result[0].confidence;
                        } else {
                            interimTranscript += result[0].transcript;
                        }
                    }

                    const text = finalTranscript || interimTranscript;
                    if (text) {
                        transcript = text;
                        transcriptText.textContent = text;
                        CONFIG.onResult(text, confidence);
                        confidenceDisplay.textContent = Math.round(confidence * 100) + '%';

                        // Reset silence timer
                        if (CONFIG.autoStop && autoStopCheck.checked) {
                            clearTimeout(silenceTimer);
                            silenceTimer = setTimeout(() => {
                                if (isListening && !isDemoMode) {
                                    stopListening();
                                }
                            }, CONFIG.autoStopTimeout * 1000);
                        }
                    }
                };

                recognition.onerror = function(event) {
                    const error = event.error;
                    CONFIG.onError(error);
                    statusText.textContent = `❌ Error: ${error}`;
                    updateUI('error');
                    stopListening();
                };

                recognition.onend = function() {
                    if (isListening) {
                        stopListening();
                    }
                };

                return recognition;
            }

            // ============================================
            // UI UPDATE FUNCTIONS
            // ============================================
            function updateUI(state) {
                // Reset all states
                micButton.className = 'mic-button';
                micIcon.style.display = 'none';
                micLoading.style.display = 'none';
                micSuccess.style.display = 'none';
                micError.style.display = 'none';

                switch(state) {
                    case 'idle':
                        micIcon.style.display = 'flex';
                        stateDisplay.textContent = 'Idle';
                        stateDisplay.style.color = '#6b7280';
                        break;
                    case 'listening':
                        micButton.classList.add('listening');
                        micLoading.style.display = 'flex';
                        stateDisplay.textContent = 'Listening...';
                        stateDisplay.style.color = '#4facfe';
                        statusText.textContent = '🎤 Listening... Speak now';
                        break;
                    case 'processing':
                        micButton.classList.add('processing');
                        micLoading.style.display = 'flex';
                        stateDisplay.textContent = 'Processing...';
                        stateDisplay.style.color = '#f59e0b';
                        statusText.textContent = '⏳ Processing your voice...';
                        break;
                    case 'success':
                        micButton.classList.add('success');
                        micSuccess.style.display = 'flex';
                        stateDisplay.textContent = 'Success';
                        stateDisplay.style.color = '#34c759';
                        statusText.textContent = '✅ Voice captured successfully!';
                        break;
                    case 'error':
                        micButton.classList.add('error');
                        micError.style.display = 'flex';
                        stateDisplay.textContent = 'Error';
                        stateDisplay.style.color = '#ff3b30';
                        statusText.textContent = '❌ Something went wrong';
                        break;
                    default:
                        micIcon.style.display = 'flex';
                }
            }

            function startTimer() {
                startTime = Date.now();
                duration = 0;
                clearInterval(timerInterval);
                timerInterval = setInterval(() => {
                    duration = (Date.now() - startTime) / 1000;
                    durationDisplay.textContent = duration.toFixed(1) + 's';
                }, 100);
            }

            function stopTimer() {
                clearInterval(timerInterval);
                timerInterval = null;
            }

            // ============================================
            // LISTENING CONTROLS
            // ============================================
            function startListening() {
                if (isListening || isProcessing) return;

                if (isDemoMode) {
                    startDemoMode();
                    return;
                }

                if (!recognition) {
                    recognition = initSpeechRecognition();
                    if (!recognition) {
                        statusText.textContent = '⚠️ Speech recognition not supported';
                        return;
                    }
                }

                try {
                    recognition.start();
                    isListening = true;
                    updateUI('listening');
                } catch (error) {
                    // If already started, stop and restart
                    if (error.message.includes('already started')) {
                        recognition.stop();
                        setTimeout(() => {
                            recognition.start();
                            isListening = true;
                            updateUI('listening');
                        }, 300);
                    } else {
                        CONFIG.onError(error.message);
                        statusText.textContent = `❌ ${error.message}`;
                        updateUI('error');
                    }
                }
            }

            function stopListening() {
                if (isDemoMode) {
                    stopDemoMode();
                    return;
                }

                if (recognition) {
                    try {
                        recognition.stop();
                    } catch (e) {
                        // Ignore
                    }
                }
                isListening = false;
                stopTimer();
                clearTimeout(silenceTimer);

                if (transcript) {
                    updateUI('success');
                    CONFIG.onStop(transcript);
                    statusText.textContent = '✅ Voice captured successfully!';
                } else {
                    updateUI('idle');
                    statusText.textContent = 'Press the mic to start';
                }
            }

            function toggleListening() {
                if (isListening || isProcessing) {
                    stopListening();
                } else {
                    startListening();
                }
            }

            // ============================================
            // DEMO MODE (simulated voice input)
            // ============================================
            const demoPhrases = [
                'Hello, this is a voice input demo.',
                'I am speaking to test the microphone button.',
                'Voice recognition is working perfectly.',
                'This is a simulated voice input for demonstration.',
                'The microphone button has a nice pulsing animation.',
                'Voice input makes interaction more natural.',
                'This demo shows how the component works.',
                'You can customize the sensitivity and auto-stop settings.'
            ];

            function startDemoMode() {
                if (isListening) return;
                isDemoMode = true;
                isListening = true;
                transcript = '';
                updateUI('listening');
                statusText.textContent = '🎤 Demo mode: Speaking...';
                startTimer();

                let demoIndex = 0;
                demoInterval = setInterval(() => {
                    if (demoIndex >= demoPhrases.length) {
                        stopDemoMode();
                        return;
                    }

                    const text = demoPhrases[demoIndex];
                    transcript = text;
                    transcriptText.textContent = text;
                    confidence = 0.7 + Math.random() * 0.2;
                    CONFIG.onResult(text, confidence);
                    confidenceDisplay.textContent = Math.round(confidence * 100) + '%';
                    demoIndex++;

                    // Update status
                    statusText.textContent = `🎤 Demo: ${demoIndex}/${demoPhrases.length}`;

                    // Simulate auto-stop
                    if (demoIndex >= demoPhrases.length) {
                        setTimeout(() => {
                            stopDemoMode();
                        }, 500);
                    }
                }, 1500);
            }

            function stopDemoMode() {
                isDemoMode = false;
                isListening = false;
                clearInterval(demoInterval);
                demoInterval = null;
                stopTimer();

                if (transcript) {
                    updateUI('success');
                    CONFIG.onStop(transcript);
                    statusText.textContent = '✅ Demo complete!';
                } else {
                    updateUI('idle');
                    statusText.textContent = 'Press the mic to start';
                }
            }

            // ============================================
            // CONTROLS
            // ============================================
            function clearTranscript() {
                transcript = '';
                transcriptText.textContent = 'Your voice input will appear here';
                confidence = 0;
                confidenceDisplay.textContent = '0%';
                durationDisplay.textContent = '0s';
                statusText.textContent = '🗑️ Cleared';
                setTimeout(() => {
                    if (!isListening) {
                        statusText.textContent = 'Press the mic to start';
                    }
                }, 1500);
            }

            function updateConfig() {
                CONFIG.sensitivity = parseFloat(sensitivitySlider.value);
                CONFIG.autoStopTimeout = parseFloat(timeoutSlider.value);
                CONFIG.autoStop = autoStopCheck.checked;
                sensitivityValue.textContent = CONFIG.sensitivity.toFixed(2);
                timeoutValue.textContent = CONFIG.autoStopTimeout.toFixed(1) + 's';

                // Update recognition sensitivity if available
                if (recognition) {
                    // Some implementations support sensitivity
                }
            }

            function updateColor(color) {
                CONFIG.color = color;
                micButton.style.setProperty('--mic-color', color);
                micPulse.style.setProperty('--mic-color', color);
                micPulseRing.style.setProperty('--mic-color', color);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            micButton.addEventListener('click', toggleListening);

            // Controls
            startBtn.addEventListener('click', startListening);
            stopBtn.addEventListener('click', stopListening);
            clearBtn.addEventListener('click', clearTranscript);
            toggleDemoBtn.addEventListener('click', function() {
                if (isDemoMode) {
                    stopDemoMode();
                    toggleDemoBtn.textContent = '🎤 Demo';
                } else {
                    startDemoMode();
                    toggleDemoBtn.textContent = '⏹ Stop Demo';
                }
            });

            sensitivitySlider.addEventListener('input', updateConfig);
            timeoutSlider.addEventListener('input', updateConfig);
            autoStopCheck.addEventListener('change', updateConfig);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    toggleListening();
                }
                if (e.key === 'Escape' && isListening) {
                    stopListening();
                }
                if (e.key === 'c' || e.key === 'C') {
                    clearTranscript();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const colorMap = {
                    'Ocean': '#4facfe',
                    'Sunset': '#f093fb',
                    'Gold': '#f9d976',
                    'Dream': '#a18cd1'
                };
                
                const label = card.querySelector('.variant-label').textContent;
                const color = colorMap[label] || '#4facfe';
                
                card.addEventListener('click', function() {
                    updateColor(color);
                    statusText.textContent = `🎨 ${label}`;
                    setTimeout(() => {
                        if (!isListening) {
                            statusText.textContent = 'Press the mic to start';
                        }
                    }, 1500);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API
            // ============================================
            window.VoiceInput = {
                start: startListening,
                stop: stopListening,
                toggle: toggleListening,
                clear: clearTranscript,
                isListening: () => isListening,
                getTranscript: () => transcript,
                getConfidence: () => confidence,
                getDuration: () => duration,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        updateColor(config.color);
                    }
                    if (config.sensitivity) {
                        sensitivitySlider.value = config.sensitivity;
                        updateConfig();
                    }
                    if (config.autoStopTimeout) {
                        timeoutSlider.value = config.autoStopTimeout;
                        updateConfig();
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Check support
            const hasSpeechSupport = 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window;
            if (!hasSpeechSupport) {
                statusText.textContent = '⚠️ Speech recognition not supported in this browser';
                micButton.style.opacity = '0.5';
                micButton.style.cursor = 'not-allowed';
            } else {
                recognition = initSpeechRecognition();
                statusText.textContent = 'Press the mic to start';
            }

            // Set initial color
            updateColor('#4facfe');

            console.log('🎤 Voice Input Button initialized!');
            console.log('📖 API: window.VoiceInput');
            console.log('📖 Usage:');
            console.log('  - Click the mic button to start/stop listening');
            console.log('  - Keyboard shortcuts: Space (toggle), Escape (stop), C (clear)');
            console.log('  - Adjust sensitivity and auto-stop settings');

        })();
    </script>
</body>
</html>
