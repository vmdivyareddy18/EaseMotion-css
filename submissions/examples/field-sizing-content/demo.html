<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS field-sizing: content Demo</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>field-sizing: content</h1>
    <p class="subtitle">Auto-growing form fields that expand with their content.</p>

    <form class="demo-form">
      <div class="field">
        <label for="name">Your Name (auto-width)</label>
        <input type="text" id="name" class="auto-width" placeholder="Type here…" value="">
      </div>

      <div class="field">
        <label for="email">Email (fixed width)</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="field">
        <label for="bio">Short Bio (auto-height, max 10 lines)</label>
        <textarea id="bio" class="auto-height" rows="2" placeholder="Tell us about yourself…"></textarea>
      </div>

      <div class="field">
        <label for="comments">Comments (auto-height, min 3 lines, max 15)</label>
        <textarea id="comments" class="auto-height constrained" rows="3" placeholder="Enter your comments here…"></textarea>
      </div>

      <div class="field">
        <label for="tags">Tags (auto-width, max 400px)</label>
        <input type="text" id="tags" class="auto-width bounded" placeholder="Add tags…" value="css, html">
      </div>

      <div class="field">
        <label for="message">Message (full auto-height)</label>
        <textarea id="message" class="auto-height full" rows="1" placeholder="Start typing…"></textarea>
      </div>

      <button type="submit">Submit</button>
    </form>

    <div class="note">
      <strong>Note:</strong> Requires Chrome 128+ or Edge 128+. Type in the fields to see them grow.
    </div>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Form submitted (demo only)');
    });
  </script>
</body>
</html>
