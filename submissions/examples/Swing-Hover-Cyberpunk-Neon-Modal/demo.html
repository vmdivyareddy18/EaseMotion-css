<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Neon Swing Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="launch-btn">
    Enter Neon Hub
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="neon-circle"></div>

        <h2>Cyberpunk Control Hub</h2>

        <p>
            Access futuristic controls with a glowing Swing-Hover modal
            built entirely using HTML and CSS.
        </p>

        <div class="actions">

            <button>Launch</button>
            <button class="secondary">Cancel</button>

        </div>

    </div>

</div>

</body>
</html>
