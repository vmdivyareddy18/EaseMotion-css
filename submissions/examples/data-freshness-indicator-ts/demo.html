<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Data Freshness Indicators</title><link rel="stylesheet" href="style.css"></head><body><main><header><div><p>Operations dashboard</p><h1>Data sources</h1></div><button type="button">Refresh all</button></header><section aria-label="Data freshness states">
<article><div><strong>Live orders</strong><small>Streaming updates</small></div><span class="badge live"><i></i>Live</span></article>
<article><div><strong>Inventory</strong><small>Updated 2 minutes ago</small></div><span class="badge recent">✓ Recent</span></article>
<article><div><strong>Warehouse capacity</strong><small>Updated 47 minutes ago</small></div><span class="badge stale">! Stale</span></article>
<article><div><strong>Delivery estimates</strong><small>Fetching latest snapshot</small></div><span class="badge refreshing"><i></i>Refreshing</span></article>
<article><div><strong>Returns service</strong><small>Last successful update 3 hours ago</small></div><span class="badge failed">× Failed</span></article>
</section></main></body></html>
