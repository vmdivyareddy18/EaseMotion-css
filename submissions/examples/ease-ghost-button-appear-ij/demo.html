<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Button Appear — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Ghost Button Appear</h2>
    <p>Fade-scale entrance for ghost buttons. Hover to see the fill effect.</p>
    <a href="#" class="ghost-btn">Get Started</a>
    <a href="#" class="ghost-btn ghost-btn--secondary">Learn More</a>
    <div class="vars">
      <label>--btn-border-color <input type="color" value="#ffffff" class="var-color" data-var="--btn-border-color"></label>
      <label>--btn-text-color <input type="color" value="#ffffff" class="var-color" data-var="--btn-text-color"></label>
      <label>--btn-hover-bg <input type="color" value="#ffffff" class="var-color" data-var="--btn-hover-bg"></label>
      <label>--appear-duration <input type="range" min="0.2" max="2" step="0.1" value="0.6" class="var-range" data-var="--appear-duration"></label>
    </div>
  </div>

  <script>
    document.querySelectorAll('.var-color').forEach(inp => {
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value);
      });
    });
    document.querySelectorAll('.var-range').forEach(inp => {
      const display = document.createElement('span');
      display.textContent = inp.value + 's';
      inp.after(display);
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value + 's');
        display.textContent = inp.value + 's';
      });
    });
  </script>
</body>
</html>
