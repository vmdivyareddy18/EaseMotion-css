<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Play Button Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Video Play Button</h1>
        <p class="subtitle">Pulsing play button over thumbnail</p>

        <!-- VIDEO PLAY BUTTON COMPONENT -->
        <div class="video-container">
            <div class="video-wrapper">
                <div class="video-thumbnail" id="videoThumbnail">
                    <!-- Thumbnail image -->
                    <div class="thumbnail-bg" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <div class="thumbnail-content">
                            <span class="thumbnail-icon">🎬</span>
                            <span class="thumbnail-title">Watch the Trailer</span>
                            <span class="thumbnail-duration">2:30</span>
                        </div>
                    </div>
                    
                    <!-- Play Button -->
                    <button class="play-button" id="playButton" aria-label="Play video">
                        <span class="play-icon">
                            <svg viewBox="0 0 24 24" width="32" height="32">
                                <path d="M8 5v14l11-7z" fill="currentColor"/>
                            </svg>
                        </span>
                        <span class="play-pulse" id="playPulse"></span>
                        <span class="play-ring" id="playRing"></span>
                    </button>

                    <!-- Hover overlay -->
                    <div class="video-overlay">
                        <span class="overlay-text">▶ Play Video</span>
                    </div>

                    <!-- Status badge -->
                    <div class="video-badge" id="videoBadge">
                        <span class="badge-dot" id="badgeDot"></span>
                        <span class="badge-text" id="badgeText">Ready</span>
                    </div>
                </div>

                <!-- Video Player (hidden) -->
                <div class="video-player" id="videoPlayer">
                    <div class="player-content">
                        <div class="player-placeholder">
                            <span class="player-icon">🎥</span>
                            <span class="player-text">Video is playing...</span>
                            <span class="player-sub">(Demo placeholder)</span>
                        </div>
                    </div>
                    <button class="close-player" id="closePlayer" aria-label="Close video">✕</button>
                </div>

                <!-- Controls -->
                <div class="video-controls">
                    <button class="video-btn" id="playBtn">▶ Play</button>
                    <button class="video-btn" id="pauseBtn">⏸ Pause</button>
                    <button class="video-btn" id="resetBtn">⟳ Reset</button>
                    <button class="video-btn" id="togglePulseBtn">⏸ Toggle Pulse</button>
                </div>

                <div class="video-status">
                    <span class="status-label">State:</span>
                    <span class="status-value" id="videoState">Idle</span>
                    <span class="status-label">Pulse:</span>
                    <span class="status-value" id="pulseState">Active</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-thumbnail">
                        <div class="variant-bg" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <span>🎬</span>
                        </div>
                        <button class="play-button small">
                            <span class="play-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span class="play-pulse"></span>
                        </button>
                    </div>
                    <span class="variant-label">Small</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-thumbnail">
                        <div class="variant-bg" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <span>🎬</span>
                        </div>
                        <button class="play-button medium">
                            <span class="play-icon">
                                <svg viewBox="0 0 24 24" width="28" height="28">
                                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span class="play-pulse"></span>
                        </button>
                    </div>
                    <span class="variant-label">Medium</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-thumbnail">
                        <div class="variant-bg" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <span>🎬</span>
                        </div>
                        <button class="play-button large">
                            <span class="play-icon">
                                <svg viewBox="0 0 24 24" width="36" height="36">
                                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span class="play-pulse"></span>
                        </button>
                    </div>
                    <span class="variant-label">Large</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-thumbnail">
                        <div class="variant-bg" style="background: linear-gradient(135deg, #f9d976 0%, #f39c12 100%);">
                            <span>🎬</span>
                        </div>
                        <button class="play-button dark">
                            <span class="play-icon">
                                <svg viewBox="0 0 24 24" width="28" height="28">
                                    <path d="M8 5v14l11-7z" fill="currentColor"/>
                                </svg>
                            </span>
                            <span class="play-pulse"></span>
                        </button>
                    </div>
                    <span class="variant-label">Dark</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const thumbnail = document.getElementById('videoThumbnail');
            const playButton = document.getElementById('playButton');
            const playPulse = document.getElementById('playPulse');
            const playRing = document.getElementById('playRing');
            const videoPlayer = document.getElementById('videoPlayer');
            const closePlayer = document.getElementById('closePlayer');
            const videoState = document.getElementById('videoState');
            const pulseState = document.getElementById('pulseState');
            const badgeText = document.getElementById('badgeText');
            const badgeDot = document.getElementById('badgeDot');
            const playBtn = document.getElementById('playBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            const resetBtn = document.getElementById('resetBtn');
            const togglePulseBtn = document.getElementById('togglePulseBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                pulseEnabled: true,
                pulseSpeed: 1, // 0.5 - 2
                playOnClick: true,
                autoPlay: false,
                onPlay: function() {
                    console.log('▶️ Video played');
                },
                onPause: function() {
                    console.log('⏸️ Video paused');
                },
                onStop: function() {
                    console.log('⏹️ Video stopped');
                },
                onComplete: function() {
                    console.log('✅ Video completed');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isPlaying = false;
            let isPaused = false;
            let isPulseEnabled = CONFIG.pulseEnabled;
            let videoTimeout = null;

            // ============================================
            // VIDEO FUNCTIONS
            // ============================================
            function playVideo() {
                if (isPlaying) return;
                
                isPlaying = true;
                isPaused = false;
                videoPlayer.classList.add('active');
                thumbnail.style.display = 'none';
                videoState.textContent = 'Playing';
                badgeText.textContent = 'Playing';
                badgeDot.className = 'badge-dot playing';
                
                // Simulate video playback
                if (videoTimeout) {
                    clearTimeout(videoTimeout);
                }
                
                // Auto-stop after 5 seconds (demo)
                videoTimeout = setTimeout(() => {
                    stopVideo();
                }, 5000);
                
                CONFIG.onPlay();
                updateButtonStates();
            }

            function pauseVideo() {
                if (!isPlaying || isPaused) return;
                
                isPaused = true;
                videoState.textContent = 'Paused';
                badgeText.textContent = 'Paused';
                badgeDot.className = 'badge-dot paused';
                
                if (videoTimeout) {
                    clearTimeout(videoTimeout);
                    videoTimeout = null;
                }
                
                CONFIG.onPause();
                updateButtonStates();
            }

            function resumeVideo() {
                if (!isPaused) return;
                
                isPaused = false;
                videoState.textContent = 'Playing';
                badgeText.textContent = 'Playing';
                badgeDot.className = 'badge-dot playing';
                
                // Resume timeout
                videoTimeout = setTimeout(() => {
                    stopVideo();
                }, 3000);
                
                CONFIG.onPlay();
                updateButtonStates();
            }

            function stopVideo() {
                if (!isPlaying) return;
                
                isPlaying = false;
                isPaused = false;
                videoPlayer.classList.remove('active');
                thumbnail.style.display = 'block';
                videoState.textContent = 'Idle';
                badgeText.textContent = 'Ready';
                badgeDot.className = 'badge-dot';
                
                if (videoTimeout) {
                    clearTimeout(videoTimeout);
                    videoTimeout = null;
                }
                
                CONFIG.onStop();
                updateButtonStates();
            }

            function togglePlay() {
                if (isPlaying) {
                    if (isPaused) {
                        resumeVideo();
                    } else {
                        pauseVideo();
                    }
                } else {
                    playVideo();
                }
            }

            function updateButtonStates() {
                playBtn.textContent = isPlaying ? (isPaused ? '▶ Resume' : '⏸ Pause') : '▶ Play';
                playBtn.disabled = false;
            }

            // ============================================
            // PULSE CONTROL
            // ============================================
            function togglePulse() {
                isPulseEnabled = !isPulseEnabled;
                pulseState.textContent = isPulseEnabled ? 'Active' : 'Paused';
                togglePulseBtn.textContent = isPulseEnabled ? '⏸ Toggle Pulse' : '▶ Toggle Pulse';
                
                if (isPulseEnabled) {
                    playButton.classList.remove('pulse-paused');
                    playPulse.style.animationPlayState = 'running';
                    playRing.style.animationPlayState = 'running';
                } else {
                    playButton.classList.add('pulse-paused');
                    playPulse.style.animationPlayState = 'paused';
                    playRing.style.animationPlayState = 'paused';
                }
            }

            function setPulseSpeed(speed) {
                const duration = 2 / speed;
                playPulse.style.animationDuration = duration + 's';
                playRing.style.animationDuration = duration + 's';
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Play button click
            playButton.addEventListener('click', function(e) {
                e.stopPropagation();
                if (CONFIG.playOnClick) {
                    togglePlay();
                }
            });

            // Thumbnail click (also triggers play)
            thumbnail.addEventListener('click', function(e) {
                if (e.target === playButton) return;
                if (CONFIG.playOnClick) {
                    togglePlay();
                }
            });

            // Close player
            closePlayer.addEventListener('click', function() {
                stopVideo();
            });

            // Keyboard shortcut
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    if (videoPlayer.classList.contains('active') || thumbnail.style.display !== 'none') {
                        e.preventDefault();
                        togglePlay();
                    }
                }
                if (e.key === 'Escape') {
                    stopVideo();
                }
            });

            // Controls
            playBtn.addEventListener('click', togglePlay);
            pauseBtn.addEventListener('click', pauseVideo);
            resetBtn.addEventListener('click', stopVideo);
            togglePulseBtn.addEventListener('click', togglePulse);

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const btn = card.querySelector('.play-button');
                const pulse = btn.querySelector('.play-pulse');
                const thumbnail = card.querySelector('.variant-thumbnail');
                
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // Visual feedback
                    this.classList.add('playing');
                    setTimeout(() => {
                        this.classList.remove('playing');
                    }, 500);
                    
                    // Show pulse on click
                    pulse.style.animationPlayState = 'running';
                });
                
                thumbnail.addEventListener('mouseenter', function() {
                    btn.style.transform = 'scale(1.1)';
                });
                
                thumbnail.addEventListener('mouseleave', function() {
                    btn.style.transform = 'scale(1)';
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.VideoPlayButton = {
                play: playVideo,
                pause: pauseVideo,
                resume: resumeVideo,
                stop: stopVideo,
                toggle: togglePlay,
                togglePulse: togglePulse,
                setPulseSpeed: setPulseSpeed,
                isPlaying: () => isPlaying,
                isPaused: () => isPaused,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.pulseEnabled !== undefined) {
                        isPulseEnabled = config.pulseEnabled;
                        pulseState.textContent = isPulseEnabled ? 'Active' : 'Paused';
                        if (!isPulseEnabled) {
                            playButton.classList.add('pulse-paused');
                            playPulse.style.animationPlayState = 'paused';
                            playRing.style.animationPlayState = 'paused';
                        } else {
                            playButton.classList.remove('pulse-paused');
                            playPulse.style.animationPlayState = 'running';
                            playRing.style.animationPlayState = 'running';
                        }
                    }
                    if (config.pulseSpeed) {
                        setPulseSpeed(config.pulseSpeed);
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial pulse speed
            setPulseSpeed(CONFIG.pulseSpeed);
            pulseState.textContent = 'Active';
            videoState.textContent = 'Idle';
            badgeText.textContent = 'Ready';

            console.log('✅ Video Play Button initialized!');
            console.log('📖 API: window.VideoPlayButton');
            console.log('📖 Usage:');
            console.log('  - Click the play button or thumbnail to play');
            console.log('  - Keyboard shortcuts: Space (play/pause), Escape (stop)');
            console.log('  - Use controls to manage video state');

        })();
    </script>
</body>
</html>
