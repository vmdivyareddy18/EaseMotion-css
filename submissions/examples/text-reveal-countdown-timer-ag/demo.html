<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Reveal Countdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- background -->
  <div class="demo-bg">
    <div class="demo-shape shape-1"></div>
    <div class="demo-shape shape-2"></div>
    
    <!-- wrapper -->
    <main class="demo-wrapper">
      
      <!-- glass timer -->
      <div class="glass-timer" role="timer" aria-live="off">
        <h2 class="timer-label">LAUNCH SEQUENCE</h2>
        
        <div class="timer-display">
          <span class="timer-colon">T-</span>
          
          <!-- reveal mask -->
          <div class="reveal-window">
            
            <!-- sliding numbers -->
            <div class="digit-strip ease-text-reveal">
              <div class="digit">10</div>
              <div class="digit">09</div>
              <div class="digit">08</div>
              <div class="digit">07</div>
              <div class="digit">06</div>
              <div class="digit">05</div>
              <div class="digit">04</div>
              <div class="digit">03</div>
              <div class="digit">02</div>
              <div class="digit">01</div>
              <div class="digit">00</div>
            </div>
            
          </div>
        </div>
        
        <p class="timer-status">Systems Ready</p>
      </div>
      
    </main>
  </div>
</body>
</html>
