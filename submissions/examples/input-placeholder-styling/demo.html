<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Placeholder Styling Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Input Placeholder Styling</h1>
    <p>Custom <code>::placeholder</code> effects — color, font, animation</p>
  </header>
  <main class="fieldset-grid">
    <div class="input-card">
      <label for="inp1">Styled Placeholder</label>
      <input type="text" id="inp1" class="styled-pl" placeholder="Custom blue italic placeholder">
    </div>
    <div class="input-card">
      <label for="inp2">Animated Fade</label>
      <input type="text" id="inp2" class="fade-pl" placeholder="Fades on focus">
    </div>
    <div class="input-card">
      <label for="inp3">Right Aligned</label>
      <input type="text" id="inp3" class="right-pl" placeholder="Right-aligned placeholder">
    </div>
    <div class="input-card">
      <label for="inp4">Uppercase Placeholder</label>
      <input type="text" id="inp4" class="upper-pl" placeholder="transformed to uppercase">
    </div>
    <div class="input-card">
      <label for="inp5">Small Caps</label>
      <input type="text" id="inp5" class="smallcaps-pl" placeholder="small caps style">
    </div>
    <div class="input-card">
      <label for="inp6">Gradient Placeholder</label>
      <input type="text" id="inp6" class="gradient-pl" placeholder="Gradient effect">
    </div>
    <div class="input-card">
      <label for="inp7">Default Placeholder</label>
      <input type="text" id="inp7" placeholder="Default browser style">
    </div>
    <div class="input-card">
      <label for="inp8">Textarea Placeholder</label>
      <textarea id="inp8" class="styled-pl" rows="2" placeholder="Multi-line placeholder with custom styling"></textarea>
    </div>
  </main>
  <footer><p>Focus each input to see placeholder transitions.</p></footer>
</body>
</html>
