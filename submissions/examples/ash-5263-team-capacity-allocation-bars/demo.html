<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Capacity Allocation Bars</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Team Capacity Allocation</h1>

        <p class="subtitle">
            Monitor workload distribution across project teams.
        </p>

        <div class="team">

            <div class="header">

                <span>Engineering</span>

                <strong>82%</strong>

            </div>

            <div class="bar">

                <div class="fill engineering"></div>

            </div>

        </div>

        <div class="team">

            <div class="header">

                <span>Design</span>

                <strong>64%</strong>

            </div>

            <div class="bar">

                <div class="fill design"></div>

            </div>

        </div>

        <div class="team">

            <div class="header">

                <span>QA</span>

                <strong>47%</strong>

            </div>

            <div class="bar">

                <div class="fill qa"></div>

            </div>

        </div>

        <div class="team">

            <div class="header">

                <span>Marketing</span>

                <strong>91%</strong>

            </div>

            <div class="bar">

                <div class="fill marketing"></div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Total Teams</span>

                <strong>4</strong>

            </div>

            <div class="stat">

                <span>Average Capacity</span>

                <strong>71%</strong>

            </div>

            <div class="stat">

                <span>Available</span>

                <strong>29%</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
