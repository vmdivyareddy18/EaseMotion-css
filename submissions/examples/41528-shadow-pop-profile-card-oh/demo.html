<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-shadow-pop-profile-card</title>
  <meta name="description" content="Animated profile card with shadow pop effect for glassmorphism design.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-shadow-pop-profile-card</h1>
      <p class="subtitle" id="main-desc">Profile card with shadow pop effect</p>
    </header>

    <div class="display-area">
      
      <div class="card-showcase">
        <!-- Default Profile Card -->
        <div class="ease-shadow-pop-card">
          <div class="card-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User avatar">
            <div class="avatar-ring"></div>
          </div>
          <div class="card-content">
            <h2 class="card-name">Sarah Mitchell</h2>
            <p class="card-role">Product Designer</p>
            <div class="card-stats">
              <div class="stat">
                <span class="stat-value">2.4k</span>
                <span class="stat-label">Followers</span>
              </div>
              <div class="stat">
                <span class="stat-value">156</span>
                <span class="stat-label">Projects</span>
              </div>
              <div class="stat">
                <span class="stat-value">98%</span>
                <span class="stat-label">Rating</span>
              </div>
            </div>
            <button class="card-btn">Follow</button>
          </div>
        </div>

        <!-- Primary Variant -->
        <div class="ease-shadow-pop-card ease-shadow-primary">
          <div class="card-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" alt="User avatar">
            <div class="avatar-ring"></div>
          </div>
          <div class="card-content">
            <h2 class="card-name">Alex Chen</h2>
            <p class="card-role">Full Stack Developer</p>
            <div class="card-stats">
              <div class="stat">
                <span class="stat-value">5.1k</span>
                <span class="stat-label">Followers</span>
              </div>
              <div class="stat">
                <span class="stat-value">324</span>
                <span class="stat-label">Projects</span>
              </div>
              <div class="stat">
                <span class="stat-value">100%</span>
                <span class="stat-label">Rating</span>
              </div>
            </div>
            <button class="card-btn">Connect</button>
          </div>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Team Members Example</h3>
      <div class="team-grid">
        <div class="ease-shadow-pop-card ease-shadow-sm">
          <div class="card-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Max" alt="User avatar">
            <div class="avatar-ring"></div>
          </div>
          <div class="card-content">
            <h2 class="card-name">James Lee</h2>
            <p class="card-role">UX Researcher</p>
            <button class="card-btn">View</button>
          </div>
        </div>
        <div class="ease-shadow-pop-card ease-shadow-sm">
          <div class="card-avatar">
            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Eva" alt="User avatar">
            <div class="avatar-ring"></div>
          </div>
          <div class="card-content">
            <h2 class="card-name">Mia Wang</h2>
            <p class="card-role">UI Designer</p>
            <button class="card-btn">View</button>
          </div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
