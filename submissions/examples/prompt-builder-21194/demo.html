<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>AI Prompt Builder Studio</title>
</head>
<body>
  <div class="studio-container">
    <h1>AI Prompt Builder Studio</h1>
    <div class="builder-grid">
      <div>
        <label>Role</label>
        <input type="text" class="prompt-field" placeholder="e.g. Expert Copywriter">
        <label>Task</label>
        <textarea class="prompt-field" rows="4" placeholder="Describe the task..."></textarea>
      </div>
      <div>
        <h3>Live Preview</h3>
        <div class="preview-box">Act as an [Role]. Please [Task]...</div>
      </div>
    </div>
  </div>
</body>
</html>
