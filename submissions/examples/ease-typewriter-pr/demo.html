<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease Typewriter Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: monospace;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 1.5rem;
    }

    .demo-box {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 320px;
      text-align: center;
    }

    h2 {
      margin: 0;
      font-size: 1.4rem;
      color: #333;
    }

    p {
      color: #666;
      font-size: 0.85rem;
      margin-top: 0.75rem;
    }

    .repeat-demo {
      color: #6366f1;
      font-size: 1.1rem;
      --ease-animation-iterations: infinite;
    }
  </style>
</head>
<body>

  <div class="demo-box">
    <h2 class="ease-typewriter">Hello, EaseMotion!</h2>
    <p>Single-run typewriter effect</p>
  </div>

  <div class="demo-box">
    <span class="ease-typewriter repeat-demo">Pure CSS magic...</span>
    <p>Looping via --ease-animation-iterations: infinite</p>
  </div>

</body>
</html>
