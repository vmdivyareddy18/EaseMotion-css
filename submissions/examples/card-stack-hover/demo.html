<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Stack Hover Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 60px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Card Stack Hover Effect</h2>
    
    <div class="demo-row">
      <!-- Fan Out Stack -->
      <div class="demo-item">
        <div class="card-stack card-stack-fan">
          <div class="card-stack-item" style="--i: 0;">
            <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=200&h=280&fit=crop" alt="Card 1">
          </div>
          <div class="card-stack-item" style="--i: 1;">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=200&h=280&fit=crop" alt="Card 2">
          </div>
          <div class="card-stack-item" style="--i: 2;">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=200&h=280&fit=crop" alt="Card 3">
          </div>
          <div class="card-stack-item" style="--i: 3;">
            <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=200&h=280&fit=crop" alt="Card 4">
          </div>
        </div>
        <span class="demo-label">Fan Out</span>
      </div>
      
      <!-- Slide Apart Stack -->
      <div class="demo-item">
        <div class="card-stack card-stack-slide">
          <div class="card-stack-item" style="--i: 0;">
            <div class="card-content">
              <h3>Project A</h3>
              <p>Web Design</p>
            </div>
          </div>
          <div class="card-stack-item" style="--i: 1;">
            <div class="card-content">
              <h3>Project B</h3>
              <p>Mobile App</p>
            </div>
          </div>
          <div class="card-stack-item" style="--i: 2;">
            <div class="card-content">
              <h3>Project C</h3>
              <p>Branding</p>
            </div>
          </div>
        </div>
        <span class="demo-label">Slide Apart</span>
      </div>
      
      <!-- Spread Stack -->
      <div class="demo-item">
        <div class="card-stack card-stack-spread">
          <div class="card-stack-item" style="--i: 0;">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba?w=200&h=280&fit=crop" alt="Card 1">
          </div>
          <div class="card-stack-item" style="--i: 1;">
            <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?w=200&h=280&fit=crop" alt="Card 2">
          </div>
          <div class="card-stack-item" style="--i: 2;">
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=200&h=280&fit=crop" alt="Card 3">
          </div>
        </div>
        <span class="demo-label">Spread</span>
      </div>
    </div>
  </div>
</body>
</html>
