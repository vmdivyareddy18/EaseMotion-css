<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Text Reveal Stepper</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="ease-stepper">

  <div class="step active">
    <span class="circle">1</span>
    <div class="content">
      <h3>Discover</h3>
      <p>Understand user requirements and define project goals.</p>
    </div>
  </div>

  <div class="step">
    <span class="circle">2</span>
    <div class="content">
      <h3>Design</h3>
      <p>Create clean wireframes and polished UI prototypes.</p>
    </div>
  </div>

  <div class="step">
    <span class="circle">3</span>
    <div class="content">
      <h3>Develop</h3>
      <p>Build scalable interfaces using semantic HTML and CSS.</p>
    </div>
  </div>

  <div class="step">
    <span class="circle">4</span>
    <div class="content">
      <h3>Launch</h3>
      <p>Deploy, monitor performance, and iterate continuously.</p>
    </div>
  </div>

</div>

</body>
</html>
