<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphic 3D Tilt Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1>Neumorphic Soft UI Modal</h1>
    <p>3D Perspective Tilt + Soft UI Effect</p>
    <button class="open-btn" onclick="openModal()">Open Modal</button>
  </div>

  <div class="overlay" id="overlay" onclick="closeModal()"></div>

  <div class="modal" id="modal" tabindex="0">
    <div class="modal-content">
      <h2>Soft Neumorphic Modal</h2>
      <p>Pure CSS 3D + soft shadow depth interaction.</p>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById("modal");
    const overlay = document.getElementById("overlay");

    function openModal() {
      modal.classList.add("active");
      overlay.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
      overlay.classList.remove("active");
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  </script>

</body>
</html>
