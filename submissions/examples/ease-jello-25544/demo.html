<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-jello — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-weight: 600; margin: 0; }
    p.sub { color: #94a3b8; margin: 0 0 1rem; }
    .demo-cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      width: 180px;
      height: 140px;
      background: linear-gradient(135deg, #ec4899, #a855f7);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3);
      font-weight: 600;
      font-size: 2.5rem;
    }
    .card span { font-size: 0.85rem; font-weight: 400; opacity: 0.8; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>ease-jello</h1>
  <p class="sub">Gelatin-like scale distortion along X and Y axes</p>

  <div class="demo-cards">
    <div class="card ease-jello" id="card1">
      🍮
      <span>Jello (once)</span>
    </div>
    <div class="card ease-jello ease-infinite" id="card2">
      🍮
      <span>Jello (infinite)</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="replay()">Replay Once</button>
    <button class="btn-secondary" onclick="toggleInfinite()">Toggle Infinite</button>
  </div>

  <script>
    function replay() {
      const c = card1;
      c.style.animation = 'none';
      void c.offsetWidth;
      c.style.animation = '';
    }
    function toggleInfinite() {
      card2.classList.toggle('ease-infinite');
    }
  </script>
</body>
</html>
