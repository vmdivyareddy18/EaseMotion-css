<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lock Screen Pattern</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lsp-container">
    <h1>Draw Pattern</h1>
    <div class="lsp-status" id="status">Connect 4+ dots</div>
    <div class="lsp-grid" id="grid"></div>
    <button class="lsp-reset" id="resetBtn">Reset</button>
  </main>
  <script>
    const CORRECT = '0,1,4,7,8';
    const dots = [];
    let sequence = [];
    let isDrawing = false;
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    for (let r = 0; r < 3; r++) {
      for (let c = 0; c < 3; c++) {
        const dot = document.createElement('div');
        dot.className = 'lsp-dot';
        dot.dataset.row = r;
        dot.dataset.col = c;
        dot.dataset.id = `${r},${c}`;
        dot.style.setProperty('--row', r);
        dot.style.setProperty('--col', c);
        grid.appendChild(dot);
        dots.push(dot);
        dot.addEventListener('pointerdown', () => startDot(dot));
        dot.addEventListener('pointerenter', () => {
          if (isDrawing) addDot(dot);
        });
      }
    }

    document.addEventListener('pointerup', endDraw);

    function startDot(dot) {
      isDrawing = true;
      addDot(dot);
    }

    function addDot(dot) {
      if (sequence.includes(dot.dataset.id)) return;
      sequence.push(dot.dataset.id);
      dot.classList.add('active');
      status.textContent = `Pattern: ${sequence.length} dots`;
      drawLines();
    }

    function drawLines() {
      document.querySelectorAll('.lsp-line').forEach(el => el.remove());
      for (let i = 0; i < sequence.length - 1; i++) {
        const a = getDotEl(sequence[i]);
        const b = getDotEl(sequence[i + 1]);
        if (!a || !b) continue;
        const line = document.createElement('div');
        line.className = 'lsp-line';
        const r1 = a.getBoundingClientRect();
        const r2 = b.getBoundingClientRect();
        const g = grid.getBoundingClientRect();
        const x1 = r1.left + r1.width / 2 - g.left;
        const y1 = r1.top + r1.height / 2 - g.top;
        const x2 = r2.left + r2.width / 2 - g.left;
        const y2 = r2.top + r2.height / 2 - g.top;
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;
        line.style.width = len + 'px';
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.transform = `rotate(${angle}deg)`;
        grid.appendChild(line);
      }
    }

    function getDotEl(id) {
      return document.querySelector(`.lsp-dot[data-id="${id}"]`);
    }

    function endDraw() {
      if (!isDrawing) return;
      isDrawing = false;
      const pat = sequence.join(',');
      if (sequence.length < 4) {
        status.textContent = 'Connect 4+ dots';
        resetPattern();
        return;
      }
      if (pat === CORRECT) {
        status.textContent = 'Unlocked!';
        document.querySelectorAll('.lsp-dot').forEach(d => d.classList.add('success'));
        setTimeout(resetPattern, 1500);
      } else {
        status.textContent = 'Wrong pattern';
        grid.classList.add('shake');
        setTimeout(() => grid.classList.remove('shake'), 500);
        setTimeout(resetPattern, 600);
      }
    }

    function resetPattern() {
      sequence = [];
      document.querySelectorAll('.lsp-dot').forEach(d => d.classList.remove('active', 'success'));
      document.querySelectorAll('.lsp-line').forEach(el => el.remove());
      status.textContent = 'Connect 4+ dots';
    }

    document.getElementById('resetBtn').addEventListener('click', resetPattern);
  </script>
</body>
</html>
