<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Animated Page Loader Splash Screen</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full-Screen Animated Splash Screen Component -->
  <div class="ease-page-loader" id="pageLoader">
    <div class="ease-page-loader__content">
      <div class="ease-page-loader__logo">⚡</div>
      <div class="ease-page-loader__bar">
        <div class="ease-page-loader__progress"></div>
      </div>
      <p class="ease-page-loader__text">Initializing Layout Engine...</p>
    </div>
  </div>

  <!-- Underlying Landing Page Content (Revealed after load) -->
  <div class="container">
    <header class="hero">
      <div class="badge">🚀 GSSoC '26 Screen Framework</div>
      <h1>Welcome Behind the Screen</h1>
      <p>The layout content has been mounted cleanly. This secondary layer was protected from flash-of-unstyled-content artifacts while the splash animation finished executing.</p>
    </header>

    <section class="control-box">
      <button class="btn-trigger" onclick="retriggerLoader()">🔄 Re-trigger Splash Loader</button>
    </section>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const loader = document.getElementById("pageLoader");
      
      // Auto dismiss after progress animation concludes (2000ms + padding)
      setTimeout(() => {
        dismissLoader(loader);
      }, 2300);
    });

    function dismissLoader(loaderElement) {
      loaderElement.classList.add("hidden");
      document.body.style.overflow = "auto"; // Unlock scroll interactions
    }

    function retriggerLoader() {
      const loader = document.getElementById("pageLoader");
      document.body.style.overflow = "hidden"; // Lock scroll interactions
      
      // Reset DOM state for animation sequence replay
      loader.classList.remove("hidden");
      
      // Soft clone the bar animation loop element to reset CSS keyframe pipelines
      const progress = loader.querySelector(".ease-page-loader__progress");
      progress.style.animation = "none";
      progress.offsetHeight; // Force layout recalculation
      progress.style.animation = "";

      setTimeout(() => {
        dismissLoader(loader);
      }, 2300);
    }
  </script>

</body>
</html>
