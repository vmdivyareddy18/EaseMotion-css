<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Search Indicator — Demo</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

  <p class="voicesearch-demo-hint">A CSS-only "listening" indicator — no JavaScript involved.</p>

  <div class="voicesearch" role="img" aria-label="Listening for voice input">
    <span class="voicesearch-ring voicesearch-ring-1"></span>
    <span class="voicesearch-ring voicesearch-ring-2"></span>
    <span class="voicesearch-ring voicesearch-ring-3"></span>

    <span class="voicesearch-mic">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 14.5C13.66 14.5 15 13.16 15 11.5V5.5C15 3.84 13.66 2.5 12 2.5C10.34 2.5 9 3.84 9 5.5V11.5C9 13.16 10.34 14.5 12 14.5Z" fill="currentColor"/>
        <path d="M17.3 11.5C17.3 14.48 14.98 16.9 12 16.9C9.02 16.9 6.7 14.48 6.7 11.5H5C5 14.96 7.61 17.81 11 18.32V21H13V18.32C16.39 17.81 19 14.96 19 11.5H17.3Z" fill="currentColor"/>
      </svg>
    </span>
  </div>

</body>
</html>
