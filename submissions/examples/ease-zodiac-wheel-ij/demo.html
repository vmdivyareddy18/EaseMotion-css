<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zodiac-wheel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zodiac Wheel</h1>
    <div class="animation-wrapper">
      <div class="zodiac-wheel">
        <div class="segment seg-1">♈</div>
        <div class="segment seg-2">♉</div>
        <div class="segment seg-3">♊</div>
        <div class="segment seg-4">♋</div>
        <div class="segment seg-5">♌</div>
        <div class="segment seg-6">♍</div>
        <div class="segment seg-7">♎</div>
        <div class="segment seg-8">♏</div>
      </div>
    </div>
    <div class="controls">
      <label>
        Wheel Background
        <input type="color" class="js-color" value="#1a1a2e" data-var="--wheel-bg" />
      </label>
      <label>
        Sign Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--sign-color" />
      </label>
      <label>
        Rotate Duration
        <input type="range" class="js-range" min="3" max="30" step="0.5" value="12" data-var="--rotate-duration" />
        <span class="js-range-value">12s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
