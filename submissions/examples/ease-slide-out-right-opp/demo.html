<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease-Slide-Out-Right-Opp – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light full-screen flex-center">

  <div class="container text-center">
    <h1 class="title fade-in">Slide Out Right</h1>
    <p class="subtitle fade-in delay-200">Click the button to make the card slide out to the right and fade.</p>

    <div id="card" class="card">
      <p class="card-title">Goodbye!</p>
      <p class="card-sub">Sliding right…</p>
    </div>

    <div class="btn-group">
      <button id="slide-btn" class="btn primary">Slide Out</button>
      <button id="reset-btn" class="btn secondary">Reset</button>
    </div>

    <p class="note fade-in delay-500"><code>translateX(0) → translateX(50px)</code> + <code>opacity(0)</code> in 0.3s ease‑in.</p>
  </div>

  <script>
    const card = document.getElementById('card');
    document.getElementById('slide-btn').addEventListener('click', () => {
      card.classList.add('exit');
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
      card.classList.remove('exit');
    });
  </script>

</body>
</html>
