<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Date Range Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <div class="calendar-header">
            <h3>July 2026</h3>
            <span class="range-status" id="rangeStatus">Select start date</span>
        </div>
        
        <div class="ease-range-calendar" id="calendarGrid">
            <div class="calendar-weekday">Su</div>
            <div class="calendar-weekday">Mo</div>
            <div class="calendar-weekday">Tu</div>
            <div class="calendar-weekday">We</div>
            <div class="calendar-weekday">Th</div>
            <div class="calendar-weekday">Fr</div>
            <div class="calendar-weekday">Sa</div>

            <div class="calendar-pad"></div>
            <div class="calendar-pad"></div>
            <div class="calendar-pad"></div>

            <button class="ease-range-day" data-date="1">1</button>
            <button class="ease-range-day" data-date="2">2</button>
            <button class="ease-range-day" data-date="3">3</button>
            <button class="ease-range-day" data-date="4">4</button>
            <button class="ease-range-day" data-date="5">5</button>
            <button class="ease-range-day" data-date="6">6</button>
            <button class="ease-range-day" data-date="7">7</button>
            <button class="ease-range-day" data-date="8">8</button>
            <button class="ease-range-day" data-date="9">9</button>
            <button class="ease-range-day" data-date="10">10</button>
            <button class="ease-range-day" data-date="11">11</button>
            <button class="ease-range-day" data-date="12">12</button>
            <button class="ease-range-day" data-date="13">13</button>
            <button class="ease-range-day" data-date="14">14</button>
            <button class="ease-range-day" data-date="15">15</button>
            <button class="ease-range-day" data-date="16">16</button>
            <button class="ease-range-day" data-date="17">17</button>
            <button class="ease-range-day" data-date="18">18</button>
            <button class="ease-range-day" data-date="19">19</button>
            <button class="ease-range-day" data-date="20">20</button>
            <button class="ease-range-day" data-date="21">21</button>
            <button class="ease-range-day" data-date="22">22</button>
            <button class="ease-range-day" data-date="23">23</button>
            <button class="ease-range-day" data-date="24">24</button>
            <button class="ease-range-day" data-date="25">25</button>
            <button class="ease-range-day" data-date="26">26</button>
            <button class="ease-range-day" data-date="27">27</button>
            <button class="ease-range-day" data-date="28">28</button>
        </div>
        
        <button class="reset-btn" id="resetBtn">Clear Range</button>
    </div>

    <script>
        const dayCells = document.querySelectorAll('.ease-range-day');
        const rangeStatus = document.getElementById('rangeStatus');
        const resetBtn = document.getElementById('resetBtn');
        
        let startDate = null;
        let endDate = null;

        dayCells.forEach(cell => {
            cell.addEventListener('click', () => {
                const clickedDate = parseInt(cell.dataset.date, 10);

                // Scenario 1: No selection made yet, or range is already full
                if (!startDate || (startDate && endDate)) {
                    startDate = clickedDate;
                    endDate = null;
                    rangeStatus.textContent = `Selected start: July ${startDate}`;
                } 
                // Scenario 2: Start date exists, user selects an earlier date (reset start)
                else if (clickedDate < startDate) {
                    startDate = clickedDate;
                    rangeStatus.textContent = `Selected start: July ${startDate}`;
                } 
                // Scenario 3: Valid end date selected
                else {
                    endDate = clickedDate;
                    rangeStatus.textContent = `Range: July ${startDate} - July ${endDate}`;
                }

                updateDOMClasses();
            });
        });

        function updateDOMClasses() {
            dayCells.forEach(cell => {
                const dateVal = parseInt(cell.dataset.date, 10);
                
                // Clear state classes safely
                cell.classList.remove('ease-range-day-start', 'ease-range-day-end', 'ease-range-day-in-range');
                cell.removeAttribute('aria-current');

                if (dateVal === startDate) {
                    cell.classList.add('ease-range-day-start');
                    cell.setAttribute('aria-current', 'date');
                } else if (dateVal === endDate) {
                    cell.classList.add('ease-range-day-end');
                } else if (startDate && endDate && dateVal > startDate && dateVal < endDate) {
                    cell.classList.add('ease-range-day-in-range');
                }
            });
        }

        resetBtn.addEventListener('click', () => {
            startDate = null;
            endDate = null;
            rangeStatus.textContent = 'Select start date';
            updateDOMClasses();
        });
    </script>
</body>
</html>
