<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-neon-cursor Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            color: #bf00ff;
            text-shadow:
                0 0 10px #bf00ff,
                0 0 20px #bf00ff;
        }

        p {
            color: #aaa;
            text-align: center;
            max-width: 480px;
        }

        .demo-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            border: 2px solid #bf00ff;
            background: transparent;
            color: #bf00ff;
            font-size: 1rem;
            cursor: none;
        }

        .btn:hover {
            background: #bf00ff22;
        }
    </style>
</head>

<body class="ease-neon-cursor">

    <div class="ease-neon-cursor__dot" id="cursorDot"></div>
    <div class="ease-neon-cursor__ring" id="cursorRing"></div>

    <h1>ease-neon-cursor</h1>
    <p>
        Move your cursor around. Hover over the buttons
        to see the interactive state.
    </p>

    <div class="demo-buttons">
        <button class="btn">Hover Me</button>
        <button class="btn">And Me</button>
        <button class="btn">Also Me</button>
    </div>

    <script>
        const body = document.querySelector('.ease-neon-cursor');
        const dot = document.getElementById('cursorDot');
        const ring = document.getElementById('cursorRing');

        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });

        const interactives = document.querySelectorAll(
            'a, button, input, [role="button"]'
        );

        interactives.forEach((el) => {
            el.addEventListener('mouseenter', () => {
                body.classList.add('cursor--hover');
            });
            el.addEventListener('mouseleave', () => {
                body.classList.remove('cursor--hover');
            });
        });
    </script>
</body>

</html>
