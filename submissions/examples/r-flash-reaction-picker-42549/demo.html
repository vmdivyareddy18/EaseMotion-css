<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Flash Reaction Picker

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="reaction-section">

<div class="reaction-card">

<h1>

How was your experience?

</h1>

<p>

Choose a reaction below to
share your feedback.

</p>

<div class="reaction-picker">

<button
class="reaction"
aria-label="Love">

😍

<span>

Love

</span>

</button>

<button
class="reaction"
aria-label="Like">

👍

<span>

Like

</span>

</button>

<button
class="reaction"
aria-label="Happy">

😊

<span>

Happy

</span>

</button>

<button
class="reaction"
aria-label="Wow">

😮

<span>

Wow

</span>

</button>

<button
class="reaction"
aria-label="Sad">

😢

<span>

Sad

</span>

</button>

</div>

</div>

</section>

</body>

</html>
