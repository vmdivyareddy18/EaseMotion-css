<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pause on Hover — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 2rem; background: #f9fafb; }
    .box { width: 80px; height: 80px; background: #6c63ff; border-radius: 12px; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    label { font-size: 0.9rem; color: #555; }
  </style>
</head>
<body>
  <h2>Pause on Hover Demo</h2>

  <label>Hover over the box to pause the animation</label>
  <div class="box pause-on-hover"></div>

  <label>Without pause-on-hover (always spinning)</label>
  <div class="box"></div>
</body>
</html>
