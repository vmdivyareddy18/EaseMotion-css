<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Holographic Map Embed</title>

  <!-- EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">

  <!-- Component -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section
  class="ease-center"
  style="min-height:100vh;padding:4rem 1.5rem;"
>

<div style="width:100%;max-width:1000px;">

<h1
class="ease-fade-in"
style="text-align:center;"
>
Holographic Map Embed
</h1>

<p
class="ease-slide-up ease-delay-100"
style="
max-width:700px;
margin:1rem auto 3rem;
text-align:center;
"
>
A modern map embed featuring a subtle holographic sweep animation using pure CSS.
Designed for dashboards, contact pages, and business websites while remaining
lightweight, responsive, and accessible.
</p>

<div class="ease-map-container ease-slide-up ease-delay-200">

<iframe
title="Google Maps"
loading="lazy"
allowfullscreen
referrerpolicy="no-referrer-when-downgrade"
src="https://www.google.com/maps?q=India+Gate+New+Delhi&output=embed">
</iframe>

</div>

</div>

</section>

</body>
</html>
