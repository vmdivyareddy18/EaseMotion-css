<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Expense Tracker</h1>

    <div class="summary-cards">
      <div class="sum-card total">
        <span class="sum-label">Total</span>
        <span class="sum-value" id="totalExpense">$0.00</span>
      </div>
      <div class="sum-card">
        <span class="sum-label">This Week</span>
        <span class="sum-value" id="weeklyExpense">$0.00</span>
      </div>
      <div class="sum-card">
        <span class="sum-label">This Month</span>
        <span class="sum-value" id="monthlyExpense">$0.00</span>
      </div>
    </div>

    <div class="expense-table">
      <div class="table-header">
        <span>Description</span>
        <span>Category</span>
        <span>Amount</span>
        <span></span>
      </div>
      <div id="expenseList"></div>
    </div>

    <div class="add-expense">
      <input type="text" class="exp-input" id="descInput" placeholder="Description" maxlength="40">
      <select class="exp-input exp-select" id="categoryInput">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Shopping">Shopping</option>
        <option value="Bills">Bills</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
      <input type="number" class="exp-input exp-amount" id="amountInput" placeholder="$0.00" min="0" step="0.01">
      <button class="add-exp-btn" id="addExpenseBtn">Add</button>
    </div>

    <button class="clear-btn" id="clearBtn">Clear All</button>
  </div>
  <script>
    const STORAGE_KEY = 'expense-tracker-ak';
    let expenses = [];

    const expenseList = document.getElementById('expenseList');
    const totalExpense = document.getElementById('totalExpense');
    const weeklyExpense = document.getElementById('weeklyExpense');
    const monthlyExpense = document.getElementById('monthlyExpense');
    const descInput = document.getElementById('descInput');
    const categoryInput = document.getElementById('categoryInput');
    const amountInput = document.getElementById('amountInput');
    const addExpenseBtn = document.getElementById('addExpenseBtn');
    const clearBtn = document.getElementById('clearBtn');

    function loadExpenses() {
      const raw = localStorage.getItem(STORAGE_KEY);
      expenses = raw ? JSON.parse(raw) : [];
    }

    function saveExpenses() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
    }

    function getWeek(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() - d.getDay());
      return d.getTime();
    }

    function render() {
      const now = new Date();
      const weekStart = getWeek(now);
      const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

      let total = 0, weekly = 0, monthly = 0;

      expenseList.innerHTML = '';
      expenses.forEach((e, i) => {
        const amt = parseFloat(e.amount);
        total += amt;
        const d = new Date(e.date);
        if (d.getTime() >= weekStart) weekly += amt;
        if (d.getTime() >= monthStart) monthly += amt;

        const el = document.createElement('div');
        el.className = 'expense-row';
        el.innerHTML = `
          <span class="exp-desc">${e.description}</span>
          <span class="exp-cat">${e.category}</span>
          <span class="exp-amt">$${amt.toFixed(2)}</span>
          <button class="exp-del" data-idx="${i}">&times;</button>
        `;
        expenseList.appendChild(el);
      });

      totalExpense.textContent = '$' + total.toFixed(2);
      weeklyExpense.textContent = '$' + weekly.toFixed(2);
      monthlyExpense.textContent = '$' + monthly.toFixed(2);

      document.querySelectorAll('.exp-del').forEach(btn => {
        btn.addEventListener('click', () => {
          expenses.splice(parseInt(btn.dataset.idx), 1);
          saveExpenses();
          render();
        });
      });
    }

    function addExpense() {
      const desc = descInput.value.trim();
      const category = categoryInput.value;
      const amount = parseFloat(amountInput.value);
      if (!desc || !amount || amount <= 0) return;
      expenses.unshift({
        description: desc,
        category,
        amount: amount.toFixed(2),
        date: new Date().toISOString(),
      });
      saveExpenses();
      descInput.value = '';
      amountInput.value = '';
      render();
    }

    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all expenses?')) {
        expenses = [];
        saveExpenses();
        render();
      }
    });

    addExpenseBtn.addEventListener('click', addExpense);
    amountInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addExpense();
    });

    loadExpenses();
    render();
  </script>
</body>
</html>
