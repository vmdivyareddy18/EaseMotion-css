<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Shimmer Sweep Popover</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            padding: 3rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        h1 {
            color: #111827;
            margin-bottom: 5rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            font-size: 2rem;
            text-align: center;
        }
        
        .demo-container {
            display: flex;
            gap: 5rem;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        
        /* Marketing Landing Page Buttons */
        .marketing-btn {
            background-color: #4f46e5;
            color: #fff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3), 0 2px 4px -1px rgba(79, 70, 229, 0.2);
        }
        
        .marketing-btn:hover, .marketing-btn:focus {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4), 0 4px 6px -2px rgba(79, 70, 229, 0.2);
            outline: none;
        }
        
        /* Popover Content Styling */
        .popover-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }
        
        .popover-icon {
            background-color: #eef2ff;
            color: #4f46e5;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .popover-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--sh-text-color);
        }
        
        .popover-body {
            color: #6b7280;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 1rem;
        }
        
        .dark-theme .popover-body {
            color: #9ca3af;
        }
        
        .popover-cta {
            display: block;
            width: 100%;
            text-align: center;
            background-color: var(--sh-text-color);
            color: var(--sh-bg-color);
            padding: 0.6rem 1rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        
        .popover-cta:hover {
            opacity: 0.9;
        }
        
        /* Dark Theme Button */
        .dark-theme-btn {
            background-color: #1f2937;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        
        .dark-theme-btn:hover {
            background-color: #111827;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        
        .dark-theme .popover-icon {
            background-color: #374151;
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <h1>Marketing Page - Shimmer Sweep Popovers</h1>
    
    <div class="demo-container">
        <!-- Demo 1: Default / Light -->
        <div class="shimmer-trigger">
            <button class="marketing-btn" aria-haspopup="true">Get Started Free</button>
            <div class="shimmer-popover">
                <div class="popover-header">
                    <div class="popover-icon">🚀</div>
                    <div class="popover-title">Boost your workflow</div>
                </div>
                <div class="popover-body">
                    Sign up today and get 14 days of Pro features completely free. No credit card required.
                </div>
                <a href="#" class="popover-cta">Claim Offer</a>
            </div>
        </div>
        
        <!-- Demo 2: Dark Theme -->
        <div class="shimmer-trigger dark-theme">
            <button class="marketing-btn dark-theme-btn" aria-haspopup="true">View Enterprise Plans</button>
            <div class="shimmer-popover">
                <div class="popover-header">
                    <div class="popover-icon">🏢</div>
                    <div class="popover-title">Scale with confidence</div>
                </div>
                <div class="popover-body">
                    Unlock advanced security, custom SSO, and 24/7 dedicated support for your entire team.
                </div>
                <a href="#" class="popover-cta">Contact Sales</a>
            </div>
        </div>
    </div>
</body>
</html>
