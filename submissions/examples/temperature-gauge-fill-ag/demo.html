<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temperature Gauge Fill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Temperature Gauge Fill</h1>
  <div style="display:flex;gap:32px;align-items:flex-end"><div class="temp-gauge cold"><div class="gauge-fill" style="height:30%"></div><span class="gauge-label">12°</span></div><div class="temp-gauge"><div class="gauge-fill" style="height:55%"></div><span class="gauge-label">22°</span></div><div class="temp-gauge hot"><div class="gauge-fill" style="height:85%"></div><span class="gauge-label">38°</span></div></div>
</body>
</html>
