<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Asymmetric Hero Playground — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #ffffff; margin: 0; min-height: 100vh; display: flex; align-items: center;">

  <div class="ease-hero-viewport">
    <div class="ease-hero-content">
      <span class="ease-hero-badge">v1.1 Framework Preview</span>
      <h1 class="ease-hero-title">Refactor Fluid Interfaces</h1>
      <p class="ease-hero-description">
        Experience high-performance asymmetric structural positioning canvases decoupled entirely from legacy layout rendering paradigms.
      </p>

      <div class="ease-playground-controls-tray">
        <button class="ease-playground-btn is-active" onclick="switchTheme(this, 'slate')">Deep Slate</button>
        <button class="ease-playground-btn" onclick="switchTheme(this, 'indigo')">Neon Violet</button>
        <button class="ease-playground-btn" onclick="switchTheme(this, 'emerald')">Sea Mint</button>
      </div>
    </div>

    <div class="ease-hero-playground-canvas" id="canvasFrame">
      <div class="ease-asymmetric-card" id="heroCard">
        <div class="ease-playground-glow" id="cardGlow"></div>
        
        <div class="ease-card-internal-content">
          <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.2em; color: #94a3b8;">System Sandbox Node</div>
          <div style="font-size: 1.5rem; font-weight: 700;">Drag mouse bounds to rotate canvas coordinate grid matrices</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('heroCard');
    const canvas = document.getElementById('canvasFrame');
    const glow = document.getElementById('cardGlow');

    // High-performance 3D magnetic tracking math
    canvas.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const calcX = -(y - (rect.height / 2)) / 12;
      const calcY = (x - (rect.width / 2)) / 12;

      card.style.transform = `rotateX(${calcX}deg) rotateY(${calcY}deg)`;
      
      // Update ambient follower coordinates
      const cardRect = card.getBoundingClientRect();
      const glowX = e.clientX - cardRect.left;
      const glowY = e.clientY - cardRect.top;
      glow.style.left = `${glowX}px`;
      glow.style.top = `${glowY}px`;
    });

    canvas.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateX(0deg) rotateY(0deg)';
    });

    // Theme preset layout shifts
    function switchTheme(btn, theme) {
      document.querySelectorAll('.ease-playground-btn').forEach(b => b.classList.remove('is-active'));
      btn.classList.add('is-active');

      if (theme === 'slate') {
        card.style.background = 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)';
        glow.style.background = 'radial-gradient(circle, rgba(59,130,246,0.4) 0%, rgba(139,92,246,0) 70%)';
      } else if (theme === 'indigo') {
        card.style.background = 'linear-gradient(135deg, #4c1d95 0%, #1e1b4b 100%)';
        glow.style.background = 'radial-gradient(circle, rgba(236,72,153,0.5) 0%, rgba(236,72,153,0) 70%)';
      } else if (theme === 'emerald') {
        card.style.background = 'linear-gradient(135deg, #064e3b 0%, #022c22 100%)';
        glow.style.background = 'radial-gradient(circle, rgba(52,211,153,0.5) 0%, rgba(52,211,153,0) 70%)';
      }
    }
  </script>
</body>
</html>
