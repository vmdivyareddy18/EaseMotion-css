<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chameleon Color Shift</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🦎 Chameleon Color Shift</h1>
        <p class="subtitle">Object smoothly shifts colors like a chameleon's skin</p>

        <div class="chameleon-wrapper">
            <canvas id="chameleonCanvas"></canvas>

            <div class="controls">
                <button id="modeBtn">Mode: Smooth</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="paletteBtn">Palette: Rainbow</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🦎 Shifting colors</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('chameleonCanvas');
        const ctx = canvas.getContext('2d');
        const modeBtn = document.getElementById('modeBtn');
        const speedBtn = document.getElementById('speedBtn');
        const paletteBtn = document.getElementById('paletteBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(450, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let time = 0;
        let speed = 0.02;
        let speedLevel = 1;
        let mode = 0;
        let palette = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let isHovering = false;
        let cells = [];
        let cellSize = 15;
        let gridCols = 0;
        let gridRows = 0;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== MODE OPTIONS =====
        const modes = ['Smooth', 'Wave', 'Pulse', 'Reactive', 'Morph'];

        // ===== COLOR PALETTES =====
        const palettes = [
            {
                name: 'Rainbow',
                colors: [
                    { h: 0, s: 90, l: 55 },
                    { h: 60, s: 90, l: 55 },
                    { h: 120, s: 90, l: 55 },
                    { h: 180, s: 90, l: 55 },
                    { h: 240, s: 90, l: 55 },
                    { h: 300, s: 90, l: 55 },
                ]
            },
            {
                name: 'Ocean',
                colors: [
                    { h: 200, s: 70, l: 40 },
                    { h: 210, s: 75, l: 50 },
                    { h: 220, s: 80, l: 60 },
                    { h: 230, s: 75, l: 50 },
                    { h: 240, s: 70, l: 40 },
                ]
            },
            {
                name: 'Sunset',
                colors: [
                    { h: 10, s: 90, l: 50 },
                    { h: 30, s: 85, l: 55 },
                    { h: 50, s: 80, l: 60 },
                    { h: 340, s: 80, l: 50 },
                    { h: 350, s: 90, l: 55 },
                ]
            },
            {
                name: 'Forest',
                colors: [
                    { h: 120, s: 60, l: 30 },
                    { h: 130, s: 65, l: 40 },
                    { h: 140, s: 70, l: 50 },
                    { h: 80, s: 60, l: 35 },
                    { h: 100, s: 65, l: 45 },
                ]
            },
            {
                name: 'Galaxy',
                colors: [
                    { h: 260, s: 80, l: 35 },
                    { h: 280, s: 85, l: 45 },
                    { h: 300, s: 90, l: 55 },
                    { h: 240, s: 75, l: 40 },
                    { h: 320, s: 80, l: 50 },
                ]
            },
            {
                name: 'Pastel',
                colors: [
                    { h: 0, s: 50, l: 80 },
                    { h: 60, s: 50, l: 80 },
                    { h: 120, s: 50, l: 80 },
                    { h: 180, s: 50, l: 80 },
                    { h: 240, s: 50, l: 80 },
                    { h: 300, s: 50, l: 80 },
                ]
            },
            {
                name: 'Neon',
                colors: [
                    { h: 180, s: 100, l: 50 },
                    { h: 300, s: 100, l: 50 },
                    { h: 60, s: 100, l: 50 },
                    { h: 0, s: 100, l: 50 },
                    { h: 240, s: 100, l: 50 },
                ]
            },
            {
                name: 'Monochrome',
                colors: [
                    { h: 0, s: 0, l: 20 },
                    { h: 0, s: 0, l: 35 },
                    { h: 0, s: 0, l: 50 },
                    { h: 0, s: 0, l: 65 },
                    { h: 0, s: 0, l: 80 },
                ]
            },
        ];

        // ===== CELL CLASS =====
        class Cell {
            constructor(x, y, i, j) {
                this.x = x;
                this.y = y;
                this.i = i;
                this.j = j;
                this.baseHue = (i / gridCols) * 360 + (j / gridRows) * 180;
                this.currentHue = this.baseHue;
                this.targetHue = this.baseHue;
                this.saturation = 70 + Math.random() * 20;
                this.lightness = 40 + Math.random() * 30;
                this.size = cellSize * 0.85;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.offsetX = (Math.random() - 0.5) * 4;
                this.offsetY = (Math.random() - 0.5) * 4;
                this.rippleDist = 0;
            }

            update(time, mouseX, mouseY, mode) {
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                this.rippleDist = dist;

                // Mode-specific color updates
                switch(mode) {
                    case 0: // Smooth
                        this.targetHue = (this.baseHue + time * 30) % 360;
                        break;
                    case 1: // Wave
                        const wave = Math.sin(this.x * 0.02 + this.y * 0.02 + time * 2) * 0.5 + 0.5;
                        this.targetHue = (this.baseHue + wave * 180 + time * 20) % 360;
                        break;
                    case 2: // Pulse
                        const pulse = 0.5 + 0.5 * Math.sin(time * 2 + this.phase);
                        this.targetHue = (this.baseHue + pulse * 120 + time * 15) % 360;
                        this.lightness = 40 + pulse * 30;
                        break;
                    case 3: // Reactive
                        if (dist < 200) {
                            const influence = 1 - dist / 200;
                            this.targetHue = (this.baseHue + influence * 180 + time * 10) % 360;
                            this.saturation = 70 + influence * 30;
                        } else {
                            this.targetHue = (this.baseHue + time * 10) % 360;
                            this.saturation = 70;
                        }
                        break;
                    case 4: // Morph
                        const morph = 0.5 + 0.5 * Math.sin(this.x * 0.015 + this.y * 0.015 + time * 0.5);
                        const morph2 = 0.5 + 0.5 * Math.sin(this.x * 0.025 - this.y * 0.02 + time * 0.7 + 2);
                        this.targetHue = (this.baseHue + morph * 120 + morph2 * 120 + time * 15) % 360;
                        this.lightness = 40 + (morph + morph2) * 0.3 * 30;
                        break;
                }

                // Smooth interpolation
                this.currentHue += (this.targetHue - this.currentHue) * 0.05;
                
                // Update phase
                this.phase += this.pulseSpeed * speed * 5;
            }

            draw(ctx) {
                const hue = this.currentHue % 360;
                const sat = this.saturation;
                const light = this.lightness;

                const x = this.x + this.offsetX;
                const y = this.y + this.offsetY;
                const size = this.size * (0.8 + 0.2 * Math.sin(this.phase));

                // Glow effect
                const grad = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                grad.addColorStop(0, `hsla(${hue}, ${sat}%, ${light + 20}%, 0.3)`);
                grad.addColorStop(0.5, `hsla(${hue}, ${sat}%, ${light}%, 0.1)`);
                grad.addColorStop(1, `hsla(${hue}, ${sat}%, ${light}%, 0)`);

                ctx.beginPath();
                ctx.arc(x, y, size * 2, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();

                // Main cell
                const cellGrad = ctx.createRadialGradient(
                    x - size * 0.2, y - size * 0.2, 0,
                    x, y, size
                );
                cellGrad.addColorStop(0, `hsla(${hue}, ${sat}%, ${light + 25}%, 0.9)`);
                cellGrad.addColorStop(0.5, `hsla(${hue}, ${sat}%, ${light}%, 0.95)`);
                cellGrad.addColorStop(1, `hsla(${hue}, ${sat}%, ${light - 10}%, 1)`);

                // Hexagonal shape
                const sides = 6;
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2 + this.phase * 0.1;
                    const r = size * (0.9 + 0.1 * Math.sin(this.phase + i));
                    const px = x + Math.cos(angle) * r;
                    const py = y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fillStyle = cellGrad;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsla(${hue}, ${sat}%, ${light}%, 0.3)`;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Inner highlight
                ctx.beginPath();
                ctx.arc(x - size * 0.15, y - size * 0.15, size * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light + 40}%, 0.3)`;
                ctx.fill();

                // Border
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2 + this.phase * 0.1;
                    const r = size * (0.9 + 0.1 * Math.sin(this.phase + i));
                    const px = x + Math.cos(angle) * r;
                    const py = y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${light + 10}%, 0.15)`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }

        // ===== INIT GRID =====
        function initGrid() {
            const w = canvas.width;
            const h = canvas.height;
            cellSize = Math.max(12, Math.min(25, Math.min(w, h) / 20));
            gridCols = Math.ceil(w / (cellSize * 1.1));
            gridRows = Math.ceil(h / (cellSize * 1.1));
            
            cells = [];
            const offsetX = (w - gridCols * cellSize * 1.1) / 2 + cellSize * 0.55;
            const offsetY = (h - gridRows * cellSize * 1.1) / 2 + cellSize * 0.55;
            
            for (let i = 0; i < gridCols; i++) {
                for (let j = 0; j < gridRows; j++) {
                    const x = offsetX + i * cellSize * 1.1;
                    const y = offsetY + j * cellSize * 1.1;
                    const cell = new Cell(x, y, i, j);
                    cells.push(cell);
                }
            }
        }
        initGrid();

        // ===== DRAW CHAMELEON SHAPE =====
        function drawChameleonShape(ctx, w, h) {
            // Draw a chameleon silhouette overlay
            const cx = w / 2;
            const cy = h / 2 + 20;
            const scale = Math.min(w, h) / 400;

            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);

            // Chameleon body
            ctx.beginPath();
            // Head
            ctx.arc(0, -60, 40, 0, Math.PI * 2);
            // Eye bump
            ctx.arc(25, -70, 15, 0, Math.PI * 2);
            // Body curve
            ctx.quadraticCurveTo(60, -20, 50, 30);
            ctx.quadraticCurveTo(30, 70, 0, 80);
            // Tail curl
            ctx.quadraticCurveTo(-50, 80, -70, 50);
            ctx.quadraticCurveTo(-90, 20, -80, -10);
            ctx.quadraticCurveTo(-70, -30, -60, -20);
            // Back
            ctx.quadraticCurveTo(-30, -50, 0, -60);
            ctx.closePath();

            // Create clipping mask
            ctx.clip();

            // Fill with pattern from cells
            for (const cell of cells) {
                const x = cell.x - (cx - w/2) / scale;
                const y = cell.y - (cy - h/2) / scale;
                const hue = cell.currentHue % 360;
                const sat = cell.saturation;
                const light = cell.lightness;

                ctx.beginPath();
                ctx.arc(x, y, cell.size * 1.2 / scale, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, 0.6)`;
                ctx.fill();
            }

            ctx.restore();

            // Draw chameleon outline
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);

            ctx.beginPath();
            ctx.arc(0, -60, 40, 0, Math.PI * 2);
            ctx.arc(25, -70, 15, 0, Math.PI * 2);
            ctx.quadraticCurveTo(60, -20, 50, 30);
            ctx.quadraticCurveTo(30, 70, 0, 80);
            ctx.quadraticCurveTo(-50, 80, -70, 50);
            ctx.quadraticCurveTo(-90, 20, -80, -10);
            ctx.quadraticCurveTo(-70, -30, -60, -20);
            ctx.quadraticCurveTo(-30, -50, 0, -60);
            ctx.closePath();

            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Eye
            ctx.beginPath();
            ctx.arc(25, -70, 8, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(27, -70, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#222';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(28, -69, 1.5, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            ctx.restore();
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            time += speed;

            // Clear
            ctx.clearRect(0, 0, w, h);

            // Background
            const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            bgGrad.addColorStop(0, '#0a0a1a');
            bgGrad.addColorStop(0.5, '#060612');
            bgGrad.addColorStop(1, '#000000');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, w, h);

            // Update cells
            for (const cell of cells) {
                cell.update(time, mouseX, mouseY, mode);
            }

            // Draw chameleon
            drawChameleonShape(ctx, w, h);

            // Draw subtle texture overlay
            for (const cell of cells) {
                const hue = cell.currentHue % 360;
                const sat = cell.saturation;
                const light = cell.lightness;
                const alpha = 0.03 + Math.sin(cell.phase + time * 0.5) * 0.02;

                ctx.beginPath();
                ctx.arc(cell.x, cell.y, cell.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue + 30}, ${sat}%, ${light + 20}%, ${alpha})`;
                ctx.fill();
            }

            // Update status
            if (frameCount % 30 === 0) {
                const paletteName = palettes[palette].name;
                const modeName = modes[mode];
                statusText.textContent = `🦎 ${modeName} • ${paletteName}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Mode
        modeBtn.addEventListener('click', () => {
            mode = (mode + 1) % modes.length;
            modeBtn.textContent = `Mode: ${modes[mode]}`;
            statusText.textContent = `🔄 ${modes[mode]} mode`;
            setTimeout(() => {
                statusText.textContent = `🦎 ${modes[mode]} • ${palettes[palette].name}`;
            }, 1000);
        });

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🦎 ${modes[mode]} • ${palettes[palette].name}`;
            }, 1000);
        });

        // Palette
        paletteBtn.addEventListener('click', () => {
            palette = (palette + 1) % palettes.length;
            paletteBtn.textContent = `Palette: ${palettes[palette].name}`;
            statusText.textContent = `🎨 ${palettes[palette].name}`;
            setTimeout(() => {
                statusText.textContent = `🦎 ${modes[mode]} • ${palettes[palette].name}`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            mode = 0;
            speedLevel = 1;
            speed = speeds[1].value;
            palette = 0;
            time = 0;
            
            modeBtn.textContent = `Mode: ${modes[0]}`;
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            paletteBtn.textContent = `Palette: ${palettes[0].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `🦎 ${modes[0]} • ${palettes[0].name}`;
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'm' || e.key === 'M') {
                modeBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'p' || e.key === 'P') {
                paletteBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                modeBtn.click();
            }
        });

        // ===== MOUSE INTERACTION =====
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            isHovering = true;
        });

        canvas.addEventListener('mouseleave', () => {
            isHovering = false;
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
        });

        // Touch support
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            isHovering = true;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isHovering = false;
            mouseX = canvas.width / 2;
            mouseY = canvas.height / 2;
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initGrid();
        });

        // ===== INIT =====
        modeBtn.textContent = `Mode: ${modes[0]}`;
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        paletteBtn.textContent = `Palette: ${palettes[0].name}`;
        statusText.textContent = `🦎 ${modes[0]} • ${palettes[0].name}`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🦎 Chameleon Color Shift loaded!');
        console.log('💡 M - Change mode');
        console.log('💡 S - Change speed');
        console.log('💡 P - Change palette');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Cycle modes');
        console.log('💡 Move mouse for Reactive mode');
    </script>
</body>
</html>
