<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Climate Interface — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #060814;
      background-image: 
        radial-gradient(at 0% 0%, rgba(30, 41, 59, 0.3) 0, transparent 50%),
        radial-gradient(at 100% 100%, rgba(15, 23, 42, 0.3) 0, transparent 50%);
      color: #f9fafb;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .grid-layout {
      max-width: 720px;
      width: 100%;
    }
    header {
      margin-bottom: 3rem;
      text-align: center;
    }
    .tech-badge {
      font-family: 'JetBrains Mono', monospace;
      color: #38bdf8;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(56, 189, 248, 0.08);
      padding: 4px 12px;
      border-radius: 20px;
      display: inline-block;
      border: 1px solid rgba(56, 189, 248, 0.15);
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 0.5rem 0;
    }
    p {
      color: #64748b;
      margin: 0;
      font-size: 1rem;
    }
    .widget-flex {
      display: flex;
      flex-flow: row wrap;
      justify-content: center;
      gap: 2rem;
    }
  </style>
</head>
<body>

  <div class="grid-layout">
    <header>
      <div class="tech-badge">System Component Metrics</div>
      <h1>Atmospheric Panel Matrix</h1>
      <p>High-fidelity glassmorphic micro-dashboards with self-contained CSS vector nodes.</p>
    </header>

    <main class="widget-flex">
      <!-- Variant 1: Clear / High Pressure -->
      <div class="ease-weather-card">
        <div class="ease-ambient-glow"></div>
        <div class="ease-weather-icon-wrapper">
          <div class="ease-css-cloud"></div>
        </div>
        <div class="ease-weather-content">
          <div class="ease-weather-location">San Francisco</div>
          <div class="ease-weather-status">Partly Cloudy</div>
          <div class="ease-weather-metrics">
            <span class="ease-weather-temp">18</span>
            <span class="ease-weather-unit">°</span>
          </div>
          <div class="ease-weather-meta-grid">
            <div class="ease-weather-meta-item">HUMIDITY<span>64%</span></div>
            <div class="ease-weather-meta-item">WIND<span>12 km/h</span></div>
          </div>
        </div>
      </div>

      <!-- Variant 2: Storm System -->
      <div class="ease-weather-card ease-weather-stormy">
        <div class="ease-ambient-glow"></div>
        <div class="ease-weather-icon-wrapper">
          <div class="ease-css-cloud"></div>
        </div>
        <div class="ease-weather-content">
          <div class="ease-weather-location">London Base</div>
          <div class="ease-weather-status">Storm Cell</div>
          <div class="ease-weather-metrics">
            <span class="ease-weather-temp">12</span>
            <span class="ease-weather-unit">°</span>
          </div>
          <div class="ease-weather-meta-grid">
            <div class="ease-weather-meta-item">HUMIDITY<span>89%</span></div>
            <div class="ease-weather-meta-item">WIND<span>34 km/h</span></div>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
