<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mask Fade Edges — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Mask Fade Edges</h1>
    <p class="subtitle">Fade the edges of horizontally scrollable content using CSS <code>mask-image</code></p>

    <div class="ease-mask-fade-edges" id="maskContainer">
      <div class="scroll-row">
        <div class="scroll-card">Card 1</div>
        <div class="scroll-card">Card 2</div>
        <div class="scroll-card">Card 3</div>
        <div class="scroll-card">Card 4</div>
        <div class="scroll-card">Card 5</div>
        <div class="scroll-card">Card 6</div>
        <div class="scroll-card">Card 7</div>
        <div class="scroll-card">Card 8</div>
        <div class="scroll-card">Card 9</div>
        <div class="scroll-card">Card 10</div>
      </div>
    </div>

    <p style="color:var(--color-text-muted);margin:1rem 0;font-size:0.9rem;">Scroll horizontally to see the edge fade effect</p>

    <div class="controls">
      <button class="direction-btn active" data-dir="to right">To Right</button>
      <button class="direction-btn" data-dir="to left">To Left</button>
      <button class="direction-btn" data-dir="to top">To Top</button>
      <button class="direction-btn" data-dir="to bottom">To Bottom</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('maskContainer');
    const buttons = document.querySelectorAll('.direction-btn');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const dir = btn.dataset.dir;
        const maskValue = dir === 'to right'
          ? 'linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%)'
          : dir === 'to left'
          ? 'linear-gradient(to left, transparent 0%, black 15%, black 85%, transparent 100%)'
          : dir === 'to top'
          ? 'linear-gradient(to top, transparent 0%, black 15%, black 85%, transparent 100%)'
          : 'linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%)';
        container.style.maskImage = maskValue;
        container.style.webkitMaskImage = maskValue;
        document.documentElement.style.setProperty('--ease-mask-fade-direction', dir);
      });
    });
  </script>

</body>
</html>
