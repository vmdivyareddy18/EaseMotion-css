<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>
        EaseMotion Blur Entrance Tooltip
    </title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

<section class="hero">

    <div class="content">

        <span class="badge">

            EaseMotion CSS

        </span>

        <h1>

            Blur Entrance Tooltip

        </h1>

        <p>

            Modern glassmorphism tooltip with
            elegant blur entrance animation
            designed for marketing landing pages.

        </p>

        <div class="tooltip-wrapper">

            <button

                class="tooltip-trigger"

                aria-describedby="tooltip"

            >

                Explore Features

            </button>

            <div

                class="tooltip"

                id="tooltip"

                role="tooltip"

            >

                <h4>

                    Premium Experience

                </h4>

                <p>

                    Beautiful blur animation
                    using only CSS.

                    Fully responsive and
                    keyboard accessible.

                </p>

            </div>

        </div>

    </div>

</section>

</body>

</html>
