<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Strum Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="guitar">
    <div class="neck"></div>
    <div class="body">
      <div class="soundhole"></div>
      <div class="bridge"></div>
    </div>
    <div class="strings">
      <div class="string" style="--i:0"></div>
      <div class="string" style="--i:1"></div>
      <div class="string" style="--i:2"></div>
      <div class="string" style="--i:3"></div>
      <div class="string" style="--i:4"></div>
      <div class="string" style="--i:5"></div>
    </div>
  </div>
</body>
</html>
