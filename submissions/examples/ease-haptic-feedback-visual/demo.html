<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-haptic-feedback-visual – Haptic Tap Feedback</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Haptic Feedback Visual
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Tap any button — it scales down instantly then springs back.
    </p>

    <!-- Row of interactive buttons -->
    <div class="ease-flex ease-justify-center ease-gap-6 ease-flex-wrap ease-mb-8">
      <button class="haptic-btn ease-btn ease-btn-primary">Primary Action</button>
      <button class="haptic-btn ease-btn ease-btn-secondary">Secondary</button>
      <button class="haptic-btn ease-btn ease-btn-ghost">Ghost Button</button>
      <div class="haptic-btn ease-card ease-p-4 ease-cursor-pointer ease-select-none">
        <span class="ease-font-semibold">Card Tap</span>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-fade-in ease-delay-500">
      Uses <code>:active</code> pseudo‑class — scale 0.96 → 1 in 0.1s.
    </p>
  </div>

</body>
</html>
