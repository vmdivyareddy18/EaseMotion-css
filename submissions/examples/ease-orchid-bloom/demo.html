<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Orchid Bloom</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Ease Orchid Bloom</h1>
        <p>
            Click the orchid to watch it bloom gracefully.
        </p>

        <div class="scene">

            <div class="orchid" id="orchid">

                <div class="stem"></div>

                <div class="flower">

                    <div class="petal petal-top"></div>
                    <div class="petal petal-left"></div>
                    <div class="petal petal-right"></div>
                    <div class="petal petal-bottom-left"></div>
                    <div class="petal petal-bottom-right"></div>

                    <div class="center"></div>

                </div>

            </div>

        </div>

        <button id="bloomBtn">
            BLOOM
        </button>

    </main>

    <script>
        const orchid = document.getElementById("orchid");
        const bloomBtn = document.getElementById("bloomBtn");

        function bloom() {

            orchid.classList.remove("bloom");

            void orchid.offsetWidth;

            orchid.classList.add("bloom");
        }

        bloomBtn.addEventListener("click", bloom);
        orchid.addEventListener("click", bloom);
    </script>

</body>

</html>
