<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Checkbox Showcase - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Certified GSSoC-26 Production Submission Component -->
    <div class="dashboard-container">
        <div class="finance-card">
            <h2 class="card-title">Finance Preferences</h2>
            <p class="card-subtitle">Configure your dashboard parameters below.</p>
            <div class="checkbox-group">
                <label class="neumorphic-checkbox-wrapper">
                    <input type="checkbox" class="neumorphic-input" checked>
                    <span class="neumorphic-switch"></span>
                    <span class="label-text">Enable Real-time Asset Tracking</span>
                </label>
            </div>
            <div class="checkbox-group">
                <label class="neumorphic-checkbox-wrapper">
                    <input type="checkbox" class="neumorphic-input">
                    <span class="neumorphic-switch"></span>
                    <span class="label-text">Biometric Transaction Signature</span>
                </label>
            </div>
            <div class="checkbox-group">
                <label class="neumorphic-checkbox-wrapper">
                    <input type="checkbox" class="neumorphic-input">
                    <span class="neumorphic-switch"></span>
                    <span class="label-text">Automated Multi-ledger Sync</span>
                </label>
            </div>
        </div>
    </div>
</body>
</html>
