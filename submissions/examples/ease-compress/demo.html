<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-compress – Compress & Spring Back</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Compress & Spring</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the button to compress the card, then it springs back.</p>

    <div id="compress-box" class="compress-box ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Squash me</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">scaleY bounce</p>
    </div>

    <button id="compress-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">Compress</button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      <code>scaleY(0.6) → scaleY(1.1) → scaleY(1)</code> spring-back.
    </p>
  </div>

  <script>
    const box = document.getElementById('compress-box');
    document.getElementById('compress-btn').addEventListener('click', () => {
      box.classList.remove('compress');
      void box.offsetWidth;          // force reflow to restart
      box.classList.add('compress');
    });
  </script>

</body>
</html>
