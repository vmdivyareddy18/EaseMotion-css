<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathe Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 60px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .breathe-text {
      margin-top: 20px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Breathe Meditation Animation</h2>
    
    <div class="demo-row">
      <!-- Default Breathe -->
      <div class="demo-item">
        <div class="breathe"></div>
        <span class="demo-label">Default (4-4-4-4)</span>
        <span class="breathe-text">Inhale... Hold... Exhale... Hold...</span>
      </div>
      
      <!-- Fast Breathe -->
      <div class="demo-item">
        <div class="breathe breathe-fast"></div>
        <span class="demo-label">Fast (3-3-3-3)</span>
        <span class="breathe-text">Quick rhythm</span>
      </div>
      
      <!-- Slow Breathe -->
      <div class="demo-item">
        <div class="breathe breathe-slow"></div>
        <span class="demo-label">Slow (5-5-5-5)</span>
        <span class="breathe-text">Deep relaxation</span>
      </div>
      
      <!-- With Text -->
      <div class="demo-item">
        <div class="breathe breathe-with-text">
          <span class="breathe-in">Inhale</span>
          <span class="breathe-out">Exhale</span>
        </div>
        <span class="demo-label">With Labels</span>
        <span class="breathe-text">Guided breathing</span>
      </div>
      
      <!-- Ring Variant -->
      <div class="demo-item">
        <div class="breathe breathe-ring"></div>
        <span class="demo-label">Ring Style</span>
        <span class="breathe-text">Minimal ring</span>
      </div>
    </div>
  </div>
</body>
</html>
