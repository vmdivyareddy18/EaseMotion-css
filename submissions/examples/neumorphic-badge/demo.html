<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Badge</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="badge ease-fade-in">
        <span class="dot"></span>
        Cyber Active
    </div>

    <div class="badge">
        <span class="dot"></span>
        Verified
    </div>

    <div class="badge">
        <span class="dot"></span>
        Premium
    </div>

</div>

</body>
</html>
