<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heatmap Visualization Grid Showcase</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background-color: #040408;
      color: #f8fafc;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .wrapper {
      text-align: center;
      margin-bottom: 2rem;
    }
    .wrapper h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem;
      font-weight: 800;
      color: #ffffff;
    }
    .wrapper p {
      color: #64748b;
      margin: 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Heatmap Visualization Grid</h1>
    <p>Responsive, interactive activity/contribution tracking grid with theme support.</p>
  </div>

  <div class="heatmap-container theme-green" id="heatmapContainer">
    <div class="heatmap-header">
      <h3 class="heatmap-title">Annual Activity</h3>
      <div class="theme-selector">
        <button class="theme-btn" onclick="setTheme('green')">Green</button>
        <button class="theme-btn" onclick="setTheme('purple')">Purple</button>
      </div>
    </div>

    <!-- 53 columns x 7 rows grid -->
    <div class="heatmap-grid" id="heatmapGrid"></div>

    <div class="heatmap-legend">
      <span>Less</span>
      <div class="legend-cell"></div>
      <div class="legend-cell level-1"></div>
      <div class="legend-cell level-2"></div>
      <div class="legend-cell level-3"></div>
      <div class="legend-cell level-4"></div>
      <span>More</span>
    </div>
  </div>

  <script>
    // Programmatically populate the grid cells (53 columns * 7 rows = 371 cells)
    const grid = document.getElementById('heatmapGrid');
    const totalCells = 371;

    for (let i = 0; i < totalCells; i++) {
      const cell = document.createElement('div');
      cell.classList.add('heatmap-cell');
      
      // Randomize activity levels to create realistic heatmap distribution
      const rand = Math.random();
      if (rand > 0.85) {
        cell.classList.add('level-4');
      } else if (rand > 0.7) {
        cell.classList.add('level-3');
      } else if (rand > 0.5) {
        cell.classList.add('level-2');
      } else if (rand > 0.3) {
        cell.classList.add('level-1');
      }
      
      grid.appendChild(cell);
    }

    // Toggle grid theme classes
    function setTheme(theme) {
      const container = document.getElementById('heatmapContainer');
      container.className = `heatmap-container theme-${theme}`;
    }
  </script>
</body>
</html>
