<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Avatar Group</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="ava-wrapper">
      <header class="ava-header">
        <h1 class="ava-title">Avatar Group</h1>
        <p class="ava-sub">Overlapping avatar stack with hover reveal and presence indicators</p>
      </header>
      <div class="avt-section">
        <p class="avt-label">Team Members</p>
        <div class="avt-stack">
          <div class="avt-item"><span class="avt-presence avt-online"></span></div>
          <div class="avt-item"><span class="avt-presence avt-away"></span></div>
          <div class="avt-item"><span class="avt-presence avt-busy"></span></div>
          <div class="avt-item"><span class="avt-presence avt-online"></span></div>
          <div class="avt-item"><span class="avt-presence avt-offline"></span></div>
          <div class="avt-item"><span class="avt-presence avt-online"></span></div>
          <div class="avt-more">+12</div>
        </div>
      </div>
      <div class="avt-section" style="margin-top:3rem">
        <p class="avt-label">Small Avatars</p>
        <div class="avt-stack" style="--avt-size:36px">
          <div class="avt-item" style="width:36px;height:36px"><span class="avt-presence avt-online" style="width:9px;height:9px"></span></div>
          <div class="avt-item" style="width:36px;height:36px"><span class="avt-presence avt-busy" style="width:9px;height:9px"></span></div>
          <div class="avt-item" style="width:36px;height:36px"><span class="avt-presence avt-away" style="width:9px;height:9px"></span></div>
          <div class="avt-more" style="width:36px;height:36px">+5</div>
        </div>
      </div>
      <div class="avt-section" style="margin-top:3rem">
        <p class="avt-label">Large Avatars</p>
        <div class="avt-stack">
          <div class="avt-item" style="width:64px;height:64px"><span class="avt-presence avt-online"></span></div>
          <div class="avt-item" style="width:64px;height:64px"><span class="avt-presence avt-online"></span></div>
          <div class="avt-item" style="width:64px;height:64px"><span class="avt-presence avt-busy"></span></div>
        </div>
      </div>
    </div>
  </body>
</html>
