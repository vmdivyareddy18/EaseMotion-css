<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Notification Dot Pulse</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='dot-color')r.style.setProperty('--dot-color',t.value);if(t.name==='ring-color')r.style.setProperty('--ring-color',t.value);if(t.name==='dot-size')r.style.setProperty('--dot-size',t.value+'px');if(t.name==='pulse-duration')r.style.setProperty('--pulse-duration',t.value+'s')})</script>
<div class="container"><p class="title">Notification Dot Pulse</p>
<div class="icons"><div class="icon-item"><div class="icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="dot"></span></div><span class="icon-label">Messages</span></div>
<div class="icon-item"><div class="icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg><span class="dot"></span></div><span class="icon-label">Alerts</span></div>
<div class="icon-item"><div class="icon-wrap"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg><span class="dot"></span></div><span class="icon-label">Updates</span></div></div>
<div class="controls"><label>Dot: <input type="color" name="dot-color" value="#f72585"></label><label>Ring: <input type="color" name="ring-color" value="#f72585"></label><label>Size: <input type="range" name="dot-size" min="6" max="24" value="12"></label><label>Speed: <input type="range" name="pulse-duration" min="0.5" max="4" step="0.1" value="1.5"></label></div></div></body></html>
