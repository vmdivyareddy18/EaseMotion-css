<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-achievement-unlock – Achievement Badge Unlock</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-900 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-text-white ease-mb-6 ease-fade-in">
      Achievement Unlocked
    </h1>
    <p class="ease-text-gray-400 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button to unlock a badge.
    </p>

    <button id="unlock-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mb-10">
      🏆 Unlock Badge
    </button>

    <!-- Badge container (hidden by default) -->
    <div id="badge" class="badge-wrapper">
      <div class="badge-icon">
        <span class="badge-emoji">⭐</span>
        <div class="badge-glow"></div>
      </div>
      <p class="badge-title ease-text-white ease-text-xl ease-font-bold ease-mt-4">First Achievement</p>
      <p class="badge-subtitle ease-text-gray-400 ease-text-sm">You unlocked your first badge!</p>
    </div>

    <p class="ease-text-sm ease-text-gray-500 ease-mt-8 ease-fade-in ease-delay-500">
      Swings in · Glows · Settles
    </p>
  </div>

  <script>
    const btn = document.getElementById('unlock-btn');
    const badge = document.getElementById('badge');

    btn.addEventListener('click', () => {
      // Remove any existing animation class, then force reflow to restart
      badge.classList.remove('badge-unlocked');
      void badge.offsetWidth;
      badge.classList.add('badge-unlocked');
    });
  </script>

</body>
</html>
