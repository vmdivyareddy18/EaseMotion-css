<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Flag Cleanup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="cleanup">
    <section class="summary">
      <p>Flag Governance</p>
      <h1>Feature Flag Cleanup</h1>
      <span>9 stale flags found</span>
    </section>

    <section class="flags" aria-label="Feature flag cleanup list">
      <article>
        <strong>checkout-v2-shadow</strong>
        <span class="remove">Remove</span>
        <p>Traffic has been at 100% for three releases.</p>
      </article>
      <article>
        <strong>search-rerank-test</strong>
        <span class="review">Review</span>
        <p>Experiment owner needs to confirm final metrics.</p>
      </article>
      <article>
        <strong>profile-cache-rollout</strong>
        <span class="keep">Keep</span>
        <p>Flag still protects a regional rollout path.</p>
      </article>
    </section>
  </main>
</body>
</html>
