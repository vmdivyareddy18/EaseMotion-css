<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Animated Masonry Photo Grid</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <header class="demo-header">
            <h1>Animated Masonry Grid</h1>
            <p>CSS column-based masonry with stagger reveal animations.</p>

        <div class="masonry-grid">
            <div class="masonry-item item-1">
                <img src="https://images.unsplash.com/photo-1513360371669-4adf3dd7dff8?w=500&auto=format&fit=crop" alt="Photo 1">
            </div>
            <div class="masonry-item item-2">
                <img src="https://images.unsplash.com/photo-1542314831-c6a4d1409386?w=500&auto=format&fit=crop" alt="Photo 2">
            </div>
            <div class="masonry-item item-3">
                <img src="https://images.unsplash.com/photo-1506744626753-1436bf3985a8?w=500&auto=format&fit=crop" alt="Photo 3">
            </div>
            <div class="masonry-item item-4">
                <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=500&auto=format&fit=crop" alt="Photo 4">
            </div>
            <div class="masonry-item item-5">
                <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=500&auto=format&fit=crop" alt="Photo 5">

                <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=500&auto=format&fit=crop" alt="Photo 8">
            </div>
            <div class="masonry-item item-9">
                <img src="https://images.unsplash.com/photo-1454372182658-c712e4c5a1db?w=500&auto=format&fit=crop" alt="Photo 9">
            </div>
        </div>
    </div>
</body>
</html>
