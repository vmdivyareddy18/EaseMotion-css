<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Origami Paper Plane Submit Button Micro-Interaction - EaseMotion CSS
    </title>
    <!-- Google Fonts Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="plane-header">
      <span class="badge">Micro-Interaction Showcase</span>
      <h1 class="title">Paper Plane Submit</h1>
      <p class="description">
        A playful submit button animation. Fill in the form and click "Send
        Message" to watch the button container fold itself into a paper plane,
        complete a 3D loop, and return as a success checkmark.
      </p>
    </header>

    <!-- Interactive Mock Form Card -->
    <main class="form-card">
      <h2 class="form-title">Contact Support</h2>

      <form onsubmit="return false;">
        <!-- Name -->
        <div class="form-group">
          <label class="form-label" for="nameInput">Name</label>
          <input
            type="text"
            id="nameInput"
            class="form-input"
            placeholder="Alexander Wright"
            required
          />
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="emailInput">Email Address</label>
          <input
            type="email"
            id="emailInput"
            class="form-input"
            placeholder="alexander@domain.com"
            required
          />
        </div>

        <!-- Message -->
        <div class="form-group">
          <label class="form-label" for="messageInput">Message</label>
          <textarea
            id="messageInput"
            class="form-input"
            placeholder="How can we help you today?"
            required
          ></textarea>
        </div>

        <!-- Submit Micro-Interaction Button Container -->
        <div class="submit-wrapper">
          <input type="checkbox" id="submit-toggle" class="submit-checkbox" />
          <label for="submit-toggle" class="submit-button">
            <span class="btn-content">
              Send Message
              <svg class="btn-icon" viewBox="0 0 24 24">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"></path>
              </svg>
            </span>
            <!-- Success checkmark icon -->
            <span class="btn-check">✓</span>
          </label>
        </div>

        <!-- Replay Controller -->
        <button class="replay-btn" id="replayBtn" type="button">
          Reset Form & Replay
        </button>
      </form>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const submitToggle = document.getElementById("submit-toggle");
        const replayBtn = document.getElementById("replayBtn");
        const nameInput = document.getElementById("nameInput");
        const emailInput = document.getElementById("emailInput");
        const messageInput = document.getElementById("messageInput");

        // Setup quick replay control
        replayBtn.addEventListener("click", () => {
          // Uncheck the hidden state trigger
          submitToggle.checked = false;

          // Clear inputs
          nameInput.value = "";
          emailInput.value = "";
          messageInput.value = "";
        });
      });
    </script>
  </body>
</html>
