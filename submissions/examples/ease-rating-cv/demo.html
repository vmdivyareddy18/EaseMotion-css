<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated Rating</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Rating Component</h1>

<section>

<h2>Gold Theme</h2>

<div class="rating gold">
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
</div>

</section>

<section>

<h2>Blue Theme</h2>

<div class="rating blue">
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
<span>★</span>
</div>

</section>

<section>

<h2>Half Star Example</h2>

<div class="rating half">
<span>★</span>
<span>★</span>
<span>★</span>
<span class="half-star">★</span>
<span>☆</span>
</div>

</section>

</div>

</body>
</html>
