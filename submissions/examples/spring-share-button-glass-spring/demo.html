<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic UI Elements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="glass-viewport">
    <!-- Interactive checkbox to handle the click expansion state naturally -->
    <div class="share-widget-group">
      <input type="checkbox" id="toggle-share-state" class="hidden-state-checkbox">
      
      <label for="toggle-share-state" class="main-glass-trigger" tabindex="0">
        <svg class="share-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
        </svg>
        <span class="trigger-label">Share Content</span>
      </label>

      <!-- Submenu items that fly out with spring-like physics mappings -->
      <div class="spring-menu-drawer">
        <a href="#link" class="glass-action-node" style="--spring-index: 1;">Copy Link</a>
        <a href="#twitter" class="glass-action-node" style="--spring-index: 2;">Twitter</a>
        <a href="#embed" class="glass-action-node" style="--spring-index: 3;">Embed</a>
      </div>
    </div>
  </main>

  <script>
    // Keyboard accessibility mapping for tab-focused elements
    const labels = document.querySelectorAll('.main-glass-trigger');
    labels.forEach(lbl => {
      lbl.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          document.getElementById(lbl.getAttribute('for')).click();
        }
      });
    });
  </script>
</body>
</html>
