<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Terminal Console</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>
  <div class="scanlines"></div>

  <main class="console-box" role="region" aria-label="Terminal Console">
    <header class="console-title">
      <span class="title-glow">EASEMOTION // SECURITY TERMINAL</span>
      <span class="status-badge">ONLINE</span>
    </header>

    <div class="console-body">
      <div class="line active-text">INITIALIZING QUANTUM NETWORKS...</div>
      <div class="line text-green">[OK] CONNECTIVITY ESTABLISHED</div>
      <div class="line text-green">[OK] ANOMALY SHIELD ACTIVATED</div>
      <div class="line text-purple">> RUNNING DOCK SCANNER COMPONENT...</div>
      <div class="line cursor-blink">> SYSTEM CHECK READY <span class="cursor"></span></div>
    </div>
  </main>
</body>
</html>
