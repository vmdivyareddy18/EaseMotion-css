<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Safe Area Bottom Action Bar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <div class="content-card">

        <h1>Checkout Summary</h1>

        <p>
            This example demonstrates a bottom action bar that
            respects device safe areas on modern smartphones.
        </p>

        <div class="summary-item">
            <span>Premium Plan</span>
            <span>$49</span>
        </div>

        <div class="summary-item">
            <span>Storage Add-on</span>
            <span>$9</span>
        </div>

        <div class="summary-item total">
            <span>Total</span>
            <span>$58</span>
        </div>

    </div>

</div>

<div class="bottom-action-bar">

    <div class="price-section">

        <span class="label">
            Total
        </span>

        <span class="price">
            $58.00
        </span>

    </div>

    <button class="action-btn">
        Continue
    </button>

</div>

</body>
</html>
