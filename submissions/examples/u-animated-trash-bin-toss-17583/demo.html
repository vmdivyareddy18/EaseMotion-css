<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Trash Bin Toss</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Trash Bin Toss</h1>

  <p class="intro">
    A reusable delete animation for file managers, admin dashboards,
    productivity apps, and document management systems.
  </p>

  <div class="demo-grid">

    <div class="trash-card">
      <div class="trash-bin-toss">
        <span class="file">📄</span>
        <span class="bin">🗑️</span>
      </div>
      <h3>Delete File</h3>
    </div>

    <div class="trash-card">
      <div class="trash-bin-toss large">
        <span class="file">📄</span>
        <span class="bin">🗑️</span>
      </div>
      <p>Recycle Bin</p>
    </div>

    <div class="trash-card">
      <div class="trash-bin-toss">
        <span class="file">📄</span>
        <span class="bin">🗑️</span>
      </div>
      <button>Delete</button>
    </div>

  </div>

</main>

</body>
</html>
