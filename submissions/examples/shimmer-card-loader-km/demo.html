<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Card Loader Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Shimmer Card Loader</h1>
      <p class="subtitle">A premium, smooth, skeleton loader with modern glassmorphism and animated shimmer waves.</p>
    </header>

    <div class="demo-wrapper">
      <!-- Loading Skeleton Card -->
      <div class="card skeleton-card">
        <div class="avatar shimmer-element"></div>
        <div class="content">
          <div class="line title shimmer-element"></div>
          <div class="line text-short shimmer-element"></div>
          <div class="line text-long shimmer-element"></div>
          <div class="line text-medium shimmer-element"></div>
        </div>
        <div class="footer">
          <div class="badge-placeholder shimmer-element"></div>
          <div class="btn-placeholder shimmer-element"></div>
        </div>
      </div>

      <!-- Loaded Active Card (For Comparison) -->
      <div class="card active-card">
        <div class="avatar active-avatar">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&h=150&q=80" alt="Avatar">
        </div>
        <div class="content">
          <h2 class="active-title">Aria Montgomery</h2>
          <p class="active-text-subtitle">Senior UX Engineer</p>
          <p class="active-text-body">Designing future-proof interaction systems for next-generation immersive applications.</p>
        </div>
        <div class="footer">
          <span class="active-badge">Pro Member</span>
          <button class="active-btn">Connect</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
