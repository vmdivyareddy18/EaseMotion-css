<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Energy Charge Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="charge-wrapper">
      <h1>Energy Charge</h1>
      <p class="description">
        A pure CSS energy charging animation with pulsing glow.
      </p>
      <div
        class="battery"
        tabindex="0"
        role="img"
        aria-label="Energy charging animation"
      >
        <div class="battery-head"></div>
        <div class="battery-body">
          <div class="charge-level"></div>
        </div>
        <div class="particles">
          <span class="p"></span><span class="p"></span><span class="p"></span>
          <span class="p"></span><span class="p"></span><span class="p"></span>
        </div>
      </div>
    </div>
  </body>
</html>
