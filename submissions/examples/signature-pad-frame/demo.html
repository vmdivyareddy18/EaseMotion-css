<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Signature Pad Frame - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated Signature Pad Frame</h1>
      <p>Interactive signature validation container featuring hardware-accelerated feedback states, baseline fades, and click responses.</p>
    </header>

    <div class="pad-wrapper">
      <div class="ease-signature-frame" id="signature-frame">
        <canvas id="sig-canvas" width="500" height="180"></canvas>
        <div class="ease-signature-baseline" id="sig-baseline">Sign on the line above</div>
        
        <div class="success-overlay">✓ Signature Saved</div>
      </div>

      <div class="action-bar">
        <button class="ease-signature-clear-btn" id="clear-btn">Clear Pad</button>
        <button class="action-btn save-btn" id="save-btn">Save Signature</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('sig-canvas');
      const ctx = canvas.getContext('2d');
      const frame = document.getElementById('signature-frame');
      const baseline = document.getElementById('sig-baseline');
      const clearBtn = document.getElementById('clear-btn');
      const saveBtn = document.getElementById('save-btn');

      let isDrawing = false;
      let hasInk = false;

      // Ensure crisp high-DPI canvas drawing
      ctx.strokeStyle = "#38bdf8";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      // --- Minimal Canvas Ink Drawing Logic ---
      function startDrawing(e) {
        isDrawing = true;
        hasInk = true;
        baseline.classList.add('fade-out'); // Fade out baseline guide line
        ctx.beginPath();
        ctx.moveTo(e.offsetX, e.offsetY);
      }

      function draw(e) {
        if (!isDrawing) return;
        ctx.lineTo(e.offsetX, e.offsetY);
        ctx.stroke();
      }

      function stopDrawing() {
        isDrawing = false;
      }

      canvas.addEventListener('mousedown', startDrawing);
      canvas.addEventListener('mousemove', draw);
      canvas.addEventListener('mouseup', stopDrawing);
      canvas.addEventListener('mouseleave', stopDrawing);

      // --- Interactive Action Handlers ---

      // Clear Pad Handler
      clearBtn.addEventListener('click', () => {
        // Trigger shake animation on clear button
        clearBtn.classList.add('trigger-shake');
        
        // Reset Drawing State
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hasInk = false;
        baseline.classList.remove('fade-out');
        frame.className = 'ease-signature-frame'; // Reset any state classes on frame

        // Remove shake class after animation finishes
        setTimeout(() => clearBtn.classList.remove('trigger-shake'), 400);
      });

      // Save/Submit Handler
      saveBtn.addEventListener('click', () => {
        // Remove prior state classes to allow re-triggering
        frame.classList.remove('ease-signature-saved-pulse', 'ease-signature-empty-shake');

        if (!hasInk) {
          // Trigger error shake + flash if frame is empty
          void frame.offsetWidth; // Force CSS reflow to re-trigger keyframe
          frame.classList.add('ease-signature-empty-shake');
        } else {
          // Trigger success glow and save verification pulse
          void frame.offsetWidth;
          frame.classList.add('ease-signature-saved-pulse');
        }
      });
    });
  </script>
</body>
</html>
