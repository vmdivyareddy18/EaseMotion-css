<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch Slide - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tss-wrapper">
    <h1>Toggle Switch Slide</h1>
    <p class="tss-subtitle">Slide toggles with smooth knob animation</p>
    <div class="tss-list">
      <label class="tss-item" data-status="Wi-Fi is OFF">
        <span class="tss-label">Wi-Fi</span>
        <span class="tss-toggle" data-status-el>
          <span class="tss-track">
            <span class="tss-knob"></span>
          </span>
        </span>
        <span class="tss-status">Off</span>
      </label>
      <label class="tss-item" data-status="Bluetooth is OFF">
        <span class="tss-label">Bluetooth</span>
        <span class="tss-toggle" data-status-el>
          <span class="tss-track">
            <span class="tss-knob"></span>
          </span>
        </span>
        <span class="tss-status">Off</span>
      </label>
      <label class="tss-item" data-status="Dark Mode is OFF">
        <span class="tss-label">Dark Mode</span>
        <span class="tss-toggle" data-status-el>
          <span class="tss-track">
            <span class="tss-knob"></span>
          </span>
        </span>
        <span class="tss-status">Off</span>
      </label>
      <label class="tss-item" data-status="Notifications are OFF">
        <span class="tss-label">Notifications</span>
        <span class="tss-toggle" data-status-el>
          <span class="tss-track">
            <span class="tss-knob"></span>
          </span>
        </span>
        <span class="tss-status">Off</span>
      </label>
    </div>
    <p class="tss-summary" id="tssSummary">All toggles are Off</p>
  </div>
  <script>
    const toggles = document.querySelectorAll('.tss-toggle');
    const summary = document.getElementById('tssSummary');

    toggles.forEach(toggle => {
      toggle.addEventListener('click', () => {
        const item = toggle.closest('.tss-item');
        const statusEl = item.querySelector('.tss-status');
        const isOn = toggle.classList.toggle('tss-on');
        statusEl.textContent = isOn ? 'On' : 'Off';
        updateSummary();
      });
    });

    function updateSummary() {
      const onCount = document.querySelectorAll('.tss-toggle.tss-on').length;
      if (onCount === 0) summary.textContent = 'All toggles are Off';
      else if (onCount === toggles.length) summary.textContent = 'All toggles are On';
      else summary.textContent = onCount + ' of ' + toggles.length + ' toggles are On';
    }
  </script>
</body>
</html>
