<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Request Status Stack</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="request-shell">
    <section class="request-panel" aria-labelledby="request-title">
      <div class="panel-heading">
        <p class="eyebrow">Developer console</p>
        <h1 id="request-title">API request stack</h1>
      </div>

      <ol class="request-stack">
        <li class="request-item is-success">
          <span class="method">GET</span>
          <span class="path">/v1/customers</span>
          <span class="status">200</span>
        </li>
        <li class="request-item is-running">
          <span class="method">POST</span>
          <span class="path">/v1/checkout/sessions</span>
          <span class="status">Running</span>
        </li>
        <li class="request-item is-queued">
          <span class="method">PATCH</span>
          <span class="path">/v1/users/role</span>
          <span class="status">Queued</span>
        </li>
        <li class="request-item is-warning">
          <span class="method">GET</span>
          <span class="path">/v1/reports/export</span>
          <span class="status">429</span>
        </li>
        <li class="request-item is-failed">
          <span class="method">DELETE</span>
          <span class="path">/v1/session</span>
          <span class="status">500</span>
        </li>
      </ol>
    </section>
  </main>
</body>
</html>
