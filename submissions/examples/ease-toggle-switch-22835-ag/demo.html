<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Switch Component — EaseMotion CSS</title>
  <meta name="description" content="Pure CSS accessible toggle switch component with size variants, color variants, disabled states, and smooth spring-like animations.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Switch Component</span>
      <h1>Toggle Switch</h1>
      <p class="description">
        An accessible, pure-CSS checkbox replacement featuring smooth spring-like transitions,
        focus-visible outlines, sizing variants, and multiple colors.
      </p>
    </header>

    <main class="showcase">

      <!-- Column 1: Sizes & Colors -->
      <section class="demo-card">
        <h2 class="section-title">Colors & Sizes</h2>
        
        <div class="switch-row">
          <label class="ease-switch ease-switch-sm ease-switch-primary">
            <input type="checkbox" class="ease-switch-input" checked>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Small Primary</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-primary">
            <input type="checkbox" class="ease-switch-input" checked>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Default Primary</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-lg ease-switch-primary">
            <input type="checkbox" class="ease-switch-input" checked>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Large Primary</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-lg ease-switch-success">
            <input type="checkbox" class="ease-switch-input" checked>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Large Success</span>
          </label>
        </div>
      </section>

      <!-- Column 2: States -->
      <section class="demo-card">
        <h2 class="section-title">States</h2>

        <div class="switch-row">
          <label class="ease-switch ease-switch-primary">
            <input type="checkbox" class="ease-switch-input">
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Unchecked State</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-primary">
            <input type="checkbox" class="ease-switch-input" disabled>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Disabled Unchecked</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-primary">
            <input type="checkbox" class="ease-switch-input" checked disabled>
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Disabled Checked</span>
          </label>
        </div>

        <div class="switch-row">
          <label class="ease-switch ease-switch-primary">
            <input type="checkbox" class="ease-switch-input">
            <span class="ease-switch-track">
              <span class="ease-switch-thumb"></span>
            </span>
            <span class="label-text">Keyboard Focusable (Tab me)</span>
          </label>
        </div>
      </section>

    </main>
  </div>

</body>
</html>
