<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Avatar Selector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ias-container">
    <h1>Choose Your Avatar</h1>
    <div class="ias-grid">
      <div class="ias-avatar" data-name="Alice" data-color="#6366f1">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Alice&backgroundColor=c0aede" alt="Alice">
        <span class="ias-label">Alice</span>
      </div>
      <div class="ias-avatar" data-name="Bob" data-color="#f59e0b">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Bob&backgroundColor=ffd5dc" alt="Bob">
        <span class="ias-label">Bob</span>
      </div>
      <div class="ias-avatar" data-name="Carol" data-color="#10b981">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Carol&backgroundColor=b6e3f4" alt="Carol">
        <span class="ias-label">Carol</span>
      </div>
      <div class="ias-avatar" data-name="Dave" data-color="#8b5cf6">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Dave&backgroundColor=d1d4f9" alt="Dave">
        <span class="ias-label">Dave</span>
      </div>
      <div class="ias-avatar" data-name="Eve" data-color="#ec4899">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Eve&backgroundColor=f4d0e0" alt="Eve">
        <span class="ias-label">Eve</span>
      </div>
      <div class="ias-avatar" data-name="Frank" data-color="#14b8a6">
        <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Frank&backgroundColor=c0aede" alt="Frank">
        <span class="ias-label">Frank</span>
      </div>
    </div>
    <p class="ias-status">Selected: <span id="ias-selected-name">None</span></p>
    <button id="ias-confirm" class="ias-btn" disabled>Confirm Selection</button>
  </main>
  <script src="script.js"></script>
</body>
</html>
