<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Flow Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="panel">

<div class="gesture">
<div class="pulse"></div>
<div class="hand">✋</div>
</div>

<h2>Gesture Detection</h2>

<p>
Simulating real-time gesture tracking with animated motion indicators.
</p>

<div class="cards">

<div class="card">
<h3>Swipe</h3>
<span>Detected</span>
</div>

<div class="card">
<h3>Pinch</h3>
<span>Ready</span>
</div>

<div class="card">
<h3>Rotate</h3>
<span>Tracking</span>
</div>

</div>

</section>

</body>
</html>
