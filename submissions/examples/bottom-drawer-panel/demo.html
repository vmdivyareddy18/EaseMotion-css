<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Bottom Modal Drawer Panel</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }

    /* Emulates an absolute mobile phone device window pane to showcase drawer fixed locks */
    .alm-device-mock-envelope {
      position: relative;
      width: 320px;
      height: 520px;
      background-color: #050814;
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 2rem;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Bottom Sheet Modal Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click the launcher label inside the device cockpit. Checkbox structures combined with sibling lookup links handle sheet toggles with 0 scripts.</p>
  </header>

  <div class="alm-device-mock-envelope">
    
    <input type="checkbox" id="drawerToggleNode" class="alm-drawer-toggle-state">

    <label for="drawerToggleNode" class="alm-drawer-backdrop-dimmer"></label>

    <label for="drawerToggleNode" class="alm-panel-launcher-btn">Open Assistant Sheet</label>

    <div class="alm-drawer-sheet">
      <div class="alm-drawer-drag-pill"></div>
      
      <div class="alm-drawer-header-block">
        <h4 class="alm-drawer-title-string">Cluster Node Assistant</h4>
        <p class="alm-drawer-desc-string">Select an absolute deployment path string element to stream telemetry data logs.</p>
      </div>

      <div class="alm-drawer-actions-row">
        <a href="#sync" class="alm-drawer-action-node">🔄 Sync</a>
        <a href="#purge" class="alm-drawer-action-node" style="color: #ef4444;">✕ Purge</a>
        <label for="drawerToggleNode" class="alm-drawer-action-node" style="color: #64748b;">Dismiss</label>
      </div>
    </div>

  </div>

</body>
</html>
