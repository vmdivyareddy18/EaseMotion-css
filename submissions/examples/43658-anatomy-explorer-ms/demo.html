<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component Anatomy Explorer Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-anatomy-container">
    <h2 class="ease-anatomy-title">Anatomy Explorer</h2>
    
    <div class="ease-anatomy-stage">
      
      <!-- The component being explored -->
      <div class="ease-anatomy-card">
        <h3 style="margin-top: 0; font-family: system-ui;">Profile Card</h3>
        <p style="color: #64748b; font-family: system-ui; font-size: 0.875rem;">Hover over the red pulsing dots to see which classes power this component.</p>
        
        <div style="position: relative; display: inline-block;">
          <a href="#" class="ease-anatomy-btn">Follow User</a>
          
          <div class="ease-hotspot ease-hotspot-2">2</div>
          <div class="ease-tooltip ease-tooltip-2">
            Built using <code>.ease-btn</code> and <code>.ease-hover-lift</code>
          </div>
        </div>
        
        <div class="ease-hotspot ease-hotspot-1">1</div>
        <div class="ease-tooltip ease-tooltip-1">
          Built using <code>.ease-card</code> and <code>.ease-fade-in</code>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
