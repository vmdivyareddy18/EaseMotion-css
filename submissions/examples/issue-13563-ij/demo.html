<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-progress-circular - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-progress-circular</h1>
    <p class="description">Circular/ring progress indicator using SVG stroke-dashoffset technique.</p>

    <div class="circular-demo">
      <div class="ease-progress-circular" id="progressRing">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle class="track" cx="80" cy="80" r="68" stroke-width="8"/>
          <circle class="fill" id="progressFill" cx="80" cy="80" r="68" stroke-width="8"
            stroke-dasharray="427.26" stroke-dashoffset="149.54"/>
        </svg>
        <span class="percentage" id="percentageLabel">65%</span>
      </div>

      <div class="slider-wrap">
        <span style="color:var(--text-secondary);font-size:0.85rem;">0%</span>
        <input type="range" id="progressSlider" min="0" max="100" value="65">
        <span style="color:var(--text-secondary);font-size:0.85rem;">100%</span>
      </div>
    </div>
  </div>

  <script>
    const slider = document.getElementById('progressSlider');
    const fill = document.getElementById('progressFill');
    const label = document.getElementById('percentageLabel');
    const circumference = 2 * Math.PI * 68;

    function setProgress(value) {
      const offset = circumference - (value / 100) * circumference;
      fill.style.strokeDasharray = circumference;
      fill.style.strokeDashoffset = offset;
      label.textContent = Math.round(value) + '%';
    }

    slider.addEventListener('input', () => setProgress(slider.value));
  </script>
</body>
</html>
