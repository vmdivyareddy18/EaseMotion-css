<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Autocomplete List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ac-container">
    <h1>Autocomplete Search</h1>
    <p class="ac-desc">Type a language name — suggestions appear with staggered slide-in animation.</p>

    <div class="ac-wrapper">
      <input type="text" id="acInput" class="ac-input" placeholder="e.g. JavaScript" autocomplete="off">
      <ul class="ac-list" id="acList"></ul>
    </div>
  </main>

  <script>
    const suggestions = [
      "JavaScript", "Python", "Java", "TypeScript", "C#",
      "C++", "Go", "Rust", "Kotlin", "Swift",
      "Ruby", "PHP", "Scala", "Dart", "Elixir",
      "Clojure", "Haskell", "Lua", "Zig", "OCaml"
    ];

    const input = document.getElementById("acInput");
    const list = document.getElementById("acList");
    let selectedIndex = -1;

    function render(filter) {
      const q = filter.toLowerCase();
      const filtered = suggestions.filter((s) => s.toLowerCase().includes(q));
      list.innerHTML = "";
      selectedIndex = -1;

      filtered.forEach((item, i) => {
        const li = document.createElement("li");
        li.textContent = item;
        li.classList.add("ac-item");
        li.style.setProperty("--ac-index", i);
        li.addEventListener("click", () => {
          input.value = item;
          list.innerHTML = "";
        });
        list.appendChild(li);
      });
    }

    input.addEventListener("input", (e) => {
      const val = e.target.value;
      if (val.length === 0) {
        list.innerHTML = "";
        return;
      }
      render(val);
    });

    input.addEventListener("keydown", (e) => {
      const items = list.querySelectorAll(".ac-item");
      if (!items.length) return;

      if (e.key === "ArrowDown") {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
        updateActive(items);
      } else if (e.key === "ArrowUp") {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, -1);
        updateActive(items);
      } else if (e.key === "Enter" && selectedIndex >= 0) {
        e.preventDefault();
        input.value = items[selectedIndex].textContent;
        list.innerHTML = "";
      } else if (e.key === "Escape") {
        list.innerHTML = "";
        input.blur();
      }
    });

    function updateActive(items) {
      items.forEach((el, i) => {
        el.classList.toggle("active", i === selectedIndex);
      });
    }

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".ac-wrapper")) {
        list.innerHTML = "";
      }
    });
  </script>
</body>
</html>
