<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asset Warranty Status Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Asset Warranty Status</h1>

        <p class="subtitle">
            Monitor warranty coverage and upcoming expirations across company assets.
        </p>

        <div class="cards">

            <div class="asset active">

                <div class="top">

                    <h3>MacBook Pro 16"</h3>

                    <span class="badge success">
                        Active
                    </span>

                </div>

                <p>Expires: 18 Dec 2027</p>

                <div class="progress">

                    <div class="fill active-fill"></div>

                </div>

            </div>

            <div class="asset warning">

                <div class="top">

                    <h3>Dell PowerEdge R750</h3>

                    <span class="badge warning-badge">
                        Expiring Soon
                    </span>

                </div>

                <p>Expires: 12 Aug 2026</p>

                <div class="progress">

                    <div class="fill warning-fill"></div>

                </div>

            </div>

            <div class="asset expired">

                <div class="top">

                    <h3>Cisco Switch</h3>

                    <span class="badge expired-badge">
                        Expired
                    </span>

                </div>

                <p>Expired: 28 May 2026</p>

                <div class="progress">

                    <div class="fill expired-fill"></div>

                </div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Total Assets</span>

                <strong>48</strong>

            </div>

            <div class="stat">

                <span>Covered</span>

                <strong>41</strong>

            </div>

            <div class="stat">

                <span>Expired</span>

                <strong>7</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
