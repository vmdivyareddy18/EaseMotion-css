<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Loan Approval Checkmark Burst</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Loan Approval Checkmark Burst</h1>

  <p class="intro">
    A reusable approval animation for loan platforms,
    banking dashboards, and fintech applications.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="loan-approval-burst">
        <span class="approval-icon">✅</span>
      </div>
      <h3>Loan Approved</h3>
    </div>

    <div class="card">
      <div class="loan-approval-burst">
        <span class="approval-icon large">✅</span>
      </div>
      <p>Application Accepted</p>
    </div>

    <div class="card">
      <div class="loan-approval-burst">
        <span class="approval-icon">✅</span>
      </div>
      <button>View Details</button>
    </div>

  </div>

</div>

</body>
</html>
