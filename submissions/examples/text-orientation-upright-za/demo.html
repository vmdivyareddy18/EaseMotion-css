<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Orientation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Text Orientation</h1>
  <div class="orient-grid">
    <div class="orient-card">
      <h2>mixed</h2>
      <div class="v-text mixed">CSS Text</div>
      <span class="orient-label">text-orientation: mixed</span>
    </div>
    <div class="orient-card">
      <h2>upright</h2>
      <div class="v-text upright">CSS Text</div>
      <span class="orient-label">text-orientation: upright</span>
    </div>
    <div class="orient-card">
      <h2>sideways</h2>
      <div class="v-text sideways">CSS Text</div>
      <span class="orient-label">text-orientation: sideways</span>
    </div>
  </div>
</body>
</html>
