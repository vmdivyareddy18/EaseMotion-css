<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Auto Flow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Grid Auto Flow</h1>
  <div class="grid-showcase">
    <div class="grid-panel">
      <h2>row</h2>
      <div class="grid-demo flow-row">
        <div class="g-item wide">1</div>
        <div class="g-item">2</div>
        <div class="g-item tall">3</div>
        <div class="g-item">4</div>
        <div class="g-item wide">5</div>
        <div class="g-item">6</div>
      </div>
    </div>
    <div class="grid-panel">
      <h2>column</h2>
      <div class="grid-demo flow-col">
        <div class="g-item wide">1</div>
        <div class="g-item">2</div>
        <div class="g-item tall">3</div>
        <div class="g-item">4</div>
        <div class="g-item wide">5</div>
        <div class="g-item">6</div>
      </div>
    </div>
    <div class="grid-panel">
      <h2>dense</h2>
      <div class="grid-demo flow-dense">
        <div class="g-item wide">1</div>
        <div class="g-item">2</div>
        <div class="g-item tall">3</div>
        <div class="g-item">4</div>
        <div class="g-item wide">5</div>
        <div class="g-item">6</div>
      </div>
    </div>
  </div>
</body>
</html>
