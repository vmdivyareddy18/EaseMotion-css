<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Error Summary Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Form validation</p>
      <h1 id="demo-title">Form error summary</h1>
      <p>An accessible alert panel that lists validation issues above a form and links users back to fields.</p>
    </section>
    <section class="demo-stage" aria-label="Form Error Summary Panel">
      <section class="error-summary" role="alert" aria-labelledby="error-title"><h2 id="error-title">Please fix 3 fields</h2><a href="#email">Email address is required</a><a href="#plan">Choose a billing plan</a><a href="#terms">Accept the workspace terms</a></section><form class="demo-form"><label id="email">Email <input type="email" aria-invalid="true"></label><label id="plan">Plan <select aria-invalid="true"><option>Select plan</option></select></label></form>
    </section>
  </main>
</body>
</html>
