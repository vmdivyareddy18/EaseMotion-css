<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Wave Stopwatch Analytics Module Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-playground">
    <header class="dashboard-header">
      <span class="analytics-pill" role="status">Telemetry Node // #42610</span>
      <h1>Wave Stopwatch Controller</h1>
      <p>An analytics dashboard component executing fluid wave state transformations and automated metric tracking loops without JavaScript overhead.</p>
    </header>

    <main class="widget-stage">
      
      <!-- Interactive Wave Stopwatch Module Container -->
      <div class="ease-wave-stopwatch-card">
        
        <!-- Native Invisible Checkbox Toggle acting as the stopwatch runtime state hub -->
        <input type="checkbox" id="ease-stopwatch-active-trigger" class="ease-stopwatch-state-checkbox">
        
        <div class="ease-stopwatch-interface">
          
          <!-- Liquid Wave Dynamic Mask Elements (Rendered inside a clip-path perimeter) -->
          <div class="ease-wave-tank-wrapper" aria-hidden="true">
            <div class="wave-fluid-layer fluid-primary"></div>
            <div class="wave-fluid-layer fluid-secondary"></div>
          </div>

          <!-- Presentational Top-Level Content Face -->
          <div class="ease-stopwatch-body">
            
            <div class="meta-metric-row">
              <span class="metric-label">SESSION MONITOR</span>
              <div class="live-pulse-node"></div>
            </div>

            <!-- Central Micro-Counter Digit Simulation Blocks -->
            <div class="stopwatch-digits-display">
              <span class="time-block digit-hrs">00</span><span class="time-divider">:</span>
              <span class="time-block digit-mins">04</span><span class="time-divider">:</span>
              <span class="time-block digit-secs">12</span>
            </div>

            <!-- Contextual Analytics Subtext -->
            <p class="stopwatch-summary-text">Tracking background server thread allocations</p>

            <!-- Control Core Label Trigger -->
            <label for="ease-stopwatch-active-trigger" class="ease-stopwatch-action-btn" role="button" aria-label="Toggle execution telemetry tracking stopwatch">
              <span class="label-text-idle">Initialize Track</span>
              <span class="label-text-running">Halt Telemetry</span>
            </label>

          </div>

        </div>

      </div>

    </main>
  </div>

  <script>
    // Accessibility keyboard handler to guarantee input operability via space/enter keys
    const labelNode = document.querySelector('.ease-stopwatch-action-btn');
    const inputNode = document.getElementById('ease-stopwatch-active-trigger');
    
    labelNode.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        inputNode.checked = !inputNode.checked;
        inputNode.dispatchEvent(new Event('change'));
      }
    });
  </script>

</body>
</html>
