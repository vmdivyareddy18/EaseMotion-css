<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Smooth Scroll To Top — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #14141c; color: #f5f7fa; }
    section { height: 100vh; display: flex; align-items: center; justify-content: center; font-size: 2rem; border-bottom: 1px solid #2a2a3a; }
  </style>
</head>
<body>

  <section>Scroll down to see the button appear ↓</section>
  <section>Keep scrolling...</section>
  <section>Almost there...</section>
  <section>Click the button, bottom-right, to scroll back up</section>

  <button class="ease-scroll-top" id="scrollTopBtn" aria-label="Scroll to top" type="button">
    <svg class="scroll-ring" viewBox="0 0 48 48">
      <circle class="ring-track" cx="24" cy="24" r="21"></circle>
      <circle class="ring-fill" cx="24" cy="24" r="21" style="--circumference: 132"></circle>
    </svg>
    <svg viewBox="0 0 24 24">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="5 12 12 5 19 12"></polyline>
    </svg>
  </button>

  <script>
    const btn = document.getElementById('scrollTopBtn');
    const ringFill = document.querySelector('.ring-fill');
    const circumference = 132;

    function updateScrollUI() {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      const progress = docHeight > 0 ? scrollTop / docHeight : 0;

      if (scrollTop > 300) {
        btn.classList.add('is-visible');
      } else {
        btn.classList.remove('is-visible');
      }

      ringFill.style.strokeDashoffset = circumference * (1 - progress);
    }

    window.addEventListener('scroll', updateScrollUI, { passive: true });
    updateScrollUI();

    btn.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
