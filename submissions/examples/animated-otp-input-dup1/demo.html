<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ease OTP Input Collection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="demo">

  <h1>Animated PIN / OTP Input Collection</h1>
  <p class="subtitle">
    Enter the demo code: <strong>123456</strong>
  </p>

  <div class="ease-otp-wrapper">

    <div class="ease-otp-row" id="otpRow">

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        autocomplete="one-time-code"
        aria-label="Digit 1"
      />

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        aria-label="Digit 2"
      />

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        aria-label="Digit 3"
      />

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        aria-label="Digit 4"
      />

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        aria-label="Digit 5"
      />

      <input
        class="ease-otp-box"
        maxlength="1"
        inputmode="numeric"
        aria-label="Digit 6"
      />

    </div>

    <p class="status" id="status">
      Waiting for input…
    </p>

    <div class="actions">
      <button id="verifyBtn">
        Verify
      </button>

      <button id="resetBtn">
        Reset
      </button>
    </div>

  </div>
</div>

<script>
const row = document.getElementById('otpRow');
const inputs = [...document.querySelectorAll('.ease-otp-box')];
const status = document.getElementById('status');
const verifyBtn = document.getElementById('verifyBtn');
const resetBtn = document.getElementById('resetBtn');

function getCode() {
  return inputs.map(i => i.value).join('');
}

function clearStates() {
  row.classList.remove('is-invalid');
  row.classList.remove('is-complete');
}

function updateState() {
  const complete = inputs.every(i => i.value);

  if (complete) {
    status.textContent = 'Ready to verify';
  } else {
    status.textContent = 'Waiting for input…';
  }
}

inputs.forEach((input, index) => {

  input.addEventListener('input', (e) => {
    clearStates();

    let value = e.target.value.replace(/\D/g, '');
    e.target.value = value;

    if (!value) {
      updateState();
      return;
    }

    input.classList.remove('ease-otp-fill-pop');
    void input.offsetWidth;
    input.classList.add('ease-otp-fill-pop');

    if (index < inputs.length - 1) {
      inputs[index + 1].focus();
      inputs[index + 1].select();
    }

    updateState();
  });

  input.addEventListener('keydown', (e) => {
    clearStates();

    if (e.key === 'Backspace') {
      if (!input.value && index > 0) {
        inputs[index - 1].focus();
        inputs[index - 1].value = '';
      }
    }

    if (e.key === 'ArrowLeft' && index > 0) {
      inputs[index - 1].focus();
    }

    if (e.key === 'ArrowRight' && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }
  });

  input.addEventListener('focus', () => {
    input.select();
  });
});

row.addEventListener('paste', (e) => {
  e.preventDefault();

  const pasted =
    (e.clipboardData || window.clipboardData)
      .getData('text')
      .replace(/\D/g, '')
      .slice(0, inputs.length);

  pasted.split('').forEach((char, i) => {
    inputs[i].value = char;

    inputs[i].classList.remove('ease-otp-fill-pop');
    void inputs[i].offsetWidth;
    inputs[i].classList.add('ease-otp-fill-pop');
  });

  const next =
    inputs[Math.min(pasted.length, inputs.length - 1)];

  next.focus();

  updateState();
});

verifyBtn.addEventListener('click', () => {
  clearStates();

  if (getCode() === '123456') {
    row.classList.add('is-complete');
    status.textContent = 'Verification successful!';
  } else {
    row.classList.add('is-invalid');
    status.textContent = 'Invalid code. Try 123456.';
  }
});

resetBtn.addEventListener('click', () => {
  inputs.forEach(i => i.value = '');

  clearStates();

  status.textContent = 'Waiting for input…';

  inputs[0].focus();
});

inputs[0].focus();
</script>

</body>
</html>
