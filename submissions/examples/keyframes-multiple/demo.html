<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiple Keyframes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Multiple @keyframes on One Element</h1>
    <p class="subtitle">Combine position, scale, rotation, and colour animations on a single element.</p>

    <section class="demo-section">
      <h2>Combined Motion</h2>
      <div class="stage">
        <div class="combo-mover"></div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Breakdown</h2>
      <div class="breakdown-grid">
        <div class="breakdown-card">
          <span class="bd-label">Position</span>
          <div class="bd-stage"><div class="bd-box pos-only"></div></div>
        </div>
        <div class="breakdown-card">
          <span class="bd-label">Scale</span>
          <div class="bd-stage"><div class="bd-box scale-only"></div></div>
        </div>
        <div class="breakdown-card">
          <span class="bd-label">Rotation</span>
          <div class="bd-stage"><div class="bd-box rotate-only"></div></div>
        </div>
        <div class="breakdown-card">
          <span class="bd-label">Colour</span>
          <div class="bd-stage"><div class="bd-box colour-only"></div></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Layer Stack (Multiple Animations)</h2>
      <p class="layer-desc">Four animations applied simultaneously: move, pulse, spin, and fade.</p>
      <div class="layer-stage">
        <div class="layer-mover"></div>
      </div>
    </section>
  </main>
</body>
</html>
