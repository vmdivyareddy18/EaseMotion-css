<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Map Embed Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <article class="store-card ease-magnetic" role="article" aria-labelledby="store-heading">
        <div class="map-wrapper" role="img" aria-label="Map showing store location in downtown shopping district">
            <div class="map-embed-placeholder">
                <div class="radar-ping"></div>
                <div class="location-pin">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <div class="map-grid-overlay"></div>
            </div>
        </div>

        <section class="store-details">
            <header class="store-header">
                <span class="status-badge">Open Until 9:00 PM</span>
                <h2 id="store-heading">Downtown Flagship Store</h2>
            </header>
            
            <p class="store-address">
                1024 Innovation Blvd, Suite 400<br>
                Tech District, CA 94016
            </p>

            <div class="store-actions">
                <a href="#" class="btn btn-primary" aria-label="Get navigation directions to the downtown flagship store">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg>
                    Directions
                </a>
                <a href="tel:+15550199" class="btn btn-secondary" aria-label="Call the downtown flagship store">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    Call Store
                </a>
            </div>
        </section>
    </article>

</body>
</html>
