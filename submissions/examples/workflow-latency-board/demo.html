<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Latency Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="latency-shell" aria-labelledby="latency-title">
    <section class="latency-panel">
      <div class="copy">
        <p class="eyebrow">workflow telemetry</p>
        <h1 id="latency-title">Workflow latency board</h1>
        <p>Animated latency bars compare workflow stages and expose where queues are slowing down delivery.</p>
      </div>

      <div class="bars" aria-label="Workflow latency by stage">
        <div class="bar-row">
          <span>Intake</span>
          <div class="track"><i class="fast"></i></div>
          <strong>0.8s</strong>
        </div>
        <div class="bar-row">
          <span>Review</span>
          <div class="track"><i class="watch"></i></div>
          <strong>2.4s</strong>
        </div>
        <div class="bar-row">
          <span>Deploy</span>
          <div class="track"><i class="slow"></i></div>
          <strong>4.1s</strong>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
