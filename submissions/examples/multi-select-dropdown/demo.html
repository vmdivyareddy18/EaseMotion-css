<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi-Select Dropdown with Checkboxes</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="msel">
      <button class="msel-trigger" id="mselTrigger">Select categories ▼</button>
      <div class="msel-dropdown" id="mselDropdown">
        <label class="msel-option">
          <input type="checkbox" value="Design" checked /> Design
        </label>
        <label class="msel-option">
          <input type="checkbox" value="Development" /> Development
        </label>
        <label class="msel-option">
          <input type="checkbox" value="Marketing" /> Marketing
        </label>
        <label class="msel-option">
          <input type="checkbox" value="Finance" /> Finance
        </label>
        <label class="msel-option">
          <input type="checkbox" value="HR" /> HR
        </label>
      </div>
      <div class="msel-tags" id="mselTags">
        <span class="msel-tag">Design ✕</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
