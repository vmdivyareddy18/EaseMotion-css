<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Multi-Box Grid Input for OTP Codes</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-otp-group">
  <input type="text" maxlength="1" class="otp-box" value="5">
  <input type="text" maxlength="1" class="otp-box" value="2">
  <input type="text" maxlength="1" class="otp-box" placeholder="•">
  <input type="text" maxlength="1" class="otp-box" placeholder="•">
</div>
</body>
</html>
