<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secondary Outline Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 5rem 1rem; margin: 0;">

  <div class="ease-button-showcase">
    
    <div style="margin-bottom: 2rem;">
      <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.25rem;">Button Component Hierarchy</h3>
      <p style="margin: 0; color: #64748b; font-size: 0.9rem;">Preview the interaction profiles built into the secondary outline utility variant token.</p>
    </div>

    <div class="ease-button-row">
      
      <button class="ease-btn ease-btn-secondary-outline">
        Secondary Action
      </button>

      <button class="ease-btn ease-btn-secondary-outline" disabled>
        Disabled State
      </button>

    </div>

  </div>

</body>
</html>
