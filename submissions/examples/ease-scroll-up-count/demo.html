<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Count-Up on Scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <section class="stats">
    <div class="stat" data-target="150">0</div>
    <div class="stat" data-target="300">0</div>
    <div class="stat" data-target="500">0</div>
  </section>

  <script>
    // IntersectionObserver triggers count-up when elements enter view
    const counters = document.querySelectorAll('.stat');
    const options = { threshold: 0.5 };

    const countUp = (el) => {
      const target = +el.getAttribute('data-target');
      const duration = 1500;
      const startTime = performance.now();

      const update = (currentTime) => {
        const progress = Math.min((currentTime - startTime) / duration, 1);
        el.textContent = Math.floor(progress * target);
        if (progress < 1) requestAnimationFrame(update);
      };
      requestAnimationFrame(update);
    };

    const observer = new IntersectionObserver((entries, obs) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !entry.target.classList.contains('counted')) {
          countUp(entry.target);
          entry.target.classList.add('counted');
          obs.unobserve(entry.target); // one-shot trigger
        }
      });
    }, options);

    counters.forEach(counter => observer.observe(counter));
  </script>
</body>
</html>
