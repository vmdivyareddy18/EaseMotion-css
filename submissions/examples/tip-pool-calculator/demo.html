<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Pool Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <section class="hero">
    <h1>Tip Pool Calculator</h1>
    <p>
      Calculate fair tip distribution based on hours worked,
      participation percentages, and team contribution.
    </p>
  </section>

  <section class="card">

    <div class="form-group">
      <label>Total Tip Pool (₹)</label>
      <input
        type="number"
        id="tipPool"
        value="1000"
      >
    </div>

    <div class="form-group">
      <label>Pool Participation (%)</label>
      <input
        type="number"
        id="poolPercent"
        value="100"
      >
    </div>

  </section>

  <section class="card">

    <h2>Employee Management</h2>

    <div class="employee-form">

      <input
        type="text"
        id="employeeName"
        placeholder="Employee Name"
      >

      <input
        type="number"
        id="employeeHours"
        placeholder="Hours Worked"
      >

      <button id="addEmployeeBtn">
        Add Employee
      </button>

    </div>

    <div id="errorMessage"></div>

    <div id="employeeList"></div>

  </section>

  <section class="summary-grid">

    <div class="summary-card">
      <h3>Total Employees</h3>
      <span id="employeeCount">0</span>
    </div>

    <div class="summary-card">
      <h3>Total Hours</h3>
      <span id="totalHours">0</span>
    </div>

    <div class="summary-card">
      <h3>Pool Amount</h3>
      <span id="poolAmount">₹0</span>
    </div>

  </section>

  <button
    class="calculate-btn"
    id="calculateBtn"
  >
    Calculate Distribution
  </button>

  <section class="card">

    <h2>Payout Summary</h2>

    <div id="results"></div>

  </section>

</main>

<script>

    function saveEmployees() {

  localStorage.setItem(
    "tipPoolEmployees",
    JSON.stringify(employees)
  );

}

const savedSettings =
  JSON.parse(
    localStorage.getItem(
      "tipPoolSettings"
    )
  );

if (savedSettings) {

  document.getElementById(
    "tipPool"
  ).value =
    savedSettings.tipPool;

  document.getElementById(
    "poolPercent"
  ).value =
    savedSettings.poolPercent;

}

    function formatINR(value) {
  return new Intl.NumberFormat(
    "en-IN",
    {
      style: "currency",
      currency: "INR",
      maximumFractionDigits: 2
    }
  ).format(value);
}

function saveSettings() {

  localStorage.setItem(
    "tipPoolSettings",
    JSON.stringify({
      tipPool:
        document.getElementById(
          "tipPool"
        ).value,

      poolPercent:
        document.getElementById(
          "poolPercent"
        ).value
    })
  );

}

const defaultEmployees = [
  { name: "Alice", hours: 40 },
  { name: "Bob", hours: 35 },
  { name: "Charlie", hours: 25 }
];

const employees =
  JSON.parse(
    localStorage.getItem(
      "tipPoolEmployees"
    )
  ) || defaultEmployees;

const employeeList =
  document.getElementById("employeeList");

  document
.getElementById("tipPool")
.addEventListener(
  "input",
  saveSettings
);

document
.getElementById("poolPercent")
.addEventListener(
  "input",
  saveSettings
);

function renderEmployees() {

  employeeList.innerHTML = "";

  employees.forEach((employee, index) => {

    const row =
      document.createElement("div");

    row.className = "employee-row";

    row.innerHTML = `
      <input
        value="${employee.name}"
        onchange="
employees[${index}].name=this.value;
saveEmployees();
"
      >

      <input
        type="number"
        value="${employee.hours}"
        onchange="
employees[${index}].hours=
Number(this.value);
saveEmployees();
"
      >

      <button
        onclick="deleteEmployee(${index})"
      >
        Delete
      </button>
    `;

    employeeList.appendChild(row);

  });

  updateSummary();

}

function deleteEmployee(index) {

  employees.splice(index, 1);

saveEmployees();

renderEmployees();

}

function updateSummary() {

  const totalHours =
    employees.reduce(
      (sum, emp) =>
        sum + Number(emp.hours || 0),
      0
    );

  const pool =
    Number(
      document.getElementById(
        "tipPool"
      ).value
    );

  const participation =
    Number(
      document.getElementById(
        "poolPercent"
      ).value
    ) / 100;

  document.getElementById(
    "employeeCount"
  ).textContent = employees.length;

  document.getElementById(
    "totalHours"
  ).textContent = totalHours;

  document.getElementById(
  "poolAmount"
).textContent =
formatINR(
  pool * participation
);

}

document
.getElementById("addEmployeeBtn")
.addEventListener("click", () => {

  const name =
    document.getElementById(
      "employeeName"
    ).value.trim();

  const hours =
    Number(
      document.getElementById(
        "employeeHours"
      ).value
    );

  const error =
    document.getElementById(
      "errorMessage"
    );

  error.textContent = "";

  if (!name) {

    error.textContent =
      "Employee name is required.";

    return;

  }

  if (!hours || hours <= 0) {

    error.textContent =
      "Hours worked must be greater than zero.";

    return;

  }

  employees.push({
  name,
  hours
});

saveEmployees();

renderEmployees();

  document.getElementById(
    "employeeName"
  ).value = "";

  document.getElementById(
    "employeeHours"
  ).value = "";

  renderEmployees();

});

document
.getElementById("calculateBtn")
.addEventListener("click", () => {

  const results =
    document.getElementById(
      "results"
    );

  results.innerHTML = "";

  if (employees.length === 0) {

    results.innerHTML =
      "<p>Add at least one employee.</p>";

    return;

  }

  const totalHours =
    employees.reduce(
      (sum, emp) =>
        sum + Number(emp.hours),
      0
    );

  if (totalHours <= 0) {

    results.innerHTML =
      "<p>Total hours must be greater than zero.</p>";

    return;

  }

  const totalPool =
    Number(
      document.getElementById(
        "tipPool"
      ).value
    );

  const participation =
    Number(
      document.getElementById(
        "poolPercent"
      ).value
    ) / 100;

  const poolAmount =
    totalPool * participation;

  employees.forEach(employee => {

    const percentage =
      (
        employee.hours /
        totalHours
      ) * 100;

    const payout =
      (
        employee.hours /
        totalHours
      ) * poolAmount;

    const card =
      document.createElement("div");

    card.className =
      "result-card";

    card.innerHTML = `
      <h3>${employee.name}</h3>

      <p>
        Hours:
        ${employee.hours}
      </p>

      <p>
        Contribution:
        ${percentage.toFixed(1)}%
      </p>

      <strong>
        ${formatINR(payout)}
      </strong>
    `;

    results.appendChild(card);

  });

});

renderEmployees();

</script>

</body>
</html>
