<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Controller Vibrate — Rumble Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="controller-demo">
    <h1>Game Controller Vibrate</h1>
    <p class="subtitle">Click the controller to feel the rumble</p>

    <div class="controller-wrapper" style="--controller-color: #2a2a35; --vibrate-intensity: 4px; --rumble-duration: 0.6s; --accent-color: #7c5cbf;">
      <button class="controller" id="triggerBtn" aria-label="Vibrate controller">
        <svg viewBox="0 0 100 60" fill="none" xmlns="http://www.w3.org/2000/svg" class="controller-svg">
          <!-- Main body -->
          <rect x="15" y="10" width="70" height="35" rx="8" class="body" fill="var(--controller-color)"/>
          <!-- Grips -->
          <rect x="5" y="18" width="14" height="30" rx="6" class="grip left-grip" fill="var(--controller-color)"/>
          <rect x="81" y="18" width="14" height="30" rx="6" class="grip right-grip" fill="var(--controller-color)"/>
          <!-- D-pad -->
          <rect x="28" y="20" width="16" height="16" rx="3" class="dpad" fill="var(--accent-color)" opacity="0.7"/>
          <!-- Buttons -->
          <circle cx="65" cy="23" r="5" class="btn btn-a" fill="var(--accent-color)"/>
          <circle cx="75" cy="28" r="4" class="btn btn-b" fill="var(--accent-color)" opacity="0.85"/>
          <!-- Center indicators -->
          <circle cx="48" cy="30" r="2" class="indicator" fill="var(--accent-color)" opacity="0.5"/>
          <circle cx="53" cy="30" r="2" class="indicator" fill="var(--accent-color)" opacity="0.5"/>
        </svg>
        <span class="rumble-label">RUMBLE!</span>
      </button>
    </div>

    <div class="controls">
      <span>Click anywhere on the controller</span>
    </div>
  </div>

  <script>
    document.getElementById('triggerBtn').addEventListener('click', function() {
      this.classList.remove('vibrating');
      void this.offsetWidth;  /* force reflow to restart animation */
      this.classList.add('vibrating');
    });
  </script>
</body>
</html>
