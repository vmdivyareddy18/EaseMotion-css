<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frosted Glass Accordion</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="container">

<h1>Frosted Glass Accordion</h1>

<div class="accordion">

  <details>
    <summary>Product Details</summary>
    <p>
      Explore product information with a smooth frosted glass animation.
    </p>
  </details>

  <details>
    <summary>Shipping Information</summary>
    <p>
      Fast and reliable delivery options available.
    </p>
  </details>

  <details>
    <summary>Return Policy</summary>
    <p>
      Easy returns with customer-friendly policies.
    </p>
  </details>

</div>

</main>

</body>
</html>
