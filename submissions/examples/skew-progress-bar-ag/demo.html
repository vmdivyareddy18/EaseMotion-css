<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skew Progress Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-wrapper">
    <h1 class="demo-title">SYSTEM LOAD</h1>
    
    <!-- progress container -->
    <div class="progress-container">
      <span class="progress-label" id="cpu-label">CPU Usage</span>
      <span class="progress-value">75%</span>
      
      <!-- skew bar -->
      <div class="skew-progress-bar" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" aria-labelledby="cpu-label">
        <div class="skew-progress-fill ease-progress-stripe" style="width: 75%;"></div>
      </div>
    </div>

    <!-- progress container -->
    <div class="progress-container">
      <span class="progress-label" id="ram-label">Memory</span>
      <span class="progress-value">40%</span>
      
      <!-- skew bar -->
      <div class="skew-progress-bar" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100" aria-labelledby="ram-label">
        <div class="skew-progress-fill ease-progress-stripe fill-magenta" style="width: 40%;"></div>
      </div>
    </div>
  </main>
</body>
</html>
