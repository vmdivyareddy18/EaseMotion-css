<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Roll In Right - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-roll-right">Roll Entry</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-roll-right'); void b.offsetWidth; b.classList.add('ease-roll-right');">Roll In</button>
    </div>
</body>
</html>
