<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-text-flash – Text Color Flash</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Text Color Flash
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button to make the text flash briefly.
    </p>

    <p id="flash-text" class="flash-text ease-text-2xl ease-font-semibold">
      This text will flash!
    </p>

    <button id="flash-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">
      Flash It
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      One‑shot color flash via <code>--ease-text-flash-color</code>.
    </p>
  </div>

  <script>
    const text = document.getElementById('flash-text');
    const btn = document.getElementById('flash-btn');

    btn.addEventListener('click', () => {
      text.classList.remove('flash');
      void text.offsetWidth;          // force reflow to restart animation
      text.classList.add('flash');
    });
  </script>

</body>
</html>
