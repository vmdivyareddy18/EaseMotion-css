<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Floating Orbit Popover</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="dashboard">

    <section class="card">

        <h2>Revenue</h2>

        <p>$42,580</p>

        <div class="popover-wrapper">

            <button
                class="popover-trigger"
                aria-describedby="popover"
            >
                Analytics
            </button>

            <div
                id="popover"
                class="popover"
                role="tooltip"
            >

                <div class="orbit"></div>

                <h3>Performance</h3>

                <p>
                    Revenue increased
                    <strong>24%</strong>
                    compared to last month.
                </p>

                <span class="badge">
                    Healthy Growth
                </span>

            </div>

        </div>

    </section>

</main>

</body>
</html>
