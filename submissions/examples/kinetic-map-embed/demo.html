<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Kinetic Map Embed - Neon UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="map-wrapper">
        <!-- Interactive Mode Controls (Pure CSS State Changes) -->
        <input type="radio" name="map-mode" id="mode-scan" class="state-trigger" checked>
        <input type="radio" name="map-mode" id="mode-radar" class="state-trigger">

        <!-- The Neon Kinetic Map Container -->
        <div class="kinetic-map-container">
            <!-- Simulated Vector Cyber Grid Lines -->
            <div class="map-grid-layer"></div>
            <div class="kinetic-scan-bar"></div>

            <!-- Interactive Map Target Hotspots -->
            <div class="map-hotspot pin-primary" style="--top: 35%; --left: 40%;">
                <div class="radar-pulse"></div>
                <div class="core-node"></div>
                <div class="hotspot-tooltip">Sector Alpha Active</div>
            </div>

            <div class="map-hotspot pin-secondary" style="--top: 60%; --left: 72%;">
                <div class="radar-pulse"></div>
                <div class="core-node"></div>
                <div class="hotspot-tooltip">Node Bravo Secure</div>
            </div>

            <!-- HUD Control Overlays -->
            <div class="hud-header">
                <span class="hud-title">TACTICAL MAP MATRIX v4.22</span>
                <span class="hud-status">SYS_STATUS: ONLINE</span>
            </div>

            <div class="hud-controls">
                <label for="mode-scan" class="hud-btn btn-scan">Matrix Scan</label>
                <label for="mode-radar" class="hud-btn btn-radar">Ping Radar</label>
            </div>
        </div>
    </div>

</body>
</html>
