<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Chart Race</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chart-container">
    <h1>Bar Chart Race</h1>
    <div class="controls">
      <button class="btn-race" id="randomizeBtn">Randomize &amp; Race</button>
    </div>
    <div class="chart" id="chart"></div>
  </div>

  <script>
    const categories = [
      { label: "Cats", color: "color-1" },
      { label: "Dogs", color: "color-2" },
      { label: "Birds", color: "color-3" },
      { label: "Fish", color: "color-4" },
      { label: "Reptiles", color: "color-5" },
      { label: "Rodents", color: "color-6" },
      { label: "Others", color: "color-7" }
    ];

    const chart = document.getElementById("chart");

    function randomValue() {
      return Math.floor(Math.random() * 80) + 10;
    }

    function buildBars(values) {
      chart.innerHTML = "";
      categories.forEach((cat, i) => {
        const row = document.createElement("div");
        row.className = "bar-row";

        const label = document.createElement("span");
        label.className = "bar-label";
        label.textContent = cat.label;

        const track = document.createElement("div");
        track.className = "bar-track";

        const fill = document.createElement("div");
        fill.className = "bar-fill " + cat.color;
        fill.style.width = "0%";

        const valSpan = document.createElement("span");
        valSpan.className = "bar-value";
        valSpan.textContent = values[i];

        fill.appendChild(valSpan);
        track.appendChild(fill);
        row.appendChild(label);
        row.appendChild(track);
        chart.appendChild(row);
      });

      requestAnimationFrame(() => {
        const fills = chart.querySelectorAll(".bar-fill");
        fills.forEach((fill, i) => {
          fill.style.width = values[i] + "%";
        });
      });
    }

    function randomize() {
      const values = categories.map(() => randomValue());
      buildBars(values);
    }

    document.getElementById("randomizeBtn").addEventListener("click", randomize);

    randomize();
  </script>
</body>
</html>
