<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Theme Switcher - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ts-wrapper">

    <h1>Theme Switcher</h1>

    <div class="ts-themes" id="themeList">
      <button class="ts-theme" data-theme="dark" style="--ts-color: #6366f1">
        <span class="ts-theme-preview" style="background:#1a1a1a;border-color:#333"></span>
        Dark
      </button>
      <button class="ts-theme" data-theme="light" style="--ts-color: #f59e0b">
        <span class="ts-theme-preview" style="background:#fafafa;border-color:#e5e5e5"></span>
        Light
      </button>
      <button class="ts-theme" data-theme="ocean" style="--ts-color: #06b6d4">
        <span class="ts-theme-preview" style="background:#0c1929;border-color:#1e3a5f"></span>
        Ocean
      </button>
      <button class="ts-theme" data-theme="forest" style="--ts-color: #22c55e">
        <span class="ts-theme-preview" style="background:#0a1f0a;border-color:#2d5a2d"></span>
        Forest
      </button>
      <button class="ts-theme" data-theme="sunset" style="--ts-color: #f43f5e">
        <span class="ts-theme-preview" style="background:#1f0f0f;border-color:#5a2d2d"></span>
        Sunset
      </button>
    </div>

    <div class="ts-card">
      <h2>Preview Card</h2>
      <p>This card updates its colors instantly when you switch themes. The active theme is saved in localStorage.</p>
      <button class="ts-btn">Sample Button</button>
    </div>

  </div>

  <script>
    const themes = {
      dark:   { bg: '#0f0f0f', surface: '#1a1a1a', text: '#fff', muted: '#888', accent: '#6366f1', border: '#333' },
      light:  { bg: '#fafafa', surface: '#fff', text: '#1a1a1a', muted: '#666', accent: '#f59e0b', border: '#e5e5e5' },
      ocean:  { bg: '#0c1929', surface: '#0f2847', text: '#e0f2fe', muted: '#7dd3fc', accent: '#06b6d4', border: '#1e3a5f' },
      forest: { bg: '#0a1f0a', surface: '#0f2d0f', text: '#dcfce7', muted: '#86efac', accent: '#22c55e', border: '#2d5a2d' },
      sunset: { bg: '#1f0f0f', surface: '#2d1515', text: '#ffe4e6', muted: '#fda4af', accent: '#f43f5e', border: '#5a2d2d' },
    };

    let current = localStorage.getItem('tsTheme') || 'dark';

    function applyTheme(name) {
      const t = themes[name];
      if (!t) return;
      const r = document.documentElement.style;
      r.setProperty('--ts-bg', t.bg);
      r.setProperty('--ts-surface', t.surface);
      r.setProperty('--ts-text', t.text);
      r.setProperty('--ts-muted', t.muted);
      r.setProperty('--ts-accent', t.accent);
      r.setProperty('--ts-border', t.border);
      localStorage.setItem('tsTheme', name);
      current = name;
      document.querySelectorAll('.ts-theme').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
    }

    document.querySelectorAll('.ts-theme').forEach(btn => {
      btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
    });

    applyTheme(current);
  </script>

</body>
</html>
