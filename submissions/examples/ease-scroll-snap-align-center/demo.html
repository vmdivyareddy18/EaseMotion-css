<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Snap Align Center Utility | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="showcase-wrapper">
    <header class="showcase-header">
      <h1>Scroll Snap Align Center Utility</h1>
      <p>A pure CSS proposal for <code>core/utilities.css</code> to add <code>.scroll-snap-align-center</code>.</p>
    </header>

    <div class="demo-section">
      <h3>Centered Snap Carousel</h3>
      <p>Scroll horizontally. Items will snap to the exact center of the container!</p>
      
      <!-- The container has snap type X mandatory applied via custom style for the demo to work -->
      <div class="scroll-container">
        
        <!-- Children have the proposed utility class -->
        <div class="snap-item scroll-snap-align-center bg-blue">Card 1</div>
        <div class="snap-item scroll-snap-align-center bg-purple">Card 2</div>
        <div class="snap-item scroll-snap-align-center bg-teal">Card 3</div>
        <div class="snap-item scroll-snap-align-center bg-rose">Card 4</div>
        <div class="snap-item scroll-snap-align-center bg-blue">Card 5</div>
        
      </div>
    </div>

  </div>

</body>
</html>
