<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated PIN/OTP Input Collection - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated PIN / OTP Input</h1>
      <p>A secure 2FA credential interface configured with scale entry expansions, placeholder caret animations, and validation state routing updates.</p>
    </header>

    <div class="input-card">
      <div class="ease-otp-row" id="otp-container">
        <input class="ease-otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" type="text" />
        <input class="ease-otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" type="text" />
        <input class="ease-otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" type="text" />
        <input class="ease-otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]*" type="text" />
      </div>

      <div class="action-grid">
        <button class="btn btn-secondary" id="simulate-error">Trigger Error Check</button>
        <button class="btn btn-primary" id="simulate-success">Submit Verification</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('otp-container');
      const inputs = Array.from(document.querySelectorAll('.ease-otp-box'));
      const errorBtn = document.getElementById('simulate-error');
      const successBtn = document.getElementById('simulate-success');

      // Autofocus first index field instantly on load
      inputs[0].focus();

      // Implement focus advancing UX and deletion backspacing loops
      inputs.forEach((input, index) => {
        // Character entry tracking
        input.addEventListener('input', (e) => {
          const val = input.value;
          
          // Scrub non-numeric keys cleanly
          if (!/^[0-9]$/.test(val)) {
            input.value = '';
            return;
          }

          // Trigger scaling pop entrance styles on current node
          input.classList.add('ease-otp-fill-pop');

          // Advance cursor downstream sequentially
          if (val && index < inputs.length - 1) {
            inputs[index + 1].focus();
          }
        });

        // Delete / Backspace tracking logic
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace') {
            input.value = '';
            input.classList.remove('ease-otp-fill-pop');
            
            // Move cursor to previous container node
            if (index > 0) {
              inputs[index - 1].focus();
            }
          }
        });

        // Clean up pop animation classes sequentially
        input.addEventListener('animationend', (e) => {
          if (e.animationName === 'cellPop') {
            input.classList.remove('ease-otp-fill-pop');
          }
        });
      });

      // --- Error State Simulation Trigger ---
      errorBtn.addEventListener('click', () => {
        container.className = 'ease-otp-row'; // Reset any prior states
        void container.offsetWidth; // Clear rendering queue pipeline to refresh animation timeline
        container.classList.add('ease-otp-error-shake');
      });

      // --- Success State Simulation Trigger ---
      successBtn.addEventListener('click', () => {
        container.className = 'ease-otp-row';
        void container.offsetWidth;
        container.classList.add('ease-otp-success-glow');
      });

      // Teardown parent container wrappers on transition endpoints
      container.addEventListener('animationend', () => {
        container.classList.remove('ease-otp-error-shake', 'ease-otp-success-glow');
      });
    });
  </script>
</body>
</html>
