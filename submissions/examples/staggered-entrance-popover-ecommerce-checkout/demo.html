<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Checkout Staggered Popover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

<header>
<h1>Checkout Success Popover</h1>
<p class="subtitle">
Hover over the button to view staggered checkout actions.
</p>
</header>

<div class="display-area">

<div class="popover-container">

<button
    class="trigger-btn"
    aria-haspopup="true"
    aria-label="View order options">
    View Order
</button>
<div
    class="stagger-popover"
    role="menu"
    aria-label="Checkout actions">

<div
    class="stagger-item"
    role="menuitem"
    style="--i:0">
✅ Order Confirmed
</div>

<div class="stagger-item" style="--i:1">
📦 Track Shipment
</div>

<div class="stagger-item" style="--i:2">
🧾 Download Invoice
</div>

<div class="stagger-item" style="--i:3">
❤️ Continue Shopping
</div>

</div>

</div>

</div>

</main>

</body>
</html>
