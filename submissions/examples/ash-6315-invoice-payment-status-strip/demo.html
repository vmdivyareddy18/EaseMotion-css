<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Payment Status Strip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Invoice Payment Status</h1>

        <p class="subtitle">
            Monitor invoice payment progress and outstanding balances.
        </p>

        <div class="strip">

            <div class="invoice paid">

                <span class="dot"></span>

                <div class="details">

                    <h3>INV-1042</h3>

                    <p>Paid on 12 Jul 2026</p>

                </div>

                <span class="badge success">
                    Paid
                </span>

            </div>

            <div class="invoice processing">

                <span class="dot"></span>

                <div class="details">

                    <h3>INV-1043</h3>

                    <p>Payment is being processed</p>

                </div>

                <span class="badge processing-tag">
                    Processing
                </span>

            </div>

            <div class="invoice overdue">

                <span class="dot"></span>

                <div class="details">

                    <h3>INV-1044</h3>

                    <p>Due 5 days ago</p>

                </div>

                <span class="badge overdue-tag">
                    Overdue
                </span>

            </div>

            <div class="invoice pending">

                <span class="dot"></span>

                <div class="details">

                    <h3>INV-1045</h3>

                    <p>Due in 3 days</p>

                </div>

                <span class="badge pending-tag">
                    Pending
                </span>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Paid</span>

                <strong>18</strong>

            </div>

            <div class="stat">

                <span>Outstanding</span>

                <strong>4</strong>

            </div>

            <div class="stat">

                <span>Total Value</span>

                <strong>$42,800</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
