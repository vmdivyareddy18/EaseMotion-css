<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS Animation Presets API - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to compiled presets styling -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">Configurable Animation Presets API</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
      Demonstrating the output of a reusable presets API. Click the replay button below to restart the animation sequences.
    </p>

    <!-- Cards Grid -->
    <div class="demo-grid" id="cards-container">
      <div class="preset-card ease-preset-fade-in">
        Fade In
      </div>

      <div class="preset-card ease-preset-slide-up-custom">
        Slide Up (Custom slow + delay)
      </div>

      <div class="preset-card ease-preset-zoom-in">
        Zoom In
      </div>
    </div>

    <!-- Replay Trigger -->
    <button class="btn-replay" onclick="replayAnimations();">Replay Animations</button>
  </div>

  <script>
    function replayAnimations() {
      const container = document.getElementById('cards-container');
      const cards = container.innerHTML;
      container.innerHTML = '';
      // Force repaint to restart CSS keyframe timelines
      setTimeout(() => {
        container.innerHTML = cards;
      }, 50);
    }
  </script>
</body>
</html>
