<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Hub - 3D Tilt Navigation Bar Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="portfolio-viewport">
        <!-- Main Premium Portfolio Card Elevation Container Layout Shell -->
        <div class="showcase-card-node">
            <header class="showcase-header">
                <span class="portfolio-badge">Creative Studio</span>
                <h2 class="showcase-title">Interactive Deck</h2>
                <p class="showcase-subtitle">Hover over the layout canvas below or individual link nodes to trigger the high-fidelity pure-CSS 3D perspective tilt shifts.</p>
            </header>

            <!-- Advanced Pure-CSS 3D Tilt Navigation Bar Presentation Stage Canvas Area -->
            <div class="nav-workspace-area">
                <nav class="tilt-navigation-bar ease-3d-tilt">
                    
                    <!-- Navigation Action Link Item 1 -->
                    <a href="#home" class="nav-item-link">
                        <span class="item-icon">◈</span>
                        <span class="item-label">Home</span>
                    </a>

                    <!-- Navigation Action Link Item 2 -->
                    <a href="#projects" class="nav-item-link item-active">
                        <span class="item-icon">❖</span>
                        <span class="item-label">Works</span>
                    </a>

                    <!-- Navigation Action Link Item 3 -->
                    <a href="#contact" class="nav-item-link">
                        <span class="item-icon">⬦</span>
                        <span class="item-label">Sync</span>
                    </a>

                </nav>
            </div>

            <footer class="showcase-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">3D Perspective Matrix Render Active</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
