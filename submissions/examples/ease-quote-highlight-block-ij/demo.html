<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Quote Highlight Block Component Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-demo-wrapper">
    <!-- The Target Component Block -->
    <figure class="ease-quote-block">
      <blockquote class="ease-quote-text">
        Design is not just what it looks like and feels like. Design is how it works. It takes a lot of hard work to make something simple, to truly understand the underlying challenges and come up with an elegant solution.
      </blockquote>
      <figcaption class="ease-quote-author">
        Steve Jobs <cite class="ease-quote-source">— Apple Inc.</cite>
      </figcaption>
    </figure>
  </div>

</body>
</html>
