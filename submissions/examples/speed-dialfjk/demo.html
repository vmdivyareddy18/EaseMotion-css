<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Dial FAB Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="content">
        <h1>Speed Dial Component</h1>
        <p>
            Click the floating action button to reveal quick actions.
        </p>
    </div>

    <!-- Speed Dial -->
    <div class="speed-dial" id="speedDial">

        <div class="speed-actions">

            <button class="speed-action">
                <span>📧</span>
                <span class="label">Email</span>
            </button>

            <button class="speed-action">
                <span>📅</span>
                <span class="label">Schedule</span>
            </button>

            <button class="speed-action">
                <span>📄</span>
                <span class="label">Documents</span>
            </button>

            <button class="speed-action">
                <span>💬</span>
                <span class="label">Chat</span>
            </button>

        </div>

        <button class="fab" id="fab">
            +
        </button>

    </div>

    <script>
        const fab = document.getElementById("fab");
        const speedDial = document.getElementById("speedDial");

        fab.addEventListener("click", () => {
            speedDial.classList.toggle("active");
        });

        document.addEventListener("click", (e) => {

            if (
                !speedDial.contains(e.target)
            ) {
                speedDial.classList.remove("active");
            }

        });
    </script>

</body>

</html>
