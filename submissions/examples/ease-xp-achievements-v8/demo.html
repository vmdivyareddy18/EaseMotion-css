<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Achievements</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Achievements</h1>

  <div class="xp-card ease-slide-up">

    <p><span id="xp">0</span> XP</p>

    <div class="badges">

      <div class="badge locked" id="badge1">⭐ Beginner</div>
      <div class="badge locked" id="badge2">🔥 Intermediate</div>
      <div class="badge locked" id="badge3">🏆 Pro</div>

    </div>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>

</section>

<script>
let xp = 0;

function gainXP() {
  xp += 50;
  document.getElementById("xp").textContent = xp;

  unlockBadge("badge1", 100);
  unlockBadge("badge2", 200);
  unlockBadge("badge3", 300);
}

function unlockBadge(id, requirement) {
  if (xp >= requirement) {
    const badge = document.getElementById(id);

    if (badge.classList.contains("locked")) {
      badge.classList.remove("locked");
      badge.classList.add("unlocked");

      // animation trigger
      badge.classList.add("pop");
      setTimeout(() => badge.classList.remove("pop"), 600);
    }
  }
}
</script>

</body>
</html>
