<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Violin Bow Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="violin">
    <div class="violin-body"></div>
    <div class="f-hole left"></div>
    <div class="f-hole right"></div>
    <div class="fingerboard"></div>
    <div class="violin-strings">
      <div class="vstring" style="--i:0"></div>
      <div class="vstring" style="--i:1"></div>
      <div class="vstring" style="--i:2"></div>
      <div class="vstring" style="--i:3"></div>
    </div>
    <div class="bow">
      <div class="bow-stick"></div>
      <div class="bow-hair"></div>
    </div>
    <div class="chinrest"></div>
  </div>
</body>
</html>
