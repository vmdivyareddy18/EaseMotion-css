<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Network Graph Nodes</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='node-color')r.style.setProperty('--node-color',t.value);if(t.name==='edge-color')r.style.setProperty('--edge-color',t.value);if(t.name==='pulse-color')r.style.setProperty('--pulse-color',t.value);if(t.name==='pulse-duration')r.style.setProperty('--pulse-duration',t.value+'s')})</script>
<div class="container"><p class="title">Network Graph Nodes</p>
<div class="graph"><div class="node">A</div><div class="node">B</div><div class="node">C</div><div class="node">D</div><div class="node">E</div></div>
<div class="controls"><label>Node: <input type="color" name="node-color" value="#4ecdc4"></label><label>Edge: <input type="color" name="edge-color" value="#4a4a6a"></label><label>Pulse: <input type="color" name="pulse-color" value="#4ecdc4"></label><label>Duration: <input type="range" name="pulse-duration" min="0.5" max="5" step="0.1" value="2"></label></div></div></body></html>
