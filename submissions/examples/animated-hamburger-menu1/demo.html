<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hamburger Menu - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Hidden Checkbox for Toggle -->
  <input type="checkbox" id="menu-toggle" class="menu-checkbox">

  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="#" class="logo">🚀 BrandName</a>
      
      <!-- Desktop Menu -->
      <ul class="desktop-menu">
        <li><a href="#" class="nav-link ease-hover-grow">Home</a></li>
        <li><a href="#" class="nav-link ease-hover-grow">About</a></li>
        <li><a href="#" class="nav-link ease-hover-grow">Services</a></li>
        <li><a href="#" class="nav-link ease-hover-grow">Contact</a></li>
        <li><a href="#" class="btn-cta ease-hover-grow">Get Started</a></li>
      </ul>

      <!-- Hamburger Icon -->
      <label for="menu-toggle" class="hamburger" aria-label="Toggle menu">
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </label>
    </div>
  </nav>

  <!-- Mobile Menu Overlay -->
  <label for="menu-toggle" class="menu-overlay"></label>

  <!-- Mobile Menu Panel -->
  <div class="mobile-menu ease-slide-in-right">
    <ul class="mobile-menu-list">
      <li class="ease-fade-in-up ease-delay-100"><a href="#">🏠 Home</a></li>
      <li class="ease-fade-in-up ease-delay-200"><a href="#">ℹ️ About</a></li>
      <li class="ease-fade-in-up ease-delay-300"><a href="#">⚙️ Services</a></li>
      <li class="ease-fade-in-up ease-delay-400"><a href="#">📧 Contact</a></li>
      <li class="ease-fade-in-up ease-delay-500"><a href="#" class="mobile-cta">Get Started</a></li>
    </ul>
  </div>

  <!-- Page Content (Mock) -->
  <main class="page-content">
    <h1>Welcome to Our Website</h1>
    <p>Click the hamburger menu icon in the top right to see the smooth mobile navigation in action.</p>
  </main>

</body>
</html>
