<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Mini Golf Adventures</title>
</head>
<body>
  <header class="hero-golf">
    <h1>Putt for Glory.</h1>
    <p>18 holes of family fun and strategic challenges.</p>
  </header>
  <section class="course-grid">
    <div class="course-card">
        <h3>The Jungle Trek</h3>
        <p>Navigate through waterfalls and lush traps.</p>
        <span class="difficulty-tag">Easy</span>
    </div>
    <div class="course-card">
        <h3>The Pirate Cove</h3>
        <p>A complex layout with hidden shortcuts and high stakes.</p>
        <span class="difficulty-tag">Hard</span>
    </div>
  </section>
</body>
</html>
