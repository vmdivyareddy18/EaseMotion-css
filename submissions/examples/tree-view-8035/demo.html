<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Tree View Demo</title>
</head>
<body>
  <h1>Animated Tree View</h1>
  <ul>
    <li class="tree-root expanded">
      <span class="toggle-btn" onclick="this.parentElement.classList.toggle('collapsed')">Folder A</span>
      <ul class="tree-node">
        <li>File 1</li>
        <li>File 2</li>
      </ul>
    </li>
  </ul>
</body>
</html>
