<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Icon Buttons - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Link to dedicated example styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 class="ease-reveal ease-reveal-up">Animated Icon Buttons</h1>
  <p class="subtitle ease-reveal ease-reveal-up ease-delay-100">Enhancing user interactions with smooth icon motion.</p>

  <div class="demo-grid">
    
    <!-- 1. Arrow Slide -->
    <div class="demo-card ease-reveal ease-reveal-up ease-delay-100">
      <h3 class="ease-text-lg">Arrow Slide</h3>
      <button class="ease-btn ease-btn-primary ease-btn-slide">
        Get Started
        <span class="ease-btn-icon-right">→</span>
      </button>
      <button class="ease-btn ease-btn-outline ease-btn-slide">
        <span class="ease-btn-icon-left">←</span>
        Back
      </button>
    </div>

    <!-- 2. Icon Rotation -->
    <div class="demo-card ease-reveal ease-reveal-up ease-delay-200">
      <h3 class="ease-text-lg">Icon Rotation</h3>
      <button class="ease-btn ease-btn-success ease-btn-rotate">
        Settings
        <span class="ease-btn-icon">⚙️</span>
      </button>
      <button class="ease-btn ease-btn-danger ease-btn-rotate-45">
        Close
        <span class="ease-btn-icon">✕</span>
      </button>
    </div>

    <!-- 3. Pulse & Scale -->
    <div class="demo-card ease-reveal ease-reveal-up ease-delay-300">
      <h3 class="ease-text-lg">Pulse & Scale</h3>
      <button class="ease-btn ease-btn-primary ease-btn-pulse">
        Download Now
        <span class="ease-btn-icon">⬇️</span>
      </button>
      <button class="ease-btn ease-btn-ghost ease-btn-pulse">
        Favorite
        <span class="ease-btn-icon">❤️</span>
      </button>
    </div>

    <!-- 4. Icon Swap -->
    <div class="demo-card ease-reveal ease-reveal-up ease-delay-400">
      <h3 class="ease-text-lg">Icon Swap</h3>
      <button class="ease-btn ease-btn-primary ease-btn-swap">
        <span class="icon-primary">Send</span>
        <span class="icon-secondary">🚀</span>
      </button>
      <button class="ease-btn ease-btn-outline ease-btn-swap">
        <span class="icon-primary">Archive</span>
        <span class="icon-secondary">📦</span>
      </button>
    </div>

    <!-- 5. Loading States -->
    <div class="demo-card ease-reveal ease-reveal-up ease-delay-500">
      <h3 class="ease-text-lg">Loading States</h3>
      <!-- Standard loading -->
      <button class="ease-btn ease-btn-primary ease-btn-loading">
        Processing...
      </button>
      <!-- Alt loading with animated icon -->
      <button class="ease-btn ease-btn-outline ease-btn-loading-alt">
        Syncing
        <span class="ease-btn-icon">🔄</span>
      </button>
    </div>

  </div>

  <!-- Include reveal.js for entrance animations -->
  <script src="../../../core/reveal.js"></script>
</body>
</html>
