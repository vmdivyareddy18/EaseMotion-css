<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile Completion Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>User Profile Completion Card</h1>
  <p class="subtitle">A pure CSS user profile completion card with animated progress steps.</p>
  <section class="demo"><h2>Demo</h2><div class="profile-card"><div class="profile-header"><div class="profile-avatar">JD</div><div><h3>John Doe</h3><p>john@example.com</p></div></div><div class="progress-section"><div class="progress-label"><span>Profile Completion</span><span>80%</span></div><div class="progress-bar"><div class="progress-fill" style="--w:80"></div></div></div><div class="steps"><div class="step done"><span class="step-icon">✓</span><span>Email</span></div><div class="step done"><span class="step-icon">✓</span><span>Phone</span></div><div class="step active"><span class="step-icon">●</span><span>Bio</span></div><div class="step"><span class="step-icon">○</span><span>Photo</span></div><div class="step"><span class="step-icon">○</span><span>Social</span></div></div></div></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;div class=&quot;progress-bar&quot;&gt;
  &lt;div class=&quot;progress-fill&quot; style=&quot;--w:80&quot;&gt;&lt;/div&gt;
&lt;/div&gt;</code></pre></section>
</body>
</html>
