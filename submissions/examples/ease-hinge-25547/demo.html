<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-hinge — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
      overflow: hidden;
    }
    h1 { font-weight: 600; margin: 0; }
    p.sub { color: #94a3b8; margin: 0 0 1rem; }
    .scene {
      width: 220px;
      height: 260px;
      perspective: 600px;
    }
    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.3);
      font-weight: 700;
      font-size: 2.5rem;
    }
    .card span { font-size: 0.85rem; font-weight: 400; opacity: 0.8; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>ease-hinge</h1>
  <p class="sub">Swing from top-left corner and fall — classic exit animation</p>

  <div class="scene">
    <div class="card ease-hinge" id="card">
      🚪
      <span>Hinge</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="replay()">Replay</button>
  </div>

  <script>
    function replay() {
      const c = card;
      c.style.animation = 'none';
      void c.offsetWidth;
      c.style.animation = '';
    }
  </script>
</body>
</html>
