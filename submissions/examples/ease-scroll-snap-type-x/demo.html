<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Scroll Snap Utilities | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="showcase-wrapper">
    <header class="showcase-header">
      <h1>Horizontal Scroll Snap Utilities</h1>
      <p>A pure CSS proposal for <code>core/utilities.css</code> to add <code>.scroll-snap-type-x-*</code> classes.</p>
    </header>

    <div class="demo-section">
      <h3>Mandatory Snapping</h3>
      <p><code>.scroll-snap-type-x-mandatory</code></p>
      <div class="scroll-container scroll-snap-type-x-mandatory">
        <div class="snap-item em-snap-align-start bg-blue">Item 1</div>
        <div class="snap-item em-snap-align-start bg-purple">Item 2</div>
        <div class="snap-item em-snap-align-start bg-teal">Item 3</div>
        <div class="snap-item em-snap-align-start bg-rose">Item 4</div>
      </div>
    </div>

    <div class="demo-section">
      <h3>Proximity Snapping</h3>
      <p><code>.scroll-snap-type-x-proximity</code></p>
      <div class="scroll-container scroll-snap-type-x-proximity">
        <div class="snap-item em-snap-align-start bg-blue">Item 1</div>
        <div class="snap-item em-snap-align-start bg-purple">Item 2</div>
        <div class="snap-item em-snap-align-start bg-teal">Item 3</div>
        <div class="snap-item em-snap-align-start bg-rose">Item 4</div>
      </div>
    </div>
  </div>

</body>
</html>
