<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-toast-progress-bar – Toast with countdown</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-text-center">
    <button id="show-toast" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mb-6">
      Show Toast
    </button>

    <!-- Toast container (hidden by default) -->
    <div id="toast" class="toast ease-card ease-p-4 ease-shadow-lg ease-fade-in">
      <div class="ease-flex ease-justify-between ease-items-center">
        <span class="ease-font-semibold ease-text-sm">File saved successfully</span>
        <button id="dismiss-toast" class="ease-text-gray-400 ease-hover-text-gray-600 ease-text-lg ease-leading-none">&times;</button>
      </div>
      <!-- Progress bar -->
      <div class="progress-bar-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
    </div>
  </div>

  <script>
    const toast = document.getElementById('toast');
    const progressBar = document.getElementById('progress-bar');
    const showBtn = document.getElementById('show-toast');
    const dismissBtn = document.getElementById('dismiss-toast');
    let timer = null;

    function showToast() {
      toast.classList.remove('hidden');
      progressBar.style.transition = 'none';
      progressBar.style.width = '100%';
      // Force reflow
      progressBar.offsetHeight;
      progressBar.style.transition = 'width 4s linear';
      progressBar.style.width = '0%';
      timer = setTimeout(() => hideToast(), 4000);
    }

    function hideToast() {
      toast.classList.add('hidden');
      progressBar.style.transition = 'none';
      progressBar.style.width = '100%';
      clearTimeout(timer);
    }

    showBtn.addEventListener('click', showToast);
    dismissBtn.addEventListener('click', hideToast);
  </script>

</body>
</html>
