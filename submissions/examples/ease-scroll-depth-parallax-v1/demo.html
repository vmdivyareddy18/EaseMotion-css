<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Parallax Scroll</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <h1>Parallax Scroll 🌌</h1>
</section>

<section class="parallax">
  <div class="layer back"></div>
  <div class="layer mid"></div>
  <div class="layer front"></div>
</section>

<section class="content">
  <p>Scroll down to see depth effect</p>
</section>

<script>
window.addEventListener("scroll", () => {
  const scrollY = window.scrollY;

  document.querySelector(".back").style.transform =
    `translateY(${scrollY * 0.2}px)`;

  document.querySelector(".mid").style.transform =
    `translateY(${scrollY * 0.4}px)`;

  document.querySelector(".front").style.transform =
    `translateY(${scrollY * 0.7}px)`;
});
</script>

</body>
</html>
