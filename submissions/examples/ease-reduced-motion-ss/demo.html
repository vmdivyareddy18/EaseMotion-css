<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reduced Motion Accessibility Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Mock animations for the demo */
    @keyframes mock-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    .ease-bounce {
      animation: mock-bounce 1s infinite;
    }
    .ease-btn-loading {
      transition: transform 0.3s ease;
    }
    .ease-btn-loading:hover {
      transform: scale(1.1);
    }
  </style>
</head>
<body style="padding: 2rem; font-family: sans-serif; background: #f8fafc;">
  <h2>Reduced Motion Accessibility Demo</h2>
  <p>To test this demo, enable <strong>"Reduce Motion"</strong> in your OS accessibility settings. The animations below will automatically stop to ensure comfort for motion-sensitive users.</p>
  
  <div style="display: flex; gap: 2rem; margin-top: 2rem; align-items: center;">
    <!-- Bouncing Element -->
    <div class="ease-bounce" style="padding: 1rem; background: #6c63ff; color: white; border-radius: 8px;">
      Bouncing Element
    </div>
    
    <!-- Loading Button -->
    <button class="ease-btn-loading" style="padding: 1rem 2rem; border: none; background: #22c55e; color: white; border-radius: 8px; cursor: pointer; font-size: 1rem;">
      Hover Me (Loading Button)
    </button>
  </div>
</body>
</html>
