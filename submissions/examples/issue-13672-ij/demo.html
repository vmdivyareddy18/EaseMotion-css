<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indeterminate Loader Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Loader Bar</h1>
    <p class="subtitle">Indeterminate progress bar with a sliding inner bar — Material Design style.</p>
    <div class="display-area" style="flex-direction:column; gap:1rem; padding:1.5rem;">
      <span class="bar-label">Indeterminate — animating continuously</span>
      <div class="indeterminate-bar">
        <div class="indeterminate-bar-inner" id="innerBar"></div>
      </div>
    </div>
    <div class="bar-controls">
      <button id="toggleBtn">Pause / Resume</button>
    </div>
  </div>
  <script>
    const innerBar = document.getElementById('innerBar');
    const toggleBtn = document.getElementById('toggleBtn');
    let paused = false;
    toggleBtn.addEventListener('click', () => {
      paused = !paused;
      innerBar.style.animationPlayState = paused ? 'paused' : 'running';
    });
  </script>
</body>
</html>
