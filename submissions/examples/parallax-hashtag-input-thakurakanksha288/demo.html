<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Parallax Hashtag Input - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main>
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="text-transform: uppercase; letter-spacing: 2px;">Retro Parallax Input</h1>
      <p style="font-size: 0.9rem; opacity: 0.8;">Click or hover to experience the multi-layer CSS parallax effect.</p>
    </div>

    <!-- Component Block -->
    <div class="parallax-hashtag-container">
      <div class="parallax-hashtag-bg-layer"></div>
      <div class="parallax-hashtag-accent-layer"></div>
      <input 
        type="text" 
        class="parallax-hashtag-input" 
        placeholder="explore_motion" 
        aria-label="Enter retro hashtag"
      />
    </div>
  </main>

</body>
</html>
