<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meditation Timer App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Meditation Timer</h1>
    <div class="timer-card">
      <div class="breath-circle" id="breathCircle">
        <svg class="circle-svg" viewBox="0 0 220 220">
          <circle cx="110" cy="110" r="100" fill="none" stroke="#2a2a2a" stroke-width="3"/>
          <circle class="circle-progress" id="circleProgress" cx="110" cy="110" r="100" fill="none" stroke="#6366f1" stroke-width="3" stroke-dasharray="628" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="timer-time" id="timerDisplay">05:00</div>
        <div class="timer-phase" id="timerPhase">Ready</div>
      </div>

      <div class="duration-selector">
        <button class="dur-btn" data-minutes="3">3 min</button>
        <button class="dur-btn active" data-minutes="5">5 min</button>
        <button class="dur-btn" data-minutes="10">10 min</button>
        <button class="dur-btn" data-minutes="15">15 min</button>
      </div>

      <div class="timer-controls">
        <button class="timer-btn play-btn" id="startBtn">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" id="mainIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="timer-btn" id="resetBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </button>
      </div>
    </div>

    <div class="session-info">
      <div class="session-count">
        Sessions completed: <strong id="sessionCount">0</strong>
      </div>
    </div>
  </div>
  <script>
    const timerDisplay = document.getElementById('timerDisplay');
    const timerPhase = document.getElementById('timerPhase');
    const circleProgress = document.getElementById('circleProgress');
    const breathCircle = document.getElementById('breathCircle');
    const startBtn = document.getElementById('startBtn');
    const mainIcon = document.getElementById('mainIcon');
    const resetBtn = document.getElementById('resetBtn');
    const sessionCount = document.getElementById('sessionCount');
    const durBtns = document.querySelectorAll('.dur-btn');

    const circumference = 2 * Math.PI * 100;
    let totalSeconds = 300;
    let remaining = 300;
    let running = false;
    let interval = null;
    let sessions = 0;

    function updateDisplay() {
      const m = Math.floor(remaining / 60).toString().padStart(2, '0');
      const s = (remaining % 60).toString().padStart(2, '0');
      timerDisplay.textContent = m + ':' + s;
      const progress = remaining / totalSeconds;
      const offset = circumference * (1 - progress);
      circleProgress.setAttribute('stroke-dashoffset', offset);
    }

    function startTimer() {
      if (running) {
        clearInterval(interval);
        running = false;
        mainIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        timerPhase.textContent = 'Paused';
        return;
      }
      if (remaining <= 0) {
        remaining = totalSeconds;
        updateDisplay();
      }
      running = true;
      timerPhase.textContent = 'Meditating...';
      mainIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      interval = setInterval(() => {
        remaining--;
        updateDisplay();
        if (remaining <= 0) {
          clearInterval(interval);
          running = false;
          timerPhase.textContent = 'Complete';
          mainIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
          sessions++;
          sessionCount.textContent = sessions;
          breathCircle.classList.add('complete');
          setTimeout(() => breathCircle.classList.remove('complete'), 2000);
        }
      }, 1000);
    }

    function resetTimer() {
      clearInterval(interval);
      running = false;
      remaining = totalSeconds;
      mainIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      timerPhase.textContent = 'Ready';
      breathCircle.classList.remove('complete');
      updateDisplay();
    }

    function setDuration(minutes) {
      if (running) {
        clearInterval(interval);
        running = false;
        mainIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      }
      totalSeconds = minutes * 60;
      remaining = totalSeconds;
      timerPhase.textContent = 'Ready';
      durBtns.forEach(b => b.classList.remove('active'));
      document.querySelector(`.dur-btn[data-minutes="${minutes}"]`).classList.add('active');
      updateDisplay();
    }

    startBtn.addEventListener('click', startTimer);
    resetBtn.addEventListener('click', resetTimer);

    durBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setDuration(parseInt(btn.dataset.minutes));
      });
    });

    circleProgress.setAttribute('stroke-dasharray', circumference);
    updateDisplay();
  </script>
</body>
</html>
