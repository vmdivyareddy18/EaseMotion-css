<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Error Card Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;">
  
  <div class="ease-error-card">
    <div class="ease-error-illustration">404</div>
    <h1 class="ease-error-title">Page Not Found</h1>
    <p class="ease-error-desc">Oops! The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="#" class="ease-error-btn">
      <span>&larr;</span> Back to Home
    </a>
  </div>

</body>
</html>
