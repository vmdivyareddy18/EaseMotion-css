<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breadcrumb Trail Path</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
      color: #333;
    }
    .demo-container {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 900px;
      width: 100%;
      margin: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 32px; font-size: 0.9rem; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 8px 20px;
      border: 2px solid #e0e4e8;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { border-color: #4a6cf7; color: #4a6cf7; }
    .controls button.active { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
    .demo-box {
      background: #f8f9fc;
      border-radius: 12px;
      padding: 40px 32px;
      border: 1px solid #eef0f4;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Breadcrumb Trail Path</h1>
    <p class="desc">Animated breadcrumb navigation with arrow indicators between items</p>

    <div class="controls">
      <button class="active" data-crumbs="3">3 Items</button>
      <button data-crumbs="4">4 Items</button>
      <button data-crumbs="5">5 Items</button>
      <button id="resetAnim">Replay Animation</button>
    </div>

    <div class="demo-box">
      <nav class="ease-breadcrumb-trail-path" id="breadcrumb">
        <a href="#" class="crumb active">Home</a>
        <span class="arrow">&rarr;</span>
        <a href="#" class="crumb">Products</a>
        <span class="arrow">&rarr;</span>
        <a href="#" class="crumb">Category</a>
      </nav>
    </div>
  </div>

  <script>
    const nav = document.getElementById('breadcrumb');
    const crumbs = ['Home', 'Products', 'Category', 'Details', 'Item'];

    document.querySelectorAll('[data-crumbs]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('[data-crumbs]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const count = parseInt(btn.dataset.crumbs);
        nav.innerHTML = crumbs.slice(0, count).map((c, i) => {
          const isLast = i === count - 1;
          return (i > 0 ? '<span class="arrow">&rarr;</span>' : '') +
            `<a href="#" class="crumb${isLast ? ' active' : ''}">${c}</a>`;
        }).join('');
      });
    });

    document.getElementById('resetAnim').addEventListener('click', () => {
      nav.style.animation = 'none';
      void nav.offsetHeight;
      nav.style.animation = '';
    });
  </script>
</body>
</html>
