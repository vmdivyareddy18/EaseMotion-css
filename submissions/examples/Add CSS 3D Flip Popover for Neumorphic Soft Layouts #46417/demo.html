<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS 3D Flip Popover - Neumorphic Soft</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="neumorphic-container">
    <div class="control-panel">
      <div class="panel-header">
        <h2>Smart Home</h2>
      </div>
      
      <div class="controls">
        <button class="trigger-btn neumorphic-btn" popovertarget="thermostat-popover">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></svg>
          Thermostat
        </button>
      </div>

      <!-- Popover anchored to the trigger button -->
      <div id="thermostat-popover" class="popover neumorphic-surface" popover>
        <div class="popover-header">
          <h3>Climate Control</h3>
          <button class="close-btn neumorphic-btn-icon" popovertarget="thermostat-popover" popovertargetaction="hide" aria-label="Close">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="popover-body">
          <div class="temp-display neumorphic-inset">
            <span class="temp-value">72°</span>
          </div>
          <div class="temp-controls">
            <button class="neumorphic-btn-icon" aria-label="Decrease Temperature">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/></svg>
            </button>
            <button class="neumorphic-btn-icon" aria-label="Increase Temperature">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
