<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Rubber Band Toast - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main style="text-align: center;">
    <h1 style="margin-bottom: 8px; font-weight: 700;">Rubber Band Toast</h1>
    <p style="margin-bottom: 32px; opacity: 0.7;">Neumorphism design iteration with multi-step physics elastic motion.</p>
    
    <!-- Practical action handler for pure CSS demo refresh -->
    <button class="replay-btn" onclick="window.location.reload();">Trigger Toast Animation</button>
  </main>

  <!-- Toast Component Container -->
  <div class="ease-toast-container">
    <div class="ease-rubber-toast">
      <div class="toast-icon">✓</div>
      <div class="toast-content">
        <span style="display: block; font-size: 0.85rem; opacity: 0.6; text-transform: uppercase;">System Status</span>
        <span style="font-size: 1rem;">Changes saved successfully!</span>
      </div>
    </div>
  </div>

</body>
</html>
