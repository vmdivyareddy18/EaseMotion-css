<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Rotate Dropdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Icon Rotate Dropdown</h1>

    <div class="dropdown">
      <button class="dropdown__toggle" type="button">
        <span>Account settings</span>
        <svg class="dropdown__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <ul class="dropdown__menu">
        <li class="dropdown__item">Profile</li>
        <li class="dropdown__item">Security</li>
        <li class="dropdown__item">Billing</li>
        <li class="dropdown__item">Log out</li>
      </ul>
    </div>

    <div class="dropdown">
      <button class="dropdown__toggle" type="button">
        <span>File</span>
        <svg class="dropdown__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>
      <ul class="dropdown__menu">
        <li class="dropdown__item">New</li>
        <li class="dropdown__item">Open</li>
        <li class="dropdown__item">Save</li>
        <li class="dropdown__item">Export</li>
      </ul>
    </div>
  </main>

  <script>
    document.querySelectorAll('.dropdown__toggle').forEach(toggle => {
      toggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const dd = toggle.parentElement;
        const wasOpen = dd.classList.contains('open');
        closeAll();
        if (!wasOpen) dd.classList.add('open');
      });
    });

    document.querySelectorAll('.dropdown__item').forEach(item => {
      item.addEventListener('click', function () {
        const dd = this.closest('.dropdown');
        const toggle = dd.querySelector('.dropdown__toggle span:first-child');
        toggle.textContent = this.textContent;
        dd.classList.remove('open');
      });
    });

    document.addEventListener('click', closeAll);

    function closeAll() {
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
    }
  </script>
</body>
</html>
