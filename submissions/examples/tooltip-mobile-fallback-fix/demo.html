<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Mobile Fix</title>
  
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: var(--ease-color-bg, #f8fafc);
      padding: var(--ease-space-8, 2rem);
      font-family: var(--ease-font-sans);
    }
  </style>
</head>
<body>

  <div style="text-align: center; margin-top: 1rem;">
    <h2>Tooltip Mobile Fix Demo</h2>
    <p>Resize your browser to mobile width (< 640px) and hover over the text below.</p>
    <p>The tooltip should appear below the text to prevent being cut off by the top of the viewport.</p>
    
    <br><br>
    
    <span class="ease-tooltip" data-tooltip="I now correctly fallback to the bottom on mobile!">
      <strong>Hover me (Default Tooltip)</strong>
    </span>
  </div>

</body>
</html>
