<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cross Draw Animation - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <div class="error-card" id="errorCard">
      <div class="card-content">

        <!-- SVG cross/X drawing component -->
        <div class="cross-container">
          <svg class="cross-svg" viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
            <circle class="cross-circle" cx="26" cy="26" r="25" fill="none" />
            <!-- two separate strokes that cross to form the X -->
            <path class="cross-line cross-line--a" fill="none" d="M16 16 L36 36" />
            <path class="cross-line cross-line--b" fill="none" d="M36 16 L16 36" />
          </svg>
        </div>

        <h1>Payment Failed</h1>
        <p class="description">
          We couldn't process your payment. Please check your details and try again.
        </p>

        <button class="action-button" id="triggerBtn" type="button">Simulate Failure</button>
        <button class="reset-btn" id="resetBtn" type="button" style="display:none;">Reset Animation</button>

      </div>
    </div>

  </div>

<script>
  const errorCard = document.getElementById("errorCard");
  const triggerBtn = document.getElementById("triggerBtn");
  const resetBtn = document.getElementById("resetBtn");

  triggerBtn.addEventListener("click", () => {
    triggerBtn.disabled = true;
    triggerBtn.textContent = "Processing...";

    setTimeout(() => {
      // Adding this class is what triggers the cross-draw animation
      errorCard.classList.add("error");
      triggerBtn.style.display = "none";
      resetBtn.style.display = "inline-block";
    }, 600);
  });

  resetBtn.addEventListener("click", () => {
    errorCard.classList.remove("error");
    resetBtn.style.display = "none";
    triggerBtn.style.display = "block";
    triggerBtn.disabled = false;
    triggerBtn.textContent = "Simulate Failure";
  });
</script>

</body>
</html>
