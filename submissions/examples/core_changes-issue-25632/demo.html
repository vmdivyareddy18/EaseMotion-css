<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload — Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: system-ui, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 480px;
    }
    .card h2 {
      color: #e2e8f0;
      margin: 0 0 0.25rem;
      font-size: 1.1rem;
    }
    .card p {
      color: #64748b;
      font-size: 0.85rem;
      margin: 0 0 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Upload Files</h2>
    <p>Drag & drop files or click to browse</p>
    <div class="file-upload" id="dropZone">
      <div class="file-upload-icon">📁</div>
      <p class="file-upload-text"><strong>Click to upload</strong> or drag and drop</p>
      <p class="file-upload-hint">Supports images, PDFs, and documents (max 5MB each)</p>
      <div class="file-upload-files" id="fileList"></div>
    </div>
  </div>

  <script>
    (function() {
      var zone = document.getElementById('dropZone');
      var list = document.getElementById('fileList');
      var input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;

      function addFiles(files) {
        for (var i = 0; i < files.length; i++) {
          var file = files[i];
          var chip = document.createElement('span');
          chip.className = 'file-upload-file';
          chip.innerHTML = '📄 ' + file.name + ' <button class="file-upload-remove" aria-label="Remove">×</button>';
          chip.querySelector('.file-upload-remove').addEventListener('click', function() {
            chip.remove();
          });
          list.appendChild(chip);
        }
      }

      zone.addEventListener('click', function() {
        input.click();
      });

      input.addEventListener('change', function() {
        addFiles(input.files);
        input.value = '';
      });

      zone.addEventListener('dragover', function(e) {
        e.preventDefault();
        zone.classList.add('file-upload--dragover');
      });

      zone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        zone.classList.remove('file-upload--dragover');
      });

      zone.addEventListener('drop', function(e) {
        e.preventDefault();
        zone.classList.remove('file-upload--dragover');
        addFiles(e.dataTransfer.files);
      });
    })();
  </script>
</body>
</html>
