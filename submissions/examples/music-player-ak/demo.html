<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player UI - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mp-wrapper">

    <div class="mp-card">
      <div class="mp-art">&#9835;</div>
      <div class="mp-info">
        <div class="mp-title" id="trackTitle">Sunset Drive</div>
        <div class="mp-artist" id="trackArtist">Luna Wave</div>
      </div>
      <div class="mp-progress">
        <div class="mp-bar"><div class="mp-fill" id="progressFill" style="width:45%"></div></div>
        <div class="mp-times">
          <span id="currentTime">1:32</span>
          <span id="totalTime">3:24</span>
        </div>
      </div>
      <div class="mp-controls">
        <button class="mp-ctrl" id="prevBtn">&#9198;</button>
        <button class="mp-ctrl mp-play" id="playBtn">&#9654;</button>
        <button class="mp-ctrl" id="nextBtn">&#9197;</button>
      </div>
      <div class="mp-volume">
        <span>&#128266;</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="70" class="mp-vol-slider">
      </div>
    </div>

  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const titleEl = document.getElementById('trackTitle');
    const artistEl = document.getElementById('trackArtist');
    const progressFill = document.getElementById('progressFill');
    const currentTimeEl = document.getElementById('currentTime');
    const totalTimeEl = document.getElementById('totalTime');
    const volumeSlider = document.getElementById('volumeSlider');

    const tracks = [
      { title: 'Sunset Drive', artist: 'Luna Wave', duration: 204 },
      { title: 'Midnight Glow', artist: 'Neon Pulse', duration: 278 },
      { title: 'Ocean Breeze', artist: 'Coral Reef', duration: 195 },
      { title: 'Starlight', artist: 'Astro', duration: 312 },
    ];

    let currentTrack = 0;
    let isPlaying = false;
    let progress = 45;
    let interval = null;

    function loadTrack(index) {
      const t = tracks[index];
      titleEl.textContent = t.title;
      artistEl.textContent = t.artist;
      const m = Math.floor(t.duration / 60);
      const s = t.duration % 60;
      totalTimeEl.textContent = m + ':' + String(s).padStart(2, '0');
      progress = 0;
      updateProgress();
    }

    function updateProgress() {
      progressFill.style.width = progress + '%';
      const t = tracks[currentTrack].duration;
      const cur = (progress / 100) * t;
      const m = Math.floor(cur / 60);
      const s = Math.floor(cur % 60);
      currentTimeEl.textContent = m + ':' + String(s).padStart(2, '0');
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      playBtn.textContent = isPlaying ? '\u275A\u275A' : '\u25B6';
      if (isPlaying) {
        interval = setInterval(() => {
          progress = Math.min(100, progress + 1);
          updateProgress();
          if (progress >= 100) nextTrack();
        }, 1000);
      } else {
        clearInterval(interval);
      }
    }

    function nextTrack() {
      currentTrack = (currentTrack + 1) % tracks.length;
      loadTrack(currentTrack);
      if (isPlaying) { clearInterval(interval); interval = setInterval(() => { progress = Math.min(100, progress + 1); updateProgress(); if (progress >= 100) nextTrack(); }, 1000); }
    }

    function prevTrack() {
      if (progress > 5) { progress = 0; updateProgress(); return; }
      currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
      loadTrack(currentTrack);
      if (isPlaying) { clearInterval(interval); interval = setInterval(() => { progress = Math.min(100, progress + 1); updateProgress(); if (progress >= 100) nextTrack(); }, 1000); }
    }

    playBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextTrack);
    prevBtn.addEventListener('click', prevTrack);

    loadTrack(0);
  </script>

</body>
</html>
