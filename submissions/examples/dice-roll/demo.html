<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Dice Roll Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dice-wrapper">
      <h1>Dice Roll</h1>
      <p class="description">
        A pure CSS 3D dice roll animation. Click or hover to roll.
      </p>
      <div class="dice" tabindex="0" role="button" aria-label="Roll the dice">
        <div class="face front">⚀</div>
        <div class="face back">⚁</div>
        <div class="face right">⚂</div>
        <div class="face left">⚃</div>
        <div class="face top">⚄</div>
        <div class="face bottom">⚅</div>
      </div>
      <p class="hint">Hover or focus the dice to roll</p>
    </div>
  </body>
</html>
