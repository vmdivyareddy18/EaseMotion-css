<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Animated Bell – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-grid">
    <h1 class="demo-title">🔔 Icon Animated Bell</h1>
    <div class="card-row">
      <div class="card">
        <h2 class="card-label">Hover to ring</h2>
        <div class="icon-wrap bell-shake">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="var(--bell-color)"/>
          </svg>
        </div>
        <div class="controls">
          <label>Bell Color <input type="color" value="#f1c40f" data-prop="--bell-color"></label>
          <label>Ring Color <input type="color" value="#e74c3c" data-prop="--ring-color"></label>
          <label>Size <input type="range" min="32" max="120" value="64" data-prop="--bell-size"></label>
          <label>Shake Duration <input type="range" min="0.2" max="1.5" step="0.1" value="0.5" data-prop="--shake-duration"></label>
        </div>
        <p class="hint">Hover the bell to see the shake-ring animation.</p>
      </div>
    </div>
  </main>
  <script>
    document.querySelectorAll('[data-prop]').forEach(input => {
      input.addEventListener('input', () => {
        const val = input.type === 'color' ? input.value : input.type === 'range' && input.step === '0.1' ? input.value + 's' : input.value + 'px';
        document.querySelector('.icon-wrap').style.setProperty(input.dataset.prop, val);
      });
    });
  </script>
</body>
</html>
