<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item rotate-0">.rotate-0</div>
  <div class="demo-item rotate-45">.rotate-45</div>
  <div class="demo-item rotate-90">.rotate-90</div>
  <div class="demo-item rotate-135">.rotate-135</div>
  <div class="demo-item rotate-180">.rotate-180</div>
  <div class="demo-item rotate-225">.rotate-225</div>
</body>
</html>
