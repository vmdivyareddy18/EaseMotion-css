<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Segmented Progress Bar</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card" aria-label="Segmented step progress demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Checkout Progress</h1>
        <ol class="progress">
          <li class="done">Cart</li>
          <li class="done">Address</li>
          <li class="active">Payment</li>
          <li>Review</li>
        </ol>
      </section>
    </main>
  </body>
</html>
