<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Potion Bubble - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrapper">
    <h1>Potion Bubble</h1>
    <p class="description">A bubbling potion with rising bubbles.</p>
    <div class="potion" tabindex="0" role="img" aria-label="Potion bubbling">
      <div class="potion-body">
        <div class="liquid"></div>
        <span class="bubble b1"></span>
        <span class="bubble b2"></span>
        <span class="bubble b3"></span>
        <span class="bubble b4"></span>
        <span class="bubble b5"></span>
      </div>
    </div>
  </div>
</body>
</html>
