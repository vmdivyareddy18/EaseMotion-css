<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-text-flash Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="status-indicator-box">
    <h3 style="margin: 0 0 0.75rem 0; font-size: 1.1rem; color: #94a3b8;">System Configuration Sync</h3>
    
    <div class="status-value ease-text-flash" style="--ease-text-flash-color: #34d399;">
      SECURE_CONNECTED
    </div>
    
    <p style="margin: 1rem 0 0 0; color: #4b5563; font-size: 0.85rem; line-height: 1.5;">
      The string briefly spikes to the custom flash color token before cleanly dropping back to its default system state.
    </p>
  </div>

</body>
</html>
