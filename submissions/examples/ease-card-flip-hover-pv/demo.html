<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Credit Card Flip on Hover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card-scene">
    <div class="card-inner">

      <!-- FRONT -->
      <div class="card-front">
        <div class="chip"></div>
        <div class="card-number">4532 &nbsp; 1547 &nbsp; 8963 &nbsp; 2210</div>
        <div class="card-footer">
          <div>
            <div class="card-label">Card Holder</div>
            <div class="card-value">ALEX MORGAN</div>
          </div>
          <div>
            <div class="card-label">Expires</div>
            <div class="card-value">08 / 27</div>
          </div>
          <div class="card-network">
            <div class="network-circle"></div>
            <div class="network-circle"></div>
          </div>
        </div>
      </div>

      <!-- BACK -->
      <div class="card-back">
        <div class="magnetic-strip"></div>
        <div class="sig-area">
          <div class="sig-strip">
            <span class="sig-text">ALEX MORGAN</span>
          </div>
          <div class="cvv-box">927</div>
        </div>
        <div class="card-back-info">
          This card is property of the issuing bank. If found, please return to
          the nearest branch. Use of this card is subject to the cardholder
          agreement.
        </div>
      </div>

    </div>
  </div>

  <p class="hint">Hover over the card to flip</p>

</body>
</html>
