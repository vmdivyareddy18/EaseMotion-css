<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="cyber-modal-toggle" class="ease-cyber-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="cyber-modal-toggle" class="ease-cyber-trigger-um" tabindex="0">
    Initialize Link
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-cyber-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="cyber-modal-toggle" class="ease-cyber-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-cyber-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="cyber-modal-toggle" class="ease-cyber-close-icon-um" aria-label="Close Modal">
        X
      </label>

      <!-- Content -->
      <h2 id="modal-title" class="ease-cyber-title-um">System Override</h2>
      <p class="ease-cyber-desc-um">
        Warning: Unauthorized access detected in sector 4. Hovering over terminal controls will trigger a scale interaction and intensify neon light emissions. Proceed with caution.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-cyber-actions-um">
        <!-- Close button acting as Cancel -->
        <label for="cyber-modal-toggle" class="ease-cyber-btn-um">
          Abort
        </label>
        
        <label for="cyber-modal-toggle" class="ease-cyber-btn-um ease-cyber-btn-alert-um">
          Execute
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
