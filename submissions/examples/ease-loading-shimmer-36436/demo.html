<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-loading-shimmer Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; background: #f7f7f8; padding: 40px; }
    h1 { margin-bottom: 30px; }
    .demo-row { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
    .demo-label { font-size: 14px; color: #666; margin-bottom: 8px; }
    .demo-block { display: flex; flex-direction: column; }
    .text-block { width: 220px; }
  </style>
</head>
<body>
  <h1>ease-loading-shimmer</h1>

  <div class="demo-row">
    <div class="demo-block">
      <span class="demo-label">Avatar</span>
      <div class="ease-loading-shimmer ease-loading-shimmer--avatar"></div>
    </div>
    <div class="demo-block">
      <span class="demo-label">Button</span>
      <div class="ease-loading-shimmer ease-loading-shimmer--button"></div>
    </div>
    <div class="demo-block">
      <span class="demo-label">Card</span>
      <div class="ease-loading-shimmer ease-loading-shimmer--card"></div>
    </div>
    <div class="demo-block">
      <span class="demo-label">Product tile</span>
      <div class="ease-loading-shimmer ease-loading-shimmer--product"></div>
    </div>
  </div>

  <div class="demo-block text-block">
    <span class="demo-label">Text lines</span>
    <div class="ease-loading-shimmer ease-loading-shimmer--text"></div>
    <div class="ease-loading-shimmer ease-loading-shimmer--text" style="width: 80%;"></div>
    <div class="ease-loading-shimmer ease-loading-shimmer--text" style="width: 60%;"></div>
  </div>
</body>
</html>
