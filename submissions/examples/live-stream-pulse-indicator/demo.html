<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Stream Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Live Streaming Indicator</h1>
  <p class="ease-fade-in delay">
    This UI simulates a live streaming environment using animated pulse,
    glow effects, and dynamic viewer count display.
  </p>

  <div class="live-card ease-slide-up">
    <div class="live-header">
      <span class="live-badge">
        <span class="dot"></span> LIVE
      </span>
      <span class="viewers">👁 1.2K watching</span>
    </div>

    <div class="video-placeholder">
      <p>Streaming Content Preview</p>
    </div>

    <button class="watch-btn ease-hover-grow">Join Stream</button>
  </div>
</section>

</body>
</html>
