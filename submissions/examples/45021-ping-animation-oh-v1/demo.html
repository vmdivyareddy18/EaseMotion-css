<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-ping-animation</title>
  <meta name="description" content="Ping animation showcase with ripple indicators.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-ping-animation</h1>
      <p class="subtitle" id="main-desc">Ping animation with ripple indicators</p>
    </header>

    <div class="display-area">
      
      <div class="ping-showcase">
        
        <!-- Online Status -->
        <div class="ping-item">
          <div class="ease-ping">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <span class="ping-label">Online</span>
        </div>

        <!-- Primary -->
        <div class="ping-item">
          <div class="ease-ping ease-ping-primary">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <span class="ping-label">Primary</span>
        </div>

        <!-- Success -->
        <div class="ping-item">
          <div class="ease-ping ease-ping-success">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <span class="ping-label">Success</span>
        </div>

        <!-- Warning -->
        <div class="ping-item">
          <div class="ease-ping ease-ping-warning">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <span class="ping-label">Warning</span>
        </div>

        <!-- Danger -->
        <div class="ping-item">
          <div class="ease-ping ease-ping-danger">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <span class="ping-label">Danger</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Status Cards</h3>
      <div class="status-cards">
        
        <div class="status-card">
          <div class="ease-ping ease-ping-success ease-ping-sm">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <div class="status-info">
            <h4>Server Status</h4>
            <p>All systems operational</p>
          </div>
        </div>

        <div class="status-card">
          <div class="ease-ping ease-ping-warning ease-ping-sm">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <div class="status-info">
            <h4>API Latency</h4>
            <p>Elevated response time</p>
          </div>
        </div>

        <div class="status-card">
          <div class="ease-ping ease-ping-danger ease-ping-sm">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </div>
          <div class="status-info">
            <h4>Error Rate</h4>
            <p>Above threshold</p>
          </div>
        </div>

      </div>
    </section>

    <section class="demo-section">
      <h3>Notification Badge</h3>
      <div class="notification-example">
        <button class="notification-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="ease-ping ease-ping-danger ease-ping-badge">
            <span class="ping-dot"></span>
            <span class="ping-ring"></span>
          </span>
        </button>
        <span class="notification-text">New notifications</span>
      </div>
    </section>

    <section class="demo-section">
      <h3>User Avatars</h3>
      <div class="avatar-row">
        
        <div class="avatar-item">
          <div class="avatar-container">
            <div class="ease-ping ease-ping-success ease-ping-lg">
              <span class="ping-dot"></span>
              <span class="ping-ring"></span>
            </div>
            <img src="https://i.pravatar.cc/100?img=1" alt="User 1" class="avatar-img">
          </div>
          <span class="ping-label">Active</span>
        </div>

        <div class="avatar-item">
          <div class="avatar-container">
            <div class="ease-ping ease-ping-warning ease-ping-lg">
              <span class="ping-dot"></span>
              <span class="ping-ring"></span>
            </div>
            <img src="https://i.pravatar.cc/100?img=2" alt="User 2" class="avatar-img">
          </div>
          <span class="ping-label">Away</span>
        </div>

        <div class="avatar-item">
          <div class="avatar-container">
            <div class="ease-ping ease-ping-danger ease-ping-lg">
              <span class="ping-dot"></span>
              <span class="ping-ring"></span>
            </div>
            <img src="https://i.pravatar.cc/100?img=3" alt="User 3" class="avatar-img">
          </div>
          <span class="ping-label">Busy</span>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
