<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern SaaS Pulse-Active Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="saas-container">
        <div class="saas-card">
            <div class="saas-meta">
                <span class="saas-badge">Premium Tier</span>
                <h3 class="saas-title">API Rate Boundaries</h3>
            </div>

            <div class="tooltip-wrapper">
                <button class="saas-action-btn" aria-describedby="saas-pulse-tooltip">
                    Inspect Limits
                </button>

                <div id="saas-pulse-tooltip" class="saas-tooltip" role="tooltip">
                    <span class="tooltip-accent-line"></span>
                    <span class="tooltip-category">Workspace Quota</span>
                    <p class="tooltip-body">Supports up to 50,000 requests/min. Burst allowance limits scale
                        automatically based on volume loads.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
