<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shooting Star Animation — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-center" style="flex-direction: column; text-align: center; margin-bottom: 3rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Shooting Star Animation</h1>
        <p style="color: #94a3b8; max-width: 600px;">
            A subtle, premium light streak that sweeps across the element. 
            Perfect for high-impact CTA buttons or featured cards.
        </p>
    </div>

    <div class="demo-container">
        <!-- Application on a Card -->
        <div class="demo-card ease-shooting-star">
            <span class="label">Premium Feature</span>
            <span>Subtle Card Streak</span>
        </div>

        <!-- Application on a Button -->
        <div class="demo-card" style="background: transparent; border: none; box-shadow: none;">
             <span class="label" style="margin-bottom: 1.5rem;">Button Implementation</span>
             <button class="demo-button ease-shooting-star">
                Get Started Now
             </button>
        </div>

        <!-- Multiple Cards to show timing -->
        <div class="demo-card ease-shooting-star" style="background: #1e1b4b; border-color: #4338ca;">
            <span class="label" style="color: #818cf8;">Special Offer</span>
            <span>Diagonal Sweep</span>
        </div>
    </div>

    <div style="margin-top: 4rem; text-align: center; color: #64748b;">
        <p>Part of <strong>EaseMotion CSS</strong> — The animation-first framework.</p>
    </div>
</body>
</html>
