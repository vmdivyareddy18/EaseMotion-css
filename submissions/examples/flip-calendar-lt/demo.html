<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flip Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

    <div class="calendar-header">
        <h2>July 2026</h2>
    </div>

    <div class="weekdays">
        <div>Sun</div>
        <div>Mon</div>
        <div>Tue</div>
        <div>Wed</div>
        <div>Thu</div>
        <div>Fri</div>
        <div>Sat</div>
    </div>

    <div class="days">

        <!-- Empty cells -->
        <div class="empty"></div>
        <div class="empty"></div>
        <div class="empty"></div>

        <!-- Dates -->
        <div class="day"><div class="flip-card"><div class="front">1</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">2</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">3</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">4</div><div class="back">📅</div></div></div>

        <div class="day today"><div class="flip-card"><div class="front">5</div><div class="back">Today</div></div></div>

        <div class="day"><div class="flip-card"><div class="front">6</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">7</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">8</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">9</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">10</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">11</div><div class="back">📅</div></div></div>

        <div class="day"><div class="flip-card"><div class="front">12</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">13</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">14</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">15</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">16</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">17</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">18</div><div class="back">📅</div></div></div>

        <div class="day"><div class="flip-card"><div class="front">19</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">20</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">21</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">22</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">23</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">24</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">25</div><div class="back">📅</div></div></div>

        <div class="day"><div class="flip-card"><div class="front">26</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">27</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">28</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">29</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">30</div><div class="back">📅</div></div></div>
        <div class="day"><div class="flip-card"><div class="front">31</div><div class="back">📅</div></div></div>

    </div>

</div>

</body>
</html>
