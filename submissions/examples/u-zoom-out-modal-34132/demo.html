<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Zoom Out Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Responsive Dashboard

</span>

<h1>

Zoom-Out Modal

</h1>

<p>

Dashboard inspired modal
featuring a smooth zoom-out
transition for analytics
interfaces and KPI previews.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Open Analytics

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="metric">

96%

</div>

<h2>

Growth Metrics

</h2>

<p>

Monitor performance data,
visualize KPIs and explore
business insights through
a modern CSS-only modal.

</p>

<button>

View Dashboard

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
