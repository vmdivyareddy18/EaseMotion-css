<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expandable Search Bar — EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="esb-wrapper">
    <div class="esb-container" id="searchContainer">
      <button class="esb-icon" id="searchIcon" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="9" cy="9" r="6.5" stroke="currentColor" stroke-width="2"/>
          <line x1="14" y1="14" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <input
        class="esb-input"
        id="searchInput"
        type="text"
        placeholder="Search..."
        autocomplete="off"
      >
      <button class="esb-submit" id="submitBtn">Search</button>
    </div>
  </div>

  <script>
    const container = document.getElementById('searchContainer');
    const icon = document.getElementById('searchIcon');
    const input = document.getElementById('searchInput');
    const submit = document.getElementById('submitBtn');

    let expanded = false;

    function expand() {
      expanded = true;
      container.classList.add('esb-expanded');
      input.focus();
    }

    function collapse() {
      expanded = false;
      container.classList.remove('esb-expanded');
      input.blur();
    }

    icon.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!expanded) expand();
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') collapse();
    });

    submit.addEventListener('click', (e) => {
      e.stopPropagation();
      if (input.value.trim()) {
        alert('Searching for: ' + input.value);
      }
    });

    document.addEventListener('click', (e) => {
      if (expanded && !container.contains(e.target)) {
        collapse();
      }
    });
  </script>
</body>
</html>
