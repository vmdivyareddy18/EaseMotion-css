<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Typography Scroll Reveal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scroll-container">
        <div class="kinetic-wrapper">
            <!-- Using an intersection-observer-less hack by linking animation to a long scroll duration, or just infinite keyframes since we want pure CSS without scroll-timeline (which is experimental). Here we use infinite animation loops mimicking breathing/kinetic text -->
            <h1 class="kinetic-text" data-text="MOTION">MOTION</h1>
            <h1 class="kinetic-text reverse" data-text="DESIGN">DESIGN</h1>
            <h1 class="kinetic-text stretch" data-text="SYSTEM">SYSTEM</h1>
        </div>
    </div>
</body>
</html>
