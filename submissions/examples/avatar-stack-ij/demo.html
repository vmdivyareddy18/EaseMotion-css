<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS avatar-stack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Avatar Stack</h1>
    <div class="stack-group">
      <div class="s-avatar a1" style="background:#e94560;">JD</div>
      <div class="s-avatar a2" style="background:#533483;">SK</div>
      <div class="s-avatar a3" style="background:#2ecc71;">AL</div>
      <div class="s-avatar a4" style="background:#f39c12;">MP</div>
      <div class="s-avatar a5" style="background:#3498db;">TR</div>
      <div class="s-avatar more">+2</div>
    </div>
  </div>
</body>
</html>
