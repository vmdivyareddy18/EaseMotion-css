<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Receipt - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ir-wrapper">
    <div class="ir-invoice" id="invoice">
      <div class="ir-header">
        <div>
          <h1>INVOICE</h1>
          <p class="ir-company">Acme Corp</p>
          <p class="ir-detail">123 Business Ave, Suite 100</p>
          <p class="ir-detail">San Francisco, CA 94102</p>
        </div>
        <div class="ir-meta">
          <p><strong>Invoice:</strong> <span id="invNumber">INV-001</span></p>
          <p><strong>Date:</strong> <span id="invDate">2026-06-15</span></p>
        </div>
      </div>

      <table class="ir-table">
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="itemsTable"></tbody>
      </table>

      <div class="ir-totals">
        <div class="ir-total-row"><span>Subtotal:</span><span id="subtotal">$0.00</span></div>
        <div class="ir-total-row"><span>Tax (10%):</span><span id="tax">$0.00</span></div>
        <div class="ir-total-row ir-grand"><span>Total:</span><span id="total">$0.00</span></div>
      </div>

      <div class="ir-footer">
        <p>Thank you for your business!</p>
      </div>
    </div>

    <div class="ir-actions">
      <div class="ir-add-row">
        <input type="text" class="ir-field" id="itemName" placeholder="Item name">
        <input type="number" class="ir-field ir-qty" id="itemQty" placeholder="Qty" value="1" min="1">
        <input type="number" class="ir-field ir-price" id="itemPrice" placeholder="Price" value="0" min="0" step="0.01">
        <button class="ir-btn ir-btn-add" id="addBtn">Add</button>
      </div>
      <div class="ir-action-btns">
        <button class="ir-btn ir-btn-print" id="printBtn">🖨 Print</button>
        <button class="ir-btn ir-btn-reset" id="resetBtn">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const tbody = document.getElementById('itemsTable');
    const subtotalEl = document.getElementById('subtotal');
    const taxEl = document.getElementById('tax');
    const totalEl = document.getElementById('total');

    const itemName = document.getElementById('itemName');
    const itemQty = document.getElementById('itemQty');
    const itemPrice = document.getElementById('itemPrice');
    const addBtn = document.getElementById('addBtn');
    const printBtn = document.getElementById('printBtn');
    const resetBtn = document.getElementById('resetBtn');

    let items = [
      { name: 'Web Development', qty: 1, price: 1500 },
      { name: 'UI/UX Design', qty: 2, price: 800 },
    ];

    function formatCurrency(n) {
      return '$' + n.toFixed(2);
    }

    function renderTable() {
      tbody.innerHTML = items.map((item, i) => `
        <tr>
          <td>${item.name}</td>
          <td>${item.qty}</td>
          <td>${formatCurrency(item.price)}</td>
          <td>${formatCurrency(item.qty * item.price)}
            <button class="ir-del" data-index="${i}">✕</button>
          </td>
        </tr>
      `).join('');

      document.querySelectorAll('.ir-del').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index);
          items.splice(idx, 1);
          renderTable();
          calcTotals();
        });
      });
    }

    function calcTotals() {
      const sub = items.reduce((sum, item) => sum + item.qty * item.price, 0);
      const t = sub * 0.1;
      const total = sub + t;
      subtotalEl.textContent = formatCurrency(sub);
      taxEl.textContent = formatCurrency(t);
      totalEl.textContent = formatCurrency(total);
    }

    function addItem() {
      const name = itemName.value.trim();
      const qty = parseInt(itemQty.value) || 1;
      const price = parseFloat(itemPrice.value) || 0;
      if (!name) { alert('Enter an item name.'); return; }
      items.push({ name, qty, price });
      itemName.value = '';
      itemQty.value = '1';
      itemPrice.value = '0';
      renderTable();
      calcTotals();
    }

    function resetInvoice() {
      items = [];
      renderTable();
      calcTotals();
    }

    addBtn.addEventListener('click', addItem);
    [itemName, itemQty, itemPrice].forEach(el => {
      el.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    });
    resetBtn.addEventListener('click', resetInvoice);

    printBtn.addEventListener('click', () => window.print());

    renderTable();
    calcTotals();
  </script>
</body>
</html>
