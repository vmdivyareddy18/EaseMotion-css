<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Panel Fade</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Tab Panel Fade</h1>
  <div class="tpf-container" id="container">
    <div class="tpf-tabs">
      <button class="tpf-tab" data-index="0">Tab 1</button>
      <button class="tpf-tab" data-index="1">Tab 2</button>
      <button class="tpf-tab" data-index="2">Tab 3</button>
    </div>
    <div class="tpf-panels">
      <div class="tpf-panel" data-index="0"><p>Content for Tab 1. This panel fades in when active.</p></div>
      <div class="tpf-panel" data-index="1"><p>Content for Tab 2. Each panel uses opacity transitions.</p></div>
      <div class="tpf-panel" data-index="2"><p>Content for Tab 3. The active panel is controlled via <code>--tpf-active</code>.</p></div>
    </div>
  </div>
  <script>
    (function() {
      const container = document.getElementById('container');
      const tabs = container.querySelectorAll('.tpf-tab');
      const panels = container.querySelectorAll('.tpf-panel');

      function activate(index) {
        container.style.setProperty('--tpf-active', index);
        tabs.forEach(function(tab, i) {
          tab.classList.toggle('tpf-active', i === index);
        });
      }

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          activate(Number(tab.dataset.index));
        });
      });

      activate(0);
    })();
  </script>
</body>
</html>
