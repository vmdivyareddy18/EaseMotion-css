<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Portfolio Pie Chart Rotate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Portfolio Pie Chart Rotate</h1>

  <p class="intro">
    Portfolio allocation visualization with rotating pie chart segments.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="portfolio-pie-chart">
        <div class="pie-chart"></div>
      </div>
      <h3>Portfolio Allocation</h3>
    </div>

    <div class="card">
      <div class="portfolio-pie-chart">
        <div class="pie-chart large"></div>
      </div>
      <p>Asset Distribution</p>
    </div>

    <div class="card">
      <div class="portfolio-pie-chart">
        <div class="pie-chart"></div>
      </div>
      <button>View Portfolio</button>
    </div>

  </div>

</div>

</body>
</html>
