<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Button Hover Animations</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    //buttons
    <main class="container">
      <h1>Interactive Button Hover Animations</h1>

      <!-- Icon glide button -->
      <button class="icon-button">
        <span class="drag-icon"> → </span>

        <span class="button-text"> Explore </span>
      </button>

      <!-- Border draw button -->
      <button class="border-button">
        Border Draw

        <span class="line top"></span>
        <span class="line right"></span>
        <span class="line bottom"></span>
        <span class="line left"></span>
      </button>

      <!-- Animated gradient button -->
      <button class="gradient-button">Gradient Motion</button>

      <!-- Neon glow button -->
      <button class="neon-button">Neon Glow</button>
    </main>
  </body>
</html>
