<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="course-progress">
        <h1>Learning Progress Dashboard</h1>

        <div class="course-grid">
            <article class="course-card">
                <div class="badge">In Progress</div>
                <h3>Web Development Fundamentals</h3>

                <div class="progress-bar">
                    <div class="progress-fill progress-75"></div>
                </div>

                <span class="progress-text">75% Complete</span>
            </article>

            <article class="course-card">
                <div class="badge">Completed</div>
                <h3>HTML & CSS Basics</h3>

                <div class="progress-bar">
                    <div class="progress-fill progress-100"></div>
                </div>

                <span class="progress-text">100% Complete</span>
            </article>

            <article class="course-card">
                <div class="badge">In Progress</div>
                <h3>JavaScript Essentials</h3>

                <div class="progress-bar">
                    <div class="progress-fill progress-50"></div>
                </div>

                <span class="progress-text">50% Complete</span>
            </article>

            <article class="course-card">
                <div class="badge">Started</div>
                <h3>React Development</h3>

                <div class="progress-bar">
                    <div class="progress-fill progress-20"></div>
                </div>

                <span class="progress-text">20% Complete</span>
            </article>
        </div>
    </section>
</body>
</html>
