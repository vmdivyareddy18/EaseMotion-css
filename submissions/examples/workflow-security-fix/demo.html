<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CI/CD Security Automation Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 20px;">

  <div class="security-container">
    <h2>Workflow Pipeline Remediation Sandbox</h2>
    <p>Visual blueprint tracking Issue <strong>#40057</strong>. Toggle the pipeline state to inspect the execution paths.</p>
    
    <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 20px 0;">

    <h3>🛤️ Compare Execution Models</h3>
    <button onclick="showPath('broken')">View Current Risky Flow</button>
    <button onclick="showPath('fixed')">View Proposed Secure Flow</button>

    <div id="flow-diagram" style="margin-top: 25px;">
      <div class="flow-node node-neutral">1. PR opened from external fork repository</div>
      <div id="dynamic-step" class="flow-node node-neutral">Click a route model above to trace the action pipeline...</div>
      <div id="final-step" class="flow-node node-neutral">...</div>
    </div>
  </div>

  <script>
    function showPath(type) {
      const stepEl = document.getElementById('dynamic-step');
      const finalEl = document.getElementById('final-step');
      
      if (type === 'broken') {
        stepEl.className = 'flow-node node-danger';
        stepEl.innerHTML = '❌ 2. Action executes: git push upstream HEAD:main';
        finalEl.className = 'flow-node node-danger';
        finalEl.innerHTML = '⚠️ State: Bypasses protections, directly overwrites production code.';
      } else {
        stepEl.className = 'flow-node node-success';
        stepEl.innerHTML = '🛡️ 2. Action executes: git push origin HEAD:refs/heads/bot/integrate-pr-XYZ';
        finalEl.className = 'flow-node node-success';
        finalEl.innerHTML = '✅ State: Generates an isolated branch/follow-up PR for safe manual review.';
      }
    }
  </script>
</body>
</html>
