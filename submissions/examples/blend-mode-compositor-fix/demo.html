<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Blending Compositor Fix</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 460px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Compositor Isolation Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Load this preview canvas inside Safari. Combining <code>isolation: isolate</code> with <code>will-change</code> protects typography blend maps with 0 scripts.</p>
  </header>

  <div class="alm-blend-viewport-canvas">
    
    <div class="alm-split-background-track">
      <div class="alm-bg-sector-light"></div>
      <div class="alm-bg-sector-dark"></div>
    </div>

    <h2 class="alm-blended-header-string">
      PIPELINE TELEMETRY DELTA COMPOSITION SYSTEM ONLINE
    </h2>

    <span class="alm-blend-meta-tag">Compositor_Sync_Secure</span>

  </div>

</body>
</html>
