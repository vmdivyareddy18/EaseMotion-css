<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Pull Modal - Creative Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

    <h1>Creative Portfolio</h1>
    <p>Pure CSS Magnetic Pull Modal Demo</p>

    <label for="modal-toggle" class="open-btn">
        View Project
    </label>

</div>

<input type="checkbox" id="modal-toggle">

<div class="overlay">

    <label for="modal-toggle" class="backdrop"></label>

    <div class="modal" role="dialog" aria-labelledby="modal-title">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="modal-content">

            <span class="tag">Featured Work</span>

            <h2 id="modal-title">Creative Portfolio Project</h2>

            <p>
                This modal demonstrates a smooth magnetic pull animation created
                entirely with CSS. The dialog gently scales and moves toward the
                viewer while maintaining a clean portfolio-inspired appearance.
            </p>

            <div class="actions">
                <button>View Case Study</button>
                <button class="secondary">Live Preview</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
