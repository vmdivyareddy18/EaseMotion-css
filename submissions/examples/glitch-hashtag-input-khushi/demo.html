<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Glitch Hashtag Input</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Glitch Hashtag Input</h1>
        <p class="subtitle">
            Modern cyberpunk inspired hashtag input component
        </p>
        <div class="input-box">
            <div class="scan-line"></div>
            <div class="hash-icon">#</div>
            <input type="text" placeholder="# javascript  # css  # react" aria-label="Hashtag Input" autocomplete="off"
                spellcheck="false">
        </div>
    </div>
</body>
</html>
