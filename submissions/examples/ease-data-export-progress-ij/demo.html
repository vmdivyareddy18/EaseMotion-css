<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Export Progress - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <span class="label-text">Exporting Data</span>
    <div class="bar-wrapper">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <span class="percentage" id="percentage">0</span>
    <div class="bar-stats">
      <span id="progressLabel">Ready</span>
      <span id="fileSize">2.4 GB</span>
    </div>
    <button class="btn-export" id="exportBtn">Start Export</button>
  </div>

  <script>
    const barFill = document.getElementById('barFill');
    const percentage = document.getElementById('percentage');
    const progressLabel = document.getElementById('progressLabel');
    const exportBtn = document.getElementById('exportBtn');

    exportBtn.addEventListener('click', () => {
      if (exportBtn.disabled) return;
      exportBtn.disabled = true;
      exportBtn.textContent = 'Exporting...';

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.floor(Math.random() * 8) + 2;
        if (progress > 100) progress = 100;

        barFill.style.width = progress + '%';
        percentage.textContent = progress;

        if (progress < 30) progressLabel.textContent = 'Preparing data...';
        else if (progress < 60) progressLabel.textContent = 'Compressing files...';
        else if (progress < 90) progressLabel.textContent = 'Uploading...';
        else if (progress < 100) progressLabel.textContent = 'Finalizing...';
        else {
          progressLabel.textContent = 'Complete!';
          clearInterval(interval);
          exportBtn.disabled = false;
          exportBtn.textContent = 'Export Again';
        }
      }, 400);
    });
  </script>
</body>
</html>
