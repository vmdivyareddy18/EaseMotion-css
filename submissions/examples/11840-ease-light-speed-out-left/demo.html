<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-light-speed-out-left</title>
  <meta name="description" content="A demonstration of the ease-light-speed-out-left animation showing an element exiting quickly to the left with skew effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-light-speed-out-left</h1>
      <p class="subtitle" id="main-desc">Blasts out to the left at high speed with skew and fade out</p>
    </header>

    <div class="display-area">
      <!-- Target that blasts out to the left -->
      <div class="speed-target" id="target-element">
        <span>Light Speed</span>
      </div>
    </div>

    <button id="btn-exit" onclick="triggerExit()">Trigger Exit</button>
    <button id="btn-reset" class="btn-secondary" onclick="resetElement()">Reset Element</button>
  </main>

  <script>
    function triggerExit() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-light-speed-out-left');
      void target.offsetWidth;
      target.classList.add('ease-light-speed-out-left');
    }

    function resetElement() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-light-speed-out-left');
    }
  </script>

</body>
</html>
