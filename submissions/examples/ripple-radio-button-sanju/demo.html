<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Radio Button</title>

    <link rel="stylesheet" href="../../../dist/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="blog-card ease-fade-in">

    <div class="blog-header">

        <span class="tag">
            Blog Categories
        </span>

        <h1>
            Choose Your Favorite Topic
        </h1>

        <p>
            Select a category to personalize your reading experience.
        </p>

    </div>

    <form>

        <fieldset>

            <legend>
                Available Categories
            </legend>

            <label class="radio-item ease-hover-lift">

                <input
                    type="radio"
                    name="category"
                    checked>

                <span class="custom-radio"></span>

                <span class="label-text">
                    Technology
                </span>

            </label>

            <label class="radio-item ease-hover-lift">

                <input
                    type="radio"
                    name="category">

                <span class="custom-radio"></span>

                <span class="label-text">
                    Design
                </span>

            </label>

            <label class="radio-item ease-hover-lift">

                <input
                    type="radio"
                    name="category">

                <span class="custom-radio"></span>

                <span class="label-text">
                    Business
                </span>

            </label>

            <label class="radio-item ease-hover-lift">

                <input
                    type="radio"
                    name="category">

                <span class="custom-radio"></span>

                <span class="label-text">
                    Lifestyle
                </span>

            </label>

        </fieldset>

    </form>

</section>

</body>

</html>
