<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-carousel-fade - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-carousel-fade</h1>
    <div class="carousel-fade">
      <input type="radio" name="fade" id="s1" checked>
      <input type="radio" name="fade" id="s2">
      <input type="radio" name="fade" id="s3">
      <input type="radio" name="fade" id="s4">
      <input type="radio" name="fade" id="s5">
      <div class="slide slide-1">Slide 1</div>
      <div class="slide slide-2">Slide 2</div>
      <div class="slide slide-3">Slide 3</div>
      <div class="slide slide-4">Slide 4</div>
      <div class="slide slide-5">Slide 5</div>
      <div class="nav">
        <label for="s1"></label>
        <label for="s2"></label>
        <label for="s3"></label>
        <label for="s4"></label>
        <label for="s5"></label>
      </div>
    </div>
    <p class="auto-msg">Select a slide above or use auto-play controls</p>
  </div>
  <script>
    let autoIndex = 1;
    const total = 5;
    setInterval(() => {
      document.getElementById('s' + (autoIndex + 1)).checked = true;
      autoIndex = (autoIndex + 1) % total;
    }, 3500);
  </script>
</body>
</html>
