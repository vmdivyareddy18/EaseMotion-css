<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battery Indicator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="batt-wrap">
    <div class="batt full" style="--level: 100%;">
      <span class="batt-cap"></span>
      <span class="batt-body"><span class="batt-fill"></span></span>
      <span class="batt-pct">100%</span>
    </div>

    <div class="batt mid" style="--level: 55%;">
      <span class="batt-cap"></span>
      <span class="batt-body"><span class="batt-fill"></span></span>
      <span class="batt-pct">55%</span>
    </div>

    <div class="batt low" style="--level: 15%;">
      <span class="batt-cap"></span>
      <span class="batt-body"><span class="batt-fill"></span></span>
      <span class="batt-pct">15%</span>
    </div>

    <div class="batt charging" style="--level: 72%;">
      <span class="batt-cap"></span>
      <span class="batt-body">
        <span class="batt-fill"></span>
        <span class="batt-bolt" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M13 2 3 14h7l-1 8 10-12h-7z" /></svg>
        </span>
      </span>
      <span class="batt-pct">Charging</span>
    </div>
  </div>
</body>
</html>
