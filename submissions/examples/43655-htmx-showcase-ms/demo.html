<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTMX Integration Demo</title>
  <!-- Global EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-htmx-container">
    <div class="ease-htmx-header">
      <h2 class="ease-htmx-title">HTMX Integration</h2>
      <p class="ease-htmx-desc">Using htmx-swapping / htmx-added classes to trigger EaseMotion animations.</p>
    </div>

    <div class="ease-htmx-stage">
      
      <!-- 
        Note: HTMX requires a server to actually fetch HTML.
        For this demo, we mock the request using hx-get to a nonexistent endpoint
        and intercept it with JS to return mock HTML to simulate the swap.
      -->
      <button 
        class="ease-htmx-btn ease-hover-lift" 
        hx-get="/mock-endpoint" 
        hx-swap="outerHTML swap:0.5s"
        hx-target="#target-card"
        onclick="mockHtmxRequest()"
      >
        Load New Data (AJAX)
      </button>

      <div id="target-card" class="ease-htmx-content">
        <h3 style="margin-top: 0;">Initial Data</h3>
        <p style="color: #64748b; margin-bottom: 0;">Click the button to load new data via HTMX with animations.</p>
      </div>
      
    </div>
  </div>

  <script>
    // Mock HTMX request for static demo purposes
    let count = 1;
    function mockHtmxRequest() {
      document.body.addEventListener('htmx:beforeRequest', function(evt) {
        evt.preventDefault(); // Stop actual fetch
        
        const target = evt.detail.target;
        target.classList.add('htmx-swapping');
        
        setTimeout(() => {
          count++;
          const newHtml = `
            <div id="target-card" class="ease-htmx-content htmx-added">
              <h3 style="margin-top: 0;">Loaded Data #${count}</h3>
              <p style="color: #64748b; margin-bottom: 0;">This content was dynamically swapped into the DOM.</p>
            </div>
          `;
          
          target.outerHTML = newHtml;
          
          // Remove htmx-added after animation completes
          setTimeout(() => {
            const newEl = document.getElementById('target-card');
            if(newEl) newEl.classList.remove('htmx-added');
          }, 500);
          
        }, 500); // 0.5s matches the swap:0.5s declaration
      }, { once: true });
    }
  </script>

</body>
</html>
