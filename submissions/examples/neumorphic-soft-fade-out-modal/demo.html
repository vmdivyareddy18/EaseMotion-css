<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Fade-Out Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle" hidden>

<label for="modal-toggle" class="open-btn">
Open Modal
</label>

<div class="overlay">

<div class="modal">

<h2>Neumorphic Modal</h2>

<p>
This modal demonstrates a smooth CSS fade-out transition with a soft neumorphic interface.
</p>

<label for="modal-toggle" class="close-btn">
Close
</label>

</div>

</div>

</body>
</html>
