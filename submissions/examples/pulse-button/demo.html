<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: #0f0e17;
      color: #fff;
      font-family: sans-serif;
      padding: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }
    h1 { margin-bottom: 0; }
    p { color: rgba(255,255,255,0.6); }
    .btn {
      padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    code {
      font-size: 13px;
      background: rgba(108,99,255,0.15);
      color: #a78bfa;
      border: 1px solid rgba(108,99,255,0.3);
      padding: 0.2em 0.75em;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <h1>Pulse Button Effect</h1>
  <p>A subtle continuous scale pulse for Call-to-Action buttons.</p>
  <button class="btn ease-pulse-button">Get Started</button>
  <code>ease-pulse-button</code>
</body>
</html>
