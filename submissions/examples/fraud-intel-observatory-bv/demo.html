<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Cyber-Fraud Intelligence Observatory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="exchange-dashboard">
    <header class="header">
      <span class="badge">Fraud Observatory</span>
      <h1>Global Cyber-Fraud Intelligence Observatory</h1>
      <p class="subtitle">Secure federated sharing of transaction fraud patterns across institutional registry nodes.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-exchange">
        <h3>🤝 Active sharing nodes</h3>
        <ul class="nodes-list">
          <li class="online">Federal Clearinghouse <span class="badge-mini">Online</span></li>
        </ul>
      </section>

      <section class="side-panel">
        <div class="panel-card settings-card">
          <h3>⚙️ Sharing Policies</h3>
          <div class="toggle-row">
            <span>Anonymous Data sharing</span>
            <label class="switch">
              <input type="checkbox" checked>
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
