<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<div class="container">

<div class="badge">

Analytics Dashboard

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Interactive tooltip component
designed for responsive
dashboard interfaces with
smooth rotate-click transitions.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

View Metrics

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="metric">

+38%

</div>

<h3>

Growth Insights

</h3>

<p>

Track business performance
with a CSS-only rotate-click
tooltip interaction optimized
for dashboards.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
