<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Grid Layout — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="component-card">
    <h2 class="card-title">Masonry Grid Layout</h2>
    <p class="card-desc">Cards enter with staggered animation in a responsive masonry layout.</p>
    <div class="masonry">
      <div class="masonry-card" style="height: 180px"><span>Card 1</span></div>
      <div class="masonry-card" style="height: 240px"><span>Card 2</span></div>
      <div class="masonry-card" style="height: 150px"><span>Card 3</span></div>
      <div class="masonry-card" style="height: 200px"><span>Card 4</span></div>
      <div class="masonry-card" style="height: 280px"><span>Card 5</span></div>
      <div class="masonry-card" style="height: 160px"><span>Card 6</span></div>
      <div class="masonry-card" style="height: 220px"><span>Card 7</span></div>
      <div class="masonry-card" style="height: 190px"><span>Card 8</span></div>
    </div>
    <div class="vars-panel">
      <label>--card-bg <input type="color" value="#3a3a3c" data-var="--card-bg"></label>
      <label>--card-radius <input type="range" min="4" max="24" value="12" data-var="--card-radius"> <span class="val">12px</span></label>
      <label>--stagger-delay <input type="range" min="0.02" max="0.15" step="0.01" value="0.05" data-var="--stagger-delay"> <span class="val">0.05s</span></label>
      <label>--card-min-width <input type="range" min="120" max="240" step="10" value="160" data-var="--card-min-width"> <span class="val">160px</span></label>
    </div>
  </div>
  <script>
    const masonry = document.querySelector('.masonry');

    function animateCards() {
      const cards = document.querySelectorAll('.masonry-card');
      cards.forEach((c, i) => {
        c.classList.remove('enter');
        void c.offsetWidth;
        setTimeout(() => c.classList.add('enter'), i * 80);
      });
    }

    animateCards();

    document.querySelectorAll('.vars-panel input[data-var]').forEach(el => {
      el.addEventListener('input', () => {
        let val = el.value;
        if (el.type === 'color') val = el.value;
        else if (el.dataset.var === '--stagger-delay') val += 's';
        else val += 'px';
        masonry.style.setProperty(el.dataset.var, val);
        if (el.type === 'range') el.nextElementSibling.textContent = val;
      });
    });
  </script>
</body>
</html>
