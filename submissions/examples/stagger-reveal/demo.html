<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Stagger Animation System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery-grid">
        <div class="card" style="--delay: calc(0 * 80ms)">Card 1</div>
        <div class="card" style="--delay: calc(1 * 80ms)">Card 2</div>
        <div class="card" style="--delay: calc(2 * 80ms)">Card 3</div>
        <div class="card" style="--delay: calc(3 * 80ms)">Card 4</div>
        <div class="card" style="--delay: calc(4 * 80ms)">Card 5</div>
        <div class="card" style="--delay: calc(5 * 80ms)">Card 6</div>
        <div class="card" style="--delay: calc(6 * 80ms)">Card 7</div>
        <div class="card" style="--delay: calc(7 * 80ms)">Card 8</div>
        <div class="card" style="--delay: calc(8 * 80ms)">Card 9</div>
        <div class="card" style="--delay: calc(9 * 80ms)">Card 10</div>
        <div class="card" style="--delay: calc(10 * 80ms)">Card 11</div>
        <div class="card" style="--delay: calc(11 * 80ms)">Card 12</div>
    </div>
</body>
</html>
