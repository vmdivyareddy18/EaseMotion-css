<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Spiral Barcode (E-Commerce)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Libre+Barcode+39+Text&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- E-Commerce Checkout / Wallet Environment -->
  <div class="wallet-environment">
    
    <!-- Pure CSS State Controller -->
    <input type="checkbox" id="reveal-trigger" class="state-trigger" checked>
    
    <div class="digital-receipt em-fade-in">
      
      <!-- Receipt Header -->
      <header class="receipt-header">
        <div class="brand">
          <div class="brand-logo"></div>
          <span>Aura Athletics</span>
        </div>
        <div class="order-status">Confirmed</div>
      </header>

      <div class="receipt-body">
        <h2>Order #882-9102</h2>
        <p class="amount">$142.50</p>
        <p class="date">Jul 15, 2026 • Apple Pay</p>
      </div>

      <!-- Divider -->
      <div class="tear-line"></div>

      <!-- Spiral Barcode Section -->
      <div class="barcode-section">
        <label for="reveal-trigger" class="reveal-btn">
          <span>Tap to Replay Animation</span>
        </label>

        <!-- Accessible Screen Reader Text -->
        <span class="sr-only">Barcode: 8829102334</span>

        <div class="barcode-container">
          <div class="barcode-bars">
            <!-- Individual bars for the stagger effect. Mix of thin, medium, and thick. -->
            <div class="bar thick"></div>
            <div class="bar thin"></div>
            <div class="bar med"></div>
            <div class="bar thin"></div>
            <div class="bar thin"></div>
            <div class="bar thick"></div>
            <div class="bar med"></div>
            <div class="bar thin"></div>
            <div class="bar thick"></div>
            <div class="bar med"></div>
            <div class="bar thin"></div>
            <div class="bar thin"></div>
            <div class="bar med"></div>
            <div class="bar thick"></div>
            <div class="bar thin"></div>
            <div class="bar thin"></div>
            <div class="bar med"></div>
            <div class="bar thick"></div>
            <div class="bar thin"></div>
            <div class="bar med"></div>
            <div class="bar thin"></div>
            <div class="bar thick"></div>
            <div class="bar thin"></div>
          </div>
          <div class="barcode-numbers">8829 1023 3491</div>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
