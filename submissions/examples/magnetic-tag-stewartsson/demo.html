<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health & Fitness Hub - Magnetic Tag Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="fitness-viewport">
        <!-- Main Fitness Metrics Tracker Card Container Hub Shell -->
        <div class="metrics-container-card">
            <header class="metrics-header">
                <span class="activity-badge">Activity Log</span>
                <h2 class="metrics-title">Workout Classification</h2>
                <p class="metrics-subtitle">Hover over the tag capsules below to trigger the interactive pure-CSS magnetic attraction snaps.</p>
            </header>

            <!-- Advanced Pure-CSS Magnetic Tag Presentation Stage Area Grid -->
            <div class="tags-workspace">
                <div class="tags-flex-wrap">
                    
                    <!-- Magnetic Tag Variant 1 Link Hook Node -->
                    <a href="#cardio" class="magnetic-tag tag-cyan ease-magnetic-pull">
                        <span class="tag-icon">⚡</span>
                        <span class="tag-label">Cardio.Sync</span>
                    </a>

                    <!-- Magnetic Tag Variant 2 Link Hook Node -->
                    <a href="#strength" class="magnetic-tag tag-emerald ease-magnetic-pull">
                        <span class="tag-icon">💪</span>
                        <span class="tag-label">Strength.Core</span>
                    </a>

                    <!-- Magnetic Tag Variant 3 Link Hook Node -->
                    <a href="#endurance" class="magnetic-tag tag-amber ease-magnetic-pull">
                        <span class="tag-icon">🏃</span>
                        <span class="tag-label">Stamina.Track</span>
                    </a>

                </div>
            </div>

            <footer class="metrics-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Biometric Telemetry Stream Live</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
