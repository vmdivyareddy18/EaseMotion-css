<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underline Draw Range Slider</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="slider-demo">

    <div class="demo-header ease-fade-in">
        <h1>Underline Draw Range Slider</h1>
        <p>
            A smooth range slider component with an animated underline
            drawing effect built using EaseMotion CSS.
        </p>
    </div>

    <div class="slider-container ease-slide-up">

        <label for="range">
            Select Progress
        </label>

        <div class="range-wrapper">
            <input 
                type="range"
                id="range"
                min="0"
                max="100"
                value="50"
                aria-label="Select progress value"
            >

            <div class="range-underline"></div>
        </div>

    </div>

</section>

</body>
</html>
