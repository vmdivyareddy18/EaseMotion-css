<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Flag Rollout Gauge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="rollout-shell" aria-labelledby="rollout-title">
    <section class="rollout-panel">
      <div class="copy">
        <p class="eyebrow">launch control</p>
        <h1 id="rollout-title">Feature flag rollout gauge</h1>
        <p>A staged rollout gauge fills across audience rings while health signals settle into place.</p>
      </div>

      <div class="gauge-card" aria-label="Feature flag rollout at 64 percent">
        <div class="gauge">
          <span class="gauge-value">64%</span>
        </div>
        <div class="signals">
          <span><strong>Errors</strong> low</span>
          <span><strong>Latency</strong> steady</span>
          <span><strong>Feedback</strong> positive</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
