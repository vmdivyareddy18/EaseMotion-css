<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conic-Gradient Starburst Animated Loaders</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 style="margin: 0 0 0.5rem 0; font-size: 1.75rem;">Starburst Gradient Loaders</h1>
  <p style="color: #64748b; margin-bottom: 3rem; text-align: center; max-width: 500px;">
    Explore advanced geometric spinning elements structured through raw abrupt color stops.
  </p>

  <div class="loader-grid">
    <div class="starburst-base starburst-classic"></div>
    <div class="starburst-base starburst-sun"></div>
    <div class="starburst-base starburst-gear"></div>
    <div class="starburst-double-wrap">
      <div class="starburst-double-outer"></div>
      <div class="starburst-double-inner"></div>
    </div>
    <div class="starburst-base starburst-breathing"></div>
  </div>

</body>
</html>
