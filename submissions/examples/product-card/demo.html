<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 4rem 1rem; margin: 0;">

  <div class="ease-product-card">
    <div class="ease-card-media">
      <button class="ease-btn-wishlist" id="wishlistBtn" aria-label="Toggle Wishlist">
        <span class="ease-heart-icon">♥</span>
      </button>
      <img class="ease-card-img" src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400&q=80" alt="Sport Sneaker Core Edition" />
    </div>

    <div class="ease-card-content">
      <h3 class="ease-product-title">Air Speed Overdrive</h3>
      <div class="ease-product-price">$145.00</div>
      
      <button class="ease-btn-cart" id="cartBtn">
        <span class="ease-cart-spinner"></span>
        <span id="cartText">Add to Cart</span>
      </button>
    </div>
  </div>

  <script>
    const wishlistBtn = document.getElementById('wishlistBtn');
    const cartBtn = document.getElementById('cartBtn');
    const cartText = document.getElementById('cartText');

    // Wishlist spring flip active state handler
    wishlistBtn.addEventListener('click', () => {
      wishlistBtn.classList.toggle('is-active');
    });

    // Cart loading sequence submission mock
    cartBtn.addEventListener('click', () => {
      cartBtn.classList.add('is-loading');
      cartText.textContent = 'Processing...';

      setTimeout(() => {
        cartBtn.classList.remove('is-loading');
        cartBtn.classList.add('is-added');
        cartText.textContent = '✓ Added to Cart';
        
        // Reset stage baseline state parameters
        setTimeout(() => {
          cartBtn.classList.remove('is-added');
          cartText.textContent = 'Add to Cart';
        }, 1800);
      }, 1000);
    });
  </script>
</body>
</html>
