<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XO · Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <h1>✕ ◯</h1>
    <div class="status-area" id="statusMessage">Player X's turn</div>
    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="restartBtn">↻ New Game</button>
    </div>
  </div>

  <script>
    (function() {
      const boardEl = document.getElementById('board');
      const statusEl = document.getElementById('statusMessage');
      const restartBtn = document.getElementById('restartBtn');
      const cellElements = document.querySelectorAll('.cell');

      let board = Array(9).fill(null);
      let currentPlayer = 'X';
      let gameActive = true;
      let winnerCombo = null;

      const winPatterns = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6]
      ];

      function updateStatus(message) {
        statusEl.textContent = message;
      }

      function clearWinHighlights() {
        cellElements.forEach(cell => cell.classList.remove('win-highlight'));
      }

      function highlightWinCells(combo) {
        if (!combo) return;
        combo.forEach(index => cellElements[index].classList.add('win-highlight'));
      }

      function resetGame() {
        board = Array(9).fill(null);
        currentPlayer = 'X';
        gameActive = true;
        winnerCombo = null;
        cellElements.forEach(cell => {
          cell.textContent = '';
          cell.classList.remove('win-highlight', 'x-move', 'o-move');
        });
        clearWinHighlights();
        updateStatus(`Player X's turn`);
      }

      function evaluateGameState() {
        for (let pattern of winPatterns) {
          const [a, b, c] = pattern;
          if (board[a] && board[a] === board[b] && board[a] === board[c]) {
            gameActive = false;
            winnerCombo = pattern;
            highlightWinCells(pattern);
            updateStatus(`🏆 Player ${board[a]} wins!`);
            return;
          }
        }
        if (board.every(cell => cell !== null)) {
          gameActive = false;
          winnerCombo = null;
          updateStatus(`🤝 It's a draw!`);
          return;
        }
        updateStatus(`Player ${currentPlayer}'s turn`);
      }

      function handleCellClick(e) {
        const cell = e.currentTarget;
        const index = parseInt(cell.dataset.index, 10);
        if (!gameActive || board[index] !== null || winnerCombo) return;

        board[index] = currentPlayer;
        cell.textContent = currentPlayer;
        cell.classList.add(currentPlayer === 'X' ? 'x-move' : 'o-move');

        evaluateGameState();

        if (gameActive) {
          currentPlayer = (currentPlayer === 'X' ? 'O' : 'X');
          updateStatus(`Player ${currentPlayer}'s turn`);
        }
      }

      function initGame() {
        resetGame();
        cellElements.forEach(cell => {
          cell.removeEventListener('click', handleCellClick);
          cell.addEventListener('click', handleCellClick);
        });
        restartBtn.addEventListener('click', resetGame);
      }

      initGame();
    })();
  </script>
</body>
</html>
