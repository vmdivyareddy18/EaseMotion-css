<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated API Request Flow — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #020617;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem;
      gap: 2rem;
    }
    h2 { color: white; font-size: 1.25rem; text-align: center; }
    p  { color: #64748b; font-size: 0.85rem; text-align: center; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .btn {
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-success { background: #10b981; color: white; }
    .btn-reset   { background: #334155; color: #94a3b8; }
  </style>
</head>
<body>

  <h2>API Request Flow</h2>
  <p>Visualize how data travels between client, server, and database</p>

  <div class="api-flow" id="flow">

    <!-- Client -->
    <div class="node node-client" id="node-client">
      <span class="node-icon">💻</span>
      Client
      <span class="node-status status-active" id="status-client"></span>
    </div>

    <!-- Client → API -->
    <div class="connection" id="conn-1" style="--packet-color: #3b82f6; --packet-speed: 1s;"></div>

    <!-- API Server -->
    <div class="node node-api" id="node-api">
      <span class="node-icon">⚡</span>
      API Server
      <span class="node-status status-idle" id="status-api"></span>
    </div>

    <!-- API → Database -->
    <div class="connection" id="conn-2" style="--packet-color: #10b981; --packet-speed: 1.4s;"></div>

    <!-- Database -->
    <div class="node node-database" id="node-db">
      <span class="node-icon">🗄️</span>
      Database
      <span class="node-status status-idle" id="status-db"></span>
    </div>

    <!-- Database → External -->
    <div class="connection" id="conn-3" style="--packet-color: #f59e0b; --packet-speed: 1.8s;"></div>

    <!-- External Service -->
    <div class="node node-external" id="node-ext">
      <span class="node-icon">🌐</span>
      External API
      <span class="node-status status-idle" id="status-ext"></span>
    </div>

    <p class="flow-state" id="flow-label">Click <span>Send Request</span> to simulate</p>
  </div>

  <div class="controls">
    <button class="btn btn-primary" onclick="startFlow()">▶ Send Request</button>
    <button class="btn btn-success" onclick="successFlow()">✓ Simulate Success</button>
    <button class="btn btn-reset"   onclick="resetFlow()">↺ Reset</button>
  </div>

  <script>
    function setStatus(id, cls) {
      const el = document.getElementById(id);
      el.className = 'node-status ' + cls;
    }

    function setActive(connId, active) {
      document.getElementById(connId).classList.toggle('active', active);
    }

    function setLabel(text) {
      document.getElementById('flow-label').innerHTML = text;
    }

    function resetFlow() {
      ['conn-1','conn-2','conn-3'].forEach(c => setActive(c, false));
      ['status-client','status-api','status-db','status-ext'].forEach(s => setStatus(s, 'status-idle'));
      setStatus('status-client', 'status-active');
      setLabel('Click <span>Send Request</span> to simulate');
    }

    function startFlow() {
      resetFlow();
      setLabel('🔄 Sending request...');
      setActive('conn-1', true);
      setStatus('status-api', 'status-loading');

      setTimeout(() => {
        setActive('conn-2', true);
        setStatus('status-db', 'status-loading');
        setLabel('🔄 Querying database...');
      }, 1200);

      setTimeout(() => {
        setActive('conn-3', true);
        setStatus('status-ext', 'status-loading');
        setLabel('🔄 Calling external API...');
      }, 2400);
    }

    function successFlow() {
      startFlow();
      setTimeout(() => {
        ['conn-1','conn-2','conn-3'].forEach(c => setActive(c, false));
        ['status-api','status-db','status-ext'].forEach(s => setStatus(s, 'status-active'));
        setLabel('✅ <span>Success</span> — Response returned to client');
      }, 3800);
    }

    resetFlow();
  </script>

</body>
</html>
