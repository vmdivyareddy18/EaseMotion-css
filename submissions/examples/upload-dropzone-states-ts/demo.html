<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Dropzone State Panel</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <header class="demo-header">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1>File Upload Dropzone State Panel</h1>
      <p>Demonstrates accessible idle, focus, and uploaded-style states for a file upload area.</p>
    </header>
    <section class="dropzone-grid">
      <label class="upload-dropzone">
        <input type="file">
        <span class="upload-icon" aria-hidden="true">+</span>
        <strong>Drop a file here or browse</strong>
        <small>SVG, PNG, or PDF up to 5MB</small>
      </label>
      <div class="upload-dropzone uploaded" aria-label="Uploaded file">
        <span class="upload-icon" aria-hidden="true">OK</span>
        <strong>brand-assets.zip</strong>
        <small>Upload complete</small>
      </div>
    </section>
  </main>
</body>
</html>
