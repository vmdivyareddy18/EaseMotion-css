<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MacOS Magnification Dock — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>MacOS Style Dock</h1>
  <p class="subtitle">Pure CSS magnification using adjacent sibling combinators.</p>

  <div class="dock-wrapper">
    <ul class="ease-dock">
      <li class="dock-item" aria-label="Finder"><span>&#x1F4C1;</span></li>
      <li class="dock-item" aria-label="Messages"><span>&#x1F4AC;</span></li>
      <li class="dock-item" aria-label="Safari"><span>&#x1F310;</span></li>
      <li class="dock-item" aria-label="Music"><span>&#x1F3B5;</span></li>
      <li class="dock-item" aria-label="Photos"><span>&#x1F4F8;</span></li>
      <li class="dock-item" aria-label="Settings"><span>&#x2699;&#xFE0F;</span></li>
      <li class="dock-item" aria-label="Trash"><span>&#x1F5D1;&#xFE0F;</span></li>
    </ul>
  </div>

</body>
</html>
