<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masonry Grid - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="ms-header"><h1>Masonry Grid Layout</h1><p>CSS-only masonry with animated reveals and filtering</p></header>
<section class="ms-section"><h2>Filter Tabs</h2><div class="ms-filters"><input type="radio" name="msf" id="ms-a" checked><label for="ms-a">All</label><input type="radio" name="msf" id="ms-p"><label for="ms-p">Photos</label><input type="radio" name="msf" id="ms-ar"><label for="ms-ar">Art</label><input type="radio" name="msf" id="ms-d"><label for="ms-d">Design</label></div>
<div class="ms-masonry">
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#667eea;height:200px"></div><figcaption>Mountain</figcaption></figure>
<figure class="ms-item ms-art"><div class="ms-img" style="background:#f5576c;height:140px"></div><figcaption>Abstract</figcaption></figure>
<figure class="ms-item ms-design"><div class="ms-img" style="background:#48bb78;height:170px"></div><figcaption>UI Design</figcaption></figure>
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#a855f7;height:240px"></div><figcaption>Urban</figcaption></figure>
<figure class="ms-item ms-art"><div class="ms-img" style="background:#f6ad55;height:120px"></div><figcaption>Watercolor</figcaption></figure>
<figure class="ms-item ms-design"><div class="ms-img" style="background:#3b82f6;height:190px"></div><figcaption>Wireframe</figcaption></figure>
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#ec4899;height:160px"></div><figcaption>Sunset</figcaption></figure>
<figure class="ms-item ms-art"><div class="ms-img" style="background:#10b981;height:210px"></div><figcaption>Oil Paint</figcaption></figure>
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#f59e0b;height:130px"></div><figcaption>Night Sky</figcaption></figure>
<figure class="ms-item ms-design"><div class="ms-img" style="background:#ef4444;height:180px"></div><figcaption>Icon Set</figcaption></figure>
<figure class="ms-item ms-art"><div class="ms-img" style="background:#8b5cf6;height:220px"></div><figcaption>Sculpture</figcaption></figure>
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#14b8a6;height:140px"></div><figcaption>Macro</figcaption></figure>
<figure class="ms-item ms-design"><div class="ms-img" style="background:#f97316;height:200px"></div><figcaption>Brand Guide</figcaption></figure>
<figure class="ms-item ms-photo"><div class="ms-img" style="background:#6366f1;height:170px"></div><figcaption>Aerial</figcaption></figure>
<figure class="ms-item ms-art"><div class="ms-img" style="background:#d946ef;height:130px"></div><figcaption>Digital</figcaption></figure>
</div></section>
<section class="ms-section"><h2>Loading Placeholder</h2><div class="ms-masonry">
<div class="ms-item ms-shimmer"><div class="ms-img" style="height:180px"></div></div>
<div class="ms-item ms-shimmer"><div class="ms-img" style="height:120px"></div></div>
<div class="ms-item ms-shimmer"><div class="ms-img" style="height:150px"></div></div>
<div class="ms-item ms-shimmer"><div class="ms-img" style="height:200px"></div></div>
<div class="ms-item ms-shimmer"><div class="ms-img" style="height:130px"></div></div>
</div></section>
<footer class="ms-footer"><p>EaseMotion CSS - Masonry Demo | GSSoC 2026</p></footer>
</body>
</html>
