<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chip ARIA Selected Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-chip – aria-pressed Toggle Fix</h2>
  <p style="font-size:0.85rem;color:#6c757d;margin-bottom:1rem">Filter by category:</p>
  <div class="chip-group" role="group" aria-label="Category filters">
    <!-- KEY FIX: role=button + aria-pressed for toggle semantics -->
    <button class="ease-chip is-selected" role="button" aria-pressed="true"
      onclick="const p=this.getAttribute('aria-pressed')==='true'; this.setAttribute('aria-pressed',!p); this.classList.toggle('is-selected',!p)">
      All
    </button>
    <button class="ease-chip" role="button" aria-pressed="false"
      onclick="const p=this.getAttribute('aria-pressed')==='true'; this.setAttribute('aria-pressed',!p); this.classList.toggle('is-selected',!p)">
      <span class="ease-chip__icon">🎨</span> Design
    </button>
    <button class="ease-chip" role="button" aria-pressed="false"
      onclick="const p=this.getAttribute('aria-pressed')==='true'; this.setAttribute('aria-pressed',!p); this.classList.toggle('is-selected',!p)">
      <span class="ease-chip__icon">💻</span> Development
    </button>
    <button class="ease-chip" role="button" aria-pressed="false"
      onclick="const p=this.getAttribute('aria-pressed')==='true'; this.setAttribute('aria-pressed',!p); this.classList.toggle('is-selected',!p)">
      <span class="ease-chip__icon">📱</span> Mobile
    </button>
  </div>
  <p class="note">Screen readers will now announce "pressed" / "not pressed" on toggle.</p>
</body>
</html>
