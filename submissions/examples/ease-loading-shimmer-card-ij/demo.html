<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Loading Shimmer Card — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem;
      width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      color: #e2e8f0;
      margin-bottom: 1.25rem;
      font-weight: 500;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .controls label {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .controls input {
      width: 100px;
      padding: 0.3rem 0.5rem;
      border-radius: 0.35rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.8rem;
    }
    .controls input:focus { outline: none; border-color: #8b5cf6; }
    .toggle-content {
      margin-top: 1rem;
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 0.4rem;
      background: #8b5cf6;
      color: #fff;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .toggle-content:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <h2>✦ Shimmer Skeleton</h2>
    <loading-shimmer-card id="demo">
      <div class="placeholder-block"></div>
      <div class="placeholder-line"></div>
      <div class="placeholder-line"></div>
      <div class="placeholder-line"></div>
    </loading-shimmer-card>
    <div class="controls">
      <label>Shimmer
        <input type="color" id="shimmerColor" value="#334155">
      </label>
      <label>Speed
        <input type="range" id="shimmerSpeed" min="0.6" max="4" step="0.2" value="1.8">
      </label>
      <label>Radius
        <input type="range" id="borderRadius" min="0" max="1.5" step="0.05" value="0.75">
      </label>
    </div>
    <button class="toggle-content" id="toggle">Toggle Loaded State</button>
  </div>
  <script>
    const el = document.getElementById('demo');
    const toggle = document.getElementById('toggle');
    let loaded = false;

    document.getElementById('shimmerColor').addEventListener('input', e => {
      el.style.setProperty('--shimmer-color', e.target.value);
    });
    document.getElementById('shimmerSpeed').addEventListener('input', e => {
      el.style.setProperty('--shimmer-duration', e.target.value + 's');
    });
    document.getElementById('borderRadius').addEventListener('input', e => {
      el.style.setProperty('--border-radius', e.target.value + 'rem');
    });

    toggle.addEventListener('click', () => {
      loaded = !loaded;
      if (loaded) {
        el.innerHTML = `<div style="position:relative;z-index:1;color:#e2e8f0;">
          <h3 style="font-weight:500;margin-bottom:0.5rem;">Content Loaded</h3>
          <p style="color:#94a3b8;font-size:0.9rem;line-height:1.5;">This card content replaces the shimmer skeleton after loading completes. Sweet, right?</p>
        </div>`;
        toggle.textContent = 'Show Skeleton';
      } else {
        el.innerHTML = `
          <div class="placeholder-block"></div>
          <div class="placeholder-line"></div>
          <div class="placeholder-line"></div>
          <div class="placeholder-line"></div>`;
        toggle.textContent = 'Toggle Loaded State';
      }
    });
  </script>
</body>
</html>
