<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiking Trail Map Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="ease-container">
        <h1 class="ease-slide-up">🥾 Hiking Trail Map</h1>
        <p class="ease-slide-up ease-delay-100">
            Interactive trail map with elevation markers and waypoints
        </p>

        <div class="ease-trail-map">
            <!-- Trail Path -->
            <svg class="ease-trail-svg" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
                <!-- Background -->
                <rect width="600" height="400" fill="var(--ease-trail-bg, #f0f4f8)" rx="12" />

                <!-- Trail Path -->
                <path
                    d="M 80 320 Q 150 280 200 240 T 300 180 T 400 200 T 520 160"
                    stroke="var(--ease-trail-color, #4a7c59)"
                    stroke-width="8"
                    fill="none"
                    stroke-linecap="round"
                    class="ease-trail-path"
                />

                <!-- Waypoints -->
                <circle cx="80" cy="320" r="8" fill="#4a7c59" class="ease-waypoint" />
                <circle cx="200" cy="240" r="8" fill="#4a7c59" class="ease-waypoint ease-delay-1" />
                <circle cx="300" cy="180" r="8" fill="#4a7c59" class="ease-waypoint ease-delay-2" />
                <circle cx="400" cy="200" r="8" fill="#4a7c59" class="ease-waypoint ease-delay-3" />
                <circle cx="520" cy="160" r="8" fill="#4a7c59" class="ease-waypoint ease-delay-4" />

                <!-- Elevation Markers -->
                <text x="70" y="340" class="ease-elevation">120m</text>
                <text x="190" y="260" class="ease-elevation">340m</text>
                <text x="290" y="195" class="ease-elevation">580m</text>
                <text x="390" y="220" class="ease-elevation">450m</text>
                <text x="510" y="175" class="ease-elevation">620m</text>

                <!-- Start/End Markers -->
                <text x="40" y="350" class="ease-marker ease-start">🏁 Start</text>
                <text x="460" y="140" class="ease-marker ease-end">🏆 End</text>

                <!-- Animated Hiker -->
                <circle cx="80" cy="320" r="10" fill="#e67e22" class="ease-hiker">
                    <animateMotion
                        dur="6s"
                        repeatCount="indefinite"
                        path="M 80 320 Q 150 280 200 240 T 300 180 T 400 200 T 520 160"
                    />
                </circle>
            </svg>

            <!-- Legend -->
            <div class="ease-legend">
                <span class="ease-legend-item">
                    <span class="ease-legend-dot" style="background:#4a7c59;"></span>
                    Trail Path
                </span>
                <span class="ease-legend-item">
                    <span class="ease-legend-dot" style="background:#e67e22;"></span>
                    Hiker
                </span>
                <span class="ease-legend-item">
                    <span class="ease-legend-dot" style="background:#2c3e50;"></span>
                    Waypoint
                </span>
            </div>
        </div>
    </div>
</body>
</html>
