<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Lightbox - E-Commerce Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f9fafb;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .demo-store-grid {
      display: flex;
      gap: 24px;
    }

    .demo-product {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      text-align: center;
    }

    .demo-product h3 {
      margin: 16px 0 8px 0;
      font-size: 1.1rem;
      color: #111827;
    }

    .demo-product p {
      margin: 0 0 16px 0;
      color: #6b7280;
    }

    .ease-product-thumb {
      display: block;
      width: 200px;
      height: 200px;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
    }

    .ease-product-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .ease-product-thumb:hover img {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="demo-store-grid">
    <div class="demo-product">
      <!-- Thumbnail Trigger -->
      <label for="lightbox-1" class="ease-product-thumb">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=400&q=80" alt="Premium Headphones">
      </label>
      <h3>Premium Headphones</h3>
      <p>$299.00</p>
    </div>
  </div>

  <!-- Pure CSS State Controller -->
  <input type="checkbox" id="lightbox-1" class="ease-lightbox-toggle">

  <!-- Lightbox Container -->
  <div class="ease-glow-lightbox">
    <label for="lightbox-1" class="ease-lightbox-overlay"></label>
    
    <div class="ease-lightbox-content" id="glow-container">
      <label for="lightbox-1" class="ease-lightbox-close">&times;</label>
      
      <!-- The element that tracks the mouse and renders the glow -->
      <div class="ease-cursor-glow"></div>
      
      <div class="ease-lightbox-image-wrapper">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=1000&q=80" alt="Premium Headphones Full">
      </div>
      
      <div class="ease-product-details">
        <h2>Acoustic Noise Cancelling Headphones</h2>
        <p>Experience world-class audio with our latest premium headphones. Built for comfort and pure sound.</p>
        <button class="ease-btn-add">Add to Cart</button>
      </div>
    </div>
  </div>

  <script>
    // Minimal JS to power the CSS cursor glow effect
    const container = document.getElementById('glow-container');

    container.addEventListener('mousemove', (e) => {
      const rect = container.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      container.style.setProperty('--mouse-x', `${x}px`);
      container.style.setProperty('--mouse-y', `${y}px`);
    });
  </script>
</body>
</html>
