<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="cert">
    <div class="cert-frame">
      <span class="corner tl"></span>
      <span class="corner tr"></span>
      <span class="corner bl"></span>
      <span class="corner br"></span>

      <p class="cert-kicker">Certificate of</p>
      <h1 class="cert-title">Achievement</h1>
      <p class="cert-sub">This certificate is proudly presented to</p>
      <p class="cert-name">Arhan Ansari</p>
      <p class="cert-desc">for outstanding contribution to open source and consistent excellence throughout the 2026 program.</p>

      <div class="cert-foot">
        <div class="sig">
          <span class="sig-line"></span>
          <span class="sig-label">Director</span>
        </div>

        <div class="seal">
          <span class="seal-star">&#9733;</span>
          <span class="seal-txt">2026</span>
          <span class="ribbon left"></span>
          <span class="ribbon right"></span>
        </div>

        <div class="sig">
          <span class="sig-line"></span>
          <span class="sig-label">Date</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
