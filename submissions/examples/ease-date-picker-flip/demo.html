<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Date Picker with Flip</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>📅 Date Picker with Flip</h1>
        <p class="subtitle">Date picker with flip animation like old clocks</p>

        <div class="datepicker-wrapper">
            <div class="date-display">
                <div class="flip-card">
                    <div class="flip-card-inner" id="dayFlip">
                        <div class="flip-card-front" id="dayFront">12</div>
                        <div class="flip-card-back" id="dayBack">12</div>
                    </div>
                    <span class="flip-label">Day</span>
                </div>

                <div class="flip-card">
                    <div class="flip-card-inner" id="monthFlip">
                        <div class="flip-card-front" id="monthFront">Jan</div>
                        <div class="flip-card-back" id="monthBack">Jan</div>
                    </div>
                    <span class="flip-label">Month</span>
                </div>

                <div class="flip-card">
                    <div class="flip-card-inner" id="yearFlip">
                        <div class="flip-card-front" id="yearFront">2024</div>
                        <div class="flip-card-back" id="yearBack">2024</div>
                    </div>
                    <span class="flip-label">Year</span>
                </div>
            </div>

            <div class="date-controls">
                <div class="control-group">
                    <button class="control-btn" data-target="day" data-dir="-1">◀</button>
                    <span class="control-label">Day</span>
                    <button class="control-btn" data-target="day" data-dir="1">▶</button>
                </div>
                <div class="control-group">
                    <button class="control-btn" data-target="month" data-dir="-1">◀</button>
                    <span class="control-label">Month</span>
                    <button class="control-btn" data-target="month" data-dir="1">▶</button>
                </div>
                <div class="control-group">
                    <button class="control-btn" data-target="year" data-dir="-1">◀</button>
                    <span class="control-label">Year</span>
                    <button class="control-btn" data-target="year" data-dir="1">▶</button>
                </div>
            </div>

            <div class="date-actions">
                <button id="todayBtn">📅 Today</button>
                <button id="randomBtn">🎲 Random</button>
                <button id="resetBtn">↺ Reset</button>
            </div>

            <div class="date-stats">
                <span id="selectedDate">Selected: January 1, 2024</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const dayFront = document.getElementById('dayFront');
        const dayBack = document.getElementById('dayBack');
        const dayFlip = document.getElementById('dayFlip');
        const monthFront = document.getElementById('monthFront');
        const monthBack = document.getElementById('monthBack');
        const monthFlip = document.getElementById('monthFlip');
        const yearFront = document.getElementById('yearFront');
        const yearBack = document.getElementById('yearBack');
        const yearFlip = document.getElementById('yearFlip');
        const selectedDate = document.getElementById('selectedDate');
        const fpsDisplay = document.getElementById('fpsDisplay');
        const todayBtn = document.getElementById('todayBtn');
        const randomBtn = document.getElementById('randomBtn');
        const resetBtn = document.getElementById('resetBtn');

        // ===== STATE =====
        let currentDate = new Date();
        let displayDate = new Date(currentDate);
        let isFlipping = { day: false, month: false, year: false };
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let flipQueue = [];

        // ===== MONTHS =====
        const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
        const monthsFull = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

        // ===== FLIP ANIMATION =====
        function flipNumber(element, newValue, type) {
            if (isFlipping[type]) {
                flipQueue.push({ element, newValue, type });
                return;
            }

            const front = element.querySelector('.flip-card-front');
            const back = element.querySelector('.flip-card-back');
            const inner = element.querySelector('.flip-card-inner');

            if (front.textContent === newValue) return;

            isFlipping[type] = true;

            // Set back to new value
            back.textContent = newValue;

            // Start flip animation
            inner.style.transform = 'rotateX(-180deg)';

            // After half flip, update front
            setTimeout(() => {
                front.textContent = newValue;
            }, 150);

            // Reset after full flip
            setTimeout(() => {
                inner.style.transform = 'rotateX(0deg)';
                isFlipping[type] = false;

                // Process queue
                if (flipQueue.length > 0) {
                    const next = flipQueue.shift();
                    flipNumber(next.element, next.newValue, next.type);
                }
            }, 300);
        }

        // ===== UPDATE DISPLAY =====
        function updateDisplay(animate = true) {
            const day = displayDate.getDate().toString().padStart(2, '0');
            const month = months[displayDate.getMonth()];
            const year = displayDate.getFullYear().toString();

            if (animate) {
                flipNumber(dayFlip, day, 'day');
                flipNumber(monthFlip, month, 'month');
                flipNumber(yearFlip, year, 'year');
            } else {
                dayFront.textContent = day;
                dayBack.textContent = day;
                monthFront.textContent = month;
                monthBack.textContent = month;
                yearFront.textContent = year;
                yearBack.textContent = year;
            }

            updateSelectedDate();
        }

        // ===== UPDATE SELECTED DATE =====
        function updateSelectedDate() {
            const d = displayDate;
            selectedDate.textContent = `Selected: ${monthsFull[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
        }

        // ===== CHANGE DATE =====
        function changeDate(part, delta) {
            const newDate = new Date(displayDate);

            switch(part) {
                case 'day':
                    newDate.setDate(newDate.getDate() + delta);
                    break;
                case 'month':
                    newDate.setMonth(newDate.getMonth() + delta);
                    break;
                case 'year':
                    newDate.setFullYear(newDate.getFullYear() + delta);
                    break;
            }

            // Validate date
            if (newDate.getFullYear() < 1900 || newDate.getFullYear() > 2100) return;

            displayDate = newDate;
            updateDisplay(true);
        }

        // ===== SET DATE =====
        function setDate(year, month, day) {
            const newDate = new Date(year, month, day);
            if (isNaN(newDate.getTime())) return;
            if (newDate.getFullYear() < 1900 || newDate.getFullYear() > 2100) return;
            
            displayDate = newDate;
            updateDisplay(true);
        }

        // ===== SET TODAY =====
        function setToday() {
            displayDate = new Date();
            updateDisplay(true);
        }

        // ===== RANDOM DATE =====
        function setRandom() {
            const year = 1900 + Math.floor(Math.random() * 201);
            const month = Math.floor(Math.random() * 12);
            const day = 1 + Math.floor(Math.random() * 28);
            setDate(year, month, day);
        }

        // ===== RESET =====
        function resetDate() {
            displayDate = new Date(currentDate);
            updateDisplay(true);
        }

        // ===== EVENT LISTENERS =====
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.target;
                const dir = parseInt(btn.dataset.dir);
                changeDate(target, dir);
            });
        });

        todayBtn.addEventListener('click', setToday);
        randomBtn.addEventListener('click', setRandom);
        resetBtn.addEventListener('click', resetDate);

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                if (e.shiftKey) changeDate('year', -1);
                else if (e.ctrlKey) changeDate('month', -1);
                else changeDate('day', -1);
                e.preventDefault();
            }
            if (e.key === 'ArrowRight') {
                if (e.shiftKey) changeDate('year', 1);
                else if (e.ctrlKey) changeDate('month', 1);
                else changeDate('day', 1);
                e.preventDefault();
            }
            if (e.key === 't' || e.key === 'T') {
                setToday();
                e.preventDefault();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetDate();
                e.preventDefault();
            }
            if (e.key === ' ') {
                e.preventDefault();
                setRandom();
            }
        });

        // ===== ANIMATION LOOP =====
        function animate(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            time += 0.01;

            requestAnimationFrame(animate);
        }

        // ===== INIT =====
        updateDisplay(false);
        lastFpsUpdate = performance.now();
        animate(lastFpsUpdate);

        console.log('📅 Date Picker with Flip loaded!');
        console.log('💡 ← → to change day');
        console.log('💡 Ctrl+← → to change month');
        console.log('💡 Shift+← → to change year');
        console.log('💡 T - Today');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Random date');
    </script>
</body>
</html>
