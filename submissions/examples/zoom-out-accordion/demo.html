<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Zoom-Out Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="cyber-bg">
    <div class="accordion-container">
        <input type="radio" name="accordion" id="acc1" checked>
        <label for="acc1"><span>[01]</span> System Override</label>
        <div class="zoom-content">
            <div class="content-inner">
                <p>Neural link stability: 98%. Ready for data injection.</p>
            </div>
        </div>

        <input type="radio" name="accordion" id="acc2">
        <label for="acc2"><span>[02]</span> Neon Protocol</label>
        <div class="zoom-content">
            <div class="content-inner">
                <p>All sectors glowing in vibrant hues. Connection established.</p>
            </div>
        </div>

        <input type="radio" name="accordion" id="acc3">
        <label for="acc3"><span>[03]</span> Data Core</label>
        <div class="zoom-content">
            <div class="content-inner">
                <p>Accessing encrypted servers... decryption in progress.</p>
            </div>
        </div>
    </div>
</body>
</html>
