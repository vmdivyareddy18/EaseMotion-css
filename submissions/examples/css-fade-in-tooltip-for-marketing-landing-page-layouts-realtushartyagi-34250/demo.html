<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-In Tooltip (Marketing Landing Page)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #fffaf0; /* Warm, inviting background */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    
    .hero {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    
    .hero-title {
      color: #1f2937;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 3rem;
      font-weight: 800;
      line-height: 1.1;
    }
    
    .hero-subtitle {
      color: #4b5563;
      margin-bottom: 48px;
      font-size: 1.125rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1 class="hero-title">Supercharge Your Growth</h1>
    <p class="hero-subtitle">Discover the only tool you need to scale your business effortlessly.</p>
    
    <!-- Tooltip Wrapper -->
    <div class="ease-mk-tooltip-wrapper">
      <button class="ease-mk-cta" aria-describedby="marketing-tooltip">
        Start Free Trial
      </button>
      
      <!-- Tooltip Content -->
      <div id="marketing-tooltip" class="ease-mk-tooltip-content" role="tooltip">
        ✨ No credit card required
      </div>
    </div>
    
  </div>
</body>
</html>
