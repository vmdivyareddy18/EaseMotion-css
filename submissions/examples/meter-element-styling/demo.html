<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meter Element Styling Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Meter Element Styling</h1>
    <p>Custom <code>meter</code> vs <code>progress</code> element styling</p>
  </header>
  <main class="meter-grid">
    <section class="meter-card">
      <h2>Custom Meter — Disk Usage</h2>
      <div class="metric"><label>System Volume</label> <meter min="0" max="100" low="30" high="70" optimum="20" value="85">85%</meter></div>
      <div class="metric"><label>Documents</label> <meter min="0" max="100" low="30" high="70" optimum="20" value="42">42%</meter></div>
      <div class="metric"><label>Downloads</label> <meter min="0" max="100" low="30" high="70" optimum="20" value="18">18%</meter></div>
    </section>
    <section class="meter-card">
      <h2>Progress Element</h2>
      <div class="metric"><label>Download File A</label> <progress value="33" max="100">33%</progress></div>
      <div class="metric"><label>Upload File B</label> <progress value="71" max="100">71%</progress></div>
      <div class="metric"><label>Processing C</label> <progress value="100" max="100">Complete</progress></div>
    </section>
    <section class="meter-card wide">
      <h2>Memory Metrics (Custom Meter)</h2>
      <div class="metric"><label>RAM Usage <span class="val">7.2 GB / 16 GB</span></label> <meter min="0" max="16" low="4" high="12" optimum="2" value="7.2">7.2 GB</meter></div>
      <div class="metric"><label>Cache <span class="val">1.8 GB</span></label> <meter min="0" max="8" low="2" high="6" optimum="1" value="1.8">1.8 GB</meter></div>
      <div class="metric"><label>Swap <span class="val">0.4 GB</span></label> <meter min="0" max="4" low="1" high="2" optimum="0.5" value="0.4">0.4 GB</meter></div>
    </section>
  </main>
  <footer><p>Meter elements styled with appearance:none and custom colors.</p></footer>
</body>
</html>
