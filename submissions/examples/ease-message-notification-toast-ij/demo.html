<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Notification Toast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="mnt-demo">
    <h1>Toast Notifications</h1>
    <p class="mnt-subtitle">Click buttons to trigger toasts with a queue system</p>

    <div class="mnt-controls">
      <button class="mnt-btn mnt-btn--success" onclick="showToast('success', 'Operation completed successfully!')">Success</button>
      <button class="mnt-btn mnt-btn--error" onclick="showToast('error', 'Something went wrong. Please try again.')">Error</button>
      <button class="mnt-btn mnt-btn--info" onclick="showToast('info', 'Your profile was updated.')">Info</button>
      <button class="mnt-btn mnt-btn--warning" onclick="showToast('warning', 'Your session will expire soon.')">Warning</button>
      <button class="mnt-btn mnt-btn--queue" onclick="queueDemo()">Queue Demo</button>
    </div>
  </main>

  <div class="mnt-container" id="mntContainer"></div>

  <script>
    const toastQueue = [];
    let isProcessing = false;

    function showToast(type, message) {
      toastQueue.push({ type, message });
      processQueue();
    }

    function processQueue() {
      if (isProcessing || toastQueue.length === 0) return;
      isProcessing = true;
      const { type, message } = toastQueue.shift();
      renderToast(type, message);
    }

    function renderToast(type, message) {
      const container = document.getElementById('mntContainer');
      const toast = document.createElement('div');
      toast.className = `mnt-toast mnt-toast--${type}`;

      const icons = { success: '✓', error: '✕', info: 'ℹ', warning: '⚠' };

      toast.innerHTML = `
        <span class="mnt-icon">${icons[type] || 'ℹ'}</span>
        <span class="mnt-message">${message}</span>
        <button class="mnt-close" onclick="dismissToast(this.parentElement)">×</button>
      `;

      container.appendChild(toast);
      requestAnimationFrame(() => toast.classList.add('mnt-toast--visible'));

      const autoDismiss = setTimeout(() => dismissToast(toast), 3500);
      toast.dataset.timer = autoDismiss;
    }

    function dismissToast(toast) {
      clearTimeout(toast.dataset.timer);
      toast.classList.remove('mnt-toast--visible');
      toast.classList.add('mnt-toast--hiding');
      setTimeout(() => {
        if (toast.parentElement) toast.remove();
        isProcessing = false;
        processQueue();
      }, 300);
    }

    function queueDemo() {
      showToast('info', 'Toast #1 — queue starting');
      setTimeout(() => showToast('success', 'Toast #2 — processing'), 200);
      setTimeout(() => showToast('warning', 'Toast #3 — almost done'), 400);
      setTimeout(() => showToast('error', 'Toast #4 — queue complete'), 600);
    }
  </script>
</body>
</html>
