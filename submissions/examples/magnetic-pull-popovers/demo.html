<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Pull Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">
    <h1>Magnetic Pull Popover</h1>

    <div class="magnetic-popover">
      <button class="magnetic-trigger">
        Hover Me
      </button>

      <div class="popover-content">
        <h2>Creative Content</h2>
        <p>
          A CSS-only magnetic pull popover animation
          designed for accessible web layouts.
        </p>
      </div>
    </div>
  </main>

</body>
</html>
