<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Modern SaaS

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

A modern tooltip interaction
crafted for SaaS products,
feature showcases and
landing page experiences.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Explore Platform

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="tag">

Premium

</span>

<h3>

AI Workspace

</h3>

<p>

CSS-only rotate animation
built for SaaS dashboards,
automation tools and
feature discovery sections.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
