<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radial Particle Burst</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Radial Particle Burst Animation</h1>

    <div class="card">
      <button class="copy-btn" onclick="copyClass(this)">Copy</button>

      <div id="preview-box" class="preview-box" onclick="triggerAnimation()">
        Preview

        <div class="particle p1"></div>
        <div class="particle p2"></div>
        <div class="particle p3"></div>
        <div class="particle p4"></div>
        <div class="particle p5"></div>
        <div class="particle p6"></div>
        <div class="particle p7"></div>
        <div class="particle p8"></div>

        <div class="burst-core"></div>
      </div>

      <p class="class-name">ease-radial-particle</p>
    </div>
  </div>

  <script>
    function triggerAnimation() {
      const box = document.getElementById("preview-box");
      box.classList.remove("animate");
      void box.offsetWidth;
      box.classList.add("animate");
    }

    function copyClass(button) {
      navigator.clipboard.writeText("ease-radial-particle");
      button.textContent = "Copied!";
      setTimeout(() => {
        button.textContent = "Copy";
      }, 2000);
    }
  </script>
</body>
</html>
