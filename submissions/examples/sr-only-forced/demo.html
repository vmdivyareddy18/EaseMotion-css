<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SR Only Forced Colors Fix Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Screen Reader Only - High Contrast Mode Fix</h2>

  <button>
    <span class="ease-sr-only">Submit Form</span>
    <span aria-hidden="true">✓</span>
  </button>

  <p>The button above has a visually hidden label "Submit Form" for screen readers.
  In Windows High Contrast Mode, it remains hidden visually but accessible to assistive technologies.</p>

</body>
</html>
