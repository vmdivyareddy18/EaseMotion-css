<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Smooth Rotating Circular SVG Path Loader</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-loader-container">
  <svg class="ease-svg-loader" viewBox="0 0 50 50">
    <circle class="loader-path" cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle>
  </svg>
</div>
</body>
</html>
