<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Switcher Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Language Switcher</h1>
        <p class="subtitle">Dropdown with flag animations</p>

        <!-- LANGUAGE SWITCHER COMPONENT -->
        <div class="lang-container">
            <div class="lang-wrapper">
                <!-- Language Switcher -->
                <div class="lang-switcher" id="langSwitcher">
                    <button class="lang-trigger" id="langTrigger" aria-haspopup="listbox" aria-expanded="false">
                        <span class="lang-current">
                            <span class="lang-flag" id="currentFlag">🇺🇸</span>
                            <span class="lang-name" id="currentName">English</span>
                        </span>
                        <span class="lang-arrow">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>

                    <div class="lang-dropdown" id="langDropdown" role="listbox">
                        <button class="lang-option active" data-lang="en" role="option" aria-selected="true">
                            <span class="lang-flag">🇺🇸</span>
                            <span class="lang-name">English</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="es" role="option" aria-selected="false">
                            <span class="lang-flag">🇪🇸</span>
                            <span class="lang-name">Español</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="fr" role="option" aria-selected="false">
                            <span class="lang-flag">🇫🇷</span>
                            <span class="lang-name">Français</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="de" role="option" aria-selected="false">
                            <span class="lang-flag">🇩🇪</span>
                            <span class="lang-name">Deutsch</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="it" role="option" aria-selected="false">
                            <span class="lang-flag">🇮🇹</span>
                            <span class="lang-name">Italiano</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="pt" role="option" aria-selected="false">
                            <span class="lang-flag">🇵🇹</span>
                            <span class="lang-name">Português</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="ja" role="option" aria-selected="false">
                            <span class="lang-flag">🇯🇵</span>
                            <span class="lang-name">日本語</span>
                            <span class="lang-check">✓</span>
                        </button>
                        <button class="lang-option" data-lang="zh" role="option" aria-selected="false">
                            <span class="lang-flag">🇨🇳</span>
                            <span class="lang-name">中文</span>
                            <span class="lang-check">✓</span>
                        </button>
                    </div>
                </div>

                <!-- Content Preview -->
                <div class="lang-content" id="langContent">
                    <div class="content-wrapper">
                        <div class="content-icon">🌍</div>
                        <h2 class="content-title" id="contentTitle">Welcome</h2>
                        <p class="content-text" id="contentText">Select a language from the dropdown above to see the content change with a smooth animation.</p>
                        <div class="content-features">
                            <div class="feature">
                                <span class="feature-icon">✅</span>
                                <span class="feature-text" id="feature1">Flag animations</span>
                            </div>
                            <div class="feature">
                                <span class="feature-icon">🔄</span>
                                <span class="feature-text" id="feature2">Smooth transitions</span>
                            </div>
                            <div class="feature">
                                <span class="feature-icon">🌐</span>
                                <span class="feature-text" id="feature3">8 languages supported</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="lang-controls">
                    <button class="lang-ctrl-btn" id="toggleDropdownBtn">⏸ Toggle Dropdown</button>
                    <button class="lang-ctrl-btn" id="resetLangBtn">⟳ Reset</button>
                    <button class="lang-ctrl-btn" id="toggleAnimationBtn">⏸ Toggle Animation</button>
                </div>

                <div class="lang-status">
                    <span class="status-label">Language:</span>
                    <span class="status-value" id="langStatus">English</span>
                    <span class="status-label">Code:</span>
                    <span class="status-value" id="codeStatus">en</span>
                    <span class="status-label">Flag:</span>
                    <span class="status-value" id="flagStatus">🇺🇸</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-switcher small">
                        <button class="lang-trigger">
                            <span class="lang-current">
                                <span class="lang-flag">🇺🇸</span>
                            </span>
                            <span class="lang-arrow">
                                <svg viewBox="0 0 24 24" width="16" height="16">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="variant-label">Small</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-switcher">
                        <button class="lang-trigger">
                            <span class="lang-current">
                                <span class="lang-flag">🇺🇸</span>
                                <span class="lang-name">English</span>
                            </span>
                            <span class="lang-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-switcher rounded">
                        <button class="lang-trigger">
                            <span class="lang-current">
                                <span class="lang-flag">🇺🇸</span>
                                <span class="lang-name">English</span>
                            </span>
                            <span class="lang-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="variant-label">Rounded</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-switcher dark">
                        <button class="lang-trigger">
                            <span class="lang-current">
                                <span class="lang-flag">🇺🇸</span>
                                <span class="lang-name">English</span>
                            </span>
                            <span class="lang-arrow">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M7 10l5 5 5-5z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                    <span class="variant-label">Dark</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const switcher = document.getElementById('langSwitcher');
            const trigger = document.getElementById('langTrigger');
            const dropdown = document.getElementById('langDropdown');
            const options = document.querySelectorAll('.lang-option');
            const currentFlag = document.getElementById('currentFlag');
            const currentName = document.getElementById('currentName');
            const langStatus = document.getElementById('langStatus');
            const codeStatus = document.getElementById('codeStatus');
            const flagStatus = document.getElementById('flagStatus');
            const contentTitle = document.getElementById('contentTitle');
            const contentText = document.getElementById('contentText');
            const feature1 = document.getElementById('feature1');
            const feature2 = document.getElementById('feature2');
            const feature3 = document.getElementById('feature3');
            const toggleDropdownBtn = document.getElementById('toggleDropdownBtn');
            const resetLangBtn = document.getElementById('resetLangBtn');
            const toggleAnimationBtn = document.getElementById('toggleAnimationBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                languages: {
                    en: { flag: '🇺🇸', name: 'English', native: 'English', code: 'en' },
                    es: { flag: '🇪🇸', name: 'Español', native: 'Español', code: 'es' },
                    fr: { flag: '🇫🇷', name: 'Français', native: 'Français', code: 'fr' },
                    de: { flag: '🇩🇪', name: 'Deutsch', native: 'Deutsch', code: 'de' },
                    it: { flag: '🇮🇹', name: 'Italiano', native: 'Italiano', code: 'it' },
                    pt: { flag: '🇵🇹', name: 'Português', native: 'Português', code: 'pt' },
                    ja: { flag: '🇯🇵', name: '日本語', native: '日本語', code: 'ja' },
                    zh: { flag: '🇨🇳', name: '中文', native: '中文', code: 'zh' }
                },
                content: {
                    en: {
                        title: 'Welcome',
                        text: 'Select a language from the dropdown above to see the content change with a smooth animation.',
                        features: ['Flag animations', 'Smooth transitions', '8 languages supported']
                    },
                    es: {
                        title: 'Bienvenido',
                        text: 'Selecciona un idioma del menú desplegable para ver el contenido cambiar con una animación suave.',
                        features: ['Animaciones de banderas', 'Transiciones suaves', '8 idiomas soportados']
                    },
                    fr: {
                        title: 'Bienvenue',
                        text: 'Sélectionnez une langue dans le menu déroulant pour voir le contenu changer avec une animation fluide.',
                        features: ['Animations de drapeaux', 'Transitions fluides', '8 langues supportées']
                    },
                    de: {
                        title: 'Willkommen',
                        text: 'Wählen Sie eine Sprache aus dem Dropdown-Menü, um den Inhalt mit einer sanften Animation zu ändern.',
                        features: ['Flaggen-Animationen', 'Sanfte Übergänge', '8 Sprachen unterstützt']
                    },
                    it: {
                        title: 'Benvenuto',
                        text: 'Seleziona una lingua dal menu a tendina per vedere il contenuto cambiare con un\'animazione fluida.',
                        features: ['Animazioni di bandiere', 'Transizioni fluide', '8 lingue supportate']
                    },
                    pt: {
                        title: 'Bem-vindo',
                        text: 'Selecione um idioma no menu suspenso para ver o conteúdo mudar com uma animação suave.',
                        features: ['Animações de bandeiras', 'Transições suaves', '8 idiomas suportados']
                    },
                    ja: {
                        title: 'ようこそ',
                        text: 'ドロップダウンから言語を選択すると、コンテンツがスムーズなアニメーションで変化します。',
                        features: ['国旗アニメーション', 'スムーズなトランジション', '8言語サポート']
                    },
                    zh: {
                        title: '欢迎',
                        text: '从下拉菜单中选择语言，查看内容以平滑动画变化。',
                        features: ['旗帜动画', '平滑过渡', '支持8种语言']
                    }
                },
                defaultLang: 'en',
                animationDuration: 300,
                onSwitch: function(lang, data) {
                    console.log(`🌐 Switched to: ${data.name} (${lang})`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentLang = CONFIG.defaultLang;
            let isOpen = false;
            let isDropdownEnabled = true;
            let isAnimationEnabled = true;
            let isAnimating = false;

            // ============================================
            // LANGUAGE FUNCTIONS
            // ============================================
            function switchLanguage(lang) {
                if (lang === currentLang || isAnimating) return;
                
                const data = CONFIG.languages[lang];
                if (!data) return;

                isAnimating = true;
                currentLang = lang;

                // Update trigger
                currentFlag.textContent = data.flag;
                currentName.textContent = data.name;

                // Update options
                options.forEach(opt => {
                    const isActive = opt.dataset.lang === lang;
                    opt.classList.toggle('active', isActive);
                    opt.setAttribute('aria-selected', isActive);
                });

                // Update content with animation
                const content = CONFIG.content[lang];
                if (content && isAnimationEnabled) {
                    // Animate content out
                    const contentWrapper = document.querySelector('.content-wrapper');
                    contentWrapper.style.opacity = '0';
                    contentWrapper.style.transform = 'translateY(10px)';
                    
                    setTimeout(() => {
                        // Update content
                        contentTitle.textContent = content.title;
                        contentText.textContent = content.text;
                        if (feature1) feature1.textContent = content.features[0];
                        if (feature2) feature2.textContent = content.features[1];
                        if (feature3) feature3.textContent = content.features[2];
                        
                        // Animate content in
                        contentWrapper.style.opacity = '1';
                        contentWrapper.style.transform = 'translateY(0)';
                    }, 200);
                } else if (content) {
                    // Update without animation
                    contentTitle.textContent = content.title;
                    contentText.textContent = content.text;
                    if (feature1) feature1.textContent = content.features[0];
                    if (feature2) feature2.textContent = content.features[1];
                    if (feature3) feature3.textContent = content.features[2];
                }

                // Update status
                langStatus.textContent = data.name;
                codeStatus.textContent = data.code;
                flagStatus.textContent = data.flag;

                // Close dropdown
                closeDropdown();

                // Trigger callback
                CONFIG.onSwitch(lang, data);

                setTimeout(() => {
                    isAnimating = false;
                }, CONFIG.animationDuration + 200);
            }

            // ============================================
            // DROPDOWN FUNCTIONS
            // ============================================
            function openDropdown() {
                if (!isDropdownEnabled || isOpen) return;
                isOpen = true;
                dropdown.classList.add('open');
                trigger.setAttribute('aria-expanded', 'true');
                
                // Animate options
                const items = dropdown.querySelectorAll('.lang-option');
                items.forEach((item, index) => {
                    item.style.opacity = '0';
                    item.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        item.style.opacity = '1';
                        item.style.transform = 'translateY(0)';
                    }, 50 + index * 40);
                });
            }

            function closeDropdown() {
                if (!isOpen) return;
                isOpen = false;
                dropdown.classList.remove('open');
                trigger.setAttribute('aria-expanded', 'false');
                
                // Reset option styles
                dropdown.querySelectorAll('.lang-option').forEach(item => {
                    item.style.opacity = '';
                    item.style.transform = '';
                });
            }

            function toggleDropdown() {
                if (isOpen) {
                    closeDropdown();
                } else {
                    openDropdown();
                }
            }

            // ============================================
            // CONTROLS
            // ============================================
            function toggleDropdownEnable() {
                isDropdownEnabled = !isDropdownEnabled;
                toggleDropdownBtn.textContent = isDropdownEnabled ? '⏸ Toggle Dropdown' : '▶ Toggle Dropdown';
                if (!isDropdownEnabled) {
                    closeDropdown();
                    trigger.style.opacity = '0.5';
                    trigger.style.cursor = 'not-allowed';
                } else {
                    trigger.style.opacity = '1';
                    trigger.style.cursor = 'pointer';
                }
            }

            function resetLanguage() {
                switchLanguage(CONFIG.defaultLang);
            }

            function toggleAnimation() {
                isAnimationEnabled = !isAnimationEnabled;
                toggleAnimationBtn.textContent = isAnimationEnabled ? '⏸ Toggle Animation' : '▶ Toggle Animation';
                const contentWrapper = document.querySelector('.content-wrapper');
                if (!isAnimationEnabled) {
                    contentWrapper.style.transition = 'none';
                } else {
                    contentWrapper.style.transition = '';
                }
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            // Trigger click
            trigger.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                if (isDropdownEnabled) {
                    toggleDropdown();
                }
            });

            // Option clicks
            options.forEach(opt => {
                opt.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const lang = this.dataset.lang;
                    if (lang !== currentLang) {
                        switchLanguage(lang);
                    } else {
                        closeDropdown();
                    }
                });
            });

            // Click outside to close
            document.addEventListener('click', function(e) {
                if (isOpen && !switcher.contains(e.target)) {
                    closeDropdown();
                }
            });

            // Keyboard navigation
            trigger.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleDropdown();
                }
                if (e.key === 'Escape' && isOpen) {
                    closeDropdown();
                    trigger.focus();
                }
            });

            // Keyboard navigation for options
            dropdown.addEventListener('keydown', function(e) {
                const items = Array.from(this.querySelectorAll('.lang-option'));
                const currentIndex = items.indexOf(document.activeElement);

                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') {
                    e.preventDefault();
                    const nextIndex = (currentIndex + 1) % items.length;
                    items[nextIndex].focus();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
                    e.preventDefault();
                    const prevIndex = currentIndex <= 0 ? items.length - 1 : currentIndex - 1;
                    items[prevIndex].focus();
                } else if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const focused = document.activeElement;
                    if (focused && focused.classList.contains('lang-option')) {
                        const lang = focused.dataset.lang;
                        if (lang !== currentLang) {
                            switchLanguage(lang);
                        } else {
                            closeDropdown();
                        }
                    }
                } else if (e.key === 'Escape') {
                    closeDropdown();
                    trigger.focus();
                }
            });

            // Controls
            toggleDropdownBtn.addEventListener('click', toggleDropdownEnable);
            resetLangBtn.addEventListener('click', resetLanguage);
            toggleAnimationBtn.addEventListener('click', toggleAnimation);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+L to toggle dropdown
                if (e.key === 'L' && e.ctrlKey && e.shiftKey) {
                    e.preventDefault();
                    toggleDropdown();
                }
                // Alt+1-8 to switch languages
                const langKeys = ['1', '2', '3', '4', '5', '6', '7', '8'];
                const langCodes = ['en', 'es', 'fr', 'de', 'it', 'pt', 'ja', 'zh'];
                if (e.altKey && langKeys.includes(e.key)) {
                    e.preventDefault();
                    const index = langKeys.indexOf(e.key);
                    const lang = langCodes[index];
                    if (CONFIG.languages[lang]) {
                        switchLanguage(lang);
                    }
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const trigger = card.querySelector('.lang-trigger');
                const isDark = card.querySelector('.variant-switcher.dark');
                
                trigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // Toggle active state for demo
                    const dropdown = this.closest('.variant-switcher').querySelector('.lang-dropdown');
                    if (dropdown) {
                        dropdown.classList.toggle('open');
                    }
                    
                    // Visual feedback
                    this.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        this.style.transform = '';
                    }, 200);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.LanguageSwitcher = {
                switchTo: switchLanguage,
                getCurrent: () => ({
                    lang: currentLang,
                    data: CONFIG.languages[currentLang]
                }),
                open: openDropdown,
                close: closeDropdown,
                toggle: toggleDropdown,
                toggleDropdown: toggleDropdownEnable,
                toggleAnimation: toggleAnimation,
                reset: resetLanguage,
                getAvailable: () => Object.keys(CONFIG.languages),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial language
            const initialData = CONFIG.languages[CONFIG.defaultLang];
            currentFlag.textContent = initialData.flag;
            currentName.textContent = initialData.name;
            langStatus.textContent = initialData.name;
            codeStatus.textContent = initialData.code;
            flagStatus.textContent = initialData.flag;

            // Set initial content
            const initialContent = CONFIG.content[CONFIG.defaultLang];
            if (initialContent) {
                contentTitle.textContent = initialContent.title;
                contentText.textContent = initialContent.text;
                if (feature1) feature1.textContent = initialContent.features[0];
                if (feature2) feature2.textContent = initialContent.features[1];
                if (feature3) feature3.textContent = initialContent.features[2];
            }

            console.log('✅ Language Switcher initialized!');
            console.log('📖 API: window.LanguageSwitcher');
            console.log('📖 Usage:');
            console.log('  - Click the trigger to open/close the dropdown');
            console.log('  - Use arrow keys to navigate options');
            console.log('  - Keyboard shortcuts: Ctrl+Shift+L (toggle), Alt+1-8 (switch languages)');
            console.log('  - Variants show different styles');

        })();
    </script>
</body>
</html>
