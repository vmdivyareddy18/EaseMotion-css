<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Newsletter Popup Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="ease-container">
        <h1 class="ease-slide-up">💡 Neon Newsletter Popup</h1>
        <p class="ease-slide-up ease-delay-100">
            Click the button to see the popup with a neon glow effect
        </p>

        <!-- Trigger Button -->
        <button class="ease-trigger-btn ease-btn ease-btn-primary ease-btn-pill" id="showPopup">
            Subscribe Now
        </button>
    </div>

    <!-- ============================================
    NEON NEWSLETTER POPUP
    ============================================ -->
    <div class="ease-popup-overlay" id="popupOverlay">
        <div class="ease-popup ease-popup-visible">
            <!-- Close Button -->
            <button class="ease-popup-close" id="closePopup">×</button>

            <!-- Popup Content -->
            <div class="ease-popup-content">
                <div class="ease-popup-icon">💡</div>
                <h2 class="ease-popup-title">Stay in the Loop</h2>
                <p class="ease-popup-desc">
                    Get the latest updates, tips, and exclusive content delivered straight to your inbox.
                </p>

                <!-- Neon Form -->
                <form class="ease-popup-form" id="newsletterForm">
                    <input
                        type="email"
                        class="ease-popup-input"
                        placeholder="Enter your email"
                        required
                    />
                    <button type="submit" class="ease-popup-submit">
                        Subscribe
                    </button>
                </form>

                <p class="ease-popup-note">
                    No spam, unsubscribe anytime.
                </p>
            </div>
        </div>
    </div>

    <script>
        const showBtn = document.getElementById('showPopup');
        const overlay = document.getElementById('popupOverlay');
        const closeBtn = document.getElementById('closePopup');
        const form = document.getElementById('newsletterForm');

        // Show popup with animation
        function showPopup() {
            overlay.style.display = 'flex';
            // Trigger reflow for animation
            void overlay.offsetWidth;
            const popup = overlay.querySelector('.ease-popup');
            popup.classList.remove('ease-popup-hidden');
            popup.classList.add('ease-popup-visible');
        }

        // Hide popup with animation
        function hidePopup() {
            const popup = overlay.querySelector('.ease-popup');
            popup.classList.remove('ease-popup-visible');
            popup.classList.add('ease-popup-hidden');
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 300);
        }

        // Event Listeners
        showBtn.addEventListener('click', showPopup);
        closeBtn.addEventListener('click', hidePopup);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) hidePopup();
        });

        // Form submission
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('🎉 Thank you for subscribing!');
            hidePopup();
            form.reset();
        });

        // Keyboard support (Escape to close)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && overlay.style.display === 'flex') {
                hidePopup();
            }
        });
    </script>
</body>
</html>
