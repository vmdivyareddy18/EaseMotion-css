<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Weather Widget</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="weather-card">
  <div class="weather-icon sun">
    <div class="sun-core"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
    <div class="sun-ray"></div>
  </div>

  <p class="weather-temp">24<span>°C</span></p>
  <p class="weather-condition">Sunny</p>
  <p class="weather-location">Chennai, IN</p>

  <div class="weather-details">
    <div class="weather-detail">
      <span class="detail-label">Humidity</span>
      <span class="detail-value">58%</span>
    </div>
    <div class="weather-detail">
      <span class="detail-label">Wind</span>
      <span class="detail-value">12 km/h</span>
    </div>
  </div>
</div>

</body>
</html>
