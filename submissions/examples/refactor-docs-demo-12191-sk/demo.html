<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refactored Docs Demo — Submission</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Minimal styles for demo purposes, representing what's in docs/docs.css */
    body { background: #0f0e17; color: #fffffe; font-family: system-ui; margin: 0; }
    .ease-container { max-width: 1200px; margin: 0 auto; padding: 0 1rem; }
    .demo-section { padding: 4rem 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .demo-nav { background: rgba(15, 14, 23, 0.9); border-bottom: 1px solid rgba(255,255,255,0.07); padding: 1rem 0; }
    .demo-chip { display: inline-block; padding: 0.2rem 0.6rem; background: rgba(255,255,255,0.05); border-radius: 4px; font-size: 0.8rem; margin-bottom: 1rem; }
    .tag { display: inline-block; padding: 0.2rem 0.4rem; background: #eee; color: #333; border-radius: 4px; font-size: 0.8rem; margin-top: 0.5rem; }
    .ease-flex { display: flex; }
    .ease-flex-wrap { flex-wrap: wrap; }
    .ease-gap-3 { gap: 1rem; }
    .ease-gap-6 { gap: 2rem; }
    .ease-btn { padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid transparent; cursor: pointer; }
    .ease-btn-primary { background: #6c63ff; color: white; }
    .ease-btn-outline { background: transparent; border-color: #6c63ff; color: #6c63ff; }
    .ease-card { background: rgba(255,255,255,0.04); border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); }
    :root { --ease-space-8: 2rem; --ease-space-10: 3rem; --ease-color-primary-light: #a78bfa; }
  </style>
</head>
<body>

  <!-- Refactored Navigation -->
  <nav class="demo-nav demo-pl-10">
    <div class="ease-container">
      <a href="#" class="demo-logo-link">
        <div class="demo-logo-img" style="background: #6c63ff; width: 36px; border-radius: 4px;"></div>
        <span style="margin-left: 10px;">EaseMotion</span>
      </a>
    </div>
  </nav>

  <main class="ease-container">

    <!-- Refactored Buttons Section -->
    <section id="buttons" class="demo-section demo-pl-10">
      <h2>Buttons (Refactored)</h2>
      
      <div class="demo-chip">// Variants</div>
      <div class="ease-flex ease-flex-wrap ease-gap-3 demo-mb-8">
        <button class="ease-btn ease-btn-primary">Primary</button>
        <button class="ease-btn ease-btn-ghost demo-color-ghost">Ghost</button>
      </div>

      <div class="demo-chip">// Custom Border State</div>
      <div class="ease-flex ease-flex-wrap ease-gap-3">
        <button class="ease-btn ease-btn-outline demo-btn-custom-border">Loading</button>
      </div>
    </section>

    <!-- Refactored Cards Section -->
    <section id="cards" class="demo-section demo-pl-10">
      <h2>Cards (Refactored)</h2>
      
      <div class="ease-flex ease-flex-wrap ease-gap-6 demo-mb-10">
        <article class="ease-card demo-card-p-10">
          <h3>Stat Card</h3>
          <p>Padding moved to class.</p>
        </article>
        <article class="ease-card demo-card-p-10">
          <h3>Stat Card</h3>
          <p>Padding moved to class.</p>
        </article>
      </div>
    </section>

    <!-- Refactored Stagger -->
    <section id="layout" class="demo-section demo-pl-10">
      <h2>Layout (Refactored)</h2>
      <div class="ease-flex ease-gap-4 ease-flex-wrap">
        <div class="ease-card demo-flex-item-stagger">
          <code class="tag">stagger-item</code>
        </div>
        <div class="ease-card demo-flex-item-stagger">
          <code class="tag">stagger-item</code>
        </div>
      </div>
    </section>

  </main>

  <!-- Refactored Footer -->
  <footer class="demo-section" style="text-align: center;">
    <p class="demo-footer-copy">
      Built with ❤️ using <strong class="demo-footer-brand">EaseMotion CSS</strong>
    </p>
  </footer>

</body>
</html>
