<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hexagonal Grid Pattern | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>⬡ Hexagonal Grid Pattern</h1>
    <p class="subtitle">Hover a hex cell to trigger a morphing wave</p>

    <div class="hex-container" id="hexGrid"
         style="--hex-color: #8b5cf6; --grid-bg: #0f0f13; --hex-size: 50px; --morph-duration: 0.5s;">
    </div>

    <div class="controls">
      <label>Hex Color <input type="color" id="hexColor" value="#8b5cf6"></label>
      <label>Hex Size <input type="range" id="sizeRange" min="30" max="80" value="50"></label>
      <label>Morph Duration <input type="range" id="durationRange" min="0.1" max="1.0" step="0.05" value="0.5"></label>
    </div>
  </div>

  <script>
    const grid = document.getElementById('hexGrid');
    const hexColor = document.getElementById('hexColor');
    const sizeRange = document.getElementById('sizeRange');
    const durationRange = document.getElementById('durationRange');

    function buildGrid() {
      grid.innerHTML = '';
      const hexW = parseFloat(sizeRange.value);
      const w = grid.offsetWidth || 500;
      const cols = Math.ceil(w / (hexW * 0.75)) + 1;
      const rows = 6;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const hex = document.createElement('div');
          hex.className = 'hex-cell';
          const offset = r % 2 === 0 ? 0 : hexW * 0.4;
          hex.style.setProperty('--x', (c * hexW * 0.75) + offset + 'px');
          hex.style.setProperty('--y', (r * hexW * 0.55) + 'px');
          hex.style.setProperty('--hex-size', hexW + 'px');
          hex.style.setProperty('--hex-color', hexColor.value);
          hex.style.setProperty('--morph-duration', durationRange.value + 's');
          hex.addEventListener('mouseenter', () => {
            hex.classList.add('morph');
            const all = grid.querySelectorAll('.hex-cell');
            const idx = Array.from(all).indexOf(hex);
            const wait = 0;
            setTimeout(() => {
              hex.classList.remove('morph');
            }, parseFloat(durationRange.value) * 1000 + 300);
          });
          grid.appendChild(hex);
        }
      }
    }

    function updateHexColor() {
      grid.querySelectorAll('.hex-cell').forEach(cell => {
        cell.style.setProperty('--hex-color', hexColor.value);
      });
    }

    hexColor.addEventListener('input', updateHexColor);
    sizeRange.addEventListener('input', () => {
      grid.style.setProperty('--hex-size', sizeRange.value + 'px');
      buildGrid();
    });
    durationRange.addEventListener('input', () => {
      grid.style.setProperty('--morph-duration', durationRange.value + 's');
    });

    window.addEventListener('resize', buildGrid);
    buildGrid();
  </script>
</body>
</html>
