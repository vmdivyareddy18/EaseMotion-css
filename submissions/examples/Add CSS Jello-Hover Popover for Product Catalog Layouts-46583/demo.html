<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Jello-Hover Popover - Product Catalog</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Jello-Hover interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    
    <header class="catalog-header">
        <div class="header-inner">
            <div class="brand">LUMIÈRE</div>
            <nav class="nav-links">
                <a href="#">New Arrivals</a>
                <a href="#" class="active">Collections</a>
                <a href="#">Accessories</a>
            </nav>
            <div class="cart-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge">2</span>
            </div>
        </div>
    </header>

    <main class="catalog-layout">
        <div class="catalog-sidebar">
            <div class="filter-group">
                <h3>Category</h3>
                <label><input type="checkbox" checked> Minimalist</label>
                <label><input type="checkbox"> Premium</label>
                <label><input type="checkbox"> Everyday</label>
            </div>
            <div class="filter-group">
                <h3>Price Range</h3>
                <input type="range" class="price-slider" min="0" max="500" value="250">
                <div class="price-labels">
                    <span>$0</span>
                    <span>$500+</span>
                </div>
            </div>
        </div>
        
        <div class="catalog-grid">
            <!-- Product Card 1 -->
            <div class="product-card">
                <div class="product-image placeholder-image-1">
                    <span class="badge new-badge">New</span>
                    
                    <!-- THE JELLO-HOVER POPOVER COMPONENT -->
                    <div class="ease-popover-container" tabindex="0">
                        <!-- Trigger Button overlaying the product image -->
                        <button class="ease-popover-trigger" aria-label="Quick View" aria-haspopup="true">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        </button>
                        
                        <!-- Popover Panel (Jello Animation) -->
                        <div class="ease-popover-panel ease-jello-hover" role="dialog">
                            <div class="ease-popover-header">
                                <h3>Quick Details</h3>
                            </div>
                            <div class="ease-popover-body">
                                <div class="detail-row">
                                    <span class="label">Material</span>
                                    <span class="value">Italian Leather</span>
                                </div>
                                <div class="detail-row">
                                    <span class="label">Dimensions</span>
                                    <span class="value">24cm x 18cm x 8cm</span>
                                </div>
                                <div class="detail-row">
                                    <span class="label">Availability</span>
                                    <span class="value in-stock">In Stock (12)</span>
                                </div>
                                
                                <div class="color-options">
                                    <span class="label">Colors</span>
                                    <div class="swatches">
                                        <div class="swatch" style="background-color: #1c1917;"></div>
                                        <div class="swatch active" style="background-color: #d6d3d1;"></div>
                                        <div class="swatch" style="background-color: #78716c;"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="ease-popover-footer">
                                <button class="btn-primary">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                    <!-- END POPOVER COMPONENT -->
                    
                </div>
                <div class="product-info">
                    <h3>Minimalist Leather Tote</h3>
                    <p class="price">$145.00</p>
                </div>
            </div>
            
            <!-- Product Card 2 (No popover for demo contrast) -->
            <div class="product-card">
                <div class="product-image placeholder-image-2"></div>
                <div class="product-info">
                    <h3>Classic Canvas Backpack</h3>
                    <p class="price">$85.00</p>
                </div>
            </div>
            
            <!-- Product Card 3 (No popover for demo contrast) -->
            <div class="product-card">
                <div class="product-image placeholder-image-3"></div>
                <div class="product-info">
                    <h3>Everyday Messenger</h3>
                    <p class="price">$110.00</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
