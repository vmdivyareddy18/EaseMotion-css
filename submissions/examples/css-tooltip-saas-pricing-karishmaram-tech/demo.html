<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — SaaS Pricing Elastic Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pricing-container">
    <div class="pricing-header">
      <h1>Simple, Transparent Pricing</h1>
      <p>Hover over features to see plan limits and structural details.</p>
    </div>

    <div class="pricing-grid">
      <!-- Pro Plan Card -->
      <div class="pricing-card">
        <h3>Pro Plan</h3>
        <div class="price">$49<span>/mo</span></div>
        <p class="card-desc">For growing product teams needing deeper infrastructure insight.</p>
        
        <ul class="feature-list">
          <li>
            <span>API Rate Limits</span>
            <div class="ease-saas-tooltip" data-tooltip="Soft cap at 100k requests. Auto-scales with zero service interruption.">
              <span class="info-trigger" tabindex="0">ℹ️</span>
            </div>
          </li>
          <li>
            <span>Team Seats</span>
            <div class="ease-saas-tooltip" data-tooltip="Includes 5 core seats. Extra seats are billed at $8/mo each.">
              <span class="info-trigger" tabindex="0">ℹ️</span>
            </div>
          </li>
          <li>
            <span>SLA Security Guarantee</span>
            <div class="ease-saas-tooltip" data-tooltip="99.9% uptime backed by explicit enterprise smart contract refunds.">
              <span class="info-trigger" tabindex="0">ℹ️</span>
            </div>
          </li>
        </ul>
        <button class="pricing-btn">Upgrade to Pro</button>
      </div>
    </div>
  </div>

</body>
</html>
