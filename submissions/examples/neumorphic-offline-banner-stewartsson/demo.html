<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Agency - Neumorphic Offline Banner Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="agency-viewport">
        <!-- Main Creative Canvas Layout Background Backdrop Grid -->
        <div class="mock-canvas-bg">
            <div class="mock-artwork-node"></div>
        </div>

        <!-- Pure-CSS Functional Interactive Trigger Gate Dismissal Checkbox -->
        <input type="checkbox" id="banner-dismiss-gate" class="banner-input-gate">

        <!-- Advanced Soft Neumorphic Offline Amber Warning Banner Component -->
        <div class="neumorphic-offline-banner">
            <!-- Pulsing Ambient Warning Glow Layer Component -->
            <div class="amber-glow-ring ease-warning-breathe"></div>
            
            <div class="banner-inner-content">
                <div class="warning-text-block">
                    <span class="agency-badge">Network Telemetry</span>
                    <h3 class="banner-title">⚡ Disconnected From Ingress Core</h3>
                    <p class="banner-desc">Creative asset synchronization pools paused. Interface metrics will auto-refresh the millisecond gateway links restore.</p>
                </div>
                
                <div class="banner-actions-row">
                    <label for="banner-dismiss-gate" class="action-btn retry-trigger">Acknowledge</label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
