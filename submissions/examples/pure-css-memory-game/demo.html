<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Memory Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h2>Pure CSS Logic Engine: 3D Memory Game</h2>
    
    <div class="ease-memory-game">
      <!-- Game State & Logic Engine (Hidden from UI) -->
      <input type="checkbox" id="card-1" class="game-state-toggle" />
      <input type="checkbox" id="card-2" class="game-state-toggle" />
      <input type="checkbox" id="card-3" class="game-state-toggle" />
      <input type="checkbox" id="card-4" class="game-state-toggle" />
      
      <!-- The 3D Playfield -->
      <div class="game-board">
        <!-- Pair 1 - Apple -->
        <label for="card-1" class="ease-3d-card">
          <div class="card-face card-front"></div>
          <div class="card-face card-back">🍎</div>
        </label>
        
        <!-- Pair 2 - Banana -->
        <label for="card-3" class="ease-3d-card">
          <div class="card-face card-front"></div>
          <div class="card-face card-back">🍌</div>
        </label>
        
        <!-- Pair 1 - Apple -->
        <label for="card-2" class="ease-3d-card">
          <div class="card-face card-front"></div>
          <div class="card-face card-back">🍎</div>
        </label>
        
        <!-- Pair 2 - Banana -->
        <label for="card-4" class="ease-3d-card">
          <div class="card-face card-front"></div>
          <div class="card-face card-back">🍌</div>
        </label>
      </div>
      
      <!-- Win State Modal Triggered purely by :has() logic -->
      <div class="win-screen">
        <h3>Exceptional Work!</h3>
        <p>All pairs matched using pure CSS logic.</p>
        <button type="reset" class="reset-btn" onclick="location.reload()">Play Again</button>
      </div>
    </div>
  </div>
</body>
</html>
