<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Skeleton - Corporate Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f3f4f6; /* Cool Corporate Gray */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .demo-dashboard-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    }

    .demo-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid #f3f4f6;
    }

    .demo-header h2 {
      margin: 0;
      font-size: 1rem;
      color: #374151;
      font-weight: 600;
    }

    .demo-badge {
      background: #e0e7ff;
      color: #4338ca;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Simulate a complex corporate table or list loading */
    .demo-skeleton-group {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

  </style>
</head>
<body>

  <div class="demo-dashboard-card">
    <div class="demo-header">
      <h2>Recent Transactions</h2>
      <span class="demo-badge">Loading</span>
    </div>

    <div class="demo-skeleton-group">
      
      <!-- Row 1 -->
      <div class="demo-row">
        <!-- Avatar Skeleton -->
        <div class="ease-flip-skeleton ease-avatar" style="--ease-delay: 0"></div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
          <!-- Text Skeletons -->
          <div class="ease-flip-skeleton ease-title" style="--ease-delay: 1"></div>
          <div class="ease-flip-skeleton ease-subtitle" style="--ease-delay: 2"></div>
        </div>
      </div>

      <!-- Row 2 -->
      <div class="demo-row">
        <div class="ease-flip-skeleton ease-avatar" style="--ease-delay: 1"></div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
          <div class="ease-flip-skeleton ease-title" style="--ease-delay: 2"></div>
          <div class="ease-flip-skeleton ease-subtitle" style="--ease-delay: 3"></div>
        </div>
      </div>

      <!-- Row 3 -->
      <div class="demo-row">
        <div class="ease-flip-skeleton ease-avatar" style="--ease-delay: 2"></div>
        <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
          <div class="ease-flip-skeleton ease-title" style="--ease-delay: 3"></div>
          <div class="ease-flip-skeleton ease-subtitle" style="--ease-delay: 4"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
