<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbit Date Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="ease-date-picker">

        <h2>Select Date</h2>

        <div class="orbit-wrapper">

            <span class="orbit"></span>

            <input type="date" aria-label="Choose a date">

        </div>

    </div>

</div>

</body>
</html>
