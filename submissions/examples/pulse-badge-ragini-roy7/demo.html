<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Badge — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo-page-only styling (not part of the component) */
    body {
      margin: 0;
      background: #1a1b23;
      min-height: 100vh;
    }
    .ease-pulse-demo-header {
      text-align: center;
      padding: 2.5rem 1.5rem 0;
      color: #f5f5f7;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .ease-pulse-demo-header h1 {
      margin: 0 0 0.5rem;
      font-size: 1.6rem;
    }
    .ease-pulse-demo-header p {
      margin: 0;
      color: #9a9aa8;
      font-size: 0.95rem;
    }
    .ease-pulse-demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      color: #9a9aa8;
      font-size: 0.8rem;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-pulse-demo-header">
    <h1>Pulse Badge</h1>
    <p>A live/online-style indicator with an expanding, fading pulse ring.</p>
  </div>

  <div class="ease-pulse-demo-grid">

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-badge"></span>
      <span>Default (success)</span>
    </div>

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-badge ease-pulse-badge--danger"></span>
      <span>Danger variant</span>
    </div>

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-badge ease-pulse-badge--primary"></span>
      <span>Primary variant</span>
    </div>

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-badge ease-pulse-badge--accent"></span>
      <span>Accent variant</span>
    </div>

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-badge-pill">
        <span class="ease-pulse-badge"></span>
        Live
      </span>
      <span>Labeled pill</span>
    </div>

    <div class="ease-pulse-demo-section">
      <span class="ease-pulse-avatar-wrap">
        <span class="ease-pulse-avatar">RR</span>
        <span class="ease-pulse-badge"></span>
      </span>
      <span>Avatar corner badge</span>
    </div>

  </div>

</body>
</html>
