<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>Neumorphic Audio Player</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

  <div class="record-wrapper">
    <div class="record">
      <div class="record-center"></div>
    </div>
  </div>

  <div class="content">

    <div class="song-info">
      <h2>Midnight Drive</h2>
      <p>Synthwave Collection</p>
    </div>

    <div class="progress">
      <div class="progress-fill"></div>
    </div>

    <div class="time">
      <span>1:32</span>
      <span>3:45</span>
    </div>

    <div class="controls">

      <button class="control-btn">
        ⏮
      </button>

      <button class="play-btn">
        ▶
      </button>

      <button class="control-btn">
        ⏭
      </button>

    </div>

  </div>

</div>

</body>
</html>
