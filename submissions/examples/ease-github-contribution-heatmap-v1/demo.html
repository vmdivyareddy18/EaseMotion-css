<!DOCTYPE html>
<html lang="en">
<head>

<title>Ease GitHub Contribution Heatmap</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Ease GitHub Contribution Heatmap</h1>

<div class="heatmap">

<div class="week">
<div class="cell level-1"></div>
<div class="cell level-2"></div>
<div class="cell level-4"></div>
<div class="cell level-3"></div>

</div>

<div class="week">
<div class="cell level-3"></div>
<div class="cell level-4"></div>
<div class="cell level-2"></div>
<div class="cell level-1"></div>
<div class="cell level-4"></div>
<div class="cell level-2"></div>
<div class="cell level-3"></div>
</div>

<div class="week">
<div class="cell level-0"></div>
<div class="cell level-2"></div>
<div class="cell level-1"></div>
<div class="cell level-4"></div>
<div class="cell level-3"></div>
<div class="cell level-2"></div>
<div class="cell level-1"></div>
</div>

<div class="week">
<div class="cell level-2"></div>
<div class="cell level-4"></div>
<div class="cell level-4"></div>
<div class="cell level-3"></div>
<div class="cell level-1"></div>
<div class="cell level-2"></div>
<div class="cell level-0"></div>
</div>

</div>

<div class="legend">

<span>Less</span>

<div class="mini l0"></div>
<div class="mini l1"></div>
<div class="mini l2"></div>
<div class="mini l3"></div>
<div class="mini l4"></div>

<span>More</span>

</div>

</div>

</body>
</html>
