<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS-Only Deployment Stage Checklist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Deployment Checklist</h1>

    <p class="subtitle">
        Verify each deployment stage before releasing to production.
    </p>

    <div class="checklist">

        <label class="stage">

            <input type="checkbox" checked>

            <span class="checkmark"></span>

            <div class="details">

                <h3>Run Unit Tests</h3>

                <p>All automated tests passed successfully.</p>

            </div>

        </label>

        <label class="stage">

            <input type="checkbox" checked>

            <span class="checkmark"></span>

            <div class="details">

                <h3>Build Production Bundle</h3>

                <p>Assets optimized and bundled.</p>

            </div>

        </label>

        <label class="stage">

            <input type="checkbox">

            <span class="checkmark"></span>

            <div class="details">

                <h3>Database Migration</h3>

                <p>Apply pending migration scripts.</p>

            </div>

        </label>

        <label class="stage">

            <input type="checkbox">

            <span class="checkmark"></span>

            <div class="details">

                <h3>Deploy to Production</h3>

                <p>Push latest release to production servers.</p>

            </div>

        </label>

        <label class="stage">

            <input type="checkbox">

            <span class="checkmark"></span>

            <div class="details">

                <h3>Smoke Testing</h3>

                <p>Verify critical application workflows.</p>

            </div>

        </label>

    </div>

</div>

</body>
</html>
