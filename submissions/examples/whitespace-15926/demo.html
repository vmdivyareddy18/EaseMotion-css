<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>White-space Utilities Demo</title>
</head>
<body>
  <h1>White-space Utilities</h1>
  
  <div class="demo-container ws-nowrap">
    This text is set to nowrap, so it will not wrap to the next line.
  </div>
  
  <div class="demo-container ws-pre-wrap">
    This text is set to pre-wrap.
    It respects line breaks
    and wraps long lines.
  </div>
</body>
</html>
