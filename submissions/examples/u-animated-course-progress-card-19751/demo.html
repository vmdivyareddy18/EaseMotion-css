<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Course Progress Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="course-card">

        <div class="badge">
            🎓 Learning Streak
        </div>

        <h2>Web Development Masterclass</h2>

        <p class="description">
            Continue your learning journey and complete the remaining modules.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Course Completion</span>
                <span>72%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>36</h3>
                <p>Lessons Completed</p>
            </div>

            <div class="stat-box">
                <h3>14</h3>
                <p>Remaining Modules</p>
            </div>

        </div>

        <div class="streak-box">
            🔥 Study Streak: 18 Days
        </div>

        <div class="achievement-box">
            🏆 Achievement Unlocked: Frontend Explorer
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Continue Learning
            </button>

            <button class="secondary-btn">
                View Certificate
            </button>

        </div>

    </div>

</div>

</body>
</html>
