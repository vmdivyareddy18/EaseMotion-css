<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-color-morph – Color Morph</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Color Morph
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      The box smoothly cycles through a sequence of colors.
    </p>

    <!-- The color-morphing element -->
    <div class="morph-box ease-mx-auto ease-rounded-xl ease-shadow-lg ease-flex ease-items-center ease-justify-center"
         style="--ease-morph-colors: #3b82f6, #8b5cf6, #ec4899, #f97316;">
      <span class="ease-text-white ease-font-semibold ease-text-lg">Color Cycle</span>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Customizable via <code>--ease-morph-colors</code> (comma-separated).
    </p>
  </div>

</body>
</html>
