<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub Terminal - Parallax Reaction Picker Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyberpunk-viewport">
        <!-- Interactive Micro-Frontend Cyberpunk Interface Container Card -->
        <div class="terminal-card-node">
            <header class="terminal-header">
                <div class="neon-matrix-badge">NODE: FEED_SYNC</div>
                <h2 class="terminal-title">Transmission Stream</h2>
                <p class="terminal-subtitle">Hover over or interact with the parallax matrix deck below to dispatch biometric telemetry reactions.</p>
            </header>

            <!-- Main Interactive Parallax Reaction Picker Deck Shell -->
            <div class="picker-stage-workspace">
                <div class="parallax-reaction-deck">
                    
                    <!-- Layer 3: Deep Cyber Shadow Depth Grid -->
                    <div class="deck-parallax-layer depth-far"></div>
                    
                    <!-- Layer 2: Midground Content Grid Platform Base -->
                    <div class="deck-parallax-layer depth-mid"></div>
                    
                    <!-- Layer 1: Foreground Interactive Reaction Capsule Nodes -->
                    <div class="deck-parallax-layer depth-close">
                        <div class="reaction-capsules-grid">
                            
                            <!-- Reaction Variant 1: Fire/Hot -->
                            <button class="reaction-node ease-capsule-pop">
                                <span class="emoji-vector color-pink">🔥</span>
                                <span class="reaction-count">104</span>
                            </button>

                            <!-- Reaction Variant 2: Like/Secure -->
                            <button class="reaction-node ease-capsule-pop">
                                <span class="emoji-vector color-cyan">👍</span>
                                <span class="reaction-count">420</span>
                            </button>

                            <!-- Reaction Variant 3: Mindblown/Quantum -->
                            <button class="reaction-node ease-capsule-pop">
                                <span class="emoji-vector color-gold">🤯</span>
                                <span class="reaction-count">256</span>
                            </button>

                        </div>
                    </div>

                </div>
            </div>

            <footer class="terminal-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Telemetry Ingress Channels Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
