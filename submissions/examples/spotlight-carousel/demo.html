<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS - Spotlight Carousel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="carousel-container">

  <h1>Spotlight Carousel</h1>
  <p class="subtitle">
    Nature-inspired Spotlight Carousel using pure HTML & CSS
  </p>

  <div class="carousel ease-spotlight">

    <div class="card active">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600" alt="Forest">
      <div class="overlay">
        <h2>Forest Escape</h2>
        <p>Experience peaceful green landscapes.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=600" alt="Mountain">
      <div class="overlay">
        <h2>Mountain View</h2>
        <p>Breathe fresh air above the clouds.</p>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e?w=600" alt="Lake">
      <div class="overlay">
        <h2>Crystal Lake</h2>
        <p>Relax beside calm and beautiful waters.</p>
      </div>
    </div>

  </div>

</div>

</body>
</html>
