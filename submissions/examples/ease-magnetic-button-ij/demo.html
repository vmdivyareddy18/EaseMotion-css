<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Magnetic Button</h1>
    <p class="subtitle">Hover over the buttons — they pull toward your cursor.</p>

    <div class="demo-group">
      <button class="magnetic-btn" data-strength="0.3" data-radius="150">Primary</button>
      <button class="magnetic-btn" data-strength="0.2" data-radius="120" style="--mb-btn-color: #10b981; --mb-btn-hover: #059669;">Success</button>
      <button class="magnetic-btn" data-strength="0.25" data-radius="180" style="--mb-btn-color: #f59e0b; --mb-btn-hover: #d97706;">Warning</button>
    </div>

    <div class="demo-group">
      <button class="magnetic-btn outline" data-strength="0.35" data-radius="160">Outline</button>
      <button class="magnetic-btn outline" data-strength="0.3" data-radius="140" style="--mb-btn-color: #8b5cf6; --mb-btn-hover: #7c3aed;">Purple</button>
    </div>

    <div class="demo-group">
      <button class="magnetic-btn sm" data-strength="0.15" data-radius="100">Small</button>
      <button class="magnetic-btn lg" data-strength="0.4" data-radius="200">Large</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.magnetic-btn').forEach(btn => {
      const strength = parseFloat(btn.dataset.strength) || 0.3;
      const radius = parseFloat(btn.dataset.radius) || 150;

      btn.addEventListener('mousemove', e => {
        const rect = btn.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = e.clientX - cx;
        const dy = e.clientY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < radius) {
          const tx = dx * strength;
          const ty = dy * strength;
          btn.style.setProperty('--mb-tx', tx + 'px');
          btn.style.setProperty('--mb-ty', ty + 'px');
          btn.style.setProperty('--mb-scale', '1.08');
          btn.classList.add('active');
        } else {
          btn.style.setProperty('--mb-tx', '0px');
          btn.style.setProperty('--mb-ty', '0px');
          btn.style.setProperty('--mb-scale', '1');
          btn.classList.remove('active');
        }
      });

      btn.addEventListener('mouseleave', () => {
        btn.style.setProperty('--mb-tx', '0px');
        btn.style.setProperty('--mb-ty', '0px');
        btn.style.setProperty('--mb-scale', '1');
        btn.classList.remove('active');
      });

      btn.addEventListener('click', function() {
        this.classList.add('clicked');
        setTimeout(() => this.classList.remove('clicked'), 300);
      });
    });
  </script>
</body>
</html>
