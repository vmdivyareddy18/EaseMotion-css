<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Custom Fill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo">
    <h1>Checkbox Custom Fill</h1>
    <p class="desc">Checkboxes fill with color from bottom to top on select.</p>

    <form class="checkbox-list">
      <label class="cb">
        <input type="checkbox" checked>
        <span class="cb-indicator"></span>
        Task 1 — done
      </label>
      <label class="cb">
        <input type="checkbox">
        <span class="cb-indicator"></span>
        Task 2 — pending
      </label>
      <label class="cb">
        <input type="checkbox" checked>
        <span class="cb-indicator"></span>
        Task 3 — done
      </label>
      <label class="cb">
        <input type="checkbox">
        <span class="cb-indicator"></span>
        Task 4 — pending
      </label>
    </form>
  </main>
</body>
</html>
