<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Aurora Background</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="aurora-scene entrance-anim">
        
        <!-- Background Haze (Layer 4) -->
        <div class="layer layer-4"></div>

        <!-- Thin energy streaks (Layer 3) -->
        <div class="layer layer-3 parallax-3">
            <div class="streak s1"></div>
            <div class="streak s2"></div>
        </div>

        <!-- Faster glowing ribbon (Layer 2) -->
        <div class="layer layer-2 parallax-2">
            <div class="ribbon r-fast"></div>
        </div>

        <!-- Large slow-moving ribbon (Layer 1) -->
        <div class="layer layer-1 parallax-1">
            <div class="ribbon r-slow"></div>
        </div>
        
        <!-- Particles & Sparks -->
        <div class="particles-layer floating-particles"></div>
        <div class="particles-layer floating-particles-2"></div>
        
        <div class="sparks-layer">
            <div class="spark sp-1"></div>
            <div class="spark sp-2"></div>
            <div class="spark sp-3"></div>
            <div class="spark sp-4"></div>
        </div>

        <!-- Center Display Panel -->
        <div class="center-panel">
            <h1 class="panel-title">DIGITAL AURORA</h1>
            <div class="panel-content">
                <div class="data-row"><span>Status:</span> <span class="active">Active</span></div>
                <div class="data-row"><span>Energy Flow:</span> <span class="stable">Stable</span></div>
                <div class="data-row"><span>Atmosphere:</span> <span class="dynamic">Dynamic</span></div>
            </div>
        </div>

    </div>
</body>
</html>
