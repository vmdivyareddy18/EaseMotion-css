<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Style Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Math Style</h1>
    <p class="note">
      Controls the layout spacing of mathematical expressions.
      <code>normal</code> uses standard spacing; <code>compact</code> condenses
      it.
    </p>

    <div class="label">math-style: normal</div>
    <div class="demo-math math-normal">
      <var>E</var> = <var>mc</var><sup>2</sup> &nbsp; &int;
      <var>f</var>(<var>x</var>) d<var>x</var>
    </div>

    <div class="label">math-style: compact</div>
    <div class="demo-math math-compact">
      <var>E</var> = <var>mc</var><sup>2</sup> &nbsp; &int;
      <var>f</var>(<var>x</var>) d<var>x</var>
    </div>
  </body>
</html>
