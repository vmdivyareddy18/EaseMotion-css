<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS small-input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Small Input</h1>
    <div class="smi-form">
      <input type="text" class="smi-input" placeholder="Promo code">
      <input type="number" class="smi-input" placeholder="Quantity">
      <input type="text" class="smi-input disabled" placeholder="Locked" disabled>
    </div>
  </div>
</body>
</html>
