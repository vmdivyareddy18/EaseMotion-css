<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-giraffe-neck | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="ground-g"></div>
    <div class="giraffe-body">
      <div class="spot spot-1"></div>
      <div class="spot spot-2"></div>
      <div class="spot spot-3"></div>
      <div class="spot spot-4"></div>
      <div class="spot spot-5"></div>
      <div class="giraffe-neck">
        <div class="spot-n sn-1"></div>
        <div class="spot-n sn-2"></div>
        <div class="spot-n sn-3"></div>
        <div class="spot-n sn-4"></div>
      </div>
      <div class="giraffe-head">
        <div class="eye-giraffe"></div>
        <div class="ear-giraffe ear-g-l"></div>
        <div class="ear-giraffe ear-g-r"></div>
        <div class="ossicone oss-l">
          <div class="oss-tip"></div>
        </div>
        <div class="ossicone oss-r">
          <div class="oss-tip"></div>
        </div>
        <div class="muzzle-g"></div>
      </div>
      <div class="leg-giraffe gleg-fl"><div class="hoof"></div></div>
      <div class="leg-giraffe gleg-fr"><div class="hoof"></div></div>
      <div class="leg-giraffe gleg-bl"><div class="hoof"></div></div>
      <div class="leg-giraffe gleg-br"><div class="hoof"></div></div>
      <div class="tail-g"><div class="tail-tuft"></div></div>
    </div>
  </div>
</body>
</html>
