<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>✊ Rock Paper Scissors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>✊ Rock Paper Scissors</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🏆 Wins</span>
        <span class="stat-value" id="winsDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📊 Losses</span>
        <span class="stat-value" id="lossesDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🤝 Ties</span>
        <span class="stat-value" id="tiesDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏅 Best</span>
        <span class="stat-value" id="bestDisplay">0</span>
      </div>
    </div>

    <div class="game-area">
      <div class="player-section">
        <div class="choice-label">You</div>
        <div class="choice-display" id="playerChoice">
          <span class="choice-emoji" id="playerEmoji">❓</span>
          <span class="choice-text" id="playerText">Choose</span>
        </div>
      </div>

      <div class="vs-section">
        <span class="vs-text">VS</span>
        <div class="result-display" id="resultDisplay">
          <span class="result-text" id="resultText">Ready</span>
        </div>
      </div>

      <div class="computer-section">
        <div class="choice-label">Computer</div>
        <div class="choice-display" id="computerChoice">
          <span class="choice-emoji" id="computerEmoji">❓</span>
          <span class="choice-text" id="computerText">Waiting</span>
        </div>
      </div>
    </div>

    <div class="choice-buttons">
      <button class="choice-btn" data-choice="rock">
        <span class="btn-emoji">✊</span>
        <span class="btn-label">Rock</span>
      </button>
      <button class="choice-btn" data-choice="paper">
        <span class="btn-emoji">✋</span>
        <span class="btn-label">Paper</span>
      </button>
      <button class="choice-btn" data-choice="scissors">
        <span class="btn-emoji">✌️</span>
        <span class="btn-label">Scissors</span>
      </button>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="resetBtn">🔄 Reset Stats</button>
    </div>

    <div class="game-status" id="gameStatus">🎮 Choose your move to start playing!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const winsDisplay = document.getElementById('winsDisplay');
      const lossesDisplay = document.getElementById('lossesDisplay');
      const tiesDisplay = document.getElementById('tiesDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const playerEmoji = document.getElementById('playerEmoji');
      const playerText = document.getElementById('playerText');
      const computerEmoji = document.getElementById('computerEmoji');
      const computerText = document.getElementById('computerText');
      const resultText = document.getElementById('resultText');
      const resultDisplay = document.getElementById('resultDisplay');
      const gameStatus = document.getElementById('gameStatus');
      const resetBtn = document.getElementById('resetBtn');
      const choiceBtns = document.querySelectorAll('.choice-btn');

      // ---------- Game State ----------
      const CHOICES = {
        rock: { emoji: '✊', label: 'Rock', beats: 'scissors' },
        paper: { emoji: '✋', label: 'Paper', beats: 'rock' },
        scissors: { emoji: '✌️', label: 'Scissors', beats: 'paper' }
      };

      let stats = {
        wins: 0,
        losses: 0,
        ties: 0,
        bestWinStreak: 0,
        currentWinStreak: 0
      };

      let gameActive = false;
      let isAnimating = false;

      // ---------- Load Stats ----------
      function loadStats() {
        const saved = localStorage.getItem('rpsStats');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            stats = { ...stats, ...parsed };
          } catch (e) {}
        }
        updateStatsDisplay();
      }

      function saveStats() {
        localStorage.setItem('rpsStats', JSON.stringify(stats));
      }

      // ---------- Update Display ----------
      function updateStatsDisplay() {
        winsDisplay.textContent = stats.wins;
        lossesDisplay.textContent = stats.losses;
        tiesDisplay.textContent = stats.ties;
        bestDisplay.textContent = stats.bestWinStreak;
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      function setResult(message, className) {
        resultText.textContent = message;
        resultDisplay.className = 'result-display ' + className;
      }

      // ---------- Computer Choice ----------
      function getComputerChoice() {
        const keys = Object.keys(CHOICES);
        const randomIndex = Math.floor(Math.random() * keys.length);
        return keys[randomIndex];
      }

      // ---------- Game Logic ----------
      function playRound(playerChoice) {
        if (isAnimating) return;
        if (!gameActive) {
          gameActive = true;
        }

        isAnimating = true;
        const computerChoice = getComputerChoice();
        
        // Show player choice
        playerEmoji.textContent = CHOICES[playerChoice].emoji;
        playerText.textContent = CHOICES[playerChoice].label;

        // Show computer choice (with slight delay for suspense)
        computerEmoji.textContent = '❓';
        computerText.textContent = '...';
        setResult('⚡', '');
        setGameStatus('🤔 Computer is thinking...', true);

        setTimeout(() => {
          computerEmoji.textContent = CHOICES[computerChoice].emoji;
          computerText.textContent = CHOICES[computerChoice].label;

          // Determine winner
          let result;
          let resultMessage;
          let resultClass;

          if (playerChoice === computerChoice) {
            result = 'tie';
            resultMessage = "🤝 It's a tie!";
            resultClass = 'tie';
            stats.ties++;
            setGameStatus("🤝 It's a tie! Try again.", true);
          } else if (CHOICES[playerChoice].beats === computerChoice) {
            result = 'win';
            resultMessage = `🎉 You win! ${CHOICES[playerChoice].label} beats ${CHOICES[computerChoice].label}`;
            resultClass = 'win';
            stats.wins++;
            stats.currentWinStreak++;
            if (stats.currentWinStreak > stats.bestWinStreak) {
              stats.bestWinStreak = stats.currentWinStreak;
            }
            setGameStatus(`🎉 You win! ${CHOICES[playerChoice].label} beats ${CHOICES[computerChoice].label}`, true);
          } else {
            result = 'lose';
            resultMessage = `😔 You lose! ${CHOICES[computerChoice].label} beats ${CHOICES[playerChoice].label}`;
            resultClass = 'lose';
            stats.losses++;
            stats.currentWinStreak = 0;
            setGameStatus(`😔 You lose! ${CHOICES[computerChoice].label} beats ${CHOICES[playerChoice].label}`, false);
          }

          setResult(resultMessage, resultClass);
          updateStatsDisplay();
          saveStats();

          // Check for win streak achievement
          if (stats.currentWinStreak >= 5 && stats.currentWinStreak % 5 === 0) {
            setTimeout(() => {
              setGameStatus(`🔥 ${stats.currentWinStreak} wins in a row! Amazing!`, true);
            }, 500);
          }

          isAnimating = false;
        }, 400);
      }

      // ---------- Reset Stats ----------
      function resetStats() {
        if (isAnimating) return;
        
        stats = {
          wins: 0,
          losses: 0,
          ties: 0,
          bestWinStreak: 0,
          currentWinStreak: 0
        };
        
        saveStats();
        updateStatsDisplay();
        
        // Reset display
        playerEmoji.textContent = '❓';
        playerText.textContent = 'Choose';
        computerEmoji.textContent = '❓';
        computerText.textContent = 'Waiting';
        setResult('Ready', '');
        resultDisplay.className = 'result-display';
        setGameStatus('🔄 Stats reset. Choose your move!', true);
        gameActive = false;
      }

      // ---------- Choice Button Handlers ----------
      choiceBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          const choice = btn.dataset.choice;
          playRound(choice);
        });

        // Touch support
        btn.addEventListener('touchstart', (e) => {
          e.preventDefault();
          const choice = btn.dataset.choice;
          playRound(choice);
        }, { passive: false });
      });

      // ---------- Keyboard Controls ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === '1' || e.key === 'r' || e.key === 'R') {
          playRound('rock');
        }
        if (e.key === '2' || e.key === 'p' || e.key === 'P') {
          playRound('paper');
        }
        if (e.key === '3' || e.key === 's' || e.key === 'S') {
          playRound('scissors');
        }
        if (e.key === 'r' && !e.ctrlKey && !e.metaKey) {
          // Only reset if not playing a round
          resetStats();
        }
      });

      // ---------- Reset Button ----------
      resetBtn.addEventListener('click', resetStats);

      // ---------- Init ----------
      function init() {
        loadStats();
        setGameStatus('🎮 Choose your move: Rock (1/R), Paper (2/P), or Scissors (3/S)', true);
        setResult('Ready', '');
      }

      init();
    })();
  </script>
</body>
</html>
