<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Preview Builder - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Resume Builder</h1>

  <div class="builder">

    <div class="editor">
      <h2>Edit Details</h2>

      <div class="form-group">
        <label for="nameInput">Full Name</label>
        <input type="text" id="nameInput" placeholder="Alex Johnson">
      </div>

      <div class="form-group">
        <label for="bioInput">Bio</label>
        <textarea id="bioInput" placeholder="Passionate web developer with 5+ years of experience..."></textarea>
      </div>

      <div class="form-group">
        <label for="skillsInput">Skills</label>
        <textarea id="skillsInput" placeholder="JavaScript, React, CSS, Node.js, Python"></textarea>
      </div>

      <div class="form-group">
        <label for="experienceInput">Experience</label>
        <textarea id="experienceInput" placeholder="Senior Frontend Developer at Tech Co. (2020-present)&#10;Junior Developer at Startup Inc. (2018-2020)"></textarea>
      </div>
    </div>

    <div class="preview">
      <h2>Preview</h2>
      <div class="resume-card">
        <div class="r-name" id="previewName">Alex Johnson</div>
        <div class="r-bio" id="previewBio">Passionate web developer with 5+ years of experience...</div>

        <div class="r-section">
          <h3>Skills</h3>
          <p id="previewSkills">JavaScript, React, CSS, Node.js, Python</p>
        </div>

        <div class="r-section">
          <h3>Experience</h3>
          <p id="previewExperience">Senior Frontend Developer at Tech Co. (2020-present)
Junior Developer at Startup Inc. (2018-2020)</p>
        </div>
      </div>
    </div>

  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const bioInput = document.getElementById('bioInput');
    const skillsInput = document.getElementById('skillsInput');
    const experienceInput = document.getElementById('experienceInput');
    const previewName = document.getElementById('previewName');
    const previewBio = document.getElementById('previewBio');
    const previewSkills = document.getElementById('previewSkills');
    const previewExperience = document.getElementById('previewExperience');

    nameInput.addEventListener('input', function () {
      previewName.textContent = nameInput.value || 'Your Name';
    });

    bioInput.addEventListener('input', function () {
      previewBio.textContent = bioInput.value || 'Your bio goes here...';
    });

    skillsInput.addEventListener('input', function () {
      previewSkills.textContent = skillsInput.value || 'List your skills...';
    });

    experienceInput.addEventListener('input', function () {
      previewExperience.textContent = experienceInput.value || 'Describe your experience...';
    });

    nameInput.value = 'Alex Johnson';
    bioInput.value = 'Passionate web developer with 5+ years of experience...';
    skillsInput.value = 'JavaScript, React, CSS, Node.js, Python';
    experienceInput.value = 'Senior Frontend Developer at Tech Co. (2020-present)\nJunior Developer at Startup Inc. (2018-2020)';
    nameInput.dispatchEvent(new Event('input'));
    bioInput.dispatchEvent(new Event('input'));
    skillsInput.dispatchEvent(new Event('input'));
    experienceInput.dispatchEvent(new Event('input'));
  </script>

</body>
</html>
