<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maintenance Window Countdown Banner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="banner">

        <div class="banner-content">

            <div class="icon">
                🛠
            </div>

            <div class="message">

                <h2>Scheduled Maintenance</h2>

                <p>
                    Services will undergo maintenance on
                    <strong>August 5, 2026 • 02:00 UTC</strong>.
                    Expected downtime: <strong>30 minutes</strong>.
                </p>

            </div>

        </div>

        <div class="countdown">

            <div class="time-box">

                <span class="value">01</span>

                <span class="label">Days</span>

            </div>

            <div class="time-box">

                <span class="value">14</span>

                <span class="label">Hours</span>

            </div>

            <div class="time-box">

                <span class="value">37</span>

                <span class="label">Minutes</span>

            </div>

        </div>

    </div>

</div>

</body>
</html>
