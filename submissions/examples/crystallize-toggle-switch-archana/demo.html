<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystallize Toggle Switch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container">
        <h1>Crystallize Toggle Switch</h1>
        <p>Pure CSS toggle with smooth crystalline animations</p>

        <div class="demo-section">
            <h2>Default State</h2>
            <label class="crystallize-toggle">
                <input type="checkbox">
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="demo-section">
            <h2>Active State</h2>
            <label class="crystallize-toggle">
                <input type="checkbox" checked>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="demo-section">
            <h2>With Labels</h2>
            <div class="toggle-group">
                <span class="label">Off</span>
                <label class="crystallize-toggle">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
                <span class="label">On</span>
            </div>
        </div>

        <div class="demo-section">
            <h2>Disabled State</h2>
            <label class="crystallize-toggle crystallize-toggle--disabled">
                <input type="checkbox" disabled>
                <span class="toggle-slider"></span>
            </label>
        </div>

        <div class="demo-section">
            <h2>Multiple Toggles</h2>
            <div class="toggle-stack">
                <div>
                    <p>Feature A</p>
                    <label class="crystallize-toggle">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div>
                    <p>Feature B</p>
                    <label class="crystallize-toggle">
                        <input type="checkbox" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div>
                    <p>Feature C</p>
                    <label class="crystallize-toggle">
                        <input type="checkbox">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
