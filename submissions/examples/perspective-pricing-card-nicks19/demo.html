<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Pricing Card - SaaS Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #f8fafc;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .demo-header h1 {
      font-size: 2.25rem;
      margin: 0 0 12px 0;
      color: #0f172a;
      letter-spacing: -1px;
    }
    
    .demo-header p {
      color: #64748b;
      font-size: 1.125rem;
      margin: 0;
    }

    /* Demo layout grid for multiple cards if needed, we'll just show one prominent one here */
    .card-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
  </style>
</head>
<body>

  <div class="demo-header">
    <h1>Level Up Your Workflow</h1>
    <p>Pure CSS perspective hover effect for SaaS pricing cards.</p>
  </div>

  <div class="card-grid">
    
    <!-- Perspective Card Wrapper -->
    <div class="ease-perspective-wrapper">
      <div class="ease-pricing-card">
        
        <div class="ease-card-badge">Most Popular</div>
        
        <div class="ease-card-header">
          <h2 class="ease-plan-name">Pro Team</h2>
          <p class="ease-plan-desc">For scaling startups and agencies</p>
        </div>
        
        <div class="ease-card-price">
          <span class="ease-currency">$</span>
          <span class="ease-amount">49</span>
          <span class="ease-period">/mo</span>
        </div>
        
        <ul class="ease-feature-list">
          <li>
            <svg class="ease-check" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            Unlimited Projects
          </li>
          <li>
            <svg class="ease-check" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            Up to 10 Team Members
          </li>
          <li>
            <svg class="ease-check" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            Advanced Analytics
          </li>
          <li>
            <svg class="ease-check" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
            </svg>
            Priority Support
          </li>
        </ul>
        
        <button class="ease-cta-btn">Get Started</button>
        
      </div>
    </div>

  </div>

</body>
</html>
