<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Console - Cursor Glow Countdown Timer Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="retro-viewport">
        <!-- Main Premium Retro Elevation Control Grid Card Container Shell -->
        <div class="terminal-container-card">
            
            <!-- Custom Dynamic Reactive Pure-CSS Tracking Aura Background Mesh Layer -->
            <div class="cursor-glow-tracker"></div>
            
            <header class="terminal-header">
                <span class="retro-badge">SYSTEM INITIALIZATION</span>
                <h1 class="terminal-title">LAUNCH // TIME</h1>
                <p class="terminal-subtitle">Hover over the terminal block grid canvas below to trigger the interactive cursor glow tracking filters.</p>
            </header>

            <!-- Advanced Pure-CSS Digital Segment Countdown Stage Area -->
            <div class="timer-display-workspace">
                <div class="retro-digits-row">
                    
                    <!-- Segment Hours Node Group Capsule -->
                    <div class="digit-segment ease-glow-pulse-1">
                        <span class="digital-value">04</span>
                        <span class="segment-meta">HOURS</span>
                    </div>

                    <div class="segment-divider">:</div>

                    <!-- Segment Minutes Node Group Capsule -->
                    <div class="digit-segment ease-glow-pulse-2">
                        <span class="digital-value">20</span>
                        <span class="segment-meta">MINS</span>
                    </div>

                    <div class="segment-divider">:</div>

                    <!-- Segment Seconds Node Group Capsule -->
                    <div class="digit-segment ease-glow-pulse-3">
                        <span class="digital-value">00</span>
                        <span class="segment-meta">SECS</span>
                    </div>

                </div>
            </div>

            <footer class="terminal-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Retro Telemetry Ledger Channels Active</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
