<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Log Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="log-viewer">

    <div class="toolbar">
        <h2>● Log Viewer</h2>

        <label class="toggle">
            <input type="checkbox" id="autoScroll" checked>
            Auto Scroll
        </label>
    </div>

    <div class="logs" id="logs">
        <div class="log info ease-fade-in-up">
            <span class="level">INFO</span>
            <span>Server started successfully.</span>
        </div>

        <div class="log info ease-fade-in-up">
            <span class="level">INFO</span>
            <span>Connected to database.</span>
        </div>

        <div class="log warn ease-fade-in-up">
            <span class="level">WARN</span>
            <span>Memory usage is above 80%.</span>
        </div>

        <div class="log error ease-fade-in-up">
            <span class="level">ERROR</span>
            <span>Failed to fetch API response.</span>
        </div>
    </div>

    <div class="controls">
        <button id="addLog">Add Sample Log</button>
        <button id="clearLogs">Clear</button>
    </div>

</div>

<script>
const logs = document.getElementById("logs");
const autoScroll = document.getElementById("autoScroll");

const samples = [
    { type: "info", text: "Background task completed." },
    { type: "warn", text: "Disk usage reaching limit." },
    { type: "error", text: "Unexpected server error." }
];

document.getElementById("addLog").addEventListener("click", () => {

    const sample = samples[Math.floor(Math.random() * samples.length)];

    const item = document.createElement("div");
    item.className = `log ${sample.type} ease-fade-in-up`;

    item.innerHTML = `
        <span class="level">${sample.type.toUpperCase()}</span>
        <span>${sample.text}</span>
    `;

    logs.appendChild(item);

    if (autoScroll.checked) {
        logs.scrollTop = logs.scrollHeight;
    }
});

document.getElementById("clearLogs").addEventListener("click", () => {
    logs.innerHTML = "";
});
</script>

</body>
</html>
