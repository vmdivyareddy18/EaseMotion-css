<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heart / Bookmark Toggle Button</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; gap: 2rem;">
    <button class="toggle-btn heart-btn" id="heartBtn" aria-label="Like">
      <svg viewBox="0 0 24 24" width="28" height="28" class="toggle-icon">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
    </button>
    <button class="toggle-btn bookmark-btn" id="bookmarkBtn" aria-label="Bookmark">
      <svg viewBox="0 0 24 24" width="24" height="24" class="toggle-icon">
        <path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/>
      </svg>
    </button>
  </div>
  <script src="script.js"></script>
</body>
</html>
