<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiggle on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Wiggle on Hover</h1>
  <p class="subtitle">Element wiggles side to side when hovered — pure CSS.</p>

  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the badge to see the wiggle</p>
    <span class="wiggle-badge">✨ New Feature</span>
  </section>

  <section>
    <h2>How It Works</h2>
    <p>A <code>rotate</code> keyframe alternates between positive and negative values on hover, creating a playful wiggle.</p>
  </section>
</body>
</html>
