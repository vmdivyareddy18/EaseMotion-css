<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Perspective Tilt Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
Open Accessible Modal
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal" role="dialog" aria-modal="true" aria-labelledby="title">

<label for="modal-toggle" class="close">&times;</label>

<div class="icon">♿</div>

<h2 id="title">Accessible Experience</h2>

<p>
This modal demonstrates a smooth CSS-only 3D Perspective Tilt animation while maintaining accessibility, responsiveness, and keyboard-friendly controls.
</p>

<div class="actions">
<button>Continue</button>
<button class="secondary">Learn More</button>
</div>

</div>

</body>
</html>
