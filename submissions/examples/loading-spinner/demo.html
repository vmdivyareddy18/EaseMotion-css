<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Spinner Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0f172a;
      margin: 0;
      color: #e2e8f0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      color: #94a3b8;
      margin-bottom: 50px;
      font-weight: 300;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      gap: 50px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .demo-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Loading Spinner Component</h2>
    
    <div class="demo-row">
      <!-- Default Spinner -->
      <div class="demo-item">
        <div class="spinner"></div>
        <span class="demo-label">Default</span>
      </div>
      
      <!-- Dotted Spinner -->
      <div class="demo-item">
        <div class="spinner spinner-dots"></div>
        <span class="demo-label">Dotted</span>
      </div>
      
      <!-- Dual Ring -->
      <div class="demo-item">
        <div class="spinner spinner-dual"></div>
        <span class="demo-label">Dual Ring</span>
      </div>
      
      <!-- Pulse Ring -->
      <div class="demo-item">
        <div class="spinner spinner-pulse"></div>
        <span class="demo-label">Pulse</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Bounce Dots -->
      <div class="demo-item">
        <div class="spinner spinner-bounce">
          <div></div>
          <div></div>
          <div></div>
        </div>
        <span class="demo-label">Bounce</span>
      </div>
      
      <!-- Wave Bars -->
      <div class="demo-item">
        <div class="spinner spinner-wave">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
        <span class="demo-label">Wave</span>
      </div>
      
      <!-- Circle Notch -->
      <div class="demo-item">
        <div class="spinner spinner-notch"></div>
        <span class="demo-label">Notch</span>
      </div>
      
      <!-- Orbit -->
      <div class="demo-item">
        <div class="spinner spinner-orbit"></div>
        <span class="demo-label">Orbit</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Small Size -->
      <div class="demo-item">
        <div class="spinner spinner-small"></div>
        <span class="demo-label">Small</span>
      </div>
      
      <!-- Large Size -->
      <div class="demo-item">
        <div class="spinner spinner-large"></div>
        <span class="demo-label">Large</span>
      </div>
      
      <!-- Color Variants -->
      <div class="demo-item">
        <div class="spinner spinner-green"></div>
        <span class="demo-label">Green</span>
      </div>
      
      <div class="demo-item">
        <div class="spinner spinner-red"></div>
        <span class="demo-label">Red</span>
      </div>
    </div>
  </div>
</body>
</html>
