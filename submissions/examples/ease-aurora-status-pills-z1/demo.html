<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Aurora Status Pills</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="panel">
  <h1>Aurora Status Pills</h1>

  <section class="pill-grid">
    <article class="pill online">
      <span></span>
      <strong>Online</strong>
    </article>

    <article class="pill sync">
      <span></span>
      <strong>Syncing</strong>
    </article>

    <article class="pill update">
      <span></span>
      <strong>Updating</strong>
    </article>

    <article class="pill secure">
      <span></span>
      <strong>Secured</strong>
    </article>
  </section>
</main>

</body>
</html>
