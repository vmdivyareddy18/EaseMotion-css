<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-focus-out Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        background: #0f0f0f;
        font-family: sans-serif;
        color: #fff;
      }

      .box {
        width: 160px;
        height: 160px;
        background: linear-gradient(135deg, #6c63ff, #3ecfcf);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
      }

      button {
        padding: 0.6rem 1.4rem;
        border: none;
        border-radius: 8px;
        background: #6c63ff;
        color: #fff;
        font-size: 1rem;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #574fd6;
      }

      p {
        font-size: 0.85rem;
        color: #888;
      }
    </style>
  </head>
  <body>
    <h1>ease-focus-out</h1>
    <p>Element exits by going out of focus (blurring out).</p>

    <div class="box" id="target">Click Me</div>

    <button onclick="triggerAnimation()">Trigger Animation</button>
    <button onclick="resetAnimation()">Reset</button>

    <script>
      function triggerAnimation() {
        const el = document.getElementById("target");
        el.classList.remove("ease-focus-out");
        // Force reflow so re-adding the class re-triggers the animation
        void el.offsetWidth;
        el.classList.add("ease-focus-out");
      }

      function resetAnimation() {
        const el = document.getElementById("target");
        el.classList.remove("ease-focus-out");
        void el.offsetWidth;
      }
    </script>
  </body>
</html>
