<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board Sandbox — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #ffffff; padding: 4rem 1rem; margin: 0;">

  <div class="ease-kanban-viewport">
    
    <div class="ease-kanban-column" ondragover="allowDrop(event)" ondragenter="dragEnter(this)" ondragleave="dragLeave(this)" ondrop="handleDrop(event, this)">
      <div class="ease-column-header">
        <h3 class="ease-column-title">Backlog</h3>
        <span class="ease-column-badge">2</span>
      </div>
      <div class="ease-kanban-card-feed">
        <div class="ease-kanban-card" draggable="true" id="card1" ondragstart="dragStart(event)" ondragend="dragEnd(this)">
          <span class="ease-card-tag ease-tag-blue">Feature</span>
          <p class="ease-card-text">Configure global context provider variables</p>
        </div>
        <div class="ease-kanban-card" draggable="true" id="card2" ondragstart="dragStart(event)" ondragend="dragEnd(this)">
          <span class="ease-card-tag ease-tag-purple">Docs</span>
          <p class="ease-card-text">Refactor architecture migration outlines</p>
        </div>
      </div>
    </div>

    <div class="ease-kanban-column" ondragover="allowDrop(event)" ondragenter="dragEnter(this)" ondragleave="dragLeave(this)" ondrop="handleDrop(event, this)">
      <div class="ease-column-header">
        <h3 class="ease-column-title">In Progress</h3>
        <span class="ease-column-badge">1</span>
      </div>
      <div class="ease-kanban-card-feed">
        <div class="ease-kanban-card" draggable="true" id="card3" ondragstart="dragStart(event)" ondragend="dragEnd(this)">
          <span class="ease-card-tag ease-tag-blue">Design</span>
          <p class="ease-card-text">Optimize canvas interaction layer frames</p>
        </div>
      </div>
    </div>

    <div class="ease-kanban-column" ondragover="allowDrop(event)" ondragenter="dragEnter(this)" ondragleave="dragLeave(this)" ondrop="handleDrop(event, this)">
      <div class="ease-column-header">
        <h3 class="ease-column-title">Completed</h3>
        <span class="ease-column-badge">0</span>
      </div>
      <div class="ease-kanban-card-feed"></div>
    </div>

  </div>

  <script>
    function dragStart(e) {
      e.dataTransfer.setData("text/plain", e.target.id);
      // Timeout forces the visual shift to register cleanly after drag begins
      setTimeout(() => e.target.classList.add('is-dragging'), 0);
    }

    function dragEnd(card) {
      card.classList.remove('is-dragging');
    }

    function allowDrop(e) {
      e.preventDefault();
    }

    function dragEnter(column) {
      column.classList.add('is-dragging-over');
    }

    function dragLeave(column) {
      column.classList.remove('is-dragging-over');
    }

    function handleDrop(e, column) {
      e.preventDefault();
      column.classList.remove('is-dragging-over');
      
      const cardId = e.dataTransfer.getData("text/plain");
      const card = document.getElementById(cardId);
      const feed = column.querySelector('.ease-kanban-card-feed');
      
      if (card && feed) {
        feed.appendChild(card);
        updateBadges();
      }
    }

    function updateBadges() {
      document.querySelectorAll('.ease-kanban-column').forEach(col => {
        const count = col.querySelectorAll('.ease-kanban-card').length;
        col.querySelector('.ease-column-badge').textContent = count;
      });
    }
  </script>
</body>
</html>
