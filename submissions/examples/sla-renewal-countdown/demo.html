<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SLA Renewal Countdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="sla-shell" aria-labelledby="sla-title">
    <section class="sla-card">
      <div class="copy">
        <p class="eyebrow">customer success</p>
        <h1 id="sla-title">SLA renewal countdown</h1>
        <p>Animated countdown blocks highlight renewal urgency, contract health, and response coverage in one compact card.</p>
      </div>

      <div class="countdown" aria-label="SLA renewal countdown">
        <div class="time-block">
          <strong>07</strong>
          <span>days</span>
        </div>
        <div class="time-block">
          <strong>18</strong>
          <span>hours</span>
        </div>
        <div class="time-block">
          <strong>42</strong>
          <span>mins</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
