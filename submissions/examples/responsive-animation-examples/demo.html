<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Animation Examples</title>

    <!-- Replace with the project's official CDN if different -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Responsive Animation Demo</h1>
    <p>Resize the browser window to see the layout adapt.</p>
</header>

<div class="grid">

    <div class="card ease-fade-in">
        <h2>Fade In</h2>
        <p>Responsive animation example.</p>
    </div>

    <div class="card ease-slide-up">
        <h2>Slide Up</h2>
        <p>Works across different screen sizes.</p>
    </div>

    <div class="card ease-hover-grow">
        <h2>Hover Grow</h2>
        <p>Hover to view the animation effect.</p>
    </div>

</div>

</body>
</html>
