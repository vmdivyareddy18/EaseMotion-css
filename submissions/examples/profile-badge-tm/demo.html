<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Profile Badge Avatar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; align-items: center; min-height: 100vh; background: #f1f5f9; font-family: sans-serif; padding: 40px; }
  </style>
</head>
<body>

  <div class="badge-card">
    <div class="avatar-wrapper">
      <div class="avatar-img" style="background: linear-gradient(135deg, #4f46e5, #10b981);"></div>
      <span class="status-dot"></span>
    </div>
    <div class="badge-info">
      <h4>Aaniya Khan</h4>
      <p>Frontend Developer</p>
    </div>
  </div>

  <div class="badge-card">
    <div class="avatar-wrapper">
      <div class="avatar-img" style="background: linear-gradient(135deg, #f59e0b, #ef4444);"></div>
      <span class="status-dot" style="background: #94a3b8;"></span>
    </div>
    <div class="badge-info">
      <h4>Saptarshi Sadhu</h4>
      <p>Maintainer · EaseMotion CSS</p>
    </div>
  </div>

  <div class="badge-card">
    <div class="avatar-wrapper">
      <div class="avatar-img" style="background: linear-gradient(135deg, #8b5cf6, #ec4899);"></div>
      <span class="status-dot" style="background: #10b981;"></span>
    </div>
    <div class="badge-info">
      <h4>tmdeveloper007</h4>
      <p>Contributor · GSSoC-26</p>
    </div>
  </div>

</body>
</html>
