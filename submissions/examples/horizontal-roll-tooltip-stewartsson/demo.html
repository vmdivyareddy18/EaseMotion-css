<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub Terminal - Horizontal Roll Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyberpunk-viewport">
        <!-- Main Premium Cyberpunk Neon Card Elevation Container Hub Shell -->
        <div class="terminal-container-card">
            <header class="terminal-header">
                <div class="neon-matrix-badge">NODE: STREAM_ROLL</div>
                <h2 class="terminal-title">Biometric Stream</h2>
                <p class="terminal-subtitle">Hover over or interact with the core info link below to reveal the pure-CSS horizontal roll tooltip overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">🎛️</span>
                        <span class="btn-text">Engage Network Link</span>
                    </button>

                    <!-- Floating Tooltip Horizontal Roll Overlay Menu Shell Box -->
                    <div class="horizontal-roll-tooltip ease-horizontal-roll-fly">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Core Charge: 85%</span>
                            <span class="tooltip-meta">Quantum Sync Stable</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="terminal-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
