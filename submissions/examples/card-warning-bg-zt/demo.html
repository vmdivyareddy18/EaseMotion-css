<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Warning BG Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 2rem;
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
      .card {
        border: 1px solid #e2e8f0;
        border-radius: 1rem;
        padding: 1.5rem;
        max-width: 300px;
      }
      .card h3 {
        margin: 0 0 0.5rem;
      }
      .card p {
        margin: 0;
        color: #64748b;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <div class="card card-warning-bg-zt">
      <h3>Warning Card</h3>
      <p>This card uses a soft yellow warning background.</p>
    </div>
    <div class="card">
      <h3>Normal Card</h3>
      <p>Default card without background tint.</p>
    </div>
  </body>
</html>
