<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Search Bar Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🔍 Animated Search Bar Collection</h1>
        <p>Explore modern search input animations and interactions.</p>
    </header>

    <section class="search-gallery">

        <div class="search-card">
            <h3>Expandable Search</h3>
            <div class="search-box expand">
                <input type="text" placeholder="Search...">
            </div>
        </div>

        <div class="search-card">
            <h3>Floating Label Search</h3>
            <div class="floating-group">
                <input type="text" required>
                <label>Search Anything</label>
            </div>
        </div>

        <div class="search-card">
            <h3>Glassmorphism Search</h3>
            <div class="glass-search">
                <input type="text" placeholder="Search...">
            </div>
        </div>

        <div class="search-card">
            <h3>Underline Search</h3>
            <div class="underline-search">
                <input type="text" placeholder="Type to search">
            </div>
        </div>

    </section>

</div>

</body>
</html>
