<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Image Gradient</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section>
    <h1>Border Image</h1>
    <div class="card-grid">
      <div class="bordered-card conic">
        <h2>Conic Flow</h2>
        <p>A conic-gradient border-image that rotates continuously.</p>
      </div>
      <div class="bordered-card linear">
        <h2>Linear Sweep</h2>
        <p>A repeating-linear-gradient border-image that sweeps diagonally.</p>
      </div>
      <div class="bordered-card radial">
        <h2>Radial Pulse</h2>
        <p>A radial-gradient border-image that pulses with color.</p>
      </div>
    </div>
  </section>
</body>
</html>
