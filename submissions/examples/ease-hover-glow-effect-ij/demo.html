<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion: hover-glow-effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <h2>Glow Effect</h2>
    <p>Hover to reveal a soft radial glow. Tweak the color, size, and speed below.</p>
    <div class="controls">
      <label>Color <input type="color" id="glowColor" value="#48dbfb"></label>
      <label>Size <input type="range" id="glowSize" min="40" max="200" value="80"></label>
      <label>Speed <input type="range" id="glowDuration" min="0.1" max="2" step="0.1" value="0.4"></label>
    </div>
  </div>
  <script>
    const card = document.getElementById('card');

    document.getElementById('glowColor').addEventListener('input', e => {
      card.style.setProperty('--glow-color', e.target.value);
    });

    document.getElementById('glowSize').addEventListener('input', e => {
      card.style.setProperty('--glow-size', e.target.value + 'px');
    });

    document.getElementById('glowDuration').addEventListener('input', e => {
      card.style.setProperty('--glow-duration', e.target.value + 's');
    });
  </script>
</body>
</html>
