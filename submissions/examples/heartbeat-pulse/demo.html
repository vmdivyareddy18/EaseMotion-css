<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartbeat Pulse Animation Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      margin: 0;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    h2 {
      margin-bottom: 40px;
      font-weight: 400;
      color: #e0e0e0;
    }
    .demo-row {
      display: flex;
      gap: 60px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .label {
      font-size: 14px;
      color: #888;
    }
    /* Heart icon using CSS */
    .heart-icon {
      width: 60px;
      height: 60px;
      position: relative;
      display: inline-block;
    }
    .heart-icon::before,
    .heart-icon::after {
      content: '';
      width: 30px;
      height: 48px;
      position: absolute;
      left: 15px;
      top: 0;
      background: #e74c3c;
      border-radius: 30px 30px 0 0;
      transform: rotate(-45deg);
      transform-origin: 0 100%;
    }
    .heart-icon::after {
      left: 0;
      transform: rotate(45deg);
      transform-origin: 100% 100%;
    }
    .heart-icon.love::before,
    .heart-icon.love::after {
      background: #e91e63;
    }
    .heart-icon.health::before,
    .heart-icon.health::after {
      background: #00bcd4;
    }
    /* Like button */
    .like-btn {
      background: none;
      border: 2px solid #e74c3c;
      color: #e74c3c;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s ease;
    }
    .like-btn:hover {
      background: #e74c3c;
      color: white;
    }
    .like-btn.liked {
      background: #e74c3c;
      color: white;
    }
    /* Status indicator */
    .status-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00bcd4;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Heartbeat Pulse Animation</h2>
    
    <div class="demo-row">
      <!-- Heart Icon -->
      <div class="demo-item">
        <div class="heart-icon heartbeat-anim"></div>
        <span class="label">Default Heart</span>
      </div>
      
      <!-- Love Heart -->
      <div class="demo-item">
        <div class="heart-icon love heartbeat-anim"></div>
        <span class="label">Love Heart</span>
      </div>
      
      <!-- Health Indicator -->
      <div class="demo-item">
        <div class="status-dot heartbeat-anim"></div>
        <span class="label">Health Pulse</span>
      </div>
      
      <!-- Like Button -->
      <div class="demo-item">
        <button class="like-btn" id="likeBtn" onclick="toggleLike()">
          <span>❤️</span> Like
        </button>
        <span class="label">Click to pulse</span>
      </div>
    </div>
  </div>

  <script>
    function toggleLike() {
      const btn = document.getElementById('likeBtn');
      const heart = btn.querySelector('span');
      
      btn.classList.toggle('liked');
      
      if (btn.classList.contains('liked')) {
        heart.classList.add('heartbeat-anim');
        btn.innerHTML = '<span class="heartbeat-anim">❤️</span> Liked';
      } else {
        btn.innerHTML = '<span>❤️</span> Like';
      }
    }
  </script>
</body>
</html>
