<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Member Directory - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="td-wrapper">
    <h1>Team Directory</h1>
    <div class="td-filters">
      <input type="text" class="td-search" id="searchInput" placeholder="Search by name..." autocomplete="off">
      <select class="td-select" id="roleFilter">
        <option value="all">All Roles</option>
        <option value="Developer">Developer</option>
        <option value="Designer">Designer</option>
        <option value="Manager">Manager</option>
        <option value="DevOps">DevOps</option>
        <option value="QA">QA</option>
      </select>
    </div>
    <div class="td-grid" id="teamGrid"></div>
  </div>

  <script>
    const team = [
      { name: 'Alice Chen', role: 'Developer', bio: 'Full-stack engineer passionate about React and Node.js.', initials: 'AC' },
      { name: 'Bob Martinez', role: 'Designer', bio: 'UI/UX designer crafting pixel-perfect interfaces.', initials: 'BM' },
      { name: 'Carol Smith', role: 'Manager', bio: 'Agile coach leading cross-functional teams.', initials: 'CS' },
      { name: 'David Kim', role: 'Developer', bio: 'Backend specialist in Go and distributed systems.', initials: 'DK' },
      { name: 'Eve Johnson', role: 'QA', bio: 'Quality advocate automating test pipelines.', initials: 'EJ' },
      { name: 'Frank Lee', role: 'DevOps', bio: 'Cloud infrastructure engineer and CI/CD expert.', initials: 'FL' },
      { name: 'Grace Patel', role: 'Designer', bio: 'Brand designer with a love for motion graphics.', initials: 'GP' },
      { name: 'Henry Wu', role: 'Developer', bio: 'Frontend developer focused on performance.', initials: 'HW' },
    ];

    const grid = document.getElementById('teamGrid');
    const searchInput = document.getElementById('searchInput');
    const roleFilter = document.getElementById('roleFilter');

    function render() {
      const query = searchInput.value.toLowerCase().trim();
      const role = roleFilter.value;

      const filtered = team.filter(m => {
        const matchName = m.name.toLowerCase().includes(query);
        const matchRole = role === 'all' || m.role === role;
        return matchName && matchRole;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="td-empty">No team members match your filters.</p>';
        return;
      }

      grid.innerHTML = filtered.map(m => `
        <div class="td-card">
          <div class="td-avatar">${m.initials}</div>
          <h3 class="td-name">${m.name}</h3>
          <span class="td-role">${m.role}</span>
          <p class="td-bio">${m.bio}</p>
        </div>
      `).join('');
    }

    searchInput.addEventListener('input', render);
    roleFilter.addEventListener('change', render);

    render();
  </script>
</body>
</html>
