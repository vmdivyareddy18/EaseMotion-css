<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart Icon Bounce - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Cart Icon Bounce</h1>

    <div class="cart-card">
      <div class="cart-icon">
        <div class="cart-body"></div>
        <div class="cart-handle left"></div>
        <div class="cart-handle right"></div>
        <div class="cart-badge">1</div>
      </div>
      <span class="cart-label">Add to Cart</span>
      <button class="cart-btn">Add Item</button>
    </div>

    <div class="variant-row">
      <div class="cart-card sm">
        <div class="cart-icon">
          <div class="cart-body"></div>
          <div class="cart-handle left"></div>
          <div class="cart-handle right"></div>
          <div class="cart-badge show">3</div>
        </div>
        <span class="cart-label">In Cart</span>
      </div>
    </div>

    <p class="description">The shopping cart body bounces up and down when an item is added. A badge appears with a pop-in effect showing the item count.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
