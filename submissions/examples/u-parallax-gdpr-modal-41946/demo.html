<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax GDPR Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="bg-layer layer-one"></div>
    <div class="bg-layer layer-two"></div>

    <div class="gdpr-modal">

        <h2>Privacy & Cookies</h2>

        <p>
            We use cookies to improve your travel booking experience,
            personalize recommendations, and analyze site usage.
        </p>

        <div class="buttons">
            <button class="secondary">Customize</button>
            <button class="primary">Accept All</button>
        </div>

    </div>

</div>

</body>
</html>
