<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Auth Form — EaseMotion CSS</title>
  <meta name="description" content="Visual authentication form showcase demonstrating smooth tab sliding and input translation transitions.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Interactive</span>
      <h1>Auth Form Switcher</h1>
      <p class="description">
        Demonstrates form transitions. Click the tabs below to switch 
        between login and registration forms.
      </p>
    </header>

    <main class="showcase">
      <div class="auth-card" id="auth-card">
        <!-- Tab Bar -->
        <div class="tab-bar">
          <div class="tab-slide-bg" id="tab-bg"></div>
          <button class="tab-btn active" id="tab-login">Login</button>
          <button class="tab-btn" id="tab-signup">Sign Up</button>
        </div>

        <!-- Form Wrapper -->
        <div class="form-viewport">
          <div class="form-slider" id="form-slider">
            <!-- Login Form -->
            <form class="auth-form" onsubmit="event.preventDefault();">
              <h2>Welcome Back</h2>
              <div class="input-group">
                <input type="email" placeholder="Email Address" required>
              </div>
              <div class="input-group">
                <input type="password" placeholder="Password" required>
              </div>
              <button class="submit-btn" type="submit">Sign In</button>
            </form>

            <!-- Signup Form -->
            <form class="auth-form" onsubmit="event.preventDefault();">
              <h2>Create Account</h2>
              <div class="input-group">
                <input type="text" placeholder="Full Name" required>
              </div>
              <div class="input-group">
                <input type="email" placeholder="Email Address" required>
              </div>
              <div class="input-group">
                <input type="password" placeholder="Password" required>
              </div>
              <button class="submit-btn" type="submit">Get Started</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const tabBg = document.getElementById('tab-bg');
    const slider = document.getElementById('form-slider');

    tabLogin.addEventListener('click', () => {
      tabLogin.classList.add('active');
      tabSignup.classList.remove('active');
      tabBg.style.left = '4px';
      slider.style.transform = 'translateX(0)';
    });

    tabSignup.addEventListener('click', () => {
      tabSignup.classList.add('active');
      tabLogin.classList.remove('active');
      tabBg.style.left = 'calc(50% - 4px)';
      slider.style.transform = 'translateX(-50%)';
    });
  </script>

</body>
</html>
