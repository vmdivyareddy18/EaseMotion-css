<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Container Queries Demo</title>
</head>
<body>
  <h1>Container Queries</h1>
  <p>Resize the dashed box horizontally to trigger the card layout change.</p>
  
  <div class="card-container">
    <div class="card">
      <h3>Card Content</h3>
      <p>This layout shifts when the parent container exceeds 400px.</p>
    </div>
  </div>
</body>
