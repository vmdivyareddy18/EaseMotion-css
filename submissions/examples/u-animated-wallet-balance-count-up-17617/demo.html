<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Wallet Balance Count-Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Wallet Balance Count-Up</h1>

  <p class="intro">
    A reusable wallet balance animation for fintech apps,
    banking dashboards, digital wallets, and payment systems.
  </p>

  <div class="demo-grid">

    <div class="wallet-card">
      <div class="wallet-balance">
        <span class="wallet">👛</span>
        <span class="amount">₹5,000</span>
      </div>
      <h3>Cashback Added</h3>
    </div>

    <div class="wallet-card">
      <div class="wallet-balance large">
        <span class="wallet">👛</span>
        <span class="amount">₹12,500</span>
      </div>
      <p>Wallet Updated</p>
    </div>

    <div class="wallet-card">
      <div class="wallet-balance">
        <span class="wallet">👛</span>
        <span class="amount">₹8,750</span>
      </div>
      <button>View Balance</button>
    </div>

  </div>

</main>

</body>
</html>
