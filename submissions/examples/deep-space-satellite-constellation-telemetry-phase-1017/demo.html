<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deep-Space Satellite Constellation Telemetry - Phase #1017</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="telemetry-wrapper em-fade-in">
        
        <header class="telemetry-header">
            <div class="branding">
                <div class="pulse-indicator em-status-pulse"></div>
                <h1>ORBITALX <span class="accent-text">CONSTELLATION v1017</span></h1>
            </div>
            <div class="signal-strength">SIGNAL LOCK: <span class="geo-status">DEEP-SPACE STABLE</span></div>
        </header>

        <main class="telemetry-grid">
            
            <section class="telemetry-card em-slide-up-1">
                <div class="card-top">
                    <h2>CONSTELLATION METRICS</h2>
                    <span class="panel-tag">[SYS.NODE.0A]</span>
                </div>
                <div class="data-row">
                    <div class="data-block">
                        <span class="data-label">ACTIVE SATELLITES</span>
                        <span class="data-value dynamic-blue">72 / 72</span>
                    </div>
                    <div class="data-block">
                        <span class="data-label">DOWNLINK SPEED</span>
                        <span class="data-value">4.8 Gbps</span>
                    </div>
                </div>
                <div class="signal-wave-container">
                    <div class="wave-bar em-wave-pulse"></div>
                </div>
            </section>

            <section class="telemetry-card center-map em-slide-up-2">
                <div class="card-top">
                    <h2>DEEP-SPACE TELEMETRY MAP</h2>
                    <span class="panel-tag">LIVE CONSTELLATION MESH</span>
                </div>
                <div class="space-simulation">
                    <div class="orbital-ring ring-1 em-spin-clockwise"></div>
                    <div class="orbital-ring ring-2 em-spin-counter"></div>
                    
                    <div class="sat-node sat-alpha em-orbital-float"></div>
                    <div class="sat-node sat-beta em-orbital-float-delayed"></div>
                    <div class="sat-node sat-gamma em-orbital-float"></div>
                </div>
                <div class="action-dock">
                    <button class="em-action-btn primary-action">SYNC TELEMETRY</button>
                    <button class="em-action-btn secondary-action">ISOLATE NODE</button>
                </div>
            </section>

            <section class="telemetry-card em-slide-up-3">
                <div class="card-top">
                    <h2>TRANSPONDER STREAM</h2>
                    <span class="panel-tag">[LINK.STREAMS]</span>
                </div>
                <div class="stream-container">
                    <div class="stream-item em-interactive-slide">
                        <span class="stream-id">SAT-101a</span>
                        <span class="stream-badge status-good">NOMINAL</span>
                    </div>
                    <div class="stream-item em-interactive-slide">
                        <span class="stream-id">SAT-101b</span>
                        <span class="stream-badge status-warn">PING DELAY</span>
                    </div>
                    <div class="stream-item em-interactive-slide">
                        <span class="stream-id">SAT-102a</span>
                        <span class="stream-badge status-good">NOMINAL</span>
                    </div>
                </div>
            </section>

        </main>
    </div>

</body>
</html>
