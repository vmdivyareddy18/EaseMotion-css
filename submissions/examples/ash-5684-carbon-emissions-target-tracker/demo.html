<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon Emissions Target Tracker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Carbon Emissions Target Tracker</h1>

        <p class="subtitle">
            Monitor annual carbon reduction progress toward sustainability goals.
        </p>

        <div class="tracker">

            <div class="ring">

                <div class="inner">

                    <strong>74%</strong>

                    <span>Target Achieved</span>

                </div>

            </div>

            <div class="details">

                <div class="metric">

                    <span>Current Emissions</span>

                    <strong>2,840 tCO₂e</strong>

                </div>

                <div class="metric">

                    <span>Target</span>

                    <strong>2,100 tCO₂e</strong>

                </div>

                <div class="metric">

                    <span>Reduction</span>

                    <strong class="positive">-18%</strong>

                </div>

            </div>

        </div>

        <div class="progress">

            <div class="label">

                <span>Annual Progress</span>

                <strong>74%</strong>

            </div>

            <div class="bar">

                <div class="fill"></div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Trees Equivalent</span>

                <strong>1,920</strong>

            </div>

            <div class="stat">

                <span>Remaining Goal</span>

                <strong>26%</strong>

            </div>

            <div class="stat">

                <span>Status</span>

                <strong class="positive">On Track</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
