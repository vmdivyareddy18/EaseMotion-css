<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optimized Responsive Header Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="app-navbar">
    <div class="nav-constrainer">
      
      <a href="#home" class="nav-logo">
        <span class="logo-accent">Ease</span>Motion
      </a>

      <input type="checkbox" id="mobile-menu-toggle" class="drawer-gate-input" hidden>

      <label for="mobile-menu-toggle" class="hamburger-trigger-btn" aria-label="Toggle navigation viewport options" role="button" tabindex="0" onkeydown="if(event.key === ' ' || event.key === 'Enter') { this.click(); event.preventDefault(); }">
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
      </label>

      <label for="mobile-menu-toggle" class="drawer-backdrop-shroud"></label>

      <nav class="navigation-links-menu">
        <ul class="nav-links-list">
          <li><a href="#home" class="nav-item-link link-active">Home</a></li>
          <li><a href="#components" class="nav-item-link">Components</a></li>
          <li><a href="#animations" class="nav-item-link">Animations</a></li>
          <li><a href="#docs" class="nav-item-link">Documentation</a></li>
          <li><a href="#github" class="nav-cta-btn">View GitHub</a></li>
        </ul>
      </nav>

    </div>
  </header>

  <main class="page-body-context">
    <section class="viewport-card">
      <h1>Header Optimization Frame</h1>
      <p>Resize your browser screen width below <strong>768px</strong> to witness the structural shift into a mobile menu drawer.</p>
    </section>
  </main>

</body>
</html>
