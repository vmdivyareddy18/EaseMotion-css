<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Incident Escalation Path Cards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="incident-title">
      <p class="eyebrow">Incident response</p>
      <h1 id="incident-title">Escalation path</h1>
      <div class="escalation-path">
        <article class="path-card is-done">Detected<span>Monitor alert</span></article>
        <article class="path-card is-done">Triaged<span>Owner assigned</span></article>
        <article class="path-card is-active">Escalated<span>On-call engaged</span></article>
        <article class="path-card">Mitigated<span>Fix pending</span></article>
        <article class="path-card">Resolved<span>Postmortem</span></article>
      </div>
    </section>
  </main>
</body>
</html>
