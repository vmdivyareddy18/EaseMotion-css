<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Zoom-Out Modal - Neumorphic Soft Layout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <input type="checkbox" id="modal-toggle" hidden>

  <label for="modal-toggle" class="open-btn">
    Open Modal
  </label>

  <div class="overlay">
    <div class="modal" tabindex="0">

      <h2>Zoom-Out Modal</h2>

      <p>
        A responsive <strong>CSS-only</strong> modal featuring a smooth
        <strong>Zoom-Out</strong> transition with a soft neumorphic design.
        No JavaScript required.
      </p>

      <div class="actions">
        <label for="modal-toggle" class="secondary-btn">
          Close
        </label>

        <button class="primary-btn">
          Continue
        </button>
      </div>

    </div>
  </div>

</body>
</html>
