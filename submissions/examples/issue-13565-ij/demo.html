<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-counter-badge-pop - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-counter-badge-pop</h1>
    <p class="description">Counter badge pops on value change with scale animation and color flash.</p>

    <div class="badge-demo">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
        <span class="ease-counter-badge-pop" id="badge">0</span>
      </div>
      <div class="badge-controls">
        <button onclick="changeCount(-1)">−</button>
        <span id="countDisplay" style="min-width:24px;text-align:center;">0</span>
        <button onclick="changeCount(1)">+</button>
      </div>
    </div>
  </div>

  <script>
    let count = 0;

    function changeCount(delta) {
      count = Math.max(0, count + delta);
      const badge = document.getElementById('badge');
      const display = document.getElementById('countDisplay');

      if (count === 0) {
        badge.textContent = '0';
        display.textContent = '0';
        return;
      }

      badge.textContent = count;
      display.textContent = count;

      badge.classList.remove('pop', 'flash');
      void badge.offsetWidth;
      badge.classList.add('pop');

      if (delta > 0) {
        badge.classList.add('flash');
        setTimeout(() => badge.classList.remove('flash'), 400);
      }
    }

    changeCount(5);
  </script>
</body>
</html>
