<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - Minimalist Tech Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="tech-container">
    <header class="tech-header">
      <div class="terminal-badge">SYS.STATUS: ACTIVE</div>
      <h1>Minimalist Tech Panel</h1>
      <p>Hover to reveal, then click and hold the tech nodes to trigger the CSS Tada animation effect.</p>
    </header>

    <div class="tech-grid">
      <div class="tech-card">
        <div class="card-meta">NODE_01</div>
        <button class="tech-btn tooltip-container" aria-describedby="tip-build">
          Execute Build
          <span id="tip-build" class="tooltip" role="tooltip">
            🎉 Production build compiled successfully!
          </span>
        </button>
      </div>

      <div class="tech-card">
        <div class="card-meta">NODE_02</div>
        <button class="tech-btn tooltip-container" aria-describedby="tip-deploy">
          Push to Edge
          <span id="tip-deploy" class="tooltip" role="tooltip">
            🚀 Deployed to 42 edge locations global!
          </span>
        </button>
      </div>
    </div>
  </main>

</body>
</html>
