<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tilt Diff Viewer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="viewer ease-fade-in">

    <h2>Finance Dashboard Diff</h2>

    <div class="diff-card">

        <div class="panel before">
            <h3>Before</h3>
            <p>Revenue: $42,300</p>
            <p>Expenses: $28,100</p>
            <p>Profit: $14,200</p>
        </div>

        <div class="divider"></div>

        <div class="panel after">
            <h3>After</h3>
            <p>Revenue: $49,800</p>
            <p>Expenses: $27,000</p>
            <p>Profit: $22,800</p>
        </div>

    </div>

</div>

</body>
</html>
