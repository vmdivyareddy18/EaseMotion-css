<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Feature Showcase Carousel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>3D Feature Showcase Carousel</h1>

    <p class="subtitle">
        Hover over a feature card to bring it into focus.
    </p>

    <div class="carousel">

        <div class="feature-card">
            <span class="icon">⚡</span>
            <h3>Performance</h3>
            <p>Optimized animations and utilities.</p>
        </div>

        <div class="feature-card">
            <span class="icon">🎨</span>
            <h3>Design</h3>
            <p>Modern and beautiful interfaces.</p>
        </div>

        <div class="feature-card">
            <span class="icon">🚀</span>
            <h3>Productivity</h3>
            <p>Build faster with reusable motion.</p>
        </div>

    </div>

</div>

</body>
</html>
