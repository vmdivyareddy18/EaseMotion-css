<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="orbit-wrapper">

    <button class="orbit-btn">
        Launch Panel
    </button>

    <div class="popover" role="dialog" aria-label="Interactive Panel">

        <h3>Interactive Workspace</h3>

        <p>
            Hover to explore quick actions and interactive tools.
        </p>

        <div class="chips">
            <span>Analytics</span>
            <span>Widgets</span>
            <span>Insights</span>
        </div>

    </div>

</div>

</body>
</html>
