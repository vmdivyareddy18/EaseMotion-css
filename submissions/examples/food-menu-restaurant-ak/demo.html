<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Menu Restaurant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="menu-header">
      <h1 class="title">The Rustic Kitchen</h1>
      <p class="subtitle">Seasonal & Artisanal</p>
    </div>

    <div class="category-tabs" id="categoryTabs">
      <button class="cat-tab active" data-cat="all">All</button>
      <button class="cat-tab" data-cat="starters">Starters</button>
      <button class="cat-tab" data-cat="mains">Mains</button>
      <button class="cat-tab" data-cat="desserts">Desserts</button>
      <button class="cat-tab" data-cat="drinks">Drinks</button>
    </div>

    <div class="menu-grid" id="menuGrid"></div>
  </div>
  <script>
    const menu = [
      { name: 'Bruschetta', desc: 'Grilled sourdough with tomato, basil & balsamic', price: 9.50, cat: 'starters' },
      { name: 'Calamari', desc: 'Crispy squid with lemon aioli', price: 12.00, cat: 'starters' },
      { name: 'Soup of the Day', desc: 'Seasonal vegetables in herb broth', price: 8.00, cat: 'starters' },
      { name: 'Grilled Salmon', desc: 'Atlantic salmon with asparagus & dill butter', price: 24.00, cat: 'mains' },
      { name: 'Steak Frites', desc: 'Ribeye with hand-cut fries & peppercorn sauce', price: 28.00, cat: 'mains' },
      { name: 'Mushroom Risotto', desc: 'Arborio rice with wild mushrooms & truffle oil', price: 18.00, cat: 'mains' },
      { name: 'Chicken Milanese', desc: 'Parmesan-crusted chicken with arugula salad', price: 20.00, cat: 'mains' },
      { name: 'Tiramisu', desc: 'Classic Italian coffee-infused dessert', price: 10.00, cat: 'desserts' },
      { name: 'Panna Cotta', desc: 'Vanilla bean panna cotta with berry compote', price: 9.00, cat: 'desserts' },
      { name: 'Chocolate Lava Cake', desc: 'Warm chocolate cake with vanilla ice cream', price: 11.00, cat: 'desserts' },
      { name: 'Espresso', desc: 'Double shot of house blend', price: 4.00, cat: 'drinks' },
      { name: 'Craft Lemonade', desc: 'Fresh-squeezed with mint & ginger', price: 5.50, cat: 'drinks' },
      { name: 'Red Wine', desc: 'Glass of Cabernet Sauvignon', price: 9.00, cat: 'drinks' },
    ];

    const menuGrid = document.getElementById('menuGrid');
    const categoryTabs = document.getElementById('categoryTabs');

    function renderMenu(category) {
      const filtered = category === 'all' ? menu : menu.filter(item => item.cat === category);
      menuGrid.innerHTML = filtered.map(item => `
        <div class="menu-item">
          <div class="menu-item-info">
            <h3 class="menu-item-name">${item.name}</h3>
            <p class="menu-item-desc">${item.desc}</p>
          </div>
          <span class="menu-item-price">$${item.price.toFixed(2)}</span>
        </div>
      `).join('');
    }

    categoryTabs.addEventListener('click', (e) => {
      const tab = e.target.closest('.cat-tab');
      if (!tab) return;
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderMenu(tab.dataset.cat);
    });

    renderMenu('all');
  </script>
</body>
</html>
