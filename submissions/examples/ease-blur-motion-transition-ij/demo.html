<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-blur-motion-transition</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    p { font-size: 0.9rem; color: #888; margin-bottom: 2rem; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .controls button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { background: #333; border-color: #888; }
    .playground { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    .stage {
      position: relative;
      width: 400px;
      height: 300px;
      border: 1px solid #333;
      border-radius: 16px;
      background: #161616;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ball {
      --blur-amount: 8px;
      --transition-duration: 0.6s;
      --blur-color: #a29bfe;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--blur-color);
      transition: transform var(--transition-duration) ease, filter var(--transition-duration) ease, background var(--transition-duration) ease;
    }
    .ball.moving { transform: translateX(120px); }
    .slider-group { display: flex; align-items: center; gap: 0.75rem; }
    .slider-group label { font-size: 0.85rem; color: #aaa; min-width: 8rem; }
    .slider-group input[type="range"] { width: 140px; accent-color: var(--blur-color, #a29bfe); }
    .slider-group output { font-size: 0.8rem; color: #888; min-width: 3rem; text-align: right; }
    .color-group { display: flex; align-items: center; gap: 0.75rem; }
    .color-group label { font-size: 0.85rem; color: #aaa; }
    .color-group input[type="color"] { width: 40px; height: 32px; border: 1px solid #444; border-radius: 4px; background: transparent; cursor: pointer; }
    .hint { font-size: 0.8rem; color: #555; margin-top: 0.5rem; }
  </style>
</head>
<body>

  <h1>ease-blur-motion-transition</h1>
  <p>Motion blur transition effect when elements change state</p>

  <div class="controls">
    <button id="moveBtn">⟷ Toggle Move</button>
    <button id="recolorBtn">✦ Recolor</button>
  </div>

  <div class="playground">
    <div class="stage">
      <div class="ball ease-blur-motion-transition" id="ball"></div>
    </div>

    <div class="slider-group">
      <label for="blurRange">--blur-amount</label>
      <input type="range" id="blurRange" min="0" max="20" value="8" step="0.5" />
      <output id="blurVal">8px</output>
    </div>

    <div class="slider-group">
      <label for="durRange">--transition-duration</label>
      <input type="range" id="durRange" min="0.1" max="2" value="0.6" step="0.1" />
      <output id="durVal">0.6s</output>
    </div>

    <div class="color-group">
      <label for="colorPicker">--blur-color</label>
      <input type="color" id="colorPicker" value="#a29bfe" />
    </div>

    <p class="hint">Applies directional motion blur during transitions</p>
  </div>

  <script>
    (function() {
      var ball = document.getElementById('ball');
      var moveBtn = document.getElementById('moveBtn');
      var recolorBtn = document.getElementById('recolorBtn');
      var blurRange = document.getElementById('blurRange');
      var blurVal = document.getElementById('blurVal');
      var durRange = document.getElementById('durRange');
      var durVal = document.getElementById('durVal');
      var colorPicker = document.getElementById('colorPicker');
      var moved = false;

      var colors = ['#a29bfe','#fd79a8','#ffeaa7','#00cec9','#fab1a0','#81ecec'];

      function updateBlur(val) {
        blurVal.textContent = val + 'px';
        ball.style.setProperty('--blur-amount', val + 'px');
      }
      function updateDuration(val) {
        durVal.textContent = val + 's';
        ball.style.setProperty('--transition-duration', val + 's');
      }
      function updateColor(val) {
        ball.style.setProperty('--blur-color', val);
      }

      updateBlur(blurRange.value);
      updateDuration(durRange.value);
      updateColor(colorPicker.value);

      moveBtn.addEventListener('click', function() {
        moved = !moved;
        ball.classList.toggle('moving', moved);
        moveBtn.textContent = moved ? '⟷ Move back' : '⟷ Toggle Move';
      });

      recolorBtn.addEventListener('click', function() {
        var c = colors[Math.floor(Math.random() * colors.length)];
        updateColor(c);
        colorPicker.value = c;
      });

      blurRange.addEventListener('input', function() { updateBlur(this.value); });
      durRange.addEventListener('input', function() { updateDuration(this.value); });
      colorPicker.addEventListener('input', function() { updateColor(this.value); });
    })();
  </script>
</body>
</html>
