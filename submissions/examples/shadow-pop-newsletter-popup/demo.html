<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Pop Newsletter Popup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="popup ease-shadow-pop">

        <div class="icon">🏦</div>

        <h2>Stay Updated</h2>

        <p>
            Subscribe to receive banking news, financial insights,
            security alerts and exclusive offers.
        </p>

        <form>
            <input
                type="email"
                placeholder="Enter your email"
                aria-label="Email address"
                required
            >

            <button type="submit">
                Subscribe
            </button>
        </form>

    </div>

</div>

</body>
</html>
