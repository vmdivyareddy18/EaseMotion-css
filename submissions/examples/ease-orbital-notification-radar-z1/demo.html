<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Orbital Notification Radar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="radar-card">

  <section class="radar">
    <span class="ring r1"></span>
    <span class="ring r2"></span>
    <span class="ring r3"></span>

    <span class="beam"></span>
    <span class="ping p1"></span>
    <span class="ping p2"></span>

    <div class="core"></div>
  </section>

  <h2>Notifications Scanning</h2>
  <p>Monitoring incoming events in real time.</p>

</main>

</body>
</html>
