<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EaseMotion CSS — Animated Logo Carousel Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <h1>Animated Logo Carousel</h1>
    <p class="demo-subtitle">
      Seamless infinite scroll for "Trusted By" sections. Hover or
      focus to pause.
    </p>

    <div class="logo-carousel" tabindex="0" aria-label="Client logos, scrolling">
      <div class="logo-track">
        <!-- Original set -->
        <div class="logo-item"><span class="demo-logo-placeholder">NOVA</span></div>
        <div class="logo-item"><span class="demo-logo-placeholder">ZENITH</span></div>
        <div class="logo-item"><span class="demo-logo-placeholder">ORBIT</span></div>
        <div class="logo-item"><span class="demo-logo-placeholder">PULSE</span></div>
        <div class="logo-item"><span class="demo-logo-placeholder">ATLAS</span></div>
        <div class="logo-item"><span class="demo-logo-placeholder">FORGE</span></div>

        <!-- Duplicated set — required for the seamless -50% loop -->
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">NOVA</span></div>
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">ZENITH</span></div>
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">ORBIT</span></div>
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">PULSE</span></div>
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">ATLAS</span></div>
        <div class="logo-item" aria-hidden="true"><span class="demo-logo-placeholder">FORGE</span></div>
      </div>
    </div>
  </main>
</body>
</html>
