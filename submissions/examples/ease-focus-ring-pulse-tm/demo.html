<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Ring Pulse</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Focus Ring Pulse</h1>
  <p>Accessible, animated focus indicators for keyboard navigation.</p>
  <div class="demo-section">
    <h2>Buttons</h2>
    <div class="button-row">
      <button>Primary</button>
      <button class="secondary">Secondary</button>
      <button class="ghost">Ghost</button>
      <button class="icon-btn">&#9884;</button>
    </div>
  </div>
  <div class="demo-section">
    <h2>Form Inputs</h2>
    <div class="form-demo">
      <label>Name<input type="text" placeholder="Focus me with Tab"></label>
      <label>Email<input type="email" placeholder="email@example.com"></label>
      <label><input type="checkbox" id="check1"><span class="custom-checkbox"></span> Accept terms</label>
    </div>
  </div>
</div>
</body></html>
