<!DOCTYPE html>
<html>
<head>
  <title>Split Button UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Select View Mode</h2>

<div class="segment">
  <button class="active" onclick="select(this)">List</button>
  <button onclick="select(this)">Grid</button>
  <button onclick="select(this)">Card</button>
</div>

<p id="output">Selected: List</p>

<script>
function select(btn) {
  let buttons = document.querySelectorAll(".segment button");
  buttons.forEach(b => b.classList.remove("active"));
  
  btn.classList.add("active");
  document.getElementById("output").innerText = "Selected: " + btn.innerText;
}
</script>

</body>
</html>
