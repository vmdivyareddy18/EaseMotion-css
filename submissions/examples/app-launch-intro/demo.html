<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Launch Intro Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo stage presenting a mobile mockup canvas */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-phone-canvas">
    
    <div class="phone-status-bar">
      <span>9:41</span>
      <div class="status-icons">📶 🔋</div>
    </div>

    <div class="ease-app-launch-screen" role="region" aria-label="Application Onboarding Intro Sequence">
      
      <div class="ease-intro-logo-node">
        <div class="logo-icon-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
          </svg>
        </div>
      </div>

      <div class="ease-intro-content-wrapper">
        <h1 class="ease-intro-title">Velocity Grid</h1>
        <p class="ease-intro-body">Deploy modular utility engines with optimized hardware performance loops instantly.</p>
      </div>

      <div class="ease-intro-action-tray">
        <button class="ease-btn-primary" tabindex="0">Get Started</button>
        <button class="ease-btn-secondary" tabindex="0">Sign In</button>
      </div>

    </div>
  </div>

</body>
</html>
