<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Slide-Right Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Neumorphic Soft Layout

</span>

<h1>

Slide-Right Modal

</h1>

<p>

A soft neumorphic modal
component with a smooth
slide-right entrance effect
for modern interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

☁️

</div>

<h2>

Soft Experience

</h2>

<p>

Enhance user experiences
using subtle shadows,
smooth transitions and
neumorphic styling.

</p>

<button>

Learn More

</button>

</div>

</div>

</div>

</section>

</body>

</html>
