<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing SVG Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Click and hold (or tap) to see the morphing effect -->
    <button class="morph-btn">
      <span class="btn-text">Submit</span>
      <svg class="morph-svg" viewBox="0 0 40 40">
        <path class="circle" d="M20,20 m-15,0 a15,15 0 1,0 30,0 a15,15 0 1,0 -30,0" />
        <path class="check" d="M12,20 l6,6 l12,-12" />
      </svg>
    </button>
  </div>
</body>
</html>
