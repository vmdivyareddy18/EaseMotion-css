<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Button Hover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="panel">
      <header class="panel-header">
        <p class="eyebrow">Interactive motion</p>
        <h1>Magnetic Button Hover</h1>
        <p class="intro">
          A modern call-to-action button that subtly moves toward your cursor while hovering, then springs back naturally when the pointer leaves.
        </p>
      </header>

      <div class="demo-group">
        <button class="magnetic-button" type="button">
          Launch Experience
        </button>
      </div>
    </section>
  </main>

  <script>
    const button = document.querySelector('.magnetic-button');

    // Disable magnetic movement on touch and coarse-pointer devices.
    const touchDevice = window.matchMedia('(pointer: coarse)').matches || 'ontouchstart' in window;

    if (!touchDevice && button) {
      const MAX_MOVEMENT = 18; // Limit movement for a natural result.

      button.addEventListener('mousemove', (event) => {
        const rect = button.getBoundingClientRect();

        // Calculate the center of the button.
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // Cursor offset from the button center.
        const offsetX = event.clientX - centerX;
        const offsetY = event.clientY - centerY;

        // Normalize the offset to a range between -1 and 1.
        const normalizedX = Math.max(-1, Math.min(1, offsetX / (rect.width / 2)));
        const normalizedY = Math.max(-1, Math.min(1, offsetY / (rect.height / 2)));

        // Apply a limited magnetic translation toward the cursor.
        const translateX = normalizedX * MAX_MOVEMENT;
        const translateY = normalizedY * MAX_MOVEMENT;

        button.style.transform = `translate3d(${translateX}px, ${translateY}px, 0)`;
      });

      button.addEventListener('mouseleave', () => {
        // Animate back to the original position when the cursor leaves.
        button.style.transform = 'translate3d(0, 0, 0)';
      });

      window.addEventListener('blur', () => {
        button.style.transform = 'translate3d(0, 0, 0)';
      });
    }
  </script>
</body>
</html>
