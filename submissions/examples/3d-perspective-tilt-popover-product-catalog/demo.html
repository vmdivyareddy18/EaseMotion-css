<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Perspective Tilt Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="demo">
    <div class="tilt-popover">

      <button class="tilt-trigger">
        Product Details
      </button>

      <div class="tilt-content">
        <h2>Premium Headphones</h2>
        <p>
          Experience immersive sound with advanced noise cancellation
          and a comfortable lightweight design.
        </p>

        <span class="price">$199</span>
      </div>

    </div>
  </main>

</body>
</html>
