<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Gradient BG Shimmer</title>
</head>
<body>
  <div class="shimmer-page" id="shimmerPage">
    <div class="shimmer-content">
      <h1>Gradient BG Shimmer</h1>
      <p class="shimmer-sub">An animated gradient background with a flowing shimmer effect.</p>

      <div class="shimmer-controls">
        <button class="shimmer-btn" data-preset="ocean">Ocean</button>
        <button class="shimmer-btn" data-preset="sunset">Sunset</button>
        <button class="shimmer-btn" data-preset="forest">Forest</button>
        <button class="shimmer-btn" data-preset="neon">Neon</button>
        <button class="shimmer-btn" data-preset="lavender">Lavender</button>
      </div>

      <div class="shimmer-controls">
        <button class="shimmer-btn toggle-btn" id="toggleBtn">Pause</button>
      </div>
    </div>
  </div>
  <script>
    const page = document.getElementById('shimmerPage');
    const toggleBtn = document.getElementById('toggleBtn');
    const root = document.documentElement;

    const presets = {
      ocean:   { c1: '#0c3b5a', c2: '#1a6b8a', c3: '#3b9ec4', angle: '135deg' },
      sunset:  { c1: '#2d1b3d', c2: '#c73e3e', c3: '#e8a44a', angle: '45deg' },
      forest:  { c1: '#0a2e1a', c2: '#1e5c3a', c3: '#4a9e6a', angle: '120deg' },
      neon:    { c1: '#0d0221', c2: '#4a0e6b', c3: '#00f5d4', angle: '160deg' },
      lavender:{ c1: '#1a0e2e', c2: '#5b3a8a', c3: '#c4a0e8', angle: '90deg' },
    };

    let isAnimating = true;

    function applyPreset(name) {
      const p = presets[name];
      if (!p) return;
      root.style.setProperty('--grad-color-1', p.c1);
      root.style.setProperty('--grad-color-2', p.c2);
      root.style.setProperty('--grad-color-3', p.c3);
      root.style.setProperty('--grad-angle', p.angle);
    }

    document.querySelectorAll('[data-preset]').forEach(btn => {
      btn.addEventListener('click', () => {
        applyPreset(btn.dataset.preset);
        document.querySelectorAll('[data-preset]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    toggleBtn.addEventListener('click', () => {
      isAnimating = !isAnimating;
      page.classList.toggle('paused', !isAnimating);
      toggleBtn.textContent = isAnimating ? 'Pause' : 'Play';
    });

    applyPreset('ocean');
    document.querySelector('[data-preset="ocean"]').classList.add('active');
  </script>
</body>
</html>
