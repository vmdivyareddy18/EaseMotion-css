<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Mode Visibility Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light">
<div class="container">
    <h1>UI Visibility Demo</h1>
    <p class="subtitle">
        Improved visibility for loading indicator and active tabs in both Light and Dark modes.
    </p>
    <button id="themeToggle" class="toggle-btn">
        🌙 Switch to Dark Mode
    </button>
    <div class="card">

        <h2>Tabs</h2>

        <div class="tabs">
            <button class="tab active">Active Tab</button>
            <button class="tab">Profile</button>
            <button class="tab">Settings</button>
        </div>
        <h2>Loading State</h2>
        <button class="loading-btn" disabled>
            <span class="spinner"></span>
            Loading...
        </button>
    </div>
</div>
<script>
const toggle = document.getElementById("themeToggle");
const body = document.body;

toggle.addEventListener("click", () => {

    if(body.classList.contains("light")){
        body.classList.remove("light");
        body.classList.add("dark");
        toggle.textContent = "☀ Switch to Light Mode";
    }else{
        body.classList.remove("dark");
        body.classList.add("light");
        toggle.textContent = "🌙 Switch to Dark Mode";
    }
});
</script>
</body>
</html>
