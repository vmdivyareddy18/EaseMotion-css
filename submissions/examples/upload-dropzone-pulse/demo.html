<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Dropzone Pulse Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="upload-page" aria-labelledby="upload-title">
    <section class="upload-card">
      <p class="eyebrow">Form component</p>
      <h1 id="upload-title">Upload Dropzone Pulse</h1>
      <label class="dropzone">
        <input type="file" aria-label="Upload files">
        <span class="upload-icon"></span>
        <strong>Drop files here</strong>
        <small>or choose a file from your device</small>
      </label>
      <div class="file-row" aria-label="Selected file examples">
        <span>brief.pdf</span>
        <span>preview.png</span>
        <span>tokens.css</span>
      </div>
    </section>
  </main>
</body>
</html>
