<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Center-Out Underline Hover Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 3rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .nav-bar {
      display: flex;
      gap: 2rem;
      justify-content: center;
      margin-top: 2rem;
      padding: 1.5rem 2rem;
      background-color: white;
      border-radius: 0.5rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }
    .nav-link {
      font-weight: 600;
      color: #6c63ff;
      font-size: 1.125rem;
      text-decoration: none;
    }
    .text-paragraph {
      line-height: 1.6;
      font-size: 1.125rem;
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Center-Out Underline</h1>
    <p>A classic, elegant hover effect for navigation links and inline text.</p>
    
    <nav class="nav-bar">
      <a href="#" class="hover-underline-grow nav-link">Home</a>
      <a href="#" class="hover-underline-grow nav-link">About</a>
      <a href="#" class="hover-underline-grow nav-link">Services</a>
      <a href="#" class="hover-underline-grow nav-link">Contact</a>
    </nav>

    <p class="text-paragraph">
      It also works perfectly inline. Try hovering over this 
      <a href="#" class="hover-underline-grow" style="color: #ef4444; font-weight: bold; text-decoration: none;">inline link</a> 
      to see how it respects the element's width and inherits its color automatically.
    </p>
  </div>
</body>
</html>
