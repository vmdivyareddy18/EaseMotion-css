<!DOCTYPE html>
<html lang="en">
<head>

  <title>EaseMotion - Interactive Cursor Proximity Grid</title>

</head>
<body>

  <div class="showcase-wrapper">

      <h1>Cursor-Proximity Kinetic Grid</h1>

    </header>

    <main class="proximity-grid-container">
      <div class="proximity-grid">
        <div class="proximity-card">Hover Me</div>
        <div class="proximity-card">Sibling Card</div>
        <div class="proximity-card">Sibling Card</div>
        <div class="proximity-card">Sibling Card</div>
      </div>
    </main>
  </div>
