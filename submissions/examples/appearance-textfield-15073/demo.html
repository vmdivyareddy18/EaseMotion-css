<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Appearance Textfield Demo</title>
</head>
<body>
  <h1>Appearance Textfield Utility</h1>
  <div class="input-group">
    <input type="number" class="appearance-textfield" placeholder="Type here...">
    <p>This input uses the textfield appearance to remove browser-default spinners on number inputs.</p>
  </div>
</body>
</html>
