<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-pull-to-refresh – Pull to Refresh Spinner</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Pull to Refresh
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Drag the slider to simulate a pull‑down gesture.
    </p>

    <!-- Spinner icon that reacts to progress -->
    <div class="ptr-spinner" style="--ease-pull-progress: 0;">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="16" fill="none" stroke="#3b82f6" stroke-width="3"
                stroke-dasharray="100.53" stroke-dashoffset="100.53"
                stroke-linecap="round" class="ptr-ring" />
      </svg>
      <span class="ptr-arrow">↓</span>
    </div>

    <!-- Progress slider (simulates touch distance) -->
    <div class="ease-mt-8">
      <label for="pull-slider" class="ease-text-sm ease-font-semibold">
        Pull Progress: <span id="progress-label">0%</span>
      </label>
      <input type="range" id="pull-slider" min="0" max="100" value="0"
             class="ease-w-64 ease-mt-2 ease-mx-auto ease-block">
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      CSS reads <code>--ease-pull-progress</code> (0–100) to rotate & fill the ring.
    </p>
  </div>

  <script>
    const slider = document.getElementById('pull-slider');
    const spinner = document.querySelector('.ptr-spinner');
    const label = document.getElementById('progress-label');

    slider.addEventListener('input', () => {
      const val = slider.value;
      label.textContent = val + '%';
      spinner.style.setProperty('--ease-pull-progress', val / 100);
    });
  </script>

</body>
</html>
