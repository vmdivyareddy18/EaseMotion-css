<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Countdown Event Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="countdown-card">

        <span class="event-tag">
            Upcoming Event
        </span>

        <h2>EaseMotion CSS Launch Webinar</h2>

        <p class="event-description">
            Join our live session to explore new animations,
            components, and contribution opportunities.
        </p>

        <div class="timer-grid">

            <div class="time-box">
                <h3>12</h3>
                <span>Days</span>
            </div>

            <div class="time-box">
                <h3>08</h3>
                <span>Hours</span>
            </div>

            <div class="time-box">
                <h3>45</h3>
                <span>Minutes</span>
            </div>

            <div class="time-box">
                <h3>20</h3>
                <span>Seconds</span>
            </div>

        </div>

        <div class="event-details">

            <div class="detail">
                📅 15 July 2026
            </div>

            <div class="detail">
                🌐 Online Event
            </div>

            <div class="detail">
                ⏰ 7:00 PM IST
            </div>

        </div>

        <div class="button-group">

            <button class="primary-btn">
                Register Now
            </button>

            <button class="secondary-btn">
                Set Reminder
            </button>

        </div>

    </div>

</div>

</body>
</html>
