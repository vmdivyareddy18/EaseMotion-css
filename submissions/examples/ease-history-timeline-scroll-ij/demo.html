<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease History Timeline Scroll</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styling just to make the demo scrollable */
        .spacer { height: 50vh; display: flex; align-items: center; justify-content: center; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="demo-box">
        <div class="spacer">Scroll down to see the timeline</div>
        
        <div class="ease-timeline">
            <div class="ease-timeline-item">
                <div class="ease-timeline-content">
                    <div class="ease-timeline-date">2021</div>
                    <h3>Project Started</h3>
                    <p>The initial idea was born and development began.</p>
                </div>
            </div>
            <div class="ease-timeline-item">
                <div class="ease-timeline-content">
                    <div class="ease-timeline-date">2022</div>
                    <h3>First Release</h3>
                    <p>Version 1.0 was released to the public.</p>
                </div>
            </div>
            <div class="ease-timeline-item">
                <div class="ease-timeline-content">
                    <div class="ease-timeline-date">2023</div>
                    <h3>Major Update</h3>
                    <p>Significant improvements and new features added.</p>
                </div>
            </div>
        </div>
        
        <div class="spacer">End of timeline</div>
    </div>

    <script>
        const items = document.querySelectorAll('.ease-timeline-item');
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.2 });

        items.forEach(item => observer.observe(item));
    </script>
</body>
</html>
