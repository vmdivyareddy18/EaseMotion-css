<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Neumorphic Soft Fade Tooltip</title>

</head>
<body>
  <main class="demo-wrap">
    <button class="tooltip-trigger" aria-describedby="tip1">

      </span>
    </button>
  </main>
</body>
</html>
