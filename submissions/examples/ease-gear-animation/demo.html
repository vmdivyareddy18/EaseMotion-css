<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gear Animation · Pure CSS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="gear-wrapper">
    <h1>⚙️ Gear Animation</h1>
    <p class="subtitle">Pure CSS · No JavaScript</p>

    <!-- Gear Container -->
    <div class="gear-container">
      <!-- Large Gear (Main) -->
      <div class="gear gear-large">
        <div class="gear-teeth">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="gear-center">
          <div class="gear-hole"></div>
        </div>
      </div>

      <!-- Medium Gear (Top Right) -->
      <div class="gear gear-medium">
        <div class="gear-teeth">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="gear-center">
          <div class="gear-hole"></div>
        </div>
      </div>

      <!-- Small Gear (Bottom Right) -->
      <div class="gear gear-small">
        <div class="gear-teeth">
          <span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="gear-center">
          <div class="gear-hole"></div>
        </div>
      </div>
    </div>

    <!-- Info Section -->
    <div class="info-section">
      <div class="info-card">
        <span class="info-icon">🔄</span>
        <h3>Continuous Rotation</h3>
        <p>Gears spin infinitely using CSS keyframes</p>
      </div>
      <div class="info-card">
        <span class="info-icon">⚡</span>
        <h3>Opposite Directions</h3>
        <p>Large gear spins clockwise, others counter-clockwise</p>
      </div>
      <div class="info-card">
        <span class="info-icon">🎨</span>
        <h3>Pure CSS</h3>
        <p>No images, no JavaScript — just clean CSS</p>
      </div>
    </div>

    <!-- Control Buttons -->
    <div class="control-group">
      <button class="btn-primary" id="pauseBtn">⏸️ Pause</button>
      <button class="btn-secondary" id="speedBtn">⚡ Toggle Speed</button>
      <button class="btn-secondary" id="resetBtn">🔄 Reset</button>
    </div>

    <!-- Status -->
    <div class="status-message" id="statusMessage">
      ▶️ Gears spinning at normal speed
    </div>
  </div>
</body>
</html>
