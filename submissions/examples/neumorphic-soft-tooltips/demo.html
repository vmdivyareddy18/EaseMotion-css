<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Swing-Hover Tooltip - Neumorphic Soft Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="neumorphic-container">
    <header class="catalog-header">
      <h1>Soft UI Dashboard</h1>
      <p>Hover or focus on the soft-extruded control buttons to reveal the swing-hover tooltips.</p>
    </header>

    <div class="control-panel">
      <button class="neumorphic-btn tooltip-container" aria-describedby="tip-power">
        <span class="icon">⚡</span>
        <span id="tip-power" class="tooltip" role="tooltip">
          System Power: 98% Optimized
        </span>
      </button>

      <button class="neumorphic-btn tooltip-container" aria-describedby="tip-volume">
        <span class="icon">🔊</span>
        <span id="tip-volume" class="tooltip" role="tooltip">
          Spatial Audio Enabled
        </span>
      </button>

      <button class="neumorphic-btn tooltip-container" aria-describedby="tip-cloud">
        <span class="icon">☁️</span>
        <span id="tip-cloud" class="tooltip" role="tooltip">
          Cloud Sync Complete
        </span>
      </button>
    </div>
  </main>

</body>
</html>
