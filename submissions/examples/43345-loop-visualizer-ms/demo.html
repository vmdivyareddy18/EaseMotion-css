<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop Iteration Control Visualizer Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #e2e8f0;">
  
  <div class="ease-loop-visualizer">
    <div>
      <h2 style="margin: 0 0 0.5rem 0; font-family: system-ui;">Loop Visualizer</h2>
      <p style="margin: 0; color: #64748b; font-family: system-ui; font-size: 0.875rem;">Understand how CSS animation iteration properties work.</p>
    </div>

    <div class="ease-lv-stage">
      <div id="animBox" class="ease-lv-box"></div>
    </div>

    <div class="ease-lv-controls">
      <div class="ease-lv-control-group">
        <label class="ease-lv-label">Iteration Count</label>
        <select id="iterationCount" class="ease-lv-select">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="infinite" selected>infinite</option>
        </select>
      </div>

      <div class="ease-lv-control-group">
        <label class="ease-lv-label">Direction</label>
        <select id="direction" class="ease-lv-select">
          <option value="normal">normal</option>
          <option value="reverse">reverse</option>
          <option value="alternate" selected>alternate</option>
          <option value="alternate-reverse">alternate-reverse</option>
        </select>
      </div>
      
      <div class="ease-lv-control-group">
        <label class="ease-lv-label">Duration (ms)</label>
        <input type="number" id="duration" class="ease-lv-input" value="1500" step="100">
      </div>

      <div class="ease-lv-control-group">
        <label class="ease-lv-label">Timing Function</label>
        <select id="timingFunc" class="ease-lv-select">
          <option value="ease" selected>ease</option>
          <option value="linear">linear</option>
          <option value="ease-in-out">ease-in-out</option>
        </select>
      </div>

      <button id="replayBtn" class="ease-lv-button">Replay Animation</button>
    </div>
  </div>

  <script>
    const box = document.getElementById('animBox');
    const replayBtn = document.getElementById('replayBtn');
    
    function applyAnimation() {
      // Remove animation to force reflow and restart
      box.style.animation = 'none';
      void box.offsetWidth; 
      
      const iter = document.getElementById('iterationCount').value;
      const dir = document.getElementById('direction').value;
      const dur = document.getElementById('duration').value + 'ms';
      const timing = document.getElementById('timingFunc').value;
      
      box.style.animation = `easeVisualizerMove ${dur} ${timing} 0s ${iter} ${dir} forwards`;
    }

    // Apply on load
    applyAnimation();

    // Replay on button click
    replayBtn.addEventListener('click', applyAnimation);

    // Apply on any select/input change
    document.querySelectorAll('.ease-lv-select, .ease-lv-input').forEach(el => {
      el.addEventListener('change', applyAnimation);
    });
  </script>

</body>
</html>
