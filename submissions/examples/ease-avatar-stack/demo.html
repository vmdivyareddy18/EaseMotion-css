<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Group - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Avatar Group</h1>
      <p>Overlapping avatar stacks that spread smoothly on hover to reveal team members.</p>
    </header>

    <main class="demo-grid">
      <!-- Standard Avatar Group -->
      <section class="demo-card">
        <h2>Standard Size (Hover to Spread)</h2>
        <div class="demo-content">
          <div class="ease-avatar-group">
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/100?img=1" alt="User 1" />
            </div>
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/100?img=2" alt="User 2" />
            </div>
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/100?img=3" alt="User 3" />
            </div>
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/100?img=4" alt="User 4" />
            </div>
            <div class="ease-avatar ease-avatar-overflow">
              <span>+3</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Large Avatar Group -->
      <section class="demo-card">
        <h2>Large Size Variants</h2>
        <div class="demo-content">
          <div class="ease-avatar-group ease-avatar-lg">
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/150?img=5" alt="User 5" />
            </div>
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/150?img=6" alt="User 6" />
            </div>
            <div class="ease-avatar">
              <img src="https://i.pravatar.cc/150?img=7" alt="User 7" />
            </div>
            <div class="ease-avatar ease-avatar-overflow">
              <span>+12</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Small Avatar Group with custom colors -->
      <section class="demo-card">
        <h2>Small Size & Initial Only</h2>
        <div class="demo-content">
          <div class="ease-avatar-group ease-avatar-sm">
            <div class="ease-avatar" style="background-color: #fca5a5; color: #7f1d1d;">JD</div>
            <div class="ease-avatar" style="background-color: #93c5fd; color: #1e3a8a;">AB</div>
            <div class="ease-avatar" style="background-color: #86efac; color: #14532d;">SW</div>
            <div class="ease-avatar ease-avatar-overflow">
              <span>+1</span>
            </div>
          </div>
        </div>
      </section>

    </main>
  </div>
</body>
</html>
