<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Password Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="manager-container">
        <header class="section-header">
            <h1>Ironclad <span class="gradient-text">Security</span></h1>
            <p>Generate, store, and autofill secure credentials. Protect your digital life with zero-knowledge encryption.</p>
        </header>

        <div class="password-card-wrapper">
            <input type="checkbox" id="show-password" class="password-toggle-check" hidden>
            
            <div class="password-card">
                <div class="card-header">
                    <span class="site-icon">🔑</span>
                    <div>
                        <h4>Google Account</h4>
                        <p class="user-email">alex@gmail.com</p>
                    </div>
                </div>
                
                <div class="password-field">
                    <div class="password-dots-wrapper">
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                        <span class="pass-dot"></span>
                    </div>
                    <div class="password-text">g00g!eP@ss</div>
                    
                    <label for="show-password" class="toggle-visibility-btn">
                        <span class="eye-open">👁️</span>
                        <span class="eye-closed">🙈</span>
                    </label>
                </div>

                <!-- Password Strength Indicator -->
                <div class="strength-meter">
                    <div class="meter-label">Password Strength</div>
                    <div class="meter-bar-container">
                        <div class="meter-bar"></div>
                    </div>
                    <div class="strength-text">Strong Password</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
