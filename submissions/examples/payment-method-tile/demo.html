<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment tile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell" aria-label="Payment tile example">
    <article class="status-card">
      <p class="eyebrow">Checkout</p>
      <header>
        <h1>Payment tile</h1>
        <span>Selected</span>
      </header>
      <div class="summary-row">
        <b></b>
        <div>
          <strong>Visa ending 4242</strong>
          <small>Default billing method</small>
        </div>
      </div>
      <button type="button">Review details</button>
    </article>
  </main>
</body>
</html>
