<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-image-compare-slider</title>
  <meta name="description" content="Image comparison slider with drag interaction.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-image-compare-slider</h1>
      <p class="subtitle" id="main-desc">Before/after image comparison slider</p>
    </header>

    <div class="display-area">
      
      <div class="ease-compare-slider">
        <div class="compare-container">
          <img src="https://picsum.photos/id/28/800/500" alt="After" class="compare-after">
          <div class="compare-before" style="width: 50%;">
            <img src="https://picsum.photos/id/28/800/500?grayscale" alt="Before" class="compare-img">
            <div class="compare-label compare-label-left">Before</div>
          </div>
          <div class="compare-slider" style="left: 50%;">
            <div class="slider-line"></div>
            <div class="slider-handle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
          <div class="compare-label compare-label-right">After</div>
        </div>
        <input type="range" min="0" max="100" value="50" class="compare-range" oninput="updateCompare(this)">
      </div>

    </div>

    <section class="demo-section">
      <h3>Photo Enhancement Demo</h3>
      <div class="ease-compare-slider ease-compare-rounded">
        <div class="compare-container">
          <img src="https://picsum.photos/id/14/800/500" alt="Color" class="compare-after">
          <div class="compare-before" style="width: 50%;">
            <img src="https://picsum.photos/id/14/800/500?grayscale" alt="Grayscale" class="compare-img">
            <div class="compare-label compare-label-left">B&W</div>
          </div>
          <div class="compare-slider" style="left: 50%;">
            <div class="slider-line"></div>
            <div class="slider-handle">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
            </div>
          </div>
          <div class="compare-label compare-label-right">Color</div>
        </div>
        <input type="range" min="0" max="100" value="50" class="compare-range" oninput="updateCompare(this)">
      </div>
    </section>

    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-row">
        <div class="variant-item">
          <h4>Default</h4>
          <p>Rounded corners</p>
        </div>
        <div class="variant-item">
          <h4>Large</h4>
          <p>Full width</p>
        </div>
      </div>
    </section>

  </main>

  <script>
    function updateCompare(range) {
      const slider = range.parentElement;
      const container = slider.querySelector('.compare-container');
      const before = container.querySelector('.compare-before');
      const compareSlider = container.querySelector('.compare-slider');
      const value = range.value;
      
      before.style.width = value + '%';
      compareSlider.style.left = value + '%';
    }
  </script>

</body>
</html>
