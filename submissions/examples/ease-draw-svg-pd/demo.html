<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG Drawing Interaction - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; user-select: none;">
    <h1 style="color: #ffffff; font-weight: 800; font-size: 2.2rem; margin: 0 0 0.5rem 0; letter-spacing: -0.02em;">SVG Line Art Renderer</h1>
    <p style="margin: 0; font-size: 1rem; color: #94a3b8;">Pure CSS stroke path revealing simulations.</p>
  </div>

  <div class="showcase-row">

    <div class="svg-card">
      <h3 style="margin: 0 0 1rem 0; font-size: 1rem; color: #94a3b8;">1. Logo Outline & Post-Fill</h3>
      <svg width="100" height="100" viewBox="0 0 100 100">
        <path class="ease-draw-path ease-draw-fill ease-draw-speed-slow" d="M 50,10 L 90,50 L 50,90 L 10,50 Z M 50,25 L 75,50 L 50,75 L 25,50 Z" />
      </svg>
    </div>

    <div class="svg-card">
      <h3 style="margin: 0 0 1rem 0; font-size: 1rem; color: #94a3b8;">2. Staggered Icon Set</h3>
      <div style="display: flex; gap: 1rem;">
        <svg width="40" height="40" viewBox="0 0 24 24">
          <path class="ease-draw-path ease-draw-speed-fast ease-draw-delay-100" d="M20 6L9 17l-5-5" />
        </svg>
        <svg width="40" height="40" viewBox="0 0 24 24">
          <path class="ease-draw-path ease-draw-speed-fast ease-draw-delay-300" d="M5 12h14M12 5l7 7-7 7" />
        </svg>
        <svg width="40" height="40" viewBox="0 0 24 24">
          <path class="ease-draw-path ease-draw-speed-fast ease-draw-delay-500" style="--ease-draw-color: #ef4444;" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
        </svg>
      </div>
    </div>

    <div class="svg-card" style="min-width: 300px;">
      <h3 style="margin: 0 0 1rem 0; font-size: 1rem; color: #94a3b8;">3. Signature Simulation</h3>
      <svg width="200" height="80" viewBox="0 0 200 80">
        <path class="ease-draw-path ease-draw-speed-slow" style="--ease-draw-color: #f59e0b;" d="M 20,50 Q 40,20 50,40 T 70,30 T 90,60 T 120,20 T 150,50 T 180,40" />
      </svg>
    </div>

  </div>

</body>
</html>
