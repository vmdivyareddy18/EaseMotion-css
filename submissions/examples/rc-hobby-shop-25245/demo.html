<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>RC Hobby Shop</title>
</head>
<body>
  <header class="hero-rc">
    <h1>Precision Engineering. Pure Adrenaline.</h1>
    <p>Top-tier RC cars, drones, and hobbyist components.</p>
  </header>
  <section class="category-grid">
    <div class="rc-card">
        <h3>Off-Road Monsters</h3>
        <ul class="spec-list">
            <li>4WD Capability</li>
            <li>Brushless Motors</li>
        </ul>
    </div>
    <div class="rc-card">
        <h3>Speed Racers</h3>
        <ul class="spec-list">
            <li>Carbon Fiber Chassis</li>
            <li>High-speed Servos</li>
        </ul>
    </div>
  </section>
</body>
</html>
