<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flying Fish</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="sunF"></span>
    <span class="cloudF"></span>
    <div class="glideF">
      <div class="fishF">
        <span class="pelvicF"></span>
        <span class="wingF wfFar"></span>
        <span class="tailF"></span>
        <span class="bodyF"></span>
        <span class="sheenF"></span>
        <span class="eyeF"></span>
        <span class="wingF wfNear"></span>
      </div>
    </div>
    <span class="sprayF sf1"></span>
    <span class="sprayF sf2"></span>
    <span class="sprayF sf3"></span>
    <span class="waveF wvA"></span>
    <span class="waveF wvB"></span>
    <span class="seaF"></span>
  </div>
</body>
</html>
