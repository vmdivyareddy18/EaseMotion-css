<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-morph-shape</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-morph-shape</h1>
    <p class="subtitle">Shape smoothly morphs between different geometries</p>
    <div class="morph-wrapper">
      <div class="morph-preview" id="morphPreview">
        <svg viewBox="0 0 200 200" id="morphSvg">
          <path id="morphPath" fill="var(--accent)" opacity="0.85" />
        </svg>
      </div>
      <div class="morph-controls">
        <button class="morph-btn" data-shape="circle">Circle</button>
        <button class="morph-btn" data-shape="triangle">Triangle</button>
        <button class="morph-btn" data-shape="square">Square</button>
        <button class="morph-btn" data-shape="hexagon">Hexagon</button>
        <button class="morph-btn" data-shape="star">Star</button>
      </div>
    </div>
  </div>
  <script>
    const shapes = {
      circle: 'M100,20 C140,20 180,60 180,100 C180,140 140,180 100,180 C60,180 20,140 20,100 C20,60 60,20 100,20Z',
      triangle: 'M100,20 L180,170 L20,170 Z',
      square: 'M30,30 L170,30 L170,170 L30,170 Z',
      hexagon: 'M100,20 L165,60 L165,140 L100,180 L35,140 L35,60 Z',
      star: 'M100,10 L123,75 L195,75 L138,115 L158,185 L100,145 L42,185 L62,115 L5,75 L77,75 Z'
    };
    const path = document.getElementById('morphPath');
    const btns = document.querySelectorAll('.morph-btn');
    let current = shapes.circle;
    path.setAttribute('d', current);
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const next = shapes[btn.dataset.shape];
        if (next && next !== current) {
          current = next;
          path.setAttribute('d', current);
        }
      });
    });
    btns[0].classList.add('active');
  </script>
</body>
</html>
