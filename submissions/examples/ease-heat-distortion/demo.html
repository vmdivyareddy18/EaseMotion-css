<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-heat-distortion demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #fff8f0; gap: 2.5rem; }
    .card {
      width: 180px; height: 130px;
      background: linear-gradient(135deg, #f97316, #ef4444);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1rem; font-weight: 600;
      cursor: default;
    }
  </style>
</head>
<body>
  <!-- SVG filter definition (hidden) -->
  <svg class="ease-heat-filter" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="heat" x="0%" y="0%" width="100%" height="100%">
        <feTurbulence type="turbulence" baseFrequency="0.015 0.04" numOctaves="2" seed="2" result="noise">
          <animate attributeName="baseFrequency" values="0.015 0.04;0.02 0.06;0.015 0.04" dur="0.8s" repeatCount="indefinite"/>
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <div class="card ease-heat-distortion">🔥 Hover me</div>
  <div class="card ease-heat-distortion" style="background:linear-gradient(135deg,#f59e0b,#f97316)">Heat wave</div>
</body>
</html>
