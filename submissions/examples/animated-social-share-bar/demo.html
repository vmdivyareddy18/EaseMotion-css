<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Social Share Bar - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Mock Article Content -->
  <article class="article-content">
    <h1>The Art of Web Animation</h1>
    <p>Animation is a powerful tool in web design. When used thoughtfully, it can guide users, provide feedback, and create memorable experiences...</p>
    <p>Continue reading this fascinating article about how motion design principles apply to modern web interfaces...</p>
  </article>

  <!-- Floating Social Share Bar -->
  <div class="share-bar ease-slide-in-left">
    <span class="share-label">Share:</span>
    
    <div class="share-buttons">
      <a href="#" class="share-btn twitter ease-bounce-in ease-delay-100 ease-hover-grow" aria-label="Share on Twitter">
        <span class="share-icon">🐦</span>
      </a>
      <a href="#" class="share-btn facebook ease-bounce-in ease-delay-200 ease-hover-grow" aria-label="Share on Facebook">
        <span class="share-icon">📘</span>
      </a>
      <a href="#" class="share-btn linkedin ease-bounce-in ease-delay-300 ease-hover-grow" aria-label="Share on LinkedIn">
        <span class="share-icon">💼</span>
      </a>
      <a href="#" class="share-btn reddit ease-bounce-in ease-delay-400 ease-hover-grow" aria-label="Share on Reddit">
        <span class="share-icon">🤖</span>
      </a>
      <a href="#" class="share-btn email ease-bounce-in ease-delay-500 ease-hover-grow" aria-label="Share via Email">
        <span class="share-icon">📧</span>
      </a>
      <a href="#" class="share-btn copy-link ease-bounce-in ease-delay-600 ease-hover-grow" aria-label="Copy Link">
        <span class="share-icon">🔗</span>
      </a>
    </div>
  </div>

  <!-- Floating Decoration -->
  <div class="floating-decoration ease-float"></div>

</body>
</html>
