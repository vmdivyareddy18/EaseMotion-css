<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Key Expiry Warning Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Security dashboard</p>
      <h1 id="demo-title">API key expiry warning</h1>
      <p>A compact security card that warns when an API key is close to expiring and needs rotation.</p>
    </section>

    <section class="demo-grid" aria-label="API Key Expiry Warning Card">
        <article class="demo-card"><span class="pulse-dot"></span><h2>Production key</h2><p>Expires in 6 days</p><button type="button">Rotate key</button></article>
        <article class="demo-card"><span class="pulse-dot"></span><h2>Staging key</h2><p>Expires in 18 days</p><button type="button">View usage</button></article>
        <article class="demo-card"><span class="pulse-dot"></span><h2>Analytics key</h2><p>Expires in 31 days</p><button type="button">Review scope</button></article>
    </section>
  </main>
</body>
</html>
