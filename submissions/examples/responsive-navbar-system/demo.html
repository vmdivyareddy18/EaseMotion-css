<!DOCTYPE html>
<html>
<head>
  <title>Responsive Navbar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">Logo</div>
  <div class="menu" id="menu">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </div>
  <div class="hamburger" onclick="toggle()">☰</div>
</nav>

<script>
function toggle() {
  document.getElementById("menu").classList.toggle("show");
}
</script>

</body>
</html>
