<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Sidebar Toggle UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Sidebar Toggle UI Example</h1>
      <p>Collapsible sidebar navigation with animated slide and active highlights.</p>
    </header>

    <div class="layout-shell">
      <aside class="sidebar-toggle" aria-hidden="true">
        <button class="sidebar-toggle__close" aria-label="Close sidebar">×</button>
        <nav class="sidebar-toggle__nav">
          <a class="sidebar-toggle__link sidebar-toggle__link--active" href="#">Home</a>
          <a class="sidebar-toggle__link" href="#">Profile</a>
          <a class="sidebar-toggle__link" href="#">Messages</a>
          <a class="sidebar-toggle__link" href="#">Settings</a>
        </nav>
      </aside>

      <section class="content-shell">
        <button class="sidebar-toggle__toggle" aria-expanded="false">☰ Menu</button>
        <div class="content-panel">
          <h2>Responsive Sidebar</h2>
          <p>This sidebar toggles open and closed with a smooth animated slide while the active item is highlighted.</p>
        </div>
      </section>
    </div>
  </main>

  <script>
    const sidebar = document.querySelector('.sidebar-toggle');
    const toggleButton = document.querySelector('.sidebar-toggle__toggle');
    const closeButton = document.querySelector('.sidebar-toggle__close');

    function setSidebar(open) {
      sidebar.classList.toggle('sidebar-toggle--open', open);
      toggleButton.setAttribute('aria-expanded', String(open));
      sidebar.setAttribute('aria-hidden', String(!open));
    }

    toggleButton.addEventListener('click', () => setSidebar(true));
    closeButton.addEventListener('click', () => setSidebar(false));
  </script>
</body>
</html>
