<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-explosion-shockwave – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Explosion Shockwave</h1>
    <p class="subtitle">Rings that rapidly expand outward from a center point.</p>
    <div class="explosion-wrapper">
      <div class="explosion-center" id="explosionCenter">💥</div>
      <span class="shockwave-ring"></span>
      <span class="shockwave-ring"></span>
      <span class="shockwave-ring"></span>
    </div>
    <p class="explosion-status" id="explosionStatus">Ready</p>
    <button id="explodeBtn">Explode</button>
  </div>

  <script>
    const center = document.getElementById('explosionCenter');
    const status = document.getElementById('explosionStatus');
    const btn = document.getElementById('explodeBtn');

    btn.addEventListener('click', () => {
      center.classList.remove('exploding');
      void center.offsetWidth;
      center.classList.add('exploding');
      status.textContent = '💥 BOOM!';
      setTimeout(() => { status.textContent = 'Ready'; }, 800);
    });
  </script>
</body>
</html>
