<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thumbnail Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tg-container">
  <h1>🖼️ Thumbnail Gallery</h1>
  <p class="tg-subtitle">Click a thumbnail to view the full image with zoom &amp; fade</p>

  <div class="tg-main">
    <img id="mainImage" src="" alt="Main view" class="tg-main-img">
    <button class="tg-nav tg-prev" id="prevBtn">&#10094;</button>
    <button class="tg-nav tg-next" id="nextBtn">&#10095;</button>
  </div>

  <div class="tg-thumbnails" id="thumbnails">
    <img class="tg-thumb active" src="https://picsum.photos/id/1015/200/200" data-full="https://picsum.photos/id/1015/800/600" alt="Mountain">
    <img class="tg-thumb" src="https://picsum.photos/id/1018/200/200" data-full="https://picsum.photos/id/1018/800/600" alt="Ocean">
    <img class="tg-thumb" src="https://picsum.photos/id/1035/200/200" data-full="https://picsum.photos/id/1035/800/600" alt="Snow">
    <img class="tg-thumb" src="https://picsum.photos/id/1043/200/200" data-full="https://picsum.photos/id/1043/800/600" alt="Waterfall">
    <img class="tg-thumb" src="https://picsum.photos/id/1060/200/200" data-full="https://picsum.photos/id/1060/800/600" alt="Lake">
  </div>
</div>

<script>
const thumbs = document.querySelectorAll('.tg-thumb');
const mainImg = document.getElementById('mainImage');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let currentIndex = 0;

function loadImage(index) {
  thumbs.forEach(t => t.classList.remove('active'));
  thumbs[index].classList.add('active');
  mainImg.style.opacity = '0';
  mainImg.style.transform = 'scale(0.92)';
  setTimeout(() => {
    mainImg.src = thumbs[index].dataset.full;
    mainImg.style.opacity = '1';
    mainImg.style.transform = 'scale(1)';
  }, 200);
  currentIndex = index;
}

thumbs.forEach((thumb, i) => {
  thumb.addEventListener('click', () => loadImage(i));
});

prevBtn.addEventListener('click', () => {
  const i = (currentIndex - 1 + thumbs.length) % thumbs.length;
  loadImage(i);
});

nextBtn.addEventListener('click', () => {
  const i = (currentIndex + 1) % thumbs.length;
  loadImage(i);
});

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') prevBtn.click();
  if (e.key === 'ArrowRight') nextBtn.click();
});

document.addEventListener('DOMContentLoaded', () => loadImage(0));
</script>
</body>
</html>
