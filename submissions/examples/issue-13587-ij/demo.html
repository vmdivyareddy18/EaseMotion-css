<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter Form - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Stay Updated</h1>
    <p class="subtitle">Get the latest news and updates delivered to your inbox.</p>

    <form class="newsletter-form" id="newsletterForm">
      <div class="input-group">
        <input type="email" id="emailInput" placeholder="Enter your email address" required>
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">
        <span class="btn-text">Subscribe</span>
        <span class="spinner"></span>
        <svg class="checkmark" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <div class="success-message" id="successMsg">Thanks for subscribing! Check your inbox.</div>
      <p class="disclaimer">No spam, unsubscribe at any time.</p>
    </form>
  </div>

  <script>
    const form = document.getElementById('newsletterForm');
    const btn = document.getElementById('submitBtn');
    const input = document.getElementById('emailInput');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      if (!input.value || !input.value.includes('@')) return;

      btn.classList.add('loading');
      btn.disabled = true;

      setTimeout(() => {
        btn.classList.remove('loading');
        btn.classList.add('success');

        setTimeout(() => {
          successMsg.classList.add('show');
        }, 400);
      }, 1800);
    });
  </script>
</body>
</html>
