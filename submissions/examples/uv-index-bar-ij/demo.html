<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UV Index Bar - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>UV Index Bar</h1>
    <div class="widget-card">
      <div class="uv-header">
        <span class="uv-label">UV Index</span>
        <span class="uv-value" id="uvValue">5</span>
      </div>
      <div class="uv-bar-track">
        <div class="uv-bar-fill" id="uvBarFill"></div>
      </div>
      <div class="uv-scale">
        <span class="scale-label" style="color:#22c55e">0</span>
        <span class="scale-label" style="color:#eab308">3</span>
        <span class="scale-label" style="color:#f97316">6</span>
        <span class="scale-label" style="color:#ef4444">8</span>
        <span class="scale-label" style="color:#a855f7">11</span>
      </div>
      <div class="uv-status" id="uvStatus">Moderate</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" data-uv="0">0</button>
      <button class="ctrl-btn" data-uv="2">2</button>
      <button class="ctrl-btn" data-uv="5">5</button>
      <button class="ctrl-btn" data-uv="7">7</button>
      <button class="ctrl-btn" data-uv="10">10</button>
      <button class="ctrl-btn" data-uv="13">13</button>
    </div>
    <p class="description">Click a value to animate the bar fill and color from green (low) to purple (extreme).</p>
  </div>

  <script>
    const barFill = document.getElementById('uvBarFill');
    const uvValue = document.getElementById('uvValue');
    const uvStatus = document.getElementById('uvStatus');

    const levels = [
      { max: 2, color: '#22c55e', label: 'Low' },
      { max: 5, color: '#eab308', label: 'Moderate' },
      { max: 7, color: '#f97316', label: 'High' },
      { max: 10, color: '#ef4444', label: 'Very High' },
      { max: 99, color: '#a855f7', label: 'Extreme' }
    ];

    function setUV(value) {
      const pct = Math.min((value / 13) * 100, 100);
      let color = '#22c55e';
      let label = 'Low';

      for (const level of levels) {
        if (value <= level.max) {
          color = level.color;
          label = level.label;
          break;
        }
      }

      barFill.style.setProperty('--uv-pct', pct + '%');
      barFill.style.setProperty('--uv-color', color);
      uvValue.textContent = value;
      uvStatus.textContent = label;
    }

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        setUV(parseInt(btn.dataset.uv));
      });
    });

    setUV(5);
  </script>
</body>
</html>
