<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyboard Shortcut Display - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="shortcut-demo">

    <h1 class="shortcut-title">Keyboard Shortcuts</h1>
    <p class="shortcut-caption">Hover any shortcut to see its name in a tooltip.</p>

    <table class="ease-kbd-table">
      <thead>
        <tr>
          <th>Action</th>
          <th>Shortcut</th>
        </tr>
      </thead>
      <tbody>

        <tr>
          <td>Save file</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Save File">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">S</kbd>
            </span>
          </td>
        </tr>

        <tr>
          <td>Copy</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Copy Selection">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">C</kbd>
            </span>
          </td>
        </tr>

        <tr>
          <td>Paste</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Paste Clipboard">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">V</kbd>
            </span>
          </td>
        </tr>

        <tr>
          <td>Open command palette</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Open Command Palette">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">Shift</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">P</kbd>
            </span>
          </td>
        </tr>

        <tr>
          <td>Switch tabs (sequence)</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Cycle Through Open Tabs">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">Tab</kbd>
              <span class="ease-kbd-connector">,</span>
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">Shift</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">Tab</kbd>
            </span>
          </td>
        </tr>

        <tr>
          <td>Undo</td>
          <td>
            <span class="ease-kbd-group" data-tooltip="Undo Last Action">
              <kbd class="ease-kbd">Ctrl</kbd>
              <span class="ease-kbd-connector">+</span>
              <kbd class="ease-kbd">Z</kbd>
            </span>
          </td>
        </tr>

      </tbody>
    </table>

  </div>

</body>
</html>
