<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Event Dot Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="calendar">

    <div class="day">
        <span>12</span>

        <div class="event-dot work"></div>
    </div>

    <div class="day">
        <span>13</span>

        <div class="event-dot meeting"></div>
    </div>

    <div class="day">
        <span>14</span>

        <div class="event-dot personal"></div>
    </div>

</div>

</body>
</html>
