<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorful Checkbox Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; flex-direction: column; gap: 1rem; align-items: center; justify-content: center; height: 100vh; background: #f8fafc;">
  
  <div style="background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);">
    <h3 style="margin-top: 0; font-family: sans-serif;">Select Categories</h3>
    
    <label class="ease-checkbox-wrapper">
      <input type="checkbox" class="ease-checkbox-input">
      <div class="ease-checkbox-box ease-cb-primary">
        <svg class="ease-checkbox-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span class="ease-checkbox-label">Technology (Primary)</span>
    </label>

    <label class="ease-checkbox-wrapper">
      <input type="checkbox" class="ease-checkbox-input" checked>
      <div class="ease-checkbox-box ease-cb-success">
        <svg class="ease-checkbox-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span class="ease-checkbox-label">Health (Success)</span>
    </label>
    
    <label class="ease-checkbox-wrapper">
      <input type="checkbox" class="ease-checkbox-input">
      <div class="ease-checkbox-box ease-cb-purple">
        <svg class="ease-checkbox-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span class="ease-checkbox-label">Design (Purple)</span>
    </label>

    <label class="ease-checkbox-wrapper">
      <input type="checkbox" class="ease-checkbox-input">
      <div class="ease-checkbox-box ease-cb-pink">
        <svg class="ease-checkbox-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <span class="ease-checkbox-label">Art (Pink)</span>
    </label>
  </div>

</body>
</html>
