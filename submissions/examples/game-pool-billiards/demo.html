<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎱 Pool / Billiards</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎱 Pool / Billiards</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🎯 Player 1</span>
        <span class="stat-value" id="p1Display">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎯 Player 2</span>
        <span class="stat-value" id="p2Display">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎱 Turn</span>
        <span class="stat-value" id="turnDisplay">P1</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Best</span>
        <span class="stat-value" id="bestDisplay">—</span>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="gameCanvas" width="700" height="400"></canvas>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Game</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
      <button class="control-btn" id="modeBtn">👥 2-Player</button>
    </div>

    <div class="controls-hint">
      <span>🖱️ Click and drag to aim</span>
      <span>·</span>
      <span>💪 Drag back to set power</span>
      <span>·</span>
      <span>🎯 Release to shoot</span>
    </div>

    <div class="game-status" id="gameStatus">🎱 Click Start to begin!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const p1Display = document.getElementById('p1Display');
      const p2Display = document.getElementById('p2Display');
      const turnDisplay = document.getElementById('turnDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const modeBtn = document.getElementById('modeBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Constants ----------
      const WIDTH = 700;
      const HEIGHT = 400;
      const BALL_RADIUS = 10;
      const FRICTION = 0.985;
      const CUSHION_BOUNCE = 0.6;
      const MAX_POWER = 20;
      const POCKET_RADIUS = 22;

      // ---------- Game State ----------
      let balls = [];
      let cueBall = null;
      let pockets = [];
      let gameRunning = false;
      let gameOver = false;
      let isTwoPlayer = true;
      let currentPlayer = 1;
      let scores = [0, 0];
      let bestScore = parseInt(localStorage.getItem('poolBestScore')) || null;
      let isAiming = false;
      let isCharging = false;
      let chargePower = 0;
      let aimAngle = 0;
      let mouseX = 0;
      let mouseY = 0;
      let dragStart = null;
      let gameLoop = null;
      let ballMoving = false;
      let pocketedBalls = [];

      // ---------- Best Score ----------
      if (bestScore !== null) {
        bestDisplay.textContent = bestScore;
      }

      // ---------- Pocket Positions ----------
      function initPockets() {
        pockets = [
          { x: 25, y: 25, radius: POCKET_RADIUS },
          { x: WIDTH / 2, y: 15, radius: POCKET_RADIUS },
          { x: WIDTH - 25, y: 25, radius: POCKET_RADIUS },
          { x: 25, y: HEIGHT - 25, radius: POCKET_RADIUS },
          { x: WIDTH / 2, y: HEIGHT - 15, radius: POCKET_RADIUS },
          { x: WIDTH - 25, y: HEIGHT - 25, radius: POCKET_RADIUS }
        ];
      }

      // ---------- Ball Setup ----------
      function createBall(x, y, color, number) {
        return {
          x, y,
          vx: 0, vy: 0,
          radius: BALL_RADIUS,
          color: color,
          number: number,
          active: true,
          pocketed: false
        };
      }

      function initBalls() {
        balls = [];
        const colors = [
          '#fdd835', '#1565c0', '#f44336', '#7b1fa2', '#ff6f00',
          '#2e7d32', '#c62828', '#1a1a2e', '#fdd835', '#1565c0',
          '#f44336', '#7b1fa2', '#ff6f00', '#2e7d32', '#c62828'
        ];
        
        // Cue ball
        cueBall = createBall(WIDTH / 2 - 100, HEIGHT / 2, '#ffffff', 0);
        balls.push(cueBall);

        // Rack balls
        const rackX = WIDTH / 2 + 60;
        const rackY = HEIGHT / 2;
        const spacing = BALL_RADIUS * 2.1;
        
        const rackPositions = [
          [0, 0, 1],
          [-1, 1, 2], [1, 1, 3],
          [-2, 2, 4], [0, 2, 5], [2, 2, 6],
          [-3, 3, 7], [-1, 3, 8], [1, 3, 9], [3, 3, 10],
          [-4, 4, 11], [-2, 4, 12], [0, 4, 13], [2, 4, 14], [4, 4, 15]
        ];

        for (const [dc, dr, num] of rackPositions) {
          const x = rackX + dc * spacing * 0.866;
          const y = rackY + dr * spacing * 0.5;
          const color = colors[num - 1];
          balls.push(createBall(x, y, color, num));
        }
      }

      // ---------- Physics ----------
      function updatePhysics() {
        if (!gameRunning) return;

        let moving = false;

        for (const ball of balls) {
          if (!ball.active || ball.pocketed) continue;

          // Apply friction
          ball.vx *= FRICTION;
          ball.vy *= FRICTION;

          // Stop if very slow
          if (Math.abs(ball.vx) < 0.01 && Math.abs(ball.vy) < 0.01) {
            ball.vx = 0;
            ball.vy = 0;
          }

          // Move ball
          ball.x += ball.vx;
          ball.y += ball.vy;

          if (ball.vx !== 0 || ball.vy !== 0) moving = true;

          // Cushion collisions
          if (ball.x - ball.radius < 10) {
            ball.x = 10 + ball.radius;
            ball.vx = -ball.vx * CUSHION_BOUNCE;
          }
          if (ball.x + ball.radius > WIDTH - 10) {
            ball.x = WIDTH - 10 - ball.radius;
            ball.vx = -ball.vx * CUSHION_BOUNCE;
          }
          if (ball.y - ball.radius < 10) {
            ball.y = 10 + ball.radius;
            ball.vy = -ball.vy * CUSHION_BOUNCE;
          }
          if (ball.y + ball.radius > HEIGHT - 10) {
            ball.y = HEIGHT - 10 - ball.radius;
            ball.vy = -ball.vy * CUSHION_BOUNCE;
          }

          // Pocket detection
          for (const pocket of pockets) {
            const dx = ball.x - pocket.x;
            const dy = ball.y - pocket.y;
            if (dx * dx + dy * dy < pocket.radius * pocket.radius) {
              ball.pocketed = true;
              ball.active = false;
              if (ball.number === 0) {
                // Cue ball pocketed - foul
                handleFoul();
              } else {
                handlePocket(ball);
              }
            }
          }
        }

        // Ball-ball collisions
        for (let i = 0; i < balls.length; i++) {
          for (let j = i + 1; j < balls.length; j++) {
            const a = balls[i];
            const b = balls[j];
            if (!a.active || !b.active || a.pocketed || b.pocketed) continue;

            const dx = b.x - a.x;
            const dy = b.y - a.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const minDist = a.radius + b.radius;

            if (dist < minDist && dist > 0) {
              // Normalize
              const nx = dx / dist;
              const ny = dy / dist;

              // Separate balls
              const overlap = (minDist - dist) / 2;
              a.x -= nx * overlap;
              a.y -= ny * overlap;
              b.x += nx * overlap;
              b.y += ny * overlap;

              // Elastic collision
              const dvx = a.vx - b.vx;
              const dvy = a.vy - b.vy;
              const dvn = dvx * nx + dvy * ny;

              if (dvn > 0) {
                const impulse = dvn / 2;
                a.vx -= impulse * nx;
                a.vy -= impulse * ny;
                b.vx += impulse * nx;
                b.vy += impulse * ny;
              }
            }
          }
        }

        // Check if all balls stopped
        if (moving) {
          ballMoving = true;
        } else if (ballMoving) {
          ballMoving = false;
          if (!gameOver && gameRunning) {
            endTurn();
          }
        }

        draw();
      }

      // ---------- Game Logic ----------
      function handlePocket(ball) {
        scores[currentPlayer - 1]++;
        updateUI();
        if (scores[currentPlayer - 1] >= 7) {
          endGame(currentPlayer);
        }
        setGameStatus(`🎯 Player ${currentPlayer} pocketed ball ${ball.number}!`, true);
      }

      function handleFoul() {
        // Cue ball pocketed
        setGameStatus('💥 Foul! Cue ball pocketed!', false);
        // Reset cue ball
        cueBall.x = WIDTH / 2 - 100 + 30;
        cueBall.y = HEIGHT / 2 + (Math.random() - 0.5) * 40;
        cueBall.vx = 0;
        cueBall.vy = 0;
        cueBall.active = true;
        cueBall.pocketed = false;
        // Switch turn
        switchTurn();
      }

      function switchTurn() {
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        turnDisplay.textContent = `P${currentPlayer}`;
        turnDisplay.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ffd54f';
        setGameStatus(`🎱 Player ${currentPlayer}'s turn`, true);
        updateUI();
      }

      function endTurn() {
        // Check if any balls were pocketed this turn
        if (pocketedBalls.length === 0) {
          switchTurn();
        }
        pocketedBalls = [];
        // Check if any balls remaining
        const active = balls.filter(b => b.active && b.number !== 0);
        if (active.length === 0) {
          endGame(currentPlayer);
        }
      }

      function endGame(player) {
        gameRunning = false;
        gameOver = true;
        stopLoop();
        if (bestScore === null || scores[player - 1] > bestScore) {
          bestScore = scores[player - 1];
          localStorage.setItem('poolBestScore', bestScore.toString());
          bestDisplay.textContent = bestScore;
        }
        setGameStatus(`🏆 Player ${player} wins! Score: ${scores[player - 1]}`, true);
        draw();
      }

      // ---------- Shooting ----------
      function shoot() {
        if (ballMoving || gameOver || !gameRunning) return;
        if (!cueBall.active || cueBall.pocketed) return;

        const power = chargePower * MAX_POWER;
        if (power < 0.5) {
          setGameStatus('💪 Shoot harder!', false);
          return;
        }

        cueBall.vx = Math.cos(aimAngle) * power;
        cueBall.vy = Math.sin(aimAngle) * power;
        ballMoving = true;
        chargePower = 0;
        isCharging = false;
        isAiming = false;
        pocketedBalls = [];
        setGameStatus(`🎱 Player ${currentPlayer} shot!`, true);
        draw();
      }

      // ---------- Drawing ----------
      function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // Table felt
        const grad = ctx.createLinearGradient(0, 0, 0, HEIGHT);
        grad.addColorStop(0, '#1a6a3a');
        grad.addColorStop(0.5, '#1e7a3e');
        grad.addColorStop(1, '#1a6a3a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // Table border
        ctx.strokeStyle = '#5a3a1a';
        ctx.lineWidth = 10;
        ctx.strokeRect(5, 5, WIDTH - 10, HEIGHT - 10);

        // Inner border
        ctx.strokeStyle = '#2d1b0e';
        ctx.lineWidth = 4;
        ctx.strokeRect(10, 10, WIDTH - 20, HEIGHT - 20);

        // Pockets
        for (const pocket of pockets) {
          ctx.fillStyle = '#0a0a0a';
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(pocket.x, pocket.y, pocket.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Head spot
        ctx.fillStyle = 'rgba(255,255,255,0.05)';
        ctx.beginPath();
        ctx.arc(WIDTH / 2 - 100, HEIGHT / 2, 5, 0, Math.PI * 2);
        ctx.fill();

        // Draw balls
        for (const ball of balls) {
          if (!ball.active || ball.pocketed) continue;

          // Shadow
          ctx.fillStyle = 'rgba(0,0,0,0.2)';
          ctx.beginPath();
          ctx.ellipse(ball.x + 2, ball.y + 4, ball.radius * 0.8, 4, 0, 0, Math.PI * 2);
          ctx.fill();

          // Ball
          const grad2 = ctx.createRadialGradient(
            ball.x - 3, ball.y - 3, 2,
            ball.x, ball.y, ball.radius
          );
          if (ball.number === 0) {
            grad2.addColorStop(0, '#ffffff');
            grad2.addColorStop(0.7, '#f5f5f5');
            grad2.addColorStop(1, '#e0e0e0');
          } else {
            grad2.addColorStop(0, lightenColor(ball.color, 40));
            grad2.addColorStop(0.7, ball.color);
            grad2.addColorStop(1, darkenColor(ball.color, 30));
          }
          ctx.fillStyle = grad2;
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Number
          if (ball.number > 0) {
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${ball.radius}px "Segoe UI", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ball.number, ball.x, ball.y + 0.5);
          }
        }

        // Aim line
        if (isAiming && !ballMoving && cueBall.active && !cueBall.pocketed && gameRunning) {
          ctx.strokeStyle = 'rgba(255,255,255,0.15)';
          ctx.lineWidth = 1;
          ctx.setLineDash([6, 6]);
          ctx.beginPath();
          ctx.moveTo(cueBall.x, cueBall.y);
          const aimLen = 80 + chargePower * 60;
          ctx.lineTo(cueBall.x + Math.cos(aimAngle) * aimLen, cueBall.y + Math.sin(aimAngle) * aimLen);
          ctx.stroke();
          ctx.setLineDash([]);
          
          // Power indicator
          const powerX = 20;
          const powerY = HEIGHT - 30;
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(powerX, powerY, 200, 12);
          const grad3 = ctx.createLinearGradient(powerX, 0, powerX + 200, 0);
          grad3.addColorStop(0, '#4caf50');
          grad3.addColorStop(0.5, '#ffc107');
          grad3.addColorStop(1, '#f44336');
          ctx.fillStyle = grad3;
          ctx.fillRect(powerX, powerY, chargePower * 200, 12);
          ctx.strokeStyle = 'rgba(255,255,255,0.2)';
          ctx.lineWidth = 1;
          ctx.strokeRect(powerX, powerY, 200, 12);
        }

        // Game over overlay
        if (gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.font = 'bold 36px "Segoe UI", sans-serif';
          ctx.fillStyle = '#ffd54f';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🏆 GAME OVER', WIDTH/2, HEIGHT/2 - 20);
          ctx.font = '20px "Segoe UI", sans-serif';
          ctx.fillStyle = '#a8d8ea';
          ctx.fillText(`Player ${currentPlayer} wins!`, WIDTH/2, HEIGHT/2 + 30);
        }

        if (!gameRunning && !gameOver) {
          ctx.fillStyle = 'rgba(0,0,0,0.4)';
          ctx.fillRect(0, 0, WIDTH, HEIGHT);
          ctx.font = '28px "Segoe UI", sans-serif';
          ctx.fillStyle = '#ffd54f';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('🎱 Pool / Billiards', WIDTH/2, HEIGHT/2 - 20);
          ctx.font = '16px "Segoe UI", sans-serif';
          ctx.fillStyle = '#b0bec5';
          ctx.fillText('Click Start to begin', WIDTH/2, HEIGHT/2 + 30);
        }
      }

      // ---------- Helper Functions ----------
      function lightenColor(color, amount) {
        let r = parseInt(color.slice(1, 3), 16);
        let g = parseInt(color.slice(3, 5), 16);
        let b = parseInt(color.slice(5, 7), 16);
        r = Math.min(255, r + amount);
        g = Math.min(255, g + amount);
        b = Math.min(255, b + amount);
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
      }

      function darkenColor(color, amount) {
        let r = parseInt(color.slice(1, 3), 16);
        let g = parseInt(color.slice(3, 5), 16);
        let b = parseInt(color.slice(5, 7), 16);
        r = Math.max(0, r - amount);
        g = Math.max(0, g - amount);
        b = Math.max(0, b - amount);
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
      }

      // ---------- UI Updates ----------
      function updateUI() {
        p1Display.textContent = scores[0];
        p2Display.textContent = scores[1];
        turnDisplay.textContent = `P${currentPlayer}`;
        turnDisplay.style.color = currentPlayer === 1 ? '#4fc3f7' : '#ffd54f';
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Game Loop ----------
      function gameLoopFunction() {
        updatePhysics();
        if (gameRunning) {
          requestAnimationFrame(gameLoopFunction);
        }
      }

      function startLoop() {
        if (gameLoop) cancelAnimationFrame(gameLoop);
        gameLoop = requestAnimationFrame(gameLoopFunction);
      }

      function stopLoop() {
        if (gameLoop) {
          cancelAnimationFrame(gameLoop);
          gameLoop = null;
        }
        gameRunning = false;
        draw();
      }

      // ---------- Game Control ----------
      function startGame() {
        if (gameRunning) return;
        resetGameState();
        gameRunning = true;
        gameOver = false;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Playing...';
        setGameStatus(`🎱 Player ${currentPlayer}'s turn`, true);
        startLoop();
      }

      function resetGameState() {
        scores = [0, 0];
        currentPlayer = 1;
        ballMoving = false;
        gameOver = false;
        pocketedBalls = [];
        chargePower = 0;
        isAiming = false;
        isCharging = false;
        initPockets();
        initBalls();
        updateUI();
        turnDisplay.textContent = 'P1';
        turnDisplay.style.color = '#4fc3f7';
        draw();
      }

      function resetGame() {
        gameRunning = false;
        if (gameLoop) cancelAnimationFrame(gameLoop);
        gameLoop = null;
        resetGameState();
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        setGameStatus('🔄 Game reset. Click Start to play!', true);
        draw();
      }

      function toggleMode() {
        if (gameRunning) return;
        isTwoPlayer = !isTwoPlayer;
        modeBtn.textContent = isTwoPlayer ? '👥 2-Player' : '🤖 vs AI';
        setGameStatus(`🔄 ${isTwoPlayer ? '2-Player' : 'vs AI'} mode selected`, true);
        resetGame();
      }

      // ---------- Event Handlers ----------
      canvas.addEventListener('mousedown', (e) => {
        if (!gameRunning || gameOver || ballMoving) return;
        if (!cueBall.active || cueBall.pocketed) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        
        const dx = x - cueBall.x;
        const dy = y - cueBall.y;
        if (dx * dx + dy * dy < 50 * 50) {
          isAiming = true;
          isCharging = true;
          chargePower = 0;
          dragStart = { x, y };
          aimAngle = Math.atan2(dy, dx);
        }
      });

      canvas.addEventListener('mousemove', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;
        mouseX = x;
        mouseY = y;
        
        if (isAiming && isCharging) {
          const dx = x - dragStart.x;
          const dy = y - dragStart.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > 5) {
            chargePower = Math.min(1, dist / 150);
          }
          aimAngle = Math.atan2(cueBall.y - mouseY, cueBall.x - mouseX);
          draw();
        }
      });

      canvas.addEventListener('mouseup', () => {
        if (isCharging) {
          isCharging = false;
          isAiming = false;
          shoot();
        }
      });

      canvas.addEventListener('mouseleave', () => {
        if (isCharging) {
          isCharging = false;
          isAiming = false;
          chargePower = 0;
          draw();
        }
      });

      // Touch events
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameRunning || gameOver || ballMoving) return;
        if (!cueBall.active || cueBall.pocketed) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scaleX;
        const y = (touch.clientY - rect.top) * scaleY;
        
        const dx = x - cueBall.x;
        const dy = y - cueBall.y;
        if (dx * dx + dy * dy < 60 * 60) {
          isAiming = true;
          isCharging = true;
          chargePower = 0;
          dragStart = { x, y };
          aimAngle = Math.atan2(dy, dx);
        }
      }, { passive: false });

      canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (!isAiming) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const touch = e.touches[0];
        const x = (touch.clientX - rect.left) * scaleX;
        const y = (touch.clientY - rect.top) * scaleY;
        
        const dx = x - dragStart.x;
        const dy = y - dragStart.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > 5) {
          chargePower = Math.min(1, dist / 150);
        }
        aimAngle = Math.atan2(cueBall.y - y, cueBall.x - x);
        draw();
      }, { passive: false });

      canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (isCharging) {
          isCharging = false;
          isAiming = false;
          shoot();
        }
      }, { passive: false });

      // ---------- Keyboard Controls ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') resetGame();
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          if (!gameRunning) startGame();
          else if (!ballMoving && !gameOver) shoot();
        }
        if (e.key === 'm' || e.key === 'M') toggleMode();
      });

      // ---------- Button Listeners ----------
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);
      modeBtn.addEventListener('click', toggleMode);

      // ---------- Init ----------
      function init() {
        initPockets();
        initBalls();
        updateUI();
        draw();
        setGameStatus('🎱 Click Start to begin!', true);
        if (bestScore !== null) {
          bestDisplay.textContent = bestScore;
        }
      }

      init();
    })();
  </script>
</body>
</html>
