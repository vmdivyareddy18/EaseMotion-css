<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Stars Animated - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Animated Star Rating</h1>
    <div class="rating-card">
      <h2 class="rating-title">Rate your experience</h2>
      <div class="stars" id="starContainer">
        <span class="star" data-value="1" style="--star-fill: 0;">★</span>
        <span class="star" data-value="2" style="--star-fill: 0;">★</span>
        <span class="star" data-value="3" style="--star-fill: 0;">★</span>
        <span class="star" data-value="4" style="--star-fill: 0;">★</span>
        <span class="star" data-value="5" style="--star-fill: 0;">★</span>
      </div>
      <p class="rating-feedback" id="ratingFeedback">Click a star to rate</p>
    </div>
    <p class="description">Hover to preview, click to set. CSS controls the star fill and pop animation via <code>--star-fill</code> variable.</p>
  </div>
  <script>
    const stars = document.querySelectorAll('.star');
    const feedback = document.getElementById('ratingFeedback');
    const labels = ['', 'Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
    let currentRating = 0;

    stars.forEach(star => {
      star.addEventListener('mouseenter', () => {
        const val = parseInt(star.dataset.value);
        stars.forEach((s, i) => {
          s.style.setProperty('--star-fill', i < val ? '1' : '0');
        });
      });

      star.addEventListener('click', () => {
        currentRating = parseInt(star.dataset.value);
        feedback.textContent = `${labels[currentRating]} (${currentRating}/5)`;
        stars.forEach(s => s.classList.remove('pop'));
        star.classList.add('pop');
      });
    });

    document.getElementById('starContainer').addEventListener('mouseleave', () => {
      stars.forEach((s, i) => {
        s.style.setProperty('--star-fill', i < currentRating ? '1' : '0');
      });
    });
  </script>
</body>
</html>
