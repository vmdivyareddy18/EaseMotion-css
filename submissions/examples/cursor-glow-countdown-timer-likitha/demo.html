<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Glow Countdown Timer</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="ease-countdown">

    <h2 class="ease-title">
        SYSTEM COUNTDOWN
    </h2>

    <div class="ease-display">

        <span>03</span>
        <span class="colon">:</span>

        <span>12</span>
        <span class="colon">:</span>

        <span>45</span>

        <span class="ease-cursor"></span>

    </div>

    <p class="ease-status">
        Awaiting Launch...
    </p>

</div>

</body>
</html>
