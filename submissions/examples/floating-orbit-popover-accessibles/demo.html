<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Floating Orbit Popover</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="container">

    <div class="orbit-popover">

      <button class="orbit-trigger">
        Open Details
      </button>

      <section class="orbit-content" aria-label="Popover content">
        <h2>Accessible Popover</h2>
        <p>
          A smooth CSS-only floating orbit animation
          designed for accessible web layouts.
        </p>

        <a href="#">
          View More
        </a>
      </section>

    </div>

  </main>

</body>
</html>
