<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Accent Color for Form Controls — EaseMotion CSS Demo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="../core/variables.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <span class="feature-tag">Custom Accent Color for Form Controls</span>
      <h1>Branded Form Controls with accent-color</h1>
      <p>Uses accent-color to override browser defaults on form controls using EaseMotion design tokens.</p>
    </div>

    <div class="demo-section">
      <div class="demo-grid">
        <div class="demo-card accent-primary">
          <div class="card-label" style="color:var(--ease-color-primary)">Primary Accent</div>
          <div class="form-stack">
            <label class="form-label">
              <input type="checkbox" checked> Enable notifications
            </label>
            <label class="form-label">
              <input type="radio" name="accent-primary-demo" checked> Option A
            </label>
            <label class="form-label">
              <input type="radio" name="accent-primary-demo"> Option B
            </label>
            <div class="form-label">
              Progress: <progress value="65" max="100"></progress>
            </div>
          </div>
        </div>
        <div class="demo-card accent-success">
          <div class="card-label" style="color:var(--ease-color-success)">Success Accent</div>
          <div class="form-stack">
            <label class="form-label">
              <input type="checkbox" checked> Task complete
            </label>
            <label class="form-label">
              <input type="radio" name="accent-success-demo" checked> Enabled
            </label>
            <div class="form-label">
              <progress class="success-progress" value="90" max="100"></progress>
            </div>
          </div>
        </div>
        <div class="demo-card accent-danger">
          <div class="card-label" style="color:var(--ease-color-danger)">Danger Accent</div>
          <div class="form-stack">
            <label class="form-label">
              <input type="checkbox" checked> Mark as deleted
            </label>
            <label class="form-label">
              <input type="radio" name="accent-danger-demo" checked> Force stop
            </label>
            <div class="form-label">
              <progress class="danger-progress" value="30" max="100"></progress>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
