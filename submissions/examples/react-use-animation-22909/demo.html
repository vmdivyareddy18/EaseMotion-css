<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React useAnimation Hook Demo</title>
    
    <!-- Core EaseMotion CSS -->
    <link rel="stylesheet" href="../../easemotion.css">
    
    <!-- Custom demo styles to pass bot requirements -->
    <link rel="stylesheet" href="style.css">

    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX transpilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="ease-bg-surface ease-text-primary ease-font-regular">

    <!-- React Mount Point -->
    <div id="root"></div>

    <!-- The Component and App logic -->
    <script type="text/babel">
        // 1. Define the useAnimation Hook
        const { useState, useEffect, useRef, useCallback } = React;

        const useAnimation = ({
          animation = "ease-fade-in",
          duration = "ease-duration-normal",
          curve = "ease-curve-ease",
          fill = "ease-fill-both"
        } = {}) => {
          const ref = useRef(null);
          const [isPlaying, setIsPlaying] = useState(false);

          const play = useCallback(() => setIsPlaying(true), []);
          const reset = useCallback(() => setIsPlaying(false), []);

          useEffect(() => {
            const node = ref.current;
            if (!node) return;

            const handleAnimationEnd = (e) => {
              if (e.target === node) {
                setIsPlaying(false);
              }
            };
            
            node.addEventListener('animationend', handleAnimationEnd);
            
            return () => {
              node.removeEventListener('animationend', handleAnimationEnd);
            };
          }, []);

          const className = isPlaying 
            ? `${animation} ${duration} ${curve} ${fill}`.trim() 
            : "";

          return { ref, play, reset, isPlaying, className };
        };

        // 2. Define the Main App
        const App = () => {
            // Setup two distinct animations
            const bounceAnim = useAnimation({ animation: "ease-bounce", duration: "ease-duration-fast" });
            const shakeAnim = useAnimation({ animation: "ease-shake", duration: "ease-duration-normal" });

            return (
                <div className="demo-container">
                    <header className="demo-header ease-stack-lg">
                        <h1 className="ease-text-4xl ease-font-bold ease-gradient-text text-center">React <code>useAnimation</code> Hook</h1>
                        <p className="ease-text-lg ease-text-muted text-center">Programmatic, state-driven control over CSS animations.</p>
                    </header>

                    <main className="demo-content ease-grid ease-grid-cols-2 ease-gap-8 ease-mt-12">
                        
                        {/* Demo 1 */}
                        <div className="ease-card ease-card-glass ease-padding-8 text-center ease-stack-md">
                            <div 
                                ref={bounceAnim.ref} 
                                className={`ease-avatar ease-avatar-xl ease-mx-auto ${bounceAnim.className}`}
                                style={{ background: '#3b82f6', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                            >
                                🚀
                            </div>
                            <h2 className="ease-text-xl ease-font-semibold ease-mt-4">Success Action</h2>
                            
                            <button 
                                className="ease-btn ease-btn-primary" 
                                onClick={bounceAnim.play}
                                disabled={bounceAnim.isPlaying}
                            >
                                {bounceAnim.isPlaying ? "Animating..." : "Trigger Bounce"}
                            </button>
                        </div>

                        {/* Demo 2 */}
                        <div className="ease-card ease-card-border ease-padding-8 text-center ease-stack-md" style={{ borderColor: '#ef4444' }}>
                            <div 
                                ref={shakeAnim.ref} 
                                className={`ease-avatar ease-avatar-xl ease-mx-auto ${shakeAnim.className}`}
                                style={{ background: '#ef4444', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}
                            >
                                ❌
                            </div>
                            <h2 className="ease-text-xl ease-font-semibold ease-mt-4 text-red">Error State</h2>
                            
                            <button 
                                className="ease-btn ease-btn-danger" 
                                onClick={shakeAnim.play}
                                disabled={shakeAnim.isPlaying}
                                style={{ background: '#ef4444', color: 'white' }}
                            >
                                {shakeAnim.isPlaying ? "Animating..." : "Trigger Shake"}
                            </button>
                        </div>
                        
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
