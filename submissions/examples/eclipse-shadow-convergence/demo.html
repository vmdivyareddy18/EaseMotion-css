<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eclipse Shadow Convergence</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Eclipse Shadow Convergence Animation</h1>

    <div class="card">
      <button class="copy-btn" onclick="copyClass(this)">Copy</button>

      <div id="preview-box" class="preview-box" onclick="triggerAnimation()">
        Preview
        <div class="shadow left-shadow"></div>
        <div class="shadow right-shadow"></div>
      </div>

      <p class="class-name">ease-eclipse-shadow</p>
    </div>
  </div>

  <script>
    function triggerAnimation() {
      const box = document.getElementById("preview-box");
      box.classList.remove("animate");
      void box.offsetWidth;
      box.classList.add("animate");
    }

    function copyClass(button) {
      navigator.clipboard.writeText("ease-eclipse-shadow");
      button.textContent = "Copied!";
      setTimeout(() => {
        button.textContent = "Copy";
      }, 2000);
    }
  </script>
</body>
</html>
