<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Hub - Horizontal Roll Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-viewport">
        <!-- Main Premium Dashboard Card Elevation Container Hub Shell -->
        <div class="dashboard-container-card">
            <header class="dashboard-header">
                <div class="neon-matrix-badge">NODE: STREAM_ROLL</div>
                <h2 class="dashboard-title">System Metrics Hub</h2>
                <p class="dashboard-subtitle">Hover over or interact with the summary trigger target below to witness the pure-CSS horizontal roll popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">📊</span>
                        <span class="btn-text">Open Metrics Matrix</span>
                    </button>

                    <!-- Floating Popover Horizontal Roll Overlay Menu Shell Box -->
                    <div class="horizontal-roll-popover ease-horizontal-roll-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Live Node Telemetry</h4>
                            <ul class="telemetry-actions-list">
                                <li class="menu-item"><a href="#pods" class="action-link-node">Scale Compute Pods</a></li>
                                <li class="menu-item"><a href="#ledger" class="action-link-node">Verify Ledger Sync</a></li>
                                <li class="menu-item"><a href="#reset" class="action-link-node action-danger">Purge Cache Buffers</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="dashboard-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
