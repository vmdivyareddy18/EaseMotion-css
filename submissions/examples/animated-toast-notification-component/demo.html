<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Notification Toast — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <p class="demo-title">Animated Notification Toasts (pure CSS)</p>

    <div class="toast toast--success" data-message="Your changes have been saved successfully.">
      <div class="toast-icon">✓</div>
      <div class="toast-content">
        <p class="toast-title">Success</p>
        <p class="toast-message">Your changes have been saved successfully.</p>
      </div>
      <div class="toast-close">✕</div>
      <span class="toast-copied">Copied!</span>
      <div class="toast-progress"></div>
    </div>

    <div class="toast toast--warning" data-message="Your session will expire in 5 minutes.">
      <div class="toast-icon">!</div>
      <div class="toast-content">
        <p class="toast-title">Warning</p>
        <p class="toast-message">Your session will expire in 5 minutes.</p>
      </div>
      <div class="toast-close">✕</div>
      <span class="toast-copied">Copied!</span>
      <div class="toast-progress"></div>
    </div>

    <div class="toast toast--error" data-message="Something went wrong. Please try again.">
      <div class="toast-icon">✕</div>
      <div class="toast-content">
        <p class="toast-title">Error</p>
        <p class="toast-message">Something went wrong. Please try again.</p>
      </div>
      <div class="toast-close">✕</div>
      <span class="toast-copied">Copied!</span>
      <div class="toast-progress"></div>
    </div>
  </div>

  <script>
    // Click-to-copy: clicking a toast copies its message text to the clipboard.
    // Progressive enhancement only — toasts remain fully functional/visible without JS.
    document.querySelectorAll('.toast').forEach(function (toast) {
      toast.addEventListener('click', function (e) {
        // Don't trigger copy when the dismiss (✕) icon is clicked
        if (e.target.classList.contains('toast-close')) return;

        var message = toast.getAttribute('data-message') || '';
        navigator.clipboard.writeText(message).then(function () {
          toast.classList.add('is-copied');
          setTimeout(function () {
            toast.classList.remove('is-copied');
          }, 1500);
        });
      });

      toast.querySelector('.toast-close').addEventListener('click', function () {
        toast.remove();
      });
    });
  </script>
</body>
</html>
