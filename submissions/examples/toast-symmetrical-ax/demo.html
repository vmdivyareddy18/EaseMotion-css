<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Symmetrical Toast Animation</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Symmetrical Toast
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button to show a toast that slides in and out over the same distance.
    </p>

    <button id="show-toast" class="ease-btn ease-btn-primary ease-btn-lg ease-hover-scale-105 ease-transition ease-mb-8">
      Show Toast
    </button>

    <!-- Toast element -->
    <div id="toast" class="sym-toast ease-card ease-p-4 ease-shadow-lg ease-fade-in">
      <div class="ease-flex ease-justify-between ease-items-center">
        <span class="ease-font-semibold">✅ Action completed!</span>
        <button id="close-toast" class="ease-text-gray-400 ease-hover-text-gray-600 ease-text-lg">&times;</button>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      Both enter and exit use <code>translateX(32px)</code> — no jarring 100% slide.
    </p>
  </div>

  <script>
    const toast = document.getElementById('toast');
    const showBtn = document.getElementById('show-toast');
    const closeBtn = document.getElementById('close-toast');

    showBtn.addEventListener('click', () => {
      toast.classList.remove('leave');
      toast.classList.add('enter');
      // After 4 seconds, start the leave animation
      setTimeout(() => {
        toast.classList.remove('enter');
        toast.classList.add('leave');
      }, 4000);
    });

    closeBtn.addEventListener('click', () => {
      toast.classList.remove('enter');
      toast.classList.add('leave');
    });
  </script>

</body>
</html>
