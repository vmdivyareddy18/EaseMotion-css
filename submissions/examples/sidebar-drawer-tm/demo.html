<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sidebar Drawer</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Sidebar Drawer</h1>
    <button onclick="document.querySelector('.ease-drawer').classList.add('ease-drawer-open')">Open Drawer</button>
    <aside class="ease-drawer ease-drawer-right">
      <h2>Menu</h2>
      <p>Drawer content</p>
      <button onclick="this.parentElement.classList.remove('ease-drawer-open')">Close</button>
    </aside>
  </div>
</body>
</html>
