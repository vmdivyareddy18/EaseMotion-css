<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Rich-Text Toolbar — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-label">EaseMotion CSS — Rich-Text Toolbar Collection</p>

  <div class="editor-shell">

    <!-- ── Toolbar ──────────────────────────────────────── -->
    <div class="ease-toolbar" role="toolbar" aria-label="Text formatting">

      <!-- Text style group -->
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Bold (Ctrl+B)" data-cmd="bold" aria-pressed="false">
        <b>B</b>
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Italic (Ctrl+I)" data-cmd="italic" aria-pressed="false">
        <i>I</i>
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Underline (Ctrl+U)" data-cmd="underline" aria-pressed="false">
        <u>U</u>
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Strikethrough" data-cmd="strikeThrough" aria-pressed="false">
        <s>S</s>
      </button>

      <span class="ease-toolbar-divider" aria-hidden="true"></span>

      <!-- Alignment group -->
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Align left" data-cmd="justifyLeft" aria-pressed="false">
        ≡
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Align center" data-cmd="justifyCenter" aria-pressed="false">
        ☰
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Align right" data-cmd="justifyRight" aria-pressed="false">
        ≡
      </button>

      <span class="ease-toolbar-divider" aria-hidden="true"></span>

      <!-- List group -->
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Bullet list" data-cmd="insertUnorderedList" aria-pressed="false">
        &#8226;&#8801;
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Numbered list" data-cmd="insertOrderedList" aria-pressed="false">
        1&#8801;
      </button>

      <span class="ease-toolbar-divider" aria-hidden="true"></span>

      <!-- Extras -->
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Insert link" data-cmd="createLink" aria-pressed="false">
        🔗
      </button>
      <button class="ease-toolbar-btn ease-toolbar-tooltip-pop" data-tooltip="Clear formatting" data-cmd="removeFormat" aria-pressed="false">
        ✕
      </button>

      <span class="ease-toolbar-divider" aria-hidden="true"></span>

      <!-- Colour picker (wide button) -->
      <button class="ease-toolbar-btn ease-toolbar-btn-wide ease-toolbar-tooltip-pop" data-tooltip="Text colour" id="colorBtn">
        <span class="color-swatch" id="colorSwatch" style="background:#6366f1"></span>
        Color
      </button>
      <input type="color" id="colorPicker" value="#6366f1" style="display:none" />

    </div><!-- /.ease-toolbar -->

    <!-- ── Editable area ─────────────────────────────────── -->
    <div
      class="editor-body"
      id="editor"
      contenteditable="true"
      data-placeholder="Select text and use the toolbar above…"
      role="textbox"
      aria-multiline="true"
      aria-label="Rich text editor"
    >
      <p>Welcome to the <strong>EaseMotion CSS</strong> rich-text toolbar demo. Select any text here and press a toolbar button to apply formatting.</p>
      <p>Try <em>italic</em>, <u>underline</u>, or <s>strikethrough</s>. The active button lights up with a <strong>purple highlight</strong> and a subtle pulse animation.</p>
    </div>

  </div><!-- /.editor-shell -->

  <script>
    const editor   = document.getElementById('editor');
    const buttons  = document.querySelectorAll('.ease-toolbar-btn[data-cmd]');
    const colorBtn = document.getElementById('colorBtn');
    const colorPicker = document.getElementById('colorPicker');
    const colorSwatch = document.getElementById('colorSwatch');

    /* ── Sync active states ──────────────────────────────── */
    function syncActiveStates() {
      buttons.forEach(btn => {
        const cmd = btn.dataset.cmd;
        let active = false;

        try {
          // queryCommandState works for toggle commands
          if (['bold','italic','underline','strikeThrough',
               'justifyLeft','justifyCenter','justifyRight',
               'insertUnorderedList','insertOrderedList'].includes(cmd)) {
            active = document.queryCommandState(cmd);
          }
        } catch (_) {}

        // Toggle class without re-triggering animation if unchanged
        const wasActive = btn.classList.contains('ease-toolbar-btn-active');
        if (active !== wasActive) {
          btn.classList.toggle('ease-toolbar-btn-active', active);
          btn.setAttribute('aria-pressed', String(active));
        }
      });
    }

    /* ── Button click ────────────────────────────────────── */
    buttons.forEach(btn => {
      btn.addEventListener('mousedown', e => {
        e.preventDefault(); // keep editor focus
        const cmd = btn.dataset.cmd;

        if (cmd === 'createLink') {
          const url = prompt('Enter URL:', 'https://');
          if (url) document.execCommand('createLink', false, url);
        } else {
          document.execCommand(cmd, false, null);
        }

        syncActiveStates();
      });
    });

    /* ── Colour picker ───────────────────────────────────── */
    colorBtn.addEventListener('mousedown', e => {
      e.preventDefault();
      colorPicker.click();
    });

    colorPicker.addEventListener('input', () => {
      const col = colorPicker.value;
      colorSwatch.style.background = col;
      editor.focus();
      document.execCommand('foreColor', false, col);
    });

    /* ── Sync on selection change ────────────────────────── */
    document.addEventListener('selectionchange', syncActiveStates);
    editor.addEventListener('keyup', syncActiveStates);

    /* ── Keyboard shortcuts ──────────────────────────────── */
    editor.addEventListener('keydown', e => {
      if (!e.ctrlKey && !e.metaKey) return;
      const map = { b:'bold', i:'italic', u:'underline' };
      if (map[e.key.toLowerCase()]) {
        // browser handles it; just sync
        setTimeout(syncActiveStates, 0);
      }
    });
  </script>

</body>
</html>
