<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Swing GDPR Modal | EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="demo-container">

        <button class="demo-button ease-hover-lift">
            Privacy Settings
        </button>


        <section 
            class="gdpr-overlay"
            aria-label="Cookie consent modal"
        >

            <div 
                class="gdpr-modal ease-swing-in"
                role="dialog"
                aria-modal="true"
                aria-labelledby="gdpr-title"
            >

                <div class="modal-icon" aria-hidden="true">
                    🔒
                </div>


                <h1 id="gdpr-title">
                    Your Privacy Matters
                </h1>


                <p>
                    We use cookies to improve your browsing
                    experience, analyze website traffic and
                    provide better services.
                </p>


                <div class="modal-actions">

                    <button class="accept-btn ease-hover-lift">
                        Accept All
                    </button>


                    <button class="settings-btn ease-hover-lift">
                        Manage Cookies
                    </button>

                </div>


            </div>

        </section>

    </main>

</body>
</html>
