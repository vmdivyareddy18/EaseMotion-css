<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-neon — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      gap: 2.5rem;
      padding: 2rem;
    }
    h1 { color: #fff; font-size: 1rem; opacity: 0.4; }
    .label { font-size: 0.7rem; color: #444; text-align: center; margin-bottom: 0.5rem; }
    .section { display: flex; flex-direction: column; align-items: center; }
    .row { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; align-items: center; }
    .big { font-size: 2.5rem; font-weight: 800; }
    .med { font-size: 1.5rem; font-weight: 700; }
    .box {
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <h1>ease-neon Demo</h1>

  <div class="section">
    <div class="label">Color variants</div>
    <div class="row">
      <p class="big ease-neon ease-neon-pink">Pink</p>
      <p class="big ease-neon ease-neon-blue">Blue</p>
      <p class="big ease-neon ease-neon-green">Green</p>
      <p class="big ease-neon ease-neon-purple">Purple</p>
      <p class="big ease-neon ease-neon-amber">Amber</p>
      <p class="big ease-neon ease-neon-red">Red</p>
    </div>
  </div>

  <div class="section">
    <div class="label">Intensity variants</div>
    <div class="row">
      <p class="med ease-neon-soft ease-neon-blue">Soft</p>
      <p class="med ease-neon ease-neon-blue">Default</p>
      <p class="med ease-neon-intense ease-neon-blue">Intense</p>
    </div>
  </div>

  <div class="section">
    <div class="label">Neon border boxes</div>
    <div class="row">
      <div class="box ease-neon-border ease-neon-pink" style="color:#ff2d95;">Pink Box</div>
      <div class="box ease-neon-border ease-neon-blue" style="color:#00d4ff;">Blue Box</div>
      <div class="box ease-neon-border ease-neon-green" style="color:#39ff14;">Green Box</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Animated pulse</div>
    <div class="row">
      <p class="med ease-neon ease-neon-pulse ease-neon-pink">Pulse Pink</p>
      <p class="med ease-neon ease-neon-pulse ease-neon-blue">Pulse Blue</p>
    </div>
  </div>

  <div class="section">
    <div class="label">Flicker effect</div>
    <div class="row">
      <p class="big ease-neon ease-neon-flicker ease-neon-green">Flicker</p>
      <p class="big ease-neon ease-neon-flicker ease-neon-purple">Neon</p>
    </div>
  </div>

</body>
</html>
