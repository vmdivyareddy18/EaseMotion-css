<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neon Border Trace Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Neon Border Trace — Buttons</h2>
    <div style="display:flex; gap:20px; flex-wrap:wrap; justify-content:center;">

      <div class="neon-border-trace">
        <button class="neu-btn">⚡ Purple Trace</button>
      </div>

      <div class="neon-border-trace green">
        <button class="neu-btn">✦ Green Trace</button>
      </div>

      <div class="neon-border-trace orange">
        <button class="neu-btn">🔥 Orange Trace</button>
      </div>

      <div class="neon-border-trace pink">
        <button class="neu-btn">💜 Pink Trace</button>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>Neon Border Trace — Cards</h2>
    <div style="display:flex; gap:24px; flex-wrap:wrap; justify-content:center;">

      <div class="neon-border-trace">
        <div class="neu-card">
          <div class="neu-card-title">⚡ EaseMotion CSS</div>
          <div class="neu-card-text">
            Animation-first CSS framework.<br/>
            Zero dependencies.
          </div>
        </div>
      </div>

      <div class="neon-border-trace green">
        <div class="neu-card">
          <div class="neu-card-title">✦ Open Source</div>
          <div class="neu-card-text">
            Built by the community.<br/>
            Free forever.
          </div>
        </div>
      </div>

      <div class="neon-border-trace pink">
        <div class="neu-card">
          <div class="neu-card-title">💜 GSSoC 2026</div>
          <div class="neu-card-text">
            Contributing to EaseMotion CSS<br/>
            during GirlScript Summer of Code.
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
