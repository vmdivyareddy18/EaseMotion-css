<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS alert-link</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div class="demo">
    <h1>Alert Links</h1>

      <div class="alt success">Payment received! <a href="#" class="alt-link">View receipt &#8594;</a></div>
      <div class="alt error">Upload failed. <a href="#" class="alt-link">Retry &#8635;</a></div>
      <div class="alt warning">Session expiring. <a href="#" class="alt-link">Extend &#8594;</a></div>

    </div>
  </div>
