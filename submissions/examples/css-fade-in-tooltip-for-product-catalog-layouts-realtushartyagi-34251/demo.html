<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-In Tooltip (Product Catalog)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f3f4f6; /* Soft gray for a clean catalog feel */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    
    .container {
      text-align: center;
      background: white;
      padding: 60px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    
    .title {
      color: #111827;
      margin-top: 0;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    
    .subtitle {
      color: #6b7280;
      margin-bottom: 40px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="title">Product Catalog Interface</h2>
    <p class="subtitle">Hover over the button to view details.</p>
    
    <!-- Tooltip Wrapper -->
    <div class="ease-pc-tooltip-wrapper">
      <button class="ease-pc-btn" aria-describedby="catalog-tooltip">
        View Specs
      </button>
      
      <!-- Tooltip Content -->
      <div id="catalog-tooltip" class="ease-pc-tooltip-content" role="tooltip">
        <strong>Ergonomic Chair V2</strong><br/>
        Includes adjustable lumbar support and breathable mesh.
      </div>
    </div>
    
  </div>
</body>
</html>
