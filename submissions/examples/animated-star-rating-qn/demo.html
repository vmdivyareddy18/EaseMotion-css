<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Star Rating - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="rating-container-qn">
        <h2>How was your experience?</h2>
        <p>Click the stars to rate us</p>
        
        <!-- The Star Rating Component -->
        <div class="rating-qn">
            <!-- Note: The order is 5 to 1 in the HTML, but CSS flex-direction: row-reverse displays them 1 to 5 visually -->
            <input type="radio" id="star5-qn" name="rating-qn" value="5">
            <label for="star5-qn" title="5 stars">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </label>

            <input type="radio" id="star4-qn" name="rating-qn" value="4">
            <label for="star4-qn" title="4 stars">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </label>

            <input type="radio" id="star3-qn" name="rating-qn" value="3">
            <label for="star3-qn" title="3 stars">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </label>

            <input type="radio" id="star2-qn" name="rating-qn" value="2">
            <label for="star2-qn" title="2 stars">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </label>

            <input type="radio" id="star1-qn" name="rating-qn" value="1">
            <label for="star1-qn" title="1 star">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </label>
        </div>
    </div>
</body>
</html>
