<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Return Reason Selector</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Return Request</h1>

        <p class="subtitle">
            Select the reason for returning your product.
        </p>

        <div class="options">

            <label class="option">

                <input type="radio" name="reason" checked>

                <span class="indicator"></span>

                <div class="content">

                    <h3>Damaged Item</h3>

                    <p>The product arrived damaged or defective.</p>

                </div>

                <span class="tag urgent">
                    High
                </span>

            </label>

            <label class="option">

                <input type="radio" name="reason">

                <span class="indicator"></span>

                <div class="content">

                    <h3>Wrong Product</h3>

                    <p>Received a different item than ordered.</p>

                </div>

                <span class="tag warning">
                    Priority
                </span>

            </label>

            <label class="option">

                <input type="radio" name="reason">

                <span class="indicator"></span>

                <div class="content">

                    <h3>Changed My Mind</h3>

                    <p>No longer need the purchased product.</p>

                </div>

                <span class="tag info">
                    Standard
                </span>

            </label>

            <label class="option">

                <input type="radio" name="reason">

                <span class="indicator"></span>

                <div class="content">

                    <h3>Other</h3>

                    <p>Provide another reason during the next step.</p>

                </div>

                <span class="tag neutral">
                    Custom
                </span>

            </label>

        </div>

        <button>
            Continue Return
        </button>

    </div>

</div>

</body>
</html>
