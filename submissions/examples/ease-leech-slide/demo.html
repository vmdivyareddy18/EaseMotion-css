<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Leech Slide Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Leech Slide Animation</h1>
        <div class="aquarium">
            <div class="leech">
                <div class="segment head"></div>
                <div class="segment body-mid"></div>
                <div class="segment tail"></div>
            </div>
        </div>
        <button onclick="document.location.reload()">Slide/Inch</button>
    </div>
</body>
</html>
