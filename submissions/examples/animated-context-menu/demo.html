<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Context Menu - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Mock Desktop Area -->
  <div class="desktop-area" id="desktop">
    <div class="desktop-content">
      <h2>📁 File Explorer</h2>
      <p>Right-click anywhere in this area to open the animated context menu.</p>
      <button class="mobile-trigger" id="mobile-trigger">Show Menu (Touch/Mobile)</button>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="context-menu">
    <div class="context-menu-inner ease-zoom-in">
      <ul class="menu-list">
        <li class="menu-item ease-fade-in-up ease-delay-100">
          <span class="menu-icon">📋</span>
          <span class="menu-text">Copy</span>
          <span class="menu-shortcut">⌘C</span>
        </li>
        <li class="menu-item ease-fade-in-up ease-delay-200">
          <span class="menu-icon">📄</span>
          <span class="menu-text">Paste</span>
          <span class="menu-shortcut">⌘V</span>
        </li>
        <li class="menu-item disabled ease-fade-in-up ease-delay-300">
          <span class="menu-icon">✂️</span>
          <span class="menu-text">Cut</span>
          <span class="menu-shortcut">⌘X</span>
        </li>
        
        <li class="menu-divider ease-fade-in ease-delay-400"></li>
        
        <li class="menu-item ease-fade-in-up ease-delay-500">
          <span class="menu-icon">📁</span>
          <span class="menu-text">New Folder</span>
        </li>
        <li class="menu-item ease-fade-in-up ease-delay-600">
          <span class="menu-icon">🗑️</span>
          <span class="menu-text">Move to Trash</span>
          <span class="menu-shortcut">⌫</span>
        </li>
        
        <li class="menu-divider ease-fade-in ease-delay-700"></li>
        
        <li class="menu-item has-submenu ease-fade-in-up ease-delay-800">
          <span class="menu-icon">⚙️</span>
          <span class="menu-text">Settings</span>
          <span class="menu-arrow">▶</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- JavaScript for Context Menu Functionality -->
  <script>
    const desktop = document.getElementById('desktop');
    const menu = document.getElementById('context-menu');
    const mobileTrigger = document.getElementById('mobile-trigger');

    // Function to show and position the menu
    function showMenu(x, y) {
      // Ensure menu doesn't go off-screen
      const menuWidth = 240;
      const menuHeight = 320;
      
      if (x + menuWidth > window.innerWidth) {
        x = window.innerWidth - menuWidth - 10;
      }
      if (y + menuHeight > window.innerHeight) {
        y = window.innerHeight - menuHeight - 10;
      }

      menu.style.left = `${x}px`;
      menu.style.top = `${y}px`;
      menu.classList.add('active');

      // Re-trigger EaseMotion animations
      const inner = menu.querySelector('.context-menu-inner');
      const animElements = menu.querySelectorAll('[class*="ease-"]');
      
      animElements.forEach(el => {
        el.style.animation = 'none';
        el.offsetHeight; // Trigger reflow
        el.style.animation = null;
      });
    }

    // Function to hide the menu
    function hideMenu() {
      menu.classList.remove('active');
    }

    // Desktop right-click
    desktop.addEventListener('contextmenu', (e) => {
      e.preventDefault();
      showMenu(e.clientX, e.clientY);
    });

    // Mobile/Touch fallback button
    mobileTrigger.addEventListener('click', (e) => {
      e.stopPropagation();
      const rect = mobileTrigger.getBoundingClientRect();
      showMenu(rect.left, rect.bottom + 10);
    });

    // Close on click outside
    document.addEventListener('click', (e) => {
      if (!menu.contains(e.target) && e.target !== mobileTrigger) {
        hideMenu();
      }
    });

    // Close on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        hideMenu();
      }
    });
  </script>
</body>
</html>
