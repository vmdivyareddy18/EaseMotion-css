<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Magnetic Pull Modal Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="page">
    <header class="hero">
      <h1>Marketing Landing Page</h1>
      <p>Example page demonstrating a CSS-only modal.</p>

      <input
        type="checkbox"
        id="modal-toggle"
        class="modal-toggle"
        hidden
      >

      <label for="modal-toggle" class="open-button">
        Open Modal
      </label>
    </header>

    <div class="overlay">
      <label
        for="modal-toggle"
        class="overlay-close"
        aria-hidden="true">
      </label>

      <section
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        aria-describedby="modal-description"
        tabindex="-1">

        <header class="modal-header">
          <h2 id="modal-title">
            Exclusive Offer
          </h2>

          <label
            for="modal-toggle"
            class="close-button"
            aria-label="Close dialog">
            ×
          </label>
        </header>

        <p id="modal-description">
          Replace this content with your marketing message.
        </p>

        <div class="modal-actions">
          <label for="modal-toggle" class="secondary-button">
            Cancel
          </label>

          <a href="#" class="primary-button">
            Get Started
          </a>
        </div>

      </section>
    </div>

  </main>

</body>
</html>
