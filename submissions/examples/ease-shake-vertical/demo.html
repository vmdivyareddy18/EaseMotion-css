<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-shake-vertical – Vertical Shake</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Vertical Shake</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the button to make the card shake up and down.</p>

    <div id="shake-box" class="shake-box ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Shake me</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Vertical axis only</p>
    </div>

    <button id="shake-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">Shake</button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">Rapid <code>translateY</code> oscillation, one-shot 0.5s.</p>
  </div>

  <script>
    const box = document.getElementById('shake-box');
    document.getElementById('shake-btn').addEventListener('click', () => {
      box.classList.remove('shake');
      void box.offsetWidth;
      box.classList.add('shake');
    });
  </script>

</body>
</html>
