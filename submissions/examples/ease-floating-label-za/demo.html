<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Label - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="fl2-hdr"><h1>Floating Label Input</h1><p>CSS-only floating labels using :focus-within and :placeholder-shown</p></header>
<section class="fl2-sec"><h2>Input Fields</h2>
<div class="fl2-group"><div class="fl2-field"><input type="text" class="fl2-inp" placeholder=" " id="fl2-name"><label class="fl2-lbl" for="fl2-name">Full Name</label></div><div class="fl2-field"><input type="email" class="fl2-inp" placeholder=" " id="fl2-email"><label class="fl2-lbl" for="fl2-email">Email Address</label></div><div class="fl2-field"><input type="password" class="fl2-inp" placeholder=" " id="fl2-pass"><label class="fl2-lbl" for="fl2-pass">Password</label></div><div class="fl2-field"><textarea class="fl2-inp fl2-ta" placeholder=" " id="fl2-msg" rows="3"></textarea><label class="fl2-lbl" for="fl2-msg">Message</label></div></div></section>
<section class="fl2-sec"><h2>Color Themes</h2>
<div class="fl2-group"><div class="fl2-field fl2-primary"><input type="text" class="fl2-inp" placeholder=" " id="fl2-p1"><label class="fl2-lbl" for="fl2-p1">Primary Theme</label></div><div class="fl2-field fl2-accent"><input type="text" class="fl2-inp" placeholder=" " id="fl2-a1"><label class="fl2-lbl" for="fl2-a1">Accent Theme</label></div><div class="fl2-field fl2-success"><input type="text" class="fl2-inp" placeholder=" " id="fl2-s1"><label class="fl2-lbl" for="fl2-s1">Success Theme</label></div></div></section>
<section class="fl2-sec"><h2>Sizes</h2>
<div class="fl2-group"><div class="fl2-field fl2-sm"><input type="text" class="fl2-inp" placeholder=" " id="fl2-zs"><label class="fl2-lbl" for="fl2-zs">Small Input</label></div><div class="fl2-field"><input type="text" class="fl2-inp" placeholder=" " id="fl2-zd"><label class="fl2-lbl" for="fl2-zd">Default Input</label></div><div class="fl2-field fl2-lg"><input type="text" class="fl2-inp" placeholder=" " id="fl2-zl"><label class="fl2-lbl" for="fl2-zl">Large Input</label></div></div></section>
<section class="fl2-sec"><h2>With Icons</h2>
<div class="fl2-group"><div class="fl2-field fl2-icon"><span class="fl2-ico">&#128269;</span><input type="text" class="fl2-inp" placeholder=" " id="fl2-is"><label class="fl2-lbl" for="fl2-is">Search</label></div><div class="fl2-field fl2-icon"><span class="fl2-ico">&#128205;</span><input type="text" class="fl2-inp" placeholder=" " id="fl2-il"><label class="fl2-lbl" for="fl2-il">Location</label></div></div></section>
<footer class="ftr"><p>EaseMotion - Floating Label | GSSoC 2026</p></footer>
</body>
</html>
