<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Glow Hover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Glow Hover Buttons</h1>
  <div class="glow-group">
    <button class="glow-btn glow-btn--blue">Blue Glow</button>
    <button class="glow-btn glow-btn--green">Green Glow</button>
    <button class="glow-btn glow-btn--red">Red Glow</button>
    <button class="glow-btn glow-btn--purple">Purple Glow</button>
    <button class="glow-btn glow-btn--gold">Gold Glow</button>
  </div>
</body>
</html>
