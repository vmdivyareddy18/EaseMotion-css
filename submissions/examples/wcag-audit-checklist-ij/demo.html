<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WCAG Audit Checklist - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>WCAG Audit Checklist</h1>

    <div class="checklist">
      <label class="check-item">
        <input type="checkbox" checked disabled>
        <div class="check-content">
          <strong>prefers-reduced-motion</strong>
          <span>Animations respect <code>@media (prefers-reduced-motion: no-preference)</code> — disabled when user requests reduced motion</span>
        </div>
      </label>
      <label class="check-item">
        <input type="checkbox" checked disabled>
        <div class="check-content">
          <strong>Color Contrast</strong>
          <span>Text has 4.5:1 minimum ratio against background. Animated elements maintain readability</span>
        </div>
      </label>
      <label class="check-item">
        <input type="checkbox" checked disabled>
        <div class="check-content">
          <strong>Keyboard Accessibility</strong>
          <span>All interactive elements focusable via Tab. Visible focus indicators. No keyboard traps</span>
        </div>
      </label>
      <label class="check-item">
        <input type="checkbox" disabled>
        <div class="check-content">
          <strong>ARIA Attributes</strong>
          <span>Interactive components have proper roles, states, and live regions for dynamic content</span>
        </div>
      </label>
      <label class="check-item">
        <input type="checkbox" checked disabled>
        <div class="check-content">
          <strong>Animation Duration</strong>
          <span>Animations complete within 3 seconds per WCAG 2.3.1 (flash thresholds). No infinite animations without user control</span>
        </div>
      </label>
      <label class="check-item">
        <input type="checkbox" checked disabled>
        <div class="check-content">
          <strong>Focus Order</strong>
          <span>Tab order matches visual layout. Modals trap focus. Dropdowns close on Escape</span>
        </div>
      </label>
    </div>

    <div class="preview-section">
      <h3>Quick Checks</h3>
      <div class="preview-card">
        <button class="demo-btn motion-test" id="motionBtn">Test Animation</button>
        <div class="motion-box" id="motionBox">Reduced motion respected</div>
      </div>
      <div class="preview-card">
        <button class="demo-btn contrast-test" id="contrastBtn" aria-label="Check color contrast">Contrast: AA Pass</button>
      </div>
    </div>

    <p class="description">Checklist items contributors should verify before submitting animation PRs. Use as a PR template reference.</p>
  </div>

  <script>
    const motionBtn = document.getElementById('motionBtn');
    const motionBox = document.getElementById('motionBox');
    motionBtn.addEventListener('click', () => {
      motionBox.classList.toggle('animate');
    });
  </script>
</body>
</html>
