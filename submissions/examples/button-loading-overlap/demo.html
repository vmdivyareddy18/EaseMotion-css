<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Loading Button Example</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <h2>Button Loading State Bug Fix</h2>
        <p>Click the button below to toggle the loading state. Notice that the text cleanly disappears when loading, keeping the spinner readable.</p>
        
        <!-- The Component -->
        <button id="submitBtn" class="ease-btn">
            <span class="ease-btn-text">Submit Changes</span>
        </button>
    </div>

    <script>
        const btn = document.getElementById('submitBtn');
        btn.addEventListener('click', () => {
            btn.classList.toggle('ease-btn-loading');
        });
    </script>
</body>
</html>
