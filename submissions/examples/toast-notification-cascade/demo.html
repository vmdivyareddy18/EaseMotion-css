<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notification - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .info-text {
      color: #667eea;
      font-size: 0.875rem;
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Toast Notification</h1>
    <p class="subtitle">Slide-in/out notifications with different types and positions</p>
    
    <div class="toast-demo-container">
      <div class="toast-demo-item">
        <span class="toast-demo-label">Notification Types</span>
        <div class="toast-demo-buttons">
          <button class="toast-demo-button" onclick="showToast('success')">Success</button>
          <button class="toast-demo-button" onclick="showToast('error')">Error</button>
          <button class="toast-demo-button" onclick="showToast('warning')">Warning</button>
          <button class="toast-demo-button" onclick="showToast('info')">Info</button>
        </div>
      </div>

      <div class="toast-demo-item">
        <span class="toast-demo-label">Size Variants</span>
        <div class="toast-demo-buttons">
          <button class="toast-demo-button" onclick="showToast('success', 'sm')">Small</button>
          <button class="toast-demo-button" onclick="showToast('success', 'md')">Medium</button>
          <button class="toast-demo-button" onclick="showToast('success', 'lg')">Large</button>
        </div>
      </div>

      <div class="toast-demo-item">
        <span class="toast-demo-label">Position Variants</span>
        <div class="toast-demo-buttons">
          <button class="toast-demo-button" onclick="showToast('success', 'md', 'top-right')">Top Right</button>
          <button class="toast-demo-button" onclick="showToast('success', 'md', 'top-left')">Top Left</button>
          <button class="toast-demo-button" onclick="showToast('success', 'md', 'bottom-right')">Bottom Right</button>
          <button class="toast-demo-button" onclick="showToast('success', 'md', 'bottom-left')">Bottom Left</button>
        </div>
      </div>

      <div class="toast-demo-item">
        <span class="toast-demo-label">Auto-dismiss (3 seconds)</span>
        <div class="toast-demo-buttons">
          <button class="toast-demo-button" onclick="showToast('success', 'md', 'top-right', true)">Auto-dismiss</button>
        </div>
      </div>
    </div>

    <p class="info-text">Click buttons to trigger toast notifications</p>
  </div>

  <div id="toast-container" class="toast-container toast-top-right"></div>

  <script>
    const icons = {
      success: '✓',
      error: '✕',
      warning: '⚠',
      info: 'ℹ'
    };

    const titles = {
      success: 'Success',
      error: 'Error',
      warning: 'Warning',
      info: 'Information'
    };

    const messages = {
      success: 'Your changes have been saved successfully.',
      error: 'An error occurred. Please try again.',
      warning: 'Please review your input before proceeding.',
      info: 'Here is some important information for you.'
    };

    function showToast(type, size = 'md', position = 'top-right', autoDismiss = false) {
      const container = document.getElementById('toast-container');
      
      // Update container position
      container.className = `toast-container toast-${position}`;
      
      // Create toast element
      const toast = document.createElement('div');
      toast.className = `toast-notification toast-${type} toast-${size}`;
      
      toast.innerHTML = `
        <span class="toast-icon">${icons[type]}</span>
        <div class="toast-content">
          <h4 class="toast-title">${titles[type]}</h4>
          <p class="toast-message">${messages[type]}</p>
        </div>
        <button class="toast-close" onclick="dismissToast(this)">✕</button>
      `;
      
      container.appendChild(toast);
      
      // Auto-dismiss after 3 seconds if enabled
      if (autoDismiss) {
        setTimeout(() => {
          dismissToast(toast.querySelector('.toast-close'));
        }, 3000);
      }
    }

    function dismissToast(button) {
      const toast = button.closest('.toast-notification');
      toast.classList.add('toast-dismiss');
      
      // Remove from DOM after animation completes
      setTimeout(() => {
        toast.remove();
      }, 300);
    }
  </script>
</body>
</html>
