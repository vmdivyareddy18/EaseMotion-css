<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3-Way Switch - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion 3-Way Switch</h1>
      <p>A CSS-only toggle switch with three distinct states (Off / Neutral / On).</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>System Status Override</h2>
        <p class="instruction">Click the left, center, or right of the track to change states.</p>
        
        <div class="switch-container">
          
          <div class="ease-switch-3way">
            <!-- The 3 hidden radio inputs -->
            <input type="radio" name="system-status" id="status-off" value="off" class="ease-switch-input" checked />
            <input type="radio" name="system-status" id="status-neutral" value="neutral" class="ease-switch-input" />
            <input type="radio" name="system-status" id="status-on" value="on" class="ease-switch-input" />
            
            <!-- The visible track and knob -->
            <div class="ease-switch-track">
              <!-- Clickable areas mapped to the inputs -->
              <label for="status-off" class="ease-switch-label" aria-label="Set to Off"></label>
              <label for="status-neutral" class="ease-switch-label" aria-label="Set to Neutral"></label>
              <label for="status-on" class="ease-switch-label" aria-label="Set to On"></label>
              
              <div class="ease-switch-knob"></div>
            </div>
          </div>

          <div class="status-labels">
            <span class="status-text off">Off</span>
            <span class="status-text neutral">Auto</span>
            <span class="status-text on">On</span>
          </div>

        </div>
        
      </section>
    </main>
  </div>
</body>
</html>
