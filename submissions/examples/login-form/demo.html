<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="./style.css"/>

<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Login</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="login-page">

  <div class="login-card">

    <div class="login-logo">
      ⚡ EaseMotion CSS
    </div>

    <h1>Welcome Back</h1>

    <p>
      Login to continue your journey with EaseMotion CSS
    </p>


    <form>

      <div class="input-group">
        <label>Email</label>
        <input 
          type="email"
          placeholder="Enter your email"
        >
      </div>


      <div class="input-group">

        <label>Password</label>

        <input 
          type="password"
          placeholder="Enter your password"
        >

      </div>


      <div class="login-options">

        <label>
          <input type="checkbox">
          Remember me
        </label>

        <a href="#">
          Forgot password?
        </a>

      </div>


      <button class="login-btn">
        Login
      </button>


      <div class="divider">
        <span>OR</span>
      </div>


      <div class="social-buttons">

        <button>
          🐙 GitHub
        </button>

        <button>
          🌐 Google
        </button>

        <button>
          💬 Discord
        </button>

      </div>


      <p class="signup">
        Don't have an account?
        <a href="#">Create account</a>
      </p>


    </form>

  </div>

</section>


</body>
</html>
</body>
</html>
