<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Navigation Menu Bar</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='nav-bg')r.style.setProperty('--nav-bg',t.value);if(t.name==='link-color')r.style.setProperty('--link-color',t.value);if(t.name==='active-color')r.style.setProperty('--active-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const items=document.querySelectorAll('.nav-item');const ind=document.querySelector('.indicator');function move(el){const w=el.offsetWidth;const l=el.offsetLeft;ind.style.width=w+'px';ind.style.transform='translateX('+l+'px)';items.forEach(i=>i.classList.remove('active'));el.classList.add('active')}items.forEach(i=>i.addEventListener('click',()=>move(i)));move(items[0])})</script>
<div class="container"><p class="title">Navigation Menu Bar</p>
<nav class="nav"><span class="nav-item">Home</span><span class="nav-item">Explore</span><span class="nav-item">Library</span><span class="nav-item">Profile</span><div class="indicator"></div></nav>
<div class="controls"><label>Nav BG: <input type="color" name="nav-bg" value="#2d2d44"></label><label>Link: <input type="color" name="link-color" value="#888"></label><label>Active: <input type="color" name="active-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="slide-duration" min="0.1" max="0.8" step="0.05" value="0.3"></label></div></div></body></html>
