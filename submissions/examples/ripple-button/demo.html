<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Button Effect Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f5f5f5;
      margin: 0;
    }
    .container {
      padding: 40px;
      text-align: center;
    }
    h2 {
      margin-bottom: 50px;
      color: #333;
      font-weight: 400;
    }
    .demo-row {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .demo-label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Material Design Ripple Button</h2>
    
    <div class="demo-row">
      <!-- Default Ripple -->
      <div class="demo-item">
        <button class="ripple-btn">Click Me</button>
        <span class="demo-label">Default</span>
      </div>
      
      <!-- Primary Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-primary">Primary</button>
        <span class="demo-label">Primary</span>
      </div>
      
      <!-- Success Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-success">Success</button>
        <span class="demo-label">Success</span>
      </div>
      
      <!-- Danger Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-danger">Danger</button>
        <span class="demo-label">Danger</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Large Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-large">Large Button</button>
        <span class="demo-label">Large</span>
      </div>
      
      <!-- Small Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-small">Small</button>
        <span class="demo-label">Small</span>
      </div>
      
      <!-- Icon Button -->
      <div class="demo-item">
        <button class="ripple-btn ripple-icon">+</button>
        <span class="demo-label">Icon</span>
      </div>
      
      <!-- Rounded Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-rounded">Rounded</button>
        <span class="demo-label">Rounded</span>
      </div>
    </div>
    
    <div class="demo-row">
      <!-- Dark Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-dark">Dark Theme</button>
        <span class="demo-label">Dark</span>
      </div>
      
      <!-- Outline Ripple -->
      <div class="demo-item">
        <button class="ripple-btn ripple-outline">Outline</button>
        <span class="demo-label">Outline</span>
      </div>
    </div>
  </div>

  <script>
    // Add ripple effect on click
    document.querySelectorAll('.ripple-btn').forEach(button => {
      button.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const ripple = document.createElement('span');
        ripple.classList.add('ripple-effect');
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';
        
        this.appendChild(ripple);
        
        setTimeout(() => ripple.remove(), 600);
      });
    });
  </script>
</body>
</html>
