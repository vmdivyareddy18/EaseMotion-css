<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Points Counter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Points System</h1>

  <div class="xp-card ease-slide-up">

    <h2>Level <span id="level">1</span></h2>

    <p class="xp-text"><span id="xp">0</span> XP</p>

    <!-- FLOATING XP TEXT -->
    <div id="xp-float" class="xp-float">+50 XP</div>

    <button onclick="gainXP()" class="xp-btn">Gain XP</button>

  </div>
</section>

<script>
let xp = 0;
let level = 1;

function gainXP() {
  const gain = Math.random() > 0.5 ? 50 : 100;
  xp += gain;

  // FLOAT TEXT
  const float = document.getElementById("xp-float");
  float.textContent = "+" + gain + " XP";
  float.classList.add("show");

  setTimeout(() => {
    float.classList.remove("show");
  }, 600);

  // LEVEL LOGIC
  if (xp >= 200) {
    xp = 0;
    level++;
    document.getElementById("level").textContent = level;
  }

  // SMOOTH COUNT ANIMATION
  let current = 0;
  const target = xp;
  const interval = setInterval(() => {
    current += 5;
    if (current >= target) {
      current = target;
      clearInterval(interval);
    }
    document.getElementById("xp").textContent = current;
  }, 20);
}
</script>

</body>
</html>
