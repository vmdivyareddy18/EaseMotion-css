<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Card Select</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion selection</p>
    <h1 id="demo-title">Radio card select</h1>
    <p class="intro">A radio option card that scales its check marker and border when selected.</p>

    <label class="option-card">
      <input type="radio" name="plan" checked />
      <span class="marker" aria-hidden="true"></span>
      <strong>Pro workspace</strong>
      <span>Team motion library with shared tokens.</span>
    </label>
  </main>
</body>
</html>
