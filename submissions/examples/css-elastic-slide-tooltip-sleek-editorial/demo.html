<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Editorial Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="editorial">

    <h1>Sleek Editorial</h1>
    <p>Modern publishing interface</p>

    <div class="articles">

        <div class="article-card">

            <button class="editor-btn" aria-describedby="tooltip-1">
                Magazine
            </button>

            <div class="tooltip" id="tooltip-1" role="tooltip">
                Explore featured stories
            </div>

        </div>


        <div class="article-card">

            <button class="editor-btn" aria-describedby="tooltip-2">
                Articles
            </button>

            <div class="tooltip" id="tooltip-2" role="tooltip">
                Read latest publications
            </div>

        </div>


        <div class="article-card">

            <button class="editor-btn" aria-describedby="tooltip-3">
                Authors
            </button>

            <div class="tooltip" id="tooltip-3" role="tooltip">
                Discover creative writers
            </div>

        </div>

    </div>

</section>

</body>
</html>
