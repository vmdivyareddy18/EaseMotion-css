<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-icon-wiggle-hover – Icon Wiggle on Hover</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-6 ease-fade-in">
      Icon Wiggle on Hover
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Hover over any icon to see it playfully wiggle.
    </p>

    <div class="ease-flex ease-justify-center ease-gap-10 ease-flex-wrap">
      <!-- Icon 1 -->
      <div class="icon-button ease-card ease-p-4 ease-hover-shadow-lg ease-transition">
        <span class="wiggle-icon">👍</span>
        <p class="ease-text-sm ease-font-semibold ease-mt-2">Like</p>
      </div>
      <!-- Icon 2 -->
      <div class="icon-button ease-card ease-p-4 ease-hover-shadow-lg ease-transition">
        <span class="wiggle-icon">❤️</span>
        <p class="ease-text-sm ease-font-semibold ease-mt-2">Love</p>
      </div>
      <!-- Icon 3 -->
      <div class="icon-button ease-card ease-p-4 ease-hover-shadow-lg ease-transition">
        <span class="wiggle-icon">🎉</span>
        <p class="ease-text-sm ease-font-semibold ease-mt-2">Celebrate</p>
      </div>
      <!-- Icon 4 -->
      <div class="icon-button ease-card ease-p-4 ease-hover-shadow-lg ease-transition">
        <span class="wiggle-icon">🚀</span>
        <p class="ease-text-sm ease-font-semibold ease-mt-2">Launch</p>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Micro-interaction for interactive icon buttons.
    </p>
  </div>

</body>
</html>
