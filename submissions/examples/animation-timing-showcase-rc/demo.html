<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Timing Function Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Animation Timing Function Showcase</h1>

    <p class="intro">
        Compare how different CSS timing functions affect animation motion.
    </p>

    <div class="demo">

        <div class="row">
            <span>Linear</span>
            <div class="track">
                <div class="ball linear"></div>
            </div>
        </div>

        <div class="row">
            <span>Ease</span>
            <div class="track">
                <div class="ball ease"></div>
            </div>
        </div>

        <div class="row">
            <span>Ease In</span>
            <div class="track">
                <div class="ball ease-in"></div>
            </div>
        </div>

        <div class="row">
            <span>Ease Out</span>
            <div class="track">
                <div class="ball ease-out"></div>
            </div>
        </div>

        <div class="row">
            <span>Ease In Out</span>
            <div class="track">
                <div class="ball ease-in-out"></div>
            </div>
        </div>

        <div class="row">
            <span>Cubic Bezier</span>
            <div class="track">
                <div class="ball bezier"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
