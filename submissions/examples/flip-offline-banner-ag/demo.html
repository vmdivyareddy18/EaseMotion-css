<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Offline Banner — EaseMotion CSS</title>
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
    rel="stylesheet" />
  <!-- Framework & Component Stylesheets -->
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Minimalist Demo Page Container */
    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--ease-color-bg, #0b1121);
      color: var(--ease-color-text, #f8fafc);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--ease-space-8, 2rem) var(--ease-space-4, 1rem);
      box-sizing: border-box;
    }

    /* Subtle grid background */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 32px 32px;
      background-position: center;
      pointer-events: none;
      z-index: 0;
    }

    /* Clean Container Wrapper */
    .demo-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
      display: flex;
      flex-direction: column;
      gap: var(--ease-space-6, 1.5rem);
    }

    /* Minimal Header styling */
    .demo-header {
      text-align: center;
    }

    .demo-title {
      font-size: var(--ease-text-xl, 1.25rem);
      font-weight: 700;
      margin: 0 0 var(--ease-space-2, 0.5rem) 0;
      color: #f8fafc;
    }

    .demo-desc {
      font-size: var(--ease-text-sm, 0.875rem);
      color: var(--ease-color-muted, #64748b);
      margin: 0;
    }

    /* Showcase Area */
    .demo-showcase {
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1 class="demo-title">Flip Offline Banner</h1>
      <p class="demo-desc">A CSS-only connection status banner featuring an automatic 3D vertical flip transition.</p>
    </header>

    <!-- Component Showcase Area -->
    <main class="demo-showcase">
      <!-- Reusable Component Block -->
      <div class="ease-fob-ag" role="status" aria-live="polite">
        <div class="ease-fob-inner-ag">
          <!-- Front Face: Offline / Connection Lost -->
          <div class="ease-fob-face-ag ease-fob-front-ag">
            <div class="ease-fob-content-ag">
              <div class="ease-fob-status-ag">
                <!-- Neon Dot -->
                <span class="ease-fob-dot-ag ease-fob-dot-offline-ag" aria-hidden="true"></span>
                <!-- Offline Signal Icon (SVG) -->
                <span class="ease-fob-icon-ag" aria-hidden="true">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                    <path
                      d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.5M5 12.5a10.94 10.94 0 0 1 5.83-2.84M8.58 16.12A6.97 6.97 0 0 1 12 15a7 7 0 0 1 3.42 1.12M12 18.5a1.5 1.5 0 1 0 0 3 1.5 1.5 0 0 0 0-3z" />
                  </svg>
                </span>
                <!-- Labels -->
                <div class="ease-fob-text-ag">
                  <strong class="ease-fob-title-ag">Offline</strong>
                  <span class="ease-fob-message-ag">Connection lost. Some features are currently unavailable.</span>
                </div>
              </div>
            </div>
          </div>

          <!-- Back Face: Reconnecting / Attempting -->
          <div class="ease-fob-face-ag ease-fob-back-ag">
            <div class="ease-fob-content-ag">
              <div class="ease-fob-status-ag">
                <!-- Neon Dot -->
                <span class="ease-fob-dot-ag ease-fob-dot-reconnecting-ag" aria-hidden="true"></span>
                <!-- Spinner -->
                <span class="ease-fob-spinner-ag" aria-hidden="true"></span>
                <!-- Labels -->
                <div class="ease-fob-text-ag">
                  <strong class="ease-fob-title-ag">Reconnecting</strong>
                  <span class="ease-fob-message-ag">Attempting to re-establish stable network connection...</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</body>

</html>
