<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input Label Float</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion form</p>
    <h1 id="demo-title">Input label float</h1>
    <p class="intro">A floating label field where the label glides upward on focus or typed content.</p>

    <label class="field">
      <input type="email" required placeholder=" " />
      <span>Email address</span>
    </label>
  </main>
</body>
</html>
