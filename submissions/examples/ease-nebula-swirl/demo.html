<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula Swirl</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🌌 Nebula Swirl</h1>
        <p class="subtitle">Colorful gas clouds rotating slowly</p>

        <div class="nebula-wrapper">
            <canvas id="nebulaCanvas"></canvas>

            <div class="controls">
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Color: Galaxy</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🌌 Swirling nebula</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let particles = [];
        let numParticles = 2000;
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;
        let angle = 0;
        let mouseX = 0;
        let mouseY = 0;
        let isHovering = false;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.003 },
            { name: 'Normal', value: 0.008 },
            { name: 'Fast', value: 0.02 },
            { name: 'Very Fast', value: 0.04 },
        ];

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Galaxy',
                colors: [
                    { r: 120, g: 60, b: 200 },
                    { r: 200, g: 80, b: 150 },
                    { r: 80, g: 40, b: 180 },
                    { r: 180, g: 60, b: 220 },
                    { r: 60, g: 20, b: 120 },
                    { r: 220, g: 100, b: 180 },
                ]
            },
            {
                name: 'Aurora',
                colors: [
                    { r: 0, g: 200, b: 100 },
                    { r: 0, g: 150, b: 220 },
                    { r: 50, g: 220, b: 180 },
                    { r: 0, g: 100, b: 200 },
                    { r: 100, g: 220, b: 80 },
                    { r: 0, g: 180, b: 255 },
                ]
            },
            {
                name: 'Sunset',
                colors: [
                    { r: 255, g: 100, b: 50 },
                    { r: 255, g: 150, b: 50 },
                    { r: 200, g: 60, b: 30 },
                    { r: 255, g: 200, b: 80 },
                    { r: 180, g: 40, b: 20 },
                    { r: 255, g: 120, b: 60 },
                ]
            },
            {
                name: 'Ocean',
                colors: [
                    { r: 0, g: 100, b: 200 },
                    { r: 0, g: 150, b: 220 },
                    { r: 0, g: 50, b: 150 },
                    { r: 50, g: 180, b: 240 },
                    { r: 0, g: 80, b: 180 },
                    { r: 100, g: 200, b: 255 },
                ]
            },
            {
                name: 'Fire',
                colors: [
                    { r: 255, g: 50, b: 0 },
                    { r: 255, g: 100, b: 0 },
                    { r: 200, g: 30, b: 0 },
                    { r: 255, g: 150, b: 20 },
                    { r: 180, g: 20, b: 0 },
                    { r: 255, g: 80, b: 0 },
                ]
            },
            {
                name: 'Rainbow',
                colors: [
                    { r: 255, g: 0, b: 0 },
                    { r: 255, g: 255, b: 0 },
                    { r: 0, g: 255, b: 0 },
                    { r: 0, g: 255, b: 255 },
                    { r: 0, g: 0, b: 255 },
                    { r: 255, g: 0, b: 255 },
                ]
            },
            {
                name: 'Pastel',
                colors: [
                    { r: 255, g: 180, b: 200 },
                    { r: 200, g: 200, b: 255 },
                    { r: 255, g: 220, b: 180 },
                    { r: 180, g: 255, b: 200 },
                    { r: 255, g: 200, b: 255 },
                    { r: 200, g: 255, b: 255 },
                ]
            },
        ];

        // ===== PARTICLE CLASS =====
        class Particle {
            constructor() {
                this.reset(true);
            }

            reset(initial = false) {
                const w = canvas.width;
                const h = canvas.height;
                const maxDim = Math.max(w, h);
                
                this.x = (Math.random() - 0.5) * w * 1.5;
                this.y = (Math.random() - 0.5) * h * 1.5;
                this.z = Math.random() * 100;
                this.size = 1 + Math.random() * 4;
                this.speed = 0.2 + Math.random() * 0.5;
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * maxDim * 0.6;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.005 + Math.random() * 0.02;
                this.colorOffset = Math.floor(Math.random() * 6);
                this.alpha = 0.3 + Math.random() * 0.7;
                this.orbitSpeed = 0.001 + Math.random() * 0.005;
                this.wobble = 0.2 + Math.random() * 0.5;
                this.wobbleSpeed = 0.005 + Math.random() * 0.01;
                this.trail = [];
                this.maxTrail = 8 + Math.floor(Math.random() * 12);
                this.driftX = (Math.random() - 0.5) * 0.01;
                this.driftY = (Math.random() - 0.5) * 0.01;
                this.glowSize = 1 + Math.random() * 2;
            }

            update(time, speed, centerX, centerY, rotationAngle) {
                // Orbit
                this.angle += this.orbitSpeed * speed * 50;
                this.phase += this.pulseSpeed * speed * 10;
                this.distance += Math.sin(this.phase) * 0.05 * speed * 10;

                // Wobble
                const wobbleX = Math.sin(this.phase * 0.5 + time * 0.01) * this.wobble;
                const wobbleY = Math.cos(this.phase * 0.7 + time * 0.01) * this.wobble;

                // Position with rotation
                const rotAngle = this.angle + rotationAngle * 0.3;
                const radius = this.distance + Math.sin(this.phase * 0.3 + time * 0.005) * 10;
                
                this.x = centerX + Math.cos(rotAngle) * radius + wobbleX;
                this.y = centerY + Math.sin(rotAngle) * radius * 0.6 + wobbleY;

                // Drift
                this.x += this.driftX * speed * 10;
                this.y += this.driftY * speed * 10;

                // Trail
                this.trail.push({ x: this.x, y: this.y, alpha: 0.3 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                for (const t of this.trail) {
                    t.alpha *= 0.98;
                }

                // Size pulse
                this.size = this.size * (0.98 + 0.02 * Math.sin(this.phase));
            }

            draw(ctx, time) {
                const palette = colorPalettes[colorMode];
                const colors = palette.colors;
                const color = colors[this.colorOffset % colors.length];
                const alpha = this.alpha * (0.5 + 0.5 * Math.sin(this.phase * 0.5));

                // Glow
                const glowSize = this.size * 4 * this.glowSize;
                const grad = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowSize
                );
                grad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.6})`);
                grad.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.2})`);
                grad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = 0.5;
                ctx.fill();

                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * 0.08 * alpha;
                    const trailSize = this.size * (0.2 + (i / this.trail.length) * 0.3);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${trailAlpha})`;
                    ctx.fill();
                }

                // Core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.8, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.9})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.3})`;
                ctx.fill();
                ctx.shadowBlur = 0;

                // Bright center
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.3})`;
                ctx.fill();

                ctx.globalAlpha = 1;
            }
        }

        // ===== INIT PARTICLES =====
        function initParticles(count) {
            particles = [];
            numParticles = count || 2000;
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle());
            }
        }
        initParticles(2000);

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a0a1e');
            grad.addColorStop(0.3, '#060612');
            grad.addColorStop(0.6, '#030308');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Stars
            for (let i = 0; i < 100; i++) {
                const x = (i * 37 + Math.sin(i * 0.3) * 20) % w;
                const y = (i * 23 + Math.cos(i * 0.5) * 15) % h;
                const size = 0.3 + Math.sin(i + time * 0.002) * 0.2;
                const brightness = 0.1 + Math.sin(i + time * 0.005) * 0.05;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${brightness})`;
                ctx.fill();
            }
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            const cx = w / 2;
            const cy = h / 2;
            time += speed;

            // Rotation angle
            angle += speed * 0.02;

            // Draw background
            drawBackground(ctx, w, h);

            // Update and draw particles
            for (const p of particles) {
                p.update(time, speed, cx, cy, angle);
                p.draw(ctx, time);
            }

            // Center glow
            const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(w, h) * 0.2);
            const palette = colorPalettes[colorMode];
            const color = palette.colors[0];
            centerGrad.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0.05)`);
            centerGrad.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
            ctx.fillStyle = centerGrad;
            ctx.fillRect(0, 0, w, h);

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `🌌 ${colorPalettes[colorMode].name} • ${speeds[speedLevel].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🌌 ${colorPalettes[colorMode].name}`;
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = `🌌 ${colorPalettes[colorMode].name}`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            angle = 0;
            time = 0;
            speedLevel = 1;
            speed = speeds[1].value;
            colorMode = 0;
            initParticles(2000);
            
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `🌌 ${colorPalettes[0].name}`;
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                // Toggle pause not implemented
            }
        });

        // ===== MOUSE INTERACTION =====
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            isHovering = true;
        });

        canvas.addEventListener('mouseleave', () => {
            isHovering = false;
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles(numParticles);
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = `🌌 ${colorPalettes[0].name}`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🌌 Nebula Swirl loaded!');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
    </script>
</body>
</html>
