<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-split-text-reveal - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Split Text Reveal</h1>
    <div class="split-text" id="splitText">Words appear one by one with a smooth spring-like motion</div>
  </div>
  <script>
    const el = document.getElementById('splitText');
    const words = el.textContent.trim().split(' ');
    el.textContent = '';
    words.forEach((w, i) => {
      const span = document.createElement('span');
      span.className = 'word';
      span.textContent = w;
      span.style.transitionDelay = i * 120 + 'ms';
      el.appendChild(span);
      if (i < words.length - 1) el.appendChild(document.createTextNode('\u00A0'));
    });
    requestAnimationFrame(() => document.querySelectorAll('.word').forEach(w => w.classList.add('revealed')));
  </script>
</body>
</html>
