<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Sheet Inspector Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Record details</p>
      <h1 id="demo-title">Side sheet inspector</h1>
      <p>A responsive detail panel that slides in while preserving the surrounding dashboard context.</p>
    </section>
    <section class="demo-stage" aria-label="Side Sheet Inspector Panel">
        <aside class="side-sheet is-open"><h2>Customer details</h2><dl><div><dt>Customer</dt><dd>Northline Studio</dd><span>Active</span></div><div><dt>Plan</dt><dd>Business</dd><span>Renewing</span></div><div><dt>Owner</dt><dd>Mira Shah</dd><span>Admin</span></div></dl><button type="button">Open profile</button></aside>
    </section>
  </main>
</body>
</html>
