<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Loader Dots - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Pulse Loader Dots</h1>

    <div class="pld-section">
      <label class="pld-control-group">
        <span>Theme</span>
        <select id="pldTheme">
          <option value="purple">Purple</option>
          <option value="blue">Blue</option>
          <option value="green">Green</option>
          <option value="coral">Coral</option>
        </select>
      </label>
      <label class="pld-control-group">
        <span>Size</span>
        <select id="pldSize">
          <option value="sm">Small</option>
          <option value="md" selected>Medium</option>
          <option value="lg">Large</option>
        </select>
      </label>
      <label class="pld-control-group">
        <span>Speed</span>
        <input type="range" id="pldSpeed" min="0.4" max="2.0" step="0.1" value="1.0">
        <span class="pld-speed-val" id="pldSpeedVal">1.0s</span>
      </label>
    </div>

    <div class="pld-loader" id="pldLoader">
      <div class="pld-dot" style="--pld-i: 0;"></div>
      <div class="pld-dot" style="--pld-i: 1;"></div>
      <div class="pld-dot" style="--pld-i: 2;"></div>
    </div>

    <p class="pld-label">Loading<span class="pld-ellipsis" id="pldEllipsis"></span></p>
  </div>

  <script>
    const loader = document.getElementById('pldLoader');
    const themeSel = document.getElementById('pldTheme');
    const sizeSel = document.getElementById('pldSize');
    const speedInput = document.getElementById('pldSpeed');
    const speedVal = document.getElementById('pldSpeedVal');
    const ellipsis = document.getElementById('pldEllipsis');

    themeSel.addEventListener('change', () => {
      loader.dataset.theme = themeSel.value;
    });
    loader.dataset.theme = themeSel.value;

    sizeSel.addEventListener('change', () => {
      loader.dataset.size = sizeSel.value;
    });
    loader.dataset.size = sizeSel.value;

    speedInput.addEventListener('input', () => {
      const v = parseFloat(speedInput.value);
      speedVal.textContent = v.toFixed(1) + 's';
      loader.style.setProperty('--pld-duration', v + 's');
    });

    let dotCount = 0;
    setInterval(() => {
      const dots = '.';
      ellipsis.textContent = dots;
      dotCount = (dotCount + 1) % 4;
      ellipsis.textContent = '.'.repeat(dotCount);
    }, 500);
  </script>
</body>
</html>
