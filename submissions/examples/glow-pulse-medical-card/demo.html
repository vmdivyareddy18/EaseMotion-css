<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Glow Pulse Medical Card</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0a1428 0%, #151d2b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .dashboard {
      width: 100%;
      max-width: 900px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(100, 150, 255, 0.15);
      border-radius: 12px;
      padding: 2rem;
      backdrop-filter: blur(10px);
    }

    h1 {
      color: #e0f2fe;
      font-size: 1.5rem;
      margin: 0 0 1.5rem 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.8;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }
  </style>
</head>
<body>

  <div class="dashboard">
    <h1>Patient Vitals Monitor</h1>
    <div class="card-grid">
      <div class="medical-card glow-stable">
        <div class="card-label">Heart Rate</div>
        <div class="card-value">72</div>
        <div class="card-unit">bpm</div>
      </div>

      <div class="medical-card glow-stable">
        <div class="card-label">Blood Pressure</div>
        <div class="card-value">120/80</div>
        <div class="card-unit">mmHg</div>
      </div>

      <div class="medical-card glow-warning">
        <div class="card-label">Oxygen Level</div>
        <div class="card-value">94</div>
        <div class="card-unit">%</div>
      </div>

      <div class="medical-card glow-critical">
        <div class="card-label">Temperature</div>
        <div class="card-value">38.5</div>
        <div class="card-unit">°C</div>
      </div>
    </div>
  </div>

</body>
</html>
