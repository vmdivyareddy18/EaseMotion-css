<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Shimmer Sweep Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Minimalist Tech

</span>

<h1>

Shimmer Sweep Modal

</h1>

<p>

Clean modal interaction
designed for modern
minimal interfaces with
a subtle shimmer effect.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="icon">

⚡

</div>

<h2>

Minimal Experience

</h2>

<p>

Elegant CSS-only modal
with smooth shimmer
animation designed for
modern product interfaces.

</p>

<button>

Continue

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
