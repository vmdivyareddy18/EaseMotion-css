<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Newsletter Subscribe Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="newsletter-card">

        <div class="icon">
            📧
        </div>

        <h1>Stay Updated</h1>

        <p>
            Subscribe to our newsletter and receive the latest UI components,
            CSS animations, and development updates directly in your inbox.
        </p>

        <form class="subscribe-form">
            <input
                type="email"
                placeholder="Enter your email"
                required
            >

            <button type="submit">
                Subscribe
            </button>
        </form>

        <small>No spam. Unsubscribe anytime.</small>

    </div>

</div>

</body>
</html>
