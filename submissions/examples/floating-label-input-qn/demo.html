<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Label Input - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container-qn">
        <h2>Contact Us</h2>
        
        <!-- Name Input -->
        <div class="input-group-qn">
            <input type="text" id="name" class="floating-input-qn" placeholder=" " required>
            <label for="name" class="floating-label-qn">Full Name</label>
            <span class="input-highlight-qn"></span>
        </div>

        <!-- Email Input -->
        <div class="input-group-qn">
            <input type="email" id="email" class="floating-input-qn" placeholder=" " required>
            <label for="email" class="floating-label-qn">Email Address</label>
            <span class="input-highlight-qn"></span>
        </div>

        <!-- Password Input -->
        <div class="input-group-qn">
            <input type="password" id="password" class="floating-input-qn" placeholder=" " required>
            <label for="password" class="floating-label-qn">Password</label>
            <span class="input-highlight-qn"></span>
        </div>
    </div>
</body>
</html>
