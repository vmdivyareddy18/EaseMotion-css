<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-lightbox - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-lightbox</h1>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:24px;font-size:0.9rem;">Click a thumbnail to open the lightbox</p>
    <div class="gallery">
      <a href="#lb-1" class="gallery-item g-1">Image 1</a>
      <a href="#lb-2" class="gallery-item g-2">Image 2</a>
      <a href="#lb-3" class="gallery-item g-3">Image 3</a>
      <a href="#lb-4" class="gallery-item g-4">Image 4</a>
      <a href="#lb-5" class="gallery-item g-5">Image 5</a>
      <a href="#lb-6" class="gallery-item g-6">Image 6</a>
    </div>
  </div>
  <div class="lightbox" id="lb-1">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-1">Image 1</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
  <div class="lightbox" id="lb-2">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-2">Image 2</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
  <div class="lightbox" id="lb-3">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-3">Image 3</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
  <div class="lightbox" id="lb-4">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-4">Image 4</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
  <div class="lightbox" id="lb-5">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-5">Image 5</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
  <div class="lightbox" id="lb-6">
    <a href="#" class="close"></a>
    <div class="lightbox-content g-6">Image 6</div>
    <a href="#" class="close-btn">&times;</a>
  </div>
</body>
</html>
