<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-mobile-tab-bar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Tab Bar</h1>
    <p class="subtitle">Tap a tab to see the indicator animate</p>
    <div class="phone-frame">
      <div class="tab-bar">
        <label class="tab" data-tab="0">
          <input type="radio" name="tab" checked />
          <span class="tab-icon">&#x1f3e0;</span>
          <span class="tab-label">Home</span>
        </label>
        <label class="tab" data-tab="1">
          <input type="radio" name="tab" />
          <span class="tab-icon">&#x1f50d;</span>
          <span class="tab-label">Search</span>
        </label>
        <label class="tab" data-tab="2">
          <input type="radio" name="tab" />
          <span class="tab-icon">&#x2795;</span>
          <span class="tab-label">Add</span>
        </label>
        <label class="tab" data-tab="3">
          <input type="radio" name="tab" />
          <span class="tab-icon">&#x1f514;</span>
          <span class="tab-label">Alerts</span>
        </label>
        <label class="tab" data-tab="4">
          <input type="radio" name="tab" />
          <span class="tab-icon">&#x1f464;</span>
          <span class="tab-label">Profile</span>
        </label>
        <div class="indicator" id="indicator"></div>
      </div>
    </div>
    <p class="hint" id="hint">Home</p>
  </div>
  <script>
    const tabs = document.querySelectorAll('.tab');
    const indicator = document.getElementById('indicator');
    const hint = document.getElementById('hint');
    const labels = ['Home', 'Search', 'Add', 'Alerts', 'Profile'];
    tabs.forEach((tab, i) => {
      tab.addEventListener('click', () => {
        const rect = tab.getBoundingClientRect();
        const bar = tab.closest('.tab-bar').getBoundingClientRect();
        const left = rect.left - bar.left;
        const width = rect.width;
        indicator.style.setProperty('--indicator-left', left + 'px');
        indicator.style.setProperty('--indicator-width', width + 'px');
        hint.textContent = labels[i];
      });
    });
    const firstTab = tabs[0];
    const rect = firstTab.getBoundingClientRect();
    const bar = firstTab.closest('.tab-bar').getBoundingClientRect();
    indicator.style.setProperty('--indicator-left', (rect.left - bar.left) + 'px');
    indicator.style.setProperty('--indicator-width', rect.width + 'px');
  </script>
</body>
</html>
