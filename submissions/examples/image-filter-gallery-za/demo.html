<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Filter Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>CSS Filter Functions</h1>
  <div class="filter-grid">
    <div class="filter-card">
      <div class="filter-demo" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">blur(4px)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo bright" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">brightness(1.6)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo contrast" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">contrast(1.8)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo saturate" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">saturate(2.5)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo sepia" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">sepia(0.8)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo hue" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">hue-rotate(180deg)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo invert" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">invert(0.8)</span>
    </div>
    <div class="filter-card">
      <div class="filter-demo opacity" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
      <span class="filter-label">opacity(0.5)</span>
    </div>
  </div>
</body>
</html>
