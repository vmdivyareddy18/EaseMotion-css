<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In Feature Card - News Portal</title>
    <link rel="stylesheet" href="../../../src/easemotion.css"> 
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <div class="feature-card ease-fade-in">
            <div class="card-image">
                <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80" alt="News Feature Image">
                <span class="category-badge">Tech News</span>
            </div>
            <div class="card-content">
                <h2 class="card-title">The Evolution of Web Animation</h2>
                <p class="card-excerpt">Discover how pure CSS variables and modular keyframes are changing how we build modern, interactive user interfaces without heavy JavaScript footprints.</p>
                <a href="#" class="read-more-btn">Read Full Story &rarr;</a>
            </div>
        </div>
    </div>

</body>
</html>
