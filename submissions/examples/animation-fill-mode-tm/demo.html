<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animation Fill Mode Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 60px; background: #f0f0f0; font-family: sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .box { width: 200px; height: 60px; border-radius: 10px; background: #4f46e5; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; animation: fadeIn 1s 1s; }
    .label { font-size: 0.85rem; color: #333; }
  </style>
</head>
<body>
  <p class="label">fill-none</p>
  <div class="box fill-none">fill-none</div>
  <p class="label">fill-forwards</p>
  <div class="box fill-forwards">fill-forwards</div>
  <p class="label">fill-backwards</p>
  <div class="box fill-backwards">fill-backwards</div>
  <p class="label">fill-both</p>
  <div class="box fill-both">fill-both</div>
</body>
</html>
