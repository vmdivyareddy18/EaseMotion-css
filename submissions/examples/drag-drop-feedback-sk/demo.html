<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop Visual Feedback - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Drag & Drop Feedback</h1>
    <p>Reusable visual feedback patterns for kanban boards and dashboard lists.</p>

    <div class="kanban-board">
      
      <!-- Column 1 -->
      <div class="kanban-column">
        <h3 class="column-title">To Do</h3>
        <div class="drop-zone" data-zone="todo">
          <div class="draggable-card" draggable="true" id="task1">
            <h4 class="task-title">Design new landing page</h4>
            <span class="badge badge-numeric badge-pulse">High Priority</span>
          </div>
          <div class="draggable-card" draggable="true" id="task2">
            <h4 class="task-title">Fix mobile navigation bug</h4>
            <span class="badge badge-numeric">Medium</span>
          </div>
          <div class="draggable-card" draggable="true" id="task3">
            <h4 class="task-title">Update README docs</h4>
            <span class="badge badge-numeric">Low</span>
          </div>
        </div>
      </div>

      <!-- Column 2 -->
      <div class="kanban-column">
        <h3 class="column-title">In Progress</h3>
        <div class="drop-zone" data-zone="in-progress">
          <div class="draggable-card" draggable="true" id="task4">
            <h4 class="task-title">Implement infinite marquee</h4>
            <span class="badge badge-numeric badge-pulse">High Priority</span>
          </div>
        </div>
      </div>

      <!-- Column 3 -->
      <div class="kanban-column">
        <h3 class="column-title">Done</h3>
        <div class="drop-zone" data-zone="done">
          <div class="draggable-card" draggable="true" id="task5">
            <h4 class="task-title">Animated form inputs</h4>
            <span class="badge badge-numeric is-success">Completed</span>
          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
