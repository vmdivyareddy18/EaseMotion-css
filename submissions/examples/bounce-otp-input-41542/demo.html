<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Bounce OTP Input (Fintech UX)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="secure-viewport">
    <div class="fintech-card em-fade-in">
      
      <!-- Security Header Badge -->
      <div class="security-badge-container">
        <div class="security-icon-shield">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
      </div>

      <div class="auth-header">
        <h2>Two-Factor Security</h2>
        <p>We sent a 6-digit validation code to your linked device ending in <b>•4821</b></p>
      </div>

      <!-- Pure CSS Staggered & Bouncy OTP Form Matrix -->
      <form class="otp-form-container" autocomplete="off">
        <div class="otp-inputs-wrapper">
          <input type="text" class="otp-field em-stagger-1" maxlength="1" inputmode="numeric" pattern="[0-9]*" required autofocus>
          <input type="text" class="otp-field em-stagger-2" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
          <input type="text" class="otp-field em-stagger-3" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
          <input type="text" class="otp-field em-stagger-4" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
          <input type="text" class="otp-field em-stagger-5" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
          <input type="text" class="otp-field em-stagger-6" maxlength="1" inputmode="numeric" pattern="[0-9]*" required>
        </div>

        <!-- Action Processing Controls -->
        <button type="submit" class="verify-btn">
          <span>Authorize Transaction</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Didn't receive the text code? <a href="#" class="resend-link">Request a new code</a></p>
      </div>

    </div>
  </div>

  <script>
    /**
     * Optional lightweight UX helper: 
     * Auto-focus shifting logic to improve native user typing ergonomics.
     */
    const fields = document.querySelectorAll('.otp-field');
    fields.forEach((field, index) => {
      field.addEventListener('input', (e) => {
        if (e.target.value.length === 1 && index < fields.length - 1) {
          fields[index + 1].focus();
        }
      });
      field.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
          fields[index - 1].focus();
        }
      });
    });
  </script>
</body>
</html>
