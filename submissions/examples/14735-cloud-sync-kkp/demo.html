<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Sync Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="cloud-title">
        <div class="cloud-sync" role="img" aria-label="Cloud sync animation">
          <span class="cloud-shape"></span>
          <span class="sync-arrow arrow-one"></span>
          <span class="sync-arrow arrow-two"></span>
        </div>
        <p class="eyebrow">Sync state</p>
        <h1 id="cloud-title">Cloud sync loop</h1>
        <p class="demo-copy">
          Rotating arrows and a gentle cloud pulse make background sync activity
          visible without JavaScript.
        </p>
      </section>
    </main>
  </body>
</html>
