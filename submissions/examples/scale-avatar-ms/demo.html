<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Avatar</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f1f5f9; font-family: system-ui, sans-serif;">
  
  <div class="admin-topbar ease-fade-in-up">
    <div class="user-menu ease-hover-pop" tabindex="0">
      <div class="avatar-wrapper">
        <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Admin Avatar" class="avatar-img">
        <span class="status-indicator ease-pulse"></span>
      </div>
      
      <div class="user-details">
        <span class="user-name">Sarah Jenkins</span>
        <span class="user-role">Super Admin</span>
      </div>
      
      <!-- Dropdown chevron that flips on focus -->
      <svg class="chevron ease-flip" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      
      <!-- Dropdown menu scaling in -->
      <div class="dropdown-menu">
        <a href="#" class="ease-hover-scale">My Profile</a>
        <a href="#" class="ease-hover-scale">Settings</a>
        <a href="#" class="ease-hover-scale text-danger">Logout</a>
      </div>
    </div>
  </div>

</body>
</html>
