<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neon Glow Modal Demo — Creative Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, sans-serif; background: #0a0012; padding: 60px; }
    h2 { color: #f5e9ff; }
  </style>
</head>
<body>
  <h2>CSS Neon Glow Modal — Creative Portfolio Layout</h2>

  <button class="ease-modal-trigger" id="openModalBtn">View Project</button>

  <div class="ease-modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="ease-modal" tabindex="-1">
      <div class="ease-modal__header">
        <span class="ease-modal__title" id="modalTitle">Project Spotlight</span>
        <button class="ease-modal__close" id="closeModalBtn" aria-label="Close modal">✕</button>
      </div>
      <div class="ease-modal__body">
        A vibrant, gradient neon glow modal designed for creative portfolio showcases,
        built entirely with CSS box-shadow layering and a gradient text title.
      </div>
      <div class="ease-modal__footer">
        <button class="ease-modal__btn ease-modal__btn--ghost" id="cancelBtn">Close</button>
        <button class="ease-modal__btn" id="confirmBtn">View Full Case Study</button>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('modalOverlay');
    const modal = overlay.querySelector('.ease-modal');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const confirmBtn = document.getElementById('confirmBtn');

    function getFocusable() {
      return modal.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    }

    function openModal() {
      overlay.classList.add('ease-modal-overlay--open');
      closeBtn.focus();
      document.addEventListener('keydown', handleKeydown);
    }

    function closeModal() {
      overlay.classList.remove('ease-modal-overlay--open');
      openBtn.focus();
      document.removeEventListener('keydown', handleKeydown);
    }

    function handleKeydown(e) {
      if (e.key === 'Escape') { closeModal(); return; }
      if (e.key === 'Tab') {
        const focusable = getFocusable();
        const first = focusable[0];
        const last = focusable[focusable.length - 1];
        if (e.shiftKey && document.activeElement === first) {
          e.preventDefault();
          last.focus();
        } else if (!e.shiftKey && document.activeElement === last) {
          e.preventDefault();
          first.focus();
        }
      }
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    cancelBtn.addEventListener('click', closeModal);
    confirmBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });
  </script>
</body>
</html>
