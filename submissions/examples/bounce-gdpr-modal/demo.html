<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bounce GDPR Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="page">
    <h1>Website Preview</h1>
    <p>This page demonstrates the Bounce GDPR Modal component.</p>
  </main>

  <section class="gdpr-overlay">
    <div class="gdpr-modal">
      <span class="gdpr-icon">🔒</span>

      <h2>Privacy & Cookies</h2>

      <p>
        We use cookies to improve your browsing experience.
        Please review and accept our privacy policy.
      </p>

      <div class="gdpr-actions">
        <button class="accept-btn">Accept</button>
        <button class="decline-btn">Decline</button>
      </div>
    </div>
  </section>

</body>
</html>
