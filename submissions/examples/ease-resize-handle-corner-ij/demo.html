<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resize Handle Corner – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rhc-container">
    <h1>Resize Box</h1>

    <div class="rhc-box-wrapper">
      <div class="rhc-box" id="resizeBox">
        <div class="rhc-content" id="content">
          <p>Drag the corner handle to resize.</p>
          <p>Minimum: 160×120<br>Maximum: 600×450</p>
        </div>
        <div class="rhc-handle" id="resizeHandle">
          <span class="rhc-handle-icon"></span>
        </div>
      </div>
    </div>

    <div class="rhc-size" id="sizeDisplay">320 × 240</div>
  </div>

  <script>
    const box = document.getElementById('resizeBox');
    const handle = document.getElementById('resizeHandle');
    const display = document.getElementById('sizeDisplay');

    const MIN_W = 160, MIN_H = 120;
    const MAX_W = 600, MAX_H = 450;

    let isResizing = false;
    let startX, startY, startW, startH;

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

    function updateSize() {
      display.textContent = `${box.offsetWidth} × ${box.offsetHeight}`;
    }

    handle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startY = e.clientY;
      startW = box.offsetWidth;
      startH = box.offsetHeight;
      box.style.transition = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const w = clamp(startW + (e.clientX - startX), MIN_W, MAX_W);
      const h = clamp(startH + (e.clientY - startY), MIN_H, MAX_H);
      box.style.width = w + 'px';
      box.style.height = h + 'px';
      updateSize();
    });

    document.addEventListener('mouseup', () => {
      if (!isResizing) return;
      isResizing = false;
      box.style.transition = '';
    });

    updateSize();
  </script>
</body>
</html>
