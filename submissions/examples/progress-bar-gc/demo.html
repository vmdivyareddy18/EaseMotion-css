<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Progress Bar UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Progress Bar UI Example</h1>
      <p>Progress bars with gradient fills, stripes, and smooth animations.</p>
    </header>

    <section class="progress-grid">
      <div class="progress-group">
        <h3>25% Progress</h3>
        <div class="progress">
          <div class="progress__bar" style="width: 25%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>50% Progress</h3>
        <div class="progress">
          <div class="progress__bar" style="width: 50%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>75% Progress</h3>
        <div class="progress">
          <div class="progress__bar" style="width: 75%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>100% Complete</h3>
        <div class="progress">
          <div class="progress__bar" style="width: 100%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>Striped Progress (60%)</h3>
        <div class="progress progress--striped">
          <div class="progress__bar" style="width: 60%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>Animated Stripes (40%)</h3>
        <div class="progress progress--animated">
          <div class="progress__bar" style="width: 40%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>Gradient Color Variant (85%)</h3>
        <div class="progress progress--gradient">
          <div class="progress__bar" style="width: 85%"></div>
        </div>
      </div>

      <div class="progress-group">
        <h3>Accent Color (55%)</h3>
        <div class="progress progress--accent">
          <div class="progress__bar" style="width: 55%"></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
