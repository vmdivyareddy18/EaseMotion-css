<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Effect Button | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Ripple Effect Button</h1>
    <p class="subtitle">Material-inspired ripple on every click</p>

    <div class="demo-grid">
      <div class="btn-card">
        <button class="ripple-btn" id="btn1" style="--reb-btn-color: #6c5ce7;">
          <span class="btn-label">Primary</span>
        </button>
        <span class="btn-desc">Default ripple, click anywhere</span>
      </div>

      <div class="btn-card">
        <button class="ripple-btn" id="btn2" style="--reb-btn-color: #e74c3c;">
          <span class="btn-label">Danger</span>
        </button>
        <span class="btn-desc">Red variant with light ripple</span>
      </div>

      <div class="btn-card">
        <button class="ripple-btn" id="btn3" style="--reb-btn-color: #2ecc71;">
          <span class="btn-label">Success</span>
        </button>
        <span class="btn-desc">Green for positive actions</span>
      </div>

      <div class="btn-card">
        <button class="ripple-btn" id="btn4" style="--reb-btn-color: #f39c12; --reb-radius: 8px;">
          <span class="btn-label">Rounded</span>
        </button>
        <span class="btn-desc">Custom border radius</span>
      </div>

      <div class="btn-card">
        <button class="ripple-btn" id="btn5" style="--reb-btn-color: #3498db; --reb-ripple-color: rgba(255,255,255,0.8);">
          <span class="btn-label">Light Ripple</span>
        </button>
        <span class="btn-desc">Brighter ripple effect</span>
      </div>

      <div class="btn-card">
        <button class="ripple-btn" id="btn6" style="--reb-btn-color: #1d1d1f; --reb-text-color: #ffffff;">
          <span class="btn-label">Dark</span>
        </button>
        <span class="btn-desc">Dark theme button</span>
      </div>
    </div>

    <footer class="footer">
      <p>Part of the <a href="https://github.com/anomalyco/EaseMotion-css" target="_blank">EaseMotion-css</a> collection</p>
    </footer>
  </div>

  <script src="demo.js"></script>
</body>
</html>
