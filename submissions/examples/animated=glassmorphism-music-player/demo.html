<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Glassmorphism Music Player — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!--
    Add the "is-paused" class to .player-card to stop the album
    art rotation and swap the play button's icon to ▶.
    This is a pure CSS/HTML demo — toggling would normally be done
    with a couple of lines of JavaScript in a real app.
  -->
  <div class="player-card">
    <div class="player-art-wrap">
      <div class="player-art"></div>
    </div>

    <p class="player-title">Midnight Skyline</p>
    <p class="player-artist">Nova Waves</p>

    <div class="player-progress-track">
      <div class="player-progress-fill"></div>
    </div>

    <div class="player-controls">
      <button class="player-btn player-btn--secondary" aria-label="Previous track">⏮</button>

      <button class="player-btn player-btn--play" aria-label="Play or pause">
        <span class="icon-pause">❚❚</span>
        <span class="icon-play">▶</span>
      </button>

      <button class="player-btn player-btn--secondary" aria-label="Next track">⏭</button>
    </div>
  </div>

</body>
</html>
