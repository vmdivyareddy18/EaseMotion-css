<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rainbow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sky">
    <span class="sun"></span>
    <div class="rainbow">
      <span class="band b1"></span>
      <span class="band b2"></span>
      <span class="band b3"></span>
      <span class="band b4"></span>
      <span class="band b5"></span>
      <span class="band b6"></span>
      <span class="band b7"></span>
      <span class="band inner"></span>
    </div>
    <span class="cloud left"></span>
    <span class="cloud right"></span>
  </div>
</body>
</html>
