<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Perspective Product Catalog Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="catalog-sandbox-container">

  <!-- Interactive Hidden State Controller (Pure CSS) -->
  <input type="checkbox" id="modal-toggle" class="modal-state-trigger">

  <!-- Main Grid Trigger Card -->
  <div class="product-grid">
    <label for="modal-toggle" class="product-preview-card">
      <div class="product-image-wrapper">
        <div class="glow-overlay"></div>
        <div class="luxury-badge">PREMIUM</div>
        <div class="mock-hardware-render">⚡</div>
      </div>
      <div class="product-info">
        <h3>Aura Quantum Core</h3>
        <p>Next-gen neural edge processing module.</p>
        <div class="card-footer">
          <span class="price">$2,499</span>
          <span class="view-details-btn">Configure →</span>
        </div>
      </div>
    </label>
  </div>

  <!-- 3D Perspective Overlay Matrix Wrapper -->
  <div class="modal-overlay-backdrop">
    <label for="modal-toggle" class="backdrop-dismiss-zone"></label>
    
    <div class="perspective-modal-stage">
      <div class="perspective-modal-card">
        <label for="modal-toggle" class="modal-close-button">&times;</label>
        
        <div class="modal-split-layout">
          <div class="modal-visual-pane">
            <div class="abstract-matrix-mesh"></div>
            <div class="floating-core-display">⚡</div>
          </div>
          
          <div class="modal-specs-pane">
            <span class="category-tag">Hardware / Architecture</span>
            <h2>Aura Quantum Core V2</h2>
            <p class="specs-description">
              Engineered with custom embedded tensor cores running highly localized cryptographic and decentralized topologies with zero latency.
            </p>
            
            <div class="specs-attributes-grid">
              <div class="spec-node"><strong>Compute</strong><span>1.2 PetaFLOPs</span></div>
              <div class="spec-node"><strong>Power</strong><span>45W TDP</span></div>
              <div class="spec-node"><strong>Memory</strong><span>64GB Unified</span></div>
              <div class="spec-node"><strong>Cooling</strong><span>Liquid Vapor</span></div>
            </div>

            <button class="action-checkout-btn">Deploy to Environment</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
