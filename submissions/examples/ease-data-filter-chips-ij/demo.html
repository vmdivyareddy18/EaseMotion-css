<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Data Filter Chips</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    padding: 80px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
    min-height: 100vh;
    margin: 0;
  }
  h2 { color: #e2e8f0; margin: 0 0 20px; font-weight: 500; font-size: 18px; }
  .demo-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 32px;
    width: 520px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .demo-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }
  .demo-btn {
    padding: 8px 16px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: transparent;
    color: #94a3b8;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .demo-btn:hover {
    background: #334155;
    color: #e2e8f0;
  }
  .demo-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

  <div class="demo-row">
    <div class="demo-card" style="--chip-bg: #6366f1;">
      <h2>Filter Chips</h2>
      <div class="demo-actions">
        <button class="demo-btn" data-add="design">+ Design</button>
        <button class="demo-btn" data-add="dev">+ Dev</button>
        <button class="demo-btn" data-add="marketing">+ Marketing</button>
        <button class="demo-btn" data-clear>Clear All</button>
      </div>
      <div class="ease-filter-chips" data-chips-container>
        <span class="ease-filter-chip is-active" data-chip="design">
          Design
          <span class="ease-filter-chip__count">12</span>
          <span class="ease-filter-chip__remove" data-remove>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </span>
        </span>
        <span class="ease-filter-chip is-active" data-chip="dev">
          Development
          <span class="ease-filter-chip__count">8</span>
          <span class="ease-filter-chip__remove" data-remove>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </span>
        </span>
      </div>
    </div>

    <div class="demo-card" style="--chip-bg: #22c55e; --chip-hover-bg: #16a34a; --transition-speed: 0.35s;">
      <h2>Custom Theme</h2>
      <div class="demo-actions">
        <button class="demo-btn" data-add="urgent">+ Urgent</button>
        <button class="demo-btn" data-add="bug">+ Bug</button>
        <button class="demo-btn" data-add="feature">+ Feature</button>
        <button class="demo-btn" data-clear>Clear All</button>
      </div>
      <div class="ease-filter-chips" data-chips-container>
        <span class="ease-filter-chip is-active" data-chip="urgent">
          Urgent
          <span class="ease-filter-chip__count">3</span>
          <span class="ease-filter-chip__remove" data-remove>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </span>
        </span>
      </div>
    </div>
  </div>

<script>
  document.querySelectorAll('[data-chips-container]').forEach(container => {
    const add = (label, count) => {
      const existing = container.querySelector(`[data-chip="${label.toLowerCase()}"]`);
      if (existing) return;
      const chip = document.createElement('span');
      chip.className = 'ease-filter-chip is-active ease-filter-chip--entering';
      chip.dataset.chip = label.toLowerCase();
      chip.innerHTML = `${label}<span class="ease-filter-chip__count">${count}</span><span class="ease-filter-chip__remove" data-remove><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>`;
      container.appendChild(chip);
      chip.querySelector('[data-remove]').addEventListener('click', (e) => {
        e.stopPropagation();
        remove(chip);
      });
      setTimeout(() => chip.classList.remove('ease-filter-chip--entering'), 300);
    };

    const remove = (chip) => {
      chip.classList.add('ease-filter-chip--exiting');
      setTimeout(() => chip.remove(), 300);
    };

    container.querySelectorAll('[data-remove]').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        remove(btn.closest('[data-chip]'));
      });
    });

    const addBtns = container.closest('.demo-card').querySelectorAll('[data-add]');
    addBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const label = btn.dataset.add;
        const count = Math.floor(Math.random() * 20) + 1;
        add(label.charAt(0).toUpperCase() + label.slice(1), count);
      });
    });

    const clearBtn = container.closest('.demo-card').querySelector('[data-clear]');
    clearBtn.addEventListener('click', () => {
      container.querySelectorAll('[data-chip]').forEach(chip => remove(chip));
    });
  });
</script>

</body>
</html>
