<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Font Switcher</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="switcher">

    <h2>Choose Typography</h2>

    <div class="options">

        <input type="radio" name="font" id="modern" checked>
        <label for="modern">Modern</label>

        <input type="radio" name="font" id="classic">
        <label for="classic">Classic</label>

        <input type="radio" name="font" id="mono">
        <label for="mono">Mono</label>

    </div>

    <div class="preview">
        Portfolio Typography Preview
    </div>

</div>

</body>
</html>
