<!DOCTYPE html>
<html>
<head>
  <title>Home Accordion UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion">

  <div class="item">
    <button onclick="toggle(this)">Section 1</button>
    <p class="content">This is content of section 1</p>
  </div>

  <div class="item">
    <button onclick="toggle(this)">Section 2</button>
    <p class="content">This is content of section 2</p>
  </div>

  <div class="item">
    <button onclick="toggle(this)">Section 3</button>
    <p class="content">This is content of section 3</p>
  </div>

</div>

<script>
function toggle(btn) {
  let content = btn.nextElementSibling;
  content.style.display = content.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
