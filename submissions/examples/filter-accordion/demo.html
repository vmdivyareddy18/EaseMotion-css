<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Grid Filter Accordion Tree — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .layout-wrapper {
      max-width: 360px;
      width: 100%;
    }
    .head-badge {
      font-family: 'JetBrains Mono', monospace;
      color: #38bdf8;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin: 0 0 1.5rem 0;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>

  <div class="layout-wrapper">
    <div class="head-badge">// Native Height Interpolation Array</div>
    <h1>Filter Parameters</h1>

    <aside class="ease-accordion-sidebar">
      
      <details class="ease-accordion-node" open>
        <summary class="ease-accordion-summary">
          <span>📁 Content Category</span>
        </summary>
        <div class="ease-accordion-wrapper">
          <div class="ease-accordion-content">
            <div class="ease-accordion-inner-stack">
              <label class="ease-accordion-option"><input type="checkbox" checked> Analytics Engine Layout</label>
              <label class="ease-accordion-option"><input type="checkbox"> Interface Typography Tokens</label>
              <label class="ease-accordion-option"><input type="checkbox"> Database Stream Matrix</label>
            </div>
          </div>
        </div>
      </details>

      <details class="ease-accordion-node">
        <summary class="ease-accordion-summary">
          <span>⚡ Performance Tier</span>
        </summary>
        <div class="ease-accordion-wrapper">
          <div class="ease-accordion-content">
            <div class="ease-accordion-inner-stack">
              <label class="ease-accordion-option"><input type="checkbox"> 60 FPS Composite Promotion</label>
              <label class="ease-accordion-option"><input type="checkbox"> Non-Composite Transform Sets</label>
              <label class="ease-accordion-option"><input type="checkbox"> Strict Layout Containment Bounds</label>
            </div>
          </div>
        </div>
      </details>

    </aside>
  </div>

</body>
</html>
