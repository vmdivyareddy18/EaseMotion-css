<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { font-family: sans-serif; background-color: #0f172a; color: #fff; text-align: center; margin: 0; }
    .spacer { height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { display: flex; gap: 2rem; justify-content: center; padding: 5rem; background: #1e293b; }
    .num { font-size: 3rem; font-weight: bold; color: #38bdf8; }
  </style>
</head>
<body>
  <div class="spacer"><h1>Scroll Down ↓</h1></div>
  <div class="container">
    <div><span class="ease-count-up num" data-target="1500">0</span><p>Users</p></div>
    <div><span class="ease-count-up num" data-target="99">0</span><p>Success Rate</p></div>
  </div>
  <script src="counter.js"></script>
</body>
</html>
