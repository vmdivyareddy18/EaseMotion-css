<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium 3D Tilt Scheduler</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="isometric-workspace">
    <!-- Main 3D Interactive Perspective Deck Wrapper -->
    <div class="perspective-container">
      <div class="tilt-calendar-card">
        
        <div class="calendar-meta-header">
          <div class="month-indicator">
            <h3>OCTOBER</h3>
            <p>System Schedule Node</p>
          </div>
          <span class="year-badge">2026</span>
        </div>

        <!-- Compact Sample Grid for Visual Effect Testing -->
        <div class="calendar-days-grid">
          <span class="day-label">M</span>
          <span class="day-label">T</span>
          <span class="day-label">W</span>
          <span class="day-label">T</span>
          <span class="day-label">F</span>
          
          <div class="date-cell past-node"><span>12</span></div>
          <div class="date-cell past-node"><span>13</span></div>
          <div class="date-cell active-target-node">
            <span>14</span>
            <div class="active-glow-dot"></div>
          </div>
          <div class="date-cell"><span>15</span></div>
          <div class="date-cell"><span>16</span></div>
        </div>

        <p class="panel-caption-footer">Hover to engage isometric depth perspectives and spatial rotation matrix tracks.</p>
      </div>
    </div>
  </main>

</body>
</html>
