<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catapult Stopwatch — EaseMotion CSS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />

    <style>
      body {
        background-color: #03050a;
        background-image: radial-gradient(
          circle at center,
          rgba(124, 58, 237, 0.08) 0%,
          transparent 70%
        );
        color: #f1f5f9;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        font-family: "Inter", system-ui, sans-serif;
      }

      .demo-intro {
        text-align: center;
        max-width: 600px;
        margin-bottom: 2rem;
      }

      .demo-tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.8rem;
        letter-spacing: 2px;
        color: #ff0055;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
        display: block;
      }

      .demo-title {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 0.5rem;
        background: linear-gradient(135deg, #ffffff 50%, #ff0055);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .demo-desc {
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <header class="demo-intro">
      <span class="demo-tag">Social Media Variant</span>
      <h1 class="demo-title">Catapult Stopwatch</h1>
      <p class="demo-desc">
        A hands-free camera recording timer mockup. Tap the central record
        button to trigger the catapult animation and start timing. Tap again to
        pause and slide up options.
      </p>
    </header>

    <form class="stopwatch-dashboard-antigravity" action="javascript:void(0);">
      <input
        type="checkbox"
        id="timer-start-antigravity"
        style="display: none"
      />
      <input
        type="checkbox"
        id="timer-pause-antigravity"
        style="display: none"
      />

      <div class="phone-mockup-antigravity">
        <header class="phone-header-antigravity">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
          <span class="phone-header-title-antigravity">Hands-Free Timer</span>
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"
            />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </header>

        <main class="phone-screen-antigravity">
          <section
            class="hud-display-antigravity"
            role="timer"
            aria-live="polite"
            aria-label="Elapsed time"
          >
            <div class="recording-indicator-antigravity"></div>
            <div class="digits-box-antigravity">
              <span class="digit-mm-antigravity"></span>
              <span class="hud-colon-antigravity">:</span>
              <span class="digit-ss-antigravity"></span>
              <span class="hud-colon-antigravity">:</span>
              <span class="digit-cs-antigravity"></span>
            </div>
          </section>

          <div class="emoji-spawner-antigravity" aria-hidden="true">
            <span class="emoji-antigravity emoji-1-antigravity">💖</span>
            <span class="emoji-antigravity emoji-2-antigravity">🔥</span>
            <span class="emoji-antigravity emoji-3-antigravity">✨</span>
          </div>

          <section class="interaction-zone-antigravity">
            <div class="btn-record-container-antigravity">
              <div class="progress-ring-antigravity">
                <div class="progress-ring-inner-antigravity"></div>
              </div>
              <div class="btn-record-antigravity">
                <label
                  for="timer-start-antigravity"
                  class="label-start-antigravity"
                  tabindex="0"
                  role="button"
                  aria-label="Start timer"
                ></label>
                <label
                  for="timer-pause-antigravity"
                  class="label-pause-antigravity"
                  tabindex="0"
                  role="button"
                  aria-label="Pause timer"
                ></label>
                <label
                  for="timer-pause-antigravity"
                  class="label-resume-antigravity"
                  tabindex="0"
                  role="button"
                  aria-label="Resume timer"
                ></label>
              </div>
            </div>
          </section>

          <section class="action-dock-antigravity">
            <div class="dock-buttons-antigravity">
              <button
                type="reset"
                class="btn-reset-antigravity"
                aria-label="Reset timer"
              >
                <svg
                  width="22"
                  height="22"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path
                    d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"
                  />
                </svg>
              </button>
              <button type="submit" class="btn-share-antigravity">
                Post to Feed
              </button>
            </div>
          </section>
        </main>
      </div>
    </form>

    <script>
      document.querySelectorAll('label[tabindex="0"]').forEach((label) => {
        label.addEventListener("keydown", (e) => {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            document.getElementById(label.getAttribute("for")).click();
          }
        });
      });
    </script>
  </body>
</html>
