<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Skeleton Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        padding: 1.5rem;
        color: #0f172a;
        font-family: system-ui, sans-serif;
        background: #f8fafc;
      }
      .demo-content { display: grid; flex: 1; gap: 0.75rem; padding-top: 0.25rem; }
      .demo-content .ease-skeleton-text:nth-child(2) { width: 82%; }
      .demo-content .ease-skeleton-text:nth-child(3) { width: 62%; }
    </style>
  </head>
  <body>
    <main class="ease-skeleton-card" aria-label="Loading profile" aria-busy="true">
      <span class="ease-skeleton ease-skeleton-circle" aria-hidden="true"></span>
      <div class="demo-content" aria-hidden="true">
        <span class="ease-skeleton ease-skeleton-text"></span>
        <span class="ease-skeleton ease-skeleton-text"></span>
        <span class="ease-skeleton ease-skeleton-text"></span>
      </div>
    </main>
  </body>
</html>
