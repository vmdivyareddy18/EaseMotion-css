<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Origami Paper Plane</title>
</head>
<body>
    <button class="plane-button" onclick="this.classList.add('fly')">
        <span class="text">Submit</span>
    </button>

    <script>
        // Animation khatam hone ke baad button wapas reset ho jayega
        const btn = document.querySelector('.plane-button');
        btn.addEventListener('animationend', () => {
            btn.classList.remove('fly');
        });
    </script>
</body>
</html>
