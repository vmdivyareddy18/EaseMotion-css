<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wanderlust Analytics Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="travel-dashboard-container">
    <div class="stat-card-display">
      
      <div class="card-meta-header">
        <h3>Exploration Metrics</h3>
        <span class="geo-badge">GLOBAL</span>
      </div>

      <!-- Pure CSS scrolling tick layout using container heights -->
      <div class="metrics-counter-wrapper">
        <div class="counter-column active-flash-sequence">
          <div class="number-strip">
            <span>0</span>
            <span>3</span>
            <span>5</span>
            <span>8</span>
          </div>
        </div>
        
        <div class="counter-column active-flash-sequence" style="animation-delay: 0.15s;">
          <div class="number-strip">
            <span>0</span>
            <span>4</span>
            <span>7</span>
            <span>9</span>
          </div>
        </div>

        <span class="unit-suffix-label">K+</span>
      </div>

      <p class="stat-explanation-sub">Total miles tracked across high-altitude trekking routes this season.</p>
    </div>
  </main>

</body>
</html>
