<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Badge and Tag Component Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1 style="margin: 0; font-size: 1.75rem; text-align: center;">Animated Badges & Tags</h1>
  <p style="color: #4b5563; margin-top: 0.25rem; text-align: center;">Lightweight status components built with native CSS interaction layers.</p>

  <div class="showcase-section">
    
    <div>
      <h3>Live Status Indicators</h3>
      <div class="badge-row">
        <span class="ease-badge-pulse badge-success">
          <span class="status-dot"></span> Operational
        </span>
        <span class="ease-badge-pulse badge-error">
          <span class="status-dot"></span> Outage
        </span>
        <span class="ease-badge-pulse badge-warning">
          <span class="status-dot"></span> Throttled
        </span>
      </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #1e293b; margin: 0;">

    <div>
      <h3>Interactive Category Tags</h3>
      <div class="badge-row">
        <div class="ease-tag-interactive">Web Development</div>
        <div class="ease-tag-interactive">User Experience</div>
        <div class="ease-tag-interactive tag-gradient-glow">Next-Gen AI</div>
      </div>
    </div>

  </div>

</body>
</html>
