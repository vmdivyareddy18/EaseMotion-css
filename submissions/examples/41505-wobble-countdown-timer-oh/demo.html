<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-wobble-countdown-timer</title>
  <meta name="description" content="Animated countdown timer with wobble animation effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-wobble-countdown-timer</h1>
      <p class="subtitle" id="main-desc">Countdown timer with wobble animation</p>
    </header>

    <div class="display-area">
      
      <div class="timer-showcase">
        
        <!-- Default -->
        <div class="timer-item">
          <div class="ease-wobble-countdown">
            <div class="countdown-segment">
              <span class="countdown-value">12</span>
              <span class="countdown-label">Hours</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">45</span>
              <span class="countdown-label">Minutes</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">30</span>
              <span class="countdown-label">Seconds</span>
            </div>
          </div>
          <span class="timer-label">Default</span>
        </div>

        <!-- Primary -->
        <div class="timer-item">
          <div class="ease-wobble-countdown ease-wobble-primary">
            <div class="countdown-segment">
              <span class="countdown-value">05</span>
              <span class="countdown-label">Days</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">23</span>
              <span class="countdown-label">Hours</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">59</span>
              <span class="countdown-label">Min</span>
            </div>
          </div>
          <span class="timer-label">Primary</span>
        </div>

        <!-- Danger -->
        <div class="timer-item">
          <div class="ease-wobble-countdown ease-wobble-danger">
            <div class="countdown-segment">
              <span class="countdown-value">00</span>
              <span class="countdown-label">Days</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">00</span>
              <span class="countdown-label">Hours</span>
            </div>
            <span class="countdown-separator">:</span>
            <div class="countdown-segment">
              <span class="countdown-value">10</span>
              <span class="countdown-label">Sec</span>
            </div>
          </div>
          <span class="timer-label">Danger (Urgent)</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Launch Countdown Example</h3>
      <div class="launch-countdown">
        <div class="ease-wobble-countdown ease-wobble-lg ease-wobble-primary">
          <div class="countdown-segment">
            <span class="countdown-value">02</span>
            <span class="countdown-label">Days</span>
          </div>
          <span class="countdown-separator">:</span>
          <div class="countdown-segment">
            <span class="countdown-value">14</span>
            <span class="countdown-label">Hours</span>
          </div>
          <span class="countdown-separator">:</span>
          <div class="countdown-segment">
            <span class="countdown-value">36</span>
            <span class="countdown-label">Min</span>
          </div>
          <span class="countdown-separator">:</span>
          <div class="countdown-segment">
            <span class="countdown-value">48</span>
            <span class="countdown-label">Sec</span>
          </div>
        </div>
        <p class="countdown-title">Product Launch In</p>
      </div>
    </section>

  </main>

</body>
</html>
