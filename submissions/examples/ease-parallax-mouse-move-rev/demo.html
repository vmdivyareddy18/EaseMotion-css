<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Mouse Move Demo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="parallax-container" id="parallaxContainer">
        <div class="parallax-layer layer-1" data-speed="0.02">
            <div class="shape circle-1"></div>
        </div>
        <div class="parallax-layer layer-2" data-speed="0.04">
            <div class="shape circle-2"></div>
        </div>
        <div class="parallax-layer layer-3" data-speed="0.06">
            <div class="shape square-1"></div>
        </div>
        <div class="parallax-layer layer-4" data-speed="0.08">
            <div class="shape circle-3"></div>
        </div>
        <div class="parallax-layer layer-5" data-speed="0.1">
            <div class="shape square-2"></div>
        </div>
        <div class="parallax-layer layer-6" data-speed="0.12">
            <div class="shape circle-4"></div>
        </div>
        <div class="content">
            <h1 class="title">Parallax Effect</h1>
            <p class="subtitle">Move your mouse to see the depth effect</p>
        </div>
    </div>

    <script>
        const container = document.getElementById('parallaxContainer');
        const layers = document.querySelectorAll('.parallax-layer');

        container.addEventListener('mousemove', (e) => {
            const rect = container.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const percentX = (mouseX - centerX) / centerX;
            const percentY = (mouseY - centerY) / centerY;

            layers.forEach(layer => {
                const speed = parseFloat(layer.dataset.speed);
                const x = percentX * speed * 100;
                const y = percentY * speed * 100;
                
                layer.style.setProperty('--mouse-x', `${x}px`);
                layer.style.setProperty('--mouse-y', `${y}px`);
            });
        });

        container.addEventListener('mouseleave', () => {
            layers.forEach(layer => {
                layer.style.setProperty('--mouse-x', '0px');
                layer.style.setProperty('--mouse-y', '0px');
            });
        });
    </script>
</body>
</html>
