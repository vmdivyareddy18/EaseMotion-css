<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Responsive Login Page — EaseMotion CSS</title>
    <meta
      name="description"
      content="A premium, accessible login page demonstrating how EaseMotion CSS utility classes and components can be applied to common web layouts."
    />
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background decorative animated spheres -->
    <div class="bg-glow-sphere-1"></div>
    <div class="bg-glow-sphere-2"></div>

    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container ease-fade-in">
      <button
        class="ease-btn ease-btn-ghost ease-btn-icon ease-btn-hover"
        id="theme-switcher"
        aria-label="Toggle dark/light theme"
      >
        <!-- Moon Icon (show in light mode) -->
        <svg
          class="theme-icon-moon"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="display: block"
        >
          <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
        </svg>
        <!-- Sun Icon (show in dark mode) -->
        <svg
          class="theme-icon-sun"
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          style="display: none"
        >
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="M4.93 4.93l1.41 1.41"></path>
          <path d="M17.66 17.66l1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="M6.34 17.66l-1.41 1.41"></path>
          <path d="M19.07 4.93l-1.41 1.41"></path>
        </svg>
      </button>
    </div>

    <div class="login-container">
      <!-- Main Login Card -->
      <div
        class="ease-card ease-card-glass login-card ease-slide-up ease-duration-slow"
        id="login-card"
      >
        <!-- Card Header -->
        <div class="login-header ease-fade-in ease-slide-up ease-delay-75">
          <div class="logo-icon ease-bounce-in ease-delay-150">E</div>
          <h1 class="ease-card-title login-title ease-text-gradient-flow">
            Welcome Back
          </h1>
          <p class="ease-card-subtitle">Please enter your details to sign in</p>
        </div>

        <!-- Form Feedback Notification Banner -->
        <div class="alert-box ease-fade-in" id="feedback-alert">
          <span id="alert-message"></span>
        </div>

        <!-- Login Form -->
        <form id="login-form" autocomplete="on" novalidate>
          <!-- Email Field -->
          <div
            class="ease-field ease-fade-in ease-slide-up ease-delay-100"
            id="email-field-container"
          >
            <label class="ease-field-label" for="current-email"
              >Email Address</label
            >
            <input
              type="email"
              class="ease-input"
              id="current-email"
              name="email"
              autocomplete="username"
              placeholder="name@example.com"
              required
              enterkeyhint="next"
            />
          </div>

          <!-- Password Field -->
          <div
            class="ease-field ease-fade-in ease-slide-up ease-delay-150"
            id="password-field-container"
          >
            <label class="ease-field-label" for="current-password"
              >Password</label
            >
            <div class="password-wrapper">
              <input
                type="password"
                class="ease-input"
                id="current-password"
                name="password"
                autocomplete="current-password"
                placeholder="Enter your password"
                required
                enterkeyhint="done"
              />
              <button
                type="button"
                class="password-toggle-btn"
                id="password-toggle"
                aria-label="Show password"
              >
                <!-- Eye Close Icon (default visible) -->
                <svg
                  id="eye-close-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path>
                  <path
                    d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"
                  ></path>
                  <path
                    d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"
                  ></path>
                  <line x1="2" y1="2" x2="22" y2="22"></line>
                </svg>
                <!-- Eye Open Icon (hidden initially) -->
                <svg
                  id="eye-open-icon"
                  xmlns="http://www.w3.org/2000/svg"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  style="display: none"
                >
                  <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
              </button>
            </div>

            <!-- Dynamic Password Strength Component -->
            <div
              class="ease-password-strength"
              id="password-strength-container"
              style="display: none"
            >
              <div class="ease-password-strength-bar" id="strength-bar"></div>
              <div class="ease-password-strength-label">
                <span>Password Strength:</span>
                <span class="ease-password-strength-text" id="strength-text"
                  >Empty</span
                >
              </div>
            </div>
          </div>

          <!-- Form Options (Remember Me / Forgot Password) -->
          <div class="form-options ease-fade-in ease-slide-up ease-delay-200">
            <label
              class="ease-toggle ease-toggle-sm ease-toggle-primary"
              for="remember-me"
            >
              <input type="checkbox" id="remember-me" name="remember" />
              <span class="ease-toggle-track">
                <span class="ease-toggle-thumb"></span>
              </span>
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password-link ease-text-underline-draw"
              >Forgot password?</a
            >
          </div>

          <!-- Login Button -->
          <div class="ease-fade-in ease-slide-up ease-delay-300">
            <button
              type="submit"
              class="ease-btn ease-btn-primary ease-btn-block ease-btn-hover ease-squish-button"
              id="submit-btn"
            >
              <span>Sign In</span>
            </button>
          </div>
        </form>

        <!-- Card Footer -->
        <div
          class="login-card-footer ease-fade-in ease-slide-up ease-delay-400"
        >
          Don't have an account?
          <a href="#" class="signup-link ease-text-underline-draw">Sign Up</a>
        </div>
      </div>

      <!-- Small project footer branding -->
      <div class="demo-footer ease-fade-in ease-delay-500">
        Built with
        <a
          href="https://github.com/saptarshi-coder/easemotion-css"
          target="_blank"
          class="ease-text-underline-draw"
          >EaseMotion CSS</a
        >
      </div>
    </div>

    <script>
      // Theme Management
      const themeSwitcher = document.getElementById("theme-switcher");
      const sunIcon = themeSwitcher.querySelector(".theme-icon-sun");
      const moonIcon = themeSwitcher.querySelector(".theme-icon-moon");

      function setTheme(theme) {
        if (theme === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
          sunIcon.style.display = "block";
          moonIcon.style.display = "none";
        } else {
          document.documentElement.removeAttribute("data-theme");
          sunIcon.style.display = "none";
          moonIcon.style.display = "block";
        }
        localStorage.setItem("theme", theme);
      }

      // Check system preference & localStorage
      const savedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)"
      ).matches;

      if (savedTheme === "dark" || (!savedTheme && systemPrefersDark)) {
        setTheme("dark");
      } else {
        setTheme("light");
      }

      themeSwitcher.addEventListener("click", () => {
        const currentTheme =
          document.documentElement.getAttribute("data-theme") === "dark"
            ? "dark"
            : "light";
        setTheme(currentTheme === "dark" ? "light" : "dark");
      });

      // Password Visibility Toggle
      const passwordInput = document.getElementById("current-password");
      const passwordToggle = document.getElementById("password-toggle");
      const eyeOpen = document.getElementById("eye-open-icon");
      const eyeClose = document.getElementById("eye-close-icon");

      passwordToggle.addEventListener("click", () => {
        const isPassword = passwordInput.getAttribute("type") === "password";
        passwordInput.setAttribute("type", isPassword ? "text" : "password");
        passwordToggle.setAttribute(
          "aria-label",
          isPassword ? "Hide password" : "Show password"
        );
        eyeOpen.style.display = isPassword ? "block" : "none";
        eyeClose.style.display = isPassword ? "none" : "block";
      });

      // Password Strength Meter
      const strengthContainer = document.getElementById(
        "password-strength-container"
      );
      const strengthBar = document.getElementById("strength-bar");
      const strengthText = document.getElementById("strength-text");

      passwordInput.addEventListener("input", () => {
        const val = passwordInput.value;

        if (!val) {
          strengthContainer.style.display = "none";
          return;
        }

        strengthContainer.style.display = "block";
        let score = 0;

        if (val.length >= 6) score++;
        if (val.length >= 10) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        // Reset strength classes
        strengthBar.className = "ease-password-strength-bar";
        strengthText.className = "ease-password-strength-text";

        if (score <= 2) {
          strengthBar.classList.add("is-weak");
          strengthText.classList.add("is-weak");
          strengthText.textContent = "Weak";
        } else if (score <= 4) {
          strengthBar.classList.add("is-medium");
          strengthText.classList.add("is-medium");
          strengthText.textContent = "Medium";
        } else {
          strengthBar.classList.add("is-strong");
          strengthText.classList.add("is-strong");
          strengthText.textContent = "Strong";
        }
      });

      // Form Validation and Submission Simulation
      const form = document.getElementById("login-form");
      const emailInput = document.getElementById("current-email");
      const emailField = document.getElementById("email-field-container");
      const passwordField = document.getElementById("password-field-container");
      const loginCard = document.getElementById("login-card");
      const alertBox = document.getElementById("feedback-alert");
      const alertMessage = document.getElementById("alert-message");
      const submitBtn = document.getElementById("submit-btn");

      form.addEventListener("submit", (e) => {
        e.preventDefault();

        // Clear previous styles
        emailField.classList.remove("ease-field-danger");
        emailInput.classList.remove("ease-input-danger");
        passwordField.classList.remove("ease-field-danger");
        passwordInput.classList.remove("ease-input-danger");
        alertBox.className = "alert-box ease-fade-in";

        let hasError = false;

        // Validate Email
        if (!emailInput.value || !emailInput.checkValidity()) {
          emailField.classList.add("ease-field-danger");
          emailInput.classList.add("ease-input-danger");
          hasError = true;
        }

        // Validate Password
        if (!passwordInput.value) {
          passwordField.classList.add("ease-field-danger");
          passwordInput.classList.add("ease-input-danger");
          hasError = true;
        }

        if (hasError) {
          // Apply existing framework shake animation
          loginCard.classList.remove("ease-shake");
          void loginCard.offsetWidth; // Trigger reflow to restart animation
          loginCard.classList.add("ease-shake");

          // Show error message
          alertBox.classList.add("alert-danger", "is-visible");
          alertMessage.textContent = "Please fill out all fields correctly.";

          // Focus first invalid input
          if (!emailInput.value || !emailInput.checkValidity()) {
            emailInput.focus();
          } else {
            passwordInput.focus();
          }
          return;
        }

        // Simulate successful network request
        submitBtn.classList.add("ease-btn-loading");
        emailInput.disabled = true;
        passwordInput.disabled = true;
        submitBtn.disabled = true;

        setTimeout(() => {
          submitBtn.classList.remove("ease-btn-loading");

          // Show success alert banner
          alertBox.className =
            "alert-box ease-fade-in alert-success is-visible";
          alertMessage.textContent = "Welcome back! Login successful.";

          // Clear forms
          form.reset();
          strengthContainer.style.display = "none";

          // Re-enable inputs
          emailInput.disabled = false;
          passwordInput.disabled = false;
          submitBtn.disabled = false;
        }, 1500);
      });
    </script>
  </body>
</html>
