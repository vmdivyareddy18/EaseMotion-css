<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Zoom-Out Popover - Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Dashboard Analytics</span>
      <h1>Zoom-Out Popover</h1>
      <p class="subtitle">Data zoom animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="dash-btn" aria-label="View analytics">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
            <path d="M22 12A10 10 0 0 0 12 2v10z"/>
          </svg>
          Analytics
        </button>
        <div class="zoom-popover" role="tooltip">
          <div class="zoom-header">
            <h4>Quick Stats</h4>
            <span class="zoom-period">Today</span>
          </div>
          <div class="zoom-stats">
            <div class="zoom-stat" style="--delay: 0s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                  <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                  <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">2,847</span>
                <span class="stat-label">Active Users</span>
              </div>
            </div>
            <div class="zoom-stat" style="--delay: 0.05s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">94.2%</span>
                <span class="stat-label">Uptime</span>
              </div>
            </div>
            <div class="zoom-stat" style="--delay: 0.1s">
              <div class="stat-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <polyline points="12,6 12,12 16,14"/>
                </svg>
              </div>
              <div class="stat-info">
                <span class="stat-value">1.2s</span>
                <span class="stat-label">Avg Load</span>
              </div>
            </div>
          </div>
          <div class="zoom-footer">
            <button class="dash-cta">View Dashboard</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Scale</button>
          <div class="zoom-popover scale" role="tooltip"><p>Scale zoom animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Bounce</button>
          <div class="zoom-popover bounce" role="tooltip"><p>Bounce zoom animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="zoom-popover slide" role="tooltip"><p>Slide zoom animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-indigo">Indigo</button>
          <div class="zoom-popover theme-indigo" role="tooltip"><p>Indigo theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-sky">Sky</button>
          <div class="zoom-popover theme-sky" role="tooltip"><p>Sky theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="zoom-popover theme-violet" role="tooltip"><p>Violet theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
