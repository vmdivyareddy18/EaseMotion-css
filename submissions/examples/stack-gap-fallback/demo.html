<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stack Gap Fallback Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Default Stack (gap fallback: 1rem)</h2>
  <div class="ease-stack">
    <div class="box">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box">Item 3</div>
  </div>

  <h2>Stack SM (gap fallback: 0.5rem)</h2>
  <div class="ease-stack-sm">
    <div class="box">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box">Item 3</div>
  </div>

  <h2>Stack LG (gap fallback: 1.5rem)</h2>
  <div class="ease-stack-lg">
    <div class="box">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box">Item 3</div>
  </div>

  <h2>Stack XL (gap fallback: 2rem)</h2>
  <div class="ease-stack-xl">
    <div class="box">Item 1</div>
    <div class="box">Item 2</div>
    <div class="box">Item 3</div>
  </div>

</body>
</html>
