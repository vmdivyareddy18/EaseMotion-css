<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Folded Ticket Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ticket-stage">
    
    <div class="folded-ticket">
      
      <div class="ticket-flap flap-top">
        <span class="ticket-tag">VIP PASS</span>
        <h2 class="ticket-title">EaseMotion Conference</h2>
        <p style="margin: 0.25rem 0 0 0; color: #64748b; font-size: 0.8rem;">Admit One — Main Stage Entry</p>
      </div>

      <div class="ticket-flap flap-bottom">
        <p style="margin: 0; color: #94a3b8; font-size: 0.85rem;">Hover Container to Unfold Promo Code</p>
        <div class="promo-code">EASE_MOTION_2026</div>
      </div>

    </div>

  </div>

</body>
</html>
