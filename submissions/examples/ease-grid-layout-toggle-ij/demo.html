<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-grid-layout-toggle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glt-container">
    <div class="glt-header">
      <h1>Layout Toggle</h1>
      <button class="glt-toggle" id="gltToggle" aria-label="Toggle layout">
        <span class="glt-icon" id="gltIcon">&#9636;</span>
      </button>
    </div>
    <div class="glt-grid" id="gltGrid">
      <div class="glt-item"><div class="glt-img" style="background:#6c63ff"></div><p>Design System</p></div>
      <div class="glt-item"><div class="glt-img" style="background:#ff6584"></div><p>UI Components</p></div>
      <div class="glt-item"><div class="glt-img" style="background:#45c4a0"></div><p>Prototyping</p></div>
      <div class="glt-item"><div class="glt-img" style="background:#f2b705"></div><p>Animation</p></div>
      <div class="glt-item"><div class="glt-img" style="background:#ff6b6b"></div><p>Accessibility</p></div>
      <div class="glt-item"><div class="glt-img" style="background:#4ecdc4"></div><p>Responsive</p></div>
    </div>
  </div>
  <script>
    const grid = document.getElementById('gltGrid');
    const icon = document.getElementById('gltIcon');
    let isList = false;

    document.getElementById('gltToggle').addEventListener('click', () => {
      isList = !isList;
      grid.classList.toggle('glt-grid--list', isList);
      icon.innerHTML = isList ? '&#9776;' : '&#9636;';
    });
  </script>
</body>
</html>
