<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catapult Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">
    <div class="stopwatch ease-fade-in">

        <div class="catapult">
            <div class="arm"></div>
            <div class="pivot"></div>
            <div class="ball"></div>
        </div>

        <div class="timer">
            <span>00</span>
            <span>:</span>
            <span>15</span>
            <span>:</span>
            <span>82</span>
        </div>

        <button class="btn">START</button>

    </div>
</div>

</body>
</html>
