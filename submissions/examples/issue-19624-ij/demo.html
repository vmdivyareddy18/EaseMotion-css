<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speedometer – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="speedometer-wrapper">
    <div class="speedometer" role="meter" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
      <div class="speed-face"></div>
      <div class="speed-fill"></div>
      <div class="speed-needle"></div>
      <div class="speed-labels">
        <span>0</span>
        <span>50</span>
        <span>100</span>
      </div>
      <span class="speed-value">60</span>
    </div>
    <span class="speed-title">Speedometer</span>
  </div>
</body>
</html>
