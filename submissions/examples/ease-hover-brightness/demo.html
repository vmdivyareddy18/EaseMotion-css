<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-brightness — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; background: #0f0f0f; color: #d1d5db; font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; }
    h1 { color: #ffffff; font-size: 1.75rem; margin-bottom: 0.25rem; }
    p.subtitle { line-height: 1.7; margin-bottom: 2rem; color: #9ca3af; }
    section { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    h2 { color: #ffffff; font-size: 1.1rem; margin: 0 0 0.5rem; }
    .sec-desc { font-size: 0.85rem; color: #9ca3af; margin: 0 0 1rem; font-family: monospace; }
    code { background: #2a2a2a; padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>ease-hover-brightness</h1>
  <p class="subtitle">Element brightens on hover using CSS filter — pure CSS, no JavaScript.</p>

  <section>
    <h2>Cards</h2>
    <p class="sec-desc">Hover to brighten using <code>filter: brightness()</code></p>
    <div class="bright-grid">
      <div class="bright-card" style="background: linear-gradient(135deg, #6366f1, #a78bfa);">Default</div>
      <div class="bright-card" style="--ease-brightness-amount: 1.4; background: linear-gradient(135deg, #ef4444, #f97316);">1.4x</div>
      <div class="bright-card" style="--ease-brightness-amount: 1.6; background: linear-gradient(135deg, #22c55e, #059669);">1.6x</div>
    </div>
  </section>
</body>
</html>
