<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Fade Pop - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Tooltip Fade Pop</h1>
    <p class="demo-desc">Hover any button to see the tooltip fade and pop in</p>

    <div class="btn-group">
      <button class="tfp-btn --top" data-tfp="Top tooltip">Top</button>
      <button class="tfp-btn --bottom" data-tfp="Bottom tooltip">Bottom</button>
      <button class="tfp-btn --left" data-tfp="Left tooltip">Left</button>
      <button class="tfp-btn --right" data-tfp="Right tooltip">Right</button>
    </div>
  </div>
</body>
</html>
