<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pin Code Input - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>PIN Code Input</h1>
    <div class="pin-card">
      <h2 class="pin-title">Enter PIN</h2>
      <p class="pin-sub">Enter your 4-digit security code</p>
      <div class="pin-inputs" id="pinContainer">
        <input type="text" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]" autofocus>
        <input type="text" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
        <input type="text" class="pin-box" maxlength="1" inputmode="numeric" pattern="[0-9]">
      </div>
      <p class="pin-hint" id="pinHint">Type your 4-digit PIN</p>
    </div>
    <p class="description">Each box accepts one digit. CSS handles the focus transition via <code>--box-active</code> custom property when a digit is entered.</p>
  </div>
  <script>
    const boxes = document.querySelectorAll('.pin-box');
    const hint = document.getElementById('pinHint');
    boxes.forEach((box, i) => {
      box.addEventListener('input', () => {
        box.value = box.value.replace(/\D/g, '').slice(0, 1);
        if (box.value) {
          box.style.setProperty('--box-active', '1');
          if (i < boxes.length - 1) boxes[i + 1].focus();
        } else {
          box.style.setProperty('--box-active', '0');
        }
        const filled = Array.from(boxes).every(b => b.value);
        hint.textContent = filled ? 'PIN complete! ✓' : 'Type your 4-digit PIN';
        if (filled) hint.classList.add('complete');
      });
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !box.value && i > 0) {
          boxes[i - 1].focus();
          boxes[i - 1].value = '';
          boxes[i - 1].style.setProperty('--box-active', '0');
        }
      });
      box.addEventListener('focus', () => {
        boxes.forEach(b => b.style.setProperty('--box-focus', b === box ? '1' : '0'));
      });
    });
  </script>
</body>
</html>
