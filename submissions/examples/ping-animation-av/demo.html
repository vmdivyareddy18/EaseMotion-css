<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ping Animation • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <span class="badge">
        PING ANIMATION
    </span>

    <h1>Live Status Indicators</h1>

    <p>
        Beautiful animated ping indicators suitable for notifications,
        online status, maps, dashboards and monitoring systems.
    </p>

    <div class="grid">

        <div class="card">

            <div class="ping blue">

                <span class="wave"></span>

                <span class="dot"></span>

            </div>

            <h3>Online</h3>

        </div>

        <div class="card">

            <div class="ping green">

                <span class="wave"></span>

                <span class="dot"></span>

            </div>

            <h3>Connected</h3>

        </div>

        <div class="card">

            <div class="ping orange">

                <span class="wave"></span>

                <span class="dot"></span>

            </div>

            <h3>Syncing</h3>

        </div>

        <div class="card">

            <div class="ping red">

                <span class="wave"></span>

                <span class="dot"></span>

            </div>

            <h3>Offline</h3>

        </div>

    </div>

</div>

</body>
</html>
