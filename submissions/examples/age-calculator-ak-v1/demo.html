<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Theme Toggle -->
  <div class="theme-switch-container">
    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle layout theme">
      <!-- Sun Icon (Active in Dark Theme) -->
      <svg class="sun-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="5"></circle>
        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
      </svg>
      <!-- Moon Icon (Active in Light Theme) -->
      <svg class="moon-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
      </svg>
    </button>
  </div>

  <!-- Main Component Wrapper -->
  <main class="age-wrapper animate-fade-in">
    
    <header class="calc-header">
      <div class="brand-badge">EaseMotion CSS</div>
      <h1>Age Calculator</h1>
      <p class="subtitle">Determine exact time metrics dynamically</p>
    </header>

    <div class="input-card">
      <div class="input-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" class="date-input">
      </div>
    </div>

    <!-- Metrics Matrix Grid -->
    <div class="age-display" id="ageDisplay">
      <div class="age-block">
        <span class="age-value" id="yearsVal">0</span>
        <span class="age-unit">Years</span>
      </div>
      <div class="age-block">
        <span class="age-value" id="monthsVal">0</span>
        <span class="age-unit">Months</span>
      </div>
      <div class="age-block">
        <span class="age-value" id="daysVal">0</span>
        <span class="age-unit">Days</span>
      </div>
    </div>

    <!-- High-Precision Metric Terminal -->
    <div class="precise-age" id="preciseAge">
      <div class="terminal-header">
        <span class="terminal-dot red"></span>
        <span class="terminal-dot yellow"></span>
        <span class="terminal-dot green"></span>
        <span class="terminal-title">Real-Time Precision Counter</span>
      </div>
      <p id="preciseText">-- years, -- months, -- days, -- hours, -- minutes, -- seconds</p>
    </div>

  </main>

  <script>
    const dobInput = document.getElementById('dob');
    const yearsEl = document.getElementById('yearsVal');
    const monthsEl = document.getElementById('monthsVal');
    const daysEl = document.getElementById('daysVal');
    const preciseEl = document.getElementById('preciseText');
    const themeToggleBtn = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;

    // Persistent LocalStorage Theme Architecture
    const activeTheme = localStorage.getItem('calc-theme') || 
      (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    
    htmlElement.setAttribute('data-theme', activeTheme);

    themeToggleBtn.addEventListener('click', () => {
      const currentTheme = htmlElement.getAttribute('data-theme');
      const alternateTheme = currentTheme === 'dark' ? 'light' : 'dark';
      htmlElement.setAttribute('data-theme', alternateTheme);
      localStorage.setItem('calc-theme', alternateTheme);
    });

    // Core Calculation Mechanism
    dobInput.valueAsDate = new Date('2000-01-01');

    function computeAge() {
      const birth = new Date(dobInput.value);
      if (isNaN(birth.getTime())) return;

      const now = new Date();
      let years = now.getFullYear() - birth.getFullYear();
      let months = now.getMonth() - birth.getMonth();
      let days = now.getDate() - birth.getDate();

      if (days < 0) {
        months--;
        const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
        days += prevMonth.getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }

      yearsEl.textContent = years;
      monthsEl.textContent = months;
      daysEl.textContent = days;

      const diff = now - birth;
      const totalHours = Math.floor(diff / 3600000);
      const totalMinutes = Math.floor(diff / 60000);
      const totalSeconds = Math.floor(diff / 1000);

      preciseEl.textContent = years + 'Y ' + months + 'M ' + days + 'D  •  ' +
        (totalHours % 24).toString().padStart(2, '0') + 'h : ' + 
        (totalMinutes % 60).toString().padStart(2, '0') + 'm : ' + 
        (totalSeconds % 60).toString().padStart(2, '0') + 's';
    }

    dobInput.addEventListener('change', computeAge);
    setInterval(computeAge, 1000);
    computeAge();
  </script>

</body>
</html>
