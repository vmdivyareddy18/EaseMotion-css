<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Typewriter · EaseMotion CSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="tt-container">
  <h1 class="tt-title">Terminal Typewriter</h1>
  <p class="tt-subtitle">Character-by-character command execution</p>

  <div class="tt-terminal">
    <div class="tt-header">
      <span class="tt-dot"></span>
      <span class="tt-dot"></span>
      <span class="tt-dot"></span>
      <span class="tt-label">bash ~</span>
    </div>
    <div class="tt-body" id="terminalBody">
      <div class="tt-line"><span class="tt-prompt">$</span> <span class="tt-text" data-text="echo 'Hello, World!'"></span></div>
      <div class="tt-line"><span class="tt-prompt">$</span> <span class="tt-text" data-text="ls -la"></span></div>
      <div class="tt-line"><span class="tt-prompt">$</span> <span class="tt-text" data-text="npm run dev"></span></div>
      <div class="tt-line"><span class="tt-prompt">$</span> <span class="tt-text" data-text="git push origin main"></span></div>
      <div class="tt-line"><span class="tt-prompt">$</span> <span class="tt-text tt-cursor-line" data-text="cat README.md"></span></div>
      <div class="tt-cursor">▊</div>
    </div>
  </div>

  <div class="tt-controls">
    <label>
      Speed
      <input type="range" id="speedRange" min="20" max="200" value="80">
      <span id="speedLabel">80ms</span>
    </label>
    <button id="restartBtn">Restart</button>
  </div>
</main>
<script src="demo.js"></script>
</body>
</html>
