<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Pencil Sketch Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Pencil Sketch Effect</h1>
      <p class="subtitle">Hover to see the sketch animation</p>
    </header>

    <div class="display-area">
      <div class="sketch-container">
        <div class="image-wrapper">
          <img src="https://picsum.photos/400/400?random=10" alt="Original" class="original">
          <img src="https://picsum.photos/400/400?random=10" alt="Sketch" class="sketch">
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-grid">
        <div class="sketch-container mini">
          <div class="image-wrapper">
            <img src="https://picsum.photos/200/200?random=11" alt="Sketch" class="sketch">
          </div>
        </div>
        <div class="sketch-container mini">
          <div class="image-wrapper grayscale">
            <img src="https://picsum.photos/200/200?random=12" alt="Sketch" class="sketch">
          </div>
        </div>
        <div class="sketch-container mini">
          <div class="image-wrapper sepia">
            <img src="https://picsum.photos/200/200?random=13" alt="Sketch" class="sketch">
          </div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Copy Code</h3>
      <div class="code-block">
        <div class="code-header"><span>HTML</span></div>
        <pre>&lt;div class="sketch-container"&gt;
  &lt;div class="image-wrapper"&gt;
    &lt;img src="image.jpg" class="sketch"&gt;
  &lt;/div&gt;
&lt;/div&gt;</pre>
      </div>
    </section>

  </main>

</body>
</html>
