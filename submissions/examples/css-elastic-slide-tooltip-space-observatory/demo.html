<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Slide Tooltip - Space Observatory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="observatory">

    <h1>🌌 Space Observatory</h1>
    <p>Explore celestial objects</p>

    <div class="objects">

        <div class="planet">
            <button class="space-btn" aria-describedby="mars-tooltip">
                🔴 Mars
            </button>

            <div class="tooltip" id="mars-tooltip" role="tooltip">
                Mars: The Red Planet
            </div>
        </div>


        <div class="planet">
            <button class="space-btn" aria-describedby="moon-tooltip">
                🌙 Moon
            </button>

            <div class="tooltip" id="moon-tooltip" role="tooltip">
                Moon: Earth's Natural Satellite
            </div>
        </div>


        <div class="planet">
            <button class="space-btn" aria-describedby="saturn-tooltip">
                🪐 Saturn
            </button>

            <div class="tooltip" id="saturn-tooltip" role="tooltip">
                Saturn: Planet with Rings
            </div>
        </div>

    </div>

</section>

</body>
</html>
