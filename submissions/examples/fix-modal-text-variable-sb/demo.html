<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Theme-Aligned Modal Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="modal-overlay-sb">
    <div class="ease-modal-card-sb">
      
      <header class="modal-header-sb">
        <h3>Theme Settings Updated</h3>
        <button class="modal-close-icon-sb" aria-label="Close modal">✕</button>
      </header>

      <div class="modal-body-sb">
        <p>Your user profile preferences have been synced successfully with the cloud environment database cluster. All visual interface modules will now load matching your design token properties.</p>
      </div>

      <footer class="modal-footer-sb">
        <button class="modal-btn-secondary-sb">Cancel</button>
        <button class="modal-btn-primary-sb">Confirm Changes</button>
      </footer>

    </div>
  </div>

</body>
</html>
