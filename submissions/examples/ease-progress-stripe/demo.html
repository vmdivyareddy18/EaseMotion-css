<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-progress-stripe – Animated Striped Progress Bar</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-max-w-lg ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      Striped Progress Bar
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Diagonal stripes animate continuously to indicate active processing.
    </p>

    <!-- Progress bar -->
    <div class="progress-wrapper ease-mb-4">
      <div class="progress-bar ease-progress-stripe">
        <span class="progress-text">60%</span>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-fade-in ease-delay-500">
      Uses <code>repeating-linear-gradient</code> + animated <code>background-position</code>.
    </p>
  </div>

</body>
</html>
