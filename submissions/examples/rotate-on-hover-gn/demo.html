<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rotate on Hover – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    h3 { color: #444; margin-bottom: 8px; }
    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: center;
    }
    .box {
      width: 80px;
      height: 80px;
      background: #4f46e5;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
    }
    .icon-btn {
      padding: 12px 20px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .label {
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      margin-top: 4px;
    }
    .item { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>

  <h2>Rotate on Hover Utility</h2>

  <h3>Default (15deg right)</h3>
  <div class="demo-grid">
    <div class="item">
      <div class="box ease-rotate-hover">⚙️</div>
      <div class="label">ease-rotate-hover</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-hover-left">⚙️</div>
      <div class="label">ease-rotate-hover-left</div>
    </div>
  </div>

  <h3>Full Rotations</h3>
  <div class="demo-grid">
    <div class="item">
      <div class="box ease-rotate-hover-full">🔄</div>
      <div class="label">ease-rotate-hover-full (360°)</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-hover-flip">🔃</div>
      <div class="label">ease-rotate-hover-flip (180°)</div>
    </div>
  </div>

  <h3>Angle Variants</h3>
  <div class="demo-grid">
    <div class="item">
      <div class="box ease-rotate-45">↗️</div>
      <div class="label">45deg</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-90">➡️</div>
      <div class="label">90deg</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-135">↘️</div>
      <div class="label">135deg</div>
    </div>
  </div>

  <h3>Speed + Easing Variants</h3>
  <div class="demo-grid">
    <div class="item">
      <div class="box ease-rotate-hover ease-rotate-fast">⚡</div>
      <div class="label">Fast</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-hover ease-rotate-slow">🐢</div>
      <div class="label">Slow</div>
    </div>
    <div class="item">
      <div class="box ease-rotate-hover ease-rotate-bounce">🏀</div>
      <div class="label">Bounce</div>
    </div>
  </div>

  <h3>On Button Icon</h3>
  <button class="icon-btn">
    <span class="ease-rotate-hover-full">⚙️</span>
    Settings
  </button>

</body>
</html>
