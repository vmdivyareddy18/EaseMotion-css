<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar iOS Virtual Keyboard Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">EaseMotion</div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active">Dashboard</a>
        <a href="#" class="nav-item">Settings</a>
        <a href="#" class="nav-item">Profile</a>
      </nav>
      <div class="sidebar-footer">
        <span class="user-badge">User Account</span>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="content-header">
        <h1>iOS Virtual Keyboard Sidebar Guard</h1>
        <p>Focus the input fields below. On iOS, the sidebar maintains its exact 100dvh height and does not collapse or distort when the keyboard slides up.</p>
      </header>
      <section class="form-section">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Type here to open keyboard...">
        </div>
        <div class="form-group">
          <label for="comments">Comments</label>
          <textarea id="comments" placeholder="Describe your experience..."></textarea>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
