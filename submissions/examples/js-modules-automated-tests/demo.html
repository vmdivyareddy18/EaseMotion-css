<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated JS Test Suite - GSSoC #35154</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="test-fixtures" style="display: none; visibility: hidden; position: absolute;">
    <div id="modal-fixture" class="modal">
      <button id="close-modal">Close</button>
    </div>
    
    <div id="tabs-fixture">
      <button class="tab-btn active" data-target="#tab1">Tab 1</button>
      <button class="tab-btn" data-target="#tab2">Tab 2</button>
      <div id="tab1" class="tab-content active">Content 1</div>
      <div id="tab2" class="tab-content">Content 2</div>
    </div>

    <div id="reveal-fixture" class="reveal-element">Reveal Me</div>
  </div>

  <div class="test-dashboard">
    <header class="test-header">
      <h1>JS Module Test Runner</h1>
      <p>Automated Behavioral Suite for Issue #35154</p>
    </header>
    
    <div id="mocha"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/mocha/10.2.0/mocha.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chai/4.3.7/chai.min.js"></script>

  <script>
    // Initialize Mocha
    mocha.setup('bdd');
    const expect = chai.expect;

    /* ==========================================================================
       MOCK CORE JAVASCRIPT MODULES (Behavior Implementation)
       ========================================================================== */
    const Modules = {
      modal: {
        open(el) { el.classList.add('open'); el.focus(); },
        close(el) { el.classList.remove('open'); },
        handleEscape(e, el) { if (e.key === 'Escape') this.close(el); }
      },
      tabs: {
        switch(btn, buttons, contents) {
          buttons.forEach(b => b.classList.remove('active'));
          contents.forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          const target = document.querySelector(btn.dataset.target);
          if (target) target.classList.add('active');
        }
      },
      reveal: {
        init(el, options = {}) {
          if (options.reducedMotion) {
            el.classList.add('instant-visible');
          } else {
            el.classList.add('reveal-active');
          }
        }
      }
    };

    /* ==========================================================================
       AUTOMATED BEHAVIORAL TEST SUITE
       ========================================================================== */
    describe('Automated Tests: Core JavaScript Modules', () => {
      
      // --- MODAL TESTS ---
      describe('Modal Module (modal.js)', () => {
        let modalEl;
        beforeEach(() => { modalEl = document.getElementById('modal-fixture'); });
        afterEach(() => { modalEl.classList.remove('open'); });

        it('should properly apply open classes and visibility toggle states', () => {
          Modules.modal.open(modalEl);
          expect(modalEl.classList.contains('open')).to.be.true;
        });

        it('should remove visibility and open active classes on close invocation', () => {
          Modules.modal.open(modalEl);
          Modules.modal.close(modalEl);
          expect(modalEl.classList.contains('open')).to.be.false;
        });

        it('should close the modal via Keyboard accessibility hooks on Escape downpress', () => {
          Modules.modal.open(modalEl);
          const event = new KeyboardEvent('keydown', { key: 'Escape' });
          Modules.modal.handleEscape(event, modalEl);
          expect(modalEl.classList.contains('open')).to.be.false;
        });
      });

      // --- TABS TESTS ---
      describe('Tabs Module (tabs.js)', () => {
        it('should correctly shift active UI selectors upon runtime interaction loops', () => {
          const fixture = document.getElementById('tabs-fixture');
          const buttons = fixture.querySelectorAll('.tab-btn');
          const contents = fixture.querySelectorAll('.tab-content');
          
          // Click second tab
          Modules.tabs.switch(buttons[1], buttons, contents);
          
          expect(buttons[1].classList.contains('active')).to.be.true;
          expect(buttons[0].classList.contains('active')).to.be.false;
          expect(document.getElementById('tab2').classList.contains('active')).to.be.true;
        });
      });

      // --- REVEAL ANIMATION TESTS ---
      describe('Reveal Module (reveal.js)', () => {
        let revealEl;
        beforeEach(() => { revealEl = document.getElementById('reveal-fixture'); });
        afterEach(() => { revealEl.className = 'reveal-element'; });

        it('should securely register initial baseline entry layouts on initialization', () => {
          Modules.reveal.init(revealEl);
          expect(revealEl.classList.contains('reveal-active')).to.be.true;
        });

        it('should honor accessible rulesets and fallback instantly under system reduced-motion flags', () => {
          Modules.reveal.init(revealEl, { reducedMotion: true });
          expect(revealEl.classList.contains('instant-visible')).to.be.true;
          expect(revealEl.classList.contains('reveal-active')).to.be.false;
        });
      });

    });

    // Run the test runner
    mocha.run();
  </script>
</body>
</html>
