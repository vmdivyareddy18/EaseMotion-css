<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Lightbox Modal — Zoom-In Transition</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lightbox-demo">
    <h1>Gallery Lightbox Modal</h1>
    <p class="subtitle">Click any thumbnail to open with a smooth zoom-in transition</p>

    <div class="gallery-grid">
      <div class="thumb" data-img="https://picsum.photos/id/1015/800/600" style="background-image: url(https://picsum.photos/id/1015/400/300);">
        <span>Mountain</span>
      </div>
      <div class="thumb" data-img="https://picsum.photos/id/1018/800/600" style="background-image: url(https://picsum.photos/id/1018/400/300);">
        <span>City</span>
      </div>
      <div class="thumb" data-img="https://picsum.photos/id/1035/800/600" style="background-image: url(https://picsum.photos/id/1035/400/300);">
        <span>Coast</span>
      </div>
      <div class="thumb" data-img="https://picsum.photos/id/1043/800/600" style="background-image: url(https://picsum.photos/id/1043/400/300);">
        <span>Forest</span>
      </div>
    </div>

    <!-- Lightbox (hidden by default, toggled via :target) -->
    <div class="lightbox" id="lightbox" style="--overlay-bg: rgba(8, 8, 12, 0.92); --modal-bg: #1a1a22; --zoom-scale: 1.08; --transition-speed: 0.35s;">
      <a href="#" class="lightbox-close">&times;</a>
      <div class="lightbox-content">
        <img src="" alt="Lightbox image" id="lightbox-img">
      </div>
      <div class="lightbox-caption">Click outside or press &times; to close</div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.thumb').forEach(el => {
      el.addEventListener('click', () => {
        const img = el.dataset.img;
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        lightboxImg.src = img;
        window.location.hash = 'lightbox';
      });
    });
  </script>
</body>
</html>
