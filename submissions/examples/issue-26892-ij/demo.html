<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-centaur-run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="ground"></div>
    <div class="centaur">
      <div class="torso">
        <div class="chest"></div>
        <div class="head">
          <div class="hair"></div>
          <div class="eye"></div>
        </div>
        <div class="arm bow-arm"></div>
        <div class="arm draw-arm"></div>
      </div>
      <div class="horse-body">
        <div class="front-legs">
          <div class="leg fl1"></div>
          <div class="leg fl2"></div>
        </div>
        <div class="rear-legs">
          <div class="leg rl1"></div>
          <div class="leg rl2"></div>
        </div>
        <div class="tail"></div>
      </div>
    </div>
  </div>
</body>
</html>
