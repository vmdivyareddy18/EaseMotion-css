<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Animated Hamburger Menu Toggle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BASIC DEMO -->
  <div class="card">
    <h2>Click to toggle</h2>
    <div style="display:flex; gap:32px; justify-content:center; align-items:center;">

      <div>
        <button class="ease-hamburger" id="h1"
          aria-label="Toggle menu"
          onclick="toggle('h1')">
          <span></span><span></span><span></span>
        </button>
        <p class="hint">Default</p>
      </div>

      <div>
        <button class="ease-hamburger purple" id="h2"
          aria-label="Toggle menu"
          onclick="toggle('h2')">
          <span></span><span></span><span></span>
        </button>
        <p class="hint">Purple</p>
      </div>

      <div>
        <button class="ease-hamburger green" id="h3"
          aria-label="Toggle menu"
          onclick="toggle('h3')">
          <span></span><span></span><span></span>
        </button>
        <p class="hint">Green</p>
      </div>

      <div>
        <button class="ease-hamburger sm" id="h4"
          aria-label="Toggle menu"
          onclick="toggle('h4')">
          <span></span><span></span><span></span>
        </button>
        <p class="hint">Small</p>
      </div>

      <div>
        <button class="ease-hamburger lg dark" id="h5"
          aria-label="Toggle menu"
          onclick="toggle('h5')">
          <span></span><span></span><span></span>
        </button>
        <p class="hint">Large</p>
      </div>

    </div>
  </div>

  <!-- NAVBAR DEMO -->
  <div>
    <div class="navbar-demo">
      <span class="navbar-brand">⚡ EaseMotion</span>
      <button class="ease-hamburger purple" id="navBtn"
        aria-label="Toggle menu"
        onclick="toggleNav()">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="nav-menu" id="navMenu">
      <a href="#">Home</a>
      <a href="#">Animations</a>
      <a href="#">Components</a>
      <a href="#">Contributing</a>
    </nav>
  </div>

  <script>
    function toggle(id) {
      document.getElementById(id)
        .classList.toggle('ease-hamburger-open');
    }

    function toggleNav() {
      document.getElementById('navBtn')
        .classList.toggle('ease-hamburger-open');
      document.getElementById('navMenu')
        .classList.toggle('open');
    }
  </script>

</body>
</html>
