<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-poison-bubble – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Poison Bubble</h1>
    <p class="subtitle">A green bubbling overlay effect with erratic bubble timing.</p>
    <div class="poison-container" id="poisonContainer">
      <span class="content">☠️</span>
    </div>
    <p class="poison-status" id="poisonStatus">Inactive</p>
    <button id="toggleBtn">Activate Poison</button>
  </div>

  <script>
    const container = document.getElementById('poisonContainer');
    const status = document.getElementById('poisonStatus');
    const toggleBtn = document.getElementById('toggleBtn');
    let active = false;

    toggleBtn.addEventListener('click', () => {
      active = !active;
      container.classList.toggle('active', active);
      status.textContent = active ? 'Bubbling…' : 'Inactive';
      toggleBtn.textContent = active ? 'Deactivate' : 'Activate Poison';
    });
  </script>
</body>
</html>
