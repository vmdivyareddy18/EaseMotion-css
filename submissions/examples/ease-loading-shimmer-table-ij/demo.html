<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Shimmer Table — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lst-wrapper">
    <h1>Loading Shimmer Table</h1>
    <div class="lst-table" id="lstTable">
      <div class="lst-header">
        <span style="width:40%">Name</span>
        <span style="width:25%">Role</span>
        <span style="width:20%">Department</span>
        <span style="width:15%">Status</span>
      </div>
      <div class="lst-skeleton" id="lstSkeleton">
        <div class="lst-shimmer-row">
          <span class="lst-shimmer-cell" style="width:40%"></span>
          <span class="lst-shimmer-cell" style="width:25%"></span>
          <span class="lst-shimmer-cell" style="width:20%"></span>
          <span class="lst-shimmer-cell" style="width:15%"></span>
        </div>
        <div class="lst-shimmer-row">
          <span class="lst-shimmer-cell" style="width:35%"></span>
          <span class="lst-shimmer-cell" style="width:30%"></span>
          <span class="lst-shimmer-cell" style="width:20%"></span>
          <span class="lst-shimmer-cell" style="width:15%"></span>
        </div>
        <div class="lst-shimmer-row">
          <span class="lst-shimmer-cell" style="width:45%"></span>
          <span class="lst-shimmer-cell" style="width:20%"></span>
          <span class="lst-shimmer-cell" style="width:20%"></span>
          <span class="lst-shimmer-cell" style="width:15%"></span>
        </div>
        <div class="lst-shimmer-row">
          <span class="lst-shimmer-cell" style="width:38%"></span>
          <span class="lst-shimmer-cell" style="width:22%"></span>
          <span class="lst-shimmer-cell" style="width:25%"></span>
          <span class="lst-shimmer-cell" style="width:15%"></span>
        </div>
        <div class="lst-shimmer-row">
          <span class="lst-shimmer-cell" style="width:42%"></span>
          <span class="lst-shimmer-cell" style="width:28%"></span>
          <span class="lst-shimmer-cell" style="width:18%"></span>
          <span class="lst-shimmer-cell" style="width:12%"></span>
        </div>
      </div>
      <div class="lst-data" id="lstData">
        <div class="lst-data-row">
          <span style="width:40%">Alice Chen</span>
          <span style="width:25%">Designer</span>
          <span style="width:20%">Creative</span>
          <span style="width:15%">Active</span>
        </div>
        <div class="lst-data-row">
          <span style="width:35%">Bob Martinez</span>
          <span style="width:30%">Developer</span>
          <span style="width:20%">Engineering</span>
          <span style="width:15%">Away</span>
        </div>
        <div class="lst-data-row">
          <span style="width:45%">Carol Smith</span>
          <span style="width:20%">Manager</span>
          <span style="width:20%">Operations</span>
          <span style="width:15%">Active</span>
        </div>
        <div class="lst-data-row">
          <span style="width:38%">David Kim</span>
          <span style="width:22%">Analyst</span>
          <span style="width:25%">Finance</span>
          <span style="width:15%">Busy</span>
        </div>
        <div class="lst-data-row">
          <span style="width:42%">Eva Johansson</span>
          <span style="width:28%">Engineer</span>
          <span style="width:18%">Infra</span>
          <span style="width:12%">Active</span>
        </div>
      </div>
    </div>
    <button class="lst-toggle" id="lstToggle">Show Real Data</button>
  </div>
  <script>
    const toggleBtn = document.getElementById('lstToggle');
    const skeleton = document.getElementById('lstSkeleton');
    const data = document.getElementById('lstData');
    let showingData = false;

    toggleBtn.addEventListener('click', () => {
      showingData = !showingData;
      if (showingData) {
        skeleton.classList.add('lst-hidden');
        data.classList.remove('lst-hidden');
        data.classList.add('lst-visible');
        toggleBtn.textContent = 'Show Skeleton';
      } else {
        skeleton.classList.remove('lst-hidden');
        data.classList.add('lst-hidden');
        data.classList.remove('lst-visible');
        toggleBtn.textContent = 'Show Real Data';
      }
    });
  </script>
</body>
</html>
