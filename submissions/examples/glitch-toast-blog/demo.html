<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Glitch Toast Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="toast-wrapper">
    <label for="glitch-trigger" class="toast-btn">Trigger Glitch Toast</label>
    
    <input type="checkbox" id="glitch-trigger" class="hidden">
    
    <div class="glitch-toast">
        <span class="glitch-text" data-text="SYSTEM GLITCH">SYSTEM GLITCH</span>
    </div>
</div>

</body>
</html>
