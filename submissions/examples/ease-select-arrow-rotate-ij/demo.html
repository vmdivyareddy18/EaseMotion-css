<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Select Arrow Rotate - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-wrapper">
        <h2>Custom Select Dropdown with Rotating Arrow</h2>
        <p>Click or focus the dropdown to see the smooth CSS arrow rotation.</p>

        <div class="custom-select-container">
            <select id="framework-select">
                <option value="" disabled selected>Choose a framework...</option>
                <option value="react">React</option>
                <option value="vue">Vue.js</option>
                <option value="angular">Angular</option>
                <option value="svelte">Svelte</option>
            </select>
            <div class="select-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </div>
        </div>
    </div>

</body>
</html>
