<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search with Debounce Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Search with Debounce</h1>
        <p class="subtitle">Loading spinner while typing</p>

        <!-- SEARCH WITH DEBOUNCE COMPONENT -->
        <div class="search-container">
            <div class="search-wrapper">
                <div class="search-box">
                    <div class="search-input-wrapper">
                        <span class="search-icon">🔍</span>
                        <input 
                            type="text" 
                            class="search-input" 
                            id="searchInput" 
                            placeholder="Search for anything..."
                            autocomplete="off"
                        />
                        <button class="search-clear" id="clearBtn" aria-label="Clear search">✕</button>
                        <div class="search-spinner" id="searchSpinner">
                            <div class="spinner-ring"></div>
                            <div class="spinner-ring"></div>
                            <div class="spinner-ring"></div>
                        </div>
                    </div>
                    <div class="search-stats">
                        <span class="stats-label">Results:</span>
                        <span class="stats-value" id="resultCount">0</span>
                        <span class="stats-label">Time:</span>
                        <span class="stats-value" id="searchTime">0ms</span>
                        <span class="stats-label">Debounce:</span>
                        <span class="stats-value" id="debounceStatus">Waiting...</span>
                    </div>
                </div>

                <!-- Results -->
                <div class="search-results" id="searchResults">
                    <div class="results-placeholder">
                        <span class="placeholder-icon">🔍</span>
                        <span class="placeholder-text">Type to start searching</span>
                        <span class="placeholder-sub">Results will appear here</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="search-controls">
                    <button class="search-btn" id="debounceSlow">🐢 Slow (500ms)</button>
                    <button class="search-btn" id="debounceNormal">🐇 Normal (300ms)</button>
                    <button class="search-btn" id="debounceFast">🚀 Fast (100ms)</button>
                    <button class="search-btn" id="toggleSpinnerBtn">⏸ Toggle Spinner</button>
                </div>

                <div class="search-status">
                    <span class="status-label">Status:</span>
                    <span class="status-value" id="statusDisplay">Ready</span>
                    <span class="status-label">Debounce:</span>
                    <span class="status-value" id="debounceDisplay">300ms</span>
                    <span class="status-label">API Calls:</span>
                    <span class="status-value" id="apiCalls">0</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-search">
                        <div class="search-input-wrapper variant-small">
                            <span class="search-icon">🔍</span>
                            <input type="text" placeholder="Small" />
                            <div class="search-spinner">
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                            </div>
                        </div>
                    </div>
                    <span class="variant-label">Small</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-search">
                        <div class="search-input-wrapper variant-large">
                            <span class="search-icon">🔍</span>
                            <input type="text" placeholder="Large" />
                            <div class="search-spinner">
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                            </div>
                        </div>
                    </div>
                    <span class="variant-label">Large</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-search">
                        <div class="search-input-wrapper variant-rounded">
                            <span class="search-icon">🔍</span>
                            <input type="text" placeholder="Rounded" />
                            <div class="search-spinner">
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                            </div>
                        </div>
                    </div>
                    <span class="variant-label">Rounded</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-search">
                        <div class="search-input-wrapper variant-dark">
                            <span class="search-icon">🔍</span>
                            <input type="text" placeholder="Dark" />
                            <div class="search-spinner">
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                                <div class="spinner-ring"></div>
                            </div>
                        </div>
                    </div>
                    <span class="variant-label">Dark</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const resultCount = document.getElementById('resultCount');
            const searchTime = document.getElementById('searchTime');
            const debounceStatus = document.getElementById('debounceStatus');
            const statusDisplay = document.getElementById('statusDisplay');
            const debounceDisplay = document.getElementById('debounceDisplay');
            const apiCalls = document.getElementById('apiCalls');
            const searchSpinner = document.getElementById('searchSpinner');
            const clearBtn = document.getElementById('clearBtn');
            const debounceSlow = document.getElementById('debounceSlow');
            const debounceNormal = document.getElementById('debounceNormal');
            const debounceFast = document.getElementById('debounceFast');
            const toggleSpinnerBtn = document.getElementById('toggleSpinnerBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                debounceDelay: 300, // ms
                minChars: 1,
                maxResults: 50,
                showSpinner: true,
                onSearch: function(query, results, time) {
                    console.log(`🔍 Searched "${query}" - ${results.length} results in ${time}ms`);
                },
                onError: function(error) {
                    console.log(`❌ Search error: ${error}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let debounceTimer = null;
            let apiCallCount = 0;
            let lastQuery = '';
            let isSearching = false;
            let showSpinner = CONFIG.showSpinner;

            // ============================================
            // MOCK DATA
            // ============================================
            const mockData = [
                'Apple', 'Apricot', 'Avocado', 'Banana', 'Blackberry', 'Blueberry',
                'Cherry', 'Coconut', 'Cranberry', 'Date', 'Dragonfruit', 'Elderberry',
                'Fig', 'Grape', 'Grapefruit', 'Guava', 'Jackfruit', 'Kiwi',
                'Lemon', 'Lime', 'Lychee', 'Mango', 'Melon', 'Nectarine',
                'Orange', 'Papaya', 'Passionfruit', 'Peach', 'Pear', 'Pineapple',
                'Plum', 'Pomegranate', 'Raspberry', 'Strawberry', 'Tangerine', 'Watermelon',
                'JavaScript', 'Python', 'Ruby', 'Go', 'Rust', 'Swift',
                'React', 'Vue', 'Angular', 'Svelte', 'Node.js', 'Django',
                'Flask', 'Express', 'Spring', 'Laravel', 'Rails', 'Phoenix'
            ];

            // ============================================
            // SEARCH FUNCTION
            // ============================================
            function performSearch(query) {
                const startTime = performance.now();
                let results = [];

                if (query.trim().length >= CONFIG.minChars) {
                    const lowerQuery = query.toLowerCase();
                    results = mockData.filter(item => 
                        item.toLowerCase().includes(lowerQuery)
                    );
                    // Limit results
                    results = results.slice(0, CONFIG.maxResults);
                }

                const endTime = performance.now();
                const duration = Math.round(endTime - startTime);

                // Update stats
                resultCount.textContent = results.length;
                searchTime.textContent = duration + 'ms';
                apiCallCount++;
                apiCalls.textContent = apiCallCount;
                statusDisplay.textContent = 'Ready';
                debounceStatus.textContent = '✓ Done';

                // Render results
                renderResults(results, query);

                // Trigger callback
                CONFIG.onSearch(query, results, duration);

                return results;
            }

            // ============================================
            // DEBOUNCED SEARCH
            // ============================================
            function debouncedSearch(query) {
                // Clear existing timer
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                    debounceTimer = null;
                }

                // Update status
                statusDisplay.textContent = 'Typing...';
                debounceStatus.textContent = '⏳ Waiting...';

                // Show spinner
                if (showSpinner) {
                    searchSpinner.classList.add('active');
                }

                // Set new timer
                debounceTimer = setTimeout(() => {
                    isSearching = true;
                    debounceTimer = null;
                    
                    // Hide spinner
                    searchSpinner.classList.remove('active');
                    
                    // Perform search
                    performSearch(query);
                    
                    isSearching = false;
                    lastQuery = query;
                }, CONFIG.debounceDelay);
            }

            // ============================================
            // RENDER RESULTS
            // ============================================
            function renderResults(results, query) {
                searchResults.innerHTML = '';

                if (results.length === 0 && query.trim().length >= CONFIG.minChars) {
                    // No results
                    const empty = document.createElement('div');
                    empty.className = 'results-empty';
                    empty.innerHTML = `
                        <span class="empty-icon">😕</span>
                        <span class="empty-text">No results found for "${query}"</span>
                        <span class="empty-sub">Try different keywords</span>
                    `;
                    searchResults.appendChild(empty);
                    return;
                }

                if (query.trim().length < CONFIG.minChars && query.trim().length > 0) {
                    // Too few characters
                    const hint = document.createElement('div');
                    hint.className = 'results-hint';
                    hint.innerHTML = `
                        <span class="hint-icon">💡</span>
                        <span class="hint-text">Type at least ${CONFIG.minChars} character${CONFIG.minChars > 1 ? 's' : ''}</span>
                    `;
                    searchResults.appendChild(hint);
                    return;
                }

                if (query.trim().length === 0) {
                    // Empty state
                    const placeholder = document.createElement('div');
                    placeholder.className = 'results-placeholder';
                    placeholder.innerHTML = `
                        <span class="placeholder-icon">🔍</span>
                        <span class="placeholder-text">Type to start searching</span>
                        <span class="placeholder-sub">Results will appear here</span>
                    `;
                    searchResults.appendChild(placeholder);
                    return;
                }

                // Render results with highlight
                results.forEach(item => {
                    const resultEl = document.createElement('div');
                    resultEl.className = 'result-item';
                    
                    // Highlight matching part
                    const lowerItem = item.toLowerCase();
                    const lowerQuery = query.toLowerCase();
                    const index = lowerItem.indexOf(lowerQuery);
                    
                    let displayText = item;
                    if (index !== -1) {
                        const before = item.substring(0, index);
                        const match = item.substring(index, index + query.length);
                        const after = item.substring(index + query.length);
                        displayText = `${before}<mark>${match}</mark>${after}`;
                    }
                    
                    resultEl.innerHTML = `
                        <span class="result-icon">📄</span>
                        <span class="result-text">${displayText}</span>
                        <span class="result-badge">#${mockData.indexOf(item) + 1}</span>
                    `;
                    
                    resultEl.addEventListener('click', function() {
                        alert(`Selected: ${item}`);
                    });
                    
                    searchResults.appendChild(resultEl);
                });
            }

            // ============================================
            // EVENT HANDLERS
            // ============================================
            searchInput.addEventListener('input', function() {
                const query = this.value;
                
                // Show/hide clear button
                clearBtn.style.display = query.length > 0 ? 'flex' : 'none';
                
                if (query.trim().length === 0) {
                    // Clear results
                    if (debounceTimer) {
                        clearTimeout(debounceTimer);
                        debounceTimer = null;
                    }
                    searchSpinner.classList.remove('active');
                    resultCount.textContent = '0';
                    searchTime.textContent = '0ms';
                    debounceStatus.textContent = 'Waiting...';
                    statusDisplay.textContent = 'Ready';
                    renderResults([], '');
                    return;
                }
                
                debouncedSearch(query);
            });

            // Clear button
            clearBtn.addEventListener('click', function() {
                searchInput.value = '';
                searchInput.focus();
                clearBtn.style.display = 'none';
                if (debounceTimer) {
                    clearTimeout(debounceTimer);
                    debounceTimer = null;
                }
                searchSpinner.classList.remove('active');
                resultCount.textContent = '0';
                searchTime.textContent = '0ms';
                debounceStatus.textContent = 'Waiting...';
                statusDisplay.textContent = 'Ready';
                renderResults([], '');
            });

            // ============================================
            // CONTROLS
            // ============================================
            function setDebounceDelay(delay, label) {
                CONFIG.debounceDelay = delay;
                debounceDisplay.textContent = delay + 'ms';
                
                // Update button styles
                document.querySelectorAll('#debounceSlow, #debounceNormal, #debounceFast').forEach(btn => {
                    btn.style.opacity = '0.6';
                });
                const btns = {
                    500: debounceSlow,
                    300: debounceNormal,
                    100: debounceFast
                };
                if (btns[delay]) {
                    btns[delay].style.opacity = '1';
                }
            }

            function toggleSpinner() {
                showSpinner = !showSpinner;
                toggleSpinnerBtn.textContent = showSpinner ? '⏸ Toggle Spinner' : '▶ Toggle Spinner';
                if (!showSpinner) {
                    searchSpinner.classList.remove('active');
                }
            }

            debounceSlow.addEventListener('click', () => setDebounceDelay(500, 'Slow'));
            debounceNormal.addEventListener('click', () => setDebounceDelay(300, 'Normal'));
            debounceFast.addEventListener('click', () => setDebounceDelay(100, 'Fast'));
            toggleSpinnerBtn.addEventListener('click', toggleSpinner);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                // Ctrl+/ to focus search
                if (e.key === '/' && e.ctrlKey) {
                    e.preventDefault();
                    searchInput.focus();
                    searchInput.select();
                }
                // Escape to clear
                if (e.key === 'Escape') {
                    clearBtn.click();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const input = card.querySelector('input');
                const spinner = card.querySelector('.search-spinner');
                
                let timer = null;
                input.addEventListener('input', function() {
                    if (timer) clearTimeout(timer);
                    spinner.classList.add('active');
                    timer = setTimeout(() => {
                        spinner.classList.remove('active');
                        timer = null;
                    }, 600);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.SearchDebounce = {
                search: (query) => {
                    searchInput.value = query;
                    searchInput.dispatchEvent(new Event('input'));
                },
                clear: () => clearBtn.click(),
                setDebounce: setDebounceDelay,
                toggleSpinner: toggleSpinner,
                getState: () => ({
                    query: searchInput.value,
                    debounceDelay: CONFIG.debounceDelay,
                    showSpinner: showSpinner,
                    apiCalls: apiCallCount,
                    isSearching: isSearching
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.debounceDelay) {
                        setDebounceDelay(config.debounceDelay);
                    }
                    if (config.showSpinner !== undefined) {
                        showSpinner = config.showSpinner;
                        if (!showSpinner) {
                            searchSpinner.classList.remove('active');
                        }
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Set initial debounce display
            debounceDisplay.textContent = CONFIG.debounceDelay + 'ms';
            // Set initial button state
            debounceNormal.style.opacity = '1';
            // Initial render
            renderResults([], '');
            // Hide clear button initially
            clearBtn.style.display = 'none';

            console.log('✅ Search with Debounce initialized!');
            console.log('📖 API: window.SearchDebounce');
            console.log('📖 Usage:');
            console.log('  - Type to search with debounce');
            console.log('  - Keyboard shortcuts: Ctrl+/ (focus), Escape (clear)');
            console.log('  - Adjust debounce delay with controls');

        })();
    </script>
</body>
</html>
