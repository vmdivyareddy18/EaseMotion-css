<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Bar Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      padding: 2rem;
      box-sizing: border-box;
    }
    .container {
      width: 100%;
      max-width: 540px;
      background: #ffffff;
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 0.25rem;
      font-size: 1.5rem;
    }
    p {
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 1.5rem 0;
    }
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Animated Progress Bars</h1>
    <p>Bars fill from 0% to their target on page load. Pure CSS — no JavaScript.</p>

    <!-- Solid colour variants -->
    <p class="section-title">Colour Variants</p>
    <div class="progress-group">

      <div>
        <div class="progress-label">
          <span>Profile Completion</span><span>25%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill danger" style="--progress-value: 25%;"></div>
        </div>
      </div>

      <div>
        <div class="progress-label">
          <span>Storage Used</span><span>50%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill warning" style="--progress-value: 50%;"></div>
        </div>
      </div>

      <div>
        <div class="progress-label">
          <span>Course Progress</span><span>75%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill primary" style="--progress-value: 75%;"></div>
        </div>
      </div>

      <div>
        <div class="progress-label">
          <span>Upload Complete</span><span>100%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill success" style="--progress-value: 100%;"></div>
        </div>
      </div>

    </div>

    <hr>

    <!-- Striped variant -->
    <p class="section-title">Striped &amp; Animated Variant</p>
    <div class="progress-group">

      <div>
        <div class="progress-label">
          <span>Uploading…</span><span>60%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="60" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill primary striped" style="--progress-value: 60%;"></div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
