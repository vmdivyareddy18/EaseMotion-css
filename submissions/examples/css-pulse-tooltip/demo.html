<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pulse-Active Tooltip Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="analytics-container">
    <div class="card">
      <div class="card-header">
        <h2 class="card-title">Active Platform Sessions</h2>
        
        <div class="tooltip-wrapper">
          <button class="tooltip-trigger" 
                  aria-describedby="tooltip-info" 
                  aria-label="More platform metrics info">
          </button>
          <div id="tooltip-info" class="tooltip-content" role="tooltip">
            Live updates refreshes every 5s
          </div>
        </div>
        </div>
      
      <div class="card-value-wrapper">
        <h3 class="card-value">14,282</h3>
      </div>
    </div>
  </main>

</body>
</html>
