<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Image Slider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Image Slider</h1>

  <div class="slider" role="region" aria-label="Image slider" tabindex="0">
    <div class="slider-track" id="sliderTrack">
      <div class="slider-slide"><img src="https://picsum.photos/id/42/800/450" alt="City street"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/45/800/450" alt="Bridge"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/50/800/450" alt="Flowers"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/60/800/450" alt="Vintage car"></div>
      <div class="slider-slide"><img src="https://picsum.photos/id/70/800/450" alt="Forest path"></div>
    </div>

    <button class="slider-btn slider-btn--prev" aria-label="Previous slide">&#10094;</button>
    <button class="slider-btn slider-btn--next" aria-label="Next slide">&#10095;</button>

    <div class="slider-dots" role="tablist" aria-label="Slide indicators">
      <button class="slider-dot active" role="tab" aria-selected="true" data-index="0"></button>
      <button class="slider-dot" role="tab" aria-selected="false" data-index="1"></button>
      <button class="slider-dot" role="tab" aria-selected="false" data-index="2"></button>
      <button class="slider-dot" role="tab" aria-selected="false" data-index="3"></button>
      <button class="slider-dot" role="tab" aria-selected="false" data-index="4"></button>
    </div>
  </div>

  <script>
    const track = document.getElementById('sliderTrack');
    const slides = document.querySelectorAll('.slider-slide');
    const dots = document.querySelectorAll('.slider-dot');
    const prev = document.querySelector('.slider-btn--prev');
    const next = document.querySelector('.slider-btn--next');
    const slider = document.querySelector('.slider');
    let current = 0;
    let autoInterval;

    function goTo(index) {
      if (index < 0) index = slides.length - 1;
      if (index >= slides.length) index = 0;
      current = index;
      track.style.transform = `translateX(-${current * 100}%)`;
      dots.forEach(d => { d.classList.remove('active'); d.setAttribute('aria-selected', 'false'); });
      dots[current].classList.add('active');
      dots[current].setAttribute('aria-selected', 'true');
    }

    function startAuto() { stopAuto(); autoInterval = setInterval(() => goTo(current + 1), 3500); }
    function stopAuto() { clearInterval(autoInterval); }

    prev.addEventListener('click', () => { goTo(current - 1); stopAuto(); });
    next.addEventListener('click', () => { goTo(current + 1); stopAuto(); });
    dots.forEach(d => d.addEventListener('click', () => { goTo(Number(d.dataset.index)); stopAuto(); }));
    slider.addEventListener('mouseenter', stopAuto);
    slider.addEventListener('mouseleave', startAuto);

    startAuto();
  </script>
</body>
</html>
