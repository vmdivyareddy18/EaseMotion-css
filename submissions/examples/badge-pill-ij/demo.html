<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS badge-pill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Pill Badges</h1>
    <div class="badge-grid">
      <span class="pill pill-primary">Primary</span>
      <span class="pill pill-success">Success</span>
      <span class="pill pill-warning">Warning</span>
      <span class="pill pill-danger">Danger</span>
      <span class="pill pill-info">Info</span>
      <span class="pill pill-dark">Dark</span>
    </div>
  </div>
</body>
</html>
