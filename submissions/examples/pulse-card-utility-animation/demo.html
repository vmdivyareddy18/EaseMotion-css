<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pulse Card Demo </title>
  <link rel="stylesheet" href="../pulse-card.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .card {
      width: 250px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card em-pulse-card">
    <h3>Pulse Card</h3>
    <p>Hover or click to see animation</p>
  </div>

</body>
</html>
