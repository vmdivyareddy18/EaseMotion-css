<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Autonomous Intelligence Fabric</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="fabric-dashboard">
    <header class="header">
      <span class="badge">Ecosystem Fabric</span>
      <h1>Global Autonomous Intelligence Fabric</h1>
      <p class="subtitle">Distributed synchronization grids, federated query registries, and risk tracking paths.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-fabric">
        <h3>🌍 Distributed Sync Nodes</h3>
        <div class="nodes-list">
          <div class="node-row">
            <span>Region US-East</span>
            <span class="sync-rate">Synced (99.8%)</span>
          </div>
          <div class="node-row">
            <span>Region EU-West</span>
            <span class="sync-rate">Synced (100%)</span>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Sync Telemetry</h3>
          <div class="chart-box">
            <svg viewBox="0 0 200 65" style="width:100%; height:auto;">
              <path d="M 0 55 C 50 15, 120 45, 200 5" fill="none" stroke="var(--primary)" stroke-width="2.5"></path>
            </svg>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
