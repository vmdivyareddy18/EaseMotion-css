<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roseate Spoonbill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="sunS"></span>
    <span class="reedS rdA"></span>
    <span class="reedS rdB"></span>
    <span class="reedS rdC"></span>
    <span class="waterS"></span>
    <div class="birdS">
      <span class="tailS"></span>
      <span class="bodyS"></span>
      <span class="shoulderS"></span>
      <span class="wingS"></span>
      <span class="legS lsB"></span>
      <span class="legS lsF"></span>
      <div class="neckS">
        <span class="neckCol"></span>
        <span class="headS"></span>
        <span class="eyeS"></span>
        <div class="billS">
          <span class="shaftS"></span>
          <span class="spoonS"></span>
        </div>
      </div>
    </div>
    <span class="siltS"></span>
    <span class="glazeS"></span>
    <span class="rippleS rpA"></span>
    <span class="rippleS rpB"></span>
  </div>
</body>
</html>
