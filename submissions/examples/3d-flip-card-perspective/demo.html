<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>3D Flip Card</h1>
  <p class="subtitle">A CSS flip card with 3D perspective transform — pure CSS no JavaScript.</p>
  <section><h2>Demo</h2><p class="sec-desc">Hover the card to flip it</p><div class="flip-card"><div class="flip-inner"><div class="flip-front"><span>Hover Me</span></div><div class="flip-back"><span>Flipped!</span></div></div></div></section>
  <section><h2>How It Works</h2><p>The card uses <code>perspective</code> on the parent and <code>rotateY(180deg)</code> on hover of the inner container, with <code>backface-visibility: hidden</code>.</p></section>
</body>
</html>
