<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Signature Pad — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #111422 0%, #06080e 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        padding: 40px 20px;
        color: #f8fafc;
        box-sizing: border-box;
      }
      .demo-header {
        text-align: center;
        margin-bottom: 48px;
      }
      .demo-header h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 12px 0;
        background: linear-gradient(135deg, #a78bfa 0%, #6c63ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .demo-header p {
        font-size: 15px;
        color: #64748b;
        margin: 0;
        max-width: 500px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Perspective Signature Pad</h1>
      <p>
        Hover or focus the signature pad to see it align flat for drawing in a
        3D perspective layout.
      </p>
    </div>

    <div class="perspective-container">
      <div class="signature-card" tabindex="0">
        <div class="signature-header">
          <h4 class="signature-title">Secure Authorization Pad</h4>
          <div class="status-indicator">
            <span class="status-dot"></span>
            <span>Active Mode</span>
          </div>
        </div>

        <div class="canvas-wrapper">
          <div class="canvas-line"></div>
          <canvas id="signature-canvas" class="signature-canvas"></canvas>
        </div>

        <div class="signature-actions">
          <button id="clear-btn" class="pad-btn btn-clear">Clear Pad</button>
          <button id="accept-btn" class="pad-btn btn-accept">
            Confirm Signature
          </button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const canvas = document.getElementById("signature-canvas");
        const ctx = canvas.getContext("2d");
        const clearBtn = document.getElementById("clear-btn");
        const acceptBtn = document.getElementById("accept-btn");
        let drawing = false;

        // Set canvas coordinate size to match display size
        function resizeCanvas() {
          canvas.width = canvas.offsetWidth;
          canvas.height = canvas.offsetHeight;

          // Re-apply styles after resize/redraw
          ctx.strokeStyle = "#6c63ff"; // neon purple/indigo
          ctx.lineWidth = 3;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Get accurate coordinate offsets relative to canvas
        function getCoordinates(e) {
          const rect = canvas.getBoundingClientRect();
          const clientX = e.touches ? e.touches[0].clientX : e.clientX;
          const clientY = e.touches ? e.touches[0].clientY : e.clientY;
          return {
            x: clientX - rect.left,
            y: clientY - rect.top,
          };
        }

        // Drawing Event Handlers
        function startDrawing(e) {
          drawing = true;
          const coords = getCoordinates(e);
          ctx.beginPath();
          ctx.moveTo(coords.x, coords.y);
          e.preventDefault();
        }

        function draw(e) {
          if (!drawing) return;
          const coords = getCoordinates(e);
          ctx.lineTo(coords.x, coords.y);
          ctx.stroke();
          e.preventDefault();
        }

        function stopDrawing() {
          drawing = false;
          ctx.beginPath();
        }

        // Mouse Listeners
        canvas.addEventListener("mousedown", startDrawing);
        canvas.addEventListener("mousemove", draw);
        window.addEventListener("mouseup", stopDrawing);

        // Touch Listeners (Mobile / Tablet compatibility)
        canvas.addEventListener("touchstart", startDrawing, { passive: false });
        canvas.addEventListener("touchmove", draw, { passive: false });
        window.addEventListener("touchend", stopDrawing);

        // Actions
        clearBtn.addEventListener("click", (e) => {
          e.stopPropagation(); // prevent card tilt reset
          ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        acceptBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          alert("Signature saved successfully!");
        });
      });
    </script>
  </body>
</html>
