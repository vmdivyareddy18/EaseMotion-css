<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Radio - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Animated Radio</h1>
      <p>Custom radio buttons featuring a smooth inner scale animation and an interactive ripple.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>Select a Plan</h2>
        
        <div class="radio-group">
          
          <!-- Option 1 -->
          <label class="ease-radio">
            <input type="radio" name="plan" value="basic" class="ease-radio-input" checked />
            <span class="ease-radio-circle"></span>
            <span class="ease-radio-label">Basic Plan ($9/mo)</span>
          </label>

          <!-- Option 2 -->
          <label class="ease-radio">
            <input type="radio" name="plan" value="pro" class="ease-radio-input" />
            <span class="ease-radio-circle ease-radio-green"></span>
            <span class="ease-radio-label">Pro Plan ($19/mo)</span>
          </label>

          <!-- Option 3 -->
          <label class="ease-radio">
            <input type="radio" name="plan" value="enterprise" class="ease-radio-input" />
            <span class="ease-radio-circle ease-radio-purple"></span>
            <span class="ease-radio-label">Enterprise ($49/mo)</span>
          </label>

        </div>
        
      </section>
    </main>
  </div>
</body>
</html>
