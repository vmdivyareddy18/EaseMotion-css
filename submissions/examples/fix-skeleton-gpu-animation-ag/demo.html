<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton GPU Animation Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-skeleton – GPU-Composited Shimmer Fix</h2>
  <div class="card" aria-busy="true" aria-label="Loading content">
    <div class="card-header">
      <div class="ease-skeleton ease-skeleton--avatar"></div>
      <div style="flex:1">
        <div class="ease-skeleton ease-skeleton--title"></div>
        <div class="ease-skeleton ease-skeleton--text" style="max-width:80%"></div>
      </div>
    </div>
    <div class="card-body">
      <div class="ease-skeleton ease-skeleton--text"></div>
      <div class="ease-skeleton ease-skeleton--text" style="max-width:90%"></div>
      <div class="ease-skeleton ease-skeleton--text" style="max-width:70%"></div>
      <div class="ease-skeleton ease-skeleton--btn" style="margin-top:0.5rem"></div>
    </div>
  </div>
</body>
</html>
