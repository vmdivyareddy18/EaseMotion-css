<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Station Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Radio Stations</h1>
    <div class="station-grid">
      <div class="station-card active" data-station="0">
        <div class="station-icon">&#9835;</div>
        <div class="station-info">
          <div class="station-name">Jazz FM</div>
          <div class="station-freq">98.7 FM</div>
        </div>
        <div class="now-playing"></div>
      </div>
      <div class="station-card" data-station="1">
        <div class="station-icon">&#9835;</div>
        <div class="station-info">
          <div class="station-name">Rock Radio</div>
          <div class="station-freq">101.5 FM</div>
        </div>
        <div class="now-playing"></div>
      </div>
      <div class="station-card" data-station="2">
        <div class="station-icon">&#9835;</div>
        <div class="station-info">
          <div class="station-name">News 24</div>
          <div class="station-freq">90.1 FM</div>
        </div>
        <div class="now-playing"></div>
      </div>
      <div class="station-card" data-station="3">
        <div class="station-icon">&#9835;</div>
        <div class="station-info">
          <div class="station-name">Classic Hits</div>
          <div class="station-freq">104.3 FM</div>
        </div>
        <div class="now-playing"></div>
      </div>
    </div>
    <p class="description">Click a station to select it. The active card gets an animated border glow and a pulsing now-playing dot.</p>
  </div>

  <script>
    document.querySelectorAll('.station-card').forEach(card => {
      card.addEventListener('click', () => {
        document.querySelectorAll('.station-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
      });
    });
  </script>
</body>
</html>
