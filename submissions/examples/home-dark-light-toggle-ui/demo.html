<!DOCTYPE html>
<html>
<head>
  <title>Home Dark Light Toggle UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button onclick="toggleMode()">Toggle Mode</button>

<h1>Homepage Theme Switch</h1>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
