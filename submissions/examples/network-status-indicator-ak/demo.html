<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Network Status Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Network Status</h1>
    <div class="status-card" id="statusCard">
      <div class="status-icon" id="statusIcon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M1 9l4 4 4-4 4 4 4-4 4 4"/><path d="M1 13l4 4 4-4 4 4 4-4 4 4"/><path d="M1 17l4 4 4-4 4 4 4-4 4 4"/></svg>
      </div>
      <div class="status-text" id="statusText">Online</div>
      <div class="status-detail" id="statusDetail">Your device is connected to the internet.</div>
      <div class="status-meta">
        <div class="meta-row">
          <span class="meta-label">Connection Type</span>
          <span class="meta-value" id="connectionType">wifi</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Effective Type</span>
          <span class="meta-value" id="effectiveType">4g</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Downlink</span>
          <span class="meta-value" id="downlink">10 Mbps</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">RTT</span>
          <span class="meta-value" id="rtt">50 ms</span>
        </div>
      </div>
      <div class="last-checked">Last checked: <span id="lastChecked">just now</span></div>
    </div>
    <button class="check-btn" id="checkBtn">Check Connection</button>
    <p class="hint">Go offline (airplane mode) to see the indicator change.</p>
  </div>
  <script>
    const statusIcon = document.getElementById('statusIcon');
    const statusText = document.getElementById('statusText');
    const statusDetail = document.getElementById('statusDetail');
    const statusCard = document.getElementById('statusCard');
    const connectionType = document.getElementById('connectionType');
    const effectiveType = document.getElementById('effectiveType');
    const downlink = document.getElementById('downlink');
    const rtt = document.getElementById('rtt');
    const lastChecked = document.getElementById('lastChecked');
    const checkBtn = document.getElementById('checkBtn');

    function updateStatus() {
      const online = navigator.onLine;
      if (online) {
        statusCard.className = 'status-card online';
        statusIcon.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><path d="M1 9l4 4 4-4 4 4 4-4 4 4"/><path d="M1 13l4 4 4-4 4 4 4-4 4 4"/><path d="M1 17l4 4 4-4 4 4 4-4 4 4"/></svg>';
        statusText.textContent = 'Online';
        statusDetail.textContent = 'Your device is connected to the internet.';
      } else {
        statusCard.className = 'status-card offline';
        statusIcon.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2"><path d="M1 9l4 4 4-4 4 4 4-4 4 4"/><path d="M1 13l4 4 4-4 4 4 4-4 4 4"/><path d="M1 17l4 4 4-4 4 4 4-4 4 4"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
        statusText.textContent = 'Offline';
        statusDetail.textContent = 'Your device is not connected to the internet.';
      }

      if ('connection' in navigator && navigator.connection) {
        const conn = navigator.connection;
        connectionType.textContent = conn.type || 'unknown';
        effectiveType.textContent = conn.effectiveType || 'unknown';
        downlink.textContent = conn.downlink ? conn.downlink + ' Mbps' : 'unknown';
        rtt.textContent = conn.rtt ? conn.rtt + ' ms' : 'unknown';
      } else {
        connectionType.textContent = 'not supported';
        effectiveType.textContent = 'not supported';
        downlink.textContent = 'not supported';
        rtt.textContent = 'not supported';
      }

      lastChecked.textContent = new Date().toLocaleTimeString();
    }

    window.addEventListener('online', updateStatus);
    window.addEventListener('offline', updateStatus);

    if ('connection' in navigator && navigator.connection) {
      navigator.connection.addEventListener('change', updateStatus);
    }

    checkBtn.addEventListener('click', updateStatus);
    updateStatus();
  </script>
</body>
</html>
