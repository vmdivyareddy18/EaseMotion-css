<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Cursor Pull</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container"><h1>Magnetic Cursor Pull</h1><p>Move your cursor near elements to feel the magnetic pull.</p>
<div class="cards">
  <div class="card" data-magnetic><h3>CTA Button</h3><p>Hover near me.</p><button class="magnetic-btn" data-magnetic>Get Started</button></div>
  <div class="card" data-magnetic><h3>Feature Card</h3><p>CSS variables for magnetic strength.</p><div class="icon" data-magnetic>&#11088;</div></div>
  <div class="card" data-magnetic><h3>Product Item</h3><p>JavaScript distance calculation.</p><span class="badge" data-magnetic>NEW</span></div>
</div>
</div>
<script>
const magnets = document.querySelectorAll('[data-magnetic]');
document.addEventListener('mousemove', (e) => {
  magnets.forEach((el) => {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2; const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx; const dy = e.clientY - cy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const maxDist = 120;
    if (dist < maxDist) { const pull = (1 - dist / maxDist) * 0.4; el.style.setProperty('--tx', dx * pull + 'px'); el.style.setProperty('--ty', dy * pull + 'px'); }
    else { el.style.setProperty('--tx', '0px'); el.style.setProperty('--ty', '0px'); }
  });
});
</script>
</body></html>
