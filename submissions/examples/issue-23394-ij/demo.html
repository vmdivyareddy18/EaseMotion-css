<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trumpet Blast Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="trumpet">
    <div class="mouthpiece"></div>
    <div class="tube">
      <div class="valve" style="--i:0"></div>
      <div class="valve" style="--i:1"></div>
      <div class="valve" style="--i:2"></div>
    </div>
    <div class="bell"></div>
    <div class="wave-ring" style="--i:0"></div>
    <div class="wave-ring" style="--i:1"></div>
    <div class="wave-ring" style="--i:2"></div>
  </div>
</body>
</html>
