<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carousel Gallery Thumbs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gallery with Thumbnail Navigation</h1>

  <div class="gallery" role="region" aria-label="Image gallery">
    <div class="gallery-main">
      <button class="gallery-btn gallery-btn--prev" aria-label="Previous image">&#10094;</button>
      <div class="gallery-viewport">
        <img id="mainImage" src="https://picsum.photos/id/10/800/500" alt="Gallery image">
      </div>
      <button class="gallery-btn gallery-btn--next" aria-label="Next image">&#10095;</button>
    </div>

    <div class="gallery-thumbs" role="tablist" aria-label="Thumbnail navigation">
      <button class="gallery-thumb active" role="tab" aria-selected="true" data-img="https://picsum.photos/id/10/800/500" data-alt="Mountain landscape">
        <img src="https://picsum.photos/id/10/120/80" alt="Mountain landscape">
      </button>
      <button class="gallery-thumb" role="tab" aria-selected="false" data-img="https://picsum.photos/id/11/800/500" data-alt="Car on road">
        <img src="https://picsum.photos/id/11/120/80" alt="Car on road">
      </button>
      <button class="gallery-thumb" role="tab" aria-selected="false" data-img="https://picsum.photos/id/20/800/500" data-alt="Bird on branch">
        <img src="https://picsum.photos/id/20/120/80" alt="Bird on branch">
      </button>
      <button class="gallery-thumb" role="tab" aria-selected="false" data-img="https://picsum.photos/id/25/800/500" data-alt="Coastal rocks">
        <img src="https://picsum.photos/id/25/120/80" alt="Coastal rocks">
      </button>
      <button class="gallery-thumb" role="tab" aria-selected="false" data-img="https://picsum.photos/id/30/800/500" data-alt="Cup of coffee">
        <img src="https://picsum.photos/id/30/120/80" alt="Cup of coffee">
      </button>
    </div>
  </div>

  <script>
    const mainImg = document.getElementById('mainImage');
    const thumbs = document.querySelectorAll('.gallery-thumb');
    const prevBtn = document.querySelector('.gallery-btn--prev');
    const nextBtn = document.querySelector('.gallery-btn--next');
    let currentIndex = 0;

    function transitionTo(index) {
      const thumb = thumbs[index];
      if (!thumb) return;
      thumbs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
      thumb.classList.add('active');
      thumb.setAttribute('aria-selected', 'true');
      mainImg.style.opacity = '0';
      setTimeout(() => {
        mainImg.src = thumb.dataset.img;
        mainImg.alt = thumb.dataset.alt;
        mainImg.style.opacity = '1';
      }, 200);
      currentIndex = index;
    }

    thumbs.forEach((thumb, i) => {
      thumb.addEventListener('click', () => transitionTo(i));
    });

    prevBtn.addEventListener('click', () => {
      const i = (currentIndex - 1 + thumbs.length) % thumbs.length;
      transitionTo(i);
    });

    nextBtn.addEventListener('click', () => {
      const i = (currentIndex + 1) % thumbs.length;
      transitionTo(i);
    });
  </script>
</body>
</html>
