<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Holographic Card Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #050608;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div class="holo-card-container">
    <div class="holo-card" id="card">
      <div class="holo-card-shine" id="shine"></div>
      <div class="holo-card-content">
        <span class="holo-card-tag">CORE MODULE</span>
        <h2 class="holo-card-title">Quantum Shifter</h2>
        <p class="holo-card-description">Hover to reveal interactive 3D perspective shifting and dynamic holographic light diffraction.</p>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    const shine = document.getElementById('shine');

    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const px = (x / rect.width) * 100;
      const py = (y / rect.height) * 100;
      
      shine.style.transform = `translate(${px - 50}%, ${py - 50}%)`;
      
      const rx = -(py - 50) / 2.5;
      const ry = (px - 50) / 2.5;
      
      card.style.transform = `rotateY(${ry}deg) rotateX(${rx}deg) scale(1.02)`;
    });

    card.addEventListener('mouseleave', () => {
      card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
      shine.style.transform = 'translate(0, 0)';
    });
  </script>
</body>
</html>
