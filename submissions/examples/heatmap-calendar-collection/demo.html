<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Heatmap Calendar Grid — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-label">EaseMotion CSS — Heatmap Calendar Grid</p>
  <p class="demo-hint">Hover any cell to see the tooltip. Cells reveal left-to-right on mount.</p>

  <div class="heatmap-card" id="heatmapCard">
    <div class="heatmap-card-header">
      <span class="heatmap-card-title">Contributions — Last 12 Months</span>
      <span class="heatmap-card-stat" id="totalStat">— contributions this year</span>
    </div>

    <!-- Month labels -->
    <div class="heatmap-months" id="monthLabels"></div>

    <!-- Day labels + grid -->
    <div class="heatmap-layout">
      <div class="heatmap-day-labels">
        <div class="heatmap-day-label">Mon</div>
        <div class="heatmap-day-label">Tue</div>
        <div class="heatmap-day-label">Wed</div>
        <div class="heatmap-day-label">Thu</div>
        <div class="heatmap-day-label">Fri</div>
        <div class="heatmap-day-label">Sat</div>
        <div class="heatmap-day-label">Sun</div>
      </div>
      <div class="ease-heatmap-grid" id="heatmapGrid" role="grid" aria-label="Activity heatmap"></div>
    </div>

    <!-- Legend -->
    <div class="heatmap-legend">
      <span>Less</span>
      <span class="heatmap-legend-swatch" style="background:var(--ease-heatmap-level-0)"></span>
      <span class="heatmap-legend-swatch" style="background:var(--ease-heatmap-level-1)"></span>
      <span class="heatmap-legend-swatch" style="background:var(--ease-heatmap-level-2)"></span>
      <span class="heatmap-legend-swatch" style="background:var(--ease-heatmap-level-3)"></span>
      <span class="heatmap-legend-swatch" style="background:var(--ease-heatmap-level-4)"></span>
      <span>More</span>
    </div>
  </div>

  <script>
    /* ── Config ──────────────────────────────────────────── */
    const WEEKS  = 53;   // columns
    const DAYS   = 7;    // rows (Mon–Sun)
    const DELAY_PER_CELL = 6; // ms stagger

    /* ── Helpers ─────────────────────────────────────────── */
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function levelFromCount(n) {
      if (n === 0)  return 0;
      if (n <= 2)   return 1;
      if (n <= 5)   return 2;
      if (n <= 10)  return 3;
      return 4;
    }

    function fmtDate(d) {
      return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    /* ── Generate mock activity data ─────────────────────── */
    // Build 371 days ending today, fill with random counts
    const today = new Date();
    today.setHours(0,0,0,0);

    const totalDays = WEEKS * DAYS;  // 371 slots
    const startDate = new Date(today);
    startDate.setDate(today.getDate() - totalDays + 1);

    // Adjust start to the nearest Monday
    const dayOfWeek = (startDate.getDay() + 6) % 7; // 0=Mon
    startDate.setDate(startDate.getDate() - dayOfWeek);

    const activityData = []; // [{date, count}]
    const d = new Date(startDate);
    let totalCount = 0;

    for (let i = 0; i < totalDays; i++) {
      // Simulate realistic contribution pattern
      const dow = (d.getDay() + 6) % 7;
      const isWeekend = dow >= 5;
      const rand = Math.random();
      let count = 0;

      if (!isWeekend && rand > 0.25) {
        count = Math.floor(Math.random() * 15);
      } else if (isWeekend && rand > 0.7) {
        count = Math.floor(Math.random() * 5);
      }

      // Occasional spikes
      if (rand > 0.97) count = Math.floor(Math.random() * 20) + 10;
      if (d > today)   count = 0; // future days are empty

      activityData.push({ date: new Date(d), count });
      totalCount += count;
      d.setDate(d.getDate() + 1);
    }

    /* ── Render month labels ─────────────────────────────── */
    const monthLabels = document.getElementById('monthLabels');
    let lastMonth = -1;
    // Track which week each month first appears
    for (let w = 0; w < WEEKS; w++) {
      const cellIdx = w * 7;
      const cellDate = activityData[cellIdx]?.date;
      if (!cellDate) continue;
      const m = cellDate.getMonth();
      const label = document.createElement('div');
      label.className = 'heatmap-month-label';
      if (m !== lastMonth) {
        label.textContent = MONTHS[m];
        lastMonth = m;
      }
      monthLabels.appendChild(label);
    }

    /* ── Render grid ─────────────────────────────────────── */
    const grid = document.getElementById('heatmapGrid');
    activityData.forEach((item, idx) => {
      const level = levelFromCount(item.count);
      const cell  = document.createElement('div');
      const label = `${fmtDate(item.date)}: ${item.count} contribution${item.count !== 1 ? 's' : ''}`;

      cell.className = [
        'ease-heatmap-cell',
        'ease-heatmap-cell-fade-in',
        `ease-heatmap-level-${level}`,
        'ease-heatmap-tooltip-pop',
      ].join(' ');

      cell.setAttribute('data-tooltip', label);
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', label);

      // Stagger by column (week) for left-to-right reveal
      const week = Math.floor(idx / DAYS);
      cell.style.animationDelay = `${week * DELAY_PER_CELL}ms`;

      grid.appendChild(cell);
    });

    /* ── Update stat ─────────────────────────────────────── */
    document.getElementById('totalStat').innerHTML =
      `<strong>${totalCount.toLocaleString()}</strong> contributions this year`;
  </script>

</body>
</html>
