<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Count Up Stats Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
    }
    .stats-container {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      min-width: 150px;
    }
    .stat-value {
      font-size: 3rem;
      font-weight: 700;
      color: #a09af8;
      margin-bottom: 0.5rem;
    }
    .stat-label {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="stats-container">
    <div class="stat-card">
      <div class="stat-value count-up-ss count-up-plus-ss" style="--count-target-ss: 42;"></div>
      <div class="stat-label">Utilities</div>
    </div>
    <div class="stat-card">
      <div class="stat-value count-up-ss" style="--count-target-ss: 12;"></div>
      <div class="stat-label">Animations</div>
    </div>
    <div class="stat-card">
      <div class="stat-value count-up-ss count-up-percent-ss" style="--count-target-ss: 100;"></div>
      <div class="stat-label">CSS Only</div>
    </div>
  </div>
</body>
</html>
