<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Stock Market Bull Run</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Stock Market Bull Run</h1>

  <p class="intro">
    A reusable bullish market animation for trading platforms,
    investment dashboards, fintech applications, and analytics tools.
  </p>

  <div class="demo-grid">

    <div class="bull-card">
      <div class="bull-run">
        <span class="bull">🐂</span>
        <span class="trend-arrow">📈</span>
      </div>
      <h3>Bull Market</h3>
    </div>

    <div class="bull-card">
      <div class="bull-run large">
        <span class="bull">🐂</span>
        <span class="trend-arrow">📈</span>
      </div>
      <p>Portfolio Growth</p>
    </div>

    <div class="bull-card">
      <div class="bull-run">
        <span class="bull">🐂</span>
        <span class="trend-arrow">📈</span>
      </div>
      <button>View Market</button>
    </div>

  </div>

</main>

</body>
</html>
