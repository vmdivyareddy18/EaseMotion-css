<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Dialog Modal Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <button class="open-btn" id="openModalBtn">Create Account</button>

  <dialog id="authDialog">
    <h2 style="margin: 0; font-size: 1.5rem;">Join Community</h2>
    <p style="color: #9ca3af; font-size: 0.9rem; margin: 0.25rem 0 0 0;">Enter your credentials to configure your profile.</p>
    
    <form method="dialog" class="modal-form">
      <div class="input-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. aditya_yadav" required autocomplete="off">
      </div>
      
      <div class="action-row">
        <button type="button" class="cancel-btn" id="closeModalBtn">Cancel</button>
        <button type="submit" class="submit-btn">Continue</button>
      </div>
    </form>
  </dialog>

  <script>
    const dialog = document.getElementById('authDialog');
    const openBtn = document.getElementById('openModalBtn');
    const closeBtn = document.getElementById('closeModalBtn');

    // Open natively as modal to launch backdrop layer
    openBtn.addEventListener('click', () => dialog.showModal());
    
    // Clean close action triggering discrete transitions
    closeBtn.addEventListener('click', () => dialog.close());
  </script>
</body>
</html>
