<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropdown Select - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="dd-header"><h1>CSS Dropdown Select</h1><p>Custom styled dropdown selects with icon variants, multi-select chips, search hints, and animated options</p></header>
<section class="dd-section"><h2>Default Custom Select</h2><div class="dd-row"><div class="dd-wrap"><select class="dd-select"><option>Choose an option</option><option>Profile Settings</option><option>Account Security</option><option>Notification Prefs</option><option>Billing & Plans</option></select></div></div></section>
<section class="dd-section"><h2>Icon Prefix</h2><div class="dd-row"><div class="dd-wrap dd-icon-prefix"><select class="dd-select"><option>&#128100; Select User</option><option>&#128100; John Doe</option><option>&#128100; Jane Smith</option><option>&#128100; Bob Wilson</option></select></div><div class="dd-wrap dd-icon-prefix"><select class="dd-select"><option>&#9881; Settings</option><option>&#9881; General</option><option>&#9881; Security</option><option>&#9881; Privacy</option></select></div></div></section>
<section class="dd-section"><h2>Color Variants</h2><div class="dd-row"><div class="dd-wrap"><select class="dd-select dd-primary"><option>Primary Theme</option><option>Option 1</option><option>Option 2</option></select></div><div class="dd-wrap"><select class="dd-select dd-success"><option>Success Theme</option><option>Option 1</option><option>Option 2</option></select></div><div class="dd-wrap"><select class="dd-select dd-danger"><option>Danger Theme</option><option>Option 1</option><option>Option 2</option></select></div></div></section>
<section class="dd-section"><h2>Size Variants</h2><div class="dd-row"><div class="dd-wrap"><select class="dd-select dd-sm"><option>Small</option><option>Item 1</option><option>Item 2</option></select></div><div class="dd-wrap"><select class="dd-select"><option>Default</option><option>Item 1</option><option>Item 2</option></select></div><div class="dd-wrap"><select class="dd-select dd-lg"><option>Large</option><option>Item 1</option><option>Item 2</option></select></div></div></section>
<section class="dd-section"><h2>With Description</h2><div class="dd-row"><div class="dd-wrap dd-desc"><select class="dd-select"><option>Select your plan</option><option>Starter - $9/mo</option><option>Pro - $29/mo</option><option>Enterprise - $99/mo</option></select></div></div></section>
<section class="dd-section"><h2>Disabled State</h2><div class="dd-row"><div class="dd-wrap"><select class="dd-select" disabled><option>Disabled select</option><option>Cannot choose</option></select></div></div></section>
<footer class="ftr"><p>EaseMotion CSS - Dropdown Select | GSSoC 2026</p></footer>
</body>
</html>
