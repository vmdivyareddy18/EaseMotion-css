<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-progress — EaseMotion CSS</title>
  <link rel="stylesheet" href="progress.css" />
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; display: grid; gap: 28px; padding: 0 20px; }
    label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .05em; color: #64748b; display: block; margin-bottom: 6px; }
  </style>
</head>
<body>

  <!-- Default -->
  <div>
    <label>Default</label>
    <div class="ease-progress" style="--ease-progress-value: 65%;">
      <div class="ease-progress__bar"></div>
    </div>
  </div>

  <!-- Gradient -->
  <div>
    <label>Gradient</label>
    <div class="ease-progress ease-progress--gradient" style="--ease-progress-value: 80%;">
      <div class="ease-progress__bar"></div>
    </div>
  </div>

  <!-- Striped -->
  <div>
    <label>Striped</label>
    <div class="ease-progress ease-progress--striped" style="--ease-progress-value: 50%;">
      <div class="ease-progress__bar"></div>
    </div>
  </div>

  <!-- Labeled -->
  <div>
    <label>With Percentage Label</label>
    <div class="ease-progress ease-progress--labeled" style="--ease-progress-value: 75%;">
      <div class="ease-progress__track">
        <div class="ease-progress__bar"></div>
      </div>
      <span class="ease-progress__label">75%</span>
    </div>
  </div>

  <script>
    // Trigger animation after paint
    requestAnimationFrame(() => {
      document.querySelectorAll('.ease-progress').forEach(el => {
        el.classList.add('is-loaded');
      });
    });
  </script>
</body>
</html>
