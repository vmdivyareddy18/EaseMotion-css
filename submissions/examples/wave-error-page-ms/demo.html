<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Error Page</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #0f172a; font-family: system-ui, sans-serif; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center;">
  
  <div class="error-content ease-fade-in-up">
    <h1 class="error-code">404</h1>
    <h2>Page Not Found</h2>
    <p>The page you are looking for has drifted away.</p>
    <button class="home-btn ease-hover-scale">Return to Safety</button>
  </div>

  <!-- Ocean Waves -->
  <div class="ocean">
    <div class="wave wave-1 ease-swing"></div>
    <div class="wave wave-2 ease-swing"></div>
    <div class="wave wave-3 ease-swing"></div>
  </div>

</body>
</html>
