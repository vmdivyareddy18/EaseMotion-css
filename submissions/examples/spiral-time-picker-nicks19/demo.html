<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spiral Time Picker Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #f8fafc;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .demo-header {
      text-align: center;
      margin-bottom: 40px;
      max-width: 500px;
    }
    .demo-header h1 {
      color: #0f172a;
      margin: 0 0 12px 0;
      font-size: 2rem;
      letter-spacing: -0.025em;
    }
    .demo-header p {
      color: #64748b;
      margin: 0;
      line-height: 1.6;
      font-size: 1.125rem;
    }
    .picker-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .picker-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: #334155;
      margin-bottom: 24px;
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="demo-header">
    <h1>Spiral Time Picker</h1>
    <p>A pure CSS time picker component utilizing a circular spiral layout and fluid spring animations.</p>
  </div>

  <div class="picker-card">
    <div class="picker-title">Select Hour</div>
    
    <div class="ease-spiral-picker">
      <!-- The center point or connector could be styled if needed -->
      <div class="ease-spiral-center"></div>
      
      <!-- Generated hours 1-12 (outer spiral) and 13-00 (inner spiral) -->
      <!-- 12 AM -->
      <input type="radio" name="hour" id="h-12" class="ease-spiral-input" checked />
      <label for="h-12" class="ease-spiral-item ease-outer-spiral" style="--angle: 0deg;">12</label>
      
      <input type="radio" name="hour" id="h-1" class="ease-spiral-input" />
      <label for="h-1" class="ease-spiral-item ease-outer-spiral" style="--angle: 30deg;">1</label>

      <input type="radio" name="hour" id="h-2" class="ease-spiral-input" />
      <label for="h-2" class="ease-spiral-item ease-outer-spiral" style="--angle: 60deg;">2</label>

      <input type="radio" name="hour" id="h-3" class="ease-spiral-input" />
      <label for="h-3" class="ease-spiral-item ease-outer-spiral" style="--angle: 90deg;">3</label>

      <input type="radio" name="hour" id="h-4" class="ease-spiral-input" />
      <label for="h-4" class="ease-spiral-item ease-outer-spiral" style="--angle: 120deg;">4</label>

      <input type="radio" name="hour" id="h-5" class="ease-spiral-input" />
      <label for="h-5" class="ease-spiral-item ease-outer-spiral" style="--angle: 150deg;">5</label>

      <input type="radio" name="hour" id="h-6" class="ease-spiral-input" />
      <label for="h-6" class="ease-spiral-item ease-outer-spiral" style="--angle: 180deg;">6</label>

      <input type="radio" name="hour" id="h-7" class="ease-spiral-input" />
      <label for="h-7" class="ease-spiral-item ease-outer-spiral" style="--angle: 210deg;">7</label>

      <input type="radio" name="hour" id="h-8" class="ease-spiral-input" />
      <label for="h-8" class="ease-spiral-item ease-outer-spiral" style="--angle: 240deg;">8</label>

      <input type="radio" name="hour" id="h-9" class="ease-spiral-input" />
      <label for="h-9" class="ease-spiral-item ease-outer-spiral" style="--angle: 270deg;">9</label>

      <input type="radio" name="hour" id="h-10" class="ease-spiral-input" />
      <label for="h-10" class="ease-spiral-item ease-outer-spiral" style="--angle: 300deg;">10</label>

      <input type="radio" name="hour" id="h-11" class="ease-spiral-input" />
      <label for="h-11" class="ease-spiral-item ease-outer-spiral" style="--angle: 330deg;">11</label>

      <!-- Inner spiral 13 - 00 -->
      <input type="radio" name="hour" id="h-00" class="ease-spiral-input" />
      <label for="h-00" class="ease-spiral-item ease-inner-spiral" style="--angle: 0deg;">00</label>

      <input type="radio" name="hour" id="h-13" class="ease-spiral-input" />
      <label for="h-13" class="ease-spiral-item ease-inner-spiral" style="--angle: 30deg;">13</label>

      <input type="radio" name="hour" id="h-14" class="ease-spiral-input" />
      <label for="h-14" class="ease-spiral-item ease-inner-spiral" style="--angle: 60deg;">14</label>

      <input type="radio" name="hour" id="h-15" class="ease-spiral-input" />
      <label for="h-15" class="ease-spiral-item ease-inner-spiral" style="--angle: 90deg;">15</label>

      <input type="radio" name="hour" id="h-16" class="ease-spiral-input" />
      <label for="h-16" class="ease-spiral-item ease-inner-spiral" style="--angle: 120deg;">16</label>

      <input type="radio" name="hour" id="h-17" class="ease-spiral-input" />
      <label for="h-17" class="ease-spiral-item ease-inner-spiral" style="--angle: 150deg;">17</label>

      <input type="radio" name="hour" id="h-18" class="ease-spiral-input" />
      <label for="h-18" class="ease-spiral-item ease-inner-spiral" style="--angle: 180deg;">18</label>

      <input type="radio" name="hour" id="h-19" class="ease-spiral-input" />
      <label for="h-19" class="ease-spiral-item ease-inner-spiral" style="--angle: 210deg;">19</label>

      <input type="radio" name="hour" id="h-20" class="ease-spiral-input" />
      <label for="h-20" class="ease-spiral-item ease-inner-spiral" style="--angle: 240deg;">20</label>

      <input type="radio" name="hour" id="h-21" class="ease-spiral-input" />
      <label for="h-21" class="ease-spiral-item ease-inner-spiral" style="--angle: 270deg;">21</label>

      <input type="radio" name="hour" id="h-22" class="ease-spiral-input" />
      <label for="h-22" class="ease-spiral-item ease-inner-spiral" style="--angle: 300deg;">22</label>

      <input type="radio" name="hour" id="h-23" class="ease-spiral-input" />
      <label for="h-23" class="ease-spiral-item ease-inner-spiral" style="--angle: 330deg;">23</label>

      <!-- Connection line that animates to the selected item -->
      <div class="ease-spiral-pointer"></div>
    </div>
  </div>

</body>
</html>
