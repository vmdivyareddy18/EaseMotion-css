<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="An educational landing section with a crystallize-style primary button." />
    <title>Crystallize Button</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell" id="top">
      <section class="hero-card ease-card ease-card-glass ease-card-hover" aria-labelledby="hero-title">
        <div class="icon-wrap" aria-hidden="true">
          <svg viewBox="0 0 64 64" focusable="false">
            <path d="M32 4 10 16v32l22 12 22-12V16L32 4Zm0 8 14 8v24L32 52 18 44V20l14-8Z" />
          </svg>
        </div>

        <div class="content">
          <p class="eyebrow">Education platform</p>
          <h1 id="hero-title" class="hero-title ease-fade-in">Unlock your next lesson with clarity.</h1>
          <p class="hero-copy ease-slide-up">
            Explore guided courses, interactive practice, and polished learning paths designed for modern students.
          </p>

          <div class="button-row" role="group" aria-label="Primary actions">
            <a href="#top" class="ease-btn ease-btn-primary crystallize-btn">Start Learning</a>
            <a href="#top" class="ease-btn ease-btn-outline">View Curriculum</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
