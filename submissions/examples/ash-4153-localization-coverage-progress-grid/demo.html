<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Localization Coverage Progress Grid</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Localization Coverage</h1>

        <p class="subtitle">
            Track translation progress across supported languages.
        </p>

        <div class="grid">

            <div class="header">Language</div>
            <div class="header">Coverage</div>
            <div class="header">Status</div>

            <div>English</div>

            <div class="progress">
                <div class="fill full"></div>
            </div>

            <span class="badge complete">
                100%
            </span>

            <div>Spanish</div>

            <div class="progress">
                <div class="fill high"></div>
            </div>

            <span class="badge progress-badge">
                86%
            </span>

            <div>German</div>

            <div class="progress">
                <div class="fill medium"></div>
            </div>

            <span class="badge review">
                62%
            </span>

            <div>Japanese</div>

            <div class="progress">
                <div class="fill low"></div>
            </div>

            <span class="badge pending">
                34%
            </span>

            <div>French</div>

            <div class="progress">
                <div class="fill high"></div>
            </div>

            <span class="badge progress-badge">
                91%
            </span>

        </div>

    </div>

</div>

</body>
</html>
