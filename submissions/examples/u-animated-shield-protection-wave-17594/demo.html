<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Shield Protection Wave</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Shield Protection Wave</h1>

  <p class="intro">
    A reusable security animation for cybersecurity dashboards,
    authentication systems, antivirus software, and banking applications.
  </p>

  <div class="demo-grid">

    <div class="shield-card">
      <div class="shield-wave">
        <span class="shield">🛡️</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <h3>Protected System</h3>
    </div>

    <div class="shield-card">
      <div class="shield-wave large">
        <span class="shield">🛡️</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <p>Security Active</p>
    </div>

    <div class="shield-card">
      <div class="shield-wave">
        <span class="shield">🛡️</span>
        <span class="wave wave-1"></span>
        <span class="wave wave-2"></span>
      </div>
      <button>Scan Now</button>
    </div>

  </div>

</main>

</body>
</html>
