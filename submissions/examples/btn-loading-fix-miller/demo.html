<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Button Loading Spinner Fix — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      width: 80px;
    }
  </style>
</head>
<body>

  <div class="demo-group">
    <h2>Before Fix — Spinner invisible on light variants</h2>
    <div class="row">
      <span class="label">Primary</span>
      <button class="ease-btn ease-btn-primary ease-btn-loading">Loading</button>
    </div>
    <div class="row">
      <span class="label">Outline</span>
      <button class="ease-btn ease-btn-outline ease-btn-loading">Loading</button>
    </div>
    <div class="row">
      <span class="label">Light</span>
      <button class="ease-btn ease-btn-light ease-btn-loading">Loading</button>
    </div>
  </div>

  <div class="demo-group">
    <h2>After Fix — currentColor makes spinner always visible</h2>
    <p style="font-size:13px;color:#64748b;margin:0 0 8px">
      Spinner inherits button text color via <code>currentColor</code> — visible on all variants.
    </p>
    <div class="row">
      <span class="label">Primary</span>
      <button class="ease-btn ease-btn-primary ease-btn-loading">Loading</button>
    </div>
    <div class="row">
      <span class="label">Outline</span>
      <button class="ease-btn ease-btn-outline ease-btn-loading">Loading</button>
    </div>
    <div class="row">
      <span class="label">Light</span>
      <button class="ease-btn ease-btn-light ease-btn-loading">Loading</button>
    </div>
  </div>

</body>
</html>
