<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallax Input Field - Analytics Dashboard Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="analytics-viewport">
        <div class="parallax-field-group">
            <div class="spatial-layer-container">
                <div class="parallax-glow-backdrop"></div>
                <input type="text" id="query-input" class="parallax-input" placeholder=" " autocomplete="off">
                <label for="query-input" class="parallax-label">
                    <span class="label-text">ENTER METRIC QUERY...</span>
                </label>
                <div class="parallax-border-frame"></div>
            </div>
            <span class="field-helper">SYSTEM // DATA_STREAM_01</span>
        </div>
    </div>

</body>
</html>
