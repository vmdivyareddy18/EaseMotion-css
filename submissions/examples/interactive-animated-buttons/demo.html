<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Animated Buttons Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="showcase-container">
    <header class="showcase-info">
      <h2>Interactive Buttons</h2>
      <p>Advanced motion primitives engineered strictly via pure CSS architectures.</p>
    </header>

    <div class="buttons-showcase-grid">
      
      <div class="variant-wrapper">
        <span class="variant-label">1. Ripple Active Effect</span>
        <button class="motion-btn btn-ripple">Click To Ripple</button>
      </div>

      <div class="variant-wrapper">
        <span class="variant-label">2. Shimmer Sweep Effect</span>
        <button class="motion-btn btn-shimmer">Hover To Shimmer</button>
      </div>

      <div class="variant-wrapper">
        <span class="variant-label">3. Magnetic Float Effect</span>
        <button class="motion-btn btn-magnetic">Hover Attraction</button>
      </div>

      <div class="variant-wrapper">
        <span class="variant-label">4. Neon Radial Glow</span>
        <button class="motion-btn btn-neon">Illuminated Glow</button>
      </div>

      <div class="variant-wrapper">
        <span class="variant-label">5. Liquid Wave Fill</span>
        <button class="motion-btn btn-liquid">
          <span class="liquid-text">Fluid Expansion</span>
        </button>
      </div>

    </div>
  </main>

</body>
</html>
