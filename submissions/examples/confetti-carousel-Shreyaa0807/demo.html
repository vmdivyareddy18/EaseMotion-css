<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confetti Carousel Demo - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">
    <h1>Confetti Carousel</h1>
    
    <div class="carousel-wrapper" role="region" aria-roledescription="carousel" aria-label="Confetti Showcase">
      
      <input type="radio" name="carousel-control" id="slide-1" checked aria-hidden="true">
      <input type="radio" name="carousel-control" id="slide-2" aria-hidden="true">
      <input type="radio" name="carousel-control" id="slide-3" aria-hidden="true">

      <div class="carousel-slides">
        
        <div class="carousel-slide slide-content-1" role="group" aria-roledescription="slide" aria-label="1 of 3">
          <div class="confetti-overlay">
            <span class="p-1"></span><span class="p-2"></span><span class="p-3"></span>
          </div>
          <div class="card-content">
            <h2>Creative Spark</h2>
            <p>A beautifully animated carousel variant inspired by vibrant blog layouts.</p>
          </div>
        </div>

        <div class="carousel-slide slide-content-2" role="group" aria-roledescription="slide" aria-label="2 of 3">
          <div class="confetti-overlay">
            <span class="p-1"></span><span class="p-2"></span><span class="p-3"></span>
          </div>
          <div class="card-content">
            <h2>Pure CSS Motion</h2>
            <p>Zero JavaScript required. Fully responsive, lightweight, and accessible.</p>
          </div>
        </div>

        <div class="carousel-slide slide-content-3" role="group" aria-roledescription="slide" aria-label="3 of 3">
          <div class="confetti-overlay">
            <span class="p-1"></span><span class="p-2"></span><span class="p-3"></span>
          </div>
          <div class="card-content">
            <h2>Easy Integration</h2>
            <p>Utilizes core EaseMotion utility variables for fluid transitions.</p>
          </div>
        </div>

      </div>

      <div class="carousel-nav">
        <label for="slide-1" class="nav-dot" aria-label="Go to slide 1"></label>
        <label for="slide-2" class="nav-dot" aria-label="Go to slide 2"></label>
        <label for="slide-3" class="nav-dot" aria-label="Go to slide 3"></label>
      </div>

    </div>
  </main>

</body>
</html>
