<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perspective Newsletter Popup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-popup">

  <h2>Stay Updated ✨</h2>

  <p>
    Subscribe to receive the latest news, product updates, and exclusive offers.
  </p>

  <input
    type="email"
    placeholder="Enter your email"
    aria-label="Email address"
  >

  <button>Subscribe</button>

</div>

</body>
</html>
