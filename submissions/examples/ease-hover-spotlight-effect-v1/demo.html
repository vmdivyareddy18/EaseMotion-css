<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotlight Effect</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="spotlight" id="spotlight">
  <h1 class="ease-fade-in">Hover Spotlight ✨</h1>
  <p class="ease-slide-up">
    Move your cursor to reveal content with a spotlight effect.
  </p>
</section>

<script>
const spotlight = document.getElementById("spotlight");

spotlight.addEventListener("mousemove", (e) => {
  const x = e.clientX;
  const y = e.clientY;

  spotlight.style.setProperty("--x", x + "px");
  spotlight.style.setProperty("--y", y + "px");
});
</script>

</body>
</html>
