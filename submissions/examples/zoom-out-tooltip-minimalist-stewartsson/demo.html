<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist Tech Hub - Zoom-Out Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="tech-viewport">
        <!-- Main Premium Minimalist Tech Card Elevation Container Hub Shell -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="minimal-matrix-badge">MONO.CORE // v7</div>
                <h2 class="control-title">System Hardware Ledger</h2>
                <p class="control-subtitle">Hover over or interact with the sleek action link below to witness the pure-CSS horizontal inverse zoom-out tooltip sweep.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">▫️</span>
                        <span class="btn-text">Inspect Memory Allocation</span>
                    </button>

                    <!-- Floating Tooltip Inverse Zoom-Out Overlay Menu Shell Box -->
                    <div class="zoom-out-tooltip ease-zoom-out-fly">
                        <!-- Internal Tooltip Content Overlay Container -->
                        <div class="tooltip-inner-content">
                            <span class="tooltip-label">Allocation: Nominal</span>
                            <span class="tooltip-meta">0.12ms Read Latency</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Monochrome Layout Parameters Synced</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
