<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐾 Pet Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🐾 Pet Simulator</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">❤️ Happiness</span>
        <span class="stat-value" id="happinessDisplay">100</span>
        <span class="stat-unit">%</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🍖 Hunger</span>
        <span class="stat-value" id="hungerDisplay">100</span>
        <span class="stat-unit">%</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">⚡ Energy</span>
        <span class="stat-value" id="energyDisplay">100</span>
        <span class="stat-unit">%</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎯 Level</span>
        <span class="stat-value" id="levelDisplay">1</span>
      </div>
    </div>

    <div class="pet-area">
      <div class="pet-container" id="petContainer">
        <div class="pet-emoji" id="petEmoji">🐶</div>
        <div class="pet-name" id="petName">Buddy</div>
        <div class="pet-status" id="petStatus">😊 Happy</div>
      </div>
      <div class="action-feedback" id="actionFeedback"></div>
    </div>

    <div class="action-buttons">
      <button class="action-btn" id="feedBtn">🍖 Feed</button>
      <button class="action-btn" id="playBtn">🎾 Play</button>
      <button class="action-btn" id="cleanBtn">🧹 Clean</button>
      <button class="action-btn" id="sleepBtn">😴 Sleep</button>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="renameBtn">✏️ Rename</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
    </div>

    <div class="game-status" id="gameStatus">🐾 Take care of your pet!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const happinessDisplay = document.getElementById('happinessDisplay');
      const hungerDisplay = document.getElementById('hungerDisplay');
      const energyDisplay = document.getElementById('energyDisplay');
      const levelDisplay = document.getElementById('levelDisplay');
      const petEmoji = document.getElementById('petEmoji');
      const petName = document.getElementById('petName');
      const petStatus = document.getElementById('petStatus');
      const actionFeedback = document.getElementById('actionFeedback');
      const feedBtn = document.getElementById('feedBtn');
      const playBtn = document.getElementById('playBtn');
      const cleanBtn = document.getElementById('cleanBtn');
      const sleepBtn = document.getElementById('sleepBtn');
      const renameBtn = document.getElementById('renameBtn');
      const resetBtn = document.getElementById('resetBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Pet State ----------
      let pet = {
        name: 'Buddy',
        emoji: '🐶',
        happiness: 100,
        hunger: 100,
        energy: 100,
        level: 1,
        xp: 0,
        xpToNext: 50,
        age: 0,
        isSleeping: false,
        lastAction: null,
        actionCooldown: 0
      };

      // ---------- Pet Types ----------
      const PET_TYPES = [
        { emoji: '🐶', name: 'Dog' },
        { emoji: '🐱', name: 'Cat' },
        { emoji: '🐰', name: 'Rabbit' },
        { emoji: '🐹', name: 'Hamster' },
        { emoji: '🐦', name: 'Bird' },
        { emoji: '🐠', name: 'Fish' },
        { emoji: '🦊', name: 'Fox' },
        { emoji: '🐼', name: 'Panda' }
      ];

      // ---------- Status Messages ----------
      const STATUS_MESSAGES = {
        happy: ['😊 Happy', '🥰 Loving', '😄 Joyful', '🌟 Radiant'],
        sad: ['😢 Sad', '😔 Lonely', '😞 Down', '💔 Heartbroken'],
        hungry: ['🍽️ Hungry', '😫 Starving', '🤤 Craving', '🥺 Empty'],
        tired: ['😴 Tired', '💤 Sleepy', '🥱 Exhausted', '😪 Drowsy'],
        playful: ['🎾 Playful', '🤸 Energetic', '🎪 Hyper', '⚡ Bouncy'],
        sleeping: ['💤 Sleeping', '😴 Zzz', '🌙 Dreaming', '💭 Resting']
      };

      // ---------- Helper Functions ----------
      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function randomChoice(arr) {
        return arr[Math.floor(Math.random() * arr.length)];
      }

      // ---------- Update Functions ----------
      function updateUI() {
        happinessDisplay.textContent = Math.round(pet.happiness);
        hungerDisplay.textContent = Math.round(pet.hunger);
        energyDisplay.textContent = Math.round(pet.energy);
        levelDisplay.textContent = pet.level;
        petName.textContent = pet.name;
        petEmoji.textContent = pet.emoji;
        updatePetStatus();
      }

      function updatePetStatus() {
        let status = '';
        if (pet.isSleeping) {
          status = randomChoice(STATUS_MESSAGES.sleeping);
        } else if (pet.happiness < 30) {
          status = randomChoice(STATUS_MESSAGES.sad);
        } else if (pet.hunger < 30) {
          status = randomChoice(STATUS_MESSAGES.hungry);
        } else if (pet.energy < 30) {
          status = randomChoice(STATUS_MESSAGES.tired);
        } else if (pet.happiness > 80 && pet.energy > 80) {
          status = randomChoice(STATUS_MESSAGES.playful);
        } else {
          status = randomChoice(STATUS_MESSAGES.happy);
        }
        petStatus.textContent = status;
      }

      function showFeedback(message, isGood = true) {
        actionFeedback.textContent = message;
        actionFeedback.className = 'action-feedback' + (isGood ? ' good' : ' bad');
        actionFeedback.style.display = 'block';
        clearTimeout(actionFeedback._timeout);
        actionFeedback._timeout = setTimeout(() => {
          actionFeedback.style.display = 'none';
        }, 2000);
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Pet Actions ----------
      function feed() {
        if (pet.isSleeping) {
          showFeedback('😴 Pet is sleeping! Wake them up first.', false);
          return;
        }
        if (pet.hunger >= 95) {
          showFeedback('🍖 Not hungry!', false);
          return;
        }
        pet.hunger = clamp(pet.hunger + 20, 0, 100);
        pet.happiness = clamp(pet.happiness + 5, 0, 100);
        pet.energy = clamp(pet.energy + 3, 0, 100);
        addXP(5);
        showFeedback('🍖 Yummy! +20 Hunger', true);
        updateUI();
        setGameStatus('🍖 Pet is eating happily!', true);
      }

      function play() {
        if (pet.isSleeping) {
          showFeedback('😴 Pet is sleeping! Wake them up first.', false);
          return;
        }
        if (pet.energy < 20) {
          showFeedback('⚡ Too tired to play! Let them rest.', false);
          return;
        }
        pet.happiness = clamp(pet.happiness + 15, 0, 100);
        pet.energy = clamp(pet.energy - 15, 0, 100);
        pet.hunger = clamp(pet.hunger - 5, 0, 100);
        addXP(8);
        showFeedback('🎾 Fun time! +15 Happiness', true);
        updateUI();
        setGameStatus('🎾 Pet is having a blast!', true);
        // Play animation
        petEmoji.style.transform = 'scale(1.3)';
        setTimeout(() => { petEmoji.style.transform = 'scale(1)'; }, 300);
      }

      function clean() {
        if (pet.isSleeping) {
          showFeedback('😴 Pet is sleeping! Wake them up first.', false);
          return;
        }
        pet.happiness = clamp(pet.happiness + 10, 0, 100);
        addXP(3);
        showFeedback('🧹 Sparkling clean! +10 Happiness', true);
        updateUI();
        setGameStatus('🧹 Pet is looking fresh!', true);
      }

      function sleep() {
        if (pet.isSleeping) {
          // Wake up
          pet.isSleeping = false;
          pet.energy = clamp(pet.energy + 30, 0, 100);
          pet.happiness = clamp(pet.happiness + 5, 0, 100);
          showFeedback('🌅 Good morning! +30 Energy', true);
          setGameStatus('🌅 Pet woke up refreshed!', true);
        } else {
          if (pet.energy >= 90) {
            showFeedback('⚡ Not tired yet!', false);
            return;
          }
          pet.isSleeping = true;
          showFeedback('😴 Goodnight! Pet is sleeping...', true);
          setGameStatus('😴 Pet is sleeping. Let them rest.', true);
          // Slowly regain energy while sleeping
          const sleepInterval = setInterval(() => {
            if (!pet.isSleeping) {
              clearInterval(sleepInterval);
              return;
            }
            pet.energy = clamp(pet.energy + 2, 0, 100);
            updateUI();
            if (pet.energy >= 100) {
              pet.isSleeping = false;
              clearInterval(sleepInterval);
              showFeedback('🌅 Pet woke up fully rested!', true);
              setGameStatus('🌅 Pet is awake and ready!', true);
              updateUI();
            }
          }, 2000);
        }
        updateUI();
        updatePetStatus();
      }

      // ---------- XP & Leveling ----------
      function addXP(amount) {
        pet.xp += amount;
        while (pet.xp >= pet.xpToNext) {
          pet.xp -= pet.xpToNext;
          pet.level++;
          pet.xpToNext = Math.floor(pet.xpToNext * 1.4);
          // Level up rewards
          pet.happiness = clamp(pet.happiness + 10, 0, 100);
          pet.energy = clamp(pet.energy + 10, 0, 100);
          showFeedback(`🎉 Level Up! Now Level ${pet.level}!`, true);
          setGameStatus(`🎉 Pet reached Level ${pet.level}!`, true);
          // Change pet emoji at certain levels
          if (pet.level % 3 === 0) {
            const newType = PET_TYPES[(pet.level / 3) % PET_TYPES.length];
            pet.emoji = newType.emoji;
            showFeedback(`🔄 ${pet.name} evolved into ${newType.name}!`, true);
          }
        }
        updateUI();
      }

      // ---------- Decay System ----------
      function applyDecay() {
        if (pet.isSleeping) {
          // Slower decay while sleeping
          pet.hunger = clamp(pet.hunger - 0.3, 0, 100);
          pet.happiness = clamp(pet.happiness - 0.2, 0, 100);
        } else {
          pet.hunger = clamp(pet.hunger - 0.8, 0, 100);
          pet.happiness = clamp(pet.happiness - 0.5, 0, 100);
          pet.energy = clamp(pet.energy - 0.3, 0, 100);
        }
        pet.age += 0.01;
        updateUI();
        updatePetStatus();

        // Check for critical states
        if (pet.hunger < 20 && !pet.isSleeping) {
          setGameStatus('⚠️ Pet is hungry! Feed them!', false);
        }
        if (pet.happiness < 20 && !pet.isSleeping) {
          setGameStatus('⚠️ Pet is sad! Play with them!', false);
        }
        if (pet.energy < 20 && !pet.isSleeping) {
          setGameStatus('⚠️ Pet is tired! Let them sleep!', false);
        }

        // Check if pet is running away (critical states)
        if (pet.hunger < 5 || pet.happiness < 5) {
          if (Math.random() < 0.01) {
            resetPet();
            showFeedback('💔 Your pet ran away! Start over.', false);
            setGameStatus('💔 Pet ran away! Take better care next time.', false);
          }
        }
      }

      // ---------- Reset ----------
      function resetPet() {
        pet.happiness = 100;
        pet.hunger = 100;
        pet.energy = 100;
        pet.level = 1;
        pet.xp = 0;
        pet.xpToNext = 50;
        pet.age = 0;
        pet.isSleeping = false;
        pet.emoji = '🐶';
        pet.name = 'Buddy';
        updateUI();
        setGameStatus('🔄 Pet reset. Start fresh!', true);
        showFeedback('🔄 New pet created!', true);
      }

      // ---------- Rename ----------
      function renamePet() {
        const newName = prompt('Enter a new name for your pet:', pet.name);
        if (newName && newName.trim().length > 0) {
          pet.name = newName.trim();
          updateUI();
          setGameStatus(`✏️ Pet renamed to ${pet.name}!`, true);
          showFeedback(`✏️ New name: ${pet.name}!`, true);
        }
      }

      // ---------- Random Events ----------
      function randomEvent() {
        if (Math.random() < 0.02 && !pet.isSleeping) {
          const events = [
            { msg: '🌟 Pet found a toy! +10 Happiness', action: () => { pet.happiness = clamp(pet.happiness + 10, 0, 100); } },
            { msg: '🍖 Pet found a snack! +15 Hunger', action: () => { pet.hunger = clamp(pet.hunger + 15, 0, 100); } },
            { msg: '⚡ Pet got a burst of energy! +15 Energy', action: () => { pet.energy = clamp(pet.energy + 15, 0, 100); } },
            { msg: '💫 Pet feels loved! +5 All stats', action: () => { 
              pet.happiness = clamp(pet.happiness + 5, 0, 100);
              pet.hunger = clamp(pet.hunger + 5, 0, 100);
              pet.energy = clamp(pet.energy + 5, 0, 100);
            }}
          ];
          const event = randomChoice(events);
          event.action();
          showFeedback(event.msg, true);
          setGameStatus('✨ Random event! ' + event.msg, true);
          updateUI();
        }
      }

      // ---------- Button Listeners ----------
      feedBtn.addEventListener('click', feed);
      playBtn.addEventListener('click', play);
      cleanBtn.addEventListener('click', clean);
      sleepBtn.addEventListener('click', sleep);
      renameBtn.addEventListener('click', renamePet);
      resetBtn.addEventListener('click', resetPet);

      // ---------- Keyboard Shortcuts ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === 'f' || e.key === 'F') feed();
        if (e.key === 'p' || e.key === 'P') play();
        if (e.key === 'c' || e.key === 'C') clean();
        if (e.key === 's' || e.key === 'S') sleep();
        if (e.key === 'r' || e.key === 'R') resetPet();
      });

      // ---------- Touch Support ----------
      const petContainer = document.getElementById('petContainer');
      petContainer.addEventListener('click', () => {
        // Pet interaction - gives small happiness boost
        if (!pet.isSleeping) {
          pet.happiness = clamp(pet.happiness + 2, 0, 100);
          updateUI();
          showFeedback('❤️ Pet loves your attention!', true);
          setGameStatus('❤️ Pet is happy with your love!', true);
          petEmoji.style.transform = 'scale(1.2)';
          setTimeout(() => { petEmoji.style.transform = 'scale(1)'; }, 300);
        }
      });

      // ---------- Game Loop ----------
      function gameLoop() {
        applyDecay();
        randomEvent();
        updateUI();
        setTimeout(gameLoop, 2000);
      }

      // ---------- Init ----------
      function init() {
        updateUI();
        setGameStatus('🐾 Welcome to Pet Simulator! Take care of your pet!', true);
        showFeedback('🐾 Meet your new pet!', true);
        gameLoop();
      }

      init();
    })();
  </script>
</body>
</html>
