<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Speed Dial Menu - Floating Action Button for EaseMotion CSS">
    <title>Speed Dial Menu | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="em-speed-dial-container">
        <h1>Speed Dial Menu</h1>
        <p>A floating action button that expands into quick-action shortcuts</p>
        
        <div class="em-speed-dial">
            <!-- Quick Actions -->
            <div class="em-speed-dial-actions">
                <button class="em-speed-dial-action" aria-label="Call">
                    <span class="em-speed-dial-label">Call</span>
                    <span class="em-speed-dial-icon">📞</span>
                </button>
                <button class="em-speed-dial-action" aria-label="Chat">
                    <span class="em-speed-dial-label">Chat</span>
                    <span class="em-speed-dial-icon">💬</span>
                </button>
                <button class="em-speed-dial-action" aria-label="Email">
                    <span class="em-speed-dial-label">Email</span>
                    <span class="em-speed-dial-icon">✉️</span>
                </button>
                <button class="em-speed-dial-action" aria-label="Favorite">
                    <span class="em-speed-dial-label">Favorite</span>
                    <span class="em-speed-dial-icon">❤️</span>
                </button>
                <button class="em-speed-dial-action" aria-label="Settings">
                    <span class="em-speed-dial-label">Settings</span>
                    <span class="em-speed-dial-icon">⚙️</span>
                </button>
            </div>
            
            <!-- Main Toggle Button -->
            <input type="checkbox" id="em-speed-dial-toggle" class="em-speed-dial-toggle">
            <label for="em-speed-dial-toggle" class="em-speed-dial-button" role="button" aria-label="Toggle speed dial menu" aria-pressed="false">
                <span class="em-speed-dial-icon-main">+</span>
            </label>
        </div>
    </main>
</body>
</html>
