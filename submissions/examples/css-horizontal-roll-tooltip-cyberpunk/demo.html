<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Horizontal Roll Tooltip - Cyberpunk Neon Style</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cyberpunk-viewport">
        <div class="terminal-card">
            <div class="terminal-header">
                <span class="status-indicator"></span>
                <span class="terminal-title">SYS_NODE_OVERWRITE</span>
            </div>
            
            <div class="tooltip-context-area">
                <div class="tooltip-wrapper">
                    <button class="tooltip-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-text">[ EXECUTE_OVERRIDE ]</span>
                    </button>
                    
                    <div class="horizontal-roll-tooltip" role="tooltip">
                        <div class="tooltip-inner-mesh">
                            <div class="tooltip-header">
                                <span class="badge-neon">CRITICAL_ACCESS</span>
                                <p class="node-title">Decryption Matrix Active</p>
                            </div>
                            <div class="tooltip-body">
                                <p class="node-desc">Bypassing local data firewalls. Memory injection pipeline streaming at maximum layer bandwidth configuration.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
