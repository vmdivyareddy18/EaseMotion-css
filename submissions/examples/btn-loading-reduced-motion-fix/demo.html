<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Loading Reduced Motion Fix</title>
  
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: var(--ease-color-bg, #f8fafc);
      padding: var(--ease-space-8, 2rem);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: var(--ease-shadow-md);
      text-align: center;
    }
    h2 {
      margin-top: 0;
      color: var(--ease-color-neutral-900);
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2>Reduced Motion: Button Loading Fix</h2>
    <p>To test this, enable <strong>"Reduced Motion"</strong> in your OS accessibility settings or emulate it via your browser's DevTools.</p>
    <p>The button below will gently <strong>pulse</strong> instead of completely freezing, providing a safe, accessible loading state.</p>
    
    <br>
    
    <button class="ease-btn ease-btn-primary ease-btn-loading">
      Submitting...
    </button>
  </div>

</body>
</html>
