<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Node Maintenance Drain Status</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">

<h2>Node Maintenance Status</h2>

<div class="node healthy">
<div>
<h3>Worker Node-01</h3>
<p>Maintenance completed successfully.</p>
</div>
<span>Healthy</span>
</div>

<div class="node active">
<div>
<h3>Worker Node-02</h3>
<p>Pods are currently draining.</p>
</div>
<span>Draining</span>
</div>

<div class="node warning">
<div>
<h3>Worker Node-03</h3>
<p>Cordoned and awaiting approval.</p>
</div>
<span>Pending</span>
</div>

<div class="node critical">
<div>
<h3>Worker Node-04</h3>
<p>Drain failed due to protected workloads.</p>
</div>
<span>Failed</span>
</div>

</section>

</body>
</html>
