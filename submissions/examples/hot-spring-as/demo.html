<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Spring</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="moonH"></span>
    <span class="rockH rh1"></span>
    <span class="rockH rh2"></span>
    <span class="rockH rh3"></span>
    <div class="pool">
      <span class="waterH"></span>
      <span class="rippleH rp1"></span>
      <span class="rippleH rp2"></span>
      <span class="rippleH rp3"></span>
    </div>
    <div class="monkey">
      <span class="earH ehl"></span>
      <span class="earH ehr"></span>
      <span class="headH"></span>
      <span class="faceH"></span>
      <span class="eyeH ehl2"></span>
      <span class="eyeH ehr2"></span>
      <span class="towel"></span>
    </div>
    <span class="steamH sh1"></span>
    <span class="steamH sh2"></span>
    <span class="steamH sh3"></span>
    <span class="steamH sh4"></span>
    <span class="snowH sn1"></span>
    <span class="snowH sn2"></span>
  </div>
</body>
</html>
