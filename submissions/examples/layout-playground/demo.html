<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Layout Utilities Playground - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to playground local styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="playground-wrapper">
    <header>
      <h1>Layout Utilities Playground</h1>
      <p>Explore EaseMotion CSS Flexbox and Grid helper classes interactively. Modify layouts, justify alignments, gaps, and number of children in real-time.</p>
    </header>

    <div class="playground-layout">
      <!-- Left: Controls Panel -->
      <section class="control-card">
        <!-- Flex vs Grid tab toggle -->
        <div class="tabs-navigation">
          <button id="tab-flex" class="tab-btn active" onclick="setLayoutMode('flex')">Flexbox</button>
          <button id="tab-grid" class="tab-btn" onclick="setLayoutMode('grid')">Grid</button>
        </div>

        <form id="playground-form" onsubmit="event.preventDefault();">
          <!-- Item Count Controls -->
          <div class="control-group">
            <label>Preview Items Count</label>
            <div class="counter-controls">
              <button type="button" class="counter-btn" onclick="adjustItems(-1)">- Remove Item</button>
              <button type="button" class="counter-btn" onclick="adjustItems(1)">+ Add Item</button>
            </div>
          </div>

          <!-- Flexbox Controls Group -->
          <div id="flex-controls-container">
            <div class="control-group">
              <label for="flex-direction">Direction</label>
              <div class="select-wrapper">
                <select id="flex-direction" onchange="updateLayout()">
                  <option value="ease-flex-row" selected>ease-flex-row</option>
                  <option value="ease-flex-col">ease-flex-col</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="flex-justify">Justify Content</label>
              <div class="select-wrapper">
                <select id="flex-justify" onchange="updateLayout()">
                  <option value="ease-justify-start">ease-justify-start</option>
                  <option value="ease-justify-center" selected>ease-justify-center</option>
                  <option value="ease-justify-end">ease-justify-end</option>
                  <option value="ease-justify-between">ease-justify-between</option>
                  <option value="ease-justify-around">ease-justify-around</option>
                  <option value="ease-justify-evenly">ease-justify-evenly</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="flex-items">Align Items</label>
              <div class="select-wrapper">
                <select id="flex-items" onchange="updateLayout()">
                  <option value="ease-items-center" selected>ease-items-center</option>
                  <option value="ease-items-start">ease-items-start</option>
                  <option value="ease-items-end">ease-items-end</option>
                  <option value="ease-items-stretch">ease-items-stretch</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="flex-wrap">Flex Wrap</label>
              <div class="select-wrapper">
                <select id="flex-wrap" onchange="updateLayout()">
                  <option value="ease-flex-nowrap" selected>ease-flex-nowrap</option>
                  <option value="ease-flex-wrap">ease-flex-wrap</option>
                  <option value="ease-flex-wrap-reverse">ease-flex-wrap-reverse</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Grid Controls Group -->
          <div id="grid-controls-container" class="hidden-section">
            <div class="control-group">
              <label for="grid-cols">Grid Columns</label>
              <div class="select-wrapper">
                <select id="grid-cols" onchange="updateLayout()">
                  <option value="ease-grid-cols-1">ease-grid-cols-1</option>
                  <option value="ease-grid-cols-2">ease-grid-cols-2</option>
                  <option value="ease-grid-cols-3" selected>ease-grid-cols-3</option>
                  <option value="ease-grid-cols-4">ease-grid-cols-4</option>
                  <option value="ease-grid-auto">ease-grid-auto</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="grid-place">Place Items</label>
              <div class="select-wrapper">
                <select id="grid-place" onchange="updateLayout()">
                  <option value="ease-place-center" selected>ease-place-center</option>
                  <option value="ease-place-start">ease-place-start</option>
                  <option value="ease-place-end">ease-place-end</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Gap Control (Shared) -->
          <div class="control-group">
            <label for="layout-gap">Gap Spacing</label>
            <div class="select-wrapper">
              <select id="layout-gap" onchange="updateLayout()">
                <option value="ease-gap-1">ease-gap-1</option>
                <option value="ease-gap-2">ease-gap-2</option>
                <option value="ease-gap-3">ease-gap-3</option>
                <option value="ease-gap-4" selected>ease-gap-4 (default)</option>
                <option value="ease-gap-6">ease-gap-6</option>
                <option value="ease-gap-8">ease-gap-8</option>
                <option value="ease-gap-10">ease-gap-10</option>
              </select>
            </div>
          </div>
        </form>
      </section>

      <!-- Right: Preview and Code -->
      <main class="preview-card">
        <div class="preview-title-bar">
          <h2>Live Preview</h2>
          <div id="mode-badge" class="badge-mode">Flexbox Mode</div>
        </div>

        <!-- Inner Render Container -->
        <div class="sandbox-outer">
          <div id="sandbox" class="sandbox-container ease-flex ease-flex-row ease-justify-center ease-items-center ease-flex-nowrap ease-gap-4">
            <!-- Dynamic Boxes will render here -->
          </div>
        </div>

        <!-- Generated HTML Snippet display -->
        <div class="code-container">
          <div class="code-header">
            <span>Generated HTML</span>
            <button id="btn-copy" class="copy-btn" onclick="copySnippet()">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Copy HTML
            </button>
          </div>
          <pre class="code-box"><code id="code-output"></code></pre>
        </div>
      </main>
    </div>
  </div>

  <script>
    let layoutMode = 'flex';
    let itemCount = 3;

    // Initialize layout on DOM load
    document.addEventListener('DOMContentLoaded', () => {
      renderItems();
      updateLayout();
    });

    // Toggle Flexbox vs Grid Mode panels
    function setLayoutMode(mode) {
      layoutMode = mode;
      
      const flexBtn = document.getElementById('tab-flex');
      const gridBtn = document.getElementById('tab-grid');
      const flexControls = document.getElementById('flex-controls-container');
      const gridControls = document.getElementById('grid-controls-container');
      const modeBadge = document.getElementById('mode-badge');

      if (mode === 'flex') {
        flexBtn.classList.add('active');
        gridBtn.classList.remove('active');
        flexControls.classList.remove('hidden-section');
        gridControls.classList.add('hidden-section');
        modeBadge.textContent = 'Flexbox Mode';
      } else {
        gridBtn.classList.add('active');
        flexBtn.classList.remove('active');
        gridControls.classList.remove('hidden-section');
        flexControls.classList.add('hidden-section');
        modeBadge.textContent = 'Grid Mode';
      }
      
      updateLayout();
    }

    // Dynamic rendering of box items
    function renderItems() {
      const container = document.getElementById('sandbox');
      container.innerHTML = '';
      for (let i = 1; i <= itemCount; i++) {
        const item = document.createElement('div');
        item.className = 'preview-item';
        item.textContent = i;
        container.appendChild(item);
      }
    }

    // Increment/Decrement items inside the container
    function adjustItems(amount) {
      const newCount = itemCount + amount;
      if (newCount >= 2 && newCount <= 8) {
        itemCount = newCount;
        renderItems();
        updateLayout();
      }
    }

    // Reads selected dropdown states and updates the preview DOM & Code Block
    function updateLayout() {
      const container = document.getElementById('sandbox');
      let classes = [];

      // Add mode specific classes
      if (layoutMode === 'flex') {
        classes.push('ease-flex');
        classes.push(document.getElementById('flex-direction').value);
        classes.push(document.getElementById('flex-justify').value);
        classes.push(document.getElementById('flex-items').value);
        classes.push(document.getElementById('flex-wrap').value);
      } else {
        classes.push('ease-grid');
        classes.push(document.getElementById('grid-cols').value);
        classes.push(document.getElementById('grid-place').value);
      }

      // Add shared gap class
      classes.push(document.getElementById('layout-gap').value);

      // Apply to container
      container.className = 'sandbox-container ' + classes.join(' ');

      // Update Generated Code Display
      updateCodeDisplay(classes.join(' '));
    }

    // Format output code with simple syntax highlight
    function updateCodeDisplay(classList) {
      const codeOutput = document.getElementById('code-output');
      
      let itemsHTML = '';
      for (let i = 1; i <= itemCount; i++) {
        itemsHTML += `  <span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="val">"box"</span><span class="tag">&gt;</span><span class="text">${i}</span><span class="tag">&lt;/div&gt;</span>\n`;
      }

      codeOutput.innerHTML = 
`<span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="val">"${classList}"</span><span class="tag">&gt;</span>
${itemsHTML}<span class="tag">&lt;/div&gt;</span>`;
    }

    // Copy to clipboard function
    function copySnippet() {
      const codeBlock = document.getElementById('code-output');
      const text = codeBlock.textContent;

      navigator.clipboard.writeText(text).then(() => {
        const copyBtn = document.getElementById('btn-copy');
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          Copied!
        `;
        
        setTimeout(() => {
          copyBtn.classList.remove('copied');
          copyBtn.innerHTML = `
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            Copy HTML
          `;
        }, 2000);
      });
    }
  </script>
</body>
</html>
