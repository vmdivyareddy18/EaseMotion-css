<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Chat Bubble Float</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Chat Bubble Float</h1>

    <p>
      A lightweight floating chat icon animation inspired by modern
      messaging and support platforms.
    </p>

    <div class="demo-grid">

      <button class="chat-button">
        <span class="chat-icon">💬</span>
      </button>

      <button class="chat-button card-style">
        <span class="chat-icon">💬</span>
        <span>Live Chat</span>
      </button>

      <div class="support-card">
        <h3>Customer Support</h3>
        <p>Need help? Start a conversation with our team.</p>

        <button class="chat-button small">
          <span class="chat-icon">💬</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
