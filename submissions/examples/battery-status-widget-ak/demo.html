<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battery Status Widget</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Battery Status</h1>
    <div class="battery-card">
      <div class="battery-visual">
        <svg width="120" height="200" viewBox="0 0 120 200" class="battery-svg">
          <rect x="20" y="10" width="80" height="30" rx="6" fill="none" stroke="#333" stroke-width="4"/>
          <rect x="20" y="10" width="80" height="30" rx="6" fill="none" stroke="#333" stroke-width="4"/>
          <rect class="battery-cap" x="45" y="0" width="30" height="12" rx="4" fill="#333"/>
          <rect class="battery-body" x="24" y="14" width="72" height="22" rx="4" fill="currentColor"/>
          <rect class="battery-level" id="batteryLevel" x="24" y="14" width="54" height="22" rx="4" fill="currentColor"/>
        </svg>
      </div>
      <div class="battery-info">
        <div class="battery-pct" id="batteryPct">75%</div>
        <div class="battery-state" id="batteryState">Charging</div>
        <div class="battery-time" id="batteryTime">45 min until full</div>
      </div>
    </div>

    <div class="details-card">
      <div class="detail-row">
        <span class="detail-label">Level</span>
        <span class="detail-value" id="detailLevel">75%</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Charging</span>
        <span class="detail-value" id="detailCharging">Yes</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Charging Time</span>
        <span class="detail-value" id="detailChargingTime">45 min</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Discharging Time</span>
        <span class="detail-value" id="detailDischargingTime">N/A</span>
      </div>
    </div>

    <div class="unsupported" id="unsupported">
      Battery API is not supported in this browser.
    </div>
  </div>
  <script>
    const batteryLevel = document.getElementById('batteryLevel');
    const batteryPct = document.getElementById('batteryPct');
    const batteryState = document.getElementById('batteryState');
    const batteryTime = document.getElementById('batteryTime');
    const detailLevel = document.getElementById('detailLevel');
    const detailCharging = document.getElementById('detailCharging');
    const detailChargingTime = document.getElementById('detailChargingTime');
    const detailDischargingTime = document.getElementById('detailDischargingTime');
    const unsupported = document.getElementById('unsupported');
    const batteryCard = document.querySelector('.battery-card');

    function updateBattery(battery) {
      const level = Math.round(battery.level * 100);
      const charging = battery.charging;
      const chargingTime = battery.chargingTime;
      const dischargingTime = battery.dischargingTime;

      batteryLevel.setAttribute('width', (level / 100) * 72);
      batteryPct.textContent = level + '%';
      batteryState.textContent = charging ? 'Charging' : 'Discharging';

      if (charging && chargingTime !== Infinity) {
        batteryTime.textContent = formatTime(chargingTime) + ' until full';
      } else if (!charging && dischargingTime !== Infinity) {
        batteryTime.textContent = formatTime(dischargingTime) + ' remaining';
      } else {
        batteryTime.textContent = 'Calculating...';
      }

      detailLevel.textContent = level + '%';
      detailCharging.textContent = charging ? 'Yes' : 'No';
      detailChargingTime.textContent = chargingTime !== Infinity ? formatTime(chargingTime) : 'N/A';
      detailDischargingTime.textContent = dischargingTime !== Infinity ? formatTime(dischargingTime) : 'N/A';

      if (level <= 20) {
        batteryCard.className = 'battery-card low';
      } else if (level <= 50) {
        batteryCard.className = 'battery-card medium';
      } else {
        batteryCard.className = 'battery-card high';
      }
    }

    function formatTime(minutes) {
      if (minutes === Infinity || isNaN(minutes)) return 'N/A';
      const h = Math.floor(minutes / 60);
      const m = Math.floor(minutes % 60);
      if (h > 0) return h + 'h ' + m + 'm';
      return m + ' min';
    }

    if ('getBattery' in navigator) {
      unsupported.style.display = 'none';
      navigator.getBattery().then(battery => {
        updateBattery(battery);
        battery.addEventListener('levelchange', () => updateBattery(battery));
        battery.addEventListener('chargingchange', () => updateBattery(battery));
        battery.addEventListener('chargingtimechange', () => updateBattery(battery));
        battery.addEventListener('dischargingtimechange', () => updateBattery(battery));
      });
    } else {
      unsupported.style.display = 'block';
      batteryCard.style.display = 'none';
    }
  </script>
</body>
</html>
