<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - macOS Dock</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="em-dock">

        <button class="em-dock-item">
            <span class="em-label">Finder</span>
            <img src="icons/finder.svg" alt="Finder">
        </button>

        <button class="em-dock-item">
            <span class="em-label">Safari</span>
            <img src="icons/safari.svg" alt="Safari">
        </button>

        <button class="em-dock-item">
            <span class="em-label">Mail</span>
            <img src="icons/mail.svg" alt="Mail">
        </button>

        <button class="em-dock-item">
            <span class="em-label">Photos</span>
            <img src="icons/photos.svg" alt="Photos">
        </button>

        <button class="em-dock-item">
            <span class="em-label">Music</span>
            <img src="icons/music.svg" alt="Music">
        </button>

        <button class="em-dock-item">
            <span class="em-label">Settings</span>
            <img src="icons/settings.svg" alt="Settings">
        </button>

    </div>

</body>
</html>
