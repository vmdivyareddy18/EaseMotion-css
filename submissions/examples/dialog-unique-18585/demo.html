<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="launchBtn">Launch Dialog</button>
  
  <dialog id="nativeDialog">
    <div class="modal-content">
      <h2>Modal Title</h2>
      <p>This is a native dialog implementation.</p>
      <button id="dismissBtn">Dismiss</button>
    </div>
  </dialog>

  <script>
    const dialog = document.getElementById('nativeDialog');
    document.getElementById('launchBtn').onclick = () => dialog.showModal();
    document.getElementById('dismissBtn').onclick = () => dialog.close();
  </script>
</body>
</html>
