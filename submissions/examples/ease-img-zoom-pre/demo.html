<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Zoom on Hover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h2>Product Cards — Hover to zoom</h2>

    <div class="product-card">
      <div class="product-img-wrap ease-img-zoom">
        <img src="https://picsum.photos/seed/shoes/200/160" alt="Product" />
      </div>
      <div class="product-info">
        <p class="product-name">Running Shoes</p>
        <p class="product-price">$89.00</p>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-wrap ease-img-zoom-slow">
        <img src="https://picsum.photos/seed/watch/200/160" alt="Product" />
      </div>
      <div class="product-info">
        <p class="product-name">Smart Watch</p>
        <p class="product-price">$199.00</p>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-wrap ease-img-zoom-overlay">
        <img src="https://picsum.photos/seed/bag/200/160" alt="Product" />
      </div>
      <div class="product-info">
        <p class="product-name">Leather Bag</p>
        <p class="product-price">$149.00</p>
      </div>
    </div>

  </div>

  <div class="card">
    <h2>Portfolio Grid — Hover to zoom</h2>

    <div class="portfolio-card">
      <div class="ease-img-zoom" style="height:160px;">
        <img src="https://picsum.photos/seed/design/200/160" alt="Portfolio" />
      </div>
      <div class="portfolio-label">UI Design</div>
    </div>

    <div class="portfolio-card">
      <div class="ease-img-zoom-overlay" style="height:160px;">
        <img src="https://picsum.photos/seed/photo/200/160" alt="Portfolio" />
      </div>
      <div class="portfolio-label">Photography</div>
    </div>

    <div class="portfolio-card">
      <div class="ease-img-zoom-slow" style="height:160px;">
        <img src="https://picsum.photos/seed/brand/200/160" alt="Portfolio" />
      </div>
      <div class="portfolio-label">Branding</div>
    </div>

  </div>

</body>
</html>
