<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Web 3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="info-card">

        <h2>Accessibility Settings</h2>

        <p>
            Manage accessibility preferences with a responsive 3D flip modal built using pure HTML and CSS.
        </p>

        <a href="#modal" class="btn">
            Open Settings
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">
            Accessibility Preferences
        </h2>

        <div class="options">

            <div class="option">
                <span>🔊 Screen Reader</span>
                <strong>Enabled</strong>
            </div>

            <div class="option">
                <span>🔠 Large Text</span>
                <strong>125%</strong>
            </div>

            <div class="option">
                <span>🎨 High Contrast</span>
                <strong>On</strong>
            </div>

            <div class="option">
                <span>⌨ Keyboard Navigation</span>
                <strong>Enabled</strong>
            </div>

        </div>

        <button class="action-btn">
            Save Preferences
        </button>

    </div>

</div>

</body>
</html>
