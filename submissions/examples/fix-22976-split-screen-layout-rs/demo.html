<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Animated Split Screen Layout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="split-container">
        <div class="split-pane pane-left">
            <div class="pane-content">
                <h2>Designer</h2>
                <p>Crafting pixel-perfect experiences</p>
                <button class="pane-btn">Explore</button>
            </div>
            <div class="pane-overlay"></div>
        </div>
        <div class="split-pane pane-right">
            <div class="pane-content">
                <h2>Developer</h2>
                <p>Building robust scalable systems</p>
                <button class="pane-btn">Explore</button>
            </div>
            <div class="pane-overlay"></div>
        </div>
    </div>
</body>
</html>
