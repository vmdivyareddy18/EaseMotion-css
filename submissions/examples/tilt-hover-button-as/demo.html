<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Catalog Tilt Hover Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="catalog-card">
    <div class="product-preview">
      <div class="abstract-device">
        <div class="device-band"></div>
        <div class="device-cup left"></div>
        <div class="device-cup right"></div>
      </div>
      <div class="glow-ring"></div>
    </div>
    
    <div class="product-info">
      <span class="product-category">LIFESTYLE / AUDIO</span>
      <h2 class="product-title">AERO-CONDUCTION HEADPHONES</h2>
      <p class="product-price">$199.00</p>
      
      <div class="tilt-button-wrapper">
        <div class="tilt-zone top-left"></div>
        <div class="tilt-zone top-right"></div>
        <div class="tilt-zone bottom-left"></div>
        <div class="tilt-zone bottom-right"></div>
        
        <button class="tilt-btn" aria-label="Add Aero-Conduction Headphones to shopping bag">
          <span class="btn-text">ADD TO BAG</span>
          <span class="btn-glint"></span>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
