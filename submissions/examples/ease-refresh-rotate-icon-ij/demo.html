<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Refresh Rotate Icon - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rri-wrapper">
    <h1>Refresh Rotate Icon</h1>

    <div class="rri-cards">
      <div class="rri-card">
        <h2>Simple Refresh</h2>
        <p>Click to spin 360°</p>
        <div class="rri-icon-wrapper" data-type="simple">
          <svg class="rri-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </div>
        <span class="rri-label">Refresh</span>
      </div>

      <div class="rri-card">
        <h2>Loading State</h2>
        <p>Continuous spin during loading</p>
        <div class="rri-icon-wrapper" data-type="loading">
          <svg class="rri-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          <svg class="rri-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <button class="rri-btn" data-action="loading">Refresh Data</button>
      </div>

      <div class="rri-card">
        <h2>Auto Refresh</h2>
        <p>Continuous spinning indicator</p>
        <div class="rri-icon-wrapper" data-type="auto">
          <svg class="rri-icon rri-spin-continuous" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
        </div>
        <span class="rri-label rri-label-auto">Auto-refreshing...</span>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var simpleWrappers = document.querySelectorAll('[data-type="simple"]');
      simpleWrappers.forEach(function(w) {
        w.addEventListener('click', function() {
          var icon = w.querySelector('.rri-icon');
          icon.classList.remove('rri-spin-once');
          void icon.offsetWidth;
          icon.classList.add('rri-spin-once');
        });
      });

      var loadingBtn = document.querySelector('[data-action="loading"]');
      var loadingWrapper = document.querySelector('[data-type="loading"]');
      if (loadingBtn && loadingWrapper) {
        var icon = loadingWrapper.querySelector('.rri-icon');
        var check = loadingWrapper.querySelector('.rri-check');
        loadingBtn.addEventListener('click', function() {
          icon.classList.add('rri-spin-continuous');
          loadingBtn.disabled = true;
          loadingBtn.textContent = 'Loading...';
          check.classList.remove('rri-check-show');
          setTimeout(function() {
            icon.classList.remove('rri-spin-continuous');
            check.classList.add('rri-check-show');
            loadingBtn.textContent = 'Refresh Data';
            loadingBtn.disabled = false;
          }, 2000);
        });
      }
    })();
  </script>
</body>
</html>
