<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backdrop Blur Appear — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Backdrop Blur Appear</h1>
  <p class="subtitle">Backdrop blur overlay appears on hover — pure CSS.</p>
  <section>
    <h2>Demo</h2>
    <p class="sec-desc">Hover the card to see the backdrop blur effect</p>
    <div class="backdrop-card"><div class="backdrop-overlay"><p>Blurred backdrop</p></div></div>
  </section>
  <section>
    <h2>How It Works</h2>
    <p>An overlay with <code>backdrop-filter: blur()</code> fades in on hover using <code>opacity</code> transition.</p>
  </section>
</body>
</html>
