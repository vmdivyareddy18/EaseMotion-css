<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Multi Step Form Progress</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Multi Step Progress</h1>

<div class="progress">

<div class="line"></div>

<div class="step completed">
<div class="circle">✓</div>
<p>Account</p>
</div>

<div class="step completed">
<div class="circle">✓</div>
<p>Profile</p>
</div>

<div class="step active">
<div class="circle">3</div>
<p>Payment</p>
</div>

<div class="step">
<div class="circle">4</div>
<p>Finish</p>
</div>

</div>

</div>

</body>
</html>
