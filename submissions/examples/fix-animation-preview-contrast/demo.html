<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Preview Contrast Fix | EaseMotion CSS</title>
  
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background: var(--ease-color-bg, #f8fafc);
      padding: 4rem 2rem;
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      color: var(--ease-color-text, #1e293b);
      transition: background-color 0.3s, color 0.3s;
    }

    [data-theme="dark"] {
      background-color: #0b1121;
      color: #e2e8f0;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }

    .demo-header h1 {
      font-size: 2.5rem;
      font-weight: 800;
    }

    .theme-toggle {
      margin-bottom: 2rem;
      text-align: center;
    }

    .label {
      display: block;
      font-size: 0.875rem;
      color: var(--ease-color-muted);
      margin-bottom: 1rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    /* Simulate the problematic old design */
    .problematic-box {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      width: 100%;
      border-radius: 0.5rem;
      font-weight: 600;
      /* Hardcoded to show the blending issue */
      background: transparent; 
      border: 1px solid transparent;
      color: inherit;
    }
  </style>
</head>
<body>

  <div class="theme-toggle">
    <button class="ease-btn ease-btn-primary" onclick="toggleTheme()">Toggle Dark/Light Mode</button>
  </div>

  <div class="demo-header">
    <h1>Preview Contrast Fix</h1>
    <p>Addressing issue #7755 where preview shapes blend into backgrounds.</p>
  </div>

  <div class="preview-demo-grid">
    
    <!-- Problematic Representation -->
    <div class="preview-demo-card">
      <span class="label" style="color: var(--ease-color-danger)">Before (Blends In)</span>
      <div class="problematic-box">
        <span class="ease-bounce" style="display:inline-block">ease-bounce</span>
      </div>
    </div>

    <!-- Fixed Representation -->
    <div class="preview-demo-card">
      <span class="label" style="color: var(--ease-color-success)">After (High Contrast)</span>
      <div class="animation-preview-box-fixed">
        <span class="ease-bounce" style="display:inline-block">ease-bounce</span>
      </div>
    </div>

  </div>

  <script>
    function toggleTheme() {
      const root = document.documentElement;
      const current = root.getAttribute('data-theme');
      root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }
  </script>

</body>
</html>
