<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTL Animation Demo</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>RTL-Friendly Animation Demo</h1>

<section>

<h2>Left-to-Right</h2>

<div class="container" dir="ltr">
    <div class="box">LTR</div>
</div>

</section>

<section>

<h2>Right-to-Left</h2>

<div class="container rtl" dir="rtl">
    <div class="box">RTL</div>
</div>

</section>

</body>
</html>
