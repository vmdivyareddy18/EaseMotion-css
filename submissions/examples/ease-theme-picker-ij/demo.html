<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tp-container">
  <h1>🎨 Theme Picker</h1>
  <p class="tp-subtitle">Click a swatch to preview the theme with a smooth transition</p>

  <div class="tp-swatches">
    <button class="tp-swatch" data-theme="light" style="background:#f5f0eb;border-color:#d4c9c0" title="Light"></button>
    <button class="tp-swatch" data-theme="dark" style="background:#1e1e2e;border-color:#45475a" title="Dark"></button>
    <button class="tp-swatch" data-theme="ocean" style="background:#0a3d62;border-color:#3dc1d3" title="Ocean"></button>
    <button class="tp-swatch" data-theme="forest" style="background:#2d5a27;border-color:#81b29a" title="Forest"></button>
    <button class="tp-swatch" data-theme="sunset" style="background:#e07a5f;border-color:#f2cc8f" title="Sunset"></button>
    <button class="tp-swatch" data-theme="lavender" style="background:#6c5ce7;border-color:#a29bfe" title="Lavender"></button>
  </div>

  <div class="tp-custom">
    <label for="customColor">Custom color:</label>
    <input type="color" id="customColor" value="#6c5ce7">
  </div>

  <div class="tp-preview">
    <div class="tp-card">
      <div class="tp-card-header">Preview Card</div>
      <div class="tp-card-body">
        <p>This card transitions smoothly when you pick a new theme.</p>
        <button class="tp-btn">Button</button>
      </div>
    </div>
  </div>
</div>

<script>
const themes = {
  light: { bg: '#f5f0eb', card: '#ffffff', text: '#3a3a3a', accent: '#d4a373', btn: '#d4a373', heading: '#2a2a2a', body: '#f5f0eb' },
  dark: { bg: '#1e1e2e', card: '#313244', text: '#cdd6f4', accent: '#89b4fa', btn: '#89b4fa', heading: '#cdd6f4', body: '#1e1e2e' },
  ocean: { bg: '#0a3d62', card: '#1a5276', text: '#dff9fb', accent: '#3dc1d3', btn: '#3dc1d3', heading: '#c7ecee', body: '#0a3d62' },
  forest: { bg: '#2d5a27', card: '#3d7a35', text: '#e9f5db', accent: '#81b29a', btn: '#81b29a', heading: '#f4f1de', body: '#2d5a27' },
  sunset: { bg: '#e07a5f', card: '#f4f1de', text: '#3d405b', accent: '#f2cc8f', btn: '#e07a5f', heading: '#3d405b', body: '#e07a5f' },
  lavender: { bg: '#6c5ce7', card: '#a29bfe', text: '#2d3436', accent: '#fd79a8', btn: '#fd79a8', heading: '#2d3436', body: '#6c5ce7' }
};

document.querySelectorAll('.tp-swatch').forEach(swatch => {
  swatch.addEventListener('click', () => applyTheme(themes[swatch.dataset.theme]));
});

document.getElementById('customColor').addEventListener('input', e => {
  applyTheme({ bg: e.target.value, card: '#ffffff', text: '#333333', accent: e.target.value, btn: e.target.value, heading: '#222222', body: e.target.value });
});

function applyTheme(t) {
  const r = document.documentElement;
  r.style.setProperty('--tp-bg', t.bg);
  r.style.setProperty('--tp-card-bg', t.card);
  r.style.setProperty('--tp-text', t.text);
  r.style.setProperty('--tp-accent', t.accent);
  r.style.setProperty('--tp-btn-bg', t.btn);
  r.style.setProperty('--tp-heading', t.heading);
  r.style.setProperty('--tp-body-bg', t.body);
  document.body.style.background = t.bg;
}
</script>
</body>
</html>
