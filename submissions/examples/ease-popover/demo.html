<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-popover Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      min-height: 100vh;
      background: #f8fafc;
    }
    h2 { color: #7c3aed; }
    .row {
      display: flex;
      gap: 4rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>

  <h2>ease-popover Component</h2>
  <p style="color:#64748b">Click buttons to toggle popovers</p>

  <div class="row">

    <!-- Top -->
    <div class="ease-popover-wrapper">
      <button class="ease-btn ease-btn-primary"
        onclick="toggle('pop-top')">Top</button>
      <div class="ease-popover ease-popover-top" id="pop-top">
        <div class="ease-popover-body">This popover appears on top with an arrow pointer.</div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="ease-popover-wrapper">
      <button class="ease-btn ease-btn-primary"
        onclick="toggle('pop-bottom')">Bottom</button>
      <div class="ease-popover ease-popover-bottom" id="pop-bottom">
        <div class="ease-popover-body">This popover appears on bottom with an arrow pointer.</div>
      </div>
    </div>

    <!-- Left -->
    <div class="ease-popover-wrapper">
      <button class="ease-btn ease-btn-primary"
        onclick="toggle('pop-left')">Left</button>
      <div class="ease-popover ease-popover-left" id="pop-left">
        <div class="ease-popover-body">This popover appears on the left.</div>
      </div>
    </div>

    <!-- Right -->
    <div class="ease-popover-wrapper">
      <button class="ease-btn ease-btn-primary"
        onclick="toggle('pop-right')">Right</button>
      <div class="ease-popover ease-popover-right" id="pop-right">
        <div class="ease-popover-body">This popover appears on the right.</div>
      </div>
    </div>

  </div>

  <script>
    function toggle(id) {
      const pop = document.getElementById(id);
      pop.classList.toggle('ease-visible');
    }

    // Close on outside click
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.ease-popover-wrapper')) {
        document.querySelectorAll('.ease-popover').forEach(p => {
          p.classList.remove('ease-visible');
        });
      }
    });
  </script>

</body>
</html>
