<!DOCTYPE html>
<!-- submissions/examples/ease-snowfall/demo.html -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snowfall Animation - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Information Context Overlay -->
  <div style="text-align: center; color: #94a3b8; user-select: none;">
    <h1 style="color: #ffffff; font-weight: 800; font-size: 2.5rem; margin: 0 0 0.5rem 0; letter-spacing: -0.03em;">Arctic Snowfall</h1>
    <p style="margin: 0; font-size: 1rem;">Pure CSS infinite atmospheric particle drift simulation.</p>
  </div>

  <!-- THE SYSTEM SNOW CANVAS BOUNDS -->
  <div class="snowfall-container">
    <!-- Randomized spacing assignments mapped safely across the viewport width horizon -->
    <div class="ease-snowfall-flake" style="left: 5%;"></div>
    <div class="ease-snowfall-flake" style="left: 15%;"></div>
    <div class="ease-snowfall-flake" style="left: 25%;"></div>
    <div class="ease-snowfall-flake" style="left: 38%;"></div>
    <div class="ease-snowfall-flake" style="left: 47%;"></div>
    <div class="ease-snowfall-flake" style="left: 55%;"></div>
    <div class="ease-snowfall-flake" style="left: 68%;"></div>
    <div class="ease-snowfall-flake" style="left: 77%;"></div>
    <div class="ease-snowfall-flake" style="left: 89%;"></div>
    <div class="ease-snowfall-flake" style="left: 95%;"></div>
  </div>

</body>
</html>
