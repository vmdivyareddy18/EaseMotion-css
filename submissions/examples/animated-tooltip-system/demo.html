<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tooltip System - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Tooltip System</h1>
      <p>Hover over the buttons to see smooth, directional tooltips in action.</p>
    </header>

    <!-- Tooltip Demos -->
    <div class="tooltip-demos">
      
      <!-- Section 1: Directional Tooltips -->
      <section class="demo-section ease-fade-in-up ease-delay-100">
        <h2>Directional Tooltips</h2>
        <div class="button-group">
          <button class="tooltip-trigger tooltip-top" data-tooltip="This tooltip appears on top">
            Top Tooltip
          </button>
          <button class="tooltip-trigger tooltip-bottom" data-tooltip="This tooltip appears below">
            Bottom Tooltip
          </button>
          <button class="tooltip-trigger tooltip-left" data-tooltip="This tooltip appears on the left">
            Left Tooltip
          </button>
          <button class="tooltip-trigger tooltip-right" data-tooltip="This tooltip appears on the right">
            Right Tooltip
          </button>
        </div>
      </section>

      <!-- Section 2: Styled Tooltips -->
      <section class="demo-section ease-fade-in-up ease-delay-200">
        <h2>Styled Variations</h2>
        <div class="button-group">
          <button class="tooltip-trigger tooltip-top tooltip-dark" data-tooltip="Dark theme tooltip">
            Dark Style
          </button>
          <button class="tooltip-trigger tooltip-top tooltip-light" data-tooltip="Light theme tooltip">
            Light Style
          </button>
          <button class="tooltip-trigger tooltip-top tooltip-success" data-tooltip="Success message!">
            Success
          </button>
          <button class="tooltip-trigger tooltip-top tooltip-warning" data-tooltip="Warning: Be careful!">
            Warning
          </button>
          <button class="tooltip-trigger tooltip-top tooltip-error" data-tooltip="Error: Something went wrong">
            Error
          </button>
        </div>
      </section>

      <!-- Section 3: Interactive Elements -->
      <section class="demo-section ease-fade-in-up ease-delay-300">
        <h2>Interactive Elements</h2>
        <div class="interactive-demo">
          <div class="icon-button tooltip-trigger tooltip-top" data-tooltip="Add to favorites">
            ❤️
          </div>
          <div class="icon-button tooltip-trigger tooltip-top" data-tooltip="Share this content">
            📤
          </div>
          <div class="icon-button tooltip-trigger tooltip-top" data-tooltip="Download file">
            📥
          </div>
          <div class="icon-button tooltip-trigger tooltip-top" data-tooltip="More options">
            ⋮
          </div>
        </div>
      </section>

      <!-- Section 4: Form Help -->
      <section class="demo-section ease-fade-in-up ease-delay-400">
        <h2>Form Field Help</h2>
        <div class="form-demo">
          <div class="form-field">
            <label>Username</label>
            <span class="help-icon tooltip-trigger tooltip-right" data-tooltip="Choose a unique username (3-20 characters)">❓</span>
            <input type="text" placeholder="Enter username">
          </div>
          <div class="form-field">
            <label>Password</label>
            <span class="help-icon tooltip-trigger tooltip-right" data-tooltip="Must contain at least 8 characters, 1 number, and 1 special character">❓</span>
            <input type="password" placeholder="Enter password">
          </div>
        </div>
      </section>

    </div>
  </div>
</body>
</html>
