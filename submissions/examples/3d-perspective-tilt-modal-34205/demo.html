<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Perspective Tilt Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="tilt-sandbox-container">

  <!-- Pure CSS State Controller Checkbox -->
  <input type="checkbox" id="tilt-toggle">

  <!-- Launch Anchor UI element -->
  <button class="tilt-trigger-btn" onclick="document.getElementById('tilt-toggle').checked = true">
    Launch 3D Interface
  </button>

  <!-- Interactive Modal Wrapper viewport -->
  <div class="tilt-overlay">
    <div class="tilt-modal-card">
      <label for="tilt-toggle" class="tilt-close-label" onclick="document.getElementById('tilt-toggle').checked = false">×</label>
      
      <!-- Extruded content matrix -->
      <div class="tilt-depth-content">
        <h3>Interactive Space Workspace</h3>
        <p>Experience seamless interface presentation metrics. This structural layout module relies entirely on CSS transform-style coordinates to achieve perspective scaling without loading script packages.</p>
        
        <div class="tilt-action-row">
          <button class="tilt-btn-primary" onclick="document.getElementById('tilt-toggle').checked = false">Confirm Option</button>
          <button class="tilt-btn-secondary" onclick="document.getElementById('tilt-toggle').checked = false">Dismiss</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
