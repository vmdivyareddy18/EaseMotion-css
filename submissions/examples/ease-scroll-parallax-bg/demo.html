<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Scroll Parallax - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="scroll-spacer">
    Scroll Down Slowly
  </div>

  <div class="parallax-container">
    <div class="ease-scroll-parallax-bg"></div>

    <div class="parallax-content">
      <h1>Pure CSS Parallax</h1>
      <p>No JavaScript dependencies. Zero main-thread overhead. Native <span>60fps hardware accelerated</span> tracking curves.</p>
    </div>
  </div>

  <div class="scroll-spacer">
    End of Showcase
  </div>

</body>
</html>
