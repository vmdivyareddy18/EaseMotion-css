<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Backdrop Blur Large</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Backdrop Blur LG</h1>
    <p class="subtitle">Heavy <code>blur(24px)</code> for strong glassmorphism. Toggle between blur levels below.</p>
    <div class="display-area" style="padding:1rem;">
      <div class="blur-demo-bg">
        <div class="blur-panel ease-backdrop-blur-lg" id="blurPanel" style="background:rgba(255,255,255,0.06);">
          <h3>Heavy Blur</h3>
          <p>backdrop-filter: blur(24px) — strong frosted glass effect</p>
        </div>
      </div>
    </div>
    <div class="blur-label">Current blur: <span id="blurValue">24px</span></div>
    <div style="margin-top:0.75rem;display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
      <button class="blur-btn" data-blur="0">No blur</button>
      <button class="blur-btn" data-blur="8">8px</button>
      <button class="blur-btn" data-blur="16">16px</button>
      <button class="blur-btn active" data-blur="24">24px (lg)</button>
      <button class="blur-btn" data-blur="40">40px</button>
    </div>
  </div>
  <script>
    const blurPanel = document.getElementById('blurPanel');
    const blurValue = document.getElementById('blurValue');
    document.querySelectorAll('.blur-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.blur-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const b = btn.dataset.blur;
        blurPanel.style.backdropFilter = 'blur(' + b + 'px)';
        blurPanel.style.webkitBackdropFilter = 'blur(' + b + 'px)';
        blurValue.textContent = b + 'px';
      });
    });
  </script>
</body>
</html>
