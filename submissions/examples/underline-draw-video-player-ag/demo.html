<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Underline Draw Video Player - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="ease-flex ease-flex-col ease-center"
  style="min-height: 100vh; padding: var(--ease-space-8); background-color: var(--ease-color-bg);">

  <main class="ud-video-player ease-flex ease-flex-col ease-stack-lg">
    <div class="ease-text-center">
      <h2
        style="font-weight: 300; letter-spacing: 0.1em; text-transform: uppercase; font-size: var(--ease-text-xl); color: var(--ease-color-text); margin-bottom: var(--ease-space-4);">
        Underline Draw Video Player
      </h2>
    </div>
    <div class="ud-video-container" id="playerContainer">
      <video class="ud-video-element" id="videoElement" loop muted playsinline preload="metadata">
        <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
          type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <div class="ud-play-overlay" id="playOverlay" role="button" aria-label="Toggle Play/Pause" tabindex="0">
        <button class="ud-play-btn" id="playBtn" aria-label="Play video" tabindex="-1">
          <span class="ud-play-icon">

            <svg id="playIcon" viewBox="0 0 24 24" width="24" height="24">
              <path d="M8 5v14l11-7z" />
            </svg>

            <svg id="pauseIcon" viewBox="0 0 24 24" width="24" height="24" style="display: none;">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
          </span>
          <span class="ud-play-btn-text" id="playBtnText">Play</span>
        </button>
      </div>
    </div>
  </main>

  <script>
    const playerContainer = document.getElementById('playerContainer');
    const video = document.getElementById('videoElement');
    const playOverlay = document.getElementById('playOverlay');
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const pauseIcon = document.getElementById('pauseIcon');
    const playBtnText = document.getElementById('playBtnText');

    function togglePlayback() {
      if (video.paused) {
        video.play().then(() => {
          playerContainer.classList.add('is-playing');
          playIcon.style.display = 'none';
          pauseIcon.style.display = 'inline';
          playBtnText.textContent = 'Pause';
        }).catch(err => {
          console.warn("Autoplay/play failed: ", err);
        });
      } else {
        video.pause();
        playerContainer.classList.remove('is-playing');
        playIcon.style.display = 'inline';
        pauseIcon.style.display = 'none';
        playBtnText.textContent = 'Play';
      }
    }

    playOverlay.addEventListener('click', (e) => {
      togglePlayback();
    });

    playOverlay.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        togglePlayback();
      }
    });
  </script>
</body>

</html>
