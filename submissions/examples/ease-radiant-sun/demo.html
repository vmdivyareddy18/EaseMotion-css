<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiant Sun</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Radiant Sun</h2>
    <div class="sun">
      <div class="ray" style="--r:0deg"></div>
      <div class="ray" style="--r:45deg"></div>
      <div class="ray" style="--r:90deg"></div>
      <div class="ray" style="--r:135deg"></div>
      <div class="ray" style="--r:180deg"></div>
      <div class="ray" style="--r:225deg"></div>
      <div class="ray" style="--r:270deg"></div>
      <div class="ray" style="--r:315deg"></div>
    </div>
  </div>
</body>
</html>
