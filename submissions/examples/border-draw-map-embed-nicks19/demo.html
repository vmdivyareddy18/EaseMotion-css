<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Draw Map Embed - EaseMotion CSS</title>
  
  <!-- Import base EaseMotion framework -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  
  <!-- Import component styles -->
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: var(--ease-color-surface-muted, #f8fafc);
      font-family: var(--ease-font-sans, system-ui, sans-serif);
      margin: 0;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 800px;
      text-align: center;
    }

    .title {
      margin-bottom: 2rem;
      color: var(--ease-color-foreground, #0f172a);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1 class="title">Border Draw Map Embed</h1>
    
    <!-- Component Starts Here -->
    <div class="ease-border-draw-map-embed">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d193595.25280016463!2d-74.14448744033621!3d40.69763123331003!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x89c24fa5d33f083b%3A0xc80b8f06e177fe62!2sNew%20York%2C%20NY!5e0!3m2!1sen!2sus!4v1718000000000!5m2!1sen!2sus" 
        width="600" 
        height="450" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade"
        title="Map showing New York City"
      ></iframe>
    </div>
    <!-- Component Ends Here -->

  </div>

</body>
</html>
