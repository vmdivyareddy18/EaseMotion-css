<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Glitter Product Card Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="card-showcase">
        <article class="product-card ease-glitter" role="article" aria-labelledby="product-title">
            <!-- Decorative Glitter Layer Constructs -->
            <div class="glitter-container" aria-hidden="true">
                <div class="glitter-sweep"></div>
                <div class="glitter-sparkles">
                    <!-- Pure CSS SVG Star Cluster Layout -->
                    <svg class="sparkle-svg s-1" viewBox="0 0 24 24"><path fill="currentColor" d="M12,0L14.6,9.4L24,12L14.6,14.6L12,24L9.4,14.6L0,12L9.4,9.4Z"/></svg>
                    <svg class="sparkle-svg s-2" viewBox="0 0 24 24"><path fill="currentColor" d="M12,0L14.6,9.4L24,12L14.6,14.6L12,24L9.4,14.6L0,12L9.4,9.4Z"/></svg>
                    <svg class="sparkle-svg s-3" viewBox="0 0 24 24"><path fill="currentColor" d="M12,0L14.6,9.4L24,12L14.6,14.6L12,24L9.4,14.6L0,12L9.4,9.4Z"/></svg>
                </div>
            </div>

            <div class="badge-wrapper">
                <span class="retro-badge">LE MINT</span>
            </div>

            <div class="product-image-frame">
                <img src="https://picsum.photos/400/400?random=42" alt="Retro Gaming Headset styled with synthwave neon highlights" class="product-img">
                <div class="frame-scanline"></div>
            </div>

            <section class="product-info">
                <header class="info-header">
                    <h2 id="product-title">Cosmic Sound 8-Bit</h2>
                    <div class="rating-block" aria-label="Rating: 4.9 out of 5 stars from 124 retail buyers">
                        <span class="stars-gold" aria-hidden="true">★★★★★</span>
                        <span class="rating-number">(4.9)</span>
                    </div>
                </header>

                <p class="product-description">
                    Immersive pixel-perfect acoustic balance engineered with vintage physical sound wave processors and retro neodymium custom drivers.
                </p>

                <div class="purchase-action-row">
                    <div class="price-container">
                        <span class="price-currency" aria-hidden="true">$</span>
                        <span class="price-value">79.99</span>
                    </div>
                    <a href="javascript:void(0)" class="btn-buy" aria-label="Purchase Cosmic Sound 8-Bit headphones instantly">
                        <span>BUY NOW</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="9" cy="21" r="1"></circle>
                            <circle cx="20" cy="21" r="1"></circle>
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                        </svg>
                    </a>
                </div>
            </section>
        </article>
    </main>

</body>
</html>
