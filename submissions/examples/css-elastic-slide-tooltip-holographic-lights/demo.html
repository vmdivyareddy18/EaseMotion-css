<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Slide Tooltip - Holographic Light</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">
    <h1>Holographic Light Tooltip</h1>

    <div class="tooltip-wrapper">
      <button class="tooltip-trigger" aria-describedby="tooltip">
        Hover Me
      </button>

      <div class="tooltip" id="tooltip" role="tooltip">
        ✨ Futuristic holographic tooltip with elastic slide animation
      </div>
    </div>

  </main>

</body>
</html>
