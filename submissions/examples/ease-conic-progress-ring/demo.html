<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Conic Progress Rings | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <h2>Conic Progress Rings</h2>
    <p>Pure CSS animated circular progress using <code>conic-gradient</code> and <code>@property</code>.</p>
    
    <div class="rings-grid">
      <!-- Style 1: Solid Color -->
      <div class="ease-conic-progress animate-75">
        <span class="ease-conic-progress__value">75%</span>
      </div>
      
      <!-- Style 2: Gradient -->
      <div class="ease-conic-progress ease-conic-progress--gradient animate-90">
        <span class="ease-conic-progress__value">90%</span>
      </div>

      <!-- Style 3: Track Background -->
      <div class="ease-conic-progress ease-conic-progress--track animate-45">
        <span class="ease-conic-progress__value">45%</span>
      </div>
    </div>
    
    <button class="replay-btn" onclick="replayAnimations()">Replay Animations</button>
  </div>

  <script>
    // JS used ONLY for the replay button demo logic, not the animation itself
    function replayAnimations() {
      const rings = document.querySelectorAll('.ease-conic-progress');
      rings.forEach(ring => {
        const currentAnimation = ring.style.animation;
        ring.style.animation = 'none';
        ring.offsetHeight; /* trigger reflow */
        ring.style.animation = currentAnimation; 
      });
    }
  </script>
</body>
</html>
