<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Giant Stomp Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 20vh;
      min-height: 100vh;
      background-color: #d1fae5;
      font-family: sans-serif;
      margin: 0;
      overflow: hidden;
      box-sizing: border-box;
      border-bottom: 8px solid #065f46;
    }
    
    .demo-foot {
      font-size: 6rem;
      cursor: pointer;
      display: inline-block;
    }
    
    .instruction {
      position: absolute;
      top: 2rem;
      color: #064e3b;
      font-size: 1.25rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  
  <p class="instruction">Hover over the boot to feel the Giant's Stomp!</p>

  <!-- The hover variant makes it interactive -->
  <div class="ease-giant-stomp-hover-ps demo-foot">
    👢
  </div>

</body>
</html>
