<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JSON Formatter Tree | EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="component-wrapper">
    <div class="tree-card">
      <div class="tree-card__header">
        <h2 class="tree-card__title">JSON Tree</h2>
        <div class="tree-card__controls">
          <button class="tree-card__ctrl-btn" id="collapseAll">Collapse All</button>
          <button class="tree-card__ctrl-btn" id="expandAll">Expand All</button>
        </div>
      </div>
      <div class="json-tree" id="jsonTree"></div>
    </div>
  </div>
  <script>
    const sample = {
      name: "EaseMotion",
      version: "1.0.0",
      contributors: [
        { name: "Alex Rivera", role: "Lead", active: true },
        { name: "Jordan Chen", role: "Developer", active: true }
      ],
      config: {
      theme: { dark: true, accent: "#7c5cfc" },
        animations: {
          enabled: true,
          duration: 300,
          easing: "ease-in-out"
        }
      },
      meta: null
    };

    const treeEl = document.getElementById('jsonTree');
    const collapseBtn = document.getElementById('collapseAll');
    const expandBtn = document.getElementById('expandAll');

    function typeLabel(val) {
      if (val === null) return 'null';
      if (Array.isArray(val)) return 'array';
      return typeof val;
    }

    function createNode(key, value, depth = 0) {
      const li = document.createElement('li');
      li.className = 'json-tree__node';
      li.style.setProperty('--depth', depth);

      if (value !== null && typeof value === 'object') {
        const isArray = Array.isArray(value);
        const entries = isArray ? value : Object.keys(value);
        const toggle = document.createElement('span');
        toggle.className = 'json-tree__toggle json-tree__toggle--open';
        toggle.textContent = '▾';
        li.appendChild(toggle);

        const keySpan = document.createElement('span');
        keySpan.className = 'json-tree__key';
        const openBracket = isArray ? '[' : '{';
        const closeBracket = isArray ? ']' : '}';
        keySpan.textContent = key !== null ? `"${key}": ${openBracket}` : openBracket;
        li.appendChild(keySpan);

        const count = document.createElement('span');
        count.className = 'json-tree__count';
        count.textContent = ` ${entries.length} ${isArray ? 'items' : 'keys'} `;
        li.appendChild(count);

        const br = document.createElement('br');
        li.appendChild(br);

        const childUl = document.createElement('ul');
        childUl.className = 'json-tree__children';

        if (isArray) {
          value.forEach((item, i) => {
            childUl.appendChild(createNode(i, item, depth + 1));
          });
        } else {
          Object.keys(value).forEach(k => {
            childUl.appendChild(createNode(k, value[k], depth + 1));
          });
        }

        const closeLi = document.createElement('li');
        closeLi.className = 'json-tree__node json-tree__close-line';
        closeLi.style.setProperty('--depth', depth + 1);
        closeLi.textContent = closeBracket;
        childUl.appendChild(closeLi);

        li.appendChild(childUl);

        toggle.addEventListener('click', () => {
          const isOpen = toggle.classList.contains('json-tree__toggle--open');
          toggle.classList.toggle('json-tree__toggle--open', !isOpen);
          toggle.classList.toggle('json-tree__toggle--closed', isOpen);
          childUl.classList.toggle('json-tree__children--collapsed', isOpen);
        });
      } else {
        const valStr = value === null ? 'null' : typeof value === 'string' ? `"${value}"` : String(value);
        const valClass = value === null ? 'json-tree__null' : typeof value === 'string' ? 'json-tree__string' : typeof value === 'number' ? 'json-tree__number' : 'json-tree__bool';
        if (key !== null) {
          const keySpan = document.createElement('span');
          keySpan.className = 'json-tree__key';
          keySpan.textContent = `"${key}": `;
          li.appendChild(keySpan);
        }
        const valSpan = document.createElement('span');
        valSpan.className = `json-tree__value ${valClass}`;
        valSpan.textContent = valStr;
        li.appendChild(valSpan);
        const typeSpan = document.createElement('span');
        typeSpan.className = 'json-tree__type';
        typeSpan.textContent = ` // ${typeLabel(value)}`;
        li.appendChild(typeSpan);
      }

      return li;
    }

    function render(json) {
      treeEl.innerHTML = '';
      const ul = document.createElement('ul');
      ul.className = 'json-tree__root';
      ul.appendChild(createNode(null, json, 0));
      treeEl.appendChild(ul);
    }

    function toggleAll(expand) {
      document.querySelectorAll('.json-tree__children').forEach(el => {
        if (expand) {
          el.classList.remove('json-tree__children--collapsed');
        } else {
          el.classList.add('json-tree__children--collapsed');
        }
      });
      document.querySelectorAll('.json-tree__toggle').forEach(el => {
        el.classList.toggle('json-tree__toggle--open', expand);
        el.classList.toggle('json-tree__toggle--closed', !expand);
      });
    }

    collapseBtn.addEventListener('click', () => toggleAll(false));
    expandBtn.addEventListener('click', () => toggleAll(true));
    render(sample);
  </script>
</body>
</html>
