<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Gradient · Ease Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ag-container">
    <div class="ag-gradient" id="gradient"></div>
    <div class="ag-overlay">
      <h1>Animated Gradient</h1>
      <p>A smooth shifting gradient background with interactive controls</p>

      <div class="ag-controls">
        <div class="ag-control-group">
          <label>Palette</label>
          <div class="ag-palettes">
            <button class="ag-palette-btn active" data-palette="sunset">Sunset</button>
            <button class="ag-palette-btn" data-palette="ocean">Ocean</button>
            <button class="ag-palette-btn" data-palette="forest">Forest</button>
            <button class="ag-palette-btn" data-palette="neon">Neon</button>
          </div>
        </div>

        <div class="ag-control-group">
          <label>Speed <span id="speedLabel">3s</span></label>
          <input type="range" id="speedSlider" min="1" max="10" step="1" value="3" />
        </div>

        <div class="ag-control-group">
          <label>Angle <span id="angleLabel">45°</span></label>
          <input type="range" id="angleSlider" min="0" max="360" step="5" value="45" />
        </div>

        <button class="ag-play-btn" id="playBtn">Pause</button>
      </div>
    </div>
  </div>

  <script>
    const gradient = document.getElementById('gradient');
    const speedSlider = document.getElementById('speedSlider');
    const angleSlider = document.getElementById('angleSlider');
    const speedLabel = document.getElementById('speedLabel');
    const angleLabel = document.getElementById('angleLabel');
    const playBtn = document.getElementById('playBtn');
    const paletteBtns = document.querySelectorAll('.ag-palette-btn');

    const palettes = {
      sunset: ['#ff6b6b', '#feca57', '#ff9ff3'],
      ocean:  ['#48dbfb', '#0abde3', '#1dd1a1'],
      forest: ['#2ecc71', '#27ae60', '#f1c40f'],
      neon:   ['#f368e0', '#ee5a24', '#ffc312']
    };

    paletteBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        paletteBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const [c1, c2, c3] = palettes[btn.dataset.palette];
        document.documentElement.style.setProperty('--ag-color-1', c1);
        document.documentElement.style.setProperty('--ag-color-2', c2);
        document.documentElement.style.setProperty('--ag-color-3', c3);
      });
    });

    speedSlider.addEventListener('input', () => {
      const val = speedSlider.value;
      speedLabel.textContent = val + 's';
      document.documentElement.style.setProperty('--ag-duration', val + 's');
    });

    angleSlider.addEventListener('input', () => {
      const val = angleSlider.value;
      angleLabel.textContent = val + '°';
      document.documentElement.style.setProperty('--ag-angle', val + 'deg');
    });

    playBtn.addEventListener('click', () => {
      gradient.classList.toggle('paused');
      playBtn.textContent = gradient.classList.contains('paused') ? 'Play' : 'Pause';
    });
  </script>
</body>
</html>
