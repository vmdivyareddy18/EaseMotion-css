<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pointer Events Auto Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="pointer-sandbox-canvas">
    <h4 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.25rem;">Layered Interaction Matrix</h4>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-bottom: 1.5rem;">
      An absolute glass overlay tinted purple sits on top of this card using <code>pointer-events: none</code>. You can click right through it to select this background text or hit the link: 
      <a href="#" class="underlying-anchor-link" onclick="alert('Underlying link clicked!')">Test Link Trigger</a>.
    </p>

    <div class="click-through-overlay">
      <button class="interactive-override-btn ease-pointer-auto" onclick="alert('Interactive button clicked inside overlay!')">
        Interactive Button
      </button>
    </div>
  </div>

</body>
</html>
