<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comment Highlight Focus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="comment-section">
    <h2>Discussion</h2>

    <article class="comment" tabindex="0">
      <div class="comment-avatar">SJ</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">Srijan</span>
          <span class="comment-time">2 hours ago</span>
        </div>
        <p class="comment-text">Great work on this feature! The animation feels really smooth.</p>
        <div class="comment-actions">
          <button class="action-btn">Reply</button>
          <button class="action-btn">Like</button>
        </div>
      </div>
    </article>

    <article class="comment" tabindex="0">
      <div class="comment-avatar">AK</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">Anika</span>
          <span class="comment-time">5 hours ago</span>
        </div>
        <p class="comment-text">I noticed a small bug in the edge case handling. Let me know if you need help debugging.</p>
        <div class="comment-actions">
          <button class="action-btn">Reply</button>
          <button class="action-btn">Like</button>
        </div>
      </div>
    </article>

    <article class="comment" tabindex="0">
      <div class="comment-avatar">RM</div>
      <div class="comment-body">
        <div class="comment-meta">
          <span class="comment-author">Riya</span>
          <span class="comment-time">1 day ago</span>
        </div>
        <p class="comment-text">LGTM! Approved the PR. Let's merge this in the next release.</p>
        <div class="comment-actions">
          <button class="action-btn">Reply</button>
          <button class="action-btn">Like</button>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
