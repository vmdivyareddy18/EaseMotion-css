<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty State / Placeholder Illustration</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="empty-card">
      <div class="empty-icon">
        <svg viewBox="0 0 64 64" fill="none" width="64" height="64">
          <rect x="8" y="16" width="48" height="36" rx="6" stroke="#cbd5e1" stroke-width="2" fill="#f8fafc"/>
          <line x1="20" y1="30" x2="44" y2="30" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
          <line x1="20" y1="38" x2="38" y2="38" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
          <circle cx="48" cy="48" r="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
          <line x1="48" y1="43" x2="48" y2="53" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
          <line x1="43" y1="48" x2="53" y2="48" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h3 class="empty-title">No invoices yet</h3>
      <p class="empty-desc">When you create an invoice, it will appear here. Start by creating your first invoice.</p>
      <button class="empty-btn">Create Invoice</button>
    </div>
  </div>
</body>
</html>
