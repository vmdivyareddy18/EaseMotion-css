<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Keyboard Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-rating – Keyboard Operable Fix</h2>
  <div class="demo-stack">
    <div>
      <span class="demo-label">Rate this article:</span>
      <!-- KEY FIX: radio inputs make stars keyboard-operable and screen-reader-accessible -->
      <div class="ease-rating" role="radiogroup" aria-label="Star rating">
        <input class="ease-rating__input" type="radio" name="rating" id="star5" value="5" aria-label="5 stars">
        <label class="ease-rating__label" for="star5" title="5 stars">★</label>
        <input class="ease-rating__input" type="radio" name="rating" id="star4" value="4" aria-label="4 stars">
        <label class="ease-rating__label" for="star4" title="4 stars">★</label>
        <input class="ease-rating__input" type="radio" name="rating" id="star3" value="3" aria-label="3 stars">
        <label class="ease-rating__label" for="star3" title="3 stars">★</label>
        <input class="ease-rating__input" type="radio" name="rating" id="star2" value="2" aria-label="2 stars">
        <label class="ease-rating__label" for="star2" title="2 stars">★</label>
        <input class="ease-rating__input" type="radio" name="rating" id="star1" value="1" aria-label="1 star" checked>
        <label class="ease-rating__label" for="star1" title="1 star">★</label>
      </div>
    </div>
  </div>
  <p class="note">Tab to the stars, then use Arrow keys to change the rating. Space/Enter selects.</p>
</body>
</html>
