<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Staggered Entrance Popover - Cyberpunk Neon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Cyberpunk Neon</span>
      <h1>Staggered Entrance Popover</h1>
      <p class="subtitle">Neon glow with staggered reveals</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="cyber-btn" aria-label="Launch system">
          <span class="cyber-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
            </svg>
          </span>
          <span>Launch</span>
          <span class="cyber-line"></span>
        </button>
        <div class="stagger-popover" role="tooltip">
          <div class="stagger-glow"></div>
          <div class="stagger-header">
            <span class="stagger-status">ONLINE</span>
            <span class="stagger-signal">
              <span></span><span></span><span></span><span></span>
            </span>
          </div>
          <div class="stagger-items">
            <div class="stagger-item" style="--delay: 0.05s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="4 17 10 11 4 5"/>
                  <line x1="12" y1="19" x2="20" y2="19"/>
                </svg>
              </span>
              <span>Systems Active</span>
            </div>
            <div class="stagger-item" style="--delay: 0.1s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </span>
              <span>Security Level: MAX</span>
            </div>
            <div class="stagger-item" style="--delay: 0.15s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M12 6v6l4 2"/>
                </svg>
              </span>
              <span>Latency: 0.02ms</span>
            </div>
          </div>
          <div class="stagger-footer">
            <button class="cyber-cta">Initialize</button>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Pulse</button>
          <div class="stagger-popover pulse" role="tooltip"><p>Pulse stagger animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Glow</button>
          <div class="stagger-popover glow" role="tooltip"><p>Glow stagger animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Scan</button>
          <div class="stagger-popover scan" role="tooltip"><p>Scan stagger animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-cyan">Cyan</button>
          <div class="stagger-popover theme-cyan" role="tooltip"><p>Cyan neon theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-magenta">Magenta</button>
          <div class="stagger-popover theme-magenta" role="tooltip"><p>Magenta neon theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-lime">Lime</button>
          <div class="stagger-popover theme-lime" role="tooltip"><p>Lime neon theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
