<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Countdown Timer Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Product Launch Countdown</h1>

    <p class="subtitle">
        Countdown to the official EaseMotion CSS launch event.
    </p>

    <div class="countdown">

        <div class="time-box">

            <span id="days" class="number">00</span>

            <span class="label">Days</span>

        </div>

        <div class="time-box">

            <span id="hours" class="number">00</span>

            <span class="label">Hours</span>

        </div>

        <div class="time-box">

            <span id="minutes" class="number">00</span>

            <span class="label">Minutes</span>

        </div>

        <div class="time-box">

            <span id="seconds" class="number">00</span>

            <span class="label">Seconds</span>

        </div>

    </div>

    <button class="cta-btn">
        Register Now
    </button>

    <p id="message"></p>

</div>

<script>

const launchDate = new Date();

launchDate.setDate(launchDate.getDate()+12);

const day = document.getElementById("days");
const hour = document.getElementById("hours");
const minute = document.getElementById("minutes");
const second = document.getElementById("seconds");
const message = document.getElementById("message");

function animate(el){

    el.classList.remove("flip");

    void el.offsetWidth;

    el.classList.add("flip");

}

function updateCountdown(){

    const now = new Date().getTime();

    const distance = launchDate - now;

    if(distance <= 0){

        clearInterval(timer);

        document.querySelector(".countdown").style.display="none";

        message.textContent="🎉 The event has started!";

        return;

    }

    const days=Math.floor(distance/(1000*60*60*24));

    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

    const seconds=Math.floor((distance%(1000*60))/1000);

    if(day.textContent!=days){
        day.textContent=String(days).padStart(2,"0");
        animate(day);
    }

    if(hour.textContent!=hours){
        hour.textContent=String(hours).padStart(2,"0");
        animate(hour);
    }

    if(minute.textContent!=minutes){
        minute.textContent=String(minutes).padStart(2,"0");
        animate(minute);
    }

    second.textContent=String(seconds).padStart(2,"0");
    animate(second);

}

updateCountdown();

const timer=setInterval(updateCountdown,1000);

</script>

</body>
</html>
