<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated SaaS Metrics Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>SaaS Metrics Dashboard</h1>

<p>Track subscriptions, growth and engagement.</p>

</div>

<button class="action-btn">

+ New Campaign

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">👥</span>

<h3>Subscribers</h3>

<h2>18,245</h2>

<div class="progress-bar">

<div class="progress subscribers"></div>

</div>

</div>

<div class="card">

<span class="icon">💵</span>

<h3>MRR</h3>

<h2>$84K</h2>

<div class="progress-bar">

<div class="progress mrr"></div>

</div>

</div>

<div class="card">

<span class="icon">📈</span>

<h3>Growth</h3>

<h2>24%</h2>

<div class="progress-bar">

<div class="progress growth"></div>

</div>

</div>

<div class="card">

<span class="icon">⚡</span>

<h3>Engagement</h3>

<h2>92%</h2>

<div class="progress-bar">

<div class="progress engagement"></div>

</div>

</div>

</section>

<section class="card activity">

<h2>Recent Activity</h2>

<div class="activity-item">

<h4>New Signup</h4>

<p>Premium plan activated.</p>

</div>

<div class="activity-item">

<h4>Subscription Renewed</h4>

<p>Annual billing processed.</p>

</div>

<div class="activity-item">

<h4>Upgrade Purchased</h4>

<p>Enterprise plan enabled.</p>

</div>

</section>

</div>

</body>

</html>
