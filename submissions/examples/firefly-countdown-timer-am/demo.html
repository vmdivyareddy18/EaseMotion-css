<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nature Firefly Countdown Timer — EaseMotion CSS</title>
  <!-- Load EaseMotion CSS via relative path -->
  <link rel="stylesheet" href="../../easemotion.css">
  <!-- Load component specific styles -->
  <link rel="stylesheet" href="./style.css">
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Hidden state controls for interactive timer pause/resume -->
  <input type="checkbox" id="timer-pause" class="state-control">

  <div class="nature-container">
    <div class="nature-card">
      
      <!-- Fireflies drifting in background -->
      <div class="firefly-field">
        <span class="firefly" style="top: 15%; left: 10%; --fdur: 8s; --fdel: 0s;"></span>
        <span class="firefly" style="top: 25%; left: 75%; --fdur: 11s; --fdel: 2s;"></span>
        <span class="firefly" style="top: 65%; left: 20%; --fdur: 9s; --fdel: 4s;"></span>
        <span class="firefly" style="top: 80%; left: 80%; --fdur: 12s; --fdel: 1s;"></span>
        <span class="firefly" style="top: 45%; left: 45%; --fdur: 10s; --fdel: 3s;"></span>
        <span class="firefly" style="top: 10%; left: 60%; --fdur: 13s; --fdel: 5s;"></span>
        <span class="firefly" style="top: 85%; left: 40%; --fdur: 7s; --fdel: 2.5s;"></span>
      </div>

      <!-- Card Header -->
      <div class="card-header">
        <div class="nature-badge">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7h20L12 2zM12 22V12M19 17l-7 5-7-5" />
          </svg>
          Midsummer Solstice Event
        </div>
        <h2 class="nature-title">Nightbloom Gathering</h2>
        <p class="nature-subtitle">The annual glowing forest ritual begins soon.</p>
      </div>

      <!-- Pure CSS Countdown Display -->
      <div class="timer-display">
        
        <!-- Days Unit -->
        <div class="timer-segment">
          <div class="digit-box">
            <span class="static-digit">0</span>
            <span class="static-digit">4</span>
          </div>
          <span class="segment-label">Days</span>
        </div>

        <span class="timer-colon">:</span>

        <!-- Hours Unit -->
        <div class="timer-segment">
          <div class="digit-box">
            <span class="static-digit">1</span>
            <span class="static-digit">8</span>
          </div>
          <span class="segment-label">Hours</span>
        </div>

        <span class="timer-colon">:</span>

        <!-- Minutes Unit -->
        <div class="timer-segment">
          <div class="digit-box overflow-hidden">
            <!-- Animated Minutes (Tens) -->
            <div class="digit-column animated-min-tens">
              <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
            </div>
            <!-- Animated Minutes (Ones) -->
            <div class="digit-column animated-min-ones">
              <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
            </div>
          </div>
          <span class="segment-label">Mins</span>
        </div>

        <span class="timer-colon">:</span>

        <!-- Seconds Unit -->
        <div class="timer-segment">
          <div class="digit-box overflow-hidden">
            <!-- Animated Seconds (Tens) -->
            <div class="digit-column animated-sec-tens">
              <span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
            </div>
            <!-- Animated Seconds (Ones) -->
            <div class="digit-column animated-sec-ones">
              <span>9</span><span>8</span><span>7</span><span>6</span><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span>
            </div>
          </div>
          <span class="segment-label">Secs</span>
        </div>

      </div>

      <!-- Interactive Controls -->
      <div class="card-footer">
        <label for="timer-pause" class="control-btn pause-label">
          <span class="btn-icon icon-pause">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="6" y="4" width="4" height="16" rx="1" />
              <rect x="14" y="4" width="4" height="16" rx="1" />
            </svg>
          </span>
          <span class="btn-icon icon-play">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5,3 19,12 5,21" />
            </svg>
          </span>
          <span class="btn-text">Pause Timer</span>
        </label>
      </div>

    </div>
  </div>

</body>
</html>
