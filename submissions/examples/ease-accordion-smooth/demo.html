<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Accordion Smooth - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="accordion-item">
        <input type="checkbox" id="accordion-trigger">
        <label for="accordion-trigger" class="header">Click to Toggle Reveal</label>
        <div class="ease-accordion-smooth">
            <div class="content">
                This height scaling mechanism functions smoothly with pure CSS grid track transformations instead of absolute height rules.
            </div>
        </div>
    </div>
</body>
</html>
