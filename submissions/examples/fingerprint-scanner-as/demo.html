<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fingerprint Scanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanner">
    <div class="fp">
      <svg viewBox="0 0 120 130" class="fp-base" aria-hidden="true">
        <g>
          <path d="M67.7 60 A10 11.5 0 1 1 52.3 60" />
          <path d="M75.6 56 A18 20.7 0 1 1 44.4 56" />
          <path d="M80 50 A26 29.9 0 1 1 40 50" />
          <path d="M88 46 A34 39 0 1 1 32 46" />
          <path d="M94 40 A42 48 0 1 1 26 40" />
          <path d="M100 36 A50 55 0 1 1 20 36" />
        </g>
      </svg>
      <svg viewBox="0 0 120 130" class="fp-scan" aria-hidden="true">
        <g>
          <path d="M67.7 60 A10 11.5 0 1 1 52.3 60" />
          <path d="M75.6 56 A18 20.7 0 1 1 44.4 56" />
          <path d="M80 50 A26 29.9 0 1 1 40 50" />
          <path d="M88 46 A34 39 0 1 1 32 46" />
          <path d="M94 40 A42 48 0 1 1 26 40" />
          <path d="M100 36 A50 55 0 1 1 20 36" />
        </g>
      </svg>
      <span class="scan-line"></span>
    </div>
    <p class="scan-label">Scanning fingerprint&hellip;</p>
  </div>
</body>
</html>
