<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hero Section Banner Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; font-family: 'Outfit', sans-serif;">

  <header class="ease-hero-banner">
    <!-- Animated background elements -->
    <div class="ease-hero-bg-gradient"></div>
    <div class="ease-hero-shape ease-hero-shape-1"></div>
    <div class="ease-hero-shape ease-hero-shape-2"></div>
    <div class="ease-hero-grid"></div>

    <div class="ease-hero-content">
      <div class="ease-hero-badge">New Release 2.0</div>
      
      <h1 class="ease-hero-title">
        Build stunning interfaces <br />
        <span class="ease-hero-highlight">at lightning speed.</span>
      </h1>
      
      <p class="ease-hero-subtitle">
        EaseMotion provides you with the most advanced CSS animation library to bring your digital products to life effortlessly.
      </p>
      
      <div class="ease-hero-actions">
        <a href="#" class="ease-hero-btn ease-hero-btn-primary">Get Started Free</a>
        <a href="#" class="ease-hero-btn ease-hero-btn-secondary">View Documentation</a>
      </div>
    </div>
  </header>

</body>
</html>
