<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathing Status Badge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <section class="demo-card">
      <p class="eyebrow">EaseMotion CSS Example</p>
      <h1>Breathing Status Badge</h1>
      <p class="description">
        A CSS-only animated status badge for profiles, dashboards, chat apps, and admin panels.
      </p>

      <div class="status-group">
        <span class="status-badge online">
          <span class="status-dot"></span>
          Online
        </span>

        <span class="status-badge away">
          <span class="status-dot"></span>
          Away
        </span>

        <span class="status-badge busy">
          <span class="status-dot"></span>
          Busy
        </span>

        <span class="status-badge offline">
          <span class="status-dot"></span>
          Offline
        </span>
      </div>
    </section>
  </main>
</body>
</html>
