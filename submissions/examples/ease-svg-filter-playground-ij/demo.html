<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVG Filter Playground | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sfp-container">
    <h1>SVG Filter Playground</h1>
    <p class="sfp-subtitle">Hover the image or text to see filter effects</p>

    <div class="sfp-presets" id="presets">
      <button class="sfp-preset sfp-active" data-filter="none">None</button>
      <button class="sfp-preset" data-filter="blur(6px)">Blur</button>
      <button class="sfp-preset" data-filter="grayscale(1)">Grayscale</button>
      <button class="sfp-preset" data-filter="sepia(0.8) hue-rotate(30deg)">Sepia</button>
      <button class="sfp-preset" data-filter="contrast(1.5) saturate(1.8)">Vibrant</button>
      <button class="sfp-preset" data-filter="invert(1) hue-rotate(180deg)">Invert</button>
      <button class="sfp-preset" data-filter="drop-shadow(4px 4px 8px rgba(0,0,0,0.6))">Shadow</button>
    </div>

    <div class="sfp-demo" id="demoArea">
      <div class="sfp-card">
        <svg class="sfp-image" id="demoImage" viewBox="0 0 200 200" width="200" height="200">
          <defs>
            <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#6366f1" />
              <stop offset="100%" stop-color="#a78bfa" />
            </linearGradient>
          </defs>
          <rect x="10" y="10" width="180" height="180" rx="24" fill="url(#g1)" />
          <circle cx="100" cy="80" r="30" fill="rgba(255,255,255,0.2)" />
          <circle cx="100" cy="80" r="20" fill="rgba(255,255,255,0.4)" />
          <circle cx="100" cy="80" r="10" fill="#fff" />
          <path d="M60 130 Q80 110 100 130 T140 130" stroke="rgba(255,255,255,0.5)" stroke-width="3" fill="none" stroke-linecap="round" />
        </svg>
      </div>
      <div class="sfp-card">
        <p class="sfp-text" id="demoText">Hello, Filters!</p>
      </div>
    </div>

    <div class="sfp-controls">
      <label class="sfp-label">
        Blur
        <input type="range" id="blurRange" min="0" max="20" value="0" step="0.5" />
      </label>
      <label class="sfp-label">
        Brightness
        <input type="range" id="brightRange" min="0" max="2" value="1" step="0.05" />
      </label>
    </div>
  </div>

  <script>
    const presets = document.querySelectorAll('.sfp-preset');
    const demoImage = document.getElementById('demoImage');
    const demoText = document.getElementById('demoText');
    const blurRange = document.getElementById('blurRange');
    const brightRange = document.getElementById('brightRange');
    const demoArea = document.getElementById('demoArea');

    let baseFilter = 'none';

    function applyFilter() {
      const blur = blurRange.value;
      const bright = brightRange.value;
      let filter = baseFilter === 'none' ? '' : baseFilter;
      if (blur != 0) filter += ` blur(${blur}px)`;
      if (bright != 1) filter += ` brightness(${bright})`;
      filter = filter.trim() || 'none';
      demoArea.style.filter = filter;
    }

    presets.forEach(btn => {
      btn.addEventListener('click', () => {
        presets.forEach(b => b.classList.remove('sfp-active'));
        btn.classList.add('sfp-active');
        baseFilter = btn.dataset.filter;
        applyFilter();
      });
    });

    blurRange.addEventListener('input', applyFilter);
    brightRange.addEventListener('input', applyFilter);
  </script>
</body>
</html>
