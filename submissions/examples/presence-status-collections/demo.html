<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Presence/Status Indicator Collection - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated Presence & Status Indicators</h1>
      <p>A collection of optimized micro-indicator states anchored smoothly to profile node boundaries using CSS positioning and keyframe loops.</p>
    </header>

    <div class="showcase-grid">
      <div class="avatar-card">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder pink-gradient">AM</div>
          <span class="ease-presence-dot ease-presence-online"></span>
        </div>
        <div class="status-label">Online</div>
        <div class="status-desc">Breathing pulse</div>
      </div>

      <div class="avatar-card">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder blue-gradient">SC</div>
          <span class="ease-presence-dot ease-presence-away"></span>
        </div>
        <div class="status-label">Away</div>
        <div class="status-desc">Static indicator</div>
      </div>

      <div class="avatar-card">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder purple-gradient">MV</div>
          <span class="ease-presence-dot ease-presence-busy"></span>
        </div>
        <div class="status-label">Busy</div>
        <div class="status-desc">Double-blink loop</div>
      </div>

      <div class="avatar-card">
        <div class="avatar-wrapper">
          <div class="avatar-placeholder dark-gradient">JD</div>
          <span class="ease-presence-dot ease-presence-offline"></span>
        </div>
        <div class="status-label">Offline</div>
        <div class="status-desc">Muted transparency</div>
      </div>
    </div>
  </div>

</body>
</html>
