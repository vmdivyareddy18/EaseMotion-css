<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-rating-stars – EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      background: #1e1e2e;
      color: #f5f5f5;
      padding: 3rem 2rem;
    }
    h1 { font-size: 1.3rem; margin: 0; }
    h3 { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin: 0 0 0.5rem; }
    .col { display: flex; flex-direction: column; align-items: flex-start; gap: 0.5rem; }
    .row { display: flex; gap: 3rem; flex-wrap: wrap; }
  </style>
</head>
<body>

  <h1>ease-rating-stars — Star Rating Component</h1>

  <div class="row">
    <div class="col">
      <h3>Full rating (5/5)</h3>
      <div class="ease-rating">
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-text">5.0 (842 reviews)</span>
      </div>
    </div>

    <div class="col">
      <h3>Half-star rating (4.5/5)</h3>
      <div class="ease-rating">
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-half">★</span>
        <span class="ease-rating-text">4.5 (1,248 reviews)</span>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col">
      <h3>Small size</h3>
      <div class="ease-rating ease-rating-sm">
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star">★</span>
        <span class="ease-rating-star">★</span>
        <span class="ease-rating-text">3.0 (56)</span>
      </div>
    </div>

    <div class="col">
      <h3>Large + success color</h3>
      <div class="ease-rating ease-rating-lg ease-rating-success">
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-filled">★</span>
        <span class="ease-rating-star ease-rating-star-half">★</span>
        <span class="ease-rating-text">4.7 (3,021)</span>
      </div>
    </div>
  </div>

  <div class="col">
    <h3>Interactive hover-preview (click-to-rate UI)</h3>
    <div class="ease-rating-preview">
      <span class="ease-rating-star">★</span>
      <span class="ease-rating-star">★</span>
      <span class="ease-rating-star">★</span>
      <span class="ease-rating-star">★</span>
      <span class="ease-rating-star">★</span>
    </div>
  </div>

</body>
</html>
