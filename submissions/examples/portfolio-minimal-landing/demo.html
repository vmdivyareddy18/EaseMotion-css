<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alex Rivera</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav>
    <div class="ease-container ease-flex ease-items-center ease-justify-between ease-py-4 ease-px-8">
      <div class="ease-text-2xl ease-font-bold ease-fade-in">Alex Rivera</div>
      <div class="ease-flex ease-gap-6 ease-text-sm ease-fade-in">
        <a href="#Work" class="ease-text-hover-glow">Work</a>
        <a href="#Contact" class="ease-text-hover-glow">Contact</a>
      </div>
    </div>
  </nav>

  <section id="hero" class="hero">
    <div class="ease-text-center ease-px-4">
      <h1 class="ease-fade-in ease-text-6xl ease-font-bold ease-mb-4">Alex Rivera</h1>
<p class="ease-fade-in ease-delay-100 ease-text-xl ease-mb-8 ease-text-muted">Designer &amp; creative problem solver</p>
<a href="#work" class="ease-btn ease-btn-primary ease-btn-lg ease-btn-hover ease-hover-lift">View Work</a>
    </div>
  </section>

  <section id="work" class="ease-container ease-py-16">
  <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Selected Work</h2>
  <div class="work-grid">
    <div class="work-item ease-fade-in"><div class="overlay"><span>Brand Identity</span></div></div>
    <div class="work-item ease-fade-in ease-delay-100"><div class="overlay"><span>Web Design</span></div></div>
    <div class="work-item ease-fade-in ease-delay-200"><div class="overlay"><span>UI/UX</span></div></div>
  </div>
</section>
<section class="ease-bg-surface ease-py-16">
  <div class="ease-container">
    <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-8 ease-slide-up">Skills</h2>
    <div class="skills ease-justify-center">
      <span class="skill-tag ease-fade-in">UI Design</span>
      <span class="skill-tag ease-fade-in ease-delay-75">UX Research</span>
      <span class="skill-tag ease-fade-in ease-delay-150">Branding</span>
      <span class="skill-tag ease-fade-in ease-delay-200">Prototyping</span>
      <span class="skill-tag ease-fade-in ease-delay-300">HTML/CSS</span>
    </div>
  </div>
</section>
<section id="contact" class="ease-container ease-py-16">
  <h2 class="ease-text-3xl ease-font-bold ease-text-center ease-mb-12 ease-slide-up">Get in Touch</h2>
  <div class="contact-form"><input type="email" placeholder="Your email" class="ease-fade-in"><textarea placeholder="Message" rows="4" class="ease-fade-in ease-delay-100"></textarea><button class="ease-btn ease-btn-primary ease-btn-block ease-btn-hover ease-hover-lift">Send</button></div>
</section>

  <footer class="footer">
    <div class="ease-container">
      <p class="ease-text-sm ease-opacity-70">© 2026 Alex Rivera.</p>
    </div>
  </footer>
</body>
</html>
