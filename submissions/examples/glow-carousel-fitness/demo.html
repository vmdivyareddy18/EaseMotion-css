<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Carousel – Health & Fitness UI Demo</title>
  <!-- Link to core EaseMotion variables and utility classes -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; margin-bottom: 1.5rem;">
    <h1 style="font-family: 'Orbitron', sans-serif; font-weight: 900; letter-spacing: 0.05em; font-size: 1.75rem; margin: 0; color: #ffffff;">FITNESS METRICS</h1>
    <p style="color: #9ca3af; font-size: 0.9rem; margin: 0.5rem 0 0 0;">Pure CSS glowing carousel tracking daily health indices.</p>
  </div>

  <!-- Main Carousel Container Wrapper -->
  <div class="ease-carousel-container">
    
    <!-- Hidden Radio State Toggles (Standard Keyboard-navigable inputs) -->
    <input type="radio" name="fit-slide" id="slide-1" class="ease-carousel-radio" checked>
    <input type="radio" name="fit-slide" id="slide-2" class="ease-carousel-radio">
    <input type="radio" name="fit-slide" id="slide-3" class="ease-carousel-radio">
    <input type="radio" name="fit-slide" id="slide-4" class="ease-carousel-radio">
    
    <div class="ease-carousel">
      
      <!-- Horizontal track containing fitness metric cards -->
      <div class="ease-carousel__track">
        
        <!-- CARD 1: CARDIO / HEART RATE -->
        <article class="ease-carousel__item">
          <!-- Click overlay: unselected card redirects click here to navigate -->
          <label for="slide-1" class="ease-carousel__click-overlay" aria-hidden="true"></label>
          <div class="ease-carousel__content">
            <div class="ease-card-meta">
              <span class="ease-meta-label">Cardio</span>
              <div class="ease-card-icon ease-meta-cardio" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
                </svg>
              </div>
            </div>
            <div class="ease-card-metric">
              <span class="ease-metric-value">142<span class="ease-metric-unit">BPM</span></span>
              <span style="font-size: 0.75rem; color: var(--ease-color-red); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Fat Burn Zone</span>
            </div>
            <!-- Card visual graphics -->
            <div class="ease-card-visual">
              <div class="ease-pulse-line" aria-hidden="true"></div>
            </div>
            <button class="ease-card-btn" aria-label="Open Heart Rate Statistics">View Heart Stats</button>
          </div>
        </article>
        
        <!-- CARD 2: ACTIVITY / STEPS -->
        <article class="ease-carousel__item">
          <label for="slide-2" class="ease-carousel__click-overlay" aria-hidden="true"></label>
          <div class="ease-carousel__content">
            <div class="ease-card-meta">
              <span class="ease-meta-label">Activity</span>
              <div class="ease-card-icon ease-meta-steps" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.467 5.99 5.99 0 0 0-1.925 3.546 5.974 5.974 0 0 1-2.133-1A3.75 3.75 0 0 0 12 18Z" />
                </svg>
              </div>
            </div>
            <div class="ease-card-metric">
              <span class="ease-metric-value">12,480<span class="ease-metric-unit">Steps</span></span>
              <span style="font-size: 0.75rem; color: var(--ease-color-green); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">82% Goal Reached</span>
            </div>
            <div class="ease-card-visual">
              <div class="ease-steps-bar" aria-hidden="true">
                <div class="ease-steps-progress"></div>
              </div>
            </div>
            <button class="ease-card-btn" aria-label="Open Activity Step Goal Details">View Steps Goal</button>
          </div>
        </article>
        
        <!-- CARD 3: CALORIES BURNED -->
        <article class="ease-carousel__item">
          <label for="slide-3" class="ease-carousel__click-overlay" aria-hidden="true"></label>
          <div class="ease-carousel__content">
            <div class="ease-card-meta">
              <span class="ease-meta-label">Burned</span>
              <div class="ease-card-icon ease-meta-calories" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                </svg>
              </div>
            </div>
            <div class="ease-card-metric">
              <span class="ease-metric-value">682<span class="ease-metric-unit">KCAL</span></span>
              <span style="font-size: 0.75rem; color: var(--ease-color-orange); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Active Energy</span>
            </div>
            <div class="ease-card-visual">
              <div class="ease-calories-grid" aria-hidden="true">
                <div class="ease-calories-bar" style="height: 15px;"></div>
                <div class="ease-calories-bar" style="height: 30px;"></div>
                <div class="ease-calories-bar" style="height: 25px;"></div>
                <div class="ease-calories-bar" style="height: 48px;"></div>
                <div class="ease-calories-bar" style="height: 35px;"></div>
                <div class="ease-calories-bar" style="height: 42px;"></div>
                <div class="ease-calories-bar" style="height: 52px;"></div>
              </div>
            </div>
            <button class="ease-card-btn" aria-label="Open Calorie Consumption History">View Burn Rate</button>
          </div>
        </article>
        
        <!-- CARD 4: SLEEP QUALITY -->
        <article class="ease-carousel__item">
          <label for="slide-4" class="ease-carousel__click-overlay" aria-hidden="true"></label>
          <div class="ease-carousel__content">
            <div class="ease-card-meta">
              <span class="ease-meta-label">Sleep</span>
              <div class="ease-card-icon ease-meta-sleep" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 18px; height: 18px;">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                </svg>
              </div>
            </div>
            <div class="ease-card-metric">
              <span class="ease-metric-value">82%<span class="ease-metric-unit">Score</span></span>
              <span style="font-size: 0.75rem; color: var(--ease-color-cyan); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;">Deep Rest</span>
            </div>
            <div class="ease-card-visual">
              <div class="ease-sleep-waves" aria-hidden="true">
                <div class="ease-sleep-wave-dot active"></div>
                <div class="ease-sleep-wave-dot active"></div>
                <div class="ease-sleep-wave-dot active"></div>
                <div class="ease-sleep-wave-dot active"></div>
              </div>
            </div>
            <button class="ease-card-btn" aria-label="Open Deep Sleep Analysis">View Sleep Stages</button>
          </div>
        </article>

      </div>

      <!-- Carousel Side Navigation Arrows -->
      <div class="ease-carousel__controls">
        
        <!-- Group 1: Visible when Slide 1 checked -->
        <div class="ease-control-group group-1">
          <label for="slide-4" class="ease-arrow ease-arrow--prev" aria-label="Previous Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
          </label>
          <label for="slide-2" class="ease-arrow ease-arrow--next" aria-label="Next Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
          </label>
        </div>

        <!-- Group 2: Visible when Slide 2 checked -->
        <div class="ease-control-group group-2">
          <label for="slide-1" class="ease-arrow ease-arrow--prev" aria-label="Previous Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
          </label>
          <label for="slide-3" class="ease-arrow ease-arrow--next" aria-label="Next Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
          </label>
        </div>

        <!-- Group 3: Visible when Slide 3 checked -->
        <div class="ease-control-group group-3">
          <label for="slide-2" class="ease-arrow ease-arrow--prev" aria-label="Previous Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
          </label>
          <label for="slide-4" class="ease-arrow ease-arrow--next" aria-label="Next Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
          </label>
        </div>

        <!-- Group 4: Visible when Slide 4 checked -->
        <div class="ease-control-group group-4">
          <label for="slide-3" class="ease-arrow ease-arrow--prev" aria-label="Previous Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
          </label>
          <label for="slide-1" class="ease-arrow ease-arrow--next" aria-label="Next Slide">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width: 20px; height: 20px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5" />
            </svg>
          </label>
        </div>

      </div>

      <!-- Pagination Indicators (nav dots) -->
      <nav class="ease-carousel__nav" aria-label="Metrics Slider Pagination">
        <label for="slide-1" class="ease-dot" aria-label="Navigate to cardio stats"></label>
        <label for="slide-2" class="ease-dot" aria-label="Navigate to activity stats"></label>
        <label for="slide-3" class="ease-dot" aria-label="Navigate to calorie stats"></label>
        <label for="slide-4" class="ease-dot" aria-label="Navigate to sleep stats"></label>
      </nav>

    </div>

  </div>

</body>
</html>
