<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Component Demo Playground</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="playground">
    <header class="playground-header">
      <h1>Animation Playground</h1>
      <p>Adjust controls to tweak the demo animation</p>
    </header>

    <div class="playground-demo">
      <div class="demo-box" id="demoBox"></div>
    </div>

    <div class="playground-controls">
      <div class="control-group">
        <label for="durationSlider">Duration: <span id="durationVal">0.6</span>s</label>
        <input type="range" id="durationSlider" min="0.1" max="2.0" step="0.05" value="0.6" />
      </div>

      <div class="control-group">
        <label for="scaleSlider">Scale: <span id="scaleVal">1.2</span>x</label>
        <input type="range" id="scaleSlider" min="0.5" max="2.0" step="0.05" value="1.2" />
      </div>

      <div class="control-group">
        <label for="rotationSlider">Rotation: <span id="rotationVal">0</span>deg</label>
        <input type="range" id="rotationSlider" min="0" max="360" step="5" value="0" />
      </div>

      <div class="control-group">
        <label class="toggle-label">
          <input type="checkbox" id="loopToggle" checked />
          Loop
        </label>
      </div>

      <div class="control-actions">
        <button class="ctrl-btn" onclick="playAnimation()">Play</button>
        <button class="ctrl-btn" onclick="pauseAnimation()">Pause</button>
        <button class="ctrl-btn" onclick="resetAnimation()">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const demoBox = document.getElementById('demoBox');

    function applyAnimation() {
      const duration = parseFloat(document.getElementById('durationSlider').value);
      const scale = parseFloat(document.getElementById('scaleSlider').value);
      const rotation = parseFloat(document.getElementById('rotationSlider').value);
      const loop = document.getElementById('loopToggle').checked;

      demoBox.style.setProperty('--anim-duration', duration + 's');
      demoBox.style.setProperty('--anim-scale', scale);
      demoBox.style.setProperty('--anim-rotation', rotation + 'deg');
      demoBox.style.animationPlayState = 'running';
    }

    function playAnimation() {
      demoBox.style.animationPlayState = 'running';
    }

    function pauseAnimation() {
      demoBox.style.animationPlayState = 'paused';
    }

    function resetAnimation() {
      demoBox.classList.remove('demo-animate');
      void demoBox.offsetWidth;
      demoBox.classList.add('demo-animate');
    }

    document.querySelectorAll('.playground-controls input').forEach((input) => {
      input.addEventListener('input', applyAnimation);
    });

    document.addEventListener('DOMContentLoaded', () => {
      demoBox.classList.add('demo-animate');
      applyAnimation();
    });
  </script>
</body>
</html>
