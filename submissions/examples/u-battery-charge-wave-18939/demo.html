<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battery Charge Wave</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Battery Charge Wave</h1>

    <div class="battery">
        <div class="wave"></div>
        <div class="percentage" id="percentage">75%</div>
    </div>

    <div class="controls">
        <button onclick="setBattery(25)">Low Battery</button>
        <button onclick="setBattery(60)">Medium Battery</button>
        <button onclick="setBattery(100)">Full Charge</button>
        <button onclick="toggleCharging()">Charging Mode</button>
    </div>

</div>

<script>

const wave = document.querySelector(".wave");
const percentage = document.getElementById("percentage");

let charging = false;

function setBattery(level) {
    wave.style.height = level + "%";
    percentage.textContent = level + "%";
}

function toggleCharging() {
    charging = !charging;

    if (charging) {
        wave.classList.add("charging");
    } else {
        wave.classList.remove("charging");
    }
}

setBattery(75);

</script>

</body>
</html>
