<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascading Newsletter Popup - Gaming Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0f172a; /* Dark slate gaming background */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      color: #e2e8f0;
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 2rem;
      z-index: 10;
    }
    
    .demo-header h1 {
      font-size: 2.5rem;
      margin: 0 0 10px 0;
      color: #38bdf8;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
    }
    
    .demo-header p {
      color: #94a3b8;
      font-size: 1.1rem;
    }

    /* Checkbox to trigger the popup for pure CSS interactivity */
    .trigger-checkbox {
      display: none;
    }

    .trigger-button {
      background: transparent;
      border: 2px solid #38bdf8;
      color: #38bdf8;
      padding: 12px 24px;
      font-size: 1.1rem;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 15px rgba(56, 189, 248, 0.2) inset;
    }

    .trigger-button:hover {
      background: #38bdf8;
      color: #0f172a;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
    }

    /* Modal Backdrop */
    .ease-modal-backdrop {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    .trigger-checkbox:checked ~ .ease-modal-backdrop {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
</head>
<body>

  <div class="demo-header">
    <h1>Level Up Your Inbox</h1>
    <p>Pure CSS animated gaming newsletter popup.</p>
  </div>

  <label for="popup-trigger" class="trigger-button">Open Loot Box</label>
  <input type="checkbox" id="popup-trigger" class="trigger-checkbox">

  <!-- Modal Overlay -->
  <div class="ease-modal-backdrop">
    
    <!-- Newsletter Component -->
    <div class="ease-cascading-popup">
      <!-- Close button mapped to the checkbox -->
      <label for="popup-trigger" class="ease-popup-close" aria-label="Close popup">&times;</label>

      <div class="ease-popup-content">
        <div class="ease-popup-icon ease-cascade-1">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </div>
        
        <h2 class="ease-popup-title ease-cascade-2">Unlock Exclusive Gear</h2>
        <p class="ease-popup-desc ease-cascade-3">Join our elite squad to get weekly updates on new releases, beta keys, and hardcore strategies.</p>
        
        <form class="ease-popup-form ease-cascade-4" onsubmit="event.preventDefault();">
          <input type="email" class="ease-popup-input" placeholder="ENTER PLAYER EMAIL" required>
          <button type="submit" class="ease-popup-submit">SUBSCRIBE</button>
        </form>

        <p class="ease-popup-footer ease-cascade-5">No spam. You can safely disconnect anytime.</p>
      </div>
    </div>

  </div>

</body>
</html>
