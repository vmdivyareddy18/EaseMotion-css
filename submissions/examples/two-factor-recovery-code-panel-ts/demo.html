<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Factor Recovery Code Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="recovery-title">
      <p class="eyebrow">Security</p>
      <h1 id="recovery-title">Recovery codes</h1>
      <p class="intro">Track backup codes by availability, copied state, and used history.</p>

      <div class="code-list" aria-label="Recovery code states">
        <div class="code-row is-unused"><code>A9K2-LM8Q</code><span>Unused</span></div>
        <div class="code-row is-copied"><code>Q7RF-31PA</code><span>Copied</span></div>
        <div class="code-row is-used"><code>H2MM-08XZ</code><span>Used</span></div>
        <div class="code-row is-warning"><code>2 left</code><span>Regenerate soon</span></div>
      </div>
    </section>
  </main>
</body>
</html>
