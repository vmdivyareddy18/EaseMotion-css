<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Horizontal Roll Popover - Minimalist Tech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Minimalist Tech</span>
      <h1>Horizontal Roll Popover</h1>
      <p class="subtitle">Clean minimal roll animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="tech-btn" aria-label="More options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="12" cy="5" r="1"/>
            <circle cx="12" cy="19" r="1"/>
          </svg>
        </button>
        <div class="roll-popover" role="tooltip">
          <div class="roll-items">
            <div class="roll-item" style="--delay: 0s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14,2 14,8 20,8"/>
                </svg>
              </span>
              <span>Documents</span>
            </div>
            <div class="roll-item" style="--delay: 0.05s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                  <line x1="8" y1="21" x2="16" y2="21"/>
                  <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
              </span>
              <span>Presentations</span>
            </div>
            <div class="roll-item" style="--delay: 0.1s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17,8 12,3 7,8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </span>
              <span>Downloads</span>
            </div>
            <div class="roll-item" style="--delay: 0.15s">
              <span class="roll-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <circle cx="11" cy="11" r="8"/>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
              </span>
              <span>Search</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Reveal</button>
          <div class="roll-popover reveal" role="tooltip"><p>Reveal roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Drift</button>
          <div class="roll-popover drift" role="tooltip"><p>Drift roll animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Swoosh</button>
          <div class="roll-popover swoosh" role="tooltip"><p>Swoosh roll animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-slate">Slate</button>
          <div class="roll-popover theme-slate" role="tooltip"><p>Slate theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-zinc">Zinc</button>
          <div class="roll-popover theme-zinc" role="tooltip"><p>Zinc theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-neutral">Neutral</button>
          <div class="roll-popover theme-neutral" role="tooltip"><p>Neutral theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
