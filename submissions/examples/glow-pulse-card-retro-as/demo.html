<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenVMS Monitor System Console</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 
  <div class="monitor-console" tabindex="0" role="article" aria-label="System Statistics Display">

    <div class="crt-scanlines"></div>
    <div class="crt-vignette"></div>

   
    <div class="console-viewport">
      
      <div class="console-header">
        <div class="header-left">
          <div>Node: QCDCAL</div>
          <div>Statistic: CURRENT</div>
        </div>
        <div class="header-center">
          <span class="system-badge">SYSTEM STATISTICS</span>
        </div>
        <div class="header-right">
          <div>10-JUL-2026 23:57:27</div>
        </div>
      </div>

      
      <div class="telemetry-grid">
        
       
        <div class="grid-column flex-main">
          
          <div class="metric-section">
            <div class="section-title">CPU Busy (%)</div>
            <div class="terminal-chart-box">
              <div class="chart-axis-y">100</div>
              <div class="chart-canvas">
                <div class="vector-wave-line"></div>
              </div>
              <div class="chart-axis-x">0</div>
            </div>
            <div class="section-footer">Cur Top: TCPIP$HR_MIB (2)</div>
          </div>

  
          <div class="metric-section">
            <div class="section-title">Page Fault Rate (0)</div>
            <div class="terminal-chart-box">
              <div class="chart-axis-y">500</div>
              <div class="chart-canvas">
                <div class="vector-wave-line secondary-wave"></div>
              </div>
              <div class="chart-axis-x">0</div>
            </div>
            <div class="section-footer">Cur Top: (0)</div>
          </div>

        </div>

        <div class="grid-column flex-sidebar">
          
          <!-- Process States List Box -->
          <div class="registry-box">
            <div class="registry-title">Process States</div>
            <div class="registry-row"><span>LEF:</span><span>7</span><span>LEFO:</span><span>0</span></div>
            <div class="registry-row"><span>HIB:</span><span>19</span><span>HIBO:</span><span>0</span></div>
            <div class="registry-row"><span>COM:</span><span>2</span><span>COMO:</span><span>0</span></div>
            <div class="registry-row"><span>PFW:</span><span>0</span><span>Other:</span><span>1</span></div>
            <div class="registry-divider"></div>
            <div class="registry-row total-row"><span>Total:</span><span>29</span></div>
          </div>

          <div class="gauge-container">
            <div class="gauge-meta">Free List Size (138973)</div>
            <div class="hardware-gauge-track">
              <div class="gauge-fill-bar bar-active"></div>
            </div>
            <div class="gauge-scale-labels"><span>0</span><span>220K</span></div>
          </div>

        </div>

      </div>

    </div>
  </div>

</body>
</html>
