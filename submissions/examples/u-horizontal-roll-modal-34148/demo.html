<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Horizontal Roll Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Creative Portfolio

</span>

<h1>

Horizontal Roll Modal

</h1>

<p>

Portfolio-inspired modal
with an elegant horizontal
roll animation designed for
creative showcases.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

View Project

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close">

✕

</label>

<div class="modal-content">

<div class="icon">

🎨

</div>

<h2>

Featured Project

</h2>

<p>

Showcase projects,
branding concepts and
design experiences with
a modern animated modal.

</p>

<button>

Explore Portfolio

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
