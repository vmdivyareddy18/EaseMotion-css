<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated QR Code Scan Sweep</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated QR Code Scan Sweep</h1>

  <p class="intro">
    A reusable QR scanning animation for payment apps,
    authentication systems, ticket verification, and check-in platforms.
  </p>

  <div class="demo-grid">

    <div class="qr-card">
      <div class="qr-scan">
        <div class="qr-code"></div>
        <div class="scan-line"></div>
      </div>
      <h3>Scan Payment</h3>
    </div>

    <div class="qr-card">
      <div class="qr-scan large">
        <div class="qr-code"></div>
        <div class="scan-line"></div>
      </div>
      <p>QR Authentication</p>
    </div>

    <div class="qr-card">
      <div class="qr-scan">
        <div class="qr-code"></div>
        <div class="scan-line"></div>
      </div>
      <button>Scan QR</button>
    </div>

  </div>

</main>

</body>
</html>
