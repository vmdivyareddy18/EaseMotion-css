<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-bottom-nav Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="ease-bottom-nav" id="bottomNav">
  <span class="ease-bottom-nav__indicator" id="indicator"></span>

  <button class="ease-bottom-nav__item ease-bottom-nav__item--active" data-index="0">
    <span class="ease-bottom-nav__icon">⌂</span>
    <span class="ease-bottom-nav__label">Home</span>
  </button>

  <button class="ease-bottom-nav__item" data-index="1">
    <span class="ease-bottom-nav__icon">⌕</span>
    <span class="ease-bottom-nav__label">Search</span>
  </button>

  <button class="ease-bottom-nav__item" data-index="2" style="position: relative;">
    <span class="ease-bottom-nav__icon">♡</span>
    <span class="ease-bottom-nav__label">Saved</span>
    <span class="ease-bottom-nav__badge"></span>
  </button>

  <button class="ease-bottom-nav__item" data-index="3">
    <span class="ease-bottom-nav__icon">◐</span>
    <span class="ease-bottom-nav__label">Profile</span>
  </button>
</nav>

<script>
  const nav = document.getElementById('bottomNav');
  const items = nav.querySelectorAll('.ease-bottom-nav__item');
  const indicator = document.getElementById('indicator');

  function moveIndicator(item) {
    const navRect = nav.getBoundingClientRect();
    const itemRect = item.getBoundingClientRect();
    indicator.style.left = (itemRect.left - navRect.left) + 'px';
    indicator.style.width = itemRect.width + 'px';
  }

  function setActive(item) {
    items.forEach(i => i.classList.remove('ease-bottom-nav__item--active'));
    item.classList.add('ease-bottom-nav__item--active');
    moveIndicator(item);
  }

  items.forEach(item => {
    item.addEventListener('click', () => setActive(item));
  });

  window.addEventListener('load', () => {
    moveIndicator(nav.querySelector('.ease-bottom-nav__item--active'));
  });

  window.addEventListener('resize', () => {
    moveIndicator(nav.querySelector('.ease-bottom-nav__item--active'));
  });
</script>

</body>
</html>
