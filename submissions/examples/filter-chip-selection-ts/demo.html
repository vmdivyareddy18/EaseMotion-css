<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pill Filter Chip Selection Motion</title><link rel="stylesheet" href="./style.css"></head>
<body><main class="demo-shell"><header class="demo-header"><p class="eyebrow">EaseMotion CSS example</p><h1>Pill Filter Chip Selection Motion</h1><p>Uses checkboxes and labels to provide accessible, stable selected filter states.</p></header>
    <fieldset class="filter-panel"><legend>Filter projects</legend><div class="filter-chip-group">
      <input type="checkbox" id="filter-new" checked><label for="filter-new">New</label>
      <input type="checkbox" id="filter-active"><label for="filter-active">Active</label>
      <input type="checkbox" id="filter-archived"><label for="filter-archived">Archived</label>
    </div></fieldset>
</main></body></html>
