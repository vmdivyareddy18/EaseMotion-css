<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-rotate-out-up-left Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin: 0; }
    h2 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; }
    .demo-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p  { margin: 0; font-size: 0.85rem; color: #94a3b8; }
    button {
      padding: 8px 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>ease-rotate-out-up-left</h1>

  <!-- Hover trigger -->
  <div class="demo-section">
    <h2>Hover Trigger</h2>
    <div class="card ease-rotate-out-up-left-hover">
      <h3>Hover Me</h3>
      <p>Rotates and exits up-left</p>
    </div>
  </div>

  <!-- Click trigger -->
  <div class="demo-section">
    <h2>Click Trigger</h2>
    <div class="card" id="card1">
      <h3>Click to Exit</h3>
      <p>Rotates out to top-left</p>
      <button onclick="rotateOut('card1')">Rotate Out</button>
    </div>
  </div>

  <script>
    function rotateOut(id) {
      const card = document.getElementById(id);
      card.classList.add('ease-rotate-out-up-left');
      setTimeout(() => {
        card.classList.remove('ease-rotate-out-up-left');
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';
      }, 1500);
    }
  </script>

</body>
</html>
