<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wind Direction Arrow - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Wind Direction Arrow</h1>
    <div class="widget-card">
      <div class="compass-icon">
        <div class="compass-ring">
          <span class="label-n">N</span>
          <span class="label-s">S</span>
          <span class="label-e">E</span>
          <span class="label-w">W</span>
        </div>
        <div class="arrow-container">
          <div class="wind-arrow" id="windArrow">
            <div class="arrow-head"></div>
            <div class="arrow-shaft"></div>
          </div>
        </div>
      </div>
      <div class="info-panel">
        <div class="direction-label" id="directionLabel">NE</div>
        <div class="degree-label" id="degreeLabel">45&deg;</div>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" data-deg="0">N</button>
      <button class="ctrl-btn" data-deg="45">NE</button>
      <button class="ctrl-btn" data-deg="90">E</button>
      <button class="ctrl-btn" data-deg="135">SE</button>
      <button class="ctrl-btn" data-deg="180">S</button>
      <button class="ctrl-btn" data-deg="225">SW</button>
      <button class="ctrl-btn" data-deg="270">W</button>
      <button class="ctrl-btn" data-deg="315">NW</button>
    </div>
    <p class="description">Click a direction to rotate the arrow smoothly. Idle sway plays at rest.</p>
  </div>

  <script>
    const arrow = document.getElementById('windArrow');
    const dirLabel = document.getElementById('directionLabel');
    const degLabel = document.getElementById('degreeLabel');
    const names = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
    let currentDeg = 0;
    let swayTimeout = null;

    function setDirection(deg) {
      arrow.style.setProperty('--target-deg', deg + 'deg');
      arrow.classList.add('rotating');
      arrow.classList.remove('swaying');
      if (swayTimeout) clearTimeout(swayTimeout);

      setTimeout(() => {
        arrow.classList.remove('rotating');
        arrow.classList.add('swaying');
      }, 600);

      const idx = Math.round(deg / 45) % 8;
      dirLabel.textContent = names[idx];
      degLabel.textContent = deg + '\u00B0';

      if (deg >= 360) deg = deg - 360;
      if (deg < 0) deg = deg + 360;
      currentDeg = deg;
    }

    document.querySelectorAll('.ctrl-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        setDirection(parseInt(btn.dataset.deg));
      });
    });

    setDirection(45);
  </script>
</body>
</html>
