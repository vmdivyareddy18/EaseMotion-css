<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Status Dot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="title">System Status</h2>
    <div class="status-list">
      <div class="status-row">
        <span class="status-dot live"></span>
        <span class="status-name">API Server</span>
        <span class="status-label">Operational</span>
      </div>
      <div class="status-row">
        <span class="status-dot live"></span>
        <span class="status-name">Database</span>
        <span class="status-label">Connected</span>
      </div>
      <div class="status-row">
        <span class="status-dot warning"></span>
        <span class="status-name">Cache Service</span>
        <span class="status-label">Degraded</span>
      </div>
      <div class="status-row">
        <span class="status-dot down"></span>
        <span class="status-name">Worker Queue</span>
        <span class="status-label">Offline</span>
      </div>
      <div class="status-row">
        <span class="status-dot live"></span>
        <span class="status-name">CDN</span>
        <span class="status-label">Active</span>
      </div>
    </div>
  </div>
</body>
</html>
