<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deployment Stage Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="deploy-card">
    <h1>Release pipeline</h1>
    <ol class="stage-list">
      <li class="done"><span>Build assets</span><strong>Passed</strong></li>
      <li class="done"><span>Unit tests</span><strong>Passed</strong></li>
      <li class="running"><span>Preview deploy</span><strong>Running</strong></li>
      <li class="warning"><span>Accessibility scan</span><strong>Warning</strong></li>
      <li class="blocked"><span>Production promote</span><strong>Blocked</strong></li>
    </ol>
  </main>
</body>
</html>
