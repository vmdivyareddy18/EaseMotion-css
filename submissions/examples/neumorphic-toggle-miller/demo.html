<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neumorphic Toggle Switch — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #e0e5ec;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a3b1c6;
      margin: 0 0 20px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 20px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .tag {
      font-size: 11px;
      color: #a3b1c6;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>

  <!-- Default -->
  <div class="demo-group">
    <h2>Default — click to toggle</h2>
    <div class="row">
      <div class="col">
        <label class="neumorphic-toggle">
          <input type="checkbox" />
          <span class="slider"></span>
        </label>
        <span class="tag">Off</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">On</span>
      </div>
    </div>
  </div>

  <!-- Sizes -->
  <div class="demo-group">
    <h2>Sizes</h2>
    <div class="row">
      <div class="col">
        <label class="neumorphic-toggle neumorphic-toggle-sm">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Small</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Default</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle neumorphic-toggle-lg">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Large</span>
      </div>
    </div>
  </div>

  <!-- Color variants -->
  <div class="demo-group">
    <h2>Color Variants</h2>
    <div class="row">
      <div class="col">
        <label class="neumorphic-toggle">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Violet</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle neumorphic-toggle-pink">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Pink</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle neumorphic-toggle-amber">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Amber</span>
      </div>
      <div class="col">
        <label class="neumorphic-toggle neumorphic-toggle-cyan">
          <input type="checkbox" checked />
          <span class="slider"></span>
        </label>
        <span class="tag">Cyan</span>
      </div>
    </div>
  </div>

  <!-- With label text -->
  <div class="demo-group">
    <h2>With Label</h2>
    <label class="neumorphic-toggle">
      <input type="checkbox" />
      <span class="slider"></span>
      <span class="nm-label">Dark Mode</span>
    </label>
    <label class="neumorphic-toggle">
      <input type="checkbox" checked />
      <span class="slider"></span>
      <span class="nm-label">Notifications</span>
    </label>
    <label class="neumorphic-toggle">
      <input type="checkbox" disabled />
      <span class="slider"></span>
      <span class="nm-label">Disabled</span>
    </label>
  </div>

</body>
</html>
