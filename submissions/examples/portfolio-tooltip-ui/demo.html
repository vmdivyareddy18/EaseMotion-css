<!DOCTYPE html>
<html>
<head>
  <title>Tooltip UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h2>Hover on buttons</h2>

  <div class="tooltip">
    <button>Hover Me</button>
    <span class="tooltip-text">This is a tooltip</span>
  </div>

  <div class="tooltip">
    <button>Info</button>
    <span class="tooltip-text">More information here</span>
  </div>

</div>

</body>
</html>
