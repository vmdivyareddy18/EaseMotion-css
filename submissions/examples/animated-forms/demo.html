<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Form Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  
  <!-- Component Specific CSS -->
  <link rel="stylesheet" href="../../../components/cards.css" />
  <link rel="stylesheet" href="../../../components/buttons.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 10vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 450px;
      width: 100%;
    }
    h1 {
      color: var(--ease-color-text);
      margin-bottom: var(--ease-space-6);
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h1>EaseMotion Forms</h1>
    
    <form class="ease-card ease-card-shadow ease-padding-6">
      
      <!-- Floating Label Text Input -->
      <div class="ease-form-group">
        <input type="text" id="username" class="ease-input" placeholder=" " required>
        <label for="username" class="ease-label">Username</label>
      </div>

      <div class="ease-form-group">
        <input type="password" id="password" class="ease-input" placeholder=" " required>
        <label for="password" class="ease-label">Password</label>
      </div>

      <!-- Animated Checkbox -->
      <div class="ease-margin-b-4" style="margin-bottom: 1rem;">
        <label class="ease-checkbox-wrapper">
          <input type="checkbox" class="ease-checkbox" checked>
          <span class="ease-checkbox-custom"></span>
          <span class="ease-checkbox-text">Keep me logged in</span>
        </label>
      </div>

      <!-- Smooth Toggle Switch -->
      <div class="ease-margin-b-6" style="margin-bottom: 1.5rem;">
        <label class="ease-toggle-wrapper">
          <input type="checkbox" class="ease-toggle">
          <span class="ease-toggle-slider"></span>
          <span class="ease-toggle-text">Enable Notifications</span>
        </label>
      </div>
      
      <button type="button" class="ease-btn ease-btn-primary ease-hover-grow" style="width: 100%;">
        Sign In
      </button>

    </form>
  </div>

</body>
</html>
