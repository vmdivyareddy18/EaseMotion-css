<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Spatial Zone Parallax</title>
  
  <!-- Relative path loading your sandbox style context cleanly -->
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Spatial Parallax Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Move your cursor inside the dashboard window below. Sibling selector lookups shift stacked vector planes at varying speeds with 0 javascript rules.</p>
  </header>

  <!-- Sandbox Active Controlled Spatial Parallax Component Master Hull Frame -->
  <div class="alm-parallax-stage-hull">
    
    <!-- LEVEL 1: HIDDEN ABSOLUTE HOVER GRID MATRIX HIT-TESTING BOX -->
    <div class="alm-parallax-grid-trigger-box">
      <div class="alm-parallax-hover-zone" id="zone-1-1" title="Zone Track [01_01]"></div>
      <div class="alm-parallax-hover-zone" id="zone-1-2" title="Zone Track [01_02]"></div>
      <div class="alm-parallax-hover-zone" id="zone-1-3" title="Zone Track [01_03]"></div>
      <div class="alm-parallax-hover-zone" id="zone-2-1" title="Zone Track [02_01]"></div>
      <div class="alm-parallax-hover-zone" id="zone-2-2" title="Zone Track [02_02]"></div>
      <div class="alm-parallax-hover-zone" id="zone-2-3" title="Zone Track [02_03]"></div>
    </div>

    <!-- LEVEL 2: MULTI-LAYER STACKED SCENERY GEOMETRY PLATFORMS -->
    <div class="alm-parallax-composition">
      
      <!-- BACKGROUND SCENERY LAYER CARD -->
      <div class="alm-parallax-layer alm-layer-back">
        <div style="width: 100%; height: 100%; opacity: 0.03; background-image: radial-gradient(rgba(255,255,255,0.15) 1px, transparent 0); background-size: 16px 16px;"></div>
      </div>

      <!-- MIDGROUND SCENERY LAYER CARD -->
      <div class="alm-parallax-layer alm-layer-mid">
        <div class="alm-midground-vector-ring">
          <div style="position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #6c63ff; border-radius: 999px; box-shadow: 0 0 8px #6c63ff;"></div>
        </div>
      </div>

      <!-- FOREGROUND SCENERY LAYER CARD -->
      <div class="alm-parallax-layer alm-layer-fore">
        <div class="alm-foreground-text-deck">
          <span style="font-family: monospace; font-size: 0.65rem; color: #6c63ff; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;">Telemetry Core Matrix</span>
          <h3 style="color: white; margin: 4px 0 0 0; font-size: 0.875rem; font-weight: 800;">FLUID PARAMETERS</h3>
          <p style="font-size: 0.7rem; color: #94a3b8; margin: 4px 0 0 0; line-height: 1.45; width: 180px;">
            Hovering triggers hardware offsets natively, preserving deep visual system polish.
          </p>
        </div>
      </div>

    </div>

  </div>

</body>
</html>
