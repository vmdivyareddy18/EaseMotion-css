<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Skew Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #0a0a0c;
            font-family: 'Courier New', Courier, monospace;
            color: #f0f0f0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 4px;
        }
        .demo-section {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            margin-top: 2rem;
        }
        .glitch-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.2rem;
        }
        .glitch-box {
            width: 200px;
            height: 200px;
            background: #1a1a1e;
            border: 4px solid #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 auto;
        }
        .controls {
            margin-top: 2rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        button {
            padding: 0.8rem 1.6rem;
            font-family: inherit;
            font-size: 1rem;
            background: transparent;
            color: #f0f0f0;
            border: 2px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            background: #f0f0f0;
            color: #0a0a0c;
        }
        .label {
            margin-bottom: 0.5rem;
            color: #888;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Glitch Skew Effect</h1>
        
        <div class="demo-section">
            <div>
                <div class="label">Hover the text below</div>
                <div class="glitch-text glitch-skew-gc glitch-skew-split-gc" data-text="CYBERPUNK">CYBERPUNK</div>
            </div>

            <div>
                <div class="label">Box glitch (hover)</div>
                <div class="glitch-box glitch-skew-gc">SYSTEM</div>
            </div>

            <div>
                <div class="label">Triggered by class</div>
                <div id="target" class="glitch-text glitch-skew-split-gc" data-text="DISTORTION">DISTORTION</div>
                <div class="controls">
                    <button onclick="toggleGlitch()">Toggle Glitch Class</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function toggleGlitch() {
            const target = document.getElementById('target');
            target.classList.toggle('glitch-skew-active-gc');
        }
    </script>
</body>
</html>
