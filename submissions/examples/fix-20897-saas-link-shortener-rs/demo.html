<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Link Shortener</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="link-container">
        <div class="header">
            <h1>Make Every Click <span class="accent-pink">Count</span></h1>
            <p>Shorten your links, track your audience, and optimize your campaigns with our powerful analytics engine.</p>
        </div>

        <div class="app-mockup">
            <!-- Link Shortener Form -->
            <div class="shortener-box">
                <input type="text" placeholder="https://your-very-long-url.com/campaign/xyz" disabled>
                <button class="shorten-btn">Shorten</button>
            </div>
            
            <div class="result-box">
                <div class="short-url">lnk.sh/click23</div>
                <button class="copy-btn">Copy</button>
            </div>

            <!-- Analytics Dashboard -->
            <div class="analytics-box">
                <div class="analytics-header">
                    <h3>Click Performance</h3>
                    <span class="total-clicks">12,450 Clicks</span>
                </div>
                
                <div class="bar-chart">
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 40%;"></div>
                        <span class="day-label">M</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 65%;"></div>
                        <span class="day-label">T</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 50%;"></div>
                        <span class="day-label">W</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 85%;"></div>
                        <span class="day-label">T</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 100%;"></div>
                        <span class="day-label">F</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 30%;"></div>
                        <span class="day-label">S</span>
                    </div>
                    <div class="chart-col">
                        <div class="bar-fill" style="--target-height: 45%;"></div>
                        <span class="day-label">S</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
