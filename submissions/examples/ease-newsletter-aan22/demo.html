<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Animated Newsletter Signup Section</title>
<link rel="stylesheet" href="style.css">
</head>
<body style="background:#0d1117; padding: 4rem 1.5rem; min-height: 100vh; display:flex; align-items:center; justify-content:center;">

  <section class="ease-newsletter">
    <div class="ease-newsletter__orb ease-newsletter__orb--1"></div>
    <div class="ease-newsletter__orb ease-newsletter__orb--2"></div>
    <div class="ease-newsletter__content">
      <div class="ease-newsletter__icon">📬</div>
      <h2 class="ease-newsletter__title">Stay in the Loop</h2>
      <p class="ease-newsletter__subtitle">
        Get the latest EaseMotion CSS updates, tutorials,
        and component releases delivered to your inbox.
      </p>
      <div class="ease-newsletter__form" id="newsletterForm">
        <input type="email"
               placeholder="Enter your email address"
               class="ease-newsletter__input"
               id="newsletterEmail" />
        <button class="ease-newsletter__btn" id="newsletterBtn">
          Subscribe ↗
        </button>
      </div>
      <div class="ease-newsletter__success hidden" id="newsletterSuccess">
        <span>🎉</span>
        <p>You're subscribed! Welcome to the community.</p>
      </div>
      <p class="ease-newsletter__note">
        No spam ever. Unsubscribe anytime.
      </p>
    </div>
  </section>

  <script>
    const form = document.getElementById('newsletterForm');
    const btn = document.getElementById('newsletterBtn');
    const success = document.getElementById('newsletterSuccess');
    const emailInput = document.getElementById('newsletterEmail');

    btn.addEventListener('click', () => {
      if (!emailInput.value.trim()) {
        emailInput.focus();
        return;
      }
      btn.textContent = 'Subscribing...';
      btn.disabled = true;

      setTimeout(() => {
        form.style.display = 'none';
        success.classList.remove('hidden');
        launchConfetti();
      }, 900);
    });

    function launchConfetti() {
      const colors = ['#6366f1', '#3b82f6', '#a855f7', '#34d399', '#fbbf24'];
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.style.position = 'fixed';
        piece.style.width = '8px';
        piece.style.height = '8px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.top = '50%';
        piece.style.left = '50%';
        piece.style.borderRadius = '2px';
        piece.style.pointerEvents = 'none';
        piece.style.zIndex = '9999';
        document.body.appendChild(piece);

        const angle = Math.random() * 2 * Math.PI;
        const distance = 100 + Math.random() * 150;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        piece.animate([
          { transform: 'translate(0, 0) rotate(0deg)', opacity: 1 },
          { transform: `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
        ], {
          duration: 900 + Math.random() * 500,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
        }).onfinish = () => piece.remove();
      }
    }
  </script>

</body>
</html>
