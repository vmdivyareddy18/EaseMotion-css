<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Animated Breadcrumb | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="breadcrumb-demo-page">
  <main class="breadcrumb-wrapper">
    <header class="breadcrumb-header">
      <h1 class="breadcrumb-title">Animated Breadcrumb</h1>
      <p class="breadcrumb-subtitle">Slide-in trail effect proposed for <code>components/</code>.</p>
    </header>

    <!-- Playground -->
    <section class="breadcrumb-showcase">
      
      <article class="breadcrumb-card">
        <h3 class="breadcrumb-label">Standard Path</h3>
        
        <nav aria-label="breadcrumb">
          <ol class="ease-breadcrumb">
            <li class="ease-breadcrumb__item">
              <a href="#">Home</a>
              <span class="ease-breadcrumb__separator" aria-hidden="true">/</span>
            </li>
            <li class="ease-breadcrumb__item">
              <a href="#">Products</a>
              <span class="ease-breadcrumb__separator" aria-hidden="true">/</span>
            </li>
            <li class="ease-breadcrumb__item">
              <a href="#">Electronics</a>
              <span class="ease-breadcrumb__separator" aria-hidden="true">/</span>
            </li>
            <li class="ease-breadcrumb__item" aria-current="page">
              <span>Smartphones</span>
            </li>
          </ol>
        </nav>
        
      </article>

      <article class="breadcrumb-card">
        <h3 class="breadcrumb-label">With Arrow Separators</h3>
        
        <nav aria-label="breadcrumb">
          <ol class="ease-breadcrumb">
            <li class="ease-breadcrumb__item">
              <a href="#">Dashboard</a>
              <span class="ease-breadcrumb__separator" aria-hidden="true">&gt;</span>
            </li>
            <li class="ease-breadcrumb__item">
              <a href="#">Settings</a>
              <span class="ease-breadcrumb__separator" aria-hidden="true">&gt;</span>
            </li>
            <li class="ease-breadcrumb__item" aria-current="page">
              <span>Security</span>
            </li>
          </ol>
        </nav>
        
      </article>

    </section>
  </main>
</body>
</html>
