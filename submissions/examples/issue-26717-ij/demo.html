<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-sloth-hang | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="leaf-sloth ls-left"></div>
    <div class="leaf-sloth ls-right"></div>
    <div class="branch-sloth"></div>
    <div class="arm-sloth arm-sloth-l"></div>
    <div class="arm-sloth arm-sloth-r"></div>
    <div class="sloth-body">
      <div class="sloth-head">
        <div class="eye-sloth eye-sloth-l"><div class="eye-sloth-shine"></div></div>
        <div class="eye-sloth eye-sloth-r"><div class="eye-sloth-shine"></div></div>
        <div class="nose-sloth"></div>
        <div class="mouth-sloth"></div>
      </div>
      <div class="leg-sloth leg-sloth-l">
        <div class="claw claw-1"></div>
        <div class="claw claw-2"></div>
        <div class="claw claw-3"></div>
      </div>
      <div class="leg-sloth leg-sloth-r">
        <div class="claw claw-1"></div>
        <div class="claw claw-2"></div>
        <div class="claw claw-3"></div>
      </div>
    </div>
    <div class="zzz">z</div>
    <div class="zzz zzz-2">z</div>
    <div class="zzz zzz-3">z</div>
  </div>
</body>
</html>
