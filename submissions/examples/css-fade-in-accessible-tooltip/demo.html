<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible CSS Fade-In Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="accessible-container">
    <h2>Account Settings</h2>
    <p class="description">Review your personal profile configurations below.</p>

    <div class="settings-form">
      <div class="settings-row">
        <div class="setting-info">
          <span class="setting-label" id="label-telemetry">
            Allow Anonymous Telemetry Data Collection
          </span>
          <p class="setting-subtext">Helps our team optimize processing routines safely.</p>
        </div>

        <div class="tooltip-container">
          <span class="tooltip-trigger-wrapper" 
                tabindex="0" 
                aria-describedby="telemetry-info-tooltip"
                aria-label="More information about telemetry data collection">
            <span class="info-icon" aria-hidden="true">i</span>
          </span>
          
          <div id="telemetry-info-tooltip" 
               class="tooltip-bubble" 
               role="tooltip">
            Data is stripped of identifiers, fully encrypted, and stored strictly for performance metrics calculation loops.
            <div class="tooltip-arrow" aria-hidden="true"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
