<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Gradient Background Showcase</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gradient-showcase">
    <div class="gradient-card">
      <div class="gradient-preview slow-shift"></div>
      <h3>Slow Shifting</h3>
      <p>Moves between two gradient positions</p>
      <code>.bg-gradient-shift</code>
    </div>
    <div class="gradient-card">
      <div class="gradient-preview radial-breathe"></div>
      <h3>Radial Breathing</h3>
      <p>Pulsing radial gradient center</p>
      <code>.bg-radial-breathe</code>
    </div>
    <div class="gradient-card">
      <div class="gradient-preview conic-spin"></div>
      <h3>Conic Spinning</h3>
      <p>Rotating conic gradient</p>
      <code>.bg-conic-spin</code>
    </div>
  </div>
</body>
</html>
