<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Horizontal Stepper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stepper">
    <div class="step active">
        <div class="circle">1</div>
        <span>Login</span>
    </div>

    <div class="line"></div>

    <div class="step active">
        <div class="circle">2</div>
        <span>Address</span>
    </div>

    <div class="line"></div>

    <div class="step">
        <div class="circle">3</div>
        <span>Payment</span>
    </div>

    <div class="line"></div>

    <div class="step">
        <div class="circle">4</div>
        <span>Complete</span>
    </div>
</div>

</body>
</html>
