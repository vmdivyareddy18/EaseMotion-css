<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Glass Card — EaseMotion CSS Example</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <main class="wrap">
        <h1>Glassmorphism Card</h1>

        <section class="grid">
            <article class="glass-card">
                <header class="card-head">
                    <h2>Profile</h2>
                    <p class="muted">Member since 2024</p>
                </header>

                <div class="card-body">
                    <p>
                        Clean, translucent card using <code>backdrop-filter</code> and a subtle
                        gradient accent. Works with dark backgrounds.
                    </p>
                </div>

                <footer class="card-actions">
                    <button class="btn primary">Follow</button>
                    <button class="btn">Message</button>
                </footer>
            </article>

            <article class="glass-card glass-card--accent">
                <header class="card-head">
                    <h2>Project</h2>
                    <p class="muted">UI exploration</p>
                </header>

                <div class="card-body">
                    <p>Use this layout for feature promos, dialogs, or cards in dashboards.</p>
                </div>

                <footer class="card-actions">
                    <button class="btn primary">Open</button>
                </footer>
            </article>
        </section>
    </main>
</body>

</html>
