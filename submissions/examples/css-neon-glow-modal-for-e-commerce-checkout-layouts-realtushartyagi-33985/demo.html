<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Neon Glow Modal (E-Commerce Checkout)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #0f172a; /* Slate 900 */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 14px 28px;
      background: #1e293b;
      color: #10b981; /* Secure green */
      text-decoration: none;
      font-weight: 600;
      font-size: 1.1rem;
      border: 1px solid #10b981;
      border-radius: 8px;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .demo-trigger-btn:hover {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
      background: rgba(16, 185, 129, 0.05);
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#checkout-modal" class="demo-trigger-btn">Proceed to Checkout</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="checkout-modal" class="ease-glow-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-glow-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-glow-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      
      <!-- Header -->
      <div class="ease-glow-modal-header">
        <h2 id="modal-title" class="ease-glow-modal-title">
          <span class="ease-glow-lock-icon"></span>
          Secure Checkout
        </h2>
        <a href="#" class="ease-glow-modal-close" aria-label="Close modal dialog">&times;</a>
      </div>

      <!-- Body -->
      <div class="ease-glow-modal-body">
        
        <div class="ease-glow-order-summary">
          <div class="ease-glow-order-row">
            <span>EaseMotion Pro License</span>
            <span>$49.00</span>
          </div>
          <div class="ease-glow-order-row">
            <span>Tax (Calculated at checkout)</span>
            <span>$0.00</span>
          </div>
          <div class="ease-glow-order-row">
            <span>Total Due</span>
            <span class="ease-glow-total-price">$49.00</span>
          </div>
        </div>

        <div class="ease-glow-input-group">
          <label>Card Number</label>
          <div class="ease-glow-input-fake">•••• •••• •••• 4242</div>
        </div>
        
        <div style="display: flex; gap: 16px;">
          <div class="ease-glow-input-group" style="flex: 1;">
            <label>Expiry Date</label>
            <div class="ease-glow-input-fake">12 / 24</div>
          </div>
          <div class="ease-glow-input-group" style="flex: 1;">
            <label>CVC</label>
            <div class="ease-glow-input-fake">•••</div>
          </div>
        </div>

      </div>
      
      <!-- Footer -->
      <div class="ease-glow-modal-footer">
        <a href="#" class="ease-glow-modal-btn">Pay $49.00</a>
      </div>

    </div>

  </div>

</body>
</html>
