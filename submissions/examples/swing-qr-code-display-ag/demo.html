<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing QR Code Display — EaseMotion CSS Feature</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--ease-color-bg); font-family: var(--ease-font-sans); color: var(--ease-color-text);">

  <div class="ease-qr-container">
    <div class="ease-qr-mount" aria-hidden="true"></div>
    <a href="#profile" class="ease-qr-sign-wrapper" aria-label="EaseMotion corporate profile QR code. Scan to view directory.">
      <span class="ease-sr-only">Hanging sign. Press Enter to view profile details.</span>
      <div class="ease-qr-wire" aria-hidden="true"></div>
      <div class="ease-qr-card">

        <div class="ease-qr-header">
          <div class="ease-qr-logo">
            <div class="ease-qr-logo-icon" aria-hidden="true"></div>
            <span>EaseMotion</span>
          </div>
          <span class="ease-qr-badge">Profile</span>
        </div>

 
        <div class="ease-qr-code-area">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="0" width="28" height="28" fill="var(--ease-color-neutral-900)" />
            <rect x="4" y="4" width="20" height="20" fill="#ffffff" />
            <rect x="8" y="8" width="12" height="12" fill="var(--ease-color-neutral-900)" />
            <rect x="72" y="0" width="28" height="28" fill="var(--ease-color-neutral-900)" />
            <rect x="76" y="4" width="20" height="20" fill="#ffffff" />
            <rect x="80" y="8" width="12" height="12" fill="var(--ease-color-neutral-900)" />
            <rect x="0" y="72" width="28" height="28" fill="var(--ease-color-neutral-900)" />
            <rect x="4" y="76" width="20" height="20" fill="#ffffff" />
            <rect x="8" y="80" width="12" height="12" fill="var(--ease-color-neutral-900)" />
            <rect x="36" y="8" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="44" y="8" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="52" y="8" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="60" y="8" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            
            <rect x="8" y="36" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="8" y="44" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="8" y="52" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="8" y="60" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            
            <rect x="76" y="76" width="16" height="16" fill="var(--ease-color-neutral-900)" />
            <rect x="80" y="80" width="8" height="8" fill="#ffffff" />
            <rect x="82" y="82" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="36" y="20" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="48" y="24" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="60" y="20" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="64" y="28" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            
            <rect x="20" y="36" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="36" y="36" width="4" height="12" fill="var(--ease-color-neutral-900)" />
            <rect x="44" y="40" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="56" y="36" width="12" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="76" y="36" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="88" y="40" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            
            <rect x="24" y="48" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="48" y="48" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="60" y="44" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="68" y="52" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="80" y="52" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            
            <rect x="20" y="60" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="36" y="60" width="12" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="52" y="60" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="60" y="64" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="92" y="60" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            
            <rect x="36" y="76" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="48" y="72" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="60" y="76" width="4" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="64" y="84" width="8" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="36" y="88" width="4" height="8" fill="var(--ease-color-neutral-900)" />
            <rect x="48" y="88" width="12" height="4" fill="var(--ease-color-neutral-900)" />
            <rect x="40" y="40" width="20" height="20" rx="3" fill="#ffffff" />
            <rect x="43" y="43" width="14" height="14" rx="2" fill="var(--ease-color-primary)" />
            <path d="M47 50L49 52L53 48" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <div class="ease-qr-footer">
          <div class="ease-qr-title">Corporate Directory</div>
          <div class="ease-qr-subtitle">Scan to check in</div>
        </div>
      </div>
    </a>
  </div>

</body>
</html>
