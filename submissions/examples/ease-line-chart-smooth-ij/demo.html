<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smooth Line Chart - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lcs-main">
    <h1 class="lcs-title">Smooth Line Chart</h1>
    <p class="lcs-desc">Animated line chart with stroke-draw and point reveal</p>
    <div class="lcs-chart-wrap">
      <svg class="lcs-svg" viewBox="0 0 500 250" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="lcs-grad1" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--lcs-line-color)" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="var(--lcs-line-color)" stop-opacity="0"/>
          </linearGradient>
          <linearGradient id="lcs-grad2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--lcs-line-2-color)" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="var(--lcs-line-2-color)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        <!-- grid lines -->
        <g class="lcs-grid">
          <line x1="40" y1="30" x2="40" y2="220"/>
          <line x1="40" y1="55" x2="480" y2="55"/>
          <line x1="40" y1="92.5" x2="480" y2="92.5"/>
          <line x1="40" y1="130" x2="480" y2="130"/>
          <line x1="40" y1="167.5" x2="480" y2="167.5"/>
          <line x1="40" y1="205" x2="480" y2="205"/>
          <line x1="40" y1="220" x2="480" y2="220"/>
        </g>
        <!-- area fills -->
        <path class="lcs-area" data-d="M40,200 Q93.33,140 146.67,160 Q200,100 253.33,130 Q306.67,70 360,90 Q413.33,50 460,60 L460,220 L40,220 Z" fill="url(#lcs-grad1)"/>
        <path class="lcs-area" data-d="M40,200 Q93.33,170 146.67,180 Q200,140 253.33,155 Q306.67,110 360,125 Q413.33,95 460,100 L460,220 L40,220 Z" fill="url(#lcs-grad2)"/>
        <!-- lines -->
        <path class="lcs-line" data-d="M40,200 Q93.33,140 146.67,160 Q200,100 253.33,130 Q306.67,70 360,90 Q413.33,50 460,60" data-length="562"/>
        <path class="lcs-line lcs-line-2" data-d="M40,200 Q93.33,170 146.67,180 Q200,140 253.33,155 Q306.67,110 360,125 Q413.33,95 460,100" data-length="477"/>
        <!-- points dataset 1 -->
        <circle class="lcs-point" cx="40" cy="200" r="4" data-i="0"/>
        <circle class="lcs-point" cx="93.33" cy="140" r="4" data-i="1"/>
        <circle class="lcs-point" cx="146.67" cy="160" r="4" data-i="2"/>
        <circle class="lcs-point" cx="200" cy="100" r="4" data-i="3"/>
        <circle class="lcs-point" cx="253.33" cy="130" r="4" data-i="4"/>
        <circle class="lcs-point" cx="306.67" cy="70" r="4" data-i="5"/>
        <circle class="lcs-point" cx="360" cy="90" r="4" data-i="6"/>
        <circle class="lcs-point" cx="413.33" cy="50" r="4" data-i="7"/>
        <circle class="lcs-point" cx="460" cy="60" r="4" data-i="8"/>
        <!-- points dataset 2 -->
        <circle class="lcs-point lcs-point-2" cx="40" cy="200" r="4" data-i="0"/>
        <circle class="lcs-point lcs-point-2" cx="93.33" cy="170" r="4" data-i="1"/>
        <circle class="lcs-point lcs-point-2" cx="146.67" cy="180" r="4" data-i="2"/>
        <circle class="lcs-point lcs-point-2" cx="200" cy="140" r="4" data-i="3"/>
        <circle class="lcs-point lcs-point-2" cx="253.33" cy="155" r="4" data-i="4"/>
        <circle class="lcs-point lcs-point-2" cx="306.67" cy="110" r="4" data-i="5"/>
        <circle class="lcs-point lcs-point-2" cx="360" cy="125" r="4" data-i="6"/>
        <circle class="lcs-point lcs-point-2" cx="413.33" cy="95" r="4" data-i="7"/>
        <circle class="lcs-point lcs-point-2" cx="460" cy="100" r="4" data-i="8"/>
        <!-- labels -->
        <text class="lcs-label" x="40" y="240">Jan</text>
        <text class="lcs-label" x="93.33" y="240">Feb</text>
        <text class="lcs-label" x="146.67" y="240">Mar</text>
        <text class="lcs-label" x="200" y="240">Apr</text>
        <text class="lcs-label" x="253.33" y="240">May</text>
        <text class="lcs-label" x="306.67" y="240">Jun</text>
        <text class="lcs-label" x="360" y="240">Jul</text>
        <text class="lcs-label" x="413.33" y="240">Aug</text>
        <text class="lcs-label" x="460" y="240">Sep</text>
        <text class="lcs-label lcs-label-y" x="32" y="58">100</text>
        <text class="lcs-label lcs-label-y" x="32" y="95.5">75</text>
        <text class="lcs-label lcs-label-y" x="32" y="133">50</text>
        <text class="lcs-label lcs-label-y" x="32" y="170.5">25</text>
        <text class="lcs-label lcs-label-y" x="32" y="208">0</text>
        <!-- legend -->
        <line class="lcs-legend-line" x1="50" y1="12" x2="70" y2="12"/>
        <text class="lcs-legend-text" x="74" y="16">Series A</text>
        <line class="lcs-legend-line lcs-legend-line-2" x1="140" y1="12" x2="160" y2="12"/>
        <text class="lcs-legend-text" x="164" y="16">Series B</text>
      </svg>
    </div>
    <button class="lcs-btn" id="lcsBtn">Replay</button>
  </main>
  <script>
    const svg = document.querySelector('.lcs-svg');
    const lines = svg.querySelectorAll('.lcs-line');
    const points = svg.querySelectorAll('.lcs-point');
    const btn = document.getElementById('lcsBtn');
    let playing = false;

    function animate() {
      if (playing) return;
      playing = true;
      lines.forEach(l => l.classList.remove('lcs-line-drawn'));
      points.forEach(p => p.classList.remove('lcs-point-visible'));
      void svg.offsetWidth;
      requestAnimationFrame(() => {
        lines.forEach(l => l.classList.add('lcs-line-drawn'));
        points.forEach(p => {
          const delay = parseFloat(p.getAttribute('data-i')) * 0.08;
          p.style.setProperty('--lcs-pt-delay', delay + 's');
          p.classList.add('lcs-point-visible');
        });
        playing = false;
      });
    }

    document.fonts.ready.then(() => setTimeout(animate, 100));
    setTimeout(animate, 300);
    btn.addEventListener('click', animate);
  </script>
</body>
</html>
