<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Globe Rotation Loader — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Globe Rotation Loader</h2>
    <p>A spinning globe loader with rotating continents. Uses pure CSS.</p>
    <div class="globe-loader" id="globeLoader">
      <div class="globe-loader__sphere"></div>
      <div class="globe-loader__continents">
        <div class="globe-loader__land"></div>
        <div class="globe-loader__land globe-loader__land--2"></div>
        <div class="globe-loader__land globe-loader__land--3"></div>
      </div>
      <div class="globe-loader__shadow"></div>
    </div>
    <p class="loader-label">Loading…</p>
    <div class="vars">
      <label>--loader-size <input type="range" min="40" max="200" step="5" value="100" class="var-range" data-var="--loader-size"></label>
      <label>--globe-color <input type="color" value="#4facfe" class="var-color" data-var="--globe-color"></label>
      <label>--continent-color <input type="color" value="#00f2fe" class="var-color" data-var="--continent-color"></label>
      <label>--spin-duration <input type="range" min="1" max="10" step="0.5" value="4" class="var-range" data-var="--spin-duration"></label>
    </div>
  </div>

  <script>
    document.querySelectorAll('.var-color').forEach(inp => {
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value);
      });
    });
    document.querySelectorAll('.var-range').forEach(inp => {
      const display = document.createElement('span');
      const suffix = inp.dataset.var === '--spin-duration' ? 's' : 'px';
      display.textContent = inp.value + suffix;
      inp.after(display);
      inp.addEventListener('input', () => {
        const suffix = inp.dataset.var === '--spin-duration' ? 's' : 'px';
        document.documentElement.style.setProperty(inp.dataset.var, inp.value + suffix);
        display.textContent = inp.value + suffix;
      });
    });
  </script>
</body>
</html>
