<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora Drag Drop Zone</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #e0e5ec; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="neumorphic-card ease-fade-in-up">
    <h2>Upload Assets</h2>
    
    <!-- Drag Drop Zone -->
    <div class="drag-drop-zone ease-pulse">
      <input type="file" class="file-input" multiple>
      
      <div class="aurora-bg"></div>
      
      <div class="zone-content ease-hover-pop">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-icon">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
        <h3>Drag & Drop Files Here</h3>
        <p>or click to browse from your computer</p>
      </div>
    </div>
    
  </div>

</body>
</html>
