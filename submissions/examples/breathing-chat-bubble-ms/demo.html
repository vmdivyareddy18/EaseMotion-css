<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathing Chat Bubble</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #f0fdfa; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="dashboard-widget ease-fade-in-up">
    <div class="widget-header">
      <h3>Dr. Sarah Jenkins</h3>
      <span class="status-indicator"></span>
    </div>
    
    <div class="chat-area">
      <div class="message received">
        <p>Your lab results are ready. Everything looks normal.</p>
        <span class="time">10:42 AM</span>
      </div>
      
      <div class="message sent">
        <p>Thank you, Doctor. Should I continue the current dosage?</p>
        <span class="time">10:45 AM</span>
      </div>
      
      <!-- Breathing Chat Bubble (Typing Indicator) -->
      <div class="message received typing-indicator ease-fade-in-up">
        <div class="breathing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>

    <!-- Floating support button with breathing effect -->
    <button class="support-fab ease-pulse">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>
  </div>

</body>
</html>
