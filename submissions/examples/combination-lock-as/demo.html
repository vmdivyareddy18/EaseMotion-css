<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Combination Lock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lock">
    <span class="shackle"></span>
    <div class="lock-body">
      <div class="dial">
        <span class="pointer"></span>
        <span class="num n0">0</span>
        <span class="num n5">5</span>
        <span class="num n10">10</span>
        <span class="num n15">15</span>
        <span class="num n20">20</span>
        <span class="num n25">25</span>
        <span class="num n30">30</span>
        <span class="num n35">35</span>
        <span class="dial-face"><b>24</b></span>
      </div>
    </div>
  </div>
</body>
</html>
