<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Cloud Drift - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Cloud Drift</h1>
    <div class="drift-container">
      <div class="cloud-drift">
        <div class="cloud-puff"></div>
        <div class="cloud-puff puff-right"></div>
      </div>
    </div>
    <p class="description">A cloud-shaped element drifts slowly left to right in a seamless looping translateX animation.</p>
  </div>
</body>
</html>
