<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spring OTP Input — Gaming Interface</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-spring-high-tension: cubic-bezier(0.43, 1.95, 0.22, 0.75);
      --ease-neon-fade: cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
</head>
<body>

  <!-- Cyberpunk Gaming Hub Module -->
  <div class="gaming-terminal">
    <div class="scanlines"></div>
    
    <div class="terminal-header">
      <div class="status-marker"></div>
      <h2>SECURE ACCESS KEY</h2>
      <p class="subtitle">Faction Verification Required</p>
    </div>

    <!-- OTP Input Form Grid Structure -->
    <form class="otp-container" onsubmit="return false;">
      <div class="otp-slot">
        <input type="text" maxlength="1" class="otp-field" pattern="[0-9]*" placeholder="0" autocomplete="off" autofocus>
        <div class="spring-glow-box"></div>
      </div>
      <div class="otp-slot">
        <input type="text" maxlength="1" class="otp-field" pattern="[0-9]*" placeholder="0" autocomplete="off">
        <div class="spring-glow-box"></div>
      </div>
      <div class="otp-slot">
        <input type="text" maxlength="1" class="otp-field" pattern="[0-9]*" placeholder="0" autocomplete="off">
        <div class="spring-glow-box"></div>
      </div>
      <div class="otp-slot">
        <input type="text" maxlength="1" class="otp-field" pattern="[0-9]*" placeholder="0" autocomplete="off">
        <div class="spring-glow-box"></div>
      </div>
    </form>

    <div class="terminal-footer">
      <span class="warning-text">⚠️ UNATHORIZED ACCESS WILL TRIGGER LOGOUT</span>
    </div>
  </div>

</body>
</html>
