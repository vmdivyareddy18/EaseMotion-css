<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animated Shopping Cart Sidebar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<button class="open-cart-btn" id="openCart">🛒 View Cart (3)</button>

<div class="cart-overlay" id="cartOverlay"></div>

<aside class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h2>Your Cart</h2>
    <button class="close-cart-btn" id="closeCart">&times;</button>
  </div>

  <div class="cart-items" id="cartItems">
    <div class="cart-item">
      <img src="https://placehold.co/60x60/1f6feb/ffffff?text=A" alt="Product A">
      <div class="cart-item-details">
        <p class="cart-item-name">Wireless Headphones</p>
        <p class="cart-item-price">$49.99</p>
      </div>
      <button class="remove-item-btn">&times;</button>
    </div>

    <div class="cart-item">
      <img src="https://placehold.co/60x60/238636/ffffff?text=B" alt="Product B">
      <div class="cart-item-details">
        <p class="cart-item-name">Smart Watch</p>
        <p class="cart-item-price">$89.99</p>
      </div>
      <button class="remove-item-btn">&times;</button>
    </div>

    <div class="cart-item">
      <img src="https://placehold.co/60x60/8957e5/ffffff?text=C" alt="Product C">
      <div class="cart-item-details">
        <p class="cart-item-name">USB-C Cable</p>
        <p class="cart-item-price">$9.99</p>
      </div>
      <button class="remove-item-btn">&times;</button>
    </div>
  </div>

  <div class="cart-footer">
    <div class="cart-total">
      <span>Total</span>
      <span id="cartTotal">$149.97</span>
    </div>
    <button class="checkout-btn">Proceed to Checkout</button>
  </div>
</aside>

<script>
  const openCart = document.getElementById('openCart');
  const closeCart = document.getElementById('closeCart');
  const cartSidebar = document.getElementById('cartSidebar');
  const cartOverlay = document.getElementById('cartOverlay');
  const cartItems = document.getElementById('cartItems');
  const cartTotal = document.getElementById('cartTotal');

  function openCartSidebar() {
    cartSidebar.classList.add('active');
    cartOverlay.classList.add('active');
  }

  function closeCartSidebar() {
    cartSidebar.classList.remove('active');
    cartOverlay.classList.remove('active');
  }

  openCart.addEventListener('click', openCartSidebar);
  closeCart.addEventListener('click', closeCartSidebar);
  cartOverlay.addEventListener('click', closeCartSidebar);

  function recalcTotal() {
    const prices = [...cartItems.querySelectorAll('.cart-item-price')]
      .map(el => parseFloat(el.textContent.replace('$', '')));
    const total = prices.reduce((sum, p) => sum + p, 0);
    cartTotal.textContent = '$' + total.toFixed(2);
  }

  document.querySelectorAll('.remove-item-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const item = btn.closest('.cart-item');
      item.classList.add('removing');
      item.addEventListener('transitionend', () => {
        item.remove();
        recalcTotal();
      }, { once: true });
    });
  });
</script>

</body>
</html>
