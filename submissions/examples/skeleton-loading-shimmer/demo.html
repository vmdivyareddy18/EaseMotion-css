<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading Shimmer Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="font-family: sans-serif; padding: 2rem;">

  <h1>Skeleton Loading Shimmer Demo</h1>
  <p>Below are examples of the skeleton shimmer applied to different elements.</p>

  <div style="display: flex; gap: 20px; flex-direction: column;">
    <!-- Large block -->
    <div class="skeleton-shimmer" style="width: 100%; max-width: 400px; height: 200px; border-radius: 8px;"></div>
    
    <!-- Title placeholder -->
    <div class="skeleton-shimmer" style="width: 250px; height: 24px; border-radius: 4px;"></div>
    
    <!-- Text placeholders -->
    <div class="skeleton-shimmer" style="width: 100%; max-width: 400px; height: 16px; border-radius: 4px;"></div>
    <div class="skeleton-shimmer" style="width: 90%; max-width: 360px; height: 16px; border-radius: 4px;"></div>
    <div class="skeleton-shimmer" style="width: 80%; max-width: 320px; height: 16px; border-radius: 4px;"></div>
    
    <!-- Avatar placeholder -->
    <div class="skeleton-shimmer" style="width: 50px; height: 50px; border-radius: 50%;"></div>
  </div>

</body>
</html>
