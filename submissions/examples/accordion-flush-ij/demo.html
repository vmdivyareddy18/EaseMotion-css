<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS accordion-flush</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Flush Accordion</h1>
    <div class="acc-flush">
      <div class="af-item">
        <div class="af-header">Profile <span class="af-arrow"></span></div>
        <div class="af-body">Manage your personal information and preferences.</div>
      </div>
      <div class="af-item">
        <div class="af-header">Notifications <span class="af-arrow"></span></div>
        <div class="af-body">Configure email and push notification settings.</div>
      </div>
      <div class="af-item">
        <div class="af-header">Privacy <span class="af-arrow"></span></div>
        <div class="af-body">Control your data and sharing preferences.</div>
      </div>
    </div>
  </div>
</body>
</html>
