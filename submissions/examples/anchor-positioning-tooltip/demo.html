<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anchor Positioning Tooltip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="apt-container">
    <h1>Anchor Positioning Tooltip</h1>
    <div class="apt-wrapper">
      <button class="apt-trigger" id="trigger-btn">Hover me</button>
      <div class="apt-tooltip" role="tooltip">Positioned with CSS anchor()!</div>
    </div>
  </main>
</body>
</html>
