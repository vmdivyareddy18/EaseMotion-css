<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>CSS Lightbox Demo</title>
</head>
<body>
  <h1>CSS Image Lightbox</h1>
  
  <a href="#img1">
    <img src="https://via.placeholder.com/150" alt="Thumbnail">
  </a>
  
  <div id="img1" class="lightbox-target">
    <a href="#">Close</a>
    <img src="https://via.placeholder.com/600" alt="Full Image">
  </div>
</body>
</html>
