<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Neon Status Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="card">
    <span class="badge">SYSTEM ONLINE</span>

    <div class="ring">
        <div class="dot"></div>
    </div>

    <h1>Server Status</h1>
    <p>Real-time monitoring interface with glowing neon effects.</p>

    <div class="stats">
        <div><strong>99.9%</strong><span>Uptime</span></div>
        <div><strong>24</strong><span>Nodes</span></div>
        <div><strong>128ms</strong><span>Latency</span></div>
    </div>

    <button>View Dashboard</button>
</main>

</body>
</html>
