<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Flag Rollout Meter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Feature Flag Rollout</h1>

        <p class="subtitle">
            Monitor rollout progress before enabling the feature for all users.
        </p>

        <div class="feature">

            <div class="header">

                <div>

                    <h3>New Dashboard Experience</h3>

                    <small>Flag: dashboard_v2</small>

                </div>

                <span class="status">
                    Rolling Out
                </span>

            </div>

            <div class="meter">

                <div class="fill"></div>

            </div>

            <div class="labels">

                <span>0%</span>

                <strong>72% Complete</strong>

                <span>100%</span>

            </div>

        </div>

        <div class="stats">

            <div class="stat">

                <span>Users Enabled</span>

                <strong>72,314</strong>

            </div>

            <div class="stat">

                <span>Total Users</span>

                <strong>100,000</strong>

            </div>

            <div class="stat">

                <span>Error Rate</span>

                <strong>0.18%</strong>

            </div>

        </div>

        <button>
            View Rollout Details
        </button>

    </div>

</div>

</body>
</html>
