<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empty Cells Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Empty Cells</h1>
      <p class="subtitle">Shows or hides borders and backgrounds of empty table cells.</p>
      <span class="badge">CSS Property: empty-cells</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">empty-cells: show</span>
          <span class="demo-value empty-cells-sm">Empty Cells variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">empty-cells: hide</span>
          <span class="demo-value empty-cells-md">Empty Cells variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="empty-cells"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
