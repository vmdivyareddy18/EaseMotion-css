<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Light Painter</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Neon Light Painter</h1>
        <p class="subtitle">Move your cursor to paint with glowing neon trails</p>

        <div class="painter-wrapper">
            <canvas id="neonCanvas"></canvas>

            <div class="controls">
                <button id="colorBtn">Color: Pink</button>
                <button id="sizeBtn">Size: Medium</button>
                <button id="fadeBtn">Fade: Normal</button>
                <button id="clearBtn">Clear</button>
            </div>

            <div class="status">
                <span id="statusText">🎨 Paint with light</span>
                <span id="dotCount">Dots: 0</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('neonCanvas');
        const ctx = canvas.getContext('2d');
        const colorBtn = document.getElementById('colorBtn');
        const sizeBtn = document.getElementById('sizeBtn');
        const fadeBtn = document.getElementById('fadeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusText = document.getElementById('statusText');
        const dotCount = document.getElementById('dotCount');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let dots = [];
        let currentColor = '#ff1493'; // Deep Pink
        let currentSize = 15;
        let fadeSpeed = 0.02;
        let isDrawing = false;
        let colorIndex = 0;
        let sizeIndex = 0;
        let fadeIndex = 0;
        let dotCounter = 0;
        let mouseX = 0;
        let mouseY = 0;

        // ===== COLOR PALETTES =====
        const colors = [
            { name: 'Pink', value: '#ff1493' },
            { name: 'Blue', value: '#00d4ff' },
            { name: 'Green', value: '#39ff14' },
            { name: 'Purple', value: '#b026ff' },
            { name: 'Orange', value: '#ff6b00' },
            { name: 'Cyan', value: '#00ffff' },
            { name: 'Red', value: '#ff0040' },
            { name: 'White', value: '#ffffff' },
        ];

        // ===== SIZE OPTIONS =====
        const sizes = [
            { name: 'Small', value: 8 },
            { name: 'Medium', value: 15 },
            { name: 'Large', value: 25 },
            { name: 'X-Large', value: 40 },
        ];

        // ===== FADE OPTIONS =====
        const fades = [
            { name: 'Slow', value: 0.008 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Instant', value: 0.08 },
        ];

        // ===== DOT CLASS =====
        class NeonDot {
            constructor(x, y, color, size) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.size = size;
                this.alpha = 1.0;
                this.glowIntensity = 1.0;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.trail = [];
                this.trailLength = 3 + Math.floor(Math.random() * 5);
                
                // Create trail positions
                for (let i = 0; i < this.trailLength; i++) {
                    this.trail.push({
                        x: x + (Math.random() - 0.5) * 10,
                        y: y + (Math.random() - 0.5) * 10,
                        alpha: 1 - (i / this.trailLength) * 0.5
                    });
                }
            }

            update() {
                this.alpha -= fadeSpeed;
                this.pulsePhase += 0.05;
                this.glowIntensity = 0.7 + Math.sin(this.pulsePhase) * 0.3;
                
                // Update trail
                for (let i = this.trail.length - 1; i > 0; i--) {
                    this.trail[i].x += (this.trail[i-1].x - this.trail[i].x) * 0.3;
                    this.trail[i].y += (this.trail[i-1].y - this.trail[i].y) * 0.3;
                    this.trail[i].alpha = this.trail[i-1].alpha * 0.9;
                }
                if (this.trail.length > 0) {
                    this.trail[0].x = this.x + (Math.random() - 0.5) * 2;
                    this.trail[0].y = this.y + (Math.random() - 0.5) * 2;
                    this.trail[0].alpha = this.alpha * 0.8;
                }
            }

            draw(ctx) {
                if (this.alpha <= 0) return;

                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = t.alpha * this.alpha * 0.3;
                    if (trailAlpha > 0.01) {
                        const trailSize = this.size * (1 - i / this.trail.length * 0.5);
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, trailSize * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = this.color;
                        ctx.globalAlpha = trailAlpha;
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                }

                // Main glow
                const glowSize = this.size * 3 * this.glowIntensity;
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowSize
                );
                
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color + 'aa');
                gradient.addColorStop(0.7, this.color + '44');
                gradient.addColorStop(1, this.color + '00');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha * 0.6;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Core dot
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.6, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 40;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Inner bright core
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = this.alpha * 0.8;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Sparkle effect
                if (Math.random() > 0.7) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = this.size * 0.8 + Math.random() * this.size * 0.5;
                    const sx = this.x + Math.cos(angle) * dist;
                    const sy = this.y + Math.sin(angle) * dist;
                    ctx.beginPath();
                    ctx.arc(sx, sy, 1 + Math.random() * 2, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.globalAlpha = this.alpha * 0.5;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // ===== DRAWING FUNCTIONS =====
        function drawNeonTrail() {
            if (isDrawing) {
                const dot = new NeonDot(mouseX, mouseY, currentColor, currentSize);
                dots.push(dot);
                dotCounter++;
            }

            // Update and draw all dots
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Background glow
            const bgGradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width * 0.7
            );
            bgGradient.addColorStop(0, 'rgba(10, 10, 30, 0.3)');
            bgGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw all dots
            for (let i = dots.length - 1; i >= 0; i--) {
                const dot = dots[i];
                dot.update();
                dot.draw(ctx);
                if (dot.isDead()) {
                    dots.splice(i, 1);
                }
            }

            // Update dot counter
            dotCount.textContent = `Dots: ${dots.length}`;

            requestAnimationFrame(drawNeonTrail);
        }

        // ===== EVENT LISTENERS =====

        // Mouse events
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
            isDrawing = true;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseenter', () => {
            isDrawing = true;
        });

        // Touch events
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            isDrawing = true;
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (touch.clientX - rect.left) * scaleX;
            mouseY = (touch.clientY - rect.top) * scaleY;
            isDrawing = true;
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });

        // ===== CONTROLS =====

        // Color
        colorBtn.addEventListener('click', () => {
            colorIndex = (colorIndex + 1) % colors.length;
            currentColor = colors[colorIndex].value;
            colorBtn.textContent = `Color: ${colors[colorIndex].name}`;
            statusText.textContent = `🎨 ${colors[colorIndex].name}`;
            statusText.style.color = currentColor;
            setTimeout(() => {
                statusText.textContent = '🎨 Paint with light';
                statusText.style.color = 'rgba(255, 255, 255, 0.6)';
            }, 1000);
        });

        // Size
        sizeBtn.addEventListener('click', () => {
            sizeIndex = (sizeIndex + 1) % sizes.length;
            currentSize = sizes[sizeIndex].value;
            sizeBtn.textContent = `Size: ${sizes[sizeIndex].name}`;
            statusText.textContent = `📏 ${sizes[sizeIndex].name}`;
            setTimeout(() => {
                statusText.textContent = '🎨 Paint with light';
            }, 1000);
        });

        // Fade
        fadeBtn.addEventListener('click', () => {
            fadeIndex = (fadeIndex + 1) % fades.length;
            fadeSpeed = fades[fadeIndex].value;
            fadeBtn.textContent = `Fade: ${fades[fadeIndex].name}`;
            statusText.textContent = `⏱️ ${fades[fadeIndex].name} fade`;
            setTimeout(() => {
                statusText.textContent = '🎨 Paint with light';
            }, 1000);
        });

        // Clear
        clearBtn.addEventListener('click', () => {
            dots = [];
            dotCounter = 0;
            statusText.textContent = '🧹 Cleared!';
            setTimeout(() => {
                statusText.textContent = '🎨 Paint with light';
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                sizeBtn.click();
            }
            if (e.key === 'f' || e.key === 'F') {
                fadeBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                clearBtn.click();
            }
        });

        // ===== INIT =====
        // Set initial color button text
        colorBtn.textContent = `Color: ${colors[0].name}`;
        sizeBtn.textContent = `Size: ${sizes[1].name}`;
        fadeBtn.textContent = `Fade: ${fades[1].name}`;

        // Start animation
        drawNeonTrail();

        console.log('🎨 Neon Light Painter loaded!');
        console.log('💡 Move cursor to paint');
        console.log('💡 C - Change color');
        console.log('💡 S - Change size');
        console.log('💡 F - Change fade speed');
        console.log('💡 SPACE - Clear');
    </script>
</body>
</html>
