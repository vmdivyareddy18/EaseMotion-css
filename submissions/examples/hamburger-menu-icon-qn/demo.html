<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Hamburger Menu Icon - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Checkbox hack for pure CSS toggle functionality -->
    <input type="checkbox" id="menu-toggle-qn" class="menu-checkbox-qn">
    
    <!-- The visual hamburger button -->
    <label for="menu-toggle-qn" class="hamburger-qn" aria-label="Toggle menu">
        <span class="bar-qn"></span>
        <span class="bar-qn"></span>
        <span class="bar-qn"></span>
    </label>
</body>
</html>
