<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Badge Pulse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Notification Badge Pulse</h1>
  <p class="subtitle">Click a bell to trigger a new notification. Badge pulses and bell shakes.</p>

  <div class="examples">
    <div class="bell-card">
      <div class="bell-container" data-count="3">
        <div class="bell-icon" role="button" tabindex="0" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="badge">3</span>
        </div>
        <p class="label">Default</p>
      </div>
    </div>

    <div class="bell-card">
      <div class="bell-container" data-count="12">
        <div class="bell-icon" role="button" tabindex="0" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="badge">12</span>
        </div>
        <p class="label">Large count</p>
      </div>
    </div>

    <div class="bell-card">
      <div class="bell-container" data-count="0">
        <div class="bell-icon" role="button" tabindex="0" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
          </svg>
          <span class="badge">0</span>
        </div>
        <p class="label">Empty state</p>
      </div>
    </div>
  </div>

  <p class="hint">Click any bell to simulate a new notification</p>

  <script>
    const containers = document.querySelectorAll('.bell-container');
    containers.forEach(container => {
      const badge = container.querySelector('.badge');
      const bell = container.querySelector('.bell-icon');
      bell.addEventListener('click', () => {
        let count = parseInt(badge.textContent, 10) || 0;
        count++;
        badge.textContent = count;
        badge.classList.remove('badge-pulse');
        bell.classList.remove('bell-shake');
        void badge.offsetWidth;
        void bell.offsetWidth;
        badge.classList.add('badge-pulse');
        bell.classList.add('bell-shake');
      });
    });
  </script>
</body>
</html>
