<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Alert Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="alert-card">
<h2>Security Alerts</h2>
<div class="alert"><span>Failed Login</span><b class="high">High</b></div>
<div class="alert"><span>Firewall Update</span><b class="low">Low</b></div>
<div class="alert"><span>Malware Scan</span><b class="medium">Medium</b></div>
<div class="alert"><span>Access Review</span><b class="low">Low</b></div>
</section>
</body>
</html>
