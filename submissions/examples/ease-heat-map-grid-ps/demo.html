<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heat Map Grid Component - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <header class="preview-header">
            <h1>Heat Map Grid Component</h1>
            <p>A data-density visualization matrix featuring stagger entry animations and fluid scaling micro-interactions.</p>
        </header>

        <!-- Component Showcase -->
        <div class="heatmap-wrapper">
            <div class="heatmap-grid">
                <!-- Row 1 -->
                <div class="heatmap-cell intensity-0"></div>
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-2"></div>
                <div class="heatmap-cell intensity-3"></div>
                <div class="heatmap-cell intensity-4"></div>
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-0"></div>
                
                <!-- Row 2 -->
                <div class="heatmap-cell intensity-2"></div>
                <div class="heatmap-cell intensity-4"></div>
                <div class="heatmap-cell intensity-0"></div>
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-3"></div>
                <div class="heatmap-cell intensity-2"></div>
                <div class="heatmap-cell intensity-1"></div>

                <!-- Row 3 -->
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-0"></div>
                <div class="heatmap-cell intensity-3"></div>
                <div class="heatmap-cell intensity-4"></div>
                <div class="heatmap-cell intensity-2"></div>
                <div class="heatmap-cell intensity-0"></div>
                <div class="heatmap-cell intensity-4"></div>
                
                <!-- Row 4 -->
                <div class="heatmap-cell intensity-3"></div>
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-2"></div>
                <div class="heatmap-cell intensity-0"></div>
                <div class="heatmap-cell intensity-1"></div>
                <div class="heatmap-cell intensity-4"></div>
                <div class="heatmap-cell intensity-3"></div>
            </div>

            <div class="heatmap-legend">
                <span>Less</span>
                <div class="legend-cell intensity-0"></div>
                <div class="legend-cell intensity-1"></div>
                <div class="legend-cell intensity-2"></div>
                <div class="legend-cell intensity-3"></div>
                <div class="legend-cell intensity-4"></div>
                <span>More</span>
            </div>
        </div>
    </main>
</body>
</html>
