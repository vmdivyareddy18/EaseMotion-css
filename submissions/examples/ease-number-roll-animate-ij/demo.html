<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Number Roll Animate</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='roll-bg')r.style.setProperty('--roll-bg',t.value);if(t.name==='digit-color')r.style.setProperty('--digit-color',t.value);if(t.name==='roll-height')r.style.setProperty('--roll-height',t.value+'px');if(t.name==='roll-duration')r.style.setProperty('--roll-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const disp=document.querySelector('.roll-display');let v=0;setInterval(()=>{v+=7;if(v>999)v=0;disp.textContent=v;disp.style.animation='none';void disp.offsetHeight;disp.style.animation='rollUp var(--roll-duration,0.5s) ease-out'},2500)})</script>
<div class="container"><p class="title">Number Roll Animate</p>
<div class="roll-counter"><div class="roll-display">0</div></div>
<div class="controls"><label>BG: <input type="color" name="roll-bg" value="#2d2d44"></label><label>Digit: <input type="color" name="digit-color" value="#4ecdc4"></label><label>Height: <input type="range" name="roll-height" min="24" max="80" value="48"></label><label>Speed: <input type="range" name="roll-duration" min="0.2" max="1" step="0.05" value="0.5"></label></div></div></body></html>
