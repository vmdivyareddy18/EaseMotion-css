<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Group with Overlap</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="avatar-group">
      <div class="avatar-item" data-name="Alice Wang">
        <div class="avatar-circle" style="background: #6366f1;">A</div>
      </div>
      <div class="avatar-item" data-name="Bob Martinez">
        <div class="avatar-circle" style="background: #a855f7;">B</div>
      </div>
      <div class="avatar-item" data-name="Carol Smith">
        <div class="avatar-circle" style="background: #ec4899;">C</div>
      </div>
      <div class="avatar-item" data-name="David Kim">
        <div class="avatar-circle" style="background: #14b8a6;">D</div>
      </div>
      <div class="avatar-item overflow-count">+3</div>
    </div>
  </div>
</body>
</html>
