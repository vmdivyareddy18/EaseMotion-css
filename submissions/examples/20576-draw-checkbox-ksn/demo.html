<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Checkbox Path-Drawing Demo</title>
    <!-- Import Inter font for premium styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Link component styles -->
    <link rel="stylesheet" href="./style.css" />

    <style>
      /* Page Container Aesthetics */
      body {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(
          circle at top right,
          #1e1b4b,
          #0f0c1b,
          #03001e
        );
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        color: #f8fafc;
      }

      .demo-container {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        padding: 2.5rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      .demo-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 99px;
        background: rgba(139, 92, 246, 0.15);
        border: 1px solid rgba(139, 92, 246, 0.3);
        color: #c084fc;
        font-size: 0.75rem;
        font-weight: 500;
        margin-bottom: 1rem;
      }

      .demo-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-top: 0;
        margin-bottom: 0.5rem;
        background: linear-gradient(to right, #c084fc, #a78bfa, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .demo-description {
        font-size: 0.875rem;
        color: #94a3b8;
        margin-bottom: 2rem;
        line-height: 1.5;
      }

      .list-area {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        margin-bottom: 1.5rem;
      }

      .draw-checkbox-label {
        font-size: 0.95rem;
        font-weight: 500;
        color: #cbd5e1;
        transition: color 0.3s ease;
      }

      /* Dim label slightly when task is completed */
      .draw-checkbox-input:checked ~ .draw-checkbox-label {
        color: #64748b;
        text-decoration: line-through;
      }

      .instructions {
        font-size: 0.75rem;
        color: #64748b;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="demo-container">
      <div class="demo-badge">Micro-interaction</div>
      <h1 class="demo-title">Path-Drawing Checkbox</h1>
      <p class="demo-description">
        An elegant, interactive checkbox component where the SVG checkmark path
        is dynamically drawn upon state change.
      </p>

      <div class="list-area">
        <!-- Task 1 -->
        <label class="draw-checkbox">
          <input type="checkbox" class="draw-checkbox-input" checked />
          <div class="draw-checkbox-box">
            <svg
              class="draw-checkbox-checkmark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
            >
              <path
                d="M20 6L9 17L4 12"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <span class="draw-checkbox-label">Design component architecture</span>
        </label>

        <!-- Task 2 -->
        <label class="draw-checkbox">
          <input type="checkbox" class="draw-checkbox-input" />
          <div class="draw-checkbox-box">
            <svg
              class="draw-checkbox-checkmark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
            >
              <path
                d="M20 6L9 17L4 12"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <span class="draw-checkbox-label">Write CSS layout rules</span>
        </label>

        <!-- Task 3 -->
        <label class="draw-checkbox">
          <input type="checkbox" class="draw-checkbox-input" />
          <div class="draw-checkbox-box">
            <svg
              class="draw-checkbox-checkmark"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="3"
            >
              <path
                d="M20 6L9 17L4 12"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </div>
          <span class="draw-checkbox-label"
            >Validate SVG checkmark path drawing</span
          >
        </label>
      </div>

      <div class="instructions">
        Click on list items to see the drawing effect.
      </div>
    </div>
  </body>
</html>
