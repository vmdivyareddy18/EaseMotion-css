<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Style Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>List Style Utilities</h1>

  <div class="demo-section">
    <h3>ease-list-none</h3>
    <ul class="ease-list-none">
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
    </ul>
  </div>

  <div class="demo-section">
    <h3>ease-list-disc ease-list-inside</h3>
    <ul class="ease-list-disc ease-list-inside">
      <li>Apple</li>
      <li>Banana</li>
      <li>Mango</li>
    </ul>
  </div>

  <div class="demo-section">
    <h3>ease-list-decimal ease-list-outside</h3>
    <ol class="ease-list-decimal ease-list-outside">
      <li>Step One</li>
      <li>Step Two</li>
      <li>Step Three</li>
    </ol>
  </div>

</body>
</html>
