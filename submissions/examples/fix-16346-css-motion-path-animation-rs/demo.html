<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Motion Path Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        prefix: 'ease-',
      }
    </script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* SVGs used to visualize the path. They are absolutely positioned to match the offset-paths. */
        .path-visualization {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 100px;
            pointer-events: none;
            overflow: visible;
        }
    </style>
</head>
<body class="ease-bg-slate-900 ease-text-white ease-font-sans ease-p-8 ease-min-h-screen ease-flex ease-flex-col ease-items-center">

    <div class="ease-text-center ease-mb-16">
        <h1 class="ease-text-4xl ease-font-bold ease-mb-4">CSS Motion Path Utilities</h1>
        <p class="ease-text-slate-400 ease-max-w-2xl">
            Animate elements along complex, custom geometric paths using purely CSS. The `offset-path` property allows shapes to follow SVG curves without JavaScript calculations.
        </p>
    </div>

    <div class="ease-flex ease-flex-col md:ease-flex-row ease-gap-20 ease-w-full ease-max-w-6xl ease-justify-center">
        
        <!-- Wave Path -->
        <div class="ease-relative ease-w-72 ease-h-40 ease-bg-slate-800 ease-rounded-xl ease-border ease-border-slate-700 ease-flex ease-items-center ease-justify-center ease-shadow-xl">
            
            <!-- SVG visualization of the path for demo purposes -->
            <svg class="path-visualization" viewBox="0 0 300 100" style="width: 250px;">
                <path d="M 0 50 Q 50 0 100 50 T 200 50 T 300 50" fill="transparent" stroke="#334155" stroke-width="4" stroke-dasharray="5,5"></path>
            </svg>
            
            <div class="ease-absolute ease-top-0 ease-left-0 ease-w-full ease-h-full" style="transform: scale(0.83); transform-origin: top left;">
                 <!-- The actual animating element -->
                <div class="ease-animate-motion-path ease-path-wave ease-w-8 ease-h-8 ease-bg-blue-500 ease-rounded-full ease-flex ease-items-center ease-justify-center ease-shadow-[0_0_15px_rgba(59,130,246,0.6)]">
                    <svg class="ease-w-4 ease-h-4 ease-text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </div>
            </div>
            
            <div class="ease-absolute -ease-bottom-10 ease-text-slate-400 ease-font-medium">Wave Path</div>
        </div>

        <!-- Infinity Path -->
        <div class="ease-relative ease-w-72 ease-h-40 ease-bg-slate-800 ease-rounded-xl ease-border ease-border-slate-700 ease-flex ease-items-center ease-justify-center ease-shadow-xl">
            
            <svg class="path-visualization" viewBox="0 0 100 100" style="width: 150px; height: 150px;">
                <path d="M 50 50 C 0 0, 0 100, 50 50 C 100 0, 100 100, 50 50 Z" fill="transparent" stroke="#334155" stroke-width="2" stroke-dasharray="5,5"></path>
            </svg>
            
            <div class="ease-absolute ease-top-1/2 ease-left-1/2 -ease-translate-x-1/2 -ease-translate-y-1/2" style="width: 150px; height: 150px;">
                <!-- The actual animating element -->
                <div class="ease-animate-motion-path-loop ease-path-infinity ease-w-6 ease-h-6 ease-bg-pink-500 ease-rounded-full ease-shadow-[0_0_15px_rgba(236,72,153,0.6)]"></div>
            </div>

            <div class="ease-absolute -ease-bottom-10 ease-text-slate-400 ease-font-medium">Infinity Loop</div>
        </div>
        
    </div>

</body>
</html>
