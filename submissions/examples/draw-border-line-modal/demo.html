<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Draw Border Line Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Interactive Modal
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal" role="dialog" aria-modal="true">

    <span class="border top"></span>
    <span class="border right"></span>
    <span class="border bottom"></span>
    <span class="border left"></span>

    <label for="modal-toggle" class="close">&times;</label>

    <h2>Interactive Interface</h2>

    <p>
        This modal demonstrates a pure CSS draw-border animation.
        Each border is animated independently, producing a smooth
        line drawing effect before revealing the content.
    </p>

    <button>Continue</button>

</div>

</body>
</html>
