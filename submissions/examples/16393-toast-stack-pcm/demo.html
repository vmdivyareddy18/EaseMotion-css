<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Stacking & Positioning - Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      padding: 3rem 2rem;
      max-width: 900px;
      margin: 0 auto;
    }

    .section {
      margin-bottom: 2.5rem;
      padding: 2rem;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
    }

    .section h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #94a3b8;
      margin-bottom: 1.5rem;
    }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 0.25rem;
      background: #e2e8f0;
      font-size: 0.7rem;
      color: #64748b;
      font-family: monospace;
      margin-bottom: 0.75rem;
    }

    .page-header { text-align: center; margin-bottom: 3rem; }
    .page-header h1 { font-size: 1.75rem; }
    .page-header p { color: #64748b; font-size: 0.9rem; margin-top: 0.5rem; }

    .btn-group { display: flex; flex-wrap: wrap; gap: 0.75rem; }
    .btn {
      padding: 0.6rem 1.25rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-success { background: #22c55e; }
    .btn-error { background: #ef4444; }
    .btn-warning { background: #f59e0b; }
    .btn-info { background: #3b82f6; }
    .btn-outline {
      background: transparent;
      border: 1px solid #cbd5e1;
      color: #475569;
    }
    .btn-outline:hover { background: #f1f5f9; }

    .btn-sm { padding: 0.4rem 0.9rem; font-size: 0.8rem; }

    @media (max-width: 640px) { body { padding: 1.5rem 1rem; } }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>Toast Notification Stacking</h1>
    <p>Stackable toasts with 5 positions, 4 types, auto-dismiss, and close button</p>
  </div>

  <!-- ── Type Demos ──────────────────────── -->
  <div class="section">
    <h2>Toast Types</h2>
    <div class="btn-group">
      <button class="btn btn-success" onclick="showToast({message:'Data saved successfully',type:'success',title:'Success'})">Success</button>
      <button class="btn btn-error" onclick="showToast({message:'Something went wrong',type:'error',title:'Error'})">Error</button>
      <button class="btn btn-warning" onclick="showToast({message:'Your session expires soon',type:'warning',title:'Warning'})">Warning</button>
      <button class="btn btn-info" onclick="showToast({message:'New update available',type:'info',title:'Info'})">Info</button>
    </div>
  </div>

  <!-- ── Stacking Demo ───────────────────── -->
  <div class="section">
    <h2>Stack Multiple Toasts</h2>
    <div class="btn-group">
      <button class="btn btn-info" onclick="showToast({message:'Toast #' + Date.now(),type:'info'})">Single Toast</button>
      <button class="btn btn-outline" onclick="showToasts()">Stack 5 Random</button>
    </div>
    <p style="margin-top:0.75rem;font-size:0.85rem;color:#64748b;">Click "Stack 5 Random" to see proper vertical stacking.</p>
  </div>

  <!-- ── Position Tests ──────────────────── -->
  <div class="section">
    <h2>Position</h2>
    <div class="btn-group">
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Top Right position',position:'top-right',duration:2000})">Top Right</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Top Left position',position:'top-left',duration:2000})">Top Left</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Bottom Right position',position:'bottom-right',duration:2000})">Bottom Right</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Bottom Left position',position:'bottom-left',duration:2000})">Bottom Left</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Top Center position',position:'top-center',duration:2000})">Top Center</button>
    </div>
  </div>

  <!-- ── Duration ────────────────────────── -->
  <div class="section">
    <h2>Custom Duration</h2>
    <div class="btn-group">
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Sticks for 1 second',duration:1000})">1s</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Sticks for 3 seconds',duration:3000})">3s</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Sticks for 5 seconds',duration:5000})">5s</button>
      <button class="btn btn-sm btn-outline" onclick="showToast({message:'Sticks forever — click X to dismiss',duration:0})">Persist</button>
    </div>
  </div>

<script>
(function () {
  'use strict';

  var containers = {};

  function getContainer(position) {
    position = position || 'top-right';
    if (containers[position]) return containers[position];

    var container = document.createElement('div');
    container.className = 'toast-container toast-container--' + position;
    document.body.appendChild(container);
    containers[position] = container;
    return container;
  }

  function showToast(opts) {
    opts = opts || {};
    var message = opts.message || 'Hello!';
    var type = opts.type || 'info';
    var title = opts.title || '';
    var duration = opts.duration !== undefined ? opts.duration : 4000;
    var position = opts.position || 'top-right';

    var container = getContainer(position);

    // Toast element
    var toast = document.createElement('div');
    toast.className = 'toast toast--' + type;

    // Icons map
    var icons = {
      success: '✓',
      error: '✕',
      warning: '!',
      info: 'i'
    };

    toast.innerHTML =
      '<div class="toast-icon">' + (icons[type] || 'i') + '</div>' +
      '<div class="toast-body">' +
        (title ? '<div class="toast-title">' + title + '</div>' : '') +
        '<div class="toast-message">' + message + '</div>' +
      '</div>' +
      '<button class="toast-close" onclick="dismissToast(this.parentElement)" aria-label="Close">×</button>';

    // Progress bar
    if (duration > 0) {
      var progress = document.createElement('div');
      progress.className = 'toast-progress';
      var bar = document.createElement('div');
      bar.className = 'toast-progress-bar';
      bar.style.animationDuration = (duration / 1000) + 's';
      bar.style.width = '100%';
      progress.appendChild(bar);
      toast.appendChild(progress);
    }

    container.appendChild(toast);

    // Trigger reflow for animation
    toast.getBoundingClientRect();

    // Auto-dismiss
    if (duration > 0) {
      toast._autoDismiss = setTimeout(function () {
        dismissToast(toast);
      }, duration);
    }
  }

  window.dismissToast = function (toast) {
    if (toast._dismissing) return;
    toast._dismissing = true;

    if (toast._autoDismiss) {
      clearTimeout(toast._autoDismiss);
    }

    toast.classList.add('removing');
    setTimeout(function () {
      var container = toast.parentElement;
      if (container) {
        container.removeChild(toast);
        // Clean up empty containers after delay
        if (container.children.length === 0) {
          setTimeout(function () {
            if (container.parentElement && container.children.length === 0) {
              container.parentElement.removeChild(container);
              // Clean up reference
              for (var key in containers) {
                if (containers[key] === container) {
                  delete containers[key];
                  break;
                }
              }
            }
          }, 100);
        }
      }
    }, 250);
  };

  window.showToast = showToast;

  // Batch stack demo
  window.showToasts = function () {
    var types = ['success', 'error', 'warning', 'info'];
    var msgs = [
      'File uploaded successfully',
      'Connection lost — retrying',
      'Low disk space warning',
      'New message from support',
      'Profile updated'
    ];
    var positions = ['top-right', 'top-left', 'bottom-right', 'bottom-left', 'top-center'];

    for (var i = 0; i < 5; i++) {
      (function (idx) {
        setTimeout(function () {
          showToast({
            message: msgs[idx],
            type: types[idx % types.length],
            title: idx === 0 ? 'Success' : idx === 1 ? 'Error' : idx === 2 ? 'Warning' : 'Info',
            position: positions[idx],
            duration: 6000
          });
        }, idx * 300);
      })(i);
    }
  };
})();
</script>

</body>
</html>
