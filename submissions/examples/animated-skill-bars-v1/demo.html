<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Skill Progress Bars</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="skill-card">
      <h2 class="skill-heading">Skills</h2>
      <div class="skill-item">
        <div class="skill-row">
          <span class="skill-name">HTML / CSS</span>
          <span class="skill-pct">92%</span>
        </div>
        <div class="skill-bar"><div class="skill-fill" data-width="92"></div></div>
      </div>
      <div class="skill-item">
        <div class="skill-row">
          <span class="skill-name">JavaScript</span>
          <span class="skill-pct">78%</span>
        </div>
        <div class="skill-bar"><div class="skill-fill" data-width="78"></div></div>
      </div>
      <div class="skill-item">
        <div class="skill-row">
          <span class="skill-name">React</span>
          <span class="skill-pct">65%</span>
        </div>
        <div class="skill-bar"><div class="skill-fill" data-width="65"></div></div>
      </div>
      <div class="skill-item">
        <div class="skill-row">
          <span class="skill-name">Node.js</span>
          <span class="skill-pct">54%</span>
        </div>
        <div class="skill-bar"><div class="skill-fill" data-width="54"></div></div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
