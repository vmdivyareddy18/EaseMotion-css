<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Card Stack / Deck Spread</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="cardstack" id="cardstack">
      <div class="cardstack-item" style="--i:0; background: linear-gradient(135deg, #667eea, #764ba2);">Card 1</div>
      <div class="cardstack-item" style="--i:1; background: linear-gradient(135deg, #f093fb, #f5576c);">Card 2</div>
      <div class="cardstack-item" style="--i:2; background: linear-gradient(135deg, #4facfe, #00f2fe);">Card 3</div>
      <div class="cardstack-item" style="--i:3; background: linear-gradient(135deg, #43e97b, #38f9d7);">Card 4</div>
      <div class="cardstack-item" style="--i:4; background: linear-gradient(135deg, #fa709a, #fee140);">Card 5</div>
    </div>
    <div class="cardstack-actions">
      <button class="cardstack-btn" id="stackSpread">Toggle Spread</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
