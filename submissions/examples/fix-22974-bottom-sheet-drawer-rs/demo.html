<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Animated Bottom Sheet Drawer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <header class="demo-header">
            <h1>Bottom Sheet Drawer</h1>
            <p>A pure CSS bottom sheet modal using the checkbox hack.</p>
        </header>

        <!-- The hidden checkbox that controls state -->
        <input type="checkbox" id="drawer-toggle" class="drawer-toggle" hidden>
        
        <!-- Button to open the drawer -->
        <label for="drawer-toggle" class="open-btn">Open Drawer</label>
        
        <!-- The overlay background -->
        <label for="drawer-toggle" class="drawer-overlay"></label>
        
        <!-- The drawer component -->
        <div class="bottom-drawer">
            <div class="drawer-drag-handle"></div>
            <div class="drawer-content">
                <h2>Settings</h2>
                <p>Manage your account preferences and notifications here.</p>
                
                <div class="setting-item">
                    <span>Email Notifications</span>
                    <label class="switch">
                        <input type="checkbox" checked>
                        <span class="slider"></span>
                    </label>
                </div>
                
                <div class="setting-item">
                    <span>Dark Mode</span>
                    <label class="switch">
                        <input type="checkbox">
                        <span class="slider"></span>
                    </label>
                </div>
                
                <!-- Button to close the drawer -->
                <label for="drawer-toggle" class="close-btn">Done</label>
            </div>
        </div>
    </div>
</body>
</html>
