<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro Shake Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-card">
    <div class="header">
        <h2>Dashboard</h2>

            ℹ

                <strong>System Status</strong>

    </div>

    <div class="content">
        <p>Active Users</p>
        <h1>2,548</h1>
    </div>
</div>

</body>
</html>
