<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In File Uploader - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #f4f6f8;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .demo-controls {
            margin-top: 20px;
        }
        .btn-replay {
            background: #0a2540;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
        }
        .btn-replay:hover {
            background: #000;
        }
    </style>
</head>
<body>

    <div class="uploader-container ease-fade-in-uploader">
        <div class="uploader-header">
            <h3>Submit Verification Documents</h3>
            <p>Upload your identity proof to securely verify your account.</p>
        </div>

        <div class="uploader-body">
            <input type="file" id="file-upload" class="visually-hidden" accept=".jpg,.jpeg,.png,.pdf" aria-label="Upload verification files">
            <label for="file-upload" class="dropzone-label">
                <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span class="upload-text">Click to upload or drag and drop</span>
                <span class="upload-hint">PDF, PNG, or JPEG up to 10MB</span>
            </label>
        </div>
    </div>

    <div class="demo-controls">
        <button class="btn-replay" onclick="document.location.reload()">Replay Animation</button>
    </div>

</body>
</html>
