<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Motion Curve Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>🎯 CSS Motion Curve Gallery</h1>
        <p>Visualize and compare common CSS easing functions.</p>
    </header>

    <div class="gallery">

        <div class="curve-card">
            <h3>Linear</h3>
            <div class="track">
                <div class="dot linear"></div>
            </div>
        </div>

        <div class="curve-card">
            <h3>Ease</h3>
            <div class="track">
                <div class="dot ease"></div>
            </div>
        </div>

        <div class="curve-card">
            <h3>Ease In</h3>
            <div class="track">
                <div class="dot ease-in"></div>
            </div>
        </div>

        <div class="curve-card">
            <h3>Ease Out</h3>
            <div class="track">
                <div class="dot ease-out"></div>
            </div>
        </div>

        <div class="curve-card">
            <h3>Ease In Out</h3>
            <div class="track">
                <div class="dot ease-in-out"></div>
            </div>
        </div>

        <div class="curve-card">
            <h3>Cubic Bezier</h3>
            <div class="track">
                <div class="dot bezier"></div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
