<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Avatar Pile | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <div class="container">
      <h1 class="demo-title">Animated Avatar Pile</h1>
      <p class="demo-subtitle">CSS-only stacked avatars with hover-expand, status indicators, and overflow count.</p>

      <div class="demo-card">
        <h2 class="demo-label">Default Pile</h2>
        <div class="avatar-pile">
          <div class="avatar-pile__item" style="--avatar-color: #6366f1;">
            <div class="avatar-pile__avatar">SK</div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
          <div class="avatar-pile__item" style="--avatar-color: #f59e0b;">
            <div class="avatar-pile__avatar">AJ</div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
          <div class="avatar-pile__item" style="--avatar-color: #10b981;">
            <div class="avatar-pile__avatar">RM</div>
            <span class="avatar-pile__status avatar-pile__status--away"></span>
          </div>
          <div class="avatar-pile__item" style="--avatar-color: #ef4444;">
            <div class="avatar-pile__avatar">PL</div>
            <span class="avatar-pile__status avatar-pile__status--offline"></span>
          </div>
          <div class="avatar-pile__item" style="--avatar-color: #8b5cf6;">
            <div class="avatar-pile__avatar">TS</div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
          <div class="avatar-pile__overflow">+3</div>
        </div>
      </div>

      <div class="demo-card">
        <h2 class="demo-label">With Image Avatars</h2>
        <div class="avatar-pile">
          <div class="avatar-pile__item">
            <div class="avatar-pile__avatar avatar-pile__avatar--img" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%236366f1%22 cx=%2250%22 cy=%2250%22 r=%2250%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2236%22 font-family=%22sans-serif%22%3ESK%3C/text%3E%3C/svg%3E');"></div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
          <div class="avatar-pile__item">
            <div class="avatar-pile__avatar avatar-pile__avatar--img" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%23f59e0b%22 cx=%2250%22 cy=%2250%22 r=%2250%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2236%22 font-family=%22sans-serif%22%3EAJ%3C/text%3E%3C/svg%3E');"></div>
            <span class="avatar-pile__status avatar-pile__status--away"></span>
          </div>
          <div class="avatar-pile__item">
            <div class="avatar-pile__avatar avatar-pile__avatar--img" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%2310b981%22 cx=%2250%22 cy=%2250%22 r=%2250%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2236%22 font-family=%22sans-serif%22%3ERM%3C/text%3E%3C/svg%3E');"></div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
          <div class="avatar-pile__item">
            <div class="avatar-pile__avatar avatar-pile__avatar--img" style="background-image: url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle fill=%22%23ef4444%22 cx=%2250%22 cy=%2250%22 r=%2250%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2236%22 font-family=%22sans-serif%22%3EPL%3C/text%3E%3C/svg%3E');"></div>
            <span class="avatar-pile__status avatar-pile__status--online"></span>
          </div>
        </div>
      </div>

      <div class="demo-card">
        <h2 class="demo-label">Sizes</h2>
        <div class="demo-sizes">
          <div class="avatar-pile avatar-pile--sm">
            <div class="avatar-pile__item" style="--avatar-color: #6366f1;">
              <div class="avatar-pile__avatar">SK</div>
            </div>
            <div class="avatar-pile__item" style="--avatar-color: #f59e0b;">
              <div class="avatar-pile__avatar">AJ</div>
            </div>
            <div class="avatar-pile__item" style="--avatar-color: #10b981;">
              <div class="avatar-pile__avatar">RM</div>
            </div>
            <div class="avatar-pile__overflow">+2</div>
          </div>
          <div class="avatar-pile avatar-pile--lg">
            <div class="avatar-pile__item" style="--avatar-color: #6366f1;">
              <div class="avatar-pile__avatar">SK</div>
            </div>
            <div class="avatar-pile__item" style="--avatar-color: #f59e0b;">
              <div class="avatar-pile__avatar">AJ</div>
            </div>
            <div class="avatar-pile__item" style="--avatar-color: #10b981;">
              <div class="avatar-pile__avatar">RM</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
