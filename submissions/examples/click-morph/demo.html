<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morphing Button Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body style="min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; background:#0f172a; font-family:sans-serif;">

  <h2 style="color:white;">Morphing Button Demos</h2>

  <!-- Loading -->
  <button class="ease-click-morph ease-click-morph-loading">
    <span>Submit</span>
  </button>

  <!-- Check -->
  <button class="ease-click-morph ease-click-morph-check">
    <span>Confirm</span>
  </button>

  <!-- Pulse -->
  <button class="ease-click-morph ease-click-morph-pulse">
    <span>Save</span>
  </button>

  <!-- Shrink -->
  <button class="ease-click-morph ease-click-morph-shrink">
    <span>Click Me</span>
  </button>

</body>
</html>
