<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Scale Audio Player Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
  </style>
</head>
<body>

  <!-- Audio Player Block -->
  <div class="em-audio-card">
    
    <!-- Left: Scaled Cover Asset -->
    <div class="em-audio-thumb">
      <img src="https://picsum.photos" alt="Album Cover Cover Art">
    </div>

    <!-- Center: Dynamic Core Metadata & Linear Playback Scrubber -->
    <div class="em-audio-info">
      <h4 class="em-track-title">Ambient Odyssey</h4>
      <p class="em-track-artist">EaseMotion Synth Labs</p>
      
      <div class="em-progress-container">
        <div class="em-progress-bar"></div>
      </div>
    </div>

    <!-- Right: Animated Scalable Audio Equalizer Visualizer Bars -->
    <div class="em-wave-eq">
      <div class="em-wave-bar"></div>
      <div class="em-wave-bar"></div>
      <div class="em-wave-bar"></div>
      <div class="em-wave-bar"></div>
    </div>

  </div>

</body>
</html>
