<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Only Northern Lights</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="demo-header">
    <h1>EaseMotion CSS</h1>
    <p>Created by Shray Gupta</p>
</header>

<main class="demo-grid">

    <section class="aurora-card">
        <h2>Emerald Sky</h2>
        <div class="scene scene-green">
            <div class="glow"></div>
            <div class="ribbon ribbon-1"></div>
            <div class="ribbon ribbon-2"></div>
            <div class="particles"></div>
        </div>
    </section>

    <section class="aurora-card">
        <h2>Purple Horizon</h2>
        <div class="scene scene-purple">
            <div class="glow"></div>
            <div class="ribbon ribbon-1"></div>
            <div class="ribbon ribbon-2"></div>
            <div class="particles"></div>
        </div>
    </section>

    <section class="aurora-card">
        <h2>Ocean Aurora</h2>
        <div class="scene scene-blue">
            <div class="glow"></div>
            <div class="ribbon ribbon-1"></div>
            <div class="ribbon ribbon-2"></div>
            <div class="particles"></div>
        </div>
    </section>

    <section class="aurora-card">
        <h2>Cosmic Blend</h2>
        <div class="scene scene-mixed">
            <div class="glow"></div>
            <div class="ribbon ribbon-1"></div>
            <div class="ribbon ribbon-2"></div>
            <div class="particles"></div>
        </div>
    </section>

</main>

</body>
</html>
