<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="spotlight-carousel">

    <div class="carousel-track">

        <article class="card active">
            <img src="https://picsum.photos/400/250?1" alt="Nature">
            <h2>Explore Nature</h2>
            <p>Discover beautiful landscapes and adventures.</p>
        </article>


        <article class="card">
            <img src="https://picsum.photos/400/250?2" alt="City">
            <h2>Modern Cities</h2>
            <p>Experience amazing urban designs.</p>
        </article>


        <article class="card">
            <img src="https://picsum.photos/400/250?3" alt="Technology">
            <h2>Technology</h2>
            <p>Innovation that changes the future.</p>
        </article>


    </div>

</section>


</body>
</html>
