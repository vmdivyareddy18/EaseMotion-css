<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Post Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Social Feed</h1>

    <div class="post-card">
      <div class="post-header">
        <div class="avatar">JD</div>
        <div>
          <div class="post-user">Jane Doe</div>
          <div class="post-handle">@janedoe &middot; 2h ago</div>
        </div>
      </div>

      <div class="post-content">
        Just built this awesome interactive post card component with CSS animations and vanilla JS! Check it out 🚀
      </div>

      <div class="post-image">
        &#128247;
      </div>

      <div class="stats-row">
        <span id="likeCount"><span id="likeNum">42</span> likes</span>
        <span id="commentCount"><span id="commentNum">7</span> comments</span>
      </div>

      <div class="post-actions">
        <button class="action-btn" id="likeBtn">
          <span class="heart-icon" id="heartIcon">&#10084;</span>
          <span id="likeLabel">Like</span>
        </button>
        <button class="action-btn" id="commentBtn">
          <span>&#128172;</span>
          <span>Comment</span>
        </button>
        <button class="action-btn" id="shareBtn">
          <span>&#128257;</span>
          <span>Share</span>
        </button>
      </div>
    </div>

    <div class="controls">
      <input type="text" id="commentInput" placeholder="Write a comment...">
      <button id="submitComment">Comment</button>
    </div>

  </div>

  <script>
    const likeBtn = document.getElementById('likeBtn');
    const heartIcon = document.getElementById('heartIcon');
    const likeNum = document.getElementById('likeNum');
    const commentNum = document.getElementById('commentNum');
    const commentInput = document.getElementById('commentInput');
    const submitComment = document.getElementById('submitComment');
    const shareBtn = document.getElementById('shareBtn');

    let liked = false;
    let likes = 42;
    let comments = 7;

    likeBtn.addEventListener('click', function () {
      liked = !liked;
      if (liked) {
        likes++;
        likeBtn.classList.add('liked');
      } else {
        likes--;
        likeBtn.classList.remove('liked');
      }
      likeNum.textContent = likes;
    });

    submitComment.addEventListener('click', function () {
      const text = commentInput.value.trim();
      if (text) {
        comments++;
        commentNum.textContent = comments;
        commentInput.value = '';
        alert('Comment posted! (demo)');
      } else {
        alert('Please write a comment.');
      }
    });

    shareBtn.addEventListener('click', function () {
      shareBtn.classList.add('shared');
      alert('Post shared! (demo)');
      setTimeout(function () {
        shareBtn.classList.remove('shared');
      }, 1500);
    });
  </script>

</body>
</html>
