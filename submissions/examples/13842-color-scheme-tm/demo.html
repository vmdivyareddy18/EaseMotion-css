<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13842-color-scheme Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      padding: 2rem;
      color: #334155;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #1e293b;
    }
    .demo-section {
      margin-bottom: 1.5rem;
    }
    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    /* Import the utility styles */
    :root {
      --ease-color-primary: #6c63ff;
      --ease-color-secondary: #8b5cf6;
      --ease-color-surface: #ffffff;
      --ease-color-text: #334155;
      --ease-color-neutral-100: #f1f5f9;
      --ease-color-neutral-200: #e2e8f0;
      --ease-color-neutral-300: #cbd5e1;
    }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>color-scheme utilities for controlling native UI element theming</h2>
  <div class="demo-section">
    <h2>Utilities available:</h2>
    <div class="demo-grid">
      <div class="demo-panel ease-scheme-dark" style="background:#1e293b;color:#f8fafc;">
        <strong>Dark scheme panel</strong>
        <input type="text" placeholder="Form field in dark mode">
        <p style="font-size:0.8rem;margin-top:0.25rem;">Native controls adopt the color-scheme.</p>
      </div>
      <p style="font-size:0.85rem;color:#64748b;">.ease-scheme-dark forces native UI elements into dark mode.</p>
    </div>
  </div>
</body>
</html>
