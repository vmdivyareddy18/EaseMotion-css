<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Photo Gallery Masonry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1>Photo Gallery Masonry</h1>
      <p class="subtitle">Responsive masonry layout with hover effects</p>
    </header>

    <div class="display-area">
      <div class="masonry-grid">
        <div class="gallery-item tall">
          <img src="https://picsum.photos/400/600?random=1" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/400?random=2" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/300?random=3" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
        <div class="gallery-item tall">
          <img src="https://picsum.photos/400/550?random=4" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/350?random=5" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
        <div class="gallery-item">
          <img src="https://picsum.photos/400/400?random=6" alt="Photo">
          <div class="overlay">
            <span class="icon">🔍</span>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Copy Code</h3>
      <div class="code-block">
        <div class="code-header"><span>HTML</span></div>
        <pre>&lt;div class="masonry-grid"&gt;
  &lt;div class="gallery-item"&gt;
    &lt;img src="photo.jpg" alt="Photo"&gt;
    &lt;div class="overlay"&gt;&lt;span&gt;🔍&lt;/span&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;</pre>
      </div>
    </section>

  </main>

</body>
</html>
