<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Mention Input</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="mention-box ease-cascade">
        <label for="mention">Mention User</label>

        <input 
            id="mention"
            type="text"
            placeholder="@username"
            aria-label="Mention user input"
        >

        <div class="suggestions">
            <div>@doctor</div>
            <div>@patient</div>
            <div>@admin</div>
        </div>

    </div>

</div>

</body>
</html>
