<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><title>ease-backdrop-blur Demo</title><style>
:root{--ease-speed-medium:300ms;--ease-ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--ease-color-primary:#6c63ff;--ease-color-neutral-200:#e2e8f0;--ease-color-neutral-900:#0f172a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8fafc;color:var(--ease-color-neutral-900);padding:2rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem;color:var(--ease-color-primary)}
.demo-item{background:white;border:1px solid var(--ease-color-neutral-200);border-radius:.75rem;padding:1.5rem;text-align:center;margin-bottom:1rem}
.demo-box{display:inline-flex;align-items:center;justify-content:center;width:80px;height:80px;background:var(--ease-color-primary);color:white;font-weight:600;font-size:.75rem;border-radius:.5rem;cursor:pointer}
</style></head><body>
<h1>ease-backdrop-blur — Demo</h1>
<div class="demo-item"><div class="demo-box .ease-backdrop-blur-md">.ease-backdrop-blur-md</div><p>Hover to see the effect</p></div>
<style>
/* ease-backdrop-blur utilities */
.ease-backdrop-blur-none{backdrop-filter:none;-webkit-backdrop-filter:none}
.ease-backdrop-blur-sm{backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.ease-backdrop-blur-md{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.ease-backdrop-blur-lg{backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
.ease-backdrop-blur-xl{backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px)}
@media(prefers-reduced-motion:reduce){.ease-backdrop-blur-sm,.ease-backdrop-blur-md,.ease-backdrop-blur-lg,.ease-backdrop-blur-xl{backdrop-filter:none;-webkit-backdrop-filter:none}}
</style>
</body></html>
