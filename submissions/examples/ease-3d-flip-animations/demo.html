<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Flip Animations | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="flip-showcase-wrapper">
    <header class="showcase-header">
      <h1>3D Flip Animations</h1>
      <p>A proposal for <code>core/animations.css</code> to add 3D flip-in entry animations.</p>
    </header>

    <div class="demo-area">
      
      <div class="perspective-container">
        <!-- Horizontal Flip (X-axis) -->
        <div class="demo-card em-flip-x">
          <div class="icon">🔄</div>
          <h3>Flip X</h3>
          <p>Rotates along the X-axis</p>
        </div>
        
        <!-- Vertical Flip (Y-axis) -->
        <div class="demo-card em-flip-y" style="animation-delay: 0.2s;">
          <div class="icon">🔃</div>
          <h3>Flip Y</h3>
          <p>Rotates along the Y-axis</p>
        </div>
      </div>
      
    </div>
    
    <div class="controls">
      <button class="replay-btn" onclick="replayAnimations()">Replay Animations</button>
    </div>
    
  </div>

  <script>
    function replayAnimations() {
      const cards = document.querySelectorAll('.demo-card');
      cards.forEach(card => {
        const anim = card.style.animation;
        card.style.animation = 'none';
        card.offsetHeight; /* trigger reflow */
        card.style.animation = anim; 
      });
    }
  </script>
</body>
</html>
