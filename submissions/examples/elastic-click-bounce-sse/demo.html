<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Click Bounce — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="demo-body">

  <h1 class="demo-title">Elastic Click Bounce</h1>
  <p class="demo-subtitle">
    Click any element below. Notice how it briefly compresses, expands slightly past its original size,
    then smoothly settles back — a tactile, springy feedback effect.
  </p>

  <!-- ============== BUTTONS ============== -->
  <section class="demo-section">
    <button class="elastic-click demo-btn">Default Bounce</button>
    <button class="elastic-click elastic-click--subtle demo-btn">Subtle Bounce</button>
    <button class="elastic-click elastic-click--strong demo-btn demo-btn--alt">Strong Bounce</button>
  </section>

  <!-- ============== CARDS ============== -->
  <section class="demo-section">
    <div class="elastic-click demo-card">
      <h3>Card One</h3>
      <p class="demo-label">Click me!</p>
    </div>
    <div class="elastic-click elastic-click--strong demo-card">
      <h3>Card Two</h3>
      <p class="demo-label">Strong bounce</p>
    </div>
  </section>

  <!-- ============== ICONS ============== -->
  <section class="demo-section">
    <div class="elastic-click demo-icon" title="Like">★</div>
    <div class="elastic-click demo-icon" title="Heart">♥</div>
    <div class="elastic-click demo-icon" title="Bell">🔔</div>
    <div class="elastic-click demo-icon" title="Bookmark">🔖</div>
  </section>

  <!-- ============== NAV ITEMS ============== -->
  <section class="demo-section">
    <button class="elastic-click demo-btn">Home</button>
    <button class="elastic-click demo-btn">About</button>
    <button class="elastic-click demo-btn">Contact</button>
  </section>

</body>
</html>
