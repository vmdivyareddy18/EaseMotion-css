<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphic Interface - Staggered Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-glow blob-1"></div>
  <div class="bg-glow blob-2"></div>

  <div class="container">
    <header class="app-header">
      <div class="logo">Glass_Studio</div>
      <a href="#glass-modal" class="btn btn-glass" role="button">View Activity</a>
    </header>

    <main class="grid">
      <div class="card">
        <span class="label">Total Impressions</span>
        <div class="value">48.9k</div>
      </div>
      <div class="card">
        <span class="label">Engagement Rate</span>
        <div class="value">8.64%</div>
      </div>
    </main>
  </div>

  <div id="glass-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <a href="#" class="modal-close-overlay" aria-label="Close modal"></a>
    
    <div class="modal-card">
      <div class="modal-header stagger-1">
        <h3 id="modal-title">Live Node Stream</h3>
        <a href="#" class="modal-close-x" aria-label="Close modal">&times;</a>
      </div>
      
      <div class="modal-body stagger-2">
        <p>This layout operates strictly on zero JavaScript overhead. The structural staggered delay states are multiplied cascadingly using native CSS variable logic.</p>
        <div class="metrics-strip">
          <div class="strip-item"><strong>Ping:</strong> 12ms</div>
          <div class="strip-item"><strong>Loss:</strong> 0.0%</div>
        </div>
      </div>
      
      <div class="modal-footer stagger-3">
        <a href="#" class="btn btn-text">Dismiss</a>
        <a href="#" class="btn btn-glass">Refresh Stream</a>
      </div>
    </div>
  </div>

</body>
</html>
