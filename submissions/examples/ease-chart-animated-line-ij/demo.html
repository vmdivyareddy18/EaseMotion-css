<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chart Animated Line - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Animated Line Chart</h1>
    <p class="desc">Line chart with SVG path drawing effect</p>
    <div class="cl-card">
      <svg class="cl-chart" viewBox="0 0 500 200" preserveAspectRatio="xMidYMid meet">
        <line x1="40" y1="180" x2="480" y2="180" class="cl-grid" />
        <line x1="40" y1="135" x2="480" y2="135" class="cl-grid" />
        <line x1="40" y1="90"  x2="480" y2="90"  class="cl-grid" />
        <line x1="40" y1="45"  x2="480" y2="45"  class="cl-grid" />
        <text x="35" y="184" class="cl-grid-label" text-anchor="end">0</text>
        <text x="35" y="139" class="cl-grid-label" text-anchor="end">25</text>
        <text x="35" y="94"  class="cl-grid-label" text-anchor="end">50</text>
        <text x="35" y="49"  class="cl-grid-label" text-anchor="end">75</text>
        <text x="42" y="195" class="cl-grid-label" text-anchor="middle">Jan</text>
        <text x="130" y="195" class="cl-grid-label" text-anchor="middle">Feb</text>
        <text x="218" y="195" class="cl-grid-label" text-anchor="middle">Mar</text>
        <text x="306" y="195" class="cl-grid-label" text-anchor="middle">Apr</text>
        <text x="394" y="195" class="cl-grid-label" text-anchor="middle">May</text>
        <polyline class="cl-line" id="clLine"
          points="42,170 130,140 218,155 306,90 394,110"
          data-points="170,140,155,90,110" />
        <circle cx="42"  cy="170" r="4" class="cl-dot" style="animation-delay:2.1s" />
        <circle cx="130" cy="140" r="4" class="cl-dot" style="animation-delay:2.2s" />
        <circle cx="218" cy="155" r="4" class="cl-dot" style="animation-delay:2.3s" />
        <circle cx="306" cy="90"  r="4" class="cl-dot" style="animation-delay:2.4s" />
        <circle cx="394" cy="110" r="4" class="cl-dot" style="animation-delay:2.5s" />
      </svg>
      <div class="cl-controls">
        <button class="cl-btn" id="clReplay">Replay</button>
      </div>
    </div>
  </div>
  <script>
    const line = document.getElementById('clLine');
    const replay = document.getElementById('clReplay');

    function calcPathLength(el) {
      const len = el.getTotalLength();
      el.style.setProperty('--cl-path-length', len);
    }

    calcPathLength(line);

    replay.addEventListener('click', () => {
      line.style.animation = 'none';
      void line.offsetHeight;
      line.style.animation = '';
      document.querySelectorAll('.cl-dot').forEach(d => {
        d.style.animation = 'none';
        void d.offsetHeight;
        d.style.animation = '';
      });
    });
  </script>
</body>
</html>
