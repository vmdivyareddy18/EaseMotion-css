<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease DNS Query Analytics</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dns-panel">

<h2>DNS Query Analytics</h2>

<div class="dns-card healthy">
<div>
<h3>Primary Resolver</h3>
<p>12.8M Queries • 14 ms Avg</p>
</div>
<span>Healthy</span>
</div>

<div class="dns-card active">
<div>
<h3>Edge Resolver</h3>
<p>Cache Hit: 96% • TTL Optimized</p>
</div>
<span>Optimal</span>
</div>

<div class="dns-card warning">
<div>
<h3>Secondary Resolver</h3>
<p>Latency: 42 ms • Cache Miss 9%</p>
</div>
<span>Monitor</span>
</div>

<div class="dns-card critical">
<div>
<h3>Asia Region</h3>
<p>Packet Loss: 3.8%</p>
</div>
<span>Alert</span>
</div>

</section>

</body>
</html>
