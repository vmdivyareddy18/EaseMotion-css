<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Trail | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Cursor Glow Trail</h1>
    <p class="subtitle">Move your mouse or finger to see the glow trail effect.</p>

    <div class="controls">
      <button class="btn" id="toggleBtn">Disable</button>
      <button class="btn btn-outline" id="clearBtn">Clear Trail</button>
    </div>

    <div class="info-card">
      <p>Trail length: <strong id="trailCount">8</strong></p>
      <p>Opacity fade: <strong>0.7 → 0</strong></p>
    </div>
  </div>

  <script>
    const root = document.documentElement;
    const trailing = parseInt(getComputedStyle(root).getPropertyValue('--trail-length')) || 8;
    const size = parseFloat(getComputedStyle(root).getPropertyValue('--glow-size')) || 24;

    let enabled = true;
    let dots = [];
    let mouseX = 0, mouseY = 0;

    const trailContainer = document.createElement('div');
    trailContainer.className = 'trail-container';
    document.body.appendChild(trailContainer);

    for (let i = 0; i < trailing; i++) {
      const dot = document.createElement('div');
      dot.className = 'glow-dot';
      const ratio = i / trailing;
      const delay = ratio * 0.12;
      const opacity = (1 - ratio) * 0.7;
      dot.style.cssText = `
        width: ${size * (1 - ratio * 0.5)}px;
        height: ${size * (1 - ratio * 0.5)}px;
        transition-delay: ${delay}s;
        opacity: ${opacity};
      `;
      trailContainer.appendChild(dot);
      dots.push({ el: dot, x: 0, y: 0, delay });
    }

    document.addEventListener('mousemove', e => {
      if (!enabled) return;
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    document.addEventListener('touchmove', e => {
      if (!enabled) return;
      const t = e.touches[0];
      mouseX = t.clientX;
      mouseY = t.clientY;
    }, { passive: true });

    function animateTrail() {
      if (enabled) {
        dots.forEach((dot, i) => {
          if (i === 0) {
            dot.x += (mouseX - dot.x) * 0.3;
            dot.y += (mouseY - dot.y) * 0.3;
          } else {
            const prev = dots[i - 1];
            dot.x += (prev.x - dot.x) * 0.3;
            dot.y += (prev.y - dot.y) * 0.3;
          }
          dot.el.style.left = dot.x + 'px';
          dot.el.style.top = dot.y + 'px';
        });
      }
      requestAnimationFrame(animateTrail);
    }
    animateTrail();

    document.getElementById('toggleBtn').addEventListener('click', () => {
      enabled = !enabled;
      document.getElementById('toggleBtn').textContent = enabled ? 'Disable' : 'Enable';
      if (enabled) {
        mouseX = dots[0].x;
        mouseY = dots[0].y;
      } else {
        dots.forEach(d => {
          d.el.style.opacity = '0';
        });
      }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      dots.forEach((d, i) => {
        d.x = -100;
        d.y = -100;
        d.el.style.left = '-100px';
        d.el.style.top = '-100px';
        const ratio = i / trailing;
        d.el.style.opacity = (1 - ratio) * 0.7;
      });
    });
  </script>
</body>
</html>
