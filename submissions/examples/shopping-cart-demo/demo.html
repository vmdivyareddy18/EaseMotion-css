<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart Demo</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="cart">

<h1 class="ease-fade-in">
Shopping Cart
</h1>

<div class="cart-container">

<div class="cart-item ease-slide-up">

<img src="https://via.placeholder.com/120"
alt="Laptop">

<div class="details">

<h2>Gaming Laptop</h2>

<p class="price">$999</p>

<label>
Quantity:
<input type="number" value="1" min="1">
</label>

</div>

<button class="remove ease-hover-grow">
Remove
</button>

</div>

<div class="cart-item ease-slide-up">

<img src="https://via.placeholder.com/120"
alt="Headphones">

<div class="details">

<h2>Wireless Headphones</h2>

<p class="price">$89</p>

<label>
Quantity:
<input type="number" value="2" min="1">
</label>

</div>

<button class="remove ease-hover-grow">
Remove
</button>

</div>

<div class="summary ease-slide-up">

<h2>Order Summary</h2>

<p>Subtotal: <strong>$1177</strong></p>

<p>Shipping: <strong>Free</strong></p>

<p>Total: <strong>$1177</strong></p>

<button class="checkout ease-hover-grow">
Proceed to Checkout
</button>

</div>

</div>

</section>

</body>
</html>
