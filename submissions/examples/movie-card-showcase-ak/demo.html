<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Card Showcase - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Movie Showcase</h1>

    <div class="grid" id="movieGrid"></div>

  </div>

  <script>
    const movies = [
      { title: 'Inception', year: 2010, rating: 4.5, synopsis: 'A thief who steals corporate secrets through dream-sharing technology is given the task of planting an idea into a target\'s subconscious.', emoji: '\uD83C\uDF0D' },
      { title: 'The Matrix', year: 1999, rating: 4.7, synopsis: 'A computer hacker learns about the true nature of reality and his role in the war against its controllers.', emoji: '\uD83D\uDDA5\uFE0F' },
      { title: 'Interstellar', year: 2014, rating: 4.6, synopsis: 'A team of explorers travel through a wormhole in space in an attempt to ensure humanity\'s survival.', emoji: '\uD83D\uDE80' },
      { title: 'Parasite', year: 2019, rating: 4.4, synopsis: 'Greed and class discrimination threaten the newly formed symbiotic relationship between the wealthy Park family and the destitute Kim clan.', emoji: '\uD83C\uDFE0' },
      { title: 'Soul', year: 2020, rating: 4.3, synopsis: 'A musician who has lost his passion for music is transported out of his body and must find his way back with the help of an infant soul.', emoji: '\uD83C\uDFB5' },
      { title: 'Dune', year: 2021, rating: 4.2, synopsis: 'A noble family becomes embroiled in a war for control over the galaxy\'s most valuable asset while its heir becomes troubled by visions of a dark future.', emoji: '\uD83C\uDFDC\uFE0F' },
      { title: 'Spider-Verse', year: 2018, rating: 4.8, synopsis: 'Teen Miles Morales becomes the Spider-Man of his universe and must join with five counterparts from other dimensions to stop a threat.', emoji: '\uD83D\uDD78\uFE0F' },
      { title: 'Everything Everywhere All at Once', year: 2022, rating: 4.6, synopsis: 'A middle-aged Chinese immigrant is swept up into an insane adventure where she alone can save the world by exploring other universes.', emoji: '\uD83C\uDF0C' },
    ];

    function renderStars(rating) {
      let html = '';
      const full = Math.floor(rating);
      const half = rating % 1 >= 0.5;
      for (let i = 1; i <= 5; i++) {
        if (i <= full) html += '<span class="star filled">\u2605</span>';
        else if (i === full + 1 && half) html += '<span class="star half">\u2605</span>';
        else html += '<span class="star">\u2605</span>';
      }
      return html;
    }

    const grid = document.getElementById('movieGrid');

    grid.innerHTML = movies.map(m =>
      '<div class="movie-card">' +
        '<div class="poster">' +
          '<span>' + m.emoji + '</span>' +
          '<div class="overlay">' + m.synopsis + '</div>' +
        '</div>' +
        '<div class="movie-info">' +
          '<div class="movie-title">' + m.title + '</div>' +
          '<div class="movie-year">' + m.year + '</div>' +
          '<div class="stars">' + renderStars(m.rating) + '<span class="rating-text">' + m.rating.toFixed(1) + '</span></div>' +
        '</div>' +
      '</div>'
    ).join('');
  </script>

</body>
</html>
