<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyberpunk Slide-Up Carousel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="carousel">

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/350/220?1" alt="Neon City">
        <div class="overlay">
            <h3>Neon City</h3>
            <p>Cyberpunk Experience</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/350/220?2" alt="Future Tech">
        <div class="overlay">
            <h3>Future Tech</h3>
            <p>Digital World</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/350/220?3" alt="Night Lights">
        <div class="overlay">
            <h3>Night Lights</h3>
            <p>Glow Animation</p>
        </div>
    </div>

</div>

</body>
</html>
