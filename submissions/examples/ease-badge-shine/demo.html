<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge-shine – Badge Shine Sweep</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Premium Badge Shine
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      A diagonal shine sweeps across the badge every few seconds.
    </p>

    <div class="ease-flex ease-justify-center ease-gap-8 ease-flex-wrap">
      <span class="ease-badge-shine badge badge-new">NEW</span>
      <span class="ease-badge-shine badge badge-premium">PREMIUM</span>
      <span class="ease-badge-shine badge badge-sale">SALE</span>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Uses a <code>::after</code> pseudo‑element with animated <code>transform</code>.
    </p>
  </div>

</body>
</html>
