<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Step Progress Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Step Progress Indicator</h1>

  <section>
    <h2>Horizontal Stepper</h2>

    <div class="stepper">

      <div class="step completed">
        <div class="circle">✓</div>
        <span>Account</span>
      </div>

      <div class="line completed-line"></div>

      <div class="step completed">
        <div class="circle">✓</div>
        <span>Profile</span>
      </div>

      <div class="line completed-line"></div>

      <div class="step active">
        <div class="circle">3</div>
        <span>Payment</span>
      </div>

      <div class="line"></div>

      <div class="step pending">
        <div class="circle">4</div>
        <span>Complete</span>
      </div>

    </div>
  </section>

  <section>
    <h2>Vertical Stepper</h2>

    <div class="vertical-stepper">

      <div class="v-step completed">
        <div class="circle">✓</div>
        <span>Account</span>
      </div>

      <div class="v-line"></div>

      <div class="v-step completed">
        <div class="circle">✓</div>
        <span>Profile</span>
      </div>

      <div class="v-line"></div>

      <div class="v-step active">
        <div class="circle">3</div>
        <span>Payment</span>
      </div>

      <div class="v-line"></div>

      <div class="v-step pending">
        <div class="circle">4</div>
        <span>Complete</span>
      </div>

    </div>
  </section>

  <section>
    <h2>Navigable Stepper</h2>

    <div class="nav-stepper">

      <button class="nav-step completed">
        ✓ Account
      </button>

      <button class="nav-step completed">
        ✓ Profile
      </button>

      <button class="nav-step active">
        Payment
      </button>

      <button class="nav-step pending">
        Complete
      </button>

    </div>

  </section>

</div>

</body>
</html>
