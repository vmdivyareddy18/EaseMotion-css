<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Star Rating — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      width: 70px;
    }
  </style>
</head>
<body>

  <!-- Default interactive -->
  <div class="demo-group">
    <h2>Default (Interactive)</h2>
    <div class="ease-rating" id="r1">
      <input type="radio" name="r1" id="r1-5" value="5"><label for="r1-5"></label>
      <input type="radio" name="r1" id="r1-4" value="4"><label for="r1-4"></label>
      <input type="radio" name="r1" id="r1-3" value="3"><label for="r1-3"></label>
      <input type="radio" name="r1" id="r1-2" value="2"><label for="r1-2"></label>
      <input type="radio" name="r1" id="r1-1" value="1"><label for="r1-1"></label>
    </div>
  </div>

  <!-- Sizes -->
  <div class="demo-group">
    <h2>Sizes</h2>
    <div class="row">
      <span class="label">Small</span>
      <div class="ease-rating ease-rating-sm">
        <input type="radio" name="r-sm" id="rsm-5" value="5"><label for="rsm-5"></label>
        <input type="radio" name="r-sm" id="rsm-4" value="4"><label for="rsm-4"></label>
        <input type="radio" name="r-sm" id="rsm-3" value="3" checked><label for="rsm-3"></label>
        <input type="radio" name="r-sm" id="rsm-2" value="2"><label for="rsm-2"></label>
        <input type="radio" name="r-sm" id="rsm-1" value="1"><label for="rsm-1"></label>
      </div>
    </div>
    <div class="row">
      <span class="label">Default</span>
      <div class="ease-rating">
        <input type="radio" name="r-md" id="rmd-5" value="5"><label for="rmd-5"></label>
        <input type="radio" name="r-md" id="rmd-4" value="4" checked><label for="rmd-4"></label>
        <input type="radio" name="r-md" id="rmd-3" value="3"><label for="rmd-3"></label>
        <input type="radio" name="r-md" id="rmd-2" value="2"><label for="rmd-2"></label>
        <input type="radio" name="r-md" id="rmd-1" value="1"><label for="rmd-1"></label>
      </div>
    </div>
    <div class="row">
      <span class="label">Large</span>
      <div class="ease-rating ease-rating-lg">
        <input type="radio" name="r-lg" id="rlg-5" value="5" checked><label for="rlg-5"></label>
        <input type="radio" name="r-lg" id="rlg-4" value="4"><label for="rlg-4"></label>
        <input type="radio" name="r-lg" id="rlg-3" value="3"><label for="rlg-3"></label>
        <input type="radio" name="r-lg" id="rlg-2" value="2"><label for="rlg-2"></label>
        <input type="radio" name="r-lg" id="rlg-1" value="1"><label for="rlg-1"></label>
      </div>
    </div>
  </div>

  <!-- Color variants -->
  <div class="demo-group">
    <h2>Color Variants</h2>
    <div class="row">
      <span class="label">Pink</span>
      <div class="ease-rating ease-rating-pink">
        <input type="radio" name="r-pink" id="rpink-5" value="5"><label for="rpink-5"></label>
        <input type="radio" name="r-pink" id="rpink-4" value="4" checked><label for="rpink-4"></label>
        <input type="radio" name="r-pink" id="rpink-3" value="3"><label for="rpink-3"></label>
        <input type="radio" name="r-pink" id="rpink-2" value="2"><label for="rpink-2"></label>
        <input type="radio" name="r-pink" id="rpink-1" value="1"><label for="rpink-1"></label>
      </div>
    </div>
    <div class="row">
      <span class="label">Violet</span>
      <div class="ease-rating ease-rating-violet ease-rating-glow">
        <input type="radio" name="r-violet" id="rviolet-5" value="5"><label for="rviolet-5"></label>
        <input type="radio" name="r-violet" id="rviolet-4" value="4"><label for="rviolet-4"></label>
        <input type="radio" name="r-violet" id="rviolet-3" value="3" checked><label for="rviolet-3"></label>
        <input type="radio" name="r-violet" id="rviolet-2" value="2"><label for="rviolet-2"></label>
        <input type="radio" name="r-violet" id="rviolet-1" value="1"><label for="rviolet-1"></label>
      </div>
    </div>
  </div>

  <!-- Glow -->
  <div class="demo-group">
    <h2>Glow Variant</h2>
    <div class="ease-rating ease-rating-glow">
      <input type="radio" name="r-glow" id="rglow-5" value="5" checked><label for="rglow-5"></label>
      <input type="radio" name="r-glow" id="rglow-4" value="4"><label for="rglow-4"></label>
      <input type="radio" name="r-glow" id="rglow-3" value="3"><label for="rglow-3"></label>
      <input type="radio" name="r-glow" id="rglow-2" value="2"><label for="rglow-2"></label>
      <input type="radio" name="r-glow" id="rglow-1" value="1"><label for="rglow-1"></label>
    </div>
  </div>

</body>
</html>
