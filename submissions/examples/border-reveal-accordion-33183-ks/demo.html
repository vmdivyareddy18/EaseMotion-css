<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analytics Accordion</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="accordion">

            <div class="accordion-item">

                <input type="checkbox" id="item1">
                <label for="item1" class="accordion-title">
                        📊 Sales Analytics
                </label>

                <div class="accordion-content">
                    <p>
                        Track revenue growth, monthly sales trends, and overall business performance through clear analytics.
                    </p>
                </div>

            </div>
                <div class="accordion-item">
                    <input type="checkbox" id="item2">

                    <label for="item2" class="accordion-title">
                        👥 User Insights
                    </label>

                <div class="accordion-content">
                    <p>
                        Monitor active users, engagement metrics, and customer behavior across different platforms.
                    </p>
                </div>
            </div>
            <div class="accordion-item">
                <input type="checkbox" id="item3">

                <label for="item3" class="accordion-title">
                    💰 Revenue Reports
                </label>

                <div class="accordion-content">
                    <p>
                        Analyze quarterly earnings, profit margins, and financial growth using detailed reports.
                    </p>
                </div>
            </div>
        </div>

    </div>
 
</body>
</html>
