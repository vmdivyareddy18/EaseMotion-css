<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Steps</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Step Progress Indicator</h1>
    <div class="progress-steps">
      <div class="step active" data-step="1">
        <span class="step-number">1</span>
        <span class="step-label">Start</span>
      </div>
      <div class="step-line"></div>
      <div class="step" data-step="2">
        <span class="step-number">2</span>
        <span class="step-label">Process</span>
      </div>
      <div class="step-line"></div>
      <div class="step" data-step="3">
        <span class="step-number">3</span>
        <span class="step-label">Review</span>
      </div>
      <div class="step-line"></div>
      <div class="step" data-step="4">
        <span class="step-number">4</span>
        <span class="step-label">Done</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" onclick="prevStep()">Prev</button>
      <button class="ctrl-btn" id="nextBtn" onclick="nextStep()">Next</button>
    </div>
  </div>
  <script>
    let currentStep = 1;
    const totalSteps = 4;

    function updateSteps() {
      document.querySelectorAll('.step').forEach(s => {
        const num = parseInt(s.dataset.step);
        s.classList.toggle('active', num <= currentStep);
        s.classList.toggle('current', num === currentStep);
      });
      document.querySelectorAll('.step-line').forEach((line, i) => {
        line.classList.toggle('active', i < currentStep - 1);
      });
      document.getElementById('prevBtn').disabled = currentStep === 1;
      document.getElementById('nextBtn').disabled = currentStep === totalSteps;
    }

    function nextStep() {
      if (currentStep < totalSteps) { currentStep++; updateSteps(); }
    }
    function prevStep() {
      if (currentStep > 1) { currentStep--; updateSteps(); }
    }
    updateSteps();
  </script>
</body>
</html>
