<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberHub Terminal - Fade-Out Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cyberpunk-viewport">
        <!-- Main Premium Cyberpunk Neon Card Elevation Container Hub Shell -->
        <div class="terminal-container-card">
            <header class="terminal-header">
                <div class="neon-matrix-badge">NODE: FADE_INGRESS</div>
                <h2 class="terminal-title">Biometric Control Panel</h2>
                <p class="terminal-subtitle">Hover over or interact with the core trigger target below to reveal the pure-CSS structural fade-out popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">⚡</span>
                        <span class="btn-text">Open Quantum Stream</span>
                    </button>

                    <!-- Floating Popover Structural Fade-Out Overlay Menu Shell Box -->
                    <div class="fade-out-popover ease-fade-out-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Quantum Actions</h4>
                            <ul class="neon-actions-list">
                                <li class="menu-item"><a href="#pulse" class="action-link-node">Amplify Neon Pulse</a></li>
                                <li class="menu-item"><a href="#vector" class="action-link-node">Re-align Grid Vectors</a></li>
                                <li class="menu-item"><a href="#purge" class="action-link-node action-danger">Purge Core Buffer</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="terminal-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
