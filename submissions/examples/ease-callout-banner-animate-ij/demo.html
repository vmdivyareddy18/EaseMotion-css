<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Callout Banner Animate</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
      color: #333;
    }
    .demo-container {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
      margin: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 32px; font-size: 0.9rem; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .controls button {
      padding: 8px 20px;
      border: 2px solid #e0e4e8;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { border-color: #4a6cf7; color: #4a6cf7; }
    .controls button.primary { background: #4a6cf7; color: #fff; border-color: #4a6cf7; }
    .controls button.primary:hover { background: #3b5de7; }
    .demo-box {
      background: #f8f9fc;
      border-radius: 12px;
      padding: 32px;
      border: 1px solid #eef0f4;
      min-height: 100px;
      overflow: hidden;
      position: relative;
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Callout Banner Animate</h1>
    <p class="desc">Notification banner that slides in with a bounce effect</p>

    <div class="controls">
      <button class="primary" id="showBanner">Show Banner</button>
      <button id="hideBanner">Hide Banner</button>
    </div>

    <div class="demo-box">
      <div class="ease-callout-banner-animate" id="calloutBanner">
        <div class="banner-content">
          <span class="banner-icon">&#9888;</span>
          <div class="banner-text">
            <strong>Update Available</strong>
            <p>Version 3.2.0 is ready to install. New features and bug fixes included.</p>
          </div>
          <button class="banner-close">&times;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const banner = document.getElementById('calloutBanner');

    document.getElementById('showBanner').addEventListener('click', () => {
      banner.classList.add('visible');
    });

    document.getElementById('hideBanner').addEventListener('click', () => {
      banner.classList.remove('visible');
    });

    banner.querySelector('.banner-close').addEventListener('click', () => {
      banner.classList.remove('visible');
    });
  </script>
</body>
</html>
