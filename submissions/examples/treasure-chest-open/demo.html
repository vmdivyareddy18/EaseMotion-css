<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Treasure Chest Open Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="chest-wrapper">
      <h1>Treasure Chest</h1>
      <p class="description">
        A pure CSS treasure chest that opens on hover with a golden glow.
      </p>
      <div
        class="chest"
        tabindex="0"
        role="button"
        aria-label="Open the treasure chest"
      >
        <div class="lid">
          <div class="lock"></div>
        </div>
        <div class="body">
          <div class="glow"></div>
          <div class="sparkle s1">✦</div>
          <div class="sparkle s2">✦</div>
          <div class="sparkle s3">✦</div>
          <div class="sparkle s4">✦</div>
          <div class="sparkle s5">✦</div>
          <div class="sparkle s6">✦</div>
        </div>
      </div>
      <p class="hint">Hover or focus the chest to open</p>
    </div>
  </body>
</html>
