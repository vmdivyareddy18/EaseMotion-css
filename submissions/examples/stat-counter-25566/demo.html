<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stat Counter Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem;
      min-height: 100vh;
      margin: 0;
      background: var(--ease-color-bg);
      gap: 4rem;
    }
    .section-title {
      text-align: center;
      margin-bottom: 1rem;
    }
    .section-title h2 {
      margin: 0;
      color: var(--ease-color-text);
    }
    .section-title p {
      margin: 0.5rem 0 0;
      color: var(--ease-color-muted);
      font-size: var(--ease-text-sm);
    }
    .spacer {
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ease-color-muted);
      font-size: 1.25rem;
    }
    section {
      width: 100%;
      max-width: 900px;
    }
  </style>
</head>
<body>

  <div class="spacer">↓ Scroll down to see counters animate ↓</div>

  <section>
    <div class="section-title">
      <h2>Statistics</h2>
      <p>Counters animate on scroll with IntersectionObserver</p>
    </div>

    <div class="ease-stat-grid">
      <div class="ease-stat ease-reveal ease-slide-up">
        <div class="ease-stat-icon-bg">★</div>
        <div class="ease-stat-number" data-target="500">0</div>
        <div class="ease-stat-label">Projects Completed</div>
      </div>

      <div class="ease-stat ease-reveal ease-slide-up ease-reveal-delay-1">
        <div class="ease-stat-icon-bg">👥</div>
        <div class="ease-stat-number" data-target="12800" data-duration="2500">0</div>
        <div class="ease-stat-label">Happy Clients</div>
      </div>

      <div class="ease-stat ease-reveal ease-slide-up ease-reveal-delay-2">
        <div class="ease-stat-icon-bg">⚡</div>
        <div class="ease-stat-number" data-target="99">0</div>
        <div class="ease-stat-label">Uptime %</div>
      </div>

      <div class="ease-stat ease-reveal ease-slide-up ease-reveal-delay-3">
        <div class="ease-stat-icon-bg">🏆</div>
        <div class="ease-stat-number"><span class="ease-stat-prefix">+</span>24</div>
        <div class="ease-stat-label">Awards Won</div>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">
      <h2>Horizontal Variant</h2>
    </div>

    <div class="ease-stat-grid">
      <div class="ease-stat ease-stat-horizontal ease-reveal ease-slide-up">
        <div class="ease-stat-icon-bg">📦</div>
        <div class="ease-stat-body">
          <div class="ease-stat-number" data-target="342">0</div>
          <div class="ease-stat-label">Products Shipped</div>
        </div>
      </div>

      <div class="ease-stat ease-stat-horizontal ease-reveal ease-slide-up ease-reveal-delay-1">
        <div class="ease-stat-icon-bg">🌍</div>
        <div class="ease-stat-body">
          <div class="ease-stat-number" data-target="50">0</div>
          <div class="ease-stat-label"><span class="ease-stat-suffix">+</span> Countries</div>
        </div>
      </div>
    </div>
  </section>

  <div class="spacer" style="height:30vh;">— end —</div>

  <script src="counter.js"></script>
  <script src="../../../core/reveal.js"></script>
</body>
</html>
