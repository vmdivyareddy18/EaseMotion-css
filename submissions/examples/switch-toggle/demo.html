<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EaseMotion Switch Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Switch/Toggle Component</h2>
    
    <!-- Primary Switch -->
    <label class="ease-switch ease-switch-primary">
        <input type="checkbox" class="ease-switch-input" checked>
        <span class="ease-switch-track">
            <span class="ease-switch-thumb"></span>
        </span>
    </label>

    <!-- Success Switch -->
    <label class="ease-switch ease-switch-success">
        <input type="checkbox" class="ease-switch-input">
        <span class="ease-switch-track">
            <span class="ease-switch-thumb"></span>
        </span>
    </label>
</body>
</html>
