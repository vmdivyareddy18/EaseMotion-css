<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Swing-Hover Accordion - Minimalist Tech</title>
  <!-- Base EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Component Specific CSS -->
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      background-color: #f5f5f7;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="min-tech-accordion">
    <h2 class="ease-text-xl ease-font-semibold ease-mb-6" style="color: #111;">
      Server Specifications
    </h2>

    <details class="min-tech-item" open>
      <summary class="min-tech-header">Instance alpha-01</summary>
      <div class="min-tech-content">
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">CPU Cores</span>
          <span class="min-tech-data-val">16 vCPU</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Memory</span>
          <span class="min-tech-data-val">64 GB RAM</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Storage</span>
          <span class="min-tech-data-val">2 TB NVMe</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Uptime</span>
          <span class="min-tech-data-val">99.998%</span>
        </div>
      </div>
    </details>

    <details class="min-tech-item">
      <summary class="min-tech-header">Instance beta-02</summary>
      <div class="min-tech-content">
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">CPU Cores</span>
          <span class="min-tech-data-val">8 vCPU</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Memory</span>
          <span class="min-tech-data-val">32 GB RAM</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Storage</span>
          <span class="min-tech-data-val">1 TB SSD</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Uptime</span>
          <span class="min-tech-data-val">99.950%</span>
        </div>
      </div>
    </details>

    <details class="min-tech-item">
      <summary class="min-tech-header">Network Routing</summary>
      <div class="min-tech-content">
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">Bandwidth</span>
          <span class="min-tech-data-val">10 Gbps</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">DDoS Protection</span>
          <span class="min-tech-data-val">Active (Layer 7)</span>
        </div>
        <div class="min-tech-data-row">
          <span class="min-tech-data-label">DNS Res</span>
          <span class="min-tech-data-val">1.1.1.1</span>
        </div>
      </div>
    </details>

  </div>

</body>
</html>
