<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calorie Counter — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 2rem; background: var(--ease-color-bg); font-family: var(--ease-font-sans); }
    h2 { text-align: center; margin-bottom: 0.25rem; }
    p.sub { text-align: center; color: var(--ease-color-muted); margin-bottom: 2rem; }
  </style>
</head>
<body>
  <h2>Calorie Counter</h2>
  <p class="sub">Track your daily nutrition intake</p>

  <div class="ease-cal">

    <!-- Daily goal panel -->
    <div class="ease-cal__goal-panel">
      <div class="ease-cal__goal-header">
        <div>
          <div class="ease-cal__goal-title">Remaining Today</div>
          <div class="ease-cal__goal-remaining" id="cal-remaining">0</div>
          <div class="ease-cal__goal-sub" id="cal-sub">of 2000 kcal goal</div>
        </div>
        <div class="ease-cal__goal-stats">
          <div class="ease-cal__goal-stat">
            <span class="ease-cal__goal-stat-value" id="cal-goal-val">2000</span>
            <span class="ease-cal__goal-stat-label">Goal</span>
          </div>
          <div class="ease-cal__goal-stat">
            <span class="ease-cal__goal-stat-value" id="cal-consumed">0</span>
            <span class="ease-cal__goal-stat-label">Eaten</span>
          </div>
          <div class="ease-cal__goal-stat">
            <span class="ease-cal__goal-stat-value" id="cal-burned">0</span>
            <span class="ease-cal__goal-stat-label">Burned</span>
          </div>
        </div>
      </div>
      <div class="ease-cal__goal-track">
        <div class="ease-cal__goal-fill" id="cal-fill" style="width:0%"></div>
      </div>
    </div>

    <!-- Macro rings -->
    <div class="ease-cal__macros" id="macro-rings"></div>

    <!-- Settings -->
    <div class="ease-cal__settings">
      <h3 class="ease-cal__settings-title">Daily Goals</h3>
      <div class="ease-cal__settings-field">
        <label class="ease-cal__settings-label" for="goal-kcal">Calories (kcal)</label>
        <input class="ease-cal__settings-input" id="goal-kcal" type="number" value="2000" min="500" max="5000" />
      </div>
      <div class="ease-cal__settings-field">
        <label class="ease-cal__settings-label" for="goal-protein">Protein (g)</label>
        <input class="ease-cal__settings-input" id="goal-protein" type="number" value="150" min="0" />
      </div>
      <div class="ease-cal__settings-field">
        <label class="ease-cal__settings-label" for="goal-carbs">Carbs (g)</label>
        <input class="ease-cal__settings-input" id="goal-carbs" type="number" value="250" min="0" />
      </div>
      <div class="ease-cal__settings-field">
        <label class="ease-cal__settings-label" for="goal-fat">Fat (g)</label>
        <input class="ease-cal__settings-input" id="goal-fat" type="number" value="65" min="0" />
      </div>
    </div>

    <!-- Add food -->
    <div class="ease-cal__add-panel">
      <div class="ease-cal__add-title">Add Food</div>
      <div class="ease-cal__search-row">
        <input class="ease-cal__search-input" id="food-search"
               type="text" placeholder="Search food (e.g. chicken, rice, apple)..." />
      </div>
      <div class="ease-cal__food-results" id="food-results"></div>
      <div class="ease-cal__serving-row" id="serving-row" style="display:none;">
        <span style="font-size:0.8rem;color:var(--ease-color-muted);" id="selected-food-name">—</span>
        <input class="ease-cal__serving-input" id="serving-qty" type="number" value="1" min="0.1" step="0.1" />
        <span style="font-size:0.8rem;color:var(--ease-color-muted);">serving(s)</span>
        <select class="ease-cal__meal-select" id="meal-select">
          <option value="Breakfast">Breakfast</option>
          <option value="Lunch" selected>Lunch</option>
          <option value="Dinner">Dinner</option>
          <option value="Snacks">Snacks</option>
        </select>
        <button class="ease-cal__add-btn" id="add-food-btn">+ Add</button>
      </div>
    </div>

    <!-- Meal log -->
    <div class="ease-cal__log" id="meal-log"></div>

  </div>

  <script>
    // Food database (per serving)
    const FOODS = [
      { name:'Chicken Breast (100g)',  kcal:165, protein:31, carbs:0,  fat:3.6 },
      { name:'Brown Rice (100g)',      kcal:123, protein:2.6,carbs:26, fat:0.9 },
      { name:'Whole Egg (large)',      kcal:78,  protein:6,  carbs:0.6,fat:5   },
      { name:'Banana (medium)',        kcal:105, protein:1.3,carbs:27, fat:0.4 },
      { name:'Apple (medium)',         kcal:95,  protein:0.5,carbs:25, fat:0.3 },
      { name:'Greek Yogurt (170g)',    kcal:100, protein:17, carbs:6,  fat:0.7 },
      { name:'Salmon (100g)',          kcal:208, protein:20, carbs:0,  fat:13  },
      { name:'Oats (100g)',            kcal:389, protein:17, carbs:66, fat:7   },
      { name:'Broccoli (100g)',        kcal:34,  protein:2.8,carbs:7,  fat:0.4 },
      { name:'Sweet Potato (100g)',    kcal:86,  protein:1.6,carbs:20, fat:0.1 },
      { name:'Almonds (28g)',          kcal:164, protein:6,  carbs:6,  fat:14  },
      { name:'Cheddar Cheese (28g)',   kcal:113, protein:7,  carbs:0.4,fat:9   },
      { name:'Whole Milk (240ml)',     kcal:149, protein:8,  carbs:12, fat:8   },
      { name:'Bread White (1 slice)',  kcal:79,  protein:2.7,carbs:15, fat:1   },
      { name:'Pasta (100g cooked)',    kcal:131, protein:5,  carbs:25, fat:1.1 },
      { name:'Avocado (half)',         kcal:120, protein:1.5,carbs:6,  fat:11  },
      { name:'Orange (medium)',        kcal:62,  protein:1.2,carbs:15, fat:0.2 },
      { name:'Beef Steak (100g)',      kcal:271, protein:26, carbs:0,  fat:18  },
      { name:'Tofu (100g)',            kcal:76,  protein:8,  carbs:2,  fat:4   },
      { name:'Peanut Butter (2tbsp)',  kcal:188, protein:8,  carbs:6,  fat:16  },
    ];

    let selectedFood = null;
    let log = JSON.parse(localStorage.getItem('ease-cal-log') || '[]');
    let goals = JSON.parse(localStorage.getItem('ease-cal-goals') || 'null') ||
      { kcal:2000, protein:150, carbs:250, fat:65 };

    function saveGoals() { localStorage.setItem('ease-cal-goals',JSON.stringify(goals)); }
    function saveLog()   { localStorage.setItem('ease-cal-log',JSON.stringify(log)); }

    // Load saved goals into inputs
    document.getElementById('goal-kcal').value    = goals.kcal;
    document.getElementById('goal-protein').value = goals.protein;
    document.getElementById('goal-carbs').value   = goals.carbs;
    document.getElementById('goal-fat').value     = goals.fat;

    function totals() {
      return log.reduce((acc, e) => ({
        kcal:    acc.kcal    + e.kcal,
        protein: acc.protein + e.protein,
        carbs:   acc.carbs   + e.carbs,
        fat:     acc.fat     + e.fat,
      }), { kcal:0, protein:0, carbs:0, fat:0 });
    }

    function renderGoalPanel() {
      const t = totals();
      const rem = Math.max(0, goals.kcal - t.kcal);
      const pct = Math.min(100, (t.kcal / goals.kcal) * 100);
      const over = t.kcal > goals.kcal;
      document.getElementById('cal-remaining').textContent = over
        ? '+' + Math.round(t.kcal - goals.kcal) + ' over'
        : Math.round(rem) + ' kcal';
      document.getElementById('cal-sub').textContent = `of ${goals.kcal} kcal goal`;
      document.getElementById('cal-goal-val').textContent = goals.kcal;
      document.getElementById('cal-consumed').textContent = Math.round(t.kcal);
      document.getElementById('cal-burned').textContent = '0';
      const fill = document.getElementById('cal-fill');
      fill.style.width = pct + '%';
      fill.classList.toggle('ease-cal__goal-fill--over', over);
    }

    function ring(pct, color) {
      const r = 20, circ = 2 * Math.PI * r;
      const offset = circ - (Math.min(pct,100)/100) * circ;
      return `<svg viewBox="0 0 52 52"><circle class="ease-cal__macro-ring-bg" cx="26" cy="26" r="${r}"/>
        <circle class="ease-cal__macro-ring-fill" cx="26" cy="26" r="${r}"
          stroke="${color}" style="stroke-dashoffset:${offset.toFixed(1)}"/></svg>`;
    }

    function renderMacros() {
      const t = totals();
      const macros = [
        { name:'Protein', key:'protein', goal:goals.protein, unit:'g', color:'#6c63ff' },
        { name:'Carbs',   key:'carbs',   goal:goals.carbs,   unit:'g', color:'#f59e0b' },
        { name:'Fat',     key:'fat',     goal:goals.fat,     unit:'g', color:'#ef4444' },
      ];
      document.getElementById('macro-rings').innerHTML = macros.map(m => {
        const val = Math.round(t[m.key] * 10)/10;
        const pct = m.goal > 0 ? Math.round((val/m.goal)*100) : 0;
        return `<div class="ease-cal__macro-card">
          <div class="ease-cal__macro-ring">
            ${ring(pct, m.color)}
            <div class="ease-cal__macro-ring-pct">${pct}%</div>
          </div>
          <div class="ease-cal__macro-info">
            <div class="ease-cal__macro-name">${m.name}</div>
            <div class="ease-cal__macro-value">${val}${m.unit}</div>
            <div class="ease-cal__macro-goal">of ${m.goal}${m.unit}</div>
          </div>
        </div>`;
      }).join('');
    }

    function renderLog() {
      const meals = ['Breakfast','Lunch','Dinner','Snacks'];
      const logEl = document.getElementById('meal-log');
      if (!log.length) {
        logEl.innerHTML = '<div class="ease-cal__empty-log">No foods logged yet — search and add foods above 🥗</div>';
        return;
      }
      logEl.innerHTML = meals.map(meal => {
        const items = log.filter(e => e.meal === meal);
        if (!items.length) return '';
        const mealKcal = Math.round(items.reduce((s,e)=>s+e.kcal,0));
        return `<div class="ease-cal__meal-group">
          <div class="ease-cal__meal-header">
            ${meal}
            <span class="ease-cal__meal-kcal">${mealKcal} kcal</span>
          </div>
          ${items.map((e,i) => `
            <div class="ease-cal__log-item">
              <div class="ease-cal__log-name">${e.name}</div>
              <div class="ease-cal__log-macros">P${Math.round(e.protein)}g · C${Math.round(e.carbs)}g · F${Math.round(e.fat)}g</div>
              <div class="ease-cal__log-cal">${Math.round(e.kcal)}</div>
              <button class="ease-cal__del-btn" onclick="delEntry(${e.id})" aria-label="Remove ${e.name}">×</button>
            </div>
          `).join('')}
        </div>`;
      }).join('');
    }

    function render() { renderGoalPanel(); renderMacros(); renderLog(); }

    window.delEntry = function(id) {
      log = log.filter(e => e.id !== id);
      saveLog(); render();
    };

    // Food search
    document.getElementById('food-search').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      const results = document.getElementById('food-results');
      if (!q) { results.innerHTML = ''; return; }
      const matches = FOODS.filter(f => f.name.toLowerCase().includes(q)).slice(0,6);
      results.innerHTML = matches.map(f => `
        <div class="ease-cal__food-item" onclick="selectFood(${FOODS.indexOf(f)})">
          <div>
            <div class="ease-cal__food-name">${f.name}</div>
            <div class="ease-cal__food-meta">P${f.protein}g · C${f.carbs}g · F${f.fat}g</div>
          </div>
          <div class="ease-cal__food-cal">${f.kcal} kcal</div>
        </div>
      `).join('');
    });

    window.selectFood = function(idx) {
      selectedFood = FOODS[idx];
      document.getElementById('selected-food-name').textContent = selectedFood.name;
      document.getElementById('serving-row').style.display = 'flex';
      document.getElementById('food-results').innerHTML = '';
      document.getElementById('food-search').value = '';
    };

    document.getElementById('add-food-btn').addEventListener('click', function() {
      if (!selectedFood) return;
      const qty = parseFloat(document.getElementById('serving-qty').value) || 1;
      const meal = document.getElementById('meal-select').value;
      log.push({
        id: Date.now(),
        name: selectedFood.name + (qty !== 1 ? ' ×' + qty : ''),
        meal,
        kcal:    selectedFood.kcal    * qty,
        protein: selectedFood.protein * qty,
        carbs:   selectedFood.carbs   * qty,
        fat:     selectedFood.fat     * qty,
      });
      saveLog(); render();
      selectedFood = null;
      document.getElementById('serving-row').style.display = 'none';
      document.getElementById('serving-qty').value = '1';
    });

    // Goal settings
    ['goal-kcal','goal-protein','goal-carbs','goal-fat'].forEach(id => {
      document.getElementById(id).addEventListener('input', function() {
        const key = id.replace('goal-','');
        goals[key] = parseFloat(this.value) || 0;
        saveGoals(); render();
      });
    });

    render();
  </script>
</body>
</html>
