<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metric Delta Flash</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="dashboard-card" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion dashboard example</p>
    <h1 id="demo-title">Metric delta flash</h1>

    <section class="metric-grid" aria-label="Metric cards">
      <article class="metric positive">
        <span class="label">Conversion</span>
        <strong>18.4%</strong>
        <span class="delta">+3.2%</span>
      </article>
      <article class="metric warning">
        <span class="label">Queue time</span>
        <strong>42s</strong>
        <span class="delta">+8s</span>
      </article>
      <article class="metric neutral">
        <span class="label">Tickets closed</span>
        <strong>216</strong>
        <span class="delta">+24</span>
      </article>
    </section>
  </main>
</body>
</html>
