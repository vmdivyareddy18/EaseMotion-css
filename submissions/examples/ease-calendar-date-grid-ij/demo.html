<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Date Grid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Calendar Date Grid</h1>
    <p class="subtitle">Click a date to see the scale/pop animation.</p>

    <div class="calendar" id="calendar">
      <div class="cal-header">
        <button class="cal-nav" id="prevMonth" aria-label="Previous month">&lsaquo;</button>
        <h2 class="cal-month-year" id="monthYear">January 2026</h2>
        <button class="cal-nav" id="nextMonth" aria-label="Next month">&rsaquo;</button>
      </div>

      <div class="cal-weekdays">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
      </div>

      <div class="cal-grid" id="calGrid"></div>
    </div>

    <p class="selected-display" id="selectedDisplay">No date selected.</p>
  </div>

  <script>
    const months = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];

    let currentDate = new Date();
    let selectedDate = null;

    const monthYear = document.getElementById('monthYear');
    const calGrid = document.getElementById('calGrid');
    const selectedDisplay = document.getElementById('selectedDisplay');
    const prevBtn = document.getElementById('prevMonth');
    const nextBtn = document.getElementById('nextMonth');

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      monthYear.textContent = `${months[month]} ${year}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();

      calGrid.innerHTML = '';

      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        empty.className = 'cal-day cal-day--empty';
        calGrid.appendChild(empty);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dayEl = document.createElement('button');
        dayEl.className = 'cal-day';
        dayEl.textContent = d;
        dayEl.dataset.date = d;

        if (
          selectedDate &&
          selectedDate.getFullYear() === year &&
          selectedDate.getMonth() === month &&
          selectedDate.getDate() === d
        ) {
          dayEl.classList.add('is-selected');
        }

        dayEl.addEventListener('click', function() {
          document.querySelectorAll('.cal-day.is-selected').forEach(el => el.classList.remove('is-selected'));
          this.classList.add('is-selected');
          selectedDate = new Date(year, month, d);
          selectedDisplay.textContent = `Selected: ${months[month]} ${d}, ${year}`;
        });

        calGrid.appendChild(dayEl);
      }
    }

    prevBtn.addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    nextBtn.addEventListener('click', () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    renderCalendar();
  </script>
</body>
</html>
