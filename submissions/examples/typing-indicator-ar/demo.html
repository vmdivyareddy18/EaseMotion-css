<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Typing Indicator Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f1f5f9;
      color: #334155;
      gap: 2rem;
      padding: 2rem;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    h1 { margin-bottom: 0.25rem; }
    p  { color: #64748b; margin-bottom: 2.5rem; }

    /* ── Simulated chat window ── */
    .chat-window {
      background-color: #ffffff;
      border-radius: 1.25rem;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chat-window-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a09af8);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      flex-shrink: 0;
    }

    .chat-meta strong {
      display: block;
      font-size: 0.9375rem;
      color: #1e293b;
    }

    .chat-meta span {
      font-size: 0.75rem;
      color: #22c55e;
      font-weight: 600;
    }

    /* Existing messages */
    .msg {
      max-width: 75%;
      padding: 0.625rem 1rem;
      border-radius: 1rem;
      font-size: 0.9375rem;
      line-height: 1.5;
    }

    .msg.received {
      background-color: #e2e8f0;
      color: #334155;
      align-self: flex-start;
      border-bottom-left-radius: 0.25rem;
    }

    .msg.sent {
      background-color: #6c63ff;
      color: #ffffff;
      align-self: flex-end;
      border-bottom-right-radius: 0.25rem;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
    }

    /* typing indicator row */
    .typing-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .typing-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c63ff, #a09af8);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Typing Indicator</h1>
    <p>Three dots bouncing in a wave sequence — a pure CSS chat typing animation.</p>

    <div class="chat-window">
      <!-- Header -->
      <div class="chat-window-header">
        <div class="avatar">A</div>
        <div class="chat-meta">
          <strong>Alice</strong>
          <span>● Online</span>
        </div>
      </div>

      <!-- Messages -->
      <div class="messages">
        <div class="msg received">Hey! Are you free to chat? 👋</div>
        <div class="msg sent">Yes, just a sec!</div>

        <!-- Typing indicator -->
        <div class="typing-row">
          <div class="typing-avatar"></div>
          <div class="chat-bubble typing-indicator">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
