<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-battery-charge</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>ease-battery-charge</h1>
  <p>Animated battery fill with lightning bolt overlay and status indicator</p>

  <!-- Main animated battery -->
  <div class="battery-wrapper">

    <div class="battery">
      <div class="battery-fill"></div>
      <div class="battery-segments">
        <div class="segment-line"></div>
        <div class="segment-line"></div>
        <div class="segment-line"></div>
        <div class="segment-line"></div>
      </div>
      <div class="lightning">&#9889;</div>
    </div>

    <div class="battery-percent" id="pct">0%</div>

    <div class="status-bar">
      <div class="status-dot"></div>
      Charging...
    </div>

  </div>

  <!-- Static state examples -->
  <div class="battery-row">

    <div class="battery-card">
      <div class="battery small low">
        <div class="battery-fill"></div>
        <div class="lightning">&#9889;</div>
      </div>
      <label>15% — Low</label>
    </div>

    <div class="battery-card">
      <div class="battery small mid">
        <div class="battery-fill"></div>
        <div class="lightning">&#9889;</div>
      </div>
      <label>50% — Mid</label>
    </div>

    <div class="battery-card">
      <div class="battery small full">
        <div class="battery-fill"></div>
        <div class="lightning">&#9889;</div>
      </div>
      <label>95% — Full</label>
    </div>

  </div>

  <script>
    // Sync percentage counter with the 3s CSS animation
    const pct = document.getElementById('pct');
    const levels = [0,25,55,80,100];
    const times  = [0, 600, 1500, 2400, 3000];
    let start = null;

    function lerp(a, b, t) { return Math.round(a + (b - a) * t); }

    function tick(ts) {
      if (!start) start = ts;
      const elapsed = (ts - start) % 3000;

      let val = 100;
      for (let i = 0; i < times.length - 1; i++) {
        if (elapsed >= times[i] && elapsed < times[i+1]) {
          const t = (elapsed - times[i]) / (times[i+1] - times[i]);
          val = lerp(levels[i], levels[i+1], t);
          break;
        }
      }
      pct.textContent = val + '%';
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  </script>

</body>
</html>
