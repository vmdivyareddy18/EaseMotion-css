<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Slide Animation</title>
  <link rel="stylesheet" href="style.css">

      </label>

    </div>

  </main>

</body>
</html>
