<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Elastic Bounce Accordion — Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body style="background:#f1f5f9; padding: 2rem;">

<div class="ease-accordion-elastic-lg">

  <div class="ease-accordion-elastic-lg__item">
    <button class="ease-accordion-elastic-lg__header" aria-expanded="true" aria-controls="panel-1">
      Revenue Overview
      <svg class="ease-accordion-elastic-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-elastic-lg__panel" id="panel-1" data-open="true">
      <div class="ease-accordion-elastic-lg__panel-inner">
        <div class="ease-accordion-elastic-lg__content">
          Q3 revenue grew 18% quarter-over-quarter, driven mainly by increased enterprise subscriptions.
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-elastic-lg__item">
    <button class="ease-accordion-elastic-lg__header" aria-expanded="false" aria-controls="panel-2">
      Active Users
      <svg class="ease-accordion-elastic-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-elastic-lg__panel" id="panel-2" data-open="false">
      <div class="ease-accordion-elastic-lg__panel-inner">
        <div class="ease-accordion-elastic-lg__content">
          Daily active users rose to 42,000, a new all-time high for the dashboard analytics module.
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-elastic-lg__item">
    <button class="ease-accordion-elastic-lg__header" aria-expanded="false" aria-controls="panel-3">
      Churn Rate
      <svg class="ease-accordion-elastic-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-elastic-lg__panel" id="panel-3" data-open="false">
      <div class="ease-accordion-elastic-lg__panel-inner">
        <div class="ease-accordion-elastic-lg__content">
          Churn dropped to 2.1%, down from 3.4% last quarter, following the new onboarding flow.
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.ease-accordion-elastic-lg__header').forEach(header => {
    header.addEventListener('click', () => {
      const expanded = header.getAttribute('aria-expanded') === 'true';
      const panel = document.getElementById(header.getAttribute('aria-controls'));
      header.setAttribute('aria-expanded', String(!expanded));
      panel.setAttribute('data-open', String(!expanded));
    });

    header.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        header.click();
      }
    });
  });
</script>

</body>
</html>
