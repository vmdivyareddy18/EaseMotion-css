<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Security Knowledge Fabric</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="fabric-dashboard">
    <header class="header">
      <span class="badge">Semantic Security Index</span>
      <h1>Enterprise Security Knowledge Fabric</h1>
      <p class="subtitle">Unified semantic query bar, knowledge graph links, and audit catalog tracking.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-query">
        <h3>🔍 Semantic Query Core</h3>
        <div class="search-box">
          <input type="text" placeholder="Find correlations between APT-32 and auth gateways..." readonly>
          <button class="search-btn">Semantic Search</button>
        </div>

        <div class="graph-nodes">
          <div class="node"><span>Auth IP</span></div>
          <div class="line"></div>
          <div class="node"><span>APT-32 Cluster</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Semantic Metadata</h3>
          <ul class="stats-list">
            <li>Federated Nodes: <strong>14.2 Million</strong></li>
            <li>Avg Graph Depth: <strong>6.8 Connections</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
