<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slingshot Tally Counter</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f0fdf4; font-family: system-ui, sans-serif;">

  <div class="tally-card ease-fade-in-up">
    <p class="tally-label">Trees Planted Today</p>

    <div class="tally-display">
      <span class="tally-count" id="tallyCount">0</span>
    </div>

    <div class="tally-controls">
      <button type="button" class="tally-btn tally-btn-minus" onclick="updateTally(-1)" aria-label="Decrease count">−</button>
      <button type="button" class="tally-btn tally-btn-plus" onclick="updateTally(1)" aria-label="Increase count">+</button>
    </div>
  </div>

  <script>
    let count = 0;
    function updateTally(delta) {
      count = Math.max(0, count + delta);
      const el = document.getElementById('tallyCount');
      el.textContent = count;
      el.classList.remove('ease-slingshot');
      void el.offsetWidth;
      el.classList.add('ease-slingshot');
    }
  </script>

</body>
</html>
