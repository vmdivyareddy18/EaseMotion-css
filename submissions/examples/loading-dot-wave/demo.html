<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading Dot Wave</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="loader-card" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion loader</p>
    <h1 id="demo-title">Loading dot wave</h1>
    <p class="intro">A staggered loading indicator for async panels, upload rows, and compact empty states.</p>

    <div class="loader" role="status" aria-live="polite">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="status-text">Syncing changes</span>
    </div>
  </main>
</body>
</html>
