<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - Modern SaaS Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="saas-container">
    <header class="saas-header">
      <span class="saas-badge">✨ Feature Release</span>
      <h1>SaaS Analytics Console</h1>
      <p>Hover over the metric indicators below, then click to see the smooth CSS Tada animation in action.</p>
    </header>

    <div class="saas-grid">
      <div class="saas-card">
        <div class="card-header">
          <h3>Conversion Rate</h3>
          <span class="trend up">+12.4%</span>
        </div>
        <div class="metric-value">4.82%</div>
        <button class="saas-action-btn tooltip-container" aria-describedby="tip-optimize">
          Optimize Funnel
          <span id="tip-optimize" class="tooltip" role="tooltip">
            ⚡ Running smart automated A/B tests...
          </span>
        </button>
      </div>

      <div class="saas-card">
        <div class="card-header">
          <h3>Active Subscribers</h3>
          <span class="trend up">+8.1%</span>
        </div>
        <div class="metric-value">12,480</div>
        <button class="saas-action-btn tooltip-container" aria-describedby="tip-export">
          Generate Report
          <span id="tip-export" class="tooltip" role="tooltip">
            📊 Syncing CSV export securely to your email!
          </span>
        </button>
      </div>
    </div>
  </main>

</body>
</html>
