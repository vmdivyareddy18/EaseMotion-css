<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Tie-Breaker Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-tie-breaker">
    <h1 class="ease-tie-breaker-title">🎲 Tie-Breaker Game</h1>
    <p class="ease-tie-breaker-subtitle">Add tied options below, then let fate decide!</p>
    <div class="ease-tie-breaker-input-row">
      <input type="text" id="optionInput" class="ease-tie-breaker-input" placeholder="Enter a name and press Add">
      <button id="addBtn" class="ease-tie-breaker-btn">Add</button>
    </div>
    <ul id="optionList" class="ease-tie-breaker-list"></ul>
    <button id="spinBtn" class="ease-tie-breaker-spin-btn">Break the Tie 🎉</button>
    <div id="result" class="ease-tie-breaker-result"></div>
  </div>
  <script>
    const optionInput = document.getElementById('optionInput');
    const addBtn = document.getElementById('addBtn');
    const optionList = document.getElementById('optionList');
    const spinBtn = document.getElementById('spinBtn');
    const result = document.getElementById('result');
    let options = [];

    function renderList() {
      optionList.innerHTML = '';
      options.forEach((opt) => {
        const li = document.createElement('li');
        li.className = 'ease-tie-breaker-item';
        li.textContent = opt;
        optionList.appendChild(li);
      });
    }

    addBtn.addEventListener('click', () => {
      const val = optionInput.value.trim();
      if (val) {
        options.push(val);
        optionInput.value = '';
        renderList();
      }
    });

    optionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    spinBtn.addEventListener('click', () => {
      if (options.length < 2) {
        result.textContent = 'Add at least 2 options to break a tie!';
        return;
      }
      let count = 0;
      const maxTicks = 20;
      const interval = setInterval(() => {
        const randomIndex = Math.floor(Math.random() * options.length);
        result.textContent = options[randomIndex];
        result.classList.add('ease-tie-breaker-flicker');
        count++;
        if (count >= maxTicks) {
          clearInterval(interval);
          const winner = options[Math.floor(Math.random() * options.length)];
          result.textContent = '🏆 ' + winner;
          result.classList.remove('ease-tie-breaker-flicker');
          result.classList.add('ease-tie-breaker-winner');
        }
      }, 100);
    });
  </script>
</body>
</html>
