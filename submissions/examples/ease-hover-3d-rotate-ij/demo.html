<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover 3D Rotate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'card-bg') root.style.setProperty('--card-bg', t.value);
      if (t.name === 'rotate-x') root.style.setProperty('--rotate-x', t.value + 'deg');
      if (t.name === 'rotate-y') root.style.setProperty('--rotate-y', t.value + 'deg');
      if (t.name === 'transition-speed') root.style.setProperty('--transition-speed', t.value + 's');
    });
  </script>
  <div class="container">
    <p class="title">Hover 3D Rotate</p>
    <div class="card-3d">
      <div class="card-inner">
        <div class="card-icon">&#x1F3A8;</div>
        <div class="card-label">Hover Me</div>
      </div>
    </div>
    <div class="controls">
      <label>Card BG: <input type="color" name="card-bg" value="#2d2d44"></label>
      <label>Rotate X: <input type="range" name="rotate-x" min="0" max="30" value="15"></label>
      <label>Rotate Y: <input type="range" name="rotate-y" min="0" max="30" value="15"></label>
      <label>Speed: <input type="range" name="transition-speed" min="0.1" max="1" step="0.05" value="0.3"></label>
    </div>
  </div>
</body>
</html>
