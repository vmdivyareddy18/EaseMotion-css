<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Dot Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dot-page">
    <h1>Notification Dots</h1>
    <div class="dot-showcase">
      <div class="dot-item">
        <div class="bell-wrapper">
          <span class="bell-icon">&#128276;</span>
          <span class="notif-dot pulse-dot"></span>
        </div>
        <span class="dot-label">New</span>
      </div>
      <div class="dot-item">
        <div class="bell-wrapper">
          <span class="bell-icon">&#128276;</span>
          <span class="notif-dot count-dot">3</span>
        </div>
        <span class="dot-label">Count</span>
      </div>
      <div class="dot-item">
        <div class="bell-wrapper">
          <span class="bell-icon">&#128276;</span>
          <span class="notif-dot ring-dot"></span>
        </div>
        <span class="dot-label">Ring</span>
      </div>
    </div>
  </div>
</body>
</html>
