<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-tilt Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            background: #0f0f0f;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }

        h1 {
            color: #f1f1f1;
            font-size: 1.5rem;
            margin: 0;
        }

        .row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid #313244;
            border-radius: 1rem;
            padding: 2rem 2.5rem;
            min-width: 150px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .card span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .card p {
            margin: 0;
            font-size: 0.85rem;
            color: #a6adc8;
        }
    </style>
</head>

<body>
    <h1>ease-tilt Demo</h1>
    <div class="row">
        <div class="card ease-tilt">
            <span>🃏</span>
            <p>Default (10deg)</p>
        </div>
        <div class="card ease-tilt" style="--ease-tilt-degree: 20deg;">
            <span>🌀</span>
            <p>Strong (20deg)</p>
        </div>
        <div class="card ease-tilt" style="--ease-tilt-degree: 4deg;">
            <span>✨</span>
            <p>Subtle (4deg)</p>
        </div>
    </div>
</body>

</html>
