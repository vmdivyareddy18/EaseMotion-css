<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinity Loader - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Infinity Loader</h1>

    <div class="ease-loader-infinity">
      <svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 50 C50 20, 90 20, 100 50 C110 80, 150 80, 150 50 C150 20, 110 20, 100 50 C90 80, 50 80, 50 50Z" />
      </svg>
    </div>

    <p class="description">Animated infinity symbol with a continuous stroke-dashoffset loop. Built with SVG and pure CSS.</p>

    <button class="toggle-btn" id="bgToggle">Toggle Background Color</button>
  </div>

  <script>
    document.getElementById('bgToggle').addEventListener('click', function() {
      document.body.style.background = document.body.style.background === '#0a0e17' || document.body.style.background === '' ? '#111827' : '#0a0e17';
    });
  </script>
</body>
</html>
