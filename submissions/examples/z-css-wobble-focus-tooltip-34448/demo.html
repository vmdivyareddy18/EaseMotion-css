<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1">

<title>

Wobble Focus Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<div class="header">

<h1>

Analytics Dashboard

</h1>

<p>

Hover or focus the cards
to activate the tooltip.

</p>

</div>

<div class="grid">

<div
class="card">

<div
class="metric">

89%

</div>

<span>

Conversion Rate

</span>

<div
class="tooltip">

Monthly increase
of 14%

</div>

</div>


<div
class="card">

<div
class="metric">

24K

</div>

<span>

Visitors

</span>

<div
class="tooltip">

Traffic surged
this week

</div>

</div>


<div
class="card">

<div
class="metric">

1.2M

</div>

<span>

Revenue

</span>

<div
class="tooltip">

Quarterly target
achieved

</div>

</div>

</div>

</section>

</body>

</html>
