<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Tower Defense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🏰 Tower Defense</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">💰 Gold</span>
        <span class="stat-value" id="goldDisplay">100</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">❤️ Lives</span>
        <span class="stat-value" id="livesDisplay">20</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📊 Wave</span>
        <span class="stat-value" id="waveDisplay">1</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Score</span>
        <span class="stat-value" id="scoreDisplay">0</span>
      </div>
    </div>

    <div class="game-wrapper">
      <canvas id="gameCanvas" width="600" height="500"></canvas>
      <div class="tower-info" id="towerInfo">
        <span>Select a tower type</span>
      </div>
    </div>

    <div class="tower-buttons">
      <button class="tower-btn" data-tower="basic">🗼 Basic (20g)</button>
      <button class="tower-btn" data-tower="sniper">🎯 Sniper (35g)</button>
      <button class="tower-btn" data-tower="cannon">💥 Cannon (50g)</button>
      <button class="tower-btn" data-tower="ice">❄️ Ice (40g)</button>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Wave</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
      <button class="control-btn" id="speedBtn">⏩ 1x</button>
    </div>

    <div class="controls-hint">
      <span>🖱️ Click on path to place tower</span>
      <span>·</span>
      <span>🔄 Click tower to upgrade</span>
    </div>

    <div class="game-status" id="gameStatus">🏰 Select a tower and click the path to build!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const goldDisplay = document.getElementById('goldDisplay');
      const livesDisplay = document.getElementById('livesDisplay');
      const waveDisplay = document.getElementById('waveDisplay');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const towerInfo = document.getElementById('towerInfo');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const speedBtn = document.getElementById('speedBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Constants ----------
      const WIDTH = 600;
      const HEIGHT = 500;
      const CELL_SIZE = 20;
      const PATH_WIDTH = 30;

      // ---------- Path Definition ----------
      const pathPoints = [
        { x: 0, y: 250 },
        { x: 150, y: 250 },
        { x: 150, y: 100 },
        { x: 350, y: 100 },
        { x: 350, y: 350 },
        { x: 500, y: 350 },
        { x: 500, y: 450 },
        { x: 600, y: 450 }
      ];

      // ---------- Game State ----------
      let gold = 100;
      let lives = 20;
      let wave = 0;
      let score = 0;
      let enemies = [];
      let towers = [];
      let bullets = [];
      let selectedTower = 'basic';
      let gameSpeed = 1;
      let waveActive = false;
      let frameCount = 0;
      let spawnTimer = 0;
      let enemiesPerWave = 10;
      let enemyHealth = 100;
      let enemySpeed = 1.2;
      let totalEnemiesSpawned = 0;
      let enemiesKilled = 0;
      let gameLoop = null;
      let selectedTowerIndex = -1;

      // ---------- Tower Types ----------
      const TOWER_TYPES = {
        basic: {
          name: 'Basic',
          cost: 20,
          damage: 15,
          range: 100,
          fireRate: 30,
          color: '#4fc3f7',
          upgradeCost: 15,
          damageUpgrade: 5,
          rangeUpgrade: 10
        },
        sniper: {
          name: 'Sniper',
          cost: 35,
          damage: 40,
          range: 180,
          fireRate: 60,
          color: '#ffd54f',
          upgradeCost: 25,
          damageUpgrade: 15,
          rangeUpgrade: 15
        },
        cannon: {
          name: 'Cannon',
          cost: 50,
          damage: 30,
          range: 120,
          fireRate: 45,
          color: '#ff6b6b',
          upgradeCost: 30,
          damageUpgrade: 10,
          rangeUpgrade: 10
        },
        ice: {
          name: 'Ice',
          cost: 40,
          damage: 8,
          range: 110,
          fireRate: 25,
          color: '#81c784',
          upgradeCost: 20,
          damageUpgrade: 3,
          rangeUpgrade: 12,
          slowAmount: 0.5
        }
      };

      // ---------- Path Functions ----------
      function getPathPosition(progress) {
        const totalLength = getPathLength();
        const targetDist = progress * totalLength;
        let accumulated = 0;
        
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const dx = pathPoints[i + 1].x - pathPoints[i].x;
          const dy = pathPoints[i + 1].y - pathPoints[i].y;
          const segLength = Math.sqrt(dx * dx + dy * dy);
          
          if (accumulated + segLength >= targetDist) {
            const t = (targetDist - accumulated) / segLength;
            return {
              x: pathPoints[i].x + dx * t,
              y: pathPoints[i].y + dy * t,
              angle: Math.atan2(dy, dx)
            };
          }
          accumulated += segLength;
        }
        return { x: pathPoints[pathPoints.length - 1].x, y: pathPoints[pathPoints.length - 1].y, angle: 0 };
      }

      function getPathLength() {
        let total = 0;
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const dx = pathPoints[i + 1].x - pathPoints[i].x;
          const dy = pathPoints[i + 1].y - pathPoints[i].y;
          total += Math.sqrt(dx * dx + dy * dy);
        }
        return total;
      }

      function isOnPath(x, y) {
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const p1 = pathPoints[i];
          const p2 = pathPoints[i + 1];
          
          const dx = p2.x - p1.x;
          const dy = p2.y - p1.y;
          const len = Math.sqrt(dx * dx + dy * dy);
          const nx = -dy / len;
          const ny = dx / len;
          
          const t = ((x - p1.x) * dx + (y - p1.y) * dy) / (len * len);
          if (t >= 0 && t <= 1) {
            const px = p1.x + dx * t;
            const py = p1.y + dy * t;
            const dist = Math.sqrt((x - px) * (x - px) + (y - py) * (y - py));
            if (dist < PATH_WIDTH / 2 + 5) return true;
          }
        }
        return false;
      }

      // ---------- Tower Functions ----------
      function placeTower(x, y) {
        const type = TOWER_TYPES[selectedTower];
        if (!type) return false;
        if (gold < type.cost) {
          setGameStatus('❌ Not enough gold!', false);
          return false;
        }
        if (isOnPath(x, y)) {
          setGameStatus('❌ Cannot build on path!', false);
          return false;
        }
        // Check if tower already exists nearby
        for (const tower of towers) {
          const dx = tower.x - x;
          const dy = tower.y - y;
          if (dx * dx + dy * dy < 400) {
            setGameStatus('❌ Too close to another tower!', false);
            return false;
          }
        }

        towers.push({
          x, y,
          type: selectedTower,
          level: 1,
          cooldown: 0,
          target: null,
          angle: 0
        });
        gold -= type.cost;
        updateUI();
        setGameStatus(`✅ ${type.name} tower placed!`, true);
        return true;
      }

      function upgradeTower(index) {
        const tower = towers[index];
        const type = TOWER_TYPES[tower.type];
        const cost = type.upgradeCost * tower.level;
        if (gold < cost) {
          setGameStatus('❌ Not enough gold!', false);
          return;
        }
        if (tower.level >= 5) {
          setGameStatus('❌ Max level reached!', false);
          return;
        }
        gold -= cost;
        tower.level++;
        updateUI();
        setGameStatus(`⬆️ Tower upgraded to level ${tower.level}!`, true);
        selectedTowerIndex = -1;
      }

      // ---------- Enemy Functions ----------
      function spawnEnemy() {
        const health = enemyHealth * (1 + wave * 0.1);
        const speed = enemySpeed * (1 + wave * 0.02);
        enemies.push({
          progress: 0,
          health: health,
          maxHealth: health,
          speed: speed,
          x: 0,
          y: 0,
          alive: true,
          slowTimer: 0,
          slowAmount: 0
        });
      }

      function updateEnemies() {
        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          if (!enemy.alive) {
            enemies.splice(i, 1);
            continue;
          }

          // Apply slow
          let speedMultiplier = 1;
          if (enemy.slowTimer > 0) {
            speedMultiplier = 1 - enemy.slowAmount;
            enemy.slowTimer--;
          }

          enemy.progress += enemy.speed * 0.005 * speedMultiplier * gameSpeed;
          if (enemy.progress >= 1) {
            // Reached end
            lives--;
            enemy.alive = false;
            updateUI();
            if (lives <= 0) {
              endGame();
              return;
            }
            enemies.splice(i, 1);
            continue;
          }

          const pos = getPathPosition(enemy.progress);
          enemy.x = pos.x;
          enemy.y = pos.y;
        }
      }

      // ---------- Tower Targeting ----------
      function updateTowers() {
        for (let i = 0; i < towers.length; i++) {
          const tower = towers[i];
          const type = TOWER_TYPES[tower.type];
          if (tower.cooldown > 0) {
            tower.cooldown--;
          }

          // Find target
          let target = null;
          let minDist = Infinity;
          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            const dx = tower.x - enemy.x;
            const dy = tower.y - enemy.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < type.range && dist < minDist) {
              minDist = dist;
              target = enemy;
            }
          }
          tower.target = target;
          if (target) {
            tower.angle = Math.atan2(target.y - tower.y, target.x - tower.x);
          }

          // Fire
          if (target && tower.cooldown === 0) {
            const damage = type.damage * tower.level;
            bullets.push({
              x: tower.x,
              y: tower.y,
              target: target,
              speed: 4,
              damage: damage,
              color: type.color,
              isIce: tower.type === 'ice',
              slowAmount: type.slowAmount || 0
            });
            tower.cooldown = Math.max(10, type.fireRate / tower.level);
          }
        }
      }

      // ---------- Bullet Functions ----------
      function updateBullets() {
        for (let i = bullets.length - 1; i >= 0; i--) {
          const bullet = bullets[i];
          if (!bullet.target.alive) {
            bullets.splice(i, 1);
            continue;
          }

          const dx = bullet.target.x - bullet.x;
          const dy = bullet.target.y - bullet.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 10) {
            // Hit!
            bullet.target.health -= bullet.damage;
            if (bullet.isIce && bullet.target.alive) {
              bullet.target.slowTimer = 30;
              bullet.target.slowAmount = bullet.slowAmount;
            }
            if (bullet.target.health <= 0) {
              bullet.target.alive = false;
              gold += 10 + Math.floor(wave * 2);
              score += 10;
              enemiesKilled++;
              updateUI();
            }
            bullets.splice(i, 1);
          } else {
            bullet.x += (dx / dist) * bullet.speed * gameSpeed;
            bullet.y += (dy / dist) * bullet.speed * gameSpeed;
          }
        }
      }

      // ---------- Wave Management ----------
      function startWave() {
        if (waveActive) return;
        wave++;
        enemiesPerWave = 10 + wave * 3;
        enemyHealth = 100 + wave * 15;
        enemySpeed = 1.2 + wave * 0.04;
        totalEnemiesSpawned = 0;
        enemiesKilled = 0;
        spawnTimer = 0;
        waveActive = true;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ In Progress...';
        setGameStatus(`⚔️ Wave ${wave} starting!`, true);
        updateUI();
      }

      function updateWave() {
        if (!waveActive) return;
        
        spawnTimer++;
        if (spawnTimer % Math.max(15, 30 - wave) === 0 && totalEnemiesSpawned < enemiesPerWave) {
          spawnEnemy();
          totalEnemiesSpawned++;
        }
        
        if (totalEnemiesSpawned >= enemiesPerWave && enemies.length === 0) {
          waveActive = false;
          startBtn.disabled = false;
          startBtn.textContent = '▶ Next Wave';
          setGameStatus(`🎉 Wave ${wave} complete! +${50 + wave * 10} gold bonus!`, true);
          gold += 50 + wave * 10;
          updateUI();
        }
      }

      // ---------- Drawing ----------
      function draw() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        // Background
        ctx.fillStyle = '#0a151c';
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        // Draw path
        for (let i = 0; i < pathPoints.length - 1; i++) {
          const p1 = pathPoints[i];
          const p2 = pathPoints[i + 1];
          
          ctx.strokeStyle = '#2a3a3a';
          ctx.lineWidth = PATH_WIDTH;
          ctx.lineCap = 'round';
          ctx.lineJoin = 'round';
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
          
          // Path border
          ctx.strokeStyle = 'rgba(255,255,255,0.05)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p1.x, p1.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.stroke();
        }

        // Draw start and end markers
        ctx.fillStyle = '#4caf50';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('▶ Start', pathPoints[0].x - 20, pathPoints[0].y + 4);
        ctx.fillStyle = '#f44336';
        ctx.fillText('🏠 End', pathPoints[pathPoints.length - 1].x + 20, pathPoints[pathPoints.length - 1].y + 4);

        // Draw towers
        for (let i = 0; i < towers.length; i++) {
          const tower = towers[i];
          const type = TOWER_TYPES[tower.type];
          
          // Range indicator on hover
          if (i === selectedTowerIndex) {
            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.arc(tower.x, tower.y, type.range, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          // Tower base
          const grad = ctx.createRadialGradient(tower.x - 5, tower.y - 5, 2, tower.x, tower.y, 16);
          grad.addColorStop(0, type.color);
          grad.addColorStop(0.7, type.color);
          grad.addColorStop(1, darkenColor(type.color, 40));
          ctx.fillStyle = grad;
          ctx.shadowColor = type.color;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(tower.x, tower.y, 14, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Tower barrel
          ctx.save();
          ctx.translate(tower.x, tower.y);
          ctx.rotate(tower.angle || 0);
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(4, -3, 14, 6);
          ctx.restore();

          // Level indicator
          ctx.fillStyle = 'rgba(255,255,255,0.8)';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(`Lv${tower.level}`, tower.x, tower.y - 18);

          // Tower type icon
          ctx.font = '12px sans-serif';
          ctx.textBaseline = 'middle';
          const icons = { basic: '🗼', sniper: '🎯', cannon: '💥', ice: '❄️' };
          ctx.fillText(icons[tower.type] || '🗼', tower.x, tower.y + 2);
        }

        // Draw enemies
        for (const enemy of enemies) {
          if (!enemy.alive) continue;
          const healthPercent = enemy.health / enemy.maxHealth;
          
          // Enemy body
          const color = enemy.slowTimer > 0 ? '#81c784' : '#ff6b6b';
          ctx.shadowColor = color;
          ctx.shadowBlur = 10;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(enemy.x, enemy.y, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Health bar
          ctx.fillStyle = 'rgba(0,0,0,0.5)';
          ctx.fillRect(enemy.x - 15, enemy.y - 22, 30, 4);
          ctx.fillStyle = healthPercent > 0.5 ? '#4caf50' : '#ff6b6b';
          ctx.fillRect(enemy.x - 15, enemy.y - 22, 30 * healthPercent, 4);
        }

        // Draw bullets
        for (const bullet of bullets) {
          ctx.fillStyle = bullet.color || '#ffd54f';
          ctx.shadowColor = bullet.color || '#ffd54f';
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }

        // Tower placement preview
        // (handled by click events)
      }

      // ---------- Helper Functions ----------
      function darkenColor(color, amount) {
        let r = parseInt(color.slice(1, 3), 16);
        let g = parseInt(color.slice(3, 5), 16);
        let b = parseInt(color.slice(5, 7), 16);
        r = Math.max(0, r - amount);
        g = Math.max(0, g - amount);
        b = Math.max(0, b - amount);
        return `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
      }

      function updateUI() {
        goldDisplay.textContent = Math.floor(gold);
        livesDisplay.textContent = lives;
        waveDisplay.textContent = wave;
        scoreDisplay.textContent = score;
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Game Loop ----------
      function gameLoopFunction() {
        frameCount++;
        
        updateTowers();
        updateBullets();
        updateEnemies();
        updateWave();
        draw();
        
        if (gameLoop) {
          requestAnimationFrame(gameLoopFunction);
        }
      }

      function startLoop() {
        if (gameLoop) cancelAnimationFrame(gameLoop);
        gameLoop = requestAnimationFrame(gameLoopFunction);
      }

      function stopLoop() {
        if (gameLoop) {
          cancelAnimationFrame(gameLoop);
          gameLoop = null;
        }
      }

      // ---------- Game Control ----------
      function endGame() {
        stopLoop();
        setGameStatus(`💀 Game Over! Score: ${score}`, false);
        startBtn.disabled = true;
        startBtn.textContent = '💀 Game Over';
        updateUI();
        draw();
      }

      function resetGame() {
        stopLoop();
        gold = 100;
        lives = 20;
        wave = 0;
        score = 0;
        enemies = [];
        towers = [];
        bullets = [];
        waveActive = false;
        totalEnemiesSpawned = 0;
        enemiesKilled = 0;
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Wave';
        setGameStatus('🔄 Game reset. Build towers and start a wave!', true);
        updateUI();
        draw();
        startLoop();
      }

      function toggleSpeed() {
        const speeds = [1, 2, 3];
        const idx = speeds.indexOf(gameSpeed);
        gameSpeed = speeds[(idx + 1) % speeds.length];
        speedBtn.textContent = `⏩ ${gameSpeed}x`;
      }

      // ---------- Event Handlers ----------
      canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = (e.clientX - rect.left) * scaleX;
        const y = (e.clientY - rect.top) * scaleY;

        // Check if clicking on existing tower
        for (let i = 0; i < towers.length; i++) {
          const tower = towers[i];
          const dx = tower.x - x;
          const dy = tower.y - y;
          if (dx * dx + dy * dy < 20 * 20) {
            selectedTowerIndex = i;
            const type = TOWER_TYPES[tower.type];
            towerInfo.innerHTML = `
              <strong>${type.name}</strong> Lv${tower.level} |
              Damage: ${type.damage * tower.level} |
              Range: ${type.range} |
              <button class="upgrade-btn" data-index="${i}">⬆️ Upgrade (${type.upgradeCost * tower.level}g)</button>
            `;
            // Add upgrade listener
            const upgradeBtn = towerInfo.querySelector('.upgrade-btn');
            if (upgradeBtn) {
              upgradeBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                upgradeTower(parseInt(e.target.dataset.index));
                towerInfo.innerHTML = `<span>✅ Upgraded!</span>`;
                setTimeout(() => {
                  towerInfo.innerHTML = `<span>Select a tower type</span>`;
                }, 1000);
              });
            }
            return;
          }
        }

        // Place tower if not clicking on tower
        if (selectedTower) {
          if (placeTower(x, y)) {
            // Success
          }
          selectedTowerIndex = -1;
          towerInfo.innerHTML = `<span>Select a tower type</span>`;
        }
      });

      // Tower buttons
      document.querySelectorAll('.tower-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedTower = btn.dataset.tower;
          const type = TOWER_TYPES[selectedTower];
          towerInfo.innerHTML = `<span>${type.name} tower selected. Click path to build!</span>`;
          setGameStatus(`🗼 ${type.name} tower selected. Click on the path to build.`, true);
          // Highlight selected
          document.querySelectorAll('.tower-btn').forEach(b => b.style.borderColor = '#2a4050');
          btn.style.borderColor = '#4fc3f7';
        });
      });

      // Controls
      startBtn.addEventListener('click', startWave);
      resetBtn.addEventListener('click', resetGame);
      speedBtn.addEventListener('click', toggleSpeed);

      // Keyboard
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          if (!waveActive) startWave();
        }
        if (e.key === 'r' || e.key === 'R') resetGame();
        if (e.key === 's' || e.key === 'S') toggleSpeed();
        if (e.key >= '1' && e.key <= '4') {
          const btns = document.querySelectorAll('.tower-btn');
          if (btns[e.key - 1]) btns[e.key - 1].click();
        }
      });

      // ---------- Init ----------
      function init() {
        updateUI();
        setGameStatus('🏰 Select a tower and click the path to build!', true);
        startLoop();
        draw();
      }

      init();
    })();
  </script>
</body>
</html>
