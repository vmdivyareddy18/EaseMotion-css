<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto-Complete Search - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ac-wrapper">
    <h1>Auto-Complete Search</h1>
    <p class="ac-sub">Type to filter programming languages</p>
    <div class="ac-search-box">
      <input type="text" class="ac-input" id="searchInput" placeholder="e.g. JavaScript, Python..." autocomplete="off">
      <ul class="ac-dropdown" id="suggestionsList"></ul>
    </div>
    <p class="ac-selected" id="selectedDisplay">Selected: <span id="selectedValue">—</span></p>
    <p class="ac-hint">Use ↑↓ arrows to navigate, Enter to select, Esc to close</p>
  </div>

  <script>
    const languages = [
      'JavaScript', 'TypeScript', 'Python', 'Java', 'C#', 'C++', 'C',
      'Go', 'Rust', 'Kotlin', 'Swift', 'Ruby', 'PHP', 'Perl',
      'Scala', 'Dart', 'Elixir', 'Clojure', 'Haskell', 'Lua',
      'R', 'MATLAB', 'SQL', 'HTML', 'CSS', 'Shell', 'PowerShell'
    ];

    const input = document.getElementById('searchInput');
    const list = document.getElementById('suggestionsList');
    const selectedSpan = document.getElementById('selectedValue');
    let selectedIndex = -1;

    function filterSuggestions(query) {
      if (!query.trim()) return [];
      const q = query.toLowerCase();
      return languages.filter(lang => lang.toLowerCase().includes(q));
    }

    function renderDropdown(matches) {
      list.innerHTML = '';
      selectedIndex = -1;
      if (matches.length === 0 || !input.value.trim()) {
        list.style.display = 'none';
        return;
      }
      list.style.display = 'block';
      matches.forEach((lang, i) => {
        const li = document.createElement('li');
        li.textContent = lang;
        li.classList.add('ac-item');
        li.dataset.index = i;
        li.addEventListener('click', () => selectItem(lang));
        li.addEventListener('mouseenter', () => {
          selectedIndex = i;
          updateHighlight(matches.length);
        });
        list.appendChild(li);
      });
    }

    function selectItem(lang) {
      input.value = lang;
      selectedSpan.textContent = lang;
      list.style.display = 'none';
      selectedIndex = -1;
    }

    function updateHighlight(count) {
      document.querySelectorAll('.ac-item').forEach((el, i) => {
        el.classList.toggle('highlight', i === selectedIndex);
      });
      if (selectedIndex >= 0 && selectedIndex < count) {
        const el = document.querySelectorAll('.ac-item')[selectedIndex];
        if (el) el.scrollIntoView({ block: 'nearest' });
      }
    }

    input.addEventListener('input', () => {
      const matches = filterSuggestions(input.value);
      renderDropdown(matches);
    });

    input.addEventListener('keydown', (e) => {
      const items = document.querySelectorAll('.ac-item');
      const count = items.length;
      if (count === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = (selectedIndex + 1) % count;
        updateHighlight(count);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = (selectedIndex - 1 + count) % count;
        updateHighlight(count);
      } else if (e.key === 'Enter' && selectedIndex >= 0) {
        e.preventDefault();
        selectItem(items[selectedIndex].textContent);
      } else if (e.key === 'Escape') {
        list.style.display = 'none';
        selectedIndex = -1;
      }
    });

    input.addEventListener('blur', () => {
      setTimeout(() => { list.style.display = 'none'; }, 150);
    });

    input.addEventListener('focus', () => {
      if (input.value.trim()) {
        const matches = filterSuggestions(input.value);
        renderDropdown(matches);
      }
    });
  </script>
</body>
</html>
