<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Tech Zoom-In Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="hero">

        <span class="badge">Minimal Tech</span>

        <h1>Developer Workspace</h1>

        <p>
            Hover over each quick action to reveal a smooth Zoom-In tooltip.
            Built using only HTML and CSS with keyboard accessibility.
        </p>

        <div class="toolbar">

            <button class="tool-btn">

                <span>🚀 Deploy</span>

                <span class="tooltip">
                    Publish your latest production build.
                </span>

            </button>

            <button class="tool-btn">

                <span>🧪 Test</span>

                <span class="tooltip">
                    Run automated test suites instantly.
                </span>

            </button>

            <button class="tool-btn">

                <span>📦 Packages</span>

                <span class="tooltip">
                    Manage project dependencies.
                </span>

            </button>

            <button class="tool-btn">

                <span>⚙ Settings</span>

                <span class="tooltip">
                    Configure workspace preferences.
                </span>

            </button>

        </div>

    </section>

</div>

</body>
</html>
