<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Token Permission Scope Chips</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>API Token</h1>

        <p class="subtitle">
            Configure permission scopes assigned to this access token.
        </p>

        <div class="chip-group">

            <span class="chip read">
                Read
            </span>

            <span class="chip write">
                Write
            </span>

            <span class="chip admin">
                Admin
            </span>

            <span class="chip billing">
                Billing
            </span>

            <span class="chip analytics">
                Analytics
            </span>

            <span class="chip webhook">
                Webhooks
            </span>

        </div>

        <div class="footer">

            <span class="status">
                Active Token
            </span>

            <button>
                Edit Permissions
            </button>

        </div>

    </div>

</div>

</body>
</html>
