<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-progress-segmented - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-progress-segmented</h1>
    <p class="description">Segmented step progress bar with animated fill and active pulse.</p>

    <div class="ease-progress-segmented" id="progressBar">
      <div class="segment filled" data-step="0"></div>
      <div class="segment filled" data-step="1"></div>
      <div class="segment active" data-step="2"></div>
      <div class="segment" data-step="3"></div>
      <div class="segment" data-step="4"></div>
    </div>

    <div class="step-labels" id="stepLabels">
      <span class="done">Cart</span>
      <span class="done">Details</span>
      <span class="active">Payment</span>
      <span>Review</span>
      <span>Done</span>
    </div>

    <div class="progress-controls">
      <button id="prevBtn" disabled onclick="prevStep()">Previous</button>
      <span id="stepIndicator" style="color:var(--text-secondary);font-size:0.85rem;">Step 3 of 5</span>
      <button id="nextBtn" onclick="nextStep()">Next</button>
    </div>
  </div>

  <script>
    let currentStep = 2;
    const totalSteps = 5;

    function updateProgress() {
      const segments = document.querySelectorAll('.segment');
      const labels = document.querySelectorAll('.step-labels span');

      segments.forEach((seg, i) => {
        seg.classList.remove('filled', 'active');
        labels[i].classList.remove('done', 'active');

        if (i < currentStep) {
          seg.classList.add('filled');
          labels[i].classList.add('done');
        } else if (i === currentStep) {
          seg.classList.add('active');
          labels[i].classList.add('active');
        }
      });

      document.getElementById('stepIndicator').textContent = `Step ${currentStep + 1} of ${totalSteps}`;
      document.getElementById('prevBtn').disabled = currentStep === 0;
      document.getElementById('nextBtn').disabled = currentStep === totalSteps - 1;
    }

    function nextStep() {
      if (currentStep < totalSteps - 1) {
        currentStep++;
        updateProgress();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        updateProgress();
      }
    }
  </script>
</body>
</html>
