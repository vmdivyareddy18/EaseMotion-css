<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Floating Chatbot - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Mock Page Content -->
  <main class="mock-page">
    <div class="mock-content">
      <h1>Welcome to Our Store</h1>
      <p>Click the chat icon in the bottom right corner to open the animated support widget.</p>
    </div>
  </main>

  <!-- Floating Action Button -->
  <button class="chat-fab ease-pulse" id="chat-fab" aria-label="Open chat">
    <span class="fab-icon">💬</span>
    <span class="fab-badge">1</span>
  </button>

  <!-- Chat Widget Window -->
  <div class="chat-widget" id="chat-widget">
    
    <!-- Chat Header -->
    <div class="chat-header">
      <div class="header-info">
        <div class="bot-avatar">🤖</div>
        <div class="header-text">
          <h4>Support Bot</h4>
          <span class="status">● Typically replies in minutes</span>
        </div>
      </div>
      <button class="close-btn ease-hover-grow" id="close-chat" aria-label="Close chat">×</button>
    </div>

    <!-- Chat Body -->
    <div class="chat-body" id="chat-body">
      
      <!-- Bot Message -->
      <div class="message bot-msg ease-fade-in-up ease-delay-100">
        <div class="msg-avatar">🤖</div>
        <div class="msg-bubble">
          <p>Hi there! 👋 Welcome to our store. How can I help you today?</p>
          <span class="msg-time">10:00 AM</span>
        </div>
      </div>

      <!-- Quick Replies -->
      <div class="quick-replies-wrapper ease-fade-in-up ease-delay-300">
        <div class="quick-replies">
          <button class="quick-reply ease-bounce-in ease-delay-400 ease-hover-grow">📦 Track Order</button>
          <button class="quick-reply ease-bounce-in ease-delay-500 ease-hover-grow">↩️ Return Policy</button>
          <button class="quick-reply ease-bounce-in ease-delay-600 ease-hover-grow">👤 Talk to Human</button>
        </div>
      </div>

    </div>

    <!-- Chat Footer -->
    <div class="chat-footer">
      <input type="text" placeholder="Type your message..." class="chat-input" id="chat-input">
      <button class="send-btn ease-hover-grow" id="send-btn" aria-label="Send message">➤</button>
    </div>

  </div>

  <!-- JavaScript for Chat Widget Functionality -->
  <script>
    const fab = document.getElementById('chat-fab');
    const chatWidget = document.getElementById('chat-widget');
    const closeBtn = document.getElementById('close-chat');
    const sendBtn = document.getElementById('send-btn');
    const chatInput = document.getElementById('chat-input');
    const chatBody = document.getElementById('chat-body');

    // Open Chat
    fab.addEventListener('click', () => {
      chatWidget.classList.add('active');
      fab.classList.add('hidden');
      // Hide the notification badge once opened
      const badge = fab.querySelector('.fab-badge');
      if (badge) badge.style.display = 'none';
    });

    // Close Chat
    closeBtn.addEventListener('click', () => {
      chatWidget.classList.remove('active');
      setTimeout(() => {
        fab.classList.remove('hidden');
      }, 300);
    });

    // Send Message Simulation
    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // Add user message
      const userMsg = document.createElement('div');
      userMsg.className = 'message user-msg ease-fade-in-up';
      userMsg.innerHTML = `
        <div class="msg-bubble">
          <p>${text}</p>
          <span class="msg-time">Just now</span>
        </div>
      `;
      chatBody.appendChild(userMsg);
      chatInput.value = '';
      chatBody.scrollTop = chatBody.scrollHeight;

      // Simulate bot reply
      setTimeout(() => {
        const botMsg = document.createElement('div');
        botMsg.className = 'message bot-msg ease-fade-in-up';
        botMsg.innerHTML = `
          <div class="msg-avatar">🤖</div>
          <div class="msg-bubble">
            <p>Thanks for your message! A human agent will be with you shortly. 🚀</p>
            <span class="msg-time">Just now</span>
          </div>
        `;
        chatBody.appendChild(botMsg);
        chatBody.scrollTop = chatBody.scrollHeight;
      }, 1000);
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // Quick reply clicks
    document.querySelectorAll('.quick-reply').forEach(btn => {
      btn.addEventListener('click', () => {
        chatInput.value = btn.textContent.replace(/^[^\w\s]+/, '').trim();
        sendMessage();
        // Hide quick replies after selection
        btn.closest('.quick-replies-wrapper').style.display = 'none';
      });
    });
  </script>
</body>
</html>
