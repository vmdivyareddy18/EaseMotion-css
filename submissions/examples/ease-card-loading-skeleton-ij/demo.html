<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card Loading Skeleton</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Card Loading Skeleton</h1>
  <div class="cls-card" id="card">
    <div class="cls-image"></div>
    <div class="cls-title"></div>
    <div class="cls-text"></div>
    <div class="cls-text cls-text--short"></div>
  </div>
  <button class="cls-btn" id="toggleBtn">Toggle Loaded</button>
  <script>
    (function() {
      const card = document.getElementById('card');
      const btn = document.getElementById('toggleBtn');
      let loaded = false;
      btn.addEventListener('click', function() {
        loaded = !loaded;
        btn.textContent = loaded ? 'Toggle Loading' : 'Toggle Loaded';
        if (loaded) {
          card.classList.add('cls-loaded');
        } else {
          card.classList.remove('cls-loaded');
        }
      });
    })();
  </script>
</body>
</html>
