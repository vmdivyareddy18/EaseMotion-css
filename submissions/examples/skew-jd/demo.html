<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Skew Hover State Example</title>
    <link rel="stylesheet" href="../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>EaseMotion CSS</h1>
            <p>Skew Hover State Example</p>
        </header>

        <main>
            <section class="demo-section">
                <h2>Interactive Elements</h2>
                <div class="card-grid">
                    <button class="skew-button">
                        Hover Me
                    </button>
                    
                    <div class="skew-card">
                        <h3>Skew Card</h3>
                        <p>This card skews when you hover over it, creating a dynamic effect.</p>
                    </div>

                    <div class="skew-image-container">
                        <img src="https://via.placeholder.com/300x200" alt="Placeholder" class="skew-image">
                    </div>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Built with <a href="https://github.com/Daksh7785/EaseMotion-css">EaseMotion CSS</a></p>
        </footer>
    </div>
</body>
</html>
