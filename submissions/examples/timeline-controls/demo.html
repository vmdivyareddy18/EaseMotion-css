<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Timeline Controls — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 2rem; gap: 1.5rem; background: #f9fafb; }
    .box { width: 80px; height: 80px; background: #6c63ff; border-radius: 12px; animation: spin 1.5s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls { display: flex; gap: 0.75rem; }
    button { padding: 0.5rem 1rem; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; background: #6c63ff; color: white; }
  </style>
</head>
<body>
  <h2>Timeline Controls Demo</h2>

  <div class="box" id="animBox"></div>

  <div class="controls">
    <button onclick="document.getElementById('animBox').classList.add('anim-pause'); document.getElementById('animBox').classList.remove('anim-resume')">
      ⏸ Pause
    </button>
    <button onclick="document.getElementById('animBox').classList.add('anim-resume'); document.getElementById('animBox').classList.remove('anim-pause')">
      ▶️ Resume
    </button>
    <button onclick="document.getElementById('animBox').classList.toggle('anim-reverse')">
      🔄 Reverse
    </button>
  </div>
</body>
</html>
