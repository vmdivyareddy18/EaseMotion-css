<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fountain</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="fountain">
      <span class="spray"></span>
      <span class="jet jt1"></span>
      <span class="jet jt2"></span>
      <span class="jet jt3"></span>
      <span class="jet jt4"></span>
      <span class="jet jt5"></span>
      <span class="jet jt6"></span>
      <span class="jet jt7"></span>
      <span class="jet jt8"></span>
      <span class="nozzle"></span>
      <span class="column"></span>
      <div class="upper">
        <span class="bowlwater"></span>
      </div>
      <span class="stem"></span>
      <div class="basin">
        <span class="pool"></span>
        <span class="ripplef rf1"></span>
        <span class="ripplef rf2"></span>
      </div>
    </div>
  </div>
</body>
</html>
