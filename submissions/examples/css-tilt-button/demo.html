<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Tilt Hover Button - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0f172a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    h1 {
      color: #f8fafc;
      margin-bottom: 8px;
      font-weight: 500;
    }
    p {
      color: #94a3b8;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>

  <h1>Creative Portfolio Layout Components</h1>
  <p>Hover over the component below to experience zero-JS micro-interactions.</p>

  <div class="tilt-btn-wrapper">
    <div class="grid-zone zone-tl"></div>
    <div class="grid-zone zone-tm"></div>
    <div class="grid-zone zone-tr"></div>
    <div class="grid-zone zone-ml"></div>
    <div class="grid-zone zone-mm"></div>
    <div class="grid-zone zone-mr"></div>
    <div class="grid-zone zone-bl"></div>
    <div class="grid-zone zone-bm"></div>
    <div class="grid-zone zone-br"></div>
    
    <button class="tilt-btn" aria-label="View Creative Portfolio Projects">
      <span>View Work</span>
    </button>
  </div>

</body>
</html>
