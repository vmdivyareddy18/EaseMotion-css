<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Segmented Control Sliding Indicator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Segmented Control</h1>

        <p>
            Modern segmented navigation with animated sliding indicator.
        </p>

        <div class="segmented-control">

            <div class="slider"></div>

            <button class="segment active">
                Overview
            </button>

            <button class="segment">
                Analytics
            </button>

            <button class="segment">
                Reports
            </button>

        </div>

    </div>

    <div class="card">

        <h2>Theme Selector</h2>

        <div class="segmented-control compact">

            <div class="slider second"></div>

            <button class="segment">
                Light
            </button>

            <button class="segment active">
                System
            </button>

            <button class="segment">
                Dark
            </button>

        </div>

    </div>

</div>

</body>
</html>
