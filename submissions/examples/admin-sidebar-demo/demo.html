<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Sidebar Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<aside id="sidebar" class="sidebar ease-slide-up">

<h2>EaseMotion</h2>

<ul>

<li><a href="#">🏠 Dashboard</a></li>

<li><a href="#">👤 Users</a></li>

<li><a href="#">📦 Products</a></li>

<li><a href="#">📈 Reports</a></li>

<li><a href="#">⚙ Settings</a></li>

</ul>

</aside>

<div class="main">

<header class="header ease-fade-in">

<button id="toggleBtn">
☰
</button>

<h1>Admin Dashboard</h1>

</header>

<div class="cards">

<div class="card ease-slide-up">

<h2>Users</h2>

<p>2,458</p>

</div>

<div class="card ease-slide-up">

<h2>Orders</h2>

<p>542</p>

</div>

<div class="card ease-slide-up">

<h2>Revenue</h2>

<p>$25,430</p>

</div>

<div class="card ease-slide-up">

<h2>Products</h2>

<p>315</p>

</div>

</div>

</div>

</div>

<script>

const sidebar=document.getElementById("sidebar");

document.getElementById("toggleBtn").onclick=()=>{

sidebar.classList.toggle("hide");

};

</script>

</body>
</html>
