<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Spiral Product Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="page-title">Spiral Product Card</h1>

    <div class="spiral-product-card ease-fade-in">

        <div class="spiral-ring"></div>
        <div class="spiral-ring ring-two"></div>

        <div class="product-image">
            <img
                src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80"
                alt="Running Shoes">
        </div>

        <div class="product-content">

            <span class="category">Running Collection</span>

            <h2>Velocity Runner X</h2>

            <p>
                Lightweight performance shoes designed for speed, comfort,
                and everyday adventures.
            </p>

            <div class="rating">
                ★★★★★
                <span>(4.9)</span>
            </div>

            <div class="price-row">

                <div class="price">
                    <span class="old-price">$149</span>
                    <span class="new-price">$119</span>
                </div>

                <button class="buy-btn">
                    Buy Now
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
