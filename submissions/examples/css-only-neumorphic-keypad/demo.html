<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-only Neumorphic Keypad | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: #e0e5ec;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Outfit', sans-serif;
      overflow-x: hidden;
    }

    .demo-wrapper {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      color: #4a5568;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px #a3b1c6, -2px -2px 4px #ffffff;
    }

    .subtitle {
      color: #718096;
      font-size: 1.1rem;
      font-weight: 400;
    }

    .keypad-wrapper {
      padding: 1rem;
    }
    
    /* Simulate a screen above the keypad */
    .neu-screen {
      width: 100%;
      height: 60px;
      margin-bottom: 2rem;
      border-radius: 1rem;
      background-color: #e0e5ec;
      box-shadow: 
        inset 5px 5px 10px #a3b1c6, 
        inset -5px -5px 10px #ffffff;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 0 1.5rem;
      box-sizing: border-box;
      color: #4a5568;
      font-size: 1.8rem;
      font-weight: 600;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <h1>Neumorphic Keypad</h1>
    <p class="subtitle">Experience realistic 3D soft-UI physical press effects entirely in CSS.</p>
  </div>

  <div class="keypad-wrapper">
    <div class="ease-neu-keypad">
      
      <!-- Fake Screen Output -->
      <div style="grid-column: span 3;">
        <div class="neu-screen">****</div>
      </div>

      <!-- Row 1 -->
      <button class="ease-neu-btn" data-letters="">1</button>
      <button class="ease-neu-btn" data-letters="ABC">2</button>
      <button class="ease-neu-btn" data-letters="DEF">3</button>

      <!-- Row 2 -->
      <button class="ease-neu-btn" data-letters="GHI">4</button>
      <button class="ease-neu-btn" data-letters="JKL">5</button>
      <button class="ease-neu-btn" data-letters="MNO">6</button>

      <!-- Row 3 -->
      <button class="ease-neu-btn" data-letters="PQRS">7</button>
      <button class="ease-neu-btn" data-letters="TUV">8</button>
      <button class="ease-neu-btn" data-letters="WXYZ">9</button>

      <!-- Row 4 -->
      <button class="ease-neu-btn ease-neu-btn-special" data-letters="CLR">✕</button>
      <button class="ease-neu-btn" data-letters="+">0</button>
      <button class="ease-neu-btn ease-neu-btn-primary" data-letters="ENT">OK</button>

    </div>
  </div>

</body>
</html>
