<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stroke Dasharray Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>SVG Stroke Drawing Animation</h1>
  <p><code>stroke-dasharray</code> and <code>stroke-dashoffset</code> animate the appearance of SVG paths being drawn in real time.</p>

  <section class="demo-grid">
    <div class="draw-card">
      <h2>Signature Draw</h2>
      <svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">
        <path class="draw-path sig" d="M20 80 Q 40 40, 60 60 T 100 40 T 140 70 T 180 30 T 220 60 T 260 40 L 280 50"
              fill="none" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="draw-card">
      <h2>Spiral</h2>
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path class="draw-path spiral" d="M100 100
               A 20 20 0 0 1 120 80
               A 40 40 0 0 1 80 120
               A 60 60 0 0 1 140 60
               A 80 80 0 0 1 60 140
               A 90 90 0 0 1 150 50"
              fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" />
      </svg>
    </div>
  </section>

  <section class="progress-section">
    <h2>Progress Ring</h2>
    <div class="progress-ring">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#1e293b" stroke-width="8" />
        <circle class="progress-circle" cx="60" cy="60" r="50" fill="none" stroke="#38bdf8" stroke-width="8"
                stroke-linecap="round" stroke-dasharray="314" stroke-dashoffset="314" transform="rotate(-90 60 60)" />
      </svg>
      <div class="progress-text">75%</div>
    </div>
  </section>

  <section class="shapes-section">
    <h2>Geometric Shapes</h2>
    <div class="shapes-row">
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <rect class="draw-shape" x="10" y="10" width="100" height="100" rx="8"
              fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="400" stroke-dashoffset="400" />
      </svg>
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <polygon class="draw-shape" points="60,10 110,90 10,90"
                 fill="none" stroke="#a855f7" stroke-width="3" stroke-dasharray="300" stroke-dashoffset="300" stroke-linejoin="round" />
      </svg>
      <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <circle class="draw-shape" cx="60" cy="60" r="45"
                fill="none" stroke="#ec4899" stroke-width="3" stroke-dasharray="283" stroke-dashoffset="283" />
      </svg>
    </div>
  </section>

  <section class="checkmark-section">
    <h2>Animated Checkmark</h2>
    <svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
      <circle class="check-bg" cx="60" cy="60" r="50" fill="none" stroke="#1e293b" stroke-width="6" />
      <circle class="check-ring" cx="60" cy="60" r="50" fill="none" stroke="#22c55e" stroke-width="6"
              stroke-dasharray="314" stroke-dashoffset="314" transform="rotate(-90 60 60)" />
      <path class="check-mark" d="M 40 60 L 55 75 L 80 45"
            fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="80" stroke-dashoffset="80" />
    </svg>
  </section>
</body>
</html>
