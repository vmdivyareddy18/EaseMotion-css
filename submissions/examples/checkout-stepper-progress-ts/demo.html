<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout Stepper Progress Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Checkout flow</p>
      <h1 id="demo-title">Checkout stepper progress</h1>
      <p>A progress stepper for checkout flows with completed, active, and upcoming states.</p>
    </section>
    <section class="demo-stage" aria-label="Checkout Stepper Progress Example">
      <ol class="checkout-stepper"><li class="is-complete"><span>1</span>Cart</li><li class="is-active"><span>2</span>Shipping</li><li><span>3</span>Payment</li><li><span>4</span>Review</li></ol>
    </section>
  </main>
</body>
</html>
