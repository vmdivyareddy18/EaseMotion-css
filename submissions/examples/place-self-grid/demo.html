<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>place-self — Grid Item Alignment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="hero">
    <h1><code>place-self</code> Shorthand</h1>
    <p>Override <code>align-items</code> / <code>justify-items</code> per grid item</p>
  </header>
  <main>
    <section class="demo-card">
      <h2>place-self: center</h2>
      <div class="grid-container center-all">
        <div class="grid-item">A</div>
        <div class="grid-item">B</div>
        <div class="grid-item">C</div>
        <div class="grid-item">D</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>Mixed Alignment</h2>
      <div class="grid-container mixed">
        <div class="grid-item stretch-self">stretch</div>
        <div class="grid-item center-self">center</div>
        <div class="grid-item end-self">end</div>
        <div class="grid-item start-self">start</div>
      </div>
    </section>
    <section class="demo-card">
      <h2>place-self Combinations</h2>
      <div class="grid-container combos">
        <div class="grid-item cs">center stretch</div>
        <div class="grid-item ec">end center</div>
        <div class="grid-item se">stretch end</div>
        <div class="grid-item ss">start start</div>
      </div>
    </section>
  </main>
  <footer>
    <p><code>place-self</code> sets both <code>align-self</code> and <code>justify-self</code> in one declaration.</p>
  </footer>
</body>
</html>
