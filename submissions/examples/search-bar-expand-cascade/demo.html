<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Bar Expand - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .info-text {
      color: #667eea;
      font-size: 0.875rem;
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Search Bar Expand</h1>
    <p class="subtitle">Animated expandable search bar with focus effects</p>
    
    <div class="search-bar-container">
      <div class="search-bar-item">
        <span class="search-bar-label">Default Size</span>
        <div class="search-bar" id="search-default">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>

      <div class="search-bar-item">
        <span class="search-bar-label">Small Size</span>
        <div class="search-bar search-bar-sm" id="search-sm">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>

      <div class="search-bar-item">
        <span class="search-bar-label">Large Size</span>
        <div class="search-bar search-bar-lg" id="search-lg">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>

      <div class="search-bar-item">
        <span class="search-bar-label">Solid Style</span>
        <div class="search-bar search-bar-solid" id="search-solid">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>

      <div class="search-bar-item">
        <span class="search-bar-label">Glass Style</span>
        <div class="search-bar search-bar-glass" id="search-glass">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>

      <div class="search-bar-item">
        <span class="search-bar-label">Minimal Style</span>
        <div class="search-bar search-bar-minimal" id="search-minimal">
          <input type="text" class="search-bar-input" placeholder="Search..." oninput="handleInput(this)">
          <button class="search-bar-button search-clear" onclick="clearSearch(this)">✕</button>
          <button class="search-bar-button">🔍</button>
        </div>
      </div>
    </div>

    <p class="info-text">Click on the search bar to see it expand, type to show clear button</p>
  </div>

  <script>
    function handleInput(input) {
      const searchBar = input.closest('.search-bar');
      if (input.value.length > 0) {
        searchBar.classList.add('has-value');
      } else {
        searchBar.classList.remove('has-value');
      }
    }

    function clearSearch(button) {
      const searchBar = button.closest('.search-bar');
      const input = searchBar.querySelector('.search-bar-input');
      input.value = '';
      searchBar.classList.remove('has-value');
      input.focus();
    }
  </script>
</body>
</html>
