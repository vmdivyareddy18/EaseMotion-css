<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Cyberpunk Neon Popover demonstrating smooth zoom-in transition in EaseMotion CSS."
    />
    <title>Cyberpunk Neon Zoom-In Popover — EaseMotion CSS</title>
    <link rel="stylesheet" href="../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Demo Scene Styles */
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #070312;
        background-image:
          radial-gradient(
            circle at 50% 50%,
            rgba(108, 99, 255, 0.08),
            transparent 60%
          ),
          linear-gradient(rgba(18, 10, 36, 0.5) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 10, 36, 0.5) 1px, transparent 1px);
        background-size:
          100% 100%,
          20px 20px,
          20px 20px;
        color: #8c8fa3;
        font-family: Consolas, Monaco, "Andale Mono", monospace;
        padding: 20px;
        box-sizing: border-box;
      }

      .demo-container {
        text-align: center;
        max-width: 480px;
        width: 100%;
        border: 1px solid rgba(0, 247, 255, 0.15);
        background: rgba(10, 5, 24, 0.7);
        padding: 30px 20px;
        border-radius: 4px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }

      .demo-title {
        font-size: 1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #00f7ff;
        margin-top: 0;
        margin-bottom: 8px;
        text-shadow: 0 0 8px rgba(0, 247, 255, 0.3);
      }

      .demo-desc {
        font-size: 0.75rem;
        line-height: 1.5;
        margin-bottom: 30px;
        color: #8c8fa3;
      }

      .interactive-zone {
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <main class="demo-container">
      <h1 class="demo-title">Terminal Node UI</h1>
      <p class="demo-desc">
        Hover or focus the trigger below to load the encrypted system dossier.
        Use Tab to navigate and interact with the content inside the popover.
      </p>

      <div class="interactive-zone">
        <!-- Accessible Popover Wrapper -->
        <div class="em-cyber-popover-wrapper">
          <button
            class="em-cyber-popover-trigger"
            aria-haspopup="dialog"
            aria-expanded="false"
            id="popover-trigger"
          >
            Access Node 9-B
          </button>

          <!-- Popover dialog container -->
          <div
            class="em-cyber-popover"
            role="dialog"
            aria-labelledby="popover-heading"
            aria-describedby="popover-desc"
          >
            <div class="em-cyber-popover-header">
              <h2 class="em-cyber-popover-title" id="popover-heading">
                Dossier 09-B
              </h2>
              <span class="em-cyber-popover-status">Encrypted</span>
            </div>

            <p class="em-cyber-popover-body" id="popover-desc">
              Grid system detection: anomalous traffic signatures traced to
              remote subnet. Auth tokens compromised.
            </p>

            <!-- Interactive Action Button inside Popover -->
            <button class="em-cyber-popover-btn" type="button">
              Decrypt Stream
            </button>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
