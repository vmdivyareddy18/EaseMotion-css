<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Elevated Card - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Elevated Card</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-card-elevated</code> modifier. Hover to see the
      extra lift.
    </p>

    <div class="ease-card ease-card-elevated">
      <h2>Elevated card</h2>
      <p>This card uses a medium resting shadow and an extra-large
      hover shadow.</p>
    </div>

    <div class="ease-card">
      <h2>Default card</h2>
      <p>For comparison, the default card has only a 1px border.</p>
    </div>

  </div>

</body>
</html>
