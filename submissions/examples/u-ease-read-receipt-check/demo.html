<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-read-receipt-check</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-read-receipt-check</h1>
    <p class="subtitle">
        Message read receipt checkmark animation
    </p>

    <div class="chat-demo">

        <div class="message-card">
            <div class="bubble">
                Message Sending...
            </div>

            <div class="status sending">
                <span class="check">✓</span>
            </div>
        </div>

        <div class="message-card">
            <div class="bubble">
                Message Sent
            </div>

            <div class="status sent">
                <span class="check">✓</span>
            </div>
        </div>

        <div class="message-card">
            <div class="bubble">
                Message Delivered
            </div>

            <div class="status delivered">
                <span class="check">✓</span>
                <span class="check second">✓</span>
            </div>
        </div>

        <div class="message-card">
            <div class="bubble">
                Message Read
            </div>

            <div class="status read">
                <span class="check">✓</span>
                <span class="check second">✓</span>
            </div>
        </div>

    </div>

    <section class="features">
        <div class="feature-card">
            <h3>Sent</h3>
            <p>Single checkmark displayed.</p>
        </div>

        <div class="feature-card">
            <h3>Delivered</h3>
            <p>Second checkmark appears.</p>
        </div>

        <div class="feature-card">
            <h3>Read</h3>
            <p>Checkmarks turn blue.</p>
        </div>
    </section>

    <section class="preview-section">

        <div class="preview-box">
            <div class="mini-message">
                Hi 👋
                <span class="mini-read">✓✓</span>
            </div>
        </div>

        <div class="preview-box">
            <div class="mini-message">
                Animation Demo
                <span class="mini-read animated">✓✓</span>
            </div>
        </div>

    </section>

</div>

</body>
</html>
