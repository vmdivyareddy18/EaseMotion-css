<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated File Upload Dropzone - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Upload Your Files</h1>
      <p>Drag and drop your files here, or click to browse.</p>
    </header>

    <!-- Upload Card -->
    <div class="upload-card ease-zoom-in ease-delay-100">
      
      <!-- Dropzone Area (Simulating 'active' drag-over state) -->
      <div class="dropzone active">
        <div class="upload-icon-wrapper ease-pulse">
          <span class="upload-icon">☁️</span>
        </div>
        <h3>Drag & Drop files here</h3>
        <p>or</p>
        <button class="browse-btn ease-hover-grow">Browse Files</button>
        <p class="file-types">Supported: JPG, PNG, PDF, DOCX (Max 10MB)</p>
      </div>

      <!-- Uploaded Files List -->
      <div class="files-list">
        <h4 class="list-header ease-fade-in-up ease-delay-200">Recent Uploads</h4>
        
        <!-- File 1: Completed -->
        <div class="file-item ease-fade-in-up ease-delay-300">
          <div class="file-info">
            <span class="file-icon">📄</span>
            <div class="file-details">
              <span class="file-name">Project_Proposal.pdf</span>
              <span class="file-size">2.4 MB</span>
            </div>
          </div>
          <div class="file-progress">
            <div class="progress-bar">
              <div class="progress-fill fill-100"></div>
            </div>
          </div>
          <button class="file-action success ease-hover-grow" aria-label="Completed">✓</button>
        </div>

        <!-- File 2: In Progress -->
        <div class="file-item ease-fade-in-up ease-delay-400">
          <div class="file-info">
            <span class="file-icon">🖼️</span>
            <div class="file-details">
              <span class="file-name">Hero_Image.png</span>
              <span class="file-size">1.8 MB</span>
            </div>
          </div>
          <div class="file-progress">
            <div class="progress-bar">
              <div class="progress-fill fill-75"></div>
            </div>
          </div>
          <button class="file-action loading ease-hover-grow" aria-label="Uploading">⟳</button>
        </div>

        <!-- File 3: In Progress -->
        <div class="file-item ease-fade-in-up ease-delay-500">
          <div class="file-info">
            <span class="file-icon">📊</span>
            <div class="file-details">
              <span class="file-name">Q3_Report.docx</span>
              <span class="file-size">850 KB</span>
            </div>
          </div>
          <div class="file-progress">
            <div class="progress-bar">
              <div class="progress-fill fill-40"></div>
            </div>
          </div>
          <button class="file-action loading ease-hover-grow" aria-label="Uploading">⟳</button>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
