<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Font Switcher (Skew Style)</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #e0e5ec;">
  
  <div class="reader-card ease-fade-in-up">
    <!-- Font Switcher Controls -->
    <div class="controls-panel neumorphic">
      <div class="toggle-group">
        <input type="radio" id="font-sans" name="font-style" class="font-toggle" checked>
        <label for="font-sans" class="toggle-btn ease-skew-right">Sans</label>
        
        <input type="radio" id="font-serif" name="font-style" class="font-toggle">
        <label for="font-serif" class="toggle-btn ease-skew-right">Serif</label>
        
        <input type="radio" id="font-mono" name="font-style" class="font-toggle">
        <label for="font-mono" class="toggle-btn ease-skew-right">Mono</label>
      </div>
    </div>
    
    <!-- Content Area that changes font based on CSS siblings -->
    <div class="content-preview neumorphic-inset">
      <h2 class="content-title">Typography Matters</h2>
      <p class="content-body">
        The right font can dramatically alter the perception of your digital product. 
        Use the neumorphic switcher above to watch this text instantly adapt its 
        personality while maintaining an elegant presentation.
      </p>
    </div>
  </div>

</body>
</html>
