<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catapult Theme Picker — EaseMotion CSS</title>
    <meta
      name="description"
      content="A responsive, CSS-only theme picker inspired by social media dashboards and catapult motion."
    />
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="picker-card ease-card ease-card-glass ease-fade-in" aria-labelledby="theme-title">
        <header class="picker-header ease-slide-up">
          <p class="eyebrow">Social Studio</p>
          <h1 id="theme-title">Catapult Theme Picker</h1>
          <p class="lead">
            Switch between calm light, cinematic dark, and adaptive auto themes for every feed.
          </p>
        </header>

        <form class="theme-form ease-slide-up" style="--ease-delay: 140ms">
          <fieldset class="theme-fieldset">
            <legend class="sr-only">Choose a theme</legend>

            <label class="theme-card ease-hover-lift" for="theme-light">
              <input type="radio" id="theme-light" name="theme" value="light" checked />
              <span class="theme-preview light-preview" aria-hidden="true">
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
              </span>
              <span class="theme-copy">
                <span class="theme-name">Light</span>
                <span class="theme-desc">For bright mornings and polished posts.</span>
              </span>
              <span class="selection-dot" aria-hidden="true"></span>
            </label>

            <label class="theme-card ease-hover-lift" for="theme-dark">
              <input type="radio" id="theme-dark" name="theme" value="dark" />
              <span class="theme-preview dark-preview" aria-hidden="true">
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
              </span>
              <span class="theme-copy">
                <span class="theme-name">Dark</span>
                <span class="theme-desc">For late-night creation and cinematic focus.</span>
              </span>
              <span class="selection-dot" aria-hidden="true"></span>
            </label>

            <label class="theme-card ease-hover-lift" for="theme-auto">
              <input type="radio" id="theme-auto" name="theme" value="auto" />
              <span class="theme-preview auto-preview" aria-hidden="true">
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
                <span class="preview-bar"></span>
              </span>
              <span class="theme-copy">
                <span class="theme-name">Auto</span>
                <span class="theme-desc">A balanced setting that shifts with time.</span>
              </span>
              <span class="selection-dot" aria-hidden="true"></span>
            </label>
          </fieldset>

          <div class="actions">
            <button class="ease-btn ease-btn-primary ease-hover-lift" type="button">Apply Theme</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
