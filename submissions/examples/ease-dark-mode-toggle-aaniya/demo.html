<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dark Mode Toggle</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: var(--ease-bg);
      color: var(--ease-text);
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px 20px;
    }

    h1 { font-size: 1.8rem; margin: 0; }
    p  { color: var(--ease-text); opacity: 0.7; margin: 0; }

    .card {
      background: var(--ease-surface);
      border: 1px solid var(--ease-border);
      border-radius: 12px;
      padding: 24px 32px;
      max-width: 400px;
      width: 100%;
    }

    .card h2 { margin: 0 0 8px; font-size: 1.1rem; }
    .card p  { font-size: 0.9rem; }

    nav {
      background: var(--ease-surface);
      border: 1px solid var(--ease-border);
      border-radius: 12px;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 500px;
    }

    nav span { font-weight: bold; font-size: 1.1rem; }
  </style>
</head>
<body>

  <!-- Hidden checkbox -->
  <input type="checkbox" id="ease-dark-toggle" />

  <nav>
    <span>MyApp</span>
    <label class="ease-dark-toggle-label" for="ease-dark-toggle">
      <div class="ease-toggle-icon-wrap">
        <span class="ease-toggle-icon ease-toggle-sun">☀️</span>
        <span class="ease-toggle-icon ease-toggle-moon">🌙</span>
      </div>
      <div class="ease-toggle-track"></div>
    </label>
  </nav>

  <h1>Dark Mode Toggle</h1>
  <p>Pure CSS — no JavaScript needed</p>

  <div class="card">
    <h2>Card Title</h2>
    <p>This card smoothly transitions between light and dark themes using CSS custom properties and the :has() selector.</p>
  </div>

  <div class="card">
    <h2>Another Card</h2>
    <p>All colors transition simultaneously with a smooth 0.4s ease animation.</p>
  </div>

</body>
</html>
