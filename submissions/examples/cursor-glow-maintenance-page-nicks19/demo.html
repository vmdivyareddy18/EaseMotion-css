<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cursor Glow Maintenance Page - Retro Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
    }
  </style>
</head>
<body>

  <!-- Full page retro maintenance wrapper -->
  <div class="ease-maintenance-wrapper">
    
    <!-- The glowing background that animates across the screen -->
    <div class="ease-glow-bg"></div>
    
    <!-- Optional scanlines for retro feel -->
    <div class="ease-scanlines"></div>

    <div class="ease-content-container">
      
      <div class="ease-icon-wrapper">
        <svg class="ease-wrench-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
        </svg>
      </div>

      <h1 class="ease-title">SYSTEM OFFLINE</h1>
      <p class="ease-subtitle">We are currently performing scheduled maintenance.</p>
      
      <div class="ease-status-box">
        <div class="ease-status-row">
          <span>STATUS:</span>
          <span class="ease-highlight">UPGRADING</span>
        </div>
        <div class="ease-status-row">
          <span>ETA:</span>
          <span>45 MINUTES</span>
        </div>
      </div>
      
      <p class="ease-footer">Please check back soon. Thank you for your patience.</p>
    </div>

  </div>

</body>
</html>
