<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guided Breathing Exercise - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="be-wrapper">

    <h1>Breathing Exercise</h1>

    <div class="be-circle-wrap">
      <div class="be-circle" id="breathCircle"></div>
      <div class="be-text" id="breathText">Breathe In</div>
    </div>

    <div class="be-timer" id="breathTimer">--</div>

    <button class="be-btn" id="breathStartBtn">Start</button>

  </div>

  <script>
    const circle = document.getElementById('breathCircle');
    const text = document.getElementById('breathText');
    const timer = document.getElementById('breathTimer');
    const startBtn = document.getElementById('breathStartBtn');

    const PATTERN = [
      { phase: 'Breathe In', duration: 4, scale: 1 },
      { phase: 'Hold', duration: 7, scale: 1 },
      { phase: 'Breathe Out', duration: 8, scale: 0.4 },
    ];

    let isRunning = false;
    let currentPhase = 0;
    let timeInPhase = 0;
    let interval = null;
    let sessionTime = 0;

    function resetBreath() {
      clearInterval(interval);
      isRunning = false;
      currentPhase = 0;
      timeInPhase = 0;
      sessionTime = 0;
      circle.classList.remove('inhale', 'hold', 'exhale');
      circle.style.transform = 'scale(0.4)';
      text.textContent = 'Press Start';
      timer.textContent = '--';
      startBtn.textContent = 'Start';
    }

    function nextPhase() {
      const phase = PATTERN[currentPhase];
      circle.className = 'be-circle';
      if (currentPhase === 0) circle.classList.add('inhale');
      else if (currentPhase === 1) circle.classList.add('hold');
      else circle.classList.add('exhale');

      text.textContent = phase.phase;
      timeInPhase = 0;

      const total = PATTERN.reduce((a, p) => a + p.duration, 0);
      const elapsed = PATTERN.slice(0, currentPhase).reduce((a, p) => a + p.duration, 0) + 1;
    }

    function tick() {
      const phase = PATTERN[currentPhase];
      timeInPhase++;

      const remaining = phase.duration - timeInPhase;
      timer.textContent = remaining + 's';

      sessionTime++;
      const totalSec = sessionTime;

      if (remaining <= 0) {
        currentPhase = (currentPhase + 1) % PATTERN.length;
        if (currentPhase === 0) {
          // new cycle
        }
        nextPhase();
      }
    }

    function startBreath() {
      if (isRunning) { resetBreath(); return; }
      isRunning = true;
      startBtn.textContent = 'Stop';
      sessionTime = 0;
      currentPhase = 0;
      nextPhase();
      interval = setInterval(tick, 1000);
    }

    startBtn.addEventListener('click', startBreath);
    resetBreath();
  </script>

</body>
</html>
