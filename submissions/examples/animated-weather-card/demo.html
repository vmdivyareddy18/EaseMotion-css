<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Weather Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="weather-container">
    <!-- Weather Card -->
    <div class="weather-card ease-zoom-in">
      
      <!-- Weather Animation Area -->
      <div class="weather-animation">
        <!-- Sun -->
        <div class="sun ease-spin-slow">
          <div class="sun-core"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
          <div class="sun-ray"></div>
        </div>
        
        <!-- Clouds -->
        <div class="cloud cloud-1 ease-float"></div>
        <div class="cloud cloud-2 ease-float ease-delay-200"></div>
      </div>

      <!-- Location & Date -->
      <div class="location-section ease-fade-in-up ease-delay-100">
        <h2 class="city">San Francisco</h2>
        <p class="date">Saturday, July 4, 2026</p>
      </div>

      <!-- Temperature -->
      <div class="temperature-section ease-fade-in-up ease-delay-200">
        <span class="temp-value">72°</span>
        <span class="temp-unit">F</span>
        <p class="condition">Partly Cloudy</p>
      </div>

      <!-- Weather Details Grid -->
      <div class="weather-details">
        <div class="detail-item ease-fade-in-up ease-delay-300">
          <span class="detail-icon">💧</span>
          <span class="detail-label">Humidity</span>
          <span class="detail-value">65%</span>
        </div>
        <div class="detail-item ease-fade-in-up ease-delay-400">
          <span class="detail-icon">💨</span>
          <span class="detail-label">Wind</span>
          <span class="detail-value">12 mph</span>
        </div>
        <div class="detail-item ease-fade-in-up ease-delay-500">
          <span class="detail-icon">🌡️</span>
          <span class="detail-label">Feels Like</span>
          <span class="detail-value">74°</span>
        </div>
        <div class="detail-item ease-fade-in-up ease-delay-600">
          <span class="detail-icon">☀️</span>
          <span class="detail-label">UV Index</span>
          <span class="detail-value">6</span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
