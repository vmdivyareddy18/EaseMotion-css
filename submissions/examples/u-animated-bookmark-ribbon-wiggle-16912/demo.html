<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bookmark Ribbon Wiggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Bookmark Ribbon Wiggle</h1>

    <p>
      A playful bookmark ribbon animation for reading lists,
      articles, blogs, and documentation platforms.
    </p>

    <div class="cards">

      <article class="card">
        <button class="bookmark-button">
          <span class="bookmark-ribbon">🔖</span>
        </button>

        <h2>Article Preview</h2>

        <p>
          Hover the bookmark icon to see the wiggle effect.
        </p>
      </article>

      <article class="card">
        <button class="bookmark-button">
          <span class="bookmark-ribbon">🔖</span>
        </button>

        <h2>Reading List</h2>

        <p>
          Great for save, favorite, and bookmark actions.
        </p>
      </article>

    </div>

  </main>

</body>
</html>
