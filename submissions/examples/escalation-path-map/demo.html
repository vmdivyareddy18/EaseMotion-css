<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Escalation Path Map</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="map">
    <section class="panel">
      <p>Incident Response</p>
      <h1>Escalation Path Map</h1>
      <span>Next escalation in 9 minutes</span>
    </section>

    <section class="steps" aria-label="Escalation path">
      <article class="done">
        <strong>L1 Triage</strong>
        <p>Impact confirmed and incident channel opened.</p>
      </article>
      <article class="active">
        <strong>L2 Service Owner</strong>
        <p>Payment callback team is reviewing live traces.</p>
      </article>
      <article>
        <strong>L3 Executive Brief</strong>
        <p>Customer-facing update is drafted for approval.</p>
      </article>
    </section>
  </main>
</body>
</html>
