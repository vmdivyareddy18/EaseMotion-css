<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Floating Label Inputs - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Contact Us</h1>
      <p>Fill out the form below and we'll get back to you shortly.</p>
    </header>

    <!-- Form Card -->
    <div class="form-card ease-fade-in-up ease-delay-100">
      <form class="contact-form" id="contact-form">
        
        <!-- Name Input -->
        <div class="form-group ease-fade-in-up ease-delay-200">
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" id="name" class="form-input" required>
            <label for="name" class="floating-label">Full Name</label>
            <span class="input-border"></span>
          </div>
        </div>

        <!-- Email Input -->
        <div class="form-group ease-fade-in-up ease-delay-300">
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input type="email" id="email" class="form-input" required>
            <label for="email" class="floating-label">Email Address</label>
            <span class="input-border"></span>
          </div>
        </div>

        <!-- Phone Input -->
        <div class="form-group ease-fade-in-up ease-delay-400">
          <div class="input-wrapper">
            <span class="input-icon">📱</span>
            <input type="tel" id="phone" class="form-input">
            <label for="phone" class="floating-label">Phone Number (Optional)</label>
            <span class="input-border"></span>
          </div>
        </div>

        <!-- Subject Select -->
        <div class="form-group ease-fade-in-up ease-delay-500">
          <div class="input-wrapper">
            <span class="input-icon">📋</span>
            <select id="subject" class="form-input form-select" required>
              <option value="" disabled selected></option>
              <option value="general">General Inquiry</option>
              <option value="support">Technical Support</option>
              <option value="sales">Sales Question</option>
              <option value="feedback">Feedback</option>
            </select>
            <label for="subject" class="floating-label">Subject</label>
            <span class="input-border"></span>
          </div>
        </div>

        <!-- Message Textarea -->
        <div class="form-group ease-fade-in-up ease-delay-600">
          <div class="input-wrapper textarea-wrapper">
            <span class="input-icon textarea-icon">💬</span>
            <textarea id="message" class="form-input form-textarea" rows="4" required></textarea>
            <label for="message" class="floating-label">Your Message</label>
            <span class="input-border"></span>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn ease-fade-in-up ease-delay-700 ease-hover-grow">
          <span class="btn-text">Send Message</span>
          <span class="btn-icon">→</span>
        </button>

      </form>

      <!-- Success Message (Hidden by default) -->
      <div class="success-message" id="success-message">
        <div class="success-icon ease-bounce-in">✓</div>
        <h3>Message Sent!</h3>
        <p>Thank you for reaching out. We'll get back to you within 24 hours.</p>
        <button class="reset-btn ease-hover-grow" id="reset-btn">Send Another Message</button>
      </div>

    </div>
  </div>

  <!-- JavaScript for Form Functionality -->
  <script>
    const form = document.getElementById('contact-form');
    const successMessage = document.getElementById('success-message');
    const resetBtn = document.getElementById('reset-btn');

    // Handle form submission
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      // Simulate form submission
      form.style.display = 'none';
      successMessage.classList.add('active');
    });

    // Reset form
    resetBtn.addEventListener('click', () => {
      form.reset();
      form.style.display = 'block';
      successMessage.classList.remove('active');
    });

    // Add active class to inputs with values on page load
    document.querySelectorAll('.form-input').forEach(input => {
      if (input.value) {
        input.parentElement.classList.add('has-value');
      }
      
      // Handle focus
      input.addEventListener('focus', () => {
        input.parentElement.classList.add('focused');
      });
      
      // Handle blur
      input.addEventListener('blur', () => {
        input.parentElement.classList.remove('focused');
        if (input.value) {
          input.parentElement.classList.add('has-value');
        } else {
          input.parentElement.classList.remove('has-value');
        }
      });
      
      // Handle input changes
      input.addEventListener('input', () => {
        if (input.value) {
          input.parentElement.classList.add('has-value');
        } else {
          input.parentElement.classList.remove('has-value');
        }
      });
    });
  </script>
</body>
</html>
