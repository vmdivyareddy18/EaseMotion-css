<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated FAQ Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="faq-container">

    <div class="faq-item">

      <input type="checkbox" id="faq1" class="faq-toggle">

      <label
        for="faq1"
        class="faq-question"
        role="button"
      >
        What is EaseMotion CSS?
        <span class="icon">⌄</span>
      </label>

      <div class="faq-answer" id="faq1-content">
        EaseMotion CSS is an animation-focused CSS library designed
        to provide reusable motion-based UI components and effects.
      </div>

    </div>

    <div class="faq-item">

      <input type="checkbox" id="faq2" class="faq-toggle">

      <label for="faq2" class="faq-question">
        Is this component responsive?
        <span class="icon">⌄</span>
      </label>

      <div class="faq-answer">
        Yes, the accordion layout is fully responsive and adapts
        cleanly across different screen sizes.
      </div>

    </div>

    <div class="faq-item">

      <input type="checkbox" id="faq3" class="faq-toggle">

      <label for="faq3" class="faq-question">
        Does it use JavaScript?
        <span class="icon">⌄</span>
      </label>

      <div class="faq-answer">
        No. The entire accordion interaction is implemented using
        pure HTML and CSS only.
      </div>

    </div>

  </div>

</body>
</html>
