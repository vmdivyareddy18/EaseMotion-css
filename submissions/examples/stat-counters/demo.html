<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stat Counters Grid - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-card">
    <h2 style="margin: 0; font-weight: 800;">Stat Counters Grid</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
      Responsive dashboard telemetry grid counting values dynamically on load.
    </p>

    <!-- Stat counters grid -->
    <div class="ease-stat-grid">
      
      <!-- Box 1 -->
      <div class="ease-stat-box">
        <span class="ease-count-up" style="--ease-count-target: 92;">%</span>
        <span class="ease-stat-label">Performance</span>
      </div>

      <!-- Box 2 -->
      <div class="ease-stat-box">
        <span class="ease-count-up" style="--ease-count-target: 48;">M</span>
        <span class="ease-stat-label">Active Users</span>
      </div>

      <!-- Box 3 -->
      <div class="ease-stat-box">
        <span class="ease-count-up" style="--ease-count-target: 12;">k</span>
        <span class="ease-stat-label">Deployments</span>
      </div>

    </div>
  </div>

</body>
</html>
