<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Star Bounce - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Rating Star Bounce</h1>
    <div class="rsb-stars" id="rsbStars" data-rating="0">
      <span class="rsb-star" data-i="1">&#9733;</span>
      <span class="rsb-star" data-i="2">&#9733;</span>
      <span class="rsb-star" data-i="3">&#9733;</span>
      <span class="rsb-star" data-i="4">&#9733;</span>
      <span class="rsb-star" data-i="5">&#9733;</span>
    </div>
    <p class="rsb-label" id="rsbLabel">Click a star to rate</p>
    <button class="rsb-reset" id="rsbReset">Reset</button>
  </div>
  <script>
    var container = document.getElementById('rsbStars');
    var stars = container.querySelectorAll('.rsb-star');
    var label = document.getElementById('rsbLabel');
    var resetBtn = document.getElementById('rsbReset');

    stars.forEach(function(star) {
      star.addEventListener('click', function() {
        var value = parseInt(this.getAttribute('data-i'));
        container.setAttribute('data-rating', value);

        container.classList.remove('rsb-animate');
        void container.offsetWidth;
        container.classList.add('rsb-animate');

        label.textContent = value + ' of 5 stars';
      });
    });

    resetBtn.addEventListener('click', function() {
      container.setAttribute('data-rating', '0');
      container.classList.remove('rsb-animate');
      label.textContent = 'Click a star to rate';
    });
  </script>
</body>
</html>
