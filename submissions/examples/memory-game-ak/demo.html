<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card Game - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mg-wrapper">

    <h1>Memory Game</h1>

    <div class="mg-stats">
      <span>Moves: <strong id="moveCount">0</strong></span>
      <span>Matches: <strong id="matchCount">0</strong> / 8</span>
    </div>

    <div class="mg-grid" id="gameGrid"></div>

    <div class="mg-message" id="gameMessage"></div>
    <button class="mg-btn" id="restartBtn">Restart</button>

  </div>

  <script>
    const emojis = ['🍎','🍊','🍋','🍇','🍓','🍑','🍒','🥝'];
    const grid = document.getElementById('gameGrid');
    const moveEl = document.getElementById('moveCount');
    const matchEl = document.getElementById('matchCount');
    const msg = document.getElementById('gameMessage');
    const restartBtn = document.getElementById('restartBtn');

    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let lock = false;

    function shuffle(a) {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initGame() {
      const pairs = [...emojis, ...emojis];
      shuffle(pairs);
      cards = pairs;
      flipped = [];
      matched = 0;
      moves = 0;
      lock = false;
      moveEl.textContent = '0';
      matchEl.textContent = '0';
      msg.textContent = '';
      render();
    }

    function render() {
      grid.innerHTML = cards.map((emoji, i) => `
        <div class="mg-card" data-index="${i}">
          <div class="mg-inner">
            <div class="mg-front">?</div>
            <div class="mg-back">${emoji}</div>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.mg-card').forEach(card => {
        card.addEventListener('click', () => flipCard(card));
      });
    }

    function flipCard(card) {
      if (lock) return;
      const idx = parseInt(card.dataset.index);
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
      if (flipped.length >= 2) return;

      card.classList.add('flipped');
      flipped.push(idx);

      if (flipped.length === 2) {
        lock = true;
        moves++;
        moveEl.textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (cards[a] === cards[b]) {
        document.querySelectorAll('.mg-card')[a].classList.add('matched');
        document.querySelectorAll('.mg-card')[b].classList.add('matched');
        matched++;
        matchEl.textContent = matched;
        flipped = [];
        lock = false;
        if (matched === 8) {
          msg.textContent = 'You won in ' + moves + ' moves!';
        }
      } else {
        setTimeout(() => {
          document.querySelectorAll('.mg-card')[a].classList.remove('flipped');
          document.querySelectorAll('.mg-card')[b].classList.remove('flipped');
          flipped = [];
          lock = false;
        }, 800);
      }
    }

    restartBtn.addEventListener('click', initGame);
    initGame();
  </script>

</body>
</html>
