<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>EaseMotion CSS • Zoom Date Picker</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <!-- EaseMotion CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    >

    <!-- Component Styles -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="ease-center">

<main class="demo-container ease-fade-in">

    <header class="demo-header ease-slide-up">
        <h1>📅 Zoom Date Picker</h1>

        <p>
            A neumorphism-inspired date picker featuring a smooth zoom
            interaction built entirely with CSS and EaseMotion utilities.
        </p>
    </header>

    <section
        class="date-card ease-slide-up ease-delay-200"
        aria-labelledby="date-heading"
    >

        <h2 id="date-heading">
            Schedule Your Meeting
        </h2>

        <p class="description">
            Select your preferred appointment date below.
        </p>

        <label class="date-field">

            <span class="field-label">
                Choose Date
            </span>

            <input
                type="date"
                aria-label="Choose appointment date"
            >

        </label>

        <button
            class="ease-btn ease-btn-primary ease-btn-pill ease-hover-grow"
        >
            Confirm Date
        </button>

    </section>

</main>

</body>
</html>
