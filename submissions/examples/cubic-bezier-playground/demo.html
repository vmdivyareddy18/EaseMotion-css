<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cubic Bezier Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Cubic Bezier Playground</h1>
    <p class="subtitle">Interactive demonstration of cubic-bezier() curves and their effect on motion.</p>

    <div class="curve-grid">
      <div class="curve-card" data-curve="0,0,1,1">
        <span class="curve-name">linear</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C25,100 75,0 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0,0,1,1);"></div></div>
      </div>
      <div class="curve-card" data-curve="0.25,0.1,0.25,1">
        <span class="curve-name">ease</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C25,90 75,10 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0.25,0.1,0.25,1);"></div></div>
      </div>
      <div class="curve-card" data-curve="0.42,0,1,1">
        <span class="curve-name">ease-in</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C42,100 100,100 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0.42,0,1,1);"></div></div>
      </div>
      <div class="curve-card" data-curve="0,0,0.58,1">
        <span class="curve-name">ease-out</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C0,0 58,0 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0,0,0.58,1);"></div></div>
      </div>
      <div class="curve-card" data-curve="0.42,0,0.58,1">
        <span class="curve-name">ease-in-out</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C42,100 58,0 100,0" fill="none" stroke="#6366f1" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0.42,0,0.58,1);"></div></div>
      </div>
      <div class="curve-card" data-curve="0.68,-0.55,0.27,1.55">
        <span class="curve-name">custom (bounce)</span>
        <svg viewBox="0 0 100 100" class="curve-svg"><path d="M0,100 C68,155 27,-55 100,0" fill="none" stroke="#f59e0b" stroke-width="2"/></svg>
        <div class="curve-track"><div class="curve-ball" style="--cb: cubic-bezier(0.68,-0.55,0.27,1.55);"></div></div>
      </div>
    </div>

    <div class="controls">
      <label class="control-group">
        <span>Custom: cubic-bezier(</span>
        <input type="text" id="cbInput" value="0.68,-0.55,0.27,1.55" class="cb-input">
        <span>)</span>
      </label>
      <button id="applyBtn" class="btn">Apply & Animate</button>
    </div>

    <div class="custom-preview">
      <h2>Preview</h2>
      <div class="preview-track"><div id="previewBall" class="preview-ball"></div></div>
    </div>
  </main>
  <script>
    const applyBtn = document.getElementById('applyBtn');
    const cbInput = document.getElementById('cbInput');
    const previewBall = document.getElementById('previewBall');

    applyBtn.addEventListener('click', () => {
      previewBall.style.animation = 'none';
      void previewBall.offsetHeight;
      previewBall.style.animationTimingFunction = 'cubic-bezier(' + cbInput.value + ')';
      previewBall.style.animation = 'ballMove 2s ease-in-out forwards';
      previewBall.style.animationTimingFunction = 'cubic-bezier(' + cbInput.value + ')';
    });
  </script>
</body>
</html>
