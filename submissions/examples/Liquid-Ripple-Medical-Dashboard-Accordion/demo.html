<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Ripple Medical Dashboard Accordion</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="accordion">

    <details open>
        <summary>🩺 Patient Overview</summary>
        <div class="content">
            <p>Patient is recovering well with stable vitals and scheduled follow-up in 3 days.</p>
        </div>
    </details>

    <details>
        <summary>💓 Vital Signs</summary>
        <div class="content">
            <p>Heart Rate: 74 BPM • Blood Pressure: 118/76 mmHg • Oxygen: 98%</p>
        </div>
    </details>

    <details>
        <summary>💊 Medications</summary>
        <div class="content">
            <p>Morning: Vitamin D • Afternoon: Antibiotic • Evening: Pain Relief (as prescribed).</p>
        </div>
    </details>

</div>

</body>
</html>
