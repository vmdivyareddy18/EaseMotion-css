<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tilt Navigation Bar - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <!--
    3D Tilt Navigation Bar
    - Each link tilts on hover/focus using a fixed perspective + rotateX/
      rotateY/translateZ transform - a genuine 3D tilt, not a mouse-
      tracked one. True cursor-following tilt needs to read live pointer
      coordinates, which CSS cannot do without JavaScript; this instead
      gives every link a consistent, deliberate "lift toward the light"
      tilt on interaction, which stays fully keyboard-operable since it
      also triggers on :focus-visible.
    - aria-current="page" marks the active item; its indicator pill is
      always present and doesn't depend on JavaScript routing.
  -->
  <nav class="tilt-navbar" aria-label="Primary">
    <div class="tilt-navbar-inner">

      <a href="#" class="tilt-item" aria-current="page">
        <span class="tilt-face">
          <span class="tilt-glow" aria-hidden="true"></span>
          <span class="tilt-label">Home</span>
        </span>
      </a>

      <a href="#" class="tilt-item">
        <span class="tilt-face">
          <span class="tilt-glow" aria-hidden="true"></span>
          <span class="tilt-label">Features</span>
        </span>
      </a>

      <a href="#" class="tilt-item">
        <span class="tilt-face">
          <span class="tilt-glow" aria-hidden="true"></span>
          <span class="tilt-label">Pricing</span>
        </span>
      </a>

      <a href="#" class="tilt-item">
        <span class="tilt-face">
          <span class="tilt-glow" aria-hidden="true"></span>
          <span class="tilt-label">Docs</span>
        </span>
      </a>

      <a href="#" class="tilt-item">
        <span class="tilt-face">
          <span class="tilt-glow" aria-hidden="true"></span>
          <span class="tilt-label">Contact</span>
        </span>
      </a>

    </div>
  </nav>

  <main id="main-content" class="stage">
    <div class="stage-intro">
      <p class="stage-eyebrow">EaseMotion CSS &middot; Component Demo</p>
      <h1 class="stage-title">3D Tilt Navigation Bar</h1>
      <p class="stage-subtitle">
        Hover or tab through the links above to see each one lift with a
        layered 3D tilt, glow, and reflection - built entirely with CSS
        perspective and transforms.
      </p>
    </div>
  </main>

</body>
</html>
