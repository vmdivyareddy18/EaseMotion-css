<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Slide-Up Popover - Marketing Landing Page</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="marketing-viewport">
        <div class="landing-hero-card">
            <div class="hero-content">
                <span class="hero-badge">LIMITED TIME ACCESS</span>
                <h1 class="hero-heading">Supercharge Your Workflow</h1>
                <p class="hero-subtext">Deploy production-ready UI elements in seconds with micro-animation standards.</p>
            </div>
            
            <div class="popover-context-area">
                <div class="popover-wrapper">
                    <button class="popover-trigger-btn" aria-haspopup="true" aria-expanded="false">
                        <span class="btn-label">Unlock Special Reward</span>
                        <svg class="gift-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <polyline points="20 12 20 22 4 22 4 12"/>
                            <rect x="2" y="7" width="20" height="5"/>
                            <line x1="12" y1="22" x2="12" y2="7"/>
                            <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
                            <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
                        </svg>
                    </button>
                    
                    <div class="slide-up-popover-card" role="tooltip">
                        <div class="popover-inner-mesh">
                            <div class="popover-header">
                                <span class="badge-alert">EARLY ACCESS TIER</span>
                                <p class="bonus-title">Free Lifetime Updates</p>
                            </div>
                            <div class="popover-body">
                                <p class="bonus-desc">Secure your layout package today and receive all future component iterations at zero additional cost.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
