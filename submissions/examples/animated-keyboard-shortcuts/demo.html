<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Keyboard Shortcut Keys</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section class="wrapper">

        <h1>Animated Keyboard Shortcut Keys</h1>

        <p>Modern keyboard shortcuts built with pure HTML & CSS.</p>

        <div class="shortcuts">

            <div class="shortcut">
                <kbd>Ctrl</kbd>
                <span>+</span>
                <kbd>C</kbd>
            </div>

            <div class="shortcut">
                <kbd>Ctrl</kbd>
                <span>+</span>
                <kbd>S</kbd>
            </div>

            <div class="shortcut">
                <kbd>Ctrl</kbd>
                <span>+</span>
                <kbd>K</kbd>
            </div>

            <div class="shortcut">
                <kbd>Shift</kbd>
                <span>+</span>
                <kbd>Enter</kbd>
            </div>

            <div class="shortcut">
                <kbd>Cmd</kbd>
                <span>+</span>
                <kbd>P</kbd>
            </div>

            <div class="shortcut">
                <kbd>Esc</kbd>
            </div>

            <div class="shortcut">
                <kbd>Tab</kbd>
            </div>

            <div class="shortcut">
                <kbd>Space</kbd>
            </div>

        </div>

    </section>

</body>

</html>
