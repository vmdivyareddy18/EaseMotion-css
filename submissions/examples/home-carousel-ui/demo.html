<!DOCTYPE html>
<html>
<head>
  <title>Home Carousel UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">
  <img id="slide" src="https://via.placeholder.com/300x200">

  <div class="buttons">
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<script>
let images = [
  "https://via.placeholder.com/300x200",
  "https://via.placeholder.com/300x200/00c853",
  "https://via.placeholder.com/300x200/222"
];

let i = 0;

function next() {
  i = (i + 1) % images.length;
  document.getElementById("slide").src = images[i];
}

function prev() {
  i = (i - 1 + images.length) % images.length;
  document.getElementById("slide").src = images[i];
}
</script>

</body>
</html>
