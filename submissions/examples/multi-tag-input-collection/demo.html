<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Multi-Tag Input Collection - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated Multi-Tag Input</h1>
      <p>A fluid tokenized input wrapper built with optimized transition states for creation entry, duplicate alerts, and deletion exits.</p>
    </header>

    <div class="ease-tag-input-wrapper" id="input-wrapper">
      <span class="ease-tag-chip" data-tag="design">design <button class="ease-tag-chip-remove">×</button></span>
      <span class="ease-tag-chip" data-tag="css">css <button class="ease-tag-chip-remove">×</button></span>
      
      <input type="text" id="tag-input" placeholder="Type and press Enter..." autocomplete="off" />
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('tag-input');
      const wrapper = document.getElementById('input-wrapper');
      
      // Handle setting active styling focus states on wrapper
      input.addEventListener('focus', () => wrapper.classList.add('focused'));
      input.addEventListener('blur', () => wrapper.classList.remove('focused'));

      // Event delegation loop capturing chip removal actions
      wrapper.addEventListener('click', (e) => {
        if (e.target.classList.contains('ease-tag-chip-remove')) {
          const chip = e.target.closest('.ease-tag-chip');
          if (chip) {
            // Apply exit transition styles right before node deletion
            chip.classList.add('ease-tag-chip-exit');
            
            // Clean up DOM node once animation lifecycle completes
            chip.addEventListener('animationend', () => {
              chip.remove();
            });
          }
        }
      });

      // Creation & duplicate alert routing logic
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          const value = input.value.trim().toLowerCase();
          
          if (!value) return;

          // Search current nodes to check for duplicates
          const existingChips = Array.from(wrapper.querySelectorAll('.ease-tag-chip'));
          const duplicateChip = existingChips.find(chip => chip.getAttribute('data-tag') === value);

          if (duplicateChip) {
            // Re-trigger shake pattern cleanly on matching key target
            duplicateChip.classList.remove('ease-tag-duplicate-shake');
            void duplicateChip.offsetWidth; // Force CSS engine reflow calculation
            duplicateChip.classList.add('ease-tag-duplicate-shake');
            
            // Clear inputs immediately to keep loop crisp
            input.value = '';
          } else {
            // Create a fresh tag node element
            const newChip = document.createElement('span');
            newChip.className = 'ease-tag-chip';
            newChip.setAttribute('data-tag', value);
            newChip.innerHTML = `${value} <button class="ease-tag-chip-remove">×</button>`;
            
            // Insert it elegantly right before the inline input block
            wrapper.insertBefore(newChip, input);
            input.value = '';
          }
        }
      });
    });
  </script>
</body>
</html>
