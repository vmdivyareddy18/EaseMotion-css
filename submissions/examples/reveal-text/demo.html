<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-reveal-text Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 3rem; background: #f9f9f9; }
    h1, h2 { font-size: 2.5rem; margin: 1rem 0; }
  </style>
</head>
<body>

  <h1 class="ease-reveal-text ease-reveal-text-primary">EaseMotion CSS</h1>

  <h2 class="ease-reveal-text ease-reveal-text-delay-1">Animation</h2>
  <h2 class="ease-reveal-text ease-reveal-text-delay-2">Made Simple</h2>
  <h2 class="ease-reveal-text ease-reveal-text-delay-3">Zero JS</h2>

  <h2 class="ease-reveal-text ease-reveal-text-left ease-reveal-text-dark">Slide Left</h2>
  <h2 class="ease-reveal-text ease-reveal-text-up">Slide Up</h2>

</body>
</html>
