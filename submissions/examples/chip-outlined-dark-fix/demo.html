<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-chip-outlined Dark Mode Border Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 2rem;
      font-family: sans-serif;
      background: #f4f4f8;
      color: #1e1e2e;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0b1121; color: #cdd6f4; }
    }
    .chip-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .contrast-note {
      font-size: 0.85rem;
      opacity: 0.7;
      max-width: 480px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>ease-chip-outlined — Dark Mode Border Fix</h2>

  <div class="chip-row">
    <span class="ease-chip ease-chip-outlined">Default</span>
    <span class="ease-chip ease-chip-outlined">Tag</span>
    <span class="ease-chip ease-chip-outlined">Filter: Active</span>
  </div>

  <p class="contrast-note">
    Switch your OS to dark mode. Border now uses
    <code>--ease-color-neutral-600 (#475569)</code> against the
    <code>#0b1121</code> surface — contrast ≈ 3.9:1, passing WCAG AA
    for non-text elements (3:1 minimum).
  </p>
</body>
</html>
