<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>High-Performance Audio Wave Visualizer — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #030712;
      color: #f9fafb;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .panel {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      color: #38bdf8;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0.5rem 0 1.5rem 0;
    }
    .display-box {
      display: flex;
      justify-content: center;
      padding: 3rem;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 24px;
    }
  </style>
</head>
<body>

  <div class="panel">
    <div class="badge">// GPU Compositor Wave Simulation Engine</div>
    <h1>Audio Stream Matrix</h1>
    
    <div class="display-box">
      <div class="ease-audio-container">
        <div class="ease-audio-bar"></div>
        <div class="ease-audio-bar"></div>
        <div class="ease-audio-bar"></div>
        <div class="ease-audio-bar"></div>
        <div class="ease-audio-bar"></div>
      </div>
    </div>
  </div>

</body>
</html>
