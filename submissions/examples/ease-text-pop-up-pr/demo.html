<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-text-pop-up Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-text-pop-container highlight-pop-text" style="--ease-word-stagger-delay: 0.12s;">
    <div class="ease-word-mask"><span style="--ease-word-index: 1;">Engineered</span></div>
    <div class="ease-word-mask"><span style="--ease-word-index: 2;">for</span></div>
    <div class="ease-word-mask"><span style="--ease-word-index: 3;">Fluid</span></div>
    <div class="ease-word-mask"><span style="--ease-word-index: 4;">Digital</span></div>
    <div class="ease-word-mask"><span style="--ease-word-index: 5;">Interfaces.</span></div>
  </div>

  <p style="color: #4b5563; margin-top: 1.5rem; font-size: 0.95rem;">
    Each element slides gracefully from an clipping overflow boundary window.
  </p>

</body>
</html>
