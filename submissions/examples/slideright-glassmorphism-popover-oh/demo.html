<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Glassmorphism UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Glassmorphism UI</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Frosted glass slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="glass-btn" aria-label="Profile">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-profile">
            <div class="profile-avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </div>
            <div class="profile-info">
              <h4>Alex Morgan</h4>
              <p>Product Designer</p>
            </div>
          </div>
          <div class="slide-items">
            <a href="#" class="slide-item" style="--delay: 0s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  <polyline points="9,22 9,12 15,12 15,22"/>
                </svg>
              </span>
              <span>Dashboard</span>
            </a>
            <a href="#" class="slide-item" style="--delay: 0.05s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <span>Profile</span>
            </a>
            <a href="#" class="slide-item" style="--delay: 0.1s">
              <span class="item-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </span>
              <span>Settings</span>
            </a>
          </div>
          <div class="slide-footer">
            <a href="#" class="slide-logout">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16,17 21,12 16,7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              Logout
            </a>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Blur</button>
          <div class="slide-popover blur" role="tooltip"><p>Blur animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="slide-popover theme-violet" role="tooltip"><p>Violet glassmorphism</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-blue">Blue</button>
          <div class="slide-popover theme-blue" role="tooltip"><p>Blue glassmorphism</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-pink">Pink</button>
          <div class="slide-popover theme-pink" role="tooltip"><p>Pink glassmorphism</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
