<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Slide-out-Right Toast</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <h1>Toast Notification</h1>
        <p>Wait a few seconds to see the toast notification automatically dismiss itself with a smooth slide-out-right animation.</p>
        
        <!-- Toast Notification Component -->
        <!-- Placed in the DOM directly for demonstration. In a real app, this would be injected. -->
        <div class="toast-container" aria-live="polite">
            <div class="toast" role="status">
                <div class="toast-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <div class="toast-content">
                    <strong>Changes saved</strong>
                    <span>Your document was successfully updated.</span>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
