<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS tag-status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Status Tags</h1>
    <div class="tag-grid">
      <span class="s-tag active">Active</span>
      <span class="s-tag pending">Pending</span>
      <span class="s-tag archived">Archived</span>
      <span class="s-tag blocked">Blocked</span>
      <span class="s-tag resolved">Resolved</span>
    </div>
  </div>
</body>
</html>
