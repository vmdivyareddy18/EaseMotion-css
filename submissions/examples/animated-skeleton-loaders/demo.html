<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skeleton Loaders - EaseMotion CSS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- EaseMotion CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
    
    <!-- Local Custom Styles -->
    <link rel="stylesheet" href="style.css" />
</head>
<body class="ease-center">

    <div class="demo-wrapper ease-fade-in ease-duration-slow">
        <header class="ease-slide-down">
            <h1>Skeleton Loaders</h1>
            <p>Smooth loading states powered by EaseMotion CSS.</p>
        </header>

        <!-- Control Panel -->
        <div class="controls ease-slide-up ease-delay-200">
            <button id="toggleBtn" class="ease-btn ease-btn-primary ease-hover-lift ease-duration-fast" onclick="toggleState()">
                🔄 Simulate Data Load
            </button>
        </div>

        <!-- Card Container -->
        <div class="card-container ease-scale-up ease-delay-300">
            
            <!-- SKELETON STATE (Visible by default) -->
            <div id="skeleton-view" class="skeleton-card">
                <div class="skeleton-avatar ease-pulse"></div>
                <div class="skeleton-line title-line ease-pulse"></div>
                <div class="skeleton-line subtitle-line ease-pulse"></div>
                <div class="skeleton-line body-line-1 ease-pulse"></div>
                <div class="skeleton-line body-line-2 ease-pulse"></div>
                <div class="skeleton-button ease-pulse"></div>
            </div>

            <!-- LOADED STATE (Hidden by default) -->
            <div id="loaded-view" class="loaded-card" style="display: none;">
                <div class="loaded-avatar">👨‍💻</div>
                <h2 class="loaded-title">Arjun Mehta</h2>
                <p class="loaded-subtitle">Senior Frontend Developer</p>
                <p class="loaded-body">Building scalable, accessible, and high-performance web applications with modern CSS and JavaScript frameworks.</p>
                <button class="ease-btn ease-btn-secondary ease-hover-lift">View Profile</button>
            </div>

        </div>
    </div>

    <script>
        let isLoading = true;

        function toggleState() {
            const skeleton = document.getElementById('skeleton-view');
            const loaded = document.getElementById('loaded-view');
            const btn = document.getElementById('toggleBtn');

            if (isLoading) {
                // Transition to Loaded
                skeleton.classList.add('ease-fade-out');
                setTimeout(() => {
                    skeleton.style.display = 'none';
                    skeleton.classList.remove('ease-fade-out');
                    
                    loaded.style.display = 'block';
                    loaded.classList.add('ease-fade-in', 'ease-scale-up');
                }, 300); // Match ease-duration-fast
                btn.innerHTML = "⏳ Simulate Loading";
            } else {
                // Transition back to Skeleton
                loaded.classList.remove('ease-fade-in', 'ease-scale-up');
                loaded.classList.add('ease-fade-out');
                
                setTimeout(() => {
                    loaded.style.display = 'none';
                    loaded.classList.remove('ease-fade-out');
                    
                    skeleton.style.display = 'block';
                    skeleton.classList.add('ease-fade-in');
                }, 300);
                btn.innerHTML = "🔄 Simulate Data Load";
            }
            isLoading = !isLoading;
        }
    </script>
</body>
</html>
