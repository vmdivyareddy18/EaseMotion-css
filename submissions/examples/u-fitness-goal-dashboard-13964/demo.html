<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Goal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Fitness Goal Dashboard</h1>
            <p>Track your workouts and fitness progress.</p>
        </header>

        <section class="stats">
            <div class="card">
                <h3>Daily Steps</h3>
                <p>8,750 👟</p>
            </div>

            <div class="card">
                <h3>Calories Burned</h3>
                <p>540 🔥</p>
            </div>

            <div class="card">
                <h3>Workout Time</h3>
                <p>75 min ⏱️</p>
            </div>
        </section>

        <section class="goals">
            <h2>Fitness Goals</h2>

            <div class="goal">
                <span>Step Goal</span>
                <div class="progress-bar">
                    <div class="progress-fill steps"></div>
                </div>
            </div>

            <div class="goal">
                <span>Calories Goal</span>
                <div class="progress-bar">
                    <div class="progress-fill calories"></div>
                </div>
            </div>

            <div class="goal">
                <span>Workout Goal</span>
                <div class="progress-bar">
                    <div class="progress-fill workout"></div>
                </div>
            </div>
        </section>

        <section class="achievements">
            <h2>Achievements</h2>

            <div class="badge">🏆 Fitness Champion</div>
            <div class="badge">🔥 14 Day Streak</div>
            <div class="badge">⭐ Goal Crusher</div>
        </section>
    </div>
</body>
</html>
