<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS delay utilities map - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to compiled utilities -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">SCSS Map-Driven Delay Tokens</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
      Demonstrating staggered entrance animations using utility classes generated from an SCSS delay token map and loop.
    </p>

    <!-- Cards Grid -->
    <div class="demo-grid" id="cards-container">
      <div class="delay-card ease-delay-100">
        Delay 100ms
      </div>

      <div class="delay-card ease-delay-300">
        Delay 300ms
      </div>

      <div class="delay-card ease-delay-500">
        Delay 500ms
      </div>

      <div class="delay-card ease-delay-1000">
        Delay 1000ms
      </div>
    </div>

    <!-- Replay Trigger -->
    <button class="btn-replay" onclick="replayAnimations();">Replay Animations</button>
  </div>

  <script>
    function replayAnimations() {
      const container = document.getElementById('cards-container');
      const cards = container.innerHTML;
      container.innerHTML = '';
      setTimeout(() => {
        container.innerHTML = cards;
      }, 50);
    }
  </script>
</body>
</html>
