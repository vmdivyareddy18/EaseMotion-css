<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hover Skew Utilities — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 6rem 1rem; margin: 0;">

  <div style="max-width: 900px; margin: 0 auto 3rem auto; text-align: center; font-family: sans-serif;">
    <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.5rem; font-weight: 800;">2D Skew Transformations</h3>
    <p style="margin: 0; color: #64748b; font-size: 0.95rem;">Hover over components to trigger hardware-accelerated geometric slanting.</p>
  </div>

  <div class="ease-skew-showcase-grid">
    
    <div class="ease-interactive-skew-card ease-hover-skew-x-sm" style="border-top: 3px solid #3b82f6;">
      <div class="ease-skew-icon" style="background: #eff6ff;">X</div>
      <p class="ease-skew-label">.ease-hover-skew-x-sm</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(skewX -6°)</span>
    </div>

    <div class="ease-interactive-skew-card ease-hover-skew-x-md" style="border-top: 3px solid #2563eb;">
      <div class="ease-skew-icon" style="background: #dbeaf8; color: #2563eb;">X</div>
      <p class="ease-skew-label">.ease-hover-skew-x-md</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(skewX -12°)</span>
    </div>

    <div class="ease-interactive-skew-card ease-hover-skew-y-sm" style="border-top: 3px solid #8b5cf6;">
      <div class="ease-skew-icon" style="background: #f5f3ff; color: #8b5cf6;">Y</div>
      <p class="ease-skew-label">.ease-hover-skew-y-sm</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(skewY +4°)</span>
    </div>

    <div class="ease-interactive-skew-card ease-hover-skew-y-md" style="border-top: 3px solid #6d28d9;">
      <div class="ease-skew-icon" style="background: #ede9fe; color: #6d28d9;">Y</div>
      <p class="ease-skew-label">.ease-hover-skew-y-md</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(skewY +8°)</span>
    </div>

  </div>

</body>
</html>
