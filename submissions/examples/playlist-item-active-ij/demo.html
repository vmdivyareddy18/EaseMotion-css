<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playlist Item Active - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Now Playing</h1>
    <div class="playlist">
      <div class="playlist-item" data-track="0">
        <div class="pl-eq">
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
        </div>
        <div class="pl-info">
          <div class="pl-title">Midnight Serenade</div>
          <div class="pl-artist">EaseMotion</div>
        </div>
        <span class="pl-dur">3:45</span>
      </div>
      <div class="playlist-item active" data-track="1">
        <div class="pl-eq">
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
        </div>
        <div class="pl-info">
          <div class="pl-title">Electric Dreams</div>
          <div class="pl-artist">EaseMotion</div>
        </div>
        <span class="pl-dur">4:12</span>
      </div>
      <div class="playlist-item" data-track="2">
        <div class="pl-eq">
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
        </div>
        <div class="pl-info">
          <div class="pl-title">Golden Hour</div>
          <div class="pl-artist">EaseMotion</div>
        </div>
        <span class="pl-dur">2:58</span>
      </div>
      <div class="playlist-item" data-track="3">
        <div class="pl-eq">
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
          <span class="eq-bar-inner"></span>
        </div>
        <div class="pl-info">
          <div class="pl-title">Ocean Breeze</div>
          <div class="pl-artist">EaseMotion</div>
        </div>
        <span class="pl-dur">5:01</span>
      </div>
    </div>
    <p class="description">Click a track to make it active. The playing item gets a background highlight transition and animated equalizer bars.</p>
  </div>

  <script>
    document.querySelectorAll('.playlist-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.playlist-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
      });
    });
  </script>
</body>
</html>
