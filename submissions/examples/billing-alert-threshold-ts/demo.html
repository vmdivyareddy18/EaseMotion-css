<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Billing Alert Threshold Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Billing monitor</p>
      <h1 id="demo-title">Budget threshold alert</h1>
      <p>A usage-based billing banner with spend context, severity treatment, and animated threshold progress.</p>
    </section>
    <section class="demo-grid" aria-label="Billing Alert Threshold Banner">
        <article class="demo-card" style="--value: 82%"><h2>Current spend</h2><p>$820 used</p><span class="meter-track"><span></span></span></article>
        <article class="demo-card" style="--value: 100%"><h2>Workspace budget</h2><p>$1,000 limit</p><span class="meter-track"><span></span></span></article>
        <article class="demo-card" style="--value: 108%"><h2>Projected month end</h2><p>$1,080 forecast</p><span class="meter-track"><span></span></span></article>
    </section>
  </main>
</body>
</html>
