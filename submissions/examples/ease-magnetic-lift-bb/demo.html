<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Drag and Lift Card Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0f19;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="magnetic-container">
    <div class="magnetic-lift-card" id="card">
      <div class="magnetic-lift-card-content">
        <h4>Magnetic Terminal</h4>
        <p>Click, hold, and drag slightly to feel the physical elastic magnetic pull-back resistance.</p>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    let isDragging = false;
    let startX = 0, startY = 0;

    card.addEventListener('mousedown', (e) => {
      isDragging = true;
      startX = e.clientX;
      startY = e.clientY;
      card.style.boxShadow = '0 20px 45px rgba(99, 102, 241, 0.2)';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      const dy = e.clientY - startY;
      
      // Limit motion for elastic resistance simulation
      const mx = Math.max(-50, Math.min(50, dx * 0.4));
      const my = Math.max(-50, Math.min(50, dy * 0.4));
      
      const rx = -my / 2;
      const ry = mx / 2;
      
      card.style.transform = `translate3d(${mx}px, ${my}px, 40px) rotateX(${rx}deg) rotateY(${ry}deg)`;
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      card.style.transform = 'translate3d(0, 0, 0) rotateX(0deg) rotateY(0deg)';
      card.style.boxShadow = '0 10px 25px rgba(0, 0, 0, 0.3)';
    });
  </script>
</body>
</html>
