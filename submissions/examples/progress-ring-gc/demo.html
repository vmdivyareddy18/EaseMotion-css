<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Progress Ring UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Pulse Progress Ring UI Example</h1>
      <p>Circular progress rings with animated pulse and percentage fill.</p>
    </header>

    <section class="ring-grid">
      <div class="ring-card">
        <div class="progress-ring" data-progress="45">
          <span class="progress-ring__label">45%</span>
        </div>
        <h3>Loading</h3>
      </div>

      <div class="ring-card">
        <div class="progress-ring progress-ring--accent" data-progress="70">
          <span class="progress-ring__label">70%</span>
        </div>
        <h3>In Progress</h3>
      </div>

      <div class="ring-card">
        <div class="progress-ring progress-ring--soft" data-progress="28">
          <span class="progress-ring__label">28%</span>
        </div>
        <h3>Pending</h3>
      </div>

      <div class="ring-card">
        <div class="progress-ring progress-ring--complete" data-progress="100">
          <span class="progress-ring__label">Done</span>
        </div>
        <h3>Complete</h3>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll('.progress-ring').forEach((ring) => {
      const progress = Number(ring.dataset.progress);
      const circumference = 2 * Math.PI * 44;
      const offset = circumference - (progress / 100) * circumference;

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('viewBox', '0 0 120 120');
      svg.classList.add('progress-ring__svg');

      const circleBackground = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circleBackground.setAttribute('cx', '60');
      circleBackground.setAttribute('cy', '60');
      circleBackground.setAttribute('r', '44');
      circleBackground.setAttribute('class', 'progress-ring__circle-bg');

      const circleProgress = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circleProgress.setAttribute('cx', '60');
      circleProgress.setAttribute('cy', '60');
      circleProgress.setAttribute('r', '44');
      circleProgress.setAttribute('class', 'progress-ring__circle');
      circleProgress.setAttribute('stroke-dasharray', circumference);
      circleProgress.setAttribute('stroke-dashoffset', circumference);

      svg.appendChild(circleBackground);
      svg.appendChild(circleProgress);
      ring.prepend(svg);

      requestAnimationFrame(() => {
        circleProgress.style.strokeDashoffset = offset;
      });
    });
  </script>
</body>
</html>
