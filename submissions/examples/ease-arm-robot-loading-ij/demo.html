<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arm Robot Loading – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Arm Robot Loading</h1>
  <p class="subtitle">Automated pick-and-place animation</p>

  <div class="arl-stage">
    <div class="arl-robot" id="robot">
      <div class="arl-base"></div>
      <div class="arl-arm" id="armUpper">
        <div class="arl-joint"></div>
        <div class="arl-forearm" id="armLower">
          <div class="arl-joint"></div>
          <div class="arl-gripper" id="gripper">
            <div class="arl-claw"></div>
            <div class="arl-claw"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="arl-belt" id="belt">
      <div class="arl-item" id="item1"></div>
      <div class="arl-item" id="item2"></div>
      <div class="arl-item" id="item3"></div>
    </div>

    <div class="arl-zone" id="dropZone"></div>
  </div>

  <div class="arl-controls">
    <button class="arl-btn" id="playBtn">Play</button>
    <button class="arl-btn" id="resetBtn">Reset</button>
  </div>

  <script>
    const robot = document.getElementById('robot');
    const armUpper = document.getElementById('armUpper');
    const armLower = document.getElementById('armLower');
    const gripper = document.getElementById('gripper');
    const belt = document.getElementById('belt');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');

    let running = false;
    let timeoutIds = [];

    function clearTimeouts() {
      timeoutIds.forEach(t => clearTimeout(t));
      timeoutIds = [];
    }

    function reset() {
      clearTimeouts();
      running = false;
      playBtn.textContent = 'Play';
      robot.classList.remove('picking', 'placing', 'returning');
      belt.classList.remove('moving');
      armUpper.style.transform = '';
      armLower.style.transform = '';
      gripper.style.transform = '';
    }

    function playCycle() {
      if (running) return;
      running = true;
      playBtn.textContent = 'Running...';
      reset();

      timeoutIds.push(setTimeout(() => {
        robot.classList.add('picking');
        armUpper.style.transform = 'rotate(-30deg)';
        armLower.style.transform = 'rotate(40deg)';
        gripper.style.transform = 'scale(0.9)';
      }, 300));

      timeoutIds.push(setTimeout(() => {
        gripper.style.transform = 'scale(1.15)';
      }, 1200));

      timeoutIds.push(setTimeout(() => {
        armUpper.style.transform = 'rotate(0deg)';
        armLower.style.transform = 'rotate(0deg)';
        gripper.style.transform = 'scale(1)';
        robot.classList.remove('picking');
        robot.classList.add('placing');
      }, 1700));

      timeoutIds.push(setTimeout(() => {
        armUpper.style.transform = 'rotate(25deg)';
        armLower.style.transform = 'rotate(-30deg)';
      }, 2200));

      timeoutIds.push(setTimeout(() => {
        gripper.style.transform = 'scale(0.9)';
      }, 3000));

      timeoutIds.push(setTimeout(() => {
        gripper.style.transform = 'scale(1)';
        armUpper.style.transform = 'rotate(0deg)';
        armLower.style.transform = 'rotate(0deg)';
        robot.classList.remove('placing');
        robot.classList.add('returning');
        belt.classList.add('moving');
      }, 3500));

      timeoutIds.push(setTimeout(() => {
        robot.classList.remove('returning');
        belt.classList.remove('moving');
        running = false;
        playBtn.textContent = 'Play';
      }, 4500));
    }

    playBtn.addEventListener('click', playCycle);
    resetBtn.addEventListener('click', reset);
  </script>
</body>
</html>
