<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Underline Link - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="link-container-qn">
        <h2>Hover over these links:</h2>
        
        <!-- Left to Right Underline -->
        <a href="#" class="link-qn left-right-qn">Left to Right</a>
        
        <!-- Center Outward Underline -->
        <a href="#" class="link-qn center-out-qn">Center Outward</a>
        
        <!-- Right to Left Underline -->
        <a href="#" class="link-qn right-left-qn">Right to Left</a>
        
        <!-- Thick Gradient Underline -->
        <a href="#" class="link-qn gradient-qn">Gradient Underline</a>
    </div>
</body>
</html>
