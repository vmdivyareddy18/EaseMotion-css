<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Stopwatch - EaseMotion CSS</title>
  <!-- Import EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Component Specific Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-bg">
  <div class="ease-glass-card stopwatch-card ease-hover-lift-shadow ease-ambient-glow">
    <!-- State Controller (No JS) -->
    <input type="checkbox" id="play-pause" class="toggle-checkbox" hidden>

    <!-- Card Header -->
    <div class="card-header">
      <h2 class="ease-text-lg">Session Timer</h2>
      <div class="status-indicator"></div>
    </div>
    
    <!-- Display Section -->
    <div class="stopwatch-display">
      <div class="wave-container">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      
      <!-- Time Display -->
      <div class="time-display ease-font-mono ease-text-4xl ease-text-gradient-flow">
        <span class="digit-group">
          <span class="digit">0</span><span class="digit">0</span>
        </span>:<!--
        --><span class="digit-group">
          <span class="digit">0</span><span class="digit">0</span>
        </span>:<!--
        --><span class="digit-group ms">
          <span class="digit-reel">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0</span><!--
          --><span class="digit-reel fast">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0</span>
        </span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <label for="play-pause" class="toggle-btn ease-squish-button">
        <span class="play-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Start
        </span>
        <span class="pause-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          Pause
        </span>
      </label>
      <button type="reset" class="reset-btn ease-squish-button ease-hover-shimmer" onclick="document.getElementById('play-pause').checked = false;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
        Reset
      </button>
    </div>
  </div>
</body>
</html>
