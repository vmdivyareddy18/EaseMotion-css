<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Spring Physics Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="saas-container">
    <header class="saas-header">
      <h1>SaaS Premium Workspace</h1>
      <a href="#spring-modal" class="btn btn-upgrade">⚡ Upgrade Workspace</a>
    </header>
    <div class="saas-dummy-content">
      <div class="skeleton-line"></div>
      <div class="skeleton-line short"></div>
    </div>
  </div>

  <div id="spring-modal" class="modal-backdrop" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <a href="#" class="modal-dismiss-overlay" aria-label="Dismiss modal"></a>
    
    <div class="modal-box">
      <button class="close-icon-btn" onclick="window.location.hash=''; font-weight: bold;" aria-label="Close modal">&times;</button>
      
      <div class="modal-body">
        <div class="icon-badge">✨</div>
        <h2 id="modal-title">Unlock Pro Metrics</h2>
        <p>Get real-time spring physics transition modeling toolkits, infinite seat allocations, and automated SaaS report pipelines natively.</p>
        
        <div class="pricing-card">
          <span>Pro Workspace Plan</span>
          <strong>$49/mo</strong>
        </div>
      </div>

      <footer class="modal-actions">
        <a href="#" class="btn btn-secondary">Cancel</a>
        <a href="#" class="btn btn-primary">Start 14-Day Free Trial</a>
      </footer>
    </div>
  </div>

</body>
</html>
