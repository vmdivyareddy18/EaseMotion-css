<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Lightbox</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section class="gallery" aria-label="Animated image lightbox demo">
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Lightbox Viewer</h1>
        <div class="tiles">
          <a class="tile tile-one" href="#preview-one">Aurora</a>
          <a class="tile tile-two" href="#preview-two">Canyon</a>
          <a class="tile tile-three" href="#preview-three">Lagoon</a>
        </div>
      </section>

      <section id="preview-one" class="lightbox" aria-label="Aurora preview">
        <a class="close" href="#" aria-label="Close preview">Close</a>
        <div class="preview preview-one">Aurora</div>
      </section>
      <section id="preview-two" class="lightbox" aria-label="Canyon preview">
        <a class="close" href="#" aria-label="Close preview">Close</a>
        <div class="preview preview-two">Canyon</div>
      </section>
      <section id="preview-three" class="lightbox" aria-label="Lagoon preview">
        <a class="close" href="#" aria-label="Close preview">Close</a>
        <div class="preview preview-three">Lagoon</div>
      </section>
    </main>
  </body>
</html>
