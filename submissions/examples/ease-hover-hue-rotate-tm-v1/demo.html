<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hover-hue-rotate Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>ease-hover-hue-rotate</h1>
    <p>Hover over the color swatches and buttons to see the hue rotation effect shift colors through the spectrum.</p>

    <div class="palette-row">
      <div class="palette-card hue-card hue-card-1">
        <span>Primary</span>
      </div>
      <div class="palette-card hue-card hue-card-2">
        <span>Accent</span>
      </div>
      <div class="palette-card hue-card hue-card-3">
        <span>Warm</span>
      </div>
      <div class="palette-card hue-card hue-card-4">
        <span>Cool</span>
      </div>
      <div class="palette-card hue-card hue-card-5">
        <span>Neutral</span>
      </div>
    </div>

    <div class="btn-row">
      <button class="hue-btn hue-btn-primary">Submit</button>
      <button class="hue-btn hue-btn-secondary">Cancel</button>
      <button class="hue-btn hue-btn-accent">Learn More</button>
    </div>

    <div class="badge-row">
      <span class="hue-badge">New</span>
      <span class="hue-badge">Hot</span>
      <span class="hue-badge">Sale</span>
      <span class="hue-badge">Limited</span>
    </div>
  </div>
</body>
</html>
