<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Step Glow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion progress</p>
    <h1 id="demo-title">Progress step glow</h1>
    <p class="intro">A three-step progress row where the active step glows and completed steps stay steady.</p>

    <ol class="steps" aria-label="Checkout progress">
      <li class="done">Cart</li>
      <li class="active">Details</li>
      <li>Pay</li>
    </ol>
  </main>
</body>
</html>
