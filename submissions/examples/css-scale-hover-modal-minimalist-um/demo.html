<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="min-modal-toggle" class="ease-min-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="min-modal-toggle" class="ease-min-trigger-um" tabindex="0">
    Deploy Application
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-min-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="min-modal-toggle" class="ease-min-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-min-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="min-modal-toggle" class="ease-min-close-icon-um" aria-label="Close Modal">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Content -->
      <h2 id="modal-title" class="ease-min-title-um">Confirm Deployment</h2>
      <p class="ease-min-desc-um">
        You are about to deploy this application to the production environment. This action will trigger a new build and update the live URL. Hover over the buttons to see the subtle scale micro-interaction.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-min-actions-um">
        <label for="min-modal-toggle" class="ease-min-btn-um">
          Cancel
        </label>
        
        <label for="min-modal-toggle" class="ease-min-btn-um ease-min-btn-primary-um">
          Deploy to Production
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
