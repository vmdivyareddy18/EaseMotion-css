<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Coupon Reveal Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-wrapper">
    <section class="intro">
      <h1>Animated Coupon Reveal Card</h1>
      <p>Hover over the coupon card to reveal the discount code.</p>
    </section>

    <section class="coupon-card">
      <span class="coupon-badge">20% OFF</span>
      <h2>Special Discount</h2>
      <p>Unlock your offer with a smooth CSS-only reveal effect.</p>

      <div class="coupon-code">
        SAVE20
      </div>
    </section>
  </main>
</body>
</html>
