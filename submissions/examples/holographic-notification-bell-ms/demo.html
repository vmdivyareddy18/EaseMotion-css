<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holographic Notification Bell</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #020617; font-family: system-ui, sans-serif;">
  
  <div class="hologram-wrapper ease-fade-in-up">
    <!-- Base projector platform -->
    <div class="projector-base"></div>
    
    <!-- Hologram projection cone -->
    <div class="projection-cone ease-pulse"></div>
    
    <!-- Floating Bell Icon -->
    <button class="holo-bell ease-hover-scale" aria-label="Notifications">
      <div class="bell-icon ease-swing">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <!-- Unread indicator -->
      <span class="holo-badge ease-flash">3</span>
    </button>
  </div>

</body>
</html>
