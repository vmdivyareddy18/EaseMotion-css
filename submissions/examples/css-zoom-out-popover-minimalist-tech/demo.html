<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Zoom-Out Popover</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <span class="badge">Minimal Tech</span>

  <h1>Zoom-Out Popover</h1>
  <p class="subtitle">
    Lightweight CSS popover with smooth zoom animation.
  </p>

  <div class="display-area">

    <div class="popover-container">

      <button class="tech-btn" aria-label="Open Menu">
        ☰
      </button>

      <div class="zoom-popover" role="tooltip" tabindex="-1">

        <div class="zoom-item">
          <span class="item-icon">⌘</span>
          <span>Command</span>
        </div>

        <div class="zoom-item">
          <span class="item-icon">⚙</span>
          <span>Settings</span>
        </div>

        <div class="zoom-item">
          <span class="item-icon">📊</span>
          <span>Analytics</span>
        </div>

        <div class="zoom-item">
          <span class="item-icon">☁</span>
          <span>Deploy</span>
        </div>

      </div>

    </div>

  </div>

  <section class="demo-section">

    <h3>Animation Presets</h3>

    <div class="variants-grid">

      <div class="popover-container">
        <button class="trigger-btn small">
          Smooth
        </button>

        <div class="zoom-popover" role="tooltip" tabindex="-1">
          <p>Soft cubic-bezier transition.</p>
        </div>
      </div>

      <div class="popover-container">
        <button class="trigger-btn small">
          Fast
        </button>

        <div class="zoom-popover" role="tooltip" tabindex="-1">
          <p>Quick interaction.</p>
        </div>
      </div>

      <div class="popover-container">
        <button class="trigger-btn small">
          Bounce
        </button>

        <div class="zoom-popover" role="tooltip" tabindex="-1">
          <p>Spring style animation.</p>
        </div>
      </div>

    </div>

  </section>

</div>

</body>
</html>
