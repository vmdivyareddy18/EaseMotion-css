<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Kinetic Map Embed</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="ease-map-wrapper">

<h1>Kinetic Map Embed</h1>

<div
class="ease-map-card ease-float"
role="img"
aria-label="Animated map component with highlighted destination">

<div class="ease-grid"></div>

<div class="ease-marker">
<div class="pulse"></div>
<div class="dot"></div>
</div>

<div class="ease-overlay">
<h2>EaseMotion HQ</h2>
<p>Animated CSS-only Map Embed</p>
</div>

</div>

</section>

</body>
</html>
