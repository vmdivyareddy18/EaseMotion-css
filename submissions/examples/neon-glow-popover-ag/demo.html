<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Glow Popover Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="demo-wrapper">
    <h3 class="checkout-heading">Secure Checkout</h3>
    <p class="checkout-subheading">Click on small "?" to see the popover</p>
    <div class="checkout-card">
      <div class="form-group">
        <div class="label-row">
          <label for="cvv-input" class="field-label">Card Verification Value (CVV)</label>

          <div class="popover-wrapper">
            <input type="checkbox" id="cvv-help-toggle" class="popover-checkbox sr-only" role="button"
              aria-expanded="false" aria-controls="cvv-popover">

            <!-- Accessible trigger label styled like a button/link -->
            <label for="cvv-help-toggle" class="popover-trigger" title="What is CVV?" aria-label="What is CVV?">
              <span class="trigger-icon" aria-hidden="true">?</span>
            </label>

            <!-- Click-outside backdrop to dismiss the popover -->
            <label for="cvv-help-toggle" class="popover-backdrop" aria-hidden="true"></label>

            <!-- Popover Content Box -->
            <div id="cvv-popover" class="popover-content" role="dialog" aria-modal="false"
              aria-labelledby="popover-title">
              <div class="popover-arrow"></div>
              <div class="popover-body">
                <div class="cvv-visual">
                  <div class="card-back">
                    <div class="card-magnetic-strip"></div>
                    <div class="card-signature-strip">
                      <span class="signature-lines"></span>
                      <span class="cvv-highlight">123</span>
                    </div>
                  </div>
                </div>
                <h4 class="popover-title" id="popover-title">What is CVV/CVC?</h4>
                <p class="popover-desc">The Card Verification Value is a 3-digit security code printed on the back of
                  your card (4 digits on American Express, located on the front). It helps verify that you have physical
                  possession of the card.</p>
              </div>
            </div>
          </div>
        </div>
        <input type="text" id="cvv-input" class="field-input" placeholder="•••" maxlength="4" readonly>
      </div>
    </div>
  </div>
</body>

</html>
