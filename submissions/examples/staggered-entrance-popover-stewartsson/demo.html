<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism UI - Staggered Entrance Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-viewport">
        <!-- Main Abstract Fluid Backdrop Canvas for Translucent Glassmorphism Contrast Visuals -->
        <div class="fluid-backdrop-mesh">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <!-- Premium Embedded Glassmorphism Control Hub Card Container Shell -->
        <div class="glass-container-card">
            <header class="glass-header">
                <div class="neon-matrix-badge">STAGGER LAYER v4</div>
                <h2 class="glass-title">Compositor Deck</h2>
                <p class="glass-subtitle">Hover over the action module selector below to trigger the pure-CSS staggered entrance glass popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">✨</span>
                        <span class="btn-text">Open Stagger Terminal</span>
                    </button>

                    <!-- Floating Popover Translucent Overlay Menu Shell Box -->
                    <div class="staggered-entrance-popover ease-stagger-fly">
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Sequential Actions</h4>
                            <ul class="staggered-actions-list">
                                <li class="menu-item-row item-stagger-1">
                                    <a href="#load" class="action-link-node">Load Alpha Maps</a>
                                </li>
                                <li class="menu-item-row item-stagger-2">
                                    <a href="#render" class="action-link-node">Execute Render Loop</a>
                                </li>
                                <li class="menu-item-row item-stagger-3">
                                    <a href="#clear" class="action-link-node action-danger">Purge Canvas Blocks</a>
                                </li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="glass-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
