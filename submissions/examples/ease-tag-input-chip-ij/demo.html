<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Input Chip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Tag Input Chip</h1>

    <div class="tag-app">
      <div class="tag-field" id="tagField">
        <div class="chips" id="chipsContainer"></div>
        <input
          type="text"
          id="tagInput"
          class="tag-input"
          placeholder="Type and press Enter..."
          autofocus
        >
      </div>
      <p class="hint">Press Enter to add a tag &middot; Click &times; to remove</p>

      <div class="presets">
        <span class="preset-label">Try:</span>
        <button class="preset-btn" data-tags="react,vue,svelte">Frameworks</button>
        <button class="preset-btn" data-tags="typescript,tailwind,nextjs">Stack</button>
        <button class="preset-btn" data-tags="design,code,deploy">Workflow</button>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('tagInput');
    const container = document.getElementById('chipsContainer');
    const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#10b981','#ef4444','#06b6d4'];

    function getTags() {
      return Array.from(container.querySelectorAll('.chip')).map(c => c.dataset.tag);
    }

    function addTag(text) {
      text = text.trim().toLowerCase();
      if (!text || getTags().includes(text)) return;

      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.dataset.tag = text;
      chip.style.setProperty('--chip-color', colors[container.children.length % colors.length]);

      const label = document.createElement('span');
      label.className = 'chip-label';
      label.textContent = text;
      chip.appendChild(label);

      const remove = document.createElement('button');
      remove.className = 'chip-remove';
      remove.innerHTML = '&times;';
      remove.setAttribute('aria-label', `Remove ${text}`);
      remove.addEventListener('click', () => {
        chip.classList.add('removing');
        setTimeout(() => chip.remove(), 300);
      });
      chip.appendChild(remove);

      container.appendChild(chip);
      input.value = '';
      input.focus();
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTag(input.value);
      }
      if (e.key === 'Backspace' && !input.value && container.lastChild) {
        container.lastChild.classList.add('removing');
        setTimeout(() => {
          if (container.lastChild) container.lastChild.remove();
        }, 300);
      }
    });

    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        container.innerHTML = '';
        btn.dataset.tags.split(',').forEach(t => addTag(t));
      });
    });
  </script>
</body>
</html>
