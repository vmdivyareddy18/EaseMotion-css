<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Star Rating Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: Arial, sans-serif;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
      }

      p {
        margin: 0 0 1.5rem;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Rate your experience</h1>
      <p>Hover over a star to preview a rating.</p>
      <div class="ease-star-rating" aria-label="Five-star rating">
        <span class="ease-star" aria-label="1 star">&#9733;</span>
        <span class="ease-star" aria-label="2 stars">&#9733;</span>
        <span class="ease-star" aria-label="3 stars">&#9733;</span>
        <span class="ease-star" aria-label="4 stars">&#9733;</span>
        <span class="ease-star" aria-label="5 stars">&#9733;</span>
      </div>
    </main>
  </body>
</html>
