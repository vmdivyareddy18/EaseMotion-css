<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Color Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shop-stage">
    <section class="product-card" aria-labelledby="picker-title">
      <div class="preview" aria-hidden="true">
        <div class="preview-orb"></div>
        <span class="orbit orbit-one"></span>
        <span class="orbit orbit-two"></span>
      </div>

      <div class="copy">
        <p class="eyebrow">E-commerce Component</p>
        <h1 id="picker-title">Wave Color Picker</h1>
        <p>
          A pure CSS color selector with animated wave feedback for product cards,
          checkout flows, and variant pickers.
        </p>
      </div>

      <fieldset class="wave-picker">
        <legend>Choose product color</legend>

        <label class="color-option is-violet">
          <input type="radio" name="product-color" checked />
          <span class="swatch" aria-hidden="true"></span>
          <span class="color-name">Violet</span>
        </label>

        <label class="color-option is-coral">
          <input type="radio" name="product-color" />
          <span class="swatch" aria-hidden="true"></span>
          <span class="color-name">Coral</span>
        </label>

        <label class="color-option is-mint">
          <input type="radio" name="product-color" />
          <span class="swatch" aria-hidden="true"></span>
          <span class="color-name">Mint</span>
        </label>

        <label class="color-option is-amber">
          <input type="radio" name="product-color" />
          <span class="swatch" aria-hidden="true"></span>
          <span class="color-name">Amber</span>
        </label>

        <label class="color-option is-sky">
          <input type="radio" name="product-color" />
          <span class="swatch" aria-hidden="true"></span>
          <span class="color-name">Sky</span>
        </label>
      </fieldset>
    </section>
  </main>
</body>
</html>
