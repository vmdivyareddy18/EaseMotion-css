<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Border Card</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; flex-wrap: wrap; gap: 2rem; background: #0f172a; padding: 2rem;">
    <div class="gradient-card gradient-card-rotate">
      <div class="gradient-card-content">
        <h3>Rotating Border</h3>
        <p>A conic gradient border that rotates continuously around the card.</p>
      </div>
    </div>
    <div class="gradient-card gradient-card-shift">
      <div class="gradient-card-content">
        <h3>Shifting Gradient</h3>
        <p>A linear gradient border that shifts position back and forth.</p>
      </div>
    </div>
  </div>
</body>
</html>
