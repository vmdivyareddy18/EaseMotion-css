<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mix Blend Difference Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div class="blend-sandbox-canvas">
    <h4 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.25rem;">Layer Compositing Matrix</h4>
    <p style="font-size: 0.85rem; color: #64748b; line-height: 1.5; margin-top: 0; margin-bottom: 2rem;">
      The overlay title utilizes <code>mix-blend-mode: difference</code>. Because its base color is white (#ffffff), it cleanly inverts over changing backdrop panels automatically without requiring explicit text color selectors.
    </p>

    <div class="split-background-track">
      <div class="track-half-light"></div>
      <div class="track-half-dark"></div>
      
      <h1 class="absolute-overlay-text ease-blend-difference">Contrast Flow</h1>
    </div>
  </div>

</body>
</html>
