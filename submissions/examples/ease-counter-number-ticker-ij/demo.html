<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Number Ticker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="counter-title">Live Stats</h2>
    <div class="counter-grid">
      <div class="counter-item">
        <div class="counter-number" data-target="1250">0</div>
        <div class="counter-label">Users</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" data-target="47">0</div>
        <div class="counter-label">Countries</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" data-target="98.5">0</div>
        <div class="counter-label">Uptime %</div>
      </div>
      <div class="counter-item">
        <div class="counter-number" data-target="24">0</div>
        <div class="counter-label">Support</div>
      </div>
    </div>
  </div>
</body>
</html>
