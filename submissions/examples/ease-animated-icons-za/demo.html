<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Icons - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="aic-hdr"><h1>Animated CSS Icons</h1><p>CSS-drawn icons with hover and keyframe animations</p></header>
<section class="aic-sec"><h2>Heart Animations</h2><div class="aic-row"><div class="aic-icon aic-heart aic-beat"><div class="aic-heart-shape"></div><span>Beat</span></div><div class="aic-icon aic-heart aic-pulse"><div class="aic-heart-shape"></div><span>Pulse</span></div><div class="aic-icon aic-heart aic-grow"><div class="aic-heart-shape"></div><span>Grow</span></div></div></section>
<section class="aic-sec"><h2>Star Animations</h2><div class="aic-row"><div class="aic-icon aic-star aic-spin"><div class="aic-star-shape"></div><span>Spin</span></div><div class="aic-icon aic-star aic-bounce"><div class="aic-star-shape"></div><span>Bounce</span></div><div class="aic-icon aic-star aic-glow-pulse"><div class="aic-star-shape"></div><span>Glow</span></div></div></section>
<section class="aic-sec"><h2>Loading Icons</h2><div class="aic-row"><div class="aic-icon aic-loader aic-rotate"><div class="aic-loader-ring"></div><span>Rotate</span></div><div class="aic-icon aic-loader aic-dash"><div class="aic-loader-ring aic-dash-ring"></div><span>Dash</span></div><div class="aic-icon aic-pulsar"><div class="aic-pulsar-dot"></div><span>Pulsar</span></div></div></section>
<section class="aic-sec"><h2>Interactive Hover</h2><div class="aic-row"><div class="aic-icon aic-bell aic-ring-hover"><div class="aic-bell-shape"></div><span>Bell</span></div><div class="aic-icon aic-mail aic-shake-hover"><div class="aic-mail-shape"></div><span>Mail</span></div><div class="aic-icon aic-like aic-like-hover"><div class="aic-like-shape"></div><span>Like</span></div></div></section>
<section class="aic-sec"><h2>Weather Icons</h2><div class="aic-row"><div class="aic-icon aic-sun aic-rotate-slow"><div class="aic-sun-shape"></div><span>Sun</span></div><div class="aic-icon aic-moon aic-float"><div class="aic-moon-shape"></div><span>Moon</span></div><div class="aic-icon aic-cloud aic-drift"><div class="aic-cloud-shape"></div><span>Cloud</span></div></div></section>
<footer class="ftr"><p>EaseMotion - Animated Icons | GSSoC 2026</p></footer>
</body>
</html>
