<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Card Hover Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Staging canvas for demo showcase */
    body {
      margin: 0;
      height: 100vh;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <article class="ease-article-card" tabindex="0">
    <div class="ease-card-img-wrapper">
      <img 
        src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600&auto=format&fit=crop&q=80" 
        alt="Abstract graphic rendering of smooth fluid digital motion lines"
        className="ease-card-img"
      />
      <span class="ease-card-tag">Design Systems</span>
    </div>
    
    <div class="ease-card-content">
      <time class="ease-card-date" datetime="2026-07-05">July 5, 2026</time>
      <h3 class="ease-card-title">
        <a href="#" class="ease-card-link">Orchestrating Seamless Layout Micro-Interactions</a>
      </h3>
      <p class="ease-card-excerpt">
        Explore how atomic variable maps and decoupled GPU threads cooperate to yield performant web animation states at a locked 60fps frame index.
      </p>
      
      <div class="ease-card-footer">
        <span class="ease-read-more">Read Article</span>
        <svg class="ease-arrow-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
        </svg>
      </div>
    </div>
  </article>

</body>
</html>
