<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elastic Slide Tooltip - Creative Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="portfolio">
    <h1>Creative Portfolio Tooltip</h1>

    <div class="project-card">

      <div class="tooltip-wrapper">

        <button class="project-btn" aria-describedby="tooltip">
          View Project
        </button>

        <div class="tooltip" id="tooltip" role="tooltip">
          🎨 Explore creative design details and portfolio work
        </div>

      </div>

    </div>

  </main>

</body>
</html>
