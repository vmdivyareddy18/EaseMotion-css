<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Notification Bell</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Notifications</h1>

        <div class="bell-wrapper">
            <!-- Bell Icon -->
            <div class="bell-container" id="bellContainer">
                <div class="bell-icon" id="bellIcon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 01-3.46 0" />
                    </svg>
                    <span class="badge" id="badge">3</span>
                </div>
                <span class="bell-label">Notifications</span>
            </div>

            <!-- Dropdown -->
            <div class="dropdown" id="dropdown">
                <div class="dropdown-header">
                    <span>Notifications</span>
                    <button id="markAllBtn">Mark all read</button>
                </div>
                <div class="dropdown-body" id="notificationsList">
                    <!-- Notifications injected by JS -->
                </div>
                <div class="dropdown-footer">
                    <button id="addNotifBtn">+ Add Notification</button>
                    <button id="clearAllBtn">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== DATA ==========
        const notifications = [
            { id: 1, text: "👍 John liked your post", time: "2 min ago", unread: true },
            { id: 2, text: "💬 Sarah commented: 'Great!'", time: "15 min ago", unread: true },
            { id: 3, text: "🔔 System update completed", time: "1 hour ago", unread: true },
        ];

        let isOpen = false;
        let notifCount = notifications.filter(n => n.unread).length;

        // ========== DOM REFS ==========
        const bellContainer = document.getElementById("bellContainer");
        const bellIcon = document.getElementById("bellIcon");
        const badge = document.getElementById("badge");
        const dropdown = document.getElementById("dropdown");
        const notifList = document.getElementById("notificationsList");
        const addBtn = document.getElementById("addNotifBtn");
        const clearBtn = document.getElementById("clearAllBtn");
        const markAllBtn = document.getElementById("markAllBtn");

        // ========== RENDER ==========
        function renderNotifications() {
            if (notifications.length === 0) {
                notifList.innerHTML = `<div class="empty-state">✨ No notifications</div>`;
                return;
            }
            notifList.innerHTML = notifications.map(n => `
                <div class="notif-item ${n.unread ? 'unread' : ''}">
                    <span class="notif-dot"></span>
                    <div class="notif-content">
                        <div class="notif-text">${n.text}</div>
                        <div class="notif-time">${n.time}</div>
                    </div>
                    <button class="notif-dismiss" data-id="${n.id}">✕</button>
                </div>
            `).join("");

            // Dismiss buttons
            document.querySelectorAll(".notif-dismiss").forEach(btn => {
                btn.addEventListener("click", (e) => {
                    const id = parseInt(btn.dataset.id);
                    const index = notifications.findIndex(n => n.id === id);
                    if (index !== -1) {
                        notifications.splice(index, 1);
                        updateAll();
                        renderNotifications();
                    }
                    e.stopPropagation();
                });
            });
        }

        // ========== UPDATE UI ==========
        function updateBadge() {
            notifCount = notifications.filter(n => n.unread).length;
            badge.textContent = notifCount;
            badge.style.display = notifCount > 0 ? "flex" : "none";
        }

        function updateAll() {
            updateBadge();
            // Shake bell if new notifications exist
            if (notifCount > 0) {
                bellIcon.classList.add("shake");
                setTimeout(() => bellIcon.classList.remove("shake"), 600);
            }
        }

        // ========== TOGGLE DROPDOWN ==========
        bellContainer.addEventListener("click", () => {
            isOpen = !isOpen;
            dropdown.classList.toggle("open", isOpen);
            bellIcon.classList.toggle("active", isOpen);
        });

        // Close on outside click
        document.addEventListener("click", (e) => {
            if (!bellContainer.contains(e.target) && !dropdown.contains(e.target)) {
                dropdown.classList.remove("open");
                isOpen = false;
                bellIcon.classList.remove("active");
            }
        });

        // ========== ADD NOTIFICATION ==========
        addBtn.addEventListener("click", () => {
            const msgs = [
                "❤️ Alex reacted to your story",
                "📩 New message from Maria",
                "⭐ You earned a new badge",
                "📅 Event tomorrow at 3 PM",
                "🎉 Your friend joined the platform",
                "📢 Important announcement",
                "✅ Task completed successfully",
                "🔔 Reminder: meeting in 30 min",
            ];
            const randomMsg = msgs[Math.floor(Math.random() * msgs.length)];
            const newNotif = {
                id: Date.now(),
                text: randomMsg,
                time: "Just now",
                unread: true,
            };
            notifications.unshift(newNotif);
            updateAll();
            renderNotifications();
            // Auto-open dropdown to show new notif
            if (!isOpen) {
                isOpen = true;
                dropdown.classList.add("open");
                bellIcon.classList.add("active");
            }
        });

        // ========== CLEAR ALL ==========
        clearBtn.addEventListener("click", () => {
            notifications.length = 0;
            updateAll();
            renderNotifications();
        });

        // ========== MARK ALL READ ==========
        markAllBtn.addEventListener("click", () => {
            notifications.forEach(n => n.unread = false);
            updateAll();
            renderNotifications();
        });

        // ========== INIT ==========
        renderNotifications();
        updateBadge();
    </script>
</body>
</html>
