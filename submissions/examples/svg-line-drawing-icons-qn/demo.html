<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Line Drawing Icons - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>SVG Line Drawing Animation</h2>
        <p>Hover over the icons to see them draw themselves</p>
        
        <div class="icons-grid-qn">
            <!-- Icon 1: Rocket -->
            <div class="icon-card-qn">
                <div class="icon-wrapper-qn">
                    <svg class="line-icon-qn" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="icon-path-qn" d="M32 8L40 24L56 32L40 40L32 56L24 40L8 32L24 24L32 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle class="icon-path-qn" cx="32" cy="32" r="8" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </div>
                <h3>Launch Fast</h3>
                <p>Deploy your projects in seconds</p>
            </div>

            <!-- Icon 2: Shield -->
            <div class="icon-card-qn">
                <div class="icon-wrapper-qn">
                    <svg class="line-icon-qn" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="icon-path-qn" d="M32 8L8 20V36C8 48 18 58 32 62C46 58 56 48 56 36V20L32 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path class="icon-path-qn" d="M24 32L30 38L40 26" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3>Secure</h3>
                <p>Enterprise-grade protection</p>
            </div>

            <!-- Icon 3: Lightning -->
            <div class="icon-card-qn">
                <div class="icon-wrapper-qn">
                    <svg class="line-icon-qn" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="icon-path-qn" d="M36 8L16 36H32L28 56L48 28H32L36 8Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3>Lightning Fast</h3>
                <p>Optimized for speed</p>
            </div>

            <!-- Icon 4: Heart -->
            <div class="icon-card-qn">
                <div class="icon-wrapper-qn">
                    <svg class="line-icon-qn" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path class="icon-path-qn" d="M32 56L28.5 52.5C16 41 8 34 8 24C8 16 14 10 22 10C26.5 10 30.5 12 32 15C33.5 12 37.5 10 42 10C50 10 56 16 56 24C56 34 48 41 35.5 52.5L32 56Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <h3>Made with Love</h3>
                <p>Crafted with care</p>
            </div>
        </div>
    </div>
</body>
</html>
