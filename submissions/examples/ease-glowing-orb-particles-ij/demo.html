<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glowing Orb Particles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <h2>Glowing Orb Particles</h2>
      <p>Floating bubbles with luminous orbs</p>
    </div>

    <div class="demo-area">
      <div class="orb-container" id="orbContainer">
        <div class="orb" style="--i: 1"></div>
        <div class="orb" style="--i: 2"></div>
        <div class="orb" style="--i: 3"></div>
        <div class="orb" style="--i: 4"></div>
        <div class="orb" style="--i: 5"></div>
        <div class="orb" style="--i: 6"></div>
      </div>
    </div>

    <div class="controls">
      <label>Orb Color 1 <input type="color" id="orbColor1" value="#ff6b6b" data-var="--orb-color1"></label>
      <label>Orb Color 2 <input type="color" id="orbColor2" value="#4ecdc4" data-var="--orb-color2"></label>
      <label>Orb Color 3 <input type="color" id="orbColor3" value="#ffe66d" data-var="--orb-color3"></label>
      <label>Float Speed <input type="range" id="floatDuration" min="2" max="10" step="0.5" value="5" data-var="--float-duration" data-unit="s"></label>
    </div>
  </main>
  <script>
    const root = document.getElementById('orbContainer');
    document.querySelectorAll('[data-var]').forEach(input => {
      const set = () => root.style.setProperty(input.dataset.var, input.dataset.unit ? input.value + input.dataset.unit : input.value);
      input.addEventListener('input', set);
      set();
    });
  </script>
</body>
</html>
