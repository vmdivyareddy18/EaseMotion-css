<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transform Style 3D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Transform-Style: preserve-3d</h1>
    <p class="subtitle">3D card flip, layered depth scenes, and backface-visibility demos.</p>

    <section class="demo-section">
      <h2>3D Card Flip</h2>
      <div class="card-flip-wrapper">
        <div class="card-flip">
          <div class="card-front">Front</div>
          <div class="card-back">Back</div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>3D Cube</h2>
      <div class="cube-scene">
        <div class="cube-3d">
          <div class="cube-face-3d f3">F</div>
          <div class="cube-face-3d b3">B</div>
          <div class="cube-face-3d r3">R</div>
          <div class="cube-face-3d l3">L</div>
          <div class="cube-face-3d t3">T</div>
          <div class="cube-face-3d d3">D</div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Backface Visibility</h2>
      <div class="backface-grid">
        <div class="backface-card">
          <span class="bf-label">visible</span>
          <div class="bf-scene">
            <div class="bf-box visible-bf"><div class="bf-front">A</div><div class="bf-back visible">B</div></div>
          </div>
        </div>
        <div class="backface-card">
          <span class="bf-label">hidden</span>
          <div class="bf-scene">
            <div class="bf-box hidden-bf"><div class="bf-front">A</div><div class="bf-back hidden">B</div></div>
          </div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Layered Depth Scene</h2>
      <div class="depth-scene">
        <div class="depth-layer" style="--z: 30px; --color: #6366f1;">Layer 1</div>
        <div class="depth-layer" style="--z: 60px; --color: #8b5cf6;">Layer 2</div>
        <div class="depth-layer" style="--z: 90px; --color: #a78bfa;">Layer 3</div>
      </div>
    </section>
  </main>
  <script>
    document.querySelector('.card-flip').addEventListener('click', function () {
      this.classList.toggle('flipped');
    });
  </script>
</body>
</html>
