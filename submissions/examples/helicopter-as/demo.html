<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helicopter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="cloudh ch1"></span>
    <span class="cloudh ch2"></span>
    <div class="heli">
      <span class="mast"></span>
      <div class="rotor">
        <span class="blade bl1"></span>
        <span class="blade bl2"></span>
        <span class="blade bl3"></span>
        <span class="hubh"></span>
      </div>
      <span class="bodyh"></span>
      <span class="cockpit"></span>
      <span class="tailh"></span>
      <span class="finh"></span>
      <div class="trotor">
        <span class="tblade tb1"></span>
        <span class="tblade tb2"></span>
      </div>
      <span class="skid sk1"></span>
      <span class="skid sk2"></span>
      <span class="strut stz1"></span>
      <span class="strut stz2"></span>
    </div>
  </div>
</body>
</html>
