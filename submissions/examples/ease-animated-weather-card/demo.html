<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Weather Card</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <!-- Sun/Moon -->
            <div class="celestial-body">
                <div class="sun"></div>
                <div class="glow-ring"></div>
                <div class="glow-ring-2"></div>
            </div>

            <!-- Clouds -->
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>

            <!-- Weather Info -->
            <div class="weather-info">
                <div class="location">
                    <span class="city">San Francisco</span>
                    <span class="country">CA, USA</span>
                </div>
                <div class="temperature-container">
                    <span class="temperature" id="tempDisplay">72</span>
                    <span class="degree">°F</span>
                </div>
                <div class="weather-condition">
                    <span class="condition">☀️ Sunny</span>
                    <span class="detail">Feels like 74°F</span>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <span class="icon">💧</span>
                        <span class="label">Humidity</span>
                        <span class="value">45%</span>
                    </div>
                    <div class="detail-item">
                        <span class="icon">💨</span>
                        <span class="label">Wind</span>
                        <span class="value">12 mph</span>
                    </div>
                    <div class="detail-item">
                        <span class="icon">🌡️</span>
                        <span class="label">High/Low</span>
                        <span class="value">78°/65°</span>
                    </div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="toggleBtn">Switch to Night</button>
                <button id="tempUpBtn">+ Temp</button>
                <button id="tempDownBtn">- Temp</button>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const weatherCard = document.querySelector('.weather-card');
        const celestialBody = document.querySelector('.celestial-body');
        const sun = document.querySelector('.sun');
        const glowRing = document.querySelector('.glow-ring');
        const glowRing2 = document.querySelector('.glow-ring-2');
        const tempDisplay = document.getElementById('tempDisplay');
        const toggleBtn = document.getElementById('toggleBtn');
        const tempUpBtn = document.getElementById('tempUpBtn');
        const tempDownBtn = document.getElementById('tempDownBtn');
        const condition = document.querySelector('.condition');
        const detail = document.querySelector('.detail');

        // ===== STATE =====
        let isNight = false;
        let currentTemp = 72;
        let targetTemp = 72;

        // ===== TEMPERATURE ANIMATION =====
        function animateTemperature() {
            const start = parseInt(tempDisplay.textContent);
            const end = targetTemp;
            const duration = 600;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                // Bounce easing
                const easeOutBounce = (t) => {
                    const n1 = 7.5625;
                    const d1 = 2.75;
                    if (t < 1 / d1) {
                        return n1 * t * t;
                    } else if (t < 2 / d1) {
                        return n1 * (t -= 1.5 / d1) * t + 0.75;
                    } else if (t < 2.5 / d1) {
                        return n1 * (t -= 2.25 / d1) * t + 0.9375;
                    } else {
                        return n1 * (t -= 2.625 / d1) * t + 0.984375;
                    }
                };

                const eased = easeOutBounce(progress);
                const current = start + (end - start) * eased;
                tempDisplay.textContent = Math.round(current);

                if (progress < 1) {
                    requestAnimationFrame(update);
                } else {
                    tempDisplay.textContent = Math.round(end);
                }
            }

            requestAnimationFrame(update);
        }

        // ===== UPDATE TEMP =====
        function setTemperature(value) {
            targetTemp = Math.max(-20, Math.min(120, value));
            animateTemperature();
            currentTemp = targetTemp;

            // Update condition based on temp
            if (targetTemp > 85) {
                condition.textContent = '☀️ Hot';
                detail.textContent = 'Feels like ' + (targetTemp + 3) + '°F';
            } else if (targetTemp > 70) {
                condition.textContent = '☀️ Sunny';
                detail.textContent = 'Feels like ' + (targetTemp + 2) + '°F';
            } else if (targetTemp > 50) {
                condition.textContent = '⛅ Mild';
                detail.textContent = 'Feels like ' + (targetTemp + 1) + '°F';
            } else if (targetTemp > 32) {
                condition.textContent = '❄️ Cold';
                detail.textContent = 'Feels like ' + (targetTemp - 2) + '°F';
            } else {
                condition.textContent = '🥶 Freezing';
                detail.textContent = 'Feels like ' + (targetTemp - 5) + '°F';
            }
        }

        // ===== TOGGLE DAY/NIGHT =====
        function toggleDayNight() {
            isNight = !isNight;
            weatherCard.classList.toggle('night', isNight);

            if (isNight) {
                sun.style.background = 'radial-gradient(circle, #ffd700 0%, #ffb300 40%, #ff8f00 70%, #ff6f00 100%)';
                sun.style.boxShadow = '0 0 60px rgba(255, 215, 0, 0.3), 0 0 120px rgba(255, 215, 0, 0.15)';
                glowRing.style.background = 'radial-gradient(circle, rgba(255, 215, 0, 0.3) 0%, transparent 70%)';
                glowRing2.style.background = 'radial-gradient(circle, rgba(255, 215, 0, 0.15) 0%, transparent 60%)';
                toggleBtn.textContent = 'Switch to Day';
                document.querySelector('.city').textContent = 'San Francisco';
                document.querySelector('.country').textContent = 'CA, USA (Night)';
            } else {
                sun.style.background = 'radial-gradient(circle, #fff4b0 0%, #ffd700 30%, #ff8c00 70%, #ff6a00 100%)';
                sun.style.boxShadow = '0 0 80px rgba(255, 215, 0, 0.6), 0 0 160px rgba(255, 215, 0, 0.3), 0 0 240px rgba(255, 215, 0, 0.1)';
                glowRing.style.background = 'radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%)';
                glowRing2.style.background = 'radial-gradient(circle, rgba(255, 215, 0, 0.2) 0%, transparent 60%)';
                toggleBtn.textContent = 'Switch to Night';
                document.querySelector('.city').textContent = 'San Francisco';
                document.querySelector('.country').textContent = 'CA, USA';
            }
        }

        // ===== EVENT LISTENERS =====
        toggleBtn.addEventListener('click', toggleDayNight);

        tempUpBtn.addEventListener('click', () => {
            setTemperature(currentTemp + 5);
        });

        tempDownBtn.addEventListener('click', () => {
            setTemperature(currentTemp - 5);
        });

        // ===== INIT =====
        setTemperature(72);

        // Auto-rotate sun
        setInterval(() => {
            if (!isNight) {
                sun.style.transform = 'rotate(' + (parseInt(sun.style.transform?.replace(/[^0-9]/g, '') || 0) + 1) + 'deg)';
            }
        }, 50);

        // Cloud drift animation speed variation
        document.querySelectorAll('.cloud').forEach((cloud, i) => {
            const duration = 20 + i * 5;
            cloud.style.animationDuration = duration + 's';
            cloud.style.animationDelay = -(i * 3) + 's';
        });
    </script>
</body>
</html>
