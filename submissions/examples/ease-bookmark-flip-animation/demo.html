<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bookmark Save Flip | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="bookmark-showcase-wrapper">
    <header class="showcase-header">
      <h1>Animated Bookmark Flip</h1>
      <p>A subtle, satisfying flip animation to simulate saving content.</p>
    </header>

    <div class="demo-area">
      
      <!-- Bookmark Component 1: SVG Icon -->
      <button class="ease-bookmark-btn" aria-label="Save to bookmarks">
        <svg class="ease-bookmark-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
        </svg>
        <span class="btn-text">Save Article</span>
      </button>

      <!-- Bookmark Component 2: Emoji variation -->
      <button class="ease-bookmark-btn" aria-label="Save to bookmarks">
        <span class="ease-bookmark-icon emoji-icon">🔖</span>
        <span class="btn-text">Bookmark</span>
      </button>
      
    </div>
    
  </div>

</body>
</html>
