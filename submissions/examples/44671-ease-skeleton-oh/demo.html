<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-skeleton</title>
  <meta name="description" content="Skeleton screen loader for cards, text blocks, and avatars with shimmer effect.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-skeleton</h1>
      <p class="subtitle" id="main-desc">Skeleton screen loader with shimmer effect</p>
    </header>

    <div class="display-area">
      
      <div class="skeleton-demo">
        <h3>Text Skeleton</h3>
        <div class="ease-skeleton ease-skeleton--text"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 85%;"></div>
        <div class="ease-skeleton ease-skeleton--text" style="width: 70%;"></div>
      </div>

      <div class="skeleton-demo">
        <h3>Card Skeleton</h3>
        <div class="ease-skeleton ease-skeleton--card">
          <div class="card-content">
            <div class="ease-skeleton ease-skeleton--avatar"></div>
            <div class="ease-skeleton ease-skeleton--text" style="width: 60%;"></div>
            <div class="ease-skeleton ease-skeleton--text" style="width: 80%;"></div>
          </div>
        </div>
      </div>

      <div class="skeleton-demo">
        <h3>Avatar Skeletons</h3>
        <div class="avatar-row">
          <div class="ease-skeleton ease-skeleton--avatar ease-skeleton--avatar-sm"></div>
          <div class="ease-skeleton ease-skeleton--avatar"></div>
          <div class="ease-skeleton ease-skeleton--avatar ease-skeleton--avatar-lg"></div>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
