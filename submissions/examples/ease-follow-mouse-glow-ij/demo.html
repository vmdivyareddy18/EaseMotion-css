<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Follow Mouse Glow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="mg-container" id="glowArea">
    <h1>Follow Mouse Glow</h1>
    <p class="mg-desc">Move your cursor around — the glow follows with a smooth trailing effect.</p>
    <button class="mg-toggle" id="toggleBtn">Disable</button>
    <div class="mg-glow" id="glow"></div>
  </main>

  <script>
    const area = document.getElementById("glowArea");
    const glow = document.getElementById("glow");
    const toggle = document.getElementById("toggleBtn");
    let enabled = true;
    let targetX = -200, targetY = -200;
    let currentX = -200, currentY = -200;

    area.addEventListener("mousemove", (e) => {
      const rect = area.getBoundingClientRect();
      targetX = e.clientX - rect.left;
      targetY = e.clientY - rect.top;
    });

    area.addEventListener("mouseleave", () => {
      targetX = -200;
      targetY = -200;
    });

    function animate() {
      currentX += (targetX - currentX) * 0.1;
      currentY += (targetY - currentY) * 0.1;
      if (enabled) {
        glow.style.transform = `translate(${currentX}px, ${currentY}px)`;
      }
      requestAnimationFrame(animate);
    }
    animate();

    toggle.addEventListener("click", () => {
      enabled = !enabled;
      toggle.textContent = enabled ? "Disable" : "Enable";
      if (!enabled) {
        glow.style.opacity = "0";
      } else {
        glow.style.opacity = "var(--mg-opacity)";
      }
    });
  </script>
</body>
</html>
