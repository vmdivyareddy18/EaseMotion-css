<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Code Snippet - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Code Snippet Block</h1>
      <p>Click the "Copy" button to see the pure CSS state transition.</p>
    </header>

    <!-- Code Block Wrapper -->
    <div class="code-block ease-zoom-in ease-delay-100">
      
      <!-- Code Header -->
      <div class="code-header">
        <div class="header-left">
          <span class="lang-badge">JavaScript</span>
          <span class="file-name">animation.js</span>
        </div>
        
        <!-- Pure CSS Copy Button -->
        <input type="checkbox" id="copy-toggle" class="copy-checkbox">
        <label for="copy-toggle" class="copy-btn ease-hover-grow">
          <span class="copy-text">
            <span class="icon-copy">📋</span> Copy
          </span>
          <span class="copied-text">
            <span class="icon-check">✓</span> Copied!
          </span>
        </label>
      </div>

      <!-- Code Content -->
      <div class="code-content">
        <pre><code>
<span class="line ease-fade-in-left ease-delay-200"><span class="line-num">1</span><span class="token keyword">import</span> <span class="token punctuation">{</span> <span class="token variable">animate</span> <span class="token punctuation">}</span> <span class="token keyword">from</span> <span class="token string">'easemotion'</span><span class="token punctuation">;</span></span>

<span class="line ease-fade-in-left ease-delay-300"><span class="line-num">2</span></span>

<span class="line ease-fade-in-left ease-delay-400"><span class="line-num">3</span><span class="token comment">// Add smooth entrance animations</span></span>

<span class="line ease-fade-in-left ease-delay-500"><span class="line-num">4</span><span class="token keyword">const</span> <span class="token variable">element</span> <span class="token operator">=</span> document<span class="token punctuation">.</span><span class="token function">querySelector</span><span class="token punctuation">(</span><span class="token string">'.card'</span><span class="token punctuation">)</span><span class="token punctuation">;</span></span>

<span class="line ease-fade-in-left ease-delay-600"><span class="line-num">5</span><span class="token function">animate</span><span class="token punctuation">(</span><span class="token variable">element</span><span class="token punctuation">,</span> <span class="token string">'ease-fade-in-up'</span><span class="token punctuation">)</span><span class="token punctuation">;</span></span>

<span class="line ease-fade-in-left ease-delay-700"><span class="line-num">6</span><span class="cursor ease-pulse">_</span></span>
        </code></pre>
      </div>

    </div>
  </div>
</body>
</html>
