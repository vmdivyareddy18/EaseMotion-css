<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Gradient Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Presentation canvas for demo display */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-gradient-card" tabindex="0" role="region" aria-label="Interactive dynamic mesh element">

    <div class="ease-gradient-content">
      <span class="content-tag">Engine Model</span>
      <h2>Dynamic Mesh Core</h2>
      <p>A high-performance shifting backdrop component utilizing fluid vector translations mapped across canvas background strings.</p>
    </div>
  </div>
