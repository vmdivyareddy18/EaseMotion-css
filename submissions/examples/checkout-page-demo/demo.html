<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Page Demo</title>

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="checkout">

<h1 class="ease-fade-in">
Checkout
</h1>

<div class="container">

<div class="form-section ease-slide-up">

<h2>Billing Information</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email Address" required>

<input type="text" placeholder="Phone Number" required>

<input type="text" placeholder="Street Address" required>

<div class="row">

<input type="text" placeholder="City">

<input type="text" placeholder="ZIP Code">

</div>

<select>
<option>Credit Card</option>
<option>Debit Card</option>
<option>UPI</option>
<option>Net Banking</option>
</select>

</form>

</div>

<div class="summary ease-slide-up">

<h2>Order Summary</h2>

<div class="item">
<span>Gaming Laptop</span>
<span>$999</span>
</div>

<div class="item">
<span>Wireless Mouse</span>
<span>$49</span>
</div>

<div class="item">
<span>Shipping</span>
<span>Free</span>
</div>

<hr>

<div class="total">
<span>Total</span>
<span>$1048</span>
</div>

<button class="place-order ease-hover-grow">
Place Order
</button>

</div>

</div>

</section>

</body>
</html>
