<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-toast-notification-collection Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-toast-demo-controls">
  <button class="btn-success" onclick="showToast('success')">Success Toast</button>
  <button class="btn-error" onclick="showToast('error')">Error Toast</button>
  <button class="btn-warning" onclick="showToast('warning')">Warning Toast</button>
  <button class="btn-info" onclick="showToast('info')">Info Toast</button>
</div>

<div class="ease-toast-container" id="toastContainer"></div>

<script>
  const toastData = {
    success: { icon: '✓', title: 'Success', message: 'Your changes have been saved.' },
    error:   { icon: '✕', title: 'Error', message: 'Something went wrong. Try again.' },
    warning: { icon: '!', title: 'Warning', message: 'Please double-check your input.' },
    info:    { icon: 'i', title: 'Info', message: 'A new update is available.' }
  };

  function showToast(type) {
    const container = document.getElementById('toastContainer');
    const data = toastData[type];

    const toast = document.createElement('div');
    toast.className = `ease-toast ease-toast--${type}`;
    toast.innerHTML = `
      <span class="ease-toast__icon">${data.icon}</span>
      <div class="ease-toast__content">
        <p class="ease-toast__title">${data.title}</p>
        <p class="ease-toast__message">${data.message}</p>
      </div>
      <button class="ease-toast__close" aria-label="Close">&times;</button>
      <div class="ease-toast__progress"></div>
    `;

    container.appendChild(toast);

    const dismiss = () => {
      toast.classList.add('ease-toast--dismiss');
      setTimeout(() => toast.remove(), 300);
    };

    toast.querySelector('.ease-toast__close').addEventListener('click', dismiss);
    setTimeout(dismiss, 4000);
  }
</script>

</body>
</html>
