<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Outline Button - Info and Warning - EaseMotion CSS</title>

  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1>Outline Button — Info and Warning</h1>
    <p class="description">
      Self-contained demo of the proposed
      <code>.ease-btn-outline-info</code> and
      <code>.ease-btn-outline-warning</code> button variants. The
      existing <code>.ease-btn-outline</code> (primary) is shown
      for reference.
    </p>

    <section class="btn-row">
      <button class="ease-btn ease-btn-outline">Primary</button>
      <code>.ease-btn-outline</code>
    </section>

    <section class="btn-row">
      <button class="ease-btn ease-btn-outline-info">Info</button>
      <code>.ease-btn-outline-info</code>
    </section>

    <section class="btn-row">
      <button class="ease-btn ease-btn-outline-warning">Warning</button>
      <code>.ease-btn-outline-warning</code>
    </section>

  </div>

</body>
</html>
