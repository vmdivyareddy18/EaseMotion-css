<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Rhythm Tap</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎵 Rhythm Tap</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🎯 Score</span>
        <span class="stat-value" id="scoreDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📊 Accuracy</span>
        <span class="stat-value" id="accuracyDisplay">—</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📈 Level</span>
        <span class="stat-value" id="levelDisplay">1</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Best</span>
        <span class="stat-value" id="bestDisplay">0</span>
      </div>
    </div>

    <div class="game-area">
      <div class="rhythm-circle" id="rhythmCircle">
        <div class="beat-indicator" id="beatIndicator"></div>
        <div class="tap-target" id="tapTarget">
          <span class="tap-text">TAP</span>
        </div>
        <div class="score-ring" id="scoreRing"></div>
      </div>
      <div class="beat-track" id="beatTrack">
        <!-- Beat markers generated by JavaScript -->
      </div>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Game</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
      <button class="control-btn" id="tempoBtn">⏱️ Tempo</button>
    </div>

    <div class="controls-hint">
      <span>🖱️ Click circle or press <kbd>Space</kbd> to tap</span>
      <span>·</span>
      <span>🎯 Hit the beats accurately!</span>
    </div>

    <div class="game-status" id="gameStatus">🎵 Click Start to begin the rhythm!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const rhythmCircle = document.getElementById('rhythmCircle');
      const beatIndicator = document.getElementById('beatIndicator');
      const tapTarget = document.getElementById('tapTarget');
      const scoreRing = document.getElementById('scoreRing');
      const beatTrack = document.getElementById('beatTrack');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const accuracyDisplay = document.getElementById('accuracyDisplay');
      const levelDisplay = document.getElementById('levelDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const tempoBtn = document.getElementById('tempoBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Audio Context ----------
      let audioCtx = null;

      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playTone(frequency, duration = 0.08, volume = 0.3) {
        try {
          if (!audioCtx) return;
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.type = 'sine';
          osc.frequency.value = frequency;
          gain.gain.setValueAtTime(volume, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
          osc.start(audioCtx.currentTime);
          osc.stop(audioCtx.currentTime + duration);
        } catch (e) {}
      }

      function playHitSound() {
        playTone(880, 0.06, 0.4);
        setTimeout(() => playTone(1100, 0.04, 0.3), 50);
      }

      function playMissSound() {
        playTone(300, 0.15, 0.2);
      }

      function playBeatSound() {
        playTone(440, 0.05, 0.15);
      }

      // ---------- Game State ----------
      let score = 0;
      let level = 1;
      let bestScore = parseInt(localStorage.getItem('rhythmBestScore')) || 0;
      let totalBeats = 0;
      let hitBeats = 0;
      let accuracy = 0;
      let gameRunning = false;
      let gameLoop = null;
      let beatInterval = null;
      let tempo = 120; // BPM
      let beatCount = 0;
      let beatsPerMeasure = 4;
      let currentBeatIndex = 0;
      let beatPattern = [];
      let hitWindow = 0.15; // seconds
      let lastBeatTime = 0;
      let isTapping = false;
      let tapCooldown = false;

      // ---------- Tempo Presets ----------
      const TEMPOS = [80, 100, 120, 140, 160, 180];
      let tempoIndex = 2;

      // ---------- Best Score ----------
      bestDisplay.textContent = bestScore;

      // ---------- Beat Pattern Generation ----------
      function generatePattern(level) {
        const pattern = [];
        const length = 16 + level * 2;
        const complexity = Math.min(level, 6);
        
        for (let i = 0; i < length; i++) {
          // Higher level = more complex patterns
          let shouldHit = false;
          const rand = Math.random();
          
          if (i % 4 === 0) {
            // Strong beat - almost always a hit
            shouldHit = rand < 0.9;
          } else if (i % 2 === 0) {
            // Medium beat
            shouldHit = rand < (0.5 + complexity * 0.05);
          } else {
            // Off-beat
            shouldHit = rand < (0.2 + complexity * 0.04);
          }
          
          // Add some syncopation for higher levels
          if (level > 3 && i % 3 === 0 && i % 4 !== 0) {
            shouldHit = !shouldHit;
          }
          
          pattern.push(shouldHit);
        }
        
        return pattern;
      }

      // ---------- Beat Track Visualization ----------
      function renderBeatTrack() {
        beatTrack.innerHTML = '';
        const totalBeats = beatPattern.length;
        
        for (let i = 0; i < totalBeats; i++) {
          const marker = document.createElement('div');
          marker.className = 'beat-marker';
          if (beatPattern[i]) {
            marker.classList.add('active');
          }
          if (i % 4 === 0) {
            marker.classList.add('strong');
          }
          marker.dataset.index = i;
          beatTrack.appendChild(marker);
        }
      }

      function updateBeatTrack(currentIndex) {
        const markers = beatTrack.querySelectorAll('.beat-marker');
        markers.forEach((marker, i) => {
          marker.classList.remove('current', 'hit', 'miss');
          if (i === currentIndex) {
            marker.classList.add('current');
          }
          if (i < currentIndex) {
            if (beatPattern[i] && marker.dataset.hit === 'true') {
              marker.classList.add('hit');
            } else if (beatPattern[i] && marker.dataset.hit === 'false') {
              marker.classList.add('miss');
            }
          }
        });
      }

      // ---------- Rhythm Circle Animation ----------
      function pulseCircle() {
        rhythmCircle.classList.add('pulse');
        setTimeout(() => rhythmCircle.classList.remove('pulse'), 200);
      }

      function showHitFeedback() {
        tapTarget.classList.add('hit-feedback');
        setTimeout(() => tapTarget.classList.remove('hit-feedback'), 200);
        playHitSound();
      }

      function showMissFeedback() {
        tapTarget.classList.add('miss-feedback');
        setTimeout(() => tapTarget.classList.remove('miss-feedback'), 300);
        playMissSound();
      }

      function updateScoreRing(percent) {
        const radius = 90;
        const circumference = 2 * Math.PI * radius;
        const offset = circumference - (percent / 100) * circumference;
        scoreRing.style.strokeDasharray = circumference;
        scoreRing.style.strokeDashoffset = offset;
        
        // Color based on accuracy
        if (percent > 80) {
          scoreRing.style.stroke = '#4caf50';
        } else if (percent > 60) {
          scoreRing.style.stroke = '#ffc107';
        } else if (percent > 40) {
          scoreRing.style.stroke = '#ff9800';
        } else {
          scoreRing.style.stroke = '#f44336';
        }
      }

      // ---------- Game Logic ----------
      function startGame() {
        if (gameRunning) return;
        initAudio();
        
        score = 0;
        level = 1;
        totalBeats = 0;
        hitBeats = 0;
        accuracy = 100;
        beatCount = 0;
        currentBeatIndex = 0;
        isTapping = false;
        tapCooldown = false;
        
        generateLevel();
        updateUI();
        setGameStatus('🎵 Tap to the beat!', true);
        
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Playing...';
        tempoBtn.disabled = true;
        
        gameRunning = true;
        startLoop();
      }

      function generateLevel() {
        beatPattern = generatePattern(level);
        renderBeatTrack();
        currentBeatIndex = 0;
        beatCount = 0;
        // Reset marker hit states
        const markers = beatTrack.querySelectorAll('.beat-marker');
        markers.forEach(m => {
          m.dataset.hit = 'false';
        });
      }

      function startLoop() {
        if (gameLoop) cancelAnimationFrame(gameLoop);
        const interval = 60000 / tempo / 4; // 16th note timing
        lastBeatTime = performance.now();
        
        function loop() {
          if (!gameRunning) return;
          
          const now = performance.now();
          const elapsed = (now - lastBeatTime) / 1000;
          const beatDuration = 60 / tempo / 4; // seconds per 16th note
          
          if (elapsed >= beatDuration) {
            lastBeatTime = now;
            advanceBeat();
          }
          
          gameLoop = requestAnimationFrame(loop);
        }
        
        loop();
      }

      function advanceBeat() {
        if (!gameRunning) return;
        
        beatCount++;
        const wasHit = beatPattern[currentBeatIndex];
        
        // Check if player tapped in time
        const markers = beatTrack.querySelectorAll('.beat-marker');
        const currentMarker = markers[currentBeatIndex];
        
        if (wasHit) {
          if (isTapping) {
            // Hit!
            hitBeats++;
            score += 10 + Math.floor(accuracy / 10);
            currentMarker.dataset.hit = 'true';
            showHitFeedback();
            pulseCircle();
            playBeatSound();
          } else {
            // Missed!
            currentMarker.dataset.hit = 'false';
            showMissFeedback();
            score = Math.max(0, score - 5);
          }
        } else {
          // No beat here - if player tapped, it's a miss
          if (isTapping) {
            currentMarker.dataset.hit = 'false';
            showMissFeedback();
            score = Math.max(0, score - 3);
          }
        }
        
        isTapping = false;
        tapCooldown = true;
        setTimeout(() => { tapCooldown = false; }, 50);
        
        totalBeats++;
        accuracy = totalBeats > 0 ? Math.round((hitBeats / totalBeats) * 100) : 100;
        
        // Move to next beat
        currentBeatIndex++;
        updateBeatTrack(currentBeatIndex);
        updateUI();
        
        // Check if pattern complete
        if (currentBeatIndex >= beatPattern.length) {
          // Level complete!
          const bonus = Math.floor(accuracy / 10) * 10;
          score += bonus;
          level++;
          setGameStatus(`🎉 Level ${level-1} Complete! +${bonus} bonus!`, true);
          generateLevel();
          updateUI();
          
          // Increase tempo slightly
          if (tempo < TEMPOS[TEMPOS.length - 1]) {
            tempo = TEMPOS[Math.min(tempoIndex + 1, TEMPOS.length - 1)];
            tempoIndex = Math.min(tempoIndex + 1, TEMPOS.length - 1);
            updateTempoDisplay();
          }
          setGameStatus(`🎵 Level ${level} - Faster tempo!`, true);
        }
      }

      // ---------- Tap Handling ----------
      function handleTap() {
        if (!gameRunning) return;
        if (tapCooldown) return;
        
        isTapping = true;
        
        // Immediate visual feedback
        tapTarget.classList.add('tap-flash');
        setTimeout(() => tapTarget.classList.remove('tap-flash'), 100);
        
        // Check if there's a beat at current position
        const wasHit = beatPattern[currentBeatIndex];
        if (!wasHit) {
          // Tapped when no beat - still a miss but we handle it in advanceBeat
          playMissSound();
        }
      }

      // ---------- UI Updates ----------
      function updateUI() {
        scoreDisplay.textContent = score;
        accuracyDisplay.textContent = totalBeats > 0 ? accuracy + '%' : '—';
        levelDisplay.textContent = level;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('rhythmBestScore', bestScore.toString());
          bestDisplay.textContent = bestScore;
        }
        updateScoreRing(accuracy);
      }

      function updateTempoDisplay() {
        tempoBtn.textContent = `⏱️ ${tempo} BPM`;
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Reset ----------
      function resetGame() {
        gameRunning = false;
        if (gameLoop) cancelAnimationFrame(gameLoop);
        gameLoop = null;
        
        score = 0;
        level = 1;
        totalBeats = 0;
        hitBeats = 0;
        accuracy = 100;
        beatCount = 0;
        currentBeatIndex = 0;
        isTapping = false;
        tapCooldown = false;
        tempo = 120;
        tempoIndex = 2;
        
        beatPattern = generatePattern(level);
        renderBeatTrack();
        updateBeatTrack(0);
        updateUI();
        updateTempoDisplay();
        
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        tempoBtn.disabled = false;
        
        setGameStatus('🔄 Game reset. Click Start to play!', true);
        rhythmCircle.classList.remove('pulse');
        tapTarget.classList.remove('hit-feedback', 'miss-feedback');
        
        // Reset score ring
        updateScoreRing(0);
      }

      // ---------- Tempo Change ----------
      function cycleTempo() {
        if (gameRunning) return;
        tempoIndex = (tempoIndex + 1) % TEMPOS.length;
        tempo = TEMPOS[tempoIndex];
        updateTempoDisplay();
        setGameStatus(`⏱️ Tempo set to ${tempo} BPM`, true);
      }

      // ---------- Event Listeners ----------
      // Click on circle
      tapTarget.addEventListener('click', (e) => {
        e.stopPropagation();
        if (!gameRunning) {
          startGame();
          return;
        }
        handleTap();
      });

      // Keyboard
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          if (!gameRunning) {
            startGame();
          } else {
            handleTap();
          }
        }
        if (e.key === 'r' || e.key === 'R') {
          resetGame();
        }
        if (e.key === 't' || e.key === 'T') {
          cycleTempo();
        }
      });

      // Touch support
      tapTarget.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameRunning) {
          startGame();
          return;
        }
        handleTap();
      }, { passive: false });

      // Button listeners
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);
      tempoBtn.addEventListener('click', cycleTempo);

      // ---------- Init ----------
      function init() {
        beatPattern = generatePattern(level);
        renderBeatTrack();
        updateBeatTrack(0);
        updateUI();
        updateTempoDisplay();
        bestDisplay.textContent = bestScore;
        setGameStatus('🎵 Click Start or press Space to begin!', true);
      }

      // Clean up on page unload
      window.addEventListener('beforeunload', () => {
        if (gameLoop) cancelAnimationFrame(gameLoop);
      });

      init();
    })();
  </script>
</body>
</html>
