<!DOCTYPE html>
<html>
<head>
  <title>Advanced Speed Dial UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2 style="text-align:center;">Speed Dial Pro UI</h2>
<p style="text-align:center;">Click the button to open quick actions</p>

<div class="fab-container">
  
  <button class="fab main" onclick="toggleMenu()">+</button>

  <div class="fab-options" id="menu">
    
    <div class="item">
      <button>🏠</button>
      <span>Home</span>
    </div>

    <div class="item">
      <button>📧</button>
      <span>Email</span>
    </div>

    <div class="item">
      <button>📁</button>
      <span>Projects</span>
    </div>

    <div class="item">
      <button>⚙️</button>
      <span>Settings</span>
    </div>

  </div>

</div>

<script>
function toggleMenu() {
  document.getElementById("menu").classList.toggle("open");
}
</script>

</body>
</html>
