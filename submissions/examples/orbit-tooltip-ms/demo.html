<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Tooltip</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #0f172a; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="content-container ease-fade-in-up">
    <h2>Explore Universe</h2>
    
    <div class="planet-container">
      <!-- Hovering over this element triggers the tooltip and orbit -->
      <div class="planet ease-pulse">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#2dd4bf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <ellipse cx="12" cy="12" rx="10" ry="3" transform="rotate(-45 12 12)"></ellipse>
        </svg>
      </div>
      
      <!-- The Orbiting satellite -->
      <div class="satellite-orbit">
        <div class="satellite"></div>
      </div>
      
      <!-- The actual Tooltip -->
      <div class="orbit-tooltip">
        <strong>Kepler-186f</strong>
        <p>An exoplanet orbiting a red dwarf star.</p>
      </div>
    </div>
    
  </div>

</body>
</html>
