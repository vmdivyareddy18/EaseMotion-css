<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Interactive Star Rating Hover Component</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-star-glow">
  <input type="radio" name="star" id="st5" value="5"><label for="st5">★</label>
  <input type="radio" name="star" id="st4" value="4"><label for="st4">★</label>
  <input type="radio" name="star" id="st3" value="3"><label for="st3">★</label>
  <input type="radio" name="star" id="st2" value="2"><label for="st2">★</label>
  <input type="radio" name="star" id="st1" value="1"><label for="st1">★</label>
</div>
</body>
</html>
