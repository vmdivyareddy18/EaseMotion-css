<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Double Focus Border Glow Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #f8fafc;
      --ease-color-surface:        #ffffff;
      --ease-color-text:           #1e293b;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #e2e8f0;
      --ease-radius-md:            0.5rem;
      --ease-radius-lg:            1rem;
      --ease-font-sans:            system-ui, -apple-system, 'Segoe UI', sans-serif;
      --ease-shadow-md:            0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -1px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ease-color-bg:       #0b1121;
        --ease-color-surface:  #141e33;
        --ease-color-text:     #e2e8f0;
        --ease-color-muted:    #94a3b8;
        --ease-color-neutral-200: #334155;
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ease-color-text);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .instruction-note {
      font-size: 0.85rem;
      background: rgba(108, 99, 255, 0.08);
      color: var(--ease-color-primary);
      padding: 0.6rem 1rem;
      border-radius: 6px;
      margin-top: 0.8rem;
      display: inline-block;
      font-weight: 500;
    }

    /* ── Form and component layouts ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-md);
      border-radius: var(--ease-radius-lg);
      padding: 2.5rem;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 1.8rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ease-color-text);
    }

    .text-input {
      padding: 0.75rem 1rem;
      border-radius: var(--ease-radius-md);
      border: 1px solid var(--ease-color-neutral-200);
      background: var(--ease-color-surface);
      color: var(--ease-color-text);
      font-size: 0.95rem;
      width: 100%;
    }

    /* ── Action Buttons ── */
    .btn {
      padding: 0.75rem 1.5rem;
      border-radius: var(--ease-radius-md);
      border: none;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background: var(--ease-color-primary);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--ease-color-primary-dark, #4b44cc);
    }

    /* Link styling */
    .link-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 0.5rem;
    }

    .nav-link {
      font-size: 0.85rem;
      color: var(--ease-color-muted);
      text-decoration: none;
      font-weight: 500;
      border-radius: 4px;
      padding: 2px 4px;
    }

    .nav-link:hover {
      color: var(--ease-color-primary);
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Double Focus Border Glow</h1>
    <p>
      An accessible and premium focus state designed for keyboard navigation. 
    </p>
    <div class="instruction-note">
      ⌨️ Press <strong>Tab</strong> to navigate through the inputs and buttons below.
    </div>
  </header>

  <main class="showcase-container">
    <div class="form-group">
      <label for="email">Email Address</label>
      <input 
        type="email" 
        id="email" 
        class="text-input double-focus-glow-uj" 
        placeholder="Enter your email" 
      />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input 
        type="password" 
        id="password" 
        class="text-input double-focus-glow-uj" 
        placeholder="Enter your password" 
      />
    </div>

    <button class="btn btn-primary double-focus-glow-uj">
      Sign In
    </button>

    <div class="link-group">
      <a href="#" class="nav-link double-focus-glow-uj">Forgot Password?</a>
      <a href="#" class="nav-link double-focus-glow-uj">Create Account</a>
    </div>
  </main>

</body>
</html>
