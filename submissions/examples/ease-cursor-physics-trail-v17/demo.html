<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Physics Cursor Trail</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Physics Cursor Trail ⚡</h1>
  <p class="ease-slide-up">Smooth inertia-based motion</p>
</section>

<script>
const dots = [];
const total = 12;

let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };

document.addEventListener("mousemove", e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});

// create dots
for (let i = 0; i < total; i++) {
  const div = document.createElement("div");
  div.classList.add("dot");
  document.body.appendChild(div);
  dots.push({ el: div, x: mouse.x, y: mouse.y });
}

// animation loop
function animate() {
  let x = mouse.x;
  let y = mouse.y;

  dots.forEach((dot, i) => {
    dot.x += (x - dot.x) * 0.25;
    dot.y += (y - dot.y) * 0.25;

    dot.el.style.left = dot.x + "px";
    dot.el.style.top = dot.y + "px";

    x = dot.x;
    y = dot.y;
  });

  requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
