<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minimalist Stat Cards — EaseMotion CSS Showcase</title>
    <meta
      name="description"
      content="A clean, minimalist layout design for stat cards featuring borderless floating-text metrics and responsive CSS grid alignment."
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Theme Toggle Button -->
    <button
      id="theme-toggle-btn"
      class="theme-toggle"
      aria-label="Toggle visual theme"
      title="Toggle dark/light theme"
    >
      <svg id="theme-icon" viewBox="0 0 24 24">
        <!-- Sun icon paths -->
        <path
          class="sun-icon-path"
          d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"
        />
      </svg>
    </button>

    <main class="demo-container">
      <header class="demo-header">
        <h1>Minimalist Stat Cards</h1>
        <p>
          Clean, minimalist layouts optimized for modern landing pages. Bulk
          borders and backgrounds are replaced with a elegant, side-by-side
          floating aesthetic.
        </p>
      </header>

      <!-- Expected Structure -->
      <div id="stat-card-wrapper-id" class="stat-card-wrapper">
        <div class="stat-card" tabindex="0">
          <span class="stat-value">42+</span>
          <p class="stat-label">Utilities</p>
        </div>
        <div class="stat-card" tabindex="0">
          <span class="stat-value">12</span>
          <p class="stat-label">Animations</p>
        </div>
        <div class="stat-card" tabindex="0">
          <span class="stat-value">0</span>
          <p class="stat-label">Dependencies</p>
        </div>
      </div>
    </main>

    <script>
      // Theme Toggler JS
      const toggleBtn = document.getElementById("theme-toggle-btn");
      const htmlElement = document.documentElement;

      // Load saved preference or default to dark
      const savedTheme = localStorage.getItem("demo-theme") || "dark";
      htmlElement.setAttribute("data-theme", savedTheme);

      toggleBtn.addEventListener("click", () => {
        const currentTheme = htmlElement.getAttribute("data-theme");
        const newTheme = currentTheme === "light" ? "dark" : "light";
        htmlElement.setAttribute("data-theme", newTheme);
        localStorage.setItem("demo-theme", newTheme);
      });
    </script>
  </body>
</html>
