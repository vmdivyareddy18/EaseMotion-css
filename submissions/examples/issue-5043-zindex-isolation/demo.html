<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fix Demo - z-index isolation #5043</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f0f0f; color: #fff; }
    .stage {
      position: relative; height: 250px; border: 1px dashed #555;
      margin-bottom: 2rem;
    }
    .ease-card {
      position: absolute; width: 180px; height: 120px;
      border-radius: 10px; display: flex; align-items: center;
      justify-content: center; font-weight: bold; color: #fff;
    }
    .card-a {
      top: 40px; left: 40px; background: #6c63ff;
      animation: floatA 3s ease-in-out infinite;
    }
    .card-b {
      top: 80px; left: 120px; background: #ff6363;
      animation: floatB 3s ease-in-out infinite;
    }
    @keyframes floatA {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes floatB {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(15px); }
    }
  </style>
</head>
<body>

  <h3>Overlapping animated cards - with isolation: isolate</h3>
  <p style="color:#aaa">
    Card A (purple) should always stay on top of Card B (red),
    matching their DOM order, even as both animate and overlap.
  </p>
  <div class="stage">
    <div class="ease-card card-a">Card A (on top)</div>
    <div class="ease-card card-b">Card B (below)</div>
  </div>

</body>
</html>
