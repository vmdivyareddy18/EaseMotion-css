<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Typography Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual typography showcase demonstrating kinetic split-text letters revealing themselves dynamically.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Showcase</span>
      <h1>Kinetic Typography</h1>
      <p class="description">
        Demonstrates split-letter animations. Click the trigger button below 
        to restart the staggered text reveal.
      </p>
    </header>

    <main class="showcase">
      <div class="showcase-card">
        <!-- Split Text under Test -->
        <h2 class="split-text" id="target-text">
          <span style="--letter-index: 1;">K</span>
          <span style="--letter-index: 2;">I</span>
          <span style="--letter-index: 3;">N</span>
          <span style="--letter-index: 4;">E</span>
          <span style="--letter-index: 5;">T</span>
          <span style="--letter-index: 6;">I</span>
          <span style="--letter-index: 7;">C</span>
        </h2>

        <button class="trigger-btn" onclick="replayReveal()">Replay Animation</button>
      </div>
    </main>
  </div>

  <script>
    function replayReveal() {
      const textNode = document.getElementById('target-text');
      const spans = Array.from(textNode.children);
      textNode.innerHTML = '';
      spans.forEach(span => {
        textNode.appendChild(span);
      });
    }
  </script>

</body>
</html>
