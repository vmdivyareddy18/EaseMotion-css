<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EaseMotion Animation Gallery</title>

<link rel="stylesheet" href="../dist/easemotion.css">
<link rel="stylesheet" href="comparison-gallery.css">

</head>

<body>

<h1>Animation Comparison Gallery</h1>

<div class="gallery">

<div class="card">
<div class="preview em-fade-in">Fade</div>
<button onclick="replay(this)">Replay</button>
</div>

<div class="card">
<div class="preview em-slide-left">Slide Left</div>
<button onclick="replay(this)">Replay</button>
</div>

<div class="card">
<div class="preview em-slide-right">Slide Right</div>
<button onclick="replay(this)">Replay</button>
</div>

<div class="card">
<div class="preview em-zoom-in">Zoom</div>
<button onclick="replay(this)">Replay</button>
</div>

<div class="card">
<div class="preview em-bounce">Bounce</div>
<button onclick="replay(this)">Replay</button>
</div>

<div class="card">
<div class="preview em-rotate">Rotate</div>
<button onclick="replay(this)">Replay</button>
</div>

</div>

<script>

function replay(btn){

const box=btn.previousElementSibling;

box.classList.remove(...box.classList);

void box.offsetWidth;

box.className="preview "+box.dataset.animation;

}

document.querySelectorAll(".preview").forEach(box=>{

const cls=[...box.classList].find(c=>c.startsWith("em-"));

box.dataset.animation=cls;

});

</script>

</body>
</html>
