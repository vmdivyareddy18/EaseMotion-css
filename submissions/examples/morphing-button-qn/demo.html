<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morphing Button - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Animated Morphing Button</h2>
        <p>Click the button to see it morph through states</p>
        
        <!-- Hidden checkbox to control states -->
        <input type="checkbox" id="morph-trigger-qn" class="morph-checkbox-qn">
        
        <!-- The Button Container -->
        <label for="morph-trigger-qn" class="morph-btn-qn">
            <!-- Button Text -->
            <span class="btn-text-qn">Submit</span>
            
            <!-- Loading Spinner -->
            <span class="btn-loader-qn"></span>
            
            <!-- Success Checkmark -->
            <span class="btn-check-qn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </span>
        </label>
    </div>
</body>
</html>
