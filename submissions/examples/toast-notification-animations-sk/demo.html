<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notifications - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Link to dedicated example styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-center ease-flex-col">
    <h1 class="ease-reveal ease-reveal-up">Toast Notifications</h1>
    <p class="ease-text-muted ease-reveal ease-reveal-up ease-delay-100">Click the buttons to trigger real-time feedback animations.</p>
  </div>

  <div class="controls ease-reveal ease-reveal-up ease-delay-200">
    
    <!-- Trigger by Type -->
    <div class="control-group">
      <h3>By Type</h3>
      <button class="ease-btn ease-btn-success" onclick="Toast.show({ type: 'success', title: 'Success', message: 'Profile updated successfully!' })">Success Toast</button>
      <button class="ease-btn ease-btn-danger" onclick="Toast.show({ type: 'error', title: 'Error', message: 'Failed to save changes.' })">Error Toast</button>
      <button class="ease-btn ease-btn-warning" onclick="Toast.show({ type: 'warning', title: 'Warning', message: 'Insecure password detected.' })">Warning Toast</button>
      <button class="ease-btn ease-btn-info" onclick="Toast.show({ type: 'info', title: 'Info', message: 'A new version is available.' })">Info Toast</button>
    </div>

    <!-- Trigger by Position -->
    <div class="control-group">
      <h3>By Position</h3>
      <div class="ease-grid ease-grid-cols-2 ease-gap-2">
        <button class="ease-btn ease-btn-outline" onclick="Toast.show({ position: 'top-left', animation: 'slide-left', message: 'Top Left' })">Top Left</button>
        <button class="ease-btn ease-btn-outline" onclick="Toast.show({ position: 'top-right', animation: 'slide-right', message: 'Top Right' })">Top Right</button>
        <button class="ease-btn ease-btn-outline" onclick="Toast.show({ position: 'bottom-left', animation: 'slide-left', message: 'Bottom Left' })">Bottom Left</button>
        <button class="ease-btn ease-btn-outline" onclick="Toast.show({ position: 'bottom-right', animation: 'slide-right', message: 'Bottom Right' })">Bottom Right</button>
      </div>
    </div>

    <!-- Trigger by Animation -->
    <div class="control-group">
      <h3>By Animation</h3>
      <button class="ease-btn ease-btn-ghost" onclick="Toast.show({ animation: 'slide-right', message: 'Sliding from right...' })">Slide Animation</button>
      <button class="ease-btn ease-btn-ghost" onclick="Toast.show({ animation: 'fade-scale', message: 'Fading and scaling...' })">Fade Scale Animation</button>
    </div>

  </div>

  <!-- Include toast script -->
  <script src="script.js"></script>
  <!-- Include reveal.js for entrance animations -->
  <script src="../../../core/reveal.js"></script>
</body>
</html>
