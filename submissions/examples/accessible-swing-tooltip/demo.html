<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Swing-Hover Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="content-wrapper">
        <header class="section-header">
            <h1>Registration Form</h1>
            <p>Please fill out the details below. Fields marked with an information icon provide additional clarity.</p>
        </header>

        <form class="accessible-form" onsubmit="event.preventDefault();">
            <div class="form-group">
                <div class="label-row">
                    <label id="cvv-label" for="cvv-input">Security Code (CVV)</label>
                    
                    <div class="tooltip-container">
                        <button type="button" 
                                class="tooltip-trigger" 
                                aria-labelledby="cvv-label"
                                aria-describedby="cvv-instructions" 
                                aria-expanded="false">
                            <span class="visually-hidden">Helpful information:</span>
                            <span class="icon-fallback" aria-hidden="true">?</span>
                        </button>
                        
                        <div id="cvv-instructions" class="tooltip-bubble" role="tooltip">
                            <div class="tooltip-arrow"></div>
                            <p>The 3-digit code located on the back signature strip of your payment card.</p>
                        </div>
                    </div>
                </div>
                
                <input type="text" id="cvv-input" class="form-input" maxlength="3" placeholder="e.g., 123" autocomplete="off">
            </div>
        </form>
    </main>

    <script>
        // Managing state programmatically via ARIA attributes for Assistive Technologies (Screen Readers)
        const trigger = document.querySelector('.tooltip-trigger');
        const container = document.querySelector('.tooltip-container');

        const setExpanded = (state) => trigger.setAttribute('aria-expanded', state);

        container.addEventListener('mouseenter', () => setExpanded('true'));
        container.addEventListener('mouseleave', () => setExpanded('false'));
        
        trigger.addEventListener('focus', () => setExpanded('true'));
        trigger.addEventListener('blur', () => setExpanded('false'));
    </script>
</body>
</html>
