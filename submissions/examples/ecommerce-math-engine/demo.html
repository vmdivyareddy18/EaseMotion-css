<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS E-Commerce Product Customizer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">
    <div class="ease-product-customizer">
      <!-- Math & State Engine (Hidden) -->
      <input type="radio" id="color-blue" name="color" class="state-toggle" checked />
      <input type="radio" id="color-red" name="color" class="state-toggle" />
      <input type="checkbox" id="addon-leather" class="state-toggle" />
      <input type="checkbox" id="addon-warranty" class="state-toggle" />

      <!-- Dynamic Image Crossfade Layer -->
      <div class="product-display">
        <div class="product-img blue-watch">
          <div class="emoji">⌚</div>
          <div>Blue Edition</div>
        </div>
        <div class="product-img red-watch">
          <div class="emoji">⌚</div>
          <div style="color: #ef4444;">Red Edition</div>
        </div>
      </div>

      <div class="product-controls">
        <h3 class="title">Customize your Watch</h3>
        
        <div class="color-options">
          <label for="color-blue" class="color-swatch bg-blue"></label>
          <label for="color-red" class="color-swatch bg-red"></label>
        </div>
        
        <div class="addons">
          <label for="addon-leather" class="addon-btn">
            <span>Premium Leather Strap</span>
            <span class="price-tag">+$50</span>
          </label>
          <label for="addon-warranty" class="addon-btn">
            <span>2-Year Extended Warranty</span>
            <span class="price-tag">+$30</span>
          </label>
        </div>
      </div>

      <!-- Real-time Mathematical Output -->
      <div class="price-calculator">
        <div class="price-label">Total Price:</div>
        <div class="total-price"></div>
      </div>
    </div>
  </div>

</body>
</html>
