<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Fill Current Demo</title>
</head>
<body>
  <h1>Fill Current Utility</h1>
  
  <div class="icon-wrapper" style="color: #ef4444;">
    <svg width="50" height="50" viewBox="0 0 24 24" class="fill-current">
      <circle cx="12" cy="12" r="10" />
    </svg>
    <p>The SVG circle inherits the text color (red) via the fill-current utility.</p>
  </div>
</body>
</html>
