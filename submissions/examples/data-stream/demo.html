<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data Stream Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="terminal-box">
    <div class="terminal-header">
      <div class="dot-indicators">
        <div class="dot green"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div>CORE_DATA_STREAM</div>
    </div>

    <!-- Data Columns Waterfall -->
    <div class="stream-container">
      <div class="stream-col col-1">
        <span>0</span><span>1</span><span>0</span><span>0</span><span>1</span><span>1</span><span>0</span><span>1</span><span>0</span><span>1</span>
      </div>
      <div class="stream-col col-2">
        <span>1</span><span>0</span><span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>0</span><span>1</span><span>1</span>
      </div>
      <div class="stream-col col-3">
        <span>0</span><span>0</span><span>1</span><span>0</span><span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>0</span>
      </div>
      <div class="stream-col col-4">
        <span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>0</span><span>1</span><span>1</span><span>0</span><span>1</span>
      </div>
      <div class="stream-col col-5">
        <span>0</span><span>1</span><span>0</span><span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>0</span><span>0</span>
      </div>
      <div class="stream-col col-6">
        <span>1</span><span>0</span><span>1</span><span>0</span><span>0</span><span>1</span><span>1</span><span>0</span><span>1</span><span>1</span>
      </div>
      <div class="stream-col col-7">
        <span>0</span><span>0</span><span>1</span><span>1</span><span>0</span><span>1</span><span>0</span><span>1</span><span>0</span><span>0</span>
      </div>
      <div class="stream-col col-8">
        <span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>1</span><span>0</span><span>0</span><span>1</span><span>1</span>
      </div>
    </div>
  </div>

</body>
</html>
