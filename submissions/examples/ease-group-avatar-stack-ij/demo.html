<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-group-avatar-stack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="gas-container">
    <h1>Team Members</h1>
    <div class="gas-stack" id="gasStack">
      <div class="gas-avatar" data-name="Jane Doe">
        <div class="gas-img" style="background:#6c63ff">JD</div>
      </div>
      <div class="gas-avatar" data-name="John Miles">
        <div class="gas-img" style="background:#ff6584">JM</div>
      </div>
      <div class="gas-avatar" data-name="Alice Liu">
        <div class="gas-img" style="background:#45c4a0">AL</div>
      </div>
      <div class="gas-avatar" data-name="Bob Reyes">
        <div class="gas-img" style="background:#f2b705">BR</div>
      </div>
      <div class="gas-avatar" data-name="Carol Chen">
        <div class="gas-img" style="background:#ff6b6b">CC</div>
      </div>
      <div class="gas-avatar" data-name="David Kim">
        <div class="gas-img" style="background:#4ecdc4">DK</div>
      </div>
      <div class="gas-avatar gas-avatar--overflow">
        <div class="gas-img" style="background:#2a2a3e">+3</div>
      </div>
    </div>
  </div>
  <script>
    const stack = document.getElementById('gasStack');
    const tooltip = document.createElement('div');
    tooltip.className = 'gas-tooltip';
    document.body.appendChild(tooltip);

    stack.querySelectorAll('.gas-avatar:not(.gas-avatar--overflow)').forEach(el => {
      el.addEventListener('mouseenter', e => {
        tooltip.textContent = el.dataset.name;
        tooltip.style.opacity = '1';
        const rect = el.getBoundingClientRect();
        tooltip.style.left = rect.left + rect.width / 2 + 'px';
        tooltip.style.top = rect.top - 10 + 'px';
      });
      el.addEventListener('mouseleave', () => { tooltip.style.opacity = '0'; });
    });
  </script>
</body>
</html>
