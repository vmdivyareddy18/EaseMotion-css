<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Dashboard</h2>

<!-- Tabs -->
<div class="tabs">
  <button onclick="showTab(0)">Home</button>
  <button onclick="showTab(1)">Stats</button>
</div>

<div class="tab-content active">Welcome to Dashboard</div>
<div class="tab-content">Stats Section</div>

<!-- Progress -->
<div class="progress">
  <div class="bar"></div>
</div>

<!-- Buttons -->
<button onclick="showToast()">Show Toast</button>
<button onclick="openModal()">Open Modal</button>

<!-- Toast -->
<div id="toast">Action successful!</div>

<!-- Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <span onclick="closeModal()">X</span>
    <p>This is modal</p>
  </div>
</div>

<script>
function showTab(i){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".tab-content")[i].classList.add("active");
}

function showToast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}
function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
