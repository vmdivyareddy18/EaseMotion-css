<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Blur In Fast - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-blur-fast">Snap Clarity</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-blur-fast'); void b.offsetWidth; b.classList.add('ease-blur-fast');">Snap</button>
    </div>
</body>
</html>
