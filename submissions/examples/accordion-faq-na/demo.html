<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="faq">
  <div class="item">
    <button onclick="toggle(0)">What is this?</button>
    <p>This is an accordion component.</p>
  </div>

  <div class="item">
    <button onclick="toggle(1)">How it works?</button>
    <p>Click to expand or collapse.</p>
  </div>
</div>

<script>
function toggle(index) {
  const items = document.querySelectorAll(".item p");
  items[index].classList.toggle("active");
}
</script>

</body>
</html>
