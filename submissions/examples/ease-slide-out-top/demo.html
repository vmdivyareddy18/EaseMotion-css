<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide-Out Top Exit - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-slide-out-top" id="toastDismissCard">
    <span style="font-size: 2rem; display: block; margin-bottom: 0.5rem;">📤</span>
    <h3 style="margin: 0; font-size: 1.2rem; font-weight: 700;">Directional Exit</h3>
    <p style="margin: 8px 0 0 0; font-size: 0.88rem; color: #94a3b8; line-height: 1.5;">
      Slides upward and out to exactly -30px while running a smooth opacity fade decay.
    </p>
  </div>

  <button class="trigger-action-btn" id="btnTriggerExit">Trigger Exit Dismissal</button>

  <script>
    const card = document.getElementById('toastDismissCard');
    const button = document.getElementById('btnTriggerExit');

    button.addEventListener('click', () => {
      // Discharges running properties to reset the compositor framework cleanly
      card.style.animation = 'none';
      card.offsetHeight; /* Force element reflow check to capture structural updates */
      card.style.animation = 'slide-out-top-keyframes 0.3s cubic-bezier(0.4, 0, 1, 1) forwards';
    });
  </script>

</body>
</html>
