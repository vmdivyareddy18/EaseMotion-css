<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Download Button Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Animated Download Button</h2>
      <p class="subtitle">An interactive button component with smooth loading states and progress completion.</p>
      
      <div class="demo-wrapper">
        <button class="download-btn" id="downloadBtn">
          <span class="btn-text">Download Asset</span>
          <span class="btn-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </span>
          <div class="progress-bar"></div>
          <span class="success-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </span>
        </button>
      </div>

      <button class="reset-btn" id="resetBtn">Reset Button State</button>
    </div>
  </div>

  <script>
    const downloadBtn = document.getElementById('downloadBtn');
    const resetBtn = document.getElementById('resetBtn');

    downloadBtn.addEventListener('click', () => {
      if (downloadBtn.classList.contains('loading') || downloadBtn.classList.contains('success')) return;
      
      downloadBtn.classList.add('loading');
      
      // Simulate download progress
      setTimeout(() => {
        downloadBtn.classList.remove('loading');
        downloadBtn.classList.add('success');
      }, 3000); // 3 seconds download animation
    });

    resetBtn.addEventListener('click', () => {
      downloadBtn.className = 'download-btn';
    });
  </script>
</body>
</html>
