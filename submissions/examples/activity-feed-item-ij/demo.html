<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Feed Item - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Activity Feed</h1>

    <div class="feed-card">
      <div class="feed-header">
        <span class="feed-title">Recent Activity</span>
        <button class="add-btn" id="addBtn">+ Add Event</button>
      </div>
      <div class="feed-list" id="feedList">
        <div class="feed-item new-item">
          <div class="feed-avatar" style="background: #3b82f6;">S</div>
          <div class="feed-body">
            <span class="feed-user">Sarah Chen</span>
            <span class="feed-action">created a new invoice</span>
            <span class="feed-time">2 min ago</span>
          </div>
        </div>
        <div class="feed-item new-item">
          <div class="feed-avatar" style="background: #22c55e;">M</div>
          <div class="feed-body">
            <span class="feed-user">Mike Torres</span>
            <span class="feed-action">deployed to production</span>
            <span class="feed-time">15 min ago</span>
          </div>
        </div>
        <div class="feed-item new-item">
          <div class="feed-avatar" style="background: #f59e0b;">L</div>
          <div class="feed-body">
            <span class="feed-user">Lisa Park</span>
            <span class="feed-action">commented on #342</span>
            <span class="feed-time">1 hr ago</span>
          </div>
        </div>
      </div>
    </div>

    <p class="description">New items slide in from the top with a fade. Existing items reflow smoothly to make room.</p>
  </div>

  <script>
    const feedList = document.getElementById('feedList');
    const addBtn = document.getElementById('addBtn');
    const names = ['Alex Kim', 'Jordan Lee', 'Riley Smith', 'Taylor Brown', 'Casey Jones'];
    const actions = ['merged a PR', 'assigned a task', 'uploaded a file', 'updated the roadmap', 'resolved a ticket'];
    const colors = ['#8b5cf6', '#ec4899', '#06b6d4', '#f97316', '#14b8a6'];

    let idx = 0;
    addBtn.addEventListener('click', () => {
      const n = names[idx % names.length];
      const a = actions[idx % actions.length];
      const c = colors[idx % colors.length];
      idx++;

      const item = document.createElement('div');
      item.className = 'feed-item new-item';
      item.innerHTML = `
        <div class="feed-avatar" style="background: ${c};">${n[0]}</div>
        <div class="feed-body">
          <span class="feed-user">${n}</span>
          <span class="feed-action">${a}</span>
          <span class="feed-time">Just now</span>
        </div>
      `;
      feedList.prepend(item);
      requestAnimationFrame(() => item.classList.add('visible'));
    });
  </script>
</body>
</html>
