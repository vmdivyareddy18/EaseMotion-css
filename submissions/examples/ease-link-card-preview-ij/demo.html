<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Link Card — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Link Card Preview</h2>
    <p class="card-demo">Hover each link to see a preview</p>
    <div class="demo-area">
      <div class="ease-link-card-preview">
        <a href="https://github.com" class="preview-link">GitHub</a>
        <div class="preview-popup">
          <strong>GitHub</strong>
          <span>Collaborate on code, manage projects, and build software.</span>
        </div>
      </div>
      <div class="ease-link-card-preview">
        <a href="https://developer.mozilla.org" class="preview-link">MDN Docs</a>
        <div class="preview-popup">
          <strong>MDN Web Docs</strong>
          <span>Comprehensive documentation for web technologies.</span>
        </div>
      </div>
      <div class="ease-link-card-preview">
        <a href="https://codepen.io" class="preview-link">CodePen</a>
        <div class="preview-popup">
          <strong>CodePen</strong>
          <span>Build, test, and share front-end code snippets.</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
