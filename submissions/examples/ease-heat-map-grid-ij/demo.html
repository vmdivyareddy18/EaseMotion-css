<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heat Map Grid | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>🔥 Heat Map Grid</h1>
    <p class="subtitle">Cells pulse with animated intensity — hover to trigger a burst</p>

    <div class="grid-container" id="heatGrid"
         style="--grid-bg: #0f0f13; --cold-color: #1e3a5f; --hot-color: #ef4444; --animate-duration: 2s;">
    </div>

    <div class="controls">
      <label>Cold Color <input type="color" id="coldPicker" value="#1e3a5f"></label>
      <label>Hot Color <input type="color" id="hotPicker" value="#ef4444"></label>
      <label>Animation Speed <input type="range" id="speedRange" min="0.5" max="4" step="0.25" value="2"></label>
    </div>
  </div>

  <script>
    const grid = document.getElementById('heatGrid');
    const cold = document.getElementById('coldPicker');
    const hot = document.getElementById('hotPicker');
    const speed = document.getElementById('speedRange');

    function randomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function initGrid() {
      grid.innerHTML = '';
      const rows = 6, cols = 10;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'heat-cell';
          cell.dataset.base = randomInt(10, 90);
          cell.style.setProperty('--intensity', cell.dataset.base + '%');
          cell.addEventListener('mouseenter', () => {
            cell.style.setProperty('--intensity', '100%');
            setTimeout(() => {
              cell.style.setProperty('--intensity', cell.dataset.base + '%');
            }, 600);
          });
          grid.appendChild(cell);
        }
      }
    }

    function updateColors() {
      document.querySelectorAll('.heat-cell').forEach(cell => {
        cell.style.setProperty('--cold-color', cold.value);
        cell.style.setProperty('--hot-color', hot.value);
      });
    }

    cold.addEventListener('input', () => {
      grid.style.setProperty('--cold-color', cold.value);
    });
    hot.addEventListener('input', () => {
      grid.style.setProperty('--hot-color', hot.value);
    });
    speed.addEventListener('input', () => {
      grid.style.setProperty('--animate-duration', speed.value + 's');
    });

    initGrid();
  </script>
</body>
</html>
