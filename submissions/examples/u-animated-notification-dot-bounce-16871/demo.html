<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Dot Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Notification Dot Bounce</h1>

    <p>
      A lightweight notification indicator inspired by modern
      messaging and productivity applications.
    </p>

    <div class="demo-area">

      <button class="icon-button">
        🔔
        <span class="notification-dot"></span>
      </button>

      <button class="icon-button">
        💬
        <span class="notification-dot"></span>
      </button>

      <button class="icon-button">
        📧
        <span class="notification-dot"></span>
      </button>

    </div>

  </main>

</body>
</html>
