<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Tilt Screen Recorder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="recorder-card">

    <div class="screen">
        <div class="record-dot"></div>
        <span>Recording...</span>
    </div>

    <div class="controls">
        <button>Start</button>
        <button>Pause</button>
        <button>Stop</button>
    </div>

</div>

</body>
</html>
