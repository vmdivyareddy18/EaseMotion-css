<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaseMotion Tooltip Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Tooltip Example</h2>

  <button class="ease-btn" aria-describedby="tip1">
    Hover me
    <span class="ease-tooltip" id="tip1">I am a tooltip!</span>
  </button>

  <button class="ease-btn" aria-describedby="tip2">
    Focus me
    <span class="ease-tooltip" id="tip2">Tooltip on focus</span>
  </button>
</body>
</html>
