<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide Up Progress Ring</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">
    <h1>Animated Progress Ring</h1>

    <div class="progress-ring" role="progressbar" aria-label="Progress 75 percent">
      <div class="circle">
        <span>75%</span>
      </div>
    </div>

    <p>Finance Dashboard Style Progress Indicator</p>
  </main>

</body>
</html>
