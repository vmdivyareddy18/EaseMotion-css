<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Room Availability Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="room-title">
      <p class="eyebrow">Scheduling</p>
      <h1 id="room-title">Room availability</h1>
      <div class="room-timeline">
        <span class="slot is-available">09:00</span>
        <span class="slot is-held">09:30</span>
        <span class="slot is-booked">10:00</span>
        <span class="slot is-current">10:30</span>
        <span class="slot is-available">11:00</span>
      </div>
    </section>
  </main>
</body>
</html>
