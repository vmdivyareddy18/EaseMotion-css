<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Civilization Risk Observatory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="grid-dashboard">
    <header class="header">
      <span class="badge">Planetary observatory</span>
      <h1>Digital Civilization Risk Observatory</h1>
      <p class="subtitle">Planetary-scale threat mapping and digital risk grids.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-grid">
        <h3>🌍 Planetary Grid cells</h3>
        <div class="matrix-cells">
          <div class="cell critical"><span>Node A: Critical</span></div>
          <div class="cell warning"><span>Node B: Warning</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card impact-card">
          <h3>📊 Risk observatory stats</h3>
          <ul class="stats-list">
            <li>Sync Observatory: <strong>100%</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
