<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Accessible Web Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Accessible Modal
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn" aria-label="Close Modal">&times;</label>

        <div class="icon">♿</div>

        <h2>Accessible Experience</h2>

        <p>
            This modal demonstrates a high-contrast, keyboard-friendly layout
            with a smooth Elastic Bounce animation using only HTML and CSS.
        </p>

        <div class="actions">

            <button class="primary">Continue</button>
            <button class="secondary">Learn More</button>

        </div>

    </div>

</div>

</body>
</html>
