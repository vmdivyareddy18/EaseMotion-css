<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timeline Roadmap - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Project Roadmap</h1>
      <p class="description">
        A CSS-only Timeline / Roadmap Component visually displaying project
        phases.
      </p>

      <div class="timeline">
        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <h3>Phase 1</h3>
            <p>Project planning and research completed.</p>
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <h3>Phase 2</h3>
            <p>Core features developed and tested.</p>
          </div>
        </div>

        <div class="timeline-item">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <h3>Phase 3</h3>
            <p>Public launch and community feedback.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
