<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="catalog">

<div class="container">

<div class="badge">

Product Catalog

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Interactive tooltip component
designed for product catalog
interfaces with smooth
rotate-click transitions.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

View Product

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="product-icon">

🛍️

</div>

<h3>

Wireless Headphones

</h3>

<p>

Premium sound quality with
active noise cancellation
and fast charging support.

</p>

<div class="price">

₹4,999

</div>

</div>

</div>

</div>

</section>

</body>

</html>
