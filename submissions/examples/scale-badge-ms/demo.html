<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Badge</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <!-- Profile Card with Glassmorphism -->
  <div class="glass-card ease-fade-in-up">
    
    <div class="avatar-container">
      <img src="https://ui-avatars.com/api/?name=Jane+Doe&background=random&size=100" alt="Jane Doe" class="avatar">
      
      <!-- Scale Badge positioned absolutely on the avatar -->
      <div class="scale-badge ease-hover-pop">
        <span class="pulse-ring"></span>
        <span class="badge-content">PRO</span>
      </div>
    </div>
    
    <h2>Jane Doe</h2>
    <p>Senior UX Designer</p>
    
  </div>

</body>
</html>
