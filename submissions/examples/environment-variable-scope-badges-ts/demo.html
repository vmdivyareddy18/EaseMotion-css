<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Environment Variable Scope Badges</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="env-title">
      <p class="eyebrow">Developer settings</p>
      <h1 id="env-title">Environment scopes</h1>
      <div class="env-list">
        <div class="env-row is-development"><span>API_BASE_URL</span><b>Development</b></div>
        <div class="env-row is-preview"><span>OAUTH_REDIRECT</span><b>Preview</b></div>
        <div class="env-row is-production"><span>STRIPE_KEY</span><b>Production</b></div>
        <div class="env-row is-secret"><span>DATABASE_URL</span><b>Secret</b></div>
        <div class="env-row is-inherited"><span>LOG_LEVEL</span><b>Inherited</b></div>
      </div>
    </section>
  </main>
</body>
</html>
