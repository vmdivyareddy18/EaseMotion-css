<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Landing Page Tada-Click Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="landing-container">
        <div class="pricing-card">
            <div class="pricing-header">
                <span class="plan-name">Enterprise Plan</span>
                <div class="plan-price">$99<span class="price-period">/mo</span></div>
            </div>

            <p class="plan-description">
                Unlock full automation clusters, advanced analytics pipelines, and dedicated support.
            </p>

            <div class="tooltip-wrapper">
                <input type="checkbox" id="tada-toggle" class="tooltip-checkbox">

                <label for="tada-toggle" class="marketing-cta-label" role="button" tabindex="0" aria-haspopup="true"
                    aria-expanded="false">
                    Claim 30-Day Free Trial
                </label>

                <div id="marketing-tada-tooltip" class="marketing-tooltip" role="tooltip">
                    <span class="tooltip-badge">Limited Time Offer</span>
                    <p class="tooltip-body">No credit card required. Instantly cancel anytime with a single click from
                        your dashboard.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const labelButton = document.querySelector('.marketing-cta-label');
        const checkbox = document.getElementById('tada-toggle');

        labelButton.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                checkbox.checked = !checkbox.checked;
                labelButton.setAttribute('aria-expanded', checkbox.checked);
            }
        });
        checkbox.addEventListener('change', () => {
            labelButton.setAttribute('aria-expanded', checkbox.checked);
        });
    </script>
</body>

</html>
