<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toast Notification Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1>EaseMotion CSS</h1>
    <p>Click the buttons below to trigger customizable, animated toast notifications.</p>
    
    <div class="btn-grid">
      <button class="demo-btn btn-success" onclick="triggerToast('success')">Success Toast</button>
      <button class="demo-btn btn-error" onclick="triggerToast('error')">Error Toast</button>
      <button class="demo-btn btn-warning" onclick="triggerToast('warning')">Warning Toast</button>
      <button class="demo-btn btn-info" onclick="triggerToast('info')">Info Toast</button>
    </div>
  </div>

  <div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script>
    const Toast = {
      // Configuration Mapping for Icons and ARIA Roles
      config: {
        success: {
          icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`,
          role: 'status'
        },
        error: {
          icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>`,
          role: 'alert'
        },
        warning: {
          icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`,
          role: 'alert'
        },
        info: {
          icon: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
          role: 'status'
        }
      },

      show(message, type = 'info', duration = 4000) {
        const container = document.getElementById('toast-container');
        if (!container) return;

        // Create the toast element
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.setAttribute('role', this.config[type].role);

        // Toast Structure Injection
        toast.innerHTML = `
          <div class="toast-icon">${this.config[type].icon}</div>
          <div class="toast-content">${message}</div>
          <button class="toast-close" aria-label="Dismiss Notification">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        `;

        // Manual Close Event Listener
        const closeBtn = toast.querySelector('.toast-close');
        closeBtn.addEventListener('click', () => this.dismiss(toast));

        // Append to UI stack
        container.appendChild(toast);

        // Auto Dismiss Timeout configuration
        if (duration > 0) {
          setTimeout(() => {
            if (toast.parentNode) this.dismiss(toast);
          }, duration);
        }
      },

      dismiss(toast) {
        // Enforce the Exit Animation Sequence
        toast.classList.add('toast-exit');
        
        // Remove from DOM safely after CSS exit animation runtime completes
        toast.addEventListener('animationend', (e) => {
          if (e.animationName === 'toastFadeOut') {
            toast.remove();
          }
        });
      }
    };

    // Helper pipeline routing inputs from front-facing action triggers
    function triggerToast(type) {
      const texts = {
        success: "Action completed successfully! Form submitted.",
        error: "An unexpected error occurred. Please try again.",
        warning: "Warning: Your session expires in 5 minutes.",
        info: "Heads up! A new feature update is available."
      };
      Toast.show(texts[type], type);
    }
  </script>
</body>
</html>
