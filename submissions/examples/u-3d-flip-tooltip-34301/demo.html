<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

3D Flip Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="accessible">

<div class="container">

<div class="badge">

Accessible Web

</div>

<h1>

3D Flip Tooltip

</h1>

<p>

Accessible tooltip component
designed with keyboard support,
clear contrast and smooth
3D flip animations.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Accessibility Tips

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="icon">

♿

</div>

<h3>

Inclusive Experience

</h3>

<p>

Create better user experiences
through semantic structures,
focus states and accessible
interaction patterns.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
