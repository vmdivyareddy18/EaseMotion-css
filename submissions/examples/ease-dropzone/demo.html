<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-dropzone Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      min-height: 100vh;
      background: #f1f5f9;
      padding: 2rem;
    }
    h2 { color: #7c3aed; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      width: 100%;
      max-width: 700px;
    }
    label { font-size: 0.8rem; color: #64748b; margin-bottom: 0.25rem; display: block; }
  </style>
</head>
<body>

  <h2>ease-dropzone Component</h2>
  <p style="color:#64748b">Drag files onto the interactive zone or see all states below</p>

  <div class="grid">

    <!-- Idle state -->
    <div>
      <label>Idle (default)</label>
      <div class="ease-dropzone" id="dropzone"
        ondragover="event.preventDefault(); this.classList.add('ease-dropzone-active')"
        ondragleave="this.classList.remove('ease-dropzone-active')"
        ondrop="handleDrop(event)">
        <div class="ease-dropzone-icon">📁</div>
        <div class="ease-dropzone-text">Drag & drop files here</div>
        <div class="ease-dropzone-hint">or click to browse</div>
      </div>
    </div>

    <!-- Active/dragover state -->
    <div>
      <label>Active (dragover)</label>
      <div class="ease-dropzone ease-dropzone-active">
        <div class="ease-dropzone-icon">📂</div>
        <div class="ease-dropzone-text">Drop your files!</div>
        <div class="ease-dropzone-hint">Release to upload</div>
      </div>
    </div>

    <!-- Accepted state -->
    <div>
      <label>Accepted</label>
      <div class="ease-dropzone ease-dropzone-accepted">
        <div class="ease-dropzone-icon">✅</div>
        <div class="ease-dropzone-text">File accepted!</div>
        <div class="ease-dropzone-hint">document.pdf — 2.4 MB</div>
      </div>
    </div>

    <!-- Rejected state -->
    <div>
      <label>Rejected / Error</label>
      <div class="ease-dropzone ease-dropzone-rejected">
        <div class="ease-dropzone-icon">❌</div>
        <div class="ease-dropzone-text">File rejected</div>
        <div class="ease-dropzone-hint">Only PDF files allowed</div>
      </div>
    </div>

  </div>

  <script>
    function handleDrop(e) {
      e.preventDefault();
      const zone = document.getElementById('dropzone');
      zone.classList.remove('ease-dropzone-active');
      const file = e.dataTransfer.files[0];
      if (file) {
        zone.classList.add('ease-dropzone-accepted');
        zone.querySelector('.ease-dropzone-icon').textContent = '✅';
        zone.querySelector('.ease-dropzone-text').textContent = 'File accepted!';
        zone.querySelector('.ease-dropzone-hint').textContent = file.name + ' — ' + (file.size / 1024).toFixed(1) + ' KB';
      }
    }
  </script>

</body>
</html>
