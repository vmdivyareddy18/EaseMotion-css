<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Theremin</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="waveT wt1"></span>
    <span class="waveT wt2"></span>
    <div class="handT handPitch">
      <span class="palmT"></span>
      <span class="fingT ft1"></span>
      <span class="fingT ft2"></span>
      <span class="fingT ft3"></span>
      <span class="thumbT"></span>
    </div>
    <div class="handT handVol">
      <span class="palmT"></span>
      <span class="fingT ft1"></span>
      <span class="fingT ft2"></span>
      <span class="fingT ft3"></span>
      <span class="thumbT"></span>
    </div>
    <div class="unitT">
      <span class="cabT"></span>
      <span class="panelT"></span>
      <span class="knobT kn1"></span>
      <span class="knobT kn2"></span>
      <span class="knobT kn3"></span>
      <span class="pitchAnt"></span>
      <span class="volAnt"></span>
      <span class="fieldT fp"></span>
      <span class="fieldT fv"></span>
    </div>
    <span class="deskT"></span>
  </div>
</body>
</html>
