<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoundWave Player Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="player-workspace">
    <div class="music-card-container">
      
      <!-- Simulated Player Display Meta -->
      <div class="track-info-block">
        <h3>Neon Symphony</h3>
        <p>Cyber Horizon // Live Deck</p>
      </div>

      <!-- Pure CSS Interactive Color Shift Navigation Bar -->
      <nav class="color-shift-nav">
        <div class="nav-links-inner">
          <a href="#home" class="nav-item active">
            <span class="icon-node">🏠</span>
            <span class="label-node">Discover</span>
          </a>
          <a href="#search" class="nav-item">
            <span class="icon-node">🔍</span>
            <span class="label-node">Search</span>
          </a>
          <a href="#library" class="nav-item">
            <span class="icon-node">🎵</span>
            <span class="label-node">Library</span>
          </a>
          <a href="#profile" class="nav-item">
            <span class="icon-node">👤</span>
            <span class="label-node">Profile</span>
          </a>
        </div>
      </nav>

    </div>
  </main>

</body>
</html>
