<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Fade-In Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="glass-theme">
    <div class="glass-ambient-glow-1"></div>
    <div class="glass-ambient-glow-2"></div>

    <main class="dashboard-layout">
        <header class="glass-card panel-header">
            <span class="system-badge">System Status</span>
            <h1 class="system-title">Glassmorphic Core</h1>
            <p class="system-description">Hover or interact to preview high-performance GPU composited interface panels.</p>
            
            <!-- Anchor link to activate the Fade-In Popover -->
            <a href="#settings-popover" class="glass-trigger-btn">Configure Nodes</a>
        </header>
    </main>

    <!-- Pure CSS Fade-In Popover Overlay -->
    <div id="settings-popover" class="popover-backdrop">
        <!-- Close zone fallback to dismiss popover target -->
        <a href="#" class="popover-dismiss-area" aria-label="Dismiss settings"></a>
        
        <article class="glass-popover-card">
            <a href="#" class="glass-close-btn" aria-label="Close dialog">&times;</a>
            
            <header class="popover-header">
                <h3>Node Settings</h3>
                <div class="status-indicator-dot"></div>
            </header>

            <div class="popover-body">
                <p>Configure hardware layers and transition states below.</p>
                
                <div class="setting-row">
                    <span>Backdrop Filtering</span>
                    <span class="setting-toggle active">ON</span>
                </div>
                <div class="setting-row">
                    <span>GPU Compositing</span>
                    <span class="setting-toggle active">ON</span>
                </div>
            </div>
            
            <footer class="popover-footer">
                <a href="#" class="apply-btn">Apply Settings</a>
            </footer>
        </article>
    </div>
</body>
</html>
