<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vertical Timeline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="timeline-page">
    <h1>Project Timeline</h1>
    <div class="timeline">
      <div class="timeline-item left">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Q1 2026</span>
          <h3>Planning</h3>
          <p>Requirements gathering and architecture design.</p>
        </div>
      </div>
      <div class="timeline-item right">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Q2 2026</span>
          <h3>Development</h3>
          <p>Core feature implementation and component library.</p>
        </div>
      </div>
      <div class="timeline-item left">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Q3 2026</span>
          <h3>Testing</h3>
          <p>QA, bug fixes, and performance optimization.</p>
        </div>
      </div>
      <div class="timeline-item right">
        <div class="timeline-marker"></div>
        <div class="timeline-content">
          <span class="timeline-date">Q4 2026</span>
          <h3>Launch</h3>
          <p>Production deployment and monitoring setup.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
