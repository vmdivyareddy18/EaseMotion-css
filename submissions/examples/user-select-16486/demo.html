<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>User-Select Demo</title>
</head>
<body>
  <h1>User-Select Utilities</h1>
  
  <div class="demo-box select-none">
    You cannot select this text.
  </div>
  
  <div class="demo-box select-all">
    Clicking once selects all this text.
  </div>
  
  <div class="demo-box select-text">
    Standard text selection is enabled here.
  </div>
</body>
</html>
