<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette / Swatch Picker</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="swatch-card">
      <h3 class="swatch-title">Palette</h3>
      <div class="swatch-grid">
        <div class="swatch" style="background: #ef4444;" data-color="#ef4444"><span class="swatch-tip">#ef4444</span></div>
        <div class="swatch" style="background: #f59e0b;" data-color="#f59e0b"><span class="swatch-tip">#f59e0b</span></div>
        <div class="swatch" style="background: #22c55e;" data-color="#22c55e"><span class="swatch-tip">#22c55e</span></div>
        <div class="swatch" style="background: #3b82f6;" data-color="#3b82f6"><span class="swatch-tip">#3b82f6</span></div>
        <div class="swatch" style="background: #8b5cf6;" data-color="#8b5cf6"><span class="swatch-tip">#8b5cf6</span></div>
        <div class="swatch" style="background: #ec4899;" data-color="#ec4899"><span class="swatch-tip">#ec4899</span></div>
        <div class="swatch" style="background: #14b8a6;" data-color="#14b8a6"><span class="swatch-tip">#14b8a6</span></div>
        <div class="swatch" style="background: #f97316;" data-color="#f97316"><span class="swatch-tip">#f97316</span></div>
      </div>
      <div class="swatch-preview" id="swatchPreview">Click a swatch to preview</div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
