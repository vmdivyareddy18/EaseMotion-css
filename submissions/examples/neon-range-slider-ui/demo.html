<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Range Slider - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="slider-container">
    <div class="slider-header">
      <label for="neon-slider" class="slider-title">System Performance</label>
      <span class="neon-badge">Active Glow</span>
    </div>
    
    <div class="slider-wrapper">
      <input 
        type="range" 
        id="neon-slider" 
        min="0" 
        max="100" 
        value="65" 
        class="neon-slider"
      >
      <div class="glow-track-underlay"></div>
    </div>

    <div class="slider-footer">
      <span>0% (Min)</span>
      <span>100% (Max)</span>
    </div>
  </div>

</body>
</html>
