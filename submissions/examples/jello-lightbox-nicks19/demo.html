<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jello Lightbox - Retro Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffd23f; /* Bright Retro Yellow */
      background-image: 
        linear-gradient(45deg, #ffb347 25%, transparent 25%, transparent 75%, #ffb347 75%, #ffb347),
        linear-gradient(45deg, #ffb347 25%, transparent 25%, transparent 75%, #ffb347 75%, #ffb347);
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
      font-family: 'Press Start 2P', cursive;
      text-align: center;
    }

    h1 {
      color: #ff3366;
      text-shadow: 4px 4px 0px #222;
      margin-bottom: 40px;
      font-size: 1.5rem;
      letter-spacing: 2px;
    }

    /* Thumbnail Gallery */
    .demo-gallery {
      display: flex;
      gap: 30px;
    }

    .ease-thumbnail {
      width: 150px;
      height: 150px;
      border: 4px solid #222;
      box-shadow: 6px 6px 0px #222;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
    }

    .ease-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .ease-thumbnail:active {
      transform: translate(4px, 4px);
      box-shadow: 2px 2px 0px #222;
    }

  </style>
</head>
<body>

  <h1>RETRO PIXELS</h1>

  <div class="demo-gallery">
    <!-- Image 1 -->
    <label for="lightbox-toggle-1" class="ease-thumbnail">
      <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=400&q=80" alt="Retro Console">
    </label>

    <!-- Image 2 -->
    <label for="lightbox-toggle-2" class="ease-thumbnail">
      <img src="https://images.unsplash.com/photo-1614624532983-4ce03382d63d?auto=format&fit=crop&w=400&q=80" alt="Retro Tech">
    </label>
  </div>

  <!-- Lightbox 1 Setup -->
  <input type="checkbox" id="lightbox-toggle-1" class="ease-lightbox-toggle">
  
  <div class="ease-lightbox">
    <label for="lightbox-toggle-1" class="ease-lightbox-overlay"></label>
    
    <div class="ease-lightbox-content">
      <div class="ease-jello-container">
        <label for="lightbox-toggle-1" class="ease-lightbox-close">X</label>
        <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=800&q=80" alt="Retro Console Full">
        <div class="ease-lightbox-caption">INSERT COIN TO CONTINUE...</div>
      </div>
    </div>
  </div>

  <!-- Lightbox 2 Setup -->
  <input type="checkbox" id="lightbox-toggle-2" class="ease-lightbox-toggle">
  
  <div class="ease-lightbox">
    <label for="lightbox-toggle-2" class="ease-lightbox-overlay"></label>
    
    <div class="ease-lightbox-content">
      <div class="ease-jello-container">
        <label for="lightbox-toggle-2" class="ease-lightbox-close">X</label>
        <img src="https://images.unsplash.com/photo-1614624532983-4ce03382d63d?auto=format&fit=crop&w=800&q=80" alt="Retro Tech Full">
        <div class="ease-lightbox-caption">PLAYER 2 HAS ENTERED</div>
      </div>
    </div>
  </div>

</body>
</html>
