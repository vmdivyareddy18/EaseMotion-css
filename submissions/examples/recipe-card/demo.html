<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recipe Cookbook Card — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 4rem 1rem; margin: 0;">

  <div class="ease-recipe-container" id="recipeContainer">
    <div class="ease-recipe-card-inner">
      
      <div class="ease-recipe-face ease-recipe-front">
        <div class="ease-recipe-media">
          <img class="ease-recipe-img" src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80" alt="Avocado Salad Bowl" />
        </div>
        <div class="ease-recipe-hero-content">
          <div>
            <h3 class="ease-recipe-title">Zesty Avocado Salad</h3>
            <div class="ease-recipe-meta-grid">
              <span>⏱ 15 Mins</span>
              <span>🔥 240 Kcal</span>
              <span>🥗 Easy Prep</span>
            </div>
          </div>
          <button class="ease-btn-flip" id="viewIngredientsBtn">View Ingredients</button>
        </div>
      </div>

      <div class="ease-recipe-face ease-recipe-back">
        <div class="ease-recipe-header-back">
          <h4 class="ease-recipe-subtitle">Ingredients</h4>
          <button class="ease-btn-flip-back" id="closeIngredientsBtn">Back</button>
        </div>
        
        <div class="ease-checklist-container">
          <label class="ease-checklist-label">
            <input type="checkbox" class="ease-checklist-checkbox" />
            <span class="ease-checklist-text">2 Ripe Avocados (Diced)</span>
          </label>
          <label class="ease-checklist-label">
            <input type="checkbox" class="ease-checklist-checkbox" />
            <span class="ease-checklist-text">1 Cup Cherry Tomatoes</span>
          </label>
          <label class="ease-checklist-label">
            <input type="checkbox" class="ease-checklist-checkbox" />
            <span class="ease-checklist-text">1 tbsp Olive Oil (Extra Virgin)</span>
          </label>
          <label class="ease-checklist-label">
            <input type="checkbox" class="ease-checklist-checkbox" />
            <span class="ease-checklist-text">Fresh Lime Juice & Pepper</span>
          </label>
        </div>

        <div style="margin-top: auto; font-size: 0.8rem; text-align: center; color: #94a3b8;">
          Check items off to track prep progress
        </div>
      </div>

    </div>
  </div>

  <script>
    const container = document.getElementById('recipeContainer');
    const viewBtn = document.getElementById('viewIngredientsBtn');
    const closeBtn = document.getElementById('closeIngredientsBtn');

    // 3D card flip execution toggles
    viewBtn.addEventListener('click', () => container.classList.add('is-flipped'));
    closeBtn.addEventListener('click', () => container.classList.remove('is-flipped'));
  </script>
</body>
</html>
