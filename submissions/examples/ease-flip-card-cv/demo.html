<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated Flip Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Flip Cards</h1>

<div class="cards">

<div class="flip-card horizontal blue">
    <div class="flip-inner">

        <div class="front">
            <h2>Frontend</h2>
            <p>Hover Me</p>
        </div>

        <div class="back">
            <h3>HTML • CSS • JS</h3>
            <p>Responsive UI Components</p>
        </div>

    </div>
</div>

<div class="flip-card vertical purple">
    <div class="flip-inner">

        <div class="front">
            <h2>Backend</h2>
            <p>Hover Me</p>
        </div>

        <div class="back">
            <h3>Node.js</h3>
            <p>Express • MongoDB</p>
        </div>

    </div>
</div>

</div>

</div>

</body>
</html>
