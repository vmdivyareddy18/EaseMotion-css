<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Dropdown Select Multi</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    padding: 80px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 60px;
    min-height: 100vh;
    margin: 0;
  }
  h2 { color: #e2e8f0; margin: 0 0 20px; font-weight: 500; font-size: 18px; }
  .demo-card {
    background: #1e293b;
    border-radius: 12px;
    padding: 32px;
    width: 380px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .demo-row {
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
</style>
</head>
<body>

  <div class="demo-row">
    <div class="demo-card">
      <h2>Default</h2>
      <div class="ease-multi-dropdown" data-dropdown>
        <div class="ease-multi-dropdown__trigger" data-trigger>
          <div class="ease-multi-dropdown__pills" data-pills>
            <span class="ease-multi-dropdown__placeholder">Select skills...</span>
          </div>
          <svg class="ease-multi-dropdown__arrow" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="ease-multi-dropdown__menu" data-menu>
          <div class="ease-multi-dropdown__option" data-value="react">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            React
          </div>
          <div class="ease-multi-dropdown__option" data-value="vue">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            Vue
          </div>
          <div class="ease-multi-dropdown__option" data-value="svelte">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            Svelte
          </div>
          <div class="ease-multi-dropdown__option" data-value="angular">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            Angular
          </div>
        </div>
      </div>
    </div>

    <div class="demo-card" style="--pill-bg: #22c55e; --dropdown-bg: #1a1a2e;">
      <h2>Custom Colors</h2>
      <div class="ease-multi-dropdown" data-dropdown style="--pill-bg: #22c55e; --dropdown-bg: #1a1a2e;">
        <div class="ease-multi-dropdown__trigger" data-trigger>
          <div class="ease-multi-dropdown__pills" data-pills>
            <span class="ease-multi-dropdown__placeholder">Pick languages...</span>
          </div>
          <svg class="ease-multi-dropdown__arrow" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div class="ease-multi-dropdown__menu" data-menu>
          <div class="ease-multi-dropdown__option" data-value="js">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            JavaScript
          </div>
          <div class="ease-multi-dropdown__option" data-value="ts">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            TypeScript
          </div>
          <div class="ease-multi-dropdown__option" data-value="python">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            Python
          </div>
          <div class="ease-multi-dropdown__option" data-value="go">
            <div class="ease-multi-dropdown__checkbox"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
            Go
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  document.querySelectorAll('[data-dropdown]').forEach(dropdown => {
    const trigger = dropdown.querySelector('[data-trigger]');
    const menu = dropdown.querySelector('[data-menu]');
    const pills = dropdown.querySelector('[data-pills]');
    const placeholder = pills.querySelector('.ease-multi-dropdown__placeholder');
    const options = dropdown.querySelectorAll('[data-value]');
    const selected = new Set();

    trigger.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('is-open');
    });

    options.forEach(opt => {
      opt.addEventListener('click', () => {
        const val = opt.dataset.value;
        const label = opt.childNodes[opt.childNodes.length - 1].textContent.trim();
        if (selected.has(val)) {
          selected.delete(val);
          opt.classList.remove('is-selected');
          const pill = pills.querySelector(`[data-pill="${val}"]`);
          if (pill) pill.remove();
        } else {
          selected.add(val);
          opt.classList.add('is-selected');
          const pill = document.createElement('span');
          pill.className = 'ease-multi-dropdown__pill';
          pill.dataset.pill = val;
          pill.innerHTML = `${label}<span class="ease-multi-dropdown__pill-remove" data-remove="${val}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>`;
          if (placeholder) placeholder.remove();
          pills.appendChild(pill);
          pill.querySelector('[data-remove]').addEventListener('click', (e) => {
            e.stopPropagation();
            selected.delete(val);
            opt.classList.remove('is-selected');
            pill.remove();
            if (selected.size === 0) {
              pills.innerHTML = '<span class="ease-multi-dropdown__placeholder">Select skills...</span>';
            }
          });
        }
        if (selected.size === 0 && !pills.querySelector('.ease-multi-dropdown__placeholder')) {
          pills.innerHTML = '<span class="ease-multi-dropdown__placeholder">Select skills...</span>';
        }
      });
    });

    document.addEventListener('click', (e) => {
      if (!dropdown.contains(e.target)) {
        dropdown.classList.remove('is-open');
      }
    });
  });
</script>

</body>
</html>
