<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel-Style Glowing Grid Portal Dashboard</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="ease-grid-portal" id="gridPortal">
    <div class="ease-grid-lines"></div>
    
    <div style="text-align: center; margin-bottom: 3rem; position: relative; z-index: 1;">
      <h1 style="color: #ffffff; font-size: 2.5rem; margin-bottom: 0.5rem; font-weight: 800;">Dashboard Grid Portal</h1>
      <p style="color: rgba(255, 255, 255, 0.4); font-size: 0.95rem; max-width: 500px; margin: 0 auto;">
        Move your mouse over the screen to reveal the glowing ambient neon vector grid. Hover individual cards to see localized border shines and smooth 3D parallax tilts.
      </p>
    </div>

    <div class="ease-glow-grid">
      <!-- CPU Card -->
      <div class="ease-glow-card" data-glow="primary">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">⚡</span>
            <span class="card-title">CPU Performance</span>
          </div>
          <div class="card-metric" id="cpuMetric">74%</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="cpuBar" style="width: 74%;"></div>
          </div>
        </div>
      </div>

      <!-- Network Card -->
      <div class="ease-glow-card" data-glow="secondary">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🌐</span>
            <span class="card-title">Network Ingress</span>
          </div>
          <div class="card-metric" id="netMetric">1.2 GB/s</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="netBar" style="width: 60%;"></div>
          </div>
        </div>
      </div>

      <!-- RAM Card -->
      <div class="ease-glow-card" data-glow="success">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🧠</span>
            <span class="card-title">Memory Buffer</span>
          </div>
          <div class="card-metric" id="ramMetric">58%</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="ramBar" style="width: 58%;"></div>
          </div>
        </div>
      </div>

      <!-- Database Query Card -->
      <div class="ease-glow-card" data-glow="warning">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🗄️</span>
            <span class="card-title">Database Operations</span>
          </div>
          <div class="card-metric" id="dbMetric">340 q/s</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="dbBar" style="width: 85%;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Cursor radial mask coordinates tracking
    const portal = document.getElementById('gridPortal');
    portal.addEventListener('mousemove', (e) => {
      const rect = portal.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      portal.style.setProperty('--mouse-x', `${x}px`);
      portal.style.setProperty('--mouse-y', `${y}px`);
    });

    // Isolated 3D card tilt transformations
    const cards = document.querySelectorAll('.ease-glow-card');
    cards.forEach(card => {
      const body = card.querySelector('.ease-glow-card-body');
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        const nx = x / (rect.width / 2);
        const ny = y / (rect.height / 2);
        
        body.style.transform = `perspective(1000px) rotateX(${-ny * 8}deg) rotateY(${nx * 8}deg) scale3d(1.02, 1.02, 1.02)`;
      });
      card.addEventListener('mouseleave', () => {
        body.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
      });
    });

    // Real-time metric simulation values
    setInterval(() => {
      const cpu = Math.floor(Math.random() * 30) + 40;
      document.getElementById('cpuMetric').textContent = `${cpu}%`;
      document.getElementById('cpuBar').style.width = `${cpu}%`;

      const net = (Math.random() * 0.8 + 0.6).toFixed(1);
      document.getElementById('netMetric').textContent = `${net} GB/s`;
      document.getElementById('netBar').style.width = `${(net / 2) * 100}%`;

      const ram = Math.floor(Math.random() * 12) + 45;
      document.getElementById('ramMetric').textContent = `${ram}%`;
      document.getElementById('ramBar').style.width = `${ram}%`;

      const db = Math.floor(Math.random() * 80) + 280;
      document.getElementById('dbMetric').textContent = `${db} q/s`;
      document.getElementById('dbBar').style.width = `${(db / 450) * 100}%`;
    }, 2500);
  </script>
</body>
</html>
