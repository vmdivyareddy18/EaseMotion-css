<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Number Typing Animate</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='text-color')r.style.setProperty('--text-color',t.value);if(t.name==='cursor-color')r.style.setProperty('--cursor-color',t.value);if(t.name==='type-speed')r.style.setProperty('--type-speed',t.value+'s');if(t.name==='bg-color')r.style.setProperty('--bg-color',t.value)});document.addEventListener('DOMContentLoaded',()=>{const el=document.querySelector('.typing-text');const vals=['42','256','1024','8192'];let i=0;setInterval(()=>{i=(i+1)%vals.length;el.textContent=vals[i]},3000)})</script>
<div class="container"><p class="title">Number Typing Animate</p>
<div class="typing-display"><span class="typing-text">42</span><span class="cursor"></span></div>
<div class="controls"><label>Text: <input type="color" name="text-color" value="#4ecdc4"></label><label>Cursor: <input type="color" name="cursor-color" value="#4ecdc4"></label><label>BG: <input type="color" name="bg-color" value="#2d2d44"></label><label>Speed: <input type="range" name="type-speed" min="0.5" max="3" step="0.1" value="1.5"></label></div></div></body></html>
