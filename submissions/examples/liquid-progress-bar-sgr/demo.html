<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Fill Progress Bar Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: #1e293b;
      padding: 2.5rem;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 1px solid #334155;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .subtitle {
      color: #94a3b8;
      text-align: center;
      margin-bottom: 2.5rem;
      font-size: 0.95rem;
    }

    .section {
      margin-bottom: 2rem;
    }

    .section-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 0.75rem;
      font-weight: 600;
    }

    .control-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    button {
      background: #334155;
      color: #f8fafc;
      border: 1px solid #475569;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #475569;
      border-color: #64748b;
    }

    button.primary {
      background: #3b82f6;
      border-color: #2563eb;
    }

    button.primary:hover {
      background: #2563eb;
    }

    /* Style override for demo presentation purposes */
    .ease-liquid-bar {
      height: 32px;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Liquid Fill Progress Bar</h1>
    <div class="subtitle">Undulating wave surface and wobbling meniscus physics</div>

    <div class="control-panel">
      <button class="primary" id="btn-simulate">Simulate Loading</button>
      <button id="btn-25">25%</button>
      <button id="btn-50">50%</button>
      <button id="btn-75">75%</button>
      <button id="btn-100">100%</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div class="section">
      <div class="section-title">Default Liquid Progress (.ease-liquid-bar)</div>
      <div class="ease-liquid-bar" id="bar-default" style="--progress: 50%;"></div>
    </div>

    <div class="section">
      <div class="section-title">Fast Flow (.ease-liquid-bar-fast)</div>
      <div class="ease-liquid-bar ease-liquid-bar-fast" id="bar-fast" style="--progress: 50%;"></div>
    </div>

    <div class="section">
      <div class="section-title">Toxic Glow (.ease-liquid-bar-toxic)</div>
      <div class="ease-liquid-bar ease-liquid-bar-toxic" id="bar-toxic" style="--progress: 50%;"></div>
    </div>

    <div class="section">
      <div class="section-title">Fire Warning (.ease-liquid-bar-fire)</div>
      <div class="ease-liquid-bar ease-liquid-bar-fire" id="bar-fire" style="--progress: 50%;"></div>
    </div>
  </div>

  <script>
    const bars = document.querySelectorAll('.ease-liquid-bar');
    let intervalId = null;
    let currentProgress = 50;

    function setProgress(val) {
      currentProgress = val;
      bars.forEach(bar => {
        bar.style.setProperty('--progress', `${val}%`);
      });
    }

    document.getElementById('btn-reset').addEventListener('click', () => {
      stopSimulation();
      setProgress(0);
    });

    document.getElementById('btn-25').addEventListener('click', () => {
      stopSimulation();
      setProgress(25);
    });

    document.getElementById('btn-50').addEventListener('click', () => {
      stopSimulation();
      setProgress(50);
    });

    document.getElementById('btn-75').addEventListener('click', () => {
      stopSimulation();
      setProgress(75);
    });

    document.getElementById('btn-100').addEventListener('click', () => {
      stopSimulation();
      setProgress(100);
    });

    document.getElementById('btn-simulate').addEventListener('click', () => {
      if (intervalId) {
        stopSimulation();
      } else {
        startSimulation();
      }
    });

    function startSimulation() {
      document.getElementById('btn-simulate').textContent = 'Pause Simulation';
      document.getElementById('btn-simulate').classList.add('active');
      setProgress(0);
      
      intervalId = setInterval(() => {
        if (currentProgress >= 100) {
          stopSimulation();
        } else {
          setProgress(currentProgress + 1);
        }
      }, 80);
    }

    function stopSimulation() {
      if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
      }
      document.getElementById('btn-simulate').textContent = 'Simulate Loading';
      document.getElementById('btn-simulate').classList.remove('active');
    }
  </script>
</body>
</html>
