<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Zoom-Out Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="portfolio-theme">
    <div class="portfolio-perspective-wrapper">
        
        <main class="portfolio-content">
            <header class="portfolio-header">
                <span class="portfolio-tag">Selected Works</span>
                <h1 class="portfolio-title">Studio Shutter</h1>
            </header>
            
            <section class="gallery-preview">
                <div class="grid-item"></div>
                <div class="grid-item"></div>
            </section>

            <a href="#info-popover" class="trigger-btn">Project Specs</a>
        </main>

        <div id="info-popover" class="popover-overlay">
            <a href="#" class="popover-dismiss-overlay" aria-label="Close Popover"></a>
            
            <article class="popover-card">
                <a href="#" class="close-btn">&times;</a>
                <h3 class="popover-heading">Interactive Details</h3>
                <p class="popover-body">
                    This creative popover utilizes hardware-accelerated transforms to scale down the background canvas layout, giving a beautiful theater-like focus state.
                </p>
                <div class="popover-specs">
                    <div><strong>Year:</strong> 2026</div>
                    <div><strong>Role:</strong> Creative Direction</div>
                </div>
            </article>
        </div>

    </div>
</body>
</html>
