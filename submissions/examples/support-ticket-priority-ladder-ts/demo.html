<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Ticket Priority Ladder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="panel" aria-labelledby="priority-title">
      <p class="eyebrow">Support queue</p>
      <h1 id="priority-title">Priority ladder</h1>
      <ol class="priority-ladder">
        <li class="priority-step is-low">Low<span>48h response</span></li>
        <li class="priority-step is-normal">Normal<span>24h response</span></li>
        <li class="priority-step is-high">High<span>4h response</span></li>
        <li class="priority-step is-urgent">Urgent<span>1h response</span></li>
        <li class="priority-step is-escalated">Escalated<span>Live response</span></li>
      </ol>
    </section>
  </main>
</body>
</html>
