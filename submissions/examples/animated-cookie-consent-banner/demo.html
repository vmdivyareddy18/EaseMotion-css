<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Cookie Consent Banner - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Mock Page Content -->
  <main class="page-content">
    <h1>Welcome to Our Website</h1>
    <p>This is a mock page to demonstrate the cookie consent banner. The banner will smoothly slide up from the bottom of the screen.</p>
    <button class="reset-btn" id="reset-btn">🔄 Reset Banner</button>
  </main>

  <!-- Cookie Consent Banner -->
  <div class="cookie-banner ease-slide-in-up" id="cookie-banner">
    
    <!-- Close Button -->
    <button class="banner-close ease-hover-grow" id="btn-close" aria-label="Close banner">&times;</button>

    <!-- Cookie Icon -->
    <div class="banner-icon-wrapper">
      <span class="banner-icon ease-bounce-in ease-delay-100">🍪</span>
    </div>

    <!-- Content -->
    <div class="banner-content">
      <h3 class="banner-title ease-fade-in-up ease-delay-200">We use cookies</h3>
      <p class="banner-text ease-fade-in-up ease-delay-300">
        We use cookies to ensure you get the best experience on our website. 
        <a href="#" class="banner-link">Learn more</a>
      </p>
    </div>

    <!-- Actions -->
    <div class="banner-actions ease-fade-in-up ease-delay-400">
      <button class="btn btn-reject ease-hover-grow" id="btn-reject">Reject</button>
      <button class="btn btn-accept ease-pulse ease-hover-grow" id="btn-accept">Accept All</button>
    </div>

  </div>

  <!-- JavaScript for Dismissal -->
  <script>
    const banner = document.getElementById('cookie-banner');
    const closeBtn = document.getElementById('btn-close');
    const rejectBtn = document.getElementById('btn-reject');
    const acceptBtn = document.getElementById('btn-accept');
    const resetBtn = document.getElementById('reset-btn');

    // Function to dismiss the banner
    function dismissBanner() {
      banner.classList.remove('ease-slide-in-up');
      banner.classList.add('slide-out-down');
      
      // Remove from DOM after animation completes
      setTimeout(() => {
        banner.style.display = 'none';
      }, 400);
    }

    // Event Listeners
    closeBtn.addEventListener('click', dismissBanner);
    rejectBtn.addEventListener('click', dismissBanner);
    acceptBtn.addEventListener('click', dismissBanner);

    // Reset button (for demo purposes)
    resetBtn.addEventListener('click', () => {
      banner.style.display = 'flex';
      banner.classList.remove('slide-out-down');
      banner.classList.add('ease-slide-in-up');
    });
  </script>
</body>
</html>
