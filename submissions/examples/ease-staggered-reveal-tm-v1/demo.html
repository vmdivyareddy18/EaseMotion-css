<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staggered Reveal</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Staggered Reveal</h1>
  <p>Scroll down to trigger staggered animations.</p>
  <div class="reveal-section">
    <h2 class="reveal-up">Fade Up Reveal</h2>
    <div class="stagger-list stagger-up">
      <div class="stagger-item stagger-1">Card 1</div>
      <div class="stagger-item stagger-2">Card 2</div>
      <div class="stagger-item stagger-3">Card 3</div>
      <div class="stagger-item stagger-4">Card 4</div>
      <div class="stagger-item stagger-5">Card 5</div>
      <div class="stagger-item stagger-6">Card 6</div>
    </div>
  </div>
</div>
<script>
const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.15 });
document.querySelectorAll('.stagger-list, .reveal-up').forEach(el => observer.observe(el));
</script>
</body></html>
