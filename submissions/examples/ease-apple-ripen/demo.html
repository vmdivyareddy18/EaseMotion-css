<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Apple Ripen Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="orchard-container">
        <div class="header-info">
            <h2>Animation: <span class="accent">ease-apple-ripen</span></h2>
            <p>A dual-property transition utility that simulates organic fruit growth and chromatic color ripening.</p>
        </div>

        <div class="orchard-grid">
            
            <div class="orchard-card">
                <div class="branch-line">
                    <div id="apple1" class="apple-element ease-apple-ripen">🍏</div>
                </div>
                <span class="badge">Standard Season</span>
            </div>

            <div class="orchard-card">
                <div class="branch-line">
                    <div id="apple2" class="apple-element ease-apple-ripen-fast">🍏</div>
                </div>
                <span class="badge">Accelerated / Fast</span>
            </div>

            <div class="orchard-card">
                <div class="branch-line">
                    <div id="apple3" class="apple-element ease-apple-ripen-slow">🍏</div>
                </div>
                <span class="badge">Natural / Slow</span>
            </div>

        </div>

        <button class="action-btn" onclick="triggerRipening()">🔄 Reset Season</button>
    </div>

    <script>
        function triggerRipening() {
            const elements = [
                { id: 'apple1', class: 'ease-apple-ripen' },
                { id: 'apple2', class: 'ease-apple-ripen-fast' },
                { id: 'apple3', class: 'ease-apple-ripen-slow' }
            ];
            
            elements.forEach(item => {
                const el = document.getElementById(item.id);
                el.classList.remove(item.class);
                void el.offsetWidth; // Force CSS reflow
                el.classList.add(item.class);
            });
        }
    </script>
</body>
</html>
