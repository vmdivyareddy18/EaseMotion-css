<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Minimalist Command Palette</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-command-palette-overlay">
        <div class="ease-command-palette">
            <header class="ease-command-palette-header">
                <input class="ease-command-palette-search" placeholder="Search..." autofocus />
            </header>
            <main class="ease-command-palette-content">
                <div class="ease-command-palette-item ease-command-palette-item-active">
                    <span>Quick Navigation</span>
                    <span class="ease-command-palette-kbd">⌘K</span>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
