<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Heartbeat Select Menu</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #fafafa; font-family: 'Helvetica Neue', sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="card ease-fade-in-up">
    <h2>Select Plan</h2>
    
    <div class="select-wrapper">
      <!-- Hidden checkbox to toggle dropdown -->
      <input type="checkbox" id="select-toggle" class="select-toggle">
      
      <!-- Select Button / Trigger -->
      <label for="select-toggle" class="select-trigger ease-pulse">
        <span class="selected-value">Premium Plan</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </label>
      
      <!-- Dropdown Options -->
      <div class="options-container">
        <!-- We use radio buttons for option selection -->
        <label class="option-item ease-hover-pop">
          <input type="radio" name="plan" value="basic" class="option-radio">
          <span>Basic Plan</span>
        </label>
        
        <label class="option-item ease-hover-pop">
          <input type="radio" name="plan" value="standard" class="option-radio">
          <span>Standard Plan</span>
        </label>
        
        <label class="option-item ease-hover-pop">
          <input type="radio" name="plan" value="premium" class="option-radio" checked>
          <span>Premium Plan <span class="badge">PRO</span></span>
        </label>
      </div>
    </div>
    
  </div>

</body>
</html>
