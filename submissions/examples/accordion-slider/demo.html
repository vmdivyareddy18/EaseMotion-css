<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Accordion Slider</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-accordion-wrapper">
    <div class="ease-accordion-card" style="--bg: url('https://picsum.photos/id/1015/600/800')">
      <div class="ease-accordion-content">
        <h3 class="ease-fade-in-up">Mountains</h3>
        <p>Explore breathtaking peaks and serene valleys.</p>
      </div>
    </div>
    <div class="ease-accordion-card" style="--bg: url('https://picsum.photos/id/1016/600/800')">
      <div class="ease-accordion-content">
        <h3 class="ease-fade-in-up">Forest</h3>
        <p>Walk through calm, green, untouched trails.</p>
      </div>
    </div>
    <div class="ease-accordion-card" style="--bg: url('https://picsum.photos/id/1018/600/800')">
      <div class="ease-accordion-content">
        <h3 class="ease-fade-in-up">River</h3>
        <p>Refreshing water flowing through the wild.</p>
      </div>
    </div>
    <div class="ease-accordion-card" style="--bg: url('https://picsum.photos/id/1020/600/800')">
      <div class="ease-accordion-content">
        <h3 class="ease-fade-in-up">Desert</h3>
        <p>Golden dunes stretching to the horizon.</p>
      </div>
    </div>
    <div class="ease-accordion-card" style="--bg: url('https://picsum.photos/id/1021/600/800')">
      <div class="ease-accordion-content">
        <h3 class="ease-fade-in-up">Lake</h3>
        <p>Crystal clear reflections of the sky above.</p>
      </div>
    </div>
  </div>
</body>
</html>
