<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Drag / Rubber Band Scroll Effect</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #f0f0f5;
      margin: 0;
      padding: 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      justify-content: center;
      min-height: 100vh;
      align-items: center;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      width: 200px;
      height: 150px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      font-weight: 600;
      color: #333;
    }
    
    .card p {
      margin: 0;
      font-size: 0.9rem;
      color: #777;
      margin-top: 0.5rem;
      font-weight: 400;
    }
  </style>
</head>
<body>

  <div class="card elastic-drag">
    Horizontal Drag
    <p>.elastic-drag</p>
  </div>
  
  <div class="card elastic-drag-vertical">
    Vertical Drag
    <p>.elastic-drag-vertical</p>
  </div>
  
  <div class="card elastic-drag-both">
    Both Directions
    <p>.elastic-drag-both</p>
  </div>
  
  <div class="card elastic-drag-rotate">
    Tilt & Drag
    <p>.elastic-drag-rotate</p>
  </div>
  
  <div class="card elastic-drag-glow">
    Glow Drag
    <p>.elastic-drag-glow</p>
  </div>

  <script>
    document.querySelectorAll('[class*="elastic-drag"]').forEach(el => {
      let startX = 0, startY = 0;
      let isDragging = false;
      
      const onStart = (e) => {
        isDragging = true;
        el.classList.remove('is-snapping');
        el.classList.add('is-dragging');
        const point = e.touches ? e.touches[0] : e;
        startX = point.clientX;
        startY = point.clientY;
        
        // Disable global text selection during drag
        document.body.style.userSelect = 'none';
      };
      
      const onMove = (e) => {
        if (!isDragging) return;
        const point = e.touches ? e.touches[0] : e;
        const dragX = point.clientX - startX;
        const dragY = point.clientY - startY;
        const dragIntensity = Math.sqrt(dragX * dragX + dragY * dragY);
        
        el.style.setProperty('--drag-x', `${dragX}px`);
        el.style.setProperty('--drag-y', `${dragY}px`);
        el.style.setProperty('--drag-intensity', dragIntensity);
      };
      
      const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        el.classList.remove('is-dragging');
        el.classList.add('is-snapping');
        el.style.setProperty('--drag-x', `0px`);
        el.style.setProperty('--drag-y', `0px`);
        el.style.setProperty('--drag-intensity', 0);
        
        // Restore global text selection
        document.body.style.userSelect = '';
        
        // Cleanup snap class after transition finishes
        setTimeout(() => {
          if (!isDragging) el.classList.remove('is-snapping');
        }, 600); // Wait for snap-duration
      };
      
      el.addEventListener('mousedown', onStart);
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onEnd);
      
      el.addEventListener('touchstart', onStart, { passive: false });
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('touchend', onEnd);
    });
  </script>
</body>
</html>
