<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Media Player Controls — EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card" style="--control-bg: #2a2a3e; --btn-color: #00d4aa; --progress-color: #00d4aa; --transition-speed: 0.3s;">
    <div class="player">
      <div class="track-info">
        <span class="track-title">Midnight Waves</span>
        <span class="track-artist">EaseMotion</span>
      </div>
      <div class="controls">
        <button class="btn" data-skip="prev">⏮</button>
        <button class="btn play-btn" id="playBtn" aria-label="Play/Pause">▶</button>
        <button class="btn" data-skip="next">⏭</button>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="duration">3:42</span>
      </div>
    </div>
  </div>
  <script>
    const btn = document.getElementById('playBtn');
    const fill = document.getElementById('progressFill');
    let playing = false, progress = 0;
    btn.addEventListener('click', () => {
      playing = !playing;
      btn.textContent = playing ? '⏸' : '▶';
      btn.classList.toggle('playing', playing);
      if (playing) animate();
    });
    function animate() {
      if (!playing) return;
      progress = (progress + 0.5) % 100;
      fill.style.width = progress + '%';
      document.getElementById('currentTime').textContent =
        '0:' + String(Math.floor(progress * 2.22)).padStart(2, '0');
      setTimeout(animate, Number(getComputedStyle(document.documentElement)
        .getPropertyValue('--transition-speed').trim().replace('s','')) * 1000 || 300);
    }
  </script>
</body>
</html>
