<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robotic Arm Loading Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo presentation layout only */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      gap: 32px;
    }

    .loader-showcase {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .loader-status {
      color: #64748b;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="loader-showcase">
    <div class="ease-robot-loader" role="progressbar" aria-label="Compiling assets" aria-valuetext="Loading...">
      
      <div class="ease-robot-track"></div>
      
      <div class="ease-robot-arm-assembly">
        <div class="ease-robot-base"></div>
        <div class="ease-robot-shoulder">
          <div class="ease-robot-forearm">
            <div class="ease-robot-claw"></div>
          </div>
        </div>
      </div>

      <div class="ease-robot-package"></div>
    </div>
    
    <span class="loader-status">Assembling Assets...</span>
  </div>

</body>
</html>
