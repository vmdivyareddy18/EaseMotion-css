<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Elastic Toggle Switch</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

<h1>Ease Elastic Toggle Switch</h1>

<div class="toggle-demo">

<label class="toggle green">
<input type="checkbox">
<span class="slider"></span>
</label>

<label class="toggle blue">
<input type="checkbox" checked>
<span class="slider"></span>
</label>

<label class="toggle purple">
<input type="checkbox">
<span class="slider"></span>
</label>

</div>

<p>Elastic toggle animation built with pure HTML & CSS.</p>

</div>

</body>
</html>
