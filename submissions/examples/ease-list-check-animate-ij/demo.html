<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Checklist - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lca-main">
    <h1 class="lca-title">Animated Checklist</h1>
    <p class="lca-desc">Click items to toggle completion with animated checkmark</p>

    <div class="lca-progress-wrap">
      <div class="lca-progress-bar" id="lcaProgress">
        <div class="lca-progress-fill" id="lcaProgressFill"></div>
      </div>
      <span class="lca-progress-text" id="lcaProgressText">0 / 0</span>
    </div>

    <div class="lca-input-row">
      <input class="lca-input" id="lcaInput" type="text" placeholder="Add a new item..." maxlength="80">
      <button class="lca-add-btn" id="lcaAddBtn">Add</button>
    </div>

    <ul class="lca-list" id="lcaList"></ul>

    <button class="lca-clear-btn" id="lcaClearBtn">Clear Completed</button>
  </main>
  <script>
    const list = document.getElementById('lcaList');
    const input = document.getElementById('lcaInput');
    const addBtn = document.getElementById('lcaAddBtn');
    const clearBtn = document.getElementById('lcaClearBtn');
    const progressFill = document.getElementById('lcaProgressFill');
    const progressText = document.getElementById('lcaProgressText');

    let items = [];

    function updateProgress() {
      const total = items.length;
      const done = items.filter(i => i.done).length;
      const pct = total === 0 ? 0 : (done / total) * 100;
      progressFill.style.width = pct + '%';
      progressText.textContent = done + ' / ' + total;
    }

    function render() {
      list.innerHTML = '';
      items.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'lca-item';
        if (item.done) li.classList.add('lca-completed');

        const check = document.createElement('span');
        check.className = 'lca-check';
        check.textContent = '✓';
        if (item.done) check.classList.add('lca-checked');

        const text = document.createElement('span');
        text.className = 'lca-item-text';
        text.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'lca-del-btn';
        del.innerHTML = '&times;';
        del.addEventListener('click', function (e) {
          e.stopPropagation();
          items.splice(idx, 1);
          render();
        });

        li.appendChild(check);
        li.appendChild(text);
        li.appendChild(del);

        li.addEventListener('click', function () {
          item.done = !item.done;
          render();
        });

        list.appendChild(li);
      });
      updateProgress();
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      input.value = '';
      render();
      input.focus();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addItem();
    });

    clearBtn.addEventListener('click', function () {
      items = items.filter(i => !i.done);
      render();
    });

    items = [
      { text: 'Learn CSS animations', done: true },
      { text: 'Build a line chart component', done: true },
      { text: 'Create hover underline effect', done: false },
      { text: 'Implement preview cards', done: false },
      { text: 'Review pull requests', done: false },
      { text: 'Write documentation', done: false }
    ];
    render();
  </script>
</body>
</html>
