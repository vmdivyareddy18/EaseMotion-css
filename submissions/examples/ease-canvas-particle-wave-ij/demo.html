<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Particle Wave - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-canvas-particle-wave">
    <h2>Particle Wave</h2>
    <p>Pure CSS dot grid with a flowing wave effect</p>
    <div class="wave-container">
      <div class="wave-grid" id="waveGrid">
      </div>
    </div>
    <div class="controls">
      <button class="wave-btn" onclick="document.getElementById('waveGrid').classList.toggle('paused')">Pause / Resume</button>
    </div>
  </div>
</body>
</html>
