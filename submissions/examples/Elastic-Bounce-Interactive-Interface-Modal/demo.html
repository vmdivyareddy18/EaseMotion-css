<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Interactive Interface Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Launch Interface
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="icon">✨</div>

        <h2>Interactive Workspace</h2>

        <p>
            Experience a modern interactive interface with a smooth Elastic
            Bounce entrance animation built entirely with HTML and CSS.
        </p>

        <div class="features">

            <div class="card">
                <span>📊</span>
                <h4>Analytics</h4>
            </div>

            <div class="card">
                <span>⚙️</span>
                <h4>Settings</h4>
            </div>

            <div class="card">
                <span>💬</span>
                <h4>Messages</h4>
            </div>

        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
