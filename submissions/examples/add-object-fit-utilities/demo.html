<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Object Fit Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h1>Object Fit Utilities</h1>
    <p class="subtitle">
      Demonstrating how images behave with different object-fit values.
    </p>

    <div class="demo-grid">

      <div class="demo-card">
        <h3>.object-cover</h3>
        <div class="frame">
          <img
            class="object-cover"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
            alt="Demo"
          >
        </div>
      </div>

      <div class="demo-card">
        <h3>.object-contain</h3>
        <div class="frame">
          <img
            class="object-contain"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
            alt="Demo"
          >
        </div>
      </div>

      <div class="demo-card">
        <h3>.object-fill</h3>
        <div class="frame">
          <img
            class="object-fill"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
            alt="Demo"
          >
        </div>
      </div>

      <div class="demo-card">
        <h3>.object-none</h3>
        <div class="frame">
          <img
            class="object-none"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
            alt="Demo"
          >
        </div>
      </div>

      <div class="demo-card">
        <h3>.object-scale-down</h3>
        <div class="frame">
          <img
            class="object-scale-down"
            src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
            alt="Demo"
          >
        </div>
      </div>

    </div>
  </section>

</body>
</html>
