<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Device Health Signal Cards</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="dashboard">

        <h1>Device Health Signals</h1>

        <p class="subtitle">
            Monitor device health and identify systems requiring attention.
        </p>

        <div class="cards">

            <div class="card healthy">

                <div class="top">

                    <h3>Edge Router</h3>

                    <span class="badge">
                        Healthy
                    </span>

                </div>

                <div class="metric">
                    99%
                </div>

                <p>CPU: 24% • Memory: 48%</p>

            </div>

            <div class="card warning">

                <div class="top">

                    <h3>Database Server</h3>

                    <span class="badge">
                        Warning
                    </span>

                </div>

                <div class="metric">
                    72%
                </div>

                <p>Memory usage approaching threshold.</p>

            </div>

            <div class="card critical">

                <div class="top">

                    <h3>API Gateway</h3>

                    <span class="badge">
                        Critical
                    </span>

                </div>

                <div class="metric">
                    39%
                </div>

                <p>Packet loss detected. Immediate action required.</p>

            </div>

        </div>

    </div>

</div>

</body>
</html>
