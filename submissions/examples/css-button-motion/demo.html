<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Button Motion - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔘 CSS Button Motion</h1>
            <p>Beautiful animated buttons - Pure CSS!</p>
        </header>

        <!-- Gradient Buttons -->
        <section class="section">
            <h2>Gradient Buttons</h2>
            <div class="button-grid">
                <button class="btn gradient-1">Hover Me</button>
                <button class="btn gradient-2">Hover Me</button>
                <button class="btn gradient-3">Hover Me</button>
                <button class="btn gradient-4">Hover Me</button>
            </div>
        </section>

        <!-- Neon Buttons -->
        <section class="section">
            <h2>Neon Buttons</h2>
            <div class="button-grid">
                <button class="btn neon-blue">Neon Blue</button>
                <button class="btn neon-pink">Neon Pink</button>
                <button class="btn neon-green">Neon Green</button>
                <button class="btn neon-purple">Neon Purple</button>
            </div>
        </section>

        <!-- 3D Buttons -->
        <section class="section">
            <h2>3D Buttons</h2>
            <div class="button-grid">
                <button class="btn 3d-red">3D Red</button>
                <button class="btn 3d-blue">3D Blue</button>
                <button class="btn 3d-green">3D Green</button>
                <button class="btn 3d-orange">3D Orange</button>
            </div>
        </section>

        <!-- Outline Buttons -->
        <section class="section">
            <h2>Outline Buttons</h2>
            <div class="button-grid">
                <button class="btn outline-1">Outline 1</button>
                <button class="btn outline-2">Outline 2</button>
                <button class="btn outline-3">Outline 3</button>
                <button class="btn outline-4">Outline 4</button>
            </div>
        </section>

        <!-- Special Effect Buttons -->
        <section class="section">
            <h2>Special Effects</h2>
            <div class="button-grid">
                <button class="btn ripple">Ripple Effect</button>
                <button class="btn shine">Shine Effect</button>
                <button class="btn pulse">Pulse Effect</button>
                <button class="btn bounce">Bounce Effect</button>
                <button class="btn slide">Slide Fill</button>
                <button class="btn rotate">Rotate Icon</button>
            </div>
        </section>

        <!-- Features Section -->
        <section class="section">
            <h2>✨ Features</h2>
            <div class="feature-grid">
                <div class="feature-item">🎨 20+ button styles</div>
                <div class="feature-item">💫 Smooth animations</div>
                <div class="feature-item">📱 Fully responsive</div>
                <div class="feature-item">⚡ Pure CSS</div>
                <div class="feature-item">🎯 Easy to customize</div>
                <div class="feature-item">🚀 Production ready</div>
            </div>
        </section>
    </div>
</body>
</html>
