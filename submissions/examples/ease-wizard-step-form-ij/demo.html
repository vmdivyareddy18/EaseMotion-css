<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard Step Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wsf-container">
    <h1>Wizard Step Form</h1>
    <div class="wsf-progress">
      <div class="wsf-progress-bar" id="progressBar"></div>
    </div>
    <div class="wsf-layout">
      <aside class="wsf-sidebar">
        <div class="wsf-step" data-step="1">
          <span class="wsf-indicator">1</span>
          <div class="wsf-step-info">
            <span class="wsf-step-label">Step 1</span>
            <span class="wsf-step-desc">Personal Info</span>
          </div>
        </div>
        <div class="wsf-step" data-step="2">
          <span class="wsf-indicator">2</span>
          <div class="wsf-step-info">
            <span class="wsf-step-label">Step 2</span>
            <span class="wsf-step-desc">Account</span>
          </div>
        </div>
        <div class="wsf-step" data-step="3">
          <span class="wsf-indicator">3</span>
          <div class="wsf-step-info">
            <span class="wsf-step-label">Step 3</span>
            <span class="wsf-step-desc">Preferences</span>
          </div>
        </div>
        <div class="wsf-step" data-step="4">
          <span class="wsf-indicator">4</span>
          <div class="wsf-step-info">
            <span class="wsf-step-label">Step 4</span>
            <span class="wsf-step-desc">Review</span>
          </div>
        </div>
      </aside>
      <main class="wsf-content">
        <div class="wsf-panel active" data-panel="1">
          <h2>Personal Information</h2>
          <label>Full Name <input type="text" placeholder="John Doe"></label>
          <label>Email <input type="email" placeholder="john@example.com"></label>
        </div>
        <div class="wsf-panel" data-panel="2">
          <h2>Account Details</h2>
          <label>Username <input type="text" placeholder="johndoe"></label>
          <label>Password <input type="password" placeholder="••••••••"></label>
        </div>
        <div class="wsf-panel" data-panel="3">
          <h2>Preferences</h2>
          <label><input type="checkbox"> Newsletter</label>
          <label><input type="checkbox"> Dark Mode</label>
        </div>
        <div class="wsf-panel" data-panel="4">
          <h2>Review & Submit</h2>
          <p>Review your information before submitting.</p>
          <div class="wsf-review">All set! Click Submit to continue.</div>
        </div>
      </main>
    </div>
    <div class="wsf-nav">
      <button class="wsf-btn wsf-btn-prev" id="prevBtn" disabled>Previous</button>
      <span class="wsf-counter" id="counter">Step 1 of 4</span>
      <button class="wsf-btn wsf-btn-next" id="nextBtn">Next</button>
      <button class="wsf-btn wsf-btn-submit" id="submitBtn" style="display:none">Submit</button>
    </div>
  </div>
  <script>
    let currentStep = 1;
    const totalSteps = 4;
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitBtn = document.getElementById('submitBtn');
    const counter = document.getElementById('counter');
    const progressBar = document.getElementById('progressBar');
    const steps = document.querySelectorAll('.wsf-step');
    const panels = document.querySelectorAll('.wsf-panel');

    function updateUI() {
      steps.forEach(s => {
        const n = parseInt(s.dataset.step);
        s.classList.toggle('wsf-active', n === currentStep);
        s.classList.toggle('wsf-complete', n < currentStep);
      });
      panels.forEach(p => {
        const n = parseInt(p.dataset.panel);
        const dir = n > currentStep ? 1 : -1;
        p.classList.toggle('active', n === currentStep);
        if (n === currentStep) {
          p.style.transform = 'translateX(0)';
          p.style.opacity = '1';
        } else if (n < currentStep) {
          p.style.transform = 'translateX(-40px)';
          p.style.opacity = '0';
        } else {
          p.style.transform = 'translateX(40px)';
          p.style.opacity = '0';
        }
      });
      prevBtn.disabled = currentStep === 1;
      nextBtn.style.display = currentStep === totalSteps ? 'none' : '';
      submitBtn.style.display = currentStep === totalSteps ? '' : 'none';
      counter.textContent = `Step ${currentStep} of ${totalSteps}`;
      progressBar.style.width = `${((currentStep - 1) / (totalSteps - 1)) * 100}%`;
    }

    prevBtn.addEventListener('click', () => { if (currentStep > 1) { currentStep--; updateUI(); } });
    nextBtn.addEventListener('click', () => { if (currentStep < totalSteps) { currentStep++; updateUI(); } });
    submitBtn.addEventListener('click', () => alert('Form submitted!'));
    updateUI();
  </script>
</body>
</html>
