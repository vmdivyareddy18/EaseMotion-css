<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Realistic Canvas Fire Animation</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="wrapper">
    <h1>Fire Flicker Animation</h1>
    <h5 class="sub-heading">Ease Motion CSS</h5>
    <canvas id="fireCanvas"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('fireCanvas');
    const ctx = canvas.getContext('2d');

    // Set canvas dimensions
    canvas.width = 300;
    canvas.height = 400;

    const particlesArray = [];

    // Particle Class representing each spark/flame
    class Particle {
      constructor() {
        // Start near the bottom center of the canvas
        this.x = canvas.width / 2 - 20 + Math.random() * 40; 
        this.y = canvas.height - 50; 
        
        // Randomize size, speed, and lifespan
        this.size = Math.random() * 25 + 10;
        this.speedX = Math.random() * 2 - 1; // Slight drift left/right
        this.speedY = Math.random() * -3 - 2; // Rising up
        this.life = 255; // Used to calculate color and opacity
        this.decay = Math.random() * 4 + 2; // How fast it burns out
      }

      update() {
        // Move the particle
        this.x += this.speedX;
        this.y += this.speedY;
        
        // Shrink the particle as it rises
        if (this.size > 0.2) this.size -= 0.15;
        
        // Decrease life (cools down)
        this.life -= this.decay;
      }

      draw() {
        if (this.size <= 0 || this.life <= 0) return;

        ctx.beginPath();
        
        // Create a radial gradient for each particle so it looks like a glowing orb
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        
        // Color transition logic: 
        // Hot (Yellow/White) -> Warm (Orange) -> Cool (Red/Dark)
        const alpha = Math.max(0, this.life / 255);
        gradient.addColorStop(0, `rgba(255, ${this.life}, 0, ${alpha})`);
        gradient.addColorStop(1, `rgba(255, ${this.life / 2}, 0, 0)`);

        ctx.fillStyle = gradient;
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Function to generate and manage particles
    function handleParticles() {
      // Add new particles every frame to keep the fire going
      for (let i = 0; i < 4; i++) {
        particlesArray.push(new Particle());
      }

      // Update and draw all existing particles
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();

        // Remove particles that have burned out or shrunk to nothing
        if (particlesArray[i].size <= 0 || particlesArray[i].life <= 0) {
          particlesArray.splice(i, 1);
          i--;
        }
      }
    }

    // The main animation loop
    function animate() {
      // Clear the canvas slightly to create smooth movement trails
      ctx.fillStyle = 'rgba(10, 10, 10, 1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 'lighter' composite operation makes overlapping particles brighter (the core fire effect)
      ctx.globalCompositeOperation = 'lighter';
      
      handleParticles();
      
      // Reset composite operation to normal so the background clears correctly next frame
      ctx.globalCompositeOperation = 'source-over';

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
