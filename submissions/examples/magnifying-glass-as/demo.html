<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnifying Glass</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="reader">
    <p class="doc">
      Every detail matters when you look closely. The fine print, the small
      <span class="target">clues</span>, and the tiny marks hidden in plain
      sight all come into focus under a careful, curious eye.
    </p>

    <div class="magnifier">
      <div class="lens">
        <span class="zoom" aria-hidden="true">the small <b>clues</b>, and the</span>
        <span class="shine"></span>
      </div>
      <span class="handle"></span>
    </div>
  </div>
</body>
</html>
