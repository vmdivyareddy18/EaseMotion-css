<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Empty Results Suggestions</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="search-card">

        <div class="search-bar">

            <input
                type="text"
                placeholder="Search products..."
                value="wireless keyboard xyz"
            >

            <button>
                Search
            </button>

        </div>

        <div class="empty-state">

            <div class="icon">
                🔍
            </div>

            <h1>No Results Found</h1>

            <p>
                We couldn't find any matches for your search.
                Try one of these suggestions.
            </p>

            <div class="suggestions">

                <button class="tag">
                    Wireless Keyboard
                </button>

                <button class="tag">
                    Mechanical Keyboard
                </button>

                <button class="tag">
                    Bluetooth Keyboard
                </button>

                <button class="tag">
                    Office Accessories
                </button>

            </div>

        </div>

    </div>

</div>

</body>
</html>
