<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaleidoscope - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="kl-wrapper">

    <h1>Kaleidoscope</h1>

    <canvas id="klCanvas" width="500" height="500"></canvas>

    <div class="kl-controls">
      <div class="kl-field">
        <label>Segments: <span id="segVal">6</span></label>
        <input type="range" id="segments" min="3" max="12" step="1" value="6">
      </div>
      <div class="kl-field">
        <label>Speed: <span id="speedVal">3</span></label>
        <input type="range" id="speed" min="0" max="10" step="0.5" value="3">
      </div>
      <button class="kl-btn" id="colorBtn">Next Scheme</button>
    </div>
    <div class="scheme-label" id="schemeLabel">Cosmic</div>

  </div>

  <script>
    const canvas = document.getElementById('klCanvas');
    const ctx = canvas.getContext('2d');
    const segSlider = document.getElementById('segments');
    const segVal = document.getElementById('segVal');
    const speedSlider = document.getElementById('speed');
    const speedVal = document.getElementById('speedVal');
    const colorBtn = document.getElementById('colorBtn');
    const schemeLabel = document.getElementById('schemeLabel');

    const schemes = [
      { name: 'Cosmic', colors: ['#6366f1','#a855f7','#ec4899','#f43f5e'] },
      { name: 'Ocean', colors: ['#06b6d4','#0ea5e9','#3b82f6','#6366f1'] },
      { name: 'Sunset', colors: ['#f97316','#ef4444','#eab308','#f43f5e'] },
      { name: 'Forest', colors: ['#22c55e','#16a34a','#15803d','#4ade80'] },
      { name: 'Neon', colors: ['#d946ef','#f97316','#22c55e','#06b6d4'] },
    ];
    let schemeIdx = 0;

    let angle = 0;
    let animId = null;

    function draw() {
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const segs = parseInt(segSlider.value);
      const spd = parseFloat(speedSlider.value);
      const colors = schemes[schemeIdx].colors;

      ctx.fillStyle = '#0f0f0f';
      ctx.fillRect(0, 0, w, h);

      const slice = (2 * Math.PI) / segs;
      const hueShift = (Date.now() * 0.0001 * spd) % (2 * Math.PI);

      for (let i = 0; i < segs; i++) {
        const baseAngle = i * slice + angle;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(baseAngle);

        for (let r = 0; r < 12; r++) {
          const radius = 30 + r * 18;
          const color = colors[r % colors.length];
          const a = Math.sin(angle * 2 + r + i) * 0.3 + 0.3;
          ctx.fillStyle = color;
          ctx.globalAlpha = a;

          ctx.beginPath();
          ctx.arc(radius * 0.4, radius * 0.15, 6 + r * 1.5, 0, Math.PI * 2);
          ctx.fill();

          ctx.beginPath();
          ctx.arc(radius * 0.1, radius * 0.5, 4 + r, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      angle += 0.005 * spd;
      animId = requestAnimationFrame(draw);
    }

    segSlider.addEventListener('input', () => segVal.textContent = segSlider.value);
    speedSlider.addEventListener('input', () => speedVal.textContent = speedSlider.value);

    colorBtn.addEventListener('click', () => {
      schemeIdx = (schemeIdx + 1) % schemes.length;
      schemeLabel.textContent = schemes[schemeIdx].name;
    });

    draw();
  </script>

</body>
</html>
