<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter · EaseMotion CSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="tc-container">
  <h1 class="tc-title">Temperature Converter</h1>
  <p class="tc-subtitle">Values update with a sliding-digit animation</p>

  <div class="tc-inputs">
    <div class="tc-field">
      <label for="celsius">°Celsius</label>
      <input type="number" id="celsius" value="0" step="any">
    </div>
    <div class="tc-field">
      <label for="fahrenheit">°Fahrenheit</label>
      <input type="number" id="fahrenheit" value="32" step="any">
    </div>
    <div class="tc-field">
      <label for="kelvin">°Kelvin</label>
      <input type="number" id="kelvin" value="273.15" step="any">
    </div>
  </div>

  <div class="tc-thermometer-wrap">
    <div class="tc-thermometer">
      <div class="tc-thermometer-track">
        <div class="tc-thermometer-fill" id="thermometerFill"></div>
      </div>
      <div class="tc-thermometer-bulb"></div>
    </div>
    <div class="tc-display" id="displayValue">0 °C</div>
  </div>

  <div class="tc-presets">
    <button data-c="0" data-f="32" data-k="273.15">Freezing</button>
    <button data-c="25" data-f="77" data-k="298.15">Room</button>
    <button data-c="37" data-f="98.6" data-k="310.15">Body</button>
    <button data-c="100" data-f="212" data-k="373.15">Boiling</button>
  </div>
</main>
<script src="demo.js"></script>
</body>
</html>
