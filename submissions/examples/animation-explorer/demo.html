<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animation Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="explorer-container">
        <aside class="sidebar">
            <div class="brand">
                <h2>EaseMotion CSS</h2>
                <span class="badge">v1.0.0</span>
            </div>
            <p class="sidebar-desc">Discover, experiment, and customize utility animations instantly.</p>
            
            <hr class="divider">

            <div class="control-group">
                <label for="search-input">🔍 Search Animations</label>
                <input type="text" id="search-input" placeholder="e.g., Slide Up, Bounce...">
            </div>

            <div class="control-group">
                <label for="category-select">🗂️ Category Filter</label>
                <select id="category-select">
                    <option value="all">All Categories</option>
                    <option value="fade">Fade Effects</option>
                    <option value="slide">Slide Effects</option>
                    <option value="zoom">Zoom Effects</option>
                    <option value="bounce">Bounce & Attention</option>
                </select>
            </div>

            <hr class="divider">

            <h3>🎮 Live Customization</h3>
            
            <div class="control-group">
                <div class="label-wrapper">
                    <label for="duration-range">Duration</label>
                    <span id="duration-val" class="val-display">1.0s</span>
                </div>
                <input type="range" id="duration-range" min="0.1" max="4.0" step="0.1" value="1.0">
            </div>

            <div class="control-group">
                <div class="label-wrapper">
                    <label for="delay-range">Delay</label>
                    <span id="delay-val" class="val-display">0.0s</span>
                </div>
                <input type="range" id="delay-range" min="0.0" max="3.0" step="0.1" value="0.0">
            </div>

            <div class="control-group">
                <label for="timing-select">Timing Function</label>
                <select id="timing-select">
                    <option value="ease">ease</option>
                    <option value="linear">linear</option>
                    <option value="ease-in">ease-in</option>
                    <option value="ease-out">ease-out</option>
                    <option value="ease-in-out">ease-in-out</option>
                    <option value="cubic-bezier(0.68, -0.6, 0.32, 1.6)">bouncy (cubic-bezier)</option>
                </select>
            </div>

            <div class="control-group">
                <label for="iteration-select">Iteration Count</label>
                <select id="iteration-select">
                    <option value="infinite">Infinite Loop</option>
                    <option value="1">1 Time</option>
                    <option value="2">2 Times</option>
                    <option value="3">3 Times</option>
                </select>
            </div>
        </aside>

        <main class="main-content">
            <header class="workspace-header">
                <div>
                    <h1>Animation Explorer</h1>
                    <p>Click "Copy Class" to copy clean production-ready utility configurations.</p>
                </div>
            </header>

            <div class="explorer-grid" id="explorer-grid">
                </div>
        </main>
    </div>

    <div id="toast-notification" class="toast hidden">Copied class to clipboard! 📋</div>

    <script>
        // Centralized Metadata Object Tracking Native Class Sets
        const animationRegistry = [
            { id: "fade-in", name: "Fade In", category: "fade", class: "em-fade-in", desc: "Smooth operational target opacity transition." },
            { id: "fade-out", name: "Fade Out", category: "fade", class: "em-fade-out", desc: "Fades structural content cleanly out of focus." },
            { id: "slide-up", name: "Slide Up", category: "slide", class: "em-slide-up", desc: "Translates components upward into screen bounds." },
            { id: "slide-right", name: "Slide Right", category: "slide", class: "em-slide-right", desc: "Slides elements smoothly from left-to-right directions." },
            { id: "zoom-in", name: "Zoom In", category: "zoom", class: "em-zoom-in", desc: "Scales targeted nodes outward gracefully from zero bounds." },
            { id: "zoom-out", name: "Zoom Out", category: "zoom", class: "em-zoom-out", desc: "Scales viewport bounds downward dynamically." },
            { id: "bounce", name: "Bounce Attention", category: "bounce", class: "em-bounce", desc: "Bouncy attention seeker for notifications and highlights." },
            { id: "pulse", name: "Pulse Scale", category: "bounce", class: "em-pulse", desc: "Rhythmic scaling effect simulating heartbeat alerts." }
        ];

        // Track user favorites in local memory array
        let favoritesList = JSON.parse(localStorage.getItem('em-favorites')) || [];

        // Dynamic Elements Mapping Reference Nodes
        const grid = document.getElementById("explorer-grid");
        const searchInput = document.getElementById("search-input");
        const categoryFilter = document.getElementById("category-select");
        const durationInput = document.getElementById("duration-range");
        const delayInput = document.getElementById("delay-range");
        const timingInput = document.getElementById("timing-select");
        const iterationInput = document.getElementById("iteration-select");

        // Main Rendering Pipeline Function 
        function renderExplorer() {
            grid.innerHTML = "";
            const searchQuery = searchInput.value.trim().toLowerCase();
            const selectedCategory = categoryFilter.value;

            // Filtration Processing 
            const filteredSet = animationRegistry.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchQuery) || item.class.toLowerCase().includes(searchQuery);
                const matchesCategory = selectedCategory === "all" || item.category === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            if(filteredSet.length === 0) {
                grid.innerHTML = `<div class="empty-state">No utility matches found for your criteria. Try adjusting parameters!</div>`;
                return;
            }

            // Generation and Deployment Loop 
            filteredSet.forEach(item => {
                const isFavorited = favoritesList.includes(item.id);
                const card = document.createElement("div");
                card.className = "animation-card";
                card.id = `card-node-${item.id}`;

                card.innerHTML = `
                    <div class="card-preview-area">
                        <div class="interactive-box-element ${item.class}" id="box-preview-${item.id}">
                            EaseMotion
                        </div>
                    </div>
                    <div class="card-details-wrapper">
                        <div class="card-headline-row">
                            <h3>${item.name}</h3>
                            <button class="fav-btn ${isFavorited ? 'active' : ''}" onclick="toggleFavorite('${item.id}')" title="Favorite">
                                ${isFavorited ? '❤️' : '🤍'}
                            </button>
                        </div>
                        <p class="card-description">${item.desc}</p>
                        <code class="class-token">.${item.class}</code>
                        <div class="card-action-triggers">
                            <button class="btn-action-replay" onclick="triggerReplay('${item.id}', '${item.class}')">▶️ Replay</button>
                            <button class="btn-action-copy" onclick="copyUtilityToClipboard('${item.class}')">📋 Copy Class</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                syncLiveElementProperties(item.id);
            });
        }

        // Apply Configuration States directly through elements via computational runtime styles
        function syncLiveElementProperties(id) {
            const target = document.getElementById(`box-preview-${id}`);
            if(!target) return;
            
            target.style.animationDuration = `${durationInput.value}s`;
            target.style.animationDelay = `${delayInput.value}s`;
            target.style.animationTimingFunction = timingInput.value;
            target.style.animationIterationCount = iterationInput.value;
        }

        function globalSyncAllProperties() {
            animationRegistry.forEach(item => syncLiveElementProperties(item.id));
        }

        // Hard Restart Mechanics on CSS Animations
        function triggerReplay(id, className) {
            const target = document.getElementById(`box-preview-${id}`);
            if(!target) return;

            target.classList.remove(className);
            void target.offsetWidth; // Force Layout Engine Reflow Matrix Re-eval
            target.classList.add(className);
            syncLiveElementProperties(id);
        }

        // Copy Engine with UI Toast Display Notification Hooks
        function copyUtilityToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById("toast-notification");
                toast.classList.remove("hidden");
                setTimeout(() => toast.classList.add("hidden"), 2200);
            });
        }

        // Favorites Storage Handlers
        function toggleFavorite(id) {
            if (favoritesList.includes(id)) {
                favoritesList = favoritesList.filter(favId => favId !== id);
            } else {
                favoritesList.push(id);
            }
            localStorage.setItem('em-favorites', JSON.stringify(favoritesList));
            renderExplorer();
        }

        // Bind Application Control Pipelines
        searchInput.addEventListener("input", renderExplorer);
        categoryFilter.addEventListener("change", renderExplorer);
        timingInput.addEventListener("change", globalSyncAllProperties);
        iterationInput.addEventListener("change", globalSyncAllProperties);

        durationInput.addEventListener("input", (e) => {
            document.getElementById("duration-val").textContent = `${parseFloat(e.target.value).toFixed(1)}s`;
            globalSyncAllProperties();
        });

        delayInput.addEventListener("input", (e) => {
            document.getElementById("delay-val").textContent = `${parseFloat(e.target.value).toFixed(1)}s`;
            globalSyncAllProperties();
        });

        // App Initializations Entry Execution Trigger
        renderExplorer();
    </script>
</body>
</html>
