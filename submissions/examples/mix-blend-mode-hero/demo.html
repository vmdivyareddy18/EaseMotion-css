<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mix-blend-mode Hero — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #000; }

    /* Controls */
    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 100;
    }
    .blend-btn {
      padding: 6px 16px;
      border-radius: 9999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 0.75rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s;
    }
    .blend-btn:hover, .blend-btn.active {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <section class="ease-blend-hero ease-blend-multiply" id="hero">
    <div class="ease-blend-hero-bg" style="background: linear-gradient(135deg, #1e1b4b, #312e81, #4c1d95);"></div>
    <div class="ease-blend-hero-overlay"></div>
    <div class="ease-blend-hero-content">
      <h1 class="ease-blend-title">Blend Modes</h1>
      <p class="ease-blend-subtitle">CSS mix-blend-mode creates stunning visual effects by blending layers together in creative ways.</p>
      <a href="#" class="ease-blend-cta">Explore Effects</a>
    </div>
  </section>

  <!-- Blend mode switcher -->
  <div class="controls">
    <button class="blend-btn active" onclick="setBlend('ease-blend-multiply', this)">Multiply</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-screen', this)">Screen</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-overlay', this)">Overlay</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-difference', this)">Difference</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-exclusion', this)">Exclusion</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-hue', this)">Hue</button>
    <button class="blend-btn" onclick="setBlend('ease-blend-color-mode', this)">Color</button>
  </div>

  <script>
    const modes = ['ease-blend-multiply','ease-blend-screen','ease-blend-overlay',
                   'ease-blend-difference','ease-blend-exclusion','ease-blend-hue','ease-blend-color-mode'];
    function setBlend(mode, btn) {
      const hero = document.getElementById('hero');
      modes.forEach(m => hero.classList.remove(m));
      hero.classList.add(mode);
      document.querySelectorAll('.blend-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
