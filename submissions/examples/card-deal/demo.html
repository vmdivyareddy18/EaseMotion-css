<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Deal Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="deal-wrapper">
      <h1>Card Deal</h1>
      <p class="description">
        A pure CSS card dealing animation. Hover to deal cards from the deck.
      </p>
      <div class="deck" tabindex="0" role="button" aria-label="Deal cards">
        <div class="card c1">A♠</div>
        <div class="card c2">K♥</div>
        <div class="card c3">Q♦</div>
        <div class="card c4">J♣</div>
        <div class="card c5">10♠</div>
      </div>
      <p class="hint">Hover or focus the deck to deal</p>
    </div>
  </body>
</html>
