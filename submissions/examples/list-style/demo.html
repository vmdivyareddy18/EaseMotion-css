<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Style Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item list-none">.list-none</div>
  <div class="demo-item list-disc">.list-disc</div>
  <div class="demo-item list-decimal">.list-decimal</div>
  <div class="demo-item list-square">.list-square</div>
  <div class="demo-item list-circle">.list-circle</div>
  <div class="demo-item list-inside">.list-inside</div>
</body>
</html>
