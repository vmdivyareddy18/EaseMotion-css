<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Newsletter Subscription</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-newsletter">
    <div class="ease-newsletter-card" id="newsletterCard">
      <div class="ease-newsletter-icon">
        <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="#7c5bfe" stroke-width="1.5">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <polyline points="2,4 12,13 22,4" />
        </svg>
      </div>
      <h2 class="ease-newsletter-title">Stay in the loop</h2>
      <p class="ease-newsletter-subtitle">Get weekly insights delivered to your inbox.</p>

      <form class="ease-newsletter-form" id="newsletterForm">
        <div class="ease-newsletter-input-wrap">
          <input
            type="email"
            class="ease-newsletter-input"
            placeholder="you@example.com"
            required
          />
        </div>
        <button type="submit" class="ease-newsletter-btn">
          <span class="ease-btn-text">Subscribe</span>
          <span class="ease-btn-loader"></span>
        </button>
      </form>

      <div class="ease-success-state" id="successState">
        <div class="ease-success-checkmark">
          <svg viewBox="0 0 52 52" width="52" height="52">
            <circle class="ease-check-circle" cx="26" cy="26" r="24" fill="none" stroke="#4ade80" stroke-width="3" />
            <path class="ease-check-path" d="M14 27l7 7 16-16" fill="none" stroke="#4ade80" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <h3 class="ease-success-title">You're subscribed!</h3>
        <p class="ease-success-text">Thanks for joining. Check your inbox for a welcome email.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById("newsletterForm").addEventListener("submit", function (e) {
      e.preventDefault();
      const btn = this.querySelector(".ease-newsletter-btn");
      btn.classList.add("ease-btn-loading");
      setTimeout(() => {
        btn.classList.remove("ease-btn-loading");
        btn.classList.add("ease-btn-success");
        this.querySelector(".ease-btn-text").textContent = "Done!";
        setTimeout(() => {
          document.getElementById("newsletterCard").classList.add("ease-show-success");
        }, 400);
      }, 1500);
    });
  </script>
</body>
</html>
