<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Boundary Fallback — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="error-illustration">
      <div class="broken-circle">
        <div class="broken-piece piece-1"></div>
        <div class="broken-piece piece-2"></div>
      </div>
      <div class="exclamation">!</div>
    </div>
    <h1>Something went wrong</h1>
    <p class="message">An unexpected error occurred. Our team has been notified.</p>
    <div class="actions">
      <button class="btn btn-primary" id="retryBtn">Try Again</button>
      <button class="btn btn-secondary" id="dismissBtn">Dismiss</button>
    </div>
    <div class="error-details" id="errorDetails">
      <p>TypeError: Cannot read property 'map' of undefined</p>
      <p>at Component.render (line:42)</p>
    </div>
  </div>
  <script>
    document.getElementById('retryBtn').addEventListener('click', () => {
      document.querySelector('.error-illustration').classList.add('shake');
      setTimeout(() => document.querySelector('.error-illustration').classList.remove('shake'), 600);
    });
    document.getElementById('dismissBtn').addEventListener('click', () => {
      const details = document.getElementById('errorDetails');
      details.classList.toggle('visible');
    });
  </script>
</body>
</html>
