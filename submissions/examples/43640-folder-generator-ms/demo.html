<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Folder Name Generator Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-gen-container">
    <h2 class="ease-gen-title">Submission Folder Generator</h2>
    <p class="ease-gen-desc">EaseMotion requires unique folder names for every PR (e.g. <code>43210-my-component-abc1</code>). Generate your valid folder name below.</p>

    <div class="ease-gen-form">
      <div class="ease-gen-input-group">
        <label class="ease-gen-label">Issue Number (e.g. 43501)</label>
        <input type="number" id="issueNum" class="ease-gen-input" placeholder="43501">
      </div>
      
      <div class="ease-gen-input-group">
        <label class="ease-gen-label">Component Name (e.g. Ghost Button)</label>
        <input type="text" id="compName" class="ease-gen-input" placeholder="Ghost Button">
      </div>

      <div class="ease-gen-input-group">
        <label class="ease-gen-label">Your Unique Suffix (e.g. initials or random chars)</label>
        <input type="text" id="suffix" class="ease-gen-input" placeholder="ms">
      </div>

      <div class="ease-gen-result-card">
        <span class="ease-gen-result-label">Generated Folder Name</span>
        <div id="output" class="ease-gen-output ease-pulse-slow" title="Click to copy">43501-ghost-button-ms</div>
      </div>
    </div>
  </div>

  <script>
    const inputs = [
      document.getElementById('issueNum'),
      document.getElementById('compName'),
      document.getElementById('suffix')
    ];
    const output = document.getElementById('output');

    function slugify(text) {
      return text.toString().toLowerCase()
        .replace(/\s+/g, '-')           // Replace spaces with -
        .replace(/[^\w\-]+/g, '')       // Remove all non-word chars
        .replace(/\-\-+/g, '-')         // Replace multiple - with single -
        .replace(/^-+/, '')             // Trim - from start of text
        .replace(/-+$/, '');            // Trim - from end of text
    }

    function updateOutput() {
      const issue = inputs[0].value.trim() || 'issue';
      const comp = slugify(inputs[1].value) || 'component';
      const sfx = slugify(inputs[2].value) || 'suffix';
      
      output.textContent = `${issue}-${comp}-${sfx}`;
    }

    inputs.forEach(input => {
      input.addEventListener('input', updateOutput);
    });

    output.addEventListener('click', () => {
      navigator.clipboard.writeText(output.textContent);
      const originalText = output.textContent;
      output.textContent = 'Copied!';
      setTimeout(() => output.textContent = originalText, 1000);
    });
  </script>

</body>
</html>
