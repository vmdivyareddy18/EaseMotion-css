<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alarm Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="alarm">
    <span class="bell left"></span>
    <span class="bell right"></span>
    <span class="hammer"></span>
    <div class="body">
      <div class="face">
        <span class="tick" style="--i: 0;"></span>
        <span class="tick" style="--i: 3;"></span>
        <span class="tick" style="--i: 6;"></span>
        <span class="tick" style="--i: 9;"></span>
        <span class="hand hour"></span>
        <span class="hand minute"></span>
        <span class="pin"></span>
      </div>
    </div>
    <span class="foot left"></span>
    <span class="foot right"></span>
  </div>
</body>
</html>
