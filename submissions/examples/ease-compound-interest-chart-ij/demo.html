<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compound Interest Chart - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Compound Interest Chart</h1>
    <p class="desc">Bars grow sequentially showing compound growth over years</p>
    <div class="cic-chart" id="chart" style="--bar-color: #60a5fa; --growth-color: #34d399; --chart-bg: #1e293b; --grow-duration: 0.8s;">
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="10"></div><span class="cic-label">Y1</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="21"></div><span class="cic-label">Y2</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="33"></div><span class="cic-label">Y3</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="46"></div><span class="cic-label">Y4</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="61"></div><span class="cic-label">Y5</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="77"></div><span class="cic-label">Y6</span></div>
      <div class="cic-bar-wrap"><div class="cic-bar" data-value="95"></div><span class="cic-label">Y7</span></div>
    </div>
  </div>
  <script>
    const bars = document.querySelectorAll('.cic-bar');
    bars.forEach((bar, i) => {
      setTimeout(() => {
        bar.style.setProperty('--h', bar.dataset.value);
        bar.classList.add('grow');
      }, i * 150);
    });
  </script>
</body>
</html>
