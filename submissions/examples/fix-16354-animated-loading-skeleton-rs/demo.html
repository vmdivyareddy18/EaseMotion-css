<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Loading Skeletons Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        prefix: 'ease-',
      }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-slate-900 ease-text-white ease-font-sans ease-p-8 ease-min-h-screen">

    <div class="ease-max-w-5xl ease-mx-auto">
        <div class="ease-text-center ease-mb-16">
            <h1 class="ease-text-4xl ease-font-bold ease-mb-4">Animated Loading Skeletons</h1>
            <p class="ease-text-slate-400">
                Smooth shimmering and pulsing placeholder components to improve perceived performance while data loads.
            </p>
        </div>

        <div class="ease-grid ease-grid-cols-1 md:ease-grid-cols-2 ease-gap-12">
            
            <!-- Shimmering Skeleton (List View) -->
            <div>
                <h3 class="ease-text-xl ease-font-semibold ease-mb-6 ease-border-b ease-border-slate-800 ease-pb-2">Shimmer Effect (Linear Gradient)</h3>
                
                <div class="ease-space-y-6">
                    <!-- Skeleton Row 1 -->
                    <div class="ease-flex ease-items-center ease-gap-4">
                        <div class="ease-skeleton ease-skeleton-circle ease-w-16 ease-h-16 ease-flex-shrink-0"></div>
                        <div class="ease-flex-1 ease-space-y-3">
                            <div class="ease-skeleton ease-h-4 ease-w-3/4"></div>
                            <div class="ease-skeleton ease-h-4 ease-w-1/2"></div>
                        </div>
                    </div>

                    <!-- Skeleton Row 2 -->
                    <div class="ease-flex ease-items-center ease-gap-4">
                        <div class="ease-skeleton ease-skeleton-circle ease-w-16 ease-h-16 ease-flex-shrink-0"></div>
                        <div class="ease-flex-1 ease-space-y-3">
                            <div class="ease-skeleton ease-h-4 ease-w-2/3"></div>
                            <div class="ease-skeleton ease-h-4 ease-w-5/6"></div>
                        </div>
                    </div>

                    <!-- Skeleton Row 3 -->
                    <div class="ease-flex ease-items-center ease-gap-4">
                        <div class="ease-skeleton ease-skeleton-circle ease-w-16 ease-h-16 ease-flex-shrink-0"></div>
                        <div class="ease-flex-1 ease-space-y-3">
                            <div class="ease-skeleton ease-h-4 ease-w-full"></div>
                            <div class="ease-skeleton ease-h-4 ease-w-1/3"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Pulsing Skeleton (Card View) -->
            <div>
                <h3 class="ease-text-xl ease-font-semibold ease-mb-6 ease-border-b ease-border-slate-800 ease-pb-2">Pulse Effect (Opacity)</h3>
                
                <div class="ease-bg-slate-800 ease-rounded-xl ease-p-6 ease-border ease-border-slate-700">
                    <!-- Image Placeholder -->
                    <div class="ease-skeleton-pulse ease-w-full ease-h-48 ease-rounded-lg ease-mb-6"></div>
                    
                    <!-- Content -->
                    <div class="ease-space-y-4">
                        <div class="ease-skeleton-pulse ease-h-6 ease-w-2/3 ease-rounded-md"></div>
                        <div class="ease-space-y-2">
                            <div class="ease-skeleton-pulse ease-h-3 ease-w-full ease-rounded-sm"></div>
                            <div class="ease-skeleton-pulse ease-h-3 ease-w-full ease-rounded-sm"></div>
                            <div class="ease-skeleton-pulse ease-h-3 ease-w-4/5 ease-rounded-sm"></div>
                        </div>
                        
                        <!-- Button Placeholder -->
                        <div class="ease-mt-6">
                            <div class="ease-skeleton-pulse ease-h-10 ease-w-32 ease-rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
