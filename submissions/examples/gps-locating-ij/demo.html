<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Locating - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>GPS Locating</h1>

    <div class="gps-card">
      <div class="gps-icon">
        <div class="pin-shadow"></div>
        <div class="pin-body"></div>
        <div class="pin-dot"></div>
        <div class="gps-ring r1"></div>
        <div class="gps-ring r2"></div>
        <div class="gps-ring r3"></div>
      </div>
      <span class="gps-label">Finding location...</span>
    </div>

    <div class="variant-row">
      <div class="gps-card sm">
        <div class="gps-icon">
          <div class="pin-shadow"></div>
          <div class="pin-body"></div>
          <div class="pin-dot"></div>
          <div class="gps-ring r1"></div>
          <div class="gps-ring r2"></div>
        </div>
        <span class="gps-label">GPS locked</span>
      </div>
    </div>

    <p class="description">The location pin bounces while expanding ring pulses radiate outward, simulating GPS signal searching.</p>
  </div>
</body>
</html>
