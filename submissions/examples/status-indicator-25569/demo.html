<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Indicator Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 2rem;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      background: var(--ease-color-bg);
    }
    .preview-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      background: var(--ease-color-surface);
      box-shadow: var(--ease-shadow-sm);
      text-align: center;
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--ease-color-text);
    }
    .avatar-demo {
      position: relative;
      display: inline-block;
    }
    h3 {
      margin: 0 0 0.5rem;
      color: var(--ease-color-text);
    }
  </style>
</head>
<body>

  <div class="preview-card">
    <h3>Status States</h3>
    <div class="demo-row">
      <span class="ease-status ease-status-online ease-status-bordered"></span>
      Online
    </div>
    <div class="demo-row">
      <span class="ease-status ease-status-away ease-status-bordered"></span>
      Away
    </div>
    <div class="demo-row">
      <span class="ease-status ease-status-busy ease-status-bordered"></span>
      Busy
    </div>
    <div class="demo-row">
      <span class="ease-status ease-status-offline ease-status-bordered"></span>
      Offline
    </div>
  </div>

  <div class="preview-card">
    <h3>Sizes</h3>
    <div class="demo-row">
      <span class="ease-status ease-status-online ease-status-sm"></span>
      Small (8px)
    </div>
    <div class="demo-row">
      <span class="ease-status ease-status-online"></span>
      Medium (10px)
    </div>
    <div class="demo-row">
      <span class="ease-status ease-status-online ease-status-lg"></span>
      Large (14px)
    </div>
  </div>

  <div class="preview-card">
    <h3>With Avatar</h3>
    <div style="display:flex; gap:1.5rem; align-items:center;">
      <div class="avatar-demo">
        <div class="ease-avatar ease-avatar-lg" style="background:#e0e7ff; color:#6c63ff;">JD</div>
        <span class="ease-status ease-status-online ease-status-bordered ease-status-positioned"></span>
      </div>
      <div class="avatar-demo">
        <div class="ease-avatar ease-avatar-lg" style="background:#fee2e2; color:#b91c1c;">AS</div>
        <span class="ease-status ease-status-away ease-status-bordered ease-status-positioned"></span>
      </div>
      <div class="avatar-demo">
        <div class="ease-avatar ease-avatar-lg" style="background:#f1f5f9; color:#64748b;">MK</div>
        <span class="ease-status ease-status-busy ease-status-bordered ease-status-positioned"></span>
      </div>
    </div>
  </div>

  <div class="preview-card">
    <h3>Custom Color</h3>
    <div class="demo-row">
      <span class="ease-status" style="--ease-status-color: #a855f7;"></span>
      Custom Purple
    </div>
    <div class="demo-row">
      <span class="ease-status" style="--ease-status-color: #06b6d4;"></span>
      Custom Cyan
    </div>
    <div class="demo-row">
      <span class="ease-status" style="--ease-status-color: #f97316;"></span>
      Custom Orange
    </div>
  </div>

</body>
</html>
