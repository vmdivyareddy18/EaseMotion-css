<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - AK</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <h1>🍅 Pomodoro Timer</h1>
                <p class="subtitle">Stay focused, be productive</p>
            </div>

            <div class="mode-tabs">
                <button class="mode-btn active" data-mode="work">Focus</button>
                <button class="mode-btn" data-mode="short">Short Break</button>
                <button class="mode-btn" data-mode="long">Long Break</button>
            </div>

            <div class="timer-circle">
                <svg viewBox="0 0 200 200">
                    <circle class="bg-ring" cx="100" cy="100" r="90"></circle>
                    <circle class="progress-ring" cx="100" cy="100" r="90"></circle>
                </svg>
                <div class="time-display">
                    <span id="minutes">25</span>:<span id="seconds">00</span>
                    <div class="session-label" id="sessionLabel">Focus Time</div>
                </div>
            </div>

            <div class="controls">
                <button id="startBtn" class="btn primary">▶ Start</button>
                <button id="pauseBtn" class="btn secondary hidden">⏸ Pause</button>
                <button id="resetBtn" class="btn danger">↺ Reset</button>
            </div>

            <div class="settings">
                <div class="stat">
                    <span class="stat-num" id="sessions">0</span>
                    <span class="stat-label">Sessions</span>
                </div>
                <div class="stat">
                    <span class="stat-num" id="totalMin">0</span>
                    <span class="stat-label">Minutes</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const modes = {
            work:  { time: 25 * 60, label: 'Focus Time',  color: '#eb3349' },
            short: { time: 5 * 60,  label: 'Short Break', color: '#11998e' },
            long:  { time: 15 * 60, label: 'Long Break',  color: '#4b6cb7' }
        };

        let currentMode = 'work';
        let timeLeft = modes.work.time;
        let totalTime = modes.work.time;
        let timer = null;
        let isRunning = false;
        let sessions = 0;
        let totalMinutes = 0;

        const minEl = document.getElementById('minutes');
        const secEl = document.getElementById('seconds');
        const labelEl = document.getElementById('sessionLabel');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressRing = document.querySelector('.progress-ring');
        const sessionsEl = document.getElementById('sessions');
        const totalMinEl = document.getElementById('totalMin');

        const circumference = 2 * Math.PI * 90;
        progressRing.style.strokeDasharray = circumference;
        progressRing.style.strokeDashoffset = 0;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            minEl.textContent = String(m).padStart(2, '0');
            secEl.textContent = String(s).padStart(2, '0');
            document.title = `${minEl.textContent}:${secEl.textContent} - Pomodoro`;

            const progress = (totalTime - timeLeft) / totalTime;
            progressRing.style.strokeDashoffset = circumference * (1 - progress);
            progressRing.style.stroke = modes[currentMode].color;
        }

        function setMode(mode) {
            currentMode = mode;
            timeLeft = modes[mode].time;
            totalTime = modes[mode].time;
            labelEl.textContent = modes[mode].label;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            stopTimer();
            updateDisplay();
        }

        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            startBtn.classList.add('hidden');
            pauseBtn.classList.remove('hidden');
            timer = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    completeSession();
                }
            }, 1000);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timer);
            startBtn.classList.remove('hidden');
            pauseBtn.classList.add('hidden');
        }

        function resetTimer() {
            stopTimer();
            timeLeft = totalTime;
            updateDisplay();
        }

        function completeSession() {
            stopTimer();
            if (currentMode === 'work') {
                sessions++;
                totalMinutes += modes.work.time / 60;
                sessionsEl.textContent = sessions;
                totalMinEl.textContent = totalMinutes;
            }
            playBeep();
            alert(`${modes[currentMode].label} complete! 🎉`);
            resetTimer();
        }

        function playBeep() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = 800;
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                osc.start();
                osc.stop(ctx.currentTime + 0.5);
            } catch(e) {}
        }

        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });

        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', stopTimer);
        resetBtn.addEventListener('click', resetTimer);

        updateDisplay();
    </script>
</body>
</html>
