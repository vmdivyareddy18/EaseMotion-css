<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Close Button Focus Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-alert – Close Button Focus Fix</h2>
  <div class="demo-stack">
    <div class="ease-alert ease-alert--info" role="alert">
      <span class="ease-alert__icon" aria-hidden="true">ℹ️</span>
      <div class="ease-alert__body"><strong class="ease-alert__title">Information</strong> Your session will expire in 5 minutes.</div>
      <button class="ease-alert__close" aria-label="Dismiss alert" onclick="this.closest('.ease-alert').remove()">✕</button>
    </div>
    <div class="ease-alert ease-alert--success" role="alert">
      <span class="ease-alert__icon" aria-hidden="true">✅</span>
      <div class="ease-alert__body"><strong class="ease-alert__title">Success</strong> Your changes have been saved.</div>
      <button class="ease-alert__close" aria-label="Dismiss alert" onclick="this.closest('.ease-alert').remove()">✕</button>
    </div>
    <div class="ease-alert ease-alert--warning" role="alert">
      <span class="ease-alert__icon" aria-hidden="true">⚠️</span>
      <div class="ease-alert__body"><strong class="ease-alert__title">Warning</strong> Disk space is running low.</div>
      <button class="ease-alert__close" aria-label="Dismiss alert" onclick="this.closest('.ease-alert').remove()">✕</button>
    </div>
    <div class="ease-alert ease-alert--danger" role="alert">
      <span class="ease-alert__icon" aria-hidden="true">🛑</span>
      <div class="ease-alert__body"><strong class="ease-alert__title">Error</strong> Failed to save. Please try again.</div>
      <button class="ease-alert__close" aria-label="Dismiss alert" onclick="this.closest('.ease-alert').remove()">✕</button>
    </div>
  </div>
</body>
</html>
