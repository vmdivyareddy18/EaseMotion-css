<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Floating Theme Switcher</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="switcher">

  <h1>Theme Selector</h1>

  <section class="themes">

    <button class="theme active">
      <span class="color cyan"></span>
      Aurora
    </button>

    <button class="theme">
      <span class="color purple"></span>
      Galaxy
    </button>

    <button class="theme">
      <span class="color orange"></span>
      Sunset
    </button>

    <button class="theme">
      <span class="color green"></span>
      Forest
    </button>

  </section>

</main>

</body>
</html>
