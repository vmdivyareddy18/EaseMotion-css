<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-floating-label-textarea</title>
    <meta
      name="description"
      content="A floating label textarea with auto-resize, character counter, clear control, and input variants."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="textarea-demo" aria-labelledby="textarea-title">
        <header class="textarea-header">
          <div>
            <p class="eyebrow">EaseMotion component</p>
            <h1 id="textarea-title">ease-floating-label-textarea</h1>
            <p class="textarea-copy">
              A polished floating label textarea with auto-growing height, live character counter, and interaction variants.
            </p>
          </div>
        </header>

        <article class="demo-card">
          <div class="field-group">
            <div class="floating-field filled" id="activeField">
              <textarea
                id="message"
                class="textarea-control"
                rows="4"
                maxlength="500"
                placeholder="Leave a short note..."
                aria-describedby="messageCounter"
              ></textarea>
              <label class="floating-label" for="message">Message</label>
              <button type="button" class="clear-button" id="clearTextarea">Clear</button>
            </div>

            <div class="field-meta">
              <p id="messageCounter" class="counter" aria-live="polite">0 / 500</p>
              <p class="hint">Type to see auto-resize behavior. The textarea grows until the 300px max height.</p>
            </div>
          </div>

          <div class="state-grid" aria-label="Textarea examples">
            <article class="state-card">
              <p class="state-title">Disabled</p>
              <div class="floating-field disabled">
                <textarea id="disabledMessage" class="textarea-control" disabled placeholder="Disabled textarea">This textarea is disabled.</textarea>
                <label class="floating-label" for="disabledMessage">Disabled</label>
              </div>
            </article>

            <article class="state-card">
              <p class="state-title">Read-only</p>
              <div class="floating-field readonly filled">
                <textarea id="readonlyMessage" class="textarea-control" readonly placeholder="Read-only textarea">Read-only content is visible here.</textarea>
                <label class="floating-label" for="readonlyMessage">Read-only</label>
              </div>
            </article>

            <article class="state-card">
              <p class="state-title">Success</p>
              <div class="floating-field success filled">
                <textarea id="successMessage" class="textarea-control" readonly placeholder="Success example">Your message is saved successfully.</textarea>
                <label class="floating-label" for="successMessage">Success</label>
              </div>
            </article>

            <article class="state-card">
              <p class="state-title">Error</p>
              <div class="floating-field error filled">
                <textarea id="errorMessage" class="textarea-control" readonly placeholder="Error example">Please remove extra characters to continue.</textarea>
                <label class="floating-label" for="errorMessage">Error</label>
              </div>
            </article>
          </div>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
