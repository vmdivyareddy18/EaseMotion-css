<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Hero Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="parallax-container">
    <div class="parallax-layer layer-back">
      <div class="stars"></div>
    </div>
    <div class="parallax-layer layer-base">
      <div class="mountain"></div>
    </div>
    <div class="parallax-layer layer-front">
      <h1>Parallax World</h1>
    </div>
  </div>
  <div class="content">
    <h2>Scroll down</h2>
    <p>The layers above move at different speeds using pure CSS 3D translation.</p>
    <div style="height: 1000px;"></div>
  </div>
</body>
</html>
