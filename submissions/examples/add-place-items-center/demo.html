<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Place Items Center Utility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h1>Place Items Center Utility Demo</h1>
    <p class="subtitle">
      Centers content horizontally and vertically using CSS Grid.
    </p>

    <div class="demo-grid">

      <div class="demo-card">
        <h3>.place-items-center</h3>
        <div class="box place-items-center">
          Centered
        </div>
      </div>

      <div class="demo-card">
        <h3>Icon Example</h3>
        <div class="box place-items-center">
          ⭐
        </div>
      </div>

      <div class="demo-card">
        <h3>Button Example</h3>
        <div class="box place-items-center">
          <button>Click Me</button>
        </div>
      </div>

    </div>
  </section>

</body>
</html>
