<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tada Map Embed</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: #fafafa; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; padding: 2rem;">
  
  <div class="map-card ease-fade-in-up">
    <!-- Map placeholder (creative agencies often use stylized maps instead of standard iframes) -->
    <div class="map-container">
      <img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80" alt="Creative Map Area" class="map-img">
      
      <!-- Interactive Map Marker using Tada -->
      <button class="map-marker ease-tada" aria-label="Our Studio Location">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="#f43f5e" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
          <circle cx="12" cy="10" r="3"></circle>
        </svg>
        <span class="marker-pulse ease-pulse"></span>
      </button>
    </div>
    
    <div class="card-footer">
      <div>
        <h3>Creative Studio</h3>
        <p>123 Arts District, NY 10012</p>
      </div>
      <a href="#" class="directions-btn ease-hover-pop">Get Directions</a>
    </div>
  </div>

</body>
</html>
