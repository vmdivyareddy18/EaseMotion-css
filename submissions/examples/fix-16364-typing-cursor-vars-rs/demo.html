<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Cursor Customization</title>
  <link rel="stylesheet" href="../../core/index.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; font-family: monospace; font-size: 1.5rem; }
    .custom-cursor {
      --ease-cursor-color: #ff0055;
      --ease-cursor-width: 4px;
    }
  </style>
</head>
<body>
  <h1>Typing Cursor</h1>
  <div class="ease-typing-cursor" style="width: 14ch;">Typing effect</div>
  <br>
  <div class="ease-typing-cursor custom-cursor" style="width: 22ch;">Custom colored cursor!</div>
</body>
</html>
