<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burst Star Rating - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper"> 
    <h1>Burst Star Rating</h1>
    <p class="subtitle">Select a star to trigger the particle sparkle burst effect</p>

    <div class="star-rating">
      <input type="radio" id="star5" name="rating" value="5">
      <label for="star5" title="5 stars">★<span class="burst"></span></label>
      
      <input type="radio" id="star4" name="rating" value="4">
      <label for="star4" title="4 stars">★<span class="burst"></span></label>
      
      <input type="radio" id="star3" name="rating" value="3">
      <label for="star3" title="3 stars">★<span class="burst"></span></label>
      
      <input type="radio" id="star2" name="rating" value="2">
      <label for="star2" title="2 stars">★<span class="burst"></span></label>
      
      <input type="radio" id="star1" name="rating" value="1">
      <label for="star1" title="1 star">★<span class="burst"></span></label>
    </div>

    <p class="description">
      This interactive rating widget triggers a dual-colored particle explosion effect on selection using a pure CSS keyframe box-shadow technique.
    </p>
  </div>

</body>
</html>
