<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Spotlight Avatar Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="showcase-container">
        <!-- Interactive Spotlight Card Wrapper -->
        <div class="profile-card ease-spotlight" role="region" aria-label="Creative Team Profile Card">
            
            <!-- Volumetric Light Beam Effects -->
            <div class="light-beam-emitter" aria-hidden="true">
                <div class="cone-light"></div>
            </div>

            <!-- Spotlight Avatar Assembly -->
            <div class="avatar-assembly">
                <!-- Outer Pulse Rings -->
                <div class="halo-ring ring-primary" aria-hidden="true"></div>
                <div class="halo-ring ring-secondary" aria-hidden="true"></div>
                
                <!-- Inner Avatar Portal -->
                <div class="avatar-portal">
                    <img src="https://picsum.photos/300/300?random=88" alt="Portrait of Jaspreet, Lead Motion Designer" class="avatar-img">
                    <!-- Dynamic Light Glare -->
                    <div class="portal-glare" aria-hidden="true"></div>
                </div>

                <!-- Vector Light Particle Clusters -->
                <div class="light-orbs" aria-hidden="true">
                    <span class="orb o-1"></span>
                    <span class="orb o-2"></span>
                    <span class="orb o-3"></span>
                </div>
            </div>

            <!-- Profile Meta Copy -->
            <section class="profile-content">
                <header class="profile-header">
                    <h2>Jaspreet Kaur</h2>
                    <p class="role-badge">Lead Motion Architect</p>
                </header>
                
                <p class="profile-bio">
                    Sculpting interactive digital dimensions using math, CSS layers, and fluid hardware-accelerated motion mechanics.
                </p>

                <!-- Skill Chips Container -->
                <div class="skills-wrapper" aria-label="Specialized Skills">
                    <span class="skill-chip">UI/UX</span>
                    <span class="skill-chip">CSS Art</span>
                    <span class="skill-chip">WebGPU</span>
                </div>

                <!-- Call to Action Link -->
                <a href="javascript:void(0)" class="btn-profile" aria-label="Explore Jaspreet's interactive creative portfolio">
                    <span>View Portfolio</span>
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </a>
            </section>
        </div>
    </main>

</body>
</html>
