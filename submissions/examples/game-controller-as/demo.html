<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Controller</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="pad">
    <span class="bumper l"></span>
    <span class="bumper r"></span>

    <div class="dpad">
      <span class="up"></span>
      <span class="down"></span>
      <span class="left"></span>
      <span class="right"></span>
      <span class="center"></span>
    </div>

    <div class="face">
      <button type="button" class="btn y">Y</button>
      <button type="button" class="btn x">X</button>
      <button type="button" class="btn b">B</button>
      <button type="button" class="btn a">A</button>
    </div>

    <div class="mid">
      <button type="button" class="mini"></button>
      <button type="button" class="mini"></button>
    </div>

    <span class="stick left-stick"></span>
    <span class="stick right-stick"></span>
  </div>
</body>
</html>
