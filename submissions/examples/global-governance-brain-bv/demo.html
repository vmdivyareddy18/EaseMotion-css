<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Security Governance Brain</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="gov-dashboard">
    <header class="header">
      <span class="badge">Governance Brain</span>
      <h1>Global Security Governance Brain</h1>
      <p class="subtitle">Evolving system governance rules, regulatory checks, and audit parameters.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-gov">
        <h3>📜 Audited Policies</h3>
        <ul class="policies-list">
          <li>Gateway Lease Duration: <strong>Adaptive (10m)</strong></li>
          <li>Port Scan Mitigations: <strong>Active</strong></li>
        </ul>
      </section>

      <section class="side-panel">
        <div class="panel-card metrics-card">
          <h3>📊 Autonomy Index</h3>
          <div class="autonomy-dial"><span>98.8%</span></div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
