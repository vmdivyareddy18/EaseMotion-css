<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Pricing Toggle</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--ease-color-neutral-50);
            padding: 60px 20px;
        }
    </style>
</head>
<body class="ease-text-primary">

    <div class="ease-pricing-section ease-fade-in ease-slide-up">
        
        <div class="ease-text-center ease-mb-8">
            <h1 class="ease-text-4xl ease-font-bold ease-mb-4">Simple, transparent pricing</h1>
            <p class="ease-text-muted">No contracts. No surprise fees. Switch between plans at any time.</p>
        </div>

        <!-- The Hidden State Machine -->
        <input type="checkbox" id="billing-toggle" class="ease-sr-only ease-pricing-trigger">
        
        <!-- The Toggle Switch UI -->
        <div class="ease-toggle-container ease-fade-in ease-delay-200">
            <label for="billing-toggle" class="ease-toggle-label">
                <span class="ease-toggle-text monthly">Monthly</span>
                <div class="ease-toggle-slider"></div>
                <span class="ease-toggle-text yearly">Yearly <span class="ease-badge ease-badge-success ease-ml-1">Save 20%</span></span>
            </label>
        </div>

        <!-- Pricing Cards Grid -->
        <div class="ease-pricing-grid ease-fade-in ease-delay-400">
            
            <!-- Basic Plan -->
            <div class="ease-pricing-card">
                <h3 class="ease-text-xl ease-font-bold">Starter</h3>
                <p class="ease-text-sm ease-text-muted ease-mt-2">Perfect for side projects and individual developers.</p>
                
                <div class="ease-price-wrapper">
                    <div class="ease-price-monthly">$12<span>/mo</span></div>
                    <div class="ease-price-yearly">$9<span>/mo</span></div>
                </div>
                
                <button class="ease-btn ease-btn-outline ease-btn-hover ease-w-full ease-mt-auto">Get Started</button>
            </div>

            <!-- Pro Plan -->
            <div class="ease-pricing-card" style="border-color: var(--ease-color-primary); box-shadow: var(--ease-shadow-md);">
                <div class="ease-flex ease-justify-between ease-items-center">
                    <h3 class="ease-text-xl ease-font-bold ease-text-primary">Pro</h3>
                    <span class="ease-badge ease-badge-primary">Most Popular</span>
                </div>
                <p class="ease-text-sm ease-text-muted ease-mt-2">Everything you need for scaling your production apps.</p>
                
                <div class="ease-price-wrapper">
                    <div class="ease-price-monthly">$29<span>/mo</span></div>
                    <div class="ease-price-yearly">$24<span>/mo</span></div>
                </div>
                
                <button class="ease-btn ease-btn-primary ease-btn-hover ease-w-full ease-mt-auto">Start Free Trial</button>
            </div>

        </div>
    </div>

</body>
</html>
