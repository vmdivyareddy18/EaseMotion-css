<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Pulse-Active Interactive Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div
        class="interactive-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
        tabindex="0"
    >

        <h2 id="modal-title">Interactive Panel</h2>

        <p class="subtitle">
            Customize your experience with quick settings.
        </p>

        <div class="divider"></div>

        <section class="setting">
            <div class="setting-info">
                <h3>🌙 Dark Mode</h3>
                <p>Enable dark theme for better viewing.</p>
            </div>

            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </section>

        <section class="setting">
            <div class="setting-info">
                <h3>🔔 Notifications</h3>
                <p>Receive important activity alerts.</p>
            </div>

            <label class="switch">
                <input type="checkbox" checked>
                <span class="slider"></span>
            </label>
        </section>

        <section class="setting">
            <div class="setting-info">
                <h3>📧 Email Updates</h3>
                <p>Stay informed with weekly summaries.</p>
            </div>

            <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
            </label>
        </section>

        <button class="save-btn">
            Save Changes
        </button>

    </div>

</div>

</body>
</html>
