<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pulse-Active Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="dashboard-container">
        <div class="metric-card">
            <div class="metric-header">
                <span class="metric-label">Server CPU Load</span>

                <div class="tooltip-wrapper">
                    <button type="button" class="dashboard-info-trigger" aria-describedby="cpu-pulse-tooltip"
                        aria-label="System configuration info">
                        i
                    </button>

                    <div id="cpu-pulse-tooltip" class="dashboard-tooltip" role="tooltip">
                        <span class="tooltip-status-pill">System Healthy</span>
                        <p class="tooltip-body">Aggregated live across 12 cluster nodes. Refreshes automatically every
                            2.5 seconds.</p>
                    </div>
                </div>
            </div>
            <div class="metric-value">42.8%</div>
        </div>
    </main>
</body>

</html>
