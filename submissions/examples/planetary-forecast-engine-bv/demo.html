<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetary Threat Forecast Engine</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="forecast-dashboard">
    <header class="header">
      <span class="badge">Forecast Engine</span>
      <h1>Planetary Threat Forecast Engine</h1>
      <p class="subtitle">Distributed prediction of cyber-fraud threat campaigns across geographical nodes.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card geography-panel">
        <h3>🌍 Geographic Risk heatmaps</h3>
        <div class="heatmap-grid">
          <div class="grid-cell lvl-4"><span>North America</span></div>
          <div class="grid-cell lvl-1"><span>Europe</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card alerts-panel">
          <h3>🚨 Active Threat forecasts</h3>
          <div class="incident-feed">
            <div class="incident-item danger">
              <h4>Asia Hub</h4>
              <p>DDoS campaign window: next 2 hours.</p>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
