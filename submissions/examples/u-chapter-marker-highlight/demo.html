<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-chapter-marker-highlight</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <h2>Video Chapters</h2>

    <div class="timeline">

        <div class="marker" style="left:15%;">
            <span class="tooltip">Introduction</span>
        </div>

        <div class="marker" style="left:40%;">
            <span class="tooltip">Setup Guide</span>
        </div>

        <div class="marker" style="left:65%;">
            <span class="tooltip">Live Demo</span>
        </div>

        <div class="marker" style="left:88%;">
            <span class="tooltip">Conclusion</span>
        </div>

    </div>

</div>

</body>
</html>
