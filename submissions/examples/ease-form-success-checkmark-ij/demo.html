<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Success Checkmark</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Form Success Checkmark</h1>
    <div class="form-view" id="formView">
      <form id="demoForm" novalidate>
        <div class="field-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" class="field" placeholder="Enter your name" required>
        </div>
        <div class="field-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="field" placeholder="Enter your email" required>
        </div>
        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </div>
    <div class="success-view" id="successView">
      <svg class="checkmark-svg" viewBox="0 0 80 80">
        <circle class="checkmark-circle" cx="40" cy="40" r="35" fill="none"/>
        <path class="checkmark-check" d="M22 42 l12 12 l24 -24" fill="none"/>
      </svg>
      <h2 class="success-title">Submitted!</h2>
      <p class="success-desc">Your information has been received.</p>
      <button id="resetBtn" class="submit-btn reset-btn">Submit Another</button>
    </div>
  </div>
  <script src="demo.js"></script>
</body>
</html>
