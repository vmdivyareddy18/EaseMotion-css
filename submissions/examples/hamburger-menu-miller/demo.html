<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hamburger Menu — Submission Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      padding: 40px 20px;
    }

    h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
      margin: 0 0 16px 0;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .dark-bg {
      background: #0f172a;
      padding: 16px;
      border-radius: 12px;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
    }

    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>

  <!-- Default -->
  <div class="demo-group">
    <h2>Default — click to toggle</h2>
    <div class="row">
      <div class="col">
        <label class="hamburger">
          <input type="checkbox" />
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </label>
        <span class="label">Default</span>
      </div>

      <div class="col">
        <label class="hamburger hamburger-thick">
          <input type="checkbox" />
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </label>
        <span class="label">Thick</span>
      </div>

      <div class="col">
        <label class="hamburger hamburger-lg">
          <input type="checkbox" />
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </label>
        <span class="label">Large</span>
      </div>

      <div class="col">
        <label class="hamburger hamburger-colored">
          <input type="checkbox" />
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
          <span class="hamburger-line"></span>
        </label>
        <span class="label">Colored</span>
      </div>
    </div>
  </div>

  <!-- Dark -->
  <div class="demo-group">
    <h2>Dark Variant</h2>
    <div class="dark-bg">
      <label class="hamburger hamburger-dark">
        <input type="checkbox" />
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
        <span class="hamburger-line"></span>
      </label>
    </div>
  </div>

</body>
</html>
