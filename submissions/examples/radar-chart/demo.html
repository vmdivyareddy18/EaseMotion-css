<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Radar Vector Matrix — EaseMotion CSS Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root {
      --bg-canvas: #0b0f19;
      --text-muted: #64748b;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-canvas);
      color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    header {
      margin-bottom: 3rem;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 1.5rem;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      color: #10b981;
      font-size: 0.85rem;
      font-weight: 500;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0.5rem 0;
    }
    p {
      color: #94a3b8;
      margin: 0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
    }
    .label-stack {
      font-size: 0.85rem;
      color: #94a3b8;
      display: flex;
      gap: 1rem;
    }
    .label-item span {
      font-weight: 600;
      color: #f8fafc;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <div class="badge">// Geometric Vector Component</div>
      <h1>Radar Performance Vectors</h1>
      <p>Pure CSS quantitative polygon axis charts optimized for performance-first monitoring analytics.</p>
    </header>

    <main class="grid">
      <div class="ease-radar-container">
        <div class="ease-radar-wrapper">
          <div class="ease-radar-poly"></div>
        </div>
        <div class="label-stack">
          <div class="label-item">Type: <span>Production Metrics</span></div>
        </div>
      </div>

      <div class="ease-radar-container">
        <div class="ease-radar-wrapper">
          <div class="ease-radar-poly ease-radar-poly-secondary"></div>
        </div>
        <div class="label-stack">
          <div class="label-item">Type: <span>Resource Allotments</span></div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
