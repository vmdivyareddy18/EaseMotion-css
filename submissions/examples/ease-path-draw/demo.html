<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation: ease-path-draw</title>
    <meta
      name="description"
      content="A demonstration of the ease-path-draw hover/entrance animation where SVG paths draw themselves smoothly using pure CSS."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1 id="main-title">ease-path-draw</h1>
        <p class="subtitle" id="main-desc">
          Pure CSS generic path drawing animation utilizing pathLength="1".
        </p>
      </header>

      <div class="display-area">
        <!-- Example 1: Default Speed (2s) -->
        <div class="example-box">
          <span class="example-title">Default Speed (2s)</span>
          <svg
            viewBox="0 0 100 100"
            aria-label="Checkmark icon drawing animate"
          >
            <!-- Heart/Check icon shape with pathLength="1" -->
            <path
              class="ease-path-draw"
              pathLength="1"
              d="M20 50 L40 70 L80 30"
            />
          </svg>
        </div>

        <!-- Example 2: Slow Draw (4s) -->
        <div class="example-box slow-draw">
          <span class="example-title">Slow Speed (4s)</span>
          <svg viewBox="0 0 100 100" aria-label="Infinity icon drawing animate">
            <!-- Infinity loop shape with pathLength="1" -->
            <path
              class="ease-path-draw"
              pathLength="1"
              d="M30 60 C 10 60, 10 40, 30 40 C 50 40, 50 60, 70 60 C 90 60, 90 40, 70 40 C 50 40, 50 60, 30 60 Z"
            />
          </svg>
        </div>
      </div>
    </main>
  </body>
</html>
