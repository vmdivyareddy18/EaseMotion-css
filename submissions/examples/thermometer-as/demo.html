<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermometer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="thermo-row">
    <figure class="thermo cold" style="--t: 22%;">
      <div class="th-stem">
        <span class="th-fill"></span>
        <i class="th-tick" style="--p: 20%;"></i>
        <i class="th-tick" style="--p: 40%;"></i>
        <i class="th-tick" style="--p: 60%;"></i>
        <i class="th-tick" style="--p: 80%;"></i>
      </div>
      <span class="th-bulb"></span>
      <figcaption><b>4&deg;</b><em>Freezer</em></figcaption>
    </figure>

    <figure class="thermo warm" style="--t: 58%;">
      <div class="th-stem">
        <span class="th-fill"></span>
        <i class="th-tick" style="--p: 20%;"></i>
        <i class="th-tick" style="--p: 40%;"></i>
        <i class="th-tick" style="--p: 60%;"></i>
        <i class="th-tick" style="--p: 80%;"></i>
      </div>
      <span class="th-bulb"></span>
      <figcaption><b>21&deg;</b><em>Indoor</em></figcaption>
    </figure>

    <figure class="thermo hot" style="--t: 88%;">
      <div class="th-stem">
        <span class="th-fill"></span>
        <i class="th-tick" style="--p: 20%;"></i>
        <i class="th-tick" style="--p: 40%;"></i>
        <i class="th-tick" style="--p: 60%;"></i>
        <i class="th-tick" style="--p: 80%;"></i>
      </div>
      <span class="th-bulb"></span>
      <figcaption><b>38&deg;</b><em>Engine</em></figcaption>
    </figure>
  </div>
</body>
</html>
