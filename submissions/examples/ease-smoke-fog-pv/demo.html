<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smoke / Fog Effect</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Default white smoke -->
  <div class="demo-row">
    <span class="demo-label">White Smoke</span>
    <div class="smoke-container">
      <div class="smoke-particle" style="--left:15%; --size:70px; --duration:5s; --delay:0s; --drift:-15px;"></div>
      <div class="smoke-particle" style="--left:30%; --size:90px; --duration:7s; --delay:1s; --drift:20px;"></div>
      <div class="smoke-particle" style="--left:50%; --size:100px; --duration:6s; --delay:2s; --drift:-10px;"></div>
      <div class="smoke-particle" style="--left:68%; --size:80px; --duration:8s; --delay:0.5s; --drift:25px;"></div>
      <div class="smoke-particle" style="--left:85%; --size:60px; --duration:5.5s; --delay:1.5s; --drift:-20px;"></div>
    </div>
  </div>

  <!-- Red smoke -->
  <div class="demo-row">
    <span class="demo-label">Red Smoke</span>
    <div class="smoke-container smoke-red">
      <div class="smoke-particle" style="--left:20%; --size:80px; --duration:6s; --delay:0s; --drift:20px;"></div>
      <div class="smoke-particle" style="--left:45%; --size:100px; --duration:7s; --delay:1.2s; --drift:-15px;"></div>
      <div class="smoke-particle" style="--left:70%; --size:70px; --duration:5s; --delay:0.6s; --drift:10px;"></div>
      <div class="smoke-particle" style="--left:88%; --size:85px; --duration:8s; --delay:2s; --drift:-25px;"></div>
    </div>
  </div>

  <!-- Blue smoke -->
  <div class="demo-row">
    <span class="demo-label">Blue Smoke</span>
    <div class="smoke-container smoke-blue">
      <div class="smoke-particle" style="--left:10%; --size:90px; --duration:7s; --delay:0s; --drift:15px;"></div>
      <div class="smoke-particle" style="--left:35%; --size:75px; --duration:5s; --delay:1s; --drift:-20px;"></div>
      <div class="smoke-particle" style="--left:60%; --size:110px; --duration:8s; --delay:2.5s; --drift:10px;"></div>
      <div class="smoke-particle" style="--left:80%; --size:65px; --duration:6s; --delay:0.8s; --drift:-15px;"></div>
    </div>
  </div>

  <!-- Fog layer -->
  <div class="demo-row">
    <span class="demo-label">Fog Layer</span>
    <div class="fog-container">
      <div class="fog-layer" style="--fog-speed:10s; --fog-delay:0s;"></div>
      <div class="fog-layer" style="--fog-speed:14s; --fog-delay:-4s;"></div>
      <div class="fog-layer" style="--fog-speed:18s; --fog-delay:-8s;"></div>
    </div>
  </div>

  <!-- Hero usage example -->
  <div class="demo-row">
    <span class="demo-label">Hero Section Example</span>
    <div class="hero-section">
      <div class="smoke-particle" style="--left:10%; --size:100px; --duration:6s; --delay:0s; --drift:20px;"></div>
      <div class="smoke-particle" style="--left:30%; --size:80px; --duration:8s; --delay:1s; --drift:-15px;"></div>
      <div class="smoke-particle" style="--left:55%; --size:120px; --duration:7s; --delay:2s; --drift:10px;"></div>
      <div class="smoke-particle" style="--left:78%; --size:90px; --duration:5s; --delay:0.5s; --drift:-20px;"></div>
      <div class="smoke-particle" style="--left:90%; --size:70px; --duration:9s; --delay:3s; --drift:25px;"></div>
      <span class="hero-text">PHANTOM</span>
    </div>
  </div>

</body>
</html>
