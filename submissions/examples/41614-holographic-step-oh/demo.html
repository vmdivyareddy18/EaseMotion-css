<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-holographic-step-indicator</title>
  <meta name="description" content="Animated step indicator with holographic gradient effects.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-holographic-step-indicator</h1>
      <p class="subtitle" id="main-desc">Step indicator with holographic gradient effects</p>
    </header>

    <div class="display-area">
      
      <div class="step-showcase">
        
        <!-- Step 1 (Active) -->
        <div class="ease-holo-step-indicator" data-step="1">
          <div class="holo-step is-active">
            <div class="step-circle">1</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector"></div>
          <div class="holo-step">
            <div class="step-circle">2</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector"></div>
          <div class="holo-step">
            <div class="step-circle">3</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector"></div>
          <div class="holo-step">
            <div class="step-circle">4</div>
            <div class="step-glow"></div>
          </div>
        </div>
        <div class="step-labels">
          <span class="step-label active">Account</span>
          <span class="step-label">Payment</span>
          <span class="step-label">Review</span>
          <span class="step-label">Confirm</span>
        </div>

        <!-- Primary Variant -->
        <div class="ease-holo-step-indicator ease-holo-primary" data-step="2">
          <div class="holo-step">
            <div class="step-circle">1</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector completed"></div>
          <div class="holo-step is-active">
            <div class="step-circle">2</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector"></div>
          <div class="holo-step">
            <div class="step-circle">3</div>
            <div class="step-glow"></div>
          </div>
        </div>
        <div class="step-labels">
          <span class="step-label completed">Cart</span>
          <span class="step-label active">Shipping</span>
          <span class="step-label">Done</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Finance Dashboard</h3>
      <div class="finance-example">
        <div class="ease-holo-step-indicator ease-holo-lg ease-holo-success" data-step="3">
          <div class="holo-step">
            <div class="step-circle">✓</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector completed"></div>
          <div class="holo-step">
            <div class="step-circle">✓</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector completed"></div>
          <div class="holo-step is-active">
            <div class="step-circle">3</div>
            <div class="step-glow"></div>
          </div>
          <div class="step-connector"></div>
          <div class="holo-step">
            <div class="step-circle">4</div>
            <div class="step-glow"></div>
          </div>
        </div>
        <div class="finance-labels">
          <span class="step-label completed">Verified</span>
          <span class="step-label completed">Approved</span>
          <span class="step-label active">Processing</span>
          <span class="step-label">Complete</span>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
