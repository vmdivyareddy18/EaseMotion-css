<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login Page Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<div class="container">

<div class="login-card ease-fade-in">

<h1>Welcome Back</h1>

<p>Sign in to continue</p>

<form>

<input
type="email"
placeholder="Email Address"
required>

<input
type="password"
placeholder="Password"
required>

<button
class="ease-hover-grow"
type="submit">

Login

</button>

</form>

<a href="#">
Forgot Password?
</a>

<p>

Don't have an account?

<a href="#">
Sign Up
</a>

</p>

</div>

</div>

</body>
</html>
