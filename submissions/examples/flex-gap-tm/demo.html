<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Flexbox Gap Utilities — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="demo-header">
    <div class="demo-badge">flex-gap-tm</div>
    <h1>CSS Flexbox Gap Utilities</h1>
    <p class="demo-subtitle">Explore the utility classes below. Toggle dark mode for the full experience.</p>
  </header>
  <main class="demo-grid">
    <section class="demo-section">
      <h2>Row Direction</h2>
      <div class="demo-row">
        <div class="demo-box box-1">01</div>
        <div class="demo-box box-2">02</div>
        <div class="demo-box box-3">03</div>
      </div>
    </section>
    <section class="demo-section">
      <h2>Column Direction</h2>
      <div class="demo-col">
        <div class="demo-box box-1">Alpha</div>
        <div class="demo-box box-2">Beta</div>
        <div class="demo-box box-3">Gamma</div>
      </div>
    </section>
    <section class="demo-section">
      <h2>With Gap</h2>
      <div class="demo-gap">
        <div class="demo-card">Card One</div>
        <div class="demo-card">Card Two</div>
        <div class="demo-card">Card Three</div>
        <div class="demo-card">Card Four</div>
      </div>
    </section>
    <section class="demo-section">
      <h2>Wrapped Items</h2>
      <div class="demo-wrap">
        <div class="demo-chip">Chip A</div>
        <div class="demo-chip">Chip B</div>
        <div class="demo-chip">Chip C</div>
        <div class="demo-chip">Chip D</div>
        <div class="demo-chip">Chip E</div>
        <div class="demo-chip">Chip F</div>
      </div>
    </section>
  </main>
</body>
</html>
