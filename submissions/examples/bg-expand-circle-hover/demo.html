<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BG Expand Circle on Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>BG Expand Circle</h1>
  <p class="subtitle">A circular background grows from center on hover — pure CSS.</p>
  <section><h2>Demo</h2><p class="sec-desc">Hover the button to see the circle expand</p><button class="circle-btn"><span class="circle-bg"></span><span class="circle-text">Hover Me</span></button></section>
  <section><h2>How It Works</h2><p>A <code>circle()</code> clip-path on the pseudo-element animates from 0% to 100% on hover.</p></section>
</body>
</html>
