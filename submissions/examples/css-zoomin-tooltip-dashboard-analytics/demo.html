<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Analytics Zoom-In Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="dashboard">

        <span class="badge">Analytics Dashboard</span>

        <h1>Business Performance Overview</h1>

        <p>
            Monitor KPIs, revenue growth, customer engagement, and operational
            performance with interactive analytics widgets.
        </p>

        <div class="widgets">

            <div class="widget">

                <div class="metric">📊</div>

                <h3>Revenue</h3>

                <p>$248,900</p>

                <button class="tooltip-btn">

                    Details

                    <span class="tooltip">
                        Revenue increased by 18% compared to the previous month.
                    </span>

                </button>

            </div>

            <div class="widget">

                <div class="metric">👥</div>

                <h3>Users</h3>

                <p>18,420</p>

                <button class="tooltip-btn">

                    Details

                    <span class="tooltip">
                        Active users continue to grow through organic and referral traffic.
                    </span>

                </button>

            </div>

            <div class="widget">

                <div class="metric">🚀</div>

                <h3>Conversion</h3>

                <p>7.8%</p>

                <button class="tooltip-btn">

                    Details

                    <span class="tooltip">
                        Conversion rate improved after optimizing onboarding workflows.
                    </span>

                </button>

            </div>

        </div>

    </section>

</div>

</body>
</html>
