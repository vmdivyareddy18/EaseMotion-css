<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Border Boundary Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Border Boundary</h1>
      <p class="subtitle">Controls how borders are rendered when adjacent to clipped or masked regions.</p>
      <span class="badge">CSS Property: border-boundary</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">border-boundary: none</span>
          <span class="demo-value border-boundary-sm">Border Boundary variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">border-boundary: parent</span>
          <span class="demo-value border-boundary-md">Border Boundary variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="border-boundary"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
