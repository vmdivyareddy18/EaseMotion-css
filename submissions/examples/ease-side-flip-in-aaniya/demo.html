<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-side-flip-in Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin: 0; }
    h2 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; }
    .demo-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .demo-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p  { margin: 0; font-size: 0.85rem; color: #94a3b8; }
    .playing-card {
      width: 100px;
      height: 140px;
      background: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: #0f172a;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .playing-card.red { color: #dc2626; }
    button {
      padding: 8px 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>ease-side-flip-in</h1>

  <!-- Flip in from right on load -->
  <div class="demo-section">
    <h2>Flip In from Right — on load</h2>
    <div class="ease-flip-perspective">
      <div class="card ease-side-flip-in">
        <h3>Flips In</h3>
        <p>from right side</p>
      </div>
    </div>
  </div>

  <!-- Flip in from left on load -->
  <div class="demo-section">
    <h2>Flip In from Left — on load</h2>
    <div class="ease-flip-perspective">
      <div class="card ease-side-flip-in-left">
        <h3>Flips In</h3>
        <p>from left side</p>
      </div>
    </div>
  </div>

  <!-- Card game demo -->
  <div class="demo-section">
    <h2>Card Game UI Demo</h2>
    <div class="demo-row" id="card-deck"></div>
    <button onclick="dealCards()">Deal Cards</button>
  </div>

  <script>
    const suits = ['♠', '♥', '♦', '♣'];
    const values = ['A', 'K', 'Q', 'J'];

    function dealCards() {
      const deck = document.getElementById('card-deck');
      deck.innerHTML = '';
      suits.forEach((suit, i) => {
        setTimeout(() => {
          const wrapper = document.createElement('div');
          wrapper.className = 'ease-flip-perspective';

          const card = document.createElement('div');
          card.className = `playing-card ease-side-flip-in ${suit === '♥' || suit === '♦' ? 'red' : ''}`;
          card.style.animationDelay = `${i * 0.1}s`;
          card.textContent = `${values[i]}${suit}`;

          wrapper.appendChild(card);
          deck.appendChild(wrapper);
        }, i * 100);
      });
    }

    dealCards();
  </script>

</body>
</html>
