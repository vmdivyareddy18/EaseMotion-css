<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">XP Leaderboard</h1>

  <div class="leaderboard ease-slide-up" id="board">

    <div class="player active">
      <span>#1</span>
      <span class="name">You</span>
      <span class="xp" id="userXP">500 XP</span>
    </div>

    <div class="player">
      <span>#2</span>
      <span class="name">Player A</span>
      <span class="xp">450 XP</span>
    </div>

    <div class="player">
      <span>#3</span>
      <span class="name">Player B</span>
      <span class="xp">400 XP</span>
    </div>

  </div>

  <button onclick="gainXP()" class="xp-btn">Gain XP</button>
</section>

<script>
let userXP = 500;

function gainXP() {
  userXP += 50;
  document.getElementById("userXP").textContent = userXP + " XP";

  // highlight effect
  const user = document.querySelector(".active");
  user.classList.add("highlight");

  setTimeout(() => {
    user.classList.remove("highlight");
  }, 600);
}
</script>

</body>
</html>
