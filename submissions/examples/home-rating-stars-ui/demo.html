<!DOCTYPE html>
<html>
<head>
  <title>Home Rating Stars UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="rating">
  <span onclick="rate(1)">★</span>
  <span onclick="rate(2)">★</span>
  <span onclick="rate(3)">★</span>
  <span onclick="rate(4)">★</span>
  <span onclick="rate(5)">★</span>
</div>

<p id="output">Rating: 0</p>

<script>
function rate(n) {
  document.getElementById("output").innerText = "Rating: " + n;
}
</script>

</body>
</html>
