<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cursor Glow Video Player — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Accessible play state checkbox, hidden visually but focusable for keyboard users -->
    <input
      type="checkbox"
      id="play-toggle"
      class="play-toggle-input"
      role="switch"
      aria-label="Toggle Play Pause"
    />

    <div class="video-frame">
      <!-- Grid of 25 hover sectors for pure CSS mouse-following glow -->
      <div class="sector-grid" aria-hidden="true">
        <div class="sector s-1"></div>
        <div class="sector s-2"></div>
        <div class="sector s-3"></div>
        <div class="sector s-4"></div>
        <div class="sector s-5"></div>
        <div class="sector s-6"></div>
        <div class="sector s-7"></div>
        <div class="sector s-8"></div>
        <div class="sector s-9"></div>
        <div class="sector s-10"></div>
        <div class="sector s-11"></div>
        <div class="sector s-12"></div>
        <div class="sector s-13"></div>
        <div class="sector s-14"></div>
        <div class="sector s-15"></div>
        <div class="sector s-16"></div>
        <div class="sector s-17"></div>
        <div class="sector s-18"></div>
        <div class="sector s-19"></div>
        <div class="sector s-20"></div>
        <div class="sector s-21"></div>
        <div class="sector s-22"></div>
        <div class="sector s-23"></div>
        <div class="sector s-24"></div>
        <div class="sector s-25"></div>
      </div>

      <!-- Pure CSS premium cybernetic void/space landscape background -->
      <div class="video-bg" aria-hidden="true">
        <div class="stars"></div>
        <div class="grid-mesh"></div>
        <div class="nebula-purple"></div>
        <div class="nebula-cyan"></div>
        <div class="ship-silhouette"></div>
      </div>

      <!-- The cursor spotlight glow layer -->
      <div class="glow-effect" aria-hidden="true"></div>

      <!-- Centered premium play button label -->
      <label for="play-toggle" class="play-button" title="Play Video">
        <!-- Play Icon -->
        <svg
          class="icon icon-play"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        <!-- Pause Icon -->
        <svg
          class="icon icon-pause"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="6" y="4" width="4" height="16"></rect>
          <rect x="14" y="4" width="4" height="16"></rect>
        </svg>
      </label>

      <!-- Visual status feedback overlay -->
      <div class="status-overlay" aria-hidden="true">
        <span class="status-badge">PLAYING</span>
      </div>
    </div>
  </body>
</html>
