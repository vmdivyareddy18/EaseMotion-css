<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Scrollbar Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #0f172a; color: #fff; font-family: sans-serif; margin: 0; }
        :root { --border-color: #334155; }
        .docs-sidebar {
            width: 250px;
            height: 300px; /* Force overflow boundary */
            border-right: 1px solid var(--border-color);
            padding: 20px;
        }
        .content-block { height: 600px; background: linear-gradient(transparent, #6366f1); }
    </style>
</head>
<body>
    <div class="docs-sidebar">
        <h3>Navigation Mock</h3>
        <p>Scroll down to see the sleek custom dark-themed scrollbar track...</p>
        <div class="content-block"></div>
    </div>
</body>
</html>
