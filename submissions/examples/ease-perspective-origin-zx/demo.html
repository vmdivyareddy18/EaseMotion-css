<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perspective Origin Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1rem 0 0.25rem;
      }
      .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
    </style>
  </head>
  <body>
    <h1>Perspective Origin</h1>
    <p>
      Controls the vanishing point for 3D transforms. Each box has the same
      rotation but different perspective-origin.
    </p>
    <div class="grid">
      <div>
        <div class="label">center</div>
        <div class="demo-3d persp-origin-center"><div>center</div></div>
      </div>
      <div>
        <div class="label">top</div>
        <div class="demo-3d persp-origin-top"><div>top</div></div>
      </div>
      <div>
        <div class="label">bottom</div>
        <div class="demo-3d persp-origin-bottom"><div>bottom</div></div>
      </div>
      <div>
        <div class="label">left</div>
        <div class="demo-3d persp-origin-left"><div>left</div></div>
      </div>
      <div>
        <div class="label">right</div>
        <div class="demo-3d persp-origin-right"><div>right</div></div>
      </div>
      <div>
        <div class="label">top left</div>
        <div class="demo-3d persp-origin-tl"><div>top left</div></div>
      </div>
      <div>
        <div class="label">bottom right</div>
        <div class="demo-3d persp-origin-br"><div>bottom right</div></div>
      </div>
    </div>
  </body>
</html>
