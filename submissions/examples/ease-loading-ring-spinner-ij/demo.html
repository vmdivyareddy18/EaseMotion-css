<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Loading Ring Spinner — Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f172a;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      background: #1e293b;
      border-radius: 1rem;
      padding: 2rem 2rem 1.75rem;
      width: 320px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 {
      color: #e2e8f0;
      margin-bottom: 1.5rem;
      font-weight: 500;
      font-size: 1.1rem;
      opacity: 0.8;
    }
    .spinner-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }
    .controls label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      font-size: 0.7rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .controls input {
      width: 90px;
      padding: 0.3rem 0.5rem;
      border-radius: 0.35rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f172a;
      color: #e2e8f0;
      font-size: 0.8rem;
      text-align: center;
    }
    .controls input:focus { outline: none; border-color: var(--ring-color, #8b5cf6); }
    .controls input[type="color"] { width: 48px; height: 36px; padding: 2px; }
    .status {
      margin-top: 1.25rem;
      color: #64748b;
      font-size: 0.8rem;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>✦ Ring Spinner</h2>
    <div class="spinner-wrap">
      <loading-ring-spinner id="demo"></loading-ring-spinner>
    </div>
    <div class="controls">
      <label>Color
        <input type="color" id="ringColor" value="#8b5cf6">
      </label>
      <label>Size
        <input type="range" id="ringSize" min="24" max="96" step="4" value="48">
      </label>
      <label>Speed
        <input type="range" id="spinSpeed" min="0.3" max="2" step="0.1" value="1">
      </label>
      <label>Segments
        <input type="range" id="segmentCount" min="4" max="16" step="1" value="8">
      </label>
    </div>
    <div class="status" id="status">8 segments · 1s rotation</div>
  </div>
  <script>
    const el = document.getElementById('demo');
    const status = document.getElementById('status');

    document.getElementById('ringColor').addEventListener('input', e => {
      el.style.setProperty('--ring-color', e.target.value);
    });
    document.getElementById('ringSize').addEventListener('input', e => {
      el.style.setProperty('--ring-size', e.target.value + 'px');
    });
    document.getElementById('spinSpeed').addEventListener('input', e => {
      el.style.setProperty('--spin-duration', e.target.value + 's');
      updateStatus();
    });
    document.getElementById('segmentCount').addEventListener('input', e => {
      el.style.setProperty('--segment-count', e.target.value);
      updateStatus();
    });

    function updateStatus() {
      const sc = document.getElementById('segmentCount').value;
      const sp = document.getElementById('spinSpeed').value;
      status.textContent = `${sc} segments · ${sp}s rotation`;
    }
  </script>
</body>
</html>
