<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-loader-grid Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 3rem;
      background: #f8fafc;
      font-family: sans-serif;
    }
    h2 { color: #1e293b; }
    .variant-red { --ease-loader-color: #ef4444; }
    .variant-green { --ease-loader-color: #22c55e; }
    .variant-lg {
      --ease-loader-size: 20px;
      --ease-loader-gap: 6px;
    }
  </style>
</head>
<body>
  <h2>ease-loader-grid</h2>

  <div class="ease-loader-grid">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="ease-loader-grid variant-red">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="ease-loader-grid variant-green">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <div class="ease-loader-grid variant-lg">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>
</body>
</html>
