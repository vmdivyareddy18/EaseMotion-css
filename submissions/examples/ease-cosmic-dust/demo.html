<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Cosmic Dust</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Cosmic Dust Animation Container -->
  <div class="cosmic-dust"></div>

  <script>
    // Generate particles dynamically
    const container = document.querySelector(".cosmic-dust");

    for (let i = 0; i < 80; i++) {
      const span = document.createElement("span");

      span.style.setProperty("--x", Math.random() * 100 + "%");
      span.style.setProperty("--y", Math.random() * 100 + "%");
      span.style.setProperty("--dx", (Math.random() * 160 - 80) + "px");
      span.style.setProperty("--dy", (Math.random() * 160 - 80) + "px");
      span.style.setProperty("--dur", (4 + Math.random() * 6) + "s");
      span.style.setProperty("--delay", Math.random() * 5 + "s");

      container.appendChild(span);
    }
  </script>

</body>
</html>
