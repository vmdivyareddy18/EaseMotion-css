<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electric Toast Demo</title>
    <!-- EaseMotion CSS CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div
        class="ease-center ease-fade-in"
        style="min-height: 100vh; flex-direction: column; gap: 1rem;"
    >
        <h1 class="ease-slide-up">⚡ Electric Toast</h1>
        <p class="ease-slide-up ease-delay-100">
            Click the buttons to see different toast variants
        </p>

        <div class="ease-flex ease-gap-3">
            <button
                onclick="showToast('info')"
                class="ease-btn ease-btn-primary ease-btn-pill"
            >
                💡 Info Toast
            </button>
            <button
                onclick="showToast('success')"
                class="ease-btn ease-btn-success ease-btn-pill"
            >
                ✅ Success Toast
            </button>
            <button
                onclick="showToast('error')"
                class="ease-btn ease-btn-danger ease-btn-pill"
            >
                ❌ Error Toast
            </button>
        </div>

        <!-- Toast Container -->
        <div id="toast-container" class="ease-toast-container"></div>
    </div>

    <script>
        function showToast(type) {
            const container = document.getElementById('toast-container');

            // Create toast element
            const toast = document.createElement('div');
            toast.className = `ease-toast ease-toast-${type} ease-slide-in-right`;

            // Add icon and message
            const icons = {
                info: '💡',
                success: '✅',
                error: '❌',
            };
            toast.innerHTML = `
                <span class="ease-toast-icon">${icons[type]}</span>
                <span class="ease-toast-message">This is a ${type} toast message!</span>
                <button class="ease-toast-close" onclick="this.parentElement.remove()">×</button>
            `;

            // Add to container
            container.appendChild(toast);

            // Auto-remove after 3 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.classList.add('ease-slide-out-right');
                    setTimeout(() => toast.remove(), 300);
                }
            }, 3000);
        }
    </script>
</body>
</html>
