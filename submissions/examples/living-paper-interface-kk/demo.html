<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Paper Interface</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Floating paper fragments in background -->
    <div class="fragments-layer">
        <div class="frag frag-1"></div>
        <div class="frag frag-2"></div>
        <div class="frag frag-3"></div>
        <div class="frag frag-4"></div>
    </div>
    
    <!-- Ink particles layer -->
    <div class="ink-particles"></div>

    <div class="scene-container">
        
        <!-- Assemble Animation Layer -->
        <div class="assemble-layer entrance-assemble">
            <div class="quad q1"></div>
            <div class="quad q2"></div>
            <div class="quad q3"></div>
            <div class="quad q4"></div>
        </div>

        <!-- Shadow Layer -->
        <div class="paper-shadow shadow-shift"></div>

        <!-- Main Paper Element -->
        <div class="paper-wrapper paper-fade-in floating-motion">
            <div class="paper page-breathing edge-wave">
                
                <!-- Corner Curls -->
                <div class="corner corner-tl"></div>
                <div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div>
                <div class="corner corner-br"></div>

                <!-- Origami Folds -->
                <div class="fold-v origami-fold"></div>
                <div class="fold-h origami-fold-alt"></div>

                <!-- Ink Spread flourishes -->
                <div class="flourish ink-spread"></div>

                <!-- Content Area -->
                <div class="content content-reveal">
                    <h1 class="title ink-reveal">LIVING PAPER INTERFACE</h1>
                    
                    <div class="flourish ink-spread delay-1"></div>

                    <div class="data-group">
                        <div class="data-row ink-reveal delay-2"><span>Status:</span> <span class="value">Active</span></div>
                        <div class="data-row ink-reveal delay-3"><span>Ink Flow:</span> <span class="value">Stable</span></div>
                        <div class="data-row ink-reveal delay-4"><span>Origami State:</span> <span class="value">Dynamic</span></div>
                        <div class="data-row ink-reveal delay-5"><span>Knowledge Archive:</span> <span class="value">Unlocked</span></div>
                    </div>

                    <!-- Hidden Content Reveal on Hover -->
                    <div class="secret-text">
                        "The magic is written between the folds."
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
