<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Scan Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="panel">

<div class="scanner"></div>

<h2>Security Scan Active</h2>

<p>
Monitoring firewall, network integrity and encrypted traffic in real time.
</p>

<div class="stats">

<div class="box">
<span>Firewall</span>
<strong>Secure</strong>
</div>

<div class="box">
<span>Threats</span>
<strong>0 Found</strong>
</div>

<div class="box">
<span>Status</span>
<strong>Protected</strong>
</div>

</div>

<button>Run Deep Scan</button>

</div>

</body>
</html>
