<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Play Button Pulse</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="play-title">
        <p class="eyebrow">Media control</p>
        <h1 id="play-title">Play pulse button</h1>
        <button class="play-pulse-button" type="button" aria-label="Play video">
          <span class="play-triangle"></span>
        </button>
        <p class="demo-copy">
          Expanding rings keep the play action visible on hero videos and media
          cards.
        </p>
      </section>
    </main>
  </body>
</html>
