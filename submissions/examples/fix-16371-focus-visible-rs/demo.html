<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Focus Visible Utilities</title>
  <link rel="stylesheet" href="../../core/index.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { padding: 2rem; font-family: system-ui; }
    button { padding: 0.5rem 1rem; margin-right: 1rem; border: 1px solid #ccc; background: white; border-radius: 0.25rem; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Focus Visible Utilities</h1>
  <p>Clicking the button won't show a ring. Tabbing to the button using your keyboard will show the focus ring.</p>
  
  <button class="ease-focus-ring">Accessible Button 1</button>
  <button class="ease-focus-ring">Accessible Button 2</button>
</body>
</html>
