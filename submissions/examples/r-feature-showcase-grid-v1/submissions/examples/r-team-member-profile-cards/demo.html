<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Member Profile Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="team-section">
        <h1>Meet Our Team</h1>

        <div class="team-grid">
            <article class="team-card">
                <div class="avatar">JD</div>
                <h3>John Doe</h3>
                <p class="role">Frontend Developer</p>
                <div class="social-links">
                    <span>🔗</span>
                    <span>🐦</span>
                    <span>💼</span>
                </div>
            </article>

            <article class="team-card">
                <div class="avatar">AS</div>
                <h3>Alice Smith</h3>
                <p class="role">UI/UX Designer</p>
                <div class="social-links">
                    <span>🔗</span>
                    <span>🐦</span>
                    <span>💼</span>
                </div>
            </article>

            <article class="team-card">
                <div class="avatar">MK</div>
                <h3>Michael Kim</h3>
                <p class="role">Backend Engineer</p>
                <div class="social-links">
                    <span>🔗</span>
                    <span>🐦</span>
                    <span>💼</span>
                </div>
            </article>

            <article class="team-card">
                <div class="avatar">RJ</div>
                <h3>Rachel Jones</h3>
                <p class="role">Product Manager</p>
                <div class="social-links">
                    <span>🔗</span>
                    <span>🐦</span>
                    <span>💼</span>
                </div>
            </article>
        </div>
    </section>
</body>
</html>
