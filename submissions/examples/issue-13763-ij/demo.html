<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-cloud-sync – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Cloud Sync</h1>
    <p class="subtitle">A cloud icon with rotating sync arrows and subtle pulse.</p>
    <div class="cloud-wrapper">
      <div class="cloud-icon" id="cloudIcon">
        <span class="cloud-body">☁️</span>
        <span class="sync-arrows">🔄</span>
      </div>
    </div>
    <p class="sync-status" id="syncStatus">Idle</p>
    <button id="toggleBtn">Start Sync</button>
  </div>

  <script>
    const cloud = document.getElementById('cloudIcon');
    const status = document.getElementById('syncStatus');
    const toggleBtn = document.getElementById('toggleBtn');
    let syncing = false;

    toggleBtn.addEventListener('click', () => {
      syncing = !syncing;
      cloud.classList.toggle('syncing', syncing);
      status.textContent = syncing ? 'Syncing…' : 'Idle';
      toggleBtn.textContent = syncing ? 'Stop Sync' : 'Start Sync';
    });
  </script>
</body>
</html>
