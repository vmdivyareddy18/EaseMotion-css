<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Roller - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dr-wrapper">

    <h1>Dice Roller</h1>

    <div class="dr-dice" id="diceContainer"></div>

    <div class="dr-total">Total: <strong id="diceTotal">0</strong></div>

    <div class="dr-controls">
      <div class="dr-count">
        <label>Dice</label>
        <select id="diceCount">
          <option value="1">1</option>
          <option value="2" selected>2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <button class="dr-btn" id="rollBtn">Roll</button>
    </div>

    <div class="dr-history" id="historySection" style="display:none">
      <h3>History</h3>
      <ul class="dr-history-list" id="historyList"></ul>
    </div>

  </div>

  <script>
    const container = document.getElementById('diceContainer');
    const totalEl = document.getElementById('diceTotal');
    const countSelect = document.getElementById('diceCount');
    const rollBtn = document.getElementById('rollBtn');
    const historyList = document.getElementById('historyList');
    const historySection = document.getElementById('historySection');

    const faces = ['\u2680','\u2681','\u2682','\u2683','\u2684','\u2685'];
    let history = [];

    function rollDice() {
      const count = parseInt(countSelect.value);
      const values = [];
      container.innerHTML = '';
      let total = 0;

      for (let i = 0; i < count; i++) {
        const val = Math.floor(Math.random() * 6) + 1;
        values.push(val);
        total += val;

        const die = document.createElement('div');
        die.className = 'dr-die rolling';
        die.textContent = faces[val - 1];
        container.appendChild(die);
      }

      totalEl.textContent = total;

      const entry = values.join(', ') + ' = ' + total;
      history.unshift(entry);
      if (history.length > 10) history.pop();
      historyList.innerHTML = history.map(h => '<li>' + h + '</li>').join('');
      historySection.style.display = 'block';

      setTimeout(() => {
        document.querySelectorAll('.dr-die').forEach(d => d.classList.remove('rolling'));
      }, 400);
    }

    rollBtn.addEventListener('click', rollDice);
    rollDice();
  </script>

</body>
</html>
