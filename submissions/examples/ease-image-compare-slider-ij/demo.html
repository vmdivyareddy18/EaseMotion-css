<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Image Compare Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="ease-compare-container" style="--position: 50%;">
        <img class="ease-compare-image ease-compare-after" src="https://images.unsplash.com/photo-1542273917363-3b1817f69a5d?q=80&w=1200&auto=format&fit=crop" alt="After edit">
        <img class="ease-compare-image ease-compare-before" src="https://images.unsplash.com/photo-1542273917363-3b1817f69a5d?q=80&w=1200&auto=format&fit=crop&sat=-100" alt="Before edit">
        
        <input type="range" min="0" max="100" value="50" class="ease-compare-slider" id="compare-slider">
        <div class="ease-slider-handle"></div>
    </div>

    <script>
        const container = document.querySelector('.ease-compare-container');
        const slider = document.getElementById('compare-slider');

        slider.addEventListener('input', (e) => {
            container.style.setProperty('--position', `${e.target.value}%`);
        });
    </script>
</body>
</html>
