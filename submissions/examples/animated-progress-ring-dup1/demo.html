<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Ring - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Project Progress</h1>
      <p>Track completion status with animated circular progress indicators.</p>
    </header>

    <!-- Progress Rings Grid -->
    <div class="rings-grid">
      
      <!-- Ring 1: Design Phase -->
      <div class="ring-card ease-fade-in-up ease-delay-100">
        <div class="ring-wrapper">
          <div class="ring-bg ease-spin-slow"></div>
          <div class="ring-progress ring-85">
            <div class="ring-value">
              <span class="ring-number">85</span>
              <span class="ring-percent">%</span>
            </div>
          </div>
        </div>
        <h3 class="ring-title">Design Phase</h3>
        <p class="ring-subtitle">UI/UX & Prototyping</p>
      </div>

      <!-- Ring 2: Development -->
      <div class="ring-card ease-fade-in-up ease-delay-200">
        <div class="ring-wrapper">
          <div class="ring-bg ease-spin-slow ease-delay-100"></div>
          <div class="ring-progress ring-62">
            <div class="ring-value">
              <span class="ring-number">62</span>
              <span class="ring-percent">%</span>
            </div>
          </div>
        </div>
        <h3 class="ring-title">Development</h3>
        <p class="ring-subtitle">Frontend & Backend</p>
      </div>

      <!-- Ring 3: Testing -->
      <div class="ring-card ease-fade-in-up ease-delay-300">
        <div class="ring-wrapper">
          <div class="ring-bg ease-spin-slow ease-delay-200"></div>
          <div class="ring-progress ring-45">
            <div class="ring-value">
              <span class="ring-number">45</span>
              <span class="ring-percent">%</span>
            </div>
          </div>
        </div>
        <h3 class="ring-title">Testing</h3>
        <p class="ring-subtitle">QA & Bug Fixes</p>
      </div>

      <!-- Ring 4: Deployment -->
      <div class="ring-card ease-fade-in-up ease-delay-400">
        <div class="ring-wrapper">
          <div class="ring-bg ease-spin-slow ease-delay-300"></div>
          <div class="ring-progress ring-100">
            <div class="ring-value">
              <span class="ring-number">100</span>
              <span class="ring-percent">%</span>
            </div>
          </div>
        </div>
        <h3 class="ring-title">Deployment</h3>
        <p class="ring-subtitle">CI/CD Pipeline</p>
      </div>

    </div>
  </div>
</body>
</html>
