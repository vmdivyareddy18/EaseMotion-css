<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Rating Stars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="irs-container">
    <h1>Rate Your Experience</h1>
    <div class="irs-stars">
      <span class="irs-star" data-value="1">★</span>
      <span class="irs-star" data-value="2">★</span>
      <span class="irs-star" data-value="3">★</span>
      <span class="irs-star" data-value="4">★</span>
      <span class="irs-star" data-value="5">★</span>
    </div>
    <p class="irs-rating">Rating: <span id="irs-current">0</span> / 5</p>
    <div class="irs-actions">
      <button id="irs-reset" class="irs-btn">Reset</button>
    </div>
  </main>
  <script src="script.js"></script>
</body>
</html>
