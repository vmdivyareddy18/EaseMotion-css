<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glassmorphism Draw Border Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal">

<label for="modal" class="btn">
    Open Glass Modal
</label>

<label class="overlay" for="modal"></label>

<div class="modal">

    <span class="line top"></span>
    <span class="line right"></span>
    <span class="line bottom"></span>
    <span class="line left"></span>

    <label class="close" for="modal">&times;</label>

    <h2>Glassmorphism Modal</h2>

    <p>
        A frosted glass modal with a CSS draw-border animation and responsive design.
    </p>

    <button>Continue</button>

</div>

</body>
</html>
