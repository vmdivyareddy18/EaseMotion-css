<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Shortcut Cheat Sheet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>⌨️ Command Shortcut Cheat Sheet</h1>
        <p>Quick reference for commonly used keyboard shortcuts.</p>
    </header>

    <section class="shortcuts">

        <div class="shortcut-card">
            <h3>Navigation</h3>

            <div class="shortcut">
                <span>Open Search</span>
                <kbd>⌘</kbd><kbd>K</kbd>
            </div>

            <div class="shortcut">
                <span>Go to Dashboard</span>
                <kbd>⌘</kbd><kbd>D</kbd>
            </div>
        </div>

        <div class="shortcut-card">
            <h3>Editing</h3>

            <div class="shortcut">
                <span>New Document</span>
                <kbd>⌘</kbd><kbd>N</kbd>
            </div>

            <div class="shortcut">
                <span>Save Changes</span>
                <kbd>⌘</kbd><kbd>S</kbd>
            </div>
        </div>

        <div class="shortcut-card">
            <h3>Workspace</h3>

            <div class="shortcut">
                <span>Command Menu</span>
                <kbd>⌘</kbd><kbd>P</kbd>
            </div>

            <div class="shortcut">
                <span>Switch Project</span>
                <kbd>⌘</kbd><kbd>J</kbd>
            </div>
        </div>

    </section>

</div>

</body>
</html>
