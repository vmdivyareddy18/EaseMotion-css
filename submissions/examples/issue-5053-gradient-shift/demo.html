<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fix Demo - gradient-shift #5053</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #0f0f0f; color: #fff; }
    .hero {
      height: 200px; border-radius: 12px; display: flex;
      align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: bold; color: #fff;
      margin-bottom: 1.5rem;
    }
    .btn {
      padding: 12px 28px; border: none; border-radius: 8px;
      font-size: 1rem; color: #fff; cursor: pointer; margin-right: 1rem;
    }
    .custom-colors {
      --gradient-start: #11998e;
      --gradient-end: #38ef7d;
    }
  </style>
</head>
<body>

  <h3>Default gradient-shift (hero section)</h3>
  <div class="hero ease-gradient-shift">Hero Banner</div>

  <h3>Custom colors via CSS variables</h3>
  <div class="hero ease-gradient-shift custom-colors">Custom Gradient</div>

  <h3>On a button</h3>
  <button class="btn ease-gradient-shift">Gradient Button</button>

  <p style="color:#aaa; margin-top:2rem;">
    Test: enable "prefers-reduced-motion: reduce" in OS/DevTools -
    the gradient should freeze on a static frame instead of animating.
  </p>

</body>
</html>
