<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Autosave Conflict Resolver</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Autosave Conflict</h1>

        <p class="subtitle">
            A newer version of this form was detected. Choose how you'd like to continue.
        </p>

        <div class="conflict">

            <div class="version local">

                <span class="badge">
                    Local Draft
                </span>

                <h3>Edited 2 minutes ago</h3>

                <p>
                    Unsaved changes from your current session.
                </p>

            </div>

            <div class="divider">
                VS
            </div>

            <div class="version remote">

                <span class="badge">
                    Server Version
                </span>

                <h3>Edited just now</h3>

                <p>
                    A newer copy was saved from another device.
                </p>

            </div>

        </div>

        <div class="actions">

            <button class="merge">
                Merge Changes
            </button>

            <button class="overwrite">
                Keep Local
            </button>

            <button class="discard">
                Use Server
            </button>

        </div>

    </div>

</div>

</body>
</html>
