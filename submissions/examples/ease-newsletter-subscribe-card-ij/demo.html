<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Newsletter Subscribe Card</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='card-bg')r.style.setProperty('--card-bg',t.value);if(t.name==='input-bg')r.style.setProperty('--input-bg',t.value);if(t.name==='accent-color')r.style.setProperty('--accent-color',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelector('.subscribe-btn').addEventListener('click',function(){const card=this.closest('.subscribe-card');const form=card.querySelector('.subscribe-form');const msg=card.querySelector('.success-msg');form.style.transform='translateX(120%)';form.style.opacity='0';setTimeout(()=>{form.style.display='none';msg.classList.add('show')},350)})})</script>
<div class="container"><p class="title">Newsletter Subscribe Card</p>
<div class="subscribe-card"><div class="subscribe-form"><h3>Stay Updated</h3><p>Get the latest news and updates.</p><input type="email" placeholder="Enter your email"><button class="subscribe-btn">Subscribe</button></div>
<div class="success-msg"><div class="check">&#10003;</div><h3>Subscribed!</h3><p>Check your inbox for confirmation.</p></div></div>
<div class="controls"><label>Card: <input type="color" name="card-bg" value="#2d2d44"></label><label>Input: <input type="color" name="input-bg" value="#1a1a2e"></label><label>Accent: <input type="color" name="accent-color" value="#4ecdc4"></label><label>Speed: <input type="range" name="slide-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div></body></html>
