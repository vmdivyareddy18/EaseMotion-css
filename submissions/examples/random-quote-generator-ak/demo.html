<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="quote-card">
      <div class="quote-mark">"</div>
      <div class="quote-text" id="quoteText">The only way to do great work is to love what you do.</div>
      <div class="quote-author" id="quoteAuthor">— Steve Jobs</div>
      <div class="quote-actions">
        <button class="quote-btn" id="newQuoteBtn">New Quote</button>
        <button class="quote-btn secondary" id="tweetBtn" title="Share">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
        </button>
      </div>
    </div>
  </div>
  <script>
    const quotes = [
      { text: 'The only way to do great work is to love what you do.', author: 'Steve Jobs' },
      { text: 'Innovation distinguishes between a leader and a follower.', author: 'Steve Jobs' },
      { text: 'Stay hungry, stay foolish.', author: 'Steve Jobs' },
      { text: 'The future belongs to those who believe in the beauty of their dreams.', author: 'Eleanor Roosevelt' },
      { text: 'Strive not to be a success, but rather to be of value.', author: 'Albert Einstein' },
      { text: 'Two roads diverged in a wood, and I took the one less traveled by.', author: 'Robert Frost' },
      { text: 'The only impossible journey is the one you never begin.', author: 'Tony Robbins' },
      { text: 'In the middle of every difficulty lies opportunity.', author: 'Albert Einstein' },
      { text: 'Creativity is intelligence having fun.', author: 'Albert Einstein' },
      { text: 'What you do speaks so loudly that I cannot hear what you say.', author: 'Ralph Waldo Emerson' },
      { text: 'The best time to plant a tree was 20 years ago. The second best time is now.', author: 'Chinese Proverb' },
      { text: 'Everything you\'ve ever wanted is on the other side of fear.', author: 'George Addair' },
      { text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', author: 'Winston Churchill' },
      { text: 'Believe you can and you\'re halfway there.', author: 'Theodore Roosevelt' },
      { text: 'Act as if what you do makes a difference. It does.', author: 'William James' },
    ];

    const quoteText = document.getElementById('quoteText');
    const quoteAuthor = document.getElementById('quoteAuthor');
    const newQuoteBtn = document.getElementById('newQuoteBtn');
    const tweetBtn = document.getElementById('tweetBtn');

    function getRandomQuote() {
      return quotes[Math.floor(Math.random() * quotes.length)];
    }

    function displayQuote() {
      const q = getRandomQuote();
      quoteText.textContent = q.text;
      quoteAuthor.textContent = '— ' + q.author;
    }

    function tweetQuote() {
      const text = encodeURIComponent(`"${quoteText.textContent}" ${quoteAuthor.textContent}`);
      window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
    }

    newQuoteBtn.addEventListener('click', displayQuote);
    tweetBtn.addEventListener('click', tweetQuote);

    displayQuote();
  </script>
</body>
</html>
