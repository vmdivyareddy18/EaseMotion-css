<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Spacing Scale Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>📏 Spacing Scale Visualizer</h1>
        <p>Explore spacing tokens used in modern design systems.</p>
    </header>

    <section class="spacing-scale">

        <div class="spacing-item">
            <span>4px</span>
            <div class="bar bar-4"></div>
        </div>

        <div class="spacing-item">
            <span>8px</span>
            <div class="bar bar-8"></div>
        </div>

        <div class="spacing-item">
            <span>12px</span>
            <div class="bar bar-12"></div>
        </div>

        <div class="spacing-item">
            <span>16px</span>
            <div class="bar bar-16"></div>
        </div>

        <div class="spacing-item">
            <span>24px</span>
            <div class="bar bar-24"></div>
        </div>

        <div class="spacing-item">
            <span>32px</span>
            <div class="bar bar-32"></div>
        </div>

        <div class="spacing-item">
            <span>64px</span>
            <div class="bar bar-64"></div>
        </div>

    </section>

</div>

</body>
</html>
