<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacked Notification Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Stacked Notification Cards</h1>
    <p>Hover over the stack</p>
    <div class="notification-stack">
        <div class="card">
            <span class="icon">📩</span>
            <div>
                <h3>New Message</h3>
                <p>You received a new notification.</p>
            </div>
        </div>
        <div class="card">
            <span class="icon">📅</span>
            <div>
                <h3>Meeting Reminder</h3>
                <p>Stand-up meeting starts in 10 minutes.</p>
            </div>
        </div>
        <div class="card">
            <span class="icon">✅</span>
            <div>
                <h3>Deployment Successful</h3>
                <p>Your latest changes are now live.</p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
