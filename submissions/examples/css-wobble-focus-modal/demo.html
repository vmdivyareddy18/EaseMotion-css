<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Wobble-Focus Modal Demo</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="demo-container">

    <h1>CSS Wobble-Focus Modal</h1>

    <p>
      Pure CSS animated modal with a smooth wobble-focus transition.
    </p>

    <!-- Hidden Checkbox -->
    <input
      type="checkbox"
      id="modal-toggle"
      class="modal-toggle"
      aria-hidden="true"
    />

    <!-- Open Button -->
    <label
      for="modal-toggle"
      class="open-btn"
      role="button"
      tabindex="0"
      aria-controls="demo-modal"
    >
      Open Modal
    </label>

    <!-- Overlay -->
    <label
      for="modal-toggle"
      class="modal-overlay"
      aria-hidden="true"
    ></label>

    <!-- Modal -->
    <section
      id="demo-modal"
      class="modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      aria-describedby="modal-description"
    >

      <!-- Close Button -->
      <label
        for="modal-toggle"
        class="close-btn"
        aria-label="Close modal"
        tabindex="0"
      >
        &times;
      </label>

      <div class="modal-content">

        <h2 id="modal-title">
          Wobble-Focus Modal
        </h2>

        <p id="modal-description">
          This modal is built entirely with HTML and CSS.
          It features a smooth wobble-focus entrance animation,
          responsive layout, keyboard accessibility, and customizable
          CSS variables.
        </p>

        <div class="modal-actions">

          <label
            for="modal-toggle"
            class="secondary-btn"
            tabindex="0"
          >
            Close
          </label>

          <a
            href="#"
            class="primary-btn"
          >
            Learn More
          </a>

        </div>

      </div>

    </section>

  </main>

</body>
</html>
