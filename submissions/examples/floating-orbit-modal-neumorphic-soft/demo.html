<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Modal - Neumorphic Soft</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
Open Modal
</label>

<label for="modal-toggle" class="overlay"></label>

<div class="modal" role="dialog" aria-modal="true">

<label for="modal-toggle" class="close">&times;</label>

<div class="orbit">
<div class="planet"></div>
</div>

<h2>Neumorphic Workspace</h2>

<p>
A smooth floating orbit modal designed with soft shadows and subtle animations using only HTML and CSS.
</p>

<div class="buttons">
<button>Continue</button>
<button class="secondary">Cancel</button>
</div>

</div>

</body>
</html>
