<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Stepper Vertical</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stepper">
    <div class="step active">
      <div class="circle">1</div>
      <div class="content">Step 1: Initialize Project</div>
    </div>
    <div class="line"></div>

    <div class="step">
      <div class="circle">2</div>
      <div class="content">Step 2: Design Components</div>
    </div>
    <div class="line"></div>

    <div class="step">
      <div class="circle">3</div>
      <div class="content">Step 3: Implement Logic</div>
    </div>
    <div class="line"></div>

    <div class="step">
      <div class="circle">4</div>
      <div class="content">Step 4: Final Review</div>
    </div>
  </div>

  <script>
    // Animate active step indicator
    const steps = document.querySelectorAll('.step');
    let currentStep = 0;

    function activateNextStep() {
      if (currentStep < steps.length) {
        steps[currentStep].classList.add('completed');
        if (currentStep + 1 < steps.length) {
          steps[currentStep + 1].classList.add('active');
        }
        currentStep++;
      }
    }

    // Simulate progress every 2 seconds
    setInterval(activateNextStep, 2000);
  </script>
</body>
</html>
