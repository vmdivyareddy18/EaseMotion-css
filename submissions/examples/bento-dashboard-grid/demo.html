<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Bento Dashboard Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bento-grid">
    <div class="card large">
        <h2>Analytics</h2>
        <p>Track your latest statistics and insights.</p>
    </div>
    <div class="card">
        <h3>Projects</h3>
        <p>12 Active</p>
    </div>
    <div class="card">
        <h3>Tasks</h3>
        <p>28 Pending</p>
    </div>
    <div class="card wide">
        <h2>Revenue</h2>
        <p>$42,560 this month</p>
    </div>
    <div class="card">
        <h3>Messages</h3>
        <p>15 New</p>
    </div>
    <div class="card">
        <h3>Team</h3>
        <p>8 Members</p>
    </div>
</div>
</body>
</html>
