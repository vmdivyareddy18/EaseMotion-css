<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aspect Portrait - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-aspect-portrait</h1>
    <p class="subtitle">3:4 portrait aspect ratio utility for profile cards and portrait images</p>

    <div class="aspect-demo">
      <div class="aspect-card card-purple">
        <div class="portrait ease-aspect-portrait">
          <div class="icon">👩‍💻</div>
          <div class="name">Sarah Chen</div>
          <div class="role">Frontend Developer</div>
        </div>
      </div>
      <div class="aspect-card card-teal">
        <div class="portrait ease-aspect-portrait">
          <div class="icon">👨‍🎨</div>
          <div class="name">Marcus Lee</div>
          <div class="role">UI Designer</div>
        </div>
      </div>
    </div>

    <div class="code-block">
      .ease-aspect-portrait {<br>
      &nbsp;&nbsp;aspect-ratio: 3 / 4;<br>
      }
    </div>
  </div>
</body>
</html>
