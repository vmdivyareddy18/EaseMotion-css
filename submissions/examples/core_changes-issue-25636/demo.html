<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shimmer Skeleton — Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      font-family: system-ui, sans-serif;
    }
    .demo-row {
      display: flex;
      gap: 1.5rem;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .demo-section {
      text-align: center;
    }
    .demo-section h3 {
      color: #64748b;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0 0 1rem;
    }
  </style>
</head>
<body>
  <div class="demo-row">
    <div class="demo-section">
      <h3>Text lines</h3>
      <div style="width: 240px">
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text skeleton--sm" style="width:40%"></div>
      </div>
    </div>

    <div class="demo-section">
      <h3>Avatar + text</h3>
      <div class="skeleton-avatar">
        <div class="skeleton"></div>
        <div class="skeleton-group" style="width: 160px">
          <div class="skeleton skeleton--text skeleton--sm" style="width:70%"></div>
          <div class="skeleton skeleton--text" style="width:40%"></div>
        </div>
      </div>
    </div>

    <div class="demo-section">
      <h3>Circle</h3>
      <div class="skeleton skeleton--circle"></div>
    </div>
  </div>

  <div class="demo-section">
    <h3>Card skeleton</h3>
    <div class="skeleton-card" style="width: 300px">
      <div class="skeleton skeleton--rect"></div>
      <div style="margin-top: 1rem">
        <div class="skeleton skeleton--text"></div>
        <div class="skeleton skeleton--text skeleton--sm" style="width: 50%"></div>
      </div>
    </div>
  </div>
</body>
</html>
