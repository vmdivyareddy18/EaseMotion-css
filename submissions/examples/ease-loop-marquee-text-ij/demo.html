<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loop Marquee Text</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Loop Marquee Text</h1>
  <p class="subtitle">Seamless horizontal scrolling marquee with infinite loop</p>

  <div class="controls">
    <div class="control-group">
      <label for="speedSlider">Speed: <span id="speedLabel">1.0</span>x</label>
      <input type="range" id="speedSlider" min="0.25" max="4" step="0.05" value="1">
    </div>
    <button id="dirBtn" class="btn">Direction: &#8594;</button>
  </div>

  <div class="marquee-wrapper">
    <div id="marqueeTrack" class="marquee-track">
      <div class="marquee-content" id="marqueeContent">
        <span class="marquee-item">EaseMotion</span>
        <span class="marquee-item">CSS</span>
        <span class="marquee-item">&#9670;</span>
        <span class="marquee-item">Marquee</span>
        <span class="marquee-item">&#9733;</span>
        <span class="marquee-item">Seamless</span>
        <span class="marquee-item">Loop</span>
        <span class="marquee-item">&#9670;</span>
        <span class="marquee-item">Infinite</span>
        <span class="marquee-item">Scroll</span>
        <span class="marquee-item">&#9733;</span>
        <span class="marquee-item">Animation</span>
      </div>
    </div>
  </div>

  <div class="info">
    <span class="badge">Hover to pause</span>
  </div>

  <script>
    const track = document.getElementById('marqueeTrack');
    const content = document.getElementById('marqueeContent');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const dirBtn = document.getElementById('dirBtn');
    const root = document.documentElement;

    let direction = 1;

    function duplicateContent() {
      const clone = content.cloneNode(true);
      track.appendChild(clone);
    }

    function setSpeed(val) {
      root.style.setProperty('--lmt-speed', val);
      speedLabel.textContent = parseFloat(val).toFixed(2);
    }

    function toggleDirection() {
      direction *= -1;
      root.style.setProperty('--lmt-direction', direction);
      dirBtn.innerHTML = direction === 1 ? 'Direction: &#8594;' : 'Direction: &#8592;';
    }

    speedSlider.addEventListener('input', () => {
      setSpeed(speedSlider.value);
    });

    dirBtn.addEventListener('click', toggleDirection);

    window.addEventListener('load', () => {
      duplicateContent();
      setSpeed(speedSlider.value);
    });
  </script>
</body>
</html>
