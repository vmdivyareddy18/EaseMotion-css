<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chart Grow Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bar Chart – Grow Animation</h1>

  <div class="chart" id="chart">
    <div class="chart-bar" data-value="85">
      <span class="chart-label">A</span>
      <div class="chart-fill"></div>
      <span class="chart-value">85</span>
    </div>
    <div class="chart-bar" data-value="60">
      <span class="chart-label">B</span>
      <div class="chart-fill"></div>
      <span class="chart-value">60</span>
    </div>
    <div class="chart-bar" data-value="92">
      <span class="chart-label">C</span>
      <div class="chart-fill"></div>
      <span class="chart-value">92</span>
    </div>
    <div class="chart-bar" data-value="45">
      <span class="chart-label">D</span>
      <div class="chart-fill"></div>
      <span class="chart-value">45</span>
    </div>
    <div class="chart-bar" data-value="78">
      <span class="chart-label">E</span>
      <div class="chart-fill"></div>
      <span class="chart-value">78</span>
    </div>
  </div>

  <button id="replayBtn">Replay</button>

  <script>
    const chart = document.getElementById('chart');
    const replayBtn = document.getElementById('replayBtn');
    const bars = chart.querySelectorAll('.chart-bar');

    bars.forEach(bar => {
      const val = parseInt(bar.dataset.value, 10);
      bar.querySelector('.chart-fill').style.setProperty('--bar-height', val + '%');
    });

    function triggerAnimation() {
      chart.classList.remove('animate');
      void chart.offsetWidth;
      chart.classList.add('animate');
    }

    replayBtn.addEventListener('click', triggerAnimation);
    window.addEventListener('load', triggerAnimation);
  </script>
</body>
</html>
