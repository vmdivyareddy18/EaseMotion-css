<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock badges</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell" aria-label="Stock badges example">
    <section class="demo-card">
      <p class="eyebrow">Storefront</p>
      <h1>Stock badges</h1>
      <ul class="status-list">
        <li><span>In stock</span><b></b></li>
        <li><span>Low stock</span><b></b></li>
        <li><span>Restocking</span><b></b></li>
      </ul>
      <button type="button">Open details</button>
    </section>
  </main>
</body>
</html>
