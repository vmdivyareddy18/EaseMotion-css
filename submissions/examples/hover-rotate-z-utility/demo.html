<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Z-Axis Hover Rotation Utilities — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 6rem 1rem; margin: 0;">

  <div style="max-width: 900px; margin: 0 auto 3rem auto; text-align: center; font-family: sans-serif;">
    <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-size: 1.5rem; font-weight: 800;">Z-Axis Rotational Space</h3>
    <p style="margin: 0; color: #64748b; font-size: 0.95rem;">Hover over cards to trigger hardware-accelerated 2D transform twists.</p>
  </div>

  <div class="ease-rotate-showcase-grid">
    
    <div class="ease-interactive-cube ease-hover-rotate-z-xs">
      <div class="ease-cube-icon">A</div>
      <p class="ease-cube-label">.ease-hover-rotate-z-xs</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(+2° micro-shift)</span>
    </div>

    <div class="ease-interactive-cube ease-hover-rotate-z-sm" style="border-top: 3px solid #3b82f6;">
      <div class="ease-cube-icon" style="background: #eff6ff;">B</div>
      <p class="ease-cube-label">.ease-hover-rotate-z-sm</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(+6° standard)</span>
    </div>

    <div class="ease-interactive-cube ease-hover-rotate-z-md" style="border-top: 3px solid #8b5cf6;">
      <div class="ease-cube-icon" style="background: #f5f3ff; color: #8b5cf6;">C</div>
      <p class="ease-cube-label">.ease-hover-rotate-z-md</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(+12° pronounced)</span>
    </div>

    <div class="ease-interactive-cube ease-hover-rotate-z-neg-sm" style="border-top: 3px solid #ef4444;">
      <div class="ease-cube-icon" style="background: #fef2f2; color: #ef4444;">D</div>
      <p class="ease-cube-label">.ease-hover-rotate-z-neg-sm</p>
      <span style="font-size: 0.7rem; color: #94a3b8;">(-6° inverted)</span>
    </div>

  </div>

</body>
</html>
