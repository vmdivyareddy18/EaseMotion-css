<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS Animation Class Generator - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to compiled stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">Map-Driven Class Generator</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
      Demonstrating utility classes generated automatically using an SCSS keyframe config map and an <code>@each</code> loop. Replay to view animations.
    </p>

    <!-- Cards Grid -->
    <div class="demo-grid" id="cards-container">
      <div class="animate-card ease-animate-fade-in">
        Fade In
      </div>

      <div class="animate-card ease-animate-slide-up">
        Slide Up
      </div>

      <div class="animate-card ease-animate-zoom-in">
        Zoom In
      </div>
    </div>

    <!-- Replay Trigger -->
    <button class="btn-replay" onclick="replayAnimations();">Replay Animations</button>
  </div>

  <script>
    function replayAnimations() {
      const container = document.getElementById('cards-container');
      const cards = container.innerHTML;
      container.innerHTML = '';
      setTimeout(() => {
        container.innerHTML = cards;
      }, 50);
    }
  </script>
</body>
</html>
