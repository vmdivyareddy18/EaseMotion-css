<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Text Reveal Calendar - Health & Fitness Theme for EaseMotion CSS"
    />
    <title>Text Reveal Calendar | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="em-calendar-container" role="main" aria-label="Calendar">
      <section class="em-calendar">
        <!-- Month Header with Navigation -->

        <header class="em-calendar-header">
          <button class="em-calendar-nav-btn" aria-label="Previous month">
            &#8249;
          </button>
          
          <h1 class="em-calendar-title">July 2026</h1>
          <button class="em-calendar-nav-btn" aria-label="Next month">
            &#8250;
          </button>
        </header>

        <!-- Weekday Labels -->
        <div
          class="em-calendar-weekdays"
          role="rowgroup"
          aria-label="Days of the week"
        >
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Sunday"
          >
            Sun
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Monday"
          >
            Mon
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Tuesday"
          >
            Tue
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Wednesday"
          >
            Wed
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Thursday"
          >
            Thu
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Friday"
          >
            Fri
          </div>
          <div
            class="em-calendar-weekday"
            role="columnheader"
            aria-label="Saturday"
          >
            Sat
          </div>
        </div>

        <!-- Calendar Dates Grid -->
        <div class="em-calendar-dates" role="grid" aria-label="Calendar days">
          <!-- Last Month's Dates -->
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="June 28"
          >
            <span>28</span>
          </div>
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="June 29"
          >
            <span>29</span>
          </div>
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="June 30"
          >
            <span>30</span>
          </div>

          <!-- This Month's Dates -->
          <div class="em-calendar-date" role="gridcell" aria-label="July 1">
            <span>1</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 2">
            <span>2</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 3">
            <span>3</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 4">
            <span>4</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 5">
            <span>5</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 6">
            <span>6</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 7">
            <span>7</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 8">
            <span>8</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 9">
            <span>9</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 10">
            <span>10</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 11">
            <span>11</span>
          </div>
          <div
            class="em-calendar-date is-today"
            role="gridcell"
            aria-label="July 12, today"
          >
            <span>12</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 13">
            <span>13</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 14">
            <span>14</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 15">
            <span>15</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 16">
            <span>16</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 17">
            <span>17</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 18">
            <span>18</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 19">
            <span>19</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 20">
            <span>20</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 21">
            <span>21</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 22">
            <span>22</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 23">
            <span>23</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 24">
            <span>24</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 25">
            <span>25</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 26">
            <span>26</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 27">
            <span>27</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 28">
            <span>28</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 29">
            <span>29</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 30">
            <span>30</span>
          </div>
          <div class="em-calendar-date" role="gridcell" aria-label="July 31">
            <span>31</span>
          </div>

          <!-- Next Month's Dates -->
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="August 1"
          >
            <span>1</span>
          </div>
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="August 2"
          >
            <span>2</span>
          </div>
          <div
            class="em-calendar-date is-other-month"
            role="gridcell"
            aria-label="August 3"
          >
            <span>3</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
