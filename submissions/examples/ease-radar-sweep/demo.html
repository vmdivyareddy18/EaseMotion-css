<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-radar-sweep</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>ease-radar-sweep</h1>
  <p>Rotating conic-gradient radar sweep with fading trail &mdash; dashboard UI component</p>

  <!-- Dashboard stats -->
  <div class="dashboard">
    <div class="dash-card">
      Targets<span class="dash-value" id="targets">04</span>
    </div>
    <div class="dash-card">
      Range<span class="dash-value">240 km</span>
    </div>
    <div class="dash-card">
      RPM<span class="dash-value" id="rpm">20</span>
    </div>
    <div class="dash-card">
      Status<span class="dash-value" style="font-size:0.9rem;color:#00ff41;">ACTIVE</span>
    </div>
  </div>

  <!-- Three radar variants -->
  <div class="radar-row">

    <!-- GREEN — standard -->
    <div class="radar-card">
      <div class="radar green lg">
        <div class="radar-ring-outer"></div>
        <div class="radar-rings"></div>
        <div class="radar-cross"></div>
        <div class="radar-sweep"></div>
        <div class="radar-beam"></div>
        <!-- Blip targets -->
        <div class="radar-blip" style="left:62%;top:38%;"></div>
        <div class="radar-blip" style="left:30%;top:55%;"></div>
        <div class="radar-blip" style="left:70%;top:65%;"></div>
        <div class="radar-blip" style="left:45%;top:25%;"></div>
        <div class="radar-center"></div>
      </div>
      <span class="radar-label" style="color:#00ff41;">Air Traffic</span>
      <span class="radar-status">&#9632; SCANNING...</span>
    </div>

    <!-- BLUE — faster sweep -->
    <div class="radar-card">
      <div class="radar blue lg">
        <div class="radar-ring-outer"></div>
        <div class="radar-rings"></div>
        <div class="radar-cross"></div>
        <div class="radar-sweep"></div>
        <div class="radar-beam"></div>
        <div class="radar-blip" style="left:55%;top:42%;"></div>
        <div class="radar-blip" style="left:38%;top:68%;"></div>
        <div class="radar-blip" style="left:72%;top:55%;"></div>
        <div class="radar-center"></div>
      </div>
      <span class="radar-label" style="color:#00d4ff;">Network Scan</span>
      <span class="radar-status" style="color:#2a6a8c;">&#9632; SCANNING...</span>
    </div>

    <!-- RED — slow sweep -->
    <div class="radar-card">
      <div class="radar red lg">
        <div class="radar-ring-outer"></div>
        <div class="radar-rings"></div>
        <div class="radar-cross"></div>
        <div class="radar-sweep"></div>
        <div class="radar-beam"></div>
        <div class="radar-blip" style="left:65%;top:35%;"></div>
        <div class="radar-blip" style="left:28%;top:45%;"></div>
        <div class="radar-center"></div>
      </div>
      <span class="radar-label" style="color:#ff0030;">Threat Monitor</span>
      <span class="radar-status" style="color:#8c2a30;">&#9632; SCANNING...</span>
    </div>

  </div>

  <!-- Small inline variants -->
  <div style="display:flex;gap:2rem;align-items:center;flex-wrap:wrap;justify-content:center;">
    <div class="radar green sm">
      <div class="radar-rings"></div>
      <div class="radar-cross"></div>
      <div class="radar-sweep"></div>
      <div class="radar-beam"></div>
      <div class="radar-blip" style="left:60%;top:40%;width:4px;height:4px;"></div>
      <div class="radar-center" style="width:5px;height:5px;"></div>
    </div>
    <div class="radar blue sm">
      <div class="radar-rings"></div>
      <div class="radar-cross"></div>
      <div class="radar-sweep"></div>
      <div class="radar-beam"></div>
      <div class="radar-blip" style="left:40%;top:60%;width:4px;height:4px;"></div>
      <div class="radar-center" style="width:5px;height:5px;"></div>
    </div>
    <div class="radar red sm">
      <div class="radar-rings"></div>
      <div class="radar-cross"></div>
      <div class="radar-sweep"></div>
      <div class="radar-beam"></div>
      <div class="radar-center" style="width:5px;height:5px;"></div>
    </div>
  </div>

  <script>
    // Animate target counter
    const targetsEl = document.getElementById('targets');
    const rpmEl     = document.getElementById('rpm');
    const counts    = [3, 4, 4, 5, 4, 3, 4];
    let i = 0;
    setInterval(() => {
      targetsEl.textContent = String(counts[i % counts.length]).padStart(2, '0');
      rpmEl.textContent     = [18, 20, 20, 22, 20][i % 5];
      i++;
    }, 2800);
  </script>

</body>
</html>
