<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Floating Label Form - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="form-container ease-zoom-in">
    <!-- Header -->
    <div class="form-header ease-fade-in-down ease-delay-100">
      <div class="logo">🔐</div>
      <h1>Welcome Back</h1>
      <p>Sign in to continue to your dashboard.</p>
    </div>

    <!-- Form -->
    <form class="login-form">
      <!-- Email Input with Floating Label -->
      <div class="input-group ease-fade-in-up ease-delay-200">
        <input type="email" id="email" placeholder=" " required>
        <label for="email" class="floating-label">Email Address</label>
      </div>

      <!-- Password Input with Floating Label -->
      <div class="input-group ease-fade-in-up ease-delay-300">
        <input type="password" id="password" placeholder=" " required>
        <label for="password" class="floating-label">Password</label>
      </div>

      <!-- Forgot Password Link -->
      <div class="form-options ease-fade-in-up ease-delay-400">
        <label class="checkbox-label">
          <input type="checkbox">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn-submit ease-fade-in-up ease-delay-500 ease-hover-grow">
        Sign In
      </button>
    </form>

    <!-- Divider -->
    <div class="divider ease-fade-in ease-delay-600">
      <span>OR</span>
    </div>

    <!-- Social Login Buttons -->
    <div class="social-buttons ease-fade-in-up ease-delay-700">
      <button class="btn-social ease-hover-grow">
        <span class="social-icon">G</span> Google
      </button>
      <button class="btn-social ease-hover-grow">
        <span class="social-icon">🍎</span> Apple
      </button>
    </div>

    <!-- Footer Link -->
    <p class="form-footer ease-fade-in-up ease-delay-800">
      Don't have an account? <a href="#">Sign up</a>
    </p>
  </div>
</body>
</html>
