<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>anchor session activity demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="anchor session activity">
    <section class="status-card">
      <div class="card-copy">
        <p>Session</p>
        <h1>anchor session activity</h1>
        <span>Live workspace activity panel</span>

      <div class="metric" aria-label="Active value">
        <strong>12m</strong>
        <em>Active</em>
      </div>
      <div class="motion-bars" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
