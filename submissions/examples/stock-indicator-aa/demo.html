<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Indicator Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f9fafb; }
    h1 { margin-bottom: 1.5rem; }
    .product-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 320px;
      margin-bottom: 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .product-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .product-price { font-size: 1.4rem; font-weight: 800; color: #111; margin-bottom: 1rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.6rem;
      background: #111;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <h1>Stock Indicator Component</h1>

  <div class="product-card">
    <div class="product-title">Wireless Headphones</div>
    <div class="product-price">$89.99</div>
    <span class="stock-indicator">
      <span class="stock-dot"></span>
      Only 5 left
    </span>
    <button class="btn">Add to Cart</button>
  </div>

  <div class="product-card">
    <div class="product-title">Limited Edition Sneakers</div>
    <div class="product-price">$149.99</div>
    <span class="stock-indicator stock-critical">
      <span class="stock-dot"></span>
      Only 1 left!
    </span>
    <button class="btn">Add to Cart</button>
  </div>
</body>
</html>
