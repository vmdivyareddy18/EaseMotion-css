<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Swing Drop - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div class="box ease-swing-drop-el">Swinging Panel</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-swing-drop-el'); void b.offsetWidth; b.classList.add('ease-swing-drop-el');">Drop Sign</button>
    </div>
</body>
</html>
