<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Meeting Scheduler Card</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scheduler-wrapper ease-slide-up-fade">
        <div class="scheduler-card">
            
            <!-- Host Details Section -->
            <div class="host-info">
                <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Host Avatar" class="host-avatar">
                <div class="host-details">
                    <p class="host-name">Sarah Jenkins</p>
                    <h2 class="meeting-title">Design Sync</h2>
                    <p class="meeting-meta">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        30 min
                    </p>
                </div>
            </div>

            <!-- Divider -->
            <div class="divider" aria-hidden="true"></div>

            <!-- Date and Time Selection -->
            <div class="scheduling-section">
                
                <!-- Date Picker Mock -->
                <div class="date-selector">
                    <h3 class="section-title">Select a Date</h3>
                    <div class="calendar-grid" role="group" aria-label="Date Selection">
                        <div class="calendar-day-header" aria-hidden="true">Mo</div>
                        <div class="calendar-day-header" aria-hidden="true">Tu</div>
                        <div class="calendar-day-header" aria-hidden="true">We</div>
                        <div class="calendar-day-header" aria-hidden="true">Th</div>
                        <div class="calendar-day-header" aria-hidden="true">Fr</div>
                        
                        <div class="calendar-day disabled" aria-disabled="true">11</div>
                        <div class="calendar-day disabled" aria-disabled="true">12</div>
                        <div class="calendar-day disabled" aria-disabled="true">13</div>
                        <div class="calendar-day disabled" aria-disabled="true">14</div>
                        
                        <label class="calendar-day">
                            <input type="radio" name="date" checked>
                            <span>15</span>
                        </label>
                        <label class="calendar-day">
                            <input type="radio" name="date">
                            <span>18</span>
                        </label>
                        <label class="calendar-day">
                            <input type="radio" name="date">
                            <span>19</span>
                        </label>
                        <label class="calendar-day">
                            <input type="radio" name="date">
                            <span>20</span>
                        </label>
                        <label class="calendar-day">
                            <input type="radio" name="date">
                            <span>21</span>
                        </label>
                        <label class="calendar-day">
                            <input type="radio" name="date">
                            <span>22</span>
                        </label>
                    </div>
                </div>

                <!-- Time Slot Picker -->
                <div class="time-selector">
                    <h3 class="section-title">Friday, October 15</h3>
                    <div class="time-slots" role="group" aria-label="Time Selection">
                        <label class="time-slot">
                            <input type="radio" name="time" value="09:00">
                            <span class="time-label">09:00 AM</span>
                        </label>
                        <label class="time-slot">
                            <input type="radio" name="time" value="09:30">
                            <span class="time-label">09:30 AM</span>
                        </label>
                        <label class="time-slot">
                            <input type="radio" name="time" value="10:00">
                            <span class="time-label">10:00 AM</span>
                        </label>
                        <label class="time-slot">
                            <input type="radio" name="time" value="11:30" checked>
                            <span class="time-label">11:30 AM</span>
                        </label>
                        <label class="time-slot">
                            <input type="radio" name="time" value="14:00">
                            <span class="time-label">02:00 PM</span>
                        </label>
                        <label class="time-slot">
                            <input type="radio" name="time" value="15:30">
                            <span class="time-label">03:30 PM</span>
                        </label>
                    </div>
                </div>
            </div>

            <!-- Action Area -->
            <div class="card-actions">
                <button class="ease-btn-confirm">Confirm Meeting</button>
            </div>
            
        </div>
    </div>
</body>
</html>
