<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-attention-bounce Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; max-width: 400px; padding: 2rem;">
    <h1 style="font-size: 1.75rem; font-weight: 800; margin-bottom: 0.5rem;">Attention Bouncing</h1>
    <p style="color: #94a3b8; font-size: 0.95rem; line-height: 1.6;">Look at the bottom right corner of your display viewport to observe the fluid, hardware-accelerated attention seeker tracking widget.</p>
  </div>

  <div class="floating-cta-container">
    <button class="chat-widget-trigger ease-attention-bounce" style="--ease-bounce-height: -16px; --ease-bounce-speed: 1s;">
      <svg style="width: 20px; height: 20px; fill: currentColor;" viewBox="0 0 24 24">
        <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
      </svg>
      Support Online
    </button>
  </div>

</body>
</html>
