<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-light-speed-in / ease-light-speed-out — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
      overflow: hidden;
    }
    h1 { font-weight: 700; margin: 0; font-size: 2.5rem; }
    p.sub { color: #94a3b8; margin: 0 0 1rem; }
    .demo-cards {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      width: 220px;
      height: 160px;
      background: linear-gradient(135deg, #06b6d4, #3b82f6);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3);
      font-weight: 700;
      font-size: 1.5rem;
    }
    .card span { font-size: 0.85rem; font-weight: 400; opacity: 0.8; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
  </style>
</head>
<body>
  <h1>Light Speed</h1>
  <p class="sub">Fast entrance/exit with skew + translate + opacity — whoosh!</p>

  <div class="demo-cards">
    <div class="card ease-light-speed-in" id="card1">
      🚀
      <span>Light Speed In</span>
    </div>
    <div class="card ease-light-speed-out" id="card2">
      💨
      <span>Light Speed Out</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="replay()">Replay All</button>
  </div>

  <script>
    function replay() {
      [card1, card2].forEach(c => {
        c.style.animation = 'none';
        void c.offsetWidth;
        c.style.animation = '';
      });
    }
  </script>
</body>
</html>
