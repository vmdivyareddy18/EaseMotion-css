<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-hexagon-loader · Demo</title>

  <style>
    :root {
      --bg: #0d0f14;
      --card: #161a24;
      --border: #232840;
      --text: #e6ebff;
      --muted: #7b86a8;

      --accent: #7c5cff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 60px 24px;
    }

    header {
      max-width: 900px;
      margin: 0 auto 50px;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    h1 span {
      color: var(--accent);
    }

    p {
      color: var(--muted);
      max-width: 600px;
      line-height: 1.6;
    }

    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    /* =========================
       HEXAGON LOADER
       ========================= */

    .ease-hexagon {
      --size: 80px;
      --speed: 2s;
      --color: var(--accent);

      width: var(--size);
      height: var(--size);

      position: relative;

      display: grid;
      place-items: center;
    }

    /* Outer rotating glow ring */
    .ease-hexagon::before {
      content: "";
      position: absolute;
      inset: 0;

      background: conic-gradient(
        from 0deg,
        transparent 0deg,
        transparent 300deg,
        var(--color) 340deg,
        transparent 360deg
      );

      filter: blur(1px);
      animation: rotate var(--speed) linear infinite;
    }

    /* Hexagon core */
    .ease-hexagon__shape {
      width: 65%;
      height: 65%;
      background: var(--color);

      clip-path: polygon(
        25% 5%,
        75% 5%,
        100% 50%,
        75% 95%,
        25% 95%,
        0% 50%
      );

      position: relative;

      animation: pulse var(--speed) ease-in-out infinite;
    }

    /* Inner glow */
    .ease-hexagon__shape::after {
      content: "";
      position: absolute;
      inset: 0;

      background: inherit;
      filter: blur(12px);
      opacity: 0.4;
    }

    /* Animations */
    @keyframes rotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(0.95);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    /* =========================
       VARIANTS
       ========================= */

    .ease-hexagon--sm { --size: 50px; }
    .ease-hexagon--md { --size: 80px; }
    .ease-hexagon--lg { --size: 120px; }

    .ease-hexagon--fast { --speed: 1s; }
    .ease-hexagon--slow { --speed: 3.5s; }

    .ease-hexagon--cyan { --color: #38bdf8; }
    .ease-hexagon--emerald { --color: #10b981; }
    .ease-hexagon--amber { --color: #f59e0b; }

    .label {
      font-size: 12px;
      color: var(--muted);
      font-family: monospace;
    }

  </style>
</head>

<body>

<header>
  <h1>Ease <span>Hexagon Loader</span></h1>
  <p>
    A geometric CSS loader built using clip-path hexagon geometry,
    rotating conic sweep, and pulsing motion. Fully configurable
    using CSS variables — no JavaScript.
  </p>
</header>

<section class="grid">

  <div class="card">
    <div class="ease-hexagon ease-hexagon--md ease-hexagon--cyan">
      <div class="ease-hexagon__shape"></div>
    </div>
    <div class="label">default</div>
  </div>

  <div class="card">
    <div class="ease-hexagon ease-hexagon--sm ease-hexagon--emerald">
      <div class="ease-hexagon__shape"></div>
    </div>
    <div class="label">small / emerald</div>
  </div>

  <div class="card">
    <div class="ease-hexagon ease-hexagon--lg ease-hexagon--amber ease-hexagon--fast">
      <div class="ease-hexagon__shape"></div>
    </div>
    <div class="label">large / fast</div>
  </div>

  <div class="card">
    <div class="ease-hexagon ease-hexagon--md ease-hexagon--slow">
      <div class="ease-hexagon__shape"></div>
    </div>
    <div class="label">slow pulse</div>
  </div>

</section>

</body>
</html>
