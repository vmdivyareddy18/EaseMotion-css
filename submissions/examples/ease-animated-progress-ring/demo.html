<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Animated Progress Ring Tracker | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="progress-ring-showcase-wrapper">
    <header class="showcase-header">
      <h1>Animated Progress Ring</h1>
      <p>A pure CSS circular progress tracker using <code>stroke-dasharray</code>.</p>
    </header>

    <div class="demo-area">
      <!-- Progress Ring Component -->
      <!-- We set a custom property --progress indicating the percentage (0 to 100) -->
      <div class="ease-animated-progress-ring-tracker" style="--progress: 75;" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" role="progressbar">
        <svg class="ease-progress-ring" width="120" height="120" viewBox="0 0 120 120">
          <circle class="ease-progress-ring__track" cx="60" cy="60" r="54" fill="none" stroke-width="12" />
          <circle class="ease-progress-ring__fill" cx="60" cy="60" r="54" fill="none" stroke-width="12" />
        </svg>
        <div class="ease-progress-label">75%</div>
      </div>
      
      <!-- Second Example -->
      <div class="ease-animated-progress-ring-tracker ease-ring-success" style="--progress: 100;" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100" role="progressbar">
        <svg class="ease-progress-ring" width="120" height="120" viewBox="0 0 120 120">
          <circle class="ease-progress-ring__track" cx="60" cy="60" r="54" fill="none" stroke-width="12" />
          <circle class="ease-progress-ring__fill" cx="60" cy="60" r="54" fill="none" stroke-width="12" />
        </svg>
        <div class="ease-progress-label">100%</div>
      </div>
    </div>
    
  </div>

</body>
</html>
