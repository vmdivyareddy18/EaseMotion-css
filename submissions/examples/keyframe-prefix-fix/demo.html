<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>em- Keyframe Prefix Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="keyframes.css" />
  <style>
    body {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      font-family: sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
    }
    .box {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 0.5rem;
      padding: 1.5rem;
      text-align: center;
    }
    .box span { font-size: 0.8rem; opacity: 0.6; display: block; margin-top: 0.5rem; }

    .demo-fade-in   { animation: em-fade-in 1.2s ease infinite alternate; }
    .demo-slide-in  { animation: em-slide-in 1.2s ease infinite alternate; }
    .demo-bounce    { animation: em-bounce 1s ease infinite; }
    .demo-spin      { animation: em-spin 1.2s linear infinite; width: 2rem; height: 2rem;
                       border: 3px solid #6c63ff; border-top-color: transparent;
                       border-radius: 50%; margin: 0 auto; }
    .demo-pulse     { animation: em-pulse 1.2s ease infinite; }
    .demo-shake     { animation: em-shake 0.5s ease infinite; }
  </style>
</head>
<body>
  <div class="box"><div class="demo-fade-in">Fade</div><span>em-fade-in</span></div>
  <div class="box"><div class="demo-slide-in">Slide</div><span>em-slide-in</span></div>
  <div class="box"><div class="demo-bounce">Bounce</div><span>em-bounce</span></div>
  <div class="box"><div class="demo-spin"></div><span>em-spin</span></div>
  <div class="box"><div class="demo-pulse">Pulse</div><span>em-pulse</span></div>
  <div class="box"><div class="demo-shake">Shake</div><span>em-shake</span></div>
</body>
</html>
