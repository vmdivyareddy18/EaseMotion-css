<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamburger Cross Icon – EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Hamburger → Cross Icon</h1>
  <p class="subtitle">Click any hamburger to toggle the X animation.</p>

  <section class="variants">
    <div class="variant">
      <h2>Small</h2>
      <button class="hamburger" data-variant="small" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="variant">
      <h2>Default</h2>
      <button class="hamburger" data-variant="default" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="variant">
      <h2>Large</h2>
      <button class="hamburger" data-variant="large" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>

    <div class="variant">
      <h2>Inverse</h2>
      <button class="hamburger" data-variant="inverse" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </section>

  <section class="controls">
    <button class="toggle-all" id="toggleAll">Toggle All</button>
    <button class="reset-all" id="resetAll">Reset All</button>
  </section>

  <script>
    document.querySelectorAll('.hamburger').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('active'));
    });

    document.getElementById('toggleAll').addEventListener('click', () => {
      document.querySelectorAll('.hamburger').forEach(btn => btn.classList.add('active'));
    });

    document.getElementById('resetAll').addEventListener('click', () => {
      document.querySelectorAll('.hamburger').forEach(btn => btn.classList.remove('active'));
    });
  </script>
</body>
</html>
