<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Picker Popup</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h2 class="card-title">Emoji Picker</h2>
    <p class="card-subtitle">Click the button to open the emoji grid</p>

    <div class="picker-trigger">
      <button class="trigger-btn" data-testid="trigger-btn">
        <span class="selected-emoji">😊</span>
        Pick an emoji
        <span class="chevron">▾</span>
      </button>
    </div>

    <div class="popup-overlay" data-testid="popup-overlay">
      <div class="popup" data-testid="popup">
        <div class="popup-header">
          <span class="popup-title">Choose Emoji</span>
          <button class="close-btn" data-testid="close-btn">✕</button>
        </div>
        <div class="search-row">
          <input type="text" class="emoji-search" placeholder="Search emoji..." />
        </div>
        <div class="emoji-grid" data-testid="emoji-grid">
          <button class="emoji-item" style="--i:0">😊</button>
          <button class="emoji-item" style="--i:1">😂</button>
          <button class="emoji-item" style="--i:2">🥹</button>
          <button class="emoji-item" style="--i:3">😍</button>
          <button class="emoji-item" style="--i:4">🥰</button>
          <button class="emoji-item" style="--i:5">😎</button>
          <button class="emoji-item" style="--i:6">🤩</button>
          <button class="emoji-item" style="--i:7">😜</button>
          <button class="emoji-item" style="--i:8">🤗</button>
          <button class="emoji-item" style="--i:9">🫡</button>
          <button class="emoji-item" style="--i:10">🔥</button>
          <button class="emoji-item" style="--i:11">✨</button>
          <button class="emoji-item" style="--i:12">💯</button>
          <button class="emoji-item" style="--i:13">🎉</button>
          <button class="emoji-item" style="--i:14">❤️</button>
          <button class="emoji-item" style="--i:15">💜</button>
          <button class="emoji-item" style="--i:16">💙</button>
          <button class="emoji-item" style="--i:17">🖤</button>
          <button class="emoji-item" style="--i:18">👍</button>
          <button class="emoji-item" style="--i:19">👏</button>
          <button class="emoji-item" style="--i:20">🙌</button>
          <button class="emoji-item" style="--i:21">🚀</button>
          <button class="emoji-item" style="--i:22">🌟</button>
          <button class="emoji-item" style="--i:23">🎨</button>
        </div>
      </div>
    </div>

    <div class="controls-row">
      <div class="ctrl">
        <label>Emoji Size</label>
        <input type="range" class="emoji-size" min="28" max="56" value="40" />
        <span class="val es-val">40px</span>
      </div>
      <div class="ctrl">
        <label>Grid Gap</label>
        <input type="range" class="grid-gap" min="2" max="16" value="6" />
        <span class="val gg-val">6px</span>
      </div>
      <div class="ctrl">
        <label>Reveal Duration</label>
        <input type="range" class="reveal-duration" min="100" max="800" value="350" step="25" />
        <span class="val rd-val">350ms</span>
      </div>
    </div>
  </div>

  <script>
    const triggerBtn = document.querySelector('.trigger-btn');
    const popupOverlay = document.querySelector('.popup-overlay');
    const popup = document.querySelector('.popup');
    const closeBtn = document.querySelector('.close-btn');
    const emojiItems = document.querySelectorAll('.emoji-item');
    const selectedEmoji = document.querySelector('.selected-emoji');
    const searchInput = document.querySelector('.emoji-search');
    const grid = document.querySelector('.emoji-grid');

    const esSlider = document.querySelector('.emoji-size');
    const ggSlider = document.querySelector('.grid-gap');
    const rdSlider = document.querySelector('.reveal-duration');
    const esVal = document.querySelector('.es-val');
    const ggVal = document.querySelector('.gg-val');
    const rdVal = document.querySelector('.rd-val');

    function openPopup() {
      popupOverlay.classList.add('active');
      popup.classList.add('active');
      setTimeout(() => {
        emojiItems.forEach((item, i) => {
          const dur = parseInt(rdSlider.value);
          item.style.setProperty('--reveal-duration', dur + 'ms');
          item.style.animation = 'none';
          void item.offsetWidth;
          item.style.animation = `emoji-reveal ${dur}ms ease-out forwards`;
          item.style.animationDelay = (i * (dur / 12)) + 'ms';
        });
      }, 30);
    }

    function closePopup() {
      popup.classList.remove('active');
      popupOverlay.classList.remove('active');
      emojiItems.forEach(item => {
        item.style.animation = 'none';
      });
    }

    triggerBtn.addEventListener('click', openPopup);
    closeBtn.addEventListener('click', closePopup);
    popupOverlay.addEventListener('click', (e) => {
      if (e.target === popupOverlay) closePopup();
    });

    emojiItems.forEach(item => {
      item.addEventListener('click', () => {
        selectedEmoji.textContent = item.textContent;
        closePopup();
      });
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      emojiItems.forEach(item => {
        const match = item.textContent.toLowerCase().includes(q);
        item.style.display = match ? '' : 'none';
      });
    });

    esSlider.addEventListener('input', () => {
      const v = esSlider.value + 'px';
      esVal.textContent = v;
      grid.style.setProperty('--emoji-size', v);
    });

    ggSlider.addEventListener('input', () => {
      const v = ggSlider.value + 'px';
      ggVal.textContent = v;
      grid.style.setProperty('--grid-gap', v);
    });

    rdSlider.addEventListener('input', () => {
      rdVal.textContent = rdSlider.value + 'ms';
    });
  </script>
</body>
</html>
