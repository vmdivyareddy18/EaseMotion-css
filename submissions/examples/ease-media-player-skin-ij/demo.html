<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Player Skin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Media Player Skin</h1>

  <div class="container">
    <div class="player" id="player">
      <div class="player-art">
        <div class="art-circle"></div>
      </div>

      <div class="track-info" id="trackInfo">
        <div class="track-name">Midnight Waves</div>
        <div class="track-artist">Luna Eclipse</div>
      </div>

      <div class="progress-area">
        <span class="time current" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time total" id="totalTime">3:42</span>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="Previous">
          <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="19,20 9,12 19,4" fill="currentColor"/><rect x="5" y="4" width="2" height="16" fill="currentColor"/></svg>
        </button>

        <button class="ctrl-btn play-btn" id="playBtn" title="Play / Pause">
          <div class="play-icon" id="playIcon">
            <svg viewBox="0 0 24 24" width="28" height="28" id="iconSvg">
              <polygon points="8,5 19,12 8,19" fill="currentColor" id="iconShape"/>
            </svg>
          </div>
        </button>

        <button class="ctrl-btn" id="nextBtn" title="Next">
          <svg viewBox="0 0 24 24" width="20" height="20"><polygon points="5,4 15,12 5,20" fill="currentColor"/><rect x="17" y="4" width="2" height="16" fill="currentColor"/></svg>
        </button>
      </div>

      <div class="volume-area">
        <svg viewBox="0 0 24 24" width="18" height="18" class="vol-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"/></svg>
        <div class="volume-slider" id="volumeSlider">
          <div class="volume-fill" id="volumeFill" style="width:70%"></div>
          <div class="volume-thumb" id="volumeThumb" style="left:70%"></div>
        </div>
        <span class="vol-value" id="volValue">70%</span>
      </div>
    </div>
  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const playIcon = document.getElementById('playIcon');
    const iconShape = document.getElementById('iconShape');
    const progressFill = document.getElementById('progressFill');
    const progressThumb = document.getElementById('progressThumb');
    const currentTime = document.getElementById('currentTime');
    const trackInfo = document.getElementById('trackInfo');
    const volumeFill = document.getElementById('volumeFill');
    const volumeThumb = document.getElementById('volumeThumb');
    const volValue = document.getElementById('volValue');

    let isPlaying = false;
    let progress = 0;
    let progressInterval = null;

    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playBtn.classList.toggle('playing', isPlaying);

      if (isPlaying) {
        iconShape.setAttribute('points', '6,4 10,4 10,20 6,20 6,4 M14,4 18,4 18,20 14,20 14,4');
        trackInfo.classList.add('active');
        progressInterval = setInterval(() => {
          progress = Math.min(progress + 0.5, 100);
          updateProgress();
          if (progress >= 100) {
            clearInterval(progressInterval);
            isPlaying = false;
            playBtn.classList.remove('playing');
            iconShape.setAttribute('points', '8,5 19,12 8,19');
          }
        }, 100);
      } else {
        iconShape.setAttribute('points', '8,5 19,12 8,19');
        clearInterval(progressInterval);
      }
    });

    function updateProgress() {
      progressFill.style.width = progress + '%';
      progressThumb.style.left = progress + '%';
      const totalSec = Math.floor((progress / 100) * 222);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      currentTime.textContent = m + ':' + String(s).padStart(2, '0');
    }

    volumeFill.addEventListener('click', (e) => {
      const rect = volumeFill.parentElement.getBoundingClientRect();
      const pct = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
      volumeFill.style.width = pct + '%';
      volumeThumb.style.left = pct + '%';
      volValue.textContent = Math.round(pct) + '%';
    });
  </script>
</body>
</html>
