<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="tech-canvas">
    <div class="tech-terminal-card">
      
      <div class="terminal-meta-header">
        <span class="system-status-tag">SYS_ACTIVE</span>
        <h3>Task Manager Component</h3>
      </div>

      <!-- Pure CSS Popover System using checkbox hack for state preservation -->
      <div class="spring-popover-system">
        <input type="checkbox" id="tech-popover-toggle" class="hidden-popover-checkbox">
        
        <label for="tech-popover-toggle" class="popover-trigger-action" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          Inspect Logs
        </label>

        <!-- Minimalist Tech Spring Popover Overlay Dialogue Box -->
        <div class="spring-popover-card" role="dialog" aria-label="Terminal Metrics">
          <div class="popover-arrow-node"></div>
          
          <div class="popover-body-content">
            <h4>Runtime Manifest</h4>
            <p>Monitors synchronized local contribution updates, repo verification states, and background canvas rendering cycles natively.</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers to focusable nodes
    const triggerLabel = document.querySelector('.popover-trigger-action');
    const checkboxNode = document.getElementById('tech-popover-toggle');

    triggerLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        checkboxNode.click();
      }
    });

    checkboxNode.addEventListener('change', () => {
      triggerLabel.setAttribute('aria-expanded', checkboxNode.checked ? 'true' : 'false');
    });
  </script>
</body>
</html>
