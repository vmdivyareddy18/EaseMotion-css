<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic HUD Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="hud">

    <h1>Futuristic HUD Interface</h1>
    <p>Advanced system controls</p>

    <div class="hud-items">

        <div class="hud-card">

            <button class="hud-btn" aria-describedby="hud-tooltip-1">
                SYSTEM
            </button>

            <div class="tooltip" id="hud-tooltip-1" role="tooltip">
                System status: Online
            </div>

        </div>


        <div class="hud-card">

            <button class="hud-btn" aria-describedby="hud-tooltip-2">
                RADAR
            </button>

            <div class="tooltip" id="hud-tooltip-2" role="tooltip">
                Radar scanning active
            </div>

        </div>


        <div class="hud-card">

            <button class="hud-btn" aria-describedby="hud-tooltip-3">
                CORE
            </button>

            <div class="tooltip" id="hud-tooltip-3" role="tooltip">
                Core temperature stable
            </div>

        </div>

    </div>

</section>

</body>
</html>
