<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Loader Arc – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rla-container">
    <h1>Retro Loader Arc</h1>

    <div class="rla-demo">
      <div class="rla-loader rla-loader--classic" id="loader1"></div>
      <div class="rla-loader rla-loader--radar" id="loader2"></div>
      <div class="rla-loader rla-loader--cycle" id="loader3"></div>
    </div>

    <div class="rla-controls">
      <label class="rla-label">
        Speed
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.1" value="1">
        <span id="speedVal">1×</span>
      </label>
    </div>

    <div class="rla-variations">
      <div class="rla-card">
        <span class="rla-card-dot" style="background:conic-gradient(#667eea 0deg 180deg, transparent 180deg 360deg)"></span>
        <span>Classic Arc</span>
      </div>
      <div class="rla-card">
        <span class="rla-card-dot" style="background:conic-gradient(#2ecc71 0deg 270deg, transparent 270deg 360deg)"></span>
        <span>Scanner</span>
      </div>
      <div class="rla-card">
        <span class="rla-card-dot" style="background:conic-gradient(#e74c3c, #f39c12, #2ecc71, #3498db, #e74c3c)"></span>
        <span>Rainbow</span>
      </div>
    </div>
  </div>

  <script>
    const loaders = document.querySelectorAll('.rla-loader');
    const slider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');

    function updateSpeed(val) {
      const s = 2 / val;
      speedVal.textContent = val + '×';
      loaders.forEach(el => {
        el.style.setProperty('--rla-speed-factor', s + 's');
      });
    }

    slider.addEventListener('input', () => updateSpeed(slider.value));

    const loader3 = document.getElementById('loader3');
    let hue = 0;
    setInterval(() => {
      hue = (hue + 1) % 360;
      loader3.style.setProperty('--rla-arc-color', `hsl(${hue}, 80%, 60%)`);
    }, 50);
  </script>
</body>
</html>
