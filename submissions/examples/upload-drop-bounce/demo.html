<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Drop Bounce</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion upload</p>
    <h1 id="demo-title">Upload drop bounce</h1>
    <p class="intro">A drag-and-drop upload surface with a focused border pulse and icon bounce.</p>

    <label class="drop-zone">
      <input type="file" />
      <span class="upload-icon" aria-hidden="true">+</span>
      <strong>Drop files here</strong>
      <span>or browse from your computer</span>
    </label>
  </main>
</body>
</html>
