<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optional Required Styling — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>:optional / :required</h1>
        <p class="intro">Forms often mix required and optional fields. These pseudo-classes let you style them differently — required fields get a distinctive mark and border, while optional fields appear more subtle.</p>

        <form class="demo-form" novalidate>
            <section class="form-section">
                <h2>Account Information</h2>
                <div class="form-row">
                    <label for="fname">First Name <span class="required-badge">Required</span></label>
                    <input type="text" id="fname" class="req-input" required placeholder="John">
                </div>
                <div class="form-row">
                    <label for="lname">Last Name <span class="required-badge">Required</span></label>
                    <input type="text" id="lname" class="req-input" required placeholder="Doe">
                </div>
                <div class="form-row">
                    <label for="nickname">Nickname <span class="optional-badge">Optional</span></label>
                    <input type="text" id="nickname" class="opt-input" placeholder="e.g. Johnny">
                </div>
            </section>

            <section class="form-section">
                <h2>Contact Details</h2>
                <div class="form-row">
                    <label for="mail">Email <span class="required-badge">Required</span></label>
                    <input type="email" id="mail" class="req-input" required placeholder="john@example.com">
                </div>
                <div class="form-row">
                    <label for="phone">Phone <span class="optional-badge">Optional</span></label>
                    <input type="tel" id="phone" class="opt-input" placeholder="+1 555-0123">
                </div>
            </section>

            <section class="form-section">
                <h2>Preferences</h2>
                <div class="form-row">
                    <label for="newsletter">Newsletter <span class="optional-badge">Optional</span></label>
                    <select id="newsletter" class="opt-input">
                        <option value="weekly">Weekly Digest</option>
                        <option value="monthly">Monthly Recap</option>
                        <option value="none">No Newsletter</option>
                    </select>
                </div>
                <div class="form-row checkbox-row">
                    <input type="checkbox" id="terms" required class="req-input">
                    <label for="terms">I agree to the terms and conditions <span class="required-badge">Required</span></label>
                </div>
            </section>

            <button type="submit" class="submit-btn">Submit</button>
        </form>
    </main>
</body>
</html>
