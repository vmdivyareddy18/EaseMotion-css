<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Animated Hero Section with Floating Elements</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="ease-hero">
    <!-- Floating decorative elements -->
    <div class="ease-hero__floats">
      <div class="ease-hero__float ease-hero__float--1">⚡ Fast</div>
      <div class="ease-hero__float ease-hero__float--2">🎨 Beautiful</div>
      <div class="ease-hero__float ease-hero__float--3">📱 Responsive</div>
      <div class="ease-hero__float ease-hero__float--4">♿ Accessible</div>
    </div>
    <!-- Hero content -->
    <div class="ease-hero__content">
      <div class="ease-hero__badge">⚡ EaseMotion CSS v2.0</div>
      <h1 class="ease-hero__title">
        Animate Anything<br/>
        <span class="ease-hero__title--gradient">Effortlessly</span>
      </h1>
      <p class="ease-hero__subtitle">
        The most powerful open source CSS animation
        library for modern web development.
      </p>
      <div class="ease-hero__cta">
        <button class="ease-hero__btn ease-hero__btn--primary">
          Get Started Free ↗
        </button>
        <button class="ease-hero__btn ease-hero__btn--outline">
          View Examples
        </button>
      </div>
    </div>
  </section>

</body>
</html>
