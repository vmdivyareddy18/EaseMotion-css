<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Tooltip Component</h1>
    <p class="subtitle">Pure CSS tooltips using data-tooltip attributes</p>

    <!-- Top Tooltip -->
    <div class="variant">
      <h3>Top (Default)</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="This appears above">Hover Me</button>
        <a href="#" class="link" data-tooltip="Link tooltip">Link</a>
        <span class="badge" data-tooltip="Badge info">New</span>
      </div>
    </div>

    <!-- Bottom Tooltip -->
    <div class="variant">
      <h3>Bottom</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="This appears below" data-tooltip-pos="bottom">Hover Me</button>
        <button class="btn btn--secondary" data-tooltip="Delete item" data-tooltip-pos="bottom">Delete</button>
      </div>
    </div>

    <!-- Left Tooltip -->
    <div class="variant">
      <h3>Left</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="This appears on the left" data-tooltip-pos="left">Hover Me</button>
        <span class="icon" data-tooltip="Settings" data-tooltip-pos="left">⚙️</span>
      </div>
    </div>

    <!-- Right Tooltip -->
    <div class="variant">
      <h3>Right</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="This appears on the right" data-tooltip-pos="right">Hover Me</button>
        <span class="icon" data-tooltip="Notifications" data-tooltip-pos="right">🔔</span>
      </div>
    </div>

    <!-- With HTML Content -->
    <div class="variant">
      <h3>Rich Content</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="📊 Stats: 1.2k views" data-tooltip-pos="top">Analytics</button>
        <button class="btn btn--success" data-tooltip="✅ Task completed successfully!" data-tooltip-pos="bottom">Success</button>
      </div>
    </div>

    <!-- Delayed Tooltip -->
    <div class="variant">
      <h3>Delayed Show</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="Appears after 500ms" data-tooltip-delay>Show Delayed</button>
      </div>
    </div>

    <!-- Dark Tooltip -->
    <div class="variant">
      <h3>Dark Theme</h3>
      <div class="tooltip-row">
        <button class="btn btn--dark" data-tooltip="Dark mode tooltip" data-tooltip-theme="dark">Dark</button>
        <button class="btn" data-tooltip="Also dark" data-tooltip-theme="dark" data-tooltip-pos="bottom">Another</button>
      </div>
    </div>

    <!-- Error Tooltip -->
    <div class="variant">
      <h3>Error State</h3>
      <div class="tooltip-row">
        <button class="btn btn--danger" data-tooltip="This field is required" data-tooltip-theme="error" data-tooltip-pos="top">Error</button>
        <input type="text" class="input input--error" placeholder="Invalid input" data-tooltip="Please enter a valid email" data-tooltip-theme="error" data-tooltip-pos="right">
      </div>
    </div>

    <!-- Long Content -->
    <div class="variant">
      <h3>Multi-line</h3>
      <div class="tooltip-row">
        <button class="btn" data-tooltip="This is a longer tooltip that wraps to multiple lines for better readability of detailed information." data-tooltip-pos="top">Long Text</button>
      </div>
    </div>
  </div>
</body>
</html>
