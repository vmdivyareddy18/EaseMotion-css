<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulsing Heart Animation</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Pulsing Heart</h1>
        <p class="subtitle">Hover or click to activate the heartbeat</p>

        <div class="heart-wrapper">
            <!-- Heart Icon -->
            <div class="heart-container" id="heartContainer">
                <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
                </svg>
            </div>

            <!-- Controls -->
            <div class="controls">
                <button id="beatBtn">💓 Start Beating</button>
                <button id="stopBtn">⏹️ Stop</button>
                <button id="toggleBtn">🔄 Toggle Fill</button>
            </div>

            <!-- Status Display -->
            <div class="status">
                <span id="statusText">Ready</span>
                <span id="beatCount">Beats: 0</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const heartContainer = document.getElementById('heartContainer');
        const heartIcon = document.querySelector('.heart-icon');
        const beatBtn = document.getElementById('beatBtn');
        const stopBtn = document.getElementById('stopBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const statusText = document.getElementById('statusText');
        const beatCount = document.getElementById('beatCount');

        // ===== STATE =====
        let isBeating = false;
        let isFilled = false;
        let beatInterval = null;
        let count = 0;

        // ===== FUNCTIONS =====

        // Trigger a single beat
        function triggerBeat() {
            heartContainer.classList.remove('beat');
            // Force reflow to restart animation
            void heartContainer.offsetWidth;
            heartContainer.classList.add('beat');
            
            count++;
            beatCount.textContent = `Beats: ${count}`;
            statusText.textContent = '❤️ Beating!';
            statusText.style.color = '#f43f5e';
        }

        // Start continuous beating
        function startBeating() {
            if (isBeating) return;
            
            isBeating = true;
            beatBtn.textContent = '💓 Beating...';
            beatBtn.style.background = 'rgba(244, 63, 94, 0.3)';
            statusText.textContent = '❤️ Beating continuously';
            statusText.style.color = '#f43f5e';
            
            // Trigger first beat immediately
            triggerBeat();
            
            // Then continue at interval
            beatInterval = setInterval(triggerBeat, 800);
        }

        // Stop beating
        function stopBeating() {
            if (!isBeating) return;
            
            isBeating = false;
            clearInterval(beatInterval);
            beatInterval = null;
            heartContainer.classList.remove('beat');
            
            beatBtn.textContent = '💓 Start Beating';
            beatBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            statusText.textContent = '⏸️ Paused';
            statusText.style.color = 'rgba(255, 255, 255, 0.6)';
        }

        // Toggle fill
        function toggleFill() {
            isFilled = !isFilled;
            
            if (isFilled) {
                heartIcon.style.fill = '#f43f5e';
                heartIcon.style.stroke = '#f43f5e';
                heartIcon.style.transition = 'all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
                toggleBtn.textContent = '⬜ Outline';
                toggleBtn.style.background = 'rgba(244, 63, 94, 0.2)';
            } else {
                heartIcon.style.fill = 'none';
                heartIcon.style.stroke = 'currentColor';
                toggleBtn.textContent = '🔄 Toggle Fill';
                toggleBtn.style.background = 'rgba(255, 255, 255, 0.1)';
            }
        }

        // ===== EVENT LISTENERS =====

        // Click to trigger single beat
        heartContainer.addEventListener('click', (e) => {
            e.stopPropagation();
            
            // If currently beating continuously, don't interfere
            if (!isBeating) {
                triggerBeat();
                statusText.textContent = '❤️ Single beat!';
                statusText.style.color = '#f43f5e';
            }
        });

        // Hover effect - subtle scale
        heartContainer.addEventListener('mouseenter', () => {
            if (!isBeating) {
                heartContainer.style.transform = 'scale(1.05)';
            }
        });

        heartContainer.addEventListener('mouseleave', () => {
            if (!isBeating) {
                heartContainer.style.transform = 'scale(1)';
            }
        });

        // Control buttons
        beatBtn.addEventListener('click', startBeating);
        stopBtn.addEventListener('click', stopBeating);
        toggleBtn.addEventListener('click', toggleFill);

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                if (isBeating) {
                    stopBeating();
                } else {
                    startBeating();
                }
            }
            if (e.key === 'f' || e.key === 'F') {
                toggleFill();
            }
        });

        // ===== INIT =====
        statusText.textContent = 'Ready';
        statusText.style.color = 'rgba(255, 255, 255, 0.6)';
        beatCount.textContent = 'Beats: 0';

        console.log('❤️ Pulsing Heart Animation loaded!');
        console.log('💡 Click heart for single beat');
        console.log('💡 Press SPACE to start/stop beating');
        console.log('💡 Press F to toggle fill');
    </script>
</body>
</html>
