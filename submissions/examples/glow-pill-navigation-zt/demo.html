<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Pill Navigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="nav-panel">
    <header class="nav-header">
      <p class="eyebrow">Navigation</p>
      <h1>Glow pill menu</h1>
      <p class="nav-copy">A modern SaaS-style pill navigation bar with glow states, smooth hover motion, and responsive layout.</p>
    </header>

    <nav class="pill-nav" aria-label="Primary navigation">
      <a href="#" class="pill active">Overview</a>
      <a href="#" class="pill">Analytics</a>
      <a href="#" class="pill">Messages</a>
      <a href="#" class="pill">Projects</a>
      <a href="#" class="pill">Settings</a>
    </nav>

    <div class="pill-variants">
      <span class="pill badge-pill pill-blue">Blue</span>
      <span class="pill badge-pill pill-purple">Purple</span>
      <span class="pill badge-pill pill-green">Green</span>
      <span class="pill badge-pill pill-coral">Coral</span>
    </div>
  </main>
</body>
</html>
