<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tabs Navigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tabs-container">

    <div class="tabs">

      <div class="tab-btn active">
        Overview
      </div>

      <div class="tab-btn">
        Analytics
      </div>

      <div class="tab-btn">
        Settings
      </div>

    </div>

    <div class="tab-content">

      <h2 class="tab-title">
        Dashboard Overview
      </h2>

      <p class="tab-text">
        This animated tabs navigation component demonstrates
        reusable tab layouts with smooth hover interactions,
        responsive design, and modern active-state styling.
      </p>

    </div>

  </div>

</body>
</html>
