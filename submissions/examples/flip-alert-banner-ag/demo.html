<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip Alert Banner — EaseMotion CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background-color: var(--ease-color-bg, #f8fafc);
        color: var(--ease-color-text, #1e293b);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--ease-space-8, 2rem) var(--ease-space-4, 1rem);
        margin: 0;
      }

      h1 {
        font-size: var(--ease-text-2xl, 1.5rem);
        font-weight: 700;
        margin-bottom: var(--ease-space-2, 0.5rem);
        text-align: center;
      }

      p.subtitle {
        font-size: var(--ease-text-sm, 0.875rem);
        color: var(--ease-color-muted, #64748b);
        margin-bottom: var(--ease-space-6, 1.5rem);
        text-align: center;
      }

      .variant-section-ag {
        display: flex;
        flex-direction: column;
        gap: var(--ease-space-2, 0.5rem);
        margin-bottom: var(--ease-space-4, 1rem);
      }

      .variant-title-ag {
        font-family: var(--ease-font-mono, monospace);
        font-size: 0.75rem;
        color: var(--ease-color-muted, #64748b);
        text-transform: uppercase;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <main class="demo-wrapper-ag">
      <div>
        <h1>Flip Alert Banner</h1>
        <p class="subtitle">
          E-commerce promotion banner featuring a premium 3D hover-triggered
          flip transition
        </p>
      </div>

      <!-- Flip Alert Banner (Hover/Focus Flip) -->
      <section class="variant-section-ag">
        <div
          class="flip-alert-banner-ag flip-x-ag"
          tabindex="0"
          aria-label="Flash Sale Alert"
        >
          <div class="flip-banner-inner-ag">
            <div class="flip-banner-front-ag flip-theme-warning-ag">
              <div class="flip-banner-content-ag">
                <span class="flip-banner-badge-ag">Flash Sale</span>
                <span>Get 20% off all summer collections!</span>
              </div>
              <span class="flip-banner-action-ag">Hover to Reveal Code</span>
            </div>
            <div class="flip-banner-back-ag flip-theme-success-ag">
              <div class="flip-banner-content-ag">
                <span class="flip-banner-badge-ag">Promo Code</span>
                <span>Use discount code at checkout:</span>
              </div>
              <span class="flip-ticket-code-ag">SUMMER20</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
