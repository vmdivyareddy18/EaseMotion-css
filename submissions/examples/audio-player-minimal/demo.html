<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Audio Player Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo presentation layout only */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-audio-player" role="region" aria-label="Audio Player">
    
    <button class="ease-audio-control" aria-label="Play audio" aria-pressed="false">
      <svg class="ease-icon-play" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
      <svg class="ease-icon-pause" viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
    </button>

    <div class="ease-audio-meta">
      <div class="ease-audio-info">
        <span class="ease-track-title">Midnight Horizon</span>
        <span class="ease-track-time">2:45</span>
      </div>
      
      <div class="ease-progress-container" tabindex="0" role="slider" aria-label="Audio progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="42">
        <div class="ease-progress-bar">
          <div class="ease-progress-handle"></div>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
