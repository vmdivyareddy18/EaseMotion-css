<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Animated Tabs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Tabs</h1>

<h2>Underline Style</h2>

<div class="tabs underline">
    <button class="tab active">Overview</button>
    <button class="tab">Features</button>
    <button class="tab">Pricing</button>
    <button class="tab">Contact</button>
</div>

<div class="content">
    <h3>Overview</h3>
    <p>
        Animated underline with smooth hover transitions.
    </p>
</div>

<h2>Pill Style</h2>

<div class="tabs pills">
    <button class="tab active">HTML</button>
    <button class="tab">CSS</button>
    <button class="tab">React</button>
    <button class="tab">Vue</button>
</div>

<div class="content">
    <h3>HTML</h3>
    <p>
        Rounded animated tabs using only CSS.
    </p>
</div>

</div>

</body>
</html>
