<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Rubber Band Tag</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../dist/easemotion.css">

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="travel-dashboard">

    <h1>Travel Explorer</h1>
    <p class="subtitle">
        Discover trending destinations with animated travel tags.
    </p>

    <div class="tag-container ease-fade-in-up">

        <div class="travel-tag beach">
            <span class="icon">🏝</span>
            <span class="label">Bali</span>
        </div>

        <div class="travel-tag mountain">
            <span class="icon">🏔</span>
            <span class="label">Switzerland</span>
        </div>

        <div class="travel-tag japan">
            <span class="icon">🗻</span>
            <span class="label">Japan</span>
        </div>

        <div class="travel-tag premium">
            <span class="icon">⭐</span>
            <span class="label">Premium</span>
        </div>

        <div class="travel-tag trending">
            <span class="icon">🔥</span>
            <span class="label">Trending</span>
        </div>

        <div class="travel-tag favorite">
            <span class="icon">❤️</span>
            <span class="label">Favorite</span>
        </div>

        <div class="travel-tag europe">
            <span class="icon">🌍</span>
            <span class="label">Europe</span>
        </div>

        <div class="travel-tag adventure">
            <span class="icon">🎒</span>
            <span class="label">Adventure</span>
        </div>

    </div>

</div>

</body>
</html>
