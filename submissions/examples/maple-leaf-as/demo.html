<!DOCTYPE html>
<html lang="en">
<head>

  <div class="scene">

        <span class="lobe lb3"></span>
        <span class="lobe lb4"></span>
        <span class="lobe lb5"></span>

    </div>
    <div class="hero">
      <div class="maple big">
        <span class="lobe lb1"></span>
        <span class="lobe lb2"></span>
        <span class="lobe lb3"></span>
        <span class="lobe lb4"></span>
        <span class="lobe lb5"></span>
        <span class="vein v1"></span>
        <span class="vein v2"></span>
        <span class="vein v3"></span>
      </div>
      <span class="stemm"></span>
    </div>
    <span class="floorm"></span>
  </div>

</html>
