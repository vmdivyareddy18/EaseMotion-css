<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-magnetic-border Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            background: #0f0f0f;
            font-family: system-ui, sans-serif;
            padding: 2rem;
        }

        h1 {
            color: #f1f1f1;
            font-size: 1.5rem;
            margin: 0;
        }

        .row {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e1e2e;
            color: #cdd6f4;
            border-radius: 1rem;
            padding: 2rem 2.5rem;
            min-width: 160px;
            text-align: center;
        }

        .card span {
            font-size: 2rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .card p {
            margin: 0;
            font-size: 0.85rem;
            color: #a6adc8;
        }

        .btn {
            background: #313244;
            color: #cdd6f4;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>ease-magnetic-border Demo</h1>
    <div class="row">
        <div class="card ease-magnetic-border">
            <span>✦</span>
            <p>Default (purple)</p>
        </div>
        <div class="card ease-magnetic-border" style="--ease-magnetic-color: #f97316; --ease-magnetic-speed: 1.2s;">
            <span>🔥</span>
            <p>Orange, fast</p>
        </div>
        <div class="card ease-magnetic-border" style="--ease-magnetic-color: #22c55e; --ease-magnetic-speed: 3s;">
            <span>🌿</span>
            <p>Green, slow</p>
        </div>
    </div>
    <button class="btn ease-magnetic-border" style="--ease-magnetic-color: #a78bfa;">
        Magnetic Button
    </button>
</body>

</html>
