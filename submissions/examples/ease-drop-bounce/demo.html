<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Drop Bounce - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-drop-bounce">🏀 Bouncy</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-drop-bounce'); void b.offsetWidth; b.classList.add('ease-drop-bounce');">Drop Again</button>
    </div>
</body>
</html>
