<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-button-success-state – Button success morph</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Button Success State
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button. It shows a spinner, then a checkmark, then reverts.
    </p>

    <button id="action-btn" class="success-btn ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">
      <span class="btn-text">Save Changes</span>
      <span class="btn-check">✓</span>
      <span class="btn-spinner"></span>
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      idle → loading → success → idle
    </p>
  </div>

  <script>
    const btn = document.getElementById('action-btn');

    btn.addEventListener('click', () => {
      if (btn.classList.contains('is-loading') || btn.classList.contains('is-success')) return;

      // 1. LOADING state
      btn.classList.add('is-loading');

      // 2. Simulate async work, then SUCCESS
      setTimeout(() => {
        btn.classList.remove('is-loading');
        btn.classList.add('is-success');

        // 3. After a short display, revert to idle
        setTimeout(() => {
          btn.classList.remove('is-success');
        }, 2000);
      }, 1500);
    });
  </script>

</body>
</html>
