<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jello-Hover Accordion Demo — Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #f1f5f9; }
    h2 { color: #0f172a; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Jello-Hover Accordion — Dashboard Analytics</h2>

  <div class="ease-accordion">
    <div class="ease-accordion__item" data-open="true">
      <button class="ease-accordion__header" aria-expanded="true">
        <span>Traffic Overview</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Summary of this month's site traffic and engagement.
          <div class="ease-accordion__metric-row">
            <div class="ease-accordion__metric">
              <div class="ease-accordion__metric-value">24.3k</div>
              <div class="ease-accordion__metric-label">Visitors</div>
            </div>
            <div class="ease-accordion__metric">
              <div class="ease-accordion__metric-value">3.2%</div>
              <div class="ease-accordion__metric-label">Conversion</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Revenue Breakdown</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Monthly recurring revenue grew 8% over the previous period.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Top Referral Sources</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Organic search, direct traffic, and social referrals lead this period.
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ease-accordion__header').forEach((btn) => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.ease-accordion__item');
        const isOpen = item.getAttribute('data-open') === 'true';
        item.setAttribute('data-open', String(!isOpen));
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    });
  </script>
</body>
</html>
