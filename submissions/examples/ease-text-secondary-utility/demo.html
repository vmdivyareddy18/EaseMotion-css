<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-text-secondary &amp; ease-bg-secondary Demo</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: Inter, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        min-height: 100vh;
        background: #f8fafc;
      }
      h2 {
        color: #7c3aed;
      }
      .grid {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        justify-content: center;
      }
      .box {
        padding: 1rem 1.5rem;
        background: #fff;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 500;
        color: #334155;
        width: 200px;
      }
      .box-bg {
        padding: 1rem 1.5rem;
        border-radius: 8px;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 500;
        color: #fff;
        width: 200px;
      }
    </style>
  </head>
  <body>
    <h2>ease-text-secondary Utility</h2>
    <div class="grid">
      <div class="box ease-text-secondary">Secondary text</div>
      <div class="box ease-text-primary">Primary text (reference)</div>
    </div>

    <h2>ease-bg-secondary Utility</h2>
    <div class="grid">
      <div class="box-bg ease-bg-secondary">Secondary background</div>
      <div class="box-bg ease-bg-primary">Primary bg (reference)</div>
    </div>
  </body>
</html>
