<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cascading Radio Button - Neumorphism</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #e0e5ec; /* Neumorphic base color */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #4a5568;
    }
    
    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .demo-header h1 {
      font-size: 2rem;
      margin: 0 0 10px 0;
      color: #2d3748;
      letter-spacing: 1px;
      /* Subtle neumorphic text effect */
      text-shadow: 2px 2px 4px rgba(163,177,198,0.6), -2px -2px 4px rgba(255,255,255,0.8);
    }
    
    .demo-header p {
      color: #718096;
      font-size: 1.1rem;
    }

    .form-container {
      padding: 40px;
      border-radius: 20px;
      /* Neumorphic outer shadow */
      box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
    }
  </style>
</head>
<body>

  <div class="demo-header">
    <h1>Select Plan</h1>
    <p>Pure CSS cascading neumorphic radio buttons.</p>
  </div>

  <div class="form-container">
    <div class="ease-radio-group">
      
      <label class="ease-radio-label">
        <input type="radio" name="plan" class="ease-radio-input" checked>
        <span class="ease-radio-custom">
          <!-- Cascading rings -->
          <span class="ease-radio-ring ease-cascade-1"></span>
          <span class="ease-radio-ring ease-cascade-2"></span>
          <span class="ease-radio-dot ease-cascade-3"></span>
        </span>
        <span class="ease-radio-text">Basic Tier</span>
      </label>

      <label class="ease-radio-label">
        <input type="radio" name="plan" class="ease-radio-input">
        <span class="ease-radio-custom">
          <span class="ease-radio-ring ease-cascade-1"></span>
          <span class="ease-radio-ring ease-cascade-2"></span>
          <span class="ease-radio-dot ease-cascade-3"></span>
        </span>
        <span class="ease-radio-text">Pro Tier</span>
      </label>

      <label class="ease-radio-label">
        <input type="radio" name="plan" class="ease-radio-input">
        <span class="ease-radio-custom">
          <span class="ease-radio-ring ease-cascade-1"></span>
          <span class="ease-radio-ring ease-cascade-2"></span>
          <span class="ease-radio-dot ease-cascade-3"></span>
        </span>
        <span class="ease-radio-text">Enterprise Tier</span>
      </label>

    </div>
  </div>

</body>
</html>
