<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workout Exercise Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Workout Timer</h1>
    <div class="workout-card">
      <div class="exercise-header">
        <span class="exercise-name" id="exerciseName">Jumping Jacks</span>
        <span class="exercise-round" id="roundDisplay">Round 1 / 3</span>
      </div>

      <div class="timer-display" id="timerDisplay">
        <div class="timer-count" id="countDisplay">00</div>
        <div class="timer-label" id="phaseLabel">Ready</div>
      </div>

      <div class="progress-bar-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div class="exercise-list" id="exerciseList">
        <div class="ex-item active" data-idx="0">Jumping Jacks <span class="ex-dur">30s</span></div>
        <div class="ex-item" data-idx="1">Push Ups <span class="ex-dur">20s</span></div>
        <div class="ex-item" data-idx="2">Squats <span class="ex-dur">30s</span></div>
        <div class="ex-item" data-idx="3">Plank <span class="ex-dur">20s</span></div>
        <div class="ex-item" data-idx="4">High Knees <span class="ex-dur">25s</span></div>
      </div>

      <div class="workout-controls">
        <button class="workout-btn primary" id="startWorkout">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="workoutIcon"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="workout-btn" id="skipBtn">Skip</button>
        <button class="workout-btn" id="resetWorkout">Reset</button>
      </div>
    </div>
  </div>
  <script>
    const exercises = [
      { name: 'Jumping Jacks', duration: 30 },
      { name: 'Push Ups', duration: 20 },
      { name: 'Squats', duration: 30 },
      { name: 'Plank', duration: 20 },
      { name: 'High Knees', duration: 25 },
    ];

    const totalRounds = 3;
    let currentEx = 0;
    let currentRound = 1;
    let timeLeft = 30;
    let running = false;
    let interval = null;
    let restPhase = false;
    const restDuration = 10;

    const exerciseName = document.getElementById('exerciseName');
    const roundDisplay = document.getElementById('roundDisplay');
    const countDisplay = document.getElementById('countDisplay');
    const phaseLabel = document.getElementById('phaseLabel');
    const progressFill = document.getElementById('progressFill');
    const exerciseList = document.getElementById('exerciseList');
    const startWorkout = document.getElementById('startWorkout');
    const workoutIcon = document.getElementById('workoutIcon');
    const skipBtn = document.getElementById('skipBtn');
    const resetWorkout = document.getElementById('resetWorkout');

    function updateUI() {
      const ex = exercises[currentEx];
      exerciseName.textContent = restPhase ? 'Rest' : ex.name;
      roundDisplay.textContent = `Round ${currentRound} / ${totalRounds}`;
      countDisplay.textContent = timeLeft.toString().padStart(2, '0');
      phaseLabel.textContent = restPhase ? 'Rest' : timeLeft > 0 ? (running ? 'Go!' : 'Ready') : 'Done!';

      const total = restPhase ? restDuration : ex.duration;
      const pct = ((total - timeLeft) / total) * 100;
      progressFill.style.width = pct + '%';

      document.querySelectorAll('.ex-item').forEach((el, i) => {
        el.classList.toggle('active', i === currentEx && !restPhase);
        el.classList.toggle('complete', i < currentEx);
      });
    }

    function tick() {
      timeLeft--;
      updateUI();
      if (timeLeft <= 0) {
        if (restPhase) {
          restPhase = false;
          timeLeft = exercises[currentEx].duration;
          updateUI();
        } else {
          currentEx++;
          if (currentEx >= exercises.length) {
            currentEx = 0;
            currentRound++;
            if (currentRound > totalRounds) {
              clearInterval(interval);
              running = false;
              phaseLabel.textContent = 'Workout Complete!';
              workoutIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
              countDisplay.textContent = '00';
              return;
            }
          }
          timeLeft = exercises[currentEx].duration;
          updateUI();
        }
      }
    }

    function toggleWorkout() {
      if (running) {
        clearInterval(interval);
        running = false;
        workoutIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        phaseLabel.textContent = 'Paused';
        return;
      }
      running = true;
      workoutIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
      interval = setInterval(tick, 1000);
    }

    function skipExercise() {
      if (restPhase) {
        restPhase = false;
        timeLeft = exercises[currentEx].duration;
      } else {
        currentEx++;
        if (currentEx >= exercises.length) {
          currentEx = 0;
          currentRound++;
          if (currentRound > totalRounds) {
            clearInterval(interval);
            running = false;
            phaseLabel.textContent = 'Workout Complete!';
            workoutIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            countDisplay.textContent = '00';
            return;
          }
        }
        timeLeft = exercises[currentEx].duration;
      }
      updateUI();
    }

    function resetAll() {
      clearInterval(interval);
      running = false;
      currentEx = 0;
      currentRound = 1;
      restPhase = false;
      timeLeft = exercises[0].duration;
      workoutIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      updateUI();
    }

    startWorkout.addEventListener('click', toggleWorkout);
    skipBtn.addEventListener('click', skipExercise);
    resetWorkout.addEventListener('click', resetAll);
    updateUI();
  </script>
</body>
</html>
