<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Art Generator Animation — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="pix-page-sou">
    <header class="pix-header-sou">
      <h1>CSS-Only Pixel Art Generator</h1>
      <p class="pix-subtitle-sou">
        Pixel art that <strong>draws itself</strong> — built from a single
        element using only animated <code>box-shadow</code>s. Pure CSS,
        zero JavaScript, zero images.
      </p>
    </header>

    <!-- ============================================================
         Pixel Art #1 — HEART
         A single .pix-canvas-sou element draws itself via box-shadows.
         ============================================================ -->
    <section class="pix-section-sou">
      <h2 class="pix-label-sou">Heart</h2>
      <div class="pix-stage-sou">
        <div class="pix-canvas-sou pix-heart-sou" aria-label="Animated pixel heart"></div>
      </div>
    </section>

    <!-- ============================================================
         Pixel Art #2 — GHOST (Pac-Man style)
         ============================================================ -->
    <section class="pix-section-sou">
      <h2 class="pix-label-sou">Ghost</h2>
      <div class="pix-stage-sou">
        <div class="pix-canvas-sou pix-ghost-sou" aria-label="Animated pixel ghost"></div>
      </div>
    </section>

    <!-- ============================================================
         Pixel Art #3 — MUSHROOM
         ============================================================ -->
    <section class="pix-section-sou">
      <h2 class="pix-label-sou">Mushroom</h2>
      <div class="pix-stage-sou">
        <div class="pix-canvas-sou pix-mushroom-sou" aria-label="Animated pixel mushroom"></div>
      </div>
    </section>

    <footer class="pix-footer-sou">
      <p>
        Each illustration is a <strong>single DIV</strong>. Pixels are drawn
        with <code>box-shadow</code>, animated to appear one row at a time.
      </p>
    </footer>
  </main>
</body>
</html>
