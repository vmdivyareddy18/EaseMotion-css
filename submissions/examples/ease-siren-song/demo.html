<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-siren-song Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0a1e 0%, #1a0a2e 50%, #0f0a1e 100%);
      padding: 2rem;
    }
    h2 { color: #a78bfa; font-size: 1.75rem; }
    p  { color: #64748b; font-size: 0.9rem; }
    .demo-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 16px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }
    .demo-card label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #475569;
    }
    .row {
      display: flex;
      gap: 3rem;
      align-items: center;
      justify-content: center;
    }
    .col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }
    .col span {
      font-size: 0.72rem;
      color: #475569;
    }
    .emoji { font-size: 2.5rem; }
    .siren-text {
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .ripple-circle {
      width: 60px;
      height: 60px;
      background: rgba(167, 139, 250, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
  </style>
</head>
<body>

  <h2>ease-siren-song 🧜‍♀️</h2>

  <!-- Sway -->
  <div class="demo-card">
    <label>Hypnotic Sway ( ease-siren-song )</label>
    <div class="row">
      <div class="col">
        <div class="ease-siren-song">
          <span class="emoji">🧜‍♀️</span>
        </div>
        <span>Default</span>
      </div>
      <div class="col">
        <div class="ease-siren-song ease-siren-slow">
          <span class="emoji">🧜‍♀️</span>
        </div>
        <span>Slow</span>
      </div>
      <div class="col">
        <div class="ease-siren-song ease-siren-fast">
          <span class="emoji">🧜‍♀️</span>
        </div>
        <span>Fast</span>
      </div>
    </div>
  </div>

  <!-- Glow text -->
  <div class="demo-card">
    <label>Enchanting Glow ( ease-siren-glow )</label>
    <div class="ease-siren-glow siren-text">
      Come closer...
    </div>
  </div>

  <!-- Ripple -->
  <div class="demo-card">
    <label>Sound Ripple ( ease-siren-ripple )</label>
    <div class="ease-siren-ripple ripple-circle">
      🎵
    </div>
  </div>

  <!-- Color shift -->
  <div class="demo-card">
    <label>Color Enchant ( ease-siren-color )</label>
    <div class="ease-siren-color" style="font-size:2.5rem">
      🧜‍♀️🌊✨
    </div>
  </div>

  <!-- Combined -->
  <div class="demo-card">
    <label>Full Enchant ( ease-siren-enchant )</label>
    <div class="ease-siren-enchant siren-text">
      ✨ Enchanted ✨
    </div>
  </div>

</body>
</html>
