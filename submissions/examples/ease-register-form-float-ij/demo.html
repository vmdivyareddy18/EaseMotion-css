<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Form Float – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rff-container">
    <h1>Create Account</h1>

    <form id="registerForm" class="rff-form" novalidate>
      <div class="rff-field">
        <input type="text" id="name" class="rff-input" placeholder=" " autocomplete="name">
        <label for="name" class="rff-label">Full Name</label>
        <span class="rff-focus-line"></span>
      </div>

      <div class="rff-field">
        <input type="email" id="email" class="rff-input" placeholder=" " autocomplete="email">
        <label for="email" class="rff-label">Email Address</label>
        <span class="rff-focus-line"></span>
      </div>

      <div class="rff-field">
        <input type="password" id="password" class="rff-input" placeholder=" " autocomplete="new-password">
        <label for="password" class="rff-label">Password</label>
        <span class="rff-focus-line"></span>
        <span class="rff-strength"></span>
      </div>

      <div class="rff-field">
        <input type="password" id="confirm" class="rff-input" placeholder=" " autocomplete="new-password">
        <label for="confirm" class="rff-label">Confirm Password</label>
        <span class="rff-focus-line"></span>
        <span class="rff-match-feedback"></span>
      </div>

      <button type="submit" class="rff-submit" id="submitBtn">
        <span class="rff-submit-text">Register</span>
        <span class="rff-submit-spinner"></span>
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const submitBtn = document.getElementById('submitBtn');
    const password = document.getElementById('password');
    const confirm = document.getElementById('confirm');
    const strengthEl = document.querySelector('.rff-strength');
    const matchEl = document.querySelector('.rff-match-feedback');

    function updateStrength() {
      const val = password.value;
      let score = 0;
      if (val.length > 0) score += 1;
      if (val.length >= 6) score += 1;
      if (/[A-Z]/.test(val)) score += 1;
      if (/[0-9]/.test(val)) score += 1;
      if (/[^A-Za-z0-9]/.test(val)) score += 1;
      const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
      const colors = ['', 'var(--rff-error-color)', '#e67e22', '#f1c40f', '#2ecc71', '#27ae60'];
      strengthEl.textContent = labels[score];
      strengthEl.style.color = colors[score];
      strengthEl.style.opacity = score > 0 ? '1' : '0';
    }

    function updateMatch() {
      if (confirm.value.length === 0) {
        matchEl.textContent = '';
        matchEl.style.opacity = '0';
        return;
      }
      if (password.value === confirm.value) {
        matchEl.textContent = '✓ Passwords match';
        matchEl.style.color = '#2ecc71';
        matchEl.style.opacity = '1';
      } else {
        matchEl.textContent = '✗ Passwords do not match';
        matchEl.style.color = 'var(--rff-error-color)';
        matchEl.style.opacity = '1';
      }
    }

    password.addEventListener('input', () => { updateStrength(); updateMatch(); });
    confirm.addEventListener('input', updateMatch);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      if (password.value !== confirm.value) {
        matchEl.textContent = '✗ Passwords must match';
        matchEl.style.color = 'var(--rff-error-color)';
        matchEl.style.opacity = '1';
        return;
      }
      submitBtn.classList.add('rff-submit--processing');
      const text = submitBtn.querySelector('.rff-submit-text');
      text.textContent = 'Creating…';
      setTimeout(() => {
        submitBtn.classList.remove('rff-submit--processing');
        text.textContent = 'Registered ✓';
        submitBtn.style.background = '#2ecc71';
        setTimeout(() => { text.textContent = 'Register'; submitBtn.style.background = ''; }, 2000);
      }, 2000);
    });
  </script>
</body>
</html>
