<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status Dot Ripple</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion status</p>
    <h1 id="demo-title">Status dot ripple</h1>
    <p class="intro">A live status badge with a pulsing dot that signals an active connection.</p>

    <div class="status" role="status">
      <span class="dot" aria-hidden="true"></span>
      Connected live
    </div>
  </main>
</body>
</html>
