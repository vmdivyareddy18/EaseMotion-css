<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slingshot Social Share Bar - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>

  <main style="text-align: center; position: absolute; top: 15%;">
    <h1 style="text-transform: uppercase; letter-spacing: 3px; font-size: 2rem; margin-bottom: 0;">Slingshot Share Bar</h1>
    <p style="color: var(--ease-neon-cyan); opacity: 0.8; font-size: 0.9rem;">Creative Agency Design Pattern Integration</p>
    <p style="font-size: 0.85rem; opacity: 0.5; margin-top: 16px;">Hover over the plus (+) button to deploy the elastic slingshot action.</p>
  </main>

  <!-- Component Target Structure -->
  <div class="slingshot-share-wrapper">
    
    <!-- Trigger Hub Box -->
    <button class="slingshot-trigger" aria-label="Toggle sharing tray">+</button>
    
    <!-- Slingshot Target Payload Tray -->
    <div class="slingshot-icons-container">
      <a href="#" class="share-icon-btn" aria-label="Share on X">X</a>
      <a href="#" class="share-icon-btn" aria-label="Share on LinkedIn">LN</a>
      <a href="#" class="share-icon-btn" aria-label="Share via Email">MC</a>
    </div>

  </div>

</body>
</html>
