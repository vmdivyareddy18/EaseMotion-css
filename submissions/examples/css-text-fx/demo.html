<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Text Effects</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 class="heading">Pure CSS Text Animations</h2>

        <!-- Effect 1: Gradient Flow -->
        <div class="effect-box">
            <h1 class="gradient-text">Gradient Flow</h1>
        </div>

        <!-- Effect 2: Typing Effect -->
        <div class="effect-box">
            <h1 class="typing-text">Typing Effect</h1>
        </div>

        <!-- Effect 3: Wave Text -->
        <div class="effect-box">
            <h1 class="wave-text">
                <span style="--i:1">W</span>
                <span style="--i:2">a</span>
                <span style="--i:3">v</span>
                <span style="--i:4">e</span>
                <span style="--i:5"> </span>
                <span style="--i:6">T</span>
                <span style="--i:7">e</span>
                <span style="--i:8">x</span>
                <span style="--i:9">t</span>
            </h1>
        </div>
    </div>
</body>
</html>
