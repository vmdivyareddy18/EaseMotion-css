<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wobble-Focus Glassmorphism Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="container">
        <div class="tooltip-wrapper">
            <button class="glass-button" aria-describedby="wobble-tooltip">
                Hover or Focus Me
            </button>
            <div id="wobble-tooltip" class="glass-tooltip" role="tooltip">
                <strong>Glassmorphism UI</strong>
                <span>Smooth wobble effect activated!</span>
            </div>
        </div>
    </main>
</body>

</html>
