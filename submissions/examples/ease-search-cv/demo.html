
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animated Search Bar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Animated Search Bars</h1>

    <h2>Rounded Variant</h2>

    <div class="search rounded">
        <input type="text" placeholder="Search anything...">
        <button>🔍</button>
    </div>

    <h2>Minimal Variant</h2>

    <div class="search minimal">
        <input type="text" placeholder="Search here...">
        <button>🔍</button>
    </div>

</div>

</body>
</html>
