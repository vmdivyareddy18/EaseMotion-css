<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Card Carousel Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Featured Cards</h1>

    <div class="carousel">
        <div class="card active">
            <h2>Design</h2>
            <p>Creative UI designs with modern animations and interactions.</p>
        </div>

        <div class="card">
            <h2>Development</h2>
            <p>Fast and responsive web solutions with clean code practices.</p>
        </div>

        <div class="card">
            <h2>Marketing</h2>
            <p>Smart digital strategies to improve reach and engagement.</p>
        </div>
    </div>
</div>

</body>
</html>
