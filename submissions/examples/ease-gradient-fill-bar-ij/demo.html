<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Fill Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <h2>Gradient Fill Bar</h2>
      <p>Animated gradient sweep bar</p>
    </div>

    <div class="demo-area">
      <div class="bar-wrapper" id="barWrapper">
        <div class="bar-bg">
          <div class="bar-fill" id="barFill"></div>
        </div>
        <div class="bar-label"><span id="progressText">75</span>%</div>
      </div>
    </div>

    <div class="controls">
      <label>Bar BG <input type="color" id="barBg" value="#2a2a3e" data-var="--bar-bg"></label>
      <label>Gradient Start <input type="color" id="gradientStart" value="#ff6b6b" data-var="--gradient-start"></label>
      <label>Gradient End <input type="color" id="gradientEnd" value="#4ecdc4" data-var="--gradient-end"></label>
      <label>Fill Duration <input type="range" id="fillDuration" min="0.5" max="6" step="0.25" value="2" data-var="--fill-duration" data-unit="s"></label>
      <label>Progress <input type="range" id="progress" min="0" max="100" value="75"></label>
    </div>
  </main>
  <script>
    const wrapper = document.getElementById('barWrapper');
    const fill = document.getElementById('barFill');
    const progText = document.getElementById('progressText');

    document.querySelectorAll('[data-var]').forEach(input => {
      const set = () => wrapper.style.setProperty(input.dataset.var, input.dataset.unit ? input.value + input.dataset.unit : input.value);
      input.addEventListener('input', set);
      set();
    });

    document.getElementById('progress').addEventListener('input', function() {
      fill.style.width = this.value + '%';
      progText.textContent = this.value;
    });
  </script>
</body>
</html>
