<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Flip Clock Countdown</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .demo-header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .demo-section {
            background: #1a1a2e;
            border-radius: 1rem;
            padding: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .demo-section h3 {
            margin-top: 0;
            color: #c4b5fd;
        }
        .clock-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin: 2rem 0;
            align-items: center;
        }
        .note {
            background: #1a1a2e;
            padding: 1rem;
            border-radius: 12px;
            border-left: 3px solid #6c63ff;
            margin: 2rem 0;
            font-size: 0.875rem;
            text-align: center;
        }
        code {
            background: #1e1e2e;
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: monospace;
        }
        .separator {
            font-size: 4rem;
            color: #6c63ff;
            font-weight: bold;
        }
        button {
            background: #6c63ff;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            color: white;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #7c6cff;
        }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Flip Clock Countdown</h1>
    <p>Live countdown timer with flip animation</p>
</div>

<div class="demo-section">
    <h3>Live Countdown Timer</h3>
    <div class="clock-row">
        <div class="ease-flip-clock">
            <div class="ease-flip-clock-digit" id="minTens">0</div>
            <div class="ease-flip-clock-digit" id="minOnes">5</div>
        </div>
        <span class="separator">:</span>
        <div class="ease-flip-clock">
            <div class="ease-flip-clock-digit" id="secTens">0</div>
            <div class="ease-flip-clock-digit" id="secOnes">0</div>
        </div>
    </div>
    <button onclick="startTimer()">Start Countdown (5:00)</button>
    <button onclick="resetTimer()">Reset</button>
</div>

<div class="demo-section">
    <h3>Static Examples</h3>
    <div class="clock-row">
        <div class="ease-flip-clock">
            <div class="ease-flip-clock-digit">2</div>
            <div class="ease-flip-clock-digit">4</div>
        </div>
        <span class="separator">:</span>
        <div class="ease-flip-clock">
            <div class="ease-flip-clock-digit">5</div>
            <div class="ease-flip-clock-digit">9</div>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Dark Theme</h3>
    <div class="clock-row">
        <div class="ease-flip-clock ease-flip-clock-dark">
            <div class="ease-flip-clock-digit">0</div>
            <div class="ease-flip-clock-digit">3</div>
        </div>
        <div class="ease-flip-clock ease-flip-clock-dark">
            <div class="ease-flip-clock-digit">4</div>
            <div class="ease-flip-clock-digit">2</div>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Neon Theme</h3>
    <div class="clock-row">
        <div class="ease-flip-clock ease-flip-clock-neon">
            <div class="ease-flip-clock-digit">8</div>
            <div class="ease-flip-clock-digit">8</div>
        </div>
        <div class="ease-flip-clock ease-flip-clock-neon">
            <div class="ease-flip-clock-digit">0</div>
            <div class="ease-flip-clock-digit">8</div>
        </div>
    </div>
</div>

<div class="demo-section">
    <h3>Small Size</h3>
    <div class="clock-row">
        <div class="ease-flip-clock ease-flip-clock-small">
            <div class="ease-flip-clock-digit">1</div>
            <div class="ease-flip-clock-digit">2</div>
        </div>
        <div class="ease-flip-clock ease-flip-clock-small">
            <div class="ease-flip-clock-digit">3</div>
            <div class="ease-flip-clock-digit">4</div>
        </div>
    </div>
</div>

<div class="note">
    💡 <strong>How it works:</strong> The timer counts down from 5 minutes. Each digit flips when it changes.
</div>

<script>
    var totalSeconds = 300;
    var timerInterval = null;
    var minTens = document.getElementById('minTens');
    var minOnes = document.getElementById('minOnes');
    var secTens = document.getElementById('secTens');
    var secOnes = document.getElementById('secOnes');

    function updateDisplay() {
        var mins = Math.floor(totalSeconds / 60);
        var secs = totalSeconds % 60;
        var newMinTens = Math.floor(mins / 10);
        var newMinOnes = mins % 10;
        var newSecTens = Math.floor(secs / 10);
        var newSecOnes = secs % 10;

        if (parseInt(minTens.textContent) !== newMinTens) {
            flipDigit(minTens, newMinTens);
        } else {
            minTens.textContent = newMinTens;
        }
        if (parseInt(minOnes.textContent) !== newMinOnes) {
            flipDigit(minOnes, newMinOnes);
        } else {
            minOnes.textContent = newMinOnes;
        }
        if (parseInt(secTens.textContent) !== newSecTens) {
            flipDigit(secTens, newSecTens);
        } else {
            secTens.textContent = newSecTens;
        }
        if (parseInt(secOnes.textContent) !== newSecOnes) {
            flipDigit(secOnes, newSecOnes);
        } else {
            secOnes.textContent = newSecOnes;
        }
    }

    function flipDigit(element, newValue) {
        element.classList.add('ease-flip-animate');
        setTimeout(function() {
            element.textContent = newValue;
        }, 300);
        setTimeout(function() {
            element.classList.remove('ease-flip-animate');
        }, 600);
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        totalSeconds = 300;
        updateDisplay();
        timerInterval = setInterval(function() {
            if (totalSeconds > 0) {
                totalSeconds--;
                updateDisplay();
            } else {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }, 1000);
    }

    function resetTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        totalSeconds = 300;
        updateDisplay();
    }

    updateDisplay();
</script>

</body>
</html>
