<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Text Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1 class="rainbow-text" id="rainbowText">Rainbow Text</h1>
    <div class="controls">
      <div class="control-row">
        <label for="speedRange">Speed</label>
        <input type="range" id="speedRange" min="0.5" max="5" step="0.1" value="1">
        <span id="speedValue">1.0</span>
      </div>
      <button id="toggleBtn">Pause</button>
    </div>
  </main>
  <script>
    const textEl = document.getElementById('rainbowText');
    const speedRange = document.getElementById('speedRange');
    const speedValue = document.getElementById('speedValue');
    const toggleBtn = document.getElementById('toggleBtn');
    let paused = false;

    speedRange.addEventListener('input', () => {
      const val = speedRange.value;
      speedValue.textContent = val;
      textEl.style.setProperty('--rta-speed', val + 's');
    });

    toggleBtn.addEventListener('click', () => {
      paused = !paused;
      textEl.style.animationPlayState = paused ? 'paused' : 'running';
      toggleBtn.textContent = paused ? 'Play' : 'Pause';
    });
  </script>
</body>
</html>
