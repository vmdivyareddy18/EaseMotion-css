<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease: AI Chat Bubble</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>AI Chat</h1>
    <p>Simulated conversation with typing indicator and animated message bubbles.</p>
    <div class="chat-container" id="chatContainer">
      <div class="chat-messages" id="chatMessages">
        <div class="message ai">
          <div class="bubble">Hello! I'm an AI assistant. Ask me anything.</div>
        </div>
      </div>
      <div class="typing-indicator" id="typingIndicator">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." autocomplete="off">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </main>
  <script>
    const messagesEl = document.getElementById('chatMessages');
    const inputEl = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingEl = document.getElementById('typingIndicator');

    const aiResponses = [
      "That's a great question! Let me think about that...",
      "Here's what I know. The answer involves several key concepts.",
      "I'd recommend looking into that further. There's a lot to explore!",
      "Interesting point! Let me share some insights on that topic.",
      "Based on my analysis, there are a few things to consider."
    ];

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function simulateAIResponse() {
      typingEl.classList.add('visible');
      messagesEl.scrollTop = messagesEl.scrollHeight;
      const delay = 1200 + Math.random() * 1000;
      const response = aiResponses[Math.floor(Math.random() * aiResponses.length)];
      setTimeout(() => {
        typingEl.classList.remove('visible');
        addMessage(response, 'ai');
      }, delay);
    }

    function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMessage(text, 'user');
      sendBtn.classList.add('sending');
      setTimeout(() => sendBtn.classList.remove('sending'), 300);
      inputEl.value = '';
      simulateAIResponse();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
