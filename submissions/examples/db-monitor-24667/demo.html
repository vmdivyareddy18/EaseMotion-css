<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>DBPulse Monitor</title>
</head>
<body>
  <header class="hero-monitor">
    <h1>Database Visibility.</h1>
    <p>Real-time performance analytics for mission-critical infrastructure.</p>
  </header>
  <section class="metrics-grid">
    <div class="metric-card">
        <h3>Query Latency</h3>
        <p>Average: 12ms</p>
    </div>
    <div class="metric-card">
        <h3>Connection Pool</h3>
        <p>Active: 84 / 100</p>
    </div>
    <div class="metric-card">
        <h3>Slow Queries</h3>
        <p>3 alerts detected</p>
    </div>
  </section>
</body>
</html>
