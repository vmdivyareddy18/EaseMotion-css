<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Shimmer Sweep Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Dashboard Analytics

</span>

<h1>

Shimmer Sweep Modal

</h1>

<p>

Analytics inspired modal
featuring a modern shimmer
sweep interaction for
dashboard interfaces.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

View Report

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

>

✕

</label>

<div class="modal-content">

<div class="metric">

94%

</div>

<h2>

Performance Insights

</h2>

<p>

Track KPIs, monitor growth
metrics and analyze reports
through an elegant shimmer
modal interaction.

</p>

<button>

Open Dashboard

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
