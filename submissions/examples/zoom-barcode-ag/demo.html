<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Barcode — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="demo-container">
    <header class="demo-header">
      <h1>Zoom Barcode</h1>
    </header>

    <div class="zoom-barcode-card" tabindex="0" role="img" aria-label="Barcode: 9 780201 379624">
      <div class="barcode-inner">
        <div class="barcode-lines-wrapper">
          <div class="barcode-lines-normal">
            <span class="bar guard w-1 g-1"></span>
            <span class="bar guard w-1 g-2"></span>
            <span class="bar w-2 g-3"></span>
            <span class="bar w-1 g-1"></span>
            <span class="bar w-3 g-2"></span>
            <span class="bar w-4 g-1"></span>
            <span class="bar w-1 g-3"></span>
            <span class="bar w-2 g-2"></span>
            <span class="bar w-3 g-1"></span>
            <span class="bar w-1 g-2"></span>
            <span class="bar guard w-1 g-1"></span>
            <span class="bar guard w-1 g-1"></span>
            <span class="bar w-2 g-1"></span>
            <span class="bar w-3 g-3"></span>
            <span class="bar w-1 g-2"></span>
            <span class="bar w-4 g-1"></span>
            <span class="bar w-2 g-2"></span>
            <span class="bar w-3 g-1"></span>
            <span class="bar w-1 g-3"></span>
            <span class="bar w-2 g-1"></span>
            <span class="bar guard w-1 g-1"></span>
            <span class="bar guard w-1"></span>
          </div>

          <div class="barcode-lens">
            <div class="barcode-lines-magnified">
              <span class="bar guard w-1 g-1"></span>
              <span class="bar guard w-1 g-2"></span>
              <span class="bar w-2 g-3"></span>
              <span class="bar w-1 g-1"></span>
              <span class="bar w-3 g-2"></span>
              <span class="bar w-4 g-1"></span>
              <span class="bar w-1 g-3"></span>
              <span class="bar w-2 g-2"></span>
              <span class="bar w-3 g-1"></span>
              <span class="bar w-1 g-2"></span>
              <span class="bar guard w-1 g-1"></span>
              <span class="bar guard w-1 g-1"></span>
              <span class="bar w-2 g-1"></span>
              <span class="bar w-3 g-3"></span>
              <span class="bar w-1 g-2"></span>
              <span class="bar w-4 g-1"></span>
              <span class="bar w-2 g-2"></span>
              <span class="bar w-3 g-1"></span>
              <span class="bar w-1 g-3"></span>
              <span class="bar w-2 g-1"></span>
              <span class="bar guard w-1 g-1"></span>
              <span class="bar guard w-1"></span>
            </div>
          </div>

          <div class="barcode-laser"></div>
        </div>

        <div class="barcode-info">9 780201 379624&nbsp;</div>
      </div>
    </div>
  </main>
</body>

</html>
