<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern SaaS Analytics Suite</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="saas-workspace-canvas">
    <div class="saas-control-deck">
      
      <div class="deck-meta-header">
        <span class="status-indicator-tag">WORKSPACE_SYNC</span>
        <h3>User Management Deck</h3>
      </div>

      <!-- Pure CSS Popover System using checkbox state remapping -->
      <div class="horizontal-roll-popover-system">
        <input type="checkbox" id="saas-roll-toggle" class="hidden-popover-input">
        
        <label for="saas-roll-toggle" class="popover-action-trigger" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false">
          View Access Control
        </label>

        <!-- Horizontal Roll Popover Overlay Box Layout -->
        <div class="horizontal-roll-card" role="dialog" aria-label="Access Control Metadata">
          <div class="popover-lateral-arrow"></div>
          
          <div class="popover-inner-wrapper">
            <h4>Security Manifest</h4>
            <p>Deploys isolated decentralized access protocols and monitors credential verification pipelines instantly.</p>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers onto focusable labels
    const triggerLabelNode = document.querySelector('.popover-action-trigger');
    const inputCheckboxNode = document.getElementById('saas-roll-toggle');

    triggerLabelNode.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        inputCheckboxNode.click();
      }
    });

    inputCheckboxNode.addEventListener('change', () => {
      triggerLabelNode.setAttribute('aria-expanded', inputCheckboxNode.checked ? 'true' : 'false');
    });
  </script>
</body>
</html>
