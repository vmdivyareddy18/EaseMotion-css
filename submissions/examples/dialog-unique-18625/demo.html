<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="showDialog">Open Modal</button>
  
  <dialog id="modal" class="dialog-fluid">
    <h3>Modal Title</h3>
    <p>This is a native dialog component.</p>
    <button id="closeDialog">Close</button>
  </dialog>

  <script>
    const modal = document.getElementById('modal');
    document.getElementById('showDialog').onclick = () => modal.showModal();
    document.getElementById('closeDialog').onclick = () => modal.close();
  </script>
</body>
</html>
