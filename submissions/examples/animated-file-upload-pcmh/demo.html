<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated File Upload — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Animated File Upload</h1>
    <p class="subtitle">Drag & drop zone with progress, success, and error states</p>

    <div class="ease-upload-zone" id="dropZone">
      <div class="ease-upload-icon">📁</div>
      <div class="ease-upload-text">Drag & drop files here</div>
      <div class="ease-upload-hint">or click to browse — accepts images, PDFs, and more</div>
      <input type="file" id="fileInput" multiple style="display: none">
    </div>

    <ul class="ease-upload-files" id="fileList"></ul>

    <div id="resetSection" style="display: none; text-align: center;">
      <button class="ease-upload-reset" id="resetBtn">Reset All</button>
    </div>
  </div>

  <script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const resetBtn = document.getElementById('resetBtn');
    const resetSection = document.getElementById('resetSection');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
      fileInput.value = '';
    });

    function handleFiles(files) {
      for (const file of files) {
        addFileItem(file);
      }
      resetSection.style.display = 'block';
    }

    function addFileItem(file) {
      const li = document.createElement('li');
      li.className = 'ease-upload-file-item';
      const ext = file.name.split('.').pop().toLowerCase();
      const icon = ['png','jpg','jpeg','gif','webp'].includes(ext) ? '🖼️'
                : ['pdf'].includes(ext) ? '📄'
                : ['zip','rar','tar','gz'].includes(ext) ? '📦'
                : '📎';
      const size = file.size > 1024 * 1024
        ? (file.size / 1024 / 1024).toFixed(1) + ' MB'
        : (file.size / 1024).toFixed(0) + ' KB';

      li.innerHTML = `
        <span class="file-icon">${icon}</span>
        <span class="file-name">${file.name}</span>
        <span class="file-size">${size}</span>
        <span class="file-status"></span>
        <button class="file-remove" title="Remove">&times;</button>
      `;

      const removeBtn = li.querySelector('.file-remove');
      removeBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        li.remove();
        if (fileList.children.length === 0) resetSection.style.display = 'none';
      });

      fileList.appendChild(li);

      simulateUpload(li);
    }

    function simulateUpload(li) {
      const progressContainer = document.createElement('div');
      progressContainer.className = 'ease-upload-progress';
      const progressBar = document.createElement('div');
      progressBar.className = 'ease-upload-progress-bar';
      progressContainer.appendChild(progressBar);
      li.appendChild(progressContainer);

      let pct = 0;
      const interval = setInterval(() => {
        pct += Math.random() * 15 + 5;
        if (pct >= 100) {
          pct = 100;
          clearInterval(interval);
          progressContainer.remove();
          li.classList.add('success');
          li.querySelector('.file-status').textContent = '✓ Uploaded';
        }
        progressBar.style.width = pct + '%';
      }, 200);
    }

    resetBtn.addEventListener('click', () => {
      fileList.innerHTML = '';
      resetSection.style.display = 'none';
    });
  </script>
</body>
</html>
