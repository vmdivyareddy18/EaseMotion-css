<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noise Background Overlay</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="noise-page">
    <div class="noise-overlay"></div>
    <div class="noise-content">
      <h1>Noise Texture Overlay</h1>
      <p>A subtle grain texture created entirely with CSS gradients. No external assets needed.</p>
      <div class="toggle-row">
        <label class="toggle-label">
          <input type="checkbox" id="noiseToggle" checked>
          <span class="toggle-track"></span>
          Noise On
        </label>
      </div>
    </div>
  </div>
  <script>
    const toggle = document.getElementById("noiseToggle");
    const overlay = document.querySelector(".noise-overlay");
    toggle.addEventListener("change", () => {
      overlay.style.display = toggle.checked ? "block" : "none";
    });
  </script>
</body>
</html>
