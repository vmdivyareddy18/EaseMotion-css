<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Search Filter — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lsf-wrapper">
    <h1>Live Search Filter</h1>
    <div class="lsf-card">
      <div class="lsf-input-wrap">
        <input type="text" class="lsf-input" id="lsfInput" placeholder="Search countries..." autofocus>
        <button class="lsf-clear" id="lsfClear" aria-label="Clear search">&times;</button>
      </div>
      <div class="lsf-results" id="lsfResults">
        <div class="lsf-item" data-term="australia">Australia</div>
        <div class="lsf-item" data-term="brazil">Brazil</div>
        <div class="lsf-item" data-term="canada">Canada</div>
        <div class="lsf-item" data-term="denmark">Denmark</div>
        <div class="lsf-item" data-term="egypt">Egypt</div>
        <div class="lsf-item" data-term="france">France</div>
        <div class="lsf-item" data-term="germany">Germany</div>
        <div class="lsf-item" data-term="india">India</div>
        <div class="lsf-item" data-term="japan">Japan</div>
        <div class="lsf-item" data-term="kenya">Kenya</div>
        <div class="lsf-item" data-term="luxembourg">Luxembourg</div>
        <div class="lsf-item" data-term="mexico">Mexico</div>
        <div class="lsf-item" data-term="netherlands">Netherlands</div>
        <div class="lsf-item" data-term="norway">Norway</div>
        <div class="lsf-item" data-term="portugal">Portugal</div>
        <div class="lsf-item" data-term="singapore">Singapore</div>
        <div class="lsf-item" data-term="sweden">Sweden</div>
        <div class="lsf-item" data-term="thailand">Thailand</div>
        <div class="lsf-item" data-term="uganda">Uganda</div>
        <div class="lsf-item" data-term="vietnam">Vietnam</div>
      </div>
      <p class="lsf-status" id="lsfStatus">20 countries</p>
    </div>
  </div>
  <script>
    const input = document.getElementById('lsfInput');
    const clearBtn = document.getElementById('lsfClear');
    const results = document.getElementById('lsfResults');
    const status = document.getElementById('lsfStatus');
    const items = Array.from(results.children);

    function filterItems() {
      const q = input.value.toLowerCase().trim();
      let visibleCount = 0;

      items.forEach(item => {
        const term = item.getAttribute('data-term');
        const match = term.includes(q);

        if (q === '') {
          item.classList.remove('lsf-hidden');
          item.innerHTML = item.getAttribute('data-term').charAt(0).toUpperCase() + item.getAttribute('data-term').slice(1);
          visibleCount++;
          return;
        }

        if (match) {
          item.classList.remove('lsf-hidden');
          const idx = term.indexOf(q);
          const label = item.getAttribute('data-term');
          item.innerHTML = label.slice(0, idx) +
            '<span class="lsf-highlight">' + label.slice(idx, idx + q.length) + '</span>' +
            label.slice(idx + q.length);
          visibleCount++;
        } else {
          item.classList.add('lsf-hidden');
        }
      });

      const noResult = results.querySelector('.lsf-no-result');
      if (visibleCount === 0 && q !== '') {
        if (!noResult) {
          const el = document.createElement('p');
          el.className = 'lsf-no-result';
          el.textContent = 'No countries match "' + q + '"';
          results.appendChild(el);
        }
      } else if (noResult) {
        noResult.remove();
      }

      status.textContent = visibleCount + ' of ' + items.length + ' countries';
    }

    input.addEventListener('input', filterItems);

    clearBtn.addEventListener('click', () => {
      input.value = '';
      input.focus();
      filterItems();
    });
  </script>
</body>
</html>
