<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shake Mention Input</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>Tag your teammate</h2>

<div class="mention-box">

<span class="mention">@</span>

<input
type="text"
placeholder="Type a username..."
aria-label="Mention Username">

</div>

<p>Hover or focus the input to see the retro shake animation.</p>

</div>

</body>
</html>
