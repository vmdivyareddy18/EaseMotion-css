<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-blob-morph-animate</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    p { font-size: 0.9rem; color: #888; margin-bottom: 2rem; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .controls button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { background: #333; border-color: #888; }
    .controls button.active { background: var(--blob-color, #6c5ce7); border-color: var(--blob-color, #6c5ce7); color: #fff; }
    .playground { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .slider-group { display: flex; align-items: center; gap: 0.75rem; }
    .slider-group label { font-size: 0.85rem; color: #aaa; min-width: 6rem; }
    .slider-group input[type="range"] { width: 140px; accent-color: var(--blob-color, #6c5ce7); }
    .slider-group output { font-size: 0.8rem; color: #888; min-width: 2.5rem; text-align: right; }
    .color-picker-group { display: flex; align-items: center; gap: 0.75rem; }
    .color-picker-group label { font-size: 0.85rem; color: #aaa; }
    .color-picker-group input[type="color"] { width: 40px; height: 32px; border: 1px solid #444; border-radius: 4px; background: transparent; cursor: pointer; }
  </style>
</head>
<body>

  <h1>ease-blob-morph-animate</h1>
  <p>Organic blob shape morphing with CSS clip-path animation</p>

  <div class="controls">
    <button class="active" id="playBtn">▶ Pause</button>
    <button id="resetBtn">↺ Reset</button>
  </div>

  <div class="playground">
    <div class="ease-blob-morph-animate" id="blob"></div>

    <div class="slider-group">
      <label for="sizeRange">--blob-size</label>
      <input type="range" id="sizeRange" min="80" max="320" value="200" step="4" />
      <output id="sizeVal">200px</output>
    </div>

    <div class="slider-group">
      <label for="durRange">--morph-duration</label>
      <input type="range" id="durRange" min="1" max="10" value="5" step="0.5" />
      <output id="durVal">5s</output>
    </div>

    <div class="color-picker-group">
      <label for="colorPicker">--blob-color</label>
      <input type="color" id="colorPicker" value="#6c5ce7" />
    </div>
  </div>

  <script>
    (function() {
      var blob = document.getElementById('blob');
      var playBtn = document.getElementById('playBtn');
      var resetBtn = document.getElementById('resetBtn');
      var sizeRange = document.getElementById('sizeRange');
      var sizeVal = document.getElementById('sizeVal');
      var durRange = document.getElementById('durRange');
      var durVal = document.getElementById('durVal');
      var colorPicker = document.getElementById('colorPicker');

      function updateSize(val) {
        sizeVal.textContent = val + 'px';
        blob.style.setProperty('--blob-size', val + 'px');
      }
      function updateDuration(val) {
        durVal.textContent = val + 's';
        blob.style.setProperty('--morph-duration', val + 's');
      }
      function updateColor(val) {
        blob.style.setProperty('--blob-color', val);
      }

      updateSize(sizeRange.value);
      updateDuration(durRange.value);
      updateColor(colorPicker.value);

      playBtn.addEventListener('click', function() {
        var paused = blob.style.animationPlayState === 'paused';
        blob.style.animationPlayState = paused ? 'running' : 'paused';
        playBtn.textContent = paused ? '▶ Pause' : '■ Play';
        playBtn.classList.toggle('active', paused);
      });

      resetBtn.addEventListener('click', function() {
        blob.style.animation = 'none';
        blob.offsetHeight;
        blob.style.animation = '';
        blob.style.animationPlayState = 'running';
        playBtn.textContent = '▶ Pause';
        playBtn.classList.add('active');
      });

      sizeRange.addEventListener('input', function() { updateSize(this.value); });
      durRange.addEventListener('input', function() { updateDuration(this.value); });
      colorPicker.addEventListener('input', function() { updateColor(this.value); });
    })();
  </script>
</body>
</html>
