<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS-only Image Lightbox Gallery Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f0f4f8;
      padding: 2rem;
      display: flex;
      justify-content: center;
    }

    .demo-wrapper {
      max-width: 480px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #444;
      margin-bottom: 0.25rem;
    }

    .hint {
      text-align: center;
      color: #999;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
    }

    /* Placeholder thumbnail/full images using gradients (no external assets) */
    .ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.2rem;
    }

    .ph-1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .ph-2 { background: linear-gradient(135deg, #10b981, #14b8a6); }
    .ph-3 { background: linear-gradient(135deg, #f59e0b, #ef4444); }

    .full-ph {
      width: 480px;
      height: 320px;
      border-radius: var(--ease-radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <h2>CSS-only Lightbox Gallery</h2>
    <p class="hint">Click a thumbnail to open, click ✕ or background to close</p>

    <div class="ease-lightbox-gallery">

      <!-- Thumbnail 1 -->
      <a href="#lightbox-1" class="ease-lightbox-thumbnail">
        <div class="ph ph-1">1</div>
      </a>

      <!-- Thumbnail 2 -->
      <a href="#lightbox-2" class="ease-lightbox-thumbnail">
        <div class="ph ph-2">2</div>
      </a>

      <!-- Thumbnail 3 -->
      <a href="#lightbox-3" class="ease-lightbox-thumbnail">
        <div class="ph ph-3">3</div>
      </a>

    </div>
  </div>

  <!-- Lightbox Overlay 1 -->
  <div id="lightbox-1" class="ease-lightbox-overlay">
    <a href="#" class="ease-lightbox-close-area" aria-label="Close"></a>
    <div class="ease-lightbox-full">
      <div class="full-ph ph-1">Image 1 — Full Size</div>
      <a href="#" class="ease-lightbox-close" aria-label="Close">×</a>
    </div>
  </div>

  <!-- Lightbox Overlay 2 -->
  <div id="lightbox-2" class="ease-lightbox-overlay">
    <a href="#" class="ease-lightbox-close-area" aria-label="Close"></a>
    <div class="ease-lightbox-full">
      <div class="full-ph ph-2">Image 2 — Full Size</div>
      <a href="#" class="ease-lightbox-close" aria-label="Close">×</a>
    </div>
  </div>

  <!-- Lightbox Overlay 3 -->
  <div id="lightbox-3" class="ease-lightbox-overlay">
    <a href="#" class="ease-lightbox-close-area" aria-label="Close"></a>
    <div class="ease-lightbox-full">
      <div class="full-ph ph-3">Image 3 — Full Size</div>
      <a href="#" class="ease-lightbox-close" aria-label="Close">×</a>
    </div>
  </div>

</body>
</html>
