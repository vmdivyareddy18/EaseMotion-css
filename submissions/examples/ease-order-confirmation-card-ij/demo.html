<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Order Confirmation Card</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='card-bg')r.style.setProperty('--card-bg',t.value);if(t.name==='success-color')r.style.setProperty('--success-color',t.value);if(t.name==='text-color')r.style.setProperty('--text-color',t.value);if(t.name==='check-duration')r.style.setProperty('--check-duration',t.value+'s')})</script>
<div class="container"><p class="title">Order Confirmation Card</p>
<div class="confirm-card"><div class="check-icon"><svg width="48" height="48" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="none" stroke="var(--success-color,#4ecdc4)" stroke-width="3"/><path d="M14 24l7 7 13-13" fill="none" stroke="var(--success-color,#4ecdc4)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="confirm-title">Order Confirmed!</div><div class="confirm-detail">Your order #ORD-48291 has been placed.</div><div class="confirm-sub">Estimated delivery: 3-5 business days</div></div>
<div class="controls"><label>Card: <input type="color" name="card-bg" value="#2d2d44"></label><label>Check: <input type="color" name="success-color" value="#4ecdc4"></label><label>Text: <input type="color" name="text-color" value="#ccc"></label><label>Speed: <input type="range" name="check-duration" min="0.3" max="1.5" step="0.05" value="0.5"></label></div></div></body></html>
