<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bug Fix: Tabs active indicator multiline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="main-content">
    <h1>Bug Fix: .ease-tabs Active Indicator with Multiline Labels</h1>
    <p>Resize the window to narrow widths to trigger multiline tab labels. The active indicator stays correct.</p>

    <div class="tabs" role="tablist" aria-label="Demo tabs">
      <button class="tab active" role="tab" aria-selected="true" aria-controls="panel-1" id="tab-1">Short</button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-2" id="tab-2">Medium Length Tab</button>
      <button class="tab" role="tab" aria-selected="false" aria-controls="panel-3" id="tab-3">This Is A Very Long Tab Label That Wraps</button>
    </div>
    <div id="panel-1" role="tabpanel" aria-labelledby="tab-1" class="panel">Panel 1 content</div>
    <div id="panel-2" role="tabpanel" aria-labelledby="tab-2" class="panel hidden">Panel 2 content</div>
    <div id="panel-3" role="tabpanel" aria-labelledby="tab-3" class="panel hidden">Panel 3 content</div>
  </main>
  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected','false'); });
        document.querySelectorAll('.panel').forEach(p => p.classList.add('hidden'));
        tab.classList.add('active');
        tab.setAttribute('aria-selected','true');
        document.getElementById(tab.getAttribute('aria-controls')).classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
