<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Vine Climb Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Vine Climb Animation</h1>
        <div class="garden-wall">
            <svg class="vine" viewBox="0 0 100 200">
                <path class="stalk" d="M50,200 Q40,150 60,110 T40,40 T50,0" />
                <path class="leaf leaf-1" d="M52,140 C70,130 75,150 52,140 Z" />
                <path class="leaf leaf-2" d="M48,90 C20,80 15,100 48,90 Z" />
                <path class="leaf leaf-3" d="M53,50 C80,40 70,20 53,50 Z" />
            </svg>
        </div>
        <button onclick="document.location.reload()">Grow Vine</button>
    </div>
</body>
</html>
