<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Cashback Coin Burst</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Cashback Coin Burst</h1>

  <p class="intro">
    A reusable cashback reward animation for fintech apps,
    loyalty programs, digital wallets, and payment systems.
  </p>

  <div class="demo-grid">

    <div class="reward-card">
      <div class="cashback-burst">
        <span class="reward">💰</span>
        <span class="coin coin-1">🪙</span>
        <span class="coin coin-2">🪙</span>
        <span class="coin coin-3">🪙</span>
      </div>
      <h3>Cashback Earned</h3>
    </div>

    <div class="reward-card">
      <div class="cashback-burst large">
        <span class="reward">💰</span>
        <span class="coin coin-1">🪙</span>
        <span class="coin coin-2">🪙</span>
        <span class="coin coin-3">🪙</span>
      </div>
      <p>Rewards Added</p>
    </div>

    <div class="reward-card">
      <div class="cashback-burst">
        <span class="reward">💰</span>
        <span class="coin coin-1">🪙</span>
        <span class="coin coin-2">🪙</span>
        <span class="coin coin-3">🪙</span>
      </div>
      <button>View Rewards</button>
    </div>

  </div>

</main>

</body>
</html>
