<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance Page • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-circle circle-one"></div>
<div class="background-circle circle-two"></div>

<div class="container">

    <div class="gear">
        ⚙️
    </div>

    <span class="badge">
        SYSTEM MAINTENANCE
    </span>

    <h1>
        We'll Be Back Soon
    </h1>

    <p>

        Our engineers are performing scheduled maintenance
        to improve your experience.

        Everything will be back online shortly.

    </p>

    <div class="status">

        <div class="item">

            <strong>Estimated Time</strong>

            <span>45 Minutes</span>

        </div>

        <div class="item">

            <strong>Status</strong>

            <span>Updating Servers</span>

        </div>

        <div class="item">

            <strong>Progress</strong>

            <span>78%</span>

        </div>

    </div>

    <button>

        Notify Me

    </button>

</div>

</body>
</html>
