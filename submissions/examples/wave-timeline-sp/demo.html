<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Timeline</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="timeline">

<div class="item">
<span class="dot"></span>
<div class="content">
<h3>Warm Up</h3>
<p>5 Minutes</p>
</div>
</div>

<div class="item">
<span class="dot"></span>
<div class="content">
<h3>Workout</h3>
<p>30 Minutes</p>
</div>
</div>

<div class="item">
<span class="dot"></span>
<div class="content">
<h3>Stretch</h3>
<p>10 Minutes</p>
</div>
</div>

<div class="item">
<span class="dot"></span>
<div class="content">
<h3>Cool Down</h3>
<p>5 Minutes</p>
</div>
</div>

</div>

</body>
</html>
