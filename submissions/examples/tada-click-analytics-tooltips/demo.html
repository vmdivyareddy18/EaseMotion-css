<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tada-Click Tooltip - Dashboard Analytics Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="analytics-dashboard">
    <header class="dashboard-header">
      <h1>Analytics Overview</h1>
      <p>Data stream active. Hover over individual network nodes, then click to trigger the interactive Tada transition.</p>
    </header>

    <div class="metrics-grid">
      <section class="metric-card">
        <div class="card-meta-title">SERVER LATENCY</div>
        <div class="metric-display">
          <span class="value">14ms</span>
          <span class="badge optimal">OPTIMAL</span>
        </div>
        <div class="interactive-footer">
          <button class="analytics-btn tooltip-container" aria-describedby="tip-latency">
            ℹ️ View Clusters
            <span id="tip-latency" class="tooltip" role="tooltip">
              ⚡ Edge nodes running smoothly with 99.99% uptime.
            </span>
          </button>
        </div>
      </section>

      <section class="metric-card">
        <div class="card-meta-title">API REQUESTS</div>
        <div class="metric-display">
          <span class="value">2.4M</span>
          <span class="badge spike">+18.2%</span>
        </div>
        <div class="interactive-footer">
          <button class="analytics-btn tooltip-container" aria-describedby="tip-requests">
            ℹ️ Inspect Traffic
            <span id="tip-requests" class="tooltip" role="tooltip">
              📊 Peak traffic volume identified from US-East gateway.
            </span>
          </button>
        </div>
      </section>
    </div>
  </main>

</body>
</html>
