<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Credit Score Meter Sweep</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Credit Score Meter Sweep</h1>

  <p class="intro">
    A reusable credit score gauge animation for banking apps,
    loan platforms, and financial dashboards.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="credit-score-meter">
        <div class="gauge">
          <span class="needle">▲</span>
        </div>
        <span class="score">780</span>
      </div>
      <h3>Excellent Score</h3>
    </div>

    <div class="card">
      <div class="credit-score-meter">
        <div class="gauge">
          <span class="needle">▲</span>
        </div>
        <span class="score">725</span>
      </div>
      <p>Financial Health</p>
    </div>

    <div class="card">
      <div class="credit-score-meter">
        <div class="gauge">
          <span class="needle">▲</span>
        </div>
        <span class="score">690</span>
      </div>
      <button>View Report</button>
    </div>

  </div>

</div>

</body>
</html>
