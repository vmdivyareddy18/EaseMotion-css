<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cyberpunk HUD Card Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <div class="hud-card">
        <div class="hud-scanline"></div>
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div>
        <div class="hud-corner bottom-right"></div>

        <div class="hud-header">
          <div class="hud-status-indicator"></div>
          <span class="hud-subtitle">SYS.LOC.09</span>
        </div>

        <div class="hud-body">
          <h2 class="hud-title">COGNITIVE COMPUTE</h2>
          <div class="hud-grid-metrics">
            <div class="metric-box">
              <span class="metric-label">CPU</span>
              <span class="metric-value">84.2%</span>
            </div>
            <div class="metric-box">
              <span class="metric-label">TEMP</span>
              <span class="metric-value">42°C</span>
            </div>
          </div>
        </div>

        <div class="hud-footer">
          <button class="hud-action-btn">INITIALIZE MATRIX</button>
        </div>
      </div>
    </div>
  </body>
</html>
