<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skip Link Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#main" class="skip-link">Skip to main content</a>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <main id="main" tabindex="-1">
        <h1>Main Content</h1>
        <p>Keyboard users can press Tab to reveal the skip link and jump directly to the main content area by pressing Enter.</p>
        <p>This section receives focus when the skip link is activated.</p>
    </main>
</body>
</html>
