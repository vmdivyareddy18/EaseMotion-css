<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skeleton Table - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="sk-header"><h1>CSS Skeleton Table</h1><p>Loading skeleton patterns for tables, lists, and data grids</p></header>
<section class="sk-section"><h2>Data Table Skeleton</h2><div class="sk-table"><div class="sk-thead"><div class="sk-tr"><div class="sk-th sk-pulse" style="width:30%">Name</div><div class="sk-th sk-pulse" style="width:20%">Role</div><div class="sk-th sk-pulse" style="width:25%">Email</div><div class="sk-th sk-pulse" style="width:15%">Status</div></div></div><div class="sk-tbody"><div class="sk-tr"><div class="sk-td"><div class="sk-cell sk-wave" style="width:60%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:45%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:70%"></div></div><div class="sk-td"><div class="sk-badge-sk sk-wave" style="width:40%"></div></div></div><div class="sk-tr"><div class="sk-td"><div class="sk-cell sk-wave" style="width:50%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:55%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:65%"></div></div><div class="sk-td"><div class="sk-badge-sk sk-wave" style="width:35%"></div></div></div><div class="sk-tr"><div class="sk-td"><div class="sk-cell sk-wave" style="width:70%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:40%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:55%"></div></div><div class="sk-td"><div class="sk-badge-sk sk-wave" style="width:45%"></div></div></div><div class="sk-tr"><div class="sk-td"><div class="sk-cell sk-wave" style="width:45%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:60%"></div></div><div class="sk-td"><div class="sk-cell sk-wave" style="width:80%"></div></div><div class="sk-td"><div class="sk-badge-sk sk-wave" style="width:30%"></div></div></div></div></div></section>
<section class="sk-section"><h2>List Skeleton</h2><div class="sk-list"><div class="sk-litem"><div class="sk-lav sk-wave"></div><div class="sk-lines"><div class="sk-line sk-wave" style="width:65%"></div><div class="sk-line sk-wave" style="width:40%"></div></div></div><div class="sk-litem"><div class="sk-lav sk-wave"></div><div class="sk-lines"><div class="sk-line sk-wave" style="width:55%"></div><div class="sk-line sk-wave" style="width:45%"></div></div></div><div class="sk-litem"><div class="sk-lav sk-wave"></div><div class="sk-lines"><div class="sk-line sk-wave" style="width:70%"></div><div class="sk-line sk-wave" style="width:35%"></div></div></div></div></section>
<section class="sk-section"><h2>Card Grid Skeleton</h2><div class="sk-cgrid"><div class="sk-ccard"><div class="sk-cimg sk-wave"></div><div class="sk-ctitle sk-wave" style="width:70%"></div><div class="sk-ctext sk-wave" style="width:90%"></div><div class="sk-ctext sk-wave" style="width:60%"></div></div><div class="sk-ccard"><div class="sk-cimg sk-wave"></div><div class="sk-ctitle sk-wave" style="width:65%"></div><div class="sk-ctext sk-wave" style="width:85%"></div><div class="sk-ctext sk-wave" style="width:55%"></div></div><div class="sk-ccard"><div class="sk-cimg sk-wave"></div><div class="sk-ctitle sk-wave" style="width:75%"></div><div class="sk-ctext sk-wave" style="width:80%"></div><div class="sk-ctext sk-wave" style="width:50%"></div></div></div></section>
<footer class="ftr"><p>EaseMotion CSS - Skeleton Table | GSSoC 2026</p></footer>
</body>
</html>
