<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Shimmer Sweep Modal (Cyberpunk Neon)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #050508;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Rajdhani', sans-serif;
      /* Subtle grid background */
      background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .neon-hero {
      text-align: center;
    }
    h1 {
      color: #fff;
      font-size: 3.5rem;
      text-transform: uppercase;
      letter-spacing: 5px;
      margin-bottom: 2rem;
      text-shadow: 0 0 10px #f0f, 0 0 20px #f0f;
    }
  </style>
</head>
<body>

  <div class="neon-hero">
    <h1>System Access</h1>
    <!-- Trigger link (uses anchor hash to target the modal ID) -->
    <a href="#cyber-modal" class="ease-neon-trigger-btn">Initialize_</a>
  </div>

  <!-- Modal Overlay (Targeted via ID) -->
  <div id="cyber-modal" class="ease-neon-shimmer-modal-overlay">
    <!-- Modal Content -->
    <div class="ease-neon-shimmer-modal-content">
      <!-- Close Button (Links back to # or a specific non-modal ID to close) -->
      <a href="#" class="ease-neon-shimmer-modal-close" aria-label="Close modal">&times;</a>
      
      <h2 style="margin-top:0; font-size: 2.2rem; color: var(--ease-cp-neon-cyan); letter-spacing: 3px; text-shadow: 0 0 5px var(--ease-cp-neon-cyan);">System Override</h2>
      <p style="font-size: 1.2rem; line-height: 1.5; color: #ccc; margin-bottom: 2rem;">
        WARNING: Unauthorised access detected. Proceeding will initiate the <strong>Shimmer Sweep</strong> sub-routines.
      </p>
      
      <div style="display: flex; gap: 15px;">
        <a href="#" class="ease-neon-trigger-btn" style="padding: 10px 20px; font-size: 1rem;">Accept</a>
        <a href="#" style="padding: 10px 20px; font-size: 1rem; color: var(--ease-cp-neon-pink); border: 2px solid var(--ease-cp-neon-pink); text-decoration: none; display: flex; align-items: center; box-shadow: 0 0 10px rgba(255,0,255,0.3);">Deny</a>
      </div>
    </div>
  </div>

</body>
</html>
