<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Label Input</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Floating Label Input Component</h1>

    <p class="subtitle">
      Modern animated floating labels built using pure HTML & CSS.
    </p>

    <!-- ================= Basic ================= -->

    <section class="demo-section">

      <h2>Basic</h2>

      <div class="floating-input">

        <input type="text" id="fullname" placeholder=" " required>

        <label for="fullname">
          Full Name
        </label>

      </div>

    </section>

    <!-- ================= Email ================= -->

    <section class="demo-section">

      <h2>Email</h2>

      <div class="floating-input">

        <input type="email" id="email" placeholder=" " required>

        <label for="email">
          Email Address
        </label>

      </div>

    </section>

    <!-- ================= Password ================= -->

    <section class="demo-section">

      <h2>Password</h2>

      <div class="floating-input">

        <input type="password" id="password" placeholder=" " required>

        <label for="password">
          Password
        </label>

      </div>

    </section>

    <!-- ================= Outline ================= -->

    <section class="demo-section">

      <h2>Outline Variant</h2>

      <div class="floating-input outline">

        <input type="text" id="username" placeholder=" " required>

        <label for="username">
          Username
        </label>

      </div>

    </section>

    <!-- ================= Filled ================= -->

    <section class="demo-section">

      <h2>Filled Variant</h2>

      <div class="floating-input filled">

        <input type="text" id="company" placeholder=" " required>

        <label for="company">
          Company Name
        </label>

      </div>

    </section>

    <!-- ================= Rounded ================= -->

    <section class="demo-section">

      <h2>Rounded Variant</h2>

      <div class="floating-input rounded">

        <input type="text" id="city" placeholder=" " required>

        <label for="city">
          City
        </label>

      </div>

    </section>

    <!-- ================= Glass ================= -->

    <section class="demo-section">

      <h2>Glass Variant</h2>

      <div class="floating-input glass">

        <input type="text" id="website" placeholder=" " required>

        <label for="website">
          Website
        </label>

      </div>

    </section>

    <!-- ================= Success ================= -->

    <section class="demo-section">

      <h2>Success State</h2>

      <div class="floating-input success">

        <input type="text" id="success" placeholder=" " value="John Doe">

        <label for="success">
          Full Name
        </label>

      </div>

    </section>

    <!-- ================= Error ================= -->

    <section class="demo-section">

      <h2>Error State</h2>

      <div class="floating-input error">

        <input type="email" id="error" placeholder=" " value="john@">

        <label for="error">
          Email Address
        </label>

      </div>

    </section>

    <!-- ================= Disabled ================= -->

    <section class="demo-section">

      <h2>Disabled</h2>

      <div class="floating-input disabled">

        <input type="text" id="disabled" placeholder=" " value="Disabled Input" disabled>

        <label for="disabled">
          Disabled
        </label>

      </div>

    </section>

    <!-- ================= Read Only ================= -->

    <section class="demo-section">

      <h2>Read Only</h2>

      <div class="floating-input readonly">

        <input type="text" id="readonly" placeholder=" " value="Read Only Field" readonly>

        <label for="readonly">
          Read Only
        </label>

      </div>

    </section>

  </div>

</body>

</html>
