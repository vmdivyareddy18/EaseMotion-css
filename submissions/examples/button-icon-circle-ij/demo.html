<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS button-icon-circle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Icon Circle Buttons</h1>
    <div class="button-grid">
      <button class="btn-icon-circle"><span class="icon">&#9829;</span></button>
      <button class="btn-icon-circle"><span class="icon">&#9733;</span></button>
      <button class="btn-icon-circle"><span class="icon">&#9881;</span></button>
      <button class="btn-icon-circle"><span class="icon">&#9993;</span></button>
      <button class="btn-icon-circle pulse"><span class="icon">&#9888;</span></button>
    </div>
    <p class="hint">Hover over buttons</p>
  </div>
</body>
</html>
