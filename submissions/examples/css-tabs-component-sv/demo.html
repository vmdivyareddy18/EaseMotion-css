<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Only Tabs Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="tabs-container">

  <input type="radio" name="tabs" id="tab1" checked>
  <input type="radio" name="tabs" id="tab2">
  <input type="radio" name="tabs" id="tab3">

  <div class="tabs-header">
    <label for="tab1">Profile</label>
    <label for="tab2">Settings</label>
    <label for="tab3">Security</label>
  </div>

  <div class="tabs-content">

    <div id="panel1" class="tab-panel">
      <h2>Profile Content</h2>
      <p>
        This panel contains profile information and personal details.
      </p>
    </div>

    <div id="panel2" class="tab-panel">
      <h2>Settings Content</h2>
      <p>
        Manage application preferences and account settings.
      </p>
    </div>

    <div id="panel3" class="tab-panel">
      <h2>Security Content</h2>
      <p>
        Configure passwords, authentication, and privacy controls.
      </p>
    </div>

  </div>

</div>

</body>
</html>
