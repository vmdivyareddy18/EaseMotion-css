<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Expandable Search Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="demo-card" aria-labelledby="component-title">
        <h1 id="component-title">Ease Expandable Search Bar</h1>
        <p class="intro">A polished, accessible search control for modern UI layouts.</p>

        <form class="search-bar" role="search" novalidate>
          <button
            class="search-toggle"
            type="button"
            id="searchBtn"
            aria-label="Open search"
            aria-expanded="false"
            aria-controls="searchInput"
          >
            <span class="search-icon" aria-hidden="true">⌕</span>
          </button>

          <div class="search-field">
            <label class="sr-only" for="searchInput">Search</label>
            <input
              type="search"
              id="searchInput"
              name="query"
              autocomplete="off"
              spellcheck="false"
              placeholder=""
            />
            <span class="placeholder" aria-hidden="true">Search anything...</span>
          </div>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
