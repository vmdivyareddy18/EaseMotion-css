<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Face ID Scan Frame</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

  <h1>Animated Face ID Scan Frame</h1>

  <p class="intro">
    A reusable biometric authentication animation for Face ID systems,
    login screens, banking apps, and security dashboards.
  </p>

  <div class="demo-grid">

    <div class="face-card">
      <div class="faceid-scan">
        <span class="avatar">👤</span>
        <span class="scan-line"></span>
      </div>
      <h3>Identity Verification</h3>
    </div>

    <div class="face-card">
      <div class="faceid-scan large">
        <span class="avatar">👤</span>
        <span class="scan-line"></span>
      </div>
      <p>Face Authentication</p>
    </div>

    <div class="face-card">
      <div class="faceid-scan">
        <span class="avatar">👤</span>
        <span class="scan-line"></span>
      </div>
      <button>Verify Identity</button>
    </div>

  </div>

</main>

</body>
</html>
