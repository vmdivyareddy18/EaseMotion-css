<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Fitness Goal Tracker Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="fitness-card">

        <div class="badge">
            💪 Fitness Champion
        </div>

        <h2>Daily Fitness Goal</h2>

        <p class="description">
            Stay active and track your daily fitness progress.
        </p>

        <div class="progress-section">

            <div class="progress-header">
                <span>Goal Completion</span>
                <span>84%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>8,420</h3>
                <p>Steps Today</p>
            </div>

            <div class="stat-box">
                <h3>620</h3>
                <p>Calories Burned</p>
            </div>

        </div>

        <div class="streak-box">
            🔥 Workout Streak: 15 Days
        </div>

        <div class="achievement-box">
            🏆 Achievement Unlocked: Active Performer
        </div>

        <div class="button-group">

            <button class="primary-btn">
                Continue Workout
            </button>

            <button class="secondary-btn">
                View Statistics
            </button>

        </div>

    </div>

</div>

</body>
</html>
