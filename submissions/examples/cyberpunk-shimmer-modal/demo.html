<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Shimmer Modal - React Sandbox</title>
  
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="stylesheet" href="style.css">

  <style>
    /* Demo Workspace Environment Styling */
    body {
      background-color: #030408;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }
    .demo-wrapper {
      text-align: center;
    }
    .launch-btn {
      background: transparent;
      color: #ff0055;
      border: 2px solid #ff0055;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 10px rgba(255, 0, 85, 0.2);
      transition: all 0.2s ease;
    }
    .launch-btn:hover {
      background: #ff0055;
      color: #000000;
      box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
    }
  </style>
</head>
<body>

  <div id="react-demo-root"></div>

  <script type="text/babel">
    
    // Mimic the CyberpunkModal React structure inside the global UMD framework
    const CyberpunkModal = ({ isOpen, onClose, title = "SYSTEM_ALERT", children, accentColor = "#ff0055", shimmerDuration = "2.5s" }) => {
      React.useEffect(() => {
        if (isOpen) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = '';
        }
        return () => { document.body.style.overflow = ''; };
      }, [isOpen]);

      React.useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'Escape' && isOpen) onClose();
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [isOpen, onClose]);

      if (!isOpen) return null;

      return (
        <div className="cyber-modal-overlay ease-fade-in" onClick={onClose} role="dialog" aria-modal="true">
          <div 
            className="cyber-modal-container ease-zoom-in" 
            onClick={(e) => e.stopPropagation()}
            style={{ '--cyber-accent': accentColor, '--shimmer-time': shimmerDuration }}
          >
            <div className="cyber-shimmer-pulse" />
            <div className="cyber-modal-header">
              <h2 className="cyber-glitch-text"><span>&gt;</span> {title}</h2>
              <button className="cyber-close-btn" onClick={onClose}>&#x2715;</button>
            </div>
            <div className="cyber-modal-content">
              {children}
            </div>
          </div>
        </div>
      );
    };

    // Main App Demo State Shell Component
    const App = () => {
      const [modalOpen, setModalOpen] = React.useState(false);

      return (
        <div className="demo-wrapper">
          <h1 style={{ marginBottom: '2rem', letterSpacing: '2px' }}>&lt;CYBER_PANEL_V1.0&gt;</h1>
          
          <button className="launch-btn" onClick={() => setModalOpen(true)}>
            INITIALIZE_BREACH
          </button>

          <CyberpunkModal 
            isOpen={modalOpen} 
            onClose={() => setModalOpen(false)}
            title="ENCRYPTED_NET_CORE"
            accentColor="#ff0055"
            shimmerDuration="2s"
          >
            <p style={{ margin: '0 0 1rem 0', color: '#ff4d88' }}>[ALERT]: Signal intercept running on port 8080.</p>
            <p style={{ margin: 0 }}>The absolute path matrix sync cycle has loaded completely. Adjust style.css variables to dynamically scale configuration parameters.</p>
          </CyberpunkModal>
        </div>
      );
    };

    // Render App onto Root Anchor Elements
    const root = Alfonso = Royal = ReactDOM.createRoot(document.getElementById('react-demo-root'));
    root.render(<App />);
  </script>

</body>
</html>
