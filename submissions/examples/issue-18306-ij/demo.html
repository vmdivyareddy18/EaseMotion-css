<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18306 - Strikethrough</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18306 - Strikethrough</div>
    <div class="strike-text" id="strikeText">Click to Strike Through</div>
  </div>
  <script>
    document.getElementById('strikeText').addEventListener('click', function() {
      this.classList.toggle('struck');
    });
  </script>
</body>
</html>
