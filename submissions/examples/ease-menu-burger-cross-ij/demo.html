<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Burger Cross</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="mbc-demo">
    <h1>Menu Burger → Cross</h1>
    <p class="mbc-subtitle">Click any hamburger to toggle between burger and close (X) icon</p>

    <div class="mbc-grid">
      <div class="mbc-card">
        <h2>Default</h2>
        <div class="hamburger" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="mbc-card mbc-card--thin">
        <h2>Thin Lines</h2>
        <div class="hamburger thin" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="mbc-card mbc-card--thick">
        <h2>Thick Lines</h2>
        <div class="hamburger thick" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="mbc-card mbc-card--blue">
        <h2>Blue Theme</h2>
        <div class="hamburger blue" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="mbc-card mbc-card--red">
        <h2>Red Theme</h2>
        <div class="hamburger red" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="mbc-card mbc-card--large">
        <h2>Large</h2>
        <div class="hamburger large" onclick="this.classList.toggle('active')">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
