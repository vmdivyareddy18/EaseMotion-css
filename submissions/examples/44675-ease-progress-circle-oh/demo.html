<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-progress-circle</title>
  <meta name="description" content="Animated circular progress bar using CSS and SVG with smooth fill animation.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-progress-circle</h1>
      <p class="subtitle" id="main-desc">Animated circular progress bar using CSS and SVG</p>
    </header>

    <div class="display-area">
      <div class="progress-grid">
        
        <div class="progress-item">
          <svg class="ease-progress-circle" viewBox="0 0 100 100" style="--ease-progress-value: 50;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
          <span class="progress-label">50%</span>
          <span class="progress-title">Default</span>
        </div>

        <div class="progress-item">
          <svg class="ease-progress-circle ease-progress-primary" viewBox="0 0 100 100" style="--ease-progress-value: 75; --ease-progress-color: #10b981;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
          <span class="progress-label">75%</span>
          <span class="progress-title">Green</span>
        </div>

        <div class="progress-item">
          <svg class="ease-progress-circle ease-progress-lg" viewBox="0 0 100 100" style="--ease-progress-value: 90; --ease-progress-color: #f59e0b;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
          <span class="progress-label">90%</span>
          <span class="progress-title">Large</span>
        </div>

        <div class="progress-item">
          <svg class="ease-progress-circle ease-progress-sm" viewBox="0 0 100 100" style="--ease-progress-value: 25; --ease-progress-color: #ef4444;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
          <span class="progress-label">25%</span>
          <span class="progress-title">Small</span>
        </div>

      </div>
    </div>

    <div class="skills-section">
      <h3>Skill Progress Demo</h3>
      <div class="skill-bars">
        <div class="skill-item">
          <span class="skill-label">CSS</span>
          <svg class="ease-progress-circle skill-circle" viewBox="0 0 100 100" style="--ease-progress-value: 85;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
        </div>
        <div class="skill-item">
          <span class="skill-label">JavaScript</span>
          <svg class="ease-progress-circle skill-circle" viewBox="0 0 100 100" style="--ease-progress-value: 70;">
            <circle class="progress-bg" cx="50" cy="50" r="42" />
            <circle class="progress-fill" cx="50" cy="50" r="42" />
          </svg>
        </div>
      </div>
    </div>

  </main>

</body>
</html>
