<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Slide Text Entrance Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1 class="em-slide-text-entrance">
    Hello EaseMotion 🚀
  </h1>

  <p class="em-slide-text-entrance" style="animation-delay: 0.2s;">
    Smooth slide-in text animation.
  </p>

  <p class="em-slide-text-entrance" style="animation-delay: 0.4s;">
    Works across modern browsers.
  </p>

</body>
</html>
