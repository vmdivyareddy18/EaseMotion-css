<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filter Tab Indicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Filter Tab Indicator</h1>

  <div class="tab-group">
    <div class="tab-bar" data-active="0">
      <button class="tab active" data-index="0">All</button>
      <button class="tab" data-index="1">Images</button>
      <button class="tab" data-index="2">Videos</button>
      <button class="tab" data-index="3">Documents</button>
      <div class="tab-indicator" aria-hidden="true"></div>
    </div>
  </div>

  <div class="tab-group">
    <div class="tab-bar" data-active="0">
      <button class="tab active" data-index="0">Popular</button>
      <button class="tab" data-index="1">Recent</button>
      <button class="tab" data-index="2">Trending</button>
      <div class="tab-indicator" aria-hidden="true"></div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tab-bar').forEach(bar => {
      const tabs = bar.querySelectorAll('.tab');
      const indicator = bar.querySelector('.tab-indicator');

      function updateIndicator(activeTab) {
        const rect = activeTab.getBoundingClientRect();
        const barRect = bar.getBoundingClientRect();
        indicator.style.width = rect.width + 'px';
        indicator.style.left = (rect.left - barRect.left) + 'px';
      }

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          bar.dataset.active = tab.dataset.index;
          updateIndicator(tab);
        });
      });

      const active = bar.querySelector('.tab.active') || tabs[0];
      requestAnimationFrame(() => updateIndicator(active));
    });
  </script>
</body>
</html>
