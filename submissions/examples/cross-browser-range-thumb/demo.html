<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cross-Browser Range Thumb</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="panel">
        <p class="eyebrow">Form control motion</p>
        <h1>Cross-Browser Range Thumb</h1>
        <p class="lede">
          A polished slider track and thumb treatment that keeps the same feel in
          Chromium, Firefox, and Safari.
        </p>

        <div class="slider-stack" aria-label="Range slider examples">
          <label class="slider-card">
            <span class="slider-label">Comfort</span>
            <span class="slider-meta">Mid-strength track, bright thumb</span>
            <input
              class="range-control range-indigo"
              type="range"
              min="0"
              max="100"
              value="64"
              style="--fill: 64%"
            />
          </label>

          <label class="slider-card">
            <span class="slider-label">Intensity</span>
            <span class="slider-meta">Louder accent for higher contrast</span>
            <input
              class="range-control range-coral"
              type="range"
              min="0"
              max="100"
              value="38"
              style="--fill: 38%"
            />
          </label>
        </div>

        <p class="note">
          The thumb uses vendor-specific pseudo-elements so the same slider feels
          consistent across browsers.
        </p>
      </section>
    </main>
  </body>
</html>
