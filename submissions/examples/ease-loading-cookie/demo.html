<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Cookie Consent Banner - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-page">
    <h1>Page Content</h1>
    <p>This simulates a normal page. The cookie banner below slides up from the bottom on load.</p>
    <button class="ease-btn ease-btn-outline" id="reopenBtn" type="button" style="display:none;">
      Show Cookie Banner Again
    </button>
  </div>

  <div class="ease-cookie-banner" id="cookieBanner" role="dialog" aria-live="polite" aria-label="Cookie consent">
    <div class="ease-cookie-banner-content">
      <p class="ease-cookie-banner-text">
        We use cookies to improve your experience and analyze site traffic.
        By clicking "Accept", you agree to our use of cookies.
      </p>
      <div class="ease-cookie-banner-actions">
        <button class="ease-btn ease-btn-outline ease-btn-sm" id="declineBtn" type="button">Decline</button>
        <button class="ease-btn ease-btn-primary ease-btn-sm" id="acceptBtn" type="button">Accept</button>
      </div>
    </div>
  </div>

<script>
  const banner = document.getElementById("cookieBanner");
  const acceptBtn = document.getElementById("acceptBtn");
  const declineBtn = document.getElementById("declineBtn");
  const reopenBtn = document.getElementById("reopenBtn");

  // Entrance: translateY(100%) -> 0, triggered shortly after load
  requestAnimationFrame(() => {
    setTimeout(() => banner.classList.add("is-visible"), 300);
  });

  function dismiss() {
    // Exit: translateY(0) -> translateY(100%)
    banner.classList.remove("is-visible");
    banner.classList.add("is-dismissing");
    reopenBtn.style.display = "inline-block";
  }

  acceptBtn.addEventListener("click", dismiss);
  declineBtn.addEventListener("click", dismiss);

  reopenBtn.addEventListener("click", () => {
    reopenBtn.style.display = "none";
    banner.classList.remove("is-dismissing");
    requestAnimationFrame(() => {
      banner.classList.add("is-visible");
    });
  });
</script>

</body>
</html>
