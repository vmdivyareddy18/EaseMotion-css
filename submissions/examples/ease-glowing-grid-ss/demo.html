<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vercel-Style Glowing Grid Portal Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Glowing Grid Portal Wrapper -->
  <div class="ease-grid-portal" id="gridPortal">

    <!-- Neon Grid Background Layer -->
    <div class="ease-grid-lines"></div>

    <!-- Dashboard Card Grid -->
    <div class="ease-glow-grid">

      <!-- Example Metric Card -->
      <div class="ease-glow-card" data-glow="primary">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">⚡</span>
            <span class="card-title">CPU Usage</span>
          </div>
          <div class="card-metric" id="cpuMetric">74%</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="cpuBar" style="width: 74%;"></div>
          </div>
        </div>
      </div>

      <div class="ease-glow-card" data-glow="secondary">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🌐</span>
            <span class="card-title">Network Ingress</span>
          </div>
          <div class="card-metric" id="netMetric">1.2 GB/s</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="netBar" style="width: 60%;"></div>
          </div>
        </div>
      </div>

      <div class="ease-glow-card" data-glow="success">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🧠</span>
            <span class="card-title">RAM Usage</span>
          </div>
          <div class="card-metric" id="ramMetric">58%</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="ramBar" style="width: 58%;"></div>
          </div>
        </div>
      </div>

      <div class="ease-glow-card" data-glow="warning">
        <div class="ease-glow-card-body">
          <div class="card-header">
            <span class="card-icon">🗄️</span>
            <span class="card-title">DB Query Rate</span>
          </div>
          <div class="card-metric" id="dbMetric">340 q/s</div>
          <div class="card-bar">
            <div class="card-bar-fill" id="dbBar" style="width: 85%;"></div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    const gridPortal = document.getElementById('gridPortal');
    
    // Mouse tracking for the radial mask
    gridPortal.addEventListener('mousemove', (e) => {
      const rect = gridPortal.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      gridPortal.style.setProperty('--mouse-x', `${x}px`);
      gridPortal.style.setProperty('--mouse-y', `${y}px`);
    });

    // 3D Parallax Tilt for cards
    const cards = document.querySelectorAll('.ease-glow-card');
    cards.forEach(card => {
      const body = card.querySelector('.ease-glow-card-body');
      
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;
        
        const rotateX = ((y - centerY) / centerY) * -10;
        const rotateY = ((x - centerX) / centerX) * 10;
        
        body.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
      });
      
      card.addEventListener('mouseleave', () => {
        body.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
      });
    });

    // Dynamic Metric Simulator
    setInterval(() => {
      const cpu = 60 + Math.random() * 30;
      document.getElementById('cpuMetric').innerText = `${Math.round(cpu)}%`;
      document.getElementById('cpuBar').style.width = `${cpu}%`;

      const net = 0.8 + Math.random() * 0.8;
      document.getElementById('netMetric').innerText = `${net.toFixed(1)} GB/s`;
      document.getElementById('netBar').style.width = `${(net / 2) * 100}%`;

      const ram = 50 + Math.random() * 20;
      document.getElementById('ramMetric').innerText = `${Math.round(ram)}%`;
      document.getElementById('ramBar').style.width = `${ram}%`;

      const db = 300 + Math.random() * 150;
      document.getElementById('dbMetric').innerText = `${Math.round(db)} q/s`;
      document.getElementById('dbBar').style.width = `${(db / 500) * 100}%`;
    }, 2000);
  </script>
</body>
</html>
