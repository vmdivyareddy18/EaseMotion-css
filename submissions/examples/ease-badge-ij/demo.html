<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-badge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Notification Badges</h1>
    <div class="badge-grid">
      <div class="badge-item">
        <div class="icon-wrapper">
          <span class="icon">&#9993;</span>
          <span class="badge badge-number">3</span>
        </div>
        <span class="badge-label">Number</span>
      </div>
      <div class="badge-item">
        <div class="icon-wrapper">
          <span class="icon">&#9881;</span>
          <span class="badge badge-dot"></span>
        </div>
        <span class="badge-label">Dot</span>
      </div>
      <div class="badge-item">
        <div class="icon-wrapper">
          <span class="icon">&#128276;</span>
          <span class="badge badge-pulse">!</span>
        </div>
        <span class="badge-label">Pulse</span>
      </div>
      <div class="badge-item">
        <div class="icon-wrapper">
          <span class="icon">&#128722;</span>
          <span class="badge badge-number">99+</span>
        </div>
        <span class="badge-label">Overflow</span>
      </div>
    </div>
  </div>
</body>
</html>
