<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error Page 404 — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="float-container">
      <div class="float-item" style="--i:0">✦</div>
      <div class="float-item" style="--i:1">◆</div>
      <div class="float-item" style="--i:2">●</div>
      <div class="float-item" style="--i:3">▲</div>
      <div class="float-item" style="--i:4">■</div>
      <div class="float-item" style="--i:5">★</div>
    </div>
    <div class="error-code">404</div>
    <h1>Page not found</h1>
    <p class="message">The page you're looking for doesn't exist or has been moved.</p>
    <div class="actions">
      <button class="btn btn-primary" id="goHomeBtn">Go Home</button>
      <button class="btn btn-secondary" id="toggleFloatBtn">Toggle Float</button>
    </div>
  </div>
  <script>
    document.getElementById('goHomeBtn').addEventListener('click', () => {
      document.querySelector('.float-container').classList.add('burst');
      setTimeout(() => document.querySelector('.float-container').classList.remove('burst'), 600);
    });
    document.getElementById('toggleFloatBtn').addEventListener('click', () => {
      document.querySelector('.float-container').classList.toggle('paused');
    });
  </script>
</body>
</html>
