<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Shake Calendar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Background Blur -->
    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <main class="calendar-wrapper">

        <section class="calendar-card ease-hover-shake ease-float" aria-label="Animated Calendar">

            <!-- Header -->
            <header class="calendar-header">

                <div class="month-info">
                    <span class="small-text">EVENT PLANNER</span>
                    <h1>July 2026</h1>
                    <p class="month-subtitle">
                        Stay organized with smooth motion
                    </p>
                </div>

                <div class="calendar-actions">

                    <button class="icon-btn" aria-label="Previous Month">
                        &#10094;
                    </button>

                    <button class="icon-btn" aria-label="Next Month">
                        &#10095;
                    </button>

                </div>

            </header>

            <!-- Event Strip -->
            <div class="event-strip">

                <div class="event-dot"></div>

                <span>
                    3 Meetings Scheduled
                </span>

            </div>

            <!-- Week Days -->
            <div class="weekdays">

                <span>Sun</span>
                <span>Mon</span>
                <span>Tue</span>
                <span>Wed</span>
                <span>Thu</span>
                <span>Fri</span>
                <span>Sat</span>

            </div>

            <!-- Dates -->
            <div class="days">

                <span></span>
                <span></span>

                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>4</button>

                <button>5</button>
                <button>6</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>

                <button class="today ease-pop">
                    10
                </button>

                <button>11</button>
                <button>12</button>
                <button>13</button>
                <button>14</button>
                <button>15</button>
                <button>16</button>
                <button>17</button>
                <button>18</button>
                <button>19</button>
                <button>20</button>
                <button>21</button>
                <button>22</button>
                <button>23</button>
                <button>24</button>
                <button>25</button>
                <button>26</button>
                <button>27</button>
                <button>28</button>
                <button>29</button>
                <button>30</button>
                <button>31</button>

            </div>

        </section>

    </main>

</body>

</html>
