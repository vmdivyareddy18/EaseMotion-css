<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Location Pin Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Location Pin Bounce</h1>

    <p>
      A reusable location marker animation inspired by maps,
      travel platforms, and delivery tracking systems.
    </p>

    <div class="demo-grid">

      <button class="location-button">
        <span class="location-pin">📍</span>
      </button>

      <button class="location-button card-style">
        <span class="location-pin">📍</span>
        <span>Current Location</span>
      </button>

      <div class="map-card">
        <h3>Delivery Tracking</h3>
        <p>Your order is nearby.</p>

        <button class="location-button small">
          <span class="location-pin">📍</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
