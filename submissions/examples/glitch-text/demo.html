<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glitch Text Effect Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #0a0a0a;
      margin: 0;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      max-width: 800px;
    }
    h2 {
      margin-bottom: 50px;
      font-weight: 300;
      color: #888;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: 4px;
    }
    .demo-row {
      display: flex;
      flex-direction: column;
      gap: 40px;
      align-items: center;
    }
    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .label {
      font-size: 12px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    /* Cyberpunk subtitle */
    .cyber-subtitle {
      font-size: 14px;
      color: #00ff9f;
      margin-top: 20px;
      letter-spacing: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Glitch Text Effect</h2>
    
    <div class="demo-row">
      <!-- Default Glitch -->
      <div class="demo-item">
        <h1 class="glitch-text" data-text="SYSTEM ERROR">SYSTEM ERROR</h1>
        <span class="label">Default Glitch</span>
      </div>
      
      <!-- Glitch with custom colors -->
      <div class="demo-item">
        <h1 class="glitch-text glitch-cyan" data-text="NEON CITY">NEON CITY</h1>
        <span class="label">Cyan Variant</span>
      </div>
      
      <!-- Glitch with slow speed -->
      <div class="demo-item">
        <h1 class="glitch-text glitch-slow" data-text="DATA BREACH">DATA BREACH</h1>
        <span class="label">Slow Glitch</span>
      </div>
      
      <!-- Glitch on hover only -->
      <div class="demo-item">
        <h1 class="glitch-hover" data-text="HOVER ME">HOVER ME</h1>
        <span class="label">Hover Triggered</span>
      </div>
    </div>
    
    <p class="cyber-subtitle glitch-text" data-text="CYBERPUNK 2077">CYBERPUNK 2077</p>
  </div>
</body>
</html>
