<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Inbox List — Swipe to Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <div class="inbox-card">
    <h2 class="inbox-title">Inbox</h2>
    <ul class="inbox-list">
      <li class="inbox-item" tabindex="0">
        <div class="item-content">
          <span class="item-sender">Alice Chen</span>
          <span class="item-preview">See you at the meeting tomorrow?</span>
        </div>
        <button class="archive-btn" aria-label="Archive">📦</button>
      </li>
      <li class="inbox-item" tabindex="0">
        <div class="item-content">
          <span class="item-sender">Bob Martinez</span>
          <span class="item-preview">The final report is ready for review.</span>
        </div>
        <button class="archive-btn" aria-label="Archive">📦</button>
      </li>
      <li class="inbox-item" tabindex="0">
        <div class="item-content">
          <span class="item-sender">Carol Nguyen</span>
          <span class="item-preview">Don't forget about the team lunch!</span>
        </div>
        <button class="archive-btn" aria-label="Archive">📦</button>
      </li>
      <li class="inbox-item" tabindex="0">
        <div class="item-content">
          <span class="item-sender">Dave Kim</span>
          <span class="item-preview">Updated the deployment script.</span>
        </div>
        <button class="archive-btn" aria-label="Archive">📦</button>
      </li>
    </ul>
    <p class="inbox-hint">Swipe left or click 📦 to archive</p>
  </div>
</body>
</html>
