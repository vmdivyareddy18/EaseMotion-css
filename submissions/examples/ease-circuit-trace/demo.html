<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-circuit-trace</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>&#9889; ease-circuit-trace</h1>
  <p>SVG circuit board trace animation — electricity flows through the paths</p>

  <div class="circuit-board">
    <svg width="500" height="340" viewBox="0 0 500 340" xmlns="http://www.w3.org/2000/svg">

      <!-- Static trace background (dim) -->
      <path class="circuit-trace" d="M 40 80 H 140 V 40 H 260 V 80 H 360 V 40 H 460"/>
      <path class="circuit-trace" d="M 40 170 H 100 V 80"/>
      <path class="circuit-trace" d="M 460 170 H 400 V 80"/>
      <path class="circuit-trace" d="M 40 260 H 140 V 300 H 260 V 260 H 360 V 300 H 460"/>
      <path class="circuit-trace" d="M 40 170 H 100 V 260"/>
      <path class="circuit-trace" d="M 460 170 H 400 V 260"/>
      <path class="circuit-trace" d="M 200 170 V 80"/>
      <path class="circuit-trace" d="M 300 170 V 80"/>
      <path class="circuit-trace" d="M 200 170 V 260"/>
      <path class="circuit-trace" d="M 300 170 V 260"/>

      <!-- Animated flow — GREEN path -->
      <path id="flowPath1" class="circuit-flow path-1"
        d="M 40 80 H 140 V 40 H 260 V 80 H 360 V 40 H 460"/>

      <!-- Animated flow — BLUE path -->
      <path id="flowPath2" class="circuit-flow path-2"
        d="M 40 170 H 100 V 80 H 200 V 170"/>

      <!-- Animated flow — PURPLE path -->
      <path id="flowPath3" class="circuit-flow path-3"
        d="M 460 170 H 400 V 260 H 300 V 170"/>

      <!-- IC Chip (center) -->
      <rect class="ic-chip" x="185" y="140" width="130" height="60"/>
      <text class="ic-label" x="250" y="163">IC-7400</text>
      <text class="ic-label" x="250" y="178" style="font-size:8px;fill:#00ff8880">EaseMotion</text>

      <!-- IC chip pins -->
      <line x1="185" y1="155" x2="170" y2="155" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="185" y1="170" x2="170" y2="170" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="315" y1="155" x2="330" y2="155" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="315" y1="170" x2="330" y2="170" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="215" y1="140" x2="215" y2="125" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="250" y1="140" x2="250" y2="125" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="285" y1="140" x2="285" y2="125" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="215" y1="200" x2="215" y2="215" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="250" y1="200" x2="250" y2="215" stroke="#00ff8860" stroke-width="1.5"/>
      <line x1="285" y1="200" x2="285" y2="215" stroke="#00ff8860" stroke-width="1.5"/>

      <!-- Node pads — GREEN -->
      <circle class="node-pad green node-pulse" cx="40"  cy="80"  r="6"/>
      <circle class="node-pad green node-pulse" cx="460" cy="80"  r="6"/>
      <circle class="node-pad green"            cx="260" cy="40"  r="5"/>

      <!-- Node pads — BLUE -->
      <circle class="node-pad blue node-pulse" cx="40"  cy="170" r="6"/>
      <circle class="node-pad blue"            cx="100" cy="80"  r="5"/>
      <circle class="node-pad blue"            cx="200" cy="170" r="5"/>

      <!-- Node pads — PURPLE -->
      <circle class="node-pad purple node-pulse" cx="460" cy="170" r="6"/>
      <circle class="node-pad purple"            cx="400" cy="260" r="5"/>
      <circle class="node-pad purple"            cx="300" cy="170" r="5"/>

      <!-- Corner pads -->
      <circle class="node-pad green" cx="40"  cy="260" r="6"/>
      <circle class="node-pad green" cx="460" cy="260" r="6"/>

      <!-- Glowing travelling dots via animateMotion -->
      <circle class="glow-dot dot-1" r="4" fill="#00ff88">
        <animateMotion dur="3s" repeatCount="indefinite"
          path="M 40 80 H 140 V 40 H 260 V 80 H 360 V 40 H 460"/>
      </circle>

      <circle class="glow-dot dot-2" r="4" fill="#00ccff">
        <animateMotion dur="3s" begin="0.8s" repeatCount="indefinite"
          path="M 40 170 H 100 V 80 H 200 V 170"/>
      </circle>

      <circle class="glow-dot dot-3" r="4" fill="#aa00ff">
        <animateMotion dur="3s" begin="1.6s" repeatCount="indefinite"
          path="M 460 170 H 400 V 260 H 300 V 170"/>
      </circle>

    </svg>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot green"></div>
      <span>Power trace</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot blue"></div>
      <span>Data trace</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot purple"></div>
      <span>Signal trace</span>
    </div>
  </div>

</body>
</html>
