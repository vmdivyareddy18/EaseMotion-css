<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notification Badge Pop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion micro interaction</p>
    <h1 id="demo-title">Notification badge pop</h1>
    <p class="intro">A focused badge animation for inbox buttons, alerts, and real-time dashboard updates.</p>

    <button class="notify-button" type="button">
      <span class="bell" aria-hidden="true">!</span>
      New activity
      <span class="badge" aria-label="4 unread notifications">4</span>
    </button>
  </main>
</body>
</html>
