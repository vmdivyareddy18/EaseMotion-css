<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Morphing Blob Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="blob-title">
        <p class="eyebrow">Decorative motion</p>
        <h1 id="blob-title">Morphing blob animation</h1>
        <p class="intro">

        <div class="blob-grid" aria-label="Blob samples">
          <div class="ease-blob slow" aria-hidden="true"></div>
          <div class="ease-blob fast" aria-hidden="true"></div>
        </div>
      </section>
    </main>
