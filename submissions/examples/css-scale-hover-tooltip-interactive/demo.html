<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Interface Tooltip // Pure CSS Scale Hover Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #11111b; /* Dashboard Cockpit Midnight Dark Fill */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-interactive-tooltip-wrapper">
    <button class="ease-interactive-tooltip-target" aria-describedby="action-trigger-tooltip">
      Control Panel Settings
    </button>
    
    <div id="action-trigger-tooltip" class="ease-interactive-tooltip-content" role="tooltip">
      Configure device endpoints and hardware parameters.
    </div>
  </div>

</body>
</html>
