<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Border Draw (Accessible + Reverse) Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    a.border-draw-a11y {
      color: #333;
      text-decoration: none;
      font-weight: 600;
      background: white;
      border-radius: 4px;
    }

    p.hint {
      color: #888;
      font-size: 0.85rem;
      max-width: 320px;
      text-align: center;
    }
  </style>
</head>
<body>

  <a href="#" class="border-draw-a11y">Hover or Tab-focus me</a>

  <p class="hint">
    Try hovering, then moving the mouse away — the border retracts in
    reverse sequence. Also try Tab key navigation for keyboard focus.
  </p>

</body>
</html>
