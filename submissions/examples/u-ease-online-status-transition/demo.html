<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-online-status-transition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>ease-online-status-transition</h1>
    <p class="subtitle">
        Smooth transitions between online, away and offline states
    </p>

    <div class="status-grid">

        <div class="user-card online">
            <div class="avatar">
                <span class="status-dot"></span>
            </div>
            <h3>Alex Johnson</h3>
            <p>Online Now</p>
        </div>

        <div class="user-card away">
            <div class="avatar">
                <span class="status-dot"></span>
            </div>
            <h3>Emma Wilson</h3>
            <p>Away</p>
        </div>

        <div class="user-card offline">
            <div class="avatar">
                <span class="status-dot"></span>
            </div>
            <h3>David Brown</h3>
            <p>Offline</p>
        </div>

        <div class="user-card busy">
            <div class="avatar">
                <span class="status-dot"></span>
            </div>
            <h3>Sarah Lee</h3>
            <p>Busy</p>
        </div>

    </div>

    <section class="demo-panel">

        <h2>Status Examples</h2>

        <div class="badge-row">
            <span class="badge online-badge">Online</span>
            <span class="badge away-badge">Away</span>
            <span class="badge busy-badge">Busy</span>
            <span class="badge offline-badge">Offline</span>
        </div>

    </section>

    <section class="timeline">

        <div class="step">
            <div class="step-dot online-dot"></div>
            <span>Online</span>
        </div>

        <div class="step">
            <div class="step-dot away-dot"></div>
            <span>Away</span>
        </div>

        <div class="step">
            <div class="step-dot busy-dot"></div>
            <span>Busy</span>
        </div>

        <div class="step">
            <div class="step-dot offline-dot"></div>
            <span>Offline</span>
        </div>

    </section>

</div>

</body>
</html>
