<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Font Variant Numeric Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <h1>Font Variant Numeric</h1>
    <p class="note">Controls the rendering of numbers in supported fonts.</p>

    <div class="label">num-normal</div>
    <div class="demo-num num-normal">0123456789</div>

    <div class="label">num-lining</div>
    <div class="demo-num num-lining">0123456789</div>

    <div class="label">num-oldstyle</div>
    <div class="demo-num num-oldstyle">0123456789</div>

    <div class="label">num-tabular</div>
    <div class="demo-num num-tabular">0123456789</div>

    <div class="label">num-slash-zero</div>
    <div class="demo-num num-slashed-zero">0123456789</div>
  </body>
</html>
