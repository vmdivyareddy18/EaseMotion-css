<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion: hover-scrub-video</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <div class="video-container" id="videoContainer">
      <video id="video" src="https://www.w3schools.com/html/mov_bbb.mp4" muted preload="auto"></video>
      <div class="scrubber"><div class="scrubber-track" id="scrubTrack"></div></div>
    </div>
    <h2>Scrub Video</h2>
    <p>Hover and move your mouse left/right across the video to scrub frames.</p>
    <div class="controls">
      <label>Scrubber <input type="color" id="scrubColor" value="#48dbfb"></label>
      <label>Width <input type="range" id="vidWidth" min="200" max="480" value="320"></label>
      <label>Height <input type="range" id="vidHeight" min="120" max="320" value="180"></label>
    </div>
  </div>
  <script>
    const video = document.getElementById('video');
    const container = document.getElementById('videoContainer');
    const track = document.getElementById('scrubTrack');

    video.addEventListener('loadedmetadata', () => {
      video.currentTime = 0;
    });

    container.addEventListener('mousemove', e => {
      if (!video.duration) return;
      const rect = container.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      const clamped = Math.max(0, Math.min(1, x));
      video.currentTime = clamped * video.duration;
      track.style.width = (clamped * 100) + '%';
    });

    document.getElementById('scrubColor').addEventListener('input', e => {
      card.style.setProperty('--scrubber-color', e.target.value);
    });

    document.getElementById('vidWidth').addEventListener('input', e => {
      card.style.setProperty('--video-width', e.target.value + 'px');
    });

    document.getElementById('vidHeight').addEventListener('input', e => {
      card.style.setProperty('--video-height', e.target.value + 'px');
    });
  </script>
</body>
</html>
