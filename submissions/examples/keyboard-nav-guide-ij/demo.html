<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Nav Guide - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Keyboard Nav Guide</h1>

    <!-- Tabs -->
    <div class="test-section">
      <h2>Tabs</h2>
      <div class="tabs" role="tablist">
        <button class="tab active" role="tab" tabindex="0" aria-selected="true">Tab 1</button>
        <button class="tab" role="tab" tabindex="-1" aria-selected="false">Tab 2</button>
        <button class="tab" role="tab" tabindex="-1" aria-selected="false">Tab 3</button>
      </div>
      <div class="tab-panel active">Content for Tab 1</div>
      <div class="tab-panel">Content for Tab 2</div>
      <div class="tab-panel">Content for Tab 3</div>
    </div>

    <!-- Dropdown -->
    <div class="test-section">
      <h2>Dropdown</h2>
      <div class="dropdown">
        <button class="dropdown-trigger" id="dropdownBtn" aria-haspopup="true" aria-expanded="false">Options</button>
        <div class="dropdown-menu" id="dropdownMenu" role="menu">
          <button class="dropdown-item" role="menuitem" tabindex="-1">Edit</button>
          <button class="dropdown-item" role="menuitem" tabindex="-1">Duplicate</button>
          <button class="dropdown-item danger" role="menuitem" tabindex="-1">Delete</button>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="test-section">
      <h2>Modal</h2>
      <button class="modal-trigger" id="modalBtn">Open Modal</button>
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <div class="modal-header">
            <h3 id="modalTitle">Confirm Action</h3>
            <button class="modal-close" id="modalClose">&times;</button>
          </div>
          <div class="modal-body">
            <p>Are you sure you want to proceed? Press Escape to close.</p>
          </div>
          <div class="modal-footer">
            <button class="modal-btn cancel" id="modalCancel">Cancel</button>
            <button class="modal-btn confirm">Confirm</button>
          </div>
        </div>
      </div>
    </div>

    <p class="description">Navigate with Tab, use Enter/Space to activate, Escape to close modals/dropdowns. Focus is trapped inside modals.</p>
  </div>

  <script>
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); t.tabIndex = -1; });
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active'); tab.setAttribute('aria-selected', 'true'); tab.tabIndex = 0;
        const idx = Array.from(tab.parentElement.children).indexOf(tab);
        document.querySelectorAll('.tab-panel')[idx].classList.add('active');
      });
      tab.addEventListener('keydown', e => {
        const tabs = Array.from(tab.parentElement.children);
        const idx = tabs.indexOf(tab);
        if (e.key === 'ArrowRight') { e.preventDefault(); tabs[(idx + 1) % tabs.length].click(); tabs[(idx + 1) % tabs.length].focus(); }
        if (e.key === 'ArrowLeft') { e.preventDefault(); tabs[(idx - 1 + tabs.length) % tabs.length].click(); tabs[(idx - 1 + tabs.length) % tabs.length].focus(); }
      });
    });

    // Dropdown
    const dropdownBtn = document.getElementById('dropdownBtn');
    const dropdownMenu = document.getElementById('dropdownMenu');
    dropdownBtn.addEventListener('click', () => {
      const open = dropdownMenu.classList.toggle('open');
      dropdownBtn.setAttribute('aria-expanded', open);
      if (open) dropdownMenu.querySelector('.dropdown-item').focus();
    });
    dropdownBtn.addEventListener('keydown', e => { if (e.key === 'Escape') { dropdownMenu.classList.remove('open'); dropdownBtn.setAttribute('aria-expanded', 'false'); dropdownBtn.focus(); } });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { dropdownMenu.classList.remove('open'); dropdownBtn.setAttribute('aria-expanded', 'false'); dropdownBtn.focus(); } });
    document.querySelectorAll('.dropdown-item').forEach(item => {
      item.addEventListener('click', () => { dropdownMenu.classList.remove('open'); dropdownBtn.setAttribute('aria-expanded', 'false'); dropdownBtn.focus(); });
    });

    // Modal
    const modalBtn = document.getElementById('modalBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const modalCancel = document.getElementById('modalCancel');
    function openModal() { modalOverlay.classList.add('open'); modalClose.focus(); }
    function closeModal() { modalOverlay.classList.remove('open'); modalBtn.focus(); }
    modalBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && modalOverlay.classList.contains('open')) closeModal(); });
    // Focus trap
    modalOverlay.addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      const focusable = modalOverlay.querySelectorAll('button:not([disabled])');
      const first = focusable[0]; const last = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
  </script>
</body>
</html>
