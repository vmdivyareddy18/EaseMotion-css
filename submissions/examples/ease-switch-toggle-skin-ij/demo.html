<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Switch Toggle Skin | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sts-container">
    <h1>Switch Toggle Skin</h1>
    <p class="sts-subtitle">Toggle switch with multiple skins and styles</p>

    <div class="sts-skins">
      <button class="sts-skin-btn sts-active" data-skin="pill">Pill</button>
      <button class="sts-skin-btn" data-skin="square">Square</button>
      <button class="sts-skin-btn" data-skin="material">Material</button>
    </div>

    <div class="sts-colors">
      <button class="sts-color-btn" data-color="#6366f1" style="--c:#6366f1"></button>
      <button class="sts-color-btn sts-active" data-color="#22c55e" style="--c:#22c55e"></button>
      <button class="sts-color-btn" data-color="#f59e0b" style="--c:#f59e0b"></button>
      <button class="sts-color-btn" data-color="#ef4444" style="--c:#ef4444"></button>
      <button class="sts-color-btn" data-color="#3b82f6" style="--c:#3b82f6"></button>
    </div>

    <div class="sts-demo" id="demoArea">
      <div class="sts-row">
        <span class="sts-label">Wi-Fi</span>
        <label class="sts-switch sts-skin-pill" id="switch1">
          <input type="checkbox" />
          <span class="sts-track">
            <span class="sts-handle">
              <svg class="sts-icon sts-off-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="currentColor"/>
              </svg>
              <svg class="sts-icon sts-on-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z" fill="currentColor"/>
              </svg>
            </span>
          </span>
        </label>
      </div>

      <div class="sts-row">
        <span class="sts-label">Dark Mode</span>
        <label class="sts-switch sts-skin-pill" id="switch2">
          <input type="checkbox" />
          <span class="sts-track">
            <span class="sts-handle">
              <svg class="sts-icon sts-off-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M20 15.31C18.75 15.73 17.41 16 16 16c-5.52 0-10-4.48-10-10 0-1.41.27-2.75.69-4A10.006 10.006 0 0012 22c5.52 0 10-4.48 10-10 0-.69-.07-1.37-.2-2.02 0 0-1.07.63-1.8 1.33z" fill="currentColor"/>
              </svg>
              <svg class="sts-icon sts-on-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zm0-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="currentColor"/>
              </svg>
            </span>
          </span>
        </label>
      </div>

      <div class="sts-row">
        <span class="sts-label">Notifications</span>
        <label class="sts-switch sts-skin-pill" id="switch3">
          <input type="checkbox" checked />
          <span class="sts-track">
            <span class="sts-handle">
              <svg class="sts-icon sts-off-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z" fill="currentColor"/>
              </svg>
              <svg class="sts-icon sts-on-icon" viewBox="0 0 24 24" width="14" height="14">
                <path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm-3-8v-3c0-2.21 1.79-4 4-4s4 1.79 4 4v3l2 2v1H7v-1l2-2zm5-10.26c.58.27 1.11.66 1.55 1.14L9 11.7V11c0-2.21 1.79-4 4-4 .63 0 1.22.12 1.77.34L14 6.02V3.74z" fill="currentColor"/>
              </svg>
            </span>
          </span>
        </label>
      </div>
    </div>
  </div>

  <script>
    const skinBtns = document.querySelectorAll('.sts-skin-btn');
    const colorBtns = document.querySelectorAll('.sts-color-btn');
    const switches = document.querySelectorAll('.sts-switch');
    const demoArea = document.getElementById('demoArea');

    let currentSkin = 'pill';
    let currentColor = '#22c55e';

    function applySkin(skin) {
      switches.forEach(s => {
        s.className = `sts-switch sts-skin-${skin}`;
      });
      demoArea.style.setProperty('--sts-active-color', currentColor);
    }

    function applyColor(color) {
      currentColor = color;
      demoArea.style.setProperty('--sts-active-color', color);
    }

    skinBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        skinBtns.forEach(b => b.classList.remove('sts-active'));
        btn.classList.add('sts-active');
        currentSkin = btn.dataset.skin;
        applySkin(currentSkin);
      });
    });

    colorBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        colorBtns.forEach(b => b.classList.remove('sts-active'));
        btn.classList.add('sts-active');
        applyColor(btn.dataset.color);
      });
    });

    applySkin('pill');
    applyColor('#22c55e');
  </script>
</body>
</html>
