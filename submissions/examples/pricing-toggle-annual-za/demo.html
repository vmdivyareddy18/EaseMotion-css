<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pricing Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pricing-page">
    <h1>Choose Your Plan</h1>
    <div class="toggle-switch">
      <span class="toggle-label active" id="monthlyLabel">Monthly</span>
      <label class="pricing-toggle">
        <input type="checkbox" id="pricingCheck">
        <span class="toggle-slider"></span>
      </label>
      <span class="toggle-label" id="annualLabel">Annual <span class="save-badge">Save 20%</span></span>
    </div>
    <div class="pricing-cards">
      <div class="price-card">
        <h3>Starter</h3>
        <div class="price-display">
          <span class="price-amount" data-monthly="19" data-annual="15">$19</span>
          <span class="price-period">/month</span>
        </div>
        <ul class="price-features">
          <li>5 Projects</li>
          <li>10GB Storage</li>
          <li>Basic Support</li>
        </ul>
        <button class="price-btn">Get Started</button>
      </div>
      <div class="price-card featured">
        <span class="popular-badge">Popular</span>
        <h3>Pro</h3>
        <div class="price-display">
          <span class="price-amount" data-monthly="49" data-annual="39">$49</span>
          <span class="price-period">/month</span>
        </div>
        <ul class="price-features">
          <li>Unlimited Projects</li>
          <li>100GB Storage</li>
          <li>Priority Support</li>
        </ul>
        <button class="price-btn">Get Started</button>
      </div>
    </div>
  </div>
  <script>
    const check = document.getElementById("pricingCheck");
    const monthLabel = document.getElementById("monthlyLabel");
    const annualLabel = document.getElementById("annualLabel");
    const amounts = document.querySelectorAll(".price-amount");
    const periods = document.querySelectorAll(".price-period");
    function updatePricing() {
      const isAnnual = check.checked;
      monthLabel.classList.toggle("active", !isAnnual);
      annualLabel.classList.toggle("active", isAnnual);
      amounts.forEach(el => {
        const val = isAnnual ? el.dataset.annual : el.dataset.monthly;
        el.textContent = "$" + val;
      });
      periods.forEach(el => {
        el.textContent = isAnnual ? "/year" : "/month";
      });
    }
    check.addEventListener("change", updatePricing);
  </script>
</body>
</html>
