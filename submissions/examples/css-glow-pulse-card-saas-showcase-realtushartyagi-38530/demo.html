<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaaS Showcase Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="saas-layout-container">
    
    <!-- SaaS Showcase Glow Pulse Card -->
    <div class="ease-saas-glow-card">
      
      <!-- Glowing Animated Backdrop -->
      <div class="ease-saas-glow-layer layer-1"></div>
      <div class="ease-saas-glow-layer layer-2"></div>
      
      <!-- Card Content -->
      <div class="ease-saas-content">
        <div class="saas-header">
          <div class="saas-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
              <polyline points="2 17 12 22 22 17"></polyline>
              <polyline points="2 12 12 17 22 12"></polyline>
            </svg>
          </div>
          <span class="saas-badge">Pro Plan</span>
        </div>
        
        <h2 class="saas-title">Advanced Analytics</h2>
        <p class="saas-description">
          Unlock deep insights with our state-of-the-art dashboard components. Premium aesthetics designed specifically for modern SaaS platforms.
        </p>
        
        <ul class="saas-features">
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Real-time data streaming</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Custom reporting engines</li>
          <li><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Premium widget library</li>
        </ul>
        
        <button class="saas-btn">Upgrade Now</button>
      </div>
      
    </div>

  </div>

</body>
</html>
