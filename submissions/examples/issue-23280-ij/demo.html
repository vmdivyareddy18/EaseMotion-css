<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="solar-system"><div class="sun"></div>
<div class="orbit-ring" style="--r:1;--c:#94a3b8;--d:4s"><div class="planet p1"></div></div>
<div class="orbit-ring" style="--r:2;--c:#f59e0b;--d:6s"><div class="planet p2"></div></div>
<div class="orbit-ring" style="--r:3;--c:#3b82f6;--d:8s"><div class="planet p3"></div></div>
<div class="orbit-ring" style="--r:4;--c:#ef4444;--d:11s"><div class="planet p4"></div></div></div>
  </div>
</body>
</html>
