<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>NFT Card Gallery</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='card-bg')r.style.setProperty('--card-bg',t.value);if(t.name==='accent-color')r.style.setProperty('--accent-color',t.value);if(t.name==='text-color')r.style.setProperty('--text-color',t.value);if(t.name==='tilt-duration')r.style.setProperty('--tilt-duration',t.value+'s')})</script>
<div class="container"><p class="title">NFT Card Gallery</p>
<div class="nft-grid"><div class="nft-card"><div class="nft-img"><span class="nft-overlay">&#128065;</span></div><div class="nft-info"><div class="nft-name">Cosmic Wave</div><div class="nft-eth">0.42 ETH</div></div></div>
<div class="nft-card"><div class="nft-img"><span class="nft-overlay">&#128065;</span></div><div class="nft-info"><div class="nft-name">Neon Pulse</div><div class="nft-eth">0.18 ETH</div></div></div>
<div class="nft-card"><div class="nft-img"><span class="nft-overlay">&#128065;</span></div><div class="nft-info"><div class="nft-name">Cyber Bloom</div><div class="nft-eth">0.33 ETH</div></div></div></div>
<div class="controls"><label>BG: <input type="color" name="card-bg" value="#2d2d44"></label><label>Accent: <input type="color" name="accent-color" value="#f72585"></label><label>Text: <input type="color" name="text-color" value="#ccc"></label><label>Speed: <input type="range" name="tilt-duration" min="0.2" max="1" step="0.05" value="0.35"></label></div></div></body></html>
