<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analog Clock UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Analog Clock</h1>
  <div class="clock" id="clock">
    <div class="clock-face">
      <span class="clock-number" style="--n:12">12</span>
      <span class="clock-number" style="--n:1">1</span>
      <span class="clock-number" style="--n:2">2</span>
      <span class="clock-number" style="--n:3">3</span>
      <span class="clock-number" style="--n:4">4</span>
      <span class="clock-number" style="--n:5">5</span>
      <span class="clock-number" style="--n:6">6</span>
      <span class="clock-number" style="--n:7">7</span>
      <span class="clock-number" style="--n:8">8</span>
      <span class="clock-number" style="--n:9">9</span>
      <span class="clock-number" style="--n:10">10</span>
      <span class="clock-number" style="--n:11">11</span>
    </div>
    <div class="clock-center"></div>
    <div class="clock-hand clock-hand--hour" id="hourHand"></div>
    <div class="clock-hand clock-hand--minute" id="minHand"></div>
    <div class="clock-hand clock-hand--second" id="secHand"></div>
  </div>
  <script>
    const hourHand = document.getElementById('hourHand');
    const minHand = document.getElementById('minHand');
    const secHand = document.getElementById('secHand');

    function setTime() {
      const now = new Date();
      const sec = now.getSeconds();
      const min = now.getMinutes();
      const hr = now.getHours() % 12;

      const secDeg = sec * 6;
      const minDeg = min * 6 + sec * 0.1;
      const hrDeg = hr * 30 + min * 0.5;

      minHand.style.transform = `rotate(${minDeg}deg)`;
      hourHand.style.transform = `rotate(${hrDeg}deg)`;
      secHand.style.transform = `rotate(${secDeg}deg)`;
    }

    setTime();
    setInterval(setTime, 1000);
  </script>
</body>
</html>
