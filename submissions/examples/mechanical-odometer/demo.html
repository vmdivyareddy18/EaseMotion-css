<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mechanical Odometer - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="../../../components/cards.css">
  <link rel="stylesheet" href="../../../components/buttons.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-card">
    <h2 style="margin: 0; font-weight: 800;">Mechanical Odometer</h2>
    <p style="color: var(--ease-color-muted); font-size: var(--ease-text-sm); margin: 0;">
      Digits roll independently inside custom clipped boundaries using 3D translations.
    </p>

    <!-- Odometer Display -->
    <div class="ease-odometer">
      <!-- Thousands Column -->
      <div class="ease-odometer-digit">
        <div id="col-thousands" class="ease-odometer-column" style="--ease-digit-val: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <!-- Hundreds Column -->
      <div class="ease-odometer-digit">
        <div id="col-hundreds" class="ease-odometer-column" style="--ease-digit-val: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <!-- Tens Column -->
      <div class="ease-odometer-digit">
        <div id="col-tens" class="ease-odometer-column" style="--ease-digit-val: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
      <!-- Ones Column -->
      <div class="ease-odometer-digit">
        <div id="col-ones" class="ease-odometer-column" style="--ease-digit-val: 0;">
          <span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span>
        </div>
      </div>
    </div>

    <!-- Interactive Odometer Controls -->
    <div class="ease-flex ease-gap-4">
      <button id="random-btn" class="ease-btn ease-btn-primary ease-btn-sm ease-btn-pill ease-btn-hover" style="color:white;">
        🎲 Randomize Value
      </button>
      <button id="reset-btn" class="ease-btn ease-btn-outline ease-btn-sm ease-btn-pill ease-btn-hover">
        🔄 Reset
      </button>
    </div>
  </div>

  <script>
    const colThousands = document.getElementById('col-thousands');
    const colHundreds = document.getElementById('col-hundreds');
    const colTens = document.getElementById('col-tens');
    const colOnes = document.getElementById('col-ones');

    const updateOdometer = (val) => {
      // Split integer value into digits
      const paddedStr = String(val).padStart(4, '0');
      colThousands.style.setProperty('--ease-digit-val', paddedStr[0]);
      colHundreds.style.setProperty('--ease-digit-val', paddedStr[1]);
      colTens.style.setProperty('--ease-digit-val', paddedStr[2]);
      colOnes.style.setProperty('--ease-digit-val', paddedStr[3]);
    };

    document.getElementById('random-btn').addEventListener('click', () => {
      const randVal = Math.floor(Math.random() * 10000);
      updateOdometer(randVal);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      updateOdometer(0);
    });
  </script>

</body>
</html>
