<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Toast Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Notification Toasts</h2>
      <p class="subtitle">Click the button below to trigger animated popup notification toasts.</p>
      <button class="trigger-btn" id="toastBtn">Trigger Toast</button>
    </div>
  </div>

  <div class="toast-wrapper" id="toastWrapper"></div>

  <script>
    const toastBtn = document.getElementById('toastBtn');
    const toastWrapper = document.getElementById('toastWrapper');

    toastBtn.addEventListener('click', () => {
      const toast = document.createElement('div');
      toast.className = 'toast-card';
      toast.innerHTML = `
        <span class="toast-icon">💡</span>
        <div class="toast-content">
          <h4>New Alert</h4>
          <p>This is an automated workflow notification test!</p>
        </div>
      `;
      toastWrapper.appendChild(toast);

      // Auto dismiss
      setTimeout(() => {
        toast.classList.add('dismiss');
        setTimeout(() => {
          toast.remove();
        }, 3000);
      }, 3000);
    });
  </script>
</body>
</html>
