<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ease-contact-form">
    <h2 class="ease-form-title">Get in touch</h2>
    <p class="ease-form-subtitle">We'll get back within 24 hours.</p>

    <form id="contactForm" novalidate>
      <div class="ease-field-group">
        <input type="text" id="name" class="ease-floating-input" required />
        <label for="name" class="ease-floating-label">Name</label>
        <span class="ease-field-indicator"></span>
      </div>

      <div class="ease-field-group">
        <input type="email" id="email" class="ease-floating-input" required />
        <label for="email" class="ease-floating-label">Email</label>
        <span class="ease-field-indicator"></span>
      </div>

      <div class="ease-field-group">
        <input type="text" id="subject" class="ease-floating-input" required />
        <label for="subject" class="ease-floating-label">Subject</label>
        <span class="ease-field-indicator"></span>
      </div>

      <div class="ease-field-group">
        <textarea id="message" class="ease-floating-input ease-floating-textarea" rows="4" required></textarea>
        <label for="message" class="ease-floating-label">Message</label>
        <span class="ease-field-indicator"></span>
      </div>

      <button type="submit" class="ease-submit-btn">
        <span class="ease-submit-text">Send Message</span>
        <span class="ease-submit-loader"></span>
      </button>
    </form>

    <div class="ease-success-overlay" id="successOverlay">
      <div class="ease-success-content">
        <svg viewBox="0 0 52 52" width="52" height="52">
          <circle cx="26" cy="26" r="24" fill="none" stroke="#4ade80" stroke-width="3"
            stroke-dasharray="166" stroke-dashoffset="166" />
          <path d="M14 27l7 7 16-16" fill="none" stroke="#4ade80" stroke-width="3"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="48" stroke-dashoffset="48" />
        </svg>
        <h3>Message sent!</h3>
        <p>We'll be in touch soon.</p>
      </div>
    </div>
  </div>

  <script>
    const form = document.querySelector("#contactForm");
    const inputs = form.querySelectorAll(".ease-floating-input");

    inputs.forEach((input) => {
      input.addEventListener("blur", () => {
        if (input.validity.valid && input.value) {
          input.classList.remove("ease-field-invalid");
          input.classList.add("ease-field-valid");
        } else if (input.value) {
          input.classList.remove("ease-field-valid");
          input.classList.add("ease-field-invalid");
        } else {
          input.classList.remove("ease-field-valid", "ease-field-invalid");
        }
      });

      input.addEventListener("input", () => {
        if (input.classList.contains("ease-field-invalid") && input.validity.valid) {
          input.classList.remove("ease-field-invalid");
          input.classList.add("ease-field-valid");
        }
      });
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const btn = form.querySelector(".ease-submit-btn");
      btn.classList.add("ease-submit-loading");
      setTimeout(() => {
        btn.classList.remove("ease-submit-loading");
        document.getElementById("successOverlay").classList.add("ease-overlay-active");
      }, 1600);
    });
  </script>
</body>
</html>
