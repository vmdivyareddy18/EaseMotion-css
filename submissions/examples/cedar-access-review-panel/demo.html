<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cedar access review panel demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="cedar access review panel demo">
    <section class="motion-card" data-pattern="review">
      <div class="status-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="card-copy">
        <p class="eyebrow">Pending</p>
        <h1>cedar access review panel</h1>
        <p>Quarterly review with a focused motion cue that keeps status changes easy to scan.</p>
      </div>
      <div class="metric-panel" aria-label="Pending value">
        <strong>8</strong>
        <span>Pending</span>
      </div>
      <div class="progress-row" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
