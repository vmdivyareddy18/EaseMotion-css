<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full-page Modal Dialog</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <button class="modal-trigger" id="modalTrigger">Open Modal</button>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-header">
        <h2 id="modalTitle">Confirm Action</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <p>Are you sure you want to delete this item? This action cannot be undone. All associated data will be permanently removed.</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
