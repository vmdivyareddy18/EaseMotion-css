<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Fill Animate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'fill-color') root.style.setProperty('--fill-color', t.value);
      if (t.name === 'cell-size') root.style.setProperty('--cell-size', t.value + 'px');
      if (t.name === 'fill-delay') root.style.setProperty('--fill-delay', t.value + 's');
    });
    function replay() {
      document.querySelectorAll('.cell').forEach(c => { c.style.animation = 'none'; void c.offsetHeight; c.style.animation = ''; });
    }
  </script>
  <div class="container">
    <p class="title">Grid Fill Animate</p>
    <div class="grid">
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="controls">
      <label>Fill: <input type="color" name="fill-color" value="#4ecdc4"></label>
      <label>Size: <input type="range" name="cell-size" min="20" max="80" value="40"></label>
      <label>Delay: <input type="range" name="fill-delay" min="0.01" max="0.2" step="0.01" value="0.05"></label>
      <button class="replay-btn" onclick="replay()">Replay</button>
    </div>
  </div>
</body>
</html>
