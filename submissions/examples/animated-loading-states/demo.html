<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Loading States - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Loading States & Skeletons</h1>
      <p>A collection of accessible, animated loading indicators built entirely with EaseMotion CSS.</p>
    </header>

    <!-- Loading States Grid -->
    <div class="grid">
      
      <!-- 1. Profile Skeleton -->
      <div class="card ease-fade-in-up ease-delay-100">
        <h3>Profile Skeleton</h3>
        <div class="skeleton-profile">
          <div class="skeleton-avatar ease-pulse"></div>
          <div class="skeleton-lines">
            <div class="skeleton-line line-title ease-pulse ease-delay-100"></div>
            <div class="skeleton-line line-subtitle ease-pulse ease-delay-200"></div>
          </div>
        </div>
      </div>

      <!-- 2. Article List Skeleton -->
      <div class="card ease-fade-in-up ease-delay-200">
        <h3>Article List Skeleton</h3>
        <div class="skeleton-list">
          <div class="skeleton-item ease-pulse ease-delay-100"></div>
          <div class="skeleton-item ease-pulse ease-delay-200"></div>
          <div class="skeleton-item ease-pulse ease-delay-300"></div>
        </div>
      </div>

      <!-- 3. Classic Spinner -->
      <div class="card ease-fade-in-up ease-delay-300">
        <h3>Classic Spinner</h3>
        <div class="spinner-container">
          <div class="spinner ease-spin-slow"></div>
        </div>
      </div>

      <!-- 4. Pulsing Dots -->
      <div class="card ease-fade-in-up ease-delay-400">
        <h3>Pulsing Dots</h3>
        <div class="dots-container">
          <span class="dot ease-pulse ease-delay-100"></span>
          <span class="dot ease-pulse ease-delay-200"></span>
          <span class="dot ease-pulse ease-delay-300"></span>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
