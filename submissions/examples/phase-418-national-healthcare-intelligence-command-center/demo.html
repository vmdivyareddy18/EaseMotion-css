<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 418 - Healthcare Intelligence</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>National Healthcare Intelligence</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">94%</span><span class="stat-label">Health Index</span></div>
            <div class="stat-card"><span class="stat-value">78%</span><span class="stat-label">Bed Capacity</span></div>
            <div class="stat-card"><span class="stat-value">1,234</span><span class="stat-label">Critical Cases</span></div>
            <div class="stat-card"><span class="stat-value">4.2 min</span><span class="stat-label">Response</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Hospital Network</h2>
            <div class="grid-4">
                <div class="card"><h3>Hospitals</h3><div class="value">456</div></div>
                <div class="card"><h3>ICU Beds</h3><div class="value warning">82%</div></div>
                <div class="card"><h3>Staff</h3><div class="value">45K</div></div>
                <div class="card"><h3>Vaccinated</h3><div class="value success">78%</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Emergency Response</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Ambulances</h3><div class="exec-value">1,234 Active</div></div>
                <div class="exec-card"><h3>Dispatch</h3><div class="exec-value">89/min</div></div>
                <div class="exec-card"><h3>Admissions</h3><div class="exec-value">3,456</div></div>
            </div>
        </section>
    </main>
</body>
</html>
