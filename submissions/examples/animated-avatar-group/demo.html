<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Avatar Group - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Avatar Group Component</h1>
      <p>Hover over the avatars to see smooth expansion animations.</p>
    </header>

    <!-- Section 1: Team Members -->
    <section class="demo-section ease-fade-in-up ease-delay-100">
      <h2>Team Members</h2>
      <div class="avatar-group">
        <div class="avatar-wrapper ease-fade-in-up ease-delay-200 ease-hover-grow">
          <div class="avatar">👩‍💻</div>
          <span class="status-indicator online ease-pulse"></span>
          <span class="avatar-name">Sarah Chen</span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-300 ease-hover-grow">
          <div class="avatar">👨‍💻</div>
          <span class="status-indicator online ease-pulse ease-delay-100"></span>
          <span class="avatar-name">Alex Thompson</span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-400 ease-hover-grow">
          <div class="avatar">👩‍🎨</div>
          <span class="status-indicator offline"></span>
          <span class="avatar-name">Maya Patel</span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-500 ease-hover-grow">
          <div class="avatar">👨‍🚀</div>
          <span class="status-indicator online ease-pulse ease-delay-200"></span>
          <span class="avatar-name">Marcus Rodriguez</span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-600 ease-hover-grow">
          <div class="avatar">👩‍🔬</div>
          <span class="status-indicator busy"></span>
          <span class="avatar-name">Emma Watson</span>
        </div>
      </div>
    </section>

    <!-- Section 2: Collaborators (Overlapping) -->
    <section class="demo-section ease-fade-in-up ease-delay-200">
      <h2>Project Collaborators</h2>
      <div class="avatar-stack">
        <div class="stack-item ease-fade-in-up ease-delay-300 ease-hover-grow">
          <div class="avatar avatar-lg">🧑‍💼</div>
          <span class="status-indicator online ease-pulse"></span>
        </div>
        <div class="stack-item ease-fade-in-up ease-delay-400 ease-hover-grow">
          <div class="avatar avatar-lg">👨‍🎨</div>
          <span class="status-indicator online ease-pulse ease-delay-100"></span>
        </div>
        <div class="stack-item ease-fade-in-up ease-delay-500 ease-hover-grow">
          <div class="avatar avatar-lg">👩‍💻</div>
          <span class="status-indicator offline"></span>
        </div>
        <div class="stack-item ease-fade-in-up ease-delay-600 ease-hover-grow">
          <div class="avatar avatar-lg">🧑‍🔬</div>
          <span class="status-indicator busy"></span>
        </div>
        <div class="stack-item more-count ease-fade-in-up ease-delay-700">
          <div class="avatar avatar-lg">+12</div>
        </div>
      </div>
    </section>

    <!-- Section 3: Small Avatars -->
    <section class="demo-section ease-fade-in-up ease-delay-300">
      <h2>Recent Activity</h2>
      <div class="avatar-group small">
        <div class="avatar-wrapper ease-fade-in-up ease-delay-400 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator online ease-pulse"></span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-500 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator online ease-pulse ease-delay-100"></span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-600 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator offline"></span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-700 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator online ease-pulse ease-delay-200"></span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-800 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator busy"></span>
        </div>
        <div class="avatar-wrapper ease-fade-in-up ease-delay-900 ease-hover-grow">
          <div class="avatar avatar-sm">👤</div>
          <span class="status-indicator online ease-pulse ease-delay-300"></span>
        </div>
      </div>
    </section>

  </div>
</body>
</html>
