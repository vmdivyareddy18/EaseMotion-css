<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Text Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #0f172a; /* Dark background for high contrast */
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* 
           Pro-tip: Wrap in a relative container with a hidden duplicate text 
           to ensure the `width: 100%` animation stops exactly at the end of the text! 
        */
        .typing-wrapper {
            position: relative;
            display: inline-block;
        }

        .hidden-text {
            visibility: hidden;
            font-size: 2.5rem;
            margin: 0;
            white-space: nowrap;
        }

        .ease-text-typing-dj {
            position: absolute;
            top: 0;
            left: 0;
            font-size: 2.5rem;
            margin: 0;
            color: #38bdf8; /* Custom text color */
        }

        p.subtitle {
            color: #94a3b8;
            margin-top: 32px;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="typing-wrapper">
        <!-- Hidden text sets the perfect width for the wrapper container -->
        <h1 class="hidden-text">Welcome to EaseMotion CSS!</h1>
        
        <!-- The animated text spans exactly from 0 to 100% of the wrapper -->
        <h1 class="ease-text-typing-dj">
            Welcome to EaseMotion CSS!
        </h1>
    </div>
    
    <p class="subtitle">
        Pure CSS typewriter effect with blinking cursor.<br>
        Uses <code>steps()</code> for a realistic character-by-character reveal.
    </p>
</body>
</html>
