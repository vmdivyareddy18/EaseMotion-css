<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Toast Slide In — EaseMotion CSS</title>
  <meta name="description" content="Notification toast cards that slide in from the top-right with auto-dismiss.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="badge">EaseMotion CSS — Notification Component</span>
      <h1>Notification Toast Slide In</h1>
      <p class="description">
        Click the button below to trigger toast notifications that slide in from the top-right.
        Each toast auto-dismisses after 3 seconds. Multiple toasts stack vertically.
      </p>
    </header>

    <main class="showcase">
      <div class="controls">
        <button id="showToast" class="btn-primary">Show Notification</button>
        <div class="toast-type-selector">
          <label><input type="radio" name="toastType" value="success" checked> Success</label>
          <label><input type="radio" name="toastType" value="info"> Info</label>
          <label><input type="radio" name="toastType" value="warning"> Warning</label>
          <label><input type="radio" name="toastType" value="error"> Error</label>
        </div>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>

  <script>
    const icons = {
      success: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
      info: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',
      warning: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
      error: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
    };

    const messages = {
      success: 'Operation completed successfully.',
      info: 'New update is available.',
      warning: 'Warning: Storage space is low.',
      error: 'An unexpected error occurred.'
    };

    const container = document.getElementById('toastContainer');
    const btn = document.getElementById('showToast');
    let counter = 0;

    function createToast(type) {
      const toast = document.createElement('div');
      toast.className = `toast toast--${type}`;
      toast.dataset.ntsiId = ++counter;

      toast.innerHTML = `
        <div class="toast__icon">${icons[type]}</div>
        <div class="toast__body">
          <p class="toast__message">${messages[type]}</p>
        </div>
        <button class="toast__close" aria-label="Close">&times;</button>
      `;

      const closeBtn = toast.querySelector('.toast__close');
      closeBtn.addEventListener('click', () => dismissToast(toast));

      container.appendChild(toast);

      requestAnimationFrame(() => {
        toast.classList.add('toast--visible');
      });

      const timer = setTimeout(() => dismissToast(toast), 3000);
      toast._timer = timer;
    }

    function dismissToast(toast) {
      if (toast.classList.contains('toast--dismissing')) return;
      clearTimeout(toast._timer);
      toast.classList.remove('toast--visible');
      toast.classList.add('toast--dismissing');
      toast.addEventListener('animationend', () => {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, { once: true });
    }

    btn.addEventListener('click', () => {
      const selected = document.querySelector('input[name="toastType"]:checked');
      createToast(selected ? selected.value : 'success');
    });
  </script>

</body>
</html>
