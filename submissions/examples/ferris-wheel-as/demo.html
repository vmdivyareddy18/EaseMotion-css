<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferris Wheel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="fair">
    <div class="wheel">
      <span class="rim"></span>
      <span class="spoke" style="--r: 0deg;"></span>
      <span class="spoke" style="--r: 30deg;"></span>
      <span class="spoke" style="--r: 60deg;"></span>
      <span class="spoke" style="--r: 90deg;"></span>
      <span class="spoke" style="--r: 120deg;"></span>
      <span class="spoke" style="--r: 150deg;"></span>

      <span class="arm" style="--r: 0deg;"><span class="cabin-hold"><span class="cabin c1"></span></span></span>
      <span class="arm" style="--r: 60deg;"><span class="cabin-hold"><span class="cabin c2"></span></span></span>
      <span class="arm" style="--r: 120deg;"><span class="cabin-hold"><span class="cabin c3"></span></span></span>
      <span class="arm" style="--r: 180deg;"><span class="cabin-hold"><span class="cabin c4"></span></span></span>
      <span class="arm" style="--r: 240deg;"><span class="cabin-hold"><span class="cabin c5"></span></span></span>
      <span class="arm" style="--r: 300deg;"><span class="cabin-hold"><span class="cabin c6"></span></span></span>

      <span class="hub"></span>
    </div>
    <span class="leg left"></span>
    <span class="leg right"></span>
    <span class="base"></span>
  </div>
</body>
</html>
