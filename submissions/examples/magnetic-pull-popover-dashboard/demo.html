<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Pull Popover Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="dashboard">
  <h1>Dashboard Analytics</h1>

  <div class="magnetic-popover">
    <button class="magnetic-trigger" aria-label="Open dashboard details">
      View Stats
    </button>

    <div class="popover-content">
      <h2>Analytics</h2>
      <p>
        Responsive dashboard information with
        smooth magnetic pull animation.
      </p>
      <span>Users: 12,540</span>
    </div>
  </div>

</section>

</body>
