<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Elf Bow Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #ecfdf5;
      font-family: sans-serif;
      margin: 0;
      overflow-x: hidden;
    }
    
    .demo-target-area {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 300px;
      padding: 1rem;
      border: 2px dashed #34d399;
      border-radius: 12px;
      background: white;
    }
    
    .demo-arrow {
      font-size: 4rem;
      cursor: pointer;
      display: inline-block;
      line-height: 1;
    }
    
    .instruction {
      color: #047857;
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>
  
  <p class="instruction">Hover over the arrow to draw the Elf Bow!</p>

  <div class="demo-target-area">
    <div class="ease-elf-bow-hover-ps demo-arrow">
      ➵
    </div>
  </div>

</body>
</html>
