<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Carousel Slider</title>

    <link rel="stylesheet" href="../../dist/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="carousel-section ease-fade-up ease-duration-700">

    <h1>Ease Carousel Slider</h1>
    <p>Simple responsive image slider built with EaseMotion CSS.</p>

    <div class="carousel">

        <button class="nav prev">&#10094;</button>

        <div class="slides">

            <div class="slide active ease-fade-right">
                <img src="https://picsum.photos/id/1015/900/450" alt="">
                <div class="caption">
                    <h2>Beautiful Mountains</h2>
                    <p>Enjoy nature with smooth animations.</p>
                </div>
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1016/900/450" alt="">
                <div class="caption">
                    <h2>Ocean View</h2>
                    <p>Responsive carousel for modern websites.</p>
                </div>
            </div>

            <div class="slide">
                <img src="https://picsum.photos/id/1018/900/450" alt="">
                <div class="caption">
                    <h2>Adventure Begins</h2>
                    <p>Easy to customize and lightweight.</p>
                </div>
            </div>

        </div>

        <button class="nav next">&#10095;</button>

    </div>

    <div class="dots">

        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
