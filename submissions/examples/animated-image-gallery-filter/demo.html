<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Image Gallery Filter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>Animated Image Gallery</h1>
        <p>Responsive gallery with smooth CSS animations.</p>
    </header>

    <div class="filter-buttons">
        <button class="active">All</button>
        <button>Nature</button>
        <button>Architecture</button>
        <button>Technology</button>
        <button>Travel</button>
    </div>

    <div class="gallery">

        <div class="card nature">
            <img src="https://picsum.photos/400/300?random=1" alt="Nature">
            <div class="caption">Nature</div>
        </div>

        <div class="card architecture">
            <img src="https://picsum.photos/400/300?random=2" alt="Architecture">
            <div class="caption">Architecture</div>
        </div>

        <div class="card technology">
            <img src="https://picsum.photos/400/300?random=3" alt="Technology">
            <div class="caption">Technology</div>
        </div>

        <div class="card travel">
            <img src="https://picsum.photos/400/300?random=4" alt="Travel">
            <div class="caption">Travel</div>
        </div>

        <div class="card nature">
            <img src="https://picsum.photos/400/300?random=5" alt="Forest">
            <div class="caption">Forest</div>
        </div>

        <div class="card architecture">
            <img src="https://picsum.photos/400/300?random=6" alt="Building">
            <div class="caption">Building</div>
        </div>

    </div>

</div>

</body>
</html>
