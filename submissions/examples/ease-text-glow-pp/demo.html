<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>ease-text-glow - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to style.css containing our component and demo layout -->
    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h1>ease-text-glow</h1>
      <p>
        Realistic neon text glow effect using multiple text-shadow layers and
        CSS custom properties.
      </p>
    </header>

    <div class="demo-container">
      <!-- Left Column: Interactive Live Preview -->
      <div class="preview-panel">
        <div class="preview-grid-bg"></div>
        <div class="preview-glow-glowbox" id="ambient-glow"></div>
        <div
          class="ease-text-glow ease-text-glow-blue preview-text"
          id="neon-text"
          contenteditable="true"
          spellcheck="false"
        >
          NEON GLOW
        </div>
      </div>

      <!-- Right Column: Interactive Configuration Panel -->
      <div class="controls-panel">
        <!-- Typography & Text Customization -->
        <div class="control-card">
          <h3>Content & Typography</h3>
          <div class="control-group">
            <label class="control-label" for="text-input">Text Content</label>
            <input
              type="text"
              id="text-input"
              class="input-text"
              value="NEON GLOW"
            />
          </div>
          <div class="control-group">
            <label class="control-label" for="font-size-slider"
              >Font Size <span id="font-size-val">3.5rem</span></label
            >
            <input
              type="range"
              id="font-size-slider"
              class="slider"
              min="2"
              max="6"
              step="0.1"
              value="3.5"
            />
          </div>
        </div>

        <!-- Color & Glow Intensity Options -->
        <div class="control-card">
          <h3>Glow Settings</h3>
          <div class="control-group">
            <label class="control-label">Preset Colors</label>
            <div class="swatches-grid">
              <button
                class="swatch-btn active"
                data-color="blue"
                style="--color-hex: #00f0ff"
              ></button>
              <button
                class="swatch-btn"
                data-color="pink"
                style="--color-hex: #ff007f"
              ></button>
              <button
                class="swatch-btn"
                data-color="green"
                style="--color-hex: #39ff14"
              ></button>
              <button
                class="swatch-btn"
                data-color="purple"
                style="--color-hex: #bd00ff"
              ></button>
              <button
                class="swatch-btn"
                data-color="gold"
                style="--color-hex: #ffd700"
              ></button>
              <button
                class="swatch-btn"
                data-color="orange"
                style="--color-hex: #ff5e00"
              ></button>
              <button
                class="swatch-btn"
                data-color="red"
                style="--color-hex: #ff003c"
              ></button>
            </div>
            <div class="color-picker-wrapper">
              <input
                type="color"
                id="custom-color-picker"
                class="input-color"
                value="#00f0ff"
              />
              <label for="custom-color-picker">Custom Glow Color Picker</label>
            </div>
          </div>
          <div class="control-group">
            <label class="control-label" for="radius-slider"
              >Glow Radius <span id="radius-val">20px</span></label
            >
            <input
              type="range"
              id="radius-slider"
              class="slider"
              min="5"
              max="80"
              value="20"
            />
          </div>
        </div>

        <!-- Pulse Animation Settings -->
        <div class="control-card">
          <h3>Animation Option</h3>
          <div class="control-group switch-wrapper">
            <span class="control-label">Enable Pulse Animation</span>
            <label class="switch">
              <input type="checkbox" id="pulse-toggle" />
              <span class="switch-slider"></span>
            </label>
          </div>
          <div class="control-group">
            <label class="control-label">Pulse Speed</label>
            <div class="segmented-control segment-disabled" id="speed-control">
              <button class="segment-btn" data-speed="slow">Slow</button>
              <button class="segment-btn active" data-speed="normal">
                Normal
              </button>
              <button class="segment-btn" data-speed="fast">Fast</button>
            </div>
          </div>
        </div>

        <!-- Live Code Generator -->
        <div class="control-card code-card">
          <div class="code-header">
            <h4>Integration Code</h4>
            <button class="copy-btn" id="copy-code-btn">Copy HTML & CSS</button>
          </div>
          <div class="code-container">
            <pre id="code-output"></pre>
          </div>
        </div>
      </div>
    </div>

    <script>
      // Elements
      const neonText = document.getElementById("neon-text");
      const textInput = document.getElementById("text-input");
      const fontSizeSlider = document.getElementById("font-size-slider");
      const fontSizeVal = document.getElementById("font-size-val");
      const radiusSlider = document.getElementById("radius-slider");
      const radiusVal = document.getElementById("radius-val");
      const customColorPicker = document.getElementById("custom-color-picker");
      const pulseToggle = document.getElementById("pulse-toggle");
      const speedControl = document.getElementById("speed-control");
      const ambientGlow = document.getElementById("ambient-glow");
      const codeOutput = document.getElementById("code-output");
      const copyCodeBtn = document.getElementById("copy-code-btn");

      const swatches = document.querySelectorAll(".swatch-btn");
      const speedButtons = document.querySelectorAll(".segment-btn");

      // Configuration state
      let activePreset = "blue"; // blue, pink, green, purple, gold, orange, red, or 'custom'
      let customColor = "#00f0ff";
      let glowRadius = 20;
      let isPulsing = false;
      let pulseSpeed = "normal"; // slow, normal, fast

      // Colors mapping
      const presetHex = {
        blue: "#00f0ff",
        pink: "#ff007f",
        green: "#39ff14",
        purple: "#bd00ff",
        gold: "#ffd700",
        orange: "#ff5e00",
        red: "#ff003c",
      };

      // Update Text Content
      textInput.addEventListener("input", (e) => {
        neonText.textContent = e.target.value || " ";
        updateCode();
      });

      neonText.addEventListener("input", (e) => {
        textInput.value = e.target.textContent;
        updateCode();
      });

      // Font Size
      fontSizeSlider.addEventListener("input", (e) => {
        const size = e.target.value + "rem";
        neonText.style.fontSize = size;
        fontSizeVal.textContent = size;
      });

      // Glow Radius
      radiusSlider.addEventListener("input", (e) => {
        glowRadius = e.target.value;
        neonText.style.setProperty("--ease-glow-radius", `${glowRadius}px`);
        radiusVal.textContent = `${glowRadius}px`;
        updateCode();
      });

      // Swatches Select
      swatches.forEach((swatch) => {
        swatch.addEventListener("click", () => {
          // Clear active swatches
          swatches.forEach((s) => s.classList.remove("active"));

          swatch.classList.add("active");
          activePreset = swatch.dataset.color;

          // Remove custom color overrides
          neonText.style.removeProperty("--ease-glow-color");

          // Remove all color presets classes
          Object.keys(presetHex).forEach((color) => {
            neonText.classList.remove(`ease-text-glow-${color}`);
          });

          // Add current preset class
          neonText.classList.add(`ease-text-glow-${activePreset}`);

          // Sync custom color picker and ambient glow
          customColor = presetHex[activePreset];
          customColorPicker.value = customColor;
          ambientGlow.style.setProperty("--preview-glow-bg", customColor);

          updateCode();
        });
      });

      // Custom Color Picker
      customColorPicker.addEventListener("input", (e) => {
        // Deactivate presets
        swatches.forEach((s) => s.classList.remove("active"));
        activePreset = "custom";

        customColor = e.target.value;

        // Remove preset classes from text
        Object.keys(presetHex).forEach((color) => {
          neonText.classList.remove(`ease-text-glow-${color}`);
        });

        // Apply custom property
        neonText.style.setProperty("--ease-glow-color", customColor);

        // Sync ambient glow
        ambientGlow.style.setProperty("--preview-glow-bg", customColor);

        updateCode();
      });

      // Pulse Toggle
      pulseToggle.addEventListener("change", (e) => {
        isPulsing = e.target.checked;

        if (isPulsing) {
          neonText.classList.add("ease-text-glow-pulse");
          speedControl.classList.remove("segment-disabled");
        } else {
          neonText.classList.remove("ease-text-glow-pulse");
          speedControl.classList.add("segment-disabled");
        }

        updateCode();
      });

      // Pulse Speed Control
      speedButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          if (!isPulsing) return;

          speedButtons.forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");

          pulseSpeed = btn.dataset.speed;

          // Reset classes
          neonText.classList.remove("ease-text-glow-pulse-fast");
          neonText.classList.remove("ease-text-glow-pulse-slow");

          if (pulseSpeed === "fast") {
            neonText.classList.add("ease-text-glow-pulse-fast");
          } else if (pulseSpeed === "slow") {
            neonText.classList.add("ease-text-glow-pulse-slow");
          }

          updateCode();
        });
      });

      // Update Code Block Output
      function updateCode() {
        const textVal = textInput.value || "NEON GLOW";

        // Build HTML Class list
        let htmlClass = "ease-text-glow";
        if (activePreset !== "custom") {
          htmlClass += ` ease-text-glow-${activePreset}`;
        }
        if (isPulsing) {
          htmlClass += " ease-text-glow-pulse";
          if (pulseSpeed === "fast") htmlClass += " ease-text-glow-pulse-fast";
          if (pulseSpeed === "slow") htmlClass += " ease-text-glow-pulse-slow";
        }

        // Build Styles
        let styleAttr = "";
        let cssCustomProps = "";

        if (activePreset === "custom") {
          styleAttr += ` --ease-glow-color: ${customColor};`;
          cssCustomProps += `\n  <span class="code-property">--ease-glow-color</span>: <span class="code-value">${customColor}</span>;`;
        }
        if (glowRadius !== 20) {
          styleAttr += ` --ease-glow-radius: ${glowRadius}px;`;
          cssCustomProps += `\n  <span class="code-property">--ease-glow-radius</span>: <span class="code-value">${glowRadius}px</span>;`;
        }

        const styleMarkup = styleAttr ? ` style="${styleAttr.trim()}"` : "";

        // Generate formatted code
        const htmlBlock = `&lt;<span class="code-keyword">div</span> <span class="code-property">class</span>=<span class="code-string">"${htmlClass}"</span>${styleMarkup}&gt;${textVal}&lt;/<span class="code-keyword">div</span>&gt;`;

        let cssBlock = `<span class="code-comment">/* Override default settings via variables */</span>\n.<span class="code-keyword">custom-glow-text</span> {`;
        if (cssCustomProps) {
          cssBlock += cssCustomProps + "\n}";
        } else {
          cssBlock += `\n  <span class="code-comment">/* Use presets or defaults, e.g. */</span>\n  <span class="code-property">--ease-glow-radius</span>: <span class="code-value">30px</span>;\n}`;
        }

        codeOutput.innerHTML = `${htmlBlock}\n\n${cssBlock}`;
      }

      // Copy to clipboard
      copyCodeBtn.addEventListener("click", () => {
        // Text formatting (without HTML span highlighting tags)
        const textVal = textInput.value || "NEON GLOW";

        let htmlClass = "ease-text-glow";
        if (activePreset !== "custom") {
          htmlClass += ` ease-text-glow-${activePreset}`;
        }
        if (isPulsing) {
          htmlClass += " ease-text-glow-pulse";
          if (pulseSpeed === "fast") htmlClass += " ease-text-glow-pulse-fast";
          if (pulseSpeed === "slow") htmlClass += " ease-text-glow-pulse-slow";
        }

        let styleAttr = "";
        let cssCustomProps = "";
        if (activePreset === "custom") {
          styleAttr += ` --ease-glow-color: ${customColor};`;
          cssCustomProps += `\n  --ease-glow-color: ${customColor};`;
        }
        if (glowRadius !== 20) {
          styleAttr += ` --ease-glow-radius: ${glowRadius}px;`;
          cssCustomProps += `\n  --ease-glow-radius: ${glowRadius}px;`;
        }

        const styleMarkup = styleAttr ? ` style="${styleAttr.trim()}"` : "";
        const rawHtml = `<div class="${htmlClass}"${styleMarkup}>${textVal}</div>`;

        let rawCss = `/* Custom Neon Styling */\n.custom-glow-text {`;
        if (cssCustomProps) {
          rawCss += cssCustomProps + "\n}";
        } else {
          rawCss += `\n  --ease-glow-radius: 30px;\n}`;
        }

        const fullCode = `${rawHtml}\n\n${rawCss}`;

        navigator.clipboard.writeText(fullCode).then(() => {
          copyCodeBtn.textContent = "Copied!";
          copyCodeBtn.classList.add("copied");

          setTimeout(() => {
            copyCodeBtn.textContent = "Copy HTML & CSS";
            copyCodeBtn.classList.remove("copied");
          }, 2000);
        });
      });

      // Initialize code view
      updateCode();
    </script>
  </body>
</html>
