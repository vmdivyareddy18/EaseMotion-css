<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isolation Isolate Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f1f5f9; padding: 60px 20px; margin: 0;">

  <div style="position: absolute; width: 100%; text-align: center; top: 120px; left: 0;">
    <span class="underlay-global-badge">GLOBAL BACKGROUND INDICATOR [z-index: 10]</span>
  </div>

  <div class="stacking-boundary-container ease-isolation-isolate">
    <h5 style="margin-top: 0; color: #0f172a; margin-bottom: 1rem;">Isolated Canvas Shell</h5>
    
    <div class="nested-element-node">
      This box sets <code>z-index: 9999</code>. However, because its parent uses <code>.ease-isolation-isolate</code>, it is locked into a local stacking scope. It will not leak out or jump on top of the global badge layer outside this grid box.
    </div>
  </div>

</body>
</html>
