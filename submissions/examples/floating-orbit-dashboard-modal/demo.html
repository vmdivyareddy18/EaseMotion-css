<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating Orbit Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal">

<label for="modal" class="open-btn">Open Dashboard</label>

<label class="overlay" for="modal"></label>

<div class="modal" role="dialog" aria-modal="true">
    <span class="orbit orbit1"></span>
    <span class="orbit orbit2"></span>
    <span class="orbit orbit3"></span>

    <label for="modal" class="close">&times;</label>

    <h2>Dashboard Overview</h2>

    <p>
        Track projects, analytics, notifications, and team activity in one place with a smooth floating orbit animation.
    </p>

    <div class="stats">
        <div>
            <h3>28</h3>
            <span>Projects</span>
        </div>

        <div>
            <h3>96%</h3>
            <span>Success</span>
        </div>

        <div>
            <h3>14</h3>
            <span>Alerts</span>
        </div>
    </div>

    <button>View Dashboard</button>

</div>

</body>
</html>
