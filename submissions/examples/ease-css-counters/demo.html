<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Counters Utilities | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="counters-showcase-wrapper">
    <header class="showcase-header">
      <h1>CSS Counters Utilities</h1>
      <p>A proposal for <code>core/utilities.css</code> to add CSS counter support.</p>
    </header>

    <div class="demo-area">
      <!-- Unordered list that uses counters -->
      <div class="em-counter-reset demo-list">
        <div class="demo-item em-counter-increment">
          <h3>First Feature</h3>
          <p>This item is automatically numbered using CSS counters.</p>
        </div>
        
        <div class="demo-item em-counter-increment">
          <h3>Second Feature</h3>
          <p>No manual numbering required in HTML.</p>
        </div>
        
        <div class="demo-item em-counter-increment">
          <h3>Third Feature</h3>
          <p>Counters handle the increments dynamically.</p>
        </div>
      </div>
    </div>
    
  </div>

</body>
</html>
