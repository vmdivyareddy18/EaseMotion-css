<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Animation Card Gallery</title>

<!-- Replace with the official project stylesheet if applicable -->
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Animation Card Gallery</h1>

<div class="gallery">

<div class="card fade">
<h2>Fade In</h2>
<p>Simple fade animation.</p>
</div>

<div class="card slide">
<h2>Slide Up</h2>
<p>Slides upward smoothly.</p>
</div>

<div class="card grow">
<h2>Hover Grow</h2>
<p>Grows on hover.</p>
</div>

<div class="card rotate">
<h2>Rotate</h2>
<p>Rotates continuously.</p>
</div>

<div class="card bounce">
<h2>Bounce</h2>
<p>Bouncing animation.</p>
</div>

<div class="card scale">
<h2>Scale</h2>
<p>Scales repeatedly.</p>
</div>

</div>

</body>
</html>
