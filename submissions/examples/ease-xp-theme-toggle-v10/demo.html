<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Theme Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Theme Toggle 🌗</h1>

  <!-- TOGGLE -->
  <div class="toggle" onclick="toggleTheme()">
    <div class="circle" id="circle"></div>
  </div>

  <div class="xp-card ease-slide-up">
    <h2>XP System Preview</h2>
    <p>This UI changes theme dynamically.</p>
    <button class="xp-btn">Action</button>
  </div>

</section>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");

  const circle = document.getElementById("circle");
  circle.classList.toggle("move");
}
</script>

</body>
</html>
