<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compare - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="ic-header"><h1>Image Compare Slider</h1><p>CSS before/after image comparison with draggable handle</p></header>
<section class="ic-section"><h2>Horizontal Compare</h2><div class="ic-wrapper"><div class="ic-container"><div class="ic-after" style="background:linear-gradient(135deg,#667eea,#764ba2)"><span class="ic-label ic-after-label">After</span></div><div class="ic-before" style="background:linear-gradient(135deg,#f093fb,#f5576c)"><span class="ic-label ic-before-label">Before</span></div><input type="range" min="0" max="100" value="50" class="ic-slider" id="ic-slider-1"></div></div></section>
<section class="ic-section"><h2>Vertical Compare</h2><div class="ic-wrapper"><div class="ic-container ic-vertical"><div class="ic-after" style="background:linear-gradient(135deg,#4facfe,#00f2fe)"><span class="ic-label ic-after-label">After</span></div><div class="ic-before" style="background:linear-gradient(135deg,#43e97b,#38f9d7)"><span class="ic-label ic-before-label">Before</span></div><input type="range" min="0" max="100" value="50" class="ic-slider ic-slider-v" id="ic-slider-2"></div></div></section>
<section class="ic-section"><h2>Multiple Presets</h2><div class="ic-preset-row"><div class="ic-preset"><div class="ic-pthumb" style="background:linear-gradient(45deg,#667eea,#764ba2)"></div><span>50/50</span></div><div class="ic-preset"><div class="ic-pthumb" style="background:linear-gradient(45deg,#f093fb,#f5576c)"></div><span>30/70</span></div><div class="ic-preset"><div class="ic-pthumb" style="background:linear-gradient(45deg,#4facfe,#00f2fe)"></div><span>70/30</span></div></div><p class="ic-note">Adjust the range input to see the split comparison in action</p></section>
<footer class="ftr"><p>EaseMotion CSS - Image Compare | GSSoC 2026</p></footer>
<script>document.querySelectorAll(".ic-slider").forEach(s=>{const c=s.closest(".ic-container");const b=c.querySelector(".ic-before");s.addEventListener("input",()=>{b.style[s.dataset.dir||"width"]=s.value+"%"})});document.querySelectorAll(".ic-slider-v").forEach(s=>{s.dataset.dir="height";const c=s.closest(".ic-container");const b=c.querySelector(".ic-before");s.addEventListener("input",()=>{b.style.height=s.value+"%"})});</script>
</body>
</html>
