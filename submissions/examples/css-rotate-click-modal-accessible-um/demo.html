<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Rotate-Click Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <!-- Checkbox must have aria-label for screen readers (though visually hidden) -->
  <input type="checkbox" id="acc-modal-toggle" class="ease-acc-modal-toggle-um" aria-label="Toggle Accessible Modal">
  
  <!-- Trigger Button (Must be label associated with the checkbox, but stylized as button) -->
  <!-- Use tabindex="0" so it's keyboard focusable -->
  <label for="acc-modal-toggle" class="ease-acc-trigger-um" tabindex="0" role="button" aria-controls="acc-modal-window" aria-expanded="false">
    Open Settings
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-acc-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="acc-modal-toggle" class="ease-acc-backdrop-close-um" aria-label="Close Modal Backdrop"></label>
    
    <!-- Actual Modal Window -->
    <div id="acc-modal-window" class="ease-acc-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <!-- aria-label ensures screen readers know what this does -->
      <label for="acc-modal-toggle" class="ease-acc-close-icon-um" aria-label="Close Settings Modal" tabindex="0" role="button">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Content -->
      <h2 id="modal-title" class="ease-acc-title-um">Accessibility Settings</h2>
      <p class="ease-acc-desc-um">
        This modal demonstrates an accessible layout. It features high color contrast, clear focus indicators for keyboard navigation, large tap targets, and respects the user's reduced-motion preferences. Try navigating using the Tab key.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-acc-actions-um">
        <label for="acc-modal-toggle" class="ease-acc-btn-um ease-acc-btn-primary-um" tabindex="0" role="button">
          Save Changes
        </label>
        
        <label for="acc-modal-toggle" class="ease-acc-btn-um" tabindex="0" role="button">
          Cancel
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
