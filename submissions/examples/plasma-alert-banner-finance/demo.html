<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plasma Alert Banner - Finance Dashboard Patterns</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-preview">
        <div class="plasma-banner" role="alert" aria-live="assertive">
            <div class="plasma-mesh"></div>
            <div class="banner-blur-overlay"></div>
            
            <div class="banner-body">
                <div class="banner-status-indicator">
                    <span class="pulse-dot"></span>
                </div>
                <div class="banner-message">
                    <span class="banner-title">VOLATILITY WARNING // SYSTEM ANOMALY</span>
                    <p class="banner-text">High-frequency trading latency metrics have exceeded the baseline standard deviation parameters. Automated circuit breakers are active across all digital currency pairs.</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
