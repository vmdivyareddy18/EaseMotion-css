<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elastic Bounce Modal - Minimalist Tech</title>
    <!-- Base typography from EaseMotion -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component Specific Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="dashboard-layout">
        <header class="tech-header">
            <div class="logo">Sys//Admin</div>
            <nav class="tech-nav">
                <a href="#">Metrics</a>
                <a href="#">Logs</a>
                <a href="#">Deployments</a>
            </nav>
        </header>

        <section class="content-area">
            <h1>System Status: Operational</h1>
            <p class="mono-text">All primary nodes are functioning within expected parameters. Latency is currently at 42ms.</p>
            
            <button class="tech-btn" id="openModalBtn">
                [ INIT_DIAGNOSTIC_MODAL ]
            </button>
        </section>
    </main>

    <!-- The Elastic Modal Backdrop -->
    <div class="modal-backdrop" id="modalBackdrop">
        <!-- The Modal Container -->
        <div class="elastic-modal">
            <div class="modal-header">
                <h2>Diagnostic Report</h2>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="data-row">
                    <span>CPU Usage:</span>
                    <span class="value success">14%</span>
                </div>
                <div class="data-row">
                    <span>Memory:</span>
                    <span class="value warning">82%</span>
                </div>
                <div class="data-row">
                    <span>Network Tx/Rx:</span>
                    <span class="value">1.2 GB/s</span>
                </div>
                <p class="mono-text mt-2">> Diagnostics complete. No critical errors found. System is stable.</p>
            </div>
            <div class="modal-footer">
                <button class="tech-btn outline" id="acknowledgeBtn">ACKNOWLEDGE</button>
            </div>
        </div>
    </div>

    <!-- Minimal JS purely to toggle the active class for the demo -->
    <script>
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const ackBtn = document.getElementById('acknowledgeBtn');
        const backdrop = document.getElementById('modalBackdrop');

        function openModal() {
            backdrop.classList.add('active');
        }

        function closeModal() {
            backdrop.classList.remove('active');
        }

        openBtn.addEventListener('click', openModal);
        closeBtn.addEventListener('click', closeModal);
        ackBtn.addEventListener('click', closeModal);
        
        // Close on outside click
        backdrop.addEventListener('click', (e) => {
            if (e.target === backdrop) closeModal();
        });
    </script>
</body>
</html>
