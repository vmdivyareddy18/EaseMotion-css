<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neumorphism Slide-Right Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Toggle -->
  <input type="checkbox" id="modal-toggle" hidden>

  <!-- Open Button -->
  <label for="modal-toggle" class="open-btn">
    Open Modal
  </label>

  <!-- Overlay -->
  <div class="overlay">
    
    <!-- Modal -->
    <div class="modal">
      <h2>Neumorphism Modal</h2>
      <p>
        This is a pure CSS Slide-Right Modal using Neumorphism design.
      </p>

      <!-- Close Button -->
      <label for="modal-toggle" class="close-btn">Close</label>
    </div>

  </div>

</body>
</html>
