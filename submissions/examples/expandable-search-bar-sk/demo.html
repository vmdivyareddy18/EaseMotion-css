<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expandable Search Bar - EaseMotion CSS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container fade-in-up">
    <h1>Expandable Search</h1>
    <p>A pure CSS expanding search bar that activates on focus or hover. Perfect for clean navigation interfaces.</p>
    
    <nav class="navbar card pulse-hover">
      <div class="nav-brand">BrandLogo</div>
      
      <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
      </div>

      <!-- Expandable Search Bar Component -->
      <form class="search-container" role="search" action="#" method="get">
        <div class="search-wrapper">
          <button type="submit" class="search-btn" aria-label="Submit search">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="search-icon">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
          </button>
          <input type="search" class="search-input" placeholder="Search..." aria-label="Search">
        </div>
      </form>
    </nav>
  </main>
</body>
</html>
