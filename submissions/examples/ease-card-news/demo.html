<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Card News</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="news-grid">

    <article class="ease-card-news breaking">

        <div class="image-wrapper">
            <img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?w=800" alt="News">

            <span class="badge">BREAKING</span>
        </div>

        <div class="content">

            <h2 class="headline ease-hover-underline">
                Global Markets Hit New Highs
            </h2>

            <p class="meta">
                Reuters • 2 hours ago
            </p>

        </div>

    </article>

    <article class="ease-card-news">

        <div class="image-wrapper">
            <img src="https://images.unsplash.com/photo-1520607162513-77705c0f0d4a?w=800" alt="News">

            <span class="badge category">TECH</span>
        </div>

        <div class="content">

            <h2 class="headline ease-hover-underline">
                AI Revolution Reshapes Industry Standards
            </h2>

            <p class="meta">
                TechWire • 5 hours ago
            </p>

        </div>

    </article>

</div>

</body>
</html>
