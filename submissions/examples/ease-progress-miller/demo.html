<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Progress Bar Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Progress Bar Component</h1>
    <p class="demo-desc">
      Adds the missing <code>ease-progress</code>, <code>ease-progress-fill</code>,
      and <code>ease-progress-striped</code> classes referenced in the cheatsheet.
    </p>

    <!-- Standard fill variants -->
    <section class="demo-section">
      <h2>Fill Variants</h2>

      <label class="demo-label">Default (25%)</label>
      <div class="ease-progress">
        <div class="ease-progress-fill" style="--ease-progress-width: 25%;"></div>
      </div>

      <label class="demo-label">Success (60%)</label>
      <div class="ease-progress">
        <div class="ease-progress-fill ease-progress-fill--success" style="--ease-progress-width: 60%;"></div>
      </div>

      <label class="demo-label">Warning (75%)</label>
      <div class="ease-progress">
        <div class="ease-progress-fill ease-progress-fill--warning" style="--ease-progress-width: 75%;"></div>
      </div>

      <label class="demo-label">Danger (90%)</label>
      <div class="ease-progress">
        <div class="ease-progress-fill ease-progress-fill--danger" style="--ease-progress-width: 90%;"></div>
      </div>
    </section>

    <!-- Striped variants -->
    <section class="demo-section">
      <h2>Striped Variant</h2>

      <label class="demo-label">Striped (45%)</label>
      <div class="ease-progress ease-progress-striped">
        <div class="ease-progress-fill" style="--ease-progress-width: 45%;"></div>
      </div>

      <label class="demo-label">Striped Animated (70%)</label>
      <div class="ease-progress ease-progress-striped ease-progress-striped--animated">
        <div class="ease-progress-fill ease-progress-fill--success" style="--ease-progress-width: 70%;"></div>
      </div>
    </section>

    <!-- Sizes -->
    <section class="demo-section">
      <h2>Size Variants</h2>

      <label class="demo-label">Thin</label>
      <div class="ease-progress ease-progress--thin">
        <div class="ease-progress-fill" style="--ease-progress-width: 55%;"></div>
      </div>

      <label class="demo-label">Default</label>
      <div class="ease-progress">
        <div class="ease-progress-fill" style="--ease-progress-width: 55%;"></div>
      </div>

      <label class="demo-label">Thick</label>
      <div class="ease-progress ease-progress--thick">
        <div class="ease-progress-fill" style="--ease-progress-width: 55%;"></div>
      </div>
    </section>

    <!-- Interactive demo -->
    <section class="demo-section">
      <h2>Interactive Demo</h2>
      <div class="ease-progress ease-progress-striped ease-progress-striped--animated" id="interactive-bar">
        <div class="ease-progress-fill" id="interactive-fill" style="--ease-progress-width: 0%;"></div>
      </div>
      <div class="btn-row">
        <button class="demo-btn" onclick="setProgress(25)">25%</button>
        <button class="demo-btn" onclick="setProgress(50)">50%</button>
        <button class="demo-btn" onclick="setProgress(75)">75%</button>
        <button class="demo-btn" onclick="setProgress(100)">100%</button>
        <button class="demo-btn demo-btn--reset" onclick="setProgress(0)">Reset</button>
      </div>
    </section>
  </div>

  <script>
    function setProgress(val) {
      const fill = document.getElementById('interactive-fill');
      fill.style.setProperty('--ease-progress-width', val + '%');
    }
  </script>
</body>
</html>
