<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Scale Progress Bar Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <header class="demo-header">
            <h1>Scale Progress Bar</h1>
            <p>A corporate-inspired, pure CSS smooth scaling progress indicator built for EaseMotion CSS.</p>
        </header>

        <div class="component-box">
            <div class="component-label">
                <span>System Synchronizing</span>
                <span class="percentage">75%</span>
            </div>
            <div class="ease-progress-wrapper">
                <div class="ease-progress-bar scale-animation" style="--progress: 75%;"></div>
            </div>
        </div>

        <div class="component-box">
            <div class="component-label">
                <span>Deployment Status</span>
                <span class="percentage text-success">Completed</span>
            </div>
            <div class="ease-progress-wrapper">
                <div class="ease-progress-bar bg-success" style="--progress: 100%;"></div>
            </div>
        </div>

        <button class="btn-replay" onclick="document.location.reload()">Replay Animation</button>
    </div>

</body>
</html>
