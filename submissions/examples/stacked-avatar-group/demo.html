<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Overlapping Avatar Stack Layout Group</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-avatar-stack">
  <div class="avatar"><img src="https://i.pravatar.cc/100?img=1" alt="U1"></div>
  <div class="avatar"><img src="https://i.pravatar.cc/100?img=2" alt="U2"></div>
  <div class="avatar"><img src="https://i.pravatar.cc/100?img=3" alt="U3"></div>
  <div class="avatar-more">+5</div>
</div>
</body>
</html>
