<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pulsing Location Ring Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="stage">
    <h1 class="title">"My Location" Pulse</h1>
    <p class="subtitle">A translucent ring continuously pulses (scale + opacity) around a map location pin, built on the <code>ease-ping</code> pattern.</p>

    <div class="map-grid">

      <!-- Default -->
      <div class="map-tile">
        <div class="map-tile__bg"></div>
        <div class="location-marker">
          <span class="location-marker__pulse"></span>
          <span class="location-marker__dot"></span>
        </div>
        <p class="map-tile__label">Default</p>
      </div>

      <!-- Fast -->
      <div class="map-tile">
        <div class="map-tile__bg"></div>
        <div class="location-marker location-marker-fast">
          <span class="location-marker__pulse"></span>
          <span class="location-marker__dot"></span>
        </div>
        <p class="map-tile__label">Fast (--ease-ping-speed: 1s)</p>
      </div>

      <!-- Large radius -->
      <div class="map-tile">
        <div class="map-tile__bg"></div>
        <div class="location-marker location-marker-wide">
          <span class="location-marker__pulse"></span>
          <span class="location-marker__dot"></span>
        </div>
        <p class="map-tile__label">Wide pulse (--ease-ping-scale: 3.5)</p>
      </div>

      <!-- Alt color -->
      <div class="map-tile">
        <div class="map-tile__bg"></div>
        <div class="location-marker location-marker-alt">
          <span class="location-marker__pulse"></span>
          <span class="location-marker__dot"></span>
        </div>
        <p class="map-tile__label">Alt color</p>
      </div>

    </div>
  </main>

</body>
</html>
