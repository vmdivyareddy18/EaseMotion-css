<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milestone Timeline — Dot Fill</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <div class="timeline-card">
    <h2 class="timeline-title">Project Milestones</h2>
    <div class="timeline">
      <div class="milestone completed">
        <div class="milestone-dot" style="--fill: 1"></div>
        <div class="milestone-body">
          <span class="milestone-label">Kickoff</span>
          <span class="milestone-date">Week 1</span>
        </div>
      </div>
      <div class="milestone completed">
        <div class="milestone-dot" style="--fill: 1"></div>
        <div class="milestone-body">
          <span class="milestone-label">Research</span>
          <span class="milestone-date">Week 3</span>
        </div>
      </div>
      <div class="milestone active">
        <div class="milestone-dot" style="--fill: 0.6"></div>
        <div class="milestone-body">
          <span class="milestone-label">Development</span>
          <span class="milestone-date">Week 6</span>
        </div>
      </div>
      <div class="milestone">
        <div class="milestone-dot" style="--fill: 0"></div>
        <div class="milestone-body">
          <span class="milestone-label">Testing</span>
          <span class="milestone-date">Week 9</span>
        </div>
      </div>
      <div class="milestone">
        <div class="milestone-dot" style="--fill: 0"></div>
        <div class="milestone-body">
          <span class="milestone-label">Launch</span>
          <span class="milestone-date">Week 12</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
