<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Infinity Loop Animation</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Ease Infinity Loop</h1>

<svg class="infinity" viewBox="0 0 500 220">

<path
d="M120,110
C120,35 220,35 250,110
C280,185 380,185 380,110
C380,35 280,35 250,110
C220,185 120,185 120,110"
class="loop"/>

</svg>

<p>Continuous SVG stroke animation with glowing effect.</p>

</div>

</body>
</html>
