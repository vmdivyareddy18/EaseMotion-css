<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transform Origin Utilities Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; }
    h1 { margin-bottom: 1.5rem; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 600px; }
    .box {
      width: 80px; height: 80px;
      background: #4f46e5;
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; text-align: center;
      border-radius: 8px;
      transition: transform 0.4s ease;
      cursor: pointer;
    }
    .box:hover { transform: scale(1.5) rotate(15deg); }
  </style>
</head>
<body>
  <h1>Transform Origin Utilities</h1>
  <p>Hover each box to see the pivot point in action.</p>
  <div class="grid">
    <div class="box origin-top-left">top-left</div>
    <div class="box origin-top">top</div>
    <div class="box origin-top-right">top-right</div>
    <div class="box origin-left">left</div>
    <div class="box origin-center">center</div>
    <div class="box origin-right">right</div>
    <div class="box origin-bottom-left">bottom-left</div>
    <div class="box origin-bottom">bottom</div>
    <div class="box origin-bottom-right">bottom-right</div>
  </div>
</body>
</html>
