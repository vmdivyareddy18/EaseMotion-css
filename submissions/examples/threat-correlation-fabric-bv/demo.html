<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Threat Correlation Fabric</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="fabric-dashboard">
    <header class="header">
      <span class="badge">Correlation Fabric</span>
      <h1>Universal Threat Correlation Fabric</h1>
      <p class="subtitle">Multi-domain threat linkage maps, entities resolution, and confidence score metrics.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-correlations">
        <h3>📜 Threat Linkage Nodes</h3>
        <div class="links-grid">
          <div class="link-node"><span>DDoS Vector</span></div>
          <div class="link-node"><span>Botnet-6</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card rating-card">
          <h3>📊 Confidence rating</h3>
          <div class="dial-wrapper"><div class="dial"><span>94.2%</span></div></div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
