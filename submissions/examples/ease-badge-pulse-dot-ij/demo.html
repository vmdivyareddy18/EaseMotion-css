<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badge Pulse Dot — EaseMotion CSS</title>
  <meta name="description" content="Notification badges with animated pulsing dot indicator." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <span class="bpd-badge-label">EaseMotion CSS</span>
    <h1>Badge Pulse Dot</h1>
    <p class="bpd-subtitle">Notification badges with a live pulsing dot. Click any icon to simulate a new notification.</p>
  </header>

  <main class="bpd-grid">

    <div class="bpd-icon-card" data-count="3">
      <div class="bpd-icon-wrap">
        <svg class="bpd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        <span class="bpd-badge">
          <span class="bpd-count">3</span>
          <span class="bpd-dot"></span>
        </span>
      </div>
      <p class="bpd-label">Notifications</p>
    </div>

    <div class="bpd-icon-card" data-count="12">
      <div class="bpd-icon-wrap">
        <svg class="bpd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
        <span class="bpd-badge">
          <span class="bpd-count">12</span>
          <span class="bpd-dot"></span>
        </span>
      </div>
      <p class="bpd-label">Messages</p>
    </div>

    <div class="bpd-icon-card" data-count="0">
      <div class="bpd-icon-wrap">
        <svg class="bpd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <span class="bpd-badge">
          <span class="bpd-count">0</span>
          <span class="bpd-dot"></span>
        </span>
      </div>
      <p class="bpd-label">Comments</p>
    </div>

    <div class="bpd-icon-card" data-count="7">
      <div class="bpd-icon-wrap">
        <svg class="bpd-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12c0 1.821.487 3.53 1.338 5L2.5 21.5l4.5-.838A9.955 9.955 0 0 0 12 22z" />
          <path d="M12 6v6l4 2" />
        </svg>
        <span class="bpd-badge">
          <span class="bpd-count">7</span>
          <span class="bpd-dot"></span>
        </span>
      </div>
      <p class="bpd-label">Activity</p>
    </div>

  </main>

  <script>
    document.querySelectorAll('.bpd-icon-card').forEach(card => {
      card.addEventListener('click', () => {
        const countEl = card.querySelector('.bpd-count');
        let count = parseInt(countEl.textContent, 10);
        count += Math.floor(Math.random() * 3) + 1;
        countEl.textContent = count;
      });
    });
  </script>

</body>
</html>
