<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Morph-Glow Stepper - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="dashboard-wrapper">
        <header class="dashboard-header">
            <h1>Server Migration</h1>
            <p>Hover over the steps to see the pure CSS shape-morph and neon glow effect.</p>
        </header>

        <div class="em-stepper-container">
            <!-- Step 1: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Backup</h3>
                    <p>Data secured</p>
                </div>
            </div>

            <!-- Step 2: Completed -->
            <div class="em-step completed">
                <div class="em-step-indicator">
                    <span class="em-step-icon">✓</span>
                </div>
                <div class="em-step-content">
                    <h3>Provision</h3>
                    <p>Resources ready</p>
                </div>
            </div>

            <!-- Step 3: Active -->
            <div class="em-step active">
                <div class="em-step-indicator">
                    <span class="em-step-icon">3</span>
                </div>
                <div class="em-step-content">
                    <h3>Migrate</h3>
                    <p>Transferring files...</p>
                </div>
            </div>
            
            <!-- Step 4: Pending -->
            <div class="em-step pending">
                <div class="em-step-indicator">
                    <span class="em-step-icon">4</span>
                </div>
                <div class="em-step-content">
                    <h3>DNS Switch</h3>
                    <p>Pending propagation</p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
