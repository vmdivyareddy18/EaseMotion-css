<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Animated Auth Form Component</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page-container">
    <header class="showcase-header">
      <span class="gssoc-badge">✨ GSSoC '26 Component Challenge</span>
      <h1>Authentication Form</h1>
      <p>Interact with the slider tabs to watch seamless field entry panel shifts and floating label transformations.</p>
    </header>

    <!-- Interactive Auth Form Component -->
    <div class="ease-auth-form">
      <div class="ease-auth-form__tabs" id="tabWrapper">
        <button class="ease-auth-form__tab active" data-tab="login">Login</button>
        <button class="ease-auth-form__tab" data-tab="signup">Sign Up</button>
        <div class="ease-auth-form__tab-indicator"></div>
      </div>

      <!-- Login Panel -->
      <div class="ease-auth-form__panel active" id="loginPanel">
        <div class="ease-float-label">
          <input type="email" id="loginEmail" placeholder=" " required />
          <label for="loginEmail">Email Address</label>
        </div>
        <div class="ease-float-label">
          <input type="password" id="loginPassword" placeholder=" " required />
          <label for="loginPassword">Password</label>
        </div>
        <button class="ease-auth-form__submit">Login</button>
      </div>

      <!-- Signup Panel -->
      <div class="ease-auth-form__panel" id="signupPanel">
        <div class="ease-float-label">
          <input type="text" id="signupName" placeholder=" " required />
          <label for="signupName">Full Name</label>
        </div>
        <div class="ease-float-label">
          <input type="email" id="signupEmail" placeholder=" " required />
          <label for="signupEmail">Email Address</label>
        </div>
        <div class="ease-float-label">
          <input type="password" id="signupPassword" placeholder=" " required />
          <label for="signupPassword">Password</label>
        </div>
        <button class="ease-auth-form__submit">Create Account</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const tabs = document.querySelectorAll('.ease-auth-form__tab');
      const tabWrapper = document.getElementById('tabWrapper');
      const loginPanel = document.getElementById('loginPanel');
      const signupPanel = document.getElementById('signupPanel');

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const targetTab = tab.getAttribute('data-tab');

          // Deactivate alternate active states
          tabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          if (targetTab === 'signup') {
            tabWrapper.classList.add('signup-active');
            loginPanel.classList.remove('active');
            signupPanel.classList.add('active');
          } else {
            tabWrapper.classList.remove('signup-active');
            signupPanel.classList.remove('active');
            loginPanel.classList.add('active');
          }
        });
      });
    });
  </script>
</body>
</html>
