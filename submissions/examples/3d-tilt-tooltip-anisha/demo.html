<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Perspective Tilt Tooltip Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="ease-product-container">
        <div class="ease-product-card">
            <img src="https://placehold.co/150x150/1e293b/6366f1?text=AeroGlide" alt="Sneaker">
            <h3>AeroGlide Pro</h3>
            <p>$129.99</p>

            <div class="ease-3d-tooltip">
                <div class="ease-tooltip-header">
                    <span class="ease-tooltip-tag">In Stock</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path>
                        <line x1="7" y1="7" x2="7.01" y2="7"></line>
                    </svg>
                </div>
                <h4 class="ease-tooltip-title">AeroGlide Pro Specs</h4>
                <p class="ease-tooltip-desc">Ultra-lightweight mesh upper with responsive foam midsole for maximum energy return.</p>
                <ul class="ease-spec-list">
                    <li>Weight: 8.5 oz</li>
                    <li>Drop: 8mm</li>
                    <li>Surface: Road</li>
                </ul>
            </div>
            
        </div>
    </div>

</body>
</html>
