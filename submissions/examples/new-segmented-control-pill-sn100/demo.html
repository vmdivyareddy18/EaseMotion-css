<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Sliding Segmented Control Selector</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-segmented-control">
  <input type="radio" name="seg" id="seg1" checked>
  <label for="seg1">Daily</label>
  
  <input type="radio" name="seg" id="seg2">
  <label for="seg2">Weekly</label>
  
  <input type="radio" name="seg" id="seg3">
  <label for="seg3">Monthly</label>
  
  <span class="active-pill"></span>
</div>
</body>
</html>
