<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Pulse-Active Popover - Neumorphic Soft</title>
    <meta name="description" content="A pure CSS animated Popover utilizing a smooth Pulse-Active interaction transition.">
    <!-- Include EaseMotion core CSS -->
    <link rel="stylesheet" href="../../../easemotion.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="neumorphic-layout">
        <div class="neumorphic-card main-interface">
            <header class="interface-header">
                <h2>Smart Home</h2>
                <div class="neo-avatar"></div>
            </header>

            <div class="interface-body">
                <div class="weather-widget neo-card">
                    <div class="weather-icon">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </div>
                    <div class="weather-info">
                        <h3>24°C</h3>
                        <p>Sunny, San Francisco</p>
                    </div>
                </div>

                <div class="devices-grid">
                    <div class="neo-card device-box active">
                        <div class="device-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                        </div>
                        <h3>Front Door</h3>
                        <p>Locked</p>
                    </div>
                    
                    <!-- THE PULSE-ACTIVE POPOVER COMPONENT -->
                    <div class="ease-popover-container">
                        <!-- Checkbox Hack for Pure CSS Active State -->
                        <input type="checkbox" id="thermostat-toggle" class="ease-popover-toggle" aria-hidden="true">
                        
                        <!-- Trigger Label acts as a Neumorphic button -->
                        <label for="thermostat-toggle" class="neo-card device-box ease-popover-trigger" tabindex="0" role="button" aria-haspopup="true">
                            <div class="device-icon">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path></svg>
                            </div>
                            <h3>Thermostat</h3>
                            <p>22°C - Tap to adjust</p>
                        </label>
                        
                        <!-- Popover Panel -->
                        <div class="ease-popover-panel ease-pulse-active" role="dialog">
                            <div class="ease-popover-header">
                                <h3>Climate Control</h3>
                                <label for="thermostat-toggle" class="close-btn neo-btn icon-btn-sm" aria-label="Close" tabindex="0" role="button">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                                </label>
                            </div>
                            <div class="ease-popover-body">
                                <div class="temperature-display neo-inset">
                                    <span class="temp-value">22</span>
                                    <span class="temp-unit">°C</span>
                                </div>
                                <div class="climate-controls">
                                    <button class="neo-btn icon-btn" aria-label="Decrease Temperature">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    </button>
                                    <button class="neo-btn icon-btn" aria-label="Increase Temperature">
                                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- END POPOVER COMPONENT -->
                    
                </div>
                
                <div class="controls-section">
                    <h3>Living Room Lights</h3>
                    <div class="neo-track neo-inset">
                        <div class="neo-thumb neo-btn"></div>
                    </div>
                </div>
                
            </div>
        </div>
    </div>
</body>
</html>
