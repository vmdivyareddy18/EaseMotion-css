<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure CSS Apollo 11 Teardown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-saturn-v-simulator">
    
    <!-- Aerospace Sequence State Engine -->
    <input type="checkbox" id="sep-stage-1" class="state-toggle" />
    <input type="checkbox" id="sep-stage-2" class="state-toggle" />
    <input type="checkbox" id="sep-stage-3" class="state-toggle" />
    <input type="checkbox" id="sep-les" class="state-toggle" />

    <!-- Organic Particle Starfield -->
    <div class="starfield">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>

      <div class="star"></div>

      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>

      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>

    <!-- Interactive HUD Controls -->
    <div class="mission-control-hud">
      <h1>Saturn V Teardown</h1>
      <p>Apollo 11 Interactive 3D Telemetry</p>
      
      <div class="control-panel">
        <label for="sep-stage-1" class="hud-btn btn-s1">JETTISON STAGE 1</label>
        <label for="sep-stage-2" class="hud-btn btn-s2">JETTISON STAGE 2</label>
        <label for="sep-stage-3" class="hud-btn btn-s3">JETTISON STAGE 3</label>
        <label for="sep-les" class="hud-btn btn-les">JETTISON LES</label>
      </div>
    </div>

    <div class="space-environment">
      <div class="rocket-assembly">

        <!-- Stage 1 (S-IC) -->
        <div class="rocket-module stage-1">
          <div class="thruster-glow"></div>
          <div class="cylinder-faces">
            <div class="face face-0" style="--i: 0;"></div>
            <div class="face face-1" style="--i: 1;"></div>
            <div class="face face-2" style="--i: 2;"></div>
            <div class="face face-3" style="--i: 3;"></div>
            <div class="face face-4" style="--i: 4;"></div>
            <div class="face face-5" style="--i: 5;">U</div>
            <div class="face face-6" style="--i: 6;">S</div>
            <div class="face face-7" style="--i: 7;">A</div>
            <div class="face face-8" style="--i: 8;"></div>
            <div class="face face-9" style="--i: 9;"></div>
            <div class="face face-10" style="--i: 10;"></div>
            <div class="face face-11" style="--i: 11;"></div>
            <div class="face face-12" style="--i: 12;"></div>
            <div class="face face-13" style="--i: 13;"></div>
            <div class="face face-14" style="--i: 14;"></div>
            <div class="face face-15" style="--i: 15;"></div>
            <div class="face face-16" style="--i: 16;"></div>
            <div class="face face-17" style="--i: 17;"></div>
            <div class="face face-18" style="--i: 18;"></div>
            <div class="face face-19" style="--i: 19;"></div>
          </div>
        </div>

        <!-- Stage 2 (S-II) -->
        <div class="rocket-module stage-2">
          <div class="thruster-glow"></div>
          <div class="cylinder-faces">
            <div class="face face-0" style="--i: 0;"></div>
            <div class="face face-1" style="--i: 1;"></div>
            <div class="face face-2" style="--i: 2;"></div>
            <div class="face face-3" style="--i: 3;"></div>
            <div class="face face-4" style="--i: 4;"></div>
            <div class="face face-5" style="--i: 5;"></div>
            <div class="face face-6" style="--i: 6;"></div>
            <div class="face face-7" style="--i: 7;"></div>
            <div class="face face-8" style="--i: 8;"></div>
            <div class="face face-9" style="--i: 9;"></div>
            <div class="face face-10" style="--i: 10;"></div>
            <div class="face face-11" style="--i: 11;"></div>
            <div class="face face-12" style="--i: 12;"></div>
            <div class="face face-13" style="--i: 13;"></div>
            <div class="face face-14" style="--i: 14;"></div>
            <div class="face face-15" style="--i: 15;"></div>
            <div class="face face-16" style="--i: 16;"></div>
            <div class="face face-17" style="--i: 17;"></div>
            <div class="face face-18" style="--i: 18;"></div>
            <div class="face face-19" style="--i: 19;"></div>
          </div>
        </div>

        <!-- Stage 3 (S-IVB) -->
        <div class="rocket-module stage-3">
          <div class="thruster-glow"></div>
          <div class="cylinder-faces">
            <div class="face face-0" style="--i: 0;"></div>
            <div class="face face-1" style="--i: 1;"></div>
            <div class="face face-2" style="--i: 2;"></div>
            <div class="face face-3" style="--i: 3;"></div>
            <div class="face face-4" style="--i: 4;"></div>
            <div class="face face-5" style="--i: 5;"></div>
            <div class="face face-6" style="--i: 6;"></div>
            <div class="face face-7" style="--i: 7;"></div>
            <div class="face face-8" style="--i: 8;"></div>
            <div class="face face-9" style="--i: 9;"></div>
            <div class="face face-10" style="--i: 10;"></div>
            <div class="face face-11" style="--i: 11;"></div>
            <div class="face face-12" style="--i: 12;"></div>
            <div class="face face-13" style="--i: 13;"></div>
            <div class="face face-14" style="--i: 14;"></div>
            <div class="face face-15" style="--i: 15;"></div>
            <div class="face face-16" style="--i: 16;"></div>
            <div class="face face-17" style="--i: 17;"></div>
            <div class="face face-18" style="--i: 18;"></div>
            <div class="face face-19" style="--i: 19;"></div>
          </div>
        </div>

        <!-- Command Module -->
        <div class="rocket-module csm">
          <div class="thruster-glow"></div>
          <div class="cylinder-faces">
            <div class="face face-0" style="--i: 0;"></div>
            <div class="face face-1" style="--i: 1;"></div>
            <div class="face face-2" style="--i: 2;"></div>
            <div class="face face-3" style="--i: 3;"></div>
            <div class="face face-4" style="--i: 4;"></div>
            <div class="face face-5" style="--i: 5;"></div>
            <div class="face face-6" style="--i: 6;"></div>
            <div class="face face-7" style="--i: 7;"></div>
            <div class="face face-8" style="--i: 8;"></div>
            <div class="face face-9" style="--i: 9;"></div>
            <div class="face face-10" style="--i: 10;"></div>
            <div class="face face-11" style="--i: 11;"></div>
            <div class="face face-12" style="--i: 12;"></div>
            <div class="face face-13" style="--i: 13;"></div>
            <div class="face face-14" style="--i: 14;"></div>
            <div class="face face-15" style="--i: 15;"></div>
            <div class="face face-16" style="--i: 16;"></div>
            <div class="face face-17" style="--i: 17;"></div>
            <div class="face face-18" style="--i: 18;"></div>
            <div class="face face-19" style="--i: 19;"></div>
          </div>
        </div>

        <!-- Escape System -->
        <div class="rocket-module les">
          <div class="thruster-glow"></div>
          <div class="cylinder-faces">
            <div class="face face-0" style="--i: 0;"></div>
            <div class="face face-1" style="--i: 1;"></div>
            <div class="face face-2" style="--i: 2;"></div>
