<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Soft Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="neumorphic-layout-container">
    
    <!-- Neumorphic Soft Glow Pulse Card -->
    <div class="ease-neumorphic-glow-card">
      
      <!-- Glowing Animated Backdrop -->
      <div class="ease-neumorphic-glow-layer layer-1"></div>
      <div class="ease-neumorphic-glow-layer layer-2"></div>
      
      <!-- Card Content -->
      <div class="ease-neumorphic-content">
        <div class="neumorphic-header">
          <div class="neumorphic-icon-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
              <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
              <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
          </div>
          <span class="neumorphic-badge">Active</span>
        </div>
        <h2 class="neumorphic-title">Soft UI Component</h2>
        <p class="neumorphic-description">
          A seamless blend of neumorphism (soft shadows) and a gentle, ambient glowing pulse. Perfect for modern, clean, and minimalist interfaces.
        </p>
        <div class="neumorphic-actions">
          <button class="neumorphic-btn">Explore Details</button>
        </div>
      </div>
      
    </div>

  </div>

</body>
</html>
