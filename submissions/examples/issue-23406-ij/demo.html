<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banjo Pluck Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="banjo">
    <div class="banjo-neck"></div>
    <div class="banjo-head">
      <div class="banjo-rim"></div>
      <div class="banjo-skin"></div>
      <div class="banjo-bridge"></div>
    </div>
    <div class="banjo-strings">
      <div class="bstring" style="--i:0"></div>
      <div class="bstring" style="--i:1"></div>
      <div class="bstring" style="--i:2"></div>
      <div class="bstring" style="--i:3"></div>
      <div class="bstring" style="--i:4"></div>
    </div>
    <div class="banjo-pick"></div>
  </div>
</body>
</html>
