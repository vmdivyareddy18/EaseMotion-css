<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Orbit Border</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="demo-title">Ease Orbit Border</h1>

    <p class="demo-subtitle">
        Orbiting dots travel continuously around the component border.
    </p>

    <div class="ease-orbit-border">
        <h2>Default Orbit</h2>
        <p>
            Smooth continuous motion around the border.
        </p>
    </div>

    <div class="ease-orbit-border orbit-fast">
        <h2>Fast Orbit</h2>
        <p>
            Faster orbit speed demonstration.
        </p>
    </div>

    <div class="ease-orbit-border orbit-slow">
        <h2>Slow Orbit</h2>
        <p>
            Slower orbit speed demonstration.
        </p>
    </div>
</div>

</body>
</html>
