<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Letter Spacing Text</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="letter-spacing-text">Breathe</h1>
    <p class="letter-sub">Hover to expand</p>
    <div class="letter-demo">
      <p class="letter-line">Each letter drifts apart</p>
      <p class="letter-line">Then comes back together</p>
      <p class="letter-line">Like a gentle pulse</p>
    </div>
  </div>
</body>
</html>
