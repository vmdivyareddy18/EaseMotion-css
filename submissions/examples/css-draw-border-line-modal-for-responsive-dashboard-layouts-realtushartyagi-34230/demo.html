<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Draw-Border Line Modal (Dashboard)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    .dashboard-panel {
      background: white;
      padding: 32px;
      border-radius: 8px;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
      text-align: center;
      border: 1px solid #e5e7eb;
    }
    h1 {
      font-size: 1.25rem;
      color: #111827;
      margin-bottom: 1rem;
      margin-top: 0;
    }
  </style>
</head>
<body>

  <div class="dashboard-panel">
    <h1>User Settings Widget</h1>
    <!-- Trigger link (uses anchor hash to target the modal ID) -->
    <a href="#dashboard-modal" class="ease-draw-trigger-btn">Edit Preferences</a>
  </div>

  <!-- Modal Overlay (Targeted via ID) -->
  <div id="dashboard-modal" class="ease-draw-modal-overlay">
    <!-- Animated Container -->
    <div class="ease-draw-modal-container">
      
      <!-- Inner Content -->
      <div class="ease-draw-modal-content">
        <!-- Close Button (Links back to # or a specific non-modal ID to close) -->
        <a href="#" class="ease-draw-modal-close" aria-label="Close modal">&times;</a>
        
        <h2 style="margin-top:0; font-size: 1.5rem; font-weight: 600;">Preferences</h2>
        <p style="font-size: 0.95rem; line-height: 1.5; color: #4b5563; margin-bottom: 24px;">
          This modal uses a CSS-only <strong>Draw-Border Line</strong> animation. When the modal opens, pseudo-elements transition their width and height to smoothly draw a border around the content box.
        </p>
        
        <div style="display: flex; gap: 12px; border-top: 1px solid #e5e7eb; padding-top: 24px;">
          <a href="#" class="ease-draw-trigger-btn">Save Changes</a>
          <a href="#" style="padding: 10px 20px; font-weight: 500; font-size: 0.95rem; color: #4b5563; text-decoration: none;">Cancel</a>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
