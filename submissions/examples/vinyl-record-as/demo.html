<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinyl Record</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="turntable">
    <div class="platter">
      <div class="record">
        <div class="label">
          <span class="label-title">Neon Nights</span>
          <span class="label-sub">45 RPM</span>
          <span class="spindle"></span>
        </div>
      </div>
    </div>

    <div class="tonearm">
      <span class="pivot"></span>
      <span class="arm"></span>
      <span class="head"></span>
    </div>
  </div>
</body>
</html>
