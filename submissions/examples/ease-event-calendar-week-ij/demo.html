<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Calendar Week — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="calendar-header">
      <button class="nav-btn" id="prevWeek">&#8249;</button>
      <h2 id="weekLabel">Mon 3 — Sun 9</h2>
      <button class="nav-btn" id="nextWeek">&#8250;</button>
    </div>
    <div class="week-days" id="weekDays">
      <div class="day" data-day="mon">Mon<br><span class="date">3</span></div>
      <div class="day" data-day="tue">Tue<br><span class="date">4</span></div>
      <div class="day" data-day="wed">Wed<br><span class="date">5</span></div>
      <div class="day" data-day="thu">Thu<br><span class="date">6</span></div>
      <div class="day" data-day="fri">Fri<br><span class="date">7</span></div>
      <div class="day" data-day="sat">Sat<br><span class="date">8</span></div>
      <div class="day" data-day="sun">Sun<br><span class="date">9</span></div>
    </div>
    <div class="event-list" id="eventList">
      <div class="event" data-day="mon">
        <span class="event-time">09:00</span>
        <span class="event-title">Stand-up</span>
      </div>
      <div class="event" data-day="mon">
        <span class="event-time">14:00</span>
        <span class="event-title">Design review</span>
      </div>
      <div class="event" data-day="wed">
        <span class="event-time">10:30</span>
        <span class="event-title">Sprint planning</span>
      </div>
      <div class="event" data-day="fri">
        <span class="event-time">16:00</span>
        <span class="event-title">Team retro</span>
      </div>
      <div class="event empty-state" id="emptyState">No events for this day</div>
    </div>
  </div>
  <script>
    const days = document.querySelectorAll('.day');
    const events = document.querySelectorAll('.event[data-day]');
    const emptyState = document.getElementById('emptyState');

    days.forEach(day => {
      day.addEventListener('click', () => {
        days.forEach(d => d.classList.remove('selected'));
        day.classList.add('selected');
        const selectedDay = day.dataset.day;
        let hasEvent = false;
        events.forEach(ev => {
          ev.classList.toggle('visible', ev.dataset.day === selectedDay);
          if (ev.dataset.day === selectedDay) hasEvent = true;
        });
        emptyState.classList.toggle('visible', !hasEvent);
      });
    });

    days[0].click();
  </script>
</body>
</html>
