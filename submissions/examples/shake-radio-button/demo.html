<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EaseMotion CSS • Shake Radio Button</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- EaseMotion CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css"
  />

  <!-- Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>

<body class="ease-center">

  <main class="demo-container ease-fade-in">

    <header class="demo-header ease-slide-up">
      <h1>🌙 Shake Radio Button</h1>
      <p>
        A pure CSS radio button component featuring a subtle shake animation,
        glowing selection state, and a modern dark mode interface.
      </p>
    </header>

    <section
      class="radio-card ease-slide-up ease-delay-200"
      aria-labelledby="theme-heading"
    >

      <h2 id="theme-heading">Choose a Theme</h2>

      <form class="radio-group">

        <label class="radio-option ease-hover-grow">
          <input
            type="radio"
            name="theme"
            checked
          />

          <span class="radio-circle"></span>

          <span class="radio-text">
            Dark Mode
          </span>
        </label>

        <label class="radio-option ease-hover-grow">
          <input
            type="radio"
            name="theme"
          />

          <span class="radio-circle"></span>

          <span class="radio-text">
            Midnight Blue
          </span>
        </label>

        <label class="radio-option ease-hover-grow">
          <input
            type="radio"
            name="theme"
          />

          <span class="radio-circle"></span>

          <span class="radio-text">
            AMOLED Black
          </span>
        </label>

      </form>

    </section>

  </main>

</body>
</html>
