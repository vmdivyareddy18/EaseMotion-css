<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User-Select All Utility Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f8fafc; padding: 40px; margin: 0;">

  <div class="click-snippet-card">
    <h5>Single-Click Snippet Container</h5>
    
    <div class="ease-select-all" style="color: #0369a1; font-size: 0.95rem; line-height: 1.6; background-color: #f0f9ff; padding: 12px; border-radius: 6px; border: 1px solid #bae6fd; cursor: pointer;">
      <code>npm install easemotion-css --save-dev</code>
    </div>
    <p style="font-size: 0.8rem; color: #64748b; margin-top: 8px; margin-bottom: 0;">Click anywhere inside the blue container once. The browser engine highlights the entire string array instantly for fast clip transfers.</p>
  </div>

</body>
</html>
