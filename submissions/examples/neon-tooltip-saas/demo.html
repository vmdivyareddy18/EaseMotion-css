<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion Neon Tooltip Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="sandbox-wrapper">
    <div class="header">
      <h1>EaseMotion</h1>
      <p>Pure CSS Animated Neon Glow Tooltip</p>
    </div>

    <div class="demo-container">
      
      <!-- Variant 1: Purple SaaS Button (Default Accent) -->
      <button class="tooltip-trigger" data-tooltip="System status operational • 99.9% uptime">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="m9 12 2 2 4-4"></path></svg>
        Performance Metrics
      </button>
      
      <!-- Variant 2: Cyber Cyan Input Field -->
      <div class="tooltip-trigger cyan-variant input-wrapper" data-tooltip="Tokens refresh automatically every 15m">
        <input type="text" value="TokenExampleKey" aria-label="API Token Key" readonly>
      </div>

      <!-- Variant 3: Danger/Alert Crimson Badge -->
      <span class="tooltip-trigger danger-variant status-badge" data-tooltip="Action required: Database storage at 94%">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        Database Alert
      </span>

    </div>
  </main>

</body>
</html>
