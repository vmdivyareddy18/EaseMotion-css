<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backdrop Overlay Utilities — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div class="ease-overlay-showcase">
    
    <div class="ease-media-card">
      <div class="ease-overlay-dark"></div>
      
      <div class="ease-card-content-wrapper">
        <span style="font-size: 0.75rem; font-weight: 700; color: #38bdf8; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">.ease-overlay-dark</span>
        <h3 class="ease-hero-headline" style="color: #ffffff;">Cinematic Media Veil</h3>
        <p class="ease-hero-subtext" style="color: #cbd5e1;">
          Darkening the underlying image texture to guarantee high-contrast readability compliance for light typography.
        </p>
      </div>
    </div>

    <div class="ease-media-card">
      <div class="ease-overlay-light"></div>
      
      <div class="ease-card-content-wrapper">
        <span style="font-size: 0.75rem; font-weight: 700; color: #2563eb; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem;">.ease-overlay-light</span>
        <h3 class="ease-hero-headline" style="color: #0f172a;">Minimalist Matte Tint</h3>
        <p class="ease-hero-subtext" style="color: #475569;">
          Bleaching base background visuals into an elegant soft frame to isolate dark text headers cleanly.
        </p>
      </div>
    </div>

  </div>

</body>
</html>
