<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isometric Skew Calendar Showcase</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      background-color: #05070f; /* Dark space theme */
      color: #f8fafc;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    .wrapper {
      text-align: center;
      margin-bottom: 1rem;
    }
    .wrapper h1 {
      font-size: 2rem;
      margin: 0 0 0.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6c63ff, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .wrapper p {
      color: #64748b;
      margin: 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <h1>Skew Calendar</h1>
    <p>Hover over days to experience isometric 3D pop-out animations and lighting glows.</p>
  </div>

  <div class="calendar-perspective">
    <div class="calendar-card">
      <div class="calendar-header">
        <h3 class="calendar-title">SaaS Schedule</h3>
        <span class="calendar-month">October 2026</span>
      </div>

      <div class="calendar-grid">
        <!-- Weekday Headers -->
        <div class="weekday-header">M</div>
        <div class="weekday-header">T</div>
        <div class="weekday-header">W</div>
        <div class="weekday-header">T</div>
        <div class="weekday-header">F</div>
        <div class="weekday-header">S</div>
        <div class="weekday-header">S</div>

        <!-- Month Days (Oct 2026 starts on Thursday) -->
        <div class="calendar-day empty"></div>
        <div class="calendar-day empty"></div>
        <div class="calendar-day empty"></div>
        <div class="calendar-day">1</div>
        <div class="calendar-day">2<span class="event-dot"></span></div>
        <div class="calendar-day">3</div>
        <div class="calendar-day">4</div>

        <div class="calendar-day">5</div>
        <div class="calendar-day">6</div>
        <div class="calendar-day">7<span class="event-dot"></span></div>
        <div class="calendar-day">8</div>
        <div class="calendar-day">9</div>
        <div class="calendar-day">10</div>
        <div class="calendar-day">11</div>

        <div class="calendar-day">12</div>
        <div class="calendar-day">13<span class="event-dot"></span></div>
        <div class="calendar-day active">14</div>
        <div class="calendar-day">15</div>
        <div class="calendar-day">16</div>
        <div class="calendar-day">17</div>
        <div class="calendar-day">18</div>

        <div class="calendar-day">19</div>
        <div class="calendar-day">20</div>
        <div class="calendar-day">21<span class="event-dot"></span></div>
        <div class="calendar-day">22</div>
        <div class="calendar-day">23</div>
        <div class="calendar-day">24</div>
        <div class="calendar-day">25</div>

        <div class="calendar-day">26</div>
        <div class="calendar-day">27</div>
        <div class="calendar-day">28</div>
        <div class="calendar-day">29</div>
        <div class="calendar-day">30<span class="event-dot"></span></div>
        <div class="calendar-day">31</div>
        <div class="calendar-day empty"></div>
      </div>
    </div>
  </div>
</body>
</html>
