<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Course Cards Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet" href="style.css">

</head>

<body>

<section class="courses">

<h1 class="ease-fade-in">
Popular Courses
</h1>

<div class="grid">

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/320x180"
alt="Python Course">

<h2>Python Programming</h2>

<p class="teacher">
Instructor: John Smith
</p>

<p class="duration">
⏱ 12 Weeks
</p>

<p class="rating">
⭐⭐⭐⭐⭐ (4.9)
</p>

<button class="btn ease-hover-grow">
Enroll Now
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/320x180"
alt="React Course">

<h2>React Development</h2>

<p class="teacher">
Instructor: Sarah Lee
</p>

<p class="duration">
⏱ 10 Weeks
</p>

<p class="rating">
⭐⭐⭐⭐☆ (4.7)
</p>

<button class="btn ease-hover-grow">
Enroll Now
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/320x180"
alt="Machine Learning">

<h2>Machine Learning</h2>

<p class="teacher">
Instructor: David Kumar
</p>

<p class="duration">
⏱ 14 Weeks
</p>

<p class="rating">
⭐⭐⭐⭐⭐ (5.0)
</p>

<button class="btn ease-hover-grow">
Enroll Now
</button>

</div>

</div>

</section>

</body>
</html>
