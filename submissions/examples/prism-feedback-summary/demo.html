<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>prism feedback summary demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="prism feedback summary">
    <section class="status-card">
      <div class="card-copy">
        <p>Feedback</p>
        <h1>prism feedback summary</h1>
        <span>Customer signal snapshot</span>
      </div>
      <div class="metric" aria-label="Score value">
        <strong>92%</strong>
        <em>Score</em>
      </div>
      <div class="motion-bars" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
