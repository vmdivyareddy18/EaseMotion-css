<!DOCTYPE html>
<html>
<head>
  <title>Password Toggle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <input type="password" id="pass">
  <button onclick="toggle()">Show</button>
</div>

<script>
function toggle() {
  const input = document.getElementById("pass");
  if (input.type === "password") {
    input.type = "text";
  } else {
    input.type = "password";
  }
}
</script>

</body>
</html>
