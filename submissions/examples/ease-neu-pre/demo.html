<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Neumorphism Soft UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="section">
    <h2>Neu Cards</h2>
    <div style="display:flex; gap:24px; flex-wrap:wrap; justify-content:center;">

      <div class="ease-neu-card">
        <div class="neu-card-icon">⚡</div>
        <div class="neu-card-title">Raised Card</div>
        <div class="neu-card-text">
          Soft raised neumorphic card with outer shadows.
        </div>
      </div>

      <div class="ease-neu-card pressed">
        <div class="neu-card-icon">🎨</div>
        <div class="neu-card-title">Pressed Card</div>
        <div class="neu-card-text">
          Inset shadow gives a pressed/recessed feel.
        </div>
      </div>

    </div>
  </div>

  <div class="section">
    <h2>Neu Buttons — Click to feel depth</h2>
    <div>
      <button class="ease-neu-btn">⚡ Default</button>
      <button class="ease-neu-btn green">✓ Confirm</button>
      <button class="ease-neu-btn orange">🔥 Explore</button>
      <button class="ease-neu-btn pink">💜 Subscribe</button>
    </div>
  </div>

  <div class="section">
    <h2>Neu Input</h2>
    <div style="width:320px;">
      <input
        class="ease-neu-input"
        type="text"
        placeholder="Soft UI input..."
      />
    </div>
  </div>

</body>
</html>
