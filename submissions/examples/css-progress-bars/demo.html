<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Progress Bars - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 CSS Progress Bars</h1>
            <p>Beautiful animated progress indicators - Pure CSS!</p>
        </header>

        <!-- Linear Progress Bars -->
        <section class="section">
            <h2>Linear Progress Bars</h2>
            
            <div class="progress-item">
                <div class="progress-header">
                    <span class="label">HTML</span>
                    <span class="value">90%</span>
                </div>
                <div class="progress linear">
                    <div class="bar" style="--width: 90%; --color: #4facfe;"></div>
                </div>
            </div>

            <div class="progress-item">
                <div class="progress-header">
                    <span class="label">CSS</span>
                    <span class="value">85%</span>
                </div>
                <div class="progress linear">
                    <div class="bar" style="--width: 85%; --color: #f093fb;"></div>
                </div>
            </div>

            <div class="progress-item">
                <div class="progress-header">
                    <span class="label">JavaScript</span>
                    <span class="value">75%</span>
                </div>
                <div class="progress linear">
                    <div class="bar" style="--width: 75%; --color: #43e97b;"></div>
                </div>
            </div>
        </section>

        <!-- Striped Progress Bars -->
        <section class="section">
            <h2>Striped Progress Bars</h2>
            
            <div class="progress-item">
                <div class="progress-header">
                    <span class="label">Project Alpha</span>
                    <span class="value">65%</span>
                </div>
                <div class="progress striped">
                    <div class="bar" style="--width: 65%; --color: #fa709a;"></div>
                </div>
            </div>

            <div class="progress-item">
                <div class="progress-header">
                    <span class="label">Project Beta</span>
                    <span class="value">45%</span>
                </div>
                <div class="progress striped">
                    <div class="bar" style="--width: 45%; --color: #feca57;"></div>
                </div>
            </div>
        </section>

        <!-- Circular Progress Bars -->
        <section class="section">
            <h2>Circular Progress Bars</h2>
            
            <div class="circular-grid">
                <div class="circular-item">
                    <div class="progress circular">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg" cx="50" cy="50" r="45"></circle>
                            <circle class="fill" cx="50" cy="50" r="45" 
                                    style="--percent: 80; --color: #4facfe;"></circle>
                        </svg>
                        <div class="text">80%</div>
                    </div>
                    <p>Design</p>
                </div>

                <div class="circular-item">
                    <div class="progress circular">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg" cx="50" cy="50" r="45"></circle>
                            <circle class="fill" cx="50" cy="50" r="45" 
                                    style="--percent: 65; --color: #f093fb;"></circle>
                        </svg>
                        <div class="text">65%</div>
                    </div>
                    <p>Development</p>
                </div>

                <div class="circular-item">
                    <div class="progress circular">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg" cx="50" cy="50" r="45"></circle>
                            <circle class="fill" cx="50" cy="50" r="45" 
                                    style="--percent: 92; --color: #43e97b;"></circle>
                        </svg>
                        <div class="text">92%</div>
                    </div>
                    <p>Testing</p>
                </div>
            </div>
        </section>

        <!-- Gradient Progress Bars -->
        <section class="section">
            <h2>Gradient Progress Bars</h2>
            
            <div class="progress-item">
                <div class="progress gradient">
                    <div class="bar" style="--width: 78%;"></div>
                </div>
            </div>

            <div class="progress-item">
                <div class="progress gradient-alt">
                    <div class="bar" style="--width: 55%;"></div>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
