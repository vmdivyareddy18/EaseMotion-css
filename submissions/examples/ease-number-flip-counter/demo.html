<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-number-flip-counter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <p class="eyebrow">EaseMotion CSS · CSS Animation</p>
      <h1>ease-number-flip-counter</h1>
      <p class="hero-copy">A CSS-only number flip counter with a digit-roll clock effect.</p>
    </section>

    <section class="demo-panel">
      <div class="demo-header">
        <h2>Interactive Demo</h2>
        <span class="status-pill">Flip counter preview</span>
      </div>

      <div class="counter-card" aria-label="Number flip counter demo">
        <div class="counter-label">Total orders</div>

        <div class="flip-counter">
          <span class="flip-digit digit-1">1</span>
          <span class="flip-digit digit-2">9</span>
          <span class="flip-digit digit-3">4</span>
          <span class="flip-separator">,</span>
          <span class="flip-digit digit-4">7</span>
          <span class="flip-digit digit-5">2</span>
          <span class="flip-digit digit-6">0</span>
        </div>

        <p class="counter-note">Each digit rolls like a mechanical clock face.</p>
      </div>

      <div class="flip-grid">
        <div class="mini-card">
          <span class="mini-label">Users</span>
          <strong class="mini-number">42,108</strong>
        </div>
        <div class="mini-card">
          <span class="mini-label">Revenue</span>
          <strong class="mini-number">18,590</strong>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
