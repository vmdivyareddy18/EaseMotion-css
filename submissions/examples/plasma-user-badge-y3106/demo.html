<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plasma User Badge — Travel App Design — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #0f121d 0%, #030508 100%);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 40px 20px;
        color: #f8fafc;
        box-sizing: border-box;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.015) 1px,
            transparent 1px
          );
        background-size: 30px 30px;
      }
      .demo-header {
        text-align: center;
        margin-bottom: 48px;
      }
      .demo-header h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 12px 0;
        background: linear-gradient(135deg, #ff7e5f 0%, #38ef7d 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 1.5px;
      }
      .demo-header p {
        font-size: 15px;
        color: #556080;
        margin: 0;
        max-width: 500px;
        line-height: 1.5;
      }
      .showcase-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 24px;
        max-width: 1000px;
        width: 100%;
      }
      .explorer-card {
        background: rgba(20, 23, 36, 0.65);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 24px;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
        transition:
          border-color 0.3s ease,
          transform 0.3s ease;
        position: relative;
      }
      .explorer-card:hover {
        border-color: rgba(255, 255, 255, 0.1);
        transform: translateY(-4px);
      }
      .badge-wrapper-box {
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 18px;
      }
      .explorer-card h3 {
        font-size: 18px;
        font-weight: 700;
        color: #f1f5f9;
        margin: 0 0 6px 0;
      }
      .explorer-card p {
        font-size: 13px;
        color: #64748b;
        margin: 0 0 16px 0;
      }
      .badge-label {
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
        padding: 6px 14px;
        border-radius: 20px;
        background-color: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .label-sunset {
        color: #feb47b;
        border-color: rgba(254, 180, 123, 0.2);
      }
      .label-ocean {
        color: #00c6ff;
        border-color: rgba(0, 198, 255, 0.2);
      }
      .label-aurora {
        color: #38ef7d;
        border-color: rgba(56, 239, 125, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Plasma User Badge</h1>
      <p>
        Fluid, continuously morphing gradient outlines and glowing background
        shadows inspired by travel app rank badges.
      </p>
    </div>

    <div class="showcase-grid">
      <!-- Showcase 1: Sunset -->
      <div class="explorer-card">
        <div class="badge-wrapper-box">
          <div class="plasma-badge-wrapper theme-sunset">
            <div class="plasma-glow-aurora"></div>
            <div class="plasma-border-blob">
              <div class="avatar-cutout">
                <svg class="avatar-img" viewBox="0 0 100 100">
                  <defs>
                    <linearGradient
                      id="sunsetAv"
                      x1="0%"
                      y1="0%"
                      x2="100%"
                      y2="100%"
                    >
                      <stop offset="0%" stop-color="#ff7e5f" />
                      <stop offset="100%" stop-color="#ff2a5f" />
                    </linearGradient>
                  </defs>
                  <rect width="100%" height="100%" fill="url(#sunsetAv)" />
                  <circle cx="50" cy="40" r="18" fill="#ffffff" opacity="0.9" />
                  <path
                    d="M22 80 C22 62, 78 62, 78 80"
                    fill="#ffffff"
                    opacity="0.9"
                  />
                </svg>
              </div>
            </div>
          </div>
        </div>
        <h3>Elena Rostova</h3>
        <p>Level 42 Explorer</p>
        <span class="badge-label label-sunset">Globetrotter</span>
      </div>

      <!-- Showcase 2: Ocean -->
      <div class="explorer-card">
        <div class="badge-wrapper-box">
          <div class="plasma-badge-wrapper theme-ocean">
            <div class="plasma-glow-aurora"></div>
            <div class="plasma-border-blob">
              <div class="avatar-cutout">
                <svg class="avatar-img" viewBox="0 0 100 100">
                  <defs>
                    <linearGradient
                      id="oceanAv"
                      x1="0%"
                      y1="0%"
                      x2="100%"
                      y2="100%"
                    >
                      <stop offset="0%" stop-color="#00c6ff" />
                      <stop offset="100%" stop-color="#0072ff" />
                    </linearGradient>
                  </defs>
                  <rect width="100%" height="100%" fill="url(#oceanAv)" />
                  <circle cx="50" cy="40" r="18" fill="#ffffff" opacity="0.9" />
                  <path
                    d="M22 80 C22 62, 78 62, 78 80"
                    fill="#ffffff"
                    opacity="0.9"
                  />
                </svg>
              </div>
            </div>
          </div>
        </div>
        <h3>Sarah Stone</h3>
        <p>Level 31 Diver</p>
        <span class="badge-label label-ocean">Deep Sea Diver</span>
      </div>

      <!-- Showcase 3: Aurora -->
      <div class="explorer-card">
        <div class="badge-wrapper-box">
          <div class="plasma-badge-wrapper theme-aurora">
            <div class="plasma-glow-aurora"></div>
            <div class="plasma-border-blob">
              <div class="avatar-cutout">
                <svg class="avatar-img" viewBox="0 0 100 100">
                  <defs>
                    <linearGradient
                      id="auroraAv"
                      x1="0%"
                      y1="0%"
                      x2="100%"
                      y2="100%"
                    >
                      <stop offset="0%" stop-color="#11998e" />
                      <stop offset="100%" stop-color="#38ef7d" />
                    </linearGradient>
                  </defs>
                  <rect width="100%" height="100%" fill="url(#auroraAv)" />
                  <circle cx="50" cy="40" r="18" fill="#ffffff" opacity="0.9" />
                  <path
                    d="M22 80 C22 62, 78 62, 78 80"
                    fill="#ffffff"
                    opacity="0.9"
                  />
                </svg>
              </div>
            </div>
          </div>
        </div>
        <h3>Marcus Vance</h3>
        <p>Level 55 Climber</p>
        <span class="badge-label label-aurora">Peak Climber</span>
      </div>
    </div>
  </body>
</html>
