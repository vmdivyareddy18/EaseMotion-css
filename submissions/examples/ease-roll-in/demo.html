<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Roll In - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-roll-in">🎡 Roll In</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-roll-in'); void b.offsetWidth; b.classList.add('ease-roll-in');">Roll Again</button>
    </div>
</body>
</html>
