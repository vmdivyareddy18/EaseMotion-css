<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism 3D Flip Tooltip - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mesh-gradient mesh-cyan"></div>
  <div class="mesh-gradient mesh-pink"></div>

  <main class="glass-container">
    <div class="glass-dashboard-card">
      <h2 class="glass-header">Network Diagnostics</h2>
      
      <div class="metric-row">
        <span class="metric-label">Quantum Encryption Hash</span>
        
        <div class="ease-glass-3d-container">
          <input type="checkbox" id="hash-tip-toggle" class="ease-3d-checkbox" aria-label="Toggle cryptographic hash info">
          <label for="hash-tip-toggle" class="ease-3d-trigger" tabindex="0" role="button" aria-describedby="hash-tip">
            <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </label>
          
          <div id="hash-tip" class="ease-3d-content" role="tooltip">
            Uses localized multi-tenant key distribution blocks executing via SHA-3 keystream configurations.
          </div>
        </div>
      </div>

      <div class="metric-row">
        <span class="metric-label">Decentralized Mesh Nodes</span>
        <div class="ease-glass-3d-container">
          <input type="checkbox" id="node-tip-toggle" class="ease-3d-checkbox" aria-label="Toggle node info">
          <label for="node-tip-toggle" class="ease-3d-trigger" tabindex="0" role="button" aria-describedby="node-tip">
            <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </label>
          
          <div id="node-tip" class="ease-3d-content variant-frost" role="tooltip">
            Active peer pipelines balancing execution pathways dynamically across 1,200 server matrices.
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Keyboard Accessibility Mapping: Simulates standard click logic when spacebar or enter keys are pressed on focus triggers
    document.querySelectorAll('.ease-3d-trigger').forEach(trigger => {
      trigger.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetInput = document.getElementById(trigger.getAttribute('for'));
          targetInput.click();
        }
      });
    });
  </script>
</body>
</html>
