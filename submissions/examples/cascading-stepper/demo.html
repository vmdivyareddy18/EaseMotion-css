<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cascading Stepper</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="container">

<h1>Cascading Stepper</h1>

<div class="stepper">

  <div class="step active">
    <span>1</span>
    <p>Design</p>
  </div>

  <div class="step">
    <span>2</span>
    <p>Develop</p>
  </div>

  <div class="step">
    <span>3</span>
    <p>Deploy</p>
  </div>

  <div class="step">
    <span>4</span>
    <p>Launch</p>
  </div>

</div>

</main>

</body>
</html>
