<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Blend Mode Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        padding: 1rem;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Background Blend Mode</h1>
    <p class="note">Blends a element's background layers together.</p>

    <div class="label">bg-blend-normal</div>
    <div class="row"><div class="demo-blend bg-blend-normal">Normal</div></div>

    <div class="label">bg-blend-multiply</div>
    <div class="row">
      <div class="demo-blend bg-blend-multiply">Multiply</div>
    </div>

    <div class="label">bg-blend-screen</div>
    <div class="row"><div class="demo-blend bg-blend-screen">Screen</div></div>

    <div class="label">bg-blend-overlay</div>
    <div class="row">
      <div class="demo-blend bg-blend-overlay">Overlay</div>
    </div>

    <div class="label">bg-blend-color-dodge</div>
    <div class="row">
      <div class="demo-blend bg-blend-color-dodge">Dodge</div>
    </div>

    <div class="label">bg-blend-difference</div>
    <div class="row">
      <div class="demo-blend bg-blend-difference">Diff</div>
    </div>
  </body>
</html>
