<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Interactive Animation Playground — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="pg-header">
    <h1>Interactive Animation Playground</h1>
    <p class="pg-subtitle">Pick an animation, tweak the controls, copy the CSS. Zero setup.</p>
  </header>

  <main class="pg-app">

    <!-- ============ Controls ============ -->
    <section class="pg-controls" aria-label="Animation controls">

      <div class="ctrl">
        <label for="animation">Animation</label>
        <select id="animation">
          <option value="fadeIn">Fade In</option>
          <option value="slideInLeft">Slide In Left</option>
          <option value="slideInRight">Slide In Right</option>
          <option value="slideInUp">Slide In Up</option>
          <option value="slideInDown">Slide In Down</option>
          <option value="zoomIn">Zoom In</option>
          <option value="zoomOut">Zoom Out</option>
          <option value="rotateIn">Rotate In</option>
          <option value="flipX">Flip X</option>
          <option value="flipY">Flip Y</option>
          <option value="bounce">Bounce</option>
          <option value="pulse">Pulse</option>
          <option value="shake">Shake</option>
          <option value="swing">Swing</option>
          <option value="wobble">Wobble</option>
          <option value="rubberBand">Rubber Band</option>
        </select>
      </div>

      <div class="ctrl">
        <label for="duration">
          Duration <span class="ctrl-val" id="durationVal">1.00s</span>
        </label>
        <input type="range" id="duration" min="0.1" max="5" step="0.05" value="1" />
      </div>

      <div class="ctrl">
        <label for="delay">
          Delay <span class="ctrl-val" id="delayVal">0.00s</span>
        </label>
        <input type="range" id="delay" min="0" max="3" step="0.05" value="0" />
      </div>

      <div class="ctrl">
        <label for="iteration">Iteration</label>
        <select id="iteration">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="infinite">Infinite</option>
        </select>
      </div>

      <div class="ctrl">
        <label for="timing">Timing</label>
        <select id="timing">
          <option value="ease">ease</option>
          <option value="linear">linear</option>
          <option value="ease-in">ease-in</option>
          <option value="ease-out">ease-out</option>
          <option value="ease-in-out">ease-in-out</option>
          <option value="cubic-bezier(0.68, -0.55, 0.27, 1.55)">back (cubic-bezier)</option>
        </select>
      </div>

      <div class="ctrl ctrl-actions">
        <button type="button" id="replay" class="btn btn-secondary">
          <span class="icon">↻</span> Replay
        </button>
      </div>

    </section>

    <!-- ============ Preview ============ -->
    <section class="pg-preview" aria-label="Animation preview">
      <div class="preview-stage">
        <div id="previewBox" class="preview-box">
          <span class="preview-label">Preview</span>
        </div>
      </div>
      <div class="preview-meta">
        <span><strong id="metaAnim">fadeIn</strong></span>
        <span>·</span>
        <span id="metaTiming">ease</span>
        <span>·</span>
        <span id="metaIter">×1</span>
      </div>
    </section>

    <!-- ============ Code panel ============ -->
    <section class="pg-code" aria-label="Generated CSS">
      <header class="code-header">
        <span class="code-title">Generated CSS</span>
        <button type="button" id="copyBtn" class="btn btn-primary">
          <span class="icon">⧉</span> Copy CSS
        </button>
      </header>
      <pre class="code-block"><code id="cssOutput"></code></pre>
    </section>

  </main>

  <div id="toast" class="toast" role="status" aria-live="polite">Copied to clipboard ✓</div>

  <footer class="pg-footer">
    <p>Interactive Animation Playground · Built for EaseMotion CSS</p>
  </footer>

  <!-- ============ Vanilla JS (no libraries) ============ -->
  <script>
    (function () {
      const $ = (id) => document.getElementById(id);

      const animSel   = $('animation');
      const durEl     = $('duration');
      const delayEl   = $('delay');
      const iterEl    = $('iteration');
      const timingEl  = $('timing');
      const durVal    = $('durationVal');
      const delayVal  = $('delayVal');
      const box       = $('previewBox');
      const css       = $('cssOutput');
      const copyBtn   = $('copyBtn');
      const replayBtn = $('replay');
      const toast     = $('toast');
      const metaAnim  = $('metaAnim');
      const metaTime  = $('metaTiming');
      const metaIter  = $('metaIter');

      function buildCSS() {
        const name    = animSel.value;
        const dur     = parseFloat(durEl.value).toFixed(2) + 's';
        const dly     = parseFloat(delayEl.value).toFixed(2) + 's';
        const iter    = iterEl.value;
        const timing  = timingEl.value;
        return `.your-element {
  animation-name: ${name};
  animation-duration: ${dur};
  animation-delay: ${dly};
  animation-timing-function: ${timing};
  animation-iteration-count: ${iter};
  animation-fill-mode: both;
}`;
      }

      function applyAnimation() {
        const name   = animSel.value;
        const dur    = parseFloat(durEl.value).toFixed(2) + 's';
        const dly    = parseFloat(delayEl.value).toFixed(2) + 's';
        const iter   = iterEl.value;
        const timing = timingEl.value;

        // Restart trick: remove + reflow + reapply
        box.style.animation = 'none';
        // eslint-disable-next-line no-unused-expressions
        box.offsetHeight;
        box.style.animation =
          `${name} ${dur} ${timing} ${dly} ${iter} both`;
      }

      function updateLabels() {
        durVal.textContent   = parseFloat(durEl.value).toFixed(2) + 's';
        delayVal.textContent = parseFloat(delayEl.value).toFixed(2) + 's';
        metaAnim.textContent = animSel.value;
        metaTime.textContent = timingEl.value.startsWith('cubic') ? 'cubic-bezier' : timingEl.value;
        metaIter.textContent = iterEl.value === 'infinite' ? '∞' : '×' + iterEl.value;
      }

      function refresh() {
        updateLabels();
        css.textContent = buildCSS();
        applyAnimation();
      }

      function showToast(msg) {
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1600);
      }

      function copyCSS() {
        const text = css.textContent;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text)
            .then(() => showToast('Copied to clipboard ✓'))
            .catch(() => fallbackCopy(text));
        } else {
          fallbackCopy(text);
        }
      }

      function fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          showToast('Copied to clipboard ✓');
        } catch (e) {
          showToast('Press Ctrl+C to copy');
        }
        document.body.removeChild(ta);
      }

      // Event wiring
      [animSel, durEl, delayEl, iterEl, timingEl].forEach((el) => {
        el.addEventListener('input', refresh);
        el.addEventListener('change', refresh);
      });
      replayBtn.addEventListener('click', applyAnimation);
      copyBtn.addEventListener('click', copyCSS);

      // Initial render
      refresh();
    })();
  </script>

</body>
</html>
