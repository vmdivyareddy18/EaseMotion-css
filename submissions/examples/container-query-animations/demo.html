<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Container Query Responsive Animations - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f4f4f7;
    padding: 2rem;
  }
  h1 { font-size: 1.25rem; }
  p.hint { color: #666; margin-bottom: 1.5rem; }
</style>
</head>
<body>
  <h1>Container Query Responsive Animations</h1>
  <p class="hint">Drag the bottom-right corner of the box to resize it and watch the animation style change with container width (not viewport width).</p>

  <div class="ease-container resize-demo">
    <div class="card ease-container-motion">
      <h2>Responsive Card</h2>
      <p>This animation changes based on the width of its parent container.</p>
    </div>
  </div>
</body>
</html>
