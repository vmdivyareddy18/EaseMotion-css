<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Shimmer Loading Card - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <header class="demo-header">
            <h1>Ease Shimmer Loading Card</h1>
            <p>A modern, smooth placeholder animation simulating content loading using gradient keyframe positioning.</p>
        </header>

        <div class="card-grid">
            
            <div class="shimmer-card">
                <div class="shimmer-element card-image"></div>
                <div class="card-content">
                    <div class="shimmer-element card-title"></div>
                    <div class="shimmer-element card-line short"></div>
                    <div class="shimmer-element card-line"></div>
                    <div class="shimmer-element card-line medium"></div>
                    <div class="card-footer">
                        <div class="shimmer-element avatar"></div>
                        <div class="shimmer-element footer-line"></div>
                    </div>
                </div>
            </div>

            <div class="shimmer-card profile-card">
                <div class="card-content center-align">
                    <div class="shimmer-element avatar-large"></div>
                    <div class="shimmer-element card-title medium center"></div>
                    <div class="shimmer-element card-line short center"></div>
                    <div class="shimmer-element card-line center"></div>
                    <div class="shimmer-element card-button"></div>
                </div>
            </div>

            <div class="shimmer-card">
                <div class="shimmer-element card-image product-image"></div>
                <div class="card-content">
                    <div class="shimmer-element card-title"></div>
                    <div class="flex-row">
                        <div class="shimmer-element card-line short"></div>
                        <div class="shimmer-element card-line extra-short align-right"></div>
                    </div>
                    <div class="shimmer-element card-button full-width"></div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
