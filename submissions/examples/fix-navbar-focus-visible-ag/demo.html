<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Navbar Focus Ring Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="ease-navbar" aria-label="Main navigation">
    <a class="ease-navbar__brand" href="#">EaseMotion</a>
    <button class="ease-navbar__toggle"
            aria-controls="main-menu"
            aria-expanded="false"
            aria-label="Toggle navigation"
            onclick="
              const menu = document.getElementById('main-menu');
              const open = menu.classList.toggle('is-open');
              this.setAttribute('aria-expanded', open);
            ">☰</button>
    <ul class="ease-navbar__menu" id="main-menu" role="list">
      <li><a class="ease-navbar__link" href="#" aria-current="page">Home</a></li>
      <li><a class="ease-navbar__link" href="#">Components</a></li>
      <li><a class="ease-navbar__link" href="#">Docs</a></li>
      <li><a class="ease-navbar__link" href="#">GitHub</a></li>
    </ul>
  </nav>
  <div class="demo-body">
    <h2>ease-navbar – Mobile Focus Ring Fix</h2>
    <p class="note">Resize to mobile width, open the menu, then Tab through links — each link shows a focus ring.</p>
  </div>
</body>
</html>
