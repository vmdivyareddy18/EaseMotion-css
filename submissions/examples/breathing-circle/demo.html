<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Breathing Circle — EaseMotion</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 32px;
      background: #0f0f0f;
      font-family: sans-serif;
    }

    @keyframes ease-kf-breathe {
      0%   { transform: scale(1);   }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1);   }
    }

    .ease-breathe {
      animation: ease-kf-breathe 4s ease-in-out infinite;
      will-change: transform;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, #6366f1, #8b5cf6);
      color: white;
      font-size: 13px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="ease-breathe circle">Breathe</div>
  <p style="color:#666; font-size:13px;">ease-breathe · 4s · ease-in-out · infinite</p>
</body>
</html>
