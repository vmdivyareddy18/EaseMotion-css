<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Avatar Border Spin Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="demo-container">
        <h2>Ease Avatar Border Spin Component</h2>
        <p class="subtitle">Hover or focus over the avatar to witness the gradient border spin smoothly.</p>

        <div class="profile-card">
            <div class="avatar-container" tabindex="0" aria-label="User profile avatar">
                <div class="avatar-border"></div>
                <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400&auto=format&fit=crop" alt="Profile Picture" class="avatar-image">
            </div>
            <h3>Jane Doe</h3>
            <p class="role">Creative Designer</p>
        </div>
    </div>

</body>
</html>
