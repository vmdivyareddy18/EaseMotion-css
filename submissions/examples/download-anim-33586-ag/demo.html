<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download State Animation — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of a pure CSS button transition demonstrating download, progress loading, and complete checkmark states.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Interactive</span>
      <h1>Download State Animations</h1>
      <p class="description">
        Demonstrates multi-state button transitions. Click the button below 
        to trigger the downloading sequence.
      </p>
    </header>

    <main class="showcase">
      
      <!-- Interactive Download Button Card -->
      <section class="card">
        <div class="download-wrapper" id="download-trigger">
          <!-- Button States -->
          <div class="state state-idle">
            <span class="icon">📥</span> Download Package
          </div>
          
          <div class="state state-loading">
            <span class="spinner-icon">🔄</span> Fetching files...
            <div class="progress-track">
              <div class="progress-fill"></div>
            </div>
          </div>

          <div class="state state-complete">
            <span class="icon">✅</span> Download Complete!
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    const btn = document.getElementById('download-trigger');

    btn.addEventListener('click', () => {
      // Prevent double triggers
      if (btn.classList.contains('loading') || btn.classList.contains('complete')) {
        return;
      }

      // Enter loading state
      btn.classList.add('loading');

      // Complete state trigger after progress bar finishes loading (3 seconds)
      setTimeout(() => {
        btn.classList.remove('loading');
        btn.classList.add('complete');
      }, 3000);
    });
  </script>

</body>
</html>
