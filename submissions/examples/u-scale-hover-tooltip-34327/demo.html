<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Neumorphic Scale Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<span class="badge">

EaseMotion CSS

</span>

<h1>

Neumorphic Tooltip

</h1>

<p>

Soft UI inspired tooltip component
featuring a smooth scale-hover
interaction and accessible focus
states.

</p>

<div class="tooltip-wrapper">

<button

class="trigger"

aria-describedby="tooltip"

>

View Details

</button>

<div

id="tooltip"

class="tooltip"

role="tooltip"

>

<div class="icon">

✦

</div>

<h3>

Soft Design System

</h3>

<p>

Elegant tooltip animation
crafted with neumorphic
surfaces and subtle depth.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
