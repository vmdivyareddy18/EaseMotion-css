<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EaseMotion Animation Gallery</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<h1>EaseMotion Animation Showcase</h1>

<div class="gallery">

<div class="card ease-fade-in">
<h2>Fade In</h2>
<p>Uses EaseMotion fade animation.</p>
</div>

<div class="card ease-slide-up">
<h2>Slide Up</h2>
<p>Uses EaseMotion slide animation.</p>
</div>

<div class="card ease-hover-grow">
<h2>Hover Grow</h2>
<p>Hover to see the effect.</p>
</div>

<div class="card ease-scale-in">
<h2>Scale In</h2>
<p>Scale animation example.</p>
</div>

<div class="card ease-rotate">
<h2>Rotate</h2>
<p>Rotation animation.</p>
</div>

<div class="card ease-bounce">
<h2>Bounce</h2>
<p>Bounce animation.</p>
</div>

</div>

</body>
</html>
