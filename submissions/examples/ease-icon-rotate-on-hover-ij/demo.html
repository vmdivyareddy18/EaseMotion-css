<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Rotate on Hover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Icon Rotate on Hover</h1>
  <p class="subtitle">Hover over any icon to see it rotate</p>

  <div class="icon-grid">
    <div class="icon-card" data-rotation="360">
      <i class="fa-brands fa-react"></i>
      <span class="icon-label">React</span>
    </div>
    <div class="icon-card" data-rotation="-360">
      <i class="fa-brands fa-vuejs"></i>
      <span class="icon-label">Vue</span>
    </div>
    <div class="icon-card" data-rotation="720">
      <i class="fa-brands fa-angular"></i>
      <span class="icon-label">Angular</span>
    </div>
    <div class="icon-card" data-rotation="-540">
      <i class="fa-brands fa-sass"></i>
      <span class="icon-label">Sass</span>
    </div>
    <div class="icon-card" data-rotation="360">
      <i class="fa-brands fa-js"></i>
      <span class="icon-label">JavaScript</span>
    </div>
    <div class="icon-card" data-rotation="-720">
      <i class="fa-brands fa-python"></i>
      <span class="icon-label">Python</span>
    </div>
    <div class="icon-card" data-rotation="1080">
      <i class="fa-brands fa-docker"></i>
      <span class="icon-label">Docker</span>
    </div>
    <div class="icon-card" data-rotation="-360">
      <i class="fa-brands fa-git-alt"></i>
      <span class="icon-label">Git</span>
    </div>
    <div class="icon-card" data-rotation="540">
      <i class="fa-brands fa-node"></i>
      <span class="icon-label">Node.js</span>
    </div>
    <div class="icon-card" data-rotation="-1080">
      <i class="fa-brands fa-figma"></i>
      <span class="icon-label">Figma</span>
    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.icon-card');
    cards.forEach(card => {
      const icon = card.querySelector('i');
      const rotation = card.dataset.rotation;
      card.addEventListener('mouseenter', () => {
        icon.style.setProperty('--rotation', rotation + 'deg');
      });
      card.addEventListener('mouseleave', () => {
        icon.style.setProperty('--rotation', '0deg');
      });
    });
  </script>
</body>
</html>
