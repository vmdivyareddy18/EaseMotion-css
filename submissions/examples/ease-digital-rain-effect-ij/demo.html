<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Rain Effect | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <div class="rain-container" id="rain"></div>
  </div>
  <script>
    const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!';
    const container = document.getElementById('rain');
    const columns = 20;
    const rows = 16;

    for (let c = 0; c < columns; c++) {
      const col = document.createElement('div');
      col.className = 'rain-column';
      for (let r = 0; r < rows; r++) {
        const span = document.createElement('span');
        span.className = 'rain-char';
        if (r === 0) span.classList.add('head');
        if (r > rows - 4) span.classList.add('tail');
        span.textContent = chars[Math.floor(Math.random() * chars.length)];
        span.style.setProperty('--c', c);
        span.style.setProperty('--d', Math.random() * 3);
        span.style.animationDelay = `calc(var(--d, 0) * 1s + ${c * 0.08}s + ${r * 0.05}s)`;
        col.appendChild(span);
      }
      container.appendChild(col);
    }

    setInterval(() => {
      document.querySelectorAll('.rain-char:not(.head):not(.tail)').forEach(el => {
        el.textContent = chars[Math.floor(Math.random() * chars.length)];
      });
    }, 150);
  </script>
</body>
</html>
