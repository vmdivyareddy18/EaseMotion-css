<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="solar" role="img" aria-label="Solar system with four planets orbiting the sun">
    <span class="orbit o1"><span class="planet p1"></span></span>
    <span class="orbit o2"><span class="planet p2"></span></span>
    <span class="orbit o3"><span class="planet p3"></span></span>
    <span class="orbit o4"><span class="planet p4"><span class="moon"></span></span></span>
    <span class="sun"></span>
  </div>
</body>
</html>
