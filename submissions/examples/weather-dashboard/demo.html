<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div class="ease-weather-viewport">
    
    <div class="ease-weather-header">
      <h2 class="ease-weather-loc">San Francisco</h2>
      <div class="ease-toggle-unit-wrapper" id="unitToggleWrapper">
        <button class="ease-toggle-unit-btn is-active" data-unit="C">°C</button>
        <button class="ease-toggle-unit-btn" data-unit="F">°F</button>
      </div>
    </div>

    <div class="ease-main-weather-card">
      <div class="ease-weather-icon-frame">
        <span class="ease-icon-sun">☀️</span>
      </div>
      <h1 class="ease-main-temp-num" id="mainTempDisplay" data-celsius="18">18°</h1>
      <p class="ease-weather-condition">Partly Sunny</p>
    </div>

    <div class="ease-forecast-row-container">
      
      <div class="ease-forecast-card">
        <span class="ease-forecast-day">Mon</span>
        <span class="ease-forecast-icon" style="animation: easeSunRotate 16s infinite linear; display:inline-block;">☀️</span>
        <span class="ease-forecast-temp" data-celsius="21">21°</span>
      </div>
      
      <div class="ease-forecast-card">
        <span class="ease-forecast-day">Tue</span>
        <div class="ease-icon-cloud-group">
          <span>☁️</span>
          <span class="ease-icon-cloud-overlay">☁️</span>
        </div>
        <span class="ease-forecast-temp" data-celsius="16">16°</span>
      </div>

      <div class="ease-forecast-card">
        <span class="ease-forecast-day">Wed</span>
        <span class="ease-forecast-icon">🌧️</span>
        <span class="ease-forecast-temp" data-celsius="14">14°</span>
      </div>

      <div class="ease-forecast-card">
        <span class="ease-forecast-day">Thu</span>
        <span class="ease-forecast-icon" style="animation: easeSunRotate 16s infinite linear; display:inline-block;">☀️</span>
        <span class="ease-forecast-temp" data-celsius="19">19°</span>
      </div>

    </div>

  </div>

  <script>
    const toggleWrapper = document.getElementById('unitToggleWrapper');
    const tempElements = document.querySelectorAll('[data-celsius]');

    toggleWrapper.addEventListener('click', (e) => {
      const targetBtn = e.target.closest('.ease-toggle-unit-btn');
      if (!targetBtn || targetBtn.classList.contains('is-active')) return;

      // Handle active button class swaps
      toggleWrapper.querySelectorAll('.ease-toggle-unit-btn').forEach(btn => btn.classList.remove('is-active'));
      targetBtn.classList.add('is-active');

      const selectedUnit = targetBtn.getAttribute('data-unit');

      // Convert layout metric text safely without modifying base node boundaries
      tempElements.forEach(el => {
        const celsiusVal = parseInt(el.getAttribute('data-celsius'));
        if (selectedUnit === 'F') {
          const fahrenheitVal = Math.round((celsiusVal * 9/5) + 32);
          el.textContent = `${fahrenheitVal}°`;
        } else {
          el.textContent = `${celsiusVal}°`;
        }
      });
    });
  </script>
</body>
</html>
