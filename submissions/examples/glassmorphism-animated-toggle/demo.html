<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Animated Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Glassmorphism Toggle</h1>
        <p class="description">A smooth, modern switch with glassmorphic effects.</p>
        
        <label class="glass-toggle">
            <input type="checkbox" class="glass-toggle-input">
            <span class="glass-toggle-slider">
                <span class="glass-toggle-knob"></span>
            </span>
        </label>
    </div>
</body>
</html>
