<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Reaction Picker | EaseMotion CSS</title>
  
  <!-- Tailwind Play CDN for presentational structural framing only -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Component custom style sheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

  <div class="text-center space-y-2 mb-16">
    <span class="text-xs font-mono uppercase tracking-widest text-pink-400 font-semibold px-2.5 py-1 bg-pink-500/10 rounded-full">GSSoC-26 / Beginner Component</span>
    <h1 class="text-3xl font-extrabold tracking-tight">Scale Reaction Picker</h1>
    <p class="text-sm text-slate-400">Pure CSS elastic macro-scaling interactive expression dock</p>
  </div>

  <!-- Component Container Framework -->
  <div class="ease-reaction-dock-wrapper" role="toolbar" aria-label="Post Reaction Options">
    <div class="ease-reaction-dock">
      
      <!-- Like Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Like">
        <span class="ease-reaction-emoji">👍</span>
        <span class="ease-reaction-tooltip">Like</span>
      </button>

      <!-- Love Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Love">
        <span class="ease-reaction-emoji">❤️</span>
        <span class="ease-reaction-tooltip">Love</span>
      </button>

      <!-- Laugh Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Haha">
        <span class="ease-reaction-emoji">😆</span>
        <span class="ease-reaction-tooltip">Haha</span>
      </button>

      <!-- Wow Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Wow">
        <span class="ease-reaction-emoji">😮</span>
        <span class="ease-reaction-tooltip">Wow</span>
      </button>

      <!-- Sad Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Sad">
        <span class="ease-reaction-emoji">😢</span>
        <span class="ease-reaction-tooltip">Sad</span>
      </button>

      <!-- Angry Option Trigger -->
      <button class="ease-reaction-item" aria-label="React with Angry">
        <span class="ease-reaction-emoji">😡</span>
        <span class="ease-reaction-tooltip">Angry</span>
      </button>
      
    </div>
  </div>

</body>
</html>
