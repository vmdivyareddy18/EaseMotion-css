<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Password Eye</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="tpe-container">
    <h1>Toggle Password Eye</h1>
    <p class="tpe-subtitle">Password visibility toggle with animated eye icon and strength indicator</p>

    <div class="tpe-examples">
      <div class="tpe-field">
        <label class="tpe-label">Default Password</label>
        <div class="tpe-input-wrap">
          <input type="password" class="tpe-input" value="MyP@ssw0rd!" placeholder="Enter password">
          <button class="tpe-eye" aria-label="Toggle password visibility">
            <svg class="tpe-eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path class="tpe-eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle class="tpe-eye-open" cx="12" cy="12" r="3"/>
              <path class="tpe-eye-closed" d="M4 4l16 16" opacity="0"/>
              <path class="tpe-eye-closed" d="M4 20l16-16" opacity="0"/>
            </svg>
          </button>
        </div>
        <div class="tpe-strength">
          <div class="tpe-strength-bar" style="width: 75%; background: var(--tpe-active-color);"></div>
          <span class="tpe-strength-label">Strong</span>
        </div>
      </div>

      <div class="tpe-field">
        <label class="tpe-label">Weak Password</label>
        <div class="tpe-input-wrap">
          <input type="password" class="tpe-input" value="12345" placeholder="Enter password">
          <button class="tpe-eye" aria-label="Toggle password visibility">
            <svg class="tpe-eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path class="tpe-eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle class="tpe-eye-open" cx="12" cy="12" r="3"/>
              <path class="tpe-eye-closed" d="M4 4l16 16" opacity="0"/>
              <path class="tpe-eye-closed" d="M4 20l16-16" opacity="0"/>
            </svg>
          </button>
        </div>
        <div class="tpe-strength">
          <div class="tpe-strength-bar" style="width: 20%; background: var(--tpe-error-color, #ef4444);"></div>
          <span class="tpe-strength-label">Weak</span>
        </div>
      </div>

      <div class="tpe-field">
        <label class="tpe-label">Empty / Placeholder</label>
        <div class="tpe-input-wrap">
          <input type="password" class="tpe-input" placeholder="Enter password">
          <button class="tpe-eye" aria-label="Toggle password visibility">
            <svg class="tpe-eye-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path class="tpe-eye-open" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle class="tpe-eye-open" cx="12" cy="12" r="3"/>
              <path class="tpe-eye-closed" d="M4 4l16 16" opacity="0"/>
              <path class="tpe-eye-closed" d="M4 20l16-16" opacity="0"/>
            </svg>
          </button>
        </div>
        <div class="tpe-strength">
          <div class="tpe-strength-bar" style="width: 0%;"></div>
          <span class="tpe-strength-label">—</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.tpe-eye').forEach(btn => {
      btn.addEventListener('click', () => {
        const wrap = btn.closest('.tpe-input-wrap');
        const input = wrap.querySelector('.tpe-input');
        const svg = btn.querySelector('.tpe-eye-svg');
        const isOpen = input.type === 'text';

        input.type = isOpen ? 'password' : 'text';
        btn.classList.toggle('tpe-eye-active', !isOpen);

        const openPaths = svg.querySelectorAll('.tpe-eye-open');
        const closedPaths = svg.querySelectorAll('.tpe-eye-closed');

        openPaths.forEach(p => {
          p.style.opacity = isOpen ? '1' : '0';
          p.style.transition = 'opacity var(--tpe-duration, 0.3s) ease';
        });
        closedPaths.forEach(p => {
          p.style.opacity = isOpen ? '0' : '1';
          p.style.transition = 'opacity var(--tpe-duration, 0.3s) ease';
        });
      });
    });
  </script>
</body>
</html>
