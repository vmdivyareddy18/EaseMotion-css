<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Management Elastic Slide</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <div class="task-app-layout">
      
      <input type="radio" name="task-select" id="close-task" class="state-trigger" checked>
      <input type="radio" name="task-select" id="task-1" class="state-trigger">

      <div class="task-list-panel">
        <h2 class="panel-title">Active Tasks</h2>
        
        <label for="task-1" class="task-item">
          <div class="task-meta">
            <span class="task-id">EASE-384</span>
            <span class="task-status">In Progress</span>
          </div>
          <h3 class="task-title">Implement Elastic Slide Transition</h3>
        </label>
      </div>

      <div class="task-details-drawer">
        <div class="drawer-header">
          <h3 class="drawer-title">Task Details</h3>
          <label for="close-task" class="close-btn" aria-label="Close panel">×</label>
        </div>
        <div class="drawer-body">
          <p class="drawer-text"><strong>Assignee:</strong> Saptarshi</p>
          <p class="drawer-text"><strong>Priority:</strong> High</p>
          <hr class="divider">
          <p class="drawer-desc">Review the bezier curve constraints for the new slide animation to ensure it meets accessibility standards before merging.</p>
        </div>
      </div>
      
    </div>
  </main>
</body>
</html>
