<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-quality-selector-check</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-settings">

    <h1>Video Quality Selector</h1>

    <div class="dropdown">

        <div class="dropdown-header">
            Current Quality: 1080p
        </div>

        <div class="dropdown-menu">

            <div class="quality-option active">
                <span>1080p HD</span>
                <span class="checkmark">✓</span>
            </div>

            <div class="quality-option">
                <span>720p</span>
            </div>

            <div class="quality-option">
                <span>480p</span>
            </div>

            <div class="quality-option">
                <span>360p</span>
            </div>

            <div class="quality-option">
                <span>240p</span>
            </div>

        </div>

    </div>

</div>

</body>
</html>
