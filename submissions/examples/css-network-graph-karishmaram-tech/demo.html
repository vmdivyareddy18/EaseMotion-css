<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Pure CSS Network Topology</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="canvas-wrapper">
    <header class="graph-header">
      <h1>Pure CSS Network Topology</h1>
      <p>A zero-JS node-link relationship diagram featuring multi-path hover propagation and hardware-accelerated ambient pulsing loops.</p>
    </header>

    <!-- 
      The graph structure leverages precise positioning where hover triggers 
      on parent wrappers pass continuous style properties down to absolute edges.
    -->
    <div class="network-graph-canvas">
      
      <!-- Edges (Rendered underneath nodes via z-index mapping) -->
      <div class="graph-edge edge-hub-to-n1"></div>
      <div class="graph-edge edge-hub-to-n2"></div>
      <div class="graph-edge edge-hub-to-n3"></div>

      <!-- Node Entities -->
      <!-- Central Hub -->
      <div class="graph-node node-hub" tabindex="0">
        <div class="node-pulse-ring"></div>
        <div class="node-core">Hub</div>
      </div>

      <!-- Perimeter Node 1 -->
      <div class="graph-node node-n1" tabindex="0">
        <div class="node-pulse-ring"></div>
        <div class="node-core">Node 1</div>
      </div>

      <!-- Perimeter Node 2 -->
      <div class="graph-node node-n2" tabindex="0">
        <div class="node-pulse-ring"></div>
        <div class="node-core">Node 2</div>
      </div>

      <!-- Perimeter Node 3 -->
      <div class="graph-node node-n3" tabindex="0">
        <div class="node-pulse-ring"></div>
        <div class="node-core">Node 3</div>
      </div>

    </div>
  </div>

</body>
</html>
