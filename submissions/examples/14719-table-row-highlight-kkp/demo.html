<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Table Row Hover Highlight</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="table-title">
        <p class="eyebrow">Data table cue</p>
        <h1 id="table-title">Row highlight motion</h1>
        <table class="highlight-table">
          <thead>
            <tr>
              <th>Plan</th>
              <th>Users</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr class="highlight-row" tabindex="0">
              <td>Starter</td>
              <td>1,240</td>
              <td>Stable</td>
            </tr>
            <tr class="highlight-row" tabindex="0">
              <td>Growth</td>
              <td>8,920</td>
              <td>Trending</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>
  </body>
</html>
