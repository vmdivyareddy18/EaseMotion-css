<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Spin Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .controls {
            margin-top: 2rem;
        }
        button {
            padding: 10px 20px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover {
            background-color: #2563eb;
        }
    </style>
</head>
<body>

    <h1>Vortex Spin Animation</h1>
    <p>A complex 3D rotation, scaling, and blur effect.</p>

    <!-- The element with the animation class -->
    <div id="box" class="demo-element anim-vortex-spin">
        Hover/Click Me
    </div>

    <div class="controls">
        <button onclick="replayAnimation()">Replay Animation</button>
    </div>

    <script>
        const box = document.getElementById('box');

        function replayAnimation() {
            // Remove the class
            box.classList.remove('anim-vortex-spin');
            
            // Trigger reflow to restart the animation
            void box.offsetWidth;
            
            // Re-add the class
            box.classList.add('anim-vortex-spin');
        }

        // Also replay on hover
        box.addEventListener('mouseenter', replayAnimation);
    </script>
</body>
</html>
