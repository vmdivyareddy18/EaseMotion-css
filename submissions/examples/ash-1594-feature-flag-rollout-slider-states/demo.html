<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feature Flag Rollout Slider States</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <div class="header">
        <h1>Feature Flag Rollout</h1>
        <p>Control feature exposure across environments</p>
    </div>

    <div class="flag-card">

        <div class="flag-top">

            <div>
                <h2>New Dashboard Experience</h2>
                <p>Gradually roll out to users</p>
            </div>

            <span class="status-badge">
                Active
            </span>

        </div>

        <div class="slider-section">

            <div class="slider-label">
                <span>Rollout Percentage</span>
                <span>75%</span>
            </div>

            <div class="slider-track">
                <div class="slider-fill"></div>
                <div class="slider-thumb"></div>
            </div>

        </div>

        <div class="environment-grid">

            <div class="env-card enabled">
                <h3>Development</h3>
                <span>100%</span>
            </div>

            <div class="env-card enabled">
                <h3>Staging</h3>
                <span>100%</span>
            </div>

            <div class="env-card partial">
                <h3>Production</h3>
                <span>75%</span>
            </div>

        </div>

    </div>

    <div class="metrics-grid">

        <div class="metric-card">
            <h4>Users Enabled</h4>
            <span>18,750</span>
        </div>

        <div class="metric-card">
            <h4>Error Rate</h4>
            <span>0.2%</span>
        </div>

        <div class="metric-card">
            <h4>Confidence</h4>
            <span class="success">High</span>
        </div>

    </div>

</div>

</body>
</html>
