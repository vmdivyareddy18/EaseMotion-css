<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Duration Safety Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="duration-demo">
    <section class="demo-panel">
      <p class="eyebrow">CSS Variable Safety</p>
      <h1>Safe animation duration input</h1>
      <p class="intro">
        This demo accepts a custom duration, validates it as a time value, and only then writes it to
        <code>--ease-duration</code>.
      </p>

      <form class="duration-form" id="durationForm">
        <label for="durationInput">Animation duration</label>
        <div class="input-row">
          <input id="durationInput" name="duration" value="1.2s" autocomplete="off">
          <button type="submit">Apply</button>
        </div>
        <p class="hint">Allowed examples: <code>250ms</code>, <code>1.2s</code>, <code>0.75s</code></p>
      </form>

      <div class="status is-safe" id="status" role="status">Using safe default: 1.2s</div>

      <div class="preview-card" id="previewCard">
        <span class="pulse-dot"></span>
        <div>
          <h2>Preview card</h2>
          <p>Hover or apply a new duration to replay the transition.</p>
        </div>
      </div>

      <button class="attack-btn" id="attackBtn" type="button">
        Try blocked value: url(javascript:alert(1))
      </button>
    </section>
  </main>

  <script>
    const form = document.getElementById('durationForm');
    const input = document.getElementById('durationInput');
    const statusEl = document.getElementById('status');
    const previewCard = document.getElementById('previewCard');
    const attackBtn = document.getElementById('attackBtn');

    const durationPattern = /^(?:\d+|\d*\.\d+)(?:ms|s)$/;
    const fallbackDuration = '1.2s';

    function normalizeDuration(value) {
      const trimmedValue = value.trim().toLowerCase();

      if (!durationPattern.test(trimmedValue)) {
        return null;
      }

      const numericValue = Number.parseFloat(trimmedValue);
      const milliseconds = trimmedValue.endsWith('ms') ? numericValue : numericValue * 1000;

      if (!Number.isFinite(milliseconds) || milliseconds < 50 || milliseconds > 5000) {
        return null;
      }

      return trimmedValue;
    }

    function replayPreview() {
      previewCard.classList.remove('is-replaying');
      void previewCard.offsetWidth;
      previewCard.classList.add('is-replaying');
    }

    function applyDuration(rawValue) {
      const safeDuration = normalizeDuration(rawValue);

      if (!safeDuration) {
        previewCard.style.setProperty('--ease-duration', fallbackDuration);
        statusEl.className = 'status is-blocked';
        statusEl.textContent = `Blocked unsafe duration: ${rawValue}`;
        replayPreview();
        return;
      }

      previewCard.style.setProperty('--ease-duration', safeDuration);
      statusEl.className = 'status is-safe';
      statusEl.textContent = `Applied safe duration: ${safeDuration}`;
      replayPreview();
    }

    form.addEventListener('submit', event => {
      event.preventDefault();
      applyDuration(input.value);
    });

    attackBtn.addEventListener('click', () => {
      input.value = 'url(javascript:alert(1))';
      applyDuration(input.value);
    });
  </script>
</body>
</html>
