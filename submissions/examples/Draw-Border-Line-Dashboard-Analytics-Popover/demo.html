<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics Popover</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <button class="stats-btn">
        View Analytics
    </button>

    <div class="popover" role="dialog" aria-label="Analytics Summary">

        <h3>Performance Overview</h3>

        <div class="metric">
            <span>Visitors</span>
            <strong>12.4K</strong>
        </div>

        <div class="metric">
            <span>Conversion</span>
            <strong>8.7%</strong>
        </div>

        <div class="metric">
            <span>Revenue</span>
            <strong>$18.2K</strong>
        </div>

    </div>

</div>

</body>
</html>
