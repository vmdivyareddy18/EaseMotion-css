<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Focus In - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="ease-focus-in">SHARP HIGHLIGHT</h1>
        <button onclick="let h=document.querySelector('h1'); h.classList.remove('ease-focus-in'); void h.offsetWidth; h.classList.add('ease-focus-in');">Refocus</button>
    </div>
</body>
</html>
