<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micro Interaction Button</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark-theme">
  <div class="btn-card">
    <h2 class="btn-card-title">Micro Interaction</h2>
    <div class="btn-grid">
      <button class="micro-btn primary" type="button">Submit</button>
      <button class="micro-btn secondary" type="button">Cancel</button>
      <button class="micro-btn success" type="button">Save</button>
      <button class="micro-btn danger" type="button">Delete</button>
    </div>
    <p class="btn-hint">Press any button to feel the feedback</p>
  </div>
</body>
</html>
