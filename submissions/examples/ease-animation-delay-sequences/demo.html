<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animation Delay Sequences | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <div class="demo-container">
    <div class="demo-header">
      <h2>Animation Delay Sequences</h2>
      <p>Create elegant staggering effects using CSS custom properties (<code>--idx</code>) and <code>calc()</code> for precise timing delays, entirely without JavaScript.</p>
    </div>

    <!-- Demo 1: Staggered List Items -->
    <div class="demo-section">
      <h3>Staggered List Entrance</h3>
      <button class="replay-btn" id="replayList" aria-label="Replay List Animation">Replay Animation</button>
      
      <ul class="stagger-list" id="listContainer">
        <!-- We assign an index to each item via inline style -->
        <li class="stagger-item ease-sequence" style="--idx: 1;">
          <div class="avatar">1</div>
          <div class="line"></div>
        </li>
        <li class="stagger-item ease-sequence" style="--idx: 2;">
          <div class="avatar">2</div>
          <div class="line"></div>
        </li>
        <li class="stagger-item ease-sequence" style="--idx: 3;">
          <div class="avatar">3</div>
          <div class="line"></div>
        </li>
        <li class="stagger-item ease-sequence" style="--idx: 4;">
          <div class="avatar">4</div>
          <div class="line"></div>
        </li>
        <li class="stagger-item ease-sequence" style="--idx: 5;">
          <div class="avatar">5</div>
          <div class="line"></div>
        </li>
      </ul>
    </div>

    <!-- Demo 2: Loading Dots -->
    <div class="demo-section">
      <h3>Sequence Loader</h3>
      <div class="loader-container">
        <div class="ease-dot-sequence">
          <div class="dot" style="--idx: 1;"></div>
          <div class="dot" style="--idx: 2;"></div>
          <div class="dot" style="--idx: 3;"></div>
          <div class="dot" style="--idx: 4;"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    // Just a tiny snippet to replay the CSS animation by triggering a reflow.
    document.getElementById('replayList').addEventListener('click', function() {
      const container = document.getElementById('listContainer');
      const children = container.querySelectorAll('.ease-sequence');
      
      children.forEach(child => {
        child.style.animation = 'none';
        child.offsetHeight; /* trigger reflow */
        child.style.animation = null;
      });
    });
  </script>
</body>
</html>
