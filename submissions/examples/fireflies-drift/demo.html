<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firefly Particle Drift - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS Core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  
  <!-- Local Showcase Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fullscreen Firefly Container -->
  <div class="ease-firefly-container ease-center">
    
    <!-- Firefly Particles -->
    <div class="ease-firefly ease-firefly-1"></div>
    <div class="ease-firefly ease-firefly-2"></div>
    <div class="ease-firefly ease-firefly-3"></div>
    <div class="ease-firefly ease-firefly-4"></div>
    <div class="ease-firefly ease-firefly-5"></div>
    <div class="ease-firefly ease-firefly-6"></div>
    <div class="ease-firefly ease-firefly-7"></div>
    <div class="ease-firefly ease-firefly-8"></div>
    <div class="ease-firefly ease-firefly-9"></div>
    <div class="ease-firefly ease-firefly-10"></div>

    <!-- Ambient Card -->
    <div class="ambient-card">
      <h1 style="margin: 0 0 var(--ease-space-2) 0; font-weight: 800; background: linear-gradient(135deg, #fef08a, #facc15); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Fireflies Drift</h1>
      <p style="color: var(--ease-color-neutral-400); font-size: var(--ease-text-base); margin: 0; line-height: var(--ease-leading-normal);">
        Ambient glowing particles blinking asynchronously and drifting slowly over a nighttime dusk backdrop layer.
      </p>
    </div>

  </div>

</body>
</html>
