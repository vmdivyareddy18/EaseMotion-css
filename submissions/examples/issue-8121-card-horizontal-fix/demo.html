<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Horizontal Layout Fix (Issue #8121) - EaseMotion CSS</title>
  
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body {
      background-color: var(--ease-color-bg, #f8fafc);
      padding: var(--ease-space-8, 2rem);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 800px;
      margin: 0 auto;
    }
    h2 {
      margin-top: 0;
      color: var(--ease-color-neutral-900);
      margin-bottom: 2rem;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h2>Issue #8121: Horizontal Image Card Layout Fix</h2>
    
    <div class="ease-card ease-card-horizontal ease-card-image">
      <div class="ease-card-img">
        <img src="https://images.unsplash.com/photo-1506744626753-aba71415b9e2?auto=format&fit=crop&w=600&q=80" alt="Beautiful landscape">
      </div>
      <div class="ease-card-content">
        <h3 style="margin-top: 0;">Fixed Horizontal Card</h3>
        <p style="color: var(--ease-color-text-muted);">
          The image now correctly sits on the left side taking up 40% of the width, and the border-radius perfectly rounds the top-left and bottom-left corners on desktop screens. On mobile devices, it stacks gracefully!
        </p>
        <button class="ease-btn ease-btn-primary" style="margin-top: 1rem;">Read More</button>
      </div>
    </div>
  </div>

</body>
</html>
