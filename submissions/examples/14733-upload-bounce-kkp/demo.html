<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Bounce Animation</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="upload-title">
        <p class="eyebrow">Transfer feedback</p>
        <h1 id="upload-title">Upload bounce</h1>
        <p class="demo-copy">
          The arrow lifts and settles in a loop to communicate a file upload or
          cloud transfer state.
        </p>

        <button class="upload-bounce" type="button">
          <span class="upload-arrow" aria-hidden="true"></span>
          <span>Upload files</span>
        </button>
      </section>
    </main>
  </body>
</html>
