<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion: hover-zoom-image</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card" id="card">
    <div class="image-wrapper" id="imgWrapper">
      <img id="zoomImg" src="https://picsum.photos/seed/zoom/400/400" alt="Zoom">
      <div class="lens" id="lens"></div>
    </div>
    <h2>Zoom Image</h2>
    <p>Hover and move to see a magnified view through the lens.</p>
    <div class="controls">
      <label>Zoom <input type="range" id="zoomScale" min="1.5" max="5" step="0.1" value="2.5"></label>
      <label>Lens <input type="range" id="lensSize" min="60" max="200" value="120"></label>
      <label>Speed <input type="range" id="zoomDuration" min="0.1" max="1" step="0.1" value="0.3"></label>
    </div>
  </div>
  <script>
    const card = document.getElementById('card');
    const wrapper = document.getElementById('imgWrapper');
    const img = document.getElementById('zoomImg');
    const lens = document.getElementById('lens');

    wrapper.addEventListener('mousemove', e => {
      const rect = wrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      lens.style.left = x + 'px';
      lens.style.top = y + 'px';

      const scale = parseFloat(getComputedStyle(card).getPropertyValue('--zoom-scale')) || 2.5;
      const lx = rect.width - (x * scale + lens.offsetWidth / 2);
      const ly = rect.height - (y * scale + lens.offsetHeight / 2);
      img.style.transformOrigin = `${x}px ${y}px`;
    });

    wrapper.addEventListener('mouseleave', () => {
      img.style.transformOrigin = 'center center';
    });

    document.getElementById('zoomScale').addEventListener('input', e => {
      card.style.setProperty('--zoom-scale', e.target.value);
    });

    document.getElementById('lensSize').addEventListener('input', e => {
      card.style.setProperty('--lens-size', e.target.value + 'px');
    });

    document.getElementById('zoomDuration').addEventListener('input', e => {
      card.style.setProperty('--zoom-duration', e.target.value + 's');
    });
  </script>
</body>
</html>
