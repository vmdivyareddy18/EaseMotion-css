<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player Minimal – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Audio Player</h1>
  <p class="subtitle">Minimal player with animated equalizer</p>

  <div class="apm-player">
    <div class="apm-track-info" id="trackInfo">
      <span class="apm-track-name" id="trackName">Midnight Waves</span>
      <span class="apm-track-artist" id="trackArtist">Luna Echo</span>
    </div>

    <div class="apm-equalizer" id="equalizer">
      <div class="apm-bar" style="--i:0;"></div>
      <div class="apm-bar" style="--i:1;"></div>
      <div class="apm-bar" style="--i:2;"></div>
      <div class="apm-bar" style="--i:3;"></div>
      <div class="apm-bar" style="--i:4;"></div>
      <div class="apm-bar" style="--i:5;"></div>
    </div>

    <div class="apm-progress">
      <div class="apm-progress-track">
        <div class="apm-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="apm-time">
        <span id="timeCurrent">0:00</span>
        <span id="timeTotal">3:24</span>
      </div>
    </div>

    <div class="apm-controls">
      <button class="apm-btn" id="prevBtn" title="Previous">⏮</button>
      <button class="apm-btn apm-play-btn" id="playBtn" title="Play/Pause">▶</button>
      <button class="apm-btn" id="nextBtn" title="Next">⏭</button>
    </div>

    <div class="apm-volume">
      <span class="apm-vol-icon">🔊</span>
      <input type="range" class="apm-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.75">
    </div>

    <button class="apm-toggle-pl" id="playlistToggle">Playlist ▾</button>
    <ul class="apm-playlist" id="playlist">
      <li class="apm-pl-item active" data-idx="0">Midnight Waves – Luna Echo</li>
      <li class="apm-pl-item" data-idx="1">Neon Drive – Circuit Kid</li>
      <li class="apm-pl-item" data-idx="2">Velvet Sky – Aria Nocturne</li>
    </ul>
  </div>

  <script>
    const playBtn = document.getElementById('playBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');
    const timeCurrent = document.getElementById('timeCurrent');
    const timeTotal = document.getElementById('timeTotal');
    const trackName = document.getElementById('trackName');
    const trackArtist = document.getElementById('trackArtist');
    const equalizer = document.getElementById('equalizer');
    const volumeSlider = document.getElementById('volumeSlider');
    const playlistToggle = document.getElementById('playlistToggle');
    const playlist = document.getElementById('playlist');
    const plItems = document.querySelectorAll('.apm-pl-item');

    const tracks = [
      { name: 'Midnight Waves', artist: 'Luna Echo', duration: 204 },
      { name: 'Neon Drive', artist: 'Circuit Kid', duration: 198 },
      { name: 'Velvet Sky', artist: 'Aria Nocturne', duration: 216 },
    ];

    let currentTrack = 0;
    let playing = false;
    let progress = 0;
    let interval = null;

    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function loadTrack(idx) {
      currentTrack = idx;
      const t = tracks[idx];
      trackName.textContent = t.name;
      trackArtist.textContent = t.artist;
      timeTotal.textContent = formatTime(t.duration);
      progress = 0;
      progressFill.style.width = '0%';
      timeCurrent.textContent = '0:00';
      plItems.forEach(el => el.classList.toggle('active', +el.dataset.idx === idx));
    }

    function togglePlay() {
      playing = !playing;
      playBtn.textContent = playing ? '⏸' : '▶';
      equalizer.classList.toggle('playing', playing);

      if (playing) {
        interval = setInterval(() => {
          progress += 0.5;
          const t = tracks[currentTrack];
          if (progress >= t.duration) {
            progress = 0;
            nextTrack();
            return;
          }
          progressFill.style.width = `${(progress / t.duration) * 100}%`;
          timeCurrent.textContent = formatTime(progress);
        }, 500);
      } else {
        clearInterval(interval);
        interval = null;
      }
    }

    function nextTrack() {
      const next = (currentTrack + 1) % tracks.length;
      loadTrack(next);
      if (playing) {
        progressFill.style.width = '0%';
        timeCurrent.textContent = '0:00';
      }
    }

    function prevTrack() {
      const prev = (currentTrack - 1 + tracks.length) % tracks.length;
      loadTrack(prev);
      if (playing) {
        progressFill.style.width = '0%';
        timeCurrent.textContent = '0:00';
      }
    }

    playBtn.addEventListener('click', togglePlay);
    prevBtn.addEventListener('click', prevTrack);
    nextBtn.addEventListener('click', nextTrack);

    volumeSlider.addEventListener('input', () => {
      const v = volumeSlider.value;
      volumeSlider.style.setProperty('--vol', v);
    });
    volumeSlider.style.setProperty('--vol', '0.75');

    playlistToggle.addEventListener('click', () => {
      playlist.classList.toggle('open');
    });

    plItems.forEach(el => {
      el.addEventListener('click', () => {
        loadTrack(+el.dataset.idx);
        if (!playing) togglePlay();
      });
    });

    loadTrack(0);
  </script>
</body>
</html>
