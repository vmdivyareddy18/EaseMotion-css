<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Parallax Language Switcher — Dark Mode</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="demo-wrapper ease-fade-in">

    <h1 class="demo-title">
      Parallax Language Switcher
    </h1>

    <p class="demo-sub">
      A pure CSS language selector with layered parallax depth and smooth motion.
    </p>


    <div class="language-card">

      <h2 class="language-heading">
        Choose Language
      </h2>


      <div class="language-switcher"
           role="group"
           aria-label="Language selector">

        <button class="lang-item lang-left"
                aria-label="French">
          FR
        </button>


        <button class="lang-item lang-center"
                aria-label="English selected"
                aria-current="true">
          🌐 EN
        </button>


        <button class="lang-item lang-right"
                aria-label="German">
          DE
        </button>


        <button class="lang-item lang-bottom-left"
                aria-label="Spanish">
          ES
        </button>


        <button class="lang-item lang-bottom-right"
                aria-label="Japanese">
          JP
        </button>

      </div>


    </div>


  </div>

</body>
</html>
