<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-pegasus-fly Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: Inter, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      min-height: 100vh;
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
      padding: 2rem;
      overflow: hidden;
    }
    h2 { color: #fff; }
    p  { color: #94a3b8; font-size: 0.9rem; }

    .demo-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 2rem 2.5rem;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .demo-card label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
    }

    /* Pegasus SVG emoji size */
    .pegasus {
      font-size: 3rem;
      line-height: 1;
    }

    .sky-strip {
      width: 100%;
      height: 80px;
      position: relative;
      overflow: hidden;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

  <h2>ease-pegasus-fly ✨</h2>

  <!-- Fly across -->
  <div class="demo-card">
    <label>Fly Across ( ease-pegasus-fly )</label>
    <div class="sky-strip">
      <div class="ease-pegasus-fly">
        <span class="pegasus">🦄</span>
      </div>
    </div>
  </div>

  <!-- Hover float -->
  <div class="demo-card">
    <label>Hover Float ( ease-pegasus-hover )</label>
    <div class="ease-pegasus-hover">
      <span class="pegasus">🦄</span>
    </div>
  </div>

  <!-- Speed variants -->
  <div class="demo-card">
    <label>Speed Variants</label>
    <div style="display:flex; gap:2rem; align-items:center">
      <div style="text-align:center">
        <div class="ease-pegasus-hover ease-pegasus-fly-slow">
          <span class="pegasus">🦄</span>
        </div>
        <p style="margin:0.5rem 0 0; font-size:0.75rem">Slow</p>
      </div>
      <div style="text-align:center">
        <div class="ease-pegasus-hover">
          <span class="pegasus">🦄</span>
        </div>
        <p style="margin:0.5rem 0 0; font-size:0.75rem">Default</p>
      </div>
      <div style="text-align:center">
        <div class="ease-pegasus-hover ease-pegasus-fly-fast">
          <span class="pegasus">🦄</span>
        </div>
        <p style="margin:0.5rem 0 0; font-size:0.75rem">Fast</p>
      </div>
    </div>
  </div>

  <!-- On any element -->
  <div class="demo-card">
    <label>On any element</label>
    <div class="ease-pegasus-hover" style="font-size:1.5rem; font-weight:800; color:#a78bfa">
      EaseMotion CSS
    </div>
  </div>

</body>
</html>
