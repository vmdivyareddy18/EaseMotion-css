<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typing Speed Test - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="tt-wrapper">

    <h1>Typing Speed Test</h1>

    <div class="tt-stats">
      <div class="tt-stat"><span class="tt-stat-val" id="wpmDisplay">0</span><span class="tt-stat-label">WPM</span></div>
      <div class="tt-stat"><span class="tt-stat-val" id="accDisplay">100</span><span class="tt-stat-label">%</span></div>
      <div class="tt-stat"><span class="tt-stat-val" id="timerDisplay">30</span><span class="tt-stat-label">sec</span></div>
    </div>

    <div class="tt-text" id="textDisplay"></div>
    <textarea class="tt-input" id="userInput" placeholder="Type here..." disabled></textarea>

    <button class="tt-btn" id="startTestBtn">Start Test</button>

  </div>

  <script>
    const texts = [
      'The quick brown fox jumps over the lazy dog near the riverbank.',
      'A journey of a thousand miles begins with a single step forward.',
      'Practice makes perfect and consistency is the key to improvement.',
      'The sun set behind the mountains painting the sky in warm colors.',
      'She opened the book and discovered a world full of magic and wonder.',
    ];

    const textDisplay = document.getElementById('textDisplay');
    const userInput = document.getElementById('userInput');
    const startBtn = document.getElementById('startTestBtn');
    const wpmEl = document.getElementById('wpmDisplay');
    const accEl = document.getElementById('accDisplay');
    const timerEl = document.getElementById('timerDisplay');

    let currentText = '';
    let timeLeft = 30;
    let timerInterval = null;
    let testActive = false;
    let startTime = 0;

    function startTest() {
      currentText = texts[Math.floor(Math.random() * texts.length)];
      textDisplay.innerHTML = currentText.split('').map(c => '<span class="tt-char">' + c + '</span>').join('');
      userInput.value = '';
      userInput.disabled = false;
      userInput.focus();
      timeLeft = 30;
      timerEl.textContent = timeLeft;
      wpmEl.textContent = '0';
      accEl.textContent = '100';
      testActive = true;
      startBtn.textContent = 'Running...';
      startBtn.disabled = true;

      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        timeLeft--;
        timerEl.textContent = timeLeft;
        if (timeLeft <= 0) endTest();
      }, 1000);

      startTime = Date.now();
    }

    function endTest() {
      testActive = false;
      clearInterval(timerInterval);
      userInput.disabled = true;
      startBtn.textContent = 'Start Test';
      startBtn.disabled = false;
      timerEl.textContent = '0';

      const typed = userInput.value;
      const words = typed.trim().split(/\s+/).filter(w => w).length;
      const wpm = Math.round(words / 0.5);
      wpmEl.textContent = wpm;

      let correct = 0;
      for (let i = 0; i < Math.min(typed.length, currentText.length); i++) {
        if (typed[i] === currentText[i]) correct++;
      }
      const acc = typed.length > 0 ? Math.round((correct / typed.length) * 100) : 100;
      accEl.textContent = acc;

      highlightChars();
    }

    function highlightChars() {
      const chars = textDisplay.querySelectorAll('.tt-char');
      const typed = userInput.value;
      chars.forEach((c, i) => {
        c.classList.remove('correct', 'incorrect');
        if (i < typed.length) {
          c.classList.add(typed[i] === currentText[i] ? 'correct' : 'incorrect');
        }
      });
    }

    userInput.addEventListener('input', () => {
      if (!testActive) return;
      highlightChars();
      if (userInput.value.length >= currentText.length) endTest();
    });

    startBtn.addEventListener('click', startTest);
  </script>

</body>
</html>
