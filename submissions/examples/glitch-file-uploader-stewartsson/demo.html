<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Console - Glitch File Uploader Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="neumorphic-viewport">
        <!-- Main Neumorphic Upload Frame Control Container Box Card -->
        <div class="uploader-box-card">
            <header class="uploader-header">
                <span class="status-badge">Secure Ingress</span>
                <h1 class="uploader-title">Asset Uploader</h1>
                <p class="uploader-subtitle">Select or drag files over the soft-extrusion drop zone box below to trigger pure-CSS chromatic glitch shifts.</p>
            </header>

            <!-- Advanced Pure-CSS Chrono Glitch Drop Zone Interface Stage Area -->
            <div class="dropzone-stage-workspace">
                <div class="neumorphic-drop-crater ease-chromatic-glitch">
                    
                    <!-- Real HTML Hidden Functional Upload Ingress Controller Node -->
                    <input type="file" id="asset-file-ingress" class="hidden-file-input">
                    
                    <!-- Stylized Tactile Overlay Interactive Label Target Row Button Layout -->
                    <label for="asset-file-ingress" class="tactile-upload-btn">
                        <span class="upload-icon-symbol">⇪</span>
                        <span class="upload-label-text" data-text="DISPATCH FILE">DISPATCH FILE</span>
                    </label>

                </div>
            </div>

            <footer class="uploader-footer">
                <div class="ledger-sync-status">
                    <span class="pulse-beacon-dot"></span>
                    <span class="status-label">SHA-256 Cloud Ingress Anchors Calibrated</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
