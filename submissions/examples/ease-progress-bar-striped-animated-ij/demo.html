<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Animated Striped Progress Bar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./style.css">

  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 2rem;
      gap: 2rem;
      font-family: "Inter", system-ui, sans-serif;
    }
  </style>
</head>
<body>

  <header style="text-align: center; max-width: 500px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem;">Animated Striped Progress Bar</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem;">Striped progress bar with continuous animation on load</p>
  </header>

  <div style="width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 1rem;">
    <div class="pbsa-progress-bar">
      <div class="pbsa-progress-bar-fill" id="progressFill" style="--pbsa-progress: 0%;">
        <span class="pbsa-progress-label" id="progressLabel">0%</span>
      </div>
    </div>

    <button class="pbsa-reset-btn" id="resetBtn">Reset &amp; Replay</button>
  </div>

  <script>
    (function () {
      const fill = document.getElementById("progressFill");
      const label = document.getElementById("progressLabel");
      const resetBtn = document.getElementById("resetBtn");

      function animateProgress(targetPercent) {
        fill.style.setProperty("--pbsa-progress", targetPercent + "%");
        label.textContent = targetPercent + "%";
      }

      function resetAndReplay() {
        animateProgress(0);
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            animateProgress(75);
          });
        });
      }

      resetBtn.addEventListener("click", resetAndReplay);

      animateProgress(75);
    })();
  </script>

</body>
</html>
