<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Feature Card Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap" aria-labelledby="card-title">
    <article class="feature-card">
      <span class="badge">Interactive</span>
      <h1 id="card-title">Magnetic Feature Card</h1>
      <p>A layered card pattern where the call-to-action, highlight line, and preview tiles respond together on hover or focus.</p>
      <div class="preview-grid" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>
      <a class="magnetic-link" href="#">Explore pattern</a>
    </article>
  </main>
</body>
</html>
