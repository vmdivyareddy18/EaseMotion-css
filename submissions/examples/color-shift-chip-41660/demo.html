<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Color Shift Chip</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <main class="page">

        <h1>
            Color Shift Chip
        </h1>

        <p class="subtitle">
            Animated chips inspired by modern Analytics
            Dashboards using only HTML and CSS.
        </p>

        <section class="chip-container">

            <button class="chip active">
                <span class="dot"></span>
                Active
            </button>

            <button class="chip premium">
                <span class="dot"></span>
                Premium
            </button>

            <button class="chip analytics">
                <span class="dot"></span>
                Analytics
            </button>

            <button class="chip pending">
                <span class="dot"></span>
                Pending
            </button>

        </section>

    </main>

</body>

</html>
