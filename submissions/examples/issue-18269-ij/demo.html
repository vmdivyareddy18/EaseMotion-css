<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masonry Grid</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1 class="title">Masonry Grid</h1>
    <div class="masonry">
      <div class="masonry-item" style="--order:0; height:180px;"><span>1</span></div>
      <div class="masonry-item" style="--order:1; height:260px;"><span>2</span></div>
      <div class="masonry-item" style="--order:2; height:140px;"><span>3</span></div>
      <div class="masonry-item" style="--order:3; height:220px;"><span>4</span></div>
      <div class="masonry-item" style="--order:4; height:160px;"><span>5</span></div>
      <div class="masonry-item" style="--order:5; height:200px;"><span>6</span></div>
      <div class="masonry-item" style="--order:6; height:120px;"><span>7</span></div>
      <div class="masonry-item" style="--order:7; height:240px;"><span>8</span></div>
    </div>
  </div>
</body>
</html>
