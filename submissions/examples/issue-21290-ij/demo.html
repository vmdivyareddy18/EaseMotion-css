<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Balloon Float — Hot Air Balloon</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <p class="title">Hot Air Balloon</p>
      <float-stage>
        <div class="cloud cloud--1"></div>
        <div class="cloud cloud--2"></div>
        <div class="cloud cloud--3"></div>
        <div class="balloon">
          <div class="balloon-envelope">
            <div class="balloon-body">
              <div class="balloon-stripe"></div>
              <div class="balloon-stripe balloon-stripe--bottom"></div>
            </div>
            <div class="balloon-tie"></div>
          </div>
          <div class="balloon-rope"></div>
          <div class="balloon-basket"></div>
        </div>
      </float-stage>
    </main>
  </body>
</html>
