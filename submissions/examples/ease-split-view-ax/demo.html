<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-split-view – Animated Split Content View</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-py-8">
    <div class="ease-flex ease-justify-between ease-items-center ease-mb-6">
      <h1 class="ease-text-3xl ease-font-bold ease-fade-in">Split View</h1>
      <button id="toggle-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition">
        Toggle Panel
      </button>
    </div>

    <!-- Split container -->
    <div class="split-view">
      <!-- Left Panel -->
      <div class="split-panel split-left ease-card ease-p-6 ease-bg-white ease-shadow-md">
        <h2 class="ease-text-lg ease-font-semibold ease-mb-4">Left Panel</h2>
        <p class="ease-text-gray-600">This panel slides out when toggled.</p>
      </div>

      <!-- Resizable divider (CSS-only click toggle, not drag) -->
      <div class="split-divider"></div>

      <!-- Right Panel -->
      <div class="split-panel split-right ease-card ease-p-6 ease-bg-white ease-shadow-md">
        <h2 class="ease-text-lg ease-font-semibold ease-mb-4">Right Panel</h2>
        <p class="ease-text-gray-600">This panel expands to fill the space.</p>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-text-center ease-fade-in ease-delay-500">
      Smooth width transition; toggle left panel visibility.
    </p>
  </div>

  <script>
    const toggleBtn = document.getElementById('toggle-btn');
    const leftPanel = document.querySelector('.split-left');

    toggleBtn.addEventListener('click', () => {
      leftPanel.classList.toggle('hidden');
    });
  </script>

</body>
</html>
