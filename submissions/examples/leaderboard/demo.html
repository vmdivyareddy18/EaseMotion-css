<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamified Leaderboard — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding: 3rem 1rem; background: #f1f5f9; margin: 0; }
    .confetti {
      position: absolute; width: 6px; height: 6px; background: #f59e0b;
      opacity: 0; pointer-events: none; border-radius: 50%;
    }
  </style>
</head>
<body>

  <div class="ease-leaderboard-container">
    <h2 style="text-align:center; margin-top:0; color:#1e293b; font-weight:800; letter-spacing:-0.025em;">Arena Leaderboard</h2>
    
    <div class="ease-podium-container">
      <div class="ease-podium-spot second">
        <div class="ease-podium-avatar-wrapper">
          <div class="ease-podium-avatar" style="background: #94a3b8 url('[https://api.dicebear.com/7.x/bottts/svg?seed=Felix](https://api.dicebear.com/7.x/bottts/svg?seed=Felix)') no-repeat center/cover;"></div>
        </div>
        <div class="ease-podium-pillar">2</div>
        <span style="font-size: 0.8rem; font-weight: 600; color: #64748b; margin-top: 0.5rem;">Alex_G</span>
      </div>

      <div class="ease-podium-spot first" id="firstPlaceSpot">
        <div class="ease-podium-avatar-wrapper">
          <div class="ease-podium-crown">👑</div>
          <div class="ease-podium-avatar" style="background: #fbbf24 url('[https://api.dicebear.com/7.x/bottts/svg?seed=Sophia](https://api.dicebear.com/7.x/bottts/svg?seed=Sophia)') no-repeat center/cover;"></div>
        </div>
        <div class="ease-podium-pillar">1</div>
        <span style="font-size: 0.85rem; font-weight: 700; color: #1e293b; margin-top: 0.5rem;">Sophia_X</span>
      </div>

      <div class="ease-podium-spot third">
        <div class="ease-podium-avatar-wrapper">
          <div class="ease-podium-avatar" style="background: #d97706 url('[https://api.dicebear.com/7.x/bottts/svg?seed=Max](https://api.dicebear.com/7.x/bottts/svg?seed=Max)') no-repeat center/cover;"></div>
        </div>
        <div class="ease-podium-pillar">3</div>
        <span style="font-size: 0.8rem; font-weight: 600; color: #64748b; margin-top: 0.5rem;">Marcus_K</span>
      </div>
    </div>

    <div class="ease-leaderboard-list">
      <div class="ease-leaderboard-row">
        <span class="ease-rank-badge">4</span>
        <div class="ease-row-avatar" style="background: url('[https://api.dicebear.com/7.x/bottts/svg?seed=Elena](https://api.dicebear.com/7.x/bottts/svg?seed=Elena)') no-repeat center/cover;"></div>
        <div class="ease-row-meta">
          <div class="ease-row-name">Elena_R</div>
          <div class="ease-progress-bar-bg"><div class="ease-progress-bar-fill" data-width="82%"></div></div>
        </div>
        <span class="ease-row-score">4,120</span>
      </div>

      <div class="ease-leaderboard-row">
        <span class="ease-rank-badge">5</span>
        <div class="ease-row-avatar" style="background: url('[https://api.dicebear.com/7.x/bottts/svg?seed=Nik](https://api.dicebear.com/7.x/bottts/svg?seed=Nik)') no-repeat center/cover;"></div>
        <div class="ease-row-meta">
          <div class="ease-row-name">Nikolai_V</div>
          <div class="ease-progress-bar-bg"><div class="ease-progress-bar-fill" data-width="71%"></div></div>
        </div>
        <span class="ease-row-score">3,890</span>
      </div>

      <div class="ease-leaderboard-row">
        <span class="ease-rank-badge">6</span>
        <div class="ease-row-avatar" style="background: url('[https://api.dicebear.com/7.x/bottts/svg?seed=Yuki](https://api.dicebear.com/7.x/bottts/svg?seed=Yuki)') no-repeat center/cover;"></div>
        <div class="ease-row-meta">
          <div class="ease-row-name">Yuki_T</div>
          <div class="ease-progress-bar-bg"><div class="ease-progress-bar-fill" data-width="58%"></div></div>
        </div>
        <span class="ease-row-score">3,210</span>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.querySelectorAll('.ease-progress-bar-fill').forEach(bar => {
          bar.style.width = bar.getAttribute('data-width');
        });
      }, 300);
      
      const firstSpot = document.getElementById('firstPlaceSpot');
      for(let i=0; i<15; i++) {
        const conf = document.createElement('div');
        conf.className = 'confetti';
        conf.style.left = Math.random() * 100 + '%';
        conf.style.top = Math.random() * 40 + '%';
        conf.style.background = ['#f59e0b','#10b981','#3b82f6','#ec4899'][Math.floor(Math.random()*4)];
        conf.style.transform = `scale(${Math.random() * 1.5 + 0.5})`;
        conf.style.opacity = Math.random();
        conf.style.transition = `all ${Math.random() * 1.5 + 1}s ease-out`;
        firstSpot.appendChild(conf);
        
        setTimeout(() => {
          conf.style.transform += ` translateY(-40px) rotate(${Math.random()*360}deg)`;
          conf.style.opacity = '0';
        }, 100);
      }
    });
  </script>
</body>
</html>
