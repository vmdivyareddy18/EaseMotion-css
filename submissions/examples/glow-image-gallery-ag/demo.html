<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glow Image Gallery | EaseMotion CSS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../../easemotion.min.css" />
    <link rel="stylesheet" href="./style.css" />

    <style>
      body {
        background-color: var(
          --ease-color-neutral-900
        ); /* Dark theme matching the glow */
        color: var(--ease-color-neutral-100);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: var(--ease-space-8);
        margin: 0;
        font-family: var(--ease-font-sans);
      }

      .ease-page-title {
        text-align: center;
        margin-bottom: var(--ease-space-8);
      }
    </style>
  </head>
  <body>
    <div class="ease-page-title ease-fade-in">
      <h1 class="ease-slide-up">Blog Gallery</h1>
      <p class="ease-text-muted ease-slide-up ease-delay-100">
        Hover over the images to see the glow effect.
      </p>
    </div>

    <div class="ease-glow-gallery ease-slide-up ease-delay-200">
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?auto=format&fit=crop&w=600&q=80"
          alt="Laptop coding"
        />
      </div>
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=600&q=80"
          alt="Code on screen"
        />
      </div>
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?auto=format&fit=crop&w=600&q=80"
          alt="Computer on desk"
        />
      </div>
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1522199755839-a2bacb67c546?auto=format&fit=crop&w=600&q=80"
          alt="People working"
        />
      </div>
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=600&q=80"
          alt="Developer setup"
        />
      </div>
      <div class="ease-image-glow-hover">
        <img
          src="https://images.unsplash.com/photo-1537432376769-00f5c2f4c8d2?auto=format&fit=crop&w=600&q=80"
          alt="Clean desk setup"
        />
      </div>
    </div>
  </body>
</html>
