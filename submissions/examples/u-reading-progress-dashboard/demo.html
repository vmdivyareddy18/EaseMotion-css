<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Progress Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <header>
            <h1>Reading Progress Dashboard</h1>
            <p>Track your books and reading goals.</p>
        </header>

        <div class="book-card">
            <h2>Atomic Habits</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p>210 / 280 Pages Read</p>
        </div>

        <div class="stats">
            <div class="card">
                <h3>Books Completed</h3>
                <p>12</p>
            </div>

            <div class="card">
                <h3>Reading Streak</h3>
                <p>18 Days 🔥</p>
            </div>

            <div class="card">
                <h3>Reading Goal</h3>
                <p>75%</p>
            </div>
        </div>

        <section class="achievements">
            <h2>Achievements</h2>

            <div class="badge">📚 Bookworm</div>
            <div class="badge">🔥 Consistent Reader</div>
            <div class="badge">🏆 Goal Achiever</div>
        </section>
    </div>
</body>
</html>
