<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Empty Results Suggestions</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Search state</p>
      <h1 id="demo-title">No results found</h1>
      <p>A helpful empty search state with query context, filter reset, and suggested next searches.</p>
    </section>
    <section class="demo-stage" aria-label="Search Empty Results Suggestions">
        <section class="search-empty"><div class="empty-icon"></div><h2>No results for billing</h2><p>Try a broader query or remove one of the active filters.</p><div class="suggestion-row"><button type="button">Clear filters</button><button type="button">Try invoices</button><button type="button">Search customers</button><button type="button">View archived</button></div></section>
    </section>
  </main>
</body>
</html>
