<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS-Only Empty State Illustration Motion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="empty-state">

    <div class="illustration">

        <div class="folder">
            <div class="folder-tab"></div>
        </div>

        <div class="paper paper-1"></div>
        <div class="paper paper-2"></div>
        <div class="paper paper-3"></div>

        <div class="sparkle sparkle-1"></div>
        <div class="sparkle sparkle-2"></div>
        <div class="sparkle sparkle-3"></div>

    </div>

    <h1>No Projects Yet</h1>

    <p>
        Your workspace is currently empty.
        Create a project to start collaborating with your team.
    </p>

    <button class="cta-btn">
        Create Project
    </button>

</div>

</body>
</html>
