<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Field Error Shake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Form Field Error Shake</h1>
    <form id="demoForm" novalidate>
      <div class="field-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" class="field" placeholder="Enter your name" required>
        <span class="error-msg"></span>
      </div>
      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="field" placeholder="Enter your email" required>
        <span class="error-msg"></span>
      </div>
      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="field" placeholder="Enter a password" required minlength="6">
        <span class="error-msg"></span>
      </div>
      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </div>
  <script src="demo.js"></script>
</body>
</html>
