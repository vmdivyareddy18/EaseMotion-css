<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror Reflection Card — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card-grid">
    <div class="mirror-card" style="--card-bg: #2a2a3e; --reflection-opacity: 0.35; --reflection-gradient: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.4) 100%); --hover-duration: 0.6s;">
      <div class="card-content">
        <h2>Galaxy</h2>
        <p>Hover to see the reflection shimmer</p>
      </div>
      <div class="card-reflection"></div>
    </div>
    <div class="mirror-card" style="--card-bg: #1e3a2f; --reflection-opacity: 0.25; --reflection-gradient: linear-gradient(180deg, transparent 0%, rgba(144, 238, 144, 0.5) 100%); --hover-duration: 0.8s;">
      <div class="card-content">
        <h2>Forest</h2>
        <p>Nature-inspired mirror effect</p>
      </div>
      <div class="card-reflection"></div>
    </div>
  </div>
</body>
</html>
