<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Compass Direction Spin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Compass Direction Spin</h1>

    <p>
      A smooth compass animation designed for navigation apps,
      maps, travel platforms, and route planning interfaces.
    </p>

    <div class="demo-grid">

      <button class="compass-button">
        <span class="compass-icon">🧭</span>
      </button>

      <button class="compass-button card-style">
        <span class="compass-icon">🧭</span>
        <span>Find Route</span>
      </button>

      <div class="compass-card">
        <h3>Navigation Ready</h3>

        <p>
          Discover routes and directions with animated guidance.
        </p>

        <button class="compass-button small">
          <span class="compass-icon">🧭</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
