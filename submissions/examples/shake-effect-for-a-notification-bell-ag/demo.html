<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Notification Bell Shake</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <header class="navbar">
            <div class="logo">MyApp</div>
            
            <!-- Notification Container -->
            <div class="notification-container">
                <button class="notification-bell" aria-label="Notifications">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                    </svg>
                </button>
                <span class="notification-badge" aria-hidden="true">3</span>
            </div>
        </header>

        <section class="content">
            <h1>Stay Updated</h1>
            <p>Hover over or focus on the notification bell in the top right to see the shake animation.</p>
        </section>
    </main>

</body>
</html>
