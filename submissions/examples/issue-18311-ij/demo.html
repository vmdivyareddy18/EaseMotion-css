<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18311 - Modal Exit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18311 - Modal Exit</div>
    <button class="modal-btn" id="openBtn">Open Modal</button>
  </div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <h2>Modal Title</h2>
        <button class="modal-close" id="closeBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p>This modal has a smooth exit animation on close.</p>
      </div>
    </div>
  </div>
  <script>
    const backdrop = document.getElementById('modalBackdrop');
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');

    function openModal() {
      backdrop.classList.remove('closing');
      backdrop.classList.add('active');
    }

    function closeModal() {
      backdrop.classList.add('closing');
      backdrop.addEventListener('transitionend', () => {
        if (backdrop.classList.contains('closing')) {
          backdrop.classList.remove('active', 'closing');
        }
      }, { once: true });
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) closeModal();
    });
  </script>
</body>
</html>
