<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EaseMotion Progress Ring Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h2>Progress Ring Example</h2>

  <!-- Circular progress ring -->
  <svg class="ease-progress-ring" width="120" height="120">
    <circle class="ring-bg" cx="60" cy="60" r="54" />
    <circle class="ring-progress" cx="60" cy="60" r="54" />
    <text x="60" y="65" text-anchor="middle" class="ring-text">75%</text>
  </svg>

  <script>
    function setProgress(percent) {
      const circle = document.querySelector(".ring-progress");
      const radius = circle.r.baseVal.value;
      const circumference = 2 * Math.PI * radius;

      circle.style.strokeDasharray = `${circumference} ${circumference}`;
      circle.style.strokeDashoffset = circumference;

      const offset = circumference - (percent / 100) * circumference;
      circle.style.strokeDashoffset = offset;

      document.querySelector(".ring-text").textContent = `${percent}%`;
    }

    // Example: animate to 75%
    setProgress(75);
  </script>
</body>
</html>
