<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modal Focus Demo</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <h1>Accessible Modal Focus Demo</h1>
      <p>Open the modal and notice how focus moves into the dialog content.</p>

      <button class="trigger-btn" id="openModal">Open modal</button>

      <div class="modal-overlay" id="demoModal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
          <h2 id="modalTitle">Modal title</h2>
          <p>This modal focuses the first interactive control when it opens.</p>
          <label class="field">
            <span>Name</span>
            <input type="text" placeholder="Enter your name" />
          </label>
          <div class="modal-actions">
            <button class="secondary-btn" id="closeModal">Close</button>
            <button class="primary-btn">Save</button>
          </div>
        </div>
      </div>
    </main>

    <script>
      const triggerBtn = document.getElementById('openModal');
      const closeBtn = document.getElementById('closeModal');
      const overlay = document.getElementById('demoModal');
      const modalCard = overlay.querySelector('.modal-card');
      const firstInput = modalCard.querySelector('input');

      function openModal() {
        overlay.classList.add('is-open');
        overlay.setAttribute('aria-hidden', 'false');
        firstInput.focus();
      }

      function closeModal() {
        overlay.classList.remove('is-open');
        overlay.setAttribute('aria-hidden', 'true');
        triggerBtn.focus();
      }

      triggerBtn.addEventListener('click', openModal);
      closeBtn.addEventListener('click', closeModal);
      overlay.addEventListener('click', (event) => {
        if (event.target === overlay) {
          closeModal();
        }
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && overlay.classList.contains('is-open')) {
          closeModal();
        }
      });
    </script>
  </body>
</html>
