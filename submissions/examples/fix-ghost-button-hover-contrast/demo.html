<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Button Hover Contrast Fix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Ghost Button Hover Contrast</h1>

    <p>
        This showcase demonstrates an accessible hover state for Ghost buttons,
        ensuring the text remains readable when the background changes.
    </p>

    <div class="demo-grid">

        <div class="card">

            <h2>Default Ghost Button</h2>

            <button class="ghost-button">
                Ghost
            </button>

        </div>

        <div class="card">

            <h2>Accessible Hover State</h2>

            <button class="ghost-button fixed">
                Ghost
            </button>

        </div>

    </div>

</div>

</body>
</html>
