<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Opacity Utilities | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="opacity-demo-page">
  <main class="opacity-wrapper">
    <header class="opacity-header">
      <h1 class="opacity-title">Opacity Utilities</h1>
      <p class="opacity-subtitle">Transparency controls proposed for <code>core/utilities.css</code>.</p>
    </header>

    <!-- Playground -->
    <section class="opacity-showcase">
      
      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-100 (100%)</h3>
        <div class="visual-box opacity-100">
          <span class="visual-text">100%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-90 (90%)</h3>
        <div class="visual-box opacity-90">
          <span class="visual-text">90%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-75 (75%)</h3>
        <div class="visual-box opacity-75">
          <span class="visual-text">75%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-50 (50%)</h3>
        <div class="visual-box opacity-50">
          <span class="visual-text">50%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-25 (25%)</h3>
        <div class="visual-box opacity-25">
          <span class="visual-text">25%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-10 (10%)</h3>
        <div class="visual-box opacity-10">
          <span class="visual-text">10%</span>
        </div>
      </article>

      <article class="opacity-card">
        <h3 class="opacity-label">.opacity-0 (0%)</h3>
        <div class="visual-box opacity-0">
          <span class="visual-text">0%</span>
        </div>
      </article>

    </section>
  </main>
</body>
</html>
