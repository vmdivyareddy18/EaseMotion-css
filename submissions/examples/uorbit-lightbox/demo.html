<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Orbit Lightbox</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Orbit Lightbox</h1>

        <p class="subtitle">
            Pure CSS animated lightbox with orbit-style entrance.
        </p>

        <a href="#lightbox" class="ease-button">
            Open Lightbox
        </a>

        <div id="lightbox" class="ease-lightbox">

            <a href="#" class="overlay" aria-label="Close lightbox"></a>

            <section
                class="ease-lightbox-content ease-orbit"
                role="dialog"
                aria-modal="true"
                aria-labelledby="title">

                <a href="#" class="close-btn" aria-label="Close">
                    &times;
                </a>

                <div class="orbit-ring ring-1"></div>
                <div class="orbit-ring ring-2"></div>
                <div class="orbit-ring ring-3"></div>

                <h2 id="title">
                    Orbit Animation
                </h2>

                <p>
                    This lightbox demonstrates an orbit-inspired entrance
                    animation built entirely with CSS using EaseMotion classes.
                </p>

                <button class="action-btn">
                    Continue
                </button>

            </section>

        </div>

    </main>

</body>

</html>
