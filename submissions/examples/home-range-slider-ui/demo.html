<!DOCTYPE html>
<html>
<head>
  <title>Range Slider UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <h2>Adjust Value</h2>

  <input type="range" min="0" max="100" value="50" id="slider" oninput="updateValue(this.value)">
  
  <p>Value: <span id="value">50</span></p>
</div>

<script>
function updateValue(val) {
  document.getElementById("value").innerText = val;
}
</script>

</body>
</html>
