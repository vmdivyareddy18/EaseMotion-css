<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Floating Profile Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="profile-card">

        <div class="avatar-wrapper">
            <img 
                src="https://i.pravatar.cc/150?img=12" 
                alt="Profile Avatar"
                class="avatar"
            >
        </div>

        <h2>Alex Carter</h2>

        <p class="role">
            Frontend Developer
        </p>

        <p class="description">
            Creating beautiful interfaces with modern CSS animations.
        </p>

        <button>
            View Profile
        </button>

    </div>

</body>
</html>
