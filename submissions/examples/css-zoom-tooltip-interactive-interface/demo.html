<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Interface Zoom-In Tooltip</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <section class="interface-card">

        <span class="badge">Interactive Interface</span>

        <h1>Workspace Quick Actions</h1>

        <p>
            Hover over or focus on the action buttons to reveal smooth
            Zoom-In tooltips built entirely with HTML and CSS.
        </p>

        <div class="action-grid">

            <button class="action tooltip-wrapper">

                💬 Chat

                <span class="tooltip">
                    Start a new conversation with your team.
                </span>

            </button>

            <button class="action tooltip-wrapper">

                📅 Schedule

                <span class="tooltip">
                    Create and manage upcoming events.
                </span>

            </button>

            <button class="action tooltip-wrapper">

                📊 Reports

                <span class="tooltip">
                    View real-time analytics and reports.
                </span>

            </button>

            <button class="action tooltip-wrapper">

                ⚙ Settings

                <span class="tooltip">
                    Customize your workspace preferences.
                </span>

            </button>

        </div>

    </section>

</div>

</body>
</html>
