<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Reaction Picker | EaseMotion CSS</title>
  
  <!-- Tailwind Play CDN for layout presentation wrapper only -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Local module style registration -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 font-sans">

  <div class="text-center space-y-2 mb-16">
    <span class="text-xs font-mono uppercase tracking-widest text-violet-400 font-semibold px-2.5 py-1 bg-violet-500/10 rounded-full">GSSoC-26 / Startup Variant</span>
    <h1 class="text-3xl font-extrabold tracking-tight">Magnetic Reaction Picker</h1>
    <p class="text-sm text-slate-400">Pure CSS kinetic attraction dock built with hardware-accelerated vectors</p>
  </div>

  <!-- The Magnetic Toolbar Interactive Component -->
  <div class="ease-magnetic-dock-container" role="toolbar" aria-label="Content Reaction Picker">
    <div class="ease-magnetic-dock">
      
      <!-- Option 1: Like -->
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-item" aria-label="React with Thumbs Up">
          <span class="ease-magnetic-emoji">👍</span>
          <span class="ease-magnetic-tooltip">Like</span>
        </button>
      </div>

      <!-- Option 2: Celebrate -->
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-item" aria-label="React with Celebrate">
          <span class="ease-magnetic-emoji">🎉</span>
          <span class="ease-magnetic-tooltip">Celebrate</span>
        </button>
      </div>

      <!-- Option 3: Support -->
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-item" aria-label="React with Heart">
          <span class="ease-magnetic-emoji">❤️</span>
          <span class="ease-magnetic-tooltip">Love</span>
        </button>
      </div>

      <!-- Option 4: Insightful -->
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-item" aria-label="React with Lightbulb">
          <span class="ease-magnetic-emoji">💡</span>
          <span class="ease-magnetic-tooltip">Insightful</span>
        </button>
      </div>

      <!-- Option 5: Laugh -->
      <div class="ease-magnetic-wrapper">
        <button class="ease-magnetic-item" aria-label="React with Laughing">
          <span class="ease-magnetic-emoji">😄</span>
          <span class="ease-magnetic-tooltip">Haha</span>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
