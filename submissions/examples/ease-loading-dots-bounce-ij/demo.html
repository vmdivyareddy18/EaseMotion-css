<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Loading Dots Bounce - EaseMotion CSS</title>
</head>
<body>
  <div class="ldb-wrapper">
    <h1>Loading Dots Bounce</h1>
    <div class="ldb-container" id="ldbContainer">
      <span class="ldb-dot"></span>
      <span class="ldb-dot"></span>
      <span class="ldb-dot"></span>
    </div>
    <button class="ldb-toggle" id="ldbToggle">Hide</button>
  </div>
  <script>
    const container = document.getElementById('ldbContainer');
    const toggle = document.getElementById('ldbToggle');
    let visible = true;
    toggle.addEventListener('click', () => {
      visible = !visible;
      container.classList.toggle('ldb-hidden', !visible);
      container.classList.toggle('ldb-loading', visible);
      toggle.textContent = visible ? 'Hide' : 'Show';
    });
  </script>
</body>
</html>
