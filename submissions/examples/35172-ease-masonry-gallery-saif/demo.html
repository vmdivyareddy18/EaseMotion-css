<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Masonry Gallery</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="gallery-section">

    <div class="heading">

        <h1>Ease Masonry Gallery</h1>

        <p>
            Responsive CSS Masonry Gallery with staggered animations,
            hover interactions and dark mode support.
        </p>

    </div>

    <div class="ease-masonry-gallery">

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?w=800"
                 alt="Mountain">
            <div class="overlay">
                <h3>Mountain Escape</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?w=800"
                 alt="Forest">
            <div class="overlay">
                <h3>Deep Forest</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=800"
                 alt="Beach">
            <div class="overlay">
                <h3>Ocean Breeze</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1470770903676-69b98201ea1c?w=800"
                 alt="Lake">
            <div class="overlay">
                <h3>Crystal Lake</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800"
                 alt="Nature">
            <div class="overlay">
                <h3>Nature View</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800"
                 alt="Sea">
            <div class="overlay">
                <h3>Golden Coast</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800"
                 alt="River">
            <div class="overlay">
                <h3>River Flow</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=800"
                 alt="Snow">
            <div class="overlay">
                <h3>Snow Peaks</h3>
            </div>
        </article>

        <article class="gallery-card">
            <img src="https://images.unsplash.com/photo-1500534314209-a25ddb2bd429?w=800"
                 alt="Desert">
            <div class="overlay">
                <h3>Golden Desert</h3>
            </div>
        </article>

    </div>
</section>
</body>
</html>
