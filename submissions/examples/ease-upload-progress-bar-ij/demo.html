<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Upload Progress Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Upload Progress Bar</h1>
    <p>Simulated file uploads with animated striped progress bars</p>
  </header>

  <div class="upb-container">
    <div class="upb-file" data-name="design-mockup-final.fig" data-size="12.4 MB">
      <div class="upb-file-info">
        <span class="upb-file-name">design-mockup-final.fig</span>
        <span class="upb-file-size">12.4 MB</span>
      </div>
      <div class="upb-track">
        <div class="upb-bar" id="bar1" style="--upb-progress: 0%">
          <span class="upb-label" id="label1">0%</span>
        </div>
      </div>
    </div>

    <div class="upb-file" data-name="team-photo-album.zip" data-size="28.7 MB">
      <div class="upb-file-info">
        <span class="upb-file-name">team-photo-album.zip</span>
        <span class="upb-file-size">28.7 MB</span>
      </div>
      <div class="upb-track">
        <div class="upb-bar" id="bar2" style="--upb-progress: 0%">
          <span class="upb-label" id="label2">0%</span>
        </div>
      </div>
    </div>

    <div class="upb-file" data-name="presentation-deck.pptx" data-size="6.8 MB">
      <div class="upb-file-info">
        <span class="upb-file-name">presentation-deck.pptx</span>
        <span class="upb-file-size">6.8 MB</span>
      </div>
      <div class="upb-track">
        <div class="upb-bar" id="bar3" style="--upb-progress: 0%">
          <span class="upb-label" id="label3">0%</span>
        </div>
      </div>
    </div>
  </div>

  <button class="upb-btn" id="uploadBtn">Simulate Upload</button>

  <script>
    document.getElementById('uploadBtn').addEventListener('click', function () {
      const files = [
        { bar: document.getElementById('bar1'), label: document.getElementById('label1'), speed: 80 },
        { bar: document.getElementById('bar2'), label: document.getElementById('label2'), speed: 40 },
        { bar: document.getElementById('bar3'), label: document.getElementById('label3'), speed: 120 }
      ];

      files.forEach(function (file) {
        file.bar.classList.remove('upb-complete');
        file.bar.querySelector('.upb-checkmark')?.remove();

        let progress = 0;
        function tick() {
          if (progress >= 100) {
            file.bar.style.setProperty('--upb-progress', '100%');
            file.bar.classList.add('upb-complete');
            file.label.textContent = '100%';
            var check = document.createElement('span');
            check.className = 'upb-checkmark';
            check.textContent = '\u2713';
            file.bar.appendChild(check);
            return;
          }
          var increment = Math.floor(Math.random() * 8) + 3;
          progress = Math.min(progress + increment, 100);
          file.bar.style.setProperty('--upb-progress', progress + '%');
          file.label.textContent = progress + '%';
          setTimeout(tick, file.speed + Math.floor(Math.random() * 60));
        }
        tick();
      });
    });
  </script>
</body>
</html>
