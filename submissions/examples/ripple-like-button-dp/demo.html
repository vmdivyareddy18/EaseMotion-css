<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Like Button Demo</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
      color: #f8fafc;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .demo-shell {
      width: min(100%, 960px);
      display: grid;
      gap: 1.5rem;
    }

    .demo-header {
      text-align: center;
      display: grid;
      gap: 0.5rem;
      max-width: 640px;
      margin: 0 auto;
    }

    .demo-header h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.3rem);
      line-height: 1.2;
    }

    .demo-header p {
      margin: 0;
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .demo-grid {
      display: grid;
      gap: 1rem;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .demo-card {
      display: grid;
      gap: 1rem;
      padding: 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.05);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .demo-card h2 {
      margin: 0;
      font-size: 1.05rem;
    }

    .demo-card p {
      margin: 0;
      color: #cbd5e1;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      .demo-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="demo-shell">
    <header class="demo-header">
      <h1>Ripple-Like Button</h1>
      <p>Pure-CSS like button with ripple animation. Click the heart icons below.</p>
    </header>

    <section class="demo-grid">
      <article class="demo-card">
        <h2>Standard</h2>
        <p>Default size for most contexts.</p>
        <button class="ripple-btn">
          <input class="ripple-checkbox" type="checkbox" id="like-1" aria-label="Like">
          <span class="ripple-icon"></span>
        </button>
      </article>

      <article class="demo-card">
        <h2>Another</h2>
        <p>Ripple animates with EaseMotion's ease-kf-ping keyframe.</p>
        <button class="ripple-btn">
          <input class="ripple-checkbox" type="checkbox" id="like-2" aria-label="Like">
          <span class="ripple-icon"></span>
        </button>
      </article>

      <article class="demo-card">
        <h2>Responsive</h2>
        <p>Works on all devices, no JavaScript required.</p>
        <button class="ripple-btn">
          <input class="ripple-checkbox" type="checkbox" id="like-3" aria-label="Like">
          <span class="ripple-icon"></span>
        </button>
      </article>
    </section>
  </main>
</body>
</html>
