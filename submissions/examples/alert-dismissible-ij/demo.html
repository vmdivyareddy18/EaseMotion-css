<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS alert-dismissible</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Dismissible Alerts</h1>
    <div class="alert dismissible success">
      <span class="alert-msg">&#10003; Backup complete</span>
      <span class="close-btn">&times;</span>
    </div>
    <div class="alert dismissible error">
      <span class="alert-msg">&#10007; Sync failed</span>
      <span class="close-btn">&times;</span>
    </div>
    <div class="alert dismissible warning">
      <span class="alert-msg">&#9888; Low memory</span>
      <span class="close-btn">&times;</span>
    </div>
  </div>
</body>
</html>
