<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marionette</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="barM"></span>
    <span class="stringM smHead"></span>
    <span class="stringM smHandL"></span>
    <span class="stringM smHandR"></span>
    <span class="stringM smFootL"></span>
    <span class="stringM smFootR"></span>
    <div class="puppetM">
      <div class="armM armL">
        <span class="upperArm"></span>
        <span class="foreArm"></span>
        <span class="handM"></span>
      </div>
      <div class="armM armR">
        <span class="upperArm"></span>
        <span class="foreArm"></span>
        <span class="handM"></span>
      </div>
      <div class="legM legL">
        <span class="thighM"></span>
        <span class="shinM"></span>
        <span class="footM"></span>
      </div>
      <div class="legM legR">
        <span class="thighM"></span>
        <span class="shinM"></span>
        <span class="footM"></span>
      </div>
      <span class="torsoM"></span>
      <span class="collarM"></span>
      <div class="headM">
        <span class="faceM"></span>
        <span class="hatM"></span>
        <span class="cheekM ckl"></span>
        <span class="cheekM ckr"></span>
        <span class="eyeM eml"></span>
        <span class="eyeM emr"></span>
        <span class="smileM"></span>
      </div>
    </div>
    <span class="floorM"></span>
  </div>
</body>
</html>
