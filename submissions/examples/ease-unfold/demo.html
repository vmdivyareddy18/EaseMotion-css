<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Unfold - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene">
        <div class="box ease-unfold">3D Unfold</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-unfold'); void b.offsetWidth; b.classList.add('ease-unfold');">Replay Animation</button>
    </div>
</body>
</html>
