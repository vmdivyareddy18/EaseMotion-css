<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Heatmap Matrix — EaseMotion CSS Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    :root {
      --bg-dark: #0b0f19;
      --text-muted: #94a3b8;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .wrapper {
      max-width: 900px;
      width: 100%;
    }
    header {
      margin-bottom: 2.5rem;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      color: #39d353;
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0 0 0.5rem 0;
    }
    p {
      color: var(--text-muted);
      margin: 0;
      font-size: 1rem;
    }
    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .legend-box {
      width: 11px;
      height: 11px;
      border-radius: 2px;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <header>
      <div class="badge">// Advanced Data Layout</div>
      <h1>Activity Heatmap Grid</h1>
      <p>A pure CSS staggered data matrix utilizing independent hardware-accelerated grid layers.</p>
    </header>

    <div class="ease-heatmap-container">
      <div class="ease-heatmap-grid">
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-med" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-high" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-max" style="--col-index: 1;"></div>
        <div class="ease-heatmap-cell ease-heat-med" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-high" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-max" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-med" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 2;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-high" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-med" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-max" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-high" style="--col-index: 3;"></div>
        <div class="ease-heatmap-cell ease-heat-max" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-max" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-high" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-med" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-low" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 4;"></div>
        <div class="ease-heatmap-cell ease-heat-empty" style="--col-index: 4;"></div>
      </div>
    </div>

    <div class="legend">
      <span>Less</span>
      <div class="legend-box" style="background-color: #1f2937;"></div>
      <div class="legend-box" style="background-color: #0e4429;"></div>
      <div class="legend-box" style="background-color: #006d32;"></div>
      <div class="legend-box" style="background-color: #26a641;"></div>
      <div class="legend-box" style="background-color: #39d353;"></div>
      <span>More</span>
    </div>
  </div>

</body>
</html>
