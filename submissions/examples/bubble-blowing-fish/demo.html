<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Blowing Fish Simulation</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="aquarium-viewport">
        <div class="water-shimmer-overlay"></div>
        <div class="seaweed-container">
            <div class="weed line-1"></div>
            <div class="weed line-2"></div>
            <div class="weed line-3"></div>
        </div>
        
        <canvas id="aquariumCanvas"></canvas>
        
        <div class="control-hud">
            <span class="hud-title">BUBBLE BLOWING SIMULATION</span>
            <span class="hud-tip">Click Aquarium or Press SPACE to Blow Bubbles</span>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('aquariumCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = canvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let bubbles = [];
        let fish = {
            x: canvas.width * 0.4,
            y: canvas.height * 0.5,
            targetX: canvas.width * 0.4,
            targetY: canvas.height * 0.5,
            width: 90,
            height: 60,
            tailWiggle: 0
        };

        class Bubble {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 8 + 4;
                this.speedY = Math.random() * 2 + 1.5;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.wobbleDistance = Math.random() * 3 + 2;
                this.angle = Math.random() * Math.PI * 2;
                this.opacity = 0.8;
            }
            update() {
                this.y -= this.speedY;
                this.angle += this.wobbleSpeed;
                this.x += Math.sin(this.angle) * 0.5;
                if (this.y < 40) {
                    this.opacity -= 0.05;
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(173, 216, 230, ${this.opacity})`;
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.lineWidth = 1;
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(this.x - this.radius * 0.3, this.y - this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.6})`;
                ctx.fill();
            }
        }

        function spawnBubbles() {
            const mouthX = fish.x - 45;
            const mouthY = fish.y + 2;
            for(let i = 0; i < 5; i++) {
                setTimeout(() => {
                    bubbles.push(new Bubble(mouthX, mouthY));
                }, i * 80);
            }
        }

        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            fish.targetX = e.clientX - rect.left;
            fish.targetY = e.clientY - rect.top;
        });

        window.addEventListener('click', spawnBubbles);
        window.addEventListener('keydown', (e) => {
            if(e.code === 'Space') {
                e.preventDefault();
                spawnBubbles();
            }
        });

        function drawFish() {
            fish.tailWiggle += 0.15;
            
            ctx.save();
            ctx.translate(fish.x, fish.y);
            
            ctx.beginPath();
            ctx.moveTo(-45, 0);
            ctx.bezierCurveTo(-20, -35, 25, -35, 35, 0);
            ctx.bezierCurveTo(25, 35, -20, 35, -45, 0);
            ctx.fillStyle = '#ff7a45';
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#d4380d';
            ctx.stroke();

            ctx.beginPath();
            const wiggle = Math.sin(fish.tailWiggle) * 6;
            ctx.moveTo(30, 0);
            ctx.lineTo(55 + wiggle, -20);
            ctx.lineTo(48 + wiggle, 0);
            ctx.lineTo(55 + wiggle, 20);
            ctx.closePath();
            ctx.fillStyle = '#ff9c6e';
            ctx.fill();
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(-25, -8, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-26, -8, 2.5, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(-42, 5, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ff9c6e';
            ctx.fill();
            
            ctx.restore();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            fish.x += (fish.targetX - fish.x) * 0.08;
            fish.y += (fish.targetY - fish.y) * 0.08;
            
            drawFish();
            
            bubbles.forEach((bubble, index) => {
                bubble.update();
                bubble.draw();
                if (bubble.opacity <= 0 || bubble.y < -10) {
                    bubbles.splice(index, 1);
                }
            });
            
            requestAnimationFrame(animate);
        }

        animate();
        
        setInterval(() => {
            if(Math.random() > 0.4) {
                spawnBubbles();
            }
        }, 3000);
    </script>
</body>
</html>
