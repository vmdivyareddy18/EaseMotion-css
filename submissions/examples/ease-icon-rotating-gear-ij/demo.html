<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Rotating Gear – Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-grid">
    <h1 class="demo-title">⚙️ Icon Rotating Gear</h1>
    <div class="card-row">
      <div class="card">
        <h2 class="card-label">Continuous spin</h2>
        <div class="icon-wrap gear-spin" id="gearIcon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z" fill="var(--gear-color)"/>
            <circle cx="12" cy="12" r="2.5" fill="var(--spoke-color)"/>
          </svg>
        </div>
        <div class="controls">
          <label>Gear Color <input type="color" value="#a6e3a1" data-prop="--gear-color"></label>
          <label>Spoke Color <input type="color" value="#1e1e2e" data-prop="--spoke-color"></label>
          <label>Gear Size <input type="range" min="32" max="120" value="64" data-prop="--gear-size"></label>
          <label>Spin Speed <input type="range" min="0.5" max="6" step="0.5" value="3" data-prop="--spin-speed"></label>
        </div>
        <p class="hint">The gear spins continuously. Adjust speed in real time.</p>
      </div>
    </div>
  </main>
  <script>
    document.querySelectorAll('[data-prop]').forEach(input => {
      input.addEventListener('input', () => {
        const wrap = document.querySelector('.icon-wrap');
        const val = input.type === 'color' ? input.value : input.dataset.prop === '--spin-speed' ? input.value + 's' : input.value + 'px';
        wrap.style.setProperty(input.dataset.prop, val);
        if (input.dataset.prop === '--spin-speed') {
          wrap.style.setProperty('--spin-speed', input.value + 's');
        }
      });
    });
  </script>
</body>
</html>
