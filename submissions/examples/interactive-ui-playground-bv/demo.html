<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Interactive UI Playground</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 156 • Developer Platform</span>
        <h1>Interactive UI Playground</h1>
        <p class="subtitle">Live animation testing environment.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card playground-split">
          <div class="code-editor">
            <h4>⌨️ CSS Editor</h4>
            <pre><code>.my-animation {
  animation: ease-bounce 1s;
}</code></pre>
          </div>
          <div class="live-preview">
            <h4>🚀 Live Frame</h4>
            <div class="animated-element">Playground Element</div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Core Hub</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
