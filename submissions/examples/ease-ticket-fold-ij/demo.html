<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Fold</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="tf-container">
  <h1>🎟️ Ticket Fold</h1>
  <p class="tf-subtitle">Click the ticket to unfold it. Click the stub to tear it off.</p>

  <div class="tf-ticket" id="ticket">
    <div class="tf-inner" id="ticketInner">
      <div class="tf-stub" id="stub">
        <div class="tf-stub-content">
          <div class="tf-stub-label">ADMIT</div>
          <div class="tf-stub-code">#A7X92</div>
          <div class="tf-barcode">
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
            <div class="tf-bar"></div>
          </div>
        </div>
      </div>
      <div class="tf-perf"></div>
      <div class="tf-main-part">
        <div class="tf-main-content">
          <div class="tf-event-name">EaseMotion Conf</div>
          <div class="tf-event-detail">June 15, 2026 · Main Hall</div>
          <div class="tf-event-detail">Door: 7:00 PM · Show: 8:00 PM</div>
          <div class="tf-event-detail">Section A · Row 12 · Seat 4</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tf-controls">
    <button class="tf-btn" id="foldBtn">Fold / Unfold</button>
    <button class="tf-btn tf-btn-secondary" id="resetBtn">Reset</button>
  </div>
</div>

<script>
const ticket = document.getElementById('ticket');
const ticketInner = document.getElementById('ticketInner');
const stub = document.getElementById('stub');
const foldBtn = document.getElementById('foldBtn');
const resetBtn = document.getElementById('resetBtn');
let isFolded = true;
let isTorn = false;

foldBtn.addEventListener('click', () => {
  if (isTorn) return;
  isFolded = !isFolded;
  ticketInner.classList.toggle('tf-unfolded', !isFolded);
  ticketInner.classList.toggle('tf-folded', isFolded);
  foldBtn.textContent = isFolded ? 'Unfold' : 'Fold';
});

stub.addEventListener('click', (e) => {
  e.stopPropagation();
  if (isTorn) return;
  if (isFolded) { isFolded = false; ticketInner.classList.remove('tf-folded'); ticketInner.classList.add('tf-unfolded'); foldBtn.textContent = 'Fold'; }
  isTorn = true;
  stub.classList.add('tf-torn');
  setTimeout(() => stub.style.display = 'none', 700);
});

ticket.addEventListener('click', () => foldBtn.click());

resetBtn.addEventListener('click', () => {
  isFolded = true; isTorn = false;
  ticketInner.classList.remove('tf-unfolded');
  ticketInner.classList.add('tf-folded');
  stub.classList.remove('tf-torn');
  stub.style.display = '';
  foldBtn.textContent = 'Unfold';
});
</script>
</body>
</html>
