<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Horizontal Roll Accordion — Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body style="background:#f1f5f9; padding: 2rem;">

<div class="ease-accordion-horizontalroll-lg">

  <div class="ease-accordion-horizontalroll-lg__item">
    <button class="ease-accordion-horizontalroll-lg__header" aria-expanded="true" aria-controls="panel-1">
      Traffic Overview
      <svg class="ease-accordion-horizontalroll-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-horizontalroll-lg__panel" id="panel-1" data-open="true">
      <div class="ease-accordion-horizontalroll-lg__panel-inner">
        <div class="ease-accordion-horizontalroll-lg__roll">
          <div class="ease-accordion-horizontalroll-lg__content">
            Page views increased 24% this week, with mobile traffic accounting for 68% of total sessions.
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-horizontalroll-lg__item">
    <button class="ease-accordion-horizontalroll-lg__header" aria-expanded="false" aria-controls="panel-2">
      Conversion Funnel
      <svg class="ease-accordion-horizontalroll-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-horizontalroll-lg__panel" id="panel-2" data-open="false">
      <div class="ease-accordion-horizontalroll-lg__panel-inner">
        <div class="ease-accordion-horizontalroll-lg__roll">
          <div class="ease-accordion-horizontalroll-lg__content">
            Checkout completion rate improved to 42%, up from 35% following the new streamlined flow.
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="ease-accordion-horizontalroll-lg__item">
    <button class="ease-accordion-horizontalroll-lg__header" aria-expanded="false" aria-controls="panel-3">
      Server Health
      <svg class="ease-accordion-horizontalroll-lg__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <div class="ease-accordion-horizontalroll-lg__panel" id="panel-3" data-open="false">
      <div class="ease-accordion-horizontalroll-lg__panel-inner">
        <div class="ease-accordion-horizontalroll-lg__roll">
          <div class="ease-accordion-horizontalroll-lg__content">
            All systems operational. Average response time is 82ms across all regions.
          </div>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  document.querySelectorAll('.ease-accordion-horizontalroll-lg__header').forEach(header => {
    header.addEventListener('click', () => {
      const expanded = header.getAttribute('aria-expanded') === 'true';
      const panel = document.getElementById(header.getAttribute('aria-controls'));
      header.setAttribute('aria-expanded', String(!expanded));
      panel.setAttribute('data-open', String(!expanded));
    });

    header.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        header.click();
      }
    });
  });
</script>

</body>
</html>
