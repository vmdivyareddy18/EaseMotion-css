<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Progress Stepper UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Progress Stepper UI Example</h1>
      <p>Multi-step progress indicator with animated step transitions.</p>
    </header>

    <section class="stepper-grid">
      <div class="progress-stepper">
        <div class="progress-stepper__bar">
          <div class="progress-stepper__fill" style="width: 20%;"></div>
        </div>
        <div class="progress-stepper__steps">
          <button class="progress-stepper__step progress-stepper__step--active" data-step="1">1</button>
          <button class="progress-stepper__step" data-step="2">2</button>
          <button class="progress-stepper__step" data-step="3">3</button>
          <button class="progress-stepper__step" data-step="4">4</button>
        </div>
        <div class="progress-stepper__labels">
          <span>Start</span>
          <span>Details</span>
          <span>Review</span>
          <span>Complete</span>
        </div>
      </div>

      <div class="stepper-actions">
        <button class="stepper-btn" data-action="prev">Previous</button>
        <button class="stepper-btn" data-action="next">Next</button>
      </div>
    </section>
  </main>

  <script>
    const steps = document.querySelectorAll('.progress-stepper__step');
    const fill = document.querySelector('.progress-stepper__fill');
    let activeIndex = 0;

    function updateStepper(index) {
      const step = steps[index];
      const width = ((index + 1) / steps.length) * 100;
      fill.style.width = width + '%';

      steps.forEach((button, idx) => {
        button.classList.toggle('progress-stepper__step--active', idx === index);
        button.classList.toggle('progress-stepper__step--completed', idx < index);
      });
    }

    document.querySelectorAll('.stepper-btn').forEach((button) => {
      button.addEventListener('click', () => {
        if (button.dataset.action === 'next' && activeIndex < steps.length - 1) {
          activeIndex += 1;
        }
        if (button.dataset.action === 'prev' && activeIndex > 0) {
          activeIndex -= 1;
        }
        updateStepper(activeIndex);
      });
    });

    updateStepper(activeIndex);
  </script>
</body>
</html>
