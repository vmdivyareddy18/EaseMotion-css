<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lava Lamp Flow</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🪔 Lava Lamp Flow</h1>
        <p class="subtitle">Colored blobs rising and merging in a classic lava lamp style</p>

        <div class="lava-wrapper">
            <canvas id="lavaCanvas"></canvas>

            <div class="controls">
                <button id="blobBtn">➕ Add Blob</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Color: Classic</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">🪔 Flowing</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('lavaCanvas');
        const ctx = canvas.getContext('2d');
        const blobBtn = document.getElementById('blobBtn');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(500, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let blobs = [];
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;
        let time = 0;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.005 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.04 },
            { name: 'Very Fast', value: 0.07 },
        ];

        // ===== COLOR PALETTES =====
        const colorPalettes = [
            {
                name: 'Classic',
                colors: ['#ff4500', '#ff6b00', '#ff8c00', '#ffa500', '#ffb347'],
                bg: '#1a0a0a'
            },
            {
                name: 'Ocean',
                colors: ['#0066ff', '#0088ff', '#00aaff', '#00ccff', '#00ddff'],
                bg: '#0a0a1a'
            },
            {
                name: 'Rainbow',
                colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'],
                bg: '#0a0a1a'
            },
            {
                name: 'Fire',
                colors: ['#ff0000', '#ff3300', '#ff6600', '#ff9900', '#ffcc00'],
                bg: '#1a0a00'
            },
            {
                name: 'Galaxy',
                colors: ['#7c3aed', '#8b5cf6', '#a78bfa', '#c084fc', '#e0a0ff'],
                bg: '#0a001a'
            },
            {
                name: 'Neon',
                colors: ['#ff00ff', '#ff0080', '#ff00ff', '#00ffff', '#ff00aa'],
                bg: '#0a0a1a'
            },
            {
                name: 'Pastel',
                colors: ['#ffb3ba', '#ffdfba', '#ffffba', '#baffc9', '#bae1ff'],
                bg: '#1a1a2a'
            },
            {
                name: 'Sunset',
                colors: ['#ff6b35', '#ff8c42', '#ffa552', '#ffbe76', '#ffd93d'],
                bg: '#1a0a0a'
            },
        ];

        // ===== LAVA BLOB CLASS =====
        class LavaBlob {
            constructor(x, y, size) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = size || 15 + Math.random() * 35;
                this.targetSize = this.size;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = -0.5 - Math.random() * 1.5;
                this.density = 0.5 + Math.random() * 0.5;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.wobble = 0.1 + Math.random() * 0.3;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.colorOffset = Math.random();
                this.merged = false;
                this.mergeTimer = 0;
                this.alpha = 0.7 + Math.random() * 0.3;
                this.glowIntensity = 0.5 + Math.random() * 0.5;
                this.trail = [];
                this.maxTrail = 5 + Math.floor(Math.random() * 5);
                this.isRising = true;
                this.riseSpeed = 0.3 + Math.random() * 0.5;
                this.wobbleX = 0;
                this.wobbleY = 0;
                this.segments = 12 + Math.floor(Math.random() * 8);
                this.baseY = this.y;
            }

            update(time, speed) {
                const w = canvas.width;
                const h = canvas.height;

                // Pulse
                this.pulsePhase += this.pulseSpeed * speed * 5;
                const pulse = 0.7 + 0.3 * Math.sin(this.pulsePhase);

                // Wobble
                this.wobbleX += this.wobbleSpeed * speed * 10;
                this.wobbleY += this.wobbleSpeed * speed * 10 * 0.7;

                // Movement
                if (this.isRising) {
                    this.vy = -this.riseSpeed * speed * 20 * this.density;
                } else {
                    this.vy = 0.1 * speed * 10;
                }

                this.x += this.vx * speed * 10 + Math.sin(this.wobbleX) * this.wobble * 0.3;
                this.y += this.vy * speed * 10;

                // Boundary
                if (this.x < 20) { this.x = 20; this.vx *= -0.5; }
                if (this.x > w - 20) { this.x = w - 20; this.vx *= -0.5; }
                if (this.y < 20) { 
                    this.y = 20; 
                    this.isRising = false;
                    this.vy = 0.1;
                }
                if (this.y > h - 20) {
                    this.y = h - 20;
                    this.isRising = true;
                    this.vy = -this.riseSpeed * speed * 20 * this.density;
                }

                // Random direction change
                if (Math.random() < 0.005 * speed * 20) {
                    this.vx += (Math.random() - 0.5) * 0.2;
                    this.vx = Math.max(-0.5, Math.min(0.5, this.vx));
                }

                // Size pulse
                this.size = this.targetSize * (0.7 + 0.3 * pulse);

                // Trail
                this.trail.push({ x: this.x, y: this.y, alpha: 0.5 });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                for (const t of this.trail) {
                    t.alpha *= 0.95;
                }

                // Merge timer
                if (this.merged) {
                    this.mergeTimer += speed * 2;
                    if (this.mergeTimer > 1) {
                        this.merged = false;
                        this.mergeTimer = 0;
                        this.alpha = 0.7 + Math.random() * 0.3;
                    }
                }
            }

            draw(ctx, time, palette) {
                const colors = palette.colors;
                const color = colors[Math.floor((this.colorOffset + time * 0.01) * colors.length) % colors.length];

                // Glow
                const glowSize = this.size * 3 * this.glowIntensity;
                const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowSize);
                grad.addColorStop(0, color + '40');
                grad.addColorStop(0.5, color + '20');
                grad.addColorStop(1, color + '00');

                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.globalAlpha = this.alpha * 0.3;
                ctx.fill();

                // Trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.2;
                    const trailSize = this.size * (0.3 + (i / this.trail.length) * 0.3);
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = color;
                    ctx.globalAlpha = trailAlpha;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color + '40';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Main blob
                const blobGrad = ctx.createRadialGradient(
                    this.x - this.size * 0.2,
                    this.y - this.size * 0.3,
                    0,
                    this.x,
                    this.y,
                    this.size
                );
                blobGrad.addColorStop(0, '#ffffff' + '60');
                blobGrad.addColorStop(0.3, color + '90');
                blobGrad.addColorStop(0.7, color + '80');
                blobGrad.addColorStop(1, color + '60');

                // Organic blob shape
                ctx.beginPath();
                const points = this.segments;
                for (let i = 0; i < points; i++) {
                    const angle = (i / points) * Math.PI * 2;
                    const wobble = 0.8 + 0.2 * Math.sin(angle * 3 + this.pulsePhase + this.wobbleX * 0.5);
                    const r = this.size * wobble;
                    const px = this.x + Math.cos(angle) * r;
                    const py = this.y + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();

                ctx.fillStyle = blobGrad;
                ctx.globalAlpha = this.alpha * (0.7 + 0.3 * Math.sin(this.pulsePhase));
                ctx.shadowBlur = 30;
                ctx.shadowColor = color + '60';
                ctx.fill();
                ctx.shadowBlur = 0;

                // Highlight
                ctx.beginPath();
                ctx.arc(
                    this.x - this.size * 0.15,
                    this.y - this.size * 0.25,
                    this.size * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.globalAlpha = this.alpha * 0.4;
                ctx.fill();

                ctx.globalAlpha = 1;
            }

            mergeWith(other) {
                if (this.merged || other.merged) return;
                if (this === other) return;

                const dx = this.x - other.x;
                const dy = this.y - other.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < (this.size + other.size) * 0.6) {
                    // Merge: larger absorbs smaller
                    if (this.size > other.size) {
                        this.size = Math.sqrt(this.size * this.size + other.size * other.size);
                        this.targetSize = this.size;
                        this.x = (this.x * this.size + other.x * other.size) / (this.size + other.size);
                        this.y = (this.y * this.size + other.y * other.size) / (this.size + other.size);
                        other.merged = true;
                        other.alpha = 0;
                        this.merged = true;
                        this.mergeTimer = 0;
                    } else {
                        other.size = Math.sqrt(this.size * this.size + other.size * other.size);
                        other.targetSize = other.size;
                        other.x = (this.x * this.size + other.x * other.size) / (this.size + other.size);
                        other.y = (this.y * this.size + other.y * other.size) / (this.size + other.size);
                        this.merged = true;
                        this.alpha = 0;
                        other.merged = true;
                        other.mergeTimer = 0;
                    }
                }
            }

            isDead() {
                return this.merged && this.mergeTimer > 1;
            }

            isMerged() {
                return this.merged;
            }
        }

        // ===== INIT BLOBS =====
        function initBlobs(count) {
            const w = canvas.width;
            const h = canvas.height;
            blobs = [];
            for (let i = 0; i < count; i++) {
                const x = 30 + Math.random() * (w - 60);
                const y = 30 + Math.random() * (h - 60);
                const size = 15 + Math.random() * 30;
                const blob = new LavaBlob(x, y, size);
                blob.isRising = Math.random() > 0.5;
                if (blob.isRising) {
                    blob.y = h - 30 - Math.random() * 50;
                } else {
                    blob.y = 30 + Math.random() * 50;
                }
                blobs.push(blob);
            }
        }
        initBlobs(8);

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h, palette) {
            // Lamp body
            const lampX = w / 2;
            const lampY = h / 2;
            const lampW = Math.min(w, h) * 0.75;
            const lampH = Math.min(w, h) * 0.85;

            // Background
            const bgGrad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            bgGrad.addColorStop(0, palette.bg);
            bgGrad.addColorStop(0.5, palette.bg);
            bgGrad.addColorStop(1, '#000000');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, w, h);

            // Lamp glass
            const glassGrad = ctx.createRadialGradient(w/2, h/2 - lampH * 0.2, 0, w/2, h/2, lampW * 0.8);
            glassGrad.addColorStop(0, 'rgba(255,200,150,0.05)');
            glassGrad.addColorStop(0.5, 'rgba(200,150,100,0.08)');
            glassGrad.addColorStop(1, 'rgba(150,100,50,0.12)');

            // Lamp shape (rounded rectangle)
            const lx = w/2 - lampW/2;
            const ly = h/2 - lampH/2;
            const radius = 30;

            ctx.beginPath();
            ctx.moveTo(lx + radius, ly);
            ctx.lineTo(lx + lampW - radius, ly);
            ctx.quadraticCurveTo(lx + lampW, ly, lx + lampW, ly + radius);
            ctx.lineTo(lx + lampW, ly + lampH - radius);
            ctx.quadraticCurveTo(lx + lampW, ly + lampH, lx + lampW - radius, ly + lampH);
            ctx.lineTo(lx + radius, ly + lampH);
            ctx.quadraticCurveTo(lx, ly + lampH, lx, ly + lampH - radius);
            ctx.lineTo(lx, ly + radius);
            ctx.quadraticCurveTo(lx, ly, lx + radius, ly);
            ctx.closePath();
            ctx.fillStyle = glassGrad;
            ctx.fill();

            // Lamp border
            ctx.strokeStyle = 'rgba(200,150,100,0.15)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Lamp base
            const baseY = ly + lampH;
            ctx.beginPath();
            ctx.moveTo(w/2 - lampW * 0.35, baseY);
            ctx.lineTo(w/2 - lampW * 0.45, baseY + 20);
            ctx.lineTo(w/2 + lampW * 0.45, baseY + 20);
            ctx.lineTo(w/2 + lampW * 0.35, baseY);
            ctx.closePath();
            ctx.fillStyle = 'rgba(100,80,60,0.2)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(100,80,60,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Lamp top
            const topY = ly;
            ctx.beginPath();
            ctx.moveTo(w/2 - lampW * 0.35, topY);
            ctx.lineTo(w/2 - lampW * 0.4, topY - 15);
            ctx.lineTo(w/2 + lampW * 0.4, topY - 15);
            ctx.lineTo(w/2 + lampW * 0.35, topY);
            ctx.closePath();
            ctx.fillStyle = 'rgba(100,80,60,0.2)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(100,80,60,0.15)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Inner glow
            const innerGlow = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, lampW * 0.5);
            innerGlow.addColorStop(0, 'rgba(255,200,100,0.03)');
            innerGlow.addColorStop(1, 'rgba(255,200,100,0)');
            ctx.fillStyle = innerGlow;
            ctx.fillRect(lx, ly, lampW, lampH);

            // Clip for blobs
            ctx.save();
            ctx.beginPath();
            ctx.moveTo(lx + radius, ly);
            ctx.lineTo(lx + lampW - radius, ly);
            ctx.quadraticCurveTo(lx + lampW, ly, lx + lampW, ly + radius);
            ctx.lineTo(lx + lampW, ly + lampH - radius);
            ctx.quadraticCurveTo(lx + lampW, ly + lampH, lx + lampW - radius, ly + lampH);
            ctx.lineTo(lx + radius, ly + lampH);
            ctx.quadraticCurveTo(lx, ly + lampH, lx, ly + lampH - radius);
            ctx.lineTo(lx, ly + radius);
            ctx.quadraticCurveTo(lx, ly, lx + radius, ly);
            ctx.closePath();
            ctx.clip();

            return { lx, ly, lampW, lampH, radius };
        }

        // ===== RENDER =====
        function render(timestamp) {
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;
            time += speed;

            const palette = colorPalettes[colorMode];
            const clip = drawBackground(ctx, w, h, palette);

            // Update blobs
            for (const blob of blobs) {
                blob.update(time, speed);
            }

            // Merge blobs
            for (let i = 0; i < blobs.length; i++) {
                for (let j = i + 1; j < blobs.length; j++) {
                    blobs[i].mergeWith(blobs[j]);
                }
            }

            // Remove merged blobs
            blobs = blobs.filter(b => !b.isDead());

            // Draw blobs
            for (const blob of blobs) {
                blob.draw(ctx, time, palette);
            }

            ctx.restore();

            // Spawn new blobs occasionally
            if (blobs.length < 12 && Math.random() < 0.005 * speed * 30) {
                const x = clip.lx + 30 + Math.random() * (clip.lampW - 60);
                const y = clip.ly + clip.lampH - 30 - Math.random() * 20;
                const size = 10 + Math.random() * 20;
                const blob = new LavaBlob(x, y, size);
                blob.isRising = true;
                blob.vy = -blob.riseSpeed * speed * 20 * blob.density;
                blobs.push(blob);
            }

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `🪔 ${blobs.length} blobs • ${colorPalettes[colorMode].name}`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Add blob
        blobBtn.addEventListener('click', () => {
            const w = canvas.width;
            const h = canvas.height;
            const lx = w/2 - Math.min(w, h) * 0.75/2 + 30;
            const ly = h/2 - Math.min(w, h) * 0.85/2 + 30;
            const lampW = Math.min(w, h) * 0.75 - 60;
            const lampH = Math.min(w, h) * 0.85 - 60;
            const x = lx + 30 + Math.random() * (lampW - 60);
            const y = ly + lampH - 30 - Math.random() * 20;
            const size = 10 + Math.random() * 25;
            const blob = new LavaBlob(x, y, size);
            blob.isRising = true;
            blob.vy = -blob.riseSpeed * speed * 20 * blob.density;
            blobs.push(blob);
            statusText.textContent = '➕ Added blob!';
            setTimeout(() => {
                statusText.textContent = `🪔 ${blobs.length} blobs`;
            }, 1000);
        });

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `🪔 ${blobs.length} blobs`;
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = `🪔 ${blobs.length} blobs`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            speedLevel = 1;
            speed = speeds[1].value;
            colorMode = 0;
            initBlobs(8);
            
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `🪔 ${blobs.length} blobs`;
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'b' || e.key === 'B') {
                blobBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                blobBtn.click();
            }
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initBlobs(8);
        });

        // ===== INIT =====
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = `🪔 ${blobs.length} blobs`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('🪔 Lava Lamp Flow loaded!');
        console.log('💡 B - Add blob');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Add blob');
    </script>
</body>
</html>
