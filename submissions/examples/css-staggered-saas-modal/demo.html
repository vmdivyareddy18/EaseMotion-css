<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Staggered Entrance Modal - Modern SaaS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="saas-app-layout">
    <aside class="sidebar-mock">
      <div class="logo-placeholder"></div>
      <nav class="nav-mock">
        <div class="nav-item"></div>
        <div class="nav-item"></div>
      </nav>
    </aside>
    
    <main class="main-content-mock">
      <header class="top-bar">
        <div class="breadcrumb">Workspace / Setup</div>
        <a href="#saas-modal" class="btn btn-primary">⚡ Setup Integration</a>
      </header>
      <div class="dashboard-body-mock"></div>
    </main>
  </div>

  <div id="saas-modal" class="modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <a href="#" class="modal-backdrop-close" aria-label="Close modal"></a>
    
    <div class="modal-window">
      <header class="modal-header" style="--stagger-index: 1;">
        <div>
          <h2 id="modal-title">Activate Webhooks</h2>
          <p class="modal-subtitle">Stream real-time app events directly to your server logs.</p>
        </div>
        <a href="#" class="modal-close-icon" aria-label="Close modal">&times;</a>
      </header>

      <div class="modal-body">
        <div class="form-group" style="--stagger-index: 2;">
          <label class="form-label">Payload Destination URL</label>
          <input type="url" class="form-control" placeholder="https://api.yourdomain.com/v1/webhooks" autocomplete="off">
        </div>

        <div class="form-group" style="--stagger-index: 3;">
          <label class="form-label">Event Subscriptions</label>
          <div class="checkbox-pill-group">
            <label class="checkbox-pill"><input type="checkbox" checked> <span>user.created</span></label>
            <label class="checkbox-pill"><input type="checkbox" checked> <span>invoice.paid</span></label>
            <label class="checkbox-pill"><input type="checkbox"> <span>billing.failed</span></label>
          </div>
        </div>

        <div class="form-group" style="--stagger-index: 4;">
          <label class="form-label">Signing Secret Key</label>
          <input type="text" class="form-control" value="whsec_8f2bA...7c9x92" readonly>
        </div>
      </div>

      <footer class="modal-footer" style="--stagger-index: 5;">
        <a href="#" class="btn btn-neutral">Cancel</a>
        <a href="#" class="btn btn-primary">Save Configuration</a>
      </footer>
    </div>
  </div>

</body>
</html>
