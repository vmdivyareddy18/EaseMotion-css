<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Pagination - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Pagination</h1>
      <p>Smooth, animated active-page indicator transitions for page controls.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        
        <nav class="ease-pagination" aria-label="Pagination Navigation">
          
          <!-- Previous Button -->
          <button class="ease-page-btn disabled" id="prev-btn" aria-label="Previous page">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
          
          <!-- Page Numbers -->
          <div class="ease-page-numbers">
            <!-- The Animated Highlight Pill -->
            <div class="ease-page-highlight" id="page-highlight"></div>
            
            <button class="ease-page-num active" aria-current="page">1</button>
            <button class="ease-page-num">2</button>
            <button class="ease-page-num">3</button>
            <button class="ease-page-num">4</button>
            <button class="ease-page-num">5</button>
          </div>
          
          <!-- Next Button -->
          <button class="ease-page-btn" id="next-btn" aria-label="Next page">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>

        </nav>

      </section>
    </main>
  </div>

  <script>
    const numbers = document.querySelectorAll('.ease-page-num');
    const highlight = document.getElementById('page-highlight');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    // Function to handle the animation and active states
    function activatePage(selectedBtn) {
      // 1. Remove active class from all buttons
      numbers.forEach(n => n.classList.remove('active', 'ease-no-hover'));
      
      // 2. Add active to the clicked button
      selectedBtn.classList.add('active');
      
      // 3. Move the highlight circle!
      // We subtract 4px because the container has 4px padding
      const offset = selectedBtn.offsetLeft - 4;
      highlight.style.transform = `translateX(${offset}px)`;

      // 4. Handle Disabled States for Prev/Next
      const index = Array.from(numbers).indexOf(selectedBtn);
      
      if (index === 0) prevBtn.classList.add('disabled');
      else prevBtn.classList.remove('disabled');
      
      if (index === numbers.length - 1) nextBtn.classList.add('disabled');
      else nextBtn.classList.remove('disabled');
    }

    // Attach click listeners to numbers
    numbers.forEach(btn => {
      btn.addEventListener('click', () => activatePage(btn));
    });

    // Attach click listeners to Prev/Next buttons
    prevBtn.addEventListener('click', () => {
      const activeIndex = Array.from(numbers).findIndex(n => n.classList.contains('active'));
      if (activeIndex > 0) activatePage(numbers[activeIndex - 1]);
    });

    nextBtn.addEventListener('click', () => {
      const activeIndex = Array.from(numbers).findIndex(n => n.classList.contains('active'));
      if (activeIndex < numbers.length - 1) activatePage(numbers[activeIndex + 1]);
    });
  </script>
</body>
</html>
