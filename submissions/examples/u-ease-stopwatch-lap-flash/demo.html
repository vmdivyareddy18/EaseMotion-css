<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch Lap Flash</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stopwatch-container">

    <h2>Lap Times</h2>

    <div class="lap-list">

        <div class="lap-item">
            <span>Lap 1</span>
            <span>00:18.42</span>
        </div>

        <div class="lap-item">
            <span>Lap 2</span>
            <span>00:36.91</span>
        </div>

        <div class="lap-item new-lap">
            <span>Lap 3</span>
            <span>00:55.27</span>
        </div>

    </div>

</div>

</body>
</html>
