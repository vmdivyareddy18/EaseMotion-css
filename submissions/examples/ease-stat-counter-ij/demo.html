<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stat Counter | EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="sc-wrapper">
    <h1>Stat Counter</h1>
    <p class="sc-subtitle">Scroll down to trigger the count-up</p>
    <div class="sc-spacer"></div>
    <div class="sc-grid" id="counterGrid">
      <div class="sc-stat">
        <span class="sc-number" data-target="1247" data-decimal="0">0</span>
        <span class="sc-label">Active Users</span>
      </div>
      <div class="sc-stat">
        <span class="sc-number" data-target="98.5" data-decimal="1">0</span>
        <span class="sc-label">Uptime %</span>
      </div>
      <div class="sc-stat">
        <span class="sc-number" data-target="36400" data-decimal="0" data-comma="true">0</span>
        <span class="sc-label">Lines of Code</span>
      </div>
      <div class="sc-stat">
        <span class="sc-number" data-target="12" data-decimal="0">0</span>
        <span class="sc-label">Countries</span>
      </div>
    </div>
    <div class="sc-spacer"></div>
  </div>
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.querySelectorAll('.sc-number').forEach(animateNumber);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    const grid = document.getElementById('counterGrid');
    observer.observe(grid);

    function animateNumber(el) {
      const target = parseFloat(el.dataset.target);
      const decimals = parseInt(el.dataset.decimal) || 0;
      const useComma = el.dataset.comma === 'true';
      const duration = 2000;
      const start = performance.now();

      function tick(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = eased * target;

        el.textContent = formatNumber(current, decimals, useComma);
        if (progress < 1) requestAnimationFrame(tick);
        else el.textContent = formatNumber(target, decimals, useComma);
      }
      requestAnimationFrame(tick);
    }

    function formatNumber(value, decimals, comma) {
      let fixed = value.toFixed(decimals);
      if (comma) {
        const parts = fixed.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        fixed = parts.join('.');
      }
      return fixed;
    }

    document.querySelectorAll('.sc-number').forEach((el) => {
      el.textContent = formatNumber(0, parseInt(el.dataset.decimal) || 0, el.dataset.comma === 'true');
    });
  </script>
</body>
</html>
