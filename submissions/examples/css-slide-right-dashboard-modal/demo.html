<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Slide-Right Panel - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="logo">DASH_BOARD</div>
      <nav class="nav-links">
        <div class="nav-item active">Overview</div>
        <div class="nav-item">Analytics</div>
        <div class="nav-item">System Logs</div>
      </nav>
    </aside>

    <main class="main-viewport">
      <header class="top-bar">
        <h2>ANALYTICS_OVERVIEW</h2>
        <a href="#dash-modal" class="btn-action-panel" role="button">
          + VIEW_FILTERS
        </a>
      </header>

      <section class="metrics-grid">
        <div class="metric-card"><h4>ACTIVE_SESSIONS</h4><p class="stat">1,402</p></div>
        <div class="metric-card"><h4>CPU_LOAD</h4><p class="stat">24.2%</p></div>
        <div class="metric-card"><h4>NET_THROUGHPUT</h4><p class="stat">89.4 Mb/s</p></div>
      </section>
    </main>
  </div>

  <div id="dash-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-heading">
    <a href="#" class="modal-backdrop-close" aria-label="Dismiss panel" tabindex="-1"></a>
    
    <div class="modal-drawer">
      <div class="modal-header">
        <h3 id="modal-heading">FILTER_CONFIG_PANEL</h3>
        <a href="#" class="btn-close" aria-label="Close configuration panel">&times;</a>
      </div>
      
      <div class="modal-body">
        <p class="panel-meta">Adjust dynamic data ingestion dimensions:</p>
        
        <div class="form-group">
          <label>DATA_STREAM_RANGE</label>
          <select class="dash-input">
            <option>Last 15 Minutes</option>
            <option>Last 24 Hours</option>
            <option>Last 7 Days</option>
          </select>
        </div>

        <div class="form-group">
          <label>REFRESH_RATE</label>
          <select class="dash-input">
            <option>Real-time (Stream)</option>
            <option>Every 5 Seconds</option>
            <option>Manual Only</option>
          </select>
        </div>
      </div>
      
      <div class="modal-footer">
        <a href="#" class="btn-secondary">RESET</a>
        <a href="#" class="btn-primary">APPLY_CHANGES</a>
      </div>
    </div>
  </div>

</body>
</html>
