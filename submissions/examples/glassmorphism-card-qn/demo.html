<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Colorful background to show off the blur effect -->
    <div class="background-qn"></div>

    <!-- The Glass Card -->
    <div class="glass-card-qn">
        <div class="card-avatar-qn"></div>
        <h2 class="card-title-qn">Jane Doe</h2>
        <p class="card-role-qn">Senior UI/UX Designer</p>
        <p class="card-desc-qn">Creating beautiful, intuitive, and accessible digital experiences for the modern web.</p>
        <button class="card-btn-qn">View Profile</button>
    </div>
</body>
</html>
