<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation Direction Utilities Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #f0f0f0; }
    h1 { margin-bottom: 1.5rem; }
    @keyframes slide {
      from { transform: translateX(0); opacity: 0.4; }
      to { transform: translateX(80px); opacity: 1; }
    }
    .box {
      width: 80px; height: 80px;
      background: #4f46e5;
      color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; text-align: center;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      animation: slide 1s ease infinite;
    }
    label { font-size: 0.85rem; color: #555; display: block; margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <h1>Animation Direction Utilities</h1>
  <div>
    <label>dir-normal — plays forward each cycle</label>
    <div class="box dir-normal">normal</div>
  </div>
  <div>
    <label>dir-reverse — plays backward each cycle</label>
    <div class="box dir-reverse">reverse</div>
  </div>
  <div>
    <label>dir-alternate — alternates forward then backward</label>
    <div class="box dir-alternate">alternate</div>
  </div>
  <div>
    <label>dir-alternate-reverse — alternates backward then forward</label>
    <div class="box dir-alternate-reverse">alt-rev</div>
  </div>
</body>
</html>
