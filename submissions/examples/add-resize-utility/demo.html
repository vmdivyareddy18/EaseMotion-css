<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resize Utility Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="demo-section">
    <h2>Resize Utility Demo</h2>

    <div class="demo-grid">
      <div class="demo-card">
        <h3>Resize Both</h3>
        <textarea class="resize" rows="4">Drag the bottom-right corner to resize both width and height.
        </textarea>
      </div>

      <div class="demo-card">
        <h3>Resize Horizontal</h3>
        <textarea class="resize-x" rows="4">Drag horizontally.
        </textarea>
      </div>

      <div class="demo-card">
        <h3>Resize Vertical</h3>
        <textarea class="resize-y" rows="4">Drag vertically.
        </textarea>
      </div>

      <div class="demo-card">
        <h3>No Resize</h3>
        <textarea class="resize-none" rows="4">Resizing is disabled.
        </textarea>
      </div>
    </div>
  </section>

</body>
</html>
