<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Product Catalog Shimmer Modal</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<label for="modal" class="btn">Quick View</label>

<input type="checkbox" id="modal">

<label class="overlay" for="modal"></label>

<div class="modal">

<div class="shimmer"></div>

<label class="close" for="modal">&times;</label>

<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" alt="Product">

<h2>Running Sneakers</h2>

<div class="rating">★★★★★</div>

<p class="price">$89.99</p>

<p>
Comfortable lightweight sneakers perfect for daily wear with breathable mesh fabric.
</p>

<div class="buttons">
<button>Add to Cart</button>
<button class="secondary">Wishlist</button>
</div>

</div>

</body>
</html>
