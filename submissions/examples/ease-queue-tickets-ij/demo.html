<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Queue Tickets - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Queue Tickets</h1>
    <p class="subtitle">Click the button to add tickets that slide into the queue</p>
    <div class="queue-list" id="queueList">
      <div class="ticket" style="animation-delay: 0s;">
        <span class="ticket-number">#1</span>
        <span class="ticket-name">Alice Johnson</span>
        <span class="ticket-status">Waiting</span>
      </div>
      <div class="ticket" style="animation-delay: 0.1s;">
        <span class="ticket-number">#2</span>
        <span class="ticket-name">Bob Smith</span>
        <span class="ticket-status">Waiting</span>
      </div>
    </div>
    <button class="btn-add" id="btnAdd">Add Ticket</button>
  </section>

  <div class="controls">
    <div class="control-group">
      <label for="ticketBg">Ticket BG</label>
      <input type="color" id="ticketBg" value="#2d2d44">
    </div>
    <div class="control-group">
      <label for="stripeColor">Stripe</label>
      <input type="color" id="stripeColor" value="#4ecdc4">
    </div>
    <div class="control-group">
      <label for="slideDuration">Duration: <span id="slideDurationVal">0.4</span>s</label>
      <input type="range" id="slideDuration" min="0.1" max="1" step="0.05" value="0.4">
    </div>
  </div>

  <script>
    let ticketCount = 2;
    const names = ['Carol Davis', 'Dave Wilson', 'Eve Martin', 'Frank Lee', 'Grace Kim', 'Henry Brown', 'Ivy Chen', 'Jack Taylor'];

    document.getElementById('btnAdd').addEventListener('click', function() {
      ticketCount++;
      const name = names[(ticketCount - 3) % names.length];
      const list = document.getElementById('queueList');
      const ticket = document.createElement('div');
      ticket.className = 'ticket';
      ticket.innerHTML = '<span class="ticket-number">#' + ticketCount + '</span><span class="ticket-name">' + name + '</span><span class="ticket-status">Waiting</span>';
      list.appendChild(ticket);
      if (ticketCount >= 10) {
        document.getElementById('btnAdd').disabled = true;
      }
    });

    document.getElementById('ticketBg').addEventListener('input', function() {
      document.documentElement.style.setProperty('--ticket-bg', this.value);
    });
    document.getElementById('stripeColor').addEventListener('input', function() {
      document.documentElement.style.setProperty('--stripe-color', this.value);
    });
    document.getElementById('slideDuration').addEventListener('input', function() {
      document.documentElement.style.setProperty('--slide-duration', this.value + 's');
      document.getElementById('slideDurationVal').textContent = this.value;
    });
  </script>
</body>
</html>
