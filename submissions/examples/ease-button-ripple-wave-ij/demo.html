<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Ripple Wave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Button Ripple Wave</h1>

  <div class="button-group">
    <button class="ripple-btn" data-color="#6C63FF" data-bg="#6C63FF" data-text="#fff">Primary</button>
    <button class="ripple-btn" data-color="#e74c3c" data-bg="#e74c3c" data-text="#fff">Danger</button>
    <button class="ripple-btn" data-color="#2ecc71" data-bg="#2ecc71" data-text="#fff">Success</button>
    <button class="ripple-btn" data-color="#f39c12" data-bg="#f39c12" data-text="#fff">Warning</button>
    <button class="ripple-btn" data-color="#3498db" data-bg="#3498db" data-text="#fff">Info</button>
  </div>

  <div class="button-group">
    <button class="ripple-btn btn-lg" data-color="#6C63FF" data-bg="#6C63FF" data-text="#fff">Large</button>
    <button class="ripple-btn btn-sm" data-color="#6C63FF" data-bg="#6C63FF" data-text="#fff">Small</button>
    <button class="ripple-btn" data-color="#6C63FF" data-bg="transparent" data-text="#6C63FF"
      style="--btn-border-radius: 0;">Square</button>
    <button class="ripple-btn" data-color="#6C63FF" data-bg="#6C63FF" data-text="#fff"
      style="--btn-border-radius: 50px;">Pill</button>
  </div>

  <script>
    document.querySelectorAll('.ripple-btn').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const existing = this.querySelector('.ripple');
        if (existing) existing.remove();

        const rect = this.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);

        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
        ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';

        const color = this.dataset.color || '#6C63FF';
        const opacity = this.dataset.opacity || '0.4';
        ripple.style.background = `radial-gradient(circle, ${color} 0%, transparent 70%)`;
        ripple.style.setProperty('--ripple-opacity', opacity);

        this.appendChild(ripple);

        ripple.addEventListener('animationend', () => ripple.remove());
      });
    });
  </script>
</body>
</html>
