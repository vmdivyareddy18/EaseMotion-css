<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Home Control Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="smart-home">
    <header class="header">
      <div>
        <span class="badge">IoT Connected Hub</span>
        <h1>Smart Control Center</h1>
      </div>
      <div class="temp-indicator">
        <span>Internal Temp</span>
        <h3>22.4 °C</h3>
      </div>
    </header>

    <section class="device-grid">
      <div class="card device-card active">
        <div class="card-header">
          <h3>Living Room Light</h3>
          <span class="toggle-indicator">ON</span>
        </div>
        <p>Intensity: 80%</p>
      </div>

      <div class="card device-card">
        <div class="card-header">
          <h3>Air Conditioner</h3>
          <span class="toggle-indicator">OFF</span>
        </div>
        <p>Target: 21 °C</p>
      </div>
    </section>
  </main>
</body>
</html>
