<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitness Tracker — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div class="ease-fitness-viewport">
    
    <div class="ease-progress-row">
      <div class="ease-ring-container">
        <svg class="ease-progress-ring-svg">
          <circle class="ease-ring-bg" cx="35" cy="35" r="30" />
          <circle class="ease-ring-indicator" id="progressRing" cx="35" cy="35" r="30" />
        </svg>
        <span class="ease-ring-text" id="progressPct">0%</span>
      </div>
      <div class="ease-progress-meta">
        <h3 class="ease-progress-headline">Daily Routine</h3>
        <p class="ease-progress-sub" id="progressCount">0 of 3 exercises completed</p>
      </div>
    </div>

    <div class="ease-timer-module">
      <p class="ease-timer-label">Rest Interval</p>
      <h2 class="ease-timer-clock" id="timerClock">01:30</h2>
      <div class="ease-timer-controls">
        <button class="ease-btn-timer" id="timerToggleBtn" onclick="toggleTimer()">Start</button>
        <button class="ease-btn-timer" onclick="resetTimer()">Reset</button>
      </div>
    </div>

    <div class="ease-exercise-stack">
      
      <div class="ease-exercise-card" id="exe1">
        <div class="ease-exe-details">
          <h4 class="ease-exe-name">Barbell Back Squat</h4>
          <p class="ease-exe-meta">4 Sets &bull; 10 Reps</p>
        </div>
        <button class="ease-btn-check" onclick="toggleExercise('exe1')">✓</button>
      </div>

      <div class="ease-exercise-card" id="exe2">
        <div class="ease-exe-details">
          <h4 class="ease-exe-name">Incline Dumbbell Press</h4>
          <p class="ease-exe-meta">3 Sets &bull; 12 Reps</p>
        </div>
        <button class="ease-btn-check" onclick="toggleExercise('exe2')">✓</button>
      </div>

      <div class="ease-exercise-card" id="exe3">
        <div class="ease-exe-details">
          <h4 class="ease-exe-name">Hanging Knee Raises</h4>
          <p class="ease-exe-meta">3 Sets &bull; 15 Reps</p>
        </div>
        <button class="ease-btn-check" onclick="toggleExercise('exe3')">✓</button>
      </div>

    </div>

  </div>

  <script>
    // Progress Ring Calculation Logic
    // Radius = 30 -> Circumference = 2 * PI * 30 ≈ 188.4
    const ringCircumference = 188.4;
    const progressRing = document.getElementById('progressRing');
    const progressPct = document.getElementById('progressPct');
    const progressCount = document.getElementById('progressCount');

    function updateProgress() {
      const total = document.querySelectorAll('.ease-exercise-card').length;
      const completed = document.querySelectorAll('.ease-exercise-card.is-completed').length;
      
      const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
      const offset = ringCircumference - (percentage / 100) * ringCircumference;
      
      progressRing.style.strokeDashoffset = offset;
      progressPct.textContent = `${percentage}%`;
      progressCount.textContent = `${completed} of ${total} exercises completed`;
    }

    function toggleExercise(id) {
      const card = document.getElementById(id);
      card.classList.toggle('is-completed');
      updateProgress();
    }

    // Precise Interval Timer Script Routing
    let timerInterval = null;
    let timeRemaining = 90; // 1 minute 30 seconds
    const timerClock = document.getElementById('timerClock');
    const toggleBtn = document.getElementById('timerToggleBtn');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
      const secs = (seconds % 60).toString().padStart(2, '0');
      return `${mins}:${secs}`;
    }

    function toggleTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
        toggleBtn.textContent = 'Start';
        toggleBtn.classList.remove('is-running');
      } else {
        toggleBtn.textContent = 'Pause';
        toggleBtn.classList.add('is-running');
        timerInterval = setInterval(() => {
          if (timeRemaining > 0) {
            timeRemaining--;
            timerClock.textContent = formatTime(timeRemaining);
          } else {
            clearInterval(timerInterval);
            timerInterval = null;
            toggleBtn.textContent = 'Start';
            toggleBtn.classList.remove('is-running');
            alert('Rest period ended! Prepare for your next active set.');
          }
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      timerInterval = null;
      timeRemaining = 90;
      timerClock.textContent = formatTime(timeRemaining);
      toggleBtn.textContent = 'Start';
      toggleBtn.classList.remove('is-running');
    }

    // Initialize display baseline properties
    updateProgress();
  </script>
</body>
</html>
