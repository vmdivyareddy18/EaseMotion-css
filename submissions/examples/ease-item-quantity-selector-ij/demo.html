<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Quantity Selector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-section">
    <h1>Quantity Selector</h1>

    <div class="product-row">
      <span class="product-label">Premium Widget</span>
      <span class="product-price">$19.99</span>
      <div class="quantity-selector" data-min="0" data-max="10" data-value="0">
        <button class="qty-btn qty-minus" aria-label="Decrease quantity" disabled>&minus;</button>
        <div class="qty-display" aria-live="polite" aria-label="Quantity">
          <span class="qty-number active">0</span>
        </div>
        <button class="qty-btn qty-plus" aria-label="Increase quantity">+</button>
      </div>
    </div>

    <div class="product-row">
      <span class="product-label">Deluxe Gadget</span>
      <span class="product-price">$34.99</span>
      <div class="quantity-selector" data-min="0" data-max="10" data-value="2">
        <button class="qty-btn qty-minus" aria-label="Decrease quantity">&minus;</button>
        <div class="qty-display" aria-live="polite" aria-label="Quantity">
          <span class="qty-number active">2</span>
        </div>
        <button class="qty-btn qty-plus" aria-label="Increase quantity">+</button>
      </div>
    </div>

    <div class="product-row">
      <span class="product-label">Super Doohickey</span>
      <span class="product-price">$49.99</span>
      <div class="quantity-selector" data-min="0" data-max="10" data-value="5">
        <button class="qty-btn qty-minus" aria-label="Decrease quantity">&minus;</button>
        <div class="qty-display" aria-live="polite" aria-label="Quantity">
          <span class="qty-number active">5</span>
        </div>
        <button class="qty-btn qty-plus" aria-label="Increase quantity">+</button>
      </div>
    </div>

    <p class="description">Use the + and - buttons to adjust quantity. The number animates with a slide transition. Min: 0, Max: 10.</p>
  </div>

  <script>
    document.querySelectorAll(".quantity-selector").forEach((selector) => {
      const minusBtn = selector.querySelector(".qty-minus");
      const plusBtn = selector.querySelector(".qty-plus");
      const display = selector.querySelector(".qty-display");
      const numberEl = display.querySelector(".qty-number");

      let value = parseInt(selector.dataset.value) || 0;
      const min = parseInt(selector.dataset.min) || 0;
      const max = parseInt(selector.dataset.max) || 99;

      function createNumber(text, slideClass) {
        const el = document.createElement("span");
        el.className = "qty-number " + slideClass;
        el.textContent = text;
        display.appendChild(el);
        requestAnimationFrame(() => {
          el.classList.remove(slideClass);
          el.classList.add("active");
        });
        setTimeout(() => {
          display.querySelectorAll(".qty-number").forEach((n) => {
            if (n !== el) n.remove();
          });
        }, 300);
      }

      function updateDisplay(oldValue, newValue) {
        const goingUp = newValue > oldValue;
        const slideClass = goingUp ? "slide-up" : "slide-down";

        numberEl.classList.remove("active");
        numberEl.classList.add(slideClass);

        setTimeout(() => {
          createNumber(newValue, goingUp ? "slide-down" : "slide-up");
        }, 50);
      }

      function updateButtons() {
        minusBtn.disabled = value <= min;
        plusBtn.disabled = value >= max;
      }

      function changeValue(delta) {
        const oldValue = value;
        const newValue = Math.min(max, Math.max(min, value + delta));
        if (newValue === value) return;

        value = newValue;
        updateDisplay(oldValue, value);
        updateButtons();
      }

      minusBtn.addEventListener("click", () => changeValue(-1));
      plusBtn.addEventListener("click", () => changeValue(1));

      updateButtons();
    });
  </script>
</body>
</html>
