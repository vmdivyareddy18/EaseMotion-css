<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Offline Banner - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Admin Dashboard Simulator Wrapper -->
  <div class="dashboard-container">
    <aside class="sidebar-skeleton"></aside>
    
    <main class="main-content-skeleton">
      <header class="topbar-skeleton">
        <div class="user-profile"></div>
      </header>
      
      <!-- Interactive Network Toggle Layer (For Simulation Only) -->
      <div class="simulation-controls">
        <label class="switch">
          <input type="checkbox" id="network-toggle">
          <span class="slider round"></span>
        </label>
        <span class="control-label">Simulate Network Disconnection</span>
      </div>

      <!-- ─── PURE CSS FLIP OFFLINE BANNER COMPONENT ─── -->
      <div class="banner-perspective-wrapper">
        <div class="banner-card" id="status-banner">
          
          <!-- Front Face: Connected State -->
          <div class="banner-face face-front">
            <div class="status-indicator online"></div>
            <span class="banner-message">Sync Engine Operational: Cloud database connections fully live.</span>
          </div>

          <!-- Back Face: Offline State -->
          <div class="banner-face face-back">
            <div class="status-indicator offline"></div>
            <span class="banner-message">Connection Lost: Running in offline storage mode. Retrying sync...</span>
          </div>

        </div>
      </div>
      
    </main>
  </div>

  <script>
    // Simple state toggle bound directly to the checkbox helper for visual review
    const toggle = document.getElementById('network-toggle');
    const banner = document.getElementById('status-banner');
    
    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        banner.classList.add('is-offline');
      } else {
        banner.classList.remove('is-offline');
      }
    });
  </script>
</body>
</html>
