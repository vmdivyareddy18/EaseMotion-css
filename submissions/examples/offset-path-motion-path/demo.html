<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offset Path Motion Path</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Offset Path (Motion Path)</h1>
    <p class="subtitle">Elements moving along defined geometric paths using offset-path.</p>

    <section class="demo-section">
      <h2>Circle Path</h2>
      <div class="stage circle-stage">
        <div class="path-marker circle-marker"></div>
        <div class="mover circle-mover"></div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Polygon Path</h2>
      <div class="stage polygon-stage">
        <div class="mover polygon-mover"></div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Custom Path (Path)</h2>
      <div class="stage path-stage">
        <div class="mover custom-mover"></div>
      </div>
    </section>

    <section class="demo-section">
      <h2>Racing Track (Straight vs Curved)</h2>
      <div class="race-track">
        <div class="race-lane">
          <span class="race-label">Straight</span>
          <div class="lane-bar"><div class="racer straight-racer"></div></div>
        </div>
        <div class="race-lane">
          <span class="race-label">Curved</span>
          <div class="lane-bar curved-lane"><div class="racer curved-racer"></div></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
