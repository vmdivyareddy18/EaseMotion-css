<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Progress Bar - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="spb-bar" id="spbBar" style="--spb-pct: 0;"></div>
  <div class="demo-wrapper" id="spbContent">
    <h1>Scroll Down</h1>
    <p>Progress bar at top fills as you scroll.</p>
    <div style="height: 800px;"></div>
    <p>You reached the bottom!</p>
    <div style="height: 400px;"></div>
  </div>
  <script>
    var bar = document.getElementById('spbBar');
    var content = document.getElementById('spbContent');
    window.addEventListener('scroll', function() {
      var scrollTop = window.scrollY;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      bar.style.setProperty('--spb-pct', pct);
    });
  </script>
</body>
</html>
