<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Risk Matrix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="matrix-shell" aria-labelledby="matrix-title">
    <section class="matrix-panel">
      <div class="copy">
        <p class="eyebrow">release review</p>
        <h1 id="matrix-title">Release risk matrix</h1>
        <p>Risk cells animate into a launch matrix so teams can compare impact, confidence, and mitigation readiness.</p>
      </div>

      <div class="matrix" aria-label="Release risk matrix">
        <span class="axis axis-y">Impact</span>
        <span class="axis axis-x">Confidence</span>
        <article class="cell low">Docs</article>
        <article class="cell medium">API</article>
        <article class="cell high">Billing</article>
        <article class="cell medium">Search</article>
      </div>
    </section>
  </main>
</body>
</html>
