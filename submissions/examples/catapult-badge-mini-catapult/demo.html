<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Notification System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="minimal-viewport">
    <div class="notification-interaction-hub">
      
      <!-- Sibling checkbox trigger to handle the click-based pullback and launch sequence natively -->
      <input type="checkbox" id="badge-launch-toggle" class="hidden-state-checkbox">
      
      <div class="interactive-surface-frame">
        <label for="badge-launch-toggle" class="trigger-surface-button" tabindex="0">
          <svg class="bell-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <span class="action-caption">Refresh Notifications</span>
        </label>

        <!-- Dynamic catapult notification badge -->
        <span class="catapult-alert-badge">4</span>
      </div>

    </div>
  </main>

  <script>
    // Accessibility controller mapping keyboard engagement triggers to the input label hook
    const interactiveLabel = document.querySelector('.trigger-surface-button');
    interactiveLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(interactiveLabel.getAttribute('for')).click();
      }
    });
  </script>
</body>
</html>
