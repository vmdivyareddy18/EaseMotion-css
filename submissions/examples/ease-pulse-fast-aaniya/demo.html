<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-pulse-fast Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin: 0; }
    h2 { font-size: 0.95rem; color: #94a3b8; margin: 0 0 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .demo-row {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .alert-box {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }
    .badge {
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: bold;
    }
    .badge-red   { background: #ef4444; color: white; }
    .badge-amber { background: #f59e0b; color: white; }
    .badge-green { background: #22c55e; color: white; }
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>ease-pulse-fast</h1>

  <!-- Opacity pulse -->
  <div class="demo-section">
    <h2>Opacity Pulse (default)</h2>
    <div class="demo-row">
      <span class="badge badge-red ease-pulse-fast ease-pulse-fast-red">CRITICAL</span>
      <span class="badge badge-amber ease-pulse-fast ease-pulse-fast-amber">WARNING</span>
      <span class="badge badge-green ease-pulse-fast ease-pulse-fast-green">LIVE</span>
    </div>
  </div>

  <!-- Dot indicators -->
  <div class="demo-section">
    <h2>Dot Indicators</h2>
    <div class="demo-row">
      <div class="alert-box">
        <span class="ease-pulse-fast-dot ease-pulse-fast-red"></span>
        Critical Alert
      </div>
      <div class="alert-box">
        <span class="ease-pulse-fast-dot ease-pulse-fast-amber"></span>
        Warning
      </div>
      <div class="alert-box">
        <span class="ease-pulse-fast-dot ease-pulse-fast-green"></span>
        Live
      </div>
    </div>
  </div>

  <!-- Scale pulse -->
  <div class="demo-section">
    <h2>Scale Pulse</h2>
    <div class="demo-row">
      <button class="btn badge-red ease-pulse-fast-scale ease-pulse-fast-red">⚠ Urgent Action</button>
    </div>
  </div>

  <!-- Glow pulse -->
  <div class="demo-section">
    <h2>Glow Pulse</h2>
    <div class="demo-row">
      <button class="btn badge-red ease-pulse-fast-glow ease-pulse-fast-red">🔴 Alert</button>
      <button class="btn badge-amber ease-pulse-fast-glow ease-pulse-fast-amber">⚠ Warning</button>
    </div>
  </div>

</body>
</html>
