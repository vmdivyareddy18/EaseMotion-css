<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Indicator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Stock Indicator</h1>

    <div class="stock-card">
      <div class="stock-icon">
        <div class="stock-dot low"></div>
        <div class="stock-ring"></div>
      </div>
      <div class="stock-details">
        <span class="stock-label">Only 3 left</span>
        <span class="stock-sub">Low stock</span>
      </div>
    </div>

    <div class="variant-row">
      <div class="stock-card sm">
        <div class="stock-icon">
          <div class="stock-dot in-stock"></div>
          <div class="stock-ring in-stock"></div>
        </div>
        <div class="stock-details">
          <span class="stock-label">In Stock</span>
          <span class="stock-sub">Available</span>
        </div>
      </div>
      <div class="stock-card sm">
        <div class="stock-icon">
          <div class="stock-dot oos"></div>
          <div class="stock-ring oos"></div>
        </div>
        <div class="stock-details">
          <span class="stock-label">Out of Stock</span>
          <span class="stock-sub">Unavailable</span>
        </div>
      </div>
    </div>

    <p class="description">The low-stock dot pulses red with an expanding ring. In-stock shows solid green and out-of-stock shows gray with no animation.</p>
  </div>
</body>
</html>
