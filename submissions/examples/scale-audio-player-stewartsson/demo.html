<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Scale Audio Player Component Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="admin-container">
        <!-- Interactive Micro-Frontend Audio Node Wrapper Box -->
        <div class="audio-player-card">
            <header class="player-header">
                <span class="system-badge">System Audio Feed</span>
                <h3 class="track-title">Audit_Log_Replication_Sync.wav</h3>
                <p class="track-subtitle">Core Infrastructure Main Node Ledger Logs</p>
            </header>

            <!-- Pure CSS Dynamic Scaling Visualizer Bar Stream -->
            <div class="visualizer-container">
                <div class="bar ease-scale-pulse-1"></div>
                <div class="bar ease-scale-pulse-2"></div>
                <div class="bar ease-scale-pulse-3"></div>
                <div class="bar ease-scale-pulse-4"></div>
                <div class="bar ease-scale-pulse-5"></div>
                <div class="bar ease-scale-pulse-4"></div>
                <div class="bar ease-scale-pulse-3"></div>
                <div class="bar ease-scale-pulse-2"></div>
                <div class="bar ease-scale-pulse-1"></div>
            </div>

            <!-- Custom Core Playback Control Matrix Interface Shell -->
            <div class="player-controls-row">
                <!-- Pure-CSS Functional Play/Pause Trigger Gate -->
                <input type="checkbox" id="playback-trigger-gate" class="playback-input-gate">
                
                <!-- Tactile Scaling Play Button Shell Selector Label -->
                <label for="playback-trigger-gate" class="control-trigger-btn">
                    <span class="icon-play-vector"></span>
                    <span class="icon-pause-vector"></span>
                </label>

                <!-- Audio Track Timeline Progress Line Slider Layout Grid -->
                <div class="timeline-container">
                    <div class="time-elapsed">02:14</div>
                    <div class="progress-bar-track">
                        <div class="progress-fill-line"></div>
                        <div class="progress-scrub-handle"></div>
                    </div>
                    <div class="time-total">04:24</div>
                </div>
            </div>

            <footer class="player-footer">
                <div class="stream-encryption-badge">
                    <span class="secure-dot"></span>
                    <span class="secure-label">256-bit SHA Stream Verified</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
