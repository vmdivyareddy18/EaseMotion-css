<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-hamburger-to-cross-morph – CSS‑Only Hamburger to Cross</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Hamburger → Cross Morph</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the icon to toggle between the menu and close states – pure CSS.</p>

    <!-- Hamburger / Cross toggle (CSS‑only via checkbox) -->
    <label class="hamburger-toggle" for="menu-checkbox">
      <input type="checkbox" id="menu-checkbox" class="sr-only" />
      <span class="bar bar-top"></span>
      <span class="bar bar-middle"></span>
      <span class="bar bar-bottom"></span>
    </label>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">Uses hidden checkbox + <code>transform</code> transitions on three lines.</p>
  </div>

</body>
</html>
