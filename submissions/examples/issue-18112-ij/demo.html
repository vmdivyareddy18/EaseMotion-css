<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Number Countup</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="countup-wrapper">
    <div class="countup-number" id="countDisplay">0</div>
    <p class="countup-label">LINES OF CODE</p>
    <div class="controls">
      <button id="playBtn">Play</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
</div>
<script>
const display = document.getElementById('countDisplay');
const target = 9876;
const duration = 2000;
let animId = null;
function animateCount(startTime) {
  const elapsed = Date.now() - startTime;
  const progress = Math.min(elapsed / duration, 1);
  const eased = 1 - Math.pow(1 - progress, 3);
  const current = Math.floor(eased * target);
  display.textContent = current.toLocaleString();
  if (progress < 1) animId = requestAnimationFrame(() => animateCount(startTime));
  else display.textContent = target.toLocaleString();
}
document.getElementById('playBtn').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  display.textContent = '0';
  animateCount(Date.now());
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (animId) cancelAnimationFrame(animId);
  display.textContent = '0';
});
</script>
</body>
</html>
