<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glow Accordion - Responsive Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-layout">
        
        <header class="dashboard-header">
            <div class="header-content">
                <h1>Analytics Overview</h1>
                <div class="date-picker">Last 30 Days</div>
            </div>
        </header>

        <main class="dashboard-grid">
            
            <div class="neon-accordion">
                
                <!-- Section 1: Revenue -->
                <div class="accordion-item theme-blue">
                    <input type="radio" name="dashboard-accordion" id="panel-1" class="accordion-toggle" aria-hidden="true" checked>
                    
                    <label for="panel-1" class="accordion-trigger" tabindex="0">
                        <div class="trigger-info">
                            <span class="icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                            </span>
                            <span class="title">Total Revenue</span>
                        </div>
                        <div class="trigger-metric">
                            <span class="value">$124,500</span>
                            <span class="trend up">+14.2%</span>
                        </div>
                        <div class="glow-line"></div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="dashboard-panel">
                                <div class="metric-cards">
                                    <div class="card">
                                        <h4>MRR</h4>
                                        <p>$42,000</p>
                                    </div>
                                    <div class="card">
                                        <h4>ARR</h4>
                                        <p>$504,000</p>
                                    </div>
                                    <div class="card">
                                        <h4>Churn</h4>
                                        <p>1.2%</p>
                                    </div>
                                </div>
                                <div class="mock-chart">
                                    <!-- Pure CSS mock line chart -->
                                    <div class="bar" style="height: 30%"></div>
                                    <div class="bar" style="height: 50%"></div>
                                    <div class="bar" style="height: 40%"></div>
                                    <div class="bar" style="height: 70%"></div>
                                    <div class="bar" style="height: 60%"></div>
                                    <div class="bar" style="height: 90%"></div>
                                    <div class="bar" style="height: 100%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 2: Traffic -->
                <div class="accordion-item theme-purple">
                    <input type="radio" name="dashboard-accordion" id="panel-2" class="accordion-toggle" aria-hidden="true">
                    
                    <label for="panel-2" class="accordion-trigger" tabindex="0">
                        <div class="trigger-info">
                            <span class="icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                            </span>
                            <span class="title">Web Traffic</span>
                        </div>
                        <div class="trigger-metric">
                            <span class="value">842K</span>
                            <span class="trend up">+5.8%</span>
                        </div>
                        <div class="glow-line"></div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="dashboard-panel">
                                <div class="metric-cards">
                                    <div class="card">
                                        <h4>Unique</h4>
                                        <p>320K</p>
                                    </div>
                                    <div class="card">
                                        <h4>Bounce</h4>
                                        <p>42%</p>
                                    </div>
                                </div>
                                <div class="mock-chart">
                                    <div class="bar" style="height: 60%"></div>
                                    <div class="bar" style="height: 70%"></div>
                                    <div class="bar" style="height: 80%"></div>
                                    <div class="bar" style="height: 50%"></div>
                                    <div class="bar" style="height: 90%"></div>
                                    <div class="bar" style="height: 85%"></div>
                                    <div class="bar" style="height: 95%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 3: Performance -->
                <div class="accordion-item theme-orange">
                    <input type="radio" name="dashboard-accordion" id="panel-3" class="accordion-toggle" aria-hidden="true">
                    
                    <label for="panel-3" class="accordion-trigger" tabindex="0">
                        <div class="trigger-info">
                            <span class="icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                            </span>
                            <span class="title">System Performance</span>
                        </div>
                        <div class="trigger-metric">
                            <span class="value">99.9%</span>
                            <span class="trend neutral">0.0%</span>
                        </div>
                        <div class="glow-line"></div>
                    </label>

                    <div class="accordion-content">
                        <div class="content-inner">
                            <div class="dashboard-panel">
                                <div class="metric-cards">
                                    <div class="card">
                                        <h4>CPU Avg</h4>
                                        <p>24%</p>
                                    </div>
                                    <div class="card">
                                        <h4>Memory</h4>
                                        <p>16GB</p>
                                    </div>
                                </div>
                                <div class="mock-chart line-style">
                                    <div class="node" style="bottom: 20%; left: 0%"></div>
                                    <div class="node" style="bottom: 25%; left: 16%"></div>
                                    <div class="node" style="bottom: 22%; left: 32%"></div>
                                    <div class="node" style="bottom: 40%; left: 48%"></div>
                                    <div class="node" style="bottom: 35%; left: 64%"></div>
                                    <div class="node" style="bottom: 60%; left: 80%"></div>
                                    <div class="node" style="bottom: 55%; left: 96%"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
