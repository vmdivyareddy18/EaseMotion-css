<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Corporate Wave Loader — EaseMotion CSS</title>
    <!-- Load EaseMotion CSS via relative path -->
    <link rel="stylesheet" href="../../easemotion.css" />
    <!-- Load component specific styles -->
    <link rel="stylesheet" href="./style.css" />
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Hidden state controls for interactive pure-CSS states -->
    <input
      type="radio"
      id="state-ready"
      name="sync-state"
      checked
      class="state-control"
    />
    <input
      type="radio"
      id="state-loading"
      name="sync-state"
      class="state-control"
    />

    <div class="corporate-container">
      <div class="corporate-card">
        <!-- Card Header -->
        <div class="card-header">
          <div class="panel-info">
            <h3>Database Sync Panel</h3>
            <p>Global Operations Console</p>
          </div>
          <div class="status-indicator ready-indicator">
            <span class="status-dot"></span>
            Ready to Sync
          </div>
          <div class="status-indicator loading-indicator">
            <span class="status-dot pulsing"></span>
            Synchronizing...
          </div>
          <div class="status-indicator success-indicator">
            <span class="status-dot complete"></span>
            Sync Complete
          </div>
        </div>

        <!-- Sync Content Box -->
        <div class="sync-workspace">
          <!-- Ready State UI -->
          <div class="workspace-state state-ready-view">
            <div class="state-icon">
              <svg
                viewBox="0 0 24 24"
                width="48"
                height="48"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <path
                  d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"
                />
              </svg>
            </div>
            <h4>Financial Ledgers</h4>
            <p>
              Last updated: 4 hours ago. Start sync to fetch latest ledger
              transactions.
            </p>
          </div>

          <!-- Loading State UI (Wave Loader) -->
          <div class="workspace-state state-loading-view">
            <!-- Wave Loader Component -->
            <div class="wave-loader">
              <span
                class="wave-bar"
                style="--delay: 0.1s; --color: #2563eb"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.2s; --color: #3b82f6"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.3s; --color: #60a5fa"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.4s; --color: #93c5fd"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.5s; --color: #60a5fa"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.6s; --color: #3b82f6"
              ></span>
              <span
                class="wave-bar"
                style="--delay: 0.7s; --color: #2563eb"
              ></span>
            </div>

            <div class="sync-progress">
              <div class="progress-bar-track">
                <div class="progress-bar-fill"></div>
              </div>
              <div class="progress-labels">
                <span>Fetching ledger data</span>
                <span class="percent-counter"></span>
              </div>
            </div>
          </div>

          <!-- Success State UI -->
          <div class="workspace-state state-success-view">
            <div class="success-icon-wrapper">
              <svg
                viewBox="0 0 24 24"
                width="32"
                height="32"
                fill="none"
                stroke="currentColor"
                stroke-width="3"
              >
                <path d="M20 6L9 17l-5-5" />
              </svg>
            </div>
            <h4>Sync Successful</h4>
            <p>All database segments successfully synchronized and verified.</p>
          </div>
        </div>

        <!-- Action Panel Footer -->
        <div class="card-footer">
          <label for="state-loading" class="action-btn start-sync-btn">
            Initialize Sync
          </label>
          <label for="state-ready" class="action-btn cancel-sync-btn">
            Cancel & Reset
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
