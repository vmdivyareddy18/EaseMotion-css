<!DOCTYPE html>
<html lang="en">
<head>

  <title>Animated Custom Checkbox</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="check-list">

    </label>

    </label>
    <label class="check">
      <input type="checkbox" class="check-input" checked />

    </label>
  </div>
</body>
</html>
