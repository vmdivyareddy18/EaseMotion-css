<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Range Slider</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="slider-wrapper" role="region" aria-label="Interactive Pricing Slider">
    <div class="pricing-card">
      <header class="pricing-header">
        <h2>Choose Your Plan Size</h2>
        <p>Drag the slider to adjust computing capacity</p>
      </header>

      <div class="range-container">
        <!-- Floating Morphing Tooltip -->
        <div class="morph-tooltip" id="sliderTooltip">
          <div class="bubble-content">
            <span class="value" id="valDisplay">40</span><span>GB</span>
          </div>
          <div class="bubble-arrow"></div>
        </div>

        <input type="range" class="morph-slider" id="rangeInput" min="10" max="100" value="40" aria-label="Storage Capacity Select" aria-valuemin="10" aria-valuemax="100" aria-valuenow="40">
      </div>

      <div class="pricing-footer">
        <div class="tier-info">Estimated Cost: <strong id="costDisplay">$40/mo</strong></div>
      </div>
    </div>
  </main>

  <script>
    const slider = document.getElementById('rangeInput');
    const tooltip = document.getElementById('sliderTooltip');
    const valDisplay = document.getElementById('valDisplay');
    const costDisplay = document.getElementById('costDisplay');

    function updateTooltipPosition() {
      const val = slider.value;
      const min = slider.min ? slider.min : 0;
      const max = slider.max ? slider.max : 100;
      const percent = Number(((val - min) * 100) / (max - min));
      
      valDisplay.textContent = val;
      costDisplay.textContent = `$${val}/mo`;
      
      // Calculate offset based on current slider thumb width
      tooltip.style.left = `calc(${percent}% - 28px)`;
      slider.setAttribute('aria-valuenow', val);
    }

    slider.addEventListener('input', updateTooltipPosition);
    // Initialize positioning
    updateTooltipPosition();
  </script>
</body>
</html>
