<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPR Modal - Flash Variant</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="landing-viewport">
        <div class="flash-modal-overlay">
            <div class="flash-modal-box" role="dialog" aria-modal="true">
                <div class="flash-shimmer-layer"></div>
                <div class="modal-content-deck">
                    <div class="icon-shield-shield">
                        <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <div class="modal-text-stack">
                        <h2>Cookie & Privacy Settings</h2>
                        <p>We use essential cookies to optimize layout composition and ensure high-performance hardware rendering paths for all site components.</p>
                    </div>
                    <div class="modal-action-row">
                        <button class="btn-secondary">Manage</button>
                        <button class="btn-primary">Accept All</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
