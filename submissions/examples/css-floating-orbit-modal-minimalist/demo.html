<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Modal // Pure CSS Floating Orbit Showcase</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #020202;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body>

  <a href="#orbit-system-modal" class="ease-orbit-trigger-btn">
    EXECUTE_SYSTEMS_DIAGNOSTIC
  </a>

  <div id="orbit-system-modal" class="ease-orbit-modal-overlay" role="dialog" aria-labelledby="modal-title" aria-modal="true">
    <div class="ease-orbit-modal-box">

      <div class="ease-orbit-tracer-container" aria-hidden="true">
        <div class="ease-orbit-tracer-dot"></div>
      </div>

      <a href="#" class="ease-orbit-close-btn" aria-label="Dismiss Modal Content">&times;</a>

      <h2 id="modal-title" class="ease-orbit-title">SYS_TELEMETRY_LOCK</h2>
      <p class="ease-orbit-desc">
        Data arrays stabilized across terminal pipelines. Core parameters registered operating within high-performance margins with zero frame dropping.
      </p>

      <a href="#" class="ease-orbit-trigger-btn">TERMINATE_PROCESS</a>
    </div>
  </div>

</body>
</html>
