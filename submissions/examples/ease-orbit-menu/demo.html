<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Menu Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Orbit Menu</h1>
        <p class="subtitle">Circular menu with orbiting items</p>

        <!-- ORBIT MENU COMPONENT -->
        <div class="orbit-container">
            <div class="orbit-wrapper">
                <div class="orbit-display">
                    <!-- Menu Trigger -->
                    <button class="orbit-trigger" id="orbitTrigger" aria-label="Toggle orbit menu">
                        <span class="trigger-icon" id="triggerIcon">✦</span>
                        <span class="trigger-label">Menu</span>
                    </button>

                    <!-- Orbit Items -->
                    <div class="orbit-items" id="orbitItems">
                        <button class="orbit-item" data-index="0" data-angle="0">
                            <span class="item-icon">🏠</span>
                            <span class="item-label">Home</span>
                        </button>
                        <button class="orbit-item" data-index="1" data-angle="45">
                            <span class="item-icon">📊</span>
                            <span class="item-label">Analytics</span>
                        </button>
                        <button class="orbit-item" data-index="2" data-angle="90">
                            <span class="item-icon">⚙️</span>
                            <span class="item-label">Settings</span>
                        </button>
                        <button class="orbit-item" data-index="3" data-angle="135">
                            <span class="item-icon">👤</span>
                            <span class="item-label">Profile</span>
                        </button>
                        <button class="orbit-item" data-index="4" data-angle="180">
                            <span class="item-icon">📬</span>
                            <span class="item-label">Messages</span>
                        </button>
                        <button class="orbit-item" data-index="5" data-angle="225">
                            <span class="item-icon">🔔</span>
                            <span class="item-label">Notifications</span>
                        </button>
                        <button class="orbit-item" data-index="6" data-angle="270">
                            <span class="item-icon">❤️</span>
                            <span class="item-label">Favorites</span>
                        </button>
                        <button class="orbit-item" data-index="7" data-angle="315">
                            <span class="item-icon">🚪</span>
                            <span class="item-label">Logout</span>
                        </button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="orbit-controls">
                    <div class="control-group">
                        <label for="radiusSlider">Radius:</label>
                        <input type="range" id="radiusSlider" min="80" max="220" step="10" value="150" />
                        <span id="radiusValue">150px</span>
                    </div>
                    <div class="control-group">
                        <label for="speedSlider">Speed:</label>
                        <input type="range" id="speedSlider" min="0.5" max="4" step="0.1" value="1" />
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="control-group">
                        <label for="colorPicker">Color:</label>
                        <input type="color" id="colorPicker" value="#4facfe" />
                    </div>
                    <div class="control-group">
                        <label>
                            <input type="checkbox" id="autoRotate" checked />
                            Auto Rotate
                        </label>
                    </div>
                </div>

                <div class="orbit-actions">
                    <button class="orbit-ctrl-btn" id="toggleBtn">⏸ Toggle</button>
                    <button class="orbit-ctrl-btn" id="resetBtn">⟳ Reset</button>
                    <button class="orbit-ctrl-btn" id="randomColorBtn">🎲 Random</button>
                    <button class="orbit-ctrl-btn" id="directionBtn">🔄 Direction</button>
                </div>

                <div class="orbit-status">
                    <span class="status-label">State:</span>
                    <span class="status-value" id="stateDisplay">Closed</span>
                    <span class="status-label">Items:</span>
                    <span class="status-value" id="itemsDisplay">8</span>
                    <span class="status-label">Angle:</span>
                    <span class="status-value" id="angleDisplay">0°</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #4facfe, #00d2d3);">
                        <span>✦</span>
                    </div>
                    <span class="variant-label">Ocean</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f093fb, #f5576c);">
                        <span>✦</span>
                    </div>
                    <span class="variant-label">Sunset</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #f9d976, #f39c12);">
                        <span>✦</span>
                    </div>
                    <span class="variant-label">Gold</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-preview" style="background: linear-gradient(135deg, #a18cd1, #fbc2eb);">
                        <span>✦</span>
                    </div>
                    <span class="variant-label">Dream</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const trigger = document.getElementById('orbitTrigger');
            const triggerIcon = document.getElementById('triggerIcon');
            const orbitItems = document.getElementById('orbitItems');
            const stateDisplay = document.getElementById('stateDisplay');
            const itemsDisplay = document.getElementById('itemsDisplay');
            const angleDisplay = document.getElementById('angleDisplay');
            const radiusSlider = document.getElementById('radiusSlider');
            const speedSlider = document.getElementById('speedSlider');
            const colorPicker = document.getElementById('colorPicker');
            const radiusValue = document.getElementById('radiusValue');
            const speedValue = document.getElementById('speedValue');
            const autoRotate = document.getElementById('autoRotate');
            const toggleBtn = document.getElementById('toggleBtn');
            const resetBtn = document.getElementById('resetBtn');
            const randomColorBtn = document.getElementById('randomColorBtn');
            const directionBtn = document.getElementById('directionBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                radius: 150,
                speed: 1,
                color: '#4facfe',
                autoRotate: true,
                direction: 1, // 1 = clockwise, -1 = counter-clockwise
                onToggle: function(state) {
                    console.log(`✦ Orbit ${state ? 'opened' : 'closed'}`);
                },
                onItemClick: function(index, label) {
                    console.log(`📌 Clicked: ${label} (${index})`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let isOpen = false;
            let isAnimating = false;
            let currentAngle = 0;
            let isAutoRotating = CONFIG.autoRotate;
            let direction = CONFIG.direction;
            let animationId = null;
            let itemCount = 8;

            // ============================================
            // ORBIT FUNCTIONS
            // ============================================
            function getItemPositions(count, radius, angle) {
                const positions = [];
                const angleStep = (Math.PI * 2) / count;
                
                for (let i = 0; i < count; i++) {
                    const itemAngle = angleStep * i + angle;
                    positions.push({
                        x: Math.cos(itemAngle) * radius,
                        y: Math.sin(itemAngle) * radius
                    });
                }
                
                return positions;
            }

            function updateOrbit(open, animate = true) {
                if (isAnimating) return;
                
                const shouldOpen = open !== undefined ? open : !isOpen;
                if (shouldOpen === isOpen && !isAutoRotating) return;

                isAnimating = true;
                isOpen = shouldOpen;

                const items = orbitItems.querySelectorAll('.orbit-item');
                const count = items.length;
                const radius = parseInt(radiusSlider.value);
                const speed = parseFloat(speedSlider.value);
                const positions = getItemPositions(count, radius, currentAngle);

                items.forEach((item, index) => {
                    const pos = positions[index] || { x: 0, y: 0 };
                    const delay = index * 30 / speed;
                    
                    if (shouldOpen) {
                        // Open: orbit outward
                        item.style.transition = `all ${0.4 / speed}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                        item.style.transitionDelay = delay + 'ms';
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                        item.style.opacity = '1';
                        item.style.pointerEvents = 'auto';
                    } else {
                        // Close: collapse to center
                        item.style.transition = `all ${0.3 / speed}s cubic-bezier(0.34, 1.56, 0.64, 1)`;
                        item.style.transitionDelay = '0ms';
                        item.style.transform = 'translate(0, 0) scale(0)';
                        item.style.opacity = '0';
                        item.style.pointerEvents = 'none';
                    }
                });

                // Update trigger
                triggerIcon.textContent = shouldOpen ? '✕' : '✦';
                trigger.classList.toggle('active', shouldOpen);
                stateDisplay.textContent = shouldOpen ? 'Open' : 'Closed';
                stateDisplay.style.color = shouldOpen ? '#34c759' : '#6b7280';

                CONFIG.onToggle(shouldOpen);

                setTimeout(() => {
                    isAnimating = false;
                    if (shouldOpen && isAutoRotating) {
                        startAutoRotate();
                    } else if (!shouldOpen) {
                        stopAutoRotate();
                    }
                }, 400 / speed + 50);
            }

            function toggleOrbit() {
                updateOrbit();
            }

            function openOrbit() {
                updateOrbit(true);
            }

            function closeOrbit() {
                updateOrbit(false);
            }

            function resetOrbit() {
                if (isOpen) {
                    closeOrbit();
                }
                currentAngle = 0;
                angleDisplay.textContent = '0°';
                const items = orbitItems.querySelectorAll('.orbit-item');
                items.forEach(item => {
                    item.style.transition = 'all 0.3s ease';
                    item.style.transform = 'translate(0, 0) scale(0)';
                    item.style.opacity = '0';
                    item.style.pointerEvents = 'none';
                });
                triggerIcon.textContent = '✦';
                trigger.classList.remove('active');
                stateDisplay.textContent = 'Closed';
                stateDisplay.style.color = '#6b7280';
                isOpen = false;
                stopAutoRotate();
                CONFIG.onToggle(false);
            }

            // ============================================
            // AUTO ROTATE
            // ============================================
            function startAutoRotate() {
                stopAutoRotate();
                if (!isOpen || !isAutoRotating) return;
                
                const speed = parseFloat(speedSlider.value);
                
                function rotate() {
                    if (!isOpen || !isAutoRotating) return;
                    
                    const step = 0.3 * speed * direction;
                    currentAngle += step * 0.02;
                    
                    // Update positions
                    const items = orbitItems.querySelectorAll('.orbit-item');
                    const count = items.length;
                    const radius = parseInt(radiusSlider.value);
                    const positions = getItemPositions(count, radius, currentAngle);
                    
                    items.forEach((item, index) => {
                        const pos = positions[index] || { x: 0, y: 0 };
                        item.style.transition = 'none';
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                    });
                    
                    // Update angle display
                    const degrees = ((currentAngle * 180 / Math.PI) % 360 + 360) % 360;
                    angleDisplay.textContent = Math.round(degrees) + '°';
                    
                    animationId = requestAnimationFrame(rotate);
                }
                
                animationId = requestAnimationFrame(rotate);
            }

            function stopAutoRotate() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
            }

            function toggleAutoRotate() {
                isAutoRotating = !isAutoRotating;
                autoRotate.checked = isAutoRotating;
                if (isAutoRotating && isOpen) {
                    startAutoRotate();
                } else {
                    stopAutoRotate();
                }
            }

            function toggleDirection() {
                direction *= -1;
                CONFIG.direction = direction;
                directionBtn.textContent = direction === 1 ? '🔄 Direction' : '🔄 Reversed';
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            trigger.addEventListener('click', toggleOrbit);

            // Orbit item clicks
            orbitItems.addEventListener('click', function(e) {
                const item = e.target.closest('.orbit-item');
                if (!item) return;
                
                const index = parseInt(item.dataset.index);
                const label = item.querySelector('.item-label')?.textContent || `Item ${index}`;
                
                CONFIG.onItemClick(index, label);
                
                // Close menu after click
                if (isOpen) {
                    closeOrbit();
                }
            });

            // Keyboard navigation
            trigger.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    toggleOrbit();
                }
                if (e.key === 'Escape' && isOpen) {
                    closeOrbit();
                }
            });

            // Controls
            radiusSlider.addEventListener('input', function() {
                const val = parseInt(this.value);
                radiusValue.textContent = val + 'px';
                CONFIG.radius = val;
                if (isOpen) {
                    const items = orbitItems.querySelectorAll('.orbit-item');
                    const count = items.length;
                    const positions = getItemPositions(count, val, currentAngle);
                    items.forEach((item, index) => {
                        const pos = positions[index] || { x: 0, y: 0 };
                        item.style.transition = 'all 0.3s ease';
                        item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                    });
                }
            });

            speedSlider.addEventListener('input', function() {
                const val = parseFloat(this.value);
                speedValue.textContent = val.toFixed(1) + 'x';
                CONFIG.speed = val;
                if (isOpen && isAutoRotating) {
                    startAutoRotate();
                }
            });

            colorPicker.addEventListener('input', function() {
                const color = this.value;
                CONFIG.color = color;
                document.querySelectorAll('.orbit-item').forEach(item => {
                    item.style.setProperty('--item-color', color);
                });
                trigger.style.setProperty('--trigger-color', color);
            });

            autoRotate.addEventListener('change', function() {
                isAutoRotating = this.checked;
                CONFIG.autoRotate = isAutoRotating;
                if (isAutoRotating && isOpen) {
                    startAutoRotate();
                } else {
                    stopAutoRotate();
                }
            });

            toggleBtn.addEventListener('click', toggleOrbit);
            resetBtn.addEventListener('click', resetOrbit);
            randomColorBtn.addEventListener('click', function() {
                const colors = ['#4facfe', '#34c759', '#ff3b30', '#f59e0b', '#6c5ce7', '#fd79a8', '#00d2d3', '#ff9f43'];
                const random = colors[Math.floor(Math.random() * colors.length)];
                colorPicker.value = random;
                CONFIG.color = random;
                document.querySelectorAll('.orbit-item').forEach(item => {
                    item.style.setProperty('--item-color', random);
                });
                trigger.style.setProperty('--trigger-color', random);
            });
            directionBtn.addEventListener('click', toggleDirection);

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const colorMap = {
                    'Ocean': ['#4facfe', '#00d2d3'],
                    'Sunset': ['#f093fb', '#f5576c'],
                    'Gold': ['#f9d976', '#f39c12'],
                    'Dream': ['#a18cd1', '#fbc2eb']
                };
                
                const label = card.querySelector('.variant-label').textContent;
                const colors = colorMap[label] || ['#4facfe', '#00d2d3'];
                
                card.addEventListener('click', function() {
                    const primary = colors[0];
                    colorPicker.value = primary;
                    CONFIG.color = primary;
                    document.querySelectorAll('.orbit-item').forEach(item => {
                        item.style.setProperty('--item-color', primary);
                    });
                    trigger.style.setProperty('--trigger-color', primary);
                    stateDisplay.textContent = `🎨 ${label}`;
                    setTimeout(() => {
                        stateDisplay.textContent = isOpen ? 'Open' : 'Closed';
                    }, 1500);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.OrbitMenu = {
                open: openOrbit,
                close: closeOrbit,
                toggle: toggleOrbit,
                reset: resetOrbit,
                toggleAutoRotate: toggleAutoRotate,
                toggleDirection: toggleDirection,
                setRadius: (radius) => {
                    radiusSlider.value = radius;
                    radiusValue.textContent = radius + 'px';
                    CONFIG.radius = radius;
                    if (isOpen) {
                        const items = orbitItems.querySelectorAll('.orbit-item');
                        const count = items.length;
                        const positions = getItemPositions(count, radius, currentAngle);
                        items.forEach((item, index) => {
                            const pos = positions[index] || { x: 0, y: 0 };
                            item.style.transform = `translate(${pos.x}px, ${pos.y}px) scale(1)`;
                        });
                    }
                },
                setSpeed: (speed) => {
                    speedSlider.value = speed;
                    speedValue.textContent = speed.toFixed(1) + 'x';
                    CONFIG.speed = speed;
                    if (isOpen && isAutoRotating) {
                        startAutoRotate();
                    }
                },
                setColor: (color) => {
                    colorPicker.value = color;
                    CONFIG.color = color;
                    document.querySelectorAll('.orbit-item').forEach(item => {
                        item.style.setProperty('--item-color', color);
                    });
                    trigger.style.setProperty('--trigger-color', color);
                },
                isOpen: () => isOpen,
                getState: () => ({
                    open: isOpen,
                    radius: CONFIG.radius,
                    speed: CONFIG.speed,
                    color: CONFIG.color,
                    autoRotate: isAutoRotating,
                    direction: direction,
                    angle: currentAngle
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.color) {
                        colorPicker.value = config.color;
                        document.querySelectorAll('.orbit-item').forEach(item => {
                            item.style.setProperty('--item-color', config.color);
                        });
                        trigger.style.setProperty('--trigger-color', config.color);
                    }
                    if (config.radius) {
                        radiusSlider.value = config.radius;
                        radiusValue.textContent = config.radius + 'px';
                    }
                    if (config.speed) {
                        speedSlider.value = config.speed;
                        speedValue.textContent = config.speed.toFixed(1) + 'x';
                    }
                    if (config.autoRotate !== undefined) {
                        isAutoRotating = config.autoRotate;
                        autoRotate.checked = isAutoRotating;
                        if (isAutoRotating && isOpen) {
                            startAutoRotate();
                        } else {
                            stopAutoRotate();
                        }
                    }
                    if (config.direction) {
                        direction = config.direction;
                        directionBtn.textContent = direction === 1 ? '🔄 Direction' : '🔄 Reversed';
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            // Hide items initially
            const items = orbitItems.querySelectorAll('.orbit-item');
            items.forEach(item => {
                item.style.transform = 'translate(0, 0) scale(0)';
                item.style.opacity = '0';
                item.style.pointerEvents = 'none';
            });
            
            stateDisplay.textContent = 'Closed';
            itemsDisplay.textContent = items.length;
            angleDisplay.textContent = '0°';

            console.log('✦ Orbit Menu initialized!');
            console.log('📖 API: window.OrbitMenu');
            console.log('📖 Usage:');
            console.log('  - Click the trigger to open/close the orbit');
            console.log('  - Keyboard shortcuts: Enter/Space (toggle), Escape (close)');
            console.log('  - Enable auto-rotate for continuous motion');

        })();
    </script>
</body>
</html>
