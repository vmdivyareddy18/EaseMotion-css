<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse Space Observatory Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="planet"></div>

    <h2>Deep Space Observatory</h2>

    <p>
        Monitor distant galaxies and stellar activity through an immersive
        observatory dashboard featuring a smooth Glow Pulse animation.
    </p>

    <div class="stats">

        <div class="stat">
            <span>Galaxies</span>
            <strong>248</strong>
        </div>

        <div class="stat">
            <span>Stars</span>
            <strong>18K</strong>
        </div>

        <div class="stat">
            <span>Signals</span>
            <strong>93%</strong>
        </div>

    </div>

    <button>Explore Galaxy</button>

</div>

</body>
</html>
