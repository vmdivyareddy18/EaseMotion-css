<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban WIP Limit Column Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Project board</p>
      <h1 id="demo-title">Kanban WIP limit</h1>
      <p>Column headers that communicate healthy, warning, and over-limit work-in-progress states.</p>
    </section>
    <section class="demo-grid" aria-label="Kanban WIP Limit Column Indicator">
        <article class="kanban-limit is-healthy"><h2>Backlog</h2><strong>8 / 12</strong><p>Healthy</p></article>
        <article class="kanban-limit is-warning"><h2>In progress</h2><strong>4 / 5</strong><p>Warning</p></article>
        <article class="kanban-limit is-over-limit"><h2>Review</h2><strong>6 / 5</strong><p>Over limit</p></article>
    </section>
  </main>
</body>
</html>
