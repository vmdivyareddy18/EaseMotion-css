<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Wobble Diff Viewer</title>

    <!-- EaseMotion CSS -->
    <link rel="stylesheet" href="../../../dist/easemotion.css">

    <!-- Component CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard">

    <h1>Medical Dashboard</h1>
    <p class="subtitle">
        Compare patient scan reports with an animated wobble diff viewer.
    </p>

    <div class="diff-viewer ease-fade-in-up">

        <!-- BEFORE PANEL -->
        <div class="diff-panel before">

            <span class="badge before-badge">Before</span>

            <div class="scan-placeholder">
                <span>🩻</span>
            </div>

            <h3>Previous Scan</h3>

            <ul class="scan-details">
                <li>Heart Rate: 96 BPM</li>
                <li>Blood Pressure: 142/92</li>
                <li>Status: Observation Required</li>
            </ul>

        </div>

        <!-- DIVIDER -->
        <div class="divider">

            <span class="divider-line"></span>

            <div class="compare-icon">
                ⇄
            </div>

            <span class="divider-line"></span>

        </div>

        <!-- AFTER PANEL -->
        <div class="diff-panel after">

            <span class="badge after-badge">After</span>

            <div class="scan-placeholder">
                <span>🩻</span>
            </div>

            <h3>Latest Scan</h3>

            <ul class="scan-details">
                <li>Heart Rate: 74 BPM</li>
                <li>Blood Pressure: 122/80</li>
                <li>Status: Stable</li>
            </ul>

        </div>

    </div>

</div>

</body>
</html>
