<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scale Progress Bar</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #f8fafc; font-family: system-ui, sans-serif;">
  
  <div class="progress-card ease-fade-in-up">
    <div class="progress-header">
      <h3>Project Initialization</h3>
      <span class="progress-percentage">75%</span>
    </div>
    
    <div class="progress-track">
      <!-- We scale the bar from left using transform: scaleX -->
      <div class="progress-fill ease-zoom-in"></div>
    </div>
    
    <p class="progress-status">Setting up corporate environments...</p>
  </div>

</body>
</html>
