<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Accordion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="accordion">
    <details class="accordion-item" open>
      <summary>Section 1</summary>
      <div class="accordion-content">
        <p>This is the content for section 1. It is visible by default because of the 'open' attribute.</p>
      </div>
    </details>
    <details class="accordion-item">
      <summary>Section 2</summary>
      <div class="accordion-content">
        <p>This is the content for section 2. Fully functional without any JavaScript.</p>
      </div>
    </details>
    <details class="accordion-item">
      <summary>Section 3</summary>
      <div class="accordion-content">
        <p>This is the content for section 3. Using modern HTML5 elements.</p>
      </div>
    </details>
  </div>
</body>
</html>
