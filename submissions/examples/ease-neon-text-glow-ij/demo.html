<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Text Glow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ntg-container">
    <h1>Neon Text Glow</h1>

    <div class="ntg-display">
      <p class="ntg-text" id="neonText" contenteditable="true">NEON</p>
    </div>

    <div class="ntg-controls">
      <fieldset class="ntg-fieldset">
        <legend>Color</legend>
        <div class="ntg-color-picker">
          <button class="ntg-color-btn" data-color="cyan" style="--swatch:#00f3ff" aria-label="Cyan"></button>
          <button class="ntg-color-btn active" data-color="pink" style="--swatch:#ff2d95" aria-label="Pink"></button>
          <button class="ntg-color-btn" data-color="blue" style="--swatch:#4d7eff" aria-label="Blue"></button>
          <button class="ntg-color-btn" data-color="green" style="--swatch:#39ff14" aria-label="Green"></button>
          <button class="ntg-color-btn" data-color="yellow" style="--swatch:#ffe600" aria-label="Yellow"></button>
          <button class="ntg-color-btn" data-color="purple" style="--swatch:#bf40bf" aria-label="Purple"></button>
          <button class="ntg-color-btn" data-color="red" style="--swatch:#ff1744" aria-label="Red"></button>
        </div>
      </fieldset>

      <fieldset class="ntg-fieldset">
        <legend>Controls</legend>
        <div class="ntg-row">
          <label class="ntg-switch">
            <input type="checkbox" id="powerToggle" checked>
            <span class="ntg-slider"></span>
            <span class="ntg-label">Power</span>
          </label>
          <label class="ntg-switch">
            <input type="checkbox" id="flickerToggle">
            <span class="ntg-slider"></span>
            <span class="ntg-label">Flicker</span>
          </label>
        </div>
        <div class="ntg-row">
          <label for="speedSlider">Speed: <span id="speedValue">1.0</span>s</label>
          <input type="range" id="speedSlider" min="0.3" max="3.0" step="0.1" value="1.0">
        </div>
      </fieldset>

      <fieldset class="ntg-fieldset">
        <legend>Presets</legend>
        <div class="ntg-presets">
          <button class="ntg-preset-btn" data-phrase="DREAM">DREAM</button>
          <button class="ntg-preset-btn" data-phrase="ELECTRIC">ELECTRIC</button>
          <button class="ntg-preset-btn" data-phrase="VIBE">VIBE</button>
          <button class="ntg-preset-btn" data-phrase="NEON">NEON</button>
          <button class="ntg-preset-btn" data-phrase="GLOW">GLOW</button>
          <button class="ntg-preset-btn" data-phrase="WAVE">WAVE</button>
        </div>
      </fieldset>
    </div>
  </main>
  <script src="demo.js"></script>
</body>
</html>
