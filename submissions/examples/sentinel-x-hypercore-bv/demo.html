<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sentinel X Hyper Intelligence Core</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="core-dashboard">
    <header class="header">
      <span class="badge">HyperCore X</span>
      <h1>Sentinel X Hyper Intelligence Core</h1>
      <p class="subtitle">Unified master controller, radial rotating engine, and status indicators.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-core">
        <h3>🌀 X-Core engine status</h3>
        <div class="radial-container">
          <div class="radial-core">
            <span class="pulse-rate">99.4%</span>
            <span class="lbl">Efficiency</span>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card orchestration-card">
          <h3>⚡ Core modules</h3>
          <ul class="stats-list">
            <li>Governance: <strong style="color: var(--primary)">Operational</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
