<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frosted Glass Chip</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; min-height: 100vh; background: url('https://images.unsplash.com/photo-1469474968028-56623f02e42e?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; font-family: 'Inter', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1.5rem; padding: 2rem;">
  
  <h2 style="color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.5);">Explore Categories</h2>

  <div class="chips-container ease-fade-in-up">
    
    <label class="chip frosted-glass ease-hover-pop">
      <input type="checkbox" class="chip-toggle">
      <span class="chip-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
        Forests
      </span>
    </label>

    <label class="chip frosted-glass ease-hover-pop">
      <input type="checkbox" class="chip-toggle" checked>
      <span class="chip-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 3 4 8 5-5 5 15H2L8 3z"></path></svg>
        Mountains
      </span>
    </label>

    <label class="chip frosted-glass ease-hover-pop">
      <input type="checkbox" class="chip-toggle">
      <span class="chip-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
        Rivers
      </span>
    </label>

  </div>

</body>
</html>
