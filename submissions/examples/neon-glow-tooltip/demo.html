<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Neon Glow Tooltip (Accessible Layout) - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="accessible-card" aria-label="System Settings Status">
    <h2 style="margin-top: 0; font-size: 1.5rem; letter-spacing: 0.5px;">Network Security</h2>
    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem;">
      Review your global real-time cloud shield configuration status below.
    </p>

    <div class="tooltip-wrapper">
      <button class="tooltip-trigger" aria-describedby="neon-glow-tooltip">
        System Status
      </button>
      
      <div class="tooltip-box" id="neon-glow-tooltip" role="tooltip">
        <span class="tooltip-title">Encryption Active</span>
        <div>All outgoing API telemetry packets are secured using end-to-end TLS protocols.</div>
      </div>
    </div>
  </main>

</body>
</html>
