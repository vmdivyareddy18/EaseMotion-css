<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line Chart – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chart-wrapper">
    <div class="line-chart" role="img" aria-label="Animated line chart drawing left to right">
      <svg class="chart-svg" viewBox="0 0 360 220" preserveAspectRatio="xMidYMid meet">
        <line class="chart-grid" x1="40" y1="180" x2="340" y2="180"/>
        <line class="chart-grid" x1="40" y1="140" x2="340" y2="140"/>
        <line class="chart-grid" x1="40" y1="100" x2="340" y2="100"/>
        <line class="chart-grid" x1="40" y1="60" x2="340" y2="60"/>
        <line class="chart-grid" x1="40" y1="20" x2="340" y2="20"/>
        <polygon class="chart-fill" points="40,180 40,160 90,130 140,150 190,90 240,110 290,50 340,70 340,180"/>
        <polyline class="chart-line" points="40,160 90,130 140,150 190,90 240,110 290,50 340,70"/>
        <g class="chart-dots">
          <circle cx="40" cy="160" r="0"/>
          <circle cx="90" cy="130" r="0"/>
          <circle cx="140" cy="150" r="0"/>
          <circle cx="190" cy="90" r="0"/>
          <circle cx="240" cy="110" r="0"/>
          <circle cx="290" cy="50" r="0"/>
          <circle cx="340" cy="70" r="0"/>
        </g>
      </svg>
    </div>
    <span class="chart-title">Line Chart</span>
  </div>
</body>
</html>
