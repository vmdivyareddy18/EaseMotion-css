<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Text Block - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Skeleton Text Block</h1>
    <div class="skeleton-card">
      <div class="skeleton-avatar" style="--sk-delay: 0s;"></div>
      <div class="skeleton-lines">
        <div class="skeleton-line" style="--sk-width: 75%; --sk-delay: 0.1s;"></div>
        <div class="skeleton-line" style="--sk-width: 100%; --sk-delay: 0.2s;"></div>
        <div class="skeleton-line" style="--sk-width: 60%; --sk-delay: 0.3s;"></div>
        <div class="skeleton-line skeleton-line-sm" style="--sk-width: 40%; --sk-delay: 0.4s;"></div>
      </div>
    </div>
    <p class="description">Pulsing skeleton blocks indicate loading. CSS handles the shimmer animation via <code>@keyframes</code> with staggered delays.</p>
  </div>
</body>
</html>
