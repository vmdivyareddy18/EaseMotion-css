<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-xray-scanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>X-Ray Scanner</h1>
    <div class="scanner-panel">
      <div class="scan-line"></div>
      <div class="scanner-content">
        <div class="scanner-icon"></div>
        <div class="scanner-label"><span>●</span> Scanning <span>●</span></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Scan Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--scan-color" />
      </label>
      <label>
        Background
        <input type="color" class="js-color" value="#1a1a2e" data-var="--bg-color" />
      </label>
      <label>
        Scan Duration
        <input type="range" class="js-range" min="0.5" max="5" step="0.1" value="2" data-var="--scan-duration" />
        <span class="js-range-value">2s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
