<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Animated Password Generator</h1>

    <div class="generator-card">

      <div class="password-box">
        <input type="text" id="password" readonly>
      </div>

      <div class="controls">

        <div class="length-control">
          <label>Password Length:
            <span id="lengthValue">12</span>
          </label>

          <input type="range" min="6" max="32" value="12" id="lengthSlider">
        </div>

        <div class="options">

          <label>
            <input type="checkbox" id="uppercase" checked>
            Uppercase
          </label>

          <label>
            <input type="checkbox" id="lowercase" checked>
            Lowercase
          </label>

          <label>
            <input type="checkbox" id="numbers" checked>
            Numbers
          </label>

          <label>
            <input type="checkbox" id="symbols" checked>
            Symbols
          </label>

        </div>

        <div class="strength-container">
          <span>Strength</span>

          <div class="strength-bar">
            <div id="strengthFill"></div>
          </div>

          <span id="strengthText">Strong</span>
        </div>

        <div class="buttons">
          <button id="generateBtn">
            Generate Password
          </button>

          <button id="copyBtn">
            Copy Password
          </button>
        </div>

      </div>

    </div>

    <div class="history">
      <h2>Recent Passwords</h2>
      <ul id="historyList"></ul>
    </div>

  </div>

  <script>

    const passwordInput =
      document.getElementById("password");

    const lengthSlider =
      document.getElementById("lengthSlider");

    const lengthValue =
      document.getElementById("lengthValue");

    const generateBtn =
      document.getElementById("generateBtn");

    const copyBtn =
      document.getElementById("copyBtn");

    const historyList =
      document.getElementById("historyList");

    const strengthFill =
      document.getElementById("strengthFill");

    const strengthText =
      document.getElementById("strengthText");

    lengthSlider.addEventListener("input", () => {
      lengthValue.textContent = lengthSlider.value;
    });

    function generatePassword() {

      const upper =
        "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      const lower =
        "abcdefghijklmnopqrstuvwxyz";

      const nums =
        "0123456789";

      const symbols =
        "!@#$%^&*()_+{}[]<>?/";

      let chars = "";

      if (uppercase.checked)
        chars += upper;

      if (lowercase.checked)
        chars += lower;

      if (numbers.checked)
        chars += nums;

      if (symbols.checked)
        chars += symbols;

      if (!chars) {
        alert("Select at least one option.");
        return;
      }

      let password = "";

      for (let i = 0;
        i < lengthSlider.value;
        i++) {

        password +=
          chars.charAt(
            Math.floor(
              Math.random() * chars.length
            )
          );
      }

      passwordInput.value = password;

      updateStrength(password);

      const li =
        document.createElement("li");

      li.textContent = password;

      historyList.prepend(li);

    }

    function updateStrength(password) {

      let score = 0;

      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const width = score * 20;

      strengthFill.style.width =
        width + "%";

      if (score <= 2) {
        strengthText.textContent = "Weak";
        strengthFill.style.background = "#ef4444";
      }
      else if (score <= 4) {
        strengthText.textContent = "Medium";
        strengthFill.style.background = "#f59e0b";
      }
      else {
        strengthText.textContent = "Strong";
        strengthFill.style.background = "#22c55e";
      }

    }

    generateBtn.addEventListener(
      "click",
      generatePassword
    );

    copyBtn.addEventListener(
      "click",
      () => {

        if (!passwordInput.value)
          return;

        navigator.clipboard.writeText(
          passwordInput.value
        );

        copyBtn.textContent = "Copied!";

        setTimeout(() => {
          copyBtn.textContent =
            "Copy Password";
        }, 1500);

      }
    );

    generatePassword();

  </script>

</body>

</html>
