<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Account Security Card — EaseMotion CSS component demo"
    />
    <title>Account Security Card | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>

    <main>

      <article class="security-card">

        <!-- ── Header ──────────────────────────────────────────────── -->
        <header class="card__header">

          <!-- Shield icon -->
          <span class="card__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 role="img" aria-hidden="true">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </span>

          <h2 class="card__title">Account Security</h2>

          <!-- Status badge -->
          <span class="badge badge--good">
            <span class="badge__dot" aria-hidden="true"></span>
            GOOD
          </span>

        </header>

        <!-- ── Security Score (primary focus) ──────────────────────── -->
        <section class="card__score-section" aria-label="Security score">

          <div class="card__score-row">
            <span class="score__label">Security Score</span>
            <span class="score__value">82%</span>
          </div>

          <!-- Progress bar -->
          <div
            class="progress-bar"
            role="progressbar"
            aria-valuenow="82"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-label="Security score 82 out of 100"
          >
            <div class="progress-bar__fill"></div>
          </div>

          <div class="progress-bar__meta" aria-hidden="true">
            <span>0%</span>
            <span>100%</span>
          </div>

        </section>

        <!-- ── Security Checklist ───────────────────────────────────── -->
        <hr class="card__divider" />

        <ul class="card__checklist" aria-label="Security checklist">

          <li class="checklist__item checklist__item--pass">
            <span class="checklist__marker" aria-hidden="true">✓</span>
            <span class="checklist__text">Password Updated</span>
          </li>

          <li class="checklist__item checklist__item--pass">
            <span class="checklist__marker" aria-hidden="true">✓</span>
            <span class="checklist__text">Email Verified</span>
          </li>

          <li class="checklist__item checklist__item--pass">
            <span class="checklist__marker" aria-hidden="true">✓</span>
            <span class="checklist__text">Recovery Email Added</span>
          </li>

          <li class="checklist__item checklist__item--fail">
            <span class="checklist__marker" aria-hidden="true">✕</span>
            <span class="checklist__text">Enable Two-Factor Authentication</span>
          </li>

          <li class="checklist__item checklist__item--fail">
            <span class="checklist__marker" aria-hidden="true">✕</span>
            <span class="checklist__text">Add Phone Number</span>
          </li>

        </ul>

        <!-- ── Footer ──────────────────────────────────────────────── -->
        <footer class="card__footer">

          <div class="card__meta">
            <span>Last Updated</span>
            <strong>2 hours ago</strong>
          </div>

          <button
            type="button"
            class="btn-primary"
            aria-label="Improve your account security"
          >
            Improve Security →
          </button>

        </footer>

      </article>

    </main>

  </body>
</html>
