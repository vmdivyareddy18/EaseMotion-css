<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Horizontal Roll Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="checkout-container">
        <div class="accordion">
            <input type="radio" name="acc" id="step1" checked>
            <label for="step1"><span>01</span> Shipping</label>
            <div class="content">
                <p>Enter your shipping address here.</p>
            </div>

            <input type="radio" name="acc" id="step2">
            <label for="step2"><span>02</span> Payment</label>
            <div class="content">
                <p>Select your payment method.</p>
            </div>

            <input type="radio" name="acc" id="step3">
            <label for="step3"><span>03</span> Review</label>
            <div class="content">
                <p>Finalize your order.</p>
            </div>
        </div>
    </div>
</body>
</html>
