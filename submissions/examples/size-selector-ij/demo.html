<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Size Selector - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Size Selector</h1>

    <div class="selector-card">
      <span class="selector-label">Select Size</span>
      <div class="size-group">
        <button class="size-btn" data-size="XS">XS</button>
        <button class="size-btn" data-size="S">S</button>
        <button class="size-btn active" data-size="M">M</button>
        <button class="size-btn" data-size="L">L</button>
        <button class="size-btn" data-size="XL">XL</button>
      </div>
      <span class="size-result">Selected: M</span>
    </div>

    <div class="variant-row">
      <div class="selector-card sm">
        <span class="selector-label">Color</span>
        <div class="size-group">
          <button class="color-btn" style="--swatch: #ef4444" data-color="Red"></button>
          <button class="color-btn active" style="--swatch: #3b82f6" data-color="Blue"></button>
          <button class="color-btn" style="--swatch: #22c55e" data-color="Green"></button>
        </div>
        <span class="size-result">Blue</span>
      </div>
    </div>

    <p class="description">Size buttons animate with a scale pop and highlight ring when selected. Color swatches use a similar active state with a check indicator.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
