<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Progress Rings - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      max-width: 800px;
      margin: 0 auto;
      background: #f8fafc;
      color: #0f172a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f8fafc; }
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #1e293b; box-shadow: none; }
    }
    h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 20px; color: #64748b; }
  </style>
</head>
<body>

  <h1 style="margin-bottom: 8px;">🔘 Animated Circular Progress Rings</h1>
  <p style="margin-bottom: 40px; color: #64748b;">Dynamic loading visualizations constructed via CSS Conic Gradients and scalable SVGs.</p>

  <div class="grid">
    <div class="card">
      <h2>1. Pure CSS Conic Gradient</h2>
      <div class="ease-progress-ring-container">
        <div class="ease-progress-conic ease-animate" style="--ease-progress-value: 75;" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100"></div>
        <span class="ease-progress-ring-label" data-target="75">0%</span>
      </div>
    </div>

    <div class="card">
      <h2>2. SVG Stroke Metric</h2>
      <div class="ease-progress-ring-container">
        <svg class="ease-progress-svg-wrapper" viewBox="0 0 120 120" role="progressbar" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100">
          <circle class="ease-svg-bg" cx="60" cy="60" r="50"/>
          <circle class="ease-svg-fill ease-ring-success" id="svgCircleTracker" cx="60" cy="60" r="50"/>
        </svg>
        <span class="ease-progress-ring-label" data-target="90">0%</span>
      </div>
    </div>

    <div class="card">
      <h2>3. Mini Compact (No Labels)</h2>
      <div class="ease-progress-ring-container" style="--ease-ring-size: 64px; --ease-ring-width: 6px;">
        <div class="ease-progress-conic ease-animate" style="--ease-progress-value: 40; --ease-ring-color: #ef4444;" role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. Fire text counts matching execution sequence limits
      const labels = document.querySelectorAll('.ease-progress-ring-label');
      labels.forEach(label => {
        const target = parseInt(label.getAttribute('data-target'), 10);
        let current = 0;
        const duration = 1500; // Match CSS runtime clock rate
        const stepTime = Math.max(Math.floor(duration / target), 15);
        
        const timer = setInterval(() => {
          current += 1;
          label.textContent = `${current}%`;
          if (current >= target) clearInterval(timer);
        }, stepTime);
      });

      // 2. Drive standard dash offsets inside standalone SVG elements
      setTimeout(() => {
        const svgFillCircle = document.getElementById('svgCircleTracker');
        if (svgFillCircle) {
          const radius = 50;
          const circumference = 2 * Math.PI * radius;
          svgFillCircle.style.strokeDashoffset = circumference - (90 / 100) * circumference;
        }
      }, 50);
    });
  </script>

</body>
</html>
