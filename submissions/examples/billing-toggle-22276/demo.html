<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Billing Toggle Demo</title>
</head>
<body>
  <h1>Billing Period Toggle</h1>
  
  <label class="toggle-container">
    <input type="checkbox" class="toggle-input">
    <span class="toggle-label label-monthly">Monthly</span>
    <span class="toggle-label">Yearly</span>
    <div class="toggle-slider"></div>
  </label>
</body>
</html>
