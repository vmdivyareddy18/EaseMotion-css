<!DOCTYPE html>
<html lang="en">
<head>
    <center><meta charset="UTF-8"></center>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Statistics Card Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <div class="glass-stat-card">
            <div class="card-header">
                <div class="stat-icon">📈</div>
                <span class="trend positive">+18.2%</span>
            </div>
            <h3>Total Revenue</h3>
            <h2>$24,580</h2>
            <p>Compared to last month</p>
        </div>

        <div class="glass-stat-card">
            <div class="card-header">
                <div class="stat-icon">👥</div>
                <span class="trend negative">-2.4%</span>
            </div>
            <h3>Active Users</h3>
            <h2>12,480</h2>
            <p>Compared to last week</p>
        </div>

        <div class="glass-stat-card">
            <div class="card-header">
                <div class="stat-icon">⏱️</div>
                <span class="trend neutral">0.0%</span>
            </div>
            <h3>Avg. Session Duration</h3>
            <h2>4m 32s</h2>
            <p>Stable over past 24 hours</p>
        </div>
    </div>

</body>
</html>
