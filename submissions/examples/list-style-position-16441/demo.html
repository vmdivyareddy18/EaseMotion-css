<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>List Style Position Demo</title>
</head>
<body>
  <h1>List-Style-Position Utilities</h1>
  
  <h3>Inside</h3>
  <ul class="demo-list list-inside">
    <li class="list-item">Marker is inside the text block.</li>
    <li class="list-item">Longer text wraps under the marker.</li>
  </ul>
  
  <h3>Outside</h3>
  <ul class="demo-list list-outside">
    <li class="list-item">Marker is outside the text block.</li>
    <li class="list-item">Text aligns to the left margin.</li>
  </ul>
</body>
</html>
