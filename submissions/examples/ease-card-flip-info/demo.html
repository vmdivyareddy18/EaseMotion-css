<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Card - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Flip Card</h1>
      <p>3D animated card that reveals additional information on the back.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-section">
        
        <!-- The Flip Card Container -->
        <div class="ease-card-flip">
          
          <!-- Hidden Checkbox for Click Support -->
          <input type="checkbox" id="flip-toggle" class="ease-flip-input" />
          
          <!-- The Flipping Wrapper (Label triggers the checkbox) -->
          <label class="ease-flip-inner" for="flip-toggle" aria-label="Flip Card">
            
            <!-- Front Face -->
            <div class="ease-card-front">
              <div class="card-icon">🚀</div>
              <h2>Starter Plan</h2>
              <p class="price">$19 <span>/mo</span></p>
              <div class="flip-hint">
                <span>Hover or click for details</span>
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none">
                  <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
              </div>
            </div>

            <!-- Back Face -->
            <div class="ease-card-back">
              <h3>Includes:</h3>
              <ul class="feature-list">
                <li><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg> 10GB Cloud Storage</li>
                <li><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg> 5 Team Members</li>
                <li><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg> Basic Support</li>
                <li><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none"><polyline points="20 6 9 17 4 12"></polyline></svg> API Access</li>
              </ul>
              <button class="action-btn">Get Started</button>
            </div>
            
          </label>
        </div>

      </section>
    </main>
  </div>
</body>
</html>
