<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Fade-Out Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">Open Modal</label>

<div class="overlay">
    <div class="modal">
        <h2>Welcome 👋</h2>
        <p>This is a Glassmorphism Fade-Out Modal built using only HTML and CSS.</p>

        <label for="modal-toggle" class="close-btn">Close</label>
    </div>
</div>

</body>
</html>
