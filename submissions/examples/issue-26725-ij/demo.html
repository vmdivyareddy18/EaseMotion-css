<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zebra-stripe | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="ground-z"></div>
    <div class="zebra-body">
      <div class="z-stripe zs-1"></div>
      <div class="z-stripe zs-2"></div>
      <div class="z-stripe zs-3"></div>
      <div class="z-stripe zs-4"></div>
      <div class="z-stripe zs-5"></div>
      <div class="z-stripe zs-6"></div>
      <div class="z-stripe zs-7"></div>
      <div class="zebra-head">
        <div class="head-stripe hs-1"></div>
        <div class="head-stripe hs-2"></div>
        <div class="head-stripe hs-3"></div>
        <div class="eye-zebra"></div>
        <div class="ear-zebra ear-z-l"></div>
        <div class="ear-zebra ear-z-r"></div>
        <div class="muzzle">
          <div class="nostril-z"></div>
        </div>
      </div>
      <div class="mane mane-1"></div>
      <div class="mane mane-2"></div>
      <div class="mane mane-3"></div>
      <div class="mane mane-4"></div>
      <div class="mane mane-5"></div>
      <div class="leg-zebra zleg-fl"></div>
      <div class="leg-zebra zleg-fr"></div>
      <div class="leg-zebra zleg-bl"></div>
      <div class="leg-zebra zleg-br"></div>
      <div class="tail-zebra"></div>
    </div>
  </div>
</body>
</html>
