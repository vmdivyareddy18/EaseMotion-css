<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion — Spotlight Voice Recorder Sandbox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="recorder-playground">
    <header class="recorder-header">
      <span class="spotlight-pill" role="status">Space Audio Module // #42608</span>
      <h1>Spotlight Voice Recorder</h1>
      <p>A pure CSS voice recording interface featuring a dynamic spotlight backdrop, pulse wave spectrums, and active recording state triggers.</p>
    </header>

    <main class="recorder-viewport">
      <div class="ease-spotlight-recorder">
        
        <!-- Pure CSS Checkbox State Controller -->
        <input type="checkbox" id="ease-recorder-toggle" class="ease-recorder-checkbox" aria-label="Toggle voice recording state">
        
        <!-- Outer Glowing Spotlight Beam Effect -->
        <div class="ease-spotlight-beam" aria-hidden="true"></div>

        <!-- Central Control Interface Card -->
        <div class="ease-recorder-card">
          
          <!-- Live Status Indicator -->
          <div class="ease-status-bar">
            <span class="ease-live-dot" aria-hidden="true"></span>
            <span class="ease-status-text">Ready to Record</span>
          </div>

          <!-- Pulsing Equalizer Sound Waveform -->
          <div class="ease-waveform-container" aria-hidden="true">
            <span class="ease-wave-bar" style="--bar-index: 1;"></span>
            <span class="ease-wave-bar" style="--bar-index: 2;"></span>
            <span class="ease-wave-bar" style="--bar-index: 3;"></span>
            <span class="ease-wave-bar" style="--bar-index: 4;"></span>
            <span class="ease-wave-bar" style="--bar-index: 5;"></span>
            <span class="ease-wave-bar" style="--bar-index: 6;"></span>
            <span class="ease-wave-bar" style="--bar-index: 7;"></span>
          </div>

          <!-- Microphone Trigger Button -->
          <label for="ease-recorder-toggle" class="ease-mic-trigger" tabIndex="0" role="button" aria-pressed="false" id="mic-button-label">
            <div class="ease-mic-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="22"></line>
              </svg>
            </div>
          </label>

          <p class="ease-hint-text">Click microphone to initiate audio stream</p>

        </div>

      </div>
    </main>
  </div>

  <script>
    // Lightweight A11y handler for keyboard interaction
    const label = document.getElementById('mic-button-label');
    const checkbox = document.getElementById('ease-recorder-toggle');
    
    label.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        checkbox.checked = !checkbox.checked;
        label.setAttribute('aria-pressed', checkbox.checked);
      }
    });

    checkbox.addEventListener('change', () => {
      label.setAttribute('aria-pressed', checkbox.checked);
    });
  </script>

</body>
</html>
