<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Release Approval Gate Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="dashboard">

<h2>Release Approval Gates</h2>

<div class="gate passed">
<div>
<h3>Quality Assurance</h3>
<p>All regression tests passed</p>
</div>
<span>Approved</span>
</div>

<div class="gate progress">
<div>
<h3>Security Review</h3>
<p>Final vulnerability scan running</p>
</div>
<span>In Progress</span>
</div>

<div class="gate pending">
<div>
<h3>Performance Validation</h3>
<p>Load test report awaiting approval</p>
</div>
<span>Pending</span>
</div>

<div class="gate blocked">
<div>
<h3>Production Release</h3>
<p>Waiting for all approval gates</p>
</div>
<span>Blocked</span>
</div>

</section>

</body>
</html>
