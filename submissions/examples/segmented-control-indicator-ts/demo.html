<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Segmented Control Sliding Indicator</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="demo-header" aria-labelledby="demo-title">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1 id="demo-title">Segmented Control Sliding Indicator</h1>
      <p>Uses radio inputs and labels to create an accessible segmented control with a sliding indicator.</p>
    </section>
    <fieldset class="segmented-fieldset">
      <legend>Billing cycle</legend>
      <div class="segmented-control">
        <input checked type="radio" name="cycle" id="monthly">
        <label for="monthly">Monthly</label>
        <input type="radio" name="cycle" id="yearly">
        <label for="yearly">Yearly</label>
        <span class="segment-indicator" aria-hidden="true"></span>
      </div>
    </fieldset>
  </main>
</body>
</html>
