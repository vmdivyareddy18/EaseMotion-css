<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-energy-field demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #0f0f1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .panel {
      width: 400px; height: 260px;
      background: #161625;
      border: 1px solid #2a2a45;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      color: #a5a5c9; font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="panel ease-energy-field" id="field">
    Energy Field
  </div>
  <script>
    const field = document.getElementById('field');
    const colors = ['#6366f1','#8b5cf6','#06b6d4','#10b981'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'ep';
      p.style.left = Math.random() * 100 + '%';
      p.style.top  = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (Math.random() * 4 + 3) + 's';
      p.style.animationDelay = (Math.random() * 5) + 's';
      p.style.width = p.style.height = (Math.random() * 4 + 2) + 'px';
      field.appendChild(p);
    }
  </script>
</body>
</html>
