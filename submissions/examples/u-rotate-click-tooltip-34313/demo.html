<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

Neumorphic UI

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Soft UI inspired tooltip component
featuring a smooth rotate-click
interaction for modern neumorphic
interfaces.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

View Details

</label>

<div

class="tooltip"

role="tooltip"

>

<div class="icon">

✦

</div>

<h3>

Soft Experience

</h3>

<p>

A lightweight CSS tooltip
built with subtle shadows,
smooth rotation and elegant
neumorphic depth.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
