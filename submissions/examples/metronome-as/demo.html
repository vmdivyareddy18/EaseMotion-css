<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metronome</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="metronome">
    <div class="mn-body">
      <span class="mn-scale"></span>
      <span class="mn-arm">
        <span class="mn-weight"></span>
      </span>
      <span class="mn-pivot"></span>
      <span class="mn-tempo">120 <em>BPM</em></span>
    </div>
    <span class="mn-base"></span>
  </div>
</body>
</html>
