<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Skew Checkbox — Demo</title>
<link rel="stylesheet" href="style.css" />
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at 20% 20%, #14162a, #0b0d12 70%);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, sans-serif;
    padding: 2rem;
  }
  .demo-wrap {
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
    max-width: 360px;
  }
  .demo-wrap h1 {
    color: #f2f2f7;
    font-size: 1.3rem;
    margin: 0 0 0.25rem;
  }
  .demo-wrap > p {
    color: rgba(242, 242, 247, 0.6);
    font-size: 0.88rem;
    margin: 0 0 0.5rem;
  }
</style>
</head>
<body>

<div class="demo-wrap">
  <h1>🚀 Skew Checkbox</h1>
  <p>Pure CSS, no JavaScript. Tab to focus, Space to toggle.</p>

  <label class="ease-checkbox--skew">
    <input type="checkbox" checked />
    <span class="ease-checkbox__box"><span class="ease-checkbox__trail"></span></span>
    <span class="ease-checkbox__label">
      Enable warp drive
      <span class="ease-checkbox__label-desc">Jump to lightspeed instantly</span>
    </span>
  </label>

  <label class="ease-checkbox--skew">
    <input type="checkbox" />
    <span class="ease-checkbox__box"><span class="ease-checkbox__trail"></span></span>
    <span class="ease-checkbox__label">
      Shield generator
      <span class="ease-checkbox__label-desc">Protects against asteroid debris</span>
    </span>
  </label>

  <label class="ease-checkbox--skew">
    <input type="checkbox" disabled />
    <span class="ease-checkbox__box"><span class="ease-checkbox__trail"></span></span>
    <span class="ease-checkbox__label">
      Autopilot
      <span class="ease-checkbox__label-desc">Unavailable in this sector</span>
    </span>
  </label>
</div>

</body>
</html>
