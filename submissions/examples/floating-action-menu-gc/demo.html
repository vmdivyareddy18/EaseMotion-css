<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Floating Action Menu UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Floating Action Menu UI Example</h1>
      <p>Expandable floating action button with animated child actions.</p>
    </header>

    <section class="fab-shell">
      <div class="floating-action-menu" tabindex="0">
        <button class="fab fab--primary" aria-label="Open menu">+</button>
        <div class="fab-actions">
          <button class="fab fab--child" aria-label="Create new item">✚</button>
          <button class="fab fab--child" aria-label="Search">🔍</button>
          <button class="fab fab--child" aria-label="Settings">⚙️</button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
