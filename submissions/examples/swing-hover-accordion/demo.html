<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSS Swing-Hover Accordion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="accordion-container">
        <details class="accordion-item">
            <summary class="accordion-header">
                Unlock Growth Potential 🚀
                <span class="icon">▼</span>
            </summary>
            <div class="accordion-content">
                <p>Our marketing tools help you scale faster with data-driven insights.</p>
            </div>
        </details>

        <details class="accordion-item">
            <summary class="accordion-header">
                Global Reach & Analytics 📊
                <span class="icon">▼</span>
            </summary>
            <div class="accordion-content">
                <p>Track your campaign performance across 50+ countries in real-time.</p>
            </div>
        </details>
    </div>

</body>
</html>
