<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Picker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Color Palette Picker</h1>
  <div class="palette" id="palette"></div>
  <div class="selected-display" id="selectedDisplay">
    <span class="selected-label">Selected:</span>
    <span class="selected-value" id="selectedValue">—</span>
    <span class="selected-swatch" id="selectedSwatch"></span>
  </div>
  <button class="replay-btn" id="replayBtn">Clear Selection</button>

  <script>
    const colors = [
      '#ef4444', '#f97316', '#eab308', '#22c55e',
      '#14b8a6', '#3b82f6', '#6366f1', '#a855f7',
      '#ec4899', '#f43f5e', '#06b6d4', '#84cc16',
      '#d946ef', '#0ea5e9', '#10b981', '#f59e0b'
    ];

    const palette = document.getElementById('palette');
    const selectedValue = document.getElementById('selectedValue');
    const selectedSwatch = document.getElementById('selectedSwatch');
    const replayBtn = document.getElementById('replayBtn');

    let currentSelected = null;

    colors.forEach(hex => {
      const swatch = document.createElement('div');
      swatch.className = 'swatch';
      swatch.style.background = hex;
      swatch.dataset.color = hex;
      swatch.addEventListener('click', () => {
        if (currentSelected) {
          currentSelected.classList.remove('selected');
        }
        swatch.classList.add('selected');
        currentSelected = swatch;
        selectedValue.textContent = hex;
        selectedSwatch.style.background = hex;
      });
      palette.appendChild(swatch);
    });

    replayBtn.addEventListener('click', () => {
      if (currentSelected) {
        currentSelected.classList.remove('selected');
        currentSelected = null;
      }
      selectedValue.textContent = '—';
      selectedSwatch.style.background = 'transparent';
    });
  </script>
</body>
</html>
