<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contract Animation Safari Stutter Demo</title>
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Contract Animation Safari Reproduction</h1>
        <p>This demo isolates the "Contract" animation stutter observed in Safari browsers.</p>
        
        <div class="demo-box" id="animated-element">
            Contract Me
        </div>
        
        <button id="trigger-btn">Trigger Animation</button>
    </main>

    <script>
        const btn = document.getElementById('trigger-btn');
        const box = document.getElementById('animated-element');

        btn.addEventListener('click', () => {
            box.classList.remove('ease-contract');
            // Trigger reflow
            void box.offsetWidth;
            box.classList.add('ease-contract');
        });
    </script>
</body>
</html>
