<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium 3D Isometric Spatial Matrix — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #040612;
      color: #f9fafb;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    .workspace {
      max-width: 900px;
      width: 100%;
    }
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid #1f2937;
      padding-bottom: 1.5rem;
    }
    .tech-badge {
      font-family: 'JetBrains Mono', monospace;
      color: #a855f7;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin: 0.5rem 0;
    }
    p {
      color: #64748b;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="workspace">
    <header>
      <div class="tech-badge">// Perspective Transformation Array</div>
      <h1>Isometric Matrix Projections</h1>
      <p>Three-dimensional element fields executing localized coordinate lift transitions completely on the GPU plane.</p>
    </header>

    <main class="ease-iso-scene">
      <div class="ease-iso-grid">
        
        <div class="ease-iso-card">
          <div class="ease-iso-preview"></div>
          <h4>Core Metrics Alpha</h4>
        </div>

        <div class="ease-iso-card">
          <div class="ease-iso-preview"></div>
          <h4>Data Vectors Beta</h4>
        </div>

        <div class="ease-iso-card">
          <div class="ease-iso-preview"></div>
          <h4>Pipeline Cell Gamma</h4>
        </div>

        <div class="ease-iso-card">
          <div class="ease-iso-preview"></div>
          <h4>Cluster Engine Delta</h4>
        </div>

      </div>
    </main>
  </div>

</body>
</html>
