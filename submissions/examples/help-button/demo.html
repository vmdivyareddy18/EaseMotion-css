<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Button Demo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">

    <div class="logo">
        EaseMotion
    </div>

    <div class="nav-links">

        <a href="#">Buttons</a>
        <a href="#">Cards</a>
        <a href="#">Animations</a>
        <a href="#">Layout</a>

        <div class="help-wrapper">
            <button class="help-btn" onclick="showHelp()">
                ?
            </button>

            <span class="tooltip">
                Need Help?
            </span>
        </div>

        <button id="theme-btn" class="theme-btn">
            🌙
        </button>

    </div>

</nav>

<section class="hero">

    <h1>Help Button Demo</h1>

    <p>
        Hover the Help button or click it.
    </p>

</section>

<script>

function showHelp(){
    alert("Open Help Documentation");
}

const theme=document.getElementById("theme-btn");

theme.onclick=()=>{

const html=document.documentElement;

if(html.dataset.theme==="light"){
html.dataset.theme="dark";
theme.innerHTML="🌙";
}
else{
html.dataset.theme="light";
theme.innerHTML="☀️";
}

}

</script>

</body>
</html>
