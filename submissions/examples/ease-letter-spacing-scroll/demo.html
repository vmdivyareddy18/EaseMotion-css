<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-letter-spacing-scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="spacer">↓ Scroll down to see the animation</div>
  <h1 class="ease-letter-spacing-scroll">EaseMotion CSS</h1>
  <h1 class="ease-letter-spacing-scroll">Letter Spacing</h1>
  <h1 class="ease-letter-spacing-scroll">Scroll Reveal</h1>
  <div class="spacer">End of demo</div>
  <script>
    const thresholds = Array.from({ length: 21 }, (_, i) => i / 20);
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const ratio = entry.intersectionRatio;
        const spacing = -0.1 + (ratio * 0.1);
        const opacity = 0.2 + (ratio * 0.8);
        entry.target.style.letterSpacing = `${spacing.toFixed(4)}em`;
        entry.target.style.opacity = opacity.toFixed(4);
      });
    }, { threshold: thresholds });
    document.querySelectorAll('.ease-letter-spacing-scroll')
      .forEach(el => observer.observe(el));
  </script>
</body>
</html>
