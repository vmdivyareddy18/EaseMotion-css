<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Cherry Blossom Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="garden-container">
        <div class="header-info">
            <h2>Animation: <span class="accent">ease-cherry-blossom</span></h2>
            <p>A multi-dimensional falling, tumbling, and drifting animation curve for ambient UI details.</p>
        </div>

        <div class="falling-theater">
            
            <div class="petal-card">
                <div class="drop-zone">
                    <div class="petal ease-cherry-blossom">🌸</div>
                </div>
                <span class="badge">Standard Drift</span>
            </div>

            <div class="petal-card">
                <div class="drop-zone">
                    <div class="petal ease-cherry-blossom-fast">🌸</div>
                </div>
                <span class="badge">Brisk / Fast</span>
            </div>

            <div class="petal-card">
                <div class="drop-zone">
                    <div class="petal ease-cherry-blossom-slow">🌸</div>
                </div>
                <span class="badge">Gentle / Slow</span>
            </div>

        </div>
    </div>

</body>
</html>
