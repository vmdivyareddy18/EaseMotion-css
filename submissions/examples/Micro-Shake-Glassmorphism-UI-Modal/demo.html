<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Shake Glassmorphism Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Glass Panel
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="glass-orb"></div>

        <h2>Glass Workspace</h2>

        <p>
            A modern glassmorphism modal featuring a subtle Micro Shake
            interaction built entirely using HTML and CSS.
        </p>

        <div class="cards">

            <div class="card">
                <span>🎨</span>
                <h4>Design</h4>
            </div>

            <div class="card">
                <span>💡</span>
                <h4>Ideas</h4>
            </div>

            <div class="card">
                <span>🚀</span>
                <h4>Launch</h4>
            </div>

        </div>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
