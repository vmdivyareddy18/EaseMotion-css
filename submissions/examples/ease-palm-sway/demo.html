<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Palm Sway Animation Demo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="scene-container">
        <div class="sky-elements">
            <h2>Animation: <span class="accent">ease-palm-sway</span></h2>
            <p>An organic, asymmetric wind-sway utility classes for environmental UI elements.</p>
        </div>

        <div class="island-stage">
            
            <div class="palm-container">
                <div class="palm-tree ease-palm-sway">
                    <div class="leaves">🌴</div>
                    <div class="trunk"></div>
                </div>
                <span class="label">Default Sway</span>
            </div>

            <div class="palm-container">
                <div class="palm-tree ease-palm-sway-fast">
                    <div class="leaves">🌴</div>
                    <div class="trunk"></div>
                </div>
                <span class="label">Breeze / Fast</span>
            </div>

            <div class="palm-container">
                <div class="palm-tree ease-palm-sway-slow">
                    <div class="leaves">🌴</div>
                    <div class="trunk"></div>
                </div>
                <span class="label">Gentle / Slow</span>
            </div>

        </div>
    </div>

</body>
</html>
