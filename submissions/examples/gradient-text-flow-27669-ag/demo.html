<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Text Flow — EaseMotion CSS</title>
  <meta name="description" content="Visual typography showcase demonstrating dynamic animated text gradients and background-position loops.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — SCSS Utilities</span>
      <h1>Gradient Text Flow</h1>
      <p class="description">
        Demonstrates keyframe-animated text gradients. Hover over the headers 
        to trigger flow rate shifts.
      </p>
    </header>

    <main class="showcase">
      
      <!-- Gradient Type 1: Purple to Cyan -->
      <section class="card">
        <h2 class="text-flow flow-aurora">Aurora Flow</h2>
        <span class="badge">flow-aurora</span>
      </section>

      <!-- Gradient Type 2: Sunset Glow -->
      <section class="card">
        <h2 class="text-flow flow-sunset">Sunset Horizon</h2>
        <span class="badge">flow-sunset</span>
      </section>

      <!-- Gradient Type 3: Ocean Depths -->
      <section class="card">
        <h2 class="text-flow flow-ocean">Oceanic Abyss</h2>
        <span class="badge">flow-ocean</span>
      </section>

    </main>
  </div>

</body>
</html>
