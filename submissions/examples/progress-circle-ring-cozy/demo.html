<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Progress Circle Ring</title>
  <meta name="description" content="CSS-driven circular ring progress indicator animation with indeterminate state support.">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Demo page styles only ─────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem 4rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    [data-theme="dark"] body {
      background: #0f172a;
      color: #f8fafc;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.6;
      margin-bottom: 3rem;
      text-align: center;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      width: 100%;
      max-width: 1000px;
    }

    .demo-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      transition: border-color 0.2s ease, background 0.3s ease;
    }

    [data-theme="dark"] .demo-card {
      background: #1e293b;
      border-color: #334155;
    }

    .demo-card h2 {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      text-align: center;
      margin-bottom: -0.5rem;
    }

    .controls-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: #e2e8f0;
      color: #0f172a;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    [data-theme="dark"] button {
      background: #334155;
      color: #f8fafc;
    }

    button:hover { background: #cbd5e1; }
    [data-theme="dark"] button:hover { background: #475569; }
    button:active { transform: scale(0.97); }

    .theme-toggle {
      margin-bottom: 3rem;
      background: #6366f1;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
    }
    
    .theme-toggle:hover { background: #4f46e5; }
    [data-theme="dark"] .theme-toggle { background: #4f46e5; }

  </style>
</head>
<body>

  <h1>Progress Circle Ring</h1>
  <p class="subtitle">CSS-driven SVG stroke animation · Indeterminate state · Accessible</p>

  <button class="theme-toggle" onclick="toggleTheme()">🌙 Toggle Dark Mode</button>

  <!-- We must define the SVG gradient once on the page to use it later -->
  <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
    <linearGradient id="epr-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </svg>

  <div class="demo-grid">

    <!-- Default Interactive -->
    <div class="demo-card">
      <h2>Default (Interactive)</h2>
      
      <div class="ease-progress-ring" id="ring-interactive" style="--epr-progress: 45;" role="progressbar" aria-valuenow="45" aria-valuemin="0" aria-valuemax="100">
        <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
          <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
        </svg>
        <span class="ease-progress-ring__label" id="ring-interactive-label">45%</span>
      </div>

      <div class="controls-row">
        <button onclick="updateProgress('interactive', 0)">0%</button>
        <button onclick="updateProgress('interactive', 25)">25%</button>
        <button onclick="updateProgress('interactive', 75)">75%</button>
        <button onclick="updateProgress('interactive', 100)">100%</button>
      </div>
    </div>

    <!-- Themes -->
    <div class="demo-card">
      <h2>Themes</h2>
      
      <div class="controls-row" style="margin-bottom: -1rem;">
        <div class="ease-progress-ring ease-progress-ring--sm ease-progress-ring--success" style="--epr-progress: 100;" role="progressbar" aria-valuenow="100">
          <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
            <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
          </svg>
          <span class="ease-progress-ring__label">✓</span>
        </div>
        
        <div class="ease-progress-ring ease-progress-ring--sm ease-progress-ring--warning" style="--epr-progress: 60;" role="progressbar" aria-valuenow="60">
          <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
            <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
          </svg>
          <span class="ease-progress-ring__label">60%</span>
        </div>
        
        <div class="ease-progress-ring ease-progress-ring--sm ease-progress-ring--error" style="--epr-progress: 25;" role="progressbar" aria-valuenow="25">
          <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
            <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
          </svg>
          <span class="ease-progress-ring__label">25%</span>
        </div>
      </div>
      
      <!-- Gradient Variant -->
      <div class="ease-progress-ring ease-progress-ring--gradient" id="ring-gradient" style="--epr-progress: 80;" role="progressbar" aria-valuenow="80">
        <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
          <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
        </svg>
        <span class="ease-progress-ring__label" id="ring-gradient-label">80%</span>
      </div>
      
      <div class="controls-row">
        <button onclick="updateProgress('gradient', Math.floor(Math.random() * 100))">Randomize Gradient</button>
      </div>
    </div>

    <!-- Indeterminate (Loading) -->
    <div class="demo-card">
      <h2>Indeterminate State</h2>
      
      <div class="ease-progress-ring ease-progress-ring--indeterminate" id="ring-loading" role="progressbar" aria-busy="true">
        <svg class="ease-progress-ring__svg" viewBox="0 0 100 100" aria-hidden="true">
          <circle class="ease-progress-ring__track" cx="50" cy="50" r="45"></circle>
          <circle class="ease-progress-ring__fill" cx="50" cy="50" r="45"></circle>
        </svg>
        <span class="ease-progress-ring__label" style="font-size:0.75rem; text-transform:uppercase; letter-spacing:1px; margin-top:2px;">Loading</span>
      </div>

      <div class="controls-row">
        <button onclick="toggleIndeterminate()">Toggle Loading State</button>
      </div>
    </div>

  </div>

  <script>
    function updateProgress(id, value) {
      const ring = document.getElementById('ring-' + id);
      const label = document.getElementById('ring-' + id + '-label');
      
      // Update CSS variable
      ring.style.setProperty('--epr-progress', value);
      // Update ARIA
      ring.setAttribute('aria-valuenow', value);
      
      // Animate the number counting up/down in the label
      if (label) {
        animateValue(label, parseInt(label.textContent), value, 800);
      }
    }

    function toggleIndeterminate() {
      const ring = document.getElementById('ring-loading');
      if (ring.classList.contains('ease-progress-ring--indeterminate')) {
        ring.classList.remove('ease-progress-ring--indeterminate');
        ring.style.setProperty('--epr-progress', 100);
        ring.querySelector('.ease-progress-ring__label').textContent = "DONE";
        ring.removeAttribute('aria-busy');
        ring.setAttribute('aria-valuenow', 100);
      } else {
        ring.classList.add('ease-progress-ring--indeterminate');
        ring.style.setProperty('--epr-progress', 0);
        ring.querySelector('.ease-progress-ring__label').textContent = "LOADING";
        ring.setAttribute('aria-busy', 'true');
        ring.removeAttribute('aria-valuenow');
      }
    }

    // Number counting animation helper for the label
    function animateValue(obj, start, end, duration) {
      if (start === end) return;
      const range = end - start;
      const startTime = performance.now();
      
      function step(currentTime) {
        const elapsed = currentTime - startTime;
        let progress = Math.min(elapsed / duration, 1);
        // easeOutQuart
        progress = 1 - Math.pow(1 - progress, 4);
        
        obj.textContent = Math.floor(start + (range * progress)) + "%";
        
        if (progress < 1) {
          window.requestAnimationFrame(step);
        } else {
          obj.textContent = end + "%";
        }
      }
      window.requestAnimationFrame(step);
    }

    function toggleTheme() {
      const html = document.documentElement;
      if (html.getAttribute('data-theme') === 'dark') {
        html.removeAttribute('data-theme');
      } else {
        html.setAttribute('data-theme', 'dark');
      }
    }
  </script>

</body>
</html>
