<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Flip X - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="box ease-flip-x">3D Axis Rotation</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-flip-x'); void b.offsetWidth; b.classList.add('ease-flip-x');">Flip</button>
    </div>
</body>
</html>
