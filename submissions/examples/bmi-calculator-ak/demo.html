<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bmi-wrapper">

    <h1>BMI Calculator</h1>

    <div class="bmi-inputs">
      <div class="bmi-field">
        <label for="height">Height (cm)</label>
        <input type="number" id="height" class="bmi-input" value="170" min="50" max="250" step="0.1">
      </div>
      <div class="bmi-field">
        <label for="weight">Weight (kg)</label>
        <input type="number" id="weight" class="bmi-input" value="70" min="10" max="500" step="0.1">
      </div>
    </div>

    <div class="bmi-result">
      <span class="bmi-value" id="bmiValue">24.22</span>
      <span class="bmi-category" id="bmiCategory">Normal</span>
    </div>

    <div class="bmi-bar">
      <div class="bmi-fill" id="bmiFill"></div>
      <div class="bmi-markers">
        <span class="marker" style="left:16%">18.5</span>
        <span class="marker" style="left:44%">25</span>
        <span class="marker" style="left:70%">30</span>
        <span class="marker" style="left:100%">40</span>
      </div>
    </div>

    <div class="bmi-legend">
      <span class="legend-item" style="color:#3b82f6">Underweight</span>
      <span class="legend-item" style="color:#22c55e">Normal</span>
      <span class="legend-item" style="color:#f59e0b">Overweight</span>
      <span class="legend-item" style="color:#ef4444">Obese</span>
    </div>

  </div>

  <script>
    const heightEl = document.getElementById('height');
    const weightEl = document.getElementById('weight');
    const bmiValue = document.getElementById('bmiValue');
    const bmiCategory = document.getElementById('bmiCategory');
    const bmiFill = document.getElementById('bmiFill');

    function calculate() {
      const h = parseFloat(heightEl.value) / 100;
      const w = parseFloat(weightEl.value);
      if (!h || !w) return;

      const bmi = w / (h * h);
      bmiValue.textContent = bmi.toFixed(1);

      let cat, color, left;
      if (bmi < 18.5) { cat = 'Underweight'; color = '#3b82f6'; left = 8; }
      else if (bmi < 25) { cat = 'Normal'; color = '#22c55e'; left = 30; }
      else if (bmi < 30) { cat = 'Overweight'; color = '#f59e0b'; left = 57; }
      else { cat = 'Obese'; color = '#ef4444'; left = 85; }

      bmiCategory.textContent = cat;
      bmiCategory.style.color = color;
      bmiValue.style.color = color;

      const pct = Math.min(100, Math.max(0, ((bmi - 10) / 35) * 100));
      bmiFill.style.width = pct + '%';
      bmiFill.style.background = color;
    }

    heightEl.addEventListener('input', calculate);
    weightEl.addEventListener('input', calculate);
    calculate();
  </script>

</body>
</html>
