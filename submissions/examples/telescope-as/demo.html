<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telescope</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="star sa"></span>
    <span class="star sb"></span>
    <span class="star sc"></span>
    <span class="star sd"></span>
    <span class="shoot"></span>
    <div class="scope">
      <span class="tube">
        <span class="band b1"></span>
        <span class="band b2"></span>
        <span class="lens"></span>
        <span class="finder"></span>
      </span>
    </div>
    <div class="mount">
      <span class="leg lg1"></span>
      <span class="leg lg2"></span>
      <span class="leg lg3"></span>
      <span class="hinge"></span>
    </div>
    <span class="ground"></span>
  </div>
</body>
</html>
