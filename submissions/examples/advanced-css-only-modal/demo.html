<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Advanced CSS-only Modal Component - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Advanced CSS-only Modal Component</h1>

      <div class="modal-demo">
        <input class="modal-toggle" type="checkbox" id="advanced-modal" />

        <label class="modal-open-button" for="advanced-modal">
          Open Modal
        </label>

        <div class="modal-overlay">
          <div
            class="modal-box"
            role="dialog"
            aria-modal="true"
            aria-labelledby="modal-title"
          >
            <div class="modal-header">
              <h2 id="modal-title">Advanced CSS-only Modal</h2>

              <label
                class="modal-close-button"
                for="advanced-modal"
                aria-label="Close modal"
              >
                ×
              </label>
            </div>

            <p class="modal-text">
              This modal uses only HTML and CSS. It includes an animated
              backdrop, responsive sizing, focus states, and reduced-motion
              support.
            </p>

            <div class="modal-actions">
              <label class="modal-secondary-button" for="advanced-modal">
                Cancel
              </label>

              <label class="modal-primary-button" for="advanced-modal">
                Confirm
              </label>
            </div>
          </div>
        </div>
      </div>

      <p class="description" style="margin-top: 2rem">
        This demo shows a CSS-only modal component with animated overlay,
        centered dialog panel, and close button.
      </p>
    </div>
  </body>
</html>
