<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Orbit Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="ease-popover-floating-orbit">

        <button class="popover-btn" aria-label="Open Popover">
            +
        </button>

        <div class="popover-card">

            <h3>Quick Actions</h3>

            <p>
                A floating glassmorphism popover built with pure HTML & CSS.
            </p>

            <div class="actions">
                <button>Profile</button>
                <button>Projects</button>
                <button>Settings</button>
            </div>

        </div>

    </div>

</div>

</body>
</html>
