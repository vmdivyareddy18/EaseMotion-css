<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Toggle Switch - EaseMotion CSS</title>
  
  <!-- Load Core EaseMotion CSS so we have fonts and variables -->
  <link rel="stylesheet" href="../../../easemotion.css">
  
  <!-- Load our custom styles for this feature -->
  <link rel="stylesheet" href="style.css">

  <style>
    /* Demo presentation layout - you don't need to add this to the actual framework */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      gap: 2rem;
    }
  </style>
</head>
<body>

  <div class="ease-fade-in">
    <h2>EaseMotion Toggle Switch</h2>
    
    <div class="ease-flex ease-flex-col ease-gap-4">
      <!-- Default Toggle -->
      <label class="ease-toggle">
        <input type="checkbox" class="ease-toggle-input">
        <span class="ease-toggle-slider"></span>
        Notifications
      </label>

      <!-- Pre-checked Toggle -->
      <label class="ease-toggle">
        <input type="checkbox" class="ease-toggle-input" checked>
        <span class="ease-toggle-slider"></span>
        Dark Mode
      </label>
    </div>
  </div>

</body>
</html>
