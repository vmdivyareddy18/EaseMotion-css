<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>floating-contact-card Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-contact-card">
  <div class="ease-contact-card__avatar-wrap">
    <div class="ease-contact-card__avatar">JD</div>
    <span class="ease-contact-card__status"></span>
  </div>

  <h3 class="ease-contact-card__name">Jamie Diaz</h3>
  <p class="ease-contact-card__role">Product Designer</p>

  <div class="ease-contact-card__socials">
    <a href="#" class="ease-contact-card__social" aria-label="Twitter">𝕏</a>
    <a href="#" class="ease-contact-card__social" aria-label="LinkedIn">in</a>
    <a href="#" class="ease-contact-card__social" aria-label="Email">✉</a>
  </div>

  <button class="ease-contact-card__cta">Contact Me</button>
</div>

</body>
</html>
