<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline Zoom Control Strip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Timeline controls</p>
      <h1 id="demo-title">Zoom control strip</h1>
      <p>A segmented control for switching a timeline between day, week, month, and quarter views.</p>
    </section>
    <section class="demo-grid" aria-label="Timeline Zoom Control Strip">
        <div class="segment-strip" role="group"><button type="button">Day</button><button type="button" class="is-active">Week</button><button type="button">Month</button><button type="button">Quarter</button></div>
        <div class="segment-strip" role="group"><button type="button">Hourly</button><button type="button" class="is-active">Daily</button><button type="button">Weekly</button><button type="button">Monthly</button></div>
    </section>
  </main>
</body>
</html>
