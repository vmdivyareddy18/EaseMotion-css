<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flip Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scene-qn">
        <div class="card-qn">
            <!-- Front Face -->
            <div class="card-face card-front-qn">
                <h2>Hover Me</h2>
                <p>Discover what's on the other side.</p>
            </div>
            <!-- Back Face -->
            <div class="card-face card-back-qn">
                <h2>The Back!</h2>
                <p>This is a pure CSS 3D flip effect. No JavaScript required.</p>
                <button class="flip-btn-qn">Learn More</button>
            </div>
        </div>
    </div>
</body>
</html>
