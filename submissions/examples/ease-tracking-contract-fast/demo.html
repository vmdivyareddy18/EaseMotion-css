<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Tracking Contract Fast - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="ease-track-fast">SNAP HEADLINE</h1>
        <button onclick="let h=document.querySelector('h1'); h.classList.remove('ease-track-fast'); void h.offsetWidth; h.classList.add('ease-track-fast');">Snap Text</button>
    </div>
</body>
</html>
