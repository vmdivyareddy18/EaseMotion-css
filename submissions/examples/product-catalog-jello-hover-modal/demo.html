<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Jello Hover Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="catalog">

    <div class="product-card">

        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
             alt="Wireless Headphones">

        <h2>Wireless Headphones</h2>

        <p class="price">$99.99</p>

        <a href="#productModal" class="view-btn">
            View Product
        </a>

    </div>

</div>

<div id="productModal" class="overlay">

    <div class="modal" tabindex="0">

        <a href="#" class="close-btn">&times;</a>

        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500"
             alt="Wireless Headphones">

        <h2>Wireless Headphones</h2>

        <p>
            Premium wireless headphones with active noise cancellation,
            Bluetooth 5.3 and 30-hour battery life.
        </p>

        <h3>$99.99</h3>

        <button>Add to Cart</button>

    </div>

</div>

</body>
</html>
