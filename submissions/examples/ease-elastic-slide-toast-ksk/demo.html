<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic-Slide Toast Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Hidden Checkbox Trigger -->
  <input type="checkbox" id="toast-trigger" class="toast-checkbox">

  <!-- Main Showcase Container -->
  <div class="demo-page" id="app-root">

    <div class="demo-card">
      <h1 class="demo-title">Elastic-Slide Toast</h1>
      <p class="demo-desc">
        Click the button below to display the toast alert. The alert slides in elastically from the right edge of the screen.
      </p>

      <div style="display:flex;gap:12px;justify-content:center;">
        <label for="toast-trigger" class="demo-btn" role="button" tabindex="0">
          Trigger Toast Alert
        </label>
        
        <button class="demo-btn" id="themeBtn" style="background:rgba(255,255,255,0.06);color:inherit;border:1px solid var(--ease-toast-border);">
          Toggle Theme
        </button>
      </div>
    </div>

  </div>

  <!-- Toast Notification fixed bottom-right -->
  <div class="toast-container" role="alert" aria-live="polite">
    <div class="ease-toast">
      <div class="toast-body">
        <span class="toast-text">🚀 Project saved successfully!</span>
        <label for="toast-trigger" class="toast-close" role="button" aria-label="Dismiss Alert">&times;</label>
      </div>
    </div>
  </div>

  <script>
    // Theme toggle helper
    const themeBtn = document.getElementById('themeBtn');
    const appRoot = document.getElementById('app-root');
    themeBtn.addEventListener('click', () => {
      appRoot.classList.toggle('light-theme');
      document.querySelector('.toast-container').classList.toggle('light-theme');
    });

    // Auto-dismiss simulation
    const checkbox = document.getElementById('toast-trigger');
    let timer = null;
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => checkbox.checked = false, 4000);
      }
    });
  </script>

</body>
</html>
