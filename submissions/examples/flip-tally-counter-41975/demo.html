<!DOCTYPE html>
<html 
    lang="en"
>
<head>
    <meta 
        charset="UTF-8"
    >
    <meta 
        name="viewport" 
        content="width=device-width, initial-scale=1.0"
    >
    <title>
        EaseMotion CSS - Space Variant Flip Tally Counter
    </title>
    
    <link 
        rel="preconnect" 
        href="https://fonts.googleapis.com"
    >
    <link 
        rel="preconnect" 
        href="https://fonts.gstatic.com" 
        crossorigin
    >
    <link 
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;600&display=swap" 
        rel="stylesheet"
    >
    <link 
        rel="stylesheet" 
        href="style.css"
    >
</head>
<body 
    class="ease-space-universe-body"
>

    <div 
        class="ease-space-starfield" 
        aria-hidden="true"
    >
        <div class="ease-starfield-layer ease-layer-alpha"></div>
        <div class="ease-starfield-layer ease-layer-beta"></div>
        <div class="ease-starfield-layer ease-layer-gamma"></div>
    </div>

    <div 
        class="ease-space-orbital-ring-system" 
        aria-hidden="true"
    >
        <div class="ease-orbital-ring ease-ring-primary"></div>
        <div class="ease-orbital-ring ease-ring-secondary"></div>
        <div class="ease-orbital-ring ease-ring-tertiary"></div>
    </div>

    <main 
        class="ease-cosmic-workspace-shell" 
        role="main"
    >
        
        <header 
            class="ease-cosmic-header ease-slide-up"
        >
            <span 
                class="ease-cosmic-badge"
            >
                STATION_CONTROL_OS_v4.19
            </span>
            <h1 
                class="ease-cosmic-main-heading"
            >
                Telemetry Dashboard
            </h1>
        </header>

        <section 
            class="ease-flip-tally-component-card ease-card ease-fade-in"
            aria-labelledby="counter-system-label-id"
        >
            
            <div 
                class="ease-counter-label-wrapper"
            >
                <div 
                    class="ease-beacon-pulse" 
                    aria-hidden="true"
                ></div>
                <h2 
                    id="counter-system-label-id" 
                    class="ease-counter-system-main-label"
                >
                    Mission Count
                </h2>
            </div>

            <div 
                class="ease-split-flap-digits-board"
                aria-label="Split flap numeric readout displaying dynamic telemetry metrics"
            >
                
                <div 
                    class="ease-split-flap-digit-slot ease-digit-stagger-1"
                >
                    <div class="ease-flap-face-half ease-flap-top">
                        <span class="ease-flap-number-glyph">0</span>
                    </div>
                    <div class="ease-flap-face-half ease-flap-bottom">
                        <span class="ease-flap-number-glyph">0</span>
                    </div>
                    <div class="ease-flap-hinge-bar"></div>
                </div>

                <div 
                    class="ease-split-flap-digit-slot ease-digit-stagger-2"
                >
                    <div class="ease-flap-face-half ease-flap-top">
                        <span class="ease-flap-number-glyph">4</span>
                    </div>
                    <div class="ease-flap-face-half ease-flap-bottom">
                        <span class="ease-flap-number-glyph">4</span>
                    </div>
                    <div class="ease-flap-hinge-bar"></div>
                </div>

                <div 
                    class="ease-split-flap-digit-slot ease-digit-stagger-3"
                >
                    <div class="ease-flap-face-half ease-flap-top">
                        <span class="ease-flap-number-glyph">1</span>
                    </div>
                    <div class="ease-flap-face-half ease-flap-bottom">
                        <span class="ease-flap-number-glyph">1</span>
                    </div>
                    <div class="ease-flap-hinge-bar"></div>
                </div>

                <div 
                    class="ease-split-flap-digit-slot ease-digit-stagger-4"
                >
                    <div class="ease-flap-face-half ease-flap-top">
                        <span class="ease-flap-number-glyph">9</span>
                    </div>
                    <div class="ease-flap-face-half ease-flap-bottom">
                        <span class="ease-flap-number-glyph">9</span>
                    </div>
                    <div class="ease-flap-hinge-bar"></div>
                </div>

            </div>

            <p 
                class="ease-telemetry-status-readout"
            >
                SYSTEM_MODE: [CONTINUOUS_FLAP_AUTOCYCLE] // LOCALIZATION_BEACON: ONLINE
            </p>

            <div 
                class="ease-tally-control-toolbar"
            >
                <button 
                    type="button" 
                    class="ease-cosmic-btn ease-btn-action-primary ease-hover-grow ease-focus-ring"
                    aria-label="Simulate calculation step increment tracking"
                >
                    <span class="ease-btn-glow-layer"></span>
                    <span class="ease-btn-inner-text">INCREMENT_METRIC</span>
                </button>
                
                <button 
                    type="button" 
                    class="ease-cosmic-btn ease-btn-action-secondary ease-hover-grow ease-focus-ring"
                    aria-label="Simulate tally register structural flush reset execution parameters"
                >
                    <span class="ease-btn-inner-text">RESET_BOARD</span>
                </button>
            </div>

        </section>

        <footer 
            class="ease-cosmic-footer" 
            role="contentinfo"
        >
            <p>
                EaseMotion CSS Pipeline Asset • Issue Submission System #41975
            </p>
        </footer>

    </main>

</body>
</html>
