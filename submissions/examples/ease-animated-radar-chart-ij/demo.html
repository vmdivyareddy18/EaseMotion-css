<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Radar Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Animated Radar Chart</h1>
    <p class="subtitle">Spider chart with animated data fill</p>
    <div class="radar-wrapper">
      <div class="radar-chart" id="radarChart">
        <div class="radar-labels">
          <span class="label" style="top: -10px; left: 50%;">Speed</span>
          <span class="label" style="top: 22%; right: -20px;">Power</span>
          <span class="label" style="bottom: 10%; right: -10px;">Endurance</span>
          <span class="label" style="bottom: -10px; left: 50%;">Agility</span>
          <span class="label" style="bottom: 10%; left: -10px;">Defense</span>
          <span class="label" style="top: 22%; left: -20px;">Skill</span>
        </div>
      </div>
    </div>
    <button id="replayBtn" class="replay-btn">Replay Animation</button>
    <div class="chart-legend">
      <span class="legend-item"><span class="legend-dot" style="background: var(--radar-fill-color, #6366f1)"></span> Current Stats</span>
    </div>
  </div>
  <script>
    const chart = document.getElementById('radarChart');
    const replayBtn = document.getElementById('replayBtn');
    function triggerAnimation() {
      chart.classList.remove('animate');
      void chart.offsetWidth;
      chart.classList.add('animate');
    }
    triggerAnimation();
    replayBtn.addEventListener('click', triggerAnimation);
  </script>
</body>
</html>
