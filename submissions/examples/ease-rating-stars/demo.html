<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rating Stars - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Rating Stars</h1>
      <p>Interactive star rating using the pure CSS right-to-left sibling trick.</p>
    </header>

    <main class="demo-grid">
      <section class="demo-card">
        <h2>Rate this Component</h2>
        <p class="instruction">Hover and click to lock in your rating.</p>
        
        <div class="rating-container">
          
          <!-- Notice: The HTML is backwards (5 to 1) for the CSS sibling trick! -->
          <div class="ease-rating-stars">
            
            <input type="radio" id="star5" name="rating" value="5" class="ease-rating-input" />
            <label for="star5" class="ease-rating-label" aria-label="5 stars">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </label>

            <input type="radio" id="star4" name="rating" value="4" class="ease-rating-input" />
            <label for="star4" class="ease-rating-label" aria-label="4 stars">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </label>

            <input type="radio" id="star3" name="rating" value="3" class="ease-rating-input" />
            <label for="star3" class="ease-rating-label" aria-label="3 stars">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </label>

            <input type="radio" id="star2" name="rating" value="2" class="ease-rating-input" />
            <label for="star2" class="ease-rating-label" aria-label="2 stars">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </label>

            <input type="radio" id="star1" name="rating" value="1" class="ease-rating-input" />
            <label for="star1" class="ease-rating-label" aria-label="1 star">
              <svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
              </svg>
            </label>

          </div>

          <div class="rating-value" id="rating-output">Rating: 0/5</div>
        </div>
        
      </section>
    </main>
  </div>

  <script>
    // Just a tiny script to show the selected value in the UI
    const inputs = document.querySelectorAll('.ease-rating-input');
    const output = document.getElementById('rating-output');

    inputs.forEach(input => {
      input.addEventListener('change', (e) => {
        output.textContent = `Rating: ${e.target.value}/5`;
      });
    });
  </script>
</body>
</html>
