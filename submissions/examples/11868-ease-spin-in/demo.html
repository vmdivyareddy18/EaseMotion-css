<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-spin-in - Entrance Reveal</title>
  <meta name="description" content="A demonstration of the ease-spin-in utility animation showing an element rotating 360 degrees while scaling and fading in.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-spin-in</h1>
      <p class="subtitle" id="main-desc">Spins 360° while fading in and scaling up</p>
    </header>

    <div class="display-area">
      <!-- Target that spins in -->
      <div class="spin-target ease-spin-in" id="target-element" aria-label="Animated success badge">
        <span>✓</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Entrance</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      // Remove class to reset animation
      target.classList.remove('ease-spin-in');
      // Trigger reflow to restart animation
      void target.offsetWidth;
      // Re-add class
      target.classList.add('ease-spin-in');
    }
  </script>

</body>
</html>
