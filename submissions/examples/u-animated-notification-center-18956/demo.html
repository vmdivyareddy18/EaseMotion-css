<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Notification Center</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">
    <div class="notification-center">

        <div class="header">
            <h1>Notifications</h1>
            <span class="count">8 New</span>
        </div>

        <div class="notification-card unread">
            <span class="dot"></span>
            <div class="content">
                <h3>New Message</h3>
                <p>You received a message from Sarah.</p>
                <span class="time">2 min ago</span>
            </div>
        </div>

        <div class="notification-card unread">
            <span class="dot"></span>
            <div class="content">
                <h3>Project Updated</h3>
                <p>Your team uploaded new files.</p>
                <span class="time">10 min ago</span>
            </div>
        </div>

        <div class="notification-card">
            <div class="content">
                <h3>Task Completed</h3>
                <p>Deployment finished successfully.</p>
                <span class="time">30 min ago</span>
            </div>
        </div>

        <div class="notification-card">
            <div class="content">
                <h3>Meeting Reminder</h3>
                <p>Design review starts in 15 minutes.</p>
                <span class="time">1 hour ago</span>
            </div>
        </div>

    </div>
</div>

</body>
</html>
