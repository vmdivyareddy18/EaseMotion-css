<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Backdrop Blur MD Utility | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="blur-demo-page">
  <main class="blur-wrapper">
    <header class="blur-header">
      <h1 class="blur-title">Backdrop Blur MD</h1>
      <p class="blur-subtitle">Utility class <code>.backdrop-blur-md</code> proposed for medium frosted glass effects.</p>
    </header>

    <section class="blur-showcase">
      <!-- Background image container to demonstrate blur -->
      <div class="blur-container">
        <!-- Floating glass card -->
        <article class="glass-card backdrop-blur-md">
          <h3>Frosted Glass Card</h3>
          <p>This card utilizes the <code>.backdrop-blur-md</code> utility which applies an 8px blur radius to the content behind it.</p>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
