<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Hospital Patient Monitoring Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="patient-card">

        <div class="badge">
            🏥 Patient Monitoring
        </div>

        <h2>ICU Patient Dashboard</h2>

        <p class="description">
            Monitor patient vital signs, medication schedule, and recovery status in real time.
        </p>

        <div class="stats-grid">

            <div class="stat-box">
                <h3>78 BPM</h3>
                <p>Heart Rate</p>
            </div>

            <div class="stat-box">
                <h3>98%</h3>
                <p>Oxygen Level</p>
            </div>

            <div class="stat-box">
                <h3>120/80</h3>
                <p>Blood Pressure</p>
            </div>

            <div class="stat-box">
                <h3>37°C</h3>
                <p>Body Temperature</p>
            </div>

        </div>

        <div class="progress-section">

            <div class="progress-header">
                <span>Recovery Progress</span>
                <span>81%</span>
            </div>

            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>

        </div>

        <div class="status-card">
            ✅ Patient condition is stable. Next medication in 2 hours.
        </div>

        <div class="button-group">

            <button class="primary-btn">
                View Medical Report
            </button>

            <button class="secondary-btn">
                Medication Schedule
            </button>

        </div>

    </div>

</div>

</body>
</html>
