<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-scanline demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0d1117; gap: 2rem; }
    .card {
      width: 180px; height: 180px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: #58a6ff; font-size: 0.9rem; cursor: default;
    }
  </style>
</head>
<body>
  <div class="card ease-scanline">Hover to scan</div>
  <div class="card ease-scanline">System ready</div>
</body>
</html>
