<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Glow Pulsation Demo</title>
    <style>
        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        @keyframes neonPluse {
            0%, 100% {
                box-shadow:
                  0 0 5px #0ff,
                  0 0 10px #0ff,
                  0 0 20px #0ff;
            }
            50% {
                box-shadow:
                0 0 10px #0ff,
                0 0 25px #0ff,
                0 0 50px #0ff;
            }
        }

        .neon-glow-pulse {
          border: 2px solid #0ff;
          border-radius: 8px;
          animation: neonPluse 2s ease-in-out infinite;
          padding: 30px 60px;
          color: #0ff;
          font-family: sans-serif;
          font-size: 1.5rem;
          background: transparent;
        }
      </style>
</head>
<body>
    <div class="neon-glow-pulse">Neon Glow Pulsation</div>
</body>
</html>
