<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Cursor Spotlight Grid Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #030712;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="spotlight-grid" id="grid">
    <div class="spotlight-card">
      <div class="spotlight-card-content">
        <h4>Compute Engine</h4>
        <p>Dynamic workload allocation with serverless VM orchestration.</p>
      </div>
    </div>
    
    <div class="spotlight-card">
      <div class="spotlight-card-content">
        <h4>Relational Storage</h4>
        <p>Globally distributed database clustering with ACID support.</p>
      </div>
    </div>
    
    <div class="spotlight-card">
      <div class="spotlight-card-content">
        <h4>Network Grid</h4>
        <p>Optimized low-latency mesh configuration with advanced edge routing.</p>
      </div>
    </div>
  </div>

  <script>
    const cards = document.querySelectorAll('.spotlight-card');
    
    document.getElementById('grid').onmousemove = e => {
      for(const card of cards) {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        card.style.setProperty('--mouse-x', `${x}px`);
        card.style.setProperty('--mouse-y', `${y}px`);
      }
    }
  </script>
</body>
</html>
