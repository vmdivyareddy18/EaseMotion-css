<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backdrop Blur MD - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="background-art"></div>
    <div class="bg-art-2"></div>
    <h1>ease-backdrop-blur-md</h1>
    <p class="subtitle">Medium backdrop blur (12px) for glassmorphism effects</p>

    <div class="glass-card">
      <h2>Glassmorphism Card</h2>
      <p>This card uses <code>backdrop-filter: blur(12px)</code> to create a frosted glass effect. The blurred background layers behind it make the effect visible.</p>
      <span class="badge">ease-backdrop-blur-md</span>
    </div>

    <div class="demo-grid">
      <div class="card no-blur">
        <div class="icon">🪟</div>
        <div class="label">No Blur</div>
      </div>
      <div class="card with-blur">
        <div class="icon">✨</div>
        <div class="label">With Blur(12px)</div>
      </div>
    </div>
  </div>
</body>
</html>
