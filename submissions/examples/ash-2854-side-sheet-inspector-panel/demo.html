<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Side Sheet Inspector Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="workspace">

    <div class="content-area">

        <h1>Project Dashboard</h1>

        <p>
            Select an item to inspect its properties.
        </p>

        <div class="item-card">
            Selected Component: Marketing Banner
        </div>

    </div>

    <aside class="inspector-panel">

        <div class="panel-header">

            <h2>Inspector</h2>

            <span class="status">
                Active
            </span>

        </div>

        <div class="section">

            <label>Component Name</label>

            <input
                type="text"
                value="Marketing Banner"
            >

        </div>

        <div class="section">

            <label>Status</label>

            <select>
                <option>Published</option>
                <option>Draft</option>
            </select>

        </div>

        <div class="section">

            <label>Description</label>

            <textarea rows="4">
Homepage promotional banner
            </textarea>

        </div>

        <button class="save-btn">
            Save Changes
        </button>

    </aside>

</div>

</body>
</html>
