<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Glitch Text Animation Demo</title>
  
  <!-- Tailwind CSS Play CDN for quick mock styling -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <style>
    .glitch-text {
      position: relative;
      color: currentColor;
    }

    /* Pseudo-elements for the RGB Split channels */
    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      clip-path: inset(0 0 100% 0);
    }

    /* Red/Cyan shift channel */
    .glitch-text::before {
      left: -2px;
      text-shadow: 2px 0 #ff00c1;
      mix-blend-mode: screen;
    }

    /* Blue/Yellow shift channel */
    .glitch-text::after {
      left: 2px;
      text-shadow: -2px 0 #00fff0;
      mix-blend-mode: screen;
    }

    /* Timings & Speeds */
    .glitch-speed-fast::before, .glitch-speed-fast::after { animation-duration: 0.8s; }
    .glitch-speed-medium::before, .glitch-speed-medium::after { animation-duration: 1.5s; }
    .glitch-speed-slow::before, .glitch-speed-slow::after { animation-duration: 2.5s; }

    /* Trigger States: Infinite Behavior */
    .glitch-infinite::before {
      animation: glitch-anim-1 ease-in-out infinite alternate-reverse;
    }
    .glitch-infinite::after {
      animation: glitch-anim-2 ease-in-out infinite alternate-reverse;
    }

    /* Trigger States: Hover Behavior */
    .glitch-hover:hover::before {
      animation: glitch-anim-1 ease-in-out infinite alternate-reverse;
    }
    .glitch-hover:hover::after {
      animation: glitch-anim-2 ease-in-out infinite alternate-reverse;
    }

    /* High-Fidelity Easing Keyframes */
    @keyframes glitch-anim-1 {
      0% { clip-path: inset(20% 0 60% 0); transform: skewX(1deg) translateX(-2px); }
      15% { clip-path: inset(80% 0 5% 0); transform: skewX(3deg) translateX(1px); }
      30% { clip-path: inset(45% 0 35% 0); transform: skewX(-2deg) translateX(-1px); }
      45% { clip-path: inset(12% 0 70% 0); transform: skewX(4deg) translateX(2px); }
      60% { clip-path: inset(90% 0 2% 0); transform: skewX(-1deg) translateX(0px); }
      75% { clip-path: inset(5% 0 85% 0); transform: skewX(2deg) translateX(-2px); }
      90% { clip-path: inset(60% 0 10% 0); transform: skewX(-3deg) translateX(1px); }
      100% { clip-path: inset(35% 0 50% 0); transform: skewX(0deg) translateX(0px); }
    }

    @keyframes glitch-anim-2 {
      0% { clip-path: inset(70% 0 15% 0); transform: skewX(-2deg) translateX(2px); }
      20% { clip-path: inset(15% 0 75% 0); transform: skewX(1deg) translateX(-1px); }
      40% { clip-path: inset(85% 0 5% 0); transform: skewX(-4deg) translateX(2px); }
      60% { clip-path: inset(30% 0 50% 0); transform: skewX(2deg) translateX(-2px); }
      80% { clip-path: inset(55% 0 35% 0); transform: skewX(-1deg) translateX(1px); }
      100% { clip-path: inset(10% 0 80% 0); transform: skewX(3deg) translateX(2px); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col items-center justify-center font-sans p-6 gap-12">

  <div class="text-center space-y-2">
    <h1 class="text-xs font-mono uppercase tracking-widest text-slate-500">Component Showcase</h1>
    <p class="text-sm text-slate-400">Ease Glitch Text Animation (#43109)</p>
  </div>

  <!-- Showcase Cards Container -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl w-full">
    
    <!-- Variant 1: Hover Driven -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-8 flex flex-col items-center justify-center gap-6 text-center">
      <span class="text-xs font-mono text-slate-500 uppercase tracking-wider">Hover Variant (Medium Speed)</span>
      
      <div class="relative inline-block select-none font-bold tracking-wider text-purple-400 text-4xl font-black">
        <span class="glitch-text glitch-hover glitch-speed-medium block relative" data-text="HOVER ME">
          HOVER ME
        </span>
      </div>
    </div>

    <!-- Variant 2: Infinite Loop -->
    <div class="bg-slate-900 border border-slate-800 rounded-xl p-8 flex flex-col items-center justify-center gap-6 text-center">
      <span class="text-xs font-mono text-slate-500 uppercase tracking-wider">Infinite Variant (Fast Speed)</span>
      
      <div class="relative inline-block select-none font-bold tracking-wider text-cyan-400 text-4xl font-mono">
        <span class="glitch-text glitch-infinite glitch-speed-fast block relative" data-text="SYSTEM_ERR">
          SYSTEM_ERR
        </span>
      </div>
    </div>

  </div>

  <div class="text-xs font-mono text-slate-600">
    Double-click the HTML file to view transitions directly in your local desktop sandbox.
  </div>

</body>
</html>
