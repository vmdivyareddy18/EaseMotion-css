<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stopwatch – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="stopwatch-wrapper">
    <div class="stopwatch" role="timer" aria-label="Stopwatch with sweeping second hand">
      <div class="tick major"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick major"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="tick"></div>
      <div class="second-hand"></div>
      <div class="center-dot"></div>
    </div>
    <span class="stopwatch-title">Stopwatch</span>
  </div>
</body>
</html>
