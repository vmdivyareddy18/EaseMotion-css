<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spring Physics Tooltip</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <button class="tooltip-btn" aria-describedby="tooltip">
    Hover or Focus
    <span class="tooltip" id="tooltip" role="tooltip">
      This action is accessible and keyboard-friendly.
    </span>
  </button>
</div>

</body>
</html>
