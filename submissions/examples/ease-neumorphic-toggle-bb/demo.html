<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Soft Toggle Switch Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #e0e5ec;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
      color: #313b4c;
    }
    p {
      margin-top: 30px;
      font-weight: 600;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="toggle-wrapper">
    <input type="checkbox" id="toggle" class="neumorphic-toggle-input">
    <label for="toggle" class="neumorphic-toggle-label">
      <span class="neumorphic-toggle-switch"></span>
    </label>
  </div>
  <p>Neumorphic Soft UI Toggle Switch</p>
</body>
</html>
