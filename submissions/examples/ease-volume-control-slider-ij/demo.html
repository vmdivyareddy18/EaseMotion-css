<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volume Control Slider</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="vcs-container">
    <h1>Volume Control</h1>
    <div class="vcs-icon-wrap">
      <svg viewBox="0 0 80 80" class="vcs-icon" id="icon" fill="none">
        <path d="M28 32H18a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10l12 10V22L28 32z" fill="currentColor"/>
        <path class="vcs-wave vcs-wave-1" d="M52 28a16 16 0 0 1 0 24" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path class="vcs-wave vcs-wave-2" d="M58 22a24 24 0 0 1 0 36" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <path class="vcs-wave vcs-wave-3" d="M64 16a32 32 0 0 1 0 48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        <g class="vcs-x">
          <line x1="42" y1="32" x2="58" y2="48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          <line x1="58" y1="32" x2="42" y2="48" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div class="vcs-slider-wrap">
      <div class="vcs-track"></div>
      <div class="vcs-fill" id="fill"></div>
      <div class="vcs-thumb" id="thumb"></div>
      <input type="range" id="slider" min="0" max="100" value="75">
    </div>
    <div class="vcs-percentage" id="percentage">75%</div>
    <button class="vcs-mute-btn" id="muteBtn">Mute</button>
  </div>
  <script>
    const slider = document.getElementById('slider');
    const fill = document.getElementById('fill');
    const thumb = document.getElementById('thumb');
    const percentage = document.getElementById('percentage');
    const muteBtn = document.getElementById('muteBtn');
    const icon = document.getElementById('icon');
    let isMuted = false;
    let prevVolume = 75;

    function updateSlider(val) {
      const v = parseInt(val);
      fill.style.width = v + '%';
      thumb.style.left = v + '%';
      percentage.textContent = v + '%';
      updateIcon(v);
    }

    function updateIcon(v) {
      icon.classList.remove('level-0', 'level-1', 'level-2', 'level-3', 'muted');

      if (isMuted) {
        icon.classList.add('muted');
        return;
      }

      if (v === 0) {
        icon.classList.add('level-0');
      } else if (v <= 33) {
        icon.classList.add('level-1');
      } else if (v <= 66) {
        icon.classList.add('level-2');
      } else {
        icon.classList.add('level-3');
      }
    }

    slider.addEventListener('input', () => {
      if (isMuted) {
        isMuted = false;
        muteBtn.textContent = 'Mute';
        muteBtn.classList.remove('muted');
      }
      prevVolume = parseInt(slider.value);
      updateSlider(slider.value);
    });

    muteBtn.addEventListener('click', () => {
      isMuted = !isMuted;
      if (isMuted) {
        muteBtn.textContent = 'Unmute';
        muteBtn.classList.add('muted');
        slider.value = 0;
        updateSlider(0);
      } else {
        muteBtn.textContent = 'Mute';
        muteBtn.classList.remove('muted');
        slider.value = prevVolume;
        updateSlider(prevVolume);
      }
    });

    updateSlider(75);
  </script>
</body>
</html>
