<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-light-speed-in-right</title>
  <meta name="description" content="A demonstration of the ease-light-speed-in-right animation showing an element blasting in from the right at high speed with skew and motion blur.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-light-speed-in-right</h1>
      <p class="subtitle" id="main-desc">Blasts in from the right at high speed (0.3s) with skew and motion blur</p>
    </header>

    <div class="display-area">
      <!-- Target that blasts in -->
      <div class="speed-target ease-light-speed-in-right" id="target-element">
        <span>Light Speed</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Entrance</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-light-speed-in-right');
      void target.offsetWidth;
      target.classList.add('ease-light-speed-in-right');
    }
  </script>

</body>
</html>
