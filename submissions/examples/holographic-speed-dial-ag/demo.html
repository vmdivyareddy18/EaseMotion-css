<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Speed Dial - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Showcase Page Layout */
      body {
        margin: 0;
        min-height: 100vh;
        background: #030712;
        color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        transition:
          background 300ms ease,
          color 300ms ease;
      }

      /* Subtle holographic grid background */
      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        background-position: center;
        pointer-events: none;
        z-index: 0;
      }

      html[data-theme="light"] body {
        background: #f8fafc;
        color: #0f172a;
      }

      html[data-theme="light"] body::before {
        background-image:
          linear-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      }

      .showcase-container {
        position: relative;
        width: 320px;
        height: 520px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(15, 23, 42, 0.4);
        box-shadow:
          0 24px 64px -16px rgba(0, 0, 0, 0.7),
          0 0 1px 1px rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px;
        box-sizing: border-box;
        z-index: 1;
        transition:
          background 300ms ease,
          border 300ms ease,
          box-shadow 300ms ease;
      }

      html[data-theme="light"] .showcase-container {
        border-color: rgba(0, 0, 0, 0.08);
        background: rgba(255, 255, 255, 0.5);
        box-shadow:
          0 24px 64px -16px rgba(108, 99, 255, 0.12),
          0 0 1px 1px rgba(0, 0, 0, 0.03);
      }

      .showcase-header {
        text-align: center;
      }

      .showcase-badge {
        display: inline-block;
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 2px;
        background: rgba(0, 240, 255, 0.12);
        color: #00f0ff;
        padding: 4px 10px;
        border-radius: 99px;
        font-weight: 800;
        margin-bottom: 12px;
        border: 1px solid rgba(0, 240, 255, 0.2);
        text-shadow: 0 0 8px rgba(0, 240, 255, 0.4);
      }

      html[data-theme="light"] .showcase-badge {
        background: rgba(108, 99, 255, 0.1);
        color: #6c63ff;
        border-color: rgba(108, 99, 255, 0.2);
        text-shadow: none;
      }

      .showcase-title {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 800;
        letter-spacing: -0.25px;
      }

      .showcase-desc {
        margin: 6px 0 0 0;
        font-size: 11px;
        color: #94a3b8;
        line-height: 1.5;
      }

      html[data-theme="light"] .showcase-desc {
        color: #475569;
      }

      .showcase-hint {
        text-align: center;
        font-size: 11px;
        color: #64748b;
        margin-bottom: 40px;
      }

      html[data-theme="light"] .showcase-hint {
        color: #94a3b8;
      }

      /* Fixed Controls */
      .theme-btn {
        position: absolute;
        top: 24px;
        left: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #f8fafc;
        border-radius: 99px;
        padding: 8px 16px;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
        backdrop-filter: blur(12px);
        transition: all 200ms ease;
        z-index: 10;
      }

      html[data-theme="light"] .theme-btn {
        border-color: rgba(0, 0, 0, 0.1);
        background: rgba(0, 0, 0, 0.05);
        color: #0f172a;
      }

      .theme-btn:hover {
        background: rgba(255, 255, 255, 0.15);
        transform: translateY(-1px);
      }

      html[data-theme="light"] .theme-btn:hover {
        background: rgba(0, 0, 0, 0.08);
      }

      .speed-dial-anchor {
        align-self: flex-end;
      }
    </style>
  </head>
  <body>
    <!-- Theme Toggle Switch -->
    <button class="theme-btn" aria-label="Toggle visual theme">
      THEME: DARK
    </button>

    <!-- Component Container Window -->
    <div class="showcase-container">
      <div class="showcase-header">
        <span class="showcase-badge">Holographic</span>
        <h1 class="showcase-title">Speed Dial Menu</h1>
        <p class="showcase-desc">
          Hover or focus the action trigger button in the bottom right corner to
          interact.
        </p>
      </div>

      <div class="showcase-hint">Supports Tab navigation & screen readers.</div>

      <!-- Holographic Speed Dial Component -->
      <div class="ease-hsd speed-dial-anchor">
        <div class="ease-hsd-container">
          <!-- Trigger Action FAB -->
          <button
            class="ease-hsd-trigger"
            aria-haspopup="true"
            aria-expanded="false"
            aria-label="Expand action items"
          >
            <span class="ease-hsd-trigger-icon" aria-hidden="true">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="22"
                height="22"
              >
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
            </span>
          </button>

          <!-- Staggered Speed Dial Menu Stack -->
          <div class="ease-hsd-menu" role="menu">
            <!-- Wishlist Button -->
            <button
              class="ease-hsd-action"
              role="menuitem"
              style="--hsd-delay: 1"
              aria-label="Add product to wishlist"
            >
              <span class="ease-hsd-tooltip">Wishlist</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
              >
                <path
                  d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"
                />
              </svg>
            </button>

            <!-- Compare Button -->
            <button
              class="ease-hsd-action"
              role="menuitem"
              style="--hsd-delay: 2"
              aria-label="Compare with other products"
            >
              <span class="ease-hsd-tooltip">Compare</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
              >
                <path d="m16 3 4 4-4 4M20 7H4M8 21l-4-4 4-4M4 17h16" />
              </svg>
            </button>

            <!-- Share Button -->
            <button
              class="ease-hsd-action"
              role="menuitem"
              style="--hsd-delay: 3"
              aria-label="Share product details"
            >
              <span class="ease-hsd-tooltip">Share</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
              >
                <circle cx="18" cy="5" r="3" />
                <circle cx="6" cy="12" r="3" />
                <circle cx="18" cy="19" r="3" />
                <path d="m8.59 13.51 6.83 3.98M15.41 6.51l-6.82 3.98" />
              </svg>
            </button>

            <!-- Support Button -->
            <button
              class="ease-hsd-action"
              role="menuitem"
              style="--hsd-delay: 4"
              aria-label="Contact customer support"
            >
              <span class="ease-hsd-tooltip">Support</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
              >
                <path
                  d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                />
              </svg>
            </button>

            <!-- Checkout Button -->
            <button
              class="ease-hsd-action"
              role="menuitem"
              style="--hsd-delay: 5"
              aria-label="Proceed to express checkout"
            >
              <span class="ease-hsd-tooltip">Checkout</span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                width="18"
                height="18"
              >
                <circle cx="8" cy="21" r="1" />
                <circle cx="19" cy="21" r="1" />
                <path
                  d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Script to toggle data-theme attribute and update ARIA states -->
    <script>
      const themeBtn = document.querySelector(".theme-btn");
      const htmlEl = document.documentElement;

      themeBtn.addEventListener("click", () => {
        const isDark = htmlEl.getAttribute("data-theme") === "dark";
        const nextTheme = isDark ? "light" : "dark";
        htmlEl.setAttribute("data-theme", nextTheme);
        themeBtn.textContent = `THEME: ${nextTheme.toUpperCase()}`;
      });

      // Update aria-expanded when opened/closed via hover or focus
      const hsdContainer = document.querySelector(".ease-hsd");
      const triggerBtn = document.querySelector(".ease-hsd-trigger");

      const setExpanded = (expanded) => {
        triggerBtn.setAttribute("aria-expanded", expanded.toString());
      };

      hsdContainer.addEventListener("mouseenter", () => setExpanded(true));
      hsdContainer.addEventListener("mouseleave", () => {
        if (!hsdContainer.matches(":focus-within")) {
          setExpanded(false);
        }
      });

      hsdContainer.addEventListener("focusin", () => setExpanded(true));
      hsdContainer.addEventListener("focusout", () => {
        // Use timeout to check if the next focused element is still within the container
        setTimeout(() => {
          if (!hsdContainer.matches(":focus-within")) {
            setExpanded(false);
          }
        }, 10);
      });
    </script>
  </body>
</html>
