<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Scale Hover Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="checkout">

<div class="container">

<div class="badge">

Secure Checkout

</div>

<h1>

Checkout Tooltip

</h1>

<p>

A responsive scale-hover tooltip
crafted for modern e-commerce
checkout experiences with
shipping insights and payment
guidance.

</p>

<div class="tooltip-wrapper">

<button

class="trigger"

aria-describedby="tooltip"

>

Order Details

</button>

<div

id="tooltip"

class="tooltip"

role="tooltip"

>

<div class="icon">

🛒

</div>

<h3>

Free Shipping

</h3>

<p>

Orders above ₹999 qualify for
express delivery and premium
checkout support.

</p>

<span class="discount">

SAVE 20%

</span>

</div>

</div>

</div>

</section>

</body>

</html>
