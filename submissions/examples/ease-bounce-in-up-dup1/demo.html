<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bounce In Up Animation - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Bounce In Up</h1>
      <p>A buttery-smooth spring entrance animation perfect for mobile drawers, toasts, and modals.</p>
    </header>

    <main class="demo-content">
      <button class="demo-btn" id="replay-btn">Replay Animation</button>
    </main>

    <!-- The Element Being Animated -->
    <!-- We wrap it in an absolute container to simulate a mobile drawer -->
    <div class="drawer-container">
      <div class="drawer-panel ease-bounce-in-up" id="animated-element">
        <div class="drawer-handle"></div>
        <h3>Settings Drawer</h3>
        <p>This panel uses the <code>.ease-bounce-in-up</code> class to slide in from 120% below, naturally overshoot its target, and settle into place using a spring cubic-bezier curve.</p>
      </div>
    </div>

  </div>

  <script>
    const replayBtn = document.getElementById('replay-btn');
    const animatedElement = document.getElementById('animated-element');

    // Simple script to remove and re-add the class to replay the animation
    replayBtn.addEventListener('click', () => {
      animatedElement.classList.remove('ease-bounce-in-up');
      
      // Trigger a browser reflow so the removal registers
      void animatedElement.offsetWidth;
      
      animatedElement.classList.add('ease-bounce-in-up');
    });
  </script>
</body>
</html>
