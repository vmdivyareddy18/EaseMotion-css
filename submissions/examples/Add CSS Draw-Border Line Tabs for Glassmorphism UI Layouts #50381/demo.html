<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Draw-Border Tabs - Glassmorphism UI</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Abstract Vibrant Background for Glass Effect -->
  <div class="background-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="glass-layout">
    
    <div class="glass-header">
      <h2 class="glass-title">System Interface</h2>
      <p class="glass-subtitle">Authorized personnel only. Secure connection established.</p>
    </div>

    <!-- Hidden Radio State Inputs (Keyboard Accessible) -->
    <input type="radio" name="glass-tabs" id="tab-data" class="sr-only" checked>
    <input type="radio" name="glass-tabs" id="tab-network" class="sr-only">
    <input type="radio" name="glass-tabs" id="tab-security" class="sr-only">

    <!-- Glowing Draw-Border Tabs Nav -->
    <div class="glass-tabs-nav">
      <label for="tab-data" class="tab-btn" tabindex="0">Data Streams</label>
      <label for="tab-network" class="tab-btn" tabindex="0">Network Node</label>
      <label for="tab-security" class="tab-btn" tabindex="0">Security Firewalls</label>
    </div>

    <div class="glass-tabs-content">
      
      <!-- Panel 1: Data -->
      <div class="glass-panel panel-data">
        <h3 class="panel-title">Active Telemetry</h3>
        <div class="widget-grid">
          <div class="glass-widget">
            <span class="widget-label">Uplink Speed</span>
            <span class="widget-value">2.4 TB/s</span>
          </div>
          <div class="glass-widget">
            <span class="widget-label">Latency</span>
            <span class="widget-value">12 ms</span>
          </div>
          <div class="glass-widget">
            <span class="widget-label">Packet Loss</span>
            <span class="widget-value">0.001%</span>
          </div>
        </div>
        <div class="glass-chart-area">
          <div class="glow-line"></div>
        </div>
      </div>

      <!-- Panel 2: Network -->
      <div class="glass-panel panel-network">
        <h3 class="panel-title">Node Topography</h3>
        <div class="widget-grid">
          <div class="glass-widget">
            <span class="widget-label">Active Nodes</span>
            <span class="widget-value">1,402</span>
          </div>
          <div class="glass-widget">
            <span class="widget-label">Server Load</span>
            <span class="widget-value">42%</span>
          </div>
          <div class="glass-widget">
            <span class="widget-label">Topology</span>
            <span class="widget-value">Mesh</span>
          </div>
        </div>
      </div>

      <!-- Panel 3: Security -->
      <div class="glass-panel panel-security">
        <h3 class="panel-title">Firewall Status</h3>
        <div class="widget-grid" style="grid-template-columns: 1fr;">
          <div class="glass-widget" style="border-left: 4px solid #10b981; background: rgba(16, 185, 129, 0.05);">
            <span class="widget-label" style="color: #10b981;">Status: Optimal</span>
            <span class="widget-value">No breaches detected</span>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
