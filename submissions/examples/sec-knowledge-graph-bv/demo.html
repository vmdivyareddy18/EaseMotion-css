<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Security Knowledge Graph</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="fabric-dashboard">
    <header class="header">
      <span class="badge">Knowledge Graph</span>
      <h1>Universal Security Knowledge Graph</h1>
      <p class="subtitle">Unified query containers, knowledge graph link nodes, and audit catalog registries.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-query">
        <h3>🔍 Semantic Query Core</h3>
        <div class="search-box">
          <input type="text" placeholder="Query entities matching security clusters..." readonly>
          <button class="search-btn">Query</button>
        </div>

        <div class="graph-nodes">
          <div class="node"><span>Gateway IP</span></div>
          <div class="line"></div>
          <div class="node"><span>APT Cluster</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Metadata</h3>
          <ul class="stats-list">
            <li>Federated Nodes: <strong>94 Million</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
