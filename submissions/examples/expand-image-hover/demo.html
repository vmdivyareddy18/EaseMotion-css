<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Expand Image Hover — EaseMotion CSS Submission</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 24px;
      background: #f0f0f0;
      font-family: sans-serif;
      margin: 0;
    }

    .demo-hint {
      font-size: 14px;
      color: #888;
    }

    .demo-row {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .demo-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .demo-label {
      font-size: 12px;
      font-family: monospace;
      color: #555;
      background: #e2e2e2;
      padding: 2px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <p class="demo-hint">Hover over the images</p>

  <div class="demo-row">

    <div class="demo-cell">
      <div class="expand-image-hover" style="width: 240px;">
        <img src="https://picsum.photos/seed/forest/240/160" alt="Forest"/>
      </div>
      <span class="demo-label">.expand-image-hover</span>
    </div>

    <div class="demo-cell">
      <div class="expand-image-hover" style="width: 240px;">
        <img src="https://picsum.photos/seed/city/240/160" alt="City"/>
      </div>
      <span class="demo-label">.expand-image-hover</span>
    </div>

    <div class="demo-cell">
      <div class="expand-image-hover" style="width: 240px;">
        <img src="https://picsum.photos/seed/ocean/240/160" alt="Ocean"/>
      </div>
      <span class="demo-label">.expand-image-hover</span>
    </div>

  </div>

</body>
</html>
