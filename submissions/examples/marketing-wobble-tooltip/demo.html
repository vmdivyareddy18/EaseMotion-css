<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Landing Page Wobble-Focus Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="landing-container">
        <div class="feature-card">
            <div class="feature-badge">⚡ Core Engine</div>
            <h3 class="feature-title">Ultra-Fast Processing</h3>
            <p class="feature-description">
                Our cloud framework scales resource allocation on-demand, lowering latent network delays dynamically.
            </p>

            <div class="tooltip-wrapper">
                <button class="marketing-cta-btn" aria-describedby="marketing-feature-tooltip">
                    View Network Metrics
                </button>

                <div id="marketing-feature-tooltip" class="marketing-tooltip" role="tooltip">
                    <span class="tooltip-gradient-tag">99.9% Uptime Verified</span>
                    <p class="tooltip-body">Monitored across 45 edge regions globally with automated failure mitigation
                        paths.</p>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
