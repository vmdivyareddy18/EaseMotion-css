<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Blur-Entrance Modal (Modern SaaS UI)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #f3f4f6; /* Modern SaaS page background */
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
    }

    .demo-trigger-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #ffffff;
      color: #111827;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 1rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .demo-trigger-btn:hover {
      background: #f9fafb;
      border-color: #9ca3af;
    }
  </style>
</head>
<body>

  <!-- Button to trigger the modal using URL anchor -->
  <a href="#saas-modal" class="demo-trigger-btn">Create New Project</a>

  <!-- The Modal Structure (Hidden by default, shown when URL target matches ID) -->
  <div id="saas-modal" class="ease-saas-modal-overlay">
    
    <!-- Clicking this invisible backdrop closes the modal by navigating to # -->
    <a href="#" class="ease-saas-modal-backdrop-close" tabindex="-1"></a>

    <div class="ease-saas-modal-window" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <a href="#" class="ease-saas-modal-close" aria-label="Close modal dialog">&times;</a>
      
      <h2 id="modal-title" class="ease-saas-modal-title">Create New Project</h2>
      <p class="ease-saas-modal-text">
        Get started by creating a new project. Notice the smooth <strong>Blur-Entrance</strong> interaction when this modal appears. 
        It fades in while simultaneously un-blurring, capturing the clean, modern aesthetics of SaaS dashboards using pure CSS.
      </p>
      
      <div class="ease-saas-modal-actions">
        <a href="#" class="ease-saas-modal-btn ease-saas-modal-btn-secondary">Cancel</a>
        <a href="#" class="ease-saas-modal-btn">Continue</a>
      </div>
    </div>

  </div>

</body>
</html>
