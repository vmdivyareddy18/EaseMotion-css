<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Visual Regression Platform</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 160 • Developer Platform</span>
        <h1>Visual Regression Platform</h1>
        <p class="subtitle">UI consistency validation.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card main-panel">
          <h3>🔍 Split Screen Compare</h3>
          <div class="split-viewport">
            <div class="side v-base">Baseline Build</div>
            <div class="side v-curr">Current Build</div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Core Hub</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
