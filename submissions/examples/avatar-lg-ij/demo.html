<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS avatar-lg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Large Avatars</h1>
    <div class="row">
      <div class="lg-av" style="background: linear-gradient(135deg, #e94560, #533483);">
        <span class="online-ring"></span>
        <span class="lg-inner">A</span>
      </div>
      <div class="lg-av" style="background: linear-gradient(135deg, #2ecc71, #3498db);">
        <span class="online-ring"></span>
        <span class="lg-inner">B</span>
      </div>
      <div class="lg-av" style="background: linear-gradient(135deg, #f39c12, #e74c3c);">
        <span class="online-ring"></span>
        <span class="lg-inner">C</span>
      </div>
    </div>
  </div>
</body>
</html>
