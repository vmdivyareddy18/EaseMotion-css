<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="glass-modal-toggle" class="ease-glass-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="glass-modal-toggle" class="ease-glass-trigger-um" tabindex="0">
    View Holographic Details
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-glass-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="glass-modal-toggle" class="ease-glass-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-glass-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="glass-modal-toggle" class="ease-glass-close-icon-um" aria-label="Close Modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Content -->
      <h2 id="modal-title" class="ease-glass-title-um">Glassmorphism UI</h2>
      <p class="ease-glass-desc-um">
        This modal demonstrates a pure CSS implementation of the "Glassmorphism" aesthetic. It leverages background blurs, frosted glass textures, and subtle scale-hover animations to create a modern, deep visual hierarchy without sacrificing performance.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-glass-actions-um">
        <label for="glass-modal-toggle" class="ease-glass-btn-um">
          Dismiss
        </label>
        
        <label for="glass-modal-toggle" class="ease-glass-btn-um ease-glass-btn-primary-um">
          Save Settings
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
