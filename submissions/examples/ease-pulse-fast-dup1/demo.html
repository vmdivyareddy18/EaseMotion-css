<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-pulse-fast — Rapid Pulse Animation #11906</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --border: #334155;
        --text: #f8fafc;
        --danger: #ef4444;
        --warning: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .container {
        max-width: 900px;
        width: 100%;
        padding: 4rem 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 4rem;
      }

      h1 {
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .badge-top {
        display: inline-block;
        background: var(--danger);
        color: #fff;
        padding: 0.25rem 0.75rem;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border-radius: 99px;
        margin-bottom: 1rem;
      }

      .demo-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
      }

      .demo-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 3rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        gap: 1.5rem;
      }

      .demo-label {
        font-size: 0.8rem;
        color: #94a3b8;
        font-family: monospace;
        margin-top: auto;
      }

      /* Use Case Components */
      .status-dot {
        width: 16px;
        height: 16px;
        background: var(--danger);
        border-radius: 50%;
      }

      .alert-btn {
        background: var(--danger);
        color: #fff;
        border: none;
        padding: 0.75rem 1.5rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .notification-icon {
        position: relative;
        font-size: 2rem;
        color: #94a3b8;
      }

      .notification-badge {
        position: absolute;
        top: 0;
        right: -5px;
        width: 12px;
        height: 12px;
        background: var(--danger);
        border-radius: 50%;
        border: 2px solid var(--surface);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <div class="badge-top">Urgent State Animation</div>
        <h1>ease-pulse-fast</h1>
        <p style="color: #94a3b8">
          Fixes <strong>#11906</strong> — Rapid 0.5s cycle for critical alerts
          and urgent notifications.
        </p>
      </header>

      <div class="demo-grid">
        <!-- Status Indicator -->
        <div class="demo-card">
          <div style="display: flex; align-items: center; gap: 0.75rem">
            <div class="status-dot ease-pulse-fast"></div>
            <span style="font-weight: 600; color: var(--danger)"
              >System Offline</span
            >
          </div>
          <span class="demo-label">.ease-pulse-fast</span>
        </div>

        <!-- Alert Button -->
        <div class="demo-card">
          <button class="alert-btn ease-pulse-fast">Action Required!</button>
          <span class="demo-label">.ease-pulse-fast</span>
        </div>

        <!-- Notification Badge -->
        <div class="demo-card">
          <div class="notification-icon">
            🔔
            <div class="notification-badge ease-pulse-fast"></div>
          </div>
          <span class="demo-label">.ease-pulse-fast (on badge)</span>
        </div>

        <!-- Border Pulse Variant -->
        <div class="demo-card">
          <div
            class="status-dot ease-pulse-fast-border"
            style="background: transparent; border: 2px solid var(--danger)"
          ></div>
          <span class="demo-label">.ease-pulse-fast-border</span>
        </div>

        <!-- Custom Color -->
        <div class="demo-card">
          <div
            class="status-dot ease-pulse-fast"
            style="
              background: var(--warning);
              --ease-pulse-fast-color: var(--warning);
            "
          ></div>
          <span class="demo-label">Custom color (Warning)</span>
        </div>
      </div>
    </div>
  </body>
</html>
