<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Table Mobile Scroll Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-table – Mobile Horizontal Scroll Fix</h2>
  <!-- KEY FIX: ease-table-wrapper provides overflow-x: auto -->
  <div class="ease-table-wrapper" role="region" aria-label="User data table" tabindex="0">
    <table class="ease-table ease-table--striped">
      <thead>
        <tr>
          <th scope="col">Name</th>
          <th scope="col">Email</th>
          <th scope="col">Role</th>
          <th scope="col">Status</th>
          <th scope="col">Last Login</th>
          <th scope="col">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alice Johnson</td>
          <td>alice@example.com</td>
          <td>Admin</td>
          <td><span class="badge badge--green">Active</span></td>
          <td>2026-07-01</td>
          <td><a href="#">Edit</a></td>
        </tr>
        <tr>
          <td>Bob Smith</td>
          <td>bob@example.com</td>
          <td>Editor</td>
          <td><span class="badge badge--yellow">Away</span></td>
          <td>2026-06-28</td>
          <td><a href="#">Edit</a></td>
        </tr>
        <tr>
          <td>Carol Davis</td>
          <td>carol@example.com</td>
          <td>Viewer</td>
          <td><span class="badge badge--red">Inactive</span></td>
          <td>2026-05-14</td>
          <td><a href="#">Edit</a></td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
