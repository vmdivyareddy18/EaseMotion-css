<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse Offline Banner - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="stage">
    <div class="stage-intro">
      <p class="stage-eyebrow">EaseMotion CSS &middot; Component Demo</p>
      <h1 class="stage-title">Offline Banner</h1>
      <p class="stage-subtitle">
        A connection-status banner with a pulsing warning icon, built
        entirely in HTML and CSS.
      </p>
    </div>

    <!--
      Offline notification banner.
      - role="alert" + aria-live="assertive" ensures screen readers
        announce this immediately, since a lost connection is
        time-sensitive information the user needs right away.
      - This is a static demo of the component's appearance; wiring it
        to navigator.onLine / offline events in a real app is a small
        JavaScript addition left to the consuming project.
    -->
    <section class="offline-banner ease-fade-in" role="alert" aria-live="assertive">

      <!-- Icon with an expanding pulse ring behind it -->
      <div class="offline-icon-wrap" aria-hidden="true">
        <span class="pulse-ring"></span>
        <span class="pulse-ring pulse-ring--delayed"></span>
        <span class="offline-icon">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"></line>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
            <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
            <line x1="12" y1="20" x2="12.01" y2="20"></line>
          </svg>
        </span>
      </div>

      <div class="offline-content">
        <h2 class="offline-title">You are Offline</h2>
        <p class="offline-description">
          We can't reach the internet right now. Check your connection
          and try again - your work is saved locally in the meantime.
        </p>
      </div>

      <button type="button" class="retry-btn">
        Retry
      </button>
    </section>
  </main>

</body>
</html>
