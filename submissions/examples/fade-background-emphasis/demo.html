<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fade Background Emphasis - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container">
    <h1>Fade Background Emphasis</h1>
    <p>A glassy, highly immersive pulsing background glow effect that emphasizes active components.</p>
    
    <div class="card-container">
      <div id="glowCard" class="glass-card">
        <div class="fade-bg-glow"></div>
        <h3 class="card-title">Interactive Card</h3>
        <p class="card-desc">Hover this card or click the button below to trigger the looping background pulse emphasis.</p>
      </div>
    </div>
    
    <button id="toggleBtn" class="btn">Toggle Loop Emphasis</button>
  </div>

  <script>
    const glowCard = document.getElementById('glowCard');
    const toggleBtn = document.getElementById('toggleBtn');

    toggleBtn.addEventListener('click', () => {
      const isActive = glowCard.classList.toggle('emphasis-active');
      if (isActive) {
        toggleBtn.textContent = 'Disable Loop Emphasis';
        toggleBtn.classList.add('btn-active');
      } else {
        toggleBtn.textContent = 'Toggle Loop Emphasis';
        toggleBtn.classList.remove('btn-active');
      }
    });
  </script>
</body>
</html>
