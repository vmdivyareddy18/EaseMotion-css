<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive File Upload Dropzone — EaseMotion CSS Sandbox</title>
  
  <!-- Core variables + styles from local repository (linked relatively) -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/base.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Demo-specific layout styles */
    body {
      background-color: var(--ease-color-bg, #f8fafc);
      color: var(--ease-color-text, #0f172a);
      font-family: var(--ease-font-sans, "Inter", system-ui, sans-serif);
      margin: 0;
      padding: 4rem 1rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 3rem;
      max-width: 600px;
    }

    .demo-title {
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin: 0 0 0.75rem 0;
      background: linear-gradient(135deg, #6c63ff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .demo-description {
      font-size: 1.05rem;
      color: #64748b;
      line-height: 1.6;
      margin: 0;
    }

    /* Dark Mode Demo adjustments */
    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0f172a;
        color: #f8fafc;
      }
      .demo-description {
        color: #94a3b8;
      }
    }

    .demo-card {
      width: 100%;
      max-width: 600px;
      background-color: var(--em-dropzone-bg);
      border-radius: var(--em-dropzone-radius);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      padding: 2.5rem;
      border: 1px solid var(--em-dropzone-border);
    }
    
    @media (prefers-color-scheme: dark) {
      .demo-card {
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
      }
    }
  </style>
</head>
<body>

  <!-- Demo Header -->
  <header class="demo-header">
    <h1 class="demo-title">File Upload Dropzone</h1>
    <p class="demo-description">
      An animation-rich, fully accessible drag-and-drop file upload component featuring responsive layout states, spring micro-interactions, success checkmark drawing, and screen-reader optimizations.
    </p>
  </header>

  <!-- Sandbox Main Component Container -->
  <main class="em-sandbox-container">
    <div class="demo-card">
      <!-- 
        The dropzone container is semantically marked up as a label to automatically link to the file input.
        It is keyboard focusable via tabindex="0" and visually styled via style.css.
      -->
      <label 
        for="file-upload" 
        class="em-upload-dropzone" 
        id="drop-zone"
        tabindex="0"
        aria-describedby="upload-description"
      >
        <!-- Native input (hidden visually but kept accessible for keyboard/screen readers) -->
        <input 
          type="file" 
          id="file-upload" 
          class="em-upload-input" 
          multiple
          aria-label="Upload files"
        >

        <!-- Dynamic Icon Area with SVG path arrows -->
        <div class="em-upload-icon-container" aria-hidden="true">
          <svg class="em-upload-icon-svg" viewBox="0 0 24 24">
            <path class="em-upload-icon-cloud" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
            <!-- Floating Upload Arrow -->
            <path class="em-upload-icon-arrow" d="M12 8v8M9 11l3-3 3 3" />
          </svg>
        </div>

        <div class="em-upload-text-group">
          <h2 class="em-upload-title" id="upload-description">
            Drag & drop files here or <span class="em-browse-link">browse</span>
          </h2>
          <p class="em-upload-subtitle">Supports PDF, PNG, JPG, or SVG (Max 10MB)</p>
        </div>
      </label>

      <!-- Selected File Success/Preview Container -->
      <section 
        class="em-preview-container" 
        id="preview-container" 
        aria-live="polite" 
        aria-label="Selected file information"
      >
        <div class="em-preview-info">
          <div class="em-preview-icon-wrapper" aria-hidden="true">
            <!-- Checkmark Drawer SVG -->
            <svg viewBox="0 0 52 52">
              <circle class="em-checkmark-circle" cx="26" cy="26" r="25" />
              <path class="em-checkmark-check" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
            </svg>
          </div>
          <div class="em-preview-details">
            <p class="em-file-name" id="file-name">document-name.pdf</p>
            <p class="em-file-size" id="file-size">1.2 MB</p>
          </div>
        </div>
        
        <!-- Accessible Clear Button -->
        <button 
          type="button" 
          class="em-clear-btn" 
          id="clear-button" 
          title="Remove selected file" 
          aria-label="Remove selected file"
        >
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </section>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-upload');
      const previewContainer = document.getElementById('preview-container');
      const fileNameEl = document.getElementById('file-name');
      const fileSizeEl = document.getElementById('file-size');
      const clearBtn = document.getElementById('clear-button');

      // Helper to format file sizes
      function formatBytes(bytes, decimals = 2) {
        if (bytes === 0) return '0 Bytes';
        const k = 1024;
        const dm = decimals < 0 ? 0 : decimals;
        const sizes = ['Bytes', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
      }

      // Handle keyboard accessibility (Enter/Space on dropZone trigger click)
      dropZone.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          fileInput.click();
        }
      });

      // Drag Over and Leave Styling Animations
      ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.add('is-dragover');
        }, false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
          e.preventDefault();
          e.stopPropagation();
          dropZone.classList.remove('is-dragover');
        }, false);
      });

      // Handle file drop event
      dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files.length) {
          fileInput.files = files;
          handleFiles(files);
        }
      });

      // Handle file change selection via browse
      fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
      });

      // Display selected file info
      function handleFiles(files) {
        if (files.length === 0) return;
        
        const file = files[0];
        fileNameEl.textContent = file.name;
        fileSizeEl.textContent = formatBytes(file.size);
        
        // Remove and re-add preview element to restart SVG checkmark draw animations
        previewContainer.classList.remove('is-visible');
        void previewContainer.offsetWidth; // Trigger reflow
        previewContainer.classList.add('is-visible');
      }

      // Reset file list and input
      clearBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        fileInput.value = '';
        previewContainer.classList.remove('is-visible');
        dropZone.focus(); // Return focus back to main upload zone for keyboard layout
      });
    });
  </script>
</body>
</html>
