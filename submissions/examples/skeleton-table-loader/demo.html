<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Table Loader Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="loader-page" aria-labelledby="loader-title">
    <section class="loader-card">
      <p class="eyebrow">Loading state</p>
      <h1 id="loader-title">Skeleton Table Loader</h1>
      <div class="table-shell" aria-label="Loading table preview">
        <div class="table-head">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="table-row">
          <span class="avatar"></span>
          <span class="line wide"></span>
          <span class="line short"></span>
        </div>
        <div class="table-row">
          <span class="avatar"></span>
          <span class="line medium"></span>
          <span class="line wide"></span>
        </div>
        <div class="table-row">
          <span class="avatar"></span>
          <span class="line wide"></span>
          <span class="line medium"></span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
