<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Search Bar Demo - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>Animated Search Bar</h1>
      <p class="description" style="margin-bottom: 40px; color: #666">
        Click the search icon to expand.
      </p>

      <div class="search-container">
        <button class="search-trigger" aria-label="Search">
          <i class="icon-search"></i>
        </button>

        <input type="search" class="search-input" placeholder="Search..." />

        <ul class="search-suggestions">
          <li>Recent Search 1</li>
          <li>Recent Search 2</li>
          <li>Suggested Result</li>
        </ul>
      </div>
    </div>
  </body>
</html>
