<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frosted Glass Input Field - Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background elements to demonstrate the frosted glass refraction -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="dashboard-container">
        <div class="card-header">
            <h2>Payment Portal</h2>
            <p>Enter your transaction details securely</p>
        </div>

        <form class="dashboard-form" onsubmit="event.preventDefault();">
            <!-- Glass Input Component -->
            <div class="glass-input-group">
                <input 
                    type="number" 
                    id="amount" 
                    class="glass-input ease-in-out" 
                    placeholder=" " 
                    required 
                    min="1"
                />
                <label for="amount" class="glass-label">Transfer Amount ($)</label>
                <span class="input-focus-line"></span>
            </div>

            <!-- Glass Input Component 2 -->
            <div class="glass-input-group">
                <input 
                    type="text" 
                    id="recipient" 
                    class="glass-input ease-in-out" 
                    placeholder=" " 
                    required
                />
                <label for="recipient" class="glass-label">Recipient Tag / Email</label>
                <span class="input-focus-line"></span>
            </div>

            <button type="submit" class="submit-btn">Execute Transfer</button>
        </form>
    </div>
</body>
</html>
