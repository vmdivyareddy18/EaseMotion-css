<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnetic Hover Button Effect - EaseMotion</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }

    .container {
      text-align: center;
      max-width: 1000px;
      padding: 2rem;
    }

    h1 {
      color: #ffffff;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
    }

    .subtitle {
      color: #a0aec0;
      font-size: 1.125rem;
      margin-bottom: 3rem;
    }

    .info-text {
      color: #667eea;
      font-size: 0.875rem;
      margin-top: 2rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Magnetic Hover Button Effect</h1>
    <p class="subtitle">Buttons that attract your cursor with smooth CSS transforms</p>
    
    <div class="button-grid">
      <div class="button-grid-item">
        <button class="magnetic-btn">
          <span>Get Started</span>
        </button>
        <span class="button-label">Default (Top-Left Pull)</span>
      </div>

      <div class="button-grid-item">
        <button class="magnetic-btn magnetic-right">
          <span>Learn More</span>
        </button>
        <span class="button-label">Right Pull Variant</span>
      </div>

      <div class="button-grid-item">
        <button class="magnetic-btn magnetic-down">
          <span>Download</span>
        </button>
        <span class="button-label">Down Pull Variant</span>
      </div>

      <div class="button-grid-item">
        <button class="magnetic-btn magnetic-diagonal">
          <span>Sign Up</span>
        </button>
        <span class="button-label">Diagonal Pull Variant</span>
      </div>
    </div>

    <p class="info-text">Hover over the buttons to see the magnetic effect (desktop only)</p>
  </div>
</body>
</html>
