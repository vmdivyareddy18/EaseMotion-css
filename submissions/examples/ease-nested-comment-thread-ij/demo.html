<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nested Comment Thread</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='comment-bg')r.style.setProperty('--comment-bg',t.value);if(t.name==='border-color')r.style.setProperty('--border-color',t.value);if(t.name==='reply-indent')r.style.setProperty('--reply-indent',t.value+'px');if(t.name==='expand-duration')r.style.setProperty('--expand-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{document.querySelectorAll('.reply-btn').forEach(b=>b.addEventListener('click',()=>{b.nextElementSibling.classList.toggle('open')}))})</script>
<div class="container"><p class="title">Nested Comment Thread</p>
<div class="comment"><div class="comment-header"><span>User123</span><span>2h ago</span></div><div class="comment-text">Great article! Thanks for sharing.</div><button class="reply-btn">Reply</button><div class="reply-form"><input type="text" placeholder="Write a reply..."></div></div>
<div class="comment reply"><div class="comment-header"><span>Author</span><span>1h ago</span></div><div class="comment-text">Glad you liked it! More coming soon.</div></div>
<div class="controls"><label>BG: <input type="color" name="comment-bg" value="#2d2d44"></label><label>Border: <input type="color" name="border-color" value="#4a4a6a"></label><label>Indent: <input type="range" name="reply-indent" min="8" max="48" value="24"></label><label>Speed: <input type="range" name="expand-duration" min="0.1" max="0.8" step="0.05" value="0.3"></label></div></div></body></html>
