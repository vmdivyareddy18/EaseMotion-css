<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Heartbeat Like Icon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Heartbeat Like Icon</h1>

    <p>
      A reusable heart animation inspired by social media reactions,
      favorites, and engagement interactions.
    </p>

    <div class="demo-grid">

      <button class="like-button">
        <span class="heart-icon">❤</span>
      </button>

      <button class="like-button card-style">
        <span class="heart-icon">❤</span>
        <span>Like</span>
      </button>

      <div class="profile-card">
        <h3>Creative Post</h3>
        <p>Heart icon with a subtle heartbeat animation.</p>

        <button class="like-button small">
          <span class="heart-icon">❤</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
