<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>CSS Positioning Visualizer</h1>

<div class="container">

    <div class="card">
        <h2>Static</h2>
        <div class="box static">Static</div>
    </div>

    <div class="card">
        <h2>Relative</h2>
        <div class="box relative">Relative</div>
    </div>

    <div class="card position-area">
        <h2>Absolute</h2>
        <div class="parent">
            <div class="box absolute">Absolute</div>
        </div>
    </div>

    <div class="card">
        <h2>Sticky</h2>
        <div class="sticky-wrapper">
            <div class="box sticky">Sticky</div>
            <p>Scroll this page to observe the sticky element.</p>
        </div>
    </div>

</div>

<div class="fixed-box">
    Fixed
</div>

</body>
</html>
