<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Line Number — Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Line Number Animate</h2>
    <p class="count-demo">Hover the code block to count</p>
    <div class="demo-area">
      <div class="ease-line-number">
        <div class="code-line" style="--line: 1">function greet(name) {</div>
        <div class="code-line" style="--line: 2">  return `Hello, ${name}!`;</div>
        <div class="code-line" style="--line: 3">}</div>
        <div class="code-line" style="--line: 4">const msg = greet("World");</div>
        <div class="code-line" style="--line: 5">console.log(msg);</div>
      </div>
    </div>
  </div>
</body>
</html>
