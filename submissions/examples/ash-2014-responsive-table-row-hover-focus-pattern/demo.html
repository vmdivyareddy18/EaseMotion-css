<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Table Row Hover Focus Pattern</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="table-card">

        <div class="header">

            <h1>User Management</h1>

            <p>
                Responsive table with hover and keyboard focus states.
            </p>

        </div>

        <div class="table-wrapper">

            <table>

                <thead>

                    <tr>
                        <th>Name</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Last Active</th>
                    </tr>

                </thead>

                <tbody>

                    <tr tabindex="0">

                        <td data-label="Name">
                            Sarah Johnson
                        </td>

                        <td data-label="Role">
                            Admin
                        </td>

                        <td data-label="Status">
                            <span class="badge active">
                                Active
                            </span>
                        </td>

                        <td data-label="Last Active">
                            2 min ago
                        </td>

                    </tr>

                    <tr tabindex="0">

                        <td data-label="Name">
                            Michael Lee
                        </td>

                        <td data-label="Role">
                            Editor
                        </td>

                        <td data-label="Status">
                            <span class="badge pending">
                                Pending
                            </span>
                        </td>

                        <td data-label="Last Active">
                            18 min ago
                        </td>

                    </tr>

                    <tr tabindex="0">

                        <td data-label="Name">
                            Emma Wilson
                        </td>

                        <td data-label="Role">
                            Viewer
                        </td>

                        <td data-label="Status">
                            <span class="badge inactive">
                                Inactive
                            </span>
                        </td>

                        <td data-label="Last Active">
                            3 days ago
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
