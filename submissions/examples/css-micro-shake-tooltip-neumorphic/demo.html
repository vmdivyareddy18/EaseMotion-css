<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Soft Layout Tooltip - Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-color: #e0e5ec; /* Matches standard neumorphic baseline */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>

  <div class="ease-tooltip-wrapper">
    <button class="ease-tooltip-target" aria-describedby="cosmic-node-info">
      Telemetry Matrix Node
    </button>

    <div id="cosmic-node-info" class="ease-tooltip-content" role="tooltip">
      // System vectors operating at 98.4% velocity
    </div>
  </div>

</body>
</html>
