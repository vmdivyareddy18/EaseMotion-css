<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-json-viewer</title>
    <meta
      name="description"
      content="A collapsible JSON tree viewer with syntax highlighting, copy path support, and toolbar controls."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="viewer-card" aria-labelledby="viewer-title">
        <header class="viewer-header">
          <div>
            <p class="eyebrow">EaseMotion component</p>
            <h1 id="viewer-title">ease-json-viewer</h1>
            <p class="viewer-copy">
              An accessible collapsible JSON tree viewer with copy path support and toolbar actions.
            </p>
          </div>
          <div class="toolbar" role="toolbar" aria-label="JSON viewer controls">
            <button id="expand-all" class="toolbar-button">Expand All</button>
            <button id="collapse-all" class="toolbar-button">Collapse All</button>
            <button id="copy-json" class="toolbar-button">Copy JSON</button>
            <button id="pretty-print" class="toolbar-button">Pretty Print</button>
          </div>
        </header>

        <div class="viewer-shell">
          <div id="json-tree" class="json-tree" role="tree" aria-label="JSON tree viewer"></div>
          <pre id="json-output" class="json-output visually-hidden" aria-live="polite"></pre>
        </div>

        <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true">✓ Copied!</div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
