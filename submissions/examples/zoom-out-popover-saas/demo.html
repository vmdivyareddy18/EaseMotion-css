<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoom Out Popover - SaaS Layout</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="container">

    <h1>Modern SaaS Dashboard</h1>

    <div class="popover-wrapper">

        <button class="trigger">
            Open Features
        </button>

        <div class="popover">
            <h2>SaaS Features</h2>

            <p>
                Manage projects, track analytics,
                and collaborate with your team easily.
            </p>

            <div class="feature-list">
                <span>⚡ Fast Performance</span>
                <span>📊 Analytics</span>
                <span>🔒 Secure Cloud</span>
            </div>
        </div>

    </div>

</section>


</body>
</html>
