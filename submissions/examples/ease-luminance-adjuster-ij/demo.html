<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta luminance-adjuster="viewport" content="width=device-width,initial-scale=1.0"><title>ease-luminance-adjuster</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><h1>luminance-adjuster</h1><p class="subtitle">Click to toggle animation</p><div class="demo-box" id="demoBox"><div class="anim-target" id="animTarget"></div></div><button class="trigger" id="trigger">Toggle</button></div>
<script>const t=document.getElementById("animTarget");const b=document.getElementById("trigger");let a=false;b.addEventListener("click",()=>{a=!a;t.classList.toggle("active",a);t.style.setProperty("--state",a?"1":"0");});</script>
</body>
</html>
