<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Multi-Step Form | EaseMotion-css</title>
    <!-- Linking project root utility stylesheet -->
    <link rel="stylesheet" href="../../../src/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-wrapper">
        <!-- Progress Stepper Header -->
        <div class="stepper-header">
            <div class="step-node active" id="step-node-1">1</div>
            <div class="step-line" id="line-1"></div>
            <div class="step-node" id="step-node-2">2</div>
            <div class="step-line" id="line-2"></div>
            <div class="step-node" id="step-node-3">3</div>
        </div>

        <!-- Form Shell -->
        <form id="multiStepForm">
            
            <!-- Step 1: Account Info -->
            <div class="form-step active-step" id="step-1">
                <h2>Account Settings</h2>
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter your username" required>
                </div>
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@domain.com" required>
                </div>
                <div class="btn-group single-btn">
                    <button type="button" class="btn next-btn" onclick="navigateToStep(2)">Next Step</button>
                </div>
            </div>

            <!-- Step 2: Profile Setup -->
            <div class="form-step" id="step-2">
                <h2>Profile Details</h2>
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label for="bio">Short Bio</label>
                    <textarea id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>
                </div>
                <div class="btn-group">
                    <button type="button" class="btn prev-btn" onclick="navigateToStep(1)">Back</button>
                    <button type="button" class="btn next-btn" onclick="navigateToStep(3)">Next Step</button>
                </div>
            </div>

            <!-- Step 3: Success Confirmation -->
            <div class="form-step" id="step-3">
                <div class="success-icon">✓</div>
                <h2>All Set!</h2>
                <p>Your profile wizard configuration is fully complete and validated.</p>
                <div class="btn-group">
                    <button type="button" class="btn prev-btn" onclick="navigateToStep(2)">Back Details</button>
                    <button type="submit" class="btn submit-btn">Submit Profile</button>
                </div>
            </div>

        </form>
    </div>

    <!-- UI Interaction Script -->
    <script>
        function navigateToStep(targetStep) {
            const steps = document.querySelectorAll('.form-step');
            const nodes = document.querySelectorAll('.step-node');
            const lines = document.querySelectorAll('.step-line');

            // Toggle Step View visibility with slide animation classes
            steps.forEach(step => {
                step.classList.remove('active-step', 'slide-in');
            });
            
            const activeStepEl = document.getElementById(`step-${targetStep}`);
            activeStepEl.classList.add('active-step', 'slide-in');

            // Update Progress Header Indicators
            nodes.forEach((node, idx) => {
                if (idx + 1 <= targetStep) {
                    node.classList.add('active');
                } else {
                    node.classList.remove('active');
                }
            });

            lines.forEach((line, idx) => {
                if (idx + 1 < targetStep) {
                    line.classList.add('active');
                } else {
                    line.classList.remove('active');
                }
            });
        }

        document.getElementById('multiStepForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Form submitted successfully!');
        });
    </script>
</body>
</html>
