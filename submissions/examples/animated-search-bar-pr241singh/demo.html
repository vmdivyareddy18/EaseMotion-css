<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Search Bar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>Animated Search Bar</h1>

    <p class="subtitle">
      A modern animated search component built with HTML & CSS.
    </p>

    <!-- Basic Search -->

    <div class="search-bar">

      <span class="search-icon">🔍</span>

      <input type="text" placeholder="Search anything...">

      <button class="clear-btn">
        ✕
      </button>

    </div>

    <!-- Outline Variant -->

    <h2>Outline Variant</h2>

    <div class="search-bar outline">

      <span class="search-icon">🔎</span>

      <input type="text" placeholder="Search documentation...">

      <button class="clear-btn">
        ✕
      </button>

    </div>

    <!-- Filled Variant -->

    <h2>Filled Variant</h2>

    <div class="search-bar filled">

      <span class="search-icon">🔍</span>

      <input type="text" placeholder="Search products...">

      <button class="clear-btn">
        ✕
      </button>

    </div>

    <!-- Glass Variant -->

    <h2>Glass Variant</h2>

    <div class="search-bar glass">

      <span class="search-icon">🔍</span>

      <input type="text" placeholder="Search AI prompts...">

      <button class="clear-btn">
        ✕
      </button>

    </div>

    <!-- Rounded Variant -->

    <h2>Rounded Variant</h2>

    <div class="search-bar rounded">

      <span class="search-icon">🔍</span>

      <input type="text" placeholder="Search users...">

      <button class="clear-btn">
        ✕
      </button>

    </div>

  </div>

</body>

</html>
