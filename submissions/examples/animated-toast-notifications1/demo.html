<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Toast Notifications - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Toast Notifications</h1>
      <p>Click the buttons below to trigger different toast types.</p>
    </header>

    <!-- Trigger Buttons -->
    <div class="trigger-panel ease-fade-in-up ease-delay-100">
      <button class="trigger-btn success ease-hover-grow" data-type="success">
        <span class="btn-icon">✓</span> Show Success Toast
      </button>
      <button class="trigger-btn error ease-hover-grow" data-type="error">
        <span class="btn-icon">✕</span> Show Error Toast
      </button>
      <button class="trigger-btn warning ease-hover-grow" data-type="warning">
        <span class="btn-icon">⚠</span> Show Warning Toast
      </button>
      <button class="trigger-btn info ease-hover-grow" data-type="info">
        <span class="btn-icon">ℹ</span> Show Info Toast
      </button>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- JavaScript for Toast Functionality -->
  <script>
    const toastContainer = document.getElementById('toast-container');
    let toastCounter = 0;

    // Toast templates
    const toastTemplates = {
      success: {
        icon: '✓',
        title: 'Success!',
        message: 'Your changes have been saved successfully.',
        color: 'success'
      },
      error: {
        icon: '✕',
        title: 'Error',
        message: 'Failed to save changes. Please try again.',
        color: 'error'
      },
      warning: {
        icon: '⚠',
        title: 'Warning',
        message: 'Your session will expire in 5 minutes.',
        color: 'warning'
      },
      info: {
        icon: 'ℹ',
        title: 'Information',
        message: 'A new version is available. Refresh to update.',
        color: 'info'
      }
    };

    // Show toast
    function showToast(type) {
      const template = toastTemplates[type];
      const toastId = `toast-${++toastCounter}`;
      
      const toast = document.createElement('div');
      toast.className = `toast toast-${template.color} ease-slide-in-right`;
      toast.id = toastId;
      toast.innerHTML = `
        <div class="toast-icon">${template.icon}</div>
        <div class="toast-content">
          <h4 class="toast-title">${template.title}</h4>
          <p class="toast-message">${template.message}</p>
        </div>
        <button class="toast-close ease-hover-grow" aria-label="Close">×</button>
        <div class="toast-progress">
          <div class="toast-progress-bar"></div>
        </div>
      `;
      
      toastContainer.appendChild(toast);
      
      // Auto-dismiss after 5 seconds
      const progressBar = toast.querySelector('.toast-progress-bar');
      progressBar.style.animation = 'shrinkBar 5s linear forwards';
      
      setTimeout(() => {
        dismissToast(toastId);
      }, 5000);
      
      // Close button
      toast.querySelector('.toast-close').addEventListener('click', () => {
        dismissToast(toastId);
      });
    }

    // Dismiss toast
    function dismissToast(toastId) {
      const toast = document.getElementById(toastId);
      if (toast) {
        toast.classList.remove('ease-slide-in-right');
        toast.classList.add('ease-slide-out-right');
        setTimeout(() => toast.remove(), 300);
      }
    }

    // Trigger buttons
    document.querySelectorAll('.trigger-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        showToast(btn.dataset.type);
      });
    });
  </script>
</body>
</html>
