<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate-In Entrance Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Replay button just for demo purposes to re-trigger the entrance animation -->
        <button class="replay-btn" onclick="replayAnimation()">Replay Animation</button>
        
        <div class="demo-box rotate-in-entrance" id="animated-box">
            <span>✨</span>
        </div>
    </div>

    <script>
        function replayAnimation() {
            const el = document.getElementById('animated-box');
            el.classList.remove('rotate-in-entrance');
            void el.offsetWidth; // Trigger reflow
            el.classList.add('rotate-in-entrance');
        }
    </script>
</body>
</html>
