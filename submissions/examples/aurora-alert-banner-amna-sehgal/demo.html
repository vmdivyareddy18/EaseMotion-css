<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Alert Banner Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="demo-shell">
    <section class="banner-showcase">

      <div
        class="aurora-alert"
        role="alert"
        aria-live="polite"
      >
        <span class="alert-badge">
          ✨ Product Update
        </span>

        <div class="alert-content">
          <h1>Introducing the Aurora Alert Banner</h1>

          <p>
            Create elegant announcement banners with a flowing aurora gradient,
            soft glassmorphism, and subtle motion—perfect for SaaS products,
            blogs, documentation sites, and modern landing pages.
          </p>
        </div>

        <a
          href="#"
          class="alert-action"
          aria-label="Learn more about the Aurora Alert Banner"
        >
          Learn More →
        </a>
      </div>

    </section>
  </main>
</body>
</html>
