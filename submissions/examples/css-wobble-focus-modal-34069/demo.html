<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wobble Focus Checkout Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="modal">

        <h1>Checkout</h1>
        <p class="subtitle">
            Review your order details before completing your purchase.
        </p>

        <hr>

        <section class="section">
            <h2>Shipping Address</h2>

            <p>Alex Johnson</p>
            <p>123 Market Street</p>
            <p>New York, NY 10001</p>
        </section>

        <section class="section">
            <h2>Payment Method</h2>

            <p>💳 Visa ending in 4821</p>
        </section>

        <section class="section">

            <h2>Order Summary</h2>

            <div class="row">
                <span>Wireless Mouse</span>
                <span>$45.00</span>
            </div>

            <div class="row">
                <span>Mechanical Keyboard</span>
                <span>$70.00</span>
            </div>

            <div class="row">
                <span>Shipping</span>
                <span>$10.00</span>
            </div>

            <hr>

            <div class="row total">
                <span>Total</span>
                <span>$125.00</span>
            </div>

        </section>

        <button class="checkout-btn">
            Place Order
        </button>

    </div>

</div>

</body>
</html>
