<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Active Accordion</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion">

    <details>
    <summary>
        <span>What is EaseMotion?</span>
        <span class="icon">+</span>
    </summary>
    <div class="content">
        <p>EaseMotion provides beautiful CSS components and animations for modern websites.</p>
    </div>
</details>

<details>
    <summary>
        <span>Does it use JavaScript?</span>
        <span class="icon">+</span>
    </summary>
    <div class="content">
        <p>No. This component is built using only HTML and CSS.</p>
    </div>
</details>

<details>
    <summary>
        <span>Is it Responsive?</span>
        <span class="icon">+</span>
    </summary>
    <div class="content">
        <p>Yes. It works beautifully on desktop, tablet and mobile devices.</p>
    </div>
</details>

</div>

</body>
</html>
