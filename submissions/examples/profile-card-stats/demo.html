<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card with Stats Grid</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="pcard-profile">
      <div class="pcard-avatar"></div>
      <h3 class="pcard-name">Alex Rivera</h3>
      <p class="pcard-title">Senior UI Designer</p>
      <p class="pcard-desc">Crafting pixel-perfect interfaces for over 8 years.</p>
      <div class="pcard-stats">
        <div class="pcard-stat"><span class="pcard-stat-val">128</span><span class="pcard-stat-label">Projects</span></div>
        <div class="pcard-stat"><span class="pcard-stat-val">342</span><span class="pcard-stat-label">Followers</span></div>
        <div class="pcard-stat"><span class="pcard-stat-val">56</span><span class="pcard-stat-label">Articles</span></div>
        <div class="pcard-stat"><span class="pcard-stat-val">4.9</span><span class="pcard-stat-label">Rating</span></div>
      </div>
      <button class="pcard-follow">Follow</button>
    </div>
  </div>
</body>
</html>
