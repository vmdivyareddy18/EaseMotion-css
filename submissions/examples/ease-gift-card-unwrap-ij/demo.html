<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gift Card Unwrap — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h2>Gift Card Unwrap</h2>
    <p>Peel-reveal animation that unwraps a gift card on click.</p>
    <div class="gift-card" id="giftCard">
      <div class="gift-card__face">
        <span class="gift-card__ribbon">&#127873;</span>
        <strong>$50</strong>
        <small>Gift Card</small>
      </div>
      <div class="gift-card__peel"></div>
    </div>
    <button class="reset-btn" id="resetBtn">&#x21bb; Reset</button>
    <div class="vars">
      <label>--card-bg <input type="color" value="#2d1b69" class="var-color" data-var="--card-bg"></label>
      <label>--ribbon-color <input type="color" value="#ffd700" class="var-color" data-var="--ribbon-color"></label>
      <label>--peel-color <input type="color" value="#e0c3fc" class="var-color" data-var="--peel-color"></label>
      <label>--unwrap-duration <input type="range" min="0.3" max="2" step="0.1" value="0.8" class="var-range" data-var="--unwrap-duration"></label>
    </div>
  </div>

  <script>
    const card = document.getElementById('giftCard');
    const resetBtn = document.getElementById('resetBtn');

    card.addEventListener('click', () => {
      card.classList.add('unwrap');
    });

    resetBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      card.classList.remove('unwrap');
      void card.offsetWidth;
    });

    document.querySelectorAll('.var-color').forEach(inp => {
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value);
      });
    });
    document.querySelectorAll('.var-range').forEach(inp => {
      const display = document.createElement('span');
      display.textContent = inp.value + 's';
      inp.after(display);
      inp.addEventListener('input', () => {
        document.documentElement.style.setProperty(inp.dataset.var, inp.value + 's');
        display.textContent = inp.value + 's';
      });
    });
  </script>
</body>
</html>
