<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Search Bar Expand - EaseMotion CSS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-ij">
        <h1>Animated Search Bar Expand</h1>

        <div class="sbea-container-ij">
            <input type="text" class="sbea-input-ij" placeholder="Type to search...">
            <button class="sbea-btn-ij" aria-label="Toggle search">
                <svg class="sbea-icon-ij" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </button>
        </div>
    </div>

    <script>
        document.querySelector('.sbea-btn-ij').addEventListener('click', function() {
            document.querySelector('.sbea-container-ij').classList.toggle('sbea-expanded');
            if (document.querySelector('.sbea-container-ij').classList.contains('sbea-expanded')) {
                document.querySelector('.sbea-input-ij').focus();
            }
        });

        document.querySelector('.sbea-input-ij').addEventListener('blur', function() {
            if (!this.value) {
                document.querySelector('.sbea-container-ij').classList.remove('sbea-expanded');
            }
        });
    </script>
</body>
</html>
