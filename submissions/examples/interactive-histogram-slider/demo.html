<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS Sandbox — Interactive Histogram Slider</title>
  
  <link rel="stylesheet" href="./style.css">
  
  <style>
    body {
      background-color: #0b1121;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 1.5rem;
    }
  </style>
</head>
<body>

  <header style="margin-bottom: 2.5rem; text-align: center; max-width: 480px;">
    <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 700;">Metrics Visualization Canvas</h1>
    <p style="color: #64748b; margin: 4px 0 0 0; font-size: 0.875rem; line-height: 1.5;">Click and drag the range selector slider bar below. Sibling combinators pass value coordinates straight to high-performance histogram scales with 0 script files.</p>
  </header>

  <div class="alm-metrics-analytics-card">
    
    <div class="alm-chart-title-well">
      <h3 class="alm-chart-header-title">Socket Telemetry Amplitudes</h3>
      <span class="alm-chart-meta-tag">Live_Stream_Sync</span>
    </div>

    <input type="range" 
           min="1" 
           max="100" 
           value="50" 
           class="alm-metrics-range-slider"
           oninput="this.parentNode.style.setProperty('--slider-val', this.value); this.setAttribute('value', this.value);">

    <div class="alm-histogram-chart-panel">
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
      <div class="alm-histogram-bar-slot"></div>
    </div>

    <div style="display: flex; justify-content: space-between; font-size: 0.65rem; color: #64748b; font-family: monospace;">
      <span>0.00ms // START</span>
      <span>180.00ms // APEX</span>
    </div>

  </div>

</body>
</html>
