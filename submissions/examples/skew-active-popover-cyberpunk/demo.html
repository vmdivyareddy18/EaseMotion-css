<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Cyberpunk Skew-Active Popover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cyber-grid-container">
    <!-- Component Anchor Base -->
    <div class="popover-anchor em-fade-in">
      
      <!-- Pure CSS Interactive State Hack -->
      <input type="checkbox" id="cyber-toggle" class="popover-state-checkbox">
      
      <!-- Cyberpunk Glitch Trigger Trigger -->
      <label for="cyber-toggle" class="cyber-btn" tabindex="0" role="button" aria-haspopup="true" aria-expanded="false" id="trigger-label">
        <span class="btn-glitch-text">// ACCESS NODE</span>
        <span class="btn-corner-tag">NX-77</span>
      </label>

      <!-- Skew-Active Neon Popover Structure -->
      <div class="skew-popover-card" role="tooltip" aria-describedby="trigger-label">
        
        <!-- Cyberpunk Accent Top Bar -->
        <div class="cyber-scanner-line"></div>
        
        <div class="popover-inner">
          <div class="popover-header">
            <span class="matrix-blink"></span>
            <h3>OVERRIDE_SEQUENCE_LOADED</h3>
          </div>
          
          <p class="popover-body">
            Proxy routing nodes intercepted. Mainframe firewalls decoupled across sub-sectors. Secure access authorized.
          </p>
          
          <div class="popover-footer">
            <div class="crypto-hash">MD5: F3A899X</div>
            <a href="#" class="popover-action-link">EXECUTE_PATCH</a>
          </div>
        </div>

        <!-- Geometric Angular Pointer Arrow -->
        <div class="popover-arrow"></div>
      </div>

    </div>
  </div>

  <script>
    // Essential Keyboard Accessibility: Triggers checkbox click event on spacebar or enter key strikes
    document.getElementById('trigger-label').addEventListener('keydown', function(e) {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById('cyber-toggle').click();
        const state = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !state);
      }
    });
  </script>
</body>
</html>
