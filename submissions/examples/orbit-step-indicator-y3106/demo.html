<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orbit Step Indicator — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #0f1016 0%, #030407 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        padding: 40px 20px;
        color: #f8fafc;
        box-sizing: border-box;
        background-image:
          linear-gradient(rgba(0, 240, 255, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 240, 255, 0.02) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .demo-header {
        text-align: center;
        margin-bottom: 40px;
      }
      .demo-header h1 {
        font-size: 32px;
        font-weight: 800;
        margin: 0 0 12px 0;
        background: linear-gradient(135deg, #00f0ff 0%, #ff0055 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 2px;
      }
      .demo-header p {
        font-size: 15px;
        color: #64748b;
        margin: 0;
        max-width: 500px;
        line-height: 1.5;
      }
      .stepper-card {
        background: rgba(18, 20, 32, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(0, 240, 255, 0.1);
        border-radius: 20px;
        padding: 40px 32px;
        max-width: 440px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        box-sizing: border-box;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>Orbit Step Indicator</h1>
      <p>
        A pure CSS-interactive circular step indicator with rotating rings and
        orbiting neon particles.
      </p>
    </div>

    <div class="stepper-card">
      <!-- State Inputs (hidden) -->
      <input
        type="radio"
        id="step-1"
        name="orbit-stepper"
        checked
        style="display: none"
      />
      <input
        type="radio"
        id="step-2"
        name="orbit-stepper"
        style="display: none"
      />
      <input
        type="radio"
        id="step-3"
        name="orbit-stepper"
        style="display: none"
      />

      <!-- Stepper Layout -->
      <div class="orbit-stepper-container">
        <!-- Continuous rotating tracks -->
        <div class="orbit-ring-outer"></div>
        <div class="orbit-ring-inner"></div>

        <!-- Orbital Active Tracer -->
        <div class="orbit-tracer-wrapper">
          <div class="orbit-particle"></div>
        </div>

        <!-- Central Step Display -->
        <div class="orbit-hud-core">
          <div class="hud-val val-1">
            <h2 class="hud-step-num">01</h2>
            <span class="hud-step-desc">Init</span>
          </div>
          <div class="hud-val val-2">
            <h2 class="hud-step-num">02</h2>
            <span class="hud-step-desc">Sync</span>
          </div>
          <div class="hud-val val-3">
            <h2 class="hud-step-num">03</h2>
            <span class="hud-step-desc">Done</span>
          </div>
        </div>

        <!-- Checkpoint Nodes -->
        <div class="step-node node-1">I</div>
        <div class="step-node node-2">II</div>
        <div class="step-node node-3">III</div>
      </div>

      <!-- Stepper Controls (Pure CSS Labels) -->
      <div class="stepper-actions">
        <!-- Prev buttons -->
        <label for="step-1" class="step-btn btn-prev btn-prev-step1"
          >&lt; Back</label
        >
        <label for="step-2" class="step-btn btn-prev btn-prev-step2"
          >&lt; Back</label
        >

        <!-- Next buttons -->
        <label for="step-2" class="step-btn btn-next-step2"
          >Continue &gt;</label
        >
        <label for="step-3" class="step-btn btn-next-step3"
          >Complete &gt;</label
        >
      </div>
    </div>
  </body>
</html>
