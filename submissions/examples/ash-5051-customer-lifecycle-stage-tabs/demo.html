<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Lifecycle Stage Tabs</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Customer Lifecycle</h1>

        <p class="subtitle">
            Track customers through every stage of the engagement journey.
        </p>

        <div class="tabs">

            <button class="tab active">
                Lead
            </button>

            <button class="tab">
                Qualified
            </button>

            <button class="tab">
                Customer
            </button>

            <button class="tab">
                Loyal
            </button>

            <button class="tab">
                Advocate
            </button>

        </div>

        <div class="stage-card">

            <div class="header">

                <div>

                    <h2>Qualified Customer</h2>

                    <p>Ready for sales engagement and product demonstration.</p>

                </div>

                <span class="badge">
                    Active
                </span>

            </div>

            <div class="stats">

                <div class="stat">

                    <span>Accounts</span>

                    <strong>284</strong>

                </div>

                <div class="stat">

                    <span>Conversion</span>

                    <strong>64%</strong>

                </div>

                <div class="stat">

                    <span>Avg. Time</span>

                    <strong>12 Days</strong>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
