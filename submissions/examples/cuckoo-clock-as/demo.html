<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuckoo Clock</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="clock">
      <span class="roofc"></span>
      <div class="case">
        <div class="door">
          <div class="cuckoo">
            <span class="beakc"></span>
            <span class="eyec2"></span>
            <span class="wingc"></span>
          </div>
        </div>
        <div class="face">
          <span class="mark mk12"></span>
          <span class="mark mk3"></span>
          <span class="mark mk6"></span>
          <span class="mark mk9"></span>
          <span class="handh"></span>
          <span class="handm"></span>
          <span class="pin"></span>
        </div>
      </div>
      <div class="pend">
        <span class="rod"></span>
        <span class="bob"></span>
      </div>
      <span class="weight wl"></span>
      <span class="weight wr"></span>
    </div>
  </div>
</body>
</html>
