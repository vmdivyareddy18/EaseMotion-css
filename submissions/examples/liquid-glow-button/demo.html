<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glow Button - EaseMotion Extension</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    /* Quick presentation wrapper for testing */
    body {
      background-color: #0b0f19;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      gap: 20px;
      font-family: sans-serif;
    }
    /* Fallback base styles mimicking EaseMotion buttons */
    .ease-btn {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
    }
    .ease-btn-pill {
      border-radius: 9999px;
    }
  </style>
</head>
<body>

  <button class="ease-btn ease-btn-liquid-glow">
    Activate Engine
  </button>

  <button class="ease-btn ease-btn-pill ease-btn-liquid-glow">
    Explore Universe ✨
  </button>

</body>
</html>
