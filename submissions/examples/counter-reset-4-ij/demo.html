<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS counter-reset — Nested List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Nested Lists</h1>
    <ol class="cr-nested">
      <li class="cr-li">Frontend
        <ol class="cr-nested">
          <li class="cr-li">React</li>
          <li class="cr-li">Vue</li>
          <li class="cr-li">CSS</li>
        </ol>
      </li>
      <li class="cr-li">Backend
        <ol class="cr-nested">
          <li class="cr-li">Node.js</li>
          <li class="cr-li">Python</li>
        </ol>
      </li>
      <li class="cr-li">Database
        <ol class="cr-nested">
          <li class="cr-li">PostgreSQL</li>
          <li class="cr-li">MongoDB</li>
        </ol>
      </li>
    </ol>
  </div>
</body>
</html>
