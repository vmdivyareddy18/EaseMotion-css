<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planetary Threat Simulation Grid</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="dashboard">
    <header class="header">
      <span class="badge">AegisGraph Sentinel X Omega</span>
      <h1>Planetary Threat Simulation Grid</h1>
      <p class="subtitle">Model planetary-scale threat scenarios, attack behaviors, and coordinate joint task force responses.</p>
    </header>
    <div class="dashboard-grid">
      <section class="panel-card main-panel">
        <h3>📊 Operational Telemetry</h3>
        <div class="telemetry-grid">
          <div class="telemetry-card">
            <h5>Telemetry status</h5>
            <span class="val-metric">Active</span>
          </div>
        </div>
      </section>
      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>⚡ Master Analytics</h3>
          <ul class="stats-list">
            <li>Ecosystem Sync: <strong>100%</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
