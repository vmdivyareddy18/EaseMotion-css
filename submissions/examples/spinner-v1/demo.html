<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-spinner Demo | EaseMotion CSS</title>
  <style>
    :root {
      --ease-color-primary: #7c3aed;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #0f0a1e;
      color: #e2d9f3;
      padding: 48px 32px;
      min-height: 100vh;
    }
    h1  { font-size: 2rem; margin-bottom: 8px; color: #c4b5fd; }
    p   { color: #a78bfa; margin-bottom: 48px; }
    h2  { font-size: 1rem; text-transform: uppercase; letter-spacing: .1em;
          color: #7c3aed; margin-bottom: 20px; }
    section { margin-bottom: 48px; }
    .row    { display: flex; align-items: center; gap: 32px; flex-wrap: wrap; }
    label   { font-size: .8rem; color: #a78bfa; margin-top: 4px; }
    .cell   { display: flex; flex-direction: column; align-items: center; gap: 8px; }

    /* Inline button demo */
    .demo-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--ease-color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      cursor: not-allowed;
      opacity: .85;
    }
  </style>
</head>
<body>

  <h1>ease-spinner</h1>
  <p>Pure CSS loading spinners · No JS · No SVG · Just classes</p>

  <!-- Classic ring -->
  <section>
    <h2>Classic Ring — .ease-spinner</h2>
    <div class="row">
      <div class="cell">
        <div class="ease-spinner ease-spinner-sm ease-spinner-primary"></div>
        <label>.ease-spinner-sm</label>
      </div>
      <div class="cell">
        <div class="ease-spinner ease-spinner-primary"></div>
        <label>default (32 px)</label>
      </div>
      <div class="cell">
        <div class="ease-spinner ease-spinner-lg ease-spinner-primary"></div>
        <label>.ease-spinner-lg</label>
      </div>
    </div>
  </section>

  <!-- Dual ring -->
  <section>
    <h2>Dual Ring — .ease-spinner-dual</h2>
    <div class="row">
      <div class="cell">
        <div class="ease-spinner-dual"></div>
        <label>default</label>
      </div>
    </div>
  </section>

  <!-- Dots -->
  <section>
    <h2>Bouncing Dots — .ease-spinner-dots</h2>
    <div class="row">
      <div class="ease-spinner-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
  </section>

  <!-- Bars -->
  <section>
    <h2>Equalizer Bars — .ease-spinner-bars</h2>
    <div class="row">
      <div class="ease-spinner-bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>
  </section>

  <!-- Inside a button -->
  <section>
    <h2>Inside a Button</h2>
    <button class="demo-btn" disabled>
      <span class="ease-spinner ease-spinner-sm ease-spinner-white"></span>
      Loading…
    </button>
  </section>

</body>
</html>
