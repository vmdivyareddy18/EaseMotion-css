<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Ripple Fitness Tracker Accordion</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="accordion">

    <details open>
        <summary>👟 Daily Steps</summary>
        <div class="content">
            <p>12,480 steps completed today. You're 125% of your daily goal.</p>
        </div>
    </details>

    <details>
        <summary>❤️ Heart Rate</summary>
        <div class="content">
            <p>Average: 72 BPM • Peak: 146 BPM during today's workout.</p>
        </div>
    </details>

    <details>
        <summary>🔥 Calories Burned</summary>
        <div class="content">
            <p>2,145 kcal burned today across walking, cycling, and strength training.</p>
        </div>
    </details>

</div>

</body>
</html>
