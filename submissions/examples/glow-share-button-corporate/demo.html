<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glow Share Button — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-eyebrow">EaseMotion CSS</p>
  <h1 class="demo-title">Glow <span class="accent">Share</span> Button</h1>

  <div class="demo-stage">

    <!-- ══════════ GLOW SHARE BUTTON COMPONENT ══════════ -->
    <div class="glow-share">

      <!-- Hidden checkbox drives every state below — no JS required -->
      <input type="checkbox" id="glow-share-toggle" class="glow-share-toggle" />

      <!-- Ambient breathing halo -->
      <div class="glow-halo" aria-hidden="true">
        <span class="glow-halo-ring"></span>
        <span class="glow-halo-ring"></span>
        <span class="glow-halo-ring"></span>
      </div>

      <!-- One-shot burst on open -->
      <div class="glow-burst" aria-hidden="true">
        <span class="glow-burst-ring"></span>
        <span class="glow-burst-ring"></span>
      </div>

      <label for="glow-share-toggle" class="glow-share-btn">
        <svg class="glow-share-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"></circle>
          <circle cx="6" cy="12" r="3"></circle>
          <circle cx="18" cy="19" r="3"></circle>
          <line x1="8.6" y1="10.5" x2="15.4" y2="6.5"></line>
          <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"></line>
        </svg>
        Share
      </label>

      <div class="glow-share-panel">
        <a href="#" class="glow-icon" data-action="copy" aria-label="Copy link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.07 0l2.83-2.83a5 5 0 0 0-7.07-7.07L11 4.93"></path>
            <path d="M14 11a5 5 0 0 0-7.07 0L4.1 13.83a5 5 0 0 0 7.07 7.07L13 19.07"></path>
          </svg>
          <span class="glow-icon-label" aria-hidden="true">Copy link</span>
        </a>

        <a href="mailto:?subject=Check%20this%20out" class="glow-icon" aria-label="Share by email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="5" width="18" height="14" rx="2"></rect>
            <path d="m3 7 9 6 9-6"></path>
          </svg>
          <span class="glow-icon-label" aria-hidden="true">Email</span>
        </a>

        <a href="sms:" class="glow-icon" aria-label="Share by message">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H8l-5 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
          </svg>
          <span class="glow-icon-label" aria-hidden="true">Message</span>
        </a>

        <a href="#" class="glow-icon" aria-label="Share to chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 12a4 4 0 1 0 8 0 4 4 0 0 0-8 0"></path>
            <path d="M3 21c1.5-3 4-4 9-4s7.5 1 9 4"></path>
          </svg>
          <span class="glow-icon-label" aria-hidden="true">Contact</span>
        </a>

        <a href="#" class="glow-icon" aria-label="More share options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="5" cy="12" r="1.5"></circle>
            <circle cx="12" cy="12" r="1.5"></circle>
            <circle cx="19" cy="12" r="1.5"></circle>
          </svg>
          <span class="glow-icon-label" aria-hidden="true">More</span>
        </a>
      </div>
    </div>
    <!-- ══════════ /GLOW SHARE BUTTON COMPONENT ══════════ -->

  </div>

  <p class="demo-note">
    Click or tab-and-space to open. Five actions ignite outward from the
    button on a warm ember glow. No JavaScript — a single checkbox drives
    every state.
  </p>

</body>
</html>
