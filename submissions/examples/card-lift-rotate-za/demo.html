<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Lift Rotate</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="lift-page">
    <h1>Lift &amp; Rotate</h1>
    <div class="lift-grid">
      <div class="lift-card">
        <div class="lift-visual" style="background:linear-gradient(135deg,#6366f1,#a855f7)"></div>
        <div class="lift-details">
          <h3>Creative Design</h3>
          <p>Card lifts and rotates smoothly on hover.</p>
        </div>
      </div>
      <div class="lift-card">
        <div class="lift-visual" style="background:linear-gradient(135deg,#ec4899,#f59e0b)"></div>
        <div class="lift-details">
          <h3>3D Interaction</h3>
          <p>Subtle perspective rotation creates depth.</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
