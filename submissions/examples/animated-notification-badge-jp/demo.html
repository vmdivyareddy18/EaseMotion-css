<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Notification Badge</title>

  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1>Animated Notification Badges</h1>
  <p>Pulse, bounce, and colorful badge variations for modern interfaces.</p>


  <!-- Message Badge -->
  <div class="badge-wrapper">
    <button class="icon-btn">
      💬
      <span class="badge badge-red pulse">
        5
      </span>
    </button>
  </div>


  <!-- Bell Badge -->
  <div class="badge-wrapper">
    <button class="icon-btn">
      🔔
      <span class="badge badge-blue bounce">
        12
      </span>
    </button>
  </div>


  <!-- Mail Badge -->
  <div class="badge-wrapper">
    <button class="icon-btn">
      📧
      <span class="badge badge-green pulse">
        99+
      </span>
    </button>
  </div>


</div>

</body>
</html>
