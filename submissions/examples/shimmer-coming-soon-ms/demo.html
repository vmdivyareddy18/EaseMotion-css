<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon with Shimmer</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: grid; place-items: center; min-height: 100vh; background: #000; font-family: system-ui, sans-serif; color: white;">
  
  <div class="coming-soon-container ease-fade-in-up">
    <!-- The main text element with shimmer -->
    <h1 class="shimmer-text">COMING SOON</h1>
    
    <p class="subtitle">We are building something extraordinary.</p>
    
    <div class="notify-section">
      <input type="email" placeholder="Enter your email" class="email-input">
      <button class="notify-btn ease-hover-scale">Notify Me</button>
    </div>
  </div>

</body>
</html>
