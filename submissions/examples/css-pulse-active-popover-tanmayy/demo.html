<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pulse-Active Popover (Cyberpunk Neon) - EaseMotion CSS</title>
  <!-- Import EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Component Specific Styles -->
  <link rel="stylesheet" href="style.css">
  <!-- Optional: Google Fonts for a more cyberpunk feel -->
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="cyberpunk-bg">
  
  <div class="demo-container">
    <div class="popover-wrapper">
      
      <!-- Accessible Popover Trigger via hidden checkbox -->
      <input type="checkbox" id="popover-toggle" class="popover-toggle" hidden aria-hidden="true">
      
      <!-- Button to toggle popover -->
      <label for="popover-toggle" class="cyber-btn" role="button" tabindex="0">
        <span class="cyber-btn-glitch"></span>
        <span>SYS.OPTS</span>
      </label>

      <!-- Background overlay to close popover when clicking outside -->
      <label for="popover-toggle" class="popover-backdrop"></label>

      <!-- Popover Content -->
      <div class="popover-content">
        <div class="popover-header">
          <h3>SYSTEM_CONFIG</h3>
          <span class="cyber-badge">v2.4</span>
        </div>
        
        <ul class="popover-menu">
          <li class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            NEURAL_NET
          </li>
          <li class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            SEC_PROTOCOL
          </li>
          <li class="menu-item">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="square"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
            COMMS_LINK
          </li>
        </ul>
        
        <div class="popover-footer">
          <label for="popover-toggle" class="cyber-close-btn" role="button" tabindex="0">ABORT</label>
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
