<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justify Content Visualizer | EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="component-wrapper">
    <div class="vis-card">
      <h2 class="vis-card__title">Justify Content</h2>
      <p class="vis-card__subtitle">See how flex items respond to different values</p>

      <div class="vis-controls">
        <label class="vis-controls__label">
          justify-content:
          <select class="vis-controls__select" id="jcSelect">
            <option value="flex-start">flex-start</option>
            <option value="flex-end">flex-end</option>
            <option value="center" selected>center</option>
            <option value="space-between">space-between</option>
            <option value="space-around">space-around</option>
            <option value="space-evenly">space-evenly</option>
          </select>
        </label>
        <label class="vis-controls__label vis-controls__label--inline">
          Items:
          <input class="vis-controls__number" type="number" id="itemCount" value="4" min="2" max="8" />
        </label>
      </div>

      <div class="vis-demo" id="visDemo">
        <div class="vis-item" style="--i: 0">1</div>
        <div class="vis-item" style="--i: 1">2</div>
        <div class="vis-item" style="--i: 2">3</div>
        <div class="vis-item" style="--i: 3">4</div>
      </div>

      <div class="vis-badge" id="visBadge">center</div>
    </div>
  </div>
  <script>
    const demo = document.getElementById('visDemo');
    const select = document.getElementById('jcSelect');
    const countInput = document.getElementById('itemCount');
    const badge = document.getElementById('visBadge');

    function updateItems() {
      const count = Math.min(Math.max(parseInt(countInput.value) || 4, 2), 8);
      demo.innerHTML = '';
      for (let i = 1; i <= count; i++) {
        const el = document.createElement('div');
        el.className = 'vis-item';
        el.style.setProperty('--i', i - 1);
        el.textContent = i;
        demo.appendChild(el);
      }
    }

    function updateJustify(value) {
      demo.style.justifyContent = value;
      badge.textContent = value;
    }

    select.addEventListener('change', () => updateJustify(select.value));
    countInput.addEventListener('input', () => {
      updateItems();
      updateJustify(select.value);
    });

    updateJustify(select.value);
  </script>
</body>
</html>
