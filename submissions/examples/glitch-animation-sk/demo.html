<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Glitch Animation Demo | EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            background-color: #0b1121;
            color: #f1f5f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .sub-title {
            color: #94a3b8;
            margin-bottom: 4rem;
        }

        .section {
            margin-bottom: 5rem;
            padding: 2rem;
            border: 1px solid #1e293b;
            border-radius: 1rem;
            background: rgba(30, 41, 59, 0.5);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #38bdf8;
            text-align: left;
        }

        .demo-box {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .huge-text {
            font-size: 6rem;
            font-weight: 900;
        }

        button {
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-family: inherit;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        button:active {
            transform: scale(0.95);
        }

        .status-badge {
            padding: 0.5rem 1rem;
            background: #ef4444;
            color: white;
            font-weight: bold;
            border-radius: 4px;
        }

        /* Intensity slider simulation */
        .controls {
            margin-top: 3rem;
            padding: 1rem;
            background: #1e293b;
            border-radius: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="glitch glitch-loop" data-text="EASE GLITCH">EASE GLITCH</h1>
        <p class="sub-title">A digital distortion effect for cyberpunk and high-tech aesthetics.</p>

        <div class="section">
            <h2>1. Continuous Loop</h2>
            <div class="demo-box">
                <div class="huge-text glitch glitch-loop" data-text="404">404</div>
                <div class="status-badge glitch glitch-loop" data-text="CRITICAL ERROR">CRITICAL ERROR</div>
            </div>
        </div>

        <div class="section">
            <h2>2. Trigger on Hover</h2>
            <div class="demo-box">
                <button class="glitch glitch-hover" data-text="ACCESS SYSTEM">ACCESS SYSTEM</button>
                <p class="glitch glitch-hover" data-text="Hover over this text to glitch it.">Hover over this text to glitch it.</p>
            </div>
        </div>

        <div class="section">
            <h2>3. Customizable Intensity</h2>
            <div class="demo-box">
                <div id="intensity-demo" class="glitch glitch-loop" data-text="HIGH NOISE" style="font-size: 3rem; --glitch-intensity: 8px; --glitch-speed: 0.1s;">HIGH NOISE</div>
                <p>Use <code>--glitch-intensity</code> and <code>--glitch-speed</code> to tune the effect.</p>
            </div>
        </div>
    </div>

</body>
</html>
