<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Button Click - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Click the Button</h1>
    <div class="rbc-wrap" id="rbcWrap">
      <button class="rbc-btn">Click Me</button>
    </div>
  </div>
  <script>
    document.getElementById('rbcWrap').addEventListener('click', function(e) {
      var btn = this.querySelector('.rbc-btn');
      var rect = btn.getBoundingClientRect();
      var x = e.clientX - rect.left;
      var y = e.clientY - rect.top;
      var ripple = document.createElement('span');
      ripple.className = 'rbc-ripple';
      ripple.style.left = x + 'px';
      ripple.style.top = y + 'px';
      btn.appendChild(ripple);
      setTimeout(function() { ripple.remove(); }, 600);
    });
  </script>
</body>
</html>
