<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="An accessible shimmer select menu inspired by modern finance dashboards."
  >
  <title>Shimmer Select Menu | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="finance-dashboard-demo">
    <section class="portfolio-card" aria-labelledby="portfolio-title">
      <div class="card-header">
        <span class="status-badge">Portfolio</span>

        <h1 id="portfolio-title">Investment Overview</h1>

        <p class="card-description">
          Choose an asset category to explore your portfolio allocation.
        </p>
      </div>

      <div class="select-field">
        <label for="asset-category" class="select-label">
          Asset Category
        </label>

        <div class="shimmer-select-wrapper">
          <select
            id="asset-category"
            class="shimmer-select ease-shimmer-select"
            name="asset-category"
          >
            <option value="" selected disabled>Select asset type</option>
            <option value="stocks">Stocks</option>
            <option value="mutual-funds">Mutual Funds</option>
            <option value="etfs">ETFs</option>
            <option value="bonds">Bonds</option>
            <option value="cryptocurrency">Cryptocurrency</option>
          </select>

          <span class="select-arrow" aria-hidden="true"></span>
          <span class="shimmer-effect" aria-hidden="true"></span>
        </div>

        <p class="select-helper">
          Select the investment category you want to review.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
