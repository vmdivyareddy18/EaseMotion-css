<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Breadcrumb Overflow Collapse</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <header class="demo-header">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1>Animated Breadcrumb Overflow Collapse</h1>
      <p>Shows a compact breadcrumb row with an overflow control and stable focus motion.</p>
    </header>
    <nav class="breadcrumb-overflow" aria-label="Breadcrumb">
      <a href="#">Home</a><span aria-hidden="true">/</span>
      <button class="breadcrumb-chip" type="button" aria-label="More sections">...</button><span aria-hidden="true">/</span>
      <a href="#">Components</a><span aria-hidden="true">/</span>
      <span aria-current="page">Breadcrumbs</span>
    </nav>
  </main>
</body>
</html>
