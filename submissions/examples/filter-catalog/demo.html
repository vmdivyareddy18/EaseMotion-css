<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Filter/Sort Catalog — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; margin: 0;">

  <div class="ease-catalog-wrapper">
    <div class="ease-catalog-controls">
      <div class="ease-filter-chips" id="filterContainer">
        <button class="ease-chip is-active" data-filter="all">All Items</button>
        <button class="ease-chip" data-filter="tech">Technology</button>
        <button class="ease-chip" data-filter="apparel">Apparel</button>
        <button class="ease-chip" data-filter="office">Office</button>
      </div>

      <select class="ease-sort-select" id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="low-high">Price: Low to High</option>
        <option value="high-low">Price: High to Low</option>
      </select>
    </div>

    <div class="ease-catalog-grid" id="catalogGrid">
      <div class="ease-catalog-item" data-category="tech" data-price="299">
        <div class="ease-item-image" style="background: #e2e8f0 url('https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=80') center/cover;"></div>
        <h3 class="ease-item-title">Smart Watch Pro</h3>
        <span class="ease-item-price">$299</span>
      </div>

      <div class="ease-catalog-item" data-category="apparel" data-price="45">
        <div class="ease-item-image" style="background: #e2e8f0 url('https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=300&q=80') center/cover;"></div>
        <h3 class="ease-item-title">Minimalist Tee</h3>
        <span class="ease-item-price">$45</span>
      </div>

      <div class="ease-catalog-item" data-category="tech" data-price="89">
        <div class="ease-item-image" style="background: #e2e8f0 url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300&q=80') center/cover;"></div>
        <h3 class="ease-item-title">Wireless Headphones</h3>
        <span class="ease-item-price">$89</span>
      </div>

      <div class="ease-catalog-item" data-category="office" data-price="25">
        <div class="ease-item-image" style="background: #e2e8f0 url('https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=300&q=80') center/cover;"></div>
        <h3 class="ease-item-title">Hardcover Notebook</h3>
        <span class="ease-item-price">$25</span>
      </div>

      <div class="ease-empty-state" id="emptyState">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
        <h3>No matching products found</h3>
        <p>Try modifying your current active selection tags.</p>
      </div>
    </div>
  </div>

  <script>
    const filterContainer = document.getElementById('filterContainer');
    const sortSelect = document.getElementById('sortSelect');
    const catalogGrid = document.getElementById('catalogGrid');
    const items = Array.from(document.querySelectorAll('.ease-catalog-item'));
    const emptyState = document.getElementById('emptyState');

    // Filter Logic Handling
    filterContainer.addEventListener('click', (e) => {
      if (!e.target.classList.contains('ease-chip')) return;
      
      document.querySelectorAll('.ease-chip').forEach(c => c.classList.remove('is-active'));
      e.target.classList.add('is-active');
      
      const filterValue = e.target.getAttribute('data-filter');
      let visibleCount = 0;

      items.forEach(item => {
        // Micro-interaction filter transition wrapper
        item.style.transform = 'scale(0.95)';
        item.style.opacity = '0';

        setTimeout(() => {
          if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
            item.classList.remove('is-hidden');
            item.style.transform = 'scale(1)';
            item.style.opacity = '1';
            visibleCount++;
          } else {
            item.classList.add('is-hidden');
          }
          
          // Display empty states if visibility evaluations fail fully
          if(visibleCount === 0) {
            emptyState.classList.add('is-visible');
          } else {
            emptyState.classList.remove('is-visible');
          }
        }, 150);
      });
    });

    // Sort Logic Handling
    sortSelect.addEventListener('change', () => {
      const criteria = sortSelect.value;
      if (criteria === 'default') return;

      const sorted = items.sort((a, b) => {
        const priceA = parseFloat(a.getAttribute('data-price'));
        const priceB = parseFloat(b.getAttribute('data-price'));
        return criteria === 'low-high' ? priceA - priceB : priceB - priceA;
      });

      sorted.forEach(item => catalogGrid.appendChild(item));
    });
  </script>
</body>
</html>
