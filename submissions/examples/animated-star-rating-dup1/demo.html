<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Star Rating - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Star Rating Components</h1>
      <p>Interactive, animated star ratings for reviews and feedback.</p>
    </header>

    <!-- Rating Examples -->
    <div class="rating-examples">
      
      <!-- Example 1: Product Review -->
      <div class="rating-card ease-fade-in-up ease-delay-100">
        <h3>Rate this Product</h3>
        <div class="star-rating" data-rating="0">
          <span class="star ease-hover-grow" data-value="1">★</span>
          <span class="star ease-hover-grow" data-value="2">★</span>
          <span class="star ease-hover-grow" data-value="3">★</span>
          <span class="star ease-hover-grow" data-value="4">★</span>
          <span class="star ease-hover-grow" data-value="5">★</span>
        </div>
        <p class="rating-text">Click to rate</p>
      </div>

      <!-- Example 2: Service Feedback -->
      <div class="rating-card ease-fade-in-up ease-delay-200">
        <h3>How was your experience?</h3>
        <div class="star-rating" data-rating="0">
          <span class="star ease-hover-grow" data-value="1">★</span>
          <span class="star ease-hover-grow" data-value="2">★</span>
          <span class="star ease-hover-grow" data-value="3">★</span>
          <span class="star ease-hover-grow" data-value="4">★</span>
          <span class="star ease-hover-grow" data-value="5">★</span>
        </div>
        <p class="rating-text">Select your rating</p>
      </div>

      <!-- Example 3: Pre-filled Rating (Display Only) -->
      <div class="rating-card ease-fade-in-up ease-delay-300">
        <h3>Customer Reviews</h3>
        <div class="star-rating display-only">
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star filled">★</span>
          <span class="star half">★</span>
        </div>
        <p class="rating-text">4.5 out of 5 (128 reviews)</p>
      </div>

      <!-- Example 4: Emoji + Stars Hybrid -->
      <div class="rating-card ease-fade-in-up ease-delay-400">
        <h3>Rate our Service</h3>
        <div class="emoji-rating">
          <span class="emoji-option ease-hover-grow" data-emoji="😞" data-value="1">😞</span>
          <span class="emoji-option ease-hover-grow" data-emoji="😐" data-value="2">😐</span>
          <span class="emoji-option ease-hover-grow" data-emoji="🙂" data-value="3">🙂</span>
          <span class="emoji-option ease-hover-grow" data-emoji="😊" data-value="4">😊</span>
          <span class="emoji-option ease-hover-grow" data-emoji="😍" data-value="5">😍</span>
        </div>
        <p class="rating-text">Choose your experience</p>
      </div>

    </div>
  </div>

  <!-- JavaScript for Rating Functionality -->
  <script>
    // Star Rating Interaction
    document.querySelectorAll('.star-rating:not(.display-only)').forEach(rating => {
      const stars = rating.querySelectorAll('.star');
      const ratingText = rating.parentElement.querySelector('.rating-text');
      
      // Hover effect
      stars.forEach(star => {
        star.addEventListener('mouseenter', () => {
          const value = parseInt(star.dataset.value);
          stars.forEach((s, index) => {
            if (index < value) {
              s.classList.add('hover');
            } else {
              s.classList.remove('hover');
            }
          });
        });
      });
      
      rating.addEventListener('mouseleave', () => {
        stars.forEach(s => s.classList.remove('hover'));
      });
      
      // Click to rate
      stars.forEach(star => {
        star.addEventListener('click', () => {
          const value = parseInt(star.dataset.value);
          rating.dataset.rating = value;
          
          stars.forEach((s, index) => {
            if (index < value) {
              s.classList.add('filled');
              s.classList.add('ease-bounce-in');
              setTimeout(() => s.classList.remove('ease-bounce-in'), 500);
            } else {
              s.classList.remove('filled');
            }
          });
          
          // Update text
          const labels = ['Poor', 'Fair', 'Good', 'Very Good', 'Excellent'];
          ratingText.textContent = `You rated: ${value}/5 - ${labels[value - 1]}`;
          ratingText.classList.add('ease-fade-in-up');
        });
      });
    });
    
    // Emoji Rating Interaction
    document.querySelectorAll('.emoji-rating').forEach(rating => {
      const emojis = rating.querySelectorAll('.emoji-option');
      const ratingText = rating.parentElement.querySelector('.rating-text');
      
      emojis.forEach(emoji => {
        emoji.addEventListener('click', () => {
          emojis.forEach(e => e.classList.remove('selected'));
          emoji.classList.add('selected');
          emoji.classList.add('ease-bounce-in');
          setTimeout(() => emoji.classList.remove('ease-bounce-in'), 500);
          
          const value = emoji.dataset.value;
          const labels = ['Very Poor', 'Poor', 'Average', 'Good', 'Excellent'];
          ratingText.textContent = `You selected: ${labels[value - 1]}`;
        });
      });
    });
  </script>
</body>
</html>
