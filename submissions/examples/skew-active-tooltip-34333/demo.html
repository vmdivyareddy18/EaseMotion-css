<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Skew-Active Tooltip Implementation - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Mock Dashboard Context to showcase the component workflow -->
  <div style="max-width: 600px; margin: 4rem auto; padding: 1rem; font-family: system-ui, sans-serif;">
    <h2 style="color: #1e293b; margin-bottom: 0.5rem;">Dashboard Analytics Preview</h2>
    <p style="color: #64748b; margin-bottom: 2rem; font-size: 0.95rem;">
      Hover over the interface metrics element below to observe the hardware-accelerated, zero-overhead skew interaction layout.
    </p>

    <!-- Component Playground Container -->
    <div class="analytics-container">
      
      <!-- Interactive Parent element acting as the Tooltip Trigger Link -->
      <button class="tooltip-trigger" aria-describedby="analytics-data">
        View Live Traffic Metrics
        
        <!-- The Target Skew-Active Tooltip Module -->
        <span id="analytics-data" class="em-tooltip" role="tooltip">
          Active Sessions: +24.8% vs last week
        </span>
      </button>

    </div>
  </div>

</body>
</html>
