<!DOCTYPE html>
<html>
<head>
  <title>Accordion FAQ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="faq">
  <div class="item">
    <h3 onclick="toggle(this)">What is this?</h3>
    <p>This is an accordion item.</p>
  </div>

  <div class="item">
    <h3 onclick="toggle(this)">How it works?</h3>
    <p>Click to expand or collapse.</p>
  </div>
</div>

<script>
function toggle(element) {
  const p = element.nextElementSibling;
  p.style.display = p.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
