<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Folder Open Reveal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Folder Open Reveal</h1>

    <p class="intro">
      A reusable folder reveal animation for file managers,
      cloud storage platforms, dashboards, and productivity tools.
    </p>

    <div class="demo-grid">

      <div class="folder-card">
        <div class="folder-reveal">
          <span class="folder">📂</span>
          <span class="document">📄</span>
        </div>
        <h3>Documents</h3>
      </div>

      <div class="folder-card">
        <div class="folder-reveal large">
          <span class="folder">📂</span>
          <span class="document">📄</span>
        </div>
        <p>File Access</p>
      </div>

      <div class="folder-card">
        <div class="folder-reveal">
          <span class="folder">📂</span>
          <span class="document">📄</span>
        </div>
        <button>Open Folder</button>
      </div>

    </div>

  </main>

</body>
</html>
