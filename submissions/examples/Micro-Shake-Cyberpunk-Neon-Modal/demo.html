<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Micro Shake Cyberpunk Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="launch-btn">
    Launch System
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="orb"></div>

        <h2>Cyber Control Center</h2>

        <p>
            Access futuristic controls through a glowing Micro Shake modal
            crafted entirely with HTML and CSS.
        </p>

        <div class="stats">

            <div class="card">
                <span>⚡</span>
                <h4>Energy</h4>
            </div>

            <div class="card">
                <span>🛰️</span>
                <h4>Network</h4>
            </div>

            <div class="card">
                <span>🛡️</span>
                <h4>Security</h4>
            </div>

        </div>

        <button>Initialize</button>

    </div>

</div>

</body>
</html>
