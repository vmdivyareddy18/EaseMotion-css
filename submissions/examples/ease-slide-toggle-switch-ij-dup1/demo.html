<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Toggle Switch - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Toggle Switch</h1>
    <p class="sts-toggle" id="stsToggle">
      <span class="sts-track">
        <span class="sts-thumb"></span>
      </span>
    </p>
    <p class="sts-label" id="stsLabel">Off</p>
  </div>
  <script>
    const toggle = document.getElementById('stsToggle');
    const label = document.getElementById('stsLabel');
    toggle.addEventListener('click', () => {
      const on = toggle.classList.toggle('sts-on');
      label.textContent = on ? 'On' : 'Off';
    });
  </script>
</body>
</html>
