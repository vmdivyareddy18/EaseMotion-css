<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Goblin Sneak Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #fef08a; /* A bright background to contrast the dark goblin */
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
    }
    
    .demo-goblin {
      font-size: 5rem;
      display: inline-block;
      /* Adding a shadow helps ground the character while sneaking */
      filter: drop-shadow(0 15px 5px rgba(0,0,0,0.2));
    }
    
    .instruction {
      color: #854d0e;
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>
  
  <p class="instruction">The Goblin is sneaking around...</p>

  <!-- We use the infinite animation variant here -->
  <div class="ease-goblin-sneak-ps demo-goblin">
    🧌
  </div>

</body>
</html>
