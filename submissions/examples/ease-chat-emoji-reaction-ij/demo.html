<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Emoji Reaction - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-wrapper">
    <h1>Emoji Reactions</h1>
    <p class="desc">Click an emoji to react with pop-in animation</p>
    <div class="er-card">
      <div class="er-chat">
        <div class="er-message">Great work on the release! 🎉</div>
        <div class="er-reactions" id="erReactions">
          <span class="er-reaction"><span class="er-emoji">👍</span><span class="er-count">2</span></span>
          <span class="er-reaction"><span class="er-emoji">❤️</span><span class="er-count">1</span></span>
        </div>
      </div>
      <div class="er-picker" id="erPicker">
        <button class="er-btn" data-emoji="👍">👍</button>
        <button class="er-btn" data-emoji="❤️">❤️</button>
        <button class="er-btn" data-emoji="😂">😂</button>
        <button class="er-btn" data-emoji="😮">😮</button>
        <button class="er-btn" data-emoji="🎉">🎉</button>
        <button class="er-btn" data-emoji="🔥">🔥</button>
      </div>
    </div>
  </div>
  <script>
    const reactions = document.getElementById('erReactions');
    const btns = document.querySelectorAll('.er-btn');

    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        const emoji = btn.dataset.emoji;

        btn.classList.remove('er-pop');
        void btn.offsetHeight;
        btn.classList.add('er-pop');

        const existing = reactions.querySelector(`.er-reaction[data-emoji="${emoji}"]`);
        if (existing) {
          const count = existing.querySelector('.er-count');
          count.textContent = parseInt(count.textContent) + 1;
        } else {
          const badge = document.createElement('span');
          badge.className = 'er-reaction';
          badge.dataset.emoji = emoji;
          badge.innerHTML = `<span class="er-emoji">${emoji}</span><span class="er-count">1</span>`;
          reactions.appendChild(badge);
        }
      });
    });
  </script>
</body>
</html>
