<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Tooltip Component</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <h1>Animated Tooltip Component</h1>

  <div class="tooltip-container">

    <button class="tooltip-btn">
      Hover Top
      <span class="tooltip tooltip-top">
        Top Tooltip
      </span>
    </button>


    <button class="tooltip-btn">
      Hover Bottom
      <span class="tooltip tooltip-bottom">
        Bottom Tooltip
      </span>
    </button>


    <button class="tooltip-btn">
      Hover Left
      <span class="tooltip tooltip-left">
        Left Tooltip
      </span>
    </button>


    <button class="tooltip-btn">
      Hover Right
      <span class="tooltip tooltip-right">
        Right Tooltip
      </span>
    </button>

  </div>

</body>

</html>
