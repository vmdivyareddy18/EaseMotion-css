<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Number Counter - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <!-- Dashboard Stat Widget -->
        <div class="stat-card">
            <div class="stat-header">
                <span class="stat-label">Active Global Streams</span>
                <span class="live-indicator">
                    <span class="live-dot"></span> LIVE
                </span>
            </div>

            <!-- Pure CSS Counter Widget -->
            <div class="counter-display">
                <!-- Ambient ripple rings radiating behind the count -->
                <div class="pulse-ring ring-1"></div>
                <div class="pulse-ring ring-2"></div>
                
                <div class="counter-value-wrapper">
                    <!-- The counting metric happens natively inside this element -->
                    <span class="pure-css-counter"></span><span class="counter-suffix">k</span>
                </div>
            </div>

            <div class="stat-footer">
                <span class="trend-positive">↑ 14.2%</span> vs last hour
            </div>
        </div>
    </main>
</body>
</html>
