<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Slide Card - Audio Player Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="audio-layout-container">
    
    <!-- Elastic Slide Card Component -->
    <div class="ease-audio-slide-card" tabindex="0">
      
      <!-- Visible Card Front (Album Art & Info) -->
      <div class="ease-audio-front">
        <div class="album-art">
          <!-- Abstract representation of album art -->
          <div class="art-gradient"></div>
          <div class="art-circle"></div>
        </div>
        
        <div class="track-info">
          <h3 class="track-title">Midnight City Lights</h3>
          <p class="track-artist">The Synthwave Collective</p>
        </div>
        
        <span class="slide-hint">Hover to play &rarr;</span>
      </div>
      
      <!-- Elastic Sliding Back Panel (Player Controls) -->
      <div class="ease-audio-back">
        
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill"></div>
            <div class="progress-thumb"></div>
          </div>
          <div class="time-flex">
            <span class="time-current">1:24</span>
            <span class="time-total">4:05</span>
          </div>
        </div>

        <div class="player-controls">
          <button class="control-btn btn-secondary" aria-label="Previous Track">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
          </button>
          
          <button class="control-btn btn-primary" aria-label="Play/Pause">
            <!-- Pause Icon (Default in active state) -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          
          <button class="control-btn btn-secondary" aria-label="Next Track">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <div class="extra-controls">
          <button class="icon-btn" aria-label="Like">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
          </button>
          <button class="icon-btn" aria-label="Shuffle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
          </button>
        </div>

      </div>
      
    </div>

  </div>

</body>
</html>
