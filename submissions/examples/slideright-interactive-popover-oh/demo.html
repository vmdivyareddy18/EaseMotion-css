<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Slide-Right Popover - Interactive Interface</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <span class="badge">Interactive Interface</span>
      <h1>Slide-Right Popover</h1>
      <p class="subtitle">Interactive slide animation</p>
    </header>

    <div class="display-area">
      <div class="popover-container">
        <button class="interact-btn" aria-label="More options">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"/>
            <circle cx="19" cy="12" r="1"/>
            <circle cx="5" cy="12" r="1"/>
          </svg>
        </button>
        <div class="slide-popover" role="tooltip">
          <div class="slide-header">
            <span class="slide-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </span>
            <div class="slide-info">
              <h4>Quick Menu</h4>
              <p>Navigate easily</p>
            </div>
          </div>
          <div class="slide-actions">
            <a href="#" class="slide-action" style="--delay: 0s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                  <polyline points="9,22 9,12 15,12 15,22"/>
                </svg>
              </span>
              <span>Dashboard</span>
            </a>
            <a href="#" class="slide-action" style="--delay: 0.05s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                  <line x1="3" y1="9" x2="21" y2="9"/>
                  <line x1="9" y1="21" x2="9" y2="9"/>
                </svg>
              </span>
              <span>Projects</span>
            </a>
            <a href="#" class="slide-action" style="--delay: 0.1s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
              <span>Profile</span>
            </a>
            <a href="#" class="slide-action" style="--delay: 0.15s">
              <span class="action-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
              </span>
              <span>Settings</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <section class="demo-section">
      <h3>Animation Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Slide</button>
          <div class="slide-popover slide" role="tooltip"><p>Slide animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Swipe</button>
          <div class="slide-popover swipe" role="tooltip"><p>Swipe animation</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Sweep</button>
          <div class="slide-popover sweep" role="tooltip"><p>Sweep animation</p></div>
        </div>
      </div>
    </section>

    <section class="demo-section">
      <h3>Color Themes</h3>
      <div class="themes-grid">
        <div class="popover-container">
          <button class="trigger-btn small theme-indigo">Indigo</button>
          <div class="slide-popover theme-indigo" role="tooltip"><p>Indigo interactive theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-violet">Violet</button>
          <div class="slide-popover theme-violet" role="tooltip"><p>Violet interactive theme</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small theme-blue">Blue</button>
          <div class="slide-popover theme-blue" role="tooltip"><p>Blue interactive theme</p></div>
        </div>
      </div>
    </section>

  </main>

</body>
</html>
