<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Advanced Theme Engine</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="ambient-glow"></div>
    <main class="dashboard">
      <header class="header">
        <span class="badge">Phase 153 • Developer Platform</span>
        <h1>Advanced Theme Engine</h1>
        <p class="subtitle">Dynamic theme generation.</p>
      </header>
      <div class="dashboard-grid">
        <section class="panel-card main-panel">
          <h3>🎨 Theme Configurator</h3>
          <div class="theme-picker">
            <div class="color-swatch-row">
              <span class="swatch" style="background: #8b5cf6"></span>
              <span class="swatch" style="background: #0d9488"></span>
              <span class="swatch" style="background: #ec4899"></span>
            </div>
            <div class="preview-box theme-preview">
              <h4>Bespoke Preview Block</h4>
              <p>Dynamic CSS inject status: <strong>Enabled</strong></p>
            </div>
          </div>
        </section>
        <section class="side-panel">
          <div class="panel-card status-card">
            <h3>⚡ Core Hub</h3>
            <ul class="stats-list">
              <li>Orchestrator: <strong>Ready</strong></li>
              <li>Connection: <strong>SSL Synced</strong></li>
              <li>Telemetry: <strong>100%</strong></li>
            </ul>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
