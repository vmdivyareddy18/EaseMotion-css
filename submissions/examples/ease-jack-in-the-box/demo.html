<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-jack-in-the-box – Jack‑in‑the‑Box Entrance</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Jack‑in‑the‑Box
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click the button to see the box spring open with a bouncy pop.
    </p>

    <!-- The box that springs open -->
    <div id="box" class="jack-box">
      <div class="jack-lid"></div>
      <div class="jack-body">
        <span class="jack-surprise">🎉</span>
      </div>
    </div>

    <button id="pop-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">
      Pop the Box
    </button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500">
      <code>scale(0.1) + rotate(30deg)</code> → spring settle.
    </p>
  </div>

  <script>
    const box = document.getElementById('box');
    const popBtn = document.getElementById('pop-btn');

    function jackPop() {
      box.classList.remove('pop');
      void box.offsetWidth; // force reflow to restart animation
      box.classList.add('pop');
    }

    popBtn.addEventListener('click', jackPop);
  </script>

</body>
</html>
