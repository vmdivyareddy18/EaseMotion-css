<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subscription Seat Utilization Table</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Subscription Seat Utilization</h1>

        <p class="subtitle">
            Track seat allocation and usage across subscription plans.
        </p>

        <table>

            <thead>

                <tr>

                    <th>Team</th>

                    <th>Allocated</th>

                    <th>Used</th>

                    <th>Utilization</th>

                    <th>Status</th>

                </tr>

            </thead>

            <tbody>

                <tr>

                    <td>Engineering</td>

                    <td>80</td>

                    <td>74</td>

                    <td>

                        <div class="bar">

                            <div class="fill engineering"></div>

                        </div>

                    </td>

                    <td><span class="badge high">92%</span></td>

                </tr>

                <tr>

                    <td>Design</td>

                    <td>30</td>

                    <td>21</td>

                    <td>

                        <div class="bar">

                            <div class="fill design"></div>

                        </div>

                    </td>

                    <td><span class="badge medium">70%</span></td>

                </tr>

                <tr>

                    <td>Sales</td>

                    <td>45</td>

                    <td>19</td>

                    <td>

                        <div class="bar">

                            <div class="fill sales"></div>

                        </div>

                    </td>

                    <td><span class="badge low">42%</span></td>

                </tr>

            </tbody>

        </table>

        <div class="summary">

            <div class="stat">

                <span>Total Seats</span>

                <strong>155</strong>

            </div>

            <div class="stat">

                <span>Active Seats</span>

                <strong>114</strong>

            </div>

            <div class="stat">

                <span>Available</span>

                <strong>41</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
