<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-reorder-shift – Smooth reorder animation</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Smooth Reorder with FLIP
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Click "Move Up" / "Move Down" to reorder. Items animate smoothly to new positions.
    </p>

    <!-- Controls -->
    <div class="ease-mb-8 ease-flex ease-justify-center ease-gap-4 ease-flex-wrap">
      <button id="shuffle-btn" class="ease-btn ease-btn-secondary ease-hover-scale-105 ease-transition">
        🔀 Shuffle List
      </button>
      <button id="reset-btn" class="ease-btn ease-btn-ghost ease-hover-scale-105 ease-transition">
        ↺ Reset
      </button>
    </div>

    <!-- Reorderable list -->
    <ul id="reorder-list" class="reorder-list">
      <li class="reorder-item ease-card ease-p-4 ease-mb-3" data-id="1">
        <div class="ease-flex ease-justify-between ease-items-center">
          <span class="ease-font-semibold">📋 Item 1 – Project Proposal</span>
          <div class="ease-flex ease-gap-2">
            <button class="move-up-btn ease-btn ease-btn-sm ease-btn-ghost" aria-label="Move up">↑</button>
            <button class="move-down-btn ease-btn ease-btn-sm ease-btn-ghost" aria-label="Move down">↓</button>
          </div>
        </div>
      </li>
      <li class="reorder-item ease-card ease-p-4 ease-mb-3" data-id="2">
        <div class="ease-flex ease-justify-between ease-items-center">
          <span class="ease-font-semibold">💻 Item 2 – Developer Docs</span>
          <div class="ease-flex ease-gap-2">
            <button class="move-up-btn ease-btn ease-btn-sm ease-btn-ghost">↑</button>
            <button class="move-down-btn ease-btn ease-btn-sm ease-btn-ghost">↓</button>
          </div>
        </div>
      </li>
      <li class="reorder-item ease-card ease-p-4 ease-mb-3" data-id="3">
        <div class="ease-flex ease-justify-between ease-items-center">
          <span class="ease-font-semibold">🎨 Item 3 – Design Assets</span>
          <div class="ease-flex ease-gap-2">
            <button class="move-up-btn ease-btn ease-btn-sm ease-btn-ghost">↑</button>
            <button class="move-down-btn ease-btn ease-btn-sm ease-btn-ghost">↓</button>
          </div>
        </div>
      </li>
      <li class="reorder-item ease-card ease-p-4 ease-mb-3" data-id="4">
        <div class="ease-flex ease-justify-between ease-items-center">
          <span class="ease-font-semibold">📊 Item 4 – Metrics Report</span>
          <div class="ease-flex ease-gap-2">
            <button class="move-up-btn ease-btn ease-btn-sm ease-btn-ghost">↑</button>
            <button class="move-down-btn ease-btn ease-btn-sm ease-btn-ghost">↓</button>
          </div>
        </div>
      </li>
      <li class="reorder-item ease-card ease-p-4 ease-mb-3" data-id="5">
        <div class="ease-flex ease-justify-between ease-items-center">
          <span class="ease-font-semibold">🔒 Item 5 – Security Audit</span>
          <div class="ease-flex ease-gap-2">
            <button class="move-up-btn ease-btn ease-btn-sm ease-btn-ghost">↑</button>
            <button class="move-down-btn ease-btn ease-btn-sm ease-btn-ghost">↓</button>
          </div>
        </div>
      </li>
    </ul>
  </div>

  <script>
    const list = document.getElementById('reorder-list');

    // ----- FLIP helper -----
    function flipMove(item, prevRect) {
      const nextRect = item.getBoundingClientRect();
      const dx = prevRect.left - nextRect.left;
      const dy = prevRect.top - nextRect.top;
      if (dx === 0 && dy === 0) return;
      // Invert: apply the inverse transform immediately (no transition)
      item.style.transition = 'none';
      item.style.transform = 	ranslate(px, px);
      // Force reflow
      item.offsetHeight;
      // Play: remove transform with transition
      item.style.transition = 'transform 0.3s ease';
      item.style.transform = '';
      // Clean up after transition
      item.addEventListener('transitionend', function handler() {
        item.style.transition = '';
        item.style.transform = '';
        item.removeEventListener('transitionend', handler);
      });
    }

    function moveItem(item, direction) {
      const items = [...list.children];
      const index = items.indexOf(item);
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= items.length) return;

      // Record old positions of both items
      const oldRects = items.map(el => el.getBoundingClientRect());

      // Swap in DOM
      if (direction === -1) {
        list.insertBefore(item, items[targetIndex]);
      } else {
        list.insertBefore(item, items[targetIndex].nextSibling);
      }

      // FLIP: animate from old to new
      const newItems = [...list.children];
      newItems.forEach((el, i) => {
        const oldIdx = items.indexOf(el);
        if (oldIdx !== -1) {
          flipMove(el, oldRects[oldIdx]);
        }
      });
    }

    // ----- Event delegation for move buttons -----
    list.addEventListener('click', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const item = btn.closest('.reorder-item');
      if (!item) return;
      if (btn.classList.contains('move-up-btn')) moveItem(item, -1);
      else if (btn.classList.contains('move-down-btn')) moveItem(item, 1);
    });

    // ----- Shuffle / Reset -----
    document.getElementById('shuffle-btn').addEventListener('click', () => {
      const items = [...list.children];
      const oldRects = items.map(el => el.getBoundingClientRect());
      // Shuffle array
      for (let i = items.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        list.insertBefore(items[j], items[i].nextSibling);
      }
      const newItems = [...list.children];
      newItems.forEach((el, i) => {
        const oldIdx = items.indexOf(el);
        if (oldIdx !== -1) flipMove(el, oldRects[oldIdx]);
      });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      const items = [...list.children];
      const oldRects = items.map(el => el.getBoundingClientRect());
      // Sort by data-id
      const sorted = items.sort((a, b) => a.dataset.id - b.dataset.id);
      sorted.forEach(el => list.appendChild(el)); // Re-append in order
      const newItems = [...list.children];
      newItems.forEach((el, i) => {
        const oldIdx = items.indexOf(el);
        if (oldIdx !== -1) flipMove(el, oldRects[oldIdx]);
      });
    });
  </script>

</body>
</html>
