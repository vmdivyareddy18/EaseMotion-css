<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tilt Popover Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    /* just some quick page styling so the demo isn't ugly, not part of the component itself */
    body {
      font-family: system-ui, sans-serif;
      background: #f4f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- try hovering the button, or tabbing to it with keyboard -->
  <div class="tilt-popover-wrapper">
    <button class="tilt-trigger">Hover or Tab to me</button>
    <div class="tilt-popover-box" role="tooltip">
      This popover tilts in with a smooth 3D rotation.
      Works on hover and keyboard focus, no JavaScript involved.
    </div>
  </div>

</body>
</html>
