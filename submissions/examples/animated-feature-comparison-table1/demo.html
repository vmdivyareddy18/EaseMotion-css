<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Feature Comparison Table - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Compare Plans</h1>
      <p>Find the perfect plan for your team's needs.</p>
    </header>

    <!-- Table Wrapper (Allows horizontal scroll on mobile) -->
    <div class="table-wrapper ease-fade-in-up ease-delay-100">
      <table class="comparison-table">
        <thead>
          <tr class="ease-fade-in-down ease-delay-200">
            <th class="feature-col">Features</th>
            <th>
              <span class="plan-name">Basic</span>
              <span class="plan-price">$9/mo</span>
            </th>
            <th class="highlight-col">
              <span class="plan-badge">Most Popular</span>
              <span class="plan-name">Pro</span>
              <span class="plan-price">$29/mo</span>
            </th>
            <th>
              <span class="plan-name">Enterprise</span>
              <span class="plan-price">$99/mo</span>
            </th>
          </tr>
        </thead>
        <tbody>
          <!-- Row 1 -->
          <tr class="ease-fade-in-up ease-delay-300">
            <td class="feature-col">Unlimited Projects</td>
            <td><span class="icon cross ease-bounce-in ease-delay-400">✕</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-500">✓</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-600">✓</span></td>
          </tr>

          <!-- Row 2 -->
          <tr class="ease-fade-in-up ease-delay-400">
            <td class="feature-col">Priority Support</td>
            <td><span class="icon cross ease-bounce-in ease-delay-500">✕</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-600">✓</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-700">✓</span></td>
          </tr>

          <!-- Row 3 -->
          <tr class="ease-fade-in-up ease-delay-500">
            <td class="feature-col">Custom Domains</td>
            <td><span class="icon cross ease-bounce-in ease-delay-600">✕</span></td>
            <td><span class="icon cross ease-bounce-in ease-delay-700">✕</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-800">✓</span></td>
          </tr>

          <!-- Row 4 -->
          <tr class="ease-fade-in-up ease-delay-600">
            <td class="feature-col">Advanced Analytics</td>
            <td><span class="icon check ease-bounce-in ease-delay-700">✓</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-800">✓</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-900">✓</span></td>
          </tr>

          <!-- Row 5 -->
          <tr class="ease-fade-in-up ease-delay-700">
            <td class="feature-col">API Access</td>
            <td><span class="icon cross ease-bounce-in ease-delay-800">✕</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-900">✓</span></td>
            <td><span class="icon check ease-bounce-in ease-delay-1000">✓</span></td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- CTA Buttons -->
    <div class="cta-buttons ease-fade-in-up ease-delay-1100">
      <button class="btn btn-outline ease-hover-grow">Choose Basic</button>
      <button class="btn btn-primary ease-hover-grow">Choose Pro</button>
      <button class="btn btn-outline ease-hover-grow">Choose Enterprise</button>
    </div>
  </div>
</body>
</html>
