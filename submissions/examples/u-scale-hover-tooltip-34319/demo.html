<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Dashboard Analytics Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<div class="container">

<span class="badge">

Analytics Dashboard

</span>

<h1>

Scale Hover Tooltip

</h1>

<p>

Interactive tooltip component
crafted for modern analytics
interfaces and dashboard
experiences.

</p>

<div class="tooltip-wrapper">

<button

class="trigger"

aria-describedby="tooltip"

>

View Insights

</button>

<div

id="tooltip"

class="tooltip"

role="tooltip"

>

<div class="metric">

+42%

</div>

<h3>

Monthly Growth

</h3>

<p>

Track performance trends
with responsive tooltip
interactions built using CSS.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
