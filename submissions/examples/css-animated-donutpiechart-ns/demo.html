<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Donut Chart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <h2 class="demo-title">Revenue Breakdown</h2>
    <p class="demo-subtitle">Q4 2024 — Animated on load</p>

    <div class="charts-row">

      <!-- Chart 1 — single segment -->
      <div class="chart-card">
        <div class="donut" style="--total: 100;">
          <svg class="donut-svg" viewBox="0 0 120 120">
            <circle class="donut-track" cx="60" cy="60" r="48"/>
            <circle
              class="donut-segment"
              cx="60" cy="60" r="48"
              style="
                --segment-color: #e63946;
                --dash: 72;
                --offset: 0;
              "
            />
          </svg>
          <div class="donut-label">
            <span class="donut-value">72%</span>
            <span class="donut-name">Product</span>
          </div>
        </div>
        <p class="chart-legend-title">Product Sales</p>
        <ul class="chart-legend">
          <li><span class="legend-dot" style="--dot-color:#e63946"></span>Product — 72%</li>
          <li><span class="legend-dot" style="--dot-color:#e8e8e8"></span>Other — 28%</li>
        </ul>
      </div>

      <!-- Chart 2 — multi segment donut -->
      <div class="chart-card">
        <div class="donut" style="--total: 100;">
          <svg class="donut-svg" viewBox="0 0 120 120">
            <circle class="donut-track" cx="60" cy="60" r="48"/>
            <!-- Segment 1: 45% -->
            <circle
              class="donut-segment"
              cx="60" cy="60" r="48"
              style="
                --segment-color: #457b9d;
                --dash: 45;
                --offset: 0;
              "
            />
            <!-- Segment 2: 30% -->
            <circle
              class="donut-segment"
              cx="60" cy="60" r="48"
              style="
                --segment-color: #2a9d8f;
                --dash: 30;
                --offset: -45;
              "
            />
            <!-- Segment 3: 25% -->
            <circle
              class="donut-segment"
              cx="60" cy="60" r="48"
              style="
                --segment-color: #e9c46a;
                --dash: 25;
                --offset: -75;
              "
            />
          </svg>
          <div class="donut-label">
            <span class="donut-value">3</span>
            <span class="donut-name">Segments</span>
          </div>
        </div>
        <p class="chart-legend-title">Traffic Sources</p>
        <ul class="chart-legend">
          <li><span class="legend-dot" style="--dot-color:#457b9d"></span>Organic — 45%</li>
          <li><span class="legend-dot" style="--dot-color:#2a9d8f"></span>Referral — 30%</li>
          <li><span class="legend-dot" style="--dot-color:#e9c46a"></span>Direct — 25%</li>
        </ul>
      </div>

      <!-- Chart 3 — progress ring style -->
      <div class="chart-card">
        <div class="donut donut--thin" style="--total: 100;">
          <svg class="donut-svg" viewBox="0 0 120 120">
            <circle class="donut-track donut-track--thin" cx="60" cy="60" r="48"/>
            <circle
              class="donut-segment donut-segment--thin"
              cx="60" cy="60" r="48"
              style="
                --segment-color: #c77dff;
                --dash: 87;
                --offset: 0;
              "
            />
          </svg>
          <div class="donut-label">
            <span class="donut-value">87%</span>
            <span class="donut-name">Goal</span>
          </div>
        </div>
        <p class="chart-legend-title">Annual Target</p>
        <ul class="chart-legend">
          <li><span class="legend-dot" style="--dot-color:#c77dff"></span>Achieved — 87%</li>
          <li><span class="legend-dot" style="--dot-color:#e8e8e8"></span>Remaining — 13%</li>
        </ul>
      </div>

    </div>
  </div>

  <script>
    // Trigger animation when chart enters viewport
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('donut--animate');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    document.querySelectorAll('.donut').forEach(el => observer.observe(el));
  </script>

</body>
</html>
