<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Counter Digit Scroll | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Counter Digit Scroll</h1>

    <div class="counter-group">
      <div class="counter" data-target="8742" data-label="Downloads"></div>
      <div class="counter" data-target="3561" data-label="Stars"></div>
      <div class="counter" data-target="1204" data-label="Contributors"></div>
    </div>

    <div class="controls">
      <button class="btn" id="startBtn">Start All</button>
      <button class="btn btn-outline" id="resetBtn">Reset All</button>
    </div>
  </div>

  <script>
    const digitStr = n => n.toString().padStart(4, '0').split('').map(Number);
    const duration = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--counter-digit-duration')) || 1200;

    const counters = document.querySelectorAll('.counter');

    counters.forEach(el => {
      const target = parseInt(el.dataset.target);
      const targetDigits = digitStr(target);
      const wheel = document.createElement('div');
      wheel.className = 'digit-wheel';
      targetDigits.forEach((d, i) => {
        const slot = document.createElement('div');
        slot.className = 'digit-slot';
        const strip = document.createElement('div');
        strip.className = 'digit-strip';
        strip.dataset.index = i;
        strip.dataset.final = d;
        for (let n = 0; n <= 9; n++) {
          const span = document.createElement('span');
          span.className = 'digit-span';
          span.textContent = n;
          strip.appendChild(span);
        }
        slot.appendChild(strip);
        wheel.appendChild(slot);
      });
      el.appendChild(wheel);

      const label = document.createElement('div');
      label.className = 'counter-label';
      label.textContent = el.dataset.label;
      el.appendChild(label);
    });

    const animate = (el, digit) => {
      const strips = el.querySelectorAll('.digit-strip');
      strips.forEach((strip, i) => {
        const final = parseInt(strip.dataset.final);
        strip.style.transition = 'none';
        strip.style.transform = 'translateY(0)';
        void strip.offsetHeight;
        const delay = i * 80;
        const offset = -final * strip.querySelector('.digit-span').offsetHeight;
        setTimeout(() => {
          strip.style.transition = `transform ${duration}ms cubic-bezier(0.25, 0.8, 0.35, 1)`;
          strip.style.transform = `translateY(${offset}px)`;
        }, delay);
      });
    };

    const reset = (el) => {
      const strips = el.querySelectorAll('.digit-strip');
      strips.forEach(strip => {
        strip.style.transition = 'none';
        strip.style.transform = 'translateY(0)';
      });
    };

    document.getElementById('startBtn').addEventListener('click', () => {
      counters.forEach(el => animate(el));
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      counters.forEach(el => reset(el));
    });

    counters.forEach(el => animate(el));
  </script>
</body>
</html>
