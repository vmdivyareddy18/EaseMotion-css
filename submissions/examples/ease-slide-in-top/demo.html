<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-slide-in-top – Slide In From Top</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Slide In From Top</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Click the button to make the card slide in from above.</p>

    <div id="slide-box" class="slide-in-top-card ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Hello!</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">I dropped in smoothly</p>
    </div>

    <button id="slide-btn" class="ease-btn ease-btn-primary ease-hover-scale-105 ease-transition ease-mt-8">Slide In</button>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-6 ease-fade-in ease-delay-500"><code>translateY(-30px) + opacity(0)</code> → <code>0</code> in 0.4s ease‑out.</p>
  </div>

  <script>
    const box = document.getElementById('slide-box');
    document.getElementById('slide-btn').addEventListener('click', () => {
      box.classList.remove('slide');
      void box.offsetWidth;          // force reflow to restart animation
      box.classList.add('slide');
    });
  </script>

</body>
</html>
