<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-image-lazy-load-blur – Blur‑up lazy load</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-8 ease-fade-in">
      Blur‑up Image Loading
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Low‑quality blurred placeholder transitions to sharp on load.
    </p>

    <!-- The image wrapper applies the blur transition -->
    <div class="image-blur-wrapper">
      <img
        id="lazy-image"
        src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&h=600&fit=crop"
        alt="Mountain landscape"
        class="blur-image"
        loading="lazy"
        onload="this.classList.add('ease-loaded')"
      >
    </div>

    <p id="status" class="ease-text-sm ease-text-gray-400 ease-mt-4">
      Loading image...
    </p>
  </div>

  <script>
    const img = document.getElementById('lazy-image');
    const status = document.getElementById('status');

    // If the image is already cached and loads instantly, the class may not be added.
    // Force it for demo purposes if needed:
    if (img.complete) {
      img.classList.add('ease-loaded');
      status.textContent = 'Image loaded (cached)';
    } else {
      img.addEventListener('load', () => {
        status.textContent = 'Image loaded – sharp!';
      });
    }
  </script>

</body>
</html>
