<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mix Blend Mode Utilities Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Mix Blend Mode Utilities Demo</h1>

    <div class="container">

        <div class="card">
            <div class="blend-box">
                <div class="circle red"></div>
                <div class="circle blue ease-blend-multiply"></div>
            </div>
            <p>.ease-blend-multiply</p>
        </div>

        <div class="card">
            <div class="blend-box dark">
                <div class="circle red"></div>
                <div class="circle blue ease-blend-screen"></div>
            </div>
            <p>.ease-blend-screen</p>
        </div>

        <div class="card">
            <div class="blend-box">
                <div class="circle red"></div>
                <div class="circle blue ease-blend-overlay"></div>
            </div>
            <p>.ease-blend-overlay</p>
        </div>

    </div>

</body>
</html>
