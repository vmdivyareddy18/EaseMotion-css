<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fade In Modal - Minimalist Tech</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<input type="checkbox" id="modal-toggle">

<div class="page">

    <h1>Minimalist Tech Modal</h1>
    <p>
        Elegant CSS-only fade in modal with subtle motion.
    </p>

    <label for="modal-toggle" class="open-btn">
        Open Modal
    </label>

</div>

<div class="overlay">

    <div class="modal">

        <div class="icon">
            ✓
        </div>

        <h2>Project Published</h2>

        <p>
            Your project has been successfully published.
            You can continue editing anytime.
        </p>

        <div class="actions">

            <label for="modal-toggle" class="btn secondary">
                Cancel
            </label>

            <label for="modal-toggle" class="btn primary">
                Continue
            </label>

        </div>

    </div>

</div>

</body>
</html>
