  <script>
    (function () {
      var filterButtons = Array.prototype.slice.call(
        document.querySelectorAll(".filter-btn")
      );
      var galleryItems = Array.prototype.slice.call(
        document.querySelectorAll(".gallery-item")
      );
      var statusEl = document.getElementById("filter-status");

      function applyFilter(category) {
        var visibleCount = 0;

        galleryItems.forEach(function (item) {
          var itemCategory = item.getAttribute("data-category");
          var matches = category === "all" || itemCategory === category;

          if (matches) {
            visibleCount += 1;
            item.hidden = false;
            // Force reflow so the transition replays every time.
            void item.offsetWidth;
            item.classList.remove("gallery-item--hidden");
            item.classList.add("gallery-item--visible");
          } else {
            item.classList.remove("gallery-item--visible");
            item.classList.add("gallery-item--hidden");
          }
        });

        var label =
          category === "all"
            ? "Showing all " + visibleCount + " photos"
            : "Showing " +
              visibleCount +
              " " +
              category +
              " photo" +
              (visibleCount === 1 ? "" : "s");
        statusEl.textContent = label;
      }

      function handleTransitionEnd(event) {
        if (event.propertyName !== "opacity") return;
        var item = event.currentTarget;
        if (item.classList.contains("gallery-item--hidden")) {
          item.hidden = true;
        }
      }

      galleryItems.forEach(function (item) {
        item.classList.add("gallery-item--visible");
        item.addEventListener("transitionend", handleTransitionEnd);
      });

      filterButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          var category = button.getAttribute("data-filter");

          filterButtons.forEach(function (btn) {
            var isActive = btn === button;
            btn.classList.toggle("is-active", isActive);
            btn.setAttribute("aria-pressed", isActive ? "true" : "false");
          });

          applyFilter(category);
        });
      });
    })();
  </script>
</body>
</html>
