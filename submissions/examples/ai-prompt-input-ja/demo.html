<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Futuristic AI Prompt Input - JA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ai-prompt-container">
    <div class="ai-prompt-card">
      <div class="input-wrapper">
        <svg class="ai-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
        <input type="text" class="ai-input" placeholder="Ask anything to the futuristic AI..." />
        <button class="ai-send-btn">
          <span>Send</span>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
