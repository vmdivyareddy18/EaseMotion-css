<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skeleton Loading States Utility — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f8fafc; padding: 5rem 1rem; margin: 0;">

  <div class="ease-skeleton-container">
    
    <div style="display: flex; align-items: center; gap: 1rem;">
      <div class="ease-skeleton-media-circle ease-loading-skeleton"></div>
      
      <div style="flex: 1; display: flex; flex-direction: column; gap: 0.5rem;">
        <div class="ease-skeleton-text-row ease-loading-skeleton" style="width: 40%; height: 14px;"></div>
        <div class="ease-skeleton-text-row ease-loading-skeleton" style="width: 25%;"></div>
      </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #f1f5f9; margin: 0.25rem 0;" />

    <div style="display: flex; flex-direction: column; gap: 0.6rem;">
      <div class="ease-skeleton-text-row ease-loading-skeleton"></div>
      <div class="ease-skeleton-text-row ease-loading-skeleton" style="width: 92%;"></div>
      <div class="ease-skeleton-text-row ease-loading-skeleton" style="width: 65%;"></div>
    </div>

  </div>

</body>
</html>
