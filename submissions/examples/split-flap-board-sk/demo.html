<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Split-Flap Departure Board</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      font-family: 'Courier New', monospace;
      padding: 2rem;
      gap: 2rem;
    }
    h1 {
      color: #f5c542;
      font-size: 1.1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
    .board-label {
      color: #555;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      background: #1a1a1a;
      color: #f5c542;
      border: 1px solid #333;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s;
    }
    button:hover { background: #2a2a2a; }
  </style>
</head>
<body>
  <h1>Departure Board</h1>

  <div>
    <div class="board-label">Destination</div>
    <div class="flap-board" id="board">
      <!-- rendered by JS -->
    </div>
  </div>

  <div class="controls">
    <button onclick="setWord('NEW YORK')">NEW YORK</button>
    <button onclick="setWord('LONDON')">LONDON</button>
    <button onclick="setWord('TOKYO')">TOKYO</button>
    <button onclick="setWord('PARIS')">PARIS</button>
    <button onclick="setWord('DELAYED')">DELAYED</button>
  </div>

  <script>
    const CHARS = ' ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    const BOARD_SIZE = 8;
    let currentChars = Array(BOARD_SIZE).fill(' ');
    let flapping = false;

    function buildBoard() {
      const board = document.getElementById('board');
      board.innerHTML = '';
      const row = document.createElement('div');
      row.className = 'flap-board__row';
      for (let i = 0; i < BOARD_SIZE; i++) {
        const flap = document.createElement('div');
        flap.className = 'flap';
        flap.id = `flap-${i}`;
        flap.innerHTML = `
          <div class="flap__card flap__top">${currentChars[i]}</div>
          <div class="flap__card flap__bottom">${currentChars[i]}</div>
        `;
        row.appendChild(flap);
      }
      board.appendChild(row);
    }

    function animateFlap(index, fromChar, toChar, delay) {
      return new Promise(resolve => {
        setTimeout(() => {
          const flapEl = document.getElementById(`flap-${index}`);
          if (!flapEl) return resolve();

          // Insert flip elements
          const flipTop = document.createElement('div');
          flipTop.className = 'flap__card flap__flip-top';
          flipTop.textContent = fromChar;

          const flipBottom = document.createElement('div');
          flipBottom.className = 'flap__card flap__flip-bottom';
          flipBottom.textContent = toChar;

          flapEl.appendChild(flipTop);
          flapEl.appendChild(flipBottom);

          const duration = parseFloat(getComputedStyle(document.documentElement)
            .getPropertyValue('--flap-duration')) * 1000 || 350;

          setTimeout(() => {
            // Update static cards to new char
            flapEl.querySelector('.flap__top').textContent = toChar;
            flapEl.querySelector('.flap__bottom').textContent = toChar;
            flipTop.remove();
            flipBottom.remove();
            resolve();
          }, duration * 2 + 50);
        }, delay);
      });
    }

    async function setWord(word) {
      if (flapping) return;
      flapping = true;

      const padded = word.padEnd(BOARD_SIZE, ' ').slice(0, BOARD_SIZE).toUpperCase();
      const promises = [];

      for (let i = 0; i < BOARD_SIZE; i++) {
        const from = currentChars[i];
        const to = padded[i];
        if (from !== to) {
          promises.push(animateFlap(i, from, to, i * 60));
          currentChars[i] = to;
        }
      }

      await Promise.all(promises);
      flapping = false;
    }

    buildBoard();
    setTimeout(() => setWord('NEW YORK'), 500);
  </script>
</body>
</html>
