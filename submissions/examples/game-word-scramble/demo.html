<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔤 Word Scramble</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🔤 Word Scramble</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🎯 Score</span>
        <span class="stat-value" id="scoreDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">⏱️ Time</span>
        <span class="stat-value" id="timeDisplay">30</span>
        <span class="stat-unit">s</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">📊 Round</span>
        <span class="stat-value" id="roundDisplay">1</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Best</span>
        <span class="stat-value" id="bestDisplay">—</span>
      </div>
    </div>

    <div class="game-area">
      <div class="scrambled-word" id="scrambledWord">—</div>
      <div class="hint-area">
        <span class="hint-label">💡 Hint:</span>
        <span class="hint-text" id="hintText">Click Start to begin</span>
      </div>
      <div class="input-area">
        <input type="text" id="wordInput" placeholder="Type your answer..." disabled>
        <button class="submit-btn" id="submitBtn" disabled>Submit</button>
      </div>
      <div class="letter-buttons" id="letterButtons">
        <!-- Letter buttons generated by JavaScript -->
      </div>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Game</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
      <button class="control-btn" id="skipBtn">⏭️ Skip</button>
    </div>

    <div class="game-status" id="gameStatus">🔤 Click Start to begin unscrambling!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const scrambledDisplay = document.getElementById('scrambledWord');
      const hintText = document.getElementById('hintText');
      const wordInput = document.getElementById('wordInput');
      const submitBtn = document.getElementById('submitBtn');
      const letterButtons = document.getElementById('letterButtons');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const timeDisplay = document.getElementById('timeDisplay');
      const roundDisplay = document.getElementById('roundDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const skipBtn = document.getElementById('skipBtn');
      const gameStatus = document.getElementById('gameStatus');

      // ---------- Word Bank ----------
      const WORD_BANK = [
        // 3-4 letter words
        { word: 'cat', hint: 'A small furry pet' },
        { word: 'dog', hint: 'Man\'s best friend' },
        { word: 'sun', hint: 'The star at the center of our solar system' },
        { word: 'moon', hint: 'Earth\'s natural satellite' },
        { word: 'star', hint: 'A luminous celestial body' },
        { word: 'fish', hint: 'Swims in water' },
        { word: 'bird', hint: 'Has wings and feathers' },
        { word: 'tree', hint: 'A tall plant with a trunk' },
        { word: 'book', hint: 'A set of written pages' },
        { word: 'cake', hint: 'A sweet baked dessert' },
        { word: 'rain', hint: 'Water falling from clouds' },
        { word: 'snow', hint: 'Frozen precipitation' },
        { word: 'wind', hint: 'Moving air' },
        { word: 'fire', hint: 'Combustion producing heat and light' },
        { word: 'rock', hint: 'A solid mineral material' },
        // 5-6 letter words
        { word: 'apple', hint: 'A round red or green fruit' },
        { word: 'banana', hint: 'A yellow curved fruit' },
        { word: 'garden', hint: 'A place where plants are grown' },
        { word: 'flower', hint: 'A colorful plant bloom' },
        { word: 'planet', hint: 'A celestial body orbiting a star' },
        { word: 'tiger', hint: 'A large striped cat' },
        { word: 'eagle', hint: 'A large bird of prey' },
        { word: 'ocean', hint: 'A vast body of salt water' },
        { word: 'forest', hint: 'A large area covered with trees' },
        { word: 'bridge', hint: 'A structure built over water' },
        { word: 'castle', hint: 'A large fortified building' },
        { word: 'camera', hint: 'A device that captures images' },
        { word: 'rocket', hint: 'A vehicle that travels to space' },
        // 7+ letter words
        { word: 'elephant', hint: 'The largest land animal' },
        { word: 'dolphin', hint: 'A highly intelligent marine mammal' },
        { word: 'giraffe', hint: 'The tallest land animal' },
        { word: 'penguin', hint: 'A flightless bird that lives in cold regions' },
        { word: 'rainbow', hint: 'A colorful arc in the sky after rain' },
        { word: 'chocolate', hint: 'A sweet treat made from cocoa' },
        { word: 'computer', hint: 'An electronic device for processing data' },
        { word: 'telephone', hint: 'A device for voice communication' },
        { word: 'television', hint: 'A screen that displays moving images' },
        { word: 'airplane', hint: 'A vehicle that flies through the air' }
      ];

      // ---------- Game State ----------
      let currentWord = '';
      let scrambled = '';
      let currentHint = '';
      let score = 0;
      let round = 1;
      let timeLeft = 30;
      let bestScore = parseInt(localStorage.getItem('wordScrambleBest')) || 0;
      let gameRunning = false;
      let timerInterval = null;
      let currentWordIndex = 0;
      let usedWords = [];
      let streak = 0;

      // ---------- High Score ----------
      if (bestScore > 0) {
        bestDisplay.textContent = bestScore;
      }

      // ---------- Helper Functions ----------
      function shuffleWord(word) {
        let arr = word.split('');
        // Don't shuffle if word is too short
        if (arr.length <= 2) {
          return word;
        }
        // Fisher-Yates shuffle
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        // Make sure scrambled is different from original
        if (arr.join('') === word && word.length > 1) {
          // Swap first two letters
          [arr[0], arr[1]] = [arr[1], arr[0]];
        }
        return arr.join('');
      }

      function getWordForRound() {
        // Get a word based on round number (increasing difficulty)
        const maxLength = Math.min(3 + Math.floor(round / 2), 12);
        const available = WORD_BANK.filter(w => 
          w.word.length <= maxLength && 
          w.word.length >= Math.min(3, maxLength - 2) &&
          !usedWords.includes(w.word)
        );
        
        if (available.length === 0) {
          // Reset used words if we've used them all
          usedWords = [];
          return getWordForRound();
        }
        
        const wordData = available[Math.floor(Math.random() * available.length)];
        usedWords.push(wordData.word);
        return wordData;
      }

      function generateLetterButtons(word) {
        letterButtons.innerHTML = '';
        const letters = word.split('');
        // Shuffle letters for buttons
        for (let i = letters.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        letters.forEach(letter => {
          const btn = document.createElement('button');
          btn.className = 'letter-btn';
          btn.textContent = letter;
          btn.addEventListener('click', () => {
            if (!gameRunning) return;
            wordInput.value += letter;
            wordInput.focus();
            // Auto-submit when length matches
            if (wordInput.value.length === currentWord.length) {
              checkAnswer();
            }
          });
          letterButtons.appendChild(btn);
        });
      }

      // ---------- Game Logic ----------
      function startGame() {
        if (gameRunning) return;
        resetGameState();
        gameRunning = true;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Playing...';
        wordInput.disabled = false;
        submitBtn.disabled = false;
        skipBtn.disabled = false;
        setGameStatus('🔤 Unscramble the word!', true);
        nextRound();
        startTimer();
      }

      function resetGameState() {
        score = 0;
        round = 1;
        timeLeft = 30;
        usedWords = [];
        streak = 0;
        updateUI();
        clearInterval(timerInterval);
        timerInterval = null;
        wordInput.value = '';
        wordInput.disabled = true;
        submitBtn.disabled = true;
        skipBtn.disabled = true;
        scrambledDisplay.textContent = '—';
        hintText.textContent = 'Click Start to begin';
        letterButtons.innerHTML = '';
        gameRunning = false;
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        setGameStatus('🔤 Click Start to begin unscrambling!', true);
      }

      function nextRound() {
        if (!gameRunning) return;
        
        const wordData = getWordForRound();
        currentWord = wordData.word;
        currentHint = wordData.hint;
        scrambled = shuffleWord(currentWord);
        
        // Make sure scrambled is different
        if (scrambled === currentWord && currentWord.length > 1) {
          const arr = scrambled.split('');
          [arr[0], arr[1]] = [arr[1], arr[0]];
          scrambled = arr.join('');
        }
        
        scrambledDisplay.textContent = scrambled;
        hintText.textContent = currentHint;
        wordInput.value = '';
        wordInput.focus();
        generateLetterButtons(currentWord);
        setGameStatus(`📝 Round ${round} - Unscramble the word!`, true);
        updateUI();
      }

      function checkAnswer() {
        if (!gameRunning) return;
        const answer = wordInput.value.trim().toLowerCase();
        if (answer === '') return;
        
        if (answer === currentWord) {
          // Correct!
          const timeBonus = Math.max(1, Math.floor(timeLeft / 2));
          const roundBonus = Math.floor(round / 2);
          const points = 10 + timeBonus + roundBonus * 5;
          score += points;
          streak++;
          setGameStatus(`✅ Correct! +${points} points (${streak} streak!)`, true);
          // Visual feedback
          scrambledDisplay.style.color = '#81c784';
          setTimeout(() => {
            scrambledDisplay.style.color = '#ffd54f';
          }, 500);
          
          round++;
          updateUI();
          setTimeout(() => {
            if (gameRunning) {
              nextRound();
            }
          }, 800);
        } else {
          // Wrong answer
          streak = 0;
          setGameStatus('❌ Wrong! Try again.', false);
          scrambledDisplay.style.color = '#ef9a9a';
          setTimeout(() => {
            scrambledDisplay.style.color = '#ffd54f';
          }, 500);
          wordInput.value = '';
          wordInput.focus();
        }
        updateUI();
      }

      function skipWord() {
        if (!gameRunning) return;
        streak = 0;
        setGameStatus(`⏭️ Skipped! The word was "${currentWord}"`, false);
        setTimeout(() => {
          if (gameRunning) {
            nextRound();
          }
        }, 1000);
      }

      // ---------- Timer ----------
      function startTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        timeLeft = 30;
        updateUI();
        timerInterval = setInterval(() => {
          timeLeft--;
          updateUI();
          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      function endGame() {
        gameRunning = false;
        clearInterval(timerInterval);
        timerInterval = null;
        wordInput.disabled = true;
        submitBtn.disabled = true;
        skipBtn.disabled = true;
        startBtn.disabled = false;
        startBtn.textContent = '▶ Play Again';
        letterButtons.innerHTML = '';
        
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('wordScrambleBest', bestScore.toString());
          bestDisplay.textContent = bestScore;
        }
        
        setGameStatus(`⏰ Time\'s up! Final Score: ${score} 🏆`, score > 0);
        scrambledDisplay.textContent = '—';
        hintText.textContent = 'Game Over!';
        wordInput.value = '';
        updateUI();
      }

      // ---------- UI Updates ----------
      function updateUI() {
        scoreDisplay.textContent = score;
        timeDisplay.textContent = Math.max(0, timeLeft);
        roundDisplay.textContent = round;
        if (bestScore > 0) {
          bestDisplay.textContent = bestScore;
        }
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      // ---------- Event Listeners ----------
      // Keyboard submit
      wordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (gameRunning) {
            checkAnswer();
          }
        }
      });

      submitBtn.addEventListener('click', checkAnswer);
      skipBtn.addEventListener('click', skipWord);

      // Letter button click via generated buttons (handled in generateLetterButtons)

      // ---------- Keyboard Controls ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === 'r' || e.key === 'R') {
          resetGame();
        }
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          if (!gameRunning) {
            startGame();
          }
        }
        if ((e.key === 's' || e.key === 'S') && gameRunning) {
          skipWord();
        }
      });

      // ---------- Button Listeners ----------
      startBtn.addEventListener('click', startGame);

      resetBtn.addEventListener('click', () => {
        clearInterval(timerInterval);
        timerInterval = null;
        resetGameState();
        if (bestScore > 0) {
          bestDisplay.textContent = bestScore;
        }
        scrambledDisplay.textContent = '—';
        hintText.textContent = 'Click Start to begin';
        letterButtons.innerHTML = '';
        wordInput.value = '';
        setGameStatus('🔄 Game reset. Click Start to play!', true);
      });

      // ---------- Touch Support for Letter Buttons ----------
      document.addEventListener('touchstart', (e) => {
        // Let the click events handle it
      }, { passive: true });

      // ---------- Init ----------
      function init() {
        resetGameState();
        if (bestScore > 0) {
          bestDisplay.textContent = bestScore;
        }
        setGameStatus('🔤 Click Start to begin unscrambling!', true);
      }

      init();
    })();
  </script>
</body>
</html>
