<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Android Startup Animation · Pure CSS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="android-boot">
    <!-- Boot Screen -->
    <div class="boot-screen">
      <!-- Android Robot Logo (Pure CSS) -->
      <div class="android-logo">
        <div class="android">
          <!-- Head -->
          <div class="android-head">
            <div class="android-eyes">
              <span class="eye-left"></span>
              <span class="eye-right"></span>
            </div>
            <div class="android-antenna"></div>
          </div>
          <!-- Body -->
          <div class="android-body"></div>
          <!-- Arms -->
          <div class="android-arm-left"></div>
          <div class="android-arm-right"></div>
          <!-- Legs -->
          <div class="android-leg-left"></div>
          <div class="android-leg-right"></div>
        </div>
      </div>

      <!-- OS Name -->
      <h1 class="os-title">Android</h1>
      <p class="os-version">Version 14 · Upside Down Cake</p>

      <!-- Loading Dots -->
      <div class="loading-dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

      <!-- Progress Bar -->
      <div class="loading-container">
        <div class="progress-bar-wrapper">
          <div class="progress-bar"></div>
        </div>
        <span class="loading-percent">0%</span>
      </div>

      <!-- Status Text -->
      <div class="status-text">
        <p class="status-message">Starting Android...</p>
      </div>

      <!-- Footer -->
      <div class="boot-footer">
        <div class="footer-text">powered by</div>
        <div class="footer-logo">android</div>
      </div>
    </div>
  </div>
</body>
</html>
