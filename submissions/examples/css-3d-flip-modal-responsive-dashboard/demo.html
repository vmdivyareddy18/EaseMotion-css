<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Dashboard 3D Flip Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="dashboard-card">

        <h2>Operations Dashboard</h2>

        <p>
            Monitor your business metrics with a responsive dashboard and a smooth CSS 3D flip modal.
        </p>

        <a href="#modal" class="btn">
            Open Dashboard
        </a>

    </div>

</div>

<div id="modal" class="overlay">

    <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title">

        <a href="#" class="close">&times;</a>

        <h2 id="modal-title">
            Performance Overview
        </h2>

        <div class="stats">

            <div class="stat">
                <h3>Revenue</h3>
                <strong>$42.8K</strong>
            </div>

            <div class="stat">
                <h3>Visitors</h3>
                <strong>18.5K</strong>
            </div>

            <div class="stat">
                <h3>Orders</h3>
                <strong>1,248</strong>
            </div>

            <div class="stat">
                <h3>Growth</h3>
                <strong>+24%</strong>
            </div>

        </div>

        <button class="action-btn">
            View Full Report
        </button>

    </div>

</div>

</body>
</html>
