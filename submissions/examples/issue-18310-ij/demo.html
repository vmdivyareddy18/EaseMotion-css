<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Issue 18310 - Modal Enter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="title">Issue 18310 - Modal Enter</div>
    <button class="modal-btn" id="openBtn">Open Modal</button>
  </div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal-content" id="modalContent">
      <div class="modal-header">
        <h2>Modal Title</h2>
        <button class="modal-close" id="closeBtn">&times;</button>
      </div>
      <div class="modal-body">
        <p>This modal animates in with a fade and scale effect.</p>
      </div>
    </div>
  </div>
  <script>
    const backdrop = document.getElementById('modalBackdrop');
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');

    openBtn.addEventListener('click', () => backdrop.classList.add('active'));
    closeBtn.addEventListener('click', () => backdrop.classList.remove('active'));
    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) backdrop.classList.remove('active');
    });
  </script>
</body>
</html>
