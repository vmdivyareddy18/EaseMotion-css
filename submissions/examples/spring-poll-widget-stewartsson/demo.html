<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Console - Spring Poll Widget Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gaming-viewport">
        <!-- Main Interactive Gaming Voting Card Container Hub Shell -->
        <div class="poll-container-card">
            <header class="poll-header">
                <span class="lobby-badge">MATCHMAKING LOBBY</span>
                <h2 class="poll-title">Select Next Arena Map</h2>
                <p class="poll-subtitle">Select a target voting option card below to trigger the pure-CSS springy mechanical bounce recoil expansions.</p>
            </header>

            <!-- Advanced Pure-CSS Spring Poll Options Selection Stage Canvas Area -->
            <div class="poll-options-workspace">
                
                <!-- Poll Voting Option Item 1 Node Group Wrapper -->
                <div class="poll-option-node">
                    <!-- Pure-CSS Sibling State Radio Trigger Input Gate -->
                    <input type="radio" name="gaming-poll-gate" id="poll-gate-1" class="poll-radio-input" checked>
                    
                    <!-- Tactile Selection Option Row Custom Label Button Layout -->
                    <label for="poll-gate-1" class="poll-trigger-label ease-spring-recoil">
                        <div class="option-meta-content">
                            <span class="map-label-text">Zone 01 // Cyber Grid</span>
                            <span class="percentage-metric">64%</span>
                        </div>
                        <!-- Inset Linear Progress Fill Visual Feedback Bar Layer -->
                        <div class="option-progress-bar bar-fill-1"></div>
                    </label>
                </div>

                <!-- Poll Voting Option Item 2 Node Group Wrapper -->
                <div class="poll-option-node">
                    <input type="radio" name="gaming-poll-gate" id="poll-gate-2" class="poll-radio-input">
                    <label for="poll-gate-2" class="poll-trigger-label ease-spring-recoil">
                        <div class="option-meta-content">
                            <span class="map-label-text">Zone 02 // Neon Tokyo</span>
                            <span class="percentage-metric">36%</span>
                        </div>
                        <div class="option-progress-bar bar-fill-2"></div>
                    </label>
                </div>

            </div>

            <footer class="poll-footer">
                <div class="telemetry-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Lobby Voting Telemetry Stream Live</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
