<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-btn-group color-mix() Fallback Fix</title>
  <link rel="stylesheet" href="../../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
      font-family: sans-serif;
      background: #0f0f17;
      color: #cdd6f4;
    }
    h2 { margin: 0; }
    .group-row { display: flex; flex-direction: column; gap: 1.25rem; align-items: center; }
    p.note { font-size: 0.82rem; opacity: 0.6; text-align: center; max-width: 480px; }
  </style>
</head>
<body>
  <h2>ease-btn-group — color-mix() Fallback Fix</h2>

  <div class="group-row">

    <!-- Primary group -->
    <div class="ease-btn-group" role="group" aria-label="Text formatting">
      <button class="ease-btn ease-btn-primary">Bold</button>
      <button class="ease-btn ease-btn-primary">Italic</button>
      <button class="ease-btn ease-btn-primary">Underline</button>
    </div>

    <!-- Outline group -->
    <div class="ease-btn-group" role="group" aria-label="View options">
      <button class="ease-btn ease-btn-outline">Day</button>
      <button class="ease-btn ease-btn-outline">Week</button>
      <button class="ease-btn ease-btn-outline">Month</button>
    </div>

    <!-- Danger group -->
    <div class="ease-btn-group" role="group" aria-label="Danger actions">
      <button class="ease-btn ease-btn-danger">Delete</button>
      <button class="ease-btn ease-btn-danger">Archive</button>
    </div>

  </div>

  <p class="note">
    In Safari 15 (no <code>color-mix()</code>): separator uses
    <code>rgba(0,0,0,0.15)</code> — subtle, correct.<br />
    In modern browsers: separator uses
    <code>color-mix(in srgb, currentColor 30%, transparent)</code> — context-aware.
  </p>
</body>
</html>
