<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>News Ticker Scroll</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='ticker-bg')r.style.setProperty('--ticker-bg',t.value);if(t.name==='text-color')r.style.setProperty('--text-color',t.value);if(t.name==='scroll-speed')r.style.setProperty('--scroll-speed',t.value+'s');if(t.name==='accent-color')r.style.setProperty('--accent-color',t.value)})</script>
<div class="container"><p class="title">News Ticker Scroll</p>
<div class="ticker"><div class="ticker-track"><span class="ticker-item"><span class="label">BREAKING</span> Market hits all-time high </span><span class="ticker-item"><span class="label">NEW</span> New framework launched </span><span class="ticker-item"><span class="label">UPDATE</span> Conference dates announced </span><span class="ticker-item"><span class="label">LIVE</span> Keynote streaming now </span></div></div>
<div class="controls"><label>BG: <input type="color" name="ticker-bg" value="#1e1e36"></label><label>Text: <input type="color" name="text-color" value="#eee"></label><label>Accent: <input type="color" name="accent-color" value="#f72585"></label><label>Speed: <input type="range" name="scroll-speed" min="5" max="25" step="1" value="12"></label></div></div></body></html>
