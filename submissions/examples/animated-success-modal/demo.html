<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Success Modal - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Modal Overlay -->
  <div class="modal-overlay">
    
    <!-- Modal Card -->
    <div class="modal-card ease-zoom-in">
      
      <!-- Confetti Container -->
      <div class="confetti-container">
        <span class="confetti c1 ease-float ease-spin-slow"></span>
        <span class="confetti c2 ease-float ease-delay-100"></span>
        <span class="confetti c3 ease-spin-slow ease-delay-200"></span>
        <span class="confetti c4 ease-float ease-delay-300"></span>
        <span class="confetti c5 ease-spin-slow ease-delay-400"></span>
        <span class="confetti c6 ease-float ease-delay-500"></span>
        <span class="confetti c7 ease-spin-slow ease-delay-100"></span>
        <span class="confetti c8 ease-float ease-delay-200"></span>
      </div>

      <!-- Success Icon -->
      <div class="icon-wrapper ease-bounce-in ease-delay-200">
        <div class="checkmark-circle">
          <span class="checkmark">✓</span>
        </div>
      </div>

      <!-- Message Content -->
      <div class="modal-content">
        <h2 class="modal-title ease-fade-in-up ease-delay-400">Payment Successful!</h2>
        <p class="modal-text ease-fade-in-up ease-delay-500">
          Your order <strong>#12345</strong> has been confirmed and is being processed. You will receive an email shortly.
        </p>
      </div>

      <!-- Action Button -->
      <button class="modal-btn ease-fade-in-up ease-delay-600 ease-hover-grow">
        Download Receipt
      </button>

    </div>
  </div>

</body>
</html>
