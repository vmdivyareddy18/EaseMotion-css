<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS card badge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Card Badges</h1>
    <div class="cb-grid">
      <div class="cb-card">
        <span class="cb-badge hot">HOT</span>
        <div class="cb-preview"></div>
        <p class="cb-title">Card Title</p>
      </div>
      <div class="cb-card">
        <span class="cb-badge sale">SALE</span>
        <div class="cb-preview"></div>
        <p class="cb-title">Another Card</p>
      </div>
      <div class="cb-card">
        <span class="cb-badge new">NEW</span>
        <div class="cb-preview"></div>
        <p class="cb-title">Yet Another</p>
      </div>
    </div>
  </div>
</body>
</html>
