<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Day/Night Switch - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <span class="label-text">Day / Night</span>
    <label class="switch-track" id="switchTrack">
      <input type="checkbox" class="switch-input" id="switchInput">
      <div class="switch-thumb"></div>
      <div class="stars">
        <div class="star" style="top:15%;left:60%;animation-delay:0s"></div>
        <div class="star" style="top:30%;left:75%;animation-delay:0.4s"></div>
        <div class="star" style="top:45%;left:85%;animation-delay:0.8s"></div>
        <div class="star" style="top:55%;left:90%;animation-delay:1.2s"></div>
        <div class="star" style="top:20%;left:80%;animation-delay:0.2s"></div>
        <div class="star" style="top:50%;left:70%;animation-delay:0.6s"></div>
        <div class="star" style="top:60%;left:95%;animation-delay:1.0s"></div>
        <div class="star" style="top:35%;left:88%;animation-delay:1.5s"></div>
      </div>
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
    </label>
    <span class="state-indicator" id="stateIndicator">☀️ Day</span>
  </div>

  <script>
    const track = document.getElementById('switchTrack');
    const input = document.getElementById('switchInput');
    const indicator = document.getElementById('stateIndicator');

    input.addEventListener('change', () => {
      track.classList.toggle('night');
      indicator.classList.toggle('night');
      indicator.textContent = input.checked ? '🌙 Night' : '☀️ Day';
    });
  </script>
</body>
</html>
