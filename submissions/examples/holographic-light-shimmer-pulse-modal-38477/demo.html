<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Holographic Light Shimmer Pulse Modal</title>

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <main class="page">

        <div class="modal-overlay">

            <section class="holo-modal" tabindex="0">

                <span class="status-badge">
                    ACTIVE SESSION
                </span>

                <h1>
                    Holographic Control Panel
                </h1>

                <p>
                    Access granted to the next generation enterprise interface.
                    This modal demonstrates a futuristic holographic design
                    featuring a shimmer pulse animation built entirely with
                    HTML and CSS.
                </p>

                <div class="stats">

                    <div class="stat-card">
                        <h3>98%</h3>
                        <span>System Health</span>
                    </div>

                    <div class="stat-card">
                        <h3>256</h3>
                        <span>Connected Nodes</span>
                    </div>

                    <div class="stat-card">
                        <h3>24ms</h3>
                        <span>Latency</span>
                    </div>

                </div>

                <div class="button-group">

                    <button class="primary-btn">
                        Launch
                    </button>

                    <button class="secondary-btn">
                        Cancel
                    </button>

                </div>

            </section>

        </div>

    </main>

</body>

</html>
