<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wobble Stopwatch — Finance Dashboard | EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-container">
    <h1 class="demo-title">Wobble Stopwatch</h1>
    <p class="demo-subtitle">Finance dashboard style with wobble animation</p>

    <div class="stopwatch" role="timer" aria-label="Stopwatch timer">
      <div class="stopwatch-ring">
        <svg class="progress-svg" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="progress-bg" cx="60" cy="60" r="54" />
          <circle class="progress-fill" cx="60" cy="60" r="54" />
        </svg>
        <div class="stopwatch-display">
          <span class="stopwatch-minutes" aria-live="polite">00</span>
          <span class="stopwatch-separator">:</span>
          <span class="stopwatch-seconds">00</span>
          <span class="stopwatch-ms">.00</span>
        </div>
      </div>

      <div class="stopwatch-label">Elapsed Time</div>

      <div class="stopwatch-controls">
        <button class="control-btn control-start" aria-label="Start timer">▶</button>
        <button class="control-btn control-pause" aria-label="Pause timer">⏸</button>
        <button class="control-btn control-reset" aria-label="Reset timer">↺</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card ease-wobble">
        <span class="stat-value">3</span>
        <span class="stat-label">Laps</span>
      </div>
      <div class="stat-card ease-wobble" style="--wobble-delay: 0.1s">
        <span class="stat-value">01:42</span>
        <span class="stat-label">Best Lap</span>
      </div>
      <div class="stat-card ease-wobble" style="--wobble-delay: 0.2s">
        <span class="stat-value">02:15</span>
        <span class="stat-label">Avg Lap</span>
      </div>
    </div>
  </div>
</body>
</html>
