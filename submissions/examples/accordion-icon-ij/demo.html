<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS accordion-icon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Icon Accordion</h1>
    <div class="accordion">
      <div class="acc-item">
        <div class="acc-header">
          <span class="acc-icon">&#128187;</span>
          <span class="acc-title">Account Settings</span>
          <span class="acc-arrow">&#9660;</span>
        </div>
        <div class="acc-body">Manage your profile, email, and security preferences.</div>
      </div>
      <div class="acc-item">
        <div class="acc-header">
          <span class="acc-icon">&#9881;</span>
          <span class="acc-title">System Preferences</span>
          <span class="acc-arrow">&#9660;</span>
        </div>
        <div class="acc-body">Configure display, sound, and input settings.</div>
      </div>
      <div class="acc-item">
        <div class="acc-header">
          <span class="acc-icon">&#128274;</span>
          <span class="acc-title">Privacy & Security</span>
          <span class="acc-arrow">&#9660;</span>
        </div>
        <div class="acc-body">Control your data sharing and privacy options.</div>
      </div>
    </div>
  </div>
</body>
</html>
