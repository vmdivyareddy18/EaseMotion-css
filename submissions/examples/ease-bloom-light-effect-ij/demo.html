<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-bloom-light-effect</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #111;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 300; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    p { font-size: 0.9rem; color: #888; margin-bottom: 2rem; }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 2.5rem; }
    .controls button {
      padding: 0.5rem 1.25rem;
      border: 1px solid #444;
      background: transparent;
      color: #ccc;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { background: #333; border-color: #888; }
    .controls button.active { background: var(--bloom-color, #fdcb6e); border-color: var(--bloom-color, #fdcb6e); color: #222; }
    .playground { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
    .demo-card {
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.5rem;
      border-radius: 20px;
      cursor: pointer;
      user-select: none;
    }
    .demo-card span { font-weight: 600; font-size: 0.9rem; opacity: 0.7; pointer-events: none; }
    .slider-group { display: flex; align-items: center; gap: 0.75rem; }
    .slider-group label { font-size: 0.85rem; color: #aaa; min-width: 7rem; }
    .slider-group input[type="range"] { width: 140px; accent-color: var(--bloom-color, #fdcb6e); }
    .slider-group output { font-size: 0.8rem; color: #888; min-width: 3rem; text-align: right; }
    .color-group { display: flex; align-items: center; gap: 0.75rem; }
    .color-group label { font-size: 0.85rem; color: #aaa; }
    .color-group input[type="color"] { width: 40px; height: 32px; border: 1px solid #444; border-radius: 4px; background: transparent; cursor: pointer; }
  </style>
</head>
<body>

  <h1>ease-bloom-light-effect</h1>
  <p>Soft bloom/glow light effect on hover / focus</p>

  <div class="controls">
    <button class="active" id="focusBtn">🔦 Toggle focus</button>
  </div>

  <div class="playground">
    <div class="ease-bloom-light-effect demo-card" id="card" tabindex="0">
      <span>Hover or focus me</span>
      <span style="font-size:0.8rem;opacity:0.5;">(or click Toggle focus)</span>
    </div>

    <div class="slider-group">
      <label for="sizeRange">--bloom-size</label>
      <input type="range" id="sizeRange" min="20" max="100" value="60" step="2" />
      <output id="sizeVal">60px</output>
    </div>

    <div class="slider-group">
      <label for="intensityRange">--bloom-intensity</label>
      <input type="range" id="intensityRange" min="0.1" max="1" value="0.6" step="0.05" />
      <output id="intensityVal">0.6</output>
    </div>

    <div class="color-group">
      <label for="colorPicker">--bloom-color</label>
      <input type="color" id="colorPicker" value="#fdcb6e" />
    </div>
  </div>

  <script>
    (function() {
      var card = document.getElementById('card');
      var focusBtn = document.getElementById('focusBtn');
      var sizeRange = document.getElementById('sizeRange');
      var sizeVal = document.getElementById('sizeVal');
      var intRange = document.getElementById('intensityRange');
      var intVal = document.getElementById('intensityVal');
      var colorPicker = document.getElementById('colorPicker');

      function updateSize(val) {
        sizeVal.textContent = val + 'px';
        card.style.setProperty('--bloom-size', val + 'px');
      }
      function updateIntensity(val) {
        intVal.textContent = val;
        card.style.setProperty('--bloom-intensity', val);
      }
      function updateColor(val) {
        card.style.setProperty('--bloom-color', val);
      }

      updateSize(sizeRange.value);
      updateIntensity(intRange.value);
      updateColor(colorPicker.value);

      focusBtn.addEventListener('click', function() {
        if (document.activeElement === card) {
          card.blur();
          focusBtn.classList.remove('active');
        } else {
          card.focus();
          focusBtn.classList.add('active');
        }
      });

      sizeRange.addEventListener('input', function() { updateSize(this.value); });
      intRange.addEventListener('input', function() { updateIntensity(this.value); });
      colorPicker.addEventListener('input', function() { updateColor(this.value); });

      card.addEventListener('focus', function() { focusBtn.classList.add('active'); });
      card.addEventListener('blur', function() { focusBtn.classList.remove('active'); });
    })();
  </script>
</body>
</html>
