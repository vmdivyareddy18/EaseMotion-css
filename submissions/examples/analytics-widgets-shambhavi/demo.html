<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Widgets</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="dashboard">

    <div class="card revenue">
        <h3>Total Revenue</h3>
        <h2>$24.5K</h2>
        <p>▲ +18% this month</p>
    </div>

    <div class="card users">
        <h3>Users</h3>
        <h2>12,840</h2>
        <p>▲ +7%</p>
    </div>

    <div class="card orders">
        <h3>Orders</h3>
        <h2>1,284</h2>
        <p>▲ +12%</p>
    </div>

    <div class="card profit">
        <h3>Net Profit</h3>
        <h2>$9.8K</h2>
        <p>▲ +15%</p>
    </div>

</div>

</body>
</html>
