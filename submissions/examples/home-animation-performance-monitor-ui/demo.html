<!DOCTYPE html>
<html>
<head>
  <title>Animation Performance Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Animation Performance Monitor</h2>

<div class="box"></div>

<p id="fps">FPS: </p>

<script>
let lastTime = performance.now();
let frames = 0;

function measureFPS() {
  let now = performance.now();
  frames++;

  if (now - lastTime >= 1000) {
    document.getElementById("fps").innerText = "FPS: " + frames;
    frames = 0;
    lastTime = now;
  }

  requestAnimationFrame(measureFPS);
}

measureFPS();
</script>

</body>
</html>
