<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vector status timeline demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="Vector status timeline">
    <section class="timeline-card">
      <div class="card-header">
        <p>Release Flow</p>
        <h1>Vector status timeline</h1>
      </div>
      <ol class="timeline">
        <li><span></span><strong>Queued</strong><em>Build request accepted</em></li>
        <li><span></span><strong>Testing</strong><em>Checks running</em></li>
        <li><span></span><strong>Review</strong><em>Signals collected</em></li>
        <li><span></span><strong>Ready</strong><em>Deploy gate open</em></li>
      </ol>
    </section>
  </main>
</body>
</html>
