<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Reveal Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="ir-section">
    <h1>Image Reveal Cards</h1>
    <div class="ir-container">
      <div class="ir-card">
        <div class="ir-image-wrap">
          <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop" alt="Mountain landscape" loading="lazy">
        </div>
        <div class="ir-content">
          <h2>Mountain Escape</h2>
          <p>Discover serene trails and breathtaking vistas in the heart of the alps.</p>
        </div>
      </div>
      <div class="ir-card">
        <div class="ir-image-wrap">
          <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop" alt="Forest path" loading="lazy">
        </div>
        <div class="ir-content">
          <h2>Forest Path</h2>
          <p>Wander through ancient woodlands and reconnect with nature's rhythm.</p>
        </div>
      </div>
      <div class="ir-card">
        <div class="ir-image-wrap">
          <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=400&h=300&fit=crop" alt="Lake reflection" loading="lazy">
        </div>
        <div class="ir-content">
          <h2>Lake Serenity</h2>
          <p>Still waters and mirror-like reflections create a perfect moment of calm.</p>
        </div>
      </div>
    </div>
  </section>
  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate');
        }
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.ir-card').forEach(card => observer.observe(card));
  </script>
</body>
</html>
