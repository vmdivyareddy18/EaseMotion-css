<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jello Font Switcher - Space Theme</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="space-theme">
    <div class="stars"></div>
    <div class="twinkling"></div>
    
    <main class="container">
        <h1 class="glow-text">Space Explorer</h1>
        
        <div class="jello-font-switcher-container">
            <!-- Hidden Radio Inputs for Pure CSS state management -->
            <input type="radio" name="font-selector" id="font-sans" class="ease-jello-radio" checked>
            <input type="radio" name="font-selector" id="font-serif" class="ease-jello-radio">
            <input type="radio" name="font-selector" id="font-mono" class="ease-jello-radio">
            <input type="radio" name="font-selector" id="font-cursive" class="ease-jello-radio">

            <!-- Controls / Labels -->
            <div class="jello-font-switcher-controls">
                <label for="font-sans" class="ease-jello-label font-sans-label">Interstellar (Sans)</label>
                <label for="font-serif" class="ease-jello-label font-serif-label">Galactic (Serif)</label>
                <label for="font-mono" class="ease-jello-label font-mono-label">Quantum (Mono)</label>
                <label for="font-cursive" class="ease-jello-label font-cursive-label">Nebula (Cursive)</label>
            </div>

            <!-- Preview Target -->
            <div class="preview-box">
                <p class="preview-text">
                    "The universe is under no obligation to make sense to you."<br><br>
                    - Neil deGrasse Tyson
                </p>
            </div>
        </div>
    </main>
</body>
</html>
