<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion • Zoom-Out Analytics Popover</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="dashboard">

    <header class="hero">
        <h1>Dashboard Analytics</h1>
        <p>Hover or focus the analytics button to preview dashboard insights.</p>
    </header>

    <section class="popover-demo">

        <div
            class="popover-wrapper"
            aria-label="Analytics Popover">

            <button
                class="popover-trigger"
                aria-haspopup="dialog"
                aria-expanded="false"
                aria-controls="analytics-popover">

                View Analytics
            </button>

            <section
                id="analytics-popover"
                class="popover"
                role="dialog"
                aria-labelledby="analytics-title">

                <header class="popover-header">
                    <div>
                        <p class="eyebrow">Dashboard</p>
                        <h2 id="analytics-title">
                            Revenue Overview
                        </h2>
                    </div>

                    <span class="badge">
                        +18.7%
                    </span>
                </header>

                <section class="kpis">

                    <article class="card">
                        <span class="label">Revenue</span>
                        <strong>$84,200</strong>
                    </article>

                    <article class="card">
                        <span class="label">Users</span>
                        <strong>18,452</strong>
                    </article>

                    <article class="card">
                        <span class="label">Conversion</span>
                        <strong>7.9%</strong>
                    </article>

                    <article class="card">
                        <span class="label">Growth</span>
                        <strong>+18.7%</strong>
                    </article>

                </section>

                <section
                    class="chart"
                    aria-label="Revenue chart placeholder">

                    <div class="bars">
                        <span style="height:42%"></span>
                        <span style="height:58%"></span>
                        <span style="height:75%"></span>
                        <span style="height:52%"></span>
                        <span style="height:90%"></span>
                        <span style="height:67%"></span>
                        <span style="height:100%"></span>
                    </div>

                </section>

                <footer class="footer">

                    <div>
                        <small>Monthly Revenue</small>
                        <strong>$84.2K</strong>
                    </div>

                    <div class="growth">
                        ▲ 18.7% Growth
                    </div>

                </footer>

            </section>

        </div>

    </section>

</main>

</body>
</html>
