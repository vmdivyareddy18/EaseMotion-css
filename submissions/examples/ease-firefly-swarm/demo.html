<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Firefly Swarm</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>Firefly Swarm</h1>
        <p class="subtitle">Bioluminescent particles that follow random paths with glowing trails</p>

        <div class="firefly-wrapper">
            <canvas id="fireflyCanvas"></canvas>

            <div class="controls">
                <button id="countBtn">Count: 50</button>
                <button id="speedBtn">Speed: Normal</button>
                <button id="colorBtn">Color: Warm</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status">
                <span id="statusText">✨ Fireflies dancing</span>
                <span id="fpsDisplay">FPS: 60</span>
            </div>
        </div>
    </div>

    <script>
        // ===== DOM REFS =====
        const canvas = document.getElementById('fireflyCanvas');
        const ctx = canvas.getContext('2d');
        const countBtn = document.getElementById('countBtn');
        const speedBtn = document.getElementById('speedBtn');
        const colorBtn = document.getElementById('colorBtn');
        const resetBtn = document.getElementById('resetBtn');
        const statusText = document.getElementById('statusText');
        const fpsDisplay = document.getElementById('fpsDisplay');

        // ===== CANVAS SETUP =====
        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            canvas.width = wrapper.clientWidth || 600;
            canvas.height = Math.min(450, window.innerHeight - 350);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ===== STATE =====
        let fireflies = [];
        let numFireflies = 50;
        let speed = 0.02;
        let speedLevel = 1;
        let colorMode = 0;
        let frameCount = 0;
        let lastFpsUpdate = 0;

        // ===== SPEED OPTIONS =====
        const speeds = [
            { name: 'Slow', value: 0.008 },
            { name: 'Normal', value: 0.02 },
            { name: 'Fast', value: 0.035 },
            { name: 'Very Fast', value: 0.055 },
        ];

        // ===== COLOR OPTIONS =====
        const colorPalettes = [
            { 
                name: 'Warm', 
                colors: ['#ff6b35', '#ffa500', '#ffd700', '#ffec8b', '#ffeeaa'],
                glow: '#ffa500'
            },
            { 
                name: 'Cool', 
                colors: ['#00d4ff', '#00bfff', '#4fc3f7', '#81d4fa', '#b3e5fc'],
                glow: '#00d4ff'
            },
            { 
                name: 'Green', 
                colors: ['#39ff14', '#7fff00', '#adff2f', '#bfff00', '#ccff33'],
                glow: '#39ff14'
            },
            { 
                name: 'Purple', 
                colors: ['#b026ff', '#c084fc', '#a78bfa', '#8b5cf6', '#7c3aed'],
                glow: '#b026ff'
            },
            { 
                name: 'Pink', 
                colors: ['#ff1493', '#ff69b4', '#ff85c1', '#ffb6c1', '#ffc0cb'],
                glow: '#ff1493'
            },
            { 
                name: 'Rainbow', 
                colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#0088ff', '#8800ff'],
                glow: '#ff8800'
            },
        ];

        // ===== FIREFLY CLASS =====
        class Firefly {
            constructor() {
                this.reset();
            }

            reset() {
                const w = canvas.width;
                const h = canvas.height;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = 1.5 + Math.random() * 2.5;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.2 + Math.random() * 0.4;
                this.wobble = 0.5 + Math.random() * 1.5;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
                this.phase = Math.random() * Math.PI * 2;
                this.glowIntensity = 0.3 + Math.random() * 0.7;
                this.glowPhase = Math.random() * Math.PI * 2;
                this.glowSpeed = 0.02 + Math.random() * 0.03;
                this.trail = [];
                this.maxTrail = 20 + Math.floor(Math.random() * 30);
                this.colorIndex = Math.floor(Math.random() * 6);
                this.alpha = 0.6 + Math.random() * 0.4;
                this.targetX = this.x;
                this.targetY = this.y;
                this.changeTargetTimer = 0;
                this.changeTargetInterval = 100 + Math.random() * 200;
            }

            update() {
                const w = canvas.width;
                const h = canvas.height;

                // Update target periodically
                this.changeTargetTimer++;
                if (this.changeTargetTimer > this.changeTargetInterval) {
                    this.changeTargetTimer = 0;
                    this.changeTargetInterval = 100 + Math.random() * 200;
                    this.targetX = Math.random() * w;
                    this.targetY = Math.random() * h;
                }

                // Move toward target with random wander
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist > 1) {
                    const moveSpeed = this.speed * speed * 10;
                    this.x += (dx / dist) * moveSpeed + Math.sin(this.phase) * this.wobble * 0.3;
                    this.y += (dy / dist) * moveSpeed + Math.cos(this.phase * 0.7) * this.wobble * 0.3;
                }

                // Add wobble
                this.phase += this.wobbleSpeed;
                this.x += Math.sin(this.phase) * 0.2;
                this.y += Math.cos(this.phase * 0.8) * 0.2;

                // Boundary check with gentle bounce
                if (this.x < 5) { this.x = 5; this.targetX = 10 + Math.random() * 20; }
                if (this.x > w - 5) { this.x = w - 5; this.targetX = w - 10 - Math.random() * 20; }
                if (this.y < 5) { this.y = 5; this.targetY = 10 + Math.random() * 20; }
                if (this.y > h - 5) { this.y = h - 5; this.targetY = h - 10 - Math.random() * 20; }

                // Update glow
                this.glowPhase += this.glowSpeed;
                this.glowIntensity = 0.5 + 0.5 * Math.sin(this.glowPhase);

                // Add to trail
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
            }

            draw(ctx) {
                const palette = colorPalettes[colorMode];
                const colors = palette.colors;
                const color = colors[this.colorIndex % colors.length];
                const glowColor = palette.glow;

                // Draw trail
                for (let i = 0; i < this.trail.length - 1; i++) {
                    const t = this.trail[i];
                    const progress = i / this.trail.length;
                    const trailAlpha = progress * this.alpha * 0.3;
                    
                    if (trailAlpha > 0.01) {
                        const trailSize = this.size * (0.1 + progress * 0.9);
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, trailSize, 0, Math.PI * 2);
                        
                        const trailColor = colors[(this.colorIndex + Math.floor(i / 5)) % colors.length];
                        ctx.fillStyle = trailColor;
                        ctx.globalAlpha = trailAlpha * this.glowIntensity;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = trailColor;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.globalAlpha = 1;

                // Glow ring
                const glowSize = this.size * 8 * (0.5 + 0.5 * this.glowIntensity);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, glowSize
                );
                
                gradient.addColorStop(0, glowColor + 'cc');
                gradient.addColorStop(0.3, glowColor + '66');
                gradient.addColorStop(0.7, glowColor + '22');
                gradient.addColorStop(1, glowColor + '00');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, glowSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha * 0.6 * this.glowIntensity;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Inner glow
                const innerGlow = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                innerGlow.addColorStop(0, '#ffffff' + 'aa');
                innerGlow.addColorStop(0.5, color + '88');
                innerGlow.addColorStop(1, color + '00');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = innerGlow;
                ctx.globalAlpha = this.alpha * this.glowIntensity;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Core body
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 30;
                ctx.shadowColor = glowColor;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;

                // Bright center
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.globalAlpha = this.alpha * 0.8 * this.glowIntensity;
                ctx.fill();
                ctx.globalAlpha = 1;

                // Wing effect (subtle)
                for (let i = -1; i <= 1; i += 2) {
                    ctx.beginPath();
                    ctx.ellipse(
                        this.x + i * this.size * 0.5,
                        this.y - this.size * 0.5,
                        this.size * 0.4,
                        this.size * 0.2,
                        this.phase * i * 0.5 + i * 0.3,
                        0, Math.PI * 2
                    );
                    ctx.fillStyle = color + '30';
                    ctx.globalAlpha = 0.2 * this.glowIntensity;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                }
            }
        }

        // ===== INIT FIREFLIES =====
        function initFireflies(count) {
            fireflies = [];
            for (let i = 0; i < count; i++) {
                fireflies.push(new Firefly());
            }
        }
        initFireflies(numFireflies);

        // ===== DRAW BACKGROUND =====
        function drawBackground(ctx, w, h) {
            // Dark forest-like background
            const grad = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w, h) * 0.7);
            grad.addColorStop(0, '#0a0a1a');
            grad.addColorStop(0.5, '#060610');
            grad.addColorStop(1, '#000000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Subtle ground glow
            const groundGrad = ctx.createRadialGradient(w/2, h * 0.85, 0, w/2, h * 0.85, w * 0.6);
            groundGrad.addColorStop(0, 'rgba(20, 40, 20, 0.1)');
            groundGrad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, 0, w, h);

            // Grass hints
            for (let i = 0; i < 30; i++) {
                const x = (i / 30) * w + Math.sin(i * 0.5) * 5;
                const y = h * 0.85 + Math.sin(i * 2) * 10;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x + Math.sin(i + 0.5) * 3, y - 10 - Math.sin(i * 1.3) * 8);
                ctx.strokeStyle = `rgba(30, 60, 30, ${0.1 + Math.sin(i) * 0.05})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // ===== RENDER LOOP =====
        function render(timestamp) {
            // FPS counter
            frameCount++;
            if (timestamp - lastFpsUpdate > 1000) {
                fpsDisplay.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsUpdate = timestamp;
            }

            const w = canvas.width;
            const h = canvas.height;

            // Draw background
            drawBackground(ctx, w, h);

            // Update and draw fireflies
            for (const firefly of fireflies) {
                firefly.update();
                firefly.draw(ctx);
            }

            // Connect nearby fireflies with subtle lines
            ctx.globalAlpha = 0.05;
            for (let i = 0; i < fireflies.length; i++) {
                for (let j = i + 1; j < fireflies.length; j++) {
                    const dx = fireflies[i].x - fireflies[j].x;
                    const dy = fireflies[i].y - fireflies[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        const alpha = 1 - dist / 100;
                        ctx.beginPath();
                        ctx.moveTo(fireflies[i].x, fireflies[i].y);
                        ctx.lineTo(fireflies[j].x, fireflies[j].y);
                        const color = colorPalettes[colorMode].glow;
                        ctx.strokeStyle = color;
                        ctx.globalAlpha = alpha * 0.1;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            ctx.globalAlpha = 1;

            // Update status
            if (frameCount % 30 === 0) {
                statusText.textContent = `✨ ${fireflies.length} fireflies dancing`;
            }

            requestAnimationFrame(render);
        }

        // ===== CONTROLS =====

        // Count
        countBtn.addEventListener('click', () => {
            const counts = [20, 35, 50, 75, 100, 150];
            const currentIndex = counts.indexOf(numFireflies);
            const nextIndex = (currentIndex + 1) % counts.length;
            numFireflies = counts[nextIndex];
            countBtn.textContent = `Count: ${numFireflies}`;
            initFireflies(numFireflies);
            statusText.textContent = `🔄 ${numFireflies} fireflies`;
            setTimeout(() => {
                statusText.textContent = `✨ ${numFireflies} fireflies dancing`;
            }, 1000);
        });

        // Speed
        speedBtn.addEventListener('click', () => {
            speedLevel = (speedLevel + 1) % speeds.length;
            speed = speeds[speedLevel].value;
            speedBtn.textContent = `Speed: ${speeds[speedLevel].name}`;
            statusText.textContent = `⏱️ ${speeds[speedLevel].name}`;
            setTimeout(() => {
                statusText.textContent = `✨ ${numFireflies} fireflies dancing`;
            }, 1000);
        });

        // Color
        colorBtn.addEventListener('click', () => {
            colorMode = (colorMode + 1) % colorPalettes.length;
            colorBtn.textContent = `Color: ${colorPalettes[colorMode].name}`;
            statusText.textContent = `🎨 ${colorPalettes[colorMode].name}`;
            setTimeout(() => {
                statusText.textContent = `✨ ${numFireflies} fireflies dancing`;
            }, 1000);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            numFireflies = 50;
            speedLevel = 1;
            speed = speeds[1].value;
            colorMode = 0;
            
            countBtn.textContent = `Count: ${numFireflies}`;
            speedBtn.textContent = `Speed: ${speeds[1].name}`;
            colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
            initFireflies(numFireflies);
            statusText.textContent = '↩️ Reset';
            setTimeout(() => {
                statusText.textContent = `✨ ${numFireflies} fireflies dancing`;
            }, 1000);
        });

        // ===== KEYBOARD SHORTCUTS =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'f' || e.key === 'F') {
                countBtn.click();
            }
            if (e.key === 's' || e.key === 'S') {
                speedBtn.click();
            }
            if (e.key === 'c' || e.key === 'C') {
                colorBtn.click();
            }
            if (e.key === 'r' || e.key === 'R') {
                resetBtn.click();
            }
            if (e.key === ' ' || e.key === 'Space') {
                e.preventDefault();
                // Toggle pause not implemented, but could be added
            }
        });

        // ===== RESIZE HANDLER =====
        window.addEventListener('resize', () => {
            resizeCanvas();
            initFireflies(numFireflies);
        });

        // ===== INIT =====
        countBtn.textContent = `Count: ${numFireflies}`;
        speedBtn.textContent = `Speed: ${speeds[1].name}`;
        colorBtn.textContent = `Color: ${colorPalettes[0].name}`;
        statusText.textContent = `✨ ${numFireflies} fireflies dancing`;
        lastFpsUpdate = performance.now();

        // Start animation
        render(lastFpsUpdate);

        console.log('✨ Firefly Swarm loaded!');
        console.log('💡 F - Change count');
        console.log('💡 S - Change speed');
        console.log('💡 C - Change color');
        console.log('💡 R - Reset');
        console.log('💡 SPACE - Pause (coming soon)');
    </script>
</body>
</html>
