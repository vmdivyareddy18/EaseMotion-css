<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Masonry Gallery Component</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Masonry Gallery</h1>

<div class="masonry-gallery">

    <div class="gallery-item">
        <img src="https://picsum.photos/400/500?random=1" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/400/300?random=2" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/400/600?random=3" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/400/350?random=4" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/400/450?random=5" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

    <div class="gallery-item">
        <img src="https://picsum.photos/400/550?random=6" alt="Gallery Image">
        <div class="overlay">View More</div>
    </div>

</div>

</body>
</html>
