<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Noise — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Background Noise</h1>
    <p class="subtitle">Noise texture overlay using SVG data URI and <code>::after</code> pseudo-element</p>

    <div class="demo-panel ease-bg-noise" id="noiseDemo">
      <p>Noise Texture Overlay</p>
    </div>

    <div class="control-group">
      <div>
        <label>Opacity: <span id="opacityVal">0.04</span></label>
        <input type="range" id="opacitySlider" min="0" max="20" value="4" step="1">
      </div>
      <button id="toggleNoiseBtn">Toggle Noise</button>
    </div>
  </div>

  <script>
    const demo = document.getElementById('noiseDemo');
    const opacitySlider = document.getElementById('opacitySlider');
    const opacityVal = document.getElementById('opacityVal');
    const toggleBtn = document.getElementById('toggleNoiseBtn');
    let visible = true;

    opacitySlider.addEventListener('input', () => {
      const v = opacitySlider.value / 100;
      opacityVal.textContent = v.toFixed(2);
      demo.style.setProperty('--ease-noise-opacity', v);
    });

    toggleBtn.addEventListener('click', () => {
      visible = !visible;
      const pseudo = demo.querySelector('style[data-noise]') || document.createElement('style');
      if (!visible) {
        pseudo.dataset.noise = '';
        pseudo.textContent = `.ease-bg-noise::after { opacity: 0 !important; }`;
        demo.appendChild(pseudo);
      } else {
        pseudo.remove();
      }
      toggleBtn.textContent = visible ? 'Hide Noise' : 'Show Noise';
    });
  </script>

</body>
</html>
