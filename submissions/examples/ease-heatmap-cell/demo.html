<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Heatmap Cell Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Heatmap Cell</h1>
        <p class="subtitle">Color intensity animates on data change</p>

        <!-- HEATMAP CELL COMPONENT -->
        <div class="heatmap-container">
            <div class="heatmap-wrapper">
                <div class="heatmap-grid" id="heatmapGrid">
                    <!-- Cells will be generated by JavaScript -->
                </div>
                <div class="heatmap-legend">
                    <div class="legend-item">
                        <span class="legend-label">Low</span>
                        <div class="legend-gradient"></div>
                        <span class="legend-label">High</span>
                    </div>
                </div>
                <div class="heatmap-controls">
                    <button class="heatmap-btn" id="randomBtn">🎲 Random Data</button>
                    <button class="heatmap-btn" id="resetBtn">⟳ Reset</button>
                    <button class="heatmap-btn" id="animateBtn">▶ Animate</button>
                    <button class="heatmap-btn" id="toggleLabelsBtn">🏷️ Labels</button>
                </div>
                <div class="heatmap-footer">
                    <span class="footer-label">Cells:</span>
                    <span class="footer-value" id="cellCount">0</span>
                    <span class="footer-label">Range:</span>
                    <span class="footer-value" id="rangeDisplay">0 - 0</span>
                    <span class="footer-label">Avg:</span>
                    <span class="footer-value" id="avgDisplay">0</span>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="sizeSmall">🟦 Small</button>
            <button class="demo-btn" id="sizeMedium">🟩 Medium</button>
            <button class="demo-btn" id="sizeLarge">🟥 Large</button>
            <button class="demo-btn" id="toggleTheme">🎨 Theme</button>
        </div>

        <!-- Selected Cell Info -->
        <div class="selected-info" id="selectedInfo">
            <span class="info-label">Selected:</span>
            <span class="info-value" id="selectedDisplay">None</span>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Color Palettes</h3>
            <div class="variants-grid">
                <div class="variant-card" id="palette1">
                    <div class="variant-preview" id="preview1"></div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="palette2">
                    <div class="variant-preview" id="preview2"></div>
                    <span class="variant-label">Inferno</span>
                </div>
                <div class="variant-card" id="palette3">
                    <div class="variant-preview" id="preview3"></div>
                    <span class="variant-label">Viridis</span>
                </div>
                <div class="variant-card" id="palette4">
                    <div class="variant-preview" id="preview4"></div>
                    <span class="variant-label">Plasma</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const grid = document.getElementById('heatmapGrid');
            const cellCount = document.getElementById('cellCount');
            const rangeDisplay = document.getElementById('rangeDisplay');
            const avgDisplay = document.getElementById('avgDisplay');
            const selectedDisplay = document.getElementById('selectedDisplay');
            const randomBtn = document.getElementById('randomBtn');
            const resetBtn = document.getElementById('resetBtn');
            const animateBtn = document.getElementById('animateBtn');
            const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');
            const sizeSmall = document.getElementById('sizeSmall');
            const sizeMedium = document.getElementById('sizeMedium');
            const sizeLarge = document.getElementById('sizeLarge');
            const toggleThemeBtn = document.getElementById('toggleTheme');

            // ============================================
            // CONFIGURATION
            // ============================================
            const PALETTES = {
                default: {
                    colors: ['#e8f0fe', '#c5d9f1', '#a2c2e4', '#7fabc7', '#5c94aa', '#397d8d', '#166670'],
                    name: 'Default'
                },
                inferno: {
                    colors: ['#fff4e6', '#fdd8b5', '#fbbc84', '#f29e5c', '#db7d3e', '#b85d28', '#8c3e1a'],
                    name: 'Inferno'
                },
                viridis: {
                    colors: ['#fde725', '#b8de29', '#6ecb3a', '#35b779', '#20918e', '#2d6a8f', '#440154'],
                    name: 'Viridis'
                },
                plasma: {
                    colors: ['#f0f921', '#fda638', '#f26e5e', '#cf3d82', '#9f1793', '#660f8c', '#0d0887'],
                    name: 'Plasma'
                }
            };

            const CONFIG = {
                rows: 8,
                cols: 8,
                minValue: 0,
                maxValue: 100,
                palette: 'default',
                animationDuration: 800, // ms
                showLabels: true,
                onCellClick: function(row, col, value) {
                    console.log(`📊 Cell [${row}, ${col}] = ${value}`);
                },
                onUpdate: function(data) {
                    console.log('📈 Heatmap updated');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let data = [];
            let cellElements = [];
            let currentPalette = CONFIG.palette;
            let showLabels = CONFIG.showLabels;
            let isAnimating = false;
            let animationId = null;
            let selectedCell = null;

            // ============================================
            // DATA GENERATION
            // ============================================
            function generateData(rows, cols) {
                const newData = [];
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        // Random value with some clustering for visual interest
                        const base = Math.random() * 100;
                        const cluster = Math.sin(r * 0.8 + c * 0.6) * 20 + 50;
                        const value = Math.min(Math.max((base + cluster) / 1.5, 0), 100);
                        row.push(Math.round(value));
                    }
                    newData.push(row);
                }
                return newData;
            }

            // ============================================
            // COLOR FUNCTIONS
            // ============================================
            function getPaletteColors(paletteName) {
                return PALETTES[paletteName]?.colors || PALETTES.default.colors;
            }

            function getColor(value, min, max, paletteName) {
                const colors = getPaletteColors(paletteName);
                const range = max - min || 1;
                const normalized = (value - min) / range;
                const index = Math.min(Math.floor(normalized * (colors.length - 1)), colors.length - 2);
                const fraction = (normalized * (colors.length - 1)) - index;
                
                const c1 = hexToRgb(colors[index]);
                const c2 = hexToRgb(colors[index + 1] || colors[index]);
                
                const r = Math.round(c1.r + (c2.r - c1.r) * fraction);
                const g = Math.round(c1.g + (c2.g - c1.g) * fraction);
                const b = Math.round(c1.b + (c2.b - c1.b) * fraction);
                
                return `rgb(${r}, ${g}, ${b})`;
            }

            function hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }

            function getTextColor(value, min, max, paletteName) {
                const color = getColor(value, min, max, paletteName);
                const rgb = hexToRgb(colorToHex(color));
                const luminance = (0.299 * rgb.r + 0.587 * rgb.g + 0.114 * rgb.b) / 255;
                return luminance > 0.5 ? '#1a1a2e' : '#ffffff';
            }

            function colorToHex(rgb) {
                const match = rgb.match(/\d+/g);
                if (!match) return '#000000';
                const r = parseInt(match[0]);
                const g = parseInt(match[1]);
                const b = parseInt(match[2]);
                return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
            }

            // ============================================
            // RENDER FUNCTIONS
            // ============================================
            function renderHeatmap(data, animate = false) {
                const rows = data.length;
                const cols = data[0]?.length || 0;
                const allValues = data.flat();
                const min = Math.min(...allValues);
                const max = Math.max(...allValues);
                const palette = currentPalette;

                // Clear grid
                grid.innerHTML = '';
                cellElements = [];

                // Create cells
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const value = data[r][c];
                        const cell = document.createElement('div');
                        cell.className = 'heatmap-cell';
                        cell.dataset.row = r;
                        cell.dataset.col = c;
                        cell.dataset.value = value;

                        // Set initial color
                        const color = getColor(value, min, max, palette);
                        cell.style.backgroundColor = color;

                        // Set label
                        if (showLabels) {
                            const label = document.createElement('span');
                            label.className = 'cell-label';
                            label.textContent = value;
                            const textColor = getTextColor(value, min, max, palette);
                            label.style.color = textColor;
                            cell.appendChild(label);
                        }

                        // Click handler
                        cell.addEventListener('click', function() {
                            const row = parseInt(this.dataset.row);
                            const col = parseInt(this.dataset.col);
                            const val = parseInt(this.dataset.value);
                            selectedCell = { row, col, value: val, element: this };
                            selectedDisplay.textContent = `[${row}, ${col}] = ${val}`;
                            CONFIG.onCellClick(row, col, val);
                            
                            // Highlight selected
                            document.querySelectorAll('.heatmap-cell').forEach(el => {
                                el.classList.remove('selected');
                            });
                            this.classList.add('selected');
                        });

                        // Hover effect
                        cell.addEventListener('mouseenter', function() {
                            this.style.transform = 'scale(1.05)';
                            this.style.zIndex = '2';
                            this.style.boxShadow = '0 4px 16px rgba(0,0,0,0.2)';
                        });

                        cell.addEventListener('mouseleave', function() {
                            this.style.transform = 'scale(1)';
                            this.style.zIndex = '1';
                            this.style.boxShadow = 'none';
                        });

                        grid.appendChild(cell);
                        cellElements.push(cell);
                    }
                }

                // Update stats
                cellCount.textContent = rows * cols;
                rangeDisplay.textContent = `${min} - ${max}`;
                const avg = Math.round(allValues.reduce((a, b) => a + b, 0) / allValues.length);
                avgDisplay.textContent = avg;

                // Trigger callback
                CONFIG.onUpdate(data);
            }

            // ============================================
            // ANIMATION FUNCTIONS
            // ============================================
            function animateToData(newData) {
                if (isAnimating) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    isAnimating = false;
                }

                const oldData = data;
                const rows = Math.min(oldData.length, newData.length);
                const cols = Math.min(oldData[0]?.length || 0, newData[0]?.length || 0);
                
                // Ensure data dimensions match
                if (rows !== newData.length || cols !== newData[0]?.length) {
                    data = newData;
                    renderHeatmap(data);
                    return;
                }

                isAnimating = true;
                animateBtn.textContent = '⏸ Pause';
                const startTime = performance.now();
                const duration = CONFIG.animationDuration;

                function animate(timestamp) {
                    const elapsed = timestamp - startTime;
                    const progress = Math.min(elapsed / duration, 1);
                    // Ease in-out cubic
                    const eased = progress < 0.5 ? 
                        4 * progress * progress * progress : 
                        1 - Math.pow(-2 * progress + 2, 3) / 2;

                    // Interpolate values
                    const interpolatedData = [];
                    for (let r = 0; r < rows; r++) {
                        const row = [];
                        for (let c = 0; c < cols; c++) {
                            const oldVal = oldData[r]?.[c] || 0;
                            const newVal = newData[r]?.[c] || 0;
                            const currentVal = oldVal + (newVal - oldVal) * eased;
                            row.push(Math.round(currentVal));
                        }
                        interpolatedData.push(row);
                    }

                    // Render with interpolated values
                    renderHeatmap(interpolatedData);

                    if (progress < 1) {
                        animationId = requestAnimationFrame(animate);
                    } else {
                        // Final render with exact data
                        data = newData;
                        renderHeatmap(data);
                        isAnimating = false;
                        animateBtn.textContent = '▶ Animate';
                        CONFIG.onUpdate(data);
                    }
                }

                animationId = requestAnimationFrame(animate);
            }

            function pauseAnimation() {
                if (!isAnimating) return;
                isAnimating = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                animateBtn.textContent = '▶ Resume';
            }

            function resumeAnimation() {
                if (isAnimating) return;
                // Re-animate from current state
                const currentData = getCurrentData();
                const newData = generateData(CONFIG.rows, CONFIG.cols);
                data = currentData;
                animateToData(newData);
            }

            function toggleAnimation() {
                if (isAnimating) {
                    pauseAnimation();
                } else {
                    if (animateBtn.textContent === '▶ Resume') {
                        resumeAnimation();
                    } else {
                        const newData = generateData(CONFIG.rows, CONFIG.cols);
                        animateToData(newData);
                    }
                }
            }

            function getCurrentData() {
                const cells = document.querySelectorAll('.heatmap-cell');
                const rows = CONFIG.rows;
                const cols = CONFIG.cols;
                const currentData = [];
                for (let r = 0; r < rows; r++) {
                    const row = [];
                    for (let c = 0; c < cols; c++) {
                        const cell = cells[r * cols + c];
                        row.push(parseInt(cell.dataset.value));
                    }
                    currentData.push(row);
                }
                return currentData;
            }

            // ============================================
            // CONTROLS
            // ============================================
            function setSize(rows, cols) {
                CONFIG.rows = rows;
                CONFIG.cols = cols;
                const newData = generateData(rows, cols);
                data = newData;
                renderHeatmap(data);
                selectedDisplay.textContent = 'None';
            }

            function setPalette(paletteName) {
                if (PALETTES[paletteName]) {
                    currentPalette = paletteName;
                    // Re-render with new palette
                    const currentData = getCurrentData();
                    renderHeatmap(currentData);
                }
            }

            function toggleLabels() {
                showLabels = !showLabels;
                toggleLabelsBtn.textContent = showLabels ? '🏷️ Labels' : '🏷️ Hide Labels';
                const currentData = getCurrentData();
                renderHeatmap(currentData);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            randomBtn.addEventListener('click', function() {
                const newData = generateData(CONFIG.rows, CONFIG.cols);
                animateToData(newData);
            });

            resetBtn.addEventListener('click', function() {
                pauseAnimation();
                const newData = generateData(CONFIG.rows, CONFIG.cols);
                // Reset to low values
                const resetData = newData.map(row => row.map(() => Math.round(Math.random() * 20)));
                data = resetData;
                renderHeatmap(resetData);
                animateBtn.textContent = '▶ Animate';
                selectedDisplay.textContent = 'None';
                document.querySelectorAll('.heatmap-cell').forEach(el => el.classList.remove('selected'));
            });

            animateBtn.addEventListener('click', toggleAnimation);

            toggleLabelsBtn.addEventListener('click', toggleLabels);

            sizeSmall.addEventListener('click', function() { setSize(6, 6); });
            sizeMedium.addEventListener('click', function() { setSize(8, 8); });
            sizeLarge.addEventListener('click', function() { setSize(12, 12); });

            toggleThemeBtn.addEventListener('click', function() {
                const palettes = Object.keys(PALETTES);
                const currentIndex = palettes.indexOf(currentPalette);
                const nextIndex = (currentIndex + 1) % palettes.length;
                setPalette(palettes[nextIndex]);
                // Update previews
                updatePalettePreviews();
            });

            // ============================================
            // PALETTE PREVIEWS
            // ============================================
            function updatePalettePreviews() {
                const paletteNames = Object.keys(PALETTES);
                const previews = [document.getElementById('preview1'), document.getElementById('preview2'), document.getElementById('preview3'), document.getElementById('preview4')];
                
                paletteNames.forEach((name, index) => {
                    if (index >= previews.length) return;
                    const colors = PALETTES[name].colors;
                    const preview = previews[index];
                    preview.innerHTML = '';
                    
                    colors.forEach(color => {
                        const swatch = document.createElement('div');
                        swatch.className = 'swatch';
                        swatch.style.backgroundColor = color;
                        preview.appendChild(swatch);
                    });
                    
                    // Highlight active
                    const card = preview.closest('.variant-card');
                    card.classList.toggle('active', name === currentPalette);
                });
            }

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    toggleAnimation();
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetBtn.click();
                }
                if (e.key === 'l' || e.key === 'L') {
                    toggleLabels();
                }
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.Heatmap = {
                setData: (newData) => {
                    data = newData;
                    renderHeatmap(data);
                },
                animateTo: (newData) => {
                    animateToData(newData);
                },
                getData: () => getCurrentData(),
                setPalette: setPalette,
                setSize: setSize,
                toggleLabels: toggleLabels,
                pause: pauseAnimation,
                resume: resumeAnimation,
                toggle: toggleAnimation,
                reset: () => resetBtn.click(),
                getSelected: () => selectedCell,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            data = generateData(CONFIG.rows, CONFIG.cols);
            renderHeatmap(data);
            updatePalettePreviews();

            console.log('✅ Heatmap Cell initialized!');
            console.log('📖 API: window.Heatmap');
            console.log('📖 Usage:');
            console.log('  - Click cells to select them');
            console.log('  - Click "Random Data" to animate new data');
            console.log('  - Keyboard shortcuts: Space (animate), R (reset), L (labels)');
            console.log('  - Color palettes: Default, Inferno, Viridis, Plasma');

        })();
    </script>
</body>
</html>
