<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Star Rating</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Rate Your Experience</h1>
    <div class="star-rating" id="starRating" role="radiogroup" aria-label="Star rating">
      <span class="star" data-value="0.5" role="radio" aria-checked="false" tabindex="0">&#9733;</span>
      <span class="star" data-value="1" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="1.5" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="2" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="2.5" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="3" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="3.5" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="4" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="4.5" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
      <span class="star" data-value="5" role="radio" aria-checked="false" tabindex="-1">&#9733;</span>
    </div>
    <p class="rating-display">Rating: <span id="ratingValue">0.0</span> / 5.0</p>
  </main>
  <script>
    const stars = document.querySelectorAll('.star');
    const ratingDisplay = document.getElementById('ratingValue');
    let currentRating = 0;

    function setRating(value) {
      currentRating = value;
      stars.forEach(s => {
        const starVal = parseFloat(s.dataset.value);
        const filled = starVal <= value;
        const half = !filled && (starVal - 0.5) <= value;
        s.classList.toggle('filled', filled);
        s.classList.toggle('half', half);
        s.setAttribute('aria-checked', filled || half);
      });
      ratingDisplay.textContent = value.toFixed(1);
    }

    function preview(value) {
      stars.forEach(s => {
        const starVal = parseFloat(s.dataset.value);
        const filled = starVal <= value;
        const half = !filled && (starVal - 0.5) <= value;
        s.style.color = filled || half ? 'var(--rsi-hover-color)' : '';
      });
    }

    function clearPreview() {
      stars.forEach(s => s.style.color = '');
    }

    stars.forEach(s => {
      s.addEventListener('click', () => setRating(parseFloat(s.dataset.value)));
      s.addEventListener('mouseenter', () => preview(parseFloat(s.dataset.value)));
      s.addEventListener('mouseleave', clearPreview);
      s.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          setRating(parseFloat(s.dataset.value));
        }
      });
    });
  </script>
</body>
</html>
