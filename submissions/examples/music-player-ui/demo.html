<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music Player Deck — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 4rem 1rem; margin: 0;">

  <div class="ease-player-container" id="playerDeck">
    
    <div class="ease-player-art-frame">
      <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400&q=80" alt="Cover Art" />
    </div>

    <div class="ease-track-meta">
      <h3 class="ease-track-title">Synthetic Horizon</h3>
      <p class="ease-track-artist">Vector Core</p>
    </div>

    <div class="ease-timeline-wrapper">
      <div class="ease-scrub-bar" id="scrubBar">
        <div class="ease-scrub-progress" id="progressBar"></div>
      </div>
      <div class="ease-time-row">
        <span id="currentTime">0:42</span>
        <span>2:00</span>
      </div>
    </div>

    <div class="ease-controls-tray">
      <button class="ease-btn-deck" style="font-size: 1rem;">⏮</button>
      <button class="ease-btn-deck ease-btn-play-master" id="playBtn">▶</button>
      <button class="ease-btn-deck" style="font-size: 1rem;">⏭</button>
    </div>

    <div class="ease-volume-container">
      <span style="font-size: 0.85rem; color: #64748b;">🔊</span>
      <input type="range" class="ease-volume-slider" min="0" max="100" value="70" />
    </div>

  </div>

  <script>
    const playerDeck = document.getElementById('playerDeck');
    const playBtn = document.getElementById('playBtn');
    const scrubBar = document.getElementById('scrubBar');
    const progressBar = document.getElementById('progressBar');
    const currentTimeEl = document.getElementById('currentTime');

    let isPlaying = false;
    let progressPercent = 35;

    // Toggle Play State Loops
    playBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (isPlaying) {
        playerDeck.classList.add('is-playing');
        playBtn.textContent = '⏸';
      } else {
        playerDeck.classList.remove('is-playing');
        playBtn.textContent = '▶';
      }
    });

    // Handle Manual Coordinate Scrub Event Passes
    scrubBar.addEventListener('click', (e) => {
      const rect = scrubBar.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const widthPercent = Math.max(0, Math.min(100, (clickX / rect.width) * 100));
      
      progressPercent = widthPercent;
      progressBar.style.width = `${progressPercent}%`;
      
      // Update dummy time readout text
      const totalSeconds = 120;
      const computedSeconds = Math.floor((progressPercent / 100) * totalSeconds);
      const mins = Math.floor(computedSeconds / 60);
      const secs = String(computedSeconds % 60).padStart(2, '0');
      currentTimeEl.textContent = `${mins}:${secs}`;
    });
  </script>
</body>
</html>
