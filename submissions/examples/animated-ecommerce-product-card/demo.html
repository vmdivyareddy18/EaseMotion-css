<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated E-commerce Product Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="shop-container">
    <!-- Header -->
    <header class="shop-header ease-fade-in-down">
      <h1>Featured Products</h1>
      <p>Hover over the card to see the smooth interactions.</p>
    </header>

    <!-- Product Card -->
    <div class="product-card ease-zoom-in">
      
      <!-- Image Section -->
      <div class="product-image-wrapper">
        <div class="product-image"></div>
        
        <!-- Sale Badge -->
        <span class="product-badge ease-bounce-in ease-delay-200">-20% OFF</span>
        
        <!-- Quick Actions (Slide in on hover) -->
        <div class="product-actions">
          <button class="action-btn ease-hover-grow" aria-label="Add to Wishlist">❤️</button>
          <button class="action-btn ease-hover-grow" aria-label="Quick View">👁️</button>
        </div>
      </div>

      <!-- Product Info -->
      <div class="product-info">
        <span class="product-category ease-fade-in-up ease-delay-300">Audio Equipment</span>
        <h3 class="product-title ease-fade-in-up ease-delay-400">Wireless Noise-Cancelling Headphones</h3>
        
        <!-- Rating -->
        <div class="product-rating ease-fade-in-up ease-delay-500">
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star">★</span>
          <span class="star half">★</span>
          <span class="rating-count">(128 reviews)</span>
        </div>

        <!-- Price -->
        <div class="product-price ease-fade-in-up ease-delay-600">
          <span class="current-price">$199.99</span>
          <span class="old-price">$249.99</span>
        </div>

        <!-- Add to Cart Button -->
        <button class="add-to-cart-btn ease-fade-in-up ease-delay-700 ease-hover-grow">
          <span class="btn-icon">🛒</span> Add to Cart
        </button>
      </div>

    </div>
  </div>
</body>
</html>
