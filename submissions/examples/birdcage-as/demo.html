<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birdcage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="hook"></span>
    <div class="cage">
      <span class="domeC"></span>
      <span class="barsC"></span>
      <span class="ringC"></span>
      <div class="swingC">
        <span class="perch"></span>
        <div class="birdC">
          <span class="bodyC"></span>
          <span class="wingC"></span>
          <span class="headC"></span>
          <span class="eyeC"></span>
          <span class="beakC"></span>
          <span class="tailC"></span>
        </div>
      </div>
      <span class="baseC"></span>
      <span class="dish"></span>
    </div>
    <span class="noteC nc1"></span>
    <span class="noteC nc2"></span>
  </div>
</body>
</html>
