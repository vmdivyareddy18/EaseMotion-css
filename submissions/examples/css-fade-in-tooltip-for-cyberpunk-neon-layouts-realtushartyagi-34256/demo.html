<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CSS Fade-In Tooltip (Cyberpunk Neon)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      background-color: #1a1a2e; /* Deep dark bg for cyberpunk contrast */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
    }
    
    .container {
      text-align: center;
    }
    
    .title {
      color: #0ff;
      text-shadow: 0 0 10px #0ff;
      margin-bottom: 60px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="title">System Initialization</h2>
    
    <!-- Tooltip Wrapper -->
    <div class="ease-tooltip-wrapper">
      <button class="ease-cp-btn" aria-describedby="cyber-tooltip">
        Engage Protocol
      </button>
      
      <!-- Tooltip Content -->
      <div id="cyber-tooltip" class="ease-tooltip-content" role="tooltip">
        Data Linked
      </div>
    </div>
    
  </div>
</body>
</html>
