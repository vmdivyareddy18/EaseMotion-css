<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism UI - Draw-Border Line Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-viewport">
        <!-- Main Abstract Fluid Backdrop Canvas for Translucent Glassmorphism Contrast Visuals -->
        <div class="fluid-backdrop-mesh">
            <div class="orb orb-1"></div>
            <div class="orb orb-2"></div>
        </div>

        <!-- Premium Embedded Glassmorphism Control Hub Card Container Shell -->
        <div class="glass-container-card">
            <header class="glass-header">
                <div class="neon-matrix-badge">TRANSLUCENT CORE</div>
                <h2 class="glass-title">Interface Compositor</h2>
                <p class="glass-subtitle">Hover over the action module selector below to trigger the pure-CSS draw-border line glass popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">❄️</span>
                        <span class="btn-text">Open Glass Terminal</span>
                    </button>

                    <!-- Floating Popover Translucent Overlay Menu Shell Box -->
                    <div class="draw-border-popover ease-border-draw">
                        <!-- Dual-Axis Outline Draw Border Line Segment Components -->
                        <div class="border-line line-top-left"></div>
                        <div class="border-line line-bottom-right"></div>
                        
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Glassmorphism Options</h4>
                            <ul class="menu-actions-list">
                                <li class="menu-item"><a href="#blur" class="action-link-node">Re-index Backdrop Blur</a></li>
                                <li class="menu-item"><a href="#opacity" class="action-link-node">Adjust Specular Alpha</a></li>
                                <li class="menu-item"><a href="#reset" class="action-link-node action-danger">Purge Overlay Assets</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="glass-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Custom CSS Parameters Ingress Fully Verified</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
