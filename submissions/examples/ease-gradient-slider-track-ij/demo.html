<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Slider Track</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="card-header">
      <h2>Gradient Slider Track</h2>
      <p>Gradient track with color preview</p>
    </div>

    <div class="demo-area">
      <div class="slider-container" id="sliderContainer">
        <div class="color-preview" id="colorPreview">
          <span class="hex-label" id="hexLabel">#ff6b6b</span>
        </div>
        <div class="track-wrap">
          <input type="range" id="slider" min="0" max="100" value="50" class="gradient-slider">
          <div class="track-bg"></div>
        </div>
      </div>
    </div>

    <div class="controls">
      <label>Track Height <input type="range" id="trackHeight" min="4" max="24" step="1" value="10" data-var="--track-height" data-unit="px"></label>
      <label>Gradient Start <input type="color" id="gradientStart" value="#ff6b6b" data-var="--gradient-start"></label>
      <label>Gradient End <input type="color" id="gradientEnd" value="#4ecdc4" data-var="--gradient-end"></label>
      <label>Thumb Color <input type="color" id="thumbColor" value="#ffffff" data-var="--thumb-color"></label>
    </div>
  </main>
  <script>
    const container = document.getElementById('sliderContainer');
    const slider = document.getElementById('slider');
    const preview = document.getElementById('colorPreview');
    const hexLabel = document.getElementById('hexLabel');

    document.querySelectorAll('[data-var]').forEach(input => {
      const set = () => container.style.setProperty(input.dataset.var, input.dataset.unit ? input.value + input.dataset.unit : input.value);
      input.addEventListener('input', set);
      set();
    });

    function lerpColor(a, b, t) {
      const ah = parseInt(a.slice(1), 16), ar = ah >> 16, ag = (ah >> 8) & 0xff, ab = ah & 0xff;
      const bh = parseInt(b.slice(1), 16), br = bh >> 16, bg = (bh >> 8) & 0xff, bb = bh & 0xff;
      const rr = Math.round(ar + (br - ar) * t);
      const rg = Math.round(ag + (bg - ag) * t);
      const rb = Math.round(ab + (bb - ab) * t);
      return `#${((1 << 24) + (rr << 16) + (rg << 8) + rb).toString(16).slice(1)}`;
    }

    function updatePreview() {
      const start = document.getElementById('gradientStart').value;
      const end = document.getElementById('gradientEnd').value;
      const t = slider.value / 100;
      const color = lerpColor(start, end, t);
      preview.style.background = color;
      hexLabel.textContent = color;
    }

    slider.addEventListener('input', updatePreview);
    document.querySelectorAll('input[type="color"]').forEach(c => c.addEventListener('input', updatePreview));
    updatePreview();
  </script>
</body>
</html>
