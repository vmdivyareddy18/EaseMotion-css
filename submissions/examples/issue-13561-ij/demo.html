<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-avatar-group - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-avatar-group</h1>
    <p class="description">Overlapping avatar stack with hover spread effect.</p>

    <div class="avatar-demo">
      <div class="ease-avatar-group" id="avatarGroup">
        <div class="avatar" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">JD</div>
        <div class="avatar" style="background:linear-gradient(135deg,#ec4899,#f472b6);">AL</div>
        <div class="avatar" style="background:linear-gradient(135deg,#14b8a6,#34d399);">MK</div>
        <div class="avatar" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);">TR</div>
        <div class="avatar overflow">+3</div>
      </div>
      <p class="hint">Hover the avatar stack to see them spread apart</p>
    </div>
  </div>
</body>
</html>
