<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento Grid Dashboard Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="bento-grid">
      <div class="bento-card col-span-2 row-span-2">
        <h3>Main Analytics</h3>
        <p>Dynamic monitoring of network bandwidth usage and request metrics.</p>
      </div>
      <div class="bento-card">
        <h3>Users</h3>
        <p>4.2k active</p>
      </div>
      <div class="bento-card">
        <h3>Uptime</h3>
        <p>99.98%</p>
      </div>
      <div class="bento-card col-span-2">
        <h3>Database Health</h3>
        <p>Zero anomalies found during the last integrity scan.</p>
      </div>
    </div>
  </div>
</body>
</html>
