<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay"></div>

<script>
const overlay = document.querySelector(".overlay");

document.addEventListener("mousemove", (e) => {
  overlay.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, transparent 100px, rgba(0,0,0,0.95) 200px)`;
});
</script>

</body>
</html>
