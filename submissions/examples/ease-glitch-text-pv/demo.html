<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glitch Text Effect</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: sans-serif;
      gap: 3rem;
    }

    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .label {
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="demo-section">
    <span class="label">Default</span>
    <h1 class="glitch-text" data-text="GLITCH">GLITCH</h1>
  </div>

  <div class="demo-section">
    <span class="label">Slow</span>
    <h1 class="glitch-text glitch-text-slow" data-text="SLOW MODE">SLOW MODE</h1>
  </div>

  <div class="demo-section">
    <span class="label">Fast</span>
    <h1 class="glitch-text glitch-text-fast" data-text="FAST MODE">FAST MODE</h1>
  </div>

  <div class="demo-section">
    <span class="label">Green Variant</span>
    <h1 class="glitch-text glitch-text-green" data-text="GREEN">GREEN</h1>
  </div>

  <div class="demo-section">
    <span class="label">Blue Variant</span>
    <h1 class="glitch-text glitch-text-blue" data-text="BLUE">BLUE</h1>
  </div>

</body>
</html>
