<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Notification Stack Toast</title>
    <!-- Simulating framework load -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--ease-color-neutral-50, #f8fafc);
            color: var(--ease-color-text, #1e293b);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s ease;
        }
        [data-theme="dark"] body {
            background-color: var(--ease-color-bg, #0f172a);
        }
        .controls {
            margin-top: 2rem;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] .controls {
            background: #1e293b;
            color: white;
        }
        button {
            padding: 0.5rem 1rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s ease;
        }
        button:active {
            transform: scale(0.95);
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <h1>Notification Stack Cascade-Slide</h1>
    <p>A beautiful cascading toast notification stack animated entirely in pure CSS.</p>

    <div class="controls">
        <button onclick="replayAnimations()">Replay Cascade Animation</button>
        <button onclick="toggleTheme()" style="margin-left: 1rem; background: #64748b;">Toggle Dark Mode</button>
    </div>

    <!-- The Component -->
    <div class="ease-toast-container" id="toastContainer" role="region" aria-label="Notifications">
        <!-- Toasts injected dynamically via JS to trigger aria-live announcements -->
    </div>

    <script>
        const toastHTML = `
            <div class="ease-toast" role="status" aria-live="polite">
                <strong>System Update</strong><br>
                <span style="font-size: 0.875rem; opacity: 0.8;">Your system is fully up to date.</span>
            </div>
            <div class="ease-toast" role="status" aria-live="polite">
                <strong>New Message</strong><br>
                <span style="font-size: 0.875rem; opacity: 0.8;">Sarah sent you a document.</span>
            </div>
            <div class="ease-toast" role="status" aria-live="polite">
                <strong>Upload Complete</strong><br>
                <span style="font-size: 0.875rem; opacity: 0.8;">3 files uploaded successfully.</span>
            </div>
            <div class="ease-toast" role="status" aria-live="polite">
                <strong>Connection Restored</strong><br>
                <span style="font-size: 0.875rem; opacity: 0.8;">Connected to the main server.</span>
            </div>
        `;

        // Inject toasts on page load so assistive tech announces them
        document.getElementById('toastContainer').innerHTML = toastHTML;

        // Used solely to replay the CSS animation in the demo
        function replayAnimations() {
            const container = document.getElementById('toastContainer');
            container.innerHTML = ''; // Clear container
            
            // Re-inject after a tiny delay to ensure the DOM registers the mutation
            setTimeout(() => {
                container.innerHTML = toastHTML;
            }, 50);
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            if (html.getAttribute('data-theme') === 'dark') {
                html.removeAttribute('data-theme');
            } else {
                html.setAttribute('data-theme', 'dark');
            }
        }
    </script>
</body>
</html>
