<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Card Flip</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>3D Card Flip</h1>
  <p>Hover over the cards to flip them and reveal the back.</p>
  <div class="flip-grid">
    <div class="flip-card">
      <div class="flip-inner">
        <div class="flip-front"><h3>Profile</h3><div class="avatar">&#128100;</div><p>T. Mitra</p><small>Engineer</small></div>
        <div class="flip-back"><h3>Contact</h3><p>mitra@example.com</p><button>Message</button></div>
      </div>
    </div>
    <div class="flip-card">
      <div class="flip-inner">
        <div class="flip-front flashcard-front"><h3>Flashcard</h3><p>What is CSS?</p></div>
        <div class="flip-back flashcard-back"><h3>Answer</h3><p>Cascading Style Sheets.</p></div>
      </div>
    </div>
  </div>
</div>
</body></html>
