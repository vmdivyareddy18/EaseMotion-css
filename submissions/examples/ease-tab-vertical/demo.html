<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Tab Vertical</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="tab-container">
    <div class="tabs">
      <input type="radio" name="tab" id="tab1" checked />
      <label for="tab1">Overview</label>

      <input type="radio" name="tab" id="tab2" />
      <label for="tab2">Settings</label>

      <input type="radio" name="tab" id="tab3" />
      <label for="tab3">Analytics</label>

      <div class="indicator"></div>
    </div>

    <div class="content">
      <div class="panel" id="content1">Welcome to the Overview section.</div>
      <div class="panel" id="content2">Adjust your Settings here.</div>
      <div class="panel" id="content3">View Analytics and insights.</div>
    </div>
  </div>

  <script>
    const tabs = document.querySelectorAll('input[name="tab"]');
    const indicator = document.querySelector('.indicator');
    const panels = document.querySelectorAll('.panel');

    tabs.forEach((tab, index) => {
      tab.addEventListener('change', () => {
        indicator.style.transform = `translateY(${index * 60}px)`;
        panels.forEach((panel, i) => {
          panel.style.opacity = i === index ? '1' : '0';
          panel.style.transform = i === index ? 'translateX(0)' : 'translateX(20px)';
        });
      });
    });
  </script>
</body>
</html>
