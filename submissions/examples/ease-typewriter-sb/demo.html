<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Typewriter Animation - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="terminal-container-sb">
    <header class="terminal-header-sb">
      <span class="dot-sb red-sb"></span>
      <span class="dot-sb yellow-sb"></span>
      <span class="dot-sb green-sb"></span>
      <span class="terminal-title-sb">bash - sparkai@machine</span>
    </header>

    <main class="terminal-body-sb">
      <div class="typewriter-wrapper-sb">
        <span class="prompt-symbol-sb">$</span>
        <h1 class="ease-typewriter-text-sb">Building with EaseMotion CSS framework...</h1>
      </div>
    </main>
  </div>

</body>
</html>
