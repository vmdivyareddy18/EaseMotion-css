<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Auto Dismiss</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Alert Auto Dismiss</h1>
    <div class="controls">
      <button class="btn btn-success" data-type="success">Success</button>
      <button class="btn btn-error" data-type="error">Error</button>
      <button class="btn btn-info" data-type="info">Info</button>
      <button class="btn btn-warning" data-type="warning">Warning</button>
    </div>
  </div>

  <div id="alert-container"></div>

  <script>
    const container = document.getElementById("alert-container");
    const DURATION = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--alert-duration")) * 1000 || 4000;

    const messages = {
      success: "Operation completed successfully.",
      error: "Something went wrong. Please try again.",
      info: "Here is some useful information for you.",
      warning: "Warning: Please check your input before continuing."
    };

    document.querySelectorAll(".btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const type = btn.dataset.type;
        showAlert(type, messages[type]);
      });
    });

    function showAlert(type, message) {
      const alert = document.createElement("div");
      alert.className = `alert alert-${type}`;

      const span = document.createElement("span");
      span.className = "alert-message";
      span.textContent = message;

      const close = document.createElement("button");
      close.className = "alert-close";
      close.innerHTML = "&times;";
      close.setAttribute("aria-label", "Close alert");

      alert.appendChild(span);
      alert.appendChild(close);
      container.appendChild(alert);

      const dismissTimer = setTimeout(() => dismissAlert(alert), DURATION);

      close.addEventListener("click", () => {
        clearTimeout(dismissTimer);
        dismissAlert(alert);
      });
    }

    function dismissAlert(alert) {
      if (alert.classList.contains("alert-dismiss")) return;
      alert.classList.add("alert-dismiss");
      alert.addEventListener("animationend", () => {
        alert.remove();
      }, { once: true });
    }
  </script>
</body>
</html>
