<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Subscription Renewal Countdown</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Subscription Renewal Countdown</h1>

  <p class="intro">
    A reusable countdown reminder animation for subscription
    renewals, memberships, and billing notifications.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="renewal-countdown">
        <span class="renewal-icon">🔄</span>
        <span class="timer">03:00</span>
      </div>
      <h3>Renewal Due Soon</h3>
    </div>

    <div class="card">
      <div class="renewal-countdown">
        <span class="renewal-icon large">🔄</span>
        <span class="timer">01:15</span>
      </div>
      <p>Premium Plan</p>
    </div>

    <div class="card">
      <div class="renewal-countdown">
        <span class="renewal-icon">🔄</span>
        <span class="timer">00:45</span>
      </div>
      <button>Manage Subscription</button>
    </div>

  </div>

</div>

</body>
</html>
