<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ease Crystal Command Dock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="dock">

  <button class="tool">
    <b>⌂</b>
    <small>Home</small>
  </button>

  <button class="tool">
    <b>⚡</b>
    <small>Run</small>
  </button>

  <button class="tool active">
    <b>✦</b>
    <small>Create</small>
  </button>

  <button class="tool">
    <b>☁</b>
    <small>Cloud</small>
  </button>

  <button class="tool">
    <b>⚙</b>
    <small>Settings</small>
  </button>

</main>

</body>
</html>
