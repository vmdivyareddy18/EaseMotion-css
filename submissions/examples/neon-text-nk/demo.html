<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-neon-text Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3rem;
            padding: 2rem;
            margin: 0;
            font-family: sans-serif;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
        }

        h2 {
            font-size: 2rem;
            font-weight: 600;
            text-align: center;
        }

        p {
            font-size: 1.2rem;
            text-align: center;
        }

        .cyan {
            --ease-neon-color: #00ffff;
        }

        .pink {
            --ease-neon-color: #ff00aa;
        }

        .green {
            --ease-neon-color: #00ff88;
        }

        .label {
            color: #555;
            font-size: 0.8rem;
            text-align: center;
            margin-top: -2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

    <h1 class="ease-neon-text">EaseMotion CSS</h1>
    <p class="label">default — purple</p>

    <h2 class="ease-neon-text cyan">Neon Cyan</h2>
    <p class="label">--ease-neon-color: #00ffff</p>

    <h2 class="ease-neon-text pink">Neon Pink</h2>
    <p class="label">--ease-neon-color: #ff00aa</p>

    <h2 class="ease-neon-text green">Neon Green</h2>
    <p class="label">--ease-neon-color: #00ff88</p>

</body>

</html>
