<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Glitch Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="cyberpunk-layout-container">
    
    <!-- Cyberpunk Glitch Glow Pulse Card -->
    <div class="ease-cyberpunk-glow-card">
      
      <!-- Glitching Glowing Backdrop -->
      <div class="ease-cyberpunk-glow-layer layer-1"></div>
      <div class="ease-cyberpunk-glow-layer layer-2"></div>
      
      <!-- Card Content -->
      <div class="ease-cyberpunk-content">
        
        <div class="cyberpunk-header">
          <span class="cyberpunk-id">ID: 0x94F_A</span>
          <span class="cyberpunk-status">ONLINE</span>
        </div>
        
        <h2 class="cyberpunk-title" data-text="SYSTEM BREACH">SYSTEM BREACH</h2>
        
        <div class="cyberpunk-data-grid">
          <div class="data-cell">
            <span class="data-label">UPLINK</span>
            <span class="data-value">99.8%</span>
          </div>
          <div class="data-cell">
            <span class="data-label">PING</span>
            <span class="data-value">12ms</span>
          </div>
        </div>
        
        <p class="cyberpunk-description">
          Unauthorized access detected in sector 4. Mainframe proxy bypass successful. Initiating secure data extraction protocol.
        </p>
        
        <button class="cyberpunk-btn">
          <span class="btn-text">INITIALIZE</span>
          <span class="btn-glitch-effect"></span>
        </button>
        
      </div>
      
    </div>

  </div>

</body>
</html>
