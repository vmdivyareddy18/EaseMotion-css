<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Weather Widget - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Weather Card -->
    <div class="weather-card ease-zoom-in">
      
      <!-- Header -->
      <header class="weather-header">
        <div class="location">
          <span class="pin">📍</span>
          <h2>San Francisco</h2>
        </div>
        <div class="date">Saturday, July 11</div>
      </header>

      <!-- Main Weather Display -->
      <div class="weather-main">
        <div class="weather-icon-wrapper">
          <!-- Animated Sun -->
          <div class="sun ease-spin-slow"></div>
          <!-- Animated Clouds -->
          <div class="cloud cloud-1 ease-float"></div>
          <div class="cloud cloud-2 ease-float ease-delay-200"></div>
        </div>
        <div class="weather-info">
          <div class="temperature">24°</div>
          <div class="condition">Partly Cloudy</div>
          <div class="feels-like">Feels like 26°</div>
        </div>
      </div>

      <!-- Weather Details Grid -->
      <div class="weather-details">
        <div class="detail-item ease-fade-in-up ease-delay-300 ease-hover-grow">
          <span class="detail-icon">💧</span>
          <span class="detail-label">Humidity</span>
          <span class="detail-value">65%</span>
        </div>
        <div class="detail-item ease-fade-in-up ease-delay-400 ease-hover-grow">
          <span class="detail-icon">💨</span>
          <span class="detail-label">Wind</span>
          <span class="detail-value">12 km/h</span>
        </div>
        <div class="detail-item ease-fade-in-up ease-delay-500 ease-hover-grow">
          <span class="detail-icon">☀️</span>
          <span class="detail-label">UV Index</span>
          <span class="detail-value">5</span>
        </div>
      </div>

      <!-- 5-Day Forecast -->
      <div class="forecast">
        <h3>5-Day Forecast</h3>
        <div class="forecast-list">
          <div class="forecast-day ease-fade-in-up ease-delay-600 ease-hover-grow">
            <span class="day-name">Sun</span>
            <span class="day-icon">☀️</span>
            <span class="day-temp">26°</span>
          </div>
          <div class="forecast-day ease-fade-in-up ease-delay-700 ease-hover-grow">
            <span class="day-name">Mon</span>
            <span class="day-icon">⛅</span>
            <span class="day-temp">24°</span>
          </div>
          <div class="forecast-day ease-fade-in-up ease-delay-800 ease-hover-grow">
            <span class="day-name">Tue</span>
            <span class="day-icon">🌧️</span>
            <span class="day-temp">19°</span>
          </div>
          <div class="forecast-day ease-fade-in-up ease-delay-900 ease-hover-grow">
            <span class="day-name">Wed</span>
            <span class="day-icon">⛈️</span>
            <span class="day-temp">18°</span>
          </div>
          <div class="forecast-day ease-fade-in-up ease-delay-1000 ease-hover-grow">
            <span class="day-name">Thu</span>
            <span class="day-icon">☀️</span>
            <span class="day-temp">25°</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
