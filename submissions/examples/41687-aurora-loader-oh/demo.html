<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-aurora-loader</title>
  <meta name="description" content="Animated aurora-style loader with gradient wave animations.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-aurora-loader</h1>
      <p class="subtitle" id="main-desc">Aurora-style animated loader</p>
    </header>

    <div class="display-area">
      
      <div class="loader-showcase">
        <!-- Default Aurora Loader -->
        <div class="loader-item">
          <div class="ease-aurora-loader">
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
          </div>
          <span class="loader-label">Default</span>
        </div>

        <!-- Primary Color -->
        <div class="loader-item">
          <div class="ease-aurora-loader ease-aurora-primary">
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
          </div>
          <span class="loader-label">Primary</span>
        </div>

        <!-- Success Color -->
        <div class="loader-item">
          <div class="ease-aurora-loader ease-aurora-success">
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
            <div class="aurora-bar"></div>
          </div>
          <span class="loader-label">Success</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Full Page Loader</h3>
      <div class="full-loader">
        <div class="ease-aurora-loader ease-aurora-lg ease-aurora-primary">
          <div class="aurora-bar"></div>
          <div class="aurora-bar"></div>
          <div class="aurora-bar"></div>
        </div>
        <p class="loading-text">Loading...</p>
      </div>
    </section>

  </main>

</body>
</html>
