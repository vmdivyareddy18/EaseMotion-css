<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Slide-Right Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="hero">

<span class="badge">

Minimalist Tech

</span>

<h1>

Slide-Right Modal

</h1>

<p>

A clean modal interaction
crafted for modern tech
products, documentation
sites and startup platforms.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="icon">

⌘

</div>

<h2>

Minimal Experience

</h2>

<p>

Present product features
through a refined slide-right
motion emphasizing clarity
and simplicity.

</p>

<button>

Discover More

</button>

</div>

</div>

</div>

</section>

</body>

</html>
