<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-status-badge - EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>ease-status-badge</h1>
    <p class="description">Animated status indicator badge with distinct animation per state.</p>

    <div class="status-list">
      <div class="status-row">
        <span class="status-label">Online</span>
        <span class="ease-status-badge status-online">
          <span class="dot"></span>
          Online
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Away</span>
        <span class="ease-status-badge status-away">
          <span class="dot"></span>
          Away
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Busy</span>
        <span class="ease-status-badge status-busy">
          <span class="dot"></span>
          Busy
        </span>
      </div>
      <div class="status-row">
        <span class="status-label">Offline</span>
        <span class="ease-status-badge status-offline">
          <span class="dot"></span>
          Offline
        </span>
      </div>
    </div>
  </div>
</body>
</html>
