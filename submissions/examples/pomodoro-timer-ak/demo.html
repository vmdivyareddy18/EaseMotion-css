<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro Timer - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="pomodoro-wrapper">

    <h1>Pomodoro Timer</h1>

    <div class="mode-tabs">
      <button class="mode-btn active" data-mode="work">Work</button>
      <button class="mode-btn" data-mode="break">Break</button>
    </div>

    <div class="timer-ring">
      <svg class="progress-ring" viewBox="0 0 200 200">
        <circle class="ring-bg" cx="100" cy="100" r="88" />
        <circle class="ring-progress" cx="100" cy="100" r="88" />
      </svg>
      <div class="timer-display">
        <span class="timer-time" id="timerDisplay">25:00</span>
        <span class="timer-label" id="timerLabel">WORK</span>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="startBtn">Start</button>
      <button class="ctrl-btn" id="pauseBtn" disabled>Pause</button>
      <button class="ctrl-btn" id="resetBtn">Reset</button>
    </div>

    <div class="session-counter">
      Sessions completed: <span id="sessionCount">0</span>
    </div>

  </div>

  <script>
    const WORK = 25 * 60;
    const BREAK = 5 * 60;

    let timeLeft = WORK;
    let isRunning = false;
    let isWorkMode = true;
    let timerInterval = null;
    let sessions = 0;

    const display = document.getElementById('timerDisplay');
    const label = document.getElementById('timerLabel');
    const sessionSpan = document.getElementById('sessionCount');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const ring = document.querySelector('.ring-progress');
    const circumference = 2 * Math.PI * 88;

    ring.style.strokeDasharray = circumference;

    function updateDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
      label.textContent = isWorkMode ? 'WORK' : 'BREAK';

      const total = isWorkMode ? WORK : BREAK;
      const offset = circumference - (timeLeft / total) * circumference;
      ring.style.strokeDashoffset = offset;
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = 800;
        gain.gain.value = 0.3;
        osc.start();
        osc.stop(ctx.currentTime + 0.3);
      } catch (_) {}
    }

    function switchMode() {
      isWorkMode = !isWorkMode;
      timeLeft = isWorkMode ? WORK : BREAK;
      if (!isWorkMode && isRunning) {
        sessions++;
        sessionSpan.textContent = sessions;
      }
      updateDisplay();
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.mode-btn[data-mode="${isWorkMode ? 'work' : 'break'}"]`).classList.add('active');
    }

    function tick() {
      timeLeft--;
      updateDisplay();

      if (timeLeft <= 0) {
        playBeep();
        clearInterval(timerInterval);
        isRunning = false;
        startBtn.disabled = false;
        pauseBtn.disabled = true;
        switchMode();
        if (isRunning) {
          startTimer();
        }
      }
    }

    function startTimer() {
      if (isRunning) return;
      isRunning = true;
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      timerInterval = setInterval(tick, 1000);
    }

    function pauseTimer() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
    }

    function resetTimer() {
      pauseTimer();
      isWorkMode = true;
      timeLeft = WORK;
      sessions = 0;
      sessionSpan.textContent = '0';
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('.mode-btn[data-mode="work"]').classList.add('active');
      updateDisplay();
    }

    startBtn.addEventListener('click', startTimer);
    pauseBtn.addEventListener('click', pauseTimer);
    resetBtn.addEventListener('click', resetTimer);

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (isRunning) return;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        isWorkMode = btn.dataset.mode === 'work';
        timeLeft = isWorkMode ? WORK : BREAK;
        updateDisplay();
      });
    });

    updateDisplay();
  </script>

</body>
</html>
