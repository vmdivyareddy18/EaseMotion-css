<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nova invoice progress meter demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="nova invoice progress meter demo">
    <section class="motion-card" data-pattern="meter">
      <div class="status-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="card-copy">
        <p class="eyebrow">Paid</p>
        <h1>nova invoice progress meter</h1>
        <p>Next batch today with a focused motion cue that keeps status changes easy to scan.</p>
      </div>
      <div class="metric-panel" aria-label="Paid value">
        <strong>72%</strong>
        <span>Paid</span>
      </div>
      <div class="progress-row" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
