<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Shortcut Hint Badge</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column; gap: 1rem;">
    <div class="shortcut-row">
      <span class="shortcut-label">Save</span>
      <kbd class="shortcut-key">Ctrl</kbd>
      <span class="shortcut-plus">+</span>
      <kbd class="shortcut-key">S</kbd>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Find</span>
      <kbd class="shortcut-key">Ctrl</kbd>
      <span class="shortcut-plus">+</span>
      <kbd class="shortcut-key">F</kbd>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Undo</span>
      <kbd class="shortcut-key">Ctrl</kbd>
      <span class="shortcut-plus">+</span>
      <kbd class="shortcut-key">Z</kbd>
    </div>
    <div class="shortcut-row">
      <span class="shortcut-label">Dev Tools</span>
      <kbd class="shortcut-key">F12</kbd>
    </div>
  </div>
</body>
</html>
