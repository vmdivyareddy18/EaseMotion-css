<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Confirmation Dialog • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">

    <div class="dialog">

        <div class="icon">
            ⚠️
        </div>

        <span class="badge">
            CONFIRM ACTION
        </span>

        <h1>Delete Project?</h1>

        <p>
            This action cannot be undone. All files, settings and associated
            data will be permanently removed from your workspace.
        </p>

        <div class="details">

            <div class="detail">
                <strong>Project</strong>
                <span>EaseMotion Dashboard</span>
            </div>

            <div class="detail">
                <strong>Files</strong>
                <span>248 Assets</span>
            </div>

        </div>

        <div class="actions">

            <button class="cancel">
                Cancel
            </button>

            <button class="delete">
                Delete
            </button>

        </div>

    </div>

</div>

</body>
</html>
