<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flip Timeline Pin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2 class="tl-title">Timeline</h2>
    <div class="timeline">
      <div class="tl-item">
        <div class="tl-pin">
          <div class="tl-pin-front">2024</div>
          <div class="tl-pin-back">🚀</div>
        </div>
        <div class="tl-content">
          <h3>Project Started</h3>
          <p>Initial concept and team formation</p>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-pin">
          <div class="tl-pin-front">2025</div>
          <div class="tl-pin-back">⚡</div>
        </div>
        <div class="tl-content">
          <h3>Alpha Launch</h3>
          <p>First public beta release with core features</p>
        </div>
      </div>
      <div class="tl-item">
        <div class="tl-pin">
          <div class="tl-pin-front">2026</div>
          <div class="tl-pin-back">🎯</div>
        </div>
        <div class="tl-content">
          <h3>Full Release</h3>
          <p>Enterprise-ready platform launch</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
