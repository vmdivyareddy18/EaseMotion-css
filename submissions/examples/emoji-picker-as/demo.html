<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emoji Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="emoji-pick" role="dialog" aria-label="Emoji picker">
    <input class="ep-search" type="text" placeholder="Search emoji" aria-label="Search emoji" />
    <div class="ep-tabs" role="tablist">
      <button class="is-active" type="button" aria-label="Smileys">😀</button>
      <button type="button" aria-label="Animals">🐶</button>
      <button type="button" aria-label="Food">🍔</button>
      <button type="button" aria-label="Activities">⚽</button>
      <button type="button" aria-label="Travel">✈️</button>
      <button type="button" aria-label="Objects">💡</button>
    </div>
    <div class="ep-cat">Smileys</div>
    <div class="ep-grid">
      <button type="button">😀</button><button type="button">😃</button><button type="button">😄</button><button type="button">😁</button><button type="button">😆</button><button type="button">😅</button><button type="button">😂</button>
      <button type="button">🙂</button><button type="button">🙃</button><button type="button">😉</button><button type="button">😊</button><button type="button">😇</button><button type="button">🥰</button><button type="button">😍</button>
      <button type="button">🤩</button><button type="button">😘</button><button type="button">😗</button><button type="button">😚</button><button type="button">😙</button><button type="button">😋</button><button type="button">😛</button>
      <button type="button">😜</button><button type="button">🤪</button><button type="button">😝</button><button type="button">🤑</button><button type="button">🤗</button><button type="button">🤭</button><button type="button">🤫</button>
    </div>
  </div>
</body>
</html>
