<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Horizontal Scroll Animate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="intro">
        <h1>Ease Horizontal Scroll Animate</h1>
        <p>Scroll down to drive the horizontal animation.</p>
    </section>

    <section class="scroll-section" id="scrollSection">

        <div class="sticky-wrapper">

            <div class="track" id="track">

                <div class="panel">
                    <div class="card">
                        <h2>01</h2>
                        <p>Discovery Phase</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>02</h2>
                        <p>Design Process</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>03</h2>
                        <p>Development</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>04</h2>
                        <p>Testing & QA</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>05</h2>
                        <p>Launch</p>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <section class="outro">
        <h2>End of Animation</h2>
    </section>

    <script>
        const section = document.getElementById("scrollSection");
        const track = document.getElementById("track");
        const cards = document.querySelectorAll(".card");

        function updateAnimation() {

            const rect = section.getBoundingClientRect();

            const maxScroll =
                section.offsetHeight - window.innerHeight;

            let progress =
                (-rect.top / maxScroll);

            progress = Math.max(
                0,
                Math.min(progress, 1)
            );

            const moveDistance =
                track.scrollWidth - window.innerWidth;

            track.style.transform =
                `translateX(-${progress * moveDistance}px)`;

            cards.forEach((card, index) => {

                const cardPosition =
                    (progress * (cards.length - 1));

                const distance =
                    Math.abs(cardPosition - index);

                const intensity =
                    Math.max(0, 1 - distance);

                card.style.opacity =
                    0.4 + intensity * 0.6;

                card.style.transform =
                    `
                    scale(${0.85 + intensity * 0.15})
                    translateY(${20 - intensity * 20}px)
                    `;
            });
        }

        window.addEventListener("scroll", updateAnimation);
        window.addEventListener("resize", updateAnimation);

        updateAnimation();
    </script>

</body>
</html>
