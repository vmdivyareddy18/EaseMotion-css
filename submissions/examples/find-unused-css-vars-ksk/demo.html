<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Variable Detector — EaseMotion CSS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-shell">

    <div class="app-header">
      <h1>🔍 CSS Variable Detector</h1>
      <p>Paste your CSS declarations and usage below. Click Scan to find declared variables that are never used via <code>var(--...)</code>.</p>
    </div>

    <div class="editor-grid">
      <!-- Left: CSS with variable declarations -->
      <div class="editor-panel">
        <label>CSS — Declarations &amp; Usage</label>
        <textarea id="css-input" spellcheck="false">:root {
  --ease-primary: #6c63ff;
  --ease-secondary: #38dbff;
  --ease-accent: #ec4899;
  --ease-shadow-xl: 0 20px 40px rgba(0,0,0,0.4);
  --ease-border-heavy: 3px solid red;
  --ease-gap-sm: 8px;
  --ease-radius: 12px;
}

.ease-card {
  background: var(--ease-primary);
  border-radius: var(--ease-radius);
  gap: var(--ease-gap-sm);
  box-shadow: var(--ease-secondary);
}

.ease-btn {
  color: var(--ease-accent);
}</textarea>
      </div>

      <!-- Right: Additional HTML/CSS reference context -->
      <div class="editor-panel">
        <label>Additional Reference CSS / HTML (optional)</label>
        <textarea id="ref-input" spellcheck="false"><!-- Example: additional files that also use vars -->

.ease-hero {
  color: var(--ease-primary);
}

<div class="ease-card ease-fade-in"></div></textarea>
      </div>
    </div>

    <button class="scan-btn" id="scan-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Scan for Unused Variables
    </button>

    <div class="results-panel" id="results-panel">
      <p class="results-title">Results</p>
      <p class="results-empty" id="results-empty">Press "Scan" to analyse your CSS variables.</p>
    </div>

  </div>

  <script>
    // ── Core Scanner ────────────────────────────────────────────────
    function scan(sources) {
      const combined = sources.join('\n')
        .replace(/\/\*[\s\S]*?\*\//g, '') // strip block comments
        .replace(/\/\/.*/g, '');           // strip line comments

      // Collect declarations: --var-name:
      const declared = new Set();
      for (const m of combined.matchAll(/(?:^|[{;,\s])(--[\w-]+)\s*:/gm)) {
        declared.add(m[1]);
      }

      // Collect references: var(--var-name)
      const referenced = new Set();
      for (const m of combined.matchAll(/var\(\s*(--[\w-]+)/g)) {
        referenced.add(m[1]);
      }

      const unused = [...declared].filter(v => !referenced.has(v)).sort();
      return { declared, referenced, unused };
    }

    // ── Render Results ──────────────────────────────────────────────
    function render({ declared, referenced, unused }) {
      const panel = document.getElementById('results-panel');
      panel.innerHTML = '<p class="results-title">Results</p>';

      // Stats row
      const stats = document.createElement('div');
      stats.className = 'stats-row';
      stats.innerHTML = `
        <span class="stat-badge stat-declared">Declared: ${declared.size}</span>
        <span class="stat-badge stat-referenced">Referenced: ${referenced.size}</span>
        ${unused.length > 0
          ? `<span class="stat-badge stat-unused">Unused: ${unused.length}</span>`
          : `<span class="stat-badge stat-clean">✅ All used</span>`}
      `;
      panel.appendChild(stats);

      if (unused.length === 0) {
        const msg = document.createElement('div');
        msg.className = 'clean-msg';
        msg.innerHTML = '✅ No unused CSS custom properties found!';
        panel.appendChild(msg);
        return;
      }

      const list = document.createElement('div');
      list.className = 'unused-list';
      for (const v of unused) {
        const item = document.createElement('div');
        item.className = 'unused-item';
        item.textContent = v;
        list.appendChild(item);
      }
      panel.appendChild(list);
    }

    // ── Wire button ─────────────────────────────────────────────────
    document.getElementById('scan-btn').addEventListener('click', () => {
      const css = document.getElementById('css-input').value;
      const ref = document.getElementById('ref-input').value;
      render(scan([css, ref]));
    });
  </script>
</body>
</html>
