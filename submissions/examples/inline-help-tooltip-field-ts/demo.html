<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Help Tooltip Form Field</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Form help</p>
      <h1 id="demo-title">Inline help tooltip field</h1>
      <p>A compact form field pattern with contextual help available on hover and keyboard focus.</p>
    </section>
    <section class="demo-stage" aria-label="Inline Help Tooltip Form Field">
      <form class="help-form"><label class="help-field">Workspace slug <span class="help-trigger" tabindex="0">?</span><span class="help-tooltip">Used in your public workspace URL.</span><input type="text" value="northline"></label></form>
    </section>
  </main>
</body>
</html>
