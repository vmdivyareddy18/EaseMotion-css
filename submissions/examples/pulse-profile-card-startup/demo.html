<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Profile Card - Startup</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <article class="profile-card">
      
      <div class="card-header-bg"></div>

      <div class="avatar-wrapper">
        <div class="ease-pulse-avatar">
          <img src="https://i.pravatar.cc/150?img=68" alt="Profile avatar of Alex Rivera" class="avatar-img">
        </div>
        <span class="status-badge" aria-label="Status: Online"></span>
      </div>

      <div class="profile-info">
        <h2 class="profile-name">Alex Rivera</h2>
        <p class="profile-role">Founder & CEO</p>
        <p class="profile-bio">Building tools that empower developers to ship faster. Obsessed with clean code and great UI.</p>
      </div>

      <div class="card-actions">
        <button class="btn btn-secondary">Message</button>
        <button class="btn btn-primary">Follow</button>
      </div>
      
    </article>
  </main>
</body>
</html>
