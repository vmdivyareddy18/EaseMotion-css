<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Pop Toggle Switch - Cyberpunk Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0d0e15; /* Deep Cyberpunk Dark */
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
      font-family: 'Courier New', Courier, monospace;
      color: #e0e6ed;
    }

    .demo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      padding: 40px;
      border: 1px solid rgba(0, 255, 255, 0.1);
      background: rgba(13, 14, 21, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: inset 0 0 20px rgba(255, 0, 255, 0.05);
      position: relative;
    }

    .demo-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px;
      width: 20px; height: 20px;
      border-top: 2px solid #0ff;
      border-left: 2px solid #0ff;
    }

    .demo-container::after {
      content: '';
      position: absolute;
      bottom: -1px; right: -1px;
      width: 20px; height: 20px;
      border-bottom: 2px solid #f0f;
      border-right: 2px solid #f0f;
    }

    .demo-title {
      text-transform: uppercase;
      letter-spacing: 4px;
      font-weight: bold;
      color: #0ff;
      text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
      margin: 0;
    }
    
    .demo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 300px;
      padding-bottom: 20px;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
    
    .demo-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .demo-label {
      font-size: 14px;
      letter-spacing: 1px;
      color: #a0aab5;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h1 class="demo-title">System_Config</h1>

    <!-- Toggle Row 1: Overdrive -->
    <div class="demo-row">
      <span class="demo-label">SYS.OVERDRIVE</span>
      
      <!-- The Shadow Pop Toggle Switch -->
      <label class="ease-shadow-pop-toggle">
        <input type="checkbox" class="ease-toggle-input">
        <div class="ease-toggle-track">
          <div class="ease-toggle-thumb"></div>
        </div>
      </label>
      
    </div>

    <!-- Toggle Row 2: Stealth -->
    <div class="demo-row">
      <span class="demo-label">NET.STEALTH_MODE</span>
      
      <label class="ease-shadow-pop-toggle">
        <input type="checkbox" class="ease-toggle-input" checked>
        <div class="ease-toggle-track ease-accent-magenta">
          <div class="ease-toggle-thumb"></div>
        </div>
      </label>
      
    </div>

    <!-- Toggle Row 3: Neural Link -->
    <div class="demo-row">
      <span class="demo-label">BIO.NEURAL_LINK</span>
      
      <label class="ease-shadow-pop-toggle">
        <input type="checkbox" class="ease-toggle-input">
        <div class="ease-toggle-track ease-accent-yellow">
          <div class="ease-toggle-thumb"></div>
        </div>
      </label>
      
    </div>

  </div>

</body>
</html>
