<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zoom-pan</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zoom &amp; Pan</h1>
    <div class="animation-wrapper">
      <div class="viewport">
        <div class="pan-content">
          <div class="pan-grid">
            <div class="grid-cell">A</div>
            <div class="grid-cell">B</div>
            <div class="grid-cell">C</div>
            <div class="grid-cell">D</div>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <label>
        Zoom Scale
        <input type="range" class="js-range" min="1" max="3" step="0.1" value="1.5" data-var="--zoom-scale" />
        <span class="js-range-value">1.5</span>
      </label>
      <label>
        Pan Duration
        <input type="range" class="js-range" min="1" max="10" step="0.5" value="4" data-var="--pan-duration" />
        <span class="js-range-value">4s</span>
      </label>
      <label>
        Content Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--img-color" />
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        const val = el.dataset.var === '--zoom-scale' ? el.value : el.value + 's';
        document.documentElement.style.setProperty(el.dataset.var, val);
        if (display) display.textContent = val;
      });
    });
  </script>
</body>
</html>
