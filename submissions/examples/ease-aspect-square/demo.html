<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-aspect-square – 1:1 Aspect Ratio Utility</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-100 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      ease-aspect-square
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      Utility class that locks elements into a perfect 1:1 square.
    </p>

    <!-- Grid of square cards -->
    <div class="ease-grid ease-grid-cols-2 ease-md-grid-cols-4 ease-gap-6">
      <!-- Square with image -->
      <div class="ease-aspect-square ease-card ease-overflow-hidden ease-hover-shadow-lg ease-transition">
        <img src="https://placehold.co/300x300" alt="Avatar" class="ease-w-full ease-h-full ease-object-cover">
      </div>
      <!-- Square with color -->
      <div class="ease-aspect-square ease-bg-blue-500 ease-flex ease-items-center ease-justify-center ease-text-white ease-font-bold ease-text-2xl">
        A
      </div>
      <!-- Square with icon -->
      <div class="ease-aspect-square ease-card ease-flex ease-items-center ease-justify-center ease-hover-shadow-lg ease-transition">
        <span class="ease-text-4xl">⭐</span>
      </div>
      <!-- Square with text content -->
      <div class="ease-aspect-square ease-card ease-flex ease-flex-col ease-items-center ease-justify-center ease-p-2 ease-text-center ease-hover-shadow-lg ease-transition">
        <span class="ease-text-2xl ease-font-bold">1:1</span>
        <span class="ease-text-xs ease-text-gray-500">Square</span>
      </div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Avatars, thumbnails, icon containers — always perfectly square.
    </p>
  </div>

</body>
</html>
