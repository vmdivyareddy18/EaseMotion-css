<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dice</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="dice-set">
    <div class="die" aria-label="Die showing 5">
      <span class="pip a"></span><span class="pip c"></span>
      <span class="pip e"></span>
      <span class="pip g"></span><span class="pip i"></span>
    </div>

    <div class="die" aria-label="Die showing 3">
      <span class="pip a"></span>
      <span class="pip e"></span>
      <span class="pip i"></span>
    </div>

    <div class="die" aria-label="Die showing 6">
      <span class="pip a"></span><span class="pip c"></span>
      <span class="pip d"></span><span class="pip f"></span>
      <span class="pip g"></span><span class="pip i"></span>
    </div>

    <div class="die" aria-label="Die showing 2">
      <span class="pip a"></span>
      <span class="pip i"></span>
    </div>

    <div class="die" aria-label="Die showing 4">
      <span class="pip a"></span><span class="pip c"></span>
      <span class="pip g"></span><span class="pip i"></span>
    </div>
  </div>
</body>
</html>
