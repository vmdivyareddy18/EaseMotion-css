<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat Conversation UI</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="chat-container">

    <div class="chat-header">
      <div>
        <h2>AI Assistant</h2>
        <span class="status">● Online</span>
      </div>
    </div>

    <div class="chat-body">

      <div class="message ai">
        <div class="avatar">AI</div>
        <div class="message-content">
          <div class="bubble">
            Hello! How can I help you today?
          </div>
          <span class="time">10:00 AM</span>
        </div>
      </div>

      <div class="message user">
        <div class="message-content">
          <div class="bubble">
            Explain CSS Container Queries in simple terms.
          </div>
          <span class="time">10:01 AM</span>
        </div>
        <div class="avatar">U</div>
      </div>

      <div class="message ai">
        <div class="avatar">AI</div>
        <div class="message-content">
          <div class="bubble">
            Container Queries allow a component to adapt based on the size of its parent container rather than the
            entire screen size.
          </div>
          <span class="time">10:01 AM</span>
        </div>
      </div>

      <div class="message ai">
        <div class="avatar">AI</div>

        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>

    </div>

    <div class="chat-input">

      <input type="text" placeholder="Ask something...">

      <button>Send</button>

    </div>

  </div>

</body>

</html>
