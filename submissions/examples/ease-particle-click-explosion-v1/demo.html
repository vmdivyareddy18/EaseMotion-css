<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Particle Explosion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Click Explosion 💥</h1>
  <p class="ease-slide-up">Click anywhere to trigger particles</p>
</section>

<script>
document.addEventListener("click", (e) => {
  createExplosion(e.clientX, e.clientY);
});

function createExplosion(x, y) {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement("div");
    p.classList.add("particle");

    // random direction
    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 80;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    p.style.setProperty("--x", dx + "px");
    p.style.setProperty("--y", dy + "px");

    // position
    p.style.left = x + "px";
    p.style.top = y + "px";

    // random color
    const colors = ["#22c55e","#3b82f6","#ec4899","#facc15"];
    p.style.background = colors[Math.floor(Math.random() * colors.length)];

    document.body.appendChild(p);

    setTimeout(() => p.remove(), 700);
  }
}
</script>

</body>
</html>
