<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Neon Glow Tooltip — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="sandbox-container">
    <div class="brand-header">
      <span class="badge">EASEMOTION INTERACTIVE</span>
      <h1>Dynamic Neon Glow Tooltip</h1>
      <p>Zero-JS interactive micro-monitors with multi-layered responsive neon glow transition mechanics.</p>
    </div>

    <div class="interactive-grid">
      
      <button class="tooltip-trigger" data-tooltip="CORE ENGINE // ACTIVE (98.4% CAP)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-pulse"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
        Initialize Matrix
      </button>
      
      <div class="tooltip-trigger cyan-variant input-field-wrapper" data-tooltip="SECURE TUNNEL // PACKET TRANSIT ENCRYPTED">
        <input type="text" value="TUNNEL_NODE_89X" readonly aria-label="Cryptographic Node ID">
      </div>

      <button class="tooltip-trigger toxic-variant">
        <span class="tooltip-content">OVERHEAT // DEGRADATION CRITICAL 94°C</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Thermal State
      </button>

    </div>
  </main>

</body>
</html>
