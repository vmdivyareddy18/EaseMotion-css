<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Ring - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="fcr-hdr"><h1>Custom Focus Rings</h1><p>CSS :focus-visible custom ring patterns for accessible and stylish focus indicators</p></header>
<section class="fcr-sec"><h2>Solid Rings</h2>
<div class="fcr-row"><button class="fcr-btn fcr-solid">Solid</button><button class="fcr-btn fcr-solid-wide">Solid Wide</button><button class="fcr-btn fcr-solid-inner">Inner</button></div></section>
<section class="fcr-sec"><h2>Dashed & Dotted</h2>
<div class="fcr-row"><button class="fcr-btn fcr-dashed">Dashed</button><button class="fcr-btn fcr-dotted">Dotted</button><button class="fcr-btn fcr-double">Double</button></div></section>
<section class="fcr-sec"><h2>Glow Rings</h2>
<div class="fcr-row"><button class="fcr-btn fcr-glow">Glow</button><button class="fcr-btn fcr-glow-lg">Glow Large</button><button class="fcr-btn fcr-neon">Neon</button></div></section>
<section class="fcr-sec"><h2>Underline & Offset</h2>
<div class="fcr-row"><button class="fcr-btn fcr-underline">Underline</button><button class="fcr-btn fcr-offset">Offset</button><button class="fcr-btn fcr-bottom-bar">Bottom Bar</button></div></section>
<section class="fcr-sec"><h2>Form Elements</h2>
<div class="fcr-form"><label class="fcr-field"><span>Text Input</span><input type="text" class="fcr-inp fcr-glow" placeholder="Focus me"></label>
<label class="fcr-field"><span>Textarea</span><textarea class="fcr-inp fcr-glow" rows="2" placeholder="Focus me"></textarea></label>
<label class="fcr-chk"><input type="checkbox" class="fcr-cb fcr-glow"> Remember me</label></div></section>
<section class="fcr-sec"><h2>Link Focus</h2>
<div class="fcr-row"><a href="#" class="fcr-link fcr-dashed">Dashed Link</a><a href="#" class="fcr-link fcr-glow">Glow Link</a><a href="#" class="fcr-link fcr-underline">Underline Link</a></div></section>
<footer class="ftr"><p>EaseMotion - Focus Ring | GSSoC 2026</p></footer>
</body>
</html>
