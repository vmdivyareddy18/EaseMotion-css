<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Input Field UI Example</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <h1>Animated Input Field UI Example</h1>
      <p>Floating labels, focus animations, and variant styling for modern form inputs.</p>
    </header>

    <section class="form-grid">
      <div class="animated-input">
        <input id="name" type="text" placeholder=" " autocomplete="name" />
        <label for="name">Full Name</label>
      </div>

      <div class="animated-input animated-input--accent">
        <input id="email" type="email" placeholder=" " autocomplete="email" />
        <label for="email">Email Address</label>
      </div>

      <div class="animated-input animated-input--icon">
        <input id="search" type="search" placeholder=" " autocomplete="off" />
        <label for="search">Search query</label>
        <span class="animated-input__icon">🔍</span>
      </div>

      <div class="animated-input animated-input--soft">
        <input id="password" type="password" placeholder=" " autocomplete="current-password" />
        <label for="password">Password</label>
      </div>
    </section>
  </main>
</body>
</html>
