<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <title>Fullscreen Gallery View</title>
</head>
<body>
  <h1>Fullscreen Gallery View</h1>
  <div class="gallery-grid" id="galleryGrid">
    <div class="gallery-item" data-index="0"><img src="https://picsum.photos/id/1015/400/300" alt="Mountain valley" loading="lazy"></div>
    <div class="gallery-item" data-index="1"><img src="https://picsum.photos/id/1016/400/300" alt="Winding road" loading="lazy"></div>
    <div class="gallery-item" data-index="2"><img src="https://picsum.photos/id/1018/400/300" alt="Mountain peak" loading="lazy"></div>
    <div class="gallery-item" data-index="3"><img src="https://picsum.photos/id/1020/400/300" alt="Black dog" loading="lazy"></div>
    <div class="gallery-item" data-index="4"><img src="https://picsum.photos/id/1024/400/300" alt="Bird on branch" loading="lazy"></div>
    <div class="gallery-item" data-index="5"><img src="https://picsum.photos/id/1035/400/300" alt="Nature stream" loading="lazy"></div>
  </div>
  <div class="gallery-overlay" id="overlay">
    <button class="gallery-close" id="closeBtn" aria-label="Close">&times;</button>
    <div class="gallery-full-container">
      <img class="gallery-full-image" id="fullImage" alt="">
      <p class="gallery-caption" id="caption"></p>
    </div>
  </div>
  <script>
    const grid = document.getElementById('galleryGrid');
    const overlay = document.getElementById('overlay');
    const fullImage = document.getElementById('fullImage');
    const caption = document.getElementById('caption');
    const closeBtn = document.getElementById('closeBtn');
    const items = document.querySelectorAll('.gallery-item img');

    const captions = [
      'Mountain Valley', 'Winding Road', 'Mountain Peak',
      'Black Dog', 'Bird on Branch', 'Nature Stream'
    ];

    let isOpen = false;

    items.forEach((img, i) => {
      img.parentElement.addEventListener('click', () => openFullscreen(i));
    });

    function openFullscreen(index) {
      if (isOpen) return;
      isOpen = true;
      const thumb = items[index];
      const rect = thumb.getBoundingClientRect();
      const src = thumb.src;
      const alt = thumb.alt;

      fullImage.src = src;
      fullImage.alt = alt;
      caption.textContent = captions[index];

      overlay.classList.add('active');
      fullImage.classList.add('animating');

      const imgW = rect.width;
      const imgH = rect.height;
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const scaleX = imgW / vw;
      const scaleY = imgH / vh;
      const translateX = (rect.left + rect.width / 2) - vw / 2;
      const translateY = (rect.top + rect.height / 2) - vh / 2;

      fullImage.style.setProperty('--tx', `${translateX}px`);
      fullImage.style.setProperty('--ty', `${translateY}px`);
      fullImage.style.setProperty('--sx', scaleX);
      fullImage.style.setProperty('--sy', scaleY);

      requestAnimationFrame(() => {
        fullImage.style.transform = 'translate(-50%, -50%) scale(1)';
      });
    }

    function closeFullscreen() {
      if (!isOpen) return;
      isOpen = false;
      overlay.classList.remove('active');
      fullImage.classList.remove('animating');
      fullImage.style.transform = '';
      fullImage.src = '';
    }

    closeBtn.addEventListener('click', closeFullscreen);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeFullscreen();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeFullscreen();
    });
  </script>
</body>
</html>
