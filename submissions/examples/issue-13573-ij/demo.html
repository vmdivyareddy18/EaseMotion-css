</head>
<body>

      </div>
      <div class="zoom-container z-2">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;">Zoom 2</div>
        <div class="label">Ocean Sunset</div>
      </div>
      <div class="zoom-container z-3">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;">Zoom 3</div>
        <div class="label">Forest Trail</div>
      </div>
      <div class="zoom-container z-4">
        <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:600;">Zoom 4</div>
        <div class="label">City Lights</div>
      </div>
    </div>
  </div>
