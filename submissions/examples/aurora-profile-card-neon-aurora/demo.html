<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Profile Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="aurora-stage">
    <div class="aurora-profile-card">
      <!-- Ambient Aurora Background Glow Tracks -->
      <div class="aurora-glow-mesh"></div>
      
      <div class="card-inner-content">
        <div class="avatar-glow-ring">
          <div class="profile-avatar-node">✨</div>
        </div>
        
        <div class="profile-bio-text">
          <h3>Aura Lens Developer</h3>
          <p>AI Software Architecture Node</p>
        </div>

        <div class="profile-badge-row">
          <span class="neon-tag">PYTHON</span>
          <span class="neon-tag">MONGODB</span>
          <span class="neon-tag">TYPESCRIPT</span>
        </div>
      </div>
    </div>
  </main>

</body>
</html>
