<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Answer Reveal Flip Component - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Demo presentation layout staging */
    body {
      margin: 0;
      height: 100vh;
      background: #090d16;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 16px;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .demo-hint {
      color: #64748b;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <span class="demo-hint">Hover or Press Tab + Space to Flip</span>

  <div class="ease-flip-container">
    <div class="ease-flip-card" tabindex="0" role="button" aria-live="polite" aria-label="Flashcard: Click or focus to reveal answer. Question: What is the primary benefit of CSS hardware acceleration?">
      
      <div class="card-face card-front">
        <span class="face-badge">Question</span>
        <p class="card-text">What is the primary benefit of CSS hardware acceleration?</p>
        <span class="action-prompt">Reveal Answer</span>
      </div>

      <div class="card-face card-back" aria-hidden="true">
        <span class="face-badge">Answer</span>
        <p class="card-text">It offloads layout transformations directly to the GPU, avoiding expensive browser reflows and locking animations at a fluid 60fps.</p>
        <span class="action-prompt">Hide Answer</span>
      </div>

    </div>
  </div>

</body>
</html>
