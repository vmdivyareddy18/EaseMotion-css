<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Digital Clock - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="clock-wrapper">

    <div class="clock-card">
      <div class="clock-time" id="clockDisplay">00:00:00</div>
      <div class="clock-ampm" id="ampmDisplay">AM</div>
      <div class="clock-date" id="dateDisplay">January 1, 2026</div>
    </div>

    <div class="clock-controls">
      <button class="ctrl-btn active" id="mode12">12h</button>
      <button class="ctrl-btn" id="mode24">24h</button>
    </div>

  </div>

  <script>
    const clockEl = document.getElementById('clockDisplay');
    const ampmEl = document.getElementById('ampmDisplay');
    const dateEl = document.getElementById('dateDisplay');
    const mode12 = document.getElementById('mode12');
    const mode24 = document.getElementById('mode24');

    let is12h = true;

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();

      const ampm = h >= 12 ? 'PM' : 'AM';

      if (is12h) {
        const h12 = h % 12 || 12;
        clockEl.textContent = pad(h12) + ':' + pad(m) + ':' + pad(s);
        ampmEl.textContent = ampm;
        ampmEl.style.display = 'block';
      } else {
        clockEl.textContent = pad(h) + ':' + pad(m) + ':' + pad(s);
        ampmEl.style.display = 'none';
      }

      const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      dateEl.textContent = now.toLocaleDateString('en-US', opts);
    }

    mode12.addEventListener('click', () => {
      is12h = true;
      mode12.classList.add('active');
      mode24.classList.remove('active');
      updateClock();
    });

    mode24.addEventListener('click', () => {
      is12h = false;
      mode24.classList.add('active');
      mode12.classList.remove('active');
      updateClock();
    });

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
