<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-commerce Card - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="ec-header"><h1>CSS E-commerce Card</h1><p>Product card with image, title, price, rating, badge, and add-to-cart button</p></header>
<section class="ec-section"><h2>Product Grid</h2><div class="ec-grid"><div class="ec-card"><div class="ec-badge ec-badge-sale">Sale</div><div class="ec-image"><div class="ec-img-placeholder"><span class="ec-img-icon">📱</span></div></div><div class="ec-body"><div class="ec-category">Electronics</div><h3 class="ec-title">Wireless Headphones</h3><div class="ec-rating"><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star">★</span><span class="ec-review-count">(128)</span></div><div class="ec-price"><span class="ec-current">$79.99</span><span class="ec-original">$129.99</span></div><button class="ec-btn">Add to Cart</button></div></div><div class="ec-card ec-featured"><div class="ec-badge ec-badge-featured">Featured</div><div class="ec-image"><div class="ec-img-placeholder"><span class="ec-img-icon">🎨</span></div></div><div class="ec-body"><div class="ec-category">Art</div><h3 class="ec-title">Canvas Print Set</h3><div class="ec-rating"><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-review-count">(256)</span></div><div class="ec-price"><span class="ec-current">$44.99</span></div><button class="ec-btn">Add to Cart</button></div></div><div class="ec-card"><div class="ec-badge ec-badge-new">New</div><div class="ec-image"><div class="ec-img-placeholder"><span class="ec-img-icon">👗</span></div></div><div class="ec-body"><div class="ec-category">Fashion</div><h3 class="ec-title">Leather Jacket</h3><div class="ec-rating"><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star ec-star-filled">★</span><span class="ec-star">★</span><span class="ec-review-count">(64)</span></div><div class="ec-price"><span class="ec-current">$199.99</span></div><button class="ec-btn">Add to Cart</button></div></div></div></section>
</body>
</html>
