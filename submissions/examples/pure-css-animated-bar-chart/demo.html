<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Bar Chart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chart">
        <div class="bar" style="--target-height: 40%;"><span>40%</span></div>
        <div class="bar" style="--target-height: 80%;"><span>80%</span></div>
        <div class="bar" style="--target-height: 60%;"><span>60%</span></div>
        <div class="bar" style="--target-height: 100%;"><span>100%</span></div>
    </div>
</body>
</html>
