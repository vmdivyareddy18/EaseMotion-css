<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avatar Status Swing</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion avatar</p>
    <h1 id="demo-title">Avatar status swing</h1>
    <p class="intro">A profile avatar where the online badge swings gently when the card is focused.</p>

    <article class="avatar-card" tabindex="0">
      <span class="avatar">AK</span>
      <span class="status" aria-label="Online"></span>
      <strong>Active reviewer</strong>
    </article>
  </main>
</body>
</html>
