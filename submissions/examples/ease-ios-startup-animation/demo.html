<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Startup Animation · Pure CSS</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,200;14..32,300;14..32,400;14..32,600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="ios-boot">
    <!-- Boot Screen -->
    <div class="boot-screen">
      <!-- Apple Logo (Pure CSS) -->
      <div class="apple-logo">
        <div class="apple">
          <div class="apple-body"></div>
          <div class="apple-leaf"></div>
          <div class="apple-bite"></div>
        </div>
      </div>

      <!-- OS Name -->
      <h1 class="os-title">iOS</h1>
      <p class="os-version">Version 17.2.1</p>

      <!-- Loading Bar -->
      <div class="loading-container">
        <div class="progress-bar-wrapper">
          <div class="progress-bar"></div>
        </div>
        <span class="loading-percent">0%</span>
      </div>

      <!-- Status Text -->
      <div class="status-text">
        <p class="status-message">Loading...</p>
      </div>

      <!-- Footer -->
      <div class="boot-footer">
        <div class="footer-line"></div>
        <div class="footer-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
