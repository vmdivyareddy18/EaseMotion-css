<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ease Animated 404 Error Page</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-404">
    <div class="ease-404__particles">
      <div class="ease-404__particle"></div>
      <div class="ease-404__particle"></div>
      <div class="ease-404__particle"></div>
      <div class="ease-404__particle"></div>
      <div class="ease-404__particle"></div>
    </div>
    <div class="ease-404__content">
      <div class="ease-404__astronaut">🧑‍🚀</div>
      <div class="ease-404__number">
        <span class="ease-404__digit ease-glitch" data-text="4">4</span>
        <span class="ease-404__digit ease-glitch ease-404__zero" data-text="0">0</span>
        <span class="ease-404__digit ease-glitch" data-text="4">4</span>
      </div>
      <h2 class="ease-404__title">Houston, we have a problem!</h2>
      <p class="ease-404__subtitle">
        The page you're looking for has drifted into deep space.
      </p>
      <a href="/" class="ease-404__btn">
        🚀 Return to Earth
      </a>
    </div>
  </div>

</body>
</html>
