<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-img-responsive Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { margin: 0; font-family: sans-serif; padding: 2rem; }
    .container { width: 300px; border: 2px dashed #6366f1; padding: 1rem; }
  </style>
</head>
<body>
  <h2>ease-img-responsive</h2>
  <p>Image scales with its container — resize the browser to see it in action.</p>
  <div class="container">
    <img
      class="ease-img-responsive"
      src="https://picsum.photos/800/400"
      alt="Responsive image demo"
    />
  </div>
</body>
</html>
