<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Tooltip Motion - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 CSS Tooltip Motion</h1>
            <p>Beautiful animated tooltips - Pure CSS, No JavaScript!</p>
        </header>

        <!-- Basic Tooltips -->
        <section class="section">
            <h2>Basic Tooltips</h2>
            <div class="demo-area">
                <button class="btn tooltip" data-tooltip="Hello! I'm a tooltip">
                    Hover Me (Top)
                </button>
                <button class="btn tooltip-bottom" data-tooltip="Tooltip from bottom">
                    Hover Me (Bottom)
                </button>
                <button class="btn tooltip-left" data-tooltip="Tooltip from left">
                    Hover Me (Left)
                </button>
                <button class="btn tooltip-right" data-tooltip="Tooltip from right">
                    Hover Me (Right)
                </button>
            </div>
        </section>

        <!-- Animated Tooltips -->
        <section class="section">
            <h2>Animated Tooltips</h2>
            <div class="demo-area">
                <button class="btn tooltip-fade" data-tooltip="Fade In Effect">
                    Fade In
                </button>
                <button class="btn tooltip-scale" data-tooltip="Scale Up Effect">
                    Scale Up
                </button>
                <button class="btn tooltip-slide" data-tooltip="Slide In Effect">
                    Slide In
                </button>
                <button class="btn tooltip-bounce" data-tooltip="Bounce Effect">
                    Bounce
                </button>
            </div>
        </section>

        <!-- Styled Tooltips -->
        <section class="section">
            <h2>Styled Tooltips</h2>
            <div class="demo-area">
                <button class="btn tooltip-neon" data-tooltip="✨ Neon Glow">
                    Neon Glow
                </button>
                <button class="btn tooltip-gradient" data-tooltip="🌈 Gradient Style">
                    Gradient
                </button>
                <button class="btn tooltip-rounded" data-tooltip="💊 Rounded Pill">
                    Rounded
                </button>
                <button class="btn tooltip-arrow" data-tooltip="🎯 Custom Arrow">
                    Custom Arrow
                </button>
            </div>
        </section>

        <!-- Multi-line Tooltips -->
        <section class="section">
            <h2>Multi-line Tooltips</h2>
            <div class="demo-area">
                <button class="btn tooltip-wide" data-tooltip="This is a longer tooltip that spans multiple lines for more detailed information">
                    Wide Tooltip
                </button>
                <button class="btn tooltip-multiline" data-tooltip="Line 1: First info&#10;Line 2: Second info&#10;Line 3: Third info">
                    Multi-line
                </button>
            </div>
        </section>
    </div>
</body>
</html>
