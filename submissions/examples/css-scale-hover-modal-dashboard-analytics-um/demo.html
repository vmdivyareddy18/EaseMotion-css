<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Analytics Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="dash-modal-toggle" class="ease-dash-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Widget (Dashboard Summary Card) -->
  <label for="dash-modal-toggle" class="ease-dash-trigger-widget-um" tabindex="0">
    <div class="ease-dash-widget-title-um">Total Revenue</div>
    <div class="ease-dash-widget-value-um">$124,563.00</div>
    <div class="ease-dash-widget-trend-um">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
        <polyline points="17 6 23 6 23 12"></polyline>
      </svg>
      +14.5% vs last month
    </div>
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-dash-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="dash-modal-toggle" class="ease-dash-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-dash-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Header -->
      <div class="ease-dash-header-um">
        <div>
          <h2 id="modal-title" class="ease-dash-title-um">Revenue Breakdown</h2>
          <div class="ease-dash-subtitle-um">Detailed analytics for Q3 2026</div>
        </div>
        <label for="dash-modal-toggle" class="ease-dash-close-icon-um" aria-label="Close Modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </label>
      </div>

      <!-- Body (Metrics Grid) -->
      <div class="ease-dash-body-um">
        <div class="ease-dash-metric-card-um">
          <div class="ease-dash-metric-label-um">Subscriptions</div>
          <div class="ease-dash-metric-val-um" style="color: #60a5fa;">$84k</div>
        </div>
        <div class="ease-dash-metric-card-um">
          <div class="ease-dash-metric-label-um">One-Time Sales</div>
          <div class="ease-dash-metric-val-um" style="color: #34d399;">$32k</div>
        </div>
        <div class="ease-dash-metric-card-um">
          <div class="ease-dash-metric-label-um">Services</div>
          <div class="ease-dash-metric-val-um" style="color: #a78bfa;">$8.5k</div>
        </div>
      </div>
      
      <!-- Footer Actions -->
      <div class="ease-dash-footer-um">
        <label for="dash-modal-toggle" class="ease-dash-btn-um">
          Close
        </label>
        <label for="dash-modal-toggle" class="ease-dash-btn-um ease-dash-btn-primary-um">
          Export CSV
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
