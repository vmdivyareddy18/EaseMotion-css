<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Box Sizing Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item box-border">.box-border</div>
  <div class="demo-item box-content">.box-content</div>
  <div class="demo-item box-sizing-border">.box-sizing-border</div>
  <div class="demo-item box-sizing-content">.box-sizing-content</div>
  <div class="demo-item box-sizing-padding">.box-sizing-padding</div>
  <div class="demo-item box-border-box">.box-border-box</div>
</body>
</html>
