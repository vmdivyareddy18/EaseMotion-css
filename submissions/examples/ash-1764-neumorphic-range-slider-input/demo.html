<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphic Range Slider Input</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="slider-card">

        <h1>Neumorphic Range Slider</h1>

        <p>
            Adjust the intensity level using a modern
            neumorphic slider interface.
        </p>

        <div class="slider-display">

            <span class="value-label">
                Value
            </span>

            <span class="value-badge">
                75%
            </span>

        </div>

        <input
            type="range"
            min="0"
            max="100"
            value="75"
            class="neumorphic-slider"
        >

        <div class="slider-scale">

            <span>0</span>
            <span>25</span>
            <span>50</span>
            <span>75</span>
            <span>100</span>

        </div>

    </div>

    <div class="slider-card secondary">

        <h2>Volume Control</h2>

        <input
            type="range"
            min="0"
            max="100"
            value="45"
            class="neumorphic-slider"
        >

        <div class="volume-value">
            45%
        </div>

    </div>

</div>

</body>
</html>
