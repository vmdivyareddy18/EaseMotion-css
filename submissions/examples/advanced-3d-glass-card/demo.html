<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Interactive Glassmorphism Card</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="space-canvas">
        <div class="ambient-glow-1"></div>
        <div class="ambient-glow-2"></div>

        <div class="card-container">
            <div class="glass-card">
                <div class="card-glare"></div>
                
                <div class="card-header">
                    <span class="chip-icon"></span>
                    <span class="card-type">NEXUS_PASS</span>
                </div>

                <div class="card-body">
                    <span class="card-number">4096 0256 1024 0088</span>
                </div>

                <div class="card-footer">
                    <div class="meta-block">
                        <span class="meta-label">HOLDER</span>
                        <span class="meta-value">CORE OPERATOR</span>
                    </div>
                    <div class="meta-block">
                        <span class="meta-label">EXPIRES</span>
                        <span class="meta-value">07 / 32</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
