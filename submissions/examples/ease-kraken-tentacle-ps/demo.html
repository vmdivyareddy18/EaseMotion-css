<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ease Kraken Tentacle Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(to bottom, #0f172a, #020617);
      font-family: sans-serif;
      margin: 0;
      padding: 2rem;
      overflow: hidden;
    }
    
    .demo-tentacle {
      font-size: 6rem;
      cursor: pointer;
      display: inline-block;
      filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
    }
    
    .instruction {
      color: #38bdf8;
      font-size: 1.25rem;
      font-weight: bold;
      margin-bottom: 4rem;
    }
  </style>
</head>
<body>
  
  <p class="instruction">Hover to release the Kraken!</p>

  <div class="ease-kraken-tentacle-hover-ps demo-tentacle">
    🦑
  </div>

</body>
</html>
