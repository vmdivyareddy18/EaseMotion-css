<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mac-Style Dock — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="component-card">
    <h2 class="card-title">Mac-Style Dock</h2>
    <p class="card-desc">Hover over dock icons to see the magnification effect.</p>
    <div class="dock">
      <div class="dock-item" data-icon="finder">
        <span class="dock-icon"></span>
        <span class="dock-label">Finder</span>
      </div>
      <div class="dock-item" data-icon="launchpad">
        <span class="dock-icon"></span>
        <span class="dock-label">Launchpad</span>
      </div>
      <div class="dock-item" data-icon="safari">
        <span class="dock-icon"></span>
        <span class="dock-label">Safari</span>
      </div>
      <div class="dock-item" data-icon="messages">
        <span class="dock-icon"></span>
        <span class="dock-label">Messages</span>
      </div>
      <div class="dock-item" data-icon="settings">
        <span class="dock-icon"></span>
        <span class="dock-label">Settings</span>
      </div>
      <div class="dock-item" data-icon="trash">
        <span class="dock-icon"></span>
        <span class="dock-label">Trash</span>
      </div>
    </div>
    <div class="vars-panel">
      <label>--dock-bg <input type="color" value="#2c2c2e" data-var="--dock-bg"></label>
      <label>--icon-size <input type="range" min="32" max="80" value="48" data-var="--icon-size"> <span class="val">48px</span></label>
      <label>--magnify-scale <input type="range" min="1.2" max="2.5" step="0.1" value="1.8" data-var="--magnify-scale"> <span class="val">1.8</span></label>
      <label>--hover-duration <input type="range" min="0.1" max="1" step="0.05" value="0.3" data-var="--hover-duration"> <span class="val">0.3s</span></label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.vars-panel input[data-var]').forEach(el => {
      el.addEventListener('input', () => {
        const val = el.type === 'color' ? el.value : el.value + (el.dataset.var === '--hover-duration' ? 's' : (el.dataset.var === '--magnify-scale' ? '' : 'px'));
        document.querySelector('.dock').style.setProperty(el.dataset.var, val);
        if (el.type === 'range') el.nextElementSibling.textContent = val;
      });
    });
  </script>
</body>
</html>
