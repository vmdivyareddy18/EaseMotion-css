<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-progress — Animated Progress Bar Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Demo page layout — not part of the component */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: #0f172a; color: #e2e8f0;
      padding: 2rem; line-height: 1.6;
    }
    h1 {
      text-align: center; font-size: 1.75rem; margin-bottom: .25rem;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { text-align: center; color: #94a3b8; font-size: .875rem; margin-bottom: 2.5rem; }
    .section { max-width: 640px; margin: 0 auto 2rem; }
    .section h2 {
      font-size: .875rem; text-transform: uppercase;
      letter-spacing: .08em; color: #94a3b8; margin-bottom: .75rem;
    }
    .row { margin-bottom: 1rem; }
    .label { display: block; font-size: .75rem; color: #64748b; margin-bottom: .25rem; }
    .controls { text-align: center; margin-top: 2rem; }
    .controls button {
      padding: .5rem 1.25rem; border: none; border-radius: .5rem;
      font-size: .875rem; font-weight: 600; cursor: pointer;
      color: #fff; background: #6c63ff; margin: .25rem;
      transition: background 200ms ease;
    }
    .controls button:hover { background: #4b44cc; }
    .controls button:active { transform: scale(.97); }
    .controls button.reset { background: #475569; }
    .controls button.reset:hover { background: #334155; }
  </style>
</head>
<body>

  <h1>ease-progress</h1>
  <p class="subtitle">Animated Progress Bar Component for EaseMotion CSS</p>

  <!-- Default -->
  <div class="section">
    <h2>Default</h2>
    <div class="row">
      <span class="label">50 %</span>
      <div class="ease-progress">
        <div class="ease-progress-bar" style="--ease-progress-value: 50"></div>
      </div>
    </div>
  </div>

  <!-- Sizes -->
  <div class="section">
    <h2>Sizes</h2>
    <div class="row">
      <span class="label">Small — 30 %</span>
      <div class="ease-progress ease-progress-sm">
        <div class="ease-progress-bar" style="--ease-progress-value: 30"></div>
      </div>
    </div>
    <div class="row">
      <span class="label">Large with label — 65 %</span>
      <div class="ease-progress ease-progress-lg">
        <div class="ease-progress-bar" style="--ease-progress-value: 65">
          <span class="ease-progress-label">65 %</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Color variants -->
  <div class="section">
    <h2>Color Variants</h2>
    <div class="row">
      <span class="label">Success — 80 %</span>
      <div class="ease-progress ease-progress-success">
        <div class="ease-progress-bar" style="--ease-progress-value: 80"></div>
      </div>
    </div>
    <div class="row">
      <span class="label">Warning — 55 %</span>
      <div class="ease-progress ease-progress-warning">
        <div class="ease-progress-bar" style="--ease-progress-value: 55"></div>
      </div>
    </div>
    <div class="row">
      <span class="label">Danger — 25 %</span>
      <div class="ease-progress ease-progress-danger">
        <div class="ease-progress-bar" style="--ease-progress-value: 25"></div>
      </div>
    </div>
  </div>

  <!-- Striped & animated -->
  <div class="section">
    <h2>Striped &amp; Animated</h2>
    <div class="row">
      <span class="label">Striped — 60 %</span>
      <div class="ease-progress ease-progress-striped">
        <div class="ease-progress-bar" style="--ease-progress-value: 60"></div>
      </div>
    </div>
    <div class="row">
      <span class="label">Animated stripes (success) — 45 %</span>
      <div class="ease-progress ease-progress-success ease-progress-animated">
        <div class="ease-progress-bar" style="--ease-progress-value: 45"></div>
      </div>
    </div>
  </div>

  <!-- Interactive demo -->
  <div class="section">
    <h2>Interactive Demo</h2>
    <div class="row">
      <span class="label" id="val-label">0 %</span>
      <div class="ease-progress ease-progress-lg ease-progress-animated">
        <div class="ease-progress-bar" id="bar" style="--ease-progress-value: 0">
          <span class="ease-progress-label" id="bar-label"></span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button id="add" type="button">+10 %</button>
      <button id="sub" type="button">−10 %</button>
      <button id="rst" class="reset" type="button">Reset</button>
    </div>
  </div>

  <!-- Vanilla JS — updates the CSS custom property; the transition handles the rest -->
  <script>
    (function () {
      var v = 0, bar = document.getElementById("bar"),
          lbl = document.getElementById("val-label"),
          inner = document.getElementById("bar-label");

      function set() {
        bar.style.setProperty("--ease-progress-value", v);
        lbl.textContent = v + " %";
        inner.textContent = v > 0 ? v + " %" : "";
      }

      document.getElementById("add").onclick = function () { v = Math.min(100, v + 10); set(); };
      document.getElementById("sub").onclick = function () { v = Math.max(0, v - 10); set(); };
      document.getElementById("rst").onclick = function () { v = 0; set(); };
    })();
  </script>
</body>
</html>
