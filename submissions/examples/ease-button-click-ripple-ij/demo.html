<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click Ripple Button</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Click Ripple Buttons</h1>

  <section class="demo-group">
    <button class="btn-ripple btn-ripple--primary">Click me</button>
    <button class="btn-ripple btn-ripple--secondary">Click me</button>
    <button class="btn-ripple btn-ripple--success">Click me</button>
  </section>

  <section class="demo-group">
    <button class="btn-ripple btn-ripple--primary btn-ripple--sm">Click me</button>
    <button class="btn-ripple btn-ripple--primary btn-ripple--lg">Click me</button>
    <button class="btn-ripple btn-ripple--primary btn-ripple--pill">Click me</button>
  </section>

  <script>
    document.querySelectorAll('.btn-ripple').forEach(btn => {
      btn.addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const ripple = document.createElement('span');
        ripple.className = 'ripple';
        ripple.style.left = x + 'px';
        ripple.style.top = y + 'px';

        this.appendChild(ripple);

        ripple.addEventListener('animationend', () => {
          ripple.remove();
        });
      });
    });
  </script>
</body>
</html>
