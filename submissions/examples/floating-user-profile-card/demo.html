<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floating User Profile Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-card">

    <div class="profile-header">

        <div class="avatar">

            A

            <span class="status"></span>

        </div>

        <h2>Aryan Kumar</h2>

        <p>Frontend Developer</p>

    </div>

    <div class="stats">

        <div>
            <strong>124</strong>
            <span>Projects</span>
        </div>

        <div>
            <strong>8.5K</strong>
            <span>Followers</span>
        </div>

        <div>
            <strong>420</strong>
            <span>Following</span>
        </div>

    </div>

    <div class="actions">

        <button>Follow</button>

        <button class="secondary">
            Message
        </button>

    </div>

</div>

</body>
</html>
