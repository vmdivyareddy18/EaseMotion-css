<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio-Spotlight Interface - Share Button Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nature-viewport">
        <!-- Interactive Ecosystem Showcase Hub Card Layout -->
        <div class="ecosystem-card">
            <header class="eco-header">
                <span class="canopy-badge">Ecosystem Feed</span>
                <h2 class="eco-title">Canopy Density Map</h2>
                <p class="eco-subtitle">Broadcast real-time biological node metrics across network clusters instantly.</p>
            </header>

            <!-- Spotlight Share Interactive Stage Anchor Area -->
            <div class="share-stage-area">
                <!-- Pure-CSS Functional Interactive Trigger Gate Checkbox -->
                <input type="checkbox" id="spotlight-share-gate" class="share-input-gate">

                <!-- Custom Stylized Interactive Trigger Toggle Selector Button Box Label -->
                <label for="spotlight-share-gate" class="spotlight-trigger-btn">
                    <span class="spotlight-lens"></span>
                    <span class="btn-text">Share Node Details</span>
                </label>

                <!-- Advanced Expanding Nature Spotlight Dropdown Panel Container -->
                <div class="share-dropdown-panel">
                    <div class="panel-inner-content">
                        <div class="panel-header-tag">Select Matrix Channel</div>
                        <ul class="share-links-list">
                            <li class="share-item"><a href="#satellite" class="share-link-node">Satellite Link</a></li>
                            <li class="share-item"><a href="#mesh" class="share-link-node">Mesh Core Sync</a></li>
                            <li class="share-item"><a href="#terminal" class="share-link-node">Crypto Terminal</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <footer class="eco-footer">
                <div class="telemetry-sync-badge">
                    <span class="beacon-pulse-dot"></span>
                    <span class="beacon-label">Biomimetic Grid Core Connected</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
