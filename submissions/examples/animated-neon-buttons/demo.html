<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Neon Border Button Collection</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern cyberpunk styling -->
    <link href="https://googleapis.com" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>Neon Border Button Collection</h1>
        <p class="subtitle">Interactive UI elements for dark dashboards, game interfaces, and cyberpunk landing pages.</p>

        <!-- PLASMA THEME (PURPLE/PINK) -->
        <section class="theme-section theme-plasma">
            <h2 class="theme-title">Plasma Theme</h2>
            <div class="button-group">
                <button class="neon-btn btn-cta"><span>LAUNCH GAME</span></button>
                <button class="neon-btn btn-outline"><span>DISCONNECT</span></button>
                <button class="neon-btn btn-icon" aria-label="Settings">
                    <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></span>
                </button>
            </div>
        </section>

        <!-- ACID THEME (NEON GREEN) -->
        <section class="theme-section theme-acid">
            <h2 class="theme-title">Acid Theme</h2>
            <div class="button-group">
                <button class="neon-btn btn-cta"><span>INITIALIZE</span></button>
                <button class="neon-btn btn-outline"><span>BYPASS</span></button>
                <button class="neon-btn btn-icon" aria-label="Terminal">
                    <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg></span>
                </button>
            </div>
        </section>

        <!-- INFRARED THEME (CYBERPUNK RED) -->
        <section class="theme-section theme-infrared">
            <h2 class="theme-title">Infrared Theme</h2>
            <div class="button-group">
                <button class="neon-btn btn-cta"><span>OVERRIDE</span></button>
                <button class="neon-btn btn-outline"><span>ABORT</span></button>
                <button class="neon-btn btn-icon" aria-label="Alert">
                    <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg></span>
                </button>
            </div>
        </section>

        <!-- ARCTIC THEME (ICE BLUE) -->
        <section class="theme-section theme-arctic">
            <h2 class="theme-title">Arctic Theme</h2>
            <div class="button-group">
                <button class="neon-btn btn-cta"><span>DOWNLOAD</span></button>
                <button class="neon-btn btn-outline"><span>FREEZE</span></button>
                <button class="neon-btn btn-icon" aria-label="Power">
                    <span><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path><line x1="12" y1="2" x2="12" y2="12"></line></svg></span>
                </button>
            </div>
        </section>
    </div>

    <!-- Script handles the localized ripple effect position calculation -->
    <script>
        document.querySelectorAll('.neon-btn').forEach(button => {
            button.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                this.style.setProperty('--ripple-x', `${x}px`);
                this.style.setProperty('--ripple-y', `${y}px`);
                
                this.classList.remove('ripple-active');
                void this.offsetWidth; // Trigger reflow to restart animation
                this.classList.add('ripple-active');
            });
        });
    </script>
</body>
</html>
