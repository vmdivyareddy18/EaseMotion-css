<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ps-wrapper">

    <h1>Password Strength Checker</h1>

    <div class="input-group">
      <input type="password" id="passwordInput" class="ps-input" placeholder="Type a password..." autocomplete="off">
      <button class="toggle-btn" id="toggleBtn">Show</button>
    </div>

    <div class="strength-bar">
      <div class="strength-fill" id="strengthFill"></div>
    </div>

    <div class="strength-label" id="strengthLabel">Enter a password</div>

    <ul class="criteria-list" id="criteriaList">
      <li data-criterion="length">At least 8 characters</li>
      <li data-criterion="uppercase">Contains uppercase letter</li>
      <li data-criterion="lowercase">Contains lowercase letter</li>
      <li data-criterion="number">Contains a number</li>
      <li data-criterion="special">Contains a special character</li>
    </ul>

  </div>

  <script>
    const input = document.getElementById('passwordInput');
    const fill = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    const toggle = document.getElementById('toggleBtn');
    const items = document.querySelectorAll('[data-criterion]');

    toggle.addEventListener('click', () => {
      const t = input.type === 'password' ? 'text' : 'password';
      input.type = t;
      toggle.textContent = t === 'password' ? 'Show' : 'Hide';
    });

    input.addEventListener('input', () => {
      const val = input.value;
      let score = 0;
      const checks = {
        length: val.length >= 8,
        uppercase: /[A-Z]/.test(val),
        lowercase: /[a-z]/.test(val),
        number: /[0-9]/.test(val),
        special: /[^A-Za-z0-9]/.test(val)
      };

      items.forEach(item => {
        const key = item.dataset.criterion;
        if (checks[key]) {
          item.classList.add('met');
          score++;
        } else {
          item.classList.remove('met');
        }
      });

      const pct = (score / 5) * 100;
      fill.style.width = pct + '%';

      if (val.length === 0) {
        fill.style.width = '0%';
        fill.className = 'strength-fill';
        label.textContent = 'Enter a password';
      } else if (score <= 1) {
        fill.className = 'strength-fill weak';
        label.textContent = 'Weak';
      } else if (score <= 3) {
        fill.className = 'strength-fill medium';
        label.textContent = 'Medium';
      } else if (score <= 4) {
        fill.className = 'strength-fill strong';
        label.textContent = 'Strong';
      } else {
        fill.className = 'strength-fill very-strong';
        label.textContent = 'Very Strong';
      }
    });
  </script>

</body>
</html>
