<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stat Counter Display</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f1f5f9;">
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-value" data-target="12500">0</span>
        <span class="stat-label">Users Active</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" data-target="8420">0</span>
        <span class="stat-label">Projects Completed</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" data-target="3560">0</span>
        <span class="stat-label">Open Source Contributions</span>
      </div>
      <div class="stat-card">
        <span class="stat-value" data-target="18900">0</span>
        <span class="stat-label">Lines of Code</span>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
