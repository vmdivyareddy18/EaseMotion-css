<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Loading Animation Collection</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="load-collection">
      <header class="load-header">
        <h1 class="load-title">Loading Animations</h1>
        <p class="load-subtitle">
          A collection of pure CSS loading spinners and indicators
        </p>
      </header>

      <div class="load-grid">
        <div class="load-item">
          <div class="spinner-dots">
            <div class="dot dot-1"></div>
            <div class="dot dot-2"></div>
            <div class="dot dot-3"></div>
          </div>
          <span class="load-label">Bouncing Dots</span>
        </div>

        <div class="load-item">
          <div class="spinner-ring">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
          </div>
          <span class="load-label">Pulsing Rings</span>
        </div>

        <div class="load-item">
          <div class="spinner-cube">
            <div class="cube cube-1"></div>
            <div class="cube cube-2"></div>
            <div class="cube cube-3"></div>
            <div class="cube cube-4"></div>
          </div>
          <span class="load-label">Cube Grid</span>
        </div>

        <div class="load-item">
          <div class="spinner-bar">
            <div class="bar bar-1"></div>
            <div class="bar bar-2"></div>
            <div class="bar bar-3"></div>
            <div class="bar bar-4"></div>
            <div class="bar bar-5"></div>
          </div>
          <span class="load-label">Equalizer Bars</span>
        </div>

        <div class="load-item">
          <div class="spinner-pulse">
            <div class="pulse-circle"></div>
          </div>
          <span class="load-label">Pulse Ring</span>
        </div>

        <div class="load-item">
          <div class="spinner-hourglass">
            <div class="hourglass-top"></div>
            <div class="hourglass-bottom"></div>
          </div>
          <span class="load-label">Hourglass</span>
        </div>

        <div class="load-item">
          <div class="spinner-wave">
            <div class="wave wave-1"></div>
            <div class="wave wave-2"></div>
            <div class="wave wave-3"></div>
            <div class="wave wave-4"></div>
            <div class="wave wave-5"></div>
          </div>
          <span class="load-label">Wave Bars</span>
        </div>

        <div class="load-item">
          <div class="spinner-spiral">
            <div class="spiral-segment" style="--seg-index: 0"></div>
            <div class="spiral-segment" style="--seg-index: 1"></div>
            <div class="spiral-segment" style="--seg-index: 2"></div>
            <div class="spiral-segment" style="--seg-index: 3"></div>
            <div class="spiral-segment" style="--seg-index: 4"></div>
            <div class="spiral-segment" style="--seg-index: 5"></div>
            <div class="spiral-segment" style="--seg-index: 6"></div>
            <div class="spiral-segment" style="--seg-index: 7"></div>
          </div>
          <span class="load-label">Spiral Dots</span>
        </div>

        <div class="load-item">
          <div class="spinner-ripple">
            <div class="ripple ripple-1"></div>
            <div class="ripple ripple-2"></div>
          </div>
          <span class="load-label">Water Ripple</span>
        </div>

        <div class="load-item">
          <div class="spinner-orbit">
            <div class="orbit-center"></div>
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
          </div>
          <span class="load-label">Orbit</span>
        </div>

        <div class="load-item">
          <div class="spinner-fade">
            <div class="fade-dot fd-1"></div>
            <div class="fade-dot fd-2"></div>
            <div class="fade-dot fd-3"></div>
            <div class="fade-dot fd-4"></div>
            <div class="fade-dot fd-5"></div>
            <div class="fade-dot fd-6"></div>
            <div class="fade-dot fd-7"></div>
            <div class="fade-dot fd-8"></div>
          </div>
          <span class="load-label">Fade Ring</span>
        </div>

        <div class="load-item">
          <div class="spinner-snake">
            <svg viewBox="0 0 50 50" class="snake-svg">
              <defs>
                <linearGradient
                  id="snakeGrad"
                  x1="0%"
                  y1="0%"
                  x2="100%"
                  y2="100%"
                >
                  <stop offset="0%" stop-color="#667eea" />
                  <stop offset="100%" stop-color="#f093fb" />
                </linearGradient>
              </defs>
              <circle
                class="snake-track"
                cx="25"
                cy="25"
                r="20"
                fill="none"
                stroke-width="4"
              />
              <circle
                class="snake-progress"
                cx="25"
                cy="25"
                r="20"
                fill="none"
                stroke-width="4"
                stroke="url(#snakeGrad)"
              />
            </svg>
          </div>
          <span class="load-label">Snake Spinner</span>
        </div>
      </div>
    </div>
  </body>
</html>
