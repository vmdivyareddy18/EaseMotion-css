<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Slide-Out Drawer - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <!-- Mock Page Content -->
  <main class="mock-page">
    <div class="mock-header">
      <button class="menu-trigger ease-hover-grow" id="menu-trigger" aria-label="Open menu">
        <span class="hamburger-icon">☰</span>
      </button>
      <h1>Dashboard</h1>
    </div>
    <div class="mock-content">
      <h2>Welcome Back!</h2>
      <p>Click the menu icon in the top left corner to open the animated slide-out drawer.</p>
    </div>
  </main>

  <!-- Drawer Overlay (Backdrop) -->
  <div class="drawer-overlay ease-fade-in" id="drawer-overlay"></div>

  <!-- Drawer Panel -->
  <aside class="drawer-panel" id="drawer-panel">
    
    <!-- Drawer Header -->
    <header class="drawer-header">
      <span class="drawer-logo">🚀 BrandName</span>
      <button class="drawer-close ease-hover-grow" id="drawer-close" aria-label="Close menu">×</button>
    </header>

    <!-- Drawer Navigation -->
    <nav class="drawer-nav">
      <a href="#" class="nav-item ease-fade-in-left ease-delay-100 ease-hover-grow">
        <span class="nav-icon">🏠</span>
        <span class="nav-text">Dashboard</span>
      </a>
      <a href="#" class="nav-item ease-fade-in-left ease-delay-200 ease-hover-grow">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Analytics</span>
      </a>
      <a href="#" class="nav-item ease-fade-in-left ease-delay-300 ease-hover-grow">
        <span class="nav-icon">📁</span>
        <span class="nav-text">Projects</span>
        <span class="nav-badge ease-bounce-in ease-delay-400">3</span>
      </a>
      <a href="#" class="nav-item ease-fade-in-left ease-delay-400 ease-hover-grow">
        <span class="nav-icon">👥</span>
        <span class="nav-text">Team Members</span>
      </a>
      <a href="#" class="nav-item ease-fade-in-left ease-delay-500 ease-hover-grow">
        <span class="nav-icon">💬</span>
        <span class="nav-text">Messages</span>
        <span class="nav-badge new ease-bounce-in ease-delay-600">New</span>
      </a>
      
      <div class="nav-divider ease-fade-in ease-delay-600"></div>
      
      <a href="#" class="nav-item ease-fade-in-left ease-delay-700 ease-hover-grow">
        <span class="nav-icon">⚙️</span>
        <span class="nav-text">Settings</span>
      </a>
      <a href="#" class="nav-item ease-fade-in-left ease-delay-800 ease-hover-grow">
        <span class="nav-icon">🚪</span>
        <span class="nav-text">Log Out</span>
      </a>
    </nav>

    <!-- Drawer Footer (User Profile) -->
    <footer class="drawer-footer ease-fade-in-up ease-delay-900">
      <div class="user-avatar">👩‍💻</div>
      <div class="user-info">
        <span class="user-name">Sarah Chen</span>
        <span class="user-email">sarah@example.com</span>
      </div>
    </footer>

  </aside>

  <!-- JavaScript for Drawer Functionality -->
  <script>
    const trigger = document.getElementById('menu-trigger');
    const closeBtn = document.getElementById('drawer-close');
    const overlay = document.getElementById('drawer-overlay');
    const panel = document.getElementById('drawer-panel');
    const navItems = document.querySelectorAll('.nav-item');

    // Open Drawer
    function openDrawer() {
      panel.classList.add('active');
      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
      
      // Re-trigger EaseMotion animations for menu items
      navItems.forEach(item => {
        item.style.animation = 'none';
        item.offsetHeight; // Trigger reflow
        item.style.animation = null;
      });
    }

    // Close Drawer
    function closeDrawer() {
      panel.classList.remove('active');
      overlay.classList.remove('active');
      document.body.style.overflow = '';
    }

    // Event Listeners
    trigger.addEventListener('click', openDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    overlay.addEventListener('click', closeDrawer);

    // Close on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && panel.classList.contains('active')) {
        closeDrawer();
      }
    });
  </script>
</body>
</html>
