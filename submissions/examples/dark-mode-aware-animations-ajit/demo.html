<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Mode Aware Animations</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Dark Mode Aware Animations</h1>
    <p>
        Animations automatically adapt to the user's preferred color scheme.
    </p>

    <div class="cards">

        <div class="card ease-glow">
            <h2>Glow</h2>
            <p>Adaptive glow animation</p>
        </div>

        <div class="card ease-shadow-pulse">
            <h2>Shadow Pulse</h2>
            <p>Responsive shadow intensity</p>
        </div>

        <div class="card ease-shimmer">
            <h2>Shimmer</h2>
            <p>Dark mode optimized shimmer</p>
        </div>

    </div>

    <button onclick="toggleTheme()">
        Toggle Theme
    </button>

</div>

<script>

function toggleTheme(){

    if(document.body.dataset.theme==="dark"){
        document.body.dataset.theme="light";
    }
    else{
        document.body.dataset.theme="dark";
    }

}

</script>

</body>
</html>
