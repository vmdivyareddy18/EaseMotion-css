<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Restock Alert Strip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Inventory Dashboard</h1>

    <div class="alert-strip">

        <div class="alert-icon">
            ⚠
        </div>

        <div class="alert-content">

            <h2>Low Stock Alert</h2>

            <p>
                6 products have reached their minimum inventory threshold and require immediate restocking.
            </p>

        </div>

        <button class="action-btn">
            View Items
        </button>

    </div>

    <div class="inventory-list">

        <div class="item">

            <span>Laptop Chargers</span>

            <span class="stock critical">
                4 Left
            </span>

        </div>

        <div class="item">

            <span>Wireless Mouse</span>

            <span class="stock warning">
                10 Left
            </span>

        </div>

        <div class="item">

            <span>USB-C Cable</span>

            <span class="stock healthy">
                120 Left
            </span>

        </div>

    </div>

</div>

</body>
</html>
