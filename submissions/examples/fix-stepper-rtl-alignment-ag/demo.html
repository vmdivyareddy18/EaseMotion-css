<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stepper RTL Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-stepper – RTL Logical Properties Fix</h2>
  <div class="demo-stack">
    <div>
      <p class="demo-label">LTR (default)</p>
      <div class="ease-stepper" dir="ltr">
        <div class="ease-stepper__item is-done">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">Account</span>
        </div>
        <div class="ease-stepper__item is-done">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">Details</span>
        </div>
        <div class="ease-stepper__item is-active">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">Payment</span>
        </div>
        <div class="ease-stepper__item">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">Confirm</span>
        </div>
      </div>
    </div>
    <div>
      <p class="demo-label">RTL — Arabic direction</p>
      <div class="ease-stepper" dir="rtl">
        <div class="ease-stepper__item is-done">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">الحساب</span>
        </div>
        <div class="ease-stepper__item is-done">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">التفاصيل</span>
        </div>
        <div class="ease-stepper__item is-active">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">الدفع</span>
        </div>
        <div class="ease-stepper__item">
          <div class="ease-stepper__dot"></div>
          <span class="ease-stepper__label">تأكيد</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
