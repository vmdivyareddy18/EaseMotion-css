<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vertical Text Orientation — EaseMotion CSS</title>
  <link rel="stylesheet" href="../../easemotion.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body style="background: #f1f5f9; padding: 5rem 1rem; margin: 0;">

  <div style="max-width: 950px; margin: 0 auto 3rem auto; text-align: center; font-family: sans-serif;">
    <h3 style="margin: 0 0 0.5rem 0; color: #0f172a; font-weight: 800; font-size: 1.6rem;">Text Orientation Utility Matrix</h3>
    <p style="margin: 0; color: #475569; font-size: 1rem; max-width: 650px; margin-left: auto; margin-right: auto;">
      Examine the rotation profiles of alphanumeric strings and glyphs mapped across localized vertical lines.
    </p>
  </div>

  <div class="ease-typography-grid">
    
    <div class="ease-type-card">
      <h4 style="margin: 0 0 0.25rem 0; font-size: 1.1rem; color: #0f172a; font-weight: 700;">Upright Context</h4>
      <code style="font-size: 0.8rem; color: #2563eb;">.ease-text-upright</code>
      
      <div class="ease-vertical-canvas ease-text-upright">
        Tokyo 東京 2026
      </div>
    </div>

    <div class="ease-type-card">
      <h4 style="margin: 0 0 0.25rem 0; font-size: 1.1rem; color: #0f172a; font-weight: 700;">Sideways Context</h4>
      <code style="font-size: 0.8rem; color: #2563eb;">.ease-text-sideways</code>
      
      <div class="ease-vertical-canvas ease-text-sideways">
        Tokyo 東京 2026
      </div>
    </div>

    <div class="ease-type-card">
      <h4 style="margin: 0 0 0.25rem 0; font-size: 1.1rem; color: #0f172a; font-weight: 700;">Mixed Context</h4>
      <code style="font-size: 0.8rem; color: #2563eb;">.ease-text-mixed</code>
      
      <div class="ease-vertical-canvas ease-text-mixed">
        Tokyo 東京 2026
      </div>
    </div>

  </div>

</body>
</html>
