<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎯 Shooting Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <h1>🎯 Shooting Gallery</h1>
    
    <div class="game-stats">
      <div class="stat-box">
        <span class="stat-label">🎯 Score</span>
        <span class="stat-value" id="scoreDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">⏱️ Time</span>
        <span class="stat-value" id="timerDisplay">30</span>
        <span class="stat-unit">s</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🏆 Best</span>
        <span class="stat-value" id="bestDisplay">0</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">🎯 Hits</span>
        <span class="stat-value" id="hitsDisplay">0</span>
      </div>
    </div>

    <div class="gallery-area" id="galleryArea">
      <div class="gallery-content">
        <div class="targets-container" id="targetsContainer">
          <!-- Targets generated by JavaScript -->
        </div>
        <div class="game-overlay" id="gameOverlay">
          <span class="overlay-text" id="overlayText">🎯 Click "Start" or press Space</span>
        </div>
      </div>
    </div>

    <div class="game-controls">
      <button class="control-btn" id="startBtn">▶ Start Game</button>
      <button class="control-btn" id="resetBtn">🔄 Reset</button>
    </div>

    <div class="game-status" id="gameStatus">🎯 Press "Start Game" or Space to begin!</div>
  </div>

  <script>
    (function() {
      // ---------- DOM Refs ----------
      const galleryArea = document.getElementById('galleryArea');
      const targetsContainer = document.getElementById('targetsContainer');
      const scoreDisplay = document.getElementById('scoreDisplay');
      const timerDisplay = document.getElementById('timerDisplay');
      const bestDisplay = document.getElementById('bestDisplay');
      const hitsDisplay = document.getElementById('hitsDisplay');
      const startBtn = document.getElementById('startBtn');
      const resetBtn = document.getElementById('resetBtn');
      const gameStatus = document.getElementById('gameStatus');
      const overlayText = document.getElementById('overlayText');
      const gameOverlay = document.getElementById('gameOverlay');

      // ---------- Game State ----------
      let score = 0;
      let hits = 0;
      let timeLeft = 30;
      let bestScore = parseInt(localStorage.getItem('shootingBestScore')) || 0;
      let gameRunning = false;
      let gameTimer = null;
      let targetInterval = null;
      let targets = [];
      let targetIdCounter = 0;

      // ---------- Constants ----------
      const TARGET_TYPES = [
        { emoji: '🎯', label: 'Bullseye', points: 10, size: 55 },
        { emoji: '🎪', label: 'Clown', points: 8, size: 60 },
        { emoji: '⭐', label: 'Star', points: 5, size: 50 },
        { emoji: '🦆', label: 'Duck', points: 7, size: 55 },
        { emoji: '🎈', label: 'Balloon', points: 6, size: 50 }
      ];

      // ---------- High Score ----------
      bestDisplay.textContent = bestScore;

      // ---------- Helper Functions ----------
      function updateScoreDisplay() {
        scoreDisplay.textContent = score;
      }

      function updateTimerDisplay() {
        timerDisplay.textContent = timeLeft;
      }

      function updateHitsDisplay() {
        hitsDisplay.textContent = hits;
      }

      function updateBestScore() {
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem('shootingBestScore', bestScore.toString());
          bestDisplay.textContent = bestScore;
        }
      }

      function setGameStatus(message, isGood = true) {
        gameStatus.textContent = message;
        gameStatus.style.color = isGood ? '#a8d8ea' : '#ff7a7a';
      }

      function setOverlayText(text, show = true) {
        overlayText.textContent = text;
        gameOverlay.style.display = show ? 'flex' : 'none';
      }

      // ---------- Target Management ----------
      function createTarget() {
        if (!gameRunning) return;

        const galleryRect = galleryArea.getBoundingClientRect();
        const containerRect = targetsContainer.getBoundingClientRect();
        const padding = 20;
        const maxX = targetsContainer.clientWidth - 60;
        const maxY = targetsContainer.clientHeight - 60;

        const type = TARGET_TYPES[Math.floor(Math.random() * TARGET_TYPES.length)];
        const x = padding + Math.random() * (maxX - padding);
        const y = padding + Math.random() * (maxY - padding);
        
        const target = document.createElement('div');
        target.className = 'target';
        target.dataset.id = targetIdCounter++;
        target.style.left = x + 'px';
        target.style.top = y + 'px';
        target.innerHTML = `
          <span class="target-emoji">${type.emoji}</span>
          <span class="target-points">+${type.points}</span>
        `;

        // Add click handler
        target.addEventListener('click', (e) => {
          e.stopPropagation();
          shootTarget(target, type.points);
        });

        // Touch support
        target.addEventListener('touchstart', (e) => {
          e.preventDefault();
          e.stopPropagation();
          shootTarget(target, type.points);
        }, { passive: false });

        targetsContainer.appendChild(target);
        targets.push({
          element: target,
          id: target.dataset.id,
          timeout: setTimeout(() => {
            removeTarget(target);
          }, 1200 + Math.random() * 800)
        });
      }

      function shootTarget(targetElement, points) {
        if (!gameRunning || !targetElement || !targetElement.parentNode) return;

        // Add hit animation
        targetElement.classList.add('hit');
        
        // Add score
        score += points;
        hits++;
        updateScoreDisplay();
        updateHitsDisplay();
        updateBestScore();

        // Play hit sound via Web Audio
        try {
          const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          const oscillator = audioCtx.createOscillator();
          const gainNode = audioCtx.createGain();
          oscillator.connect(gainNode);
          gainNode.connect(audioCtx.destination);
          oscillator.type = 'square';
          oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
          oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.05);
          gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
          oscillator.start(audioCtx.currentTime);
          oscillator.stop(audioCtx.currentTime + 0.15);
        } catch (e) {}

        // Remove after animation
        setTimeout(() => {
          removeTarget(targetElement);
        }, 200);
      }

      function removeTarget(targetElement) {
        if (!targetElement || !targetElement.parentNode) return;
        
        // Remove from targets array
        const index = targets.findIndex(t => t.element === targetElement);
        if (index !== -1) {
          clearTimeout(targets[index].timeout);
          targets.splice(index, 1);
        }
        
        if (targetElement.parentNode) {
          targetElement.remove();
        }
      }

      function clearAllTargets() {
        targets.forEach(t => {
          clearTimeout(t.timeout);
          if (t.element && t.element.parentNode) {
            t.element.remove();
          }
        });
        targets = [];
        targetsContainer.innerHTML = '';
      }

      function spawnTargets() {
        if (!gameRunning) return;
        
        // Spawn 1-3 targets at a time
        const count = 1 + Math.floor(Math.random() * 3);
        for (let i = 0; i < count; i++) {
          if (gameRunning) {
            setTimeout(() => createTarget(), i * 100);
          }
        }
      }

      // ---------- Timer ----------
      function startTimer() {
        if (gameTimer) {
          clearInterval(gameTimer);
          gameTimer = null;
        }

        gameTimer = setInterval(() => {
          timeLeft--;
          updateTimerDisplay();

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);
      }

      // ---------- Game Control ----------
      function startGame() {
        if (gameRunning) return;

        // Reset
        clearAllTargets();
        score = 0;
        hits = 0;
        timeLeft = 30;
        gameRunning = true;
        
        updateScoreDisplay();
        updateTimerDisplay();
        updateHitsDisplay();
        setOverlayText('', false);
        startBtn.disabled = true;
        startBtn.textContent = '⏳ Playing...';
        setGameStatus('🎯 Shoot the targets!', true);

        // Start timer
        startTimer();

        // Start spawning targets
        spawnTargets();
        targetInterval = setInterval(() => {
          spawnTargets();
        }, 800);
      }

      function endGame() {
        gameRunning = false;
        clearInterval(gameTimer);
        gameTimer = null;
        clearInterval(targetInterval);
        targetInterval = null;
        clearAllTargets();

        updateBestScore();
        startBtn.disabled = false;
        startBtn.textContent = '▶ Play Again';
        setOverlayText(`💀 Time\'s Up! Score: ${score}`, true);
        setGameStatus(`⏰ Time\'s up! Final Score: ${score} 🏆`, score > 0);
      }

      function resetGame() {
        gameRunning = false;
        if (gameTimer) {
          clearInterval(gameTimer);
          gameTimer = null;
        }
        if (targetInterval) {
          clearInterval(targetInterval);
          targetInterval = null;
        }
        clearAllTargets();

        score = 0;
        hits = 0;
        timeLeft = 30;
        updateScoreDisplay();
        updateTimerDisplay();
        updateHitsDisplay();
        startBtn.disabled = false;
        startBtn.textContent = '▶ Start Game';
        setOverlayText('🎯 Click "Start" or press Space', true);
        setGameStatus('🔄 Game reset. Press Start to play!', true);
      }

      // ---------- Keyboard Controls ----------
      document.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Space') {
          e.preventDefault();
          if (!gameRunning) {
            startGame();
          }
        }
        if (e.key === 'r' || e.key === 'R') {
          resetGame();
        }
      });

      // Click on background (miss)
      galleryArea.addEventListener('click', (e) => {
        if (e.target === galleryArea || e.target === targetsContainer || e.target === gameOverlay || e.target === overlayText) {
          if (gameRunning) {
            // Miss! No penalty, just feedback
            const missFeedback = document.createElement('div');
            missFeedback.className = 'miss-feedback';
            missFeedback.textContent = '✗';
            missFeedback.style.position = 'absolute';
            missFeedback.style.left = (e.clientX - galleryArea.getBoundingClientRect().left) + 'px';
            missFeedback.style.top = (e.clientY - galleryArea.getBoundingClientRect().top) + 'px';
            missFeedback.style.color = '#ff6b6b';
            missFeedback.style.fontSize = '2rem';
            missFeedback.style.fontWeight = 'bold';
            missFeedback.style.pointerEvents = 'none';
            missFeedback.style.animation = 'fadeOut 0.5s ease forwards';
            galleryArea.appendChild(missFeedback);
            setTimeout(() => missFeedback.remove(), 500);
          }
        }
      });

      // ---------- Button Listeners ----------
      startBtn.addEventListener('click', startGame);
      resetBtn.addEventListener('click', resetGame);

      // ---------- CSS Animation ----------
      const style = document.createElement('style');
      style.textContent = `
        @keyframes fadeOut {
          0% { opacity: 1; transform: scale(1); }
          100% { opacity: 0; transform: scale(1.5); }
        }
        .target.hit {
          animation: targetHit 0.2s ease forwards;
        }
        @keyframes targetHit {
          0% { transform: scale(1); }
          30% { transform: scale(1.3); }
          100% { transform: scale(0); opacity: 0; }
        }
      `;
      document.head.appendChild(style);

      // ---------- Init ----------
      function init() {
        resetGame();
        setGameStatus('🎯 Press "Start Game" or Space to begin!', true);
        setOverlayText('🎯 Click "Start" or press Space', true);
      }

      init();
    })();
  </script>
</body>
</html>
