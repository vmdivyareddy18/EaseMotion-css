<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Pagination Nav | EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <div class="container">
      <h1 class="demo-title">Animated Pagination Navigation</h1>
      <p class="demo-subtitle">CSS-only pagination with smooth transitions, disabled states, and hover effects.</p>

      <div class="demo-card">
        <h2 class="demo-label">Default Pagination</h2>
        <nav class="pagination" aria-label="Page navigation">
          <button class="pagination__btn pagination__btn--prev" disabled aria-label="Previous page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Prev</span>
          </button>
          <div class="pagination__pages">
            <button class="pagination__page pagination__page--active" aria-current="page">1</button>
            <button class="pagination__page">2</button>
            <button class="pagination__page">3</button>
            <button class="pagination__page">4</button>
            <button class="pagination__page">5</button>
          </div>
          <button class="pagination__btn pagination__btn--next" aria-label="Next page">
            <span>Next</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </nav>
      </div>

      <div class="demo-card">
        <h2 class="demo-label">Mid-Page Active State</h2>
        <nav class="pagination" aria-label="Page navigation">
          <button class="pagination__btn pagination__btn--prev" aria-label="Previous page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Prev</span>
          </button>
          <div class="pagination__pages">
            <button class="pagination__page">1</button>
            <button class="pagination__page">2</button>
            <button class="pagination__page">3</button>
            <button class="pagination__page pagination__page--active" aria-current="page">4</button>
            <button class="pagination__page">5</button>
            <button class="pagination__page">6</button>
            <button class="pagination__page">7</button>
          </div>
          <button class="pagination__btn pagination__btn--next" aria-label="Next page">
            <span>Next</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </nav>
      </div>

      <div class="demo-card">
        <h2 class="demo-label">Last Page – Next Disabled</h2>
        <nav class="pagination" aria-label="Page navigation">
          <button class="pagination__btn pagination__btn--prev" aria-label="Previous page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Prev</span>
          </button>
          <div class="pagination__pages">
            <button class="pagination__page">1</button>
            <button class="pagination__page">2</button>
            <button class="pagination__page">3</button>
            <button class="pagination__page pagination__page--active" aria-current="page">4</button>
          </div>
          <button class="pagination__btn pagination__btn--next" disabled aria-label="Next page">
            <span>Next</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </nav>
      </div>

      <div class="demo-card">
        <h2 class="demo-label">Large Set – With Ellipsis</h2>
        <nav class="pagination" aria-label="Page navigation">
          <button class="pagination__btn pagination__btn--prev" disabled aria-label="Previous page">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            <span>Prev</span>
          </button>
          <div class="pagination__pages">
            <button class="pagination__page pagination__page--active" aria-current="page">1</button>
            <button class="pagination__page">2</button>
            <button class="pagination__page">3</button>
            <span class="pagination__ellipsis">...</span>
            <button class="pagination__page">18</button>
            <button class="pagination__page">19</button>
            <button class="pagination__page">20</button>
          </div>
          <button class="pagination__btn pagination__btn--next" aria-label="Next page">
            <span>Next</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </nav>
      </div>
    </div>
  </section>
</body>
</html>
