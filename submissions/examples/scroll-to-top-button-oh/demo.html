<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Scroll-to-Top Button</title>
  <meta name="description" content="Animated scroll-to-top button component.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">Scroll-to-Top Button</h1>
      <p class="subtitle" id="main-desc">Smooth scroll back to top</p>
    </header>

    <div class="display-area">
      
      <div class="demo-content">
        <p>Scroll down to see the button appear...</p>
        <div class="scroll-indicator">
          <span class="arrow">↓</span>
        </div>
      </div>

    </div>

    <section class="demo-section">
      <h3>Button Variants</h3>
      <div class="variants-grid">
        <button class="scroll-btn circle" onclick="scrollToTop()">
          <span>↑</span>
        </button>
        <button class="scroll-btn pill" onclick="scrollToTop()">
          <span>↑ Back to Top</span>
        </button>
        <button class="scroll-btn icon" onclick="scrollToTop()">
          <span>↑</span>
        </button>
      </div>
    </section>

    <section class="demo-section">
      <h3>Copy Code</h3>
      <div class="code-block">
        <div class="code-header">
          <span>HTML</span>
          <button class="copy-btn" onclick="copyCode()">Copy</button>
        </div>
        <pre>&lt;button class="scroll-btn" onclick="scrollToTop()"&gt;
  &lt;span&gt;↑&lt;/span&gt;
&lt;/button&gt;</pre>
      </div>
    </section>

  </main>

  <button class="scroll-to-top-btn show" id="scrollBtn" onclick="scrollToTop()">
    <span>↑</span>
  </button>

  <script>
    const scrollBtn = document.getElementById('scrollBtn');
    
    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        scrollBtn.classList.add('show');
      } else {
        scrollBtn.classList.remove('show');
      }
    });

    function scrollToTop() {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function copyCode() {
      const code = `<button class="scroll-btn" onclick="scrollToTop()">
  <span>↑</span>
</button>`;
      navigator.clipboard.writeText(code);
    }
  </script>

</body>
</html>
