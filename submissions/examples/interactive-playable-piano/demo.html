<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Playable Piano - EaseMotion CSS</title>
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link to local style sheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Google Fonts Outfit & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

  <div class="piano-card">
    <!-- Header -->
    <header class="piano-header">
      <div class="brand">
        <span class="pulse-badge">SYNTH</span>
        <h1>EASEMOTION PIANO</h1>
      </div>
    </header>

    <!-- Controls Panel -->
    <section class="control-panel">
      <div class="control-group">
        <label for="wave-select">Waveform</label>
        <select id="wave-select">
          <option value="sine">Sine (Smooth)</option>
          <option value="triangle" selected>Triangle (Soft)</option>
          <option value="sawtooth">Sawtooth (Bright)</option>
          <option value="square">Square (Retro)</option>
        </select>
      </div>

      <div class="control-group volume-group">
        <label for="volume-slider">Volume</label>
        <div class="slider-container">
          <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.3">
          <span id="volume-label">30%</span>
        </div>
      </div>

      <div class="control-group octave-group">
        <label>Base Octave</label>
        <div class="octave-display">
          <span id="octave-value">C4 - E5</span>
        </div>
      </div>

      <button id="reset-btn" class="reset-btn">Reset</button>
    </section>

    <!-- Piano Keyboard -->
    <main class="keyboard-container">
      <div class="keyboard" id="piano-keyboard">
        
        <!-- White Keys -->
        <div class="key white" data-note="C4" data-key="A" style="--key-index: 1;">
          <span class="note-label">C4</span>
          <span class="key-bind">A</span>
        </div>
        <div class="key white" data-note="D4" data-key="S" style="--key-index: 2;">
          <span class="note-label">D4</span>
          <span class="key-bind">S</span>
        </div>
        <div class="key white" data-note="E4" data-key="D" style="--key-index: 3;">
          <span class="note-label">E4</span>
          <span class="key-bind">D</span>
        </div>
        <div class="key white" data-note="F4" data-key="F" style="--key-index: 4;">
          <span class="note-label">F4</span>
          <span class="key-bind">F</span>
        </div>
        <div class="key white" data-note="G4" data-key="G" style="--key-index: 5;">
          <span class="note-label">G4</span>
          <span class="key-bind">G</span>
        </div>
        <div class="key white" data-note="H4" data-key="H" style="--key-index: 6;">
          <span class="note-label">A4</span>
          <span class="key-bind">H</span>
        </div>
        <div class="key white" data-note="J4" data-key="J" style="--key-index: 7;">
          <span class="note-label">B4</span>
          <span class="key-bind">J</span>
        </div>
        <div class="key white" data-note="K5" data-key="K" style="--key-index: 8;">
          <span class="note-label">C5</span>
          <span class="key-bind">K</span>
        </div>
        <div class="key white" data-note="L5" data-key="L" style="--key-index: 9;">
          <span class="note-label">D5</span>
          <span class="key-bind">L</span>
        </div>
        <div class="key white" data-note="Semicolon5" data-key=";" style="--key-index: 10;">
          <span class="note-label">E5</span>
          <span class="key-bind">;</span>
        </div>

        <!-- Black Keys (Overlayed absolutely via CSS) -->
        <div class="key black" data-note="C#4" data-key="W" style="--key-index: 11; left: calc(10% - 12.5px);">
          <span class="note-label">C#4</span>
          <span class="key-bind">W</span>
        </div>
        <div class="key black" data-note="D#4" data-key="E" style="--key-index: 12; left: calc(20% - 12.5px);">
          <span class="note-label">D#4</span>
          <span class="key-bind">E</span>
        </div>
        <!-- Gap between E4 and F4 -->
        <div class="key black" data-note="F#4" data-key="T" style="--key-index: 13; left: calc(40% - 12.5px);">
          <span class="note-label">F#4</span>
          <span class="key-bind">T</span>
        </div>
        <div class="key black" data-note="G#4" data-key="Y" style="--key-index: 14; left: calc(50% - 12.5px);">
          <span class="note-label">G#4</span>
          <span class="key-bind">Y</span>
        </div>
        <div class="key black" data-note="A#4" data-key="U" style="--key-index: 15; left: calc(60% - 12.5px);">
          <span class="note-label">A#4</span>
          <span class="key-bind">U</span>
        </div>
        <!-- Gap between B4 and C5 -->
        <div class="key black" data-note="C#5" data-key="O" style="--key-index: 16; left: calc(80% - 12.5px);">
          <span class="note-label">C#5</span>
          <span class="key-bind">O</span>
        </div>
        <div class="key black" data-note="D#5" data-key="P" style="--key-index: 17; left: calc(90% - 12.5px);">
          <span class="note-label">D#5</span>
          <span class="key-bind">P</span>
        </div>

      </div>
    </main>

    <!-- Key bindings legend helper -->
    <footer class="piano-footer">
      <p>Use your computer keyboard to play or click the keys with your mouse!</p>
      <div class="legend-row">
        <span>White Keys: <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> <kbd>F</kbd> <kbd>G</kbd> <kbd>H</kbd> <kbd>J</kbd> <kbd>K</kbd> <kbd>L</kbd> <kbd>;</kbd></span>
        <span>Black Keys: <kbd>W</kbd> <kbd>E</kbd> <kbd>T</kbd> <kbd>Y</kbd> <kbd>U</kbd> <kbd>O</kbd> <kbd>P</kbd></span>
      </div>
    </footer>
  </div>

  <!-- Audio Synthesis Logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Note frequencies map
      const noteFreqs = {
        'C4': 261.63,
        'C#4': 277.18,
        'D4': 293.66,
        'D#4': 311.13,
        'E4': 329.63,
        'F4': 349.23,
        'F#4': 369.99,
        'G4': 392.00,
        'G#4': 415.30,
        'H4': 440.00,
        'A#4': 466.16,
        'J4': 493.88,
        'K5': 523.25,
        'C#5': 554.37,
        'L5': 587.33,
        'D#5': 622.25,
        'Semicolon5': 659.25
      };

      // Keyboard key to note binding map
      const keyMap = {
        'a': 'C4',
        'w': 'C#4',
        's': 'D4',
        'e': 'D#4',
        'd': 'E4',
        'f': 'F4',
        't': 'F#4',
        'g': 'G4',
        'y': 'G#4',
        'h': 'H4',
        'u': 'A#4',
        'j': 'J4',
        'k': 'K5',
        'o': 'C#5',
        'l': 'L5',
        'p': 'D#5',
        ';': 'Semicolon5'
      };

      // UI controls selectors
      const waveSelect = document.getElementById('wave-select');
      const volumeSlider = document.getElementById('volume-slider');
      const volumeLabel = document.getElementById('volume-label');
      const resetBtn = document.getElementById('reset-btn');
      const keyboard = document.getElementById('piano-keyboard');

      let audioCtx = null;
      const activeNodes = {}; // Tracks active oscillators by note name

      // Lazy initialize AudioContext on user interaction
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }

      // Play note function using Web Audio API
      function playNote(note) {
        initAudio();
        if (!audioCtx || !noteFreqs[note]) return;

        // Prevent playing multiple instances of the same note simultaneously
        if (activeNodes[note]) {
          stopNote(note);
        }

        const frequency = noteFreqs[note];
        const type = waveSelect.value;
        const volume = parseFloat(volumeSlider.value);

        // Create oscillator and gain node
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(frequency, audioCtx.currentTime);

        // Simple ADSR envelope: Fast attack to avoid clicks
        gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
        gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 0.015);

        // Connect nodes
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        // Start oscillator
        osc.start();

        // Save reference for release
        activeNodes[note] = { osc, gainNode };

        // Visual active state
        const keyElement = getKeyElement(note);
        if (keyElement) {
          keyElement.classList.add('active');
        }
      }

      // Release/Stop note function
      function stopNote(note) {
        if (activeNodes[note]) {
          const { osc, gainNode } = activeNodes[note];
          const currentTime = audioCtx.currentTime;

          // Simple release: ramp volume down to 0 to prevent audio clicking
          gainNode.gain.setValueAtTime(gainNode.gain.value, currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, currentTime + 0.15);

          // Stop oscillator after release ramp completes
          osc.stop(currentTime + 0.15);

          delete activeNodes[note];

          // Visual state removal
          const keyElement = getKeyElement(note);
          if (keyElement) {
            keyElement.classList.remove('active');
          }
        }
      }

      // Helper to map note name back to DOM key element
      function getKeyElement(note) {
        return keyboard.querySelector(`[data-note="${note}"]`);
      }

      // Volume change listener
      volumeSlider.addEventListener('input', (e) => {
        const val = Math.round(e.target.value * 100);
        volumeLabel.textContent = `${val}%`;
      });

      // Mouse & Click event listeners on keys
      let isMouseDown = false;

      document.body.addEventListener('mousedown', () => {
        isMouseDown = true;
      });

      document.body.addEventListener('mouseup', () => {
        isMouseDown = false;
      });

      const keysList = keyboard.querySelectorAll('.key');
      keysList.forEach(key => {
        const note = key.getAttribute('data-note');

        // Play note on mousedown
        key.addEventListener('mousedown', (e) => {
          e.preventDefault();
          playNote(note);
        });

        // Sliding/Dragging play effect when mouse holds down
        key.addEventListener('mouseenter', () => {
          if (isMouseDown) {
            playNote(note);
          }
        });

        // Release note on mouseup or leaving the key
        key.addEventListener('mouseup', () => stopNote(note));
        key.addEventListener('mouseleave', () => stopNote(note));
      });

      // Computer keyboard listeners
      const keyPressState = {}; // Prevent key repeat events from restarting oscillator

      window.addEventListener('keydown', (e) => {
        if (e.repeat) return; // Prevent keydown repeating
        const key = e.key.toLowerCase();
        const note = keyMap[key];

        if (note && !keyPressState[key]) {
          keyPressState[key] = true;
          playNote(note);
        }
      });

      window.addEventListener('keyup', (e) => {
        const key = e.key.toLowerCase();
        const note = keyMap[key];

        if (note) {
          keyPressState[key] = false;
          stopNote(note);
        }
      });

      // Reset button
      resetBtn.addEventListener('click', () => {
        Object.keys(activeNodes).forEach(note => {
          stopNote(note);
        });
      });
    });
  </script>
</body>
</html>
