<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeleton Loading Collection - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/variables.css">
  <link rel="stylesheet" href="../../../core/animations.css">
  <link rel="stylesheet" href="../../../core/utilities.css">
  
  <!-- Link to dedicated example styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="ease-center ease-flex-col ease-mb-8">
      <h1 class="ease-text-4xl ease-font-bold ease-reveal ease-reveal-up">Skeleton Loading Collection</h1>
      <p class="ease-text-muted ease-reveal ease-reveal-up ease-delay-100">Reusable placeholders for common UI patterns.</p>
    </div>

    <!-- 1. Text & Basic Shapes -->
    <div class="section ease-reveal ease-reveal-up ease-delay-200">
      <h2>Basic Shapes & Text</h2>
      <div class="grid">
        <div class="ease-stack">
          <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 40%"></div>
          <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 90%"></div>
          <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 75%"></div>
          <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 60%"></div>
        </div>
        <div class="ease-flex ease-items-center ease-gap-4">
          <div class="skeleton-avatar ease-skeleton-shimmer" style="--sk-size: 64px"></div>
          <div class="ease-stack ease-flex-1">
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 50%; --sk-height: 18px"></div>
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 30%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Content Cards -->
    <div class="section ease-reveal ease-reveal-up ease-delay-300">
      <h2>Content Cards</h2>
      <div class="grid">
        <!-- Shimmer Card -->
        <div class="skeleton-content-card">
          <div class="skeleton-img ease-skeleton-shimmer"></div>
          <div class="skeleton-card-body">
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 80%; --sk-height: 20px"></div>
            <div class="skeleton-text ease-skeleton-shimmer"></div>
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 60%"></div>
          </div>
        </div>
        <!-- Pulse Card -->
        <div class="skeleton-content-card">
          <div class="skeleton-img ease-skeleton-pulse"></div>
          <div class="skeleton-card-body">
            <div class="skeleton-text ease-skeleton-pulse" style="--sk-width: 80%; --sk-height: 20px"></div>
            <div class="skeleton-text ease-skeleton-pulse"></div>
            <div class="skeleton-text ease-skeleton-pulse" style="--sk-width: 60%"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 3. Image Gallery -->
    <div class="section ease-reveal ease-reveal-up ease-delay-400">
      <h2>Image Gallery</h2>
      <div class="skeleton-gallery">
        <div class="skeleton-img ease-skeleton-shimmer" style="aspect-ratio: 1/1"></div>
        <div class="skeleton-img ease-skeleton-shimmer" style="aspect-ratio: 1/1"></div>
        <div class="skeleton-img ease-skeleton-shimmer" style="aspect-ratio: 1/1"></div>
        <div class="skeleton-img ease-skeleton-shimmer" style="aspect-ratio: 1/1"></div>
      </div>
    </div>

    <!-- 4. Profile List -->
    <div class="section ease-reveal ease-reveal-up ease-delay-500">
      <h2>Feed / List Items</h2>
      <div class="ease-stack">
        <div class="skeleton-profile-item">
          <div class="skeleton-avatar ease-skeleton-shimmer"></div>
          <div class="skeleton-profile-details">
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 120px; --sk-height: 16px"></div>
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 80px"></div>
          </div>
        </div>
        <div class="skeleton-profile-item">
          <div class="skeleton-avatar ease-skeleton-shimmer"></div>
          <div class="skeleton-profile-details">
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 140px; --sk-height: 16px"></div>
            <div class="skeleton-text ease-skeleton-shimmer" style="--sk-width: 60px"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Include reveal.js for entrance animations -->
  <script src="../../../core/reveal.js"></script>
</body>
</html>
