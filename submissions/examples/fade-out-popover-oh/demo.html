<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: Fade-Out Popover</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header>
      <h1>Fade-Out Popover</h1>
      <p class="subtitle">Smooth fade animation</p>
    </header>
    <div class="display-area">
      <div class="popover-container">
        <button class="trigger-btn">Hover Me</button>
        <div class="fade-popover">
          <h4>Fade Out</h4>
          <p>Smooth fade animation!</p>
        </div>
      </div>
    </div>
    <section class="demo-section">
      <h3>Variants</h3>
      <div class="variants-grid">
        <div class="popover-container">
          <button class="trigger-btn small">Fast</button>
          <div class="fade-popover fast"><p>Fast fade</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Slow</button>
          <div class="fade-popover slow"><p>Slow fade</p></div>
        </div>
        <div class="popover-container">
          <button class="trigger-btn small">Blur</button>
          <div class="fade-popover blur"><p>Blur fade</p></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
