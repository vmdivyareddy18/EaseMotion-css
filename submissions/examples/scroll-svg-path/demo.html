<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll-Driven SVG Path Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scroll-container">
        <h1>Scroll Down</h1>
        <div class="svg-container">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <path id="scrollPath" d="M10 10 C 20 20, 40 20, 50 10 C 60 0, 80 0, 90 10 C 100 20, 100 80, 90 90 C 80 100, 60 100, 50 90 C 40 80, 20 80, 10 90 C 0 100, 0 20, 10 10 Z" fill="none" stroke="#00ffcc" stroke-width="2"/>
            </svg>
        </div>
        <h1>End of Animation</h1>
    </div>
    <script src="script.js"></script>
</body>
</html>
