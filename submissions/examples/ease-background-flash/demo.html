<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS — Evident Warning Flash Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ease-background-flash" id="warningCardAlert">
    <div style="display: flex; align-items: center; gap: 0.75rem;">
      <span style="font-size: 1.5rem;">⚠️</span>
      <h3 style="margin: 0; font-size: 1.15rem; font-weight: 700; color: #fef08a;">Critical Security System Warning</h3>
    </div>
    <p style="margin: 10px 0 0 2.25rem; font-size: 0.9rem; line-height: 1.5; color: #cbd5e1;">
      Unauthorized login attempts detected. The server session limits have been capped to protect data infrastructure logs.
    </p>
  </div>

  <button class="trigger-action-btn" id="btnFlashTrigger">Simulate System Alert</button>

  <script>
    const card = document.getElementById('warningCardAlert');
    const button = document.getElementById('btnFlashTrigger');

    button.addEventListener('click', () => {
      // Direct asset animation pipeline reset sequence to support manual testing
      card.style.animation = 'none';
      card.offsetHeight; /* Forces internal reflow track to flush active frame layouts */
      card.style.animation = 'warning-flash-decay 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both';
    });
  </script>

</body>
</html>
