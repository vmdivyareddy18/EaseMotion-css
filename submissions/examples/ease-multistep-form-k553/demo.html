<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease Multi-Step Form Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ease-multistep-form" id="form">

    <div class="ease-multistep-form__indicator">
      <div class="step-dot active" data-step="1">1</div>
      <div class="step-line"></div>
      <div class="step-dot" data-step="2">2</div>
      <div class="step-line"></div>
      <div class="step-dot" data-step="3">3</div>
    </div>

    <div class="ease-multistep-form__viewport">

      <div class="ease-multistep-form__step is-active" data-step="1">
        <h2>Account Details</h2>
        <label>Email
          <input type="email" required placeholder="you@example.com" />
        </label>
        <label>Password
          <input type="password" required placeholder="••••••••" />
        </label>
        <button type="button" class="next-btn">Next</button>
      </div>

      <div class="ease-multistep-form__step" data-step="2">
        <h2>Personal Info</h2>
        <label>Full Name
          <input type="text" required placeholder="Jane Doe" />
        </label>
        <label>Phone
          <input type="tel" required placeholder="+1 555 000 0000" />
        </label>
        <div class="btn-row">
          <button type="button" class="prev-btn">Back</button>
          <button type="button" class="next-btn">Next</button>
        </div>
      </div>

      <div class="ease-multistep-form__step" data-step="3">
        <h2>Confirm</h2>
        <p>Review your details and submit.</p>
        <div class="btn-row">
          <button type="button" class="prev-btn">Back</button>
          <button type="button" class="submit-btn">Submit</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const steps = [...form.querySelectorAll('.ease-multistep-form__step')];
    const dots = [...form.querySelectorAll('.step-dot')];
    let current = 0;

    function goToStep(index, direction) {
      const currentStep = steps[current];
      const nextStep = steps[index];

      currentStep.classList.add(direction === 'forward' ? 'exit-left' : 'exit-right');
      currentStep.classList.remove('is-active');

      nextStep.classList.add(direction === 'forward' ? 'enter-right' : 'enter-left');
      nextStep.classList.add('is-active');

      requestAnimationFrame(() => {
        nextStep.classList.remove('enter-right', 'enter-left');
      });

      currentStep.addEventListener('transitionend', () => {
        currentStep.classList.remove('exit-left', 'exit-right');
      }, { once: true });

      dots[index].classList.add('active');
      if (direction === 'back') dots[current].classList.remove('active');

      current = index;
    }

    function validateStep(stepEl) {
      const inputs = [...stepEl.querySelectorAll('input[required]')];
      let valid = true;
      inputs.forEach(input => {
        if (!input.value.trim()) {
          valid = false;
          input.classList.add('shake');
          input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
        }
      });
      return valid;
    }

    form.querySelectorAll('.next-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (validateStep(steps[current])) {
          goToStep(current + 1, 'forward');
        } else {
          dots[current].classList.add('shake');
          dots[current].addEventListener('animationend', () => dots[current].classList.remove('shake'), { once: true });
        }
      });
    });

    form.querySelectorAll('.prev-btn').forEach(btn => {
      btn.addEventListener('click', () => goToStep(current - 1, 'back'));
    });

    form.querySelector('.submit-btn').addEventListener('click', () => {
      alert('Form submitted! (demo only)');
    });
  </script>

</body>
</html>
