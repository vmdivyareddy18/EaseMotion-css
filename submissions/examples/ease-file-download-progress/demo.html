<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ease File Download Progress — Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
    }
  </style>
</head>
<body>

  <div class="ease-download" role="status" aria-live="polite">
    <div class="download-header">
      <div class="file-icon">📄</div>
      <div class="file-info">
        <div class="file-name">EaseMotion-Design-Kit.zip</div>
        <div class="file-status">Downloading… 0%</div>
      </div>
      <span class="download-percent">0%</span>
      <svg class="complete-check" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <div class="download-track">
      <div class="download-fill"></div>
    </div>
  </div>

  <script src="download-progress.js"></script>
</body>
</html>
