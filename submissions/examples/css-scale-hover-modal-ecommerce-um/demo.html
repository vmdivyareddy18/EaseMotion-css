<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-Commerce Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="ecom-modal-toggle" class="ease-ecom-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="ecom-modal-toggle" class="ease-ecom-trigger-um" tabindex="0">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    Checkout ($129.00)
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-ecom-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="ecom-modal-toggle" class="ease-ecom-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-ecom-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Header -->
      <div class="ease-ecom-header-um">
        <div>
          <h2 id="modal-title" class="ease-ecom-title-um">Order Summary</h2>
          <div class="ease-ecom-price-um">$129.00</div>
        </div>
        <label for="ecom-modal-toggle" class="ease-ecom-close-icon-um" aria-label="Close Modal">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </label>
      </div>

      <!-- Body -->
      <div class="ease-ecom-body-um">
        <div class="ease-ecom-item-um">
          <div>
            <div class="ease-ecom-item-name-um">Premium Wireless Headphones</div>
            <div class="ease-ecom-item-meta-um">Qty: 1 · Color: Matte Black</div>
          </div>
          <div class="ease-ecom-item-name-um">$129.00</div>
        </div>
      </div>
      
      <!-- Footer -->
      <div class="ease-ecom-footer-um">
        <label for="ecom-modal-toggle" class="ease-ecom-btn-um">
          Pay Now
        </label>
        <div class="ease-ecom-secure-um">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          Secure 256-bit SSL encryption
        </div>
      </div>
      
    </div>
  </div>

</body>
</html>
