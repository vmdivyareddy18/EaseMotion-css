<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input with Floating Label</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="fl-card">
      <div class="fl-group">
        <input type="text" class="fl-input" id="flName" placeholder=" " autocomplete="off" />
        <label class="fl-label" for="flName">Full Name</label>
      </div>
      <div class="fl-group">
        <input type="email" class="fl-input" id="flEmail" placeholder=" " autocomplete="off" />
        <label class="fl-label" for="flEmail">Email Address</label>
      </div>
      <div class="fl-group">
        <textarea class="fl-input fl-textarea" id="flMessage" placeholder=" "></textarea>
        <label class="fl-label" for="flMessage">Message</label>
      </div>
    </div>
  </div>
</body>
</html>
