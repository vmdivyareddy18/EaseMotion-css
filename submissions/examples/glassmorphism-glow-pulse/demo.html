<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Glow Pulse</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Vibrant background elements to showcase the glass blur -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <main class="demo-container">
    <!-- Glassmorphic Card -->
    <div class="glass-card">
      <div class="card-header">
        <span class="badge">Pro Tier</span>
        <h2 class="title">Unlock Limitless Creativity</h2>
      </div>
      
      <p class="desc">Elevate your workflow with advanced AI tools, priority rendering, and limitless cloud storage.</p>
      
      <div class="features">
        <div class="feature-item">✨ 4K Asset Export</div>
        <div class="feature-item">☁️ 1TB Cloud Drive</div>
      </div>

      <!-- The Element with the Glow Pulse -->
      <button class="glass-btn pulse-glow">
        Upgrade to Pro
      </button>
    </div>
  </main>
</body>
</html>
