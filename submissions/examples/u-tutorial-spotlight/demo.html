<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-tutorial-spotlight</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-ui">

    <header class="topbar">
        <h1>EaseMotion Dashboard</h1>
        <button>Settings</button>
    </header>

    <section class="content">

        <div class="card spotlight-step-1">
            <h2>Profile Card</h2>
            <p>This element is highlighted in step 1.</p>
        </div>

        <div class="card spotlight-step-2">
            <h2>Analytics Panel</h2>
            <p>This element is highlighted in step 2.</p>
        </div>

        <div class="card spotlight-step-3">
            <h2>Notifications</h2>
            <p>This element is highlighted in step 3.</p>
        </div>

    </section>

</div>

<div class="tutorial-overlay">

    <div class="spotlight"></div>

    <div class="tutorial-box">
        <h3>Interactive Tutorial</h3>
        <p>
            Spotlight smoothly moves between important UI elements.
        </p>

        <div class="steps">
            <span>Step 1</span>
            <span>Step 2</span>
            <span>Step 3</span>
        </div>
    </div>

</div>

</body>
</html>
