<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Pulse-Active Tooltip - Dashboard Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="dashboard-container">
    <header class="dashboard-header">
      <h1>Performance Overview</h1>
      <p>Monitor real-time system metrics. Hover or focus on the trend pills to view historical anomalies.</p>
    </header>

    <div class="metrics-grid">
      <section class="metric-card">
        <div class="metric-title">Active Platform Users</div>
        <div class="metric-row">
          <span class="metric-value">12,842</span>
          <button class="trend-badge positive tooltip-container" aria-describedby="tip-users">
            ↑ 14.2%
            <span id="tip-users" class="tooltip" role="tooltip">
              <span class="pulse-halo"></span>
              📈 Target trajectory surpassed by 4.2% this week.
            </span>
          </button>
        </div>
      </section>

      <section class="metric-card">
        <div class="metric-title">API Response Latency</div>
        <div class="metric-row">
          <span class="metric-value">94 ms</span>
          <button class="trend-badge warning tooltip-container" aria-describedby="tip-latency">
            ↓ 3.8%
            <span id="tip-latency" class="tooltip" role="tooltip">
              <span class="pulse-halo"></span>
              ⚠️ Minor queue processing backlog on Node-B.
            </span>
          </button>
        </div>
      </section>
    </div>
  </main>

</body>
</html>
