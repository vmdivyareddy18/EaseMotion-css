<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Only Flip Pricing Cards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Choose Your Plan</h1>
    <input type="checkbox" id="toggle">
    <label for="toggle" class="switch">
        <span>Monthly</span>
        <span>Yearly</span>
    </label>
    <div class="cards">
        <div class="card">
            <h2>Basic</h2>
            <div class="price monthly">$9<span>/mo</span></div>
            <div class="price yearly">$90<span>/yr</span></div>
            <ul>
                <li>1 Project</li>
                <li>Email Support</li>
                <li>5 GB Storage</li>
            </ul>
            <button>Select Plan</button>
        </div>
        <div class="card popular">
            <div class="badge">Popular</div>
            <h2>Pro</h2>
            <div class="price monthly">$19<span>/mo</span></div>
            <div class="price yearly">$190<span>/yr</span></div>
            <ul>
                <li>10 Projects</li>
                <li>Priority Support</li>
                <li>100 GB Storage</li>
            </ul>
            <button>Select Plan</button>
        </div>
        <div class="card">
            <h2>Enterprise</h2>
            <div class="price monthly">$39<span>/mo</span></div>
            <div class="price yearly">$390<span>/yr</span></div>
            <ul>
                <li>Unlimited Projects</li>
                <li>24/7 Support</li>
                <li>1 TB Storage</li>
            </ul>
            <button>Select Plan</button>
        </div>
    </div>
</div>
</body>
</html>
