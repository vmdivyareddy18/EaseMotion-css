<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snackbar Action · EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Snackbar Action</h1>
    <div class="controls">
      <button class="btn btn--primary" id="showSingle">Show Snackbar</button>
      <button class="btn btn--secondary" id="showQueue">Queue Multiple</button>
    </div>
  </div>

  <div class="snackbars" id="snackbars"></div>

  <script>
    (function () {
      var queue = [];
      var showing = false;

      function show(message, actionLabel) {
        queue.push({ message: message || 'File saved successfully.', action: actionLabel || 'Undo' });
        process();
      }

      function process() {
        if (showing || queue.length === 0) return;
        showing = true;
        var item = queue.shift();
        var container = document.getElementById('snackbars');
        var el = document.createElement('div');
        el.className = 'snackbar';
        el.innerHTML =
          '<p class="snackbar__message">' + item.message + '</p>' +
          '<button class="snackbar__action">' + item.action + '</button>';

        container.appendChild(el);

        requestAnimationFrame(function () {
          el.classList.add('snackbar--visible');
        });

        var timer = setTimeout(function () { dismiss(el); }, 4000);
        el._timer = timer;

        el.querySelector('.snackbar__action').addEventListener('click', function () {
          clearTimeout(timer);
          dismiss(el);
        });

        // Swipe to dismiss (touch)
        var startX = 0;
        el.addEventListener('touchstart', function (e) {
          startX = e.touches[0].clientX;
        }, { passive: true });

        el.addEventListener('touchmove', function (e) {
          var dx = e.touches[0].clientX - startX;
          if (dx < 0) el.style.transform = 'translateX(' + dx + 'px)';
        }, { passive: true });

        el.addEventListener('touchend', function (e) {
          var dx = e.changedTouches[0].clientX - startX;
          if (dx < -60) {
            clearTimeout(timer);
            dismiss(el);
          } else {
            el.style.transform = '';
          }
        }, { passive: true });
      }

      function dismiss(el) {
        if (el.classList.contains('snackbar--dismissing')) return;
        el.classList.remove('snackbar--visible');
        el.classList.add('snackbar--dismissing');
        el.addEventListener('transitionend', function () {
          el.remove();
          showing = false;
          process();
        }, { once: true });
      }

      document.getElementById('showSingle').addEventListener('click', function () {
        show('File saved successfully.', 'Undo');
      });

      document.getElementById('showQueue').addEventListener('click', function () {
        var msgs = ['Download complete.', 'Changes synced.', 'New update available.', 'Profile updated.'];
        var acts = ['View', 'Sync', 'Update', 'OK'];
        msgs.forEach(function (m, i) {
          setTimeout(function () {
            show(m, acts[i]);
          }, i * 700);
        });
      });
    })();
  </script>
</body>
</html>
