<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Input Success Check - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="demo-wrapper">
    <header class="demo-header">
      <h1>EaseMotion Input Success Check</h1>
      <p>A satisfying, springy checkmark animation triggered on valid input.</p>
    </header>

    <main class="demo-grid">
      <!-- Interactive Demo -->
      <section class="demo-card">
        <h2>Interactive Form Validation</h2>
        <p class="instruction">Type a username longer than 3 characters to see the animation.</p>
        
        <div class="form-group">
          <label for="username">Username</label>
          <div class="ease-input-wrapper">
            <!-- The Input Element -->
            <input type="text" id="username" class="ease-input" placeholder="e.g. johndoe99" />
            
            <!-- The Success Checkmark SVG -->
            <svg class="ease-success-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>
        
      </section>

      <!-- Static State Demo -->
      <section class="demo-card">
        <h2>Component States</h2>
        
        <div class="form-group" style="margin-bottom: 1.5rem;">
          <label>Default State</label>
          <div class="ease-input-wrapper">
            <input type="text" class="ease-input" value="Typing..." />
            <svg class="ease-success-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label>Valid State (.ease-valid)</label>
          <div class="ease-input-wrapper">
            <input type="text" class="ease-input ease-valid" value="ValidUsername!" readonly />
            <svg class="ease-success-check" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
        </div>
        
      </section>
    </main>
  </div>

  <script>
    const usernameInput = document.getElementById('username');

    // Simple validation: valid if length > 3
    usernameInput.addEventListener('input', (e) => {
      const value = e.target.value.trim();
      
      if (value.length > 3) {
        // Add the success class
        usernameInput.classList.add('ease-valid');
      } else {
        // Remove the success class
        usernameInput.classList.remove('ease-valid');
      }
    });
  </script>
</body>
</html>
