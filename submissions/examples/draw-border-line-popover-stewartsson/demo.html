<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Console - Draw-Border Line Popover Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="saas-viewport">
        <!-- Interactive Micro-Frontend SaaS Control Hub Card Layout -->
        <div class="control-container-card">
            <header class="control-header">
                <div class="neon-matrix-badge">PLATFORM SETUP</div>
                <h2 class="control-title">Cluster Provisioning</h2>
                <p class="control-subtitle">Hover over the action module selector below to trigger the pure-CSS draw-border line popover menu overlay.</p>
            </header>

            <!-- Advanced Pure-CSS Popover Workspace Section Stage Canvas Area -->
            <div class="popover-workspace-area">
                <div class="popover-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="popover-trigger-btn">
                        <span class="btn-icon">⚡</span>
                        <span class="btn-text">Open Context Terminal</span>
                    </button>

                    <!-- Floating Popover Floating Overlay Menu Shell Box -->
                    <div class="draw-border-popover ease-border-draw">
                        <!-- Dual-Axis Outline Draw Border Line Segment Components -->
                        <div class="border-line line-top-left"></div>
                        <div class="border-line line-bottom-right"></div>
                        
                        <!-- Internal Popover Grid Content Overlay Block Container -->
                        <div class="popover-inner-content">
                            <h4 class="menu-heading">Node Control Actions</h4>
                            <ul class="menu-actions-list">
                                <li class="menu-item"><a href="#sync" class="action-link-node">Initialize Ingress Sync</a></li>
                                <li class="menu-item"><a href="#verify" class="action-link-node">Verify Ledger Matrices</a></li>
                                <li class="menu-item"><a href="#purge" class="action-link-node action-danger">Purge Cache Blocks</a></li>
                            </ul>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="control-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Custom CSS Parameters Verified Pass</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
