<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Pulse Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="demo-container">
        <h1>Glow Pulse Animation Effect</h1>

        <div class="demo-section">
            <h2>CTAssistant Button</h2>
            <button class="btn btn-primary glow-pulse">
                Get Started
            </button>
        </div>

        <div class="demo-section">
            <h2>Notification Badge</h2>
            <div class="badge-wrapper">
                <span class="badge glow-pulse">New</span>
            </div>
        </div>

        <div class="demo-section">
            <h2>Interactive Icon</h2>
            <div class="icon-container">
                <svg class="icon glow-pulse" viewBox="0 0 24 24" width="48" height="48">
                    <circle cx="12" cy="12" r="10" fill="currentColor" />
                </svg>
            </div>
        </div>

        <div class="demo-section">
            <h2>Custom Duration</h2>
            <div class="glow-pulse" style="--glow-duration: 2s; --glow-intensity: 0.8; text-align: center;">
                Slower Glow
            </div>
        </div>
    </div>
</body>

</html>
