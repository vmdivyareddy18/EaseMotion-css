<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dataset Quality Scoreboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Dataset Quality Scoreboard</h1>

        <p class="subtitle">
            Monitor data quality metrics before publishing analytics datasets.
        </p>

        <div class="scoreboard">

            <div class="score">

                <span>Overall Score</span>

                <strong>92%</strong>

            </div>

            <div class="ring">

                <div class="inner">

                    <strong>A</strong>

                    <span>Quality</span>

                </div>

            </div>

        </div>

        <div class="metrics">

            <div class="metric">

                <span>Completeness</span>

                <strong>96%</strong>

                <div class="bar">
                    <div class="fill complete"></div>
                </div>

            </div>

            <div class="metric">

                <span>Accuracy</span>

                <strong>91%</strong>

                <div class="bar">
                    <div class="fill accurate"></div>
                </div>

            </div>

            <div class="metric">

                <span>Consistency</span>

                <strong>89%</strong>

                <div class="bar">
                    <div class="fill consistent"></div>
                </div>

            </div>

            <div class="metric">

                <span>Duplicate Records</span>

                <strong>2%</strong>

                <div class="bar">
                    <div class="fill duplicate"></div>
                </div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Rows</span>

                <strong>125K</strong>

            </div>

            <div class="stat">

                <span>Columns</span>

                <strong>48</strong>

            </div>

            <div class="stat">

                <span>Status</span>

                <strong class="good">Ready</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
