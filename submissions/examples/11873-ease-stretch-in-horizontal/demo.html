<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-stretch-in-horizontal</title>
  <meta name="description" content="A demonstration of the ease-stretch-in-horizontal utility animation showing horizontal line-stretch and scale-in transforms from a left origin.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-stretch-in-horizontal</h1>
      <p class="subtitle" id="main-subtitle">Reveals elements by stretching horizontally from the left origin</p>
    </header>

    <div class="display-area">
      <!-- Target 1: A divider line -->
      <div class="preview-row">
        <span class="row-label">Divider Line</span>
        <div class="divider-target ease-stretch-in-horizontal" id="divider-el"></div>
      </div>

      <!-- Target 2: A horizontal card -->
      <div class="preview-row">
        <span class="row-label">Container Block</span>
        <div class="card-target ease-stretch-in-horizontal" id="card-el">
          <span>Stretching Container</span>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="btn-replay" onclick="replayAnimation()">Replay Stretch-In</button>
    </div>
  </main>

  <script>
    function replayAnimation() {
      const divider = document.getElementById('divider-el');
      const card = document.getElementById('card-el');
      
      divider.classList.remove('ease-stretch-in-horizontal');
      card.classList.remove('ease-stretch-in-horizontal');
      
      void divider.offsetWidth;
      void card.offsetWidth;
      
      divider.classList.add('ease-stretch-in-horizontal');
      card.classList.add('ease-stretch-in-horizontal');
    }
  </script>

</body>
</html>
