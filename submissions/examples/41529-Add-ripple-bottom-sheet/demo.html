<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Bottom Sheet - Landing Page</title>
    <link rel="stylesheet" href="../../../easemotion/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Elevate Your Workflow</h1>
            <p class="hero-subtitle">Experience the next generation of seamless web interfaces with our new tools.</p>
            
            <!-- Accessible Checkbox Hack for Pure CSS State -->
            <div class="trigger-container">
                <input type="checkbox" id="bottom-sheet-toggle" class="bottom-sheet-toggle" aria-controls="bottom-sheet" aria-expanded="false">
                <label for="bottom-sheet-toggle" class="ease-btn-ripple">
                    <span>Get Started</span>
                </label>
            </div>
        </div>
    </main>

    <!-- State management for the sheet itself - must be siblings of the trigger container if we want to use the checkbox, but wait, if the checkbox is inside trigger-container, we can't style the sheet. 
    Let's move the checkbox OUTSIDE, right before the overlay. -->
    
    <!-- We actually need the checkbox to be a sibling of the overlay and the sheet -->
    <input type="checkbox" id="bottom-sheet-toggle-state" class="bottom-sheet-toggle visually-hidden">
    
    <label for="bottom-sheet-toggle-state" class="ease-bottom-sheet-overlay" aria-label="Close bottom sheet"></label>

    <aside class="ease-bottom-sheet" id="bottom-sheet" role="dialog" aria-labelledby="sheet-title" aria-modal="true">
        <div class="sheet-drag-handle"></div>
        <h2 id="sheet-title">Create your account</h2>
        <p>Join thousands of professionals building better web experiences.</p>
        <form class="sheet-form">
            <input type="email" placeholder="Email Address" required class="sheet-input">
            <button type="button" class="ease-btn-ripple submit-btn">
                <span>Continue</span>
            </button>
        </form>
        <label for="bottom-sheet-toggle-state" class="close-sheet-btn" aria-label="Close bottom sheet">
            &times;
        </label>
    </aside>

    <!-- Wait, we need the main button to toggle the checkbox. So the main button's label should point to bottom-sheet-toggle-state -->
    
    <script>
        /* Pure CSS fallback explanation: 
           In the real HTML, we use a single hidden checkbox to control the state.
           We've updated the label above via JavaScript to point to it, but let's just fix it in the HTML directly. */
        document.querySelector('.trigger-container').innerHTML = `
            <label for="bottom-sheet-toggle-state" class="ease-btn-ripple main-trigger" tabindex="0">
                <span>Get Started</span>
            </label>
        `;
        // Make Enter/Space work for label with tabindex in case the hidden checkbox is hard to focus
        document.querySelector('.main-trigger').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                document.getElementById('bottom-sheet-toggle-state').click();
            }
        });
    </script>
</body>
</html>
