<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ripple Wave Time Picker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="ease-time-picker">

        <h2>Select Time</h2>

        <div class="picker">

            <span class="ripple ripple-1"></span>
            <span class="ripple ripple-2"></span>

            <input type="time" aria-label="Select time">

        </div>

    </div>

</div>

</body>
</html>
