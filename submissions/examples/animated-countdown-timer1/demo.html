<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Countdown Timer - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Countdown Card -->
    <div class="countdown-card ease-zoom-in">
      
      <!-- Header -->
      <header class="countdown-header">
        <span class="launch-badge ease-bounce-in ease-delay-100">🚀 LAUNCHING SOON</span>
        <h1 class="countdown-title ease-fade-in-up ease-delay-200">New Product Release</h1>
        <p class="countdown-subtitle ease-fade-in-up ease-delay-300">Be the first to experience the future</p>
      </header>

      <!-- Timer Display -->
      <div class="timer-display">
        <div class="time-unit ease-fade-in-up ease-delay-400">
          <div class="time-value" id="days">00</div>
          <div class="time-label">Days</div>
        </div>
        <span class="separator ease-pulse ease-delay-500">:</span>
        <div class="time-unit ease-fade-in-up ease-delay-600">
          <div class="time-value" id="hours">00</div>
          <div class="time-label">Hours</div>
        </div>
        <span class="separator ease-pulse ease-delay-700">:</span>
        <div class="time-unit ease-fade-in-up ease-delay-800">
          <div class="time-value" id="minutes">00</div>
          <div class="time-label">Minutes</div>
        </div>
        <span class="separator ease-pulse ease-delay-900">:</span>
        <div class="time-unit ease-fade-in-up ease-delay-1000">
          <div class="time-value" id="seconds">00</div>
          <div class="time-label">Seconds</div>
        </div>
      </div>

      <!-- Call to Action -->
      <div class="countdown-actions ease-fade-in-up ease-delay-1100">
        <button class="notify-btn ease-hover-grow">
          <span class="btn-icon">🔔</span>
          Notify Me
        </button>
        <p class="urgency-text">⚡ Limited spots available</p>
      </div>

    </div>
  </div>

  <!-- JavaScript for Countdown Logic -->
  <script>
    // Set target date (30 days from now for demo)
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 30);

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate.getTime() - now;

      if (distance < 0) {
        daysEl.textContent = '00';
        hoursEl.textContent = '00';
        minutesEl.textContent = '00';
        secondsEl.textContent = '00';
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      // Animate number changes
      updateWithAnimation(daysEl, days.toString().padStart(2, '0'));
      updateWithAnimation(hoursEl, hours.toString().padStart(2, '0'));
      updateWithAnimation(minutesEl, minutes.toString().padStart(2, '0'));
      updateWithAnimation(secondsEl, seconds.toString().padStart(2, '0'));
    }

    function updateWithAnimation(element, newValue) {
      if (element.textContent !== newValue) {
        element.classList.remove('ease-flip');
        void element.offsetWidth; // Trigger reflow
        element.classList.add('ease-flip');
        element.textContent = newValue;
      }
    }

    // Initial update
    updateCountdown();

    // Update every second
    setInterval(updateCountdown, 1000);

    // Notify button
    document.querySelector('.notify-btn').addEventListener('click', () => {
      alert('You will be notified when we launch!');
    });
  </script>
</body>
</html>
