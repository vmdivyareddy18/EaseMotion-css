<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A neon-inspired notification bell with a spotlight sweep and accessible controls." />
    <title>Spotlight Notification Bell</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page-shell" id="top">
      <section class="hero-card ease-card ease-card-glass ease-card-hover" aria-labelledby="hero-title">
        <div class="bell-panel">
          <div class="bell-wrap" tabindex="0" role="button" aria-label="New notifications available">
            <span class="badge" aria-label="Three unread notifications">3</span>
            <svg class="bell" viewBox="0 0 64 64" focusable="false" aria-hidden="true">
              <path d="M32 8c-7.7 0-14 6.2-14 14v6.2c0 3.3-1.2 6.4-3.4 8.8L10 40h44l-4.6-3c-2.2-2.4-3.4-5.5-3.4-8.8V22c0-7.8-6.3-14-14-14Zm0 48c3.8 0 7-3.1 7-7H25c0 3.9 3.2 7 7 7Z" />
            </svg>
          </div>
        </div>

        <div class="content">
          <p class="eyebrow">Neon alerts</p>
          <h1 id="hero-title" class="hero-title ease-fade-in">Stay in sync with every update.</h1>
          <p class="hero-copy ease-slide-up">
            A bold notification bell with a moving spotlight sweep, glowing highlights, and a soft pulse for live activity.
          </p>
          <a href="#top" class="ease-btn ease-btn-primary">Review Activity</a>
        </div>
      </section>
    </main>
  </body>
</html>
