<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse Art Deco Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="deco-top"></div>

    <h2>Art Deco Collection</h2>

    <p>
        Experience timeless elegance through a luxurious Art Deco inspired
        card featuring a refined Glow Pulse animation built entirely with CSS.
    </p>

    <div class="details">

        <div class="item">
            <span>Year</span>
            <strong>1925</strong>
        </div>

        <div class="item">
            <span>Style</span>
            <strong>Luxury</strong>
        </div>

        <div class="item">
            <span>Gallery</span>
            <strong>28</strong>
        </div>

    </div>

    <button>Explore Collection</button>

</div>

</body>
</html>
