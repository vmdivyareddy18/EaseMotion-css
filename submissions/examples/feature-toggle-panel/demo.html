<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Toggle Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="settings-panel" aria-label="Feature toggles">
    <div class="panel-header">
      <p>Workspace settings</p>
      <h1>Feature toggles</h1>
    </div>
    <label class="toggle-row">
      <span><strong>Smart sync</strong><small>Keep local data updated.</small></span>
      <input type="checkbox" checked>
      <i></i>
    </label>
    <label class="toggle-row">
      <span><strong>Focus alerts</strong><small>Show only priority updates.</small></span>
      <input type="checkbox">
      <i></i>
    </label>
  </section>
</body>
</html>
