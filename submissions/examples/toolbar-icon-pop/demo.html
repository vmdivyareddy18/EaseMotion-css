<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toolbar Icon Pop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion toolbar</p>
    <h1 id="demo-title">Toolbar icon pop</h1>
    <p class="intro">A compact toolbar where icons pop and the active tool gets a soft glow.</p>

    <div class="toolbar" role="toolbar" aria-label="Demo tools">
      <button type="button">B</button>
      <button class="active" type="button">I</button>
      <button type="button">U</button>
    </div>
  </main>
</body>
</html>
