<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gradient Text Shadow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1 class="glow-heading">Neon Glow</h1>
    <p class="sub-glow">Animated layered text shadows with gradient color shifts.</p>
    <div class="swatch-row">
      <span class="swatch" style="--c:#f472b6"></span>
      <span class="swatch" style="--c:#818cf8"></span>
      <span class="swatch" style="--c:#67e8f9"></span>
      <span class="swatch" style="--c:#fbbf24"></span>
    </div>
  </main>
</body>
</html>
