<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Tooltip — EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Animated Tooltip</h1>
  <p class="subtitle">4 positions, fade+slide animation, arrows, light/dark variants</p>

  <div class="demo-grid">
    <div class="demo-col"><h2>Top</h2>
      <div class="ease-tooltip ease-tooltip-top">
        <span class="ease-tooltip-trigger">👆</span>
        <div class="ease-tooltip-content">Tooltip on top</div>
      </div>
    </div>
    <div class="demo-col"><h2>Bottom</h2>
      <div class="ease-tooltip ease-tooltip-bottom">
        <span class="ease-tooltip-trigger">👇</span>
        <div class="ease-tooltip-content">Tooltip on bottom</div>
      </div>
    </div>
    <div class="demo-col"><h2>Left</h2>
      <div class="ease-tooltip ease-tooltip-left">
        <span class="ease-tooltip-trigger">👈</span>
        <div class="ease-tooltip-content">Tooltip on left</div>
      </div>
    </div>
    <div class="demo-col"><h2>Right</h2>
      <div class="ease-tooltip ease-tooltip-right">
        <span class="ease-tooltip-trigger">👉</span>
        <div class="ease-tooltip-content">Tooltip on right</div>
      </div>
    </div>
    <div class="demo-col"><h2>Rich Content</h2>
      <div class="ease-tooltip ease-tooltip-top">
        <span class="ease-tooltip-trigger">📦</span>
        <div class="ease-tooltip-content" style="white-space: normal; text-align: left; max-width: 180px;">
          <strong>Profile</strong><br>
          <span style="font-size: 0.75rem; opacity: 0.8;">View your account settings</span>
        </div>
      </div>
    </div>
    <div class="demo-col"><h2>Light</h2>
      <div class="ease-tooltip ease-tooltip-top ease-tooltip-light">
        <span class="ease-tooltip-trigger">☀️</span>
        <div class="ease-tooltip-content">Light tooltip</div>
      </div>
    </div>
  </div>
</body>
</html>
