<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salt Shaker Animation</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="scene">

        <div class="shaker" id="shaker">
            <div class="cap"></div>
            <div class="body"></div>
        </div>

        <div class="salt-layer">
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
            <span class="salt"></span>
        </div>

    </div>

    <button id="shakeBtn">
        Shake Salt
    </button>

</div>

<script>
const shaker = document.getElementById("shaker");
const button = document.getElementById("shakeBtn");

button.addEventListener("click", () => {

    shaker.classList.remove("animate");

    // Restart animation
    void shaker.offsetWidth;

    shaker.classList.add("animate");

});
</script>

</body>
</html>
