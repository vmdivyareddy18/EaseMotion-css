<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Hook Effect Animation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-box">
        <h2>Hook Effect Animation</h2>
        <p class="subtitle">Hover over the cards to see the hook-in effect</p>
        <div class="cards-grid">
            <div class="ease-hook-card">
                <div class="ease-hook-icon">🚀</div>
                <h3>Launch</h3>
                <p>Animate elements into view with a satisfying hook motion.</p>
            </div>
            <div class="ease-hook-card">
                <div class="ease-hook-icon">✨</div>
                <h3>Design</h3>
                <p>Pure CSS-driven interactions without any heavy libraries.</p>
            </div>
            <div class="ease-hook-card">
                <div class="ease-hook-icon">⚡</div>
                <h3>Speed</h3>
                <p>Lightweight and performant GPU-accelerated animations.</p>
            </div>
        </div>
    </div>
</body>
</html>
