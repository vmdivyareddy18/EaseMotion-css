<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Visibility Toggle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="pvt-container">
    <h1>Password Visibility Toggle</h1>
    <p class="pvt-subtitle">Click the eye icon to toggle password visibility</p>

    <div class="pvt-examples">
      <div class="pvt-field">
        <label for="password1">Default Password</label>
        <div class="pvt-wrapper">
          <input type="password" id="password1" class="pvt-input" value="MySecurePass123!" placeholder="Enter password">
          <button class="pvt-toggle" aria-label="Toggle password visibility" data-target="password1">
            <svg class="pvt-eye" viewBox="0 0 24 24" width="24" height="24">
              <path class="pvt-eye-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              <path class="pvt-slash" d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="pvt-strength" data-for="password1">
          <div class="pvt-strength-bar">
            <div class="pvt-strength-fill"></div>
          </div>
          <span class="pvt-strength-label">Medium</span>
        </div>
      </div>

      <div class="pvt-field">
        <label for="password2">With Strength Indicator</label>
        <div class="pvt-wrapper">
          <input type="password" id="password2" class="pvt-input" value="weak" placeholder="Enter password">
          <button class="pvt-toggle" aria-label="Toggle password visibility" data-target="password2">
            <svg class="pvt-eye" viewBox="0 0 24 24" width="24" height="24">
              <path class="pvt-eye-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              <path class="pvt-slash" d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div class="pvt-strength" data-for="password2">
          <div class="pvt-strength-bar">
            <div class="pvt-strength-fill"></div>
          </div>
          <span class="pvt-strength-label">Weak</span>
        </div>
      </div>

      <div class="pvt-field">
        <label for="password3">Disabled Toggle</label>
        <div class="pvt-wrapper">
          <input type="password" id="password3" class="pvt-input" value="p@ssw0rd" placeholder="Enter password" disabled>
          <button class="pvt-toggle" aria-label="Toggle password visibility" data-target="password3" disabled>
            <svg class="pvt-eye" viewBox="0 0 24 24" width="24" height="24">
              <path class="pvt-eye-path" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
              <path class="pvt-slash" d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.pvt-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        const input = document.getElementById(btn.dataset.target);
        if (!input) return;
        const isPassword = input.type === 'password';
        input.type = isPassword ? 'text' : 'password';
        btn.classList.toggle('pvt-visible', isPassword);
        input.focus();
      });
    });

    document.querySelectorAll('.pvt-input').forEach(input => {
      input.addEventListener('input', () => {
        const strength = input.parentElement.parentElement.querySelector('.pvt-strength');
        if (!strength) return;
        const val = input.value;
        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[a-z]/.test(val)) score++;
        if (/\d/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;
        const levels = ['Weak', 'Medium', 'Strong', 'Very Strong', 'Excellent'];
        const idx = Math.min(score, levels.length - 1);
        const fill = strength.querySelector('.pvt-strength-fill');
        const label = strength.querySelector('.pvt-strength-label');
        const pct = ((idx + 1) / levels.length) * 100;
        fill.style.width = pct + '%';
        fill.style.background = idx < 2 ? '#ef4444' : idx < 3 ? '#f59e0b' : '#22c55e';
        label.textContent = levels[idx];
      });
    });
  </script>
</body>
</html>
