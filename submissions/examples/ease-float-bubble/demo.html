<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Bubbles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h2>Floating Bubbles</h2>
    <div class="bubble-field">
      <div class="bubble" style="--s:30px;--d:0s;--x:20%"></div>
      <div class="bubble" style="--s:20px;--d:1s;--x:60%"></div>
      <div class="bubble" style="--s:40px;--d:2s;--x:40%"></div>
      <div class="bubble" style="--s:25px;--d:0.5s;--x:75%"></div>
      <div class="bubble" style="--s:35px;--d:1.5s;--x:10%"></div>
    </div>
  </div>
</body>
</html>
