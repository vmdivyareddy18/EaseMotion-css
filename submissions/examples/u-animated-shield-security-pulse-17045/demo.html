<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Shield Security Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Shield Security Pulse</h1>

    <p>
      A reusable security indicator animation designed for
      authentication, monitoring, and cybersecurity interfaces.
    </p>

    <div class="demo-grid">

      <button class="security-button">
        <span class="shield-icon">🛡️</span>
      </button>

      <button class="security-button card-style">
        <span class="shield-icon">🛡️</span>
        <span>Protected</span>
      </button>

      <div class="security-card">
        <h3>System Protected</h3>
        <p>
          Active monitoring and security checks are enabled.
        </p>

        <button class="security-button small">
          <span class="shield-icon">🛡️</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
