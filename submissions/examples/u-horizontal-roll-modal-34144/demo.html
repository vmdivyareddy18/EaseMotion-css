<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Horizontal Roll Modal
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Cyberpunk Neon

</span>

<h1>

Horizontal Roll Modal

</h1>

<p>

A futuristic cyberpunk modal
featuring glowing neon colors,
glass effects and a dramatic
horizontal roll interaction.

</p>

<input
type="checkbox"
id="modal-toggle">

<label
for="modal-toggle"
class="open-btn">

Launch Modal

</label>

<div class="overlay">

<div class="modal">

<label
for="modal-toggle"
class="close">

✕

</label>

<div class="modal-content">

<div class="icon">

⚡

</div>

<h2>

Neon Interface

</h2>

<p>

A pure CSS modal inspired by
cyberpunk aesthetics featuring
vivid glows, animated shadows
and immersive interactions.

</p>

<button>

Explore

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
