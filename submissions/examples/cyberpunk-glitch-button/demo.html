<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Glitch & Slicing Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Cyberpunk Glitch & Slicing Button</h1>
  <p class="subtitle">A highly stylized button that, on hover, experiences a digital "glitch"—slicing the button horizontally, shifting RGB channels, and stuttering.</p>
  <section class="demo">
    <h2>Demo</h2>
    <p class="sec-desc">Hover the button to see the glitch effect</p>
    <div class="demo-container">
      <button class="glitch-btn" data-text="GLITCH">GLITCH</button>
    </div>
  </section>
  <section class="docs">
    <h2>Usage</h2>
<pre><code>&lt;button class=&quot;glitch-btn&quot; data-text=&quot;GLITCH&quot;&gt;GLITCH&lt;/button&gt;</code></pre>
  </section>
</body>
</html>
