<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease: Address Autocomplete</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Address Autocomplete</h1>
    <p>Type an address — suggestions appear with a smooth slide-and-fade effect.</p>
    <form class="address-form" id="addressForm">
      <div class="field-group">
        <label for="street">Street Address</label>
        <div class="autocomplete-wrapper">
          <input type="text" id="street" placeholder="e.g. 123 Main St" autocomplete="off">
          <ul class="dropdown" id="dropdown"></ul>
        </div>
      </div>
      <div class="field-row">
        <div class="field-group">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="City">
        </div>
        <div class="field-group">
          <label for="state">State</label>
          <input type="text" id="state" placeholder="State">
        </div>
        <div class="field-group">
          <label for="zip">ZIP</label>
          <input type="text" id="zip" placeholder="ZIP">
        </div>
      </div>
    </form>
  </main>
  <script>
    const suggestions = [
      { street: '123 Main Street', city: 'Springfield', state: 'IL', zip: '62701' },
      { street: '456 Oak Avenue', city: 'Portland', state: 'OR', zip: '97201' },
      { street: '789 Pine Road', city: 'Denver', state: 'CO', zip: '80201' },
      { street: '321 Elm Boulevard', city: 'Austin', state: 'TX', zip: '73301' },
      { street: '654 Maple Drive', city: 'Seattle', state: 'WA', zip: '98101' },
      { street: '987 Cedar Lane', city: 'Boston', state: 'MA', zip: '02101' },
    ];

    const streetInput = document.getElementById('street');
    const dropdown = document.getElementById('dropdown');
    const cityInput = document.getElementById('city');
    const stateInput = document.getElementById('state');
    const zipInput = document.getElementById('zip');

    streetInput.addEventListener('input', () => {
      const val = streetInput.value.toLowerCase();
      dropdown.innerHTML = '';
      if (!val) { dropdown.classList.remove('visible'); return; }
      const matches = suggestions.filter(s => s.street.toLowerCase().includes(val));
      if (!matches.length) { dropdown.classList.remove('visible'); return; }
      matches.forEach(s => {
        const li = document.createElement('li');
        li.textContent = s.street;
        li.addEventListener('click', () => {
          streetInput.value = s.street;
          cityInput.value = s.city;
          stateInput.value = s.state;
          zipInput.value = s.zip;
          dropdown.classList.remove('visible');
          streetInput.classList.add('filled');
          setTimeout(() => streetInput.classList.remove('filled'), 600);
        });
        dropdown.appendChild(li);
      });
      dropdown.classList.add('visible');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.autocomplete-wrapper')) {
        dropdown.classList.remove('visible');
      }
    });
  </script>
</body>
</html>
