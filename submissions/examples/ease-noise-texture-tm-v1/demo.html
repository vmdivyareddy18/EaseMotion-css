<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Texture</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="container">
  <h1>Noise Texture Overlay</h1>
  <p>SVG filter-based grain without any image assets.</p>
  <div class="noise-card light"><div class="noise-overlay"></div><h3>Light Card</h3><p>Grainy texture on a light background.</p></div>
  <div class="noise-card dark"><div class="noise-overlay"></div><h3>Dark Card</h3><p>Grainy texture on a dark background.</p></div>
  <div class="noise-hero"><div class="noise-overlay"></div><h2>Hero with Grain</h2><p>Adds tactile depth to flat surfaces.</p></div>
  <div class="noise-animated"><div class="noise-overlay animated"></div><p>Animated grain (subtle flicker)</p></div>
</div>
</body></html>
