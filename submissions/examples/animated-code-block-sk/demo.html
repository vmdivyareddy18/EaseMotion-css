<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Code Block</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="code-block">
    <div class="code-block__header">
      <span class="code-block__lang">javascript</span>
      <span class="code-block__copy"></span>
    </div>
    <pre class="code-block__pre"><code>function <span class="code-fn">greet</span>(<span class="code-param">name</span>) {
  const <span class="code-var">msg</span> = <span class="code-string">`Hello, <span class="code-int">${</span><span class="code-param">name</span><span class="code-int">}</span>!`</span>;
  <span class="code-key">console</span>.<span class="code-method">log</span>(<span class="code-var">msg</span>);
  <span class="code-key">return</span> <span class="code-var">msg</span>;
}

<span class="code-fn">greet</span>(<span class="code-string">"World"</span>);</code></pre>
  </div>
</body>
</html>
