<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rainbow Border Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Rainbow Border</h1>
    
    <!-- Button Variant -->
    <div class="variant">
      <button class="rainbow-border rainbow-border--button">
        <span>Get Started</span>
      </button>
      <span class="label">CTA Button</span>
    </div>
    
    <!-- Badge Variant -->
    <div class="variant">
      <div class="rainbow-border rainbow-border--badge">
        <span>PREMIUM</span>
      </div>
      <span class="label">Premium Badge</span>
    </div>
    
    <!-- Card Variant -->
    <div class="variant">
      <div class="rainbow-border rainbow-border--card">
        <div class="card-content">
          <h3>Pro Plan</h3>
          <p>$29/month</p>
        </div>
      </div>
      <span class="label">Pricing Card</span>
    </div>
    
    <!-- Avatar Ring Variant -->
    <div class="variant">
      <div class="rainbow-border rainbow-border--avatar">
        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar">
      </div>
      <span class="label">Avatar Ring</span>
    </div>
    
    <!-- Slow Speed Variant -->
    <div class="variant">
      <button class="rainbow-border rainbow-border--button rainbow-border--slow">
        <span>Slow Rotate</span>
      </button>
      <span class="label">Slow Animation</span>
    </div>
    
    <!-- Static Variant (no animation) -->
    <div class="variant">
      <div class="rainbow-border rainbow-border--badge rainbow-border--static">
        <span>STATIC</span>
      </div>
      <span class="label">Static Gradient</span>
    </div>
  </div>
</body>
</html>
