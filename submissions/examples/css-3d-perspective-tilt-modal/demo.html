<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Perspective Tilt Modal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="page">
    <h1>Minimal Tech UI</h1>
    <p>Click the button to open the 3D tilt modal</p>

    <button class="open-btn" onclick="openModal()">Open Modal</button>
  </div>

  <div class="overlay" id="overlay" onclick="closeModal()"></div>

  <div class="modal" id="modal" tabindex="0">
    <div class="modal-content">
      <h2>3D Perspective Modal</h2>
      <p>This modal uses pure CSS 3D transform + hover tilt effect.</p>
      <button class="close-btn" onclick="closeModal()">Close</button>
    </div>
  </div>

  <script>
    const modal = document.getElementById("modal");
    const overlay = document.getElementById("overlay");

    function openModal() {
      modal.classList.add("active");
      overlay.classList.add("active");
    }

    function closeModal() {
      modal.classList.remove("active");
      overlay.classList.remove("active");
    }

    // ESC key support
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeModal();
    });
  </script>

</body>
</html>
