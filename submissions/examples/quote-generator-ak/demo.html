<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="quote-wrapper">

    <h1>Random Quote</h1>

    <div class="quote-card" id="quoteCard">
      <p class="quote-text" id="quoteText">Click the button to get a quote</p>
      <p class="quote-author" id="quoteAuthor">&mdash;</p>
    </div>

    <button class="new-quote-btn" id="newQuoteBtn">New Quote</button>

  </div>

  <script>
    const quotes = [
      { text: 'The only way to do great work is to love what you do.', author: 'Steve Jobs' },
      { text: 'In the middle of difficulty lies opportunity.', author: 'Albert Einstein' },
      { text: 'Be the change you wish to see in the world.', author: 'Mahatma Gandhi' },
      { text: 'Success is not final, failure is not fatal: it is the courage to continue that counts.', author: 'Winston Churchill' },
      { text: 'The future belongs to those who believe in the beauty of their dreams.', author: 'Eleanor Roosevelt' },
      { text: 'It does not matter how slowly you go as long as you do not stop.', author: 'Confucius' },
      { text: 'Believe you can and you are halfway there.', author: 'Theodore Roosevelt' },
      { text: 'The only impossible journey is the one you never begin.', author: 'Tony Robbins' },
      { text: 'What lies behind us and what lies before us are tiny matters compared to what lies within us.', author: 'Ralph Waldo Emerson' },
      { text: 'The best time to plant a tree was 20 years ago. The second best time is now.', author: 'Chinese Proverb' },
      { text: 'Everything you have ever wanted is on the other side of fear.', author: 'George Addair' },
      { text: 'Happiness is not something ready made. It comes from your own actions.', author: 'Dalai Lama' },
    ];

    const textEl = document.getElementById('quoteText');
    const authorEl = document.getElementById('quoteAuthor');
    const card = document.getElementById('quoteCard');
    const btn = document.getElementById('newQuoteBtn');
    let lastIndex = -1;

    function getRandomQuote() {
      let idx;
      do {
        idx = Math.floor(Math.random() * quotes.length);
      } while (idx === lastIndex && quotes.length > 1);
      lastIndex = idx;
      return quotes[idx];
    }

    function showQuote() {
      card.classList.remove('fade-in');
      void card.offsetWidth;

      const q = getRandomQuote();
      textEl.textContent = '\u201C' + q.text + '\u201D';
      authorEl.textContent = '\u2014 ' + q.author;

      card.classList.add('fade-in');
    }

    btn.addEventListener('click', showQuote);
    showQuote();
  </script>

</body>
</html>
