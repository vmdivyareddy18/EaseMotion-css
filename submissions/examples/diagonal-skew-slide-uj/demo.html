<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagonal Skew Slide Button Demo (uj)</title>

  <!--
    Self-contained demo. No server required, no CDN, no external frameworks.
    All styles are inlined or loaded from style.css in the same folder.
  -->

  <style>
    /* ── Design tokens ── */
    :root {
      --ease-color-primary:        #6c63ff;
      --ease-color-bg:             #f8fafc;
      --ease-color-surface:        #ffffff;
      --ease-color-text:           #1e293b;
      --ease-color-muted:          #64748b;
      --ease-color-neutral-200:    #e2e8f0;
      --ease-font-sans:            system-ui, -apple-system, 'Segoe UI', sans-serif;
      --ease-shadow-md:            0 4px 6px -1px rgba(0,0,0,0.10), 0 2px 4px -1px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --ease-color-bg:       #0b1121;
        --ease-color-surface:  #141e33;
        --ease-color-text:     #e2e8f0;
        --ease-color-muted:    #94a3b8;
        --ease-color-neutral-200: #334155;
      }
    }

    /* ── Page layout ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ease-font-sans);
      background: var(--ease-color-bg);
      color: var(--ease-color-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2.5rem;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      max-width: 560px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--ease-color-text);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: var(--ease-color-muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    /* ── Showcase layout ── */
    .showcase-container {
      background: var(--ease-color-surface);
      border: 1px solid var(--ease-color-neutral-200);
      box-shadow: var(--ease-shadow-md);
      border-radius: 1rem;
      padding: 3rem 2rem;
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
    }

    /* Custom color button overrides */
    .btn-dark {
      border-color: var(--ease-color-text);
      color: var(--ease-color-text);
    }
    .btn-dark::before {
      background: var(--ease-color-text);
    }

    .btn-coral {
      border-color: #ff5a5f;
      color: #ff5a5f;
    }
    .btn-coral::before {
      background: #ff5a5f;
    }

    .btn-emerald {
      border-color: #10b981;
      color: #10b981;
    }
    .btn-emerald::before {
      background: #10b981;
    }
  </style>

  <!-- Load the submission style -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="page-header">
    <h1>Diagonal Skew Slide Button</h1>
    <p>
      Hover over the buttons below to see a slanted, solid color background slide in diagonally to fill the frame.
    </p>
  </header>

  <main class="showcase-container">
    <!-- Default primary color button -->
    <button class="skew-slide-uj">
      Primary Action
    </button>

    <!-- Dark themed button -->
    <button class="skew-slide-uj btn-dark">
      Secondary Action
    </button>

    <!-- Coral themed button -->
    <button class="skew-slide-uj btn-coral">
      Coral Vibe
    </button>

    <!-- Emerald themed button -->
    <button class="skew-slide-uj btn-emerald">
      Success State
    </button>
  </main>

</body>
</html>
