<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascading Rich Text Toolbar</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="editor">

    <div class="toolbar">

        <button>B</button>
        <button><i>I</i></button>
        <button><u>U</u></button>

        <div class="dropdown">
            <button>Heading ▾</button>

            <div class="menu">
                <button>H1</button>
                <button>H2</button>
                <button>H3</button>
            </div>
        </div>


        <div class="dropdown">
            <button>Align ▾</button>

            <div class="menu">
                <button>Left</button>
                <button>Center</button>
                <button>Right</button>
            </div>
        </div>


        <div class="dropdown">
            <button>Insert ▾</button>

            <div class="menu">
                <button>Image</button>
                <button>Link</button>
                <button>Code</button>
            </div>
        </div>

    </div>


    <div class="content" contenteditable="true">
        Start writing your blog content here...
    </div>

</div>


</body>
</html>
