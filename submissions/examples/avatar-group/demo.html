<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Stack with Hover Expand - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="demo-title">Avatar Group Expand</h1>
    
    <div class="ease-demo-container">
        <!-- Avatar Stack Component -->
        <div class="ease-avatar-stack">
            <div class="ease-avatar" data-name="Alex Johnson">
                <img src="https://i.pravatar.cc/150?img=11" alt="Alex Johnson">
            </div>
            <div class="ease-avatar" data-name="Sarah Miller">
                <img src="https://i.pravatar.cc/150?img=47" alt="Sarah Miller">
            </div>
            <div class="ease-avatar" data-name="James Wilson">
                <img src="https://i.pravatar.cc/150?img=33" alt="James Wilson">
            </div>
            <div class="ease-avatar" data-name="Emily Davis">
                <img src="https://i.pravatar.cc/150?img=44" alt="Emily Davis">
            </div>
            <div class="ease-avatar" data-name="Michael Brown">
                <img src="https://i.pravatar.cc/150?img=15" alt="Michael Brown">
            </div>
            <!-- More Indicator Avatar -->
            <div class="ease-avatar ease-avatar-more" data-name="View all members">
                <span>+12</span>
            </div>
        </div>
    </div>
</body>
</html>
