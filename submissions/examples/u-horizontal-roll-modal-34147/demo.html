<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Horizontal Roll Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Accessible Web

</span>

<h1>

Horizontal Roll Modal

</h1>

<p>

Accessible modal component
featuring a smooth horizontal
roll animation designed for
inclusive and responsive
web experiences.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Open Modal

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close"

aria-label="Close Modal">

✕

</label>

<div class="modal-content">

<div class="icon">

♿

</div>

<h2>

Accessible Experience

</h2>

<p>

A pure CSS modal with
high contrast styling,
keyboard accessibility
and smooth rolling motion.

</p>

<button>

Continue

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
