<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alert Banner with Dismiss Animation</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; flex-direction: column; gap: 1rem; padding: 1rem;">
    <div class="alert alert-info" id="alert1">
      <span>ℹ️ This is an informational message.</span>
      <button class="alert-close" data-target="alert1">✕</button>
    </div>
    <div class="alert alert-success" id="alert2">
      <span>✅ Your changes have been saved.</span>
      <button class="alert-close" data-target="alert2">✕</button>
    </div>
    <div class="alert alert-warning" id="alert3">
      <span>⚠️ Your session is about to expire.</span>
      <button class="alert-close" data-target="alert3">✕</button>
    </div>
    <div class="alert alert-error" id="alert4">
      <span>❌ An unexpected error occurred.</span>
      <button class="alert-close" data-target="alert4">✕</button>
    </div>
    <button class="alert-reset" id="resetAlerts">Reset All</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
