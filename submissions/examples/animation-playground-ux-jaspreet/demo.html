<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Animation Playground</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="playground-container">
        
        <header class="playground-header">
            <h1 class="playground-title">Animation Playground</h1>
            <div class="active-display" id="activeDisplay" aria-live="polite">
                <span class="display-label">Selected Profile:</span>
                <span class="display-value" id="currentAnimationName">none</span>
            </div>
        </header>

        <section class="controls-wrapper">
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.603 10.601Z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search animation utilities..." autocomplete="off">
            </div>

            <div class="filter-tabs" id="filterTabs" role="tablist" aria-label="Animation Categories">
                <button class="tab-btn active" role="tab" aria-selected="true" data-category="all">All</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="fade">Fade</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="slide">Slide</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="scale">Scale</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="rotate">Rotate</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="bounce">Bounce</button>
                <button class="tab-btn" role="tab" aria-selected="false" data-category="attention">Attention</button>
            </div>
        </section>

        <section class="playground-grid" id="playgroundGrid">
            
            <div class="animation-card" data-class="ease-fade-in" data-category="fade" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Fade In</span>
                    <code class="class-pill">ease-fade-in</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-slide-up" data-category="slide" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Slide Up</span>
                    <code class="class-pill">ease-slide-up</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-scale-up" data-category="scale" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Scale Up</span>
                    <code class="class-pill">ease-scale-up</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-rotate-clockwise" data-category="rotate" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Rotate Clockwise</span>
                    <code class="class-pill">ease-rotate-clockwise</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-bounce-in" data-category="bounce" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Bounce In</span>
                    <code class="class-pill">ease-bounce-in</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-pulse-glow" data-category="attention" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Pulse Glow</span>
                    <code class="class-pill">ease-pulse-glow</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-slide-left" data-category="slide" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Slide Left</span>
                    <code class="class-pill">ease-slide-left</code>
                </div>
            </div>

            <div class="animation-card" data-class="ease-shake" data-category="attention" tabindex="0">
                <div class="preview-box"><div class="preview-target"></div></div>
                <div class="card-details">
                    <span class="anim-name">Attention Shake</span>
                    <code class="class-pill">ease-shake</code>
                </div>
            </div>

        </section>
    </main>

    <div class="toast-container" id="toastContainer" aria-live="assertive"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('searchInput');
            const filterTabs = document.getElementById('filterTabs');
            const tabButtons = document.querySelectorAll('.tab-btn');
            const playgroundGrid = document.getElementById('playgroundGrid');
            const animationCards = document.querySelectorAll('.animation-card');
            const currentAnimationName = document.getElementById('currentAnimationName');
            const toastContainer = document.getElementById('toastContainer');

            let activeCategory = 'all';
            let searchQuery = '';

            const init = () => {
                const savedAnimation = localStorage.getItem('selectedAnimationClass');
                if (savedAnimation) {
                    const targetCard = Array.from(animationCards).find(card => card.dataset.class === savedAnimation);
                    if (targetCard) {
                        selectCard(targetCard, false);
                    }
                }
                setupEventListeners();
            };

            const setupEventListeners = () => {
                searchInput.addEventListener('input', (e) => {
                    searchQuery = e.target.value.toLowerCase().trim();
                    filterCards();
                });

                filterTabs.addEventListener('click', (e) => {
                    const btn = e.target.closest('.tab-btn');
                    if (!btn) return;

                    tabButtons.forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });

                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    activeCategory = btn.dataset.category;
                    filterCards();
                });

                playgroundGrid.addEventListener('click', (e) => {
                    const card = e.target.closest('.animation-card');
                    if (card) selectCard(card, true);
                });

                playgroundGrid.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' || e.key === ' ') {
                        const card = e.target.closest('.animation-card');
                        if (card) {
                            e.preventDefault();
                            selectCard(card, true);
                        }
                    }
                });
            };

            const filterCards = () => {
                animationCards.forEach(card => {
                    const name = card.querySelector('.anim-name').textContent.toLowerCase();
                    const className = card.dataset.class.toLowerCase();
                    const category = card.dataset.category;

                    const matchesSearch = name.includes(searchQuery) || className.includes(searchQuery);
                    const matchesCategory = activeCategory === 'all' || category === activeCategory;

                    if (matchesSearch && matchesCategory) {
                        card.style.display = 'flex';
                        card.style.opacity = '0';
                        requestAnimationFrame(() => {
                            card.style.transition = 'opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
                            card.style.opacity = '1';
                        });
                    } else {
                        card.style.display = 'none';
                    }
                });
            };

            const selectCard = (card, triggerToast) => {
                animationCards.forEach(c => {
                    c.classList.remove('active');
                    const target = c.querySelector('.preview-target');
                    target.className = 'preview-target';
                });

                card.classList.add('active');
                const selectedClass = card.dataset.class;
                
                const targetBox = card.querySelector('.preview-target');
                targetBox.classList.add(selectedClass);

                currentAnimationName.textContent = selectedClass;
                localStorage.setItem('selectedAnimationClass', selectedClass);

                if (triggerToast) {
                    navigator.clipboard.writeText(selectedClass)
                        .then(() => showToast(`Copied ${selectedClass} to clipboard!`))
                        .catch(() => showToast('Failed to copy code.'));
                }
            };

            const showToast = (message) => {
                const toast = document.createElement('div');
                toast.className = 'toast-message';
                toast.innerHTML = `
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    <span>${message}</span>
                `;
                toastContainer.appendChild(toast);

                setTimeout(() => {
                    toast.classList.add('visible');
                }, 10);

                setTimeout(() => {
                    toast.classList.remove('visible');
                    toast.addEventListener('transitionend', () => toast.remove());
                }, 3000);
            };

            init();
        });
    </script>
</body>
</html>
