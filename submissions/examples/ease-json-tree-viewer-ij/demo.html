<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Tree Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-section">
    <h1>JSON Tree Viewer</h1>
    <div class="toolbar">
      <button id="expandAllBtn" class="toolbar-btn">Expand All</button>
      <button id="collapseAllBtn" class="toolbar-btn">Collapse All</button>
    </div>
    <div class="tree-container" id="treeContainer"></div>
  </div>

  <script>
    const sampleData = {
      "name": "EaseMotion CSS",
      "version": "1.0.0",
      "description": "A collection of animated CSS components",
      "author": {
        "name": "Srijan Jaiswal",
        "email": "srijan@example.com",
        "social": {
          "github": "anomalyco",
          "twitter": "@srijancse"
        }
      },
      "license": "MIT",
      "keywords": ["css", "animation", "components", "ui"],
      "dependencies": {
        "react": "^18.2.0",
        "react-dom": "^18.2.0"
      },
      "scripts": {
        "dev": "vite",
        "build": "vite build",
        "preview": "vite preview"
      },
      "contributors": [
        {
          "name": "Alice",
          "role": "Designer"
        },
        {
          "name": "Bob",
          "role": "Developer"
        }
      ],
      "isOpenSource": true,
      "stars": null
    };

    function createTree(data, isRoot = true) {
      const container = document.createElement("div");
      container.className = "tree-container-inner";

      if (isRoot) {
        container.classList.add("tree-root");
      }

      const type = typeof data;
      if (data === null) {
        const leaf = createLeaf("null", "null");
        container.appendChild(leaf);
      } else if (Array.isArray(data)) {
        if (data.length === 0) {
          const leaf = createLeaf("[]", "bracket");
          container.appendChild(leaf);
        } else {
          const branch = createBranch("[", "]", data.length, false);
          data.forEach((item, index) => {
            const itemContainer = document.createElement("div");
            itemContainer.className = "tree-node";
            const keyEl = document.createElement("span");
            keyEl.className = "tree-key index-key";
            keyEl.textContent = index;
            const colon = document.createElement("span");
            colon.className = "tree-colon";
            colon.textContent = ": ";
            itemContainer.appendChild(keyEl);
            itemContainer.appendChild(colon);
            itemContainer.appendChild(createTree(item, false));
            branch.content.appendChild(itemContainer);
          });
          container.appendChild(branch);
        }
      } else if (type === "object") {
        const keys = Object.keys(data);
        if (keys.length === 0) {
          const leaf = createLeaf("{}", "bracket");
          container.appendChild(leaf);
        } else {
          const branch = createBranch("{", "}", keys.length, true);
          keys.forEach((key) => {
            const itemContainer = document.createElement("div");
            itemContainer.className = "tree-node";
            const keyEl = document.createElement("span");
            keyEl.className = "tree-key";
            keyEl.textContent = '"' + key + '"';
            const colon = document.createElement("span");
            colon.className = "tree-colon";
            colon.textContent = ": ";
            itemContainer.appendChild(keyEl);
            itemContainer.appendChild(colon);
            itemContainer.appendChild(createTree(data[key], false));
            branch.content.appendChild(itemContainer);
          });
          container.appendChild(branch);
        }
      } else if (type === "string") {
        const leaf = createLeaf('"' + data + '"', "string");
        container.appendChild(leaf);
      } else if (type === "number") {
        const leaf = createLeaf(String(data), "number");
        container.appendChild(leaf);
      } else if (type === "boolean") {
        const leaf = createLeaf(String(data), "bool");
        container.appendChild(leaf);
      }

      return container;
    }

    function createBranch(openBracket, closeBracket, count, startExpanded) {
      const wrapper = document.createElement("div");
      wrapper.className = "tree-branch";

      const header = document.createElement("div");
      header.className = "tree-branch-header";

      const arrow = document.createElement("span");
      arrow.className = "tree-arrow";
      arrow.textContent = "\u25B6";
      header.appendChild(arrow);

      const preview = document.createElement("span");
      preview.className = "tree-preview";
      preview.textContent = openBracket + " " + count + " items " + closeBracket;
      header.appendChild(preview);

      const content = document.createElement("div");
      content.className = "tree-branch-content";

      if (startExpanded) {
        content.classList.add("expanded");
      }

      wrapper.appendChild(header);
      wrapper.appendChild(content);

      header.addEventListener("click", () => {
        content.classList.toggle("expanded");
        arrow.classList.toggle("expanded");
      });

      wrapper.content = content;
      wrapper.arrow = arrow;

      if (startExpanded) {
        arrow.classList.add("expanded");
      }

      return wrapper;
    }

    function createLeaf(value, className) {
      const el = document.createElement("span");
      el.className = "tree-value " + className;
      el.textContent = value;
      return el;
    }

    const container = document.getElementById("treeContainer");
    container.appendChild(createTree(sampleData, true));

    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".tree-branch-content").forEach((c) => c.classList.add("expanded"));
      document.querySelectorAll(".tree-arrow").forEach((a) => a.classList.add("expanded"));
    });

    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll(".tree-branch-content").forEach((c) => c.classList.remove("expanded"));
      document.querySelectorAll(".tree-arrow").forEach((a) => a.classList.remove("expanded"));
    });
  </script>
</body>
</html>
