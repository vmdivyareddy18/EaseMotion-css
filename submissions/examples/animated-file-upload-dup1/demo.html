<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated File Upload</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="upload-container">

    <div class="upload-card">

        <div class="upload-header">
            <h1>Upload Files</h1>
            <p>Drag & Drop files here or browse your device</p>
        </div>

        <div class="upload-area">

            <div class="upload-icon">
                ☁
            </div>

            <h2>Drop Files Here</h2>

            <p>Supported formats: JPG, PNG, PDF, DOCX</p>

            <button class="browse-btn">
                Browse Files
            </button>

        </div>

        <div class="progress-section">

            <div class="file-item">

                <div class="file-info">
                    <span class="file-name">project-report.pdf</span>
                    <span class="file-size">2.4 MB</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill progress-90"></div>
                </div>

                <span class="progress-text">90%</span>

            </div>

            <div class="file-item">

                <div class="file-info">
                    <span class="file-name">dashboard-ui.png</span>
                    <span class="file-size">1.2 MB</span>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill progress-60"></div>
                </div>

                <span class="progress-text">60%</span>

            </div>

        </div>

        <div class="success-card">

            <div class="success-icon">
                ✓
            </div>

            <h3>Upload Successful</h3>

            <p>Your files have been uploaded successfully.</p>

        </div>

    </div>

</div>

</body>
</html>
