<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Slow Motion Inspection Mode Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="preview-box">
        <div class="preview-animate-target" id="target"></div>
    </div>

    <button class="preview-inspect-btn" id="inspectBtn">
        Inspect Motion
    </button>

    <p class="preview-hint">Click the button to toggle slow motion. Click the box to replay the animation.</p>

    <script>
        const btn = document.getElementById('inspectBtn');
        const target = document.getElementById('target');
        let slow = false;

        btn.addEventListener('click', () => {
            slow = !slow;
            target.classList.toggle('is-slow-motion', slow);
            btn.textContent = slow ? '■ Stop Inspecting' : '▶ Inspect Motion';
            btn.classList.toggle('is-active', slow);
        });

        target.addEventListener('click', () => {
            target.classList.remove('replay');
            void target.offsetWidth; // restart animation
            target.classList.add('replay');
        });
    </script>
</body>

</html>
