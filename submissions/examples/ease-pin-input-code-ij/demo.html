<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIN Input Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>PIN / OTP Input</h1>

  <div class="controls">
    <div class="control-group">
      <label for="pin-length">Digits</label>
      <select id="pin-length">
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" selected>6</option>
        <option value="8">8</option>
      </select>
    </div>
    <button id="validate-btn" class="btn">Validate</button>
    <button id="reset-btn" class="btn btn-outline">Reset</button>
  </div>

  <div class="pin-wrapper">
    <div class="pin-input" id="pin-input"></div>
  </div>

  <div class="message" id="message"></div>

  <div class="expected-code">
    Expected code: <code id="expected-code">123456</code>
    <button id="show-code-btn" class="btn btn-small">Show</button>
  </div>

  <script>
    const pinContainer = document.getElementById('pin-input');
    const lengthSelect = document.getElementById('pin-length');
    const validateBtn = document.getElementById('validate-btn');
    const resetBtn = document.getElementById('reset-btn');
    const messageEl = document.getElementById('message');
    const expectedCodeEl = document.getElementById('expected-code');
    const showCodeBtn = document.getElementById('show-code-btn');

    let currentCode = '123456';
    let digits = [];

    function buildInputs(count) {
      pinContainer.innerHTML = '';
      digits = [];
      for (let i = 0; i < count; i++) {
        const input = document.createElement('input');
        input.type = 'text';
        input.inputMode = 'numeric';
        input.maxLength = 1;
        input.className = 'pin-digit';
        input.dataset.index = i;
        input.autocomplete = 'off';
        input.addEventListener('input', handleInput);
        input.addEventListener('keydown', handleKeydown);
        input.addEventListener('focus', handleFocus);
        input.addEventListener('blur', handleBlur);
        pinContainer.appendChild(input);
        digits.push(input);
      }
      if (digits.length) digits[0].focus();
      messageEl.textContent = '';
      messageEl.className = 'message';
      pinContainer.dataset.valid = '';
    }

    function handleInput(e) {
      const input = e.target;
      const val = input.value.replace(/[^0-9]/g, '');
      input.value = val;
      if (val) {
        input.classList.remove('pin-digit--error');
        input.classList.add('pin-digit--filled');
        const next = input.nextElementSibling;
        if (next && next.tagName === 'INPUT') next.focus();
      } else {
        input.classList.remove('pin-digit--filled', 'pin-digit--error');
      }
      messageEl.textContent = '';
      messageEl.className = 'message';
      pinContainer.dataset.valid = '';
    }

    function handleKeydown(e) {
      if (e.key === 'Backspace') {
        const input = e.target;
        if (!input.value && input.previousElementSibling) {
          input.previousElementSibling.focus();
          input.previousElementSibling.value = '';
          input.previousElementSibling.classList.remove('pin-digit--filled', 'pin-digit--error');
        }
      }
      if (e.key === 'Enter') validate();
    }

    function handleFocus(e) {
      e.target.classList.add('pin-digit--focus');
      e.target.select();
    }

    function handleBlur(e) {
      e.target.classList.remove('pin-digit--focus');
    }

    function getEnteredCode() {
      return digits.map(d => d.value).join('');
    }

    function shakeAll() {
      digits.forEach(d => d.classList.add('pin-digit--shake'));
      digits.forEach(d =>
        d.addEventListener('animationend', () => d.classList.remove('pin-digit--shake'), { once: true })
      );
    }

    function validate() {
      const code = getEnteredCode();
      const expected = expectedCodeEl.textContent;
      if (code.length < digits.length) {
        messageEl.textContent = 'Please fill all digits.';
        messageEl.className = 'message message--info';
        return;
      }
      if (code === expected) {
        messageEl.textContent = 'Code correct!';
        messageEl.className = 'message message--success';
        pinContainer.dataset.valid = 'true';
        digits.forEach(d => d.classList.remove('pin-digit--error'));
      } else {
        messageEl.textContent = 'Incorrect code. Try again.';
        messageEl.className = 'message message--error';
        pinContainer.dataset.valid = 'false';
        digits.forEach(d => {
          d.classList.add('pin-digit--error');
          d.classList.remove('pin-digit--filled');
        });
        shakeAll();
        setTimeout(() => digits.forEach(d => d.classList.remove('pin-digit--error')), 600);
      }
    }

    function resetInputs() {
      digits.forEach(d => {
        d.value = '';
        d.classList.remove('pin-digit--filled', 'pin-digit--error', 'pin-digit--shake');
      });
      if (digits.length) digits[0].focus();
      messageEl.textContent = '';
      messageEl.className = 'message';
      pinContainer.dataset.valid = '';
    }

    lengthSelect.addEventListener('change', () => {
      buildInputs(parseInt(lengthSelect.value, 10));
    });

    validateBtn.addEventListener('click', validate);
    resetBtn.addEventListener('click', resetInputs);

    showCodeBtn.addEventListener('click', () => {
      const hidden = expectedCodeEl.style.filter !== 'none';
      expectedCodeEl.style.filter = hidden ? 'none' : 'blur(6px)';
      showCodeBtn.textContent = hidden ? 'Hide' : 'Show';
    });

    buildInputs(6);
  </script>
</body>
</html>
