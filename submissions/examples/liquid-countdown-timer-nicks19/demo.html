<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Countdown Timer - Travel App</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0fdfa; /* Light tropical mint background */
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    .demo-card {
      background: white;
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px -10px rgba(13, 148, 136, 0.15);
      text-align: center;
      max-width: 320px;
      width: 100%;
    }

    .demo-header {
      margin-bottom: 30px;
    }

    .demo-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #0f766e;
      margin: 0 0 8px 0;
    }

    .demo-subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin: 0;
    }

    .demo-destination {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111827;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <div class="demo-card">
    <div class="demo-header">
      <p class="demo-subtitle">Flight Departure</p>
      <h1 class="demo-destination">Maldives (MLE)</h1>
    </div>

    <!-- The Liquid Countdown Timer Component -->
    <!-- The --ease-liquid-level variable dictates the height of the liquid (0% to 100%) -->
    <div class="ease-liquid-countdown" style="--ease-liquid-level: 75%;">
      
      <!-- The liquid waves -->
      <div class="ease-liquid-wave ease-liquid-wave-back"></div>
      <div class="ease-liquid-wave ease-liquid-wave-front"></div>
      
      <!-- The Timer Text Content -->
      <div class="ease-countdown-content">
        <div class="ease-time" id="countdown-text">03:45:12</div>
        <div class="ease-label">Time Remaining</div>
      </div>
      
    </div>
  </div>

  <!-- Tiny JS Script to handle the realistic countdown logic -->
  <script>
    // Set a departure time 3 hours, 45 minutes, and 12 seconds from now
    const totalDuration = (3 * 3600) + (45 * 60) + 12; 
    let remainingTime = totalDuration;
    
    const countdownEl = document.getElementById('countdown-text');
    const liquidWrapper = document.querySelector('.ease-liquid-countdown');

    function updateTimer() {
      if (remainingTime <= 0) return;
      remainingTime--;

      // Format time
      const h = Math.floor(remainingTime / 3600);
      const m = Math.floor((remainingTime % 3600) / 60);
      const s = remainingTime % 60;
      countdownEl.innerText = 
        `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

      // Update liquid level (drops as time goes down)
      const percentage = (remainingTime / totalDuration) * 100;
      liquidWrapper.style.setProperty('--ease-liquid-level', `${percentage}%`);
    }

    setInterval(updateTimer, 1000);
  </script>
</body>
</html>
