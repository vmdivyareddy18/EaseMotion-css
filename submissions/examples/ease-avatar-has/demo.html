<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Avatar Group Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>Animated Avatar Group</h2>
      <p class="subtitle">An interactive stack of users with hover overlays and active status indicator rings.</p>
      
      <div class="avatar-group">
        <div class="avatar-item" style="z-index: 4;">
          <div class="avatar-img-wrapper">
            <div class="avatar-placeholder" style="background-color: #6366f1;">H</div>
          </div>
          <div class="status-indicator online"></div>
        </div>
        <div class="avatar-item" style="z-index: 3;">
          <div class="avatar-img-wrapper">
            <div class="avatar-placeholder" style="background-color: #10b981;">A</div>
          </div>
          <div class="status-indicator online"></div>
        </div>
        <div class="avatar-item" style="z-index: 2;">
          <div class="avatar-img-wrapper">
            <div class="avatar-placeholder" style="background-color: #f59e0b;">S</div>
          </div>
          <div class="status-indicator offline"></div>
        </div>
        <div class="avatar-item extra-item" style="z-index: 1;">
          <div class="avatar-img-wrapper">
            <div class="avatar-placeholder" style="background-color: #3b82f6;">+5</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
