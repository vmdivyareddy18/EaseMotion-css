<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Maintenance — Glitter Glassmorphic Experience</title>
  
  <!-- Core EaseMotion CSS (production version, path relative to submissions/examples/glitter-maintenance-page-bk/) -->
  <link rel="stylesheet" href="../../../easemotion.css" />
  
  <!-- Custom Component Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Ambient Background Glow Blobs -->
  <div class="ambient-container" aria-hidden="true">
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>
    <div class="ambient-blob blob-3"></div>
  </div>

  <!-- Twinkling Glitter Stars Background -->
  <div aria-hidden="true">
    <!-- Star 1 (Cyan) -->
    <svg class="glitter-sparkle sparkle-1" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
    <!-- Star 2 (Light Blue) -->
    <svg class="glitter-sparkle sparkle-2" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
    <!-- Star 3 (Pink) -->
    <svg class="glitter-sparkle sparkle-3" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
    <!-- Star 4 (Rose) -->
    <svg class="glitter-sparkle sparkle-4" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
    <!-- Star 5 (Blue) -->
    <svg class="glitter-sparkle sparkle-5" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
    <!-- Star 6 (Emerald) -->
    <svg class="glitter-sparkle sparkle-6" viewBox="0 0 24 24" width="1em" height="1em">
      <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
    </svg>
  </div>

  <!-- Centered Glassmorphic Card -->
  <main class="maintenance-container ease-fade-in ease-slide-up">
    <section class="glass-card" aria-labelledby="page-title">
      
      <!-- Rotating Gears Illustration with Sparkles -->
      <div class="gear-illustration" aria-hidden="true">
        <!-- Main Gear -->
        <svg class="gear-main" viewBox="0 0 24 24">
          <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.52l.32.39a1.6 1.6 0 0 1-2.26 2.26l-.38-.32a1.6 1.6 0 0 0-1.52-.32 1.6 1.6 0 0 0-1.09 1.48v.5a1.6 1.6 0 0 1-3.14 0v-.5a1.6 1.6 0 0 0-1.09-1.48 1.6 1.6 0 0 0-1.52.32l-.39.32a1.6 1.6 0 0 1-2.26-2.26l.32-.39a1.6 1.6 0 0 0 .32-1.52 1.6 1.6 0 0 0-1.48-1.09h-.5a1.6 1.6 0 0 1 0-3.14h.5a1.6 1.6 0 0 0 1.48-1.09 1.6 1.6 0 0 0-.32-1.52l-.32-.39a1.6 1.6 0 0 1 2.26-2.26l.39.32a1.6 1.6 0 0 0 1.52.32 1.6 1.6 0 0 0 1.09-1.48v-.5a1.6 1.6 0 0 1 3.14 0v.5a1.6 1.6 0 0 0 1.09 1.48 1.6 1.6 0 0 0 1.52-.32l.39-.32a1.6 1.6 0 0 1 2.26 2.26l-.32.39a1.6 1.6 0 0 0-.32 1.52 1.6 1.6 0 0 0 1.48 1.09h.5a1.6 1.6 0 0 1 0 3.14h-.5a1.6 1.6 0 0 0-1.48 1.09zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
        </svg>
        <!-- Secondary Gear -->
        <svg class="gear-secondary" viewBox="0 0 24 24">
          <path d="M19.4 15a1.6 1.6 0 0 0 .3 1.52l.32.39a1.6 1.6 0 0 1-2.26 2.26l-.38-.32a1.6 1.6 0 0 0-1.52-.32 1.6 1.6 0 0 0-1.09 1.48v.5a1.6 1.6 0 0 1-3.14 0v-.5a1.6 1.6 0 0 0-1.09-1.48 1.6 1.6 0 0 0-1.52.32l-.39.32a1.6 1.6 0 0 1-2.26-2.26l.32-.39a1.6 1.6 0 0 0 .32-1.52 1.6 1.6 0 0 0-1.48-1.09h-.5a1.6 1.6 0 0 1 0-3.14h.5a1.6 1.6 0 0 0 1.48-1.09 1.6 1.6 0 0 0-.32-1.52l-.32-.39a1.6 1.6 0 0 1 2.26-2.26l.39.32a1.6 1.6 0 0 0 1.52.32 1.6 1.6 0 0 0 1.09-1.48v-.5a1.6 1.6 0 0 1 3.14 0v.5a1.6 1.6 0 0 0 1.09 1.48 1.6 1.6 0 0 0 1.52-.32l.39-.32a1.6 1.6 0 0 1 2.26 2.26l-.32.39a1.6 1.6 0 0 0-.32 1.52 1.6 1.6 0 0 0 1.48 1.09h.5a1.6 1.6 0 0 1 0 3.14h-.5a1.6 1.6 0 0 0-1.48 1.09zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" />
        </svg>
        
        <!-- Twinkles in Gear Illustration -->
        <svg class="gear-sparkle gs-1" viewBox="0 0 24 24" width="1em" height="1em">
          <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
        </svg>
        <svg class="gear-sparkle gs-2" viewBox="0 0 24 24" width="1em" height="1em">
          <path d="M12 0L14.6 9.4L24 12L14.6 14.6L12 24L9.4 14.6L0 12L9.4 9.4L12 0Z" />
        </svg>
      </div>

      <!-- Pulse Status Badge -->
      <span class="status-badge">System Upgrade</span>

      <!-- Headline -->
      <h1 class="title" id="page-title">We're Tuning Up the Engine</h1>
      
      <!-- Description -->
      <p class="description">
        Our services are temporarily offline for a scheduled software iteration. We're polishing the assets and refining compliance parameters.
      </p>

      <!-- Glittering Progress Bar -->
      <div class="progress-container">
        <div class="progress-header">
          <span>Optimization Progress</span>
          <span>92%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="92" aria-valuemin="0" aria-valuemax="100">
          <div class="progress-fill"></div>
        </div>
      </div>

      <!-- Interactive Actions Group -->
      <div class="action-group">
        <button class="btn-primary" onclick="alert('System status is fully operational (92% upgraded). Expected completion in 8 minutes.')">
          Check System Status
        </button>
        <a href="#" class="status-link">Back to dashboard</a>
      </div>

    </section>
  </main>

</body>
</html>
