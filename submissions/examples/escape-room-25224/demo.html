<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Escape Room</title>
</head>
<body>
  <header class="hero-escape">
    <h1>Can You Escape in Time?</h1>
    <p>Immersive puzzle rooms. 60 minutes on the clock.</p>
  </header>
  <section class="room-grid">
    <div class="room-card">
        <h3>The Haunted Library</h3>
        <p>Uncover secrets buried in ancient scrolls.</p>
        <p class="difficulty-meter">Difficulty: Hard</p>
    </div>
    <div class="room-card">
        <h3>Submarine Breach</h3>
        <p>Fix the hull before the ocean takes over.</p>
        <p class="difficulty-meter">Difficulty: Medium</p>
    </div>
  </section>
</body>
</html>
