<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: 3D Card Flip on Hover Animation</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-flip-3d">
  <div class="flip-inner">
    <div class="flip-front">
      <h4>Service Info</h4>
    </div>
    <div class="flip-back">
      <h4>Parameters</h4>
      <p>Configure clusters and pipelines.</p>
    </div>
  </div>
</div>
</body>
</html>
