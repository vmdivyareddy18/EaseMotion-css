<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Text Reveal Char</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1 class="reveal-char" id="revealText" aria-label="Ease Motion CSS"></h1>
  <p class="reveal-sub">Character-by-character reveal animation</p>
</div>
<script>
const text = 'Ease Motion CSS';
const el = document.getElementById('revealText');
const chars = text.split('');
el.innerHTML = chars.map((c, i) =>
  c === ' ' ? '<span class="space"></span>' : `<span style="animation-delay:${i * 0.05}s">${c}</span>`
).join('');
</script>
</body>
</html>
