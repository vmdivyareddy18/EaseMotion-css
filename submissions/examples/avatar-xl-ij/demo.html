<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS avatar-xl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Avatar Size Comparison</h1>
    <div class="size-row">
      <div class="av-xl" style="background: linear-gradient(135deg, #e94560, #533483);"><span class="av-inner">XL</span></div>
      <div class="av-lg" style="background: linear-gradient(135deg, #2ecc71, #3498db);"><span class="av-inner">LG</span></div>
      <div class="av-sm" style="background: linear-gradient(135deg, #f39c12, #e74c3c);"><span class="av-inner">SM</span></div>
      <div class="av-xs" style="background: linear-gradient(135deg, #9b59b6, #e94560);"><span class="av-inner">XS</span></div>
    </div>
  </div>
</body>
</html>
