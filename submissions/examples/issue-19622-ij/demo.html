<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hourglass – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="hourglass-wrapper">
    <div class="hourglass" role="timer" aria-label="Hourglass timer animating">
      <div class="chamber chamber-top">
        <div class="sand-top"></div>
      </div>
      <div class="neck"></div>
      <div class="chamber chamber-bottom">
        <div class="sand-bottom"></div>
      </div>
    </div>
    <span class="hourglass-value">⏳</span>
    <span class="hourglass-title">Hourglass</span>
  </div>
</body>
</html>
