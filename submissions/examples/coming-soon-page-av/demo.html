<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon • EaseMotion CSS</title>

<link rel="stylesheet" href="../../easemotion.css">
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="background-grid"></div>

<div class="container">

    <span class="badge">
        🚀 COMING SOON
    </span>

    <h1>
        Something Amazing
        <br>
        is Launching Soon
    </h1>

    <p>
        We're crafting something beautiful.
        Stay tuned for an experience that's worth the wait.
    </p>

    <form class="notify-form">

        <input
            type="email"
            placeholder="Enter your email"
        >

        <button>
            Notify Me
        </button>

    </form>

    <div class="launch-info">

        <div class="card">
            <h2>48</h2>
            <span>Days</span>
        </div>

        <div class="card">
            <h2>12</h2>
            <span>Hours</span>
        </div>

        <div class="card">
            <h2>36</h2>
            <span>Minutes</span>
        </div>

        <div class="card">
            <h2>59</h2>
            <span>Seconds</span>
        </div>

    </div>

</div>

</body>
</html>
