<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-roll-in / ease-roll-out — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      gap: 2rem;
      padding: 2rem;
    }
    h2 { margin: 0; font-weight: 400; }
    .demo-grid {
      display: flex;
      gap: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .demo-card {
      width: 200px;
      height: 200px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
    }
    .controls {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 999px;
      background: #334155;
      color: #e2e8f0;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #475569; }
    button.primary { background: #6366f1; }
    button.primary:hover { background: #818cf8; }
    .speed-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
    }
    .speed-label select {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
    }
  </style>
</head>
<body>
  <h2>ease-roll-in &amp; ease-roll-out</h2>

  <div class="demo-grid">
    <div class="demo-card ease-roll-in" id="card1">Roll In</div>
    <div class="demo-card ease-roll-out" id="card2">Roll Out</div>
  </div>

  <div class="controls">
    <button class="primary" onclick="replay()">Replay All</button>
    <button onclick="toggleIn()">Replay Roll-In</button>
    <button onclick="toggleOut()">Replay Roll-Out</button>
    <div class="speed-label">
      <label for="speed">Speed:</label>
      <select id="speed" onchange="changeSpeed(this.value)">
        <option value="ease-fast">Fast</option>
        <option value="" selected>Medium</option>
        <option value="ease-slow">Slow</option>
      </select>
    </div>
  </div>

  <script>
    function changeSpeed(speed) {
      [card1, card2].forEach(c => {
        c.classList.remove('ease-fast', 'ease-slow');
        if (speed) c.classList.add(speed);
      });
      replay();
    }

    function replay() {
      [card1, card2].forEach(c => {
        c.style.animation = 'none';
        void c.offsetWidth;
        c.style.animation = '';
      });
    }

    function toggleIn() {
      const c = card1;
      c.style.animation = 'none';
      void c.offsetWidth;
      c.style.animation = '';
    }

    function toggleOut() {
      const c = card2;
      c.style.animation = 'none';
      void c.offsetWidth;
      c.style.animation = '';
    }
  </script>
</body>
</html>
