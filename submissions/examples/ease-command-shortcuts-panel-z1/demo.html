<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Command Shortcuts Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="panel">
<h2>Keyboard Shortcuts</h2>
<div class="item"><span>Open Search</span><kbd>Ctrl + K</kbd></div>
<div class="item"><span>Save File</span><kbd>Ctrl + S</kbd></div>
<div class="item"><span>Rename</span><kbd>F2</kbd></div>
<div class="item"><span>Command Menu</span><kbd>Ctrl + Shift + P</kbd></div>
<div class="item"><span>Duplicate Line</span><kbd>Alt + Shift + ↓</kbd></div>
</section>
</body>
</html>
