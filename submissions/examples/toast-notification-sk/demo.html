<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Toast Notification - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Background decorative glows -->
    <div class="bg-decor"></div>
    <div class="bg-decor-2"></div>

    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- Main Playground Card -->
    <main class="playground-container">
      <header class="header">
        <h1>EaseMotion Toasts</h1>
        <p>
          A lightweight, accessible, framework-independent toast notification
          system featuring fluid hardware-accelerated animations and
          pause-on-hover timers.
        </p>
      </header>

      <!-- Trigger Grid -->
      <div class="button-grid">
        <button
          id="btn-success"
          class="btn-trigger btn-success"
          type="button"
          aria-label="Trigger Success Toast"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 11.01"></polyline>
          </svg>
          <span>Trigger Success</span>
        </button>

        <button
          id="btn-error"
          class="btn-trigger btn-error"
          type="button"
          aria-label="Trigger Error Toast"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="15" y1="9" x2="9" y2="15"></line>
            <line x1="9" y1="9" x2="15" y2="15"></line>
          </svg>
          <span>Trigger Error</span>
        </button>

        <button
          id="btn-warning"
          class="btn-trigger btn-warning"
          type="button"
          aria-label="Trigger Warning Toast"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
            ></path>
            <line x1="12" y1="9" x2="12" y2="13"></line>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          <span>Trigger Warning</span>
        </button>

        <button
          id="btn-info"
          class="btn-trigger btn-info"
          type="button"
          aria-label="Trigger Info Toast"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="16" x2="12" y2="12"></line>
            <line x1="12" y1="8" x2="12.01" y2="8"></line>
          </svg>
          <span>Trigger Info</span>
        </button>
      </div>

      <!-- Theme Selection -->
      <div class="theme-section">
        <button
          id="theme-toggle"
          class="btn-theme"
          type="button"
          aria-label="Toggle light or dark theme"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <span>Dark Mode</span>
        </button>
      </div>
    </main>

    <!-- Toast Management Logic -->
    <script>
      class ToastManager {
        constructor(containerId) {
          this.container = document.getElementById(containerId);
        }

        create(options = {}) {
          const {
            type = "info", // success, error, warning, info
            title = "Notification",
            message = "This is a notification message.",
            duration = 5000,
          } = options;

          // Create toast element
          const toast = document.createElement("div");
          toast.className = `toast-item toast-${type}`;

          // Setup semantic accessibility values based on severity
          if (type === "error" || type === "warning") {
            toast.setAttribute("role", "alert");
            toast.setAttribute("aria-live", "assertive");
          } else {
            toast.setAttribute("role", "status");
            toast.setAttribute("aria-live", "polite");
          }

          const iconSvg = this.getIcon(type);

          toast.innerHTML = `
          <div class="toast-icon-wrapper" aria-hidden="true">
            ${iconSvg}
          </div>
          <div class="toast-content">
            <div class="toast-title">${title}</div>
            <div class="toast-desc">${message}</div>
          </div>
          <button class="toast-btn-close" aria-label="Close notification">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <div class="toast-progress-bar" aria-hidden="true"></div>
        `;

          this.container.appendChild(toast);

          // Bind interactive elements
          const closeButton = toast.querySelector(".toast-btn-close");
          const progressBar = toast.querySelector(".toast-progress-bar");

          // Timer & Progress States
          let elapsed = 0;
          let lastTime = null;
          let isPaused = false;
          let animationFrameId = null;

          const dismiss = () => {
            if (animationFrameId) {
              cancelAnimationFrame(animationFrameId);
            }
            toast.classList.add("toast-dismissing");

            // Clean up DOM node once opacity and height collapse finish
            toast.addEventListener("transitionend", (e) => {
              // max-height handles the stack collapses
              if (
                e.propertyName === "max-height" ||
                e.propertyName === "transform"
              ) {
                toast.remove();
              }
            });

            // Secondary cleanup fallback
            setTimeout(() => {
              if (toast.parentNode) {
                toast.remove();
              }
            }, 500);
          };

          closeButton.addEventListener("click", dismiss);

          // Timer Ticker Loop (Uses requestAnimationFrame for sub-pixel high performance rendering)
          const tick = (timestamp) => {
            if (lastTime === null) {
              lastTime = timestamp;
            }
            const delta = timestamp - lastTime;
            lastTime = timestamp;

            if (!isPaused) {
              elapsed += delta;
              const progress = Math.max(0, 100 - (elapsed / duration) * 100);
              progressBar.style.transform = `scaleX(${progress / 100})`;
            }

            if (elapsed >= duration) {
              dismiss();
            } else {
              animationFrameId = requestAnimationFrame(tick);
            }
          };

          // Hover events to pause/resume
          toast.addEventListener("mouseenter", () => {
            isPaused = true;
          });

          toast.addEventListener("mouseleave", () => {
            isPaused = false;
            lastTime = null; // Re-align ticker timestamp base
          });

          // Trigger animation loop
          animationFrameId = requestAnimationFrame(tick);
        }

        getIcon(type) {
          switch (type) {
            case "success":
              return `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
              </svg>
            `;
            case "error":
              return `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
              </svg>
            `;
            case "warning":
              return `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                <line x1="12" y1="9" x2="12" y2="13"></line>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
              </svg>
            `;
            case "info":
            default:
              return `
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="16" x2="12" y2="12"></line>
                <line x1="12" y1="8" x2="12.01" y2="8"></line>
              </svg>
            `;
          }
        }
      }

      // Initialize Toast Manager
      const toastManager = new ToastManager("toast-container");

      // Button Click Handlers
      document.getElementById("btn-success").addEventListener("click", () => {
        toastManager.create({
          type: "success",
          title: "Action Completed Successfully",
          message:
            "All your changes have been successfully committed to the repository database.",
          duration: 5000,
        });
      });

      document.getElementById("btn-error").addEventListener("click", () => {
        toastManager.create({
          type: "error",
          title: "Upload Attempt Failed",
          message:
            "Failed to establish connection with upstream. Please retry in a few seconds.",
          duration: 5000,
        });
      });

      document.getElementById("btn-warning").addEventListener("click", () => {
        toastManager.create({
          type: "warning",
          title: "Approaching Storage Limit",
          message:
            "Your account disk quota is running high (92% used). Consider upgrading soon.",
          duration: 5000,
        });
      });

      document.getElementById("btn-info").addEventListener("click", () => {
        toastManager.create({
          type: "info",
          title: "Updates Ready to Install",
          message:
            "A minor version upgrade is available for EaseMotion. Reload your site to update.",
          duration: 5000,
        });
      });

      // Theme Toggle Handler
      const themeToggle = document.getElementById("theme-toggle");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)"
      );

      const getSavedTheme = () => {
        const saved = localStorage.getItem("theme");
        if (saved) return saved;
        return systemPrefersDark.matches ? "dark" : "light";
      };

      const applyTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);

        const isDark = theme === "dark";
        themeToggle.innerHTML = isDark
          ? `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <span>Light Mode</span>
      `
          : `
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
        <span>Dark Mode</span>
      `;
      };

      // Initialize Theme
      applyTheme(getSavedTheme());

      // Theme Toggle Click Listener
      themeToggle.addEventListener("click", () => {
        const activeTheme = document.documentElement.getAttribute("data-theme");
        const nextTheme = activeTheme === "dark" ? "light" : "dark";
        applyTheme(nextTheme);
      });
    </script>
  </body>
</html>
