<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-quicksand-loader</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Quicksand Loader</h1>
    <div class="animation-wrapper">
      <div class="quicksand">
        <div class="dot dot-1"></div>
        <div class="dot dot-2"></div>
        <div class="dot dot-3"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Sand Color
        <input type="color" class="js-color" value="#d4a574" data-var="--sand-color" />
      </label>
      <label>
        Dot Size
        <input type="range" class="js-range" min="6" max="24" step="1" value="12" data-var="--dot-size" />
        <span class="js-range-value">12px</span>
      </label>
      <label>
        Sink Duration
        <input type="range" class="js-range" min="0.3" max="3" step="0.1" value="1.2" data-var="--sink-duration" />
        <span class="js-range-value">1.2s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        if (el.dataset.var === '--dot-size') {
          document.documentElement.style.setProperty(el.dataset.var, el.value + 'px');
          if (display) display.textContent = el.value + 'px';
        } else {
          document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
          if (display) display.textContent = el.value + 's';
        }
      });
    });
  </script>
</body>
</html>
