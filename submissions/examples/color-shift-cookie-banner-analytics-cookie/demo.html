<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Core Workspace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Simulated Dashboard Background -->
  <main class="dashboard-canvas">
    <div class="metrics-grid-mockup">
      <div class="mock-card"></div>
      <div class="mock-card"></div>
      <div class="mock-card"></div>
    </div>

    <!-- Pure CSS Toggle State Mechanism for the Cookie Banner Dismissal -->
    <div class="cookie-banner-system">
      <input type="checkbox" id="cookie-dismiss-checkbox" class="hidden-state-input">
      
      <div class="color-shift-banner">
        <div class="dynamic-gradient-mesh"></div>
        
        <div class="banner-content-layout">
          <div class="banner-text">
            <h4>Privacy Configuration Node</h4>
            <p>We leverage optimization telemetry matrices to refine metric visualization speeds.</p>
          </div>
          
          <div class="banner-actions">
            <label for="cookie-dismiss-checkbox" class="accept-action-trigger" tabindex="0">
              Accept Telemetry
            </label>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // Keyboard listener implementing access mappings for focusable trigger nodes
    const dismissLabel = document.querySelector('.accept-action-trigger');
    dismissLabel.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        document.getElementById(dismissLabel.getAttribute('for')).click();
      }
    });
  </script>
</body>
</html>
