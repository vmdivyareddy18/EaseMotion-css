<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Progress Stepper — Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="demo-wrapper">
    <p class="demo-title">Animated Progress Stepper (pure CSS)</p>

    <!--
      Step states, controlled purely with classes:
        is-complete → filled circle + checkmark + filled connector to next step
        is-active   → current step, pulsing ring highlight
        (none)      → upcoming step, default/idle style
    -->
    <ol class="stepper">
      <li class="stepper-step is-complete">
        <div class="stepper-circle">
          <span class="stepper-number">1</span>
          <span class="stepper-check">✓</span>
        </div>
        <span class="stepper-label">Cart</span>
      </li>

      <li class="stepper-step is-complete">
        <div class="stepper-circle">
          <span class="stepper-number">2</span>
          <span class="stepper-check">✓</span>
        </div>
        <span class="stepper-label">Shipping</span>
      </li>

      <li class="stepper-step is-active">
        <div class="stepper-circle">
          <span class="stepper-number">3</span>
          <span class="stepper-check">✓</span>
        </div>
        <span class="stepper-label">Payment</span>
      </li>

      <li class="stepper-step">
        <div class="stepper-circle">
          <span class="stepper-number">4</span>
          <span class="stepper-check">✓</span>
        </div>
        <span class="stepper-label">Review</span>
      </li>

      <li class="stepper-step">
        <div class="stepper-circle">
          <span class="stepper-number">5</span>
          <span class="stepper-check">✓</span>
        </div>
        <span class="stepper-label">Confirm</span>
      </li>
    </ol>
  </div>

</body>
</html>
