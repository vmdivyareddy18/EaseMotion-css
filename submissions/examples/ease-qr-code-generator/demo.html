<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code Generator Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Pulsing scan effect</p>

        <!-- QR CODE GENERATOR COMPONENT -->
        <div class="qr-container">
            <div class="qr-wrapper">
                <div class="qr-section">
                    <!-- QR Code Display -->
                    <div class="qr-display" id="qrDisplay">
                        <div class="qr-code-wrapper" id="qrCodeWrapper">
                            <canvas id="qrCanvas" width="250" height="250"></canvas>
                            <div class="qr-scan-overlay" id="scanOverlay">
                                <div class="scan-line" id="scanLine"></div>
                                <div class="scan-corner tl"></div>
                                <div class="scan-corner tr"></div>
                                <div class="scan-corner bl"></div>
                                <div class="scan-corner br"></div>
                            </div>
                            <div class="qr-pulse" id="qrPulse"></div>
                        </div>
                        <div class="qr-actions">
                            <button class="qr-btn" id="downloadBtn">📥 Download</button>
                            <button class="qr-btn" id="shareBtn">📤 Share</button>
                            <button class="qr-btn" id="toggleScanBtn">⏸ Toggle Scan</button>
                        </div>
                    </div>

                    <!-- QR Code Input -->
                    <div class="qr-input-section">
                        <label class="qr-label" for="qrInput">Enter text or URL</label>
                        <div class="qr-input-group">
                            <input 
                                type="text" 
                                class="qr-input" 
                                id="qrInput" 
                                value="https://easemotion-css.dev"
                                placeholder="Enter text or URL..."
                            />
                            <button class="qr-generate-btn" id="generateBtn">Generate</button>
                        </div>
                        <div class="qr-options">
                            <div class="option-group">
                                <label for="sizeSlider">Size:</label>
                                <input type="range" id="sizeSlider" min="100" max="300" value="250" />
                                <span id="sizeDisplay">250px</span>
                            </div>
                            <div class="option-group">
                                <label for="colorPicker">Color:</label>
                                <input type="color" id="colorPicker" value="#1a1a2e" />
                            </div>
                            <div class="option-group">
                                <label for="bgColorPicker">Background:</label>
                                <input type="color" id="bgColorPicker" value="#ffffff" />
                            </div>
                            <div class="option-group">
                                <label>
                                    <input type="checkbox" id="includeLogo" checked />
                                    Include Logo
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Controls -->
                <div class="qr-controls">
                    <button class="qr-control-btn" id="presetUrlBtn">🌐 Website</button>
                    <button class="qr-control-btn" id="presetTextBtn">📝 Text</button>
                    <button class="qr-control-btn" id="presetEmailBtn">📧 Email</button>
                    <button class="qr-control-btn" id="presetWifiBtn">📶 WiFi</button>
                    <button class="qr-control-btn" id="resetBtn">⟳ Reset</button>
                </div>

                <div class="qr-status">
                    <span class="status-label">Status:</span>
                    <span class="status-value" id="qrStatus">Ready</span>
                    <span class="status-label">Scan:</span>
                    <span class="status-value" id="scanStatus">Active</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <div class="variant-qr">
                        <canvas width="80" height="80"></canvas>
                        <div class="scan-line"></div>
                    </div>
                    <span class="variant-label">Default</span>
                </div>
                <div class="variant-card" id="variant2">
                    <div class="variant-qr">
                        <canvas width="80" height="80"></canvas>
                        <div class="scan-line" style="background: #34c759;"></div>
                    </div>
                    <span class="variant-label">Success</span>
                </div>
                <div class="variant-card" id="variant3">
                    <div class="variant-qr">
                        <canvas width="80" height="80"></canvas>
                        <div class="scan-line" style="background: #ff3b30;"></div>
                    </div>
                    <span class="variant-label">Danger</span>
                </div>
                <div class="variant-card" id="variant4">
                    <div class="variant-qr">
                        <canvas width="80" height="80"></canvas>
                        <div class="scan-line" style="background: #f59e0b;"></div>
                    </div>
                    <span class="variant-label">Warning</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            const qrInput = document.getElementById('qrInput');
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const shareBtn = document.getElementById('shareBtn');
            const toggleScanBtn = document.getElementById('toggleScanBtn');
            const sizeSlider = document.getElementById('sizeSlider');
            const sizeDisplay = document.getElementById('sizeDisplay');
            const colorPicker = document.getElementById('colorPicker');
            const bgColorPicker = document.getElementById('bgColorPicker');
            const includeLogo = document.getElementById('includeLogo');
            const qrStatus = document.getElementById('qrStatus');
            const scanStatus = document.getElementById('scanStatus');
            const scanOverlay = document.getElementById('scanOverlay');
            const scanLine = document.getElementById('scanLine');
            const qrPulse = document.getElementById('qrPulse');
            const resetBtn = document.getElementById('resetBtn');
            const presetUrlBtn = document.getElementById('presetUrlBtn');
            const presetTextBtn = document.getElementById('presetTextBtn');
            const presetEmailBtn = document.getElementById('presetEmailBtn');
            const presetWifiBtn = document.getElementById('presetWifiBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                size: 250,
                color: '#1a1a2e',
                bgColor: '#ffffff',
                includeLogo: true,
                scanEnabled: true,
                scanSpeed: 2, // seconds per cycle
                onGenerate: function(text) {
                    console.log(`📱 QR Code generated for: ${text}`);
                },
                onScan: function() {
                    console.log('📷 Scan animation cycle');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let currentText = qrInput.value || 'https://easemotion-css.dev';
            let isScanEnabled = CONFIG.scanEnabled;
            let scanAnimationId = null;

            // ============================================
            // QR CODE GENERATION (Simplified)
            // ============================================
            function generateQR(text, size = CONFIG.size, color = CONFIG.color, bgColor = CONFIG.bgColor) {
                const w = canvas.width;
                const h = canvas.height;
                
                // Clear canvas
                ctx.fillStyle = bgColor;
                ctx.fillRect(0, 0, w, h);

                // Simple QR-like pattern generation
                // For demo purposes, we create a stylized QR pattern
                // In production, you'd use a proper QR library like qrcode.js
                
                const seed = text.length + text.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
                const rand = (seed, x, y) => {
                    const val = Math.sin(seed * x * 0.1 + y * 0.3 + text.length) * 10000;
                    return val - Math.floor(val);
                };

                const moduleSize = size / 25;
                const margin = moduleSize * 2;
                const modules = 21;

                // Draw QR-like pattern
                for (let row = 0; row < modules; row++) {
                    for (let col = 0; col < modules; col++) {
                        const x = margin + col * moduleSize;
                        const y = margin + row * moduleSize;
                        
                        // Finder patterns
                        const isFinder = (row < 7 && col < 7) || 
                                       (row < 7 && col > modules - 8) || 
                                       (row > modules - 8 && col < 7);
                        
                        let isDark = false;
                        
                        if (isFinder) {
                            // Finder pattern
                            const innerRow = row < 4 ? row : (row > modules - 5 ? modules - 1 - row : row);
                            const innerCol = col < 4 ? col : (col > modules - 5 ? modules - 1 - col : col);
                            isDark = (innerRow === 0 || innerRow === 3 || innerCol === 0 || innerCol === 3) ||
                                    (innerRow >= 1 && innerRow <= 2 && innerCol >= 1 && innerCol <= 2);
                        } else {
                            // Data modules based on text
                            const hash = rand(seed, col, row);
                            isDark = hash > 0.5;
                            
                            // Add some structure
                            if (row % 2 === 0 && col % 3 === 0) isDark = true;
                            if (row % 3 === 0 && col % 2 === 0) isDark = false;
                        }
                        
                        // Add timing patterns
                        if (row === 6 || col === 6) {
                            isDark = (row + col) % 2 === 0;
                        }
                        
                        // Add some alignment patterns
                        if (row > 7 && row < 14 && col > 7 && col < 14) {
                            if (row === 10 || col === 10 || (row > 9 && row < 11 && col > 9 && col < 11)) {
                                isDark = true;
                            }
                        }
                        
                        if (isDark) {
                            ctx.fillStyle = color;
                            ctx.fillRect(x, y, moduleSize, moduleSize);
                        }
                    }
                }

                // Add logo in center
                if (CONFIG.includeLogo) {
                    const logoSize = size * 0.2;
                    const logoX = (w - logoSize) / 2;
                    const logoY = (h - logoSize) / 2;
                    
                    // White background for logo
                    ctx.fillStyle = bgColor;
                    ctx.fillRect(logoX - 4, logoY - 4, logoSize + 8, logoSize + 8);
                    
                    // Logo (simplified)
                    ctx.fillStyle = color;
                    ctx.font = `${logoSize * 0.6}px sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('✦', w / 2, h / 2 + 2);
                }

                CONFIG.onGenerate(text);
                qrStatus.textContent = '✅ Generated';
                setTimeout(() => {
                    if (qrStatus.textContent === '✅ Generated') {
                        qrStatus.textContent = 'Ready';
                    }
                }, 2000);
            }

            // ============================================
            // SCAN ANIMATION
            // ============================================
            function startScanAnimation() {
                if (scanAnimationId) {
                    cancelAnimationFrame(scanAnimationId);
                    scanAnimationId = null;
                }
                
                let startTime = null;
                const duration = CONFIG.scanSpeed * 1000;
                
                function animate(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = ((timestamp - startTime) % duration) / duration;
                    
                    // Move scan line from top to bottom
                    const y = progress * 100;
                    scanLine.style.top = y + '%';
                    scanLine.style.opacity = 0.4 + Math.sin(progress * Math.PI) * 0.4;
                    
                    // Pulse effect
                    const pulseScale = 1 + Math.sin(progress * Math.PI * 2) * 0.02;
                    qrPulse.style.transform = `scale(${pulseScale})`;
                    qrPulse.style.opacity = 0.3 + Math.sin(progress * Math.PI * 2) * 0.15;
                    
                    CONFIG.onScan();
                    
                    scanAnimationId = requestAnimationFrame(animate);
                }
                
                if (isScanEnabled) {
                    scanAnimationId = requestAnimationFrame(animate);
                    scanStatus.textContent = 'Active';
                    toggleScanBtn.textContent = '⏸ Toggle Scan';
                }
            }

            function stopScanAnimation() {
                if (scanAnimationId) {
                    cancelAnimationFrame(scanAnimationId);
                    scanAnimationId = null;
                }
                scanLine.style.top = '0%';
                scanLine.style.opacity = '0.5';
                qrPulse.style.transform = 'scale(1)';
                qrPulse.style.opacity = '0.3';
                scanStatus.textContent = 'Paused';
                toggleScanBtn.textContent = '▶ Toggle Scan';
            }

            function toggleScan() {
                isScanEnabled = !isScanEnabled;
                if (isScanEnabled) {
                    startScanAnimation();
                } else {
                    stopScanAnimation();
                }
            }

            // ============================================
            // QR CODE UPDATE
            // ============================================
            function updateQR() {
                const text = qrInput.value.trim() || 'Hello, World!';
                currentText = text;
                const size = parseInt(sizeSlider.value);
                const color = colorPicker.value;
                const bgColor = bgColorPicker.value;
                
                // Update canvas size
                canvas.width = size;
                canvas.height = size;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                
                // Update display
                sizeDisplay.textContent = size + 'px';
                CONFIG.size = size;
                CONFIG.color = color;
                CONFIG.bgColor = bgColor;
                CONFIG.includeLogo = includeLogo.checked;
                
                generateQR(text, size, color, bgColor);
            }

            // ============================================
            // DOWNLOAD QR CODE
            // ============================================
            function downloadQR() {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                qrStatus.textContent = '📥 Downloaded';
                setTimeout(() => {
                    if (qrStatus.textContent === '📥 Downloaded') {
                        qrStatus.textContent = 'Ready';
                    }
                }, 2000);
            }

            // ============================================
            // SHARE QR CODE
            // ============================================
            async function shareQR() {
                try {
                    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
                    const file = new File([blob], 'qrcode.png', { type: 'image/png' });
                    
                    if (navigator.share) {
                        await navigator.share({
                            title: 'QR Code',
                            text: currentText,
                            files: [file]
                        });
                        qrStatus.textContent = '📤 Shared';
                    } else {
                        // Fallback: copy to clipboard
                        await navigator.clipboard.writeText(currentText);
                        qrStatus.textContent = '📋 Copied to clipboard';
                    }
                    
                    setTimeout(() => {
                        if (qrStatus.textContent === '📤 Shared' || qrStatus.textContent === '📋 Copied to clipboard') {
                            qrStatus.textContent = 'Ready';
                        }
                    }, 2000);
                } catch (error) {
                    qrStatus.textContent = '❌ Share failed';
                    console.error('Share error:', error);
                }
            }

            // ============================================
            // PRESETS
            // ============================================
            const presets = {
                website: 'https://easemotion-css.dev',
                text: 'Hello, World! This is a QR code demo.',
                email: 'mailto:contact@easemotion-css.dev',
                wifi: 'WIFI:T:WPA;S:MyNetwork;P:password123;;'
            };

            function setPreset(key) {
                qrInput.value = presets[key] || '';
                updateQR();
                qrStatus.textContent = `📌 ${key.charAt(0).toUpperCase() + key.slice(1)} preset`;
                setTimeout(() => {
                    if (qrStatus.textContent.startsWith('📌')) {
                        qrStatus.textContent = 'Ready';
                    }
                }, 1500);
            }

            // ============================================
            // RESET
            // ============================================
            function resetQR() {
                qrInput.value = 'https://easemotion-css.dev';
                sizeSlider.value = '250';
                colorPicker.value = '#1a1a2e';
                bgColorPicker.value = '#ffffff';
                includeLogo.checked = true;
                updateQR();
                qrStatus.textContent = '⟳ Reset';
                setTimeout(() => {
                    if (qrStatus.textContent === '⟳ Reset') {
                        qrStatus.textContent = 'Ready';
                    }
                }, 1500);
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            generateBtn.addEventListener('click', updateQR);
            qrInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') updateQR();
            });
            sizeSlider.addEventListener('input', updateQR);
            colorPicker.addEventListener('input', updateQR);
            bgColorPicker.addEventListener('input', updateQR);
            includeLogo.addEventListener('change', updateQR);
            downloadBtn.addEventListener('click', downloadQR);
            shareBtn.addEventListener('click', shareQR);
            toggleScanBtn.addEventListener('click', toggleScan);
            resetBtn.addEventListener('click', resetQR);
            presetUrlBtn.addEventListener('click', () => setPreset('website'));
            presetTextBtn.addEventListener('click', () => setPreset('text'));
            presetEmailBtn.addEventListener('click', () => setPreset('email'));
            presetWifiBtn.addEventListener('click', () => setPreset('wifi'));

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    updateQR();
                }
                if (e.key === 's' && e.ctrlKey) {
                    e.preventDefault();
                    downloadQR();
                }
                if (e.key === ' ') {
                    e.preventDefault();
                    toggleScan();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const canvas = card.querySelector('canvas');
                const ctx = canvas.getContext('2d');
                const scanLine = card.querySelector('.scan-line');
                
                // Draw simple QR pattern
                const size = 80;
                canvas.width = size;
                canvas.height = size;
                
                for (let i = 0; i < 15; i++) {
                    for (let j = 0; j < 15; j++) {
                        const x = (i / 15) * size;
                        const y = (j / 15) * size;
                        const moduleSize = size / 15;
                        const isDark = (i + j) % 2 === 0 || (i * j) % 3 === 0;
                        if (isDark) {
                            ctx.fillStyle = '#1a1a2e';
                            ctx.fillRect(x, y, moduleSize, moduleSize);
                        }
                    }
                }
                
                // Finder patterns
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, size * 0.25, size * 0.25);
                ctx.fillRect(size * 0.75, 0, size * 0.25, size * 0.25);
                ctx.fillRect(0, size * 0.75, size * 0.25, size * 0.25);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(size * 0.05, size * 0.05, size * 0.15, size * 0.15);
                ctx.fillRect(size * 0.8, size * 0.05, size * 0.15, size * 0.15);
                ctx.fillRect(size * 0.05, size * 0.8, size * 0.15, size * 0.15);
                
                // Animate scan line
                let startTime = null;
                function animateScan(timestamp) {
                    if (!startTime) startTime = timestamp;
                    const progress = ((timestamp - startTime) % 2000) / 2000;
                    scanLine.style.top = (progress * 100) + '%';
                    requestAnimationFrame(animateScan);
                }
                animateScan(0);
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.QRGenerator = {
                generate: (text) => {
                    qrInput.value = text;
                    updateQR();
                },
                download: downloadQR,
                share: shareQR,
                toggleScan: toggleScan,
                setSize: (size) => {
                    sizeSlider.value = size;
                    updateQR();
                },
                setColor: (color) => {
                    colorPicker.value = color;
                    updateQR();
                },
                setBgColor: (color) => {
                    bgColorPicker.value = color;
                    updateQR();
                },
                reset: resetQR,
                getState: () => ({
                    text: currentText,
                    size: CONFIG.size,
                    color: CONFIG.color,
                    bgColor: CONFIG.bgColor,
                    scanEnabled: isScanEnabled
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.scanEnabled !== undefined) {
                        isScanEnabled = config.scanEnabled;
                        if (isScanEnabled) {
                            startScanAnimation();
                        } else {
                            stopScanAnimation();
                        }
                    }
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            updateQR();
            startScanAnimation();

            console.log('✅ QR Code Generator initialized!');
            console.log('📖 API: window.QRGenerator');
            console.log('📖 Usage:');
            console.log('  - Enter text/URL and click Generate');
            console.log('  - Keyboard shortcuts: Ctrl+Enter (generate), Ctrl+S (download), Space (toggle scan)');
            console.log('  - Adjust size, colors, and logo settings');

        })();
    </script>
</body>
</html>
