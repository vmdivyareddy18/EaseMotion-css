<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Security Collaboration Ecosystem</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="coord-dashboard">
    <header class="header">
      <span class="badge">Collaboration Hub</span>
      <h1>Global Security Collaboration Ecosystem</h1>
      <p class="subtitle">Secure collaboration grids and cross-enterprise active sharing.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-collab">
        <h3>🚨 Real-Time Security Incident Logs</h3>
        <div class="incident-table">
          <div class="table-header"><span>Incident</span><span>Origin</span></div>
          <div class="table-row"><span>SSH Attack</span><span>Hub-A</span></div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card controls-card">
          <h3>⚡ Action Controls</h3>
          <button class="action-btn escalate">Escalate Alert</button>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
