<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hover Wobble Example</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f8fafc;
      color: #334155;
      gap: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 2rem;
    }
    .button {
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background-color: #6c63ff;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-decoration: none;
    }
    .card {
      padding: 2rem;
      background-color: white;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      max-width: 300px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hover Wobble Animation</h1>
    <p>A subtle, playful left-to-right tilting and shaking animation for interactive elements.</p>
    
    <button class="button hover-wobble">Hover me to Wobble!</button>
  </div>

  <div class="card hover-wobble">
    <h3>Interactive Card</h3>
    <p>This entire card wobbles when you hover over it. Great for drawing attention to specific content.</p>
  </div>
</body>
</html>
