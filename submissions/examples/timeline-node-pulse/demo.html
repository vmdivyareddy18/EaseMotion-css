<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timeline Node Pulse</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="panel" aria-labelledby="demo-title">
    <p class="eyebrow">EaseMotion timeline</p>
    <h1 id="demo-title">Timeline node pulse</h1>
    <p class="intro">A vertical timeline where the current node pulses while completed nodes stay calm.</p>

    <ol class="timeline" aria-label="Deployment timeline">
      <li class="done">Build complete</li>
      <li class="active">Review in progress</li>
      <li>Ready to publish</li>
    </ol>
  </main>
</body>
</html>
