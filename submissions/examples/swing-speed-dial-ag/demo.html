<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swing Speed Dial</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- demo container -->
  <main class="demo-wrapper">
    <h1 class="demo-title">Share Profile</h1>
    <p class="demo-subtitle">Click the FAB below to swing open the social options (Pure CSS).</p>
    
    <!-- speed dial component -->
    <div class="swing-speed-dial">
      
      <!-- hidden checkbox hack for pure css state -->
      <input type="checkbox" id="dial-toggle" class="dial-toggle-input" aria-label="Toggle Speed Dial">
      
      <!-- menu items -->
      <div class="dial-menu">
        <a href="#" class="dial-item ease-swing-in" style="--i: 3;" aria-label="Share on Instagram" title="Instagram">
          <span class="social-icon ig">Ig</span>
        </a>
        <a href="#" class="dial-item ease-swing-in" style="--i: 2;" aria-label="Share on Twitter" title="Twitter">
          <span class="social-icon tw">Tw</span>
        </a>
        <a href="#" class="dial-item ease-swing-in" style="--i: 1;" aria-label="Share on Facebook" title="Facebook">
          <span class="social-icon fb">Fb</span>
        </a>
      </div>
      
      <!-- main fab -->
      <label for="dial-toggle" class="dial-fab" role="button" aria-haspopup="true">
        <span class="fab-icon ease-swing-icon">+</span>
      </label>
      
    </div>
  </main>
</body>
</html>
