<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-circle-draw – SVG Circle Draw</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-2 ease-fade-in">
      SVG Circle Draw
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      The circle draws itself using <code>stroke-dashoffset</code> animation.
    </p>

    <div class="ease-flex ease-justify-center ease-gap-8 ease-flex-wrap">
      <!-- Circle only -->
      <svg class="circle-svg" viewBox="0 0 100 100" width="120" height="120">
        <circle class="ease-circle-draw" cx="50" cy="50" r="40"
                fill="none" stroke="#3b82f6" stroke-width="3"
                stroke-linecap="round" />
      </svg>

      <!-- Circle + checkmark -->
      <svg class="circle-svg" viewBox="0 0 100 100" width="120" height="120">
        <circle class="ease-circle-draw" cx="50" cy="50" r="40"
                fill="none" stroke="#16a34a" stroke-width="3"
                stroke-linecap="round" />
        <polyline class="check-draw" points="30,50 45,65 70,38"
                  fill="none" stroke="#16a34a" stroke-width="4"
                  stroke-linecap="round" stroke-linejoin="round" />
      </svg>

      <!-- Circle + cross -->
      <svg class="circle-svg" viewBox="0 0 100 100" width="120" height="120">
        <circle class="ease-circle-draw" cx="50" cy="50" r="40"
                fill="none" stroke="#ef4444" stroke-width="3"
                stroke-linecap="round" />
        <g class="cross-draw">
          <line x1="32" y1="32" x2="68" y2="68" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
          <line x1="68" y1="32" x2="32" y2="68" stroke="#ef4444" stroke-width="4" stroke-linecap="round" />
        </g>
      </svg>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Uses <code>--ease-circle-draw-speed</code> custom property.
    </p>
  </div>

</body>
</html>
