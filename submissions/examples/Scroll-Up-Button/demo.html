<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Default Theme</title>

<style>
/* ===== DARK THEME DEFAULT ===== */
:root {
    --bg: #0f0f0f;
    --text: #ffffff;
}

/* ===== LIGHT THEME ===== */
[data-theme="light"] {
    --bg: #ffffff;
    --text: #111111;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    transition: 0.3s ease;
}

/* Layout */
header {
    text-align: center;
    padding: 3rem 1rem;
}

section {
    max-width: 800px;
    margin: auto;
    padding: 1rem;
}

p {
    margin: 1rem 0;
}

/* spacer */
.spacer {
    height: 1500px;
}

/* Scroll Button */
#scrollTopBtn {
    position: fixed;
    bottom: 24px;
    right: 24px;

    width: 56px;
    height: 56px;

    border: none;
    border-radius: 50%;

    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: white;

    font-size: 24px;
    font-weight: 900;

    cursor: pointer;
    box-shadow: 0 8px 24px rgba(108, 99, 255, 0.4);

    opacity: 0;
    visibility: hidden;
    transform: translateY(20px);

    transition: all 0.3s ease;
}

#scrollTopBtn.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
}

/* Theme Toggle Button */
#themeToggle {
    position: fixed;
    top: 20px;
    right: 20px;

    padding: 10px 14px;
    border: none;
    border-radius: 8px;

    cursor: pointer;
    background: #333;
    color: white;
}
</style>

</head>

<body>

<!-- Theme Toggle -->
<button id="themeToggle">Light Mode</button>

<header>
    <h1>Dark Theme Default</h1>
    <p>Toggle to Light Mode</p>
</header>

<section>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
    <p>Lorem ipsum dolor sit amet.</p>
</section>

<div class="spacer"></div>

<!-- Scroll Button -->
<button id="scrollTopBtn">⬆</button>

<script>
const btn = document.getElementById("scrollTopBtn");
const themeBtn = document.getElementById("themeToggle");
const root = document.documentElement;

/* DEFAULT = DARK (no attribute set) */

/* Scroll button */
window.addEventListener("scroll", () => {
    if (window.scrollY > 200) {
        btn.classList.add("show");
    } else {
        btn.classList.remove("show");
    }
});

btn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
});

/* Theme toggle */
themeBtn.addEventListener("click", () => {
    if (root.getAttribute("data-theme") === "light") {
        root.removeAttribute("data-theme"); // back to dark
        themeBtn.innerText = "Light Mode";
    } else {
        root.setAttribute("data-theme", "light"); // switch light
        themeBtn.innerText = "Dark Mode";
    }
});
</script>

</body>
</html>
