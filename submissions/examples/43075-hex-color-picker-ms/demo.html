<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Color Picker Demo</title>
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; font-family: 'Outfit', sans-serif;">

  <div class="ease-hex-picker">
    <div class="ease-hex-header">
      <h3 style="margin: 0 0 0.5rem 0; font-size: 1.25rem; font-weight: 600; color: #f8fafc;">Theme Color</h3>
      <p style="margin: 0; font-size: 0.875rem; color: #94a3b8;">Select your primary accent.</p>
    </div>

    <div class="ease-hex-grid">
      <!-- Violet -->
      <label class="ease-hex-swatch">
        <input type="radio" name="hexcolor" class="ease-hex-input" checked>
        <span class="ease-hex-color" style="background: #8b5cf6;"></span>
        <span class="ease-hex-label">#8b5cf6</span>
      </label>

      <!-- Rose -->
      <label class="ease-hex-swatch">
        <input type="radio" name="hexcolor" class="ease-hex-input">
        <span class="ease-hex-color" style="background: #f43f5e;"></span>
        <span class="ease-hex-label">#f43f5e</span>
      </label>

      <!-- Sky -->
      <label class="ease-hex-swatch">
        <input type="radio" name="hexcolor" class="ease-hex-input">
        <span class="ease-hex-color" style="background: #0ea5e9;"></span>
        <span class="ease-hex-label">#0ea5e9</span>
      </label>

      <!-- Emerald -->
      <label class="ease-hex-swatch">
        <input type="radio" name="hexcolor" class="ease-hex-input">
        <span class="ease-hex-color" style="background: #10b981;"></span>
        <span class="ease-hex-label">#10b981</span>
      </label>

      <!-- Amber -->
      <label class="ease-hex-swatch">
        <input type="radio" name="hexcolor" class="ease-hex-input">
        <span class="ease-hex-color" style="background: #f59e0b;"></span>
        <span class="ease-hex-label">#f59e0b</span>
      </label>
    </div>
    
    <div class="ease-hex-preview">
      <span class="ease-hex-preview-dot"></span>
      <span class="ease-hex-preview-text">Color Selected</span>
    </div>
  </div>

</body>
</html>
