<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Down Vertical - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="pillar"></div>
        <button onclick="document.querySelector('.pillar').classList.add('ease-scale-v-down');">Collapse Pillar</button>
        <button onclick="document.querySelector('.pillar').classList.remove('ease-scale-v-down');" style="border-color:#444;">Reset</button>
    </div>
</body>
</html>
