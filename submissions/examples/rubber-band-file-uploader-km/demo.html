<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rubber Band File Uploader Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="rb-uploader" id="rbUploader">
    <div class="rb-icon">⬆</div>
    <p class="rb-text">Drag & drop a file here, or click to browse</p>
    <p class="rb-filename" id="rbFilename"></p>
    <input type="file" class="rb-input" id="rbInput">
  </div>

  <script>
    (function () {
      var zone = document.getElementById('rbUploader');
      var input = document.getElementById('rbInput');
      var filenameEl = document.getElementById('rbFilename');

      zone.addEventListener('click', function () {
        input.click();
      });

      ['dragenter', 'dragover'].forEach(function (evt) {
        zone.addEventListener(evt, function (e) {
          e.preventDefault();
          zone.classList.add('is-dragging');
        });
      });

      ['dragleave', 'drop'].forEach(function (evt) {
        zone.addEventListener(evt, function (e) {
          e.preventDefault();
          zone.classList.remove('is-dragging');
        });
      });

      zone.addEventListener('drop', function (e) {
        var files = e.dataTransfer.files;
        if (files.length) handleFile(files[0]);
      });

      input.addEventListener('change', function () {
        if (input.files.length) handleFile(input.files[0]);
      });

      function handleFile(file) {
        filenameEl.textContent = '📄 ' + file.name;
        zone.classList.add('rb-drop-bounce');
        zone.addEventListener('animationend', function handler() {
          zone.classList.remove('rb-drop-bounce');
          zone.removeEventListener('animationend', handler);
        });
      }
    })();
  </script>

</body>
</html>
