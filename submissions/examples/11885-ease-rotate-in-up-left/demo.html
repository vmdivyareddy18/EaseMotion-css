<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation: ease-rotate-in-up-left</title>
  <meta name="description" content="A demonstration of the ease-rotate-in-up-left animation showing an element rotating into view from the lower-right corner using left top origin.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-rotate-in-up-left</h1>
      <p class="subtitle" id="main-desc">Rotates into view from the lower-right using transform-origin: left top</p>
    </header>

    <div class="display-area">
      <!-- Target that rotates in -->
      <div class="rotate-target ease-rotate-in-up-left" id="target-element">
        <span>Rotate In</span>
      </div>
    </div>

    <button id="btn-replay" onclick="replayAnimation()">Replay Entrance</button>
  </main>

  <script>
    function replayAnimation() {
      const target = document.getElementById('target-element');
      target.classList.remove('ease-rotate-in-up-left');
      void target.offsetWidth;
      target.classList.add('ease-rotate-in-up-left');
    }
  </script>

</body>
</html>
