<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Freeze Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calendar-shell">
    <section class="overview">
      <p>Release Planning</p>
      <h1>Change Freeze Calendar</h1>
      <span>Freeze starts Friday 18:00</span>
    </section>

    <section class="calendar" aria-label="Change freeze week">
      <article>
        <strong>Mon</strong>
        <span class="open">Open</span>
        <p>Normal deployments</p>
      </article>
      <article>
        <strong>Tue</strong>
        <span class="open">Open</span>
        <p>Patch releases</p>
      </article>
      <article>
        <strong>Wed</strong>
        <span class="review">Review</span>
        <p>Risk checks</p>
      </article>
      <article>
        <strong>Thu</strong>
        <span class="review">Review</span>
        <p>Final approvals</p>
      </article>
      <article class="freeze">
        <strong>Fri</strong>
        <span>Freeze</span>
        <p>Only emergency fixes</p>
      </article>
      <article class="freeze">
        <strong>Sat</strong>
        <span>Freeze</span>
        <p>No scheduled changes</p>
      </article>
      <article class="freeze">
        <strong>Sun</strong>
        <span>Freeze</span>
        <p>Monitoring only</p>
      </article>
    </section>
  </main>
</body>
</html>
