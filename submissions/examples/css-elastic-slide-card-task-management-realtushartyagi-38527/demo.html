<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elastic Slide Card - Task Management Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="task-layout-container">
    
    <!-- Elastic Slide Card Component -->
    <div class="ease-task-slide-card" tabindex="0">
      
      <!-- Visible Card Front -->
      <div class="ease-task-front">
        <div class="task-header">
          <span class="task-tag tag-urgent">Urgent</span>
          <span class="task-time">Today, 2:00 PM</span>
        </div>
        
        <h3 class="task-title">Design System Revamp</h3>
        <p class="task-summary">Update component library with new elastic animations and finalize color tokens.</p>
        
        <div class="task-footer">
          <div class="task-assignees">
            <div class="avatar">A</div>
            <div class="avatar">T</div>
          </div>
          <span class="slide-hint">Hover to expand &rarr;</span>
        </div>
      </div>
      
      <!-- Elastic Sliding Back Panel -->
      <div class="ease-task-back">
        <h4 class="back-title">Quick Actions</h4>
        <ul class="task-actions">
          <li>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
              Mark Complete
            </button>
          </li>
          <li>
            <button class="action-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
              Reschedule
            </button>
          </li>
          <li>
            <button class="action-btn btn-danger">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              Delete Task
            </button>
          </li>
        </ul>
      </div>
      
    </div>

  </div>

</body>
</html>
