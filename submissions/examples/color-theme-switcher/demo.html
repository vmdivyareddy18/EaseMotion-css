<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Theme Switcher</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="theme-light" id="themeBody">
  <div class="ease-flex ease-center" style="min-height: 100vh; flex-direction: column; gap: 1.5rem;">
    <h1 class="theme-title">Theme Switcher</h1>
    <div class="theme-controls">
      <button class="theme-btn" data-theme="theme-light" style="background: #ffffff; color: #1e293b; border-color: #cbd5e1;">Light</button>
      <button class="theme-btn" data-theme="theme-dark" style="background: #1e293b; color: #e2e8f0; border-color: #475569;">Dark</button>
      <button class="theme-btn" data-theme="theme-sunset" style="background: #fed7aa; color: #7c2d12; border-color: #fdba74;">Sunset</button>
      <button class="theme-btn" data-theme="theme-ocean" style="background: #dbeafe; color: #1e3a5f; border-color: #93c5fd;">Ocean</button>
    </div>
    <p class="theme-description">Click a theme button to change the color scheme of this page.</p>
  </div>
  <script src="script.js"></script>
</body>
</html>
