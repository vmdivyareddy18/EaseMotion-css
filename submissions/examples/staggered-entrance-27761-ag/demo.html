<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Entrance Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of staggered entrance animation delays demonstrating sequential slide-in cascades.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Staggered Entrances</h1>
      <p class="description">
        Demonstrates cascading item delays. Click the trigger button below 
        to restart the staggered slide-in transition sequence.
      </p>
    </header>

    <main class="showcase">
      <div class="showcase-card">
        <div class="card-header">
          <h2>Staggered Grid</h2>
          <button class="reload-btn" id="reload-trigger">🔄 Restart</button>
        </div>

        <div class="stagger-grid" id="grid-parent">
          <div class="grid-item" style="--stagger-index: 1;">Item 1</div>
          <div class="grid-item" style="--stagger-index: 2;">Item 2</div>
          <div class="grid-item" style="--stagger-index: 3;">Item 3</div>
          <div class="grid-item" style="--stagger-index: 4;">Item 4</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    const trigger = document.getElementById('reload-trigger');
    const parent = document.getElementById('grid-parent');

    trigger.addEventListener('click', () => {
      const items = Array.from(parent.children);
      parent.innerHTML = '';
      items.forEach(item => {
        parent.appendChild(item);
      });
    });
  </script>

</body>
</html>
