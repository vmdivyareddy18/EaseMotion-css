<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Data Table</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="table-wrapper">
      <table class="data-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Role</th>
            <th>Status</th>
            <th class="hide-mobile">Location</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Alice Wang</td><td>Designer</td><td><span class="status active">Active</span></td><td class="hide-mobile">New York</td></tr>
          <tr><td>Bob Martinez</td><td>Developer</td><td><span class="status active">Active</span></td><td class="hide-mobile">San Francisco</td></tr>
          <tr><td>Carol Smith</td><td>Manager</td><td><span class="status inactive">Inactive</span></td><td class="hide-mobile">London</td></tr>
          <tr><td>David Kim</td><td>Developer</td><td><span class="status active">Active</span></td><td class="hide-mobile">Seoul</td></tr>
          <tr><td>Eve Johnson</td><td>Designer</td><td><span class="status inactive">Inactive</span></td><td class="hide-mobile">Berlin</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
