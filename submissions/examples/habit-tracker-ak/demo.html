<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Habit Tracker - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="ht-wrapper">

    <h1>Daily Habit Tracker</h1>

    <div class="ht-add">
      <input type="text" id="habitInput" class="ht-input" placeholder="New habit...">
      <button class="ht-add-btn" id="addHabitBtn">Add</button>
    </div>

    <div class="ht-list" id="habitList"></div>

  </div>

  <script>
    const list = document.getElementById('habitList');
    const input = document.getElementById('habitInput');
    const addBtn = document.getElementById('addHabitBtn');

    const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    let habits = JSON.parse(localStorage.getItem('habits') || '[]');

    function save() {
      localStorage.setItem('habits', JSON.stringify(habits));
    }

    function render() {
      if (habits.length === 0) {
        list.innerHTML = '<div class="ht-empty">No habits yet. Add one above.</div>';
        return;
      }

      list.innerHTML = habits.map((habit, hi) => {
        const checked = days.map((d, di) => {
          const val = habit.days[di] || false;
          return '<label class="ht-check"><input type="checkbox" data-habit="' + hi + '" data-day="' + di + '" ' + (val ? 'checked' : '') + '><span>' + d.substr(0,2) + '</span></label>';
        }).join('');

        const done = habit.days.filter(Boolean).length;
        const pct = Math.round((done / 7) * 100);

        return '<div class="ht-item"><div class="ht-top"><span class="ht-name">' + escapeHtml(habit.name) + '</span><button class="ht-del" data-habit="' + hi + '">&times;</button></div><div class="ht-days">' + checked + '</div><div class="ht-bar"><div class="ht-fill" style="width:' + pct + '%"></div></div><div class="ht-pct">' + pct + '% this week</div></div>';
      }).join('');

      document.querySelectorAll('.ht-check input').forEach(cb => {
        cb.addEventListener('change', () => {
          const hi = parseInt(cb.dataset.habit);
          const di = parseInt(cb.dataset.day);
          habits[hi].days[di] = cb.checked;
          save();
          render();
        });
      });

      document.querySelectorAll('.ht-del').forEach(btn => {
        btn.addEventListener('click', () => {
          habits.splice(parseInt(btn.dataset.habit), 1);
          save();
          render();
        });
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    addBtn.addEventListener('click', () => {
      const name = input.value.trim();
      if (!name) return;
      habits.push({ name, days: [false, false, false, false, false, false, false] });
      save();
      render();
      input.value = '';
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addBtn.click();
    });

    render();
  </script>

</body>
</html>
