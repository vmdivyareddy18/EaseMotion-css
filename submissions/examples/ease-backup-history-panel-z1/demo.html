<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Backup History Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="backup-card">
<h2>Backup History</h2>
<div class="backup"><span>Daily Backup</span><b class="done">Success</b></div>
<div class="backup"><span>Database Dump</span><b class="run">Running</b></div>
<div class="backup"><span>Media Files</span><b class="fail">Failed</b></div>
<div class="backup"><span>Logs Archive</span><b class="done">Success</b></div>
</section>
</body>
</html>
