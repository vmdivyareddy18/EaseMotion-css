<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Magnifier Zoom - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="demo-section">
    <h1>Image Magnifier Zoom</h1>
    <p class="desc">Hover over the image to see a zoomed lens view follow your cursor. The magnified portion appears inside the lens.</p>
    <div class="mz-container">
      <div class="mz-wrapper" id="mzWrapper">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?auto=format&fit=crop&w=1200&q=80" class="mz-image" id="mzImage" alt="Landscape">
        <div class="mz-lens" id="mzLens"></div>
      </div>
    </div>
    <div class="mz-info">
      <span>Zoom: <strong id="mzZoomLabel">2.5x</strong></span>
      <input type="range" id="mzZoomSlider" min="1.5" max="5" step="0.1" value="2.5">
    </div>
  </section>
  <script>
    (function() {
      var wrapper = document.getElementById('mzWrapper');
      var lens = document.getElementById('mzLens');
      var img = document.getElementById('mzImage');
      var slider = document.getElementById('mzZoomSlider');
      var zoomLabel = document.getElementById('mzZoomLabel');

      if (!wrapper || !lens || !img || !slider || !zoomLabel) return;

      var zoom = 2.5;

      function updateLens() {
        lens.style.backgroundImage = 'url(' + img.src + ')';
        lens.style.backgroundSize = (zoom * 100) + '% auto';
      }

      function calcBgPos(cursor, imgDim, lensDim) {
        var ratio = imgDim / lensDim;
        return -(cursor * ratio - (lensDim / 2)) + 'px';
      }

      function onMove(e) {
        var rect = wrapper.getBoundingClientRect();
        var x, y;
        if (e.touches) {
          x = e.touches[0].clientX - rect.left;
          y = e.touches[0].clientY - rect.top;
        } else {
          x = e.clientX - rect.left;
          y = e.clientY - rect.top;
        }
        x = Math.max(0, Math.min(x, rect.width));
        y = Math.max(0, Math.min(y, rect.height));
        wrapper.style.setProperty('--mz-x', x + 'px');
        wrapper.style.setProperty('--mz-y', y + 'px');
        var lw = lens.offsetWidth;
        var lh = lens.offsetHeight;
        lens.style.backgroundPosition = calcBgPos(x, rect.width, lw) + ' ' + calcBgPos(y, rect.height, lh);
      }

      function onEnter() {
        lens.classList.add('mz-lens--active');
      }

      function onLeave() {
        lens.classList.remove('mz-lens--active');
      }

      slider.addEventListener('input', function() {
        zoom = parseFloat(slider.value);
        zoomLabel.textContent = zoom.toFixed(1) + 'x';
        wrapper.style.setProperty('--mz-zoom', zoom);
        updateLens();
      });

      wrapper.addEventListener('mousemove', onMove);
      wrapper.addEventListener('mouseenter', onEnter);
      wrapper.addEventListener('mouseleave', onLeave);
      wrapper.addEventListener('touchmove', onMove, { passive: true });
      wrapper.addEventListener('touchstart', onEnter, { passive: true });
      wrapper.addEventListener('touchend', onLeave);

      updateLens();
    })();
  </script>
</body>
</html>
