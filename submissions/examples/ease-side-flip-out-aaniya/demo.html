<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ease-side-flip-out Demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      background: #0f172a;
      font-family: sans-serif;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 60px;
      padding: 40px 20px;
    }
    h1 { font-size: 1.8rem; margin: 0; }
    h2 { font-size: 0.85rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin: 0 0 16px; }
    .demo-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .demo-row { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      min-width: 160px;
    }
    .card h3 { margin: 0 0 8px; font-size: 1rem; }
    .card p  { margin: 0; font-size: 0.85rem; color: #94a3b8; }
    button {
      padding: 8px 18px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>ease-side-flip-out</h1>

  <!-- Hover trigger right -->
  <div class="demo-section">
    <h2>Hover — Flip Out Right</h2>
    <div class="ease-flip-perspective">
      <div class="card ease-side-flip-out-hover">
        <h3>Hover Me</h3>
        <p>Flips out to right</p>
      </div>
    </div>
  </div>

  <!-- Hover trigger left -->
  <div class="demo-section">
    <h2>Hover — Flip Out Left</h2>
    <div class="ease-flip-perspective">
      <div class="card ease-side-flip-out-hover ease-side-flip-out-left-hover">
        <h3>Hover Me</h3>
        <p>Flips out to left</p>
      </div>
    </div>
  </div>

  <!-- Click trigger -->
  <div class="demo-section">
    <h2>Click Trigger</h2>
    <div class="demo-row">
      <div class="ease-flip-perspective">
        <div class="card ease-flip-card" id="card1">
          <h3>Click to Flip</h3>
          <p>Flip out right</p>
          <button onclick="flipCard('card1')">Flip Out</button>
        </div>
      </div>
      <div class="ease-flip-perspective">
        <div class="card" id="card2" style="backface-visibility:hidden;">
          <h3>Click to Flip</h3>
          <p>Flip out left</p>
          <button onclick="flipCardLeft('card2')">Flip Out</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    function flipCard(id) {
      const card = document.getElementById(id);
      card.classList.add('flipped');
      setTimeout(() => {
        card.classList.remove('flipped');
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';
      }, 1500);
    }

    function flipCardLeft(id) {
      const card = document.getElementById(id);
      card.style.animation = 'ease-side-flip-out-left 0.5s cubic-bezier(0.55, 0, 1, 0.45) forwards';
      setTimeout(() => {
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = '';
      }, 1500);
    }
  </script>

</body>
</html>
