<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wasp Sting Micro-Interaction - Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div style="text-align: center; user-select: none;">
    <h1 style="color: #ffffff; font-weight: 800; font-size: 2.2rem; margin: 0 0 0.5rem 0; letter-spacing: -0.02em;">Wasp Sting Deceleration</h1>
    <p style="margin: 0; font-size: 1rem; color: #64748b;">High-velocity impact thrust & damping micro-recoils.</p>
  </div>

  <div class="sting-sandbox-card">
    <div id="stingTarget" class="sting-node-target ease-wasp-sting">🐝</div>

    <button onclick="triggerWaspStingManual()" style="background: var(--wasp-core-color); color: #000; border: none; padding: 10px 20px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em;">
      Trigger Event Loop
    </button>
  </div>

  <script>
    function triggerWaspStingManual() {
      const target = document.getElementById('stingTarget');
      target.classList.add('trigger-sting');

      // Clean class cycle array list to reset loop cleanly
      setTimeout(() => {
        target.classList.remove('trigger-sting');
      }, 450);
    }
  </script>

</body>
</html>
