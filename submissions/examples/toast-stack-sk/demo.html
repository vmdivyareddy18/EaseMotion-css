<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Toast Stack SK</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="toast-stack" aria-live="polite">
    <article class="toast toast--success">
      <span class="toast__icon">✓</span>
      <div class="toast__body">
        <p class="toast__title">Saved</p>
        <p class="toast__message">Your preferences were updated.</p>
      </div>
    </article>
    <article class="toast toast--info">
      <span class="toast__icon">i</span>
      <div class="toast__body">
        <p class="toast__title">Syncing</p>
        <p class="toast__message">Pulling the latest changes.</p>
      </div>
    </article>
    <article class="toast toast--error">
      <span class="toast__icon">!</span>
      <div class="toast__body">
        <p class="toast__title">Failed</p>
        <p class="toast__message">Could not reach the server.</p>
      </div>
    </article>
  </div>
</body>
</html>
