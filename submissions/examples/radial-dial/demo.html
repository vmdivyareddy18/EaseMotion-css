<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Radial Progress Vector Dial — EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #020617;
      color: #f8fafc;
      margin: 0;
      padding: 4rem 2rem;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .panel {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .badge {
      font-family: 'JetBrains Mono', monospace;
      color: #38bdf8;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 2rem 0;
    }
    .display-frame {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4rem;
      background: #0f172a;
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>

  <!-- Hidden Hardware Gradient Matrix Vector Source -->
  <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
    <defs>
      <linearGradient id="ease-dial-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#3b82f6" />
        <stop offset="100%" stop-color="#ec4899" />
      </linearGradient>
    </defs>
  </svg>

  <div class="panel">
    <div class="badge">// Responsive Vector Sizing Dial Array</div>
    <h1>System Loading Core</h1>

    <div class="display-frame">
      <!-- 85% Metric Vector Component Instantiation -->
      <div class="ease-radial-dial" style="--ease-dial-progress: 85;">
        <svg class="ease-radial-svg" viewBox="0 0 80 80">
          <circle class="ease-radial-track" cx="40" cy="40" r="36" />
          <circle class="ease-radial-bar" cx="40" cy="40" r="36" />
        </svg>
        <div class="ease-radial-label">85%</div>
      </div>
    </div>
  </div>

</body>
</html>
