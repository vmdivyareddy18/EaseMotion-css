<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Label Asterisk ARIA Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-form – Asterisk aria-hidden Fix</h2>
  <form class="ease-form" novalidate>
    <div class="ease-field">
      <label class="ease-label" for="name">
        Full Name
        <!-- KEY FIX: aria-hidden so screen readers skip the asterisk -->
        <span class="ease-required" aria-hidden="true">*</span>
      </label>
      <!-- KEY FIX: aria-required communicates requirement to AT -->
      <input class="ease-input" id="name" type="text"
             placeholder="John Doe"
             aria-required="true"
             autocomplete="name">
    </div>
    <div class="ease-field">
      <label class="ease-label" for="email">
        Email Address
        <span class="ease-required" aria-hidden="true">*</span>
      </label>
      <input class="ease-input" id="email" type="email"
             placeholder="john@example.com"
             aria-required="true"
             autocomplete="email">
      <span class="ease-hint">We'll never share your email.</span>
    </div>
    <div class="ease-field">
      <label class="ease-label" for="bio">Bio</label>
      <input class="ease-input" id="bio" type="text" placeholder="Optional">
    </div>
    <button type="submit" class="ease-btn-submit">Submit</button>
  </form>
</body>
</html>
