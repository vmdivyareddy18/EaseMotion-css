<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Button - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-container-qn">
        <h2>Soft UI / Neumorphism</h2>
        <p>Click and hold the button to see it press in.</p>
        
        <!-- The Neumorphic Button -->
        <button class="neu-btn-qn" aria-label="Play">
            <!-- Play Icon SVG -->
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 3l14 9-14 9V3z" fill="currentColor"/>
            </svg>
        </button>
    </div>
</body>
</html>
