<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-focus-aura-collection – Animated Focus Aura</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center ease-py-16">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">Focus Aura Collection</h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">Tab through the buttons to see four distinct animated focus indicators using <code>outline-offset</code>.</p>

    <div class="ease-flex ease-flex-col ease-gap-6 ease-items-center">
      <button class="focus-aura-expand ease-btn ease-btn-primary">Expanding Aura</button>
      <button class="focus-aura-pulse ease-btn ease-btn-primary">Pulse Ring</button>
      <a href="#" class="focus-aura-sweep ease-btn ease-btn-primary">Inset-to-Outset Sweep</a>
      <div role="button" tabindex="0" class="focus-aura-neon ease-btn ease-btn-primary">Neon Glow Aura</div>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">All effects triggered on <code>:focus-visible</code>. Respects <code>prefers-reduced-motion</code>.</p>
  </div>

</body>
</html>
