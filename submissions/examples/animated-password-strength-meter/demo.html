<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Password Strength Meter - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header ease-fade-in-down">
      <h1>Create Account</h1>
      <p>Choose a strong password to secure your account.</p>
    </header>

    <!-- Form Card -->
    <div class="form-card ease-fade-in-up ease-delay-100">
      <form class="signup-form" id="signup-form">
        
        <!-- Email Input -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" placeholder="Enter a strong password" required aria-describedby="strength-meter">
            <button type="button" class="toggle-password ease-hover-grow" id="toggle-password" aria-label="Toggle password visibility">
              <span class="eye-icon" id="eye-icon">👁️</span>
            </button>
          </div>

          <!-- Strength Meter -->
          <div class="strength-meter" id="strength-meter">
            <div class="meter-bar">
              <div class="meter-segment" id="seg-1"></div>
              <div class="meter-segment" id="seg-2"></div>
              <div class="meter-segment" id="seg-3"></div>
              <div class="meter-segment" id="seg-4"></div>
            </div>
            <span class="strength-text" id="strength-text"></span>
          </div>

          <!-- Requirements List -->
          <ul class="requirements-list" id="requirements-list">
            <li class="requirement" data-req="length">
              <span class="req-icon">○</span>
              <span>At least 8 characters</span>
            </li>
            <li class="requirement" data-req="uppercase">
              <span class="req-icon">○</span>
              <span>Contains an uppercase letter</span>
            </li>
            <li class="requirement" data-req="number">
              <span class="req-icon">○</span>
              <span>Contains a number</span>
            </li>
            <li class="requirement" data-req="special">
              <span class="req-icon">○</span>
              <span>Contains a special character (!@#$)</span>
            </li>
          </ul>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn ease-fade-in-up ease-delay-200 ease-hover-grow" disabled id="submit-btn">
          Create Account
        </button>

      </form>
    </div>
  </div>

  <!-- JavaScript for Password Strength Logic -->
  <script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggle-password');
    const eyeIcon = document.getElementById('eye-icon');
    const segments = [
      document.getElementById('seg-1'),
      document.getElementById('seg-2'),
      document.getElementById('seg-3'),
      document.getElementById('seg-4')
    ];
    const strengthText = document.getElementById('strength-text');
    const requirements = document.querySelectorAll('.requirement');
    const submitBtn = document.getElementById('submit-btn');

    // Toggle password visibility
    toggleBtn.addEventListener('click', () => {
      const type = passwordInput.type === 'password' ? 'text' : 'password';
      passwordInput.type = type;
      eyeIcon.textContent = type === 'password' ? '👁️' : '🙈';
    });

    // Check password strength
    passwordInput.addEventListener('input', () => {
      const val = passwordInput.value;
      let strength = 0;

      // Check requirements
      const checks = {
        length: val.length >= 8,
        uppercase: /[A-Z]/.test(val),
        number: /[0-9]/.test(val),
        special: /[!@#$%^&*(),.?":{}|<>]/.test(val)
      };

      // Update requirement list
      requirements.forEach(req => {
        const key = req.dataset.req;
        const icon = req.querySelector('.req-icon');
        
        if (checks[key]) {
          if (!req.classList.contains('met')) {
            req.classList.add('met');
            icon.textContent = '✓';
            icon.classList.remove('ease-bounce-in');
            void icon.offsetWidth; // Trigger reflow
            icon.classList.add('ease-bounce-in');
          }
          strength++;
        } else {
          req.classList.remove('met');
          icon.textContent = '○';
          icon.classList.remove('ease-bounce-in');
        }
      });

      // Update meter segments
      const levels = [
        { text: 'Weak', color: '#ef4444' },
        { text: 'Fair', color: '#f59e0b' },
        { text: 'Good', color: '#3b82f6' },
        { text: 'Strong', color: '#10b981' }
      ];

      segments.forEach((seg, index) => {
        if (index < strength) {
          seg.classList.add('active');
          seg.style.backgroundColor = levels[strength - 1].color;
        } else {
          seg.classList.remove('active');
          seg.style.backgroundColor = '';
        }
      });

      // Update text
      if (val.length > 0) {
        strengthText.textContent = levels[strength - 1]?.text || '';
        strengthText.style.color = levels[strength - 1]?.color || '';
        strengthText.classList.remove('ease-fade-in-up');
        void strengthText.offsetWidth;
        strengthText.classList.add('ease-fade-in-up');
      } else {
        strengthText.textContent = '';
      }

      // Enable/disable submit button
      submitBtn.disabled = strength < 4;
    });

    // Prevent form submission for demo
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('Account created successfully!');
    });
  </script>
</body>
</html>
