<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue Backlog Aging Bands</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Queue Backlog Aging</h1>

        <p class="subtitle">
            Monitor pending requests based on their aging buckets.
        </p>

        <div class="band">

            <div class="label">

                <span>0–2 Days</span>

                <strong>54</strong>

            </div>

            <div class="bar">

                <div class="fill fresh"></div>

            </div>

        </div>

        <div class="band">

            <div class="label">

                <span>3–5 Days</span>

                <strong>28</strong>

            </div>

            <div class="bar">

                <div class="fill warning"></div>

            </div>

        </div>

        <div class="band">

            <div class="label">

                <span>6–10 Days</span>

                <strong>13</strong>

            </div>

            <div class="bar">

                <div class="fill attention"></div>

            </div>

        </div>

        <div class="band">

            <div class="label">

                <span>10+ Days</span>

                <strong>5</strong>

            </div>

            <div class="bar">

                <div class="fill critical"></div>

            </div>

        </div>

        <div class="summary">

            <div class="stat">

                <span>Total Items</span>

                <strong>100</strong>

            </div>

            <div class="stat">

                <span>SLA Breached</span>

                <strong>5</strong>

            </div>

            <div class="stat">

                <span>Average Age</span>

                <strong>3.6 Days</strong>

            </div>

        </div>

    </div>

</div>

</body>
</html>
