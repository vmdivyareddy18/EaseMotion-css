<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directory Tree Expand | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <ul class="tree">
      <li class="tree-node">
        <details open>
          <summary><span class="icon icon-folder">📁</span> project</summary>
          <ul class="branch">
            <li><span class="icon">📄</span> index.html</li>
            <li><span class="icon">📄</span> style.css</li>
            <li><span class="icon">📄</span> app.js</li>
            <li class="tree-node">
              <details>
                <summary><span class="icon icon-folder">📁</span> components</summary>
                <ul class="branch">
                  <li><span class="icon">📄</span> header.jsx</li>
                  <li><span class="icon">📄</span> footer.jsx</li>
                  <li><span class="icon">📄</span> sidebar.jsx</li>
                </ul>
              </details>
            </li>
          </ul>
        </details>
      </li>
      <li class="tree-node">
        <details>
          <summary><span class="icon icon-folder">📁</span> assets</summary>
          <ul class="branch">
            <li><span class="icon">🖼</span> logo.svg</li>
            <li><span class="icon">🖼</span> banner.webp</li>
            <li class="tree-node">
              <details>
                <summary><span class="icon icon-folder">📁</span> icons</summary>
                <ul class="branch">
                  <li><span class="icon">📄</span> check.svg</li>
                  <li><span class="icon">📄</span> close.svg</li>
                </ul>
              </details>
            </li>
          </ul>
        </details>
      </li>
      <li class="tree-node">
        <details>
          <summary><span class="icon icon-folder">📁</span> node_modules</summary>
          <ul class="branch">
            <li><span class="icon">📄</span> .gitkeep</li>
          </ul>
        </details>
      </li>
    </ul>
  </div>
</body>
</html>
