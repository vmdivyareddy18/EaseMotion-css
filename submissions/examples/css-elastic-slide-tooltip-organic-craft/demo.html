<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organic Craft Tooltip</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="craft">

    <h1>Organic Craft Studio</h1>
    <p>Natural handmade creations</p>

    <div class="craft-items">

        <div class="craft-card">

            <button class="craft-btn" aria-describedby="tooltip-1">
                Pottery
            </button>

            <div class="tooltip" id="tooltip-1" role="tooltip">
                Handmade clay pottery collection
            </div>

        </div>


        <div class="craft-card">

            <button class="craft-btn" aria-describedby="tooltip-2">
                Wood Art
            </button>

            <div class="tooltip" id="tooltip-2" role="tooltip">
                Natural wooden artwork
            </div>

        </div>


        <div class="craft-card">

            <button class="craft-btn" aria-describedby="tooltip-3">
                Textiles
            </button>

            <div class="tooltip" id="tooltip-3" role="tooltip">
                Organic fabric creations
            </div>

        </div>

    </div>

</section>

</body>
</html>
