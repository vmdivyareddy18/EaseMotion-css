<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VHS Rewind Animation — EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-vhs-scanlines">

    <div class="demo-container">
        <div class="vhs-status" id="status">PLAY</div>
        
        <h1 class="vhs-title" id="target-text" data-text="RETRO">RETRO</h1>
        
        <p style="color: #666; margin-bottom: 2rem;">Press rewind to trigger the distortion effect.</p>

        <button class="btn-rewind" onclick="triggerRewind()">
            REWIND ◀◀
        </button>
    </div>

    <div style="margin-top: 4rem; text-align: center; color: #444; font-family: sans-serif; text-transform: none;">
        <p>Part of <strong>EaseMotion CSS</strong> — Advanced nostalgic utilities.</p>
    </div>

    <script>
        function triggerRewind() {
            const text = document.getElementById('target-text');
            const status = document.getElementById('status');
            
            // Trigger animation
            text.classList.remove('vhs-active');
            void text.offsetWidth; // Force reflow
            text.classList.add('vhs-active');

            // Update UI status
            status.innerText = "REWINDING...";
            status.style.color = "#f00";

            // Reset status after animation
            setTimeout(() => {
                status.innerText = "PLAY";
                status.style.color = "#0f0";
                // text.classList.remove('vhs-active');
            }, 600);
        }
    </script>
</body>
</html>
