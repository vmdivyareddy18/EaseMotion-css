<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-lion-roar | CSS Animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="ground-l"></div>
    <div class="lion-body">
      <div class="lion-head">
        <div class="mane-lion mane-1"></div>
        <div class="mane-lion mane-2"></div>
        <div class="mane-lion mane-3"></div>
        <div class="muzzle-lion">
          <div class="nose-lion"></div>
          <div class="mouth-lion"></div>
        </div>
        <div class="eye-lion eye-lion-l"></div>
        <div class="eye-lion eye-lion-r"></div>
        <div class="ear-lion ear-lion-l"></div>
        <div class="ear-lion ear-lion-r"></div>
        <div class="shockwave sw-1"></div>
        <div class="shockwave sw-2"></div>
        <div class="shockwave sw-3"></div>
        <div class="roar-text">ROAR</div>
      </div>
      <div class="roar-line rl-1"></div>
      <div class="roar-line rl-2"></div>
      <div class="roar-line rl-3"></div>
      <div class="leg-lion lleg-fl"></div>
      <div class="leg-lion lleg-fr"></div>
      <div class="leg-lion lleg-bl"></div>
      <div class="leg-lion lleg-br"></div>
      <div class="tail-lion"><div class="tail-tuft-l"></div></div>
    </div>
  </div>
</body>
</html>
