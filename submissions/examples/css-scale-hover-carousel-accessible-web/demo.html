<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Scale-Hover Carousel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="carousel">

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/300/220?1" alt="Nature">
        <div class="content">
            <h3>Nature</h3>
            <p>Beautiful landscapes.</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/300/220?2" alt="Technology">
        <div class="content">
            <h3>Technology</h3>
            <p>Modern innovations.</p>
        </div>
    </div>

    <div class="card" tabindex="0">
        <img src="https://picsum.photos/300/220?3" alt="Travel">
        <div class="content">
            <h3>Travel</h3>
            <p>Explore the world.</p>
        </div>
    </div>

</div>

</body>
</html>
