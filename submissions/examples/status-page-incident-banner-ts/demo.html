<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Page Incident Banner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Status page</p>
      <h1 id="demo-title">Incident communication banner</h1>
      <p>A clear incident banner for investigating, monitoring, and resolved service states.</p>
    </section>
    <section class="demo-grid" aria-label="Status Page Incident Banner">
        <article class="incident-banner"><span>Monitoring</span><strong>Elevated API latency</strong><time>Updated 5 min ago</time></article>
        <article class="incident-banner"><span>Investigating</span><strong>Webhook delivery delays</strong><time>Updated 12 min ago</time></article>
        <article class="incident-banner"><span>Resolved</span><strong>Search indexing recovered</strong><time>Updated 1 hr ago</time></article>
    </section>
  </main>
</body>
</html>
