<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wave Mention Input</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="mention-container">
    <div class="mention-card">
      <h2>Create a Post</h2>

      <label for="mention">Mention someone</label>

      <div class="wave-input">
        <span class="at-symbol">@</span>
        <input id="mention" type="text" placeholder="Enter username">
      </div>

      <button>Share</button>
    </div>
  </main>

</body>
</html>
