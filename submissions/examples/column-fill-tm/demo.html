<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Column Fill Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Column Fill</h1>
      <p class="subtitle">Controls how content is distributed across columns when height is constrained.</p>
      <span class="badge">CSS Property: column-fill</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">column-fill: balance</span>
          <span class="demo-value column-fill-sm">Column Fill variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">column-fill: auto</span>
          <span class="demo-value column-fill-md">Column Fill variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="column-fill"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
