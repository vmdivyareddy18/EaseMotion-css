<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Ripple Mixin Showcase — EaseMotion CSS</title>
  <meta name="description" content="Visual showcase of button micro-interaction ripples using pure CSS scaling overlays and relative position containers.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Utilities</span>
      <h1>Button Ripple Effect</h1>
      <p class="description">
        Demonstrates modern button layouts. Click on the buttons below to trigger 
        the active status ripple states.
      </p>
    </header>

    <main class="showcase">
      <div class="showcase-card">
        <h2>Ripple Configurations</h2>
        
        <div class="btn-group">
          <!-- Primary Ripple Button -->
          <button class="btn btn-primary" onclick="triggerRipple(event)">
            Primary Button
            <span class="ripple-overlay"></span>
          </button>

          <!-- Accent Ripple Button -->
          <button class="btn btn-accent" onclick="triggerRipple(event)">
            Accent Button
            <span class="ripple-overlay"></span>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script>
    function triggerRipple(event) {
      const button = event.currentTarget;
      const ripple = button.querySelector('.ripple-overlay');
      
      const rect = button.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      
      ripple.style.left = `${x}px`;
      ripple.style.top = `${y}px`;
      
      ripple.classList.remove('animate');
      void ripple.offsetWidth; // Force reflow
      ripple.classList.add('animate');
    }
  </script>

</body>
</html>
