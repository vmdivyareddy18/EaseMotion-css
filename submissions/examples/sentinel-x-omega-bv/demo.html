<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AegisGraph Sentinel X Omega</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="core-dashboard">
    <header class="header">
      <span class="badge">Sentinel Omega</span>
      <h1>AegisGraph Sentinel X Omega</h1>
      <p class="subtitle">Ultimate convergence platform: radial rotating cores, agent registries, and metrics.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-core">
        <h3>🌀 Omega Core convergence</h3>
        <div class="radial-container">
          <div class="radial-core">
            <span class="pulse-rate">100%</span>
            <span class="lbl">Convergence</span>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card swarm-card">
          <h3>🐝 Agent swarm registry</h3>
          <ul class="stats-list">
            <li>Federated agents: <strong>9.8M nodes</strong></li>
            <li>Database sync: <strong>Synced</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
