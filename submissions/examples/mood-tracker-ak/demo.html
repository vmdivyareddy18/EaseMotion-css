<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mood Tracker Calendar - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mt-wrapper">

    <h1>Mood Tracker</h1>

    <div class="mt-nav">
      <button id="prevMonth">&larr;</button>
      <span id="monthYear">June 2026</span>
      <button id="nextMonth">&rarr;</button>
    </div>

    <div class="mt-weekdays">
      <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
    </div>

    <div class="mt-grid" id="calendarGrid"></div>

    <div class="mt-legend">
      <button class="mt-mood" data-mood="great">&#128513;</button>
      <button class="mt-mood" data-mood="good">&#128522;</button>
      <button class="mt-mood" data-mood="meh">&#128528;</button>
      <button class="mt-mood" data-mood="bad">&#128542;</button>
      <button class="mt-mood" data-mood="awful">&#128545;</button>
    </div>

    <div class="mt-summary" id="moodSummary">Click a date, then select a mood</div>

  </div>

  <script>
    const grid = document.getElementById('calendarGrid');
    const monthYear = document.getElementById('monthYear');
    const prevBtn = document.getElementById('prevMonth');
    const nextBtn = document.getElementById('nextMonth');
    const summary = document.getElementById('moodSummary');
    const moodBtns = document.querySelectorAll('.mt-mood');

    const moods = { great: '\uD83D\uDE01', good: '\uD83D\uDE22', meh: '\uD83D\uDE28', bad: '\uD83D\uDE1E', awful: '\uD83D\uDE21' };

    let today = new Date();
    let currentMonth = today.getMonth();
    let currentYear = today.getFullYear();
    let selectedDay = null;
    let data = JSON.parse(localStorage.getItem('moodData') || '{}');

    function save() { localStorage.setItem('moodData', JSON.stringify(data)); }

    function render() {
      const firstDay = new Date(currentYear, currentMonth, 1).getDay();
      const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      monthYear.textContent = monthNames[currentMonth] + ' ' + currentYear;

      let html = '';
      for (let i = 0; i < firstDay; i++) html += '<div class="mt-day empty"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const key = currentYear + '-' + currentMonth + '-' + d;
        const mood = data[key];
        const emoji = mood ? moods[mood] : '';
        const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear();
        const sel = selectedDay === d ? ' selected' : '';
        html += '<div class="mt-day' + (isToday ? ' today' : '') + sel + '" data-day="' + d + '"><span class="mt-day-num">' + d + '</span>' + (emoji ? '<span class="mt-day-emoji">' + emoji + '</span>' : '') + '</div>';
      }
      grid.innerHTML = html;

      document.querySelectorAll('.mt-day:not(.empty)').forEach(el => {
        el.addEventListener('click', () => {
          document.querySelectorAll('.mt-day.selected').forEach(e => e.classList.remove('selected'));
          el.classList.add('selected');
          selectedDay = parseInt(el.dataset.day);
          const key = currentYear + '-' + currentMonth + '-' + selectedDay;
          const existing = data[key];
          summary.textContent = existing ? 'Selected: ' + moods[existing] : 'Select a mood for this day';
        });
      });
    }

    moodBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!selectedDay) { summary.textContent = 'Click a date first'; return; }
        const mood = btn.dataset.mood;
        const key = currentYear + '-' + currentMonth + '-' + selectedDay;
        data[key] = mood;
        save();
        render();
        summary.textContent = 'Logged ' + moods[mood];
      });
    });

    prevBtn.addEventListener('click', () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } selectedDay = null; render(); });
    nextBtn.addEventListener('click', () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } selectedDay = null; render(); });

    render();
  </script>

</body>
</html>
