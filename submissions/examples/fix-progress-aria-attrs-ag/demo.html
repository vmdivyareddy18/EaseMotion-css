<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress ARIA Fix – EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>ease-progress – ARIA Attributes Fix</h2>
  <div class="demo-stack">
    <div>
      <div class="demo-label"><span>Upload progress</span><span>72%</span></div>
      <!-- KEY FIX: role, aria-valuenow, aria-valuemin, aria-valuemax, aria-label -->
      <div class="ease-progress"
           role="progressbar"
           aria-valuenow="72"
           aria-valuemin="0"
           aria-valuemax="100"
           aria-label="Upload progress: 72%">
        <div class="ease-progress__fill" style="width: 72%"></div>
      </div>
    </div>
    <div>
      <div class="demo-label"><span>Installation</span><span>40%</span></div>
      <div class="ease-progress ease-progress--success"
           role="progressbar" aria-valuenow="40" aria-valuemin="0" aria-valuemax="100"
           aria-label="Installation progress: 40%">
        <div class="ease-progress__fill" style="width: 40%"></div>
      </div>
    </div>
    <div>
      <div class="demo-label"><span>Loading…</span></div>
      <div class="ease-progress ease-progress--indeterminate"
           role="progressbar" aria-valuetext="Loading" aria-label="Content loading">
        <div class="ease-progress__fill"></div>
      </div>
    </div>
  </div>
</body>
</html>
