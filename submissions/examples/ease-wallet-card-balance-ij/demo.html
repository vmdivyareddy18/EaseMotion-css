<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Card Balance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wcb-container">
    <h1>Wallet</h1>
    <div class="wcb-card" id="card">
      <div class="wcb-card-inner">
        <div class="wcb-card-front">
          <div class="wcb-card-label">Current Balance</div>
          <div class="wcb-balance" id="balance">$0.00</div>
          <div class="wcb-card-number">•••• 4532</div>
        </div>
        <div class="wcb-card-back">
          <div class="wcb-card-label">Card Details</div>
          <div class="wcb-detail-row"><span>Holder</span><span>John Doe</span></div>
          <div class="wcb-detail-row"><span>Expires</span><span>12/28</span></div>
          <div class="wcb-detail-row"><span>CVV</span><span>***</span></div>
        </div>
      </div>
    </div>
    <button class="wcb-flip-btn" id="flipBtn">Flip Card</button>
    <div class="wcb-actions">
      <button class="wcb-action-btn" id="addMoney">+ Add $50</button>
      <button class="wcb-action-btn" id="deductMoney">- Deduct $25</button>
    </div>
    <h2>Transactions</h2>
    <ul class="wcb-transactions" id="transactions"></ul>
  </div>
  <script>
    let balance = 1250.00;
    let animatingBalance = 1250.00;
    const balanceEl = document.getElementById('balance');
    const card = document.getElementById('card');
    const flipBtn = document.getElementById('flipBtn');
    const addBtn = document.getElementById('addMoney');
    const deductBtn = document.getElementById('deductMoney');
    const txList = document.getElementById('transactions');
    let flip = false;
    let txCounter = 0;

    const names = ['Coffee Shop', 'Uber Ride', 'Groceries', 'Netflix', 'Spotify', 'Amazon', 'Steam', 'Starbucks'];
    const icons = ['\u2615', '\U0001F697', '\U0001F6D2', '\U0001F4FA', '\U0001F3B5', '\U0001F4E6', '\U0001F3AE', '\U0001F5A8'];

    function formatMoney(n) {
      return '$' + n.toFixed(2);
    }

    function animateBalance(target) {
      const start = animatingBalance;
      const diff = target - start;
      const duration = 600;
      const startTime = performance.now();

      function tick(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        animatingBalance = start + diff * eased;
        balanceEl.textContent = formatMoney(animatingBalance);
        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          animatingBalance = target;
        }
      }
      requestAnimationFrame(tick);
    }

    function addTransaction(name, amount, icon) {
      txCounter++;
      const li = document.createElement('li');
      li.className = 'wcb-tx-item';
      li.innerHTML = '<span class="wcb-tx-icon">' + icon + '</span><span class="wcb-tx-name">' + name + '</span><span class="wcb-tx-amount ' + (amount >= 0 ? 'positive' : 'negative') + '">' + (amount >= 0 ? '+' : '') + formatMoney(amount) + '</span>';
      txList.prepend(li);
      setTimeout(function() { li.classList.add('visible'); }, 10);
    }

    addBtn.addEventListener('click', function() {
      balance = balance + 50;
      animateBalance(balance);
      addTransaction('Deposit', 50, '\U0001F4B0');
    });

    deductBtn.addEventListener('click', function() {
      balance = Math.max(0, balance - 25);
      animateBalance(balance);
      var name = names[Math.floor(Math.random() * names.length)];
      var icon = icons[Math.floor(Math.random() * icons.length)];
      addTransaction(name, -25, icon);
    });

    flipBtn.addEventListener('click', function() {
      flip = !flip;
      card.classList.toggle('flipped', flip);
    });

    animateBalance(balance);
    addTransaction('Welcome Bonus', 50, '\U0001F389');
    addTransaction('Coffee Shop', -5.50, '\u2615');
    addTransaction('Initial Deposit', 1200, '\U0001F3E6');
  </script>
</body>
</html>
