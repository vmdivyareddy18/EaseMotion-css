<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>CSS-only Tooltip Component - EaseMotion CSS</title>

    <!-- Link to EaseMotion CSS core -->
    <link rel="stylesheet" href="../../../core/animations.css" />
    <!-- Link to your CSS file - do not change this path -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="demo-wrapper">
      <h1>CSS-only Tooltip Component</h1>

      <div class="tooltip-demo">
        <button
          class="tooltip tooltip-top"
          data-tooltip="Appears above the button"
        >
          Top
        </button>

        <button
          class="tooltip tooltip-right"
          data-tooltip="Appears on the right side"
        >
          Right
        </button>

        <button
          class="tooltip tooltip-bottom"
          data-tooltip="Appears below the button"
        >
          Bottom
        </button>

        <button
          class="tooltip tooltip-left"
          data-tooltip="Appears on the left side"
        >
          Left
        </button>
      </div>

      <p class="description" style="margin-top: 2rem">
        This demo shows a lightweight tooltip component built with pure HTML and
        CSS.
      </p>
    </div>
  </body>
</html>
