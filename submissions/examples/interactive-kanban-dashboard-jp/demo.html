<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Kanban Board</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kanban-board">

    <div class="column">
        <h2>📌 To Do</h2>

        <div class="task-card">
            <span class="priority high"></span>
            Create Landing Page
        </div>

        <div class="task-card">
            <span class="priority medium"></span>
            Design Hero Section
        </div>
    </div>

    <div class="column active">
        <h2>⚡ In Progress</h2>

        <div class="task-card dragging">
            <span class="priority high"></span>
            Build Kanban Layout
        </div>

        <div class="task-card">
            <span class="priority low"></span>
            Mobile Optimization
        </div>
    </div>

    <div class="column">
        <h2>🧐 Review</h2>

        <div class="task-card review">
            <span class="priority medium"></span>
            Code Review
        </div>

        <div class="task-card review">
            <span class="priority low"></span>
            UI Testing
        </div>
    </div>

    <div class="column">
        <h2>✅ Completed</h2>

        <div class="task-card completed">
            Project Setup
        </div>

        <div class="task-card completed">
            Component Planning
        </div>
    </div>

</div>

</body>
</html>
