<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Scale Alert Banner</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <main class="page">

        <h1>
            Scale Alert Banner
        </h1>

        <p class="subtitle">
            Responsive minimalist alert banners using pure
            HTML and CSS with a smooth scale animation.
        </p>

        <section class="alerts">

            <div class="alert success"
                 tabindex="0">

                <span class="icon">
                    ✓
                </span>

                <div class="content">

                    <h2>
                        Success
                    </h2>

                    <p>
                        Your project has been deployed successfully.
                    </p>

                </div>

            </div>

            <div class="alert warning"
                 tabindex="0">

                <span class="icon">
                    !
                </span>

                <div class="content">

                    <h2>
                        Warning
                    </h2>

                    <p>
                        Storage usage is approaching its limit.
                    </p>

                </div>

            </div>

            <div class="alert error"
                 tabindex="0">

                <span class="icon">
                    ✕
                </span>

                <div class="content">

                    <h2>
                        Error
                    </h2>

                    <p>
                        Unable to connect to the server. Try again later.
                    </p>

                </div>

            </div>

        </section>

    </main>

</body>

</html>
