<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse Modal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

    <div class="ease-modal">

        <div class="pulse-circle"></div>

        <h2>Breaking News</h2>

        <p>
            Stay updated with the latest headlines and important announcements.
        </p>

        <div class="buttons">
            <button class="secondary">Later</button>
            <button class="primary">Read Now</button>
        </div>

    </div>

</div>

</body>
</html>
