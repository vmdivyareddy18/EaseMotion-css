<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hinge Animation Example - EaseMotion CSS</title>
  <link rel="stylesheet" href="../../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="em-bg-slate-100 em-p-8 em-flex em-flex-col em-items-center em-justify-center em-min-h-screen">
  
  <div class="em-card em-p-6 em-max-w-md em-w-full em-bg-white em-shadow-lg em-rounded-lg em-text-center">
    <h1 class="em-text-2xl em-font-bold em-mb-4">Hinge Animation</h1>
    <p class="em-text-gray-600 em-mb-8">Click the target below to see the hinge animation in action.</p>
    
    <div id="target" class="hinge-element em-bg-blue-500 em-text-white em-p-4 em-rounded-md em-cursor-pointer em-transition-colors">
      Click to drop!
    </div>
  </div>

  <script>
    const target = document.getElementById('target');
    target.addEventListener('click', () => {
      target.classList.remove('em-animate-hinge');
      void target.offsetWidth; // trigger reflow
      target.classList.add('em-animate-hinge');
    });
  </script>
</body>
</html>
