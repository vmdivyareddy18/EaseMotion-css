<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Shimmer Pulse Tooltip - Visual Editor</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Visual Editor Tooltip</h1>
    <p>Hover over the buttons to see the shimmer pulse tooltip.</p>

    <div class="tooltip-wrapper">
      <button class="editor-btn">Save</button>
      <span class="tooltip">Save your current project</span>
    </div>

    <div class="tooltip-wrapper">
      <button class="editor-btn">Preview</button>
      <span class="tooltip">Preview changes instantly</span>
    </div>

    <div class="tooltip-wrapper">
      <button class="editor-btn">Export</button>
      <span class="tooltip">Export your design</span>
    </div>
  </div>

</body>
</html>
