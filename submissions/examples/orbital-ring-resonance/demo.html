<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbital Ring Resonance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Orbital Ring Resonance Animation</h1>

    <div class="card">
      <button class="copy-btn" onclick="copyClass(this)">Copy</button>

      <div id="preview-box" class="preview-box" onclick="triggerAnimation()">
        Preview
        <div class="orbital-ring ring-1"></div>
        <div class="orbital-ring ring-2"></div>
        <div class="core"></div>
      </div>

      <p class="class-name">ease-orbital-ring</p>
    </div>
  </div>

  <script>
    function triggerAnimation() {
      const box = document.getElementById("preview-box");
      box.classList.remove("animate");
      void box.offsetWidth;
      box.classList.add("animate");
    }

    function copyClass(button) {
      navigator.clipboard.writeText("ease-orbital-ring");
      button.textContent = "Copied!";
      setTimeout(() => {
        button.textContent = "Copy";
      }, 2000);
    }
  </script>
</body>
</html>
