<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blur Entrance Popover</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
    <h1>Interactive Interface</h1>
    <p>Hover or focus on the button to reveal the blur entrance popover.</p>

    <div class="popover-wrapper">
        <button class="trigger-btn" aria-describedby="popover">
            Hover Me
        </button>

        <div id="popover" class="popover" role="tooltip">
            <h3>Interactive Tip</h3>
            <p>
                This popover smoothly appears using a blur entrance animation
                built entirely with CSS.
            </p>
        </div>
    </div>
</section>

</body>
</html>
