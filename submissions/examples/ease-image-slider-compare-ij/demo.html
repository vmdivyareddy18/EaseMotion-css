<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta image-slider-compare="viewport" content="width=device-width,initial-scale=1.0"><title>ease-image-slider-compare</title><link rel="stylesheet" href="style.css"></head>
<body><div class="container"><h1>image-slider-compare</h1><p class="subtitle">Click to toggle animation</p><div class="demo-box"><div class="anim-target"></div></div><button class="trigger">Toggle</button></div>
<script>const t=document.getElementById("animTarget");const b=document.getElementById("trigger");let a=false;b.addEventListener("click",()=>{a=!a;t.classList.toggle("active",a);t.style.setProperty("--state",a?"1":"0");});</script>
</body>
</html>
