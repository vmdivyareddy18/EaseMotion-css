<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Pricing Card - EaseMotion CSS Submission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  
  <div class="pricing-container">
    <div class="pricing-card pricing-card-pro">
      <div class="pricing-badge">Most Popular</div>
      
      <div class="pricing-header">
        <h3 class="pricing-title">Pro Plan</h3>
        <p class="pricing-description">For professionals and growing teams</p>
      </div>
      
      <div class="pricing-price-container">
        <span class="pricing-currency">$</span>
        <span class="pricing-amount">29</span>
        <span class="pricing-period">/mo</span>
      </div>
      
      <ul class="pricing-features">
        <li class="pricing-feature">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Advanced analytics dashboard
        </li>
        <li class="pricing-feature">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Unlimited project workspaces
        </li>
        <li class="pricing-feature">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Priority 24/7 customer support
        </li>
        <li class="pricing-feature">
          <svg class="feature-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          Custom domain integration
        </li>
      </ul>
      
      <button class="pricing-btn">Get Started Now</button>
    </div>
  </div>

</body>
</html>
