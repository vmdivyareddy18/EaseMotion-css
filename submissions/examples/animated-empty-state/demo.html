<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Empty State - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    
    <!-- Empty State Card -->
    <div class="empty-state-card ease-zoom-in">
      
      <!-- Floating Illustration -->
      <div class="illustration-wrapper">
        <div class="bg-circle ease-pulse"></div>
        <div class="folder-main ease-float">📁</div>
        <span class="sparkle s1 ease-float ease-delay-100">✨</span>
        <span class="sparkle s2 ease-float ease-delay-200">✨</span>
        <span class="sparkle s3 ease-float ease-delay-300">✨</span>
      </div>

      <!-- Text Content -->
      <h2 class="empty-title ease-fade-in-up ease-delay-400">No projects yet</h2>
      <p class="empty-text ease-fade-in-up ease-delay-500">
        It looks like you haven't created any projects yet. <br>
        Get started by creating your first one!
      </p>

      <!-- Call to Action -->
      <button class="empty-btn ease-bounce-in ease-delay-600 ease-hover-grow">
        <span class="btn-icon">➕</span>
        Create Project
      </button>

      <!-- Secondary Link -->
      <a href="#" class="secondary-link ease-fade-in-up ease-delay-700">
        Or import from GitHub →
      </a>

    </div>

  </div>
</body>
</html>
