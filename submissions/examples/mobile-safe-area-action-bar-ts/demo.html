<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Safe Area Bottom Action Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Mobile layout</p>
      <h1 id="demo-title">Safe area action bar</h1>
      <p>A sticky mobile action bar that respects safe-area insets and keeps primary actions reachable.</p>
    </section>
    <section class="demo-stage" aria-label="Mobile Safe Area Bottom Action Bar">
      <div class="phone-frame"><div class="mock-content"><h2>Project settings</h2><p>Unsaved changes are ready to apply.</p></div><div class="safe-action-bar"><button type="button">Save changes</button><button class="secondary" type="button">Cancel</button></div></div>
    </section>
  </main>
</body>
</html>
