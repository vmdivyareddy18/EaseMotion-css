<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Flip Animation - EaseMotion CSS</title>
    <link rel="stylesheet" href="../../../core/animations.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="coin-wrapper">
      <h1>Coin Flip</h1>
      <p class="description">
        A pure CSS 3D coin flip animation. Hover or focus to flip.
      </p>
      <div class="coin" tabindex="0" role="button" aria-label="Flip the coin">
        <div class="coin-face heads" aria-label="Heads">🪙</div>
        <div class="coin-face tails" aria-label="Tails">🌙</div>
      </div>
      <p class="hint">Hover or focus the coin to flip</p>
    </div>
  </body>
</html>
