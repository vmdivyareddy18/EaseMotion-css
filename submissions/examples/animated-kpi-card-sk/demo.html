<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated KPI Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-icon" aria-hidden="true">&#x1f4b0;</div>
      <div class="kpi-value" data-target="28450">28,450</div>
      <div class="kpi-label">Revenue</div>
      <div class="kpi-trend up">&#x25B2; +12.5%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" aria-hidden="true">&#x1f465;</div>
      <div class="kpi-value" data-target="1840">1,840</div>
      <div class="kpi-label">Users</div>
      <div class="kpi-trend up">&#x25B2; +8.3%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" aria-hidden="true">&#x1f4c8;</div>
      <div class="kpi-value" data-target="97">97</div>
      <div class="kpi-label">Uptime</div>
      <div class="kpi-trend up">&#x25B2; +2.1%</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-icon" aria-hidden="true">&#x26a0;&#xfe0f;</div>
      <div class="kpi-value" data-target="12">12</div>
      <div class="kpi-label">Issues</div>
      <div class="kpi-trend down">&#x25BC; -3</div>
    </div>
  </div>
</body>
</html>
