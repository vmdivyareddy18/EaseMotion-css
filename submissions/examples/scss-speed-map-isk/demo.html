<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCSS speed utilities map - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core and components -->
  <link rel="stylesheet" href="../../../easemotion.css">
  <!-- Link to compiled utilities -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrap">
    <h1 class="demo-title">SCSS Map-Driven Speed Tokens</h1>
    <p style="color: var(--ease-color-muted, #64748b); margin-bottom: 0;">
      Demonstrating transition duration utilities generated automatically using an SCSS speed design token map and loop. Hover cards to test.
    </p>

    <!-- Speed Cards Grid -->
    <div class="demo-grid">
      <div class="speed-card ease-speed-fast">
        Fast (150ms)
      </div>

      <div class="speed-card ease-speed-medium">
        Medium (300ms)
      </div>

      <div class="speed-card ease-speed-slow">
        Slow (600ms)
      </div>

      <div class="speed-card ease-speed-very-slow">
        Very Slow (1000ms)
      </div>
    </div>
  </div>

</body>
</html>
