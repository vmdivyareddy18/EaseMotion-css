<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-cursor-trail Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: #0a0a0a;
            color: #f0f0f0;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            margin: 0;
        }

        h1 {
            font-size: 2.5rem;
            text-align: center;
            color: #bf00ff;
            text-shadow:
                0 0 10px #bf00ff,
                0 0 20px #bf00ff;
        }

        p {
            color: #aaa;
            text-align: center;
            max-width: 480px;
            line-height: 1.6;
        }

        .demo-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 0.6rem 1.4rem;
            border-radius: 999px;
            border: 2px solid #bf00ff;
            background: transparent;
            color: #bf00ff;
            font-size: 1rem;
            cursor: none;
        }

        .btn:hover {
            background: #bf00ff22;
        }
    </style>
</head>

<body class="ease-cursor-trail">

    <h1>ease-cursor-trail</h1>
    <p>
        Move your cursor around the page to see the
        glowing particle trail effect.
    </p>

    <div class="demo-buttons">
        <button class="btn">Hover Me</button>
        <button class="btn">And Me</button>
        <button class="btn">Also Me</button>
    </div>

    <script>
        const body = document.querySelector('.ease-cursor-trail');

        document.addEventListener('mousemove', (e) => {
            const particle = document.createElement('div');
            particle.classList.add('ease-trail-particle');
            particle.style.left = e.clientX + 'px';
            particle.style.top = e.clientY + 'px';
            body.appendChild(particle);

            // Remove particle after animation completes
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        });
    </script>
</body>

</html>
