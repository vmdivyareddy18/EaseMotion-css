<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech Modal Layout</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="tech-sandbox-root">

  <input type="checkbox" id="tech-toggle">

  <button class="tech-trigger-btn" onclick="document.getElementById('tech-toggle').checked = true">
    sys.open_modal()
  </button>

  <div class="tech-overlay">
    <div class="tech-modal-card">
      <div class="tech-close-btn" onclick="document.getElementById('tech-toggle').checked = false">×</div>
      
      <div class="tech-depth-inner">
        <h3>System Diagnostics</h3>
        <p>A pristine structural interface panel executing zero-script 3D spatial positioning translations via geometric modern transform properties.</p>
        
        <div class="tech-row">
          <button class="tech-btn tech-btn-primary" onclick="document.getElementById('tech-toggle').checked = false">Execute</button>
          <button class="tech-btn tech-btn-secondary" onclick="document.getElementById('tech-toggle').checked = false">Abort</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
