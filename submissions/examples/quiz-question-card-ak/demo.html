<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Question Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="quiz-card">
      <div class="quiz-header">
        <div class="quiz-progress">
          <div class="quiz-progress-bar" id="progressBar"></div>
        </div>
        <span class="quiz-counter" id="questionCounter">1 / 5</span>
      </div>
      <div class="quiz-body">
        <h2 class="quiz-question" id="questionText">What does CSS stand for?</h2>
        <div class="quiz-answers" id="answersContainer">
          <button class="answer-btn" data-index="0">Cascading Style Sheets</button>
          <button class="answer-btn" data-index="1">Creative Style System</button>
          <button class="answer-btn" data-index="2">Computer Style Sheets</button>
          <button class="answer-btn" data-index="3">Colorful Style Sheets</button>
        </div>
        <div class="quiz-feedback" id="feedback"></div>
      </div>
      <div class="quiz-footer">
        <span class="quiz-score" id="scoreDisplay">Score: 0</span>
        <button class="next-btn" id="nextBtn">Next</button>
      </div>
    </div>
  </div>
  <script>
    const questions = [
      { q: 'What does CSS stand for?', options: ['Cascading Style Sheets', 'Creative Style System', 'Computer Style Sheets', 'Colorful Style Sheets'], correct: 0 },
      { q: 'Which HTML tag is used to link a CSS file?', options: ['&lt;style&gt;', '&lt;link&gt;', '&lt;css&gt;', '&lt;script&gt;'], correct: 1 },
      { q: 'Which property makes text bold?', options: ['font-style', 'text-weight', 'font-weight', 'text-bold'], correct: 2 },
      { q: 'What does "flex: 1" do?', options: ['Makes element invisible', 'Sets font size to 1px', 'Makes element grow to fill space', 'Creates a 1px border'], correct: 2 },
      { q: 'Which unit is relative to the root font-size?', options: ['em', 'rem', 'px', 'vh'], correct: 1 },
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById('questionText');
    const answersEl = document.getElementById('answersContainer');
    const feedbackEl = document.getElementById('feedback');
    const progressBar = document.getElementById('progressBar');
    const counterEl = document.getElementById('questionCounter');
    const scoreEl = document.getElementById('scoreDisplay');
    const nextBtn = document.getElementById('nextBtn');

    function loadQuestion() {
      answered = false;
      const q = questions[current];
      questionEl.innerHTML = q.q;
      const btns = answersEl.querySelectorAll('.answer-btn');
      btns.forEach((btn, i) => {
        btn.innerHTML = q.options[i];
        btn.className = 'answer-btn';
        btn.disabled = false;
      });
      feedbackEl.textContent = '';
      feedbackEl.className = 'quiz-feedback';
      progressBar.style.width = `${((current + 1) / questions.length) * 100}%`;
      counterEl.textContent = `${current + 1} / ${questions.length}`;
      nextBtn.textContent = current === questions.length - 1 ? 'Finish' : 'Next';
      nextBtn.disabled = true;
    }

    function selectAnswer(e) {
      if (answered) return;
      const btn = e.target.closest('.answer-btn');
      if (!btn) return;
      answered = true;
      const idx = parseInt(btn.dataset.index);
      const q = questions[current];
      const btns = answersEl.querySelectorAll('.answer-btn');
      btns.forEach(b => b.disabled = true);
      if (idx === q.correct) {
        btn.classList.add('correct');
        feedbackEl.textContent = 'Correct!';
        feedbackEl.className = 'quiz-feedback correct';
        score++;
      } else {
        btn.classList.add('wrong');
        btns[q.correct].classList.add('correct');
        feedbackEl.textContent = `Wrong! The correct answer is: ${q.options[q.correct]}`;
        feedbackEl.className = 'quiz-feedback wrong';
      }
      scoreEl.textContent = `Score: ${score}`;
      nextBtn.disabled = false;
    }

    function nextQuestion() {
      current++;
      if (current >= questions.length) {
        const total = questions.length;
        answersEl.innerHTML = `<div class="quiz-result"><h2>Quiz Complete!</h2><p>You scored <strong>${score}</strong> out of <strong>${total}</strong></p><p class="result-pct">${Math.round((score / total) * 100)}%</p><button class="next-btn" id="restartBtn">Restart</button></div>`;
        feedbackEl.style.display = 'none';
        nextBtn.style.display = 'none';
        progressBar.style.width = '100%';
        document.getElementById('restartBtn').addEventListener('click', restart);
        return;
      }
      loadQuestion();
    }

    function restart() {
      current = 0;
      score = 0;
      answered = false;
      feedbackEl.style.display = '';
      nextBtn.style.display = '';
      scoreEl.textContent = 'Score: 0';
      answersEl.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.dataset.index = i;
        answersEl.appendChild(btn);
      }
      loadQuestion();
    }

    answersEl.addEventListener('click', selectAnswer);
    nextBtn.addEventListener('click', nextQuestion);
    loadQuestion();
  </script>
</body>
</html>
