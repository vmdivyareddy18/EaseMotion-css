<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usage Anomaly Alert Strip</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="alert-strip">

        <div class="alert-left">

            <div class="pulse-dot"></div>

            <div>

                <h3>Usage Anomaly Detected</h3>

                <p>
                    API consumption increased by
                    <strong>342%</strong>
                    compared to the previous hour.
                </p>

            </div>

        </div>

        <div class="alert-metrics">

            <div class="metric">

                <span class="metric-value">
                    +342%
                </span>

                <small>Traffic Spike</small>

            </div>

            <div class="metric">

                <span class="metric-value">
                    18.4K
                </span>

                <small>Requests</small>

            </div>

        </div>

        <div class="alert-actions">

            <button class="investigate-btn">
                Investigate
            </button>

            <button class="dismiss-btn">
                Dismiss
            </button>

        </div>

    </div>

    <div class="details-panel">

        <h2>Anomaly Details</h2>

        <div class="detail-row">
            <span>Service</span>
            <strong>Public API Gateway</strong>
        </div>

        <div class="detail-row">
            <span>Severity</span>
            <strong class="critical">
                Critical
            </strong>
        </div>

        <div class="detail-row">
            <span>Detected At</span>
            <strong>14:22 UTC</strong>
        </div>

        <div class="detail-row">
            <span>Region</span>
            <strong>Asia Pacific</strong>
        </div>

    </div>

</div>

</body>
</html>
