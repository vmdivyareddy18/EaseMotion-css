<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk Action Selection Toolbar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="intro-panel" aria-labelledby="demo-title">
      <p class="eyebrow">Selection mode</p>
      <h1 id="demo-title">Bulk action toolbar</h1>
      <p>A toolbar that appears when rows are selected, keeping bulk actions visible without moving the table.</p>
    </section>
    <section class="demo-grid" aria-label="Bulk Action Selection Toolbar">
        <div class="action-toolbar is-active"><strong>3 selected</strong><button type="button">Archive</button><button type="button">Export</button></div>
        <div class="action-toolbar is-active"><strong>12 selected</strong><button type="button">Assign</button><button type="button">Delete</button></div>
        <div class="action-toolbar is-active"><strong>All visible</strong><button type="button">Mark reviewed</button><button type="button">Download</button></div>
    </section>
  </main>
</body>
</html>
