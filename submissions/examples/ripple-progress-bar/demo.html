<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple Progress Bar</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <main class="container">
    <h1>Ripple Progress Bar</h1>

    <div class="ease-ripple-progress">
      <div class="progress-label">
        Delivery Progress
      </div>

      <div class="progress-track" role="progressbar" aria-label="Delivery progress">
        <div class="progress-fill">
          <span class="ripple"></span>
        </div>
      </div>

      <p>75% Completed</p>
    </div>

  </main>

</body>
</html>
