<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Cricket Chirp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <main class="container">

        <h1>Ease Cricket Chirp</h1>
        <p>
            Click the cricket to make it chirp with sound-wave animation.
        </p>

        <div class="scene">

            <div class="grass"></div>

            <div class="cricket" id="cricket">

                <div class="antenna left"></div>
                <div class="antenna right"></div>

                <div class="body"></div>

                <div class="wing left-wing"></div>
                <div class="wing right-wing"></div>

                <div class="leg leg-1"></div>
                <div class="leg leg-2"></div>
                <div class="leg leg-3"></div>

                <div class="chirp-wave wave-1"></div>
                <div class="chirp-wave wave-2"></div>
                <div class="chirp-wave wave-3"></div>

            </div>

        </div>

        <button id="chirpBtn">
            CHIRP
        </button>

    </main>

    <script>
        const cricket = document.getElementById("cricket");
        const button = document.getElementById("chirpBtn");

        function chirp() {

            cricket.classList.remove("chirping");

            void cricket.offsetWidth;

            cricket.classList.add("chirping");
        }

        cricket.addEventListener("click", chirp);
        button.addEventListener("click", chirp);
    </script>

</body>

</html>
