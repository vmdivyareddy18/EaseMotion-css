<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animations Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scroll-indicator-thakur"></div>
    <main style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200vh; font-family: sans-serif;">
        <section style="height: 100vh; display: flex; align-items: center;">
            <h1>📜 Scroll Down to Reveal Content</h1>
        </section>
        <section style="height: 100vh; display: flex; align-items: center;">
            <div class="scroll-card-thakur" style="padding: 3rem; background: #f3f4f6; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
                <h2>Native Scroll Timelines</h2>
                <p>Powered by CSS view timelines with zero JavaScript dependencies.</p>
            </div>
        </section>
    </main>
</body>
</html>
