<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-beetle-scuttle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="ground"></div>
    <div class="beetle">
      <div class="carapace">
        <div class="shell left-shell"></div>
        <div class="shell right-shell"></div>
      </div>
      <div class="pronotum"></div>
      <div class="head">
        <div class="mandible"></div>
        <div class="eye"></div>
      </div>
      <div class="legs">
        <div class="bleg l1"></div>
        <div class="bleg l2"></div>
        <div class="bleg l3"></div>
        <div class="bleg r1"></div>
        <div class="bleg r2"></div>
        <div class="bleg r3"></div>
      </div>
    </div>
  </div>
</body>
</html>
