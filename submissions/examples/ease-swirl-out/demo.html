<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Swirl Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box">Swirling Out</div>
        <button onclick="document.querySelector('.box').classList.add('ease-swirl-out');">Trigger Exit</button>
        <button onclick="document.querySelector('.box').classList.remove('ease-swirl-out');" style="border-color:#64748b; color:#64748b;">Reset</button>
    </div>
</body>
</html>
