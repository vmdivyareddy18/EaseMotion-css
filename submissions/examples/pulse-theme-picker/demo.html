<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Theme Picker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <div class="theme-picker">
      <h1>Choose Theme</h1>

      <div class="theme-options">
        <button class="theme-card light">
          ☀️
          <span>Light</span>
        </button>

        <button class="theme-card dark">
          🌙
          <span>Dark</span>
        </button>

        <button class="theme-card ocean">
          🌊
          <span>Ocean</span>
        </button>
      </div>
    </div>
  </main>

</body>
</html>
