<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ripple Wave Theme Picker</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<main class="container">

  <h1>Ripple Wave Theme Picker</h1>

  <div class="theme-picker" role="group" aria-label="Theme selection">

    <button class="theme theme-blue">
      <span></span>
      Blue
    </button>

    <button class="theme theme-green">
      <span></span>
      Green
    </button>

    <button class="theme theme-purple">
      <span></span>
      Purple
    </button>

    <button class="theme theme-dark">
      <span></span>
      Dark
    </button>

  </div>

</main>

</body>
</html>
