<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Bar Expand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Search Bar Expand</h1>
    <p class="subtitle">Click the icon to expand. Type to see results.</p>

    <div class="search-wrapper">
      <div class="search-bar" id="searchBar">
        <span class="search-icon" id="searchIcon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search..." autocomplete="off">
        <button class="search-close" id="searchClose" aria-label="Close search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <ul class="search-results" id="searchResults">
        <li>Getting started guide</li>
        <li>CSS animations</li>
        <li>Transition examples</li>
        <li>Easing functions</li>
        <li>Performance tips</li>
      </ul>
    </div>
  </main>

  <script>
    const searchBar = document.getElementById('searchBar');
    const searchInput = document.getElementById('searchInput');
    const searchIcon = document.getElementById('searchIcon');
    const searchClose = document.getElementById('searchClose');
    const searchResults = document.getElementById('searchResults');

    function openSearch() {
      searchBar.classList.add('expanded');
      searchInput.focus();
      searchIcon.style.display = 'none';
    }

    function closeSearch() {
      searchBar.classList.remove('expanded');
      searchInput.value = '';
      searchIcon.style.display = '';
      searchResults.classList.remove('visible');
      searchInput.blur();
    }

    searchIcon.addEventListener('click', openSearch);
    searchClose.addEventListener('click', closeSearch);

    searchInput.addEventListener('input', () => {
      const val = searchInput.value.trim();
      if (val.length > 0) {
        searchResults.classList.add('visible');
      } else {
        searchResults.classList.remove('visible');
      }
    });

    searchInput.addEventListener('blur', () => {
      setTimeout(() => {
        searchResults.classList.remove('visible');
      }, 200);
    });

    searchInput.addEventListener('focus', () => {
      if (searchInput.value.trim().length > 0) {
        searchResults.classList.add('visible');
      }
    });
  </script>
</body>
</html>
