<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Horizontal Roll Modal

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="wrapper">

<div class="content">

<span class="badge">

Interactive Interface

</span>

<h1>

Horizontal Roll Modal

</h1>

<p>

An engaging modal component
designed for interactive
applications with a smooth
horizontal roll transition.

</p>

<input
type="checkbox"
id="modal-toggle">

<label

for="modal-toggle"

class="open-btn"

>

Launch Experience

</label>

<div class="overlay">

<div class="modal">

<label

for="modal-toggle"

class="close">

✕

</label>

<div class="modal-content">

<div class="icon">

🧩

</div>

<h2>

Interactive Elements

</h2>

<p>

Create immersive experiences
using animated modal dialogs
that enhance user interaction
and engagement.

</p>

<button>

Get Started

</button>

</div>

</div>

</div>

</div>

</section>

</body>

</html>
