<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated User Profile Card - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="profile-container">
    <!-- Profile Card -->
    <div class="profile-card ease-zoom-in">
      
      <!-- Cover Image Area -->
      <div class="cover-image">
        <div class="cover-gradient"></div>
      </div>

      <!-- Avatar Section -->
      <div class="avatar-section ease-fade-in-up ease-delay-100">
        <div class="avatar-wrapper">
          <div class="avatar">👩‍💻</div>
          <span class="status-indicator ease-pulse"></span>
        </div>
      </div>

      <!-- User Info -->
      <div class="user-info ease-fade-in-up ease-delay-200">
        <h2 class="user-name">Sarah Chen</h2>
        <p class="user-role">Senior UX Designer</p>
        <p class="user-location">📍 San Francisco, CA</p>
      </div>

      <!-- Bio -->
      <div class="user-bio ease-fade-in-up ease-delay-300">
        <p>Passionate about creating intuitive and beautiful user experiences. 8+ years of experience in product design and front-end development.</p>
      </div>

      <!-- Stats Grid -->
      <div class="stats-grid ease-fade-in-up ease-delay-400">
        <div class="stat-item">
          <span class="stat-value">2.4k</span>
          <span class="stat-label">Followers</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">485</span>
          <span class="stat-label">Following</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">127</span>
          <span class="stat-label">Posts</span>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="action-buttons ease-fade-in-up ease-delay-500">
        <button class="btn btn-primary ease-hover-grow">
          <span class="btn-icon">➕</span>
          Follow
        </button>
        <button class="btn btn-secondary ease-hover-grow">
          <span class="btn-icon">💬</span>
          Message
        </button>
      </div>

      <!-- Social Links -->
      <div class="social-links ease-fade-in-up ease-delay-600">
        <a href="#" class="social-icon ease-hover-grow" aria-label="Twitter">🐦</a>
        <a href="#" class="social-icon ease-hover-grow" aria-label="LinkedIn">💼</a>
        <a href="#" class="social-icon ease-hover-grow" aria-label="GitHub">💻</a>
        <a href="#" class="social-icon ease-hover-grow" aria-label="Dribbble">🎨</a>
      </div>

    </div>
  </div>
</body>
</html>
