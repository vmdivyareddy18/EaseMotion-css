<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Odometer Rolling Number Demo</title>
  <!-- Import Inter font for premium styling -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Link component styles -->
  <link rel="stylesheet" href="./style.css">

  <style>
    /* Demo Page Layout & Aesthetics */
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top right, #1e1b4b, #0f0c1b, #03001e);
      font-family: 'Inter', -apple-system, sans-serif;
      color: #f8fafc;
      overflow: hidden;
    }

    .demo-container {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 3rem 2rem;
      width: 90%;
      max-width: 480px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
    }

    .demo-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 99px;
      background: rgba(16, 185, 129, 0.15);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #34d399;
      font-size: 0.75rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }

    .demo-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: #f8fafc;
    }

    .demo-description {
      font-size: 0.9rem;
      color: #94a3b8;
      max-width: 380px;
      margin: 0 auto 2.5rem auto;
      line-height: 1.6;
    }

    /* Metric Display Area */
    .metric-display-card {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }

    .metric-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }

    /* Control Button layout */
    .controls-grid {
      display: grid;
      grid-template-cols: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .btn-action {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e2e8f0;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
    }

    .btn-action:hover {
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
    }

    .btn-action:active {
      transform: translateY(0);
    }

    .btn-random {
      background: #6c63ff;
      border: none;
      color: white;
      box-shadow: 0 4px 12px rgba(108, 99, 255, 0.3);
    }

    .btn-random:hover {
      background-color: #5b52e0;
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(108, 99, 255, 0.45);
    }

    .instructions {
      font-size: 0.75rem;
      color: #64748b;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <div class="demo-badge">Odometer</div>
    <h1 class="demo-title">Mechanical Odometer</h1>
    <p class="demo-description">
      An elegant rolling number display that transitions values like a mechanical odometer.
    </p>

    <!-- Metric Card -->
    <div class="metric-display-card">
      <div class="metric-label">Sales Revenue</div>
      <!-- Target Element for Odometer class -->
      <div id="sales-odometer">$14,820</div>
    </div>

    <!-- Controls -->
    <div class="controls-grid">
      <button class="btn-action" id="btn-increment">Add +$1,250</button>
      <button class="btn-action" id="btn-decrement">Subtract -$820</button>
    </div>
    
    <button class="btn-action btn-random" id="btn-random" style="width: 100%; margin-bottom: 1.5rem;">
      Randomize Value
    </button>

    <div class="instructions">
      Click the controls above to trigger rolling number transitions.
    </div>
  </div>

  <!-- JavaScript implementing the Odometer wrapper logic -->
  <script>
    class Odometer {
      constructor(el) {
        this.el = el;
        this.value = el.textContent.trim();
        this.init();
      }

      init() {
        this.el.classList.add('odometer-container');
        this.update(this.value);
      }

      update(newValue) {
        this.value = String(newValue);
        this.el.innerHTML = '';

        [...this.value].forEach((char) => {
          // If character is a digit, wrap it in a vertical rolling column
          if (/\d/.test(char)) {
            const digitCol = document.createElement('div');
            digitCol.classList.add('odometer-digit');

            const inner = document.createElement('div');
            inner.classList.add('odometer-digit-inner');

            // Populate digit column with spans 0-9
            for (let i = 0; i <= 9; i++) {
              const span = document.createElement('span');
              span.textContent = i;
              inner.appendChild(span);
            }

            const digitVal = parseInt(char, 10);
            
            // Set translation offset after a minimal delay to trigger CSS transition
            setTimeout(() => {
              inner.style.transform = `translateY(-${digitVal * 10}%)`;
            }, 25);

            digitCol.appendChild(inner);
            this.el.appendChild(digitCol);
          } else {
            // Separators/currencies (e.g. $, commas, decimals)
            const sep = document.createElement('span');
            sep.classList.add('odometer-separator');
            sep.textContent = char;
            this.el.appendChild(sep);
          }
        });
      }
    }

    // Initialize the demo odometer instance
    document.addEventListener('DOMContentLoaded', () => {
      const salesElement = document.getElementById('sales-odometer');
      const salesOdo = new Odometer(salesElement);

      let rawValue = 14820;

      function updateSales(amount) {
        rawValue = Math.max(0, rawValue + amount);
        // Format as currency e.g. "$12,492"
        const formatted = '$' + rawValue.toLocaleString();
        salesOdo.update(formatted);
      }

      // Add click events
      document.getElementById('btn-increment').addEventListener('click', () => {
        updateSales(1250);
      });

      document.getElementById('btn-decrement').addEventListener('click', () => {
        updateSales(-820);
      });

      document.getElementById('btn-random').addEventListener('click', () => {
        const rand = Math.floor(Math.random() * 5000) - 2500;
        updateSales(rand);
      });
    });
  </script>
</body>
</html>
