<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS-Only Dark Mode Toggle Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="showcase-arena ease-toggle-animated">
    <header class="showcase-header">
      <h2>ease-dark-mode-toggle</h2>
      <p>Pure CSS theme state toggle with morphing SVG physics and multi-scale sizing arrays.</p>
    </header>

    <div class="toggle-display-matrix">
      
      <div class="toggle-variant-row">
        <span class="scale-tag">Small Scale (sm)</span>
        <div class="ease-toggle-dark ease-toggle-sm">
          <input type="checkbox" id="toggle-sm" class="toggle-input-gate" aria-label="Toggle dark mode settings (Small scale variant)">
          <label for="toggle-sm" class="ease-toggle-track ease-toggle-animated" role="button">
            <span class="ease-toggle-thumb ease-toggle-animated">
              <svg class="sun-moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle class="sun-core" cx="12" cy="12" r="5"></circle>
                <path class="sun-rays" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                <path class="moon-crescent" d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 0-.67-3.4 6.75 6.75 0 0 1-5-5A9.56 9.56 0 0 0 12 3z"></path>
              </svg>
            </span>
            <span class="ease-toggle-stars"></span>
          </label>
        </div>
      </div>

      <div class="toggle-variant-row">
        <span class="scale-tag">Medium Standard (md)</span>
        <div class="ease-toggle-dark ease-toggle-md">
          <input type="checkbox" id="toggle-md" class="toggle-input-gate simulate-theme-trigger" aria-label="Toggle dark mode settings (Standard master layout)">
          <label for="toggle-md" class="ease-toggle-track ease-toggle-animated" role="button">
            <span class="ease-toggle-thumb ease-toggle-animated">
              <svg class="sun-moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle class="sun-core" cx="12" cy="12" r="5"></circle>
                <path class="sun-rays" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                <path class="moon-crescent" d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 0-.67-3.4 6.75 6.75 0 0 1-5-5A9.56 9.56 0 0 0 12 3z"></path>
              </svg>
            </span>
            <span class="ease-toggle-stars"></span>
          </label>
        </div>
      </div>

      <div class="toggle-variant-row">
        <span class="scale-tag">Large Scale (lg)</span>
        <div class="ease-toggle-dark ease-toggle-lg">
          <input type="checkbox" id="toggle-lg" class="toggle-input-gate" aria-label="Toggle dark mode settings (Large scale variant)">
          <label for="toggle-lg" class="ease-toggle-track ease-toggle-animated" role="button">
            <span class="ease-toggle-thumb ease-toggle-animated">
              <svg class="sun-moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle class="sun-core" cx="12" cy="12" r="5"></circle>
                <path class="sun-rays" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                <path class="moon-crescent" d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 0-.67-3.4 6.75 6.75 0 0 1-5-5A9.56 9.56 0 0 0 12 3z"></path>
              </svg>
            </span>
            <span class="ease-toggle-stars"></span>
          </label>
        </div>
      </div>

      <div class="toggle-variant-row a11y-row">
        <span class="scale-tag">A11y High Contrast Version</span>
        <div class="ease-toggle-dark ease-toggle-md a11y-high-contrast">
          <input type="checkbox" id="toggle-a11y" class="toggle-input-gate" aria-label="Toggle high contrast dark mode alternative">
          <label for="toggle-a11y" class="ease-toggle-track ease-toggle-animated" role="button">
            <span class="ease-toggle-thumb ease-toggle-animated">
              <svg class="sun-moon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle class="sun-core" cx="12" cy="12" r="5"></circle>
                <path class="sun-rays" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
                <path class="moon-crescent" d="M12 3a9 9 0 1 0 9 9 9.75 9.75 0 0 0-.67-3.4 6.75 6.75 0 0 1-5-5A9.56 9.56 0 0 0 12 3z"></path>
              </svg>
            </span>
          </label>
        </div>
      </div>

    </div>
  </main>

  <script>
    document.querySelectorAll('.ease-toggle-track').forEach(label => {
      label.addEventListener('keydown', (e) => {
        if (e.key === ' ' || e.key === 'Enter') {
          e.preventDefault();
          const targetInput = document.getElementById(label.getAttribute('for'));
          if (targetInput) targetInput.click();
        }
      });
    });
  </script>
</body>
</html>
