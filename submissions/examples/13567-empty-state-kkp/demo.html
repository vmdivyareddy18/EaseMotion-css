<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animated Empty State</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="page">
      <section
        class="empty-state"
        aria-label="Animated empty state illustration demo"
      >
        <div class="illustration" aria-hidden="true">
          <span class="ring"></span>
          <span class="box"></span>
        </div>
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>No items yet</h1>
        <p class="copy">
          A polished empty state with subtle motion for first-run screens.
        </p>
        <button type="button">Create item</button>
      </section>
    </main>
  </body>
</html>
