<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Bar Fill</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>XP Bar</h1>
    <p class="subtitle">Experience bar with gradient fill and a glowing animated leading edge.</p>
    <div class="display-area" style="flex-direction:column; gap:1rem; padding:1.5rem;">
      <div class="xp-bar-track">
        <div class="xp-bar" id="xpBar" style="width:0%">
          <div class="xp-bar-glow" id="xpGlow"></div>
        </div>
      </div>
      <div class="xp-text" id="xpText">0 / 100 XP</div>
    </div>
    <button id="addXpBtn">+ Add XP</button>
    <button id="resetXpBtn">Reset</button>
  </div>
  <script>
    const xpBar = document.getElementById('xpBar');
    const xpText = document.getElementById('xpText');
    let xp = 0; const maxXp = 100;
    function update() {
      const pct = Math.min(100, (xp / maxXp) * 100);
      xpBar.style.width = pct + '%';
      xpText.textContent = Math.min(xp, maxXp) + ' / ' + maxXp + ' XP';
    }
    document.getElementById('addXpBtn').addEventListener('click', () => {
      xp = Math.min(maxXp + 50, xp + 15 + Math.floor(Math.random() * 20));
      update();
    });
    document.getElementById('resetXpBtn').addEventListener('click', () => {
      xp = 0; update();
    });
  </script>
</body>
</html>
