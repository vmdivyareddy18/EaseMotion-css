<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Feature Comparison Table</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header class="hero">
        <h1>Feature Comparison</h1>
        <p>Compare plans and choose the best option</p>
    </header>

    <div class="comparison-table">

        <div class="table-header">
            <div>Features</div>
            <div>Starter</div>
            <div>Pro</div>
            <div>Enterprise</div>
        </div>

        <div class="comparison-row">
            <div>Unlimited Projects</div>
            <div>✕</div>
            <div>✓</div>
            <div>✓</div>
        </div>

        <div class="comparison-row">
            <div>Team Collaboration</div>
            <div>✕</div>
            <div>✓</div>
            <div>✓</div>
        </div>

        <div class="comparison-row">
            <div>Analytics Dashboard</div>
            <div>Basic</div>
            <div>Advanced</div>
            <div>Premium</div>
        </div>

        <div class="comparison-row">
            <div>Priority Support</div>
            <div>✕</div>
            <div>✓</div>
            <div>✓</div>
        </div>

        <div class="comparison-row">
            <div>Custom Integrations</div>
            <div>✕</div>
            <div>✕</div>
            <div>✓</div>
        </div>

        <div class="comparison-row">
            <div>Dedicated Manager</div>
            <div>✕</div>
            <div>✕</div>
            <div>✓</div>
        </div>

    </div>

</div>

</body>
</html>
