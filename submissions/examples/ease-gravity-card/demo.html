<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Gravity Card Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1 class="demo-title">Ease Gravity Card</h1>
        <p class="demo-subtitle">
            A gravity-inspired card animation featuring a smooth drop and bounce effect.
        </p>

        <div class="ease-gravity-card">
            <h2>Gravity Card</h2>
            <p>
                Hover over this card to see a gravity-inspired drop and bounce animation.
            </p>
        </div>

        <div class="ease-gravity-card ease-gravity-card-slow">
            <h2>Gravity Card Slow</h2>
            <p>
                Hover over this card to see a gravity-inspired drop and bounce animation- slower version.
            </p>
        </div>
    </div>

</body>

</html>
