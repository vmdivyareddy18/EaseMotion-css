<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phase 416 - Autonomous Vehicle Fleet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="hero">
        <h1>Autonomous Fleet Command</h1>
        <div class="hero-stats">
            <div class="stat-card"><span class="stat-value">3,456</span><span class="stat-label">Active Vehicles</span></div>
            <div class="stat-card"><span class="stat-value">94%</span><span class="stat-label">Availability</span></div>
            <div class="stat-card"><span class="stat-value">98.7%</span><span class="stat-label">AI Score</span></div>
            <div class="stat-card"><span class="stat-value">2</span><span class="stat-label">Critical Alerts</span></div>
        </div>
    </header>
    <main class="dashboard">
        <section class="section">
            <h2>Fleet Analytics</h2>
            <div class="grid-4">
                <div class="card"><h3>Battery Health</h3><div class="value">87%</div></div>
                <div class="card"><h3>Active Trips</h3><div class="value">1,234</div></div>
                <div class="card"><h3>Charging</h3><div class="value">456</div></div>
                <div class="card"><h3>Maintenance</h3><div class="value warning">78</div></div>
            </div>
        </section>
        <section class="section executive">
            <h2>Safety Monitoring</h2>
            <div class="grid-3">
                <div class="exec-card"><h3>Incidents Today</h3><div class="exec-value">3</div></div>
                <div class="exec-card"><h3>AI Interventions</h3><div class="exec-value">127</div></div>
                <div class="exec-card"><h3>Safety Score</h3><div class="exec-value success">99.2%</div></div>
            </div>
        </section>
    </main>
</body>
</html>
