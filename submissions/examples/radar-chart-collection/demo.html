<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Radar Chart — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <p class="demo-label">EaseMotion CSS — Radar Chart Collection</p>
  <p class="demo-hint">Hover a shape to brighten it. Points pop in with staggered delay.</p>

  <!-- ── Chart 1: Skills comparison ────────────────────── -->
  <div class="radar-card">
    <span class="radar-card-title">Developer Skills Comparison</span>

    <svg
      class="ease-radar-chart"
      viewBox="0 0 300 300"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-label="Radar chart comparing developer skills across two profiles"
    >
      <!-- ── Grid rings ──────────────────────────────── -->
      <!-- 6 axes: 0°=top, 60°, 120°, 180°, 240°, 300° -->
      <!-- Ring at 20% -->
      <polygon class="ease-radar-grid"
        points="150,126 163,133 163,147 150,154 137,147 137,133" />
      <!-- Ring at 40% -->
      <polygon class="ease-radar-grid"
        points="150,102 176,116 176,144 150,158 124,144 124,116" />
      <!-- Ring at 60% -->
      <polygon class="ease-radar-grid"
        points="150,78 189,99 189,141 150,162 111,141 111,99" />
      <!-- Ring at 80% -->
      <polygon class="ease-radar-grid"
        points="150,54 202,82 202,138 150,166 98,138 98,82" />
      <!-- Ring at 100% (outer) -->
      <polygon class="ease-radar-grid"
        points="150,30 215,65 215,135 150,170 85,135 85,65" />

      <!-- ── Axis lines ───────────────────────────────── -->
      <line class="ease-radar-axis" x1="150" y1="150" x2="150" y2="30" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="215" y2="65" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="215" y2="135" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="150" y2="170" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="85"  y2="135" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="85"  y2="65" />

      <!-- ── Axis labels ──────────────────────────────── -->
      <text class="ease-radar-label" x="150" y="18">CSS</text>
      <text class="ease-radar-label" x="226" y="60">JS</text>
      <text class="ease-radar-label" x="228" y="140">React</text>
      <text class="ease-radar-label" x="150" y="184">Node</text>
      <text class="ease-radar-label" x="72"  y="140">TypeScript</text>
      <text class="ease-radar-label" x="72"  y="60">Testing</text>

      <!-- ── Shape 1 — Profile A (indigo) ────────────── -->
      <!-- Values: CSS 90%, JS 75%, React 80%, Node 60%, TS 70%, Test 50% -->
      <polygon
        class="ease-radar-shape ease-radar-shape-1"
        points="150,42 204,74 208,131 150,158 100,138 97,72"
      />

      <!-- ── Shape 2 — Profile B (rose) ──────────────── -->
      <!-- Values: CSS 60%, JS 85%, React 55%, Node 85%, TS 40%, Test 75% -->
      <polygon
        class="ease-radar-shape ease-radar-shape-2"
        points="150,78 210,85 187,149 150,166 115,146 112,72"
      />

      <!-- ── Points — Profile A ──────────────────────── -->
      <circle class="ease-radar-point ease-radar-point-1" cx="150" cy="42"  r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="204" cy="74"  r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="208" cy="131" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="150" cy="158" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="100" cy="138" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="97"  cy="72"  r="4" />

      <!-- ── Points — Profile B ──────────────────────── -->
      <circle class="ease-radar-point ease-radar-point-2" cx="150" cy="78"  r="4" />
      <circle class="ease-radar-point ease-radar-point-2" cx="210" cy="85"  r="4" />
      <circle class="ease-radar-point ease-radar-point-2" cx="187" cy="149" r="4" />
      <circle class="ease-radar-point ease-radar-point-2" cx="150" cy="166" r="4" />
      <circle class="ease-radar-point ease-radar-point-2" cx="115" cy="146" r="4" />
      <circle class="ease-radar-point ease-radar-point-2" cx="112" cy="72"  r="4" />

    </svg>

    <div class="radar-legend">
      <div class="radar-legend-item">
        <div class="radar-legend-dot" style="background:var(--ease-radar-shape1-stroke)"></div>
        Profile A
      </div>
      <div class="radar-legend-item">
        <div class="radar-legend-dot" style="background:var(--ease-radar-shape2-stroke)"></div>
        Profile B
      </div>
    </div>
  </div>

  <!-- ── Chart 2: Product ratings ───────────────────────── -->
  <div class="radar-card" style="margin-top:1.5rem">
    <span class="radar-card-title">Product Ratings — 5 Dimensions</span>

    <svg
      class="ease-radar-chart"
      viewBox="0 0 300 300"
      xmlns="http://www.w3.org/2000/svg"
      role="img"
      aria-label="Radar chart comparing product ratings across five dimensions"
    >
      <!-- 5 axes: 90°(top), 162°, 234°, 306°, 18° -->
      <!-- Ring 20% -->
      <polygon class="ease-radar-grid"
        points="150,126 163,141 158,158 142,158 137,141" />
      <!-- Ring 40% -->
      <polygon class="ease-radar-grid"
        points="150,102 176,132 166,166 134,166 124,132" />
      <!-- Ring 60% -->
      <polygon class="ease-radar-grid"
        points="150,78 189,123 174,174 126,174 111,123" />
      <!-- Ring 80% -->
      <polygon class="ease-radar-grid"
        points="150,54 202,114 182,182 118,182 98,114" />
      <!-- Ring 100% -->
      <polygon class="ease-radar-grid"
        points="150,30 215,105 190,190 110,190 85,105" />

      <!-- Axes -->
      <line class="ease-radar-axis" x1="150" y1="150" x2="150" y2="30"  />
      <line class="ease-radar-axis" x1="150" y1="150" x2="215" y2="105" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="190" y2="190" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="110" y2="190" />
      <line class="ease-radar-axis" x1="150" y1="150" x2="85"  y2="105" />

      <!-- Labels -->
      <text class="ease-radar-label" x="150" y="18">Design</text>
      <text class="ease-radar-label" x="226" y="102">Speed</text>
      <text class="ease-radar-label" x="196" y="202">Value</text>
      <text class="ease-radar-label" x="104" y="202">Support</text>
      <text class="ease-radar-label" x="74"  y="102">Features</text>

      <!-- Shape — Product A (indigo) 85/70/60/90/75 -->
      <polygon
        class="ease-radar-shape ease-radar-shape-1"
        points="150,42 207,109 185,184 115,184 98,109"
      />
      <!-- Shape — Product B (amber) 55/90/80/50/65 -->
      <polygon
        class="ease-radar-shape ease-radar-shape-3"
        points="150,84 214,100 183,178 117,174 92,119"
      />

      <!-- Points A -->
      <circle class="ease-radar-point ease-radar-point-1" cx="150" cy="42"  r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="207" cy="109" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="185" cy="184" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="115" cy="184" r="4" />
      <circle class="ease-radar-point ease-radar-point-1" cx="98"  cy="109" r="4" />

      <!-- Points B -->
      <circle class="ease-radar-point ease-radar-point-3" cx="150" cy="84"  r="4" />
      <circle class="ease-radar-point ease-radar-point-3" cx="214" cy="100" r="4" />
      <circle class="ease-radar-point ease-radar-point-3" cx="183" cy="178" r="4" />
      <circle class="ease-radar-point ease-radar-point-3" cx="117" cy="174" r="4" />
      <circle class="ease-radar-point ease-radar-point-3" cx="92"  cy="119" r="4" />

    </svg>

    <div class="radar-legend">
      <div class="radar-legend-item">
        <div class="radar-legend-dot" style="background:var(--ease-radar-shape1-stroke)"></div>
        Product A
      </div>
      <div class="radar-legend-item">
        <div class="radar-legend-dot" style="background:var(--ease-radar-shape3-stroke)"></div>
        Product B
      </div>
    </div>
  </div>

</body>
</html>
