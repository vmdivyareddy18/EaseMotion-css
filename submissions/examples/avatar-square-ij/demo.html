<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS avatar-square</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Square Avatars</h1>
    <div class="avatar-row">
      <div class="sq-avatar" style="background: linear-gradient(135deg, #e94560, #533483);">JD</div>
      <div class="sq-avatar" style="background: linear-gradient(135deg, #2ecc71, #3498db);">SK</div>
      <div class="sq-avatar" style="background: linear-gradient(135deg, #f39c12, #e74c3c);">AL</div>
      <div class="sq-avatar" style="background: linear-gradient(135deg, #9b59b6, #e94560);">MP</div>
    </div>
  </div>
</body>
</html>
