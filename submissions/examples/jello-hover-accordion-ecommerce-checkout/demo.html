<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Jello-Hover Accordion Demo — E-Commerce Checkout</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; min-height: 100vh; padding: 60px 20px; margin: 0; background: #fafaf9; }
    h2 { color: #1c1917; text-align: center; }
  </style>
</head>
<body>
  <h2>CSS Jello-Hover Accordion — E-Commerce Checkout</h2>

  <div class="ease-accordion">
    <div class="ease-accordion__item" data-open="true">
      <button class="ease-accordion__header" aria-expanded="true">
        <span>Order Summary</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          2 items — Subtotal $84.00, Shipping $6.50, Tax $6.28. Total: $96.78.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Shipping Details</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Standard shipping (3-5 business days) to your saved address.
        </div>
      </div>
    </div>

    <div class="ease-accordion__item" data-open="false">
      <button class="ease-accordion__header" aria-expanded="false">
        <span>Payment Method</span>
        <svg class="ease-accordion__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="ease-accordion__panel">
        <div class="ease-accordion__body">
          Visa ending in 4242, billed at time of shipment.
        </div>
      </div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.ease-accordion__header').forEach((btn) => {
      btn.addEventListener('click', () => {
        const item = btn.closest('.ease-accordion__item');
        const isOpen = item.getAttribute('data-open') === 'true';
        item.setAttribute('data-open', String(!isOpen));
        btn.setAttribute('aria-expanded', String(!isOpen));
      });
    });
  </script>
</body>
</html>
