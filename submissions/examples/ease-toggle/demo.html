<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Toggle Demo</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="demo-container">

        <h1>Ease Toggle</h1>

        <p>
            A pure CSS toggle switch component with smooth animation,
            size variants, keyboard focus styling, and reduced-motion support.
        </p>

        <section>

            <h2>Default Toggle</h2>

            <label class="ease-toggle">
                <input type="checkbox">
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

        <section>

            <h2>Checked Toggle</h2>

            <label class="ease-toggle">
                <input type="checkbox" checked>
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

        <section>

            <h2>Small Toggle</h2>

            <label class="ease-toggle ease-toggle-sm">
                <input type="checkbox">
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

        <section>

            <h2>Large Toggle</h2>

            <label class="ease-toggle ease-toggle-lg">
                <input type="checkbox" checked>
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

        <section>

            <h2>Disabled Toggle</h2>

            <label class="ease-toggle">
                <input type="checkbox" disabled>
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

        <section>

            <h2>Disabled Checked Toggle</h2>

            <label class="ease-toggle">
                <input type="checkbox" checked disabled>
                <span class="ease-toggle-track">
                    <span class="ease-toggle-knob"></span>
                </span>
            </label>

        </section>

    </main>

</body>
</html>
