<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glassmorphic Password Strength Field — EaseMotion CSS Demo</title>
    <link rel="stylesheet" href="./style.css" />
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at center, #1b182d 0%, #0d0b18 100%);
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          sans-serif;
        padding: 20px;
        color: #ffffff;
        box-sizing: border-box;
      }
      .demo-header {
        text-align: center;
        margin-bottom: 32px;
      }
      .demo-header h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 8px 0;
        background: linear-gradient(135deg, #a78bfa 0%, #6c63ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .demo-header p {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="demo-header">
      <h1>EaseMotion CSS Submission</h1>
      <p>
        Glassmorphic Password Strength Field with Staggered Validation Checks
      </p>
    </div>

    <div class="glass-password-container">
      <label for="password">Enter Password</label>
      <div class="input-wrapper">
        <input
          type="password"
          id="password"
          placeholder="••••••••"
          class="glass-input"
        />
      </div>

      <!-- Strength Bar -->
      <div class="strength-bar-track">
        <div id="strength-fill" class="strength-bar-fill"></div>
      </div>

      <!-- Staggered checklist items (initially hidden, animate in on focus) -->
      <ul class="validation-list" id="validation-checks">
        <li class="check-item ease-slide-up ease-delay-100" data-rule="length">
          Min 8 characters
        </li>
        <li class="check-item ease-slide-up ease-delay-200" data-rule="number">
          At least 1 number
        </li>
        <li class="check-item ease-slide-up ease-delay-300" data-rule="symbol">
          At least 1 special char
        </li>
      </ul>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const passwordInput = document.getElementById("password");
        const strengthFill = document.getElementById("strength-fill");
        const validationChecks = document.querySelectorAll(".check-item");

        passwordInput.addEventListener("input", () => {
          const value = passwordInput.value;

          // Define our validation rules
          const rules = {
            length: value.length >= 8,
            number: /\d/.test(value),
            symbol: /[^A-Za-z0-9]/.test(value),
          };

          let score = 0;

          // Validate each item and toggle the 'valid' class
          validationChecks.forEach((check) => {
            const rule = check.getAttribute("data-rule");
            if (rules[rule]) {
              check.classList.add("valid");
              score++;
            } else {
              check.classList.remove("valid");
            }
          });

          // Clear all previous strength indicator classes
          strengthFill.className = "strength-bar-fill";

          // Dynamically style the strength indicator bar
          if (value.length === 0) {
            strengthFill.style.width = "0%";
          } else {
            // Calculate score mapping
            if (score === 1) {
              strengthFill.classList.add("strength-weak");
              strengthFill.style.width = "33.33%";
            } else if (score === 2) {
              strengthFill.classList.add("strength-medium");
              strengthFill.style.width = "66.66%";
            } else if (score === 3) {
              strengthFill.classList.add("strength-strong");
              strengthFill.style.width = "100%";
            } else {
              // 0 score but something typed
              strengthFill.classList.add("strength-weak");
              strengthFill.style.width = "12%";
            }
          }
        });
      });
    </script>
  </body>
</html>
