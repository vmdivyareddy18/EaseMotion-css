<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palette Picker</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🎨 Color Palette Picker</h1>
        
        <div class="controls">
            <button id="generateBtn">🎲 Generate New Palette</button>
            <button id="copyBtn">📋 Copy All Colors</button>
        </div>

        <div class="palette-grid" id="paletteGrid">
            <!-- 5 color swatches will be generated by JavaScript -->
        </div>

        <div class="selected-color" id="selectedColor">
            <div class="color-preview" id="colorPreview"></div>
            <div class="color-info">
                <p><strong>Selected Color</strong></p>
                <p id="hexCode">#FFFFFF</p>
                <p id="rgbCode">rgb(255, 255, 255)</p>
                <p id="hslCode">hsl(0, 0%, 100%)</p>
            </div>
        </div>

        <div class="history">
            <h3>📜 Color History</h3>
            <div id="historyContainer"></div>
        </div>
    </div>

    <script>
        const paletteGrid = document.getElementById('paletteGrid');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const colorPreview = document.getElementById('colorPreview');
        const hexCode = document.getElementById('hexCode');
        const rgbCode = document.getElementById('rgbCode');
        const hslCode = document.getElementById('hslCode');
        const historyContainer = document.getElementById('historyContainer');

        let currentPalette = [];
        let selectedColor = null;
        let colorHistory = [];

        // Generate random color
        function generateRandomColor() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return { r, g, b };
        }

        // Convert RGB to Hex
        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => {
                const hex = x.toString(16);
                return hex.length === 1 ? '0' + hex : hex;
            }).join('');
        }

        // Convert RGB to HSL
        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;
            
            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        // Generate palette of 5 colors
        function generatePalette() {
            const palette = [];
            const baseColor = generateRandomColor();
            
            // Generate 5 colors with variations
            for (let i = 0; i < 5; i++) {
                const variation = Math.floor(Math.random() * 60) - 30;
                const r = Math.min(255, Math.max(0, baseColor.r + Math.floor(Math.random() * 80) - 40));
                const g = Math.min(255, Math.max(0, baseColor.g + Math.floor(Math.random() * 80) - 40));
                const b = Math.min(255, Math.max(0, baseColor.b + Math.floor(Math.random() * 80) - 40));
                palette.push({ r, g, b });
            }
            
            return palette;
        }

        // Display palette
        function displayPalette(palette) {
            paletteGrid.innerHTML = '';
            currentPalette = palette;

            palette.forEach((color, index) => {
                const hex = rgbToHex(color.r, color.g, color.b);
                const hsl = rgbToHsl(color.r, color.g, color.b);
                
                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = hex;
                
                const colorInfo = document.createElement('div');
                colorInfo.className = 'swatch-info';
                colorInfo.innerHTML = `
                    <span class="swatch-hex">${hex}</span>
                `;
                swatch.appendChild(colorInfo);
                
                swatch.addEventListener('click', () => {
                    selectColor(color, hex, hsl);
                });
                
                paletteGrid.appendChild(swatch);
            });
        }

        // Select a color
        function selectColor(color, hex, hsl) {
            selectedColor = color;
            const rgb = `rgb(${color.r}, ${color.g}, ${color.b})`;
            const hslStr = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            
            colorPreview.style.backgroundColor = hex;
            hexCode.textContent = hex;
            rgbCode.textContent = rgb;
            hslCode.textContent = hslStr;
            
            // Add to history
            addToHistory(hex, color);
        }

        // Add color to history
        function addToHistory(hex, color) {
            // Remove duplicate if exists
            colorHistory = colorHistory.filter(item => item.hex !== hex);
            
            colorHistory.unshift({ hex, color });
            
            if (colorHistory.length > 10) {
                colorHistory.pop();
            }
            
            displayHistory();
        }

        // Display history
        function displayHistory() {
            historyContainer.innerHTML = '';
            
            colorHistory.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.style.backgroundColor = item.hex;
                
                historyItem.addEventListener('click', () => {
                    const hsl = rgbToHsl(item.color.r, item.color.g, item.color.b);
                    selectColor(item.color, item.hex, hsl);
                });
                
                historyContainer.appendChild(historyItem);
            });
        }

        // Copy all colors
        function copyAllColors() {
            if (currentPalette.length === 0) return;
            
            const hexColors = currentPalette.map(color => rgbToHex(color.r, color.g, color.b));
            const text = hexColors.join(', ');
            
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ Copied!';
                setTimeout(() => copyBtn.textContent = '📋 Copy All Colors', 2000);
            }).catch(() => {
                alert('Failed to copy colors!');
            });
        }

        // Generate new palette
        function generateNewPalette() {
            const palette = generatePalette();
            displayPalette(palette);
            
            // Auto-select first color
            const firstColor = palette[0];
            const hex = rgbToHex(firstColor.r, firstColor.g, firstColor.b);
            const hsl = rgbToHsl(firstColor.r, firstColor.g, firstColor.b);
            selectColor(firstColor, hex, hsl);
        }

        // Event listeners
        generateBtn.addEventListener('click', generateNewPalette);
        copyBtn.addEventListener('click', copyAllColors);

        // Generate initial palette
        window.addEventListener('load', generateNewPalette);
    </script>
</body>
</html>
