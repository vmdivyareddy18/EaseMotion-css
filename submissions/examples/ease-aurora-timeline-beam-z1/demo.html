<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Aurora Timeline Beam</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="timeline">

  <article class="step">
    <span class="dot"></span>
    <div>
      <h2>Initialize</h2>
      <p>Project structure created.</p>
    </div>
  </article>

  <article class="step">
    <span class="dot"></span>
    <div>
      <h2>Develop</h2>
      <p>Animations and styles added.</p>
    </div>
  </article>

  <article class="step">
    <span class="dot"></span>
    <div>
      <h2>Deploy</h2>
      <p>Production build completed.</p>
    </div>
  </article>

</main>

</body>
</html>
