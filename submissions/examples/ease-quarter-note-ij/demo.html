<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-quarter-note</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Quarter Note</h1>
    <div class="animation-wrapper">
      <div class="note">
        <svg viewBox="0 0 40 80" class="note-svg">
          <ellipse cx="16" cy="64" rx="14" ry="10" fill="var(--note-color)" />
          <rect x="26" y="8" width="4" height="56" fill="var(--note-color)" />
          <path d="M26 8 Q38 12 36 26" fill="none" stroke="var(--note-color)" stroke-width="4" />
        </svg>
      </div>
    </div>
    <div class="controls">
      <label>
        Note Color
        <input type="color" class="js-color" value="#333333" data-var="--note-color" />
      </label>
      <label>
        Pulse Color
        <input type="color" class="js-color" value="#4ecdc4" data-var="--pulse-color" />
      </label>
      <label>
        Pulse Duration
        <input type="range" class="js-range" min="0.2" max="2" step="0.05" value="0.8" data-var="--pulse-duration" />
        <span class="js-range-value">0.8s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
