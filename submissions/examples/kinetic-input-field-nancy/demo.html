<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kinetic Input Field - Glassmorphism UI</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-kinetic-spring: cubic-bezier(0.68, -0.6, 0.32, 1.6);
      --ease-smooth-out: cubic-bezier(0.25, 1, 0.5, 1);
    }
    @keyframes kinetic-glow-stretch {
      0% { width: 0%; left: 50%; opacity: 0; }
      100% { width: 100%; left: 0%; opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Glassmorphic Container Card -->
  <div class="glass-container">
    <div class="form-header">
      <h2>Secure Authentication</h2>
      <p>Kinetic Input Fields Enabled</p>
    </div>

    <form onsubmit="return false;">
      <!-- Kinetic Input Wrapper 1: Username -->
      <div class="kinetic-input-group">
        <input type="text" id="username" class="kinetic-input" placeholder=" " required autocomplete="off">
        <label for="username" class="kinetic-label">
          <span class="label-text">Institutional Email</span>
        </label>
        <div class="kinetic-underline"></div>
      </div>

      <!-- Kinetic Input Wrapper 2: Access Key -->
      <div class="kinetic-input-group">
        <input type="password" id="access-key" class="kinetic-input" placeholder=" " required autocomplete="off">
        <label for="access-key" class="kinetic-label">
          <span class="label-text">Security Access Key</span>
        </label>
        <div class="kinetic-underline"></div>
      </div>

      <!-- Submit Interaction Element -->
      <button type="submit" class="submit-btn">Verify Credentials</button>
    </form>
  </div>

</body>
</html>
