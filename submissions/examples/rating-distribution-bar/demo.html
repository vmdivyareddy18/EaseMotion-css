<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating Distribution Bar Chart</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc;">
    <div class="rdist">
      <h3 class="rdist-title">Rating Distribution</h3>
      <div class="rdist-row"><span class="rdist-star">5★</span><div class="rdist-bar"><div class="rdist-fill" style="width: 62%"></div></div><span class="rdist-count">62%</span></div>
      <div class="rdist-row"><span class="rdist-star">4★</span><div class="rdist-bar"><div class="rdist-fill" style="width: 24%"></div></div><span class="rdist-count">24%</span></div>
      <div class="rdist-row"><span class="rdist-star">3★</span><div class="rdist-bar"><div class="rdist-fill" style="width: 9%"></div></div><span class="rdist-count">9%</span></div>
      <div class="rdist-row"><span class="rdist-star">2★</span><div class="rdist-bar"><div class="rdist-fill" style="width: 3%"></div></div><span class="rdist-count">3%</span></div>
      <div class="rdist-row"><span class="rdist-star">1★</span><div class="rdist-bar"><div class="rdist-fill" style="width: 2%"></div></div><span class="rdist-count">2%</span></div>
    </div>
  </div>
</body>
</html>
