<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confetti Celebration Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Confetti Celebration</h1>
        <p class="subtitle">Burst on success (form submit)</p>

        <!-- CONFETTI CELEBRATION COMPONENT -->
        <div class="confetti-container">
            <div class="confetti-wrapper">
                <div class="confetti-canvas-wrapper">
                    <canvas id="confettiCanvas"></canvas>
                </div>

                <!-- Demo Form -->
                <div class="demo-form" id="demoForm">
                    <div class="form-icon">🎉</div>
                    <h2 class="form-title">Sign Up Successfully!</h2>
                    <p class="form-description">Click the button below to celebrate your achievement</p>
                    <button class="form-btn" id="celebrateBtn">🎊 Celebrate!</button>
                    <button class="form-btn secondary" id="resetBtn">⟳ Reset</button>
                    <div class="form-status" id="formStatus">Ready to celebrate</div>
                </div>
            </div>
        </div>

        <!-- Demo Controls -->
        <div class="demo-controls">
            <button class="demo-btn" id="intensityLow">🟢 Low</button>
            <button class="demo-btn" id="intensityMedium">🟡 Medium</button>
            <button class="demo-btn" id="intensityHigh">🔴 High</button>
            <button class="demo-btn" id="toggleColors">🎨 Toggle Colors</button>
            <button class="demo-btn" id="toggleShapes">🔷 Toggle Shapes</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span class="status-label">Particles:</span>
            <span class="status-value" id="particleCount">0</span>
            <span class="status-label">Duration:</span>
            <span class="status-value" id="durationDisplay">0s</span>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const canvas = document.getElementById('confettiCanvas');
            const ctx = canvas.getContext('2d');
            const celebrateBtn = document.getElementById('celebrateBtn');
            const resetBtn = document.getElementById('resetBtn');
            const formStatus = document.getElementById('formStatus');
            const particleCount = document.getElementById('particleCount');
            const durationDisplay = document.getElementById('durationDisplay');
            const intensityLow = document.getElementById('intensityLow');
            const intensityMedium = document.getElementById('intensityMedium');
            const intensityHigh = document.getElementById('intensityHigh');
            const toggleColorsBtn = document.getElementById('toggleColors');
            const toggleShapesBtn = document.getElementById('toggleShapes');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                particleCount: 150,
                duration: 3000, // ms
                intensity: 'medium', // low, medium, high
                colors: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#ff9f43', '#00d2d3', '#1dd1a1', '#f368e0'],
                shapes: ['circle', 'square', 'rectangle', 'triangle', 'star'],
                gravity: 0.15,
                wind: 0.02,
                friction: 0.99,
                rotationSpeed: 0.02,
                spread: 1,
                onStart: function() {
                    console.log('🎊 Confetti celebration started!');
                },
                onComplete: function() {
                    console.log('🎊 Confetti celebration complete!');
                }
            };

            // ============================================
            // STATE
            // ============================================
            let particles = [];
            let isRunning = false;
            let animationId = null;
            let startTime = 0;
            let remainingDuration = CONFIG.duration;
            let paused = false;
            let currentColors = [...CONFIG.colors];
            let currentShapes = [...CONFIG.shapes];

            // ============================================
            // INTENSITY PRESETS
            // ============================================
            const INTENSITY = {
                low: { count: 80, spread: 0.6, gravity: 0.12, duration: 2000 },
                medium: { count: 150, spread: 1, gravity: 0.15, duration: 3000 },
                high: { count: 300, spread: 1.5, gravity: 0.18, duration: 4000 }
            };

            // ============================================
            // PARTICLE CLASS
            // ============================================
            class Particle {
                constructor(x, y, config) {
                    this.x = x;
                    this.y = y;
                    this.size = Math.random() * 8 + 4;
                    this.speedX = (Math.random() - 0.5) * 12 * config.spread;
                    this.speedY = -(Math.random() * 10 + 5) * config.spread;
                    this.gravity = config.gravity;
                    this.wind = (Math.random() - 0.5) * 0.04;
                    this.friction = config.friction;
                    this.rotation = Math.random() * Math.PI * 2;
                    this.rotationSpeed = (Math.random() - 0.5) * 0.1;
                    this.color = currentColors[Math.floor(Math.random() * currentColors.length)];
                    this.shape = currentShapes[Math.floor(Math.random() * currentShapes.length)];
                    this.opacity = 1;
                    this.life = 1;
                    this.decay = 0.003 + Math.random() * 0.005;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                    this.wobbleAmount = Math.random() * 2 + 1;
                }

                update() {
                    this.speedX *= this.friction;
                    this.speedY *= this.friction;
                    this.speedY += this.gravity;
                    this.speedX += this.wind + Math.sin(this.wobble) * 0.05;
                    
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    this.rotation += this.rotationSpeed;
                    this.wobble += this.wobbleSpeed;
                    
                    this.life -= this.decay;
                    this.opacity = Math.max(0, this.life);
                }

                draw(ctx) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.rotation);
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    
                    const size = this.size * (0.5 + this.life * 0.5);
                    
                    switch (this.shape) {
                        case 'circle':
                            ctx.beginPath();
                            ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                            ctx.fill();
                            break;
                        case 'square':
                            ctx.fillRect(-size / 2, -size / 2, size, size);
                            break;
                        case 'rectangle':
                            ctx.fillRect(-size / 2, -size / 4, size, size / 2);
                            break;
                        case 'triangle':
                            ctx.beginPath();
                            ctx.moveTo(0, -size / 2);
                            ctx.lineTo(-size / 2, size / 2);
                            ctx.lineTo(size / 2, size / 2);
                            ctx.closePath();
                            ctx.fill();
                            break;
                        case 'star':
                            this.drawStar(ctx, 0, 0, 5, size / 2, size / 4);
                            break;
                        default:
                            ctx.beginPath();
                            ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                            ctx.fill();
                    }
                    
                    ctx.restore();
                }

                drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
                    ctx.beginPath();
                    for (let i = 0; i < spikes * 2; i++) {
                        const radius = i % 2 === 0 ? outerRadius : innerRadius;
                        const angle = (i / (spikes * 2)) * Math.PI * 2 - Math.PI / 2;
                        const x = cx + Math.cos(angle) * radius;
                        const y = cy + Math.sin(angle) * radius;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // ============================================
            // CANVAS SETUP
            // ============================================
            function setupCanvas() {
                const rect = canvas.parentElement.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                canvas.style.width = rect.width + 'px';
                canvas.style.height = rect.height + 'px';
                ctx.scale(dpr, dpr);
                return { width: rect.width, height: rect.height };
            }

            // ============================================
            // CONFETTI FUNCTIONS
            // ============================================
            function createConfetti(x, y) {
                const intensity = INTENSITY[CONFIG.intensity] || INTENSITY.medium;
                const count = intensity.count;
                const config = {
                    spread: intensity.spread,
                    gravity: intensity.gravity,
                    friction: CONFIG.friction
                };
                
                particles = [];
                for (let i = 0; i < count; i++) {
                    const particle = new Particle(x, y, config);
                    particles.push(particle);
                }
                
                isRunning = true;
                startTime = performance.now();
                remainingDuration = intensity.duration;
                formStatus.textContent = '🎊 Celebrating!';
                formStatus.style.color = '#34c759';
                celebrateBtn.disabled = true;
                
                CONFIG.onStart();
                
                if (animationId) {
                    cancelAnimationFrame(animationId);
                }
                animate();
            }

            function animate() {
                const now = performance.now();
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / remainingDuration, 1);
                
                // Clear canvas
                const { width, height } = setupCanvas();
                ctx.clearRect(0, 0, width, height);
                
                // Update and draw particles
                let alive = 0;
                particles.forEach(p => {
                    p.update();
                    if (p.life > 0 && p.y < height + 50) {
                        p.draw(ctx);
                        alive++;
                    }
                });
                
                // Update stats
                particleCount.textContent = alive;
                durationDisplay.textContent = (elapsed / 1000).toFixed(1) + 's';
                
                // Continue or stop
                if (progress < 1 && alive > 0) {
                    animationId = requestAnimationFrame(animate);
                } else {
                    isRunning = false;
                    celebrateBtn.disabled = false;
                    formStatus.textContent = '✅ Celebration complete!';
                    formStatus.style.color = '#34c759';
                    CONFIG.onComplete();
                    
                    // Clear after a moment
                    setTimeout(() => {
                        if (!isRunning) {
                            ctx.clearRect(0, 0, width, height);
                            formStatus.textContent = 'Ready to celebrate';
                            formStatus.style.color = '#6b7280';
                            particleCount.textContent = '0';
                            durationDisplay.textContent = '0s';
                        }
                    }, 2000);
                }
            }

            // ============================================
            // CONTROLS
            // ============================================
            function startCelebration(x, y) {
                if (isRunning) return;
                const rect = canvas.getBoundingClientRect();
                const cx = x || rect.width / 2;
                const cy = y || rect.height / 3;
                createConfetti(cx, cy);
            }

            function resetCelebration() {
                if (isRunning) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    isRunning = false;
                }
                celebrateBtn.disabled = false;
                particles = [];
                const { width, height } = setupCanvas();
                ctx.clearRect(0, 0, width, height);
                formStatus.textContent = 'Ready to celebrate';
                formStatus.style.color = '#6b7280';
                particleCount.textContent = '0';
                durationDisplay.textContent = '0s';
            }

            function setIntensity(level) {
                if (INTENSITY[level]) {
                    CONFIG.intensity = level;
                    // Update button styles
                    document.querySelectorAll('.demo-btn').forEach(btn => {
                        btn.style.opacity = '0.6';
                    });
                    const btns = {
                        low: intensityLow,
                        medium: intensityMedium,
                        high: intensityHigh
                    };
                    if (btns[level]) {
                        btns[level].style.opacity = '1';
                    }
                }
            }

            function toggleColors() {
                const newColors = currentColors.map(() => {
                    const hue = Math.random() * 360;
                    return `hsl(${hue}, 80%, 60%)`;
                });
                currentColors = newColors;
            }

            function toggleShapes() {
                const allShapes = ['circle', 'square', 'rectangle', 'triangle', 'star'];
                if (currentShapes.length === allShapes.length) {
                    currentShapes = ['circle', 'square'];
                } else if (currentShapes.length === 2) {
                    currentShapes = ['triangle', 'star', 'rectangle'];
                } else {
                    currentShapes = [...allShapes];
                }
                toggleShapesBtn.textContent = `🔷 Shapes (${currentShapes.length})`;
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            celebrateBtn.addEventListener('click', function(e) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                startCelebration(x, y);
            });

            resetBtn.addEventListener('click', resetCelebration);

            intensityLow.addEventListener('click', function() {
                setIntensity('low');
            });

            intensityMedium.addEventListener('click', function() {
                setIntensity('medium');
            });

            intensityHigh.addEventListener('click', function() {
                setIntensity('high');
            });

            toggleColorsBtn.addEventListener('click', toggleColors);

            toggleShapesBtn.addEventListener('click', toggleShapes);

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (!isRunning) {
                        const rect = canvas.getBoundingClientRect();
                        startCelebration(rect.width / 2, rect.height / 3);
                    }
                }
                if (e.key === 'r' || e.key === 'R') {
                    resetCelebration();
                }
                if (e.key === '1') setIntensity('low');
                if (e.key === '2') setIntensity('medium');
                if (e.key === '3') setIntensity('high');
            });

            // ============================================
            // WINDOW RESIZE
            // ============================================
            let resizeTimeout;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (!isRunning) {
                        setupCanvas();
                    }
                }, 200);
            });

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.Confetti = {
                burst: startCelebration,
                reset: resetCelebration,
                setIntensity: setIntensity,
                toggleColors: toggleColors,
                toggleShapes: toggleShapes,
                isRunning: () => isRunning,
                configure: (config) => {
                    Object.assign(CONFIG, config);
                    if (config.colors) currentColors = [...config.colors];
                    if (config.shapes) currentShapes = [...config.shapes];
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            setupCanvas();
            setIntensity('medium');
            
            console.log('✅ Confetti Celebration initialized!');
            console.log('📖 API: window.Confetti');
            console.log('📖 Usage:');
            console.log('  - Click "Celebrate!" to burst confetti');
            console.log('  - Keyboard shortcuts: Space (burst), R (reset), 1-3 (intensity)');
            console.log('  - Try different intensities: Low, Medium, High');

        })();
    </script>
</body>
</html>
