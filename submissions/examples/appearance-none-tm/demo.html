<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appearance None Demo — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Appearance None</h1>
      <p class="subtitle">Removes platform-native styling from form controls for custom theming.</p>
      <span class="badge">CSS Property: appearance</span>
    </header>

    <hr class="divider">

    <div class="section">
      <h2>Variants Demo</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <span class="demo-label">appearance: none</span>
          <span class="demo-value appearance-none-sm">Appearance None variant</span>
        </div>
        <div class="demo-card">
          <span class="demo-label">appearance: auto</span>
          <span class="demo-value appearance-none-md">Appearance None variant</span>
        </div>
      </div>

    </div>

    <hr class="divider">

    <div class="section">
      <h2>Usage</h2>
      <div class="code-block">&lt;div class="appearance-none"&gt;Content here&lt;/div&gt;</div>
    </div>
  </div>
</body>
</html>
