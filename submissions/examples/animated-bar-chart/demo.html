<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Bar Chart - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Chart Card -->
    <div class="chart-card ease-fade-in-up">
      
      <!-- Header -->
      <div class="chart-header">
        <div class="header-text">
          <h2 class="chart-title ease-fade-in-up ease-delay-100">Monthly Revenue</h2>
          <p class="chart-subtitle ease-fade-in-up ease-delay-200">Performance overview for 2026</p>
        </div>
        <div class="legend ease-fade-in-right ease-delay-300">
          <span class="legend-item">
            <span class="legend-color"></span> Revenue
          </span>
        </div>
      </div>

      <!-- Chart Area -->
      <div class="chart-area">
        
        <!-- Y-Axis Labels -->
        <div class="y-axis">
          <span class="y-label ease-fade-in-left ease-delay-400">$100k</span>
          <span class="y-label ease-fade-in-left ease-delay-500">$75k</span>
          <span class="y-label ease-fade-in-left ease-delay-600">$50k</span>
          <span class="y-label ease-fade-in-left ease-delay-700">$25k</span>
          <span class="y-label ease-fade-in-left ease-delay-800">$0</span>
        </div>

        <!-- Grid & Bars Container -->
        <div class="chart-content">
          <!-- Horizontal Grid Lines -->
          <div class="grid-lines">
            <div class="grid-line ease-fade-in ease-delay-400"></div>
            <div class="grid-line ease-fade-in ease-delay-500"></div>
            <div class="grid-line ease-fade-in ease-delay-600"></div>
            <div class="grid-line ease-fade-in ease-delay-700"></div>
            <div class="grid-line ease-fade-in ease-delay-800"></div>
          </div>

          <!-- Bars Wrapper -->
          <div class="bars-wrapper">
            
            <!-- Bar 1: Jan -->
            <div class="bar-group">
              <div class="bar bar-1"></div>
              <span class="x-label ease-fade-in-up ease-delay-900">Jan</span>
            </div>

            <!-- Bar 2: Feb -->
            <div class="bar-group">
              <div class="bar bar-2"></div>
              <span class="x-label ease-fade-in-up ease-delay-1000">Feb</span>
            </div>

            <!-- Bar 3: Mar -->
            <div class="bar-group">
              <div class="bar bar-3"></div>
              <span class="x-label ease-fade-in-up ease-delay-1100">Mar</span>
            </div>

            <!-- Bar 4: Apr -->
            <div class="bar-group">
              <div class="bar bar-4"></div>
              <span class="x-label ease-fade-in-up ease-delay-1200">Apr</span>
            </div>

            <!-- Bar 5: May -->
            <div class="bar-group">
              <div class="bar bar-5"></div>
              <span class="x-label ease-fade-in-up ease-delay-1300">May</span>
            </div>

            <!-- Bar 6: Jun -->
            <div class="bar-group">
              <div class="bar bar-6"></div>
              <span class="x-label ease-fade-in-up ease-delay-1400">Jun</span>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</body>
</html>
