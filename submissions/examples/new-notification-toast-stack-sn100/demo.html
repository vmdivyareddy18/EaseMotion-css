<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS: Cascading Toast Notification Stack Layout</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background-color: #0b0c10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
  </style>
</head>
<body>
<div class="ease-toast-stack">
  <div class="toast-card toast-success">
    <span>✓</span> File processed successfully!
  </div>
  <div class="toast-card toast-info">
    <span>ℹ</span> Sync is running in background...
  </div>
</div>
</body>
</html>
