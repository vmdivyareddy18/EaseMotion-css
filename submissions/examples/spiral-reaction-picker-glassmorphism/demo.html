<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Picker - Spiral Variant</title>
    <link rel="stylesheet" href="../../../../core/easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-viewport">
        <div class="picker-container">
            <button class="trigger-button" aria-label="Choose reaction">
                <svg class="smile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                    <line x1="9" x2="9.01" y1="9" y2="9"/>
                    <line x1="15" x2="15.01" y1="9" y2="9"/>
                </svg>
            </button>
            
            <div class="spiral-tray">
                <button class="reaction-node" style="--node-index: 1; --target-x: -75px; --target-y: -45px;">👍</button>
                <button class="reaction-node" style="--node-index: 2; --target-x: -30px; --target-y: -85px;">❤️</button>
                <button class="reaction-node" style="--node-index: 3; --target-x: 30px; --target-y: -85px;">😂</button>
                <button class="reaction-node" style="--node-index: 4; --target-x: 75px; --target-y: -45px;">😮</button>
            </div>
        </div>
    </div>

</body>
</html>
