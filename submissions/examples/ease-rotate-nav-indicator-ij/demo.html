<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rotate Nav Indicator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <input type="radio" name="nav" id="nav1" checked hidden>
      <input type="radio" name="nav" id="nav2" hidden>
      <input type="radio" name="nav" id="nav3" hidden>
      <input type="radio" name="nav" id="nav4" hidden>
      <div class="nav-inner">
        <label for="nav1" class="nav-item">Home</label>
        <label for="nav2" class="nav-item">Explore</label>
        <label for="nav3" class="nav-item">Library</label>
        <label for="nav4" class="nav-item">Profile</label>
        <div class="nav-bg"></div>
      </div>
    </nav>
  </div>
</body>
</html>
