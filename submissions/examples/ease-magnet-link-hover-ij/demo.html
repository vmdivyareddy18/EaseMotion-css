<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnet Link Hover — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="component-card">
    <h2 class="card-title">Magnet Link Hover</h2>
    <p class="card-desc">Hover over a link — feel the magnetic pull toward the cursor.</p>
    <div class="demo-area">
      <a href="#" class="magnet-link">Hover over me</a>
      <a href="#" class="magnet-link">Another link</a>
      <a href="#" class="magnet-link">And another</a>
    </div>
    <div class="vars-panel">
      <label>--link-color <input type="color" value="#0a84ff" data-var="--link-color"></label>
      <label>--magnet-color <input type="color" value="#ff375f" data-var="--magnet-color"></label>
      <label>--pull-distance <input type="range" min="4" max="32" value="12" data-var="--pull-distance"> <span class="val">12px</span></label>
      <label>--hover-duration <input type="range" min="0.1" max="1" step="0.05" value="0.35" data-var="--hover-duration"> <span class="val">0.35s</span></label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.vars-panel input[data-var]').forEach(el => {
      el.addEventListener('input', () => {
        let val = el.value;
        if (el.type === 'color') val = el.value;
        else if (el.dataset.var === '--hover-duration') val += 's';
        else if (el.dataset.var === '--pull-distance') val += 'px';
        document.querySelector('.demo-area').style.setProperty(el.dataset.var, val);
        if (el.type === 'range') el.nextElementSibling.textContent = val;
      });
    });
  </script>
</body>
</html>
