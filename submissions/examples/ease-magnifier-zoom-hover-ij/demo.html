<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magnifier Zoom Hover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Magnifier Zoom Hover</h1>
    <p class="subtitle">Hover over the images to see a magnified view through a floating lens.</p>

    <div class="controls">
      <label>
        Zoom Level:
        <input type="range" id="zoomSlider" min="1.5" max="5" step="0.1" value="3">
        <span id="zoomValue">3x</span>
      </label>
      <label>
        Lens Size:
        <input type="range" id="sizeSlider" min="80" max="250" step="10" value="150">
        <span id="sizeValue">150px</span>
      </label>
    </div>

    <div class="demo-grid">
      <div class="magnifier-item">
        <div class="magnifier-container" data-img="https://picsum.photos/id/20/400/300" data-zoom="3">
          <img src="https://picsum.photos/id/20/400/300" alt="Sample 1" loading="lazy">
          <div class="magnifier-lens"></div>
        </div>
        <p class="caption">Coastline</p>
      </div>

      <div class="magnifier-item">
        <div class="magnifier-container" data-img="https://picsum.photos/id/29/400/300" data-zoom="3">
          <img src="https://picsum.photos/id/29/400/300" alt="Sample 2" loading="lazy">
          <div class="magnifier-lens"></div>
        </div>
        <p class="caption">Mountain View</p>
      </div>

      <div class="magnifier-item">
        <div class="magnifier-container" data-img="https://picsum.photos/id/48/400/300" data-zoom="3">
          <img src="https://picsum.photos/id/48/400/300" alt="Sample 3" loading="lazy">
          <div class="magnifier-lens"></div>
        </div>
        <p class="caption">Macro Detail</p>
      </div>
    </div>
  </div>

  <script>
    const zoomSlider = document.getElementById('zoomSlider');
    const sizeSlider = document.getElementById('sizeSlider');
    const zoomValue = document.getElementById('zoomValue');
    const sizeValue = document.getElementById('sizeValue');

    zoomSlider.addEventListener('input', () => {
      zoomValue.textContent = zoomSlider.value + 'x';
      document.querySelectorAll('.magnifier-lens').forEach(lens => {
        lens.style.setProperty('--mzh-zoom-level', zoomSlider.value);
      });
    });

    sizeSlider.addEventListener('input', () => {
      sizeValue.textContent = sizeSlider.value + 'px';
      document.querySelectorAll('.magnifier-lens').forEach(lens => {
        lens.style.setProperty('--mzh-lens-size', sizeSlider.value + 'px');
      });
    });

    document.querySelectorAll('.magnifier-container').forEach(container => {
      const lens = container.querySelector('.magnifier-lens');
      const img = container.querySelector('img');
      const zoom = parseFloat(container.dataset.zoom) || 3;

      const updateLens = (e) => {
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const lensX = x - lens.offsetWidth / 2;
        const lensY = y - lens.offsetHeight / 2;

        const clamp = (v, min, max) => Math.min(max, Math.max(min, v));
        const clampedX = clamp(lensX, 0, rect.width - lens.offsetWidth);
        const clampedY = clamp(lensY, 0, rect.height - lens.offsetHeight);

        lens.style.display = 'block';
        lens.style.left = clampedX + 'px';
        lens.style.top = clampedY + 'px';

        const cx = x / rect.width;
        const cy = y / rect.height;
        const currentZoom = parseFloat(getComputedStyle(lens).getPropertyValue('--mzh-zoom-level')) || zoom;
        const bgW = rect.width * currentZoom;
        const bgH = rect.height * currentZoom;
        const bgX = cx * (rect.width - bgW);
        const bgY = cy * (rect.height - bgH);

        lens.style.backgroundImage = `url(${img.src})`;
        lens.style.backgroundSize = `${bgW}px ${bgH}px`;
        lens.style.backgroundPosition = `${bgX}px ${bgY}px`;
      };

      container.addEventListener('mousemove', updateLens);

      container.addEventListener('mouseleave', () => {
        lens.style.display = 'none';
      });
    });
  </script>
</body>
</html>
