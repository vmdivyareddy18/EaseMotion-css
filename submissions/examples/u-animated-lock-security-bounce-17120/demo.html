<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Lock Security Bounce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">

    <h1>Animated Lock Security Bounce</h1>

    <p>
      A reusable lock animation for authentication systems,
      login pages, secure dashboards, and cybersecurity interfaces.
    </p>

    <div class="demo-grid">

      <button class="lock-button">
        <span class="lock-icon">🔒</span>
      </button>

      <button class="lock-button card-style">
        <span class="lock-icon">🔒</span>
        <span>Secure Access</span>
      </button>

      <div class="security-card">
        <h3>Protected Account</h3>

        <p>
          Your account is secured with advanced protection.
        </p>

        <button class="lock-button small">
          <span class="lock-icon">🔒</span>
        </button>
      </div>

    </div>

  </main>

</body>
</html>
