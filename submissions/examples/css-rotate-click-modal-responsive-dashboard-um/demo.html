<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Dashboard Rotate-Click Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="resp-modal-toggle" class="ease-resp-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Card -->
  <label for="resp-modal-toggle" class="ease-resp-trigger-um" tabindex="0">
    <div class="ease-resp-trigger-icon-um">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
        <line x1="12" y1="22.08" x2="12" y2="12"></line>
      </svg>
    </div>
    <div class="ease-resp-trigger-details-um">
      <div class="ease-resp-trigger-title-um">Server Cluster Alpha</div>
      <div class="ease-resp-trigger-sub-um">US-East-1 • Running</div>
    </div>
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-resp-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="resp-modal-toggle" class="ease-resp-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-resp-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Header -->
      <div class="ease-resp-header-um">
        <div>
          <h2 id="modal-title" class="ease-resp-title-um">Cluster Details</h2>
          <p class="ease-resp-subtitle-um">Server Cluster Alpha (US-East-1)</p>
        </div>
        <label for="resp-modal-toggle" class="ease-resp-close-icon-um" aria-label="Close Modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </label>
      </div>

      <!-- Body -->
      <div class="ease-resp-body-um">
        <div class="ease-resp-data-block-um">
          <span class="ease-resp-data-label-um">Status</span>
          <span class="ease-resp-data-value-um" style="color: #10b981; font-weight: 500;">● Online</span>
        </div>
        <div class="ease-resp-data-block-um">
          <span class="ease-resp-data-label-um">CPU Usage</span>
          <span class="ease-resp-data-value-um">42%</span>
        </div>
        <div class="ease-resp-data-block-um">
          <span class="ease-resp-data-label-um">Memory</span>
          <span class="ease-resp-data-value-um">16.4 GB / 32 GB</span>
        </div>
        <div class="ease-resp-data-block-um">
          <span class="ease-resp-data-label-um">Active Connections</span>
          <span class="ease-resp-data-value-um">1,249</span>
        </div>
        <div class="ease-resp-data-block-um">
          <span class="ease-resp-data-label-um">Uptime</span>
          <span class="ease-resp-data-value-um">45d 12h 30m</span>
        </div>
      </div>
      
      <!-- Footer Actions -->
      <div class="ease-resp-footer-um">
        <label for="resp-modal-toggle" class="ease-resp-btn-um">
          Close
        </label>
        <label for="resp-modal-toggle" class="ease-resp-btn-um ease-resp-btn-primary-um">
          Manage Cluster
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
