<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Cards Demo</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="profiles">

<h1 class="ease-fade-in">Meet Our Team</h1>

<div class="grid">

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/150"
     alt="Profile">

<h2>John Doe</h2>

<h4>Frontend Developer</h4>

<p>
Passionate about creating responsive user interfaces.
</p>

<div class="socials">
<a href="#">🌐</a>
<a href="#">💼</a>
<a href="#">🐦</a>
</div>

<button class="btn ease-hover-grow">
Follow
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/150"
     alt="Profile">

<h2>Jane Smith</h2>

<h4>UI/UX Designer</h4>

<p>
Designing modern and user-friendly experiences.
</p>

<div class="socials">
<a href="#">🌐</a>
<a href="#">💼</a>
<a href="#">📸</a>
</div>

<button class="btn ease-hover-grow">
Follow
</button>

</div>

<div class="card ease-slide-up">

<img src="https://via.placeholder.com/150"
     alt="Profile">

<h2>Alex Brown</h2>

<h4>Backend Developer</h4>

<p>
Building secure and scalable backend systems.
</p>

<div class="socials">
<a href="#">🌐</a>
<a href="#">💼</a>
<a href="#">📧</a>
</div>

<button class="btn ease-hover-grow">
Follow
</button>

</div>

</div>

</section>

</body>
</html>
