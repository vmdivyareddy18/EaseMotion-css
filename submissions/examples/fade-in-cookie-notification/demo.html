<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fade In Cookie Notification</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="cookie ease-fade-in">

    <div class="content">
        <h2>🍪 Cookie Notice</h2>

        <p>
            We use cookies to improve your browsing experience,
            personalize content, and analyze website traffic.
        </p>

        <div class="actions">
            <button class="accept">Accept</button>
            <button class="decline">Decline</button>
        </div>
    </div>

</div>

</body>
</html>
