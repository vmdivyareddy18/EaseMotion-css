<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Before/After Slider - EaseMotion CSS</title>
  
  <!-- EaseMotion CSS via CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css" />
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Section Header -->
    <header class="section-header ease-fade-in-down">
      <h1>See the Magic in Action</h1>
      <p>Drag the slider to compare the original and enhanced versions.</p>
    </header>

    <!-- Comparison Slider Wrapper -->
    <div class="comparison-wrapper ease-fade-in-up ease-delay-100">
      <div class="comparison-container" id="comparison-container">
        
        <!-- Before Layer (Bottom) -->
        <div class="layer before-layer">
          <div class="layer-content">
            <span class="layer-emoji">🌫️</span>
            <span class="layer-text">Original</span>
          </div>
          <div class="label before-label ease-fade-in-left ease-delay-300">Before</div>
        </div>

        <!-- After Layer (Top, Clipped) -->
        <div class="layer after-layer" id="after-layer">
          <div class="layer-content">
            <span class="layer-emoji">✨</span>
            <span class="layer-text">Enhanced</span>
          </div>
          <div class="label after-label ease-fade-in-right ease-delay-300">After</div>
        </div>

        <!-- Slider Handle -->
        <div class="slider-handle" id="slider-handle">
          <div class="handle-line"></div>
          <div class="handle-circle ease-bounce-in ease-delay-400">
            <span class="handle-arrow left ease-pulse">←</span>
            <span class="handle-arrow right ease-pulse">→</span>
          </div>
          <div class="handle-line"></div>
        </div>

      </div>
    </div>

    <!-- Feature Pills -->
    <div class="feature-pills ease-fade-in-up ease-delay-500">
      <span class="pill">🎨 Color Correction</span>
      <span class="pill">🔍 Noise Reduction</span>
      <span class="pill">⚡ 10x Faster</span>
    </div>

  </div>

  <!-- JavaScript for Slider Interaction -->
  <script>
    const container = document.getElementById('comparison-container');
    const afterLayer = document.getElementById('after-layer');
    const handle = document.getElementById('slider-handle');
    let isDragging = false;

    // Update slider position
    function updateSlider(clientX) {
      const rect = container.getBoundingClientRect();
      let pos = (clientX - rect.left) / rect.width;
      
      // Clamp between 0 and 1
      pos = Math.max(0.05, Math.min(0.95, pos));
      
      afterLayer.style.width = `${pos * 100}%`;
      handle.style.left = `${pos * 100}%`;
    }

    // Mouse Events
    handle.addEventListener('mousedown', (e) => {
      isDragging = true;
      e.preventDefault();
    });
    
    document.addEventListener('mouseup', () => {
      isDragging = false;
    });
    
    document.addEventListener('mousemove', (e) => {
      if (isDragging) {
        updateSlider(e.clientX);
      }
    });

    // Touch Events for Mobile
    handle.addEventListener('touchstart', () => {
      isDragging = true;
    });
    
    document.addEventListener('touchend', () => {
      isDragging = false;
    });
    
    document.addEventListener('touchmove', (e) => {
      if (isDragging) {
        updateSlider(e.touches[0].clientX);
      }
    });

    // Click to jump
    container.addEventListener('click', (e) => {
      if (e.target !== handle && !handle.contains(e.target)) {
        updateSlider(e.clientX);
      }
    });

    // Initialize at 50%
    window.addEventListener('load', () => {
      updateSlider(container.getBoundingClientRect().left + (container.getBoundingClientRect().width / 2));
    });
  </script>
</body>
</html>
