<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Rotate-Click Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="port-modal-toggle" class="ease-port-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Container (Portfolio Thumbnail) -->
  <label for="port-modal-toggle" class="ease-port-trigger-um" tabindex="0">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiM1NTUiLz48L3N2Zz4=" alt="Project Thumbnail Placeholder">
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-port-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="port-modal-toggle" class="ease-port-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-port-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="port-modal-toggle" class="ease-port-close-icon-um" aria-label="Close Modal">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Image Column -->
      <div class="ease-port-image-col-um">
        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiMzMzMiLz48L3N2Zz4=" alt="Project Hero Image Placeholder">
      </div>

      <!-- Details Column -->
      <div class="ease-port-details-col-um">
        <div class="ease-port-subtitle-um">Brand Identity</div>
        <h2 id="modal-title" class="ease-port-title-um">Studio Flux</h2>
        <p class="ease-port-desc-um">
          A complete rebrand for an architecture firm focusing on kinetic, bold geometric shapes. The identity system relies on stark contrasts and dynamic typography to communicate the firm's brutalist aesthetic.
        </p>
        
        <!-- Action Button -->
        <label for="port-modal-toggle" class="ease-port-btn-um">
          View Case Study
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
