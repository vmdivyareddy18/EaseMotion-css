<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Compare Slider</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section
        class="panel"
        aria-label="Before and after image comparison demo"
      >
        <p class="eyebrow">EaseMotion CSS</p>
        <h1>Before / After</h1>
        <div class="compare">
          <div class="image before">Before</div>
          <div class="image after">After</div>
          <input
            type="range"
            min="0"
            max="100"
            value="52"
            aria-label="Reveal after image"
          />
        </div>
      </section>
    </main>
  </body>
</html>
