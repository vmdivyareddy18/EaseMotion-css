<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - EaseMotion Studio Pro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="dashboard">
    <header class="header">
      <span class="badge">Phase 221 • Global Intelligence</span>
      <h1>EaseMotion Studio Pro</h1>
      <p class="subtitle">Professional visual animation editor.</p>
    </header>
    <div class="dashboard-grid">
      <section class="panel-card main-panel">
        <h3>🎨 EaseMotion Studio Pro</h3>
        <div class="timeline-container">
          <div class="timeline-header">
            <h5>Keyframe Easing Designer</h5>
            <span class="active-node">Cubic-Bezier (0.25, 0.1, 0.25, 1)</span>
          </div>
          <div class="timeline-visual">
            <div class="timeline-scrubber" style="left: 60%"></div>
            <div class="timeline-track"></div>
          </div>
        </div>
      </section>
      <section class="side-panel">
        <div class="panel-card status-card">
          <h3>⚡ Control Deck</h3>
          <ul class="stats-list">
            <li>Orchestrator: <strong>Ready</strong></li>
            <li>Connection: <strong>SSL Synced</strong></li>
            <li>Telemetry: <strong>100%</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
