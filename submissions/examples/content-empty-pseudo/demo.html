<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empty Content Pseudo-elements</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Decorative Pseudo-elements</h1>
  <p><code>content: ""</code> with <code>::before</code> and <code>::after</code> creates icon-only and decorative effects without extra markup.</p>

  <section class="icon-set">
    <h2>Icon-only Elements</h2>
    <div class="icon-row">
      <span class="icon-star"></span>
      <span class="icon-heart"></span>
      <span class="icon-check"></span>
      <span class="icon-warning"></span>
      <span class="icon-arrow"></span>
      <span class="icon-cross"></span>
    </div>
  </section>

  <section class="decor-set">
    <h2>Decorative Dividers</h2>
    <div class="divider dots"></div>
    <div class="divider waves"></div>
    <div class="divider zigzag"></div>
    <div class="divider double-line"></div>
  </section>

  <section class="badge-set">
    <h2>Status Badges</h2>
    <div class="badge-list">
      <span class="badge active">Active</span>
      <span class="badge pending">Pending</span>
      <span class="badge archived">Archived</span>
      <span class="badge error">Error</span>
    </div>
  </section>

  <section class="stepper-set">
    <h2>Step Indicator</h2>
    <div class="stepper">
      <span class="step done">Cart</span>
      <span class="step done">Shipping</span>
      <span class="step current">Payment</span>
      <span class="step">Confirm</span>
    </div>
  </section>

  <section class="ribbon-set">
    <h2>Ribbon Accents</h2>
    <div class="ribbon">Sale Item</div>
    <div class="ribbon highlight">Featured</div>
  </section>
</body>
</html>
