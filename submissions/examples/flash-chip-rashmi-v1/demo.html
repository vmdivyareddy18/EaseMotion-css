<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flash Chip — EaseMotion CSS</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="ease-demo-backdrop">

  <span class="ease-flash-chip" role="status" aria-label="Status: Live">
    <span class="ease-flash-chip__dot" aria-hidden="true"></span>
    <span class="ease-flash-chip__label">Live</span>
  </span>

  <span class="ease-flash-chip ease-flash-chip--success" role="status" aria-label="Status: Deployed">
    <span class="ease-flash-chip__dot" aria-hidden="true"></span>
    <span class="ease-flash-chip__label">Deployed</span>
  </span>

  <span class="ease-flash-chip ease-flash-chip--warning" role="status" aria-label="Status: Pending review">
    <span class="ease-flash-chip__dot" aria-hidden="true"></span>
    <span class="ease-flash-chip__label">Pending Review</span>
  </span>

  <span class="ease-flash-chip ease-flash-chip--danger" role="status" aria-label="Status: Incident">
    <span class="ease-flash-chip__dot" aria-hidden="true"></span>
    <span class="ease-flash-chip__label">Incident</span>
  </span>

  <span class="ease-flash-chip" role="status" aria-label="Tag: New feature, dismissible">
    <span class="ease-flash-chip__dot" aria-hidden="true"></span>
    <span class="ease-flash-chip__label">New Feature</span>
    <button
      type="button"
      class="ease-flash-chip__close"
      aria-label="Dismiss New Feature tag"
      onclick="this.closest('.ease-flash-chip').remove()"
    >
      <svg viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg">
        <line x1="2" y1="2" x2="10" y2="10" />
        <line x1="10" y1="2" x2="2" y2="10" />
      </svg>
    </button>
  </span>

</main>

</body>
</html>
