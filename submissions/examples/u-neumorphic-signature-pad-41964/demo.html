<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neumorphic Signature Pad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="signature-card">

    <h2>Digital Signature</h2>

    <div class="signature-pad">

        <svg viewBox="0 0 400 140" aria-label="Sample signature">
            <path d="M30 90
                     C70 20 120 120 170 70
                     S260 20 320 80
                     S360 120 380 60"/>
        </svg>

    </div>

    <button>Save Signature</button>

</div>

</body>
</html>
