<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feature Comparison Table</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="ease-flex ease-center" style="min-height: 100vh; background: #f8fafc; padding: 1rem;">
    <div class="compare-table-wrapper">
      <table class="compare-table">
        <thead>
          <tr>
            <th>Feature</th>
            <th class="col-free">Free</th>
            <th class="col-pro">Pro</th>
            <th class="col-enterprise">Enterprise</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Projects</td><td>3</td><td>Unlimited</td><td>Unlimited</td></tr>
          <tr><td>Storage</td><td>5 GB</td><td>50 GB</td><td>500 GB</td></tr>
          <tr><td>Team Members</td><td>1</td><td>10</td><td>Unlimited</td></tr>
          <tr><td>API Access</td><td><span class="check-no">✕</span></td><td><span class="check-yes">✓</span></td><td><span class="check-yes">✓</span></td></tr>
          <tr><td>Priority Support</td><td><span class="check-no">✕</span></td><td><span class="check-no">✕</span></td><td><span class="check-yes">✓</span></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
