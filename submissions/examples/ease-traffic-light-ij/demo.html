<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Light</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="trl-container">
    <h1>Traffic Light</h1>
    <p class="trl-subtitle">Traffic light with glow/pulse animation, pedestrian symbols, and crosswalk</p>

    <div class="trl-scene">
      <div class="trl-pole"></div>
      <div class="trl-box">
        <div class="trl-light trl-red" id="trl-red">
          <div class="trl-light-inner"></div>
        </div>
        <div class="trl-light trl-yellow" id="trl-yellow">
          <div class="trl-light-inner"></div>
        </div>
        <div class="trl-light trl-green" id="trl-green">
          <div class="trl-light-inner"></div>
        </div>
      </div>

      <div class="trl-pedestrian">
        <div class="trl-pedestrian-sign" id="trl-pedestrian-sign">
          <div class="trl-pedestrian-walk" id="trl-pedestrian-walk">🚶</div>
          <div class="trl-pedestrian-dont-walk" id="trl-pedestrian-dont-walk">🚫</div>
        </div>
        <div class="trl-pedestrian-label" id="trl-pedestrian-label">Don't Walk</div>
      </div>

      <div class="trl-crosswalk" id="trl-crosswalk">
        <div class="trl-stripe"></div>
        <div class="trl-stripe"></div>
        <div class="trl-stripe"></div>
        <div class="trl-stripe"></div>
      </div>
    </div>

    <div class="trl-controls">
      <button class="trl-btn" id="trl-btn-cycle">Auto Cycle</button>
      <button class="trl-btn" id="trl-btn-red">Red</button>
      <button class="trl-btn" id="trl-btn-yellow">Yellow</button>
      <button class="trl-btn" id="trl-btn-green">Green</button>
      <span class="trl-timer" id="trl-timer">--</span>
    </div>
  </div>

  <script>
    const redLight = document.getElementById('trl-red');
    const yellowLight = document.getElementById('trl-yellow');
    const greenLight = document.getElementById('trl-green');
    const walkEl = document.getElementById('trl-pedestrian-walk');
    const dontWalkEl = document.getElementById('trl-pedestrian-dont-walk');
    const pedLabel = document.getElementById('trl-pedestrian-label');
    const crosswalk = document.getElementById('trl-crosswalk');
    const timerEl = document.getElementById('trl-timer');
    const cycleBtn = document.getElementById('trl-btn-cycle');

    let currentState = 'red';
    let isCycling = false;
    let cycleTimer = null;
    let countdownTimer = null;
    let remaining = 0;

    const states = {
      red: { duration: 5, next: 'green' },
      green: { duration: 4, next: 'yellow' },
      yellow: { duration: 2, next: 'red' }
    };

    function setState(state) {
      redLight.classList.remove('trl-active', 'trl-pulse');
      yellowLight.classList.remove('trl-active', 'trl-pulse');
      greenLight.classList.remove('trl-active', 'trl-pulse');
      walkEl.classList.remove('trl-active-vis');
      dontWalkEl.classList.remove('trl-active-vis');

      switch (state) {
        case 'red':
          redLight.classList.add('trl-active', 'trl-pulse');
          dontWalkEl.classList.add('trl-active-vis');
          pedLabel.textContent = "Don't Walk";
          break;
        case 'yellow':
          yellowLight.classList.add('trl-active', 'trl-pulse');
          dontWalkEl.classList.add('trl-active-vis');
          pedLabel.textContent = "Don't Walk";
          break;
        case 'green':
          greenLight.classList.add('trl-active', 'trl-pulse');
          walkEl.classList.add('trl-active-vis');
          pedLabel.textContent = 'Walk';
          break;
      }

      currentState = state;
      document.querySelectorAll('.trl-btn[data-state]').forEach(b => {
        b.classList.toggle('trl-btn-active', b.dataset.state === state);
      });
    }

    function startCountdown(seconds) {
      remaining = seconds;
      timerEl.textContent = remaining + 's';
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        remaining--;
        timerEl.textContent = Math.max(0, remaining) + 's';
        if (remaining <= 0) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }, 1000);
    }

    function cycleToNext() {
      const state = states[currentState];
      const next = state.next;
      startCountdown(states[next].duration);
      setState(next);
    }

    function startCycle() {
      if (isCycling) {
        stopCycle();
        return;
      }
      isCycling = true;
      cycleBtn.textContent = 'Stop Cycle';
      cycleBtn.classList.add('trl-btn-active');

      if (cycleTimer) clearInterval(cycleTimer);

      const state = states[currentState];
      startCountdown(state.duration);

      cycleTimer = setInterval(() => {
        cycleToNext();
      }, state.duration * 1000);
    }

    function stopCycle() {
      isCycling = false;
      cycleBtn.textContent = 'Auto Cycle';
      cycleBtn.classList.remove('trl-btn-active');
      if (cycleTimer) { clearInterval(cycleTimer); cycleTimer = null; }
      if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
      timerEl.textContent = '--';
    }

    function manualState(state) {
      if (isCycling) stopCycle();
      setState(state);
      timerEl.textContent = '--';
    }

    cycleBtn.addEventListener('click', startCycle);
    document.getElementById('trl-btn-red').addEventListener('click', () => manualState('red'));
    document.getElementById('trl-btn-yellow').addEventListener('click', () => manualState('yellow'));
    document.getElementById('trl-btn-green').addEventListener('click', () => manualState('green'));

    setState('red');
  </script>
</body>
</html>
