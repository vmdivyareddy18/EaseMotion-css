<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmos Telemetry - Advanced Stagger Spinner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="space-viewport">
        <!-- Advanced Cosmic Telemetry Tracking Card Dashboard Container -->
        <div class="telemetry-card">
            <header class="telemetry-header">
                <div class="galaxy-badge">Sector 7 Sync</div>
                <h2 class="telemetry-title">Orbit Synchronization</h2>
                <p class="telemetry-subtitle">Calculating planetary trajectory paths for open-source ledger alignment.</p>
            </header>

            <!-- Advanced Pure-CSS Multi-Layer Orbiter Ring Stagger Spinner -->
            <div class="spinner-workspace">
                <div class="stagger-spinner-container">
                    <div class="orbit-ring ring-primary ease-space-spin-1">
                        <div class="planetoid planet-cyan"></div>
                    </div>
                    <div class="orbit-ring ring-secondary ease-space-spin-2">
                        <div class="planetoid planet-magenta"></div>
                    </div>
                    <div class="orbit-ring ring-tertiary ease-space-spin-3">
                        <div class="planetoid planet-gold"></div>
                    </div>
                    <div class="cosmic-core-star"></div>
                </div>
            </div>

            <footer class="telemetry-footer">
                <div class="node-sync-status">
                    <span class="pulse-beacon"></span>
                    <span class="status-text">Streaming Deep Space Matrix Logs...</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
