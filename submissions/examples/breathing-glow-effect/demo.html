<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion CSS - Breathing Glow Effect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
            background: #0d0d14;
            color: #e4e4e7;
        }
        .demo-header { text-align: center; margin-bottom: 3rem; }
        .demo-header h1 { font-size: 2.5rem; background: linear-gradient(135deg, #6c63ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .demo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 2rem; text-align: center; }
        .glow-box { background: #1a1a2e; border-radius: 1rem; padding: 2rem; }
        .glow-box h3 { color: #c4b5fd; margin-top: 0; }
        .note { background: #1a1a2e; padding: 1rem; border-radius: 12px; border-left: 3px solid #6c63ff; margin: 2rem 0; font-size: 0.875rem; text-align: center; }
        code { background: #1e1e2e; padding: 0.2rem 0.4rem; border-radius: 6px; }
    </style>
</head>
<body>

<div class="demo-header">
    <h1>Breathing Glow Effect</h1>
    <p>Pulsing glow that expands and contracts like breathing</p>
</div>

<div class="demo-grid">
    <div class="glow-box">
        <h3>Default</h3>
        <div class="ease-breathing-glow">✨</div>
    </div>

    <div class="glow-box">
        <h3>Fast Breath</h3>
        <div class="ease-breathing-glow ease-breathing-fast">⚡</div>
    </div>

    <div class="glow-box">
        <h3>Slow Breath</h3>
        <div class="ease-breathing-glow ease-breathing-slow">🐢</div>
    </div>

    <div class="glow-box">
        <h3>Blue Glow</h3>
        <div class="ease-breathing-glow ease-breathing-blue">💙</div>
    </div>

    <div class="glow-box">
        <h3>Green Glow</h3>
        <div class="ease-breathing-glow ease-breathing-green">💚</div>
    </div>

    <div class="glow-box">
        <h3>Pink Glow</h3>
        <div class="ease-breathing-glow ease-breathing-pink">💗</div>
    </div>
</div>

<div class="note">
    💡 Add class="ease-breathing-glow" to any element for a pulsing glow effect.
</div>

</body>
</html>
