<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Next/Prev Pagination</title><link rel="stylesheet" href="style.css"></head><body>
<script>const r=document.documentElement;document.addEventListener('input',e=>{const t=e.target;if(t.name==='btn-bg')r.style.setProperty('--btn-bg',t.value);if(t.name==='arrow-color')r.style.setProperty('--arrow-color',t.value);if(t.name==='hover-bg')r.style.setProperty('--hover-bg',t.value);if(t.name==='slide-duration')r.style.setProperty('--slide-duration',t.value+'s')});document.addEventListener('DOMContentLoaded',()=>{const btns=document.querySelectorAll('.page-btn');const page=document.querySelector('.page-label span');btns.forEach(b=>b.addEventListener('click',()=>{page.textContent=b.textContent;btns.forEach(x=>x.classList.remove('active'));b.classList.add('active')}));btns[0].classList.add('active')})</script>
<div class="container"><p class="title">Next/Prev Pagination</p>
<div class="pagination"><button class="nav-btn prev">&larr;</button><button class="page-btn">1</button><button class="page-btn">2</button><button class="page-btn">3</button><button class="page-btn">4</button><span class="dots">...</span><button class="page-btn">12</button><button class="nav-btn next">&rarr;</button></div>
<div class="page-label">Page <span>1</span> of 12</div>
<div class="controls"><label>BG: <input type="color" name="btn-bg" value="#2d2d44"></label><label>Arrow: <input type="color" name="arrow-color" value="#888"></label><label>Hover: <input type="color" name="hover-bg" value="#3a3a5a"></label><label>Speed: <input type="range" name="slide-duration" min="0.1" max="0.6" step="0.05" value="0.25"></label></div></div></body></html>
