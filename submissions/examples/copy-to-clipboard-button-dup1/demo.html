<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy to Clipboard Button Demo</title>
    <link rel="stylesheet" href="style.css">
</head>

<body
    style="display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; background:#f4f4f4; font-family:sans-serif;">

    <button class="copy-btn" onclick="copyToClipboard(this, 'Hello World')">
        <span class="copy-icon">📋</span>
        <span class="check-icon">✅</span>
        <span class="copy-label">Copy</span>
    </button>

    <script>
        function copyToClipboard(btn, text) {
            navigator.clipboard.writeText(text).then(function () {
                btn.classList.add('copied');
                setTimeout(function () {
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
    </script>

</body>

</html>
