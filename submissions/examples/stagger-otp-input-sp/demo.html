<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stagger OTP Input - EaseMotion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main>

    <h1>Verification Code</h1>
    <p>Enter the 6-digit OTP</p>

    <div class="otp-container">

        <input type="text" maxlength="1" aria-label="Digit 1">
        <input type="text" maxlength="1" aria-label="Digit 2">
        <input type="text" maxlength="1" aria-label="Digit 3">
        <input type="text" maxlength="1" aria-label="Digit 4">
        <input type="text" maxlength="1" aria-label="Digit 5">
        <input type="text" maxlength="1" aria-label="Digit 6">

    </div>

</main>

</body>
</html>
