<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blur User Badge Component - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <header class="preview-header">
            <h1>Blur User Badge Component</h1>
            <p>A polished, news-portal-inspired user badge featuring a smooth entry blur and transition effect.</p>
        </header>

        <!-- Component Showcase Grid -->
        <div class="showcase-grid">
            
            <!-- Example 1: Admin Badge Card -->
            <div class="profile-card">
                <div class="avatar-placeholder">SS</div>
                <div class="user-info">
                    <h3>Saptarshi Sadhu</h3>
                    <span class="user-badge badge-admin">Admin</span>
                </div>
            </div>

            <!-- Example 2: Contributor Badge Card -->
            <div class="profile-card">
                <div class="avatar-placeholder alt-avatar">JD</div>
                <div class="user-info">
                    <h3>John Doe</h3>
                    <span class="user-badge badge-contributor">Contributor</span>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
