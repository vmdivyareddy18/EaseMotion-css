<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Horizontal Scroll Animate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="hero">
        <h1>Ease Horizontal Scroll Animate</h1>
        <p>
            Scroll vertically to drive a horizontal animation sequence.
        </p>
    </section>

    <section class="horizontal-wrapper">

        <div class="sticky-container">

            <div class="horizontal-track" id="track">

                <div class="panel">
                    <div class="card">
                        <h2>01</h2>
                        <p>Horizontal scrolling section.</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>02</h2>
                        <p>Cards animate while moving.</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>03</h2>
                        <p>Scroll progress controls motion.</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>04</h2>
                        <p>Modern storytelling interaction.</p>
                    </div>
                </div>

                <div class="panel">
                    <div class="card">
                        <h2>05</h2>
                        <p>Smooth and responsive experience.</p>
                    </div>
                </div>

            </div>

        </div>

    </section>

    <section class="footer">
        <h2>Animation Complete</h2>
    </section>

    <script>
        const wrapper =
            document.querySelector(".horizontal-wrapper");

        const track =
            document.getElementById("track");

        const cards =
            document.querySelectorAll(".card");

        function animateHorizontal() {

            const rect =
                wrapper.getBoundingClientRect();

            const totalScroll =
                wrapper.offsetHeight - window.innerHeight;

            const progress =
                Math.min(
                    Math.max(
                        -rect.top / totalScroll,
                        0
                    ),
                    1
                );

            const maxMove =
                track.scrollWidth - window.innerWidth;

            track.style.transform =
                `translateX(-${progress * maxMove}px)`;

            cards.forEach((card, index) => {

                const cardProgress =
                    progress * cards.length - index;

                const visible =
                    Math.max(
                        0,
                        Math.min(cardProgress, 1)
                    );

                card.style.opacity =
                    0.4 + visible * 0.6;

                card.style.transform =
                    `scale(${0.9 + visible * 0.1})`;
            });
        }

        window.addEventListener(
            "scroll",
            animateHorizontal
        );

        window.addEventListener(
            "resize",
            animateHorizontal
        );

        animateHorizontal();
    </script>

</body>
</html>
