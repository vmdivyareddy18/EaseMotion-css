<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Playground</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>EaseMotion Animation Playground</h1>

  <div class="controls">

```
<label>
  Animation
  <select id="animation" aria-label="Animation Type">
    <option value="bounce">Bounce</option>
    <option value="fade">Fade</option>
    <option value="slide">Slide</option>
  </select>
</label>

<label>
  Duration (s)
  <input
    id="duration"
    type="range"
    min="0.5"
    max="5"
    step="0.5"
    value="2"
    aria-label="Animation Duration"
  >
</label>

<label>
  Delay (s)
  <input
    id="delay"
    type="number"
    min="0"
    max="10"
    step="0.5"
    value="0"
  >
</label>

<label>
  Iterations
  <select id="iterations">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="infinite">Infinite</option>
  </select>
</label>

<label>
  Direction
  <select id="direction">
    <option value="normal">Normal</option>
    <option value="reverse">Reverse</option>
    <option value="alternate">Alternate</option>
    <option value="alternate-reverse">Alternate Reverse</option>
  </select>
</label>

<label>
  Timing Function
  <select id="timing">
    <option value="ease">Ease</option>
    <option value="linear">Linear</option>
    <option value="ease-in">Ease In</option>
    <option value="ease-out">Ease Out</option>
    <option value="ease-in-out">Ease In Out</option>
  </select>
</label>

<label>
  Fill Mode
  <select id="fillmode">
    <option value="none">None</option>
    <option value="forwards">Forwards</option>
    <option value="backwards">Backwards</option>
    <option value="both">Both</option>
  </select>
</label>

<button id="restart">Restart Animation</button>
<button id="copy">Copy Configuration</button>
```

  </div>

  <div
    id="preview"
    class="box bounce"
    tabindex="0"
    aria-label="Animation Preview"
  >
    Preview
  </div>

  <pre id="output"></pre>

  <script>
    const preview = document.getElementById('preview');
    const animation = document.getElementById('animation');
    const duration = document.getElementById('duration');
    const delay = document.getElementById('delay');
    const iterations = document.getElementById('iterations');
    const direction = document.getElementById('direction');
    const timing = document.getElementById('timing');
    const fillmode = document.getElementById('fillmode');
    const output = document.getElementById('output');

    const reducedMotion = window.matchMedia(
      '(prefers-reduced-motion: reduce)'
    ).matches;

    function update() {
      preview.className = `box ${animation.value}`;

      if (!reducedMotion) {
        preview.style.animationDuration = `${duration.value}s`;
        preview.style.animationDelay = `${delay.value}s`;
        preview.style.animationIterationCount = iterations.value;
        preview.style.animationDirection = direction.value;
        preview.style.animationTimingFunction = timing.value;
        preview.style.animationFillMode = fillmode.value;
      }

      output.textContent = `
Animation: ${animation.value}
Duration: ${duration.value}s
Delay: ${delay.value}s
Iterations: ${iterations.value}
Direction: ${direction.value}
Timing Function: ${timing.value}
Fill Mode: ${fillmode.value}
`;
    }

    [
      animation,
      duration,
      delay,
      iterations,
      direction,
      timing,
      fillmode
    ].forEach((el) => {
      el.addEventListener('input', update);
    });

    document.getElementById('restart').onclick = () => {
      preview.classList.remove(animation.value);
      void preview.offsetWidth;
      preview.classList.add(animation.value);
    };

    document.getElementById('copy').onclick = async () => {
      await navigator.clipboard.writeText(
        output.textContent
      );
    };

    update();
  </script>

</body>
</html>
