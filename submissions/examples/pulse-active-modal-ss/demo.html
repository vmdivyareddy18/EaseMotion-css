<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Neumorphic Pulse Modal [SS]</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="neumorphic-body-ss">
    <main class="app-container-ss">
        <header class="header-ss">
            <h1 class="title-ss">Security Dashboard</h1>
            <p class="subtitle-ss">Pure CSS interaction engine utilizing EaseMotion principles.</p>
        </header>

        <input type="checkbox" id="toggle-modal-ss" class="modal-trigger-ss" aria-label="Toggle Modal" />

        <label for="toggle-modal-ss" class="btn-neumorphic-ss pulse-active-ss" tabindex="0" role="button">
            Launch System Scan
        </label>

        <div class="modal-overlay-ss">
            <div class="modal-window-ss">
                <div class="modal-content-ss">
                    <h2 class="modal-title-ss">System Scan Authorized</h2>
                    <p class="modal-text-ss">
                        The diagnostic protocols have been initiated. All interface modules and soft-layout parameters
                        are currently functioning within optimal thresholds.
                    </p>
                    <label for="toggle-modal-ss" class="btn-neumorphic-ss btn-close-ss" tabindex="0" role="button">
                        Acknowledge
                    </label>
                </div>
            </div>
        </div>
    </main>
</body>

</html>
