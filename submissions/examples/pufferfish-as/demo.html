<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pufferfish</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="bubp bp1"></span>
    <span class="bubp bp2"></span>
    <div class="puffer" tabindex="0">
      <div class="spikes">
        <span class="spike sp1"></span>
        <span class="spike sp2"></span>
        <span class="spike sp3"></span>
        <span class="spike sp4"></span>
        <span class="spike sp5"></span>
        <span class="spike sp6"></span>
        <span class="spike sp7"></span>
        <span class="spike sp8"></span>
        <span class="spike sp9"></span>
        <span class="spike sp10"></span>
        <span class="spike sp11"></span>
        <span class="spike sp12"></span>
        <span class="spike sp13"></span>
        <span class="spike sp14"></span>
        <span class="spike sp15"></span>
        <span class="spike sp16"></span>
      </div>
      <span class="finp fl"></span>
      <span class="finp fr"></span>
      <span class="tailp"></span>
      <div class="bodyp">
        <span class="bellyp"></span>
        <span class="eyep ep1"></span>
        <span class="eyep ep2"></span>
        <span class="mouthp"></span>
      </div>
    </div>
    <p class="hint">hover to puff up</p>
  </div>
</body>
</html>
