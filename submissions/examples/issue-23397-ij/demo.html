<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saxophone Play Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sax">
    <div class="sax-neck"></div>
    <div class="sax-body">
      <div class="sax-keys">
        <div class="sax-key" style="--i:0"></div>
        <div class="sax-key" style="--i:1"></div>
        <div class="sax-key" style="--i:2"></div>
        <div class="sax-key" style="--i:3"></div>
      </div>
    </div>
    <div class="sax-bell"></div>
  </div>
</body>
</html>
