<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Battery Indicator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Full -->
  <div class="demo-row">
    <span class="battery-label">Full — 100%</span>
    <div class="battery battery-full">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- High -->
  <div class="demo-row">
    <span class="battery-label">High — 75%</span>
    <div class="battery battery-high">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- Medium -->
  <div class="demo-row">
    <span class="battery-label">Medium — 50%</span>
    <div class="battery battery-medium">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- Low -->
  <div class="demo-row">
    <span class="battery-label">Low — 25% (pulsing)</span>
    <div class="battery battery-low">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- Critical -->
  <div class="demo-row">
    <span class="battery-label">Critical — 10% (fast pulse)</span>
    <div class="battery battery-critical">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- Charging -->
  <div class="demo-row">
    <span class="battery-label">Charging ⚡</span>
    <div class="battery battery-charging">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <!-- Size variants -->
  <div class="demo-row">
    <span class="battery-label">Small Size</span>
    <div class="battery battery-full battery-sm">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

  <div class="demo-row">
    <span class="battery-label">Large Size</span>
    <div class="battery battery-full battery-lg">
      <div class="battery-body">
        <div class="battery-fill"></div>
      </div>
    </div>
  </div>

</body>
</html>
