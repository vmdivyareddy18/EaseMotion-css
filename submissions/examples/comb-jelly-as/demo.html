<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comb Jelly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="jellyC">
      <span class="bellC"></span>
      <span class="glowC"></span>
      <span class="combC cc1"></span>
      <span class="combC cc2"></span>
      <span class="combC cc3"></span>
      <span class="combC cc4"></span>
      <span class="combC cc5"></span>
      <span class="combC cc6"></span>
      <span class="tentC tcl"></span>
      <span class="tentC tcr"></span>
      <span class="rimC"></span>
    </div>
    <div class="jellyC jcFar">
      <span class="bellC"></span>
      <span class="glowC"></span>
      <span class="combC cc1"></span>
      <span class="combC cc2"></span>
      <span class="combC cc3"></span>
      <span class="combC cc4"></span>
      <span class="combC cc5"></span>
      <span class="combC cc6"></span>
      <span class="tentC tcl"></span>
      <span class="tentC tcr"></span>
      <span class="rimC"></span>
    </div>
    <span class="moteC mc1"></span>
    <span class="moteC mc2"></span>
    <span class="moteC mc3"></span>
  </div>
</body>
</html>
