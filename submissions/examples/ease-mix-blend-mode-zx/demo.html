<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mix Blend Mode Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .note {
        background: #f1f5f9;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        background: repeating-linear-gradient(
          45deg,
          #e2e8f0,
          #e2e8f0 10px,
          #f1f5f9 10px,
          #f1f5f9 20px
        );
        padding: 1rem;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Mix Blend Mode</h1>
    <p class="note">
      Controls how an element's content blends with its parent background.
    </p>

    <div class="label">blend-normal</div>
    <div class="row"><div class="demo-box blend-normal">Normal</div></div>

    <div class="label">blend-multiply</div>
    <div class="row"><div class="demo-box blend-multiply">Multiply</div></div>

    <div class="label">blend-screen</div>
    <div class="row"><div class="demo-box blend-screen">Screen</div></div>

    <div class="label">blend-overlay</div>
    <div class="row"><div class="demo-box blend-overlay">Overlay</div></div>

    <div class="label">blend-color-dodge</div>
    <div class="row"><div class="demo-box blend-color-dodge">Dodge</div></div>

    <div class="label">blend-difference</div>
    <div class="row"><div class="demo-box blend-difference">Diff</div></div>
  </body>
</html>
