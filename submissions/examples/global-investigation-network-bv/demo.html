<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autonomous Global Investigation Network</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="os-dashboard">
    <header class="header">
      <span class="badge">Investigator Core</span>
      <h1>Autonomous Global Investigation Network</h1>
      <p class="subtitle">Investigate dynamic threats, manage sweep tasks, and monitor agents.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card agent-mon">
        <h3>🤖 Active Investigations</h3>
        <div class="agent-list">
          <div class="agent-item active">
            <h5>Investigator-A8</h5>
            <p>Task: Memory forensics scanning host cluster US-West.</p>
            <div class="prog-bar"><div class="fill" style="width: 65%"></div></div>
          </div>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card console-card">
          <h3>🖥️ Active logs</h3>
          <div class="console-box">
            <code>[SYSTEM] Core active.</code>
            <code>[AGENT] Scanning memory heap.</code>
          </div>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
