<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Meter Transition</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="demo-shell">
    <header class="demo-header">
      <p class="eyebrow">EaseMotion CSS example</p>
      <h1>Password Strength Meter Transition</h1>
      <p>Shows weak, medium, and strong password states with stable meters and text labels.</p>
    </header>
    <section class="strength-grid" aria-label="Password strength examples">
      <article class="password-strength weak"><strong>Weak</strong><span class="strength-bar"></span><small>Use more characters.</small></article>
      <article class="password-strength medium"><strong>Medium</strong><span class="strength-bar"></span><small>Add a symbol or number.</small></article>
      <article class="password-strength strong"><strong>Strong</strong><span class="strength-bar"></span><small>Good password strength.</small></article>
    </section>
  </main>
</body>
</html>
