<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion Toast Notification</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="controls">
    <button onclick="showToast('success')">Success</button>
    <button onclick="showToast('error')">Error</button>
    <button onclick="showToast('warning')">Warning</button>
    <button onclick="showToast('info')">Info</button>
</div>

<div class="ease-toast-container top-right"></div>

<script>

const container=document.querySelector(".ease-toast-container");

function showToast(type){

    const toast=document.createElement("div");

    toast.className=`ease-toast ${type}`;

    toast.dataset.easeDuration="4000";

    const icons={
        success:"✔",
        error:"✖",
        warning:"⚠",
        info:"ℹ"
    };

    toast.innerHTML=`
        <span class="icon">${icons[type]}</span>
        <div class="content">
            <strong>${type.toUpperCase()}</strong>
            <p>This is a ${type} notification.</p>
        </div>
        <button class="close">&times;</button>
    `;

    container.appendChild(toast);

    toast.querySelector(".close").onclick=()=>removeToast(toast);

    const duration=parseInt(toast.dataset.easeDuration);

    setTimeout(()=>{
        removeToast(toast);
    },duration);

}

function removeToast(toast){

    if(!toast)return;

    toast.classList.add("hide");

    toast.addEventListener("animationend",()=>{
        toast.remove();
    });

}

</script>

</body>
</html>
