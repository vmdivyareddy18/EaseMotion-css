<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Error Summary Panel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <div class="form-card">

      <div class="error-summary">

        <div class="error-header">

          <div class="error-icon">
            !
          </div>

          <div>
            <h2>Please fix the following errors</h2>

            <p>
              We found some issues with your submission.
            </p>
          </div>

        </div>

        <ul class="error-list">
          <li>Full Name is required.</li>
          <li>Email address must be valid.</li>
          <li>Password must contain at least 8 characters.</li>
        </ul>

      </div>

      <h1>Create Account</h1>

      <form>

        <div class="field">

          <label for="name">
            Full Name
          </label>

          <input
            id="name"
            type="text"
            placeholder="Enter your full name"
            class="error-input"
          >

        </div>

        <div class="field">

          <label for="email">
            Email Address
          </label>

          <input
            id="email"
            type="email"
            placeholder="Enter your email"
            class="error-input"
          >

        </div>

        <div class="field">

          <label for="password">
            Password
          </label>

          <input
            id="password"
            type="password"
            placeholder="Enter password"
            class="error-input"
          >

        </div>

        <button type="submit">
          Submit Form
        </button>

      </form>

    </div>

  </div>

</body>
</html>
