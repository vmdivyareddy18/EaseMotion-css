<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parallax Range Slider — Dark Mode</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper ease-fade-in">
    <h1 class="demo-title">Parallax Range Slider</h1>
    <p class="demo-sub">Pure CSS range sliders with parallax depth and dark mode aesthetics.</p>

    <div class="slider-card">
      <label class="slider-label">Volume</label>
      <div class="slider-wrap">
        <div class="parallax-track">
          <div class="parallax-layer layer-1"></div>
          <div class="parallax-layer layer-2"></div>
          <div class="parallax-layer layer-3"></div>
        </div>
        <input type="range" class="ease-range" min="0" max="100" value="60" aria-label="Volume">
      </div>
      <div class="slider-meta"><span>0</span><span class="slider-val">60</span><span>100</span></div>
    </div>

    <div class="slider-card">
      <label class="slider-label">Brightness</label>
      <div class="slider-wrap">
        <div class="parallax-track">
          <div class="parallax-layer layer-1 green"></div>
          <div class="parallax-layer layer-2 green"></div>
          <div class="parallax-layer layer-3 green"></div>
        </div>
        <input type="range" class="ease-range green" min="0" max="100" value="40" aria-label="Brightness">
      </div>
      <div class="slider-meta"><span>0</span><span class="slider-val">40</span><span>100</span></div>
    </div>

    <div class="slider-card">
      <label class="slider-label">Depth Effect</label>
      <div class="slider-wrap">
        <div class="parallax-track">
          <div class="parallax-layer layer-1 purple"></div>
          <div class="parallax-layer layer-2 purple"></div>
          <div class="parallax-layer layer-3 purple"></div>
        </div>
        <input type="range" class="ease-range purple" min="0" max="100" value="75" aria-label="Depth Effect">
      </div>
      <div class="slider-meta"><span>0</span><span class="slider-val">75</span><span>100</span></div>
    </div>

  </div>

</body>
</html>
