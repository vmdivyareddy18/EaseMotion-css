<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Fade Grid</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Staggered Grid</h1>
    <div class="stagger-grid">
      <div class="grid-item" style="--i:1">01</div>
      <div class="grid-item" style="--i:2">02</div>
      <div class="grid-item" style="--i:3">03</div>
      <div class="grid-item" style="--i:4">04</div>
      <div class="grid-item" style="--i:5">05</div>
      <div class="grid-item" style="--i:6">06</div>
      <div class="grid-item" style="--i:7">07</div>
      <div class="grid-item" style="--i:8">08</div>
      <div class="grid-item" style="--i:9">09</div>
    </div>
  </main>
</body>
</html>
