<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Directional Bounce Animations — Demo</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/SAPTARSHI-coder/EaseMotion-css@main/easemotion.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2rem;
    }
    h1 { font-weight: 600; margin: 0; }
    p.sub { color: #94a3b8; margin: 0 0 1rem; }
    .grid {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 800px;
    }
    .card {
      width: 150px;
      height: 150px;
      background: linear-gradient(135deg, #f59e0b, #ef4444);
      border-radius: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      box-shadow: 0 8px 32px rgba(239, 68, 68, 0.3);
    }
    .card:nth-child(2) { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3); }
    .card:nth-child(3) { background: linear-gradient(135deg, #3b82f6, #6366f1); box-shadow: 0 8px 32px rgba(59, 130, 246, 0.3); }
    .card:nth-child(4) { background: linear-gradient(135deg, #a855f7, #d946ef); box-shadow: 0 8px 32px rgba(168, 85, 247, 0.3); }
    .card:nth-child(5) { background: linear-gradient(135deg, #ec4899, #f43f5e); box-shadow: 0 8px 32px rgba(236, 72, 153, 0.3); }
    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    button {
      padding: 0.5rem 1.25rem;
      border: none;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #818cf8; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-secondary:hover { background: #475569; }
    .speed-group { display: flex; align-items: center; gap: 0.5rem; }
    .speed-group select {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Directional Bounce Animations</h1>
  <p class="sub">ease-bounce-up · ease-bounce-down · ease-bounce-left · ease-bounce-right · ease-bounce-out</p>

  <div class="grid">
    <div class="card ease-bounce-up" id="c1">bounce-up</div>
    <div class="card ease-bounce-down" id="c2">bounce-down</div>
    <div class="card ease-bounce-left" id="c3">bounce-left</div>
    <div class="card ease-bounce-right" id="c4">bounce-right</div>
    <div class="card ease-bounce-out" id="c5">bounce-out</div>
  </div>

  <div class="controls">
    <button class="btn-primary" onclick="replayAll()">Replay All</button>
    <div class="speed-group">
      <label for="speed">Speed:</label>
      <select id="speed" onchange="changeSpeed(this.value)">
        <option value="ease-fast">Fast</option>
        <option value="" selected>Medium</option>
        <option value="ease-slow">Slow</option>
      </select>
    </div>
  </div>

  <script>
    const cards = [c1, c2, c3, c4, c5];

    function changeSpeed(speed) {
      cards.forEach(c => {
        c.classList.remove('ease-fast', 'ease-slow');
        if (speed) c.classList.add(speed);
      });
      replayAll();
    }

    function replayAll() {
      cards.forEach(c => {
        c.style.animation = 'none';
        void c.offsetWidth;
        c.style.animation = '';
      });
    }
  </script>
</body>
</html>
