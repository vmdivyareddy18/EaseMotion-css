<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Email Signature Builder</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="signature-container">
        <header class="section-header">
            <h1>Professional <span class="gradient-text">Email Signatures</span></h1>
            <p>Create stunning, uniform email signatures for your entire team in minutes.</p>
        </header>

        <div class="builder-split">
            <!-- Customizer Form controls styling via checkbox hacks -->
            <div class="control-panel">
                <h3>Choose Design Theme</h3>
                
                <input type="radio" id="theme-modern" name="sig-theme" checked hidden>
                <input type="radio" id="theme-classic" name="sig-theme" hidden>
                <input type="radio" id="theme-creative" name="sig-theme" hidden>

                <div class="theme-selectors">
                    <label for="theme-modern" class="selector-btn modern-btn">Modern Theme</label>
                    <label for="theme-classic" class="selector-btn classic-btn">Classic Theme</label>
                    <label for="theme-creative" class="selector-btn creative-btn">Creative Theme</label>
                </div>

                <div class="mock-fields">
                    <div class="field">
                        <label>Name</label>
                        <input type="text" value="Charlotte Miller" disabled>
                    </div>
                    <div class="field">
                        <label>Position</label>
                        <input type="text" value="Lead UI/UX Designer" disabled>
                    </div>
                </div>
            </div>

            <!-- Signature Card Output -->
            <div class="signature-preview-area">
                <div class="signature-card">
                    <img src="https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=120&auto=format&fit=crop" alt="Charlotte" class="sig-avatar">
                    <div class="sig-details">
                        <h4 class="sig-name">Charlotte Miller</h4>
                        <p class="sig-title">Lead UI/UX Designer</p>
                        <hr class="sig-divider">
                        <p class="sig-company">⚡ InnovateLabs Inc.</p>
                        <p class="sig-contact">charlotte@innovatelabs.io | +1 (555) 019-2834</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
