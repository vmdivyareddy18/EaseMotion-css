<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="./style.css">
  <title>Animation Search</title>
  


</head>
<body>

  <div style="max-width:400px;">
    <label for="animSearch"><strong>Search</strong></label>

    <input
      type="text"
      id="animSearch"
      placeholder="Search animations..."
      class="ease-input"
    >
  </div>

  <div id="animationList">
    <div class="animation-item">fadeIn</div>
    <div class="animation-item">fadeOut</div>
    <div class="animation-item">slideUp</div>
    <div class="animation-item">slideDown</div>
    <div class="animation-item">bounce</div>
    <div class="animation-item">zoomIn</div>
    <div class="animation-item">zoomOut</div>
    <div class="animation-item">rotate</div>
  </div>

  <script>
    const searchInput = document.getElementById("animSearch");
    const animationItems = document.querySelectorAll(".animation-item");

    searchInput.addEventListener("input", function () {
      const query = this.value.trim().toLowerCase();

      animationItems.forEach(function (item) {
        const animationName = item.textContent.toLowerCase();

        if (animationName.includes(query)) {
          item.classList.remove("hidden");
        } else {
          item.classList.add("hidden");
        }
      });
    });

    // Remove leading/trailing spaces when the input loses focus
    searchInput.addEventListener("blur", function () {
      this.value = this.value.trim();
    });
  </script>

</body>
</html>
