<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hover/Focus Glow Status Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      flex-wrap: wrap;
      padding: 2rem;
    }

    input, button {
      padding: 0.8rem 1.2rem;
      font-size: 1rem;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    button {
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <button class="glow-status">Default</button>
  <button class="glow-status glow-success">Success</button>
  <button class="glow-status glow-error">Error</button>
  <input class="glow-status glow-warning" placeholder="Focus me (warning)" />

</body>
</html>
