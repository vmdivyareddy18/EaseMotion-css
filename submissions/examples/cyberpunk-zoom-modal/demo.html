<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Cyberpunk Neon Modal</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Cyberpunk Neon Modal</h1>

        <p>Pure CSS Zoom-In Modal</p>

        <input type="checkbox" id="modal-toggle">

        <label for="modal-toggle" class="open-btn">
            Open Modal
        </label>

        <div class="overlay">

            <div class="modal">

                <label for="modal-toggle" class="close-btn">
                    ✕
                </label>

                <h2>Welcome</h2>

                <p>
                    This modal is built using only HTML and CSS.
                    No JavaScript required.
                </p>

                <a href="#" class="action-btn">
                    Explore
                </a>

            </div>

        </div>

    </div>

</body>

</html>
