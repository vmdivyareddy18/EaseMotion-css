<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comet Trail Sweep Demo</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1>Comet Trail Sweep Animation</h1>

        <div class="card">
            <button class="copy-btn" onclick="copyClass(this)">Copy</button>

            <div class="preview-wrapper">
                <div id="preview-box" class="preview-box" onclick="triggerAnimation()">
                    Preview
                    <span class="comet"></span>
                </div>
            </div>

            <p class="class-name">ease-comet-sweep</p>
        </div>
    </div>

    <script>
        function triggerAnimation() {
            const box = document.getElementById("preview-box");
            box.classList.remove("animate");
            void box.offsetWidth;
            box.classList.add("animate");
        }

        function copyClass(button) {
            navigator.clipboard.writeText("ease-comet-sweep");
            button.textContent = "Copied!";
            setTimeout(() => {
                button.textContent = "Copy";
            }, 2000);
        }
    </script>
</body>

</html>
