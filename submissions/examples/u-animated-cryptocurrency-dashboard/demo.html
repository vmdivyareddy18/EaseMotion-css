<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Animated Cryptocurrency Dashboard
</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<header class="header">

<div>

<h1>Cryptocurrency Dashboard</h1>

<p>Monitor portfolio and market performance.</p>

</div>

<button class="action-btn">

+ Buy Asset

</button>

</header>

<section class="overview-grid">

<div class="card">

<span class="icon">💎</span>

<h3>Portfolio Value</h3>

<h2>$248K</h2>

<div class="progress-bar">

<div class="progress portfolio"></div>

</div>

</div>

<div class="card">

<span class="icon">🪙</span>

<h3>Total Assets</h3>

<h2>18</h2>

<div class="progress-bar">

<div class="progress assets"></div>

</div>

</div>

<div class="card">

<span class="icon">📈</span>

<h3>Profit</h3>

<h2>+28%</h2>

<div class="progress-bar">

<div class="progress profit"></div>

</div>

</div>

<div class="card">

<span class="icon">🔄</span>

<h3>Transactions</h3>

<h2>562</h2>

<div class="progress-bar">

<div class="progress transactions"></div>

</div>

</div>

</section>

<section class="card activity">

<h2>Recent Activity</h2>

<div class="activity-item">

<h4>Buy Order</h4>

<p>Purchased 0.45 BTC.</p>

</div>

<div class="activity-item">

<h4>Sell Order</h4>

<p>Sold 12 ETH.</p>

</div>

<div class="activity-item">

<h4>Deposit Received</h4>

<p>$5,000 USDT added.</p>

</div>

</section>

</div>

</body>

</html>
