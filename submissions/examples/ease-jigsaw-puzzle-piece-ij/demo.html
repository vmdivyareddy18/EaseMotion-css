<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jigsaw Puzzle Piece | EaseMotion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="component-wrapper">
    <div class="puzzle-card">
      <h2 class="puzzle-card__title">Snap Together</h2>
      <p class="puzzle-card__subtitle">Drag pieces to complete the puzzle</p>

      <div class="puzzle-board" id="puzzleBoard">
        <div class="puzzle-slot" data-index="0">
          <div class="puzzle-piece" draggable="true" data-index="0" style="--i: 0">
            <div class="puzzle-piece__shape"></div>
            <span class="puzzle-piece__label">A</span>
          </div>
        </div>
        <div class="puzzle-slot" data-index="1">
          <div class="puzzle-piece" draggable="true" data-index="1" style="--i: 1">
            <div class="puzzle-piece__shape"></div>
            <span class="puzzle-piece__label">B</span>
          </div>
        </div>
        <div class="puzzle-slot" data-index="2">
          <div class="puzzle-piece" draggable="true" data-index="2" style="--i: 2">
            <div class="puzzle-piece__shape"></div>
            <span class="puzzle-piece__label">C</span>
          </div>
        </div>
        <div class="puzzle-slot" data-index="3">
          <div class="puzzle-piece" draggable="true" data-index="3" style="--i: 3">
            <div class="puzzle-piece__shape"></div>
            <span class="puzzle-piece__label">D</span>
          </div>
        </div>
      </div>

      <div class="puzzle-card__status" id="puzzleStatus">Arrange pieces in order A–D</div>
      <button class="puzzle-card__reset" id="puzzleReset">Shuffle</button>
    </div>
  </div>
  <script>
    const board = document.getElementById('puzzleBoard');
    const status = document.getElementById('puzzleStatus');
    const resetBtn = document.getElementById('puzzleReset');
    let draggedIndex = null;

    function shufflePieces() {
      const pieces = [...board.querySelectorAll('.puzzle-piece')];
      const indexes = pieces.map(p => p.dataset.index);
      for (let i = indexes.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indexes[i], indexes[j]] = [indexes[j], indexes[i]];
      }
      const slots = board.querySelectorAll('.puzzle-slot');
      slots.forEach((slot, i) => {
        const existingPiece = slot.querySelector('.puzzle-piece');
        if (existingPiece) existingPiece.remove();
      });
      indexes.forEach((idx, i) => {
        const original = pieces.find(p => p.dataset.index === idx);
        const clone = original.cloneNode(true);
        clone.draggable = true;
        clone.classList.remove('puzzle-piece--snapped', 'puzzle-piece--placed');
        slots[i].appendChild(clone);
      });
      attachDragEvents();
      status.textContent = 'Arrange pieces in order A\u2013D';
      status.className = 'puzzle-card__status';
    }

    function attachDragEvents() {
      document.querySelectorAll('.puzzle-piece').forEach(p => {
        p.addEventListener('dragstart', e => {
          draggedIndex = p.dataset.index;
          p.classList.add('puzzle-piece--dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        p.addEventListener('dragend', e => {
          p.classList.remove('puzzle-piece--dragging');
        });
      });
      document.querySelectorAll('.puzzle-slot').forEach(slot => {
        slot.addEventListener('dragover', e => e.preventDefault());
        slot.addEventListener('drop', e => {
          e.preventDefault();
          const targetSlot = e.currentTarget;
          const targetPiece = targetSlot.querySelector('.puzzle-piece');
          if (targetPiece && targetPiece.dataset.index === draggedIndex) return;
          const sourceSlot = [...board.querySelectorAll('.puzzle-slot')].find(s =>
            s.querySelector('.puzzle-piece')?.dataset.index === draggedIndex
          );
          if (!sourceSlot) return;
          const sourcePiece = sourceSlot.querySelector('.puzzle-piece');
          const targetClone = targetPiece ? targetPiece.cloneNode(true) : null;
          const sourceClone = sourcePiece.cloneNode(true);
          sourceClone.draggable = true;
          sourceClone.classList.remove('puzzle-piece--dragging', 'puzzle-piece--snapped');
          if (targetClone) {
            targetClone.draggable = true;
            targetClone.classList.remove('puzzle-piece--dragging', 'puzzle-piece--snapped');
            sourceSlot.innerHTML = '';
            sourceSlot.appendChild(targetClone);
          } else {
            sourceSlot.innerHTML = '';
          }
          targetSlot.innerHTML = '';
          targetSlot.appendChild(sourceClone);
          sourceClone.classList.add('puzzle-piece--snapped');
          attachDragEvents();
          checkWin();
        });
      });
    }

    function checkWin() {
      const slots = board.querySelectorAll('.puzzle-slot');
      let correct = 0;
      slots.forEach((slot, i) => {
        const piece = slot.querySelector('.puzzle-piece');
        if (piece && parseInt(piece.dataset.index) === i) {
          piece.classList.add('puzzle-piece--placed');
          correct++;
        } else if (piece) {
          piece.classList.remove('puzzle-piece--placed');
        }
      });
      if (correct === slots.length) {
        status.textContent = '\u2705 All pieces snapped!';
        status.className = 'puzzle-card__status puzzle-card__status--win';
      } else {
        status.textContent = `\u{1F9E9} ${correct}/${slots.length} pieces in place`;
        status.className = 'puzzle-card__status';
      }
    }

    resetBtn.addEventListener('click', shufflePieces);
    shufflePieces();
  </script>
</body>
</html>
