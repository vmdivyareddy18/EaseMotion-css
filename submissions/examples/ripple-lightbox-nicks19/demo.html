<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Lightbox - Dark Mode</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0f172a; /* Dark Slate Background */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: #f8fafc;
    }

    h1 {
      margin-bottom: 40px;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    /* Thumbnail Gallery */
    .demo-gallery {
      display: flex;
      gap: 20px;
    }

    .ease-thumbnail {
      width: 250px;
      height: 160px;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      position: relative;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .ease-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, filter 0.4s ease;
      filter: brightness(0.8);
    }

    .ease-thumbnail:hover img {
      transform: scale(1.05);
      filter: brightness(1.1);
    }

  </style>
</head>
<body>

  <h1>Dark Mode Gallery</h1>

  <div class="demo-gallery">
    <!-- Image 1 -->
    <label for="lightbox-toggle-1" class="ease-thumbnail">
      <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=600&q=80" alt="Dark Architecture">
    </label>

    <!-- Image 2 -->
    <label for="lightbox-toggle-2" class="ease-thumbnail">
      <img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=600&q=80" alt="Space Observatory">
    </label>
  </div>

  <!-- Lightbox 1 Setup -->
  <input type="checkbox" id="lightbox-toggle-1" class="ease-lightbox-toggle">
  
  <div class="ease-ripple-lightbox">
    <label for="lightbox-toggle-1" class="ease-lightbox-overlay"></label>
    
    <div class="ease-lightbox-content">
      <label for="lightbox-toggle-1" class="ease-lightbox-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </label>
      
      <div class="ease-lightbox-image-container">
        <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?auto=format&fit=crop&w=1200&q=80" alt="Dark Architecture Full">
        <div class="ease-lightbox-caption">Minimalist Midnight Architecture</div>
      </div>
    </div>
  </div>

  <!-- Lightbox 2 Setup -->
  <input type="checkbox" id="lightbox-toggle-2" class="ease-lightbox-toggle">
  
  <div class="ease-ripple-lightbox">
    <label for="lightbox-toggle-2" class="ease-lightbox-overlay"></label>
    
    <div class="ease-lightbox-content">
      <label for="lightbox-toggle-2" class="ease-lightbox-close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </label>
      
      <div class="ease-lightbox-image-container">
        <img src="https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?auto=format&fit=crop&w=1200&q=80" alt="Space Observatory Full">
        <div class="ease-lightbox-caption">Deep Space Observations</div>
      </div>
    </div>
  </div>

</body>
</html>
