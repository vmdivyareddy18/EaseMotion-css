<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS icon-prefix-input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo">
    <h1>Icon Prefix Input</h1>
    <div class="ipi-form">
      <div class="ipi-group">
        <span class="ipi-icon">@</span>
        <input type="text" class="ipi-input" placeholder="username">
      </div>
      <div class="ipi-group">
        <span class="ipi-icon">🔍</span>
        <input type="text" class="ipi-input" placeholder="Search..." value="animations">
      </div>
      <div class="ipi-group">
        <span class="ipi-icon">🔒</span>
        <input type="password" class="ipi-input" placeholder="Password">
      </div>
    </div>
  </div>
</body>
</html>
