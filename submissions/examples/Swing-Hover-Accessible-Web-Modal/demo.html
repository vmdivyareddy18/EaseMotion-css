<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessible Web Swing Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Open Accessibility Panel
</label>

<div class="overlay">

    <div class="modal" role="dialog" aria-labelledby="modal-title">

        <label for="modal-toggle" class="close-btn" aria-label="Close Modal">&times;</label>

        <div class="icon">♿</div>

        <h2 id="modal-title">Accessible Experience</h2>

        <p>
            This modal demonstrates an accessible, responsive interface with
            high contrast, keyboard-friendly controls, and a smooth Swing-Hover
            animation.
        </p>

        <ul class="features">
            <li>High Contrast</li>
            <li>Keyboard Friendly</li>
            <li>Responsive Layout</li>
        </ul>

        <button>Continue</button>

    </div>

</div>

</body>
</html>
