<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-spiral-gauge</title>
  <meta name="description" content="Animated spiral gauge for analytics dashboards with smooth rotation animation.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-spiral-gauge</h1>
      <p class="subtitle" id="main-desc">Spiral gauge for analytics dashboards</p>
    </header>

    <div class="display-area">
      
      <div class="gauge-grid">
        <!-- Default Spiral Gauge -->
        <div class="gauge-item">
          <div class="ease-spiral-gauge">
            <div class="gauge-track"></div>
            <div class="gauge-fill"></div>
            <div class="gauge-value">75%</div>
          </div>
          <span class="gauge-label">Default</span>
        </div>

        <!-- Primary Color -->
        <div class="gauge-item">
          <div class="ease-spiral-gauge ease-spiral-primary">
            <div class="gauge-track"></div>
            <div class="gauge-fill"></div>
            <div class="gauge-value">60%</div>
          </div>
          <span class="gauge-label">Primary</span>
        </div>

        <!-- Success Color -->
        <div class="gauge-item">
          <div class="ease-spiral-gauge ease-spiral-success">
            <div class="gauge-track"></div>
            <div class="gauge-fill"></div>
            <div class="gauge-value">85%</div>
          </div>
          <span class="gauge-label">Success</span>
        </div>

        <!-- Warning Color -->
        <div class="gauge-item">
          <div class="ease-spiral-gauge ease-spiral-warning">
            <div class="gauge-track"></div>
            <div class="gauge-fill"></div>
            <div class="gauge-value">45%</div>
          </div>
          <span class="gauge-label">Warning</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Dashboard Example</h3>
      <div class="dashboard-preview">
        <div class="ease-spiral-gauge ease-spiral-lg ease-spiral-primary">
          <div class="gauge-track"></div>
          <div class="gauge-fill"></div>
          <div class="gauge-value">92%</div>
        </div>
        <p class="dashboard-label">Analytics Score</p>
      </div>
    </section>

  </main>

</body>
</html>
