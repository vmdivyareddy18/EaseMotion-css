<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ease Backflip Out Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f8fafc;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        color: #1e293b;
      }
      .container {
        text-align: center;
        background: white;
        padding: 3rem;
        border-radius: 20px;
        box-shadow:
          0 20px 25px -5px rgb(0 0 0 / 0.1),
          0 8px 10px -6px rgb(0 0 0 / 0.1);
      }
      h1 {
        margin-bottom: 2rem;
        font-size: 1.5rem;
        font-weight: 600;
      }
      .stage {
        height: 250px;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 2rem;
      }
      .box {
        width: 150px;
        height: 150px;
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 16px;
        font-size: 1.25rem;
        font-weight: 500;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
      }
      .controls {
        display: flex;
        gap: 1rem;
        justify-content: center;
      }
      button {
        padding: 0.75rem 1.5rem;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border-radius: 8px;
        transition: all 0.2s;
        border: none;
      }
      .btn-primary {
        background-color: #6366f1;
        color: white;
      }
      .btn-primary:hover {
        background-color: #4f46e5;
        transform: translateY(-1px);
      }
      .btn-secondary {
        background-color: #e2e8f0;
        color: #475569;
      }
      .btn-secondary:hover {
        background-color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Ease Backflip Out</h1>
      <div class="stage">
        <div id="target" class="box">Backflip!</div>
      </div>
      <div class="controls">
        <button class="btn-primary" onclick="applyAnimation()">
          Animate Out
        </button>
        <button class="btn-secondary" onclick="reset()">Reset</button>
      </div>
    </div>

    <script>
      function applyAnimation() {
        const target = document.getElementById("target");
        target.classList.remove("backflip-out");
        void target.offsetWidth; // Trigger reflow
        target.classList.add("backflip-out");
      }
      function reset() {
        const target = document.getElementById("target");
        target.classList.remove("backflip-out");
      }
    </script>
  </body>
</html>
