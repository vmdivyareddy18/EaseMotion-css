<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart Fill - Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="pcf-container">
        <h1 class="pcf-title">Pie Chart Fill</h1>
        <p class="pcf-subtitle">Animated SVG segments with staggered fill</p>

        <div class="pcf-chart-wrapper">
            <svg class="pcf-svg" viewBox="0 0 100 100">
                <circle class="pcf-bg-ring" cx="50" cy="50" r="40" />
                <circle class="pcf-segment" data-segment="0" cx="50" cy="50" r="40"
                    pathLength="100" stroke-dasharray="25 100" stroke-dashoffset="0"
                    stroke="var(--pcf-segment-1)" />
                <circle class="pcf-segment" data-segment="1" cx="50" cy="50" r="40"
                    pathLength="100" stroke-dasharray="30 100" stroke-dashoffset="-25"
                    stroke="var(--pcf-segment-2)" />
                <circle class="pcf-segment" data-segment="2" cx="50" cy="50" r="40"
                    pathLength="100" stroke-dasharray="20 100" stroke-dashoffset="-55"
                    stroke="var(--pcf-segment-3)" />
                <circle class="pcf-segment" data-segment="3" cx="50" cy="50" r="40"
                    pathLength="100" stroke-dasharray="25 100" stroke-dashoffset="-75"
                    stroke="var(--pcf-segment-4)" />
            </svg>
            <div class="pcf-center-label">100%</div>
        </div>

        <ul class="pcf-legend">
            <li class="pcf-legend-item" data-segment="0">
                <span class="pcf-legend-swatch" style="background: var(--pcf-segment-1)"></span>Product A
            </li>
            <li class="pcf-legend-item" data-segment="1">
                <span class="pcf-legend-swatch" style="background: var(--pcf-segment-2)"></span>Product B
            </li>
            <li class="pcf-legend-item" data-segment="2">
                <span class="pcf-legend-swatch" style="background: var(--pcf-segment-3)"></span>Product C
            </li>
            <li class="pcf-legend-item" data-segment="3">
                <span class="pcf-legend-swatch" style="background: var(--pcf-segment-4)"></span>Product D
            </li>
        </ul>

        <button class="pcf-btn" id="pcfReplay">Replay</button>
    </div>

    <script>
        (function() {
            const segments = document.querySelectorAll('.pcf-segment');
            const legendItems = document.querySelectorAll('.pcf-legend-item');
            const replayBtn = document.getElementById('pcfReplay');

            function animateSegments() {
                segments.forEach((seg, i) => {
                    seg.style.animation = 'none';
                    void seg.offsetWidth;
                    seg.style.animation = `pcfFillIn var(--pcf-duration) ease-out forwards`;
                    seg.style.animationDelay = `${i * 0.2}s`;
                });
            }

            segments.forEach(seg => {
                seg.addEventListener('mouseenter', function() {
                    segments.forEach(s => s.classList.remove('pcf-segment--highlight'));
                    this.classList.add('pcf-segment--highlight');
                });
                seg.addEventListener('mouseleave', function() {
                    this.classList.remove('pcf-segment--highlight');
                });
            });

            legendItems.forEach(item => {
                item.addEventListener('mouseenter', function() {
                    const idx = this.dataset.segment;
                    segments.forEach(s => s.classList.remove('pcf-segment--highlight'));
                    segments[idx].classList.add('pcf-segment--highlight');
                });
                item.addEventListener('mouseleave', function() {
                    segments.forEach(s => s.classList.remove('pcf-segment--highlight'));
                });
            });

            replayBtn.addEventListener('click', animateSegments);

            animateSegments();
        })();
    </script>
</body>
</html>
