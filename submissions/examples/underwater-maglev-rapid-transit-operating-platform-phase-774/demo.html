<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Underwater Maglev Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="maglev-dashboard">
        <header>
            <h1>Maglev Transit: Operating Platform</h1>
            <div class="status-badge">STABILITY: 99.8%</div>
        </header>
        
        <div class="transit-visualizer">
            <div class="maglev-track">
                <div class="train-unit"></div>
            </div>
            <div class="underwater-wave"></div>
        </div>
        
        <div class="controls">
            <p>Depth: 450m | Velocity: 850 km/h</p>
        </div>
    </div>
</body>
</html>
