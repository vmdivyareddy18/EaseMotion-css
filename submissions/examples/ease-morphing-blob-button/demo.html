<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morphing Blob Button — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Morphing Blob Button</h1>
  <p class="subtitle">A pure CSS morphing blob button hover effect.</p>
  <section class="demo"><h2>Demo</h2><button class="blob-btn">Hover Me<span class="blob-bg"></span></button><button class="blob-btn secondary">Click Me<span class="blob-bg"></span></button><p class="hint">Hover over the buttons to see the blob morph effect.</p></section>
  <section class="docs"><h2>Usage</h2><pre><code>&lt;button class=&quot;blob-btn&quot;&gt;
  Label
  &lt;span class=&quot;blob-bg&quot;&gt;&lt;/span&gt;
&lt;/button&gt;</code></pre></section>
</body>
</html>
