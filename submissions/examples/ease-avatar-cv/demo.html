<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Avatar</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Animated Avatar Component</h1>

<h2>Online / Offline Status</h2>

<div class="avatars">

<div class="avatar online">
<img src="https://i.pravatar.cc/150?img=1" alt="Avatar">
</div>

<div class="avatar offline">
<img src="https://i.pravatar.cc/150?img=2" alt="Avatar">
</div>

</div>

<h2>Group Avatar Stack</h2>

<div class="group">

<div class="avatar">
<img src="https://i.pravatar.cc/150?img=3" alt="">
</div>

<div class="avatar">
<img src="https://i.pravatar.cc/150?img=4" alt="">
</div>

<div class="avatar">
<img src="https://i.pravatar.cc/150?img=5" alt="">
</div>

<div class="count">+8</div>

</div>

</div>

</body>
</html>
