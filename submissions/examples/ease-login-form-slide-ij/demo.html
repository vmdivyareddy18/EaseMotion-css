<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Form Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="lfs-container">
    <div class="lfs-card">
      <h1>Welcome Back</h1>
      <p class="lfs-sub">Sign in to your account</p>
      <form id="loginForm" autocomplete="off">
        <div class="lfs-field" style="--i:0">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="user@example.com" value="demo@test.com">
        </div>
        <div class="lfs-field" style="--i:1">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" value="pass123">
        </div>
        <div class="lfs-field" style="--i:2">
          <button type="submit" id="submitBtn">
            <span class="lfs-btn-text">Sign In</span>
            <span class="lfs-spinner"></span>
            <span class="lfs-check">&#10003;</span>
          </button>
        </div>
      </form>
      <div class="lfs-error" id="errorMsg">Invalid email or password</div>
    </div>
  </main>
  <script>
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const btnText = btn.querySelector('.lfs-btn-text');
    const spinner = btn.querySelector('.lfs-spinner');
    const check = btn.querySelector('.lfs-check');
    const errorMsg = document.getElementById('errorMsg');
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');

    function simulateLogin(e) {
      e.preventDefault();
      btn.classList.add('loading');
      errorMsg.classList.remove('show');
      btnText.textContent = 'Signing in...';

      setTimeout(() => {
        btn.classList.remove('loading');
        const email = emailInput.value;
        const pass = passInput.value;

        if (email === 'demo@test.com' && pass === 'pass123') {
          btn.classList.add('success');
          btnText.textContent = 'Success';
          setTimeout(() => {
            btn.classList.remove('success');
            btnText.textContent = 'Sign In';
          }, 2000);
        } else {
          btnText.textContent = 'Sign In';
          errorMsg.classList.add('show');
          document.querySelector('.lfs-card').classList.add('shake');
          setTimeout(() => document.querySelector('.lfs-card').classList.remove('shake'), 500);
        }
      }, 1800);
    }

    form.addEventListener('submit', simulateLogin);
  </script>
</body>
</html>
