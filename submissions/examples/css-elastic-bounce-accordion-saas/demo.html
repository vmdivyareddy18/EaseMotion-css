<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Accordion</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="accordion">

<div class="item">
<input type="checkbox" id="item1">
<label for="item1">What is EaseMotion CSS?</label>

<div class="content">
<p>
EaseMotion CSS provides modern reusable HTML and CSS UI components with smooth animations.
</p>
</div>
</div>

<div class="item">
<input type="checkbox" id="item2">
<label for="item2">Is JavaScript required?</label>

<div class="content">
<p>
No. This accordion is built using only HTML and CSS.
</p>
</div>
</div>

<div class="item">
<input type="checkbox" id="item3">
<label for="item3">Responsive Design</label>

<div class="content">
<p>
Works smoothly on desktop, tablet and mobile devices.
</p>
</div>
</div>

</div>

</body>
</html>
