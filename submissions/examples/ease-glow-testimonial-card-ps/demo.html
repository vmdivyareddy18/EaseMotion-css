<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Testimonial Card - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="preview-container">
        <div class="glow-testimonial-card">
            <div class="ambient-glow"></div>
            
            <div class="quote-mark">“</div>
            
            <p class="testimonial-text">
                "Integrating EaseMotion CSS completely transformed our product's user experience. The animations run flawlessly at 60FPS, and our conversion rates spiked within weeks!"
            </p>
            
            <div class="user-profile">
                <div class="avatar-wrapper">
                    <svg class="avatar-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="50" cy="50" r="48" fill="#111827" stroke="var(--neon-accent)" stroke-width="2" />
                        <circle cx="50" cy="40" r="18" fill="var(--neon-accent)" opacity="0.8" />
                        <path d="M22 80 C 25 60, 75 60, 78 80" fill="var(--neon-accent)" opacity="0.8" />
                    </svg>
                </div>
                <div class="user-info">
                    <span class="user-name">Sarah Connor</span>
                    <span class="user-role">Lead Architect, CyberDyne</span>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
