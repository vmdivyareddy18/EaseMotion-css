<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skeleton Loader</title>
    <!-- Use relative path to link the core CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f3f4f6; margin: 0; font-family: sans-serif;">
    
    <div class="ease-skeleton-card">
        <div class="ease-skeleton-header">
            <div class="ease-skeleton-avatar"></div>
            <div class="ease-skeleton-title-group">
                <div class="ease-skeleton-line ease-skeleton-title"></div>
                <div class="ease-skeleton-line ease-skeleton-subtitle"></div>
            </div>
        </div>
        <div class="ease-skeleton-body">
            <div class="ease-skeleton-line"></div>
            <div class="ease-skeleton-line"></div>
            <div class="ease-skeleton-line" style="width: 70%;"></div>
        </div>
        <div class="ease-skeleton-footer">
            <div class="ease-skeleton-button"></div>
        </div>
    </div>

</body>
</html>
