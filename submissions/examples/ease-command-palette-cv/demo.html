<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EaseMotion CSS - Command Palette</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

<div class="palette">

<div class="search-box">
<input type="text" placeholder="Type a command...">
<span>⌘K</span>
</div>

<ul class="commands">

<li>
<span>📄</span>
Open File
<kbd>Ctrl + O</kbd>
</li>

<li>
<span>🔍</span>
Search Project
<kbd>Ctrl + P</kbd>
</li>

<li>
<span>⚙️</span>
Settings
<kbd>Ctrl + ,</kbd>
</li>

<li>
<span>🚀</span>
Deploy Project
<kbd>Ctrl + D</kbd>
</li>

</ul>

</div>

</div>

</body>
</html>
