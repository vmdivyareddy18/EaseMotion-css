<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk Neon Glow Pulse Card</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Demo Container -->
  <div class="cyberpunk-neon-container">
    
    <!-- Cyberpunk Glow Pulse Card -->
    <div class="ease-cyberpunk-glow-card">
      <div class="ease-cyberpunk-content">
        <div class="cyberpunk-header">
          <span class="cyberpunk-badge">ERR_SYS</span>
          <h2 class="cyberpunk-title">Night City DB</h2>
        </div>
        <p class="cyberpunk-description">
          Unauthorized breach detected. ICE protocols bypassed. Deploying counter-intrusion daemons.
        </p>
        <div class="cyberpunk-data-grid">
          <div class="data-cell">
            <span class="data-label">THREAT</span>
            <span class="data-value">CRITICAL</span>
          </div>
          <div class="data-cell">
            <span class="data-label">SECTOR</span>
            <span class="data-value">7G</span>
          </div>
        </div>
      </div>
      <!-- Background Glow Layers -->
      <div class="ease-cyberpunk-glow-layer layer-1"></div>
      <div class="ease-cyberpunk-glow-layer layer-2"></div>
    </div>

  </div>

</body>
</html>
