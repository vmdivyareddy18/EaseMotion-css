<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elevation & Shadow System Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <header>
        <h1>☁️ Elevation & Shadow System Explorer</h1>
        <p>Compare shadow levels and understand visual hierarchy.</p>
    </header>

    <section class="shadow-grid">

        <div class="shadow-card xs">
            <h3>Shadow XS</h3>
            <span>Subtle Elevation</span>
        </div>

        <div class="shadow-card sm">
            <h3>Shadow SM</h3>
            <span>Low Elevation</span>
        </div>

        <div class="shadow-card md">
            <h3>Shadow MD</h3>
            <span>Medium Elevation</span>
        </div>

        <div class="shadow-card lg">
            <h3>Shadow LG</h3>
            <span>High Elevation</span>
        </div>

        <div class="shadow-card xl">
            <h3>Shadow XL</h3>
            <span>Maximum Elevation</span>
        </div>

    </section>

</div>

</body>
</html>
