<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transition Utilities Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-shell">
    <section class="demo-header">
      <p class="eyebrow">EaseMotion submission</p>
      <h1>Transition utilities for everyday UI polish</h1>
      <p>Hover the controls to see smooth transitions for transform, color, shadow, opacity, and spacing.</p>
    </section>

    <section class="utility-grid" aria-label="Transition utility examples">
      <button class="demo-card transition-smooth hover-lift">
        <span>Transform</span>
        <strong>hover-lift</strong>
      </button>

      <button class="demo-card transition-colors color-swap">
        <span>Color</span>
        <strong>color-swap</strong>
      </button>

      <button class="demo-card transition-shadow shadow-rise">
        <span>Shadow</span>
        <strong>shadow-rise</strong>
      </button>

      <button class="demo-card transition-fade fade-soft">
        <span>Opacity</span>
        <strong>fade-soft</strong>
      </button>

      <button class="demo-card transition-spacing spacing-breathe">
        <span>Spacing</span>
        <strong>spacing-breathe</strong>
      </button>
    </section>
  </main>
</body>
</html>
