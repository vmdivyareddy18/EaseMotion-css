<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Intelligence Memory Fabric</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="mem-dashboard">
    <header class="header">
      <span class="badge">Memory Fabric</span>
      <h1>Global Intelligence Memory Fabric</h1>
      <p class="subtitle">Unified long-term memory query tools, semantic trace nodes, and historical index trees.</p>
    </header>

    <div class="dashboard-grid">
      <section class="panel-card main-query">
        <h3>🔍 Historical Memory Query</h3>
        <div class="search-box">
          <input type="text" placeholder="Query historical risk drift templates..." readonly>
          <button class="search-btn">Search</button>
        </div>
      </section>

      <section class="side-panel">
        <div class="panel-card stats-card">
          <h3>📊 Memory Stats</h3>
          <ul class="stats-list">
            <li>Federated Nodes: <strong>94 Million</strong></li>
            <li>Sync Observatory: <strong>Active</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
