<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Notifications</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  
  <!-- Core EaseMotion CSS -->
  <link rel="stylesheet" href="../../../core/variables.css" />
  <link rel="stylesheet" href="../../../core/base.css" />
  <link rel="stylesheet" href="../../../core/utilities.css" />
  <link rel="stylesheet" href="../../../core/animations.css" />
  <link rel="stylesheet" href="../../../components/buttons.css" />
  <link rel="stylesheet" href="../../../components/cards.css" />
  
  <!-- Custom Component Style -->
  <link rel="stylesheet" href="style.css" />
  
  <style>
    body {
      background-color: var(--ease-color-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10vh;
      min-height: 100vh;
      margin: 0;
      padding-left: var(--ease-space-4);
      padding-right: var(--ease-space-4);
      font-family: var(--ease-font-sans);
    }
    .demo-container {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .btn-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-top: 2rem;
    }
  </style>
</head>
<body>

  <div class="demo-container">
    <h1 class="ease-margin-b-4" style="color: var(--ease-color-text);">Toast Notifications</h1>
    <p class="ease-text-muted ease-margin-b-6">
      Click the buttons below to spawn snackbars in the bottom right corner of the screen.
    </p>
    
    <div class="ease-card ease-card-shadow ease-padding-6">
      <h2 class="ease-text-lg ease-font-bold ease-margin-b-2">Fire a Toast</h2>
      <p class="ease-text-sm ease-text-muted">Toasts stack automatically and vanish after 3 seconds.</p>
      
      <div class="btn-grid">
        <button class="ease-btn ease-btn-success" onclick="easeToast.success('Your file was successfully uploaded!', 3000)">
          Success Toast
        </button>
        
        <button class="ease-btn ease-btn-danger" onclick="easeToast.error('A network error occurred. Please try again.', 4000)">
          Error Toast
        </button>
        
        <button class="ease-btn ease-btn-outline" style="border-color: var(--ease-color-warning); color: var(--ease-color-warning);" onclick="easeToast.warning('Your session is about to expire.', 5000)">
          Warning Toast
        </button>
        
        <button class="ease-btn ease-btn-primary" onclick="easeToast.info('A new software update is available.', 3000)">
          Info Toast
        </button>
      </div>
    </div>
  </div>

  <!-- Include the Toast JS Utility -->
  <script src="ease-toast.js"></script>

</body>
</html>
