<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Orientation Demo</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 700px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1e293b;
      }
      .label {
        font-family: monospace;
        font-size: 0.85rem;
        color: #6c63ff;
        font-weight: 600;
        margin: 1.5rem 0 0.25rem;
      }
      .row {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <h1>Text Orientation</h1>
    <p>Controls character orientation in vertical writing modes.</p>
    <div class="row">
      <div>
        <div class="label">orient-mixed (default)</div>
        <div class="demo-vert orient-mixed">Hello 世界 123</div>
      </div>
      <div>
        <div class="label">orient-upright</div>
        <div class="demo-vert orient-upright">Hello 世界 123</div>
      </div>
      <div>
        <div class="label">orient-sideways</div>
        <div class="demo-vert orient-sideways">Hello 世界 123</div>
      </div>
    </div>
  </body>
</html>
