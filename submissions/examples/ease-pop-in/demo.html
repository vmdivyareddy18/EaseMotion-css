<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Pop In - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="box ease-pop-in">💥 Pop!</div>
        <button onclick="let b=document.querySelector('.box'); b.classList.remove('ease-pop-in'); void b.offsetWidth; b.classList.add('ease-pop-in');">Re-Pop</button>
    </div>
</body>
</html>
