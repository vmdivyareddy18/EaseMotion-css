<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Player Elastic Slide</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="demo-container">
    <div class="audio-player-card">
      
      <input type="checkbox" id="lyrics-toggle" class="state-trigger">

      <div class="player-main">
        <div class="album-art">
          <div class="vinyl-record"></div>
        </div>
        
        <div class="track-info">
          <h2 class="track-title">Midnight City</h2>
          <p class="track-artist">M83</p>
        </div>

        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>

        <div class="player-controls">
          <div class="control-btn secondary">⏮</div>
          <div class="control-btn play-pause">▶</div>
          <div class="control-btn secondary">⏭</div>
        </div>

        <label for="lyrics-toggle" class="lyrics-btn">
          View Lyrics <span>▲</span>
        </label>
      </div>

      <div class="lyrics-drawer">
        <label for="lyrics-toggle" class="close-drawer" aria-label="Close lyrics">▼ Now Playing</label>
        
        <div class="lyrics-content">
          <p class="lyric-line active">Waiting in a car</p>
          <p class="lyric-line">Waiting for a ride in the dark</p>
          <p class="lyric-line">The night city grows</p>
          <p class="lyric-line">Look at the horizon glow</p>
        </div>
      </div>
      
    </div>
  </main>
</body>
</html>
