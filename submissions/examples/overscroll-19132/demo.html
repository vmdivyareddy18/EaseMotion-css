<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Overscroll Utility Demo</title>
</head>
<body>
  <h1>Overscroll Behavior</h1>
  <p>Apply these classes to prevent nested scroll propagation:</p>
  
  <div class="scroll-box overscroll-none">
    <p>This box has <b>overscroll-none</b>. When you hit the end of this list, the parent page will not scroll.</p>
    <div style="height: 300px;">Internal content...</div>
  </div>
</body>
</html>
