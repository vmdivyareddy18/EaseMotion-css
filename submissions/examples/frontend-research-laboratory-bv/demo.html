<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EaseMotion CSS - Frontend Research Laboratory</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div class="ambient-glow"></div>
  <main class="dashboard">
    <header class="header">
      <span class="badge">Phase 218 • Global Intelligence</span>
      <h1>Frontend Research Laboratory</h1>
      <p class="subtitle">Experimentation and innovation platform.</p>
    </header>
    <div class="dashboard-grid">
      <section class="panel-card main-panel">
        <h3>🧪 Frontend Research Laboratory</h3>
        <div class="lab-controls">
          <h5>Dynamic Customizer</h5>
          <div class="control-row">
            <label>--primary-glow-opacity</label>
            <input type="range" min="0" max="100" value="75" />
          </div>
          <div class="control-row">
            <label>--animation-speed-scale</label>
            <input type="range" min="1" max="10" value="5" />
          </div>
        </div>
      </section>
      <section class="side-panel">
        <div class="panel-card status-card">
          <h3>⚡ Control Deck</h3>
          <ul class="stats-list">
            <li>Orchestrator: <strong>Ready</strong></li>
            <li>Connection: <strong>SSL Synced</strong></li>
            <li>Telemetry: <strong>100%</strong></li>
          </ul>
        </div>
      </section>
    </div>
  </main>
</body>
</html>
