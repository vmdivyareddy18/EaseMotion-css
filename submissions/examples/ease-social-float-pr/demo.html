<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submission - Ease Social Float PR</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell">
    <section class="intro">
      <p class="eyebrow">CSS-only hover transition</p>
      <h1>Ease Social Float</h1>
      <p>
        A vertical social dock where each icon rises, reveals its label, and
        keeps focus states visible for keyboard users.
      </p>
    </section>

    <nav class="social-dock" aria-label="Social profile links">
      <a class="social-link social-link--github" href="#" aria-label="GitHub">
        <span class="social-icon" aria-hidden="true">GH</span>
        <span class="social-label">GitHub</span>
      </a>
      <a class="social-link social-link--linkedin" href="#" aria-label="LinkedIn">
        <span class="social-icon" aria-hidden="true">IN</span>
        <span class="social-label">LinkedIn</span>
      </a>
      <a class="social-link social-link--x" href="#" aria-label="X profile">
        <span class="social-icon" aria-hidden="true">X</span>
        <span class="social-label">Profile</span>
      </a>
      <a class="social-link social-link--mail" href="#" aria-label="Email">
        <span class="social-icon" aria-hidden="true">@</span>
        <span class="social-label">Email</span>
      </a>
    </nav>
  </main>
</body>
</html>
