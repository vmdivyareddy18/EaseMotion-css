<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Checkbox - EaseMotion CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container-qn">
        <h2>Custom Animated Checkbox</h2>
        
        <!-- The Checkbox Label -->
        <label class="custom-checkbox-qn">
            <!-- The actual hidden input -->
            <input type="checkbox" class="checkbox-input-qn">
            
            <!-- The visual box and SVG checkmark -->
            <span class="checkbox-mark-qn">
                <svg viewBox="0 0 24 24" class="check-icon-qn">
                    <path d="M5 12l5 5L20 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            
            <!-- The text label -->
            <span class="checkbox-label-qn">I agree to the terms and conditions</span>
        </label>

        <label class="custom-checkbox-qn">
            <input type="checkbox" class="checkbox-input-qn" checked>
            <span class="checkbox-mark-qn">
                <svg viewBox="0 0 24 24" class="check-icon-qn">
                    <path d="M5 12l5 5L20 7" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </span>
            <span class="checkbox-label-qn">Subscribe to newsletter (Checked by default)</span>
        </label>
    </div>
</body>
</html>
