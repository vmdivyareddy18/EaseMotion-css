<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animation Play State Utilities | EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="play-state-wrapper">
    <header class="showcase-header">
      <h1>Animation Play State Utilities</h1>
      <p>A proposal for <code>core/utilities.css</code> to add <code>animation-play-state</code> classes.</p>
    </header>

    <div class="demo-area">
      <div class="grid">
        
        <!-- Pause on hover -->
        <div class="demo-card">
          <div class="spinner em-hover-pause"></div>
          <h3>Pause on Hover</h3>
          <p><code>.em-hover-pause</code></p>
        </div>
        
        <!-- Play on hover -->
        <div class="demo-card">
          <div class="spinner em-play-paused em-hover-play"></div>
          <h3>Play on Hover</h3>
          <p><code>.em-play-paused.em-hover-play</code></p>
        </div>
        
      </div>
    </div>
    
  </div>

</body>
</html>
