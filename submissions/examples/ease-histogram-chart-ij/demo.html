<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Histogram Chart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-box">
        <h2>Weekly Data</h2>
        <div class="ease-histogram">
            <div class="ease-histogram-bar" style="height: 40%;" title="40%"></div>
            <div class="ease-histogram-bar" style="height: 70%;" title="70%"></div>
            <div class="ease-histogram-bar" style="height: 95%;" title="95%"></div>
            <div class="ease-histogram-bar" style="height: 60%;" title="60%"></div>
            <div class="ease-histogram-bar" style="height: 80%;" title="80%"></div>
            <div class="ease-histogram-bar" style="height: 50%;" title="50%"></div>
            <div class="ease-histogram-bar" style="height: 30%;" title="30%"></div>
        </div>
    </div>
</body>
</html>
