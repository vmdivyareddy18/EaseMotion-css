<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravitational Pendulum</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script>
    const root = document.documentElement;
    document.addEventListener('input', (e) => {
      const t = e.target;
      if (t.name === 'pendulum-color') root.style.setProperty('--pendulum-color', t.value);
      if (t.name === 'pivot-color') root.style.setProperty('--pivot-color', t.value);
      if (t.name === 'swing-angle') root.style.setProperty('--swing-angle', t.value + 'deg');
      if (t.name === 'swing-duration') root.style.setProperty('--swing-duration', t.value + 's');
    });
  </script>
  <div class="pendulum-wrapper">
    <p class="pendulum-title">Gravitational Pendulum</p>
    <div class="pendulum">
      <div class="pivot"></div>
      <div class="arm"><div class="bob"></div></div>
    </div>
    <div class="controls">
      <label>Pendulum: <input type="color" name="pendulum-color" value="#ff6b6b"></label>
      <label>Pivot: <input type="color" name="pivot-color" value="#ffd93d"></label>
      <label>Angle: <input type="range" name="swing-angle" min="10" max="60" value="30"></label>
      <label>Duration: <input type="range" name="swing-duration" min="0.5" max="5" step="0.1" value="2"></label>
    </div>
  </div>
</body>
</html>
