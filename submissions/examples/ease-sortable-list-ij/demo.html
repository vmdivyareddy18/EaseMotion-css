<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sortable List · EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Sortable List</h1>
    <p class="subtitle">Drag the handles to reorder</p>
    <ul class="sortable" id="sortableList">
      <li class="list-item" draggable="true" data-label="Dashboard"><span class="list-item__handle">⠿</span><span class="list-item__text">Dashboard</span></li>
      <li class="list-item" draggable="true" data-label="Profile"><span class="list-item__handle">⠿</span><span class="list-item__text">Profile</span></li>
      <li class="list-item" draggable="true" data-label="Settings"><span class="list-item__handle">⠿</span><span class="list-item__text">Settings</span></li>
      <li class="list-item" draggable="true" data-label="Notifications"><span class="list-item__handle">⠿</span><span class="list-item__text">Notifications</span></li>
      <li class="list-item" draggable="true" data-label="Billing"><span class="list-item__handle">⠿</span><span class="list-item__text">Billing</span></li>
      <li class="list-item" draggable="true" data-label="Users"><span class="list-item__handle">⠿</span><span class="list-item__text">Users</span></li>
    </ul>
  </div>

  <script>
    (function () {
      var list = document.getElementById('sortableList');
      var dragged = null;

      function flip() {
        var items = list.querySelectorAll('.list-item');
        items.forEach(function (item) {
          item._rect = item.getBoundingClientRect();
        });
        requestAnimationFrame(function () {
          items.forEach(function (item) {
            var rect = item.getBoundingClientRect();
            var dx = item._rect.left - rect.left;
            var dy = item._rect.top - rect.top;
            if (dx !== 0 || dy !== 0) {
              item.style.transition = 'none';
              item.style.transform = 'translate(' + dx + 'px, ' + dy + 'px)';
              item._flip = true;
            }
            delete item._rect;
          });
          requestAnimationFrame(function () {
            items.forEach(function (item) {
              if (item._flip) {
                item.style.transition = 'transform var(--sl-duration, 0.3s) ease';
                item.style.transform = '';
                item.addEventListener('transitionend', function handler() {
                  item.style.transition = '';
                  item.style.transform = '';
                  delete item._flip;
                  item.removeEventListener('transitionend', handler);
                });
              }
            });
          });
        });
      }

      list.addEventListener('dragstart', function (e) {
        var item = e.target.closest('.list-item');
        if (!item) return;
        dragged = item;
        item.classList.add('list-item--dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', item.dataset.label || '');
      });

      list.addEventListener('dragover', function (e) {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        var target = e.target.closest('.list-item');
        if (!target || target === dragged) return;

        var rect = target.getBoundingClientRect();
        var midY = rect.top + rect.height / 2;

        if (e.clientY < midY) {
          target.parentNode.insertBefore(dragged, target);
        } else {
          target.parentNode.insertBefore(dragged, target.nextSibling);
        }

        flip();
      });

      list.addEventListener('dragend', function () {
        if (dragged) {
          dragged.classList.remove('list-item--dragging');
          dragged = null;
        }
        var items = list.querySelectorAll('.list-item');
        items.forEach(function (item) {
          item.style.transition = '';
          item.style.transform = '';
        });
      });

      // Prevent default on the list to allow drop
      list.addEventListener('drop', function (e) {
        e.preventDefault();
      });
    })();
  </script>
</body>
</html>
