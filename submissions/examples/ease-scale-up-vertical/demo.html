<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Up Vertical - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="pillar ease-scale-v"></div>
        <button onclick="let p=document.querySelector('.pillar'); p.classList.remove('ease-scale-v'); void p.offsetWidth; p.classList.add('ease-scale-v');">Grow Pillar</button>
    </div>
</body>
</html>
