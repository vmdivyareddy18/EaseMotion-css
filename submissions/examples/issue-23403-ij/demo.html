<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cello Bow Animation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cello">
    <div class="cello-body">
      <div class="cello-waist"></div>
    </div>
    <div class="f-hole-l"></div>
    <div class="f-hole-r"></div>
    <div class="fingerboard-c"></div>
    <div class="cello-strings">
      <div class="cstring" style="--i:0"></div>
      <div class="cstring" style="--i:1"></div>
      <div class="cstring" style="--i:2"></div>
      <div class="cstring" style="--i:3"></div>
    </div>
    <div class="cbow"></div>
    <div class="endpin"></div>
  </div>
</body>
</html>
