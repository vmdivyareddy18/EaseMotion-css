<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Image Example</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-container-ag">
    
    <div class="gallery-item-ag">
      <img src="https://via.placeholder.com/300x200" alt="Placeholder graphic" class="pulse-image-ag" id="pulse-image-ag">
      <button class="delete-btn-ag" id="delete-image-btn-ag" aria-label="Delete Image">Delete</button>
    </div>

  </div>

  <script>
    const imageEl = document.getElementById('pulse-image-ag');
    const deleteBtn = document.getElementById('delete-image-btn-ag');

    deleteBtn.addEventListener('click', () => {
      // Trigger the exit animation
      imageEl.classList.add('is-exiting-ag');
      
      // Hide the entire container after the image finishes animating
      imageEl.addEventListener('animationend', function handleEnd() {
        imageEl.parentElement.style.display = 'none';
        imageEl.removeEventListener('animationend', handleEnd);
      });
    });
  </script>
</body>
</html>
