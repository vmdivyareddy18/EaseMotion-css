<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Tilt Hover Button - Responsive Dashboard Layouts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="demo-container">
    <header class="demo-header">
      <h1>EaseMotion CSS</h1>
      <p>Tilt Hover Button (Dashboard Layout)</p>
    </header>

    <div class="ease-dashboard-grid">
      
      <!-- Primary Action Button -->
      <button class="ease-tilt-btn ease-tilt-primary">
        <span class="ease-tilt-btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </span>
        Generate Report
      </button>

      <!-- Secondary Action Button -->
      <button class="ease-tilt-btn ease-tilt-secondary">
        <span class="ease-tilt-btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
          </svg>
        </span>
        Edit Configuration
      </button>

    </div>
  </main>

</body>
</html>
