<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Column Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item col-auto">.col-auto</div>
  <div class="demo-item col-span-1">.col-span-1</div>
  <div class="demo-item col-span-2">.col-span-2</div>
  <div class="demo-item col-span-3">.col-span-3</div>
  <div class="demo-item col-span-4">.col-span-4</div>
  <div class="demo-item col-span-6">.col-span-6</div>
</body>
</html>
