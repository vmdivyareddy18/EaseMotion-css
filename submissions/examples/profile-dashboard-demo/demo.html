<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Profile Dashboard Demo</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/gh/JAY4IGNITE/EaseMotion-css@main/easemotion.min.css">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<section class="dashboard">

<h1 class="ease-fade-in">
User Profile Dashboard
</h1>

<div class="container">

<div class="profile-card ease-slide-up">

<img
src="https://picsum.photos/150"
alt="Profile">

<h2>John Doe</h2>

<p>Frontend Developer</p>

<button class="edit-btn ease-hover-grow">
Edit Profile
</button>

</div>

<div class="stats">

<div class="card ease-slide-up">

<h2>125</h2>

<p>Projects</p>

</div>

<div class="card ease-slide-up">

<h2>2.3K</h2>

<p>Followers</p>

</div>

<div class="card ease-slide-up">

<h2>180</h2>

<p>Following</p>

</div>

</div>

<div class="activity ease-slide-up">

<h2>Recent Activity</h2>

<ul>

<li>Updated portfolio website</li>

<li>Completed React project</li>

<li>Shared a CSS animation example</li>

<li>Opened 5 GitHub pull requests</li>

</ul>

</div>

</div>

</section>

</body>

</html>
