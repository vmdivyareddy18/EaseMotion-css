<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy to Clipboard Component</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- DEMO WRAPPER -->
    <div class="demo-wrapper">
        <h1>Copy to Clipboard</h1>
        <p class="subtitle">Button with checkmark feedback</p>

        <!-- COPY TO CLIPBOARD COMPONENT -->
        <div class="copy-container">
            <div class="copy-wrapper">
                <!-- Example 1: Text to Copy -->
                <div class="copy-section">
                    <label class="copy-label">Text to Copy</label>
                    <div class="copy-input-group">
                        <input type="text" class="copy-input" id="copyInput" value="Hello, World! This text is ready to copy." readonly />
                        <button class="copy-btn" id="copyBtn1" data-copy-target="copyInput">
                            <span class="copy-btn-text">Copy</span>
                            <span class="copy-btn-icon">
                                <svg class="copy-icon-default" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                                </svg>
                                <svg class="copy-icon-success" viewBox="0 0 24 24" width="18" height="18" style="display:none;">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Example 2: Code Block -->
                <div class="copy-section">
                    <label class="copy-label">Code Block</label>
                    <div class="code-block" id="codeBlock">
                        <code>
                            <span class="code-keyword">function</span> <span class="code-function">greet</span>(<span class="code-param">name</span>) {<br />
                            &nbsp;&nbsp;<span class="code-keyword">return</span> <span class="code-string">`Hello, ${name}!`</span>;<br />
                            }<br /><br />
                            <span class="code-keyword">const</span> <span class="code-variable">message</span> = <span class="code-function">greet</span>(<span class="code-string">'World'</span>);<br />
                            <span class="code-function">console</span>.<span class="code-method">log</span>(<span class="code-variable">message</span>);
                        </code>
                    </div>
                    <button class="copy-btn copy-code-btn" id="copyBtn2" data-copy-target="codeBlock">
                        <span class="copy-btn-text">Copy Code</span>
                        <span class="copy-btn-icon">
                            <svg class="copy-icon-default" viewBox="0 0 24 24" width="18" height="18">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                            </svg>
                            <svg class="copy-icon-success" viewBox="0 0 24 24" width="18" height="18" style="display:none;">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>
                </div>

                <!-- Example 3: Multiple Items -->
                <div class="copy-section">
                    <label class="copy-label">Email Address</label>
                    <div class="copy-input-group">
                        <input type="text" class="copy-input" id="emailInput" value="contact@example.com" readonly />
                        <button class="copy-btn" id="copyBtn3" data-copy-target="emailInput">
                            <span class="copy-btn-text">Copy</span>
                            <span class="copy-btn-icon">
                                <svg class="copy-icon-default" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                                </svg>
                                <svg class="copy-icon-success" viewBox="0 0 24 24" width="18" height="18" style="display:none;">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Custom Textarea -->
                <div class="copy-section">
                    <label class="copy-label">Custom Text</label>
                    <div class="copy-input-group">
                        <textarea class="copy-textarea" id="textareaInput" readonly>This is a multiline text that can be copied to the clipboard. It supports multiple lines and preserves formatting.</textarea>
                        <button class="copy-btn" id="copyBtn4" data-copy-target="textareaInput">
                            <span class="copy-btn-text">Copy</span>
                            <span class="copy-btn-icon">
                                <svg class="copy-icon-default" viewBox="0 0 24 24" width="18" height="18">
                                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                                </svg>
                                <svg class="copy-icon-success" viewBox="0 0 24 24" width="18" height="18" style="display:none;">
                                    <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>

                <!-- Controls -->
                <div class="copy-controls">
                    <button class="copy-control-btn" id="resetAllBtn">⟳ Reset All</button>
                    <button class="copy-control-btn" id="changeTextBtn">📝 Change Text</button>
                    <button class="copy-control-btn" id="copyAllBtn">📋 Copy All</button>
                </div>

                <div class="copy-status">
                    <span class="status-label">Last Action:</span>
                    <span class="status-value" id="lastAction">None</span>
                    <span class="status-label">Copies:</span>
                    <span class="status-value" id="copyCount">0</span>
                </div>
            </div>
        </div>

        <!-- Variants -->
        <div class="variants-section">
            <h3>Variants</h3>
            <div class="variants-grid">
                <div class="variant-card" id="variant1">
                    <button class="copy-btn variant-primary">
                        <span class="copy-btn-text">Primary</span>
                        <span class="copy-btn-icon">
                            <svg class="copy-icon-default" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                            </svg>
                            <svg class="copy-icon-success" viewBox="0 0 24 24" width="16" height="16" style="display:none;">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>
                    <span class="variant-label">Primary</span>
                </div>
                <div class="variant-card" id="variant2">
                    <button class="copy-btn variant-success">
                        <span class="copy-btn-text">Success</span>
                        <span class="copy-btn-icon">
                            <svg class="copy-icon-default" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                            </svg>
                            <svg class="copy-icon-success" viewBox="0 0 24 24" width="16" height="16" style="display:none;">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>
                    <span class="variant-label">Success</span>
                </div>
                <div class="variant-card" id="variant3">
                    <button class="copy-btn variant-outline">
                        <span class="copy-btn-text">Outline</span>
                        <span class="copy-btn-icon">
                            <svg class="copy-icon-default" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                            </svg>
                            <svg class="copy-icon-success" viewBox="0 0 24 24" width="16" height="16" style="display:none;">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>
                    <span class="variant-label">Outline</span>
                </div>
                <div class="variant-card" id="variant4">
                    <button class="copy-btn variant-minimal">
                        <span class="copy-btn-text">Minimal</span>
                        <span class="copy-btn-icon">
                            <svg class="copy-icon-default" viewBox="0 0 24 24" width="16" height="16">
                                <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="currentColor"/>
                            </svg>
                            <svg class="copy-icon-success" viewBox="0 0 24 24" width="16" height="16" style="display:none;">
                                <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z" fill="currentColor"/>
                            </svg>
                        </span>
                    </button>
                    <span class="variant-label">Minimal</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================================
    EMBEDDED JAVASCRIPT
    ============================================ -->
    <script>
        (function() {
            'use strict';

            // ============================================
            // DOM REFERENCES
            // ============================================
            const copyButtons = document.querySelectorAll('.copy-btn[data-copy-target]');
            const lastAction = document.getElementById('lastAction');
            const copyCount = document.getElementById('copyCount');
            const resetAllBtn = document.getElementById('resetAllBtn');
            const changeTextBtn = document.getElementById('changeTextBtn');
            const copyAllBtn = document.getElementById('copyAllBtn');

            // ============================================
            // CONFIGURATION
            // ============================================
            const CONFIG = {
                successDuration: 2000, // ms
                showFeedback: true,
                onCopy: function(target, text) {
                    console.log(`📋 Copied: "${text.substring(0, 30)}..." from ${target}`);
                },
                onError: function(error) {
                    console.log(`❌ Copy failed: ${error}`);
                }
            };

            // ============================================
            // STATE
            // ============================================
            let copyCounter = 0;

            // ============================================
            // CORE COPY FUNCTION
            // ============================================
            function copyToClipboard(text, button) {
                // Method 1: Modern Clipboard API
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text)
                        .then(() => {
                            handleCopySuccess(button, text);
                        })
                        .catch((err) => {
                            // Fallback to execCommand
                            fallbackCopy(text, button);
                        });
                } else {
                    // Fallback for older browsers
                    fallbackCopy(text, button);
                }
            }

            function fallbackCopy(text, button) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                textarea.style.pointerEvents = 'none';
                document.body.appendChild(textarea);
                textarea.select();
                
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        handleCopySuccess(button, text);
                    } else {
                        handleCopyError('execCommand failed');
                    }
                } catch (err) {
                    handleCopyError(err.message);
                }
                
                document.body.removeChild(textarea);
            }

            function handleCopySuccess(button, text) {
                const target = button.dataset.copyTarget || 'unknown';
                copyCounter++;
                copyCount.textContent = copyCounter;
                lastAction.textContent = `✅ Copied: "${text.substring(0, 30)}${text.length > 30 ? '...' : ''}"`;
                
                // Update button state
                button.classList.add('copied');
                const textSpan = button.querySelector('.copy-btn-text');
                const defaultIcon = button.querySelector('.copy-icon-default');
                const successIcon = button.querySelector('.copy-icon-success');
                
                if (textSpan) textSpan.textContent = 'Copied!';
                if (defaultIcon) defaultIcon.style.display = 'none';
                if (successIcon) successIcon.style.display = 'inline';
                
                CONFIG.onCopy(target, text);
                
                // Reset after duration
                setTimeout(() => {
                    resetButton(button);
                }, CONFIG.successDuration);
            }

            function handleCopyError(error) {
                lastAction.textContent = `❌ Failed to copy: ${error}`;
                lastAction.style.color = '#ff3b30';
                CONFIG.onError(error);
                
                setTimeout(() => {
                    lastAction.style.color = '';
                }, 3000);
            }

            function resetButton(button) {
                button.classList.remove('copied');
                const textSpan = button.querySelector('.copy-btn-text');
                const defaultIcon = button.querySelector('.copy-icon-default');
                const successIcon = button.querySelector('.copy-icon-success');
                
                if (textSpan) {
                    const originalText = button.dataset.originalText || 'Copy';
                    textSpan.textContent = originalText;
                }
                if (defaultIcon) defaultIcon.style.display = 'inline';
                if (successIcon) successIcon.style.display = 'none';
            }

            // ============================================
            // GET TEXT FROM TARGET
            // ============================================
            function getTargetText(targetId) {
                const element = document.getElementById(targetId);
                if (!element) return null;
                
                if (element.tagName === 'INPUT' || element.tagName === 'TEXTAREA') {
                    return element.value;
                } else if (element.tagName === 'DIV' || element.tagName === 'CODE' || element.tagName === 'PRE') {
                    return element.innerText || element.textContent;
                }
                return element.textContent;
            }

            // ============================================
            // EVENT LISTENERS
            // ============================================
            copyButtons.forEach(btn => {
                // Store original text
                const textSpan = btn.querySelector('.copy-btn-text');
                if (textSpan) {
                    btn.dataset.originalText = textSpan.textContent;
                }
                
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.dataset.copyTarget;
                    const text = getTargetText(targetId);
                    
                    if (text === null) {
                        handleCopyError('Target element not found');
                        return;
                    }
                    
                    if (text === '') {
                        handleCopyError('Nothing to copy');
                        return;
                    }
                    
                    copyToClipboard(text, this);
                });
            });

            // ============================================
            // DEMO CONTROLS
            // ============================================
            resetAllBtn.addEventListener('click', function() {
                copyButtons.forEach(btn => resetButton(btn));
                lastAction.textContent = 'Reset all buttons';
                setTimeout(() => {
                    if (lastAction.textContent === 'Reset all buttons') {
                        lastAction.textContent = 'None';
                    }
                }, 2000);
            });

            changeTextBtn.addEventListener('click', function() {
                const texts = [
                    'Hello, World! This text is ready to copy.',
                    'Welcome to the Copy to Clipboard component!',
                    'This is a demo of the copy functionality.',
                    'You can copy text with a single click.',
                    'The button provides visual feedback with a checkmark.',
                    'Try copying different types of content!',
                    'Support for multiple lines and formatting.',
                    'This component works on all modern browsers.',
                    'Clipboard API with fallback support.',
                    'Checkmark feedback makes it clear when copied.'
                ];
                const input = document.getElementById('copyInput');
                const currentText = input.value;
                let newText = texts[Math.floor(Math.random() * texts.length)];
                while (newText === currentText) {
                    newText = texts[Math.floor(Math.random() * texts.length)];
                }
                input.value = newText;
                lastAction.textContent = '📝 Text changed!';
                setTimeout(() => {
                    if (lastAction.textContent === '📝 Text changed!') {
                        lastAction.textContent = 'None';
                    }
                }, 2000);
            });

            copyAllBtn.addEventListener('click', function() {
                const allTexts = [];
                document.querySelectorAll('.copy-input, .copy-textarea, .code-block').forEach(el => {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        if (el.value) allTexts.push(el.value);
                    } else {
                        const text = el.innerText || el.textContent;
                        if (text) allTexts.push(text.trim());
                    }
                });
                const combinedText = allTexts.join('\n\n---\n\n');
                copyToClipboard(combinedText, copyAllBtn);
            });

            // ============================================
            // KEYBOARD SHORTCUTS
            // ============================================
            document.addEventListener('keydown', function(e) {
                // Ctrl+Shift+C to copy all
                if (e.key === 'C' && e.ctrlKey && e.shiftKey) {
                    e.preventDefault();
                    copyAllBtn.click();
                }
                // Escape to reset
                if (e.key === 'Escape') {
                    resetAllBtn.click();
                }
            });

            // ============================================
            // VARIANTS
            // ============================================
            function initVariant(card) {
                const btn = card.querySelector('.copy-btn');
                const textSpan = btn.querySelector('.copy-btn-text');
                const defaultIcon = btn.querySelector('.copy-icon-default');
                const successIcon = btn.querySelector('.copy-icon-success');
                
                if (textSpan) {
                    btn.dataset.originalText = textSpan.textContent;
                }
                
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    
                    // Simulate copy for demo
                    this.classList.add('copied');
                    if (textSpan) textSpan.textContent = 'Copied!';
                    if (defaultIcon) defaultIcon.style.display = 'none';
                    if (successIcon) successIcon.style.display = 'inline';
                    
                    // Animate card
                    card.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        card.style.transform = '';
                    }, 200);
                    
                    setTimeout(() => {
                        this.classList.remove('copied');
                        if (textSpan) textSpan.textContent = btn.dataset.originalText || 'Copy';
                        if (defaultIcon) defaultIcon.style.display = 'inline';
                        if (successIcon) successIcon.style.display = 'none';
                    }, CONFIG.successDuration);
                });
            }

            document.querySelectorAll('.variant-card').forEach(initVariant);

            // ============================================
            // CUSTOM API FOR PROGRAMMATIC CONTROL
            // ============================================
            window.ClipboardCopy = {
                copy: copyToClipboard,
                getText: getTargetText,
                reset: resetButton,
                resetAll: () => resetAllBtn.click(),
                getStats: () => ({
                    copies: copyCounter,
                    lastAction: lastAction.textContent
                }),
                configure: (config) => {
                    Object.assign(CONFIG, config);
                }
            };

            // ============================================
            // INITIAL SETUP
            // ============================================
            copyCount.textContent = '0';
            lastAction.textContent = 'None';

            console.log('✅ Copy to Clipboard initialized!');
            console.log('📖 API: window.ClipboardCopy');
            console.log('📖 Usage:');
            console.log('  - Click any "Copy" button to copy text');
            console.log('  - Buttons show checkmark feedback when copied');
            console.log('  - Keyboard shortcuts: Ctrl+Shift+C (copy all), Escape (reset)');
            console.log('  - Supports fallback for older browsers');

        })();
    </script>
</body>
</html>
