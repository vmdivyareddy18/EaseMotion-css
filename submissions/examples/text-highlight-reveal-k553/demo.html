<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Text Highlight Reveal Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: Georgia, serif;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
    }

    h2 {
      font-size: 2rem;
      color: #222;
    }

    p.hint {
      color: #888;
      font-size: 0.9rem;
      font-family: sans-serif;
    }
  </style>
</head>
<body>

  <h2 class="text-highlight-reveal">Welcome to EaseMotion CSS</h2>
  <h2 class="text-highlight-reveal is-visible">Always visible on load</h2>

  <p class="hint">First heading reveals on hover. Second is shown statically for reference.</p>

</body>
</html>
