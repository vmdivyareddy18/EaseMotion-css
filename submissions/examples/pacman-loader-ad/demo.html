<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Retro Arcade Pac-Man Style Pure-CSS Loading Spinner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="arcade-bezel">
    <div class="bezel-header">STAGE_01_LOADING_</div>
    
    <div class="pacman-loader">
      <div class="pacman-character" aria-hidden="true">
        <div class="pacman-mouth-top"></div>
        <div class="pacman-mouth-bottom"></div>
      </div>
      <div class="pacman-dots" aria-label="Loading progress">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </main>
</body>
</html>
