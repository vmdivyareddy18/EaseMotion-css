<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Border Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="demo-container">
  <h1>Glow Border Button Animation</h1>
  <p>
    A pure CSS animated glow effect that travels around the button border.
  </p>

  <div class="button-grid">
    <button class="glow-btn">Get Started</button>
    <button class="glow-btn glow-blue">Learn More</button>
    <button class="glow-btn glow-orange">Subscribe</button>
    <button class="glow-btn glow-large">Download Now</button>
  </div>
</section>

</body>
</html>
