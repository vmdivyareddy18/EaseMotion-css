<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Position-Visibility Anchor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Anchor position-visibility Demo</h1>
  <p class="note">Scroll the container — anchored menus hide when their anchor scrolls out of view.</p>

  <div class="scroll-container">
    <div class="anchor-row">
      <div class="anchor-item" id="anchor-1">
        <span>Anchor 1</span>
        <div class="anchored-menu">
          <div class="menu-header">Menu 1</div>
          <a href="#">Action</a>
          <a href="#">Settings</a>
          <a href="#">Details</a>
        </div>
      </div>
      <div class="anchor-item" id="anchor-2">
        <span>Anchor 2</span>
        <div class="anchored-menu">
          <div class="menu-header">Menu 2</div>
          <a href="#">Edit</a>
          <a href="#">Share</a>
          <a href="#">Delete</a>
        </div>
      </div>
      <div class="anchor-item" id="anchor-3">
        <span>Anchor 3</span>
        <div class="anchored-menu">
          <div class="menu-header">Menu 3</div>
          <a href="#">Open</a>
          <a href="#">Archive</a>
          <a href="#">Export</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
