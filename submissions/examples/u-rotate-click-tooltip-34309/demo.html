<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Rotate Click Tooltip

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="badge">

SaaS Showcase

</div>

<h1>

Rotate Click Tooltip

</h1>

<p>

Interactive tooltip component
created for modern SaaS
platforms featuring smooth
rotate-click transitions.

</p>

<div class="tooltip-wrapper">

<input

type="checkbox"

id="toggle"

>

<label

for="toggle"

class="trigger"

>

Explore Product

</label>

<div

class="tooltip"

role="tooltip"

>

<span class="tag">

Premium

</span>

<h3>

Workflow Automation

</h3>

<p>

CSS-only rotate animation
designed for SaaS product
showcases and feature
presentations.

</p>

</div>

</div>

</div>

</section>

</body>

</html>
