<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>XP Sidebar Navigation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOGGLE BUTTON -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <h2 class="logo">XP Game</h2>

  <div class="menu">
    <div class="item active">🏠 Dashboard</div>
    <div class="item">⚡ XP</div>
    <div class="item">🏆 Rewards</div>
    <div class="item">📊 Stats</div>
  </div>

</div>

<!-- MAIN -->
<div class="content">
  <h1 class="ease-fade-in">Game Dashboard</h1>
  <p class="ease-slide-up">Navigate through different game sections.</p>
</div>

<script>
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open");
}
</script>

</body>
</html>
