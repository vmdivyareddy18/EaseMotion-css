<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flip Card 3D SK</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="flip-card">
    <div class="flip-card__inner">
      <div class="flip-card__face flip-card__face--front">
        <h2>Algo Notes</h2>
        <p>Hover to reveal complexity tips.</p>
      </div>
      <div class="flip-card__face flip-card__face--back">
        <h3>O(n log n)</h3>
        <p>Merge sort keeps memory predictable.</p>
      </div>
    </div>
  </div>
</body>
</html>
