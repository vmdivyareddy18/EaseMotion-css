<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding Flow Animation Showcase</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

    <h1>Interactive Onboarding Flow</h1>

    <div class="progress">
        <div class="progress-fill"></div>
    </div>

    <!-- Step 1 -->
    <section class="card fade-in">
        <div class="illustration">🚀</div>
        <h2>Welcome</h2>
        <p>Discover how animations improve user engagement.</p>
        <button>Get Started</button>
    </section>

    <!-- Step 2 -->
    <section class="features">

        <div class="feature-card slide-up delay1">
            <h3>Fast Setup</h3>
            <p>Get started within minutes.</p>
        </div>

        <div class="feature-card slide-up delay2">
            <h3>Smooth Motion</h3>
            <p>Enhance UI with elegant animations.</p>
        </div>

        <div class="feature-card slide-up delay3">
            <h3>Responsive</h3>
            <p>Works across modern devices.</p>
        </div>

    </section>

    <!-- Step 3 -->
    <section class="card zoom-in">
        <h2>Account Setup</h2>

        <input type="text" placeholder="Full Name">
        <input type="email" placeholder="Email Address">

        <button>Create Account</button>
    </section>

    <!-- Step 4 -->
    <section class="card success-card">
        <div class="checkmark">✓</div>
        <h2>Setup Complete</h2>
        <p>Your onboarding journey is complete.</p>
        <button>Continue</button>
    </section>

</div>

</body>
</html>
