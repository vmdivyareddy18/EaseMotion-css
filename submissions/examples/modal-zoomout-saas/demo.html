<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Zoom-Out</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle" hidden>

<label for="modal-toggle" class="open-btn">
    Open Modal
</label>

<div class="ease-modal-overlay">

    <div class="ease-modal">

        <h2>SaaS Dashboard</h2>

        <p>
            Experience smooth CSS-only modal animations with EaseMotion.
        </p>

        <label for="modal-toggle" class="close-btn">
            Close
        </label>

    </div>

</div>

</body>
</html>
