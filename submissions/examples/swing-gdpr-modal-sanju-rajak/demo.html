<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swing GDPR Modal - EaseMotion CSS</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-page">

    <input type="checkbox" id="gdpr-toggle" hidden>

    <label for="gdpr-toggle" class="ease-btn">
        Open GDPR Modal
    </label>

    <div class="ease-overlay">

        <div class="ease-swing-gdpr">

            <h2>🍪 Cookie Preferences</h2>

            <p>
                We use cookies to improve your browsing experience,
                personalize content, and analyze traffic.
                You can accept all cookies or customize your preferences.
            </p>

            <div class="ease-actions">

                <label for="gdpr-toggle" class="ease-secondary">
                    Decline
                </label>

                <label for="gdpr-toggle" class="ease-primary">
                    Accept
                </label>

            </div>

        </div>

    </div>

</div>

</body>
</html>
