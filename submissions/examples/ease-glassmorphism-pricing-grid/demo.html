<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ease-glassmorphism-pricing-grid Demo</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="ease-pricing-section" data-theme="dark">
  <div class="ease-pricing-grid">

    <!-- Hobby -->
    <div class="ease-pricing-card">
      <h3 class="ease-pricing-plan">Hobby</h3>
      <div class="ease-pricing-price">$0<span>/mo</span></div>
      <ul class="ease-pricing-features">
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          1 project
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Community support
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Basic analytics
        </li>
      </ul>
      <button class="ease-pricing-btn" type="button">Get Started</button>
    </div>

    <!-- Pro (featured) -->
    <div class="ease-pricing-card ease-pricing-card--featured">
      <span class="ease-pricing-badge">Most Popular</span>
      <h3 class="ease-pricing-plan">Pro</h3>
      <div class="ease-pricing-price">$19<span>/mo</span></div>
      <ul class="ease-pricing-features">
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Unlimited projects
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Priority support
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Advanced analytics
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Team collaboration
        </li>
      </ul>
      <button class="ease-pricing-btn" type="button">Start Free Trial</button>
    </div>

    <!-- Enterprise -->
    <div class="ease-pricing-card">
      <h3 class="ease-pricing-plan">Enterprise</h3>
      <div class="ease-pricing-price">$49<span>/mo</span></div>
      <ul class="ease-pricing-features">
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Everything in Pro
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          Dedicated account manager
        </li>
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" /></svg>
          SLA & custom contracts
        </li>
      </ul>
      <button class="ease-pricing-btn" type="button">Contact Sales</button>
    </div>

  </div>
</section>

</body>
</html>
