<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

Glow Pulse Card • E-Commerce Checkout

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<section class="checkout-section">

<div class="checkout-card">

<span class="badge">

Secure Checkout

</span>

<h1>

Order Summary

</h1>

<p class="subtitle">

Review your purchase before completing the payment.

</p>

<div class="order-list">

<div class="item">

<span>Wireless Headphones</span>

<strong>$129</strong>

</div>

<div class="item">

<span>Protective Case</span>

<strong>$24</strong>

</div>

<div class="item">

<span>Shipping</span>

<strong>Free</strong>

</div>

</div>

<div class="total">

<span>Total</span>

<strong>$153</strong>

</div>

<button class="glow-btn">

Complete Purchase

</button>

</div>

</section>

</body>

</html>
