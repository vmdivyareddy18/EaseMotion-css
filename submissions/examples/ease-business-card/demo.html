<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ Business Card Generator</h1>
            <p>Create your professional business card in seconds</p>
        </div>

        <div class="generator-wrapper">
            <div class="form-section">
                <form id="cardForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="John Doe" required>
                    </div>

                    <div class="form-group">
                        <label for="title">Job Title</label>
                        <input type="text" id="title" placeholder="Software Developer" required>
                    </div>

                    <div class="form-group">
                        <label for="company">Company</label>
                        <input type="text" id="company" placeholder="Tech Corp" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="john@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" placeholder="+1 234 567 890" required>
                    </div>

                    <div class="form-group">
                        <label for="website">Website</label>
                        <input type="url" id="website" placeholder="https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="color">Card Color</label>
                        <input type="color" id="color" value="#4A90E2">
                    </div>

                    <div class="form-group">
                        <label for="textColor">Text Color</label>
                        <input type="color" id="textColor" value="#FFFFFF">
                    </div>

                    <button type="submit" class="btn-generate">Generate Card</button>
                </form>

                <div class="actions">
                    <button id="downloadBtn" class="btn-download" disabled>⬇ Download Card</button>
                    <button id="resetBtn" class="btn-reset">🔄 Reset</button>
                </div>
            </div>

            <div class="preview-section">
                <div class="card-preview">
                    <div id="businessCard" class="business-card">
                        <div class="card-content">
                            <div class="card-header">
                                <h2 id="cardName">John Doe</h2>
                                <p id="cardTitle">Software Developer</p>
                            </div>
                            <div class="divider"></div>
                            <div class="card-body">
                                <p id="cardCompany">Tech Corp</p>
                                <p id="cardEmail">john@example.com</p>
                                <p id="cardPhone">+1 234 567 890</p>
                                <p id="cardWebsite">https://example.com</p>
                            </div>
                            <div class="card-footer">
                                <span>✦</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
