<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Glassmorphism Music Player</title>

<link rel="stylesheet" href="style.css">

<link

crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

</head>

<body>

<!-- Animated Background -->

<div class="bg">

<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

</div>

<div class="app">

<!-- Sidebar -->

<aside class="sidebar">

<div class="logo">

🎵 GlassPlayer

<div class="menu">

<button class="menu-btn active">

</button>

<button class="menu-btn">

<button class="menu-btn">

<button class="menu-btn">

</button>

</div>

<div class="theme-switch">

<span>

🌞

type="checkbox"

<span class="slider"></span>

</label>

<span>

🌙

</span>

</aside>

<!-- Main Player -->

<main class="player">

<div class="album-wrapper">

<div class="vinyl"></div>

<img

id="albumArt"

src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800"

alt="Album Cover"

>

</div>

<h2 id="songTitle">

Dream It Possible

</h2>

<p id="artist">

Delacey

</p>

<!-- Equalizer -->

<div class="equalizer">

<span></span>
<span></span>
<span></span>
<span></span>
<span></span>

</div>

<!-- Progress -->

<div class="progress-container">

<span id="currentTime">

0:00

</span>

<div class="progress">

<div id="progressBar"></div>

</div>

<span id="duration">

3:45

</span>

</div>
<!-- Player Controls -->

<div class="controls">

<button
class="icon-btn"
id="shuffleBtn"
title="Shuffle">

🔀

</button>

<button
class="icon-btn"
id="prevBtn"
title="Previous">

⏮

</button>

<button
class="play-btn"
id="playBtn"
title="Play">

▶

</button>

<button
class="icon-btn"
id="nextBtn"
title="Next">

⏭

</button>

<button
class="icon-btn"
id="repeatBtn"
title="Repeat">

🔁

</button>

</div>

<!-- Extra Actions -->

<div class="actions">

<button
class="circle-btn"
id="favoriteBtn"
title="Favorite">

🤍

</button>

<button
class="circle-btn"
id="downloadBtn"
title="Download">

⬇

</button>

<button
class="circle-btn"
id="shareBtn"
title="Share">

📤

</button>

</div>

<!-- Volume -->

<div class="volume-container">

<span>

🔉

</span>

<input

type="range"

id="volume"

min="0"

max="100"

value="80"

>

<span>

🔊

</span>

</div>

</main>

<!-- Playlist -->

<aside class="playlist">

<h3>

Playlist

</h3>

<div class="playlist-list">

<div
class="track active"

data-index="0">

<img
src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=300">

<div>

<h4>

Dream It Possible

</h4>

<p>

Delacey

</p>

</div>

<span>

3:45

</span>

</div>

<div
class="track"
data-index="1">

<img
src="https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=300">

<div>

<h4>

Blinding Lights

</h4>

<p>

The Weeknd

</p>

</div>

<span>

3:21

</span>

</div>

<div
class="track"
data-index="2">

<img
src="https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=300">

<div>

<h4>

Faded

</h4>

<p>

Alan Walker

</p>

</div>

</span>

</div>

<div

data-index="3">

<img
src="https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?w=300">

<div>

<h4>

Perfect

</h4>

<p>

</p>

</div>

4:22

</span>

data-index="4">

<div>

<h4>

Stay

</h4>

<p>

</p>

</div>

2:43

</span>

</div>

</div>

</aside>

</div>

<!-- Toast -->

<div
id="toast">

Song Added ❤️

</div>

<script>
/* ===========================
   Playlist Data
=========================== */

const songs = [

{

title:"Dream It Possible",

artist:"Delacey",

duration:"3:45",

cover:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=800"

},

{

title:"Blinding Lights",

artist:"The Weeknd",

duration:"3:21",

cover:"https://images.unsplash.com/photo-1511379938547-c1f69419868d?w=800"

},

{

title:"Faded",

artist:"Alan Walker",

duration:"3:33",

cover:"https://images.unsplash.com/photo-1507838153414-b4b713384a76?w=800"

},

{

title:"Perfect",

artist:"Ed Sheeran",

duration:"4:22",

cover:"https://images.unsplash.com/photo-1496293455970-f8581aae0e3b?w=800"

},

{

title:"Stay",

artist:"The Kid LAROI",

duration:"2:43",

cover:"https://images.unsplash.com/photo-1487180144351-b8472da7d491?w=800"

}

];

/* ===========================
   Elements
=========================== */

const playBtn =
document.getElementById("playBtn");

const nextBtn =
document.getElementById("nextBtn");

const prevBtn =
document.getElementById("prevBtn");

const shuffleBtn =
document.getElementById("shuffleBtn");

const repeatBtn =
document.getElementById("repeatBtn");

const favoriteBtn =
document.getElementById("favoriteBtn");

const themeToggle =
document.getElementById("themeToggle");

const albumArt =
document.getElementById("albumArt");

const title =
document.getElementById("songTitle");

const artist =
document.getElementById("artist");

const duration =
document.getElementById("duration");

const progress =
document.getElementById("progressBar");

const currentTime =
document.getElementById("currentTime");

const toast =
document.getElementById("toast");

const volume =
document.getElementById("volume");

const tracks =
document.querySelectorAll(".track");

/* ===========================
   Variables
=========================== */

let currentSong = 0;

let playing = false;

let liked = false;

let repeat = false;

let shuffle = false;

let progressValue = 0;

let progressTimer;

/* ===========================
   Load Song
=========================== */

function loadSong(index){

title.textContent =
songs[index].title;

artist.textContent =
songs[index].artist;

duration.textContent =
songs[index].duration;

albumArt.src =
songs[index].cover;

tracks.forEach(track=>{

track.classList.remove("active");

});

tracks[index].classList.add("active");

progress.style.width="0%";

currentTime.textContent="0:00";

progressValue=0;

}
/* ===========================
   Play / Pause
=========================== */

function startPlayer(){

playing = true;

playBtn.innerHTML = "⏸";

albumArt.classList.add("spin");

document
.querySelector(".vinyl")
.classList.add("spin");

document
.querySelector(".equalizer")
.classList.add("playing");

progressTimer = setInterval(()=>{

progressValue += 0.45;

if(progressValue >= 100){

clearInterval(progressTimer);

if(repeat){

progressValue = 0;

startPlayer();

}
else{

nextSong();

}

}

progress.style.width =
progressValue + "%";

let total =
parseDuration(
songs[currentSong].duration
);

let current =
Math.floor(
(total * progressValue)/100
);

currentTime.textContent =
formatTime(current);

},120);

}

function pausePlayer(){

playing = false;

playBtn.innerHTML = "▶";

albumArt.classList.remove("spin");

document
.querySelector(".vinyl")
.classList.remove("spin");

document
.querySelector(".equalizer")
.classList.remove("playing");

clearInterval(progressTimer);

}

playBtn.onclick = ()=>{

playing
? pausePlayer()
: startPlayer();

};

/* ===========================
   Previous Song
=========================== */

function prevSong(){

currentSong--;

if(currentSong < 0){

currentSong =
songs.length-1;

}

loadSong(currentSong);

if(playing){

clearInterval(progressTimer);

startPlayer();

}

}

prevBtn.onclick = prevSong;

/* ===========================
   Next Song
=========================== */

function nextSong(){

if(shuffle){

currentSong =
Math.floor(
Math.random()*songs.length
);

}
else{

currentSong++;

if(currentSong>=songs.length){

currentSong=0;

}

}

loadSong(currentSong);

if(playing){

clearInterval(progressTimer);

startPlayer();

}

}

nextBtn.onclick = nextSong;
/* ===========================
   Shuffle
=========================== */

shuffleBtn.onclick = () => {

    shuffle = !shuffle;

    shuffleBtn.classList.toggle("active");

    showToast(
        shuffle
        ? "Shuffle Enabled 🔀"
        : "Shuffle Disabled"
    );

};

/* ===========================
   Repeat
=========================== */

repeatBtn.onclick = () => {

    repeat = !repeat;

    repeatBtn.classList.toggle("active");

    showToast(
        repeat
        ? "Repeat Enabled 🔁"
        : "Repeat Disabled"
    );

};

/* ===========================
   Favorite
=========================== */

favoriteBtn.onclick = () => {

    liked = !liked;

    favoriteBtn.innerHTML =
        liked ? "❤️" : "🤍";

    favoriteBtn.classList.toggle("active");

    showToast(

        liked
        ? "Added to Favorites ❤️"
        : "Removed from Favorites"

    );

};

/* ===========================
   Theme Toggle
=========================== */

themeToggle.addEventListener(
"change",

()=>{

document.body.classList.toggle(

"light-mode"

);

showToast(

themeToggle.checked

? "Light Theme ☀️"

: "Dark Theme 🌙"

);

});

/* ===========================
   Volume
=========================== */

volume.addEventListener(

"input",

()=>{

const value =
volume.value;

volume.style.background =
`linear-gradient(
90deg,
#7c3aed ${value}%,
rgba(255,255,255,.2) ${value}% )`;

});

/* ===========================
   Playlist Click
=========================== */

tracks.forEach(

(track,index)=>{

track.onclick=()=>{

currentSong=index;

loadSong(index);

if(playing){

clearInterval(progressTimer);

startPlayer();

}

showToast(

"Now Playing: "

+

songs[index].title

);

};

});
/* ===========================
   Format Time
=========================== */

function formatTime(seconds){

const mins =
Math.floor(seconds/60);

const secs =
seconds % 60;

return `${mins}:${secs<10?"0":""}${secs}`;

}

function parseDuration(duration){

const parts =
duration.split(":");

return (
parseInt(parts[0])*60
+
parseInt(parts[1])
);

}

/* ===========================
   Toast
=========================== */

function showToast(message){

toast.textContent = message;

toast.classList.add("show");

clearTimeout(
toast.timer
);

toast.timer =
setTimeout(()=>{

toast.classList.remove("show");

},1800);

}

/* ===========================
   Keyboard Shortcuts
=========================== */

document.addEventListener(

"keydown",

(e)=>{

if(

e.target.tagName==="INPUT"

) return;

switch(e.code){

case "Space":

e.preventDefault();

playing
? pausePlayer()
: startPlayer();

break;

case "ArrowRight":

nextSong();

break;

case "ArrowLeft":

prevSong();

break;

case "KeyM":

volume.value =
volume.value==0
?80
:0;

volume.dispatchEvent(
new Event("input")
);

showToast(

volume.value==0
?"Muted 🔇"
:"Volume Restored 🔊"

);

break;

}

});

/* ===========================
   Mini Player
=========================== */

window.addEventListener(

"scroll",

()=>{

const player =
document.querySelector(".player");

if(window.scrollY>120){

player.classList.add("mini");

}
else{

player.classList.remove("mini");

}

});

/* ===========================
   Double Click Album
=========================== */

albumArt.addEventListener(

"dblclick",

()=>{

liked=!liked;

favoriteBtn.innerHTML=
liked
?"❤️"
:"🤍";

favoriteBtn.classList.toggle(
"active"
);

showToast(

liked
?"Added to Favorites ❤️"
:"Removed from Favorites"

);

});

/* ===========================
   Auto Load
=========================== */

loadSong(currentSong);

volume.dispatchEvent(
new Event("input")
);
/* ===========================
   Equalizer Animation
=========================== */

const bars =
document.querySelectorAll(
".equalizer span"
);

let eqInterval;

function startEqualizer(){

clearInterval(eqInterval);

eqInterval =
setInterval(()=>{

bars.forEach(bar=>{

const h =
Math.floor(
Math.random()*28
)+8;

bar.style.height =
h+"px";

});

},180);

}

function stopEqualizer(){

clearInterval(eqInterval);

bars.forEach(bar=>{

bar.style.height="8px";

});

}

const originalStart =
startPlayer;

startPlayer=function(){

originalStart();

startEqualizer();

};

const originalPause =
pausePlayer;

pausePlayer=function(){

originalPause();

stopEqualizer();

};

/* ===========================
   Floating Music Notes
=========================== */

function createMusicNote(){

const note =
document.createElement("div");

note.className =
"music-note";

const icons =
["🎵","🎶","🎼"];

note.innerHTML =
icons[
Math.floor(
Math.random()*icons.length
)
];

note.style.left =
Math.random()*100+"vw";

note.style.animationDuration =
(
4+
Math.random()*3
)+"s";

document.body.appendChild(note);

setTimeout(()=>{

note.remove();

},7000);

}

setInterval(

createMusicNote,

2000

);

/* ===========================
   Vinyl Glow Effect
=========================== */

albumArt.addEventListener(

"mouseenter",

()=>{

albumArt.classList.add(
"glow"
);

});

albumArt.addEventListener(

"mouseleave",

()=>{

albumArt.classList.remove(
"glow"
);

});

/* ===========================
   Playlist Hover Preview
=========================== */

tracks.forEach(track=>{

track.addEventListener(

"mouseenter",

()=>{

track.classList.add(
"hover"
);

});

track.addEventListener(

"mouseleave",

()=>{

track.classList.remove(
"hover"
);

});

});
/* ===========================
   Theme Persistence
=========================== */

if(localStorage.getItem("theme")==="light"){

document.body.classList.add("light-mode");

themeToggle.checked=true;

}

themeToggle.addEventListener(

"change",

()=>{

localStorage.setItem(

"theme",

themeToggle.checked
?"light"
:"dark"

);

});

/* ===========================
   Playlist Search
=========================== */

const searchInput =
document.createElement("input");

searchInput.placeholder =
"Search songs...";

searchInput.className =
"playlist-search";

document
.querySelector(".playlist")
.prepend(searchInput);

searchInput.addEventListener(

"input",

()=>{

const value =
searchInput.value
.toLowerCase();

tracks.forEach((track,index)=>{

const match =

songs[index].title
.toLowerCase()
.includes(value)

||

songs[index].artist
.toLowerCase()
.includes(value);

track.style.display =
match
?"flex"
:"none";

});

});

/* ===========================
   Responsive Menu
=========================== */

window.addEventListener(

"resize",

()=>{

if(window.innerWidth<900){

document.body.classList.add(
"mobile"
);

}
else{

document.body.classList.remove(
"mobile"
);

}

});

/* ===========================
   Startup Animation
=========================== */

window.addEventListener(

"load",

()=>{

document.body.classList.add(
"loaded"
);

showToast(
"Welcome to GlassPlayer 🎵"
);

});

/* ===========================
   Playlist Auto Highlight
=========================== */

setInterval(()=>{

tracks.forEach((track,index)=>{

track.classList.toggle(

"playing",

index===currentSong
&&
playing

);

});

},300);

/* ===========================
   Initialize
=========================== */

loadSong(currentSong);

volume.dispatchEvent(
new Event("input")
);

window.dispatchEvent(
new Event("resize")
);

showToast(
"Ready to Play 🎧"
);

</script>

</body>

</html>
