<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Portfolio Tracker</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="radial-glow"></div>
  <main class="crypto-tracker">
    <header class="header">
      <div>
        <span class="label">Decentralized Asset Hub</span>
        <h1>Crypto Portfolio</h1>
      </div>
      <div class="total-bal">
        <span>Total Balance</span>
        <h2>$48,940.12</h2>
      </div>
    </header>

    <section class="assets-grid">
      <div class="card coin-card">
        <div class="coin-header">
          <h3>Bitcoin <span>BTC</span></h3>
          <span class="change positive">+4.2%</span>
        </div>
        <h4>0.84 BTC</h4>
        <p>$35,120.40</p>
      </div>

      <div class="card coin-card">
        <div class="coin-header">
          <h3>Ethereum <span>ETH</span></h3>
          <span class="change positive">+2.8%</span>
        </div>
        <h4>4.20 ETH</h4>
        <p>$13,819.72</p>
      </div>
    </section>
  </main>
</body>
</html>
