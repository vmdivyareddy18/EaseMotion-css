<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Wallet</title>
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
  <div class="ease-wallet">
    <header class="ease-wallet-header">
      <h1>Wallet</h1>
      <button class="ease-eye-toggle" id="eyeBtn" aria-label="Toggle balance visibility">&#128065;</button>
    </header>

    <div class="ease-balance-card">
      <span class="ease-balance-label">Total Balance</span>
      <span class="ease-balance-value" id="balanceValue">$12,847.32</span>
    </div>

    <div class="ease-token-list">
      <h3>Tokens</h3>
      <div class="ease-token-item">
        <span class="ease-token-icon" style="background:#f7931a20;color:#f7931a;">&#8383;</span>
        <div class="ease-token-info">
          <strong>Bitcoin</strong>
          <span class="ease-text-muted">BTC</span>
        </div>
        <div class="ease-token-amount">
          <strong>0.42 BTC</strong>
          <span class="ease-text-muted">$8,120.50</span>
        </div>
      </div>
      <div class="ease-token-item">
        <span class="ease-token-icon" style="background:#627eea20;color:#627eea;">&#120;</span>
        <div class="ease-token-info">
          <strong>Ethereum</strong>
          <span class="ease-text-muted">ETH</span>
        </div>
        <div class="ease-token-amount">
          <strong>2.15 ETH</strong>
          <span class="ease-text-muted">$3,924.82</span>
        </div>
      </div>
      <div class="ease-token-item">
        <span class="ease-token-icon" style="background:#9945ff20;color:#9945ff;">S</span>
        <div class="ease-token-info">
          <strong>Solana</strong>
          <span class="ease-text-muted">SOL</span>
        </div>
        <div class="ease-token-amount">
          <strong>12.8 SOL</strong>
          <span class="ease-text-muted">$802.00</span>
        </div>
      </div>
    </div>

    <button class="ease-send-btn" id="sendBtn">Send</button>
  </div>

  <div class="ease-modal-overlay" id="modalOverlay">
    <div class="ease-send-modal">
      <div class="ease-modal-header">
        <h3>Send Crypto</h3>
        <button class="ease-modal-close" id="closeModal">&times;</button>
      </div>
      <label>
        <span>Recipient Address</span>
        <input type="text" placeholder="0x... or wallet address" />
      </label>
      <label>
        <span>Amount (USD)</span>
        <input type="number" placeholder="0.00" step="0.01" />
      </label>
      <button class="ease-confirm-btn">Confirm</button>
    </div>
  </div>

  <script>
    const eyeBtn = document.getElementById('eyeBtn');
    const balanceEl = document.getElementById('balanceValue');
    let hidden = false;

    eyeBtn.addEventListener('click', () => {
      hidden = !hidden;
      balanceEl.classList.toggle('ease-balance-hidden', hidden);
      eyeBtn.innerHTML = hidden ? '&#128064;' : '&#128065;';
    });

    document.getElementById('sendBtn').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.add('ease-modal-open');
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('modalOverlay').classList.remove('ease-modal-open');
    });

    document.getElementById('modalOverlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('ease-modal-open');
      }
    });
  </script>
</body>
</html>
