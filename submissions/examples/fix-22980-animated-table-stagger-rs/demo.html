<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EaseMotion - Animated Table with Row Entry Stagger</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="demo-container">
        <header class="demo-header">
            <h1>Animated Table Stagger</h1>
            <p>Rows animate sequentially using CSS nth-child stagger delays.</p>
        </header>
        
        <table class="ease-table-stagger">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Role</th>
                </tr>
            </thead>
            <tbody>
                <tr class="ease-row-animate">
                    <td>#001</td>
                    <td>Alex Johnson</td>
                    <td><span class="badge active">Active</span></td>
                    <td>Admin</td>
                </tr>
                <tr class="ease-row-animate">
                    <td>#002</td>
                    <td>Maria Garcia</td>
                    <td><span class="badge pending">Pending</span></td>
                    <td>Editor</td>
                </tr>
                <tr class="ease-row-animate">
                    <td>#003</td>
                    <td>James Smith</td>
                    <td><span class="badge active">Active</span></td>
                    <td>Contributor</td>
                </tr>
                <tr class="ease-row-animate">
                    <td>#004</td>
                    <td>Linda Martinez</td>
                    <td><span class="badge inactive">Inactive</span></td>
                    <td>Viewer</td>
                </tr>
                <tr class="ease-row-animate">
                    <td>#005</td>
                    <td>Michael Brown</td>
                    <td><span class="badge active">Active</span></td>
                    <td>Editor</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
