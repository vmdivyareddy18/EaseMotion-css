<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Soft Rotate-Click Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="neu-modal-toggle" class="ease-neu-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Button -->
  <label for="neu-modal-toggle" class="ease-neu-trigger-um" tabindex="0">
    Sync Devices
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-neu-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="neu-modal-toggle" class="ease-neu-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-neu-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon -->
      <label for="neu-modal-toggle" class="ease-neu-close-icon-um" aria-label="Close Modal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Center Icon -->
      <div class="ease-neu-icon-um">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.5 2v6h-6M2.13 15.57a10 10 0 1 0 1.25-10.45l5.24 3.03M2.5 22v-6h6M21.87 8.43a10 10 0 1 0-1.25 10.45l-5.24-3.03"></path>
        </svg>
      </div>

      <!-- Content -->
      <h2 id="modal-title" class="ease-neu-title-um">Syncing Complete</h2>
      <p class="ease-neu-desc-um">
        Your data has been successfully synchronized across all your devices using the Neumorphic Soft UI design pattern.
      </p>
      
      <!-- Action Buttons -->
      <div class="ease-neu-actions-um">
        <label for="neu-modal-toggle" class="ease-neu-btn-um">
          Undo
        </label>
        <label for="neu-modal-toggle" class="ease-neu-btn-um ease-neu-btn-primary-um">
          Done
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
