<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Image Color Reveal Demo</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    body {
      font-family: sans-serif;
      background: #f4f4f7;
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      flex-wrap: wrap;
      padding: 2rem;
    }

    img {
      width: 220px;
      height: 220px;
      object-fit: cover;
    }

    p.hint {
      width: 100%;
      text-align: center;
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <img
    class="image-color-reveal"
    src="https://picsum.photos/220/220?random=1"
    alt="Team member portrait"
    tabindex="0"
  />
  <img
    class="image-color-reveal"
    src="https://picsum.photos/220/220?random=2"
    alt="Product photo"
    tabindex="0"
  />

  <p class="hint">Hover or Tab-focus each image to reveal color.</p>

</body>
</html>
