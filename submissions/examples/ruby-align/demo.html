<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruby Align Utilities</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; }
    .demo-item { margin: 0.5rem; padding: 0.75rem 1rem; border: 1px solid #ccc; border-radius: 4px; }
    .dark body { background: #1a1a1a; color: #eee; }
    .dark .demo-item { border-color: #444; }
  </style>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="demo-item ruby-start">.ruby-start</div>
  <div class="demo-item ruby-center">.ruby-center</div>
  <div class="demo-item ruby-space-between">.ruby-space-between</div>
  <div class="demo-item ruby-space-around">.ruby-space-around</div>
  <div class="demo-item ruby-vert-lr">.ruby-vert-lr</div>
  <div class="demo-item ruby-vert-rl">.ruby-vert-rl</div>
</body>
</html>
