<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Notification Stack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="notifications">

<div class="toast success">
<div>
<h3>Success</h3>
<p>Your changes have been saved.</p>
</div>
</div>

<div class="toast info">
<div>
<h3>Update</h3>
<p>New animation library available.</p>
</div>
</div>

<div class="toast warning">
<div>
<h3>Warning</h3>
<p>Storage space is running low.</p>
</div>
</div>

</div>

</body>
</html>
