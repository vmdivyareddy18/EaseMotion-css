<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milestone Progress Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="progress-page">
      <section class="progress-card ease-fade-in">
        <header class="progress-card__header">
          <p class="eyebrow">Project roadmap</p>
          <h1>Milestone Progress Bar</h1>
          <p class="description">
            Track progress across planning, design, development, testing, and launch stages with a polished CSS-only milestone bar.
          </p>
        </header>

        <div class="progress-track">
          <div class="progress-line"></div>
          <div class="progress-line progress-line--fill"></div>

          <ul class="milestone-list">
            <li class="milestone milestone--done">
              <span class="milestone__marker"></span>
              <span class="milestone__label">Planning</span>
            </li>
            <li class="milestone milestone--done">
              <span class="milestone__marker"></span>
              <span class="milestone__label">Design</span>
            </li>
            <li class="milestone milestone--current">
              <span class="milestone__marker"></span>
              <span class="milestone__label">Development</span>
            </li>
            <li class="milestone milestone--future">
              <span class="milestone__marker"></span>
              <span class="milestone__label">Testing</span>
            </li>
            <li class="milestone milestone--future">
              <span class="milestone__marker"></span>
              <span class="milestone__label">Launch</span>
            </li>
          </ul>
        </div>

        <div class="progress-summary">
          <div>
            <span class="summary-value">60%</span>
            <span class="summary-label">completed</span>
          </div>
          <div>
            <span class="summary-value">3 of 5</span>
            <span class="summary-label">milestones</span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
