<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teleport Fade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Teleport Fade</h1>
  <div class="teleport-fade"><div class="teleport-box"><span class="tp-glyph">✦</span></div><div class="tp-particle" style="--dx:-20px;--dy:-30px;--d:0s"></div><div class="tp-particle" style="--dx:25px;--dy:-15px;--d:0.1s"></div><div class="tp-particle" style="--dx:-10px;--dy:25px;--d:0.2s"></div></div>
</body>
</html>
