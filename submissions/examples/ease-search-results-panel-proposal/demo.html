<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Search Results Panel | EaseMotion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="search-demo-page">
  <main class="search-wrapper">
    <header class="search-header">
      <h1 class="search-title">Animated Search Panel</h1>
      <p class="search-subtitle">Search results dropdown proposed for <code>components/</code>.</p>
    </header>

    <div class="search-container">
      <input type="text" class="search-input" placeholder="Search for something (click to open)..." onclick="this.nextElementSibling.classList.toggle('ease-search-panel--open')" onblur="setTimeout(() => this.nextElementSibling.classList.remove('ease-search-panel--open'), 200)">
      
      <div class="ease-search-panel ease-search-panel--open">
        <!-- Categories -->
        <div class="ease-search-group">
          <div class="ease-search-group__title">Components</div>
          <a href="#" class="ease-search-item">
            <svg class="ease-search-icon" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/></svg>
            Animated <span class="ease-search-item__highlight">Bread</span>crumb
          </a>
          <a href="#" class="ease-search-item">
            <svg class="ease-search-icon" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/></svg>
            Circular <span class="ease-search-item__highlight">Pro</span>gress Bar
          </a>
        </div>
        
        <div class="ease-search-group">
          <div class="ease-search-group__title">Utilities</div>
          <a href="#" class="ease-search-item">
            <svg class="ease-search-icon" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14m0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16"/></svg>
            Filter <span class="ease-search-item__highlight">Bright</span>ness
          </a>
        </div>
        
        <!-- No Results state (hidden by default, can be toggled for demo) -->
        <!--
        <div class="ease-search-no-results">
          <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <p>No results found for "<span class="ease-search-item__highlight">xyz</span>"</p>
        </div>
        -->
      </div>
    </div>
    
  </main>
</body>
</html>
