<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Particle Signature Pad — EaseMotion CSS</title>
    <!-- Load EaseMotion CSS via relative path -->
    <link rel="stylesheet" href="../../easemotion.css" />
    <!-- Load component specific styles -->
    <link rel="stylesheet" href="./style.css" />
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Hidden state controls for interactive pure-CSS flow -->
    <input
      type="radio"
      id="state-idle"
      name="pad-state"
      checked
      class="state-control"
    />
    <input
      type="radio"
      id="state-signing"
      name="pad-state"
      class="state-control"
    />

    <div class="banking-container">
      <div class="banking-card">
        <!-- Card Header -->
        <div class="card-header">
          <div class="bank-logo">
            <svg
              viewBox="0 0 24 24"
              width="24"
              height="24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="11" width="18" height="10" rx="2" />
              <path d="M12 2L2 7h20L12 2zM6 11v10M18 11v10M12 11v10" />
            </svg>
            <span>TRUSTPAY SECURE</span>
          </div>
          <div class="status-badge status-pending">
            <span class="pulse-dot"></span>
            Pending Verification
          </div>
          <div class="status-badge status-verified">Verified & Authorized</div>
        </div>

        <!-- Transaction Details -->
        <div class="transaction-details">
          <div class="detail-row">
            <span class="label">Transaction ID</span>
            <span class="value font-mono">TXN-849204-EM</span>
          </div>
          <div class="detail-row">
            <span class="label">Amount</span>
            <span class="value highlight">$4,950.00 USD</span>
          </div>
        </div>

        <!-- Interactive Signature Pad Wrapper -->
        <div class="signature-pad-wrapper">
          <div class="pad-grid-bg"></div>

          <!-- Instruction Overlay -->
          <div class="instruction-overlay">
            <svg
              viewBox="0 0 24 24"
              width="32"
              height="32"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
            <p>Click "Authorize & Sign" below to verify identity</p>
          </div>

          <!-- The SVG Signature Path -->
          <svg class="signature-svg" viewBox="0 0 400 150" fill="none">
            <!-- Main Name (Cursive J. Doe style) -->
            <path
              class="signature-path main-path"
              d="M 80,100 C 70,60 60,30 90,30 C 110,30 100,70 70,120 C 50,150 40,110 50,90 C 60,70 90,60 120,60 C 130,60 135,75 140,75 C 145,75 150,65 155,65 C 160,65 165,75 170,75 C 175,75 180,60 185,60 C 190,60 195,75 200,75 C 205,75 210,65 215,65 C 220,65 225,75 230,75 C 235,75 240,55 245,55 C 250,55 255,75 260,75 C 265,75 270,70 280,60"
            />
            <!-- Underline flourish swoop -->
            <path
              class="signature-path swoop-path"
              d="M 60,110 C 120,110 180,115 240,110 C 280,105 320,95 340,80 C 350,70 330,85 300,95 C 250,110 180,115 110,110 C 70,105 50,100 65,95"
            />
          </svg>

          <!-- Particle Emitters positioned along the path -->
          <div
            class="particle-emitter"
            style="left: 20%; top: 60%; --delay: 0.2s"
          >
            <span class="particle" style="--dx: -12px; --dy: -8px"></span>
            <span class="particle" style="--dx: 8px; --dy: -15px"></span>
            <span class="particle" style="--dx: -5px; --dy: 12px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 21.5%; top: 20%; --delay: 0.5s"
          >
            <span class="particle" style="--dx: -15px; --dy: -10px"></span>
            <span class="particle" style="--dx: 15px; --dy: -5px"></span>
            <span class="particle" style="--dx: 5px; --dy: 15px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 17.5%; top: 80%; --delay: 0.8s"
          >
            <span class="particle" style="--dx: -8px; --dy: -12px"></span>
            <span class="particle" style="--dx: 12px; --dy: 8px"></span>
            <span class="particle" style="--dx: -10px; --dy: 10px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 30%; top: 40%; --delay: 1.1s"
          >
            <span class="particle" style="--dx: -14px; --dy: -14px"></span>
            <span class="particle" style="--dx: 14px; --dy: -8px"></span>
            <span class="particle" style="--dx: 8px; --dy: 14px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 42.5%; top: 50%; --delay: 1.4s"
          >
            <span class="particle" style="--dx: -10px; --dy: -10px"></span>
            <span class="particle" style="--dx: 12px; --dy: -12px"></span>
            <span class="particle" style="--dx: -6px; --dy: 15px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 55%; top: 45%; --delay: 1.8s"
          >
            <span class="particle" style="--dx: -12px; --dy: -6px"></span>
            <span class="particle" style="--dx: 10px; --dy: -14px"></span>
            <span class="particle" style="--dx: 12px; --dy: 10px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 65%; top: 40%; --delay: 2.2s"
          >
            <span class="particle" style="--dx: -15px; --dy: -8px"></span>
            <span class="particle" style="--dx: 8px; --dy: -12px"></span>
            <span class="particle" style="--dx: 4px; --dy: 15px"></span>
          </div>
          <!-- Swoop swoop emitters -->
          <div
            class="particle-emitter"
            style="left: 30%; top: 73%; --delay: 2.5s"
          >
            <span class="particle" style="--dx: -10px; --dy: -10px"></span>
            <span class="particle" style="--dx: 10px; --dy: -6px"></span>
            <span class="particle" style="--dx: -4px; --dy: 12px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 60%; top: 73%; --delay: 2.8s"
          >
            <span class="particle" style="--dx: -12px; --dy: -8px"></span>
            <span class="particle" style="--dx: 14px; --dy: -14px"></span>
            <span class="particle" style="--dx: 2px; --dy: 15px"></span>
          </div>
          <div
            class="particle-emitter"
            style="left: 85%; top: 53%; --delay: 3.1s"
          >
            <span class="particle" style="--dx: -15px; --dy: -15px"></span>
            <span class="particle" style="--dx: 15px; --dy: -10px"></span>
            <span class="particle" style="--dx: 5px; --dy: 15px"></span>
          </div>
        </div>

        <!-- Action buttons linked to radio states -->
        <div class="action-footer">
          <label for="state-signing" class="action-btn btn-primary">
            <svg
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
            Authorize & Sign
          </label>
          <label for="state-idle" class="reset-link"> Clear & Reset Pad </label>
        </div>
      </div>
    </div>
  </body>
</html>
