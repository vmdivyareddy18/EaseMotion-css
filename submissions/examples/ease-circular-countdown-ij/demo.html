<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo">
    <h1>Circular Countdown</h1>

    <div class="countdown-container">
      <svg class="countdown-svg" viewBox="0 0 100 100">
        <circle class="countdown-track" cx="50" cy="50" r="40" />
        <circle class="countdown-progress" cx="50" cy="50" r="40" />
      </svg>
      <span class="countdown-text" id="countdownText">10</span>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="startBtn">Start</button>
      <button class="btn btn-reset" id="resetBtn">Reset</button>
    </div>

    <p class="hint">Enter seconds:</p>
    <input type="number" id="secondsInput" class="seconds-input" value="10" min="1" max="120">
  </main>

  <script>
    const svg = document.querySelector(".countdown-progress");
    const textEl = document.getElementById("countdownText");
    const startBtn = document.getElementById("startBtn");
    const resetBtn = document.getElementById("resetBtn");
    const input = document.getElementById("secondsInput");

    const radius = 40;
    const circumference = 2 * Math.PI * radius;
    let totalSeconds = 10;
    let remaining = 10;
    let interval = null;
    let running = false;

    svg.style.strokeDasharray = circumference;

    function setProgress(frac) {
      svg.style.strokeDashoffset = circumference * (1 - frac);
    }

    function updateDisplay() {
      textEl.textContent = Math.ceil(remaining);
      setProgress(remaining / totalSeconds);
    }

    function stopTimer() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      running = false;
      startBtn.textContent = "Start";
    }

    function startTimer() {
      if (running) return;
      totalSeconds = Math.max(1, parseInt(input.value, 10) || 10);
      remaining = totalSeconds;
      updateDisplay();
      running = true;
      startBtn.textContent = "Pause";
      interval = setInterval(() => {
        remaining -= 0.1;
        if (remaining <= 0) {
          remaining = 0;
          updateDisplay();
          stopTimer();
          startBtn.textContent = "Done";
          return;
        }
        updateDisplay();
      }, 100);
    }

    function resetTimer() {
      stopTimer();
      totalSeconds = Math.max(1, parseInt(input.value, 10) || 10);
      remaining = totalSeconds;
      updateDisplay();
      startBtn.textContent = "Start";
    }

    startBtn.addEventListener("click", () => {
      if (running) {
        stopTimer();
      } else {
        startTimer();
      }
    });

    resetBtn.addEventListener("click", resetTimer);

    resetTimer();
  </script>
</body>
</html>
