<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Fluid Toggle Switch — EaseMotion CSS</title>
  <meta name="description" content="Visual toggle switch showcase demonstrating neumorphic shadow shifts and fluid interactive states.">
  <link rel="stylesheet" href="../../easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header>
      <span class="demo-badge">EaseMotion CSS — Components</span>
      <h1>Neumorphic Toggle</h1>
      <p class="description">
        Demonstrates soft shadow extrusion. Click the toggle switch below 
        to observe the fluid indent transition.
      </p>
    </header>

    <main class="showcase">
      <div class="neumorphic-card">
        <!-- Toggle Switch Control under Test -->
        <label class="toggle-switch">
          <input type="checkbox" class="toggle-input">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">System Mode</span>
      </div>
    </main>
  </div>

</body>
</html>
