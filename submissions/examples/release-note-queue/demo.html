<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Release Note Queue</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="queue">
    <section class="mast">
      <p>Launch Readiness</p>
      <h1>Release Note Queue</h1>
      <span>12 notes waiting for publish review</span>
    </section>

    <section class="items" aria-label="Release note queue">
      <article>
        <strong>Customer summary</strong>
        <span class="ready">Ready</span>
        <p>Plain-language overview approved by product marketing.</p>
      </article>
      <article>
        <strong>API changes</strong>
        <span class="review">Review</span>
        <p>Endpoint examples need final version number check.</p>
      </article>
      <article>
        <strong>Known issues</strong>
        <span class="hold">Hold</span>
        <p>Support team is confirming workaround accuracy.</p>
      </article>
    </section>
  </main>
</body>
</html>
