<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-zeppelin-float</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Zeppelin Float</h1>
    <div class="animation-wrapper">
      <div class="sky">
        <div class="zeppelin">
          <div class="blimp"></div>
          <div class="gondola"></div>
          <div class="fin left-fin"></div>
          <div class="fin right-fin"></div>
          <div class="propeller"></div>
        </div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
      </div>
    </div>
    <div class="controls">
      <label>
        Blimp Color
        <input type="color" class="js-color" value="#ddd" data-var="--blimp-color" />
      </label>
      <label>
        Gondola Color
        <input type="color" class="js-color" value="#888" data-var="--gondola-color" />
      </label>
      <label>
        Float Duration
        <input type="range" class="js-range" min="2" max="15" step="0.5" value="6" data-var="--float-duration" />
        <span class="js-range-value">6s</span>
      </label>
    </div>
  </div>
  <script>
    document.querySelectorAll('.js-color').forEach(el => {
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value);
      });
    });
    document.querySelectorAll('.js-range').forEach(el => {
      const display = el.parentElement.querySelector('.js-range-value');
      el.addEventListener('input', () => {
        document.documentElement.style.setProperty(el.dataset.var, el.value + 's');
        if (display) display.textContent = el.value + 's';
      });
    });
  </script>
</body>
</html>
