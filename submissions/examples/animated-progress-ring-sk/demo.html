<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Progress Ring Example</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header class="header">
            <h1>Animated Progress Rings</h1>
            <p>Reusable SVG circular progress indicators tracking skill proficiencies and dashboard statistics.</p>
        </header>

        <!-- Grid Layout for Multiple Ring Variants -->
        <main class="metrics-grid">
            
            <!-- Card 1: Solid Teal Style (90%) -->
            <div class="metric-card">
                <div class="progress-ring-wrapper">
                    <svg class="progress-ring" width="120" height="120">
                        <circle class="progress-ring-bg" cx="60" cy="60" r="52" />
                        <circle class="progress-ring-fill teal-ring" cx="60" cy="60" r="52" style="--target-offset: 32.6" />
                    </svg>
                    <div class="progress-text">90%</div>
                </div>
                <h3>Frontend Skills</h3>
                <p>React & TypeScript Development</p>
            </div>

            <!-- Card 2: Gradient Purple Style (75%) -->
            <div class="metric-card">
                <div class="progress-ring-wrapper">
                    <svg class="progress-ring" width="120" height="120">
                        <defs>
                            <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#a855f7" />
                                <stop offset="100%" stop-color="#6366f1" />
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring-bg" cx="60" cy="60" r="52" />
                        <circle class="progress-ring-fill" cx="60" cy="60" r="52" stroke="url(#purple-grad)" style="--target-offset: 81.6" />
                    </svg>
                    <div class="progress-text">75%</div>
                </div>
                <h3>Backend Infrastructure</h3>
                <p>Node.js & System Architecture</p>
            </div>

            <!-- Card 3: Small Amber Variant (60%) -->
            <div class="metric-card variant-small">
                <div class="progress-ring-wrapper">
                    <svg class="progress-ring" width="90" height="90">
                        <circle class="progress-ring-bg" cx="45" cy="45" r="38" />
                        <circle class="progress-ring-fill amber-ring" cx="45" cy="45" r="38" style="--target-offset: 95.5" />
                    </svg>
                    <div class="progress-text text-small">60%</div>
                </div>
                <h3>UI/UX Design</h3>
                <p>Figma Mockups & Wireframing</p>
            </div>

        </main>
    </div>
</body>
</html>
