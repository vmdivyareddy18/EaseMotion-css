<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EaseMotion CSS - Shake Cookie Notification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../../easemotion.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Dismiss State Input Toggle -->
    <input
      type="checkbox"
      id="cookie-dismiss-ag"
      class="state-input-ag"
      aria-hidden="true"
    />

    <!-- Replay Trigger Button -->
    <button
      type="button"
      class="replay-btn-ag"
      onclick="triggerReplay()"
      aria-label="Replay telemetry nudge animation"
    >
      [ REPLAY ]
    </button>

    <!-- Outer wrapper centers the layout on the screen -->
    <div class="cookie-banner-wrapper-ag">
      <section
        class="cookie-banner-ag"
        role="dialog"
        aria-labelledby="cookie-title-ag"
        aria-describedby="cookie-desc-ag"
      >
        <div class="cookie-header-ag">
          <div class="cookie-status-ag">
            <span class="status-led-ag" aria-hidden="true"></span>
            <span class="status-text-ag">[SYS_ALERT: CONSENT_REQUIRED]</span>
          </div>
          <label
            for="cookie-dismiss-ag"
            class="cookie-close-ag"
            role="button"
            aria-label="Close telemetry alert without saving"
            tabindex="0"
            >✕</label
          >
        </div>

        <div class="cookie-body-ag">
          <h2 id="cookie-title-ag" class="cookie-title-ag">
            Telemetry Authorization
          </h2>

          <p id="cookie-desc-ag" class="cookie-desc-ag">
            This terminal utilizes tracking beacons to calibrate synapse latency
            and stabilize your network uplink.
          </p>

          <div class="cookie-actions-ag">
            <label
              for="cookie-dismiss-ag"
              class="cyber-btn-ag primary-btn-ag"
              role="button"
              tabindex="0"
            >
              [ AUTHORIZE ]
            </label>

            <label
              for="cookie-dismiss-ag"
              class="cyber-btn-ag secondary-btn-ag"
              role="button"
              tabindex="0"
            >
              [ REJECT ]
            </label>
          </div>
        </div>
      </section>
    </div>

    <script>
      function triggerReplay() {
        const dismiss = document.getElementById("cookie-dismiss-ag");
        dismiss.checked = false;

        const banner = document.querySelector(".cookie-banner-ag");

        // Clear the animation to force a layout recalculation,
        // then restore it to retrigger the slide-in + shake sequence.
        banner.style.animation = "none";
        void banner.offsetWidth;
        banner.style.animation = "";
      }

      document
        .querySelectorAll(".cookie-close-ag, .cyber-btn-ag")
        .forEach((el) => {
          el.setAttribute("tabindex", "0");
          el.addEventListener("keydown", (e) => {
            if (e.key === " " || e.key === "Enter") {
              e.preventDefault();
              const targetId = el.getAttribute("for");
              if (targetId) {
                const targetInput = document.getElementById(targetId);
                if (targetInput) {
                  targetInput.checked = !targetInput.checked;
                  targetInput.dispatchEvent(
                    new Event("change", { bubbles: true })
                  );
                }
              } else {
                el.click();
              }
            }
          });
        });
    </script>
  </body>
</html>
