<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalog Scale-Hover Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Hidden checkbox to control the modal state (Zero JS) -->
  <input type="checkbox" id="prod-modal-toggle" class="ease-prod-modal-toggle-um" aria-label="Toggle Modal">
  
  <!-- Trigger Container (e.g. a product card in a grid) -->
  <label for="prod-modal-toggle" class="ease-prod-trigger-card-um" tabindex="0">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbGw9IiNlOWVjZWYiLz48L3N2Zz4=" alt="Placeholder">
    <div style="font-weight: 600; margin-bottom: 0.5rem; color: #212529;">Classic Chronograph</div>
    <div style="color: #6c757d; margin-bottom: 1rem;">$249.00</div>
    <div class="ease-prod-trigger-btn-um">Quick View</div>
  </label>

  <!-- Modal Overlay Container -->
  <div class="ease-prod-overlay-um">
    
    <!-- Background backdrop for click-outside-to-close -->
    <label for="prod-modal-toggle" class="ease-prod-backdrop-close-um" aria-label="Close Modal"></label>
    
    <!-- Actual Modal Window -->
    <div class="ease-prod-window-um" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      
      <!-- Top Right Close Icon (Absolute positioned over the whole window) -->
      <label for="prod-modal-toggle" class="ease-prod-close-icon-um" aria-label="Close Modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </label>

      <!-- Left Column: Image -->
      <div class="ease-prod-image-um">
        <!-- Background gradient and ::before pseudo-element handle the placeholder -->
      </div>

      <!-- Right Column: Details -->
      <div class="ease-prod-details-um">
        <h2 id="modal-title" class="ease-prod-title-um">Classic Chronograph</h2>
        <div class="ease-prod-price-um">$249.00</div>
        <p class="ease-prod-desc-um">
          Elevate your everyday style with our Classic Chronograph watch. Featuring a precision quartz movement, durable stainless steel casing, and a genuine leather strap. Water-resistant up to 50 meters.
        </p>
        
        <!-- Add to Cart Action -->
        <label for="prod-modal-toggle" class="ease-prod-btn-um">
          Add to Cart
        </label>
      </div>
      
    </div>
  </div>

</body>
</html>
