<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Focus Out - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="target-text">DISSOLVING CONTENT</h1>
        <button onclick="document.querySelector('.target-text').classList.add('ease-focus-out');">Blur Out</button>
        <button onclick="document.querySelector('.target-text').classList.remove('ease-focus-out');" style="border-color:#444; color:#888;">Reset</button>
    </div>
</body>
</html>
