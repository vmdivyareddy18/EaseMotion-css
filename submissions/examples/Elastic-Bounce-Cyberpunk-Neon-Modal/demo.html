<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elastic Bounce Cyberpunk Neon Modal</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<input type="checkbox" id="modal-toggle">

<label for="modal-toggle" class="open-btn">
    Initialize System
</label>

<div class="overlay">

    <div class="modal">

        <label for="modal-toggle" class="close-btn">&times;</label>

        <div class="status">SYSTEM ONLINE</div>

        <h2>Cyber Console</h2>

        <p>
            Access futuristic controls inside a glowing cyberpunk interface
            featuring a smooth Elastic Bounce animation powered entirely by CSS.
        </p>

        <div class="grid">

            <div class="panel">
                <span>⚡</span>
                <h4>Power</h4>
            </div>

            <div class="panel">
                <span>🛰️</span>
                <h4>Network</h4>
            </div>

            <div class="panel">
                <span>🛡️</span>
                <h4>Security</h4>
            </div>

        </div>

        <button>Enter Console</button>

    </div>

</div>

</body>
</html>
