<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glow Pulse Dark Minimalist Card</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

    <div class="indicator"></div>

    <span class="badge">ONLINE</span>

    <h2>System Overview</h2>

    <p>
        A minimal dashboard card featuring a smooth Glow Pulse animation,
        clean typography, and a distraction-free interface built entirely
        with HTML and CSS.
    </p>

    <div class="info">

        <div class="row">
            <span>Status</span>
            <strong>Active</strong>
        </div>

        <div class="row">
            <span>Version</span>
            <strong>v2.6</strong>
        </div>

        <div class="row">
            <span>Uptime</span>
            <strong>99.98%</strong>
        </div>

    </div>

    <button>View Details</button>

</div>

</body>
</html>
