<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auto Complete Input – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Auto Complete</h1>
  <p class="subtitle">Type to search – suggestions filter as you type</p>

  <div class="aci-wrapper">
    <div class="aci-input-wrap">
      <div class="aci-chips" id="chips"></div>
      <input
        type="text"
        class="aci-input"
        id="aciInput"
        placeholder="Search languages..."
        autocomplete="off"
      >
      <button class="aci-clear" id="clearBtn">&times;</button>
      <div class="aci-spinner" id="spinner"></div>
    </div>

    <ul class="aci-dropdown" id="dropdown"></ul>
  </div>

  <script>
    const items = [
      'JavaScript', 'TypeScript', 'Python', 'Rust', 'Go',
      'Java', 'Kotlin', 'Swift', 'Ruby', 'PHP',
      'C++', 'C#', 'Scala', 'Elixir', 'Clojure',
      'Haskell', 'Lua', 'Zig', 'Dart', 'Racket'
    ];

    const input = document.getElementById('aciInput');
    const dropdown = document.getElementById('dropdown');
    const chips = document.getElementById('chips');
    const clearBtn = document.getElementById('clearBtn');
    const spinner = document.getElementById('spinner');

    let selectedChips = [];
    let debounceTimer = null;

    function filterItems(query) {
      const q = query.toLowerCase();
      return items.filter(it =>
        it.toLowerCase().includes(q) &&
        !selectedChips.includes(it)
      );
    }

    function renderDropdown(results) {
      dropdown.innerHTML = '';
      if (results.length === 0) {
        dropdown.classList.remove('open');
        return;
      }
      results.forEach(item => {
        const li = document.createElement('li');
        li.className = 'aci-item';
        li.textContent = item;
        li.addEventListener('click', () => selectItem(item));
        dropdown.appendChild(li);
      });
      dropdown.classList.add('open');
    }

    function selectItem(item) {
      selectedChips.push(item);
      renderChips();
      input.value = '';
      input.focus();
      dropdown.classList.remove('open');
    }

    function removeChip(item) {
      selectedChips = selectedChips.filter(c => c !== item);
      renderChips();
      input.focus();
      const results = filterItems(input.value);
      renderDropdown(results);
    }

    function renderChips() {
      chips.innerHTML = '';
      selectedChips.forEach(item => {
        const chip = document.createElement('span');
        chip.className = 'aci-chip';
        chip.innerHTML = `${item} <span class="aci-chip-remove" data-item="${item}">&times;</span>`;
        chip.querySelector('.aci-chip-remove').addEventListener('click', () => removeChip(item));
        chips.appendChild(chip);
      });
    }

    function simulateAsync(query) {
      spinner.classList.add('loading');
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        const results = filterItems(query);
        renderDropdown(results);
        spinner.classList.remove('loading');
      }, 200);
    }

    input.addEventListener('input', () => {
      const val = input.value;
      if (val.length === 0) {
        dropdown.classList.remove('open');
        spinner.classList.remove('loading');
        clearTimeout(debounceTimer);
        return;
      }
      simulateAsync(val);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const results = filterItems(input.value);
        if (results.length > 0) {
          selectItem(results[0]);
        }
      }
      if (e.key === 'Escape') {
        dropdown.classList.remove('open');
        input.blur();
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.aci-wrapper')) {
        dropdown.classList.remove('open');
      }
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      dropdown.classList.remove('open');
      input.focus();
    });
  </script>
</body>
</html>
