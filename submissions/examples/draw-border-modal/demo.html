<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Draw-Border Line Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="demo-wrap">
    <button class="open-btn" id="openBtn" aria-haspopup="dialog" aria-controls="myModal">
      Proceed to Checkout
    </button>

    <div class="modal-overlay" id="overlay">
      <div class="modal" id="myModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" tabindex="-1">
        <svg class="border-line" viewBox="0 0 400 260" preserveAspectRatio="none">
          <rect x="2" y="2" width="396" height="256" rx="12" ry="12" />
        </svg>
        <button class="close-btn" id="closeBtn" aria-label="Close modal">&times;</button>
        <h2 id="modalTitle">Order Summary</h2>
        <p>Your total is <strong>$84.00</strong>. Confirm to complete checkout.</p>
        <button class="cta-btn">Confirm & Pay</button>
      </div>
    </div>
  </main>

  <script>
    const openBtn = document.getElementById('openBtn');
    const closeBtn = document.getElementById('closeBtn');
    const overlay = document.getElementById('overlay');
    const modal = document.getElementById('myModal');

    function openModal() {
      overlay.classList.add('active');
      modal.focus();
      document.addEventListener('keydown', onKeydown);
    }
    function closeModal() {
      overlay.classList.remove('active');
      openBtn.focus();
      document.removeEventListener('keydown', onKeydown);
    }
    function onKeydown(e) {
      if (e.key === 'Escape') closeModal();
    }

    openBtn.addEventListener('click', openModal);
    closeBtn.addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) closeModal();
    });
  </script>
</body>
</html>
