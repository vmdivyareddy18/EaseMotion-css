<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>atlas health pulse card demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="demo-shell" aria-label="atlas health pulse card demo">
    <section class="motion-card" data-pattern="pulse">
      <div class="status-orbit" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="card-copy">
        <p class="eyebrow">Uptime</p>
        <h1>atlas health pulse card</h1>
        <p>Edge queue nominal with a focused motion cue that keeps status changes easy to scan.</p>
      </div>
      <div class="metric-panel" aria-label="Uptime value">
        <strong>99.98%</strong>
        <span>Uptime</span>
      </div>
      <div class="progress-row" aria-hidden="true">
        <i></i><i></i><i></i><i></i>
      </div>
    </section>
  </main>
</body>
</html>
