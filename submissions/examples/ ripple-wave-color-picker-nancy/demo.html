<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ripple Wave Color Picker — News Portal Customizer</title>
  <link rel="stylesheet" href="style.css">
  <!-- Local EaseMotion CSS variable simulation for standalone compliance -->
  <style>
    :root {
      --ease-ripple-wave: cubic-bezier(0.1, 0.8, 0.25, 1);
      --ease-editorial: cubic-bezier(0.25, 1, 0.5, 1);
    }
  </style>
</head>
<body>

  <!-- News Portal Workspace Panel -->
  <div class="portal-panel">
    <div class="portal-header">
      <p class="ticker-tag">LIVE STYLING ENGINE</p>
      <h2>Editorial Theme Customizer</h2>
      <p class="description">Select a primary branding accent color for breaking news banner displays.</p>
    </div>

    <!-- Hidden Form Matrix for Pure CSS State Tracking -->
    <form class="color-picker-grid" onsubmit="return false;">
      
      <!-- Color Item 1: Politics Red -->
      <div class="color-node">
        <input type="radio" name="portal-color" id="color-red" class="picker-radio" checked>
        <label for="color-red" class="swatch-wrapper" style="--swatch-color: #dc2626;">
          <span class="swatch-circle"></span>
          <span class="ripple-wave-element"></span>
        </label>
        <span class="color-label">Politics Red</span>
      </div>

      <!-- Color Item 2: Business Blue -->
      <div class="color-node">
        <input type="radio" name="portal-color" id="color-blue" class="picker-radio">
        <label for="color-blue" class="swatch-wrapper" style="--swatch-color: #1d4ed8;">
          <span class="swatch-circle"></span>
          <span class="ripple-wave-element"></span>
        </label>
        <span class="color-label">Business Blue</span>
      </div>

      <!-- Color Item 3: Tech Teal -->
      <div class="color-node">
        <input type="radio" name="portal-color" id="color-teal" class="picker-radio">
        <label for="color-teal" class="swatch-wrapper" style="--swatch-color: #0f766e;">
          <span class="swatch-circle"></span>
          <span class="ripple-wave-element"></span>
        </label>
        <span class="color-label">Tech Teal</span>
      </div>

      <!-- Color Item 4: Opinion Amber -->
      <div class="color-node">
        <input type="radio" name="portal-color" id="color-amber" class="picker-radio">
        <label for="color-amber" class="swatch-wrapper" style="--swatch-color: #b45309;">
          <span class="swatch-circle"></span>
          <span class="ripple-wave-element"></span>
        </label>
        <span class="color-label">Opinion Amber</span>
      </div>

    </form>

    <div class="portal-footer">
      <p>Click any color swatch to emit an accelerated EaseMotion ripple wave transition mask across the structural boundary layers.</p>
    </div>
  </div>

</body>
</html>
