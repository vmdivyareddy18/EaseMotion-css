<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ease-glow-pulse-blue – Blue Glow Pulse</title>
  <link rel="stylesheet" href="../../core/easemotion.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="ease-bg-gray-50 ease-min-h-screen ease-flex ease-items-center ease-justify-center">

  <div class="ease-container ease-text-center">
    <h1 class="ease-text-3xl ease-font-bold ease-mb-4 ease-fade-in">
      Blue Glow Pulse
    </h1>
    <p class="ease-text-gray-500 ease-mb-8 ease-fade-in ease-delay-200">
      This card pulses with a soft blue glow to indicate an info or selected state.
    </p>

    <!-- Glowing element -->
    <div class="glow-pulse ease-card ease-p-8 ease-mx-auto ease-max-w-xs ease-shadow-md">
      <p class="ease-text-lg ease-font-semibold">Information</p>
      <p class="ease-text-sm ease-text-gray-500 ease-mt-2">Click me for details</p>
    </div>

    <p class="ease-text-sm ease-text-gray-400 ease-mt-8 ease-fade-in ease-delay-500">
      Glow color is controlled by <code>--ease-info-glow-color</code> (default blue).
    </p>
  </div>

</body>
</html>
