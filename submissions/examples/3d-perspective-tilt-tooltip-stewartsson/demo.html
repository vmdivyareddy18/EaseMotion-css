<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Hub - 3D Perspective Tilt Tooltip Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="marketing-viewport">
        <!-- Main Premium Marketing Campaign Card Elevation Container Hub Shell -->
        <div class="campaign-container-card">
            <header class="campaign-header">
                <div class="neon-matrix-badge">CONVERSION APEX v6</div>
                <h2 class="campaign-title">Enterprise Analytics Deck</h2>
                <p class="campaign-subtitle">Hover over or interact with the secure info target button below to witness the pure-CSS 3D perspective tilt tooltip sweep.</p>
            </header>

            <!-- Advanced Pure-CSS Tooltip Workspace Section Stage Canvas Area -->
            <div class="tooltip-workspace-area">
                <div class="tooltip-anchor-wrapper">
                    
                    <!-- Primary Interactive Focus Context Activation Button Module Anchor -->
                    <button class="tooltip-trigger-btn">
                        <span class="btn-icon">📈</span>
                        <span class="btn-text">Review Conversion Breakdown</span>
                    </button>

                    <!-- Floating Tooltip 3D Perspective Tilt Overlay Menu Shell Box -->
                    <div class="tilt-perspective-tooltip ease-3d-tilt-fly">
                        <!-- Internal Tooltip Grid Content Overlay Block Container -->
                        <div class="tooltip-inner-content">
                            <span class="fee-row">Conversion Ratio: +42.8%</span>
                            <span class="fee-meta">Optimizely Core Active</span>
                        </div>
                    </div>

                </div>
            </div>

            <footer class="campaign-footer">
                <div class="pipeline-sync-badge">
                    <span class="secure-beacon-dot"></span>
                    <span class="secure-label">Exposed CSS Root Parameters Operational</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
