<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glow Pulse Button</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="glow-page">
    <h1>Glow Pulse Buttons</h1>
    <div class="glow-group">
      <button class="glow-btn glow-purple">Get Started</button>
      <button class="glow-btn glow-green">Sign Up Free</button>
      <button class="glow-btn glow-red">Subscribe</button>
    </div>
    <div class="glow-variants">
      <button class="glow-btn glow-ghost">Ghost Pulse</button>
      <button class="glow-btn glow-border-only">Border Only</button>
    </div>
  </div>
</body>
</html>
