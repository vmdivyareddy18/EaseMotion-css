<!DOCTYPE html>
<html>
<head>
  <title>Copy To Clipboard UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="box">
  <input type="text" id="text" value="https://myportfolio.com" readonly>
  <button onclick="copyText()">Copy</button>
</div>

<p id="msg"></p>

<script>
function copyText() {
  let copy = document.getElementById("text");
  copy.select();
  document.execCommand("copy");
  document.getElementById("msg").innerText = "Copied!";
}
</script>

</body>
</html>
