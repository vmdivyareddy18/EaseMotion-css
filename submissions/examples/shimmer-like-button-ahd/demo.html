<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="An accessible shimmer like button built with pure HTML and CSS."
  >
  <title>Shimmer Like Button | EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="shimmer-demo">
    <section class="demo-card" aria-labelledby="demo-title">
      <h1 id="demo-title">Shimmer Like Button</h1>
      <p class="demo-description">
        Click the button to toggle the like state and enjoy a smooth
        CSS-powered shimmer animation.
      </p>

      <div class="like-button-wrapper">
        <input
          type="checkbox"
          id="shimmer-like-toggle"
          class="like-toggle"
        >

        <label
          for="shimmer-like-toggle"
          class="shimmer-like-button ease-shimmer"
          aria-label="Like this content"
        >
          <span class="shimmer-effect" aria-hidden="true"></span>

          <svg
            class="heart-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <path
              d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06
                 a5.5 5.5 0 0 0-7.78 7.78L12 21.23l8.84-8.84
                 a5.5 5.5 0 0 0 0-7.78Z"
            />
          </svg>

          <span class="button-label">
            <span class="unliked-text">Like</span>
            <span class="liked-text">Liked</span>
          </span>
        </label>
      </div>
    </section>
  </main>
</body>
</html>
