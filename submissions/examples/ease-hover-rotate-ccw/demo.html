<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hover Rotate Counter-Clockwise - EaseMotion CSS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-wrapper">

    <h1 class="demo-title">Hover Rotate (Counter-Clockwise)</h1>
    <p class="demo-caption">Hover over any icon below — it spins continuously counter-clockwise while hovered, and eases to a stop when you leave.</p>

    <div class="icon-row">

      <div class="ease-hover-rotate-ccw icon-box" title="Settings">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" stroke="currentColor" stroke-width="2"/>
          <path d="M19.4 13a7.97 7.97 0 000-2l2.1-1.6-2-3.5-2.5 1a8.1 8.1 0 00-1.7-1L14.9 3h-4l-.4 2.9a8.1 8.1 0 00-1.7 1l-2.5-1-2 3.5L6.4 11a7.97 7.97 0 000 2l-2.1 1.6 2 3.5 2.5-1c.5.4 1.1.75 1.7 1l.4 2.9h4l.4-2.9c.6-.25 1.2-.6 1.7-1l2.5 1 2-3.5L19.4 13z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
      </div>

      <div class="ease-hover-rotate-ccw icon-box" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4v6h6M20 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4.5 14a8 8 0 0014.5 3M19.5 10A8 8 0 005 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="ease-hover-rotate-ccw icon-box" title="Sun">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
          <path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

    </div>

  </div>

</body>
</html>
