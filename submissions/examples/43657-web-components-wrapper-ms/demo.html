<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Components Wrapper Demo</title>
  <!-- Global EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #e2e8f0; padding: 1rem;">
  
  <div class="ease-wc-container">
    <div>
      <h2 class="ease-wc-title">Web Component Integration</h2>
      <p class="ease-wc-desc">Demonstrating how to inject EaseMotion CSS into a Shadow DOM.</p>
    </div>

    <div class="ease-wc-stage">
      <!-- The custom element -->
      <ease-motion-button text="Hover Me (Shadow DOM)"></ease-motion-button>
    </div>

    <div class="ease-wc-hint">
      // Inside constructor():<br>
      const sheet = new CSSStyleSheet();<br>
      // Append raw CSS or @import <br>
      sheet.replaceSync(`@import url('../../../easemotion.min.css');`);<br>
      this.shadowRoot.adoptedStyleSheets = [sheet];
    </div>
  </div>

  <script>
    class EaseMotionButton extends HTMLElement {
      constructor() {
        super();
        this.attachShadow({ mode: 'open' });
        
        // Construct the template
        const wrapper = document.createElement('div');
        // Apply EaseMotion classes inside the shadow DOM
        wrapper.className = 'ease-btn ease-hover-lift ease-pulse-slow';
        wrapper.style.cssText = `
          background: #3b82f6; 
          color: white; 
          padding: 0.75rem 1.5rem; 
          border-radius: 0.5rem; 
          font-family: system-ui; 
          font-weight: 600; 
          cursor: pointer;
          display: inline-block;
        `;
        wrapper.textContent = this.getAttribute('text') || 'Button';

        // Method 1: Using a <link> tag inside the shadow root (Simplest)
        const linkElem = document.createElement('link');
        linkElem.setAttribute('rel', 'stylesheet');
        linkElem.setAttribute('href', '../../../easemotion.min.css');

        this.shadowRoot.append(linkElem, wrapper);
      }
    }

    customElements.define('ease-motion-button', EaseMotionButton);
  </script>

</body>
</html>
