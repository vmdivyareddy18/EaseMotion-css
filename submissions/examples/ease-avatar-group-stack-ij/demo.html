<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Group Stack – EaseMotion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Avatar Group</h1>
  <p class="subtitle">Hover to expand – add/remove avatars</p>

  <div class="ags-group" id="avatarGroup">
    <div class="ags-avatar" style="--i:0;">
      <img src="https://i.pravatar.cc/60?img=1" alt="Alice">
      <span class="ags-tooltip">Alice</span>
    </div>
    <div class="ags-avatar" style="--i:1;">
      <img src="https://i.pravatar.cc/60?img=2" alt="Bob">
      <span class="ags-tooltip">Bob</span>
    </div>
    <div class="ags-avatar" style="--i:2;">
      <img src="https://i.pravatar.cc/60?img=3" alt="Carol">
      <span class="ags-tooltip">Carol</span>
    </div>
    <div class="ags-avatar" style="--i:3;">
      <img src="https://i.pravatar.cc/60?img=4" alt="Dave">
      <span class="ags-tooltip">Dave</span>
    </div>
    <div class="ags-avatar" style="--i:4;">
      <img src="https://i.pravatar.cc/60?img=5" alt="Eve">
      <span class="ags-tooltip">Eve</span>
    </div>
    <div class="ags-count" id="countBadge">+3</div>
  </div>

  <div class="ags-controls">
    <button class="ags-btn" id="addBtn">+ Add Avatar</button>
    <button class="ags-btn" id="removeBtn">− Remove Last</button>
  </div>

  <script>
    const group = document.getElementById('avatarGroup');
    const countBadge = document.getElementById('countBadge');
    const addBtn = document.getElementById('addBtn');
    const removeBtn = document.getElementById('removeBtn');

    const names = ['Alice', 'Bob', 'Carol', 'Dave', 'Eve', 'Frank', 'Grace', 'Henry', 'Ivy', 'Jack'];
    let nextIdx = 5;

    function getAvatars() {
      return group.querySelectorAll('.ags-avatar');
    }

    function updateCount() {
      const count = getAvatars().length;
      const remaining = Math.max(0, 10 - count);
      countBadge.textContent = `+${remaining}`;
      if (remaining === 0) countBadge.style.display = 'none';
      else countBadge.style.display = 'flex';
    }

    function addAvatar() {
      const current = getAvatars().length;
      if (current >= 10) return;
      const name = names[nextIdx % names.length];
      const imgNum = (nextIdx % 10) + 1;
      nextIdx++;

      const div = document.createElement('div');
      div.className = 'ags-avatar';
      div.style.setProperty('--i', current);
      div.classList.add('adding');
      div.innerHTML = `
        <img src="https://i.pravatar.cc/60?img=${imgNum}" alt="${name}">
        <span class="ags-tooltip">${name}</span>
      `;
      group.insertBefore(div, countBadge);
      updateCount();

      setTimeout(() => div.classList.remove('adding'), 300);
    }

    function removeAvatar() {
      const avatars = getAvatars();
      if (avatars.length <= 1) return;
      const last = avatars[avatars.length - 1];
      last.classList.add('removing');
      setTimeout(() => {
        last.remove();
        updateCount();
      }, 250);
    }

    addBtn.addEventListener('click', addAvatar);
    removeBtn.addEventListener('click', removeAvatar);

    updateCount();
  </script>
</body>
</html>
