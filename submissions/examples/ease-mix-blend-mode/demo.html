<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Mix Blend Mode Demo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background-color: #f4f4f9;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    h1 { color: #333; }
    p { color: #666; margin-bottom: 30px; }
  </style>
</head>
<body>

  <h1>Ease Mix Blend Mode Utilities</h1>
  <p>Demo showcasing utility classes for the CSS <code>mix-blend-mode</code> property.</p>

  <div class="grid">
    <!-- Normal -->
    <div class="blend-container">
      <div class="blend-element blend-normal">Normal</div>
    </div>

    <!-- Multiply -->
    <div class="blend-container">
      <div class="blend-element blend-multiply">Multiply</div>
    </div>

    <!-- Screen -->
    <div class="blend-container">
      <div class="blend-element blend-screen">Screen</div>
    </div>

    <!-- Overlay -->
    <div class="blend-container">
      <div class="blend-element blend-overlay">Overlay</div>
    </div>

    <!-- Darken -->
    <div class="blend-container">
      <div class="blend-element blend-darken">Darken</div>
    </div>

    <!-- Lighten -->
    <div class="blend-container">
      <div class="blend-element blend-lighten">Lighten</div>
    </div>

    <!-- Difference -->
    <div class="blend-container">
      <div class="blend-element blend-difference">Difference</div>
    </div>

    <!-- Luminosity -->
    <div class="blend-container">
      <div class="blend-element blend-luminosity">Luminosity</div>
    </div>
  </div>

</body>
</html>
