<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ease-empty-cart Demo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ease-empty-cart">
  <div class="ease-empty-cart__illustration">🛒</div>

  <h2 class="ease-empty-cart__title">Your cart is empty</h2>
  <p class="ease-empty-cart__subtitle">Looks like you haven't added anything yet. Start exploring and find something you love.</p>

  <button class="ease-empty-cart__cta">Continue Shopping</button>

  <div class="ease-empty-cart__suggested">
    <p class="ease-empty-cart__suggested-title">You might like</p>
    <div class="ease-empty-cart__products">
      <div class="ease-empty-cart__product">
        <div class="ease-empty-cart__product-icon">👟</div>
        <div class="ease-empty-cart__product-name">Sneakers</div>
        <div class="ease-empty-cart__product-price">$59</div>
      </div>
      <div class="ease-empty-cart__product">
        <div class="ease-empty-cart__product-icon">🎒</div>
        <div class="ease-empty-cart__product-name">Backpack</div>
        <div class="ease-empty-cart__product-price">$42</div>
      </div>
      <div class="ease-empty-cart__product">
        <div class="ease-empty-cart__product-icon">⌚</div>
        <div class="ease-empty-cart__product-name">Watch</div>
        <div class="ease-empty-cart__product-price">$89</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
