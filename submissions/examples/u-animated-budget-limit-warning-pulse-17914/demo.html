<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Budget Limit Warning Pulse</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Budget Limit Warning Pulse</h1>

  <p class="intro">
    A reusable budget alert animation for finance apps,
    expense trackers, and budgeting dashboards.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="budget-warning">
        <span class="warning-icon">⚠️</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

      <h3>90% Budget Used</h3>
    </div>

    <div class="card">
      <div class="budget-warning">
        <span class="warning-icon large">⚠️</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

      <p>Monthly Spending Limit</p>
    </div>

    <div class="card">
      <div class="budget-warning">
        <span class="warning-icon">⚠️</span>
      </div>

      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>

      <button>View Budget</button>
    </div>

  </div>

</div>

</body>
</html>
