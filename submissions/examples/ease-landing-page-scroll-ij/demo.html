<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page Scroll</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="hero">
      <div class="hero-content">
        <h1>Discover Motion</h1>
        <p>Scroll to reveal sections</p>
      </div>
    </section>

    <section class="reveal-section" style="--section-bg: #1e1e28; --text-color: #e0e0e0; --reveal-duration: 0.7s; --overlay-color: rgba(30, 30, 40, 0.6)">
      <div class="card-content">
        <span class="step">01</span>
        <h2>Fast</h2>
        <p>Lightning-quick animations built with pure CSS.</p>
      </div>
    </section>

    <section class="reveal-section" style="--section-bg: #22223a; --text-color: #e0e0f0; --reveal-duration: 0.7s; --overlay-color: rgba(34, 34, 58, 0.6)">
      <div class="card-content">
        <span class="step">02</span>
        <h2>Fluid</h2>
        <p>Silky transitions that feel natural and responsive.</p>
      </div>
    </section>

    <section class="reveal-section" style="--section-bg: #2a1e2a; --text-color: #f0e0f0; --reveal-duration: 0.7s; --overlay-color: rgba(42, 30, 42, 0.6)">
      <div class="card-content">
        <span class="step">03</span>
        <h2>Modular</h2>
        <p>Drop-in CSS component variables for any project.</p>
      </div>
    </section>
  </main>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.remove('reveal-hidden');
          entry.target.classList.add('reveal-visible');
        }
      });
    }, { threshold: 0.2 });

    document.querySelectorAll('.reveal-section').forEach(section => {
      section.classList.add('reveal-hidden');
      observer.observe(section);
    });
  </script>
</body>
</html>
