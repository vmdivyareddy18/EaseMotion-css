<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Shape Variants</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Badge Shape Variants</h1>

  <div class="badge-row">

    <span class="badge badge-pill success">
      Success
    </span>

    <span class="badge badge-pill warning">
      Warning
    </span>

    <span class="badge badge-pill info">
      Info
    </span>

  </div>

  <div class="badge-row">

    <span class="badge badge-square success">
      OK
    </span>

    <span class="badge badge-square warning">
      !
    </span>

    <span class="badge badge-square info">
      i
    </span>

  </div>

</div>

</body>
</html>
