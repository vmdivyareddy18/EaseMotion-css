<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Secure Connection Badge Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="badge-container">
        <!-- Secure Badge Component Wrapper -->
        <div class="ease-secure-badge">
            <div class="pulse-ring"></div>
            <div class="badge-core">
                <!-- Inline SVG Lock Icon -->
                <svg class="lock-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                <span class="badge-text">Secure Connection Verified</span>
            </div>
        </div>
    </div>

</body>
</html>
