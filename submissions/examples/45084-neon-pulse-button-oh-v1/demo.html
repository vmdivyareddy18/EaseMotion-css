<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Component: ease-neon-pulse-button</title>
  <meta name="description" content="Button with glowing neon border pulse animation.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="container">
    <header>
      <h1 id="main-title">ease-neon-pulse-button</h1>
      <p class="subtitle" id="main-desc">Button with glowing neon border pulse</p>
    </header>

    <div class="display-area">
      
      <div class="btn-showcase">
        
        <!-- Primary Neon -->
        <div class="btn-item">
          <button class="ease-neon-pulse">Get Started</button>
          <span class="btn-label">Primary</span>
        </div>

        <!-- Cyan Neon -->
        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-cyan">Learn More</button>
          <span class="btn-label">Cyan</span>
        </div>

        <!-- Pink Neon -->
        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-pink">Sign Up</button>
          <span class="btn-label">Pink</span>
        </div>

        <!-- Green Neon -->
        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-green">Submit</button>
          <span class="btn-label">Green</span>
        </div>

      </div>
    </div>

    <section class="demo-section">
      <h3>Outline Variants</h3>
      <div class="btn-showcase">
        
        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-outline">Outline Primary</button>
          <span class="btn-label">Outline</span>
        </div>

        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-outline ease-neon-cyan">Outline Cyan</button>
          <span class="btn-label">Outline</span>
        </div>

      </div>
    </section>

    <section class="demo-section">
      <h3>Size Variants</h3>
      <div class="btn-showcase">
        
        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-sm">Small</button>
          <span class="btn-label">Small</span>
        </div>

        <div class="btn-item">
          <button class="ease-neon-pulse">Default</button>
          <span class="btn-label">Default</span>
        </div>

        <div class="btn-item">
          <button class="ease-neon-pulse ease-neon-lg">Large Button</button>
          <span class="btn-label">Large</span>
        </div>

      </div>
    </section>

    <section class="demo-section">
      <h3>CTA Example</h3>
      <div class="cta-example">
        <h4>Ready to get started?</h4>
        <p>Join thousands of developers using EaseMotion CSS</p>
        <button class="ease-neon-pulse ease-neon-lg">Get Started Free</button>
      </div>
    </section>

  </main>

</body>
</html>
