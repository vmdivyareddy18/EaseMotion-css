<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Up Keyframes - EaseMotion Test</title>
  <!-- Import EaseMotion CSS -->
  <link rel="stylesheet" href="../../../easemotion.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Slide Up Keyframes Verification</h1>
    <p>This interactive demo serves as a visual and structural test for the <strong>Slide Up</strong> keyframes.</p>
    
    <div class="demo-box" em="slide-up 800ms ease-out">
      I slide up on load (800ms)
    </div>

    <div class="demo-box" em="slide-up 1.5s spring delay-500ms">
      I slide up with spring and delay (1.5s)
    </div>

    <div class="demo-box" em="slide-up 1s ease-in repeat-infinite alternate">
      I slide up infinitely
    </div>
  </div>

  <!-- Import EaseMotion Runtime -->
  <script type="module">
    import { parse } from '../../../easemotion/engine/parser.js';
    import { compile, className } from '../../../easemotion/engine/compiler.js';
    import { init } from '../../../easemotion/engine/runtime.js';

    // Verify parser and compiler APIs work within the browser (Unit Test Simulation)
    console.log("Running Slide Up Keyframe tests...");
    
    const ast = parse('slide-up 500ms ease-in');
    console.assert(ast.animation === 'slide-up', "Parser failed to parse animation name.");
    console.assert(ast.duration === 500, "Parser failed to parse duration.");
    
    const cls = className(ast);
    const css = compile(ast, cls);
    console.assert(css.includes('ease-kf-slide-up'), "Compiler failed to include slide-up keyframes.");
    console.assert(css.includes('500ms'), "Compiler failed to include duration.");
    
    console.log("All Slide Up tests passed successfully.");
    
    // Initialize the motion engine
    init();
  </script>
</body>
</html>
