<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Week View</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f7fa;
      color: #333;
    }
    .demo-container {
      background: #fff;
      border-radius: 16px;
      padding: 48px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      max-width: 800px;
      width: 100%;
      margin: 24px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    p.desc { color: #666; margin-bottom: 32px; font-size: 0.9rem; }
    .controls {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      align-items: center;
    }
    .controls button {
      padding: 8px 20px;
      border: 2px solid #e0e4e8;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .controls button:hover { border-color: #4a6cf7; color: #4a6cf7; }
    .controls span { font-size: 1rem; font-weight: 600; color: #1a202c; margin: 0 8px; }
  </style>
</head>
<body>
  <div class="demo-container">
    <h1>Calendar Week View</h1>
    <p class="desc">Animated week view with smooth transitions between day cells</p>

    <div class="controls">
      <button id="prevWeek">&larr; Previous</button>
      <span id="weekLabel">Week 1</span>
      <button id="nextWeek">Next &rarr;</button>
    </div>

    <div class="demo-box" style="background:#f8f9fc;border-radius:12px;padding:32px;border:1px solid #eef0f4;">
      <div class="ease-calendar-week-view" id="calendarWeek">
        <div class="week-header">
          <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span class="weekend">Sat</span><span class="weekend">Sun</span>
        </div>
        <div class="week-body" id="weekBody">
          <div class="day-cell">1</div>
          <div class="day-cell">2</div>
          <div class="day-cell">3</div>
          <div class="day-cell">4</div>
          <div class="day-cell">5</div>
          <div class="day-cell weekend">6</div>
          <div class="day-cell weekend">7</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let weekOffset = 0;
    const body = document.getElementById('weekBody');
    const label = document.getElementById('weekLabel');

    function renderWeek() {
      const startDay = weekOffset * 7 + 1;
      const days = Array.from({length: 7}, (_, i) => startDay + i);
      body.innerHTML = days.map((d, i) => {
        const cls = (i >= 5) ? 'day-cell weekend' : 'day-cell';
        const isToday = d === new Date().getDate();
        return `<div class="${cls}${isToday ? ' today' : ''}" style="--cell-order: ${i}">${d}</div>`;
      }).join('');
      body.style.setProperty('--anim-direction', weekOffset >= 0 ? '1' : '-1');
      label.textContent = `Week ${weekOffset + 1}`;
      body.classList.remove('anim-in');
      void body.offsetHeight;
      body.classList.add('anim-in');
    }

    document.getElementById('prevWeek').addEventListener('click', () => { weekOffset--; renderWeek(); });
    document.getElementById('nextWeek').addEventListener('click', () => { weekOffset++; renderWeek(); });

    renderWeek();
  </script>
</body>
</html>
