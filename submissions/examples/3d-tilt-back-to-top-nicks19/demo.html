<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Tilt Back to Top - Dark Mode Theme</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      min-height: 200vh; /* Make the page scrollable to demonstrate the button's context */
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #0f172a; /* Deep Slate Dark Mode */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #f8fafc;
      overflow-x: hidden;
    }

    .demo-content {
      margin-top: 40vh;
      text-align: center;
      max-width: 600px;
      padding: 0 20px;
    }

    .demo-content h1 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .demo-content p {
      color: #94a3b8;
      line-height: 1.6;
    }

    .demo-scroll-hint {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      color: #475569;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(10px); }
    }

    /* Positioning the button for the demo */
    .demo-btt-container {
      position: fixed;
      bottom: 40px;
      right: 40px;
      z-index: 50;
    }
  </style>
</head>
<body>

  <div class="demo-content">
    <h1>Keep Scrolling Down</h1>
    <p>This page is artificially tall so you can see the back-to-top button in its natural habitat at the bottom right corner of the screen.</p>
    
    <div class="demo-scroll-hint">
      <span>Scroll</span>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
    </div>
  </div>

  <!-- The Back to Top Component -->
  <div class="demo-btt-container">
    <div class="ease-3d-tilt-wrapper" id="btt-tilt">
      <button class="ease-btt-btn" aria-label="Back to Top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <div class="ease-btt-glow"></div>
        <div class="ease-btt-icon">
          <!-- Chevron Up SVG -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
          </svg>
        </div>
      </button>
    </div>
  </div>

  <script>
    const tiltWrapper = document.getElementById('btt-tilt');
    
    tiltWrapper.addEventListener('mousemove', (e) => {
      const rect = tiltWrapper.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      
      const xPct = x / rect.width;
      const yPct = y / rect.height;
      
      // Calculate tilt degrees (max 25deg)
      const tiltX = (yPct - 0.5) * -50; 
      const tiltY = (xPct - 0.5) * 50;  
      
      tiltWrapper.style.setProperty('--tilt-x', `${tiltX}deg`);
      tiltWrapper.style.setProperty('--tilt-y', `${tiltY}deg`);
    });

    tiltWrapper.addEventListener('mouseleave', () => {
      tiltWrapper.style.setProperty('--tilt-x', '0deg');
      tiltWrapper.style.setProperty('--tilt-y', '0deg');
    });
  </script>

</body>
</html>
