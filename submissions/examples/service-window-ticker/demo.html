<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Window Ticker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="ticker-shell" aria-labelledby="ticker-title">
    <section class="ticker-panel">
      <div class="copy">
        <p class="eyebrow">maintenance desk</p>
        <h1 id="ticker-title">Service window ticker</h1>
        <p>A scrolling service window strip keeps maintenance status, owner, and impact visible during operational reviews.</p>
      </div>

      <div class="ticker-card" aria-label="Service maintenance ticker">
        <div class="ticker-track">
          <span>DB migration 22:00 UTC</span>
          <span>Owner: Data Platform</span>
          <span>Impact: read replicas only</span>
          <span>Rollback tested</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
