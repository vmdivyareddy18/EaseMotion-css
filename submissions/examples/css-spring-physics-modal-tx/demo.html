<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Spring Physics Modal</title>
    <!-- Import global EaseMotion CSS -->
    <link rel="stylesheet" href="../../../easemotion.css">
    <!-- Component specific styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="ease-app-bg ecommerce-interface">
    <div class="demo-container ease-fade-in">
        <header class="demo-header">
            <h1 class="demo-title">E-Commerce Checkout</h1>
            <p class="demo-subtitle">Pure CSS Modal utilizing a Spring Physics Transition</p>
        </header>

        <main class="demo-content">
            <!-- Simulated Product Card -->
            <div class="product-card">
                <div class="product-image-placeholder">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="#cbd5e1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                </div>
                <div class="product-info">
                    <h3>Premium Wireless Headphones</h3>
                    <p class="price">$299.00</p>
                </div>
                
                <!-- Pure CSS Trigger Hack -->
                <input type="checkbox" id="checkout-trigger" class="modal-trigger-input" aria-hidden="true" />
                
                <label for="checkout-trigger" class="ease-btn checkout-btn ease-hover-lift modal-open-btn" tabindex="0" role="button" aria-haspopup="dialog" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                    Add to Cart & Checkout
                </label>

                <!-- Modal Overlay and Container -->
                <div class="modal-overlay">
                    <label for="checkout-trigger" class="modal-close-backdrop" aria-label="Close modal"></label>
                    
                    <div class="modal-card spring-animated" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc">
                        <div class="modal-header">
                            <h2 id="modal-title">Checkout Summary</h2>
                            <label for="checkout-trigger" class="modal-close-btn ease-hover-lift" tabindex="0" role="button" aria-label="Close modal" onkeydown="if(event.key==='Enter' || event.key===' ') this.click()">
                                &times;
                            </label>
                        </div>
                        <div class="modal-body">
                            <div class="cart-item">
                                <div class="cart-item-img"></div>
                                <div class="cart-item-details">
                                    <h4>Premium Wireless Headphones</h4>
                                    <p>Qty: 1</p>
                                </div>
                                <div class="cart-item-price">$299.00</div>
                            </div>
                            
                            <div class="checkout-summary">
                                <div class="summary-row">
                                    <span>Subtotal</span>
                                    <span>$299.00</span>
                                </div>
                                <div class="summary-row">
                                    <span>Shipping</span>
                                    <span class="free-text">Free</span>
                                </div>
                                <div class="summary-row total-row">
                                    <span>Total</span>
                                    <span>$299.00</span>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button class="ease-btn apple-pay-btn ease-hover-lift">
                                Pay with Pay
                            </button>
                            <button class="ease-btn primary-checkout-btn ease-hover-lift">
                                Complete Purchase
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
