<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ease-equalizer-preset-selector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>EQ Preset Selector</h1>
    <p class="subtitle">Animated audio equalizer preset buttons</p>

    <div class="preset-panel">

        <button class="preset active">
            Bass Boost
        </button>

        <button class="preset">
            Pop
        </button>

        <button class="preset">
            Rock
        </button>

        <button class="preset">
            Jazz
        </button>

        <button class="preset">
            Classical
        </button>

        <button class="preset">
            Vocal
        </button>

    </div>

    <div class="preview-card">

        <h2>Selected Preset</h2>
        <div class="selected-label">
            Bass Boost
        </div>

        <div class="equalizer">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

</div>

</body>
</html>
