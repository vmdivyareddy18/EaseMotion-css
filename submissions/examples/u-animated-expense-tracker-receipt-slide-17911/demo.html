<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Expense Tracker Receipt Slide</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>Animated Expense Tracker Receipt Slide</h1>

  <p class="intro">
    A reusable expense logging animation for budgeting apps,
    expense trackers, and personal finance dashboards.
  </p>

  <div class="demo-grid">

    <div class="card">
      <div class="expense-receipt-slide">
        <span class="receipt">🧾</span>
      </div>
      <h3>Expense Logged</h3>
    </div>

    <div class="card">
      <div class="expense-receipt-slide">
        <span class="receipt large">🧾</span>
      </div>
      <p>Transaction Recorded</p>
    </div>

    <div class="card">
      <div class="expense-receipt-slide">
        <span class="receipt">🧾</span>
      </div>
      <button>View Expenses</button>
    </div>

  </div>

</div>

</body>
</html>
