<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Transcription Service</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="transcription-container">
        <div class="header">
            <h1>Flawless <span class="highlight">Audio to Text</span></h1>
            <p>Our AI-powered transcription engine delivers 99% accuracy in over 50 languages. Turn your meetings and podcasts into searchable text instantly.</p>
        </div>

        <div class="interactive-demo">
            <div class="audio-waveform">
                <div class="bar bar-1"></div>
                <div class="bar bar-2"></div>
                <div class="bar bar-3"></div>
                <div class="bar bar-4"></div>
                <div class="bar bar-5"></div>
                <div class="bar bar-6"></div>
                <div class="bar bar-7"></div>
                <div class="bar bar-8"></div>
                <div class="bar bar-9"></div>
                <div class="bar bar-10"></div>
                
                <!-- Scanning line overlay -->
                <div class="scanner"></div>
            </div>

            <div class="transcribed-text">
                <span class="word w-1">Welcome</span> 
                <span class="word w-2">everyone</span> 
                <span class="word w-3">to</span> 
                <span class="word w-4">the</span> 
                <span class="word w-5">weekly</span> 
                <span class="word w-6">sync.</span> 
                <span class="word w-7">Today</span> 
                <span class="word w-8">we</span> 
                <span class="word w-9">will</span> 
                <span class="word w-10">discuss</span> 
                <span class="word w-11">the</span> 
                <span class="word w-12">roadmap.</span>
            </div>
        </div>
    </div>
</body>
</html>
