<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursor Glow Gauge</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="gauge-demo">

    <div class="demo-header ease-fade-in">
        <h1>Cursor Glow Gauge</h1>
        <p>
            A reusable neon-inspired gauge component with a glowing cursor
            effect built using EaseMotion CSS.
        </p>
    </div>

    <div class="gauge-container ease-scale-in">

        <div class="gauge">

            <div class="gauge-ring">

                <div class="glow-cursor"></div>

                <div class="gauge-center">
                    <span class="value">75%</span>
                    <p>Performance</p>
                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
