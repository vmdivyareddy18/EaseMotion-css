<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimalist Tech - Staggered Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="app-header">
      <div class="logo">Engine_OS</div>
      <a href="#minimal-modal" class="btn btn-dark" role="button">Deploy Instance</a>
    </header>

    <main class="grid">
      <div class="card">
        <span class="label">CPU Usage</span>
        <div class="value">12.4%</div>
      </div>
      <div class="card">
        <span class="label">Memory</span>
        <div class="value">4.2 GB</div>
      </div>
    </main>
  </div>

  <div id="minimal-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <a href="#" class="modal-close-overlay" aria-label="Close modal"></a>
    
    <div class="modal-card">
      <div class="modal-header stagger-1">
        <h3 id="modal-title">Configure Deployment</h3>
        <a href="#" class="modal-close-x" aria-label="Close modal">&times;</a>
      </div>
      
      <div class="modal-body stagger-2">
        <p>Confirm target cluster configuration. Staggered element delays are computed natively using clean CSS variables with zero JavaScript dependencies.</p>
        <div class="input-group">
          <label for="region">Target Region</label>
          <select id="region" class="form-select">
            <option>us-east-1 (N. Virginia)</option>
            <option>eu-central-1 (Frankfurt)</option>
          </select>
        </div>
      </div>
      
      <div class="modal-footer stagger-3">
        <a href="#" class="btn btn-light">Cancel</a>
        <a href="#" class="btn btn-dark">Confirm & Initialize</a>
      </div>
    </div>
  </div>

</body>
</html>
