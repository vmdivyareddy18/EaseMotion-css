<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Carousel Indicator Dots - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      padding: 40px 20px;
      max-width: 600px;
      margin: 0 auto;
      background: #f8fafc;
      color: #0f172a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0f172a; color: #f8fafc; }
    }
    .card {
      background: #ffffff;
      padding: 32px 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
      margin-bottom: 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    @media (prefers-color-scheme: dark) {
      .card { background: #1e293b; box-shadow: none; }
    }
    h2 { font-size: 1.1rem; margin-top: 0; margin-bottom: 24px; color: #64748b; text-align: center; }
    .nav-buttons {
      margin-top: 20px;
      display: flex;
      gap: 8px;
    }
    button.control {
      padding: 6px 12px;
      font-size: 0.85rem;
      border: 1px solid var(--ease-dot-bg);
      background: transparent;
      color: inherit;
      border-radius: 6px;
      cursor: pointer;
    }
    button.control:hover { background: rgba(0,0,0,0.04); }
  </style>
</head>
<body>

  <h1 style="text-align:center; margin-bottom:8px;">⚪ Carousel Indicator Dots</h1>
  <p style="text-align:center; margin-bottom:40px; color:#64748b;">Morphing pill matrices and automated progress sweep indicator strips.</p>

  <div class="card">
    <h2>1. Stretch-to-Pill Directional Morph</h2>
    <div class="ease-carousel-dots ease-dots-morph" role="tablist" aria-label="Slideshow indicators">
      <button class="ease-carousel-dot is-active" role="tab" aria-selected="true" aria-label="Slide 1"></button>
      <button class="ease-carousel-dot" role="tab" aria-selected="false" aria-label="Slide 2"></button>
      <button class="ease-carousel-dot" role="tab" aria-selected="false" aria-label="Slide 3"></button>
      <button class="ease-carousel-dot" role="tab" aria-selected="false" aria-label="Slide 4"></button>
    </div>
    <div class="nav-buttons">
      <button class="control" onclick="moveSlide('morph', -1)">Previous</button>
      <button class="control" onclick="moveSlide('morph', 1)">Next</button>
    </div>
  </div>

  <div class="card">
    <h2>2. Progress Auto-Play Timer Sweep</h2>
    <div class="ease-carousel-dots ease-dots-progress" role="tablist" aria-label="Auto-advancing slideshow indicators">
      <button class="ease-carousel-dot is-active" role="tab" aria-selected="true" aria-label="Slide 1"></button>
      <button class="ease-carousel-dot" role="tab" aria-selected="false" aria-label="Slide 2"></button>
      <button class="ease-carousel-dot" role="tab" aria-selected="false" aria-label="Slide 3"></button>
    </div>
    <div class="nav-buttons">
      <button class="control" onclick="moveSlide('progress', -1)">Previous</button>
      <button class="control" onclick="moveSlide('progress', 1)">Next</button>
    </div>
  </div>

  <script>
    // Universal interface click binder navigation simulation logic
    document.querySelectorAll('.ease-carousel-dots').forEach(track => {
      const dots = track.querySelectorAll('.ease-carousel-dot');
      dots.forEach((dot, index) => {
        dot.addEventListener('click', () => {
          dots.forEach(d => { d.classList.remove('is-active'); d.setAttribute('aria-selected', 'false'); });
          dot.classList.add('is-active');
          dot.setAttribute('aria-selected', 'true');
        });
      });
    });

    function moveSlide(type, direction) {
      const selector = type === 'morph' ? '.ease-dots-morph' : '.ease-dots-progress';
      const track = document.querySelector(selector);
      const dots = Array.from(track.querySelectorAll('.ease-carousel-dot'));
      const activeIdx = dots.findIndex(d => d.classList.contains('is-active'));
      
      let nextIdx = activeIdx + direction;
      if (nextIdx >= dots.length) nextIdx = 0;
      if (nextIdx < 0) nextIdx = dots.length - 1;

      dots[activeIdx].classList.remove('is-active');
      dots[activeIdx].setAttribute('aria-selected', 'false');
      dots[nextIdx].classList.add('is-active');
      dots[nextIdx].setAttribute('aria-selected', 'true');
    }
  </script>

</body>
</html>
