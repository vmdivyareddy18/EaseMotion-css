<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chandelier</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <span class="chain"></span>
    <div class="lier">
      <span class="halo"></span>
      <div class="ring">
        <span class="arm ar1"><span class="candle"><span class="flame"></span></span></span>
        <span class="arm ar2"><span class="candle"><span class="flame"></span></span></span>
        <span class="arm ar3"><span class="candle"><span class="flame"></span></span></span>
        <span class="arm ar4"><span class="candle"><span class="flame"></span></span></span>
        <span class="arm ar5"><span class="candle"><span class="flame"></span></span></span>
        <span class="arm ar6"><span class="candle"><span class="flame"></span></span></span>
      </div>
      <span class="hoop"></span>
      <div class="drops">
        <span class="crys cy1"></span>
        <span class="crys cy2"></span>
        <span class="crys cy3"></span>
        <span class="crys cy4"></span>
        <span class="crys cy5"></span>
        <span class="crys cy6"></span>
        <span class="crys cy7"></span>
      </div>
      <span class="finial"></span>
    </div>
  </div>
</body>
</html>
