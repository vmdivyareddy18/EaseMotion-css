<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Network Topology Visualizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h1>Ease Network Topology Visualizer</h1>

<div class="network">

<div class="line horizontal"></div>
<div class="line vertical"></div>

<div class="packet p1"></div>
<div class="packet p2"></div>

<div class="node top"></div>

<div class="node center"></div>
<div class="node right"></div>
<div class="node bottom"></div>

</div>

<p>Animated network topology with pulsing nodes.</p>

</div>

</body>
</html>
