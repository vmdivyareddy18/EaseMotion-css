<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ease-live-badge</title>
    <meta
      name="description"
      content="A responsive live status badge with animated pulse, viewer count controls, and accessible state updates."
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="badge-demo" aria-labelledby="live-badge-title">
        <header class="badge-header">
          <div>
            <p class="eyebrow">EaseMotion component</p>
            <h1 id="live-badge-title">ease-live-badge</h1>
            <p class="badge-copy">
              A streaming-style LIVE status badge with animated pulse, viewer count, and offline state.
            </p>
          </div>
        </header>

        <article class="badge-panel">
          <div class="status-shell">
            <div id="liveBadge" class="live-badge live" role="status" aria-live="polite" aria-atomic="true">
              <span class="status-dot" aria-hidden="true"></span>
              <span id="statusLabel" class="status-label">🔴 LIVE</span>
              <span id="viewerCount" class="viewer-count">• 12.4K</span>
            </div>
          </div>

          <div class="controls" aria-label="Live badge controls">
            <button id="decreaseViewers" class="control-button">Decrease Viewers</button>
            <button id="increaseViewers" class="control-button">Increase Viewers</button>
            <button id="toggleLive" class="control-button toggle-button">Go Offline</button>
          </div>

          <p class="note" id="liveBadgeNote">
            Use the buttons to update the viewer count and toggle live status. The viewer count hides when offline.
          </p>
        </article>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
