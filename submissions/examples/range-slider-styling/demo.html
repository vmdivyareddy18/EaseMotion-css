<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Range Slider Styling – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div>
    <h1 class="page-title">Range Slider Styling</h1>
  </div>

  <div class="section">
    <h2 class="section-title">Color Themes</h2>

    <div class="slider-group">
      <label>Blue</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="65" class="theme-blue" data-theme="blue">
        <span class="value-display" data-for="blue">65<span>%</span></span>
      </div>
    </div>

    <div class="slider-group">
      <label>Green</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="42" class="theme-green" data-theme="green">
        <span class="value-display" data-for="green">42<span>%</span></span>
      </div>
    </div>

    <div class="slider-group">
      <label>Purple</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="80" class="theme-purple" data-theme="purple">
        <span class="value-display" data-for="purple">80<span>%</span></span>
      </div>
    </div>

    <div class="slider-group">
      <label>Orange</label>
      <div class="slider-row">
        <input type="range" min="0" max="100" value="27" class="theme-orange" data-theme="orange">
        <span class="value-display" data-for="orange">27<span>%</span></span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2 class="section-title">Orientation</h2>
    <div class="orientation-demo">
      <div class="slider-vertical-wrapper">
        <label>Volume</label>
        <input type="range" min="0" max="100" value="70" class="theme-blue slider-vertical" orient="vertical">
        <span class="value-display">70<span>%</span></span>
      </div>
      <div class="slider-vertical-wrapper">
        <label>Brightness</label>
        <input type="range" min="0" max="100" value="45" class="theme-purple slider-vertical" orient="vertical">
        <span class="value-display">45<span>%</span></span>
      </div>
    </div>
  </div>

<script>
document.querySelectorAll('input[type="range"]').forEach(slider => {
  const update = () => {
    const val = slider.value;
    const fill = val + '%';
    slider.style.setProperty('--fill', fill);
    const display = slider.closest('.slider-group')?.querySelector('.value-display')
      || slider.closest('.slider-vertical-wrapper')?.querySelector('.value-display');
    if (display) display.innerHTML = val + '<span>%</span>';
  };
  slider.addEventListener('input', update);
  update();
});
</script>
</body>
</html>
