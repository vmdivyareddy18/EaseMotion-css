<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer — Demo</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    body {
      margin: 0;
      background: #0f172a;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>
<body>
  <div class="countdown-wrapper">
    <h1>Countdown Timer</h1>
    <p class="subtitle">Animated countdown with SVG progress ring and tick animation on each second.</p>

    <div class="countdown-ring-container">
      <svg viewBox="0 0 180 180">
        <circle class="countdown-ring-bg" cx="90" cy="90" r="82"></circle>
        <circle class="countdown-ring-fg" id="ring" cx="90" cy="90" r="82"
          stroke-dasharray="515.22" stroke-dashoffset="0"></circle>
      </svg>
      <div class="countdown-ring-text" id="ring-text">
        <strong>00:00:30</strong>
        remaining
      </div>
    </div>

    <div class="countdown-segments" id="segments">
      <div class="countdown-segment">
        <div class="countdown-value" id="val-h">00</div>
        <div class="countdown-label">Hours</div>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-segment">
        <div class="countdown-value" id="val-m">00</div>
        <div class="countdown-label">Minutes</div>
      </div>
      <div class="countdown-separator">:</div>
      <div class="countdown-segment">
        <div class="countdown-value" id="val-s">30</div>
        <div class="countdown-label">Seconds</div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      var totalSeconds = 30;
      var remaining = totalSeconds;
      var circumference = 2 * Math.PI * 82;
      var ring = document.getElementById('ring');
      var ringText = document.getElementById('ring-text');
      var segments = document.getElementById('segments');
      var valH = document.getElementById('val-h');
      var valM = document.getElementById('val-m');
      var valS = document.getElementById('val-s');
      var timer = null;

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function updateDisplay() {
        var h = Math.floor(remaining / 3600);
        var m = Math.floor((remaining % 3600) / 60);
        var s = remaining % 60;

        var newH = pad(h), newM = pad(m), newS = pad(s);

        if (valS.textContent !== newS) { valS.textContent = newS; valS.classList.remove('tick'); void valS.offsetWidth; valS.classList.add('tick'); }
        if (valM.textContent !== newM) { valM.textContent = newM; valM.classList.remove('tick'); void valM.offsetWidth; valM.classList.add('tick'); }
        if (valH.textContent !== newH) { valH.textContent = newH; valH.classList.remove('tick'); void valH.offsetWidth; valH.classList.add('tick'); }

        var progress = remaining / totalSeconds;
        ring.style.strokeDashoffset = circumference * (1 - progress);
        ringText.innerHTML = '<strong>' + pad(h) + ':' + pad(m) + ':' + pad(s) + '</strong>remaining';
      }

      function tick() {
        if (remaining <= 0) {
          clearInterval(timer);
          segments.innerHTML = '<div class="countdown-complete">Time is up!</div>';
          ringText.innerHTML = '<strong>Done!</strong>';
          ring.style.strokeDashoffset = circumference;
          return;
        }
        remaining--;
        updateDisplay();
      }

      ring.style.strokeDasharray = circumference;
      ring.style.strokeDashoffset = '0';
      updateDisplay();
      timer = setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
