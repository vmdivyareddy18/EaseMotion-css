<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Banking Portal - Border Draw Sidebar Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Pure-CSS Trigger Node Matrix -->
    <input type="checkbox" id="sidebar-toggle-gate" class="sidebar-input-gate">
    
    <!-- Tactile Toggle Trigger Box Label Layout -->
    <label for="sidebar-toggle-gate" class="sidebar-toggle-btn">
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
        <span class="burger-bar"></span>
    </label>

    <!-- Hardened Border-Draw Banking Sidebar Navigation Canvas -->
    <nav class="banking-sidebar">
        <!-- Laser SVG Animated Top Border Drawing Contours -->
        <div class="border-draw-wire top-wire"></div>
        <div class="border-draw-wire right-wire"></div>
        <div class="border-draw-wire bottom-wire"></div>
        <div class="border-draw-wire left-wire"></div>

        <div class="sidebar-header">
            <div class="banking-logo">ApexTrust</div>
            <p class="banking-tier">Institutional Vault</p>
        </div>

        <ul class="sidebar-nav-menu">
            <li class="menu-item active">
                <a href="#dashboard" class="menu-link">
                    <span class="menu-text">Liquidity Overview</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#ledgers" class="menu-link">
                    <span class="menu-text">Multi-Ledger Sync</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#clearance" class="menu-link">
                    <span class="menu-text">Wire Clearances</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#audit" class="menu-link">
                    <span class="menu-text">Cryptographic Audit</span>
                </a>
            </li>
            <li class="menu-item">
                <a href="#settings" class="menu-link">
                    <span class="menu-text">Security Config</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <div class="vault-status-indicator">
                <span class="status-dot-pulse"></span>
                <span class="status-label">Nodes Fully Synced</span>
            </div>
        </div>
    </nav>

    <!-- Core Main Content Display Dashboard Container -->
    <main class="dashboard-viewport">
        <header class="viewport-header">
            <h1>Liquidity Command Center</h1>
            <div class="user-profile-badge">ST07</div>
        </header>
        
        <div class="metrics-grid-layout">
            <div class="metric-card-node">
                <h3>Total Core Reserves</h3>
                <p class="metric-value">$1,894,424.00</p>
                <span class="metric-trend up">+4.24% today</span>
            </div>
            <div class="metric-card-node">
                <h3>Active Staking Pools</h3>
                <p class="metric-value">7 Live Nodes</p>
                <span class="metric-trend passing">100% operational</span>
            </div>
        </div>
    </main>
</body>
</html>
