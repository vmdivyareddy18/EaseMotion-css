<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ease Scale Down Horizontal - Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="bar"></div>
        <button onclick="document.querySelector('.bar').classList.add('ease-scale-h-down');">Collapse Bar</button>
        <button onclick="document.querySelector('.bar').classList.remove('ease-scale-h-down');" style="border-color:#444;">Reset</button>
    </div>
</body>
</html>
