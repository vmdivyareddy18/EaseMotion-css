<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Unique demo webpage showcasing HTML elements and color formats">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Frosted Glass</title>
    <link rel="stylesheet" type="text/css" href="style.css"> 
</head>
<body>
    <div class="container">
        <h1>Modal Frosted Glass Demo</h1>
        <button id="openModal">Open Modal</button>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>Welcome!</h2>
            <p>
                 This modal demonstrates a frosted glass backdrop,
                 smooth blur transition, and slide-up animation.
            </p>
            <button id="closeModal" class="close-btn">Close</button>
        </div>
    </div>
    <script>
        const openBtn=document.getElementById("openModal")
        const closeBtn=document.getElementById("closeModal")
        const modal=document.getElementById("modal")

        openBtn.addEventListener("click",function(){
            modal.classList.add("show")
        })
        closeBtn.addEventListener("click",function(){
            modal.classList.remove("show")
        })
        window.addEventListener("click",function(event){
            if(event.target===modal){
                modal.classList.remove("show")
            }
        })
    </script>
</body>


</html>
