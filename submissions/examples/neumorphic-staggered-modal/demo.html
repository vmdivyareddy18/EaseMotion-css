<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Neumorphic - Staggered Modal</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="app-header">
      <div class="brand">Soft_Metrics</div>
      <a href="#neu-modal" class="btn btn-primary" role="button">System Controls</a>
    </header>

    <main class="grid">
      <div class="card">
        <span class="label">Storage Used</span>
        <div class="value">64.2%</div>
      </div>
      <div class="card">
        <span class="label">Network Load</span>
        <div class="value">120 Mbps</div>
      </div>
    </main>
  </div>

  <div id="neu-modal" class="modal-overlay" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
    <a href="#" class="modal-close-overlay" aria-label="Close modal"></a>
    
    <div class="modal-card">
      <div class="modal-header stagger-1">
        <h3 id="modal-title">Control Settings</h3>
        <a href="#" class="modal-close-x" aria-label="Close modal">&times;</a>
      </div>
      
      <div class="modal-body stagger-2">
        <p>This panel uses structural CSS to orchestrate sequential, cascading entrance timings. Each soft element emerges sequentially using zero-JS calculation multipliers.</p>
        
        <div class="input-container">
          <label for="profile">Active Mode</label>
          <div class="select-wrapper">
            <select id="profile" class="form-select">
              <option>Performance Optimization</option>
              <option>Eco / Silent Running</option>
            </select>
          </div>
        </div>
      </div>
      
      <div class="modal-footer stagger-3">
        <a href="#" class="btn btn-flat">Cancel</a>
        <a href="#" class="btn btn-inset">Confirm Changes</a>
      </div>
    </div>
  </div>

</body>
</html>
