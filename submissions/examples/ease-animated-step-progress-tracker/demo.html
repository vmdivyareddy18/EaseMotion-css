<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Step Progress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="container">
  <h1 class="ease-fade-in">Step Progress 🚀</h1>

  <div class="tracker">

    <div class="line">
      <div class="line-fill" id="line"></div>
    </div>

    <div class="steps">
      <div class="step active">1</div>
      <div class="step">2</div>
      <div class="step">3</div>
    </div>

  </div>

  <button onclick="nextStep()" class="next-btn">Next Step</button>

</section>

<script>
let current = 0;
const steps = document.querySelectorAll(".step");
const line = document.getElementById("line");

function nextStep() {
  if (current < steps.length - 1) {
    steps[current].classList.remove("active");
    current++;
    steps[current].classList.add("active");

    line.style.width = (current / (steps.length - 1)) * 100 + "%";

    steps[current].classList.add("pop");
    setTimeout(() => steps[current].classList.remove("pop"), 400);
  }
}
</script>

</body>
</html>
