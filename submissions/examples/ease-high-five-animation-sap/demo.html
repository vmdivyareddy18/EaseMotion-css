<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease High Five Animation Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="demo-bg-sap">

  <div class="high-five-wrapper-sap">
    <div class="high-five-stage-sap">
      
      <div class="hand-sap hand-left-sap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5" />
          <path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v6" />
          <path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v4.5" />
          <path d="M6 10V8a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5c0 4.42 3.58 8 8 8h3a4 4 0 0 0 4-4v-4" />
        </svg>
      </div>

      <div class="hand-sap hand-right-sap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 11V6a2 2 0 0 1 2-2v0a2 2 0 0 1 2 2v5" />
          <path d="M10 10V4a2 2 0 0 1 2-2v0a2 2 0 0 1 2 2v6" />
          <path d="M14 10.5V6a2 2 0 0 1 2-2v0a2 2 0 0 1 2 2v4.5" />
          <path d="M18 10V8a2 2 0 0 1 2-2v0a2 2 0 0 1 2 2v5c0 4.42-3.58 8-8 8h-3a4 4 0 0 1-4-4v-4" />
        </svg>
      </div>

      <div class="burst-sap ripple-1-sap"></div>
      <div class="burst-sap ripple-2-sap"></div>
    </div>
    
    <span class="action-text-sap">HOVER TO HIGH FIVE</span>
  </div>

</body>
</html>
