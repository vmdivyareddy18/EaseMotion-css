<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conic Radial Progress Ring</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="demo-shell">
      <section class="demo-card" aria-labelledby="progress-title">
        <p class="eyebrow">Metric component</p>
        <h1 id="progress-title">Conic radial progress</h1>
        <p class="intro">
          Circular metric rings built with CSS conic gradients for dashboards,
          goals, analytics, and profile completion states.
        </p>

        <div class="progress-grid">
          <article class="progress-card">
            <div
              class="ease-radial-progress"
              style="--value: 78; --accent: #2563eb"
              role="img"
              aria-label="Project health 78 percent"
            >
              <span>78%</span>
            </div>
            <h2>Project health</h2>
            <p>Release checklist progress</p>
          </article>

          <article class="progress-card">
            <div
              class="ease-radial-progress"
              style="--value: 64; --accent: #16a34a"
              role="img"
              aria-label="Coverage 64 percent"
            >
              <span>64%</span>
            </div>
            <h2>Coverage</h2>
            <p>Tested UI surfaces</p>
          </article>

          <article class="progress-card">
            <div
              class="ease-radial-progress"
              style="--value: 92; --accent: #7c3aed"
              role="img"
              aria-label="Readiness 92 percent"
            >
              <span>92%</span>
            </div>
            <h2>Readiness</h2>
            <p>Launch preparation</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
