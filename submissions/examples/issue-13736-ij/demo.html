<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Bar Damage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Health Bar</h1>
    <p class="subtitle">Game-style health bar with smooth depletion and damage flash overlay.</p>
    <div class="display-area" style="flex-direction:column; gap:1rem; padding:1.5rem;">
      <div class="health-bar-track">
        <div class="health-bar" id="healthBar" style="width:100%">
          <div class="health-bar-damage" id="damageFlash"></div>
        </div>
      </div>
      <div class="health-text" id="healthText">100 / 100</div>
    </div>
    <button id="damageBtn">Take Damage</button>
    <button id="healBtn">Heal</button>
  </div>
  <script>
    const healthBar = document.getElementById('healthBar');
    const damageFlash = document.getElementById('damageFlash');
    const healthText = document.getElementById('healthText');
    let hp = 100; const max = 100;
    function update() {
      healthBar.style.width = hp + '%';
      healthText.textContent = hp + ' / ' + max;
    }
    document.getElementById('damageBtn').addEventListener('click', () => {
      const dmg = 15 + Math.floor(Math.random() * 10);
      hp = Math.max(0, hp - dmg);
      damageFlash.classList.remove('flash');
      void damageFlash.offsetWidth;
      damageFlash.classList.add('flash');
      update();
    });
    document.getElementById('healBtn').addEventListener('click', () => {
      hp = Math.min(max, hp + 15);
      update();
    });
  </script>
</body>
</html>
