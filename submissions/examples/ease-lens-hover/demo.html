<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ease-lens-hover demo</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #1a1a2e; gap: 2rem; }
    .card {
      width: 220px; height: 160px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 1rem;
      user-select: none;
    }
  </style>
</head>
<body>
  <div class="card ease-lens">
    Move cursor
    <div class="ease-lens__glass"></div>
  </div>
  <script>
    document.querySelectorAll('.ease-lens').forEach(el => {
      const glass = el.querySelector('.ease-lens__glass');
      el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        glass.style.left = (e.clientX - r.left) + 'px';
        glass.style.top  = (e.clientY - r.top)  + 'px';
      });
    });
  </script>
</body>
</html>
