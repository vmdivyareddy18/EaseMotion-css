<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liquid Number Counter Demo</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="liquid-counter" data-target="87" data-suffix="%">
    <div class="liquid-fill"></div>
    <span class="liquid-value">0</span>
  </div>

  <script>
    document.querySelectorAll('.liquid-counter').forEach(function (el) {
      var target = parseInt(el.dataset.target, 10);
      var suffix = el.dataset.suffix || '';
      var valueEl = el.querySelector('.liquid-value');
      var fillEl = el.querySelector('.liquid-fill');
      var duration = 1800;
      var startTime = null;

      function step(timestamp) {
        if (!startTime) startTime = timestamp;
        var progress = Math.min((timestamp - startTime) / duration, 1);
        var current = Math.floor(progress * target);

        valueEl.textContent = current + suffix;
        fillEl.style.setProperty('--fill-percent', (progress * target) + '%');

        if (progress < 1) {
          requestAnimationFrame(step);
        } else {
          valueEl.textContent = target + suffix;
        }
      }

      requestAnimationFrame(step);
    });
  </script>

</body>
</html>
