<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ease Liquid Notification Stack</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="stack">
  <article class="card primary">
    <span class="dot"></span>
    <div>
      <h2>Build Completed</h2>
      <p>Your latest deployment finished successfully.</p>
    </div>
  </article>

  <article class="card">
    <span class="dot"></span>
    <div>
      <h2>Pull Request</h2>
      <p>A new review has been requested.</p>
    </div>
  </article>

  <article class="card">
    <span class="dot"></span>
    <div>
      <h2>Workspace Updated</h2>
      <p>Everything is synced across devices.</p>
    </div>
  </article>
</main>

</body>
</html>
