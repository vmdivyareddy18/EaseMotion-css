<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sticky Notes</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="board">
    <article class="note yellow" style="--r: -4deg;">
      <span class="pin"></span>
      <h3>Groceries</h3>
      <p>Oat milk, tomatoes, coffee beans, and dark chocolate.</p>
    </article>

    <article class="note pink" style="--r: 3deg;">
      <span class="pin"></span>
      <h3>Call back</h3>
      <p>Ring the dentist about moving Friday's appointment.</p>
    </article>

    <article class="note blue" style="--r: -2deg;">
      <span class="pin"></span>
      <h3>Ideas</h3>
      <p>Weekend photo walk along the river before sunrise.</p>
    </article>

    <article class="note green" style="--r: 5deg;">
      <span class="pin"></span>
      <h3>Reminder</h3>
      <p>Water the plants and refill the bird feeder.</p>
    </article>
  </div>
</body>
</html>
