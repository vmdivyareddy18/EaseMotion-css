<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Print Ripple - EaseMotion CSS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="rpr-wrapper">
    <h1>Receipt Print Ripple</h1>
    <div class="rpr-container">
      <div class="rpr-receipt" id="receipt">
        <div class="rpr-paper" id="paper">
          <div class="rpr-header">
            <h2>Fresh Bites Cafe</h2>
            <p>123 Main Street, City</p>
            <p>Tel: (555) 123-4567</p>
          </div>
          <div class="rpr-divider"></div>
          <div class="rpr-items" id="items">
            <div class="rpr-item" data-delay="1"><span>Espresso</span><span>$3.50</span></div>
            <div class="rpr-item" data-delay="2"><span>Latte</span><span>$4.75</span></div>
            <div class="rpr-item" data-delay="3"><span>Croissant</span><span>$3.25</span></div>
            <div class="rpr-item" data-delay="4"><span>Bagel</span><span>$2.50</span></div>
            <div class="rpr-item" data-delay="5"><span>Orange Juice</span><span>$4.00</span></div>
            <div class="rpr-item" data-delay="6"><span>Muffin</span><span>$2.75</span></div>
          </div>
          <div class="rpr-divider"></div>
          <div class="rpr-total" id="total">
            <span>Total</span><span>$20.75</span>
          </div>
          <div class="rpr-footer">
            <p>Thank you for your visit!</p>
            <p class="rpr-date" id="dateDisplay"></p>
          </div>
        </div>
      </div>
      <button class="rpr-btn" id="printBtn">Print Receipt</button>
    </div>
  </div>
  <script>
    (function() {
      var btn = document.getElementById('printBtn');
      var paper = document.getElementById('paper');
      var items = document.querySelectorAll('.rpr-item');
      var total = document.getElementById('total');
      var dateDisplay = document.getElementById('dateDisplay');

      function setDate() {
        var now = new Date();
        var opts = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
        dateDisplay.textContent = now.toLocaleDateString('en-US', opts);
      }
      setDate();

      function resetAnimation() {
        paper.classList.remove('rpr-paper-animate');
        items.forEach(function(item) { item.classList.remove('rpr-item-show'); });
        total.classList.remove('rpr-total-show');
        void paper.offsetWidth;
      }

      function playAnimation() {
        resetAnimation();
        paper.classList.add('rpr-paper-animate');
        items.forEach(function(item) {
          var delay = parseInt(item.getAttribute('data-delay'));
          setTimeout(function() { item.classList.add('rpr-item-show'); }, delay * 300);
        });
        var lastDelay = items.length;
        setTimeout(function() { total.classList.add('rpr-total-show'); }, (lastDelay + 1) * 300);
      }

      btn.addEventListener('click', playAnimation);
      playAnimation();
    })();
  </script>
</body>
</html>
