<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Org Chart Connector Lines - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <header class="demo-header">
      <h1>Animated Org Chart Connector Lines</h1>
      <p>A CSS/SVG-driven hierarchical tree with stroke draw-ins, staggered fades, and hover tracing.</p>
    </header>

    <!-- Org Chart Wrapper -->
    <div class="ease-org-chart">
      
      <!-- Tier 1: Root -->
      <div class="chart-tier">
        <div class="ease-org-node ease-org-node-expand active" data-node-id="ceo">
          <div class="node-role">CEO</div>
          <div class="node-name">Alex Morgan</div>
          <span class="expand-icon"></span>
        </div>
      </div>

      <!-- SVG Connectors Tier 1 to Tier 2 -->
      <!-- Absolute paths mapped to fixed tree layout dimensions -->
      <svg class="ease-org-connectors" viewBox="0 0 800 80" preserveAspectRatio="none">
        <path class="ease-org-connector" data-from="ceo" data-to="vp-eng" d="M400,0 V40 H160 V80" />
        <path class="ease-org-connector" data-from="ceo" data-to="vp-sales" d="M400,0 V40 H640 V80" />
      </svg>

      <!-- Tier 2 & Sub-branches -->
      <div class="ease-org-branch-fade-in collapsible-branch" id="ceo-branch" style="--tier-delay: 1;">
        
        <!-- Left Column: Engineering Branch -->
        <div class="chart-branch">
          <div class="ease-org-node ease-org-node-expand active" data-node-id="vp-eng">
            <div class="node-role">VP Engineering</div>
            <div class="node-name">Sarah Chen</div>
            <span class="expand-icon"></span>
          </div>

          <svg class="ease-org-connectors sub-connectors" viewBox="0 0 300 60" preserveAspectRatio="none">
            <path class="ease-org-connector" data-from="vp-eng" data-to="eng-1" d="M150,0 V30 H60 V60" />
            <path class="ease-org-connector" data-from="vp-eng" data-to="eng-2" d="M150,0 V30 H240 V60" />
          </svg>

          <div class="ease-org-branch-fade-in collapsible-branch" id="vp-eng-branch" style="--tier-delay: 2;">
            <div class="chart-tier horizontal-tier">
              <div class="ease-org-node" data-node-id="eng-1">
                <div class="node-role">Engineering Lead</div>
                <div class="node-name">Dave Smyth</div>
              </div>
              <div class="ease-org-node" data-node-id="eng-2">
                <div class="node-role">QA Lead</div>
                <div class="node-name">Emma Watson</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Right Column: Sales Branch -->
        <div class="chart-branch">
          <div class="ease-org-node ease-org-node-expand active" data-node-id="vp-sales">
            <div class="node-role">VP Sales</div>
            <div class="node-name">Marcus Vance</div>
            <span class="expand-icon"></span>
          </div>

          <svg class="ease-org-connectors sub-connectors" viewBox="0 0 300 60" preserveAspectRatio="none">
            <path class="ease-org-connector" data-from="vp-sales" data-to="sales-1" d="M150,0 V30 H60 V60" />
            <path class="ease-org-connector" data-from="vp-sales" data-to="sales-2" d="M150,0 V30 H240 V60" />
          </svg>

          <div class="ease-org-branch-fade-in collapsible-branch" id="vp-sales-branch" style="--tier-delay: 2;">
            <div class="chart-tier horizontal-tier">
              <div class="ease-org-node" data-node-id="sales-1">
                <div class="node-role">Enterprise Sales</div>
                <div class="node-name">John Doe</div>
              </div>
              <div class="ease-org-node" data-node-id="sales-2">
                <div class="node-role">Inside Sales</div>
                <div class="node-name">Jane Roe</div>
              </div>
            </div>
          </div>
        </div>

      </div> <!-- End Tier 2 Wrapper -->
    </div> <!-- End Org Chart Wrapper -->
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const nodes = document.querySelectorAll('.ease-org-node');
      const connectors = document.querySelectorAll('.ease-org-connector');

      // --- Hover Relationship Tracing ---
      nodes.forEach(node => {
        const nodeId = node.getAttribute('data-node-id');

        node.addEventListener('mouseenter', () => {
          connectors.forEach(conn => {
            if (conn.getAttribute('data-from') === nodeId || conn.getAttribute('data-to') === nodeId) {
              conn.classList.add('ease-org-connector-highlight');
            }
          });
        });

        node.addEventListener('mouseleave', () => {
          connectors.forEach(conn => {
            conn.classList.remove('ease-org-connector-highlight');
          });
        });
      });

      // --- Expand / Collapse Branch Toggling ---
      const expandToggles = document.querySelectorAll('.ease-org-node-expand');
      expandToggles.forEach(toggle => {
        toggle.addEventListener('click', (e) => {
          // Prevent triggers if child elements are clicked explicitly
          const nodeId = toggle.getAttribute('data-node-id');
          const targetBranch = document.getElementById(`${nodeId}-branch`);
          const targetSvg = toggle.nextElementSibling; // The SVG connectors directly below it

          if (targetBranch) {
            toggle.classList.toggle('active');
            targetBranch.classList.toggle('collapsed');
            
            if (targetSvg && targetSvg.classList.contains('ease-org-connectors')) {
              targetSvg.classList.toggle('collapsed');
            }
          }
        });
      });
    });
  </script>
</body>
</html>
