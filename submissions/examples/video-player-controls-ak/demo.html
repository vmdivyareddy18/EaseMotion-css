<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Video Player - EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="vp-wrapper">
    <h1>Custom Video Player</h1>
    <div class="vp-player">
      <div class="vp-video-wrap">
        <video id="video" preload="metadata">
          <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
          Your browser does not support video.
        </video>
        <div class="vp-overlay" id="overlay">
          <button class="vp-play-btn" id="bigPlayBtn">▶</button>
        </div>
      </div>
      <div class="vp-controls">
        <button class="vp-btn" id="playBtn">▶</button>
        <span class="vp-time" id="currentTime">0:00</span>
        <div class="vp-progress-wrap" id="progressWrap">
          <div class="vp-progress" id="progressBar">
            <div class="vp-progress-fill" id="progressFill"></div>
          </div>
        </div>
        <span class="vp-time" id="duration">0:00</span>
        <button class="vp-btn" id="muteBtn">🔊</button>
        <div class="vp-volume-wrap">
          <input type="range" class="vp-volume" id="volumeSlider" min="0" max="1" step="0.05" value="1">
        </div>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('video');
    const playBtn = document.getElementById('playBtn');
    const bigPlayBtn = document.getElementById('bigPlayBtn');
    const overlay = document.getElementById('overlay');
    const progressFill = document.getElementById('progressFill');
    const progressWrap = document.getElementById('progressWrap');
    const currentTime = document.getElementById('currentTime');
    const duration = document.getElementById('duration');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');

    function formatTime(s) {
      if (isNaN(s)) return '0:00';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function togglePlay() {
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }

    function updatePlayBtn() {
      const icon = video.paused ? '▶' : '⏸';
      playBtn.textContent = icon;
      bigPlayBtn.textContent = icon;
      overlay.style.display = video.paused && !video.ended ? 'flex' : 'none';
    }

    function updateProgress() {
      const pct = (video.currentTime / video.duration) * 100 || 0;
      progressFill.style.width = pct + '%';
      currentTime.textContent = formatTime(video.currentTime);
    }

    function setProgress(e) {
      const rect = progressWrap.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width;
      video.currentTime = x * video.duration;
    }

    playBtn.addEventListener('click', togglePlay);
    bigPlayBtn.addEventListener('click', togglePlay);
    overlay.addEventListener('click', togglePlay);
    video.addEventListener('click', togglePlay);

    video.addEventListener('play', updatePlayBtn);
    video.addEventListener('pause', updatePlayBtn);
    video.addEventListener('ended', updatePlayBtn);
    video.addEventListener('timeupdate', updateProgress);

    video.addEventListener('loadedmetadata', () => {
      duration.textContent = formatTime(video.duration);
    });

    let scrubbing = false;
    progressWrap.addEventListener('mousedown', (e) => { scrubbing = true; setProgress(e); });
    document.addEventListener('mousemove', (e) => { if (scrubbing) setProgress(e); });
    document.addEventListener('mouseup', () => { scrubbing = false; });

    muteBtn.addEventListener('click', () => {
      video.muted = !video.muted;
      muteBtn.textContent = video.muted ? '🔇' : '🔊';
    });

    volumeSlider.addEventListener('input', () => {
      video.volume = parseFloat(volumeSlider.value);
      video.muted = false;
      muteBtn.textContent = '🔊';
    });
  </script>
</body>
</html>
