<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Launch Intro · Ease Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="ali-intro" id="intro">
    <div class="ali-logo" id="logo">
      <svg class="ali-logo-icon" viewBox="0 0 64 64" fill="none">
        <rect x="4" y="4" width="56" height="56" rx="14" stroke="currentColor" stroke-width="5" />
        <path d="M22 44V20l12 16V20" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>

    <div class="ali-loading" id="loadingSection">
      <div class="ali-loading-bar">
        <div class="ali-loading-fill" id="loadingFill"></div>
      </div>
    </div>

    <p class="ali-tagline" id="tagline">Powerful · Simple · Yours</p>

    <button class="ali-skip" id="skipBtn">Skip →</button>
  </div>

  <main class="ali-main" id="mainContent">
    <h1>App Launch Intro</h1>
    <p>A splash / intro screen with logo animation, loading bar, and a smooth transition to main content.</p>
    <div class="ali-features">
      <div class="ali-feature">Logo scales &amp; fades in</div>
      <div class="ali-feature">Loading bar fills progressively</div>
      <div class="ali-feature">Tagline appears with delay</div>
      <div class="ali-feature">Skip button to bypass intro</div>
    </div>
  </main>

  <script>
    const intro = document.getElementById('intro');
    const logo = document.getElementById('logo');
    const tagline = document.getElementById('tagline');
    const loadingFill = document.getElementById('loadingFill');
    const skipBtn = document.getElementById('skipBtn');
    const mainContent = document.getElementById('mainContent');
    const loadingSection = document.getElementById('loadingSection');

    let startTime = Date.now();
    const INTRO_DURATION = 3500;
    let skipped = false;

    function animate(time) {
      if (skipped) return;
      const elapsed = Date.now() - startTime;
      const progress = Math.min(1, elapsed / INTRO_DURATION);

      logo.style.opacity = Math.min(1, progress * 3);
      logo.style.transform = `scale(${0.5 + 0.5 * Math.min(1, progress * 2)})`;

      loadingFill.style.width = Math.min(100, progress * 100) + '%';

      const tagProgress = Math.max(0, (progress - 0.5) * 2);
      tagline.style.opacity = tagProgress;
      tagline.style.transform = `translateY(${12 - tagProgress * 12}px)`;

      if (progress >= 1) {
        transitionToMain();
        return;
      }

      requestAnimationFrame(animate);
    }

    function transitionToMain() {
      intro.style.opacity = '0';
      intro.style.pointerEvents = 'none';
      setTimeout(() => {
        intro.style.display = 'none';
        mainContent.classList.add('ali-visible');
      }, 500);
    }

    skipBtn.addEventListener('click', () => {
      skipped = true;
      transitionToMain();
    });

    logo.style.opacity = '0';
    tagline.style.opacity = '0';
    tagline.style.transform = 'translateY(12px)';
    requestAnimationFrame(animate);
  </script>
</body>
</html>
