name: Issue Auto-Responder

on:
  issues:
    types: [opened]

jobs:
  auto-respond:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Assign and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const opener  = context.payload.issue.user.login;
            const issueNo = context.payload.issue.number;
            const owner   = context.repo.owner;
            const repo    = context.repo.repo;
            const MAX_ASSIGNED_ISSUES = 25;

            // Fetch the latest issue state to prevent race conditions on closed issues
            const { data: issue } = await github.rest.issues.get({
              owner, repo, issue_number: issueNo
            });

            if (issue.state === 'closed') {
              console.log(`Issue #${issueNo} is closed. Skipping auto-assign.`);
              return;
            }

            // ── Cap check: don't auto-assign if opener already holds ≥25 issues ──
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner, repo,
              assignee: opener,
              state: 'open',
              per_page: 100,
            });
            const activeCount = existingIssues.filter(i => !i.pull_request && i.number !== issueNo).length;

            if (activeCount >= MAX_ASSIGNED_ISSUES) {
              // Don't assign — post a warning comment instead
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNo,
                body: `Hey @${opener}! 👋\n\n⚠️ **Auto-assign blocked:** You already have **${activeCount}/${MAX_ASSIGNED_ISSUES}** active assigned issues. Please complete or \`/unclaim\` some of your current issues before taking new ones.\n\nYour issue has been created and is open for anyone to claim once you have capacity!`,
              });
              return;
            }

            await github.rest.issues.addAssignees({
              owner, repo,
              issue_number: issueNo,
              assignees: [opener],
            });

            // Detect track from labels
            const labels = issue.labels.map(l => l.name.toLowerCase());
            const isReact = labels.includes('react');
            const isScss  = labels.includes('scss');
            const isReactScss = isReact || isScss;

            let body;

            if (isReactScss) {
              const track     = isReact && isScss ? 'React & SCSS' : isReact ? 'React' : 'SCSS';
              const trackIcon = isReact ? '⚛️' : '💅';
              const exampleFolder = isReact ? 'submissions/react/my-animated-card/' : 'submissions/scss/my-fade-mixin/';
              const fileSpec  = isReact
                ? '`YourComponent.jsx` · `README.md` (and optionally `style.css`)'
                : '`_your-mixin.scss` · `README.md`';

              const trackRules = isReact ? [
                '#### ⚛️ React Submission Rules',
                '- [ ] Create a folder under `submissions/react/your-component-name/`',
                '- [ ] Add a real React component file (`.jsx` or `.tsx`)',
                '- [ ] The component **must use EaseMotion CSS classes** (e.g. `ease-fade-in`, `ease-hover-lift`)',
                '- [ ] Add a `README.md` with a props table and usage example',
                '- [ ] Do **NOT** edit or delete any existing files',
                '- [ ] Do **NOT** add files outside `submissions/react/`',
              ].join('\n') : [
                '#### 💅 SCSS Submission Rules',
                '- [ ] Create a folder under `submissions/scss/your-mixin-name/`',
                '- [ ] Add a `.scss` partial file with your mixin, variables, or utility',
                '- [ ] The SCSS must reference EaseMotion animation keyframes or CSS variables',
                '- [ ] Add a `README.md` with parameter documentation and `@include` example',
                '- [ ] Do **NOT** edit or delete any existing files',
                '- [ ] Do **NOT** add files outside `submissions/scss/`',
              ].join('\n');

              body = [
                `Hey @${opener}! 👋 ${trackIcon}`,
                '',
                `Thanks for opening this **${track}** issue — you've been **auto-assigned** to it.`,
                '',
                '### 📋 How to contribute on this track',
                '',
                `> ⚠️ **This is a ${track} issue.** Your PR must follow the ${track} contribution rules below.`,
                `> **Do NOT** submit a plain HTML/CSS demo to this issue — it will be automatically rejected.`,
                '',
                `**Your submission folder must be:** \`${exampleFolder}\``,
                '',
                `**Required files:** ${fileSpec}`,
                '',
                trackRules,
                '',
                '### ✅ General Rules (same as all tracks)',
                '- [ ] Make sure no existing issue already covers this idea',
                '- [ ] Read the [Contribution Guide](../blob/main/CONTRIBUTING.md) before opening a PR',
                '- [ ] **Max 25 active issues per contributor** — unassign others before taking new ones',
                '- Join our [Discord Server](https://discord.gg/hWSdGrccBU) for help',
                '',
                '> 🕑 **Inactivity rule:** Issues with no progress for **24 hours** will be unassigned and reopened for others.',
                '',
                'The maintainer will review your PR once submitted. Good luck! ⚡',
              ].join('\n');
            } else {
              body = [
                `Hey @${opener}! 👋`,
                '',
                `Thanks for opening this issue — you've been **auto-assigned** to it.`,
                '',
                'Before you start coding, please read the quick checklist:',
                '',
                '- [ ] Make sure no existing issue already covers this idea',
                '- [ ] Read the [Contribution Guide](../blob/main/CONTRIBUTING.md) before opening a PR',
                '- [ ] Add files **only** inside the `submissions/` directory (e.g., `submissions/examples/your-feature-name/` or `submissions/docs/your-feature-name/`)',
                '- [ ] Include `demo.html` · `style.css` · `README.md` in your folder',
                '- [ ] **Max 25 active issues per contributor** — unassign others before taking new ones',
                '- Join our official [Discord Server](https://discord.gg/hWSdGrccBU) (Optional - for general developer chat and support; official issues belong on GitHub!)',
                '',
                '> 🕑 **Inactivity rule:** Issues with no progress for **24 hours (1 day)** will be unassigned and reopened for others.',
                '',
                'The maintainer will review your PR once submitted. Good luck! ⚡',
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNo,
              body,
            });

